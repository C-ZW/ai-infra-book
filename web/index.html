<style>
:root{ --fs:18px; --lh:1.95; --ls:0.02em; --ps:1.0; --pw:52; }
/* Monospace CJK=2-columns fix: CJK runs inside <pre> are wrapped in .cjkw
   spans at render time (see wrapCJK) and scaled so a fullwidth PingFang glyph
   is exactly 2x Menlo's advance (2 x 0.60205em -> 120.41%). Done with spans
   instead of @font-face size-adjust because WebKit ignores size-adjust on

*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
/* themes */
body[data-theme="paper"]{--bg:#f7f2e9;--fg:#2f2b24;--muted:#8d8474;--border:#e2d9c6;--codebg:#efe8d7;--link:#a05a17;--accent:#b06a1e;--side:#f0e9d8;--sideactive:#e4d9bf}
body[data-theme="light"]{--bg:#ffffff;--fg:#24292f;--muted:#6e7781;--border:#e8eaed;--codebg:#f5f7f9;--link:#0a69c2;--accent:#0a69c2;--side:#f7f8fa;--sideactive:#e9edf2}
body[data-theme="sepia"]{--bg:#f4ecd8;--fg:#52432e;--muted:#9b8a6d;--border:#dfd2b3;--codebg:#ebdfc3;--link:#985a1f;--accent:#985a1f;--side:#eee2c8;--sideactive:#e2d3ae}
body[data-theme="dark"]{--bg:#22262c;--fg:#c4ccd4;--muted:#828d99;--border:#3a424b;--codebg:#2b323a;--link:#7ab8f5;--accent:#7ab8f5;--side:#1d2126;--sideactive:#2e353d}
body{background:var(--bg);color:var(--fg)}
a{color:var(--link)}
/* layout */
#layout{display:flex;height:100%}
#sidebar{width:288px;min-width:288px;background:var(--side);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0 40px;transition:transform .2s}
#main{flex:1;overflow-y:auto;position:relative;scroll-behavior:auto}
#sidebar .brand{font-weight:700;font-size:15px;padding:6px 18px 12px;line-height:1.5}
#sidebar .grp{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;padding:14px 18px 4px}
#sidebar a.ch{display:block;padding:6px 18px;font-size:13.5px;line-height:1.5;color:var(--fg);text-decoration:none;border-left:3px solid transparent}
#sidebar a.ch:hover{background:var(--sideactive)}
#sidebar a.ch.active{background:var(--sideactive);border-left-color:var(--accent);font-weight:600}
#sidebar .allbtn{margin:16px 18px 0;display:block;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--fg);text-decoration:none;background:var(--bg)}
#topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
#topbar .ttl{flex:1;font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:8px;padding:6px 11px;font-size:14px;line-height:1}
.btn:hover{background:var(--codebg)}
a.btn{text-decoration:none;display:inline-block;white-space:nowrap}
#hamburger{display:none}
/* prose */
.prose{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:2.4rem 1.7rem 3rem;font-size:var(--fs);line-height:var(--lh);letter-spacing:var(--ls)}
body[data-font="sans"] .prose{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
body[data-font="serif"] .prose{font-family:"Songti TC","Noto Serif TC",Georgia,"PMingLiU",serif}

.prose h4{font-size:1.02em;margin:1.4em 0 .5em}
.prose li{margin:.45em 0}
.prose ul,.prose ol{padding-left:1.6em}
.prose blockquote{margin:1.3em 0;padding:.7em 1.2em;border-left:4px solid var(--accent);background:var(--codebg);border-radius:0 8px 8px 0}
.prose blockquote p{margin:.5em 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:2.4em 0}
.prose img{max-width:100%}
.prose pre{background:var(--codebg);border:1px solid var(--border);border-radius:8px;padding:.9em 1.1em;overflow-x:auto;font-size:.84em;line-height:1.6;letter-spacing:0;font-family:Menlo,ui-monospace,monospace}
.prose pre code{background:none;padding:0;border:none;font-size:1em}
.prose pre .cjkw{font-family:"PingFang TC","PingFangTC-Regular","PingFang SC","Noto Sans TC",sans-serif;font-size:120.41%;line-height:0;letter-spacing:0}
.prose code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"PingFang TC",monospace;background:var(--codebg);border:1px solid var(--border);border-radius:5px;padding:.08em .35em;font-size:.86em;letter-spacing:0}
.prose table{border-collapse:collapse;display:block;overflow-x:auto;margin:1.3em 0;font-size:.9em;line-height:1.65;letter-spacing:0}
.prose th,.prose td{border:1px solid var(--border);padding:.5em .75em;text-align:left;vertical-align:top}
.prose th{background:var(--codebg);white-space:nowrap}
#pager{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:0 1.7rem 5rem;display:flex;gap:12px;justify-content:space-between}
#pager .btn{flex:1;text-align:center;padding:13px;font-size:14px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* settings panel */
#panel{position:fixed;top:0;right:0;height:100%;width:300px;background:var(--side);border-left:1px solid var(--border);z-index:20;padding:18px 20px 40px;overflow-y:auto;transform:translateX(105%);transition:transform .2s;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
#panel.open{transform:none}
#panel h3{margin:4px 0 14px;font-size:16px}
#panel .row{margin:0 0 16px}
#panel label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
#panel input[type=range]{width:100%}
#panel .seg{display:flex;gap:6px;flex-wrap:wrap}
#panel .seg .btn{flex:1;min-width:56px;text-align:center;font-size:13px}
#panel .seg .btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9;display:none}
#backdrop.show{display:block}
@media (max-width:880px){
  #sidebar{position:fixed;left:0;top:0;height:100%;z-index:15;transform:translateX(-102%)}
  #sidebar.open{transform:none;box-shadow:6px 0 24px rgba(0,0,0,.15)}
  #hamburger{display:inline-block}
  .prose{padding:1.6rem 1.1rem 2.5rem}
}
</style>

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "從後端到 AI Infra：LLM 推論基礎設施工程", "md": "# 從後端到 AI Infra：LLM 推論基礎設施工程\n\n> 寫給一位資深後端工程師的 AI Infrastructure 專業養成書。\n> 核心論點：**大規模 LLM serving 是分散式系統問題，不是模型問題**——你過去六年的高併發、效能工程、可觀測性功力，是這個領域最稀缺的底子；這本書負責補上新的物理。\n>\n> 事實基準時點：**2026-06**（時效性內容均標註；維護方式見 `_meta/maintenance.md`）。\n\n## 全書三條主軸\n\n1. **LLM serving 本質上是 memory 的生意** — 幾乎所有設計決策最終都回到 memory bandwidth 與 memory capacity 的取捨。\n2. **量測 → 診斷 → 優化 → 用數據證明** — 你既有的效能工程方法論，原封不動搬到 GPU 世界。\n3. **把分散式系統直覺翻譯到新物理** — 排程、路由、一致性、可觀測性的直覺都成立，但物理常數變了。\n\n## 目錄\n\n### Part I — 心智模型與基礎\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch01](part-1-foundations/ch01-from-backend-to-ai-infra.md) | 從後端到 AI Infra | 全書地圖：技術棧分層、職位光譜、你的技能遷移矩陣 |\n| [ch02](part-1-foundations/ch02-gpu-architecture.md) | GPU：一種你沒用過的計算機 | SM/HBM/roofline、互連、機房現實、硬體版圖 |\n| [ch03](part-1-foundations/ch03-inference-physics.md) | Transformer 推論的物理學 | attention、KV cache 數學、prefill/decode——全書的理論地基 |\n| [ch04](part-1-foundations/ch04-language-bridge.md) | 語言與工具橋接 | Python（給 TS 工程師）、PyTorch 讀碼、Go 讀 controller、CUDA 生態 |\n\n### Part II — 推論引擎\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch05](part-2-inference-engine/ch05-kv-cache.md) | KV Cache 管理 | PagedAttention、prefix caching、KV 量化、offloading 分層 |\n| [ch06](part-2-inference-engine/ch06-batching-scheduling.md) | Batching 與單機排程 | continuous batching、chunked prefill、preemption、吞吐的來源 |\n| [ch07](part-2-inference-engine/ch07-model-optimization.md) | 模型壓縮與加速 | quantization、speculative decoding、kernels、CUDA graphs |\n| [ch08](part-2-inference-engine/ch08-engines-in-practice.md) | 推論引擎實戰 | vLLM 架構與參數、SGLang、TensorRT-LLM、選型、單卡部署閉環 |\n\n### Part III — 分散式推論\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch09](part-3-distributed/ch09-parallelism.md) | 平行化策略 | TP/PP/DP/EP/SP、NCCL 通訊帳、拓撲、wide-EP |\n| [ch10](part-3-distributed/ch10-disaggregation-routing.md) | P/D 分離與 KV 路由 | Mooncake/Dynamo/llm-d、KV 傳輸數學、KV-aware routing |\n\n### Part IV — 平台工程（你的主場）\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch11](part-4-platform/ch11-kubernetes-for-gpus.md) | Kubernetes 上的 GPU | device plugin→DRA、MIG/MPS/time-slicing、Kueue、節點生命週期 |\n| [ch12](part-4-platform/ch12-platform-architecture.md) | 推論平台架構 | gateway→router→engine 全鏈路、平台選型、LoRA 多租戶、cold start |\n| [ch13](part-4-platform/ch13-autoscaling-capacity.md) | Autoscaling 與容量工程 | 訊號選擇、headroom 數學、SLO 驅動的容量規劃與硬體選型 |\n\n### Part V — 生產維運\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch14](part-5-operations/ch14-observability-benchmarking.md) | 可觀測性與 Benchmark | 五層指標分類學、goodput@SLO、誠實的 benchmark 方法論 |\n| [ch15](part-5-operations/ch15-reliability.md) | 可靠性工程 | 16 條故障目錄、drain 數學、eval gate、runbook 判斷樹 |\n| [ch16](part-5-operations/ch16-cost-multitenancy.md) | 成本工程與多租戶 | $/Mtok 經濟學、build vs buy、token 計量限流、chargeback |\n\n### Part VI — 前沿與職涯\n| 章 | 標題 | 一句話 |\n|---|---|---|\n| [ch17](part-6-frontier/ch17-frontier-2026-2028.md) | 前沿 2026–2028 | agentic 流量革命、reasoning 經濟學、新架構與硬體、能力耐久性矩陣 |\n| [ch18](part-6-frontier/ch18-career.md) | 把能力變成職涯 | 作品集對應、45 分鐘系統設計面試完整示範、開源策略、履歷改寫 |\n\n### 附錄\n- [附錄 A — 動手實驗總表](appendix/a-labs-index.md)：52 個實驗、三條軌道（M1 免費 / 單卡 $21–36 / 多卡 $8–15＋模擬），含建議順序與成本紀律\n- [附錄 B — 術語表](appendix/b-glossary.md)：193 條 EN→繁中\n- [附錄 C — 速查表](appendix/c-cheatsheets.md)：公式卡、vLLM 參數、PromQL、DCGM、K8s YAML、benchmark 檢查清單\n\n## 怎麼讀\n\n**完整路線**（建議，約 8–12 週搭配實作）：按章節順序。Part I 是地基（尤其 ch03，全書反覆引用它的數字）；每章讀完做「動手做」、用「自我檢核」驗收後再前進——講不清楚就是還沒懂。\n\n**求職速通路線**：ch01 → ch03 → ch05 → ch06 → ch08 → ch11 → ch13 → ch14 → ch18，搭配附錄 A 的 Track 1＋Track 2。這條線覆蓋面試硬性要求的最小集合。\n\n**面試前複習路線**：ch18 的 45 分鐘示範與 30 題題庫 → 各章「自我檢核」→ 附錄 C 公式卡。\n\n**與 `../plan.md` 的關係**：plan.md 是練功路線（能力模組＋考核），本書是知識本體（機制＋深度＋判斷）。對應關係在 ch01 與 ch18 有完整表格；附錄 A 的每個實驗都標了 plan.md 模組歸屬。兩者搭配：照 plan.md 的模組推進，用本書對應章節補深度。\n\n## 誠實聲明\n\n- 本書由 AI 協作撰寫（2026-06），所有可查證事實均經網路查證並標註時點，但**版本號、價格、硬體預告屬月級變動**——動手前以官方文件為準。已知需要回查的項目集中在 `_meta/maintenance.md`。\n- 各章的 worked example 是「方法可移植、數字要自己重測」——benchmark 示意數字均已標明假設。\n"}, {"id": "ch01-from-backend-to-ai-infra", "file": "ch01-from-backend-to-ai-infra.md", "group": "Part I — 心智模型與基礎", "title": "ch01 — 從後端到 AI Infra：你站在哪、要去哪", "md": "# ch01 — 從後端到 AI Infra：你站在哪、要去哪\n\n> **本章解決什麼問題**：這是全書的地圖。你即將從一個熟悉的領域（高併發後端）走進一個術語密度極高的新領域（LLM inference infrastructure），最大的風險不是「學不會」，而是「學錯方向」——在錯誤的層花三個月，或用舊直覺做出錯誤的容量判斷。本章給你四樣東西：這個領域的技術棧分層圖與每層對應的章節、職位光譜的解碼方法、你既有技能的遷移矩陣（哪些直接能用、哪些必須從零學）、以及一個把直覺顛覆量化出來的計算——為什麼同樣一萬個並發使用者，基礎設施成本可以差出一個半數量級。後面每一章都會回到這張地圖上。\n\n## 從你已知的出發\n\n先講全書的核心論點，因為它決定了你該怎麼讀這本書：\n\n**大規模 LLM serving 本質上是分散式系統問題，不是模型問題。**\n\n訓練模型的人決定了模型長什麼樣；但讓模型在叢集上跑得穩、快、省的人，每天面對的是排程、路由、快取、容量規劃、可觀測性、故障處理——全是你做了六年的東西，只是物理常數變了。你不需要會訓練模型，就像你維運 Dynasty Warriors Mobile 的後端時，不需要會寫遊戲引擎。\n\n回想你最熟悉的場景：一個玩家請求打進來——ALB 把它分到某台無狀態的 Node.js 容器，業務邏輯跑幾毫秒，讀寫一次 RDS 或 Redis，回應出去。整套系統的狀態都住在資料庫層，app tier 隨便殺隨便擴，10K CCU 用二十台 4 vCPU 的機器就扛住了。你的直覺建立在三個隱含假設上：**每個請求很便宜、應用層無狀態、橫向擴展以秒計**。\n\nLLM serving 把這三個假設全部打碎：\n\n- 一個 chat 請求要做的浮點運算，比一個遊戲 API 請求多出**五到六個數量級**（本章稍後算給你看）。\n- 每條進行中的對話在 GPU 記憶體裡掛著 GB 級的狀態（KV cache，見 ch03），它不像 session 可以丟進 Redis——它黏在那張卡上，搬動的成本高到需要專門的傳輸工程（見 ch10）。\n- 擴一個新的推論副本，要拉數十 GB 的模型權重、初始化引擎、做 warmup，冷啟動以**分鐘**計（見 ch12）——而流量尖峰還是以秒計來的。\n\n但別急著覺得陌生。你會發現這個領域到處都是你見過的問題穿著新衣服：PagedAttention 就是 OS virtual memory paging 搬到 GPU 記憶體上（見 ch05）；KV-aware routing 是 session affinity + consistent hashing 的高賭注版本（見 ch10）；preemption storm 跟你在遊戲後端見過的 retry storm 是同一種動力學（見 ch15）；你用 FluentBit + Lua 自建 metrics pipeline 的那套思路，換成 DCGM exporter + engine `/metrics` 一樣成立（見 ch14）。你的武器庫大部分還能用，本章的工作就是逐件清點。\n\n## 一個 chat 請求的完整旅程\n\n用一個具體場景把整個 stack 攤開。使用者在某個 AI 產品裡送出一句話，按下 Enter 之後發生的事：\n\n```\nclient ──HTTPS/SSE──▶ API Gateway ──▶ Inference Router ──▶ vLLM Pod (GPU)\n                       認證/計量/限流     KV-aware 路由        tokenize → 排程\n                       (ch12, ch16)      (ch10, ch12)         → prefill → decode\n                                                              (ch03, ch05, ch06)\n   ◀── token ◀── token ◀── token ─── SSE streaming 一路流回 ───┘\n```\n\n1. **進門**：client 對 `/v1/chat/completions` 發一個 POST，帶 `stream: true`。這個 API 形狀（OpenAI-compatible）是業界的 de facto 標準（見 ch12）。Gateway 做認證、限流、計量——但注意，限流的單位不是請求數而是 **token 數**，因為一個請求的成本變異可達千倍（10 個 token 的問題 vs 100k token 的文件分析），用 RPS 限流毫無意義（見 ch16）。\n2. **路由**：router 要決定送到哪個 GPU 副本。這不是 round-robin 能解的——如果某個副本的記憶體裡還留著這條對話上一輪的 KV cache，送過去可以跳過大量重算，TTFT 差距可達數十倍（llm-d 專案方數據，見 ch10）。這是**有狀態的負載均衡**，你做過的 session affinity 的進化版。\n3. **引擎內**：vLLM（見 ch08）把 prompt 切成 token，scheduler 把這個請求**插進正在進行的 batch**——不等任何人，每個 decode step 都重組一次 batch，這叫 continuous batching（見 ch06），是「推論引擎為什麼快」的核心答案。同時為它配置 KV cache 的記憶體分頁（見 ch05）。\n4. **Prefill**：整段 prompt 的所有 token 平行算一遍，建立 KV cache。這一步是 compute-bound，吃滿 GPU 算力。算完吐出第一個 token——從請求進門到此刻的時間就是 **TTFT**（time to first token）。\n5. **Decode**：之後每個 token 都要把**整份模型權重從 HBM 讀一遍**，逐 token 自回歸生成。這一步是 memory-bound——瓶頸不是算力，是記憶體頻寬（見 ch02、ch03）。token 之間的間隔叫 **ITL**（inter-token latency）。每個 token 經 SSE 一路流回 client——你寫過 WebSocket fan-out，這套長連線串流的工程問題你全都熟，只是方向變成伺服器往外吐。\n6. **收尾**：請求完成，KV cache 的分頁被釋放——或者留著當 prefix cache，賭下一輪對話會回來（見 ch05）。整條路上的每個環節都在吐指標（TTFT/ITL/goodput/KV 利用率，見 ch14），都有自己的死法（見 ch15），都在燒錢（見 ch16）。\n\n一句話總結這趟旅程：**prefill 是算力的生意，decode 是記憶體的生意，而整個平台是分散式系統的生意。**\n\n## 技術棧分層：這個領域的地圖\n\n把上面那趟旅程垂直展開，就是這個領域的完整分層。每一層都有自己的工具生態、自己的工程師職稱、和本書對應的章節：\n\n| 層 | 在解什麼問題 | 代表工具（2026-06） | 本書章節 |\n|---|---|---|---|\n| **產品 API 層** | 認證、計量、限流、OpenAI-compatible 介面 | API gateway、Envoy AI Gateway、OpenRouter 類聚合層 | ch12、ch16 |\n| **平台層** | 多模型、多租戶、autoscaling、配額、發布 | KServe、Ray Serve、llm-d、NVIDIA Dynamo | ch12、ch13 |\n| **叢集排程層** | GPU 當資源排程、共享、拓撲、節點生命週期 | K8s + GPU Operator、DRA、Kueue、LeaderWorkerSet | ch11 |\n| **多卡/多節點層** | 一張卡裝不下：平行化、P/D 分離、KV 路由 | NCCL、vLLM/SGLang 的 TP/EP、Mooncake、NIXL | ch09、ch10 |\n| **單機引擎層** | 一張卡之內把吞吐榨乾：batching、KV 管理 | vLLM、SGLang、TensorRT-LLM、llama.cpp/Ollama | ch05–ch08 |\n| **Kernel/runtime 層** | 單一運算在 GPU 上跑多快 | CUDA、FlashAttention、FlashInfer、CUDA Graphs | ch04、ch07 |\n| **模型層** | 模型結構決定的物理：attention、KV 數學、MoE | transformer 架構本身、quantization 格式 | ch03、ch07 |\n| **硬體層** | 算力、記憶體頻寬、互連、功耗 | H100/B200、HBM、NVLink、InfiniBand | ch02 |\n\n三個讀圖要點：\n\n- **你的既有優勢集中在上半部**（產品 API ~ 叢集排程層），那裡的工程問題與你的經驗高度同構。**你的知識空洞集中在下半部**（引擎層以下），那是本書 Part I、II 要替你補的地基。\n- **價值密度不是均勻的**。2024–2026 年這個產業最猛的工程創新發生在「單機引擎層」與「多節點層」之間（continuous batching、PagedAttention、P/D 分離、KV-aware routing），而 2026 年的競爭焦點正在往「平台層」上移——四條路線（llm-d、Dynamo、KServe、Ray Serve）都在把同一組底層原語包裝成 Kubernetes 原生的平台（見 ch12）。對你這是好消息：戰場正在往你的主場移動。\n- **每層都被同一個約束貫穿**：記憶體。權重要裝得下（容量）、每個 token 要把權重讀一遍（頻寬）、每條對話要掛著 KV state（容量×時間）。這條主軸下面馬上會正式宣告。\n\n## 新的物理常數：你的直覺哪裡會背叛你\n\n你的分散式系統直覺——排程、佇列、一致性、可觀測性——在新世界全部成立。會背叛你的是**數量級**。這張表值得貼在螢幕旁邊：\n\n| 維度 | 你的後端世界 | GPU 推論世界 | 後果 |\n|---|---|---|---|\n| 單一請求的計算量 | ~ms 級 CPU 時間 | 一則 500 token 回覆 ≈ 70 TFLOPs（70B 模型） | 差 5–6 個數量級，容量直覺全部重算 |\n| 請求成本變異 | 大致均勻（±一個數量級內） | 10 token vs 100k token，變異千倍 | RPS 限流與 LB 連線數均衡全部失效 |\n| 應用層狀態 | stateless，session 丟 Redis | 每條對話 GB 級 KV state 黏在卡上 | 路由變成有狀態問題（見 ch10） |\n| 延遲的單位 | 請求級，看 p99 ms | token 級：TTFT（秒級）+ ITL（十 ms 級）雙指標 | 一個數字描述不了延遲（見 ch14） |\n| 橫向擴展速度 | 容器秒級拉起 | 權重載入 + warmup，冷啟動分鐘級 | autoscaling 要靠預測與 headroom（見 ch13） |\n| 資源超賣 | CPU 可超賣、cgroup 任意切 | GPU 整數配置、不可超賣（device plugin 模型） | bin-packing 與共享變成一級問題（見 ch11） |\n| 重試的代價 | 便宜，retry 是預設手段 | 重試 = 重算分鐘級的昂貴請求 | retry storm 的破壞力放大百倍（見 ch15） |\n| 記憶體頻寬 | 幾乎不用想 | **第一性瓶頸**，decode 速度上限由它決定 | 全書主軸一（見 ch02、ch03） |\n| 硬體故障 | 單機故障少見，換機便宜 | ECC error、NCCL hang 是日常，一卡掛全組僵 | 可靠性工程是顯學（見 ch15） |\n| 單位成本 | $0.17/hr 的 c5.xlarge | $2–7/hr 的 H100（2026-06 快照，級距隨市場波動） | 利用率直接是錢（見 ch16） |\n\n注意這張表的性質：左欄到右欄，**沒有任何一個概念消失**，只有常數改變。佇列還是佇列、快取還是快取、p99 還是 p99。這就是為什麼資深後端工程師轉這個領域有結構性優勢——要補的是物理，不是世界觀。\n\n## Worked example：同樣一萬個並發使用者，為什麼差出兩個數量級\n\n把直覺顛覆量化出來。以下是粗估，目的是建立數量級的手感；嚴謹版的 KV 數學在 ch03、容量規劃方法論在 ch13。所有價格為 2026 年年中快照。\n\n### 你的世界：10K CCU 的遊戲後端\n\n| 假設 | 數值 |\n|---|---|\n| 並發在線 | 10,000 CCU |\n| 平均請求率 | 0.5 req/s/玩家（含心跳與動作）→ 5,000 RPS |\n| 每請求 CPU 時間 | 1–5 ms（業務邏輯 + DB/Redis I/O 等待） |\n| 機型 | c5.xlarge：4 vCPU / 8 GiB，$0.17/hr（us-east-1，2026-06） |\n\n20 台 c5.xlarge = 80 vCPU。5,000 RPS ÷ 80 vCPU ≈ 每 vCPU 每秒 62 個請求，即每個請求有 **16 ms 的 CPU 預算**——對幾 ms 的業務邏輯綽綽有餘，瓶頸早就丟給 RDS 了（所以你當年才會去優化 RDS 而不是 app tier）。\n\n**成本：20 × $0.17 = $3.4/hr ≈ $2,500/月。**\n\n### 新世界：10K 並發 chat 使用者\n\n| 假設 | 數值 | 依據 |\n|---|---|---|\n| 並發使用者 | 10,000 | 同上 |\n| 同時在等生成的比例 | 10%（人大部分時間在讀與打字）→ **1,000 條活躍生成串流** | duty cycle 假設，偏保守 |\n| 模型 | 70B dense（Llama-3.3-70B 級），FP8 權重 ≈ 70 GB | |\n| 體感速度要求 | ITL ≤ 40 ms → 每串流 25 tok/s | 約等於人的閱讀速度 |\n| 平均對話 context | 4,096 tokens | chat 流量的典型值 |\n| 卡 | H100 SXM：80 GB HBM3、3.35 TB/s 頻寬、FP8 dense 約 2 PFLOPS | NVIDIA datasheet |\n\n**第一步，算錯誤的帳（算力帳）。** 每生成一個 token，70B dense 模型要做約 2 × 70×10⁹ = **140 GFLOPs**。總需求 = 1,000 串流 × 25 tok/s × 140 GFLOPs = **3.5 PFLOP/s**。一張 H100 的 FP8 算力約 2 PFLOPS——所以兩張卡就夠了？\n\n**錯。這正是 CPU 直覺害死人的地方。** decode 的瓶頸不是算力，是記憶體。\n\n**第二步，算容量帳（KV cache）。** Llama-3.3-70B 用 GQA：80 層、8 個 KV head、head_dim 128。每個 token 的 KV cache（FP16）：\n\n```\n2 (K+V) × 80 層 × 8 KV heads × 128 dim × 2 bytes = 327,680 bytes ≈ 320 KB/token\n```\n\n一條 4k context 的對話 = 4,096 × 320 KB ≈ **1.3 GB**。1,000 條活躍對話 = **1.3 TB 的 KV state 必須住在 HBM 裡**。\n\n單張 H100 放下 70 GB 權重後所剩無幾，所以用 4 卡一組做 tensor parallelism（TP4，見 ch09）：320 GB 總 HBM − 70 GB 權重 − 約 25 GB 的 activation/緩衝，剩約 225 GB 給 KV → 每組 TP4 容納約 **175 條活躍對話**。\n\n```\n1,000 條 ÷ 175 條/組 ≈ 6 組 TP4 = 24 張 H100   ← 光是 KV 容量需求\n```\n\n**第三步，用頻寬帳驗證延遲。** 每個 decode step，一組 TP4 要從 HBM 讀：70 GB 權重 + 該 batch 的 KV（175 × 1.3 GB ≈ 228 GB）≈ 300 GB。TP4 聚合頻寬 = 4 × 3.35 = 13.4 TB/s：\n\n```\n300 GB ÷ 13.4 TB/s ≈ 22 ms/step → ITL ≈ 22 ms ✓（在 40 ms 預算內）\n```\n\n順手算同一個 step 的算力時間：175 token × 140 GFLOPs ÷ (4 × 2 PFLOPS) ≈ **3 ms**。記憶體要 22 ms、算力只要 3 ms——GPU 的運算單元有八成以上的時間在**等記憶體**。這就是「decode 是 memory-bound」的數字版（嚴謹推導見 ch02 的 roofline 與 ch03）。\n\n**第四步，加上現實。** 上面還沒算：prefill 的算力尖峰（新訊息進來要算 TTFT，會跟 decode 搶資源，見 ch06）、流量尖峰係數、滾動發布與故障的冗餘。實務上 24 張會配到 **28–32 張 H100**。\n\n**成本：28 × $2.75/hr（neocloud 級距）≈ $77/hr ≈ $56,000/月**；若用 hyperscaler on-demand（$7–12/GPU/hr）則 $143,000/月起跳。\n\n### 對帳\n\n| | 遊戲後端 | LLM chat | 倍率 |\n|---|---|---|---|\n| 並發使用者 | 10,000 | 10,000 | 1× |\n| 每請求計算量 | ~10⁸ ops | ~7×10¹³ FLOPs（500 token 回覆） | ~10⁵–10⁶× |\n| 應用層常駐狀態 | ~0（在 DB/Redis） | ~1.3 TB KV in HBM | — |\n| 月成本 | ~$2,500 | ~$56,000–143,000 | 22–57× |\n\n三個帶走的結論：（1）**算力幾乎從來不是答案**，容量與頻寬才是——這就是為什麼這本書叫你先學記憶體再學別的；（2）那 1.3 TB 的 KV state 是整個架構的重心，後面一半的章節（ch05、ch10、ch13、ch16）本質上都在處理它；（3）成本差兩個數量級，意味著**你在後端世界學到的效能工程，每一分優化在這裡的金錢槓桿放大了兩個數量級**——這正是這個職位存在、且薪資溢價的根本原因。\n\n## 全書三條主軸\n\n上面的計算已經把三條主軸演示了一遍，現在正式宣告。全書每一章都至少呼應其中一條：\n\n1. **LLM serving 本質上是 memory 的生意。** 幾乎所有設計決策——batching、quantization、P/D 分離、路由、容量規劃——最終都回到 memory bandwidth 與 memory capacity 的取捨。看到任何新技術，先問「它動了記憶體的哪一邊」。\n2. **量測 → 診斷 → 優化 → 用數據證明。** 你把 RDS CPU 尖峰降 40% 用的方法論，原封不動搬到 GPU 世界，只是 Clinic.js 換成 nvidia-smi/DCGM/engine metrics、k6 的對象從 REST API 換成 SSE token stream。這個方法論是你最值錢的資產，本書所有 lab 都按這個閉環設計。\n3. **把分散式系統直覺翻譯到新物理。** 排程、路由、一致性、backpressure、可觀測性的直覺全部成立，但物理常數變了：ms→μs、GB→TB、stateless→重狀態、秒級擴展→分鐘級冷啟動。翻譯靠的是上面那張物理常數表。\n\n## 職位光譜：JD 上的同名異實\n\n「AI Infra」不是一個職位，是一個光譜。同一個 title 在不同公司可以是完全不同的工作，讀 JD 要看關鍵字不要看職稱：\n\n| 職稱 | 實際在做什麼 | JD 關鍵字訊號 | 對應本書 | 與你的距離 |\n|---|---|---|---|---|\n| **LLM Inference Engineer** | 引擎層效能：KV cache、batching、quantization、引擎調參與選型 | vLLM/SGLang/TensorRT-LLM、TTFT/throughput、quantization、speculative decoding | ch05–ch08 | 中——效能方法論直接遷移，引擎機制要從零補 |\n| **ML Platform Engineer** | 把推論（與訓練）包成內部平台：多租戶、配額、部署、CI/CD for models | Kubernetes、Ray/KServe、Go、multi-tenancy、IaC | ch11–ch13、ch16 | **最近**——你的 K8s/平台/AWS 經驗幾乎直接對口 |\n| **GPU Infra Engineer** | 叢集與硬體層：節點生命週期、driver/CUDA 版本矩陣、IB 網路、利用率治理 | NCCL、InfiniBand/RoCE、DCGM、SLURM 或 K8s、fleet management | ch02、ch09、ch11、ch15 | 中——K8s 維運遷移，硬體與網路層要補 |\n| **MLOps Engineer** | 模型生命週期：registry、部署 pipeline、監控、實驗追蹤 | MLflow/W&B、model registry、pipeline 工具 | ch12、ch14 | 近，但注意：這個 title 涵義最浮動，很多實際是「DevOps for data scientists」，infra 深度有限 |\n| **(AI) Performance Engineer** | profiling 與 kernel 級優化：nsight、roofline、kernel fusion、編譯器 | CUDA、Triton（語言）、nsight、kernel | ch02、ch07 | 最遠——方法論同構但工具鏈全新，不建議當第一站 |\n\n讀 JD 的兩個紅綠燈：JD 裡出現 **vLLM、KV cache、TTFT、goodput、DCGM** 這類詞，代表團隊真的在運推論基礎設施（綠燈）；只有「AI/LLM experience」加一堆應用框架（LangChain 類），代表是應用層職位，與本書目標不同（不是不好，是不同賽道）。\n\n**薪資與稀缺度的結構性原因**（理解結構比記數字有用，數字會過期）：這個交集要求三種各需多年養成的能力同時在線——分散式系統工程、效能工程、GPU/ML 領域知識。供給端：三棲的人極少，且生產級 GPU 叢集經驗無法在家完整自學（你租得起一張卡，租不起一千張的故障現場）。需求端：每家把 LLM 放進產品的公司，推論帳單都在爆炸（上面 worked example 的 $56K/月只是一個小產品），會「把帳單降 30%」的人直接對 P&L 說話。截至我能確認的資訊（2026-06），公開薪資調查（levels.fyi 等）顯示 AI infra 相關職位相對同級一般後端有數萬美元級的溢價，且多份招聘調查把 AI infra 技能列為全球最難招的類別——但具體數字隨市場波動，請以你求職當下的 levels.fyi 與實際 offer 為準。\n\n光譜上你的最短路徑：**以 ML Platform Engineer 的既有優勢為跳板，補足 Inference Engineer 的引擎層深度**——這正是本書的章節順序設計，也是 plan.md 的模組順序。\n\n## 技能遷移矩陣：你帶著什麼上路\n\n逐條清點你履歷上的資產。「遷移度」的判準：高 = 方法論與直覺直接可用，換工具即可；中 = 概念同構但需要顯著的新知識；零 = 從零學。\n\n| 你的履歷條目 | AI Infra 對應能力 | 遷移度 | 章節 |\n|---|---|---|---|\n| RDS CPU 尖峰降 40%（profiling-driven：SQL 重排、交易拆分、鎖競爭、批次化） | GPU 效能優化的完整方法論：量測（DCGM/nsight）→ 找瓶頸（roofline 判斷 compute/memory-bound）→ 優化（batching/quantization）→ 數據證明。**同一個故事換了名詞** | **高** | ch02、ch07、ch08、ch14 |\n| K8s CronJobs → SQS → idempotent consumers 結算 pipeline（最終一致性） | K8s controller 的 reconcile loop：desired state vs actual state 的收斂迴圈，本質就是你寫過的 idempotent consumer | **高** | ch04、ch11 |\n| WebSocket + Redis Pub/Sub fan-out（3,200 並發連線、千萬訊息/月） | SSE token streaming：長連線生命週期、斷線語意、backpressure、graceful drain 中的 in-flight streaming 請求 | **高** | ch12、ch15 |\n| k6 / Vegeta 負載測試 | LLM benchmark：TTFT/ITL/goodput、open-loop vs closed-loop、coordinated omission——k6 使用者會秒懂 | **高** | ch14 |\n| FluentBit + Lua 自建 observability pipeline | DCGM exporter + engine `/metrics` + Prometheus/Grafana 的指標 pipeline，設計哲學完全相同 | **高** | ch14 |\n| 多層 cache library（in-memory → S3 → local、graceful degradation） | KV cache offloading 分層（HBM → CPU RAM → NVMe → 物件儲存），同構程度高得驚人 | **高** | ch05 |\n| KrakenD / API Gateway、rate limiting、OAuth | Inference gateway：token-based 限流、admission control、OpenAI-compatible API 設計 | **高** | ch12、ch16 |\n| EKS/ECS/Lambda、Docker、CloudFormation | GPU 叢集的 K8s：物件模型直接複用，但 GPU 資源模型（整數、不可超賣、DRA）要重學 | 中 | ch11 |\n| MySQL/PostgreSQL 鎖、隔離級別、deadlock、partitioning | 引擎 scheduler 的資源競爭直覺：preemption、starvation、head-of-line blocking | 中 | ch06 |\n| Bull / cron-driven job queue | 排程與佇列理論在 batch scheduling 的應用 | 中 | ch06、ch13 |\n\n**零遷移清單**——誠實面對，這些必須從零學，也是本書 Part I 存在的理由：\n\n1. **GPU 硬體**：SM、HBM、NVLink、roofline——你從沒需要管過記憶體頻寬（ch02）。\n2. **Transformer 推論機制**：attention、KV cache 數學、prefill/decode、MoE——所有 ML 術語（ch03）。\n3. **Python 與 Go 生態**：你是 TS 工程師；AI infra 的 glue code 是 Python 的天下、K8s 控制面是 Go 的天下（ch04）。\n4. **PyTorch 讀碼能力**：tensor、shape、dtype——目標是讀懂 vLLM 原始碼，不是訓練模型（ch04）。\n5. **CUDA 生態名詞**：CUDA/cuDNN/NCCL/Triton——多半在讀 stack trace 與版本相容矩陣時遇到（ch04）。\n6. **數值精度與 quantization**：FP16/BF16/FP8/FP4，後端工程師從未需要關心的維度（ch07）。\n\n注意比例：高遷移 7 條、中遷移 3 條、零遷移 6 項。你不是從零開始，你是帶著一支大致完整的軍隊，去打一張沒見過的地圖。\n\n## 怎麼讀這本書\n\n### 三條路線\n\n**完整路線（建議，3–6 個月）**：ch01 → ch18 順讀。Part I（ch01–04）是地基，Part II（ch05–08）是引擎機制，Part III（ch09–10）是分散式，Part IV（ch11–13）是你的主場延伸，Part V（ch14–16）是維運與成本，Part VI（ch17–18）是前沿與職涯。每章的「動手做」不要跳過——本書的實驗總預算（租 GPU 部分）控制在 $60–110，相當於一次面試來回的車錢。\n\n**求職速通路線（6–8 週）**：ch01 → ch03（KV 數學，所有面試的地基）→ ch02（roofline）→ ch04（只讀 Python 段）→ ch05、ch06（面試口頭題的核心：PagedAttention 與 continuous batching）→ ch08（部署實戰，做出作品集核心專案）→ ch11（你的主場，差異化優勢）→ ch13（容量規劃，系統設計面試的骨架）→ ch14 → ch18。第一輪略過 ch07/ch09/ch10/ch16/ch17，面試前再補。\n\n**面試前複習路線（3 天）**：ch03 的 KV worked example（會被問，要能白板推導）→ ch06 的 batching 取捨 → ch08 的參數表 → ch12 的參考架構圖 → ch13 的容量規劃 worked example → ch15 的故障目錄 → ch18 的 45 分鐘系統設計完整示範 → 附錄 C 速查表。\n\n### 與 plan.md 的對應\n\n如果你同時在執行那份轉職計劃書，本書與它的模組對應如下：\n\n| plan.md 模組 | 本書章節 | 旗艦專案對應 |\n|---|---|---|\n| 模組一：基礎與語言橋接 | ch03、ch04（+ 本章動手做的 Ollama 初體驗） | — |\n| 模組二：編排/排程模擬層 ★ | ch11、ch12、ch14（模擬叢集系列 lab） | 旗艦專案①（KWOK + fake-gpu-operator + llm-d-inference-sim） |\n| 模組三：效能建模與優化思維 | ch02、ch06、ch07、ch13 | 旗艦專案②（配置權衡研究） |\n| 模組四：真 GPU 與真 vLLM ★ | ch05–ch08 | 旗艦專案③（vLLM 部署 + benchmark + 調參閉環，見 ch08 lab） |\n| 模組五：分散式與生產級深度 | ch09、ch10、ch12、ch15、ch16 | 旗艦專案④（多模型/多節點平台） |\n| 模組六：作品集與求職 | ch17、ch18 | 作品集整合與面試 |\n\nplan.md 的「概念螺旋」設計與本書一致：KV cache 會在 ch03（數學）、ch05（管理）、ch10（路由）、ch13（容量訊號）、ch16（成本）以遞增的 altitude 反覆出現。每次回訪要能說出「這次深在哪」。\n\n## 故障模式與防禦\n\n本章的主題是轉職地圖，所以這裡的故障目錄是**轉職本身**會怎麼壞。每一條都是真實會發生的路徑：\n\n| 故障模式 | 症狀 | 怎麼觀測到 | 防禦 |\n|---|---|---|---|\n| **從 CUDA kernel 開始學** | 三個月還在寫 matrix multiply，JD 上的東西一項沒碰 | 學習筆記全是數學，沒有一個能跑的服務 | 推論工程師 90% 的工作在 kernel 之上。kernel 是光譜最遠端（見職位表），等有明確需要再深入。plan.md 第八節同此判斷 |\n| **只會跑 demo** | `ollama run` 跑通就覺得會了；面試被問「vLLM 為什麼快」答不出機制 | 說得出工具名，說不出它解什麼系統問題 | 每碰一個工具強制回答三問：解什麼問題、什麼時候會壞、怎麼觀測。本書每章的結構就是這三問 |\n| **作品集做成 chatbot** | 花兩個月做了個 RAG 應用，被歸類為 AI application engineer | 專案 README 裡沒有任何 TTFT/吞吐/成本數字 | infra 作品的辨識特徵是**量化的系統指標**。套用你「降 RDS CPU 40%」的敘事模板：量測→診斷→優化→數據（見 ch18） |\n| **背參數而不是學機制** | 熟記 vLLM 0.22 的參數表，下一版全作廢 | 版本升級後無法解釋行為差異 | vLLM 每 2–3 週發一版（2026-06）。正文學機制、註腳記版本；追 release notes 的迴圈見 ch18 |\n| **用 CPU 直覺做容量判斷** | 「算力夠就夠了」→ 規劃出 2 張卡扛 1,000 並發的方案 | 本章 worked example 的第一步就是這個錯誤的示範 | 先過 ch02 roofline 與 ch03 KV 數學，再談容量。記住：先算記憶體，再算算力 |\n| **雲 GPU 帳單失控** | 忘了關 instance，一夜燒掉一週預算 | 信用卡帳單 | 紀律：用完即關、設預算警報、能用模擬就不開卡（plan.md 的「模擬優先」原則；具體流程見 ch08） |\n| **被新聞流淹沒** | 每天追模型發布，半年後發現一行 code 沒寫 | 收藏夾很滿，GitHub 很空 | 模型會過期，系統不變量不會（roofline、排程理論、容量數學）。每週固定 30 分鐘看 release notes，其餘時間寫東西（見 ch18） |\n\n## 動手做\n\n### Lab 1：你自己的技能遷移矩陣 **[紙上推演]**\n\n別直接用本章的表——那是作者的履歷。自己做一遍，這個產出在 ch18 改履歷時直接複用。\n\n1. 列出你履歷上 8–10 條最有份量的經驗（系統、優化、事故、工具）。\n2. 對每一條回答三個問題：（a）這條經驗的**本質**是什麼系統問題？（剝掉工具名詞，例如「FluentBit pipeline」的本質是「從高噪音資料流萃取結構化指標」）；（b）GPU 推論世界裡哪裡有**同構**的問題？（翻本章的分層表找）；（c）工具換成什麼？\n3. 標遷移度（高/中/零），把「零」的部分按本書章節排成學習順序。\n4. **成功標準**：產出一頁表格，且每條「高遷移」都能講出一個具體的同構點。講不出具體對應、只能說「都是後端」的，誠實降級為「中」。\n\n### Lab 2：第一次接觸——Ollama + SSE streaming 觀察 **[M1]**\n\n目標：在自己的機器上跑起一個模型，親手量到 TTFT 與 ITL，摸到 prefill/decode 的體感差異。這是全書所有 benchmark 工作的第一塊磚。\n\n```bash\n# 1. 安裝與啟動（macOS）\nbrew install ollama\nollama serve &                 # 預設聽 :11434\n\n# 2. 拉一個 3–4B 級模型（M1 16GB 跑得動；模型名以你執行當下的 ollama library 為準）\nollama pull llama3.2:3b\n\n# 3. 先用 curl 看 SSE 的原始形狀（-N 關閉緩衝）\ncurl -N http://localhost:11434/v1/chat/completions \\\n  -H \"content-type: application/json\" \\\n  -d '{\"model\":\"llama3.2:3b\",\"stream\":true,\n       \"messages\":[{\"role\":\"user\",\"content\":\"用三句話解釋 KV cache\"}]}'\n```\n\n觀察輸出：一行一個 `data: {...}` 的 SSE chunk，每個 chunk 帶一小段文字——這就是 token streaming 的線上形狀，你的 WebSocket 經驗的近親（差異：單向、HTTP 原生、proxy 友善，見 ch12）。\n\n接著用你的主場語言量化它（示意碼，Node 20+，零相依）：\n\n```js\n// ttft.mjs — 量 TTFT 與 ITL\nconst t0 = performance.now();\nconst res = await fetch(\"http://localhost:11434/v1/chat/completions\", {\n  method: \"POST\",\n  headers: { \"content-type\": \"application/json\" },\n  body: JSON.stringify({\n    model: \"llama3.2:3b\",\n    stream: true,\n    messages: [{ role: \"user\", content: \"用三句話解釋 KV cache\" }],\n  }),\n});\nif (!res.ok || !res.body) throw new Error(`HTTP ${res.status}`);\nlet last = 0, ttft = null;\nconst gaps = [];\nfor await (const _chunk of res.body) {\n  const now = performance.now();\n  if (ttft === null) ttft = now - t0;\n  else gaps.push(now - last);\n  last = now;\n}\ngaps.sort((a, b) => a - b);\nconst p = (q) => gaps[Math.floor(q * (gaps.length - 1))]?.toFixed(1);\nconsole.log(`TTFT ${ttft?.toFixed(0)} ms | chunks ${gaps.length + 1}`);\nconsole.log(`ITL p50 ${p(0.5)} ms | p95 ${p(0.95)} ms | p99 ${p(0.99)} ms`);\n```\n\n（註：一個 HTTP chunk 不嚴格等於一個 token——本機環境下接近 1:1，但經過 proxy 或網路就不可靠了；嚴謹的量法見 ch14。）\n\n實驗序列與**預期觀察**：\n\n1. **跑第一次**：TTFT 可能高達數秒——因為 Ollama 在第一個請求時才把權重載入記憶體。恭喜，你遇到了人生第一次 **cold start**（分鐘級冷啟動的迷你版，見 ch12）。\n2. **立刻跑第二次**：TTFT 掉到百 ms 級。權重已常駐，這次量到的才是真的 prefill 時間。\n3. **換長 prompt**：把一段 2,000 字的文章貼進 `content` 再跑。觀察：**TTFT 顯著變長**（prefill 的工作量隨 prompt 長度線性以上成長），但 **ITL 幾乎不變**（decode 每步的工作量由模型大小決定，與 prompt 長度關係小——在這個量級下）。你剛親手量到了 prefill/decode 兩階段的分野，ch03 會解釋背後的數學。\n4. **同時跑兩個**：開兩個終端機同時執行，觀察 ITL 變化——這是你對 batching 與資源競爭的第一次觀察（見 ch06）。\n\n**成功標準**：能用自己量到的數字回答——TTFT 與 ITL 各是什麼、prompt 變長時哪個變慢、為什麼第一次請求特別慢。三題都能不看書回答，這個 lab 才算完成。\n\n**故障排除**（Murphy 條款）：`connection refused` → `ollama serve` 沒起來或 port 被占；下載極慢或模型跑起來機器卡死 → 模型太大掉進 swap，換更小的模型；M1 8GB 機型建議用 1–2B 級模型。\n\n## 自我檢核\n\n答得出來才算過關。這些問題對齊真實面試的 screening 深度：\n\n1. 不看書，畫出 LLM serving 的技術棧分層圖（至少六層），每層舉一個代表工具，並標出你目前最強與最弱的層。\n2. 用兩分鐘向一位後端同事解釋：為什麼 10K CCU 的遊戲後端 20 台 c5.xlarge 就扛住，10K 並發 chat 卻要約 30 張 H100？（必須講到 KV cache 容量與 memory bandwidth，只講「模型很大」不及格。）\n3. prefill 與 decode 各受限於什麼資源？TTFT 與 ITL 各對應哪個階段？\n4. 為什麼 K8s 上 CPU 可以超賣而 GPU 不行？這對叢集利用率意味著什麼？（粗略即可，細節在 ch11。）\n5. 為什麼 LLM 流量的負載均衡不能用 round-robin 或連線數？（提示：請求成本變異 + 有狀態。）\n6. 「冷啟動分鐘級、流量尖峰秒級」這對矛盾，會迫使 autoscaling 設計做出什麼妥協？（方向對即可，細節在 ch13。）\n7. 一句話複述全書三條主軸，並對每一條舉出本章 worked example 裡的一個對應數字或情節。\n8. 五種職位光譜中，哪一種與你的履歷重疊最高？你的「零遷移清單」前三項是什麼？\n\n## 延伸閱讀\n\n- [Transformer Inference Arithmetic — kipply's blog](https://kipp.ly/transformer-inference-arithmetic/)：2022 年的文章但仍是入門推論效能直覺的最佳單篇，本章「算力帳 vs 記憶體帳」的思路源頭之一，ch02/ch03 的預習。\n- [LLM Inference Performance Engineering: Best Practices — Databricks](https://www.databricks.com/blog/llm-inference-performance-engineering-best-practices)：用生產視角講 TTFT/TPOT、prefill/decode 與量化取捨，與本書方法論同調。\n- [Efficient Memory Management for Large Language Model Serving with PagedAttention（vLLM 論文，arXiv:2309.06180）](https://arxiv.org/abs/2309.06180)：現代推論引擎的奠基論文；現在只需讀 abstract 與 introduction，ch05 會深入。\n- [Mooncake: A KVCache-centric Disaggregated Architecture for LLM Serving（arXiv:2407.00079）](https://arxiv.org/abs/2407.00079)：Kimi 的生產架構論文，「LLM serving 是 memory 的生意」最有力的工業界證據，ch10 的主角之一。\n- [a16z × OpenRouter — State of AI: 100 Trillion Token Study](https://a16z.com/state-of-ai/)：對 2025–2026 推論流量結構（agentic、reasoning）最好的公開實證，理解「需求面為什麼長這樣」。\n- [llm-d 官方 blog](https://llm-d.ai/blog)：K8s 原生推論平台的第一手工程敘事，平台層往哪走的風向標（ch10/ch12 的主角之一）。\n- [levels.fyi — ML/AI Software Engineer](https://www.levels.fyi/t/software-engineer/focus/ml-ai)：求職前校準薪資預期用；數字隨市場波動，看相對溢價結構即可。\n- [Ollama OpenAI compatibility 文件](https://github.com/ollama/ollama/blob/main/docs/openai.md)：Lab 2 用到的 API 介面說明（未驗證最新路徑，以 repo 當下文件為準）。\n"}, {"id": "ch02-gpu-architecture", "file": "ch02-gpu-architecture.md", "group": "Part I — 心智模型與基礎", "title": "ch02 — GPU：一種你沒用過的計算機", "md": "# ch02 — GPU：一種你沒用過的計算機\n\n> **本章解決什麼問題**：你接下來整本書要打交道的機器，物理特性跟你熟的 EC2 完全不同。這章建立 GPU 的系統工程師心智模型——不是教你寫 CUDA（那是 ch04 的事），而是讓你能讀懂規格表、用 roofline 一條公式判斷 workload 卡在算力還是記憶體、講得出 2026 年資料中心層級的硬體版圖。ch03 會用這章的 roofline 證明「decode 是 memory-bound」這個全書反覆引用的結論；ch09 的平行化決策、ch13 的容量規劃、ch16 的成本模型，地基全在這裡。\n\n## 從你已知的出發\n\n你做過一件事，方法論跟這章完全同構：把 RDS CPU 尖峰降 40% 之前，你第一步不是改 SQL，而是先用 profiling 確認瓶頸到底在 CPU、在 IO、還是在鎖競爭——瓶頸判斷錯了，後面所有優化都是白工。Roofline model 就是把這個判斷變成一條可以**事先用紙筆算出來**的公式：不用先部署、先壓測，看著規格表就能算出「這個 workload 在這張卡上，天花板是算力還是記憶體頻寬」。這是本章要交給你的最重要工具。\n\n另外三個錨點：\n\n- **GPU 的執行模型 ≈ 一個超大規模 worker pool**。你管過 10K CCU 的遊戲後端：幾十台機器、每台幾百個並發連線，靠的不是單一 worker 快，而是夠多 worker 同時在飛、誰被 IO 卡住就先處理別人。GPU 把這個模式燒進矽片：一張 H100 上常駐**二十幾萬條硬體執行緒**，誰在等記憶體就瞬間切走，用海量並發把延遲「藏」起來。\n- **GPU 記憶體階層 ≈ 你的 local cache → Redis → RDS 分層**。每往下一層，容量漲三個數量級、速度掉一個數量級，而你的工作跟以前一樣：讓熱資料留在快的那層。差別是這裡的「慢層」HBM 都有 3.35 TB/s——是你用過最快的 RAM 的幾十倍——而它仍然是瓶頸。\n- **互連拓撲 ≈ 同 AZ vs 跨 AZ vs 跨 region**。你知道跨 AZ 的延遲與費用會改變架構決策；GPU 世界同理，節點內 NVLink 與節點間 InfiniBand 差了一個數量級，這條斷層線直接決定模型怎麼切（ch09 的全部內容建立在這上面）。\n\n最後一個心理準備：GPU 是**裸露的實體資產**。EC2 給你的抽象層（hypervisor 把壞硬體藏起來、可超賣、秒級替換）在這裡大部分不存在。卡會掉、記憶體會翻位元、散熱不良會讓它無聲變慢。本章最後一節先給你故障目錄的入門版，ch15 再展開完整的可靠性工程。\n\n## GPU vs CPU：latency machine 與 throughput machine\n\nCPU 是 **latency machine**：它的設計目標是讓「單一指令流」越快越好。一顆現代伺服器 CPU 把大部分電晶體花在讓你看不見的地方——分支預測、亂序執行、多層大快取——全是為了讓單執行緒少等待。所以幾十個核心、每個都很聰明。\n\nGPU 是 **throughput machine**：它賭的是你的問題可以被切成數十萬個一模一樣的小工作（矩陣乘法正是如此）。它把電晶體全部押在「更多算術單元」上，砍掉分支預測與亂序執行，用一個簡單粗暴的策略對付記憶體延遲：**等待的時候去做別人的工作**。\n\n具體的硬體分層（以 H100 SXM 為例，2026-06 查證）：\n\n- **SM（Streaming Multiprocessor）**：GPU 的基本執行單元，H100 有 132 個。粗略類比：一個 SM ≈ 一個自帶排程器、自帶 scratch 記憶體的小型多核處理器。\n- **Warp**：32 條執行緒一組，**鎖步執行同一條指令**（SIMT，Single Instruction Multiple Threads）。warp 是排程的最小單位——你可以想成「一個 worker 一次處理一批 32 筆的 batch job，批內每筆走同樣的程式路徑」。\n- **Latency hiding**：每個 SM 上可以同時「常駐」最多 64 個 warp（2,048 條執行緒），132 個 SM 合計約 27 萬條常駐執行緒。某個 warp 發出記憶體請求要等幾百個 cycle？SM 的 warp scheduler **下一個 cycle 就切去跑別的 warp**，切換成本是零——因為每個 warp 的暫存器都常駐在 SM 上，不像 OS context switch 要存還現場。\n\n這就是你的 event loop 直覺的硬體版：Node.js 用單執行緒 + 非同步 IO 把等待藏進並發；GPU 用上萬個硬體執行緒做同一件事，只是排程器是矽做的、切換是零成本的。推論一個系統含意：**GPU 要餵飽才快**。並發不足（batch 太小、kernel 太碎）時，SM 大部分時間找不到可跑的 warp，幾百 TFLOPS 的算力直接閒置——這是 ch06 batching 與 ch07 CUDA Graphs 要解的問題的物理根源。\n\n量級感：H100 的 BF16 tensor core 算力是 989 TFLOPS（dense）；你以前用的 c5 系列一顆 vCPU 是 GFLOPS 等級——中間差了五個數量級。但這個算力有個前提條件，下一節就會看到：資料要供得上。\n\n## 記憶體階層：先建立數字感\n\nLLM serving 本質上是 memory 的生意（全書主軸一），所以這張表比算力數字重要得多。以 H100 SXM 為例（2026-06）：\n\n| 層級 | 容量 | 頻寬量級 | 誰負責管理 |\n|---|---|---|---|\n| Registers | 每 SM 256 KB（全卡 ≈ 33 MB） | 約百 TB/s 級（聚合） | 編譯器 |\n| Shared memory / L1 | 每 SM 256 KB（SMEM 最高可配 228 KB） | 數十 TB/s 級（聚合） | kernel 作者（ch07） |\n| L2 cache | 50 MB（全卡共享） | 約 10 TB/s 級 | 硬體 |\n| **HBM3（顯示記憶體）** | **80 GB** | **3.35 TB/s** | 推論引擎與你 |\n| 主機 DRAM | TB 級 | 受 PCIe Gen5 限制：~64 GB/s 單向 | OS |\n| NVMe / 網路儲存 | 數 TB 起 | 數~十數 GB/s | OS |\n\n（晶片內各層頻寬是微基準測量值，不同來源略有出入，這裡只取量級；HBM 頻寬是官方規格。）\n\n三個必須內化的觀察：\n\n1. **每往上一層，頻寬漲約一個數量級，容量掉約三個數量級。** 你在 local cache / Redis / RDS 之間做過的所有取捨，這裡原樣成立，只是時間尺度從 ms 縮到 ns。\n2. **模型權重只裝得進 HBM 這一層。** 70 GB 的權重對 50 MB 的 L2 來說大到沒有快取意義——每次用到都得從 HBM 重讀。所以「HBM 頻寬」幾乎就是 LLM decode 的代名詞（下一節證明）。\n3. **PCIe 是斷崖。** HBM 內部 3.35 TB/s，但跨過 PCIe 到主機 RAM 瞬間掉到約 64 GB/s 單向——差 50 倍。這就是為什麼 KV cache offloading（ch05）、權重載入（ch12）的設計都圍繞著「怎麼少過、晚過這道橋」。\n\n一個常見誤解先拆掉：HBM（High Bandwidth Memory）不是普通 GDDR 顯示記憶體，它是用 3D 堆疊直接封裝在 GPU 旁邊的 DRAM，靠超寬匯流排（H100 是 5120-bit）換頻寬。它貴、產能緊張，而且**容量與頻寬是 GPU 定價的真正主成分**——你會在硬體版圖表看到，2024–2026 每一代新卡的頭條規格都是 HBM，不是 TFLOPS。\n\n## Roofline model：一條公式判斷瓶頸\n\n現在把本章最重要的分析工具裝上。問題形式是：「給定一張卡和一個 workload，效能天花板由算力決定，還是由記憶體頻寬決定？」\n\n定義 **arithmetic intensity（AI，運算強度）**：\n\n```\nAI = 這個 workload 做的 FLOPs ÷ 它必須從 HBM 搬的 bytes    （單位：FLOP/byte）\n```\n\n（FLOP = 一次浮點運算；一次乘加 FMA 算 2 FLOPs。）\n\n一張卡有兩個天花板：算力屋頂 `P_peak`（TFLOPS）與頻寬屋頂 `BW`（TB/s）。可達到的效能是：\n\n```\n可達效能 = min( P_peak ,  AI × BW )\n```\n\n兩條屋頂的交點叫 **ridge point（拐點）**：\n\n```\n拐點 = P_peak ÷ BW    （FLOP/byte）\n```\n\n- workload 的 AI **小於**拐點 → **memory-bound**：算力再強也吃不飽，效能 = AI × BW，唯一解法是搬更少 bytes 或買更大頻寬。\n- AI **大於**拐點 → **compute-bound**：頻寬有餘裕，效能貼著算力屋頂，解法是更多/更快的算術單元或更低精度。\n\n把 2026 年常見卡的拐點算出來（dense 算力，2026-06 查證）：\n\n| 卡 | 算力（dense） | HBM 頻寬 | 拐點 |\n|---|---|---|---|\n| H100 SXM | BF16 989 TFLOPS | 3.35 TB/s | ~295 FLOP/byte |\n| H100 SXM | FP8 1,979 TFLOPS | 3.35 TB/s | ~590 FLOP/byte |\n| H200 | BF16 989 TFLOPS | 4.8 TB/s | ~206 FLOP/byte |\n| B200 | FP8 4,500 TFLOPS | 8 TB/s | ~562 FLOP/byte |\n\n讀規格表的兩個防雷技巧：（1）NVIDIA 行銷頁預設引用「with sparsity」的數字（剛好是 dense 的兩倍，例如 H100 BF16 寫 1,979），LLM 推論用不到結構化稀疏，**一律看 dense**；（2）凡是頻寬數字都先問「單向還是雙向加總」——NVLink 的 900 GB/s 是雙向加總，IB 的 400 Gb/s 是單向，直接相除會錯一倍。\n\n### Worked example：證明 Llama-70B 在 H100 上 decode 是 memory-bound\n\n這是全書會反覆回來的計算，一步步走。\n\n**第 0 步：設定。** Llama-3.3-70B，實際參數量約 70.6B，是 dense 模型（每個 token 用到全部參數）。H100 SXM：80 GB HBM3、3.35 TB/s、FP8 dense 1,979 TFLOPS。\n\n**第 1 步：權重裝不裝得下？**\n\n```\nFP16/BF16：70.6B × 2 bytes = 141.2 GB  → 80 GB 裝不下，需要 2 張卡（TP2，見 ch09）\nFP8：     70.6B × 1 byte  =  70.6 GB  → 單卡裝得下，但只剩不到 10 GB 給 KV cache 與 activation\n```\n\n（FP8 單卡在生產上太緊——KV cache 空間決定你能同時服務幾條對話（見 ch03）——但作為計算案例最乾淨，先用它。）\n\n**第 2 步：decode 一個 token 要搬多少 bytes？** Decode 階段每生成一個 token，都要把**整個模型的權重從 HBM 讀進 SM 一次**。為什麼快取救不了：L2 只有 50 MB，對 70.6 GB 的權重而言命中率趨近於零，每一層算完、下一層的權重一定來自 HBM。所以 batch=1 時：\n\n```\nbytes ≈ 70.6 GB（權重，FP8）＋ KV cache 讀取（暫時忽略，ch03 補上，它只會讓結論更 memory-bound）\n```\n\n**第 3 步：decode 一個 token 要算多少 FLOPs？** 經驗法則：dense transformer 每個參數每個 token 貢獻一次乘加 = 2 FLOPs：\n\n```\nFLOPs ≈ 2 × 70.6B = 141.2 GFLOP\n```\n\n**第 4 步：arithmetic intensity。**\n\n```\nAI = 141.2 GFLOP ÷ 70.6 GB = 2 FLOP/byte\n```\n\n**第 5 步：跟拐點比。** H100 FP8 拐點 ≈ 590 FLOP/byte。\n\n```\n2 ≪ 590 → 重度 memory-bound，差了約 300 倍\n```\n\n換句話說：batch=1 decode 時，H100 的 tensor core 利用率上限是 2/590 ≈ **0.3%**。你花的是 1,979 TFLOPS 的錢，用到的算力連 1% 都不到——瓶頸從頭到尾是那條 3.35 TB/s 的記憶體匯流排。\n\n**第 6 步：理論 token rate 上限。** 既然是 memory-bound，效能由「搬完一輪權重要多久」決定：\n\n```\n單請求 decode 上限 = 3.35 TB/s ÷ 70.6 GB ≈ 47 tokens/s\n```\n\n**第 7 步：現實折扣。** 實際系統的 memory bandwidth utilization（MBU）通常落在 60–80%（kernel 不完美、KV 讀取、排程開銷），所以實測單請求 decode 大約 30–38 tok/s。公開的 H100 70B 單請求 benchmark 數字落在這個區間，與推算一致——這條公式可以當 sanity check 用：**看到有人宣稱單請求 70B FP8 在 H100 上跑 100 tok/s，你現在有能力直接斷定那是假的（或不是這個配置）。**\n\n**第 8 步：FP16 + TP2 對照。** 141.2 GB 權重切到 2 張卡上，聚合頻寬 6.7 TB/s：\n\n```\n6.7 TB/s ÷ 141.2 GB ≈ 47 tokens/s（忽略卡間通訊開銷，實際更低）\n```\n\n跟 FP8 單卡**一樣**。加卡沒有改變單請求的天花板（頻寬×2、bytes 也×2），但 FP8 用一半的卡達到同樣速度——**量化是 memory-bound 世界的頭等優化**（ch07 展開）。\n\n**第 9 步：batch 為什麼是免費的午餐（直到不是）。** batch=B 時，權重照樣只讀一輪，卻服務了 B 個 token：\n\n```\nAI ≈ 2B FLOP/byte → 吞吐近似 B × 47 tok/s，直到 AI 撞上拐點\n```\n\n理論上 B≈295 時撞 compute 屋頂；實際上 KV cache 的容量與讀取量會先撞牆（ch03/ch05/ch06 的主題）。但方向已經清楚了：**decode 幾乎永遠活在 roofline 的左半邊**，所有推論引擎的設計——continuous batching、PagedAttention、KV 量化——都是在這個物理事實下討生活。\n\n反過來，prefill 階段一次處理整條 prompt 的 n 個 token，權重讀一輪攤提給 n 個 token，AI ≈ 2n FLOP/byte，n 上千時穩穩 compute-bound。一個請求的兩個階段分別貼著 roofline 的兩條屋頂——這個分裂是 ch06 chunked prefill 與 ch10 P/D 分離的全部動機。完整數學在 ch03。\n\n## Tensor cores 與數值格式：精度是一個可以調的旋鈕\n\nTensor core 是 SM 裡的專用矩陣乘法單元：一般 CUDA core 一個 cycle 做一次標量 FMA，tensor core 一個 cycle 吃掉一小塊矩陣乘加。LLM 推論 95% 以上的 FLOPs 都發生在 tensor core 上。\n\n關鍵的系統特性：**精度每砍半，tensor core 吞吐量翻倍，權重 bytes 減半**。對 memory-bound 的 decode 來說這是雙重收益——屋頂變高、要搬的東西變少——所以數值格式不是 ML 研究員的玄學，是你做容量與成本規劃的一級變數。\n\n硬體支援是有代際門檻的（2026-06）：\n\n| 格式 | bits | 一句話定位 | 原生硬體支援 |\n|---|---|---|---|\n| FP32 / TF32 | 32 / 19 | 傳統科學計算；TF32 是 tensor core 上的折衷 | 全部 / Ampere+ |\n| FP16 | 16 | 最早的推論主流 | Volta+ |\n| BF16 | 16 | 動態範圍同 FP32，訓練與推論通用預設 | Ampere+ |\n| FP8（E4M3/E5M2） | 8 | Hopper 世代推論主力，生產上已完全成熟 | Hopper、Ada+ |\n| FP4（NVFP4）/ FP6 | 4 / 6 | Blackwell 專屬硬體格式 | **Blackwell only** |\n| MXFP4 | 4 | OCP 開放 microscaling 格式（gpt-oss 權重原生採用） | Blackwell（硬體加速） |\n| INT8 / INT4 | 8 / 4 | weight-only 量化路線（GPTQ/AWQ） | Turing+ / 軟體解包 |\n\n實務含意三條：\n\n- **你選的卡決定你能用的格式。** 在 H100 上想跑 FP4？沒有原生硬體，要嘛軟體模擬（慢），要嘛換 Blackwell。反過來，2026 年模型開始**原生以低精度發布**（gpt-oss 用 MXFP4、Kimi K2.6 原生 INT4，2026-06），買卡時的格式支援直接決定你能不能吃到這些模型的紅利。\n- **FP8 是 2026 年 Hopper 機隊的生產預設**：vLLM/SGLang/TensorRT-LLM 全面支援，DeepSeek 等旗艦模型直接以 FP8 訓練（2026-06）。\n- 低精度的品質代價、calibration、哪些任務先壞——是 ch07 的主題，這裡只記住：格式選擇是「吞吐 × 品質 × 硬體相容」的三方取捨，不是越低越好。\n\n## 互連：三層網路，一個數量級的斷層\n\n一座 GPU 叢集裡其實有三張網：\n\n```\n一台 8×H100 節點的三張網\n├── scale-up：GPU0…GPU7 全接上 NVSwitch（節點內 all-to-all）\n│       NVLink 4：每卡 900 GB/s 雙向（450 GB/s 每方向）\n├── 節點內骨幹：PCIe Gen5 x16，~64 GB/s 每方向（GPU 到 CPU / NIC）\n├── scale-out：每卡一張 400G NIC ──► RDMA 網（IB NDR：50 GB/s 每方向）\n└── frontend：一般乙太網（儲存、管理、使用者流量）\n```\n\n**Scale-up：NVLink / NVSwitch。** NVLink 是 GPU 對 GPU 的專用點對點互連；NVSwitch 是交換晶片，讓節點內 8 張卡兩兩之間都有全頻寬。代際數字（2026-06 查證）：\n\n| 世代 | 架構 | 每卡頻寬（雙向加總） |\n|---|---|---|\n| NVLink 3 | Ampere（A100） | 600 GB/s |\n| NVLink 4 | Hopper（H100/H200） | 900 GB/s |\n| NVLink 5 | Blackwell（B200/B300） | 1.8 TB/s |\n| NVLink 6 | Rubin（2026 H2 起） | 預告再翻倍（付印前查證） |\n\n**Scale-out：InfiniBand vs RoCE。** 跨節點走 RDMA 網路。IB 世代：HDR 200 Gb/s → NDR 400 Gb/s → XDR 800 Gb/s（Quantum-X800 世代）；標準 HGX H100 每卡配一張 400G NIC，即每 GPU 50 GB/s 單向。RoCE（RDMA over Converged Ethernet）用乙太網跑 RDMA：便宜、供應商中立、你的網路團隊熟，但要把尾延遲調到 IB 水準（PFC/ECN 調校）是真功夫；NVIDIA 自家的 Spectrum-X 與業界的 Ultra Ethernet 聯盟都在押「乙太網追平 IB」這條線。粗略決策：自建中小叢集、已有強乙太網運維 → RoCE 可省可觀成本；租用時你沒得選，看雲商給什麼。\n\n**斷層線就是架構線。** 節點內 NVLink 450 GB/s 每方向 vs 跨節點 IB 50 GB/s 每方向——**9 倍**；對比 PCIe 64 GB/s 也有 7 倍。這個數量級差距就是 ch09 那條鐵律的物理來源：tensor parallelism 的高頻 all-reduce 流量幾乎只能活在 NVLink 域內，跨節點只跑低頻寬需求的平行模式（PP/DP/EP）。\n\n**NVL72：把 NVLink 域撐到一整個機櫃。** GB200 NVL72 是 2026 年的標誌性設計：72 張 B200 + 36 顆 Grace CPU 裝進一個機櫃，用 NVSwitch tray 與銅纜背板把 **72 張卡接成單一 NVLink 域**（聚合 130 TB/s）。意義：以前「高速互連域 = 8 卡」是硬上限，現在是 72 卡——萬億參數 MoE 模型的 expert parallelism 可以整櫃展開（ch09、ch17），rack 取代 server 成為採購與設計的基本單位。代價在下一節。\n\n## 資料中心現實：功耗、散熱、電力牆\n\n每卡功耗的軌跡（2026-06）：V100 300W → A100 400W → H100 700W → B200 約 1,000–1,200W（依機型）→ B300 / AMD MI355X 1,400W。五年漲了 4 倍，還在漲。\n\n連鎖反應：\n\n- **機櫃密度爆炸**：傳統企業機房一櫃 5–15 kW；一台 8×H100 伺服器就吃 10–12 kW；GB200 NVL72 一櫃約 120 kW（公開部署資料約 120–132 kW，2026-06）。\n- **氣冷到頭了**：氣冷實務上限約 40–50 kW/櫃，NVL72 世代直接要求 direct-to-chip 液冷。這不是機房團隊的家務事——液冷改造的資本支出與交期，是 2026 年「有卡但上不了架」的常見原因之一。\n- **電力成為一級約束**：一張 H100 跑滿一年 ≈ 6.1 MWh（含散熱更多）。新建資料中心以 GW 計，電網接入排隊以年計。業界共識是：2026 之後限制 AI 算力擴張的第一瓶頸不是晶片產能而是電力（ch17 展開，包括 power-aware scheduling 可能成為 infra 工程師的新工作面）。\n\n對你這個層級的直接含意有一條，常被忽略：**功耗上限會回頭吃效能**。資料中心做 power capping、或散熱不良時，GPU 會自動降頻——症狀是 tok/s 無聲下滑、沒有任何錯誤。你在租用市場（尤其 Vast.ai 這類聚合個人機房的平台）拿到的「同型號卡」，實際效能可能因散熱環境差 10–20%。Benchmark 時記得把 `nvidia-smi` 的時脈與 throttle 原因一起記下來（ch14）。\n\n## 硬體版圖總表（2026-06）\n\n| 晶片 / 系統 | 記憶體 | 頻寬 | 一句話定位 |\n|---|---|---|---|\n| NVIDIA H100（80GB） | 80 GB HBM3 | 3.35 TB/s | 2026 租用市場的工作馬，生態最成熟、單價已被新卡壓低 |\n| NVIDIA H200 | 141 GB HBM3e | 4.8 TB/s | 算力同 H100、記憶體大幅升級——專為推論/長 context 而生 |\n| NVIDIA B200（Blackwell） | 192 GB HBM3e | 8 TB/s | 2026 主力雲端機型；FP4 原生支援 |\n| NVIDIA GB200 NVL72 | 72×B200 整櫃 | NVLink 域聚合 130 TB/s | rack-scale 設計單位；大 MoE serving 的目標平台 |\n| NVIDIA B300 / GB300 NVL72 | 288 GB HBM3e | 8 TB/s | Blackwell Ultra，1,400W、15 PFLOPS dense FP4；2026 放量 |\n| AMD MI300X | 192 GB HBM3 | 5.3 TB/s | 「單卡大記憶體」先行者；ROCm 生態仍是採用門檻 |\n| AMD MI355X | 288 GB HBM3e | 8 TB/s | 規格對齊 Blackwell；vLLM/SGLang/LMCache 已支援 ROCm |\n| Google TPU v7（Ironwood） | 192 GB HBM3e | 7.4 TB/s（Google 公布） | 僅 GCP；驅動 Gemini 3 生產推論；Anthropic 計畫用到百萬顆 |\n| AWS Trainium3 | 144 GB HBM3e | 4.9 TB/s | AWS 垂直整合的性價比路線，2.52 PF FP8/晶片 |\n| Groq LPU | 晶片內 SRAM（百 MB 級） | SRAM 等級 | 極端低延遲路線；NVIDIA 以 ~$20B 取得技術授權＋核心團隊（2025-12，非股權收購，Groq 仍獨立營運） |\n| Cerebras WSE-3 | 晶圓級 SRAM（44 GB，廠商數字） | 廠商宣稱 PB/s 級 | wafer-scale；2026-05 完成 Nasdaq IPO（上市估值約 $56B），與 OpenAI 有 $10B+ 算力協議 |\n\n幾條讀表的線索：\n\n- **頭條規格全是記憶體，不是 TFLOPS。** H100→H200 算力一模一樣，只升級 HBM，就足以成為一代「推論神卡」——回到 roofline：decode 的天花板是頻寬，H200 等於把拐點左移、屋頂抬高 43%。整個產業的競價維度已經說明了「LLM serving 是 memory 的生意」。\n- **NVIDIA 的護城河是三層的**：CUDA 軟體生態（ch04）、NVLink/NVSwitch 互連、供應鏈優先權。AMD 在紙面規格上已經追平甚至超越，真正的差距在軟體成熟度與運維工具鏈——不過 2026 年 vLLM/SGLang/llm-d 對 ROCm 的支援已是官方路線（2026-06），「AMD 不能用於 LLM 推論」已經是過時資訊。\n- **Hyperscaler 自研晶片（TPU/Trainium）**的本質是垂直整合省掉 NVIDIA 的毛利，鎖定在自家雲；你會在 JD 裡看到它們，但租用市場的主流仍是 NVIDIA。\n- **SRAM 路線（Groq/Cerebras）**：把整個模型放進晶片內 SRAM，徹底繞開 HBM 瓶頸，換取極端低延遲；代價是容量經濟學困難（SRAM 貴且小，大模型要攤到大量晶片上）。NVIDIA 花 ~$20B 把 Groq 的技術授權與核心團隊納入麾下（2025-12）這件事本身，就是「低延遲推論專用架構有真實市場」的最強背書。\n- 租價量級（2026-06 快照，只記倍率）：H100 在 neocloud 約 $2–3/hr,hyperscaler on-demand 約其 2–4 倍；B200 約 $5–6/hr。絕對數字月級波動，採購策略見 ch16。\n- 下一代已預告（付印前需回查）：NVIDIA Rubin（288 GB HBM4、約 13 TB/s,H2 2026 上雲）、AMD MI400（432 GB HBM4、19.6 TB/s,H2 2026）。\n\n## 故障模式與防禦\n\nGPU 故障是 ch15 的主場，但你需要先有「這東西會怎麼壞」的基本目錄。先記一個入口：**Xid**——NVIDIA driver 寫進 kernel log（`dmesg`）的 GPU 錯誤碼，是 GPU 世界的 errno。\n\n| 故障 | 典型 Xid / 訊號 | 症狀長什麼樣 | 怎麼觀測 | 防禦 |\n|---|---|---|---|---|\n| ECC 單位元錯誤（已修正） | Xid 94（contained）；SBE 計數上升 | 無感，資料已被 ECC 修正 | DCGM 的 ECC 計數器趨勢 | 監控趨勢即可；計數加速上升是壞卡前兆 |\n| ECC 雙位元錯誤（不可修正） | **Xid 48**，伴隨 63/64（row remapping） | 在跑的 process 被殺；反覆發生 | `dmesg`、DCGM、`nvidia-smi -q` 的 retired pages | 自動 cordon + drain 節點（ch11/ch15）；remap 資源用罄→RMA |\n| 掉卡（fallen off the bus） | **Xid 79** | GPU 從 PCIe 上消失，`nvidia-smi` 報 unable to determine device handle | dmesg、node exporter | 重啟主機；重複發生→硬體/電源/散熱問題，換機 |\n| 應用程式記憶體違規 | Xid 13 / 31 | kernel crash，但卡是好的 | dmesg | **別急著 RMA**——這通常是軟體 bug，不是硬體壞；先查引擎版本與 driver 相容性 |\n| NVLink 錯誤 | Xid 74 | TP 組整體變慢或 NCCL 報錯，單卡看不出問題 | DCGM NVLink 計數器 | 多卡推論最痛的一類，偵測與處置見 ch15 |\n| Thermal / power throttling | 無 Xid！時脈下降 | **無聲變慢**:tok/s 下滑、零錯誤 | `nvidia-smi -q -d PERFORMANCE` 的 throttle reasons、DCGM 溫度/時脈 | 把時脈與 throttle 原因納入常規監控；對照同機隊其他卡 |\n\n兩個工程判斷要先建立：\n\n1. **「有 Xid」≠「卡壞了」，「沒 Xid」≠「卡沒事」。** Xid 13/31 多半是你的軟體問題；而 throttling 這種最常見的效能殺手根本不產生錯誤。分類學比恐慌重要。\n2. **規模會把小機率變成日常。** Meta 訓練 Llama 3 405B 時公開的數據：16,384 張 H100、54 天、**419 次非預期中斷**——平均每 3 小時一次，其中約 30% 是 GPU 故障、17% 是 HBM3 故障。粗換算單卡年化故障率約 9–10%。推論叢集比訓練幸運（沒有全域同步，單卡故障的爆炸半徑小），但 64 卡的推論機隊照這個比率，**每個月都會遇到幾次硬體事件**——這不是異常，是常態，你的架構必須把它當輸入條件（ch15）。\n\n你的可觀測性直覺直接遷移：你以前用 FluentBit 從 production log 萃取 API 指標，這裡的對應物是 **DCGM-exporter**（GPU 指標進 Prometheus 的事實標準，2026-06）+ dmesg 裡的 Xid 流。ch14 給完整指標體系。\n\n## 動手做\n\n### Lab 2-1 [紙上推演] 三張卡的 roofline 拐點與 70B decode 上限\n\n給定規格（dense 算力，2026-06）：\n\n| 卡 | BF16 dense | FP8 dense | HBM 頻寬 | HBM 容量 |\n|---|---|---|---|---|\n| H100 SXM | 989 TFLOPS | 1,979 TFLOPS | 3.35 TB/s | 80 GB |\n| H200 | 989 TFLOPS | 1,979 TFLOPS | 4.8 TB/s | 141 GB |\n| B200 | 2,250 TFLOPS | 4,500 TFLOPS | 8 TB/s | 192 GB |\n\n任務：\n\n1. 算出三張卡在 BF16 與 FP8 下的 roofline 拐點。\n2. 對 70B 模型 FP8 權重（70.6 GB），算每張卡 batch=1 的理論 decode 上限（tok/s），並標注哪張卡「裝不下、需要幾張」。\n3. 回答：H200 對 decode 的提升幅度是多少？對 prefill 呢？為什麼不一樣？\n4. 進階：估算每張卡要多大的 batch,decode 才會從 memory-bound 翻成 compute-bound（忽略 KV cache）。\n\n**成功標準**：拐點算出 295 / 206 / 281（BF16）與 590 / 412 / 562（FP8）的量級；能說出「H200 算力沒變，所以 prefill（compute-bound）幾乎不變，decode（memory-bound）提升 ≈ 頻寬比 4.8/3.35 ≈ 43%」。\n\n### Lab 2-2 [M1] 用 Apple Silicon 驗證「decode 上限 = 頻寬 ÷ 模型大小」\n\n你的 MacBook 是絕佳對照組：Apple Silicon 的統一記憶體頻寬是公開規格（M1 Pro 200 GB/s、M1 Max 400 GB/s），而 llama.cpp 的 decode 同樣是 memory-bound——同一條公式應該能預測你機器的 token rate。\n\n```bash\n# 1. 安裝 llama.cpp（含 llama-bench）\nbrew install llama.cpp\n\n# 2. 下載同一個 8B 模型的兩種量化（Hugging Face 上的 GGUF,檔名依實際 repo 調整）\n#    Q4_K_M 約 4.9 GB、Q8_0 約 8.5 GB\nhuggingface-cli download bartowski/Meta-Llama-3.1-8B-Instruct-GGUF \\\n  Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf --local-dir ./models\nhuggingface-cli download bartowski/Meta-Llama-3.1-8B-Instruct-GGUF \\\n  Meta-Llama-3.1-8B-Instruct-Q8_0.gguf --local-dir ./models\n\n# 3. 分別 benchmark 純 decode（tg = text generation,不含 prefill）\nllama-bench -m ./models/Meta-Llama-3.1-8B-Instruct-Q4_K_M.gguf -p 0 -n 128\nllama-bench -m ./models/Meta-Llama-3.1-8B-Instruct-Q8_0.gguf  -p 0 -n 128\n```\n\n然後做三件事：\n\n1. **預測**：理論上限 = 你機器的記憶體頻寬 ÷ 模型檔案大小。M1 Pro + Q4_K_M:200 ÷ 4.9 ≈ 41 tok/s。\n2. **驗證比值**:Q4 與 Q8 的 tok/s 比值，應接近檔案大小的反比（≈ 8.5/4.9 ≈ 1.7 倍）——如果是 compute-bound，比值不會跟著檔案大小走。\n3. **反推 MBU**：實測 tok/s × 模型大小 = 你機器的有效頻寬，除以規格頻寬得到 MBU。\n\n**成功標準**:Q4/Q8 的 tok/s 比值與大小反比誤差 < 20%；反推的有效頻寬落在規格的 50–80%。做到這裡，你就親手驗證了本章 worked example 的物理——同一條公式，從你桌上的 Mac 到機房裡的 H100 都成立。\n\n（附帶觀察：跑 benchmark 時開著活動監視器看 GPU 與記憶體壓力——統一記憶體架構下沒有 PCIe 這道橋，這正是 Mac 能用很普通的算力跑出不錯 token rate 的原因。）\n\n## 這個領域往哪走\n\n短期（1–2 年）的三條確定趨勢：**HBM 軍備競賽繼續**（Rubin 13 TB/s、MI400 19.6 TB/s 都已預告 2026 H2，頻寬代際增速明顯快於算力——產業用腳投票承認了 memory-bound 的現實）；**rack 成為設計單位**（NVL72 之後，採購、排程、故障域的思考單位都從 server 上移到 rack,ch11/ch17）；**電力與散熱從機房議題升級為架構議題**。對你的職涯含意：roofline 這類分析工具十年不會過期，具體卡的型號兩年就換一輪——把力氣花在前者（ch17 有完整的能力耐久性矩陣）。\n\n## 自我檢核\n\n答得出來再往 ch03 走：\n\n1. GPU 為什麼選擇「數十萬條慢執行緒」而不是「幾十條快執行緒」？latency hiding 的機制是什麼，跟 Node.js event loop 的相似點與本質差異在哪？\n2. 默寫 roofline 拐點公式，用 H100 FP8 的數字算出拐點，並解釋拐點左右兩側分別該用什麼手段優化。\n3. 一步步算：70B 模型 FP8 在單張 H100 上 batch=1 decode 的理論上限是多少 tok/s？實測通常打幾折、為什麼？\n4. 為什麼 tensor parallelism 幾乎不跨節點？給出 NVLink 4 與 IB NDR 的每方向頻寬數字佐證。\n5. H200 與 H100 算力完全相同，為什麼前者是「推論神卡」？它對 prefill 與 decode 的提升分別是多少？\n6. 同事說「nvidia-smi 顯示 GPU utilization 100%，所以這張卡已經被榨乾了」——這個推論哪裡有問題？（提示：本章的 0.3%）\n7. dmesg 裡看到 Xid 79 跟 Xid 13，處置方式為什麼完全不同？\n8. 你的 64 卡推論機隊，按公開的故障率數據，大約多久會遇到一次硬體事件？這個數字應該如何改變你的部署架構思維？\n\n## 延伸閱讀\n\n- [NVIDIA Hopper Architecture In-Depth](https://developer.nvidia.com/blog/nvidia-hopper-architecture-in-depth/) — H100 架構官方深度解析，SM/tensor core/HBM 數字的一手來源。\n- [Making Deep Learning Go Brrrr From First Principles（Horace He）](https://horace.io/brrr_intro.html) — 用 compute/memory/overhead 三分法講效能瓶頸，是 roofline 思維最好讀的工程版，全網被引用最多的入門文之一。\n- [Roofline: An Insightful Visual Performance Model（Williams et al., CACM 2009）](https://dl.acm.org/doi/10.1145/1498765.1498785) — roofline 原始論文，證明這個工具早於 LLM 二十年、還會再用二十年。\n- [NVIDIA Xid Errors 官方目錄](https://docs.nvidia.com/deploy/xid-errors/) — 每個 Xid 的官方定義與建議處置，值得加入書籤，on-call 時會回來查。\n- [The Llama 3 Herd of Models（arXiv:2407.21783）](https://arxiv.org/abs/2407.21783) — 第 3.3 節的基礎設施與可靠性數據(419 次中斷的一手來源），大規模 GPU 機隊 MTBF 現實的最佳公開文獻。\n- [Nvidia's H100: Funny L2, and Tons of Bandwidth（Chips and Cheese）](https://chipsandcheese.com/p/nvidias-h100-funny-l2-and-tons-of-bandwidth) — 用微基準實測 H100 記憶體階層各層的真實延遲與頻寬，建立數字感的好材料。\n- [Stas Bekman, Machine Learning Engineering Open Book](https://github.com/stas00/ml-engineering) — accelerator 與 debug 章節是大規模 GPU 維運的實戰筆記，Xid 排障部分尤其實用。\n- [NVIDIA GB300 NVL72 產品頁](https://www.nvidia.com/en-us/data-center/gb300-nvl72/) — rack-scale 系統的官方規格，感受「機櫃即計算機」的設計語言(2026-06)。\n"}, {"id": "ch03-inference-physics", "file": "ch03-inference-physics.md", "group": "Part I — 心智模型與基礎", "title": "ch03 — Transformer 推論的物理學：每個 token 都是一次記憶體掃描", "md": "# ch03 — Transformer 推論的物理學：每個 token 都是一次記憶體掃描\n\n> **本章解決什麼問題**：ch02 給了你 GPU 這台機器的規格表與 roofline 分析工具；本章告訴你跑在上面的工作負載——transformer 推論——到底在算什麼、記憶體怎麼隨對話長大、瓶頸落在 roofline 的哪一側。這章是全書的理論地基：KV cache 大小公式與「prefill compute-bound / decode memory-bound」這兩個結論，會被 ch05（KV 管理）、ch06（batching）、ch10（P/D 分離）、ch13（容量規劃）反覆引用。你不需要會訓練模型，但讀完這章，你要能對任何一個模型的 config.json 心算出它的記憶體帳單。\n\n## 從你已知的出發\n\n你做過 WebSocket 即時系統：每條連線在 Redis 裡掛著一份 per-connection session state，幾 KB，10K CCU 全加起來也就幾十 MB，放哪都行。LLM serving 也是有狀態服務，每條對話掛著一份叫 KV cache 的 state——但它每生成一個 token 就長大幾百 KB，一條 32k context 的對話會長到 10 GB 以上，而且它只能住在整台機器最貴的記憶體（GPU 的 HBM）裡。把「session state」的直覺乘上六個數量級，你就有了本章的核心張力。\n\n你也做過 profiling-driven 的 RDS 優化：下刀之前先分清楚瓶頸是 CPU 還是 IO，因為兩種瓶頸的處方完全不同。本章對 transformer 推論做同一件事——用 ch02 的 arithmetic intensity 證明：推論的兩個階段（prefill 與 decode）一個是 compute-bound、一個是 memory-bound。這個診斷結論不是學術趣味，它直接決定了後面所有章節的系統設計：為什麼要 batching（ch06）、為什麼量化權重能加速 decode（ch07）、為什麼有人把兩個階段拆到不同的 GPU 池（ch10）。\n\n最後一個錨點：attention 機制本質上是「每個新 token 對所有歷史 token 做一次相似度全掃描」。用你的語言說，這是一張沒有索引、也建不了索引的表，每來一筆新資料就 full scan 一次——O(n²) 就是從這裡來的。業界後來想替這張表「建索引」的各種嘗試（sparse attention、linear attention），我們留到章末與 ch17。\n\n## Token：計價與容量的原子單位\n\n模型不讀字，讀 token。Tokenizer 把文字切成一串整數 id，每個 id 對應詞彙表（vocabulary）裡的一個片段。主流做法是 BPE（Byte Pair Encoding）：從位元組層級出發，統計訓練語料中最常相鄰出現的片段並反覆合併，最後得到一張固定大小的詞彙表——Llama 3 系列是 128,256 個條目（查證自 config.json，2026-06）。\n\n三個工程上重要的事實：\n\n1. **token ≠ 字**。英文平均約 3~4 個字元一個 token；中文依 tokenizer 而異，常見是一個字 1~2 個 token。同一段話換一個模型，token 數可以差 30% 以上。\n2. **計價用 token 是物理誠實的**。下面你會看到：每個 token 消耗的 FLOPs 與 KV cache bytes 都是固定的，token 是成本的自然原子單位——類比 DynamoDB 用 RU 計價，而不是用「查詢次數」。\n3. **tokenize 發生在 CPU**，在請求進入 GPU 之前。這是整條推論鏈路裡少數便宜的步驟，但它定義了後面一切的「n」。\n\nMurphy 提醒：如果你的 gateway 用字元數估配額、引擎用 token 數計費，中文流量會讓兩本帳對不上。量測一律以引擎回報的 `prompt_tokens` / `completion_tokens` 為準。\n\n## 推論時的 transformer：一條 token 的流水線\n\n訓練怎麼回事本書不管。推論時，一個 decoder-only transformer（目前所有主流 LLM 的形態）就是一條固定的流水線：\n\n```\nprompt 文字\n   │ tokenizer（CPU）\n   ▼\ntoken ids [n]\n   │ embedding lookup：[n] → [n, 8192]        （查表，把每個 id 換成一個向量）\n   ▼\n┌─ Layer 1 … 80（每層結構相同，串行通過）──────────────┐\n│   RMSNorm → Attention（Q/K/V/O 四個矩陣乘）→ 殘差相加   │\n│   RMSNorm → FFN（8192 → 28672 → 8192）     → 殘差相加   │\n└────────────────────────────────────────────┘\n   ▼\nRMSNorm → lm_head：[n, 8192] × [8192, 128256] → logits [n, 128256]\n   ▼ 只取最後一個位置的 logits\nsampling（temperature / top-p …）→ 下一個 token id → 餵回流水線，迴圈\n```\n\n（圖中形狀以 Llama-3.3-70B 為例：hidden size 8192、80 層、詞彙表 128,256。）\n\n幾個對後端工程師重要的觀察：\n\n- **整個模型就是一疊矩陣乘法加上少量逐元素運算**。沒有分支、沒有迴圈依資料而變（MoE 的 routing 是例外，見後文）——這就是它適合 GPU 這種 throughput machine 的原因（ch02）。\n- **生成是自迴歸（autoregressive）的**：每次前向傳播只產出「下一個」token，把它接回輸入序列尾端，再跑一次。生成 500 個 token 就是 500 次完整流水線。這個串行依賴是 LLM 推論一切延遲問題的根源——你無法平行生成第 100 個 token 和第 101 個 token。\n- **logits 是對整張詞彙表的打分**：一個 128,256 維的向量，sampling 就是從這個分布裡挑一個 id。\n\n### 一層裡面長什麼樣：用矩陣形狀讀懂模型\n\n「讀懂模型架構」對 infra 工程師來說，就是讀懂每層有哪幾個權重矩陣、形狀是什麼。以 Llama-3.3-70B 為例（所有數字查證自官方 config.json，2026-06）：\n\n| 矩陣 | 形狀 | 參數量 | 作用 |\n|---|---|---|---|\n| W_Q | 8192 × 8192 | 67.1M | 產生 query（64 個 head × 128 維） |\n| W_K | 8192 × 1024 | 8.4M | 產生 key（**只有 8 個 head** × 128 維） |\n| W_V | 8192 × 1024 | 8.4M | 產生 value（同上） |\n| W_O | 8192 × 8192 | 67.1M | attention 輸出投影 |\n| W_gate | 8192 × 28672 | 234.9M | FFN（SwiGLU 三矩陣之一） |\n| W_up | 8192 × 28672 | 234.9M | FFN |\n| W_down | 28672 × 8192 | 234.9M | FFN |\n| 每層合計 | | **約 855.6M** | attention 佔 151M（18%）、FFN 佔 704.6M（82%） |\n\n驗算：855.6M × 80 層 ≈ 68.5B，加上 embedding（128,256 × 8192 ≈ 1.05B）與 lm_head（同形狀、不共享，再 1.05B），合計約 70.55B——和官方公布的 70.6B 對上了。能做這個驗算，代表你真的讀懂了 config.json；面試時這是區分「背過名詞」和「懂結構」的試金石。\n\n注意兩件事，後面都會回收：W_K/W_V 窄得反常（1024 而不是 8192），這是 GQA，是 KV cache 一節的主角；FFN 佔每層 82% 的參數，這是 MoE 一節「只稀疏化 FFN 就夠了」的原因。\n\n## Attention：為什麼每個 token 都要回頭看所有歷史\n\nFFN 對每個 token 獨立運算，token 之間互不相見。整個 transformer 裡**唯一**讓不同位置的資訊互相流動的機制就是 attention。它的運作（單一 head、推論視角）：\n\n1. 當前 token 的 hidden state 乘 W_Q 得到 **query** q——「我在找什麼」。\n2. 每個歷史 token 都各有一份 **key** k（「我是什麼」）和 **value** v（「我攜帶什麼資訊」），由各自的 hidden state 乘 W_K、W_V 得到。\n3. q 與**所有**歷史 token 的 k 做內積、除以 √128、過 softmax，得到一組注意力權重——一次對全部歷史的相似度掃描。\n4. 用這組權重對所有 v 加權求和，結果就是「這個 token 從上下文中收集到的資訊」。\n\nDecoder-only 模型帶 causal mask：每個 token 只能看見自己之前的 token。這個約束看似是訓練細節，卻是推論系統的救命恩人——它保證**歷史 token 的 k、v 一旦算出來就永遠不變**（新 token 的加入不影響它們），這正是 KV cache 能存在的前提。\n\nO(n²) 從哪來：序列裡第 i 個 token 要對前 i 個 token 各做一次內積，整段序列就是 1+2+…+n ≈ n²/2 次。沒有索引可建——softmax 之前你不知道哪些歷史 token 重要，所以必須全掃。32k 的 prompt，這項就是 5 億次「行對行」比較，乘上 64 個 head、80 層。長上下文一節會把這筆帳算成秒數。\n\n## KV cache：用記憶體換計算\n\n### 它在解什麼問題\n\n天真的生成方式：每生成一個新 token，把「prompt + 已生成的全部 token」重新跑一遍整條流水線。第 t 步要對 t 個 token 重算 k、v——但我們剛說過，歷史 token 的 k、v 永遠不變。重算是純浪費，而且浪費隨序列長度線性惡化，整段生成合計 O(n²) 次多餘的前向計算。\n\n解法就是你做過一百次的 memoization：把每層、每個 token 的 k、v 向量算一次、存起來。之後每個 decode 步只需要為**一個**新 token 算 q/k/v，再對快取裡的歷史 K、V 做掃描。這份快取就是 **KV cache**。\n\n代價也和所有 cache 一樣：儲存空間，以及隨之而來的失效管理、容量規劃、碎片化問題——後者整整佔了 ch05 一章。先把帳算清楚。\n\n### KV cache 大小公式（全書公式，背下來）\n\n```\nKV cache bytes = 2 × n_layers × n_kv_heads × head_dim × bytes_per_param × n_tokens\n```\n\n逐項解釋：`2` 是 K 和 V 各一份；`n_layers` 是每一層都要存自己的 KV（attention 在每層獨立發生）；`n_kv_heads × head_dim` 是每層每個 token 的 KV 向量寬度；`bytes_per_param` 是數值精度（BF16/FP16 = 2、FP8 = 1）；`n_tokens` 是這條序列目前的長度（prompt + 已生成）。\n\n前四項相乘就是「**每 token 每條序列的 KV bytes**」——一個模型的固定體質，從 config.json 直接算出來。\n\n### Worked example：Llama-3.3-70B 的 KV 帳單（全書反覆引用）\n\n這是全書最重要的一次計算，一步步來。模型參數（查證自官方 config.json，2026-06）：`num_hidden_layers = 80`、`num_key_value_heads = 8`、`head_dim = 128`、KV 精度 BF16（2 bytes）。\n\n**第一步：每 token 的 KV bytes。**\n\n```\n2 × 80 × 8 × 128 × 2 = 327,680 bytes ≈ 320 KiB ≈ 0.33 MB / token\n```\n\n**第二步：一條 32k context 的對話。**\n\n```\n32,768 tokens × 327,680 bytes = 10,737,418,240 bytes ≈ 10.7 GB\n```\n\n一條對話、10.7 GB 的 state。你過去一條 WebSocket session 的 state 是幾 KB——差了七個數量級，而且這 10.7 GB 必須住在 HBM 裡，因為每個 decode 步都要把它整個讀一遍。\n\n**第三步：一張 H100 80GB 能同時服務幾條 32k 對話？**\n\n先把卡上的記憶體分帳。推論引擎通常保留約九成的 HBM 自用（vLLM 的 `gpu-memory-utilization`，預設值隨版本在 0.90~0.92 間演進，見 ch08；本章一律用保守的 0.90 計算），即約 72 GB，這裡面要裝三樣東西：模型權重、activation 工作區（中間計算的暫存，量級 1~3 GB）、KV cache 池。\n\n- 權重 BF16：70.6B × 2 bytes ≈ **141.2 GB**。比整張卡還大，根本裝不進去。單卡 BF16 跑 70B，到此為止。\n- 權重 FP8（ch07 會講怎麼來的）：70.6B × 1 byte ≈ 71 GB（實務上 embedding 等少數層不量化，約 72~75 GB）。72 GB 的預算減掉權重再減掉 activation，留給 KV cache 的空間是**零，甚至是負的**。\n\n所以這題的誠實答案是：**0 條**。一張 80GB 的卡塞一個 70B 模型，連一條 32k 對話都服務不了。這個「算出 0」不是例子設計失敗，它就是本章想讓你記住的第一個結論——是這筆帳，而不是任何軟體偏好，逼著 70B 級模型走向多卡。\n\n**第四步：那 2×H100（tensor parallelism，切法見 ch09）呢？**\n\n可用記憶體 2 × 72 = 144 GB；FP8 權重 71 GB 平攤兩卡；activation 與通訊緩衝抓 4 GB。KV 池 ≈ 144 − 71 − 4 ≈ **69 GB**。\n\n```\n69 GB ÷ 10.7 GB/條 ≈ 6 條 32k 對話\n```\n\n兩張月租上萬美元等級的卡（2026 年年中 neocloud 行情約 $2~3/hr/卡，見 ch16），同時服務 **6 個**長上下文使用者。如果流量是 4k context 的短對話（每條 1.34 GB），同樣的池子能放約 51 條。**並發容量幾乎完全由 KV cache 預算決定，而 KV cache 由使用者的 context 長度決定**——這就是全書主軸一「LLM serving 是 memory 的生意」的第一次具體現身，也是 ch13 容量規劃數學的起點。\n\n> **全書引用的三個數字（Llama-3.3-70B，BF16 KV）**\n> - 每 token KV：**327,680 bytes ≈ 0.33 MB**\n> - 每條 32k 對話：**≈ 10.7 GB**\n> - 2×H100（FP8 權重）的 KV 池 ≈ 69 GB → **約 6 條 32k 並發對話**；單卡 H100 → **0 條**\n\n這筆帳有三個刻意的簡化，方向都偏保守，引用前要知道：\n1. **單位**：本章全用十進制 GB 粗算，但實體 HBM 與 `nvidia-smi` 用的是二進制——H100「80GB」實際是約 80 GiB（`nvidia-smi` 報約 8.1 萬 MiB），折合十進制約 85 GB。整筆帳改用 GiB 重算會多擠出約一條（≈7 條）。粗算時混用無妨，**做正式容量規劃時必須統一單位**——GB/GiB 混用是真實世界容量失準的常見來源。\n2. **碎片化**：KV 池以 block（常見 16 tokens）為單位配置，每條請求的最後一個 block 平均半空，實際可用容量再打約 95 折（機制見 ch05）。\n3. **Activation 抓固定 4 GB** 是 decode 穩態的量級；長 prompt 的 prefill 峰值會更高，引擎會用排程把它壓回去（ch06）。\n\n順帶一提：KV cache 池在引擎裡怎麼切塊、怎麼避免碎片化（PagedAttention），是 ch05 的主題；多條請求怎麼動態進出這個池子（continuous batching），是 ch06 的主題。本章只管「池子有多大、每條對話吃多少」。\n\n### MHA / GQA / MQA / MLA：KV 瘦身的演化史\n\n上面算出的 320 KiB/token 已經是「瘦身後」的數字。公式裡的 `n_kv_heads` 是模型架構設計者手上最大的 KV 槓桿：\n\n- **MHA（Multi-Head Attention）**：原版設計，每個 query head 配一組專屬 K/V。64 個 head 就是 64 組 KV。\n- **MQA（Multi-Query Attention）**：走到另一個極端，所有 query head 共享**一組** KV。省 64 倍，但品質損失在大模型上不可忽略。\n- **GQA（Grouped-Query Attention）**：折衷方案，把 64 個 query head 分成 8 組，每組共享一組 KV。品質幾乎不掉、KV 省 8 倍，是 2023 年後 dense 模型的業界預設。\n- **MLA（Multi-head Latent Attention）**：DeepSeek-V2 提出的路線。不是減少 KV head 數，而是把 KV **壓縮成一個低秩 latent 向量**存起來，用的時候再投影回去。DeepSeek-V3 每層每 token 只存 576 個元素（512 維壓縮 latent + 64 維位置資訊；查證自 config.json，2026-06），而且 K 和 V 共用這一份——公式裡的「2 ×」也消失了。代價是架構必須從預訓練就這樣設計，沒辦法事後改裝到現有模型上。\n\n用同一把尺量（70B 級 dense 假設 80 層 × head_dim 128；MLA 用 DeepSeek-V3 真實數字 61 層 × 576 元素，BF16）：\n\n| 架構 | KV heads | 每 token 每層 | 每 token 全模型 | 一條 32k 對話 | 代表模型（2026-06） |\n|---|---|---|---|---|---|\n| MHA | 64 | 32 KiB | 2.56 MB | **85.9 GB** | GPT-3 世代 |\n| GQA | 8 | 4 KiB | 0.33 MB | **10.7 GB** | Llama 3.x、多數 Qwen dense |\n| MQA | 1 | 0.5 KiB | 0.04 MB | **1.3 GB** | Falcon、PaLM |\n| MLA | （latent 576 元素） | 1.125 KiB | 0.07 MB | **2.3 GB** | DeepSeek-V2/V3、Kimi K2 |\n\n兩個值得停下來看的點。第一：如果 Llama-70B 還是 MHA，一條 32k 對話的 KV 是 85.9 GB——比一張空的 H100 還大，前面那道題連「0 條」都不用算。GQA 那個 8 倍，是 2024 年後長上下文服務在經濟上成立的前提。第二：DeepSeek-V3 是 671B 參數的模型，每 token 的 KV 卻只有 Llama-70B 的五分之一。**模型架構設計已經把 serving 成本當成一級設計目標**——MLA 不是數學炫技，是衝著 HBM 帳單來的。2026 年的新動向（DeepSeek-V4 的 DSA sparse attention、Qwen3.5 的線性注意力混合）把這條路推得更遠，見章末與 ch17。\n\n還有一個容易忽略的工程事實：**KV cache 只依賴 token 序列本身**，與 temperature 等 sampling 參數無關。兩個 prompt 前綴相同、sampling 設定不同的請求，KV 完全可以共用——這是 ch05 prefix caching 的理論基礎。\n\n## Prefill 與 decode：一個請求、兩種物理\n\n一個推論請求的生命週期分成兩段，物理性質截然不同：\n\n- **Prefill**：把整段 prompt（可能幾千到幾萬個 token）一次性通過流水線，建立全部 KV cache，並產出第一個 token。使用者體感對應 **TTFT**（time to first token）。\n- **Decode**：之後一次一個 token 的自迴歸迴圈。體感對應 **ITL/TPOT**（token 間延遲）。\n\n### 用 arithmetic intensity 證明瓶頸在哪\n\n拿出 ch02 的 roofline。H100 SXM 的帳：BF16 Tensor Core 約 989 TFLOPS（dense）、HBM3 頻寬 3.35 TB/s，ridge point ≈ 989e12 ÷ 3.35e12 ≈ **295 FLOP/byte**。workload 的 arithmetic intensity 高於它是 compute-bound，低於它是 memory-bound。\n\n**Decode（batch = 1）**：生成一個 token，要把每個權重矩陣各做一次「矩陣 × 向量」（GEMV）。一個 m×k 的 BF16 矩陣：讀 2mk bytes，做約 2mk FLOPs——**intensity ≈ 1 FLOP/byte**。整個模型加總：約 2 × 70.6B ≈ 141 GFLOPs 的計算，對上約 141 GB 的權重讀取（BF16），再加上整份 KV cache 的讀取（32k context 時 +10.7 GB）。1 對 295——decode 是**極端 memory-bound**，Tensor Core 的利用率約 0.3%。GPU 不是在算，是在等記憶體。ch02 已經用這個邏輯推過單流 decode 的理論上限：3,350 GB/s ÷ 152 GB ≈ **22 tokens/s**，與量測值同量級。\n\n**Prefill（n 個 token）**：同一批權重只讀一次，卻對 n 個 token 各做一份計算——矩陣乘變成真正的 GEMM，**intensity ≈ n FLOP/byte**。n 超過 ridge point（約 300 個 token）就翻到 compute-bound 那一側；一段 2,048 token 的 prompt，intensity 約 2,048，是 ridge 的 7 倍。Prefill 吃滿 Tensor Core，瓶頸是算力。\n\n同一個模型、同一張卡、同一個請求的兩個階段，一個卡在頻寬、一個卡在算力：\n\n| | Prefill | Decode |\n|---|---|---|\n| 一次處理 | 整段 prompt（10²~10⁵ tokens） | 每序列 1 token |\n| 運算形態 | GEMM（矩陣×矩陣） | GEMV（矩陣×向量） |\n| Arithmetic intensity | ≈ n（容易 ≫ 295） | ≈ 1（≪ 295） |\n| 瓶頸 | 算力（Tensor Cores） | HBM 頻寬 |\n| 使用者體感 | TTFT | ITL / TPOT |\n| 對策的方向 | 更強算力、prefix 重用（ch05）、sparse attention | 更大頻寬、權重量化（ch07）、batching |\n\n這個不對稱嚴重到什麼程度？單機層面，引擎得用 chunked prefill 避免一段長 prompt 的 prefill 把所有人的 decode 卡出 ITL 尖峰（ch06）；叢集層面，2025–2026 的大規模架構乾脆把兩個階段拆到不同的 GPU 池、各自用適合的硬體（P/D 分離，ch10）。那兩章的所有設計，都只是本節這張表的工程推論。\n\n## Batch：decode 吞吐的來源與它的天花板\n\nDecode 的 intensity ≈ 1 是 batch = 1 的情況。如果同一個 decode 步同時為 B 條序列各生成一個 token 呢？權重還是只讀一次，計算變成 B 份——**intensity 隨 B 線性上升**。這就是 batching 在 LLM 推論裡的本質：**攤提權重讀取**。讀一次 141 GB，服務 1 個 token 是浪費，服務 64 個 token 就接近合理。\n\n但 KV cache 不一樣：**每條序列有自己的 KV，誰也不能攤提誰的**。每個 decode 步的記憶體流量是「權重（固定）+ B × 每條序列的 KV」。把它寫成式子，B 條序列、每條 context 長度 c：\n\n```\nintensity(B) ≈ (B × 2P) / (W_bytes + B × KV_per_seq)   →（B → ∞）→  2P / KV_per_seq\n```\n\n漸近線不是無限大。對 Llama-3.3-70B、32k context：141 GFLOPs ÷ 10.7 GB ≈ **13 FLOP/byte**——不管 batch 開多大，永遠到不了 295 的 ridge point。**長上下文的 decode 是 batching 救不回來的 memory-bound**，因為主要流量已經從權重變成 KV 本身。這是「KV cache 主宰一切」的第二次現身：它不只吃容量，還吃頻寬。（順帶可以看出 GQA 的另一層價值：MHA 的漸近線會再低 8 倍，只有 1.6。）\n\n### 一階模型：吞吐—延遲取捨曲線\n\n用一個放得進單卡的模型把曲線算出來。Llama-3.1-8B（32 層、8 KV heads、head_dim 128 → 每 token KV = 131,072 bytes）、BF16 權重 16 GB、H100、每條序列 context 4k（KV/條 ≈ 0.54 GB）。memory-bound 階段，每個 decode 步的時間 ≈ 記憶體流量 ÷ 3,350 GB/s：\n\n| Batch B | 每步讀取 (GB) | 每步時間 = ITL | 總吞吐 (tok/s) | 對比 B=1 |\n|---|---|---|---|---|\n| 1 | 16.5 | 4.9 ms | 202 | 1× |\n| 8 | 20.3 | 6.1 ms | 1,320 | 6.5× |\n| 32 | 33.2 | 9.9 ms | 3,230 | 16× |\n| 64 | 50.4 | 15.0 ms | 4,260 | 21× |\n| **~100** | **~70** | **~21 ms** | **~4,800** | **KV 池撞牆**（72−16−2 ≈ 54 GB ÷ 0.54 GB） |\n| 128（裝不下） | 84.7 | 25.3 ms | 5,060 | 25× |\n\n（一階模型：假設完美 memory-bound、忽略計算時間與排程開銷，數字是理論形狀不是實測；實測方法見 ch14。）\n\n三個讀法。第一，**B 從 1 到 64，吞吐漲 21 倍、ITL 只惡化 3 倍**——這條不對稱的曲線就是推論引擎存在的理由，沒有 batching 的 GPU 推論在經濟上不成立。第二，曲線有兩道天花板：頻寬漸近線（此例 3,350 ÷ 0.54 ≈ 6,200 tok/s）與 **KV 容量牆**（B≈100 時 54 GB 的池子滿了）——這張卡在跑滿之前先被記憶體容量掐住，又一次 memory 的生意。第三，ITL 隨 B 單調上升：吞吐與單使用者延遲是真實的取捨，不是調參能繞過的，這條曲線的甜蜜點選擇就是 ch06 排程與 ch13 容量規劃的核心題。\n\n至於「怎麼讓請求隨來隨進、隨完隨走地動態組 batch」（continuous batching），機制留給 ch06。\n\n## Sampling：infra 工程師需要知道的最低限度\n\n流水線尾端，logits（128,256 維分數）要變成一個具體的 token id：\n\n- **Greedy**：直接取分數最高的。**Temperature**：logits 先除以 T 再 softmax——T<1 分布更尖（保守）、T>1 更平（發散）、T=0 等價 greedy。**Top-k**：只在分數前 k 名裡抽。**Top-p（nucleus）**：只在累積機率達 p 的最小集合裡抽。\n\n模型品質層面的調參不是本書的事。Infra 視角只有三件事重要：\n\n1. **可快取性**：前面說過，KV 只依賴 token 序列，sampling 參數不影響 KV——prefix cache 可以跨不同 temperature 的請求共享（ch05）。但「輸出快取」（同 prompt 直接回放舊答案）只在 greedy + 固定條件下才語義成立。\n2. **重現性**：temperature = 0 **不保證** bit 級重現。浮點加法不可結合，GPU kernel 的歸約順序會隨 batch 組成改變，同一個 prompt 在不同併發環境下可能產出不同 token。這不是 bug，是物理。後果很實際：eval pipeline 跑兩次分數不同，會被誤報成「模型退化」。防禦：評測固定 seed 與執行條件；vLLM 0.22 起提供 batch-invariant 推論選項，以效能換決定性（2026-06）。\n3. **成本佔比**：sampling 本身的計算極便宜，可以忽略；但 structured output（JSON schema/grammar 約束）要在每步對 logits 上 mask，實作不好會成為瓶頸，這是 ch08 講 SGLang 時的話題。\n\n## MoE：記憶體買全部、算力用一部分\n\n回看每層參數表：FFN 佔 82%。MoE（Mixture of Experts）的想法是把這塊最大的肥肉換成 N 份平行的「expert」FFN，外加一個小小的 **router**：每個 token 經過每層時，router 給所有 expert 打分，只把 token 送進分數最高的少數幾個。\n\n用 DeepSeek-V3 的真實數字（查證自 config.json，2026-06）：61 層，每層 256 個 routed expert + 1 個 shared expert（每個 token 都過），每 token 選 top-8。於是：\n\n- **Total parameters：671B** ——記憶體必須裝下全部。權重 FP8 也要約 671 GB，加 KV 與 overhead，至少一台 8×H200（141 GB × 8 = 1,128 GB）等級的機器才裝得下，單卡免談。\n- **Active parameters：37B** ——每個 token 實際流經的參數。每 token 計算量約 2 × 37B = 74 GFLOPs，**比 Llama-70B dense（141 GFLOPs）還便宜一半**，能力卻是另一個級別。\n\n這就是「MoE 改變 serving 經濟學」的意思：**你為 capacity 付記憶體的錢，只為 intelligence 付算力的錢**。代價是兩者的失衡比 dense 模型更極端——一台塞滿 671 GB 權重的機器，每個 token 只動用 5.5% 的參數。小流量自建跑 MoE 極不划算（買了一倉庫的記憶體服務涓涓細流）；大平台則靠兩件事回本：足夠大的 batch 讓各 expert 都吃飽，以及把 expert 攤到大量 GPU 上的 expert parallelism（wide-EP，一句話帶過，機制見 ch09）。另一個 Murphy 點：router 是按 token 路由的，B 條序列的一個 decode 步可能喚醒幾乎所有 expert——batch 攤提權重讀取的效果在 MoE 上打折，hot/cold expert 的負載不均也成為新的故障面（ch09）。\n\n2026 年年中的開放權重旗艦幾乎全是 MoE（規格依 landscape 基準，2026-06）：\n\n| 模型 | Total | Active | Active 佔比 | 備註 |\n|---|---|---|---|---|\n| DeepSeek-V3 | 671B | 37B | 5.5% | 256+1 experts、top-8、MLA |\n| DeepSeek-V4-Pro（preview） | 1.6T | 49B | 3.1% | DSA sparse attention、1M context |\n| Kimi K2.6 | 1T | 32B | 3.2% | MLA、原生 INT4 |\n| Qwen3.5-397B | 397B | 17B | 4.3% | 線性注意力混合 |\n| Llama 4 Maverick | ~400B | 17B | 4.3% | 128 experts |\n| gpt-oss-120b | 117B | 5.1B | 4.4% | MXFP4，單張 H100 可跑 |\n\n趨勢線很清楚：total 越做越大（1.6T）、active 壓得越來越低（3%）。模型廠在用架構告訴你：智慧的上限靠 total params，serving 的成本靠 active params 與 KV 設計——兩者已經解耦。\n\n## 長上下文的帳單：兩條曲線一起漲\n\n把本章兩個主角放到 context 長度這個軸上：\n\n**KV cache 隨 context 線性成長**（Llama-3.3-70B，BF16）：\n\n| Context | KV / 條對話 | 對照 |\n|---|---|---|\n| 4k | 1.34 GB | 還算親切 |\n| 32k | 10.7 GB | 本章主例 |\n| 128k | **42.9 GB** | 一條對話 > 半張 H100 |\n| 128k（若為 MHA） | 343.6 GB | 四張卡只為一條對話的 state |\n| 128k（DeepSeek-V3 MLA） | 9.2 GB | 671B 模型反而最省 |\n\n**Prefill 計算隨 context 平方成長**。FLOPs ≈ 線性項 2Pn + attention 項 4n²·d·L。對 Llama-3.3-70B（d=8192、L=80）：\n\n| Prompt 長度 | 線性項 | Attention 項 | 合計 | attention 佔比 | 估計 prefill 時間* |\n|---|---|---|---|---|---|\n| 32k | 4.6 PFLOPs | 2.8 PFLOPs | 7.4 PFLOPs | 38% | ~15 s（單卡當量） |\n| 128k | 18.5 PFLOPs | 45.0 PFLOPs | **63.5 PFLOPs** | 71% | ~128 s（單卡當量） |\n\n（*以 989 TFLOPS × 50% MFU 的單卡當量粗估，僅看量級；實務靠多卡平行與 FlashAttention 等 kernel 壓低，見 ch07/ch09。）\n\ncontext 從 32k 到 128k 是 4 倍，prefill 計算量卻是 8.6 倍——因為 O(n²) 項從配角變主角。一個 128k 的請求若沒有任何 cache 重用，光 prefill 就是分鐘級的 GPU 獨佔，TTFT 直接爆表。把這兩條曲線放在一起，你就理解了 2025–2026 整個產業的行為：API 廠商給 cached input 打 1~9 折的折扣結構、Mooncake 把 KV cache 做成儲存系統、agentic 流量讓 prefix caching 從優化變成生存必需（ch05、ch10、ch17）——全是這張帳單逼出來的。\n\n## 故障模式與防禦\n\n理論章也有 Murphy。以下每一條都是「公式沒算對」在生產環境的長相：\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| 只用「參數量 × 2 bytes」估記憶體，忘了 KV 與 activation | 引擎啟動就 OOM；或啟動成功但 KV 池小到只能跑個位數併發 | vLLM 啟動 log 的 KV cache size / `num_gpu_blocks`；nvidia-smi 的常駐占用 | 用本章公式把權重、KV、activation 三本帳分開算，再決定卡數 |\n| 把 GQA 公式套在 MLA 模型上（或反之） | 容量規劃高估/低估 5~8 倍，上線後併發與預估完全對不上 | 實際 `num_gpu_blocks` 與你的試算差距巨大 | 規格以 config.json 為準（`num_key_value_heads`、`kv_lora_rank`），不要讀行銷文 |\n| `max_model_len` 開到 128k 但 p99 流量只有 4k | 單一長請求就能吃掉大半 KV 池；preemption 與 recompute 變多、ITL 抖動（ch06） | KV cache utilization 飆高伴隨 preemption 計數上升（ch14 指標） | 依真實 context 分布設上限；長 context 流量獨立成池 |\n| 長 prompt 的 prefill 餓死全卡的 decode | 某些時刻全體使用者 ITL 突然尖峰，與長請求到達時間吻合 | ITL p99 與 `prompt_tokens` 分布的相關性 | chunked prefill / 排程隔離（ch06）；極端者 P/D 分離（ch10） |\n| Gateway 用字元數做配額、引擎用 token 計費 | 中文/程式碼流量配額暴衝，計費對帳差 30%+ | 對帳 `prompt_tokens` vs gateway 計數 | 全鏈路統一用引擎側 token 計數；gateway 內嵌同款 tokenizer |\n| 把浮點不可重現當成模型故障 | eval 分數隨 batch 環境漂移；temperature=0 仍有輸出差異，誤報「模型退化」 | 固定輸入重放：單獨跑 vs 高併發跑結果不同 | 評測固定 seed 與併發條件；必要時用 batch-invariant 模式（2026-06 vLLM 提供）換取決定性 |\n| Context 滿時的 silent truncation | 沒有錯誤碼，但模型「忘了」對話前半段，品質劣化無聲無息 | 監控 `prompt_tokens` 逼近 `max_model_len` 的請求比例 | 顯式處理超限（拒絕或摘要重組），別依賴框架預設行為 |\n| 用 active params 替 MoE 估記憶體 | 「37B 而已，兩張卡夠了」→ 671 GB 權重根本載入不了 | 載入階段直接失敗 | Total params 算記憶體、active params 算算力，兩本帳永遠分開 |\n\n## 動手做\n\n### Lab 1 [M1]：用 llama.cpp 親手量出 prefill / decode 的不對稱\n\nch02 你已經裝過 llama.cpp。這次用它的 benchmark 工具直接量兩階段：\n\n```bash\n# 模型：任一 8B 級 4-bit GGUF（約 4.5~5 GB），例如 Llama-3.1-8B-Instruct Q4_K_M\nllama-bench -m models/llama-3.1-8b-instruct-Q4_K_M.gguf \\\n  -p 512,2048,8192 \\    # prefill 測試：三種 prompt 長度\n  -n 128                # decode 測試：生成 128 tokens\n```\n\n輸出裡 `pp`（prompt processing）就是 prefill 速率、`tg`（text generation）就是 decode 速率。**成功標準**：(1) pp 與 tg 差 1~2 個數量級，且你能用 arithmetic intensity 解釋為什麼；(2) pp 的總耗時隨 prompt 長度超線性成長；(3) 進階：查你晶片的記憶體頻寬（M1 ≈ 68 GB/s、M1 Pro ≈ 200、M1 Max ≈ 400），用「頻寬 ÷ 模型檔案大小」算出 decode 理論上限，對照實測值——通常落在理論值的 60~85%，能解釋差距去哪了（KV 讀取、非權重流量、排程開銷）就算通關。\n\n### Lab 2 [紙上推演]：對三個模型算 KV 公式\n\n只給 config，不給答案（答案在本章都出現過，自己對）：\n\n| | Llama-3.1-8B | Llama-3.3-70B | DeepSeek-V3（MLA） |\n|---|---|---|---|\n| layers | 32 | 80 | 61 |\n| kv_heads × head_dim | 8 × 128 | 8 × 128 | （latent：512 + 64 元素，K/V 共用一份） |\n| KV 精度 | BF16 | BF16 | BF16 |\n\n求：(a) 每 token KV bytes；(b) 一條 128k 對話的 KV（GB）；(c) 若 KV 池有 69 GB，各能放幾條 32k 對話；(d) 思考題：DeepSeek-V3 的答案為什麼「不公平地好」，它付出了什麼代價？**成功標準**：三組數字與本章誤差 < 5%，且 (d) 能講出「從預訓練就得採用 MLA 架構」這層。\n\n### Lab 3 [M1]：tokenizer 十分鐘體感\n\n```bash\nuv run --with transformers python - <<'EOF'\nfrom transformers import AutoTokenizer\ntok = AutoTokenizer.from_pretrained(\"Qwen/Qwen3-8B\")   # 不需下載權重，只拉 tokenizer\nfor s in [\"The quick brown fox jumps over the lazy dog.\",\n          \"敏捷的棕色狐狸跳過了懶狗。\",\n          \"SELECT * FROM users WHERE id = 12345;\"]:\n    ids = tok.encode(s)\n    print(f\"{len(s):3d} chars -> {len(ids):3d} tokens | {s[:20]}\")\nEOF\n```\n\n**成功標準**：算出三種文本各自的 chars/token 比；能用一句話說明為什麼同一個 quota 數字對英文與中文使用者「不公平」，以及這對 gateway 計量設計的含意。\n\n## 這個領域往哪走\n\n本章的公式建立在「每個 token 對所有歷史做 full attention、KV 隨 context 線性成長」之上。這個前提正在被三條路線鬆動（2026-06）：MLA 已從 DeepSeek 的獨門變成開放權重旗艦的常見選擇（Kimi K2 採用）；DeepSeek-V4 的 DSA（sparse attention）讓每個 token 只精選一部分歷史來看，等於真的在替那張「不可索引的表」建索引；Qwen3.5 的線性注意力混合架構則讓部分層的 state 不再隨 context 成長。如果這些路線成為主流，本章的 KV 公式要改寫——但「state 大小 × 頻寬 = decode 物理」這個分析框架不會變，變的只是代入的數字。深入的評估留給 ch17。\n\n## 自我檢核\n\n1. 寫出 KV cache 大小公式，並對任一個你查得到 config.json 的 GQA 模型，心算每 token 的 KV bytes。\n2. 用 arithmetic intensity 證明：為什麼 decode 是 memory-bound、prefill 是 compute-bound？ridge point 怎麼算？\n3. Llama-3.3-70B 為什麼單張 H100 服務不了任何一條 32k 對話？2×H100 又為什麼是約 6 條？整筆帳重算一遍。\n4. GQA 相對 MHA 把 KV 縮小幾倍？這個倍數同時影響容量與頻寬兩本帳，分別怎麼影響？\n5. 為什麼 batch 能把 decode 吞吐拉高 20 倍，卻無法把它變成 compute-bound？寫出 intensity 隨 B 的漸近線並解釋 KV 為什麼不可攤提。\n6. MLA 是怎麼把 KV 壓小的？它和 GQA 的本質差異是什麼？為什麼不能事後改裝到現有模型？\n7. MoE 的 total / active 參數分別決定什麼資源的用量？「用 active 估記憶體」會在哪一步翻車？\n8. 一個 128k 的請求，prefill FLOPs 與 KV bytes 各是 32k 請求的幾倍？為什麼兩個倍數不一樣？\n\n答不出第 3 題的話，這章要重讀——全書後面會假設你閉著眼睛都算得出來。\n\n## 延伸閱讀\n\n- Vaswani et al., *Attention Is All You Need*（2017）— https://arxiv.org/abs/1706.03762 。原典。不必全讀，看架構圖與 3.2 節的 scaled dot-product attention 就夠本章使用。\n- kipply, *Transformer Inference Arithmetic*（2022）— https://kipp.ly/transformer-inference-arithmetic/ 。本章記憶體與延遲數學的最佳延伸，所有推導再走深一層。\n- Ainslie et al., *GQA: Training Generalized Multi-Query Transformer Models from Multi-Head Checkpoints*（2023）— https://arxiv.org/abs/2305.13245 。那個「省 8 倍」的出處，含品質對照實驗。\n- Shazeer, *Fast Transformer Decoding: One Write-Head is All You Need*（2019）— https://arxiv.org/abs/1911.02150 。MQA 原始論文，也是最早把「decode 是 memory-bound」講透的文獻之一。\n- DeepSeek-AI, *DeepSeek-V2*（2024）— https://arxiv.org/abs/2405.04434 。MLA 的原始定義，附各 attention 變體的 KV 對照表。\n- DeepSeek-AI, *DeepSeek-V3 Technical Report*（2024）— https://arxiv.org/abs/2412.19437 。本章 MoE 數字的一手來源，順便預習 ch09 的大規模部署。\n- Kwon et al., *Efficient Memory Management for Large Language Model Serving with PagedAttention*（2023）— https://arxiv.org/abs/2309.06180 。先只讀 §2–3：對「KV 連續配置浪費多少」的量測；系統解法等 ch05。\n- Karpathy, *Let's build the GPT Tokenizer*（2024）— https://www.youtube.com/watch?v=zduSFxRajkE 。BPE 從零實作，兩小時建立 tokenizer 的完整直覺。\n"}, {"id": "ch04-language-bridge", "file": "ch04-language-bridge.md", "group": "Part I — 心智模型與基礎", "title": "ch04 — 語言與工具橋接：Python、PyTorch、Go、CUDA", "md": "# ch04 — 語言與工具橋接：Python、PyTorch、Go、CUDA\n\n> **本章解決什麼問題**：前三章建立了 GPU 與推論的心智模型，但 AI infra 的日常工作是用你還不熟的語言進行的：serving 與 glue code 是 Python、K8s 控制面是 Go、kernel 層是 CUDA/C++。這章用你的 TypeScript/Node.js 經驗當錨點，把四個生態各自壓到「夠用的深度」——Python 要能寫生產服務、PyTorch 要能讀懂 vLLM 在寫什麼、Go 要能讀懂 controller 並做小修改、CUDA 生態要能認名詞與讀 stack trace。後面所有章節的程式碼與工具都建立在這章之上。\n\n## 從你已知的出發\n\n你已經會一件比語法更難學的事：在生產環境寫出不會半夜叫醒你的服務。語言只是載體。先把 AI infra 的語言地圖攤開：\n\n```\n產品 API / glue / serving 邏輯      Python   （FastAPI、vLLM 的上層、各種 router）\nK8s 控制面 / operator / 排程器      Go       （device plugin、Kueue、llm-d 的 EPP）\n推論引擎核心 / kernel               C++ / CUDA / Triton（vLLM 的底層、FlashAttention）\n前端與部分 CLI 工具                 TypeScript（你的主場，但在這個領域是配角）\n```\n\n關鍵是**每個語言要求的深度不同**。把目標說清楚，可以省掉你三個月的瞎學：\n\n| 語言 | 目標深度 | 對應的日常任務 |\n|---|---|---|\n| Python | **能寫**生產級服務 | 寫 proxy/router/webhook、改 vLLM 設定、寫 benchmark 腳本 |\n| PyTorch | **能讀** | 讀懂 vLLM/SGLang 原始碼的 forward path、看懂 issue 裡的程式碼片段 |\n| Go | **能讀＋小改** | 讀懂 controller 的 reconcile 邏輯、改一個 scoring 函式、提小 PR |\n| CUDA 生態 | **能認得** | 讀 stack trace、查版本相容矩陣、知道該把問題丟給誰 |\n\n你的遷移優勢比想像中大。Node 的單執行緒 event loop 直覺幾乎原封不動地對應到 asyncio；NestJS 的 decorator、DI、validation pipe 對應到 FastAPI 的 decorator、`Depends`、pydantic；你寫過的 SQS idempotent consumer——desired state 對 actual state 的對帳邏輯——就是 K8s controller 的 reconcile loop，只是換了語言。這章的寫法是「對照優先」：每個新概念都先告訴你它等於你已知的什麼，再講差異在哪、坑在哪。\n\n## Python：給 TypeScript 工程師的最短遷移路徑\n\n### 工具鏈對照表\n\n2026 年學 Python 比五年前幸福非常多，因為工具鏈經歷了一場「Rust 化」整併——你會發現新一代工具的使用體驗刻意向 npm/cargo 看齊。直接用新的，不要碰教學文章裡的舊路徑（pip + virtualenv + requirements.txt + setup.py 那一套你只需要看得懂，不需要用）。\n\n| 你熟的（TS/Node） | Python（2026 年的選擇） | 備註 |\n|---|---|---|\n| node 直譯器 / nvm | CPython / `uv python install 3.12` | uv 連直譯器版本都幫你管，nvm 的角色它一起做了 |\n| npm / pnpm | **uv** | Astral 出品，Rust 寫的，比 pip 快一到兩個數量級；2026-03 OpenAI 宣布收購 Astral（交易尚待監管批准），維護承諾不變（2026-06） |\n| package.json | pyproject.toml | 結構幾乎同構：metadata + dependencies + tool config |\n| package-lock.json | uv.lock | 一樣要進版控 |\n| node_modules/ | .venv/ | 概念不同：不是套件目錄，是一個隔離的直譯器環境；`uv run` 會自動幫你進對的環境 |\n| npx | uvx | 臨時跑一個 CLI 工具不污染環境 |\n| tsc + tsconfig.json | mypy 或 pyright | 靜態型別檢查器，**只在 CI/編輯器跑，runtime 不存在**；Astral 的 ty still in beta，目標 2026 年出 1.0（2026-06） |\n| eslint + prettier | **ruff** | 一個工具同時做 lint + format，也是 Astral/Rust 系 |\n| jest / vitest | pytest | fixture 機制比 jest 的 setup/teardown 強大，值得花一小時學 |\n| Express | Flask（上一代）/ FastAPI | 看到 Flask 教學可以直接跳過 |\n| NestJS（DI、decorator、pipes） | **FastAPI** | decorator 路由、`Depends` 依賴注入、pydantic 當 validation pipe，心智模型高度重疊 |\n| class-validator + class-transformer / zod | **pydantic** | 宣告式 schema + runtime 驗證 + 序列化，v2 核心是 Rust 寫的 |\n| fetch / axios / undici | **httpx**（async）/ requests（sync，舊生態） | httpx 同時支援 sync/async，API 模仿 requests |\n| Promise / async-await | coroutine / asyncio | 語法神似，語義有陷阱，下面細講 |\n| EventEmitter / Readable stream | async generator（`async def` + `yield`） | SSE streaming 的標準寫法 |\n\n起手式只有三行：\n\n```bash\ncurl -LsSf https://astral.sh/uv/install.sh | sh   # 裝 uv\nuv init my-service && cd my-service               # 等同 npm init\nuv add fastapi httpx \"uvicorn[standard]\"          # 等同 npm install\n```\n\n### 三個必踩的坑\n\n#### 坑一：GIL——以及 2026 年的 free-threading 現況\n\nGIL（Global Interpreter Lock）是 CPython 的一把全域鎖：**一個 process 內，同一時刻只有一條 thread 能執行 Python bytecode**。對你來說這個心智模型其實很親切——你在 Node 早就活在單執行緒世界。差別是：Node 根本不給你 thread（worker_threads 是隔離的）；Python 給你 thread，但 CPU 並行被 GIL 鎖死，thread 只對「等待 I/O」有用。\n\n那為什麼整個 AI 產業跑在 Python 上沒被 GIL 掐死？因為**重活都不在 Python 裡**。PyTorch 的矩陣乘法進到 C++/CUDA 後會釋放 GIL；tokenizer 是 Rust 寫的；Python 只負責指揮。這就是 Python 在 ML 的真實角色：一個人體工學極好的 C++/CUDA 指揮層。需要真正 CPU 並行時，生態的標準答案是 multiprocess——vLLM 的引擎架構就是多個 process 各司其職（見 ch08），跟你用 Node cluster mode 繞過單執行緒是同一個思路。\n\n現況（2026-06）：Python 3.14（目前 3.14.5）依 PEP 779 把 free-threading（no-GIL）從 experimental 升級為 officially supported，單執行緒效能損耗從 3.13 的約 40% 降到約 5–10%。但注意三件事：GIL 預設仍然開啟；free-threaded 是一個**獨立的 build**（`python3.14t`），不是開關；大量 C extension（包括部分 ML 生態）的相容性還在過渡期。我的建議：2026 年的生產服務繼續用預設 build + multiprocess，把 free-threading 當成「面試能講清楚現況」的知識點，而不是架構依賴。\n\n#### 坑二：async 生態的分裂\n\nTS 的 async 生態是統一的：所有東西都回傳 Promise。Python 的不是。你會遇到三條斷層線：\n\n1. **sync/async 函式庫二分**。`requests` 是 sync、`httpx` 是 async（也支援 sync）；很多舊函式庫只有 sync 版。在 async 函式裡呼叫 sync 的阻塞 I/O，會凍結整條 event loop——你在 Node 用 `fs.readFileSync` 踩過的坑，這裡以更隱蔽的方式重現，因為 Python 的 sync 函式長得跟 async 的一模一樣，沒有編譯器擋你。\n2. **event loop 實作分裂**：asyncio（標準庫）之外還有 trio/anyio。你只需要知道 asyncio 是主流、FastAPI 底層用 anyio 抽象，看到 trio 風格的 API（structured concurrency）知道它在講什麼即可。\n3. **FastAPI 的 `def` vs `async def` 陷阱**：`async def` handler 跑在 event loop 上，`def` handler 會被丟進 threadpool（預設 40 條 thread）。所以「在 `async def` 裡呼叫 `requests`」會卡死所有人，但「在 `def` 裡呼叫 `requests`」反而沒事——這個行為對 Node 工程師是反直覺的，記下來。\n\n把 Python 的併發選項整理成決策框架，工作來了照表抓：\n\n| 工作性質 | 用什麼 | 理由與代價 |\n|---|---|---|\n| 網路 I/O 密集（proxy、router、webhook） | asyncio + async 函式庫 | 跟你的 Node 直覺一致；代價是整條呼叫鏈都得是 async，混入一個 sync 呼叫就全毀 |\n| 偶發的 blocking 呼叫（舊函式庫、檔案 I/O） | `asyncio.to_thread()` 丟 threadpool | GIL 在等 I/O 時會釋放，threadpool 對 I/O 有效；對 CPU-bound 無效 |\n| CPU-bound（大量 tokenize、壓縮、解析） | multiprocess（`ProcessPoolExecutor`）或交給 Rust/C++ 函式庫 | 繞過 GIL 的正道；代價是跨 process 序列化開銷與記憶體翻倍 |\n| GPU-bound | 不關 Python 的事 | 重活在 CUDA kernel 裡，Python 只負責別擋路（別在熱路徑插 blocking 呼叫） |\n\n#### 坑三：型別只是註記\n\nTS 的型別至少有編譯期強制——`tsc` 不過就是不過。Python 的 type hints 在執行期**完全不存在**：`def f(x: int)` 傳進字串照樣跑，跑到爆炸為止。防線有兩道，缺一不可：\n\n- **CI 防線**：mypy 或 pyright 當作你的 `tsc --noEmit`，沒過不准合。\n- **邊界防線**：pydantic 在所有資料進入點（HTTP body、設定檔、佇列訊息）做 runtime 驗證——角色完全等同你在 NestJS 用 class-validator 守 DTO、或用 zod 守 API 邊界。內部函式之間靠 type hints + CI，邊界靠 pydantic，這是 2026 年 Python 服務的標準分工。\n\n### Worked example：同一個併發 HTTP 呼叫，TS vs Python 逐行對照\n\n需求：併發呼叫多個 URL，每個呼叫帶 2 秒逾時、最多重試 3 次（指數退避）、5xx 與網路錯誤可重試、4xx 直接失敗、聚合所有結果不要 fail-fast。這是你寫過一百遍的程式，現在看它在兩個語言的長相。\n\n你熟的 TS 版（Node 24 LTS，2026-06）：\n\n```typescript\n// fetch_all.ts\nclass HttpError extends Error {\n  constructor(public status: number, msg: string) { super(msg); }\n}\n\nconst retryable = (e: unknown) =>\n  e instanceof HttpError ? e.status >= 500 : true;     // 網路錯誤/timeout 一律可重試\n\nasync function fetchWithRetry(url: string, retries = 3, timeoutMs = 2_000) {\n  let lastErr: unknown;\n  for (let attempt = 0; attempt <= retries; attempt++) {\n    try {\n      const res = await fetch(url, { signal: AbortSignal.timeout(timeoutMs) }); // (1)\n      if (!res.ok) throw new HttpError(res.status, `upstream ${res.status}`);\n      return await res.json();                                                  // (2)\n    } catch (err) {\n      lastErr = err;\n      if (!retryable(err) || attempt === retries) throw err;\n      await new Promise((r) => setTimeout(r, 2 ** attempt * 100));              // (3)\n    }\n  }\n  throw lastErr;\n}\n\nconst urls = [\"http://localhost:11434/api/tags\" /* , ... */];\nconst results = await Promise.allSettled(urls.map((u) => fetchWithRetry(u)));   // (4)(5)\nfor (const r of results)\n  console.log(r.status === \"fulfilled\" ? r.value : `FAILED: ${r.reason}`);\n```\n\n語義相同的 Python 版（3.12+）：\n\n```python\n# fetch_all.py — uv add httpx 之後 uv run fetch_all.py\nimport asyncio\nimport httpx\n\ndef retryable(err: Exception) -> bool:\n    if isinstance(err, httpx.HTTPStatusError):\n        return err.response.status_code >= 500\n    return isinstance(err, (httpx.TransportError, TimeoutError))\n\nasync def fetch_with_retry(client: httpx.AsyncClient, url: str,\n                           retries: int = 3, timeout_s: float = 2.0):\n    for attempt in range(retries + 1):\n        try:\n            async with asyncio.timeout(timeout_s):                    # (1)\n                res = await client.get(url)\n            res.raise_for_status()        # 4xx/5xx 變成 exception\n            return res.json()             # (2) 注意：沒有 await——httpx 的 .json() 是同步的\n        except Exception as err:\n            if not retryable(err) or attempt == retries:\n                raise\n            await asyncio.sleep(2 ** attempt * 0.1)                   # (3)\n\nasync def main():\n    urls = [\"http://localhost:11434/api/tags\"]  # 換成你的目標\n    async with httpx.AsyncClient() as client:                         # (6)\n        coros = (fetch_with_retry(client, u) for u in urls)           # (7) 此刻什麼都還沒發生！\n        results = await asyncio.gather(*coros, return_exceptions=True)  # (4)(5)\n    for url, r in zip(urls, results):\n        print(url, \"->\", f\"FAILED: {r!r}\" if isinstance(r, BaseException) else r)\n\nasyncio.run(main())                                                   # (8)\n```\n\n逐點對照（編號對應兩段程式碼的註解）：\n\n| # | TS | Python | 差異與坑 |\n|---|---|---|---|\n| (1) | `AbortSignal.timeout()` | `asyncio.timeout()` | JS 的取消是**合作式 API**（被呼叫方要支援 signal）；Python 的取消是**語言級機制**——timeout 到期會把 `CancelledError` 注入 coroutine 的 await 點，任何 await 中的操作都會被打斷。更強，但也意味著你的 cleanup 邏輯（`finally`）必須能在任意 await 點被觸發 |\n| (2) | `await res.json()` | `res.json()` | fetch 的 body 是 stream 所以 `.json()` 回 Promise；httpx 非 streaming 模式下 body 已讀完，`.json()` 是同步的。對它 `await` 不會錯（Python 會直接報錯），但**該 await 沒 await 才是大坑**，見 (7) |\n| (3) | `new Promise(r => setTimeout(r, ms))` | `asyncio.sleep(s)` | Python 原生提供，且**單位是秒不是毫秒**——這個單位差異在 timeout 設定上錯一次就是 2000 秒的逾時 |\n| (4) | `Promise.allSettled` | `gather(return_exceptions=True)` | 語義等價。但 `gather` **預設**是類似 `Promise.all` 的 fail-fast——而且第一個錯誤拋出後，其餘 task 仍在背景繼續跑、結果沒人收，是殭屍工作的常見來源。3.11+ 的 `asyncio.TaskGroup` 才有「一人失敗、取消全組」的 structured concurrency 語義 |\n| (5) | callback 風格 map | generator 解包 | 寫法差異而已 |\n| (6) | fetch 內建全域連線池 | `AsyncClient` 要自己管生命週期 | **每個請求 new 一個 client = 沒有 keep-alive、每次重建 TLS**，是 Python 服務最常見的效能 bug 之一。建一次、全程共用、結束時關閉 |\n| (7) | async 函式**呼叫即執行**（eager） | coroutine 是 **lazy** | `fetch_with_retry(...)` 呼叫當下什麼都不會發生，要等 `await` 或包成 task。忘記 await 的症狀：一行 `RuntimeWarning: coroutine ... was never awaited` 警告，然後你的邏輯**靜默地沒有執行**。這是 TS 工程師寫 Python 的第一大坑 |\n| (8) | top-level await | `asyncio.run()` | Python 沒有 top-level await（REPL 除外），進入點要顯式起 event loop |\n\n把這張表讀熟，你的 TS async 直覺就能安全著陸。\n\n## 你會寫一輩子的 glue code：FastAPI streaming proxy\n\nAI infra 工程師寫得最多的服務形態，就是「站在 OpenAI-compatible API 前面或後面的東西」：加認證、加計量、加路由、加快取、改寫請求。它們的共同骨架是一個會轉發 SSE streaming 的 proxy。這裡給一個完整可跑的版本，後面章節的 gateway、admission control、token 計量（見 ch12、ch16）都會在這個骨架上長出來。\n\nSSE（Server-Sent Events）對你不是新東西——它就是單向的、跑在純 HTTP 上的 WebSocket 替代品：`Content-Type: text/event-stream`，每個事件是 `data: {...}\\n\\n`，以空行分隔。OpenAI-compatible API 的 streaming 回應就是一連串 `data:` 事件，最後一個是 `data: [DONE]`。你做過 WebSocket + Redis Pub/Sub 的訊息 fan-out，所以這些工程問題你都處理過：長連線的生命週期、斷線時的資源清理、中間層 buffering。差別在於 LLM 的 SSE 連線**每一秒都在燒 GPU**——一條沒清乾淨的殭屍連線，在遊戲後端是洩漏一個 socket，在這裡是白燒一張卡的算力，所以下面範例對清理路徑的偏執是有價格依據的。\n\n```toml\n# pyproject.toml\n[project]\nname = \"llm-proxy\"\nversion = \"0.1.0\"\nrequires-python = \">=3.12\"\ndependencies = [\n    \"fastapi>=0.136\",        # 2026-06 時點的當前系列\n    \"uvicorn[standard]>=0.30\",\n    \"httpx>=0.28\",\n    \"pydantic>=2.13\",\n]\n```\n
