 `kubectl api-resources` 確認你叢集的版本）：\n\n```yaml\napiVersion: kueue.x-k8s.io/v1beta1\nkind: ResourceFlavor\nmetadata:\n  name: h100\nspec:\n  nodeLabels:\n    nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3\n---\napiVersion: kueue.x-k8s.io/v1beta1\nkind: ClusterQueue\nmetadata:\n  name: cq-team-chat\nspec:\n  cohort: shared-h100\n  namespaceSelector:\n    matchLabels: { team: chat }\n  preemption:\n    reclaimWithinCohort: Any          # 流量回來，無條件搶回被借走的配額\n    withinClusterQueue: LowerPriority\n  resourceGroups:\n  - coveredResources: [\"nvidia.com/gpu\"]\n    flavors:\n    - name: h100\n      resources:\n      - name: \"nvidia.com/gpu\"\n        nominalQuota: 24\n        borrowingLimit: 8             # 極端尖峰可再借 8（誰閒借誰）\n---\napiVersion: kueue.x-k8s.io/v1beta1\nkind: ClusterQueue\nmetadata:\n  name: cq-research\nspec:\n  cohort: shared-h100\n  namespaceSelector:\n    matchLabels: { team: research }\n  preemption:\n    reclaimWithinCohort: Never        # 只借不搶\n    withinClusterQueue: LowerPriority\n  resourceGroups:\n  - coveredResources: [\"nvidia.com/gpu\"]\n    flavors:\n    - name: h100\n      resources:\n      - name: \"nvidia.com/gpu\"\n        nominalQuota: 24\n        borrowingLimit: 24            # 夜間最多膨脹到 48\n        lendingLimit: 16              # 保底 8 卡永不外借\n---\napiVersion: kueue.x-k8s.io/v1beta1\nkind: LocalQueue\nmetadata:\n  name: lq-research\n  namespace: research\nspec:\n  clusterQueue: cq-research\n---\napiVersion: kueue.x-k8s.io/v1beta1\nkind: WorkloadPriorityClass\nmetadata:\n  name: research-default\nvalue: 100\n---\n# namespace 級硬上限：防止任何配置錯誤讓單一租戶吃光叢集\napiVersion: v1\nkind: ResourceQuota\nmetadata:\n  name: gpu-hard-cap\n  namespace: research\nspec:\n  hard:\n    requests.nvidia.com/gpu: \"48\"     # nominal 24 + borrowingLimit 24\n```\n\nresearch 的 8 卡 gang job 再加兩道保險：Kueue 的 `waitForPodsReady`（all-or-nothing，防 gang deadlock）與 TAS annotation 要求落在同一節點：\n\n```yaml\n# research 的 Job pod template（節選，示意）\nmetadata:\n  annotations:\n    kueue.x-k8s.io/podset-required-topology: kubernetes.io/hostname\nspec:\n  priorityClassName: research-default\n  containers:\n  - resources: { limits: { nvidia.com/gpu: 8 } }\n```\n\n**走一遍一天的劇本**：23:00 產品流量退潮，chat 縮到 4 副本（16 卡）、api 縮到 10 卡——叢集閒出 14 卡；research 佇列裡的 job 依序 admit，借滿到 38 卡上下。07:30 流量回升，chat 的第 6 副本要 4 卡但叢集滿載 → Kueue 依 `reclaimWithinCohort` 挑 research 借用中、優先級最低的 workload evict（整組 gang 一起退，不會殺半套）→ 4 卡釋放 → 產品副本就位。research job 回佇列等下一個低谷。**設計的隱含前提是 research workload 必須可中斷**（checkpoint 紀律），這是借用方案的社會契約：借到的算力本來就是會被收走的算力。\n\n最後一個誠實註記：Kueue 管「誰先進、用多少」極好，但 serving 副本是長駐 Pod，它的容量主要由 ch13 的 autoscaling 管理；這套方案裡 Kueue 的主要客戶是 research 與兩個產品隊的 batch 類負載，產品 serving 的保障來自 nominal 配額 + 搶占權的組合。\n\n## 故障模式與防禦\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|------|------|----------|------|\n| device plugin 崩潰 | 新 Pod 全部 Pending（`Insufficient nvidia.com/gpu`），既有 Pod 卻正常；`nvidia-smi` 看卡明明都在 | `kubectl describe node` 看 Capacity/Allocatable 歸零；plugin DaemonSet 日誌 | 對「節點 GPU capacity 突降」設告警；plugin 升級走 canary |\n| driver/CUDA 不相容 | 容器 CrashLoop：`CUDA driver version is insufficient for CUDA runtime version` | 容器日誌 + 節點 driver 版本比對 | 相容矩陣進 CI；driver 版本 IaC 釘死；canary node pool |\n| toolkit/runtime 配置壞 | Pod Running 但容器內 `Failed to initialize NVML` | validator pod 狀態；toolkit 日誌 | GPU Operator validator 常開；節點上線冒煙測試 |\n| GFD/NFD label 缺失 | Pending，但原因是 nodeSelector 匹配不到（跟缺卡長得很像） | `kubectl get node --show-labels` 對照 Pod 的 selector | 把關鍵 label 存在性納入節點 readiness 檢查 |\n| MIG 重切卡死 | `mig.config` label 改了但狀態停在 pending | MIG Manager 日誌：等待節點清空 | 重切流程綁 drain 自動化；用 `mixed` 策略前想清楚資源名爆炸 |\n| time-slicing 連坐 OOM | 同卡多個 Pod 同時死；dmesg 有 Xid | DCGM/dmesg + 同節點 Pod 死亡時間相關性 | time-slicing 限 dev namespace；生產一律 MIG 或整卡 |\n| GPU 碎片化 | 大 gang job 永遠 Pending，帳面利用率卻很低 | 每節點 free GPU 直方圖（不是叢集總和！） | bin-packing scoring、大小負載分池、gang admission |\n| gang deadlock | 兩個多卡 job 各占一半資源互等，叢集假死 | 多個 job 長期 partial running | Kueue `waitForPodsReady` / Volcano gang；禁止裸 Pod 搶多卡 |\n| preemption storm | 高優先負載觸發連鎖搶占；被殺的推論 Pod 重啟要重載權重（分鐘級），服務真空 | eviction events 突增 + 容量曲線 | 搶占代價意識：headroom 留足（ch13）、低優先層用 `preemptionPolicy: Never` 的中間層緩衝、checkpoint 紀律 |\n| 壞卡迴圈 | 某節點上的 job 反覆 CUDA error → 重排 → 又錯 | 同一節點的失敗率異常集中；DCGM Xid 計數 | DCGM 健康檢查 → 自動 cordon/drain 迴路（ch15 詳） |\n\n共同主題：GPU 世界的故障訊號常常**長得跟排程問題一模一樣**（都是 Pending/CrashLoop），而排程問題又常常是錢的問題（碎片化）。診斷的第一步永遠是分清楚：是沒有卡、看不到卡、還是湊不出形狀。\n\n## 動手做\n\n### Lab：用 kind + KWOK + fake-gpu-operator 搭一座 64 卡模擬叢集 **[M1]**\n\n本章重頭戲，對應 plan.md 旗艦專案①的地基。零 GPU 費用，在 M1 上模擬出本章 worked example 的那座 64 卡叢集，親手觀察排程、碎片化、配額借用與搶占。後續 ch12/ch13/ch14 的實驗都長在這座叢集上，值得把它做成一鍵 `setup.sh`。\n\n策略是雙層模擬：**kind 真節點 + fake-gpu-operator** 提供高擬真層（真的 device plugin 流程、假 `nvidia-smi`、DCGM 指標）；**KWOK 假節點**提供規模層（湊滿 8 節點 64 卡，只為餵 scheduler）。要懂的限制：KWOK 節點上的 Pod 是被 kwok controller「宣告成 Running」的，不真執行——所以 DaemonSet（含 device plugin）在 KWOK 節點上也是假的，64 卡的 capacity 要直接寫進假節點的 status。這個限制本身就是教材：你會被迫分清楚「device plugin 宣告資源」與「節點 status 有資源」是兩件事。\n\n**Step 0 — 工具**（已有 Docker/colima 環境）：\n\n```bash\nbrew install kind kubectl helm\n# kwok 用 manifest 安裝進叢集即可，不需本機 binary\n```\n\n**Step 1 — kind 叢集**：1 control-plane + 2 worker（這 2 個是高擬真 GPU 節點）。\n\n```bash\ncat <<EOF | kind create cluster --name gpu-sim --config=-\nkind: Cluster\napiVersion: kind.x-k8s.io/v1alpha4\nnodes:\n- role: control-plane\n- role: worker\n- role: worker\nEOF\n```\n\n**Step 2 — fake-gpu-operator**（v0.0.x 系列，活躍維護中，2026-06）：標記節點、用 Helm 裝，topology 設成每節點 8 張 H100。\n\n```bash\nkubectl label node gpu-sim-worker gpu-sim-worker2 \\\n  run.ai/simulated-gpu-node-pool=default\n\nhelm upgrade -i fake-gpu-operator \\\n  oci://ghcr.io/run-ai/fake-gpu-operator/fake-gpu-operator \\\n  --namespace gpu-operator --create-namespace \\\n  --set topology.nodePools.default.gpuProduct=NVIDIA-H100-80GB-HBM3 \\\n  --set topology.nodePools.default.gpuCount=8\n```\n\n**成功標準**：`kubectl describe node gpu-sim-worker` 出現 `nvidia.com/gpu: 8`；部署一個 requests `nvidia.com/gpu: 2` 的測試 Deployment 能排上去，exec 進 Pod 跑 `nvidia-smi` 看到假的 H100 清單（fake-gpu-operator 注入的模擬器；若你的 image 太精簡看不到，換 ubuntu 基底）。順手看一眼它的 DCGM exporter 假指標——ch14 會接 Prometheus。\n\n**Step 3 — KWOK 擴規模**：裝 kwok controller 與 stages，然後造 6 個假 GPU 節點，湊滿 8×8=64。\n\n```bash\nKWOK_REPO=kubernetes-sigs/kwok\nLATEST=$(curl -s https://api.github.com/repos/${KWOK_REPO}/releases/latest | jq -r .tag_name)\nkubectl apply -f https://github.com/${KWOK_REPO}/releases/download/${LATEST}/kwok.yaml\nkubectl apply -f https://github.com/${KWOK_REPO}/releases/download/${LATEST}/stage-fast.yaml\n\nfor i in $(seq 0 5); do\ncat <<EOF | kubectl apply -f -\napiVersion: v1\nkind: Node\nmetadata:\n  name: kwok-gpu-${i}\n  annotations:\n    kwok.x-k8s.io/node: fake\n  labels:\n    type: kwok\n    nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3\nspec:\n  taints:\n  - key: kwok.x-k8s.io/node\n    value: fake\n    effect: NoSchedule\nstatus:\n  allocatable: { cpu: \"64\", memory: 512Gi, nvidia.com/gpu: \"8\", pods: \"110\" }\n  capacity:    { cpu: \"64\", memory: 512Gi, nvidia.com/gpu: \"8\", pods: \"110\" }\nEOF\ndone\n```\n\n**成功標準**：`kubectl get nodes` 看到 9 個節點；對假負載加上 toleration 後，requests 64 卡的總量可以全數排上。注意我們給假節點上了 taint——這是模擬叢集的衛生習慣，防止真元件（如 Prometheus）被排到假節點上「假裝運行」，這種靜默的假成功是模擬環境最陰的故障模式。\n\n**Step 4 — 碎片化實驗**：先用 podAntiAffinity（或手動 nodeName）把 8 個單卡 Pod 一節點一個撒開，再提交一個 8 卡 Pod。\n\n**成功標準**：8 卡 Pod Pending，event 顯示 `0/9 nodes are available: ... Insufficient nvidia.com/gpu`——同時 `kubectl describe nodes | grep -A2 'nvidia.com/gpu'` 顯示叢集還有 56 張閒卡。把這兩個輸出截圖並排，就是「碎片化是什麼」的完美教材。然後部署上面那個 `MostAllocated` 的第二 scheduler，把單卡 Pod 換成 `schedulerName: binpack-gpu` 重撒一次，驗證它們聚到最少的節點上、8 卡 Pod 立刻可排。\n\n**Step 5 — Kueue 配額與搶占**：裝 Kueue，套用 worked example 的全套 YAML（三個 ClusterQueue、cohort、優先級）。然後演那場「夜間借卡、白天搶回」的戲：\n\n1. 以 research 身分提交一批 8 卡 Job（帶 `kueue.x-k8s.io/queue-name: lq-research`），讓它借用到 40+ 卡。\n2. 以 team-chat 身分提交高優先 workload 把配額需求頂回 24。\n3. 觀察：`kubectl get workloads -A` 與 events——research 的 workload 被 evict（整組、不是殺一半）、requeue，chat 的 workload admit。\n\n**成功標準**：能用 `kubectl describe clusterqueue cq-research` 的 `flavorsUsage` 講出借用量的變化曲線；能指著 event 時間軸說明 reclaim 的因果鏈。\n\n**Step 6（選做）— MIG 模擬**：fake-gpu-operator 支援基本的 MIG 資源模擬（2026-06，功能標註為 basic），把一個 node pool 的 topology 改成 MIG profile、用 `nvidia.com/mig-3g.40gb` 資源名部署小負載，體驗 `mixed` 策略下 quota 與 nodeSelector 的管理面積膨脹。\n\n整個 lab 估半天到一天。最有價值的產出不是叢集本身，而是你把每一步「預期 vs 實際」寫下來的紀錄——模擬器與真叢集的差異清單（KWOK Pod 不真跑、fake nvidia-smi 沒有真功耗、沒有真 NVLink 拓撲），就是你對「這套機制的本體 vs 表象」理解程度的測驗。\n\n### 紙上推演：MIG 的 roofline 帳 **[紙上推演]**\n\n用 ch02/ch03 的方法算：8B 模型 FP16 放在 H100 的 `3g.40gb` instance（約 1/2 記憶體頻寬）上，decode 理論 token rate 上限是整卡的幾成？同一張卡切 2 個 `3g.40gb` 跑兩個 8B 副本，總吞吐跟整卡跑一個大 batch 的 8B 比，誰贏？贏多少？（提示：答案取決於 batch size 是否已經把整卡推到 compute-bound——這題做完，你對「要不要切 MIG」就有決策框架了。）\n\n## 這個領域往哪走\n\n- **DRA 全面接管是時間問題**：AI Conformance 把 DRA 列為 MUST、主要發行版陸續 GA，未來 1–2 年新叢集會以 DRA 為預設資源模型，device plugin 進入長尾維護。值得押注的理解是物件模型與 structured parameters 的設計，不是某個 driver 的安裝細節。\n- **「可分割、可計量」的 GPU 語意**（partitionable devices、consumable capacity）成熟後，GPU 會第一次擁有接近 CPU/memory 的請求語意——屆時 quota、bin-packing、共享技術三件套的邊界都會重畫。\n- **排程的單位在變大**：NVL72 之後 rack 是新的「節點」，ComputeDomain 這類「一組互連硬體」的抽象會越來越重要；電力與功耗作為排程約束（power-aware scheduling）也開始進入視野（ch17）。\n\n## 自我檢核\n\n1. Device plugin 模型下，為什麼 GPU 不可超賣、requests 必須等於 limits？scheduler 與 kubelet 在一次 GPU 配置中各做了什麼決策、各看不到什麼？\n2. 面試官給你三個場景：20 人的 data science notebook 平台、一個 8B 模型要跑 12 個低延遲副本、對外賣 GPU 算力的多租戶平台——time-slicing/MPS/MIG 各選哪個？說出每個選擇的隔離邊界與代價。\n3. DRA 的四個物件（ResourceSlice/DeviceClass/ResourceClaim/ResourceClaimTemplate）分別由誰建立、誰消費？structured parameters 解了 device plugin 的哪一條根本限制，為什麼這讓拓撲感知排程變得可能？\n4. 叢集帳面還有 56 張閒卡，一個 8 卡 job 卻 Pending 了三小時。給出你的診斷步驟（看什麼指令的什麼輸出），以及三種預防機制。\n5. 用 Kueue 的 `nominalQuota`/`borrowingLimit`/`lendingLimit`/`reclaimWithinCohort` 解釋「研究隊夜間借卡、產品隊白天搶回」怎麼實現。借用方案對研究隊的 workload 形態提出了什麼隱含要求？\n6. 為什麼 LLM serving Pod 被 preempt 的代價遠高於一般 web 服務的 Pod？這對 priority class 與 headroom 設計有什麼含意？\n7. GPU 節點的 driver 升級為什麼不能像一般 node pool 一樣滾動了事？至少列出三層需要對齊的版本，以及一個安全的升級流程。\n8. StatefulSet 拿來部署一個 2 節點 16 卡的推論實例，會在哪三個地方不夠用？LWS 各用什麼機制補上？\n\n## 延伸閱讀\n\n- [Kubernetes 官方文件：Dynamic Resource Allocation](https://kubernetes.io/docs/concepts/scheduling-eviction/dynamic-resource-allocation/) — DRA 物件模型與 CEL selector 的權威定義，讀完本章後對照 API 細節的第一站。\n- [Kubernetes v1.34 DRA GA 公告](https://kubernetes.io/blog/2025/09/01/kubernetes-v1-34-dra-updates/) 與 [v1.36 DRA 更新](https://kubernetes.io/blog/2026/05/07/kubernetes-v1-36-dra-136-updates/) — 官方視角的演進路線，後者也介紹了 AI Conformance 與 DRA 的關係。\n- [NVIDIA GPU Operator 文件](https://docs.nvidia.com/datacenter/cloud-native/gpu-operator/latest/) — 全家桶每個元件的安裝與配置細節，特別是 GPU sharing（time-slicing/MPS）與 DRA driver 整合章節。\n- [NVIDIA MIG User Guide](https://docs.nvidia.com/datacenter/tesla/mig-user-guide/) — profile 表、切分規則與限制的一手來源。\n- [Kueue 官方文件](https://kueue.sigs.k8s.io/docs/) — ClusterQueue/cohort/preemption/TAS 的概念文件寫得意外地好，本章 worked example 的所有欄位語意都能在這裡查證。\n- [LeaderWorkerSet 文件](https://lws.sigs.k8s.io/) — 多節點推論部署原語的設計動機與 API。\n- [KWOK](https://kwok.sigs.k8s.io/) 與 [run-ai/fake-gpu-operator](https://github.com/run-ai/fake-gpu-operator) — 本章 lab 的兩塊地基；fake-gpu-operator 的 README 含 DRA 與 ComputeDomain 模擬的最新支援狀態。\n- [kubernetes-sigs/dra-driver-nvidia-gpu](https://github.com/NVIDIA/k8s-dra-driver-gpu) — NVIDIA GPU 的 DRA driver（原 NVIDIA org，已移交 kubernetes-sigs），追蹤 GPU allocation 與 ComputeDomain 支援進度的源頭。\n"}, {"id": "ch12-platform-architecture", "file": "ch12-platform-architecture.md", "group": "Part IV — 平台工程", "title": "ch12 — 推論平台架構：從 gateway 到引擎的全鏈路", "md": "# ch12 — 推論平台架構：從 gateway 到引擎的全鏈路\n\n> **本章解決什麼問題**：ch08 教你把一個引擎跑起來，ch10 講了引擎池上面的智慧路由，ch11 打好了 K8s 的 GPU 地基。本章把它們組裝成一個完整的生產平台：請求從 client 進來，經過認證、計量、admission control、模型路由、endpoint 選擇，最後到 vLLM pod 吐出 token——每一段用什麼協定、會怎麼壞、為什麼傳統 L7 load balancer 在這裡不夠用。這是系統設計面試的核心題型（ch18 會拿本章的圖去面試），也是你 API gateway 與 WebSocket 經驗最直接變現的一章。Autoscaling 訊號（ch13）、可靠性細節（ch15）、計費（ch16）在各自章節深談。\n\n## 從你已知的出發\n\n你維護過 KrakenD：認證、rate limiting、路由規則、聚合——API gateway 這層你閉著眼睛能畫。你也做過 WebSocket fan-out：長連線的生命週期管理、斷線偵測、心跳、buffer 管理。LLM 推論平台的前半段就是這兩件事的組合，只是物理常數變了三個地方：\n\n1. **請求成本的變異從 10 倍變成 10,000 倍**。你的遊戲 API，最慢的端點跟最快的差一兩個量級，所以 least-request LB 夠用——「一個請求 ≈ 一份負擔」的假設近似成立。LLM 請求徹底打破它：一個 10 token 的問答跟一個 100k token 的 RAG prompt，成本差四個量級，而且**從 URL 和 header 完全看不出來**——成本藏在 JSON body 的 prompt 裡，還有一半（會生成幾個 token）連 body 都看不出來。對 connection 數或 request 數做均衡，等於對著雜訊做均衡。\n2. **Backend 不再是無狀態的**。ch05/ch10 講過：每個 replica 的 prefix cache 內容不同，同一個請求打到「快取命中的 pod」跟「冷 pod」，TTFT 差可達數十倍（llm-d 在 8 pods/16×H100 上量到 prefix-aware routing 對 round-robin 有 57 倍 TTFT 差距——專案自報數字，但量級方向業界公認）。路由器必須知道每個 backend 的狀態才能做對決策。你做過 session affinity，方向相同，但這裡黏錯的代價不是「重建 session」而是「重算整段 prefill」。\n3. **回應從「一個 response」變成「一條持續數秒到數分鐘的 stream」**。你的 WebSocket 直覺幾乎全部適用——只是業界選的載體是 SSE（Server-Sent Events），一條披著普通 HTTP response 外衣的單向長流。它繼承了 HTTP 生態的一切好處，也繼承了 HTTP 生態裡每一個會咬斷長連線的中間件。\n\n把這三條變化想清楚，本章的每個元件都是在回答其中一條。\n\n## 參考架構全圖\n\n先上圖，再逐個箭頭講協定與失敗模式。這張圖是本章的骨架，也是你面試時要能默畫的圖：\n\n```text\n                 ①HTTPS/SSE        ②HTTP (內部)                ④HTTP/SSE\n [Client/SDK] ─────────────> [API Gateway] ─────────────> [Inference Gateway] ─────────> [Engine Fleet]\n                              ・認證/API key                 (Envoy data plane)           vLLM pods × N\n                              ・token 計量(ch16)              ・per-model HTTPRoute        ┌────────────┐\n                              ・rate limit                    ・轉發到 EPP 指定的 pod      │ base model │\n                              ・admission control                  │        ▲             │ +LoRA × M  │\n                                                              ③ext-proc│        │⑤metrics │ /metrics   │\n                                                                (gRPC) │        │ scrape   └────────────┘\n                                                                       ▼        │                │\n                                                              [EPP Endpoint Picker]              │⑦\n                                                               ・讀 InferencePool CRD ⑥          ▼\n                                                               ・queue/KV/LoRA 指標        [權重儲存/快取層]\n                                                               ・挑出目標 pod               S3/OCI ─> 節點 NVMe\n                                                               (scoring 機制見 ch10)        ─> P2P 同儕 ─> HBM\n```\n\n| 箭頭 | 協定 | 關鍵語意 | 典型失敗模式 |\n|---|---|---|---|\n| ① Client → API GW | HTTPS + SSE（長流） | 逾時必須是 idle-based 而非總時長；斷線要往下游傳播 | 中間件 idle timeout 砍斷長 stream；proxy buffering 毀掉 TTFT；client 斷線未傳播 → 引擎繼續算沒人收的 token |\n| ② API GW → IGW | HTTP（內部網路） | 認證已完成，帶上 tenant/priority metadata；**首 token 後不可盲目重試** | 重試一個已部分 stream 的請求 = 重算全部 + 重複計費；admission 佇列溢出未回 429 |\n| ③ IGW ↔ EPP | gRPC（Envoy ext-proc） | 每個請求都過 EPP 一手；EPP 決策延遲直接加在 TTFT 上 | EPP 掛掉 → fail-open（退化成普通 LB，效能劣化）或 fail-closed（全量 5xx），必須明確選一個並測試過 |\n| ④ IGW → vLLM pod | HTTP/1.1 或 HTTP/2 + SSE | 直連 EPP 指定的 pod（繞過 kube-proxy 的隨機性） | 打到正在 drain 的 pod（見 ch15）；pod OOM 死在 stream 中途——HTTP 200 早就發出去了，錯誤只能以斷流呈現 |\n| ⑤ EPP ← pods | HTTP `/metrics` 拉取或 ZMQ/事件推送 | EPP 對 fleet 狀態的視圖永遠是滯後的 | 指標過期 → 路由決策基於幻覺；scrape 失敗 → 該 pod 從候選消失或以舊資料留任 |\n| ⑥ EPP ← K8s API | watch InferencePool/Pod | reconcile 延遲秒級 | endpoint 清單滯後：新 pod 沒進池（容量浪費）、死 pod 還在池（部分請求黑洞） |\n| ⑦ Pod ← 權重層 | S3 API / OCI pull / P2P / NVMe | cold start 的主要時間都花在這條邊（本章後半解剖） | S3 throttling（503 SlowDown）；HF Hub 限流或檔案被改版；節點 NVMe 被權重快取塞爆（ch15） |\n\n兩個全圖層級的觀察：\n\n- **認證計量在最前、狀態感知在中間、重狀態在最後**。API gateway 那層是你既有技能的直接平移（KrakenD 換成 Envoy/Kong/雲端 API GW 都一樣），唯一的新東西是計量單位從 request 變成 token（ch16）。真正的新物種是中間那層 inference gateway——它存在的理由就是開頭那三條物理變化。\n- **admission control 必須在最前面**。引擎的 waiting 佇列是無界的、不會回 429（ch06 講過）；如果讓過載流量一路漏到引擎才堆積，TTFT 會無聲爆炸而 GPU 指標一切正常。你在遊戲後端做過 backpressure，原則照搬：**拒絕要趁早，排隊要有界，佇列深度要可見**。LLM 的特殊處在於「成本預估」——admission 想按成本放行，就得估 prompt token 數（粗估 chars/4，或在 gateway 跑一個快速 tokenizer），輸出端則只能用 `max_tokens` 上限保守估。死亡螺旋的完整動力學與防禦位置在 ch13。\n\n## 為什麼 L7 LB 不夠：Gateway API Inference Extension\n\n上面那層 inference gateway 並不是每家自己發明一套。2025–2026 年 Kubernetes 社群把它標準化成 **Gateway API Inference Extension**（GIE，也叫 Inference Gateway / IGW）：v1.0 於 2025 下半 GA，本書寫作時最新為 v1.5.0（2026-04）。它是 Gateway API 的延伸，不是新 gateway——任何支援 Gateway API + Envoy ext-proc 的實作（Envoy Gateway、kgateway、GKE Inference Gateway、NGINX Gateway Fabric…）都能升級成 inference gateway。兩個核心元件：\n\n**InferencePool**：一個 CRD，代表「一組可以互相替代的推論 pod」——同一個 base model、同一套配置的 replicas。它取代 K8s `Service` 作為 HTTPRoute 的 backend：\n\n```yaml\n# 示意：一個模型一個 InferencePool，HTTPRoute 按模型名分流\napiVersion: inference.networking.k8s.io/v1\nkind: InferencePool\nmetadata:\n  name: llama-70b-pool\nspec:\n  selector:\n    matchLabels: { app: vllm-llama-70b }\n  targetPorts:\n  - number: 8000\n  endpointPickerRef:        # 把「挑哪個 pod」外包給 EPP\n    name: llama-70b-epp\n    port: { number: 9002 }\n```\n\n**EPP（Endpoint Picker）**：InferencePool 附帶的一個獨立服務，透過 Envoy 的 **ext-proc 協定**（gRPC streaming）介入每個請求：Envoy 把請求 header/body 交給 EPP，EPP 根據它持續追蹤的 per-pod 指標——**waiting queue 深度、KV cache 利用率、目前載入的 LoRA adapters**——挑出目標 pod，以 header 回給 Envoy，Envoy 直連該 pod。為什麼非要這樣繞一圈？逐條對應開頭的物理變化：\n\n- **模型名在 body 裡**。OpenAI-compatible API 的路由鍵是 JSON body 的 `\"model\"` 欄位，URL 一律是 `/v1/chat/completions`。傳統 L7 路由按 path/header 分流，在這裡是瞎的。GIE 提供 Body-Based Routing（BBR）元件把 body 裡的模型名提取成 header，讓 HTTPRoute 能按模型分流到不同 InferencePool。\n- **均衡的目標不是 request 數，是 token 成本與快取狀態**。EPP 的預設 scheduler 同時看負載（queue、KV 利用率）與 prefix cache 親和性——這正是 ch10 講的「有狀態負載均衡」的標準化落地，scoring 函數的設計取捨見 ch10，這裡只需要知道機制介面：**LB 的決策單位從 connection/request 升級成「帶狀態的成本預估」**。\n- **飽和要在 pool 層面看**。v1.5 加入 pool-wide saturation gauge 與 flow control：整池飽和時在 gateway 層排隊或拒絕，而不是讓請求漏進引擎的無界佇列（2026-06）。\n\n對你來說最划算的理解角度：**EPP 之於 Envoy，就像你寫過的自訂 LB 邏輯之於 KrakenD——只是這次社群把 hook 點標準化了**，所以 llm-d、KServe、GKE 可以共用同一套資料平面，各自只換 scheduler 插件。\n\nMurphy 提醒：EPP 在每個請求的關鍵路徑上。它的延遲直接墊高 TTFT（健康狀態下應 <10ms）；它的可用性決定整條路。部署時必須回答三個問題——EPP 掛了 fail-open 還是 fail-closed？指標多久過期算不可信？EPP 自己的 HPA 怎麼配？這三題答不出來，不要上生產。\n\n## 平台選項：llm-d、Dynamo、KServe、Ray Serve\n\n2026 年的格局（ch10 提過供應端視角，這裡給平台選型視角）：四條路線並進，但共用同一組底層原語——vLLM/SGLang 引擎、GIE 路由、NIXL 傳輸、P/D 分離。差異在「組裝哲學」與甜蜜點：\n\n| | llm-d | NVIDIA Dynamo | KServe（LLMInferenceService） | Ray Serve LLM |\n|---|---|---|---|---|\n| 版本（2026-06） | 0.6/0.7 | 1.2.0 | KServe 0.18，LLMISVC `v1alpha2`（仍 alpha） | Ray 2.55.x |\n| 組裝哲學 | K8s 原生：直接用 GIE/IGW + vLLM + 標準 CRD，提供「well-lit paths」（文件化、benchmark 過的參考配置） | 自帶控制面：planner、KV router、KVBM、NIXL，跑在 K8s 上但核心邏輯在自己的元件裡 | 把 llm-d 包進 KServe 的 CRD 體驗：一個 `LLMInferenceService` 展開成 gateway+EPP+P/D workers（LWS） | Python 程式化組合：`ray.serve.llm` API，部署是程式碼不是 YAML |\n| 路由層 | GIE EPP + inference scheduler 插件（prefix/load/SLO scorer） | 自家 KV router（radix tree 索引，見 ch10） | 繼承 llm-d 的 EPP | 自家 router + PDProxy 模式 |\n| 引擎支援 | vLLM 為主（擴及 SGLang） | vLLM / SGLang / TensorRT-LLM 統一抽象 | vLLM（經 llm-d） | vLLM 為主 |\n| 甜蜜點 | 平台團隊 K8s 功力深、要 upstream 標準、避免單一廠商；中大規模 vLLM fleet | NVIDIA 硬體上的大規模 P/D 分離；要廠商整合（AIConfigurator 效能預測、NGC 支援）；混引擎 | 既有 KServe/Kubeflow/OpenShift AI 資產；predictive 與 generative 模型要同一套治理 | 推論只是 Python pipeline 的一環（embedding→rerank→LLM→後處理）；團隊已用 Ray 做資料/訓練 |\n| 主要代價 | 元件多（gateway/EPP/CRD 一個都不能少），除錯面積大；新專案、API 還在動 | 與 NVIDIA 生態深綁；自帶控制面與 K8s 原生工具鏈有摩擦 | 多一層抽象，出事時要穿透 KServe→llm-d→vLLM 三層；alpha API | K8s 多租戶/配額治理較弱（要 KubeRay 補）；Ray 叢集本身是一個要養的分散式系統 |\n| 背後推手 | Red Hat、Google、IBM、CoreWeave 等 | NVIDIA | Kubeflow 社群、Red Hat | Anyscale |\n\n幾個有觀點的判讀：\n\n- **這四個不是四選一的對等競品**。KServe LLMISVC 直接建構在 llm-d 之上；llm-d 直接建構在 GIE 之上；Dynamo 的 NIXL 反過來是 vLLM 與 Ray Serve P/D 的共同地基。選型其實是在選「你想站在哪一層抽象、跟誰的 roadmap 對齊」。\n- **「自組 vs 採用」的判斷準則**：單模型、個位數 GPU、無 P/D 分離需求——一個 Deployment + Service + 普通 gateway 就夠，平台框架是負資產（每個元件都是你凌晨三點要會修的東西）。需要多模型路由、prefix-aware LB、或 P/D 分離的那一天，才是引入框架的那一天；而且我會建議從 GIE 這層標準開始（它最小、最不綁定），再視規模長到 llm-d/Dynamo。\n- 截至我能確認的資訊（2026-06），公開的生產背書：llm-d 有 AWS 官方的 disaggregated inference 方案與 Red Hat OpenShift AI 產品化；Dynamo 有 AKS 官方多節點部署案例；Ray Serve LLM 有 Anyscale 的商業化路徑。各家 benchmark 數字一律是專案自報，引用時記得標註。\n\n## 多模型服務與權重分發\n\n平台不是服務一個模型，是服務一個**模型組合**（20 個模型、各自 2–3 個版本是中型內部平台的常態）。生命週期上沒有新概念——registry → 部署 → 版本灰度 → 下線，跟你做過的服務發布同構（模型 canary 的特殊性在 ch15：品質迴歸在 5xx 看不到）。新的工程問題只有一個：**artifact 大了三個量級**。你的 Docker image 幾百 MB，一個 70B FP8 模型 70 GB。權重分發是平台層的一等公民問題：\n\n- **HF Hub 直拉是 demo 行為，不是生產行為**。三個風險：頻寬與限流不可控（單線程數十 MB/s 級、尖峰時更糟）、可用性不在你的 SLO 裡、supply chain——`main` branch 的權重是可變的，今天拉的跟昨天拉的可能不是同一份。生產最低標準：pin revision、權重進自己的 S3/物件儲存、過 checksum。\n- **S3/物件儲存是預設答案**，搭配兩個優化：載入器要併發（下一節展開），以及節點本地 NVMe 快取——同一個模型第二次在這個節點起，就不用再過網路。快取層自己會變成故障源：NVMe 被多個模型的權重塞爆是真實事故（ch15 的故障目錄有它），要有 LRU 淘汰與容量監控。\n- **OCI artifact（KServe 叫 modelcar）**：把權重打成 OCI image 放 registry，沿用整套 image 工具鏈——不可變 digest、掃描、複用 registry 的快取與授權。代價是 image pull 路徑對「巨大單檔」不算友善，通常要配 lazy-pull 才划算。\n- **P2P 分發**：擴容 50 個 pod 時，與其 50 個都去打 S3，不如讓已有權重的節點互相餵。Dragonfly（CNCF 畢業專案）在 HTTP 層做這件事——CNCF 的案例數字：200 節點叢集把 origin 流量從 26 TB 壓到約 130 GB（2026-04）。更激進的是 RDMA 級 P2P：SGLang 用 Mooncake TransferEngine 做權重更新，1T 參數的 Kimi-K2 從 53s 壓到 7.2s（專案自報）。P2P 的甜蜜點是「同一模型大量副本、頻繁擴容或權重熱更新」；小規模平台用不到。\n\n## Cold start 解剖\n\n把一個 vLLM pod 從「排程成功」到「能回首 token」的全程切開，每段的時間量級與優化手段：\n\n| 階段 | 在做什麼 | 冷的量級 | 優化手段 → 優化後 |\n|---|---|---|---|\n| 1. Pod 排程 | 找到有空 GPU 的節點 | 秒級（**前提：有 warm 節點**；要開新節點是 3–10 分鐘級，那是 ch13 的 headroom 數學） | 維持 warm pool（ch13） |\n| 2. Image pull | 拉 10–20 GB 的推論引擎 image（CUDA runtime + PyTorch + vLLM） | 2–5 分鐘（下載 + containerd 逐層解壓，解壓常是瓶頸） | 節點 image cache → ≈0；lazy-pull（GKE image streaming / SOCI / eStargz：先啟動、背景補檔）→ 秒到十秒級 |\n| 3. 權重載入 | 儲存層 → CPU → HBM | 來源決定：數十秒到數十分鐘（worked example 詳算） | 併發載入器 + 快取分層 + P2P → 十秒級 |\n| 4. Engine 初始化 | CUDA context、（TP 時）NCCL init、記憶體 profiling 與 KV pool 配置、`torch.compile`、CUDA graph capture（ch07） | 首次 2–4 分鐘（compile 占大頭） | compile cache 持久化（vLLM 支援快取編譯產物）、縮小 graph capture 範圍 → 45–90 秒 |\n| 5. Warmup + readiness | 打幾個真請求確認能生成（深健康檢查，ch15） | 10–30 秒 | 維持，不建議省 |\n\n注意這張表的結構：**前三段是「搬 bytes」，可以用錢和工程壓到接近零；第四段是「算」，目前有分鐘級的地板**。這個地板就是 scale-to-zero 討論的物理基礎（下下節）。\n\n### Worked example：70B FP8 的 cold start 帳單\n\n設定：70B 模型 FP8 權重 ≈ **70 GB**（每參數 1 byte）；引擎 image **15 GB**；單張 H200 141 GB 裝得下（若 TP2 部署，權重載入兩卡平行、時間近似減半，但加 10–20s NCCL init——量級不變）。節點 NIC 100 Gbps。三案的權重載入逐段算：\n\n**Case A：從 S3 拉。** 載入器決定一切。先看證據：NVIDIA 用 Llama-3-8B（15 GB safetensors）實測，預設 safetensors loader 即使在 4 GiB/s 的 IO2 SSD 上也只吃到 ~0.32 GiB/s（單線程、序列處理 tensor），47 秒；Run:ai Model Streamer 用 32 路併發直接 S3 → CPU → GPU 流水化，4.88 秒吃滿 ~3 GiB/s（NVIDIA 技術部落格，較舊的 vLLM 0.5.x 時代數據，但「併發決定吞吐」的結論至今成立）。套到 70 GB：\n\n- naive 路徑（`aws s3 cp` 落地再用預設 loader 載入）：下載 70 GB @ ~1 GB/s ≈ 70s，再從磁碟載入 @ ~0.3 GiB/s ≈ 220s → **約 5 分鐘**。若是 HF Hub 直拉 @ ~80 MB/s，光下載就 **~15 分鐘**。\n- 優化路徑（vLLM `--load-format runai_streamer`，concurrency 調到吃滿頻寬）：70 GB @ ~3 GiB/s ≈ **~23 秒**。注意 3 GiB/s ≈ 26 Gbps——NIC 要 50 Gbps 以上才有餘裕，而且 S3 端要避開單 prefix throttling（503 SlowDown 是真實會發生的）。\n\n**Case B：節點 NVMe 已有快取。** 不過網路。NVMe Gen4 標稱 5–7 GB/s，但 naive loader 一樣只吃到 ~0.3–0.5 GiB/s（瓶頸在 loader 不在碟）→ **2.5–4 分鐘**；併發 loader 實際可吃到 2–3 GiB/s → **~25–35 秒**。教訓：**買了快的儲存，瓶頸就移到讀它的程式**——跟你當年發現 RDS 不是瓶頸、是 N+1 query 的劇情同構。\n\n**Case C：P2P 從同儕節點拉。** 叢集裡已有副本持有權重。Dragonfly 級的 HTTP P2P 受 NIC 限制，100 Gbps 下實際 ~5–8 GB/s → **~10–15 秒**，且 origin（S3）流量趨近零；RDMA 級（Mooncake TransferEngine）在 200–400 Gbps 網路上理論 2–3 秒、工程上 <10 秒。\n\n把五個階段加總（image 與 compile cache 的狀態另列）：\n\n| 情境 | 排程 | image | 權重 | engine init | warmup | **總計** |\n|---|---:|---:|---:|---:|---:|---:|\n| 全冷 + HF 直拉（什麼都沒做） | 5s | 180s | ~900s | 200s | 20s | **~22 分鐘** |\n| 全冷 + S3 naive | 5s | 180s | 290s | 200s | 20s | **~11.5 分鐘** |\n| S3 + streamer + lazy-pull image + compile cache | 5s | 30s | 25s | 75s | 15s | **~2.5 分鐘** |\n| NVMe 快取 + streamer + image cache + compile cache | 5s | ~0 | 30s | 75s | 15s | **~2 分鐘** |\n| P2P（RDMA）+ 全快取 | 5s | ~0 | <10s | 75s | 15s | **~1.8 分鐘** |\n\n三個讀法：\n\n1. **優化空間有一個量級（22 分鐘 → 2 分鐘），但地板停在分鐘級**——搬 bytes 壓到秒級之後，engine init 成為主導項。前沿的解法方向是把「初始化完成的 GPU 狀態」整個 snapshot/restore（CUDA checkpoint 一系），以及 vLLM 的 sleep mode（權重暫退到 CPU RAM、秒級喚醒）——但後者是「原地休眠」，解的是 in-place 閒置，不是 pod 級的冷啟動。截至 2026-06 這些都還不是大規模生產的標準配備。\n2. **每一段優化都是用「另一種資源」換時間**：NVMe 快取用磁碟容量換、P2P 用網路與運維複雜度換、warm pool 用閒置 GPU $ 換（ch13/ch16 算這筆帳）。沒有免費的。\n3. 呼應全書主軸一：cold start 的本質就是**把 70 GB 的記憶體內容從世界的某處搬進 HBM**——LLM serving 是 memory 的生意，連「開機」都是。\n\n## LoRA 多租戶：一個 base 模型，N 個客製版本\n\n**LoRA（Low-Rank Adaptation）**是一種 fine-tune 方法：凍結 base 模型，只訓練插在各層旁邊的低秩矩陣對。從 infra 視角你只需要記住它的形狀：**adapter 是 base 權重的千分之一量級**（70B 模型的 adapter 通常數十到數百 MB），且推論時可以在同一個 batch 裡讓不同請求走不同 adapter。\n\n這改寫了 per-tenant 客製的經濟學。沒有 LoRA：每個租戶一份完整模型副本，10 個租戶 × 70 GB × 各自的 GPU 池——閒置與碎片吃死你。有 multi-LoRA serving：**一個 base 模型的 GPU 池，掛 N 個 adapter，所有租戶共享 batch 與 KV pool**，邊際成本從「一個 deployment」降到「幾百 MB 記憶體」。長尾租戶（流量小到單獨部署絕不划算的）因此變得可服務——這也是為什麼說 multi-LoRA 是比 scale-to-zero 更好的長尾解法。\n\nvLLM 的支援現況（2026-06）：`--enable-lora` + `--max-loras`（單批最多同時幾個 adapter 活躍）+ `--max-lora-rank` + `--max-cpu-loras`（CPU RAM 裡的 LRU 快取池）；設 `VLLM_ALLOW_RUNTIME_LORA_UPDATING=true` 後可用 `/v1/load_lora_adapter`、`/v1/unload_lora_adapter` 端點熱載/卸載——模型生命週期管理因此可以不重啟 pod。請求端用 OpenAI API 的 `model` 欄位指定 adapter 名，對 client 而言每個租戶就是一個「模型」。\n\n平台層的配套與 Murphy 清單：\n\n- **路由要 LoRA-aware**：GIE 的 EPP 本來就追蹤每個 pod 目前活躍的 adapters——把請求路由到已載入該 adapter 的 pod，避免熱載延遲打在請求的 TTFT 上。\n- **LRU thrash**：`max-loras` 滿了之後,新 adapter 進來要踢舊的；如果活躍租戶數持續大於池子大小，adapter 換入換出會變成穩定的延遲尖刺來源。症狀像極了你看過的 connection pool 飽和——監控 adapter cache 的 hit/miss。\n- **效能稅**：LoRA 路徑比純 base 推論多一段計算，吞吐有可量測的損耗（量級隨 rank 與實作版本變動，部署前自己 benchmark，方法見 ch14）。\n- **治理**：adapter 是租戶上傳的 artifact——版本 pin、來源驗證、品質 eval gate（一個壞 adapter 輸出垃圾，5xx 看不到，ch15 的品質迴歸問題在多租戶下放大 N 倍）。\n\n## Scale-to-zero 的真實代價\n\n把上面兩節的數字放在一起，scale-to-zero 的判斷就不需要立場、只需要算術：**流量到達是秒級的，冷啟動是分鐘級的（優化到極限 ~2 分鐘）**。第一個喚醒請求的 TTFT 至少兩分鐘——任何互動式 SLO（TTFT p95 < 數秒）直接出局，沒有討論空間。\n\n它能用的條件，本質上是「有人願意等，或沒有人在等」：內部工具與 dev/staging 環境（等 2 分鐘可接受）、批次/非同步工作負載（本來就排隊）、真正零流量時段的長尾模型。決策上先問兩個問題：這個模型是不是某個 base 的 fine-tune？是 → 用 multi-LoRA 共享池，根本不需要 scale-to-zero。等待是否在產品語意內（如「排隊生成報告」）？否 → 留至少一個 warm replica，把錢省在別處（quantization、共享池、spot——ch16）。執行機制（Knative KPA、KEDA scale-to-zero、HPAScaleToZero）與喚醒期間的請求緩衝設計在 ch13。\n\n## API 層設計：OpenAI-compatible 與 SSE 的工程細節\n\n### OpenAI-compatible 是 de facto 標準的含意\n\n所有主流引擎與平台都暴露 OpenAI 風格的 `/v1/chat/completions`。對平台架構師，這個標準化的含意有三層：client 生態免費（SDK、LangChain 類框架、各種工具直接能接）；路由鍵被固定在 body 的 `model` 欄位（前面 BBR 的存在理由）；以及**你的 API 設計自由度其實很小**——自訂欄位要走 extra body/header，錯誤語意要對齊 OpenAI 的格式，否則 client 生態的好處立刻消失。內部平台直接抄這個介面，把創意留給介面後面。\n\n### SSE：把你的 WebSocket 經驗對照過來\n\nToken streaming 的載體是 SSE，不是 WebSocket。一條 SSE 回應長這樣：\n\n```text\nHTTP/1.1 200 OK\nContent-Type: text/event-stream\nCache-Control: no-cache\n\ndata: {\"id\":\"chatcmpl-1\",\"choices\":[{\"delta\":{\"content\":\"今\"}}]}\n\ndata: {\"id\":\"chatcmpl-1\",\"choices\":[{\"delta\":{\"content\":\"天\"}}]}\n\ndata: [DONE]\n```\n\n就是一個永不結束的 chunked HTTP response，每個事件是 `data: <json>\\n\\n`，OpenAI 慣例以 `data: [DONE]` 收尾。對照你的 WebSocket 經驗：\n\n| 你在 WebSocket 做過的 | SSE 對應 | 差異與坑 |\n|---|---|---|\n| Upgrade 握手、自訂協定 | 沒有——就是 HTTP | 好處：所有 HTTP 中間件「理論上」直接通。壞處：所有 HTTP 中間件都可能 buffer 它 |\n| 雙向通訊 | 單向（server→client） | 「中途取消」不能在流內發——靠 client 斷開連線（或另發 API）；所以**斷線偵測就是取消機制**，必須往下游傳播成引擎 abort（ch06） |\n| 心跳 ping/pong | SSE comment（`: ping\\n\\n`） | 防的是 LB/proxy 的 idle timeout 在兩個 token 間隔過長（長 prefill、reasoning 模型思考中）時砍線 |\n| 斷線重連 + 訊息序號續傳 | EventSource 有 `Last-Event-ID`，**但 LLM API 普遍不支援續流** | 重連 = 新請求 = 重新排隊 + 重算 + 重計費。斷流續傳是平台級的進階設計（ch15 的 retry storm 一節） |\n| 自己管 buffer 與 backpressure | TCP backpressure | 慢 client 讀不動 → gateway buffer 堆積；引擎側不會因此放慢生成。gateway 對 per-connection buffer 要設上限 |\n\n生產環境 SSE 的故障幾乎都是同一類：**鏈路上某個環節在 buffer**。Nginx 要 `proxy_buffering off`（或回應頭帶 `X-Accel-Buffering: no`）、不能對 event-stream 開 gzip（壓縮器會攢 buffer 再 flush）、雲端 LB 的 idle timeout 要大於最壞 token 間隔、應用層每個事件後要 flush。症狀的指紋很好認：**TTFT 不是變慢，而是 token 一大坨一大坨地到**——curl 看是順的（curl 不 buffer），瀏覽器/SDK 看是卡的。你調過 WebSocket 經過 ALB 的 idle timeout,這是同一場仗換了個戰場。\n\n### 錯誤語意：200 之後世界就不同了\n\nSSE 把錯誤切成兩個世界。**首 byte 之前**，HTTP 語意完整可用：401/403（認證）、404（模型不存在）、422/400（參數錯）、**429 + `Retry-After`**（限流與 admission 拒絕——一定要帶 Retry-After，否則 client SDK 的指數退避會自己發明 retry storm）、503（整池飽和）。這個區間的請求**還沒進引擎**，重試是安全的、便宜的。**首 byte 之後**，status code 已經是 200 並且潑出去了——中途的失敗（pod 死亡、engine OOM、上游斷線）只能表現為「流提前終止」或一個 error event。平台要做兩件事：在最後一個 chunk 帶 usage（token 計量，ch16 的計費依據）與 `finish_reason`,讓 client 能區分「正常結束」與「斷掉」；以及把「部分輸出後失敗」的請求標記出來進指標——這類失敗在 5xx dashboard 上是隱形的，卻是使用者體感最差的一種。重試政策因此必須是位置敏感的：**首 token 前可重試、首 token 後預設不重試**（重試 = 全部重算 = 雙倍帳單），完整的 retry budget 設計在 ch15。\n\n## 故障模式與防禦\n\n| 故障模式 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| 中間件 buffer 整條 SSE | token「一坨一坨」到、體感 TTFT 爆炸，但引擎指標正常 | 對比 curl 直連 pod vs 走完整鏈路的逐 token 到達時間 | 全鏈路盤點 buffering（nginx/LB/gzip/應用層 flush）；把「首 token 到達 client」納入 e2e 監控（ch14） |\n| EPP 故障或決策過慢 | fail-open：TTFT 整體劣化（退回隨機路由、prefix 命中率掉）；fail-closed：全量 5xx | EPP 自身的延遲/錯誤率指標；prefix cache hit rate 突然下滑 | 明確選擇並演練 fail 模式；EPP 多副本；對 EPP 決策延遲設 SLO |\n| EPP 視圖過期 | 部分 pod 過載、部分閒置；新 pod 不接流量 | per-pod queue 深度的離散度；scrape 失敗率 | 縮短指標更新間隔；endpoint 清單以 K8s watch 為準並監控 reconcile 延遲 |\n| Client 斷線未傳播成 abort | running 數高但輸出 token 無人收；「忙碌但無效」（ch06） | gateway 連線數 vs 引擎 running 數的背離 | gateway 偵測斷線 → 呼叫引擎 abort;對 streaming 連線設 max duration 上限 |\n| 擴容風暴打死權重儲存 | 大量 pod 同時冷啟，S3 503 SlowDown / HF 限流，冷啟時間雪崩式變長 | 權重下載耗時的 p99 與儲存端錯誤率 | 節點 NVMe 快取、P2P 分發、擴容批次化（一次起 N 個，不是全部） |\n| 節點 NVMe 被權重快取塞爆 | pod evicted、image pull 失敗、`DiskPressure` | node filesystem 使用率、快取目錄大小 | 快取 LRU 淘汰、容量配額、把快取納入容量規劃（ch15 故障目錄） |\n| LoRA adapter thrash | 特定租戶 TTFT 規律尖刺，與 adapter 載入事件相關 | adapter cache hit/miss、載入耗時直方圖 | 調大 `max-loras`/`max-cpu-loras`；EPP 做 LoRA-aware 路由；長尾租戶分池 |\n| Admission 缺位，引擎佇列當緩衝 | TTFT 無聲爆炸,GPU/5xx 指標全綠 | 引擎 `num_requests_waiting` 持續上升（ch06） | admission control 放 gateway,有界佇列 + 429 + Retry-After；佇列深度告警（ch13 接手 autoscaling） |\n| 模型 artifact 不可重現 | 同一個「模型」在不同 replica 行為不同；品質投訴無法 bisect | 權重 checksum/digest 不一致 | pin revision、自管儲存、OCI digest 化；部署記錄 artifact hash |\n\n## 動手做\n\n### 實驗 1 [M1]：在模擬叢集上體驗 InferencePool 路由\n\n目標：不碰 GPU，把「gateway → EPP → 多個 backend」這條路真的跑起來。用 kind + 一個支援 GIE 的 gateway（kgateway 或 Envoy Gateway）+ llm-d-inference-sim 當假引擎。\n\n```bash\n# 1. 建叢集，裝 Gateway API + Inference Extension CRDs（版本以官方 quickstart 為準）\nkind create cluster --name igw-lab\nkubectl apply -f https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/latest/download/manifests.yaml\n\n# 2. 部署 3 個 llm-d-inference-sim pod 當 vLLM 池（帶 app: vllm-sim label）\n#    （sim 支援設定 TTFT/ITL/max-num-seqs，旗標以 repo README 為準）\n# 3. 建 InferencePool + EPP + HTTPRoute（官方 getting-started 有完整 YAML）\n# 4. 打流量並觀察路由分布\nfor i in $(seq 1 50); do\n  curl -s $GATEWAY_IP/v1/completions -H 'Content-Type: application/json' \\\n    -d '{\"model\":\"fake-8b\",\"prompt\":\"hello\",\"max_tokens\":32}' &\ndone\nkubectl logs -l app=vllm-sim --prefix | grep -c POST   # 看各 pod 的分配\n```\n\n**成功標準**：（a）能畫出請求實際走過的路徑（gateway → EPP ext-proc → 指定 pod），並用 EPP log 證明；（b）把一個 sim pod 的模擬 queue 長度調高，觀察 EPP 把流量導開；（c）kill 掉 EPP，回答「你的 gateway 是 fail-open 還是 fail-closed」並用實驗證明。做完這個實驗，本章架構圖的左半邊就是你親手摸過的東西。\n\n### 實驗 2 [M1]：SSE 鏈路的 buffering 偵錯演練\n\n在實驗 1 的鏈路前面再加一層 nginx（預設開 proxy_buffering），用一個故意慢的 sim（ITL 200ms）對比 `curl -N` 直連 vs 走 nginx 的逐 token 到達時間，然後修好它（`proxy_buffering off` / `X-Accel-Buffering: no`）。**成功標準**：你能在修好前後各錄一段 token 到達時間戳，量化說明「buffer 不改變吞吐、只毀掉 streaming 體感」。\n\n### 實驗 3 [紙上推演]：為「5 個團隊、20 個模型」設計內部平台\n\n規格：3 個高流量產品模型（其中一個 70B）、12 個各團隊的 LoRA fine-tune（共享兩個 base）、5 個長尾實驗模型；互動式 SLO TTFT p95 < 2s；GPU 預算有限。交付一頁設計文件：（a）完整架構圖（照本章骨架，每個箭頭標協定）；（b）InferencePool 怎麼劃（提示：per-base-model，LoRA 走 multi-LoRA 池）；（c）每類模型的冷啟動策略（warm pool / NVMe 快取 / scale-to-zero / multi-LoRA，各自為什麼）；（d）三個你預期最先發生的故障與對應防禦。**成功標準**：把文件唸給一個資深後端同事聽，他能在 10 分鐘內複述你的設計與理由——這份文件就是 ch18 系統設計面試的草稿。\n\n## 這個領域往哪走\n\n短期（1–2 年）：GIE 已經贏下「標準介面」這一格——四大平台共用它，接下來的競爭在 EPP 之上的 scheduler 智慧（SLO-aware、預測式路由）與 flow control 的成熟度。Cold start 那條「engine init 分鐘級地板」是下一個被攻擊的目標：GPU 狀態 snapshot/restore、編譯產物的全叢集共享、引擎的 partial warm 都在路上——如果地板被打穿到秒級，ch13 的 autoscaling 數學與 scale-to-zero 的結論都要重算（這是我會持續盯的少數幾個「會改變架構結論」的技術點）。平台層的整併也會繼續：四條路線共用的原語越來越多，差異化收斂到控制面體驗與生態綁定——學原語（GIE、P/D、KV 分層），不要把職涯押在單一框架的 API 上。\n\n## 自我檢核\n\n1. 為什麼傳統 L7 load balancer（least-request/round-robin）對 LLM 流量會做出系統性的壞決策？至少給出三個結構性原因（成本變異、狀態、路由鍵位置）。\n2. 畫出 client 到首 token 的完整鏈路，標出每段協定，並指出「admission control 必須放在哪、為什麼不能靠引擎佇列」。\n3. InferencePool 和 K8s Service 的本質差異是什麼？EPP 用哪些訊號挑 pod？EPP 掛掉時 fail-open 與 fail-closed 各是什麼後果，你會怎麼選？\n4. llm-d、Dynamo、KServe、Ray Serve 各自的甜蜜點是什麼？什麼情境下你會建議「都不要用，自組」？\n5. 默寫 cold start 的五個階段與各自的時間量級。70B FP8 從 S3 拉，naive 與優化後的權重載入時間各約多少？為什麼優化到最後瓶頸會落在 engine init？\n6. Multi-LoRA serving 改變了什麼經濟學？它跟 scale-to-zero 在「長尾模型」問題上是什麼關係？LoRA thrash 的症狀長什麼樣？\n7. SSE 與 WebSocket 的三個關鍵差異？「token 一坨一坨到但吞吐正常」的診斷順序是什麼？\n8. 為什麼 LLM API 的重試政策必須以「首 token」為分界？429 回應為什麼必須帶 Retry-After？\n\n## 延伸閱讀\n\n- [Gateway API Inference Extension 官方文件](https://gateway-api-inference-extension.sigs.k8s.io/) — InferencePool/EPP 的第一手規格與 getting-started，本章左半張圖的權威來源，版本演進快、以它為準。\n- [Endpoint Picker Protocol 提案文件](https://github.com/kubernetes-sigs/gateway-api-inference-extension/tree/main/docs/proposals/004-endpoint-picker-protocol) — EPP 與 gateway 之間 ext-proc 契約的設計細節，想自己寫 scheduler 插件從這裡開始。\n- [llm-d: Our first well-lit paths](https://llm-d.ai/blog/llm-d-v0.2-our-first-well-lit-paths) — 「well-lit path」哲學的原始陳述與 benchmark 設定，學習他們怎麼誠實地呈現效能數字。\n- [KServe LLMInferenceService 概觀](https://kserve.github.io/website/docs/model-serving/generative-inference/llmisvc/llmisvc-overview) — 一個 CRD 怎麼展開成 gateway + scheduler + P/D workers 的完整範例，理解「平台抽象層」的代價與收益。\n- [Ray Serve LLM 文件](https://docs.ray.io/en/latest/serve/llm/index.html) — Python 組合路線的代表，與 K8s 原生路線對照著讀,選型的判斷會立體很多。\n- [Introducing NVIDIA Dynamo（NVIDIA Technical Blog）](https://developer.nvidia.com/blog/introducing-nvidia-dynamo-a-low-latency-distributed-inference-framework-for-scaling-reasoning-ai-models/) — Dynamo 的架構自述（planner/KV router/NIXL），讀時記得它同時是技術文件與行銷材料。\n- [Reducing Cold Start Latency with Run:ai Model Streamer（NVIDIA Technical Blog）](https://developer.nvidia.com/blog/reducing-cold-start-latency-for-llm-inference-with-nvidia-runai-model-streamer/) — 本章 worked example 引用的載入器 benchmark 原始數據，方法論寫得完整，值得學它怎麼控制變因。\n- [vLLM 官方文件：LoRA Adapters](https://docs.vllm.ai/en/stable/features/lora/) — multi-LoRA 參數與動態載卸 API 的第一手資料。\n- [P2P acceleration for AI model distribution with Dragonfly（CNCF Blog, 2026-04）](https://www.cncf.io/blog/2026/04/06/peer-to-peer-acceleration-for-ai-model-distribution-with-dragonfly/) — 權重 P2P 分發的生產案例與流量數據。\n- [GKE image streaming 介紹（Google Cloud Blog）](https://cloud.google.com/blog/products/containers-kubernetes/introducing-container-image-streaming-in-gke) — image lazy-pull 的代表性實作,cold start 階段 2 的優化原理。\n"}, {"id": "ch13-autoscaling-capacity", "file": "ch13-autoscaling-capacity.md", "group": "Part IV — 平台工程", "title": "ch13 — Autoscaling 與容量工程：對的訊號、headroom 數學、把並發換算成卡數", "md": "# ch13 — Autoscaling 與容量工程：對的訊號、headroom 數學、把並發換算成卡數\n\n> **本章解決什麼問題**：ch12 把平台架構組裝起來了，但留下兩個錢與 SLO 的問題：這個 fleet 應該有幾個 replica？流量變化時誰來增減它？CPU-based HPA 的肌肉記憶在這裡會直接傷害你——訊號全錯、時間尺度全錯。本章先拆解為什麼舊訊號失效、什麼是對的訊號階層，再給執行機制（KEDA/KPA）、headroom 數學與死亡螺旋防禦，最後用全書最重要的 worked example 之一走完一次完整容量規劃：從單卡 benchmark 推到卡數與月成本。指標的採集實作在 ch14，故障處理細節在 ch15，成本工程的完整版在 ch16。\n\n## 從你已知的出發\n\n你在遊戲後端做過這件事的上一個版本：開服前估 CCU、壓測單台 c5.xlarge 能扛多少 RPS、除一下加 buffer、掛上 CPU 60% 的 target tracking autoscaling，活動前夜手動先拉一倍容量。這套方法論的骨架——**流量模型 → 單機基準 → 除法 → headroom → 驗證**——在 LLM serving 一個字都不用改。要改的是三個物理常數：\n\n1. **請求成本的同質性假設崩潰了**。你的遊戲 API，每個請求的 CPU 成本大致同量級，所以「RPS ≈ 負載」近似成立，CPU% 是負載的忠實代理。LLM 請求之間成本差四個數量級（10 token 問答 vs 100k token 文件分析），RPS 與負載之間只剩雜訊般的相關性。\n2. **Scale-out 從分鐘級變成十分鐘級**。c5.xlarge 從觸發到進 ALB 大約 2–3 分鐘；一個 vLLM pod 從排程到能服務流量要載入幾十 GB 權重、做 CUDA graph capture 與 warmup（解剖見 ch12），有現成 GPU 節點時 3–8 分鐘，要新開節點時 10–20 分鐘起跳——而且 GPU 可能根本沒貨。流量尖峰還是秒級的。這個不對稱是本章一半內容的根源。\n3. **資源不可超賣**。CPU 世界你可以 requests 寫低一點賭統計多工；GPU 是整數資源、KV cache 是硬容量（ch11）。超過容量的那一刻不是「大家慢一點」，是 preemption 與重算（ch06）——退化是懸崖式的。\n\n但你有一個直覺在這裡完全保值，而且是本章的主角：**佇列先於資源指標惡化**。你在遊戲後端見過這個模式——大型活動開搶的瞬間，最先告警的不是 CPU，是 gateway 的等待佇列與 p95;CPU 還在 60% 的時候玩家已經在排隊了。你在 SQS pipeline 上也靠 queue depth 而不是 consumer CPU 來判斷要不要加 worker。LLM serving 把這個直覺從「經驗法則」升級成「唯一正確答案」：引擎內部就是一個 scheduler 加一條 waiting 佇列（ch06），佇列深度就是負載本身。\n\n## 為什麼 CPU 與 RPS 訊號全錯\n\n把三個常見的錯誤訊號逐一處決，並解釋屍檢結果。\n\n### CPU%：量錯了器官\n\nvLLM pod 的 CPU 在做 tokenization、HTTP/SSE 處理、排程邏輯——全是配角。GPU 打到天花板時 CPU 可能只有 20%；反過來，一波長 prompt 的 tokenization 也能把 CPU 推高而 GPU 還很空。對 CPU 做 HPA，等於用司機的心跳數決定要不要加開公車。\n\n### RPS：變異數毀掉一切\n\n對 RPS 擴縮隱含的假設是「每個請求成本近似相等」。LLM 流量的單請求成本分布跨 4 個數量級，而且成本藏在 body 裡、一半（輸出長度）連 body 都看不出來（ch12 講過同一件事對 load balancing 的傷害）。同樣 50 RPS，可能是輕鬆寫意，也可能是死亡螺旋的入口。用 RPS 做容量決策，相當於你的遊戲後端把「一次撈排行榜」和「一次全服結算」當同一種請求計數。\n\n### GPU utilization：最危險的一個，因為它看起來最對\n\n`nvidia-smi` 的 GPU-Util（DCGM 的 `DCGM_FI_DEV_GPU_UTIL`）語意是「取樣窗內**至少有一個 kernel 在跑**的時間比例」。一個 batch size = 1 的 decode 迴圈——GPU 在做它理論吞吐 1% 的有效工作——也會顯示 90%+ 的 utilization，因為 kernel 確實一直在跑，只是每次都在等 HBM 把權重搬進來（memory-bound，ch02/ch03）。它量的是「有沒有在動」，不是「做了多少有效工作」。SM activity 與 utilization 的完整辨析在 ch14；本章你只需要記住結論：**GPU util 接近 100% 是常態而非告警，它對 autoscaling 沒有資訊量**。\n\n三個訊號的共同死因：它們都是**資源視角**的指標，而 LLM serving 的退化最先出現在**佇列視角**——請求開始排隊、TTFT 開始爬，此時所有資源指標都還「正常」。等資源指標異常時，使用者已經在受苦了。這正是你在遊戲後端親眼見過的模式，只是這裡懸崖更陡：latency-throughput 曲線在膝點(knee)之前近乎平坦，過了膝點佇列等待呈超線性爆炸（排隊理論的曲棍球桿，你懂的），而 LLM 還多一道 KV 容量天花板，撞上去直接觸發 preemption（後述死亡螺旋）。\n\n## 正確的訊號階層\n\n從領先到落後排列。指標名稱以 vLLM V1 的 `/metrics` 為例（2026-06；完整指標分類學見 ch14）：\n\n| 階層 | 訊號 | vLLM 指標 | 類型 | 它告訴你什麼 | 判讀陷阱 |\n|---|---|---|---|---|---|\n| 1（最領先） | **佇列深度** | `vllm:num_requests_waiting` | gauge | 需求已超過當下消化能力；佇列形成於 SLO 惡化之前 | 為 0 不代表健康——gateway 的 admission control 可能正在上游丟棄流量（ch12）；要看 fleet 的 max 而非 avg（後述） |\n| 2 | **KV cache 利用率** | `vllm:kv_cache_usage_perc` | gauge | 記憶體軸的飽和度；逼近 1.0 = preemption 風險（ch05/ch06） | 開了 prefix caching 後長期偏高是**正常的**（快取塊可回收不會主動釋放），必須搭配 preemption 計數一起判讀 |\n| 3 | **Batch 占用** | `vllm:num_requests_running` ÷ `max-num-seqs` | gauge | 併發槽位的飽和度；貼著上限表示新請求只能排隊 | 上限是你自己設的（ch06/ch08），先確認它設得有道理 |\n| 4 | **排隊時間** | `vllm:request_queue_time_seconds` | histogram | TTFT 惡化的歸因證據（排隊 vs 算得慢） | 落後於佇列深度，適合歸因不適合觸發 |\n| 5（最落後） | **SLO burn** | `vllm:time_to_first_token_seconds`、`vllm:inter_token_latency_seconds` | histogram | 使用者體驗的 ground truth；burn rate 告警設計見 ch14 | 它惡化時你已經遲到了——當 gate（驗證擴縮有效）而非 trigger |\n| 輔助 | **Preemption 速率** | `vllm:num_preemptions_total` | counter | KV 超賣的直接證據；死亡螺旋的領先指標 | 健康系統應接近 0；rate > 0 持續數分鐘就要介入 |\n\n設計原則：**用領先指標觸發擴容，用落後指標驗證擴容有效**。佇列深度是主觸發（語意最乾淨：「有 N 個使用者在排隊」），KV 利用率是第二觸發（攔截長 context 流量造成的記憶體軸飽和——佇列可能還短但 KV 快炸了），TTFT/ITL 的 SLO burn rate 是告警與覆核，不直接驅動 HPA——拿落後指標觸發擴縮,等於看著後照鏡開車。\n\n聚合方式有一個容易踩的坑：對 fleet 取 `avg()` 會被冷熱不均掩蓋。在 KV-aware routing 之下（ch10），replica 之間負載**故意**不均（cache 命中優先），一個 replica 排隊爆了、平均值仍可能很好看。擴縮觸發用 `sum()`（總排隊人數，配合 per-replica threshold）或 `max()`，per-replica 的不均問題交給路由層解決。\n\n## 執行機制：HPA、KEDA、Knative KPA\n\n訊號選對之後，執行機制反而是三者中最商品化的一環。\n\n### HPA + custom/external metrics\n\n原生 HPA 只認 CPU/memory，要吃 Prometheus 指標得透過 prometheus-adapter 把指標翻譯成 custom metrics API。能用，但 adapter 的 ConfigMap DSL 難寫難查錯、全叢集只能裝一個 adapter、規則是中心化管理——平台團隊的負擔。除非你已有現成 adapter 基礎設施，否則 2026 年的務實答案是 KEDA。\n\n### KEDA：LLM autoscaling 的預設答案\n\nKEDA（本書寫作時 v2.20，2026-05）本質是「external metrics 的發行版」：70+ 種 scaler、每個 ScaledObject 自帶查詢邏輯（去中心化）、支援 scale-to-zero、有 fallback 機制。底下還是生成一個 HPA，所以你的 HPA 知識全部保值。一份可以直接改用的 ScaledObject（示意，label 依你的部署調整）：\n\n```yaml\napiVersion: keda.sh/v1alpha1\nkind: ScaledObject\nmetadata:\n  name: vllm-chat-70b\n  namespace: inference\nspec:\n  scaleTargetRef:\n    name: vllm-chat-70b          # 引擎 Deployment（一個 replica = 一個 TP2 引擎，見 worked example）\n  minReplicaCount: 11             # 基線容量：headroom 數學的輸出，不是拍腦袋\n  maxReplicaCount: 18             # 預算上限 ∧ 叢集實際租得到的卡\n  pollingInterval: 15             # 秒\n  cooldownPeriod: 600\n  fallback:                       # Murphy 條款：Prometheus 斷線時凍結在安全容量\n    failureThreshold: 3\n    replicas: 15\n  advanced:\n    horizontalPodAutoscalerConfig:\n      behavior:\n        scaleUp:\n          stabilizationWindowSeconds: 0     # 擴容不猶豫\n          policies:\n            - type: Pods\n              value: 4\n              periodSeconds: 60\n        scaleDown:\n          stabilizationWindowSeconds: 900   # 縮容等 15 分鐘再說\n          policies:\n            - type: Pods\n              value: 1                      # 一次只縮一個，配合 drain（ch15）\n              periodSeconds: 300\n  triggers:\n    # 主訊號：fleet 總排隊數，期望每 replica 排隊 ≤ 8\n    - type: prometheus\n      metadata:\n        serverAddress: http://prometheus-operated.monitoring.svc:9090\n        query: sum(vllm:num_requests_waiting{job=\"vllm-chat-70b\"})\n        threshold: \"8\"\n    # 第二訊號：KV 利用率，攔截長 context 流量的記憶體軸飽和\n    - type: prometheus\n      metadata:\n        serverAddress: http://prometheus-operated.monitoring.svc:9090\n        query: avg(vllm:kv_cache_usage_perc{job=\"vllm-chat-70b\"})\n        threshold: \"0.85\"\n```\n\n幾個值得內化的設計點：\n\n- **多 trigger 取 max**：KEDA 對每個 trigger 各算一個目標 replica 數，取最大值。佇列管吞吐軸、KV 管記憶體軸，哪個先飽和哪個說了算。\n- **擴縮不對稱是刻意的**：擴容零等待、一分鐘最多 +4；縮容等 15 分鐘、五分鐘最多 -1。理由有三：尖峰常是鋸齒狀,對稱的策略會 flapping;縮容要 drain 長達分鐘級的 streaming 請求（ch15）；殺掉一個 replica 同時銷毀它的 prefix cache——暖 replica 的快取是資產，縮容是有狀態操作（ch10）。縮容應該慢到無聊。\n- **`fallback` 不是選配**：指標管線本身會壞。沒有 fallback 的 ScaledObject 在 Prometheus 故障時行為是「維持現狀」，聽起來安全，直到故障撞上流量尖峰。把 fallback 設在「足以扛預測尖峰」的容量。\n- **threshold 的語意**：Prometheus scaler 預設是 AverageValue——`sum(waiting)=88`、threshold 8 → 目標 11 個 replica。所以 query 用 `sum()` 配 per-replica 預算最直覺。\n\n預測式擴縮在 KEDA 裡用 cron scaler 疊加實現：再加一個 `type: cron` 的 trigger，工作日 08:30 先把 minReplica 拉到日間水位——和你在遊戲活動前夜手動拉容量是同一件事，只是寫成宣告式。活動、行銷推送、產品發布前的 pre-scale 沒有任何自動訊號能替代：**autoscaler 看到的永遠是過去，只有你知道未來**。\n\n### Knative KPA 與 scale-to-zero\n\nKnative 的 KPA（KServe 的 Serverless 模式底層）只認兩種訊號：**併發數與 RPS**，原生支援 scale-to-zero，並有 panic mode（短窗口流量暴衝時跳過平滑直接擴）。兩個結論：\n\n- 它讀不懂佇列深度與 KV 利用率，而「併發數」對 LLM 又有 RPS 同款的成本變異問題——所以 KPA 不是 LLM 主力服務的好答案。KServe 自己也提供 KEDA 路徑來做指標驅動的擴縮（2026-06）。\n- 它真正的價值是 scale-to-zero 的長尾場景：內部平台上 20 個模型有 15 個一天被呼叫三次，閒置 GPU 比冷啟動難堪。但要誠實面對代價：ch12 算過冷啟動是分鐘級，scale-to-zero 等於把這個分鐘級延遲塞給閒置後的第一個使用者。決策準則：**面向使用者的同步服務不要 scale-to-zero；內部工具、批次、長尾模型可以**。中間地帶用 `minReplicaCount: 1` 加激進縮容。\n\n| 機制 | 適用 | 不適用 | 一句話 |\n|---|---|---|---|\n| KEDA | LLM 服務的預設；任何 Prometheus 訊號 | — | external metrics 做對了的樣子 |\n| HPA + adapter | 已有 adapter 基礎設施的組織 | 新建系統 | 能用，維運稅高 |\n| Knative KPA | 長尾模型 scale-to-zero | 主力服務、需要佇列/KV 訊號 | 為無狀態 serverless 設計，LLM 只借它的零 |\n\n## Scale-up 延遲是根本約束\n\n把「按下擴容按鈕」到「新容量開始吃流量」的時間軸攤開（典型值，2026-06）：\n\n| 階段 | 有暖節點 | 要新節點 |\n|---|---|---|\n| 指標 scrape + 評估 + HPA 決策 | 30–60s | 30–60s |\n| Pod 排程 | 秒級 | — |\n| 節點開機/進叢集（cluster autoscaler，ch11） | — | 5–20 min（且可能無貨） |\n| Image pull + 權重載入 + warmup（解剖見 ch12） | 2–8 min | 2–10 min |\n| **合計** | **3–9 min** | **8–30 min** |\n\n流量尖峰是秒級到分鐘級的。結論很殘酷：**autoscaler 處理的是趨勢，不是尖峰。尖峰只能靠 headroom 吸收。**\n\n### Headroom 數學\n\n定義反應視窗 T_react = 從負載開始上升到新容量實際可服務的總時間（上表）。在 T_react 內到達的增量流量，只能由既有的空餘容量吸收。所以：\n\n```\nheadroom 比例 h ≥ 你的流量在 T_react 內可能成長的最大幅度\n\n需要的容量    N = N_base × (1 + h) + N_fail\n等價的利用率目標 ρ_target = N_base / N\n```\n\n代入數字：T_react = 10 分鐘；翻你的流量歷史（你有 FluentBit pipeline,這正是它的用途），過去 90 天內任何 10 分鐘窗口的最大流量增幅是 30%；再加 N+1 容錯（一個 replica 故障或在 rollout 中）。那麼 h = 0.3，若 N_base = 11 則 N = ceil(11 × 1.3) + 1 = 15。預測尖峰時的利用率目標 ρ ≈ 11/15 ≈ 73%。\n\n這就是 GPU fleet 跑不到 90% 利用率的結構性原因之一——剩下的 27% 不是浪費，是你買的保險。想壓縮它只有三條路：縮短 T_react（warm pool）、壓平流量（admission control + 排隊 + batch tier 分流，ch16）、或接受偶爾燒 SLO（跟產品談清楚）。\n\n### Warm pool：用錢換 T_react\n\n分層的暖度光譜，每深一層都更貴也更快：\n\n1. **暖節點**：cluster autoscaler 的 overprovisioning（低優先級 placeholder pod 占著 GPU 節點，真工作負載來了搶占它，ch11）——省掉 5–20 分鐘的開節點時間，代價是閒置節點費。\n2. **暖映像/暖權重**：節點 NVMe 預載 image 與權重（ch12 的優化手段）——把載入從 8 分鐘壓到 2 分鐘內。便宜，永遠值得做。\n3. **暖引擎**：完整載入、CUDA graph 已 capture、不進 LB 的 standby replica——T_react 壓到秒級，代價是整卡閒置。只有 SLO 極嚴的場景值得。\n\n### 預測式擴縮\n\nLLM 流量有強烈的 diurnal pattern（上班時間 vs 凌晨可差 3–5 倍），這是最容易吃到的免費午餐：cron-based 排程（KEDA cron trigger）按時段調 min replica，凌晨的卡退回去（或讓給內部 batch 工作負載吃，ch16）。比 diurnal 更重要的是**事件驅動的 pre-scale**：你在遊戲業學到的「活動上線前先拉容量、寧可浪費兩小時也不要開場崩潰」在這裡原封不動適用——產品要推播、要上新功能、行銷要投放，容量要先到位。把「行銷日曆進入容量規劃流程」變成制度,比任何演算法都有效。\n\n## 多維 scaling：加 replica 只是其中一個旋鈕\n\n「容量不夠」有不止一種解法，每種的調整成本與時間尺度差很多。資深工程師的價值在於知道該轉哪個旋鈕：\n\n| 維度 | 解什麼問題 | 時間尺度 | 代價 |\n|---|---|---|---|\n| 加/減 replica | 吞吐不足、佇列堆積 | 分鐘級（暖）～小時級（冷） | 線性 $；本章主軸 |\n| 改 TP 度（ch09） | 單請求延遲不達標、或模型裝不下 | 小時級：全 fleet 重新部署 + 重新 benchmark | 通訊 overhead 改變整條效能曲線，舊容量數據作廢 |\n| 改 MIG profile（ch11） | 小模型的利用率、多租戶隔離 | 小時級：節點 drain + 重切 | 排程複雜度、碎片化 |\n| 換卡型（H100→B200…） | 經濟學的根本改變（$/有效 token） | 天～週：採購、排隊、遷移 | 一切 benchmark 重做；ch16 的決策 |\n| 動模型（量化、換 size、開 spec decode，ch07） | 容量買不到或買不起 | 天級 + 品質評估 | 品質風險,需要 eval gate（ch15） |\n\nAutoscaling 只自動化第一列。後四列是容量**工程**——按月做的審視,不是按分鐘做的反應。常見的職業級錯誤是用第一列硬扛本該用後四列解的問題：ITL 不達標就加 replica 是沒用的，單 replica 的 decode 速度跟 replica 數無關（ch03/ch09）——加 replica 解排隊，不解「算得慢」。\n\n## 死亡螺旋：KV 壓力的正回饋迴圈\n\nLLM serving 特有的 cascade failure，本章必須讓你能在凌晨三點一眼認出它：\n\n```text\n        流量上升 / 長 context 請求增多\n                    │\n                    ▼\n     KV cache 利用率逼近 100%（ch05）\n                    │\n                    ▼\n   scheduler 開始 preemption：踢掉執行中請求（ch06）\n                    │\n                    ▼\n   被踢請求回到佇列，KV 被釋放——但它的 prefill 要全部重算\n                    │\n                    ▼\n   有效負載上升（同樣的請求,要做更多次 prefill）\n   goodput 下降、TTFT 飆升\n                    │\n                    ▼\n   client 逾時 → 重試（retry storm，ch15）→ 流量進一步上升\n                    │\n                    └────────► 回到第一步，增益 > 1\n```\n\n你見過它的兩個近親：retry storm,以及 RDS 連線池耗盡時「逾時→重連→更多連線壓力」的螺旋。結構相同：**過載的系統為了處理過載而做更多工作**。LLM 版本的特殊處在於增益特別大——一次 preemption 浪費的是數千 token 的 prefill 算力，而重試進來的請求又是全額成本。\n\n**可觀測的前兆**（按時間順序）：`vllm:kv_cache_usage_perc` 貼上 0.95+ → `vllm:num_preemptions_total` 的 rate 從 0 變成持續正值 → `num_requests_waiting` 開始堆積、TTFT p95 飆升——而此時 GPU utilization 是滿的、pod 全部 healthy。「GPU 100% 忙碌但 goodput 歸零」是這個故障的指紋。\n\n**防禦工事的位置**（由外而內）：\n\n1. **Admission control 在 gateway，不在引擎**（ch12 的結論在這裡兌現）：引擎的 waiting 佇列無界且不回 429。過載時必須在最前面拒絕——回 429 + `Retry-After`，讓 client 的退避邏輯有東西可遵循。Mooncake 論文把這叫 early rejection,是其 overload-oriented scheduling 的核心：在「開始算之前」拒絕,遠勝於「算到一半被踢」。\n2. **Circuit breaker 以 preemption rate 為斷路條件**：`rate(vllm:num_preemptions_total[1m]) > 0` 持續 N 分鐘 → gateway 收緊 admission（降低放行併發），直到 preemption 歸零。這是買時間的機制——記住 scale-up 要 8–30 分鐘，螺旋成形只要幾十秒，**autoscaling 在死亡螺旋面前永遠遲到**，斷路器才是第一響應者。\n3. **保守的引擎配置**：`max-num-seqs` 與 `gpu-memory-utilization` 留出餘量（ch06/ch08），讓 p95 的 context 長度組合也塞得下；KV 利用率的告警線設在 0.85 而非 0.95。\n4. **分級卸載**：過載時先丟（或降級）低優先級流量——priority scheduling（vLLM V1 支援 priority policy）與租戶分級（ch16）。brownout 手段（縮 max context、關 spec decode 換容量）見 ch15。\n\n## Worked example：5,000 並發對話的完整容量規劃\n\n全書最重要的計算題之一。題目：\n\n> 你的公司要上線一個 chat 產品。產品端給的需求：尖峰 **5,000 個並發對話**;SLO：**TTFT p95 < 1.5s、ITL p95 < 60ms**（打字感流暢）。模型選定 70B-class dense（即 ch03 反覆計算的 Llama-3.3-70B 級別），FP8 權重 + FP8 KV cache。問：需要幾張 H100？月成本多少？\n\n方法論先行（這五步就是你面試時要背出來的骨架）：\n\n> **① 把產品語言翻譯成流量模型（λ、token 分布、尖峰行為）→ ② 定義 replica 單位，benchmark 出 SLO 內的單 replica 持續吞吐 μ（goodput 膝點）→ ③ N_base = ⌈λ_peak / μ⌉ → ④ 加 headroom：burst 係數 + N+1 → ⑤ 複核（KV 容量、預算）、壓測驗證、上線後用真實數據回填。**\n\n### Step 1 — 流量模型：5,000 並發對話 ≠ 5,000 個 in-flight 請求\n\n這是最常見的錯誤翻譯。對話有 think time——使用者在讀回覆、在打字。你的 CCU 直覺直接適用：10K CCU 的遊戲也不是每秒 10K 個請求。建立模型：\n\n| 參數 | 值 | 來源 |\n|---|---|---|\n| 輸入 token（含多輪歷史） | median 1,200 / **mean 1,500** / p95 4,000 | 同類產品數據或 beta 期實測 |\n| 輸出 token | median 200 / **mean 250** / p95 600 | 同上 |\n| 一次生成耗時 | ≈ TTFT 1s + 250 × 45ms ≈ **12s** | 由 SLO 與輸出長度推出 |\n| 使用者讀 + 打字 | ≈ 48s | 產品端估計，需實測修正 |\n| ⇒ 每對話請求週期 | **60s／請求** | |\n\n於是尖峰到達率 **λ_peak = 5,000 ÷ 60 ≈ 83 req/s**。換算 token 需求：輸出 83 × 250 ≈ **20,800 tok/s**；prefill 原始需求 83 × 1,500 ≈ 125k tok/s——但多輪對話每次重送歷史,prefix cache 命中率高（ch05），有效 prefill 約打 4 折。這些 token 數不直接用來除卡數（那會漏掉排程與干擾的損耗），它們的用途是**設計 benchmark 的 workload**。\n\n再用 Little's law 複核 in-flight 數：L = λ × W = 83 × 12s ≈ **1,000 個同時在生成的請求**。5,000 並發對話的真實瞬時負載是 1,000 in-flight——差 5 倍，這個係數值幾十萬美元。\n\n### Step 2 — 定義 replica 單位，benchmark 出 μ\n\nReplica 單位選 **2×H100 80GB、TP2**（70B FP8 權重約 70GB,單卡塞下後 KV 空間太侷促,TP2 是這個量級的標準解，ch09）。先紙上複核記憶體（ch03 公式）：\n\n```\n每 GPU 預算：80 GB × 0.92 (gpu-memory-utilization) = 73.6 GB\n權重：70 GB ÷ 2 (TP2)                       = 35.0 GB/GPU\nactivation + CUDA graphs + NCCL buffers      ≈  4.6 GB/GPU\n⇒ KV cache 空間 ≈ 34 GB/GPU × 2             = 68 GB/replica\n\nLlama-3.3-70B 每 token KV（FP16）= 0.33 MB（ch03）→ FP8 KV = 0.16 MB\n⇒ KV 容量 ≈ 68 GB ÷ 0.16 MB ≈ 425k tokens\n```\n\n再用 roofline 複核 ITL 下限（ch02）：每個 decode step 每卡讀 35GB 權重 ÷ 3.35TB/s ≈ 10.5ms，加上 TP all-reduce 與 chunked prefill 干擾,生產 batch 下 ITL p95 落在 40–60ms 是物理上合理的——SLO 可達,但不寬鬆。**如果這一步算出來物理上限就不達標，後面都不用跑了**——紙上複核的價值就在這裡。\n\n然後上真 benchmark（`vllm bench serve` 或 inference-perf，方法論細節與 coordinated omission 的坑見 ch14），關鍵紀律：**用 Step 1 的 token 分布造 workload、開 prefix caching 模擬多輪重送、open-loop 注入、每檔速率至少跑 20 分鐘穩態**。掃 request rate 找 SLO 膝點（下表為示意數字,量級依據上面的物理複核，你的實測會不同——方法照搬即可）：\n\n| 注入速率 | 穩態 in-flight | TTFT p95 | ITL p95 | KV 使用率 | SLO 判定 |\n|---|---|---|---|---|---|\n| 4 req/s | ~48 | 0.6s | 35ms | ~25% | ✓ |\n| 6 req/s | ~72 | 0.8s | 44ms | ~33% | ✓ |\n| **8 req/s** | **~96** | **1.2s** | **55ms** | **~42%** | **✓ ← 膝點** |\n| 10 req/s | ~130+ | 3.5s | 82ms | ~55% | ✗ 佇列形成,TTFT 爆 |\n\n**μ = 8 req/s／replica**（goodput 語意：SLO 內的最大持續速率，ch06/ch14）。注意這個 workload 是 compute/干擾先飽和（KV 才 42%）;若是長 context 的 RAG workload，KV 軸會先撞牆,膝點的成因不同——這就是為什麼 benchmark 必須用你自己的 token 分布,抄別人的數字等於抄別人的答案卷。\n\n順手複核 Little's law：8 req/s × 12s = 96 in-flight，與實測吻合,模型自洽。\n\n### Step 3 — 基線卡數\n\n```\nN_base = ⌈λ_peak / μ⌉ = ⌈83 / 8⌉ = ⌈10.4⌉ = 11 個 replica = 22 張 H100\n```\n\n### Step 4 — Headroom\n\n- **Burst 係數**：尖峰時段內部的分鐘級抖動 + scale-up 視窗（T_react ≈ 10 min）內的最大成長。沒有歷史數據時，消費級產品取 1.3 起跳：83 × 1.3 = 108 req/s → ⌈108/8⌉ = 14 個 replica。\n- **容錯**：N+1（一個 replica 在故障或 rollout 中）→ **15 個 replica = 30 張 H100**。\n\n預測尖峰時利用率 ρ = 10.4/15 ≈ **69%**——這就是 SLO + 變異數 + 容錯的總價。配套的 KEDA 配置即前文那份 YAML：`minReplicaCount: 11`（日間尖峰時段，由 cron trigger 維持;夜間可降到 4–6）、`maxReplicaCount: 18`（預算閘門）、佇列 + KV 雙觸發。\n\n### Step 5 — 複核與月成本\n\nKV 複核：尖峰每 replica 96 in-flight × 平均存活 context ~1,700 tokens ≈ 163k tokens ≈ 26GB，是 425k 容量的 ~40%;p95 長度組合下也不會逼近天花板 ✓（prefix cache 會把剩餘空間填滿——KV 使用率讀數會偏高,正常）。\n\n月成本（2026 年年中快照級距,只看量級;完整成本工程見 ch16）：\n\n```\nH100 neocloud on-demand ≈ $2.5/GPU·hr（級距 $2–3.5）\n\n上限（30 卡 × 24/7）：30 × $2.5 × 730 hr ≈ $54,800/月\n實際（diurnal autoscaling,平均 fleet ≈ 尖峰的 60%）：≈ $33,000–38,000/月\n```\n\n合理性 sanity check：日均負載約尖峰 35% → 每月輸出 token ≈ 19B → 全包成本 ≈ **$1.8–2.0 / M output tokens**,與 70B-class 模型的 API 牌價同量級——自建在這個量級尚未明顯划算,要靠 reserved 折扣與利用率工程才會（break-even 分析見 ch16）。\n\n### Step 6 — 驗證與回填\n\n上線前：以 1.3× λ_peak（108 req/s）對 15-replica fleet 做 30 分鐘以上穩態壓測（k6 或 inference-perf）,通過標準：SLO 全綠、preemption = 0、佇列不增長;再做一次「壓測中 kill 一個 replica」驗證 N+1 真的成立。上線後：把假設（think time 60s、token 分布、prefix 命中率）換成真實數據重算一輪——**容量規劃是迴圈,不是儀式**。\n\n### 模擬工具的角色\n\n掃配置空間（TP 度 × batch 上限 × 卡型 × 排程策略）時,真 GPU benchmark 每一格都要錢。模擬器（如 Microsoft 的 Vidur,MLSys 2024）用 profiling 數據預測不同配置的 TTFT/TPOT，把搜索成本降幾個量級。誠實的 hedge：截至我能確認的資訊（2026-06），Vidur 上一次 PyPI release 是 2025-08，維護動能存疑，宜當研究級工具——用它縮小候選集,最終配置仍以真 benchmark 拍板。輕量級的替代是用 llm-d-inference-sim 在模擬叢集上驗證「排程與擴縮邏輯」（見動手做），它不預測效能數字,但能驗證你的 autoscaling 行為。\n\n## 故障模式與防禦\n\n| 故障 | 症狀 | 根因 | 防禦 |\n|---|---|---|---|\n| **Flapping（擴縮震盪）** | replica 數鋸齒狀;每次縮容後幾分鐘又擴 | 對稱的擴縮策略 + 佇列訊號天然抖動 | 不對稱 behavior（擴快縮慢）、縮容 stabilization ≥ 15 min、threshold 與告警線拉開距離 |\n| **平均值掩蓋熱點** | fleet avg 正常,但部分使用者 TTFT 爆 | 對 `avg()` 觸發 + KV-aware routing 的刻意不均（ch10） | 觸發用 `sum()`/`max()`;per-replica 佇列做告警不做觸發 |\n| **指標管線斷裂** | 流量上升但 replica 數紋絲不動 | Prometheus/scrape 故障,HPA 拿不到指標就維持現狀 | KEDA `fallback` 設安全容量;對「指標缺席」本身告警（ch14） |\n| **擴容擴了個寂寞** | HPA 已到 desired,pending pod 卡 10+ 分鐘 | 叢集沒有空 GPU、雲端無貨（stockout） | overprovisioning placeholder（ch11）、多 AZ/多雲容量策略（ch16）、maxReplica 要對齊「真的租得到」的數量 |\n| **Scale-to-zero 陷阱** | 閒置後第一個請求逾時 | 冷啟動分鐘級（ch12） | 同步服務 min ≥ 1;長尾模型才歸零,且 client 端設計等待 UX |\n| **負載中 readiness 假死** | 尖峰時 pod 被踢出 LB → 剩餘 pod 更過載 → 連鎖 | readiness probe 在高負載下逾時 | probe 必須輕量(不做真推論)、timeout 寬鬆;深健康檢查另設頻道（ch15） |\n| **死亡螺旋** | preemption rate > 0、TTFT 爆、GPU 100% 忙、goodput 歸零 | KV 壓力 → preemption → 重算 → 更高負載（本章前述） | gateway admission control、preemption 斷路器、KV 告警線 0.85、priority shedding |\n| **縮容殺掉暖 replica** | 縮容後 TTFT 全面變差,雖然容量「夠」 | prefix cache 隨 pod 銷毀;縮容挑了快取最熱的 victim | 縮容慢 + 一次一個;路由層感知 drain（ch10/ch15） |\n\n共同主題：autoscaler 是一個以「指標→決策→執行」為迴路的控制系統，三段每一段都會壞——指標會說謊或缺席、決策會震盪、執行會卡在沒貨。把每一段的失效模式都設好預設行為，才算設計完成。\n\n## 動手做\n\n### Lab 1 — 佇列驅動的 autoscaling 全迴路 **[M1]**\n\n在 ch11 搭好的 `gpu-sim` 模擬叢集上，把本章的訊號→KEDA→擴縮迴路真的跑起來（對應 plan.md 旗艦專案①的進階）。零 GPU 費用。\n\n1. 裝 KEDA（helm）與 kube-prometheus-stack;部署 llm-d-inference-sim 的 Deployment（它模擬 vLLM 的 OpenAI API 與 vLLM 相容的 `/metrics`,可設定 TTFT/ITL 延遲參數）,initial replicas = 2,讓 Prometheus 抓它的指標。\n2. 套用本章的 ScaledObject（把 query 的 label 換成你的 job 名,threshold 先設 5）。\n3. 用 k6 寫 ramp 場景：60s 內從 5 VU 拉到 80 VU,維持 10 分鐘。觀察三條曲線：`num_requests_waiting`、replica 數、k6 的 p95。\n4. **成功標準**：能在 Grafana 上指出「佇列開始堆積」與「新 replica 就緒」之間的時間差（這就是你的 T_react）;然後把 minReplicaCount 從 2 改成 4 重跑,展示 headroom 對 p95 的改善。\n5. 進階:給 sim 加上 startup 延遲(模擬權重載入),重跑 ramp,觀察 T_react 變長之後 headroom 需求怎麼變——把本章的 headroom 公式用自己的數據驗證一次。\n\n### Lab 2 — 換一種 workload 重做容量規劃 **[紙上推演]**\n\n把 worked example 的方法套到新題目：「內部 RAG 助理，800 個分析師並發使用，輸入 mean 8,000 / p95 20,000 tokens,輸出 mean 300,TTFT p95 < 4s、ITL p95 < 80ms」。要求：走完五步、明確指出這個 workload 的膝點會由哪個軸決定（提示：先算 KV——它跟 chat 案例不同）、並回答「這個場景該不該考慮 P/D 分離（ch10）」。成功標準：卡數、headroom、月成本三個數字 + 每步的依據。\n\n### Lab 3 — 配置空間搜索 **[紙上推演]**\n\n用 Vidur（若環境裝得起來;研究級工具,2026-06 維護狀態存疑）或手算,對 Lab 2 的 workload 比較三種配置：TP2×H100、TP4×L40S、TP2×H200,各自的記憶體帳、理論 ITL 下限（roofline）、估計卡數與成本排序。成功標準：一張對照表 + 一段「我會選哪個、什麼新資訊會讓我改變主意」。\n\n## 這個領域往哪走\n\n- **Autoscaling 正在往 gateway 裡長**。Gateway API Inference Extension v1.5（2026-04）加入了 pool 層級的 saturation gauge 與 flow control——飽和度感知從「事後擴縮」前移到「路由當下」。擴縮、路由、admission control 三件事正在融合成同一個控制平面（ch12 的架構會繼續演化）。\n- **SLO 驅動的 planner 取代 threshold 調參**。NVIDIA Dynamo 的 Planner 配合 AIConfigurator 做吞吐建模：給定 SLO 與流量,直接算出 P/D 配比與 replica 數,而不是讓人肉調 threshold。方向是把本章的 worked example 變成系統的內建能力——但方法論不會過期,因為你得看懂它算出來的東西對不對。\n- **Agentic 流量讓尖峰更機器化**（ch17）：burst 由程式發起、相關性強、沒有 think time,Step 1 的流量模型假設全要重估。容量數學不變,輸入分布劇變。\n\n## 自我檢核\n\n1. 為什麼 GPU utilization 接近 100% 對 autoscaling 沒有資訊量？一個 batch=1 的 decode 迴圈為什麼會顯示高 util？\n2. 寫出 vLLM 的四個 autoscaling 相關指標名,按「領先→落後」排序,並說明各自的判讀陷阱（至少含 prefix caching 對 KV 使用率讀數的影響）。\n3. KEDA 多個 trigger 同時存在時的合成語意是什麼？為什麼縮容的 stabilization window 要遠長於擴容?給出三個理由。\n4. 5,000 並發對話為什麼不等於 5,000 個 in-flight 請求？用 Little's law 寫出換算,並說明 think time 假設錯 2 倍時卡數差多少。\n5. 默寫容量規劃五步驟。為什麼 benchmark 必須用自己的 token 分布而不能引用別人的數字？\n6. 完整描述死亡螺旋的因果鏈、三個按時間順序出現的前兆指標,以及為什麼 autoscaling 救不了它、第一響應者該是什麼。\n7. 從 T_react 推導 headroom 比例的公式是什麼？warm pool 的三個層級各用什麼代價換掉哪段時間？\n8. 「ITL p95 不達標」為什麼通常不能靠加 replica 解決?該轉哪些旋鈕？\n\n## 延伸閱讀\n\n- [vLLM Metrics 設計文件](https://docs.vllm.ai/en/latest/design/metrics/) — V1 指標的權威清單與設計理由,本章訊號階層的事實來源。\n- [vLLM production-stack: Autoscaling with KEDA](https://docs.vllm.ai/projects/production-stack/en/latest/use_cases/autoscaling-keda.html) — 官方的佇列驅動 KEDA 教學,Lab 1 的真 GPU 版。\n- [KEDA Prometheus scaler 文件](https://keda.sh/docs/2.19/scalers/prometheus/) 與 [ScaledObject 規格](https://keda.sh/docs/2.19/reference/scaledobject-spec/) — threshold 語意、fallback、behavior 的精確定義都在這裡。\n- [Knative Autoscaling 文件](https://knative.dev/docs/serving/autoscaling/) — KPA 的 concurrency/RPS 模型與 scale-to-zero 配置。\n- [Red Hat: KServe autoscaling for vLLM with KEDA](https://developers.redhat.com/articles/2025/09/23/how-set-kserve-autoscaling-vllm-keda) — KServe 生態下指標驅動擴縮的落地寫法。\n- [DistServe 論文（arXiv:2401.09670）](https://arxiv.org/abs/2401.09670) — goodput（SLO 內吞吐）作為容量單位的源頭之一,Step 2 的理論依據。\n- [Mooncake 論文（arXiv:2407.00079）](https://arxiv.org/abs/2407.00079) — overload-oriented scheduling 與 early rejection:生產系統怎麼把 admission control 當一級設計。\n- [Vidur 論文（arXiv:2405.05465）](https://arxiv.org/abs/2405.05465) 與 [repo](https://github.com/microsoft/vidur) — LLM 推論模擬器的代表作;維護動能存疑（2026-06）,當研究工具讀。\n- [AKS: Autoscale KAITO inference workloads with KEDA](https://blog.aks.azure.com/2026/02/03/autoscale-inference-workloads-with-kaito) — 雲端託管視角的同一套模式（2026-02）。\n"}, {"id": "ch14-observability-benchmarking", "file": "ch14-observability-benchmarking.md", "group": "Part V — 生產維運", "title": "ch14 — 可觀測性與 Benchmark：你不能優化你量不到的東西", "md": "# ch14 — 可觀測性與 Benchmark：你不能優化你量不到的東西\n\n> **本章解決什麼問題**：前面所有章節的決策——調哪個參數（ch08）、要不要 P/D 分離（ch10）、留多少 headroom（ch13）——最後都要靠數據回答。本章建立兩件事：一套分層的指標體系（從產品 SLO 一路往下鑽到 DCGM 的硬體計數器），以及一套誠實的 benchmark 方法論（open-loop、warmup、latency-throughput frontier、goodput@SLO）。這是你 FluentBit pipeline 與 k6 經驗最直接複用的一章；ch15 的告警 runbook、ch16 的成本指標都建立在本章的指標地基上，但不在這裡展開。\n\n## 從你已知的出發\n\n你做過兩件事，跟本章是同構的。\n\n第一件：你用 FluentBit + Lua 從 production logs 萃取 API 指標送進 S3——本質是「應用不直接給你想要的指標，所以你在旁路建一條萃取管線」。LLM serving 的好消息是引擎（vLLM）原生暴露 Prometheus `/metrics`，硬體有 DCGM-exporter，你不用再寫 Lua 去 parse log；壞消息是指標的「層」變多了：你以前一層 API 指標就能回答大部分問題，現在同一個症狀（「變慢了」）的根因可能在五層中的任何一層——產品、請求、引擎、GPU、叢集——而且**各層指標會互相說謊**（GPU「100% 利用率」可能什麼有效工作都沒做，後面講透）。\n\n第二件：你用 k6 和 Vegeta 做負載測試。這個經驗九成可以平移，但有一個你可能已經隱約知道、在 LLM 世界會被放大一百倍的陷阱：**closed-loop 測試的 coordinated omission**。你的遊戲 API 一個請求 50ms，k6 用 `constant-vus` 測出來的偏差還能忍；LLM 一個請求 5 秒到 5 分鐘，closed-loop 的自我節流會讓你的 benchmark 結果跟生產現實差出 30% 以上——本章的 worked example 會用數字把這件事拆穿。\n\n方法論還是你那套：量測 → 診斷 → 優化 → 用數據證明。你拿它降過 RDS CPU 40%；這章把儀器換成 GPU 世界的。\n\n## 五層指標分類學\n\n先給全景，再逐層拆。每層回答一個不同的問題：\n\n```text\n┌─ 產品層 ──「使用者拿到價值了嗎?」── availability、goodput@SLO\n├─ 請求層 ──「單一請求的體驗如何?」── TTFT、ITL/TPOT、E2E、排隊時間\n├─ 引擎層 ──「引擎把資源用好了嗎?」── batch 占用、KV util、preemption、cache hit\n├─ GPU 層 ──「硬體在做什麼?」────── DCGM:SM/tensor/DRAM activity、功耗、Xid\n└─ 叢集層 ──「容量與排程健康嗎?」── pending pods、pool 飽和度、佇列深度\n```\n\n診斷永遠從上往下鑽：產品層告警 → 請求層定位哪段延遲壞了 → 引擎層找機制原因 → GPU 層確認物理現實 → 叢集層看是不是容量問題。反過來（看到 GPU 指標異常就開修）容易修一個不影響使用者的「問題」。\n\n### 產品層\n\n| 指標 | 定義 | 怎麼採 | 健康值 | 異常形態 |\n|---|---|---|---|---|\n| Availability | 成功請求比例；**串流場景下「成功」= 完整收完 stream**，不是 HTTP 200 | 不能只看 status code——SSE 開流後才死的請求，200 早就發出去了。要在 gateway/client SDK 層記 `finish_reason`（正常 stop vs 斷流）；vLLM 端對照 `vllm:request_success_total` 的 label | ≥ 99.9%（依產品 SLO） | 200 比例正常但斷流率上升 = 引擎在 stream 中途 OOM/被 preempt 殺掉（見 ch15），傳統 LB 健康檢查完全看不到 |\n| Goodput@SLO | 單位時間內**滿足 SLO 的**請求（或 token）數。定義見本章後半 | 由請求層的 TTFT/ITL histogram 推導（PromQL 在下面） | 接近總吞吐（gap < 5%） | 總吞吐平穩但 goodput 下滑 = 系統「忙而無效」，最危險的退化形態，平均值儀表板上完全隱形 |\n\n模型品質（答得好不好）也是產品層指標，但屬於 eval 與 canary gate 的範疇（見 ch15）；成本指標 $/Mtok 在 ch16。\n\n### 請求層\n\n四個延遲指標的關係先釘死，面試與報告都會用到：\n\n```text\nE2E = 排隊時間 + prefill 時間(≈TTFT − 排隊) + decode 時間\nTTFT  = 請求送出 → 第一個 token        （使用者感知的「開始回應」）\nITL   = 相鄰兩個 token 的間隔          （每個 token 一個樣本）\nTPOT  = (E2E − TTFT) / (輸出 token 數 − 1)（單一請求的 ITL 平均）\n```\n\n| 指標 | 定義 | 怎麼採 | 健康值（互動式 chat 的常見目標） | 異常形態 |\n|---|---|---|---|---|\n| TTFT | 含排隊 + prefill；server 端與 client 端要分開量，差值是 gateway/網路的「平台稅」 | server 端：`vllm:time_to_first_token_seconds`（histogram）；client 端：benchmark 工具或 SDK 埋點 | p95 < 1.5s（接 ch13 的 SLO 設定） | p99 先壞、p50 不動 = 排隊或 preemption；整條分布右移 = prefix cache hit 掉了（鑽引擎層）或 prompt 變長了 |\n| ITL | token 間隔的逐 token 分布 | `vllm:inter_token_latency_seconds`（舊版叫 `time_per_output_token_seconds`，指標名隨版本演進，以你部署版本的 `/metrics` 輸出為準，2026-06） | p95 < 60ms（快過人類閱讀即可） | p99/p999 出現尖刺 = decode 被長 prefill 卡住（chunked prefill 預算太大，見 ch06）或被 preempt；**TPOT 平均會把這些 stall 抹平**，所以 ITL 分布不可省 |\n| E2E | 請求進到最後一個 token | `vllm:e2e_request_latency_seconds` | 取決於輸出長度，無通用值 | 用來算 drain 預算（ch15）與 Little's law 驗證，不適合直接設 SLO |\n| 排隊時間 | 引擎收到 → scheduler 排入 batch | `vllm:request_queue_time_seconds` | ~0（p99 < 100ms） | 持續 > 0 且增長 = 飽和的最早訊號，比任何 GPU 指標都早（你在遊戲後端見過同一個模式：佇列先於資源惡化） |\n\n**ITL vs TPOT 值得多一句**：TPOT 是 per-request 平均，適合容量計算；ITL 是 per-token 樣本，適合抓體驗劣化。一個請求 256 個 token 裡有一次 2 秒的 stall（被 preempt 後 recompute），TPOT 只從 40ms 變成 48ms，看起來沒事；ITL p99 會直接打到 2s。使用者感受到的是那次卡頓，不是平均。\n\n### 引擎層\n\n這層是 vLLM `/metrics` 的主場（指標名以 2026-06 的 vLLM 文件為準）：\n\n| 指標 | 定義 | 怎麼採 | 健康值 | 異常形態 |\n|---|---|---|---|---|\n| `vllm:num_requests_running` | 本輪 decode batch 裡的請求數 | gauge，直接抓 | 接近但不貼死 `max-num-seqs` | 貼死上限 + waiting > 0 = batch slot 是瓶頸；遠低於上限但 GPU 忙 = 單請求太肥（長 context 吃 KV） |\n| `vllm:num_requests_waiting` | 引擎內部等待佇列深度 | gauge | ~0 | 持續增長 = 飽和；**這個佇列是無界的、不會自己回 429**（ch06），admission control 必須在 gateway 層（ch12） |\n| `vllm:kv_cache_usage_perc` | KV cache block 使用比例（0–1） | gauge | 尖峰 0.6–0.85（經驗值） | 持續 > 0.9 = preemption 風險區；打到 1.0 後 preemption 啟動 → 尾延遲與吞吐同時惡化（死亡螺旋入口，防禦見 ch13） |\n| Preemption 次數 | KV 不足時被踢出 batch 重排的請求數（`vllm:num_preemptions_total`，counter） | `rate()` 後看 | 0 | 任何持續非零值都該開 ticket；rate 突增 + KV util 100% = 立刻處理 |\n| Prefix cache 命中率 | `rate(vllm:prefix_cache_hits[5m]) / rate(vllm:prefix_cache_queries[5m])` | 兩個 counter 相除 | 取決於流量形態：agentic 流量 60–90%+，無共享前綴的冷流量可能 < 10%（ch05） | **緩慢下滑**是經典隱性退化：deploy 重啟清空 cache、路由器親和性壞掉（ch10）、或流量結構變了。它直接放大 prefill 成本，下游症狀是 TTFT 整體右移 |\n| Spec decode 接受率 | `vllm:spec_decode_num_accepted_tokens / vllm:spec_decode_num_draft_tokens` | counter 相除 | 視方案，EAGLE 類 60–80%（ch07） | 接受率掉 = 流量分布偏離 draft model 的訓練分布，spec decode 可能已經是負優化 |\n\n### GPU 層（DCGM）\n\nDCGM-exporter 的部署在 ch11（GPU Operator 全家桶）講過；這裡講欄位語意。先記住一個分界：**`DCGM_FI_DEV_*` 是傳統裝置層欄位，`DCGM_FI_PROF_*` 是 profiling 計數器**——精度高、支援 MIG，是你該用的。\n\n| 欄位 | 定義 | 健康值（decode 為主的 serving） | 異常形態 |\n|---|---|---|---|\n| `DCGM_FI_DEV_GPU_UTIL` | 「取樣窗內**至少有一個 kernel 在跑**的時間比例」——就是 `nvidia-smi` 的 GPU-Util | 高負載下幾乎恆 90%+，**資訊量趨近於零**（下一節拆解） | 別用它做任何決策；不支援 MIG |\n| `DCGM_FI_PROF_GR_ENGINE_ACTIVE` | compute engine active 的時間比例，GPU_UTIL 的高精度替代品 | 滿載 > 0.85 | 低 + 引擎佇列在長 = 引擎卡住而非容量不足（scheduler 卡死、NCCL hang，見 ch15） |\n| `DCGM_FI_PROF_SM_ACTIVE` | 至少一個 warp 駐留的 SM 比例（對所有 SM 平均） | 滿載 > 0.8 | 注意：warp 在等記憶體也算 active——高 ≠ 在算東西 |\n| `DCGM_FI_PROF_SM_OCCUPANCY` | 駐留 warp 數 / 理論上限 | decode 時中低是常態 | 用於 kernel 層分析（ch07），不是運維告警對象 |\n| `DCGM_FI_PROF_PIPE_TENSOR_ACTIVE` | tensor core pipe active cycle 比例 | **decode 重時 10–25% 是物理，不是 bug**；prefill 突發時衝高 | 全天低且你的流量明明 prefill 很重 = 檢查 batch 與 chunked prefill 設定 |\n| `DCGM_FI_PROF_DRAM_ACTIVE` | HBM 介面 active cycle 比例 | decode 重時 0.5–0.8，**高代表頻寬有被用起來**（ch02：decode 是 memory-bound，這是「健康的忙」） | 與 TENSOR_ACTIVE 同時低 + 引擎說自己很忙 = 各層指標矛盾，先懷疑量測 |\n| `DCGM_FI_DEV_FB_USED` | framebuffer 已用記憶體 | 恆高——vLLM 啟動就按 `gpu-memory-utilization` 預占（ch08），**「GPU 記憶體用量高」永遠不是告警條件**，真訊號在引擎層 KV util | 比預期低 = 引擎沒起來或參數錯 |\n| `DCGM_FI_DEV_POWER_USAGE` | 板卡功耗 | 滿載接近 TDP | 功耗是「有效工作量」的意外好代理：同 fleet 某卡功耗持續偏低 = 慢卡/掉頻/throttling，整池會被它拖慢（ch15 的隱性退化） |\n| `DCGM_FI_DEV_GPU_TEMP`、throttle reasons | 溫度與降頻原因 | 視機型 | thermal throttle = 機房問題不是軟體問題 |\n| `DCGM_FI_DEV_XID_ERRORS` | 最近一次 Xid 錯誤碼 | 0 | 非零直接進 ch15 的故障目錄查表；某些 Xid 該觸發自動 cordon（ch11） |\n\n上面的「健康值」都是經驗量級起點，不是規範——你的模型、卡型、流量形態會移動這些數字；正確做法是用本章後半的 benchmark 替自己的系統建立 baseline。\n\n### 叢集層\n\n簡短帶過，機制都在前面的章節：pending GPU pods 與排程失敗原因（`kube-state-metrics`，ch11）、Kueue 的 pending workloads（ch11）、gateway/EPP 層的 pool 飽和度與 flow control 計數（GIE v1.5 的 pool-wide saturation gauge，ch12）、跨 replica 的負載與 cache 命中率方差（路由品質的直接證據，ch10）。叢集層指標回答的問題只有一個：「是不是該動容量了」——那是 ch13 的主題。\n\n## SM utilization 的誤導性：把這件事一次講透\n\n這是 GPU 監控最大的坑，值得專門一節。`nvidia-smi` 右上角那個 \"GPU-Util\"（= `DCGM_FI_DEV_GPU_UTIL`）的真實定義是：\n\n> 在過去的取樣窗口內，**至少有一個 kernel 在 GPU 上執行**的時間比例。\n\n注意它量的是「時間」，不是「算力」。H100 SXM 有 132 個 SM；一個只占用 1 個 SM 的 while-true spin kernel，會讓 GPU-Util 顯示 **100%**——機器實際上 99.2% 的算力在發呆。用你熟的世界類比：這等於一個 htop，只要 64 核裡有任何一核非 idle 就回報「CPU 100%」。你絕不會接受這種 CPU 指標，但整個業界的 GPU dashboard 預設擺的就是這個。\n\n誤導有三層，一層比一層隱蔽：\n\n1. **「有 kernel 在跑」≠「SM 都在跑」**。LLM serving 的 decode 迴圈幾乎每微秒都有 kernel 在 GPU 上，所以 GPU-Util 恆貼 100%——不管你的 batch 是 2 還是 200。它對「這張卡還有多少餘量」這個你最想問的問題，回答永遠是同一個數。修正：看 `DCGM_FI_PROF_SM_ACTIVE`（多少 SM 真的有 warp 駐留）。\n2. **「SM 在跑」≠「在算東西」**。SM_ACTIVE 把「warp 駐留但 stall 在等 HBM」也算 active。ch02/ch03 證明過 decode 是 memory-bound：權重從 HBM 搬進來的時間遠大於計算時間。所以 decode 滿載的卡，SM_ACTIVE 高、`PIPE_TENSOR_ACTIVE` 只有一兩成——**這不是浪費，這就是 decode 的物理**。看到 tensor core 利用率低就去「優化」它，方向就錯了；該問的是 DRAM_ACTIVE 高不高（頻寬有沒有吃滿）。\n3. **「在算東西」≠「在算有價值的東西」**。preemption 後的 recompute、本該命中 prefix cache 卻 miss 掉的重複 prefill、spec decode 被拒絕的 draft token——每一焦耳都真實燒掉了，DCGM 每個指標都顯示「忙」，但沒有任何一個 token 因此更早到達使用者。硬體指標在請求語意面前是全盲的。\n\n所以分層的意義在此：**DCGM 告訴你硬體有沒有在動，引擎指標告訴你動得有沒有效率，產品指標告訴你效率有沒有變成使用者價值**。三層各自健康不代表整體健康，三層交叉才有診斷力：\n\n| 症狀組合 | 診斷 |\n|---|---|\n| 佇列增長 + GR_ENGINE_ACTIVE 高 + DRAM_ACTIVE 高 | 真飽和：物理到頂了，去 ch13 擴容 |\n| 佇列增長 + GR_ENGINE_ACTIVE 低 | 引擎卡住，不是容量問題：去 ch15 查故障 |\n| 吞吐降 + preemption rate 升 + KV util 100% | KV 壓力：調 `max-num-seqs` 或加卡，別被「GPU 100%」騙去以為是算力不夠 |\n| TTFT 右移 + prefix hit rate 掉 + GPU 指標全綠 | cache/路由退化：去 ch05/ch10，加卡完全無效 |\n\n這跟你修 RDS 的經驗同構：CPU 100% 從來不告訴你是鎖競爭還是真工作，你當年靠 Performance Insights 的 wait event 分層才找到 SQL 重排的方向。DCGM 之於引擎指標，就是 CPU% 之於 wait events。\n\n## 為什麼平均值說謊：histogram 設計\n\nLLM 的延遲分布天生長尾且多峰：命中 prefix cache 的 TTFT 跟未命中差一個量級（ch05）、被 preempt 的請求跟沒被 preempt 的是兩個世界。對這種分布報平均值，等於把兩座山的海拔平均成一個不存在的丘陵。實務紀律：\n\n- **TTFT 的 histogram bucket 要用對數刻度、跨四個量級**：50ms 到 60s。預設 bucket 如果頂在 10s，一次容量事故裡所有樣本掉進 `+Inf` bucket，`histogram_quantile` 會把 p99「夾」在最後一個 bucket 邊界上——dashboard 顯示 p99 = 10s 恆定，實際是 45s 還在惡化。這是 Prometheus histogram 最陰的失效模式：**指標看起來壞得「很穩定」的時候，先懷疑 bucket 溢出**。\n- **ITL 要看 p99/p999 而不只 p95**：stall 事件（preemption、長 prefill 插隊）是稀疏的，p95 常常完全無感。\n- 常用 PromQL（更多片段見附錄C）：\n\n```promql\n# TTFT p99\nhistogram_quantile(0.99,\n  sum(rate(vllm:time_to_first_token_seconds_bucket[5m])) by (le))\n\n# SLO 達成率:TTFT ≤ 1.5s 的請求比例(le 邊界要在 bucket 設計時就對齊 SLO!)\nsum(rate(vllm:time_to_first_token_seconds_bucket{le=\"1.5\"}[5m]))\n  / sum(rate(vllm:time_to_first_token_seconds_count[5m]))\n```\n\n第二條就是 goodput@SLO 的 Prometheus 近似——前提是你設計 bucket 時就把 SLO 閾值放進 `le` 邊界。先定 SLO、再設 bucket，順序不能反。\n\n## 實作棧：scrape、dashboard、告警\n\n**Scrape**：vLLM pod 加 annotation 或 ServiceMonitor，15s interval 夠用（decode 是秒級動態，再密只是浪費 TSDB）。兩個紀律：(1) **label cardinality**——`model_name` 可以，per-user/per-request label 絕對不行，你在 CloudWatch 看過自訂指標維度爆炸的帳單，Prometheus 爆的則是記憶體；(2) counter 在 pod 重啟時歸零，所有 counter 一律包 `rate()`/`increase()`，永不裸用。\n\n**Grafana dashboard 設計原則：一個面板回答一個運維問題。** 不是把所有指標倒上去，而是按診斷路徑排版：\n\n| 面板（問題） | 指標 |\n|---|---|\n| 使用者現在痛嗎？ | TTFT p50/p95/p99、ITL p99、斷流率 |\n| 在排隊嗎？ | `num_requests_waiting`、`request_queue_time` p99、gateway 429 率 |\n| KV 有壓力嗎？ | `kv_cache_usage_perc`、preemption rate |\n| Cache 還健康嗎？ | prefix hit rate（按 replica 拆開——方差大 = 路由問題） |\n| 硬體在做什麼？ | GR_ENGINE_ACTIVE、DRAM_ACTIVE、功耗（按卡拆開找慢卡） |\n| 容量還剩多少？ | running vs `max-num-seqs`、goodput vs 總吞吐 |\n\n**告警的 page vs ticket 分界**（只列分界原則，處置 runbook 見 ch15）：page 的條件是「使用者正在痛或五分鐘內會痛」——SLO burn rate 超標、waiting 佇列持續增長、斷流率突增、preemption storm、Xid 致命錯誤；ticket 的條件是「趨勢不對但沒人在痛」——prefix hit rate 緩降、KV util 週趨勢上行、單 replica 功耗偏低、histogram 出現 `+Inf` 樣本。**平均值不准出現在任何告警條件裡。**\n\n## Tracing 與日誌\n\n**Tracing**：OTel 的 span 鏈路是 gateway → EPP 決策 → engine。設計重點：\n\n- Span attributes 進 token 計數與路由決策：`gen_ai.usage.input_tokens`、`gen_ai.usage.output_tokens`（OTel GenAI semantic conventions，2026-06 仍在演進中，欄位名以當下 semconv 為準）、EPP 挑了哪個 pod、為什麼（cache 親和 vs 負載分）。\n- **長 streaming 的 span 不要等 stream 結束才有資訊**：一條 span 活兩分鐘，期間 trace 上什麼都看不到。把 `first_token`、`queued`、`scheduled` 記成 span events，TTFT 直接從 event 時間差讀出來。\n- 取樣策略：頭部取樣 1–10% 打底，錯誤與 SLO 違反的請求要 tail-based 全採——你要的是「慢請求的完整解剖」，不是均勻樣本。\n\n**日誌的隱私現實**：prompt 是 PII，這在你以前的 API log 裡少見（你 log 的是 user id 和操作，不是使用者打的每一個字）。紀律：預設不 log prompt/completion 本文；除錯需要時用獨立的、短 TTL、強存取控制的儲存；要做 cache 分析就 log prefix 的 hash 而非原文；萃取管線在邊緣就 redact（你的 FluentBit + Lua 經驗直接上場——同一個 pipeline 形狀，filter 從「萃取指標」變成「先打碼再萃取」）。\n\n## Benchmark 方法論\n\n下半章換帽子：從「觀測生產」變成「製造可信的數字」。一個 benchmark 報告只有在三件事都誠實時才可信：**workload 真實、負載模型正確、統計處理乾淨**。逐一拆。\n\n### Workload 真實性\n\nLLM benchmark 的輸入空間比 HTTP API 大得多，三個維度都會大幅改變結果：\n\n1. **Token 分布**：輸入/輸出長度不是平均數而是分布（生產流量通常重尾）。固定長度（`--ignore-eos` 強制生成到 max_tokens）讓容量計算乾淨、可重現；自然停止則更貼近真實 decode 行為。兩者數字可差 20%+，報告必須註明用哪種。\n2. **Prefix 結構**：共享 system prompt、多輪對話、agentic 迴圈的前綴重複率決定 prefill 的真實成本（ch05）。用零共享前綴的合成資料測一個生產上 80% 命中率的系統，TTFT 會悲觀 2–5 倍；反之用單一 prompt 重複打，會樂觀到離譜。要嘛重放生產 trace，要嘛冷/熱兩組都測。\n3. **到達過程**：均勻到達是不存在的流量。Poisson 是底線，真實 agentic 流量比 Poisson 更 bursty（一個 agent 平行 fan-out 數十個請求，見 ch17）。工具上：inference-perf 支援 Poisson/constant/trace replay，`vllm bench serve` 用 `--request-rate` 加 burstiness 參數控制（2026-06）。\n\n### Open-loop vs closed-loop 與 coordinated omission\n\n用你的 k6 語言講最快：\n\n| | Closed-loop | Open-loop |\n|---|---|---|\n| k6 executor | `constant-vus`、`per-vu-iterations` | `constant-arrival-rate`、`ramping-arrival-rate` |\n| Vegeta | （不適用——Vegeta 天生 open-loop） | `-rate` 旗標就是它 |\n| 模型 | N 個 VU，各自「發請求→等回應→再發」 | 以固定速率發請求，**不管前面的回應回來了沒** |\n| 並發 | 固定（= VU 數） | 浮動（= λ × W，Little's law） |\n| 它模擬的世界 | 固定 worker 池（batch pipeline、有界並發的內部 agent fleet） | 互聯網使用者——**彼此獨立、不會因為伺服器慢就停止到來** |\n\nCoordinated omission（Gil Tene 命名）是 closed-loop 的結構性謊言：伺服器一卡 10 秒，closed-loop 的每個 VU 就乖乖等 10 秒——這段期間它**少發了**本來會到達的請求。結果有兩重：(1) 樣本集裡「災難期間的請求」嚴重欠採樣，percentile 被沖淡；(2) 進攻方恰好在防守方最痛苦時收手——客戶端跟伺服器「協調」好了，故名。你的真實使用者不會協調：伺服器越慢，排隊的人越多。\n\nLLM 把這個老問題放大兩個量級，因為**服務時間從 50ms 變成 5–300 秒**。Closed-loop 64 VUs 意味著引擎看到的並發被精準地夾在 64——佇列永遠是空的，KV 永遠不會被擠爆，preemption 永遠不會發生。你測的不是「這個系統在 35 req/s 下的行為」，是「這個系統在永不超過 64 並發的溫室裡的行為」。而生產環境的 35 req/s 是 open-loop 的：尖峰一來，並發直接衝過 KV 容量的牆。\n\n誠實的補充：closed-loop 不是錯，是另一個問題的答案。「我的 agent pipeline 固定開 32 個 worker，能跑多快」就該用 closed-loop 測。罪不在 closed-loop，在**用 closed-loop 的結果回答 open-loop 的問題**——而容量規劃（ch13）問的幾乎都是 open-loop 的問題。\n\n### Warmup 與穩態\n\n冷啟動的引擎跟穩態的引擎是兩台機器：prefix cache 是空的、編譯快取沒熱、Python 層的配置器還在長大。紀律是：**先打 2–3 分鐘流量，整段丟棄，等指標穩定（prefix hit rate、KV util 走平）再開始計數**；每個量測點至少持續 3–5 分鐘，讓引擎佇列達到該負載下的穩態。順帶一個工具陷阱：`vllm bench serve` 的 `--request-rate` 預設是 `inf`——所有請求在 t=0 一次全部送出，那是在測「瞬間洪峰下的 batch 吞吐」，不是任何穩態（2026-06）。\n\n### Latency-throughput frontier：怎麼跑、怎麼讀\n\n單點數字（「9,000 tok/s！」）沒有意義，因為吞吐和延遲是一條曲線上的取捨（ch06 的 batch 數學決定的）。frontier 就是把這條曲線實測出來：\n\n**怎麼跑**：\n1. 固定 workload（資料集、token 分布、prefix 結構、seed）與引擎配置，全程不動。\n2. Warmup，丟棄。\n3. 以 open-loop 掃 offered rate：例如 2、4、8、16、24、30、35、40 req/s，每檔 5 分鐘。\n4. 每檔記錄：實際達成吞吐、TTFT p50/p95/p99、ITL p95/p99、佇列深度、KV util、preemption 數。\n5. 每檔做有效性檢查：**達成吞吐 ≈ offered rate** 才是有效點；達成 < offered 代表已過飽和點，該點只能標註「飽和」，不能當作「系統能跑這麼快」的證據。同時確認 client 不是瓶頸（k6 自己的 CPU、VU 池夠不夠大——下面的腳本註解會講）。\n6. 畫圖：x 軸吞吐、y 軸各延遲分位數。\n\n**怎麼讀**：曲線必然分三段——平坦區（負載低，延遲由服務時間主導，加負載近乎免費）、膝點（佇列開始形成，p99 先翹）、懸崖（飽和，延遲垂直起飛而吞吐不再增加）。三個讀法：(1) **比較兩個配置看整條曲線**，不看單點——A 配置峰值吞吐高 10% 但膝點早 30%，對線上服務是更差的配置；(2) 膝點位置就是 ch13 容量規劃的輸入；(3) p50 和 p99 的分岔點比膝點更早出現，是最靈敏的飽和前兆。\n\n### Goodput@SLO：單一比較數字\n\nfrontier 是一條曲線，但決策常常需要一個數字。Goodput 的定義（源自 DistServe 論文對 serving 評測的修正）：\n\n> **Goodput@SLO = 在滿足 SLO（例：TTFT p99 ≤ 1.5s 且 ITL p99 ≤ 60ms）的前提下，系統能持續達成的最大吞吐。**\n\n操作上就是在 frontier 的每個量測點檢查 SLO 達成率，取「達成率 ≥ 目標（如 99%）」的最高一檔。它把「吞吐很高但人人都在等」的配置自動判死刑，是引擎調參（ch08）、架構比較（ch10）、容量規劃（ch13）共用的比較基準。兩個紀律：SLO 必須在跑 benchmark **之前**定好，否則你會不自覺挑出對自己有利的閾值；報告 goodput 必須同時報 SLO 定義，沒有 SLO 的 goodput 數字無法比較。還有一個容易踩的坑：**分位數本身是 SLO 的一部分**——本章的示範刻意用較嚴的 p99，而 ch13 的容量規劃題用的是 p95；同樣的閾值換個分位數就是另一個 SLO，跨章（或跨團隊）對照數字之前，先核對分位數。\n\n### 工具選型（2026-06）\n\n| 工具 | 它解什麼問題 | 什麼時候用 |\n|---|---|---|\n| `vllm bench serve` | 引擎自帶、零安裝，調參迴圈內的快速 A/B | 單機調 vLLM 參數時；注意 `--request-rate inf` 預設 |\n| **AIPerf**（NVIDIA，genai-perf 的後繼，前者已停止新功能開發） | 全功能 client 端壓測：TTFT/ITL/吞吐/分位數，OpenAI-compatible 通吃 | 正式的跨引擎/跨配置評測報告 |\n| **inference-perf**（kubernetes-sigs，WG Serving 出品，v0.5.0，2026-05） | 標準化、宣告式 config、goodput 原生支援、trace replay、高 QPS | K8s 環境的可重現基準、CI 迴歸（本人偏好：它的 config-as-code 形態最適合進版控） |\n| **k6 + xk6-sse** | 你已有的整套 scenario/threshold/CI 整合，加上 SSE 能力 | 想複用既有 k6 資產、要測「gateway 到引擎全鏈路」而非裸引擎、要自訂計量邏輯時 |\n\n### k6 SSE-aware 腳本骨架\n\nxk6-sse 是社群擴充；現行 k6 可直接 `import sse from \"k6/x/sse\"` 自動解析，無需手動 xk6 build（以 k6 v1.2 世代驗證，2026-06）。骨架（可運行為目標，prompt 池與 threshold 自行補）：\n\n```javascript\nimport sse from \"k6/x/sse\";\nimport { Trend, Counter, Rate } from \"k6/metrics\";\n\nconst ttft = new Trend(\"ttft_ms\", true);\nconst itl = new Trend(\"itl_ms\", true);\nconst e2e = new Trend(\"e2e_ms\", true);\nconst outTokens = new Counter(\"output_tokens\");\nconst streamOK = new Rate(\"stream_complete\"); // 斷流率,不是 HTTP 狀態碼!\n\nexport const options = {\n  scenarios: {\n    open_loop: {\n      executor: \"constant-arrival-rate\",   // open-loop:到達率與回應快慢無關\n      rate: 8, timeUnit: \"1s\",\n      duration: \"5m\",\n      // 關鍵:xk6-sse 會阻塞 VU 直到 stream 結束,所以「VU 數=最大並發」。\n      // 按 Little's law 配:需要的 VU ≈ rate × p99 請求時長。\n      // 8 req/s × p99 30s = 240,再加安全係數。VU 不夠時 k6 會丟 dropped_iterations\n      // ——那一刻你就退化回 closed-loop,數字作廢。盯著這個計數器。\n      preAllocatedVUs: 400, maxVUs: 600,\n    },\n  },\n  thresholds: {\n    dropped_iterations: [\"count==0\"],      // open-loop 有效性的硬檢查\n    ttft_ms: [\"p(99)<1500\"],\n    itl_ms: [\"p(99)<60\"],\n  },\n};\n\nexport default function () {\n  const payload = JSON.stringify({\n    model: \"meta-llama/Llama-3.1-8B-Instruct\",\n    messages: [{ role: \"user\", content: pickPrompt() }], // 從分布抽樣,別用同一條!\n    max_tokens: 256,\n    stream: true,\n    stream_options: { include_usage: true }, // 拿真實 token 數\n  });\n\n  const t0 = Date.now();\n  let started = false, tPrev = 0, completed = false;\n\n  sse.open(`${__ENV.BASE_URL}/v1/chat/completions`, {\n    method: \"POST\",\n    headers: { \"Content-Type\": \"application/json\",\n               Authorization: `Bearer ${__ENV.API_KEY}` },\n    body: payload,\n  }, (client) => {\n    client.on(\"event\", (ev) => {\n      if (ev.data === \"[DONE]\") { completed = true; client.close(); return; }\n      const now = Date.now();\n      if (!started) { started = true; ttft.add(now - t0); }\n      else { itl.add(now - tPrev); }   // 注意:這是 chunk 間隔的近似\n      tPrev = now;\n      const msg = JSON.parse(ev.data);\n      if (msg.usage) outTokens.add(msg.usage.completion_tokens);\n    });\n    client.on(\"error\", () => { /* 留給 streamOK 統計,別吞掉 */ });\n  });\n\n  streamOK.add(completed);\n  if (completed) e2e.add(Date.now() - t0);\n}\n```\n\n兩個誠實的註記：(1) **一個 SSE chunk 不保證等於一個 token**——引擎可能把多個 token 併進一個 chunk，所以 client 端 ITL 是近似值，真實 token 數要用 `usage` 欄位；精確的 ITL 分布以 server 端 `vllm:inter_token_latency_seconds` 為準，client 端數字拿來量「使用者實際感受」（含網路與中間件，這正是它的價值，見 ch12 的 proxy buffering 問題）。(2) xk6-sse 阻塞 VU 的特性使它不適合做超高並發（數千 stream）的壓測端——到那個量級換 inference-perf，或多台 k6 分散式。\n\n### 效能迴歸防禦：benchmark 進 CI\n\n你寫過 API 的迴歸測試；效能迴歸的難點在**雜訊**。紀律清單：\n\n- 固定一切可固定的：同 GPU SKU、同 driver、鎖定 GPU clock（`nvidia-smi -lgc`，消除 boost 浮動）、固定資料集與 seed、固定引擎參數。\n- 每次至少 3 輪取中位數；維護 baseline 的歷史方差，判定線設在「中位數偏移 > max(2σ, 3%)」之類的雙條件，而不是裸的百分比——單卡上 1–3% 的 run-to-run 雜訊是常態，拿 2% 偏移開 P1 是在訓練團隊忽略告警。\n- 比較對象是 goodput@SLO 與 frontier 上的 2–3 個固定負載點，不是峰值吞吐。\n- 結果存成結構化 artifact（JSON）進版控，迴歸發生時你要能 bisect 到 commit。\n\n## Worked example：拆穿一個「看起來吞吐很高」的 benchmark\n\n> 場景與數字為合成示意，量級對齊單卡 8B 模型的公開基準；重點是方法論差異的「形狀」，不是絕對值。\n\n同事交來一份 benchmark 報告，結論很漂亮：\n\n> 「Llama-3.1-8B（BF16）on 1×H100，k6 64 VUs 打 3 分鐘：**輸出吞吐 9,100 tok/s，平均 E2E 1.8s，平均 TTFT 350ms**。換算 35.5 req/s，扛住尖峰 5,000 並發只要 N 張卡，結案。」\n\nworkload：輸入 ~512 / 輸出 ~256 tokens。先做物理 sanity check（ch02/ch03 的方法）：decode 在 batch ~64 時，每 step 至少讀 16GB 權重，3.35TB/s HBM 下理論上限約 209 step/s × 64 ≈ 13k tok/s——9,100 在理論天花板的 70%，數字本身不假。**假的是它跟生產的關係。**三宗罪：\n\n**罪一：closed-loop（64 VUs）**。35.5 req/s 不是輸入，是輸出——`64 VUs ÷ 1.8s = 35.5 req/s` 是 Little's law 的恆等式，系統再爛這個算式都會給出「系統剛好跟得上」的假象。並發被精準夾在 64：引擎佇列恆空、KV 從未承壓、preemption 為零。它測的是溫室，並且當引擎偶有卡頓時，VU 集體等待、到達率自動下降——coordinated omission，災難期欠採樣，percentile 被沖淡。\n\n**罪二：無 warmup**。3 分鐘的 run 連穩態都沒進入：前 30 秒包含 prefix cache 全冷、64 個 VU 在 t=0 同時開火的 thundering herd。這些慢樣本都在資料裡——但因為只報平均值，被 256 個 token 的長 decode 稀釋到隱形。\n\n**罪三：只報平均**。把他的原始資料拿來重算分位數：TTFT p99 = 1.6s，是平均值的 4.6 倍；ITL p99 = 95ms。如果產品 SLO 是 TTFT p99 ≤ 1.5s、ITL p99 ≤ 60ms，**這份報告自己的資料就已經不及格**，只是平均值替它遮住了。\n\n修正後重跑：warmup 3 分鐘丟棄；prompt 從生產 token 分布抽樣（含 1.5k token 的共享 system prompt，模擬真實 prefix 命中）；open-loop Poisson 掃 rate，每檔 5 分鐘：\n\n| Offered (req/s) | 達成 (req/s) | 輸出吞吐 (tok/s) | TTFT p50 / p99 | ITL p99 | KV util | waiting 佇列 |\n|---|---|---|---|---|---|---|\n| 8 | 8.0 | 2,050 | 120ms / 480ms | 38ms | 35% | 0 |\n| 16 | 16.0 | 4,100 | 180ms / 850ms | 45ms | 55% | 0 |\n| **24** | **24.0** | **6,150** | **310ms / 1.4s** | **56ms** | **74%** | 0–2 |\n| 30 | 30.0 | 7,680 | 650ms / 3.8s | 72ms | 89% | 5–20，間歇 preemption |\n| 35 | 33.6 | 8,600 | 2.9s / 19s | 88ms | 99% | 持續增長（飽和） |\n| 40 | 34.1 | 8,730 | 8s+ / 45s+ | 95ms | 100% | 爆炸，preemption storm |\n\n讀法：\n\n- 系統的真實飽和點在 ~34 req/s——original 報告的 35.5 req/s 「結論」位於懸崖**之後**，那裡 TTFT p99 是 19 秒。closed-loop 之所以還能交出 1.8s 平均 E2E，正是因為它從不允許佇列形成。\n- **Goodput@SLO（TTFT p99 ≤ 1.5s ∧ ITL p99 ≤ 60ms）= 24 req/s ≈ 6,150 tok/s**——比報告的 9,100 tok/s 低 32%。\n- 容量規劃（ch13）該用的單卡數字是 24 req/s 再扣 headroom，不是 35。照原報告買卡，上線第一個尖峰就會把使用者推進 19 秒 TTFT 的世界，而且 dashboard 上的「GPU 利用率」全程 100%，顯得一切正常。\n\n同一台機器、同一個模型，方法論的差異就是 32% 的容量誤判加一次線上事故。這就是為什麼 benchmark 方法論值得半章。\n\n## 故障模式與防禦\n\n本章的招牌段落這次照向自己：**觀測與量測系統本身**會怎麼壞。\n\n| 故障 | 症狀 | 怎麼觀測到 | 防禦 |\n|---|---|---|---|\n| Histogram bucket 溢出 | 事故中 p99「穩定地」貼在某個整數上不動 | `+Inf` bucket 佔比 > 0 | bucket 上界 ≥ 最壞想像 × 3；對 `+Inf` 佔比設 ticket 告警 |\n| Label cardinality 爆炸 | Prometheus OOM / 查詢逾時，恰好在你最需要它的事故當下 | TSDB head series 數量趨勢 | code review 把關 label；禁 per-user/per-request label |\n| Counter 重啟歸零 | deploy 後 rate() 出現負尖刺或斷層 | 對照 pod restart 事件 | 一律 `rate()`，dashboard 不放裸 counter |\n| DCGM-exporter 死掉 | GPU 面板變平線——**沒有資料常被誤讀成沒有問題** | `absent()` 告警 | 對每個 scrape target 設 absent 告警；缺資料 = 黃色，不是綠色 |\n| 監控只看平均 | 一切正常，但客訴在升 | goodput vs 總吞吐的 gap | 告警與報告全面分位數化（本章通篇） |\n| Benchmark client 自己是瓶頸 | 「延遲」隨並發線性惡化，但引擎指標顯示很閒 | k6 端 CPU、`dropped_iterations`；server/client 兩端 TTFT 差距拉大 | 監控壓測機本身；VU 池按 Little's law 配；必要時分散式 client |\n| Closed-loop 冒充 open-loop | 數字漂亮且穩定得可疑；佇列與 preemption 恆零 | 報告裡找不到 offered vs achieved 對照 | 方法論 review：沒寫到達過程的 benchmark 一律打回 |\n| 冷熱 cache 混比 | 兩次 run 差 40%，互相指責 | 對照 prefix hit rate 曲線 | 報告必附 hit rate;冷/熱分開測分開報 |\n| Chunk 當 token 數 | client 吞吐比 server 端低一截 | 對照 `usage` 欄位與 chunk 計數 | token 計數一律以 usage / server 指標為準 |\n| 中間件污染量測 | client TTFT 比 server TTFT 高出秒級 | 兩端同時量、取差 | 修 proxy buffering（ch12）；量測點標清楚在鏈路哪一層 |\n\n通用原則：**觀測系統要用對待生產系統的標準對待**——它有自己的容量極限、自己的故障模式、自己的盲區，而它失效的時刻往往正是你最需要它的時刻（事故中 cardinality 爆炸、佇列堆積時 scrape 逾時）。\n\n## 動手做\n\n**Lab 1 [M1]：給模擬引擎建全套監控**\n1. 跑 `llm-d-inference-sim`（暴露 vLLM 相容的 `/metrics`）+ Prometheus + Grafana（docker compose 三件組）。\n2. 按本章「一個面板一個問題」的表建 6 個面板：TTFT p50/p95/p99、ITL p99、waiting 佇列、KV util、prefix hit rate、吞吐 vs goodput。\n3. 用下面 Lab 2 的 k6 腳本打流量，調 sim 的延遲/容量參數製造「飽和」與「cache 退化」兩種事故。\n4. **成功標準**：兩種事故都能在 dashboard 上 30 秒內定位到正確的層（飽和 → 佇列面板先動；cache 退化 → hit rate 先動、TTFT 後動），並能口頭說出診斷路徑。\n\n**Lab 2 [M1]：k6 SSE benchmark 腳本**\n1. 以本章骨架為底，目標打 Ollama（ch01 裝過）或 Lab 1 的 sim。\n2. 實作 prompt 池抽樣、`dropped_iterations` threshold、冷/熱 cache 兩種模式。\n3. 對同一目標各跑一次 closed-loop（`constant-vus`）與 open-loop（`constant-arrival-rate`），到達率對齊。\n4. **成功標準**：能展示兩種模式下 p99 的差異並解釋成因；驗證 chunk 數 ≠ `usage.completion_tokens`。\n\n**Lab 3 [租 GPU]：對真 vLLM 跑一條 frontier（估 $5–8）**\n1. 租 1×H100 或 A100（2–3 小時），起 vLLM + Llama-3.1-8B-Instruct（ch08 的部署流程）。\n2. Warmup 3 分鐘丟棄；用 inference-perf 或 Lab 2 腳本掃 6–8 檔 offered rate，每檔 5 分鐘；同步抓 `/metrics`。\n3. 畫出 frontier（x = 吞吐，y = TTFT/ITL p99），標出膝點與飽和點；以 TTFT p99 ≤ 1.5s ∧ ITL p99 ≤ 60ms 算出 goodput@SLO。\n4. **成功標準**：一張 frontier 圖 + 一個 goodput 數字 + 每個量測點的 offered vs achieved 對照表；能指出哪幾檔是無效點（飽和）。這張圖直接成為你作品集的素材（ch18）。\n5. 用完即關，確認帳單。\n\n## 自我檢核\n\n1. `nvidia-smi` 顯示 GPU-Util 100%。說出至少三種彼此完全不同的真實狀況，以及你會各用哪個指標區分它們。\n2. 寫出 TTFT、ITL、TPOT、E2E 的定義與關係式。為什麼 TPOT 平均正常時，ITL p99 仍可能在告警？哪種引擎行為會造成這個分岔？\n3. 什麼是 coordinated omission？k6 的哪些 executor 會中招？為什麼 LLM 的長服務時間讓它比傳統 API 測試嚴重得多？\n4. 描述跑一條 latency-throughput frontier 的完整步驟，包含每個量測點的兩個有效性檢查。\n5. Goodput@SLO 的定義是什麼？為什麼它比峰值吞吐更適合做容量規劃輸入？它的兩個使用紀律是什麼？\n6. `vllm:kv_cache_usage_perc` 是 95%——這健康嗎？你會再看哪兩個指標來決定要不要行動？\n7. 為什麼 streaming API 的 availability 不能只用 HTTP status code 計算？正確的計法要在哪一層埋點？\n8. CI 裡 benchmark 數字比 baseline 慢了 4%，你怎麼判斷這是迴歸還是雜訊？說出至少三個你會先檢查的「環境固定」項目。\n\n## 延伸閱讀\n\n- [vLLM Metrics 設計文件](https://docs.vllm.ai/en/latest/design/metrics/) — v1 引擎完整指標清單與設計取捨，本章引擎層指標的一手來源。\n- [NVIDIA DCGM-Exporter 文件](https://docs.nvidia.com/datacenter/dcgm/latest/gpu-telemetry/dcgm-exporter.html) — 欄位定義與 K8s 部署；搭配 ch11 的 GPU Operator 脈絡讀。\n- Gil Tene, [\"How NOT to Measure Latency\"](https://www.infoq.com/presentations/latency-response-time/) — coordinated omission 的原始佈道，所有做負載測試的人的必修課。\n- [DistServe 論文（arXiv:2401.09670）](https://arxiv.org/abs/2401.09670) — goodput 作為 serving 評測目標的正式定義出處（它同時是 ch10 P/D 分離的學術源頭之一）。\n- [inference-perf（kubernetes-sigs）](https://github.com/kubernetes-sigs/inference-perf) — WG Serving 的標準化 benchmark 工具，config-as-code 形態最適合進 CI。\n- [AIPerf（ai-dynamo）](https://github.com/ai-dynamo/aiperf) — NVIDIA 的全功能 LLM 壓測 CLI，genai-perf 的後繼者。\n- [xk6-sse](https://github.com/phymbert/xk6-sse) — k6 的 SSE 擴充，本章腳本骨架的依賴；README 直接以 LLM benchmark 為示範場景。\n- [k6 文件：Open vs Closed 模型](https://grafana.com/docs/k6/latest/using-k6/scenarios/concepts/open-vs-closed/) — 官方對兩種負載模型的解釋，對照本章的 LLM 放大版。\n- [OpenTelemetry GenAI Semantic Conventions](https://opentelemetry.io/docs/specs/semconv/gen-ai/) — LLM tracing 的屬性命名標準（2026-06 仍在演進中）。\n"}, {"id": "ch15-reliability", "file": "ch15-reliability.md", "group": "Part V — 生產維運", "title": "ch15 — 可靠性工程：當 GPU 叢集開始壞", "md": "# ch15 — 可靠性工程：當 GPU 叢集開始壞\n\n> **本章解決什麼問題**：ch02 給過你故障目錄的入門版、ch09 立了 NCCL hang 的牌子、ch11 留了 DCGM 自動隔離與 drain 數學的坑、ch12 欠你 retry budget 與「品質迴歸在 5xx 看不到」的完整答案——本章一次清償。內容是生產級
