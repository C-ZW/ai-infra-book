. 你接手一個 70B 服務，p95 ITL 超標 30%、GPU 是 2×H100、batch 常態 8~16：說出你的優化順序與每步的驗證方法。\n\n## 延伸閱讀\n\n- [GPTQ: Accurate Post-Training Quantization for Generative Pre-trained Transformers](https://arxiv.org/abs/2210.17323) — weight-only 量化的奠基論文，理解「逐層誤差補償」的原始出處。\n- [AWQ: Activation-aware Weight Quantization](https://arxiv.org/abs/2306.00978)（MLSys 2024 最佳論文）— 「保護 1% 重要權重」的思路，是目前 INT4 checkpoint 的主流做法。\n- [\"Give Me BF16 or Give Me Death\"? Accuracy-Performance Trade-Offs in LLM Quantization](https://arxiv.org/abs/2411.02355)（ACL 2025）— 50 萬次評測撐起來的量化品質實證，本章「FP8 幾乎無損、W4A16 vs W8A8 場景劃分」的數據來源。\n- [Fast Inference from Transformers via Speculative Decoding（Leviathan et al., ICML 2023）](https://arxiv.org/abs/2211.17192) — spec decode 與 rejection sampling 無損性證明的原典，acceptance rate 數學的出處。\n- [EAGLE-3: Scaling up Inference Acceleration of Large Language Models](https://arxiv.org/abs/2503.01840) — 2026 年 draft-based 方案主流的技術細節。\n- [EAGLE 3.1（vLLM blog, 2026-05）](https://vllm.ai/blog/2026-05-26-eagle-3-1) — 本章引用的 Kimi K2.6 併發遞減數據（2.03×→1.66×）出處，順帶展示 draft 訓練生態的現況。\n- [MagicDec: Breaking the Latency-Throughput Tradeoff for Long Context Generation](https://arxiv.org/abs/2408.11049) — 「長 context 下高 batch spec decode 仍划算」這個例外的完整論證。\n- [FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness](https://arxiv.org/abs/2205.14135) — IO-aware 思想的原典；讀完它你會用全新的眼光看所有 kernel。\n- [FlashInfer: Efficient and Customizable Attention Engine for LLM Inference Serving](https://arxiv.org/abs/2501.01005)（MLSys 2025 最佳論文）— serving 場景 kernel 庫的設計空間，paged/ragged KV 的 kernel 層視角。\n- [Introducing NVFP4（NVIDIA Developer Blog）](https://developer.nvidia.com/blog/introducing-nvfp4-for-efficient-and-accurate-low-precision-inference/) — Blackwell 世代 FP4 格式的官方說明（廠商視角，數字自行折扣）。\n- [llm-compressor（vLLM project）](https://github.com/vllm-project/llm-compressor) — 自己動手做 FP8/INT4 量化 checkpoint 的標準工具，Lab 7-3 的進階路徑。\n- [Accelerating PyTorch with CUDA Graphs（PyTorch blog）](https://pytorch.org/blog/accelerating-pytorch-with-cuda-graphs/) — CUDA Graphs 機制與限制最好讀的官方解說。\n"}, {"id": "ch08-engines-in-practice", "file": "ch08-engines-in-practice.md", "group": "Part II — 推論引擎", "title": "ch08 — 推論引擎實戰：vLLM、SGLang、TensorRT-LLM 與選型", "md": "# ch08 — 推論引擎實戰：vLLM、SGLang、TensorRT-LLM 與選型\n\n> **本章解決什麼問題**：ch05 講了 KV cache 怎麼管、ch06 講了排程怎麼排、ch07 講了模型怎麼壓——本章把這些機制落到你真的會操作的軟體上。讀完你會懂 vLLM V1 的架構與每個關鍵參數在轉哪顆旋鈕、會做引擎選型、並且能獨立完成「租卡 → 部署 → benchmark → 讀指標 → 關機」的完整閉環。這是 Part II 的實戰總結，也是 ch09 之後所有分散式內容的單機地基：你必須先會開好一台引擎，才談得上開一個車隊。\n\n## 從你已知的出發\n\n你選過資料庫。MySQL 還是 PostgreSQL 還是 DynamoDB——你知道這種選型題的正確解法從來不是看 benchmark 行銷文，而是：我的 workload 長什麼樣？我的團隊會什麼？壞掉的時候誰修得動？推論引擎的選型是同一道題，連答案的形狀都一樣：業界有一個「預設安全解」（後端世界的 PostgreSQL ≈ 推論世界的 vLLM），然後有幾個特定 workload 下值得偏離預設的例外。本章後半就是把這張例外清單寫清楚。\n\n你也調過資料庫參數。`innodb_buffer_pool_size`、connection pool 上限、`work_mem`——你很清楚這些參數沒有「最佳值」，只有「對你的流量正確的值」，而且調錯的症狀往往出現在離參數很遠的地方（pool 太小 → 鎖等待暴漲，看起來像鎖的問題，其實是記憶體的問題）。vLLM 的參數表完全同構：`--gpu-memory-utilization` 就是你的 buffer pool size，`--max-num-seqs` 就是你的 connection pool 上限，調錯的症狀一樣會偽裝成別的問題。你在 RDS 上練出來的「從症狀反推參數」的肌肉，本章直接複用。\n\n最後，你解剖過系統。你讀過 PostgreSQL 的架構圖——parser、planner、executor、buffer manager 各管一段，一條 SQL 進去怎麼變成磁碟 I/O。本章第一件事就是對 vLLM 做同樣的解剖：一個 HTTP 請求進去，token 怎麼出來，中間經過哪些 process、哪些佇列、哪些記憶體配置。看懂這張圖之後，引擎對你就不再是黑盒子，而是一個你能診斷、能調校、出事時知道去哪個 process 找 log 的系統——跟你對待 PostgreSQL 的方式沒有兩樣。\n\n## vLLM 架構解剖：一個請求的一生\n\n先講大局。vLLM 從 2025 年起經歷了一次完整的引擎世代交替：V1 架構重寫了排程器、KV cache manager 與 process 模型，到 v0.11 把 V0 程式碼全部刪除——本書寫作時（2026-06，vLLM 0.22.x）**V1 是 codebase 裡唯一的引擎**，你在網路上看到的舊文章若還在講 `AsyncLLMEngine`、swap-based preemption，那是 V0 的化石，讀的時候要帶年份意識。\n\n### Process 模型：把 CPU 工作隔離出去\n\nV1 最重要的架構決策是**多 process 分工**。動機很純粹：當一次 decode forward 只要 5ms 上下，任何擋在迴圈裡的 CPU 工作——HTTP 處理、tokenization、detokenization、串流回傳——都會直接吃掉吞吐。V1 的解法是把這些 CPU 工作搬到獨立 process，用 ZeroMQ（ZMQ）做 IPC，讓它們跟 GPU 的 forward **重疊執行**而不是串行排隊。你可以把它理解成你熟的 Node.js 模式：把 CPU-bound 工作丟出 event loop，main loop 只做最關鍵的那件事。\n\n```text\n┌─ Process A：API server（AsyncLLM 前端）────────────────┐\n│  HTTP/SSE ↔ OpenAI 相容層（FastAPI）                    │\n│  chat template 套用 → tokenize → 經 ZMQ 送進核心        │\n│  經 ZMQ 收回 token id → detokenize → SSE chunk 回客戶端 │\n└────────────────▲──────────────┬────────────────────────┘\n          ZMQ IPC│（雙向、非同步）│\n┌─ Process B：EngineCore（busy loop）─────────────────────┐\n│  scheduler：每步輸出 {request_id: 本步算幾個 token}      │\n│  KV cache manager：block 配置、prefix cache 查表（ch05） │\n│  指揮 model executor 執行 forward                        │\n└────────────────┬────────────────────────────────────────┘\n                 │（TP>1 時 fan-out 到 N 個 worker process）\n┌─ Process C..N：Worker（每張 GPU 一個）───────────────────┐\n│  ModelRunner：準備輸入 tensor、forward、CUDA graphs(ch07)│\n│  sampler 抽出下一個 token                                │\n└──────────────────────────────────────────────────────────┘\n```\n\n數一下 process：單卡部署是「1 個 API server + 1 個 EngineCore + 1 個 worker」；TP=4 的部署是 1 + 1 + 4 = 6 個 process。這件事有直接的維運後果：你 `ps` 看到多個 python process 是正常的；OOM kill 掉其中一個，整組會一起死（或更糟——半死，見故障模式一節）；container 的 PID namespace 裡要允許 multiprocessing。\n\n### 請求的一生\n\n把 ch05/ch06 的機制串成一條時間線。一個 `POST /v1/chat/completions`（stream=true）進來之後：\n\n1. **API server 收下 HTTP 請求**，套用模型的 chat template（把 messages 陣列展平成單一 prompt 字串），tokenize 成 token ids。這裡是純 CPU 工作，與 GPU 完全無關。\n2. **經 ZMQ 把請求交給 EngineCore**，掛進 waiting 佇列。從這一刻起，請求的排隊時間開始累積——它不會出現在 GPU 指標上，只會出現在 `vllm:request_queue_time_seconds`（ch06 講過的「佇列先於資源惡化」）。\n3. **scheduler 在某一步把它撈出來**：先問 KV cache manager「prefix cache 有沒有命中？」（ch05 的 hash-based block 重用——命中的部分直接掛 block、跳過計算），再為剩餘 prompt 配置 KV blocks，然後在本步的 token budget 裡分給它一個 prefill chunk。V1 排程器不區分 prefill/decode 階段，每步的決策就是一張 `{request_id: num_tokens}` 的字典（ch06）。\n4. **EngineCore 把這一步的 batch 丟給 worker**，ModelRunner 準備輸入、跑 forward（decode 部分走 CUDA graphs，見 ch07）、sampler 抽出 token，結果回到 EngineCore。\n5. **長 prompt 分多步算完 prefill**（chunked prefill，ch06），第一個生成 token 出現的那一步，就是 TTFT 的終點。\n6. **token id 經 ZMQ 流回 API server**，detokenize 成文字、包成 SSE chunk 推給客戶端。注意分工：EOS 與 `max_tokens` 的停止判斷在 EngineCore 就能做（它看得到 token id）；但 stop string 需要看「文字」，所以在 API server 端的 output processor 判斷，命中後再回頭通知 EngineCore abort——一來一回之間可能多算一兩個 token，這是正常的。\n7. **decode 迴圈每步重複 4–6**，直到停止條件成立，EngineCore 釋放它的 KV blocks（若 prefix caching 開著，blocks 進快取池等待重用而非立刻清除，ch05）。\n8. **異常路徑**：客戶端 SSE 斷線時，API server 偵測到連線關閉，主動向 EngineCore 發 abort，KV blocks 即刻回收。這條路徑斷掉的後果（gateway 沒把斷線翻譯成 abort）在 ch06 的故障表講過：殭屍請求佔著 slot 生成沒人收的 token。\n\n整條鏈路裡值得你停下來記住的一件事：**tokenize/detokenize 與 forward 是在不同 process 平行發生的**。當 GPU 在算第 N 步時，API server 同時在 detokenize 第 N−1 步的輸出、tokenize 剛到的新請求。這就是 V1 相對 V0 的吞吐紅利來源之一——不是 GPU 變快了，是 CPU 不再擋路。\n\n## 關鍵參數完整表\n\n下表是 2026-06、vLLM 0.22.x 時點的整理。預設值會隨版本演進，**正文記機制、預設值以你手上版本的 `vllm serve --help` 為準**——這句話不是免責聲明，是操作紀律。\n\n| 參數 | 它在解什麼問題 | 預設（2026-06） | 調錯的症狀 |\n|---|---|---|---|\n| `--max-model-len` | 單一請求的 context 上限，決定「一個請求最多能吃掉多少 KV」 | 自動取模型 config（往往大得離譜，如 32k–256k） | 太大：啟動時報 KV 容量不足直接起不來，或 KV 牆大幅提前；太小：長請求被 400 拒絕 |\n| `--gpu-memory-utilization` | 引擎可用的 GPU 記憶體比例（權重 + KV + workspace 全包），KV pool 大小由它倒扣出來 | 0.92（早期版本 0.9） | 太高：流量尖峰偶發 OOM crash、全部 in-flight 請求陪葬；太低：KV pool 縮水、preemption 變多 |\n| `--max-num-seqs` | 同時 running 的請求數上限（ch06 的 batch B） | 1024（V1；V0 時代是 256） | 太高：ITL 墊高、KV 壓力大、preemption storm；太低：GPU 餵不飽、佇列堆積 |\n| `--max-num-batched-tokens` | 每步 token budget，控制 prefill chunk 對 decode 的干擾（ch06） | V1 世代常見 8192（隨版本/硬體調整，以 `--help` 為準） | 太大：長 prompt 進來 ITL 尖刺；太小：TTFT 變差、prefill 吞吐掉 |\n| `--enable-prefix-caching` | 前綴 KV 重用（ch05） | **V1 預設開啟**（用 `--no-enable-prefix-caching` 關） | 誤關：agentic/多輪流量 TTFT 暴漲、prefill 算力白燒；對比實驗忘了關：高估裸 prefill 效能 |\n| `--tensor-parallel-size` | 單一模型切到幾張卡（單節點內，機制見 ch09） | 1 | 卡間只有 PCIe 還硬開 TP：all-reduce 吃掉大半收益；單卡裝得下還開 TP：純付通訊稅 |\n| `--kv-cache-dtype fp8` | KV cache 減半（ch05） | `auto`（跟隨模型 dtype） | 長推理鏈/長對話品質劣化，且 5xx 看不到——要 eval 才抓得到 |\n| `--quantization` | 權重量化格式；多數情況自動從 checkpoint 偵測，不用手設 | 自動偵測 | 卡不支援該格式（如 Ampere 跑 FP8）：啟動失敗或 fallback 到慢路徑，吞吐莫名其妙地差 |\n| `--dtype` | 權重載入精度（FP16/BF16） | `auto` | 在不支援 BF16 的舊卡上強用：報錯或退化 |\n| `--speculative-config` | speculative decoding 設定（JSON：draft model / EAGLE / n-gram，ch07） | 關 | 高 batch 流量下開啟：吞吐不升反降（驗證稅，ch07 講過的反直覺） |\n| `--scheduling-policy` | `fcfs` 或 `priority`（ch06） | `fcfs` | 開 priority 但上游沒做配額：低優先權租戶餓死 |\n| `--enforce-eager` | 關閉 CUDA graphs，debug 用 | 關（即 graphs 開啟） | debug 完忘記拿掉：decode 多吃一截 launch overhead，ITL 變差（量級見 ch07） |\n| `--block-size` | KV block 的 token 數（ch05 的分頁粒度） | 16 上下（依硬體） | 幾乎不需要動；亂動影響 prefix cache 命中粒度與記憶體碎片 |\n\n調參心法四條，順序有意義：\n\n1. **先定 `--max-model-len`，依據是你流量的 p99 context，不是模型的能力上限**。模型支援 256k 不代表你要付 256k 的 KV 預算單位風險——這是新手第一坑，啟動 OOM 十之八九是它。\n2. **再定 `--gpu-memory-utilization`**：給足但留餘裕（activation 尖峰與 CUDA graphs 也要記憶體）。\n3. **然後用 ch06 的方法找工作點**：`max-num-seqs` 決定你貼 KV 牆多近、`max-num-batched-tokens` 決定 prefill 干擾形狀。\n4. **一次只動一個參數，每動必量**（主軸二：量測 → 診斷 → 優化 → 用數據證明）。引擎參數的交互作用比 MySQL 參數更黏，不量測的調參是占卜。\n\n## 營運介面：OpenAI 相容 API 與 /metrics\n\nvLLM 對外的兩張臉，你都會天天打交道：\n\n**OpenAI 相容 API**：`/v1/chat/completions`、`/v1/completions`、`/v1/models`、`/v1/embeddings`，加上 `/health`。OpenAI API 已是推論服務的 de facto 介面標準（平台層含意見 ch12），實務好處是你的客戶端、gateway、benchmark 工具全部即插即用——本章後面的 `vllm bench` 和你未來會用的 k6 腳本，打的都是同一組端點。\n\n**`/metrics`（Prometheus 格式）**：完整的指標分類學在 ch14，但有六個名字現在就要進你的肌肉記憶，因為本章的 benchmark 與調參全靠它們：\n\n| 指標 | 回答什麼問題 |\n|---|---|\n| `vllm:num_requests_running` / `vllm:num_requests_waiting` | 引擎滿了沒？佇列在堆積嗎？ |\n| `vllm:kv_cache_usage_perc` | 離 KV 牆多遠？（ch05 的一級健康指標） |\n| `vllm:num_preemptions_total` | 樂觀 admission 破產了幾次？（穩態應為 0，ch06） |\n| `vllm:time_to_first_token_seconds` / `vllm:inter_token_latency_seconds` | TTFT 與 ITL 的 histogram，SLO 的原料 |\n| `vllm:prefix_cache_hits` / `vllm:prefix_cache_queries` | 兩者相除 = prefix cache 命中率（ch05） |\n| `vllm:request_queue_time_seconds` | 請求在 waiting 佇列陪葬了多久 |\n\n## SGLang：另一個第一梯隊\n\nSGLang（本書寫作時 v0.5.12，2026-05）是 vLLM 唯一的同量級對手。它從 RadixAttention 起家——用 radix tree 做 token 級的 prefix 重用（與 vLLM hash-based block 重用的對照在 ch05 講過）——如今長成功能完整的生產引擎：P/D 分離、wide-EP、speculative decoding（0.5.11 起 V2 預設開啟）、階層式 KV 快取（HiCache），近期版本甚至加了 Apple Silicon 原生 MLX backend（0.5.10 release notes）。專案方宣稱在生產環境驅動超過 40 萬張 GPU、採用者包括 xAI、LinkedIn、NVIDIA、AMD——數字出自專案自述，但「第一梯隊」的定位本身沒有爭議：NVIDIA 同時為 vLLM 與 SGLang 維護官方 container 與 release notes，Dynamo 和 llm-d 等上層框架也同時支援兩者。\n\n跟 vLLM 的真實差異，2026 年年中的誠實版本：\n\n- **功能高度趨同**。兩邊的 release notes 像在抄對方作業：你說 P/D 分離我也有，你支援 DeepSeek-V4 我隔週跟上。單看功能清單已經選不出勝負。\n- **結構化輸出是 SGLang 的傳統強項**。它把 grammar 約束（JSON schema、regex，經 xgrammar 等後端）的 mask 計算與 GPU forward 重疊執行，在高比例 guided decoding 的流量下開銷明顯更低。如果你的 workload 是「每個請求都要吐合法 JSON」的 agent/工具呼叫場景，這是真實差異點。\n- **Prefix 重用的粒度哲學不同**（ch05）：radix tree 是 token 級、自動發現共享前綴；對 prefix 結構複雜的 agentic 流量理論上更貼。但 vLLM V1 把 prefix caching 做到預設開啟、零命中時近零開銷，工程成熟度追平了大部分差距。\n- **效能對比不要信任何單點數字**。第三方評測互有勝負，「某引擎在 H100 上快 29%」這類數字多半出自行銷性質部落格，換個 workload、換個版本就翻盤。唯一可信的 benchmark 是你自己的流量打出來的那份（方法論見 ch14）。\n\n啟動介面對你來說幾乎是平行宇宙：`python -m sglang.launch_server --model-path Qwen/Qwen3-8B --port 30000`，一樣是 OpenAI 相容 API，一樣有 Prometheus 指標。本章所有的部署紀律與 benchmark 閉環，換成 SGLang 照走。\n\n## TensorRT-LLM：compile 式引擎的取捨，與一次重要的轉向\n\nTensorRT-LLM（本書寫作時 1.2.x）是 NVIDIA 的親兒子引擎，它的傳統賣點是 **ahead-of-time compile**：把模型針對特定 GPU、特定精度、特定 batch 形狀編譯成 TensorRT engine，用最佳化到牙齒的 kernel 換峰值效能。代價你可以類比 JIT vs AOT：每個「模型 × 卡型 × 配置」組合都要重新編譯（分鐘到小時級）、換模型慢、debug 難、生態封閉在 NVIDIA 硬體上。\n\n然後 2026 年發生了一件值得寫進選型史的事：**TensorRT-LLM 1.2 把 PyTorch backend 設為預設**——`trtllm-serve` 預設不再走 TensorRT engine 編譯路徑，而是跟 vLLM/SGLang 一樣直接在 PyTorch 上跑、配自家最佳化 kernel（2026-06，TensorRT-LLM release notes）。連 NVIDIA 自己都承認了這個市場現實：在模型兩個月一版、multi-LoRA、動態流量的世界裡，「編譯一切」的彈性稅高於它買到的峰值收益。compile 路徑仍在，但已不是主旋律。\n\n那 2026 年還什麼時候值得選它？務實清單：\n\n- **你重度押注 NVIDIA 最新硬體的數值格式**：Blackwell 上的 NVFP4 路徑（ch07）TensorRT-LLM 最成熟，這是它最硬的差異點。\n- **模型固定、流量穩定、要榨最後 10–20%**：模型半年不換、卡型統一、延遲敏感到願意付編譯與維運成本——這種「定置炮台」場景 AOT 仍有意義。\n- **你已經在 NVIDIA 全家桶裡**：Dynamo、NIM、企業支援合約，整合面積最小。\n\n反過來說，如果你的模型清單每月在變、團隊只有兩個人、或你需要跨硬體可攜性——它的工程成本曲線會教你做人。\n\n## 本地與邊緣線：llama.cpp、Ollama、MLX\n\n這三個工具跟上面三個引擎不在同一個賽道，搞清楚定位可以避免兩種錯誤（拿 Ollama 上生產、或拿 vLLM 跑筆電）：\n\n- **llama.cpp**：純 C/C++ 實作 + GGUF 量化格式生態，目標是「在任何硬體上跑起來」——CPU、Apple Silicon、消費級顯卡。它有 server 模式與基本的並發處理，但它的設計中心是可攜性與低資源，不是吞吐極限。你在 ch03/ch07 的 M1 實驗用的就是它。\n- **Ollama**：llama.cpp 之上的使用者體驗層——`ollama pull`、`ollama run`，模型管理像 docker image。定位是開發者本機與 demo，你 ch01 的第一次 SSE 接觸用的就是它。\n- **MLX**：Apple 官方的 Apple Silicon 陣列運算框架，吃統一記憶體架構的紅利，M 系列上常是最快的本地選項；SGLang 也加了 MLX backend（2026）。定位：Mac 上的開發迴圈。\n\n一句話總結賽道差異：vLLM/SGLang/TRT-LLM 在解「一張到一群資料中心 GPU 的吞吐與 SLO」，這三個在解「我手邊這台機器能不能跑」。前者的核心技術（continuous batching、PagedAttention、TP）後者或缺或淺，反之 GGUF 的極致量化與 CPU 路徑前者也不在乎。中間地帶（單卡小流量內部工具）兩邊都能用，看你要不要 `/metrics` 與生產級併發——通常很快就會要。\n\n## 選型決策樹：預設選 vLLM，除非——\n\n先講結論再講理由：**2026 年的預設答案是 vLLM**。理由不是它每項 benchmark 都贏（並沒有），而是選型題的本質是風險管理：vLLM 有最大的社群與貢獻者基數、最廣的硬體支援（NVIDIA/AMD/TPU/Trainium/CPU）、最完整的周邊生態（K8s operator、llm-d、Ray Serve、Red Hat 商業支援都以它為一級公民）、以及最高的「出事時 Google 得到答案」機率。這跟你預設選 PostgreSQL 的邏輯一模一樣——不是因為它最快，是因為它最不會讓你半夜孤立無援。\n\n```text\n你要在哪裡跑？\n├─ 筆電 / 邊緣 / CPU ──────────────→ llama.cpp / Ollama / MLX\n└─ 資料中心 GPU\n   ├─ 流量以結構化輸出為主（JSON/grammar 佔大宗）\n   │    └→ SGLang 與 vLLM 各 benchmark 一輪，常見 SGLang 勝出\n   ├─ agentic、prefix 極重、且實測 vLLM 命中率不滿意\n   │    └→ 試 SGLang（RadixAttention 的主場）\n   ├─ 模型固定 + 全 NVIDIA + 要榨峰值或 NVFP4\n   │    └→ TensorRT-LLM（付得起編譯與維運稅再來）\n   ├─ 非 NVIDIA 硬體（AMD/TPU/Trainium…）\n   │    └→ vLLM（支援面最廣），或硬體廠商主推的那個\n   └─ 其他所有情況 ──────────────────→ vLLM\n```\n\n把例外清單再攤開成決策表，含代價欄——沒有代價欄的決策表都是行銷材料：\n\n| 你偏離預設去選… | 什麼時候值得 | 你付出的代價 |\n|---|---|---|\n| SGLang | 結構化輸出重、prefix 結構複雜的 agentic 流量、且 A/B 實測有感 | 社群與周邊生態小一號；維運知識庫較薄；功能差距會隨版本來回擺動 |\n| TensorRT-LLM | 模型/硬體固定的峰值場景、Blackwell NVFP4、NVIDIA 企業支援 | 編譯迴圈拖慢迭代、NVIDIA lock-in、團隊要養專門知識 |\n| llama.cpp/Ollama | 本機開發、離線/邊緣、極低資源 | 沒有生產級 batching/排程/指標，上了量就見底 |\n| 自己 fork / 自研 | 你是 model lab 且有專職引擎團隊 | 全部 |\n\n兩條紀律收尾。第一，**選型決策的有效期限大約六個月**：兩大引擎功能趨同的速度極快，把選型寫進可重跑的 benchmark（ch14），而不是寫進石頭。第二，**團隊能力是真實的決策維度**：一個會修 vLLM 的工程師，比 5% 的吞吐差距值錢得多。\n\n## 完整部署 walkthrough：從租卡到關機\n\n這一節是本章的核心實作，對應 plan.md 的旗艦專案③。場景：在 RunPod 租一張 L4（24 GB），部署 Qwen3-8B，跑一輪 benchmark，讀懂指標，關機。Lambda 等其他平台流程同構（Lambda 的入門卡通常是 A10 24 GB，價位略高；以官網現價為準）。\n\n### 第 0 步：成本控制紀律（先於一切技術步驟）\n\n雲端 GPU 燒錢的方式跟你熟的 EC2 不同：單價高、而且**最大的事故不是用太兇，是忘記關**。開卡前的紀律清單：\n\n1. **用儲值制，不綁自動扣款**：RunPod 支援預先儲值，存一筆小額（如 $25）當硬上限——錢燒完 pod 自動停，這是最可靠的 circuit breaker。\n2. **看清楚 Stop 和 Terminate 的差別**：Stop 只停 GPU 計費，**磁碟 volume 繼續算錢**；Terminate 才是真的歸零。實驗結束一律 Terminate。\n3. **開卡前先寫好要跑的指令**：卡跑起來的每一分鐘都在計費，腳本先在本機寫好、貼上即跑。租卡時間應該花在等模型下載和跑 benchmark，不是花在現場查文件。\n4. **設鬧鐘**：物理鬧鐘。兩小時後響。比任何雲端預算警報都可靠。\n5. **結束後驗屍**：回到 billing 頁面確認計費已停、餘額符合預期。這個習慣總有一天會替你抓到一台殭屍 pod。\n\nL4 在 RunPod 的 on-demand 價格約 $0.39/hr（2026-06 快照；GPU 租價月級波動，以站上現價為準）。整個 walkthrough 含下載與三組配置的 benchmark 約 2–3 小時，GPU 費用 $1–2，加上重試與探索的餘裕，整章實驗預算抓 $5–10 很寬鬆。\n\n### 第 1 步：租卡\n\nRunPod console → Pods → Deploy：選 L4（Secure Cloud）、官方 PyTorch template（或直接用 `vllm/vllm-openai` container image，可省安裝步驟）、container disk 至少 50 GB（模型權重 16 GB + HF cache + 餘裕）、expose HTTP port 8000。部署後用網頁終端或 SSH 進去。UI 細節隨平台改版，但「卡型 / image / 磁碟 / 端口」四個決策點不會變。\n\n### 第 2 步：起 vLLM\n\n```bash\n# 若用 PyTorch template 才需要裝；用 vllm-openai image 可跳過\npip install vllm\n\n# 在 tmux 裡起服務（SSH 斷線不死）\ntmux new -s vllm\nvllm serve Qwen/Qwen3-8B \\\n  --max-model-len 8192 \\\n  --gpu-memory-utilization 0.90 \\\n  --max-num-seqs 16\n```\n\n第一次啟動要從 HuggingFace 拉 16 GB 權重，依機房網路 5–15 分鐘——這段時間就是 ch12 會講的 cold start 的其中一段，先體感記下來。啟動 log 裡值得讀的三行：模型載入後的記憶體用量、KV cache 可用 block 數（引擎用 `gpu-memory-utilization` 倒扣出來的 KV pool，ch05/ch06 的數學在這裡變成一行 log）、以及 CUDA graph capture 完成。\n\nSmoke test：\n\n```bash\ncurl -s localhost:8000/v1/models | python3 -m json.tool\ncurl -N localhost:8000/v1/chat/completions \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"model\":\"Qwen/Qwen3-8B\",\"stream\":true,\n       \"messages\":[{\"role\":\"user\",\"content\":\"用一句話解釋 KV cache\"}]}'\n```\n\n看到 SSE chunk 一個一個吐出來（ch01 你在 Ollama 上看過同樣的形狀），服務就活了。\n\n### 第 3 步：benchmark\n\n用官方內建的 `vllm bench`（已是 CLI 子命令）。流量形狀對齊 ch06 worked example：輸入 1,500、輸出 500：\n\n```bash\nvllm bench serve --model Qwen/Qwen3-8B \\\n  --dataset-name random \\\n  --random-input-len 1500 --random-output-len 500 \\\n  --request-rate 4 --num-prompts 200\n```\n\n`--request-rate` 是 open-loop 的到達率（為什麼 open-loop 重要、coordinated omission 是什麼坑，ch14 詳講；現在先照做）。同時開另一個 tmux pane 盯引擎狀態：\n\n```bash\nwatch -n 5 \"curl -s localhost:8000/metrics | \\\n  grep -E 'num_requests_(running|waiting)|kv_cache_usage|num_preemptions_total' | grep -v '^#'\"\n```\n\n### 第 4 步：讀指標\n\nbench 結束會輸出 throughput、TTFT、TPOT/ITL 的分位數。三個交叉判讀，全部接回 ch06 的框架：\n\n- **`running` 持續頂著 `max-num-seqs`、`waiting` > 0** → 引擎在它的 admission 上限飽和，吞吐被你設的 16 卡住，不是卡在硬體。\n- **`kv_cache_usage_perc` 接近 1.0、`num_preemptions_total` 在走動** → 撞 KV 牆了，數字會跟你用 ch03 公式手算的牆位對得上。\n- **TTFT p99 遠大於 p50、且與 `request_queue_time` 同步惡化** → 排隊問題，不是計算問題。\n\n然後改參數重跑（下一節的三組配置就是現成的實驗計畫），每輪記錄到同一張表。這就是「量測 → 診斷 → 優化 → 用數據證明」的最小完整迴圈——跟你做 RDS 優化時一模一樣，只是指標換了名字。\n\n### 第 5 步：關機\n\n```bash\nexit\n# Console → Terminate pod（不是 Stop）→ Billing 頁確認計費停止\n```\n\n## Worked example：同一張 L4、同一個 8B 模型、三組配置\n\n把上面的閉環具體化成一份實驗計畫與預期結果。**下表為推算值、非實測**：用 ch06 的一階模型（decode 時間 ≈ 每步讀取 bytes ÷ 有效頻寬）算出，假設標在表下；你在動手做 Lab 1 的任務就是實測它、然後解釋你的量測值與推算值的偏差。\n\n設定：L4（24 GB GDDR6、頻寬 300 GB/s 規格值，取 80% ≈ 240 GB/s 有效；FP8 為 Ada 世代原生支援）。模型 Qwen3-8B 級 dense 8B：FP16 權重 16 GB / FP8 權重 8 GB；KV 每 token 128 KB（FP16）/ 64 KB（FP8 KV）。流量同 ch06：平均 context 2,000 tokens（輸入 1,500 + 輸出 500）。activation 與 CUDA graphs 工作區估 1.5 GB。\n\n| | 保守 | 平衡 | 激進 |\n|---|---|---|---|\n| 權重 | FP16（`Qwen3-8B`） | FP8（官方 FP8 checkpoint） | FP8 |\n| KV dtype | FP16 | FP16 | FP8（`--kv-cache-dtype fp8`） |\n| `--gpu-memory-utilization` | 0.90 | 0.90 | 0.95 |\n| `--max-model-len` | 4,096 | 8,192 | 16,384 |\n| `--max-num-seqs` | 16 | 40 | 96 |\n| KV pool（倒扣） | ≈ 4.1 GB | ≈ 12.1 GB | ≈ 13.3 GB |\n| KV 牆（@avg 2k context） | ≈ 16 併發 | ≈ 47 併發 | ≈ 104 併發 |\n| 滿載每步讀取 | 16 + 4.1 ≈ 20.1 GB | 8 + 10.2 ≈ 18.2 GB | 8 + 12.3 ≈ 20.3 GB |\n| 穩態 ITL（推算） | ≈ 84 ms | ≈ 76 ms | ≈ 85 ms |\n| 總吞吐（推算） | ≈ 190 tok/s | ≈ 530 tok/s | ≈ 1,130 tok/s |\n| 單請求體感 | ≈ 12 tok/s | ≈ 13 tok/s | ≈ 12 tok/s |\n| 主要風險 | GPU 大量閒置、$/Mtok 最差 | 幾乎沒有——這就是甜蜜點的長相 | 0.95 的 OOM 餘裕極薄；FP8 KV 品質風險（ch05）；長 context 流量一來就 preemption |\n\n四個機制成因，逐項對應前章：\n\n1. **保守 → 平衡的 2.8 倍吞吐，全部來自「權重 FP8」這一個動作的兩條效應**。FP8 把每步的「固定成本」從 16 GB 砍到 8 GB（ch06 的攤提數學）；同時騰出的 8 GB 全數變成 KV pool（4.1 → 12.1 GB），讓 B 能從 16 升到 40。一個量化決策同時改善固定成本與撞牆點，這就是 ch07 說量化是單卡最高槓桿的原因。\n2. **平衡 → 激進的吞吐再翻倍，全部來自 FP8 KV**。每 token KV 減半 → 同樣的 pool 裝下兩倍併發 → 固定成本攤提給兩倍的請求。注意 ITL 幾乎沒變（85 vs 76 ms）：因為每步讀取的總 bytes 差不多，變的是這些 bytes 服務多少人。\n3. **三組的單請求體感全部是 12–13 tok/s，難看但誠實**。L4 只有 240 GB/s 有效頻寬——decode 是 memory-bound（ch03），頻寬就是天花板，參數調不出頻寬。這告訴你 L4 的定位：成本敏感的吞吐型 workload，不是低延遲產品。要體感快，換 HBM 的卡（ch02 的頻寬表、ch13 的硬體選型）。\n4. **「激進」不是「更好」，是不同的風險定價**。0.95 的記憶體餘裕、FP8 KV 的品質風險、貼著 KV 牆的 preemption 暴露——benchmark 表上它全贏，generation 品質與尾延遲的帳要另外算（goodput 視角，ch06/ch14）。生產配置從「平衡」出發，拿數據說服自己之後才往右走。\n\n## 故障模式與防禦\n\n引擎實戰的故障跟前幾章的機制性故障（preemption storm、KV 牆，見 ch05/ch06）不同，多半發生在「引擎周邊」——啟動、相依、網路、帳單。症狀導向整理：\n\n| 故障模式 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| `max-model-len` 超出 KV 預算 | 啟動直接失敗，報「model's max seq len 大於可用 KV cache 容量」之類錯誤 | 啟動 log | 用流量 p99 context 設 `--max-model-len`，不是用模型上限；先用 ch03 公式手算 KV pool 夠不夠 |\n| 權重下載失敗 / gated model | 啟動卡在下載、401/403、或龜速 | 啟動 log、網路流量 | 先 `huggingface-cli download` 預拉；gated model 設 `HF_TOKEN`；生產環境權重走自家儲存而非裸拉 HF（ch12） |\n| CUDA / driver 版本不合 | container 起不來或 import 即炸，stack trace 指向 libcuda | `nvidia-smi` 的 driver 版本 vs image 要求的 CUDA 版本 | 用官方 image；租卡平台選明示 driver 版本的 template（ch04 的版本相容矩陣地獄，ch11 再會） |\n| 量化格式與卡不相容 | 啟動失敗，或默默 fallback 慢路徑、吞吐離譜地差 | 啟動 log 的 kernel/backend 選擇訊息 | 對照 ch07 的硬體支援表（FP8 需 Ada/Hopper+、NVFP4 需 Blackwell） |\n| 半死的 process 樹 | 某個 worker 被 OOM kill，API server 還活著、`/health` 看似正常但請求全 hang | process 數對不上；GPU 記憶體佔用還在但無計算活動 | liveness probe 要打真請求而非只打 `/health`（「深健康」探針，ch15）；container 內配 init 收屍 |\n| crash 後 GPU 記憶體未釋放 | 重啟引擎報 OOM，`nvidia-smi` 顯示記憶體被無名 process 佔用 | `nvidia-smi` | 殺乾淨殘留 process；container 化部署天然緩解（pod 死全死） |\n| chat template 錯誤 | 不報錯，但模型輸出品質詭異（格式錯亂、自問自答） | 肉眼 + eval；5xx 與延遲全部正常 | 用模型官方 chat template；升級引擎/換 checkpoint 後跑一輪煙霧 eval（ch15 的「模型變笨不報錯」） |\n| 反向代理吃掉 SSE | 客戶端 TTFT 莫名變成整段回應時間（token 不流式、一次全到） | 對比直連引擎 vs 過 proxy 的行為 | 代理層關 buffering、放寬 idle timeout（你調 Nginx/KrakenD 的老本行） |\n| benchmark 自欺 | 壓測數字漂亮、上線 SLO 崩 | 對照 open-loop 重測 | closed-loop/無 warmup/只看平均的測試一律重做（ch14） |\n| 忘記關卡 | 信用卡帳單 | billing 頁 | 本章第 0 步的五條紀律；儲值制是最後防線 |\n\n## 動手做\n\n### Lab 1 [租 GPU]：完整閉環——部署、三組配置、benchmark、關機（估 $5–10）\n\n本章的核心實驗，直接對應 plan.md 旗艦專案③。照「部署 walkthrough」流程租一張 L4，依 worked example 的三組配置各跑一輪 `vllm bench serve`（同樣的流量形狀：input 1500 / output 500 / rate 4 與 rate 16 各一次），每輪記錄：throughput、TTFT p50/p95、ITL p50/p95、`num_preemptions_total`、`kv_cache_usage_perc` 峰值。\n\n**成功標準**：(1) 產出一張「配置 × 指標」實測表，與本章推算表並排；(2) 對每個偏差超過 ±30% 的格子寫出一句機制解釋（例如「實測吞吐低於推算，因為 rate 4 下引擎根本沒滿載——推算的是飽和值」）；(3) 指出哪一組在 rate 16 時開始 preempt，對照你手算的 KV 牆；(4) pod 已 Terminate、billing 已驗證。這張表就是你作品集的第一份引擎調參報告（ch18 的敘事模板等著它）。\n\n### Lab 2 [M1]：用 llama.cpp 體感「引擎」與「跑模型」的差距\n\n在 M1 上用 llama.cpp 的 server 模式起一個 8B Q4 模型，開 4 個並發 slot（`llama-server -m <model.gguf> -np 4 -c 16384`），用 k6 以 1 / 4 / 8 並發各打一輪 50 個請求。\n\n**成功標準**：觀察到 (1) 並發 1→4 時總吞吐上升（它有基本的 batching）；(2) 並發 8 超過 slot 數後請求排隊、p95 延遲翻倍——但拿不到 preemption、KV usage、佇列深度這些指標，你只能瞎猜內部狀態。能用一段話說出「生產引擎賣的不只是吞吐，是可觀測性與可控性」，這個 lab 就值回票價。選配加分：SGLang 近期版本有 Apple Silicon MLX backend（2026），可試裝對照。\n\n### Lab 3 [紙上推演]：三個選型題\n\n對下面三個場景各寫 5 行內的選型決策與理由（引擎 + 關鍵理由 + 你最擔心的風險）：(a) 內部文件問答工具，10 QPS 峰值，一張 A10，團隊 2 人都是後端出身；(b) 對外 API 產品，流量 100% 是 JSON 工具呼叫，p95 TTFT < 800ms，8 張 H100；(c) 車載離線語音助理，模型固定兩年不換，硬體是車規 Orin。\n\n**成功標準**：三題都用了「workload 形狀 → 引擎特性 → 團隊能力 → 代價」的完整鏈條，而不是「因為 X 比較快」。參考方向：(a) vLLM 預設解；(b) SGLang 與 vLLM 實測對比，結構化輸出是決勝點；(c) TensorRT-LLM 的定置炮台場景。\n\n## 這個領域往哪走\n\n引擎層的單點功能正在快速商品化：continuous batching、PagedAttention、prefix caching、P/D 支援——2026 年你已經很難靠「有沒有某功能」區分 vLLM 與 SGLang，連 TensorRT-LLM 都轉向 PyTorch backend 加入同一賽道。差異化正在往兩個方向移動：往下是 kernel 與數值格式的硬體貼合度（NVFP4、batch-invariant kernels），往上是路由與平台層的整合品質（誰跟 llm-d/Dynamo/IGW 接得最順，ch10/ch12）。對你的含意：學引擎要學機制與診斷方法（十年有效），參數表會過期（半年一版）；而「會用 benchmark 在兩個引擎之間做出有數據的選擇」這個能力，比押注任何一個引擎本身都耐久。\n\n## 自我檢核\n\n1. 畫出 vLLM V1 的 process 模型（TP=2 時共幾個 process、各做什麼），並解釋為什麼 tokenization 要放在 EngineCore 之外的 process。\n2. 一個 stream=true 的 chat 請求從 HTTP 進到第一個 SSE chunk 出，依序經過哪些元件？TTFT 包含哪幾段時間？哪一段在 GPU 指標上看不到？\n3. `--max-model-len` 設太大的兩種症狀是什麼？正確的設定依據是什麼？\n4. 為什麼「8B FP16 換成 FP8」在 24 GB 的卡上吞吐提升遠超過 2 倍？拆出兩個機制來源（提示：固定成本 + KV pool）。\n5. SGLang 相對 vLLM 最站得住腳的兩個差異點是什麼？為什麼「某引擎快 29%」這類數字不能直接拿來做選型？\n6. TensorRT-LLM 1.2 把 PyTorch backend 設為預設，這個轉向說明了 compile 式引擎的什麼結構性弱點？什麼場景下 AOT compile 仍然划算？\n7. 你的 vLLM `/health` 正常但所有請求 hang 住，給出至少兩個候選根因與各自的驗證方法。\n8. 租卡實驗的成本紀律裡，為什麼 Terminate 和 Stop 的差別重要？為什麼建議用儲值制？\n\n## 延伸閱讀\n\n- [vLLM V1: A Major Upgrade to vLLM's Core Architecture（vLLM 官方 blog，2025-01）](https://vllm.ai/blog/2025-01-27-v1-alpha-release) — V1 架構的第一手設計說明：process 隔離、ZMQ、統一排程器，本章架構解剖的源頭。\n- [vLLM 官方文件：Architecture Overview](https://docs.vllm.ai/en/latest/design/arch_overview/) — 元件名稱與 process 模型的權威版本，隨版本更新，讀碼前先讀它。\n- [vLLM 官方文件：Engine Arguments](https://docs.vllm.ai/en/stable/configuration/engine_args/) — 本章參數表的上游事實來源；預設值以這頁（與 `--help`）為準。\n- [Inside vLLM: Anatomy of a High-Throughput LLM Inference System（Aleksa Gordić）](https://www.aleksagordic.com/blog/vllm) — 第三方視角的 V1 完整解剖，配著本章「請求的一生」讀，然後就可以直接開原始碼了。\n- [SGLang: Efficient Execution of Structured Language Model Programs（NeurIPS 2024）](https://arxiv.org/abs/2312.07104) — RadixAttention 與結構化輸出加速的原始論文，理解 SGLang 差異點的根。\n- [SGLang GitHub](https://github.com/sgl-project/sglang) — release notes 是追蹤兩大引擎功能競賽的最佳一手材料；採用數字屬專案自述，閱讀時自帶折扣。\n- [TensorRT-LLM 官方文件：PyTorch Backend 架構](https://nvidia.github.io/TensorRT-LLM/torch.html) — 1.x 世代轉向 PyTorch backend 的官方說明，理解「compile vs 彈性」取捨的現在進行式。\n- [RunPod Pricing](https://www.runpod.io/pricing) — 租卡前必看；本章所有價格皆為 2026-06 快照，以此頁現價為準。\n"}, {"id": "ch09-parallelism", "file": "ch09-parallelism.md", "group": "Part III — 分散式推論", "title": "ch09 — 平行化策略：當一張卡裝不下", "md": "# ch09 — 平行化策略：當一張卡裝不下\n\n> **本章解決什麼問題**：ch03 算過那筆帳——70B 模型的 BF16 權重比一張 H100 還大，「單卡跑 70B」在物理上不成立；405B 與 1T 級 MoE 更不用說。本章回答「怎麼切」：TP/PP/DP/EP/SP 五種平行化各自的機制、通訊代價公式、適用場景，以及支撐它們的 NCCL 集合通訊層。讀完你要能對「給定模型＋給定硬體＋給定 SLO」做出有數字佐證的平行策略決策。這章是 Part III 的地基：ch10 的 P/D 分離建立在「prefill 與 decode 適合不同平行配置」之上，ch11 的拓撲感知排程、ch15 的 NCCL 故障處理，前提都在這裡。\n\n## 從你已知的出發\n\n你做過的每一個資料庫擴展決策，在這一章都有對應物——只是物理常數變了。\n\n- **Tensor parallelism ≈ 水平 sharding，但每個 query 都是 cross-shard join**。你知道 sharding 的鐵律：切了之後最好別讓查詢跨 shard。TP 正好違反這條鐵律——它把每一層的權重矩陣切到 N 張卡上，於是**每生成一個 token、每一層**都要做一次跨卡的中間結果合併。這就是為什麼 TP 對網路的要求苛刻到只有 NVLink 等級的互連才扛得住：你不會把一個每秒 join 幾萬次的 shard 對拆到兩個 region，同理你不會把 TP 拆到兩個節點。\n- **Pipeline parallelism ≈ 你的結算 pipeline**。K8s CronJobs → SQS → consumer 那套：每個 stage 做完自己的部分、把結果交給下一棒。PP 把模型的 80 層切成幾段，每段住一張卡（或一個節點），卡間只傳「接力棒」（hidden state）。吞吐由最慢的 stage 決定、pipeline 有暖機與排空的空轉（bubble）——這些你在 SQS pipeline 上都見過。\n- **Data parallelism ≈ read replica**。複製整份模型，路由器分流。你用 RDS read replica 解讀流量的思路原封不動成立，連缺點都一樣：每個 replica 的快取是獨立的（這裡是 prefix cache，ch05），路由亂打會把快取命中率打碎——這個問題留給 ch10 的 KV-aware routing。\n- **Expert parallelism ≈ partition by key 的熱分區問題**。MoE 的 router 按 token 把工作分發給 expert（ch03），EP 把 expert 攤到多張卡上——這就是 partition by key。而你在 DynamoDB／SQS 上被熱分區咬過的那一口，在這裡叫 hot expert：某幾個 expert 被瘋狂路由，持有它們的 GPU 變成全組的瓶頸。\n- **NCCL ≈ shard 之間的 RPC 層，但比你用過的任何 RPC 都脆**。它是同步的、沒有重試、沒有 timeout 預設（有也是分鐘級）、一個參與者失蹤時其他人會永遠等下去。你的分散式直覺全部適用，但防禦工事要重建（ch15）。\n\n一個提醒：本章只談**推論**的平行化。訓練的平行化（FSDP、ZeRO、gradient 同步那些）是另一個世界，本書不涵蓋——推論沒有 backward pass、沒有 optimizer state，問題簡化很多，但對延遲的要求嚴苛得多。\n\n## 為什麼要切：三種動機，三種切法\n\n「要不要平行化、怎麼平行化」不是一個問題，是三個。動機不同，正確的切法完全不同：\n\n| 動機 | 問題長相 | 對症的切法 |\n|---|---|---|\n| **裝不下**（capacity） | 權重 + KV cache > 單卡 HBM。70B BF16 = 141 GB > 80 GB，無解，必須切 | TP（單節點內）、PP（跨節點）、EP（MoE） |\n| **太慢**（latency） | 裝得下，但 decode 是 memory-bound（ch03），單卡 3.35 TB/s 的頻寬就是 token rate 的天花板 | TP——N 張卡聚合 N 倍頻寬，每 token 的權重讀取時間除以 N |\n| **不夠多**（throughput） | 單副本的 goodput 餵不飽流量 | DP——加副本，最便宜、最該優先考慮的 scale-out |\n\n三個推論值得先記住：\n\n1. **「裝不下」是硬約束，另外兩個是軟約束。** 記憶體帳不過關，其他都不用談。所以每個平行決策的第一步永遠是 ch03 那三本帳：權重、KV、activation。\n2. **TP 是唯一能降低單請求延遲的切法。** PP 不會讓單一 token 變快（層還是得一層層算），DP 更不會。如果你的問題是 ITL 太高，加 replica 沒有用。\n3. **能用 DP 就不要用更複雜的。** DP 副本之間零通訊、故障隔離乾淨、運維面積最小。TP/PP/EP 都是在「單副本本身放不下或不夠快」時才引入的複雜度。這跟你對「能加 read replica 解決的就別動 sharding」的直覺完全一致。\n\n實際部署幾乎都是組合拳：405B 可能是「節點內 TP8 × 跨節點 PP2」再乘上 DP 副本；DeepSeek 級 MoE 是「attention 用 DP、FFN 用 EP」。下面逐一拆解每種切法，最後再組裝回來。\n\n## Tensor Parallelism：把每一層橫著切\n\n### 機制：矩陣怎麼切，通訊就怎麼來\n\nTP（tensor parallelism）把**每一層內部**的權重矩陣沿著某個維度切開，N 張卡各拿 1/N，一起算同一個 token。以 Llama-3.3-70B 的一層為例（形狀見 ch03），Megatron-LM 確立的標準切法是：\n\n```\nattention 區塊：\n  W_Q / W_K / W_V：按 head 切（column-parallel）\n     64 個 Q head、8 個 KV head 平分到 N 張卡 → 每卡算自己那幾個 head，不需通訊\n  W_O：按行切（row-parallel）\n     每卡算出部分和 → 需要一次 all-reduce 把 N 份部分和加總\n\nFFN 區塊：\n  W_gate / W_up：column-parallel（28672 維平分）→ 不需通訊\n  W_down：row-parallel → 又一次 all-reduce\n```\n\n切法的巧妙在於：先 column 後 row 的配對讓中間結果**留在本卡**，整層只在兩個出口處各同步一次。代價是固定的：**每層 2 次 all-reduce，每次的 payload 是「該步處理的 token 數 × hidden size × activation 精度」**。80 層的模型，生成一個 token 要做 160 次 all-reduce——這個數字是 TP 一切性質的根源。\n\nKV cache 也跟著 head 切：TP2 下每卡存 4 個 KV head 的 cache，TP8 下每卡存 1 個。總 KV 容量不變，但平攤到了 N 張卡的 HBM 上——這是 TP 附贈的好處：**聚合的 KV 池跟著變大**。\n\n### 通訊代價公式\n\nring all-reduce 的標準結果：對 payload 為 S bytes 的一次 all-reduce，每張卡要送出（也收進）`2 × (N−1)/N × S` bytes。TP 推論的每卡通訊量：\n\n```\n每 token 每卡 TP 通訊量 = L 層 × 2 次 × 2(N−1)/N × (h × b)\n\nLlama-3.3-70B（L=80、h=8192、activation BF16 b=2 → 每次 payload 16 KiB/token）：\n  TP2：80 × 2 × 1.0 × 16 KiB = 2.5 MB/token/卡\n  TP4：80 × 2 × 1.5 × 16 KiB = 3.75 MB/token/卡\n  TP8：80 × 2 × 1.75 × 16 KiB = 4.4 MB/token/卡\n```\n\n2.5 MB/token 看起來不多——對 NVLink 4 的 450 GB/s（每方向，ch02）來說是 6 μs 的事。真正的殺手是**次數**：每次 collective 都有與資料量無關的啟動延遲（kernel launch、同步、協定握手，NVLink 上約幾 μs，PCIe／網路上是幾十 μs）。把任何 collective 的耗時想成：\n\n```\nT ≈ α（每次啟動延遲） + S / BW（資料量 ÷ 頻寬）\n```\n\ndecode 的 payload 小（KB 級）→ **α 項主宰**：160 次 × 4 μs ≈ 0.6 ms/token，對一個 10~20 ms 的 decode step 來說是 3~6% 的稅，TP 度越高、互連越慢，稅越重。prefill 的 payload 大（一次塞幾千個 token，payload 是 MB~百 MB 級）→ **頻寬項主宰**，這時 NVLink 與 PCIe 的 10 倍頻寬差會直接反映在 TTFT 上。本章 worked example 會把這兩筆帳算給你看。\n\n### 為什麼 TP 幾乎不出節點\n\n把 ch02 的斷層線搬過來：節點內 NVLink 4 是 450 GB/s 每方向，跨節點 IB NDR 是 50 GB/s 每方向——9 倍；α 延遲也差一個數量級。TP 每 token 同步 160 次的性格，撞上這個斷層就是災難：通訊時間會從「個位數百分比的稅」變成「主導項」。所以業界鐵律：**TP 度 ≤ 單一 NVLink 域的卡數**（傳統 HGX 機器是 8；NVL72 機櫃把這個邊界撐到 72，見 ch02/ch17）。跨節點，用別的切法。\n\n### TP 的適用判斷與隱藏限制\n\n- **適用**：模型裝不進單卡、或單卡頻寬撐不住 ITL 目標時的**第一選擇**，前提是卡之間有 NVLink。vLLM 一個參數就開：`--tensor-parallel-size N`。\n- **整除限制**：attention head 數、KV head 數最好能被 N 整除。Llama-3.3-70B 有 8 個 KV head，TP 開到 8 是乾淨的；開 TP16 時 KV head 不夠分，引擎會**複製** KV head——意思是 KV cache 總量不再隨 TP 變大而攤薄，你以為的容量收益憑空消失。MLA 模型（DeepSeek 系）更極端：KV 是單一 latent（ch03），TP 下整份 KV 在每卡複製一份——這是後面「DP attention」存在的根本原因。\n- **報酬遞減**：TP2→TP4→TP8，每卡的權重讀取減半，但 α 稅照付、payload 的 (N−1)/N 係數還微幅上漲。經驗上 dense 模型 TP8 之後（跨出 NVLink 域之前）就接近收益盡頭。\n- **吞吐視角的反直覺**：同樣 8 張卡，TP8 單副本的吞吐通常**低於** TP2 × 4 副本（通訊稅 × 排程彈性差），但 TP8 的單請求延遲更低、能跑更大的模型。延遲買吞吐，這是 TP 度的本質取捨。\n\n## Pipeline Parallelism：把模型直著切\n\n### 機制與通訊代價\n\nPP（pipeline parallelism）按**層**切：80 層切成 4 個 stage，每 stage 20 層，住在一張卡或一個節點上。token 的計算像接力賽跑過 4 棒，stage 之間只傳一樣東西：該 token 算到一半的 hidden state。\n\n```\n每 token 每個 stage 邊界的 PP 通訊量 = h × b = 8192 × 2 bytes = 16 KiB\n```\n\n對比 TP 的 2.5 MB/token——**PP 的通訊量比 TP 小兩個數量級，而且每 token 每邊界只傳一次**（不是 160 次）。16 KiB 走 50 GB/s 的 IB 不到 1 μs，走 100GbE 也才幾 μs。這就是 PP 的存在理由：**它是唯一對跨節點友善的模型切法**。模型大到單節點 8 卡裝不下時（405B BF16、1T 級 MoE 的非 EP 部分），PP 是跨節點的標準答案。\n\n### Bubble：pipeline 的空轉\n\nPP 的代價不在通訊量，在**空轉**。單一請求跑 PP4 時，任一時刻只有一個 stage 在工作、其他三個在等——延遲沒變快（還多了 hop 延遲），算力利用率 25%。解法是 micro-batching：把 batch 切成多個 micro-batch 塞滿 pipeline，讓 4 個 stage 同時各算不同 micro-batch。訓練世界對 bubble 比例有經典公式（(S−1)/(B+S−1)，S 是 stage 數、B 是 micro-batch 數）；推論世界的好消息是 **continuous batching（ch06）天然就是 micro-batch 流**——穩態下永遠有不同請求的 token 在不同 stage 裡跑，bubble 幾乎被填滿。壞消息是兩個：\n\n1. **延遲不降反升**：每 token 還是要序列地跑完所有層，外加 S−1 次跨 stage 傳輸延遲。PP 是吞吐型切法，對 ITL 無解。\n2. **stage 不均 = 整條變慢**：吞吐由最慢 stage 決定。層數除不盡、首尾 stage 多扛 embedding/lm_head、某 stage 的卡被降頻——任何不均都直接打折。你調 SQS pipeline 時平衡各 stage consumer 數的功夫，這裡叫 stage 切分調優。\n\n### 適用判斷\n\n- **用**：模型跨節點才裝得下，而且互連只有一般網路或 IB（沒有跨節點 NVLink）；或者一堆沒有 NVLink 的 PCIe 卡要湊大模型（消費卡叢集、雲上廉價機型）。\n- **不用**：單節點裝得下時，TP 幾乎總是更好（延遲更低、實作更成熟）。\n- **組合**：大模型的標準配方是「節點內 TP × 節點間 PP」：`--tensor-parallel-size 8 --pipeline-parallel-size 2` = 2 節點 16 卡。TP 吃 NVLink 的頻寬，PP 吃 IB 的容忍度，各取所長。\n\n## Data Parallelism：最樸素也最常用\n\nDP（data parallelism）= 完整複製模型 N 份，各自服務不同請求。推論的 DP 比訓練簡單到幾乎無聊：**沒有 gradient 要同步，副本之間零通訊**。通訊代價公式：0。這是它最大的美德——故障隔離乾淨（一個副本死了，LB 摘掉它就好）、擴縮容是線性的、不需要任何特殊互連。\n\n但有兩個層次要分清楚：\n\n- **平台層 DP**：K8s 裡的 replica，gateway/LB 分流（ch12）。每個副本是獨立的 vLLM process，互不知道彼此。99% 的 scale-out 是這種，你已經會了。唯一的新問題是「每副本的 prefix cache 獨立 → 路由決定命中率」，ch10 處理。\n- **引擎層 DP**（vLLM 的 `--data-parallel-size`）：多個 engine 副本被**協調地**一起跑，通常是為了跟 EP 配合——這就是 **DP attention + EP MoE** 的組合，MoE serving 的主旋律：\n\nattention 層為什麼用 DP 而不是 TP？前面埋的伏筆收回來：MLA 模型的 KV 是單一 latent 向量，TP 切不動、只能整份複製——8 卡 TP 就是 8 份重複的 KV，HBM 直接浪費。改成 DP：每張卡跑**不同請求**的 attention（各自持有自己請求的完整 KV，不重複），到了 FFN/MoE 層再切換成 EP 把 token 分發給散在各卡的 expert。attention 權重在 MLA 架構下很小（壓縮投影矩陣），複製 N 份的代價可忽略。vLLM 與 SGLang 都已把這套組合做成一級功能（2026-06，vLLM 文件稱 DP attention 可再與 TP 組合，每個 DP engine 內含 TP-size 個 worker）。\n\n## Expert Parallelism：MoE 專屬的切法\n\n### 機制：all-to-all 的世界\n\nEP（expert parallelism）只對 MoE 模型有意義（結構見 ch03）。把每層的 E 個 expert 攤到 N 張卡上（每卡 E/N 個），router 決定每個 token 去哪些 expert，於是每個 MoE 層要做兩次 **all-to-all**：\n\n1. **dispatch**：每張卡把自己這批 token 的 hidden state 發給「持有目標 expert 的卡」；\n2. **combine**：算完把結果發回原卡加權合併。\n\n通訊量上界（假設目標 expert 全在遠端）：\n\n```\n每 token 每 MoE 層 ≈ 2 次 all-to-all × top_k × h × b\n\nDeepSeek-V3 級（h=7168、top_k=8、58 個 MoE 層、dispatch FP8/combine BF16）：\n  每 token ≈ 58 × 8 × 7168 × (1+2) bytes ≈ 10 MB\n```\n\n每 token 10 MB 的網路流量——比 dense TP 的 2.5 MB 還高,而且天生跨節點（expert 多到單節點裝不下）。這就是為什麼 DeepSeek 要自己寫 DeepEP 這種貼著 NVLink/RDMA 的 all-to-all kernel、為什麼 wide-EP 部署都要求 IB/RoCE 等級的 scale-out 網路,也是為什麼 all-to-all 與計算的 overlap（DeepSeek 的 dual-batch overlap、vLLM 的 DBO）是這個領域的核心工程。\n\n### Wide-EP：為什麼 EP 度要開到上百\n\n直覺上 EP 開到「expert 裝得下」就夠了,為什麼 DeepSeek 生產系統的 decode 要開到 EP144？因為 wide-EP 同時解三個問題：\n\n1. **容量**：V3 級模型 FP8 權重 671 GB,加上 KV 與 buffer,本來就要幾十張卡。\n2. **KV 池**：EP 越寬,每卡攤的 expert 權重越少,省下的 HBM 全變成 KV 池 → batch 開得更大 → decode 吞吐直接受益（ch06 的邏輯）。\n3. **expert 的 batch 效率**：每卡 expert 少而流量大,每個 expert 每步收到的 token 多 → 權重讀取被攤提得更好（roofline 右移,ch02）。\n\n公開的一手資料是 DeepSeek 自己的生產部署（2025-02 公開,H800 叢集）：**prefill 群用 EP32**（4 節點 × 8 卡為一個部署單位,每卡 9 個 routed expert + 1 個 shared expert）,**decode 群用 EP144**（18 節點 × 8 卡,每卡 2 個 routed expert + 1 個 shared expert）,公布的量測是每 H800 節點 prefill 73.7k tok/s（含 cache 命中）、decode 14.8k tok/s。注意那個關鍵設計:**prefill 與 decode 的 EP 度不一樣**——兩階段的資源畫像不同（ch03）,連平行配置都該不同,這正是 P/D 分離的核心論據之一,完整展開在 ch10。\n\n開源引擎的支援現況（2026-06）:vLLM 的 wide-EP 已是官方支持的部署形態,`--enable-expert-parallel` 配合 DP attention,官方 blog 展示 DeepSeek 在多節點 H200 上達 2.2k tok/s/GPU（DeepEP kernel + dual-batch overlap）,並在 GB200 NVL72 上持續推進;SGLang 同樣把大規模 EP 當主打,v0.5.10 起有 Elastic EP（EP 群的彈性擴縮）。兩家在這條路線上功能高度趨同,llm-d 與 Dynamo 則在其上提供多節點編排（ch10/ch12）。\n\n### EP 的故障面：熱 expert 與慢卡\n\nEP 是按 token 內容路由的——這意味著負載分布**由流量內容決定**,你無法事先保證均勻。某個領域的請求湧入（全是程式碼、全是中文）,router 就是會把流量集中打到少數 expert,持有者成為全組瓶頸:all-to-all 是同步集合操作,**最慢的卡決定整步的時間**。緩解手段:redundant experts（熱 expert 多放幾份副本,DeepSeek 生產配置裡那「32 個冗餘 routed expert」就是這個）、EPLB（expert 負載均衡器,根據統計週期性重排 expert 放置,vLLM 已內建支援,2026-06）。把它想成你處理熱分區的工具箱:加副本、重新分 key、監控 skew——概念一一對應。\n\n## Sequence Parallelism：超長 context 的切法（一節帶過）\n\nSP/CP（sequence/context parallelism）切的不是模型,是**序列本身**:1M token 的 prefill,單卡算 O(n²) 的 attention 要算到天荒地老,於是把序列切成 N 段、N 張卡各算一段,attention 需要的跨段資訊用 ring 的方式輪轉 KV block（ring attention 是代表性做法）。通訊量級是「整份 KV 在環上轉一圈」,對超長 prefill 來說值得,對一般長度純屬浪費。\n\n你需要知道的就三點:（1）它只解 prefill,decode 用不上;（2）它是 1M-context 時代（DeepSeek-V4、Qwen3.5 都已標配百萬級 context,2026-06）才普遍需要的武器,而 DSA/linear attention 這類架構演進正在從根上降低需求（ch17）;（3）截至我能確認的資訊（2026-06）,主流開源 serving 引擎對 SP/CP 的支援仍屬部分或實驗性質,生產上更常見的做法是 chunked prefill（ch06）＋ P/D 分離（ch10）先把長 prefill 的干擾隔離掉。知道它存在、知道什麼時候該去查它,就夠了。\n\n## NCCL 與集合通訊：所有切法腳下的那層\n\n上面每種切法的「通訊」,實作上幾乎都是 NCCL（NVIDIA Collective Communications Library,ch04 的名詞表提過）。它提供一組集合操作原語,幫你在「環、樹、NVSwitch、IB」這些拓撲上跑出接近線速的傳輸。把語意和代價背下來,讀任何引擎的分散式程式碼都不再陌生:\n\n| Collective | 語意 | 每卡線上流量（ring,結果大小 S） | 推論中誰在用 |\n|---|---|---|---|\n| **all-reduce** | 大家各有一份,最後人人拿到總和 | 2(N−1)/N × S | TP 每層兩次（本章主角） |\n| **all-gather** | 各持一片,最後人人拿到完整拼圖 | (N−1)/N × S | TP 的變體實作、權重載入 |\n| **reduce-scatter** | 加總後每人只拿自己那片 | (N−1)/N × S | all-reduce 的一半（all-reduce ≡ reduce-scatter + all-gather） |\n| **all-to-all** | 人人給每個人一份不同的資料 | (N−1)/N × S | EP 的 dispatch/combine |\n| **broadcast** | 一人發、人人收 | ≈ S | 權重分發、同步元資料 |\n\n三件工程上要緊的事:\n\n1. **NCCL 是拓撲感知的**。初始化時偵測 NVLink/PCIe/IB 拓撲,自動選 ring 或 tree 演算法、決定走哪條路。`NCCL_DEBUG=INFO` 會把它看到的拓撲與選擇印出來——多卡部署起不來或慢得反常時,第一件事就是看這份輸出,確認它走的是 NVLink 而不是默默 fallback 到 PCIe 或 socket（fallback **不是錯誤,是靜默降速 10~100 倍**,這是新手最常踩的雷）。\n2. **集合操作是同步屏障**。所有參與者都到齊,操作才完成。一張卡慢（降頻、ECC retry）,全組等它;一張卡死(process crash、CUDA error),全組**永遠**等它——預設行為是無限期 block 或極長的 timeout。\n3. **這就是 NCCL hang 成為多卡世界最痛故障的原因**:症狀是整個 TP/EP 群的 GPU util 卡在 100%（spin-wait 也是 util）、token 輸出歸零、沒有任何 error log——對你所有「看指標找問題」的直覺都是反向欺騙。偵測、watchdog、自動處置的完整工事在 ch15,這裡先立牌子:**任何多卡部署,上線前必須先想好「NCCL hang 了我怎麼知道、誰去殺」**。\n\n## 決策框架:模型 × 硬體 × SLO → 策略\n\n把全章收斂成一張表。假設目標都是「生產 serving、合理 SLO」,硬體以 2026 年租用市場主流卡為基準:\n\n| 模型 | 權重（FP8） | 推薦切法 | 為什麼 | 不要做的事 |\n|---|---|---|---|---|\n| **8B dense**（Llama-3.1-8B 級） | ~8 GB | **不切**。單卡（L4/A10 都夠）,流量大就平台層 DP | 權重連 24 GB 卡都裝得下,任何切法都是純開銷 | 對 8B 開 TP4「讓它更快」——通訊稅吃掉大半收益,不如把錢花在更大 batch 或更好的卡 |\n| **70B dense**（Llama-3.3-70B 級） | ~71 GB | **TP2（H100/H200）或 TP4（中階卡）,單節點內**;流量大套 DP 副本 | 單卡裝不下（硬約束）;TP 同時擴 KV 池、降 ITL;8 個 KV head 整除友善 | 跨節點 TP;TP16（KV head 不夠分,KV 開始複製） |\n| **405B dense**（Llama-3.1-405B 級） | ~405 GB | **TP8（單節點 8×H100/H200）**,KV 池 ≈ 640×0.9 − 405 ≈ 170 GB;若只有 PCIe 機或要更大 KV 池 → TP8 × PP2 跨兩節點 | 405 GB 剛好塞進一個 NVLink 域;PP 的 16 KiB/token 跨節點無痛 | 跨節點 TP16(IB 上 160 次/token 的 all-reduce 會讓 ITL 爆炸) |\n| **1T 級 MoE**（DeepSeek-V4-Pro 1.6T/49B active、Kimi K2.6 1T/32B active 級） | 600 GB~1.6 TB | **DP attention + wide-EP**,數十到上百卡;prefill 群與 decode 群分開、EP 度不同(P/D 分離,ch10);NVL72 或多節點 IB | MLA 讓 TP 複製 KV(不可行);expert 結構天然適合 EP;wide-EP 把 HBM 還給 KV 池 | 用 TP/PP 硬扛 MoE(浪費 sparse 結構);**流量撐不滿幾十張卡就別自建——直接用 API,這是 ch16 的成本數學,不是技術問題** |\n\n兩條貫穿的原則:**切法跟著互連走**(NVLink 域內 TP/EP、跨節點 PP/DP/EP-over-IB,斷層線就是架構線,ch02);**先過記憶體帳,再優化延遲,最後才堆吞吐**——順序反了就會出現「跑得起來但 KV 池只剩 5 GB」這種自己挖的坑。\n\n## Worked example:70B FP8,2×H100 TP2 vs 4×L40S TP4\n\n兩個配置服務同一個模型(Llama-3.3-70B,FP8 權重 ≈ 71 GB,KV 用 BF16),哪個划算?這題的價值在於它逼你把本章所有公式串起來算一遍。先列規格(2026-06 查證):\n\n| | H100 SXM | L40S |\n|---|---|---|\n| HBM/VRAM | 80 GB HBM3 | 48 GB GDDR6 |\n| 記憶體頻寬 | 3,350 GB/s | 864 GB/s |\n| FP8 dense 算力 | 1,979 TFLOPS | 733 TFLOPS |\n| 卡間互連 | NVLink 4:450 GB/s 每方向 | **無 NVLink**:PCIe Gen4 x16,~32 GB/s 每方向(實效抓 ~25) |\n| 租價快照(2026-06,neocloud on-demand,僅供量級) | ~$2.5/hr | ~$0.8/hr |\n\n**第 1 步:記憶體帳。**\n\n```\n2×H100 TP2:\n  可用 = 80 × 0.9 × 2 = 144 GB\n  權重 = 71 GB(每卡 35.5 GB)\n  activation + NCCL buffer ≈ 4 GB\n  KV 池 ≈ 144 − 71 − 4 ≈ 69 GB        ← 與 ch03 的數字一致\n\n4×L40S TP4:\n  可用 = 48 × 0.9 × 4 = 172.8 GB\n  權重 = 71 GB(每卡 17.75 GB)\n  activation + NCCL buffer ≈ 6 GB\n  KV 池 ≈ 172.8 − 71 − 6 ≈ 96 GB\n```\n\n第一個反直覺:**L40S 配置的 KV 池反而大 39%**(192 GB 總容量 vs 160 GB)。以 4k context 的對話算(KV ≈ 0.33 MB × 4096 ≈ 1.35 GB/條,ch03):H100 配置容納 ~51 條,L40S 配置 ~71 條。便宜卡用「堆容量」扳回一城——先別下結論,看完速度帳再說。\n\n**第 2 步:每 token 的 TP 通訊量。**\n\n```\nTP2(H100):80 層 × 2 次 × 2(2−1)/2 × 16 KiB = 2.5 MB/token/卡\nTP4(L40S):80 層 × 2 次 × 2(4−1)/4 × 16 KiB = 3.75 MB/token/卡\n```\n\n頻寬項:H100 走 NVLink,2.5 MB ÷ 450 GB/s ≈ 6 μs,可忽略;L40S 走 PCIe,3.75 MB ÷ 25 GB/s ≈ 150 μs。α 項(160 次集合操作的啟動延遲):NVLink 上抓 ~4 μs/次 ≈ 0.6 ms;PCIe 上抓 ~25 μs/次 ≈ 4 ms。**L40S 的每 token 通訊稅 ≈ 4.2 ms,是 H100 的 7 倍**,而且大頭是 α——這就是「TP 不出 NVLink 域」鐵律的小尺度版本:TP4-over-PCIe 已經是在鐵律邊緣行走。\n\n**第 3 步:單請求 decode 速度(batch=1 上限)。**\n\n每個 decode step = 讀自己那份權重 shard + 通訊:\n\n```\nH100 TP2:35.5 GB ÷ 3,350 GB/s ≈ 10.6 ms,+0.6 ms 通訊 ≈ 11.2 ms → ~89 tok/s\nL40S TP4:17.75 GB ÷ 864 GB/s ≈ 20.5 ms,+4.2 ms 通訊 ≈ 24.7 ms → ~40 tok/s\n```\n\n(roofline 式上限,實測通常打 7~8 折。)H100 配置的單流速度是 2.2 倍——對 ITL 敏感的互動式產品,這就是分界線。\n\n**第 4 步:TTFT(4k token prompt 的 prefill)。**\n\nprefill 是 compute-bound(ch03),FLOPs ≈ 2 × 70.6B × 4096 ≈ 578 TFLOPs(忽略 attention 二次項,4k 下約再加 7%):\n\n```\nH100 TP2:578 ÷ (1,979 × 2 × 0.45 MFU) ≈ 0.32 s\n  通訊:每次 all-reduce payload = 4096 × 16 KiB = 64 MiB\n       160 次 × 64 MiB × 1.0 ÷ 450 GB/s ≈ 0.02 s        → TTFT ≈ 0.35 s\nL40S TP4:578 ÷ (733 × 4 × 0.45 MFU) ≈ 0.44 s\n  通訊:160 次 × 64 MiB × 1.5 ÷ 25 GB/s ≈ 0.61 s         → TTFT ≈ 1.05 s\n```\n\n第二個殺手鐧藏在這裡:**L40S 配置的 prefill 花在 all-reduce 上的時間(0.61 s)比花在計算上的(0.44 s)還多**。prefill 的 payload 是 MB 級,通訊從 α 主宰變成頻寬主宰,PCIe 的 25 GB/s 直接現形。4 張卡的聚合算力(2,932 TFLOPS)比 2×H100(3,958)只差 26%,但 TTFT 差 3 倍——瓶頸根本不在算力。\n\n**第 5 步:飽和吞吐(decode,全 KV 池跑滿 4k context 對話)。**\n\n```\nH100 TP2:51 條並發\n  每步每卡讀:權重 35.5 + KV shard 34.5 ≈ 70 GB → 20.9 ms\n  通訊(payload ×51,仍是小包+α) ≈ 0.9 ms → 每步 ≈ 21.8 ms\n  吞吐 ≈ 51 ÷ 0.0218 ≈ 2,340 tok/s\n\n4×L40S TP4:71 條並發\n  每步每卡讀:權重 17.75 + KV shard 24 ≈ 41.75 GB → 48.3 ms\n  通訊:payload = 71 × 16 KiB ≈ 1.1 MB/次,160 次 × 1.5 ÷ 25 GB/s ≈ 10.9 ms,+α 4 ms → 每步 ≈ 63 ms\n  吞吐 ≈ 71 ÷ 0.063 ≈ 1,130 tok/s\n```\n\n**第 6 步:成本對比。**\n\n| | 2×H100 TP2 | 4×L40S TP4 |\n|---|---|---|\n| 機時(2026-06 快照) | ~$5.0/hr | ~$3.2/hr |\n| 單流 decode 上限 | ~89 tok/s | ~40 tok/s |\n| TTFT(4k prompt) | ~0.35 s | ~1.05 s |\n| 飽和 decode 吞吐上限 | ~2,340 tok/s | ~1,130 tok/s |\n| 併發容量(4k 對話) | ~51 條 | ~71 條 |\n| **$/M output token(飽和)** | **~$0.59** | **~$0.79** |\n\n結論與它的邊界:這組價格快照下,**H100 配置全面勝出**——不只快,連每 token 成本都低 25%,因為 L40S 省下的租金被 PCIe 通訊稅與低頻寬吃光了。但注意三件事:(1)結論對價格敏感——L40S 在 marketplace 上低到 ~$0.5/hr 時(2026-06 的 Vast.ai 確實有),$/Mtok 會翻盤到 ~$0.49,**這張表你必須用當下的價格自己重算**,這正是 ch16 成本模型的日常;(2)上面全是 roofline 式上限,主軸二提醒你:租 2 張卡實測一次(本章 Lab 2),用數據驗證推算;(3)如果 SLO 對 TTFT/ITL 有硬要求,L40S 配置可能直接不及格——goodput 為零的便宜是最貴的便宜(ch06/ch14)。\n\n## 故障模式與防禦\n\n多卡把單機的故障面乘上 N,再加上「同步集合操作」這個新的單點。Murphy 巡禮:\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| **NCCL hang**(一卡 crash/OOM,全組僵在 collective) | 整組 GPU util 100% 但 token 輸出歸零;沒有 error log;請求全部 timeout | util 高但 throughput 為零的背離(兩個指標都要收,ch14);NCCL watchdog timeout log | 設 NCCL timeout 而非無限等;深健康探針(真的生成 token 才算活,ch15);全組視為單一故障域、一起重啟 |\n| **靜默 fallback 到慢路徑**(P2P 被 ACS/IOMMU 擋掉、NCCL 走了 socket) | 功能完全正常,效能差 10~100 倍;最陰險的一類 | `NCCL_DEBUG=INFO` 看實際選用的傳輸;對照本章公式算的理論值——差太多就是有事 | 部署前固定跑一次 `nccl-tests`(all_reduce_perf)留 baseline;機型/驅動變更後重跑 |\n| **TP 度與模型形狀不整除** | 啟動直接報錯(好的情況);或 KV head 被複製、容量莫名比試算少(壞的情況) | 啟動 log 的 KV block 數 vs 你的紙上計算 | 切之前查 config.json:head 數、KV head 數、vocab 能否被 N 整除 |\n| **慢卡拖累全組**(thermal throttle、ECC retry、壞風扇) | 整個 TP/EP 組的 step time 變長,但每張卡單看都「正常」 | DCGM 的逐卡溫度/時脈/ECC 計數;組內 per-rank 耗時分布 | 拓撲感知排程避開降級節點(ch11);DCGM 驅動的自動 cordon(ch15) |\n| **EP 熱 expert** | 部分 GPU 飽和、其他閒置;吞吐遠低於卡數應有水準;特定流量內容觸發 | per-GPU 的 expert 負載分布指標;all-to-all 等待時間 | redundant experts;EPLB 週期性重平衡;容量規劃時別假設均勻分布 |\n| **NVLink/IB 鏈路退化**(Xid 74、線纜故障) | 通訊耗時抖動、偶發 NCCL error;單卡指標無異常 | DCGM NVLink 錯誤計數器;IB port counter | 納入節點健康檢查;故障處置見 ch15 |\n| **gpu-memory-utilization 設太滿 + TP buffer 低估** | 啟動成功,CUDA graph capture 或尖峰時 OOM | 啟動後的實際 HBM 餘量 | 多卡時 NCCL buffer/graph 各吃一份,留 5~10% 餘裕;用本章記憶體帳預算,不要試錯 |\n| **PP stage 失衡** | 吞吐低於預期,某 stage 的卡 util 明顯高於其他 | per-stage util 與佇列深度 | 重切 stage(首尾 stage 記得算上 embedding/lm_head 的帳) |\n\n共同主題:多卡故障的觀測難點在於**指標會說謊**(util 100% 可能是 spin-wait、單卡全綠但全組變慢),防禦的根基是「先有理論值,再比對實測」——本章的公式就是你的理論值產生器。\n\n## 動手做\n\n### Lab 1 [紙上推演]:為 405B 與 1T 級 MoE 各設計一套平行配置\n\n**任務 A**:Llama-3.1-405B(126 層、hidden 16384、128 Q head/8 KV head、head_dim 128),FP8 權重 ≈ 405 GB。在(a)8×H100 節點(b)2× 8×H100 節點兩種硬體上各設計一套切法,算出:每卡權重 shard、KV 池總量、每 token 的 KV bytes(套 ch03 公式:2×126×8×128×2 ≈ 0.49 MB/token BF16)、能服務幾條 32k 對話、每 token 每卡的 TP 通訊量。\n\n**任務 B**:DeepSeek-V3 級 MoE(671B total/37B active、61 層、MLA)。先回答:為什麼 TP 在這裡是錯的答案?(提示:MLA 的 KV 在 TP 下會發生什麼。)然後設計一個 DP attention + EP 的配置:16×H200(141 GB),算每卡攤幾個 expert、權重 shard、剩多少 KV 池。\n\n**成功標準**:任務 A 中你能解釋為什麼(b)應該是 TP8×PP2 而不是 TP16;任務 B 中你能說出 wide-EP 的三個動機(容量/KV 池/expert batch 效率)並對上自己算的數字。\n\n### Lab 2 [租 GPU]:TP2 實測 vs 單卡(估 $8–15)\n\n1. 在 RunPod/Lambda 租 2×A100 80GB 或 2×H100(同節點、確認有 NVLink:`nvidia-smi topo -m` 看到 `NV#` 而不是 `PHB/PIX`)。\n2. 跑一個單卡裝得下的模型做對照,例如 Llama-3.1-8B 或 FP8 的 32B 級模型(示意):\n\n```bash\n# 單卡 baseline\nvllm serve RedHatAI/Qwen2.5-32B-Instruct-FP8-dynamic --max-model-len 8192\n\n# TP2\nvllm serve RedHatAI/Qwen2.5-32B-Instruct-FP8-dynamic --max-model-len 8192 \\\n  --tensor-parallel-size 2\n```\n\n3. 兩種配置各跑 `vllm bench serve`(固定 workload:input 1k/output 256、並發 1 與 32 兩檔),記錄 TTFT/ITL/throughput。\n4. 收尾必做:`NCCL_DEBUG=INFO` 重啟一次,在 log 裡找出 NCCL 選用的拓撲與傳輸;對照本章公式估算 TP2 的每 token 通訊量。**用完即關機。**\n\n**成功標準**:能回答「TP2 的 ITL 改善了多少?為什麼不是理想的 2 倍?」(答案藏在 α 稅與非權重讀取時間裡);並發 32 時 TP2 的吞吐增益與 batch=1 時有何不同、為什麼。\n\n### Lab 3 [紙上推演]:通訊預算速算\n\n對你在 Lab 2 用的模型,算出 TP2/TP4/TP8 在(a)NVLink 4(b)PCIe Gen5(c)IB NDR 三種互連上,decode 每 token 的通訊耗時(α 抓 NVLink 4 μs、PCIe 25 μs、IB 20 μs/次),做成 3×3 表。**成功標準**:表裡能明確圈出哪些格子是「可用」、哪些是「ITL 殺手」,並用它解釋「TP 不出節點」鐵律。\n\n## 這個領域往哪走\n\n短期(1–2 年)的三條線:**NVLink 域持續擴張**——NVL72 已把「TP/EP 的舒適圈」從 8 卡撐到 72 卡,Rubin 世代(H2 2026 起上雲)繼續沿這條線走,「域內 vs 域外」的斷層線不會消失,只會搬家;**wide-EP 從尖端變成商品**——vLLM/SGLang 都已把 DP attention + EP + P/D 做成官方路徑,llm-d/Dynamo 在上面鋪編排層,2027 年「部署 1T MoE」大概率是填配置而不是寫程式;**平行配置的決策自動化**——Dynamo 的 planner/AIConfigurator 這類「給定模型與 SLO,搜出平行配置」的工具正在成熟,但工具給的答案你得會驗算——本章的公式就是驗算器,這是十年不過期的那部分。\n\n## 自我檢核\n\n1. TP 把 Llama-3.3-70B 的一層切到 4 張卡上:哪些矩陣 column-parallel、哪些 row-parallel、all-reduce 發生在哪兩個位置?每 token 每卡的通訊量是多少 bytes(寫出公式並代入)?\n2. 為什麼 TP 幾乎不跨節點,而 PP 可以?用 NVLink 4 與 IB NDR 的每方向頻寬數字、以及兩種切法的每 token 通訊量(2.5 MB vs 16 KiB)完整論證。\n3. decode 與 prefill 的 all-reduce 各被 α 項還是頻寬項主宰?為什麼?這對「用 PCIe 卡做 TP」分別意味著什麼?\n4. MLA 模型為什麼用 DP attention 而不是 TP attention?MoE 的 FFN 為什麼用 EP 而不是 TP?\n5. DeepSeek 生產系統的 prefill 用 EP32、decode 用 EP144——為什麼兩階段的 EP 度不同?wide-EP 對 decode 吞吐的三重收益是什麼?\n6. 同樣 8 張 H100,什麼情況選 TP8 單副本、什麼情況選 TP2×4 副本?各犧牲了什麼?\n7. 你的 TP4 部署吞吐只有理論值的 1/20,但沒有任何 error log。列出前三個假設與各自的驗證手段。\n8. 405B FP8 要部署在 16×H100(2 節點)上:寫出你的切法、每卡權重 shard、KV 池,並說明為什麼不是 TP16。\n\n## 延伸閱讀\n\n- Shoeybi et al., *Megatron-LM: Training Multi-Billion Parameter Language Models Using Model Parallelism*(2019)— https://arxiv.org/abs/1909.08053 。TP 的 column/row-parallel 切法與「每層兩次 all-reduce」的原典,推論世界沿用至今。\n- NVIDIA NCCL User Guide:Collective Operations — https://docs.nvidia.com/deeplearning/nccl/user-guide/docs/usage/collectives.html 。五種集合操作的官方語意定義,讀完本章再讀它,每個圖都看得懂。\n- DeepSeek, *DeepSeek-V3/R1 Inference System Overview*(Open Source Week Day 6,2025-02)— https://github.com/deepseek-ai/open-infra-index/blob/main/202502OpenSourceWeek/day_6_one_more_thing_deepseekV3R1_inference_system_overview.md 。EP32 prefill/EP144 decode 生產部署的一手資料,本章 wide-EP 數字的出處。\n- vLLM Blog, *vLLM Large Scale Serving: DeepSeek @ 2.2k tok/s/H200 with Wide-EP*(2025-12-17)— https://blog.vllm.ai/2025/12/17/large-scale-serving.html 。開源引擎 wide-EP 的現況基準:DeepEP、dual-batch overlap、多節點實測。\n- vLLM Docs:Expert Parallel Deployment — https://docs.vllm.ai/en/latest/serving/expert_parallel_deployment/ 。DP attention + EP 的實際參數與部署形態,Lab 之外想動手跑 MoE 的起點。\n- Red Hat Developer, *Scaling DeepSeek-style MoEs with vLLM and llm-d using Wide EP*(2025-09)— https://developers.redhat.com/articles/2025/09/08/scaling-deepseek-style-moes-vllm-and-llm-d-using-wide-ep 。wide-EP 的多節點編排視角,銜接 ch10/ch12。\n- deepseek-ai/DeepEP — https://github.com/deepseek-ai/DeepEP 。EP all-to-all 的專用通訊庫,README 就是一堂「NVLink/RDMA 上的 all-to-all 工程」課。\n- Hugging Face, *The Ultra-Scale Playbook* — https://huggingface.co/spaces/nanotron/ultrascale-playbook 。訓練視角的平行化互動教材(超出本書範圍),但 TP/PP 的視覺化是我見過最好的,看圖建直覺很值。\n"}, {"id": "ch10-disaggregation-routing", "file": "ch10-disaggregation-routing.md", "group": "Part III — 分散式推論", "title": "ch10 — 解構推論服務：P/D 分離與 KV 路由", "md": "# ch10 — 解構推論服務：P/D 分離與 KV 路由\n\n> **本章解決什麼問題**：ch03 證明了 prefill 是 compute-bound、decode 是 memory-bound；ch06 給了單機緩解（chunked prefill），並誠實承認它是緩解不是根治；ch09 教你把一個模型切到多張卡上。本章走到 2025–2026 大規模推論架構的主旋律：把 prefill 與 decode 拆到**不同的 GPU 池**，讓各自用最適合的硬體與平行策略跑，再用一個懂 KV cache 的路由層把流量送對地方。這也是「LLM serving 是有狀態的分散式系統」這個論點最尖銳的一章——KV cache 在哪裡，決定了請求該去哪裡。讀完你要能算出 KV 傳輸帳、能設計 xPyD 配比、能比較三家路由器的 scoring 設計，以及——同樣重要——能判斷什麼規模以下根本不該碰這套東西。\n\n## 從你已知的出發\n\n這一章的每個概念，你都在後端世界處理過它的同構物，只是物理常數變了。\n\n**讀寫分離。** 你做過 RDS read replica：寫入流量與讀取流量的資源畫像不同（鎖、IO 模式、快取行為），所以拆開、各自擴縮、中間用 replication 同步狀態。P/D 分離是同一個決策模板：prefill 像「寫」（一次大量計算、產生狀態），decode 像「讀」（反覆消費狀態、頻寬敏感），兩者塞在同一台機器上互相踩踏，於是拆開。差別在於同步的「狀態」不是 binlog，是以 GB 計的 KV cache，而且必須在毫秒級搬完。\n\n**Session affinity。** 你做過 WebSocket 多裝置同步：連線有狀態，所以 LB 要 sticky——同一個使用者盡量回到同一台，否則狀態要從 Redis 重建。KV-aware routing 是 session affinity 的高賭注版本：「狀態」是某個 replica 的 prefix cache（ch05），命中與未命中的差距不是「多查一次 Redis 的 2ms」，而是「重算 30 秒對話歷史的 prefill」對「直接開始生成」——TTFT 差 10 倍以上。黏性的價值高了兩個數量級，所以路由器值得為它做複雜得多的決策。\n\n**Consistent hashing。** 你知道 Redis Cluster 怎麼用 hash slot 把 key 釘到節點。你的第一直覺可能是：把 prompt prefix hash 一下，consistent hashing 送到固定 replica，不就解了？這個直覺方向對、但工具錯——本章會講為什麼 prefix 不是一個可以 hash 的 opaque key（它是階層式的、多請求共享的、而且命中價值與負載均衡互相拉扯），以及業界實際收斂到的解法：**scoring，不是 hashing**。\n\n**慢端點獨立 worker pool。** 你在 API gateway（KrakenD）做過：把慢的上游隔離到獨立連線池，免得拖垮快的。P/D 分離在叢集層面做同一件事——prefill 就是那個「慢而吃 CPU」的端點，decode 是「快而頻繁」的端點，單機混跑的干擾（ch06 算過：一個 8k prompt 讓所有人的 ITL 從 9ms 跳到 190ms+）在叢集層面用物理隔離根治。\n\n帶著這四個錨點，新東西只有兩個：搬 KV 的物理（一筆帳，本章算給你看），和 scoring 函數的設計空間（三家的真實做法，逐一拆解）。\n\n## 動機：干擾是結構性的，單機緩解有天花板\n\n先把問題釘死。ch03 的結論：prefill 的 arithmetic intensity 高（一次吃進整個 prompt 的矩陣乘法），落在 roofline 的 compute-bound 一側；decode 每步只算一個 token，權重與 KV 全部重讀一遍，是深度 memory-bound。同一張 GPU 上，這兩種 workload 要的東西不一樣：prefill 要算力，decode 要頻寬與記憶體容量。\n\nch06 的 chunked prefill 把 prefill 切塊混進 decode batch，把「ITL 尖刺」磨平成「ITL 整體墊高一截」。但它有兩個結構性天花板：\n\n1. **Token budget 守恆**。每一步的計算預算就那麼多，分給 prefill chunk 的每一分都在墊高 decode 的步長。prefill 吞吐與 ITL 平滑度在單機上是零和的——你只能選擇痛的形狀，不能消除痛。\n2. **兩階段的最佳平行策略不同**。prefill 希望大 TP 度把單一 prompt 的延遲壓低、甚至上 SP（ch09）；decode 希望省通訊、大 batch、把 HBM 留給 KV。單機混跑時你只能選一套配置，必然對某一邊次優。\n\nDistServe（OSDI 2024）把這個干擾量化得很徹底：在同時有 TTFT 與 TPOT（每 token 時間）雙重 SLO 的設定下，把 prefill 與 decode 拆到不同 GPU、各自選平行策略，相同硬體能多服務 **7.4 倍**請求、或把 SLO 收緊 **12.6 倍**（論文數字，下詳）。干擾不是調參問題，是資源畫像衝突的結構問題——這就是 P/D 分離（prefill/decode disaggregation）存在的理由。\n\n值得停一秒的反直覺點：P/D 分離的收益**不是更高的總 FLOPs 利用率**——多了一次 KV 搬運，總工作量其實變多了。收益是 **goodput**：在 TTFT 與 ITL 都要達標的前提下，每張卡能扛的有效請求數。如果你只有單一寬鬆 SLO（例如內部批次任務只看吞吐），P/D 分離對你幾乎沒有價值。把這句話記住，本章結尾的「什麼時候不要用」會回收它。\n\n## 從論文到生產：四條譜系\n\n學術源頭一段帶過。**DistServe**（北大/UCSD，OSDI 2024）證明了 goodput 視角下分離的數學收益，並指出 KV 傳輸開銷「在現代 GPU 叢集中不足掛齒」——注意這句話的前提是有 NVLink/IB 等級的互連，本章的 worked example 會檢驗它。**Splitwise**（Microsoft，ISCA 2024 最佳論文）用 Azure 生產 trace 做了同樣論證，並率先提出**異質硬體**思路：兩階段用不同的卡，同成本同功耗下吞吐 2.35 倍、或 1.4 倍吞吐省 20% 成本（論文數字）。這兩篇 2024 年的論文，到 2025–2026 已經長成四條生產譜系：\n\n| 系統 | 出身 | 一句話定位（2026-06） |\n|---|---|---|\n| **Mooncake** | Moonshot AI（Kimi） | KVCache-centric：整個架構圍繞「KV 在哪」設計，P/D 分離只是其中一環；最大規模的公開生產證據 |\n| **NVIDIA Dynamo** | NVIDIA（v1.2.0，2026-06） | 引擎無關的分散式推論框架：KV router + planner + KVBM + NIXL，vLLM/SGLang/TRT-LLM 都能掛 |\n| **llm-d** | Red Hat/Google/IBM 系（v0.6.0） | K8s 原生、建立在 Gateway API Inference Extension 上的「well-lit paths」——文件化、可複製的生產路徑 |\n| **vLLM KV connector 生態** | vLLM 社群 | 引擎內的抽象層：NixlConnector、LMCacheConnector、MooncakeConnector…讓上面三家（與你自組的方案）都有同一個掛載點 |\n\n逐一拆它們各自押注的洞察。\n\n### Mooncake：把 KV cache 當成排程的第一公民\n\nMooncake（論文 arXiv:2407.00079，FAST'25）是 Kimi 的 serving 平台，它的核心立場寫在論文副標題裡：*Trading More Storage for Less Computation*。架構上三個重點：\n\n- **分離的 prefill 池與 decode 池**，加上一個用 GPU 叢集裡閒置 CPU/DRAM/SSD 組成的**分散式 KV cache 池**（儲存層的部分 ch05 講過，這裡看排程面）。\n- **Conductor（全域排程器）**：每個請求進來，排程器同時決定「哪個 prefill 實例算它」與「哪個 decode 實例接它」，決策依據是 KV 的位置——哪裡有它的 prefix cache、搬到哪裡最便宜。目標函數是在 TTFT 與 TBT（time between tokens，等同本書的 ITL）雙 SLO 下最大化 goodput。\n- **Transfer Engine**：不用 NCCL 而是自製的 RDMA 傳輸層，支援拓撲感知路徑選擇與**多卡 NIC 頻寬聚合**；KV 採 **layer-wise 串流**——prefill 算完第一層就開始搬第一層的 KV，傳輸與計算重疊，等 prefill 全部算完時大部分 KV 已經在路上。這個 overlap 是讓「搬 KV」在延遲帳上近乎免費的關鍵工程。\n\n生產數據（專案方自報，2026-06）：真實負載下讓 Kimi 多承接 75% 請求；Kimi K2（1T 參數 MoE）部署在 128×H200 上，以 P/D 分離 + 大規模 EP 跑出 prefill 224k tok/s、decode 288k tok/s。這是目前公開資訊裡規模最大、數據最完整的 P/D 分離生產案例。\n\n### NVIDIA Dynamo：引擎無關的框架層\n\nDynamo 把 P/D 分離做成框架（v1.2.0，2026-06）：**KV router** 做 KV-aware 路由（scoring 設計下節詳拆）；**Planner** 負責 P 池與 D 池的容量規劃與動態擴縮，整合 AIConfigurator 做吞吐建模；**KVBM** 是引擎無關的 KV 分層管理；最底層的 **NIXL**（NVIDIA Inference Xfer Library）統一 UCX/GPUDirect Storage/S3 等傳輸後端——它已經成為事實上的跨節點 KV 搬運共同地基：vLLM 的 NixlConnector、Ray Serve 的 P/D pattern、Dynamo 自己都踩在它上面。\n\n### llm-d：K8s 原生的 well-lit paths\n\nllm-d（v0.6.0，2026-04）的差異化不在機制而在**形態**：它把 P/D 分離與智慧路由做成 Kubernetes 上文件化、經 benchmark 驗證的部署路徑（well-lit paths），路由層直接用 Gateway API Inference Extension 的 InferencePool/EPP 標準（平台層全貌見 ch12）。官方數字（專案方自報）：Path 1（prefix-cache-aware routing）在 8 pods/16×H100 下 TTFT 比 round-robin 快 57 倍；Path 2（P/D 分離）在 16×16 B200 拓撲達 50k output tok/s。AWS 已基於 llm-d 推出官方的 disaggregated inference 方案，KServe 的 LLMInferenceService 也直接建構其上（2026-06）。\n\n值得注意的是 llm-d 文件對 P/D 分離的定位非常克制：預設路徑是 **colocated（混跑）+ 智慧路由**，P/D 分離被標為「長輸入、大模型、TTFT 被 prefill 支配」場景的進階選項。一個力推此技術的專案自己都這樣寫，本章結尾的判斷準則跟它一致。\n\n## KV 傳輸工程：搬 10 GB 的狀態是什麼概念\n\nP/D 分離的全部代價濃縮在一件事上：prefill 算完的 KV cache 必須搬到 decode 節點。先建立直覺，再算帳。\n\n搬運的工程棧由下往上：物理層是 NVLink（同節點/同 NVLink 域）、InfiniBand/RoCE（跨節點 RDMA）、或普通乙太網 TCP（你不會想用，馬上證明）；中間是傳輸函式庫——NIXL 或 Mooncake Transfer Engine，負責挑路徑、聚合多張 NIC、GPU 記憶體直達（GPUDirect RDMA，不繞 CPU）；最上面是引擎的 KV connector，負責 block 對位（兩邊的 PagedAttention block table 要對得上）與 layer-wise 串流排程。\n\n工程上三個關鍵事實：\n\n1. **KV 是分片的**。TP4 的部署裡 KV 平均散在 4 張卡上，每張卡有自己的 NIC——搬運可以四路並行（Mooncake 的多卡頻寬聚合就是這件事）。\n2. **搬運可以與計算重疊**。layer-wise 串流下，暴露在 TTFT 上的延遲只有最後一層的傳輸 + 收尾，遠小於總傳輸時間。但 overlap 隱藏的是延遲，不是頻寬佔用——NIC 被 KV 搬運吃掉的頻寬，EP 的 all-to-all（ch09）就用不到了。\n3. **失敗要有出路**。傳輸失敗的正確 fallback 是「decode 節點自己重算 prefill」——這要求路由層把原始 prompt 一起帶過去，而不是只帶 KV 的引用。\n\n### Worked example：32k context 的 KV 傳輸帳\n\n題目：Llama-3.3-70B，一條 32k token 的對話要從 prefill 節點交接到 decode 節點。搬 KV 划算，還是讓 decode 節點重算一次 prefill 划算？逐步算。\n\n**Step 1：要搬多少 bytes。** ch03 的公式與數字直接引用：Llama-3.3-70B（GQA，80 層、8 KV heads、head_dim 128、BF16）每 token KV = 2 × 80 × 8 × 128 × 2 = **320 KiB**。32k context：\n\n```\n32,768 tokens × 327,680 bytes ≈ 10.74 GB\n```\n\n10.74 GB。先停下來感受一下：這是「一個請求」的狀態交接量。你在後端搬過的最大 session 狀態大概是幾百 KB 的購物車——這裡是它的三萬倍，而且在 TTFT 預算（秒級）內要搬完。\n\n**Step 2：三種網路各要多久。** 頻寬數字接 ch02（皆為每方向；實際有效頻寬以 80% 折算，傳輸層協定與 block 對位都有開銷）：\n\n| 路徑 | 理論頻寬 | 理論時間 | 有效時間（×0.8） |\n|---|---|---|---|\n| NVLink 4（同節點/同域） | 450 GB/s | 23.9 ms | **約 30 ms** |\n| IB NDR 400G × 1 NIC | 50 GB/s | 215 ms | **約 270 ms** |\n| IB NDR 400G × 4 NIC（TP4 分片並行） | 200 GB/s | 54 ms | **約 67 ms** |\n| 100GbE（TCP，無 RDMA） | 12.5 GB/s | 859 ms | **約 1.1 s** |\n\n**Step 3：重算 prefill 要多久。** 部署假設：TP4 H100（BF16 權重 141 GB 需要至少 2 卡，TP4 是常見配置）。prefill 計算量兩項（ch03）：\n\n- 線性項（權重相關）：2 × 70e9 × 32,768 ≈ **4.59 PFLOP**\n- attention 項：4 × n² × d_model × n_layers（QKᵀ 與 ×V 各佔一半）= 4 × (32,768)² × 8,192 × 80 ≈ 2.81 PFLOP，causal mask 折半 ≈ **1.41 PFLOP**\n\n合計約 **6.0 PFLOP**。TP4 H100 的有效算力：單卡 dense BF16 989 TFLOPS，長 prefill 的 MFU 取 70%（ch06 用過同一假設）≈ 700 TFLOPS/卡，四卡 2.8 PFLOPS（忽略 TP 通訊損耗，實務再打九折）：\n\n```\n6.0 PFLOP ÷ 2.8 PFLOPS ≈ 2.1 s\n```\n\n**Step 4：對比。**\n\n| 方案 | 時間 | 佔重算的比例 |\n|---|---|---|\n| 重算 prefill | ~2,100 ms | 100% |\n| NVLink 搬運 | ~30 ms | **1.4%** |\n| IB 4-NIC 搬運 | ~67 ms | **3%** |\n| IB 1-NIC 搬運 | ~270 ms | 13% |\n| 100GbE 搬運 | ~1,100 ms | 52% |\n\n**Step 5：crossover point。** 把它一般化成一條公式。搬運划算的條件是：\n\n```\nKV_bytes / BW_effective < Prefill_FLOPs / F_effective\n→ BW_effective > KV_bytes × F_effective / Prefill_FLOPs\n```\n\n代入本題：BW > 10.74 GB ÷ 2.1 s ≈ **5.1 GB/s ≈ 41 Gb/s（有效）**。也可以用每 token 的視角驗算（兩邊的線性項都隨 token 數線性長，所以這個比值近乎與 context 長度無關）：每 token 搬 320 KB vs 每 token 重算 140 GFLOP ÷ 2.8 PFLOPS = 50 μs → 等效頻寬門檻 320 KB ÷ 50 μs = 6.4 GB/s，同一個量級。attention 的 O(n²) 項讓重算隨 context 變長越來越虧——context 越長，天平越偏向搬運。\n\n**結論與三個推論：**\n\n1. crossover 落在 **40–50 Gb/s 有效頻寬**——這不是「NVLink vs 重算」的選擇題，而是「資料中心級 RDMA 網路 vs 普通乙太網」的分界線。有 400G IB/RoCE，搬運比重算便宜 8–30 倍，DistServe 那句「開銷不足掛齒」成立；只有 100GbE，搬運只省一半，扣掉工程複雜度後接近白忙；25GbE 以下，重算直接獲勝，P/D 分離在物理上不成立。\n2. **FP8 KV cache（ch05）讓天平再偏一倍**：bytes 砍半，搬運時間砍半，crossover 門檻降到 ~20 Gb/s。\n3. 上表是「裸延遲」。加上 layer-wise overlap 後，暴露在 TTFT 上的搬運成本還能再壓——這就是為什麼 Mooncake/NIXL 都把串流重疊當成核心工程，而不是可有可無的優化。\n\n順帶解釋了異質硬體的思路（Splitwise 的遺產）：prefill 是 compute-bound，用算力強、HBM 不用大的卡（甚至上一代卡——它們的 FLOPS 沒老多少）；decode 是 memory-bound + 容量飢渴，用 HBM 大、頻寬高的卡（H200 對 H100 算力相同、頻寬 +43%，是天生的 decode 卡，ch02 講過）。兩個池子用不同卡，採購自由度多一維；代價是兩種機型的維運與容量規劃（ch13）各自獨立，複雜度也多一維。\n\n## xPyD：兩個池子的配比怎麼定\n\n業界用 **xPyD** 記號表示拓撲：x 個 prefill 實例配 y 個 decode 實例（例如 4P2D）。配比定錯的症狀很直白：P 池排隊 → TTFT 崩；D 池排隊 → ITL 崩、或 KV 池滿觸發跨節點版 preemption storm。配比由流量形態決定，框架是各算各的需求：\n\n- **P 池需求** = 入站 prompt token 速率 ÷ 單一 P 實例的 prefill 吞吐（compute-bound：有效 FLOPS ÷ 每 token 2×params FLOP）。注意要扣掉 prefix cache 命中的部分——命中的 token 不用算（ch05）。\n- **D 池需求** = max(輸出 token 速率 ÷ 單實例 decode 吞吐，併發序列數 × 每序列 KV ÷ 單實例 KV 池容量)——decode 受吞吐與 KV 容量雙重約束，取較緊的那個。\n\n快速 sketch 一個數字感（長文件 RAG：50 req/s、輸入 8k、輸出 500、無 cache 命中）：P 池需求 = 400k tok/s，單一 TP4-H100 實例約 20k tok/s（上例算過）→ 需要約 20 個 P 實例。D 池：穩態併發 ≈ 50 × (500 ÷ 30 tok/s) ≈ 830 條，每條 KV ≈ 8.5k × 320 KB ≈ 2.7 GB，單實例 KV 池約 160 GB → 容量約 60 條/實例 → 需要約 14 個 D 實例。配比 **約 10P:7D，重 prefill**。同樣的算法套到短問答（輸入 500/輸出 300）會得到 1P:2D 甚至「別分離了」；套到高 cache 命中的 agentic 流量（名目輸入巨大，但 90%+ 是命中的 prefix），有效 prefill 需求暴跌，又是另一個形狀。這個推演的完整版是本章 Lab 10-2。\n\n兩個工程提醒。第一，**配比是流量形態的函數，而流量形態會漂移**——產品上線 agentic 功能的那一天，你的 xPyD 就過時了。靜態配比要嘛靠 Dynamo planner 這類元件動態調整（它做吞吐建模並獨立擴縮兩池），要嘛在 K8s 上把 P/D 做成兩個獨立的 Deployment 各自 autoscale（llm-d 的做法，訊號設計見 ch13）。第二，池子的整數性：小流量下「1.3 個 P 實例」只能進位成 2P，利用率直接打七折——這是小規模不要分離的數學原因之一，結尾再回收。\n\n## KV-aware routing：有狀態的負載均衡\n\n現在換到路由層。就算你不做 P/D 分離，只要有超過一個 replica，這個問題就存在:**每個 replica 的 prefix cache 內容不同，而路由決定命中率**。round-robin 是 cache 的天敵——同一個 session 的第二輪被送到另一台，那台沒有它的 KV，整段歷史重新 prefill。llm-d 那個「57 倍 TTFT」的對照組就是 round-robin（專案方自報，但方向毫無疑問）。\n\n### 為什麼 session affinity 和 consistent hashing 都不夠\n\n你的第一個方案會是 **session affinity**：sticky 到上次服務的 replica。它能解多輪對話，但解不了三件事：(1) 跨 session 的共享 prefix——同一個 system prompt + 工具描述被一萬個不同使用者共享（agentic 流量的常態，ch17），affinity 看不見這層共享；(2) replica 的 cache 會被 evict，黏過去不保證還在；(3) 熱 session 黏死一台，負載失衡沒有出口。\n\n第二個方案是 **consistent hashing on prefix**：把 prompt 前 N 個 token hash 成 key，釘到固定 replica。比 affinity 進一步（共享 prefix 自動聚合），但還是錯在兩處:prefix 是**階層式**的——A 請求命中 B 請求的前半段也有價值，hash 一個定長前綴會把「部分命中」全部歸零；而且 hash 是無視負載的，熱 prefix（比如全公司共用的 RAG system prompt）會把一台 replica 打爆，其他閒置。\n\n業界收斂的答案：**為每個候選 replica 打分，在 cache 命中價值與負載之間做顯式的權衡**。這是一個 scoring 問題，不是 hashing 問題。三家的真實設計：\n\n### 三家路由器的 scoring 設計（2026-06）\n\n**llm-d inference scheduler**（基於 Gateway API Inference Extension 的 EPP，v0.7.1）：插件化的 filter → score → pick 管線，每個 scorer 對候選 pod 給 0–1 分，加權求和。官方範例配置：`prefix-cache-scorer` 權重 3（這個 pod 上已快取的 prompt 前綴比例，有兩種實作:用路由歷史近似，或訂閱引擎 KV events 做精確索引）、`kv-cache-utilization-scorer` 權重 2（KV 池水位，越空越高分）、`queue-scorer` 權重 2（等待佇列深度）。v0.7.1 新增 active-request-scorer、no-hit-lru-scorer 等插件。設計哲學:把權衡暴露成可配置的權重，讓平台團隊按流量調。\n\n**Dynamo KV router**：worker 透過 KVPublisher 廣播 KV cache 事件，router 端的 KVIndexer 維護一棵全域 radix tree（branch-sharded 並行結構）。路由用一條成本函數（官方文件，2026-06）：\n\n```\ncost = kv_overlap_score_weight × potential_prefill_blocks + potential_active_blocks\n```\n\n選 cost 最低的 worker。漂亮之處在於量綱統一:`potential_prefill_blocks` 是「去這台要重算多少 block 的 prefill」（cache 命中越多，這項越小），`potential_active_blocks` 是「這台已經背著多少 decode 工作」——兩項都以 KV block 計，本質上都是 GPU 時間。`kv_overlap_score_weight` 是唯一的旋鈕:prefill-heavy 流量調高（衝 TTFT），decode-heavy 調低（保 ITL、攤平負載）。\n\n**SGLang router / model gateway**：Rust 實作，router 在本地維護一棵**近似 radix tree**——不訂閱事件，而是用「我把什麼路由到哪」的歷史去模擬每個 worker 的 cache 內容，lazy 更新、零同步開銷。決策是雙模式:負載失衡超過閾值（`balance-abs-threshold`、`balance-rel-threshold`）時退化成最短佇列模式；否則走 cache-aware，prefix 匹配率超過 `cache-threshold`（預設 0.3）就選匹配最高的 worker。官方數字（v0.4 blog，專案方自報）:cache hit rate 20% → 75%，吞吐 1.9 倍。\n\n| | llm-d scheduler | Dynamo KV router | SGLang router |\n|---|---|---|---|\n| cache 視圖 | 近似（路由歷史）或精確（KV events）兩種插件 | 精確（KV events → 全域 radix tree） | 近似（本地模擬，零同步） |\n| 決策形式 | 多 scorer 加權和 | 單一成本函數 | 雙模式切換（閾值觸發） |\n| 權衡旋鈕 | 各 scorer 權重 | `kv-overlap-score-weight` | cache/balance 三個閾值 |\n| 站位 | K8s 標準路由層（IGW/EPP） | 框架自帶，引擎無關 | SGLang 生態自帶 |\n\n三家殊途同歸的共識值得劃線：**精確的 cache 視圖不是必需品**（SGLang 的近似樹效果就很好，llm-d 把兩種都做成插件讓你選），但**負載分量是必需品**——任何只看 cache 命中的路由器都會自毀，因為 cache affinity 的自然動力學是正回饋:命中越多的 replica 越被選中、cache 越熱、越被選中……直到它 KV 池滿、ITL 崩潰，而其他 replica 在旁邊閒著。scoring 函數裡的負載項就是這個正回饋的阻尼器。你在 ch06 看過引擎內的 preemption storm，這是它的叢集版本，只是這次點火的是路由器自己。\n\n最後把這層放回全局:在 P/D 分離的部署裡，路由是**兩段決策**——先選 prefill 實例（cache 命中主導，因為 prefill 最貴），再選 decode 實例（KV 容量與負載主導，還要考慮「離 prefill 節點的傳輸距離」）。Mooncake 的 Conductor、Dynamo 的 router + planner 做的就是這個聯合決策。路由器在 K8s 上怎麼部署、InferencePool 怎麼配，屬 ch12；這裡你要帶走的是決策邏輯本身。\n\n## 誠實的反面：什麼規模以下不要碰 P/D 分離\n\n這一節是本章的剎車。P/D 分離在 2026 年有強烈的「業界主旋律」光環——Mooncake 的數據、NVIDIA 的推銷、每場 conference 的 talk——但它的收益模型有明確的前提，前提不成立時它是純負債。我給你一張**全部要打勾才考慮**的清單：\n\n| # | 前提 | 檢驗方法 | 不滿足時 |\n|---|---|---|---|\n| 1 | **雙 SLO 都緊**：TTFT 與 ITL 同時有嚴格目標 | 看你的 SLO 文件——只有吞吐目標或單邊延遲目標? | 分離的全部收益（解耦兩個 SLO）不存在，colocated + chunked prefill 就是最優解 |\n| 2 | **單機優化已榨乾**：chunked prefill 調過 token budget、prefix caching 已開且命中率已優化、量化已上（ch05–ch08） | 拿 ch14 的方法 benchmark 過 | 你在用分散式複雜度掩蓋單機調參債，先還債 |\n| 3 | **規模夠大**：每個池子都能獨立餵飽——粗準則:總量 ≥ 16 卡、且 xPyD 推演出來的 x 和 y 都 ≥ 2 | 用本章 xPyD 框架算 | 池子整數性吃掉收益（1.3P 進位成 2P）；單池 batch 變淺，decode 吞吐反而掉。llm-d 的 P/D path 範例是 16×16 B200，不是 4 張卡 |\n| 4 | **網路在 crossover 右側**：節點間有 ≥400G RDMA（IB/RoCE），理想上 GPU 各配 NIC | 本章公式:BW_eff > KV_bytes × F_eff / Prefill_FLOPs，對你的模型算一次 | 100GbE 以下搬運稅吃掉大半收益；25GbE 以下物理上不成立，重算更快 |\n| 5 | **流量形態受益**：輸入顯著長於輸出（RAG、長文件、agentic 的未命中部分），或 prefill 干擾已被量測證實是 ITL 尾延遲主因 | ITL p99 尖刺與長 prompt 到達的相關性分析（ch06 教過） | 短問答流量下 prefill 本來就便宜，分離是搬石頭砸自己的 TTFT |\n| 6 | **運維面積養得起**：兩種 deployment、兩套容量模型、一個傳輸層、一個有狀態路由層，全部要有人 on-call | 誠實評估團隊 | 每個新元件都是新的故障面（見下節故障表），人不夠時複雜度殺死可用性 |\n\n我的判斷，直說:**單一 replica 到 8 卡之間的部署，P/D 分離不在你的選項清單上**；16–32 卡、雙緊 SLO、長輸入流量、有 RDMA，開始值得 PoC；到了三位數卡的規模、流量形態極端（Mooncake 那種長 context 主導的服務），它就不是選項而是必然。還有一個常被忽略的中間態:**先上 KV-aware routing，再考慮 P/D 分離**——路由層的收益（prefix cache 命中）不需要分離也能拿到，複雜度低一個量級，而且它本來就是分離架構的前置元件。llm-d 把 routing 列為 Path 1、P/D 列為 Path 2，順序就是這個意思。\n\n## 故障模式與防禦\n\nP/D 分離 + KV 路由比 colocated 部署多出三類故障面:傳輸層、配比、路由狀態。Murphy 清單：\n\n| 故障 | 症狀（你會看到什麼） | 觀測訊號 | 防禦 |\n|---|---|---|---|\n| KV 傳輸失敗/逾時（RDMA link flap、NIXL 後端錯誤、block 對位失敗） | 零星請求 TTFT 暴增或 5xx；請求卡在「prefill 已完成、decode 未接手」 | 傳輸層錯誤計數、P→D 交接延遲的 p99、孤兒 KV 的量 | 交接設逾時預算；fallback 路徑 = decode 端重算（prompt 必須隨請求傳遞，不能只傳 KV 引用）；傳輸重試要冪等 |\n| D 池 KV 池滿，P 池仍持續灌入 | decode preemption 飆升、ITL 全面惡化——ch06 的 preemption storm 跨節點版，但點火的是上游 | D 池 KV utilization、preemption rate、P→D 佇列深度 | D 端 admission control（KV 有位才接收）；P 池產出對 D 池容量做 backpressure；告警設在 KV 水位而非延遲（延遲是落後指標） |\n| xPyD 配比失配（流量形態漂移） | 一個池排長隊、另一個池利用率 30%；TTFT 或 ITL 單邊惡化 | 分池的佇列深度與利用率**必須分開看板**（ch14） | planner/獨立 autoscaling（ch13）；產品上新功能（如 agentic）前重跑配比推演 |\n| 路由器 cache 視圖漂移（KV events 丟失、近似樹與現實脫節） | 路由器以為命中、引擎實際 miss:路由命中預估與引擎 `prefix_cache_hit_rate` 背離 | 兩個指標的差值做對帳告警 | 索引 TTL/定期重建；事件流斷線時降級為純負載路由而非帶病決策 |\n| cache affinity 熱點 | 一台 replica ITL 崩、KV 滿，其他閒置；整體 p99 由熱點決定 | per-replica 負載方差、單 replica KV 水位 | scoring 的負載項權重調高；熱 prefix 識別後允許複製到多台（用一次重算換掉熱點） |\n| D 實例故障的爆炸半徑 | 該實例上所有 in-flight 串流全斷；若 P→D 綁定早、佇列深，殃及尚未開始的請求 | 實例存活 + in-flight 計數 | 交接綁定盡量晚（late binding）；斷流重試的成本意識（重試 = 全部重算，retry budget 見 ch15） |\n| 路由器本身成為瓶頸/單點 | 所有請求 TTFT 均勻墊高；路由決策延遲進入請求路徑 | 路由決策耗時的 histogram（它在 critical path 上!） | scoring 計算要 O(候選數)；radix tree 操作 sharding（Dynamo 的做法）；EPP 水平擴展(ch12) |\n\n共同主題:這套架構把「一個請求」變成「一次分散式交易」（prefill、傳輸、decode 三個參與者），你在 SQS pipeline 學到的所有紀律——冪等、逾時、補償路徑、backpressure——原封不動適用，只是補償動作從「重發訊息」變成「重算 2 秒的 prefill」，貴了很多，所以更要算著用。\n\n## 動手做\n\n### Lab 10-1 [M1]：用 llm-d-inference-sim 模擬 P/D 分離與路由差異\n\nllm-d-inference-sim 可以模擬 vLLM 的延遲特性（TTFT/ITL 可配置）而不需要 GPU。目標:親手量出「路由策略」對 TTFT 的影響。\n\n1. 起兩個 sim 實例當作兩個 replica（docker 跑兩個 port，設定相同的延遲參數、開啟模擬的 prefix cache 行為）。\n2. 寫一個 50 行的 Python 路由器（FastAPI，你在 ch04 寫過同款），實作三種策略:round-robin、session sticky（按 header hash）、prefix-aware（對 prompt 前綴做最長匹配記錄，模仿 SGLang 的近似樹，加上「佇列深度超過閾值就 fallback 最短佇列」）。\n3. 用 k6 打多輪對話形態的流量（同 session 重複前綴)，量三種策略的 TTFT p50/p99。\n4. **成功標準**:prefix-aware 的 TTFT p99 顯著優於 round-robin；能解釋為什麼 sticky 介於兩者之間；把負載閾值調到 0（純 cache affinity），觀察熱點形成——單一 replica 佇列爆掉，p99 反超 round-robin。親眼看到那個正回饋，比讀十遍文字有用。\n\n### Lab 10-2 [紙上推演]：為三種流量形態設計 xPyD 配比並辯護\n\n用本章框架，對三種流量各算一份配比（硬體統一假設 TP4 H100 實例，模型 Llama-3.3-70B，數字自訂但要寫明）：\n\n1. 短問答:輸入 500 / 輸出 300、200 req/s。\n2. 長文件 RAG:輸入 16k / 輸出 500、30 req/s、prefix cache 命中率 20%。\n3. Agentic:名目輸入 40k / 輸出 2k、20 req/s、prefix cache 命中率 90%（ch05 的 agentic 計算可複用）。\n\n**成功標準**:每種形態給出 xPyD（或「不要分離」的結論）與兩行辯護；agentic 那題要能說出「名目 prefill 需求與有效 prefill 需求差 10 倍」對配比的顛覆；短問答那題的正確答案是不分離——如果你算出來要分離，回去檢查 P 池需求。\n\n### Lab 10-3 [紙上推演]：對你自己的假想叢集算 crossover\n\n假設你只租得起 4×A100 80GB（NVLink 域內）+ 節點間 100GbE 的雲環境，模型換成 Llama-3.1-8B（每 token KV = 128 KiB，ch03 算過）。重走一遍 worked example 的五步:8k context 的 KV 多大、各路徑搬多久、重算多久、crossover 在哪。**成功標準**:得出「8B 模型 + 小 context 下重算門檻更低、搬運更不划算」的結論並能解釋為什麼（KV bytes/token 與 FLOP/token 的比值隨模型架構變，GQA 比例、層數都影響）；順手回答:如果換成 FP8 KV，結論翻轉嗎？\n\n## 這個領域往哪走\n\n兩個方向值得盯。第一，**NVLink 域的擴張正在改寫 crossover 的物理**:NVL72 把 72 張卡放進同一個 450 GB/s 級的域（ch02），Rubin 世代繼續加倍（2026 H2 起）——當「跨節點」搬 KV 也能走 NVLink 級頻寬，傳輸稅趨近於零，P/D 分離從「要精算的取捨」變成「近乎免費的排程自由度」，反對它的最強論點被硬體拆掉一半。第二，路由層的標準化:Gateway API Inference Extension 已 GA、llm-d/KServe/各家 gateway 都站上去（2026-06），scoring 演算法正在變成可插拔的商品——這對你的職涯訊號是:**理解 scoring 的設計空間比會配某一家的 YAML 值錢**。至於「KV cache 會不會徹底變成一個獨立儲存層、讓 P/D 分離退化成它的一個讀寫模式」，這是 ch17 的辯題。\n\n## 自我檢核\n\n1. prefill 與 decode 的資源畫像衝突具體指什麼？chunked prefill 為什麼是緩解不是根治？（兩個結構性天花板）\n2. 不看書，重算一遍:Llama-3.3-70B、32k context 的 KV 多大？走 400G IB 單 NIC 要多久？對比 TP4 H100 重算 prefill，結論是什麼？\n3. 寫出「搬 KV vs 重算 prefill」的 crossover 公式，並說出為什麼這個比值近乎與 context 長度無關、attention 的 O(n²) 項又怎麼打破這個無關性。\n4. xPyD 配比由哪兩個需求公式決定？prefix cache 命中率為什麼會顛覆配比？流量形態漂移時靠什麼機制調整？\n5. 為什麼 session affinity 和 consistent hashing 都不足以做 KV-aware routing？（三個與兩個理由）\n6. 寫出 Dynamo KV router 的成本函數，解釋兩項的量綱為什麼統一、唯一的旋鈕往哪邊調會發生什麼。\n7. 純 cache affinity 路由的正回饋失控是怎麼發生的？路由器用什麼當阻尼器？你會設什麼告警在它失控前抓到它？\n8. 面試官問:「我們有 8 張 H100 跑一個 70B 模型服務內部工具，要不要上 P/D 分離？」給出你的完整判斷過程（提示:六項前提清單，這個場景至少倒在三項上）。\n\n## 延伸閱讀\n\n- [DistServe: Disaggregating Prefill and Decoding for Goodput-optimized LLM Serving（OSDI 2024）](https://arxiv.org/abs/2401.09670) — P/D 分離的奠基論文，goodput 視角與 7.4 倍數字的出處，§3 的干擾分析值得精讀。\n- [Splitwise: Efficient Generative LLM Inference Using Phase Splitting（ISCA 2024）](https://arxiv.org/abs/2311.18677) — 用 Azure 生產 trace 論證分離與異質硬體，ISCA 最佳論文；「兩階段用不同卡」思路的源頭。\n- [Mooncake: A KVCache-centric Disaggregated Architecture for LLM Serving（FAST'25 / arXiv:2407.00079）](https://arxiv.org/abs/2407.00079) — 最完整的生產級 P/D 分離系統論文，Conductor 排程與 Transfer Engine 的設計細節都在這。\n- [NVIDIA Dynamo：KV Cache Routing 架構文件](https://github.com/ai-dynamo/dynamo/blob/main/docs/architecture/kv_cache_routing.md) — 成本函數、KVPublisher/KVIndexer 機制的一手來源，搭配 KV Router 調參指南讀。\n- [Intelligent Inference Scheduling with llm-d（llm-d blog）](https://llm-d.ai/blog/intelligent-inference-scheduling-with-llm-d) — EPP scorer 管線與權重設計的官方解說，本章 3/2/2 範例配置的出處。\n- [SGLang v0.4 release blog：Cache-Aware Load Balancer（LMSYS）](https://lmsys.org/blog/2024-12-04-sglang-v0-4/) — 近似 radix tree 路由器的設計與 3.8 倍命中率數據；證明「不精確的 cache 視圖也夠用」。\n- [NIXL（NVIDIA Inference Xfer Library,GitHub）](https://github.com/ai-dynamo/nixl) — 跨節點 KV 搬運的共同地基，README 的後端清單就是一張傳輸路徑地圖。\n- [Disaggregated Inference on AWS powered by llm-d（AWS blog）](https://aws.amazon.com/blogs/machine-learning/introducing-disaggregated-inference-on-aws-powered-by-llm-d/) — 雲商視角的 P/D 分離落地參考架構，看大廠怎麼包裝這套複雜度。\n"}, {"id": "ch11-kubernetes-for-gpus", "file": "ch11-kubernetes-for-gpus.md", "group": "Part IV — 平台工程", "title": "ch11 — Kubernetes 上的 GPU：排程、共享與節點生命週期", "md": "# ch11 — Kubernetes 上的 GPU：排程、共享與節點生命週期\n\n> **本章解決什麼問題**：Part II 與 Part III 講完了引擎與多卡推論本身，從本章開始進入平台層。第一個問題就是地基：K8s 怎麼把 GPU 當資源管？這是你既有 K8s 功力的主場延伸——但 GPU 把你熟悉的資源模型撕開了一個洞：它是整數、不可超賣、不可分割、排程器看不見它的內部。本章講清楚這個洞（device plugin 模型）、業界怎麼繞（time-slicing/MPS/MIG）、以及 2026 年正在發生的根本修復（DRA）。後面 ch12 的推論平台、ch13 的 autoscaling 都蓋在這層地基上。\n\n## 從你已知的出發\n\n你在 EKS 上管過生產叢集，所以這些直覺你都有：requests/limits 是 cgroup 層的流量管制，CPU 可以超賣（requests 總和 > 節點容量，靠 throttling 兜底）、memory 超賣會換來 OOMKill、scheduler 用 requests 做 bin-packing 決策。整套哲學的前提是：**資源是連續可分割的流量**，內核可以在毫秒尺度上對它做時間切片與仲裁。\n\nGPU 不是流量，是**一台完整的計算機**（ch02 講過：自己的記憶體、自己的排程器、自己的故障模式）。把一張 GPU 交給容器，比較像把整台實體機借出去，而不是分配 0.5 個 CPU。所以 K8s 對 GPU 的資源語意退化回整數：`nvidia.com/gpu: 1`，要嘛整張給你，要嘛沒有。沒有 throttling、沒有超賣、沒有「先給你用、忙起來再搶回來」。你過去十年累積的「資源利用率靠超賣堆上去」的直覺，在這裡第一步就失效。\n\n第二個橋接：你寫過 idempotent consumer——從 SQS 拉訊息、對照目標狀態、把現實收斂過去。K8s operator 的 reconcile loop 是同一個模式（ch04 講過），而本章你會看到一整個 operator 軍團（GPU Operator、MIG Manager、Kueue、LWS controller）各自 reconcile 一小塊 GPU 現實。讀它們的故障，就是讀「reconcile 卡住」的各種姿勢。\n\n第三個：你在遊戲後端見過 connection pool 被慢查詢吃光的事故——資源是整數槽位、被佔住就是佔住、後面的請求只能排隊。GPU 叢集的日常就是這個事故的放大版：64 個槽位、每個槽位被佔住的時間以小時或天計、而且「釋放一個槽位」可能意味著殺掉一個跑了三天的訓練 job。排程、配額、搶占在這個物理下全部要重新校準——這正是全書主軸三：分散式直覺成立，物理常數變了。\n\n## GPU 資源模型：為什麼 `nvidia.com/gpu` 是個不透明整數\n\n### Device plugin 機制一頁解剖\n\nK8s 本身不認識 GPU。認識 GPU 的是 **device plugin**：一個跑在每個 GPU 節點上的 DaemonSet，透過 Unix socket（`/var/lib/kubelet/device-plugins/`）向 kubelet 註冊，實作兩個核心 gRPC 介面：\n\n```text\nListAndWatch()  → 回報裝置 ID 清單與健康狀態（streaming）\n                  kubelet 據此向 API server 宣告 capacity: nvidia.com/gpu: 8\nAllocate(IDs)   → Pod 排定後，kubelet 要求 plugin 準備指定裝置\n                  plugin 回傳要注入容器的 env（NVIDIA_VISIBLE_DEVICES）、\n                  device nodes、mounts\n```\n\n注意責任切分，這是理解一切限制的鑰匙：\n\n- **Scheduler 只會數數**。它看到的是「這個節點宣告 8 個 `nvidia.com/gpu`、已用 5 個」，做整數加減法。它不知道那是 H100 還是 T4、不知道哪幾張在同一個 NVLink domain、不知道哪張快壞了。\n- **挑哪一張卡是 kubelet（device manager）在節點上的本地決策**，scheduler 完全不參與。device plugin 能做的拓撲最佳化（盡量挑同一 PCIe switch 下的卡）只是 best-effort 的本地啟發式。\n- **Extended resource 的語意是硬性整數**：requests 必須等於 limits（其實你只能寫 limits），不可超賣、不可寫 0.5。\n\n### 根本限制清單\n\n把 device plugin 模型的天花板列清楚，等一下 DRA 每一條都要對著解：\n\n| # | 限制 | 後果 |\n|---|------|------|\n| 1 | 資源是不透明整數 | 無法表達「要一張 ≥40GB 的卡」；裝置屬性只能靠 node label（GFD）+ nodeSelector 在**節點層級**近似，同節點異質 GPU 幾乎無法表達 |\n| 2 | 不可分割、不可超賣 | 一個 notebook 占一整張 H100；利用率問題只能靠外掛 hack（下一節三件套） |\n| 3 | Scheduler 看不到裝置 | 無法做裝置層級拓撲決策（「給我同一 NVLink domain 的 4 張」做不到）；跨節點的 rack/IB locality 更不用說 |\n| 4 | 裝置不能跨 Pod 共享 | 一張卡一次配給一個容器，沒有「claim 由多個 Pod 共用」的一級語意 |\n| 5 | 健康語意貧乏 | 某張卡 unhealthy → capacity 整數減一，但哪張壞、為什麼壞、上面的 Pod 怎麼辦，全在 API 之外 |\n| 6 | 重新配置要翻桌 | 改 MIG 切法 = 清空節點上所有 GPU Pod、重設、重啟 plugin；不是宣告式操作 |\n\n對照你熟的 CPU/memory 模型，差異不是程度問題，是哲學問題：CPU/memory 是 kernel 仲裁的連續流量，GPU 是使用者空間裡一台被整台出借的機器。K8s 1.0 時代的 extended resource API 從來沒打算承載後者，業界硬是用了八年。\n\n## NVIDIA GPU Operator：全家桶解剖\n\n裸裝一個 GPU 節點要手動對齊五、六層元件，GPU Operator 把它們全部 operator 化。你需要知道每個元件做什麼，因為**它們壞掉的症狀完全不同**：\n\n| 元件 | 做什麼 | 壞了的典型症狀 |\n|------|--------|----------------|\n| **driver daemonset** | 以容器形式裝載 kernel driver（免烤進 AMI） | 節點上所有 CUDA 程式死亡；`nvidia-smi` 連不上 driver |\n| **container toolkit** | 配置 container runtime（注入 device nodes、driver libs） | Pod 起得來但容器內看不到 GPU：`Failed to initialize NVML` |\n| **device plugin** | 上一節講的，宣告與配置 `nvidia.com/gpu` | 節點 capacity 歸零 → 新 Pod 全部 Pending，但**既有 Pod 正常**（這個不對稱是診斷關鍵） |\n| **GFD（GPU Feature Discovery）** | 把 GPU 屬性打成 node label（`nvidia.com/gpu.product` 等） | nodeSelector 永遠匹配不到 → Pending；症狀跟缺卡很像但原因完全不同 |\n| **NFD（Node Feature Discovery）** | GFD 的前置，發現節點硬體特徵 | 同上游故障 |\n| **DCGM + DCGM-exporter** | GPU 健康與遙測 → Prometheus（ch14 主場） | 監控盲區：卡在壞你看不見 |\n| **MIG Manager** | 宣告式管理 MIG 切分（看 node label `nvidia.com/mig.config` 行動） | 改 profile 卡死在 pending：節點上還有 GPU Pod 沒清空 |\n| **validator** | 每個環節裝完後跑冒煙測試 | 它本身 CrashLoop 通常代表上面某層沒就位 |\n\n維運上最重要的一句話：**這是一條串聯的依賴鏈**（driver → toolkit → plugin → GFD），鏈上任何一環的版本不相容都以「最下游的元件 CrashLoopBackOff」呈現。診斷永遠從鏈的上游開始查。\n\n另外，從 GPU Operator 近期版本開始，NVIDIA 的 DRA driver 也作為元件漸進整合進 chart（2026-06），這是下面 DRA 一節的伏筆。\n\n## 共享技術三件套：time-slicing、MPS、MIG\n\nDevice plugin 不可分割，但「一個 dev notebook 占一整張 H100」在財務上不可辯護（成本帳見 ch16）。業界的三條繞路，本質完全不同：\n\n| | **Time-slicing** | **MPS** | **MIG** |\n|---|---|---|---|\n| 本質 | 對 scheduler 謊報：一張卡宣告成 N 個 replicas，CUDA context 輪流跑 | NVIDIA 的多行程共享伺服器：多個 client 的 kernel **並行**共駐 | **硬體層分割**：SM、記憶體、L2、頻寬實體切開 |\n| 算力隔離 | 無（時間片輪轉，互相干擾） | 部分（可設每 client 的 SM 比例，但是軟性的） | 硬隔離（SM slice 專屬） |\n| 記憶體隔離 | **無**——一個 Pod OOM 或炸掉 CUDA context，同卡所有人陪葬 | 部分（Volta+ 有獨立位址空間、可設記憶體上限；但 fatal fault 仍可能拖垮整個 MPS server 上的所有 client） | 硬隔離（記憶體 slice 專屬、錯誤隔離到 instance） |\n| 粒度 | 任意 N（謊報幾個都行） | 任意比例 | 固定 profile 表（下表） |\n| 額外開銷 | context switch 開銷；延遲不可預測 | 低（kernel 真並行） | 近零，但切分本身有資源損耗（7 切只得 7×1g.10gb=70GB<80GB） |\n| 動態性 | 改 ConfigMap 重啟 plugin | 行程級 | 改切法要清空節點（A100/H100 世代）|\n| 適用 | dev/notebook、突發性小負載、demo | 推論小模型多副本、延遲敏感但信任同租戶 | **多租戶**、平台對外賣算力、SLA 場景 |\n| 反模式 | 任何生產 serving | 不互信的租戶 | 大模型（一個 instance 裝不下 70B）|\n\nH100 80GB 的 MIG profile 表（2026-06，依 NVIDIA MIG User Guide）：\n\n| Profile | SM 比例 | 記憶體 | 每卡最多幾個 |\n|---|---|---|---|\n| `1g.10gb` | 1/7 | ~10 GB | 7 |\n| `1g.20gb` | 1/7 | ~20 GB | 4 |\n| `2g.20gb` | 2/7 | ~20 GB | 3 |\n| `3g.40gb` | 3/7 | ~40 GB | 2 |\n| `4g.40gb` | 4/7 | ~40 GB | 1 |\n| `7g.80gb` | 7/7 | ~80 GB | 1 |\n\n兩個 LLM serving 視角的關鍵點，廠商文件不會幫你劃重點：\n\n1. **MIG 切的不只是容量，連 HBM 頻寬也跟著 memory slice 等比切**。ch03 證明過 decode 是 memory-bound，所以一個 `3g.40gb` instance 上的 8B 模型，decode 上限大約就是整卡的一半——不是「小模型用小切片就賺到」這麼單純，要回 roofline 算過才知道划不划算。\n2. **time-slicing 的危險在 LLM 場景被放大**：推論引擎（vLLM）預設會吃掉 `gpu-memory-utilization`（預設 0.90~0.92，隨版本演進，見 ch08）比例的整卡記憶體當 KV cache（ch05/ch08）。兩個 vLLM 共享一張 time-sliced 卡 = 兩個都以為自己擁有九成以上的記憶體 = 必然 OOM。time-slicing 只該出現在 dev namespace。\n\nK8s 介接方式：time-slicing 與 MPS 都是 device plugin 的 sharing config（ConfigMap）；MIG 則由 MIG Manager 看 node label 宣告式切分，device plugin 以兩種策略曝露——`single`（全節點同款切片，仍叫 `nvidia.com/gpu`）或 `mixed`（曝露 `nvidia.com/mig-3g.40gb` 這類獨立資源名）。`mixed` 靈活但會讓你的 quota 與排程邏輯多出 N 種資源名要管。\n\n```yaml\n# time-slicing 設定（示意）：把一張卡謊報成 4 個\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: time-slicing-config\ndata:\n  any: |-\n    version: v1\n    sharing:\n      timeSlicing:\n        resources:\n        - name: nvidia.com/gpu\n          replicas: 4\n```\n\n## DRA：把裝置變成排程器的一級公民\n\n這是本章在 2026 年的重點演進。**DRA（Dynamic Resource Allocation）核心 API 已在 K8s 1.34（2025-08）GA**（`resource.k8s.io/v1`），1.35 設立的 AI Conformance program 把 DRA 列為第一個 MUST 要求，1.36 持續擴充功能集；OpenShift 4.21 已 GA、GKE 已提供 DRA 裝置管理（2026-06）。方向已經沒有懸念：DRA 是 device plugin 的繼任者。\n\n### 四個物件、一個關鍵設計\n\nDRA 的物件模型借鏡了你最熟的 PV/PVC/StorageClass 三角，幾乎可以逐字對應：\n\n```\ndriver ──發布──► ResourceSlice（裝置庫存與屬性：UUID/型號/記憶體/拓撲/健康；≈ PV）\n                      ▲\n                      │ 讀庫存、用 CEL 評估\n                 Scheduler ──配置決策──► ResourceClaim（使用者的裝置請求；≈ PVC）\n                                             ▲      │\n                 spec.resources.claims 引用  │      │ 引用\n                                    Pod ─────┘      ▼\n                                       DeviceClass（管理員定義：分類與預設選擇器；≈ StorageClass）\n\n（ResourceClaimTemplate：模板物件，替每個 Pod 實例自動生成一份專屬的 ResourceClaim）\n```\n\n- **ResourceSlice**：driver 把每張卡的屬性發布成 API 物件——UUID、型號、記憶體、NVLink/PCIe 拓撲、健康狀態。裝置第一次在 K8s API 裡有了「長相」。\n- **DeviceClass**：管理員定義裝置類別與預設過濾條件。\n- **ResourceClaim / ResourceClaimTemplate**：workload 對裝置的請求，是一級物件，有獨立生命週期，**可以被多個容器、甚至多個 Pod 共享**。\n- **關鍵設計是 structured parameters**：claim 的選擇條件用 CEL 表達式寫在 API 物件裡，**scheduler 自己就能評估**，不需要在排程路徑上 round-trip 詢問 driver。這讓裝置配置決策從 kubelet 的本地黑箱，搬進了 scheduler 的全局視野。\n\n```yaml\n# DRA 請求骨架（resource.k8s.io/v1，2026-06；CEL 屬性名依 driver 而異，示意）\napiVersion: resource.k8s.io/v1\nkind: ResourceClaimTemplate\nmetadata:\n  name: two-h100-same-domain\nspec:\n  spec:\n    devices:\n      requests:\n      - name: gpus\n        exactly:\n          deviceClassName: gpu.nvidia.com\n          allocationMode: ExactCount\n          count: 2\n          selectors:\n          - cel:\n              expression: >-\n                device.attributes['gpu.nvidia.com'].productName.matches('H100') &&\n                device.capacity['gpu.nvidia.com'].memory.compareTo(quantity('79Gi')) >= 0\n---\napiVersion: v1\nkind: Pod\nmetadata:\n  name: tp2-worker\nspec:\n  resourceClaims:\n  - name: gpus\n    resourceClaimTemplateName: two-h100-same-domain\n  containers:\n  - name: vllm\n    image: vllm/vllm-openai\n    resources:\n      claims:\n      - name: gpus      # 不再是 nvidia.com/gpu: 2\n```\n\n### 逐條回收前面的限制清單\n\n| Device plugin 的限制 | DRA 怎麼解 |\n|---|---|\n| 1. 不透明整數 | ResourceSlice 曝露完整屬性，claim 用 CEL 按屬性選（「≥40GB 的任何卡」「只要 H100」），同節點異質 GPU 自然表達 |\n| 2. 不可分割 | partitionable devices 讓 MIG 切片成為可宣告的一級資源（動態切分，免翻桌）；consumable capacity 更進一步允許按量（如記憶體 GB）請求共享——兩者 2026-06 仍在 alpha/beta 演進中 |\n| 3. Scheduler 看不到裝置 | structured parameters 讓 scheduler 直接做裝置層級決策，「同一 NVLink domain 的 2 張」可以表達；多節點 NVLink（GB200 NVL72 的 IMEX）由 NVIDIA driver 的 **ComputeDomain** 物件表達 |\n| 4. 不能跨 Pod 共享 | ResourceClaim 是一級物件，多 Pod 可引用同一 claim |\n| 5. 健康語意貧乏 | 裝置健康進入 API（device taints 等機制演進中），壞卡可以被精確標記與排除 |\n| 6. 重新配置翻桌 | 配置是宣告式 claim 的滿足過程，driver 可動態建立 MIG instance 來滿足 claim |\n\n### 過渡期的誠實評估（2026-06）\n\n- **API 已穩，生態未滿**。NVIDIA 的 GPU DRA driver（已移交至 kubernetes-sigs，更名 `dra-driver-nvidia-gpu`）裡，ComputeDomain（多節點 NVLink）先一步達到正式支援——因為 GB200 NVL72 這種 rack-scale 機器（ch02）沒有 DRA 幾乎沒法在 K8s 上正確表達；單卡 GPU allocation plugin 較晚，v25.12 的 release notes 宣告其 GA，但截至我能確認的資訊（2026-06），Helm chart 的預設啟用狀態與文件描述仍在變動，部署前以 repo 當下的 README 為準。\n- **生產主流仍是 device plugin**。我的建議：新叢集規劃時把 DRA 當 12–24 個月內的必然，現在就避免把「`nvidia.com/gpu` 整數」假設焊死在你的平台 API 與 quota 工具裡；但今天的生產 serving 還是走 device plugin 這條人最多的路。\n- **Murphy 視角**：DRA 把配置決策搬進 scheduler，也把故障面搬了過去——以前查 kubelet 與 plugin 日誌，現在狀態分散在 ResourceSlice/ResourceClaim/scheduler events 三處；driver 與 K8s 版本的相容矩陣多了一個軸。新機制不會減少故障，只是換地方。\n\n## 排程器生態：default scheduler 之上還缺什麼\n\nDefault scheduler 做的是「一個 Pod 找一個節點」的單體決策。GPU 叢集還需要三種它不提供的東西：\n\n**1. 配額與佇列（誰可以用多少、超額了排隊）**——這是 **Kueue** 的領域。Kueue（v0.17.0，2026-03）不替換 scheduler，而是在 workload 進入排程前做 admission：\n\n- `ClusterQueue` 定義配額（`nominalQuota`），多個 ClusterQueue 組成 `cohort` 互相**借用**閒置配額（`borrowingLimit` 限制能多借多少、`lendingLimit` 保留底線不外借——兩者在 v0.17 達 stable）。\n- **搶占**：`reclaimWithinCohort` 讓配額擁有者把被借走的卡搶回來；`withinClusterQueue: LowerPriority` 處理隊內優先級。\n- **Gang admission（all-or-nothing）**：`waitForPodsReady` 確保一個多 Pod workload 要嘛全進、要嘛全退回佇列重排——這是防止下面講的 gang deadlock 的關鍵。\n- **Topology-Aware Scheduling（TAS）**：用 `kueue.x-k8s.io/podset-required-topology` annotation 要求整個 workload 落在同一拓撲域（同節點/同 rack），對接 ch09 講的「TP 不出 NVLink domain」物理。\n\n**2. Gang scheduling（一組 Pod 同生共死）**——為什麼必要：一個 TP8 推論 job 需要 8 卡。兩個這樣的 job 同時到達一個只剩 12 卡的叢集，default scheduler 逐 Pod 排程，完全可能各給 6 卡——兩個 job 都永遠湊不齊、誰也不放手。這是分散式系統教科書的 deadlock，發生在排程層。**Volcano** 是這個領域的元老（HPC 血統，gang/fair-share/隊列），在訓練場景仍常見；推論平台這邊，Kueue 的 gang admission + LWS（下節）是 2026 年 K8s 原生的主流組合。\n\n**3. 拓撲感知**——三個尺度：\n- 節點內：8 卡機上挑 4 張卡跑 TP4，挑同一 NVSwitch 平面 vs 跨 PCIe，效能差距可觀（ch09 的 all-reduce 數學）；device plugin 時代只能 best-effort，DRA 時代可表達。\n- 跨節點：PP/多節點 EP 的 worker 要落在同一 IB leaf switch 下；用 node label（rack/superpod topology label）+ TAS。\n- Rack-scale：NVL72 世代「72 卡一個 NVLink domain」直接改寫「節點」的定義，ComputeDomain 就是為此而生。\n\n### Bin-packing vs spread：碎片化是錢\n\n你的無狀態服務直覺是 spread（抗節點故障）。GPU 叢集常常要反過來：\n\n```text\n8 節點 × 8 卡，每節點被 1 個單卡 dev pod 占住（spread 的結果）：\n\nnode1 [X·······]  node2 [X·······]  ...  node8 [X·······]\n\n帳面：64 卡用了 8 張，「利用率 12%，還有 56 張可用」\n現實：一個 8 卡 gang job 永遠 Pending——沒有任何節點湊得出 8 張\n```\n\n這叫 **GPU 碎片化**：叢集有卡，但湊不出形狀。碎掉的卡是付了錢買不到產能的卡（成本帳見 ch16）。防禦三件組：\n\n1. **Bin-packing scoring**：把 scheduler 對 GPU 資源的評分策略改成 `MostAllocated`（塞滿一台再開下一台），犧牲一點故障域分散換完整節點的供給。\n2. **大小分池**：單卡的零碎負載（dev、小模型）與整機負載（TP8、訓練)分 node pool，互不污染。\n3. **Gang + 佇列**：湊不齊就排隊等，而不是先占住一部分卡釀 deadlock。\n\n```yaml\n# 第二 scheduler 的 bin-packing profile（示意）\napiVersion: kubescheduler.config.k8s.io/v1\nkind: KubeSchedulerConfiguration\nprofiles:\n- schedulerName: binpack-gpu\n  pluginConfig:\n  - name: NodeResourcesFit\n    args:\n      scoringStrategy:\n        type: MostAllocated\n        resources:\n        - name: nvidia.com/gpu\n          weight: 5\n        - name: cpu\n          weight: 1\n```\n\n## 多節點推論的部署原語：LWS\n\n一個 70B TP4 副本是「一個 Pod 用 4 卡」，Deployment 就夠。但 405B 或大 MoE 的一個「副本」橫跨多節點（ch09/ch10）——比如 2 節點 16 卡 PP2×TP8——這時 K8s 的內建 workload 物件全部不夠用：\n\n- Deployment：副本之間無關係，無法表達「這 2 個 Pod 是同一個模型實例」。\n- StatefulSet：有穩定身分，但沒有「leader + workers 成組」語意、沒有組級 gang 排程、沒有「一個成員死了整組重啟」的故障語意——而多節點推論一個 worker 掛掉，整個實例就廢了（NCCL 世界的連坐，ch15）。\n\n**LeaderWorkerSet（LWS，v0.8.0，2026-01）** 就是為此造的原語：把「1 leader + N workers」當成一個複製單位，提供組級的啟動順序（leader 先起、把位址注入 workers）、組級重啟、配合 Kueue 做整組 gang admission（Kueue 已原生支援 LWS workload）。\n\n```yaml\n# LWS 骨架（示意）：每個副本 = 2 節點 × 8 卡\napiVersion: leaderworkerset.x-k8s.io/v1\nkind: LeaderWorkerSet\nmetadata:\n  name: llama-405b\nspec:\n  replicas: 2            # 2 個模型實例\n  leaderWorkerTemplate:\n    size: 2              # 每實例 1 leader + 1 worker\n    restartPolicy: RecreateGroupOnPodRestart   # 一人死全組重啟\n    leaderTemplate:\n      spec:\n        containers:\n        - name: vllm\n          resources: { limits: { nvidia.com/gpu: 8 } }\n    workerTemplate:\n      spec:\n        containers:\n        - name: vllm\n          resources: { limits: { nvidia.com/gpu: 8 } }\n```\n\nLWS 之上怎麼跑 vLLM/SGLang 的多節點 serving、router 怎麼接，是 ch12 的事。\n\n## 節點生命週期：GPU 節點是寵物，假裝不了牛\n\n**健康檢測迴路**。GPU 的硬體故障率遠高於 CPU（ch02 講過 Xid 家族與 MTBF 現實）。生產叢集的標準迴路是：DCGM 持續跑健康檢查 → 偵測到 ECC double-bit、Xid 79（fallen off the bus）等致命錯誤 → 自動 cordon + drain + 開 ticket。實作上是 DCGM-exporter 指標 + 告警驅動自動化，或 node-problem-detector 自訂 plugin；device plugin 也會把壞卡標 unhealthy 讓 capacity 減一，但如前述，這個訊號太粗，節點級的自動隔離還是要自己組。沒有這條迴路的下場：壞卡留在池子裡，工作負載排上去、CUDA error、重試、又排上去——你在 ch15 會看到這個模式的完整屍檢。\n\n**版本相容矩陣**。一個 GPU 節點上至少四層要對齊：kernel driver ↔ CUDA runtime（容器內）↔ NCCL ↔ 框架（PyTorch/vLLM）。driver 是節點級單例、其他三層是 workload 級，這個不對稱是維運地獄的根源：升級 driver 是全節點事件（驅動換掉，跑著的 CUDA 程式全部報廢），而不同團隊的 image 各自鎖著不同的 CUDA 版本。CUDA 的 minor version compatibility 給了一些緩衝（新 driver 跑舊 CUDA runtime 通常可以），但反向不行。紀律：driver 版本當成基礎設施規格管理（IaC 釘版本、canary node pool 先升、相容矩陣進 CI 檢查），永遠不讓「自動升級」碰 GPU 節點。\n\n**Node pool 升級策略**。GPU 節點的 drain 比你習慣的貴兩個數量級：上面跑的可能是分鐘級的 streaming 請求（drain 預算要照 p99.9 請求時長設計，ch15 有完整數學）、或是殺了就損失數小時進度的訓練 job。可行做法：surge 升級（先擴後縮，但 GPU 節點貴且常常缺貨，surge 容量不一定租得到）、按 node pool 分批、配合 Kueue 把 batch 負載 requeue 到別處。「GPU 節點當牛養」是 2026 年仍未實現的理想，承認它們是寵物，把照顧流程自動化，比假裝它們是牛實際。\n\n## Worked example：64 卡叢集的三租戶配額設計\n\n**場景**：8 節點 × 8 H100（節點內 NVLink，跨節點 IB）。三個租戶：\n\n- **team-chat**（產品）：70B FP8、TP4 副本（每副本 4 卡）。穩態 5 副本 = 20 卡，尖峰 6 副本 = 24 卡。\n- **team-api**（產品）：8B 單卡副本 × 12 穩態，尖峰 16；外加 embedding 服務。\n- **research**：訓練與評估 batch job，形狀從單卡到 8 卡 gang 不等，吞吐導向，可被搶占。\n\n**配額分配**：team-chat nominal 24、team-api nominal 16、research nominal 24，合計 64。設計原則：\n\n1. **產品隊的 nominal 按尖峰配**，不是穩態——GPU 沒有超賣兜底，尖峰借不到就是 SLO 事故（autoscaling 的訊號與時序見 ch13）。\n2. **產品隊穩態用不滿的部分（chat 閒 4 卡、api 閒 4 卡）就是 research 夜間的金礦**：research 可借到 48 卡（nominal 24 + borrowingLimit 24）。\n3. **借來的卡是有條件的**：產品隊配 `reclaimWithinCohort: Any`，流量回來時無條件搶回；research 配 `reclaimWithinCohort: Never`——只當債務人，不當搶匪。\n4. **research 保底**：`lendingLimit: 16` 保證自己手上永遠留 8 卡做不可中斷的實驗。\n\n優先級三層：`prod-critical`（1000）> `prod-batch`（500）> `research-default`（100）。搶占順序由低往高倒著死。\n\nYAML 骨架（Kueue v1beta1；註：上游已引入 v1beta2、v1beta1 走向棄用（2026-06），套用前先
