\n```python\n# main.py — OpenAI-compatible streaming proxy\n# 跑法：uv run uvicorn main:app --port 8000\nimport json\nimport logging\nimport time\nfrom contextlib import asynccontextmanager\n\nimport httpx\nfrom fastapi import FastAPI, Request\nfrom fastapi.responses import JSONResponse, StreamingResponse\nfrom pydantic import BaseModel, ConfigDict, Field\n\nUPSTREAM_BASE = \"http://localhost:11434/v1\"   # Ollama 的 OpenAI-compatible endpoint\nlogging.basicConfig(level=logging.INFO, format=\"%(asctime)s %(levelname)s %(message)s\")\nlog = logging.getLogger(\"proxy\")\n\n\nclass ChatMessage(BaseModel):\n    model_config = ConfigDict(extra=\"allow\")   # 多模態 content、tool_calls… 原樣放行\n    role: str\n    content: str | list | None = None\n\n\nclass ChatCompletionRequest(BaseModel):\n    # proxy 的驗證哲學：只驗自己要用的欄位，其餘全部放行。\n    # pydantic 預設 extra=\"ignore\" 會「默默丟掉」不認識的欄位——\n    # 對一個 proxy 來說，這等於上游每加一個新參數你就吃掉一個，是資料遺失 bug。\n    model_config = ConfigDict(extra=\"allow\")\n    model: str\n    messages: list[ChatMessage] = Field(min_length=1)\n    stream: bool = False\n\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    # 全服務共用一個 AsyncClient：連線池 + keep-alive（對照上一節的坑 (6)）\n    app.state.client = httpx.AsyncClient(\n        base_url=UPSTREAM_BASE,\n        timeout=httpx.Timeout(connect=5.0, write=10.0, pool=5.0, read=300.0),\n        # read=300s 不是拍腦袋：streaming 的 read timeout 管的是「兩個 chunk 之間」\n        # 的最大間隔。一般 ITL 遠小於 1s，但 reasoning 模型可能長時間停頓，\n        # 這個值要照你上游的 ITL p99.9 設（見 ch14）。\n        limits=httpx.Limits(max_connections=100, max_keepalive_connections=20),\n    )\n    yield\n    await app.state.client.aclose()\n\n\napp = FastAPI(lifespan=lifespan)\n\n\ndef error_json(status: int, message: str) -> JSONResponse:\n    # 維持 OpenAI 錯誤格式，下游 SDK 才解析得了\n    return JSONResponse(\n        {\"error\": {\"message\": message, \"type\": \"proxy_error\"}}, status_code=status\n    )\n\n\n@app.post(\"/v1/chat/completions\")\nasync def chat_completions(body: ChatCompletionRequest, request: Request):\n    client: httpx.AsyncClient = request.app.state.client\n    payload = body.model_dump(exclude_none=True)   # extra=\"allow\" 的欄位也會一起 dump\n\n    if not body.stream:  # ---- 非串流：單純的請求轉發 ----\n        try:\n            res = await client.post(\"/chat/completions\", json=payload)\n        except httpx.TimeoutException:\n            return error_json(504, \"upstream timeout\")\n        except httpx.TransportError as exc:\n            return error_json(502, f\"upstream unreachable: {exc}\")\n        return JSONResponse(res.json(), status_code=res.status_code)\n\n    # ---- 串流：async generator 轉發 SSE ----\n    async def relay():\n        start = time.perf_counter()\n        ttft_logged = False\n        try:\n            async with client.stream(\"POST\", \"/chat/completions\", json=payload) as up:\n                if up.status_code != 200:\n                    # 我們已對下游送出 200 + SSE header，HTTP 狀態碼追不回來了，\n                    # 只能用 SSE event 回報錯誤——這是 streaming 協定的固有限制。\n                    detail = (await up.aread()).decode(errors=\"replace\")\n                    yield f'data: {json.dumps({\"error\": {\"message\": detail}})}\\n\\n'\n                    return\n                async for line in up.aiter_lines():\n                    if not ttft_logged and line.startswith(\"data:\"):\n                        log.info(\"TTFT %.0f ms\", (time.perf_counter() - start) * 1e3)\n                        ttft_logged = True\n                    yield line + \"\\n\"   # aiter_lines 連空行都會吐，補回 \\n 即還原 SSE 框架\n        except httpx.TimeoutException:\n            yield 'data: {\"error\": {\"message\": \"upstream stalled (read timeout)\"}}\\n\\n'\n        finally:\n            # 下游斷線時，Starlette 會對這個 generator 注入取消；\n            # async with 保證上游連線一定被關閉——不關，上游就會繼續白算 token（token 是錢）。\n            log.info(\"stream closed after %.1f s\", time.perf_counter() - start)\n\n    return StreamingResponse(\n        relay(),\n        media_type=\"text/event-stream\",\n        headers={\"Cache-Control\": \"no-cache\", \"X-Accel-Buffering\": \"no\"},\n        # X-Accel-Buffering: no → 告訴 nginx 類反向代理不要 buffer，\n        # 否則你的 streaming 會被攢成一大包再吐出來，TTFT 直接報廢。\n    )\n\n\n@app.get(\"/healthz\")\nasync def healthz():\n    return {\"status\": \"ok\"}\n```\n\n驗證（先 `ollama pull` 一個小模型，把 `model` 換成你 `ollama list` 裡有的名字）：\n\n```bash\nuv run uvicorn main:app --port 8000\ncurl -N http://localhost:8000/v1/chat/completions \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"model\": \"llama3.2\", \"stream\": true,\n       \"messages\": [{\"role\": \"user\", \"content\": \"用一句話解釋 KV cache\"}]}'\n```\n\n`-N` 關掉 curl 的 buffering，你應該看到 `data:` 事件逐塊吐出，proxy log 印出 TTFT。這 100 行包含了生產 proxy 的所有要素雛形：共用連線池、分層 timeout、串流中錯誤的協定限制、下游斷線時的上游清理、反向代理 buffering 的對抗。每一條都對應一種真實事故（見本章故障模式一節）。\n\n## PyTorch：讀碼能力，不是訓練能力\n\n你不需要會訓練模型。你需要的是打開 vLLM 的 model 程式碼時，能看懂它在算什麼——因為你排查效能問題時，stack trace 的盡頭就是這些 forward 函式。\n\n### tensor 的四個屬性\n\ntensor 是 PyTorch 的唯一主角：一塊帶 metadata 的多維數值陣列，類比「有 shape 資訊的 TypedArray」。讀碼時你只需要追蹤它的四個屬性：\n\n- **shape**：維度大小，如 `[batch, seq_len, hidden]`。**讀 PyTorch 碼 = 追蹤 shape 的變化**，這是唯一主線。好的程式碼會用註解標 shape，vLLM 裡大量這種註解。\n- **dtype**：每個元素的數值格式（fp32/bf16/fp8…），直接決定記憶體用量與能用哪種 tensor core（ch02）。\n- **device**：`cpu`、`cuda:0`、Apple Silicon 上是 `mps`。`.to(device)` 是顯式的資料搬運——每次搬運都走 PCIe 或統一記憶體，是錢也是延遲（ch02）。看到 forward path 裡有 `.cpu()` 或 `.item()`，那是 GPU→CPU 的同步點，效能 bug 的常見藏身處。\n- **requires_grad**：是否記錄梯度。推論永遠不需要，所以推論碼一定包在 `torch.no_grad()` 或更激進的 `torch.inference_mode()` 裡——省掉 autograd 的簿記與中間結果的保留，少吃一大塊記憶體。看到它就知道「這是推論路徑」。\n\n### 30 行 attention：把 ch03 變成可執行的程式碼\n\nch03 講過 attention 的數學與 prefill/decode 的分野。以下 30 行在 M1 上可直接跑（`uv add torch`），每行對應 ch03 的一個概念。為了行數這裡是單一 head 群、且直接拿輸入當 Q/K/V（真實模型有 `W_q/W_k/W_v` 三個投影矩陣、GQA 的 KV heads 少於 Q heads——ch03），屬可運行的簡化版：\n\n```python\n# attention.py — ch03 的注意力機制，30 行 PyTorch\nimport torch\nimport torch.nn.functional as F\n\nB, H, D = 1, 8, 64        # batch、heads、head_dim（ch03：d_model = H × D）\ntorch.manual_seed(0)\n\ndef attention(q, k, v):\n    # q: [B, H, T_q, D]；k, v: [B, H, T_kv, D]\n    scores = q @ k.transpose(-2, -1) / D**0.5         # QK^T → [B, H, T_q, T_kv]，O(n²) 的來源\n    T_q, T_kv = scores.shape[-2], scores.shape[-1]\n    mask = torch.tril(torch.ones(T_q, T_kv, dtype=torch.bool), diagonal=T_kv - T_q)\n    scores = scores.masked_fill(~mask, float(\"-inf\")) # causal mask：只能看過去\n    return F.softmax(scores, dim=-1) @ v              # 注意力加權和 → [B, H, T_q, D]\n\n@torch.inference_mode()                               # 推論：關掉 autograd 簿記\ndef run():\n    # --- prefill：整段 prompt（16 個 token）一次算，矩陣大 → compute-bound（ch03）---\n    x = torch.randn(B, H, 16, D)\n    k_cache, v_cache = x.clone(), x.clone()           # KV cache 誕生：[B, H, 16, D]\n    out = attention(x, k_cache, v_cache)\n\n    # --- decode：每步只進 1 個新 token ---\n    for step in range(4):\n        x_new = torch.randn(B, H, 1, D)               # T_q = 1\n        k_cache = torch.cat([k_cache, x_new], dim=2)  # KV 線性成長：ch03 公式的「× tokens」\n        v_cache = torch.cat([v_cache, x_new], dim=2)\n        out = attention(x_new, k_cache, v_cache)      # 1 個 query 掃整個 cache → memory-bound\n        print(f\"step {step}: q={tuple(x_new.shape)} kv={tuple(k_cache.shape)} out={tuple(out.shape)}\")\n\nrun()\n```\n\n跑起來你會看到 decode 階段 `q` 永遠是 `[1, 8, 1, 64]`、`kv` 從 17 長到 20。這四行輸出就是 ch03 全部論證的可執行版本：decode 的計算量小（T_q=1）但每一步都要讀完整個 KV cache 與全部權重——arithmetic intensity 低，memory-bound（ch02 roofline）。另外注意 `torch.cat` 每步都在重新配置一塊更大的連續記憶體——這正是 naive KV 管理的浪費所在，PagedAttention 解的就是這個問題（見 ch05）。\n\n### 讀 vLLM 原始碼的實戰守則\n\n- **只追 shape**。看到 `view`、`reshape`、`transpose`、`einsum`，那是 shape 整形，不是數學；真正的計算只有矩陣乘與少數幾個算子。\n- **找 `forward`**。PyTorch 的 module 慣例：`__init__` 宣告權重、`forward` 是執行路徑。推論引擎裡你只關心 forward。\n- **跳過訓練碼**。看到 `loss`、`backward`、`optimizer` 直接略過，推論用不到。\n- **`@` 就是 matmul**。`a @ b` 是矩陣乘法運算子，跟你在 ch02 算 roofline 的 GEMM 是同一個東西。\n\n## Profiling Python：把你的方法論搬過來\n\n你靠 profiling 把 RDS CPU 尖峰降了 40%——先量測、找到真正的熱點、修正、再用數據證明。那套方法論（全書主軸之一）在 Python 一個字都不用改，換的只是工具。你用 Clinic.js/0x 做過的事——對線上服務取樣、看 flame graph、找熱點——在 Python 的對應物是 **py-spy**（2026-04 的 v0.4.2 支援到 CPython 3.14）。它是 Rust 寫的 sampling profiler，從 process 外部讀取目標的記憶體來重建 call stack，**不需改碼、不需重啟、overhead 極低**，production-safe：\n\n```bash\nuv tool install py-spy\npy-spy top --pid <PID>                  # 即時熱點，像 top\npy-spy record -o profile.svg --pid <PID> --duration 30   # 30 秒 flame graph\npy-spy dump --pid <PID>                 # 印出當下所有 thread 的 call stack\n```\n\n`py-spy dump` 值得特別記住：它是 Python 版的 `kill -3` thread dump。當你的 FastAPI 服務「活著但不回應」（event loop 被某個 blocking call 卡住），一發 dump 直接看到卡在哪一行——這是排查 async 服務假死的第一工具。\n\n`cProfile` 是標準庫的 deterministic profiler（逐呼叫記錄），overhead 大、會扭曲時間分布，適合離線跑腳本，不適合對線上服務。分工跟你熟的一樣：取樣式看生產、精確式看開發。\n\n邊界要認清：py-spy 只看得到 Python 層的 stack。一旦時間花在 torch 的 C++/CUDA kernel 裡，py-spy 只會顯示卡在某個 Python 呼叫上，看不進去。GPU 側的 profiling 是另一套工具（torch profiler、Nsight Systems，見 ch07）。判斷準則：py-spy 負責回答「Python glue 層慢不慢」，GPU profiler 負責「kernel 慢不慢」。\n\n## Go：讀懂 K8s controller 的最短路徑\n\n### 為什麼 infra 控制面是 Go 的天下\n\nK8s 本身是 Go 寫的，整個 operator/controller 生態（client-go、controller-runtime）跟著是 Go；AI infra 的控制面元件——NVIDIA 的 device plugin 與 DRA driver、Kueue、llm-d 的 inference scheduler——清一色是 Go。原因務實：編譯成單一靜態 binary（container image 小、無 runtime 依賴）、goroutine 讓高併發的 watch/reconcile 寫起來像同步碼、加上 K8s 生態的重力。你不需要會寫 Go 服務，但讀不懂 Go 等於 K8s 生態的原始碼對你全部上鎖（ch11 會大量遇到）。\n\n### goroutine、channel 與你的 event loop 直覺\n\nNode 的併發模型：單執行緒 event loop + 非同步 I/O，併發靠「不阻塞」。Go 反過來：**寫阻塞式的同步碼，讓 runtime 去排程**。goroutine 是極輕量的綠色執行緒（初始 stack 約 2KB，可開百萬個），Go runtime 把它們 M:N 地排到 OS thread 上。所以 Go 沒有 async/await、沒有函式顏色問題——`http.Get()` 就是阻塞呼叫，阻塞的只是這條 goroutine，不是整個程式。\n\nchannel 用你的語言講就是「行程內的型別化 SQS」：goroutine 之間不共享記憶體溝通，而是透過 channel 傳訊息；`select` 陳述式同時等多個 channel，等同你同時 poll 多條佇列。`ctx context.Context` 出現在每個函式的第一個參數，它是 Go 的取消與逾時傳播機制——角色等同 `AbortSignal`，但慣例上無處不在。\n\n### 讀懂一個 reconcile loop\n\nK8s controller 的核心是你已經寫過的東西。你的 SQS idempotent consumer 是怎麼運作的？訊息觸發處理，但處理函式**不信任訊息內容**，而是去查當前實際狀態、對照期望狀態、補齊差距；重複投遞無害，因為操作冪等。controller 的 reconcile loop 一模一樣：event（資源變更）只是觸發器，reconcile 函式拿到的只有資源的名字，它自己去讀 desired state（spec）與 actual state（叢集現況），然後收斂差距。這叫 **level-triggered**（看狀態）而非 edge-triggered（看事件）——跟你做最終一致性結算 pipeline 的設計理由完全相同：事件會丟、會重複、會亂序，狀態才可靠。\n\n一個極簡 controller 的 reconcile（示意：節錄自 controller-runtime 風格的程式碼，省略 import 與註冊樣板）：\n\n```go\n// 假想 CRD：ModelServer，spec 裡宣告要跑的模型與副本數\nfunc (r *ModelServerReconciler) Reconcile(ctx context.Context, req ctrl.Request) (ctrl.Result, error) {\n    // req 只有 namespace/name——沒有「發生了什麼事」。這就是 level-triggered：\n    // 不管觸發原因是建立、修改還是 controller 重啟後的全量重放，處理邏輯都一樣。\n    var ms servingv1.ModelServer\n    if err := r.Get(ctx, req.NamespacedName, &ms); err != nil {\n        // 物件已被刪掉：不是錯誤，是「期望狀態 = 不存在」，收工。\n        return ctrl.Result{}, client.IgnoreNotFound(err)\n    }\n\n    desired := r.desiredDeployment(&ms)            // 從 spec 推導期望的 Deployment\n\n    var actual appsv1.Deployment\n    err := r.Get(ctx, client.ObjectKeyFromObject(desired), &actual)\n    if apierrors.IsNotFound(err) {\n        // actual 不存在 → 建立。冪等：若兩次 reconcile 撞在一起，\n        // 第二次 Create 會吃 AlreadyExists 錯誤、觸發 requeue，下一輪走更新路徑。\n        return ctrl.Result{}, r.Create(ctx, desired)\n    }\n    if err != nil {\n        return ctrl.Result{}, err                  // 回傳 error → 自動指數退避重排\n        //（≈ SQS 的 visibility timeout 到期重新投遞 + backoff）\n    }\n\n    if *actual.Spec.Replicas != *desired.Spec.Replicas {\n        actual.Spec.Replicas = desired.Spec.Replicas\n        if err := r.Update(ctx, &actual); err != nil {\n            return ctrl.Result{}, err              // 衝突（resourceVersion 過期）也走這裡：\n        }                                          // 樂觀鎖失敗就重來，跟你處理 DB 衝突一樣\n    }\n    return ctrl.Result{RequeueAfter: 5 * time.Minute}, nil\n    // 即使沒有 event 也定期再對帳——對抗 drift 的最後防線\n}\n```\n\n讀懂這 30 行，ch11 的 device plugin、Kueue、llm-d EPP 的原始碼對你就只剩領域知識的問題，沒有語言問題。\n\n### 讀 Go 的五條速成規則\n\n1. **大寫開頭 = exported（public），小寫 = package 私有**。沒有 `public/private` 關鍵字。\n2. **`if err != nil` 不是噪音，是控制流**。Go 沒有 exception，錯誤是回傳值；每個 `if err != nil` 都是一個顯式的失敗路徑——讀碼時這些分支就是你要的故障行為地圖。\n3. **`defer` ≈ `finally`**，註冊在函式返回時執行，慣用於釋放鎖與關閉資源。\n4. **struct embedding ≈ mixin**：struct 裡只寫型別不寫欄位名，等於把那個型別的方法「攤平」進來。K8s API 型別大量使用（`metav1.ObjectMeta` 無處不在）。\n5. **指標只管「共享與否」**：`*T` 能改到原值、`T` 是複本；沒有指標運算，不用怕。\n\n## CUDA 生態：名詞表與消歧義\n\n先說結論：AI infra 工程師 95% 的時間**不寫** CUDA，但每天**讀**它——讀 stack trace、讀版本相容矩陣、讀「為什麼裝不起來」。這張表的目的是讓每個名詞在你腦中有正確的層級定位：\n\n| 名詞 | 它是什麼 | 解什麼系統問題 | 你什麼時候碰到 |\n|---|---|---|---|\n| **CUDA**（driver + toolkit + runtime） | GPU 的「作業系統 + 編譯工具鏈」 | 讓一般程式能對 GPU 提交工作 | 天天。裝環境時的版本地獄：**kernel driver 與 CUDA toolkit 是兩個東西、各有版本**，driver 向後相容舊 toolkit，反之不行 |\n| **nvcc / PTX / SASS** | CUDA 編譯器／中間表示／實際機器碼 | 同一份 kernel 跨 GPU 世代分發 | 看到 `no kernel image is available for execution on the device` ＝ 這個 wheel 沒帶你這張卡的架構編譯產物 |\n| **cuBLAS / cuBLASLt** | NVIDIA 官方 GEMM（矩陣乘）庫 | 讓矩陣乘逼近硬體峰值（ch02 roofline 的「屋頂」） | LLM 推論的算力大頭。stack trace 裡的 `CUBLAS_STATUS_*` 錯誤 |\n| **cuDNN** | NN 原語庫（卷積、normalization 等） | 深度學習常用算子的官方最佳化 | LLM 時代重要性下降（attention 另有專門 kernel），但 PyTorch 仍相依，裝錯版本照樣炸 |\n| **CUTLASS** | C++ template 的 GEMM 建構庫 | 讓人組裝客製 GEMM（如 FP8/FP4 混精度） | 讀 vLLM 的量化 kernel 原始碼時（ch07） |\n| **NCCL** | 多 GPU 集合通訊庫（all-reduce 等） | 多卡之間高效交換資料 | 多卡部署的一切（機制見 ch09；它 hang 起來的痛見 ch15） |\n| **Triton（語言）** | OpenAI 開源的 Python DSL，寫 GPU kernel 不用碰 C++（2026-05 時點為 3.7 系列） | 把「寫高效 kernel」的門檻從 CUDA C++ 降到 Python | `torch.compile` 預設把計算圖 lower 成 Triton kernel；vLLM 大量 kernel 以 Triton 寫成。讀引擎原始碼必遇 |\n\n**消歧義，這題面試會考**：**Triton 語言**（OpenAI 的 GPU kernel DSL，`triton-lang`）與 **NVIDIA Triton Inference Server**（NVIDIA 的通用模型 serving 伺服器）**完全無關，只是撞名**。前者是寫 kernel 的工具，活躍且是 PyTorch 編譯棧的預設後端；後者是前 LLM 時代的 serving 標準（TensorFlow/ONNX/TensorRT 模型的通用託管），在 LLM serving 場景 NVIDIA 已把主推位置交給 Dynamo（見 ch10/ch12）。看 JD 或文章時用上下文判斷：講 kernel、跟 PyTorch 並列的是語言；講 deployment、跟 serving 並列的是伺服器。\n\n版本相容矩陣的現實，用一條鏈記住：**GPU 架構 ← driver ← CUDA toolkit ← PyTorch build ← vLLM release**。每一環都有最低版本要求，PyTorch 的 wheel 名稱裡的 `cu130` 就是「以 CUDA 13.0 編譯」（PyTorch 2.12，2026-05 時點的當前版，預設 CUDA 13.0）。環境炸掉時，先對這條鏈逐環比對，比讀任何錯誤訊息都快。\n\n## 故障模式與防禦\n\n本章的工具在生產環境怎麼壞、長什麼樣、怎麼防——這張表值得貼在桌前：\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| 在 `async def` 裡呼叫 blocking I/O（`requests`、`time.sleep`、大檔同步讀） | **所有** in-flight SSE stream 同時凍結，ITL 集體 spike，然後同時恢復——鋸齒狀延遲 | `py-spy dump` 看 event loop 所在 thread 卡在哪一行 | 只用 async 函式庫；真要跑 blocking 工作丟 `asyncio.to_thread()`；CI 加 lint 規則禁 import requests |\n| 忘記 `await` coroutine | 邏輯靜默未執行；log 出現 `coroutine ... was never awaited` | 蒐集 RuntimeWarning 進日誌管線並告警 | pyright/mypy 會抓多數案例——這就是 CI 型別檢查不可省的理由 |\n| 每請求新建 `httpx.AsyncClient` | 無 keep-alive、TLS 重建，p50 多幾十 ms，上游連線數爆炸 | 上游看到大量短命連線 | client 放 lifespan，全服務共用 |\n| 上游 hang 而無 read timeout | 連線池被殭屍請求佔滿 → 池耗盡 → 新請求全部排隊，服務「活著但全 timeout」 | pool 等待時間飆升；`py-spy dump` 大量 stack 停在網路讀取 | 永遠顯式設四種 timeout（connect/read/write/pool）；streaming 的 read timeout 照 ITL p99.9 設 |\n| pydantic `extra=\"ignore\"`（預設）用在 proxy | 上游新增參數被默默吃掉，功能「壞得很安靜」 | 對比進出 payload 的欄位差 | proxy/gateway 一律 `extra=\"allow\"`；嚴格 schema 留給自己擁有的 API |\n| 反向代理 buffer SSE | 下游 TTFT 變成「整段生成時間」，streaming 名存實亡 | curl `-N` 直連 vs 過 proxy 對比 TTFT | `X-Accel-Buffering: no`、`Cache-Control: no-cache`，並驗證每一層代理設定 |\n| 下游斷線未清理上游 stream | 上游照算整段回應——燒的是 GPU 時間與錢 | 上游完成數 > 下游完成數 | 靠 `async with` 確保取消傳播；對照本章 proxy 的 `finally` |\n| CPU-bound 工作（超大 JSON、tokenize）佔住 event loop | 與 blocking I/O 同症狀，但 py-spy 顯示忙在計算而非等待 | `py-spy top` 熱點 | 搬進 process pool 或交給 Rust 系函式庫（GIL 一節的教訓） |\n| reconcile 不冪等 | 資源重複建立、或 controller 重啟後狀態錯亂 | 監看 reconcile error rate 與資源數量異常 | 永遠「讀 actual → 比對 desired → 收斂」，禁止「假設上次做到哪」 |\n| reconcile 無條件 requeue 0s | controller hot loop：CPU 滿載、API server 被打爆 | controller CPU 與 API server QPS | 回傳 error 讓框架做指數退避，不要自己 `RequeueAfter: 0` |\n| CUDA 版本鏈斷裂 | `import torch` 直接炸；或更糟——**靜默 fallback 到 CPU，慢 50 倍但不報錯** | 啟動時主動 assert `torch.cuda.is_available()` 並打印 device，進 readiness probe | 鎖死 base image 的 driver/toolkit/torch 版本三元組，升級走 canary（ch15） |\n\n注意一個共通模式：這個生態最危險的故障都是**靜默的**——coroutine 沒執行不報錯、欄位被吃掉不報錯、fallback 到 CPU 不報錯。防禦的核心是把「應該發生的事」變成顯式斷言與指標。\n\n## 動手做\n\n### Lab 4-1 [M1]：跑起 streaming proxy，並打出它的原形\n\n1. 裝 Ollama，`ollama pull llama3.2`（或任何 3B 級小模型）。\n2. 照本章程式碼建好 `llm-proxy` 專案，`uv run uvicorn main:app --port 8000`。\n3. 用 `curl -N` 驗證 streaming 與 `[DONE]` 結尾；確認 proxy log 有 TTFT。\n4. 用你熟的 k6 做併發測試。注意：k6 的 `http` 模組會 buffer 整個回應，**量不到 TTFT**，只能量 E2E——所以用 proxy 自己的 TTFT log 做延遲觀測，k6 負責製造併發（要在 k6 內量 SSE 需要社群 extension xk6-sse，狀態請自行查證）：\n\n```javascript\n// k6-stream.js — 製造併發，E2E 延遲 + 錯誤率\nimport http from \"k6/http\";\nexport const options = { vus: 20, duration: \"60s\" };\nexport default function () {\n  const res = http.post(\"http://localhost:8000/v1/chat/completions\",\n    JSON.stringify({ model: \"llama3.2\", stream: true,\n      messages: [{ role: \"user\", content: \"count to 20\" }] }),\n    { headers: { \"Content-Type\": \"application/json\" }, timeout: \"120s\" });\n  if (res.status !== 200) console.error(res.status, res.body.slice(0, 200));\n}\n```\n\n5. **成功標準**：20 VU 下 proxy 零 5xx；從 log 整理出 TTFT 的 p50/p95；能解釋 TTFT 隨併發上升的原因（M1 上的 Ollama 一次只能算一個 batch——這正是 ch06 continuous batching 要解的問題）。\n\n### Lab 4-2 [M1]：用 py-spy 抓出埋好的 bug\n\n1. 在 proxy 的 `chat_completions` 開頭埋一行 `time.sleep(0.2)`（模擬有人寫了 blocking 呼叫）。\n2. 重跑 k6，觀察吞吐崩跌、延遲鋸齒化。\n3. `py-spy record -o profile.svg --pid <uvicorn 的 PID> --duration 30`，打開 SVG。\n4. **成功標準**：在 flame graph 上指出 `time.sleep` 那條 frame 與它佔的時間比例；換成 `await asyncio.sleep(0.2)` 再測一次，解釋為什麼吞吐恢復了（event loop 不再被佔住），而單請求延遲仍多 200ms。\n\n### Lab 4-3 [紙上推演]：讀一段真實的推論碼\n\n打開 vLLM repo 裡任一個 model 實作（如 `vllm/model_executor/models/llama.py`），找到 attention 相關的 `forward`，對每個 tensor 寫下你推斷的 shape，與本章 30 行版本對照。**成功標準**：能指出 Q 與 KV 的 head 數在哪裡分岔（GQA，ch03），以及 KV cache 從哪個參數傳進來。\n\n## 這個領域往哪走\n\n短評三點。其一，free-threading 已是官方支援（2026-06），但 phase III（預設關 GIL）未到，C extension 生態的遷移以年計——推論引擎的 multiprocess 架構短期內不會因此改寫。其二，Python 工具鏈與效能關鍵路徑的「Rust 化」會繼續：uv/ruff/ty、pydantic-core、tokenizers 都是 Rust，連 vLLM 都出現實驗性 Rust frontend（2026-06 的 release notes，細節未驗證）；Python 越來越像「介面層語言」，這反而鞏固了它的地位。其三，語言分工（Python 介面、Go 控制面、CUDA/Triton kernel）在可見的未來是穩態——能在三者之間自由穿梭的工程師，正是 platform 與 inference 團隊之間最稀缺的接縫人才。這章教的「讀」的能力，貶值速度會比任何框架知識都慢。\n\n## 自我檢核\n\n1. GIL 鎖住的到底是什麼？為什麼 PyTorch 推論沒有被 GIL 卡死？2026 年 free-threading 的官方狀態是什麼、你會在生產服務用嗎，為什麼？\n2. FastAPI 的 `async def` 與 `def` handler 執行模型差在哪？「在 `async def` 裡呼叫 `requests.get`」的症狀長什麼樣，怎麼用 py-spy 證明？\n3. `asyncio.gather` 的預設行為與 `Promise.all`、`Promise.allSettled` 各差在哪？失敗時其餘 task 的命運是什麼？`TaskGroup` 改變了什麼？\n4. 你的 SSE proxy 在上游已開始 streaming 後才發生錯誤，為什麼不能回 HTTP 502？正確做法是什麼？\n5. 解釋 `q @ k.transpose(-2, -1)` 的輸出 shape，它對應 ch03 的什麼？為什麼 decode 階段 T_q 永遠是 1，這個事實如何證明 decode 是 memory-bound？\n6. `torch.inference_mode()` 替推論省下了什麼？讀 vLLM forward 路徑時，看到 `.item()` 或 `.cpu()` 為什麼要警覺？\n7. 為什麼 reconcile loop 必須冪等？level-triggered 與 edge-triggered 差在哪？對應到你寫過的 SQS consumer，「回傳 error 觸發 requeue」等於 SQS 的什麼機制？\n8. Triton 語言與 NVIDIA Triton Inference Server 各是什麼？vLLM 跟其中哪一個有關係、什麼關係？\n\n## 延伸閱讀\n\n- [Python Free-Threading HOWTO（官方）](https://docs.python.org/3/howto/free-threading-python.html) — free-threading 的權威現況說明，面試講 GIL 前先讀這份。\n- [uv 官方文件](https://docs.astral.sh/uv/) — 半小時讀完 project 管理那幾頁，你的 Python 工具鏈問題就解決了 90%。\n- [FastAPI：Concurrency and async / await](https://fastapi.tiangolo.com/async/) — 官方把 `def` vs `async def` 的執行模型講得最清楚的一篇。\n- [pydantic 官方文件](https://docs.pydantic.dev/latest/) — 重點讀 models 與 `model_config` 兩章，對照你的 class-validator 經驗。\n- [HTTPX：Async Support](https://www.python-httpx.org/async/) — 連線池、timeout 與 streaming API 的一手資料，本章 proxy 的所有設定出處。\n- [PyTorch 官方教學：Tensors](https://pytorch.org/tutorials/beginner/basics/tensorqs_tutorial.html) — 只需要讀 tensor 基礎這篇，訓練部分全部跳過。\n- [py-spy（GitHub）](https://github.com/benfred/py-spy) — README 即完整文件，重點看 `record`/`dump` 與「為什麼 production-safe」一節。\n- [A Tour of Go](https://go.dev/tour/) — 兩個晚上走完，達到本章要求的「能讀」門檻綽綽有餘。\n- [The Kubebuilder Book](https://book.kubebuilder.io/) — 想把 reconcile loop 從「能讀」升級到「能寫」時的標準教材，讀完 Tutorial 即可。\n- [Triton 語言官方文件](https://triton-lang.org/) — 不用會寫，讀 introduction 理解它在 kernel 生態的位置即可，ch07 會再遇到它。\n"}, {"id": "ch05-kv-cache", "file": "ch05-kv-cache.md", "group": "Part II — 推論引擎", "title": "ch05 — KV Cache 管理：推論引擎的記憶體子系統", "md": "# ch05 — KV Cache 管理：推論引擎的記憶體子系統\n\n> **本章解決什麼問題**：ch03 推導過 KV cache 的數學——它是推論狀態的本體，而且大得驚人（Llama-3.3-70B 每個 token 約 320 KB）。本章回答下一個問題：這塊記憶體在引擎裡到底怎麼管。PagedAttention 解決配置浪費、prefix caching 把重複的 prefill 變成查表、FP8 KV 把每 byte 榨出兩倍容量、分層 offloading 把快取延伸到 HBM 之外。這是現代推論引擎最核心的工程創新所在，也直接餵養後面的章節：ch06 的排程器搶的就是這塊記憶體，ch10 的路由器追的就是這份快取，ch13 的 autoscaler 看的就是它的利用率。\n\n## 從你已知的出發\n\n你管理過三種記憶體系統，這一章只是把它們搬到 GPU 上重演一遍：\n\n- **OS virtual memory paging**。你知道 process 看到的是連續的虛擬位址空間，實體記憶體卻是離散的 page frame，中間靠 page table 翻譯。PagedAttention 就是把這套機制原封不動抄給 KV cache：請求看到「邏輯上連續的 token 序列」，實體 HBM 上是散落的固定大小 block，中間有一張 block table。連 copy-on-write 都抄過來了。這個類比會貫穿全章。\n- **InnoDB buffer pool 與 Redis**。你調過 buffer pool 大小、看過 Redis 的 `maxmemory-policy allkeys-lru` 在記憶體吃緊時逐出冷資料。Prefix caching 的世界完全一樣：一個固定大小的快取池、一個 LRU 逐出策略、一個決定生死的指標叫命中率。差別只在這裡的「一筆快取」動輒幾百 MB，而且 miss 的代價不是一次 disk read，是幾秒鐘的 GPU 滿載重算。\n- **分層儲存**。你設計過「熱資料在 Redis、溫資料在 RDS、冷資料在 S3」的階層。KV offloading 是同一張圖：熱 KV 在 HBM（TB/s 級）、溫 KV 在 CPU RAM（PCIe，幾十 GB/s）、冷 KV 在 NVMe 或遠端儲存。每往下一層，容量乘一個數量級、頻寬除一個數量級。\n\n一個你需要先翻轉的直覺：在後端世界，快取是「錦上添花」——cache miss 了不過是慢一點。在 2026 年的 LLM serving 裡，KV cache 的管理品質直接決定一張卡能服務幾個使用者、TTFT 是 0.1 秒還是 2 秒、每百萬 token 的成本差幾倍。這呼應全書第一條主軸：**LLM serving 本質上是 memory 的生意**。\n\n## 問題定義：naive 配置會浪費 60–80% 的記憶體\n\n先回顧 ch03 的結論：KV cache 隨 context 線性成長，每個 token 的大小由模型結構決定（2 × layers × kv_heads × head_dim × bytes）。對 Llama-3.3-70B（GQA，80 層、8 個 KV head、head_dim 128、FP16）是每 token 約 320 KB；一條 32k context 的對話約 10.5 GB（見 ch03，全書反覆引用這組數字）。\n\nvLLM 之前的服務系統（FasterTransformer、Orca 世代）怎麼放這塊記憶體？最直觀的做法：**每個請求預先配置一塊連續的記憶體，大小按可能的最大長度算**。你一眼就能看出這會發生什麼——這正是「每個連線預先 malloc 最大 buffer」的老問題，只是單位從 KB 變成 GB。具體有三種浪費：\n\n1. **預留浪費（reservation）**：請求最終會長到多長，事先不知道，所以按 `max_seq_len`（例如 32k）整塊預留。實際對話平均只有 2k？剩下 30k token 的空間被佔住但永遠不會用到。\n2. **內部碎片（internal fragmentation）**：就算預留得準，從「現在的長度」到「最終長度」之間的空間在整個生命週期裡都是死的。\n3. **外部碎片（external fragmentation）**：不同請求的預留大小不一，配置器（類 buddy allocator）切出來的洞湊不成新請求要的連續大塊——你在長時間運行的 memcached 或自己寫的 slab 配置上看過一樣的病。\n\nvLLM 論文（SOSP 2023）量測既有系統的結果：**真正存放 token 狀態的記憶體只占 20–40%，其餘 60–80% 是上述三種浪費**。GPU 記憶體是整個系統最貴的資源（ch02），浪費 60–80% 等於把一張 H100 當三分之一張用。而 KV 容量直接決定 batch 能開多大，batch 又決定吞吐量（ch03/ch06）——所以這不是「省記憶體」的小優化，是吞吐量 2–4 倍的差距。\n\n## PagedAttention：幫 KV cache 蓋一套虛擬記憶體\n\nvLLM 的答案是把 OS 教科書第八章搬過來。對應關係精確到可以列表：\n\n| OS virtual memory | PagedAttention |\n|---|---|\n| Page（固定大小，如 4 KB） | KV block（固定 token 數，vLLM 預設 16 tokens/block） |\n| 虛擬位址空間 | 請求的邏輯 token 序列 |\n| Page frame（實體記憶體） | HBM 上預先切好的實體 block pool |\n| Page table | 每個請求一張 block table |\n| MMU 做位址翻譯 | attention kernel 在計算時按 block table 索引 |\n| Copy-on-write（fork） | 平行取樣 / beam search 的 KV 共享 |\n\n機制本身可以用三句話講完。啟動時，引擎把扣掉權重後的 HBM（由 `gpu-memory-utilization` 控制，見 ch08）切成幾萬個固定大小的實體 block。每個請求只持有一張 block table——邏輯 block 編號 → 實體 block 編號的映射——token 一邊生成、block 一邊按需配置，**邏輯上連續、實體上散落**。attention kernel 被改寫成能透過 block table 找到散落的 K/V 來算（這就是「PagedAttention」這個 kernel 名字的由來）。\n\n```\n請求 A 的邏輯視角:  [tok 0..15][tok 16..31][tok 32..47][tok 48..]\n                       │           │           │          │\nblock table (A):      #7          #21         #3         #44      ← 實體 block 編號\n                       ↓           ↓           ↓          ↓\nHBM 實體 block pool: [...][#3][...][#7][...][#21][...][#44][...]   ← 完全不連續\n```\n\n效果：預留浪費消失（用多少配多少）、外部碎片消失（所有 block 同樣大小，任何空 block 都能用）、內部碎片被壓到只剩**每個序列最後一個 block 的尾巴**——最多 `block_size − 1` 個 token，即 15 個 token、不到 5 MB。論文的數字：**浪費從 60–80% 降到 4% 以下**，吞吐量比當時的系統高 2–4 倍。今天（2026-06）所有主流引擎——vLLM、SGLang、TensorRT-LLM——都用某種形式的 paged KV，這已是業界地板而非賣點。\n\nBlock size 的取捨跟 OS page size 一樣：太小，block table 變長、kernel 索引開銷與管理 metadata 上升（極端是 SGLang 早期的 token-level、page size = 1）；太大，內部碎片與共享粒度變差（prefix 要對齊 block 邊界才能共享，見下節）。16–32 是目前的常見平衡點。\n\n**Copy-on-write 與 fork**。平行取樣（一個 prompt 出 n 個候選回答）和 beam search 的多條分支共享同一段 prompt 的 KV。PagedAttention 的做法與 OS `fork()` 一致：子序列複製 block table 而非資料，共享的實體 block 維護 reference count；哪條分支要寫入最後一個未滿的共享 block，才觸發那一個 block 的複製。論文量測：平行取樣省 6.1–9.8% 記憶體，beam search 省 37.6–55.2%。對 infra 工程師，這個機制更重要的遺產是 reference count ＋ block 共享的基礎設施——下一節的 prefix caching 完全建立在它之上。\n\n**類比的邊界**（面試會考）：這裡沒有 MMU 與 TLB，「位址翻譯」是 kernel 軟體查表，translation 的成本是真實存在的 kernel 開銷；沒有 demand paging——block 不會被透明地換出到磁碟再缺頁載回，swap 是排程器的顯式決策（preemption 時 recompute vs swap 的取捨，見 ch06）；也沒有硬體強制的隔離，block 歸屬全靠引擎的 bookkeeping，所以 reference count 的 bug 是真實的故障來源（見故障模式）。\n\n### vLLM V1 的 KV cache manager（2026-06 現況）\n\nvLLM 在 2025 年完成 V0→V1 的世代交替（v0.11 起 V1 是唯一引擎），KV cache manager 是重寫的核心之一。值得知道的工程細節：\n\n- 所有 `KVCacheBlock` 物件在啟動時一次性預配置，避免 Python 物件建立的執行期開銷；free list 用侵入式雙向鏈結串列實作，取塊、還塊都是 O(1)。\n- **Prefix caching 預設開啟**。V1 的設計讓它在命中率 0% 時吞吐量損失小於 1%，所以官方直接讓它常開（關閉要顯式傳 `--no-enable-prefix-caching`）。「快取功能便宜到可以永遠開著」是 V1 相對 V0 的重要轉變。\n- 逐出是 LRU：block 釋放後回到 free queue 尾端但**保留 hash 不清資料**，重新被配置時才真正失效——同一招你在「延遲刪除」的快取設計裡用過。\n- 後續版本持續往「KV 不只一種、一層」走：v0.21 引入 hybrid allocator（讓 full attention 與 sliding window / Mamba 類層共用記憶體池），v0.22 加入 multi-tier KV offloading 框架（2026-06，細節見 offloading 一節）。\n\n## Prefix caching：把重複的 prefill 變成查表\n\nPagedAttention 解決「怎麼放」，prefix caching 解決「怎麼重用」。觀察：KV cache 的內容只由**它之前的 token 序列**決定（ch03：每個 token 的 K/V 是該位置 hidden state 的函數，attention 只往前看）。所以兩個請求只要共享開頭的 token 序列——同一份 system prompt、同一段工具描述、同一場對話的前 N 輪——它們的 KV 在那段前綴上是**位元級相同**的，算一次就夠了。\n\ncache hit 的收益是直接跳過命中部分的 prefill。prefill 是 compute-bound（ch03），跳過它＝省下 GPU 滿載的計算時間＝TTFT 下降、整機 prefill 容量釋放。剩下的問題是工程：怎麼快速找到「可重用的前綴」？2026 年有兩個代表答案。\n\n### vLLM：hash-based block 重用\n\nvLLM 把問題化約到已有的 block 結構上：每個**寫滿的** block 計算一個 hash，hash 鏈式定義——`hash(父 block 的 hash, 本 block 的 16 個 token id, extra)`——`extra` 包含 LoRA adapter ID、多模態輸入的摘要、cache salt 等會改變 KV 語義的因素。全域維護一張 hash → 實體 block 的映射表；新請求進來，沿著它的 prompt 逐 block 算 hash 查表，連續命中多少個 block，prefill 就跳過多少。命中的 block 加 reference count，誰都不用、被 LRU 逐出後才回收。\n\n注意兩個含意：（1）共享粒度是 block——前綴要共享到第 16、32、48 個 token 這種邊界才算數，尾巴不滿一個 block 的部分重算；（2）hash 鏈保證「前綴」語義——第 N 個 block 命中蘊含前 N−1 個都命中，這就是它只能做 *prefix* caching 而非任意子串快取的原因（與 attention 的因果結構一致，不是實作偷懶）。\n\n### SGLang：RadixAttention\n\nSGLang（2312.07104）用的資料結構不一樣：把所有見過的 token 序列組織成一棵 **radix tree**（壓縮前綴樹），邊上是 token 片段、節點對應 KV tensor。新請求做的是樹上的最長前綴匹配，天然支援 token 級粒度的部分命中；逐出是遞迴的 LRU 葉節點淘汰。更重要的是它把**排程**也接上了快取：waiting queue 按「與樹的匹配長度」排序，讓共享前綴的請求湊在一起跑，主動把命中率推高——代價是犧牲 FCFS 的公平性，長尾請求可能被前綴熱門的請求插隊（starvation 風險，排程公平性的討論見 ch06）。2025–2026 SGLang 再疊上 HiCache（階層式 radix tree，把樹延伸到 CPU/儲存層）。\n\n### 對照與選型\n\n| | vLLM（hash-based） | SGLang（RadixAttention） |\n|---|---|---|\n| 資料結構 | 全域 hash table（block 粒度） | radix tree（token/page 粒度） |\n| 匹配粒度 | block 邊界（預設 16 tokens） | 最長前綴，粒度更細 |\n| 逐出 | free queue 順序的 LRU | 樹上葉節點 LRU |\n| 與排程的耦合 | 低（排程器另管，見 ch06） | 高（cache-aware 排序是設計核心） |\n| 嗅覺 | 把快取做成 allocator 的副作用，極簡 | 把快取當一級公民，換取更高命中率 |\n\n實務判斷：兩者在「大量請求共享長 system prompt」的主流場景下命中率相近；SGLang 的樹在**深度分叉**的 workload（多 agent 共享部分前綴、樹狀探索）佔優。這個差異很少單獨決定引擎選型（整體選型見 ch08），但你要能在面試裡講清楚兩種設計的取捨。\n\n### 什麼 workload 受益、證據是什麼\n\n受益程度＝前綴重複率。排序：**agentic 迴圈 ＞ 多輪對話 ＞ RAG（共享 system prompt）＞ 單發無模板請求（≈0）**。agentic workload 是極端案例：每一輪工具呼叫都帶著完整的歷史 context 回來，第 N 輪的 prompt 有 (N−1)/N 以上是逐字重複的。而 agentic 流量正是 2025–2026 成長最快的推論型態（OpenRouter 百兆 token 研究，見 ch17）——這就是 prefix caching 從「優化」變成「產品核心」的需求面原因。\n\n命中的經濟價值，最硬的證據是各家 API 願意為它降價多少（2026-06，折扣規則改版頻繁，引用前查當下官方價目）：Anthropic cache read 為基準輸入價的 10%（90% 折扣），cache write 有 1.25×～2× 的溢價；OpenAI 自動快取、無 write 費，折扣依模型 50–90%；Gemini 隱式快取另有顯式快取（按小時收儲存費），折扣約 75–90%；DeepSeek 的磁碟式快取是業界最深折扣，V3 世代約 90%，V4 世代有報導稱達 98% 以上——⚠️ 此數字僅見第三方來源，截至我能確認的資訊（2026-06）官方頁未直接證實。**廠商用真金白銀告訴你：命中的 token 對它們的成本接近於零**。背後就是本節的機制：命中＝跳過 prefill 計算，只剩記憶體讀取與持有成本（快取經濟學的完整展開見 ch16）。\n\n## Worked example：一個 agentic session 的完整帳\n\n把上面的機制換成錢和毫秒。場景：一個 coding agent，system prompt 2,000 tokens ＋ 工具描述 3,000 tokens（固定前綴 5,000）＋ 使用者任務 500 tokens；接著跑 10 輪工具迴圈，每輪模型輸出約 300 tokens 的 tool call、工具回傳約 700 tokens 的結果附回 context。模型用 Llama-3.3-70B 級別（FP8 權重約 70 GB），部署在一張 H200（141 GB HBM3e、FP8 dense 算力約 2 PFLOPS）上。\n\n**Step 1：token 帳。** 第 i 輪請求的 prompt 長度＝5,500 ＋ (i−1)×1,000（每輪累積 300 輸出＋700 工具結果）：\n\n- 第 1 輪 5,500、第 2 輪 6,500、……、第 10 輪 14,500。\n- 10 輪總輸入 token：10×5,500 ＋ 1,000×(0+1+…+9) ＝ 55,000 ＋ 45,000 ＝ **100,000 tokens**。\n\n**Step 2：prefill 計算量。** 無快取時每輪都從頭 prefill。用 ch03 的近似（每 token 的矩陣乘法 FLOPs ≈ 2 × 參數量；attention 的二次項在這個長度下另加一到兩成，以下忽略，故為下界）：\n\n- 全 session prefill 計算量 ≈ 2 × 70×10⁹ × 100,000 ＝ **1.4×10¹⁶ FLOPs**。\n- 假設 prefill 階段實際發揮 50% 算力（MFU 0.5，合理的工程值）：有效算力 1 PFLOPS → 全 session 純 prefill 時間 ≈ **14 GPU-秒**。\n\n完美命中時：第 1 輪 prefill 5,500；之後每輪只需 prefill 新進的 700 個工具結果 token（自己輸出的 300 個 token 在 decode 時就已寫入 KV，天然在快取裡）。總量＝5,500 ＋ 9×700 ＝ **11,800 tokens** ≈ 1.65×10¹⁵ FLOPs ≈ **1.65 GPU-秒**。**prefill 計算量差 8.5 倍。** decode 成本兩種情況完全相同——快取只救 prefill。\n\n**Step 3：TTFT。** 看最痛的第 10 輪（14,500 token 的 context）：\n\n- miss：2 × 70×10⁹ × 14,500 ÷ 1×10¹⁵ ≈ **2.0 秒**，這還沒算排隊。\n- hit：只 prefill 700 tokens ≈ **0.1 秒**。差 **20 倍**，而且 miss 的 TTFT 隨輪數線性惡化、hit 的近乎平坦。agentic 產品「越用越卡」與否，分界線就在這。\n\n**Step 4：錢——自建視角。** H200 租用以 $3.5/hr 計（2026 年年中快照，級距內代表值），即約 $0.001/GPU-秒。每個 session 省 14 − 1.65 ≈ 12.3 GPU-秒 ≈ **$0.012**。月活 100 萬個這種 session：**每月省約 $12,000 的純 prefill 算力**——或者等價地說，同一個 fleet 的 prefill 容量多了 8.5 倍。對照 ch02 的 roofline 語言：你把 compute-bound 的工作直接消滅，把省下的 FLOPs 讓給別的請求。\n\n**Step 5：錢——API 視角。** 用 Anthropic 計價模式驗算（基準輸入 $3/M、cache read $0.30/M、5 分鐘 TTL write $3.75/M；工具迴圈的輪間隔通常秒級，TTL 內）：\n\n- 無快取：100,000 × $3/M ＝ **$0.300**／session（輸入部分）。\n- 有快取：write＝第 1 輪 5,500 ＋ 每輪新增 9×1,000 ＝ 14,500 tokens × $3.75/M ≈ $0.054；read＝85,500 tokens × $0.30/M ≈ $0.026。合計 **$0.080**，省 73%。（輸出 token 3,000 × $15/M ＝ $0.045 兩種情況相同。）\n\n**Step 6：但快取不是免費的——記憶體持有成本。** 第 10 輪結束時這個 session 的 KV 有 15,500 tokens × 320 KB ≈ **5 GB**（FP16；FP8 KV 砍半，見下節）。H200 扣掉 70 GB 權重後可用 KV 池約 60 GB——**只夠 12 個這種 session 把 KV 完整留在 HBM**。工具執行、使用者打字的空檔裡，這 5 GB 是純粹的死重。這就是下面兩節存在的原因：量化讓每 byte 裝兩倍，offloading 讓快取不必住在最貴的記憶體裡。\n\n## KV cache 量化：FP8 KV 的收益與代價\n\n把 KV 從 FP16/BF16 存成 FP8（每元素 1 byte），容量翻倍、讀取 KV 的記憶體流量砍半——decode 是 memory-bound（ch02/ch03），所以長 context 下這同時是容量優化與速度優化。vLLM 用 `--kv-cache-dtype fp8_e4m3`（或 `fp8_e5m2`）開啟；e4m3 精度高但動態範圍小，需要 scaling factor 配合，可用 llm-compressor 對校準資料集求 per-head scale，也可以無校準直接上（scale=1.0）。\n\nvLLM 官方 2026-04 的量測（H100，2026-06 仍是現況的最好參考）：Llama-3.1-8B 的 ITL 隨 context 增長的斜率降到 BF16 的 54%，**約 7k tokens 是損益兩平點**——比這短的 context，FP8 的固定開銷反而讓它更慢；高負載下吞吐量約 +15%。品質面：推理類任務最多掉 1–2 分，長上下文檢索（MRCR）回復率 94–98%。\n\n決策框架：\n\n| 情況 | 建議 |\n|---|---|\n| 長 context（>8k）、KV 容量是瓶頸 | 開，這是它的主場 |\n| 平均 context < 7k 的短請求流量 | 別開，沒有收益還有固定開銷 |\n| `head_dim=256` 的模型且在乎 TTFT | 小心，已知 prefill 路徑有 1.6× 變慢的案例（2026-04 量測） |\n| 品質敏感（數學、長鏈推理） | 先跑任務型 eval 再上線；無校準掉太多就做校準 |\n| 100k+ 超長 context | 確認引擎版本含累加精度修正（vLLM 已修，舊版有累積誤差） |\n\nMurphy 提醒：**FP8 KV 的品質退化在 5xx 裡看不到**——模型只是悄悄變笨。防線只能是 eval gate（ch15 的發布工程會展開）。另外注意 FP8 KV 與 FP8 權重量化（ch07）是獨立的決策，可以分開開關。\n\n## 分層 offloading：當 HBM 裝不下你的快取\n\nWorked example 算過：一張 H200 只放得下 12 個閒置 agentic session 的 KV。但 session 與 session 之間的「溫快取」——五分鐘前活躍的對話、共享的長文件——逐出就要重算，留著就佔 HBM。答案跟你做過的儲存分層一模一樣：\n\n```\n層級          容量量級      頻寬量級           誰在用\nGPU HBM      80–288 GB    3–8 TB/s          活躍請求的熱 KV\nCPU RAM      0.5–2 TB     ~64 GB/s (PCIe5)  分鐘級溫快取\n本地 NVMe    數 TB        ~GB/s 級           小時級冷快取\n遠端儲存池    無上限        看網路             跨節點共享池（→ ch10）\n```\n\n關鍵的數學直覺（完整推導見 ch10）：從 CPU RAM 載回 KV 比重算 prefill 快得多。70B 模型每 token 的 KV 是 320 KB，PCIe Gen5 x16 約 64 GB/s → 載回速率約 20 萬 tokens/s；同一張卡重算 prefill 約 7 千 tokens/s（Step 2 的數字）——**載回比重算快約 28 倍**。模型越大這個差距越大（重算成本 ∝ 參數量，KV 大小成長得慢於參數量）。所以「把溫 KV 放到便宜十倍的記憶體裡」幾乎是免費的午餐，2025–2026 整個生態都在做這件事：\n\n- **vLLM 原生 offloading**：async connector 讓 KV 搬運與計算重疊，CPU tier 走 `cudaMemcpyAsync`/DMA；v0.12 把同一 block 各層的 KV 改成實體連續排列，單次搬運從 KB 級變 0.5–2 MB，吞吐大幅改善。官方數字：單請求 TTFT 改善 2–22 倍、高命中率併發吞吐至多 9 倍（vLLM blog，2026-01）。v0.22 進一步把它框架化成 multi-tier（含 filesystem tier）（2026-06）。\n- **LMCache**（v0.4.6，2026-05）：vLLM 的 KV connector 生態裡最成熟的獨立快取層，後端涵蓋 CPU RAM、本地 SSD、Redis/Valkey、S3 相容物件儲存、Mooncake、NIXL/GDS。論文自報長 context workload 下 TTFT 降 1.9–8.1 倍。它的定位值得記住：**把 KV cache 做成引擎之外的一個獨立儲存系統**。\n- **Mooncake**（Moonshot AI / Kimi）：把這個思路推到整個叢集——「KVCache-centric」架構，用 GPU 叢集裡閒置的 CPU、DRAM、SSD 組成一個分散式 KV 池，排程器圍繞「KV 在哪裡」做決策（P/D 分離部分見 ch10）。生產證據（專案方自報）：真實負載下讓 Kimi 多承接 75% 請求；模擬場景下吞吐最高 +525%；Kimi K2 以 128×H200 跑出 prefill 224k、decode 288k tokens/s（2026-06）。Mooncake 論文（FAST'25）的副標題就是宣言：*Trading More Storage for Less Computation*。\n- 傳輸層的共同地基是 **NIXL**（NVIDIA 的傳輸抽象，統一 UCX/GDS/S3 等後端）——一句話帶過，跨節點 KV 搬運的工程細節屬 ch10。\n\n什麼時候**不要**上 offloading：流量幾乎無前綴重複（命中率撐不起搬運開銷）、平均 context 很短（重算很便宜）、或 PCIe 頻寬已被其他用途吃滿。分層快取每多一層都是一層新的故障面——tier 之間的一致性、搬運佇列的 backpressure、tier 滿了之後的行為，都要有人負責（見故障模式）。\n\n## 失效與一致性：什麼會殺死你的快取\n\n把 KV cache 當一個正經的快取系統來問你最熟的問題：cache key 是什麼？什麼時候失效？多副本怎麼辦？\n\n**Cache key 是 token 序列本身**（加上 LoRA ID、cache salt 等語義因素）。所以失效規則是位元級嚴格的：前綴中**任何一個 token** 變了，從那個位置起全部失效。工程含意比你想的殺傷力大——在 system prompt 開頭放當前時間戳，命中率直接歸零；工具列表的 JSON 序列化順序不穩定（hash map 遍歷順序！）、每次部署 prompt 模板悄悄改一個字、A/B 測試讓一半流量用不同開頭——都是生產環境真實發生過的「快取謀殺」。防禦規則只有一條：**穩定的內容放前面，易變的內容放後面**，並且把 prompt 模板當 schema 一樣做版本治理。\n\n**Sampling 參數不影響 KV**。temperature、top-p 作用在 logits 之後（ch03），KV 在那之前就定了——所以不同 sampling 設定的請求可以共享快取。這是少數對你有利的物理。\n\n**模型一動，全部陪葬**。KV 是特定權重下的中間計算結果，換模型版本、改量化格式、甚至改 TP 切法（KV 的 layout 跟著變，見 ch09）都意味著整池快取作廢。部署新版本＝全叢集冷快取＝TTFT 集體飆高一段時間。這讓 LLM 服務的 rollout 比無狀態服務多一個維度的痛（graceful rollout 的完整處理見 ch15），緩解手段是漸進式發布＋對新副本先打合成的暖機流量。\n\n**多副本不共享快取**（除非你建了上一節的遠端共享池）。每個 replica 有自己的 HBM 快取，round-robin 負載均衡會把同一個 session 的第 N 輪打到沒有它前綴的副本上——**N 個副本下命中率天然掉到約 1/N**。這就是「有狀態的負載均衡」問題：session affinity 的直覺是對的，但快取命中的價值遠高於一般 sticky session，值得專門的 KV-aware routing——機制與 scoring 設計整章展開（見 ch10）。在本章只需要記住結論：**單機把快取做得再好，路由不配合就全白費**。\n\n## 容量視角：KV 利用率是一級健康指標\n\n把本章的所有機制疊起來，KV cache 池就是這個系統的「連線池＋buffer pool」合體：它的水位決定還能收多少新請求、誰會被 preempt（ch06）、什麼時候該擴容（ch13）。你在 RDS 上學到的「盯 buffer pool hit rate 與剩餘連線數」的肌肉記憶，在這裡對應三個必盯指標：\n\n1. **KV cache 利用率**（vLLM 暴露 GPU KV 使用率指標）：長期 >90% 代表在 preemption 邊緣跳舞；持續偏低代表卡買多了或 `max-num-seqs` 設保守了。\n2. **Prefix cache 命中率**（V1 暴露 queries/hits 計數器）：它是「流量形態 × 路由品質 × 模板治理」三者的乘積，緩慢下滑幾乎總是其中之一壞了。\n3. **Preemption 次數**：KV 容量不足的直接證據，是比 GPU utilization 誠實得多的擴容訊號（為什麼 GPU util 會說謊，見 ch13/ch14）。\n\n這三個指標會在 ch13 變成 autoscaling 訊號、在 ch14 進 dashboard。本章先立一個觀點：**2026 年看一個 LLM serving 團隊成不成熟，看他們的告警裡有沒有 KV 指標就知道了。**\n\n## 故障模式與防禦\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| 命中率緩慢下滑 | TTFT p95 爬升、prefill 占比變大，無人改過引擎 | per-replica 命中率趨勢；對照 prompt 模板的部署紀錄 | 模板版本治理；動態欄位移到 prompt 尾端；路由檢查（ch10） |\n| 命中率「天生」只有 1/N | 加副本後 TTFT 反而變差 | 比較單副本 vs 多副本的命中率 | KV-aware / session-affinity 路由（ch10） |\n| TTFT 雙峰分布 | p50 很美、p95 很慘，平均值毫無意義 | TTFT histogram 按 hit/miss 拆開看 | 分開設 SLI；以命中率作為輔助告警 |\n| KV 池耗盡 → preemption 螺旋 | preemption 計數上升、ITL spike、重算推高負載形成正回饋 | KV 利用率 + preemption counter | 容量水位告警（如 85%）、admission control（ch06/ch13） |\n| 部署 = 全快取失效 | 每次 rollout 後 TTFT 集體飆高數分鐘 | 對齊 deploy 事件與 TTFT 時間序列 | 漸進 rollout＋合成流量暖機（ch15） |\n| Prompt 裡藏了易變內容 | 命中率接近 0，但「我們明明開了快取」 | 抽樣 log 比對相鄰請求的前綴 diff | prompt lint：時間戳/UUID/不穩定 JSON 序列化是頭號嫌犯 |\n| FP8 KV 品質退化 | 無任何錯誤碼，使用者抱怨「變笨了」 | 任務型 eval 基線對比（5xx 看不到它） | eval gate 進發布流程；校準；對敏感層 skip |\n| Offloading tier 飽和 | 開了 offloading 後 TTFT 不降反升、PCIe 流量打滿 | tier 命中率與搬運延遲指標、`nvidia-smi dmon` 的 PCIe 流量 | tier 容量 sizing；搬運與計算重疊是否生效；必要時關閉 |\n| Block/reference count 洩漏（引擎 bug） | KV 使用率與活躍請求數脫鉤、只升不降，數天後開始異常 preemption | KV 利用率 vs in-flight 請求數的相關性監控 | 升級引擎版本；定期重啟的 runbook（醜但有效） |\n| 跨租戶 timing side channel | 攻擊者用 TTFT 差異探測別人的 prompt 前綴（已有公開研究展示於商用 API） | 安全審查，非常規監控 | per-tenant cache salt / 隔離快取空間；共享池要有意識地評估 |\n\n## 動手做\n\n**Lab 1 [M1]：用模擬器觀察 prefix caching 指標（免費）**\n\n用 llm-d-inference-sim（模擬 vLLM API 與 metrics、不需 GPU）起一個假引擎，體會「命中率作為一級指標」長什麼樣（指令為示意，旗標以 repo README 為準）：\n\n```bash\ndocker run --rm -p 8000:8000 ghcr.io/llm-d/llm-d-inference-sim:latest \\\n  --port 8000 --model meta-llama/Llama-3.1-8B-Instruct\n# 終端 2：用相同前綴打 20 次、再用隨機前綴打 20 次\nfor i in $(seq 20); do\n  curl -s localhost:8000/v1/completions -H 'Content-Type: application/json' \\\n    -d '{\"model\":\"meta-llama/Llama-3.1-8B-Instruct\",\"prompt\":\"<固定的 2000 字前綴>... 任務 '$i'\",\"max_tokens\":32}' > /dev/null\ndone\ncurl -s localhost:8000/metrics | grep -i -E 'cache|prefix'\n```\n\n成功標準：能指出哪個指標是 KV 使用率、哪兩個相除是命中率，並解釋兩組流量的指標差異。進階替代：在 M1 上以 CPU 模式從原始碼跑真 vLLM（實驗性支援，編譯較費勁），用 `--no-enable-prefix-caching` 對照同一 prompt 第二次請求的 prefill 時間。\n\n**Lab 2 [租 GPU]：開關 prefix caching 的 TTFT 對比（估 $3–5）**\n\n租一張 L4 或 A10（2026 年年中約 $0.5–1.0/hr），跑 8B 模型：\n\n```bash\nvllm serve meta-llama/Llama-3.1-8B-Instruct --max-model-len 8192\n# benchmark：用帶共享前綴的負載（旗標以你的 vLLM 版本 --help 為準）\nvllm bench serve --model meta-llama/Llama-3.1-8B-Instruct \\\n  --dataset-name random --random-prefix-len 2048 --random-input-len 256 \\\n  --random-output-len 128 --num-prompts 200\n# 第二輪：加 --no-enable-prefix-caching 重起 server，同樣負載再跑一次\n```\n\n成功標準：兩輪的 TTFT 中位數差距能用本章機制解釋，並能從 /metrics 的命中計數驗證第一輪確實在命中。記得用完即關機。\n\n**Lab 3 [紙上推演]：重算 worked example**\n\n把本章的 agentic 帳改成你的參數重算一遍：（a）換成 8B 模型（KV 每 token 128 KB）在 L4 上；（b）API 計價換成 DeepSeek 級折扣（read ≈ 原價 10%）；（c）回答：哪個變因對「快取的價值」影響最大——模型大小、輪數、還是固定前綴長度？（提示：對輪數求和的那一項是平方級的。）\n\n## 這個領域往哪走\n\n兩個方向值得盯。第一，**KV cache 正在從引擎內部的資料結構變成一個獨立的儲存層級**——Mooncake Store、LMCache、各家 API 把 context caching 做成商品，都是同一個趨勢：「KV 是新的 Redis」（這個論點的完整辯論見 ch17）。第二，模型架構在反向釜底抽薪：MLA、DSA 等稀疏注意力與 linear/hybrid attention 路線（DeepSeek-V4、Qwen3.5 已在生產採用，2026-06）都在壓縮或改寫 KV 的數學——如果 KV 不再隨 context 線性成長，本章的容量壓力會緩解，但 prefix 重用與分層管理的系統設計依然成立。機制會換，問題不會。\n\n## 自我檢核\n\n1. naive 連續配置的三種浪費各是什麼？PagedAttention 分別用什麼手段消滅它們？剩下的內部碎片上限是多少？\n2. PagedAttention 與 OS paging 的類比在哪三個地方失效？（提示：MMU/TLB、demand paging、硬體隔離。）\n3. block size 從 16 調到 128 會發生什麼？對命中率和管理開銷各有什麼影響？\n4. vLLM 的 hash-based 與 SGLang 的 RadixAttention 各自的資料結構、匹配粒度、逐出策略是什麼？什麼 workload 會拉開兩者差距？\n5. 為什麼 temperature 不影響 KV 重用、但 LoRA adapter 會？模型權重更新時會發生什麼？\n6. 不看書，重算一遍本章 worked example 的 Step 1–3：10 輪 agentic 迴圈的總 prefill token 數、命中與未命中的計算量差距、第 10 輪的 TTFT 差距。\n7. FP8 KV 的損益兩平點為什麼存在（約 7k tokens）？哪三種情況你會建議不要開？\n8. 三個副本、round-robin 路由，prefix cache 命中率為什麼會掉到約 1/3？你有哪兩條路修它？\n\n## 延伸閱讀\n\n- [Efficient Memory Management for LLM Serving with PagedAttention（arXiv:2309.06180, SOSP'23）](https://arxiv.org/abs/2309.06180) — 原始論文，60–80% 浪費與 <4% 的量測出處，值得完整讀一遍的系統論文。\n- [vLLM 官方文件：Automatic Prefix Caching（design doc）](https://docs.vllm.ai/en/latest/design/prefix_caching.html) — V1 的 hash 鏈、free queue 與 LRU 實作細節，本章 vLLM 部分的一手來源。\n- [Fast and Expressive LLM Inference with RadixAttention and SGLang（LMSYS blog）](https://lmsys.org/blog/2024-01-17-sglang/) — RadixAttention 的最佳入門，搭配論文 [arXiv:2312.07104](https://arxiv.org/abs/2312.07104)。\n- [Mooncake: A KVCache-centric Disaggregated Architecture for LLM Serving（arXiv:2407.00079, FAST'25）](https://arxiv.org/abs/2407.00079) — 把 KV cache 當叢集級儲存系統設計的代表作，含 Kimi 生產數據。\n- [The State of FP8 KV-Cache and Attention Quantization in vLLM（vLLM blog, 2026-04）](https://vllm.ai/blog/2026-04-22-fp8-kvcache) — 本章 FP8 KV 數字的出處，含損益兩平點與品質量測方法。\n- [Inside vLLM's New KV Offloading Connector（vLLM blog, 2026-01）](https://vllm.ai/blog/2026-01-08-kv-offloading-connector) — CPU offloading 的工程細節：DMA、layout 重排、async 搬運。\n- [LMCache（GitHub）](https://github.com/LMCache/LMCache) — 獨立 KV 快取層的代表專案，README 的後端清單就是一張 offloading 生態地圖。\n- [llm-d blog: KV-Cache Wins You Can See](https://llm-d.ai/blog/kvcache-wins-you-can-see) — 從平台視角看快取命中的收益，為 ch10 的 KV-aware routing 鋪路。\n"}, {"id": "ch06-batching-scheduling", "file": "ch06-batching-scheduling.md", "group": "Part II — 推論引擎", "title": "ch06 — Batching 與單機排程：吞吐的來源", "md": "# ch06 — Batching 與單機排程：吞吐的來源\n\n> **本章解決什麼問題**：ch03 證明了 decode 是 memory-bound、ch05 解決了 KV cache 怎麼存，本章回答「推論引擎為什麼快」的核心問題——continuous batching 與引擎內排程器。一張 GPU 從每秒 160 token 到每秒 6,800 token，差的不是硬體，是排程。這章也是你既有排程與 queue 直覺最能直接發揮的一章，並為 ch08 的引擎調參、ch10 的 P/D 分離、ch13 的容量規劃打地基。\n\n## 從你已知的出發\n\n你做過這件事：把結算 pipeline 裡一筆一筆的 `INSERT` 改成批次寫入，RDS CPU 應聲下降。原理你很清楚——每次資料庫往返有固定成本（網路 round trip、交易開銷、WAL flush），批次化把固定成本攤提到更多筆資料上。\n\nGPU decode 的 batching 是同一件事，只是固定成本大得離譜。ch03 算過：decode 每生成一個 token，GPU 必須把**整份模型權重**從 HBM 讀進運算單元一次。8B 模型 FP16 就是 16 GB——這是每一步的「固定成本」。一次只服務一個請求，等於每次資料庫往返只 INSERT 一筆。把 128 個請求的 decode 排進同一步，權重還是只讀一次，固定成本被攤提 128 倍。這就是吞吐的來源，沒有魔法。\n\n第二個你熟的東西：SQS consumer 的 batch 參數。你設定過 `MaxNumberOfMessages` 和 `WaitTimeSeconds`——湊滿一批就送，或等逾時就送。這正是等一下要講的 dynamic batching，LLM serving 在 2022 年之前就停在這個階段。它的問題你大概已經猜到了：批內成員必須一起進一起出，而 LLM 請求的「處理時長」變異是 1,000 倍級的（生成 10 個 token vs 生成 10,000 個 token），一起進一起出意味著所有人陪最長的那個等。\n\n第三個：queue 理論。你在遊戲後端看過慢查詢吃光 connection pool 的事故——一條 full table scan 卡住，後面排隊的全部秒級查詢一起陪葬。這叫 head-of-line（HOL）blocking，而它惡化的速度由 Pollaczek–Khinchine 公式決定：等待時間正比於**服務時間的二階動差**，不是平均值。LLM 流量的服務時間分布是重尾中的重尾（一個 100k-token 的 RAG prompt 混在一堆 50-token 的問答裡），所以 HOL blocking 不是邊角案例，是 LLM 排程的中心問題。本章一半的篇幅都在處理它的各種化身。\n\n把這三個直覺帶著，新東西其實只有一個：**LLM 請求是迭代的**。一個 HTTP 請求是一次性的工作；一個 LLM 請求是「先做一次大的 prefill，然後做幾十到幾千次小的 decode 迭代」。排程單位從「請求」變成「迭代」，整個排程理論的物理常數就變了。\n\n## 從 static 到 continuous batching：三代演進\n\n每一代解一個問題，留一個問題。\n\n### Static batching：HPC 的遺產\n\n最早的做法直接繼承自訓練：湊滿 N 個請求，padding 到等長，一起 forward 到全部結束。兩個致命傷：\n\n1. **等慢者**：batch 裡有人生成 20 個 token 就完了，有人要生成 2,000 個。先完成的請求的 slot 就空轉，GPU 算力照燒，直到最慢的那個結束。有效利用率可以掉到 10% 以下。\n2. **Padding 浪費**：不等長的 prompt 要 padding 到一樣長，padding token 的計算全是垃圾。\n\n### Dynamic batching：你的 SQS 直覺\n\n進步版：設一個湊批窗口（如 100ms）與批次大小上限，先到先湊，湊滿或逾時就發車。這解了「請求到達時間不齊」的問題，但**排程單位仍然是請求**——車開了就不能上下客。等慢者問題原封不動。\n\n對一次性請求（圖片分類、embedding）這夠用了，NVIDIA Triton Inference Server 的 dynamic batcher 至今仍是這類 workload 的標準解。但對生成式 workload，它撞牆。\n\n### Continuous batching：Orca 的 iteration-level scheduling\n\n2022 年 OSDI 的 Orca 論文（首爾大學/FriendliAI）做了那個事後看來顯然、當時沒人做的事：**把排程粒度從 request 降到 iteration**。每一個 decode step 結束，排程器重新決定下一步的 batch 組成——完成的請求立刻離開、釋放資源；佇列裡的新請求立刻加入，不用等任何人。車變成了捷運：每站都能上下客。\n\nOrca 還配了一個技術細節叫 selective batching：attention 運算因為每個請求的 context 長度不同無法直接 batch，但佔大頭的線性層（FFN、QKV projection）可以把所有請求的 token 展平成一個大矩陣一起算。這個「線性層合批、attention 各算各的」的結構，今天所有主流引擎都在用。\n\nOrca 在 GPT-3 175B 上對 NVIDIA FasterTransformer 做出了同延遲下 36.9 倍的吞吐提升。2023 年 Anyscale 用 vLLM 重現這個機制時量到「最高 23 倍吞吐」，continuous batching 從論文變成業界預設。今天（2026-06）你找不到任何一個主流 LLM 推論引擎不是 continuous batching——這個詞已經失去區別度，差異化都在更細的地方：prefill 怎麼混（下節）、誰先誰後（排程策略節）、記憶體不夠誰倒楣（preemption 節）。\n\n還有一塊拼圖：continuous batching 要求「隨時有請求加入」，意味著 KV cache 必須能動態、非連續地配置——這正是 ch05 PagedAttention 存在的理由。兩者是一體的：沒有 paged KV，continuous batching 的 batch size 會被記憶體碎片掐死；沒有 continuous batching，paged KV 省下的記憶體沒人用。\n\n## 引擎迴圈：每一步都在重新排程\n\n把引擎想成一個單執行緒 event loop（你寫 Node.js 的直覺在這裡意外地好用），核心是一個不斷重複的 step：\n\n```text\nloop:\n  # 1. 排程（CPU,目標 < 1ms）\n  schedule():\n    - 把完成的請求移出 running、釋放 KV blocks\n    - 從 waiting 佇列依策略（FCFS/priority）取請求,\n      問 KV cache manager「夠不夠 blocks?」→ 夠才 admit\n    - 在 token budget 內決定本步的組成：\n      所有 running 請求的 decode token + 若干 prefill chunk\n  # 2. 執行（GPU,毫秒級）\n  forward() → 每個請求得到下一個 token 的 logits\n  sample()  → 抽出 token\n  # 3. 收尾\n  - 把新 token 透過 streaming 回給各個 client\n  - 檢查 stop 條件（EOS、max_tokens、client abort）\n```\n\n幾個值得停下來看的點：\n\n- **admission 是用 KV blocks 當貨幣的**。一個請求能不能進 running，不是看「batch 還有沒有空位」，而是看 KV cache manager 還有沒有 free blocks 裝它的 prompt。這就是 ch05 與本章的接縫。\n- **admission 是樂觀的**。排程器 admit 一個請求時，只知道它的 prompt 長度，不知道它會生成多少 token。KV 占用會隨生成持續長大，所以「admit 時夠」不代表「永遠夠」——這個樂觀假設破產時，就是 preemption（後面整節講）。\n- **每一步的排程開銷必須遠小於 forward 時間**。decode 一步是幾毫秒到幾十毫秒，排程器若花 2ms 做決策，吞吐直接折損兩成。這是 vLLM V1 重寫排程器、把邏輯壓進極簡資料結構的動機之一，也是 decode 端需要 CUDA graphs 消 launch overhead 的原因（見 ch07）。\n- **client 斷線必須走 abort 路徑**。SSE client 斷線（你做 WebSocket 太熟了）如果引擎不知道，這個請求會繼續占著 slot 和 KV blocks 生成沒人收的 token。引擎有 abort API，但上游 gateway 要負責把斷線翻譯成 abort——這是平台層的責任（見 ch12）。\n\nvLLM V1（2026-06 唯一的引擎世代，V0 已在 v0.11 完全移除）的排程器有個優雅的簡化：它不再區分「prefill 階段」與「decode 階段」的請求，排程決策只是「這一步，每個請求算幾個 token」——decode 請求算 1 個，prefill 請求算一個 chunk。這個統一視角是理解下一節的最好起點。\n\n## Worked example：batch 1→256，吞吐與 ITL 的完整曲線\n\n紙上推演一次，數字會跟著你走完後面所有章節。\n\n**設定**（刻意簡化，但每個簡化都標出來）：\n\n- 硬體：H100 SXM，80 GB HBM3，理論頻寬 3.35 TB/s。取**有效頻寬 2.6 TB/s**（約理論值 78%，實測常見區間）。\n- 模型：Llama-3.1-8B 級的 dense 8B，FP16 權重 = **16 GB**。32 層、GQA 8 個 KV head、head_dim 128 → KV cache = **128 KB/token**（ch03 公式算過）。\n- 流量：穩態下每個請求平均 context 2,000 tokens（prompt 1,500 + 已生成 500）→ 每請求 KV = 2,000 × 128 KB = **256 MB**。\n- 簡化模型：decode 一步的時間 = 該步要從 HBM 讀的 bytes ÷ 有效頻寬（純 memory-bound 假設，稍後驗證）。忽略排程與 kernel launch 開銷。\n\n每一步要讀的資料 = 權重 16 GB（固定成本）+ B × 0.256 GB（每個請求自己的 KV，變動成本）。算出來：\n\n| Batch B | 每步讀取 | t_step = ITL | 總吞吐 | 單請求速度 | KV 占用 |\n|---:|---:|---:|---:|---:|---:|\n| 1 | 16.3 GB | 6.3 ms | 160 tok/s | 160 tok/s | 0.26 GB |\n| 8 | 18.0 GB | 6.9 ms | 1,150 tok/s | 144 tok/s | 2.0 GB |\n| 32 | 24.2 GB | 9.3 ms | 3,440 tok/s | 108 tok/s | 8.2 GB |\n| 64 | 32.4 GB | 12.5 ms | 5,140 tok/s | 80 tok/s | 16.4 GB |\n| 128 | 48.8 GB | 18.8 ms | 6,820 tok/s | 53 tok/s | 32.8 GB |\n| 256 | 81.5 GB | 31.4 ms | 8,160 tok/s | 32 tok/s | **65.5 GB ← 撞牆** |\n\n畫成曲線（ITL = inter-token latency，使用者感受到的逐字輸出間隔）：\n\n```text\n吞吐 (tok/s)\n8000 |                              * 256\n     |                    * 128\n6000 |\n     |           * 64\n4000 |      * 32\n     |\n2000 |   * 8\n   0 | * 1\n     +---+----+----+-----+-----+----►  batch size B\n         1    8    32    64    128/256\n\nITL (ms)\n  32 |                              * 256\n     |\n  24 |\n     |                    * 128\n  16 |\n     |           * 64\n   8 | *---*----* 32\n     | 1   8\n     +---+----+----+-----+-----+----►  batch size B\n         1    8    32    64    128/256\n```\n\n甜蜜區約 B = 8~64；ITL 在 B > 64 後加速惡化。\n\n**三個關鍵讀法**：\n\n1. **邊際報酬遞減，但代價遞增**。B 從 1→8，吞吐 ×7.2，ITL 只 +11%——近乎免費的午餐，因為固定成本（16 GB 權重）還遠大於變動成本（2 GB KV）。B 從 32→128，吞吐只 ×2.0，ITL 卻 +102%——變動成本（KV 讀取）開始主導。甜蜜點就在固定成本與變動成本交叉的附近：本例中 B≈64（16.4 GB KV ≈ 16 GB 權重）。\n2. **KV 容量撞牆點先於 roofline**。可用 KV pool：80 GB × 0.90（`gpu-memory-utilization`）− 16 GB 權重 − 約 4 GB activation/工作區 ≈ **52 GB**，除以每請求 256 MB ≈ **最多 203 個併發請求**。B=256 在物理上根本放不下——曲線最右邊那個點是虛構的，實際引擎會在 B≈200 處停止 admit、開始排隊或 preempt。注意：撞牆點完全由流量的 context 長度決定，如果平均 context 是 8k 而非 2k，每請求 KV 變 1 GB，牆提前到 B≈52。\n3. **decode 幾乎永遠 memory-bound，所以甜蜜點由 SLO 決定，不由 roofline 決定**。驗算 compute 時間：每 token 約 2 × 8B = 16 GFLOP，H100 有效算力取 600 TFLOPS，則每加一個請求增加約 0.027 ms 的 compute，但增加 0.256 GB ÷ 2.6 TB/s ≈ 0.098 ms 的記憶體讀取。**KV 讀取的成長速度是 compute 的 3.6 倍**——batch 開再大，decode 也追不上 roofline 拐點（除非 context 極短）。這推翻一個常見誤解「batch 大到 compute-bound 就是最佳點」：實務上你會先撞 ITL SLO 或 KV 牆。若你的 ITL SLO 是 p95 < 20 ms，B=128（18.8 ms）已經貼著天花板，甜蜜點落在 64~128 之間。\n\n這個簡化模型跟現實的主要偏差：真實 ITL 還要加上排程開銷與 kernel launch（CUDA graphs 處理，見 ch07）、prefill 混入的干擾（下一節）、以及每個請求 context 長度的分布而非平均。但量級與曲線形狀是對的——你在「動手做」會親手驗證。\n\n## Chunked prefill：別讓一個長 prompt 卡住所有人\n\nContinuous batching 解了「等慢者」，卻引入新的 HOL blocking：**prefill 與 decode 的資源畫像衝突**（ch03 證明過：prefill 是 compute-bound，decode 是 memory-bound）。\n\n具體有多痛，接著上面的數字算：一個 8k token 的 prompt 進來，prefill 的計算量 ≈ 2 × 8B × 8,192 ≈ 131 TFLOP，以 700 TFLOPS 的有效 prefill 算力要跑約 **187 ms**。如果引擎把這個 prefill 當成一個完整 iteration 執行，batch 裡所有正在 decode 的請求這一步都要等它——**每個使用者的 ITL 從 9 ms 突然跳到 190+ ms**，逐字輸出肉眼可見地卡住一下。流量裡只要有穩定比例的長 prompt，你的 ITL p99 就會長出一根又一根的尖刺。這就是 ch10 P/D 分離要根治的干擾問題，但單機上先有一個夠好的緩解：chunked prefill。\n\n想法來自 Sarathi-Serve（OSDI 2024）：**把 prefill 切成小塊，每一步只做一塊，跟 decode 混在同一個 batch 裡執行**。關鍵洞察是 decode 步是 memory-bound 的，GPU 的算力在 decode 步大量閒置（上面驗算過：B=128 的 decode 步，compute 只占約 3.5 ms，記憶體讀取要 18.8 ms）——把 prefill chunk 塞進這個算力空檔，接近免費。\n\n機制上由一個 **token budget**（vLLM 的 `max-num-batched-tokens`）控制：每一步全部請求合計最多處理這麼多 token。decode 請求每個占 1 個 token，剩下的預算給 prefill chunk。vLLM V1 預設啟用 chunked prefill，且排程策略是 **decode 優先**：先排所有 decode，剩餘預算才給 prefill，塞不下就自動切塊（2026-06，vLLM 官方文件）。\n\nBudget 的大小是一個純粹的 **ITL vs TTFT 交換**，用我們的數字走一遍 8k prompt、背景 B=128 decode 的場景：\n\n| token budget | 8k prefill 切成 | 混合步的步長 | 背景請求 ITL | 該 prompt 的 TTFT |\n|---:|---:|---:|---:|---:|\n| 不切（對照） | 1 塊 | ~190 ms | **尖刺到 ~190 ms** | ~187 ms |\n| 4,096 | 2 塊 | ~94 ms | 尖刺到 ~94 ms | ~190 ms |\n| 2,048 | 4 塊 | ~50 ms | 尖刺到 ~50 ms | ~200 ms |\n| 512 | 16+ 塊 | ~20 ms | **幾乎無感（≈19 ms）** | ~240 ms（+28%） |\n\n（步長取 max(decode 記憶體時間, chunk 計算時間) 的近似；chunk 越小，跨 chunk 的重複開銷越多，所以 TTFT 緩慢上升。）\n\n官方調參指引與這張表一致：**budget 調小（如 2048）保 ITL，調大（如 >8192）保 TTFT 與吞吐**——大 GPU 跑小模型時官方建議調大，因為 chunk 太小餵不飽算力。預設值隨版本演進，以你手上版本的 `vllm serve --help` 為準（本書寫作時為 vLLM 0.22.x；完整參數表見 ch08）。V1 另提供 `long_prefill_token_threshold` 與 `max_long_partial_prefills`，限制同一步裡「長 prefill」的數量，避免多個長 prompt 同時把預算吃光——本質上是給重尾分布的頭部單獨設一條 queue，你在 API gateway 做過一模一樣的事（慢端點獨立 worker pool）。\n\n要誠實說的限制：chunked prefill 是**緩解不是根治**。混合步的步長仍然比純 decode 步長，ITL 還是會被墊高一截；而且 budget 守恆——prefill 吞吐與 decode 平滑度在單機上是零和的。流量大到一定規模，把 prefill 和 decode 拆到不同的 GPU 池才是正解，那是 ch10 的主題。\n\n## Preemption：記憶體不夠時，誰倒楣\n\n回到引擎迴圈裡那個樂觀假設：admit 時不知道請求會生成多少 token。穩態下 KV pool 用到 85%，然後流量裡的長對話們同時繼續長大——free blocks 歸零，而 running 裡每個請求下一步都還要新 block。某人必須把記憶體吐出來。\n\n兩種吐法：\n\n- **Recompute**：選一個受害者（vLLM 選 running 裡最晚到的，priority 模式下選低優先權的），直接丟掉它的所有 KV blocks，把它踢回 waiting 佇列。等記憶體鬆了，從頭 re-prefill 它的「prompt + 已生成的 token」再繼續。\n- **Swap**：把受害者的 KV blocks 搬到 CPU RAM，要恢復時搬回來。\n\n紙上比一下成本，以我們的 2k context 請求（KV 256 MB）為例：recompute 要重算 2,000 token 的 prefill ≈ 46 ms 純算力；swap 走 PCIe Gen5 x16（~64 GB/s）約 4 ms 搬出 + 4 ms 搬回。原始數學上 swap 大勝——但 **vLLM V1 的預設與唯一 preemption 路徑是 recompute**（2026-06，官方文件，理由是 V1 架構下 recompute 開銷更低）。為什麼工程上反過來選？三個原因值得你記住，因為這是「紙上最優 ≠ 系統最優」的經典案例：\n\n1. Swap 的搬運要跟引擎迴圈同步，搬運期間 blocks 占著茅坑，且 CPU 側的 block 管理是一整套額外的狀態機；recompute 走的是「新請求 admission」這條本來就存在、被千錘百鍊的路徑，零新增複雜度。\n2. 有了 chunked prefill，recompute 不會卡住別人；有了 prefix caching（ch05），受害者的 prompt 前綴若還在 cache 裡，重算可能大部分免費。\n3. 「KV 搬到 CPU/SSD」這件事沒有消失，而是搬到了更通用的 KV offloading / connector 層去做（ch05 的分層、ch10 的傳輸），不再跟 preemption 這個緊急路徑綁死。\n\n**Preemption 對尾延遲的傷害是雙重的**：受害者本人 stall——它要排隊、re-prefill，token 流中斷可達數百 ms 到秒級（使用者看到打字打到一半凍住）；同時 recompute 是憑空多出來的工作，**系統越忙，preemption 越多；preemption 越多，系統越忙**。這個正回饋你在生產環境見過它的孿生兄弟：retry storm。差別是 retry storm 的放大器在 client 端，preemption storm 的放大器在引擎自己體內。放任不管的終局是死亡螺旋，防禦工事（admission control、load shedding 的位置）在 ch13 詳談；單機層面你要知道的是：**preemption 應該是罕見事件**——監控 `vllm:num_preemptions_total` 的速率，穩態下持續非零就代表 KV 預算配置錯了，該調的是 `max-num-seqs`（少 admit 一點）或 `gpu-memory-utilization`（多給 KV 一點）。\n\n## 排程策略：FCFS、priority 與公平性\n\n排程器從 waiting 佇列挑人的策略，直接決定誰的 TTFT 好看、誰餓死。\n\n**FCFS（先到先服務）**是 vLLM 的預設。優點是絕不餓死任何人、行為可預測；缺點正是開頭講的 HOL blocking——一個 100k-token 的 prefill 排在佇列頭，後面所有 50-token 的快問快答都得等它。重尾流量下，FCFS 的 TTFT p99 由流量裡最長的 prompt 決定，跟你的容量幾乎無關。這跟 OLTP 連線池被分析型查詢卡死是同構問題，解法的方向也同構：隔離（長短請求分池，ch10 的 P/D 分離與 ch12 的多池路由）或插隊（priority）。\n\n**Priority scheduling**：vLLM V1 支援 `--scheduling-policy priority`，請求帶 priority 欄位，同優先權內以到達時間決勝（2026-06）。Priority 解 HOL 的同時引入它的經典代價：**starvation**——只要高優先權流量足夠多，低優先權請求的 TTFT 沒有上界。教科書解法是 aging（等越久優先權越高），但截至我能確認的資訊（2026-06），vLLM 內建排程器沒有 aging，餓死防禦要自己在上游做（per-tier 的配額或佇列逾時）。另一個 LLM 特有的坑：priority 搭配 preemption 意味著高優先權請求進來時，低優先權的**正在生成的**請求會被踢回去重算——插隊的不只是佇列位置，還有別人已經付過的算力。\n\n**SLO-aware / goodput-aware 排程**是進行中的方向：排程器知道每個請求的 TTFT/ITL 目標，挑人時最大化「能在 SLO 內完成的請求數」而非單純吞吐——例如 decode 池 ITL 已貼近 SLO 時，暫緩 admit 新的長 prefill。引擎內建的這類策略還在演化中，而業界的實際走法是把這層智慧上移：單機引擎保持簡單（FCFS/priority + chunked prefill），SLO 感知做在路由層（llm-d 的 inference scheduler、Dynamo 的 planner，見 ch10/ch12）。我認為這個分層是對的——排程器每步只有不到 1ms 的決策預算，複雜的最佳化放在請求進入引擎之前做，代價更低。\n\n一個容易被忽略的設計原則收尾：**佇列管理屬於整個系統，不只屬於引擎**。引擎的 waiting 佇列是無界的——它不會回 429。如果你讓佇列在引擎裡堆積，TTFT 會無聲地爆炸而 GPU 指標一切正常（佇列先於資源指標惡化，你在遊戲後端的尖峰日看過這個模式）。Admission control 必須做在 gateway（ch12），引擎佇列深度必須上監控（ch14）。\n\n最後一個越來越重要、卻常被排程討論忽略的負載：**constrained decoding（structured output）**。Agentic 流量大量要求 JSON schema 或 grammar 約束的輸出（ch17），引擎要在**每個 decode step** 對 logits 套 token mask——grammar 的編譯與逐步 mask 計算發生在 CPU 端。主流引擎已把 mask 計算 overlap 進 GPU step 的空檔（xgrammar 一系，2026-06），但一個 batch 裡只要有幾條複雜 schema 的請求，CPU 端仍可能追不上 GPU 的節奏，於是**整個 batch 的 ITL 一起被拖慢**——又一個「batch 裡的請求不獨立」的例子，而且症狀很陰：全池 ITL 上升，GPU 指標一切正常（GPU 在等 CPU）。防禦：確認 grammar 編譯快取命中（首個請求付編譯成本）、把重 schema 流量隔離到獨立池（ch12）、監控 structured output 請求的占比與該類請求的 ITL 分布。這類 workload 也是引擎間差距最明顯的地方之一（SGLang 以此起家，見 ch08）。\n\n## 三個參數，一條曲線\n\nvLLM 的完整參數表在 ch08，但有三個參數的**系統意義**屬於本章，因為它們就是上面三節的物理量的旋鈕：\n\n| 參數 | 控制什麼物理量 | 調大的收益 / 代價 | 調小的收益 / 代價 |\n|---|---|---|---|\n| `--max-num-seqs` | batch size B 的上限（同時 running 的請求數） | 吞吐↑ / ITL↑、KV 壓力↑、preemption 風險↑ | ITL↓、行為穩定 / GPU 餵不飽、佇列堆積 |\n| `--max-num-batched-tokens` | 每步 token 預算（prefill chunk 的大小） | TTFT↓、prefill 吞吐↑ / ITL 尖刺↑ | ITL 平滑 / TTFT↑、長 prompt 變慢 |\n| `--gpu-memory-utilization` | KV pool 的大小（撞牆點的位置） | 撞牆點後移、preemption↓ / OOM 風險↑（activation 尖峰、碎片沒餘裕） | 安全餘裕↑ / 同樣流量下更早 preempt |\n\n三個一起看才有意義，因為它們共同決定你在 latency-throughput 曲線上的工作點：`gpu-memory-utilization` 決定牆在哪、`max-num-seqs` 決定你貼牆多近、`max-num-batched-tokens` 決定 prefill 的干擾形狀。症狀導向的速查：\n\n- ITL p99 有尖刺、與長 prompt 到達相關 → budget 調小，或限制併發長 prefill。\n- `num_preemptions_total` 穩態非零 → `max-num-seqs` 調小或 `gpu-memory-utilization` 調大。\n- GPU 閒、佇列長、吞吐上不去 → `max-num-seqs` 太保守。\n- 偶發 engine OOM crash → `gpu-memory-utilization` 太貪心，留餘裕。\n\n## Goodput：滿足 SLO 的吞吐才算數\n\n本章到處在講「吞吐 vs 延遲」的取捨，需要一個單一數字把取捨收斂成可以做決策的指標。業界（源頭是 DistServe 論文，OSDI 2024）給它的名字是 **goodput**：每秒**在 SLO 內**完成的請求數（通常再除以 GPU 數，變成 per-GPU goodput）。SLO 同時含 TTFT 與 ITL 兩條——任一條超標，這個請求對 goodput 的貢獻是零，不管它生成了多少 token。\n\n用 worked example 的數字示範為什麼這個區分性命攸關。設 SLO 為 ITL p95 < 20 ms：\n\n| 配置 | B 上限 | 總吞吐 | ITL | goodput 視角 |\n|---|---:|---:|---:|---|\n| 保守 | 64 | 5,140 tok/s | 12.5 ms | 全部達標，goodput = 吞吐 |\n| 貼線 | 128 | 6,820 tok/s | 18.8 ms | 達標，但毫無餘裕——流量稍偏長 context 就翻車 |\n| 貪心 | 256 | 8,160 tok/s* | 31.4 ms | **吞吐最高、goodput ≈ 0**——每個請求都超標 |\n\n（*且 B=256 已超過 KV 牆，實際還會疊加 preemption。）\n\n「貪心」配置在 benchmark 報告裡是冠軍，在生產環境是事故。這就是為什麼 benchmark 只報 throughput 是半個謊言，也是 ch13 容量規劃的基本面：**你採購的是 goodput，不是 throughput**。goodput 怎麼正確量測（SLO 怎麼定、coordinated omission 怎麼避開、frontier 曲線怎麼跑）是 ch14 的主題，這裡你只需要把概念裝進腦袋：從今天起，看到任何吞吐數字，第一個反射問句是「在什麼延遲約束下？」。\n\n## 故障模式與防禦\n\n| 故障模式 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| Preemption storm | ITL p99 突發尖刺、吞吐反而下降、使用者看到生成「凍住」 | `vllm:num_preemptions_total` 速率 > 0 且與 `vllm:kv_cache_usage_perc` ≈ 100% 同時出現 | 調小 `max-num-seqs` / 調大 KV pool；上游 admission control；prefix caching 降低 KV 壓力 |\n| 長 prompt HOL（chunked prefill 失效或 budget 過大） | ITL p99 規律尖刺，時間點與長 prompt 到達吻合 | ITL histogram 的雙峰；尖刺與 prompt 長度分布做相關 | 調小 token budget；限制併發長 prefill；規模夠大上 P/D 分離（ch10） |\n| 引擎佇列無聲堆積 | TTFT 爆炸但 ITL 與 GPU 指標全部正常 | `vllm:num_requests_waiting` 持續上升；排隊時間納入 tracing（ch14） | Admission control 放 gateway 回 429，別讓引擎佇列當緩衝；以佇列深度驅動擴容（ch13） |\n| Priority 下的 starvation | 低優先權租戶 TTFT p99 無上界、體驗投訴 | 按 priority 分組看 TTFT 分位數 | 上游 per-tier 配額與佇列逾時；謹慎使用跨層 preemption |\n| `gpu-memory-utilization` 過貪 → OOM | 流量尖峰時引擎直接 crash、pod 重啟、所有 in-flight 請求全滅 | engine OOM log；重啟事件與流量尖峰相關 | 留餘裕（activation 尖峰、CUDA graphs 也吃記憶體）；壓測時專門打長 context 流量 |\n| Client 斷線不釋放 slot | running 數高但輸出 token rate 低；「忙碌但無效」 | running 請求數 vs 實際 token 輸出率的背離 | 確認 gateway 把 SSE 斷線翻譯成引擎 abort；設 max_tokens 上限 |\n| Benchmark 自欺（高吞吐零 goodput） | 上線後 SLO 大面積超標，但壓測報告很漂亮 | 壓測時同時記錄延遲分位數與 SLO 達成率 | 永遠報 goodput@SLO 而非裸吞吐（方法論見 ch14） |\n\n共同主題：這張表裡沒有一項是「模型」的問題，全部是排程與記憶體的問題——呼應全書主軸一，LLM serving 本質上是 memory 的生意。\n\n## 動手做\n\n### 實驗 1 [紙上推演]：把 worked example 換成你的場景\n\n用本章的簡化模型重算一條曲線：同一張 H100，流量改成平均 context 8,000 tokens（agentic workload 的典型值），ITL SLO p95 < 25 ms。\n\n步驟：每請求 KV = 8,000 × 128 KB = 1 GB；重算 B ∈ {1, 8, 32, 64} 的每步讀取量、ITL、吞吐；算 KV 牆（52 GB ÷ 1 GB ≈ 52 個併發）；找出 SLO 內的最大 B。\n\n**成功標準**：你能說出「context 從 2k 變 8k，甜蜜點從 ~64 移到哪裡、牆從 ~200 移到哪裡」，並解釋為什麼長 context 流量讓 batch 的紅利急遽縮水（變動成本 4 倍，固定成本不變）。加分題：如果換成 70B FP16 模型會發生什麼？（提示：140 GB 權重，單卡裝不下——這就是 ch09 存在的理由。）\n\n### 實驗 2 [M1]：用模擬器 + k6 重現飽和曲線\n\nllm-d-inference-sim 是一個模擬 vLLM API 行為的輕量 server（不需要 GPU），可以設定 `max-num-seqs`、TTFT/ITL 等參數；k6 是你的主場。\n\n```bash\n# 啟動模擬器（示意,旗標以 repo README / --help 為準）\ndocker run -p 8000:8000 ghcr.io/llm-d/llm-d-inference-sim:latest \\\n  --model fake-8b --max-num-seqs 64 \\\n  --time-to-first-token 200 --inter-token-latency 10\n```\n\n```javascript\n// k6 骨架（示意）：階梯式拉高併發,觀察吞吐何時平頂\nimport http from 'k6/http';\nexport const options = {\n  scenarios: { ramp: { executor: 'ramping-vus',\n    stages: [ { duration: '1m', target: 32 },\n              { duration: '1m', target: 64 },\n              { duration: '1m', target: 128 } ] } },\n};\nexport default function () {\n  http.post('http://localhost:8000/v1/completions', JSON.stringify({\n    model: 'fake-8b', prompt: 'hello', max_tokens: 100,\n  }), { headers: { 'Content-Type': 'application/json' } });\n}\n```\n\n對三檔 `--max-num-seqs`（16 / 64 / 128）各跑一輪。**成功標準**：畫出三條「併發 vs 吞吐」曲線，觀察到吞吐在併發超過 `max-num-seqs` 後平頂、延遲開始線性堆積——這就是佇列堆積的形狀，跟你壓測後端服務看到的飽和曲線同構。\n\n### 實驗 3 [租 GPU]：真 vLLM 上的三檔對比（估 $3–5）\n\n租一張單卡（L4/A10 級即可跑 8B，約 $0.5–1.0/hr，2026 年年中快照；用完即關）：\n\n```bash\npip install vllm\n# 三檔分別啟動（每次只改 max-num-seqs: 16 / 64 / 256）\nvllm serve Qwen/Qwen3-8B --max-num-seqs 64 --gpu-memory-utilization 0.90\n\n# 官方 bench 子命令打負載\nvllm bench serve --model Qwen/Qwen3-8B \\\n  --dataset-name random --random-input-len 1500 --random-output-len 500 \\\n  --request-rate 8 --num-prompts 200\n# 同時在另一個終端盯指標\ncurl -s localhost:8000/metrics | grep -E 'num_preemptions|kv_cache_usage|num_requests_(running|waiting)'\n```\n\n**成功標準**：產出一張三檔對比表（throughput、TTFT p95、ITL p95、preemption 次數），並能指出哪一檔撞了 KV 牆（preemption 計數開始走動）、哪一檔 GPU 餵不飽（waiting 持續 > 0 但 running 遠低於上限）。記得：卡用完立刻關，先設預算警報再開卡。\n\n## 這個領域往哪走\n\n短期（1–2 年）內，單機排程器本身會維持「簡單而快」：每步決策預算不到 1ms，複雜度長不上去。智慧在往兩頭移動——往上移到路由層（KV-aware、SLO-aware 的請求分配，ch10/ch12），往下移到對 workload 的假設裡：agentic 流量（長 session、高 prefix 重複、機器發起的突發，見 ch17）正在讓「公平性」與「priority + preemption 的代價」從教科書議題變成計費與多租戶的核心問題（ch16）。另一條值得盯的線是 goodput-aware 的引擎內排程與更細粒度的 preemption（只踢部分 blocks 而非整個請求）——研究很多，生產落地還早。機制會變，但本章的分析框架（固定成本攤提、HOL blocking、樂觀 admission 的代價）十年內不會過期。\n\n## 自我檢核\n\n1. 為什麼 batching 能提升 decode 吞吐？用「固定成本 vs 變動成本」講清楚，並指出 batch 開大後是哪一項變動成本讓報酬遞減。\n2. Static、dynamic、continuous batching 各解了什麼問題、留了什麼問題？Orca 的 iteration-level scheduling 改變的核心是什麼？\n3. 為什麼說「decode 在長 context 流量下永遠是 memory-bound，batch 開再大也到不了 roofline 拐點」？給出每加一個請求的 compute 增量與記憶體讀取增量的比較。\n4. Chunked prefill 的 token budget 調大與調小，各犧牲誰、保護誰？什麼情況下官方建議把它調大？\n5. vLLM V1 的 preemption 為什麼選 recompute 而不是紙上更便宜的 swap？preemption 對尾延遲的雙重傷害是哪兩重？\n6. `max-num-seqs`、`max-num-batched-tokens`、`gpu-memory-utilization` 三個參數各控制曲線的哪個物理量？給你「ITL p99 規律尖刺且與長 prompt 到達相關」的症狀，你先動哪個？\n7. Throughput 與 goodput 的差別是什麼？為什麼一個 benchmark 冠軍配置可能 goodput ≈ 0？\n8. 你的服務 ITL p95 從 10 ms 變成陣發性的 300 ms，GPU utilization 正常。寫出你的診斷順序（提示：至少要查 preemption 計數、KV 使用率、長 prompt 相關性三件事）。\n\n## 延伸閱讀\n\n- [Orca: A Distributed Serving System for Transformer-Based Generative Models（OSDI 2022）](https://www.usenix.org/conference/osdi22/presentation/yu) — continuous batching 的源頭論文，iteration-level scheduling 與 selective batching 的原始定義，值得精讀第 3、4 節。\n- [Taming Throughput-Latency Tradeoff in LLM Inference with Sarathi-Serve（OSDI 2024）](https://arxiv.org/abs/2403.02310) — chunked prefill 與 stall-free batching 的論文，把本章「prefill 干擾」的量化分析做到極致。\n- [DistServe: Disaggregating Prefill and Decoding for Goodput-optimized LLM Serving（OSDI 2024）](https://arxiv.org/abs/2401.09670) — goodput 一詞的出處，也是 ch10 P/D 分離的理論前導。\n- [How continuous batching enables 23x throughput in LLM inference（Anyscale）](https://www.anyscale.com/blog/continuous-batching-llm-inference) — 把 Orca 機制講給工程師聽的經典部落格，benchmark 方法寫得誠實。\n- [vLLM 官方文件：Optimization and Tuning](https://docs.vllm.ai/en/stable/configuration/optimization/) — 本章三個參數與 preemption 行為的第一手調參指引，版本更新快，以此為準。\n- [vLLM 官方文件：Metrics 設計](https://docs.vllm.ai/en/stable/design/metrics/) — `num_preemptions_total`、`kv_cache_usage_perc` 等指標的定義與設計理由，ch14 的前菜。\n- [Inside vLLM: Anatomy of a High-Throughput LLM Inference System（Aleksa Gordić）](https://www.aleksagordic.com/blog/vllm) — 對 vLLM V1 引擎迴圈與排程器最完整的第三方解剖文，讀完本章再讀它，程式碼就看得懂了。\n- [5 steps to triage vLLM performance（Red Hat Developer, 2026-03）](https://developers.redhat.com/articles/2026/03/09/5-steps-triage-vllm-performance) — 用本章指標做生產診斷的實戰 runbook 範例。\n"}, {"id": "ch07-model-optimization", "file": "ch07-model-optimization.md", "group": "Part II — 推論引擎", "title": "ch07 — 模型壓縮與加速：quantization、speculative decoding、kernels", "md": "# ch07 — 模型壓縮與加速：quantization、speculative decoding、kernels\n\n> **本章解決什麼問題**：ch05 管好了 KV cache、ch06 把排程榨到極限之後，下一個問題是「同一張卡還能不能更快」。答案藏在三個武器裡：quantization 減少每個 token 要搬的 bytes、speculative decoding 讓每次搬運產出更多 token、kernel 優化把理論頻寬與算力真正用滿。三者全部建立在 ch02/ch03 的同一個物理事實上——decode 是 memory-bound。本章講原理、收益、代價與適用判斷；怎麼在 vLLM 上實際開這些開關是 ch08 的事，KV cache 自身的量化已在 ch05 講過。\n\n## 從你已知的出發\n\n這章的方法論你已經用了很多年。把 RDS CPU 尖峰降 40% 那次，你做的事情依序是：profiling 找瓶頸、改 SQL 減少不必要的工作量、把多次往返合併成批次、每改一步用數據驗證沒有改壞東西。本章三個武器跟那次優化一一對應，只是物件從資料庫換成 GPU：\n\n- **Quantization ≈ 圖片服務把 PNG 換成 JPEG quality 85**。肉眼幾乎無損，頻寬與儲存省好幾倍——但「幾乎」兩個字是有任務相依性的：照片沒事，截圖裡的小字會糊。模型量化一模一樣：聊天沒事，數學與長推理先壞。你也碰過反向的版本：金額欄位絕不敢用 FLOAT 存——精度什麼時候能犧牲、什麼時候不能，本來就是工程判斷，不是數學定理。\n- **Speculative decoding ≈ 樂觀鎖（optimistic concurrency control）**。悲觀鎖一步一停等；樂觀鎖先假設不衝突、大膽做完、提交時驗證、衝突就丟掉重做。你在 MySQL 上看過樂觀鎖的黑暗面：競爭一高，重試吃掉的資源比省下的還多，反而不如悲觀鎖。**speculative decoding 在高 batch 下收益變負，是同一個結構的故事**——這是本章最重要的反直覺重點，後面用數學講透。\n- **CUDA graphs ≈ prepared statement**。每條 SQL 都重新 parse + plan 是浪費，prepare 一次、execute 一萬次才對。GPU 上每個 kernel launch 都有固定的 CPU 開銷，decode 每步要 launch 幾百個 kernel——graph capture 就是把整步「prepare」起來，之後一次 launch 重放。\n- **FlashAttention ≈ 不要 materialize 那張中間結果表**。你重排過 SQL，讓資料庫不要把巨大的中間 JOIN 結果落地再讀回來。naive attention 會把 n² 的注意力矩陣寫進 HBM 再讀回來好幾趟，FlashAttention 的全部創新就是讓它從頭到尾不落地。\n\n一張地圖把三個武器釘在同一個公式上。ch02/ch03 證明過，decode 每生成一個 token 的時間下限 ≈ 要搬的 bytes ÷ 記憶體頻寬：\n\n```text\nt_token ≈ (權重 bytes + KV bytes) / 有效頻寬\n\nquantization          → 把分子變小（權重 bytes ÷2 ~ ÷4；KV 量化見 ch05）\nspeculative decoding  → 把分母變相變大（一次權重搬運產出 E 個 token）\nkernels / CUDA graphs → 把「有效頻寬」推近理論值、消掉公式之外的 overhead\n```\n\n三者疊加順序有講究，章末給完整建議。先從最常用、收益最確定的開始。\n\n## Quantization：精度是一種可以花的預算\n\n### 原理：精度、動態範圍與 outlier\n\n模型權重訓練完是 BF16/FP16，每個參數 2 bytes。量化就是用更少的 bits 表示同一組數字。難點不在「除以二」，在於兩個敵人：\n\n**動態範圍 vs 解析度的取捨**。INT8 只有 256 個格子，必須配一個 scale 把浮點數映射到格子上：`q = round(x / scale)`。scale 由這組數字的最大絕對值決定——於是一個離群的大值（outlier）會把 scale 撐大，讓其他 99% 的正常值全擠在少數幾個格子裡，解析度崩潰。這就是 **outlier 問題**，量化文獻一半的篇幅都在跟它纏鬥。\n\nLLM 的殘酷之處：權重的分布相對乖（鐘形、對稱），**activation 卻天生長 outlier**——研究發現大模型的 activation 有少數通道的數值比其他通道大上百倍，而且這些通道還很重要、不能砍。對策是把 scale 的粒度切細：per-tensor → per-channel → per-group（每 128 個權重共享一個 scale，GPTQ/AWQ 的標準做法），讓 outlier 只污染自己那一小組。\n\n**浮點格式是另一條路**。FP8 E4M3 用 4 個 exponent bits 換來大動態範圍，格子在零附近密、遠處疏——剛好貼合權重和 activation 的分布形狀，天生比 INT8 抗 outlier。這是「FP8 幾乎免費」而 INT8 activation 量化需要 SmoothQuant 之類技巧搬運難度的根本原因。FP4 更極端：每個數只剩 16 個可能值，必須靠 microscaling（每 16~32 個元素一個高精度 scale）才能用——NVFP4（NVIDIA 私有，16 元素一個 FP8 scale）與 MXFP4（OCP 開放標準，32 元素一個 2 的冪次 scale）都是這個思路（2026-06）。\n\n**Calibration**：大部分量化方法需要拿幾百條代表性樣本跑一遍模型，收集 activation 統計來決定 scales——GPTQ 進一步用二階資訊逐層補償量化誤差，AWQ 用 activation 大小找出「重要權重通道」加以保護。Murphy 提醒：calibration 集跟生產流量不像（用英文百科校準、上線跑中文程式碼），品質會在你的 eval 沒覆蓋的地方悄悄塌掉。\n\n### Weight-only vs weight+activation：兩本不同的帳\n\n這是量化決策的第一個分岔，搞混它會做出反向的選擇：\n\n| | **W4A16（weight-only）**<br>GPTQ / AWQ INT4 | **W8A8（weight+activation）**<br>FP8 / INT8 |\n|---|---|---|\n| 權重存什麼 | INT4（0.5 bytes/參數） | FP8/INT8（1 byte/參數） |\n| 計算用什麼 | 讀進來**反量化回 FP16 再算**，用的是 BF16 tensor core | **直接用 FP8/INT8 tensor core 算**，算力翻倍 |\n| 省到哪本帳 | 容量 ÷4、權重頻寬 ÷4；**算力不省，還多付 dequant** | 容量 ÷2、頻寬 ÷2、**算力 ×2** |\n| 受益場景 | memory-bound：低併發 decode、單卡裝大模型 | 全場景，尤其 compute-bound：prefill、高併發大 batch |\n| 硬體需求 | 無特殊（Ampere 以上有高效 dequant kernel） | FP8 需 Hopper/Ada 以上；INT8 需 Turing 以上 |\n\n關鍵洞察：**weight-only 量化的收益完全來自 memory-bound 的那一側**。batch 開大之後 decode 的算力佔比上升（ch06 算過），prefill 更是純 compute-bound——這時 W4A16 不但不加速，反量化的額外計算還會倒貼。ACL 2025 一份做了 50 萬次以上評測的系統性研究給出的結論與此一致：同步低併發場景 W4A16 最划算，高併發 continuous batching 場景 W8A8 全面勝出。\n\n### 硬體支援對照（2026-06）\n\n量化格式是硬體世代的函數，買錯卡開不了：\n\n| 格式 | 最低硬體 | 2026-06 現況 |\n|---|---|---|\n| INT8 tensor core | Turing（2018）以上 | 到處都能跑，但 LLM 上已被 FP8 取代為主流 |\n| INT4 weight-only（GPTQ/AWQ） | 無硬體要求（Ampere+ 有 Marlin 等高效 kernel） | 成熟，HF 上海量現成 checkpoint |\n| FP8（E4M3/E5M2） | Hopper（H100）、Ada（L4/L40S）以上；AMD MI300 系亦支援 | **生產預設選項**，vLLM/SGLang/TRT-LLM 全面支援；DeepSeek 等旗艦直接用 FP8 訓練 |\n| NVFP4 | Blackwell（B200/B300）專屬 | TensorRT-LLM 路徑最成熟，vLLM 支援 dense 與 MoE；NVIDIA 宣稱精度損失 <1%（廠商數字，依模型而異） |\n| MXFP4 | OCP 開放格式，Blackwell 原生支援 | 代表作：gpt-oss 權重原生以 MXFP4 發布 |\n\n表格的「最低硬體」指的是**原生 tensor core 計算**。weight-only 的 FP4 checkpoint 在更舊的卡上通常也跑得動——kernel 把 4-bit 權重讀進晶片後解壓回 BF16/FP8 再算（gpt-oss-120b 能塞進單張 H100 跑，走的就是這條路）。decode 是 memory-bound（ch02），權重縮小本身就賺到頻寬，解壓的算力開銷多半藏得進記憶體等待裡；要到 activation 也用 FP4、吃到算力那一份翻倍，才真的需要 Blackwell。\n\n另一條平行宇宙是 **GGUF / llama.cpp 生態**：Q4_K_M、Q8_0 這些 K-quants 是為 CPU 與 Apple Silicon 設計的塊狀量化格式，跟上面的 GPU serving 棧是兩條血緣（定位見 ch08）。你的 M1 跑的就是這條線——本章動手做會用它親手驗證量化的 roofline 效應。\n\n還有一個 2026 年的結構性轉變值得記住：**量化正在從「部署時的後處理」變成「訓練時的內建屬性」**。DeepSeek 用 FP8 訓練、gpt-oss 原生 MXFP4 發布、Kimi K2.6 原生 INT4（量化感知訓練，發布即 INT4，無 PTQ 損失）（2026-06）。對 infra 工程師的含意：拿到原生低精度 checkpoint 時，直接用官方格式，不要自作聰明再量化一次或「升回」FP16——官方格式就是品質基準本身。\n\n### 品質評估：perplexity 不夠，免費午餐有邊界\n\n量化論文最愛報 perplexity，但它對所有 token 取平均——少數關鍵 token 的錯誤（一步算錯的算術、一個寫反的條件判斷）會被海量無關緊要的 token 稀釋。生產決策必須用**任務型 eval**：數學（GSM8K 級以上）、程式碼、長上下文檢索、你自己業務的 golden set。\n\n業界共識的退化順序（哪裡先壞）：**數學與多步推理最先**（誤差沿著自迴歸生成鏈逐 token 累積，鏈愈長放大愈狠——reasoning 模型的長思考鏈對量化最敏感）、**低資源語言其次**（calibration 語料多半是英文）、長尾知識與嚴格格式輸出再次；日常對話與摘要最耐操。截至我能確認的研究（2026-06）：FP8 W8A8 在 Llama 系列上「effectively lossless」、INT8 掉 1~3%、INT4 W4A16 平均上逼近 8-bit——但這些是平均數，你的尾部任務不在平均裡。\n\n決策框架收斂成一張表：\n\n| 你的情況 | 建議 | 代價 |\n|---|---|---|\n| Hopper/Ada 以上、通用流量 | **FP8 W8A8，直接上**（業界預設） | 接近零；仍要 eval gate |\n| 卡數是硬約束（70B 想塞單卡） | INT4 W4A16（AWQ/GPTQ 現成 checkpoint） | 數學/推理品質風險，高 batch 吞吐打折 |\n| Blackwell 卡、追極限密度 | 評估 NVFP4 | 工程還在快速演進期，eval 要做足 |\n| 模型有官方低精度版（K2.6 INT4、gpt-oss MXFP4） | 用官方 checkpoint | 幾乎沒有，這是送分題 |\n| 品質敏感業務（數學、法律、程式碼生成核心路徑） | FP8 為底線，INT4 需逐任務驗證 | 多花卡錢買確定性 |\n| M1 / 邊緣 | GGUF Q4_K_M 起跳 | 本地玩具線，決策邏輯相同 |\n\n## Worked example：70B 的三種精度，一張完整對照表\n\n把 ch02 的 roofline 方法完整接過來，算 Llama-3.3-70B（70.6B 參數，dense）在 H100 SXM（80 GB、3.35 TB/s）上的三種精度。引擎可用記憶體 = 80 × 0.9（`gpu-memory-utilization`，ch06）= 72 GB/卡，每卡再保留約 4 GB 給 activation 工作區與 CUDA graphs。\n\n**Step 1：權重記憶體。** 70.6B × bytes/參數：FP16 = **141.2 GB**、FP8 = **70.6 GB**、INT4 = **35.3 GB**。\n\n**Step 2：卡數——「裝得下」不等於「跑得動」。** 這步藏著本例最重要的陷阱：\n\n- **FP16**：141.2 GB > 72 GB，至少要切兩張。但 TP2 時每卡權重 70.6 GB，KV 池 = 72 − 70.6 − 4 < 0——**權重裝得下，KV 池歸零，一條請求都服務不了**。實務最低是 **TP4**：每卡 35.3 GB 權重，全機 KV 池 ≈ 4 × (72 − 35.3 − 4) ≈ **131 GB**。\n- **FP8**：70.6 GB < 72 GB，單卡「裝得下」——但 KV 池同樣歸零（ch02 算 47 tok/s 那次只算了頻寬帳，這裡補上容量帳）。實務是 **TP2**（KV 池 ≈ 65 GB）或單卡 H200（ch05 的 worked example 就是這個配置）。\n- **INT4**：35.3 GB，**單卡成立**，KV 池 ≈ 72 − 35.3 − 4 ≈ **33 GB**。\n\n**Step 3：理論 decode 上限（batch=1，只算權重流量，ch02 方法）。** TP 的聚合頻寬 = 卡數 × 3.35 TB/s（忽略卡間通訊，實際更低，見 ch09）：\n\n- FP16 TP4：13.4 TB/s ÷ 141.2 GB ≈ **95 tok/s**\n- FP8 TP2：6.7 TB/s ÷ 70.6 GB ≈ **95 tok/s**\n- INT4 單卡：3.35 TB/s ÷ 35.3 GB ≈ **95 tok/s**\n\n三個配置殊途同歸。這不是巧合：bytes 和頻寬同比例縮放，比值不變。**結論值得默寫：quantization 在 batch=1 買不到更快的單請求速度——它買的是密度，同樣的速度用 1/4 的卡達成。**\n\n**Step 4：品質與算力面。** FP8 的 tensor core 算力是 BF16 的兩倍（1,979 vs 989 TFLOPS）→ prefill 也加速、TTFT 受益；INT4 W4A16 用 BF16 算力再付 dequant 稅 → prefill 持平甚至略慢。\n\n完整對照表：\n\n| | FP16/BF16 | FP8（W8A8） | INT4（W4A16） |\n|---|---|---|---|\n| 權重記憶體 | 141.2 GB | 70.6 GB | 35.3 GB |\n| 最少可行配置 | **4×H100（TP4）** | **2×H100（TP2）**或 1×H200 | **1×H100** |\n| 全機 KV 池（約） | 131 GB | 65 GB | 33 GB |\n| batch=1 理論 decode 上限 | ≈95 tok/s | ≈95 tok/s | ≈95 tok/s |\n| prefill 算力 | 989 TFLOPS ×4 卡 | 1,979 TFLOPS ×2 卡 | 989 TFLOPS ×1 卡＋dequant 稅 |\n| 品質風險 | 基準 | 幾乎無損（研究與業界共識，2026-06） | 平均近 8-bit，但數學/長推理/小語種先壞，需任務型 eval |\n| 租金（H100 約 $2~3/hr 級距，2026 年中快照） | ~$8–12/hr | ~$4–6/hr | ~$2–3/hr |\n\n三個讀法：\n\n1. **同樣的單請求速度，4:2:1 的月帳單**——這就是「LLM serving 是 memory 的生意」在成本表上的長相。\n2. **但併發容量不是 4:2:1**。FP16 TP4 的 KV 池有 131 GB，INT4 單卡只有 33 GB——拿 ch03 的數字（32k context ≈ 10.7 GB/條），前者同時服務 12 條長對話，後者 3 條。如果你的瓶頸是併發而非密度，比較該用「每美元的 goodput」而不是每美元的卡（ch13/ch16 接手這本帳）。\n3. **高併發吞吐場景，FP8 幾乎全面優於 INT4**：算力翻倍、無 dequant 稅、品質風險低一級。INT4 的主場是「卡數受限」與「低併發 latency-bound」。\n\n## Speculative decoding：用閒置的算力換 token\n\n### 機制：draft–verify\n\ndecode 的荒謬之處 ch02 算過：batch=1 時搬 70 GB 權重只為了算 2 FLOP/byte，tensor core 利用率 0.3%。算力大量閒置——speculative decoding 就是把這些閒置算力變現的方法。\n\n兩個角色：**draft**（便宜的猜測者）一口氣猜 γ 個 token；**target**（你真正要服務的模型）用**一次** forward 同時驗證這 γ 個位置——這一步像個迷你 prefill，γ 個 token 平行計算，權重只搬一輪。逐位置比較 draft 與 target 的機率分布，用 rejection sampling 決定接受到第幾個；被拒絕的位置由 target 的分布重新抽樣補上一個正確 token，全部接受則再白拿一個 bonus token。\n\n```text\n一般 decode：每搬一輪 70 GB 權重 → 產出 1 個 token\n  [target]→t1  [target]→t2  [target]→t3  [target]→t4\n\nspeculative（γ=4）：每搬一輪權重 → 產出 1~5 個 token\n  [draft×4]→ d1 d2 d3 d4\n  [target 驗證 5 個位置（一次 forward）]→ 接受 d1 d2 d3、拒絕 d4、補發 t4\n  → 這一步淨產出 4 個 token，權重只搬了一輪\n```\n\n數學上有個漂亮的保證：rejection sampling 讓輸出分布**與 target 單獨生成完全相同**——這不是「近似加速」，是無損加速（工程上仍受浮點不可結合性影響，見 ch03）。它沒有違反 ch03 「自迴歸必須一個一個生成」的鐵律，而是繞過它：順序性留給便宜的 draft，昂貴的 target 只做可平行的驗證。\n\n### Acceptance rate 的數學\n\n設每個 draft token 被接受的機率為 α（簡化為獨立同分布），一次猜 γ 個。一步「draft + 驗證」的期望產出：\n\n```text\nE[每次驗證產出的 token 數] = (1 − α^(γ+1)) / (1 − α)\n```\n\n（推導：接受前 i 個、第 i+1 個被拒的機率是 αⁱ(1−α)，產出 i+1 個；全收機率 α^γ，產出 γ+1 個。求和即得。）把數字攤開：\n\n| α \\ γ | 2 | 4 | 8 | 極限 1/(1−α) |\n|---:|---:|---:|---:|---:|\n| 0.6 | 1.96 | 2.31 | 2.47 | 2.5 |\n| 0.7 | 2.19 | 2.77 | 3.20 | 3.33 |\n| 0.8 | 2.44 | 3.36 | 4.33 | 5.0 |\n| 0.9 | 2.71 | 4.10 | 6.13 | 10.0 |\n\n兩個結構性結論。第一，**γ 有飽和點**：E 的上限是 1/(1−α)，γ 拉大收益快速遞減（第 i 個猜測活到驗證的機率是 αⁱ，指數衰減），但成本線性上升——γ 超過 4~8 幾乎都是浪費。第二，**α 是一切**：α 從 0.6 拉到 0.9，極限收益從 2.5 翻到 10。整個領域的演化史就是把 α 推高的歷史。\n\n端到端加速比（低 batch、memory-bound 時）：`S ≈ E / (γ·c + 1)`，c 是 draft 與 target 的單步耗時比。α=0.8、γ=4、c=0.05（EAGLE 級輕量 draft）：S = 3.36 / 1.2 = **2.8×**——與公開實測的 2~2.5× 量級吻合。\n\n### 方案光譜：把 α 推高的四代演化（2026-06）\n\n| 方案 | draft 從哪來 | 成本 | 特性 |\n|---|---|---|---|\n| **n-gram / prompt lookup** | 從 context 裡找重複 n-gram 接龍，零模型 | ≈0 | α 看流量吃飯：RAG 引用、文件改寫、code edit 這類高複製率流量 α 極高，自由生成則趨近 0。免費，先試它 |\n| **獨立小模型** | 同家族小模型（70B 配 1B） | 要部署、要記憶體，詞表必須相容 | 經典做法（2023），α 中等，運維兩個模型，漸被取代 |\n| **EAGLE-3 / 3.1** | 接在 target hidden states 上的輕量自迴歸 head，樹狀多分支猜測 | c 極小；要訓練（SpecForge/TorchSpec 生態） | 2026 年 draft-based 的主流。EAGLE-3 學術基準報 4~6×，真實流量約 2×；EAGLE 3.1（2026-05）修長序列的 attention drift |\n| **MTP（multi-token prediction）** | 模型自帶：訓練時就多一個預測下下個 token 的 head，隨權重發布 | 零額外整合 | DeepSeek 開的路（V3 報告：第二 token 接受率 85~90%）；γ=1 但 α 極高，大規模 serving 存活力最強，2026 年旗艦開源模型的標配 |\n\n（Medusa 等多平行 head 的方案是 2024 年的過渡型，已被 EAGLE 系取代，一句話帶過。）vLLM 對 n-gram、EAGLE-3、MTP 都有支援，SGLang 的 Speculative Decoding V2 已預設開啟（2026-06；參數操作見 ch08）。\n\n### 反直覺重點：高 batch 下收益遞減，甚至為負\n\n這是本章必須講透的一段，因為它推翻「加速技術疊上去總是更快」的直覺，也是面試的高頻陷阱題。\n\n**直覺版**：speculative decoding 的收益是用**閒置算力**買的。但 ch06 講過，batching 也是在用同一口井——把更多請求的 token 塞進同一輪權重搬運，本質上同樣是把 memory-bound 的閒置算力變現。低 batch 時井是滿的，spec decode 白拿；高 batch 時井已經被 batching 抽乾，spec decode 再伸手，搶的就是其他請求的算力。樂觀鎖在高競爭下輸給悲觀鎖，一模一樣的結構。\n\n**Roofline 版**：batch B 的一個普通 decode 步，記憶體流量 ≈ 權重 + B 份 KV，計算量 ≈ 2P·B。開了 γ 步猜測的驗證步呢？計算量變成 **2P·B·(γ+1)**（每條請求驗 γ+1 個位置），記憶體流量卻幾乎不變（權重照樣搬一輪，KV 讀取由 γ+1 個 query 共享）。等效於把 arithmetic intensity 乘上 (γ+1)——**你會比原本提早 (γ+1) 倍撞上 roofline 的 compute 屋頂**。\n\n**極限數學**：當系統徹底 compute-bound，每步耗時正比於處理的 token 數。普通 decode 每單位算力產出 1 個 token；spec decode 花 (γ+1) 個 token 的算力產出 E 個。吞吐比：\n\n```text\ncompute-bound 極限下：spec decode 吞吐 / baseline 吞吐 = E / (γ+1) ≤ 1\n（等號只在 α=1 成立）\n```\n\n代入數字，殘酷得很直白：\n\n| 配置 | E | E/(γ+1) | 高 batch 極限下的吞吐變化 |\n|---|---:|---:|---|\n| α=0.7、γ=4（典型獨立 draft） | 2.77 | 0.55 | **−45%** |\n| α=0.8、γ=4（不錯的 EAGLE） | 3.36 | 0.67 | −33% |\n| α=0.9、γ=2 | 2.71 | 0.90 | −10% |\n| α=0.85、γ=1（MTP） | 1.85 | 0.93 | −7% |\n\n每一個被拒絕的 token 都是付了全價算力的廢品。低 batch 時廢品免費（反正算力閒著），高 batch 時每件廢品都排擠一個別人的正經 token。看出 MTP 的設計智慧了嗎：γ=1、α 極高，把「最壞情況的浪費」壓到 7%——**這是 γ=1 方案在大規模 serving 中存活力最強的數學原因**。也看出為什麼把 γ 開大是高併發下的自殺：γ=8 在低 batch 的表上很美，在這張表上是災難。\n\n**實證對齊**（2026-06）：vLLM 官方 blog 的 EAGLE 3.1 on Kimi K2.6 數據——單使用者 2.03×、4 併發掉到 1.71×、16 併發 1.66×，單調遞減；學術側的系統性測量（如《Batch Speculative Decoding Done Right》《Speculative Decoding: Performance or Illusion?》）更直接量到生產引擎在高 batch 下 spec decode **低於不開的 baseline**。廠商展示永遠用 batch=1 跑分，你的生產環境不是 batch=1——這句話值得貼在牆上。\n\n**一個重要例外（長 context）**：上面的推導假設高 batch 必然走向 compute-bound，但 ch03 講過，長 context 下 KV 讀取主宰流量、且隨 B 線性增長——系統**停留在 memory-bound**，每步的固定成本從「權重」變成「權重+大量 KV」，而驗證步照樣把這筆固定成本攤提給 E 個 token。MagicDec（2024）正是抓住這點：只要 draft 自己不付完整 KV 帳（用 sparse/截斷 KV 的 draft），長序列場景在 batch 32~256 仍量到最高 2.5× 加速。所以精確的判斷準則不是「batch 大就關」，而是：**驗證步是否 compute-bound**。\n\n最後一個容易踩的觀測坑：spec decode 讓 token 以「一坨一坨」的節奏到達（每次驗證吐出 1~γ+1 個），平均 ITL 變好但分布變成多峰——benchmark 工具與 SLO 定義要意識到這件事（ch14）。\n\n### 決策框架：什麼流量才划算\n\n| 流量形態 | 建議 | 原因 |\n|---|---|---|\n| 低併發、latency 敏感（內部工具、code completion、付費低延遲 tier） | **開**，EAGLE-3/MTP，γ=2~4 | 算力大量閒置，2× 級收益接近免費 |\n| RAG / 文件改寫 / code edit（輸出大量複製輸入） | 先試 **n-gram**，零成本 | 高複製率流量 α 天然高，不用訓練任何東西 |\n| 高併發吞吐型（batch 常態 >64、短 context） | **關**，或只留 MTP（γ=1） | 驗證步 compute-bound，E/(γ+1) 數學直接判死刑 |\n| 長 context 重的高併發（agentic、長文件） | 量測後再說：KV-bound 時仍可能划算 | MagicDec 機制；以「驗證步是否 compute-bound」為準 |\n| 模型自帶 MTP head（DeepSeek/Kimi 系） | 預設開著，監控 acceptance | 官方訓練的 head，α 有保證，整合成本為零 |\n\n橫切所有場景的紀律：**監控 acceptance rate**（vLLM 有對應 metrics，ch14）。α 是流量分布的函數——draft 用英文 chat 訓練、流量轉成中文程式碼，α 無聲下滑，吞吐悄悄退化，沒有任何錯誤碼。\n\n## Attention kernels：把理論頻寬真正用出來\n\n### FlashAttention：IO-aware 的意義\n\n前兩個武器改的是「要做多少工作」；kernel 優化改的是「做同樣的工作要搬多少次記憶體」。最好的教材就是 attention。\n\nnaive attention 的帳：算 S = QK^T 得到 n×n 矩陣，**寫進 HBM**；讀回來做 softmax，**再寫回去**；再讀回來乘 V。對 8k 序列、64 heads 的一層：8192² × 2 bytes × 64 ≈ **8.6 GB 的中間結果**——單一序列、單一層！這些流量在數學上完全不必要，純粹是實作偷懶的代價，而且它讓 attention 在 prefill 階段也變成 memory-bound——明明 roofline 上它該是 compute-bound。\n\nFlashAttention（2022）的全部創新一句話：**把 Q/K/V 切成小塊裝進 SM 的 shared memory，用 online softmax 邊算邊歸一化，n² 矩陣從頭到尾不落地 HBM**。這就是 IO-aware 的意思——演算法複雜度沒變（還是 O(n²) FLOPs），變的是記憶體階層之間的往返次數。你對這個套路不陌生：把計算推進資料旁邊做、不要 materialize 中間結果表，資料庫優化器三十年前就在做同一件事。\n\n注意收益的不對稱：**FlashAttention 主要救 prefill**。decode 的 attention 每步只有一個 query token，沒有 n² 矩陣可省，瓶頸是讀 KV 本身——那是「必要流量」，kernel 救不掉（能救它的是 GQA/MLA 這類架構手段與 KV 量化，見 ch03/ch05）。decode 端的對應優化是 FlashDecoding 一類的 split-KV 技巧：把一條長 KV 切段平行處理，解決「batch 小、context 長」時 GPU 佔用不足的問題。\n\n世代演進緊貼硬體（這正是 kernel 工程的本質）：FA-2（2023）重做平行化與 work partitioning，約 2× 於初代；FA-3（2024）綁定 Hopper 的 TMA 與 warp specialization，H100 上再快 1.5~2×，並支援 FP8；Blackwell 世代有對應的新版本（截至我能確認的資訊（2026-06），vLLM 在 Hopper 上預設 FA-3、Blackwell 上有 FA-4 與 TRT-LLM/FlashInfer kernel 等多後端並存）。**kernel 是貼著特定硬體的記憶體階層手寫的**，換一代卡就要重寫一次——這也是它值錢的原因。\n\n### FlashInfer 與 kernel fusion\n\n**FlashInfer** 解的是另一個層次的問題：FlashAttention 是「一個極致的 kernel」，FlashInfer 是「為 LLM serving 設計的 kernel 庫」——原生理解 paged KV（直接吃 ch05 的 block layout）、ragged batch（ch06 裡每條請求長度不一的現實）、JIT 按模型形狀特化 kernel，還覆蓋 MLA、sampling 等周邊。它拿了 MLSys 2025 的最佳論文，NVIDIA 深度投入，是 vLLM 在新硬體上的重要 attention backend（2026-06）。一句話定位：FlashAttention 證明了 IO-aware 能做到什麼，FlashInfer 把這件事工程化成 serving 的基礎設施。\n\n**Kernel fusion** 是同一個思想的小規模版本：transformer 每層有一串小操作（RMSNorm、殘差相加、SiLU×gate……），每個若是獨立 kernel，中間 activation 就要寫出 HBM 再讀回。把相鄰操作融成一個 kernel，中間值留在 register/SMEM——每融一次省一來一回的 HBM 流量加一次 launch。手寫 fusion 是體力活，所以交給編譯器：torch.compile 自動做這類融合並生成 Triton kernel（下節）。\n\n你大概永遠不會手寫這些 kernel，但作為 infra 工程師有三件實務責任：(1) 啟動時**確認引擎選到了對的 backend**（啟動日誌會印，選錯或 fallback 到通用路徑可能慢 2 倍而不報任何錯）；(2) 看懂「某 backend 不支援某格式/某卡 → 靜默 fallback」這類效能懸崖；(3) 維護 FlashInfer/CUDA/PyTorch/driver 的版本相容矩陣——這是 ch04 說過的、你真正會碰到 CUDA 生態的方式。\n\n## CUDA Graphs 與 torch.compile：消掉 launch overhead\n\n最後一個武器處理的是公式之外的開銷。一個 decode step 要 launch 幾百個 kernel，每次 launch 有微秒級的 CPU 端固定成本（構造參數、提交佇列）。70B 模型一步幾十 ms，這點開銷是噪音；但 8B 模型一步 5~6 ms（ch06 的曲線），幾百個 launch 的 CPU 時間就能跟 GPU 計算時間同量級——**GPU 開始空轉等 CPU 餵活**。症狀很有辨識度：nvidia-smi 利用率反而不高、ITL 比 roofline 推算高出一截、CPU 單核吃滿。模型越小、卡越快，這個問題越尖銳——這正是「小模型放 H100 上跑不滿」的常見原因之一。\n\n**CUDA Graphs** 的解法就是 prepared statement：第一次把整步的幾百個 kernel 與依賴關係 capture 成一張圖，之後每步一次 launch 重放整圖，CPU 成本從「幾百次」攤平成「一次」。代價是三個約束，每個都會在生產咬人：\n\n1. **形狀必須固定**。graph 是按確切的 batch size/序列佈局錄製的，所以引擎按 bucket capture（batch 1、2、4、8……），實際 batch 向上 padding 到最近的 bucket。bucket 沒覆蓋到的形狀 fallback 回逐 kernel 執行——「為什麼 batch 在某個區間 ITL 突然高一截」的標準答案。\n2. **吃記憶體**。每張 capture 的圖都佔 HBM，這就是 ch06 提醒 `gpu-memory-utilization` 別開太貪的原因之一。\n3. **吃啟動時間**。capture 在引擎啟動時做，是 cold start 帳單裡的一段（ch12 會完整解剖）。\n\n**torch.compile** 在推論引擎裡扮演的角色是 CUDA Graphs 的搭檔而非替代：它負責圖層級的 kernel fusion 與程式碼生成（產出 Triton kernels），graphs 負責消 launch。vLLM V1 的預設形態是兩者的組合——torch.compile 編譯模型，配 **piecewise CUDA graphs**：把 attention 留在圖外（paged attention 的動態記憶體存取與圖的靜態性合不來），其餘部分 graph 化，兼顧收益與彈性；SGLang 自 0.5.10 起同樣以 piecewise 為預設（2026-06）。對你的含意：這些是引擎預設，你的工作不是「開啟」它們，而是**確認它們沒有因為某個參數組合而靜默失效**，以及在小模型場景知道往這裡查。\n\n## 優化疊加的順序：一條務實的路徑\n\n三個武器講完，最後的問題是順序。原則跟你做 RDS 優化時一字不差：**一次動一個變數，每步用數據驗證速度與品質，可回滾**。具體建議：\n\n```text\nStep 0  量測 baseline（ch14 方法論）：\n        latency-throughput 曲線、MBU/MFU、確認瓶頸（roofline，ch02）\nStep 1  確認免費項沒漏：attention backend 選對了嗎？CUDA graphs 生效了嗎？\n        prefix caching 開了嗎（ch05）？——預設不是優化，但「預設失效」是負優化\nStep 2  FP8（Hopper/Ada 以上）：容量、頻寬、算力三贏，品質風險最低\n        → 跑任務型 eval gate，過了才算數\nStep 3  還缺容量才上 INT4（或直接用官方原生低精度 checkpoint）\n        → 高併發場景先 benchmark dequant 稅；eval 加測數學/推理\nStep 4  最後才是 speculative decoding，而且只在流量形態合適時：\n        低併發/latency-bound/高複製率 → 開；高併發 compute-bound → 關或僅 MTP\n        → 監控 acceptance rate 與 goodput，不是只看 demo 的 batch=1 數字\n```\n\n為什麼是這個順序：**收益確定性遞減、風險遞增、且後面的步驟依賴前面的狀態**。最後一點最容易被忽略——量化會改變 target 的輸出分布，你的 EAGLE draft 是對著 BF16 的 target 訓練的，target 換成 INT4 之後 α 會掉；先定精度、再配 draft，順序反了就要返工。也別忘了每一步的交互：FP8 權重與 FP8 KV（ch05）是兩個獨立開關、spec decode 與 chunked prefill 共享 token budget（ch06）——疊加不是免費的線性加法。\n\n## 故障模式與防禦\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| 量化品質退化 | **零錯誤碼**，使用者說「變笨了」；數學/程式碼任務先壞 | 任務型 eval 基線對比；業務指標（重答率、人工升級率） | eval gate 進發布流程（ch15）；calibration 集對齊生產流量；敏感任務 FP8 底線 |\n| 量化反而變慢 | 上了 INT4 吞吐不升反降 | 高併發 benchmark 對比；profiler 看 dequant kernel 佔比 | 理解 W4A16 vs W8A8 的帳；換格式前後各跑一條 latency-throughput 曲線 |\n| 硬體不支援的格式 | 引擎 fallback 到模擬路徑或直接起不來 | 啟動日誌；同 config 在不同卡型上效能差數倍 | 部署前查硬體支援矩陣（FP8 需 Hopper/Ada+、NVFP4 需 Blackwell） |\n| acceptance rate 漂移 | 吞吐數週內悄悄下滑，無任何錯誤 | spec decode acceptance metrics 趨勢；分流量類型看 α | 流量畫像變更（新語言/新任務）時重評 draft；告警掛在 α 上 |\n| spec decode 高峰負收益 | 尖峰時段開著 spec decode 的池子 goodput 反而低 | 對比實驗：同流量開/關 spec decode 的 goodput | 高併發池關閉或僅 MTP；理解 E/(γ+1) 的數學再做容量規劃 |\n| draft/target 版本錯配 | 換了 target 模型沒換 draft，α 崩到接近 0，ITL 暴增 | 部署後 α 驟降 | 部署清單把 draft 與 target 綁成同一個 artifact 版本 |\n| CUDA graph bucket 失配 / capture 失敗 | 特定 batch 區間 ITL 跳高；或啟動時 OOM | ITL 按 batch size 切片；啟動日誌的 capture 清單 | 留記憶體餘裕；壓測覆蓋真實 batch 分布；升級引擎後重跑效能回歸 |\n| kernel backend 靜默 fallback | 升級 CUDA/PyTorch 後整體慢 1.5~2 倍，無錯誤 | 啟動日誌 grep backend 名稱；版本升級前後 benchmark | 把「backend 斷言」寫進部署 smoke test；維護版本相容矩陣 |\n\n共同主題你應該已經看出來了：**這一章的故障幾乎全是靜默的**。沒有 5xx、沒有 exception，只有變慢和變笨。防禦手段也因此高度一致——基線、對比、回歸測試，全是你在效能工程裡用了多年的紀律，只是把「壓測報告」換成「eval + benchmark 雙基線」。\n\n## 動手做\n\n### Lab 7-1 [M1]：用 llama.cpp 親手驗證量化的 roofline 效應\n\n1. 下載同一個 8B 級模型的 Q4_K_M 與 Q8_0 兩種 GGUF（如 Hugging Face 上的 Qwen 或 Llama 系 GGUF 倉庫）。\n2. 跑 `llama-bench -m model-Q8_0.gguf -m model-Q4_K_M.gguf -p 512 -n 128`，分別記錄 pp（prefill）與 tg（decode）速度。\n3. 對兩個版本各丟 5 題小學數學應用題與 5 題常識問答，肉眼對比品質。\n\n**成功標準**：tg（decode）速度比 ≈ 檔案大小的反比（Q4 約為 Q8 的 1.7~2 倍），而 pp（prefill）差距明顯小——你剛親手證明了「量化加速的是 memory-bound 的部分」；同時在數學題上觀察到 Q4 的錯誤率肉眼可見地高於 Q8（樣本小，僅作直覺校準）。\n\n### Lab 7-2 [M1]：體驗 speculative decoding（示意）\n\nllama.cpp 內建 speculative 工具（binary 名稱隨版本變動，以 `llama.cpp` 當前文件為準）：用同家族的小模型當 draft（如 0.5B 配 7B），對兩種 prompt 各跑一次——「逐字複述以下文章並修正錯字」（高複製率）vs「寫一首原創詩」（自由生成），對比輸出的 accepted 統計與 tok/s。\n\n**成功標準**：複述任務的 acceptance 與加速顯著高於自由生成——α 是流量的函數，不是模型的常數。\n\n### Lab 7-3 [租 GPU，估 $5–8]：vLLM 上 FP8 vs BF16 的誠實對比\n\n1. 租一張 H100 或 L40S（FP8 需 Hopper/Ada 以上），起 vLLM 跑 8B 模型 BF16 baseline，用 `vllm bench serve` 量 latency-throughput 曲線。\n2. 同模型換 FP8（可用線上動態量化或 llm-compressor 預量化 checkpoint），重跑同一條曲線。\n3. 用 lm-eval 跑一個小型數學子集（如 GSM8K 取樣 200 題），對比兩版分數。\n4. 用完即關機（成本紀律，ch08 有完整 checklist）。\n\n**成功標準**：拿到兩條可疊放的曲線與一組 eval 分數，能用一段話回答「FP8 在我的 workload 上換到了什麼、付出了什麼」——這個「曲線+eval 雙證據」的格式就是你以後在生產做任何優化決策的模板。\n\n### Lab 7-4 [紙上推演]：acceptance rate 與高 batch 的判決\n\n給定 α=0.75、γ∈{1,2,4,8}：(1) 算出各 γ 的 E 與低 batch 加速比（c=0.05）；(2) 算出 compute-bound 極限下的吞吐比 E/(γ+1)；(3) 對兩種服務做出開/關與 γ 的選擇並辯護：a) 內部 code review 工具，併發 <4；b) 對外 API，尖峰 batch 128、平均 context 1k。\n\n**成功標準**：a 選 γ=4 上下、b 選關閉（或論證 MTP γ=1 的邊際合理性）；能說出 b 如果平均 context 是 64k 答案為什麼可能反轉。\n\n## 這個領域往哪走\n\n短期 1~3 年的三條線。**量化收斂進訓練**：旗艦模型原生低精度發布（FP8 訓練、INT4 QAT、MXFP4）會讓「部署團隊自己做 PTQ」逐漸變成只有長尾模型才需要的技能，infra 端的工作從「怎麼量化」轉成「怎麼驗證與服務官方低精度格式」。**Speculative decoding 標準化**：MTP head 隨模型發布已成旗艦標配，draft 的訓練與分發（SpecForge/TorchSpec 生態）平台化，動態開關（按池子負載自動調 γ 甚至關閉）會進引擎排程器——你在本章學的 E/(γ+1) 數學正是那個自動決策的內核。**Kernel 自動化**：torch.compile、FlashInfer JIT、各家 DSL 持續壓縮手寫 kernel 的領域，但「會讀 roofline、會判斷 backend 對不對」的診斷能力反而更值錢——工具會生成 kernel，不會替你發現它 fallback 了。\n\n## 自我檢核\n\n1. Weight-only（W4A16）與 weight+activation（W8A8）各省哪幾本帳（容量/頻寬/算力）？為什麼高併發吞吐場景 W4A16 可能反而比 W8A8 慢？\n2. Outlier 為什麼是 INT 量化的核心難題？per-group scaling 和 FP8 的格式設計分別從什麼角度緩解它？\n3. 默寫 E = (1−α^(γ+1))/(1−α)，心算 α=0.8、γ=4 的期望產出；解釋為什麼 γ 拉大收益會飽和。\n4. 用 roofline 語言完整解釋「spec decode 高 batch 負收益」：驗證步對 compute 與 memory 流量各做了什麼？compute-bound 極限下的吞吐比公式是什麼？什麼條件下這個結論會反轉？\n5. 70B 模型 FP8 在單張 H100 上「裝得下」，為什麼仍然不可部署？這個檢查在容量規劃裡叫什麼帳？\n6. FlashAttention 的 IO-aware 是什麼意思？為什麼它對 prefill 的收益遠大於 decode？decode 的記憶體瓶頸要靠什麼層級的手段解？\n7. CUDA Graphs 解什麼問題、為什麼要求靜態形狀、piecewise capture 在妥協什麼？什麼樣的模型/硬體組合最需要它？\n8
