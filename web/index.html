 LLM 服務的完整故障目錄與防禦工事：健康檢查、graceful drain 的數學、發布工程、流量災難、incident runbook、混沌演練。指標定義在 ch14、autoscaling 與死亡螺旋在 ch13，本章假設你已經量得到，回答的是「壞了怎麼辦、怎麼讓壞得不那麼難看」。這是全書 Murphy 濃度最高的一章。\n\n## 從你已知的出發\n\n你做過 500K+ 使用者遊戲後端的高可用維運：on-call、graceful shutdown、RDS failover 演練、SQS consumer 的重試與冪等。這些肌肉記憶全部有效——但有三個物理常數變了，每一個都會讓照搬的 SOP 出事：\n\n1. **硬體故障從「被雲端藏起來」變成「你的日常輸入」**。EC2 的 hypervisor 替你吞掉了壞磁碟與壞記憶體，你六年職涯大概沒看過一次真正的硬體故障。GPU 節點沒有這層溫柔：卡會從 PCIe 上消失、HBM 會翻位元、NVLink 會退化。ch02 引過 Meta 的數據：Llama 3 訓練（16,384 張 H100、54 天）有 419 次非預期中斷，約 78% 歸因硬體；Meta 另一份對自家研究叢集 11 個月、1.5 億 GPU 時的分析給出 **每千節點日約 2.3 次故障** 的量級（arXiv:2410.21680）。換算你未來管的 64 卡推論機隊（8 台 8 卡節點）：**硬體事件的期望值大約每月 0.5~1 次，軟體與引擎層事件更頻繁**。這不是異常，是輸入條件——架構必須假設「永遠有一個節點正在壞」。\n2. **請求時長 ×100，所以一切「等它做完」的操作也 ×100**。你寫過 Node.js 的 graceful shutdown：停收新連線、等 in-flight、15~30 秒收工。同樣的模式在這裡完全成立，但一條 streaming 請求可以跑十分鐘——drain 預算從秒級變成十分鐘級，rolling deploy 從十分鐘變成數小時。本章中段用一個 worked example 把這筆帳算給你看。\n3. **故障的可見性反轉了**。你習慣的世界裡「壞 = 錯誤率上升」，dashboard 看 5xx 就抓得到八成的事。這裡最貴的三類故障**全部不報錯**：NCCL hang 時 GPU util 卡在 100%（spin-wait 也是 util，ch09）；模型變笨時每個回應都是 HTTP 200；thermal throttling 讓卡無聲變慢、零錯誤。監控哲學要從「抓錯誤」轉成「抓背離」——util 高但 token 輸出歸零、回應全成功但輸出長度分布漂移、同機隊其他卡都比它快。這是你 FluentBit 指標管線經驗的進階版：訊號還在，但藏在比值與分布裡，不在錯誤碼裡。\n\n把這三條想清楚，本章每個機制都是在防禦其中一條。\n\n## 故障目錄：GPU 服務的疾病分類學\n\n先上大表再深挖四個重點。表格按「硬體 → 平台 → 引擎 → 隱性」排列——越往下，偵測越難、平均存活時間越長、累積傷害越大：\n\n| # | 故障 | 症狀長什麼樣 | 根因 | 偵測訊號 | 緩解 |\n|---|---|---|---|---|---|\n| 1 | CUDA OOM（啟動期） | pod 起不來，log 見 `CUDA out of memory` | `gpu-memory-utilization` 設太高、同卡有殘留 process、模型/context 帳算錯（ch03） | CrashLoopBackOff + 啟動 log | 部署前用 ch03 公式驗算；確認卡上無殭屍 process；留 5–10% headroom |\n| 2 | CUDA OOM（執行期） | 跑了幾小時～幾天後突然 OOM；「要 2GB、明明有 3GB free」 | KV pool 之外的配置（activation、CUDA graph、NCCL buffer）碎片化；或記憶體緩慢洩漏 | HBM 用量的長期斜率（DCGM）；PyTorch allocator 統計 | `PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True`；斜率告警；排程性滾動重啟（見 drain 一節——這要付 deploy 稅） |\n| 3 | ECC 不可修正（Xid 48，伴隨 63/64 row remapping） | 在跑的 process 被殺；同卡反覆發生 | HBM cell 退化 | dmesg Xid 流；DCGM ECC 計數器；retired pages 趨勢 | **自動 cordon + drain**；remap 資源用罄或一週內重發 → RMA |\n| 4 | 掉卡（Xid 79，fallen off the bus） | `nvidia-smi` 報 unable to determine device handle，GPU 從 PCIe 消失 | 供電、riser、過熱、卡本體 | dmesg；node exporter | **自動 cordon**；重啟主機；重複發生 → 換機 |\n| 5 | NVLink 錯誤（Xid 74） | TP 組整體變慢或 NCCL 偶發報錯；單卡指標正常 | 鏈路/bridge 硬體退化 | DCGM NVLink 錯誤計數器 | 計數突增 → cordon；見 NCCL runbook |\n| 6 | GSP RPC timeout（Xid 119/120） | driver 操作卡死、`nvidia-smi` 掛起 | GPU 內部管理核心（GSP firmware）無回應 | dmesg | 重啟節點；反覆發生查 driver/firmware 版本，必要時依 NVIDIA 指引停用 GSP |\n| 7 | 應用層錯誤（Xid 13/31） | kernel exception / page fault，process 死但卡是好的 | 引擎或 kernel 的軟體 bug、版本不相容 | dmesg + 引擎 crash log | **別 RMA**——先查引擎/driver 版本矩陣；可在原節點重啟 |\n| 8 | NCCL hang / timeout | 整個 TP/EP 組 util 100%、token 輸出歸零、無 error log | 一個 rank 死亡或 desync，其餘 rank 在 collective 裡永遠等 | tokens/s 與 util 的背離；watchdog timeout log | 詳見下文：timeout 調小、深健康探針、整組重啟 |\n| 9 | Driver/firmware 版本矩陣 | 升級後零星 Xid、效能退化、或根本起不來 | driver × CUDA × NCCL × 引擎的相容矩陣踩錯格 | 升級事件與故障率的相關性 | 版本組合當 artifact 管理；金絲雀節點先升；保留回退路徑 |\n| 10 | Thermal / power throttling | **無聲變慢**：tok/s 下滑、零錯誤、無 Xid | 散熱不良、供電上限、機房熱點 | `nvidia-smi -q -d PERFORMANCE` throttle reasons；DCGM 時脈/溫度；同機隊橫向對比 | 時脈納入常規監控；持續 throttle → cordon 並查機房 |\n| 11 | 節點 NVMe 被權重快取塞爆 | pod evicted、image pull 失敗、`DiskPressure` | 權重快取無淘汰機制（ch12） | node filesystem 使用率 | LRU 淘汰 + 容量配額 + 提前告警 |\n| 12 | 引擎 scheduler 卡死 | running > 0 但 token 輸出歸零；非 NCCL（單卡也會） | 引擎 bug、事件迴圈死鎖 | 「有 running 卻無輸出」的背離指標；深健康探針 | 探針觸發 cordon + 重啟；蒐集 stack dump 回報 upstream |\n| 13 | Sequence 洩漏 | running 數只升不降，KV 利用率單調上升，最終 preemption 風暴 | client 斷線未傳播成 abort（ch12）、或引擎釋放 bug | gateway 連線數 vs 引擎 running 數的背離 | 斷線傳播 abort；對 stream 設 max duration 硬上限 |\n| 14 | Prefix cache hit rate 衰退 | TTFT 緩慢爬升、無錯誤、容量「莫名」變緊 | 路由變更、deploy 清空 cache、流量 mix 漂移（ch10） | hit rate 的趨勢告警（不是閾值告警） | 變更前後對比 hit rate；路由 scoring 回歸測試 |\n| 15 | 慢 replica 拖累全池 | 全池 p99 變差，但平均正常 | 某 pod 所在卡 throttling、鄰居搶資源、或單 pod 退化 | **per-pod** 延遲分布的離散度（ch14） | 自動摘除離群 pod；EPP 把延遲納入 scoring |\n| 16 | 品質迴歸 | 5xx 全綠、延遲正常、用戶投訴「變笨了」 | 量化切換、chat template/tokenizer 變更、sampling 預設漂移、壞 LoRA | eval gate 分數、輸出分布指標（見發布工程一節） | 權重/config/引擎一律過 canary + eval gate |\n\n四個值得展開的重點：\n\n### CUDA OOM：三種根因，三種處置\n\n「OOM」這個詞在 vLLM 世界有個反直覺之處：**穩態的 KV cache 不會 OOM**。引擎啟動時就把 `gpu-memory-utilization` 指定的記憶體圈成 KV pool（ch05/ch06），請求多到裝不下時的行為是 preemption 與排隊，不是 OOM。所以真的看到 CUDA OOM，根因幾乎都在 pool 之外：（a）**啟動期帳算錯**——權重 + activation 峰值 + CUDA graph + NCCL buffer 超過實體容量，這是配置 bug，用 ch03 的公式重算；（b）**碎片化**——PyTorch caching allocator 的碎片讓「總量夠但連續塊不夠」，症狀是那句經典的「tried to allocate X but…」，`expandable_segments` 能緩解大半；（c）**緩慢洩漏**——HBM 或 host RSS 以每天幾百 MB 的斜率爬，幾天後撞牆。第三種最陰險，因為唯一可靠的緩解是定期重啟，而你看完 drain 一節就知道：**LLM 服務的「重啟一輪」是以小時計價的**——洩漏修不掉的話，這筆稅每週都要繳。\n\n### Xid 家族：讀 dmesg 的紀律\n\nXid 是 GPU 世界的 errno（ch02），on-call 的紀律是一張三分法的表：**該換硬體的**（48 反覆、79、62/64 反覆、95）、**該先怪自己軟體的**（13、31、43——先查引擎版本與相容矩陣，別急著 RMA）、**該看趨勢不看單點的**（94 單位元 ECC 每月幾次是正常背景輻射；63 retired pages 的計數加速才是警訊）。自動化的對應原則：**只有第一類接自動 cordon**。把 13/31 也接上自動隔離，一個引擎 bug 就能讓你的自動化把整個叢集 cordon 光——本章最後的「防禦工事自身的故障」會回來鞭打這一點。\n\n### NCCL hang：多卡世界最痛的故障\n\nch09 立過牌子，這裡交工事。為什麼它是最痛的：TP/EP 組裡**一個 rank 出事（OOM、crash、被 preempt、網卡抖動），其餘 rank 會在 collective 裡無限期等待**——NCCL 的同步語意沒有內建補償。症狀的三重欺騙：GPU util 100%（spin-wait）、無 error log（沒人報錯，大家都在等）、process 全部活著（liveness 探針全綠）。對「看指標找問題」的直覺是全反向的。\n\n防禦工事三件套：\n\n1. **把 timeout 從預設調到推論的時間尺度**。PyTorch 的 ProcessGroupNCCL watchdog 預設 collective timeout 是 **10 分鐘**（PyTorch 文件，2026-06）——這是給訓練的寬容度。推論的 decode collective 是毫秒級的事，任何一次 all-reduce 跑超過 30 秒就是死了，等剩下的 9.5 分鐘只是在燒卡與燒 SLO。把分散式 timeout 調到 30~120 秒；引擎是否把它暴露成旗標各家不一（SGLang 有 `--dist-timeout`；vLLM 以當下版本的環境變數與程式碼為準，部署前實測你的版本會不會在 timeout 後乾淨地 crash 而不是殭屍化）。\n2. **偵測靠背離，不靠錯誤**：`tokens/s == 0` 且 `running > 0` 且 `GPU util > 90%` 持續 60 秒，就是 hang 的指紋——這條告警規則比任何 log 都早知道。再加深健康探針（下一節）兜底。\n3. **故障域 = 整組**。TP4 的四個 pod 是一個生死與共的單位：殺一個、留三個，留下的三個還是僵的。處置永遠是整組摘流量、整組重啟（LWS 的組級故障語意就是為這個存在的，ch11）。驗屍工具：PyTorch 的 **Flight Recorder** 會在 timeout 時 dump 每個 rank 最後執行的 collective 與 stack trace，能直接看出「誰缺席」或「誰跟大家叫了不同的 collective」。順帶一個有用的 fleet 經驗：PyTorch 維護者公開說過，他們機隊裡絕大多數 watchdog timeout 的根因是 **desync（集合呼叫不匹配）而不是真的慢**——所以調大 timeout 幾乎從來不是解法。\n\n### 隱性退化：最貴的一類\n\n表中 14~16 共享同一個性質：**沒有事件，只有趨勢**。prefix hit rate 每週掉 2%、某 replica 比同儕慢 15%、輸出平均長度悄悄變短——每一項單看都不值得 page，累積三個月就是 30% 的容量蒸發或一次公關事故。防禦不是更多告警，是**三類例行對比**：時間軸對比（本週 vs 上週的關鍵比值）、同儕對比（per-pod 指標的離散度，抓離群者）、變更對比（每次 deploy 前後的指標 diff）。另外留一句 hedge：大規模機隊還有 silent data corruption（算錯但不報錯）的長尾風險，Meta 等公司有公開研究，但對推論服務的實務影響截至我能確認的資訊（2026-06）仍缺乏好的公開數據——eval gate 與輸出分布監控是目前唯一務實的網。\n\n## 健康檢查：你怎麼知道它還活著\n\nK8s 三種 probe 你閉著眼睛會配，但預設直覺在「載入要十分鐘、活著不代表能生成」的引擎上全是坑。\n\n### startup / liveness / readiness 對長載入引擎\n\n```yaml\n# 示意：vLLM Deployment 的 probe 配置（語意為主，路徑與旗標以你的版本為準）\ncontainers:\n- name: vllm\n  startupProbe:                 # 罩住冷啟動：權重載入＋compile 可達分鐘級（ch12）\n    httpGet: { path: /health, port: 8000 }\n    periodSeconds: 10\n    failureThreshold: 120       # 10s × 120 = 容忍 20 分鐘啟動，照你實測的 p99 冷啟動設\n  livenessProbe:                # 淺探針：只問「process 與事件迴圈活著嗎」\n    httpGet: { path: /health, port: 8000 }\n    periodSeconds: 10\n    timeoutSeconds: 5\n    failureThreshold: 3\n  readinessProbe:               # 接不接新流量：drain 就是把它翻成 false\n    httpGet: { path: /health, port: 8000 }\n    periodSeconds: 5\n    failureThreshold: 2\nterminationGracePeriodSeconds: 960   # 必須 ≥ drain 預算（下一節的數學）\n```\n\n三個必須答對的設計題：**startup probe 不設或設太短**，liveness 會在權重載入到一半時殺掉 pod，pod 重啟又從頭載入——你會得到一個永動的 CrashLoop，症狀是「pod 永遠 87% 就死」，根因是 probe 而不是程式。**liveness 必須淺**：它只該驗證「HTTP server 與引擎迴圈有心跳」，絕不可驗證「能生成 token」——理由見下。**readiness 是流量閥門**：它是 drain 與 brownout 的執行機構，語意是「我願不願意接新請求」，跟「我健不健康」是兩個問題。\n\n### 深健康探針：生成一個 token 才算活著\n\n淺探針抓不到本章最痛的三種死法：NCCL hang（process 活著）、scheduler 卡死（HTTP 還回 200）、隱性變慢。唯一可靠的「活著」定義是**端到端走完一次生成**：\n\n```bash\n# 深健康探針：真的生成 1 個 token，走完 tokenize→schedule→prefill→decode→detokenize 全路徑\ncurl -s -m 15 localhost:8000/v1/chat/completions \\\n  -H 'Content-Type: application/json' \\\n  -d '{\"model\":\"prod-70b\",\"messages\":[{\"role\":\"user\",\"content\":\"ping\"}],\"max_tokens\":1}'\n```\n\n但深探針有一個會炸全池的反模式：**把它接到 liveness 上**。推演一次 Murphy：流量尖峰 → 佇列變長 → 探針請求也在排隊 → 探針超時 → liveness 失敗 ×3 → K8s 重殺 pod → 容量更少 → 其他 pod 更擠 → 它們的探針也超時——**健康檢查親手執行了一場級聯故障**，而且是在你最忙的時候。深探針把「忙」誤判成「死」的代價是全池重啟。正確接法：深探針是**獨立的 prober**（每 30~60 秒一輪），結果進 metrics，觸發的是**告警與自動摘流量（cordon 該 pod）**，不是重啟；探針超時閾值要遠鬆於 SLO（SLO 的 3~5 倍），因為它的職責是分辨死活，不是量品質——量品質是 ch14 的 SLO 監控的事。\n\n節點級的那一層（DCGM 持續健康檢查 → Xid/ECC 觸發 cordon + drain）ch11 已經給過迴路，本章補的是政策：**哪些訊號接自動、哪些留給人**——上面 Xid 三分法就是答案，再加一條全域保險：自動 cordon 要有速率上限（例如每小時最多 2 個節點），超過就停下來叫人，因為「自動化以為全叢集都壞了」的最常見原因是自動化自己壞了。\n\n## Graceful drain 的數學：為什麼 deploy 以小時計\n\n模式你熟到不用教：摘除 endpoint → 停收新請求 → 等 in-flight 跑完 → 才送 SIGTERM。LLM 的特殊性只有一條，但它改變一切：**in-flight 請求不可轉移**。你的無狀態 API 可以讓 LB 把連線換到別台；這裡一條 stream 的 KV cache 黏在這張卡的 HBM 裡（ch05），中途換 pod = 重算全部。所以 drain 沒有捷徑，只能等——問題變成：**等多久**？\n\n### Worked example：drain 預算與 rollout 時長\n\n設定：chat + 部分 agentic 流量的服務，24 個 vLLM pod，穩態每 pod 約 **48 條 in-flight** 請求。你照 ch14 的方法量到 E2E 請求時長分布：\n\n| 分位 | p50 | p90 | p95 | p99 | p99.9 | 硬上限（gateway max stream duration） |\n|---|---|---|---|---|---|---|\n| 時長 | 6 s | 25 s | 45 s | 120 s | 420 s | **900 s** |\n\n**第一步：單 pod 的 drain 時長是「48 個樣本的最大值」，不是中位數。** 這是大多數人算錯的地方。停收新請求後，pod 清空的時間 = 最慢那條 in-flight 的剩餘時長。保守地拿完整時長分布當剩餘時長的上界（悲觀但安全），假設近似獨立，則「t 秒內清空」的機率是 F(t)⁴⁸：\n\n- 等到 p99（120 s）：0.99⁴⁸ ≈ **0.62**——38% 的 pod 還有人在跑。直覺上「等 p99 夠久了吧」，但 48 條請求的最大值天然集中在分布尾部：你要的不是 p99，是大約 p(1 − (1−q)/48) 這一階的分位數。\n- 期望被砍的請求數 = 48 × (1 − F(t))，每 pod：等 30 秒砍 ~3.8 條、等 120 秒砍 ~0.48 條、等 420 秒砍 ~0.05 條、等 900 秒砍 0 條。\n\n全量 rollout（24 個 pod）的期望傷亡：\n\n| drain 截止 | 30 s（K8s 預設 grace period！） | 120 s（p99） | 420 s（p99.9） | 900 s（硬上限） |\n|---|---|---|---|---|\n| 整輪被砍的 stream 數 | **~92 條** | ~11.5 條 | ~1.2 條 | 0 |\n\n第一個 punchline：**拿 K8s 預設的 30 秒 `terminationGracePeriodSeconds` 滾一輪，等於默默砍掉近百條正在輸出的對話**——而且 5xx 看不到（stream 已是 200，只會斷流，ch12）。第二個：**零傷亡的前提是 gateway 有 max stream duration 硬上限**。沒有上限，p100 在數學上是無界的，drain 預算也是——900 秒這個 cap 不是品質設計，是可運維性設計。\n\n**第二步：rollout 時長。** GPU 稀缺，你租不到 25% 的 surge 容量，假設只有 2 張備卡 → maxSurge=2，12 個批次。surge 模式下每批可以平行做「起新 pod（warm path 冷啟動 ~3 分鐘，ch12）＋ bake 觀察 5 分鐘」與「舊 pod drain」，所以每批耗時 ≈ max(8 分鐘, drain 截止)：\n\n| drain 截止 | 每批耗時 | 12 批 | + 首批 canary bake（eval gate，30–60 分） | 總計 |\n|---|---|---|---|---|\n| 120 s | 8 min | 96 min | +30~60 min | **~2~2.5 小時** |\n| 420 s | 8 min（drain 7 分 < bake 8 分，**免費**） | 96 min | +30~60 min | **~2~2.5 小時** |\n| 900 s | 15 min | 180 min | +30~60 min | **~3.5~4 小時** |\n\n第三個 punchline 藏在中間那行：**從 p99 等到 p99.9 幾乎不增加 rollout 時間**（drain 被冷啟動＋bake 的 8 分鐘遮蔽了），卻把傷亡從 11.5 條降到 1.2 條——「捨不得等」是假節省。最後把結論收攏：一個 24 pod 的 LLM 服務，認真做 drain 與 canary 的 deploy 就是 **2~4 小時起跳**。這個數字會反過來改變你的上游決策：hotfix 流程要有「值不值得滾一輪」的門檻、記憶體洩漏的「重啟即解」每週繳一次 2 小時稅、incident 時 rollback 不能靠重新 rollout（下一節的熱回退）。\n\n工程落地的兩個注意：`terminationGracePeriodSeconds` 必須 ≥ drain 截止 + 清理緩衝（上例 960 s）；drain 的「停收新請求」要做在路由層（EPP 摘 endpoint / readiness 翻 false），preStop hook 只負責等待——它不是魔法，只是把「摘流量」與「SIGTERM」解耦的時間差。引擎自身的 shutdown 語意截至 2026-06 還在標準化中（vLLM 有一篇 RFC 明確提案「SIGTERM 後停收新請求、in-flight 在可配置的時限內跑完、P/D 場景等 KV 傳輸完成」，尚未完全落地）——所以生產上的 drain 主力放在路由層，別賭引擎的訊號處理。\n\n## 發布工程：canary 的對象不只程式碼\n\n你的 canary 直覺：新版本接 5% 流量，盯錯誤率與延遲，正常就推進。框架照搬，但有兩個 LLM 特有的修正。\n\n**第一，canary 的對象清單變長了。** 會改變服務行為的 artifact 至少有六種：引擎版本、模型權重、量化格式、sampling 預設值、chat template/tokenizer、LoRA adapter。每一種都該走同一條 canary 管線——歷史事故裡「沒人覺得這算 deploy」的變更（換了個量化 checkpoint、改了 chat template 的一行 Jinja）出事率不輸程式碼。配套是**熱回退**：權重是 70 GB 的 artifact，冷回退要重走分鐘～小時級的載入（ch12），所以 bake 期間舊版本池必須保持 warm——回退是秒級的路由切換，不是重新部署。\n\n**第二，品質迴歸在 5xx 看不到。** 模型變笨不報錯：量化讓數學題錯誤率翻倍、template 錯位讓模型開始自言自語、tokenizer 版本差一個 special token 讓輸出夾雜亂碼——HTTP 層全是 200，延遲還可能更快。你在錯誤率 dashboard 上看到的 canary「全綠」，對品質是零證據。兩道網：\n\n- **Eval gate（部署前的硬門檻）**：一組 golden set（幾百到一千條帶預期答案的 prompt，覆蓋你的核心場景＋歷史事故回歸題），對 canary 池跑一輪，分數低於基準線即自動擋下。可自動評分的任務（exact match、單元測試、結構化輸出 schema 驗證）優先；開放式回應用 LLM-as-judge 補位，但 judge 自己也是個會退化的模型——分數要看相對 diff 而不是絕對值。把它想成「模型的整合測試」，進 CI，跟 ch14 的效能迴歸 benchmark 並排跑。\n- **Shadow traffic（部署中的分布監控）**：鏡像一部分真實流量到 canary（回應丟棄不回給用戶），離線對比新舊版本的**輸出分布指標**——平均輸出長度、refusal 率、重複率、`finish_reason` 分布、特定關鍵詞頻率。這些指標不需要 ground truth，卻對「模型行為變了」極其敏感。代價誠實列出：shadow 的每一條請求都是真 GPU 錢（鏡像 10% 流量 = 容量帳加 10%，ch16），所以用採樣而不是全量，並且 shadow 池可以用更小的副本數換更長的觀察窗。\n\n## 流量災難：retry storm、brownout、佇列崩潰\n\n### Retry storm 的 LLM 加強版\n\n你在遊戲後端見過 retry storm。LLM 版本的放大係數高一個量級，因為三件事疊加：**重試的單位貴**（一次重試 = 重算整段 prefill，分鐘級、數萬 token 的計算）；**斷流即重試**（pod 死掉時上面 48 條 stream 同時斷，48 個 client SDK 同時重試，而且帶著完整的長 context）；**重試打中的是已經變慢的池子**（pod 少了一個，倖存者更擠 → 更多 timeout → 更多重試）。推演一次：8 pod 的池子死 1 個，瞬間 48 條重試湧向剩下 7 個——每條都是全量 prefill，等效於突然多了 7% 的最重型流量，落在一個剛損失 12.5% 容量的池子上。沒有防禦的話，這就是 ch13 死亡螺旋的點火器。\n\n防禦工事，由近及遠：\n\n1. **位置敏感的重試政策**（ch12 立的規則，這裡是執行細節）：首 token 前可重試、首 token 後預設不重試。配 **retry budget**——重試流量不得超過基準流量的 10%（按 token 計，不是按請求計，否則一條 128k context 的重試會吃掉 50 條短請求的額度）；budget 用罄就 fail fast。\n2. **服務端不能信任 client**：你的 429 + `Retry-After` 是君子協定，第三方 SDK 不一定理你。額度要在 gateway 強制執行（per-tenant token bucket，ch16），超過的直接拒絕而不是排隊。\n3. **斷流續傳是治本但少有人做**：原理上 server 端把已生成的 token 留存一個短 TTL，client 帶 resume token 重連時從斷點續發（SSE 的 `Last-Event-ID` 語意），重試成本從「重算全部」降到「重發已算的」。截至我能確認的資訊（2026-06），主流 open-source serving 棧沒有開箱即用的實作，這是平台層的自建題——值不值得做，取決於你的 stream 平均長度與斷流率的乘積。\n4. **Priority shedding**：過載時丟棄要有順序——batch tier 先死、免費 tier 次之、付費互動流量最後（優先級從 gateway 的 tenant metadata 來，ch12/ch16）。「全體變慢」是最差的丟法，它讓所有人都超時、所有人都重試。\n\n### Brownout：有秩序的降級\n\n掉電（blackout）之前先調暗（brownout）：與其讓佇列崩潰，不如主動降低每請求成本換容量。LLM 服務的可調槓桿比一般後端豐富得多：\n\n| 槓桿 | 容量收益 | 品質/體驗代價 | 備註 |\n|---|---|---|---|\n| 降 `max_tokens` 上限（如 4096→1024） | decode 佔用下降、佇列周轉加快 | 長輸出被截斷 | 對 reasoning 流量收益最大 |\n| 降 max context / 拒收超長 prompt | KV 佔用大減（ch03 的線性帳） | 長文件場景退化成 422 | KV 壓力型過載的首選 |\n| 關 speculative decoding | 釋放 draft + verify 的算力與記憶體 | 低載時 ITL 變慢 | 高 batch 時本來就收益遞減（ch07），過載時關掉接近免費 |\n| 關 thinking mode / 砍 thinking budget | 輸出 token 數大減 | 複雜任務品質下降 | 對 reasoning 重的產品要產品側同意 |\n| 切到小模型 / 更激進量化的備池 | 每請求成本砍半以上 | 品質明顯下降 | 需要預先存在的備池與路由開關 |\n| Priority shedding（上節） | 立即、可控 | 對應 SLA 設計好就「無代價」 | 永遠是第一個拉的 |\n\n兩條紀律比槓桿本身重要。**進出都要遲滯（hysteresis）**：進入條件（例如 KV 利用率 > 90% 持續 5 分鐘，或 SLO burn rate 超標，訊號定義見 ch13/ch14）與退出條件（回落到 70% 以下持續 10 分鐘）之間要有足夠的間隙，否則系統在邊界上抖動，用戶體驗到的是「時好時壞」——比穩定的差更糟。**brownout 必須是宣告式的狀態機，不是人手改 config**：凌晨三點拉閘的 on-call 不會記得早上把它關回去；狀態要進 metrics、變更要進 audit log、退出要自動。\n\n### 佇列崩潰與殭屍請求\n\nadmission control 的位置（最前面的 gateway）與死亡螺旋的動力學分別在 ch12 與 ch13，這裡只補 incident 現場的一個關鍵事實：**當佇列等待時間超過 client timeout，佇列裡全是殭屍**——client 已放棄、重試已在路上，但引擎還在認真處理沒人要的請求，goodput 歸零而 GPU 滿載。這時「等它消化完」在數學上不成立（消化速度 < 殭屍生成速度），唯一的恢復操作是**大規模丟棄**：清空 waiting 佇列、必要時 abort 掉超齡的 running 請求。清要清得狠——半清等於沒清，殘留的殭屍會繼續佔住 batch slot 讓新請求也變殭屍。這是 on-call 手冊裡最反直覺、也最需要事先寫下來的一條：丟棄不是事故的失敗，是恢復的開始。\n\n## 多區域：failover 的 RTO 現實\n\n三個 LLM 特有的修正，修正你既有的 DR 直覺。**權重要預熱**：failover 不是把流量切過去就好，對端的每個節點得有權重（NVMe 快取或區域內物件儲存副本）——讓 50 個 pod 在 failover 當下同時去拉 S3，你會在最糟的時刻重演 ch12 的擴容風暴。**KV 不可遷移**：切換瞬間所有 in-flight stream 斷掉、所有 prefix cache 歸零，對端會迎來一波 TTFT 風暴（全是冷 prefill）——這是物理，不是 bug，告警要預先靜默、容量要為冷流量留 buffer。**RTO 由常備容量決定**：GPU 不是 EC2，failover 時臨時租 64 張 H100 的「彈性」不存在（有貨是運氣，沒貨是常態）。所以選項只有 active-active（雙倍 GPU 錢換分鐘級 RTO）或接受小時級 RTO 的事後擴容——pilot light 模式在 GPU 世界點不著。這筆錢怎麼算，ch16。\n\n## Incident response：兩棵判斷樹\n\n寫 runbook 的原則：判斷樹的每個分支是一條**可在 2 分鐘內查完的指標**，葉子是一個**動作**。GPU 服務的 mitigation 優先序要先背好：**rollback > shed/brownout > scale**——rollback 與 shedding 是秒～分鐘級，scale 是分鐘～小時級（冷啟動物理，ch12/ch13），半夜先拉快的閘。\n\n### Runbook A：「TTFT p99 突然 ×3」\n\n```text\nTTFT p99 ×3（告警點火）\n├─ Q1 範圍：單一/少數 pod 還是全池？（per-pod TTFT 分布，ch14 的面板）\n│   ├─ 少數 pod → 慢 replica 路線：\n│   │   ├─ DCGM throttle reasons / 溫度 / 時脈異常？ → thermal/power → cordon 該節點，開票\n│   │   ├─ dmesg 有 Xid？ → 按故障目錄三分法處置\n│   │   └─ 都沒有 → 先摘除該 pod 止血，再驗屍（別在病人身上 debug）\n│   └─ 全池 → 系統性路線，往下走\n├─ Q2 流量變了嗎？（RPS、prompt 長度分布、單一租戶占比）\n│   └─ 是 → 容量問題：queue 深度、KV util 同步上升？\n│        → shed 低優先 / brownout（先），擴容（後）；單租戶異常 → 限流該租戶（ch16）\n├─ Q3 佇列在堆嗎？（num_waiting 趨勢）\n│   ├─ 是，且流量沒變 → 供給端變慢：preemption 次數？長 prefill 干擾（ch06）？\n│   └─ 否 → TTFT 高但沒排隊 → 幾乎可斷定是 Q4\n├─ Q4 prefix cache hit rate 掉了嗎？（ch10）\n│   └─ 是 → 路由變更？deploy 清了 cache？流量 mix 漂移？ → 回滾路由 config\n└─ Q5 最近 4 小時有任何 deploy？（程式碼、權重、config、driver 都算）\n    └─ 是 → 先 rollback（熱回退，秒級），再驗屍。「先回滾再理解」不丟人\n```\n\n### Runbook B：「某 node NCCL timeout」\n\n```text\nNCCL watchdog timeout（或 token 輸出歸零 + util 100% 的背離告警）\n├─ 第 0 步 止血：這個 TP/EP 組是單一故障域 → 整組摘除流量（不是單一 pod）\n│   並確認：被斷的 in-flight 請求的重試突刺有沒有觸發 retry budget（防二次災害）\n├─ Q1 全組 rank 都卡在 collective？（stack dump / Flight Recorder）\n│   ├─ 是，且有 rank 缺席 → 找屍體：\n│   │   ├─ 該 rank pod OOMKilled / crash log？ → 軟體層 → 整組原地重啟\n│   │   └─ 該節點 dmesg 有 Xid 79/48/119？ → 硬體層 → cordon 節點，整組在健康節點重建\n│   ├─ 是，全員到齊但都不動 → desync（叫了不匹配的 collective）→ 引擎 bug：\n│   │   蒐集 Flight Recorder dump → 整組重啟 → 回報 upstream（dump 是修 bug 的唯一證據）\n│   └─ 否，有 rank 在跑只是慢 → 慢卡路線：DCGM 溫度/時脈 + NVLink/IB 錯誤計數（Xid 74）\n├─ Q2 重啟後復發？\n│   ├─ 同節點復發 → 硬體嫌疑加重：dcgmi diag 長測 → 不過就走 RMA 流程\n│   └─ 換節點仍復發 → 軟體嫌疑：driver × NCCL × 引擎版本矩陣，查最近的升級事件\n└─ 收尾：incident 記錄回寫 runbook；該組的請求傷亡數進 postmortem 的用戶影響欄\n```\n\n共同紀律：每次 incident 後 runbook 必須回寫（指標改名、面板搬家、工具換代都會讓判斷樹腐爛——半夜照著跑全是 404 的 runbook 比沒有更危險），而驗證 runbook 沒腐爛的唯一方法是演練——下一節。\n\n## 混沌工程：對 GPU 服務的實驗清單\n\nChaos 的標準紀律（假設先行、爆炸半徑契約、自動中止條件）你都懂，這裡直接給 GPU 服務專屬的實驗清單。前五個在模擬叢集（M1，免費）就能跑，後面的需要 staging 真卡：\n\n| 實驗 | 你在驗證的假設 | 注入方式 | 中止條件 / 注意 |\n|---|---|---|---|\n| 1. 殺掉 stream 進行中的 engine pod | client 收到可辨識的斷流訊號；gateway 不重試已出首 token 的請求；EPP 秒級摘除 | `kubectl delete pod --grace-period=0` | 錯誤率超過演練預算即停 |\n| 2. Drain 一個節點 | drain 預算成立：實測清空時間 ≤ 預算、傷亡 ≤ 預期值 | `kubectl drain` | 拿實測值回填 worked example 的分布假設 |\n| 3. 製造 retry storm | retry budget 擋得住：放大係數 ≤ 設計值、無螺旋 | k6 腳本配激進重試策略 | waiting 佇列深度超閾值即停 |\n| 4. 拔掉 EPP / 路由層 | fail-open 或 fail-closed 的行為與你宣稱的一致（ch12） | scale EPP to 0 | — |\n| 5. 凍結深健康探針的回應 | 探針失敗只觸發 cordon 與告警，**不**觸發 liveness 連鎖重啟 | 讓探針端點 sleep | 全池重啟 = 實驗失敗且立刻中止 |\n| 6. 模擬 GPU 降頻 | 慢 replica 偵測在 N 分鐘內抓到離群 pod 並摘除 | `nvidia-smi -lgc` 鎖低時脈 | 結束後 `-rgc` 解鎖 |\n| 7. TP rank 間注入網路延遲/丟包 | NCCL timeout 在設定值內點火；告警先於用戶投訴；整組一起重啟 | `tc netem`（跨節點 TP/EP 時） | 單組、限時 |\n| 8. 塞爆節點 NVMe | DiskPressure 之前有告警；權重快取 LRU 正常淘汰 | `fallocate` 大檔 | — |\n| 9. 權重 checksum 不符 | 部署管線拒絕啟動，而不是默默載入錯的權重 | 改 artifact 的一個 byte | 只在 staging |\n| 10. 區域 failover 演練 | 權重已預熱、TTFT 風暴在預期內、RTO ≤ 承諾值 | 切斷主區流量 | 一年至少一次，否則 DR 是傳說 |\n\n一個與一般後端不同的成本提醒：GPU staging 環境很貴，所以分層演練——**控制面與路由層的 chaos 在模擬叢集跑到飽**（kind + llm-d-inference-sim，零成本），只有牽涉真 GPU 物理的實驗（6、7）才上真卡，而且可以蹭在租卡做 benchmark（ch08/ch14）的同一批機時裡。\n\n## 故障模式與防禦\n\n本章通篇都是故障，所以這個招牌段落往上再走一層：**防禦工事自己會壞**。每一道你在本章建立的工事，它的失效模式與對策：\n\n| 防禦工事 | 它自己怎麼壞 | 症狀 | 對策 |\n|---|---|---|---|\n| 深健康探針 | 過載時超時，把「忙」判成「死」；若誤接 liveness → 級聯重啟 | 尖峰時段 pod 集體重啟 | 探針只接 cordon/告警；閾值遠鬆於 SLO；探針自身的失敗率也要監控 |\n| 自動 cordon | 誤報風暴：一個壞指標 cordon 掉半個叢集；或 Xid 13/31 誤入自動化 | 容量無故蒸發 | cordon 速率上限；軟體類 Xid 永遠留給人判斷 |\n| Graceful drain | grace period < drain 預算；或 preStop 在等但路由層還在送新請求 | 每次 rollout 都有規律的斷流突刺 | 預算對齊（本章數學）；先摘 endpoint 再等待；用 chaos #2 定期驗證 |\n| Eval gate | golden set 過擬合或外洩；judge 模型自己漂移 | gate 全綠但投訴上升 | 題庫定期輪換＋加入歷史事故回歸題；看相對 diff；與 shadow 分布指標互相印證 |\n| Retry budget | 只設在自家 SDK，第三方 client 不甩你 | storm 照樣發生 | server 端強制（gateway token bucket）；429 必帶 Retry-After |\n| Brownout | 沒有遲滯 → 邊界抖動；人工拉閘 → 忘記關 | 服務時好時壞；降級狀態跑了一週沒人發現 | 宣告式狀態機 + 自動退出 + brownout 狀態進告警面板 |\n| Runbook | 寫完即腐爛：指標改名、工具換代 | 半夜照著跑，連結全 404 | incident 後回寫；每季 game day 演練 |\n| Chaos 演練 | 在生產炸出真事故 | 你自己成為 postmortem 主角 | 爆炸半徑契約＋自動中止；控制面實驗一律先過模擬叢集 |\n\n讀出這張表的共同模式：**每一道自動化防線都需要一個「防線失控時的剎車」**——速率上限、遲滯、人工門檻。自動化的層級越高，剎車越重要。這跟你在遊戲後端學到的「自動擴容要設上限，否則一個 bug 就是一張天價帳單」是同一條定律。\n\n## 動手做\n\n### 實驗 1 [M1]：kill pod 與 preStop 的 drain 演練\n\n在 ch12 實驗 1 的模擬叢集（kind + GIE + llm-d-inference-sim）上：把 sim 的回應時長調到 30~60 秒模擬長 stream，先用 `kubectl delete pod --grace-period=0` 暴力殺一個正在服務的 pod，記錄 client 端看到什麼（斷流的形狀、gateway 的行為）；然後實作正確版本——readiness 翻 false + preStop 等待 in-flight 歸零 + 足夠的 grace period——再殺一次對比。**成功標準**：交出兩份 client 端的逐 token 時間戳記錄，暴力版有斷流、優雅版零傷亡；並且能說出你的 grace period 數字是怎麼從 sim 的時長分布算出來的（本章 worked example 的公式）。\n\n### 實驗 2 [M1]：親手製造一場 retry storm\n\n同一個模擬叢集，把 sim 的容量調小（低 max-num-seqs）。寫一個帶「激進重試」的 k6 腳本（timeout 5s、立刻重試、最多 5 次），逐步加壓直到佇列崩潰，觀察：佇列深度、有效完成率（goodput）、重試流量占比的時間序列。然後加上兩道防禦——gateway 端 429 + Retry-After、k6 端改成 retry budget + 指數退避 + jitter——重打一輪。**成功標準**：兩輪的「offered load vs goodput」曲線圖，第一輪能看到 goodput 在過載點之後**下降**（殭屍請求吃掉容量），第二輪 goodput 在過載點之後持平。能解釋兩條曲線差異的機制，這個現象你就真的懂了。\n\n### 實驗 3 [紙上推演]：凌晨三點的 TTFT 告警\n\n完整寫一棵你自己的「TTFT p99 ×3」判斷樹，規則：每個分支節點標注「查哪個指標、在哪個面板、預期耗時」；每片葉子是一個動作，標注「止血型（秒級）還是根治型（小時級）」；至少覆蓋本章 Runbook A 沒有展開的兩種情境（建議：「深夜 batch 租戶突然上量」與「上游權重快取層故障導致部分 pod 重啟後變冷」）。**成功標準**：拿給一位做過 on-call 的同事，請他用你的樹走一遍任一情境，他不需要問你任何補充問題就能走到葉子——問了，就是樹有洞。\n\n## 這個領域往哪走\n\n短期（1~2 年）最值得盯的三條線：**引擎 shutdown 語意的標準化**（vLLM 的 RFC 方向是把 drain、KV 傳輸收尾、可配置時限變成引擎的一等公民——落地後本章「drain 全靠路由層」的工法會簡化）；**容錯集合通訊**（讓 TP/EP 組在成員故障時收縮重組而不是整組陪葬的研究方向，若成熟會改寫「故障域 = 整組」的鐵律）；**GPU 健康的預測性維護**（用 ECC/溫度/時脈的時間序列預測壞卡，從「壞了才 cordon」走向「壞之前 drain」——大機隊的公開數據正在累積）。不變的部分更重要：故障目錄會換條目，但「抓背離而不是抓錯誤」「故障域思維」「防線要有剎車」這些原則，跟你從遊戲後端帶來的可靠性直覺一樣，十年不會過期。\n\n## 自我檢核\n\n1. dmesg 看到 Xid 48、Xid 31、Xid 79，三者的處置為什麼完全不同？哪些 Xid 可以接自動 cordon、哪些絕對不行、為什麼？\n2. NCCL hang 為什麼是「三重欺騙」的故障？寫出一條不依賴 error log 的告警規則，並解釋為什麼處置單位必須是整個 TP/EP 組。\n3. 深健康探針（真的生成 token）為什麼不能接 liveness probe？推演一次它在流量尖峰時引發級聯重啟的完整鏈條，以及正確的接法。\n4. 給定請求時長分布與每 pod 48 條 in-flight，為什麼 drain 預算「等到 p99」遠遠不夠？寫出「t 秒內清空」的機率公式，並解釋 gateway 的 max stream duration 上限在這個數學裡扮演什麼角色。\n5. 用 K8s 預設的 30 秒 grace period 對 24 pod 的 LLM 服務做 rolling update，會發生什麼？這個傷害為什麼在 5xx dashboard 上看不到？\n6. 「品質迴歸在 5xx 看不到」——給出三個真實的觸發場景，並說明 eval gate 與 shadow traffic 各自防的是哪一段、各自的盲區是什麼。\n7. LLM 的 retry storm 比一般 API 的版本危險在哪三點？retry budget 為什麼要按 token 計而不是按請求計？\n8. 列出三個 brownout 槓桿與各自的代價，並解釋為什麼 brownout 必須是「帶遲滯的宣告式狀態機」而不是 on-call 手動改 config。\n\n## 延伸閱讀\n\n- [NVIDIA Xid Errors 官方文件與 Xid 目錄](https://docs.nvidia.com/deploy/xid-errors/) — 每個 Xid 的官方定義、成因與建議處置（Ampere 之後有完整 catalog 可下載），on-call 必備書籤。\n- [NVIDIA GPU Debug Guidelines](https://docs.nvidia.com/deploy/gpu-debug-guidelines/) — 官方的 GPU 排障流程：什麼情況跑 dcgmi diag、什麼情況 RMA，本章 Xid 三分法的權威依據。\n- [The Llama 3 Herd of Models（arXiv:2407.21783）第 3.3 節](https://arxiv.org/abs/2407.21783) — 16,384 張 H100、54 天、419 次中斷的一手數據，建立「故障是輸入條件」世界觀的最佳文獻。\n- [Revisiting Reliability in Large-Scale ML Research Clusters（Meta, arXiv:2410.21680）](https://arxiv.org/abs/2410.21680) — 11 個月、1.5 億 GPU 時的機隊級故障率分析，本章「每千節點日 2.3 次故障」的出處，含 MTTF 隨規模的外推模型。\n- [Flight Recorder: A New Lens for Understanding NCCL Watchdog Timeouts（PyTorch Blog）](https://pytorch.org/blog/flight-recorder-a-new-lens-for-understanding-nccl-watchdog-timeouts/) — NCCL timeout 驗屍工具的設計與用法，「desync 多於真慢」的 fleet 經驗也來自 PyTorch 維護者社群。\n- [vLLM RFC: Clarifying vLLM Shutdown Semantics（Issue #24885）](https://github.com/vllm-project/vllm/issues/24885) — 引擎 graceful shutdown 標準化的進行式（2026-06 仍在演進），追蹤它就知道 drain 工法什麼時候可以下沉到引擎層。\n- [Google SRE Book: Addressing Cascading Failures](https://sre.google/sre-book/addressing-cascading-failures/) — 級聯故障、load shedding 與「丟棄是恢復的開始」的經典論述，本章佇列崩潰一節的理論底。\n- [Timeouts, Retries, and Backoff with Jitter（AWS Builders' Library）](https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/) — retry budget 與 jitter 的工程細節，把它的結論乘上 LLM 的成本係數就是本章的 retry storm 一節。\n- [Modal: GPU Health 文件](https://modal.com/docs/guide/gpu-health) — 一家 GPU serverless 廠商怎麼把 Xid 監控與自動隔離做成產品功能，小而務實的生產實例。\n"}, {"id": "ch16-cost-multitenancy", "file": "ch16-cost-multitenancy.md", "group": "Part V — 生產維運", "title": "ch16 — 成本工程與多租戶：把 GPU 變成一門生意", "md": "# ch16 — 成本工程與多租戶：把 GPU 變成一門生意\n\n> **本章解決什麼問題**：前面十五章教你把 LLM 服務跑起來、跑得快、跑得穩；本章回答「跑得划不划算」——這是 staff 級工程師與資深工程師的分水嶺。你會建立 $/M token 的單位經濟模型、看懂 GPU 採購光譜（2026-06 價格快照）、完整算一遍 50B tokens/月的 build vs buy 決算，然後處理內部多租戶的三件髒活：計量計費（chargeback）、token 計價的限流、noisy neighbor 隔離。技術優化手段本身在 ch05-07，容量數學在 ch13——本章拿它們的結論當輸入，算錢。\n\n## 從你已知的出發\n\n你做過的三件事，在這一章會直接變現。\n\n第一，你把 RDS CPU 尖峰降了 40%——那其實是一次成本工程：同樣的負載用更少的資源扛住，省下的是實例費。本章做的事一模一樣，只是資源從 vCPU 換成 GPU，而 GPU 貴兩個量級：一台 db.r5.2xlarge 一個月一千美金上下，一台 8×H100 節點一個月一萬五到四萬美金（2026-06 快照，取決於怎麼租）。在後端世界「利用率低一點沒關係」的鬆弛感，在 GPU 世界是直接燒錢。\n\n第二，你寫過結算 pipeline：K8s CronJobs → SQS → idempotent consumers，每季結算十萬到三十萬筆獎勵。把「獎勵發放事件」換成「token 用量事件」，把「每季結算」換成「每月出帳」，你就已經會做 chargeback 的計量管線了——架構同構，連 idempotency 跟最終一致性的坑都在同樣的位置。\n\n第三，你寫過 rate limiter。token bucket 這個演算法你閉著眼睛能寫——桶子、補水速率、突發容量。本章它會再出現一次，唯一的差別是：**桶裡裝的不再是「請求數」這種抽象單位，而是字面意義的 token**。一個請求可能從桶裡拿走 50 個 token，也可能拿走 200,000 個。這個變化讓「一個請求扣一點」的舊設計徹底失效，但演算法本身不用換。\n\n還有一個對照值得先記下：你在 AWS 上看過 cost allocation tags 與 Cost Explorer——雲端 FinOps 那一套（showback、預算告警、預留實例 vs on-demand 的取捨）整包搬過來都成立，只是這裡的「預留實例」叫 reserved GPU capacity，「Savings Plans」叫一年期合約，而且因為 GPU 供需波動比 EC2 劇烈得多，押錯邊的代價也大得多。\n\n## 單位經濟學：$/M token 是怎麼來的\n\nLLM 推論的成本最終都收斂到一個數字：**每百萬 token 的成本（$/Mtok）**。它的推導只有一行：\n\n```text\n理論 $/Mtok = GPU 單價 ($/GPU-hr) ÷ 有效 token rate (Mtok/GPU-hr)\n            = GPU 單價 ÷ (goodput tok/s × 3,600 ÷ 10^6)\n            = GPU 單價 ÷ (goodput × 0.0036)\n\n實付 $/Mtok = 理論 $/Mtok ÷ 機隊利用率\n```\n\n兩個變數要講清楚定義，否則這條公式會騙你：\n\n- **goodput**（ch14）：滿足 SLO 前提下、單 GPU 每秒處理的 token 數，input 與 output 都算（兩者的單位成本差很多，後面會加權處理，先用總量建立直覺）。注意是 goodput 不是吞吐——超出 SLO 的 token 對產品是廢品，廢品不能攤成本。\n- **機隊利用率**：實際處理的 token 量 ÷ 機隊滿載能處理的量。你為尖峰配置容量、為故障留 headroom、為發布留 buffer——這些都讓分母大於分子。\n\n代入一組真實量級（2026-06 快照；goodput 假設為你照 ch13/ch14 方法 benchmark 出來的數字）：H100 租金 $2.50/hr，70B 級模型 FP8、TP2，量到混合流量 goodput 約 2,000 tok/s/GPU：\n\n```text\n理論 $/Mtok = 2.50 ÷ (2,000 × 0.0036) = 2.50 ÷ 7.2 ≈ $0.35\n機隊利用率 40% → 實付 $/Mtok ≈ $0.87\n```\n\n把 $0.87 跟 serverless API 牌價放在一起看：Together AI 的 Llama-3.3-70B 牌價 $0.88/Mtok（2026-06 快照）。幾乎打平不是巧合——這個市場已經有效率到「自建的全成本 ≈ 託管牌價」，供應商的毛利就藏在「他們的利用率比你高」這件事裡。這是本章反覆出現的主題。\n\n### 什麼最動成本：排序與量級\n\n公式裡每個變數都能優化，但槓桿長度差很多。我的排序與量級如下（前提：你已經用 vLLM 這類現代引擎，continuous batching 是入場券不是優化）：\n\n| 排序 | 槓桿 | 量級 | 機制 |\n|---|---|---|---|\n| 1 | **利用率** | **2–5×** | 公式裡唯一站在分母、又最常爛掉的數。dev 叢集常態低於 30%；尖谷比 2–3× 的線上流量，峰值配置下利用率天花板就是 40–50%。從 20% 拉到 70% = 成本直接砍 3.5 倍，不用動任何一行引擎程式碼。手段：填谷（batch 工作負載吃離峰，見下文）、配額治理（ch11 quota）、autoscaling（ch13）、減少碎片（ch11 bin-packing）。 |\n| 2 | **快取命中** | **1.5–3×**（agentic 流量可到 5×） | prefix cache 命中讓 prefill 幾乎免費（ch05）。市場證據：各家 API 把 cached input 定價在原價的 10–25%（2026-06）——定價反映成本結構。agentic 流量 input 佔比常超過 90% 且 prefix 重複率極高，命中率從 0 到 90% 等於把最大那塊成本打一折。 |\n| 3 | **batch 調優／量化** | **殘餘 1.5–3×** | 從 naive serving 到 continuous batching 是 10× 級，但那是 ch06 的入場券。在此之上：batch 參數調優 1.2–1.5×（ch06/ch08）、FP8 1.4–1.8×、INT4/FP4 再 1.3–1.8× 但帶品質風險（ch07）。 |\n| 4 | **硬體代際** | **perf/$ 每代約 1.2–1.5×** | B200 租金約 H100 的 2.2 倍、吞吐約 2–3 倍（2026-06 快照）——租賃市場會把代際紅利的大半定價掉。買斷自有硬體才能吃到完整代際紅利，但那是另一個量級的承諾。 |\n\n這個排序的含意很直白：**在排第 1、2 的槓桿還沒拉滿之前，去追第 3、4 是本末倒置**。我看過太多團隊在利用率 25% 的叢集上認真評估 FP4——先把那 3 倍撿起來。\n\n## GPU 取得光譜（2026-06 價格快照）\n\n> ⚠️ GPU 租價以月為單位波動。下表所有絕對數字都是 2026 年年中快照，書付印時必然過期；**級距與倍率關係**才是該記的東西。即時行情可查 getdeploying.com/gpus 這類聚合站。\n\n| 層級 | 代表 | H100 級距（$/GPU-hr） | 適合 | 代價／陷阱 |\n|---|---|---|---|---|\n| Hyperscaler on-demand | AWS p5、Azure ND H100 v5 | **$6.9–12** | 已有企業合約／合規要求、要跟既有 VPC 整合 | 最貴的一層；配額審批慢 |\n| Hyperscaler 承諾折扣 | 1–3 年 committed / Savings Plans | 牌價的 4–7 折 | 同上＋用量可預測 | 鎖定期；GPU 代際換代風險自負 |\n| Neocloud on-demand | CoreWeave、Lambda、Nebius、Crusoe | **$2–3.3**（Lambda ~$2.99、RunPod ~$2.49） | 自建推論的主流起點 | 比 hyperscaler 便宜 35–50%+，但生態服務少（沒有 RDS 給你靠） |\n| Neocloud reserved | 同上，6–36 個月合約 | **約 $1.5–2.5**（CoreWeave 宣稱保留合約可比 on-demand 低最多 60%；Lambda 歷史上 1 年約 8 折） | 量穩定後的主力 | 簽約即承諾；報價不公開、要談 |\n| Marketplace / community | Vast.ai、RunPod community | **$1.4–2** | 實驗、可中斷工作 | 可靠性與資安自負；單卡居多、難組叢集 |\n| Spot / preemptible | 各家 spot 池（B200 spot 曾見 ~$2.1） | on-demand 的 3–6 折 | **batch 工作負載**（見下節） | 隨時被回收。**online serving 不要碰**：權重載入分鐘級（ch12 cold start），回收 = 直接掉容量 |\n| Serverless per-GPU-second | RunPod Serverless、Modal、Baseten | 按秒計費，單價高於時租 | 突發、低流量、scale-to-zero 場景 | 冷啟動稅（ch12）；穩定流量下比時租貴 |\n| Serverless per-token（API 託管） | Together、Fireworks、DeepInfra；封閉模型則是 OpenAI/Anthropic/Google | 不租卡，直接買 token | 下一節整節討論 | 控制權全部讓渡 |\n\n兩條結構性觀察：\n\n1. **Spot 與推論的關係是「分工」不是「替代」**。online serving 的狀態太重（權重 + KV cache）、冷啟動太慢，spot 回收等於容量瞬間蒸發，再便宜都不值。但離線 batch 推論（eval、資料合成、embedding 回填）天生 checkpoint-able，spot 是它的主場。\n2. **越往下層走，你接手的維運面積越大**。Hyperscaler 把網路、儲存、排障都包了；marketplace 上你連這張卡昨天被誰用來挖礦都不知道。SemiAnalysis 對 neocloud 經濟結構的拆解（見延伸閱讀）值得整篇讀完——你會理解為什麼同一張 H100 的租價可以差 5 倍。\n\n## Worked example：50B tokens/月的 build vs buy 決算\n\n這是本章的核心計算。設定：你的產品月吞吐 50B tokens（**40B input + 10B output**，4:1 是 chat+RAG 混合流量的典型比例），模型是 70B 級開放權重（沿用 ch03 的 Llama-3.3-70B），SLO 是 chat 等級（TTFT p95 < 1.5s）。比較三案：（a）API 託管、（b）neocloud 租 H100 on-demand 自建、（c）一年期保留容量自建。所有價格皆為 2026-06 快照。\n\n**共用假設**（每一個都該換成你自己的數字）：\n\n| 參數 | 值 | 來源 |\n|---|---|---|\n| 月秒數 | 2.628M s（730 hr） | — |\n| 尖峰係數 | 2×（日夜週期） | 你的流量觀測 |\n| 單 GPU goodput | 2,000 tok/s（70B FP8、TP2、含 prefill+decode 混合、SLO 內） | ch14 方法 benchmark |\n| Headroom | 25%（含 N+1 與發布 buffer） | ch13 的結論直接當輸入 |\n| 工程師全載成本 | $14k/月/FTE | 假設參數，依你的市場調整 |\n\n### Step 1：流量畫像 → 峰值需求\n\n```text\n平均 token rate = 50×10^9 ÷ 2.628×10^6 s ≈ 19,000 tok/s\n峰值 token rate = 19,000 × 2 = 38,000 tok/s\n```\n\n### Step 2：峰值需求 → 卡數\n\n```text\n裸需求 = 38,000 ÷ 2,000 = 19 張 H100\n加 25% headroom = 23.75 → 取整為 24 張（12 組 TP2，恰好 3 台 8 卡節點）\n機隊利用率 = 19,000 ÷ (24 × 2,000) = 40%\n```\n\n注意這個 40%：你什麼都沒做錯——尖峰係數 2× 加上 25% headroom，數學上限就是這樣。這就是「利用率排第一」的具體長相。\n\n### Step 3：三案逐月成本\n\n**Case A — API 託管（serverless per-token）**\n\n- 一線供應商牌價：Llama-3.3-70B 在 Together/Fireworks 約 **$0.88–0.90/Mtok**（input/output 同價，2026-06）：\n  `50,000 Mtok × $0.88 = $44,000/月`\n- 低價層（DeepInfra 等）：input ~$0.23、output ~$0.40（2026-06）：\n  `40,000 × $0.23 + 10,000 × $0.40 ≈ $13,200/月`\n  代價：TTFT 變異大、rate limit 緊、部署可能是量化版、資料條款要逐字讀。截至我能確認的資訊（2026-06），低價層的定價可能低於合理的自建邊際成本——背後可能是超賣、量化部署或虧本搶市，把它當 baseline 要打折扣看待。\n- 人力：只剩整合與監控，估 0.15 FTE ≈ $2,000。\n\n**Case A 合計：$15k–46k/月**，取決於你選哪一層、談到什麼量價。\n\n**Case B — neocloud on-demand 自建**\n\n```text\nGPU：24 × $2.50/hr × 730 hr        = $43,800\n附加（儲存、監控、egress、CI 用卡）  ≈  $2,500\n人力：1.5 FTE × $14k（on-call 輪值） = $21,000\n─────────────────────────────────────────────\n合計                                ≈ $67,300/月   → blended $1.35/Mtok\n```\n\n注意 GPU-only 的 $43,800 ÷ 50,000 Mtok = **$0.88/Mtok——跟 Together 牌價一模一樣**。市場效率的具體展示：on-demand 自建在純 GPU 成本上對牌價 API 毫無優勢，加上人力後直接輸。\n\n**Case C — 一年期保留容量自建**\n\n保留價假設 $1.90/GPU-hr（neocloud 一年合約級距 $1.5–2.5 的中位，2026-06）：\n\n```text\nGPU：24 × $1.90/hr × 730 hr         = $33,300\n附加                                 ≈  $2,500\n人力：1.5 FTE                        = $21,000\n─────────────────────────────────────────────\n合計                                ≈ $56,800/月   → blended $1.14/Mtok\n```\n\n外加一個帳面外的負債：**你簽了 12 個月**。流量腰斬時 API 帳單跟著腰斬，這 $33,300 不會。\n\n### Step 4：crossover 在哪裡\n\n三案的成本結構：API 是純斜率（成本 ∝ token 量、零底座）；自建是「底座（人力＋附加）＋斜率（GPU ∝ 容量 ∝ token 量）」。crossover 解這條方程式：\n\n```text\nAPI 單價 × T = 自建斜率 × T + 自建底座\nT* = 底座 ÷ (API 單價 − 自建斜率)\n\n代入 Case C：T* = $23,500 ÷ ($0.88 − $0.67) ≈ 112,000 Mtok ≈ 112B tokens/月\n（自建斜率 $0.67/Mtok = $33,300 GPU 費 ÷ 50,000 Mtok，已內含 40% 利用率）\n```\n\n| 月吞吐 | A1 API 牌價 | A2 API 低價層 | B on-demand 自建 | C reserved 自建 |\n|---|---|---|---|---|\n| 10B | **$8.8k** | $2.6k | $34.5k | $31.8k |\n| 50B（本例） | $44k | **$13.2k** | $67.3k | $56.8k |\n| ~110B | $97k | $29k | $131k | **$107k ← crossover 區** |\n| 200B | $176k | $52.8k | $211k | **$169k** |\n\n（110B 以上人力估 2 FTE；表中 crossover 對「牌價 API vs reserved 自建」成立。）\n\n讀法：\n\n- **10B/月以下：API 完勝**，自建的底座（最小 HA 部署＋人力）就把你壓死。\n- **50B/月（本例）：API 仍勝**。牌價贏 22%，低價層贏 4 倍。\n- **約 110–150B/月：對牌價 API 的 crossover**。人力是階梯函數、API 大量採購又有議價空間，所以這是個區間不是一個點。\n- **對低價層 API（$0.26 blended）：在 40% 利用率下永遠不 crossover**——斜率就輸了（$0.67 > $0.26）。\n\n### Step 5：什麼會翻盤\n\n敏感度分析才是這個計算的真正產出：\n\n1. **利用率**。把離峰填上 batch 工作負載、流量越平，40% → 65%：自建斜率 $0.67 → $0.41。再加上 prefix cache 命中讓 goodput 2,000 → 3,000：斜率 → $0.27——這時你才摸到低價層 API 的水位。**自建唯一能在價格上獲勝的路徑，就是把排序第 1、2 的槓桿拉滿。**\n2. **非價格因素，而且實務上往往是它們決定**：資料不能出境／合規（API 直接出局）、客製 fine-tune 模型（託管 LoRA 另外加價或根本不收）、TTFT 要自己控、cache 主權（agentic 產品的 KV cache 策略是核心競爭力時，見 ch17）。\n3. **模型選擇本身**。這題用 dense 70B 算；換成 MoE（active params 小一個量級，ch03）整張表的絕對值全變。模型架構是最大的成本決策，只是它通常不歸 infra 團隊管。\n\n把這五步收成一句話：**buy 是預設值，build 要自證**——用你自己的流量、自己 benchmark 的 goodput、自己談到的價格重算一遍，而不是用部落格上的別人的數字。\n\n## Batch tier 與快取經濟學\n\n### 為什麼大家「恰好」都是 50%\n\nOpenAI Batch API、Anthropic Message Batches、Gemini Batch Mode——三家的折扣全是 50%、SLA 全是 24 小時內完成（2026-06）。整齊到這個程度一定有結構性原因，而你現在已經有工具看穿它：\n\n回到利用率那條公式。線上服務為尖峰配置，離峰時 GPU 閒著但錢照付——**batch tier 賣的就是這些谷底容量**。對供應商而言，batch 請求沒有延遲 SLO，排程器可以把它們塞進任何縫隙（夜間谷底、replica 暖機期、線上流量的瞬時低谷），邊際成本趨近於「本來就在燒的電」。50% 折扣換 24 小時排程自由度，對雙方都是好交易。Google 自己的工程部落格講得很直白：同一個模型、同樣的品質，折扣純粹是非同步換來的排程效率。\n\n自建版本同樣成立，而且是你拉高利用率的主力手段：**讓內部的 eval、資料合成、embedding 回填走低優先級佇列，吃線上服務的離峰容量**——用 ch06 的 priority scheduling（vLLM 的 `--scheduling-policy priority`）加上租戶級 preemption（下一節），讓 batch 流量在線上尖峰時自動讓路。那 40% 利用率裡的谷底，就是這樣填成 65% 的。\n\n### 快取的定價即成本結構\n\n各家 API 的 cached input 定價是一份公開的成本結構招供（2026-06 快照，規則年年改版、來源間有矛盾，引用前查當下官方價目）：\n\n| 供應商 | cache read 價格 | 備註 |\n|---|---|---|\n| Anthropic | 基準價 10% | write 有溢價：5 分鐘 TTL 1.25×、1 小時 TTL 2× |\n| OpenAI | 50–90% 折扣依模型 | 自動快取、無 write 費（⚠️ 新模型折扣各來源說法 25–90% 不一） |\n| Google Gemini | 約 75–90% 折扣 | explicit caching 另收按小時的儲存費 |\n| DeepSeek | 約 90%+ 折扣 | 磁碟式自動快取；⚠️ V4 世代有報導稱折扣更深（原價 1/50 以下），僅見第三方來源 |\n\n讀出兩件事。第一，**read 打一折 ≈ prefix cache 命中時 prefill 的真實成本**（ch05 的機制：命中的 block 不重算，只剩 KV 載入與 attention 讀取）。第二，**Anthropic 的 write 溢價與 Gemini 的儲存費，是 KV cache 分層儲存（ch05 的 HBM→RAM→NVMe）的成本被直接轉嫁成商品**——KV cache 已經從引擎內部的優化變成一個有定價的儲存層級。\n\n對成本工程的含意：agentic 流量（input 佔比 90%+、prefix 重複率極高，ch17）讓**快取命中率變成損益表上的一級指標**。同一個 agent 產品，命中率 90% 與 50% 的 token 帳單可以差 2–3 倍——不管你是付 API 帳單（cached read 折扣）還是自建（goodput 翻倍）。所以：把 prefix cache hit rate 放進成本 dashboard，跟 $/Mtok 並排；prompt 的組織方式（穩定前綴在前、可變內容在後）要當成本規範來治理，不是工程美學。\n\n## 利用率會計：忙碌不等於有效\n\n「我們的 GPU 利用率 95%」是成本會議上最危險的一句話，因為 `nvidia-smi` 的 utilization 只表示「這段時間有 kernel 在跑」（ch14 講過 SM activity vs utilization 的差異）。成本視角需要一個三層的利用率會計：\n\n```text\n第一層：機隊層 —— 有多少 GPU-hr 被分配出去了？（vs 閒置、碎片、排隊中）\n第二層：分配層 —— 分配出去的 GPU-hr 有多少在做「有人要的工作」？\n第三層：有效層 —— 做的工作裡有多少轉成了 SLO 內的 token（goodput）？\n```\n\n每一層都有典型的洩漏：\n\n- **機隊層**：bin-packing 碎片（叢集帳面有 12 張空卡，但散在 6 個節點上，湊不出一台 8 卡機跑 TP8——ch11 講過機制，這裡它直接是錢）；dev/研究卡掛著 notebook 過週末；保留容量買了沒用滿。\n- **分配層**：「忙碌但無效」的 GPU——preemption 後的 recompute（ch06，同一段 prefill 算兩遍）、speculative decoding 被拒絕的 draft token（ch07）、客戶端早已斷線但還在繼續 decode 的殭屍請求（下文濫用防禦）、被打爆而全部超時的請求（100% busy、0% goodput）。\n- **有效層**：MFU/MBU 很高但 SLO 不滿足——對產品而言這些 FLOPs 是廢品。\n\ndev 卡治理值得單獨一段，因為它是最容易撿的錢：對 dev/研究用途用 time-slicing 或 MIG 切小（ch11），配 idle 自動回收（連續 N 小時無 kernel 活動就釋放），加上 showback 讓每張卡的閒置時數出現在持有團隊的月報上。經驗上，沒有治理的 dev 池利用率低於 20% 是常態而不是意外。\n\n## 內部多租戶：計量、限流、隔離\n\n平台做起來之後，你的客戶變成公司內部的 N 個團隊。三個問題依序出現：誰用了多少（計量）、誰能用多快（限流）、誰會弄壞誰（隔離）。\n\n### Chargeback / showback 設計\n\n計量管線的形狀你已經做過——這就是你的結算 pipeline 換了 payload：\n\n```text\n[Gateway] --usage event--> [Queue (SQS/Kafka)] --> [idempotent aggregator] --> [月度 rollup / dashboard]\n```\n\nusage event 的最小 schema（gateway 在請求完成或中斷時發出，ch12 的計量位置）：\n\n```json\n{\n  \"request_id\": \"…\",            // 冪等鍵——重送不重計，你熟\n  \"tenant_id\": \"team-search\",\n  \"model\": \"llama-3.3-70b-fp8\",\n  \"input_tokens\": 18234,\n  \"cached_input_tokens\": 15012, // 必須分開計！成本差 10 倍\n  \"output_tokens\": 512,\n  \"priority\": \"interactive\",     // interactive | standard | batch\n  \"ts\": \"2026-06-10T03:21:00Z\"\n}\n```\n\n關鍵設計決策三個：\n\n1. **內部價卡怎麼定**。從機隊全成本反推：`費率 = 機隊月成本 ÷ （目標利用率下的月 token 量）`，再按市場結構加權拆成三個費率——uncached input : cached input : output ≈ **1 : 0.1 : 4**（用上一節的 API 定價當權重依據）。給 cached input 打一折不是慈善，是**把真實成本結構傳導給內部用戶**，讓他們有動機把 prompt 組織成 cache-friendly 的形狀——計費設計就是行為設計。\n2. **headroom 與閒置誰買單**。三個選項：攤進費率（除以目標利用率而非實際利用率）、平台稅（固定比例）、或平台自吸收。陷阱是「100% 成本真實」的定價：某團隊下線後總用量掉，單價被迫上調，其他團隊看到漲價也想走——**內部定價的死亡螺旋**，FinOps 的經典事故。解法是費率定價時就用「目標利用率」當分母並按季檢討，犧牲一點真實性換穩定性。\n3. **showback 先行**。先讓帳單可見（showback）跑兩季，數字被質疑、修正、被信任之後，再變成真的預算劃轉（chargeback）。直接上 chargeback 的下場是所有團隊的第一反應都是攻擊計量方法，而不是優化用量。\n\n### Token-denominated rate limiting\n\n現在把你寫過的 token bucket 拿出來改。限流單位從「請求/分」換成「token/分（TPM）」之後，出現一個舊設計沒有的問題：**請求進來的當下，你不知道它要花多少 token**。input 可以當場算（tokenizer 一跑就有），但 output 要等生成完才知道，而 `max_tokens` 動輒是實際輸出的 4–16 倍。\n\n解法是你在金流系統見過的模式：**兩階段——先預留（reserve）、後結算（settle）**。\n\n```python\n# 示意：token 計價的 token bucket，Redis Lua 保證原子性\n# （你用 FluentBit + Lua 處理過 production log，這裡的 Lua 更短）\nRESERVE_LUA = \"\"\"\nlocal key  = KEYS[1]\nlocal now, rate, burst, cost = tonumber(ARGV[1]), tonumber(ARGV[2]),\n                               tonumber(ARGV[3]), tonumber(ARGV[4])\nlocal tokens = tonumber(redis.call('HGET', key, 'tokens') or burst)\nlocal ts     = tonumber(redis.call('HGET', key, 'ts') or now)\ntokens = math.min(burst, tokens + (now - ts) * rate)      -- 補水\nif tokens < cost then\n  return {0, math.ceil((cost - tokens) / rate)}           -- 拒絕＋Retry-After 秒數\nend\nredis.call('HSET', key, 'tokens', tokens - cost, 'ts', now)\nreturn {1, 0}\n\"\"\"\n\nasync def admit(tenant: str, prompt_tokens: int, max_tokens: int):\n    # 預留量：prompt 實數 + 輸出「預估值」——用該租戶歷史 p95 輸出，\n    # 而不是 max_tokens（否則過度預留會把吞吐掐死在配額的 1/10）\n    est_output = min(max_tokens, await p95_output(tenant))\n    reserve = prompt_tokens + 4 * est_output           # output 權重 4×\n    ok, retry_after = await redis.eval(RESERVE_LUA, keys=[f\"tpm:{tenant}\"],\n        args=[now(), tenant_rate(tenant), tenant_burst(tenant), reserve])\n    if not ok:\n        raise RateLimited(retry_after)                 # 429 + Retry-After\n    return reserve\n\nasync def settle(tenant: str, reserved: float, usage):\n    # 串流結束（或中斷）時結算實際加權用量，多退少補\n    actual = (usage.uncached_input + 0.1 * usage.cached_input\n              + 4.0 * usage.output)\n    await redis.eval(REFUND_LUA, keys=[f\"tpm:{tenant}\"],\n                     args=[now(), actual - reserved])  # 可為負：允許短期負債\n```\n\n設計重點，每一條都是會在生產咬人的：\n\n- **預留用 p95 不用 max_tokens**。用 max_tokens 預留，等於讓每個請求按最壞情況佔配額——實測會把租戶的有效吞吐掐到名目配額的幾分之一。代價是 settle 時可能補扣成負值（實際輸出超過 p95），所以桶要允許短期負債、在補水時自然還清。\n- **計量單位是加權 token**，權重沿用價卡（1 : 0.1 : 4）。cached input 只扣 0.1——再一次，把成本結構傳導成行為誘因。\n- **限流維度不只 TPM 一個**：TPM（成本上限）、RPM（防小請求洪峰）、並發數與 in-flight KV 預算（防下一節的 noisy neighbor）——三道閘各防一種攻擊面，缺一不可。\n- **Redis 掛了怎麼辦**——這個決策要寫在設計文件裡而不是事故報告裡：對外的免費層 fail-closed（寧可 429），對內的付費租戶 fail-open＋告警（寧可超賣也不要把全公司的 AI 功能打掛）。\n- 大租戶的桶是 hot key：按 tenant 分 shard 或本地預扣＋週期回寫，你在 Redis 上都做過。\n\n### Noisy neighbor：一個 200k-context 租戶怎麼吃光整個池\n\n具體算一次傷害有多大。沿用 ch03 的數字：Llama-3.3-70B（GQA）每 token KV ≈ 0.32 MB（FP16）。一個 200k context 的請求：\n\n```text\n200,000 tokens × 0.32 MB ≈ 64 GB 的 KV cache\n```\n\n你的 TP2 部署：2×H100 = 160 GB HBM，FP8 權重佔 70 GB，`gpu-memory-utilization 0.9` 之下 KV 池約 74 GB。**一個請求佔掉 86% 的池子**。後果連鎖反應：數十條 4–8k 的正常對話被 preempt（ch06）→ recompute 推高負載 → 全租戶 ITL 飆升；它的 200k prefill 即使有 chunked prefill 也要佔用 token budget 近一分鐘；順手還把熱 prefix 從 cache 裡擠出去，全池命中率下跌——三種傷害一次到位。而且這不是攻擊，只是某個團隊「想把整份文件塞進去試試」。\n\n隔離手段按成本從低到高分層，前三層在 gateway 就能做完：\n\n| 層 | 手段 | 防住什麼 | 代價 |\n|---|---|---|---|\n| 1 | Gateway 按租戶分級限制 `max context`／`max_tokens` | 未經申請的超長請求直接 422 | 幾行 config |\n| 2 | Token 計價限流（上文） | 200k 請求一次吃掉大半 TPM 桶，自我節流 | 已建好 |\n| 3 | 租戶級 in-flight KV 預算：Σ(每請求 context × 每 token KV) 超過配額即排隊 | 並發堆疊吃池 | gateway 記帳；引擎不原生支援 per-tenant KV 配額，只能在外面估 |\n| 4 | **池子分離**：長上下文流量路由到專用 InferencePool（ch12），用大 HBM 卡（H200/B200）；chat 池的 `--max-model-len` 直接設小，讓怪獸請求物理上進不來 | 徹底隔離資源畫像衝突的流量 | 多一個池的容量與維運 |\n| 5 | 租戶優先級 + preemption：interactive > standard > batch（vLLM priority scheduling + gateway 佇列） | 擠壓時犧牲順序可控 | 排程複雜度 |\n| 6 | 大租戶獨立部署（搭配 multi-LoRA 的經濟學見 ch12）；小模型多租戶用 MIG 硬隔離（ch11） | 連 cache 污染都隔開 | 利用率下降——隔離與利用率天生互斥 |\n\n注意第 6 層的代價：**隔離跟利用率是一對矛盾**。切得越碎，每個池的統計複用越差，你在第一節拉高的利用率又掉回去。預設用 1–5 層的軟隔離，硬隔離留給真正付得起的租戶。\n\n### 濫用防禦\n\n內部平台也需要，因為「濫用」多數不是惡意而是 bug：\n\n- **Streaming abandon**：客戶端斷線（或 agent 超時放棄）但 gateway 沒把取消傳到引擎，GPU 繼續為沒人收的 stream decode 完整個 `max_tokens`。防禦：斷線必須觸發引擎 abort（vLLM 支援請求中止），並把「abort 率」做成指標——這是分配層利用率的隱形洩漏。\n- **Denial of wallet**：agent 寫壞了，retry 迴圈每次都帶完整 200k context（ch15 的 retry storm，但這裡燒的是錢不是可用性）。防禦：租戶級預算硬上限（到頂直接 429 而不是寄信）、單日環比異常告警。\n- **max_tokens 濫用與配額套利**：把 `max_tokens` 設到頂「以防萬一」、把長工作拆小繞 RPM——兩階段結算讓前者只多扣預留、後者撞 TPM，設計正確時這兩種套利自動無利可圖。\n\n## TCO 全貌：GPU 之外的帳單\n\nbuild vs buy 的計算裡 GPU 拿走了鎂光燈，但自建的完整帳單還有四行，量級如下（以租用為主的部署；自有機房另有電力與土建，本書不展開）：\n\n| 項目 | 量級（相對 GPU 費用） | 說明 |\n|---|---|---|\n| 網路 | 租用通常內含；自組叢集時 IB/RoCE fabric 約佔硬體成本 10–15% | 多節點推論（ch09/ch10）才需要；跨 AZ egress 是隱形殺手 |\n| 儲存 | 1–3% | 權重倉（每個模型每個版本幾十到幾百 GB）、節點 NVMe 權重快取（ch12）、KV offload 層（ch05）、日誌 |\n| 可觀測性 | 1–5% | metrics/log/trace 的儲存與查詢（ch14 那套不是免費的） |\n| **人力** | **本例中 ≈ GPU 費的 40–60%** | 最常被漏算的一行。1.5–2 個能扛 GPU on-call 的工程師，在 2026 年是稀缺品——這正是你讀這本書的原因，也是自建門檻的真正所在 |\n\nworked example 裡 Case C 的 $56,800 中人力佔 $21,000——**37%**。任何不含人力的 build vs buy 分析都是在自欺。\n\n## 故障模式與防禦\n\n成本工程的「故障」往往不報 5xx，它報在月底帳單上。照例列表：\n\n| 故障 | 症狀 | 怎麼觀測 | 防禦 |\n|---|---|---|---|\n| Denial of wallet（agent retry 迴圈） | 帳單單日 ×10；某租戶 token 量暴增但成功率沒變 | 租戶級每小時用量環比告警 | 預算硬上限；retry budget（ch15）；異常自動降級到 429 |\n| Streaming abandon 洩漏 | GPU 忙、goodput 掉；abort 率為 0（反而可疑） | 「client 斷線數 vs 引擎 abort 數」對帳 | 斷線→abort 的傳播鏈做整合測試；abort 率進 dashboard |\n| 快取命中率崩落 | 成本悄悄 +50–200%，無任何錯誤 | prefix cache hit rate 進成本 dashboard 並設告警 | 模型/版本升級會清空 cache（ch05）——發布時預期並預熱；prompt 改版要過 cache 影響評估 |\n| 限流器估算漂移 | 租戶抱怨 429 但帳面用量遠低於配額（過度預留）；或配額形同虛設（預估過低） | reserve vs settle 的差值分布 | p95 預估值定期重算；差值分布進監控 |\n| Redis（限流狀態）故障 | fail-open：配額全失效；fail-closed：全平台 429 | 限流器自身的健康指標 | 每租戶層級預先決定 fail 方向；本地兜底桶 |\n| 保留容量買錯邊 | 利用率長期 <30% 但合約照付；或反向——天天撞容量上限去買貴的 on-demand | 保留 vs on-demand 用量比、合約利用率月報 | 先 on-demand 跑出三個月真實曲線再簽約；保留量壓在「基載」而非尖峰 |\n| 碎片化吃掉帳面容量 | 「有 12 張空卡但 8 卡 job 排不進去」 | 叢集可分配拓撲 vs 名目空卡數（ch11） | bin-packing 策略、定期 defrag/drain 重排 |\n| 殭屍 dev 卡 | dev 池利用率 <20% 成為常態 | 每卡 idle 時數 showback | idle 自動回收；dev 用 time-slicing/MIG 切小（ch11） |\n| 內部定價死亡螺旋 | 租戶退出→單價上調→更多租戶退出 | 費率變動史與租戶流失的相關性 | 用目標利用率定價、按季調整；平台稅吸收波動 |\n\n共同主題：**成本故障的偵測手段全是「對帳」**——預留 vs 結算、斷線 vs abort、帳面容量 vs 可排程容量、保留 vs 實用。你在結算 pipeline 學到的對帳紀律，在這裡原封不動適用。\n\n## 動手做\n\n### 實驗 1 [紙上推演]：替你公司的一個 AI 功能做 build vs buy\n\n拿你目前（或上一份）公司一個真實或假想的 AI 功能（客服摘要、搜尋改寫、code review bot 都行）：\n\n1. 估流量畫像：月 token 量、input/output 比、尖峰係數（沒數據就給三檔情境：低/中/高）。\n2. 選一個開放權重模型，照本章五步算三案（API 牌價自查當日價目；自建 goodput 用 ch13 的方法粗估或借本章假設值並標注）。\n3. 算出 crossover 點，寫 200 字的建議書：buy 還是 build、什麼條件下翻盤。\n\n**成功標準**：三案的月成本各有一張可審計的算式表；crossover 公式代入正確；建議書裡至少有一個非價格因素的論證。\n\n### 實驗 2 [M1]：實作 token-denominated rate limiter\n\n你寫過 rate limiter；這次計量單位換成 token，且要處理「輸出未知」：\n\n```bash\n# 1. 起依賴：Redis + 模擬引擎（不需要 GPU）\ndocker run -d -p 6379:6379 redis:7\n# llm-d-inference-sim 模擬 vLLM 的 OpenAI-compatible API（旗標以 repo README 為準）\ndocker run -d -p 8000:8000 ghcr.io/llm-d/llm-d-inference-sim:latest --model fake-70b\n\n# 2. 在 ch04 的 FastAPI proxy 前面加上本章的 reserve/settle 兩階段限流\n#    （Redis Lua 原子扣減；settle 在 stream 結束與斷線時都要觸發）\n\n# 3. 用 k6 模擬兩個租戶：\n#    tenant-A：穩定的短請求（prompt ~500 tok）\n#    tenant-B：突發的長請求（prompt ~50k tok，模擬 noisy neighbor）\n```\n\n**成功標準**：（1）tenant-B 的長請求會按 token 成本快速耗盡自己的 TPM 桶並收到帶 `Retry-After` 的 429，而 tenant-A 的 p95 延遲不受影響；（2）刻意在 stream 中途斷線，驗證 settle 仍被觸發且多退少補正確（對帳：Σreserve − Σrefund = Σactual）；（3）關掉 Redis，驗證你設計的 fail-open/fail-closed 行為如預期。\n\n### 實驗 3 [紙上推演]：設計一張內部價卡\n\n給定：24×H100 機隊、月全成本 $57k（借用 Case C）、目標利用率 60%、流量結構 uncached input : cached input : output = 25 : 55 : 20。\n\n1. 推出三個費率（權重 1 : 0.1 : 4），驗算：費率 × 預期月用量 = 月全成本。\n2. 回答：headroom 的成本你選擇攤進費率、收平台稅、還是平台吸收？寫下理由與死亡螺旋的防範。\n\n**成功標準**：三費率可驗算回全成本；能對「為什麼 cached input 只收一折」給出成本結構與行為誘因兩層理由。\n\n## 這個領域往哪走\n\n三個方向值得盯（皆為 2026-06 視角，詳細展開見 ch17）：計價單位正從 $/token 往 **$/任務** 演化——reasoning 模型讓同一個問題的 token 量差 50 倍，token 計價對買方越來越難預算；**推論市場聚合層**（OpenRouter 類）把「買 token」變成有比價、有路由的市場，會持續壓縮純轉售型供應商的毛利；**電力**正在成為比 GPU 更硬的約束，power-aware 的成本工程（把 batch 負載排到電價低谷）可能在 2–3 年內從論文走進你的排程器。\n\n## 自我檢核\n\n1. 寫出 $/Mtok 的推導公式。四大成本槓桿（利用率、快取命中、batch/量化、硬體代際）為什麼是這個排序？各給量級。\n2. 你的機隊「利用率 95%」，為什麼可能仍在大量燒錢？用三層利用率會計各舉一個洩漏。\n3. 為什麼 OpenAI/Anthropic/Google 的 batch tier「恰好」都是 50% 折扣＋24 小時 SLA？自建時對應的手段是什麼？\n4. 各家 API 把 cached input 定價在原價 10–25% 這件事，透露了什麼成本結構？對 agentic 產品的成本治理有什麼含意？\n5. 一個 200k-context 請求對 Llama-3.3-70B（TP2、2×H100）的 KV 池佔比是多少？算出來，並給出至少三層隔離手段與各自代價。\n6. Token-denominated rate limiter 為什麼需要兩階段 reserve/settle？預留用 max_tokens 會出什麼事？Redis 掛掉時 fail-open 還是 fail-closed，你怎麼決定？\n7. 內部 chargeback 的「死亡螺旋」是怎麼發生的？定價時怎麼防？\n8. 月吞吐 50B tokens 的產品，什麼條件下自建才划算？寫出 crossover 公式，並列出三個會推翻純價格結論的非價格因素。\n\n## 延伸閱讀\n\n- [SemiAnalysis — AI Neocloud Playbook and Anatomy](https://newsletter.semianalysis.com/p/ai-neocloud-playbook-and-anatomy)：neocloud 商業模式與 H100 叢集 TCO 的最完整公開拆解，理解「同一張卡租價差 5 倍」的供給側原因。\n- [SemiAnalysis — The GPU Cloud ClusterMAX Rating System](https://semianalysis.com/2025/03/26/the-gpu-cloud-clustermax-rating-system-how-to-rent-gpus/)：怎麼評估與挑選 GPU 雲，租卡前必讀。\n- [Artificial Analysis — Prompt Caching 價格對照](https://artificialanalysis.ai/models/caching)：跨供應商的 cache read/write 定價即時對照，本章「定價即成本結構」論證的資料來源。\n- [Google — Gemini Batch API 文件](https://ai.google.dev/gemini-api/docs/batch-api)與[官方部落格](https://developers.googleblog.com/en/scale-your-ai-workloads-batch-mode-gemini-api/)：batch tier 50% 折扣的結構性原因，供應商自己的說法。\n- [OpenAI — Batch API 指南](https://platform.openai.com/docs/guides/batch)：另一家的 batch tier 設計，注意與 Gemini 在配額與失敗處理上的差異。\n- [a16z — State of AI: 100 Trillion Token Study](https://a16z.com/state-of-ai/)：OpenRouter 真實流量的結構分析，agentic 流量如何改變成本畫像的最佳實證來源。\n- [FinOps Foundation — FinOps Framework](https://www.finops.org/framework/)：showback/chargeback 的組織實務；雲端成本治理的方法論可整套平移到 GPU 平台。\n- [getdeploying.com/gpus](https://getdeploying.com/gpus)：GPU 租價即時聚合站，查當日行情用——本章所有絕對價格過期後，從這裡重算。\n- [vLLM — V1 引擎與 priority scheduling 文件](https://docs.vllm.ai/en/stable/usage/v1_guide/)：租戶間優先級與 preemption 的引擎側落地。\n"}, {"id": "ch17-frontier-2026-2028", "file": "ch17-frontier-2026-2028.md", "group": "Part VI — 前沿與職涯", "title": "ch17 — 前沿（2026–2028）：流量在變、模型在變、硬體在變", "md": "# ch17 — 前沿（2026–2028）：流量在變、模型在變、硬體在變\n\n> **本章解決什麼問題**：前 16 章教你的是一套已經收斂的工程體系——KV cache 管理（ch05）、continuous batching（ch06）、P/D 分離與 KV 路由（ch10）、容量規劃（ch13）。但這個領域的地基還在移動：流量形態正在從 chat 換成 agentic、模型架構正在動搖 KV cache 的數學、硬體路線圖兩年一翻、電力取代晶片成為新瓶頸。本章用 2026-06 查證過的證據分析未來 2–3 年資源會砸向哪裡，並在最後給你一張「能力耐久性矩陣」：哪些知識會在你讀完本書前就過期、哪些十年不變。這是全書觀點最重的一章——凡是推測，我會標明是推測。\n\n## 從你已知的出發\n\n你經歷過「使用者行為改變壓垮原設計」。遊戲後端為人類玩家設計：人類有思考時間、有睡眠週期、操作頻率有上限。然後腳本和外掛來了——機器節奏、無間隔、無日夜——原本健康的容量模型一夜作廢。本章的核心論點是同一件事正發生在 LLM serving 上：**為人類打字節奏設計的推論平台，正在被機器發起的 agentic 流量重新定義**。你用 k6 做過 open-loop 負載測試，知道「無協調遺漏、不等回應就發下一發」的流量和真人流量是兩種生物——agentic workload 就是把你的負載測試變成生產流量。\n\n你也從 framework churn 裡存活過：Express 到 NestJS、REST 到 GraphQL、跑過好幾代 ORM。回頭看，真正保值的不是任何框架的 API，而是 SQL、索引、佇列理論、量測方法論。本章最後那張耐久性矩陣，就是把你已經會做的「押注不變量」判斷，套用到 AI infra 的 2026–2028。\n\n最後，你做過容量規劃的 headroom 思維——不確定的未來不是用猜的，是用對沖的。本章每個預測後面都附「如果我錯了，會錯在哪、你怎麼觀測到」。\n\n## 流量形態革命：agentic workload 正在取代 chat\n\n這是本章的核心論點，先把證據攤開，再講它顛覆了什麼。\n\n### 證據：流量結構已經換血（2026-06）\n\na16z 與 OpenRouter 合作的「State of AI: 100 Trillion Token Study」（arXiv:2601.10088，2025-12 發布）是目前最大的推論需求面實證研究，分析了 OpenRouter 平台上超過 100 兆 token 的真實流量。幾個關鍵數字：\n\n- **Programming 類請求佔比從 2025 年初的約 11% 漲到超過 50%**——而 coding 正是 agentic 化最徹底的場景。\n- **Reasoning 模型的 token 佔比超過 50%**，2025 年 Q1 時接近零。\n- **平均 prompt 長度從約 1.5k token 漲到 6k+（約四倍）**，輸出從約 150 漲到 400；programming 流量的輸入經常性超過 20k token。\n- Agentic inference（模型規劃→呼叫工具→讀結果→迭代的多步驟序列）是平台上**成長最快的使用形態**。\n\n旁證：Anthropic 的 Economic Index 報告顯示其 API 流量以自動化（automated）使用為主，Claude Code 已佔抽樣 API 流量的大宗，44% 的 API 流量對應到 computer/mathematical 類任務。llm-d 專案引述的生產數據則指出 agentic 流量的 input:output 比可以超過 **100:1**——絕大多數 token 是被反覆重送的 context，不是新內容。\n\n把這些數字疊起來，結論很難迴避：**主流負載已經不是「一個人類打一段字、模型回一段字」，而是「一台機器帶著巨大的固定 context，以工具迴圈節奏連續轟炸 API」**。MCP（Model Context Protocol，2024-11 由 Anthropic 發布、現已交由 Linux Foundation 旗下基金會中立託管）把工具接入標準化之後，這個形態還在加速——標準化的工具定義直接膨脹在每個請求的 prefix 裡。\n\n### 兩種流量，五個維度的差異\n\n| 維度 | Chat（人類節奏） | Agentic（機器節奏） |\n|---|---|---|\n| 請求間隔 | 30–60s（人在思考、打字） | 0–10s（工具執行完就發） |\n| Context 成長 | 每輪幾百 token，session 末端幾 k | 每輪 1–3k（工具結果），末端可達 100k+ |\n| Prefix 重複率 | 高（多輪對話），但 session 短 | 極高（system prompt + 工具定義 + 全部歷史逐輪重送） |\n| Input:output 比 | 個位數比 1 | 數十到 100+ 比 1 |\n| 尖峰成因 | 日夜週期、行銷活動 | CI 觸發、cron、平行分支探索——機器同步性，比人類尖峰陡得多 |\n\n第五點值得多說一句：agentic 流量會出現**平行分支探索**——一個任務 fork 出多個子 agent 同時跑（Kimi K2.6 甚至把 Agent Swarm 做成 API 原語，2026-04）。這在後端視角就是 fan-out 放大器：一個使用者動作，後面是幾十路併發推論。你在遊戲後端見過整點活動的同步尖峰；agentic 尖峰是它的加強版，因為觸發者本身就是程式。\n\n### 它對前面每一章意味著什麼\n\n| 前章設計 | Chat 時代的定位 | Agentic 時代的定位 |\n|---|---|---|\n| Prefix caching（ch05） | 錦上添花的優化（省 system prompt） | **生存必需**：97%+ 的輸入是重複 prefix，沒有它成本直接 ×30（下面 worked example 算給你看） |\n| KV offloading 分層（ch05） | 少數長 context 場景才需要 | 標配：session KV 以數十 GB 計、跨呼叫存活分鐘級，HBM 裝不下也捨不得丟 |\n| Chunked prefill / 排程（ch06） | 平衡長短請求 | 長 prefill 請求成為常態而非尾巴，token budget 的拉扯加劇 |\n| P/D 分離（ch10） | 大規模才值得的複雜度 | 流量本身就是極端 prefill-heavy（input:output 100:1），xPyD 配比整個改寫 |\n| KV-aware routing（ch10） | TTFT 優化手段 | **產品核心**：routing miss = 重算數十秒的 prefill，llm-d 量測 cache-aware vs cache-blind 的 P90 TTFT 差距達 57 倍（專案自報數據） |\n| Autoscaling 訊號（ch13） | RPS 已經不準 | 更不準：一個 session 60 次呼叫，併發 session 數與呼叫頻率才是訊號；尖峰同步性逼你加大 headroom |\n| Retry storm 防禦（ch15） | 人會放棄重試 | 機器不會：SDK 內建指數退避也擋不住一個寫錯的 agent 迴圈，admission control 從建議變成底線 |\n| 成本歸因（ch16） | per-request 計量 | per-session、per-task 計量；cache 命中率直接決定毛利 |\n\n一句話總結我的立場：**chat 時代的推論平台是 stateless web 服務加一點快取；agentic 時代的推論平台是一個分散式狀態機，KV cache 是它的 working set**。這不是漸進演化，是負載性質的相變——就像你的遊戲後端從「玩家請求」變成「整個世界的 bot 都在打你」。\n\n## Worked example：agentic coding assistant vs chat 的流量畫像\n\n用公開數據錨點建兩個流量畫像，然後推導 KV 容量與路由需求的差異。錨點：OpenRouter 研究的 programming 輸入經常 >20k token、平均輸出約 400；llm-d 引述的 input:output >100:1；Anthropic 對 agent 把任務拆成大量 API 呼叫的描述。以下具體參數是**我基於這些錨點的估算**（標示為估），模型用 ch03 的基準 Llama-3.3-70B（GQA、BF16 KV ≈ 320 KB/token）。\n\n**畫像 A：客服型 chat session（估）**\n\n- 8 輪對話，輪間隔約 45s（人類節奏），session 約 8 分鐘\n- System prompt 500 token；每輪使用者輸入 80、模型輸出 350\n- Session 末端 context：500 + 8 × 430 ≈ **3.9k token**\n- 邏輯輸入總量（每輪重送歷史）：約 16.7k token；輸出 2.8k → input:output ≈ 6:1\n- 末端 KV：3.9k × 320 KB ≈ **1.2 GB**；呼叫頻率約 1 次/分鐘\n\n**畫像 B：agentic coding session（估）**\n\n- 一個任務 = 60 次模型呼叫（工具迴圈：讀檔、改檔、跑測試、看結果）\n- 靜態 prefix：system prompt + 工具/MCP 定義 ≈ 18k token（與「programming 輸入經常 >20k」一致）\n- 每次呼叫新增約 2k token（工具結果 + 上一輪動作），輸出平均 1k（含 reasoning 摘要與工具呼叫）\n- Context：第 n 次呼叫 ≈ 18k + 2k×n → 末端 ≈ **138k token**，全程平均 ≈ 78k\n- 邏輯輸入總量：Σ(18k + 2k×(n−1)) ≈ 60×18k + 2k×1,770 ≈ **4.62M token**；輸出 60k → input:output ≈ **77:1**（與公開的 >100:1 同量級，驗證畫像合理）\n- 呼叫頻率約 6 次/分鐘（工具執行 2–10s），是 chat 的 6–10 倍\n- 平均 KV：78k × 320 KB ≈ **25 GB**；末端 138k ≈ **44 GB**\n\n**推導一：prefix caching 從優化變成成本結構本身。** 無 cache 時這個 session 要 prefill 4.62M token；有 prefix cache（每輪只算新增的 ~2k suffix）時實際 prefill ≈ 18k + 59×2k ≈ 136k token——**34 倍差距，cache 命中率 97%**。換句話說，agentic 服務商的成本結構裡，prefill 成本幾乎完全由 cache 命中率決定。這就是為什麼各家 API 把 cached input 折扣壓到 90%+（Anthropic read 為基準價 10%、DeepSeek 更深，2026-06，見 ch16）——不是慈善，是 cache 命中後的邊際成本真的只剩零頭，而 agentic 客戶對這個價差極度敏感。\n\n**推導二：KV 容量需求差 20–35 倍，分層儲存從可選變必選。** 1,000 條並發 chat session 的 KV ≈ 1.2 TB；1,000 條 agentic session ≈ 25 TB。ch03 算過 2×H100 留給 KV 的池子約 65 GB——agentic 場景下**兩三條 session 就吃滿**。但工具執行的 2–10s 間隔又意味著 KV 不能丟（丟了就是重算 78k prefill）。唯一出路是 ch05 的分層：HBM 只放正在 decode 的 working set，間隔期掉到 CPU RAM / NVMe，工具回來前搬回去。這正是 vLLM v0.22 把 multi-tier KV offloading 做成框架、Mooncake 把 KV 做成獨立儲存系統的需求面原因（2026-06）。\n\n**推導三：路由的賭注高了兩個數量級。** Chat 的 routing miss 代價是重算 3.9k prefill——亞秒級，round-robin 勉強能活。Agentic 的 miss 是重算 78k prefill——以 ch03 的 prefill 速率估算是數十秒級，TTFT 直接爆掉 SLO。所以 prefix-aware routing（ch10）對 chat 是加分項、對 agentic 是 50–100 倍的 TTFT 槓桿。路由器必須知道「這條 session 的 KV 在哪個 replica」，這就是 session 黏性從 nice-to-have 變成架構約束的數學原因。\n\n## Reasoning 經濟學：當模型開始「想」\n\n第二個結構性變化：test-time compute。thinking/non-thinking 雙模式已是開源旗艦標配（DeepSeek-V4、Kimi K2 Thinking、Qwen3.x，2026-06），OpenRouter 上 reasoning 模型 token 佔比已過半。這改變了三本帳：\n\n**成本帳：輸出 token 爆炸。** Thinking token 按輸出價計費，而輸出價中位數約是輸入價的 4 倍（2026 年第三方統計）。一個複雜請求在思考模式下可能花 20k–40k thinking token 才產出 500 個可見 token（第三方估算，量級可信）——使用者看到一段話，你的 GPU decode 了一本小冊子。對容量規劃（ch13）的衝擊直接：**decode 階段的負載權重大幅上修**，而且 thinking 長度的變異比輸出長度更大（同一個模型對不同難度的題目，thinking 可以差兩個數量級），p99 容量更難壓。\n\n**控制面：thinking budget 成為產品參數。** 各家都在補控制手段——Anthropic 的 effort 參數與 thinking budget、Gemini 的 thinking budget、DeepSeek/Qwen 的雙模式開關（2026-06）。對 infra 工程師的含意：這些參數是你的 brownout 工具箱（ch15）的新成員——容量吃緊時降 effort 換容量，跟你當年降畫質保流暢是同一招。\n\n**計價演化：從 $/token 走向 $/任務。** 這一段是推測，標明立場：我認為 2026–2028 會看到計價單位從 token 向任務/結果遷移。理由：(1) thinking token 讓 $/token 對客戶失去可預測性——同一個問題，模型「想多久」客戶無法控制也無法審計；(2) agentic 場景客戶買的本來就是任務完成，不是 token；(3) 經濟壓力方向一致——Epoch AI 的數據顯示固定能力水準的 $/token 每年下降 9–900 倍，token 本身正在失去作為計價單位的稀缺性。反方論點也誠實列出：token 是物理誠實的成本原子（ch03），任務計價把需求波動風險從客戶轉給供應商，定價工程難度高得多——所以遷移會先發生在垂直封閉產品（coding agent 訂閱制的「用量包」其實已經是變相任務計價），API 層的 $/token 還會活很久。\n\n**矛盾的解法：價跌量爆。** $/token 崩跌與總帳單暴漲同時發生（Jevons 效應的教科書案例）：單價跌 10 倍、單任務 token 用量漲 30 倍，淨效果是推論容量需求持續上升。對你的職涯這是好消息：**推論 infra 的工作量跟 token 總量成正比，不跟單價成正比**。\n\n## 「KV 是新的 Redis」：證據與反證\n\n2026 年業界有一個流行論述：KV cache 正在成為獨立的儲存層級，地位類比當年的 Redis——每個嚴肅的架構圖裡都會有它一格。這個論點值得認真對待，也值得認真質疑。\n\n### 證據\n\n1. **系統已經長出來了。** Mooncake 把 KV cache 做成跨叢集儲存系統並撐起 Kimi 的生產流量（自報多承接 75% 請求）；LMCache 的 backend 清單長得像個儲存產品（CPU RAM、本地 SSD、Redis/Valkey、S3 相容物件儲存、GDS）；vLLM v0.22 內建 multi-tier offloading 框架；NVIDIA 做了 framework-agnostic 的 KVBM；SGLang 有 HiCache。（2026-06，見 ch05/ch10）四條獨立路線收斂到同一個抽象——「KV 是值得獨立管理的儲存層」已是工程共識。\n2. **它被商品化定價了。** Gemini 的 explicit caching 按小時收儲存費——這是字面意義的儲存計價；Anthropic 的 cache write 按 TTL 分級收溢價（5 分鐘 1.25x、1 小時 2x）。當一個東西有了「容量 × 時間」的價格表，它就是儲存商品。\n3. **需求是結構性的。** 上面 worked example 算過：agentic 流量 97% 的輸入是可重用 prefix。只要 agentic 流量持續成長，KV 重用的經濟價值就持續存在——這不是某個引擎的實作細節，是流量形態的數學性質。\n\n### 反證\n\n1. **KV 是衍生資料，不是 source of truth。** Redis 裡的 session 丟了會出事故；KV 丟了只是變慢——重算就有。它更像 page cache 或 materialized view：值得管理，但永遠有「重算」這條退路。ch10 算過傳輸 vs 重算的 crossover；硬體每進一代，重算就更便宜一分，KV 持久化的價值邊界就退一步。\n2. **它跟模型版本、引擎版本、量化配置、甚至 attention backend 綁死**（ch05 講過失效矩陣）。Redis 的 value 是通用 bytes，KV 的 value 是「特定模型某一版的內部狀態」——模型一週一更的世界裡，這份「儲存」的經濟壽命以小時計。沒有任何嚴肅場景會把 KV 當資產存超過一天。\n3. **架構移動目標直接威脅它的體積。** 下一節會講：如果 linear/hybrid attention 把 KV 砍掉 75%，或 sparse attention 改寫讀取模式，今天為「TB 級 KV 池」設計的儲存層投資，攤提期可能撐不到回本。\n\n### 我的立場\n\n「KV 是新的 Redis」做為**口號**是誇大，做為**方向**是對的。準確的說法是：KV cache 從引擎的私有實作細節，升格為平台層的一等資源——有自己的容量規劃、命中率 SLO、分層策略與計價。但它是快取階層，不是資料庫：押注「管理 KV 的能力」（分層、路由、失效、計量——全是你會的快取工程）是安全的；押注「某個特定 KV 儲存產品會成為標準件」是危險的，因為上游模型架構一變，整層的形狀就得重來。2026–2028 我預期：KV 管理能力內化進每個 serving 框架（已發生），但獨立的「KV 儲存廠商」市場不會像當年 Redis 那樣長出來——衍生資料養不起 source of truth 的生意。\n\n## 模型架構是移動目標：ch03 的數學還能活多久\n\n全書的記憶體帳都建立在 ch03 的 KV 公式上：每 token 狀態 × token 數，線性成長。2025–2026 有兩條路線在動搖它。\n\n### 路線一：sparse attention（DeepSeek 路線）\n\nDeepSeek 從 MLA（壓係數）走到 NSA（2025-02 論文）再到 DSA——V3.2-Exp（2025-09）首次量產，V4（2026-04 preview）以「token-wise compression + DSA」支撐 1M context。Sparse attention 的本質：**KV 還是全部存，但每步只挑一小撮來讀**（用輕量 indexer 選 top-k）。注意這對 ch03 兩本帳的影響不對稱——**容量帳幾乎不變**（除非搭配壓縮，V4 的 token-wise compression 細節尚未完全公開），**頻寬帳大幅縮小**：ch03 證明過長 context decode 的瓶頸是「每步重讀整份 KV」，DSA 把這項從 O(n) 降到 O(k)。直接後果是 1M context 在經濟上變得可行，以及 DeepSeek 敢把 cache 命中價壓到地板（2026-06，折扣倍率僅見第三方報導，引用前需查官方價目）。\n\n### 路線二：linear / hybrid attention\n\n純 linear attention（每層只維護固定大小的 RNN 式狀態）多年來品質不過關，2025–2026 收斂到的務實解是**混合**：大部分層用 linear、少數層保留 full attention。兩個量產級代表：**Qwen3.5**（2026-02）旗艦 397B-A17B 用 Gated Delta Networks + sparse MoE；**Kimi Linear**（arXiv:2510.26692）以 KDA + MLA 按 3:1 混合，自報 KV cache 減少最多 75%、1M context 下 decode 吞吐 6 倍，kernel 與 vLLM 支援都已就位。混合比例就是新的 KV 係數：3:1 混合 ≈ KV 帳直接打 25 折。\n\n### 反方證詞：MiniMax 的回頭路\n\n誠實呈現反證。MiniMax M1 用了 efficient attention，**M2（2025-10）卻退回 full attention**——官方工程部落格寫得很直白：在工業級規模下，linear/windowed 變體在長鏈推理任務上出現嚴重缺陷，且整條推論基礎設施（kernel、量化、cache 生態）對 efficient attention 的支援不夠成熟，full attention 是「最不脆弱的選擇」。然後劇情再轉折：**M3（2026）又帶著新的 sparse attention 回來了**，自報長 context 速度提升一個數量級。一年內同一家公司走了「linear → full → sparse」三步——這就是「移動目標」的最佳註腳：方向（降低 attention 成本）是確定的，路徑（linear vs sparse vs hybrid）還在劇烈震盪。\n\n### 顛覆程度評估\n\n| ch03 的結論 | Sparse attention 下 | Linear/hybrid 下 |\n|---|---|---|\n| KV 容量隨 context 線性成長 | 大致仍成立（全存） | **被打破**：linear 層是 O(1) 狀態，只剩 full 層線性成長（×混合比） |\n| Decode 頻寬 = 權重 + 整份 KV 重讀 | **被打破**：KV 讀取量 sublinear | 部分成立：full 層仍重讀，linear 層讀固定狀態 |\n| Prefill O(n²) | 被緩解（attend 子集） | 被緩解（linear 層 O(n)） |\n| KV 是 append-only、可按 block 共享前綴 | 成立 | **語意改變**：RNN 狀態是壓縮摘要，不能像 KV block 那樣任意切前綴共享——prefix caching 必須改成「在 block 邊界存狀態快照」，vLLM 的 hybrid allocator（v0.21 起）就在處理這件事 |\n\n我的評估：**ch03 的公式不會死，但會從「定律」降格為「參數化模型」**。「每 token 狀態 bytes × 成長函數」這個會計框架永遠成立，變的是係數（GQA/MLA 已經教過你係數會變）與成長函數（線性 → 分段線性 → 次線性）。2026–2028 你該押注的不是任何一條公式的數值，而是「拿到任何新架構的 config，十分鐘內重算出它的記憶體帳」這個能力。最深的系統含意在表格最後一行：**prefix caching、PagedAttention、KV routing 全都隱含「狀態可按 token 邊界分解」的假設，linear 層打破它**——這會是 2026–2028 推論引擎最髒的工程戰場之一。\n\n### 多模態：另一條工程線\n\n簡短帶過（它是工程差異不是理論顛覆）：多模態推論在引擎前面多了一段 encoder pipeline（vision encoder → projector → 進主幹），image token 把 prefill 帳單再推高一級、video 是 token 洪水。Serving 端的含意是異質 pipeline——encoder 是另一種資源畫像（compute-bound、可獨立擴縮、甚至放不同硬體），P/D 分離的思路天然延伸成 E/P/D 三段。原理上沒有新東西，全是 ch10 的決策模板再用一次。\n\n## 硬體路線圖（2026-06 視角）\n\n> 本節一半是已出貨事實、一半是廠商預告。**所有標「預告」的條目，付印前必須回查是否如期。**\n\n| 廠商/產品 | 關鍵規格 | 狀態（2026-06） |\n|---|---|---|\n| NVIDIA B200 / GB200 NVL72 | 192 GB HBM3e、~8 TB/s | 已大規模出貨，雲端主力 |\n| NVIDIA B300 / GB300 NVL72 | 288 GB HBM3e、1,400W/卡 | 2026 放量中 |\n| NVIDIA Rubin / Vera Rubin NVL72 | 288 GB **HBM4**、~13 TB/s、NVLink 6 | CES 2026 發表、Q1 量產、**預告** H2 2026 上雲（付印前回查） |\n| AMD MI355X | 288 GB HBM3e、8 TB/s | 已出貨 |\n| AMD MI400 / Helios 機架 | 432 GB HBM4、19.6 TB/s；Helios 72×MI450 | **預告** 2H 2026（付印前回查） |\n| Google Ironwood（TPU v7） | 對前代 >4x | GA（2025-11），Anthropic 採購最高百萬顆級 |\n| Google TPU 8t / 8i 分流 | 訓練/推論分晶片（8i 帶 384 MB 級 SRAM） | Cloud Next 2026 發表，已獲官方確認（2026-06 覆核） |\n| AWS Trainium3 | 3nm、144 GB HBM3e、4.9 TB/s | 2025-12 發表 |\n\n三個比規格表更重要的結構性觀察：\n\n**一、Rubin CPX 的插曲：P/D 分離正在硬體化——即使單一產品反覆。** NVIDIA 在 2025-09 發表 Rubin CPX：一張專做 prefill 的卡——128 GB GDDR7（不是 HBM！）、30 PFLOPS NVFP4、無 NVLink。設計邏輯完全是 ch10 的數學：prefill compute-bound，HBM 的頻寬是浪費，用便宜記憶體堆算力。結果 2026 年 3 月前後 CPX 被**擱置**——NVIDIA 以約 $200 億取得 Groq 技術授權與核心團隊（2025-12，非股權收購，Groq 仍獨立營運）後優先做 LPU 基因的 LPX 機架（主攻 decode），NVIDIA 高層公開表示 CPX 概念未死、可能在後代回歸（The Register，2026-06）。然後 Intel 在 Computex 2026 發表 Crescent Island——480 GB LPDDR5x、350W、PCIe 卡，明擺著接 CPX 留下的 prefill 真空，且直接對接 Dynamo 的分離式架構。讀法：**workload 的分化（prefill/decode/長 context）正在變成晶片 SKU 的分化**。P/D 分離從你在 ch10 學的軟體架構，升格為採購目錄上的選項。這也預答了本章 Lab 的辯題：硬體進步不是在淘汰 P/D 分離，是在把它鑄進矽裡。\n\n**二、SRAM 路線被主流收編。** Groq 的 LPU 用 on-chip SRAM 換極端 decode 頻寬——物理上對 memory-bound 的 decode（ch03）是對症下藥，代價是容量小、模型要切碎。NVIDIA 用 ~$200 億把它的技術與核心團隊收編（授權＋人才移轉，2025-12），Cerebras 則完成 IPO（2026-05 上市，估值從 S-1 階段預估的約 $230 億跳到上市時約 $560 億）並拿下 OpenAI $100 億級算力協議（750MW 起、可擴至 2GW）。我的解讀（推測）：推論專用架構不再是「挑戰者敘事」，而是被整合進主流產品線的一個象限——2026–2028 你會看到同一家雲上「HBM 通用卡 + SRAM decode 專用 + 大容量便宜記憶體 prefill 專用」並存，ch13 的硬體選型矩陣會多出一個維度。\n\n**三、rack 是新的伺服器。** NVL72 之後，NVIDIA（Vera Rubin NVL72）與 AMD（Helios）的產品單位都是整機架：72 顆 GPU、一個 NVLink/IF domain、液冷、以百 kW 計的功耗。對 infra 工程師的含意：ch09 的「TP 不出節點」邊界擴大成「TP 不出機架」、ch11 的拓撲感知排程以 rack 為單位、故障域與採購單位也是 rack。「一台 8 卡機」這個心智單位正在過時。\n\n另外兩個影響供給的常數：HBM 產能仍是整個行業的配給瓶頸（HBM4 的爬坡決定 Rubin/MI400 的真實供貨量），以及單卡功耗一路從 700W（H100）爬到 1,400W（B300/MI355X）——這條線直接把我們推進下一節。\n\n## 電力成為一級約束\n\n2026 年的容量瓶頸排序已經改變：**不是買不到卡，是插不上電**。證據（2026-06）：\n\n- Uptime Institute 預估全球 AI 專屬資料中心負載到 2026 年底達 **10 GW** 量級；單一 hyperscale AI 資料中心需要 100–300 MW 連續供電——一座中型城市的用電。\n- 美國電網互聯排隊普遍超過 5 年，大型變壓器交期約 5 年；產業統計顯示 2026 年美國公告的約 12 GW 資料中心容量中僅 5 GW 實際動工。\n- CoreWeave（SEC 文件）已運轉超過 **1 GW**、目標 2030 年 8 GW+，營收 backlog 近千億美元——neocloud 的競爭壁壘正從「有沒有卡」變成「有沒有電」。\n\n對 infra 工程師的具體含意（前兩點是現在進行式，後兩點是我的推測）：\n\n1. **功耗進入容量規劃公式。** ch13 的卡數計算之外要多一條：機架功率預算 ÷ 每卡 TDP。1,400W 的卡讓「有空位但沒電」成為真實的排程約束。\n2. **電價結構影響工作負載排程。** Batch tier 吃離峰容量（ch16）的邏輯延伸：離峰「容量」未來部分是字面意義的離峰電力。\n3. **Power-aware scheduling 會成為排程器的一等維度**（推測）：power capping、DVFS、依電價/碳強度搬移 batch 工作——K8s 生態已有雛形，我預期 2027–2028 它從 ESG 報表工具變成省真錢的容量工具。你在 ch11 學的排程器擴展點，到時候就是實作它的地方。\n4. **訓練/推論的電力彈性差異會被制度化**（推測）：訓練可以暫停讓電、推論不行（有 SLO），GB300 世代開始出現平滑同步功率波動的機架級設計（廠商宣稱）。電網友善度可能成為新的採購規格。\n\n這個約束對你是利多：電力工程拉長了供給端的時間常數，意味著「用軟體把既有 GPU 榨得更乾」——本書教的全部內容——的投資報酬率在 2026–2028 只會更高。\n\n## 標準化與市場結構\n\n**API 形狀已定，雙標準並存。** OpenAI ChatCompletions 是 de facto 標準，但注意一個 2026 的細節：DeepSeek-V4 同時相容 OpenAI 與 Anthropic API——Anthropic 的 Messages API 借 agentic 工具生態（MCP、Claude Code）成為第二事實標準。對你的含意：gateway 層（ch12）要會雙方言，但這層知識是薄的、可速學的。\n\n**路由層全面換代。** Ingress NGINX 退役（2026-03）、Gateway API Inference Extension GA 並被 GKE/Envoy/NGINX/KServe/llm-d 共同採用（2026-06）——InferencePool + EPP 這套「身體感知路由」的 API 形狀大概率就是未來五年的標準件，值得深學（ch12 已講）。\n\n**聚合層成為市場結構的一部分。** OpenRouter 2026-05 募資 $113M 定位企業推論路由；它的存在本身就是論據：當模型是可替換商品，路由與聚合就是價值節點。配合開放權重市場的換血——Meta 棄 Llama 轉閉源（Muse Spark，2026-04），中國系模型在 OpenRouter 佔比超過 45%（2026，前一年不到 2%）——模型層的競爭讓 serving 層的議價力上升。\n\n**Neocloud 整併年。** S&P Global 統計 2025 年資料中心 M&A 超過 $690 億；2024–2025 簽的 GPU 合約 2026 下半陸續到期續約、資本市場收緊、第一代部署到壽——多方分析指向 2026 是 neocloud 淘汰賽之年。對讀者的實務含意（ch16 採購策略的延伸）：簽多年期合約前查對方的電力儲備與資產負債表，你的 GPU 供應商在 2026–2028 是有信用風險的。\n\n**價格趨勢的正確讀法。** Epoch AI：固定能力水準的推論價格每年跌 9–900 倍。錯誤讀法是「推論會便宜到不重要」；正確讀法是 Jevons——單價崩跌餵養用量爆炸，**推論基礎設施的總盤子在漲，而利潤越來越取決於工程效率**（利用率、命中率、goodput——ch16 的排序）。效率工程師的稀缺度跟著總盤子走。\n\n## 能力耐久性矩陣：押注什麼\n\n全章收尾，也是全書的收尾論證。把本書教過的東西按半衰期分三層：\n\n| 半衰期 | 內容 | 例子（與章節） | 維護策略 |\n|---|---|---|---|\n| **月級（租來的知識）** | 版本號、參數名、價格、模型規格、排行榜 | vLLM 參數表（ch08）、GPU 租價（ch16）、模型規格（ch03 的具體數字） | 不要背，知道去哪查；面試前刷新一次 |\n| **年級（3 年攤提）** | 專案格局與 API 形狀、當前架構主旋律、硬體代際 | llm-d vs Dynamo 競合（ch12）、DSA/hybrid attention 路線（本章）、InferencePool/EPP、DRA（ch11）、NVL72 rack 形態（ch02） | 每季追一次源頭（release notes、設計提案）；押方向不押單一專案 |\n| **十年級（買斷的知識）** | 物理與數學：roofline 與 arithmetic intensity（ch02）、「每 token 狀態 × token 數」的記憶體會計（ch03）、佇列理論與排程取捨（ch06）、有狀態路由的本質（ch10）、容量規劃數學（ch13）、量測→診斷→優化方法論（ch14）、故障模式思維（ch15）、單位經濟學（ch16） | decode 是 memory-bound 這件事不會因為任何新卡新模型改變——只會改變常數 | 這是你的本金；本書 80% 的篇幅在這層 |\n\n注意一個結構性事實：本章描述的所有「劇變」——agentic 流量、sparse/linear attention、prefill 專用晶片、電力約束——**沒有一個推翻第三層，每一個都只是改了第三層公式裡的係數**。Agentic 流量改的是 token 分布與重複率；新 attention 改的是每 token 狀態 bytes；新硬體改的是頻寬與算力常數；電力改的是容量公式的分母。會推公式的人遇到劇變是重算一次，背結論的人遇到劇變是重學一次。這就是你——一個用 roofline 思維做過 RDS 優化、用佇列理論扛過 10K CCU 的人——的結構性優勢：**你的十年級知識已經有了，本書補的是常數與生態**。轉職押注的正確姿勢：用第三層的不變量當面試的主軸敘事，用第二層的判斷展示你跟得上行業，把第一層留給入職後的第一週。\n\n## 故障模式與防禦\n\n前沿判斷也有故障模式——押錯賭注的症狀、觀測與對沖：\n\n| 賭注/假設 | 它怎麼壞 | 症狀與觀測訊號 | 防禦/對沖 |\n|---|---|---|---|\n| 平台按 chat 流量設計，agentic 流量到來 | KV 池 thrash：preemption 飆升、prefix cache 命中率反而下降（session 太大互相驅逐）、TTFT p99 爆炸 | preemption 計數、cache hit rate、單 session KV 占用分布（ch14 指標） | 現在就把「單 session KV 上限」「per-session 計量」做進設計；offloading 層提前驗證 |\n| 假設 RPS/人類節奏做 autoscaling | 機器同步尖峰（CI 觸發、agent swarm）秒級打穿 headroom，擴容根本來不及 | 佇列深度的上升斜率比 chat 時代陡一個量級 | admission control 在最前面（ch13/ch15）；對 agent 客戶要求註冊尖峰行為，像你當年對活動排程做的那樣 |\n| 重倉單一 KV 儲存方案，假設 KV 體積永遠這麼大 | 上游換 hybrid attention 模型，KV 縮 75%，分層儲存投資攤提不回來 | 模型 roadmap：服務的主力模型宣布架構更換 | 把 KV 分層做成可插拔（NIXL/connector 抽象，ch10），容量採購短約滾動 |\n| 按廠商預告的硬體做採購/容量計畫 | Rubin CPX 教訓：發表 ≠ 出貨，產品可以在量產前被擱置 | 廠商季度更新、出貨報導與預告的偏差 | 容量計畫只算「已出貨可下單」的 SKU；預告硬體只進情境分析不進承諾 |\n| 假設 thinking token 可控可預測 | 新模型版本的 thinking 分布變化讓 decode 容量瞬間不足、成本超支 | 輸出 token 分布的 p99 漂移、$/任務漂移（ch16 計量） | thinking budget/effort 上限進 API 合約；模型升級走 canary + token 分布回歸測試（ch15） |\n| 假設電力無限，容量規劃只算卡 | 有卡上不了架；機架功率超約被資料中心限流，GPU 降頻 | 機架功率餘裕、thermal/power throttling 指標（ch02/ch14） | 容量規劃加電力維度；新部署前查機房功率預算 |\n\n## 動手做\n\n### Lab 1 [紙上推演]：2026 熱門辯論——「P/D 分離會不會被硬體進步淘汰」\n\n正反各寫 200 字論證，再寫 100 字你的裁決。\n- 正方素材：大容量單晶片（288→432 GB HBM）讓更多模型單卡放得下；SRAM 路線把 decode 做到極致後，混跑的干擾或許不再值得分離的複雜度；CPX 被擱置證明專用 prefill 硬體的商業模式未必成立。\n- 反方素材：CPX 概念被 Intel Crescent Island 接棒、NVIDIA 自己說概念會回歸——分化在硬體化而非消失；agentic 流量的 input:output 100:1 讓 prefill/decode 的資源畫像差距擴大而非縮小。\n- 成功標準：兩面論證各自引用至少兩條本章的具體證據，裁決明確標出「在什麼條件下我會改變立場」。\n\n### Lab 2 [M1]：量測你自己的 agentic 流量畫像\n\n用你日常使用的 coding agent（Claude Code、Codex CLI 等）跑一個真實任務，從 API usage log 或用量工具收集：模型呼叫次數、每次的 input/output token、session 總時長。\n```text\n要算出的數字：\n1. input:output 比（對照本章的 77:1 估算）\n2. 若無 prefix cache，邏輯 prefill 總量是多少\n3. 假設 95% 命中率，實際 prefill 量與成本差距\n4. 用 ch03 公式換算這條 session 的 KV 峰值（挑一個你知道架構的開放模型）\n```\n成功標準：產出一張你自己的流量畫像表，並寫三行字：如果你是這個服務的 infra 工程師，這張表會改變你的哪三個設計決策。\n\n### Lab 3 [紙上推演]：對 hybrid attention 重算 ch03 的帳\n\n拿 Kimi Linear 的公開架構（KDA:MLA = 3:1 混合）：假設 full attention 層用 MLA 係數、linear 層狀態為固定大小，重算「128k context 一條對話的狀態記憶體」，對照純 MHA、GQA、純 MLA 的數字，驗證「KV 減少約 75%」的宣稱量級。\n成功標準：你能解釋為什麼 prefix caching 在這種架構上不能直接沿用 block 級共享，以及「在 block 邊界存狀態快照」為什麼是出路。\n\n## 自我檢核\n\n1. 用三個公開數據說明「agentic 取代 chat」不是炒作而是已發生的流量結構變化。數據的來源與時點是什麼？\n2. Agentic 流量的 input:output 比為什麼天然偏向 100:1？這個比例分別對 prefix caching、xPyD 配比、路由設計意味著什麼？\n3. 「KV 是新的 Redis」——給出兩條最強的支持證據與兩條最強的反證，然後講你自己的立場。\n4. Sparse attention 與 linear/hybrid attention 對 ch03 的「容量帳」和「頻寬帳」的影響為什麼不一樣？哪一個會打破 prefix caching 的 block 共享假設、為什麼？\n5. Rubin CPX 從發表到擱置的故事，給 infra 工程師的兩個教訓是什麼（一個關於架構方向、一個關於採購紀律）？\n6. Thinking token 如何改變 ch13 的容量規劃數學？你有哪些控制面工具可以在容量吃緊時用它換容量？\n7. 為什麼「$/token 每年跌一個數量級」與「推論 infra 工程師更稀缺」可以同時為真？\n8. 不看書，畫出你自己的能力耐久性矩陣：三層各舉三個例子，並說明你的轉職敘事要建立在哪一層上。\n\n## 延伸閱讀\n\n- [State of AI: An Empirical 100 Trillion Token Study with OpenRouter（arXiv:2601.10088）](https://arxiv.org/abs/2601.10088) — 本章流量論點的最大實證來源，描述推論需求面的標準引用。\n- [a16z State of AI 摘要頁](https://a16z.com/state-of-ai/) — 上述研究的可讀版，圖表齊全。\n- [llm-d: KV Cache Wins You Can See](https://llm-d.ai/blog/kvcache-wins-you-can-see) — agentic workload 下 prefix-aware routing 的量化收益（57x TTFT，專案自報），含 benchmark 設定細節。\n- [MiniMax: Why Did M2 End Up as a Full Attention Model?](https://huggingface.co/blog/MiniMax-AI/why-did-m2-end-up-as-a-full-attention-model) — 一線實驗室對 efficient attention 工程現實最誠實的公開檢討，本章「移動目標」論點的反方主證詞。\n- [Kimi Linear: An Expressive, Efficient Attention Architecture（arXiv:2510.26692）](https://arxiv.org/abs/2510.26692) — hybrid linear attention 的量產級代表作，KV −75% 宣稱的原始出處。\n- [DeepSeek-V4 官方公告](https://api-docs.deepseek.com/news/news260424) — DSA + 1M context + 極端 cache 折扣的一手來源（2026-04）。\n- [NVIDIA Rubin CPX 技術部落格](https://developer.nvidia.com/blog/nvidia-rubin-cpx-accelerates-inference-performance-and-efficiency-for-1m-token-context-workloads/) — prefill 專用硬體的設計邏輯（注意：產品其後被擱置，當設計文件讀，不要當採購目錄讀）。\n- [Mooncake：KVCache-centric 分離式架構（arXiv:2407.00079）](https://arxiv.org/abs/2407.00079) — 「KV 作為儲存層」最完整的生產系統論文。\n- [Epoch AI: LLM inference price trends](https://epoch.ai/data-insights/llm-inference-price-trends) — 固定能力水準下 $/token 跌價速度的量化基準，本章經濟學論證的數據地基。\n- [Anthropic Economic Index](https://www.anthropic.com/research/economic-index-primitives) — API 流量自動化／agentic 化的一手觀測（注意它只覆蓋 Anthropic 自家流量）。\n"}, {"id": "ch18-career", "file": "ch18-career.md", "group": "Part VI — 前沿與職涯", "title": "ch18 — 把能力變成職涯：作品集、面試、開源", "md": "# ch18 — 把能力變成職涯：作品集、面試、開源\n\n> **本章解決什麼問題**：前十七章把知識裝進你腦袋，本章把它變成 offer。知識不會自動轉換成職涯——市場只看得到三樣東西：可驗證的作品、面試房間裡四十五分鐘的表現、以及公開的足跡（文章與開源貢獻）。本章給你四套工具：plan.md 四個旗艦專案的深度升級路線、一場完整示範的系統設計面試（本章的 worked example）、各開源專案的貢獻策略，以及讓知識不過期的維護迴圈。所有技術機制都只引用前章章號，不再展開。\n\n## 從你已知的出發\n\n你已經成功做過一次「把工程成果變成職涯資產」這件事。「降 RDS CPU 40%」這條履歷之所以有效，不是因為 40% 這個數字大，而是因為它的敘事結構完整：有量測（Clinic.js、load test）、有診斷（鎖競爭、交易熱點）、有優化動作（SQL 重排、交易拆分、批次化）、有驗證後的數據。面試官聽完知道你不是運氣好，是有方法論——同一套方法丟到任何系統上都會再產出一次 40%。\n\n轉職 AI infra 的求職工程，就是把這個結構**再執行一次，換掉名詞**。CPU% 換成 TTFT 與 goodput（見 ch14），Clinic.js 換成 DCGM 與 engine metrics，k6 打的對象從 REST API 換成 SSE token stream。這正是全書主軸二：量測 → 診斷 → 優化 → 用數據證明，原封不動搬家。\n\n另一個你熟的視角：求職本身是一個有 SLO 的 serving 系統。履歷是 admission control（90% 的請求在這裡被拒絕，而且是 silent drop，沒有錯誤碼）；面試是深健康檢查（探的不是你「活著」，是你能不能在壓力下生成正確的 token）；作品集是你的 `/metrics` endpoint——面試官想抓你的歷史數據，你得先有 exporter。本章就按這條 pipeline 逐段加固。\n\n## 本書 ↔ plan.md：四個旗艦專案的對應與深度升級\n\nplan.md 的四個旗艦專案是你作品集的骨架。下表先對應「每個專案用到哪些章」，再給每個專案一條「深度升級建議」——也就是把專案從「能動」推到「面試官眼睛一亮」要補的那一層。判準很簡單：**教學式作品（照 README 跑通）面試官看過一百次；有自己的量測、取捨與反直覺發現的作品，他們一年看不到幾個。**\n\n| # | 旗艦專案 | 對應章節 | 證明的能力 |\n|---|---|---|---|\n| ① | 模擬推論叢集（kind + KWOK + fake-gpu-operator + llm-d-inference-sim） | ch11（主場）、ch12、ch13、ch14 | K8s GPU 排程、路由、autoscaling、可觀測性 |\n| ② | 配置權衡研究（容量規劃與成本建模） | ch02、ch03、ch06、ch09、ch13、ch16 | 容量數學、SLO 驅動的硬體選型、$ 思維 |\n| ③ | vLLM 推論效能優化（租 GPU） | ch05、ch06、ch07、ch08、ch14 | 真實 benchmark、profiling、優化閉環 |\n| ④ | 多模型／多節點服務平台 | ch09、ch10、ch12、ch15、ch16 | 分散式推論、生產級可靠性、多租戶 |\n\n**專案① 的深度升級**：基本版是「拉起模擬叢集、部署假負載」。升級版要做三件事：（a）用 KEDA 接佇列深度驅動 autoscaling，並用 Grafana 截圖證明「改參數前後，佇列深度與 TTFT 曲線怎麼變」（ch13 的訊號選擇直接落地）；（b）故意做壞一次——把 autoscaling 訊號換成 CPU%，展示它如何完全不動作，這個「對照組」是整個專案最有面試價值的部分；（c）一鍵 `setup.sh` 加上 README 前三行就放數字。面試官一問「為什麼不用 GPU utilization 當訊號」，你直接打開自己的 dashboard 回答（ch13、ch14）。\n\n**專案② 的深度升級**：plan.md 原案用 Vidur，但截至我能確認的資訊（2026-06），Vidur 的維護狀態存疑（無正式 release、commit 稀疏），把整個專案押在它上面有風險。升級路線：以自己的解析模型為主——用 ch03 的 KV 公式、ch02 的 roofline、ch13 的容量方法論建一張試算表或一支小工具，輸入「模型、卡型、SLO、流量分布」輸出「卡數與月成本」；Vidur 作為交叉驗證之一，再用專案③ 的實測數據回頭校準你的模型。「我的解析模型預測 X，實測 Y，誤差 Z% 來自…」這句話的面試殺傷力，遠大於「我會用某個模擬器」。\n\n**專案③ 的深度升級**：基本版是「部署 vLLM、跑 benchmark」。升級版：（a）跑出完整的 latency-throughput frontier 曲線而不是單點數字（ch14）；（b）benchmark 方法論要經得起拷問——open-loop、有 warmup、報告 p99 而非平均（ch14 的 coordinated omission 是你 k6 經驗的主場）；（c）做一組量化對比（FP8 vs FP16）時，同時報告品質影響而不只報速度（ch07）——「我量了速度也量了品質代價」是區分工程師與跑分仔的分界線；（d）整個 harness 開源、可重現，這份 repo 同時是你開源貢獻的敲門磚（見下文）。\n\n**專案④ 的深度升級**：基本版是「多模型部署起來」。升級版聚焦兩個生產級演示：（a）canary + graceful drain——用模擬叢集演示滾動更新時 in-flight streaming 請求一條不掉，並寫出 drain timeout 的計算依據（ch15 的數學）；（b）多租戶 token-based rate limiting——你寫過 rate limiter，這次計量單位換成 token（ch16），加一個 noisy neighbor 實驗（一個租戶塞長 context 請求，展示隔離前後其他租戶的 p95 變化）。這兩個演示直接對應系統設計面試的最後十五分鐘（見下文示範）。\n\n四個專案的共同升級原則，就是 plan.md 第二條策略「每個專案往上一層做」：每個 repo 都要能回答三個問題——**它什麼時候會壞？我量到了什麼？我為什麼選 A 不選 B？**\n\n## 作品敘事模板：把「降 RDS CPU 40%」搬到 GPU 上\n\n你的成功敘事結構拆開是五段：**場景（規模）→ 量測（工具）→ 診斷（根因）→ 行動（具體優化）→ 數據（前後對比）**。原版：\n\n> 在 500K+ 使用者、10K+ CCU 的遊戲後端，用 Clinic.js 與負載測試定位 DB 瓶頸（量測），發現鎖競爭與跨交易熱點（診斷），重排 SQL、拆分交易、批次化逐行更新（行動），峰值 RDS CPU 降 40%（數據）。\n\n同一結構套到專案③，每段換上 GPU 世界的名詞（數字是示意，用你的實測值替換）：\n\n> 在單張 L4 上服務 8B 模型（場景），用 vLLM `/metrics` ＋ DCGM ＋ 自寫的 k6 SSE 腳本建立 baseline：固定流量下 TTFT p95 2.8s、goodput 41%（量測，ch14）；診斷發現 KV cache 利用率長期 95%+ 觸發 preemption、recompute 進一步推高負載——典型的死亡螺旋前兆（診斷，ch05、ch06、ch13）；調低 `max-num-seqs` 換取 KV headroom、開 prefix caching、改用 FP8 KV cache（行動，ch05–ch08）；同 SLO 下 goodput 從 41% 提到 78%，等效於同樣流量少租 47% 的 GPU 時數，每月省 $X（數據，ch16）。\n\n注意最後一句的形態變化：在後端世界你用 CPU% 收尾，在 GPU 世界**永遠用 goodput 和 $ 收尾**——因為這個職位存在的根本原因是推論帳單（見 ch01），會把優化翻譯成錢的人對 P&L 說話。\n\n模板的反面檢查：如果你的專案敘事寫不出「診斷」那一段（只有「我調了參數變快了」），代表專案還停在「能動」層，回去補量測。\n\n## 履歷改寫：三條真實條目的翻譯示範\n\n履歷的目標讀者有兩個：ATS／招募者（掃關鍵字）與 hiring manager（找方法論證據）。改寫原則：**不發明經歷，只翻譯語言**——把每條後端成果的「可遷移內核」顯式化，並接上 AI infra 的詞彙表。以下拿你履歷的三條真實條目示範（履歷是英文，改寫保持英文，註解用中文）。\n\n**第一條：RDS 優化。** 原文：\n\n> Reduced RDS CPU by 40% during peak traffic via profiling-driven database optimization: restructured SQL ordering and decomposed transactions to minimize lock contention, reordered cross-transaction execution to reduce hotspots, and batched row-by-row updates.\n\n改寫：\n\n> Cut peak database CPU 40% for a 10K+ CCU game backend through a measure-diagnose-optimize loop (profiling, lock-contention analysis, transaction decomposition, batching) — the same methodology I now apply to GPU inference: benchmarked and tuned vLLM serving to raise goodput 41%→78% under a fixed TTFT SLO (see portfolio).\n\n改了什麼：把「方法論」從動作清單中拎出來命名（measure-diagnose-optimize loop），然後**用一個分號把舊成果和新作品焊在一起**，讓讀 JD 的人在同一行看到 RDS 和 vLLM/goodput/TTFT/SLO 四個關鍵字。後半句的數字來自你的專案③，沒做完之前不要寫。\n\n**第二條：多層 cache library。** 原文：\n\n> Designed and documented a multi-tier cache library with pluggable data sources (in-memory → S3 → local) and graceful degradation across layers.\n\n改寫：\n\n> Designed a multi-tier caching library (in-memory → S3 → local) with pluggable backends and graceful degradation — structurally the same hierarchy problem as LLM KV-cache offloading (HBM → CPU RAM → NVMe → object storage), which I've since built hands-on experience with (vLLM prefix caching / tiered KV offloading benchmarks).\n\n改了什麼：這條的同構性高到近乎作弊（見 ch05 的 offloading 分層），直接點破它。面試官看到這行會想問「那你說說 KV offloading」——這正是你準備好的主場。**設陷阱給面試官跳，是履歷的高階玩法。**\n\n**第三條：WebSocket 即時系統。** 原文：\n\n> Independently proposed and built a real-time notification system (WebSocket + Redis Pub/Sub) for message fan-out and multi-device synchronization, serving 500K+ registered users with ~3,200 concurrent connections.\n\n改寫：\n\n> Built a real-time message fan-out system (WebSocket + Redis Pub/Sub, 3,200 concurrent long-lived connections) — directly transferable to LLM token streaming: connection lifecycle, backpressure, and graceful drain of in-flight streams are the same engineering problems as SSE-based inference serving.\n\n改了什麼：把「長連線生命週期」這個可遷移內核顯式化，並接上 SSE、in-flight stream、graceful drain 這些 ch12/ch15 的詞——它們正是推論平台 JD 的高頻關鍵字。\n\n三條的共同模式：**前半句保留原始數字與規模（可信度錨點），後半句翻譯成目標領域語言（相關性訊號）**。整份履歷不需要每條都翻，挑三四條遷移度最高的（見 ch01 的技能遷移矩陣）就夠；翻太多反而稀釋。\n\n## 系統設計面試完整示範：45 分鐘逐段走\n\n題目：「**設計一個多租戶 LLM 推論平台：尖峰 5,000 並發對話、TTFT p95 < 1.5s。**」這是這個領域系統設計面試的標準題型，也是你在 ch12 動手做裡寫過設計文件的那道題的面試版。以下按時間軸走完 45 分鐘，每段標註面試官在聽什麼。數字沿用全書的基準（Llama-3.3-70B 級 GQA 模型、H100，價格為 2026 年年中快照）。\n\n### 第 0–5 分鐘：需求澄清\n\n你開口的第一句話不是畫圖，是提問：\n\n> 「我先確認幾個會直接改變設計的參數。第一，5,000 並發是指同時掛著的對話 session，還是同時在生成的請求？第二，流量形態是人打字的 chat，還是有 agentic／批次流量混入？第三，模型是固定一個 70B 級的，還是多模型？租戶之間要硬隔離還是公平共享就好？最後，TTFT p95 1.5s 之外，有沒有 ITL 或吞吐的要求？」\n\n假設面試官回答：5,000 是並發 session、以 chat 為主、單一 70B 開放權重模型加上幾個租戶的 LoRA 變體、公平共享即可、補充 ITL p95 < 60ms。你立刻把澄清變成設計輸入：\n\n> 「那我用三個工作假設：chat 流量的 duty cycle 約 10%——人大部分時間在讀和打字，所以 5,000 session 對應約 **500 條同時活躍的生成串流**；平均 context 4k tokens、單輪輸出約 400 tokens；多輪對話佔大宗，這代表 prefix caching 的命中率會是整個容量模型的槓桿，我後面會算給你看。」\n\n> **面試官在這裡想聽什麼**：你會不會區分「session 並發」與「串流並發」（差 10 倍，直接決定卡數）；你有沒有意識到流量形態（chat vs agentic）改變整個快取與路由設計（見 ch17）。直接開始畫框圖的候選人，在這 5 分鐘就被分到下一個級距去了。\n\n### 第 5–15 分鐘：SLO 與容量數學\n\n這 10 分鐘是整場面試的勝負手。你在白板上算，邊算邊講：\n\n**Decode 容量（記憶體帳，ch03 的公式）**：\n\n```\n70B GQA：每 token KV ≈ 320 KB（FP16）\n一條 4k context 對話 ≈ 4,096 × 320 KB ≈ 1.3 GB\n模型權重 FP8 ≈ 70 GB → 單卡放不下 KV，用 TP4（ch09）\n每組 TP4：320 GB HBM − 70 GB 權重 − ~25 GB 緩衝 ≈ 225 GB 給 KV\n        → 上限 ~175 條活躍對話/組\n500 條 ÷ 125 條/組（取 ~70% KV 利用率、留 preemption headroom，ch06/ch13）\n        → 4 組 TP4 = 16 張 H100\n```\n\n**ITL 驗證（頻寬帳，ch02 的 roofline 直覺）**：\n\n```\n每個 decode step 讀：70 GB 權重 + 125 × 1.3 GB KV ≈ 232 GB\nTP4 聚合頻寬 ≈ 13.4 TB/s → ~17 ms/step ✓（< 60 ms 預算）\n```\n\n**Prefill 容量（這裡放你的亮點）**：\n\n> 「請求到達率：500 條串流、每輪 400 tokens、25 tok/s → 一輪 16 秒，約 **31 輪/秒**。如果每輪都全量 prefill 4k context，需求是 127k prefill tok/s——粗估要再加十幾張卡，而且 prefill 會干擾 decode 的 ITL（ch06）。但 chat 是多輪對話：前幾輪的 KV 已經在快取裡，每輪真正新增的只有幾百個 token。假設 prefix cache 命中率 80%（多輪流量下保守，ch05），有效 prefill 需求降到約 30–35k tok/s，用 chunked prefill 的 token budget 混進 4 組 decode batch 就吃得下。**prefix cache hit rate 是這個設計裡槓桿最大的單一數字**——它決定我要 16 張卡還是 40 張卡，所以後面的路由設計會圍繞保護它來做。」\n\n**結論**：4 組 TP4 承載穩態，加 1 組做尖峰 headroom 與滾動更新冗餘（N+1，ch13/ch15）→ **20 張 H100**。TTFT 分解驗證：cache 命中時增量 prefill 約 20–50ms、未命中全量約 200–300ms，p95 1.5s 的預算大頭留給排隊——這就是 admission control 要守住的東西。\n\n> **面試官在這裡想聽什麼**：（1）你先算記憶體再算算力——證明你懂「LLM serving 是 memory 的生意」（主軸一）；（2）每個數字有來源、有交叉驗證（容量帳算完用頻寬帳驗 ITL）；（3）你主動暴露了 prefill/decode 干擾與快取槓桿這兩個非顯而易見的點。答不出容量數學的候選人講再漂亮的架構圖都是空中樓閣，這是 ch13 整章存在的理由。\n\n### 第 15–25 分鐘：架構圖\n\n現在才畫圖（ch12 的參考架構）：\n\n```\nclient ──HTTPS/SSE──► API Gateway ──► Inference Router ──► Engine Fleet\n權重儲存（S3 + 節點 NVMe cache）──cold start 載入──► Engine Fleet\nEngine Fleet ──/metrics + DCGM──► Observability\n```\n\n- **API Gateway**：認證、計量、token-based 限流、admission control（ch12/ch16）\n- **Inference Router**：Gateway API Inference Extension——InferencePool + EPP prefix-aware 路由（ch10/ch12）\n- **Engine Fleet**：5 組 TP4 vLLM，4 active + 1 headroom（ch08/ch09）\n- **Observability**：/metrics + DCGM（ch14）；權重儲存的 cold start 路徑見 ch12\n\n逐個箭頭講清楚為什麼：\n\n- **Gateway 層**：OpenAI-compatible API（de facto 標準）；限流單位是 token 不是 RPS——請求成本變異上千倍，RPS 限流毫無意義（ch16）；admission control 放在最前面，佇列崩潰的動力學決定了它不能放在引擎旁邊（ch13/ch15）。\n- **Router 層**：「L7 round-robin 對 LLM 流量不夠——這是有狀態的負載均衡，KV cache 命中與否讓同一個請求的成本差一個數量級。我會用 Gateway API Inference Extension 的 InferencePool + endpoint picker 做 prefix-aware 路由（ch10/ch12），scoring 在 cache 命中與負載均衡之間拉扯，純命中優先會把熱租戶打爆單一副本。」\n- **LoRA 多租戶**：幾個租戶的 LoRA 變體用 multi-LoRA serving 掛在同一個 base 模型池上，而不是每租戶一個獨立部署（ch12）——這是這題「多租戶」的記憶體經濟學正解。\n- **平台選型**：「自組 vs 採用：這個規模我會基於 llm-d 或 KServe 的 LLMInferenceService 起步而不是裸寫 operator——它們把 InferencePool、P/D、KV 路由都做成 well-lit path 了（ch12，2026-06 的生態狀態）。」\n\n> **面試官在這裡想聽什麼**：每個框不是名詞而是決策——「為什麼這裡不能用普通 LB」「為什麼限流在 gateway 而不是引擎」。另外聽你的選型誠實度：知道站在 llm-d/KServe 上而不是炫技自建，是 staff 訊號不是偷懶（ch12 的自組 vs 採用判斷）。\n\n### 第 25–35 分鐘：深掘兩處\n\n面試官會挑一兩處往下鑽，你也可以主動選。建議選一個「引擎深度」加一個「平台深度」，展示縱深：\n\n**深掘一：KV cache 管理（ch05）。** 「剛才說 prefix cache 是最大槓桿，展開講保護它的三層設計：（1）引擎內 PagedAttention 的 block 重用——同 system prompt 的租戶共享前綴 block；（2）路由層 prefix-aware——同一對話的後續輪次必須回到同一副本，否則命中率歸零，這是 session affinity 的高賭注版本；（3）容量壓力下的 eviction 順序與多層 offloading（HBM→CPU RAM→NVMe）——掉到下層的代價要和重算 prefill 比價（ch05/ch10 的 crossover 數學）。觀測上我會把 prefix cache hit rate 和 KV utilization 放在 dashboard 第一排（ch14），hit rate 緩慢下滑是路由壞掉的早期訊號（ch15）。」\n\n**深掘二：autoscaling（ch13）。** 「訊號不用 GPU utilization——SM 占用不等於有效工作，而且它是落後指標。我用的階層：佇列深度（最靈敏）、KV cache 利用率、SLO burn rate，KEDA 接 external metrics 執行。但真正的約束是 scale-up 延遲：拉一個新的 TP4 副本要拉 70GB 權重加引擎初始化，冷啟動以分鐘計，而 chat 尖峰以秒計來——所以靠的是 headroom 數學加 diurnal pattern 的預測式擴縮（我在遊戲後端為活動尖峰做過一樣的事），而不是反應式擴縮。Scale-to-zero 對這個 SLO 直接出局（ch12/ch13）。」\n\n> **面試官在這裡想聽什麼**：深度的「梯度」——你能從平台層一路講到 block table，而且每層都知道觀測指標。第二個深掘裡「冷啟動分鐘級 vs 流量秒級」這句話是這個領域 autoscaling 的第一性約束，講不出它的人會設計出永遠慢一拍的系統。\n\n### 第 35–40 分鐘：故障與運維\n\n主動講，不要等問（ch15 整章的濃縮）：\n\n> 「三個我最擔心的故障。第一，**KV 壓力死亡螺旋**：負載逼近容量 → preemption → recompute 推高負載的正回饋，防禦是 admission control 前置加 KV utilization 告警在 85% 而不是 99%。第二，**graceful drain**：streaming 請求可以長達分鐘級，drain timeout 要照 p99.9 請求時長設計，preStop 停收新請求、等 in-flight 排空——所以這個平台的滾動更新一輪以小時計，部署窗口要排進容量規劃。第三，**品質迴歸在 5xx 看不到**：模型權重、引擎版本、量化配置的 canary 不能只看錯誤率，要有 eval-based gate——模型變笨不會報錯。Runbook 我會先寫兩本：TTFT p99 突然 ×3、單 node NCCL timeout。」\n\n> **面試官在這裡想聽什麼**：你有沒有運維過真東西的氣味。「deploy 以小時計」「模型變笨不報錯」這類細節騙不了人——它們不在任何教程的 happy path 裡。你的 10K CCU 維運經驗在這一段是真實優勢，把它講出來。\n\n### 第 40–45 分鐘：成本收尾\n\n> 「算一下這套設計的單位經濟學（ch16）：20 × H100，neocloud 級距約 $2.75/hr/卡（2026 年年中快照）→ $55/hr ≈ **$40k/月**。尖峰吞吐 500 串流 × 25 tok/s = 12.5k output tok/s ≈ 45M tok/hr，即尖峰時 **$1.2/M output tokens**；按日均利用率 50% 算，實際約 $2.4/M。誠實說：這個量級用第三方 API 託管開放權重模型可能更便宜——自建的辯護理由是多租戶 LoRA、資料隱私與流量成長曲線，如果這三個都不成立，正確答案是先不要自建（ch16 的 build vs buy crossover）。如果要降成本，槓桿排序：把利用率提上去 > 提高 cache 命中 > FP8/量化 > 換硬體代際。」\n\n> **面試官在這裡想聽什麼**：兩件事。第一，你把整場面試的數字串成了 $/Mtok——證明容量數學不是表演，是會計。第二，那句「這個規模可能不該自建」——敢對題目本身提出經濟學質疑，並給出成立條件，是資深與 staff 的分水嶺。沒有面試官會因為你誠實扣分；他們天天在開的會就是這個會。\n\n### 賽後檢核表\n\n錄音自講一遍後對照：六段都覆蓋了嗎？容量數學算對了嗎（KV/token → 串流數/組 → 卡數）？每個架構決策都有「為什麼不用替代方案」嗎？有沒有主動講故障？最後有沒有落到 $？任何一段超過 12 分鐘就是配速失敗——面試和 drain timeout 一樣，預算要照最壞情況設計。\n\n## 面試題庫：30 題按輪次\n\n各章「自我檢核」的精華彙整。每題後標出處章節；答不出來就回去重讀那章——這份清單同時是你的面試前複習地圖。\n\n**Screening／電話初篩（答案要能在 90 秒內講完）**\n\n1. 為什麼 decode 是 memory-bound？用數字證明一次（ch02、ch03）\n2. KV cache 在解什麼問題？一條 32k context 對話在 70B GQA 模型上吃多少記憶體？（ch03）\n3. Continuous batching 和 dynamic batching 差在哪？它為什麼是「推論引擎快」的核心答案？（ch06）\n4. TTFT 和 ITL 各由什麼決定？為什麼一個數字描述不了 LLM 延遲？（ch03、ch14）\n5. PagedAttention 在解什麼問題？跟 OS virtual memory 的類比成立在哪裡？（ch05）\n6. FP8／INT4 量化的收益與風險各是什麼？什麼任務先壞？（ch07）\n7. 為什麼 K8s 預設不能把一張 GPU 分給兩個 Pod？業界怎麼繞、各有什麼代價？（ch11）\n8. Prefix caching 對什麼 workload 槓桿最大？為什麼 agentic 流量讓它從優化變成產品核心？（ch05、ch17）\n\n**深度技術輪（會被連環追問三層）**\n\n9. Chunked prefill 解什麼問題？token budget 怎麼定？代價是什麼？（ch06）\n10. Preemption 什麼時候發生？recompute vs swap 怎麼選？它如何引發死亡螺旋？（ch06、ch13）\n11. TP 為什麼通常不出節點？把每層的通訊量算給我看（ch09）\n12. P/D 分離的動機是什麼？什麼規模以下不要碰？（ch10）\n13. KV-aware routing 的 scoring 怎麼設計？cache 命中與負載均衡怎麼拉扯？（ch10）\n14. Speculative decoding 為什麼在高 batch 下收益遞減甚至為負？（ch07）\n15. MoE 為什麼改變 serving 經濟學？wide-EP 部署在解什麼問題？（ch03、ch09）\n16. DRA 解了 device plugin 的什麼痛？（ch11）\n17. Cold start 從 pod 排程到首 token，每段的時間量級與優化手段？（ch12）\n18. GPU utilization 為什麼是誤導性指標？你用什麼代替？（ch13、ch14）\n\n**系統設計輪**\n\n19. 設計多租戶 LLM 推論平台（本章示範題，反覆練到肌肉記憶）\n20. 為 LLM 服務設計 autoscaling：訊號、headroom 數學、scale-to-zero 的判斷（ch13）\n21. 為 agentic 流量設計快取與路由層（ch05、ch10、ch17）\n22. 設計一套不騙自己的 benchmark 方法論（ch14）\n23. 設計模型權重的 canary 發布——品質迴歸在 5xx 看不到，怎麼辦？（ch15）\n24. 你的產品每月 50B tokens，build vs buy 怎麼決策？算給我看（ch16）\n\n**行為輪**\n\n25. 講一個你用數據證明的效能優化（你的 RDS 故事，套本章敘事模板，60 秒版與 5 分鐘版各準備一個）\n26. 講一次 production incident：你怎麼定位、怎麼止血、事後改了什麼\n27. 為什麼轉 AI infra？（用 plan.md 的定位句：不是想轉 AI 的後端工程師，而是把同一套效能工程方法複製到 GPU 推論上的人）\n28. 你怎麼進入一個全新領域？（你手上就有證據：模擬叢集、租卡實驗、本書的學習路徑）\n29. 講一次你和團隊的技術決策衝突與收場\n30. 「你有什麼想問我們的？」（這題是送分題也是送命題——用下面 JD 解碼器的問題清單）\n\n## 開源貢獻策略：面積、門檻與第一個 PR\n\n開源貢獻在這個領域的求職權重高於一般後端——因為整個推論棧就建在這幾個專案上，你的 PR 紀錄是 hiring manager 可以直接 review 的工作樣本。但策略要對：**目標不是「貢獻過 vLLM」這個名頭，是一段可以在面試裡講的、有來有回的工程協作敘事。**\n\n| 專案 | 主語言 | 貢獻面積 | 門檻 | 對你的契合度（2026-06 評估） |\n|---|---|---|---|---|\n| **vLLM** | Python（核心）/ CUDA（kernel） | 巨大：單一 release 200+ 貢獻者；docs、model support、benchmark、CI、kernel 全光譜 | 中高：專案極熱門，good-first-issue 競爭激烈（我查證時 open 的僅十餘個）；kernel 區門檻最高 | 中：benchmark／docs／metrics 區與你重疊；先從重現 bug 與補測試切入 |\n| **llm-d** | **Go**（scheduler/路由）+ Python | 中等但成長快：inference scheduler 的 scorer plugin 架構是顯式的擴充點；SIG 制、雙週 contributor standup | 低中：社群年輕、維護者可及性高，曝光/競爭比最好 | **高**：K8s + Go + 排程直覺正是你的主場（ch04 的 Go 橋接在此兌現） |\n| **llm-d-inference-sim** | Go | 小而精：模擬器功能、指標仿真 | **最低**：不需要 GPU，跑在你的 M1 上；你在專案①④天天用它 | **最高**：用的時候踩到的坑就是 issue，修了就是 PR——最自然的切入路徑 |\n| **SGLang** | Python | 大：迭代極快（2–3 週一版）導致文件與 cookbook 長期落後——這就是貢獻面 | 中：sgl-cookbook 有顯式的社群貢獻路線圖與 good-first-issue | 中：適合 docs/benchmark 切入；核心排程區節奏快、競爭烈 |\n| **KServe** | Go（controller）+ Python | 中：CNCF incubating（2025 起）、治理正式；LLMInferenceService 還是 alpha API，文件與測試缺口明顯 | 中：CNCF 流程（DCO、雙週 working group）較重但透明 | 高：controller/reconcile 是你 ch04/ch11 練過的形態；alpha API 周邊是肥沃帶 |\n\n（各專案的社群入口：vLLM 有 developer Slack 與雙週 office hours；llm-d 有 Slack、SIG 與雙週 standup；KServe 走 CNCF Slack 與雙週 working group
