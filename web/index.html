 meeting。截至 2026-06 查證，連結見延伸閱讀。）\n\n**從文件與測試切入的路徑，具體展開**：（1）先當使用者——你的旗艦專案就是使用現場，把踩到的文件錯誤、過期參數、缺失的錯誤訊息記下來；（2）挑一個去 issue 區搜，沒人報就開 issue，**先在 issue 裡溝通再動手**——直接丟 PR 給沒共識的改動是新貢獻者最常見的浪費；（3）第一個 PR 刻意選小：一頁文件、一個測試、一個錯誤訊息改善，目標是走完流程而不是技驚四座；（4）PR 裡展示你的量測習慣——「我在 X 環境重現、改後行為是 Y」比「我覺得這樣比較好」過審快得多。\n\n**一個 PR 的完整生命週期預期**（以 vLLM 為例，其 contributing guide 明文的節奏）：提交後分配 reviewer，約每 2–3 天會有狀態更新，7 天沒人理可以禮貌 ping；加上 CI（大專案的 GPU CI 常需 maintainer 觸發）與來回修改，**第一個 PR 從動手到 merge 預期 2–6 週**。心理建設：PR 被晾著不是針對你，maintainer 的 review 佇列跟你設計的系統一樣會塞——你懂佇列。\n\n優先序建議：**llm-d-inference-sim 起手（零硬體成本、Go、低競爭）→ llm-d scheduler 的 scorer/文件 → vLLM 的 benchmark/docs 區**。一個 merged PR ＋ 一段有來有回的 review 經歷，就達到 plan.md 模組五的考核標準；三個以上不同面積的貢獻，在履歷上就是獨立的一條 bullet。\n\n## JD 解碼器：同名職缺的三種實質\n\nch01 的職位光譜按「職稱」拆，這裡按「公司類型」拆——同一個 \"Inference Engineer\" 在三種公司是三份不同的工作：\n\n| | Model lab（前沿實驗室） | 產品公司（LLM 進產品） | Neocloud／GPU 雲 |\n|---|---|---|---|\n| 實質工作 | 引擎與 kernel 級效能：attention 變體、編譯、自家模型的極限壓榨 | 平台與 serving：用 vLLM/llm-d 組平台、SLO、成本、多租戶 | 機隊維運：叢集供裝、IB 網路、利用率經濟學、賣 GPU 給別人 |\n| JD 關鍵字 | CUDA、kernels、torch.compile、MFU | vLLM、K8s、SLO、$/token、observability | InfiniBand、DCGM、fleet、provisioning、SLURM/K8s |\n| 對應本書 | ch02–ch07 | ch08、ch11–ch16 | ch02、ch09、ch11、ch15 |\n| 你的距離 | 最遠（kernel 鏈從零） | **最近（這本書就是為它寫的）** | 中（維運遷移、網路硬體要補） |\n\n**紅旗清單**：JD 只有 LangChain 類應用框架卻掛 infra 職稱（應用層職位穿 infra 外套）；「負責訓練＋推論＋資料＋平台」全包（沒有 infra 團隊，你會是唯一的人）；宣稱生產規模卻不提任何 SLO／on-call／指標詞彙（大概率還沒有生產流量）；要求清單裡 CUDA kernel 與 Terraform 並列且都「必須精通」（JD 是許願池，團隊自己也不知道要找誰）。\n\n**綠旗清單**：寫得出具體引擎與指標（vLLM、TTFT、goodput、DCGM）；提到 GPU 機隊規模或推論帳單量級；有獨立的 infra/platform 團隊；面試流程裡有真的系統設計輪而不只 LeetCode。\n\n**該問面試官的問題**（每一題都同時在收集資訊和展示深度）：\n\n1. 「你們的 GPU 機隊多大、怎麼取得的（on-demand／reserved／自建）？」——規模決定你做的是 ch08 還是 ch10 的工作。\n2. 「推論的 SLO 是誰定的、誰背？現在的 TTFT p95 和 goodput 大概在哪？」——有沒有數字文化，一問便知。\n3. 「模型或引擎版本更新怎麼發布？有 eval gate 嗎？」——測他們的 ch15 成熟度。\n4. 「Prefix cache 命中率現在多少？誰在看這個數字？」——這題會讓懂的面試官眼睛一亮，不懂的支吾——兩種反應都是你要的資訊。\n5. 「on-call 輪值怎麼排？最近一次推論相關的 incident 是什麼？」——工作品質的真相都在 incident 裡。\n6. 「未來一年是自建更多還是往 API/託管收斂？」——測這個職位本身的耐久性（ch16 的 build vs buy 會反過來吃掉職位）。\n\n## 持續更新系統：每週 30 分鐘的維護迴圈\n\n這個領域的工具層以月為單位漂移（vLLM 每 2–3 週一版），但你不需要追逐每個版本——你需要一個固定頻寬的維護迴圈，對應 plan.md 的 L3 迴圈。**追的層級**：機制與架構走向（耐久）優先於參數與版本號（速朽，見 ch17 的能力耐久性矩陣）。\n\n**該追的源頭清單（2026-06 時點）**：\n\n| 源頭 | 頻率 | 為什麼追 |\n|---|---|---|\n| vLLM release notes ＋ blog（vllm.ai/blog） | 每版掃標題 | 引擎層事實上的風向標；office hours（雙週，有 YouTube 錄影）適合聽設計討論 |\n| llm-d blog ＋ release notes | 月 | K8s 原生推論平台的走向；well-lit paths 文章本身就是架構教材 |\n| SGLang releases（GitHub） | 月 | 與 vLLM 的功能趨同/分歧是判斷「什麼是共識」的訊號 |\n| Kubernetes blog（DRA／WG Serving 相關）＋ KServe/CNCF blog | 季 | 資源模型與平台原語的演進（ch11/ch12 的地基） |\n| NVIDIA developer blog（Dynamo、NIXL、硬體） | 季 | 硬體路線圖與官方棧的方向 |\n| a16z × OpenRouter「State of AI」類流量研究 | 年 | 需求面（agentic/reasoning 流量結構）的最佳公開數據（ch17） |\n| 會議錄影：KubeCon（Cloud Native AI 軌）、GTC、Ray Summit、PyTorch Conference、vLLM meetup | 半年挑著看 | 生產案例濃度最高的來源；演講者名單也是求職的公司名單 |\n\n**迴圈設計（每週 30 分鐘，行事曆上鎖死）**：10 分鐘掃 vLLM／llm-d 的 release 標題，只記「出現了什麼新機制詞」；10 分鐘精讀一篇上表的文章；10 分鐘更新自己的 cheatsheet 或實驗筆記（附錄C 是你的起點）。每月加碼一次：把專案①的模擬叢集重跑一遍，看哪個工具的 API 漂移了——壞掉的 lab 就是最誠實的 changelog。每季對照一次 landscape 級事實（價格、版本、專案狀態），標記自己知識的「最後查證時點」——你在本書裡到處看到的（2026-06）標記，就是這個習慣的示範。\n\n## 故障模式與防禦\n\n求職系統的故障目錄，格式照舊：\n\n| 故障模式 | 症狀 | 根因 | 防禦 |\n|---|---|---|---|\n| 作品集「能動就停」 | 面試第二層追問就垮（「為什麼有效？」答不出） | 專案缺診斷層，只有操作層 | 每個專案補齊「會怎麼壞／量到什麼／為什麼選 A」三問（plan.md 原則二） |\n| 數字失憶 | 「我優化過但忘了具體數字」 | 沒有實驗日誌 | README 前三行就是數字；實驗當天寫 log，數字進履歷前可重現 |\n| 教程式作品集 | 面試官禮貌地換話題 | 跟著別人 README 跑一遍沒有自己的發現 | 每個專案至少一個對照組或反直覺結果（如：CPU 訊號 autoscaling 的失敗演示） |\n| 系統設計背稿 | 第一個 follow-up 就偏離劇本後崩潰 | 背架構圖不會算數字 | 本章示範的每個箭頭都要能展開成計算；換三組參數自己重算 |\n| 開源 PR 石沉大海 | PR 開了兩個月沒人理，挫折棄坑 | 沒先溝通、選錯面積、撞上 maintainer 佇列 | 先 issue 後 PR；挑活躍區（看最近 merge 紀錄）；7 天後禮貌 ping；同時開兩條線不單點依賴 |\n| 履歷被 ATS silent drop | 投遞無回音 | 關鍵字錯頻：滿頁 NestJS 沒有 K8s/vLLM/SLO | 用本章翻譯模板對齊 JD 語言；但絕不謊報——關鍵字會在面試被逐一驗貨 |\n| 知識過期 | 面試引用了已被移除的機制（如 vLLM V0 時代的參數） | 學習快照沒有維護迴圈 | 每週 30 分鐘迴圈；講機制不講版本號，版本相關陳述加時點 |\n| 無限備戰 | 「再學完 X 就投」循環半年 | 把求職當 waterfall 不當迭代 | 邊投邊學：面試是最高密度的量測，每場面試的失分點就是下週的學習 backlog |\n\n## 動手做\n\n1. **[紙上推演] 履歷翻譯**：用本章模板改寫你履歷的三條 bullet。成功標準：每條保留原始數字錨點、出現至少兩個目標領域關鍵字、且每個關鍵字你都能被追問三層不破。\n2. **[紙上推演＋錄音] 模擬面試**：計時 45 分鐘自講本章的系統設計題（換一組參數：例如 2k 並發、ITL p95 < 40ms、agentic 流量為主），錄音後對照賽後檢核表逐段打分。成功標準：六段全覆蓋、容量數學重算正確、無任何一段超過 12 分鐘。做完再做一次 ch12 動手做的那份設計文件對照——它就是這題的書面版。\n3. **[M1] 第一個開源迴圈**：在 llm-d-inference-sim 或你常用專案的 docs 區找一個真實的小問題，走完 issue → 溝通 → PR → review 的完整生命週期。成功標準：不是 merge（那不完全由你控制），而是收到至少一輪 maintainer 的實質回饋並完成修改。\n\n## 自我檢核\n\n1. 不看書，把 5k 並發題的容量數學從一張白紙算到卡數與 $/Mtok，數字與本章誤差在 2 倍以內？\n2. 你的四個旗艦專案，每個都能在 90 秒內講出「問題→量測→診斷→優化→數字」，且 README 前三行有數字？\n3. 面試官問「為什麼不用 GPU utilization 當 autoscaling 訊號」，你能給出三層理由並說出替代訊號階層？\n4. 你能說出 vLLM 與 llm-d 各自的貢獻切入面積、以及你下一個 PR 的具體候選？\n5. 給你一份 JD，5 分鐘內判斷它屬於三種公司類型的哪種、列出兩面紅旗或綠旗、並選好三個要問面試官的問題？\n6. 「講一個你用數據證明的優化」——你的 60 秒版本一氣呵成嗎？最後一句落在方法論而不是數字本身嗎？\n7. 你的每週 30 分鐘維護迴圈在行事曆上了嗎？說出上週 vLLM 或 llm-d release notes 裡的一個新機制詞。\n\n## 延伸閱讀\n\n- vLLM Contributing Guide（https://docs.vllm.ai/en/latest/contributing/）— PR 生命週期、review 節奏（2–3 天更新、7 天可 ping）的官方說法，投第一個 PR 前必讀。\n- vLLM Slack（https://slack.vllm.ai）與 vLLM Events（https://vllm.ai/events）— developer Slack 是貢獻協調的主場；meetup 與 office hours 是聽核心開發者討論設計的最低成本管道。\n- llm-d 專案與社群（https://github.com/llm-d/llm-d 、https://llm-d.ai/blog）— CONTRIBUTING、SIG 與雙週 contributor standup 的入口；blog 的 well-lit paths 系列本身是平台架構教材。\n- KServe Community（https://github.com/kserve/community）— CNCF 式治理與雙週 working group 的運作方式，Go controller 貢獻者的起點。\n- SGLang（https://github.com/sgl-project/sglang）— release notes 是觀察引擎層競爭格局的另一隻眼；其 cookbook 子專案有面向新貢獻者的任務路線圖。\n- a16z × OpenRouter「State of AI: 100 Trillion Token Study」（https://a16z.com/state-of-ai/）— 推論需求面的最佳公開數據，面試聊產業趨勢時的可靠彈藥（ch17 詳用）。\n- kubernetes-sigs/inference-perf（https://github.com/kubernetes-sigs/inference-perf）— 標準化 benchmark 工具；給你的專案③④ 一個社群認可的量測基準，本身也是貢獻面積。\n- levels.fyi（https://www.levels.fyi）— 薪資數字會過期，談 offer 前查當下值；用結構（ch01 的稀缺度分析）理解數字，不要反過來。\n"}, {"id": "a-labs-index", "file": "a-labs-index.md", "group": "附錄", "title": "附錄A — 動手實驗總表", "md": "# 附錄A — 動手實驗總表\n\n> 全書 18 章共 52 個實驗：23 個 **[M1]**（免費）、6 個 **[租 GPU]**（章內標注合計約 $29–51）、23 個 **[紙上推演]**（零成本）。本附錄把它們重組成三條漸進軌道＋一份紙上推演合集。每列標注來源章節、目標、硬體、成本、時間與成功標準摘要；具體指令骨架、故障排除與完整成功標準以各章「動手做」原文為準。成本皆為各章 2026-06 價格快照；時間欄除 ch11、ch14 Lab 3 為章內標注外，其餘是本附錄的估計值。\n\n## 建議執行順序\n\n1. **紙上推演邊讀邊做，不要堆積**。零成本、零環境，而且它們是後面花錢實驗的驗算器——先會手算 KV 牆（ch03/ch06），再去租卡看 preemption 計數，你才知道實測數字對不對。\n2. **Track 1 本地模型系列照章節順序走**（ch01→ch08）：建立 TTFT/ITL 體感，練熟 llama.cpp 與 k6——這兩樣是之後所有 benchmark 的工具底。\n3. **Track 1 模擬叢集系列以 ch11 為地基**：64 卡模擬叢集做成一鍵 `setup.sh`，ch13/ch15 的實驗直接長在上面；ch05/ch06/ch14 的 sim 實驗只需 docker，可提前獨立做。\n4. **Track 2 租卡實驗集中打**：等 Track 1 的腳本全部演練過再開卡，並照表後的「併 session 建議」省錢。\n5. **Track 3 收尾**：P/D 路由、平台組裝、可靠性演練全是免費模擬，先做完；唯一的多卡實測（ch09）放在最後一次租卡。\n6. **ch17/ch18 的實驗對齊求職時程**：流量畫像、履歷翻譯、模擬面試、開源迴圈，在開始投遞前完成。\n\n## 成本控制紀律（開卡前默念）\n\n- **先寫好再開卡**：指令、benchmark 腳本、記錄表格全部在 M1 上演練過才租卡。計費時間裡只跑實驗，不查文件。\n- **Terminate，不是 Stop**：Stop 通常仍收儲存費；每次做完到 billing 頁面確認歸零（ch08 的閉環把這列入成功標準）。\n- **儲值制＋預算警報**：用可儲值的平台（RunPod/Vast 級距），先設警報再開卡（ch06/ch08）。\n- **一次 session 一個目標**：開卡前寫下「這次要帶走哪張表」，拿到就關機。\n- **用對等級的卡**：8B 模型用 L4/A10（約 $0.5–1.0/hr）就夠；只有 FP8 對比（ch07）需要 Hopper/Ada 以上，多卡實測（ch09）才需要同節點 NVLink。\n\n## Track 1【M1 免費】\n\n硬體全程 M1 MacBook，成本 $0。\n\n### 本地模型系列（對應 plan.md 模組一）\n\n| 來源 | 實驗 | 目標 | 時間 | 成功標準（摘要） | plan.md |\n|---|---|---|---|---|---|\n| ch01 Lab 2 | Ollama + SSE streaming 觀察 | 親手量 TTFT/ITL，體感 cold start 與 prefill/decode 分野 | 1h | 不看書答出：TTFT/ITL 是什麼、長 prompt 為何只拖慢 TTFT、首次請求為何特別慢 | 模組一 |\n| ch02 Lab 2-2 | llama-bench 驗證 decode 上限公式 | 用統一記憶體頻寬驗證「上限＝頻寬÷模型大小」，反推 MBU | 1–2h | Q4/Q8 tok/s 比值與檔案大小反比誤差 <20%；有效頻寬落在規格 50–80% | 模組一 |\n| ch03 Lab 1 | llama-bench 量 prefill/decode 不對稱 | pp 與 tg 差 1–2 個數量級的實測 | 1h | 能用 arithmetic intensity 解釋差距；decode 達理論值 60–85% 並能解釋缺口 | 模組一 |\n| ch03 Lab 3 | tokenizer 十分鐘體感 | 三種文本的 chars/token 比 | 0.5h | 能說出 token 計量對中英文「不公平」與 gateway 計量的含意 | 模組一 |\n| ch04 Lab 4-1 | FastAPI streaming proxy + k6 | 寫出 OpenAI-compatible SSE proxy 並打併發 | 2–3h | 20 VU 零 5xx；log 整理出 TTFT p50/p95，能解釋 TTFT 隨併發上升的原因 | 模組一 |\n| ch04 Lab 4-2 | py-spy 抓 blocking bug | flame graph 定位被佔住的 event loop | 1h | 指出 sleep frame 與占比；改 async 後吞吐恢復且能解釋 | 模組一 |\n| ch07 Lab 7-1 | Q4 vs Q8 量化對比 | 驗證「量化加速的是 memory-bound 部分」＋品質肉眼校準 | 1–2h | tg 比 ≈ 大小反比、pp 差距明顯小；Q4 數學錯誤率可見較高 | 模組一 |\n| ch07 Lab 7-2 | speculative decoding 體感 | 複述 vs 原創兩種任務的 acceptance 差異 | 1h | 複述任務的 acceptance 與加速顯著較高——α 是流量的函數 | 模組一 |\n| ch08 Lab 2 | llama-server 並發體感 | 「引擎」與「跑模型」的差距 | 1–2h | 並發 1→4 吞吐升、8 開始排隊；能講出生產引擎賣的是可觀測性與可控性 | 模組一 |\n| ch17 Lab 2 | 量自己的 agentic 流量畫像 | 從 coding agent 用量算 input:output 比、cache 價值、KV 峰值 | 1h | 產出流量畫像表＋三條「會改變哪些設計決策」 | 模組六 |\n\n### 模擬叢集系列（對應 plan.md 模組二，旗艦專案①）\n\n| 來源 | 實驗 | 目標 | 時間 | 成功標準（摘要） | plan.md |\n|---|---|---|---|---|---|\n| ch05 Lab 1 | llm-d-inference-sim 觀察 prefix caching 指標 | 把「命中率作為一級指標」摸一遍 | 1h | 指出 KV 使用率指標、哪兩個指標相除是命中率，解釋兩組流量的差異 | 模組二 |\n| ch06 實驗 2 | sim + k6 飽和曲線 | 三檔 `max-num-seqs`（16/64/128）的併發-吞吐曲線 | 1–2h | 看到吞吐在併發超過 max-num-seqs 後平頂、延遲線性堆積 | 模組二 |\n| ch11 Lab | kind+KWOK+fake-gpu-operator 64 卡模擬叢集 | 旗艦①地基：排程、碎片化、bin-packing、Kueue 配額與搶占、MIG（選做） | 半天–1天 | 碎片化重現（56 閒卡仍 Pending）且 binpack 後可排；能用 event 講出 Kueue 借用-回收因果鏈 | 模組二｜旗艦① |\n| ch14 Lab 1 | sim + Prometheus + Grafana 全套監控 | 六面板 dashboard＋「飽和」「cache 退化」兩種事故演練 | 2–4h | 兩種事故都能在 30 秒內定位到正確的層 | 模組二｜旗艦① |\n| ch14 Lab 2 | k6 SSE benchmark 腳本 | open vs closed loop、coordinated omission | 2h | 展示兩種模式 p99 差異並解釋；驗證 chunk 數 ≠ completion_tokens | 模組二 |\n| ch18 Lab 3 | 第一個開源迴圈（llm-d-inference-sim 或常用專案的 docs） | issue→溝通→PR→review 完整生命週期 | 數天（零碎） | 收到至少一輪 maintainer 實質回饋並完成修改 | 模組五/六 |\n\n## Track 2【單卡租用】— 總預算 $30–50\n\n對應 plan.md 模組四（旗艦專案③）。章內標注合計 $21–36，預算餘量留給重跑與失誤。前置條件：Track 1 的腳本與記錄表已演練。\n\n| 來源 | 實驗 | 目標 | 硬體 | 成本 | 時間 | 成功標準（摘要） | plan.md |\n|---|---|---|---|---|---|---|---|\n| ch05 Lab 2 | prefix caching 開關 TTFT 對比 | 量化 cache 命中的 TTFT 價值 | L4/A10 | $3–5 | 2h | 兩輪 TTFT 中位數差距能用機制解釋；/metrics 驗證確實命中 | 模組四 |\n| ch06 實驗 3 | `max-num-seqs` 三檔（16/64/256）對比 | 找 KV 牆與「餵不飽」區 | L4/A10 | $3–5 | 2h | 三檔對比表；指出哪檔 preemption 計數走動、哪檔 waiting>0 但 running 偏低 | 模組四 |\n| ch08 Lab 1 | 部署＋三組配置＋benchmark 完整閉環 | 旗艦③核心：實測表 vs 推算表並排 ｜旗艦④ |\n\n## 【紙上推演】合集（零成本，邊讀邊做）\n\n對應 plan.md 模組三的效能建模能力（旗艦專案②的素材庫）與模組六的求職產出。注意：ch13 Lab 3 的 Vidur 維護動能存疑（2026-06），章內已建議可改手算。\n\n| 來源 | 題目 | 產出 | 時間 | plan.md |\n|---|---|---|---|---|\n| ch01 Lab 1 | 自己的技能遷移矩陣 | 一頁表格（ch18 改履歷直接複用） | 1h | 模組六 |\n| ch02 Lab 2-1 | 三張卡 roofline 拐點＋70B decode 上限 | 拐點、理論 tok/s、H200 對 prefill/decode 的不對稱提升 | 1h | 模組三 |\n| ch03 Lab 2 | 三模型 KV 公式（8B/70B/MLA） | 每 token KV、128k 帳單、69 GB 池的併發數 | 1h | 模組三 |\n| ch04 Lab 4-3 | 讀 vLLM forward 推 tensor shape | 找出 GQA 的 head 數分岔與 KV cache 入口 | 1h | 模組一 |\n| ch05 Lab 3 | 重算 agentic prefix cache 帳 | 變因敏感度結論（輪數那項是平方級） | 0.5–1h | 模組三 |\n| ch06 實驗 1 | 8k context 重算 batch 曲線 | 甜蜜點與 KV 牆的位移 | 1h | 模組三 |\n| ch07 Lab 7-4 | acceptance rate 與高 batch 判決 | 兩種服務的 γ 選擇與辯護 | 1h | 模組三 |\n| ch08 Lab 3 | 三個引擎選型題 | 各 5 行的「workload→引擎→團隊→代價」決策鏈 | 1h | 模組四 |\n| ch09 Lab 1 | 405B 與 1T 級 MoE 平行配置設計 | 切法、記憶體帳、每 token 通訊量 | 1.5h | 模組三 |\n| ch09 Lab 3 | TP 通訊預算 3×3 表 | 「TP 不出節點」的數字論證 | 0.5h | 模組三 |\n| ch10 Lab 10-2 | 三種流量形態的 xPyD 配比 | 配比＋辯護（短問答的正解是不分離） | 1h | 模組五 |\n| ch10 Lab 10-3 | 搬 KV vs 重算的 crossover | 8B＋小 context 下結論為何翻轉 | 1h | 模組三 |\n| ch11 紙上推演 | MIG 的 roofline 帳 | 「要不要切 MIG」的決策框架 | 0.5h | 模組二 |\n| ch12 實驗 3 | 「5 團隊 20 模型」平台設計文件 | 一頁架構＋冷啟動策略＋故障預判（ch18 面試題的書面草稿） | 2h | 模組六｜旗艦④ |\n| ch13 Lab 2 | RAG workload 容量規劃 | 卡數、headroom、月成本三個數字 | 1.5h | 模組三｜旗艦② |\n| ch13 Lab 3 | 配置空間搜索（Vidur 或手算） | 三配置對照表＋「什麼新資訊會讓我改變主意」 | 2h | 模組三｜旗艦② |\n| ch15 實驗 3 | 「凌晨三點 TTFT 告警」判斷樹 | 同事可盲走的 runbook | 1.5h | 模組五 |\n| ch16 實驗 1 | build vs buy 決算 | 三案月成本＋crossover＋200 字建議書 | 2h | 模組六 |\n| ch16 實驗 3 | 內部價卡設計 | 三費率可驗算回全成本＋headroom 歸屬辯護 | 1h | 模組五 |\n| ch17 Lab 1 | 「P/D 分離會不會被硬體淘汰」辯論 | 正反各 200 字＋有改變立場條件的裁決 | 1h | 模組六 |\n| ch17 Lab 3 | hybrid attention 重算 KV 帳 | 驗證「KV 減約 75%」量級 | 1h | 模組三 |\n| ch18 Lab 1 | 履歷翻譯三條 bullet | 每個關鍵字可被追問三層 | 1h | 模組六 |\n| ch18 Lab 2 | 45 分鐘模擬面試（錄音） | 六段全覆蓋、容量數學正確的作答 | 1.5h | 模組六 |\n\n## 旗艦專案對應總覽\n\n| plan.md 旗艦專案 | 核心實驗 | 補充素材 |\n|---|---|---|\n| ① 模擬推論叢集 | ch11 Lab（地基）、ch13 Lab 1（autoscaling 進階） | ch05 Lab 1、ch06 實驗 2、ch14 Lab 1/2 |\n| ② 配置權衡研究 | ch13 Lab 2/3 | ch02 Lab 2-1、ch03 Lab 2、ch06 實驗 1、ch09 Lab 1/3 |\n| ③ vLLM 推論優化 | ch08 Lab 1（量測→診斷→優化→驗證閉環） | ch05 Lab 2、ch06 實驗 3、ch07 Lab 7-3、ch14 Lab 3 |\n| ④ 多模型／多節點平台 | ch12 實驗 1＋實驗 3、ch10 Lab 10-1 | ch09 Lab 2、ch15 實驗 1/2、ch16 實驗 2、ch18 Lab 3 |\n\n最後三個省工提示：ch02 Lab 2-2、ch03 Lab 1、ch07 Lab 7-1 共用同一組 GGUF 檔（8B 的 Q4_K_M 與 Q8_0），下載一次、一個下午連做三章；模擬叢集是資產不是耗材——ch11 搭好的 `gpu-sim` 直接承載 ch13，ch12 的 `igw-lab` 直接承載 ch15，砍掉重練是最大的隱性時間成本；所有租卡實驗的產出物（對比表、frontier 圖、billing 截圖）當場存檔——它們就是 ch18 作品集的素材，關機之後就沒有第二次了。\n"}, {"id": "b-glossary", "file": "b-glossary.md", "group": "附錄", "title": "附錄B — 術語表：LLM Serving 領域 EN→繁中對照", "md": "# 附錄B — 術語表：LLM Serving 領域 EN→繁中對照\n\n> **使用說明**：收錄全書出現的 LLM serving 領域術語，每條一行定義＋主要出現章節。按字母排序，數字/符號開頭放最前；同一個詞多章出現時，「主要見」標機制講解最深的那章。一般後端詞彙（HTTP、cache、queue 這類你已精通的）不收。時效性描述以本書寫作時（2026-06）為準。\n\n## 數字與符號\n\n- **$/Mtok ($ per Million tokens)** — LLM 推論的單位經濟學指標：每處理或產出一百萬個 token 的成本，由 GPU 時租價除以有效 token rate 推得。主要見 ch16。\n\n## A\n\n- **Acceptance Rate（接受率）** — speculative decoding 中 draft token 通過 target 模型驗證的比例，直接決定加速倍率；過低時投機反而比不投機更慢。主要見 ch07。\n- **Active Parameters（激活參數量）** — MoE 模型每個 token 前向計算實際用到的參數量（如 1T total / 32B active）；active 決定算力成本、total 決定記憶體成本，是 MoE 改變 serving 經濟學的關鍵。主要見 ch03。\n- **Admission Control（准入控制）** — 在系統最前端（gateway）依當前容量決定是否接受新請求的機制，是防止佇列崩潰與死亡螺旋的第一道防線。主要見 ch12、ch15。\n- **Agentic Workload** — 由 AI agent 自主發起的多輪工具呼叫流量：長 session、極高 prefix 重複率、機器速率的突發請求，正在取代 chat 成為主流負載形態。主要見 ch17。\n- **AIPerf** — NVIDIA 的 LLM 負載測試工具（前身 GenAI-Perf），量測 TTFT、ITL、token throughput 等推論指標。主要見 ch14。\n- **All-Gather** — 集合通訊原語：每個參與者收集所有其他參與者的資料分片，結束時人人持有完整資料。主要見 ch09。\n- **All-Reduce** — 集合通訊原語：對所有參與者的資料做歸約（如加總）後分發回每個參與者；tensor parallelism 每層 forward 需要兩次。主要見 ch09。\n- **All-to-All** — 集合通訊原語：每個參與者送不同分片給每個其他參與者；是 expert parallelism 把 token 路由到 expert 所在 GPU 的核心通訊。主要見 ch09。\n- **Arithmetic Intensity（運算強度）** — 每從記憶體搬一個 byte 所執行的浮點運算數（FLOP/byte），與 roofline model 搭配判斷 workload 是 compute-bound 還是 memory-bound。主要見 ch02。\n- **Attention（注意力機制）** — transformer 的核心機制：每個 token 以 Query 對所有歷史 token 的 Key 計算相關性、再加權彙總 Value——「看所有歷史」正是 O(n²) 計算與 KV cache 的來源。主要見 ch03。\n- **AWQ (Activation-aware Weight Quantization)** — weight-only INT4 量化方法：依 activation 分布找出重要權重通道並保護其精度。主要見 ch07。\n\n## B\n\n- **Batch Tier（批次方案）** — API 供應商的離線推論等級：以約五折價格換取非即時回應，用離峰閒置容量消化延遲不敏感的工作。主要見 ch16。\n- **Bin-Packing** — 把 Pod 盡量塞滿同一節點的排程策略，用於減少 GPU 碎片化；代價是單節點故障的爆炸半徑變大。主要見 ch11。\n- **Blackwell** — NVIDIA 2024–2026 的主力資料中心 GPU 世代（B200/B300），特徵是 HBM3e（B200 約 8 TB/s）與原生 FP4 tensor core。主要見 ch02。\n- **Block Table** — PagedAttention 中每個 sequence 的邏輯 block 到實體 KV block 的映射表，角色等同 OS 的 page table。主要見 ch05。\n- **BPE (Byte Pair Encoding)** — 主流 tokenizer 演算法：從高頻字節對反覆合併建立詞表，這是「token ≠ 字」的原因。主要見 ch03。\n- **Brownout（降級運行）** — 過載時主動降級換容量的運維模式：縮小 max context、關閉 speculative decoding 等，犧牲部分功能保住整體可用性。主要見 ch15。\n\n## C\n\n- **Calibration（校準）** — 量化前用一小批代表性資料估計權重與 activation 的數值分布、決定縮放因子的步驟；校準資料不具代表性是量化品質劣化的常見根因。主要見 ch07。\n- **Chargeback / Showback** — 內部多租戶把 GPU 成本按 per-token 用量歸因到各團隊的記帳機制；showback 只揭露數字、chargeback 實際入帳。主要見 ch16。\n- **Chunked Prefill** — 把長 prompt 的 prefill 切成小塊、混進 decode batch 逐步執行的排程技術，避免長 prompt 卡住所有人的 decode 造成 ITL spike。主要見 ch06。\n- **Cold Start（冷啟動）** — 推論服務從 Pod 排程到能服務首個請求的全過程（image pull → 權重載入 → 引擎初始化 → CUDA graph capture → warmup），時間以分鐘計，是 autoscaling 的根本約束。主要見 ch12。\n- **Context Caching** — 各家 API 把 prefix caching 商品化的計費功能：cache 命中的 input token 享約 50–90% 不等的折扣（2026-06），是快取命中經濟價值的直接證據。主要見 ch05、ch16。\n- **Context Length（上下文長度）** — 模型一次能處理的最大 token 數；KV cache 容量與 prefill 計算量都隨之成長，2026 年旗艦開源模型已達 1M。主要見 ch03。\n- **Continuous Batching** — 以 decode step 為粒度動態重組 batch 的排程機制：新請求隨時加入、完成的隨時離開，是現代推論引擎吞吐的核心來源。主要見 ch06。\n- **Coordinated Omission** — 負載測試的經典謬誤：closed-loop 測試在系統變慢時自動放慢送出速率，使量到的延遲嚴重偏向樂觀。主要見 ch14。\n- **Copy-on-Write** — PagedAttention 讓多個 sequence 共享 KV block、寫入時才複製的機制，支撐平行取樣與 beam search。主要見 ch05。\n- **cuBLAS** — NVIDIA 的 GPU 線性代數函式庫（矩陣乘法），幾乎所有推論引擎矩陣運算的底層。主要見 ch04。\n- **CUDA (Compute Unified Device Architecture)** — NVIDIA 的 GPU 通用計算平台與程式模型，整個 NVIDIA 軟體生態（driver、toolkit、函式庫）的地基。主要見 ch04。\n- **CUDA Graphs** — 把一串 GPU kernel 啟動序列錄製成圖、之後一次提交重放的機制，消除 decode 每步的 kernel launch overhead。主要見 ch07。\n- **cuDNN** — NVIDIA 的深度學習 primitive 函式庫（attention、normalization 等常用運算的最佳化實作）。主要見 ch04。\n- **CUTLASS** — NVIDIA 的開源 CUDA C++ template 函式庫，用於組裝自訂高效能矩陣乘法 kernel。主要見 ch04。\n\n## D\n\n- **Data Parallelism (DP)** — 把完整模型複製到多組 GPU、各自服務不同請求的平行化方式；最樸素也最常用的 scale-out。主要見 ch09。\n- **DCGM (Data Center GPU Manager)** — NVIDIA 的資料中心 GPU 監控與健康管理套件；DCGM-exporter 把指標轉成 Prometheus 格式，是 K8s GPU 遙測的事實標準。主要見 ch14。\n- **Decode** — 推論的第二階段：逐 token 自迴歸生成，每步都要讀完整模型權重與 KV cache，因此是 memory-bound。主要見 ch03。\n- **Device Plugin** — K8s 讓節點回報 GPU 等擴展資源的傳統機制；資源以整數計、不可分割不可超賣，正被 DRA 取代。主要見 ch11。\n- **DeviceClass** — DRA 資源模型中由管理員定義的裝置類別，使用者透過 ResourceClaim 引用它請求裝置。主要見 ch11。\n- **DistServe** — 提出 prefill/decode 分離的代表性學術工作之一（2024），證明分離可同時改善 TTFT 與 TPOT 的 SLO 達成率。主要見 ch10。\n- **Diurnal Pattern（日夜週期）** — 流量隨日夜規律起伏的形態，是預測式擴縮最可靠的依據。主要見 ch13。\n- **DP Attention** — MoE serving 的組合技：attention 層以 data parallelism 各自處理不同請求（避免 MLA 類模型在 TP 下重複存放 KV cache），expert 層以 EP 橫跨全部 GPU。主要見 ch09。\n- **DRA (Dynamic Resource Allocation)** — K8s 新一代裝置資源模型（v1.34 GA）：以 ResourceClaim/DeviceClass/structured parameters 描述與分配 GPU，解決 device plugin 整數資源表達力不足的問題。主要見 ch11。\n- **Draft Model** — speculative decoding 中負責快速猜測多個候選 token 的小模型，猜測結果由 target 模型一次平行驗證。主要見 ch07。\n- **Drain (Graceful Drain)** — 節點或 Pod 下線前停收新請求、等待 in-flight 請求完成的流程；LLM streaming 請求可長達分鐘級，drain timeout 必須按 p99.9 請求時長設計。主要見 ch15。\n- **DSA (DeepSeek Sparse Attention)** — DeepSeek V3.2 起採用的稀疏注意力機制：每個 token 只關注被挑選的部分歷史，壓低長上下文的計算與 KV 成本。主要見 ch17。\n- **Dynamo (NVIDIA Dynamo)** — NVIDIA 的開源分散式推論框架：提供 planner、KV-aware router、KVBM 與 NIXL 傳輸層，統一支援 vLLM/SGLang/TensorRT-LLM 後端。主要見 ch10、ch12。\n\n## E\n\n- **EAGLE / EAGLE-3** — 主流 speculative decoding 方案：用 target 模型自身 hidden state 訓練的輕量 draft head 連續猜測多個 token，接受率高於獨立 draft model。主要見 ch07。\n- **ECC (Error-Correcting Code)** — GPU 記憶體的錯誤偵測與修正機制；single-bit 錯誤可修正，double-bit 錯誤會讓工作負載中止，是最常見的 GPU 硬體故障訊號之一。主要見 ch02、ch15。\n- **Embedding** — 把 token id 映射成連續向量的查表層，transformer 的輸入層。主要見 ch03。\n- **Endpoint Picker (EPP)** — Gateway API Inference Extension 的核心元件：透過 ext-proc 協定取得各 engine Pod 的即時指標（佇列深度、KV 利用率、prefix cache 狀態），替每個請求挑選最佳後端。主要見 ch12。\n- **Eval Gate（評測關卡）** — 發布流程中以任務型評測分數作為放行條件的關卡；模型「變笨」不會出現在 5xx 裡，必須靠 eval 攔截品質迴歸。主要見 ch15。\n- **Expert Parallelism (EP)** — MoE 專屬的平行化：把 experts 分散到多張 GPU，token 經 all-to-all 通訊路由到其 expert 所在的卡。主要見 ch09。\n- **Extended Resource** — K8s 中以整數計數的自訂資源型別（如 `nvidia.com/gpu`），不可分割、不可超賣——GPU 資源模型一切限制的根源。主要見 ch11。\n\n## F\n\n- **fake-gpu-operator** — 模擬 NVIDIA GPU Operator 行為的開源測試工具，讓沒有 GPU 的叢集（kind + KWOK）也能演練 GPU 排程與監控。主要見 ch11。\n- **Fallen off the Bus** — GPU 從 PCIe bus 上「消失」的硬體故障（Xid 79），driver 完全失去裝置，通常需要重啟節點甚至送修。主要見 ch15。\n- **FCFS (First-Come, First-Served)** — 先到先服務的排程策略，vLLM scheduler 的預設；簡單公平但有 head-of-line blocking 風險。主要見 ch06。\n- **FFN (Feed-Forward Network)** — transformer 每層中接在 attention 後的矩陣乘法區塊（升維→降維），佔 dense 模型的多數參數；MoE 替換的就是這部分。主要見 ch03。\n- **FlashAttention** — IO-aware 的 attention kernel：以 tiling 在 SRAM 內完成 softmax 歸約、大幅減少 HBM 往返，把 attention 的記憶體開銷從 O(n²) 降到 O(n)。主要見 ch07。\n- **FlashInfer** — 專為 LLM serving 設計的開源 attention kernel 函式庫，原生支援 paged KV cache 等 serving 特化場景。主要見 ch07。\n- **FP8** — 8-bit 浮點格式（E4M3/E5M2），Hopper 世代起有原生 tensor core 支援；2026 年生產推論的主流精度之一，權重與 KV cache 都可用。主要見 ch07。\n- **Free-Threading** — Python 的無 GIL 建置模式：3.13 實驗性引入、3.14 起正式支援，多執行緒 CPU-bound 工作不再被全域鎖序列化。主要見 ch04。\n\n## G\n\n- **Gang Scheduling** — 「全有或全無」的排程語意：多 Pod 工作要嘛全部同時排上、要嘛都不排，避免多節點推論部分就緒造成死鎖與 GPU 空轉。主要見 ch11。\n- **Gateway API Inference Extension (GIE / IGW)** — K8s Gateway API 的推論擴展（已 GA）：定義 InferencePool 與 Endpoint Picker，讓 L7 路由能感知模型負載與 KV cache 狀態——因為 LLM 請求成本變異數百倍，傳統 LB 演算法失效。主要見 ch12。\n- **GGUF** — llama.cpp 生態的模型檔案格式（內含權重、量化資訊與 metadata），本地與邊緣推論的事實標準。主要見 ch07、ch08。\n- **GIL (Global Interpreter Lock)** — CPython 的全域直譯器鎖：同一時刻僅一條執行緒執行 Python bytecode，正被 free-threading 逐步淘汰。主要見 ch04。\n- **Goodput** — 滿足 SLO 的有效吞吐量：只計入 TTFT/ITL 都達標的請求所貢獻的 token rate，是比 raw throughput 誠實的容量指標。主要見 ch06、ch14。\n- **GPTQ** — weight-only INT4 量化方法：逐層利用二階資訊最小化量化誤差。主要見 ch07。\n- **GPU Fragmentation（GPU 碎片化）** — 叢集總卡數足夠、但分散在各節點湊不出單一工作所需整組 GPU 的浪費形態；直接反映成錢。主要見 ch11、ch16。\n- **GPU Operator (NVIDIA GPU Operator)** — 以 operator 模式把 driver、container toolkit、device plugin、DCGM-exporter、MIG manager、NFD 等 GPU 軟體棧整套部署進 K8s 的元件。主要見 ch11。\n- **GPUDirect Storage (GDS)** — 讓 NVMe/儲存資料以 DMA 直達 GPU 記憶體、繞過 CPU bounce buffer 的技術，加速權重載入與 KV offloading。主要見 ch10、ch12。\n- **GQA (Grouped-Query Attention)** — 多個 query head 共用一組 KV head 的 attention 變體，把 KV cache 縮小數倍而品質損失輕微；Llama 3 等主流模型標配。主要見 ch03。\n- **Grace** — NVIDIA 的 Arm 架構資料中心 CPU，與 GPU 以 NVLink-C2C 互連組成 GB200/GB300 等超級晶片。主要見 ch02。\n\n## H\n\n- **HBM (High Bandwidth Memory)** — GPU 的堆疊式高頻寬主記憶體（H100 為 HBM3 3.35 TB/s、B200 為 HBM3e 約 8 TB/s）；其頻寬是 decode 吞吐的物理上限，本書「memory 的生意」主軸的物理基礎。主要見 ch02。\n- **Head-of-Line Blocking** — 佇列前端的長工作堵住後面所有短工作的現象；LLM 中「長 prefill 卡住所有人的 decode」是典型案例。主要見 ch06。\n- **Headroom（容量餘裕）** — 容量規劃中刻意保留的緩衝，用來吸收流量尖峰與分鐘級的 scale-up 延遲；headroom 大小由冷啟動時間與尖峰係數共同決定。主要見 ch13。\n- **HiCache** — SGLang 的階層式 KV cache：以 UnifiedRadixTree 把 radix tree 延伸到 CPU RAM 與儲存層。主要見 ch08。\n- **Hopper** — NVIDIA 2022–2024 的主力 GPU 世代（H100/H200），首次原生支援 FP8 tensor core。主要見 ch02。\n\n## I\n\n- **inference-perf** — kubernetes-sigs 的標準化 LLM benchmark 工具：TTFT/TPOT/goodput 量測、Poisson/trace replay 負載產生、engine-agnostic（任何 OpenAI 相容端點）。主要見 ch14。\n- **InferencePool** — Gateway API Inference Extension 的 CRD：宣告一組推論 Pod 為可智慧路由的資源池，由 Endpoint Picker 決定每個請求的落點。主要見 ch12。\n- **InfiniBand (IB)** — 跨節點 RDMA 高速網路，多節點訓練與推論的主流互連；低成本替代品是 RoCE。主要見 ch02、ch09。\n- **ITL (Inter-Token Latency)** — 相鄰兩個輸出 token 之間的時間間隔，決定 streaming 的流暢度；與 TPOT 常混用，但 ITL 強調逐 token 間隔的分布（看 p99）。主要見 ch14。\n\n## K\n\n- **KEDA (Kubernetes Event-Driven Autoscaling)** — 以外部事件或指標（佇列深度、Prometheus query）驅動 HPA 的擴縮框架，LLM autoscaling 最常用的執行機制。主要見 ch13。\n- **Kernel Fusion** — 把多個相鄰 GPU kernel 合併成一個、省去中間結果寫回 HBM 再讀回的最佳化手法。主要見 ch07。\n- **KPA (Knative Pod Autoscaler)** — Knative 的 Pod 擴縮器：以並發數/RPS 為訊號、支援 scale-to-zero；用於 LLM 時要直面分鐘級冷啟動。主要見 ch13。\n- **KServe** — K8s 上的模型服務平台；其 LLMInferenceService CRD（仍為 alpha，2026-06）建構在 llm-d 之上，代表傳統 model serving 向 LLM 原生架構的演進。主要見 ch12。\n- **Kueue** — K8s 的工作佇列與配額排程器：提供 quota、cohort 借用、gang admission，管理 GPU 等稀缺資源的公平分配與搶占。主要見 ch11。\n- **KV Cache** — 把每層 attention 算出的 Key/Value 向量存起來避免重算的快取；大小 = 2 × layers × kv_heads × head_dim × bytes × tokens，隨 context 線性成長，是 LLM serving 最重要的記憶體開銷。主要見 ch03、ch05。\n- **KV Cache Utilization** — 已用 KV block 占引擎 KV 總容量的比例：判斷飽和、預測 preemption、驅動 autoscaling 的關鍵健康訊號。主要見 ch13、ch14。\n- **KV Connector** — vLLM 的 KV cache 傳輸與外接抽象層（NixlConnector、LMCacheConnector 等），P/D 分離與分層快取的標準接口。主要見 ch10。\n- **KV Offloading（KV 分層卸載）** — 把 KV cache 在 GPU HBM → CPU RAM → NVMe/遠端儲存之間分層存放的機制，用慢一級的儲存換 HBM 容量。主要見 ch05。\n- **KV-Aware Routing** — 路由器依各 replica 的 KV cache 內容（prefix 命中可能性）與即時負載挑選後端的策略；本質是有狀態的負載均衡，cache 命中價值遠高於一般 session affinity。主要見 ch10。\n- **KVBM (KV Block Manager)** — Dynamo 的 framework-agnostic KV cache 分層管理元件。主要見 ch10。\n- **KWOK (Kubernetes WithOut Kubelet)** — 模擬數千個無 kubelet 假節點的 kubernetes-sigs 工具，GPU 叢集排程實驗的標準地基。主要見 ch11。\n\n## L\n\n- **Latency-Throughput Frontier** — 對同一系統掃描不同負載率畫出的延遲—吞吐曲線；比任何單點數字誠實的 benchmark 呈現方式。主要見 ch14。\n- **LeaderWorkerSet (LWS)** — K8s 的多 Pod 群組部署原語：一個 leader 帶 N 個 worker 作為單一單位排程、擴縮與重啟，是多節點推論（TP/PP 跨機）的標準部署形態。主要見 ch11。\n- **Linear Attention（線性注意力）** — 把 attention 改寫為線性複雜度的架構家族（Gated Delta Networks、Mamba 混合架構等）：以固定大小的狀態取代線性成長的 KV cache，可能顛覆現有 KV 數學。主要見 ch17。\n- **llama.cpp** — 純 C/C++ 的輕量推論引擎，主攻 CPU 與消費級硬體；GGUF 格式與本地量化生態的核心。主要見 ch08。\n- **llm-d** — K8s 原生的分散式推論框架（Red Hat/Google/IBM 系）：以 Gateway API Inference Extension 為路由層，提供 prefix-cache-aware scheduling 與 P/D 分離等「well-lit paths」。主要見 ch10、ch12。\n- **llm-d-inference-sim** — llm-d 子專案：無需 GPU 即可模擬 vLLM 的 API 與指標行為，用於測試路由、擴縮與監控層；本書 [M1] 實驗的主力工具。主要見 ch11、ch14。\n- **LMCache** — 開源 KV cache 分層儲存引擎：把 KV 外溢到 CPU RAM、SSD、Redis、S3 等後端，與 vLLM 原生整合。主要見 ch05。\n- **Load Shedding（卸載流量）** — 過載時主動丟棄部分請求以保護核心容量的手段；LLM 場景常按優先級丟（priority shedding），先犧牲批次與低付費層流量。主要見 ch13、ch15。\n- **Logits** — 模型最後一層輸出的未正規化分數向量（維度 = 詞表大小），經 softmax 與 sampling 決定下一個 token。主要見 ch03。\n- **LoRA (Low-Rank Adaptation)** — 以低秩矩陣微調模型的方法；serving 時一個 base 模型可同時掛載多個 LoRA adapter（multi-LoRA serving），是低成本多租戶客製的基礎。主要見 ch12。\n- **LPU (Language Processing Unit)** — Groq 的推論專用處理器：權重放 SRAM 而非 HBM，以容量換極低延遲（NVIDIA 已於 2025-12 以約 $20B 取得其技術授權與核心團隊，Groq 公司仍獨立營運）。主要見 ch02、ch17。\n\n## M\n\n- **Mamba** — 以 state space model 取代 attention 的模型架構：狀態大小固定、不隨 context 成長；實務上多以與 attention 混合（hybrid）的形態落地。主要見 ch17。\n- **MBU (Memory Bandwidth Utilization)** — 實際用到的記憶體頻寬占硬體峰值的比例，decode 階段效率的關鍵指標。主要見 ch14、ch16。\n- **MCP (Model Context Protocol)** — agent 與工具連接的開放協定（Anthropic 發起，現由 Linux Foundation 旗下基金會託管），agentic 流量標準化的主要推手。主要見 ch17。\n- **MFU (Model FLOPs Utilization)** — 實際達成的 FLOPs 占硬體峰值算力的比例；「GPU 忙碌但無效」的照妖鏡。主要見 ch14、ch16。\n- **MI355X (AMD Instinct MI355X)** — AMD 的旗艦資料中心 GPU（CDNA 4，288 GB HBM3E、8 TB/s），NVIDIA 之外最主要的選項；MI400/Helios 機架預計 2026 H2。主要見 ch02。\n- **MIG (Multi-Instance GPU)** — 把一張 GPU 硬體分割成多個有獨立記憶體與算力配額的實例（H100 最多 7 個），隔離性最強的 GPU 共享技術，適合多租戶小模型。主要見 ch11。\n- **MLA (Multi-head Latent Attention)** — DeepSeek 的 attention 變體：把 KV 壓縮成低維 latent 向量存放，KV cache 比 GQA 再小一個量級。主要見 ch03。\n- **MLX** — Apple 的機器學習框架，針對 Apple Silicon 統一記憶體最佳化，M 系列晶片本地推論的主要選項之一。主要見 ch08。\n- **MoE (Mixture of Experts)** — 把 FFN 換成多個 expert、每個 token 只激活少數幾個的架構：記憶體要裝下全部參數、算力只用 active 部分，從根本改變 serving 的經濟學與平行化策略。主要見 ch03。\n- **Mooncake** — Moonshot AI（Kimi）的 KVCache-centric 推論平台：以分離式 KV cache 池為核心的 P/D 分離架構，最早公開生產數據的系統之一；其 Transfer Engine 與 Store 已開源。主要見 ch10。\n- **MPS (Multi-Process Service)** — NVIDIA 讓多個 process 同時共享一張 GPU 的機制：可劃分算力但故障隔離弱，隔離性介於 time-slicing 與 MIG 之間。主要見 ch11。\n- **MQA (Multi-Query Attention)** — 所有 query head 共用單一組 KV head 的極端變體：KV cache 最小，但品質損失比 GQA 明顯。主要見 ch03。\n- **MTBF (Mean Time Between Failures)** — 平均故障間隔；單卡 MTBF 再長，數千卡叢集的整體故障率仍會讓硬體故障成為日常而非例外。主要見 ch15。\n- **MTP (Multi-Token Prediction)** — 模型原生內建多 token 預測頭的 speculative decoding 形態，DeepSeek-V3 起採用，免去外掛 draft model。主要見 ch07。\n- **MXFP4** — OCP microscaling 標準的開放 4-bit 浮點格式（block 共享 scale）；gpt-oss 權重即以 MXFP4 原生發布。主要見 ch07。\n\n## N\n\n- **NCCL (NVIDIA Collective Communications Library)** — NVIDIA 的集合通訊函式庫（all-reduce/all-gather/all-to-all），多卡推論的通訊地基；NCCL hang（一卡出事、全組僵住且不報錯）是多卡世界最痛的故障。主要見 ch09、ch15。\n- **Neocloud** — 專營 GPU 租賃的新型雲端業者（CoreWeave、Lambda、RunPod、Vast.ai 等），同卡型價格約為 hyperscaler 的 1/2–1/3（2026-06 快照）。主要見 ch16。\n- **NIXL (NVIDIA Inference Xfer Library)** — KV cache 傳輸抽象層：統一 UCX、GPUDirect Storage、S3 等 backend 的 API，是 Dynamo、vLLM、Ray Serve 做 P/D 分離的共同地基。主要見 ch10。\n- **Node Feature Discovery (NFD)** — 自動偵測節點硬體特性（GPU 型號、互連拓撲等）並打上 label 的 K8s 元件，拓撲感知排程的前提。主要見 ch11。\n- **Noisy Neighbor** — 多租戶下單一租戶（例如一個 200k-context 使用者）耗盡共享資源（KV cache、batch slot）拖累其他租戶的現象。主要見 ch16。\n- **NVFP4** — NVIDIA 的 4-bit 浮點格式，Blackwell（B200/B300）tensor core 原生支援；Hopper 及更早世代無原生 FP4。主要見 ch07。\n- **NVL72 (GB200/GB300 NVL72)** — 把 72 顆 GPU 與 36 顆 Grace CPU 用 NVSwitch 連成單一 NVLink domain 的機架級系統；rack 取代 server 成為設計與採購單位。主要見 ch02。\n- **NVLink** — NVIDIA GPU 之間的高速直連互連（第 5 代每 GPU 1.8 TB/s 雙向），頻寬比 PCIe 高一個量級——這是 TP 通常不出 NVLink domain 的原因。主要見 ch02、ch09。\n- **NVSwitch** — 把多顆 GPU 全互連成單一 NVLink domain 的交換晶片。主要見 ch02。\n\n## O\n\n- **Ollama** — 包裝 llama.cpp 的本地模型工具：一行指令下載並 serve 模型，本書 M1 實驗的入門起點。主要見 ch01、ch08。\n- **Open-Loop / Closed-Loop** — 負載測試的兩種模式：open-loop 按固定到達率送請求（不等回應）、closed-loop 等回應才送下一個；LLM benchmark 必須用 open-loop 才能避免 coordinated omission。主要見 ch14。\n- **OpenAI-Compatible API** — 與 OpenAI Chat Completions 介面相容的 API 形狀；推論引擎、閘道與聚合層的 de facto 標準。主要見 ch12。\n- **OpenRouter** — 聚合多家模型供應商的推論路由市場；其公開流量研究是 agentic/reasoning 流量趨勢最常被引用的數據源。主要見 ch17。\n- **Orca** — 提出 iteration-level scheduling（continuous batching 前身）的開創性系統論文（OSDI '22）。主要見 ch06。\n\n## P\n\n- **P/D Disaggregation（Prefill/Decode 分離）** — 把 compute-bound 的 prefill 與 memory-bound 的 decode 分到不同 GPU 池執行、以 KV cache 傳輸串接的架構；2025–2026 大規模推論的主旋律，小規模部署則是複雜度稅。主要見 ch10。\n- **PagedAttention** — vLLM 的核心創新：把 KV cache 切成固定大小 block、以 block table 做邏輯到實體映射——等同 OS 的 virtual memory paging，幾乎消除 KV 記憶體碎片。主要見 ch05。\n- **Perplexity（困惑度）** — 語言模型對文本的預測不確定性指標；量化品質評估的傳統手段，但對下游任務劣化不敏感，不可單獨依賴。主要見 ch07。\n- **Pipeline Parallelism (PP)** — 把模型按層切成多個 stage 串成流水線的平行化：跨節點友善、吞吐導向，但有 bubble（流水線空轉）問題。主要見 ch09。\n- **Poisson Arrival Process** — benchmark 模擬真實隨機到達的請求產生方式：請求間隔呈指數分布，比固定間隔更能暴露突發下的尾延遲。主要見 ch14。\n- **Preemption（搶占）** — KV cache 不足時排程器強制中止部分執行中請求讓位的機制（處理方式為 recompute 或 swap）；preemption 風暴是死亡螺旋的引信。主要見 ch06。\n- **Prefill** — 推論第一階段：平行處理整個 prompt 並建立 KV cache，計算量 O(n²)、compute-bound；其耗時是 TTFT 的主要成分。主要見 ch03。\n- **Prefix Caching** — 跨請求重用相同前綴（system prompt、多輪歷史）KV cache 的機制（vLLM 用 hash-based block、SGLang 用 radix tree）；agentic 流量下命中率可達九成，直接轉換成 TTFT 與成本。主要見 ch05。\n- **PreStop Hook** — K8s Pod 終止前執行的鉤子；LLM serving 用它觸發「停收新請求＋等待 in-flight streaming 完成」的 graceful drain 流程。主要見 ch15。\n- **Priority Scheduling** — 按請求優先級排序的引擎排程策略（vLLM 以 `--scheduling-policy priority` 啟用，FCFS 為 tie-breaker），讓互動流量優先於批次流量。主要見 ch06。\n\n## Q\n\n- **Quantization（量化）** — 用更低位元數表示權重或 activation 以節省記憶體與頻寬的技術（FP8、INT4、FP4 等）；收益是吞吐與卡數，代價是品質風險與工程驗證成本。主要見 ch07。\n\n## R\n\n- **RadixAttention** — SGLang 的 prefix caching 機制：以 radix tree 組織 KV cache，自動共享任意長度的共同前綴。主要見 ch05、ch08。\n- **Ray Serve** — Ray 生態的模型服務框架；`ray.serve.llm` 提供 LLM 一級 API 與 P/D 分離 pattern，強項是 Python 端的組合彈性。主要見 ch12。\n- **RDMA (Remote Direct Memory Access)** — 繞過遠端 CPU 直接讀寫其記憶體的網路技術（InfiniBand/RoCE 實作），KV 傳輸與 NCCL 跨節點通訊的基礎。主要見 ch09、ch10。\n- **Reasoning Model（推理模型）** — 輸出最終答案前先生成思考鏈的模型（thinking/non-thinking 雙模式已是 2026 開源旗艦標配）；把推論成本重心移向 decode 階段。主要見 ch17。\n- **Recompute** — preemption 的處理方式之一：直接丟棄被踢請求的 KV cache，重新排隊後從頭重算 prefill。主要見 ch06。\n- **ResourceClaim** — DRA 中使用者宣告「我需要什麼樣的裝置」的 K8s 物件，由 DRA driver 配對具體裝置來滿足。主要見 ch11。\n- **Retry Budget** — 限制重試流量占總流量比例的機制；LLM 請求昂貴且長，無節制重試會把局部過載直接推成全面雪崩。主要見 ch15。\n- **RoCE (RDMA over Converged Ethernet)** — 在乙太網上跑 RDMA 的協定，InfiniBand 的低成本替代。主要見 ch02。\n- **Roofline Model** — 以記憶體頻寬與峰值算力兩條「屋頂」判斷 workload 瓶頸的分析模型：arithmetic intensity 低於拐點即 memory-bound——本書最重要的分析工具。主要見 ch02。\n- **Rubin** — NVIDIA 的下一代 GPU 平台（Vera Rubin NVL72，288 GB HBM4、約 13 TB/s），2026 H2 起於主要雲端供應（2026-06 時點為預告）。主要見 ch02、ch17。\n\n## S\n\n- **Sampling（取樣）** — 從 logits 機率分布選出下一個 token 的過程（greedy/temperature/top-p/top-k）；參數選擇影響輸出重現性與可快取性。主要見 ch03。\n- **Scale-to-Zero** — 無流量時縮到零副本的能力；LLM 服務要為此承受分鐘級冷啟動，只適合延遲不敏感的服務等級。主要見 ch12、ch13。\n- **Sequence Parallelism (SP)** — 沿序列維度把超長 context 的 prefill 切分到多卡的平行化方式。主要見 ch09。\n- **SGLang** — 與 vLLM 並列的開源推論引擎雙雄之一：核心賣點是 RadixAttention 與結構化輸出，xAI 等在生產大規模採用（專案自述）。主要見 ch08。\n- **Shadow Traffic** — 把生產流量複製一份打到新版本、但不把回應回傳給使用者的驗證手段；攔截 5xx 看不到的品質迴歸。主要見 ch15。\n- **SIMT (Single Instruction, Multiple Threads)** — GPU 的執行模型：一條指令同時驅動一個 warp（32 條執行緒）執行。主要見 ch02。\n- **SLO Burn Rate** — 錯誤預算被消耗的速率；比單點閾值更穩健的告警與擴縮訊號。主要見 ch13、ch14。\n- **SLO-Aware Scheduling** — 把各請求的 TTFT/ITL 目標納入引擎排程決策的策略，例如讓延遲預算寬鬆的批次請求讓位給互動請求。主要見 ch06。\n- **SM (Streaming Multiprocessor)** — GPU 的基本計算單元（H100 有 132 個），各自帶 tensor core、暫存器與 warp scheduler；注意「SM 占用率高」不等於有效工作。主要見 ch02。\n- **Speculative Decoding（投機解碼）** — 用便宜機制（draft model、EAGLE、n-gram）先猜多個 token、由目標模型一次平行驗證的加速技術；低 batch 時有效，高 batch 時收益遞減甚至為負。主要見 ch07。\n- **Splitwise** — 與 DistServe 同期提出 P/D 分離的學術工作（Microsoft），P/D 架構的源頭之一。主要見 ch10。\n- **Starvation（飢餓）** — 低優先級或長請求在排程中持續搶不到資源的狀態；priority scheduling 必須搭配 aging 等手段防範。主要見 ch06。\n- **Swap** — preemption 的處理方式之一：把被踢請求的 KV cache 搬到 CPU RAM 暫存，恢復時再搬回 GPU。主要見 ch06。\n\n## T\n\n- **Temperature** — sampling 時對 logits 的縮放係數：越低輸出越確定，0 等同 greedy；直接影響重現性。主要見 ch03。\n- **Tensor Core** — GPU 內專做矩陣乘加的硬體單元；各世代支援的數值格式不同（Hopper 起 FP8、Blackwell 起 FP4），是 LLM 算力的真正來源。主要見 ch02。\n- **Tensor Parallelism (TP)** — 把每層權重矩陣切到多卡、各算部分結果再 all-reduce 合併的平行化：降低單卡記憶體與延遲，但每層兩次通訊使它通常不跨出 NVLink domain。主要見 ch09。\n- **TensorRT-LLM** — NVIDIA 的編譯式推論引擎：以 ahead-of-time 最佳化換取峰值效能，代價是彈性與迭代速度低於 vLLM/SGLang。主要見 ch08。\n- **Test-Time Compute** — 在推論時投入更多算力（長思考鏈、多分支探索）換取輸出品質的範式；使輸出 token 量爆炸，重塑容量規劃與計價模型。主要見 ch17。\n- **Thermal Throttling** — GPU 過熱時自動降頻保護硬體的機制；症狀是效能無聲衰退而非報錯，必須靠溫度與時脈指標觀測。主要見 ch02、ch15。\n- **Thinking Budget** — 限制 reasoning 模型思考 token 用量的控制機制，成本與品質之間的調節閥。主要見 ch17。\n- **Time-Slicing** — 多個容器分時輪流共用同一張 GPU 的共享方式：無記憶體隔離、無算力保證，僅適合開發環境。主要見 ch11。\n- **Token** — 模型處理文本的基本單位（BPE 切出的子詞）；LLM 世界計價、限流與容量規劃的計量單位。主要見 ch03。\n- **Token Bucket** — 限流演算法：以固定速率補充、按請求消耗的桶；在 LLM rate limiting 中「token」是字面意義——按模型 token 計量。主要見 ch16。\n- **Token Budget** — chunked prefill 排程中每個 decode step 允許處理的 token 總量上限，控制 prefill 對 ITL 的干擾程度。主要見 ch06。\n- **TPOT (Time Per Output Token)** — 平均每個輸出 token 的生成時間（總生成時間除以輸出 token 數，通常不含首 token）；與 ITL 同族但取平均視角。主要見 ch14。\n- **TPU (Tensor Processing Unit)** — Google 自研的 AI 加速器；2026 年主力為 Ironwood（TPU v7），驅動 Gemini 生產推論。主要見 ch02。\n- **Trainium** — AWS 自研的 AI 訓練/推論晶片；Trainium3（2025-12 發表）是 AWS 首款 3nm AI 晶片。主要見 ch02。\n- **Triton (OpenAI Triton)** — 用 Python 語法撰寫 GPU kernel 的語言與編譯器；注意與 NVIDIA Triton Inference Server 同名不同物。主要見 ch04。\n- **TTFT (Time To First Token)** — 從送出請求到收到第一個 token 的延遲，由排隊時間與 prefill 構成；互動體驗最核心的延遲指標。主要見 ch01、ch14。\n\n## U\n\n- **UCX (Unified Communication X)** — 高效能通訊框架，NIXL 的傳輸 backend 之一。主要見 ch10。\n\n## V\n\n- **Vidur** — Microsoft 的 LLM 推論系統模擬器（研究性工具，維護狀態不明）：預測 TTFT/TPOT、輔助容量規劃與配置搜索。主要見 ch13。\n- **vLLM** — 2026 年最主流的開源推論引擎：PagedAttention 與 continuous batching 的發源地；本書寫作時為 v0.22.x、V1 是唯一引擎，選型的 de facto 預設值。主要見 ch08。\n- **Volcano** — 批次工作負載導向的 K8s 排程器，提供 gang scheduling 與佇列管理；與 Kueue 同領域的另一選項。主要見 ch11。\n\n## W\n\n- **W8A8** — 權重與 activation 都量化到 8-bit 的方案（如 FP8 W8A8）：矩陣乘法直接在低精度 tensor core 上執行，比 weight-only 量化多省算力。主要見 ch07。\n- **Warm Pool** — 預先啟動、權重已載入的待命副本池：用空置成本換 scale-up 速度，對沖分鐘級冷啟動。主要見 ch13。\n- **Warp** — GPU 排程的基本單位：32 條執行緒以 SIMT 方式同步執行同一指令。主要見 ch02。\n- **Well-Lit Paths** — llm-d 的設計哲學：只提供少數幾條文件化、經 benchmark 驗證的生產部署路徑，而非開放無限組合。主要見 ch10、ch12。\n- **Wide-EP (Wide Expert Parallelism)** — 把 MoE experts 攤到數十至數百張卡的大規模 EP 部署（DeepSeek 式）；prefill 群與 decode 群可採不同 EP 度。主要見 ch09。\n\n## X\n\n- **Xid** — NVIDIA driver 的 GPU 錯誤代碼體系（如 Xid 48 = ECC double-bit、Xid 79 = fallen off the bus），GPU 硬體故障診斷的第一手訊號。主要見 ch02、ch15。\n- **xPyD** — P/D 分離部署中「x 個 prefill 實例對 y 個 decode 實例」的配比記號；配比由流量形態（輸入/輸出 token 比例）決定。主要見 ch10。\n"}, {"id": "c-cheatsheets", "file": "c-cheatsheets.md", "group": "附錄", "title": "附錄C — 工程速查表", "md": "# 附錄C — 工程速查表\n\n> 全部可直接抄用。每個區塊標注來源章節——公式的推導、機制的解釋、調錯的完整脈絡都在正文，這裡只放「動手時要抄的那一行」。所有時效性內容（版本號、預設值、規格）標注 2026-06，過期請以官方文件為準；數字基準與正文一致：模型用 Llama-3.3-70B、卡用 H100 SXM。\n\n## C.1 公式卡\n\n### KV cache 大小（ch03，全書公式）\n\n```\nKV cache bytes = 2 × n_layers × n_kv_heads × head_dim × bytes_per_param × n_tokens\n```\n\n`2` = K 和 V 各一份；`bytes_per_param`：BF16/FP16 = 2、FP8 = 1。前四項相乘 = 每 token 每序列的 KV bytes（模型的固定體質，從 config.json 直接算）。MLA 模型（DeepSeek 系）不適用此公式，以 `kv_lora_rank` 為準（見 ch03）。\n\n**代入 Llama-3.3-70B**（80 層、8 KV heads、head_dim 128、BF16）：\n\n```\n每 token：2 × 80 × 8 × 128 × 2 = 327,680 bytes ≈ 320 KiB ≈ 0.33 MB\n一條 32k 對話：32,768 × 327,680 ≈ 10.7 GB\n2×H100（FP8 權重）KV 池 ≈ 69 GB → 約 6 條 32k 並發對話；單卡 H100 → 0 條\n```\n\n### 模型權重記憶體（ch03/ch07）\n\n```\n權重 bytes = 參數量 × bytes_per_param（BF16/FP16 = 2、FP8 = 1、INT4 = 0.5）\n```\n\n**代入 70.6B**：BF16 ≈ 141.2 GB（單卡 80GB 裝不下）；FP8 ≈ 71 GB（單卡塞下但 KV 空間趨近零）；INT4 ≈ 35 GB。實務上 embedding 等少數層不量化，FP8 全模型約 72~75 GB。\n\n### Roofline 拐點（ch02）\n\n```\nArithmetic intensity (AI) = FLOPs ÷ 必須從 HBM 搬的 bytes（FLOP/byte）\n拐點 (ridge point) = P_peak ÷ BW\nAI < 拐點 → memory-bound（效能 = AI × BW）；AI > 拐點 → compute-bound\n```\n\n**代入**（dense 算力，2026-06）：H100 BF16 989 TFLOPS ÷ 3.35 TB/s ≈ **295**；H100 FP8 1,979 ÷ 3.35 ≈ **590**；H200 BF16 989 ÷ 4.8 ≈ **206**；B200 FP8 4,500 ÷ 8 ≈ **562**。\n速判：decode（batch=1）AI ≈ 1 → 極端 memory-bound；prefill AI ≈ n（prompt 長度），n 超過 ~300 翻成 compute-bound。batch 拉高 decode 的 AI，但漸近線 = `2P ÷ KV_per_seq`——70B、32k context 時只有 ~13，**長上下文 decode 是 batching 救不回來的 memory-bound**（ch03）。\n\n### Decode 理論上限（ch02/ch03）\n\n```\n單請求 decode 上限 (tok/s) ≈ HBM 頻寬 ÷ 每 token 必讀 bytes（權重 + 該序列 KV）\nbatch B 每步讀取 = 權重 + B × KV/條；ITL ≈ 每步讀取 ÷ 頻寬\n```\n\n**代入 H100**：FP8 權重 70.6 GB → 3.35 TB/s ÷ 70.6 GB ≈ **47 tok/s**；BF16 + 32k KV → 3,350 ÷ (141 + 10.7) ≈ **22 tok/s**。現實 MBU 60–80% → 實測單請求約 30–38 tok/s（FP8）。看到「單請求 70B FP8 在 H100 跑 100 tok/s」的宣稱，直接判假。\n\n### $/Mtok（ch16）\n\n```\n理論 $/Mtok = GPU 單價 ($/GPU-hr) ÷ (goodput tok/s/GPU × 0.0036)\n實付 $/Mtok = 理論 $/Mtok ÷ 機隊利用率\n```\n\ngoodput 是 SLO 內的 token rate（ch14），不是峰值吞吐；超出 SLO 的 token 是廢品，廢品不攤成本。\n\n**代入**（2026-06 快照）：H100 $2.50/hr、70B FP8 TP2、goodput 2,000 tok/s/GPU → 理論 = 2.50 ÷ 7.2 ≈ **$0.35**；機隊利用率 40% → 實付 ≈ **$0.87**（恰與 Together 的 Llama-3.3-70B 牌價 $0.88 打平——市場已有效率到「自建全成本 ≈ 託管牌價」）。成本槓桿排序：利用率（2–5×）> 快取命中（1.5–3×）> batch/量化（殘餘 1.5–3×）> 硬體代際。\n\n### 容量規劃：Little's law 鏈（ch13，五步骨架）\n\n```\n① λ_peak = 並發對話數 ÷ 請求週期        （週期 = 生成時間 + think time）\n   L (in-flight) = λ × W                 （Little's law；W = 一次生成耗時）\n② μ = 單 replica 在 SLO 內的持續吞吐    （goodput 膝點，必須用自己的 token 分布 benchmark）\n③ N_base = ⌈λ_peak ÷ μ⌉\n④ N = ⌈λ_peak × burst係數 ÷ μ⌉ + 1     （burst 無歷史數據時取 1.3 起跳；+1 = 容錯）\n⑤ 複核 KV 容量與預算 → 壓測驗證 → 上線後回填\nheadroom 下限：h ≥ 流量在 T_react（scale-up 延遲，GPU 世界 10 分鐘級）內可能成長的最大幅度\n```\n\n**代入 ch13 主例**（5,000 並發 chat、TTFT p95<1.5s、ITL p95<60ms、70B FP8 TP2）：λ_peak = 5,000÷60 ≈ 83 req/s；L = 83×12s ≈ 1,000 in-flight（≠5,000，差 5 倍）；μ = 8 req/s/replica → N_base = ⌈83/8⌉ = 11；burst 1.3 → 14；+1 → **15 replicas = 30×H100**；尖峰利用率 ρ ≈ 69%；月成本（diurnal autoscaling 後）≈ $33–38k（2026 年年中快照）。\n\n### Drain timeout（ch15）\n\n```\nP(t 秒內清空一個 pod) = F(t)^C          （C = in-flight 數；F = 請求時長 CDF）\n單 pod 期望被砍 streams = C × (1 − F(t))\ndrain 預算照 p99.9 以上設計，零傷亡需要 gateway 的 max stream duration 硬上限\nterminationGracePeriodSeconds ≥ drain 截止 + 清理緩衝\n```\n\n**代入 ch15 主例**（24 pods、每 pod 48 in-flight、p99=120s、p99.9=420s、硬上限 900s）：等到 p99 只有 0.99⁴⁸ ≈ 62% 的 pod 清空；整輪傷亡——30s（K8s 預設！）砍 ~92 條、120s 砍 ~11.5 條、420s 砍 ~1.2 條、900s 零傷亡。`terminationGracePeriodSeconds: 960`。從 p99 等到 p99.9 幾乎不增加 rollout 時間（被冷啟動＋bake 遮蔽），認真做 drain + canary 的 deploy 是 2~4 小時起跳。\n\n## C.2 vLLM 關鍵參數表（2026-06，vLLM 0.22.x；與 ch08 一致）\n\n預設值隨版本演進，**以你手上版本的 `vllm serve --help` 為準**。\n\n| 參數 | 它在解什麼問題 | 預設（2026-06） | 調錯的症狀 |\n|---|---|---|---|\n| `--max-model-len` | 單一請求的 context 上限，決定一個請求最多吃多少 KV | 自動取模型 config（往往大得離譜） | 太大：啟動報 KV 容量不足起不來，或 KV 牆提前；太小：長請求被 400 拒絕 |\n| `--gpu-memory-utilization` | 引擎可用 GPU 記憶體比例，KV pool 由它倒扣 | 0.92（早期版本 0.9） | 太高：尖峰偶發 OOM、in-flight 全陪葬；太低：KV pool 縮水、preemption 變多 |\n| `--max-num-seqs` | 同時 running 的請求數上限（batch B） | 1024（V1） | 太高：ITL 墊高、preemption storm；太低：GPU 餵不飽、佇列堆積 |\n| `--max-num-batched-tokens` | 每步 token budget，控制 prefill 對 decode 的干擾 | 常見 8192（隨版本/硬體） | 太大：長 prompt 進來 ITL 尖刺；太小：TTFT 變差 |\n| `--enable-prefix-caching` | 前綴 KV 重用 | V1 預設開（`--no-enable-prefix-caching` 關） | 誤關：agentic/多輪流量 TTFT 暴漲；對比實驗忘了關：高估裸 prefill |\n| `--tensor-parallel-size` | 單模型切到幾張卡（單節點內） | 1 | PCIe 互連硬開 TP：all-reduce 吃掉收益；單卡裝得下還開：純付通訊稅 |\n| `--kv-cache-dtype fp8` | KV cache 減半 | `auto`（跟隨模型 dtype） | 長推理鏈品質劣化，5xx 看不到——要 eval 才抓得到 |\n| `--quantization` | 權重量化格式 | 自動從 checkpoint 偵測 | 卡不支援該格式（如 Ampere 跑 FP8）：啟動失敗或 fallback 慢路徑 |\n| `--dtype` | 權重載入精度 | `auto` | 舊卡強用 BF16：報錯或退化 |\n| `--speculative-config` | speculative decoding（JSON） | 關 | 高 batch 流量開啟：吞吐不升反降（驗證稅） |\n| `--scheduling-policy` | `fcfs` 或 `priority` | `fcfs` | 開 priority 但上游沒配額：低優先權租戶餓死 |\n| `--enforce-eager` | 關 CUDA graphs（debug 用） | 關（graphs 開啟） | debug 完忘記拿掉：ITL 多吃 launch overhead |\n| `--block-size` | KV block 的 token 數（分頁粒度） | 16 上下 | 幾乎不需要動 |\n\n調參順序（ch08）：① `--max-model-len` 照流量 p99 context 設，不是模型上限（啟動 OOM 十之八九是它）→ ② `--gpu-memory-utilization` 給足留餘裕 → ③ `max-num-seqs` / `max-num-batched-tokens` 找工作點 → ④ 一次只動一個參數，每動必量。\n\n## C.3 PromQL 片段（指標名與 ch13/ch14 一致；vLLM V1，2026-06）\n\n```promql\n# TTFT p99（p50/p95 改第一個參數）\nhistogram_quantile(0.99,\n  sum(rate(vllm:time_to_first_token_seconds_bucket[5m])) by (le))\n\n# ITL p99（舊版指標名為 vllm:time_per_output_token_seconds，以部署版本的 /metrics 為準）\nhistogram_quantile(0.99,\n  sum(rate(vllm:inter_token_latency_seconds_bucket[5m])) by (le))\n\n# 佇列深度：擴縮觸發用 sum()（總排隊人數，配 per-replica threshold），不要用 avg()\nsum(vllm:num_requests_waiting{job=\"vllm-chat-70b\"})\n\n# KV cache 利用率（開 prefix caching 後長期偏高是正常的，要搭配 preemption 一起判讀）\navg(vllm:kv_cache_usage_perc{job=\"vllm-chat-70b\"})\n\n# Preemption 速率（健康系統 = 0；counter 一律包 rate()，永不裸用）\nrate(vllm:num_preemptions_total[5m])\n\n# Prefix cache 命中率（緩慢下滑 = 經典隱性退化：路由親和壞掉或流量結構變了）\nrate(vllm:prefix_cache_hits[5m]) / rate(vllm:prefix_cache_queries[5m])\n\n# Goodput@SLO 近似：TTFT ≤ 1.5s 的請求比例\n# 前提：bucket 設計時就把 SLO 閾值放進 le 邊界——先定 SLO、再設 bucket，順序不能反\nsum(rate(vllm:time_to_first_token_seconds_bucket{le=\"1.5\"}[5m]))\n  / sum(rate(vllm:time_to_first_token_seconds_count[5m]))\n\n# SLO burn rate（示意；目標 99% → error budget 1%；burn > 1 = 正在透支預算）\n(1 - (\n  sum(rate(vllm:time_to_first_token_seconds_bucket{le=\"1.5\"}[1h]))\n    / sum(rate(vllm:time_to_first_token_seconds_count[1h]))\n)) / 0.01\n```\n\n判讀紀律（ch14）：平均值不准出現在任何告警條件；fleet 聚合 `avg()` 會被冷熱不均掩蓋（KV-aware routing 下不均是故意的）；TTFT bucket 用對數刻度跨四個量級（50ms–60s），p99 恆定貼著 bucket 上界時先懷疑 bucket 溢出，不是「穩定地壞」。\n\n## C.4 DCGM 重點欄位與 nvidia-smi 讀法（ch14）\n\n`DCGM_FI_DEV_*` 是傳統裝置層欄位；`DCGM_FI_PROF_*` 是 profiling 計數器（精度高、支援 MIG），該用後者。\n\n| 欄位 | 語意 | 速判 |\n|---|---|---|\n| `DCGM_FI_DEV_GPU_UTIL` | 取樣窗內**至少一個 kernel 在跑**的時間比例（= nvidia-smi 的 GPU-Util） | 高負載下恆 90%+，資訊量趨近零，別用它做任何決策；不支援 MIG |\n| `DCGM_FI_PROF_GR_ENGINE_ACTIVE` | compute engine active 比例，GPU_UTIL 的高精度替代 | 滿載 > 0.85；低 + 佇列在長 = 引擎卡住非容量不足（ch15） |\n| `DCGM_FI_PROF_SM_ACTIVE` | 至少一個 warp 駐留的 SM 比例 | 滿載 > 0.8；warp 等記憶體也算 active——高 ≠ 在算東西 |\n| `DCGM_FI_PROF_PIPE_TENSOR_ACTIVE` | tensor core pipe active 比例 | **decode 重時 10–25% 是物理不是 bug**；別看到低就去「優化」 |\n| `DCGM_FI_PROF_DRAM_ACTIVE` | HBM 介面 active 比例 | decode 重時 0.5–0.8 = 頻寬有被用起來，是「健康的忙」 |\n| `DCGM_FI_DEV_FB_USED` | 已用顯示記憶體 | 恆高——vLLM 啟動就預占，**「GPU 記憶體用量高」永遠不是告警條件**，真訊號在 `vllm:kv_cache_usage_perc` |\n| `DCGM_FI_DEV_POWER_USAGE` | 板卡功耗 | 「有效工作量」的意外好代理：同 fleet 某卡功耗持續偏低 = 慢卡/掉頻，會拖慢整池 |\n| `DCGM_FI_DEV_GPU_TEMP` + throttle reasons | 溫度與降頻原因 | thermal throttle = 機房問題不是軟體問題 |\n| `DCGM_FI_DEV_XID_ERRORS` | 最近一次 Xid 錯誤碼 | 非零直接查 ch15 故障目錄；致命 Xid 觸發自動 cordon（ch11） |\n\n**nvidia-smi 讀法四要點**：\n\n1. GPU-Util 的真實定義是「有沒有 kernel 在跑」不是「算力用了多少」——一個只占 1 個 SM 的 spin kernel 也顯示 100%。等同於「64 核裡任一核非 idle 就回報 CPU 100%」的 htop，你不會接受這種 CPU 指標。\n2. Memory used 恆貼上限是 vLLM 的正常狀態（啟動即按 `gpu-memory-utilization` 預占），不是洩漏。\n3. benchmark 前用 `nvidia-smi -lgc` 鎖 GPU clock，消除 boost 浮動（CI 迴歸的固定紀律，ch14）。\n4. 讀規格表防雷：NVIDIA 行銷頁預設引「with sparsity」數字（dense 的兩倍），LLM 推論用不到，一律看 dense；頻寬數字先問單向還是雙向加總（NVLink 900 GB/s 是雙向加總）。\n\n交叉診斷速查：佇列增長 + GR_ENGINE_ACTIVE 高 + DRAM_ACTIVE 高 = 真飽和（去 ch13 擴容）；佇列增長 + GR_ENGINE_ACTIVE 低 = 引擎卡住（去 ch15）；吞吐降 + preemption 升 + KV 100% = KV 壓力（別被「GPU 100%」騙去加算力）；TTFT 右移 + prefix hit 掉 + GPU 全綠 = cache/路由退化（加卡完全無效，去 ch05/ch10）。\n\n## C.5 K8s YAML 骨架（與 ch11/ch13 一致；2026-06）\n\n### GPU resource request（device plugin 模型）\n\n```yaml\n# 整數、不可超賣、不可分割；requests 必須 = limits（ch11）\ncontainers:\n- name: vllm\n  image: vllm/vllm-openai\n  resources:\n    limits:\n      nvidia.com/gpu: 1\n```\n\n### Time-slicing（只准出現在 dev namespace——兩個 vLLM 共享一張卡 = 必然 OOM）\n\n```yaml\n# device plugin 的 sharing config（示意）：把一張卡謊報成 4 個\napiVersion: v1\nkind: ConfigMap\nmetadata:\n  name: time-slicing-config\ndata:\n  any: |-\n    version: v1\n    sharing:\n      timeSlicing:\n        resources:\n        - name: nvidia.com/gpu\n          replicas: 4\n```\n\n### MIG（H100 80GB profile：`1g.10gb`×7 / `2g.20gb`×3 / `3g.40gb`×2 / `7g.80gb`×1）\n\n```yaml\n# ① 節點宣告切法（MIG Manager 看 label 行動；改 profile 需先清空節點上的 GPU Pod）\nkubectl label node $NODE nvidia.com/mig.config=all-3g.40gb --overwrite\n# ② mixed 策略下 Pod 請求特定切片（single 策略則仍叫 nvidia.com/gpu）\nresources:\n  limits:\n    nvidia.com/mig-3g.40gb: 1\n```\n\n記住：MIG 連 HBM 頻寬也跟著 memory slice 等比切——`3g.40gb` 上的模型 decode 上限約整卡一半，划不划算要回 roofline 算（ch11）。\n\n### DRA ResourceClaim（resource.k8s.io/v1，K8s 1.34+ GA；CEL 屬性名依 driver 而異，示意）\n\n```yaml\napiVersion: resource.k8s.io/v1\nkind: ResourceClaimTemplate\nmetadata:\n  name: two-h100-same-domain\nspec:\n  spec:\n    devices:\n      requests:\n      - name: gpus\n        exactly:\n          deviceClassName: gpu.nvidia.com\n          allocationMode: ExactCount\n          count: 2\n          selectors:\n          - cel:\n              expression: >-\n                device.attributes['gpu.nvidia.com'].productName.matches('H100') &&\n                device.capacity['gpu.nvidia.com'].memory.compareTo(quantity('79Gi')) >= 0\n---\napiVersion: v1\nkind: Pod\nmetadata:\n  name: tp2-worker\nspec:\n  resourceClaims:\n  - name: gpus\n    resourceClaimTemplateName: two-h100-same-domain\n  containers:\n  - name: vllm\n    image: vllm/vllm-openai\n    resources:\n      claims:\n      - name: gpus        # 不再是 nvidia.com/gpu: 2\n```\n\n### LWS（多節點推論的複製單位；LWS v0.8.0，2026-01）\n\n```yaml\n# 每個副本 = 2 節點 × 8 卡（示意）\napiVersion: leaderworkerset.x-k8s.io/v1\nkind: LeaderWorkerSet\nmetadata:\n  name: llama-405b\nspec:\n  replicas: 2              # 2 個模型實例\n  leaderWorkerTemplate:\n    size: 2                # 每實例 1 leader + 1 worker\n    restartPolicy: RecreateGroupOnPodRestart   # 一人死全組重啟（NCCL 連坐）\n    leaderTemplate:\n      spec:\n        containers:\n        - name: vllm\n          resources: { limits: { nvidia.com/gpu: 8 } }\n    workerTemplate:\n      spec:\n        containers:\n        - name: vllm\n          resources: { limits: { nvidia.com/gpu: 8 } }\n```\n\n### KEDA ScaledObject（KEDA v2.20；佇列 + KV 雙觸發，取 max；ch13）\n\n```yaml\napiVersion: keda.sh/v1alpha1\nkind: ScaledObject\nmetadata:\n  name: vllm-chat-70b\n  namespace: inference\nspec:\n  scaleTargetRef:\n    name: vllm-chat-70b\n  minReplicaCount: 11             # 基線容量：headroom 數學的輸出，不是拍腦袋\n  maxReplicaCount: 18             # 預算上限 ∧ 叢集實際租得到的卡\n  pollingInterval: 15\n  cooldownPeriod: 600\n  fallback:                       # Murphy 條款：Prometheus 斷線時凍結在安全容量\n    failureThreshold: 3\n    replicas: 15\n  advanced:\n    horizontalPodAutoscalerConfig:\n      behavior:\n        scaleUp:\n          stabilizationWindowSeconds: 0     # 擴容不猶豫\n          policies: [{ type: Pods, value: 4, periodSeconds: 60 }]\n        scaleDown:\n          stabilizationWindowSeconds: 900   # 縮容等 15 分鐘——縮容是有狀態操作（drain + cache）\n          policies: [{ type: Pods, value: 1, periodSeconds: 300 }]\n  triggers:\n  - type: prometheus              # 主訊號：fleet 總排隊數，期望每 replica 排隊 ≤ 8\n    metadata:\n      serverAddress: http://prometheus-operated.monitoring.svc:9090\n      query: sum(vllm:num_requests_waiting{job=\"vllm-chat-70b\"})\n      threshold: \"8\"\n  - type: prometheus              # 第二訊號：KV 利用率，攔截長 context 流量的記憶體軸\n    metadata:\n      serverAddress: http://prometheus-operated.monitoring.svc:9090\n      query: avg(vllm:kv_cache_usage_perc{job=\"vllm-chat-70b\"})\n      threshold: \"0.85\"\n```\n\n預測式擴縮：疊一個 `type: cron` trigger 在工作日 08:30 拉日間水位——autoscaler 看到的永遠是過去，只有你知道未來（活動/推播前 pre-scale 沒有自動訊號能替代）。\n\n## C.6 Benchmark 檢查清單：發表數字前的 12 個自問（ch14 方法論）\n\n1. SLO 是在跑 benchmark **之前**定好的嗎？（事後挑閾值 = 替自己作弊）\n2. open-loop 還是 closed-loop？它回答的問題跟我要回答的一致嗎？（容量規劃幾乎都是 open-loop 的問題；closed-loop 的 `VU ÷ E2E = req/s` 是 Little's law 恆等式，不是系統能力）\n3. 有沒有 coordinated omission？（closed-loop 在伺服器最痛苦時自動收手，災難期欠採樣，percentile 被沖淡）\n4. 有 warmup 並整段丟棄嗎？每個量測點跑滿 3–5 分鐘穩態了嗎？（冷 cache 的引擎是另一台機器）\n5. token 分布來自生產流量嗎？固定長度（`--ignore-eos`）還是自然停止有註明嗎？（兩者可差 20%+）\n6. prefix 結構符合真實命中率嗎？（零共享前綴測 80% 命中的系統，TTFT 悲觀 2–5 倍；單一 prompt 重打則樂觀到離譜——冷/熱兩組都測）\n7. 到達過程是什麼？（均勻到達不存在；Poisson 是底線；`vllm bench serve` 的 `--request-rate` 預設 `inf` 是在測瞬間洪峰，不是穩態）\n8. 每個量測點 achieved ≈ offered 嗎？（達成 < 注入 = 已飽和，該點只能標「飽和」，不能當「系統能跑這麼快」的證據）\n9. client 端是不是瓶頸？（k6 自己的 CPU、VU 池大小；xk6-sse 阻塞 VU，數千 stream 換 inference-perf）\n10. 報的是分位數還是平均？（ITL 要看 p99/p999——stall 是稀疏事件，p95 常無感；平均值會把 thundering herd 與 preemption 全部抹平）\n11. 給的是整條 latency-throughput frontier 還是單點？膝點在哪？goodput@SLO 有跟 SLO 定義一起報嗎？（沒有 SLO 的 goodput 數字無法比較）\n12. 可重現嗎？（GPU SKU、driver、鎖 clock `nvidia-smi -lgc`、seed、資料集、引擎版本與全部參數記錄在案；至少 3 輪取中位數；判定線 = 中位數偏移 > max(2σ, 3%)）\n\n## C.7 硬體速查小表（2026-06，與 ch02 一致）\n\n| 卡 | HBM 容量 | HBM 頻寬 | FP8 算力（dense） | 拐點（FP8） | 一句話定位 |\n|---|---|---|---|---|---|\n| H100 SXM | 80 GB HBM3 | 3.35 TB/s | 1,979 TFLOPS | ~590 FLOP/byte | 2026 租用市場的工作馬，生態最成熟、單價已被新卡壓低 |\n| H200 | 141 GB HBM3e | 4.8 TB/s | 1,979 TFLOPS（算力同 H100） | ~412 FLOP/byte | 記憶體大幅升級——專為推論/長 context 而生 |\n| B200 | 192 GB HBM3e | 8 TB/s | 4,500 TFLOPS | ~562 FLOP/byte | 2026 主力雲端機型；FP4 原生支援 |\n\n參考級距（同表來源，ch02）：B300/GB300 288 GB HBM3e、8 TB/s、1,400W；AMD MI355X 288 GB、8 TB/s（規格對齊 Blackwell）；GB200 NVL72 = 72×B200 單一 NVLink 域（聚合 130 TB/s），rack 取代 server 成為設計單位。互連速查：NVLink 4（Hopper）900 GB/s、NVLink 5（Blackwell）1.8 TB/s——皆為雙向加總；標準 HGX H100 每卡 400G IB NIC = 50 GB/s 單向；PCIe Gen5 ~64 GB/s 單向（HBM 的 1/50，「少過橋、晚過橋」的根源）。\n\n讀規格表紀律（再說一次，因為一定會踩）：行銷頁的算力預設含 sparsity，一律除以二看 dense；頻寬先問單向還是雙向。\n"}, {"id": "landscape-2026", "file": "landscape-2026.md", "group": "內部文件（_meta）", "title": "事實基準快照：2026-06-10", "md": "# 事實基準快照：2026-06-10\n\n> 本文件為 AI Infrastructure 技術書全體章節作者的「業界現況事實基準」。所有事實均於 2026-06-10 以網路查證編寫，每條附來源 URL。\n> 標註 ⚠️ 的條目表示來源不足、來源間互相矛盾、或僅有二手來源，引用前請再次查證。\n> 凡寫「最新版本」者，皆指 2026-06-10 時點；正文寫作時建議寫成「本書寫作時（2026 年年中）」並避免把版本號寫死在不必要的地方。\n\n---\n\n## 1. vLLM\n\n- **最新版本 v0.22.1（2026-06-05）**；v0.22.0（2026-05-29，459 commits / 230 貢獻者）、v0.21.0（2026-05-15）。尚未推出 1.0。 — https://pypi.org/project/vllm/ 、https://github.com/vllm-project/vllm/releases\n- **V1 引擎已是唯一引擎**：v0.11.0 完成 V0 程式碼全面移除（`AsyncLLMEngine`、`MQLLMEngine`、舊 attention backends 等全部刪除），V1 是 codebase 中唯一引擎。 — https://github.com/vllm-project/vllm/releases/tag/v0.11.0 、https://docs.vllm.ai/en/stable/usage/v1_guide/\n- **Priority scheduling**：V1 scheduler 支援 FCFS 與 priority-based 兩種策略（priority 以 FCFS 為 tie-breaker），由 `--scheduling-policy` 設定。 — https://docs.vllm.ai/en/stable/usage/v1_guide/\n- **Wide-EP / DP attention**：官方 blog（2025-12-17）展示 DeepSeek 以 wide expert parallelism 達 2.2k tok/s/H200；DP attention 可與 TP attention 組合（每個 DP engine 擁有 TP-size 個 worker）。 — https://vllm.ai/blog/2025-12-17-large-scale-serving 、https://docs.vllm.ai/en/latest/serving/data_parallel_deployment/ 、https://docs.vllm.ai/en/latest/serving/expert_parallel_deployment/\n- **P/D 分離與 KV connector**：以 KV connector 抽象支援 prefill/decode 分離（NixlConnector 等）；v0.21 整合 KV offloading 與 hybrid memory allocator，v0.22 加入 multi-tier KV cache offloading framework（含 filesystem tier）。 — https://github.com/vllm-project/vllm/releases\n- **Speculative decoding**：支援 EAGLE / EAGLE-3 與 MTP（v0.11 release notes 包含 GPT-OSS、MiniCPM3 的 EAGLE-3 支援）。 — https://github.com/vllm-project/vllm/releases/tag/v0.11.0\n- ⚠️ v0.22 其他亮點（DeepSeek V4 支援強化、Model Runner V2 成為 Qwen3 dense 預設、實驗性 Rust frontend、batch-invariant inference + Cutlass FP8）取自 release notes 摘要，細節寫作前請對照原始 release page。 — https://github.com/vllm-project/vllm/releases\n\n## 2. SGLang\n\n- **最新版本 v0.5.12.post1（2026-05-26）**；v0.5.12（2026-05-16，DeepSeek-V4 完整推論路徑，支援 B300/B200/H200）；v0.5.11（2026-05-05，CUDA 13 + PyTorch 2.11 為預設、Speculative Decoding V2 預設開啟、PD 分離的 decode radix cache）；v0.5.10（2026-04-06，piecewise CUDA graph 預設、Elastic EP、Apple Silicon 原生 MLX backend）。 — https://github.com/sgl-project/sglang/releases\n- **RadixAttention** 仍是核心賣點（KV cache 前綴重用）；新增 HiCache（UnifiedRadixTree 階層式快取）。 — https://github.com/sgl-project/sglang\n- **採用狀況**（⚠️ 專案自述數字，宜註明出處為專案方）：宣稱在生產環境驅動超過 40 萬張 GPU、每日數兆 tokens，採用者含 xAI、NVIDIA、AMD、LinkedIn 等。 — https://github.com/sgl-project/sglang\n- **與 vLLM 的競爭態勢**：兩者功能高度趨同（PD 分離、wide-EP、spec decode、Blackwell 支援）；NVIDIA 同時為兩者出官方 release notes / container，Dynamo 與 llm-d 等上層框架皆同時支援兩者。第三方評測互有勝負（⚠️ 例如「SGLang 在 H100 上 throughput 高 29%」之類的單點數字來自行銷性質部落格，不要直接引用）。 — https://docs.nvidia.com/deeplearning/frameworks/sglang-release-notes/index.html 、https://docs.nvidia.com/deeplearning/frameworks/vllm-release-notes/index.html\n\n## 3. TensorRT-LLM 與 NVIDIA Dynamo\n\n- **TensorRT-LLM 最新版本 1.2.x（PyPI 上為 tensorrt_llm 1.2.1）**，2025 年下半進入 1.x 系列後持續活躍開發。⚠️ 1.2.1 確切發布日期未能確認。 — https://pypi.org/project/tensorrt-llm/ 、https://github.com/NVIDIA/TensorRT-LLM/releases\n- **Dynamo 最新穩定版 v1.2.0（2026-06-02）**，dev track v1.3.0-dev.1（2026-06-09）；另有 DeepSeek-V4、Nemotron-Ultra 等模型專用 dev branch。 — https://github.com/ai-dynamo/dynamo/releases\n- **架構要點**：\n  - **Planner**：負責部署最佳化、負載擴縮與 throughput modeling，整合 AIConfigurator 做效能預測。 — https://github.com/ai-dynamo/dynamo\n  - **KV router**：KV-aware routing，worker 廣播 KV events，router 以 cost function 平衡 cache locality 與負載；KV indexer 採 branch-sharded concurrent radix tree。 — https://github.com/ai-dynamo/dynamo/releases 、https://developer.nvidia.com/blog/introducing-nvidia-dynamo-a-low-latency-distributed-inference-framework-for-scaling-reasoning-ai-models/\n  - **KVBM（KV Block Manager）**：framework-agnostic 的 KV cache 分層管理。 — https://docs.nvidia.com/dynamo/components/kvbm\n  - **NIXL**：KV 傳輸抽象層，統一 UCX、GPUDirect Storage、S3 等 backend；TensorRT-LLM 近期版本相依 NIXL 0.8.0。 — https://docs.nvidia.com/dynamo/components/backends/tensor-rt-llm\n- **支援後端**：vLLM、SGLang、TensorRT-LLM 統一抽象，並有 Prometheus metrics / OpenTelemetry tracing。 — https://github.com/ai-dynamo/dynamo\n- 公有雲整合案例：AKS 上的多節點 Dynamo 部署（微軟官方部落格，2026-03-16）。 — https://blog.aks.azure.com/2026/03/16/dynamo-on-aks-part-3\n\n## 4. llm-d\n\n- **最新版本 v0.6.0（2026-04-03）**，搭配 inference scheduler v0.7.1（新增 no-hit-lru-scorer、active-request-scorer、speculative indexing 等 plugin）；硬體支援擴及 AMD ROCm、Intel Gaudi/HPU、CPU（AMX）。 — https://github.com/llm-d/llm-d/releases 、https://llm-d.ai/blog\n- **「Well-lit paths」**：提供四條文件化、經測試與 benchmark 的生產路徑。Path 1 = intelligent inference scheduling（prefix-cache-aware routing 跨 vLLM replicas），官方數字：8 pods / 16x H100 下 TTFT 比 round-robin 快 57 倍、throughput 2 倍；Path 2 = P/D 分離，16x16 B200 拓撲達 50k output tok/s。 — https://llm-d.ai/blog/llm-d-v0.2-our-first-well-lit-paths 、https://llm-d.ai/blog/llm-d-v0.3-expanded-hardware-faster-perf-and-igw-ga\n- **社群採用**：AWS 官方部落格推出「Disaggregated Inference on AWS powered by llm-d」；KServe 的 LLMInferenceService 直接建構在 llm-d 之上；Red Hat 力推 KServe + llm-d 整合。 — https://aws.amazon.com/blogs/machine-learning/introducing-disaggregated-inference-on-aws-powered-by-llm-d/ 、https://developers.redhat.com/articles/2026/04/21/kserve-llm-d-optimized-gen-ai-inference\n\n## 5. Kubernetes\n\n- **最新版本 v1.36「ハル (Haru)」（2026-04-22）**：70 項 enhancements（18 GA / 25 Beta / 25 Alpha）。User Namespaces GA、OCI VolumeSource GA、HPAScaleToZero 預設啟用、gitRepo volume 永久停用。 — https://kubernetes.io/blog/2026/04/22/kubernetes-v1-36-release/ 、https://www.infoq.com/news/2026/05/kubernetes-1-36-released/\n- **DRA（Dynamic Resource Allocation）**：核心已於 **v1.34（2025-08/09）GA**；v1.36 持續擴充（更多 driver 與新功能，官方 blog 2026-05-07）。生態採用：Red Hat OpenShift 4.21 DRA GA（2026-03-25）、GKE 提供 DRA 裝置管理。 — https://kubernetes.io/blog/2025/09/01/kubernetes-v1-34-dra-updates/ 、https://kubernetes.io/blog/2026/05/07/kubernetes-v1-36-dra-136-updates/ 、https://developers.redhat.com/articles/2026/03/25/dynamic-resource-allocation-goes-ga-red-hat-openshift-421-smarter-gpu\n- **Kubernetes AI Conformance program**：1.35 時代建立，DRA 支援是第一個 MUST 要求。 — https://kubernetes.io/blog/2026/05/07/kubernetes-v1-36-dra-136-updates/\n- **Kueue**：upstream 最新 minor 為 **v0.17.0（2026-03）**——MultiKueue 階層式 cohort、LeaderWorkerSet 工作負載支援、MultiKueueOrchestratedPreemption（alpha）、RayService 跨叢集 dispatch；下游 Red Hat build of Kueue 1.3（2026-04-16）引入 v1beta2 API（v1beta1 已棄用）。 — https://github.com/kubernetes-sigs/kueue/releases/tag/v0.17.0 、https://developers.redhat.com/articles/2026/04/16/red-hat-build-kueue-1-3-batch-workload-kubernetes\n- **LeaderWorkerSet（LWS）**：v0.8.0（2026-01），持續活躍；Kueue 已原生支援 LWS 的 gang admission。 — https://lws.sigs.k8s.io/docs/installation/ 、https://kueue.sigs.k8s.io/docs/tasks/run/leaderworkerset/\n- **Ingress NGINX 於 2026-03-24 正式退役**（SIG Network / Security Response Committee 決定），遷移方向是 Gateway API。 — https://kubernetes.io/blog/2026/04/22/kubernetes-v1-36-release/\n\n## 6. Gateway API Inference Extension（GIE / IGW）\n\n- **已 GA**（v1.0 於 2025 年下半達成 GA；⚠️ v1.0 確切 GA 日期本次未能直接確認，引用前請查 releases 頁），**最新版本 v1.5.0（2026-04-19）**；v1.4.0（2026-03-20）、v1.3.1（2026-02-20）。 — https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases 、https://gateway-api-inference-extension.sigs.k8s.io/\n- **機制**：`InferencePool` CRD 代表一組推論 Pod（selector + targetPort + extensionRef）；**EPP（Endpoint Picker）** 透過 ext-proc 協定監看 model server 指標並做智慧路由。v1.5 新增 pool-wide saturation gauge、flow control、可插拔的 EPP payload parser framework；v1.4 為 InferencePool 加入 appProtocol（gRPC）。 — https://gateway-api-inference-extension.sigs.k8s.io/api-types/inferencepool/ 、https://github.com/kubernetes-sigs/gateway-api-inference-extension/tree/main/docs/proposals/004-endpoint-picker-protocol\n- **誰在用**：GKE Inference Gateway、Envoy AI Gateway、NGINX Gateway Fabric、KServe（已 bump 至 GIE v1.2.0）、llm-d（以 IGW 為其路由層，v0.3 即宣布 IGW GA 整合）。 — https://docs.nginx.com/nginx-gateway-fabric/how-to/gateway-api-inference-extension/ 、https://aigateway.envoyproxy.io/docs/capabilities/inference/httproute-inferencepool/ 、https://github.com/kserve/kserve/pull/4886 、https://llm-d.ai/blog/llm-d-v0.3-expanded-hardware-faster-perf-and-igw-ga\n\n## 7. KServe 與 Ray Serve\n\n- **KServe 最新版本 v0.18.0**；**LLMInferenceService** 自 v0.16 引入，是針對 LLM 的新一代 CRD，建構在 llm-d 之上；API 已從 `serving.kserve.io/v1alpha1` 升至 **v1alpha2**（PR #4886，同時 bump GIE 至 v1.2.0）→ 仍是 alpha API，寫作時要 hedge。 — https://github.com/kserve/kserve/releases 、https://kserve.github.io/website/docs/model-serving/generative-inference/llmisvc/llmisvc-overview 、https://github.com/kserve/kserve/pull/4886\n- KServe + llm-d 官方聯合定位文（2026-03-05）：「Cloud-Native AI Inference at Scale」。 — https://kserve.github.io/website/blog/cloud-native-ai-inference-kserve-llm-d\n- **Ray Serve LLM**：Ray 最新穩定版 2.55.x；`ray.serve.llm` 提供一級的 LLM serving API，含 **prefill/decode 分離 serving pattern**（PDProxy/PDPrefillServer/PDDecodeServer），KV 傳輸用 vLLM 的 NIXLConnector / LMCacheConnector；Anyscale 發表 wide-EP + disaggregated serving with vLLM。 — https://docs.ray.io/en/latest/serve/llm/index.html 、https://docs.ray.io/en/latest/serve/llm/architecture/serving-patterns/prefill-decode.html 、https://www.anyscale.com/blog/ray-serve-llm-anyscale-apis-wide-ep-disaggregated-serving-vllm\n\n## 8. KV cache 生態與 context caching 定價\n\n- **LMCache**：最新 v0.4.6（2026-05-29）；vLLM V1 KV connector 原生整合；backends 含 CPU RAM、本地 SSD、Redis/Valkey、Mooncake、S3 相容物件儲存、NIXL、GDS；支援 AMD MI300X；與 NVIDIA Dynamo 整合、與 CoreWeave 有生產合作。 — https://github.com/LMCache/LMCache\n- **Mooncake**（Moonshot AI / Kimi 的 serving 平台，KVCache-centric P/D 分離架構，論文 arXiv:2407.00079）：\n  - 公開生產數據：真實負載下讓 Kimi 多承接 **75% 請求**；**Kimi K2 部署在 128x H200**（PD 分離 + 大規模 EP）達 **prefill 224k tok/s、decode 288k tok/s**。 — https://github.com/kvcache-ai/Mooncake/ 、https://arxiv.org/abs/2407.00079\n  - 2026 動態：vLLM 官方 feature Mooncake Store；SGLang 用 Mooncake TransferEngine 做 RDMA P2P 權重傳輸，1T 參數 Kimi-K2 權重更新 53s → 7.2s（7 倍）。 — https://github.com/kvcache-ai/Mooncake/\n- **NIXL**：NVIDIA Inference Xfer Library，統一 UCX / GPUDirect Storage / S3 等傳輸 backend 的 API，是 Dynamo、vLLM（NixlConnector）、Ray Serve P/D 的共同地基；近期版本 0.8.0。 — https://docs.nvidia.com/dynamo/components/backends/tensor-rt-llm\n- **各家 API context/prompt caching 定價**（cache read 相對標準 input 價）：\n  - **Anthropic**：read = 基準價 10%（90% 折扣）；write 有溢價：5 分鐘 TTL = 1.25x、1 小時 TTL = 2x（例：Sonnet 基準 $3/M → read $0.30/M、5-min write $3.75/M、1-hr write $6/M）。 — https://artificialanalysis.ai/models/caching\n  - **OpenAI**：自動快取、無 write 費、TTL 5–10 分鐘；折扣依模型不同——GPT-4o 為 50%。⚠️ 較新模型（GPT-5 系列）折扣更深（約 90%），但各來源說法不一（25%~90% 都有人寫），引用前務必查當下官方價目表。 — https://artificialanalysis.ai/models/caching\n  - **Google Gemini**：implicit caching 自動生效；explicit caching 另收**儲存費（按小時計）**。⚠️ read 折扣各來源在 75% 與 90% 之間不一致（artificialanalysis 列 Gemini 2.5 Flash $0.30 → $0.03 即 90%），寫作時查官方價目。 — https://artificialanalysis.ai/models/caching\n  - **DeepSeek**：磁碟式自動快取、業界最深折扣。V3.x 時代 cache hit 約為原價 1/10；⚠️ V4 世代有報導稱 V4-Flash cache hit = 原價 1/50、V4-Pro = 1/120（≈98–99% 折扣），但此數字僅見於第三方部落格，官方公告頁未直接確認。 — https://api-docs.deepseek.com/news/news260424 、https://devtk.ai/en/blog/deepseek-api-pricing-guide-2026/\n  - 給作者的安全寫法：「Anthropic/DeepSeek 約 90%+ 折扣、OpenAI 50–90% 依模型、Gemini 75–90% 另計儲存費」。\n\n## 9. 加速器硬體\n\n### NVIDIA\n- **B200（Blackwell）**：192 GB HBM3e、約 8 TB/s 頻寬；GB200 NVL72 = 72x B200 + 36x Grace，NVLink 5（每 GPU 1.8 TB/s 雙向）。已大規模出貨，是 2026 年主力雲端機型。 — https://www.nvidia.com/en-us/data-center/gb300-nvl72/ 、https://intuitionlabs.ai/articles/nvidia-data-center-gpu-specs\n- **GB300 NVL72（Blackwell Ultra / B300）**：B300 為 288 GB HBM3e（12-hi）、8 TB/s、1,400W、15 PFLOPS dense FP4；2025 下半開始供貨，2026 年放量。 — https://www.nvidia.com/en-us/data-center/gb300-nvl72/\n- **Rubin 世代**：Vera Rubin NVL72（72x Rubin GPU + 36x Vera CPU，NVLink 6）於 CES 2026 發表、GTC 2026 詳述；**Q1 2026 進入量產，H2 2026 由 AWS/GCP/Azure/OCI/CoreWeave 開始提供**。Rubin GPU：雙 reticle die、288 GB **HBM4**、約 13 TB/s（較 B300 提升 62.5%）。⚠️ 「336B 電晶體」「5x Blackwell」等數字來自二手媒體，引用前查 NVIDIA 官方規格。 — https://www.nvidia.com/en-us/data-center/vera-rubin-nvl72/ 、https://www.nextplatform.com/2025/03/19/nvidia-draws-gpu-system-roadmap-out-to-2028/\n\n### AMD\n- **MI355X**（CDNA 4、3nm）：288 GB HBM3E、8 TB/s、TBP 1,400W；2025 年已出貨。 — https://www.datacenterdynamics.com/en/news/amd-launches-instinct-mi350-gpus-unveils-double-wide-helios-ai-rack-scale-system/\n- **MI400 系列 + Helios 機架**：AMD 於 2026-02-23 重申 **on track 2H 2026**。MI400：432 GB HBM4、19.6 TB/s、40 PF FP4 / 20 PF FP8；Helios（雙寬機架、OCP 設計）：72x MI450 + Zen 6 EPYC「Venice」+ Vulcano NIC，約 1.4 EF FP8 / 2.9 EF FP4、31 TB HBM4。 — https://www.nextplatform.com/compute/2026/02/23/amd-says-helios-racks-and-mi400-series-gpus-on-track-for-2h-2026/4092199 、https://www.techpowerup.com/337987/amd-previews-432-gb-hbm4-instinct-mi400-gpus-and-helios-rack-scale-ai-solution\n\n### Google TPU\n- **Ironwood（TPU v7 / TPU7x）已 GA（2025-11）**：對 v6e（Trillium）单晶片性能 >4x，驅動 Gemini 3 生產推論；Anthropic 計畫使用最高 100 萬顆 Ironwood。 — https://docs.cloud.google.com/tpu/docs/tpu7x 、https://cloud.google.com/blog/products/compute/ironwood-tpus-and-new-axion-based-vms-for-your-ai-workloads\n- Google Cloud Next 2026（2026-04）發表第八代 TPU 分流設計：**TPU 8t（訓練）與 TPU 8i（推論，帶 384 MB 級大 SRAM）**，8t 對 Ironwood 訓練性價比宣稱 ~2.7–2.8x、8i 推論性價比 +80%（皆廠商數字）。（2026-06-10 二次網搜以 Google 官方部落格覆核，原「僅分析師來源」⚠️ 解除） — https://blog.google/ 、https://hyperframeresearch.com/2026/04/22/google-cloud-next-2026-google-cloud-bifurcates-the-ai-future-specialized-tpu-8t-and-8i-architectures-signal-the-end-of-general-purpose-silicon/\n\n### AWS / 其他\n- **Trainium3**：2025-12 發表，AWS 首款 3nm AI 晶片；每晶片 2.52 PF FP8、144 GB HBM3e、4.9 TB/s；UltraCluster 3.0 宣稱單一網域可達 100 萬顆。⚠️ 大規模集群數字為 AWS 行銷宣稱。 — https://awesomeagents.ai/hardware/aws-trainium3/\n- **NVIDIA × Groq（~$20B，2025-12）：實為非獨家技術授權＋人才移轉協議，並非傳統股權收購**——創辦人 Jonathan Ross 率核心團隊加入 NVIDIA，Groq 保持獨立法人營運（GroqCloud 持續服務，新任 CEO Simon Edwards）。目的是把 LPU 低延遲推論納入 NVIDIA stack。（2026-06-10 二次網搜覆核**修正**：原「收購大部分股權/資產」說法不準確） — https://groq.com 、https://fortune.com/2026/01/05/nvidia-groq-deal-ai-chip-startups-in-play/\n- **Cerebras**：2026-02 完成 $1B Series H（Tiger Global 領投、AMD 參投）；2026-04-17 重新遞交 S-1；**2026-05-14 已完成 Nasdaq 上市（CBRS）**——發行價 $185/股、募資約 $5.55B、上市時完全稀釋估值約 $56B（遠超 S-1 階段的 ~$23B 預估）（2026-06-10 二次網搜覆核更新）；2026-01 與 OpenAI 簽算力採購協議——750MW 起、可擴至 2GW、累計價值 $10B+（後續報導稱擴大至 $20B ⚠️ 擴大金額僅見二手中文媒體）。 — https://www.nextplatform.com/compute/2026/04/22/the-second-time-will-be-the-ipo-charm-for-cerebras/5218651 、https://www.sec.gov/Archives/edgar/data/0002021728/000162828026029503/exhibit1011-sx1a.htm\n\n## 10. 主流開放權重模型（2026-06 時點）\n\n- **DeepSeek-V4（官方 preview，2026-04-24）**：\n  - **V4-Pro：1.6T total / 49B active**；**V4-Flash：284B total / 13B active**；兩者皆 **1M context**、支援 thinking / non-thinking 雙模式、相容 OpenAI ChatCompletions 與 Anthropic API。\n  - 注意力架構：官方描述為「token-wise compression + **DSA（DeepSeek Sparse Attention）**」，是從純 MLA 路線的演進（DSA 首見於 2025-09 的 V3.2-Exp；NSA = Native Sparse Attention 為 2025-02 論文）。\n  - — https://api-docs.deepseek.com/news/news260424\n- **Qwen（阿里）**：\n  - **Qwen3.5（2026-02-16）**：8 個模型、dense + MoE，旗艦 **Qwen3.5-397B-A17B**；架構為 Gated Delta Networks（線性注意力）+ sparse MoE；**原生 262K context、可延伸至約 1M**。 — https://qwen.ai/blog?id=qwen3.5\n  - **Qwen3.6（最新）**：Qwen3.6-35B-A3B（2026-04-16，35B total / 3B active）、Qwen3.6-27B dense（2026-04-22）；262K context；主打 agentic coding 與 thinking preservation。⚠️ Qwen3.6 是否有更大旗艦版未能確認。 — https://github.com/QwenLM/Qwen3.6 、https://huggingface.co/Qwen/Qwen3.6-35B-A3B\n- **Llama（Meta）**：最新開放權重仍是 **Llama 4（2025-04）**：Scout（~109B total / 17B active / 16 experts，宣稱 10M context）與 Maverick（~400B total / 17B active / 128 experts，1M context）；Behemoth 始終未發布。**2026-04-08 Meta 發布閉源模型 Muse Spark，Llama 開源路線實質終止**（詳見第 17 節）。 — https://ai.meta.com/blog/llama-4-multimodal-intelligence/ 、https://thenewstack.io/meta-abandons-llama-spark/\n- **Kimi（Moonshot AI）**：K2（2025 年中，**1T total / 32B active**，MLA、384 routed experts + 1 shared、每 token 選 8 個 expert）→ K2 Thinking（2025-11）→ **K2.6（2026-04-20）**：仍為 1T/32B active、**原生 INT4**、Modified MIT 授權、新增 Agent Swarm 原語；SWE-bench Pro 58.6% 與 GPT-5.5 持平；API 價 $0.60/$2.50 per M tokens。⚠️ K2 首發月份各來源寫 2025-07 或 2025-08 不一。 — https://www.verdent.ai/guides/what-is-kimi-k2-6 、https://blog.kilo.ai/p/kimi-k26-has-arrived-an-open-weight\n- **gpt-oss（OpenAI）**：gpt-oss-120b（117B total / **5.1B active**，單張 80GB H100 可跑）與 gpt-oss-20b，Apache 2.0，**原生 MXFP4 量化**，2025-08-05 發布。⚠️ 截至 2026-06 未查到後續新版（gpt-oss-2 之類不存在於本次查證範圍）。 — https://openai.com/index/introducing-gpt-oss/ 、https://huggingface.co/openai/gpt-oss-120b\n- ⚠️ 其他出現在推論引擎支援清單但本次未逐一查證規格的模型：GLM-5.1（智譜）、Gemma 4（Google）、Nemotron Ultra（NVIDIA）等——寫作引用前需個別查證。 — https://github.com/sgl-project/sglang/releases\n- 市場面：OpenRouter 流量中**中國系模型佔比已超過 45%**（2024 末 <2%）。 — https://openrouter.ai/state-of-ai\n\n## 11. GPU 租用價格快照（2026-06，$/hr/GPU）\n\n> ⚠️ 整節皆為快照性質：GPU 現貨價格波動極快（月級），書中只應寫「級距」與「倍率關係」，不要寫死絕對數字。\n\n- **H100 80GB**：\n  - Neocloud / marketplace：Vast.ai 市場價 ~$1.87 起；RunPod community $1.99 / on-demand $2.49；Lambda ~$2.99（SXM）/ $3.29（PCIe）；全市場區間約 **$1.4–$7**。 — https://intuitionlabs.ai/articles/h100-rental-prices-cloud-comparison 、https://www.thundercompute.com/blog/nvidia-h100-pricing\n  - Hyperscaler on-demand：AWS p5 約 **$6.9/GPU**（8 卡 ~$55/hr）；Azure ND H100 v5 約 **$12/GPU**（8 卡 ~$98/hr）；GCP A3 介於其間。專業 GPU 雲比 hyperscaler 便宜 35–50%+。 — https://www.cloudzero.com/blog/cloud-gpu-pricing-comparison/ 、https://spendark.com/blog/machine-learning-cloud-cost/\n- **B200**：on-demand 主流區間 **$5.3–$6.0**（Lambda $5.29、Nebius $5.50、RunPod $5.89）；spot 低至 ~$2.1。 — https://www.spheron.network/blog/gpu-cloud-pricing-comparison-2026/\n- **L4 / A10（推論入門級）**：⚠️ 本次未能取得 2026-06 的逐家精確報價；一般級距約 **$0.2–$0.8/hr**（L40S 在去中心化平台 $0.19–0.55；A10/L4 在主流平台多落在 $0.5–1.0）。建議查 https://getdeploying.com/gpus 取得即時值。 — https://getdeploying.com/gpus\n- **A100 80GB** 參考點：~$1.1–2.0（已明顯被 H100 價格下殺擠壓）。 — https://www.synpixcloud.com/blog/cloud-gpu-pricing-comparison-2026\n\n## 12. Quantization 現況\n\n- **FP8**：已完全成熟，Hopper 以上世代的生產預設選項之一；vLLM/SGLang/TRT-LLM 全面支援（含 FP8 KV cache）；DeepSeek 等旗艦模型以 FP8 訓練。 — https://docs.vllm.ai/ 、https://github.com/sgl-project/sglang/releases\n- **NVFP4**：Blackwell 專屬硬體格式（B200/B300 的 tensor core 原生支援；Hopper/Ampere 無原生 FP4）。TensorRT-LLM 0.17+ 原生支援，是目前最成熟的 FP4 路徑；vLLM 在 Blackwell 上支援 dense 與 MoE 的 FP4。NVIDIA 宣稱記憶體相對 FP16 省 3.5x、相對 FP8 省 1.8x、精度劣化 <1%（⚠️ 廠商數字，依模型而異）。 — https://developer.nvidia.com/blog/introducing-nvfp4-for-efficient-and-accurate-low-precision-inference/ 、https://www.spheron.network/blog/fp4-quantization-blackwell-gpu-cost/\n- **MXFP4**：OCP microscaling 開放格式；最具代表性的採用是 **gpt-oss 權重原生以 MXFP4 發布**；NVIDIA ModelOpt 在同一校準管線中支援 FP8/FP4/MXFP4/INT4；PyTorch TorchAO 已有 Blackwell 上的 MXFP8/NVFP4 kernels（diffusion 案例）。 — https://huggingface.co/openai/gpt-oss-120b 、https://pytorch.org/blog/faster-diffusion-on-blackwell-mxfp8-and-nvfp4-with-diffusers-and-torchao/\n- 模型側趨勢：原生低精度訓練/發布漸成常態（gpt-oss MXFP4、Kimi K2.6 原生 INT4）。 — https://blog.kilo.ai/p/kimi-k26-has-arrived-an-open-weight\n\n## 13. Python 生態\n\n- **Python 3.14**（2025-10 發布，現行 3.14.5）：**free-threading（no-GIL）依 PEP 779 從 experimental 升為 officially supported**（phase II）；單執行緒 overhead 從 3.13 的 ~40% 降至 ~5–10%；另有實驗性 JIT 與 t-strings。GIL 預設仍開啟，free-threaded 是獨立 build；phase III（預設關 GIL）尚未到來。 — https://docs.python.org/3/howto/free-threading-python.html 、https://docs.python.org/3/whatsnew/3.14.html\n- **uv（Astral）**：每月下載量已達 ~75M–126M（不同統計口徑），超越 Poetry；對 free-threaded 3.14+ 直譯器免 opt-in 支援。**2026-03-19 OpenAI 宣布收購 Astral**（uv/Ruff/ty 的公司），團隊併入 Codex；OpenAI 承諾繼續維護開源產品（交易尚待監管批准）。 — https://openai.com/index/openai-to-acquire-astral/ 、https://simonwillison.net/2026/mar/19/openai-acquiring-astral/ 、https://astral.sh/blog/python-3.14\n\n## 14. Agentic workload 趨勢\n\n- **MCP（Model Context Protocol）**：2024-11-25 由 Anthropic 發布，現已交由 Linux Foundation 旗下 Agentic AI Foundation 作中立託管；已成為 agent-tool 連接的事實標準，主要 gateway 廠商普遍整合。 — https://www.digitalapplied.com/blog/mcp-adoption-statistics-2026-model-context-protocol\n- **Agentic 流量數據（最佳公開來源）**：a16z x OpenRouter「State of AI: 100 Trillion Token Study」（arXiv:2601.10088）——OpenRouter 每週處理 >20T tokens；**agentic inference 是成長最快的使用型態**（長序列多步驟取代單發 prompt）；reasoning 模型 token 佔比自 2025 初持續上升。 — https://a16z.com/state-of-ai/ 、https://arxiv.org/abs/2601.10088\n- **對基礎設施的影響**：agentic 流量呈 bursty、高併發、長 session、極高 prefix 重複率——這正是 prefix caching / KV cache 分層 / P/D 分離成為 2025–2026 架構主旋律的需求面原因（可引用 llm-d、Mooncake、DeepSeek cache 定價作互證）。 — https://llm-d.ai/blog/kvcache-wins-you-can-see\n- **Test-time compute**：reasoning 模型（thinking/non-thinking 雙模式已成開源旗艦標配：DeepSeek V4、Kimi K2 Thinking、Qwen3.x）把推論成本重心從單次回應轉向長思考鏈，加劇 decode 階段的容量壓力。 — https://api-docs.deepseek.com/news/news260424\n- OpenRouter 於 2026-05-26 募得 $113M，定位為企業推論路由層。 — https://siliconangle.com/2026/05/26/openrouter-raises-113m-bring-order-enterprise-ai-inference-routing/\n\n## 15. 監控與 benchmark 工具\n\n- **DCGM-exporter**：仍是 K8s GPU 遙測的事實標準（GPU 使用率/功耗/記憶體 → Prometheus）；benchmark 工具（如 AIPerf）直接從其 /metrics endpoint 收 GPU 指標。⚠️ 最新版號未查證。 — https://lucaberton.com/blog/nvidia-aiperf-llm-inference-benchmarking-guide/\n- **genai-perf**：NVIDIA 的 LLM 負載測試 CLI（TTFT、ITL、token throughput），程式碼位於 triton perf_analyzer repo；⚠️ NVIDIA 已推出後繼/更名工具 **AIPerf**（\"formerly GenAI-Perf\"），新舊並存期，寫作時建議以 AIPerf 為主、註明前身。 — https://github.com/triton-inference-server/perf_analyzer/blob/main/genai-perf/README.md 、https://lucaberton.com/blog/nvidia-aiperf-llm-inference-benchmarking-guide/\n- **inference-perf**：kubernetes-sigs 專案（源自 **WG Serving** 的標準化倡議，非 CNCF sandbox 專案）；**v0.5.0（2026-05-01）*
