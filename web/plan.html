<style>
:root{ --fs:18px; --lh:1.95; --ls:0.02em; --ps:1.0; --pw:52; }
/* Monospace CJK=2-columns fix: CJK runs inside <pre> are wrapped in .cjkw
   spans at render time (see wrapCJK) and scaled so a fullwidth PingFang glyph
   is exactly 2x Menlo's advance (2 x 0.60205em -> 120.41%). Done with spans
   instead of @font-face size-adjust because WebKit ignores size-adjust on
   local() sources. Assumes Apple platform fonts. */
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
/* themes */
body[data-theme="paper"]{--bg:#f7f2e9;--fg:#2f2b24;--muted:#8d8474;--border:#e2d9c6;--codebg:#efe8d7;--link:#a05a17;--accent:#b06a1e;--side:#f0e9d8;--sideactive:#e4d9bf}
body[data-theme="light"]{--bg:#ffffff;--fg:#24292f;--muted:#6e7781;--border:#e8eaed;--codebg:#f5f7f9;--link:#0a69c2;--accent:#0a69c2;--side:#f7f8fa;--sideactive:#e9edf2}
body[data-theme="sepia"]{--bg:#f4ecd8;--fg:#52432e;--muted:#9b8a6d;--border:#dfd2b3;--codebg:#ebdfc3;--link:#985a1f;--accent:#985a1f;--side:#eee2c8;--sideactive:#e2d3ae}
body[data-theme="dark"]{--bg:#22262c;--fg:#c4ccd4;--muted:#828d99;--border:#3a424b;--codebg:#2b323a;--link:#7ab8f5;--accent:#7ab8f5;--side:#1d2126;--sideactive:#2e353d}
body{background:var(--bg);color:var(--fg)}
a{color:var(--link)}
/* layout */
#layout{display:flex;height:100%}
#sidebar{width:288px;min-width:288px;background:var(--side);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0 40px;transition:transform .2s}
#main{flex:1;overflow-y:auto;position:relative;scroll-behavior:auto}
#sidebar .brand{font-weight:700;font-size:15px;padding:6px 18px 12px;line-height:1.5}
#sidebar .grp{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;padding:14px 18px 4px}
#sidebar a.ch{display:block;padding:6px 18px;font-size:13.5px;line-height:1.5;color:var(--fg);text-decoration:none;border-left:3px solid transparent}
#sidebar a.ch:hover{background:var(--sideactive)}
#sidebar a.ch.active{background:var(--sideactive);border-left-color:var(--accent);font-weight:600}
#sidebar .allbtn{margin:16px 18px 0;display:block;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--fg);text-decoration:none;background:var(--bg)}
#topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
#topbar .ttl{flex:1;font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:8px;padding:6px 11px;font-size:14px;line-height:1}
.btn:hover{background:var(--codebg)}
a.btn{text-decoration:none;display:inline-block;white-space:nowrap}
#hamburger{display:none}
/* prose */
.prose{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:2.4rem 1.7rem 3rem;font-size:var(--fs);line-height:var(--lh);letter-spacing:var(--ls)}
body[data-font="sans"] .prose{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
body[data-font="serif"] .prose{font-family:"Songti TC","Noto Serif TC",Georgia,"PMingLiU",serif}
.prose p{margin:calc(var(--ps)*1em) 0}
.prose h1{font-size:1.5em;line-height:1.45;margin:.2em 0 .9em}
.prose h2{font-size:1.3em;line-height:1.45;margin:2em 0 .8em;padding-bottom:.35em;border-bottom:1px solid var(--border)}
.prose h3{font-size:1.13em;margin:1.7em 0 .6em}
.prose h4{font-size:1.02em;margin:1.4em 0 .5em}
.prose li{margin:.45em 0}
.prose ul,.prose ol{padding-left:1.6em}
.prose blockquote{margin:1.3em 0;padding:.7em 1.2em;border-left:4px solid var(--accent);background:var(--codebg);border-radius:0 8px 8px 0}
.prose blockquote p{margin:.5em 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:2.4em 0}
.prose img{max-width:100%}
.prose pre{background:var(--codebg);border:1px solid var(--border);border-radius:8px;padding:.9em 1.1em;overflow-x:auto;font-size:.84em;line-height:1.6;letter-spacing:0;font-family:Menlo,ui-monospace,monospace}
.prose pre code{background:none;padding:0;border:none;font-size:1em}
.prose pre .cjkw{font-family:"PingFang TC","PingFangTC-Regular","PingFang SC","Noto Sans TC",sans-serif;font-size:120.41%;line-height:0;letter-spacing:0}
.prose code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"PingFang TC",monospace;background:var(--codebg);border:1px solid var(--border);border-radius:5px;padding:.08em .35em;font-size:.86em;letter-spacing:0}
.prose table{border-collapse:collapse;display:block;overflow-x:auto;margin:1.3em 0;font-size:.9em;line-height:1.65;letter-spacing:0}
.prose th,.prose td{border:1px solid var(--border);padding:.5em .75em;text-align:left;vertical-align:top}
.prose th{background:var(--codebg);white-space:nowrap}
#pager{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:0 1.7rem 5rem;display:flex;gap:12px;justify-content:space-between}
#pager .btn{flex:1;text-align:center;padding:13px;font-size:14px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* settings panel */
#panel{position:fixed;top:0;right:0;height:100%;width:300px;background:var(--side);border-left:1px solid var(--border);z-index:20;padding:18px 20px 40px;overflow-y:auto;transform:translateX(105%);transition:transform .2s;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
#panel.open{transform:none}
#panel h3{margin:4px 0 14px;font-size:16px}
#panel .row{margin:0 0 16px}
#panel label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
#panel input[type=range]{width:100%}
#panel .seg{display:flex;gap:6px;flex-wrap:wrap}
#panel .seg .btn{flex:1;min-width:56px;text-align:center;font-size:13px}
#panel .seg .btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9;display:none}
#backdrop.show{display:block}
@media (max-width:880px){
  #sidebar{position:fixed;left:0;top:0;height:100%;z-index:15;transform:translateX(-102%)}
  #sidebar.open{transform:none;box-shadow:6px 0 24px rgba(0,0,0,.15)}
  #hamburger{display:inline-block}
  .prose{padding:1.6rem 1.1rem 2.5rem}
}
</style>

<script id="bookdata" type="application/json">{"chapters": [{"id": "plan", "file": "plan.md", "group": "文件", "title": "AI Infrastructure 轉職學習計劃書", "md": "# AI Infrastructure 轉職學習計劃書\n\n> 從 Senior Backend（Node/TS）轉向 AI Infrastructure / Inference Engineer\n> 設備：MacBook Pro (M1) ｜ 策略：模擬優先、租 GPU 補硬體\n> 本計劃以「能力」為單位而非時間，依模組逐級攻克，每級以考核通過為前進條件。\n\n---\n\n## 一、目標與定位\n\n**目標角色**：AI Infrastructure / LLM Inference Engineer——負責讓大型模型在叢集上跑得穩、快、省，處理排程、路由、autoscaling、推論效能優化。\n\n**核心論點**：大規模服務 LLM 本質上是「分散式系統問題」，不是模型問題。六年的高併發、效能調校、event-driven 與可觀測性經驗，是這個角色最缺、也最難被 AI 自動化的底子。門檻高、供給稀缺，正好對齊「長期仍站得住」的目標。\n\n**定位句（履歷與面試用）**：\n\n> 「我不是想轉 AI 的後端工程師，而是用同一套效能工程方法（量測 → 診斷 → 優化 → 用數據證明），把過去在 RDS／高併發系統上的成果，複製到 GPU 推論服務上的人。」\n\n---\n\n## 二、核心策略（三條原則）\n\n1. **模擬優先，硬體後補。** 編排與效能建模兩層可在 M1 上免費、無限練（業界官方工具就支援）；需要 NVIDIA GPU／CUDA 的部分用按小時租的雲端 GPU 補上，成本壓到最低。\n2. **每個專案往「上一層」做。** 不停在「能動就好」。做服務要做到能量化它何時會壞、優化前後差多少。深度差一層，作品說服力差很多。\n3. **敘事連續性。** 所有作品都套用既有的成功模板（「降 RDS CPU 40%」式的量測—診斷—優化—數據佐證），讓轉職故事連貫。\n\n---\n\n## 三、能力地圖\n\n### 已具備（直接遷移，是護城河）\n\n- Kubernetes（EKS、CronJobs）、AWS（ECS、Lambda、SQS、SNS、RDS、S3）\n- Event-driven 架構、idempotent consumer、最終一致性\n- 可觀測性：CloudWatch、自建 FluentBit pipeline\n- 負載測試：k6、Vegeta（直接對應 infra 的 benchmark 工作）\n- **效能工程本能**：profiling、找瓶頸、為延遲／吞吐重構系統 ← 最關鍵的可遷移資產\n\n### 需要補（依優先序）\n\n1. **語言橋接**：Python（主力）、Go（K8s controller／scheduler）\n2. **推論內部機制**：forward pass、KV cache、PagedAttention、continuous batching、prefill/decode 分離、quantization（AWQ/GPTQ/FP8）、speculative decoding\n3. **GPU 排程**：MIG、vGPU、time-slicing、topology-aware scheduling、GPU bin-packing\n4. **服務層工具**：vLLM、NVIDIA Triton、KServe、Ray Serve、llm-d\n5. **IaC 與監控**：Helm、Terraform、Prometheus／Grafana（監控已有底子）\n\n### 業界職缺能力要求對照（先知道終點長怎樣）\n\n**硬性要求（must-have，幾乎每個職缺都列）**\n\n- 理解 LLM forward pass、KV caching、prefill/decode 分離、continuous batching\n- vLLM 推論優化與部署\n- Python（模型介面）＋ Go（K8s controller／scheduler 邏輯）\n- 大規模／多租戶 Kubernetes\n- Helm、Terraform 等 IaC\n- 為延遲／吞吐 SLO 跑 benchmark，在意 TPOT、GPU 使用率\n\n**加分項（nice-to-have，拉開薪資與層級差距）**\n\n- MIG／vGPU 配置、GPU 虛擬化\n- quantization（AWQ、GPTQ）、speculative decoding\n- 多叢集網路（Cilium、Calico）\n- 對開源 AI infra 專案（vLLM、KServe、Kubernetes）有貢獻\n- Prometheus／Grafana、GitOps、可觀測性 stack\n\n---\n\n## 四、學習路線（分級能力模組）\n\n> 每個模組包含三部分：**學習內容**（細節）、**需具備的能力**（過關標準）、**考核方式**（怎麼驗證自己真的會了）。考核分三種：口頭（能講清楚＝真懂）、實作（能做出來＝會用）、產出（留下作品＝可展示）。\n\n---\n\n### 模組一：基礎與語言橋接\n\n**學習內容**\n\n- Python 到「能寫服務」：型別註記、async/await、venv／套件管理、用 FastAPI 寫一個 async 服務、用 pydantic 做資料驗證。（以 TS 底子，重點是熟悉生態而非從零學程式）\n- LLM 推論基礎：tokenization；prefill（吃 prompt、compute-bound）vs decode（逐 token、memory-bound）兩階段；autoregressive 為何一個字一個字吐；KV cache 在解什麼問題；batching 為何提升吞吐。\n- 本機環境：Ollama／MLX／llama.cpp 安裝與跑模型；量化格式（GGUF、不同 bit 數）的差別。\n\n**需具備的能力**\n\n- 能用 Python 寫出一個 async API 服務。\n- 能準確說出 LLM 推論的兩階段與各自瓶頸。\n\n**考核方式**\n\n- 口頭：能向非專業者解釋「為什麼 LLM 一個字一個字吐、瓶頸常在記憶體頻寬而非算力」。\n- 實作：在 M1 上跑同一模型的兩種量化版本，量出延遲與記憶體差異並解釋原因。\n- 產出：一頁概念筆記（KV cache／batching／quantization，用自己的話）。\n\n---\n\n### 模組二：編排／排程模擬層 ★ 重點\n\n全程 M1、零 GPU 費用，練的正是分散式系統強項的延伸。\n\n**學習內容**\n\n- 本機 K8s：k3d／kind 建叢集、kubectl、Deployment／Service／PVC、HPA。\n- KWOK：無 kubelet 模擬大量節點、stage 設定。\n- run-ai/fake-gpu-operator：安裝、label 節點、生出「多張 H100」假節點、注入假 `nvidia-smi`、模擬 MIG。\n- llm-d-inference-sim：當 OpenAI 相容後端，設定 TTFT、inter-token latency、jitter，模擬 prefill/decode 分離下的 KV-cache 傳輸延遲。\n- GPU 排程概念：為何 GPU 預設不可超賣、不可請求「部分 GPU」；MIG 切分；time-slicing；device plugin 與 extended resources；topology-aware scheduling；GPU bin-packing。\n- Helm 部署；Prometheus（exporter、PromQL）＋ Grafana dashboard。\n\n**需具備的能力**\n\n- 能無硬體搭出模擬 GPU 叢集，並在上面部署假推論服務。\n- 能設定／調整一個排程或路由策略，並用監控觀測其效果。\n- 能解釋 K8s 如何把 GPU 當資源排程，以及 MIG 與 time-slicing 的差別與適用場景。\n\n**考核方式**\n\n- 口頭：解釋「為什麼 K8s 預設不能把一張 GPU 分給兩個 Pod，業界用哪些方式繞過，各有什麼代價」。\n- 實作：一鍵 `setup.sh` 拉起整套模擬叢集；改一個排程／autoscaling 參數，用 Grafana 展示佇列深度與延遲的前後變化。\n- 產出：**旗艦專案①** repo（含 README）＋ 一篇技術文章（開始累積公開足跡）。\n\n---\n\n### 模組三：效能建模與優化思維\n\n**學習內容**\n\n- Vidur（microsoft/vidur）：安裝、跑模擬、用 Vidur-Search 自動找最省錢配置、看懂它對 operator 的建模方式。\n- 核心指標：TTFT、TBT／ITL、throughput、goodput、P50/P95/P99 延遲、SLO。\n- 平行策略：tensor parallel、pipeline parallel、data parallel 的差別與取捨。\n- Batching：static vs continuous batching；max batch size 對延遲與吞吐的取捨。\n- Quantization（AWQ／GPTQ／FP8）的原理與「品質 vs 速度／記憶體」取捨；speculative decoding 原理。\n\n**需具備的能力**\n\n- 能在不跑真推論的前提下，推估某個部署配置的延遲與吞吐。\n- 能在給定延遲 SLO 下做容量規劃與硬體選型。\n\n**考核方式**\n\n- 口頭：解釋「continuous batching 為何提升吞吐、代價是什麼」「tensor parallel 與 pipeline parallel 各在什麼情況用」。\n- 實作：用 Vidur 對一個模型跑出「配置 vs 吞吐 vs 成本」分析。\n- 產出：**旗艦專案②** 配置權衡決策報告——能回答「要在 P95 延遲 < X 下服務 Y QPS，該選什麼卡、開多大 batch、用什麼平行策略」。\n\n---\n\n### 模組四：真 GPU 與真 vLLM ★ 作品集核心\n\n到此才開始花 GPU 錢，金額可控（一張 L4／A10 每小時約 1–2 美金，用完即關）。\n\n**學習內容**\n\n- 租 GPU 流程（RunPod／Lambda／Vast.ai）與成本控制。\n- vLLM 部署與關鍵參數：`max-num-seqs`、`gpu-memory-utilization`、`max-model-len`、`tensor-parallel-size`、quantization 選項。\n- Benchmark：用 k6／locust／vLLM 內建 bench 打負載，量 TTFT／TPOT／throughput／GPU util。\n- Profiling：nvidia-smi、nvitop，判斷瓶頸在 compute、memory bandwidth 還是 KV cache。\n- 優化：調 batching、套 quantization、調整 KV cache 配置。\n\n**需具備的能力**\n\n- 能在真 GPU 上部署 vLLM 並做出可重現的 benchmark。\n- 能做出量化的優化前後對比，並解釋每一步的取捨與量測方法。\n\n**考核方式**\n\n- 口頭：對你做的每一步優化，能回答「為什麼有效、代價是什麼、怎麼量出來的」。\n- 實作：完整跑一遍「量測 → 診斷 → 優化 → 驗證」閉環。\n- 產出：**旗艦專案③** 優化前後對比圖與報告（敘事模板與履歷的「降 RDS CPU 40%」一致）。\n\n---\n\n### 模組五：分散式與生產級深度\n\n**學習內容**\n\n- Ray Serve／KServe／llm-d：多節點推論、多模型共用叢集、KV-cache 感知路由、prefill/decode 分離部署、scale-to-zero。\n- Go：讀懂 K8s controller／operator／device plugin 的結構，能改小東西。\n- 生產級議題：canary rollout、graceful shutdown（不掉 in-flight 請求）、用佇列深度／KV cache 使用率（而非 CPU）做 autoscale、自訂 Prometheus 指標。\n- 開源：閱讀 vLLM／KServe／Kubernetes 的 issue，提小 PR 或文件貢獻。\n\n**需具備的能力**\n\n- 能設計並部署一個含路由、監控、graceful shutdown 的多模型／多節點推論平台。\n- 能讀懂並小幅修改 Go 寫的 K8s 控制邏輯。\n- 有一個被社群接受（merged 或獲正向討論）的開源貢獻。\n\n**考核方式**\n\n- 口頭：在白板上設計「一套可擴展的 LLM 推論服務」並說明每個取捨。\n- 實作：部署一個接近生產形態的平台，能展示 canary 與 graceful shutdown 不掉請求。\n- 產出：**旗艦專案④** ＋ 至少一個開源貢獻連結。\n\n---\n\n### 模組六：作品集、公開足跡與求職\n\n**學習內容／要做的事**\n\n- 把四個旗艦專案整理成作品集（GitHub ＋ 兩篇深度技術文章）。\n- 履歷與 LinkedIn 重新定位為 AI Infra 方向，量化每個專案成果。\n- 系統設計面試準備，聚焦「設計一套 LLM 推論服務」這類題目。\n- 軟實力：把技術決策講給非技術的人聽（資深／staff 級別的天花板關鍵）。\n\n**需具備的能力**\n\n- 能清楚展示作品與成果敘事。\n- 能通過系統設計面試與行為面試。\n\n**考核方式**\n\n- 模擬面試：在 45 分鐘內白板設計一套可擴展的 LLM 推論服務並說明取捨。\n- 履歷檢核：每個專案都有可量化的成果數字。\n- 作品集檢核：每個 repo 都能一鍵跑起來、有清楚 README、附對應文章。\n\n---\n\n## 五、作品集總覽（面試要展示的）\n\n| #   | 專案                                                 | 證明的能力                      | 用到真 GPU？ |\n| --- | ---------------------------------------------------- | ------------------------------- | ------------ |\n| ①   | 模擬推論叢集（KWOK + fake-gpu-operator + llm-d-sim） | K8s GPU 排程、路由、autoscaling | 否           |\n| ②   | 配置權衡研究（Vidur）                                | 容量規劃、成本／效能取捨        | 否           |\n| ③   | vLLM 推論效能優化                                    | 真實 benchmark、profiling、優化 | 是（租）     |\n| ④   | 多模型／多節點服務平台                               | 分散式推論、生產級架構          | 部分         |\n\n---\n\n## 六、學習資源（起手清單）\n\n**模擬工具**\n\n- KWOK — `github.com/kubernetes-sigs/kwok`\n- Fake GPU Operator — `github.com/run-ai/fake-gpu-operator`\n- llm-d-inference-sim — `github.com/llm-d/llm-d-inference-sim`\n- Vidur — `github.com/microsoft/vidur`\n\n**推論服務**：vLLM（核心，務必熟）、NVIDIA Triton、KServe、Ray Serve、llm-d\n\n**本機模型（M1）**：Ollama、MLX、llama.cpp\n\n**租 GPU**：RunPod、Lambda、Vast.ai（按小時、用完即關）\n\n**追蹤生態**：vLLM／KServe／llm-d 官方 blog 與 release notes（領域變很快，定期看）\n\n---\n\n## 七、整體能力檢核（求職就緒門檻）\n\n> 當以下全部能做到，代表已達「可投遞 AI Infra 職缺」的門檻。這是最終總考核。\n\n- [ ] 能無硬體模擬出 GPU 叢集，並解釋 K8s 如何排程 GPU。\n- [ ] 能在真 GPU 上部署 vLLM，並做出有數據的優化前後對比。\n- [ ] 能在給定延遲 SLO 下做硬體選型與容量規劃。\n- [ ] 能在白板上設計一套可擴展的 LLM 推論服務，並講清楚每個取捨。\n- [ ] 能用分散式系統的語言（排程、一致性、瓶頸、可觀測性）解釋 LLM 服務的每個設計決策。\n- [ ] 具備硬性要求清單上的全部能力（見第三節「對照」）。\n- [ ] 有四個作品 ＋ 公開技術文章 ＋ 至少一個開源貢獻。\n\n---\n\n## 八、風險與調整原則\n\n- **領域變動快**：工具會換（vLLM 參數、新框架），但「分散式系統 ＋ 效能工程」的底層思維不會。學工具時永遠多問一句「它在解什麼系統問題」，知識才能跨越版本。\n- **別過早鑽 CUDA kernel**：那是離既有背景最遠、最不該一開始投入的地方。模擬碰不到它沒關係，等真有需要再補。\n- **保持上移**：長期而言價值會從「寫 code」移向「決定建什麼、怎麼權衡、帶方向」。每個專案都順手練「把決策講清楚」，比多學一個框架更決定上限。\n- **以考核通過為前進條件**：不要因為「學完內容」就跳下一級，而要因為「通過考核」才前進——口頭講不清楚就代表還沒真懂。\n\n---\n\n## 九、概念螺旋地圖（同一概念跨模組的回訪）\n\n> 這份計劃表面是六個模組的直線，實際上核心概念會在多個模組以**更高 altitude** 回來。\n> 下表把「回訪」變可見、可排程——別把任何概念當「模組 X 學完就結束」。\n> 讀法：● ＝首次引入（introduce）；◆ ＝深化（deepen）。括號項是教學實作補的、非原計劃明列。\n\n| 概念 ＼ 模組 | 一 | 二 | 三 | 四 | 五 | 觸點 |\n| --- | --- | --- | --- | --- | --- | --- |\n| prefill/decode 分離 | ● 兩階段概念 | ◆ 模擬 KV 傳輸延遲 | ◆ TTFT/TBT 指標 | ◆ profiling 判瓶頸 | ◆ 分離部署 | 5 |\n| KV cache | ● 在解什麼問題 | ◆ KV 傳輸延遲 | ◆ 容量規劃 | ◆ 調 KV 配置 | ◆ KV-cache 感知路由 | 5 |\n| 量測→診斷→優化（主敘事） | ● roofline 利用率 | ◆ Grafana 佇列/延遲前後 | ◆ Vidur 配置 vs 成本 | ◆ 真 benchmark 優化前後 | | 4 |\n| continuous batching | ● 為何提升吞吐 | | ◆ static vs continuous 取捨 | ◆ 調 batching | | 3 |\n| quantization | ● GGUF/bit 數實測 | | ◆ AWQ/GPTQ/FP8 原理取捨 | ◆ 套用優化 | | 3 |\n| GPU 排程／資源 | （● lab 容量限制 503） | ● MIG/time-slicing/bin-packing | ◆ 容量規劃 | | ◆ KV/佇列做 autoscale | 3–4 |\n| 可觀測性（Prometheus/Grafana） | | ● 導入 | | ◆ GPU util | ◆ 自訂指標 | 3 |\n| autoscaling | （● 容量訊號 available_slots） | ● HPA 參數 | | | ◆ 用 KV/佇列深度 | 2–3 |\n| 把取捨講清楚（軟實力） | ● 口頭考核 | ◆ | ◆ | ◆ | ◆ 白板設計 | 6（貫穿全程） |\n\n**怎麼用這張表**\n\n- **深化（◆）不是重學**：每次回訪要比上次更深一層，且能說出「這次深在哪」。若某次回訪只是把上次的話再講一遍，代表那一格沒真的上移。\n- **這就是 L0/L1 之外的真實學習量**：六個模組（L1）底下，藏著約 22 次概念回訪（L2 螺旋）＋每道考核失敗就重來（L0）。把計劃當「六關打完」會嚴重低估，且讓每個概念淺嘗即止。\n- **維護迴圈（L3，不在表內）**：`vLLM` 參數（模組四）、`llm-d`/`KServe` API（模組五）、`Vidur`（模組三）會隨版本漂移；第六節「定期看 release notes」與第八節「領域變動快」就是這條永不關閉的迴圈。學工具時回到「它在解什麼系統問題」，知識才跨得過版本。\n\n> 方法論細節（L0–L3 四層迴圈的定義與生成規則）見 repo root 的 `LEARNING-LOOP.md` 的 LOOP SCOPES 段。\n\n---\n\n_本計劃為能力框架，建議定期回顧並依實際進度與市場變化調整。_\n"}, {"id": "Chewei_Chen_Resume", "file": "Chewei_Chen_Resume.md", "group": "文件", "title": "CHEN, CHE-WEI (Chewei Chen)", "md": "# CHEN, CHE-WEI (Chewei Chen)\n\n**Senior Backend Engineer**\n\nNew Taipei City, Taiwan\nEmail: a19575091@gmail.com | GitHub: github.com/C-ZW | LinkedIn: linkedin.com/in/che-wei-chen-39a068164\n\n---\n\n## Professional Summary\n\nSenior Backend Engineer with **6+ years** specializing in **greenfield system design** and **high-concurrency performance engineering**. At NeoBards (Dynasty Warriors Mobile, **500K+ users, 10K+ CCU**), delivered a **40% reduction in peak RDS CPU** through profiling-driven optimization and architected event-driven systems for in-game competitions. Currently at Bahwan CyberTek, introduced NestJS and team conventions while designing a multi-tier cache library adopted across projects. Looking for opportunities with **broader ownership of architecture and team direction**.\n\n---\n\n## Technical Skills\n\n- **Languages & Frameworks:** TypeScript, Node.js (NestJS, Express)\n- **API & Auth:** RESTful design, OpenAPI/Swagger, versioning, JWT, OAuth 2.0 (token lifecycle), RBAC\n- **Databases & Caching:** MySQL, PostgreSQL (read replicas, partitioning, isolation levels, deadlock detection, index tuning), Redis (Pub/Sub), Prisma ORM\n- **Real-Time Communication:** WebSocket, Socket.io, WebRTC (Jitsi, TURN/STUN)\n- **Cloud & Infrastructure:** AWS (EKS, ECS, Lambda, SQS, SNS, RDS, S3, CloudFormation, ALB, API Gateway), KrakenD, Docker, Kubernetes (CronJobs), Bull\n- **Performance & Observability:** Clinic.js, FluentBit (Lua), AWS CloudWatch (Metrics, Log Insights, Metric Filters), k6, Vegeta\n- **Testing & Quality:** Jest (TDD), CI/CD, Snyk\n\n---\n\n## Work Experience\n\n### Software Engineer | Bahwan CyberTek\n*September 2024 – Present*\n\n*Flat engineering structure; operating at Senior-level scope — introduced NestJS framework and established team development conventions.*\n\n*A global digital transformation leader specializing in IP-based solutions for 1,000+ enterprise clients across oil & gas, telecom, and banking sectors.*\n\n- **Led 3 greenfield projects** building B2B/B2C data integration middleware on AWS ECS (TypeScript, NestJS) for a global bicycle manufacturer, centralizing data flows between PostgreSQL and MySQL across multi-region distributors.\n- Designed a **lightweight decorator framework** that brought the most valuable NestJS ergonomics (class-validator DTO binding, declarative parameter injection, centralized exception mapping) to raw AWS Lambda — **deliberately avoiding full NestJS to keep the learning curve low** for a team where few had Nest experience. Reused the DTOs to auto-generate OpenAPI specs via a **CI pipeline that fails builds on undocumented API changes**, keeping validation and docs in sync. **Now used across 30–50 handlers and the default for all new functions.**\n- Designed and documented a **multi-tier cache library** with pluggable data sources (in-memory → S3 → local) and **graceful degradation** across layers, plus a schema validation utility built on top of it. Authored integration guides for team-wide adoption.\n- Established a shared internal library **now used by all ~10 team projects**, standardizing common patterns and reducing boilerplate.\n\n### Senior Backend Engineer | NeoBards Entertainment\n*April 2022 – September 2024*\n\n*Contracted via Keyteo through March 2024; rejoined as direct hire June – September 2024.*\n\n*A premier AAA game development studio recognized for collaborating with Capcom, Square Enix, and Koei Tecmo on high-profile global titles.*\n\n- Scaled and maintained backend services for Dynasty Warriors Mobile, ensuring high availability for **500K+ users and 10K+ CCU**.\n- Authored load testing scenarios on client-managed infrastructure; used **Clinic.js** to diagnose memory leaks and CPU bottlenecks, translating findings into concrete optimization actions.\n- **Reduced RDS CPU by 40% during peak traffic** via profiling-driven database optimization: restructured SQL ordering and decomposed transactions to minimize lock contention, reordered cross-transaction execution to reduce hotspots, and batched row-by-row updates.\n- Architected an **event-driven settlement pipeline** (Kubernetes CronJobs → SQS → idempotent consumers) processing **100K–300K reward distributions across ~5,000 guilds per season**, with eventual consistency across guild, player, inventory, and mail services.\n- Built a custom **observability pipeline** (FluentBit + Lua scripts) to extract, transform, and aggregate API response metrics from production logs, shipping structured data to S3 for response-time visibility used by the game's publisher, **Nexon**.\n\n### Backend Engineer | LetsTalk Technology\n*June 2019 – March 2022*\n\n*A software firm dedicated to building Letstalk, a highly secure and privacy-focused instant messaging ecosystem for global markets.*\n\n- **Independently proposed and built** a real-time notification system (WebSocket + Redis Pub/Sub) for message fan-out and multi-device synchronization, serving **500K+ registered users with ~3,200 concurrent connections and ~10M messages/month**. Addressed an infrastructure gap for users in markets where **Google services (FCM) were unavailable, notably China**.\n- Integrated voice and video calling capabilities into the IM platform — evaluated commercial WebRTC SDKs (Twilio, Agora) and **selected Jitsi on cost grounds** for group calls. Built Socket.io-based signaling and configured TURN/STUN servers for NAT traversal.\n- Rebuilt the scheduled messaging feature from a setTimeout-based implementation (**so unstable it was capped at 15-minute delays** as a workaround) to a **cron-driven job queue**, enabling arbitrary-duration scheduling and ensuring messages survive service restarts.\n\n---\n\n## Education\n\n**National Chengchi University (NCCU)**\nGraduate Institute of Computer Science — Selected Coursework (Advanced Algorithms, Machine Learning)\n\n**Tamkang University, 2017**\nBachelor of Science in Computer Science and Information Engineering\n"}]}</script>

<script>
(function(){
"use strict";
var NS="plan";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">轉職文件<br><span style="font-weight:400;font-size:12px;color:var(--muted)">計劃書與履歷</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 轉職文件';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
