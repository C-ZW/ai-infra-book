1, r2} ✓\n- UNCHANGED ⟨rmState, tmState, msgs⟩ ✓\n\n在 s₄ 停一拍。tmPrepared = {r1, r2} = RM——TM 的小本子集滿了，**TMCommit 的兩個 guard 同時亮起**。歷史在這裡分岔：在某個平行世界，下一步是 TMCommit，皆大歡喜。在我們要看的世界：\n\n**步 5：⟨s₄, s₅⟩ 是 TMCrash（擴充動作）**。\n- tmState = \"init\"？✓\n- tmState′ = \"crashed\"？✓\n- UNCHANGED ⟨rmState, tmPrepared, msgs⟩？✓\n\n現在站在 s₅，把**所有**動作的 guard 逐一過堂：\n\n| 動作 | guard | 在 s₅ 為什麼不成立 |\n|---|---|---|\n| TMRcvPrepared(r) | tmState = \"init\" | tmState = \"crashed\" |\n| TMCommit | tmState = \"init\" ∧ tmPrepared = RM | tmPrepared = RM 明明成立，但 tmState ≠ \"init\"——死在離終點一步 |\n| TMAbort | tmState = \"init\" | tmState = \"crashed\" |\n| TMCrash | tmState = \"init\" | 死人不能再死一次 |\n| RMPrepare(r) | rmState[r] = \"working\" | r1、r2 都是 \"prepared\" |\n| RMChooseToAbort(r) | rmState[r] = \"working\" | 同上——prepared 者無權回頭 |\n| RMRcvCommitMsg(r) | [type ↦ \"Commit\"] ∈ msgs | Commit 從未送出 |\n| RMRcvAbortMsg(r) | [type ↦ \"Abort\"] ∈ msgs | Abort 從未送出 |\n\n八類動作，零個 enabled。s₅ 之後唯一合法的延續是無限 stuttering：**r1 與 r2 的 rmState 永遠停在 \"prepared\"**。鎖抱著、資源佔著、誰也不會來救。這就是 blocking（卡死）：協議在無人違規的情況下，永遠無法前進。\n\n再驗最後一件事：**TCConsistent 全程成立嗎？**檢查 s₀ 到 s₅：六個狀態裡沒有任何 rmState 值是 \"committed\" 或 \"aborted\"，所以對任何一對 rm1、rm2，「rmState[rm1] = \"aborted\" ∧ rmState[rm2] = \"committed\"」兩個合取項都為假，否定為真——TCConsistent 在每個狀態都成立，而且成立得很「空」（ch03 的 vacuous truth：連壞事的原料都沒生出來）。\n\n把這兩個結論並排，就是本章的核心句：\n\n> **blocking 不是不一致。2PC 在 TM 死亡時犧牲的是進展（liveness），分毫未動的是一致性（safety）。**你的監控不會跳出 invariant violation——不會有帳對不上、不會有一邊 commit 一邊 abort——只會有 P99 緩緩爬升、鎖等待逐漸堆積、`XA RECOVER` 列表慢慢變長。最安靜的故障模式，往往最難排查。\n\n### 為什麼 r2 不能自己決定\n\n盯著 s₅ 你一定想問：r2 等了這麼久，自己 abort 掉、把鎖放了，不行嗎？RMChooseToAbort 那行 `rmState[rm] = \"working\"` 的 guard，放寬成 prepared 也能 abort，不就解套了？\n\n不行，而且「不行」可以論證。考慮另一個世界 B：前四步 s₀ 到 s₄ 一模一樣，但第五步不是 TMCrash 而是 TMCommit（tmState ↦ \"committed\"、msgs 多了 C），第六步 RMRcvCommitMsg(r1)（r1 ↦ \"committed\"）。現在比較兩個世界裡 **r2 的局部視圖**：\n\n- 我們的世界 s₅：rmState[r2] = \"prepared\"，r2 收到過的訊息：無。\n- 世界 B 的第六個狀態：rmState[r2] = \"prepared\"，r2 收到過的訊息：無（C 在 msgs 裡，但 r2 還沒收）。\n\n一模一樣。**任何只憑 r2 本地資訊的決策規則，在兩個世界必然做出同一件事。**如果這條規則讓 r2 在我們的世界 abort（解掉 blocking），它就也會讓 r2 在世界 B abort——而世界 B 裡 r1 已經 committed，於是 ⟨committed, aborted⟩，TCConsistent 陣亡。要 safety，r2 就只能等；要不等，就賠上 safety。兩個無法區分的世界、一條必須二選一的規則——這個論證形態你會在 ch12 再遇到一次，它的完全體叫 FLP 不可能定理（那裡只給一句話版，本書不證）。\n\n這就是「blocking 是本質不是 bug」的準確含義：**prepared 狀態的資訊結構決定了 RM 不可能安全地自救**。工程上所有真實止血手段都是在這個鐵框內騰挪：XA 的 heuristic decision（人工拍板）是在 spec 之外引入第二個決策者，等於主動放棄 TCConsistent 的保證、事後對帳——所以各家 DB 才會有專門的錯誤狀態描述「兩邊拍得不一樣」的下場；TM 寫災後日誌、重啟續傳，是縮短視窗，不是消滅視窗。真正消滅它，得換協議——往下看。\n\n## 為什麼修不好：3PC，以及 Paxos Commit 的伏筆\n\n教科書的標準續集是 **three-phase commit（3PC）**，出自 Skeen 1981 年的論文（見延伸閱讀）。思路順著上面的論證走：blocking 的根源是「有人可能已經 commit，而我不知道」，那就在 prepared 與 committed 之間再插一個階段——TM 先廣播「全員已 prepared，準備 commit」（pre-commit），收齊回應後才讓人真正 commit。這樣一來，「已有人 commit」蘊涵「全員都到過 pre-commit」，prepared 但沒見過 pre-commit 的 RM 就能放心 abort；搭配逾時與互詢，在 crash-stop 加同步網路的假設下確實能做到非阻塞。\n\n那為什麼 2026 年的你在生產環境裡幾乎看不到 3PC？因為它買回 liveness 用的貨幣是 **safety 的假設**。3PC 的非阻塞性押在「故障偵測準確」與「網路不分割」上：一旦發生 network partition，兩個分區各自湊出「對方都死了」的結論，一邊依規則推進 commit、另一邊依規則推進 abort——TCConsistent 直接破裂。2PC 把 partition 熬成卡死，3PC 把 partition 變成不一致；對資料系統，後者通常是更貴的災難。一句話總結：**3PC 沒有消滅那道二選一的牆，只是換了撞牆的姿勢**（主流資料庫與訊息系統至今未採用 3PC 作為承諾協議，2026-06）。\n\n真正的出路要再等二十多年。Gray 與 Lamport 在〈Consensus on Transaction Commit〉（ACM TODS, 2006）給出的答案是：別修補 TM，**把「TM 的那個決定」本身交給容錯共識**——用 2F+1 個協調者跑 Paxos，F 個倒下仍能推進，這就是 Paxos Commit；而且論文指出，2PC 恰好是它退化到 F = 0 的特例（Lamport 自己的話：「Two-Phase Commit is the trivial version of Paxos Commit that tolerates zero faults」）。共識憑什麼能容錯、quorum 怎麼擋住分歧，是 ch12 的主題——你會發現同一個目錄裡躺著 PaxosCommit.tla，等著被精讀。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| 把 blocking 當 bug 想修 | 「加個逾時就好了」——變體看起來能動，demo 也順利，因為測試裡 TM 沒有恰好死在收齊 prepared 之後 | 先問：prepared 的 RM 比 crash 前多了什麼**資訊**？沒有新資訊就沒有新決定。任何本地逾時規則都過不了「兩個無法區分的世界」這一關（紙上推演題 3） |\n| 逐狀態的卡死檢查全綠＝不會卡 | 原版 2 RM 的 56 個可達狀態個個都有 enabled 動作，deadlock check 一片綠；但「TM 永遠 stuttering」的 blocking 行為照樣合法 | blocking 是 liveness 層的指控，要用時序性質（◇「人人有決定」）加 fairness 去問（ch07），deadlock check 根本看不見它 |\n| 把「msgs 只增不減」讀成「假設網路可靠」 | 於是你以為這份 spec 比現實樂觀，對它的結論打折 | 恰恰相反：safety-only 之下「收不到」與「不去收」等價，遺失被 stuttering 吃掉。要驗的是你自己：這份 spec 哪裡承諾過「終將」？（原文明說 only safety） |\n| 把 tmPrepared 當成 RM 的即時狀態 | 「TM 知道 r1 prepared」聽起來像讀到了 rmState[r1] | tmPrepared 是訊息的影子——分散式裡「知道」永遠是過去式。寫 spec 時對每個 guard 問：這個節點**物理上**讀得到這個條件嗎？讀不到的，就得有訊息把它送過來 |\n| 沒讀簡化聲明就拿 spec 對教科書 | 「教科書說 TM 會先送 Prepare 請求、RM abort 會通知 TM，這 spec 都沒有，是不是錯了」 | 精讀任何 spec 先讀註解裡的「我忽略了什麼」。對 spec 的批評，先檢查是不是人家開頭就聲明過的抽象（本檔開頭那 17 行就是清單） |\n| 有限配置 TLC 全綠＝定理證完了 | 「2 RM 過了、6 RM 的 50,816 個狀態也過了，還能有錯？」 | 窮舉只覆蓋跑過的參數；THEOREM 主張的是任意 RM 集合。從「TLC 檢查過」到「證明了」之間隔著 ch14 的歸納不變量與 ch16 的機器證明——Lamport 在檔尾用詞是 checked，不是 proved |\n\n## 紙上推演\n\n### 題 1：TCConsistent 的關鍵歸納步（[20 分鐘] ★★）\n\n在 TCommit 上證明歸納步的 Decide 部分：**設步前狀態滿足 TCTypeOK ∧ TCConsistent，且這一步 ⟨s, t⟩ 滿足 Decide(r)（對某個 r ∈ RM），證明 t 滿足 TCConsistent**。用 ⟨1⟩ 層級格式（ch05），對 Decide 的兩個析取分案。寫完後回答：哪一個 case 用到了步前的 TCConsistent？哪一個其實沒用到？\n\n### 推演解答\n\n⟨1⟩1. Decide(r) 是兩個析取，分案討論。\n⟨1⟩2. **案一（commit 分支）**：guard 含 rmState[r] = \"prepared\" 與 canCommit，效果是 rmState′ = [rmState EXCEPT ![r] = \"committed\"]。\n  ⟨2⟩1. canCommit ＝ ∀ rm ∈ RM : rmState[rm] ∈ {\"prepared\", \"committed\"}，所以步前**沒有任何 RM 處於 \"aborted\"**（由 TCTypeOK，四個值只能取一）。\n  ⟨2⟩2. t 與 s 只差 r 那格變成 \"committed\"；這一步沒有任何 RM 變成 \"aborted\"。\n  ⟨2⟩3. 所以 t 裡也沒有任何 RM 是 \"aborted\"。TCConsistent 的內層是 ¬(rmState[rm1] = \"aborted\" ∧ rmState[rm2] = \"committed\")；對任何 rm1，第一個合取項在 t 為假，整個否定為真。案一成立。\n⟨1⟩3. **案二（abort 分支）**：guard 含 rmState[r] ∈ {\"working\", \"prepared\"} 與 notCommitted，效果是 r 變 \"aborted\"。\n  ⟨2⟩1. notCommitted ＝ ∀ rm ∈ RM : rmState[rm] ≠ \"committed\"，所以步前沒有任何 RM 是 \"committed\"。\n  ⟨2⟩2. t 與 s 只差 r 變 \"aborted\"；沒有任何 RM 變成 \"committed\"，所以 t 裡也沒有 \"committed\"。\n  ⟨2⟩3. 內層否定式的第二個合取項在 t 對任何 rm2 為假，TCConsistent′ 成立。案二成立。\n⟨1⟩4. Q.E.D. 兩案蓋滿 Decide(r) 的兩個析取。∎\n\n回答附問：**兩個 case 都沒用到步前的 TCConsistent**——guard 自己就夠強：canCommit 直接排除 aborted 的存在，notCommitted 直接排除 committed 的存在。真正用到歸納假設的是 Prepare(r) 那個 case（這裡補完整個歸納步）：Prepare 只把 \"working\" 改成 \"prepared\"，既不新增 \"aborted\" 也不新增 \"committed\"，所以**步前沒有違規配對、步後也不會有**——「步前沒有」正是歸納假設。這個「guard 把不變量寫在臉上」的奢侈，是規格層的特權：TCommit 的 guard 讀得到全域。下一題你會看到，失去上帝視角的 TwoPhase 沒有這種好日子。\n\n### 題 2：TwoPhase 上的壞前驅（[15 分鐘] ★★）\n\n考慮 TwoPhase 的狀態 s_bad ≜ ⟨rmState = (r1 ↦ \"committed\", r2 ↦ \"working\"), tmState = \"init\", tmPrepared = {}, msgs = {}⟩。\n\n(a) 驗證 s_bad 滿足 TPTypeOK 與 TCConsistent。\n(b) 找出一個在 s_bad enabled 的動作，使一步之後 TCConsistent 被打破。\n(c) 由兩條 THEOREM 串起來，TCConsistent 是 TwoPhase 的 invariant——這跟 (b) 矛盾嗎？\n(d) 寫出一條「可達狀態的事實」，把 s_bad 排除在可達集之外。\n\n### 推演解答\n\n(a) 型別逐項：rmState 是 RM → 四值集合的函數 ✓；tmState = \"init\" ∈ {\"init\", \"committed\", \"aborted\"} ✓；tmPrepared = {} ⊆ RM ✓；msgs = {} ⊆ Message ✓。TCConsistent：有 \"committed\"（r1）但沒有任何 \"aborted\"，否定式對每一對成立 ✓。\n\n(b) RMChooseToAbort(r2)：guard rmState[r2] = \"working\" ✓ enabled。走一步：rmState′ = (r1 ↦ \"committed\", r2 ↦ \"aborted\")。取 rm1 = r2、rm2 = r1，內層合取兩項全真——TCConsistent′ 陣亡。\n\n(c) 不矛盾，而且這正是 ch05 點過名的現象：**TCConsistent 是 invariant（所有可達狀態都成立），但在 TwoPhase 上不是 inductive 的**。invariant 主張的範圍是可達狀態；歸納步檢查的卻是「所有滿足述語的狀態」——s_bad 滿足 TCConsistent 卻不可達，它就是歸納證明會卡住的「壞前驅」。想用歸納法證 TCConsistent，就得把述語強化到足以排除 s_bad 這類狀態。\n\n(d) 缺的事實是一條鏈：rmState[r] = \"committed\" ⇒ [type ↦ \"Commit\"] ∈ msgs（RM 只能因收到 Commit 而 commit）⇒ tmState = \"committed\"（Commit 只由 TMCommit 送出）⇒ tmPrepared = RM（TMCommit 的 guard）⇒ 每個 RM 都送過 Prepared ⇒ 沒有 RM 還在 \"working\"。s_bad 在第一節就斷裂：r1 committed 但 msgs = {}。把這條鏈逐節寫成合取、補進不變量、再對七個動作逐一重跑歸納步——那是 ch14 的完整 worked example，全書證明的高峰之一。\n\n### 題 3：「看似修好 blocking」的變體（[25 分鐘] ★★★）\n\n同事提案：「prepared 的 RM 等太久就自行放棄」，加入動作\n\n```tla\nRMTimeoutAbort(rm) == /\\ rmState[rm] = \"prepared\"\n                      /\\ rmState' = [rmState EXCEPT ![rm] = \"aborted\"]\n                      /\\ UNCHANGED <<tmState, tmPrepared, msgs>>\n```\n\n並把它加進 TPNext。(a) 找出一條打破 TCConsistent 的完整 trace（提示：7 步，不需要 TMCrash）。(b) 用「兩個世界」的語言說明為什麼**任何**只憑 RM 本地資訊的解卡規則都有同型反例。(c) 改良案「cooperative termination」——prepared 的 RM 互相詢問，誰見過決定就轉告誰——能不能消除 blocking？\n\n### 推演解答\n\n(a) 反例 trace（每步都可逐 guard 驗證，手法同 worked example）：\n\n| 步 | 動作 | 步後關鍵狀態 |\n|---|---|---|\n| 1 | RMPrepare(r1) | rmState = (p, w)，msgs = {P(r1)} |\n| 2 | RMPrepare(r2) | rmState = (p, p)，msgs = {P(r1), P(r2)} |\n| 3 | TMRcvPrepared(r1) | tmPrepared = {r1} |\n| 4 | TMRcvPrepared(r2) | tmPrepared = {r1, r2} |\n| 5 | TMCommit | tmState = \"committed\"，msgs 多了 C |\n| 6 | RMRcvCommitMsg(r1) | rmState = (c, p) |\n| 7 | RMTimeoutAbort(r2) | rmState = (c, a) —— TCConsistent 卒 |\n\n第 7 步的 guard 完全合法：rmState[r2] = \"prepared\" ✓。Commit 訊息躺在 msgs 裡，但「躺在那裡」不等於「r2 收到了」——r2 的逾時敲在 Commit 抵達之前，這正是現實裡 timeout 永遠的命門：**它區分不了「死了」跟「慢了」**。\n\n(b) 任何解卡規則 D，若只讀 r2 的本地資訊（自身 rmState、自己收過的訊息），則在「TM 於 s₄ 後 crash」與「TM 已 commit、Commit 訊息尚未送達 r2」兩個世界裡，r2 的本地視圖逐位元相同，D 必然輸出同一個決定。D 若決定 abort，世界 B 給出 ⟨committed, aborted⟩，破 safety；D 若決定 commit，對稱地考慮「TM 已 abort、Abort 尚未送達」的世界（TMAbort 隨時可發生），同樣破 safety；D 若決定等待——那就是 blocking 本身。三條路，無一倖免。這不是 2PC 寫壞了，是 prepared 狀態的資訊結構天生如此。\n\n(c) cooperative termination 不破 safety——「轉告已知的決定」傳播的是真話，TCConsistent 無虞；它也確實縮小 blocking 視窗：只要**任何一個** RM 見過 Commit 或 Abort，全體就能脫困。但對 worked example 的 s₅ 它無能為力：全員 prepared、TM 在廣播前死亡，問遍所有人，所有人都只知道「我 prepared 了」——資訊總量為零，規則 (b) 照樣適用。結論：視窗變窄、本質還在，而且多付一輪互詢訊息。3PC 沿這條思路再往前一步，把代價押到了 partition 下的 safety（見本章 3PC 一節）。真正出線的路是把決定本身複製成多數決——ch12。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. TCommit 與 TwoPhase 各自在描述什麼？為什麼 Lamport 把它們寫成兩個模組，而不是一份「完整的 2PC spec」？這個分層對應你工作裡的什麼東西？\n2. canCommit 與 notCommitted 是誰的視角？為什麼說 TCommit 不是可執行的協議？TwoPhase 分別用什麼機制替代這兩個 guard？\n3. msgs 為什麼可以只增不減？這個建模選擇依賴哪個前提？如果要給 TwoPhase 加 liveness 性質，訊息層得補回哪些東西？\n4. 原版 TwoPhase.tla 沒有 crash 動作，為什麼 blocking 場景仍然「在」spec 裡？本章的 TMCrash 擴充到底買到了什麼（提示：ENABLED 與 fairness 的關係）？\n5. 不看書，手講一遍 worked example：crash 的窗口開在哪兩個事件之間？crash 之後八類動作各為什麼 disabled？TCConsistent 為什麼全程成立？\n6. RMChooseToAbort 的 guard 為什麼是 \"working\" 而不是 {\"working\", \"prepared\"}？放寬之後，哪條 7 步 trace 會打破 TCConsistent？\n7. 「blocking 是本質不是 bug」的論證核心是哪兩個無法區分的世界？這個論證形態與 ch12 要遇到的哪個不可能結果同源？\n8. `TC == INSTANCE TCommit` 與 `THEOREM TPSpec => TC!TCSpec` 兩行各在做什麼？TwoPhase 的哪些步在 TCommit 眼裡是 stuttering？這件事靠 ch06 的哪個設計決定才成立？\n\n## 延伸閱讀\n\n- **TCommit.tla 原文**：`https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TCommit.tla`。本章引用的問題層 spec 全文（66 行）。讀的重點：註解怎麼把每個定義的「為什麼」講完。\n- **TwoPhase.tla 原文**：`https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TwoPhase.tla`。協議層 spec 全文；同目錄還有 PaxosCommit.tla——讀完 ch12 回來精讀它，會有「原來如此」的時刻。\n- **Jim Gray & Leslie Lamport, “Consensus on Transaction Commit”**, *ACM Transactions on Database Systems*, Vol. 31, No. 1（2006），pp. 133–160：`https://dl.acm.org/doi/10.1145/1132863.1132867`（Microsoft Research 頁面有 PDF）。兩份 spec 的論文出處；讀第 3–4 節看 2PC 如何被定位成 Paxos Commit 的 F = 0 特例。\n- **Dale Skeen, “Nonblocking Commit Protocols”**, *Proceedings of ACM SIGMOD 1981*：`https://dl.acm.org/doi/10.1145/582318.582339`。3PC 的原典，給出了非阻塞承諾協議的充要條件——讀它是為了看清那些條件在 partition 下如何失效。\n- **TLA+ Video Course 第 5、6 講**（Lamport 親自錄製）：`https://lamport.azurewebsites.net/video/videos.html`。第 5 講 “Transaction Commit” 與第 6 講 “Two-Phase Commit” 正是本章兩份 spec 的作者導讀，各約 20 餘分鐘；搭配本章手推服用效果最佳。\n"}, {"id": "ch12-paxos", "file": "ch12-paxos.md", "group": "Part IV — 協議精讀", "title": "ch12 — Paxos：共識的不變量", "md": "# ch12 — Paxos：共識的不變量\n\n> **本章解決什麼問題**：ch11 的 2PC 把「全體一致才 commit」做對了，但 TM 一倒、prepared 的 RM 就永遠卡住——單點不是實作偷懶，是協議結構。要拔掉單點，你需要一個能在「少數節點倒掉、訊息任意延遲」之下仍能做出**不可反悔的決定**的協議。這個問題叫共識（consensus），它的標準答案叫 Paxos。本章用「不變量先於演算法」的順序講它：先寫死要保什麼（一旦多數選定就不可改），再看 phase 1/2 的每條規則怎麼從不變量長出來——這正是 Lamport 自己的 spec 階層 Consensus.tla → Voting.tla → Paxos.tla 的設計。ch13 用 Raft 對照工程化路線，ch15 把本章預告的 refinement 做成機械。\n\n## 從你已知的出發\n\n先從你寫過幾百次的東西開始：樂觀鎖。\n\n```text\nUPDATE accounts SET balance = 900, version = 8\nWHERE id = 42 AND version = 7\n```\n\n帶著版本號去寫；版本舊了，affected rows = 0，你升版本重試。這個模式裡藏著 Paxos 的兩個核心零件：**版本號決定誰說了算**（ballot 就是分散式版的 version），以及**寫之前先確認現況**（phase 1 就是那句 `WHERE version = 7` 的前置讀取＋一個更強的承諾）。差別在仲裁者：樂觀鎖背後有一台單一的 DB 替你裁決誰先誰後；Paxos 要面對的世界裡，「資料庫」本身是三台會當機的機器，沒有任何單點可以當裁判——裁判只能是**多數派（quorum）**。多數你也懂：etcd 三台掛一台照常服務，掛兩台就罷工，你在 K8s 維運裡早就體感過「過半才算數」。\n\n第三個零件你也熟，而且是用痛換來的：兩個 client 對同一筆 row 樂觀鎖互踩，A 寫失敗重試、B 寫失敗重試、誰都過不了——重試風暴。Paxos 裡這叫 duelling proposers，而且本章會給你一個壞消息：這不是實作可以徹底修掉的毛病，是物理（FLP 不可能定理）。\n\n最後接上 ch11 的尾巴。2PC 卡死的根源是：**「決定」這個事實存放在單一 TM 的腦子裡**，TM 倒了，prepared 的 RM 既不能 commit 也不能 abort。Paxos 的答案是把「決定」本身打散：沒有任何單一節點「知道」答案，答案是一個關於多數派的**狀態述語**——多數 acceptor 在同一輪投了同一個值，這個值就被選定了，誰都不必在場。Lamport 後來把 2PC 與 Paxos 正式接起來（同目錄的 PaxosCommit.tla：用 Paxos 替每個 RM 的決定做容錯），那條線本章不走，但你應該帶著 ch11 的問題意識讀本章：**Paxos 就是「沒有單點的決定機制」**。\n\n## 共識問題，與它的規格\n\n把問題說精確。一群行程要從各自提議的值裡選定（choose）一個，要求三條：\n\n- **Agreement**：至多選定一個值——任何兩個得知結果的人，得到的是同一個值。\n- **Validity**：選定的值必須是真的有人提議過的值（排除「不管誰提什麼、一律回傳 0」這種作弊解）。\n- **Termination**：終究要選定一個值。\n\n你的世界裡到處是它的化身：DB failover 選新 primary、K8s controller 的 leader election、分散式鎖服務決定誰持鎖——本質都是「一群會當機的機器要對一件事永久定案」。\n\n「定案」用 TLA+ 寫出來是什麼樣子？Lamport 的 Consensus.tla（tlaplus/Examples，2026-06 對照原文）給了一份極簡的答案——注意它連「怎麼選」都不說：\n\n```tla\nVARIABLE chosen\n\nInit == chosen = {}\n\nNext == /\\ chosen = {}\n        /\\ \\E v \\in Value : chosen' = {v}\n\nSpec == Init /\\ [][Next]_chosen\n\nInv == /\\ TypeOK\n       /\\ Cardinality(chosen) \\leq 1\n```\n\n被選定的值的集合從空集合開始，**唯一**允許的一步是從 {} 變成某個單元素集合 {v}——之後 Next 的 guard `chosen = {}` 永遠為假，只剩 stuttering。agreement 的全部內容就是 Inv 那行 Cardinality(chosen) ≤ 1。這是三層樓的頂樓：純粹的「什麼叫定案」，沒有 acceptor、沒有訊息、沒有演算法。\n\n接著是壞消息。**FLP 不可能定理**（Fischer–Lynch–Paterson, 1985）的一句話版：**在非同步系統（訊息延遲沒有上界、不能依賴時鐘）裡，只要有一個行程可能 crash，就不存在既是確定性、又保證必然終止的共識演算法**。本書不證，見延伸閱讀。它逼你選邊：safety 與 termination 不可兼得地「無條件成立」。Paxos 的選擇毫不曖昧——**safety 無條件**（任何交錯、任何延遲、任何少數 crash，agreement 都不破），**liveness 看天吃飯**（網路夠穩、恰好只剩一個 proposer 在推進時，才會定案）。這跟 ch07 的結構完全對齊：Init ∧ □[Next]_vars 只給 safety；而這裡連加 fairness 都買不回 termination，FLP 留的逃生門是隨機性或時序假設（timeout），不是公平性公式。本章接下來九成的篇幅都在講 safety，這是誠實，不是偷懶。\n\n## 不變量先於演算法：把規則長出來\n\n多數人學 Paxos 的方式是先背規則：phase 1 發 prepare、acceptor 回最大編號的已接受提案、proposer 必須採用回應中編號最高的值……規則像憑空掉下來的戒律，背完不知道為什麼，更不敢動——改一個字會不會壞？不知道。本章反過來走：先把「要保什麼」寫死，再看每條規則是從哪個不變量長出來的。走完之後你應該能對任何一條規則回答：「刪掉它，哪個不變量會在哪一步破」——紙上推演就考這個。\n\n以下的推導完全沿 Lamport 的 Paxos Made Simple（2001）§2.2，引文皆為原文（2026-06 對照 PDF）。\n\n**第一步：定案＝同一輪的多數票。**要在會當機的機器上存放「不可反悔」的事實，唯一的辦法是讓它分散在多數派上：v 被選定 ≜ 存在一個多數集，其中每個 acceptor 都接受了 v。為什麼是多數？因為**任何兩個多數集必有交集**——這是把「兩個決定」綁在同一個證人身上、從而逼它們相等的唯一槓桿。記住這句話，整章的 safety 都吊在它上面。\n\n**第二步：一輪不夠。**單輪投票會卡死：三個 proposer 各拿三分之一票，無人過半，而票已投完。又或者剛好過半的那一票所在的 acceptor 當機，結果永遠無人知曉。所以必須允許**多輪**——每輪一個編號，叫 ballot。但多輪立刻引爆新危險：**第 1 輪選了 x，第 2 輪選了 y**。於是要保的不變量現身了。Lamport 給它編號 P2：\n\n> P2. If a proposal with value v is chosen, then every higher-numbered proposal that is chosen has value v.\n\n（若值 v 的提案被選定，則每個被選定的更高編號提案的值也是 v。）ballot 全序，所以 P2 直接蘊涵 agreement。\n\n**第三步：下放。**P2 談的是「被選定」——那是一個全域述語（多數派投了票），**沒有任何單一節點觀測得到**，所以沒有任何節點能直接「執行」P2。ch06 教過你這個方法論：把行為層的願望改寫成可以由本地規則維護的條件。Lamport 連續下放了三次。先下放到 acceptor 的「接受」動作（被選定的前提是被接受）：\n\n> P2a. If a proposal with value v is chosen, then every higher-numbered proposal accepted by any acceptor has value v.\n\n但 P2a 跟最初的一條基本要求打架。那條要求是 P1——\n\n> P1. An acceptor must accept the first proposal that it receives.\n\n（不接受第一個提案，就回到「無人過半」的卡死。）現在想像：v 已在多數派裡被選定，而某個從頭到尾沒收過任何訊息的 acceptor c 剛醒來，一個新 proposer 拿著更高編號、不同值的提案找上它——P1 命令 c 接受，P2a 禁止。接受端救不了，再上移一層，下放到**發出端**：\n\n> P2b. If a proposal with value v is chosen, then every higher-numbered proposal issued by any proposer has value v.\n\n提案要先被發出才可能被接受，所以 P2b ⇒ P2a ⇒ P2。但 proposer 同樣看不到「被選定」，P2b 還是不能直接執行。Lamport 的下一步是本章最值得學的一手：**他不是去「想」規則，而是去看 P2b 的證明需要什麼前提，再把前提抄下來當規則**。假設 ⟨m, v⟩ 已被選定，要證每個編號 n > m 的提案值都是 v——這是個對 n 的歸納證明（ch05），歸納步需要的前提，整理出來就是：\n\n> P2c. For any v and n, if a proposal with value v and number n is issued, then there is a set S consisting of a majority of acceptors such that either (a) no acceptor in S has accepted any proposal numbered less than n, or (b) v is the value of the highest-numbered proposal among all proposals numbered less than n accepted by the acceptors in S.\n\n逐字拆。發出編號 n、值 v 的提案之前，必須存在一個**多數集 S** 作為證據，滿足兩種情況之一：\n\n- **(a) 白紙**：S 裡沒有任何 acceptor 接受過編號小於 n 的提案——歷史是空的，v 隨你選（validity 由「proposer 只提自己手上的值」保住）。\n- **(b) 繼承**：S 裡編號小於 n 的所有已接受提案中，**編號最高的那張票的值就是 v**——歷史不空，你沒有選擇權，只能抄最高票。\n\n這條就是整個演算法的「為什麼」。本書沿 Lamport 的編號，跨章一律稱它 **P2c**。\n\n**第四步：時態問題，promise 登場。**P2c 的 (a) 有個陷阱：它說「沒有 acceptor 接受過」，但這是發出當下的快照——如果 S 裡某台 acceptor **之後**才接受一個編號小於 n 的提案呢？P2c 會被追溯破壞。Lamport 原文把這個困境與解法寫得極好：\n\n> Learning about proposals already accepted is easy enough; predicting future acceptances is hard. Instead of trying to predict the future, the proposer controls it by extracting a promise that there won't be any such acceptances.\n\n（查過去容易，測未來很難；所以不要預測未來，**控制**未來——要求 acceptor 承諾不再接受編號小於 n 的提案。）promise 把 (a) 的「現在沒有」升級成「永遠不會有」。於是 phase 1/2 不是發明出來的，是 P2c 的影子（原文演算法摘述）：\n\n1. **Phase 1（prepare）**：proposer 選新編號 n，向 acceptor 們發 prepare 請求，要求回覆：「(a) A promise never again to accept a proposal numbered less than n」與「(b) The proposal with the highest number less than n that it has accepted, if any」。\n2. **Phase 2（accept）**：收到**多數** acceptor 的回應後，proposer 發出編號 n、值 v 的 accept 請求——v 是回應中最高編號提案的值；若回應全是白紙，v 才可以自選。acceptor 收到 accept 請求就接受它，除非已經回應過編號更高的 prepare。\n\n每一條規則都能指回 P2c 的某個字：\n\n| 規則 | 它在守 P2c 的哪裡 |\n|---|---|\n| prepare 必須收齊**多數**回應才能進 phase 2 | S 是多數集——跟任何已選定的多數有交集 |\n| acceptor 承諾不再接受編號更小的提案 | 把 (a)/(b) 從快照升級成對未來成立 |\n| 1b 回應帶上「已接受的最高編號提案」 | (b) 需要的歷史證據 |\n| 回應不空時，v 必須抄最高編號的值 | (b) 的「v is the value of the highest-numbered …」 |\n| 回應全空時才能自選值 | (a) 的白紙情況 |\n| acceptor 拒收編號小於承諾的 accept 請求 | 兌現 promise，否則 (a) 被追溯破壞 |\n\n**第五步：把歸納證明補完。**P2c 為什麼真的足夠？給「工程師的嚴謹」版（完整機械版是 Voting.tla 的 ShowsSafety 定理與其 TLAPS 證明，本章不展開）：\n\n**定理**：P2c 持續成立 ⇒ P2b。設 ⟨m, v⟩ 已被選定（多數集 C 在 ballot m 全數投給 v），證：每個被發出的 ⟨n, w⟩（n > m）都有 w = v。對 n 做強歸納（ch05）。\n\n- ⟨1⟩1. 歸納假設：每個編號落在 m..(n−1) 之間、曾被發出的提案，值都是 v。（n = m+1 時該區間只有 m，而編號 m 的提案就是被選定的 ⟨m, v⟩，成立。）\n- ⟨1⟩2. C 中每個 acceptor 都接受過編號落在 m..(n−1) 的提案——至少 ballot m 那張。又由 ⟨1⟩1，凡編號落在這個區間且被接受的提案（被接受的前提是曾被發出），值都是 v。\n- ⟨1⟩3. ⟨n, w⟩ 被發出，由 P2c 存在多數集 S 滿足 (a) 或 (b)。多數必交：取 a ∈ S ∩ C。\n- ⟨1⟩4. (a) 不可能：a ∈ C 接受過編號 m < n 的提案，S 不是白紙。\n- ⟨1⟩5. 故 (b) 成立：w 等於「S 中編號小於 n 的已接受提案」裡最高編號那張的值。這個最高編號 ≥ m（a 的 ballot m 票就在池子裡）且 ≤ n−1，由 ⟨1⟩2 它的值是 v。所以 w = v。\n- ⟨1⟩6. QED。由強歸納，所有 n > m 的提案值皆 v；更高 ballot 若有值被選定，必是 v——P2 成立，agreement 成立。\n\n注意 ⟨1⟩4 到 ⟨1⟩5 的槓桿全是 quorum intersection：**S 必含一個 C 的證人，證人把歷史押進 (b)**。沒有交集，(b) 看不到歷史，P2c 形同虛設——紙上推演題 1 會讓你親手體驗。\n\n## 三層樓：Consensus → Voting → Paxos\n\n上一節的推導，Lamport 在 tlaplus/Examples 裡寫成了三份疊起來的 spec（同一目錄，2026-06 對照原文）：\n\n```text\n┌─────────────────────────────┐\n│ Consensus.tla               │   定案長什麼樣：chosen 至多一個值\n│ VARIABLE chosen             │\n└──────────────▲──────────────┘\n               │  refinement：Voting!Spec => C!Spec\n┌──────────────┴──────────────┐\n│ Voting.tla                  │   為什麼安全：ballot、quorum、SafeAt\n│ VARIABLES votes, maxBal     │\n└──────────────▲──────────────┘\n               │  refinement：Paxos!Spec => V!Spec\n┌──────────────┴──────────────┐\n│ Paxos.tla                   │   怎麼跑起來：訊息傳遞\n│ VARIABLES maxBal, maxVBal,  │\n│           maxVal, msgs      │\n└─────────────────────────────┘\n```\n\n頂樓你已經看過。中層 **Voting.tla** 是 P2c 的數學本體——有 ballot、投票與 quorum，但**還沒有任何訊息**。先看它怎麼定義「選定」：\n\n```tla\nVotedFor(a, b, v) == <<b, v>> \\in votes[a]\n\nChosenAt(b, v) == \\E Q \\in Quorum :\n                     \\A a \\in Q : VotedFor(a, b, v)\n\nchosen == {v \\in Value : \\E b \\in Ballot : ChosenAt(b, v)}\n```\n\n注意 chosen 在這層**不是變數，是定義出來的狀態函數**——「被選定」純粹是 votes 的影子，這正式坐實了前面那句「沒有任何節點知道答案，答案是一個狀態述語」。quorum 的假設只有兩行，第二行就是那根承重柱：\n\n```tla\nASSUME QuorumAssumption == /\\ \\A Q \\in Quorum : Q \\subseteq Acceptor\n                           /\\ \\A Q1, Q2 \\in Quorum : Q1 \\cap Q2 # {}\n```\n\n接著是 P2c 在這層的化身。先定義「b 輪以下再也選不出別的值」：\n\n```tla\nCannotVoteAt(a, b) == /\\ maxBal[a] > b\n                      /\\ DidNotVoteAt(a, b)\n\nNoneOtherChoosableAt(b, v) ==\n   \\E Q \\in Quorum :\n     \\A a \\in Q : VotedFor(a, b, v) \\/ CannotVoteAt(a, b)\n\nSafeAt(b, v) == \\A c \\in 0..(b-1) : NoneOtherChoosableAt(c, v)\n```\n\nSafeAt(b, v) 讀作：對每個更低的 ballot c，存在一個 quorum，其中每個成員要嘛已投 v、要嘛**永遠不可能**在 c 投票（已承諾更高的 maxBal 且沒在 c 投過）——所以 c 輪不可能選出 v 以外的值。SafeAt 是「在 b 輪投 v 是安全的」的精確語意，但它量化了**所有**更低的 ballot，不好直接檢查；於是有一個有限證據版：\n\n```tla\nShowsSafeAt(Q, b, v) ==\n  /\\ \\A a \\in Q : maxBal[a] \\geq b\n  /\\ \\E c \\in -1..(b-1) :\n      /\\ (c # -1) => \\E a \\in Q : VotedFor(a, c, v)\n      /\\ \\A d \\in (c+1)..(b-1), a \\in Q : DidNotVoteAt(a, d)\n```\n\n把它跟 P2c 對起來：Q 就是 S；第一行是收齊的 promise；c = −1 的情況是 (a)（Q 裡沒人在 b 以下投過票）；c ≥ 0 的情況是 (b)（c 是 Q 裡 b 以下最高的投票輪，那一輪有人投了 v）。Voting 的投票動作把 ShowsSafeAt 直接寫進 guard：\n\n```tla\nVoteFor(a, b, v) ==\n    /\\ maxBal[a] \\leq b\n    /\\ \\A vt \\in votes[a] : vt[1] # b\n    /\\ \\A c \\in Acceptor \\ {a} :\n         \\A vt \\in votes[c] : (vt[1] = b) => (vt[2] = v)\n    /\\ \\E Q \\in Quorum : ShowsSafeAt(Q, b, v)\n    /\\ votes' = [votes EXCEPT ![a] = @ \\cup {<<b, v>>}]\n    /\\ maxBal' = [maxBal EXCEPT ![a] = b]\n```\n\n而「P2c 足夠」在這層是一條定理（本章 ⟨1⟩ 論證的機械版）：\n\n```tla\nTHEOREM ShowsSafety ==\n          TypeOK /\\ VotesSafe /\\ OneValuePerBallot =>\n             \\A Q \\in Quorum, b \\in Ballot, v \\in Value :\n               ShowsSafeAt(Q, b, v) => SafeAt(b, v)\n```\n\nVoting.tla 的結尾寫著 `C == INSTANCE Consensus` 與 `THEOREM Spec => C!Spec`：**Voting 的每條合法行為，都是 Consensus 允許的行為**——ch06 那句「實作正確＝Impl ⇒ Spec」的活例。同樣地，等一下你會在 Paxos.tla 的結尾看到 `V == INSTANCE Voting` 與 `THEOREM Spec => V!Spec`。三層樓靠兩條蘊涵焊在一起；INSTANCE 與 substitution 怎麼讀、這種定理怎麼證，是 ch15 的主題，本章你只需要看見階梯本身：**演算法（Paxos）是不變量（Voting）的實作，不變量是規格（Consensus）的守護者**。\n\n注意 VoteFor 的 guard 裡有一條「全知」條件：它直接讀**其他 acceptor** 的 votes（第三個合取）和全域的 ShowsSafeAt。單機數學可以這樣寫，分散式系統不行——沒有人能瞬間讀到別人的狀態。把這些全知 guard 換成**訊息**，就是底層 Paxos.tla 的全部工作。\n\n## 精讀 Paxos.tla\n\n進到底層（節錄自 tlaplus/Examples 原文，2026-06；註解有刪節）。常數與 Voting 相同；四個變數：\n\n```tla\nVARIABLE maxBal,\n         maxVBal, \\* <<maxVBal[a], maxVal[a]>> is the vote with the largest\n         maxVal,    \\* ballot number cast by a; it equals <<-1, None>> if\n                    \\* a has not cast any vote.\n         msgs     \\* The set of all messages that have been sent.\n```\n\n每個 acceptor 三個欄位：**maxBal[a]** 是 promise 線（「編號小於這個的我一概不理」）；**maxVBal[a] 與 maxVal[a]** 是最後一票（在哪輪、投了什麼值；沒投過則為 −1 與 None）。注意 maxBal[a] ≥ maxVBal[a] 恆成立：承諾線只會被 prepare 與投票推高。\n\nmsgs 是**所有發過的訊息的集合，只增不減**。原檔的 NOTE 註解值得整段消化（節譯）：更精確的模型應該有「在途訊息」、遺失、重複與接收動作；但這份 spec 主要關心 safety，而 **safety 只說「什麼訊息可以被收到」，從不主張「有訊息真的被收到」——所以「訊息遺失」與「訊息永遠沒被收到」在這層無法區分，根本不必建模**。一句話的抽象選擇（ch02），省掉一半的狀態空間，而且是誠實的：要談 liveness 才需要把「必須送達」說清楚。順帶地，msgs 只增不減也天然涵蓋了亂序與重複送達——舊訊息永遠躺在那裡，隨時可能被「再收到一次」。\n\n```tla\nInit == /\\ maxBal = [a \\in Acceptor |-> -1]\n        /\\ maxVBal = [a \\in Acceptor |-> -1]\n        /\\ maxVal = [a \\in Acceptor |-> None]\n        /\\ msgs = {}\n\nSend(m) == msgs' = msgs \\cup {m}\n```\n\n四個 action。先看 phase 1 的一來一回：\n\n```tla\nPhase1a(b) == /\\ Send([type |-> \"1a\", bal |-> b])\n              /\\ UNCHANGED <<maxBal, maxVBal, maxVal>>\n\nPhase1b(a) == /\\ \\E m \\in msgs :\n                  /\\ m.type = \"1a\"\n                  /\\ m.bal > maxBal[a]\n                  /\\ maxBal' = [maxBal EXCEPT ![a] = m.bal]\n                  /\\ Send([type |-> \"1b\", acc |-> a, bal |-> m.bal,\n                            mbal |-> maxVBal[a], mval |-> maxVal[a]])\n              /\\ UNCHANGED <<maxVBal, maxVal>>\n```\n\n有一件事值得停一秒：**這份 spec 裡沒有 proposer 行程**。Phase1a(b) 的參數是 ballot，不是某個 proposer 的名字——「ballot b 的 leader」是隱含的，誰都可以替任何 b 發 1a。本章基準配置說的「2 個 proposers」p1、p2，在 spec 裡的對應就是「ballot 1 的 leader」與「ballot 2 的 leader」；工程上 ballot 編號空間會切給不同 proposer（例如 p1 用奇數、p2 用偶數），保證同一編號只有一個主人。Phase1b 是 promise 的執行處：guard `m.bal > maxBal[a]` 讓 maxBal 嚴格單調上升，1b 回訊帶上最後一票（mbal、mval）——P2c 的 (b) 所需的歷史證據。\n\n接著是整個演算法的心臟。原檔註解直說：「This second conjunct … is the heart of the algorithm」：\n\n```tla\nPhase2a(b, v) ==\n  /\\ ~ \\E m \\in msgs : m.type = \"2a\" /\\ m.bal = b\n  /\\ \\E Q \\in Quorum :\n        LET Q1b == {m \\in msgs : /\\ m.type = \"1b\"\n                                 /\\ m.acc \\in Q\n                                 /\\ m.bal = b}\n            Q1bv == {m \\in Q1b : m.mbal \\geq 0}\n        IN  /\\ \\A a \\in Q : \\E m \\in Q1b : m.acc = a\n            /\\ \\/ Q1bv = {}\n               \\/ \\E m \\in Q1bv :\n                    /\\ m.mval = v\n                    /\\ \\A mm \\in Q1bv : m.mbal \\geq mm.mbal\n  /\\ Send([type |-> \"2a\", bal |-> b, val |-> v])\n  /\\ UNCHANGED <<maxBal, maxVBal, maxVal>>\n```\n\n逐塊讀：\n\n- 第一個合取：ballot b 至多發**一張** 2a——同輪不能提兩個值（守 Voting 的 OneValuePerBallot；工程對應「leader 自己要記得提過什麼」，這裡用 msgs 單調性白嫖）。\n- Q1b：來自 quorum Q、回應 ballot b 的 1b 訊息；`\\A a \\in Q : \\E m \\in Q1b : m.acc = a` 要求**收齊整個 Q**——P2c 的「a majority of acceptors」。\n- Q1bv：其中真的帶票（mbal ≥ 0）的子集。`Q1bv = {}` 就是 P2c 的 (a)：白紙，v 自由。否則必須存在一張 mbal 最大的 1b，其 mval 等於 v——P2c 的 (b)：抄最高票。**這個 LET 區塊就是 P2c 翻成可執行檢查的樣子。**原檔註解明說：由此可推出存在 Q 使 ShowsSafeAt(Q, b, v)（Voting 層的橋）。\n\n```tla\nPhase2b(a) == \\E m \\in msgs : /\\ m.type = \"2a\"\n                              /\\ m.bal \\geq maxBal[a]\n                              /\\ maxBal' = [maxBal EXCEPT ![a] = m.bal]\n                              /\\ maxVBal' = [maxVBal EXCEPT ![a] = m.bal]\n                              /\\ maxVal' = [maxVal EXCEPT ![a] = m.val]\n                              /\\ Send([type |-> \"2b\", acc |-> a,\n                                       bal |-> m.bal, val |-> m.val])\n```\n\nPhase2b 是投票：guard `m.bal \\geq maxBal[a]` 兌現 promise（小於承諾線的 accept 請求被無聲拒絕），三個欄位一起更新，2b 訊息對外宣告這一票。learner 在這份 spec 裡被抽象掉了——「v 被選定」就是「存在 quorum，其成員都發過 ⟨b, v⟩ 的 2b」，誰要知道結果就去數 2b。最後組裝與 refinement：\n\n```tla\nNext == \\/ \\E b \\in Ballot : \\/ Phase1a(b)\n                             \\/ \\E v \\in Value : Phase2a(b, v)\n        \\/ \\E a \\in Acceptor : Phase1b(a) \\/ Phase2b(a)\n\nSpec == Init /\\ [][Next]_vars\n\nvotes == [a \\in Acceptor |->\n           {<<m.bal, m.val>> : m \\in {mm \\in msgs: /\\ mm.type = \"2b\"\n                                                   /\\ mm.acc = a }}]\n\nV == INSTANCE Voting\n\nTHEOREM Spec => V!Spec\n```\n\nvotes 從 2b 訊息**重建**出 Voting 層的投票記錄——這就是 refinement mapping 的雛形（把底層狀態映成上層狀態），ch15 正式拆解。\n\n## Worked example：雙 proposer 競爭\n\n基準配置：acceptors = {a1, a2, a3}，quorum＝任兩個以上（{a1,a2}、{a1,a3}、{a2,a3} 與全集——兩兩必交 ✓）；proposer p1 用 ballot 1 提值 x，proposer p2 用 ballot 2 提值 y。狀態記法：每個 acceptor 寫成 (maxBal, maxVBal, maxVal)；訊息縮寫 1a⟨b⟩、1b⟨a, b, mbal, mval⟩、2a⟨b, v⟩、2b⟨a, b, v⟩。\n\n### 情境 A：拔掉 phase 1，看分歧怎麼發生\n\n先做對照組。規則只改一條：**proposer 不做 phase 1，直接發 2a、值自己挑**；acceptor 端的 Phase2b 規則原封不動，「同輪多數票＝選定」也不變。\n\n| 步 | 動作 | a1 | a2 | a3 | 新增訊息 |\n|---|---|---|---|---|---|\n| 0 | Init | (-1, -1, None) | (-1, -1, None) | (-1, -1, None) | — |\n| 1 | p1 直接發 2a（沒問過任何人） | 不變 | 不變 | 不變 | 2a⟨1, x⟩ |\n| 2 | Phase2b(a1)：1 ≥ −1 ✓ | (1, 1, x) | 不變 | 不變 | 2b⟨a1, 1, x⟩ |\n| 3 | Phase2b(a2)：1 ≥ −1 ✓ | 不變 | (1, 1, x) | 不變 | 2b⟨a2, 1, x⟩ |\n\n第 3 步之後，quorum {a1, a2} 在 ballot 1 全數投了 x：**ChosenAt(1, x) 成立，x 已被選定**。任何 learner 收齊這兩張 2b 都會誠實地宣布 x。繼續：\n\n| 步 | 動作 | a1 | a2 | a3 | 新增訊息 |\n|---|---|---|---|---|---|\n| 4 | p2 直接發 2a（也沒問過任何人） | 不變 | 不變 | 不變 | 2a⟨2, y⟩ |\n| 5 | Phase2b(a2)：2 ≥ 1 ✓ | 不變 | (2, 2, y) | 不變 | 2b⟨a2, 2, y⟩ |\n| 6 | Phase2b(a3)：2 ≥ −1 ✓ | 不變 | 不變 | (2, 2, y) | 2b⟨a3, 2, y⟩ |\n\n第 6 步之後，quorum {a2, a3} 在 ballot 2 全數投了 y：ChosenAt(2, y) 也成立。a2 在 ballot 1 投的那票不會消失——2b⟨a2, 1, x⟩ 已經發出去了，先前那個 learner 宣布的 x 收不回來。於是 chosen = {x, y}，Cardinality(chosen) = 2，Consensus 層的 Inv 陣亡：**兩個 learner 各自誠實，答案不同**。\n\n驗屍。acceptor 沒有破任何規則：第 5 步 a2 收下 2a⟨2, y⟩ 完全合法——它的 guard 只擋「比承諾線舊」的請求，而**沒有人問過 a2，它沒承諾過任何東西**。兇手是第 4 步的「發出」：檢查 P2c，多數集 S 只有三個候選——{a1,a2}、{a1,a3}、{a2,a3}——每一個都含 a1 或 a2 至少一個，而 a1、a2 都已接受 ⟨1, x⟩，(a) 三路全滅；(b) 則要求 y 等於最高票的值 x，也不成立。**⟨2, y⟩ 在任何 S 之下都違反 P2c。**phase 1 的全部意義就是把這個檢查做成訊息協議：在「發出」之前，逼 proposer 先收集到一個能證明 (a) 或 (b) 的多數證據。\n\n### 情境 B：完整 Paxos，看 P2c 怎麼擋下\n\n同一個劇本，這次照規矩來。p1 先完整跑完 ballot 1：\n\n| 步 | 動作 | a1 | a2 | a3 | 新增訊息 |\n|---|---|---|---|---|---|\n| 0 | Init | (-1, -1, None) | (-1, -1, None) | (-1, -1, None) | — |\n| 1 | Phase1a(1)：p1 開 ballot 1 | 不變 | 不變 | 不變 | 1a⟨1⟩ |\n| 2 | Phase1b(a1)：1 > −1 ✓ | (1, -1, None) | 不變 | 不變 | 1b⟨a1, 1, −1, None⟩ |\n| 3 | Phase1b(a2)：1 > −1 ✓ | 不變 | (1, -1, None) | 不變 | 1b⟨a2, 1, −1, None⟩ |\n| 4 | Phase2a(1, x)：見下 | 不變 | 不變 | 不變 | 2a⟨1, x⟩ |\n| 5 | Phase2b(a1)：1 ≥ 1 ✓ | (1, 1, x) | 不變 | 不變 | 2b⟨a1, 1, x⟩ |\n| 6 | Phase2b(a2)：1 ≥ 1 ✓ | 不變 | (1, 1, x) | 不變 | 2b⟨a2, 1, x⟩ |\n\n第 4 步逐合取驗：msgs 沒有 ballot 1 的 2a ✓；取 Q = {a1, a2}，Q1b 兩張都在、蓋住 Q ✓；Q1bv = {}（兩張都是 mbal = −1 的白紙）⇒ 第一個 disjunct 成立，x 自由選 ✓。第 6 步之後 **ChosenAt(1, x)：x 已被選定**。這個事實從此不可逆——接下來的問題是，姍姍來遲的 p2 會不會搞砸它。\n\n| 步 | 動作 | a1 | a2 | a3 | 新增訊息 |\n|---|---|---|---|---|---|\n| 7 | Phase1a(2)：p2 開 ballot 2 | 不變 | 不變 | 不變 | 1a⟨2⟩ |\n| 8 | Phase1b(a2)：2 > 1 ✓ | 不變 | (2, 1, x) | 不變 | 1b⟨a2, 2, 1, x⟩ |\n| 9 | Phase1b(a3)：2 > −1 ✓ | 不變 | 不變 | (2, -1, None) | 1b⟨a3, 2, −1, None⟩ |\n\n注意第 8 步：a2 的 promise 線推高到 2，但它**順手把最後一票 ⟨1, x⟩ 押進了 1b**——歷史進入了 p2 的視野。現在 p2 想發 2a⟨2, y⟩，逐合取驗 Phase2a(2, y)：\n\n- msgs 沒有 ballot 2 的 2a ✓。\n- 取 Q = {a2, a3}：Q1b = {1b⟨a2, 2, 1, x⟩, 1b⟨a3, 2, −1, None⟩}，蓋住 Q ✓。\n- Q1bv = {1b⟨a2, 2, 1, x⟩} ≠ {}，所以第一個 disjunct 死了；第二個 disjunct 要求存在 m ∈ Q1bv 使 m.mval = y 且 m.mbal 最大——唯一的候選那張票寫的是 x，不是 y。**兩個 disjunct 全滅：Phase2a(2, y) 在這個狀態不是 enabled。**\n\np2 的「意志」根本進不了狀態空間：想提 y，但這個 action 走不出去（ch06 的 ENABLED——spec 把不安全的選項直接修剪掉，而不是事後懲罰）。它**唯一** enabled 的 phase 2 是：\n\n| 步 | 動作 | a1 | a2 | a3 | 新增訊息 |\n|---|---|---|---|---|---|\n| 10 | Phase2a(2, x)：Q1bv 最高票 ⟨1, x⟩ ⇒ 被迫抄 x | 不變 | 不變 | 不變 | 2a⟨2, x⟩ |\n| 11 | Phase2b(a2)：2 ≥ 2 ✓；Phase2b(a3)：2 ≥ 2 ✓ | 不變 | (2, 2, x) | (2, 2, x) | 2b⟨a2, 2, x⟩、2b⟨a3, 2, x⟩ |\n\nballot 2 也「選定」了——選定的還是 x。ChosenAt(1, x) 與 ChosenAt(2, x) 並存，chosen = {x}，agreement 完好。**p2 沒有失敗，它只是被迫成為 x 的傳聲筒**：它的 ballot 推進了系統（promise 線整體墊高），但值的決定權在第 6 步就已經封死了。\n\n換 quorum 也逃不掉：p2 若改收 {a1, a3} 的 1b，a1 會回 1b⟨a1, 2, 1, x⟩（它在 ballot 1 投過 x），照樣被迫抄 x；{a1, a2} 更是兩張票都寫 x。共同原因只有一個——**ballot 2 的任何 quorum 都與選定 x 的 quorum {a1, a2} 相交，交集裡的證人把歷史押進 1b**。這就是 quorum intersection ＋ P2c 的合奏：(b) 永遠看得到該看的歷史。\n\n### 情境 B′：搶先的 phase 1——safety 的另一面\n\n把交錯反過來，讓 p2 的 phase 1 跑在最前面，會看到 P2c 的 (a) 與 promise 怎麼合作：\n\n1. 1a⟨2⟩；a2、a3 回 1b（promise 線推到 2，皆白紙）→ a2 = (2, −1, None)、a3 = (2, −1, None)。\n2. p1 此時才發 1a⟨1⟩：只有 a1 能回（a2、a3 的 guard 要求 1 > 2，不成立）。ballot 1 的 1b 永遠湊不滿多數 ⇒ Phase2a(1, ·) 永遠不 enabled ⇒ **ballot 1 胎死腹中**。就算 p1 硬是把 2a⟨1, x⟩ 發出去（它湊不齊證據，發不出來；退一萬步說發出來了），a2、a3 的 Phase2b guard（1 ≥ 2 不成立）也會拒收——promise 把 (a) 的「現在沒有」撐成「永遠不會有」。\n3. p2 的 Phase2a(2, y)：Q = {a2, a3}，Q1bv = {} ⇒ (a) 白紙 ⇒ 自由選 y；a2、a3 投 ⟨2, y⟩ ⇒ **y 被選定**。\n\n沒有分歧：x 從頭到尾沒被選定，y 是唯一定案。教訓很重要：**Paxos 保證至多一個值被選定，不保證是「你的」值**——p1 輸了，但 agreement 與 validity 都無恙。\n\n把 B′ 再推一步就是 liveness 的深淵。Paxos Made Simple 的 Progress 一節自己構造了這個場景（摘述）：p 完成編號 n1 的 phase 1；q 接著完成 n2 > n1 的 phase 1，於是 p 的 phase 2 被拒；p 不服，完成 n3 > n2 的 phase 1，換 q 的 phase 2 被拒……兩個 proposer 編號節節攀升，**永遠沒有任何提案被選定**。這條無限 behavior 完全滿足 Spec——□[Next]_vars 是允許清單，不是待辦清單（ch06）。Lamport 的處方是選出一個 distinguished proposer 作為唯一的提案者；而「可靠地選出它」本身又是……一個共識問題。原文坦白引用 FLP：可靠的選舉必須靠隨機性或實際時間（例如 timeout）；但無論選舉成敗，**safety 都不受影響**。這就是「safety 無條件、liveness 看天吃飯」的全文注解：工程上你用 timeout＋退避把 duel 機率壓到極低（你處理重試風暴的手法一模一樣），數學上你接受 termination 沒有無條件保證。\n\n## 為什麼大家覺得 Paxos 難\n\n規則就這四個 action，狀態就三個欄位加一袋訊息——憑什麼「難」名遠播？歷史一半、教學順序一半。\n\n歷史那一半：Lamport 1998 年的原始論文 The Part-Time Parliament 用考古寓言包裝整個演算法（虛構的 Paxos 島、兼職議會、出土的銘文），審稿人與讀者多年消化不良。2001 年他寫了 Paxos Made Simple，整篇摘要只有一句話：\n\n> The Paxos algorithm, when presented in plain English, is very simple.\n\n教學順序那一半才是本章在意的。多數教材（包括許多課堂）從規則開始：先背 phase 1/2，再（也許）補證明。規則先行的代價是**每條規則都像任意的戒律**——為什麼回應裡要帶最高票？為什麼必須抄它的值？為什麼是多數而不是三分之二？背下來的人換一個場景就不會變通，更不敢改。而你這章走的是反向：P2 → P2a → P2b → P2c 每一步都是「上一條執行不了，所以下放」，phase 1/2 是 P2c 的影子，每條規則都能指回不變量的某個字。順序反過來，難度跌一半——剩下那一半是 quorum intersection 的歸納論證，⟨1⟩1 到 ⟨1⟩6 你也走過了。\n\n最好的證據是 Lamport 自己的三層 spec：他**沒有**從演算法寫起。頂樓 Consensus 只說「選了至多一個值」；中層 Voting 把 ballot、quorum、SafeAt 的數學寫完——此時還沒有一封訊息；演算法在最底層才出現，而且每個 action 都對著上層的某個動作或 stuttering。「不變量先於演算法」不是本書的教學花招，是原作者的設計檔案結構。\n\n最後一句話帶過工程化：single-decree Paxos 只定案**一個**值；真實系統要定案一串值（replicated log），做法是逐 slot 跑一個 Synod 實例、並讓穩定的 leader 把 phase 1 攤提掉——這叫 Multi-Paxos，而 Raft 乾脆把「強 leader」做成協議的一級公民。取捨對照與 raft.tla 精讀，見 ch13。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| 把「被選定」當成某節點知道的事件 | 「leader 收到多數 ack 就算定案了」——但 chosen 是全域狀態述語，定案的瞬間**沒有任何節點知道**；leader 可能在得知前就倒了，事實卻已不可逆 | 對每個「系統決定了 X」的句子追問：這是哪個狀態述語？誰的本地狀態能見證它？見證與事實的時間差就是 bug 的窩 |\n| 把 ballot 當成「新的蓋掉舊的」 | 「我的編號比較大，我的值理應獲勝」——大編號不是覆寫權，是**繼承義務**：phase 1 強迫你抄多數派的最高票 | 回 P2c 的 (b)：自選值的權利只在 Q1bv = {} 時存在。手驗：情境 B 第 10 步，p2 連提自己值的資格都沒有 |\n| promise 不持久化 | 測試全綠——直到某台 acceptor 重啟、maxBal 歸零，等於收回承諾；P2c 的 (a) 被追溯破壞，分歧重演（紙上推演題 3 就是這個故障的紙上版） | maxBal/maxVBal/maxVal 的單調性是 safety 的承重牆：spec 裡沒有「磁碟」，但實作必須在回 1b/2b **之前** fsync。review 清單：每個承諾欄位，落盤了嗎？ |\n| 把 liveness 當成理所當然 | 「總會有人成功的」——duelling proposers 的無限互踩是 Spec 的合法 behavior，而且 FLP 說沒有確定性方法能根治 | 分開驗收：safety 找不變量，liveness 找「需要什麼環境假設」。任何聲稱「必然終止」的共識設計，先問它把 FLP 藏到哪了（timeout？隨機化？） |\n| 動了 quorum 卻沒重驗交集 | 「讀寫各過半改成讀 1 寫 3」「偶數叢集」「動態縮編」——QuorumAssumption 是公理不是定理，任何兩個 quorum 必交是人配置出來的 | 改完 quorum 配置，手算最壞交集：∀ Q1, Q2：Q1 ∩ Q2 ≠ ∅ 還成立嗎？題 1 給你一個 2/4 的反面教材 |\n| 誤讀 msgs 單調的抽象 | 「spec 都沒建模掉訊息，不嚴謹吧」——其實相反：safety 層「遺失」＝「永遠沒收到」，免費涵蓋；真正要小心的是反方向：實作裡重複、亂序送達的舊訊息，spec 裡全部合法 | 讀任何 spec 先問 ch02 的問題：它建模了什麼、刻意忽略什麼、忽略是否誠實。對 Paxos：safety 不靠送達，liveness 才靠 |\n\n## 紙上推演\n\n### 題 1：打破 quorum 假設（[20 分鐘] ★★）\n\n四台 acceptors {a1, a2, a3, a4}，有人把 quorum 定義成「任意兩台」（理由：「讀寫都快」）。注意 {a1, a2} ∩ {a3, a4} = {}——QuorumAssumption 的第二行死了。請**完全遵守** Paxos.tla 的四個 action，構造一條 behavior 使兩個不同的值都被選定。逐步列出每台 acceptor 的 (maxBal, maxVBal, maxVal)。然後回答：四台機器的正確 quorum 該是什麼？這跟「etcd 建議奇數台」有什麼關係？\n\n### 推演解答\n\n每條規則都照走，照樣分歧：\n\n1. Phase1a(1)：1a⟨1⟩。\n2. Phase1b(a1)、Phase1b(a2)：a1 = a2 = (1, −1, None)，兩張白紙 1b。\n3. Phase2a(1, x)：Q = {a1, a2} 是合法 quorum、1b 收齊、Q1bv = {} ⇒ 自由選 x。2a⟨1, x⟩。\n4. Phase2b(a1)、Phase2b(a2)：a1 = a2 = (1, 1, x)。**ChosenAt(1, x)**——quorum {a1, a2} 全票。\n5. Phase1a(2)：1a⟨2⟩。\n6. Phase1b(a3)、Phase1b(a4)：a3 = a4 = (2, −1, None)。注意：**它們從沒見過 ballot 1 的任何訊息**，1b 是白紙——而這完全合法。\n7. Phase2a(2, y)：Q = {a3, a4} 是合法 quorum、1b 收齊、Q1bv = {} ⇒ (a) 成立 ⇒ **自由選 y**。2a⟨2, y⟩。\n8. Phase2b(a3)、Phase2b(a4)：a3 = a4 = (2, 2, y)。**ChosenAt(2, y)**。chosen = {x, y}，分歧。\n\n兇手不是任何一條規則，是公理：P2c 寫「a majority of acceptors」不是修辭——**(b) 能看到歷史的唯一原因是 S 與既有的選定 quorum 相交**。{a3, a4} 跟 {a1, a2} 不相交，歷史對它就是不存在。四台的正確 quorum 是任意三台（任兩個三元集必交），容錯量 1——跟三台叢集一樣，但多付一台機器的錢、寫入還要多等一票。這就是 etcd 文件勸你用奇數台的數學根源：偶數台的多數派門檻上升，容錯量卻不變，純虧。\n\n### 題 2：在小例上驗 P2c（[15 分鐘] ★★）\n\n基準三台。某狀態下 msgs 恰好含三張 1b（沒有任何 ballot 2 的 2a）：\n\n- 1b⟨a1, 2, −1, None⟩\n- 1b⟨a2, 2, 1, y⟩\n- 1b⟨a3, 2, −1, None⟩\n\n（即：三台都回應過 1a⟨2⟩；a2 曾在 ballot 1 投過 y，另外兩台從未投票。）回答：(i) 取 Q = {a2, a3}，Phase2a(2, v) 對哪些 v 是 enabled？(ii) 取 Q = {a1, a3} 呢？(iii) 若 proposer 用 (ii) 的 Q 發出 2a⟨2, x⟩（x ≠ y），msgs 裡會同時存在 2a⟨1, y⟩（a2 那票的來源）與 2a⟨2, x⟩——兩個 ballot、兩個值。這安全嗎？用 Voting 的 SafeAt 語言說明。\n\n### 推演解答\n\n(i) Q1b 蓋住 {a2, a3} ✓；Q1bv = {1b⟨a2, 2, 1, y⟩} ≠ {}，最高票唯一，其 mval = y ⇒ **只有 v = y enabled**——P2c 的 (b)：a2 的歷史綁死了你。\n\n(ii) Q1b 蓋住 {a1, a3} ✓；Q1bv = {} ⇒ 第一個 disjunct 成立 ⇒ **任何 v ∈ Value 都 enabled**——P2c 的 (a)：這個 quorum 是白紙。\n\n(iii) 安全，而且這是本題真正的考點：**同一個狀態，不同 quorum 給出不同的束縛，而兩者都對**。檢查 y 還有沒有機會在 ballot 1 被選定：ChosenAt(1, y) 需要一個 quorum 在 ballot 1 全票投 y，而每個 quorum 都含 a1 或 a3 至少一個；a1、a3 的 maxBal 已是 2 且未在 ballot 1 投票——這正是 Voting 的 CannotVoteAt(a, 1)：promise 線高過 1，Phase2b 的 guard 永遠擋掉 ballot 1 的 accept 請求。所以 NoneOtherChoosableAt(1, x) 成立（{a1, a3} 作證），SafeAt(2, x) 成立：**ballot 1 的 y 已經永遠湊不滿多數，x 在 ballot 2 暢行無阻**。a2 那張 ⟨1, y⟩ 的票成了死票。順帶驗證 OneValuePerBallot 無恙：它只要求**同一** ballot 內值唯一，跨 ballot 不同值本來就是 Paxos 的日常——被選定的值唯一，靠的是 P2c，不是「值從不變化」。\n\n### 題 3：改一個 guard，找出分歧（[25 分鐘] ★★★）\n\n同事覺得 Phase2b 的 guard 太嚴：「跟 promise 比太保守了，跟**最後一票**比就夠了吧。」他把 `m.bal \\geq maxBal[a]` 改成 `m.bal \\geq maxVBal[a]`（其餘四行不動）。直覺上好像沒差——投過的票本來就擋住更舊的提案？請構造一條 behavior 打破 agreement（基準配置：三台、p1/ballot 1/值 x、p2/ballot 2/值 y），並指出 P2c 在哪一步、以哪種方式被破壞。\n\n### 推演解答\n\n這個改動把 promise 變成廢紙：acceptor 答應過「不收 ballot < 2」，但 guard 不再檢查 maxBal，承諾無人兌現。反例（每步都標 guard 計算）：\n\n1. p1 跑 phase 1：1a⟨1⟩；a1、a2 回白紙 1b ⇒ a1 = a2 = (1, −1, None)。\n2. p2 跑 phase 1：1a⟨2⟩；a2（2 > 1 ✓）、a3（2 > −1 ✓）回白紙 1b ⇒ a2 = (2, −1, None)、a3 = (2, −1, None)。\n3. Phase2a(2, y)：Q = {a2, a3}，1b 收齊、Q1bv = {} ⇒ 自由選 y。2a⟨2, y⟩。**此刻 P2c 的 (a) 成立**——靠的是 a2、a3 的承諾「不再接受 ballot < 2」。\n4. Phase2a(1, x)：Q = {a1, a2}——注意第 1 步的兩張 1b **還在 msgs 裡**（msgs 單調），收齊 ✓、Q1bv = {} ⇒ 自由選 x。2a⟨1, x⟩。p1 不知道 a2 已經改宗；原版 Paxos 裡這張遲到的 2a 無害，因為 a2 會拒收。\n5. 變體 Phase2b(a1)：1 ≥ maxVBal[a1] = −1 ✓ ⇒ a1 投 ⟨1, x⟩。\n6. 變體 Phase2b(a2)：1 ≥ maxVBal[a2] = −1 ✓（**原版會檢查 1 ≥ maxBal[a2] = 2，不成立，擋下**）⇒ a2 投 ⟨1, x⟩。**ChosenAt(1, x)**：{a1, a2} 在 ballot 1 全票 x。\n7. Phase2b(a2)：2 ≥ maxVBal[a2] = 1 ✓ ⇒ 投 ⟨2, y⟩；Phase2b(a3)：2 ≥ −1 ✓ ⇒ 投 ⟨2, y⟩。**ChosenAt(2, y)**。chosen = {x, y}。\n\nP2c 的破壞方式是**追溯**的：第 3 步發出 ⟨2, y⟩ 時 (a) 真實成立；第 6 步 a2 收下 ballot 1 的提案，讓「S 裡沒人接受過編號 < 2 的提案」**事後變假**。這正是 Lamport 那句「predicting future acceptances is hard」的全部份量：(a) 必須對未來成立，而唯一能對未來成立的方法是 promise＋兌現。maxBal 這條線不是最佳化，是 P2c 的 (a) 從快照升級成永久敘述的機制。工程鏡像：promise 沒落盤、重啟後 maxBal 歸零，行為跟這個變體一模一樣——「我答應過誰？沒印象。」\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 共識的 agreement／validity／termination 各說什麼？FLP 的一句話版是什麼？Paxos 對著 FLP 做了哪邊的取捨？\n2. P2 → P2a → P2b → P2c 每一步把責任從誰下放給誰？驅動每次下放的共同困境是什麼（提示：誰觀測得到「被選定」）？\n3. P2c 的 (a) 與 (b) 各對應 phase 1 回應的什麼情況？promise 在守哪一個？為什麼說 (a) 是對未來的敘述？\n4. 為什麼任何兩個 quorum 必須相交？拿掉交集假設後分歧反例長什麼樣（口述題 1 的劇情）？\n5. Paxos.tla 的 maxBal、maxVBal、maxVal 各扮演什麼角色？哪個是承諾線、哪兩個是最後一票？為什麼三者都必須單調不回退？\n6. 「x 已被選定」在第幾類述語（狀態／action／時序，ch06）？為什麼定案的瞬間可以沒有任何節點知道？\n7. Consensus → Voting → Paxos 三層各自抽象掉什麼？`THEOREM Spec => V!Spec` 這一行在主張什麼？（ch15 會把證明方法補上。）\n8. duelling proposers 為什麼不違反 Spec？工程上的緩解手段是什麼？為什麼那個緩解就算失敗也不傷 safety？\n\n## 延伸閱讀\n\n- **Paxos Made Simple**（Leslie Lamport, 2001）：`https://lamport.azurewebsites.net/pubs/paxos-simple.pdf`（2026-06 驗證可下載）。本章 P1／P2／P2a／P2b／P2c 引文與 phase 1/2 推導全部出自 §2.2「Choosing a Value」，十四頁讀完整個不變量鏈；§2.4「Progress」是 duelling proposers 與 FLP 取捨的原始出處。\n- **Consensus.tla／Voting.tla／Paxos.tla**（Lamport）：`https://github.com/tlaplus/Examples/blob/master/specifications/Paxos/Paxos.tla`（同目錄三份，2026-06 驗證存在）。把 Voting.tla 的 ShowsSafety 定理對照本章的 ⟨1⟩ 論證讀；Consensus.tla 裡那段 TLAPS 證明是 ch16 的預習材料。\n- **Impossibility of Distributed Consensus with One Faulty Process**（M. Fischer, N. Lynch, M. Paterson, *JACM* 32(2), 1985）：`https://groups.csail.mit.edu/tds/papers/Lynch/jacm85.pdf`（2026-06 可得）。FLP 本尊。本書不證；讀第 1 節與主定理的敘述，把「非同步＋一個 crash ⇒ 不存在確定性又必然終止的共識」這句話的每個限定詞讀準就值回票價。\n- **The Part-Time Parliament**（Lamport, *ACM TOCS* 1998）：`https://lamport.azurewebsites.net/pubs/pubs.html#lamport-paxos`（Lamport 出版品頁錨點）。寓言包裝的原始論文，當文化史讀——理解「Paxos 難」的名聲有一半是文體造成的，順便看 Lamport 在出版品頁上對這篇的自述。\n"}, {"id": "ch13-raft", "file": "ch13-raft.md", "group": "Part IV — 協議精讀", "title": "ch13 — Raft：工程化的共識，對照精讀", "md": "# ch13 — Raft：工程化的共識，對照精讀\n\n> **本章解決什麼問題**：ch12 你用「不變量先於演算法」的順序啃下了 Paxos；本章讀它最成功的工程化對照組——Raft，一個把「好懂」當成一級設計需求的共識演算法。三項任務：用論文的五條 safety 性質當地圖，理解 leader election 與 log replication；精讀 Diego Ongaro 親手寫的 raft.tla（471 行，一份工業級 spec 的真實長相）；在 5 個節點上手推一場含 split vote 的選舉，全程驗 Election Safety。Part IV 的協議精讀到此收官，ch14 起我們帶著這些素材爬上證明層。\n\n## 從你已知的出發\n\n你跟 Raft 的距離比想像中近。你排程結算 pipeline 用的 K8s CronJob、每一次 `kubectl apply`，最後都落到 etcd——而 etcd 的複製核心就是 Raft。你維運的那個 3 節點 etcd 叢集「掛一台沒事、掛兩台只能哭」的行為，本章讀完你能從一行 TLA+ 定義直接推出來。\n\n三個你已有的直覺，先對好頻道：\n\n**term ≈ 世代編號（epoch / generation）**。ch12 說 ballot ≈ optimistic lock 的版本號；Raft 的 term 是同一個直覺，但綁得更死：整個叢集的時間被切成一段段 term，**每個 term 至多一個 leader**。任何訊息都蓋著 term 戳章，舊 term 的訊息一律被「你過時了」打回票。你在 DB 樂觀鎖衝突時回 409 的肌肉記憶，整套適用。\n\n**split vote ≈ 重試碰撞**。兩個 client 同時逾時、同時重試、又同時撞在一起——你在 backoff 沒加 jitter 的系統上看過這齣戲。Raft 的選舉一模一樣：多個候選人同時發起、票數均分、沒人過半，只好下一輪再來。Raft 的解法也是你的解法：隨機化逾時（jitter）。本章 worked example 會把這齣戲一步一步演完。\n\n**log replication ≈ 主從複製**。Raft 是強 leader 設計：所有寫入走 leader，leader 把自己的 log 單向推給 followers——你管理過的 MySQL primary 把 binlog 推給 replica 就是這個形狀。Raft 多做的事，是把「primary 掛了誰接班、接班的人憑什麼不丟資料」這兩個你靠維運手冊與運氣處理的問題，變成有定理保護的機制。\n\n## 設計目標：把 understandability 當成需求\n\nRaft 論文的標題就是宣言：*In Search of an Understandable Consensus Algorithm*（Ongaro & Ousterhout，USENIX ATC 2014；官網稱該文獲當年 Best Paper Award）。摘要的第一段話值得記住：Raft 產出與 (multi-)Paxos 等價的結果、效率相當，但結構不同——而結構不同的目的就是好懂，以及給實際系統一個更好的地基。\n\n「好懂」怎麼變成設計手段？論文給了兩招：\n\n1. **分解（decomposition）**：把共識拆成 leader election、log replication、safety 三個近乎獨立的子問題，各自理解、各自論證。\n2. **縮小狀態空間（state space reduction）**：用更強的約束減少你必須考慮的情況——log 不准有洞、資料只從 leader 單向流向 follower、log 之間的不一致被限制成「落後」或「多出一段未提交的尾巴」兩種形狀。\n\n第二招你應該覺得耳熟：這就是 ch09 講的 state explosion，從演算法設計端動手。Paxos 允許的交錯多、對稱性高，所以「為什麼對」難講；Raft 用強 leader 把大量交錯直接定義成不存在。複雜度沒有消失——這是本章後面對照討論的主軸——但它被搬到了更容易說清楚的地方。\n\n## 機制速覽：term、選舉、複製\n\n每個 server 任一時刻處於三種狀態之一。先把狀態機畫出來：\n\n```text\n┌──────────┐   逾時，term+1   ┌───────────┐   獲得過半選票   ┌────────┐\n│ Follower │ ───────────────► │ Candidate │ ───────────────► │ Leader │\n└──────────┘                  └───────────┘                  └────────┘\n     ▲                                                            │\n     │             看到更高的 term：一律退回 Follower             │\n     └────────────────────────────────────────────────────────────┘\n```\n\n（Candidate 逾時還沒選出結果時，把 term 再加一、留在 Candidate 重選——這條自環圖上省略，worked example 會走到。）\n\n**term**：單調遞增的整數，從 1 起算（本書基準；raft.tla 的初始值也正是 1，稍後精讀時看得到）。term 是 Raft 的邏輯時鐘：每個 server 記著自己的 `currentTerm`，訊息帶著發送者的 term，誰看到更高的 term 就立刻追上去並退回 Follower；誰收到更低 term 的請求就拒絕。\n\n**選舉**：Follower 一段時間沒收到 leader 的心跳（AppendEntries 空包）就逾時，把 term 加一、轉成 Candidate、投自己一票、向所有人發 RequestVote。拿到**過半**選票就成為該 term 的 leader。投票有兩條鐵律：\n\n- 一個 server 在一個 term 內至多投一票（先到先得）。\n- 投票者只把票投給「log 至少跟我一樣新」的候選人。「一樣新」的比較法：先比最後一筆 entry 的 term，term 大者新；term 相同則 log 長者新（論文 §5.4.1）。\n\n第二條是 Raft 把複雜度搬家的關鍵動作，精讀段會逐字讀它的 TLA+ 寫法。\n\n**複製**：client 的請求進到 leader，leader 把它接在自己 log 尾端（蓋上 currentTerm 戳章），再用 AppendEntries 推給所有 followers。AppendEntries 帶著「新 entry 的前一格」的 index 與 term（`prevLogIndex` / `prevLogTerm`），follower 核對自己 log 的同一格：對得上才收，對不上就拒絕，leader 把 `nextIndex` 往回退再試。這個一致性檢查配合「leader 只追加、絕不改寫自己的 log」，歸納地維持了所有 log 的前綴一致。\n\n**提交（commit）**：當某筆 entry 被複製到過半 server，**且該筆 entry 屬於 leader 的當前 term**，leader 才把 `commitIndex` 推進到它；committed 的 entry 才能 apply 到狀態機、回覆 client。後半句的 term 限制看起來像贅肉，其實是整個演算法最精微的一條防線——紙上推演的題 2 會讓你親手拆掉它，看著已提交的資料被覆寫。\n\n## 五條 safety 性質：Raft 的地圖\n\n論文 Figure 3 列出五條任何時刻都成立的性質，圖說寫得很滿：「Raft guarantees that each of these properties is true at all times.」措辭照原文（引號內為論文原文，後附白話）：\n\n1. **Election Safety**：「at most one leader can be elected in a given term.」（§5.2）——一個 term 至多選出一個 leader。\n2. **Leader Append-Only**：「a leader never overwrites or deletes entries in its log; it only appends new entries.」（§5.3）——leader 絕不改寫或刪除自己的 log，只追加。\n3. **Log Matching**：「if two logs contain an entry with the same index and term, then the logs are identical in all entries up through the given index.」（§5.3）——兩份 log 若在同一 index 有同 term 的 entry，則到該 index 為止整段相同。\n4. **Leader Completeness**：「if a log entry is committed in a given term, then that entry will be present in the logs of the leaders for all higher-numbered terms.」（§5.4）——某 term 內提交的 entry，必出現在所有更高 term 的 leader 的 log 裡。\n5. **State Machine Safety**：「if a server has applied a log entry at a given index to its state machine, no other server will ever apply a different log entry for the same index.」（§5.4.3）——只要有一台 server 在某 index apply 了某筆 entry，就不會有任何 server 在同一 index apply 不同的 entry。\n\n這五條不是並列的雜貨清單，是一條推導鏈。State Machine Safety 是端到端的承諾——論文自己說它是「the key safety property for Raft」，地位等同 2PC 的 `TCConsistent`（見 ch11）與 Paxos 的 agreement（見 ch12）。前四條是支撐它的鷹架：\n\n- Election Safety 來自「一 term 一票＋quorum 相交」（worked example 末尾給層級證明的骨架）。\n- Leader Append-Only 是設計約束：spec 裡 leader 改 log 的唯一動作就是 Append。\n- Log Matching 由 AppendEntries 的一致性檢查歸納維持。\n- Leader Completeness 由兩道閘門合力：投票限制（log 不夠新的人選不上）＋提交限制（只對當前 term 的 entry 計票 commit）。\n- 有了 Leader Completeness 與 Log Matching，committed entry 在所有後續 leader 手上且位置唯一，apply 自然一致——State Machine Safety 得證（本書不展開完整證明，見延伸閱讀的論文 §5.4.3 與 Ongaro 博士論文附錄）。\n\n讀協議時把這張地圖放手邊：每看到一條規則，先問「它在替哪條性質扛事」。\n\n## raft.tla 開箱：一份工業級 spec 的結構\n\n精讀對象：Ongaro 本人維護的 `raft.tla`（repo `https://github.com/ongardie/raft.tla`，CC-BY 4.0；README 自述比博士論文版本略有更新，2026-06 查證）。471 行，是你目前讀過最大的 spec——但解剖學跟 ch08 完全一樣：CONSTANTS、VARIABLES、Init、一堆具名 action、Next、`Spec == Init /\\ [][Next]_vars`。先看三個結構性亮點。\n\n**訊息是 bag，不是 set。**\n\n```tla\n\\* A bag of records representing requests and responses sent from one server\n\\* to another. TLAPS doesn't support the Bags module, so this is a function\n\\* mapping Message to Nat.\nVARIABLE messages\n```\n\nch04 那場「at-least-once 的訊息該用 set 還是 bag」的辯論，Ongaro 用行動投了票：網路會重複投遞（spec 裡有 `DuplicateMessage` action）、會丟（`DropMessage`），同一則訊息在途中的份數有意義，所以用 multiset——實作成「訊息 ↦ 份數」的函數，註解還誠實交代了原因：TLAPS 不支援 Bags 模組。工業級 spec 處處是這種「理論選型×工具現實」的妥協痕跡。\n\n**history variables：只為證明而活的變數。**\n\n```tla\n\\* A history variable used in the proof. This would not be present in an\n\\* implementation.\n\\* Keeps track of successful elections, including the initial logs of the\n\\* leader and voters' logs. Set of functions containing various things about\n\\* successful elections (see BecomeLeader).\nVARIABLE elections\n```\n\n`elections`、`allLogs`、`voterLog` 三個變數都掛著同一句註解：「This would not be present in an implementation.」它們不影響協議行為，只是把歷史抄寫下來，讓性質可以寫成狀態述語——ch06 你在 `NoDoublePay` 上學過「把行為層的願望改寫成狀態層的述語」，ch14 會把這招正名為「把歷史編碼進狀態」，ch15 講 refinement 時 auxiliary variables 還會再登場。在這裡你先看到它的工業用法。\n\n**quorum 的定義只有一行，註解卻是整個 ch12 的回聲。**\n\n```tla\n\\* The set of all quorums. This just calculates simple majorities, but the only\n\\* important property is that every quorum overlaps with every other.\nQuorum == {i \\in SUBSET(Server) : Cardinality(i) * 2 > Cardinality(Server)}\n```\n\n「唯一重要的性質是任兩個 quorum 相交」——Paxos 靠它，Raft 也靠它（見 ch12）。SUBSET 是冪集（ch04），基數兩倍大於全集就是「過半」。5 個節點時，quorum = 任何 ≥ 3 台的子集。你的 etcd 叢集掛 2 台寫不進去，就是這一行：剩 1 台湊不出任何 quorum。\n\n另外三件值得一瞥的事：(1) `InitServerVars` 把 `currentTerm` 初始化為 `[i \\in Server |-> 1]`——term 從 1 起算，與本書基準一致；(2) `Restart(i)` 的 UNCHANGED 清單就是持久化需求的形式化——crash 重啟後只留 `currentTerm`、`votedFor`、`log` 三樣，恰是論文要求落盤的三樣；(3) 這份 spec **沒有**建模 membership change 與 snapshot/log compaction（`Server` 是固定常數），也沒有任何時間與機率——randomized timeout 在 spec 裡不存在，`Timeout(i)` 任何時刻都可能發生。\n\nASCII 對照補一條：這份 spec 裡的否定寫 `\\lnot`（ch06 對照表列的是 `~`，兩者等價，TLA+ 都收）。\n\n## 精讀一：投票條件（HandleRequestVoteRequest）\n\n```tla\n\\* Server i receives a RequestVote request from server j with\n\\* m.mterm <= currentTerm[i].\nHandleRequestVoteRequest(i, j, m) ==\n    LET logOk == \\/ m.mlastLogTerm > LastTerm(log[i])\n                 \\/ /\\ m.mlastLogTerm = LastTerm(log[i])\n                    /\\ m.mlastLogIndex >= Len(log[i])\n        grant == /\\ m.mterm = currentTerm[i]\n                 /\\ logOk\n                 /\\ votedFor[i] \\in {Nil, j}\n    IN /\\ m.mterm <= currentTerm[i]\n       /\\ \\/ grant  /\\ votedFor' = [votedFor EXCEPT ![i] = j]\n          \\/ ~grant /\\ UNCHANGED votedFor\n       /\\ Reply([mtype        |-> RequestVoteResponse,\n                 mterm        |-> currentTerm[i],\n                 mvoteGranted |-> grant,\n                 \\* mlog is used just for the `elections' history variable for\n                 \\* the proof. It would not exist in a real implementation.\n                 mlog         |-> log[i],\n                 msource      |-> i,\n                 mdest        |-> j],\n                 m)\n       /\\ UNCHANGED <<state, currentTerm, candidateVars, leaderVars, logVars>>\n```\n\n逐段拆。`i` 是收件者（投票者）、`j` 是候選人、`m` 是請求。\n\n**`logOk`：選舉時的「夠新」檢查。**這就是論文 §5.4.1 的 up-to-date 比較，翻成邏輯式只有三行：候選人最後一筆的 term 嚴格較大（第一個 disjunct）；或 term 打平、且候選人的 log 不比我短（第二個 disjunct）。`LastTerm` 是個輔助定義，空 log 回 0：\n\n```tla\nLastTerm(xlog) == IF Len(xlog) = 0 THEN 0 ELSE xlog[Len(xlog)].term\n```\n\n把白話「至少跟我一樣新」翻成可計算的字典序比較 ⟨lastTerm, len⟩，這是 ch03 練的翻譯功。它在替 Leader Completeness 扛事：committed entry 在過半機器上，而當選需要過半票，兩個過半必相交——所以**任何當選者至少跟某台「持有所有 committed entry」的機器一樣新**。\n\n**`grant`：三個合取缺一不可。**term 必須**正好相等**（注意不是 ≤，題 3 會考你為什麼）；log 夠新；而且我這個 term 的票還沒投給別人——`votedFor[i] \\in {Nil, j}` 同時涵蓋「還沒投」與「就是投給你（重複請求，冪等重投）」兩種情況。一 term 一票的鐵律就藏在這個 ∈ 裡。\n\n**`IN` 之後：guard 加三個著落。**`m.mterm <= currentTerm[i]` 是這個 handler 的適用範圍——那「m.mterm 較大」的訊息誰處理？答案在 `Receive` 的析取裡：`UpdateTerm` 這個 action 先把收件者的 term 追上去（並退回 Follower、清空 votedFor），而且**不消費訊息**——原文註解寫明「messages is unchanged so m can be processed further」——下一步同一則訊息再進到本 handler，此時 term 已對齊。一次「收到高 term 訊息」被拆成兩個原子步，這是 spec 作者刻意把原子區域切小（atomic region 越小，涵蓋的實作越多；代價是狀態變多，ch09 的老朋友）。最後 `Reply` 一個動作完成「取出請求、放入回應」，回應裡帶著 `mvoteGranted` 與我的 currentTerm。\n\n## 精讀二：log 一致性檢查（HandleAppendEntriesRequest）\n\n這個 action 全長 63 行，是 spec 裡最大的一塊。骨架是一個 `logOk` 加三岔路（拒絕／candidate 退位／接受），接受裡再分三種情況。先讀 `logOk`：\n\n```tla\nHandleAppendEntriesRequest(i, j, m) ==\n    LET logOk == \\/ m.mprevLogIndex = 0\n                 \\/ /\\ m.mprevLogIndex > 0\n                    /\\ m.mprevLogIndex <= Len(log[i])\n                    /\\ m.mprevLogTerm = log[i][m.mprevLogIndex].term\n    IN /\\ m.mterm <= currentTerm[i]\n```\n\n跟投票的 `logOk` 同名不同職：**這裡檢查的是「新 entry 的接點」**。leader 說「我要把 entry 接在你 log 的第 `mprevLogIndex` 格之後」，follower 核對：要嘛接點是 0（從頭開始，空前綴恆成立——注意這是 ch03 的良性 vacuous truth），要嘛我的 log 真的有那一格、而且那一格的 term 跟你說的一致。**同 index 同 term ⇒ 同 entry ⇒（歸納地）同前綴**——這個檢查每通過一次，Log Matching 的歸納步就被推進一格。ch05 的歸納法在這裡不是證明技巧，是協議本身的運轉方式。\n\n接受分支裡最有戲的是衝突處理：\n\n```tla\n                   \\/ \\* conflict: remove 1 entry\n                       /\\ m.mentries /= << >>\n                       /\\ Len(log[i]) >= index\n                       /\\ log[i][index].term /= m.mentries[1].term\n                       /\\ LET new == [index2 \\in 1..(Len(log[i]) - 1) |->\n                                          log[i][index2]]\n                          IN log' = [log EXCEPT ![i] = new]\n                       /\\ UNCHANGED <<serverVars, commitIndex, messages>>\n                   \\/ \\* no conflict: append entry\n                       /\\ m.mentries /= << >>\n                       /\\ Len(log[i]) = m.mprevLogIndex\n                       /\\ log' = [log EXCEPT ![i] =\n                                      Append(log[i], m.mentries[1])]\n                       /\\ UNCHANGED <<serverVars, commitIndex, messages>>\n```\n\n接點對上了，但我的 log 在接點之後還有舊東西、而且 term 對不上？這是「未提交的尾巴」——上個 term 留下的孤兒 entry。spec 的處理方式很有意思：**一步只刪最後一筆**（把 log 縮短一格的函數重建），不是一刀把整段尾巴砍掉。同一份訊息會被反覆處理（它還在 bag 裡），一步刪一筆，直到衝突清光、走到 append 分支。又是「最小原子步」哲學：實作可以一次截斷整段，spec 用更細的步涵蓋它（什麼叫「涵蓋」，ch15 的 refinement 給正式答案）。也注意被刪的只可能是 follower log 的尾巴、且 term 與現任 leader 衝突——committed entry 為什麼永遠刪不到？這正是 Leader Completeness 在罩著（推演題 2 拆給你看）。\n\n## 精讀三：BecomeLeader\n\n```tla\n\\* Candidate i transitions to leader.\nBecomeLeader(i) ==\n    /\\ state[i] = Candidate\n    /\\ votesGranted[i] \\in Quorum\n    /\\ state'      = [state EXCEPT ![i] = Leader]\n    /\\ nextIndex'  = [nextIndex EXCEPT ![i] =\n                         [j \\in Server |-> Len(log[i]) + 1]]\n    /\\ matchIndex' = [matchIndex EXCEPT ![i] =\n                         [j \\in Server |-> 0]]\n    /\\ elections'  = elections \\cup\n                         {[eterm     |-> currentTerm[i],\n                           eleader   |-> i,\n                           elog      |-> log[i],\n                           evotes    |-> votesGranted[i],\n                           evoterLog |-> voterLog[i]]}\n    /\\ UNCHANGED <<messages, currentTerm, votedFor, candidateVars, logVars>>\n```\n\n兩個 guard：我是 Candidate、我的得票集合屬於 Quorum——Election Safety 的執行點就這一行。當選後的兩個重置充滿樂觀與悲觀的分工：`nextIndex` 全體設成 `Len(log[i]) + 1`（樂觀假設大家跟我同步，從我的 log 尾端開始送，不合再退）；`matchIndex` 全體歸零（悲觀記帳：在 follower 親口確認前，不認定任何複製進度——commit 計票只信 matchIndex）。最後往 `elections` 這個 history variable 抄一筆完整的選舉記錄。注意 UNCHANGED 裡有 `messages`：**當選不廣播**。宣告勝選的方式是之後的 AppendEntries（心跳），這也是為什麼舊 leader 可能短暫不知道自己已被取代——下一節的陷阱表會回來談。\n\n## Worked example：5 節點手推一場 split vote 選舉\n\n基準配置：Server = {n1, n2, n3, n4, n5}，全體 log 為空。Quorum 需要 ≥ 3 票。初始狀態（對照 `InitServerVars`）：\n\n| node | state | currentTerm | votedFor |\n|---|---|---|---|\n| n1–n5 | Follower | 1 | Nil |\n\n先把會用到的兩個 action 原文擺上桌。`Timeout`：\n\n```tla\n\\* Server i times out and starts a new election.\nTimeout(i) == /\\ state[i] \\in {Follower, Candidate}\n              /\\ state' = [state EXCEPT ![i] = Candidate]\n              /\\ currentTerm' = [currentTerm EXCEPT ![i] = currentTerm[i] + 1]\n              \\* Most implementations would probably just set the local vote\n              \\* atomically, but messaging localhost for it is weaker.\n              /\\ votedFor' = [votedFor EXCEPT ![i] = Nil]\n              /\\ votesResponded' = [votesResponded EXCEPT ![i] = {}]\n              /\\ votesGranted'   = [votesGranted EXCEPT ![i] = {}]\n              /\\ voterLog'       = [voterLog EXCEPT ![i] = [j \\in {} |-> <<>>]]\n              /\\ UNCHANGED <<messages, leaderVars, logVars>>\n```\n\n（註解又是「最小原子步」哲學：實作通常原子地投自己一票，spec 讓候選人對自己發訊息投票——「messaging localhost for it is weaker」，更弱的假設、更多的行為、更廣的涵蓋。）以及 `UpdateTerm`：\n\n```tla\n\\* Any RPC with a newer term causes the recipient to advance its term first.\nUpdateTerm(i, j, m) ==\n    /\\ m.mterm > currentTerm[i]\n    /\\ currentTerm'    = [currentTerm EXCEPT ![i] = m.mterm]\n    /\\ state'          = [state       EXCEPT ![i] = Follower]\n    /\\ votedFor'       = [votedFor    EXCEPT ![i] = Nil]\n       \\* messages is unchanged so m can be processed further.\n    /\\ UNCHANGED <<messages, candidateVars, leaderVars, logVars>>\n```\n\n### 第一輪：term 2，三人撞線\n\n**步 1–3**：n1、n2、n5 相繼逾時（spec 不問理由：`Timeout` 永遠 enabled，這三步是合法 behavior 的一種選擇——現實裡是三台機器的選舉計時器幾乎同時到期，jitter 失靈的那一天）。各自執行 `Timeout`：轉 Candidate、term 升到 2、votedFor 清成 Nil、票箱清空。\n\n| node | state | currentTerm | votedFor | votesGranted |\n|---|---|---|---|---|\n| n1 | Candidate | 2 | Nil | {} |\n| n2 | Candidate | 2 | Nil | {} |\n| n3 | Follower | 1 | Nil | — |\n| n4 | Follower | 1 | Nil | — |\n| n5 | Candidate | 2 | Nil | {} |\n\n**步 4**：三位候選人各自對所有 server（含自己）執行 `RequestVote`，訊息進 bag。每則請求帶 mterm = 2、mlastLogTerm = 0、mlastLogIndex = 0（log 全空）。\n\n**步 5–7（自投）**：n1 處理自己的請求：`HandleRequestVoteRequest(n1, n1, m)`——m.mterm = 2 = currentTerm ✓；logOk：0 = LastTerm(空) 且 0 ≥ Len(空) ✓（第二個 disjunct）；votedFor = Nil ∈ {Nil, n1} ✓ ⇒ grant，votedFor[n1] ≔ n1，回覆進 bag。接著 `HandleRequestVoteResponse(n1, n1, …)`：m.mterm = 2 = currentTerm ✓、mvoteGranted ⇒ votesGranted[n1] = {n1}。n2、n5 同理。\n\n**步 8（n3 的票）**：n1 → n3 的請求先到。n3 的 currentTerm = 1 < 2，`HandleRequestVoteRequest` 的 guard `m.mterm <= currentTerm[i]` 不成立——先走 `UpdateTerm(n3, n1, m)`：term ≔ 2、維持 Follower、votedFor ≔ Nil，**訊息留在 bag**。下一步同一則訊息再進 handler：grant ✓，votedFor[n3] ≔ n1。回應送達後 votesGranted[n1] = {n1, n3}。\n\n**步 9（n4 的票）**：對稱地，n2 → n4 的請求先到，兩步（UpdateTerm＋grant）後 votedFor[n4] ≔ n2，votesGranted[n2] = {n2, n4}。\n\n**步 10（其餘請求全數碰壁）**：n2 → n3：m.mterm = 2 = currentTerm[n3] ✓、logOk ✓，但 votedFor[n3] = n1 ∉ {Nil, n2} ⇒ grant = FALSE，回 mvoteGranted = FALSE（票已投出，恕不退換）。n5 → n3、n1 → n4、n5 → n4 同型。候選人互投也一樣：n1 → n2 的請求遇上 votedFor[n2] = n2 ⇒ 拒。所有拒絕回應只讓 votesResponded 長大，votesGranted 不動。\n\n**term 2 票數表（終局）**：\n\n| 候選人 | 票來源 | 票數 | 過半（≥ 3）？ |\n|---|---|---|---|\n| n1 | {n1, n3} | 2 | ✗ |\n| n2 | {n2, n4} | 2 | ✗ |\n| n5 | {n5} | 1 | ✗ |\n\n2 + 2 + 1 = 5，五張票發完，沒人過半。為什麼**這個 term 永遠選不出來**？五台機器的 votedFor 在 term 2 都已非 Nil；grant 要求 votedFor ∈ {Nil, j}，所以重送請求只可能重複拿到同一張票（冪等），票數凍結在 2/2/1。`BecomeLeader` 對三位候選人都不 enabled——`votesGranted[i] \\in Quorum` 永遠為假。這就是 split vote：沒人輸，但也沒人贏。\n\n**驗 Election Safety（term 2）**：當選 leader 數 = 0 ≤ 1 ✓。成立得有點空虛——這是誠實的空虛，性質只說「至多一個」，沒說「至少一個」。「終究會選出 leader」是 liveness，這份 spec 的 `Spec == Init /\\ [][Next]_vars` 連 fairness 都沒寫，根本沒做這個承諾（ch07 的允許清單 vs 待辦清單）。現實中靠 randomized timeout 讓三人再度撞線的機率指數衰減，但機率與時間都不在 spec 的語彙裡；而 FLP（見 ch12）保證這種「壞運氣無限延續」的 behavior 在非同步模型下無法根除。\n\n### 第二輪：term 3，n3 收割\n\n**步 11**：n3 逾時（guard：Follower ∈ {Follower, Candidate} ✓）：Candidate、term ≔ 3、votedFor ≔ Nil，廣播 RequestVote（mterm = 3）。\n\n**步 12**：n3 自投：votesGranted[n3] = {n3}，votedFor[n3] ≔ n3。\n\n**步 13**：n1（Candidate，term 2）收到 n3 的請求：3 > 2 ⇒ `UpdateTerm`——**現任候選人就地退位**：Follower、term ≔ 3、votedFor ≔ Nil。同訊息再處理：grant ✓（log 同空，logOk；票未投）⇒ votedFor[n1] ≔ n3。回應到手：votesGranted[n3] = {n3, n1}。\n\n**步 14**：n2 同理：votesGranted[n3] = {n3, n1, n2}。\n\n**步 15**：`BecomeLeader(n3)`：state[n3] = Candidate ✓；votesGranted[n3] = {n3, n1, n2}，基數 3，3 × 2 = 6 > 5 ⇒ ∈ Quorum ✓。n3 成為 term 3 的 leader：nextIndex[n3] 全體 ≔ Len(空) + 1 = 1，matchIndex 全體 ≔ 0，elections 記下 ⟨eterm = 3, eleader = n3, …⟩。n4、n5 的票還沒進來？不需要——quorum 到手即當選；那些遲到的請求與回應之後送達時，n4、n5 會經由 UpdateTerm 跟上 term 3（n5 這位 term 2 的候選人同樣退位）；UpdateTerm 不消費訊息（步 8 走過的兩步路徑），所以兩人接著仍可能把這張遲到的票投給 n3——投或不投都是合法分支（非決定性，見 ch02），無關勝負。多餘的回應被 `DropStaleResponse` 清掉。\n\n**最終狀態表**：\n\n| node | state | currentTerm | votedFor |\n|---|---|---|---|\n| n1 | Follower | 3 | n3 |\n| n2 | Follower | 3 | n3 |\n| n3 | **Leader** | 3 | n3 |\n| n4 | Follower | 2 → 3（訊息到達後） | n2 → n3 或 Nil |\n| n5 | Candidate → Follower（同上） | 2 → 3 | n5 → n3 或 Nil |\n\n**驗 Election Safety（全程）**：term 1 無人當選；term 2 無人當選；term 3 恰好 n3。「會不會 term 3 還冒出第二個 leader？」把論證寫成層級證明的骨架（工程師嚴謹度，完整機器驗證見延伸閱讀）：\n\n- ⟨1⟩1. 固定 term T 內，每台 server 至多把票給一個候選人。**證**：votedFor 變成非 Nil 只發生在 grant 分支，而 grant 要求 votedFor ∈ {Nil, j}——只能從 Nil 設為 j，或維持同一個 j；會把 votedFor 清回 Nil 的兩個 action（Timeout、UpdateTerm）都同時把 currentTerm 抬高，term 不動則票不回收。\n- ⟨1⟩2. 在 term T 當選需要一個 quorum 的票，且票全是 term T 的。**證**：BecomeLeader 要求 votesGranted ∈ Quorum；votesGranted 只被 HandleRequestVoteResponse 增長，其 guard 要求 m.mterm = currentTerm[i]。\n- ⟨1⟩3. 假設 term T 有兩個 leader i ≠ j，由 ⟨1⟩2 各有 quorum Qᵢ、Qⱼ；Quorum 定義保證 Qᵢ ∩ Qⱼ ≠ ∅，取 v ∈ Qᵢ ∩ Qⱼ，則 v 在 term T 投了 i 也投了 j，與 ⟨1⟩1 矛盾。∎\n\n## Raft vs Paxos：誰把複雜度搬去哪了\n\nch12 與本章各讀完一個共識協議，現在把它們並排。先說結論：**複雜度守恆**。共識該想清楚的事一件都沒少，Raft 做的是搬家——從「執行期」搬到「選舉期」，從「不變量難懂」搬到「規則清單較長」。\n\n| 維度 | Paxos（見 ch12） | Raft |\n|---|---|---|\n| 角色結構 | 對稱：任何 proposer 隨時可發起，acceptor 規則一視同仁 | 強 leader：一切寫入經 leader，資料單向流動 |\n| 「選哪個值」決定於 | 每次提案：phase 1 從 quorum 的回報裡挑出最高 ballot 的值 | 選舉時一次定案：up-to-date 投票限制保證當選者已持有全部 committed entries |\n| log 結構 | 每個 slot 獨立跑共識，允許有洞 | 單一連續 log，禁止有洞 |\n| 換 leader 的代價 | 隨時可換；新 proposer 要對未定的 slot 逐一補 phase 1 | 選舉本身就是交接：當選者不必回頭問任何人，直接覆寫分歧 |\n| safety 的承載者 | acceptor 的承諾規則＋P2c 不變量 | 五條性質：投票限制與 commit 限制是兩道主閘門 |\n| 理解難點 | 「為什麼這樣就對了」——不變量精巧，機制極簡 | 「規則為什麼這麼多」——每條都直白，合起來才見全貌 |\n\n對照的核心是第二列。Paxos 把「我該提什麼值」的成本攤在**每一次提案**：phase 1 是一輪讀-改-寫，從 quorum 學到「可能已被選定的值」再接力（P2c 在背後撐腰，見 ch12）。Raft 把同一筆成本**一次付清在選舉**：投票者用 ⟨lastTerm, len⟩ 把「資訊不全的人」直接擋在門外，於是 leader 在位期間不必再問任何人「我可以寫嗎」——日常路徑變成無腦的單向複製，這就是工程上覺得 Raft 好寫的真正原因。代價也明碼標價：所有請求擠過一個 leader（吞吐瓶頸與熱點）；機制彼此咬合得緊（election、replication、commit 規則環環相扣，動一條要重新論證全部——題 2 讓你體會）；而 Paxos 的對稱性給了變體更多揮灑空間（Lamport 的 spec 甚至把這個自由度寫成 Voting → Consensus → Paxos 的精化層次，ch15 回收）。\n\n從 TLA+ 的視角看也很有意思：Lamport 的 Paxos.tla 是分層的數學物件，抽象到沒有訊息遺失這回事（不需要——抽象層根本沒建模網路故障的細節）；raft.tla 是一張攤平的工程圖，471 行裡訊息重複、丟失、crash 重啟、持久化清單通通在場。一個是定理的形狀，一個是系統的形狀——這不是優劣，是兩位作者對「spec 該長什麼樣」的立場差異，你在 ch17 會看到業界兩種都用。\n\n## 你手上的 Raft：etcd 與 K8s\n\n最後接回你的日常。etcd 用 Raft 做複製，K8s 把所有 API 物件存在 etcd——你每天 `kubectl apply` 的 YAML、CronJob 的排程狀態、那些 controller 搶的分散式鎖（Lease 物件），底下都是本章的機制在跑：寫入走 leader、AppendEntries 推向 followers、過半確認後 commit。你維運直覺裡的「3 節點掛 1 台沒事」現在有了一行定義（Quorum）、「掛 2 台不能寫」有了證明義務（湊不出 quorum，AdvanceCommitIndex 永遠不 enabled）。業界怎麼用形式化方法對待這類系統、值不值得，是 ch17 的主題。\n\n至於本章刻意略過的兩塊：**membership change**（joint consensus 與 single-server 變更——讓「換叢集成員」這件事本身也走共識）與 **snapshot/log compaction**（log 不能無限長，得截斷成快照），raft.tla 這版都沒建模，機制細節見延伸閱讀的 Ongaro 博士論文。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 把 Election Safety 讀成「任一時刻至多一個 leader」 | 性質是 **per term** 的。舊 term 的 leader 可能還不知道自己已被取代（BecomeLeader 不廣播），系統裡同時有兩台自認 leader 的機器——這完全合法 | 逐字讀性質：「in a given term」。stale leader 的寫入會被 followers 的 term 檢查拒收、它一收到高 term 訊息就退位；安全靠的是 term 戳章，不是「leader 唯一」的幻覺 |\n| 「過半複製＝committed」 | 舊 term 的 entry 被新 leader 補到過半，看起來該 commit 了——commit 它，你就造出「已提交卻被覆寫」的反例（論文 Figure 8） | AdvanceCommitIndex 只對 `term = currentTerm` 的 entry 計票；舊 entry 只能搭新 entry 的便車間接提交。親手推一次（題 2），這條規則才會長在身上 |\n| 把 history variables 當協議的一部分 | 看到 elections、allLogs、voterLog 以為實作要維護它們——白白背上無限增長的狀態 | 認註解：「would not be present in an implementation」。它們只為證明存在，不影響任何 guard 或轉移（ch14、ch15 詳論這類輔助變數） |\n| 用太小的模型下太大的結論 | 3 節點驗過 = 5 節點也對？2+2+1 的三方 split vote 在 3 節點上根本擺不出來；某些 quorum 邊界情況只在 ≥ 5 節點現身 | small scope hypothesis 是賭注不是定理（ch09）：明寫你驗過的參數範圍；換參數前先想「哪些情境是這個規模擺不出來的」 |\n| 以為 spec 保證「選舉終會成功」 | randomized timeout 寫在論文與每份實作裡，於是你以為 liveness 在 spec 裡——spec 沒有時間、沒有機率、沒有 fairness，split vote 無限重演是合法 behavior | 分層歸位：這份 spec 只扛 safety；liveness 論證屬於「fairness ＋ 時序假設」的世界（ch07），且受 FLP 天花板壓著（見 ch12） |\n| 拿這份 spec 推 reconfiguration 的結論 | 「spec 驗過了所以 etcd 的成員變更也安全」——可是 Server 是固定常數，spec 根本沒建模 membership change | 先問「spec 的邊界在哪」再引用它的保證；超出邊界的主張一律重新建模（建模的誠實，ch08） |\n\n## 紙上推演\n\n### 題 1：誰有資格當選？（[20 分鐘] ★★）\n\n5 個節點目前都在 term 6，log 如下（表中數字是各 index 上 entry 的 term）：\n\n| node＼index | 1 | 2 | 3 | 4 |\n|---|---|---|---|---|\n| n1 | 1 | 1 | 4 | — |\n| n2 | 1 | 1 | 4 | 4 |\n| n3 | 1 | 1 | — | — |\n| n4 | 1 | 1 | 4 | 4 |\n| n5 | 1 | 1 | 2 | — |\n\n(a) 對每個節點：若它現在發起 term 7 的選舉，**最理想情況下**（訊息順序任它挑）能拿到哪些票？誰有可能當選？逐一用投票版 logOk 驗。\n(b) 已知 index 3 的 term-4 entry 已在 term 4 提交。哪些節點若當選會違反 Leader Completeness？投票限制有沒有把它們全部擋下？\n(c) n2 與 n4 的 index 4 呢——若 n1 當選後用自己的 log 修剪它們，算不算丟失資料？\n\n### 推演解答\n\n(a) 投票者 v grant 候選人 c 的 logOk 條件：c.lastTerm > v.lastTerm，或（相等且 c.len ≥ v.len）。各節點的 ⟨lastTerm, len⟩：n1 = ⟨4, 3⟩、n2 = ⟨4, 4⟩、n3 = ⟨1, 2⟩、n4 = ⟨4, 4⟩、n5 = ⟨2, 3⟩。\n\n| 候選人 | 能拿到的票（含自己） | 上限 | 過半？ |\n|---|---|---|---|\n| n1 ⟨4,3⟩ | n1；n3（4>1）；n5（4>2）。n2、n4 拒：term 打平但 3 ≥ 4 不成立 | 3 | ✓ 可當選 |\n| n2 ⟨4,4⟩ | 全部：n1（打平且 4≥3）、n3、n4（打平且 4≥4）、n5 | 5 | ✓ 可當選 |\n| n3 ⟨1,2⟩ | 只有自己：對所有人 1 > lastTerm 皆假、打平也不成立 | 1 | ✗ |\n| n4 ⟨4,4⟩ | 同 n2 | 5 | ✓ 可當選 |\n| n5 ⟨2,3⟩ | n5；n3（2>1）。其餘拒 | 2 | ✗ |\n\n(b) committed 的 index 1–3 必須在未來所有 leader 手上。n3 缺 index 3、n5 的 index 3 是不同的 entry（term 2）——它們當選都違反 Leader Completeness。對照 (a)：恰好就是這兩位選不上。這不是巧合，是設計：committed entry 在過半機器上（這裡是 n1、n2、n4），任何 quorum 必與這過半相交，交集裡的機器用 logOk 把「不夠新」的候選人擋掉。性質與機制在這題裡互為鏡像。\n\n(c) 不算。index 4 只在 n2、n4 上（2/5，未過半），而且 term 6 期間沒有任何機制能提交 term 4 的舊 entry（commit 限制）——它**不是** committed entry，只是上個時代未完成的草稿。n1 當選 term 7 後，AppendEntries 的一致性檢查會在 index 4 發現衝突（或直接以 n1 的 log 長度為準修剪），n2、n4 的尾巴被刪——Leader Completeness 與 State Machine Safety 毫髮無傷，因為承諾只覆蓋 committed。注意一個容易刺痛直覺的事實：**n1 比 n2 短卻能當選**——「夠新」不等於「最長」，丟掉沒提交的東西不算丟資料。client 端視角：那筆 entry 沒收到過 ack，本來就該重試（你的 at-least-once 直覺，ch02／ch08）。\n\n### 題 2：拆掉一條規則，造一個壞 Raft（[30 分鐘] ★★★）\n\n把 AdvanceCommitIndex 裡的 term 檢查刪掉——也就是把\n\n```tla\n           newCommitIndex ==\n              IF /\\ agreeIndexes /= {}\n                 /\\ log[i][Max(agreeIndexes)].term = currentTerm[i]\n```\n\n的第二個合取拿掉，允許 leader 對**任何** term 的 entry 計票提交。請在 5 節點上構造一條 behavior，讓一筆「已提交」的 entry 之後被覆寫（違反 Leader Completeness，進而威脅 State Machine Safety）。然後指出：真 Raft 的這條 term 檢查如何讓你的反例走不通。逐步列狀態，標清楚每一步誰在哪個 term、log 長什麼樣。\n\n### 推演解答\n\n這是論文 Figure 8 的場景，換上本書的節點名。記 A = ⟨term 2 的 entry⟩、B = ⟨term 3 的 entry⟩。\n\n**第 1 幕（term 2）**：n1 當選 term 2 的 leader（全空 log，票 {n1, n2, n3}）。client 寫入 A：n1 的 log = [A]。AppendEntries 只成功送達 n2（n2 log = [A]）；給其他人的訊息被 DropMessage 吃掉。A 在 2/5 台上，未提交。n1 失聯（網路分割，它自己不知道）。\n\n**第 2 幕（term 3）**：n5 逾時當選 term 3（票 {n3, n4, n5}——三台 log 皆空或不比 n5 新：n3、n4 空 log，logOk 打平成立）。client 寫入 B：n5 的 log = [B]。**還沒送出任何 AppendEntries**，n5 也失聯。\n\n**第 3 幕（term 4）**：n1 回歸，逾時兩次（Timeout 沒有前置條件，連按兩次合法）把 term 推到 4，發起選舉：n2（⟨2,1⟩ 對 ⟨2,1⟩ 打平且 1 ≥ 1 ✓）、n3（空 ✓）、n4（空 ✓）都 grant——票 {n1, n2, n3}，n1 當選 term 4。它開始修復 followers：把 A 補給 n3（n3 log = [A]）。現在 A 在 {n1, n2, n3} = 3/5 台上。\n\n**第 4 幕（壞規則發動）**：壞 AdvanceCommitIndex 看到 Agree(1) = {n1, n2, n3} ∈ Quorum，不檢查 term，commitIndex[n1] ≔ 1。**A 提交了**：n1 apply A、回覆 client「成功」。隨後 n1 再度失聯——注意它從頭到尾沒寫下任何 term 4 的 entry。\n\n**第 5 幕（term 5，覆寫）**：n5 回歸，逾時把 term 推到 5，發起選舉：它的 ⟨lastTerm, len⟩ = ⟨3, 1⟩。n3：3 > 2 ✓ grant；n4：3 > 0 ✓ grant；加自己——票 {n3, n4, n5}，當選。n5 修復 followers：AppendEntries（prevLogIndex = 0，entry B）發向全體；n2、n3 的 index 1 是 A（term 2 ≠ 3）⇒ 衝突分支刪掉 A、再 append B。連 n1 回歸後也會被同樣修剪。終局：所有 log = [B]。**A——一筆已 ack 給 client 的 committed entry——從宇宙中消失。**Leader Completeness 死於第 5 幕（A 在 term 4 提交，term 5 的 leader 卻沒有它）；State Machine Safety 接著死（n1 已在 index 1 apply 了 A，其餘機器將在同一 index apply B）。\n\n**真 Raft 怎麼擋**：第 4 幕走不通。A 的 term 是 2 ≠ currentTerm 4，湊滿三台也不提交。n1 必須先收一筆 term 4 的新 entry C、把它複製到過半（設 {n1, n2, n3}）——此時 Max(agreeIndexes) 落在 C，term 檢查通過，commitIndex 一口氣蓋過 index 1，**A 搭 C 的便車間接提交**。而一旦那三台的 lastTerm = 4，第 5 幕的 n5（⟨3, 1⟩）再也選不上：任何 quorum 都與 {n1, n2, n3} 相交，交集那台用 logOk 拒投，n5 至多拿 {n4, n5} 兩票。投票限制與 commit 限制是同一條防線的兩段——拆掉任何一段，另一段獨木難支。這也回答了「規則為什麼長這樣」：每一條看似多餘的合取，背後都有一條等著發生的反例。\n\n### 題 3：spec 閱讀題——term 不對齊的訊息去了哪？（[15 分鐘] ★★）\n\n(a) HandleRequestVoteRequest 的 guard 是 `m.mterm <= currentTerm[i]`。m.mterm **大於** currentTerm[i] 的請求，spec 在哪裡、怎麼處理？為什麼 UpdateTerm 的 UNCHANGED 清單裡有 messages 這件事至關重要？\n(b) m.mterm **小於** currentTerm[i] 的請求會拿到票嗎？handler 回覆什麼？這個回覆對發送者有什麼用？\n\n### 推演解答\n\n(a) 在 `Receive(m)` 的析取裡，`UpdateTerm(i, j, m)` 是第一個 disjunct：guard 是 `m.mterm > currentTerm[i]`，效果是把 i 的 term 追平、退回 Follower、清空 votedFor。關鍵在原文註解「messages is unchanged so m can be processed further」——UpdateTerm **不消費訊息**。若它把 m 吃掉，這則請求就永遠失去被投票的機會，候選人少收一張本該到手的票（safety 不破，但行為集合錯了——你建模的不再是 Raft）。留著 m，下一步同一則訊息再進 HandleRequestVoteRequest，此時 term 已相等，正常走 grant 判斷。一次「收到高 term 請求」= 兩個原子步，這是 worked example 步 8 你親手走過的路徑。\n\n(b) 不會。grant 的第一個合取要求 `m.mterm = currentTerm[i]`，stale 請求（m.mterm < currentTerm[i]）使 grant = FALSE——但 action 照樣執行，回覆 ⟨mvoteGranted = FALSE, mterm = currentTerm[i]⟩。這個回覆是糾錯信：發送者收到帶著更高 term 的回應，自己觸發 UpdateTerm 退回 Follower、追上時代。一個在舊 term 裡奮戰的殭屍候選人，就是被這種「拒絕＋附上新 term」的回覆喚醒的。順帶一提：對 stale 的**回應**（不是請求），spec 用 DropStaleResponse 直接丟棄——請求值得回覆糾錯，過期的回應則毫無資訊價值，這個不對稱本身就是設計。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 五條 safety 性質各用一句白話說出來。哪一條是端到端的承諾？其他四條各自在哪個機制裡被執行？\n2. Election Safety 為什麼成立？兩個要素（一 term 一票、quorum 相交）各由 spec 的哪一行扛著？它跟「任一時刻至多一個 leader」差在哪、為什麼後者不成立也沒關係？\n3. raft.tla 有兩個 logOk——投票版與 AppendEntries 版。各檢查什麼？為什麼是兩個不同的條件、各替哪條性質服務？\n4. 為什麼 leader 只能對 current term 的 entry 計票提交？描述放寬後反例的形狀（誰在哪個 term 提交了什麼、誰把它覆寫了）。\n5. 「Raft 把複雜度從提案時搬到選舉時」——展開講：Paxos 的 phase 1 在每次提案做什麼？Raft 用什麼把這件事一次付清？代價是什麼？\n6. raft.tla 裡哪三個變數是 history variables？它們為什麼不影響協議行為、又為什麼存在？\n7. 這份 spec 對「選舉終會成功」做了什麼承諾？randomized timeout 在哪裡——spec、論文、還是實作？split vote 無限重演的 behavior 合法嗎？\n8. 你的 3 節點 etcd 掛 1 台還能寫、掛 2 台不能——用 raft.tla 的 Quorum 定義與 AdvanceCommitIndex 的 guard 解釋給同事聽。\n\n## 延伸閱讀\n\n- **In Search of an Understandable Consensus Algorithm (Extended Version)**（Diego Ongaro & John Ousterhout）：`https://raft.github.io/raft.pdf`。本章五條性質的出處（Figure 3）；§5.4.1 的投票限制與 Figure 8（題 2 的原版）是必讀段落；§6–7 是 membership change 與 snapshot 的概要。會議版發表於 USENIX ATC 2014，官網稱其獲 Best Paper Award。\n- **raft.tla 原始 spec**（Diego Ongaro）：`https://github.com/ongardie/raft.tla`。本章所有引文的出處，CC-BY 4.0；README 自述比博士論文版略有更新，並提醒想跑 TLC 的人參考 PR #4 的修改（2026-06 查證）。通讀一次全文（471 行）是檢驗本章學習成果的最好方式。\n- **Consensus: Bridging Theory and Practice**（Diego Ongaro 博士論文，Stanford, 2014）：`https://github.com/ongardie/dissertation`。membership change（第 4 章）與 log compaction 各有專章；第 8 章與附錄是 safety 證明——README 並提到 Verdi 團隊後來在 Coq 裡完成了核心安全性的機器證明，可作為 ch16「嚴謹度光譜」的真實樣本。\n- **raft.github.io**：Raft 官網。內建 5 節點選舉與複製的互動視覺化（把本章 worked example 動起來），另收錄各語言實作清單與歷年演講；頁面也連到逐步動畫教學 The Secret Lives of Data。\n- **ch12 ⇄ ch13 對讀**：把 Lamport 的 Paxos.tla（見 ch12 的精讀與 `tlaplus/Examples` 路徑）與本章的 raft.tla 並排翻一次——一個是分層的數學物件、一個是攤平的工程圖。兩種 spec 風格的取捨，ch15（refinement）與 ch17（業界實務）各給一半答案。\n"}, {"id": "ch14-inductive-invariants", "file": "ch14-inductive-invariants.md", "group": "Part V — 證明", "title": "ch14 — 歸納不變量：證明 safety 的技藝", "md": "# ch14 — 歸納不變量：證明 safety 的技藝\n\n> **本章解決什麼問題**：ch09 的 TLC 與 ch11 的手推都停在同一道牆前——有限參數下的窮舉再徹底，也只是 checked，不是 proved，而 THEOREM 主張的是任意參數、任意規模。本章把 ch05 的不變量規則升級成能對真協議承重的技藝：三個義務、一個強化迴圈、一套讀卡點的方法；然後打兩場硬仗——SettlementV1 的 `NoDoublePay` 與擴充版 TwoPhase 的 `TCConsistent`（全書證明高峰），兌現 ch08 與 ch11 各欠的那張支票。ch15 的 refinement 與 ch16 的機器證明都假設你走過這一章。\n\n你現在站在全書地圖的這裡：\n\n```text\n┌────────────────────────────────────────────────────────────────────┐\n│ Part I   為什麼需要形式化                                          │\n│   ch01 測試的極限 · ch02 狀態機                                    │\n├────────────────────────────────────────────────────────────────────┤\n│ Part II  數學地基                                                  │\n│   ch03 邏輯 · ch04 集合 · ch05 歸納                                │\n├────────────────────────────────────────────────────────────────────┤\n│ Part III TLA+ 與時序邏輯                                           │\n│   ch06 動作邏輯 · ch07 時序邏輯 · ch08 完整 spec · ch09 TLC 原理   │\n├────────────────────────────────────────────────────────────────────┤\n│ Part IV  協議精讀                                                  │\n│   ch10 互斥 · ch11 2PC · ch12 Paxos · ch13 Raft                    │\n├────────────────────────────────────────────────────────────────────┤\n│ Part V   證明                                          ← 你在這裡  │\n│   ch14 歸納不變量 · ch15 Refinement · ch16 機器證明                │\n├────────────────────────────────────────────────────────────────────┤\n│ Part VI  實務                                                      │\n│   ch17 業界案例 · ch18 方法地圖                                    │\n└────────────────────────────────────────────────────────────────────┘\n```\n\nPart V 三章是這本書的登頂段。Part IV 你精讀了四個協議、手推了它們的狀態空間；從本章起，問題從「這組參數下對不對」變成「**為什麼永遠對**」。三章的分工：本章教你手寫 safety 的證明（歸納不變量），ch15 教你證「實作蘊涵規格」（refinement），ch16 讓機器替你查證每一步（TLAPS）。裝備你都有了——⟨1⟩ 層級格式（ch05）、動作邏輯（ch06）、兩份熟到能背的 spec（ch08、ch11）——本章只是把它們擰成一股繩。\n\n## 從你已知的出發\n\n你最熟練的工作迴圈其實不是寫程式，是修 bug：失敗的測試亮紅燈 → 讀 stack trace，找出第一個不對勁的狀態 → 推測根因、下修正 → 重跑。本章的主迴圈一模一樣，連節奏都一樣：歸納步證不過（紅燈）→ 把卡點具體化成一個「壞前驅」狀態（stack trace）→ 判斷它可不可達（真 bug 還是誤報）→ 強化述語或舉出反例（修正）→ 重證（重跑）。差別只有一個：debug 迴圈收斂時你得到一個不再紅的測試；強化迴圈收斂時你得到一個對所有規模、所有調度一次買斷的定理。\n\n第二條經驗也直接搬得進來。當年排查重複入帳，你在表上加過 `credited_at`、加過 idempotency key——業務邏輯不需要這些欄位，**排查**需要：它們讓「現在的狀態」回答得了「歷史上發生過什麼」。本章管這招叫**輔助述語**：dedup 表是「這則訊息曾經入過帳」的狀態化身；TwoPhase 那個只增不減的 msgs（ch11）是「誰曾經說過什麼」的全量留底。ch05 留過一個觀察：狀態機只有眼前這一格的記憶，性質需要歷史撐腰時，就得把歷史編碼進狀態——本章兌現它。\n\n第三條：你 review 一個 PR 從不重播 git log，你看 diff，心裡的問題是「**假設 main 是好的**，這個 diff 會不會弄壞它」。歸納步就是這句話的數學版：假設步前狀態滿足 Ind，驗證任何一步之後仍滿足。而本章的核心難題，也正是 code review 的核心難題——「main 是好的」到底是哪幾句話？寫得太弱，diff 審不下去；寫得太強，main 自己都不滿足。整章都在練怎麼把這幾句話寫對。\n\n## 為什麼 TLC 不夠：checked ≠ proved\n\nTwoPhase.tla 檔尾那段註解（ch11 照引過）的措辭值得再讀一次：兩條定理「**checked** with TLC for six RMs」。Lamport 沒有寫 proved，因為它就不是。TLC 式窮舉（原理見 ch09）撞牆的位置有三個：\n\n1. **參數是寫死的。**TLC 一次只能代入一組 CONSTANTS；`THEOREM TPSpec ⇒ □TCConsistent` 主張的卻是**任意** RM 集合。2 個 RM 的 56 個可達狀態全綠、6 個 RM 的 50,816 個全綠，對「第 7 個 RM 會不會出事」在邏輯上一個字都沒說。small scope hypothesis（ch09）是個勝率很高的賭注，但賭注不是定理。\n2. **狀態空間可能根本無限。**ch05 的 ping-pong 機 p, q ∈ ℕ，窮舉免談。更陰的是 v1：ledger ∈ [Msgs → Nat]，**型別空間無限**，可達空間有限——但「可達空間有限」這件事本身是 dedup 守出來的秩序（ch08 原話），是一條待證的定理。用「先窮舉看看」去確認「可不可以窮舉」，邏輯上是繞圈。\n3. **就算有限，也是指數。**56 到 50,816 只隔了四個 RM（ch11）。窮舉的成本曲線你在 ch09 算過，不再重算。\n\n歸納證明為什麼能一次買斷？ch05 講過的那句話是全部的答案：**案例分析按動作分、不按參數分**。動作就那幾個，訊息三十萬則也是那幾個 case。\n\n不過先別把 TLC 掃進垃圾桶——它在證明工作流裡換了個工位繼續上班。Lamport 有一份兩頁的技巧筆記（2018，見延伸閱讀）：把 spec 的 Init **換成你的候選 Ind**，讓 TLC 從「所有滿足 Ind 的狀態」出發走一步，看會不會走出 Ind——這恰恰是歸納步的機械化快篩，卡點（壞前驅）由機器替你找。代價是得先把無限值域砍成有限（例如 Nat 砍成 0..2），又一次付「有限化」的稅。Apalache 則把同樣的兩個義務編成 SMT 查詢，連砍值域都省了（`--init=IndInv --inv=IndInv --length=1` 的兩段式檢查，2026-06；原理見 ch16）。分工從此清楚：**機器找反例，人讀反例、寫條款、簽下任意規模的定理。**\n\n## 三個義務與一個迴圈\n\n把 ch05 的不變量規則穿上 TLA 的衣服。要證狀態述語 S 是 `Spec ≜ Init ∧ □[Next]_vars` 的 invariant，標準路線是找一個述語 Ind，完成三個義務：\n\n1. **起點**：Init ⇒ Ind——所有初始狀態滿足 Ind。\n2. **封閉**：Ind ∧ [Next]_vars ⇒ Ind′——從任何滿足 Ind 的狀態走任何一步，仍滿足 Ind。\n3. **蘊涵**：Ind ⇒ S。\n\n義務一、二合起來（ch05 的歸納）給出 Spec ⇒ □Ind；義務三收尾得 Spec ⇒ □S。滿足前兩個義務的 Ind 就叫 **inductive invariant**。這三條跟 Lamport 自己教學筆記裡列的三個條件一字同形（出處見延伸閱讀），不是巧合——這就是這門手藝的全部公理。\n\n義務二有個小字條款先講清楚：它面對的是 [Next]_vars，比 Next 多一個 stuttering 析取。但 stuttering 步免費——vars′ = vars 時，Ind′ 跟 Ind 是同一句話（狀態述語的真值只由變數值決定）。所以接下來所有證明都只列真動作，這行豁免引用一次、全章有效。\n\n困難全部集中在一件事上。Lamport 在同一份筆記裡的話，翻譯過來是：「如果 S 恰好自己就 inductive，讓 Ind 等於 S 就好，義務三免費——**但對我們在乎的那些 invariant，這種情況很少見**。」為什麼很少見，ch05 那張圈圈圖你應該還記得：S 為真只說可達狀態都落在 S 圈內，但 S 圈裡住著幽靈——不可達、卻滿足 S 的狀態——而歸納步分不出誰可達，會在幽靈身上一步跨出圈外。卡死。\n\n卡死之後的流程，ch05 立過口訣：**證、卡、讀卡點、判可達、強化或舉反例**。本章把第三步「讀卡點」展開成可以照做的三問：\n\n1. 卡住的那條義務，**缺哪句話**才推得過去？（把缺口寫成述語，精確到變數。）\n2. 這句話在真實執行裡**為什麼為真**？（答案通常是某個動作的 guard、某種單調性、某條守恆。）\n3. 把那個理由寫成狀態述語，疊進 Ind，**回到第一步重證**——包括新條款自己的八方義務。\n\n最後一句是強化的價格表：**每加一條條款，每個動作都多一份義務**。n 個動作、k 條條款，封閉義務就是一張 n × k 的矩陣，一格都不能漏。條款不是越多越安全，是越多越貴——所以定稿前還有最後一道工序：審計每條條款被誰用到，沒人用的刪掉（刪完要重驗）。這些話現在聽起來抽象，兩場硬仗打完就是肌肉記憶。\n\n## 找 Ind 的啟發法：工具箱先擺桌上\n\nLamport 的誠實警告（同一份 2018 筆記）：找 inductive invariant，沒做過很多次的人覺得難；做過很多次，要一次寫對還是難。所以這裡不賣銀彈，只擺四件工具，兩場證明會輪流用到它們：\n\n| 啟發法 | 一句話 | 本書的先例 |\n|---|---|---|\n| 從 TypeOK 出發 | TypeOK 幾乎總是 Ind 的第一個合取項：沒有它，連「加一還是數字」「那格還在值域裡」都說不出口；而它通常自己就 inductive，是免費的地基 | ch08（TypeOK 的四層理由） |\n| 從卡點學 | 不要憑空想條款——讓失敗的歸納步告訴你缺什麼。卡點是資訊，不是挫折 | ch05 的 ping-pong；本章全程 |\n| 找守恆量 | 「什麼東西不會憑空增減」往往一句話圈死大片幽靈：訊息的存量、票的總數、錢的進出 | ch05 的 copies(m)；ch08 題 2 的 free + held = N |\n| 把歷史編碼進狀態 | 性質需要「曾經發生過」時，去找狀態裡的史官：dedup 表、只增不減的 msgs、單調的 tmState。沒有史官就請一個（加輔助變數——那是 ch15 的 auxiliary variables 的近親） | dedup（ch08）；msgs（ch11） |\n\n工具備齊，開戰。\n\n## 完整證明（一）：SettlementV1 的 NoDoublePay\n\n對象是 ch08 的 SettlementV1，名字與型別原樣搬來：變數 queue ⊆ Msgs、working ∈ [Consumers → Msgs ∪ {\"idle\"}]、ledger ∈ [Msgs → Nat]、dedup ⊆ Msgs；動作 Fetch(c, m)、Credit(c)、Ack(c)、Crash(c)；目標：\n\nNoDoublePay ≜ ∀ m ∈ Msgs : ledger[m] ≤ 1\n\nch08 立了兩張字據：`THEOREM Spec => []TypeOK` 與 `THEOREM Spec => []NoDoublePay`。現在來兌現。\n\n### 第一輪：直接拿 NoDoublePay 上，讓它卡\n\n候選 Ind ≜ TypeOK ∧ NoDoublePay。四個動作裡只有 Credit 動 ledger，直奔它。設步前成立，Credit(c) 的 guard 給 working[c] ≠ \"idle\" 且 working[c] ∉ dedup；令 m₀ ≜ working[c]，步後 ledger′[m₀] 是 ledger[m₀] + 1。要驗 ledger′[m₀] ≤ 1，等於要步前 ledger[m₀] = 0。歸納假設只給 ledger[m₀] ≤ 1——**容許 1**。卡。\n\n照流程，把卡點具體化成壞前驅（ch05 叫它壞前狀態，同物異名）：\n\ns_x ≜ ⟨queue = {m2}, working = (c1 ↦ m1, c2 ↦ \"idle\"), ledger = (m1 ↦ 1, m2 ↦ 0), dedup = {}⟩\n\n驗收：s_x 滿足 TypeOK（逐項在值域內）與 NoDoublePay（1 ≤ 1、0 ≤ 1）；Credit(c1) 的兩個 guard 都亮（c1 手上有 m1，m1 ∉ dedup）；走一步，ledger[m1] = 2。貨真價實的壞前驅。\n\n判可達。先招認一個誘惑：ch05 證 v0 時你練出來的肌肉是守恆——copies(m) ≤ 1。它在 v1 仍然為真（值得你自己驗一次），但先別急著抄舊答案，**回去讀卡點**。卡住的義務是「步前 ledger[m₀] = 0」，這句話裡只有 ledger 和（經由 guard 出場的）dedup——queue 與 working 根本沒戲份。守恆也解釋不了 s_x 為什麼不可達：s_x 裡每則訊息的存量完全合法（m1 一份在 c1 手上，m2 一份在佇列）。s_x 的病不在存量，在**帳目**：ledger 說 m1 入過帳，dedup 卻不記得。而 v1 的設計恰恰保證這不可能——Credit 在同一步裡入帳＋寫 dedup（ch08 全 spec 最承重的假設），且 dedup 只進不出。把這個理由寫成述語：\n\nDedupCovers ≜ ∀ m ∈ Msgs : m ∉ dedup ⇒ ledger[m] = 0\n\n逆否讀法更順口：**入過帳的訊息必在 dedup 裡**——dedup 是 ledger 的影子收據。強化後的候選：\n\nIndV1 ≜ TypeOK ∧ NoDoublePay ∧ DedupCovers\n\n### 第二輪：完整證明\n\n**定理**：SettlementV1 滿足 Spec ⇒ □TypeOK 與 Spec ⇒ □NoDoublePay（對任意非空的 Msgs 與 Consumers）。\n\n⟨1⟩1. 起點：Init ⇒ IndV1。\n  TypeOK：queue = Msgs ⊆ Msgs；working 把每個 c 映到 \"idle\"，落在 [Consumers → Msgs ∪ {\"idle\"}]；ledger 全 0 ∈ Nat；dedup = {} ⊆ Msgs。\n  NoDoublePay：每格 0 ≤ 1。\n  DedupCovers：後件 ledger[m] = 0 直接為真——這條在起點不是空洞通過，是貨真價實地成立。\n⟨1⟩2. 封閉：設步前滿足 IndV1。Next 是 ∃ c ∈ Consumers（Fetch 再 ∃ m ∈ Msgs）套四類動作的析取——任取見證 c 與 m，逐動作討論；stuttering 步由本章開頭的豁免條款處理。\n  ⟨2⟩1. 情況 Fetch(c, m)（guard：working[c] = \"idle\"、m ∈ queue）。本步動 queue、working；ledger、dedup 未動。\n    ⟨3⟩1. TypeOK′：queue′ = queue ∖ {m} ⊆ Msgs；working′ 只把 c 那格改成 m，而 m ∈ queue ⊆ Msgs（步前 TypeOK），仍在值域；ledger、dedup 照舊。\n    ⟨3⟩2. NoDoublePay′ ∧ DedupCovers′：兩條只談 ledger 與 dedup，本步未動，照搬歸納假設。\n    ⟨3⟩3. Q.E.D.\n  ⟨2⟩2. 情況 Credit(c)（guard：working[c] ≠ \"idle\"、working[c] ∉ dedup）。令 m₀ ≜ working[c]。本步動 ledger、dedup；queue、working 未動。\n    ⟨3⟩1. m₀ ∈ Msgs。理由：TypeOK 給 working[c] ∈ Msgs ∪ {\"idle\"}，guard 排除 \"idle\"。\n    ⟨3⟩2. 步前 ledger[m₀] = 0。理由：guard 給 m₀ ∉ dedup，DedupCovers 在 m₀ 上的實例。——第一輪卡死的位置就是這裡；強化條款進了歸納假設，債有人還了。\n    ⟨3⟩3. ledger′[m₀] = 1 ≤ 1。理由：EXCEPT 把 m₀ 那格改成舊值加一，由 ⟨3⟩2 是 0 + 1。\n    ⟨3⟩4. DedupCovers′ 對 m₀：m₀ ∈ dedup′ = dedup ∪ {m₀}，前件為假。\n    ⟨3⟩5. 對每個 m̃ ≠ m₀：ledger′[m̃] = ledger[m̃]（EXCEPT 只動一格）；若 m̃ ∉ dedup′ 則 m̃ ∉ dedup（集合只變大），由歸納假設 ledger[m̃] = 0；ledger[m̃] ≤ 1 照搬。\n    ⟨3⟩6. TypeOK′：ledger′[m₀] = 1 ∈ Nat；dedup′ = dedup ∪ {m₀} ⊆ Msgs（⟨3⟩1）；queue、working 未動。\n    ⟨3⟩7. Q.E.D.\n  ⟨2⟩3. 情況 Ack(c)（guard：working[c] ≠ \"idle\"、working[c] ∈ dedup）。只動 working：c 那格變回 \"idle\"，仍在值域，TypeOK′ 成立；ledger、dedup 未動，另兩條照搬。Q.E.D.\n  ⟨2⟩4. 情況 Crash(c)（guard：working[c] ≠ \"idle\"）。動 queue 與 working：queue′ = queue ∪ {working[c]} ⊆ Msgs（working[c] ∈ Msgs，同 ⟨2⟩2 的 ⟨3⟩1），working′ 把 c 變回 \"idle\"；TypeOK′ 成立。ledger、dedup 未動，另兩條照搬。Q.E.D.\n  ⟨2⟩5. Q.E.D. 四類動作蓋住所有真步。\n⟨1⟩3. 蘊涵：IndV1 ⇒ NoDoublePay。第二個合取項就是它；IndV1 ⇒ TypeOK 同理。\n⟨1⟩4. Q.E.D. 由 ch05 的不變量規則。∎\n\n### 這份證明在說什麼\n\n**Crash 與 redelivery 是免費的 case。**整個 v1 的戲劇性——crash 在入帳與確認之間插刀、訊息帶著舊身世回佇列（ch08 的六步危險路徑）——在證明裡只值兩行「ledger、dedup 未動，照搬」。這不是證明偷懶，是防線位置的精確刻畫：**`NoDoublePay` 的承重牆只有兩塊磚——dedup 只進不出，加上 Credit 拿它當門票**。ch08 預告過的那句話現在是定理級的：把「活著的 consumer 處理太慢、visibility timeout 重投遞」加回模型（同一訊息兩個 consumer 同持，copies = 2），Fetch 與 Crash 的 case 要改寫，但 ⟨2⟩2 的核心三步——guard 給 ∉ dedup、DedupCovers 給 = 0、加一得 1——一字不動。\n\n**規模無關。**證明裡的量詞全是 ∀ m、∀ c，沒有任何一步用到「兩則訊息、兩個 consumer」。每季三十萬筆、兩百個 consumer，同一份證明。這就是 THEOREM 字據的真正兌現——TLC 給不了的那種。\n\n**強化不必到位，夠用就停。**你可能注意到 DedupCovers 只寫了單向。雙向版本（m ∈ dedup ⟺ ledger[m] = 1）也是 inductive、把可達集合圈得更緊，但多出來的方向整份證明一次都用不到，而它照樣要在四個動作上繳維護稅。紙上推演題 1 讓你親手驗那一半，體會「inductive 但無用」是什麼觸感。\n\n**證明的前提要抄錄在結論旁。**這份定理站在兩個 spec 假設上：Credit 的原子性（dedup 檢查＋寫入＋入帳同一筆交易）、dedup 永不清理。你的實作哪天改成「先 SELECT 再 INSERT」或給 dedup 上了 TTL，定理對你的系統即刻失效——ch08 的抽象帳，每次引用定理都該重讀一遍。\n\n## 完整證明（二）：TwoPhase 的 TCConsistent\n\n全書高峰。對象是 ch11 的擴充版 TwoPhase：原版七個動作加 TMCrash，TPCrashNext ≜ TPNext ∨ TMCrash，TPCrashSpec 照 ch11 的定義；TPTypeOK 的 tmState 值域補上 \"crashed\"：\n\n```tla\nTPTypeOK ==\n  /\\ rmState \\in [RM -> {\"working\", \"prepared\", \"committed\", \"aborted\"}]\n  /\\ tmState \\in {\"init\", \"committed\", \"aborted\", \"crashed\"}\n  /\\ tmPrepared \\subseteq RM\n  /\\ msgs \\subseteq Message\n```\n\n縮寫沿 ch11：P(r) ≜ [type ↦ \"Prepared\", rm ↦ r]，C ≜ [type ↦ \"Commit\"]，A ≜ [type ↦ \"Abort\"]。目標：\n\nTCConsistent ≜ ∀ r1, r2 ∈ RM : ¬(rmState[r1] = \"aborted\" ∧ rmState[r2] = \"committed\")\n\n先聲明賭注：證的是擴充版 TPCrashSpec ⇒ □TCConsistent。原版 TPSpec 的行為集合是擴充版的子集合（Next 少一個析取，允許的行為只少不多），所以定理對原版**免費成立**——ch11 檔尾那句「真正的證明欠著，ch14 還」，連本帶利一次結清。\n\n### 第〇輪：拿 TCConsistent 直接上\n\n候選 TPTypeOK ∧ TCConsistent。八個動作裡動 rmState 的有四個。RMPrepare 無害：working 變 prepared，既不製造 \"committed\" 也不製造 \"aborted\"，步前沒有違規配對、步後也不會有（ch11 題 1 解答的同款論證）。剩下三個全卡：\n\n- **RMChooseToAbort(r)**：步後 r 變 \"aborted\"。若步前某個 r̃ 是 \"committed\"——歸納假設管不住：TCConsistent 只禁止「同時出現」，步前根本沒有 aborted。壞前驅正是 ch11 紙上推演題 2 的那位老朋友：s_bad ≜ ⟨rmState = (r1 ↦ \"committed\", r2 ↦ \"working\"), tmState = \"init\", tmPrepared = {}, msgs = {}⟩。它滿足 TPTypeOK 與 TCConsistent，RMChooseToAbort(r2) 一步打穿。\n- **RMRcvCommitMsg(r)**：步後 r 變 \"committed\"，步前若有人 \"aborted\"，同型穿孔。\n- **RMRcvAbortMsg(r)**：對稱。\n\ns_bad 可達嗎？不可達——ch11 題 2 的 (d) 已經把理由寫成一條鏈。現在把那條鏈攤開，每一節標上它將要成為的條款編號（編號照本章定稿，方便對照）：\n\n```text\nrmState[r̃] = \"committed\"\n   │ I1：committed 要有依據——RM 只因收到 Commit 而 commit\n   ▼\nC ∈ msgs\n   │ I2：Commit 只有一個寄件人——TMCommit\n   ▼\ntmState = \"committed\"\n   │ B：TMCommit 的 guard——小本子集滿才放行\n   ▼\ntmPrepared = RM\n   │ I4：小本子不說謊——收過誰的信才記誰\n   ▼\n∀ r̃ ∈ RM : P(r̃) ∈ msgs\n   │ I5：說出口的 prepared 收不回——發過信的人回不去 \"working\"\n   ▼\n沒有任何 RM 還在 \"working\"\n```\n\n注意鏈條的每一節都是一條**狀態述語形的蘊涵**，而其中 B 原本不是述語——它是 TMCommit 的 guard，一個「當時」的事實。歸納證明只看眼前一格，「當時」要靠狀態記住，所以 B 得升格成條款：B ≜ tmState = \"committed\" ⇒ tmPrepared = RM。msgs 與 tmState 在這裡就是史官：訊息只增不減、tmState 一旦離開 \"init\" 就不回頭，歷史因此可以從現在讀出來——這正是「把歷史編碼進狀態」這件工具的實戰長相。\n\n### 第一輪：鏈條版，收一案、又卡兩案\n\n候選：TPTypeOK ∧ TCConsistent ∧ I1 ∧ I2 ∧ B ∧ I4 ∧ I5。重證 RMChooseToAbort(r)：設步前有人 \"committed\"，沿鏈走——I1 給 C ∈ msgs，I2 給 tmState = \"committed\"，B 給 tmPrepared = RM，於是 r ∈ tmPrepared，I4 給 P(r) ∈ msgs，I5 給 rmState[r] ≠ \"working\"——與 guard 的 \"working\" 矛盾。所以步前無人 committed，步後自然沒有違規配對。**收案。**\n\n但 RMRcvCommitMsg 還卡著。新的壞前驅：\n\ns_bad2 ≜ ⟨rmState = (r1 ↦ \"aborted\", r2 ↦ \"prepared\"), tmState = \"committed\", tmPrepared = {r1, r2}, msgs = {P(r1), P(r2), C}⟩\n\n逐條款驗它合格：TCConsistent（aborted 配 prepared，無違規）✓；I1（無人 committed，空洞）✓；I2（C 在場、tmState 確是 \"committed\"）✓；B（tmPrepared = RM）✓；I4（兩封 P 都在）✓；I5（aborted 與 prepared 都不是 working）✓。然後 RMRcvCommitMsg(r2) 的 guard C ∈ msgs 亮著，走一步——(aborted, committed)，目標陣亡。對稱地，RMRcvAbortMsg 也有同型卡點（committed 的人在場、A 也在場）。\n\n判可達：s_bad2 不可達。理由口述出來是——TM 都 commit 了，r1 怎麼可能是 aborted？自發 abort 需要 \"working\"（I5 說發過信的人回不去）；被通知 abort 需要 A 在場，而 A 的唯一寄件人 TMAbort 與 TMCommit 互斥——TM 只有一次離開 \"init\" 的機會。讀出缺的句子：**Commit 在場的世界容不下 aborted**。最划算的條款寫法，是把 TCommit 的 canCommit 整句搬進來：\n\nI7 ≜ C ∈ msgs ⇒ ∀ r ∈ RM : rmState[r] ∈ {\"prepared\", \"committed\"}\n\n眼熟嗎？這正是 ch11 兩層對照表底下欠的那句話——「Commit 訊息在 msgs 裡時，全員必在 {\"prepared\", \"committed\"}」。當時說這串鏈條「正是 ch14 要逐節鍛造的強化不變量」，現在它有了條款編號。\n\nI7 不是白拿的，它自己要過八個動作的歸納步，其中 TMCommit 那格逼出兩條新債：要在「TM 即將 commit」的時刻排除 aborted，需要知道 aborted 的人是怎麼 abort 的（I6 ≜ rmState[r] = \"aborted\" ⇒ A ∈ msgs ∨ P(r) ∉ msgs——abort 的兩種身世：被通知，或從沒準備過），以及 A 在場意味著什麼（I3 ≜ A ∈ msgs ⇒ tmState = \"aborted\"）。至於 RMRcvAbortMsg 的卡點讀出的那句「C 與 A 不可能同時在場」——它**不必當條款**：有了 I2 與 I3，C ∧ A 同時在場會逼 tmState 同時等於兩個值，矛盾自動奉上。有些事實當推論比當條款便宜，因為條款要繳八個動作的維護稅，推論不用。\n\n### 定稿與審計\n\n第二輪收齊後做條款審計，刪掉兩個白吃飯的：**B 用不到了**——I7 把 RM 端三個案子的推理全部短路（C 在場 ⇒ 全員就位，一步斃命），B 原本服務的那條長鏈只剩 TMCommit 的歸納步還需要，而那裡用的是 guard 本人，不是條款。**TCConsistent 自己也退役了**——它成了 I1 ∧ I7 的推論（馬上會證），目標性
