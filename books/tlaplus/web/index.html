ess 警告同源 |\n| 案例光環 | 「AWS 都在用，我們也要導入」 | 案例給的是判準不是結論；用七判準走自己的系統，包括走出「不值得」 |\n| spec 過了＝程式碼對了 | 忘記 conformance gap，把設計驗證當實作保證 | 明寫殘餘風險；要消滅 gap 先讀 MongoDB 的帳單再決定 |\n\n## 紙上推演\n\n### 題 1：三個系統的 ROI 排序（[25 分鐘] ★★）\n\n用本章七判準評估下列三個假想系統，給每個系統「值得／值得但限定範圍／不值得」的結論，並排出形式化投資的優先順序：\n\n- **A. 內部管理後台**：CRUD＋權限＋審批表單，單一 PostgreSQL，所有交易單庫完成，使用者約 200 人。\n- **B. 自研分散式鎖服務**：lease＋heartbeat＋failover，公司上百個服務依賴它做互斥。\n- **C. 計費對帳 pipeline**：每日批次拉第三方帳單、與內部 ledger 對帳，錯帳會多收客戶錢；偶有並行的人工修正單。\n\n### 推演解答\n\n**排序：B ＞ C ＞ A。**\n\n**B：值得，全額投資。**判準一：lease 過期、heartbeat 遺失、failover 的規則少、交錯極多——教科書級協議核心（AWS Table 1 裡就有內部鎖服務，前例直接命中）。判準二：bug 全部來自故障×時序交錯。判準三：鎖服務錯一次＝上百個依賴服務的互斥假設集體破產，代價不可逆且呈扇形放大。判準四：lease 與 failover 的反例通常要「heartbeat 延遲＋舊 leader 復活」等多步交錯，深。注意 safety 與 liveness 都要列（ch10 的互斥雙性質；別重蹈「沒驗 liveness」的覆轍）。\n\n**C：值得但限定範圍。**判準三強命中（錢），但判準二要誠實檢查：批次拉帳→比對→出報告是序列流程，交錯少——這部分測試＋帳目守恆的對帳 invariant 就夠。唯一可能值得 spec 的窗口是「並行人工修正單 × 自動對帳」的交錯；若該窗口存在就給它一份小 spec，否則把「帳目守恆」寫成生產環境持續檢查的 invariant（形式化思維紅利，工具免了——ch18 會展開這條路）。\n\n**A：不值得。**判準一即陣亡：規則多（權限矩陣、表單流程）但交錯少，DB 單庫交易已經買斷了互斥與原子性（你付錢給 PostgreSQL 就是在買這個）。錯誤代價低且可逆。正確投資是型別、權限測試、code review。如果硬要找形式化的影子：把審批流程畫成狀態機並檢查「不可達狀態」（ch02 的紙筆技能），十五分鐘的白板作業，不必動 TLA+。\n\n常見錯路：看到「錢」就把 C 排第一。判準三只是七分之一；C 的交錯結構（判準二、四）比 B 淺一個量級，而 B 錯一次的爆炸半徑其實也是錢——全公司的錢。\n\n### 題 2：抓出簡報裡的張冠李戴（[15 分鐘] ★★）\n\n你的同事要在技術分享會上推銷形式化方法，投影片有五條主張。指出每一條是對是錯，錯的給出正確版本：\n\n1. 「AWS S3 團隊用 TLA+ 找到一個需要 35 步才能重現的 bug。」\n2. 「截至目前，Amazon 有七個團隊用過 TLA+。」\n3. 「S3 的儲存節點 ShardStore 用 TLA+ 完成了驗證（SOSP 2021）。」\n4. 「Lamport 設計了 Azure Cosmos DB 的一致性協定。」\n5. 「CockroachDB 的 Parallel Commits 用 TLA+ 同時驗證了 safety 與 liveness 性質。」\n\n### 推演解答\n\n1. **錯。**35 步 bug 屬於 **DynamoDB** 的複寫與群組成員系統（CACM 2015 Table 1）。S3 的戰績是另外兩行：804 行與 645 行的 PlusCal spec、合計至少四個 bug。\n2. **錯在時態。**「七個團隊」是 **2015 年論文寫作時點**的數字；拿到今天必須寫成「2015 年論文時點已有七個團隊」。脫離時點的引用會同時得罪兩邊：低估了之後的擴散，又虛構了「現在」的精確數字。\n3. **錯。**ShardStore 用的是**輕量級形式化方法**：Rust 參考模型＋property-based testing，論文標題裡的 “Lightweight Formal Methods” 就是在跟重型方法劃清界線。不是 TLA+，也不是 P。\n4. **錯。**Lamport 曾與 Cosmos DB 團隊**合作、受訪**談 TLA+ 的應用（官方 repo README 連結了訪談影片）；協定設計是 Cosmos DB 團隊的工作。\n5. **對。**AckImpliesCommit（safety）與 ImplicitCommitLeadsToExplicitCommit（liveness）——而且後者驗的是 coordinator 故障下的 leads-to，是四組案例裡把 liveness 驗好驗滿的代表。簡報裡混一條真話，是檢驗你有沒有真的核對、還是反射性全盤喊錯。\n\n### 題 3：spec 的同步策略（[20 分鐘] ★★★）\n\n你的結算 pipeline spec（ch08 的 v1）已凍結標註一年。現在 backlog 排定兩個改動：(i) 加 DLQ——訊息重試三次失敗後改投 dead-letter queue，人工介入；(ii) consumer 改批次模式——一次拉 10 則訊息、逐則處理、最後一次性 ack。針對每個改動，從「(a) 不動 spec／(b) 更新 spec 並紙上重驗／(c) 建 MBTC trace-checking」中選擇，用本章證據說明理由；並回答：什麼條件成立時，(c) 才會變成正確答案？\n\n### 推演解答\n\n**兩個改動都選 (b)，但理由的重量不同。**\n\n(i) DLQ 是**協議級改動**：它修改了「每則訊息的終局」——終態集合從 {已入帳} 變成 {已入帳, 進 DLQ}，`AllPaid`（ch07）的措辭必須改寫成「終會入帳**或**進 DLQ 等待人工處理」，否則 liveness 主張直接變假。同時要檢查新窗口：「第三次失敗判定」與「redelivery」的交錯會不會讓一則訊息既入帳又進 DLQ（`NoDoublePay` 的近親）。不動 spec（選 a）的後果不是中性的：spec 會從「過期」滑向「說謊」——它聲稱的終局集合跟現實不同，下一個讀者（包括一年後的你）會被一份蓋著「已驗證」章的文件誤導，這正是 Cosmos DB 教訓的個人版。\n\n(ii) 批次 ack 改變了 crash 窗口的形狀：以前 crash 最多讓 1 則訊息處於「已處理未 ack」，現在最多 10 則——redelivery 風暴的半徑變大，dedup 表被同時打的併發度上升。協議骨架沒變，但參數與窗口變了，invariant 的驗證要重走（紙上重推 crash-在-第-k-則 的家族 scenario）。這題如果選 (a)，spec 不會「說謊」得像 (i) 那麼明顯——這正是它陰險的地方：腐化從語意邊緣開始，不從正中央。\n\n**(c) 何時才對？**至少三個條件同時成立：核心邏輯無法隔離成純函式（否則先考慮 MBTCG，便宜一個量級）；錯誤代價或實作數量上了一個量級（例如 pipeline 要重寫成第二種語言、兩個實作都聲稱符合同一份 spec）；以及——MongoDB 的判決——**spec 願意為 trace-checking 重新設計**，抽象層次降到實作可逐事件對齊，並編列二十人週起跳的預算。一人團隊、季百萬筆以下的量級，這三條一條都不成立；選 (c) 不是嚴謹，是把 MongoDB 已經替你付過的學費再付一次。\n\n## 自我檢核\n\n口頭回答，講不清楚就回對應小節重讀：\n\n1. 向同事轉述 DynamoDB 35 步 bug 的故事：bug 屬於哪個系統的哪個元件、35 步意味著什麼、為什麼它是「測試與 review 蓋不住深交錯」論點的最強工業證據？\n2. 「七個團隊」這個數字，怎麼引用才誠實？再多舉一個本章裡「數字必須綁時點」的例子。\n3. TLA+ 與 P 在 AWS 工具箱裡的分工是什麼？ShardStore 為什麼不能當成 TLA+ 或 P 的案例？\n4. MongoDB 兩個案例一成一敗，各用一句話說出根本原因；「spec 由實作逐行轉寫」在成功案例裡扮演什麼角色、又帶來什麼風險（提示：那顆被忠實抄過去的 bug）？\n5. 「官方 spec repo 存在」與「系統語意被正確理解」之間差了什麼？Cosmos DB 案例裡，第三方的 spec 為什麼能比官方的更小卻涵蓋更廣？\n6. CockroachDB 驗的兩條性質各是 safety 還是 liveness？為什麼說它補上了 AWS Table 1 某一行的遺憾？\n7. 七個判準裡，你會先用哪三個快速篩掉「不值得形式化」的系統？為什麼是這三個？\n8. 你的結算 pipeline 評估結論裡，哪一個判準翻轉會讓整個結論反轉？反轉後的正確替代方案是什麼？\n\n## 延伸閱讀\n\n- **How Amazon Web Services Uses Formal Methods**（Newcombe 等六人，*CACM* Vol. 58 No. 4，2015，DOI `10.1145/2699417`）：本章 AWS 案例的原典，Table 1 與「35 步」段落必讀；學習曲線與管理層支持的段落是你替團隊寫採用建議時的現成彈藥。（2026-06 已對照 PDF 原文逐字核對）\n- **Systems Correctness Practices at Amazon Web Services**（*CACM* Vol. 68 No. 6，2025-06；ACM Queue 版 Vol. 22 No. 6，`https://queue.acm.org/detail.cfm?id=3712057`）：2015 的十年後續篇，AWS 正確性工具箱的全景。（2026-06 查證時點全文受取用限制，本章僅依摘要與二手轉述引用其框架，細節改採下列第一手來源）\n- **P language 官方案例頁**：`https://p-org.github.io/P/casestudies/`。S3 strong consistency 遷移如何用 P 驗證的第一手簡述，含本章引用的原文句。（2026-06 開頁查證）\n- **Using Kani to Validate Security Boundaries in AWS Firecracker**（Kani 官方部落格，2023）：`https://model-checking.github.io/kani-verifier-blog/2023/08/31/using-kani-to-validate-security-boundaries-in-aws-firecracker.html`。rate limiter 與 virtio 驗證的細節與 bug 清單，程式碼級驗證長什麼樣的最佳速寫。（2026-06 開頁查證）\n- **Using Lightweight Formal Methods to Validate a Key-Value Storage Node in Amazon S3**（SOSP 2021，DOI `10.1145/3477132.3483540`）：ShardStore 的輕量方法論文——讀它最重要的理由是搞清楚它**不是** TLA+ 案例。（2026-06 未開原文，存在性經多來源確認）\n- **eXtreme Modelling in Practice**（Davis、Hirschhorn、Schvimer，*PVLDB* Vol. 13 No. 9，2020）：`http://vldb.org/pvldb/vol13/p1346-davis.pdf`。本章最值得精讀的一篇：§4 的 MBTC 驗屍報告與 §5 的 MBTCG 成功學，工業界少見的誠實。（2026-06 對照論文原文）\n- **Understanding Inconsistency in Azure Cosmos DB with TLA+**（Hackett、Rowe、Kuppe，ICSE-SEIP 2023，arXiv `2210.13661`）：使用者視角 spec 如何照出官方 spec 的縫隙；搭配官方 repo `https://github.com/Azure/azure-cosmos-tla` 對讀。（2026-06 對照 arXiv 摘要；repo 開頁查證）\n- **Parallel Commits: An Atomic Commit Protocol for Globally Distributed Transactions**（Nathan VanBenschoten，CockroachDB blog，2019-11-07）：`https://www.cockroachlabs.com/blog/parallel-commits/`。讀協議設計，更要讀文末 TLA+ 驗證一節——兩條性質的命名就是一堂「怎麼把保證說清楚」的課；協議背景見 ch11。（2026-06 開頁查證）\n"}, {"id": "ch18-the-map", "file": "ch18-the-map.md", "group": "Part VI — 實務與地圖", "title": "ch18 — 形式化方法地圖與下一步", "md": "# ch18 — 形式化方法地圖與下一步\n\n> **本章解決什麼問題**：全書最後一章，做三件收尾的事。第一，把 ch01 攤開的地圖收攏：那個結算夜的 bug 拿回來重走一遍，看看十七章之後的你跟當年差在哪裡。第二，誠實介紹 TLA+ 的鄰居——Alloy、P、Quint、Event-B——各自解什麼問題、什麼問題該換誰上場，以及設計級與程式碼級驗證的那條分界線。第三，也是對你的日常最實用的：把「沒有工具也帶得走」的輕量紅利打包——property-based testing、deterministic simulation testing、在 design doc 寫 invariant 的習慣。讀完這章，這本書就交還給你的工作了。\n\n## 從你已知的出發\n\n把 ch01 開場那一夜搬回來。季結算夜，監控撈出兩筆重複入帳：同一個 msgId、兩筆款項、相隔 11 毫秒。當時的你修好了它——檢查與寫入包進同一筆交易、msgId 上加 unique constraint——然後在事故報告的最後一節停筆很久，因為有個問題沒人敢大聲回答：**還有沒有別的調度會出事？**\n\n現在換今天的你來寫那份報告。\n\n**第一，你的眼睛先把程式拆成動作。**dedup 檢查一步、入帳一步——check 與 act 之間有一條縫。當年的你看到縫會皺眉；現在的你會把它寫下來：兩個 action、4 個時間槽，C(4,2) = 6 種交錯、4 種壞（ch01 推演題 1，你親手數過）。那 11 毫秒不再是靈異事件，是六條劇本裡編號可查的一條。\n\n**第二，「同一 msgId 至多入帳一次」不再是 code review 的口頭禪。**它是 `NoDoublePay` ≜ ∀ m ∈ Msgs：ledger[m] ≤ 1——一條可反駁的述語（ch03）：要嘛舉出一條打破它的可達路徑，要嘛說明為什麼不存在。含糊地帶被量詞抽乾了。\n\n**第三，修法不再是「包個交易，應該就好了」。**你知道交易為什麼有效：原子化把六條劇本砍成兩條，砍掉的剛好是全部的壞劇本（ch01 推演題 1(c)）。你也知道那句「應該」的全名：Credit 的原子性是 spec 裡最承重的**前提**，不是簡化（ch08 的抽象帳）——哪天有人把「查」與「寫」拆出交易，定理對你的系統就失效。下次 review 看到那種 PR，你攔得下來，而且理由說得出口。\n\n**第四，那個沒人敢回答的問題，第一次有了全稱的答案。**基準參數下的窮舉你手推過（ch09 的 BFS）；任意訊息數、任意 consumer 數的版本，歸納不變量的證明你寫過（ch14）：dedup 只進不出、Credit 拿它當門票，Init 成立、每步保持，所以永遠成立。在模型涵蓋的世界裡——沒有，沒有別的調度會出事。\n\n**第五，「在模型涵蓋的世界裡」這個限定詞，你不會吞掉。**dedup 表被 TTL 清掉、慢 consumer 的重複投遞、佇列服務自己抽風——v1 的抽象帳一筆一筆白紙黑字（ch08）。你簽的是哪份契約、契約建立在哪些前提上、前提破了會從哪裡先壞，一條一條說得出來。這是 Murphy 原則的形式化版：不是消滅不確定，是讓每一份安全感都有出處。\n\n**第六，下一個系統你不會等到結算夜。**設計審查時 invariant 先寫好；寫不精確的地方，就是設計還沒收斂的地方（ch01 的藍圖論點、ch17 的 ROI 帳）。槓桿最大的時刻在第一行實作之前。\n\n注意一件事：這六樣沒有一樣需要安裝任何工具。ch01 說這本書要做的，是把你的 code review 直覺接上數學，讓它從兩三步深走到 35 步深——你已經在 2PC 的 blocking scenario（ch11）、Paxos 的雙 proposer 競爭（ch12）上親手走過比當年深一個數量級的推演。工具可以之後再裝；眼睛已經換好了。\n\n## 全書地圖：每一格都走過了\n\nch01 的路線圖再貼一次。當時你站在第一格往下看；現在從最後一格往回看：\n\n```text\n《把系統寫成定理》全書地圖——終點回望\n\nPart I 為什麼          ch01 測試的極限 ─ ch02 狀態機\n  帶走的：調度是你控制不了的輸入；系統＝允許的行為集合\n\nPart II 數學地基       ch03 邏輯 ─ ch04 集合 ─ ch05 歸納\n  帶走的：可反駁的述語；一切皆查表；Init ＋ 每步保持 ⇒ 永遠\n\nPart III TLA+ 與時序   ch06 動作 ─ ch07 時序 ─ ch08 spec ─ ch09 TLC\n  帶走的：Init ∧ □[Next]_vars 的每一個字；fairness 的價碼；\n          BFS 與最短反例；有限窮舉 ≠ 定理\n\nPart IV 協議精讀       ch10 Peterson ─ ch11 2PC ─ ch12 Paxos ─ ch13 Raft\n  帶走的：不變量先於演算法；blocking 是本質不是 bug；\n          quorum intersection 的所以然\n\nPart V 證明            ch14 歸納不變量 ─ ch15 Refinement ─ ch16 機器證明\n  帶走的：不 inductive 就強化；「實作正確」＝一條蘊涵；\n          嚴謹度是光譜不是開關\n\nPart VI 實務           ch17 業界案例 ─ ch18 方法地圖   ← 你在這裡，最後一格\n```\n\nch01 的自我檢核第 1 題要你用 30 秒講「測試與證明的本質差別」。當時的及格線是說出「抽樣 vs 全稱」；現在你可以講完整條鏈：測試對調度空間抽樣 → 正確性是全稱主張 → 全稱只有窮舉與歸納兩條路 → 窮舉受限於有限參數 → 歸納把無限狀態壓成「Init ＋ 保持」 → refinement 連「實作正確」也變成蘊涵 → 機器把證明義務逐條查證。每個箭頭，都是你走過的一章。\n\n接下來的問題是：地圖上 TLA+ 那格的**鄰居們**住著誰。\n\n## 工具光譜：TLA+ 的鄰居們\n\nch01 的地圖用兩個軸把大陸劃開：驗哪個層次（設計 vs 程式碼）、怎麼驗（找反例 vs 寫證明）。TLA+ 佔的是「設計層」那一整排。但同一排還有幾個風格迥異的住戶——以下每個一段，只談定位與「什麼問題會讓你選它」，不教語法。\n\n**Alloy：關係邏輯，結構優先。**Daniel Jackson（MIT）的 Alloy 把世界建模成「集合與關係」：signature 宣告原子的種類，關係把它們連起來，約束用關係邏輯寫。Analyzer 把問題翻成 SAT，在你指定的 small scope 內（每種 signature 至多幾個原子）窮舉所有結構，找到滿足（或違反）約束的**實例**畫成圖給你看。它的賭注是 small scope hypothesis 的結構版：設計層的錯，幾乎都能在很小的實例上現形（這個賭注的限度，ch09 討論過）。第 6 版起合併了 Electrum 路線的時序運算子，也能寫 behavior 了（2026-06 開頁查證，官方 model finding 引擎為 Kodkod）——但它的甜蜜點仍是結構，不是交錯。什麼問題會讓你選它：「在我們 org × 群組 × 個人覆寫三層權限規則疊加之下，**存不存在**一個使用者能同時通過 A 檢查又繞過 B？」——狀態的**形狀**比狀態的**演化**更複雜的問題：權限模型、schema 與遷移、組態空間、網路 ACL。一句話對比：TLA+ 問「會不會走到壞狀態」，Alloy 問「存不存在壞結構」。\n\n**P：事件驅動，可執行。**P 把系統寫成一組互傳事件的 communicating state machines——你的微服務心智模型的形式化版，官網的自述就是「a state machine based programming language for formally modeling and specifying complex distributed systems」（2026-06 開頁查證）。跟 TLA+ 最大的差異是「可執行」：P 程式不只是紙上模型，配套的 checker 會系統性地探索訊息交錯與故障注入去找深層 bug。AWS 從 2019 年起把它納入主力工具箱、用在 S3 等旗艦服務（採用脈絡與工程帳見 ch17——這裡只談語言定位）。什麼問題會讓你選它：「我的系統就是一堆異步收發事件的服務，我要的不是一份文件型 spec，而是一個能直接跑、能餵故障的模型。」它把 spec 從文件變成可執行的測試資產——代價是你多了一份要跟實作同步的程式，ch17 的 spec 腐化問題照樣適用。\n\n**Quint：TLA+ 語意的現代外衣。**Informal Systems 開發的規格語言，官網自介是「executable specification language for reliable systems」（2026-06 開頁查證；網址已遷至 quint.sh）。語意就是 TLA+ 那一套——state、action、不變量、時序性質——但語法長得像現代程式語言：有型別、有像樣的 CLI 與編輯器整合、錯誤訊息說人話；內建模擬器能隨機跑 trace，要做真正的模型檢查時接 Apalache 當後端（Apalache 對 TLA+ 與 Quint 都支援，如今由原核心開發者獨立維護，見 ch16）。什麼問題會讓你選它：「我想把這本書的思維帶進團隊，但我很確定同事看到 `/\\` 跟 `ENABLED` 就會關掉視窗。」本書教你的每一個概念在 Quint 裡原樣成立——它換的是皮，不是骨。\n\n**Event-B：精化驅動。**TLA+ 把 refinement 當成一個深刻的進階主題（ch15）；Event-B 把它當成整個方法的骨架：從一台極抽象的機器出發，一步一步精化到貼近實作，**每一步**精化都自動產生 proof obligations，配套的 Rodin 平台管理整條證據鏈。什麼問題會讓你選它：安全攸關等級的系統（鐵路聯鎖、航空），需要「從需求到實作每步都有證明」的完整證據鏈交給認證單位——歐洲安全關鍵產業的傳統路線（定位穩定；近年版本動態本書未逐一查證）。\n\n**SPIN 與 NuSMV，一句話。**SPIN（Promela 語言、LTL 性質）是顯式狀態模型檢查的元老、協議驗證論文的常客；NuSMV 走符號路線（BDD），出身硬體驗證——文獻裡反覆出現的這兩個名字，是「TLC 的長輩們」。\n\n收成一張表：\n\n| 工具 | 核心抽象 | 檢查方式 | 什麼問題會讓你選它 |\n|---|---|---|---|\n| TLA+ | 狀態機＋時序邏輯 | 窮舉（TLC）／SMT（Apalache）／證明（TLAPS） | 併發 × 故障交錯下的協議設計 |\n| Alloy | 集合與關係 | SAT、small scope 找實例 | 結構與規則：權限、schema、組態 |\n| P | 通訊狀態機 | 可執行、系統性測試＋故障注入 | 事件驅動服務群，要能跑的模型 |\n| Quint | TLA+ 語意、現代語法 | 模擬器＋Apalache | 想推 TLA+ 思維給吞不下語法的團隊 |\n| Event-B | 逐步精化的機器 | 每步精化生證明義務（Rodin） | 安全攸關、要全程證據鏈 |\n\n## 設計級與程式碼級：分界線上的三個路標\n\nch01 畫過那條線：規格層驗設計、程式碼層驗實作。三個路標讓你記得程式碼級長什麼樣子、貴成什麼樣子：\n\n- **seL4**：一個 microkernel 的 C 實作，被 Isabelle/HOL 證明在功能上符合其抽象規格——作業系統核心等級的全程式碼驗證。人力以人年計。它是「做得到」的存在性證明，也是成本的刻度原器。\n- **CompCert**：經過機器證明的 C 編譯器，定理是「編譯不改變程式語意」。它用的證明器是 Rocq——就是 Coq，2025 年 3 月隨 9.0 版完成改名；讀舊文獻時兩個名字是同一個東西。\n- **Dafny**：把驗證內建進程式語言——函式上寫 pre/post-condition、迴圈寫 invariant，SMT 求解器在你打字時逐條檢查。它是程式碼級驗證最平易近人的入口；但驗的單位是函式與模組，不是分散式協議。\n\n分界線的實務讀法（ch16 的嚴謹度光譜在這裡落地）：程式碼級比設計級貴一到兩個數量級。TLA+ 的賭注是「最要命的 bug 多半在設計層，殺掉它們的性價比最高」；程式碼級工具的賭注是「實作也會背叛設計」。兩個賭注都對，所以兩層不互斥——而夾在中間的「spec 與 code 是否一致」正是工業界的真實痛點，MongoDB 為此付過的學費見 ch17。你大概一輩子不會親手碰 seL4 等級的工程，但知道光譜的右端在哪裡，左端的每個取捨才有座標。\n\n## 輕量形式化：沒有工具也帶得走的紅利\n\n這一節是本章的實用核心。把 ch01 的投資光譜重畫一次，這回把左半邊放大：\n\n```text\n例子測試 ──► property-based testing ──► deterministic simulation ──► 模型檢查 ──► 證明\n（一條執行）  （任意輸入、抽樣調度）     （任意故障、調度可重放）      （窮舉）     （全稱）\n```\n\n左邊三格不需要你學任何規格語言，但每一格都直接吃到這本書練出來的能力。\n\n### Property-based testing：把 invariant 接上你的測試框架\n\nexample test 寫「給定輸入 X，期望輸出 Y」；property-based testing（PBT）寫「對**任意**輸入，性質 P 成立」，然後讓框架生成幾百組輸入轟炸實作，找到反例後自動 shrinking 到最小重現輸入。你的技術棧裡現成就有：fast-check（TypeScript）。\n\n它跟這本書的關係是一句話：**寫 property 的能力＝寫 invariant 的能力，而你剛練完十七章。**好寫的性質形狀你全都見過：roundtrip（decode(encode(x)) = x）、守恆（轉帳前後總額不變）、冪等（f(f(x)) = f(x)——你的 idempotent consumer 的靈魂）、oracle 對照（新實作 vs 舊實作逐筆對答案）、結構不變量（排序後長度不變且有序）。\n\n誠實的定位：PBT 仍是抽樣，ch01 那條「抽樣到不了全稱」的線它沒有跨過去；它對純函式銳利、對併發遲鈍——調度依然不是它能控制的輸入（本章 worked example 會把這個洞演給你看）。它做的是把 example test 的存在性陳述往全稱方向推了一大步：抽樣密度與無偏性遠勝手寫例子，而且性質本身就是文件。\n\n### Deterministic simulation testing：把調度變成輸入\n\nch01 把測試的根本困境說成一句話：**調度是你控制不了的輸入。**deterministic simulation testing（DST）的回答不是窮舉它（那是 TLC 的路），而是把它**變成可控的輸入**：整個叢集——所有節點、網路、磁碟、時鐘——跑在同一個單執行緒模擬器裡，一切非決定性由一顆帶種子的偽亂數產生器供應。同一個種子，同一場災難，逐位元重放。\n\nFoundationDB 是這條路的代表作。官方文件（2026-06 開頁查證）描述他們用自製的 actor 語言 Flow 把整個叢集塞進單執行緒行程，對網路、機器、資料中心三個層級注入故障——連線斷裂、機器降速、重開機、硬碟塞滿——並自估累計跑過約一兆 CPU 小時量級的模擬。文件裡那句結論值得抄在這裡：「it seems unlikely that we would have been able to build FoundationDB without this technology」。這條思路近年也被產品化成通用測試服務（如 Antithesis；其文件對 DST 有清楚的綜述，連結見延伸閱讀）。\n\n跟模型檢查的對照：TLC 窮舉**小模型的全部**；DST 抽樣**真實實作的故障空間**，但每個樣本可重放、可除錯。一個驗設計、一個驗實作——DST 最吸引人的地方正是它直接驗你出貨的那份程式碼，沒有 spec 與 code 漂移的問題（ch17 的痛點）。代價是架構侵入性：I/O、時間、亂數全部要走可注入的介面，最好從第一天就這樣設計；事後改造一個到處 `Date.now()` 與裸 `fetch` 的 codebase，工程量近似重寫。順帶一提，Node.js 的單執行緒 event loop 給了你一點先天優勢——沒有搶占式執行緒交錯，把外部 I/O 與計時器 shim 掉之後，決定性模擬比多執行緒語言可行得多。\n\n### 在 design doc 寫 invariant：零工具的形式化\n\n光譜最左邊還有一格沒畫出來，因為它連測試框架都不要：**把 invariant 寫進 design doc 的習慣**。模板三段式，每條 invariant 三行：\n\n1. **述語**：盡可能量化的一句話。不寫「系統應該不會重複入帳」，寫「∀ msgId：入帳次數 ≤ 1」。\n2. **機制**：它靠什麼成立。「(msgId) 上的 unique constraint＋檢查與寫入同一交易」。\n3. **破壞假設**：什麼事發生它就破。「dedup 紀錄的 TTL 短於最大重投遞窗口；或任何繞過該交易的補單腳本」。\n\n寫的過程就是 ch01 的藍圖時刻：寫不出述語＝你還沒想清楚；寫不出機制＝你在祈禱；寫不出破壞假設＝你還沒做過 Murphy 模擬。配套的 design review 三問，從 ch06 與 ch08 的鐵律蒸餾而來：\n\n- 這兩步之間，能插誰？\n- crash 落在這條縫裡，會怎樣？\n- 這個檢查用到的資訊，做檢查的那一方**真的看得到嗎**？\n\n三問不需要任何符號，但每一問背後都是一章（動作的縫、故障建模、guard 的視力）。這就是「沒有工具也帶得走的思維紅利」的具體形狀——不是一種氣質，是一張可以印出來貼在螢幕邊的清單。\n\n## AI × 形式化方法：截至 2026 年中的快照\n\n先把限定詞釘死：本節是快照不是預言，每句話都該讀成「截至 2026 年中」。\n\n**能的部分**：語法層面進展驚人。LLM 生成的 TLA+ spec 通過 parser、跑得動 TLC，已經不是新聞；函式層級的規格生成（pre/post-condition）有實際進展；針對「AI 做系統形式建模」的基準測試也開始出現（如 2025 年下半年起的 SysMoBench）。\n\n**不能的部分**：語意是另一回事。有評測讓數十個模型生成數百份 TLA+ spec，**最佳模型的語意正確率仍停在個位數百分比的等級**，且與模型規模沒有明顯關係（截至 2026 年中的報告；本書未開原始論文核對精確數字，故不引）。失敗的形狀比數字更有教育意義：2026 年 5 月 ACM SIGOPS 部落格的一篇實測（Specula 團隊）讓 LLM 為 etcd 的 Raft 實作寫 spec——產出通過語法檢查、TLC 跑得動，但內容其實是照 Raft **論文**默寫的，與 etcd 程式碼的實際行為幾乎無關。它生成了「一份 Raft 的 spec」，不是「**這個系統**的 spec」。\n\n所以主流架構是分工：**LLM 起草、符號工具把關**——生成的 spec 交給 TLC／Apalache 找反例，生成的證明步驟交給 TLAPS 後端逐條查證（LLM 引導證明分解的研究 2025 年底開始出現）。信任錨點還是三十年來那一個：機器查證的核心，不是模型的口才。\n\n對你的含義，一句話：**生成變便宜的世界裡，驗收變值錢。**AI 生成的 spec 會得這本書教過的每一種病——vacuous 的性質、太弱的 invariant、替現實讀心的 guard、原子性切太粗——而且得病時更安靜，因為它語法漂亮、註解流暢。ch08 練的驗收技藝（手構一條應該被擋的 trace、檢查每條防線是否承壓過），從「寫 spec 的人的自律」升級成「審 spec 的人的武器」。這本書教的，恰好是審的那一半。\n\n## 同一筆轉帳，三種眼睛（worked example）\n\n最後一個 worked example，把三種思維放在同一道題上對照。題目刻意小：**兩人轉帳**。Alice 與 Bob 各有 100 元；一支 `transfer(src, dst, amt)`：檢查 src 餘額 ≥ amt，然後扣款、入帳。客戶端逾時重試，送出了兩筆一模一樣的請求：t1、t2 都是 alice → bob、70 元。要守的性質兩條：\n\n- `NoOverdraft` ≜ ∀ a：bal[a] ≥ 0（餘額永不為負）\n- `Conserve` ≜ bal[alice] ＋ bal[bob] ＝ 200（總額守恆）\n\n### TLA+ 思維：先問「誰能動、怎麼動」\n\n把 transfer 拆成動作，誠實保留實作裡 check 與 pay 之間的縫（約 15 行，**示意**——省略「檢查不過就放棄」的分支與部分宣告）：\n\n```tla\n\\* 示意：重點在動作的拆法\nCONSTANTS T                 \\* 請求集合 {t1, t2}，皆為 alice -> bob、70 元\nVARIABLES bal, pc           \\* bal：帳戶餘額；pc[t]：請求 t 走到哪一步\n\nInit == /\\ bal = [a \\in {\"alice\", \"bob\"} |-> 100]\n        /\\ pc  = [t \\in T |-> \"check\"]\n\nCheck(t) == /\\ pc[t] = \"check\"\n            /\\ bal[\"alice\"] >= 70          \\* 讀餘額、過檢查\n            /\\ pc' = [pc EXCEPT ![t] = \"pay\"]\n            /\\ UNCHANGED bal\n\nPay(t) == /\\ pc[t] = \"pay\"                 \\* 扣款＋入帳（同一步）\n          /\\ bal' = [bal EXCEPT ![\"alice\"] = @ - 70, ![\"bob\"] = @ + 70]\n          /\\ pc' = [pc EXCEPT ![t] = \"done\"]\n\nNext == \\E t \\in T : Check(t) \\/ Pay(t)\n\nNoOverdraft == \\A a \\in {\"alice\", \"bob\"} : bal[a] >= 0\nConserve    == bal[\"alice\"] + bal[\"bob\"] = 200\n```\n\n手推反例，照全書的規矩不跳步：\n\n| 狀態 | 動作 | bal[alice] | bal[bob] | pc[t1] | pc[t2] |\n|---|---|---|---|---|---|\n| s₀ | — | 100 | 100 | check | check |\n| s₁ | Check(t1)：100 ≥ 70 ✓ | 100 | 100 | pay | check |\n| s₂ | Check(t2)：100 ≥ 70 ✓ | 100 | 100 | pay | pay |\n| s₃ | Pay(t1) | 30 | 170 | done | pay |\n| s₄ | Pay(t2) | **−40** | 240 | done | done |\n\ns₄ 打破 `NoOverdraft`——alice 用 100 元的餘額付掉了 140 元。安全的走法只有「一筆走完另一筆才 check」：t2 的 Check 會讀到 30 < 70，放棄。跟 ch01 的 counter 同構：check 寫成獨立動作，縫就在模型裡，TLC 式的窮舉必然撞到它。\n\n再看一眼 `Conserve`：s₀ 到 s₄ 每一步都是「alice 減 70、bob 加 70」或不動，總和永遠 200——**全程綠燈**。一條太弱的性質對 bug 視而不見，而且驗得越勤、心裡越踏實。記住這個畫面，陷阱表會回收它。\n\n### Alloy 思維：先問「什麼形狀的世界合法」\n\nAlloy 的本能是先寫結構（約 15 行，**示意**——Alloy 風格、非可執行全文）：\n\n```text\n-- 示意：Alloy 風格\nsig Acct { var bal: Int }\none sig Alice, Bob extends Acct {}\n\npred transfer[src, dst: Acct, amt: Int] {\n  amt > 0 and src.bal >= amt            -- 檢查……\n  src.bal' = src.bal.minus[amt]         -- ……與扣款、入帳\n  dst.bal' = dst.bal.plus[amt]          -- 同在一步發生\n  all a: Acct - src - dst | a.bal' = a.bal\n}\n\nfact Traces {\n  always (some src, dst: Acct, amt: Int | transfer[src, dst, amt])\n}\n\nassert NoOverdraft { always all a: Acct | a.bal >= 0 }\ncheck NoOverdraft for 2 but 8 Int, 10 steps    -- small scope：一切有界\n```\n\n注意慣用建模的後果：`transfer` 是**原子的一步**——check 與扣款之間沒有縫，於是上面那個 bug **不在這個模型裡**，Analyzer 會誠實地回報「scope 內找不到反例」。綠燈，但綠的是另一個系統。要抓交錯，得像 TLA+ 那樣手動拆出 pc——Alloy 6 寫得出來，但語言沒有在推你這麼做。這題還會先教你另一課：Alloy 的整數是固定位寬的二補數，預設位寬小到連 100 都裝不下，不加大就會無聲溢位繞回負數——你會先被「假反例」教育一頓。\n\n那 Alloy 的主場在哪？把題目換掉：「帳戶有共同持有人、授權代理、凍結規則三組關係，**存不存在**一條授權鏈能把錢轉出凍結帳戶？」——這種結構疊加的問題，Alloy 的 small scope 實例搜尋就是最短路徑，TLA+ 反而要把關係硬翻成函數、自找麻煩。\n\n### PBT 思維：先問「對任意輸入，什麼永遠成立」\n\nPBT 直接轟炸**實作**（約 15 行，**示意**——fast-check 風格）：\n\n```text\n// 示意：fast-check 風格\nconst transferArb = fc.record({\n  from: fc.constantFrom(\"alice\", \"bob\"),\n  to:   fc.constantFrom(\"alice\", \"bob\"),\n  amt:  fc.integer({ min: 1, max: 200 }),\n});\n\nfc.assert(fc.asyncProperty(\n  fc.array(transferArb, { maxLength: 8 }),\n  async (ts) => {\n    const bank = newBank({ alice: 100, bob: 100 });\n    await Promise.all(ts.map((t) => bank.transfer(t)));\n    assert(bank.total() === 200);                  // Conserve\n    assert(bank.balances().every((b) => b >= 0));  // NoOverdraft\n  },\n));\n```\n\n它做到一件 TLA+ 與 Alloy 都做不到的事：**跑的是你真正出貨的 transfer**，連你沒建模的部分（ORM 的怪癖、金額捨入、序列化）一起驗；amt 的邊界（0、負數、超大值）它抽得比你勤，找到反例還會 shrink 到最小。但兩個洞：其一，`Promise.all` 的交錯由 event loop 決定——調度仍然不是輸入，ch01 的困境原樣健在，這條 property 可能綠一整年；其二，性質太弱的風險照舊（只斷言 `Conserve` 的話，這支有 bug 的實作永遠全綠）。第一個洞的補法在光譜的下一格：把調度收編成輸入——那就是 DST（紙上推演題 3 會動手補）。\n\n### 對照表\n\n| | TLA+ 思維 | Alloy 思維 | PBT 思維 |\n|---|---|---|---|\n| 先問什麼 | 誰能動、怎麼動（轉移） | 什麼形狀的世界合法（關係） | 對任意輸入什麼永遠成立（性質） |\n| 驗的對象 | 設計 | 設計（結構面） | 實作本身 |\n| 量詞 | scope 內全稱（窮舉路徑） | scope 內全稱（窮舉結構） | 抽樣 |\n| 這題抓到什麼 | Check 與 Pay 之間的插隊，s₄ 反例 | 位寬溢位這類值域怪事；交錯預設不在鏡頭裡 | 實作層 bug、輸入邊界；交錯靠運氣 |\n| 這題漏什麼 | 實作是否照 spec；參數只能取小 | 慣用建模把 race 原子化掉 | 調度不可控；抽不到的角落 |\n| 產出 | 反例 trace | 反例實例（一張結構圖） | 最小失敗輸入（shrinking） |\n\n三雙眼睛沒有誰對誰錯——它們在問三個不同的問題。方法地圖的正確用法從來不是選一個信仰，是看清手上的問題該先問哪一個。\n\n## 如果哪天想動手\n\n先把話說明白：這本書不碰鍵盤是刻意的——紙上推演逼你把每一步想穿，而不是讓工具替你想。但十八章下來，「想親眼看 TLC 打出反例」是健康的癮。從你的現狀出發，路徑長這樣：\n\n1. **第一步是編輯器，不是安裝包。**VSCode 的 TLA+ extension 是目前社群的主流入口（老牌的 Eclipse Toolbox 已進入維護模式——此為 2026-06 時點的社群觀察，措辭保守）。\n2. **第一份 spec 不要寫新的。**把 ch08 的 SettlementV1 打進去，基準參數跑 TLC：先看 `NoDoublePay` 全綠，再把 Credit 的 dedup guard 刪掉，親眼看你在紙上手推過的那條六步反例被機器印出來。紙上走過的東西第一次自己動起來，那個瞬間值回整本書。\n3. **系統性教材兩條，互補著用。**learntla.com（Hillel Wayne，免費，The Core 從零帶到能跑，行文最像工程師對工程師）；Lamport 的 TLA+ Video Course（10 講，開場自己警告「These videos are not light entertainment.」）。前者快，後者深。\n4. **然後才輪到自己的系統。**挑一個「協議級、故障 × 併發、錯誤代價高」的角落（判準見 ch17），照 ch08 的解剖學寫第一份 spec。\n5. **要拉團隊一起？**Quint 是更平滑的入口（同一套語意、現代語法）；系統是事件驅動服務群、想要可執行的模型，看 P。\n\n## 陷阱與防禦\n\n方法地圖層級的故障模式——這些坑不在某個工具裡，在「選方法」這件事本身：\n\n| 陷阱 | 它怎麼給你假安全感 | 防禦 |\n|---|---|---|\n| 工具收藏家 | 地圖看熟了、書籤收齊了，卻從沒對自己的系統問過一條精確的問題——「知道」的滿足感冒充了「用過」 | 地圖要反著用：從手上的問題出發選格子，不是從工具出發找題目。檢驗法：你說得出自己系統裡一個「該用 Alloy 的問題」嗎？說不出來，地圖還沒長在你身上 |\n| 銀彈遷移 | 「改用 P／Quint／DST 就安全了」——可是每個方法驗的對象不同，換工具不會把你沒問過的問題自動問出來 | 先寫性質清單，再選工具。性質清單是不變的資產，工具是可換的零件 |\n| PBT 性質套套邏輯 | property 用實作同一套邏輯算期望值（自己對自己），或斷言太弱——`Conserve` 對 overdraft 全盲，幾百萬筆輸入全綠 | mutation 思維：故意把實作弄壞一處，property 必須變紅；不紅，這條性質沒在承壓。這是 ch08「防線承壓測試」的 PBT 版 |\n| generator 抽不到的角落 | 輸入生成器分布偏掉：永遠抽不到並發衝突、空集合、邊界金額——「任意輸入」其實是「常見輸入」 | 審 generator 如審 guard：列出你最怕的五種輸入，確認生成器真的會生出它們，極端 case 用權重拉高 |\n| DST 的決定性破口 | 模擬器外偷用了真時鐘、真亂數、未 shim 的 I/O——同種子不再同結果，重放安靜地失效；你以為在做 DST，其實在做普通 fuzzing | 把「同種子 ⇒ 同 trace」本身寫成 CI 檢查的性質；review 把 `Date.now()`、裸亂數、未注入的 I/O 當 lint 錯誤抓 |\n| AI 生成的 spec 直接收貨 | 語法過、TLC 綠、註解流暢——但它可能是照論文默寫的通用協議，不是你的系統；vacuous 性質與讀心 guard 一樣不會自己報錯 | ch08 的驗收技全套用上：手構一條它應該擋下的 trace 餵進去；逐條性質問「承壓過嗎」；逐個故障動作審 guard 的視力。生成省下的時間，全數投進驗收，帳才是平的 |\n\n## 紙上推演\n\n**第 1 題 [15 分鐘] ★★ —— 三個場景，選方法**\n\n為下列場景各選一個主力方法、說出判準、給一個第二選擇：\n\n(a) 權限模型重構：報表系統的存取規則疊了三層（org 繼承、群組、個人覆寫），重構前要確認「不存在一個使用者能看到別人的薪資報表」。\n(b) 跨服務退款 saga：訂單、金流、庫存三個服務，事件驅動、有補償流程，要保證「crash 與重送交錯下，不會退兩次、也不會卡在退一半」。\n(c) 計費函式庫重寫：純函式（輸入帳單明細、輸出含稅總額），跑了四年的舊版要換新版，兩版將並行三個月。\n\n### 推演解答\n\n(a) **Alloy**。狀態的形狀比演化複雜：三層規則是關係的疊加，問題本身就是 ∃ 量詞——「存不存在一個 user、一條授權鏈」。small scope 夠用：這種壞結構幾乎都能在 3 user × 3 群組的小宇宙現形。第二選擇：寫腳本對小宇宙暴力窮舉——可行，但你其實在手刻 Alloy（ch01 那個 AWS S3 團隊差點手刻模型檢查器的故事，換了個主角）。TLA+ 在這題不順手：沒有「演化」可言，硬寫等於把關係翻成函數自找麻煩。\n\n(b) **TLA+（或 P）**。故障 × 併發交錯、錢、不可逆——ch17 的判準全中。先把兩條需求分類：「不會退兩次」是 safety（跟 `NoDoublePay` 同一個形狀）；「不會卡在退一半」是 **liveness**——要 fairness 才有意義（ch07），光是在白板上把這兩條分開、各自寫清楚依賴什麼，就已經值回票價。若團隊想要可執行模型、直接對事件流注入故障，P 是工程化選項。第二選擇：DST——前提是三個服務都在你家、I/O 可以 shim。\n\n(c) **PBT ＋ oracle 對照**。純函式、有現成 oracle（舊版）、輸入空間大而調度空間為零——ch01 判準表「測試就夠」那欄全中，形式化方法一條都不中。主力 property 一條：∀ 帳單 x：new(x) = old(x)；輔以守恆與單調性質。shrinking 會把不一致縮到最小帳單。第二選擇：邊界 example test 補刀（0 元、負項、捨入邊界）。這題的教訓最重要：**方法地圖的第一個用途，是告訴你什麼時候不需要它。**\n\n**第 2 題 [20 分鐘] ★★ —— 幫 design doc 補三條 invariant**\n\n虛構 design doc（優惠券服務）節錄：「行銷活動發放優惠券。每個使用者每檔活動限領一張；全檔活動預算上限 10,000 張；使用者領到的券在活動期間內隨時可以核銷。發放走 API，核銷走另一個服務，兩邊都有重試。」\n\n用三段式（述語／機制／破壞假設）補三條 invariant；其中一條其實根本不是 invariant——指出是哪條、它是什麼、需要什麼才成立。\n\n### 推演解答\n\n第一條——限領一張。**述語**：∀ u, c：|issued(u, c)| ≤ 1。**機制**：(userId, campaignId) 複合 unique constraint，發放檢查與寫入同一交易。**破壞假設**：客服補發腳本不走這條路；或「換綁手機重領」需求讓 userId 不再是穩定鍵。\n\n第二條——預算上限。**述語**：∀ c：|issued(c)| ≤ 10000。**機制**：原子遞減的額度計數器，guard ≥ 0 與發券同一交易。**破壞假設**：計數器與發券落在兩個服務、兩筆交易——check-then-act 的縫原樣回歸（ch01）；另一個方向也要寫：重試在「扣了額度、寫券失敗」後不歸還額度，會反向破壞（少發）——同一條 invariant 的兩側都得設防。\n\n第三條——隨時可核銷。動筆寫述語就會發現不對勁：「∀ 已發放的券：核銷服務**終會**認得它」——這不是 invariant，是 **liveness**（◇ 的形狀）。它不能被任何有限前綴反駁（ch07 的 Alpern–Schneider 直覺），任何時刻你都可以說「再等等就同步到了」。要它成立，靠的不是 unique constraint，而是「發放 → 核銷服務的資料同步終會完成」這種 fairness 級的營運假設（同步管道健康、補償任務真的會跑、會重試到成功）。design doc 最常見的病就是把 liveness 寫得彷彿一條 DB constraint 就能保證——認出它、把「靠什麼終會發生」寫清楚，就是 ch07 在你日常工作裡的兌現。\n\n**第 3 題 [15 分鐘] ★★ —— 給 PBT 那雙眼睛補洞**\n\nworked example 的 PBT property，在多數執行環境連跑一萬次也抓不到 alice = −40。\n\n(a) 說出兩個原因。\n(b) 不引入任何新工具、只改測試程式，給一個讓壞調度可被抽到的辦法。\n(c) 這個辦法把測試往光譜的哪一格推了半步？差的那半步是什麼？\n\n### 推演解答\n\n(a) 其一：**調度不可控**。`Promise.all` 把交錯交給 event loop；若 transfer 實作在 check 與 debit 之間沒有 await 點，兩筆請求在單執行緒上根本不會交錯——壞調度的機率不是低，是**零**；就算有 await 點，交錯分布也壓在無害區（ch01 的「數學上 90% 壞、物理上 99.99% 抽到好的」）。其二：**性質可能太弱**——若只斷言 `Conserve`，這支有 bug 的實作永遠綠燈：每筆轉帳一減一加，總和不動如山。\n\n(b) 把非決定性收編成輸入：給測試版的 DB client 加一個 schedule 參數，依序決定哪個請求的查詢先返回（在 await 縫隙注入可控的讓步），然後讓 fc **連 schedule 一起生成**——property 從「∀ 轉帳序列」升級成「∀ 轉帳序列 × ∀ 調度」。失敗時 shrinking 連調度一起縮到最小重現。\n\n(c) 往 **DST** 推了半步：調度從環境變成了輸入，同種子可重放。差的那半步是**範圍**——你只 shim 了一個 DB client；FoundationDB 路線 shim 的是整個世界（網路、磁碟、時鐘、行程生死）。但方向完全相同，而「把非決定性變成輸入」這一手，就是整條輕量光譜的靈魂。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 形式化方法地圖的兩個軸是什麼？把 TLA+、Alloy、P、Dafny、seL4、PBT、DST 各放進地圖（或地圖外），每個說一句理由。\n2. 「什麼問題會讓你選 Alloy 而不是 TLA+？」一句話。反過來呢？\n3. Quint 與 TLA+ 的關係是什麼？「換皮不換骨」的骨，至少說出三樣。\n4. DST 把 ch01 的哪個根本困境變成了什麼？它驗的對象跟 TLC 差在哪？它的假安全感藏在哪裡？\n5. 截至 2026 年中，LLM 生成 spec 的「能」與「不能」各是什麼？「生成變便宜的世界裡，驗收變值錢」——驗收的具體動作至少說兩個（出處是 ch08）。\n6. 三段式 invariant（述語／機制／破壞假設）各擋住 design doc 的哪種病？「隨時可核銷」為什麼不是 invariant、需要什麼才成立？\n7. 重講一遍 ch01 的結算夜：當年的修法、現在的你多知道的六件事、以及「還有沒有別的調度會出事」的完整答案——含限定詞。\n\n## 延伸閱讀\n\n- Quint 官網：`https://quint.sh`（2026-06 開頁驗證；原 quint-lang.org 已轉址）——首頁十分鐘看完語法長相，判斷它是不是你團隊的入口。\n- Alloy 官網：`https://alloytools.org`（2026-06 開頁驗證）——Overview 與文件入口；Daniel Jackson 的 *Software Abstractions* 是 Alloy 思維的原典（書本身未另行查證版次）。\n- P 官網：`https://p-org.github.io/P/`（2026-06 開頁驗證）——「state machine based programming language」的自述與案例清單；AWS 的採用脈絡見 ch17。\n- FoundationDB, \"Simulation and Testing\"：`https://apple.github.io/foundationdb/testing.html`（2026-06 開頁驗證）——DST 的原典文件，本章那句「unlikely that we would have been able to build FoundationDB without this technology」的出處。\n- Antithesis 的 DST 綜述：`https://antithesis.com/docs/resources/deterministic_simulation_testing/`（連結於 2026-06 經搜尋確認，內文未逐字核對）——把 FoundationDB 路線一般化的入門讀物。\n- \"Can LLMs model real-world systems in TLA+?\", ACM SIGOPS Blog（2026-05）：`https://www.sigops.org/2026/can-llms-model-real-world-systems-in-tla/`——AI 一節 etcd Raft 實測的出處（2026-06 查證連結與要旨）。\n- learntla.com（Hillel Wayne）：`https://learntla.com`——「哪天想動手」的第一站，從 The Core 讀起。\n- Lamport, TLA+ Video Course：`https://lamport.azurewebsites.net/video/videos.html`——10 講，配著本書的章節順序看，每講都會遇到老朋友。\n\n---\n\n最後，下週一。\n\n不用裝任何東西，不用開任何票。打開你手上正在寫（或正在審）的那份 design doc，加一節，標題就叫 Invariants，寫三條——每條三行：述語、機制、破壞假設。第一條大概十分鐘；第二條你會卡住，因為寫不精確——那個卡住的地方，就是這本書十八章來反覆指給你看的東西：設計還沒收斂的地方、還沒人問過的問題、Murphy 還沒被請進來的房間。\n\n把它寫精確。這就是把系統寫成定理的第一行。\n"}, {"id": "appendix-a-symbols", "file": "appendix-a-symbols.md", "group": "附錄", "title": "附錄 A — 符號速查表", "md": "# 附錄 A — 符號速查表\n\n收錄原則：只收本書各章**實際用過**的符號與關鍵字，依首次出現章排序，方便當複習索引——從頭往下掃一遍，等於把全書的記號重走一次。「首次出現章」指該符號以其本義第一次實際使用的章；若更早的章只是預告（「見 chNN」式的一句話），以括號註記。本書慣例（ch06 立約）：**內文與紙上推演用 Unicode，引用 spec 原文時保留 ASCII**，所以每個符號都有兩種寫法，兩欄都列。\n\n## 主表：數學與 TLA+ 符號\n\n| Unicode 寫法 | TLA+ ASCII | 怎麼唸 | 意思 | 首次出現 |\n|---|---|---|---|---|\n| ≤、≥ | `<=`／`\\leq`、`>=`／`\\geq` | 小於等於、大於等於 | 一般大小比較；spec 原文兩種 ASCII 寫法都會遇到（ch12 用 `\\leq`、ch16 用 `<=`） | ch01 |\n| ∈、∉ | `\\in`、`\\notin` | 屬於、不屬於 | 元素在不在集合裡；action guard 的常客（m ∈ queue） | ch02 |\n| ⟨…⟩ | `<<...>>` | 角括號（tuple） | tuple 與狀態的寫法：⟨queue = {m1, m2}, …⟩ | ch02 |\n| ↦ | `\\|->` | 映到、對應到 | 函數逐格給值：[m1 ↦ 0, m2 ↦ 0] | ch02 |\n| ≠ | `#` 或 `/=` | 不等於 | 兩值不相等 | ch02 |\n| ∅ | `{}` | 空集合 | 沒有任何元素的集合 | ch02 |\n| ∧ | `/\\` | 且（and） | 兩邊都成立 | ch03 |\n| ∨ | `\\/` | 或（or） | 至少一邊成立 | ch03 |\n| ¬ | `~` | 非（not） | 否定 | ch03 |\n| ⇒ | `=>` | 蘊涵、若…則 | 前件真則後件必真；前件假則整句為真（vacuous truth） | ch03 |\n| ≡ | `<=>` | 等價 | 兩邊真值永遠相同 | ch03 |\n| ∀ | `\\A` | 對所有 | 全稱量詞 | ch03 |\n| ∃ | `\\E` | 存在 | 存在量詞 | ch03 |\n| ⊆ | `\\subseteq` | 包含於 | S ⊆ T：S 的每個元素都在 T 裡 | ch04 |\n| ∪ | `\\cup`／`\\union` | 聯集 | 合併兩個集合 | ch04 |\n| ∩ | `\\cap` | 交集 | 兩個集合的共同部分 | ch04 |\n| ∖ | `\\` | 差集 | 扣掉：queue ∖ {m1}（ch04 內文以 `\\` 引入，ch06 起內文寫 ∖） | ch04 |\n| × | `\\X`（本書 spec 引文未用到） | 笛卡兒積 | 左右各取一個的所有有序對；狀態空間天生是笛卡兒積 | ch04 |\n| 𝒫(S) | `SUBSET S` | S 的冪集 | S 的所有子集收成的集合，大小 2^\\|S\\| | ch04 |\n| ≜ | `==` | 定義為 | 給左邊的名字下定義；是定義、不是賦值 | ch04 |\n| [S → T] | `[S -> T]` | 從 S 到 T 的函數集 | 定義域是 S、值都落在 T 的所有函數 | ch04 |\n| \\|S\\| | `Cardinality(S)` | S 的基數 | 元素個數（ASCII 寫法見 ch12 的 Consensus spec） | ch04 |\n| a..b | `..` | a 到 b | 整數區間 {a, a+1, …, b}；sequence 的定義域是 1..n | ch04 |\n| Seq(S) | `Seq(S)` | S 上的所有有限序列 | 長度沒有上限，所以是無限集 | ch04 |\n| ℕ | `Nat` | 自然數集 | {0, 1, 2, …}（ASCII 寫法住在 Naturals 模組，見 ch08） | ch05 |\n| x′ | `x'` | x prime | x 在下一狀態的值；action 同時談前後兩個狀態（ch04 曾預告） | ch06 |\n| □ | `[]` | always、永遠 | 對 behavior 的每個後綴都成立（ch06 先以直覺版登場，正式定義見 ch07） | ch06 |\n| □[Next]_vars | `[][Next]_vars` | 方框 Next 下標 vars | 每一步要嘛是 Next 步、要嘛 vars 全部不動（stuttering 條款） | ch06 |\n| ◇ | `<>` | eventually、終將 | 某個後綴成立；「終將發生」包含「現在就成立」（ch06 對照表先掛號） | ch07 |\n| □◇ | `[]<>` | 無限多次 | 反覆發生：任何位置之後都還會再發生 | ch07 |\n| ◇□ | `<>[]` | 終將永遠 | 從某一刻起永遠成立 | ch07 |\n| ⤳ | `~>` | leads-to | p ⤳ q：每當 p 成立，之後終將 q（ch06 對照表先掛號） | ch07 |\n| ⟨A⟩_v | `<<A>>_v` | A 的真步 | A 發生且 v 真的改變（排除 stuttering）；WF 與 SF 的定義零件 | ch07 |\n| ⊨ | —（spec 原文不出現） | 滿足 | σ ⊨ F：behavior σ 滿足公式 F | ch07 |\n\n## TLA+ 結構關鍵字\n\n| 關鍵字 | 意思 | 首次出現 |\n|---|---|---|\n| `TRUE`、`FALSE`、`BOOLEAN` | 布林常值，與收容它們的集合 BOOLEAN = {TRUE, FALSE} | ch04 |\n| `VARIABLES` | 宣告狀態變數（Lamport 原文亦見單數 `VARIABLE`，ch11） | ch06 |\n| `UNCHANGED` | UNCHANGED ⟨x, y⟩ ≜ x′ = x ∧ y′ = y：這些變數這一步不動 | ch06 |\n| `ENABLED` | ENABLED A：站在這個狀態，A 這種步走得出去（≠ 會發生） | ch06 |\n| `EXCEPT`（與 `!`） | [f EXCEPT ![c] = m]：抄表改一格的函數更新句型 | ch06 |\n| `THEOREM` | 作者主張 spec 滿足某性質；寫下不等於成立，只是立字據 | ch07 |\n| `WF_v(A)` | weak fairness：A 持續 enabled 就終須發生 | ch07 |\n| `SF_v(A)` | strong fairness：A 反覆 enabled 就終須發生（比 WF 強） | ch07 |\n| `MODULE` | 模組名，必須與檔名一致 | ch08 |\n| `EXTENDS` | 引入標準模組（Naturals、FiniteSets、Sequences…），連算術都要 import | ch08 |\n| `CONSTANTS` | 宣告可調參數，不寫死（單數 `CONSTANT` 見 ch11 原文；ch06 曾預告） | ch08 |\n| `ASSUME` | 常數必須滿足的前提，開工前先驗（ch04 曾預告；ch16 另有 TLAPS 用法） | ch08 |\n| `IF`／`THEN`／`ELSE` | 條件運算式 | ch08 |\n| `LET … IN` | 區域定義：先取名再用，如 ch12 Paxos 的 Q1b／Q1bv | ch12 |\n| `Len`、`Append` | Sequences 模組：序列長度、尾端追加（raft.tla 精讀） | ch13 |\n| `INSTANCE … WITH x <- e`、`M!Op` | 模組實例化與參數代換；`!` 前綴避免撞名（ch06 曾預告） | ch15 |\n\n## TLAPS 證明關鍵字\n\n除註明者外，皆於 ch16 精讀真實 TLAPS 證明時首次出現。\n\n| 關鍵字 | 意思 | 首次出現 |\n|---|---|---|\n| `QED` | 本層目標證畢、由列出的步湊齊（手寫作 Q.E.D. 自 ch05；作關鍵字寫 QED 自 ch12 的層級證明） | ch05 |\n| `<1>1.` | ⟨1⟩1 的 ASCII 寫法：層級證明的步驟編號 | ch16 |\n| `BY e1, e2 DEF d1` | 本步的理由欄：用事實 e1、e2，展開定義 d1；TLAPS 不自動展開定義 | ch16 |\n| `OBVIOUS` | 不引額外事實，光靠當前上下文就該成立 | ch16 |\n| `SUFFICES ASSUME … PROVE …` | 把本層目標改寫成「假設 P、證 Q」 | ch16 |\n| `NEW` | 任取一個元素（∀ 引入）：ASSUME NEW m \\in Nat | ch16 |\n| `USE DEF` | 此後所有義務自動展開某定義的速記宣告 | ch16 |\n| `LEMMA` | 抽出來重用的小定理 | ch16 |\n| `PTL` | 時序葉步驟的後端呼叫（LS4）：如「由不變量規則」的機器版 | ch16 |\n\n## 本書自有記號\n\n- **⟨1⟩1 層級證明編號**（ch05 起，全書手寫證明的標準格式）：讀作「第 1 層第 1 步」。⟨2⟩ 步隸屬它上方最近的 ⟨1⟩ 步，依此類推；每層以 Q.E.D. 步收攏。讀法是可調深度的：先只讀 ⟨1⟩ 層看骨架，哪步可疑就鑽進它的下一層。到 ch16 它原樣變成 TLAPS 的證明語言（`<1>1.`）。\n- **狀態 tuple 寫法**（ch02 起）：一個狀態＝所有變數的一組賦值，寫成 ⟨queue = {m1, m2}, working = idle, ledger = [m1 ↦ 0, m2 ↦ 0]⟩。手追 behavior 時逐狀態列出。\n- **手追驗證記號 ✓／✗**（ch02 起）：逐 guard、逐合取打勾或打叉，「每條都驗、驗完蓋章」的紙上紀律。\n- **behavior 記號**（ch07）：σ = s₀ → s₁ → s₂ → … 表示一條（可無限的）behavior；σ⁽ⁱ⁾ 是它從位置 i 起的後綴。\n- **「← 你在這裡」路線圖**（ch01 起）：每個 Part 的第一章開頭放一張全書 ASCII 地圖，箭頭標出當前位置——先全局、再細節。\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 術語表", "md": "# 附錄 B — 術語表\n\n> 全書術語的 EN–ZH 對照與一句話定義，從 ch01–ch18 的實際內容萃取，依英文字母排序；書中未出現的術語不收。「首次出現」指該術語**正式登場並獲得解說**的章——個別名詞曾在更早的章節（尤其 ch01 的全景地圖）以一句話前瞻露面，不另計；一詞分「直覺版→正式版」兩階段深化者，記直覺版首次解說的章，並在定義內標注正式化的章。定義口徑以各章原文為準，這裡只是索引，細節請回到該章。\n\n## A\n\n- **action**（動作）｜同時含 unprimed（步前）與 primed（步後）變數的布林運算式，述說「一步」前後狀態的關係——TLA 的核心發明。｜ch06\n- **AllPaid**｜結算系統的 liveness 性質名：每則訊息終會入帳（∀ m ∈ Msgs : ◇ ledger[m]）；不配 fairness 它不成立。｜ch07\n- **Alloy**｜把世界建模成「集合與關係」的設計層工具：Analyzer 將約束翻成 SAT，在指定的 small scope 內窮舉結構、把反例實例畫成圖——問「存不存在壞結構」而非「會不會走到壞狀態」。｜ch18\n- **Alpern–Schneider 分解定理**｜任何性質都可以寫成一條 safety 與一條 liveness 的合取。｜ch07\n- **Apalache**｜符號式模型檢查器：不搬狀態、改解方程——把 Init 與 Next 編成 SMT 約束，可吃無限值域；承諾有界（找不到反例只代表「k 步之內沒有」），另可用來檢查歸納不變量。｜ch16\n- **at-least-once**｜佇列的交付保證：每則訊息至少投遞一次，代價是可能重複——SQS 的 visibility timeout 重投遞即此。｜ch01\n- **auxiliary variable**（輔助變數）｜為了讓 refinement mapping 寫得出來而給實作加的「只寫不讀」變數，分 history 與 prophecy 兩類；不影響協議的任何 guard 或轉移。｜ch15\n\n## B\n\n- **bag / multiset**（多重集）｜「元素 ↦ 正整數份數」的函數——建模 at-least-once 的訊息該用 set 還是 bag，是 ch04 的誠實選擇題。｜ch04\n- **ballot**｜Paxos 多輪投票的輪次編號，全序；直覺對應 optimistic lock 的版本號。｜ch12\n- **behavior**（行為）｜一條（可無限長的）狀態序列：起點是合法初始狀態，每對相鄰狀態都是某條動作規則允許的步。｜ch02\n- **BFS**（廣度優先搜尋）｜TLC 主迴圈的遍歷方式：FIFO 佇列逐層展開可達狀態——因此反例 trace 天生是最短路徑。｜ch09\n- **blocking**（卡死）｜協議在無人違規的情況下永遠無法前進——2PC 在 TM 故障時讓 prepared 的 RM 永遠等待（in-doubt transaction），是「不犧牲一致性」的本質代價，不是實作 bug。｜ch11\n- **bound variable / free variable**（約束變數／自由變數）｜量詞自己的「迴圈變數」是約束的，scope 只在量詞之內；式子的真假取決於外層誰來填的變數，是自由的。｜ch03\n- **bounded waiting**（有界等待）｜對手至多插隊一次之後自己必然進場——Peterson 給出的、比 starvation-freedom 更強的保證。｜ch10\n\n## C\n\n- **CompCert**｜經機器證明的 C 編譯器（以 Rocq 證明），定理是「編譯不改變程式語意」——程式碼級驗證的代表作。｜ch16\n- **conformance checking**｜確保程式碼真的長得像 spec；MongoDB 用 trace-checking（MBTC）與 model-based test-case generation（MBTCG）兩招實測，結論是貴到必須在寫 spec 之初就為它設計。｜ch17\n- **consensus**（共識）｜一群行程要從各自提議的值裡選定一個，要求三條：Agreement（至多選定一個值）、Validity（選定的值必須有人提議過）、Termination（終究要選定）。｜ch12\n- **counterexample trace**（反例 trace）｜模型檢查器的輸出：從初始狀態走到出錯的一條具體路徑，像一份完美的 bug report；BFS 保證它最短（讀法見 ch09）。｜ch01\n- **critical section**（臨界區）｜兩個 process 要共用、但不准同時進入的那段程式；進出各有 entry protocol 與 exit protocol。｜ch10\n\n## D\n\n- **Dafny**｜把驗證內建進程式語言：函式上寫 pre/post-condition、迴圈寫 invariant，SMT 求解器邊打字邊逐條檢查——程式碼級驗證最平易近人的入口。｜ch18\n- **deadlock**（死鎖）｜沒有任何後繼（所有動作皆不 enabled）的狀態；TLC 預設把它當錯誤回報，與「系統做完了」的良性終局要分清。｜ch09\n- **deadlock-freedom / starvation-freedom**｜互斥問題的兩級 liveness：前者「只要有人想進，就有人終會進去」；後者更強，「每個想進的 process 自己終會進去」。｜ch10\n- **deterministic simulation testing**（DST）｜把調度變成可控輸入：整個叢集跑在同一個單執行緒模擬器裡，一切非決定性由帶種子的偽亂數供應——同一個種子可逐位元重放同一場災難（FoundationDB 路線）。｜ch18\n- **DieHard**｜3 與 5 加侖壺量出 4 加侖的經典謎題 spec；示範「把目標寫成 invariant 的否定、讓反例變成解」的招式。｜ch08\n\n## E\n\n- **Election Safety**｜Raft 五條 safety 性質之一：一個 term 至多選出一個 leader。｜ch13\n- **ENABLED**｜狀態述語：ENABLED A 在狀態 s 為真 ⟺ 存在 t 使 ⟨s, t⟩ 滿足 A——「這種步走得出去」；注意 enabled 不等於會發生。｜ch06\n- **Event-B**｜把 refinement 當整個方法骨架的規格語言：從極抽象的機器逐步精化到貼近實作，每步精化自動產生 proof obligations，配套的 Rodin 平台管理整條證據鏈。｜ch18\n- **exactly-once**｜「同一則訊息恰好處理一次」的語義；本書把「at-least-once＋dedup 實作了 exactly-once」這句黑話定理化，並誠實拆帳：safety 那一半（至多一次）是 refinement 定理，liveness 那一半（終將入帳）掛在 fairness 的帳上。｜ch15\n\n## F\n\n- **fairness**（公平性）｜加在 Spec 後面的合取項，砍小行為集合、排除「明明可以做事卻永遠拖著」的劇本——liveness 主張的必要假設，分 WF 與 SF 兩種強度；它是假設，不是機制。｜ch07\n- **fingerprint**（指紋）｜TLC 給每個狀態算的 64-bit 雜湊，只存指紋以省記憶體；代價是碰撞——後到的狀態被誤判「看過了」、其後整片子圖無聲消失，所以 TLC 的紅燈永遠是真的、綠燈帶一個機率上的星號。｜ch09\n- **FLP 不可能定理**｜非同步系統裡只要有一個行程可能 crash，就不存在既是確定性、又保證必然終止的共識演算法——所以 Paxos 選擇 safety 無條件、liveness 看天吃飯。｜ch12\n- **formal methods**（形式化方法）｜用數學描述並驗證系統的方法總稱；全景地圖兩軸：驗哪個層次（規格層 vs 程式碼層）、怎麼驗（自動找反例 vs 人寫證明）。｜ch01\n- **function**（函數）｜由定義域（domain，合法輸入的集合）與「每個輸入恰好一個值」完全決定的表——TLA+ 的世界觀：函數＝總是查得到的表。｜ch04\n\n## H\n\n- **history variable**（歷史變數）｜只為證明而活的輔助變數：把實作已經丟掉的歷史抄寫進狀態，讓性質寫得成狀態述語；不出現在實作中、不影響任何轉移。｜ch13\n\n## I\n\n- **inductive invariant**（歸納不變量）｜滿足不變量規則兩前提的述語：所有初始狀態滿足它，且從**任何**滿足它的狀態（包括不可達的）走任何一步仍滿足——全書最重要的單一概念；invariant 為真不代表 inductive。｜ch05\n- **Init / Next / Spec**｜TLA+ spec 的三件套：Init 是圈出合法起始狀態的狀態述語；Next 是諸具名 action 的析取；Spec ≜ Init ∧ □[Next]_vars，一條公式圈出所有合法 behavior。｜ch06\n- **INSTANCE**｜TLA+ 裡寫 refinement mapping 的語法：引入模組＝做代換（substitution），把抽象 spec 的變數用實作的狀態函數（WITH 子句）代掉。｜ch15\n- **interactive theorem prover**（互動式定理證明器）｜把「證明」本身變成一種程式設計，每一步在型別檢查器監督下構造——嚴謹度光譜最右端：Lean、Rocq、Isabelle。｜ch16\n- **interleaving**（交錯）｜把多個執行緒的步驟合併成一條序列、各自內部順序不變的一種調度；交錯數隨步數組合爆炸，測試只能對它抽樣。｜ch01\n- **invariant**（不變量）｜在**每一個可達狀態**都為真的狀態述語——「壞事永遠不會發生」主張的標準形狀。｜ch02\n- **Isabelle**｜老牌互動式定理證明器，代表作 seL4；客製版 Isabelle/TLA+ 同時是 TLAPS 的壓陣後端。｜ch16\n\n## L\n\n- **lasso**（套索）｜有限狀態圖上無限 behavior 的形狀：一段有限前綴＋一個循環；TLC 檢查 liveness＝找滿足 fairness 的壞 lasso，循環都住在 SCC（強連通分量）裡。｜ch09\n- **Leader Append-Only**｜Raft 五條 safety 性質之一：leader 絕不改寫或刪除自己的 log，只追加。｜ch13\n- **Leader Completeness**｜Raft 五條 safety 性質之一：某 term 內提交的 entry，必出現在所有更高 term 的 leader 的 log 裡。｜ch13\n- **leader election**｜Raft 的選舉機制：follower 逾時轉 candidate、term 加一、投自己一票並向全體拉票，拿到過半選票就成為該 term 的 leader；投票受兩條鐵律約束。｜ch13\n- **Lean 4**｜Lean FRO 維護的定理證明器兼程式語言，配協作數學庫 mathlib（從大學課程蓋到研究前沿）——深度數學端的代表。｜ch16\n- **lightweight formal methods**（輕量級形式化方法）｜不上重型證明的形式化路線——如 S3 ShardStore 的 Rust 參考模型＋property-based testing；用較小成本買部分保證。｜ch17\n- **liveness**（活性）｜「好事終究會發生」；違反它的證據永遠湊不齊有限版本——「再等等」永遠是合法辯護。正式定義（任何有限前綴都還有救）見 ch07。｜ch02\n- **log replication**｜Raft 的強 leader 複製：所有寫入走 leader、log 單向推給 followers；entry 複製到過半且屬於 leader 當前 term，才推進 commitIndex（提交）。｜ch13\n- **Log Matching**｜Raft 五條 safety 性質之一：兩份 log 若在同一 index 有同 term 的 entry，則到該 index 為止整段相同。｜ch13\n- **loop invariant**（迴圈不變量）｜進迴圈前成立、每圈保持、結束時收割結論的述語——歸納不變量在單機程式裡的近親。｜ch05\n\n## M\n\n- **mathematical induction**（數學歸納法）｜P(0) 成立、且 ∀ n : P(n) ⇒ P(n+1)，則 P 對所有自然數成立——證明「永遠」的唯一有限手段；變體有強歸納（假設所有更小的數都成立）與結構歸納（順著歸納定義的形狀走）。｜ch05\n- **model checking**（模型檢查）｜機器自動窮舉（或符號化覆蓋）狀態空間、找性質的反例；輸出反例 trace，極限是通常只能在有限的小模型上窮舉。｜ch01\n- **MODULE / EXTENDS / CONSTANTS / ASSUME / VARIABLES / THEOREM**｜spec 解剖學的骨架關鍵字：模組命名與組織單位／引用哪些標準模組／哪些參數先宣告不寫死／參數必須滿足的前提／狀態由哪些變數組成／作者主張這份 spec 滿足什麼。｜ch08\n- **mutual exclusion**（互斥）｜只用原子讀寫、不靠現成的鎖，保證兩個 process 不同時進入臨界區的問題；本書性質名 `MutualExclusion`：任何時刻至多一個 process 在臨界區。｜ch10\n\n## N\n\n- **NoDoublePay**｜結算系統的 safety 性質名：同一個 msgId 至多入帳一次——全書貫穿的 safety 範例，v1 寫成 ∀ m ∈ Msgs : ledger[m] ≤ 1。｜ch02\n- **nondeterminism**（非決定性）｜一個狀態可走多條規則、沒有人決定走哪條：規格只回答「允不允許」，不回答「多常發生」、不附機率——crash 與重送都這樣建模。｜ch02\n\n## P\n\n- **P**｜把系統寫成一組互傳事件的 communicating state machines 的語言；spec 可執行，配套 checker 系統性探索訊息交錯與故障注入——AWS 主力工具箱成員。｜ch18\n- **P2c**｜Paxos 的核心不變量（沿 Lamport 編號，蘊涵 P2 與 agreement）：發出提案 ⟨n, v⟩ 之前必須有多數集 S 作證——要嘛 S 是白紙、要嘛 v 抄自 S 中編號最高的已接受提案；phase 1/2 的每條規則都是它的影子。｜ch12\n- **Paxos**｜共識問題的標準答案：ballot＋兩階段＋quorum intersection；safety 無條件成立（任何交錯、延遲、少數 crash），liveness 依賴時序假設。｜ch12\n- **Paxos Commit**｜把 2PC 裡「TM 的那個決定」本身交給容錯共識：用 2F+1 個協調者跑 Paxos，拔掉單點。｜ch11\n- **Peterson algorithm**｜Gary Peterson（1981）的兩 process 互斥解：旗子＋禮讓變數，兩頁論文的簡潔答案；本書第一場全狀態空間手推的主角。｜ch10\n- **Phase 1 / Phase 2**｜Paxos 的兩階段：phase 1（prepare）要求 acceptor 承諾（promise）不再接受更小編號、並交出已接受的最高票；phase 2（accept）收齊多數回應後發出提案——歷史不空就只能抄最高票的值。｜ch12\n- **PlusCal**｜寫在 `.tla` 註解區塊裡的演算法語言，由翻譯器轉成 TLA+ 之後才能餵給工具（翻譯產物用 pc 變數記錄「執行到哪個標籤」）；本書只要求看得懂、不要求會寫。｜ch08\n- **predicate**（述語）｜帶洞的命題：填入具體值之前沒有真值；「對單一狀態非真即假的判斷句」是狀態述語。｜ch03\n- **prepared**｜2PC 裡 RM 表態過「我這邊可以 commit」之後的狀態：再也不能單方面 abort，只能等 TM 的決定——blocking 的人質。｜ch11\n- **proof obligation**（證明義務）｜一小句「在這些事實之下，這個斷言成立」；TLAPS 把層級證明拆成一條條義務丟給後端 prover 逐條查驗——紅一條，整份不算。｜ch16\n- **property-based testing**（PBT）｜寫「對任意輸入，性質 P 成立」，框架生成幾百組輸入轟炸實作，找到反例自動 shrinking 成最小重現輸入；寫 property 的能力＝寫 invariant 的能力，但它仍是抽樣、對併發遲鈍。｜ch18\n- **prophecy variable**（預言變數）｜補充「實作還沒決定的未來」的輔助變數：把未來的決定搬進現在的狀態，某些 refinement mapping 非它不可（完整理論見 Lamport–Abadi）。｜ch15\n- **proposer / acceptor**｜Paxos 的兩種角色：proposer 發起提案（phase 1 拉承諾、phase 2 發 accept）；acceptor 負責投票，多數 acceptor 接受同一提案＝該值被選定。｜ch12\n- **proposition**（命題）｜一個非真即假的宣告句——邏輯的原子單位。｜ch03\n\n## Q\n\n- **Quint**｜TLA+ 語意的現代語法外衣：有型別、語法像現代程式語言、內建模擬器，要做真正的模型檢查時接 Apalache 當後端——換的是皮，不是骨。｜ch18\n- **quorum**（多數派）｜任何 ≥ 過半的子集；唯一重要的性質是任兩個 quorum 必有交集（quorum intersection）——把兩個決定綁在同一個證人身上、逼它們相等的唯一槓桿。｜ch12\n\n## R\n\n- **Raft**｜把 understandability 當一級需求的共識演算法：強 leader、term 邏輯時鐘、五條 safety 性質；結果與 (multi-)Paxos 等價、效率相當，但結構為了好懂而重排。｜ch13\n- **record**｜定義域是欄位名的函數——JSON object 的數學形狀。｜ch04\n- **refinement**（精化）｜「實作正確」的定理形狀：規格與實作都是時序公式，Impl ⇒ Spec——實作允許的行為集合是規格的子集。｜ch15\n- **refinement mapping**（精化映射）｜用狀態函數把實作狀態映到規格狀態的「眼鏡」：每個實作步映成一個規格步或 stuttering——戴上它看實作，就看到規格的世界。｜ch15\n- **resource manager（RM）**｜分散式交易中各自做本地工作、對「能不能 commit」表態的參與者；rmState ∈ {\"working\", \"prepared\", \"committed\", \"aborted\"}。｜ch11\n- **Rocq**｜互動式定理證明器，原名 Coq（2025-03 隨 9.0 版改名，舊文獻兩名同物）；代表作 CompCert。｜ch16\n\n## S\n\n- **safety**（安全性）｜「壞事永遠不會發生」；違反的證據是有限的——走到第 k 步出事，當場定罪。正式定義（有限前綴刻畫）見 ch07。｜ch02\n- **seL4**｜一個 microkernel 的 C 實作被 Isabelle 證明在功能上符合其抽象規格——全程式碼驗證「做得到」的存在性證明，也是成本的刻度原器（人力以人年計）。｜ch16\n- **set**（集合）｜由成員資格唯一決定的「一堆東西」：對任何 x，「x ∈ S」有明確的是或否；無順序、無重複。｜ch04\n- **SF / strong fairness**（強公平性）｜SF_v(A) ≜ □◇(ENABLED ⟨A⟩_v) ⇒ □◇⟨A⟩_v：反覆可做（哪怕斷斷續續）的動作終究要做——對得起反覆 crash-restart、卻總會被拉起來的 consumer。｜ch07\n- **small scope hypothesis**｜經驗賭注：絕大多數設計層 bug 在很小的參數下就有反例；輸的方式已知——性質涉及「數量本身」時，小參數連反例的舞台都搭不起來，所以要把驗過的參數寫進結論。｜ch09\n- **SMT**｜把命題編成約束交給求解器的自動推理路線：TLAPS 的預設後端（Z3）、Apalache 的引擎；擅長算術與基本的集合、函數推理，怕量詞層層疊的式子——搞不定就拆步驟。｜ch16\n- **spec drift**（spec 腐化）｜spec 也是文件、一樣會腐化，且頂著「已驗證」光環腐化得更危險；不是「會不會」的問題，是「漂移速度 vs 對齊頻率」的維運題。｜ch17\n- **specification**（規格）｜一個系統的規格＝它**允許的行為的集合**；「系統正確」＝實際發生的每一條行為都落在集合裡——規格是立法，不是執行流程的描述。｜ch02\n- **SPIN / NuSMV**｜「TLC 的長輩們」：SPIN 是顯式狀態模型檢查的元老（Promela 語言、LTL 性質）；NuSMV 走符號路線（BDD），出身硬體驗證。｜ch18\n- **split vote**｜多個 candidate 同時發起選舉、票數均分、無人過半，只好下一輪再來——重試碰撞的 Raft 版，用隨機化逾時（jitter）化解。｜ch13\n- **starvation**（餓死）｜系統整體有進展，但某個 process 永遠等不到它要的——與 deadlock（全體卡死）並列的兩種「卡」。｜ch10\n- **state**（狀態）｜給每個變數各指定一個值的一組賦值——整體快照，不是單一變數；併發 bug 多藏在「各自合理、合起來不合理」的組合裡。｜ch02\n- **state explosion**（狀態爆炸）｜狀態數隨變數值域相乘、隨參與者數指數成長的現象——模型檢查的根本敵人；緩解手段：constraint、symmetry、抽象。｜ch09\n- **state machine**（狀態機）｜「初始狀態＋轉移規則」的極簡結構（不是 regex 的有限自動機）；本書世界觀：一切系統都是狀態機。｜ch02\n- **State Machine Safety**｜Raft 五條 safety 的端到端承諾（論文稱 the key safety property）：一台 server 在某 index apply 了某 entry，就不會有任何 server 在同一 index apply 不同的 entry。｜ch13\n- **state space**（狀態空間）｜所有可能的變數賦值組合；它與「實際走得到的可達狀態」是兩回事——這個區分是 ch02 後半的主角。｜ch02\n- **step**（步）｜一對前後狀態 ⟨s, t⟩；哪些步被允許由動作規則決定——前提說何時可走，效果說每一個變數變成什麼。｜ch02\n- **strengthening**（強化）｜目標性質不 inductive 時，在它上面疊輔助述語讓歸納封得起來的動作；ch14 把它升級成「從卡住的歸納步讀出壞前驅、判可達性、再強化」的迴圈。｜ch05\n- **stuttering**｜「什麼都不動」的步：□[Next]_vars 裡 vars′ = vars 的免責條款。允許不動不是寬鬆，是讓「實作蘊涵規格」在數學上可能成立的先決條件（ch15 兌現）。｜ch06\n- **symmetry reduction**（對稱化簡）｜宣告對稱集合後，同構（互為置換）的狀態只算一次——把整條軌道坍縮成一個代表點的狀態空間緩解手段。｜ch09\n- **Synod**｜single-decree Paxos 的本名：定案**一個**值的協議；Multi-Paxos＝逐 slot 各跑一個 Synod 實例來定案一串值（replicated log）。｜ch12\n\n## T\n\n- **TCommit**｜Lamport 的交易承諾「規格」spec：只寫「什麼叫對」（全體對結果收斂、TCConsistent），不寫怎麼做到——與 TwoPhase 構成 refinement 的活教材。｜ch11\n- **TCConsistent**｜交易承諾的 safety 性質：不准有 RM aborted 的同時另一個 RM committed。｜ch11\n- **temporal logic**（時序邏輯）｜對整條 behavior 說話的第三層詞彙（狀態述語談單一狀態、action 談一步）：□ 永遠、◇ 終將、⤳ 導至。｜ch07\n- **term**｜Raft 的邏輯時鐘：單調遞增的整數、每個 term 至多一個 leader；訊息都蓋 term 戳章，舊 term 一律被打回票——世代編號（epoch / generation）的直覺。｜ch13\n- **theorem proving**（定理證明）｜人寫證明、機器逐步查證每個推理義務；輸出是對任意參數、無限狀態都成立的定理——代價是人的腦力，且卡住時不會給你反例。｜ch01\n- **Three-Phase Commit（3PC）**｜在 prepared 與 committed 之間再插一個 pre-commit 階段來換非阻塞；代價是 network partition 之下賠掉 safety——把卡死換成不一致，所以生產環境幾乎不用。｜ch11\n- **TLA**（Temporal Logic of Actions）｜Lamport 的動作時序邏輯：把「一步前後關係」的 action 放進時序邏輯——TLA+ 的邏輯核心。｜ch06\n- **TLA+**｜以 TLA 為邏輯核心、ZF 集合論為數學底的規格語言；一門語言配三個引擎：TLC 窮舉、Apalache 符號檢查、TLAPS 證明。｜ch01\n- **TLAPS**｜TLA+ 的證明系統：proof manager 把 ⟨1⟩ 層級證明拆成一條條 proof obligation，逐條交給後端 prover（SMT／Zenon／Isabelle／LS4）查驗——能證任意參數的定理，漏格在語法上不可能。｜ch16\n- **TLC**｜顯式狀態（explicit-state）模型檢查器：BFS 窮舉有限參數下的可達狀態、檢查性質、回報最短反例 trace；有限參數的窮舉 ≠ 定理。｜ch09\n- **transaction manager（TM）**｜2PC 的協調者：phase 1 收集全員 prepared、phase 2 廣播決定——單點，它在收齊後、廣播前倒下就是 blocking。｜ch11\n- **tuple**｜有序、定長、可重複的 ⟨…⟩；sequence 是長度不固定的 tuple，1-indexed——array 的數學形狀。｜ch04\n- **Two-Phase Commit（2PC）**｜交易承諾（transaction commit）問題的經典解：phase 1 問全員「能否 commit」收 prepared，phase 2 廣播決定；不犧牲一致性，代價是 TM 故障時 blocking。｜ch11\n- **TwoPhase**｜Lamport 的 2PC 協議 spec：把 TCommit 的上帝視角拆成訊息；spec 的最後一行就主張「TwoPhase 實作了 TCommit」。｜ch11\n- **TypeOK**｜型別不變量：用狀態述語把每個變數的值域主張出來——TLA+ 沒有型別系統，所以它幾乎總是 spec 的第一個 invariant，而且通常自己就 inductive。｜ch08\n\n## U–V\n\n- **UNCHANGED**｜UNCHANGED v ≜ v′ = v 的縮寫——「沒提到的變數不是隨便，是不變」必須明寫，漏寫是 action 最常見的 bug。｜ch06\n- **understandability**｜Raft 的設計目標：把「好懂」當成一級設計需求，結構為此重排——與 Paxos 對照的主軸是「複雜度被搬去哪了」。｜ch13\n- **vacuous truth**（空洞為真）｜前件為假則蘊涵式整句為真——invariant「假通過」的頭號機制：連壞事的原料都沒生出來，性質當然成立。｜ch03\n\n## W–Z\n\n- **WF / weak fairness**（弱公平性）｜WF_v(A) ≜ ◇□(ENABLED ⟨A⟩_v) ⇒ □◇⟨A⟩_v：一個動作不可以「永遠可做卻永遠不做」——對得起一台持續健康的 consumer。｜ch07\n- **ZF set theory**（ZF 集合論）｜TLA+ 的數學底：一切皆集合——數字、tuple、函數、record 原則上都能編碼成集合；直接後果是 TLA+ 沒有型別系統。｜ch04\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> **本附錄是什麼**：ch01–ch18 各章「延伸閱讀」的全部條目，去重後按類別重排，再加上事實基準（2026-06 landscape）已驗證的少數生態入口。收錄規則：**只收各章已列出、或 landscape 已驗證的資源**，本附錄不新增任何未經查證的連結；原章與 landscape 的驗證註記（「2026-06 開頁核對」「未逐字核對」「未開原文」等）一律保留。每條格式：名稱—連結—一句話（沿用原章的推薦語）—出現章。\n\n## C.1 書\n\n- **Specifying Systems**（Leslie Lamport，Addison-Wesley，2002）：`https://lamport.azurewebsites.net/tla/book.html`（官方頁免費 PDF；頁面驗證於 2026-06）— 全書的最終參考書，讀原文最大的收穫是 Lamport 對每個設計決定的辯護。各章指路：第 1 章〈A Little Simple Math〉複習本書 ch03–04 的全部數學；第 2 章是時鐘例子（HourClock）的原始出處；第一部分（第 1–7 章，約 83 頁）是本書整個 Part III 的原典；第 8 章〈Liveness and Fairness〉是 WF/SF 的教科書版；第 14 章〈The TLC Model Checker〉是 TLC 的官方原典；第 4 章是 INSTANCE／substitution 的官方語意。（出現章：ch01、ch02、ch03、ch04、ch06、ch07、ch08、ch09、ch15）\n- **Practical TLA+**（Hillel Wayne，Apress，2018）：未附連結（landscape 經 learntla.com 證實作者身分；出版社與年份為常識性事實、未另行查證）— learntla 作者的紙本入門書，走「動手跑工具」路線，與本書的紙上推演路線互補。（出現章：無，僅 landscape §3）\n- **A Science of Concurrent Programs**（Leslie Lamport，Cambridge University Press，2026）：`https://lamport.azurewebsites.net/tla/science-book.html`（官網提供免費 PDF；2026-06 開頁核對）— Lamport 晚期的集大成之作；歸納不變量與 refinement 在完整理論裡的位置都在這裡，建議讀完 ch15、ch16 再回來啃。（出現章：ch14）\n- **The Art of Multiprocessor Programming**（M. Herlihy & N. Shavit）：未附連結 — 第 2 章系統性地講互斥：Peterson、filter lock（n-process 推廣）、Lamport bakery，以及這些演算法在真實硬體（弱記憶體模型、cache）上的命運；本書「每步原子」假設之外的世界，從這裡開始。（出現章：ch10）\n- **Software Abstractions**（Daniel Jackson）：未附連結（書本身未另行查證版次）— Alloy 思維的原典；線上入口見 C.6 的 Alloy 官網。（出現章：ch18）\n- **Book of Proof 第 3 版**（Richard Hammack）：`https://richardhammack.github.io/BookOfProof/`（官方免費 PDF）— 第 2 章〈Logic〉用最少的形式機械把真值表、量詞、否定推移講完，習題量大；想把 ch03 練成厚實的肌肉，做它的習題最划算。（出現章：ch03）\n- **Mathematics for Computer Science**（Lehman、Leighton 與 Meyer）：`https://people.csail.mit.edu/meyer/mcs.pdf`（MIT 開放教材，免費 PDF）—〈Logical Formulas〉一章從數位電路與程式驗證的動機講命題與謂詞邏輯，工程味最重的一本；讀 ch05 歸納法時它也是好補充。（出現章：ch03）\n\n## C.2 論文\n\n### 理論奠基\n\n- **Dijkstra，“On the reliability of programs”（EWD303）**：`https://www.cs.utexas.edu/~EWD/transcriptions/EWD03xx/EWD303.html`（UT Austin 檔案館轉錄）— 「測試只能證明 bug 存在」名言的原始脈絡——他不是在罵測試，是在論證「正確性需要不同種類的論證」。（出現章：ch01）\n- **Lamport，“Computation and State Machines”（2008）**：`https://lamport.azurewebsites.net/pubs/state-machine.pdf` — Lamport 親自論證「計算就該用狀態機描述、而描述狀態機用數學就夠了」的立場文，本書世界觀的源頭；讀前半部就值回票價。（連結驗證於 2026-06）（出現章：ch02）\n- **Lamport，“The Temporal Logic of Actions”（ACM TOPLAS 1994）**：`https://lamport.azurewebsites.net/pubs/pubs.html#lamport-actions` — TLA 的原始論文；想看「為什麼把 action 放進邏輯、stuttering 為何不可妥協」的第一手論證，讀前兩節就值回票價。（出現章：ch06）\n- **Alpern & Schneider，“Defining Liveness”（*Information Processing Letters* 21(4)，1985）**：未附連結（期刊原文在付費牆內）— liveness 正式定義與「任何性質＝safety ∧ liveness」分解定理的原始出處；正文不到五頁，拓撲味比本書直覺版重，先讀 Lamport 的 safety-liveness 講義轉述也夠用（見 C.4）。（出現章：ch07）\n- **Lamport，“How to Write a 21st Century Proof”（2011）**：`https://lamport.azurewebsites.net/pubs/proof.pdf` — 層級證明格式的原典；本書的 ⟨1⟩⟨2⟩ 編號就是它的手寫版，ch16 的 TLAPS 是它的機器版。讀前半即可。（出現章：ch05）\n- **Lamport，“Teaching Concurrency”（2009）**：`https://lamport.azurewebsites.net/pubs/teaching-concurrency.pdf` — 兩頁的小論文：不變量是理解併發系統的鑰匙，而多數工程師沒被教過這樣思考；文末的小演算法是練 ch14 強化迴圈最便宜的啞鈴。（出現章：ch05、ch14）\n- **Yu、Manolios、Lamport，“Model Checking TLA+ Specifications”（CHARME 1999）**：`https://lamport.azurewebsites.net/pubs/yuanyu-model-checking.pdf` — TLC 的出生論文：為什麼要為無型別的集合論語言做顯式狀態檢查器、fingerprint 的設計取捨。（連結定位於 2026-06，內文意旨經摘要核對）（出現章：ch09）\n- **Fischer、Lynch、Paterson，“Impossibility of Distributed Consensus with One Faulty Process”（*JACM* 32(2)，1985）**：`https://groups.csail.mit.edu/tds/papers/Lynch/jacm85.pdf`（2026-06 可得）— FLP 本尊；本書不證，讀第 1 節與主定理的敘述，把每個限定詞讀準就值回票價。（出現章：ch12）\n- **Abadi & Lamport，“The Existence of Refinement Mappings”（*TCS* 82(2)，1991；會議版 LICS 1988）**：`https://lamport.azurewebsites.net/pubs/pubs.html#abadi-existence` — refinement mapping 與 prophecy variable 的出生地；讀引言與 §1–2，看「mapping 何時存在」的三個條件怎麼陳述。（2026-06 查證）（出現章：ch15）\n- **Lamport & Merz，“Auxiliary Variables in TLA+”（2017）**：`https://lamport.azurewebsites.net/pubs/auxiliary.pdf`（arXiv:1703.05121）— history／prophecy／stuttering 三種輔助變數在 TLA+ 裡的具體加法規則——ch15 概念層的施工手冊。（2026-06 查證）（出現章：ch15）\n- **Cousineau、Doligez、Lamport、Merz 等，“TLA+ Proofs”（FM 2012）**：`https://lamport.azurewebsites.net/pubs/tlaps.pdf` — TLAPS 證明語言的設計論文：為什麼是層級、為什麼宣告式、義務怎麼生成。讀 §2–3 就夠。（2026-06 連結可達）（出現章：ch16）\n\n### 協議原典\n\n- **Dijkstra，“Solution of a Problem in Concurrent Programming Control”（*CACM* 8(9)，1965）**：`https://cacm.acm.org/research/solution-of-a-problem-in-concurrent-programming-control/` — 互斥問題的開山之作，一頁紙，n 個 process。（出現章：ch10）\n- **Peterson，“Myths About the Mutual Exclusion Problem”（*Information Processing Letters* 12(3)，1981）**：未附連結 — 原始論文，兩頁；看一個傳世演算法可以多短，也看 1981 年的正確性論證跟你在 ch10 做的手推差在哪。（出現章：ch10）\n- **Gray & Lamport，“Consensus on Transaction Commit”（*ACM TODS* 31(1)，2006）**：`https://dl.acm.org/doi/10.1145/1132863.1132867`（Microsoft Research 頁面有 PDF）— TCommit 與 TwoPhase 兩份 spec 的論文出處；讀第 3–4 節看 2PC 如何被定位成 Paxos Commit 的 F = 0 特例。（出現章：ch11）\n- **Skeen，“Nonblocking Commit Protocols”（ACM SIGMOD 1981）**：`https://dl.acm.org/doi/10.1145/582318.582339` — 3PC 的原典，給出非阻塞承諾協議的充要條件——讀它是為了看清那些條件在 partition 下如何失效。（出現章：ch11）\n- **Lamport，“Paxos Made Simple”（2001）**：`https://lamport.azurewebsites.net/pubs/paxos-simple.pdf`（2026-06 驗證可下載）— ch12 的 P1／P2／P2c 引文與 phase 1/2 推導全部出自 §2.2，十四頁讀完整個不變量鏈。（出現章：ch12）\n- **Lamport，“The Part-Time Parliament”（*ACM TOCS* 1998）**：`https://lamport.azurewebsites.net/pubs/pubs.html#lamport-paxos`（Lamport 出版品頁錨點）— 寓言包裝的原始論文，當文化史讀——「Paxos 難」的名聲有一半是文體造成的。（出現章：ch12）\n- **Ongaro & Ousterhout，“In Search of an Understandable Consensus Algorithm (Extended Version)”**：`https://raft.github.io/raft.pdf` — Raft 五條 safety 性質的出處（Figure 3）；§5.4.1 的投票限制與 Figure 8 是必讀段落。（出現章：ch13）\n- **Ongaro，*Consensus: Bridging Theory and Practice*（Stanford 博士論文，2014）**：`https://github.com/ongardie/dissertation` — membership change 與 log compaction 各有專章；第 8 章與附錄是 safety 證明，README 提到 Verdi 團隊後來在 Coq 裡完成核心安全性的機器證明——ch16「嚴謹度光譜」的真實樣本。（出現章：ch13）\n\n### 業界案例論文與報告\n\n- **Newcombe 等六人，“How Amazon Web Services Uses Formal Methods”（*CACM* 58(4)，2015）**：DOI `https://doi.org/10.1145/2699417`（正式版有付費牆）— 本書所有 AWS 數字與引文的原典；先讀 Table 1 與 DynamoDB「35 步」一節。（2026-06 已對照 PDF 原文逐字核對）（出現章：ch01、ch17）\n- **“Use of Formal Methods at Amazon Web Services”（2014 技術報告）**：`https://lamport.azurewebsites.net/tla/formal-methods-amazon.pdf`（Lamport 網站存檔；landscape 標注未開頁）— CACM 版的免費前身，內容高度重疊；引用數字時以 CACM 版為準。（出現章：ch01）\n- **Lamport，“Who Builds a House Without Drawing Blueprints?”（*CACM* 58(4)，2015）**：DOI `https://doi.org/10.1145/2736348` — 「寫 spec 的最大價值是先想清楚」論點的原典，四頁，一杯咖啡的長度。（出現章：ch01）\n- **“Systems Correctness Practices at Amazon Web Services”（*CACM* 68(6)，2025-06；ACM Queue 版 22(6)）**：`https://queue.acm.org/detail.cfm?id=3712057` — 2015 的十年後續篇，AWS 正確性工具箱的全景。（2026-06 查證時點全文受取用限制，ch17 僅依摘要與二手轉述引用其框架）（出現章：ch17）\n- **“Using Lightweight Formal Methods to Validate a Key-Value Storage Node in Amazon S3”（SOSP 2021）**：DOI `https://dl.acm.org/doi/10.1145/3477132.3483540` — ShardStore 的輕量方法論文（Rust 參考模型＋property-based testing）——讀它最重要的理由是搞清楚它**不是** TLA+ 案例。（2026-06 未開原文，存在性經多來源確認）（出現章：ch17）\n- **Davis、Hirschhorn、Schvimer，“eXtreme Modelling in Practice”（*PVLDB* 13(9)，2020）**：`http://vldb.org/pvldb/vol13/p1346-davis.pdf` — 工業界少見的誠實：§4 的 MBTC 驗屍報告與 §5 的 MBTCG 成功學，spec–code 同步是真痛點。（2026-06 對照論文原文）（出現章：ch17）\n- **Hackett、Rowe、Kuppe，“Understanding Inconsistency in Azure Cosmos DB with TLA+”（ICSE-SEIP 2023）**：arXiv `2210.13661` — 使用者視角 spec 如何照出官方 spec 的縫隙；搭配官方 repo（見 C.3）對讀。（2026-06 對照 arXiv 摘要）（出現章：ch17）\n\n## C.3 spec 原文\n\nGitHub `tlaplus/Examples` repo 為活躍維護（有 CI 驗證工作流程；landscape 2026-06 開頁驗證），以下 Examples 內的路徑全部經 GitHub API 確認存在。\n\n- **DieHard.tla（＋DieHarder.tla）**：`https://github.com/tlaplus/Examples/blob/master/specifications/DieHard/DieHard.tla` — ch08 精讀的原文，註解比程式碼多三倍，Lamport 式教學的標本；DieHarder.tla 把壺的數量與容量推廣成 CONSTANTS。（連結驗證於 2026-06）（出現章：ch08）\n- **DieHard_proof.tla**：`https://github.com/tlaplus/Examples/blob/master/specifications/DieHard/DieHard_proof.tla` — ch16 精讀的原檔，全文 81 行；BigToSmall 那個對稱案是現成的自我測驗。（2026-06 開頁下載，引文逐字一致）（出現章：ch16）\n- **TCommit.tla**：`https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TCommit.tla` — 交易承諾問題層 spec 全文（66 行）；讀的重點是註解怎麼把每個定義的「為什麼」講完。（出現章：ch11）\n- **TwoPhase.tla（＋同目錄 PaxosCommit.tla）**：`https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TwoPhase.tla` — 2PC 協議層 spec 全文；讀完 ch15 回去重看最後兩行，它們是你能逐義務複核的定理，不再只是兩行咒語。（出現章：ch11、ch15）\n- **Paxos 三層：Consensus.tla → Voting.tla → Paxos.tla**：`https://github.com/tlaplus/Examples/blob/master/specifications/Paxos/Paxos.tla`（同目錄三份，2026-06 驗證存在）— 把 Voting.tla 的 ShowsSafety 定理對照 ch12 的 ⟨1⟩ 論證讀；Voting.tla 檔尾的 `C == INSTANCE Consensus` 是三層樓中間那層的焊縫（ch15）；Consensus.tla 的 Invariance 是最小的不變量證明範本、LivenessTheorem 是 WF1 規則的機器版（ch16）。（出現章：ch12、ch15、ch16）\n- **raft.tla**（Diego Ongaro 本人 repo）：`https://github.com/ongardie/raft.tla` — ch13 所有引文的出處，CC-BY 4.0；README 自述比博士論文版略有更新，想跑 TLC 要參考 PR #4 的修改（2026-06 查證）。通讀一次全文（471 行）是檢驗 ch13 學習成果的最好方式。（出現章：ch13）\n- **Lamport 網站上的 Peterson 短文**：`https://lamport.azurewebsites.net/tla/peterson.html` — 用 PlusCal 寫 Peterson 並以 TLC 驗互斥與 starvation-freedom，await 粒度與 ch10 相同（2026-06 查證）；機器跑出來的，跟你手推的同一張圖。（出現章：ch10）\n- **locks_auxiliary_vars（tlaplus/Examples）**：`https://github.com/tlaplus/Examples/tree/master/specifications/locks_auxiliary_vars` — Peterson 對抽象 Lock 規格的 refinement，含 auxiliary variables；現在讀吃力是正常的，ch15 之後回來收割。（出現章：ch10）\n- **DijkstraMutex（tlaplus/Examples）**：`https://github.com/tlaplus/Examples/tree/master/specifications/dijkstra-mutex` — Dijkstra 1965 原始 n-process 演算法的 PlusCal 版；想體會「為什麼 Peterson 被視為簡潔的奇蹟」，讀它最快。（出現章：ch10）\n- **標準模組 Bags.tla**：`https://github.com/tlaplus/tlaplus/blob/master/tlatools/org.lamport.tlatools/src/tla2sany/StandardModules/Bags.tla` — bag 被編碼成「元素 ↦ 正整數份數」的函數，印證 ch04 的 multiset 討論；讀檔頭註解與三個定義即可。（連結驗證於 2026-06）（出現章：ch04）\n- **azure-cosmos-tla**（官方 repo）：`https://github.com/Azure/azure-cosmos-tla` — Cosmos DB 五種一致性等級的 TLA+ 規格＋三個由簡到繁的情境模型；搭配上面的 ICSE-SEIP 2023 論文對讀。（2026-06 開頁查證）（出現章：ch17）\n\n## C.4 課程、教材與 Lamport 講義\n\n- **TLA+ Video Course**（Lamport 親自錄製）：`https://lamport.azurewebsites.net/video/videos.html` — 共 10 講（部分分上下集），開場自述「These videos are not light entertainment. They require careful viewing and actual thinking.」——名不虛傳，搭配紙筆服用。各章指路：Lecture 1–2 對應 ch02、Lecture 4 “Die Hard” 是 ch08 精讀的影片版、第 5–6 講是 ch11 兩份 spec 的作者導讀。（連結與講次驗證於 2026-06；landscape 開頁驗證）（出現章：ch02、ch06、ch08、ch11、ch18）\n- **learntla.com**（Hillel Wayne）：`https://learntla.com` — 免費線上教材，偏實作操作路線，與本書互為對照組；哪天想動手跑 TLC，從這裡開始最快（landscape 2026-06 開頁驗證，站點持續維護）。各章指過的小節：〈Operators and Values〉（ch03、ch04）、〈Structured Data〉（ch04）、〈Writing an Invariant〉（ch02、ch05）、〈TLA+〉（ch06）、〈Temporal Properties〉（ch07）、〈PlusCal〉（ch08）、Topics 部的〈Optimizing Model Checking〉（ch09）。（出現章：ch01–ch09、ch18）\n- **A PlusCal User's Manual**：P-syntax 版 `https://lamport.azurewebsites.net/tla/p-manual.pdf`、C-syntax 版 `https://lamport.azurewebsites.net/tla/c-manual.pdf` — 讀前幾節就夠「看得懂」；兩份手冊對照翻兩頁，你就知道兩種語法真的只是換皮。（連結驗證於 2026-06）（出現章：ch08）\n- **Lamport，“Safety, Liveness, and Fairness”（2019-05-26 講義）**：`https://lamport.azurewebsites.net/tla/safety-liveness.pdf` — ch07 的 safety/liveness 定義與 WF/SF 等價讀法的直接出處，短短 8 頁；把第 4 節 WF 的五種等價說法讀到「顯然等價」是最好的自測。（2026-06 開頁核對）（出現章：ch07）\n- **Lamport，“Using TLC to Check Inductive Invariance”（2018-08-23）**：`https://lamport.azurewebsites.net/tla/inductive-invariant.pdf` — 兩頁紙把 ch14 的三個義務一字不差地寫出來，然後教你讓 TLC 當歸納步快篩。（2026-06 開頁核對）（出現章：ch14）\n- **Lamport，“Proving Safety Properties”（2019-05-18）**：`https://lamport.azurewebsites.net/tla/proving-safety.pdf` — 從找 inductive invariant、寫 ⟨1⟩ 層級證明、到把每一步餵給 TLAPS 的完整工作流；手寫與機器之間最好的一座橋。（2026-06 開頁核對目錄）（出現章：ch14、ch16）\n- **Lamport，“Hiding, Refinement, and Auxiliary Variables”（2019）**：`https://lamport.azurewebsites.net/tla/hiding-and-refinement.pdf` — ∃∃（hiding）與 refinement 關係的短篇講義，比論文好入口。（2026-06 連結見於 Lamport 網站，內文未逐頁核對）（出現章：ch15）\n- **TLA+ Wiki〈codebase: liveness〉**：`https://docs.tlapl.us/codebase:liveness` — 開發者視角的 liveness 檢查實作：behavior graph、Tarjan SCC、隨圖成長分批執行；ch09 SCC 直覺版的工程對照。（搜尋定位於 2026-06，未逐段核對）（出現章：ch09）\n- **Apalache 手冊〈Running the Tool〉**：`https://apalache-mc.org/docs/apalache/running.html` — 用 `--init=IndInv --inv=IndInv --length=1` 兩段式查詢機械化 ch14 兩個義務的官方說明；配合 ch16 的原理段重讀。（2026-06 開頁核對指令與措辭）（出現章：ch14、ch16）\n\n## C.5 工程部落格與案例頁\n\n- **Lorin Hochstein，“Inductive invariants”（Surfing Complexity，2018-12）**：`https://surfingcomplexity.blog/2018/12/27/inductive-invariants/` — 用最小的例子把「為真但不 inductive」講透的短文，還親手解了 Teaching Concurrency 的習題；當 ch05／ch14 的第二視角複習。（出現章：ch05、ch14）\n- **Hillel Wayne，“Weak and Strong Fairness”**：`https://www.hillelwayne.com/post/fairness/` — 用一個 succeed/fail/retry 的 worker 把「WF 救不了反覆失敗、SF 可以」演了一遍，與 ch07 的 Requeue 攻防互為印證。（2026-06 開頁核對）（出現章：ch07）\n- **Jack Vanlightly，“An introduction to symmetry in TLA+”（2024-12）**：`https://jack-vanlightly.com/blog/2024/12/5/an-introduction-to-symmetry-in-tla` — 用視覺化把軌道坍縮講透，含「對稱與 liveness 不合」的警告與隱性不對稱的踩坑案例。（開頁驗證於 2026-06）（出現章：ch09）\n- **raft.github.io**（Raft 官網）：未附獨立連結（與上方 raft.pdf 同站）— 內建 5 節點選舉與複製的互動視覺化（把 ch13 的 worked example 動起來），另收錄各語言實作清單與歷年演講。（出現章：ch13）\n- **Nathan VanBenschoten，“Parallel Commits”（CockroachDB blog，2019-11-07）**：`https://www.cockroachlabs.com/blog/parallel-commits/` — 讀協議設計，更要讀文末 TLA+ 驗證一節——AckImpliesCommit 與 ImplicitCommitLeadsToExplicitCommit 兩條性質的命名就是一堂「怎麼把保證說清楚」的課。（2026-06 開頁查證；landscape 開頁驗證）（出現章：ch17）\n- **P language 官方案例頁**：`https://p-org.github.io/P/casestudies/` — S3 strong consistency 遷移如何用 P 驗證的第一手簡述。（2026-06 開頁查證）（出現章：ch17）\n- **“Using Kani to Validate Security Boundaries in AWS Firecracker”（Kani 官方部落格，2023）**：`https://model-checking.github.io/kani-verifier-blog/2023/08/31/using-kani-to-validate-security-boundaries-in-aws-firecracker.html` — rate limiter 與 virtio 驗證的細節與 bug 清單，程式碼級驗證長什麼樣的最佳速寫。（2026-06 開頁查證）（出現章：ch17）\n- **FoundationDB，“Simulation and Testing”**：`https://apple.github.io/foundationdb/testing.html` — deterministic simulation testing 的原典文件，「unlikely that we would have been able to build FoundationDB without this technology」的出處。（2026-06 開頁驗證）（出現章：ch18）\n- **Antithesis 的 DST 綜述**：`https://antithesis.com/docs/resources/deterministic_simulation_testing/` — 把 FoundationDB 路線一般化的入門讀物。（連結於 2026-06 經搜尋確認，內文未逐字核對）（出現章：ch18）\n- **“Can LLMs model real-world systems in TLA+?”（ACM SIGOPS Blog，2026-05）**：`https://www.sigops.org/2026/can-llms-model-real-world-systems-in-tla/` — ch18 AI 一節 etcd Raft 實測的出處：生成的 spec 能過語法、能跑 TLC，深層語意驗證仍是缺口。（2026-06 查證連結與要旨）（出現章：ch18）\n\n## C.6 工具與社群入口\n\n- **Lamport 的 TLA+ Home Page**：`https://lamport.azurewebsites.net/tla/tla.html` — Lamport 個人網站的 TLA+ 入口；頁面明示官方資源已移交 TLA+ Foundation。（landscape 2026-06 開頁驗證）\n- **TLA+ Foundation**：`https://foundation.tlapl.us/` — 官方（基金會）入口。（landscape：連結經 Lamport 首頁證實）\n- **TLAPS 官網與 tlapm repo**：`https://proofs.tlapl.us/` 與 `https://github.com/tlaplus/tlapm` — 文件、教學與原始碼；後端組成與預設策略的權威出處。本書不裝工具，但哪天你想動手，入口在這裡。（2026-06 開頁）（出現章：ch16）\n- **Quint 官網**：`https://quint.sh`（2026-06 開頁驗證；原 quint-lang.org 已轉址）— 首頁十分鐘看完語法長相，判斷它是不是你團隊的入口。（出現章：ch18）\n- **Alloy 官網**：`https://alloytools.org`（2026-06 開頁驗證）— Overview 與文件入口。（出現章：ch18）\n- **P 官網**：`https://p-org.github.io/P/`（2026-06 開頁驗證）— 「state machine based programming language」的自述與案例清單；AWS 的採用脈絡見 ch17。（出現章：ch18）\n\n## C.7 如果只讀三樣\n\n你已經讀完十八章，資深後端的直覺也都接上了。如果接下來只有三份東西的時間，我會這樣選：\n\n1. **《Specifying Systems》第一部分（第 1–7 章，約 83 頁）**。理由：它是你剛學完的整個 Part II–III 的原典，而且是免費 PDF。本書替你鋪了白話與橋接，現在回去讀 Lamport 本人的版本，每個設計決定（為什麼無型別、為什麼 stuttering、為什麼 □[Next]_vars）都有作者親自辯護——這一遍會把「學會了」升級成「知道為什麼非這樣不可」。\n2. **“How Amazon Web Services Uses Formal Methods”（CACM 2015）**。理由：十頁出頭，是你回答「這套東西在工業界到底是不是玩具」與替團隊寫採用建議時的原典彈藥；本書引用的每個數字（35 步、804 行、七個團隊）都出自這裡且已逐字核對，你引用時可以放心精確。\n3. **“eXtreme Modelling in Practice”（PVLDB 2020）**。理由：讀完本書最危險的狀態是高估形式化的下一步——以為 spec 寫完就一勞永逸。這篇是工業界少見的誠實失敗報告（spec–code 同步的真實代價，一成一敗），先把 Murphy 的帳攤開，你的期望值會校準在正確的位置。\n\n遺珠：想往理論深處走，補《A Science of Concurrent Programs》（ch14）；想重走一遍共識的不變量鏈，補 “Paxos Made Simple”（ch12）。\n\n## C.8 想動手時的第一步\n\n本書刻意不碰鍵盤——紙上推演逼你把每一步想穿。完整的路徑指引在 ch18〈如果哪天想動手〉，這裡只給資源對應，照順序：\n\n1. **learntla.com 的 The Core**（C.4）——什麼都不用裝就能開始讀；免費、行文最像工程師對工程師，從零帶到能跑 TLC。\n2. **TLA+ Video Course**（C.4）——10 講，Lamport 親授；比 learntla 慢但深，配著本書的章節順序看，每講都會遇到老朋友。\n3. **編輯器：VSCode 的 TLA+ extension**（識別碼 `alygin.vscode-tlaplus`）——2026-06 時點的社群主流入口；老牌 Eclipse Toolbox 已進入維護模式（此為社群觀察、措辭保守，見 ch18）。第一步是編輯器，不是安裝包。\n4. **第一份 spec 不要寫新的**——把 ch08 的 SettlementV1 打進去，基準參數跑 TLC，親眼看你手推過的那條反例被機器印出來（劇本見 ch18）；想對照官方範例，DieHard.tla 與 `tlaplus/Examples`（C.3）是現成題庫。\n5. **之後分流**——想爬證明層：TLAPS 官網（C.6）＋ “Proving Safety Properties”（C.4）；想拉團隊一起：Quint 與 P 的官網（C.6）。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "TLA+ / 形式化方法事實基準（2026-06）", "md": "---\nbaseline_date: 2026-06\nverified_by: research-agent\n---\n\n# TLA+ / 形式化方法事實基準（2026-06）\n\n本檔是全書的事實錨點。標記規則：\n\n- ✅ ＝ 研究 agent 實際開頁（WebFetch / GitHub API / 論文 PDF 原文）驗證過，內容相符。\n- ⚠️ ＝ 僅從搜尋結果摘要推斷、未開頁驗證；或來源互相矛盾（矛盾點會寫明）。\n\n章節 agent 引用事實時：✅ 條目可直接寫進書；⚠️ 條目要嘛避開精確數字、要嘛在書中用模糊措辭（「約」「截至本書查證時點」）。\n\n---\n\n## 1. TLA+ 核心工具鏈現狀（2026-06 時點）\n\n| 項目 | 現狀 | 來源 |\n|---|---|---|\n| TLA+ Foundation | 2023-04-21 由 Linux Foundation 宣布成立；創始會員 AWS、Oracle、Microsoft；官網 `https://foundation.tlapl.us/` | 成立日期與會員 ⚠️（多則新聞稿摘要一致，未開頁）；官網連結 ✅（Lamport 的 TLA+ 首頁明示「TLA+ is now in the hands of the TLA+ Foundation」並連到該站） |\n| TLC / tla2tools 最新穩定版 | v1.7.4「The Xenophanes release」；v1.8.0「The Clarke release」長期掛 **pre-release**、由 CI 持續重新發布（GitHub API 顯示其 published_at 為 2026-05-26，即最近一次重發） | ✅ GitHub API（`https://api.github.com/repos/tlaplus/tlaplus/releases`）。**注意**：v1.7.4 的發布年份兩次抓取不一致（2023-08-05 vs 2024-08-05）⚠️，書中勿寫精確日期，寫「v1.7.4 為最新穩定版」即可 |\n| Toolbox vs VSCode | TLA+ Toolbox（Eclipse 桌面 IDE）已進入維護模式；官方開發重心與社群主流是 **VSCode extension**（`alygin.vscode-tlaplus`），社群有 Toolbox→VSCode 遷移指南討論串 | ⚠️（未開頁，但 Google Groups 遷移討論串、VSCode Marketplace、Informal Systems 教學三個獨立來源的摘要一致） |\n| TLAPS（TLA+ Proof System） | 由 proof manager `tlapm` 加後端 prover 組成；後端：SMT solvers（預設 Z3，亦支援 CVC4/CVC5、veriT）、Zenon（tableau 一階邏輯）、Isabelle/TLA+（客製 object logic）、LS4（命題時序邏輯）；預設依序嘗試 SMT(5s)→Zenon(10s)→Isa(30s)。repo 已移至 `https://github.com/tlaplus/tlapm`，最新為 1.6.0 rolling pre-release | 後端清單與順序 ⚠️（搜尋摘要引自官方文件，多來源一致）；版本號 ⚠️（未開頁）。書中可放心寫後端組成，避免寫死版本號 |\n| Apalache | TLA+（與 Quint）的符號模型檢查器，將 TLA+ 轉成 SMT（Z3、CVC5）做 bounded model checking。**現為獨立維護**：repo 在 `https://github.com/apalache-mc/apalache`，維護者 Igor Konnov、Jure Kukovec、Thomas Pani；README 明言「Apalache is not funded by any organization」。最新 release v0.58.0（2026-05-29），維護活躍 | ✅（開頁驗證 README 與 release）。**注意**：網路上大量舊資料仍寫「由 Informal Systems 維護」，已過時，勿沿用 |\n| PlusCal | 寫在 `.tla` 檔註解區塊內的演算法語言，經 translator 轉成 TLA+；有兩種等價語法：**P-syntax**（類 Pascal，`begin…end`）與 **C-syntax**（大括號）。Lamport 的 PlusCal 手冊兩種都涵蓋 | 兩種語法的存在為穩定事實（Lamport PlusCal 頁 `https://lamport.azurewebsites.net/tla/pluscal.html` ⚠️ 未開頁）。哪本教材用哪種語法未逐一查證，書中勿斷言 |\n\n---\n\n## 2. 周邊形式化方法生態（一句話定位）\n\n| 工具 | 定位與現狀 | 來源 |\n|---|---|---|\n| Quint | Informal Systems 開發的現代規格語言，定位是「給工程師的 TLA+ 替代語法」，可由 Apalache 做後端檢查（Apalache README 同時列 TLA+ 與 Quint）| Apalache 支援 Quint ✅；Quint 本身現狀 ⚠️（未開頁） |\n| Alloy 6 | 關聯邏輯（relational logic）規格語言＋Alloy Analyzer；第 6 版合併了 Electrum 的時序運算子 | ⚠️（常識性事實，未查證；書中提及時勿寫發布日期） |\n| P language | 通訊狀態機（communicating state machines）建模語言，源自 Microsoft；2019 年起在 AWS 內部開發、為策略性開源專案（詳見第 4 節 AWS 後續） | 2019 起在 AWS 開發 ⚠️（CACM 2025 文章摘要） |\n| Lean 4 | 定理證明器＋程式語言，Lean FRO 維護，數學形式化社群（Mathlib）為最大用戶 | ⚠️（常識性，未查證細節） |\n| Rocq（Coq 改名） | Coq 已改名 **The Rocq Prover**：改名意向公布於 2023 年（搜尋摘要稱 2023-10-11 ⚠️），改名隨 **Rocq 9.0（2025-03-12 發布）** 完成；標準函式庫 namespace 由 `Coq` 改為 `Stdlib`；官網 `https://rocq-prover.org/` | 9.0 發布日期 ⚠️（rocq-prover.org changelog 連結在搜尋結果中明示日期，未開頁但來源即官網）；書中寫「2025 年 3 月隨 9.0 完成改名」安全 |\n| Isabelle/HOL | 老牌互動式定理證明器，持續年度發布；TLAPS 以 Isabelle/TLA+ 為其中一個後端 | TLAPS 後端關係見第 1 節；其餘 ⚠️ |\n| Event-B | refinement 為核心的形式方法，配套 Rodin 平台 | ⚠️（常識性，未查證近況） |\n\n---\n\n## 3. 教材與社群\n\n| 項目 | 事實 | 來源 |\n|---|---|---|\n| Specifying Systems（Lamport, Addison-Wesley 2002） | 官方頁面提供免費 PDF 下載；頁面 `https://lamport.azurewebsites.net/tla/book.html` ✅；PDF 檔名 `book-21-07-04.pdf`（2021-07-04 版本），完整 URL 推斷為 `https://lamport.azurewebsites.net/tla/book-21-07-04.pdf` ⚠️（頁面開過、PDF 本身未抓） | 頁面 ✅ |\n| learntla.com | Hillel Wayne 的免費線上 TLA+ 教材；三大部：The Core（線性入門）、Topics（進階獨立課題）、Examples；仍持續維護（有 What's New 頁與 roadmap）；作者自述為 TLA+ Foundation 成員、《Practical TLA+》作者 | ✅（開頁驗證） |\n| Practical TLA+（Hillel Wayne） | Apress 出版，2018；learntla.com 頁面證實作者身分 | 作者 ✅；出版社/年份 ⚠️（常識性，未另查） |\n| TLA+ Video Course | Lamport 親自錄製，`https://lamport.azurewebsites.net/video/videos.html`；**10 講**（部分分上下集，共 13 段影片）；課程開場自述「These videos are not light entertainment. They require careful viewing and actual thinking.」 | ✅（開頁驗證） |\n| Lamport 的 TLA+ Home Page | `https://lamport.azurewebsites.net/tla/tla.html`；頁面明示官方資源已移交 TLA+ Foundation、此頁為其個人網站；頁面 2025-10-13 仍有更新（last modified） | ✅（開頁驗證） |\n| Leslie Lamport 近況 | 2013 年 ACM Turing Award 得主（2014 年公布）⚠️ 常識性；個人網站 2025-10 仍在更新 ✅；**是否仍任職 Microsoft Research 未查證** ⚠️——書中寫「長年任職 Microsoft Research」即可，勿寫「現任」 | 混合 |\n| TLA+ Community Event | 最近一次：**2026-04-12 於義大利 Torino**，與 ETAPS 2026 共同舉辦（官網 `https://conf.tlapl.us/2026-etaps/` ✅）。2025 年場次亦掛在 ETAPS 下（`/2025-etaps/` 路徑存在 ✅，地點未查 ⚠️） | ✅ / ⚠️ |\n\n---\n\n## 4. 業界案例（案例研究章的事實底）\n\n### 4.1 AWS：CACM 2015 論文（已逐字核對 PDF 原文 ✅）\n\n- 論文：**“How Amazon Web Services Uses Formal Methods”**, *Communications of the ACM*, Vol. 58 No. 4（2015 年 4 月）, DOI `10.1145/2699417`。\n- 作者（原文順序）：Chris Newcombe, Tim Rath, Fan Zhang, Bogdan Munteanu, Marc Brooker, Michael Deardeuff。✅\n- 開頭句（原文）：“SINCE 2011, ENGINEERS at Amazon Web Services (AWS) have used formal specification and model checking to help solve difficult design problems in critical systems.” ✅ → AWS 使用 TLA+ 起點是 **2011**。\n- 前身：2014 年技術報告 “Use of Formal Methods at Amazon Web Services”，Lamport 網站存有 PDF（`https://lamport.azurewebsites.net/tla/formal-methods-amazon.pdf` ⚠️ 未開頁）。\n\n**Table 1（“Applying TLA+ to some of Amazon's more complex systems”，行數不含註解）— 全表已對 PDF 原文核對 ✅：**\n\n| 系統 | 元件 | 規格行數／語言 | 成果（論文原文意旨） |\n|---|---|---|---|\n| S3 | Fault-tolerant, low-level network algorithm | 804 行 PlusCal | Found two bugs, then others in proposed optimizations |\n| S3 | Background redistribution of data | 645 行 PlusCal | Found one bug, then another in the first proposed fix |\n| DynamoDB | Replication and group-membership system | 939 行 TLA+ | Found three bugs requiring traces of up to 35 steps |\n| EBS | Volume management | 102 行 PlusCal | Found three bugs |\n| Internal distributed lock manager | Lock-free data structure | 223 行 PlusCal | Improved confidence though failed to find a liveness bug, as liveness not checked |\n| Internal distributed lock manager | Fault-tolerant replication-and-reconfiguration algorithm | 318 行 TLA+ | Found one bug and verified an aggressive optimization |\n\n**防張冠李戴對照（章節 agent 必讀）：**\n\n- 「35 步 bug」屬於 **DynamoDB**（replication and group-membership system），不是 S3。原文：“shortest error trace exhibiting the bug included 35 high-level steps. The improbability of such compound events is not a defense against such bugs; historically, AWS engineers have observed many combinations of events at least as complicated as those that could trigger this bug. The bug had passed unnoticed through extensive design reviews, code reviews, and testing…” ✅（T.R.＝Tim Rath，DynamoDB）\n- 「804 行 PlusCal」屬於 **S3** 的容錯低階網路演算法。原文背景：S3 團隊原本「had been considering writing a Java program to brute-force explore possible executions: essentially a hard-wired form of model checking. They were able to avoid the effort by using TLA+ instead.」作者 F.Z.（Fan Zhang）兩週內寫了兩版 spec，且「she was more productive in PlusCal than TLA+」。✅\n- 採用規模（原文）：“At the time of this writing, seven Amazon teams have used TLA+, all finding value in doing so… Executive management actively encourages teams to write TLA+ specs for new features and other significant design changes. In annual planning, managers now allocate engineering time to TLA+.” ✅ →「七個團隊」是 **2015 年論文時點**的數字，書中必須綁定時點。\n- 學習曲線（原文意旨）：從新人到 principal 等級的工程師都能從零學 TLA+，「get useful results in two to three weeks」。✅\n\n### 4.2 AWS 後續（2015 之後）\n\n| 事實 | 細節 | 來源 |\n|---|---|---|\n| 續篇論文 | **“Systems Correctness Practices at Amazon Web Services”**，CACM Vol. 68 No. 6（2025-06）；另有 ACM Queue 版（Vol. 22 No. 6，2025 年初）。總覽 AWS 正式與半正式方法組合：TLA+、P、property-based testing、fuzzing、runtime monitoring 等 | ⚠️（搜尋摘要，未開頁；cacm.acm.org 對抓取回 403）。URL：`https://cacm.acm.org/practice/systems-correctness-practices-at-amazon-web-services/`、`https://queue.acm.org/detail.cfm?id=3712057` |\n| P language | 2019 年起在 AWS 內部開發、維持為策略性開源專案；用「communicating state machines」建模，貼近微服務工程師的心智模型；**著名應用：S3 從 eventual 遷移到 strong read-after-write consistency 的設計驗證** | ⚠️（CACM 2025 摘要，多來源一致） |\n| ShardStore（S3 儲存節點） | 論文 **“Using Lightweight Formal Methods to Validate a Key-Value Storage Node in Amazon S3”**（SOSP 2021）。**注意：ShardStore 用的是輕量級形式化方法（Rust 參考模型＋property-based testing），不是 P、也不是 TLA+**——這是最容易張冠李戴的點 | 論文存在與標題 ⚠️（dl.acm.org 連結出現於多個獨立搜尋結果）；DOI 頁 `https://dl.acm.org/doi/10.1145/3477132.3483540` |\n| Kani | AWS 用 Rust 驗證工具 Kani 驗證 Firecracker 的安全邊界 | ⚠️（CACM 2025 摘要） |\n| TLA+ 是否仍在用 | AWS 為 TLA+ Foundation 創始會員（2023）⚠️；CACM 2025 文章仍將 TLA+ 列入現行工具組合 ⚠️。書中可寫「TLA+ 仍是 AWS 工具箱一員，但 2019 後新增了 P 等更貼近工程師的工具」 | ⚠️ |\n\n### 4.3 Microsoft Azure Cosmos DB\n\n- 官方 spec repo：`https://github.com/Azure/azure-cosmos-tla` ✅（開頁驗證；另有 `tlaplus/azure-cosmos-tla` 鏡像 ⚠️）。內容：五種一致性等級（strong、bounded staleness、session、consistent prefix、eventual）的 TLA+ 規格＋三個由簡到繁的情境模型。✅\n- **Lamport 參與的正確說法**：README 連到一段 **Lamport 受訪影片**，談 TLA+ 在 Cosmos DB 的應用；Cosmos DB 團隊自述「heavily relies on TLA+」。✅（README 開頁驗證）。**Lamport 不是 Cosmos DB 的設計者**——書中只能寫「Lamport 曾與 Cosmos DB 團隊合作／受訪談其 TLA+ 應用」，不能寫成他設計了協定。\n- 反面教材（可增加章節深度）：Finn Hackett 等人 **“Understanding Inconsistency in Azure Cosmos DB with TLA+”**（ICSE-SEIP 2023；arXiv `2210.13661`）指出官方 spec 與實際行為存在落差。⚠️（搜尋摘要，未開頁；引用前建議再核對）\n\n### 4.4 MongoDB\n\n- 論文：**“eXtreme Modelling in Practice”**，A. Jesse Jiryu Davis、Max Hirschhorn、Judah Schvimer，*PVLDB* Vol. 13 No. 9（2020）。PDF：`http://vldb.org/pvldb/vol13/p1346-davis.pdf`；DOI 頁：`https://dl.acm.org/doi/10.14778/3397230.3397233`。⚠️（未開頁，但 dl.acm.org 與 vldb.org 兩來源一致）\n- 內容：兩個案例——(1) MongoDB Server **replication protocol** 的 model-based trace-checking（MBTC，比對 TLA+ spec 與 C++ 實作的執行軌跡）；(2) MongoDB Realm Sync operational transformation 演算法的 model-based test-case generation（MBTCG）。⚠️\n- 配套部落格（第一手作者）：emptysqua.re 的 “Two attempts to compare a TLA+ spec with a C++ implementation” 與 MongoDB 官方 “Conformance Checking at MongoDB”。⚠️\n- 論文重要結論方向（書中引用前請開原文核對 ⚠️）：spec-implementation conformance 檢查成本高，兩案例結果一成一敗（trace-checking 一側遇到顯著困難）。\n\n### 4.5 CockroachDB\n\n- 部落格：**“Parallel Commits: An atomic commit protocol for globally distributed transactions”**，Nathan VanBenschoten，2019-11-07，`https://www.cockroachlabs.com/blog/parallel-commits/`。✅（開頁驗證）\n- TLA+ 驗證了兩個性質：**AckImpliesCommit**（safety：coordinator 一旦向 client 回報 commit 成功，交易必已 committed）與 **ImplicitCommitLeadsToExplicitCommit**（liveness：進入 implicit commit 狀態的交易終將進入 explicit commit，即使 coordinator 故障）。spec 檔 `ParallelCommits.tla` 在 CockroachDB GitHub repo。✅\n- 背景：該 spec 是在請 Hillel Wayne 帶的內部 workshop 中發展出來的。✅\n\n### 4.6 未能確認、書中不可列的案例\n\nIntel、Elasticsearch、Confluent 等傳聞案例**未在本次預算內以兩個獨立來源確認**，依規格不列入。章節 agent 不得在書中引用這些名字作為 TLA+ 案例，除非另行查證。\n\n---\n\n## 5. 經典 spec 原文位置（逐一驗證 ✅）\n\nGitHub `tlaplus/Examples` repo：活躍維護（有 CI「Validate Specs & Models」工作流程），結構為 `specifications/<名稱>/`，每目錄含 `manifest.json`。✅（開頁驗證）\n\n以下檔案路徑全部經 GitHub API 直接列目錄確認存在（master branch）✅：\n\n| Spec | URL |\n|---|---|\n| DieHard.tla（含 DieHarder.tla 推廣版與 DieHard_proof.tla） | `https://github.com/tlaplus/Examples/blob/master/specifications/DieHard/DieHard.tla` |\n| TCommit.tla（Lamport，transaction commit） | `https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TCommit.tla` |\n| TwoPhase.tla（Lamport，two-phase commit；同目錄另有 PaxosCommit.tla） | `https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TwoPhase.tla` |\n| Paxos.tla（Lamport 原版；同目錄含階層：Consensus.tla → Voting.tla → Paxos.tla） | `https://github.com/tlaplus/Examples/blob/master/specifications/Paxos/Paxos.tla` |\n| raft.tla（Diego Ongaro 本人 repo；CC-BY 4.0；自述比博士論文版略有更新；要跑 TLC 建議參考 PR #4 的修改） | `https://github.com/ongardie/raft.tla` ✅（開頁驗證） |\n\nLamport 自有頁面：\n\n- TLA+ Home Page（個人版）：`https://lamport.azurewebsites.net/tla/tla.html` ✅\n- Specifying Systems 書頁（免費 PDF）：`https://lamport.azurewebsites.net/tla/book.html` ✅\n- 官方（基金會）入口：`https://foundation.tlapl.us/` ✅（連結經 Lamport 首頁證實）\n\n---\n\n## 6. AI × 形式化方法（2025–2026 動態；全節為快照，書中僅末章淺談）\n\n| 動態 | 時點 | 細節 | 來源 |\n|---|---|------|---|\n| LLM 生成 TLA+ spec 的能力評測 | 2025-09 起 | **SysMoBench**：評測 AI 對真實複雜系統做形式建模（arXiv `2509.23130`）。另有一篇 2026-03 投稿的評測：30 個 LLM、205 個 TLA+ spec，**最佳語意正確率僅 8.6%**，且模型規模與品質無關 | ⚠️（搜尋摘要；8.6% 這個數字引用前必須開原文核對出處論文名） |\n| 真實系統建模實測 | 2026-05 | ACM SIGOPS 部落格 “Can LLMs model real-world systems in TLA+?”（Specula 團隊）：Claude 生成的 Etcd Raft TLA+ spec 能過語法檢查、能跑 TLC，但深層語意驗證仍是缺口 | ⚠️（`https://www.sigops.org/2026/can-llms-model-real-world-systems-in-tla/`，未開頁） |\n| LLM 輔助證明 | 2025-12 | “Towards Language Model Guided TLA+ Proof Automation”（arXiv `2512.09758`）：LLM 引導證明義務的階層分解，驗證仍交給符號 prover | ⚠️ |\n| 整體格局 | 2026-06 時點 | 共識方向：LLM 在「函式層級規格、pre/post-condition 生成」有進展；**完整系統級 spec 合成仍是開放問題**；「LLM 起草、符號工具把關」是主流架構 | ⚠️（綜合多來源，屬研究快照而非定論） |\n\n**寫作提醒**：本節所有數字與結論都帶強時效性，書中引用一律加「截至 2026 年中」之類的時點限定詞。\n\n---\n\n## 維護備註\n\n- 本檔由研究 agent 於 2026-06-11 產出；網路查詢約 26 次（WebSearch/WebFetch）＋GitHub API／論文 PDF 本機解析。\n- 最可信的三塊（已開原始來源逐字核對）：AWS CACM 2015 全表與引文、`tlaplus/Examples` 各 spec 路徑、CockroachDB 部落格。\n- 最需要後續補驗的三塊：CACM 2025 AWS 續篇（官網 403，僅摘要）、MongoDB 論文內文結論、AI×FM 節的所有數字。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "Maintenance — 維護手冊（內部文件）", "md": "# Maintenance — 維護手冊（內部文件）\n\n本書事實基準時點 **2026-06**。時效性事實以 `_meta/landscape-2026-06.md` 為錨；改任何跨章基準必須照下表全書同步，並在本檔掃描日誌記一行。重大修正（推翻既有基準）需兩個獨立來源。\n\n## 跨章一致性基準表\n\n改動下列任何數字／命名，必須 grep 全書同步所有引用章：\n\n| 基準 | 值 | 出現章 |\n|---|---|---|\n| 結算系統 v0 命名 | 動作 `Fetch`/`Settle`、變數 `queue`/`working`/`ledger`、哨兵 `\"idle\"`、consumer `c1`/`c2` | ch02、ch04–ch09、ch14–ch15 |\n| v0 可達狀態 | (2 msgs, 1 consumer)＝8；(2, 2)＝14；(3, 2)＝44；(10, 2)＝34,304 | ch02、ch04、ch09 |\n| v0 型別空間上界 | 1 consumer＝48；2 consumers＝144（通式 4^m × (m+1)^c） | ch04、ch09 |\n| v1（SettlementV1）定案 | `ledger ∈ [Msgs → Nat]`；Settle 拆 `Credit`＋`Ack`；新增 `Crash(c)`；`dedup ⊆ Msgs` 單調；`NoDoublePay ≜ ∀m: ledger[m] ≤ 1` | ch08、ch09、ch14、ch15 |\n| v1 可達狀態（2 msgs, 2 consumers） | 41（三路複核：7×7−8／分組 9+24+8／BFS 七層收斂） | ch09 |\n| DieHard | 3 與 5 加侖、目標 4；型別 24、可達 16、最短解 6 步且唯一 | ch08、ch09、ch16 |\n| Peterson | process {0,1}；可達 20 狀態、34 條邊；性質 `MutualExclusion` | ch10 |\n| TwoPhase（2 RM） | TCommit 可達 12；TwoPhase 可達 56、上界 3,072；擴充版（含 TMCrash）可達 72、卡死 9；6 RM＝50,816 | ch11、ch09、ch14 |\n| 2PC 命名 | 1 TM＋2 RM {r1, r2}；rmState ∈ {\"working\",\"prepared\",\"committed\",\"aborted\"}；性質 `TCConsistent`；擴充動作只有 `TMCrash` | ch11、ch14、ch15 |\n| Paxos | 3 acceptors {a1,a2,a3}、2 proposers、ballot 1 與 2；不變量稱 P2c | ch12 |\n| Raft | 5 nodes、term 從 1 起；五條 safety 性質沿論文命名 | ch13 |\n| 證明 invariant 定案 | IndV1（TypeOK ∧ NoDoublePay ∧ DedupCovers）；IndTP（TPTypeOK ∧ I1–I7） | ch14、ch16 |\n| AWS CACM 2015 | 35 步 bug＝**DynamoDB**（不是 S3）；804 行 PlusCal＝S3；「七個團隊」綁 2015 時點 | ch01、ch17（更新時 grep「35 步」） |\n| 證明格式 | ⟨1⟩1 層級編號（ch05 建立、ch16 接軌 TLAPS） | ch05 起全書 |\n\n## 脆弱事實清單（最容易過期／出錯的點）\n\n1. **CACM 2025 AWS 續篇**：ACM 全域 403，全書僅以摘要等級引用（ch17 已標轉述）；P language 細節改錨定 P 官方案例頁與 Kani 部落格。下次掃描優先補開原文。\n2. **AI×FM 數字**（ch18、landscape §6）：全部掛「截至 2026 年中」；「個位數百分比」措辭刻意模糊，引精確值前必須開出處論文。\n3. **強時效連結**：`https://quint.sh`（2026 年才從 quint-lang.org 轉址）、SIGOPS 2026 部落格、Apalache repo（**獨立維護**，不是 Informal Systems——網路舊資料普遍寫錯）。\n4. **tla2tools 版本措辭**：穩定版 v1.7.4（勿寫精確日期）；v1.8.0 是 CI 持續重發的長期 pre-release，勿稱「最新版」。\n5. **引文內數字不適用千分位慣例**：ch11 有一處 Lamport 原檔註解逐字引文含 `50816`——是引文，不得「順手統一」成 50,816。\n6. **附錄 A／B 的「首次出現章」**綁定章節現狀：任何章改動符號或術語的使用後，需對附錄抽查重驗（兩附錄卷首各有收錄慣例聲明）。\n7. **TLA+ Community Event**：最近一次 2026-04（Torino, ETAPS）；明年掃描時更新。\n8. **Lamport 個人站**：官方資源已移交 TLA+ Foundation；引用時寫「長年任職 Microsoft Research」勿寫「現任」。\n\n## 結構提醒\n\n- 章節骨架五標題（從你已知的出發／陷阱與防禦／紙上推演＋推演解答／自我檢核／延伸閱讀）是一致性掃描的 grep 對象，改標題格式前先想清楚。\n- 全書路線圖在 ch01、ch03、ch06、ch10、ch14、ch17（＋ch18 回收版）共 7 張——改章名要同步七處。\n- 內文數學符號用 Unicode、spec 引文用 ASCII（code block 標 `tla`）；對照表在 ch06 與附錄 A。\n- 簡體詞 lint 注意「效」「系」「准」等兩岸同形字會誤報；用 Python 逐字元比對、不要用 shell grep 的 byte-matching。\n- **圖的渲染對齊與來源對齊是兩個故障域**：`check_diagrams.py` 只驗源碼的欄數學（CJK=2 模型）；渲染端由 build_reader 的 `wrapCJK` span 機制保證 CJK=2 欄（勿改回 @font-face size-adjust——WebKit 對 local() 忽略它，Safari 會塌、Chrome 看起來正常）。改動閱讀器或圖之後：headless Chrome 截一張中文多的封閉框圖＋使用者瀏覽器目視各驗一次。\n\n## 掃描協定（「掃描書的時效性」＝執行本節）\n\n1. 重驗 landscape 的 ⚠️ 條目（優先：CACM 2025 原文、MongoDB 論文內文、AI×FM 數字出處）。\n2. 開頁抽查附錄 C 的強時效連結（quint.sh、SIGOPS、GitHub repos）。\n3. 工具版本掃一輪（tla2tools、TLAPS、Apalache release 頁），依「脆弱事實」第 4 條的措辭規則更新。\n4. 有修正 → 更新 landscape ＋依基準表同步引用章 ＋ 本檔日誌記一行；動到 ASCII 圖跑 `check_diagrams.py`；重打包（見書級 CLAUDE.md）。\n\n## 掃描日誌\n\n- **2026-06-11**：成書。P0 校準訪談（紙上推演特例）；landscape 由研究 agent 建立（約 26 次查證；AWS CACM 2015 逐字核對 PDF）。\n- **2026-06-12**：P2 完成 18 章＋3 附錄。P4a：agy（Gemini 3.5 Flash High）逐章數學審查 20/20，4 個確認錯誤（ch10 步數、ch13 投票分支、ch17 人週×2）＋ch09 發現的 ch08 最短反例誤稱，全數修畢。P3：v0 命名統一（ch02/ch04/ch05 → Fetch/Settle/working/idle）、千分位統一（引文除外）、ch16 補 lint（代碼評審→程式碼審查）、鉤子反向核對（ch07→ch08、ch12 全部、七張路線圖）通過；全書簡體字 lint 0 命中、骨架 18/18、check_diagrams exit 0。\n- **2026-06-12（渲染修復）**：使用者回報部分圖在閱讀器跑版（路線圖右邊框隨行內中文字數成比例左塌）。根因＝WebKit/Safari 忽略 `local()` 字型的 `size-adjust`，PingFang 未放大到 2 欄；fontTools 量測確認 Menlo 涵蓋書中全部符號於 1 欄、來源欄數學無誤。修法＝build_reader 改用 `wrapCJK` span（PingFang 120.41%）取代 size-adjust，三本書重建，使用者於實際瀏覽器確認修復。教訓固化至 tools README、write-book skill、本檔結構提醒。\n- **2026-06-12（P4b）**：獨立第二意見（agy Gemini 3.1 Pro High＋網路）：事實抽查 8/8 屬實（AWS 35 步＝DynamoDB、804 行＝S3、TLAPS 後端順序、Apalache 獨立維護、MongoDB MBTC、CockroachDB、Cosmos DB/Lamport 措辭、Rocq 改名）；DieHard 數學重算（16 狀態、6 步唯一最短）正確。結構建議 4 項裁決皆不改書：liveness 深論＝閘門核准的取捨（ch07 M 量尺＋ch14 WF1 已給基本武器）；超時建模已由 ch08 Crash／ch11 RMTimeoutAbort／ch13 選舉超時實例覆蓋；composition 超出書本定位（ch18 有路徑指引）；refinement 伏筆式預告為刻意教學設計。報告存 `../_review/p4b-gemini-review.md`。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《把系統寫成定理：TLA+ 與形式化方法》\n形態：18 章、六個 Part、3 個附錄。紙上推演書（不裝工具、不寫程式）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；時效性事實以 `landscape-2026-06.md` 為錨。\n\n## 全書敘事弧\n\n從「你寫過的併發 bug」出發 → 把系統看成狀態機 → 磨利數學工具 → 學會 TLA+ 這門「描述狀態機的語言」→ 精讀四個經典協議（手推）→ 爬上證明層（歸納不變量、refinement、機器證明）→ 回到地面（業界案例、方法地圖）。\n\n前一章的問題是後一章的動機：測試蓋不住（ch01）→ 那描述系統要用什麼心智模型（ch02）→ 描述要精確需要邏輯與集合（ch03–04）→「每個可達狀態都成立」怎麼證（ch05）→ 這套數學怎麼變成一門語言（ch06–08）→ 機器怎麼自動找反例（ch09）→ 在真協議上用（ch10–13）→ 有限模型不夠、要證明（ch14–16）→ 業界到底怎麼用、我下一步去哪（ch17–18）。\n\n## 跨章基準（一致性掃描的依據；各章不得另創數字與命名）\n\n**貫穿範例「結算系統」**（源自讀者真實經歷：SQS → idempotent consumers → 入帳）：\n\n| 元素 | 基準 | 首次出現 |\n|---|---|---|\n| v0 參數 | 訊息 2 則（m1, m2）、consumer 先 1 個再加到 2 個、ledger 為 msgId → 是否已入帳 | ch02 |\n| v1 升級 | 加 consumer crash、redelivery（at-least-once）、dedup 表 | ch08 |\n| v1 實際定案（ch08 撰寫時演進，後續章節以此為準） | `ledger ∈ [Msgs → Nat]`（計次，v0 的 BOOLEAN 看不出 double-pay）；Settle 拆成 Credit＋Ack；新增 Crash(c)；`dedup ⊆ Msgs` 單調只進不出；`NoDoublePay ≜ ∀m: ledger[m] ≤ 1`；基準參數下可達狀態 41（ch09 三路複核） | ch08 |\n| safety 性質名 | `NoDoublePay`（同一 msgId 至多入帳一次） | ch02 |\n| liveness 性質名 | `AllPaid`（每則訊息終會入帳） | ch07 |\n\n**協議精讀的固定配置**：\n\n| 協議 | 配置 | 命名基準 |\n|---|---|---|\n| DieHard | 3 與 5 加侖壺、目標 4 加侖 | 變數 small / big（ch08） |\n| Peterson | process {0, 1} | 性質 `MutualExclusion`（ch10） |\n| 2PC | 1 TM ＋ 2 RM：{r1, r2} | 沿用 Lamport TwoPhase 命名：rmState ∈ {\"working\",\"prepared\",\"committed\",\"aborted\"}；性質 `TCConsistent`（ch11） |\n| Paxos | 3 acceptors {a1, a2, a3}、2 proposers、ballot 1 與 2 | 不變量稱 P2c（沿 Lamport 編號）（ch12） |\n| Raft | 5 nodes、term 從 1 起 | 性質名沿 Raft 論文（Leader Completeness 等）（ch13） |\n\n**全書符號**：依 style-guide「數學符號規範」；證明一律 ⟨1⟩1 層級格式（ch05 起）。\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀）：記憶體一致性模型（TSO/弱序）、密碼學協議驗證、Dafny 等程式碼級驗證教學、機率模型檢查（PRISM）、CUDA/GPU、任何工具安裝步驟。\n\n---\n\n## Part I — 為什麼，以及用什麼眼睛看系統（ch01–02）\n\n### ch01 — 測試的極限：為什麼需要形式化方法\n- **目標**：讀完能說出「測試與證明在能力上的本質差別」，且能畫出形式化方法全景地圖、指出 TLA+ 的位置。\n- **必涵蓋**：一個具體併發 bug 開場（結算 pipeline 風格的 race：dedup 檢查與入帳之間被插隊）；為什麼測試抓不到——調度不可控＋狀態空間指數；AWS CACM 2015 的證詞（DynamoDB 35 步 bug 等，數據照 landscape）；全景地圖：規格層 vs 程式碼層、model checking vs theorem proving、輕量 vs 重型；「寫 spec 的最大價值是先想清楚」論點；本書路線圖（全書 ASCII 地圖首次出場）。\n- **不涵蓋**：TLA+ 語法（ch06）、邏輯符號（ch03）、案例細節（ch17）。\n- **橋接**：你修過的 race condition、k6 壓測抓不到的 heisenbug、code review 裡「這裡會不會被插隊」的直覺。\n- **Worked example**：2 個 thread 各 3 步操作共享 counter，手算交錯數 C(6,3)=20，列出其中壞的調度；推到 10 步 ×3 thread 看組合爆炸。\n- **紙上推演**：數另一組交錯數並找出壞調度；給一個「測過 1000 次都對」的程式找出測試漏掉的調度。\n\n### ch02 — 一切都是狀態機：state、behavior、invariant\n- **目標**：建立全書心智模型：系統＝允許的行為集合；能把一個小系統的狀態空間完整畫出來。\n- **必涵蓋**：state＝變數的一組賦值；step；behavior＝（可無限的）狀態序列；規格＝允許行為的集合；非決定性建模 crash 與重送（不是隨機，是「都可能」）；引入結算系統 v0（基準表參數）；invariant 直覺版：所有可達狀態都成立的述語、`NoDoublePay` 首次登場；safety vs liveness 直覺版（一句話對比，正式定義見 ch07）；抽象的選擇：建模什麼、忽略什麼。\n- **不涵蓋**：TLA+ 語法（ch06）、時序符號（ch07）、邏輯記號嚴格化（ch03）。\n- **橋接**：DB 的一筆 row 就是 state、transaction log 就是 behavior；redux/event sourcing 的「狀態＋事件」你早就在寫。\n- **Worked example**：手畫結算系統 v0 在（2 msgs, 1 consumer）的完整狀態空間圖；加到 2 consumers 後手算狀態數成長，體感爆炸。\n- **紙上推演**：判斷給定 behavior 是否合法；給一個候選 invariant 找出打破它的可達狀態；幫 v0 加「consumer 重啟」後重畫狀態圖。\n\n## Part II — 數學地基（ch03–05）\n\n### ch03 — 命題與謂詞邏輯：精確說話的語法\n- **目標**：能把白話業務規則翻成邏輯式、做否定推移，並對 vacuous truth 有肌肉記憶。\n- **必涵蓋**：命題與真值；∧ ∨ ¬ ⇒ ≡ 與真值表；**⇒ 的陷阱：前件為假則整句為真（vacuous truth）**——埋「invariant 假通過」伏筆（ch14 回收）；∀ ∃、bound/free、否定推移 ¬∀=∃¬；述語；把規則翻成邏輯式的方法論（先找量詞範圍）。\n- **不涵蓋**：集合論（ch04）、歸納（ch05）、時序算子（ch07）、形式證明系統（自然演繹不教，本書用「工程師的嚴謹」）。\n- **橋接**：⇒ ≈ guard clause；vacuous truth ≈ `[].every(...)` 回 true；∀∃ ≈ SQL 的 NOT EXISTS 改寫。\n- **Worked example**：把「已發放的獎勵不會再發」翻成謂詞式，否定它得到「bug 的形狀」，展示找反例＝證明否定式可滿足。\n- **紙上推演**：真值表驗證 2 條等價式；中⇄邏輯互翻 3 題；否定推移練習（含巢狀量詞）。\n\n### ch04 — 集合、
