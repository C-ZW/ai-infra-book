\n\n三個例子是同一個邏輯形狀：**用「起點」加「每步保持」兩件有限的事，換一個無限的「永遠」**。本章把這個形狀磨成一把能承重的工具——承「結算系統永不重複入帳」這種重量——並給它配一套你能寫、別人能查的證明格式。\n\n## 把「永遠」拆成兩件有限的事\n\n先回到數學的原型。你大學的離散數學看過它，現在把它磨利。**數學歸納法**（mathematical induction）：對自然數上的述語 P，若\n\n1. **基底**（base case）：P(0) 成立；\n2. **歸納步**（inductive step）：∀ n ∈ ℕ：P(n) ⇒ P(n+1)；\n\n則 ∀ n ∈ ℕ：P(n)。\n\n白話就是推骨牌：第 0 張倒了；任何一張倒了都會推倒下一張；所以每一張都會倒。注意兩個條件各自都是有限可檢查的：基底是一次具體驗算；歸納步是一條**對任意 n 的蘊涵**——你不必知道 n 是多少，只要論證「假設 P(n) 成立」能推出 P(n+1)。那個「假設 P(n) 成立」叫**歸納假設**（induction hypothesis），它是歸納步裡免費的彈藥。\n\n歸納原理本身要不要證？不用——在標準的自然數公理系統（Peano）裡它是公理，等於「自然數是什麼」這個定義的一部分。本書不展開；你只需要記得它不是經驗法則，是地基。\n\n### 層級證明：本書的證明格式\n\n從這一章起，本書所有證明都用同一種寫法。先看一個你熟的小定理怎麼穿上它：對所有 n ∈ ℕ，0 + 1 + 2 + ⋯ + n = n(n+1)/2。\n\n令 P(n) ≜ 「0 + 1 + ⋯ + n = n(n+1)/2」。\n\n⟨1⟩1. 基底 P(0)：左邊＝0（空手起步，只有 0 這一項），右邊＝0·1/2＝0，相等。\n⟨1⟩2. 歸納步：對任意 n ∈ ℕ，P(n) ⇒ P(n+1)。\n  ⟨2⟩1. 假設 P(n)。（歸納假設）\n  ⟨2⟩2. 0 + ⋯ + (n+1) = (0 + ⋯ + n) + (n+1) = n(n+1)/2 + (n+1)。理由：拆出最後一項，再用 ⟨2⟩1 替換括號。\n  ⟨2⟩3. n(n+1)/2 + (n+1) = (n+1)(n+2)/2。理由：提出公因式 n+1，剩 n/2 + 1 = (n+2)/2。\n  ⟨2⟩4. Q.E.D. ⟨2⟩2 接 ⟨2⟩3 就是 P(n+1) 的等式。\n⟨1⟩3. Q.E.D. 由 ⟨1⟩1、⟨1⟩2 與數學歸納法。\n\n怎麼讀（也怎麼寫）這種證明：\n\n- **編號是 ⟨層⟩序**：⟨1⟩1、⟨1⟩2 是最外層的步驟；某一步若一行理由講不完，就往下開一層專屬於它的 ⟨2⟩1、⟨2⟩2……依此類推，⟨3⟩ 永遠隸屬於它上面最近的某個 ⟨2⟩ 步。\n- **每層以 Q.E.D. 步收尾**：宣告「本層的目標已由前面諸步湊齊」，並指名用了哪幾步。這一步沒有新內容，它是裝配說明。\n- **每個不再往下展開的步，附一行理由**：用了哪個假設、哪個定義、前面哪一步。寫不出這一行，代表這一步你還沒真懂——這是對自己的測謊器。\n- **讀法是可調深度的**：先只讀 ⟨1⟩ 層，那是證明的骨架；哪一步可疑，就鑽進它的下一層。信任可以分層發放。\n\n這個格式抄自 Lamport。他的觀察是：散文式證明擅長把跳步藏進流暢的句子裡，而層級結構讓每個跳步都變成肉眼可見的「少一層」，無所遁形（見延伸閱讀）。本書從這裡一路用到 ch16——到時你會看到 TLAPS 用幾乎一模一樣的層級格式讓機器逐步查證，你現在養成的手感屆時無縫接軌。也先說好本書的嚴謹度基準：每一步要能口頭講出理由，禁止用「這是顯然的」打發任何一步；但不要求機械式的形式推導——那是機器的工作（見 ch16）。\n\n### 強歸納：當「前一步」不夠用\n\n有些論證在證 P(n) 時需要的不是 P(n−1)，而是更早的某些祖先。**強歸納**（strong induction）允許你假設 P 在所有更小的數上都成立：\n\n若 ∀ n ∈ ℕ：（∀ k < n：P(k)）⇒ P(n)，則 ∀ n ∈ ℕ：P(n)。\n\n注意基底藏在裡面：n = 0 時「所有 k < 0」是空集合，前件空洞成立（ch03 的 vacuous truth），所以你等於要無條件證出 P(0)。\n\n經典例子：每個整數 n ≥ 2 都能寫成質數的乘積。\n\n⟨1⟩1. 任取 n ≥ 2，假設每個 2 ≤ k < n 都可分解為質數乘積。（強歸納假設）\n⟨1⟩2. 情況一：n 是質數。n 自己就是長度一的乘積。\n⟨1⟩3. 情況二：n 不是質數。依定義 n = a·b，其中 2 ≤ a < n、2 ≤ b < n。由 ⟨1⟩1，a 與 b 各自可分解；接起來就是 n 的分解。\n⟨1⟩4. Q.E.D. 兩種情況蓋住所有 n ≥ 2。\n\n一般歸納在 ⟨1⟩3 幫不上忙：你需要的是 P(a) 與 P(b)，不是 P(n−1)。這個形狀你熟——quicksort 遞迴到的不是「規模減一」的子問題，而是任意更小的分割；強歸納就是這種遞迴的證明影子。最後去魅一句：強歸納不是新公理——令 Q(n) ≜「∀ k ≤ n：P(k)」，對 Q 做一般歸納就得到強歸納，它只是方便的包裝。\n\n### 結構歸納：對形狀做歸納\n\n資料結構是「歸納定義」出來的：list 要嘛是空、要嘛是一個元素接上一個更小的 list；二元樹要嘛是一片葉、要嘛是一個節點掛兩棵更小的子樹。**結構歸納**（structural induction）順著定義的形狀走：每種基底構造直接驗，每種組合構造假設零件成立、證組合成立。\n\n小例：二元樹（每個內部節點恰有兩棵子樹）滿足「葉節點數 L(t) ＝ 內部節點數 I(t) + 1」。\n\n⟨1⟩1. 基底：t 是單一葉節點。L(t) = 1、I(t) = 0，1 = 0 + 1。\n⟨1⟩2. 組合：t 是一個內部節點掛上子樹 l 與 r；假設 l、r 都滿足性質。\n  ⟨2⟩1. L(t) = L(l) + L(r) = (I(l) + 1) + (I(r) + 1)。理由：葉全在子樹裡；對 l、r 各用一次歸納假設。\n  ⟨2⟩2. I(t) = I(l) + I(r) + 1。理由：內部節點＝兩棵子樹的，加上根自己。\n  ⟨2⟩3. Q.E.D. 由 ⟨2⟩1 與 ⟨2⟩2：L(t) = I(t) − 1 + 2 = I(t) + 1。\n⟨1⟩3. Q.E.D. 二元樹只有這兩種構造方式。\n\n你每天寫的遞迴函式就是結構歸納的程式版：pattern match 的 case 數＝歸納的 case 數，遞迴呼叫＝引用歸納假設。本書後面常對歸納定義的東西做證明——sequence（ch04）、執行的有限前綴（下一節馬上用到）都是。\n\n## 狀態機上的歸納：不變量規則\n\n回到 ch02 的語言。**執行**：從某個初始狀態出發的有限狀態序列，相鄰兩個狀態之間都是某個動作允許的一步。狀態**可達**：存在一條以它收尾的執行。invariant：在所有可達狀態上都成立的述語。麻煩在於「所有可達狀態」沒辦法逐一檢查——本章等下會遇到無限大的狀態空間，而 ch02 的結算系統光加一個 consumer 就讓你畫圖畫到手痠。\n\n但注意：「可達」這個概念本身就是歸納定義的——0 步可達的是初始狀態；n+1 步可達的是「從某個 n 步可達的狀態再走一步」。對歸納定義的東西，用歸納法。這次被歸納的不是自然數本身，而是**抵達一個狀態所需的步數**：\n\n**定理（不變量規則）**：給定狀態機與狀態述語 Ind。若\n\n-（A）**起點**：每個初始狀態都滿足 Ind；\n-（B）**封閉**：對任何滿足 Ind 的狀態 s，任何動作把 s 帶到的任何狀態 t 都滿足 Ind；\n\n則每個可達狀態都滿足 Ind。\n\n證明（對步數做歸納；令 P(n) ≜「所有 n 步可達的狀態都滿足 Ind」）：\n\n⟨1⟩1. P(0)：0 步可達的狀態就是初始狀態，由（A）成立。\n⟨1⟩2. 對任意 n：P(n) ⇒ P(n+1)。\n  ⟨2⟩1. 任取一個 n+1 步可達的狀態 t，以及一條見證它的長度 n+1 的執行。\n  ⟨2⟩2. 把這條執行的最後一步拆下來：存在狀態 s 與一步 s → t，而去掉最後一步剩下的前綴是長度 n 的執行，所以 s 是 n 步可達的。\n  ⟨2⟩3. s 滿足 Ind。理由：歸納假設 P(n) 套在 ⟨2⟩2 的 s 上。\n  ⟨2⟩4. t 滿足 Ind。理由：（B）套在 ⟨2⟩2 的那一步與 ⟨2⟩3。\n  ⟨2⟩5. Q.E.D. t 是任取的。\n⟨1⟩3. Q.E.D. 由 ⟨1⟩1、⟨1⟩2 與數學歸納法，∀ n：P(n)；而「可達」就是「存在某個有限的 n 使其 n 步可達」，故所有可達狀態滿足 Ind。\n\n之後全書把這條規則念成口訣：**起點成立、每步保持，所以永遠成立**。（ch06 會把「起點」與「每一步」寫成 TLA+ 的 Init 與 Next——名字先記著，語法到時再說。）\n\n三件事值得停下來想清楚。\n\n**第一，為什麼對自然數的歸納就足以覆蓋「永遠」？** 行為可以無限長，但行為裡的每個狀態都出現在某個有限位置 n。「永遠成立」＝「在每個有限位置都成立」，歸納恰好逐位置覆蓋。這其實是 safety 性質的本色：它要壞，必定在某個有限時刻壞給你看（ch07 會把這句話變成 safety 的正式定義）。反過來，「某事終將發生」型的性質（liveness，例如 `AllPaid`）不是這個形狀——歸納法管不到它，那是另一套工具的事（見 ch07，證明面 ch14 淺談）。\n\n**第二，為什麼歸納步只需要「前一個狀態」？** 因為狀態機的定義就是：下一步只取決於目前狀態，不取決於你怎麼來的。歷史不影響未來——除非歷史被記錄在狀態裡。對照強歸納很有意思：自然數上你可以免費引用全部歷史，狀態機上你只有眼前這一格的記憶。推論：當你的性質需要「歷史」才撐得起來（例如「這則訊息曾經被領走過」），你就得把那段歷史編碼進述語、甚至加變數去記——這是 ch14「輔助述語」的伏筆。\n\n**第三，「唯一辦法」不是修辭。** 我認為可以站得住：程式驗證的 inductive assertion 方法（Lamport 在 Teaching Concurrency 裡把它歸給 Floyd 與 Hoare）是它；TLC 的可達性窮舉（ch09）是把同一個遞推在有限實例上機械地跑到收斂；Apalache 的歸納模式（ch16）是把條件（B）丟給 SMT 檢查。所有已知能承重的 safety 論證，拆開都是不變量規則穿不同的衣服。差別只在「誰來執行歸納步、在多大的範圍執行」。\n\n## Inductive invariant：「為真」與「可證」是兩回事\n\n現在給本章的主角正式名分。\n\n**定義**：述語 Ind 是狀態機的 **inductive invariant（歸納不變量）**，當且僅當它滿足不變量規則的兩個前提——（A）所有初始狀態滿足 Ind；（B）從**任何**滿足 Ind 的狀態走任何一步，仍滿足 Ind。\n\n對照 ch02：invariant 是「所有**可達**狀態都成立」的述語。兩個定義的差異全在量詞範圍：條件（B）量化的是「所有滿足 Ind 的狀態」——**包括那些實際執行永遠到不了的狀態**。這一字之差是本章、也是整個 Part V 的戲肉：\n\n- inductive ⇒ invariant。不變量規則保證。\n- invariant ⇏ inductive。一個述語可以在每個可達狀態都為真，卻在某個「不可達、但滿足它」的狀態上一步跨出去。\n\n畫成圖（這張圖值得你記住一輩子）：\n\n```text\n┌─ 滿足目標性質 S 的狀態 ────────────────────┐\n│                                            │\n│  ┌─ 滿足 Ind 的狀態（每步都封閉在內）─┐    │\n│  │                                    │    │\n│  │   ┌─ 可達狀態 ─────────┐           │    │\n│  │   │  初始─►s1─►s2─►... │           │    │\n│  │   └────────────────────┘           │    │\n│  └────────────────────────────────────┘    │\n│                                            │\n│  s（S 為真、Ind 為假）──走一步─────────────┼──► 性質 S 破了\n└────────────────────────────────────────────┘\n```\n\n讀法：目標性質 S 為真，意思只是「可達狀態都落在 S 圈內」。但 S 圈裡可能住著像 s 這樣的幽靈——不可達、卻滿足 S——而它一步就能跨出圈外。歸納步面對的正是整個 S 圈（它分不出誰可達），所以會在 s 身上卡死。Ind 圈則不同：它對「圈內任何一步」封閉，所以歸納推得動；只要它同時包住可達集合、又縮在 S 圈內，S 就被證明了。\n\n於是，證「目標性質 S 是 invariant」的標準路線是**三個義務**：\n\n1. **起點**：所有初始狀態滿足 Ind；\n2. **封閉**：Ind 走任何一步還在 Ind 內；\n3. **蘊涵**：Ind ⇒ S。\n\n運氣好時 Ind 就是 S 自己（這時叫 S 本身 inductive）；更常見的是 S 不 inductive，你得在 S 上疊幾條輔助知識才封得起來。疊的動作叫**強化**（strengthening）。\n\n最後是日常工作流。歸納步證不動時，你手上會有一個具體的**壞前狀態**：滿足 Ind、卻一步跨出去的狀態。下一個動作永遠是同一個問題——**它可達嗎？**\n\n- 可達 → 你的性質根本是假的。從初始狀態找一條走到它的執行，接上那要命的一步，就是反例。\n- 不可達 → 性質可能仍為真，只是述語太弱、管不住幽靈。把「它為什麼不可達」的理由寫成新述語疊進 Ind，重證。\n\n證、卡、讀卡點、判可達、強化或舉反例——這個迴圈就是證 safety 的日常。本章接下來讓你完整走兩遍；至於怎麼又快又準地讀出「該強化什麼」，那門技藝深論留給 ch14。\n\n## 完整手推：ping-pong 機的彎路\n\n你維護過 WebSocket 訊息系統，對 heartbeat 不陌生：client 發 ping，server 回 pong，嚴格一來一回——收到 pong 之前不發下一個 ping。把它削成最小的狀態機：\n\n- 變數：turn ∈ {A, B}（現在輪到誰動：A＝client 可發 ping，B＝server 該回 pong）；p ∈ ℕ（累計發出的 ping 數）；q ∈ ℕ（累計回覆的 pong 數）。\n- 初始狀態：⟨turn = A, p = 0, q = 0⟩。\n- 動作：\n  - Ping：前提 turn = A。效果：p 加 1，turn 變 B。\n  - Pong：前提 turn = B。效果：q 加 1，turn 變 A。\n\n可達狀態長這樣（圖中縮寫 (turn, p, q)）：\n\n```text\n(A,0,0) ─Ping─► (B,1,0) ─Pong─► (A,1,1) ─Ping─► (B,2,1) ─Pong─► (A,2,2) ─Ping─► ...\n```\n\np 與 q 沒有上限，狀態空間是**無限的**：手畫畫不完，ch09 的 TLC 想窮舉也得先砍出有限範圍。要對這台機器說「永遠」，只剩證明一條路——正好拿它練第一次完整的歸納。\n\n要證的性質，從 heartbeat 的營運直覺翻過來：\n\nGap ≜ q ≤ p ∧ p ≤ q + 1\n\n白話：pong 不會超發（回覆數不超過請求數），且 ping 至多領先一個（嚴格一來一回）。掃一眼上面的鏈，每個可達狀態都滿足——Gap 是 invariant。現在來證。\n\n### 第一次嘗試：直接拿 Gap 做歸納\n\n⟨1⟩1. 起點：初始狀態 p = q = 0，0 ≤ 0 且 0 ≤ 0 + 1，成立。\n⟨1⟩2. 封閉：設步前狀態滿足 Gap，分動作討論。\n  ⟨2⟩1. 情況 Ping（前提 turn = A）：步後 p 的值是 p + 1，q 不變。要驗 q ≤ p + 1 與 p + 1 ≤ q + 1。\n    前半：由歸納假設 q ≤ p ≤ p + 1，成立。\n    後半：p + 1 ≤ q + 1 等價於 p ≤ q；但歸納假設只給 q ≤ p ≤ q + 1，**容許 p = q + 1**。若步前 p = q + 1，步後 p 的值是 q + 2 > q + 1。**卡住。**\n\n卡住不是世界末日，是資訊。照流程辦事：把卡點具體化成壞前狀態——⟨turn = A, p = 1, q = 0⟩。檢查：它滿足 Gap（0 ≤ 1 ≤ 0 + 1），Ping 的前提成立，走一步到 ⟨turn = B, p = 2, q = 0⟩，Gap 的第二條破了（2 > 0 + 1）。貨真價實的壞前狀態。\n\n接著問標準問題：**⟨turn = A, p = 1, q = 0⟩ 可達嗎？** 看可達鏈：turn = A 的可達狀態是 (A,0,0)、(A,1,1)、(A,2,2)……每個都是 p = q。「輪到 client 發、卻已經領先一個」的狀態，真實執行裡到不了。上一節那張圖裡的幽靈 s，在這裡有了名字。結論：Gap 為真（invariant），但**不 inductive**。\n\n### 讀懂失敗：缺的是哪句話\n\n卡點會告訴你缺什麼。歸納假設不知道「輪到誰」跟「領先多少」是綁在一起的：真實執行裡，輪到 A 時 ping 與 pong 打平，輪到 B 時 ping 恰好領先一。Gap 把兩種情況糊成一個範圍 [q, q+1]，丟掉了「哪個值對應哪個 turn」的資訊。把這句話寫回述語——強化：\n\nInd ≜ （turn = A ⇒ p = q）∧（turn = B ⇒ p = q + 1）\n\n先驗收蘊涵：Ind ⇒ Gap？turn 只有 A、B 兩種值，兩個 case 分別給 p = q 與 p = q + 1，都落在 q ≤ p ≤ q + 1 內。成立。\n\n### 第二次嘗試：證 Ind\n\n⟨1⟩1. 起點：初始狀態 turn = A 且 p = 0 = q，第一條成立；第二條前件為假，空洞成立。（ch03 的 vacuous truth 這次站在你這邊——前件假的蘊涵不欠你任何東西。）\n⟨1⟩2. 封閉：設步前狀態滿足 Ind，分動作討論。\n  ⟨2⟩1. 情況 Ping。前提 turn = A，故 Ind 第一條的前件為真：p = q。步後：p 的值是 p + 1 = q + 1，q 不變，turn = B。驗步後的 Ind：第一條前件假（turn 已是 B），空洞成立；第二條要求步後的 p 值等於 q + 1，由 p + 1 = q + 1 成立。\n  ⟨2⟩2. 情況 Pong。前提 turn = B，故 Ind 第二條給 p = q + 1。步後：q 的值是 q + 1 = p，p 不變，turn = A。驗步後的 Ind：第一條要求 p 等於步後的 q 值，由 p = q + 1 成立；第二條前件假，空洞成立。\n  ⟨2⟩3. Q.E.D. 動作只有 Ping、Pong 兩個，⟨2⟩1、⟨2⟩2 蓋住所有步。\n⟨1⟩3. 蘊涵：Ind ⇒ Gap（上面驗過）。\n⟨1⟩4. Q.E.D. 由 ⟨1⟩1、⟨1⟩2 與不變量規則，所有可達狀態滿足 Ind；再由 ⟨1⟩3，Gap 是 invariant。∎\n\n### 三個值得帶走的觀察\n\n**更強的主張反而更好證。** Gap 弱，證不動；Ind 強，一次就過。不神祕：要證的東西變強，歸納假設同步變強——火力跟負擔一起上升，而上升的火力恰好補上卡點。數學課把這招叫「加強歸納假設」；在狀態機世界它有專名：強化 invariant。什麼時候強化、強化多少，是一門手藝（見 ch14）。\n\n**Ind 是怎麼找到的？** 這裡兩條路殊途同歸：從卡點反讀（缺「turn 與 p − q 的綁定」），或直接盯著可達鏈找規律（A 時打平、B 時領先一）。小系統兩條路都通；大系統的系統化方法見 ch14。\n\n**這個例子裡 Ind 恰好把可達集合一字不差圈了出來**：滿足 Ind 的狀態就是 ⟨A, k, k⟩ 與 ⟨B, k+1, k⟩（k ∈ ℕ），正是那條鏈。這是小例子的奢侈，不是要求——inductive invariant 只需要三個義務成立，圈得比可達集合鬆完全合法。下一節就是圈得鬆的例子。\n\n## 手證結算系統 v0 的 NoDoublePay\n\n熱身結束，上正菜：對 ch02 的結算系統 v0，手證一條真實世界重量級的性質——`NoDoublePay`。\n\n### 把 v0 說成狀態機\n\n參數照 ch02 的基準：訊息兩則，Msgs = {m1, m2}；consumer 從一個加到兩個——這裡直接寫 Consumers = {c1, c2}，而且你馬上會看到，證明根本不在乎這兩個集合裡有幾個元素。三個變數（「函數＝查表」的讀法見 ch04）：\n\n- queue：尚未被領取的訊息集合；值是 Msgs 的子集合。\n- working：每個 consumer 手上的訊息；working[c] ∈ Msgs ∪ {\"idle\"}，哨兵值 \"idle\" 表示空手。\n- ledger：每個 msgId 是否已入帳；ledger[m] ∈ {未入帳, 已入帳}。\n\n初始狀態：queue = {m1, m2}，所有 working[c] = \"idle\"，所有 ledger[m] = 未入帳。\n\n動作（v0 的世界裡沒有 crash、沒有 redelivery——那些是 v1 的現實，見 ch08）：\n\n- Fetch(c, m)：前提 working[c] = \"idle\" 且 m ∈ queue。效果：把 m 從 queue 移除，working[c] 變為 m。**領取與出隊是同一步**——這是 v0 的原子性假設，先記著，最後要對帳。\n- Settle(c)：前提 working[c] = m（某個 m ∈ Msgs）。效果：ledger[m] 變為已入帳，working[c] 變回 \"idle\"。\n\n一則訊息在 v0 的一生：\n\n```text\nqueue ──Fetch(c,m)──► working[c] ──Settle(c)──► ledger[m] = 已入帳（從此離開系統）\n```\n\n### NoDoublePay 的狀態述語長相\n\nch02 的直覺版是「同一 msgId 至多入帳一次」。這裡有個誠實的小尷尬：ledger[m] 是布林——「再入帳一次」只是把已入帳蓋寫成已入帳，**狀態上看不出差別**（ch04 說過：建模時丟掉的資訊，性質就無法談論它）。所以把「至多一次」翻成狀態語言，要說的其實是：一旦入帳，這則訊息就徹底離開系統，再也沒有任何動作能對它觸發第二次入帳——\n\nNoDoublePay ≜ ∀ m ∈ Msgs：ledger[m] = 已入帳 ⇒ （m ∉ queue ∧ ∀ c ∈ Consumers：working[c] ≠ m）\n\n只要它在每個可達狀態都成立，「第二次 Settle 同一則訊息」就永遠不可能發生：Settle 需要有人手上拿著 m，而這個述語說已入帳的 m 不在任何人手上、也回不了佇列。\n\n### 先讓它卡一次\n\n直接拿 NoDoublePay 做歸納。起點沒問題：全部未入帳，每條蘊涵前件都是假的，空洞成立。封閉呢？看 Settle：\n\n設步前滿足 NoDoublePay，consumer c 拿著 m，執行 Settle(c)。步後 ledger[m] = 已入帳——述語對 m 的前件**從假變真**，步前空洞成立的那條蘊涵，步後突然要求三件事：m ∉ queue；c 自己放手了（成立，working[c] 變 \"idle\"）；**其他** consumer 手上也都沒有 m。前兩件有著落，第三件呢？歸納假設一聲不吭：步前 ledger[m] 還是未入帳，NoDoublePay 對 m 什麼都沒說。卡住。\n\n具體的壞前狀態，例如：\n\ns ≜ ⟨queue = {m1}, working = (c1 ↦ m1, c2 ↦ \"idle\"), ledger = (m1 ↦ 未入帳, m2 ↦ 已入帳)⟩\n\n檢查 s 滿足 NoDoublePay：m1 未入帳，蘊涵空洞成立；m2 已入帳且不在佇列、不在任何手上，成立。但 s 裡 m1 同時在佇列**和** c1 手上——Settle(c1) 之後 ledger[m1] = 已入帳而 m1 還躺在 queue 裡，述語應聲而破。（另一型壞前狀態：working[c1] = working[c2] = m1，兩隻手同時拿著同一則訊息。）\n\n照流程問：這些狀態可達嗎？直覺說不可達——v0 的 Fetch 是原子的，一則訊息出了隊就不會還在隊裡，更不會被拿兩次。但「直覺上」三個字不能寫進證明。這個直覺有個正式的名字：**守恆**。把它寫成述語。\n\n### 守恆強化與完整證明\n\n定義每則訊息在系統裡的存量：\n\ncopies(m) ≜ （若 m ∈ queue 則 1，否則 0）＋ |{c ∈ Consumers : working[c] = m}|\n\n強化後的述語（本章暫稱 IndPay）：\n\nIndPay ≜ ∀ m ∈ Msgs：copies(m) ≤ 1 ∧ （ledger[m] = 已入帳 ⇒ copies(m) = 0）\n\n讀法：第一條是守恆——全系統裡一則訊息至多存在一份，像一張支票不該有影本；第二條就是 NoDoublePay 換個寫法——copies(m) = 0 展開正是「不在 queue、不在任何手上」。\n\n**定理**：v0 的每個可達狀態都滿足 NoDoublePay。\n\n⟨1⟩1. 起點：初始狀態滿足 IndPay。\n  任取 m：m ∈ queue 貢獻 1、無人持有，copies(m) = 1 ≤ 1；ledger[m] = 未入帳，第二條前件假，空洞成立。\n⟨1⟩2. 封閉：設步前狀態滿足 IndPay，分動作討論。\n  ⟨2⟩1. 情況 Fetch(c, m)（前提：working[c] = \"idle\"、m ∈ queue）。\n    ⟨3⟩1. 步前 ledger[m] = 未入帳。理由：若已入帳，IndPay 第二條給 copies(m) = 0；但 m ∈ queue 使 copies(m) ≥ 1，矛盾。\n    ⟨3⟩2. 步前無人持有 m。理由：m ∈ queue 已貢獻 1，IndPay 第一條說總量 ≤ 1，故各 working 的貢獻為 0。\n    ⟨3⟩3. 步後 copies(m) = 1。理由：m 離開 queue（−1）、working[c] 變為 m（+1），其餘貢獻照 ⟨3⟩2 為 0。\n    ⟨3⟩4. 步後 IndPay 對 m 成立。理由：1 ≤ 1；Fetch 不動 ledger，由 ⟨3⟩1 步後 ledger[m] 仍未入帳，第二條空洞成立。\n    ⟨3⟩5. 步後 IndPay 對每個 m̃ ≠ m 成立。理由：queue 只少了 m，唯一變動的手 working[c] 從 \"idle\" 變 m，ledger 沒動——copies(m̃) 與 ledger[m̃] 都與步前相同，照歸納假設成立。\n    ⟨3⟩6. Q.E.D. ⟨3⟩4 與 ⟨3⟩5 合起來蓋住所有訊息。\n  ⟨2⟩2. 情況 Settle(c)（前提：working[c] = m）。\n    ⟨3⟩1. 步前 copies(m) = 1，且 m ∉ queue、除 c 外無人持有 m。理由：working[c] = m 已貢獻 1，IndPay 第一條說總量 ≤ 1，故其餘貢獻全為 0。\n    ⟨3⟩2. 步後 copies(m) = 0。理由：working[c] 變回 \"idle\"（−1）；queue 與其他手沒動，而 ⟨3⟩1 說它們本來就不持有 m。\n    ⟨3⟩3. 步後 IndPay 對 m 成立。理由：0 ≤ 1；第二條前件為真（ledger[m] 變已入帳），要求 copies(m) = 0，由 ⟨3⟩2 成立。\n    ⟨3⟩4. 步後 IndPay 對每個 m̃ ≠ m 成立。理由：queue 沒動，唯一變動的手從 m 變 \"idle\"，ledger 只改了 m 那一格——m̃ 的存量與入帳狀態都與步前相同。\n    ⟨3⟩5. Q.E.D.\n  ⟨2⟩3. Q.E.D. v0 只有 Fetch 與 Settle 兩類動作，⟨2⟩1、⟨2⟩2 蓋住所有步。\n⟨1⟩3. 蘊涵：IndPay ⇒ NoDoublePay。理由：第二條的 copies(m) = 0 展開即「m ∉ queue ∧ ∀ c：working[c] ≠ m」。\n⟨1⟩4. Q.E.D. 由 ⟨1⟩1、⟨1⟩2 與不變量規則，所有可達狀態滿足 IndPay；由 ⟨1⟩3，NoDoublePay 是 invariant。∎\n\n### 這份證明買到了什麼、又欠著什麼\n\n**買到的：規模無關。** 整份證明沒有任何一步用到「訊息有兩則」或「consumer 有兩個」——量詞全是 ∀ m、∀ c，案例分析按動作而不是按參數。同一份證明對 2 則訊息、2 個 consumer 成立，對每季 30 萬筆、200 個 consumer 也成立。對照一下：ch02 手畫的狀態空間圖只驗了一組參數；ch09 的 TLC 也只能窮舉有限組。歸納證明一次買斷所有規模——這就是本章標題的份量。\n\n**順帶一提：IndPay 圈得比可達集合鬆。** 例如「queue 空、大家空手、ledger 全是未入帳」滿足 IndPay，卻是真實執行裡到不了的狀態（訊息不會憑空消失）。沒關係：這個狀態一步也走不動（兩個動作的前提都不成立），封閉性對它免費成立。inductive invariant 不必精確刻畫可達集合，夠封閉、夠強就好。（它走不動是 deadlock？safety 不管這個——「不出事」與「走得下去」是兩種性質，後者見 ch07。）\n\n**欠著的：兩個原子性假設。** 一、Fetch 的原子性。若把「讀訊息」與「出隊」拆成兩步——或者更現實地，佇列服務的 visibility timeout 到期、把處理中的訊息重新投遞——copies(m) 會出現 2，IndPay 第一條當場陣亡。二、Settle 的原子性。入帳與放手同一步完成；若中間可以 crash，「入了帳卻還拿著訊息」的狀態就回來了。v1（ch08）會把 crash 與 redelivery 加回模型，到時 `NoDoublePay` 的擔子落到 dedup 表上，證明得整個重練——那是 ch14 的高峰戲。換句話說：這份證明證的是「v0 這個模型」永不重複入帳，不是「你的 production」永不重複入帳。模型與現實的差距，永遠是你自己的責任（ch02 的老話）。\n\n## 陷阱與防禦\n\n| 陷阱 | 長相 | 防禦／自我察覺 |\n|---|---|---|\n| 把「跑很久沒壞」當歸納 | 基底驗了、又觀察了一萬步，宣稱永遠 | 一萬步是一萬個 case，不是歸納步。問自己：我的論證對「任意」滿足述語的狀態成立，還是只對我看過的狀態成立？ |\n| 歸納步偷用可達性 | 證明裡寫「這種狀態實際上不會發生，略過」 | 「不會發生」正是你要證的結論——循環論證。歸納步只准用三樣東西：歸納假設、動作的前提、動作的效果。看到「實際上」三個字就該警鈴大作 |\n| 誤讀失敗的歸納步 | 一卡住就宣告性質是假的；或反過來硬說「差不多證完了」 | 把卡點具體化成壞前狀態，判可達：可達→真反例；不可達→強化。兩條路都有明確的下一步，「差不多」沒有 |\n| 三個義務缺一 | 只證了封閉、忘了起點（假述語的封閉性完美無瑕）；或忘了驗蘊涵（證了一個跟目標無關的東西） | 起點、封閉、蘊涵逐項打勾；再拿一個具體可達狀態代入 Ind，確認它不是空話 |\n| 漏動作 case | 「這個動作跟這條性質無關」於是跳過 | 無關也要寫一行理由（它不動哪些變數、為什麼存量不變）。動作 × 述語條款畫成矩陣逐格打勾——v0 證明裡的 ⟨3⟩5 就是在做這件事 |\n| 空洞前件的假安全感 | 述語全是 p ⇒ q 形，歸納步都靠前件為假空洞通過 | 問：有沒有可達狀態真的讓前件為真過？沒有的話這條述語什麼都沒說（ch03 的 vacuous truth；ch14 回收這個坑） |\n| 把 invariant 與 inductive invariant 當同義詞 | 看到性質為真就直接逐動作驗封閉，卡住後懷疑人生 | 為真是「可達狀態上的事實」；inductive 是「述語區域的封閉性」。先有心理準備：有意義的目標性質通常**不是** inductive（ch14） |\n\n## 紙上推演\n\n**題 1 [15 分鐘] ★ — 奇數和。** 用本章的層級格式證明：對所有 n ≥ 1，1 + 3 + 5 + ⋯ + (2n − 1) = n²。要求：明確寫出 P(n)、基底、歸納步，每個不展開的步附一行理由。\n\n### 推演解答\n\n令 P(n) ≜「前 n 個奇數的和等於 n²」。\n\n⟨1⟩1. 基底 P(1)：左邊＝1，右邊＝1²＝1，相等。\n⟨1⟩2. 歸納步：對任意 n ≥ 1，P(n) ⇒ P(n+1)。\n  ⟨2⟩1. 假設 P(n)：1 + 3 + ⋯ + (2n − 1) = n²。（歸納假設）\n  ⟨2⟩2. 前 n+1 個奇數的和＝（前 n 個奇數的和）＋（2(n+1) − 1）＝ n² + 2n + 1。理由：第 n+1 個奇數是 2(n+1) − 1 = 2n + 1；和的前段用 ⟨2⟩1 替換。\n  ⟨2⟩3. n² + 2n + 1 = (n + 1)²。理由：展開 (n+1)²。\n  ⟨2⟩4. Q.E.D. ⟨2⟩2 接 ⟨2⟩3 即 P(n+1)。\n⟨1⟩3. Q.E.D. 由 ⟨1⟩1、⟨1⟩2 與數學歸納法。\n\n常見錯路：在歸納步裡把 P(n+1) 的等式「假設成立」，左右同減 2n + 1 變回 P(n)——方向反了，這是從結論推前提。正確姿勢永遠是從左邊出發、用歸納假設替換、整理成右邊。另一個小坑：第 n+1 個奇數是 2n + 1 不是 2n − 1——通項跟基底都值得代個小數字驗算（n = 2：1 + 3 = 4 = 2²）。\n\n**題 2 [20 分鐘] ★★ — 請求與回應。** 一台計數器機：變數 sent, acked ∈ ℕ，初始皆為 0。動作 Send：無前提，效果 sent 加 1。動作 Ack：前提 acked < sent，效果 acked 加 1。證明 acked ≤ sent 是 inductive invariant。（這題的目標自己就 inductive，不需強化——請完整走完三個義務，並留意每一步的彈藥從哪來。）\n\n### 推演解答\n\n⟨1⟩1. 起點：acked = 0 ≤ 0 = sent。\n⟨1⟩2. 封閉：設步前 acked ≤ sent，分動作討論。\n  ⟨2⟩1. 情況 Send：步後 sent 的值是 sent + 1，acked 不變。acked ≤ sent < sent + 1。理由：歸納假設，加上加一不會變小。\n  ⟨2⟩2. 情況 Ack：前提 acked < sent。步後 acked 的值是 acked + 1，sent 不變。由前提得 acked + 1 ≤ sent。\n  ⟨2⟩3. Q.E.D. 動作只有兩個。\n⟨1⟩3. 蘊涵：目標就是 acked ≤ sent 自己，免費成立。\n⟨1⟩4. Q.E.D. 由不變量規則。\n\n兩個值得注意的點。其一：⟨2⟩2 的關鍵彈藥不是歸納假設，而是**動作的前提**（acked < sent）——guard 常常才是歸納步過關的主力，這正是「歸納步只准用歸納假設、前提、效果三樣」清單裡前提佔一席的原因。其二：想像拿掉 Ack 的前提（允許超收 ack）——封閉立刻破，壞前狀態 acked = sent 一步變成 acked > sent，而且這次它**可達**（初始狀態就是）：性質直接是假的。同一個證明骨架，讓你一眼看出修哪裡會塌。\n\n**題 3 [25 分鐘] ★★★ — 會卡的那種。** 一台批次計數器：變數 x ∈ ℕ，初始 x = 0。動作 Step：前提 x < 10，效果 x 加 2。動作 Reset：前提 x = 10，效果 x 歸 0。目標性質：x ≠ 7。\n（a）直接拿 x ≠ 7 做歸納，找出卡住的位置，寫出一個具體的壞前狀態，並判斷它是否可達。\n（b）提出一個強化述語，完成三個義務的完整層級證明。\n\n### 推演解答\n\n（a）起點：0 ≠ 7，成立。封閉：情況 Step——步前 x ≠ 7 且 x < 10，步後 x + 2 ≠ 7？歸納假設擋不住 x = 5：5 ≠ 7 成立、前提 5 < 10 成立，步後 x = 7。卡住，壞前狀態是 x = 5。可達嗎？從 0 出發每步加 2、滿 10 歸零，看得到的值是 0, 2, 4, 6, 8, 10, 0, …全是偶數，5 到不了。所以 x ≠ 7 為真但不 inductive。注意：「全是偶數」此刻只是觀察，還不是定理——它正是（b）要證的東西。\n\n（b）把那句觀察升級成述語：Even ≜「x 是偶數」。\n\n⟨1⟩1. 起點：x = 0，偶數。\n⟨1⟩2. 封閉：設步前 x 是偶數，分動作討論。\n  ⟨2⟩1. 情況 Step：步後 x + 2。偶數加 2 仍是偶數。\n  ⟨2⟩2. 情況 Reset：步後 x = 0，偶數。\n  ⟨2⟩3. Q.E.D. 動作只有兩個。\n⟨1⟩3. 蘊涵：x 是偶數 ⇒ x ≠ 7。理由：7 是奇數。\n⟨1⟩4. Q.E.D. 由不變量規則，x ≠ 7 是 invariant。\n\n討論：強化不必「剛剛好」。Even ∧ x ≤ 10 也是 inductive（值得自己驗一次：Step 的歸納步在哪裡用到前提 x < 10），而且把可達集合圈得更緊；但對「x ≠ 7」這個目標，Even 一條就夠承重。強化到多強才夠、會不會強過頭（強到連起點都不成立），是 ch14 的正題。這題的迷你版教訓：**強化述語往往就是你解釋「壞前狀態為什麼不可達」時，說出口的那句話**——把口頭理由升級成述語，是這門手藝的起點。\n\n## 自我檢核\n\n口頭回答，講得出來才算過關：\n\n1. 用兩句話向另一個工程師解釋「invariant」與「inductive invariant」的差別，並說清楚為什麼前者不保證能直接做歸納。\n2. 不變量規則的三個義務是哪三個？對每一個，舉一個「少了它會假通過」的具體例子。\n3. 歸納步卡住時，標準流程是什麼？「壞前狀態可達」與「不可達」各對應什麼結論與下一步動作？\n4. 為什麼歸納法配得上「證明永遠的唯一辦法」這個標題？ch09 的 TLC 窮舉算不算第二條路？\n5. 層級證明裡 ⟨2⟩3 這個編號怎麼讀？Q.E.D. 步的義務是什麼？為什麼說這個格式讓跳步無所遁形？\n6. 歸納步必須照顧不可達的幽靈狀態，聽起來像浪費力氣——它換來了什麼？（提示：精確算出可達集合有多貴？）\n7. v0 的證明在哪些步驟依賴「Fetch 是原子的」？如果領取與出隊拆成兩步，IndPay 的哪一條最先陣亡、會在哪個動作的歸納步現形？\n8. 強歸納與一般歸納差在哪？狀態機的不變量規則為什麼只需要一般歸納就夠了？\n\n## 延伸閱讀\n\n- Leslie Lamport, “How to Write a 21st Century Proof”（2011；後刊於 *Journal of Fixed Point Theory and Applications*, 2012）：<https://lamport.azurewebsites.net/pubs/proof.pdf> — 層級證明格式的原典。讀前半即可：為什麼散文證明擅長藏錯、層級結構怎麼讓每一步無所遁形。本章的 ⟨1⟩⟨2⟩ 編號就是它的手寫版，ch16 的 TLAPS 是它的機器版。\n- Leslie Lamport, “Teaching Concurrency”（2009）：<https://lamport.azurewebsites.net/pubs/teaching-concurrency.pdf> — 兩頁的小論文，核心立場：不變量是理解併發系統的鑰匙，而多數工程師沒被教過這樣思考。文末有一個比 ping-pong 機略難的小演算法邀你練手——讀完本章正好接得住。\n- Lorin Hochstein, “Inductive invariants”（Surfing Complexity, 2018-12）：<https://surfingcomplexity.blog/2018/12/27/inductive-invariants/> — 用一個 decrement 計數器小例把「為真但不 inductive」講得又短又準，還親手解了 Teaching Concurrency 的習題。適合當本章的第二視角複習。\n- Hillel Wayne, “Writing an Invariant”（learntla.com）：<https://learntla.com/core/invariants.html> — invariant 在 TLA+ 工具脈絡下的入門寫法（量詞與 ⇒ 的用法都會再見面）。注意它談的是 invariant 本身、不談 inductive invariant：在 TLC 的工作流程裡你只需要寫出性質，可達性窮舉由機器代勞（見 ch09）；要走證明這條路，inductive 的功夫才回到你手上——也就是本章與 ch14 的內容。\n"}, {"id": "ch06-action-logic", "file": "ch06-action-logic.md", "group": "Part III — TLA+ 與時序邏輯", "title": "ch06 — 動作邏輯：TLA 的核心設計", "md": "# ch06 — 動作邏輯：TLA 的核心設計\n\n> **本章解決什麼問題**：ch02 把系統看成狀態機，Part II 磨利了邏輯、集合與歸納，但到目前為止你都是用白話加圖在描述「一步」。本章引入 TLA 的核心發明——動作（action）：用含 prime 記號的述語，精確寫出「一步前後的關係」，再把整個系統壓縮成一條公式 Init ∧ □[Next]_vars。讀完本章，你能逐字讀懂這條公式、手追一條 behavior、並理解「允許不動」（stuttering）為什麼是刻意設計而不是缺陷。這是 Part III 的第一章：ch07 補上時序邏輯與 fairness，ch08 組裝完整的 spec，ch09 講機器怎麼自動檢查。\n\n你現在的位置：\n\n```text\n┌──────────────────────────────────────────────────────────────────┐\n│ Part I    為什麼                                                 │\n│   ch01 測試的極限 → ch02 狀態機                                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part II   數學地基                                               │\n│   ch03 邏輯 → ch04 集合 → ch05 歸納                              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part III  TLA+ 與時序邏輯                                        │  ← 你在這裡\n│   ch06 動作邏輯 → ch07 時序邏輯 → ch08 完整 spec → ch09 TLC 原理 │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part IV   協議精讀                                               │\n│   ch10 互斥 → ch11 2PC → ch12 Paxos → ch13 Raft                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part V    證明                                                   │\n│   ch14 歸納不變量 → ch15 Refinement → ch16 機器證明              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part VI   實務                                                   │\n│   ch17 業界案例 → ch18 方法地圖                                  │\n└──────────────────────────────────────────────────────────────────┘\n```\n\n## 從你已知的出發\n\n你每天都在跟「一步前後的關係」打交道，只是沒有用這個名字。\n\n寫 PostgreSQL trigger 的時候，你拿到兩個東西：`OLD` 與 `NEW`——同一筆 row 在這次修改前後的快照。你寫的條件像「`NEW.balance` 必須等於 `OLD.balance` 減掉這次的扣款」，這不是在描述某個瞬間的狀態，而是在描述**一次轉移**：前後兩個狀態之間必須滿足的關係。DB 交易也是同一回事：commit 把系統從「修改前的世界」原子地帶到「修改後的世界」，isolation level 吵的全部是「別人能不能看到中間狀態」，而你心中拿來推理的單位，一直都是 before/after 這一對快照。\n\nCode review 的時候你也在做一樣的事。看到一段入帳邏輯，你會在心裡說：「這一步執行完之後，ledger 必須已經標記、訊息必須已經離開佇列。」這句話有兩個時間點——「執行前」與「執行完之後」——以及一條把它們綁在一起的規則。\n\nTLA（Temporal Logic of Actions）的核心設計，就是把這個你早就在用的心智模型搬進邏輯：\n\n- 沒有 prime 的變數 `x`，指這一步**之前**的值——就是你的 `OLD`。\n- 帶 prime 的變數 x′，指這一步**之後**的值——就是你的 `NEW`。\n- 一個 **action** 就是一條同時談 OLD 與 NEW 的述語，描述「什麼樣的一步是合法的」。\n\nch02 我們說系統＝允許的行為集合，behavior＝狀態序列；ch03 你練了把白話翻成邏輯式。本章把兩者接起來：用邏輯式寫出「合法的一步」，再用一條公式圈出「所有合法的 behavior」。\n\n還有一個你天天經歷、但大概沒想過要放進數學的現象：監控系統每 15 秒抓一次 metrics，兩次取樣之間，dashboard 上「什麼都沒發生」。系統也許真的閒著，也許在你看不到的粒度上做了一萬件事——對只看這幾個指標的你來說，這兩種情況**無法區分，也不需要區分**。TLA 把這件事做成了語言的地基，名字叫 stuttering。本章後半會講為什麼這是整個理論最重要的一個設計決定。\n\n## 動作：把「一步」寫成述語\n\n先複習 ch02 的詞彙：一個**狀態（state）**是變數到值的一組賦值；一條 **behavior** 是狀態的（可以無限長的）序列；一**步（step）**是序列中相鄰的一對狀態 ⟨s, t⟩。\n\nTLA+ 用 `VARIABLES` 宣告變數。對結算系統 v0（ch02 引入：訊息 m1、m2，consumer 從 1 個加到 2 個，ledger 記每個 msgId 是否已入帳），變數是：\n\n```tla\nVARIABLES queue, working, ledger\n```\n\n接著是本章的主角。**action 是一條布林運算式，裡面可以同時出現 unprimed 變數（取「這一步之前」的值）與 primed 變數（取「這一步之後」的值）**。語意上，action 是「狀態對」的述語：給一對狀態 ⟨s, t⟩，unprimed 變數用 s 的值代入、primed 變數用 t 的值代入，算出真假。算出真，我們說這一步 ⟨s, t⟩ **滿足**這個 action。\n\n這是你的第一段 TLA+ 語法，先把對照表立起來。本書全程的慣例：**內文與紙上推演用 Unicode 數學符號；引用 spec 原文時保留 ASCII，放在標 `tla` 的 code block 裡**。之後所有章節都沿用，全表收在附錄 A。\n\n| 內文（Unicode） | spec 原文（ASCII） | 讀法 |\n|---|---|---|\n| ∧ | `/\\` | 且（and） |\n| ∨ | `\\/` | 或（or） |\n| ¬ | `~` | 非（not） |\n| ⇒ | `=>` | 蘊涵（見 ch03） |\n| ≡ | `<=>` | 等價 |\n| □ | `[]` | always（本章只用直覺版，理論見 ch07） |\n| ◇ | `<>` | eventually（見 ch07） |\n| x′ | `x'` | x 在下一狀態的值 |\n| ≜ | `==` | 定義為 |\n| ∀ / ∃ | `\\A` / `\\E` | 對所有／存在（見 ch03） |\n| ∈ / ∉ | `\\in` / `\\notin` | 屬於／不屬於（見 ch04） |\n| ≠ | `#` 或 `/=` | 不等於 |\n| ⟨x, y⟩ | `<<x, y>>` | tuple（見 ch04） |\n| ↦ | `\\|->` | 函數的「映到」（見 ch04） |\n| ⤳ | `~>` | leads-to（見 ch07） |\n\n來看最小的例子。「counter 加一」這一步，寫成 action 是：\n\n```tla\nIncr == counter' = counter + 1\n```\n\n內文寫法：Incr ≜ counter′ = counter + 1。一對狀態 ⟨s, t⟩ 滿足 Incr，若且唯若 t 裡 counter 的值等於 s 裡 counter 的值加一。\n\n這裡有一個必須在第一天就矯正的直覺：**counter′ = counter + 1 是方程式，不是賦值**。它跟程式裡的 `counter = counter + 1` 長得像，骨子裡完全不同：\n\n- 它沒有執行順序。一個 action 是一堆合取（∧）的組合，把合取的順序打亂，意思一個字都不變——它們是同時成立的約束，不是依序執行的指令。\n- 它不一定「決定」下一個值。你可以寫 counter′ > counter（下一個值隨便，只要變大）；可以寫 counter′ ∈ {1, 2, 3}（三選一）。一個 action 對同一個起點可以允許**多個**不同的終點——這就是 ch02 講的非決定性，在語言裡的長相。\n- 它可以無解。x′ = x + 1 ∧ x′ = x − 1 是一條永遠為假的 action：沒有任何一步滿足它。語法完全合法，邏輯上等於 FALSE。這不是趣聞，是一整類 bug 的形狀，「陷阱與防禦」會回來算帳。\n\n∃ 在 action 裡扮演「系統自己挑」的角色。「某個還在佇列裡的訊息被取走」寫成 ∃ m ∈ queue : …，哪一個 m？都可能。把非決定性寫成存在量詞，是 TLA+ 最常見的句型。\n\n## Init、Next、□[Next]_vars：一條公式讀完一個系統\n\n有了 action，描述整個系統只需要三樣東西：\n\n1. **Init**：一條普通的狀態述語（沒有 prime），圈出合法的起始狀態。\n2. **Next**：一條 action，通常是好幾個具名 action 的析取（∨）——「系統的下一步，是這幾種步的其中一種」。\n3. 把兩者綁成一條時序公式：\n\nSpec ≜ Init ∧ □[Next]_vars\n\n這條公式是整個 TLA+ 的縮影，值得逐字拆。設 σ = s₀, s₁, s₂, … 是一條 behavior：\n\n- **Init**：s₀ 必須滿足 Init。起點要對。\n- **□**：「在每一步都……」。□ 是時序算子 always，它的一般理論（作用在任意時序公式上、跟 ◇ 的對偶性）留給 ch07；本章你只需要這個讀法：□F 表示 F 對 behavior 的每個位置都成立。\n- **[Next]_vars**：這是 TLA 特有的記號，定義是\n\n  [Next]_vars ≜ Next ∨ (vars′ = vars)\n\n  其中 vars ≜ ⟨queue, working, ledger⟩ 是把所有變數打包成一個 tuple。所以 [Next]_vars 讀作：「這一步要嘛滿足 Next，**要嘛這組變數一動不動**」。後面那個免責條款就是 stuttering 步。\n- 合起來：σ 滿足 Spec，若且唯若 s₀ 滿足 Init，而且每一對相鄰狀態 ⟨sᵢ, sᵢ₊₁⟩ 要嘛滿足 Next、要嘛 vars 不變。\n\n注意下標 vars 不是裝飾。它回答「不動是指**誰**不動」——是這個 spec 關心的那組變數。TLA 的語法甚至刻意不讓你寫裸的 □Next：action 要進 □，必須包成 [Next]_vars 這種對 stuttering 免疫的形式。這是語言在強迫你接受一個設計哲學，下一節講為什麼。\n\n兩個配套記號：\n\n**UNCHANGED**。UNCHANGED v 就是 v′ = v 的縮寫；UNCHANGED ⟨x, y⟩ 等於 x′ = x ∧ y′ = y。它存在的理由是紀律：**一個 action 必須對每個變數都交代**——要嘛說它怎麼變，要嘛明說它不變。沒交代的變數不是「預設不變」，而是**不受約束**：語意上它下一步可以變成任何值。這條規則違反直覺（程式裡沒寫到的變數當然不變），所以是新手第一大坑，「陷阱與防禦」第 2 條。\n\n**ENABLED**。ENABLED A 是一條**狀態**述語：在狀態 s 為真，若且唯若存在某個狀態 t 使 ⟨s, t⟩ 滿足 A。白話：「站在 s，A 這種步走得出去」。直覺上就是你熟的 guard——條件滿足、這個分支可以走。兩件事先說清楚：第一，ENABLED A 已經沒有 prime 了，primed 變數被「存在某個 t」吃掉了，所以它是談單一狀態的述語；第二，**enabled 不等於會發生**。好幾個 action 同時 enabled 時，系統挑哪個？都可能；一直只挑別人、把某個 enabled 的 action 餓死，也完全合法。想說「enabled 夠久就必須發生」，那叫 fairness，是 ch07 的主題，本章不展開。ENABLED 在這裡先掛號，因為 fairness 的定義（WF、SF）整個建立在它上面。\n\n## 為什麼允許不動：stuttering 是刻意設計\n\n[Next]_vars 裡那個 vars′ = vars 的免責條款，初看像是漏洞：我寫 spec 是要系統做事，為什麼要允許「什麼都不做」永遠合法？\n\nLamport 的經典例子是時鐘（出自 Specifying Systems 第 2 章，本章延伸閱讀有免費 PDF）。考慮一個只顯示**小時**的時鐘 spec：變數 hr，每一步 hr 前進一格、12 之後回到 1。再考慮一個顯示**時與分**的時鐘：變數 hr 與 min，每一步 min 前進一格，min 走滿 60 才推動 hr 一次。\n\n問題來了：時分時鐘算不算「實作了」小時時鐘的 spec？直覺上當然算——把分鐘遮起來，它就是一個如假包換的小時鐘。但如果小時 spec 寫成「每一步 hr 都必須前進」，那時分時鐘**不滿足**它：時分時鐘每 60 步裡有 59 步 hr 紋風不動。一個顯然正確的實作，被 spec 判了死刑——錯的不是實作，是 spec 把「每一步」說得太滿。\n\n加上 stuttering 條款後，問題消失：小時 spec 說的是「每一步，要嘛 hr 照規則前進，要嘛 hr 不動」。時分時鐘那 59 步「只動分針」的步，對只看 hr 的觀察者來說就是 hr 不動的步——合法。於是「時分時鐘 ⇒ 小時時鐘」這條蘊涵成立了。\n\n把這個模式抽出來，就是整個 TLA 的世界觀：\n\n- **規格與實作是同一種東西**——都是「允許的行為集合」，都寫成同一種公式。\n- **「實作正確」＝實作的每條 behavior 都被規格允許**＝一條蘊涵式 Impl ⇒ Spec。\n- 實作幾乎總是比規格**細**：它有規格沒有的變數（分針、cache、重試計數器），它的很多步只動這些新變數。要讓蘊涵成立，規格必須把這些步看成「我的變數沒動」——也就是 stuttering。\n\n所以：**允許不動，不是寬鬆，是讓「實作蘊涵規格」在數學上可能成立的先決條件。** 這裡只給直覺；把 Impl ⇒ Spec 真正當定理來驗（refinement mapping、INSTANCE 的讀法），是 ch15 的主題。**這是 ch15 的伏筆，本章先把地基打好：你今天接受的 stuttering 條款，就是為了那一章存在的。**\n\n順帶補一個技術細節，之後讀文獻會用到：在 TLA 的語意裡，一個狀態其實是「**所有**變數」的賦值，不只是你 spec 裡宣告的那幾個。stuttering 步是「**我的** vars 沒動」，宇宙裡別的變數（別人 spec 的變數、實作層的新變數）可以照動。這就是為什麼下標 _vars 不可省略——它宣告「我」是誰。\n\nmonitoring 的比喻在這裡接上：你的 spec 就是那個每 15 秒看一次固定幾個指標的觀察者。兩次取樣之間系統做了什麼，只要沒反映在這幾個指標上，對 spec 而言就是 stuttering。一個對「取樣之間沒事」過敏的觀察者，沒辦法跟任何真實系統相處。\n\n最後是代價，必須誠實說：stuttering 條款意味著**從任何一點開始永遠不動**的 behavior 也滿足 □[Next]_vars。一條從 s₀ 起就原地踏步到天荒地老的 behavior，是 Spec 的合法行為。所以 Init ∧ □[Next]_vars 這種公式**只說得了 safety**（壞事不發生），說不了 liveness（好事終將發生）：它從不承諾任何訊息「終究會」入帳。要承諾，得加 fairness 條件——ch07 的事。本章你只要記住這個邊界：**□[Next]_vars 是一張「允許清單」，不是一張「待辦清單」。**\n\n## 第一個 spec：結算系統 v0\n\n材料齊了，把 ch02 的結算系統 v0 寫成你的第一個 TLA+ spec。回憶設定：兩則訊息 m1、m2 在佇列裡等著入帳；consumer 從佇列取訊息、處理、入帳；ledger 記錄每個 msgId 是否已入帳。ch02 手畫狀態空間時先用 1 個 consumer、再加到 2 個體會爆炸；這裡直接寫 2 個 consumer 的版本（把 `Consumers` 改成只剩 `\"c1\"` 就還原 ch02 的小圖）。取訊息與入帳拆成兩個 action，對應你在 SQS 世界的日常：receive 是一步，處理完 delete 是另一步——race 就藏在「兩步之間」，這也是 ch08 升級 v1（crash、redelivery、dedup）時的施工點。\n\n完整 spec 如下（約 20 行；MODULE、EXTENDS 等完整檔案結構是 ch08 的事，這裡先專心看邏輯本體）：\n\n```tla\nMsgs == {\"m1\", \"m2\"}\nConsumers == {\"c1\", \"c2\"}\n\nVARIABLES queue, working, ledger\nvars == <<queue, working, ledger>>\n\nInit == /\\ queue = Msgs\n        /\\ working = [c \\in Consumers |-> \"idle\"]\n        /\\ ledger = [m \\in Msgs |-> FALSE]\n\nFetch(c, m) == /\\ working[c] = \"idle\"\n               /\\ m \\in queue\n               /\\ queue' = queue \\ {m}\n               /\\ working' = [working EXCEPT ![c] = m]\n               /\\ UNCHANGED ledger\n\nSettle(c) == /\\ working[c] # \"idle\"\n             /\\ ledger' = [ledger EXCEPT ![working[c]] = TRUE]\n             /\\ working' = [working EXCEPT ![c] = \"idle\"]\n             /\\ UNCHANGED queue\n\nNext == \\E c \\in Consumers : Settle(c) \\/ \\E m \\in Msgs : Fetch(c, m)\n\nSpec == Init /\\ [][Next]_vars\n\nNoDoublePay == \\A m \\in Msgs :\n                 ledger[m] => /\\ m \\notin queue\n                              /\\ \\A c \\in Consumers : working[c] # m\n```\n\n逐行解說：\n\n- **`Msgs` / `Consumers`**：用 ≜（ASCII `==`）定義兩個常數集合。v0 把參數寫死成基準配置；ch08 會教 CONSTANTS 讓它們變成可調參數。\n- **`VARIABLES queue, working, ledger` 與 `vars`**：三個狀態變數——queue 是還沒被取走的訊息**集合**（v0 沒有重送，用 set 不會丟資訊；什麼時候該用 bag，ch04 已經吵過）；working 是函數 Consumers → 值，記每個 consumer 手上的東西，\"idle\" 是「兩手空空」的哨兵值；ledger 是函數 Msgs → BOOLEAN，對應 ch02 的「msgId → 是否已入帳」。vars 把三個變數打包成 tuple，給 [Next]_vars 和 UNCHANGED 用。\n- **`Init`**：合取三條：佇列裝滿兩則訊息；`[c \\in Consumers |-> \"idle\"]` 是 ch04 教的函數寫法——定義域是 Consumers、每個 c 都映到 \"idle\"；ledger 全部 FALSE。注意 Init 裡沒有任何 prime：它是狀態述語，圈起點。\n- **`Fetch(c, m)`**：「consumer c 從佇列取走訊息 m」。前兩個合取沒有 prime，是 guard：c 必須閒著、m 必須還在佇列。後三個合取交代**每一個**變數的下一步：queue′ 是舊 queue 拿掉 m（集合差，見 ch04）；working′ 用 EXCEPT 語法——`[working EXCEPT ![c] = m]` 讀作「跟 working 一模一樣的函數，只有在 c 這一格改成 m」，這是 TLA+ 更新函數的標準句型；ledger 明說不動。對照你的直覺：這就是 SQS receive——訊息離開可見佇列、進到某個 consumer 手上，帳本沒動。\n- **`Settle(c)`**：「consumer c 把手上的訊息入帳」。guard：c 手上有東西（≠ \"idle\"）。然後 ledger 在 working[c]（**舊值**——unprimed！）那一格改成 TRUE；working 把 c 那格放回 \"idle\"；queue 不動。一次入帳＋釋放 consumer，原子地發生。\n- **`Next`**：系統的任何一步，就是**某個** consumer 做 Settle，或**某個** consumer 對**某則**訊息做 Fetch。兩層 ∃ 把所有非決定性（誰動、拿哪則）攤開。\n- **`Spec`**：Init ∧ □[Next]_vars。十一個字元，整個系統。\n- **`NoDoublePay`**：性質名沿 ch02。注意它的形狀：這是一條**狀態**述語（沒有 prime），不是 action。\n\nNoDoublePay 值得多停一步，因為這裡有一個方法論的彎。白話的「同一 msgId 至多入帳一次」是在數**整條 behavior 裡 Settle 對 m 發生幾次**——那是行為層的敘述。但 invariant（ch02、ch05）是**狀態**述語：它只能看著單一狀態說話，看不到歷史。怎麼把「至多一次」塞進一張快照？答案是換個說法：**「已入帳的訊息，必須已經徹底離開系統」**——不在佇列裡、也不在任何 consumer 手上。只要每個可達狀態都滿足這句話，「第二次入帳」就無從發生：對 m 再做一次 Settle，前提是有 consumer 手持 m；要手持 m 得先 Fetch；要 Fetch 得 m 在佇列——三條路全被堵死。把行為層的願望改寫成狀態層的述語，是寫 invariant 的核心技藝，ch14 會把它磨到能撐起證明（那裡它有個正式名字：把歷史編碼進狀態）。\n\n這份 spec 怎麼被機器檢查、「v0 的所有可達狀態都滿足 NoDoublePay」怎麼被證明，分別是 ch09 與 ch14 的事。本章先練手藝：手追。\n\n## 手追一條 behavior：worked example\n\n紙上推演的基本功：給一條 behavior，逐步驗證它滿足 Spec。我們追一條 4 步的 behavior，**刻意含一步 stuttering**。狀態寫成 tuple，函數值縮寫 T/F：\n\n| 狀態 | queue | working | ledger |\n|---|---|---|---|\n| s₀ | {m1, m2} | (c1 ↦ idle, c2 ↦ idle) | (m1 ↦ F, m2 ↦ F) |\n| s₁ | {m2} | (c1 ↦ m1, c2 ↦ idle) | (m1 ↦ F, m2 ↦ F) |\n| s₂ | {m2} | (c1 ↦ m1, c2 ↦ idle) | (m1 ↦ F, m2 ↦ F) |\n| s₃ | {m2} | (c1 ↦ idle, c2 ↦ idle) | (m1 ↦ T, m2 ↦ F) |\n| s₄ | {} | (c1 ↦ idle, c2 ↦ m2) | (m1 ↦ T, m2 ↦ F) |\n\n**起點**：s₀ 滿足 Init 嗎？queue = Msgs ✓；working 兩格都是 \"idle\" ✓；ledger 兩格都 FALSE ✓。過。\n\n**步 1：⟨s₀, s₁⟩**。候選：Fetch(c1, m1)。逐合取驗，unprimed 用 s₀、primed 用 s₁：\n\n- working[c1] = \"idle\"？s₀ 裡是 idle ✓\n- m1 ∈ queue？m1 ∈ {m1, m2} ✓\n- queue′ = queue ∖ {m1}？s₁ 的 queue 是 {m2}，等於 {m1, m2} ∖ {m1} ✓\n- working′ = [working EXCEPT ![c1] = m1]？s₁ 裡 c1 ↦ m1、c2 ↦ idle（沒動）✓\n- UNCHANGED ledger？s₁ 的 ledger 與 s₀ 相同 ✓\n\n五個合取全真 ⇒ 這一步滿足 Fetch(c1, m1) ⇒ 滿足 Next ⇒ 滿足 [Next]_vars。\n\n**步 2：⟨s₁, s₂⟩**。s₂ 跟 s₁ 一字不差。它能是哪個 action 嗎？驗給你看：Fetch 要求 queue′ 比 queue 少一個元素——queue 沒變，不滿足；Settle 要求 working 的某一格回到 \"idle\"（這裡還得把 ledger 的 m1 格翻成 T）——working 與 ledger 都沒變，不滿足。**沒有任何 action 解釋得了這一步。**但 vars′ = vars 成立（三個變數原封不動），所以 [Next]_vars 的第二個 disjunct——stuttering 條款——接住了它 ✓。這就是那個免責條款「上工」的樣子：不靠它，這條 behavior 在第 2 步就死了。至於這一步「實際上」是什麼？也許是 c1 正在處理、還沒到入帳那一刻；也許是 GC pause；也許整個機房真的靜止了 15 秒。spec 不知道、也不在乎——這正是重點。\n\n**步 3：⟨s₂, s₃⟩**。候選：Settle(c1)。\n\n- working[c1] ≠ \"idle\"？s₂ 裡 working[c1] = m1 ✓\n- ledger′ = [ledger EXCEPT ![working[c1]] = TRUE]？working[c1] 取**舊值** m1，所以要求 ledger 的 m1 格翻成 T、m2 格不動——s₃ 正是 (m1 ↦ T, m2 ↦ F) ✓\n- working′ = [working EXCEPT ![c1] = \"idle\"]？s₃ 裡 c1 回到 idle ✓\n- UNCHANGED queue？兩邊都是 {m2} ✓\n\n滿足 Settle(c1) ⇒ 滿足 [Next]_vars。\n\n**步 4：⟨s₃, s₄⟩**。候選：Fetch(c2, m2)。working[c2] = \"idle\" ✓；m2 ∈ {m2} ✓；queue′ = {m2} ∖ {m2} = {} ✓；working′ 只改 c2 格成 m2 ✓；ledger 不動 ✓。過。\n\n四步全過、起點合法 ⇒ 這條 behavior（接著無限 stuttering 下去）滿足 Spec。順手做兩個加值檢查：\n\n**ENABLED 的手感**：站在 s₁，哪些 action enabled？Fetch(c2, m2)：c2 閒、m2 在佇列 ⇒ enabled。Fetch(c2, m1)：m1 ∉ queue ⇒ **不** enabled——SQS 直覺完全對應：被 c1 取走的訊息，c2 看不見，所以 v0 天生不會雙取。Settle(c2)：c2 手上沒東西 ⇒ 不 enabled。Settle(c1)：enabled。注意步 2 裡 Fetch(c2, m2) 與 Settle(c1) 都 enabled，但**都沒發生**——enabled ≠ 發生，behavior 選了 stuttering，完全合法。\n\n**NoDoublePay 抽查**：s₃ 是第一個有訊息入帳的狀態。ledger[m1] = T ⇒ 要求 m1 ∉ queue（✓，queue = {m2}）且沒有 consumer 手持 m1（✓，兩個都 idle 或持 m2）。成立。s₄ 同理。其餘狀態 ledger 全 F，蘊涵的前件為假——ch03 的 vacuous truth 在這裡是良性的：沒入帳，就沒義務。\n\n## 陷阱與防禦\n\n動作邏輯的坑，幾乎都來自「它長得像程式，但不是程式」。每一條都按本書的固定問法：它怎麼給你假安全感、你怎麼發現。\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 把 x′ = e 當賦值 | 你以為合取有執行順序、以為「後面那行」能讀到「前面那行」改完的值；於是寫出引用 working′[c] 卻期待舊值之類的鬼東西 | 把 action 唸成「前後快照的關係」；測試法：任意打亂合取順序，意思必須一字不變 |\n| 漏交代變數（忘了 UNCHANGED） | 沒被約束的變數＝下一步**什麼值都行**。spec 默默允許 ledger 憑空翻面，invariant 莫名其妙破掉，而你盯著 action 看不出哪裡寫錯——因為錯的是「沒寫」 | 寫完每個 action 點名每個變數：「你的下一步被誰決定？」三個變數三個著落，缺一個就是洞（TLC 也會在這裡直接報錯，見 ch09） |\n| action 恆假（guard 矛盾或方程無解） | 永遠不 enabled 的 action 等於從 Next 裡消失；系統照跑、所有 invariant 照樣全綠——因為那條路根本沒人走過。綠燈是 vacuous 的（ch03 的 vacuous truth，ch14 還會回收一次） | 對每個 action 手工構造一個讓它 enabled 的具體可達狀態；構造不出來，要嘛 spec 有鬼、要嘛你對系統的理解有鬼 |\n| 把 □[Next]_vars 讀成「系統會前進」 | 你寫完 spec 覺得「訊息會被入帳」已經在裡面了——其實裡面只有「入帳時不會做錯」。永遠 stuttering 的 behavior 完全合法，AllPaid 之類的承諾一個字都沒說 | 默念：□[Next]_vars 是允許清單，不是待辦清單。「終將發生」是 liveness，要 fairness 才有（見 ch07） |\n| 把 ENABLED 當「會發生」 | 「這個 action 在那個狀態明明 enabled，所以接下來就是它」——不，非決定性之下它可以被永遠跳過 | enabled 只回答「可不可以」；「會不會」是 fairness 的事（見 ch07）。手追 behavior 時練習：每一步先列出所有 enabled 的 action，再看實際走了哪個 |\n| 在 invariant 裡寫 prime | 想寫「入帳之後不會再入帳」，手一滑在 NoDoublePay 裡寫出 ledger′ —— invariant 是狀態述語，看不到「下一步」 | 寫性質前先分類：談單一狀態→狀態述語；談一步→action；談整條 behavior→時序公式（ch07）。層次錯了，後面全錯 |\n\n## 紙上推演\n\n### 題 1：白話規則 → action（[15 分鐘] ★）\n\n替 v0 補兩個 action（先不要管要不要加進 Next）：\n\n(a) **Requeue(c)**：「consumer c 手上有訊息時，可能因 visibility timeout 到期，把訊息放回佇列、自己回到 idle；帳本不動。」\n\n(b) **Backfill(m)**：「維運人員對還在佇列裡、尚未入帳的訊息 m 直接補入帳：標記 ledger、把 m 移出佇列；不經過任何 consumer。」\n\n寫完後自問：每個變數的下一步都有著落嗎？\n\n### 推演解答\n\n(a)\n\n```tla\nRequeue(c) == /\\ working[c] # \"idle\"\n              /\\ queue' = queue \\cup {working[c]}\n              /\\ working' = [working EXCEPT ![c] = \"idle\"]\n              /\\ UNCHANGED ledger\n```\n\n三個變數三個著落：queue 收回訊息、working 釋放、ledger 明說不動。最常見的錯路是把第二行寫成 queue′ = queue ∪ {working′[c]}——用了 **primed** 的 working，那是新值 \"idle\"，你會把字串 \"idle\" 塞進佇列。合取沒有順序，「先放回再清空」的程式直覺在這裡不存在；所有 unprimed 都是同一張舊快照。順帶一個 ch07 的預告：若把 Requeue 加進 Next，會出現「m1 被取走又放回、取走又放回……」的無限循環 behavior——完全合法、永不入帳。safety 毫髮無傷，liveness 整個沒了。記住這個不舒服的感覺，ch07 拿 fairness 來治它。\n\n(b)\n\n```tla\nBackfill(m) == /\\ m \\in queue\n               /\\ ledger[m] = FALSE\n               /\\ ledger' = [ledger EXCEPT ![m] = TRUE]\n               /\\ queue' = queue \\ {m}\n               /\\ UNCHANGED working\n```\n\n兩個 guard、三個著落。其實在 v0 裡 `ledger[m] = FALSE` 是多餘的 guard——NoDoublePay 成立的話，在佇列裡的訊息必然未入帳；但把它寫出來無傷，既是文件也是防禦（如果未來哪個改動讓「在佇列又已入帳」變得可達，Backfill 不會雪上加霜）。另一個值得咀嚼的點：worked example 的步 2 解答裡我們說過「一步同時改 queue 和 ledger 不滿足任何 action」——對**原版** Next 而言不合法的轉移，宣告成新 action 加進 Next 後就合法了。spec 是允許清單：清單上沒有的事不會發生，清單是你寫的。\n\n### 題 2：這條 behavior 合法嗎？（[20 分鐘] ★★）\n\n對原版 v0 spec（Next 只有 Fetch 與 Settle），逐一判斷下面三條 behavior 是否滿足 Init ∧ □[Next]_vars。不合法的，指出**第一個**出問題的步，並說明它為什麼不滿足任何一個 disjunct。（狀態欄位依序為 queue、working、ledger；working 與 ledger 只列縮寫。）\n\n(a) 四個狀態：\ns₀ = ⟨{m1, m2}, (c1 ↦ idle, c2 ↦ idle), (m1 ↦ F, m2 ↦ F)⟩；\ns₁ = ⟨{m1}, (c1 ↦ m2, c2 ↦ idle), (m1 ↦ F, m2 ↦ F)⟩；\ns₂ = s₁；\ns₃ = ⟨{m1}, (c1 ↦ idle, c2 ↦ idle), (m1 ↦ F, m2 ↦ T)⟩。\n\n(b) 兩個狀態：s₀ 同上；s₁ = ⟨{m1}, (c1 ↦ idle, c2 ↦ idle), (m1 ↦ F, m2 ↦ T)⟩。\n\n(c) 三個狀態：s₀ 同上；s₁ = ⟨{m2}, (c1 ↦ m1, c2 ↦ idle), (m1 ↦ F, m2 ↦ F)⟩；s₂ = ⟨{m2}, (c1 ↦ idle, c2 ↦ idle), (m1 ↦ F, m2 ↦ F)⟩。\n\n### 推演解答\n\n(a) **合法**。步 1 是 Fetch(c1, m2)（逐合取驗法同 worked example）；步 2 是 stuttering（沒有 action 能解釋，但 vars 全等，第二個 disjunct 接住）；步 3 是 Settle(c1)：working[c1] 舊值 m2，ledger 的 m2 格翻 T、queue 不動 ✓。陷阱在步 2：「什麼都沒發生」不是違規，是 [Next]_vars 白紙黑字允許的。\n\n(b) **不合法**，問題在步 1。這一步 queue 少了 m2 **且** ledger 的 m2 格翻了 T，working 全程 idle。驗三個出口：Fetch 要求 working 有一格從 idle 變成某個訊息——沒有；Settle 要求事前有 consumer 手持訊息——沒有；stuttering 要求 vars 全等——變了兩個。三個 disjunct 全滅 ⇒ 不是合法的步。注意：這個轉移**正是**題 1(b) 的 Backfill——在沒有宣告 Backfill 的 spec 裡，它就是違規。同一個轉移，合法與否取決於你的允許清單。\n\n(c) **不合法**，問題在步 2。working[c1] 從 m1 變回 idle，但 ledger 沒翻面（不滿足 Settle）、queue 沒收回 m1（不滿足 Requeue——況且原版 spec 根本沒有 Requeue）、vars 又不是全等。這就是「訊息蒸發」：consumer 拿著訊息憑空兩手一攤。眼熟嗎？這是 **crash**。v0 不允許它，不是因為現實中 consumer 不會掛——會，你太知道了——而是 v0 **選擇不建模** crash（ch02 的抽象選擇）。ch08 的 v1 會正式宣告 Crash 與 redelivery，到時這個轉移就會出現在允許清單上，而 NoDoublePay 的考驗才真正開始。\n\n### 題 3：找出這個 action 的 bug（[10 分鐘] ★★）\n\n同事提交了 Requeue 的另一個版本：\n\n```tla\nBadRequeue(c) == /\\ working[c] # \"idle\"\n                 /\\ queue' = queue \\cup {working[c]}\n                 /\\ working' = [working EXCEPT ![c] = \"idle\"]\n```\n\n指出 bug、說明語意後果，並回答：把 BadRequeue 加進 Next 之後，NoDoublePay 還守得住嗎？\n\n### 推演解答\n\nbug：**ledger 沒有著落**——少了 UNCHANGED ledger。後果不是「ledger 預設不變」，而是 ledger′ 完全不受約束：滿足 BadRequeue 的步裡，ledger 可以變成**任何**布林函數。包括：m2 沒人碰過卻翻成 T（憑空記帳）；更陰的是 m1 已入帳的 T 翻回 F（帳被抹掉，之後可以再入一次帳——真正的 double pay 開了門）。NoDoublePay 守不住：取「c1 手持 m1、m2 還在佇列」的可達狀態，走一步 BadRequeue(c1) 並讓 ledger′ 的 m2 格為 T——新狀態裡 ledger[m2] = T 而 m2 ∈ queue，NoDoublePay 直接陣亡。防禦就是陷阱表第 2 條的紀律：寫完 action，逐變數點名。三個變數、三個著落，少一個都不行。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 狀態述語、action、時序公式三層各談什麼？各舉 v0 裡的一個例子（提示：NoDoublePay、Fetch、Spec 各屬一層）。\n2. 逐字念出 Init ∧ □[Next]_vars：每個記號什麼意思？下標 vars 在回答什麼問題、為什麼不可省略？\n3. counter′ = counter + 1 與程式裡的 `counter = counter + 1` 差在哪？至少講出兩點（順序、非決定性／可無解）。\n4. 一條從 s₀ 起永遠 stuttering 的 behavior 滿足 v0 的 Spec 嗎？這暗示 Spec 沒承諾什麼、要去哪一章補？\n5. 用時鐘的例子解釋：為什麼禁止 stuttering 的 spec 會誤殺正確的實作？這跟 ch15 的 refinement 是什麼關係？\n6. ENABLED Settle(\"c1\") 是狀態述語還是 action？prime 到哪去了？enabled 為什麼不等於會發生？\n7. 「同一 msgId 至多入帳一次」是行為層的敘述，NoDoublePay 卻是一條狀態述語——它用了什麼改寫策略？為什麼這條狀態述語成立就堵死了第二次入帳？\n8. 一個 action 漏寫 UNCHANGED，語意上發生什麼事？為什麼這比「寫錯」更難發現？\n\n## 延伸閱讀\n\n- **Specifying Systems**（Leslie Lamport, Addison-Wesley, 2002）——官方頁面提供免費 PDF：`https://lamport.azurewebsites.net/tla/book.html`。第 2 章就是本章時鐘例子的原始出處（HourClock spec），第一部分（第 1–7 章，約 83 頁）涵蓋本書整個 Part III 的原典版本。讀原文最大的收穫是 Lamport 對每個設計決定的辯護。\n- **learntla.com 的「TLA+」一章**（Hillel Wayne）：`https://learntla.com/core/tla.html`。用 hour clock 從零走一遍純 TLA+ 的 Init／Next／Spec 與 EXCEPT 語法，跟本章互為印證；整個網站免費且持續維護（2026-06 查證）。\n- **The Temporal Logic of Actions**（Lamport, ACM TOPLAS 1994）：`https://lamport.azurewebsites.net/pubs/pubs.html#lamport-actions`。TLA 的原始論文。想看「為什麼把 action 放進邏輯、stuttering 為何不可妥協」的第一手論證，讀前兩節就值回票價。\n- **TLA+ Video Course**（Lamport 親自錄製）：`https://lamport.azurewebsites.net/video/videos.html`。共 10 講，前幾講對應本章與 ch07–08 的內容。課程開場自述「These videos are not light entertainment. They require careful viewing and actual thinking.」——名不虛傳，搭配紙筆服用。\n"}, {"id": "ch07-temporal-logic", "file": "ch07-temporal-logic.md", "group": "Part III — TLA+ 與時序邏輯", "title": "ch07 — 時序邏輯：safety、liveness 與 fairness", "md": "# ch07 — 時序邏輯：safety、liveness 與 fairness\n\n> **本章解決什麼問題**：ch06 結尾留了一句警告：□[Next]_vars 是允許清單，不是待辦清單——它保證系統不做壞事，卻從不承諾任何事終將發生。本章補上承諾的那一半：先給你 □、◇、⤳ 這組對整條 behavior 說話的算子，再把所有性質一刀切成 safety（有限可反駁）與 liveness（永遠可補救）兩類，最後引入 fairness——WF 與 SF——把「可以做」升級成「終究會做」的那條失落條款。結算系統的 liveness 性質 `AllPaid` 在本章正式命名並配上它需要的 fairness。完整 spec 的組裝見 ch08，機器怎麼檢查 liveness 見 ch09，liveness 怎麼證明 ch14 淺談。\n\n## 從你已知的出發\n\n你的結算 pipeline 有一條從來沒寫進任何程式碼、卻撐起整個業務的假設：「丟進 SQS 的訊息，終究會被消費。」\n\n它不在 producer 裡，不在 consumer 裡，也不在 IaC 範本裡。它存在於 K8s 會把掛掉的 pod 拉起來、SQS 會把逾時的訊息重新投遞、你的 on-call 會在半夜處理 OOMKilled 這些機制的**合成效果**裡。ch02 戳破過一次：v0 的動作規則沒有任何一條強迫 consumer 工作，「停在 S1 從此不動」完全合法。ch06 的紙上推演又補了一刀：把 Requeue 加進 Next，訊息可以被拿起、放回、拿起、放回，鬼打牆到天荒地老——safety 毫髮無傷，入帳遙遙無期。當時說「ch07 拿 fairness 來治它」。今天收網。\n\n再看你的監控。On-call 的事故有兩種長相：\n\n- **有犯罪現場的**：錯誤 log、髒資料、重複入帳的 row。壞事發生在某個確切的時刻，你可以指著它說「就是這一步」。\n- **沒有現場的**：什麼都沒壞，只是該發生的一直沒發生。佇列深度不降、結算批次卡住、deadlock detector 安靜地等。你的告警規則「queue depth 連續 30 分鐘 > 0」其實是在用有限的觀察，逼近一個關於無限未來的判斷——「它**永遠**不會被消費了」。但嚴格說，30 分鐘證明不了永遠；你拉長到 24 小時也一樣。\n\n這兩種事故的分界線，就是本章的主角：safety 與 liveness。前者違反的證據是有限的，後者違反的證據永遠湊不齊有限版本——這是 ch02 那句「safety 看得到犯罪現場，liveness 永遠在等待戈多」的正式化。而你那條「訊息終究會被消費」的營運信仰，會在本章拿到數學身分：fairness 假設。它有兩個強度——WF 與 SF——粗略地說：WF 對得起一台持續健康的 consumer，SF 對得起一台反覆 crash-restart、卻總會被拉起來的 consumer。你的 K8s 叢集每天都在替你兌現其中一種。\n\n## 時序算子：對整條 behavior 說話\n\nch06 把性質分了三層：狀態述語談單一狀態、action 談一步、時序公式談整條 behavior。前兩層你已經會了，本章把第三層的詞彙補齊。\n\n設 σ = s₀ → s₁ → s₂ → … 是一條（無限的）behavior。記 σ⁽ⁱ⁾ 為它從位置 i 起的**後綴** sᵢ → sᵢ₊₁ → …。約定：一條狀態述語 P 套在 behavior 上，看的是**第一個狀態**——σ ⊨ P 若且唯若 s₀ ⊨ P。時序算子做的事，就是把「看第一個狀態」推廣成「看每個位置」：\n\n- **□F（always，ASCII `[]`）**：σ ⊨ □F 若且唯若**每個**後綴 σ⁽ⁱ⁾ 都滿足 F。對狀態述語 P，□P 就是「P 在每個位置都成立」——ch02 的 invariant 直覺，現在是一條正式的時序公式。\n- **◇F（eventually，ASCII `<>`）**：σ ⊨ ◇F 若且唯若**某個**後綴 σ⁽ⁱ⁾ 滿足 F。注意 i 可以是 0：「終將發生」包含「現在就成立」。\n- 兩者對偶：◇F ≡ ¬□¬F。\n\n如果你覺得這對搭檔眼熟——對，□ 就是「對所有位置」的 ∀，◇ 就是「存在位置」的 ∃，只是量化的範圍從集合元素換成了時間位置。ch03 練的否定推移原封不動地搬過來：¬□F ≡ ◇¬F（「並非永遠」＝「終將有一次不」）、¬◇F ≡ □¬F（「永不發生」＝「每一刻都沒發生」）。\n\n另外提一件你可能在別的教材看過的東西：標準 LTL 有個「下一步」算子（通常寫 X 或 ◯）。TLA **刻意沒有它**。理由是 ch06 的 stuttering：任何 TLA 公式對「插入或刪除 stuttering 步」必須不敏感，而「下一步」這個概念數的恰恰是步——兩次取樣之間塞進幾步 stuttering，「下一步是什麼」就變了。所以 TLA 的時序公式說得出「終將」「永遠」，刻意說不出「恰好三步之後」。\n\n### 疊起來用：□◇ 與 ◇□\n\n□ 與 ◇ 可以巢狀。兩個組合重要到值得專門起名：\n\n- **□◇P：「反覆發生」（infinitely often）**。每個位置往後看都還會再遇到 P——P 出現無限多次，永不絕跡。\n- **◇□P：「終將穩定」（eventually forever）**。存在某個位置，從那之後 P 再也不退場。\n\n```text\n□◇P（反覆發生）：  ─P───P─────P──P───────P───▶  P 永遠還會再來，中間可以斷\n◇□P（終將穩定）：  ──────────P──P──P──P──P──▶  某一刻起 P 再也不走\n```\n\n用你的維運直覺對照：一個 flapping 的服務——當了又起、起了又當——滿足 □◇healthy，永遠不滿足 ◇□healthy。「它總會回來」與「它終將穩定」是兩個強度的承諾，監控圖上一眼可辨，公式上差一個字母的順序。方向只有一邊成立：◇□P ⇒ □◇P（從此不走，當然反覆出現）；反向不成立，flapping 就是反例。\n\n### ⤳：每一次都會等到\n\n第三個常用算子是 **⤳（leads to，ASCII 寫作 `~>`）**，定義是縮寫：\n\nP ⤳ Q ≜ □(P ⇒ ◇Q)\n\n讀法：「**每當** P 成立，**之後**（含當下）Q 終將成立。」注意 □ 在最外面——這不是「第一次 P 之後會有 Q」，是每一次。對照工程語感：「每一筆 retry 都終將得到回應」是 ⤳；「總有一筆 retry 得到回應」只是 ◇。\n\n它的否定值得先寫下來，之後讀反例會用到：¬(P ⤳ Q) ≡ ◇(P ∧ □¬Q)——「存在某個時刻，P 成立了，而 Q 從此永不發生」。違反 leads-to 的證據是一條**無限**的尾巴，不是一個時間點。記住這個形狀，ch09 講 TLC 找 liveness 反例時它會以「壞循環」的樣子回來。\n\n### ⟨A⟩_v：與 [A]_v 成對的另一半\n\nch06 給過 [A]_v ≜ A ∨ (v′ = v)——「A 或者不動」，stuttering 的免責條款。它有個對偶的兄弟，本章 fairness 的定義要用：\n\n⟨A⟩_v ≜ A ∧ (v′ ≠ v)　（ASCII：`<<A>>_v`）\n\n讀作「貨真價實的 A 步」：既滿足 A，又真的動了 v。兩兄弟的分工：\n\n| 記號 | 定義 | 用途 | 典型位置 |\n|---|---|---|---|\n| [A]_v | A ∨ (v′ = v) | 寬容：允許不動 | □[Next]_vars——「每一步要嘛合法要嘛不動」 |\n| ⟨A⟩_v | A ∧ (v′ ≠ v) | 嚴格：必須真的動 | ◇⟨A⟩_v——「終將發生一個真正的 A 步」 |\n\n為什麼 fairness 必須用 ⟨ ⟩ 這一半？因為「發生」如果允許 stuttering 充數，承諾就是空的——系統可以宣稱「我做了一步 A，只是這步剛好什麼都沒改」。下標 _v 同時保住了 ch06 講的 stuttering 不敏感性：所有 TLA 公式都得對「插入不動的步」免疫，⟨A⟩_v 用「v 必須真的變」把這件事釘死。\n\n## safety 與 liveness：有限可反駁 vs 永遠可補救\n\n詞彙齊了，現在把 ch02 那句一句話對比升級成正式定義。本書採用的是 Lamport 對 Alpern–Schneider 定義的改寫（出處見延伸閱讀；他們的原始定義用拓撲語言，對 stuttering 不敏感的性質兩者等價）。先約定：把有限的狀態序列 s 看成「之後永遠停在最後一個狀態」的無限 behavior（ch02 的老慣例），於是有限序列也可以談滿不滿足一條性質。\n\n> **safety**：性質 P 是 safety，若且唯若對每條 behavior σ：σ ⊨ P ⟺ σ 的**每個有限前綴**都滿足 P。\n>\n> **liveness**：性質 P 是 liveness，若且唯若**任何**有限狀態序列都能延伸成一條滿足 P 的 behavior。\n\n白話翻譯，這是本章你最該帶走的兩句：\n\n- **safety 是有限可反駁的**：σ 違反 P，必定存在一個最短的前綴已經回天乏術——那個前綴的最後一步就是犯罪現場，你可以指著它定罪，後面不用看。\n- **liveness 是永遠可補救的**：不管目前的歷史多難看，都存在一種未來能把 P 圓回來。所以**任何有限前綴都反駁不了 liveness**——「再等等」永遠是合法辯護。違反 liveness 的證據必須是一條完整的無限 behavior。\n\n拿幾條公式過刀：\n\n| 公式 | 分類 | 理由 |\n|---|---|---|\n| □P（P 是狀態述語） | safety | 第一個違反 P 的狀態就是現場 |\n| ◇P | liveness | 任何前綴都能補：接一個滿足 P 的狀態就贖回來了 |\n| □◇P | liveness | 同上，而且要補幾次都行 |\n| ◇□P | liveness | 接上「從此永遠 P」的尾巴即可 |\n| P ⤳ Q | liveness（只要 Q 不是矛盾式） | 接一個滿足 Q 的狀態，所有欠的債一次還清 |\n| Init ∧ □[Next]_vars | safety | 第一個非法的步就是現場（這是個定理，出處見延伸閱讀） |\n\n表的最後一行是本章的軸心，值得放大：**你在 ch06 學會的整套 Init ∧ □[Next]_vars，不管 Init 和 Next 寫得多精緻，都只是一條 safety 性質。** 直覺論證：這條公式的任何違反——起點不對、某步非法——都發生在有限位置；反過來，一條每步都合法的 behavior 不管多消極都滿足它。從 s₀ 起永遠 stuttering 的「原地踏步」behavior 是它的合法公民。所以**任何**非平凡的 liveness 都不可能是它的推論——這不是你 spec 寫得不好，是這個公式形狀的數學極限。\n\n兩個邊界案例，幫你校準直覺：\n\n**「90 秒內必回應」是 safety，不是 liveness。** 等到第 91 秒還沒回應，現場就有了——有限可反駁。你的 SLA、timeout、告警規則全是這一型：工程實務把「終將」改寫成「期限內」，正是因為 liveness 沒辦法監控，而 safety 可以。代價是你得把時鐘建進模型才能談「90 秒」（本書不建模時間，ch02 的抽象帳記過這筆）；以及，期限內沒發生≠永遠不發生——把告警當 liveness 反例是範疇錯誤，陷阱表會回收。\n\n**Alpern–Schneider 分解定理**：任何性質都可以寫成一條 safety 與一條 liveness 的合取。這是 1985 年的經典結果（本書不證，見延伸閱讀），但它對你寫 spec 的意義很直白：任何「規格」都拆得成「別做錯事」＋「要把事做完」兩張清單，而這兩張清單的反例形狀、檢查演算法（ch09）、證明技術（ch14）全部不同。先分類、再動手，是時序性質的第一條紀律。順帶一提：既是 safety 又是 liveness 的性質只有一條——恆真。紙上推演題 4 讓你親手證它，證完你會對這兩個定義的咬合方式有肌肉記憶。\n\n## AllPaid：□[Next]_vars 給不了的承諾\n\n回到結算系統 v0（ch06 的 spec：變數 queue、working、ledger；動作 Fetch(c, m) 取訊息、Settle(c) 入帳；Spec ≜ Init ∧ □[Next]_vars）。全書的 liveness 基準性質，現在正式命名：\n\n> **`AllPaid`：每則訊息終會入帳。**\n\n寫成時序公式（ledger[m] 本身是布林值，ch06）：\n\n```tla\nAllPaid == \\A m \\in Msgs : <>ledger[m]\n```\n\n內文寫法：AllPaid ≜ ∀ m ∈ Msgs : ◇ledger[m]。逐字讀：對每一則訊息 m，behavior 上存在某個位置，ledger 在那裡標記 m 已入帳。注意 ∀ 在 ◇ 外面——每則訊息**各自**終將入帳，不要求同時。\n\n它是 liveness（◇ 形，有限前綴永遠反駁不了）。那麼：Spec ⇒ AllPaid 成立嗎？\n\n**不成立，而且輸得毫無懸念。** 反例一：σ_idle——s₀ 之後永遠 stuttering。每一步都被 [Next]_vars 的免責條款接住，Spec 滿分通過；ledger 永遠全 FALSE，AllPaid 陣亡。反例二（更陰一點）：Fetch(c1, m1) 之後永遠 stuttering——做了一半、躺著不動，照樣合法。這就是任務交代的「忘了 fairness」的第一種死法：**你以為 liveness 藏在 spec 裡，其實 spec 對它隻字未提**；一旦真的去檢查（ch09 的 TLC 也會這樣告訴你），主張全滅，反例還是最便宜的那種。而第二種死法更危險：你從來沒把 AllPaid 寫下來檢查，於是「它當然成立」以信仰的形式活在你心裡——直到結算季卡單。\n\n缺的東西叫 fairness。\n\n## Fairness：WF 與 SF\n\n### fairness 是什麼：只砍劇本，不立新法\n\nfairness 是加在 Spec 後面的一個合取項：\n\nFairSpec ≜ Init ∧ □[Next]_vars ∧ L\n\n其中 L 是一條 liveness 公式。它的作用是把 behavior 集合**砍小**：那些「明明可以做事卻永遠拖著」的無限劇本，從此不算系統的合法行為。兩件事必須先說死：\n\n- **fairness 不新增任何動作、不禁止任何單一步。** 它管的是無限的調度模式，不是某一步能不能走。已經發生的有限歷史，fairness 一個字都改不了。\n- **不是隨便一條 liveness 都配當 fairness。** 合格的 fairness 有一條判準（Lamport 的定義，見延伸閱讀）：加上 L 之後，不可以把 safety 部分的任何有限前綴判成死路——你永遠不會「走著走著就注定違反 L」。直覺版：fairness 只能逼系統做**它本來就被允許做**的事，不能偷偷立新法。隨手寫一條 □◇(…) 塞進 spec，很可能在暗中禁止了 Next 允許的步，spec 從此言行不一。好消息是：接下來的 WF 與 SF（套在 Next 的子動作上）自動滿足這條判準——這正是 TLA+ 要你用它們、而不是手寫時序雜湊的原因。\n\n### WF：持續可做，終究會做\n\n**Weak fairness**，定義（這是本章最重要的兩條公式之一，逐字讀）：\n\nWF_v(A) ≜ ◇□(ENABLED ⟨A⟩_v) ⇒ □◇⟨A⟩_v\n\n- 前件 ◇□(ENABLED ⟨A⟩_v)：「從某一刻起，真正的 A 步**持續**可行」（ENABLED 是 ch06 掛過號的那個「走得出去」述語——欠的帳今天還）。\n- 後件 □◇⟨A⟩_v：「真正的 A 步發生無限多次」。\n- 合起來：**一個動作不可以永遠可做卻永遠不做。** 等價的反面讀法：behavior 裡不存在這樣的尾巴——A 一路 enabled，卻一步都沒發生。\n\n注意後件是 □◇（無限多次），不是 ◇（一次）。原因：fairness 描述的是長期服務，「做一次就退休」對反覆到來的工作毫無意義；而只要前件持續成立，每做完一次 A 又持續 enabled，承諾就繼續生效——□◇ 正是這個「每次都會再做」的形狀。\n\n### SF：反覆可做，終究會做\n\n**Strong fairness**：\n\nSF_v(A) ≜ □◇(ENABLED ⟨A⟩_v) ⇒ □◇⟨A⟩_v\n\n跟 WF 只差前件的兩個字母：◇□ 變 □◇。WF 要求「**持續** enabled」才觸發承諾；SF 只要求「**反覆** enabled」——哪怕中間一直被打斷，只要可行性無限多次回來，A 就終究要發生（而且無限多次）。\n\n兩者的強弱關係：**SF_v(A) ⇒ WF_v(A)**。理由一行：持續 enabled 蘊涵反覆 enabled（◇□E ⇒ □◇E），所以 SF 的前件更容易成立、承諾觸發得更頻繁，是更強的條款。對寫 spec 的你來說：SF 是更重的**假設**——它排除更多劇本，換句話說，你對調度器、對維運、對世界要求得更多。\n\n### 用你的 SQS 直覺讀一遍\n\n把「consumer c 入帳」當作動作 A：\n\n- **WF ≈ consumer 持續健康就會消費。** 只要 c 手上有訊息、行程活著、沒人打斷——也就是 Settle 持續 enabled——它終究會把帳入掉。這對得起一台不會當機的 worker：OS 調度器再怎麼偏心，也不會永遠跳過一個 ready 的執行緒。\n- **SF ≈ 反覆 crash-restart 也終會消費。** c 每拿到訊息就 crash，visibility timeout 把訊息收回去，K8s 把 pod 拉起來，訊息又被拿到……Settle 的可行性像壞掉的日光燈一樣閃爍：enabled、disabled、enabled、disabled。WF 的前件 ◇□ENABLED **永遠不成立**——它從頭到尾沒有持續 enabled 過——於是 WF 空洞地滿足，什麼都不保證。SF 的前件 □◇ENABLED 成立（可行性無限多次回來），所以 SF 強迫入帳終究發生。\n\n一句話總結差異：**WF 管「沒人理它」的飢餓，SF 管「反覆被打斷」的飢餓。** 你的系統裡兩種飢餓都真實存在：前者是調度不公，後者是 crash-restart、搶鎖失敗、重試風暴。\n\n### v0 的定理：FairSpec ⇒ AllPaid\n\n現在給 AllPaid 配 fairness。v0 的基準選擇是最便宜的一條——對整個 Next 的 weak fairness：\n\n```tla\nFairSpec == Spec /\\ WF_vars(Next)\n\nTHEOREM FairSpec => AllPaid\n```\n\nWF_vars(Next) 讀作：「只要系統還有任何合法的步可走，就不可以永遠不走。」這是對「系統整體不會擺爛」的最低限度假設。它為什麼在 v0 就足夠買到 AllPaid？論證如下（工程師嚴謹的示意——liveness 證明的系統性工具本書不展開，ch14 淺談；但這條論證的每一步都站得住）：\n\n⟨1⟩1. 任何滿足 Spec 的 behavior，真正的步（非 stuttering）至多 4 步。\n　　理由：定義剩餘工作量 M ≜ 2·|queue| ＋ |{c ∈ Consumers : working[c] ≠ \"idle\"}|。逐動作驗：Fetch 讓 |queue| 減 1、忙碌數加 1，M 淨減 1；Settle 讓忙碌數減 1，M 減 1。M 不會是負數，初始 M = 2·2 ＋ 0 = 4。\n⟨1⟩2. 所以存在位置 k，從 k 起全是 stuttering——系統凍結在某個狀態 s_k。\n⟨1⟩3. 在 FairSpec 下，s_k 必須讓 ⟨Next⟩_vars 不再 enabled。\n　　理由：stuttering 不改變狀態。若 ⟨Next⟩_vars 在 s_k enabled，它從 k 起**持續** enabled，WF_vars(Next) 的前件成立，要求真正的 Next 步發生無限多次——與「從 k 起全是 stuttering」矛盾。\n⟨1⟩4. Next 不 enabled ⇒ queue = {} 且所有 working[c] = \"idle\"。\n　　理由：只要有 consumer 手上有訊息，Settle 就 enabled，所以全員 \"idle\"；全員閒著時只要 queue 非空，Fetch 就 enabled，所以 queue = {}。\n⟨1⟩5. queue = {} ∧ 全員 \"idle\" ⇒ ∀ m ∈ Msgs : ledger[m]。\n　　理由：ch02 驗過的「恰好一處」——每則訊息恰在佇列、某個 consumer 手上、或帳本三者之一（Fetch 把它從佇列搬到手上、Settle 從手上搬進帳本，沒有動作讓訊息消失或複製；要把這句話升級成歸納證明，手法就是 ch05 的 IndPay 同款）。前兩處都空了，只剩帳本。\n⟨1⟩6. Q.E.D. 從位置 k 起 ledger 全真；每個 ◇ledger[m] 在位置 k 得到見證。∎\n\n注意這個證明的液壓從哪來：⟨1⟩1 的量尺 M **每走一步真步就嚴格遞減**——v0 的狀態圖是一張有限的 DAG（ch02 畫過），唯一的死路就是全入帳。WF_vars(Next) 只負責把系統推下去，地形保證它只能滾到正確的終點。這種「遞減量尺」論證是 liveness 證明的雛形，ch14 會再見到它。\n\n### Requeue 進場：WF 的崩塌現場\n\n地形一變，這套便宜的 fairness 立刻破產。把 ch06 紙上推演題 1 的 Requeue 加進 Next（visibility timeout 到期，訊息回佇列）：\n\n```tla\nRequeue(c) == /\\ working[c] # \"idle\"\n              /\\ queue' = queue \\cup {working[c]}\n              /\\ working' = [working EXCEPT ![c] = \"idle\"]\n              /\\ UNCHANGED ledger\n```\n\nRequeue 讓 M 淨加 1（佇列 +2、忙碌 −1）：量尺壞了，DAG 長出環。具體的殺手是這條 behavior——\n\n```text\n             Fetch(c1, m1)\n┌─────────────┐      ┌─────────────┐\n│ s0：m1 在 Q │─────▶│ s1：m1 在 c1│      σ_loop ≜ s0 → s1 → s0 → s1 → …\n│ ledger 全 F │◀─────│ ledger 全 F │      （c2 全程閒置，m2 全程在佇列）\n└─────────────┘      └─────────────┘\n             Requeue(c1)\n```\n\nσ_loop 永遠在取與放之間鬼打牆，ledger 全程 FALSE。現在逐條 fairness 過堂：\n\n| fairness 條款 | σ_loop 的下場 | AllPaid |\n|---|---|---|\n| （無） | 活得好好的——連 σ_idle 都活著 | 不成立 |\n| WF_vars(Next) | **活著**。σ_loop 每一步都是貨真價實的 Next 步，後件 □◇⟨Next⟩_vars 直接成立，WF 滿分通過——它只要求「有在動」，沒要求「動對方向」 | 不成立 |\n| 再加 WF_vars(Settle(c1)) | **還是活著**。ENABLED ⟨Settle(c1)⟩_vars 在 s1 為真、在 s0 為假，無限閃爍；前件 ◇□ENABLED 永不成立，WF **空洞地滿足**——這就是「該用 SF 卻用了 WF」的教科書現場 | 不成立 |\n| 改加 SF_vars(Settle(c1)) | **死了**。前件 □◇ENABLED 成立（每個 s1 都 enabled），SF 要求 ⟨Settle(c1)⟩_vars 步發生無限多次，σ_loop 一次都沒有——出局 | 這隻反例被殺掉（完整論證見紙上推演題 3） |\n\n三行教訓：\n\n1. **對 Next 整體的 fairness 在有環的世界裡幾乎不值錢**——「忙碌」與「進展」是兩回事，你的 pipeline 卡單時 CPU 也很忙。\n2. **WF 會空洞地滿足**。enabledness 一閃爍，◇□ 的前件就永遠湊不齊，WF 變成一紙從不觸發的保單。最毒的是它「成立」——你檢查 fairness 條款本身不會發現任何異常，要檢查的是 liveness 結論。\n3. **SF 是對的工具，但它是更貴的假設**。SF_vars(Settle(c)) 翻譯回現實是：「不管 c 被打斷多少次，只要它無限多次回到可入帳的狀態，入帳終究發生。」誰兌現這句話？K8s 的 restart 策略加上 SQS 的 redelivery，再加上「程式不會每次都在同一行 crash」的賭注。寫下 SF 的那一刻，你是在替這整組機制簽名背書。\n\n還有一個容易漏的細節：SF_vars(Settle(c)) **單獨**也不夠——它管「拿了會結」，不管「有人去拿」。σ_idle（從頭躺平）讓 Settle 永遠不 enabled，SF 空洞滿足，AllPaid 照死。所以 v0＋Requeue 的世界裡，誠實的組合是 **WF_vars(Next) ∧ ∀ c ∈ Consumers : SF_vars(Settle(c))**：前者保證系統不擺爛，後者保證忙碌終會轉成進展。fairness 要蓋住「好事」的整條動作鏈，缺一環，鏈就斷在那一環。\n\n### 決策框架：不加、WF、還是 SF\n\n| 問自己 | 答案指向 |\n|---|---|\n| 我主張的性質是 safety 還是 liveness？ | 純 safety → **完全不加 fairness** 是最誠實的寫法（fairness 只會砍 behavior，所有 safety 結論原封不動，但多寫就是多欠解釋） |\n| 這個動作一旦 enabled，會被**別的動作**關掉嗎？ | 不會（只有它自己做了才消失）→ WF 夠 |\n| 會被關掉，但可行性會反覆回來（redelivery、restart、重試）嗎？ | 會、且我需要它終究發生 → SF |\n| 這條 fairness 對應哪個**現實機制**？ | OS 調度器、K8s restart、SQS redelivery……指認不出來＝你寫的是願望，不是假設——刪掉它，看主張還站不站得住 |\n\n## Worked example：四條白話性質的完整旅程\n\n把本章的工具串成一條流水線，對結算系統 v0 走完整趟：**白話 → 分類（拿「有限前綴反駁得了嗎」過刀）→ 時序公式 → 標 fairness**。四條性質一條一條來，不跳步。\n\n**W1：「同一 msgId 至多入帳一次。」**\n\n- 分類測試：違反它＝某一刻出現「已入帳的訊息又回到佇列或手上」（ch06 的狀態層改寫）。那一刻就是犯罪現場，有限前綴定罪 ⇒ **safety**。\n- 公式：□NoDoublePay（NoDoublePay 是 ch06 的狀態述語，□ 把它升格成對整條 behavior 的主張——「invariant」的正式形狀就是 □ 套狀態述語）。\n- fairness：**不需要**。safety 的成立與調度無關；v0 的證明 ch05 已經給了，一個 fairness 的字都沒用到。\n\n**W2：「每則訊息終會入帳。」**\n\n- 分類測試：看到第 10⁶ 步還沒入帳，能定罪嗎？不能——「再等等」永遠合法 ⇒ **liveness**。\n- 公式：**AllPaid ≜ ∀ m ∈ Msgs : ◇ledger[m]**。\n- fairness：v0 配 **WF_vars(Next)** 就夠（上節定理，靠的是 v0 地形是 DAG）；一旦有 Requeue／crash／redelivery 這類「回頭路」動作，升級成 WF_vars(Next) ∧ ∀ c : SF_vars(Settle(c))（上節攻防）。\n\n**W3：「被拿走的訊息，不會爛在 consumer 手裡。」**\n\n- 分類測試：c1 拿著 m1 十萬步沒入帳——還是不能定罪 ⇒ **liveness**。\n- 公式：∀ c ∈ Consumers : ∀ m ∈ Msgs : (working[c] = m) ⤳ ledger[m]。注意 ⤳ 自帶的 □：**每一次**被拿起都要兌現，不是僥倖一次。\n- fairness：v0 下 FairSpec 同樣足夠（⟨1⟩2–⟨1⟩5 的凍結點是全入帳狀態，途中任何「拿著」終究匯入那裡）。\n- 跟 W2 的差別值得咀嚼：W3 的承諾只蓋「**曾被拿起**的訊息」。一條訊息從頭到尾沒人理——W3 對它前件為假，**空洞成立**（ch03 的老朋友），W2 才抓得到它。兩條都要寫，恰恰因為它們在「沒人拿」這個劇本上一個有牙齒、一個沒有。\n\n**W4：「結算季終將收工：佇列清空、全員下工，而且從此保持。」**\n\n- 分類測試：「還沒收工」永遠反駁不了「終將收工」⇒ **liveness**。\n- 公式：◇□(queue = {} ∧ ∀ c ∈ Consumers : working[c] = \"idle\")。◇□ 的形狀——不只到達，還要**穩定**：到達後不再有任何訊息冒出來、沒有 consumer 又拿起東西。\n- fairness：WF_vars(Next)（v0 的凍結論證 ⟨1⟩2–⟨1⟩4 給的正是這個終態）。\n- 加碼觀察：W4 ∧ □(恰好一處) ⇒ W2——收工狀態裡訊息無處可去，只能在帳本。性質之間有蘊涵結構，挑對「主性質」可以讓其他主張搭便車；但反向不成立（W2 不保證**穩定**收工），所以 W4 不是冗餘。\n\n收進一張表（這張表的格式，是你之後對任何系統做性質盤點的範本）：\n\n| # | 白話 | 分類 | 時序公式 | fairness |\n|---|---|---|---|---|\n| W1 | 同一 msgId 至多入帳一次 | safety | □NoDoublePay | 不需要 |\n| W2 | 每則訊息終會入帳 | liveness | AllPaid ≜ ∀ m ∈ Msgs : ◇ledger[m] | WF_vars(Next)（v0）；有重投遞時加 ∀ c : SF_vars(Settle(c)) |\n| W3 | 拿起的訊息不爛在手裡 | liveness | ∀ c, m : (working[c] = m) ⤳ ledger[m] | 同 W2 |\n| W4 | 終將收工且保持收工 | liveness | ◇□(queue = {} ∧ ∀ c : working[c] = \"idle\") | WF_vars(Next)（v0） |\n\n## 陷阱與防禦\n\n時序邏輯的坑有個共同氣味：**公式照樣全綠，承諾卻是空的**。每一條照本書的固定問法：它怎麼給你假安全感、你怎麼發現。\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 以為 □[Next]_vars 自帶進度 | 寫完 spec 覺得「訊息會入帳」已經在裡面；σ_idle 是免費反例，你卻從沒把 liveness 寫下來檢查，信仰一路綠燈 | 每條 liveness 主張白紙黑字寫成公式，旁邊註明「靠哪條 fairness」；註不出來，先去找 σ_idle 形的反例 |\n| fairness 掛錯動作 | 給 Fetch 配了 WF、好事卻由 Settle 產生：訊息全被勤奮地拿走，沒有一則入帳，主張照死 | 從「好事」反推動作鏈（取→結），鏈上**每一環**都要有 fairness 蓋住；斷一環，鏈就斷在那 |\n| 該 SF 用了 WF | enabledness 被 Requeue／crash／搶鎖反覆關掉，◇□ENABLED 永不成立，WF 空洞滿足——條款本身看不出任何異常 | 問「誰能關掉這個動作的 enabled、會反覆關嗎」；列得出兇手就考慮 SF。檢查的單位是 liveness 結論，不是 fairness 條款 |\n| 用過強的 fairness 藏設計缺陷 | 給「維運救場」「TM 復活」之類的動作掛上 SF，liveness 全綠——你不是證明了系統會好，是把結論當假設買進來了（ch11 的 2PC blocking 會正面撞上這題） | 每條 fairness 指認一個現實機制；指認不出來就刪掉重推，看主張還站不站得住。fairness 是**假設**，不是**機制** |\n| □◇ 與 ◇□ 弄反 | 想說「終將穩定」寫成「反覆發生」：flapping 的服務滿足 □◇healthy，你以為它收斂了 | 念白話測試句：□◇＝「永遠還會再來」、◇□＝「從此不再離開」；記住 ◇□ ⇒ □◇ 而反向不成立 |\n| 拿有限觀察「反駁」liveness | 「等了一小時還沒消費」就回報 liveness 違反——有限前綴反駁不了 liveness，這在定義層就是範疇錯誤 | 分清楚：告警是工程啟發式（很好，繼續用）；要讓「一小時」成為可反駁的主張，得把時鐘建進模型、把性質改寫成 safety——那是另一份 spec |\n\n## 紙上推演\n\n### 題 1：公式 ⇄ 白話互翻（[15 分鐘] ★）\n\n對結算系統 v0，先把 (a)–(c) 翻成時序公式並分類 safety/liveness，再把 (d)–(f) 翻成白話並分類。\n\n(a) 「佇列一旦空了，就永遠空著。」\n(b) 「m2 入帳的前提是 m1 已經入帳。」（業務要求的順序）\n(c) 「系統會反覆回到全員閒置的狀態。」\n(d) ◇□ledger[m1]\n(e) (working[c1] ≠ \"idle\") ⤳ (working[c1] = \"idle\")\n(f) □◇(queue = {}) 與 ◇□(queue = {})——這兩條在 v0 等價嗎？在一般系統呢？\n\n### 推演解答\n\n(a) □(queue = {} ⇒ □(queue = {}))。**safety**：違反＝某一刻空了、後來又冒出東西，那一步就是現場。（v0 沒有動作往 queue 放東西，所以它成立；加了 Requeue 就不成立——性質的真假永遠是相對於 spec 的。）\n\n(b) □(ledger[m2] ⇒ ledger[m1])。**safety**：第一個「m2 已入帳而 m1 還沒」的狀態就是現場。注意這條在 v0 **不成立**——ch02 題 2 的 P3 就是它，反例兩步可達。寫得出來≠成立，分類與驗證是兩道工序。\n\n(c) □◇(∀ c ∈ Consumers : working[c] = \"idle\")。**liveness**：任何前綴都能補一個全員放下的未來。\n\n(d) 「終將有一刻起，m1 永遠保持已入帳。」**liveness**。在 v0 裡它與 ◇ledger[m1] 等價——因為沒有任何動作把 ledger 翻回 FALSE（帳本單調）。但這個等價是**模型的**性質，不是邏輯的：在「帳可以被沖正」的系統裡，◇P 與 ◇□P 差一整個世界。寫性質時想清楚你要哪一個。\n\n(e) 「c1 不會永遠拿著訊息不放——每次拿起，終將放下。」**liveness**，⤳ 形。順帶：在 v0 放下的唯一途徑是 Settle，所以它幾乎是 W3 的影子；加了 Requeue 之後「放下」多了一條路，這條性質就比 W3 弱了——同樣的白話，模型一變，公式的份量就變。\n\n(f) □◇＝「佇列反覆見底」（允許又被填滿）；◇□＝「佇列終將永遠見底」。一般而言 ◇□ 嚴格強於 □◇（flapping 的佇列滿足 □◇ 而不滿足 ◇□）。在 v0 裡兩者等價：queue 只減不增（Fetch 拿走、沒人放回），見底一次就永遠見底。又一次：等價靠的是模型的單調性，不是算子。\n\n### 題 2：對給定 behavior 判定 □◇ 與 ◇□（[15 分鐘] ★★）\n\n令 d 為佇列深度。三條無限 behavior：\n\n- σ_A：d = 1, 0, 1, 0, 1, 0, …（producer 與 consumer 永遠拉鋸）\n- σ_B：d = 1, 0, 1, 0, 0, 0, 0, …（拉鋸兩輪後永遠歸零）\n- σ_C：d = 1, 1, 1, 1, …（永遠卡著一筆）\n\n對每條 behavior 判定：(i) □◇(d = 0)；(ii) ◇□(d = 0)；(iii) (d = 1) ⤳ (d = 0)。\n\n### 推演解答\n\n| | (i) □◇(d=0) | (ii) ◇□(d=0) | (iii) (d=1) ⤳ (d=0) |\n|---|---|---|---|\n| σ_A | ✓ 0 無限多次出現 | ✗ 沒有任何位置之後「永遠是 0」——1 永遠還會回來 | ✓ 每個 d=1 的位置，下一步就是 0 |\n| σ_B | ✓ 尾巴全是 0 | ✓ 從第 4 個位置起永遠 0 | ✓ 前兩個 1 各自等到了 0；之後再無 1，⤳ 對空前件免費成立 |\n| σ_C | ✗ 0 從未出現 | ✗ 同左 | ✗ 位置 0 的 d=1 之後 0 永不出現——¬(P ⤳ Q) ≡ ◇(P ∧ □¬Q) 的見證就是整條尾巴 |\n\n兩個檢查點：σ_A 是「◇□ ⇒ □◇ 的反向不成立」的標準見證；σ_C 的 (iii) 提醒你 liveness 反例是**無限**的——你必須對整條尾巴論證「0 永不出現」，指著任何有限段都不夠。這就是 ch09 之前你該有的體感：liveness 反例 trace 一定帶一個循環記號（「之後永遠重複這段」），不然它什麼都沒證明。\n\n### 題 3：哪條 fairness 救得了 AllPaid？（[25 分鐘] ★★★）\n\n迷你結算機：Msgs = {m1}、Consumers = {c1}，動作 Fetch(c1, m1)、Settle(c1)、Requeue(c1)（定義同本章）。狀態只有三個：\n\n- A ≜ ⟨queue = {m1}, working = (c1 ↦ \"idle\"), ledger = (m1 ↦ F)⟩\n- B ≜ ⟨queue = {}, working = (c1 ↦ m1), ledger = (m1 ↦ F)⟩\n- C ≜ ⟨queue = {}, working = (c1 ↦ \"idle\"), ledger = (m1 ↦ T)⟩\n\n邊：A →Fetch→ B；B →Settle→ C；B →Requeue→ A。對下面五種配置，逐一判定 Spec ∧（該配置）⇒ AllPaid 是否成立；不成立的給出反例 behavior，成立的給出論證。\n\n(1) 無 fairness；(2) WF_vars(Next)；(3) WF_vars(Settle(c1))（單獨）；(4) SF_vars(Settle(c1))（單獨）；(5) WF_vars(Next) ∧ SF_vars(Settle(c1))。\n\n### 推演解答\n\n**(1) 不成立。** 反例 σ_idle：A 之後永遠 stuttering。\n\n**(2) 不成立。** 反例 σ_loop：A → B → A → B → …。每步都是真 Next 步，□◇⟨Next⟩_vars 成立，WF_vars(Next) 滿足；ledger 永遠 F。WF(Next) 殺得掉 σ_idle（A 上 Next 持續 enabled、卻永不發生——違反），但殺不掉「忙而無功」。\n\n**(3) 不成立，雙重死法。** 反例一還是 σ_idle：Settle 在 A 永不 enabled，WF 前件假、空洞滿足，而又沒有任何條款逼系統離開 A。反例二是 σ_loop：ENABLED ⟨Settle(c1)⟩ 在 B 真、A 假，反覆閃爍，◇□ 前件不成立，WF 又一次空洞滿足。教訓：fairness 掛在最後一環、卻沒人保證前面的環會動，照樣全盤皆輸。\n\n**(4) 不成立。** σ_idle 又活了：Settle 從未 enabled，□◇ENABLED 為假，SF 空洞滿足。SF 比 WF 強，但「強」只強在閃爍的場景；對「從頭躺平」兩者一樣無力。\n\n**(5) 成立。** 論證（這個三狀態機小到可以走完全程）：\n\n⟨1⟩1. 設 σ 滿足 Spec ∧ WF_vars(Next) ∧ SF_vars(Settle(c1))，反設 ledger 永遠 F——即 σ 永遠在 {A, B} 內。\n⟨1⟩2. σ 含無限多個真步。理由：A、B 上 Next 都 enabled（A 有 Fetch、B 有 Settle 與 Requeue）；若從某刻起全 stuttering，⟨Next⟩_vars 持續 enabled 卻不再發生，違反 WF_vars(Next)。\n⟨1⟩3. 在 {A, B} 內的無限真步只能是 A ⇄ B 永遠往返（A 的真步只有去 B，B 不去 C 的真步只有回 A），所以 B 出現無限多次。\n⟨1⟩4. 於是 ENABLED ⟨Settle(c1)⟩_vars 無限多次成立，SF_vars(Settle(c1)) 要求 Settle 真步發生無限多次——但 σ 連一次都沒有（發生即離開 {A, B}，與 ⟨1⟩1 矛盾）。\n⟨1⟩5. Q.E.D. 反設不成立，◇ledger[m1] 對每條這樣的 σ 成立。∎\n\n注意 ⟨1⟩4 的句式：SF 不是「終將做一次」，是「無限多次 enabled ⇒ 無限多次做」——這裡用「一次都沒有」打出矛盾，剛剛好。也注意整個論證對 Requeue 發生幾次毫無假設：crash-restart 一百萬次也好，SF 保證入帳終究插隊成功。這就是「SF ≈ 反覆 crash-restart 也終會消費」的數學內容。\n\n### 題 4：既是 safety 又是 liveness 的性質只有一條（[15 分鐘] ★★★）\n\n證明：若性質 P 同時是 safety 與 liveness，則 P 恆真（每條 behavior 都滿足它）。提示：對任意 behavior 的任意有限前綴，先用 liveness、再用 safety。\n\n### 推演解答\n\n⟨1⟩1. 任取 behavior σ，任取它的有限前綴 s。\n⟨1⟩2. 由 liveness 定義，s 可延伸成某條滿足 P 的 behavior σ′。\n⟨1⟩3. 由 safety 定義套在 σ′（「滿足 ⟺ 每個前綴滿足」的左到右）：σ′ 的每個有限前綴都滿足 P；s 是 σ′ 的前綴，故 s ⊨ P。\n⟨1⟩4. s 是任取的，所以 σ 的**每個**有限前綴都滿足 P；再由 safety 定義套在 σ（右到左）：σ ⊨ P。\n⟨1⟩5. Q.E.D. σ 任取，P 對所有 behavior 為真。∎\n\n兩個回味。其一，safety 的定義在 ⟨1⟩3 與 ⟨1⟩4 各用了一個方向——這條「⟺」不是裝飾。其二，這個定理是分解定理的暗面：safety 與 liveness 的交集只剩恆真，所以「拆成兩半」拆得乾淨、不重疊；Alpern–Schneider 的原始論文用拓撲語言講同一件事（safety 是閉集、liveness 是稠密集），有興趣見延伸閱讀。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. safety 與 liveness 的正式定義各是什麼？「90 秒內必回應」為什麼是 safety 而不是 liveness？這對監控告警意味著什麼？\n2. □◇P 與 ◇□P 各自的白話是什麼？用一個 flapping 服務說明哪邊成立哪邊不成立；誰蘊涵誰？\n3. 為什麼 Init ∧ □[Next]_vars 形式的公式永遠只是 safety？σ_idle 在這裡扮演什麼角色？\n4. 逐字念出 WF_v(A) 與 SF_v(A) 的定義，說出唯一的差異在哪兩個字母、那兩個字母換掉了什麼意思。為什麼後件是 □◇ 而不是 ◇？\n5. 用 SQS 與 consumer 講一遍：什麼場景 WF 夠用、什麼場景非 SF 不可？「WF 空洞地滿足」具體是怎麼發生的？\n6. AllPaid 的公式是什麼？v0 為什麼配 WF_vars(Next) 就夠？加了 Requeue 之後這個選擇怎麼崩、換成什麼？\n7. 為什麼說 fairness 是「假設」而不是「機制」？拿到一條 SF，你會問它什麼問題才簽收？\n8. ⟨A⟩_v 與 [A]_v 的定義差在哪？fairness 的定義為什麼必須用 ⟨ ⟩ 那一半？\n\n## 延伸閱讀\n\n- **Leslie Lamport, “Safety, Liveness, and Fairness”（2019-05-26 講義）**：`https://lamport.azurewebsites.net/tla/safety-liveness.pdf`。本章 safety/liveness 定義與 WF/SF 等價讀法的直接出處，短短 8 頁；第 4 節列了 WF 的五種等價說法，把它們讀到「顯然等價」是最好的自測。（2026-06 開頁核對）\n- **Specifying Systems 第 8 章 “Liveness and Fairness”**（Lamport, 2002）：免費 PDF 見 `https://lamport.azurewebsites.net/tla/book.html`。WF/SF 的教科書版，含本章沒展開的「fairness 條款的合取怎麼仍是 fairness」等細節。（2026-06 查證頁面與免費 PDF）\n- **Bowen Alpern & Fred B. Schneider, “Defining Liveness”**, *Information Processing Letters* 21(4):181–185, 1985。liveness 正式定義與「任何性質＝safety ∧ liveness」分解定理的原始出處；正文不到五頁，拓撲味比本書直覺版重（他們的 safety 定義與本章版本在 stuttering 不敏感性質上等價——Lamport 上面那份講義有說明）。期刊原文在付費牆內，先讀 Lamport 的轉述也夠用。\n- **Hillel Wayne, “Weak and Strong Fairness”**：`https://www.hillelwayne.com/post/fairness/`。用一個 succeed/fail/retry 的 worker 把「WF 救不了反覆失敗、SF 可以」演了一遍，與本章 Requeue 攻防互為印證。（2026-06 開頁核對）\n- **learntla.com 的 “Temporal Properties” 一章**（Hillel Wayne）：`https://learntla.com/core/temporal-logic.html`。□、◇、⤳ 與 fairness 在工具使用者視角的長相（PlusCal 用 `fair`／`fair+` 標 WF／SF）；本書不動鍵盤，但看一眼「這些東西在 spec 檔裡長怎樣」對 ch08 有幫助。（2026-06 開頁核對）\n"}, {"id": "ch08-complete-specs", "file": "ch08-complete-specs.md", "group": "Part III — TLA+ 與時序邏輯", "title": "ch08 — 完整的 spec：從 DieHard 到結算系統 v1", "md": "# ch08 — 完整的 spec：從 DieHard 到結算系統 v1\n\n> **本章解決什麼問題**：ch06 給了你動作與 Init ∧ □[Next]_vars，ch07 補上時序性質與 fairness——但你目前看到的都是去掉包裝的邏輯本體。本章補上包裝：一份完整的 .tla 檔由哪些固定部位組成、各部位回答什麼問題，讓你拿到任何一份沒看過的中小型 spec 都知道從哪讀起。然後做兩件事：精讀 Lamport 的 DieHard，學會「把目標寫成 invariant 的否定、讓反例變成解」這記招式；再把結算系統升級到 v1——讓 crash 與 redelivery 真正進場、用 dedup 表守住 `NoDoublePay`。v1 是後面三章的地基：ch09 算它的狀態空間、ch14 證它、ch15 拿它做 refinement。\n\n## 從你已知的出發\n\n打開一個陌生的 repo，你不會從第一行讀到最後一行。你有一套固定的尋路順序：先看 `package.json` 知道它叫什麼、依賴什麼；看環境變數與設定檔知道有哪些可調參數；看 entities 或 schema 知道狀態長什麼樣；看 handlers 知道系統會做哪些事；最後看測試與文件，知道作者「主張」這個系統保證什麼。順序爛熟於心，所以再陌生的專案你都有地圖。\n\n一份完整的 TLA+ spec 也有這樣的固定部位，而且少得多——十個左右，一頁就放得下。本章第一件事就是把這張地圖立起來：MODULE 是名字、EXTENDS 是依賴、CONSTANTS ＋ ASSUME 是設定檔與設定檢查、VARIABLES ＋ TypeOK 是 schema、Init/Next/Spec 是行為本體、THEOREM 是作者的主張清單。之後你讀任何 spec——包括 Part IV 那四個經典協議——都用同一套尋路順序。\n\n第二件事是精讀一份麻雀雖小五臟俱全的真 spec：DieHard。它把一道你大概在白板面試見過的題目——用 3 加侖與 5 加侖兩個沒有刻度的水壺量出恰好 4 加侖——寫成狀態機，然後耍了一記漂亮的招式：把「量出 4 加侖」這個**目標**寫成一條 invariant 的**否定**，讓模型檢查器去「打破」它；打破的那條反例 trace，就是解題步驟。你做過幾乎一樣的事：想確認某個壞狀態到底能不能發生，你不是盯著程式碼想，而是想辦法**逼它重現**——重現的步驟一旦到手，問題就從玄學變成工單。\n\n第三件事回到你的主場。v0 的結算系統活在童話裡：consumer 不會掛、入帳與確認黏成原子的一步。你的真實世界不是這樣——SQS 是 at-least-once，consumer 會在任何一行程式碼之間被 OOM kill，而你之所以睡得著，是因為入帳交易裡有那張 idempotency key 表。本章把這三樣現實——crash、redelivery、dedup 表——正式寫進 spec。v1 大概三十行，但它就是你維護過的那條 pipeline 的骨架。\n\n## spec 解剖學：一份 .tla 檔的固定部位\n\n把一份典型的完整 spec 從上往下拆開：\n\n| 部位 | 回答什麼問題 | 後端對應物 |\n|---|---|---|\n| `---- MODULE Name ----` | 這份 spec 叫什麼（模組名必須與檔名一致） | repo 名 |\n| `EXTENDS` | 用到哪些標準模組的算子 | import 依賴 |\n| `CONSTANTS` | 哪些參數先declare、不寫死 | 環境變數／設定檔 |\n| `ASSUME` | 參數必須滿足什麼，違反就拒絕開工 | 設定檔的 schema validation |\n| `VARIABLES` | 狀態由哪些變數組成 | DB schema 的表名 |\n| `TypeOK` | 每個變數的值域 | 欄位型別＋約束 |\n| `Init` | 合法的起點 | seed／初始 migration |\n| 各具名 action 與 `Next` | 系統允許哪些步 | handlers |\n| `Spec ≜ Init ∧ □[Next]_vars` | 整個系統的一條公式 | 入口點 |\n| `THEOREM` | 作者主張這個 spec 滿足什麼 | 文件裡的保證、SLA 條款 |\n\n幾個部位值得多說兩句。\n\n**EXTENDS**。TLA+ 的世界觀是一切皆集合（見 ch04），徹底到連自然數的算術都不是語言內建——`+`、`−`、`..` 這些算子住在標準模組 `Naturals` 裡，要用就得 `EXTENDS Naturals`。忘了寫，spec 裡的 `big + small` 直接是未定義符號。\n\n**CONSTANTS 與 ASSUME**。ch06 的 v0 把 `Msgs` 與 `Consumers` 寫死成兩個具體集合，那是教學上的偷懶。正規做法是宣告成 CONSTANTS——spec 對「任何」訊息集合與 consumer 集合成立，具體代入哪組值是檢查模型時才決定的事（ch09 會看到 TLC 怎麼吃這些參數；本書紙上代入即可）。而參數一旦開放，就得立規矩：ASSUME 寫下常數必須滿足的條件，學 learntla 的說法，它在模型開跑之前就先檢查。這是你寫了無數次的「啟動時驗 config」：與其讓一個空的 consumer 集合讓所有性質空洞地成立（ch03 的 vacuous truth），不如在門口擋下。\n\n**模組裝飾**。模組內偶爾出現一整行 `-----`，那是純視覺的分隔線，沒有語意；檔案最後一行 `====`，之後的內容一律被忽略——有些人拿那個區域當筆記本。\n\n**THEOREM**。這是最容易被誤會的部位：`THEOREM Spec => []Inv` 只是把作者的**主張**記錄在案，寫下它不會讓任何事情變成真的。TLC 可以在有限參數下檢查它（ch09）、TLAPS 可以逼你交出證明（ch16），但 THEOREM 這行字本身只是立了一張字據。讀 spec 時它的價值是導航：作者自己最在乎的性質是哪幾條，一目瞭然。\n\n## TypeOK：為什麼它幾乎總是第一個 invariant\n\nTLA+ 是**無型別**的語言。`VARIABLES queue, working, ledger` 只宣告了名字；沒有任何地方強迫 queue 是集合、ledger 是函數。型別不是宣告出來的，是你**主張**出來的——主張的慣用形式，就是一條叫 TypeOK 的狀態述語（慣例名，不是關鍵字）：每個變數的值落在預期的集合裡。\n\n它幾乎總是 spec 的第一個 invariant，理由有四層：\n\n1. **它是 schema 文件。** 讀陌生 spec 的第一站永遠是 TypeOK——先知道每個變數裝什麼形狀的值，再去讀動作，就像先看 schema 再讀查詢。DieHard 的原文註解把這件事說得很直白：型別不變量「不是規格的一部分，但放進來幾乎總是好主意，因為它幫讀者理解 spec」。\n2. **它是最便宜的煙霧偵測器。** ch06 題 1 解答裡那條錯路——手滑用了 primed 變數、把字串 `\"idle\"` 塞進佇列——逐行盯動作不一定看得出來，但 TypeOK 的 `queue ⊆ Msgs` 一步現形。DieHard 原文接著說：讓 TLC 檢查它，抓到的錯誤正是「有型別的語言裡由 type checking 抓的那類」。\n3. **後面的推理全靠它墊底。** ch14 的歸納不變量幾乎總是 TypeOK ∧ 其他條款的形狀——歸納步要推「ledger[m] + 1 還是數字」「queue ∖ {m} 還是 Msgs 的子集」，沒有 TypeOK 連這些最低限度的話都說不出口。\n4. **它自己也是要驗的。** TypeOK 是 invariant，不是公理：它必須被檢查（ch09）或被證明（ch14），而且通常它本身就 inductive——這讓它成為練習 ch05 三個義務的最佳起手式。\n\n一個現在就要立的紀律，後面 v1 會再回來敲打：**TypeOK 只准寫「值的形狀」，不准寫「動作規則掙來的秩序」**。把 ledger 的值域寫成 0..1，等於把 `NoDoublePay` 走私進型別——這條線怎麼分、踩過界會發生什麼，陷阱表見。\n\n## DieHard 精讀：把救命題交給檢查器\n\n材料來自 GitHub 的 tlaplus/Examples repo（原文連結見延伸閱讀；以下引用皆為 ASCII 原文，2026-06 對照）。spec 開頭的註解先把問題與企圖講完：電影《終極警探 3》（原文稱 Die Hard 3）裡，主角必須用一個 5 加侖壺、一個 3 加侖壺和一個水龍頭量出恰好 4 加侖的水。原文的下一句是整份 spec 的靈魂：「Our goal: to get TLC to solve the problem for us.」——目標不是驗證，是**讓檢查器替我們解題**。\n\n從頭讀起。模組頭、依賴、變數：\n\n```tla\n------------------------------ MODULE DieHard -------------------------------\nEXTENDS Naturals\n\nVARIABLES big,   \\* The number of gallons of water in the 5 gallon jug.\n          small  \\* The number of gallons of water in the 3 gallon jug.\n```\n\n`\\*` 是行註解。兩個變數：big 是 5 加侖壺裡的水量、small 是 3 加侖壺的。接著就是 TypeOK——你的尋路順序第一站：\n\n```tla\nTypeOK == /\\ small \\in 0..3\n          /\\ big   \\in 0..5\n```\n\n值域一出來，型別空間就可以心算：4 × 6 ＝ 24 種賦值組合。待會手畫狀態空間時拿它對帳。初始狀態：兩壺皆空。\n\n```tla\nInit == /\\ big = 0\n        /\\ small = 0\n```\n\n動作分三類：從水龍頭灌滿一壺、把一壺倒光、一壺倒進另一壺。前兩類共四個動作：\n\n```tla\nFillSmallJug  == /\\ small' = 3\n                 /\\ big' = big\n\nFillBigJug    == /\\ big' = 5\n                 /\\ small' = small\n\nEmptySmallJug == /\\ small' = 0\n                 /\\ big' = big\n\nEmptyBigJug   == /\\ big' = 0\n                 /\\ small' = small\n```\n\n注意兩件事。其一，**這些動作沒有 guard**——任何狀態下都 enabled。灌滿一個已滿的壺？合法，只是什麼都沒變：那一步的前後狀態相同，既滿足 FillSmallJug、也同時是 stuttering 步（[Next]_vars 的兩個 disjunct 本來就不互斥，ch06 的細節在這裡有了實例）。在狀態圖上這類步是自環，BFS 會自動忽略它們。其二，每個動作對兩個變數都交代了——這份 spec 不用 UNCHANGED，直接寫 `big' = big`，效果相同。\n\n倒水的動作是全 spec 最漂亮的三行。先定義輔助算子 Min，然後：\n\n```tla\nMin(m,n) == IF m < n THEN m ELSE n\n\nSmallToBig == /\\ big'   = Min(big + small, 5)\n              /\\ small' = small - (big' - big)\n\nBigToSmall == /\\ small' = Min(big + small, 3)\n              /\\ big'   = big - (small' - small)\n```\n\n原文註解交代了建模決策：壺**沒有刻度**，所以倒水只有兩種有意義的結局——把目標壺倒滿，或把來源壺倒空。SmallToBig 的第一行說「big 的新值＝兩壺總量與 5 取小」；第二行說「small 把實際倒出去的量（big′ − big）扣掉」。看清楚第二行：**它在等式右邊引用了 big′**——另一個變數的新值。這在程式裡是先後順序問題，在這裡不是：合取沒有順序，兩條等式是同時成立的約束，求解的是「滿足這組方程的前後狀態對」（ch06「方程式不是賦值」的最佳實例）。順手驗一下守恆：兩條等式相加，small′ + big′ = small + big——水不會憑空增減，模型自己保證。\n\n收尾三件套：\n\n```tla\nNext ==  \\/ FillSmallJug\n         \\/ FillBigJug\n         \\/ EmptySmallJug\n         \\/ EmptyBigJug\n         \\/ SmallToBig\n         \\/ BigToSmall\n\nSpec == Init /\\ [][Next]_<<big, small>>\n```\n\n六個動作的析取、一條你已經會逐字念的公式（見 ch06）。然後是那記招式。spec 在分隔線之後定義：\n\n```tla\nNotSolved == big # 4\n```\n\n「未解」：big 不等於 4。原文註解把玩法說破：把 NotSolved 當作 invariant 交給 TLC 檢查。如果它真的是 invariant——所有可達狀態 big 都不是 4——那這道題**無解**。如果不是，TLC 會「失敗」，並印出一條以 big = 4 的狀態收尾的反例 trace——而那條 trace 就是解題步驟。原文最後一句話是 ch09 的預告：「Because TLC uses a breadth-first search, it will find the shortest solution.」BFS 找到的反例是最短的，所以你拿到的不只是解，是**最短解**。\n\n把這招提煉出來：**反例是中性的機器產物，好壞由 invariant 的立場決定。**寫 `NoDoublePay` 時你站在 invariant 那邊，反例＝事故報告；寫 NotSolved 時你故意站在反面，反例＝攻略。同一台機器，兩種用法。你在生產環境其實兩種都做過：前者是「證明這個壞狀態到不了」，後者是「給我一條重現路徑」。\n\n還有一個方向上的細節，誤會的人很多：這招回答的是**可能性**（存在一條路走到 big = 4），不是**必然性**（所有行為終將走到）。□[Next]_vars 是允許清單，從不承諾英雄真的會照著走——他們大可以把兩個壺灌滿倒掉灌滿倒掉直到炸彈倒數歸零。「終將解出」是 liveness，要 fairness 才有（見 ch07）。幸好電影只需要存在一條路，而且他們找到了。\n\n## 全狀態空間手畫＋手找最短解（worked example）\n\n機器怎麼解是 ch09 的事；本章先用手把 TLC 的工作完整做一遍。狀態記作 (small, big)，從 (0, 0) 出發做廣度優先窮舉：每層把所有新狀態的六個動作逐一算出落點，落點若是沒見過的狀態就編進下一層。\n\n**第 0 層**：(0,0)。六個動作算一輪：FillSmallJug → (3,0) 新；FillBigJug → (0,5) 新；EmptySmallJug、EmptyBigJug、SmallToBig、BigToSmall 全是自環（兩壺皆空，倒無可倒）。\n\n**第 1 層**：(3,0)、(0,5)。\n- (3,0)：FillBigJug → (3,5) 新；SmallToBig → big′ = Min(3, 5) = 3、small′ = 3 − 3 = 0，即 (0,3) 新；EmptySmallJug → (0,0) 舊；其餘自環。\n- (0,5)：FillSmallJug → (3,5) 已列；BigToSmall → small′ = Min(5, 3) = 3、big′ = 5 − 3 = 2，即 (3,2) 新；EmptyBigJug → (0,0) 舊；其餘自環。\n\n**第 2 層**：(3,5)、(0,3)、(3,2)。\n- (3,5)：四個非自環動作的落點 (0,5)、(3,0) 全是舊面孔，沒有新貨。\n- (0,3)：FillSmallJug → (3,3) 新；BigToSmall → small′ = Min(3, 3) = 3、big′ = 0，即 (3,0) 舊；FillBigJug → (0,5) 舊；EmptyBigJug → (0,0) 舊。\n- (3,2)：EmptySmallJug → (0,2) 新；SmallToBig → big′ = Min(5, 5) = 5、small′ = 3 − 3 = 0，即 (0,5) 舊；FillBigJug → (3,5) 舊；EmptyBigJug → (3,0) 舊。\n\n**第 3 層**：(3,3)、(0,2)。\n- (3,3)：SmallToBig → big′ = Min(6, 5) = 5、small′ = 3 − 2 = 1，即 (1,5) 新；其餘落點皆舊。\n- (0,2)：BigToSmall → small′ = Min(2, 3) = 2、big′ = 0，即 (2,0) 新；FillSmallJug → (3,2) 舊；其餘舊。\n\n**第 4 層**：(1,5)、(2,0)。\n- (1,5)：EmptyBigJug → (1,0) 新；BigToSmall → small′ = Min(6, 3) = 3、big′ = 5 − 2 = 3，即 (3,3) 舊；其餘舊。\n- (2,0)：FillBigJug → (2,5) 新；SmallToBig → (0,2) 舊；其餘舊。\n\n**第 5 層**：(1,0)、(2,5)。\n- (1,0)：SmallToBig → big′ = Min(1, 5) = 1、small′ = 0，即 (0,1) 新；其餘舊。\n- (2,5)：**BigToSmall → small′ = Min(7, 3) = 3、big′ = 5 − (3 − 2) = 4，即 (3,4) 新——big = 4，目標出現在第 6 層。**EmptyBigJug → (2,0) 舊；其餘舊。\n\nTLC 做到這裡就會停：NotSolved 被打破，印 trace。我們為了畫完整張地圖，繼續：\n\n**第 6 層**：(0,1)、(3,4)。(0,1) 給出 FillSmallJug → (3,1) 新；(3,4) 給出 EmptySmallJug → (0,4) 新（以及 SmallToBig → (2,5) 舊）。\n\n**第 7 層**：(3,1)、(0,4)。兩者的所有落點——(3,5)、(0,1)、(3,0)、(0,4)、(3,4)、(0,5)、(0,0)、(3,1)——全是舊面孔。**沒有第 8 層，窮舉收斂。**\n\n可達狀態共 **16 個**。畫成地圖（Lk ＝ BFS 第 k 層首次發現）：\n\n```text\n          big=0   big=1   big=2   big=3   big=4   big=5\n         +-------+-------+-------+-------+-------+-------+\n small=0 |  L0 * |  L6   |  L3   |  L2   |  L7 ! |  L1   |\n small=1 |  L5   |   x   |   x   |   x   |   x   |  L4   |\n small=2 |  L4   |   x   |   x   |   x   |   x   |  L5   |\n small=3 |  L1   |  L7   |  L2   |  L3   |  L6 ! |  L2   |\n         +-------+-------+-------+-------+-------+-------+\n```\n\n（* ＝初始狀態；! ＝ big = 4 的目標狀態；x ＝型別空間內、不可達。）\n\n封閉性檢查照 ch02 的紀律做：對 16 個狀態逐一列出六個動作的落點，確認全部落回清單內（「＝」表示自環）：\n\n| (small, big) | 層 | FillS | FillB | EmptyS | EmptyB | SmallToBig | BigToSmall |\n|---|---|---|---|---|---|---|---|\n| (0,0) | L0 | (3,0) | (0,5) | ＝ | ＝ | ＝ | ＝ |\n| (3,0) | L1 | ＝ | (3,5) | (0,0) | ＝ | (0,3) | ＝ |\n| (0,5) | L1 | (3,5) | ＝ | ＝ | (0,0) | ＝ | (3,2) |\n| (3,5) | L2 | ＝ | ＝ | (0,5) | (3,0) | ＝ | ＝ |\n| (0,3) | L2 | (3,3) | (0,5) | ＝ | (0,0) | ＝ | (3,0) |\n| (3,2) | L2 | ＝ | (3,5) | (0,2) | (3,0) | (0,5) | ＝ |\n| (3,3) | L3 | ＝ | (3,5) | (0,3) | (3,0) | (1,5) | ＝ |\n| (0,2) | L3 | (3,2) | (0,5) | ＝ | (0,0) | ＝ | (2,0) |\n| (1,5) | L4 | (3,5) | ＝ | (0,5) | (1,0) | ＝ | (3,3) |\n| (2,0) | L4 | (3,0) | (2,5) | (0,0) | ＝ | (0,2) | ＝ |\n| (1,0) | L5 | (3,0) | (1,5) | (0,0) | ＝ | (0,1) | ＝ |\n| (2,5) | L5 | (3,5) | ＝ | (0,5) | (2,0) | ＝ | **(3,4)** |\n| (0,1) | L6 | (3,1) | (0,5) | ＝ | (0,0) | ＝ | (1,0) |\n| (3,4) | L6 | ＝ | (3,5) | (0,4) | (3,0) | (2,5) | ＝ |\n| (3,1) | L7 | ＝ | (3,5) | (0,1) | (3,0) | (0,4) | ＝ |\n| (0,4) | L7 | (3,4) | (0,5) | ＝ | (0,0) | ＝ | (3,1) |\n\n96 個落點全數命中清單，封閉 ✓。16 就是全部。\n\n**型別空間 24、可達 16，缺的 8 格為什麼恰好是那 8 格？**看 x 的分布：{1, 2} × {1, 2, 3, 4}——兩壺都「不空也不滿」的組合，一個都到不了。理由可以從動作直接讀出來：六個動作每一個結束時**至少有一壺處在校準點**（空或滿）——灌滿與倒光自不必說，倒水則「不是把目標倒滿、就是把來源倒空」。沒有刻度的壺，只有靠空與滿這兩個校準點丈量世界；「small ∈ {0, 3} ∨ big ∈ {0, 5}」就是這台狀態機掙來的秩序，一條你現在有能力證的 inductive invariant（見 ch05 的三個義務；這裡不展開）。\n\n**手找最短解。**big = 4 的可達狀態有兩個：(3,4) 在第 6 層、(0,4) 在第 7 層——所以最短解是 6 步，終點 (3,4)。路徑從發現過程倒著讀回去：(3,4) 由 (2,5) 的 BigToSmall 而來、(2,5) 由 (2,0) 的 FillBigJug 而來……一路回溯到 (0,0)。逐步驗算：\n\n| 步 | 動作 | 驗算 | 落點 (small, big) |\n|---|---|---|---|\n| 0 | — | Init：兩壺皆空 | (0, 0) |\n| 1 | FillBigJug | big′ = 5，small 不動 | (0, 5) |\n| 2 | BigToSmall | small′ = Min(5, 3) = 3；big′ = 5 − (3 − 0) = 2 | (3, 2) |\n| 3 | EmptySmallJug | small′ = 0，big 不動 | (0, 2) |\n| 4 | BigToSmall | small′ = Min(2, 3) = 2；big′ = 2 − (2 − 0) = 0 | (2, 0) |\n| 5 | FillBigJug | big′ = 5，small 不動 | (2, 5) |\n| 6 | BigToSmall | small′ = Min(7, 3) = 3；big′ = 5 − (3 − 2) = **4** | (3, 4) |\n\n第 6 步之後 NotSolved 為假——這條 trace 就是 TLC 會交給你的「錯誤」，也是電影主角的活命步驟。\n\n加碼一個 BFS 才給得起的結論：**這條最短解是唯一的。**從邊表逐層回推前驅——指向 (3,4) 的只有 (2,5)（L5）與 (0,4)（L7），最短路只能經 (2,5)；指向 (2,5) 的只有 (2,0)（L4）與 (3,4)；指向 (2,0) 的只有 (0,2)（L3）與 (2,5)；指向 (0,2) 的只有 (3,2)（L2）與 (2,0)；指向 (3,2) 的只有 (0,5)（L1）與 (0,2)；而 (0,5) 在第 0 層的前驅只有 (0,0)。每一層的選擇都是被迫的：六步解不只最短，還是唯一的六步解。\n\n## PlusCal：你只需要讀得懂\n\n讀真實世界的 spec，你遲早會撞見另一種長相：`.tla` 檔的註解區塊裡躺著一段像 Pascal 或 C 的程式，下面跟著一段機器生成的 TLA+。那是 **PlusCal**——一種寫在註解裡的演算法語言，由翻譯器轉成 TLA+ 之後才能餵給工具。先把本書的立場說死：**你不需要會寫 PlusCal，只需要看到它不慌**。理由是本書 Part IV 要精讀的經典 spec（TwoPhase、Paxos、raft.tla）都以原生 TLA+ 寫成，力氣花在刀口上。但工業界用它用得很兇——AWS 那篇 CACM 2015 論文的 Table 1 裡，S3 容錯網路演算法的 spec 是 804 行 PlusCal，作者之一 Fan Zhang 的自述是她寫 PlusCal 比寫 TLA+ 更有生產力（2015 時點，見 ch17）——所以「讀得懂」有實際價值。\n\nPlusCal 有兩種等價語法：P-syntax（類 Pascal，`begin…end`）與 C-syntax（大括號），Lamport 為兩種各寫了一本使用手冊（連結見延伸閱讀，2026-06 查證有效）。同一個語言、兩層皮，讀哪種都一樣。下面用 P-syntax 給你唯一需要的對照例——一個單 consumer 的迷你結算迴圈：\n\n```tla\n(* --algorithm settle_one\nvariables queue = {\"m1\", \"m2\"},\n          done  = {},\n          cur   = \"idle\";\nbegin\nLoop:\n  while queue # {} do\n    Fetch:\n      with m \\in queue do\n        queue := queue \\ {m};\n        cur := m;\n      end with;\n    Credit:\n      done := done \\union {cur};\n      cur := \"idle\";\n  end while;\nend algorithm *)\n```\n\n整段住在 `(* … *)` 註解裡；`:=` 是賦值、`while` 是迴圈、`with m \\in queue` 是「從佇列裡挑一個」——讀起來就是程式。關鍵是那三個帶冒號的標籤 `Loop:`、`Fetch:`、`Credit:`。**標籤是原子性的立法**：同一個標籤底下的所有語句在一步之內同時發生，步與步的切換只發生在標籤邊界。learntla 的說法一針見血：「Labels represent everything that can happen in a single step of the system.」\n\n翻譯器把它轉成的 TLA+ 大致如下（節錄重排；實際輸出的排版與輔助定義依版本而異）：\n\n```tla\nVARIABLES queue, done, cur, pc\n\nvars == <<queue, done, cur, pc>>\n\nInit == /\\ queue = {\"m1\", \"m2\"}\n        /\\ done = {}\n        /\\ cur = \"idle\"\n        /\\ pc = \"Loop\"\n\nLoop == /\\ pc = \"Loop\"\n        /\\ IF queue # {} THEN pc' = \"Fetch\" ELSE pc' = \"Done\"\n        /\\ UNCHANGED <<queue, done, cur>>\n\nFetch == /\\ pc = \"Fetch\"\n         /\\ \\E m \\in queue : /\\ queue' = queue \\ {m}\n                             /\\ cur' = m\n         /\\ pc' = \"Credit\"\n         /\\ done' = done\n\nCredit == /\\ pc = \"Credit\"\n          /\\ done' = done \\union {cur}\n          /\\ cur' = \"idle\"\n          /\\ pc' = \"Loop\"\n          /\\ queue' = queue\n\nNext == Loop \\/ Fetch \\/ Credit\n          \\/ (pc = \"Done\" /\\ UNCHANGED vars)\n\nSpec == Init /\\ [][Next]_vars\n```\n\n讀懂這份翻譯需要三個觀察，之後在野外遇到任何 PlusCal 生成物都通用：\n\n1. **pc 變數**。ch02 說過：程式計數器沒有特殊地位，要的話自己宣告成變數——這就是了。pc 記錄「執行到哪個標籤」，值域是標籤名加上終態 `\"Done\"`。控制流被物化成資料，於是「程式」徹底變回狀態機。\n2. **一個標籤＝一個 action**。每個動作的第一個合取是 `pc = \"標籤名\"`（guard），最後一個合取把 pc′ 設成下一個標籤——順序執行被編譯成狀態轉移。`with` 變成了 ∃：非決定性的選擇，跟你在 ch06 看到的同一句型。\n3. **末尾的免責 disjunct**。`pc = \"Done\" ∧ UNCHANGED vars` 允許終止後原地踏步——翻譯器的慣例，讓「做完了」不被誤判成卡死。\n\n現在回頭看標籤的份量。Fetch 與 Credit 是兩個標籤，所以「取走訊息」與「記帳」之間**存在一條步的縫**——如果有第二個 process，它可以插隊；如果有 crash，它可以發生在縫裡。把兩段合併進同一個標籤，縫就消失，世界回到 v0 的童話。**標籤切太粗，race 就在 spec 裡不存在**——這是 PlusCal 最大的陷阱：原子性的立法藏在標籤位置這種不起眼的地方，而你 review 的眼睛習慣性略過它。下一節在原生 TLA+ 裡做的事——把 Settle 拆成兩個動作——本質上就是「把一個標籤拆成兩個」。\n\n## 結算系統 v1：讓故障進場\n\n債務清單先攤開。ch02 說 v0「不會 crash、不會重送」是童話，並承諾 v1 還債；ch05 證完 `NoDoublePay` 之後點名了兩個欠著的原子性假設；ch06 寫 v0 spec 時把 Fetch 與 Settle 之間標成「ch08 的施工點」。現在施工。\n\n**v0 在哪裡說謊。**你的 consumer 真實程式碼是兩步：先在一筆 DB 交易裡入帳（連同寫入 idempotency key），交易 commit 之後才呼叫 DeleteMessage 把訊息從佇列刪掉。v0 的 `Settle(c)` 把這兩步黏成原子的一步——於是「入帳成功之後、刪訊息之前 crash」這個 double-pay 的經典開局，在 v0 裡**連寫都寫不出來**。模型表達不出的失敗，性質的成立就有一半是盲區（ch02 的老話）。\n\n**所以 v1 的第一刀：把 Settle 拆成 Credit 與 Ack。**設計理由有三條，每條都站得住：\n\n1. **現實對應**：Credit ＝ 那筆 DB 交易（入帳＋寫 dedup key，原子 commit）；Ack ＝ DeleteMessage。你的程式碼本來就是這兩步，v0 才是說謊的那個。\n2. **方法論**：要讓危險的 crash 存在於模型，crash 必須有縫可鑽——縫只能用「拆成兩個動作」造出來。拆完之後，dedup 表才有真正的工作可做；不拆，它就是擺設。\n3. **ch15 的伏筆**：在抽象的 exactly-once 規格眼裡，v1 的兩步只有一步「算數」、另一步會映成 stuttering——ch06 你接受的 stuttering 條款，就是在等這種時刻（一句話預告，正戲在 ch15）。\n\n**第二刀：讓 crash 進場。**`Crash(c)`：手上有訊息的 consumer 隨時可能死掉，它手上的訊息回到佇列（佇列服務沒等到 ack，visibility timeout 到期後重新投遞——v1 把「crash、超時、重投遞」壓成一步，這筆抽象帳下一節算）。閒著的 consumer 也會 crash，但對這三個變數毫無影響——那種步是 stuttering，spec 不必列（允許清單只列觀察得到的事，ch06）。\n\n**第三刀：dedup 表。**新變數 `dedup`：已入帳訊息的 id 集合——你那張 idempotency key 表的數學形狀。防線位置是個真實的設計決策：guard 放在 **Credit**，不放在 Fetch。理由跟你生產環境一模一樣：佇列照常投遞重複訊息（那不歸你管），冪等檢查活在 consumer 的入帳交易裡；而且若擋在 Fetch，已入帳的重複訊息將永遠無人領取、佇列永不清空——現實中你也必須先 receive 才能 delete。於是 Ack 自然長出第二種劇本：手上的訊息已在 dedup 裡（不論是自己剛入的帳、還是別人入過的），直接確認丟棄。**正常完成與重複丟棄共用同一個 Ack**——你的 idempotent consumer 正是這樣寫的。\n\n最後一個必須誠實交代的變更：**ledger 的型別從布林演進成計數**。ch05 已經把問題挑明：布林帳本上「再入帳一次」只是把 TRUE 蓋寫成 TRUE，狀態上看不出差別——在 v0 那是個可以接受的簡化，在 v1 卻會讓 double-pay 變成**不可觀察**的事件，整章白忙。所以 v1 的 ledger[m] 記「m 被入帳的次數」，`NoDoublePay` 終於可以用它的本意陳述：每則訊息至多入帳一次。變數名、動作名、哨兵值全部沿用 v0（queue、working、ledger、Fetch、`\"idle\"`），這不是潔癖：ch09、ch14、ch15 都要在這份 spec 上施工，命名漂移會讓三章的對帳全部斷裂。\n\n完整模組如下——這也是你在本書看到的第一份「解剖學十個部位齊全」的 spec：\n\n```tla\n---------------------------- MODULE SettlementV1 ----------------------------\nEXTENDS Naturals\n\nCONSTANTS Msgs, Consumers\n\nASSUME /\\ Msgs # {}\n       /\\ Consumers # {}\n       /\\ \"idle\" \\notin Msgs\n\nVARIABLES queue, working, ledger, dedup\n\nvars == <<queue, working, ledger, dedup>>\n\nTypeOK == /\\ queue \\subseteq Msgs\n          /\\ working \\in [Consumers -> Msgs \\cup {\"idle\"}]\n          /\\ ledger \\in [Msgs -> Nat]\n          /\\ dedup \\subseteq Msgs\n\nInit == /\\ queue = Msgs\n        /\\ working = [c \\in Consumers |-> \"idle\"]\n        /\\ ledger = [m \\in Msgs |-> 0]\n        /\\ dedup = {}\n\nFetch(c, m) == /\\ working[c] = \"idle\"\n               /\\ m \\in queue\n               /\\ queue' = queue \\ {m}\n               /\\ working' = [working EXCEPT ![c] = m]\n               /\\ UNCHANGED <<ledger, dedup>>\n\nCredit(c) == /\\ working[c] # \"idle\"\n             /\\ working[c] \\notin dedup\n             /\\ ledger' = [ledger EXCEPT ![working[c]] = @ + 1]\n             /\\ dedup' = dedup \\cup {working[c]}\n             /\\ UNCHANGED <<queue, working>>\n\nAck(c) == /\\ working[c] # \"idle\"\n          /\\ working[c] \\in dedup\n          /\\ working' = [working EXCEPT ![c] = \"idle\"]\n          /\\ UNCHANGED <<queue, ledger, dedup>>\n\nCrash(c) == /\\ working[c] # \"idle\"\n            /\\ queue' = queue \\cup {working[c]}\n            /\\ working' = [working EXCEPT ![c] = \"idle\"]\n            /\\ UNCHANGED <<ledger, dedup>>\n\nNext == \\E c \\in Consumers : \\/ \\E m \\in Msgs : Fetch(c, m)\n                             \\/ Credit(c)\n                             \\/ Ack(c)\n                             \\/ Crash(c)\n\nSpec == Init /\\ [][Next]_vars\n\nNoDoublePay == \\A m \\in Msgs : ledger[m] <= 1\n\nTHEOREM Spec => []TypeOK\nTHEOREM Spec => []NoDoublePay\n==============================================================================\n```\n\n逐部位讀，新東西優先：\n\n- **CONSTANTS ＋ ASSUME**：參數開放了；三條 ASSUME 各有名目——兩個非空條件擋掉 vacuous 的世界，`\"idle\" ∉ Msgs` 擋的是**哨兵撞名**：若有訊息恰好叫 `\"idle\"`，`working[c] # \"idle\"` 這類 guard 全面歧義，整份 spec 安靜地壞掉。基準配置（ch02 起沿用）是代入 Msgs = {\"m1\", \"m2\"}、Consumers = {\"c1\", \"c2\"}。\n- **TypeOK**：注意 `ledger ∈ [Msgs -> Nat]`——值域是整個 Nat，不是 0..1。型別空間因此是無限的，但可達空間有限；「有限」不是型別的功勞，是 dedup 守出來的秩序（ch09 拿這句話當主場）。為什麼不直接寫 0..1？陷阱表算帳。\n- **Fetch**：與 ch06 的 v0 一字不差（多一行 UNCHANGED dedup）。\n- **Credit**：兩個 guard——手上有訊息、且該訊息不在 dedup 裡；效果是 ledger 對應格加一、dedup 收編該訊息，**同一步完成**。`@` 是 EXCEPT 句型裡「舊值」的縮寫：`[ledger EXCEPT ![working[c]] = @ + 1]` 讀作「ledger 只有 working[c] 那格改成舊值加一」。dedup 寫入與入帳的原子性對應你的「同一筆 DB 交易」——這個假設極度承重，下一節單獨算帳。\n- **Ack**：guard 是手上的訊息**已在** dedup 裡。對照 Credit 的 guard，兩者恰好互補：手持訊息的 consumer，要嘛還沒入帳（走 Credit）、要嘛已入帳（走 Ack），不會卡死。也注意 Ack 擋掉了「沒入帳就確認」——那是把 at-least-once 做成 at-most-once 的掉件事故，v1 把它立法為不可能（consumer 程式碼是我們寫的，這條法我們立得起；對比 Crash 的 guard 就不行，見下）。\n- **Crash**：guard 只有 `working[c] # \"idle\"`——**它不准引用 ledger 或 dedup**。crash 的「執行者」是死神加佇列服務，它們看不到你的 DB；guard 只能用執行者觀察得到的資訊，這是寫故障動作的鐵律（違反它會發生什麼，紙上推演題 4 領教）。\n- **THEOREM ×2**：作者主張。TLC 在基準參數下可以檢查（ch09）；真正的證明欠到 ch14——先說結論免得你懸著：`NoDoublePay` 成立，關鍵是 dedup 只進不出、而 Credit 的 guard 拿它當門票。\n\n每則訊息的一生，畫成圖（Q ＝在佇列；H0 ＝被某 consumer 手持、尚未入帳；H1 ＝被手持、已入帳；OUT ＝已確認、徹底離開系統）：\n\n```text\n        Fetch(c, m)        Credit(c)         Ack(c)\n   Q ---------------> H0 -------------> H1 ------------> OUT\n   ^                  |                 |\n   |     Crash(c)     |                 |\n   +------------------+                 |\n   ^              Crash(c)              |\n   +------------------------------------+\n```\n\n左邊的 Crash 迴圈無害：沒入帳的訊息回佇列重來，頂多多繞幾圈。**右邊那條邊是整章的主角**：已入帳的訊息回到佇列。走過這條邊之後再次被 Fetch，會直接落在 H1（dedup 認得它），唯一的出路是 Ack 丟棄。把這條危險路徑完整追一遍（基準配置，只追 m1；working 縮寫成 (c1 的值, c2 的值)，ledger 縮寫成 (m1 的值, m2 的值)）：\n\n| 狀態 | 動作 | queue | working | ledger | dedup |\n|---|---|---|---|---|---|\n| s₀ | — | {m1, m2} | (idle, idle) | (0, 0) | {} |\n| s₁ | Fetch(c1, m1) | {m2} | (m1, idle) | (0, 0) | {} |\n| s₂ | Credit(c1) | {m2} | (m1, idle) | (1, 0) | {m1} |\n| s₃ | **Crash(c1)** | {m1, m2} | (idle, idle) | (1, 0) | {m1} |\n| s₄ | Fetch(c2, m1) | {m2} | (idle, m1) | (1, 0) | {m1} |\n| s₅ | Ack(c2) | {m2} | (idle, idle) | (1, 0) | {m1} |\n\ns₂ → s₃ 就是任務書上的那行字：**crash 發生在入帳之後、確認之前**——m1 帶著「已入帳」的事實回到佇列。s₄ 站在懸崖邊：c2 手持 m1，若它能 Credit，ledger[m1] 就變 2。驗 guard：working[c2] = m1 ∈ dedup —— **Credit(c2) 不 enabled**，唯一能走的是 Ack(c2)。dedup 表在這一步擋下了 double pay；s₅ 之後 m1 徹底離開系統，m2 的人生照常進行。\n\n反事實對照，一刀見血：把 Credit 的第二個 guard `working[c] \\notin dedup` 刪掉（叫它 BadCredit 的 v1 變體），上表走到 s₄ 後 Credit(c2) enabled，走一步——ledger[m1] = 2，`NoDoublePay` 陣亡。這條路徑就是一條如假包換的反例 trace（讀法訓練在 ch09——TLC 實際印出的那條未必是它）。同一條路徑，在 DieHard 那邊反例是攻略、在這邊反例是事故報告——你現在兩種立場都站過了。\n\n順帶記下兩個此刻就看得出來的事實，留給後面章節收割。其一：v0 版的 `NoDoublePay` 寫法（已入帳 ⇒ 不在佇列、不在任何手上）在 v1 是**假的**——s₃ 就是反例（ledger[m1] = 1 且 m1 ∈ queue）。這不是性質壞了，是系統真的變了：v1 的世界裡「已入帳的訊息暫時還在系統裡晃」是合法日常，我們守的從來就不是「它消失」，而是「它不再被入帳」。性質的寫法必須跟著系統的誠實度演進。其二：v1 沒有任何 fairness 條款，所以「每則訊息終將入帳」（`AllPaid`，見 ch07）不成立——Fetch–Crash 鬼打牆到天荒地老是合法行為。v1 刻意只承諾 safety；liveness 的帳本書在 ch07 已經教你怎麼記。\n\n## v1 抽象掉了哪些現實\n\n照 ch02 立的規矩，每筆省略白紙黑字記帳：\n\n| 被抽象掉的現實 | 模型裡的長相 | 後果與還債 |\n|---|---|---|\n| crash → 超時 → 重投遞是三件隔著時間的事 | Crash 一步完成「死亡＋訊息回佇列」 | 問不了任何 timeout 調校問題；本書不建模時間，不還 |\n| cr
