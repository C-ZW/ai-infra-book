ash 後 consumer 有 down time | crash 完立刻能接新訊息（K8s 自動重啟的極限簡化） | consumer 池固定不縮，狀態空間因此小很多；不還 |\n| 活著的 consumer 處理太慢、visibility timeout 到期重投遞 | 不存在——訊息要回佇列只有 crash 一途，且任何時刻每則訊息在系統裡至多一份 | 「兩個 consumer 同時手持同一訊息」的劇本不在 v1 裡。緩解：`NoDoublePay` 的防線只靠 dedup 的單調性與 Credit 的 guard，不依賴「至多一份」——把慢消費者加回來，防線設計不必動（ch14 的證明骨架也是）。要建模它得把佇列換成 bag（ch04 吵過的帳） |\n| dedup 檢查、寫 key、入帳是一筆 DB 交易 | Credit 一步原子完成三件事 | **全 spec 最承重的假設**。現實裡若先查再寫、不在同一交易，ch01 的 race 原樣回歸。這個假設對應你程式裡的唯一鍵＋交易，模型只是把你的設計決定寫成數學；哪天你的實作改用「先 SELECT 再 INSERT」，這份 spec 對你的系統就**失效** |\n| dedup 表會被 TTL／歸檔清理 | dedup 只進不出 | 現實的事故形狀：TTL 短於最大重投遞窗口，老訊息復活時 key 已被清掉。模型裡 Msgs 有限、表永存免費；生產環境這是一條真實的值班教訓 |\n| 佇列服務本身會丟訊息、會自行複製訊息 | 佇列忠實保管，重投遞只由 Crash 觸發 | 佇列服務的正確性是別人的定理；我們 ASSUME 它。要驗它，得寫它自己的 spec |\n| 金額、訊息內容、順序、毒訊息／DLQ | 不存在 | 同 ch02 的帳，不再贅述 |\n\n讀這張表的正確姿勢不是「模型好假」，而是 ch02 教的那句：模型是針對特定問題的證詞。v1 的問題是「at-least-once 之下 dedup 擋不擋得住 double pay」——對這個問題，上表每一筆省略都不傷證詞效力，**除了**第四筆：Credit 的原子性不是簡化，是**前提**。你的系統若不滿足它，v1 證得再漂亮都與你無關。這就是 Murphy 原則的形式化版在 spec 層的長相：寫 spec 逼你把「我的安全感建立在哪個假設上」一個字一個字寫出來。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| TypeOK 走私定理 | 把 ledger 的值域寫成 0..1——`NoDoublePay` 被塞進「型別」，TLC 檢查 TypeOK 等於檢查性質，你以為它天生成立、從此沒人證它 | TypeOK 只寫宣告層面的值形狀；凡是要靠動作規則才守得住的範圍，都是 invariant 不是型別。自測法：這條範圍是「值的定義」還是「掙來的秩序」？後者搬出去 |\n| 常數沒立 ASSUME | Consumers 代入空集合：沒有任何動作 enabled，全部 safety 性質 vacuous 全綠；或訊息恰好叫 \"idle\"，guard 全面歧義 | 每個 CONSTANTS 配一條 ASSUME；問「最惡劣的合法代入是什麼」。空集合與哨兵撞名是兩個必問 |\n| 反招的極性搞反 | 用 DieHard 招式時，invariant 被打破是**好**消息；你習慣性看到綠燈就放心——其實綠燈＝無解（或你的 Next 漏了動作，把目標弄成不可達） | 用反招時在 spec 註解明寫立場；對每個綠燈問一句：這是「證明了安全」，還是「證明了我到不了」？ |\n| 故障動作的 guard 偷看不該看的資訊 | Crash 的 guard 引用 ledger 或 dedup（「入帳後就不會 crash」）——模型替現實讀心，危險路徑被貼心地堵死，dedup 防線從未受考驗就全綠 | 鐵律：guard 只能用該動作執行者觀察得到的資訊。佇列服務看不到你的 DB；死神誰都看得到。逐個故障動作審一遍 guard 的「視力」 |\n| PlusCal 標籤切太粗 | 現實中可被打斷的兩段操作住在同一個標籤，race 在 spec 裡不存在——v0 的原子 Settle 就是這個病的原生 TLA+ 版 | 對每個標籤（每個 action）問：現實裡這中間能不能插人、能不能 crash？能，就拆。原子性是立法，不是預設 |\n| 把「反例＝解」推成「spec 保證會解出」 | BFS 找到一條到 big = 4 的路，你說「系統會達成目標」——□[Next]_vars 從不承諾任何路被走 | 區分 ∃ behavior（可能性，反例給的）與 ∀ behavior（必然性，invariant／liveness 主張的）。「終將」二字出現就去找 fairness（見 ch07） |\n\n## 紙上推演\n\n### 題 1：BFS 地圖的剩餘價值（[10 分鐘] ★）\n\n用 worked example 的層級表與邊表回答：\n\n(a) 想在**大壺**裡量出恰好 1 加侖，最少幾步？寫出該寫給檢查器的「目標反轉」invariant 與一條最短路徑。\n\n(b) 「兩壺合計恰好 4 加侖」的可達狀態有哪些？最少幾步達成？\n\n### 推演解答\n\n(a) invariant 寫 big ≠ 1（ASCII：`big # 1`）。big = 1 的可達狀態只有 (0,1)（L6）與 (3,1)（L7），所以最少 **6 步**。回溯第 6 層的發現路徑：(0,0) →FillSmallJug→ (3,0) →SmallToBig→ (0,3) →FillSmallJug→ (3,3) →SmallToBig→ (1,5) →EmptyBigJug→ (1,0) →SmallToBig→ (0,1)。注意這條解全程沒用到 BigToSmall——跟量 4 加侖那條解恰好是「鏡像策略」（一條反覆用小壺餵大壺、一條反覆用大壺餵小壺）。\n\n(b) small + big = 4 在型別空間有四個格子：(0,4)、(1,3)、(2,2)、(3,1)。查地圖：(1,3) 與 (2,2) 落在不可達區（兩壺皆不空不滿），可達的只有 **(0,4)（L7）與 (3,1)（L7）**——最少 **7 步**。invariant 寫 `small + big # 4`。這題的弦外之音：同一句白話「量出 4 加侖」可以指 big = 4（6 步）也可以指合計 4（7 步）——目標寫成形式述語的那一刻，歧義就死了。這就是「寫 spec 的最大價值是先想清楚」的微縮版（見 ch01）。\n\n### 題 2：讀一份沒看過的 spec（[15 分鐘] ★★）\n\n不查任何資料，讀懂下面這份完整 spec 並回答四個問題：\n\n```tla\n------------------------------- MODULE Slots --------------------------------\nEXTENDS Naturals\n\nCONSTANTS N\n\nASSUME N \\in Nat \\ {0}\n\nVARIABLES free, held\n\nvars == <<free, held>>\n\nTypeOK == /\\ free \\in 0..N\n          /\\ held \\in 0..N\n\nInit == /\\ free = N\n        /\\ held = 0\n\nAcquire == /\\ free > 0\n           /\\ free' = free - 1\n           /\\ held' = held + 1\n\nRelease == /\\ held > 0\n           /\\ held' = held - 1\n           /\\ free' = free + 1\n\nNext == Acquire \\/ Release\n\nSpec == Init /\\ [][Next]_vars\n==============================================================================\n```\n\n(a) 它在建模你生產環境裡的什麼東西？(b) 把 ASSUME 拿掉、代入 N = 0 會發生什麼？哪裡最陰？(c) free + held = N 是 invariant 嗎？是 inductive 嗎（口頭走 ch05 的三個義務）？(d) 這份 Spec 保證「想 Acquire 的人終究拿得到」嗎？\n\n### 推演解答\n\n(a) 一個容量 N 的資源池——DB connection pool、semaphore、限流的 token bucket（不補充的版本）都是它。free 是池裡剩的、held 是被借走的。\n\n(b) N = 0 時 Init 給 free = held = 0，Acquire 與 Release 的 guard 雙雙永遠為假——系統只剩 stuttering。最陰的不是報錯，是**不報錯**：所有 safety 性質對這個只會原地踏步的系統全部成立，全綠。你以為驗過了池子的行為，其實驗了一座空城（ch03 的 vacuous truth、ch02 的性質空洞成立，同一隻鬼）。這就是 ASSUME 的工作：把「合法但無意義」的參數擋在門外。\n\n(c) 是，而且是 inductive。三個義務：起點——N + 0 = N ✓；封閉——Acquire 一減一加、Release 一加一減，和都不動 ✓（兩個 case 蓋住 Next）；蘊涵——目標就是自己 ✓。順帶看出 TypeOK 的上界其實是這條守恆撐住的：free ≤ N 不是型別天生，是 free + held = N ∧ held ≥ 0 的推論——但寫在 TypeOK 裡的 `free ∈ 0..N` 沒有走私，因為 0..N 確實是 free 的合理值域宣告，秩序與型別在這題剛好重疊（對照陷阱表第 1 條，分界感覺一下）。\n\n(d) 不保證。□[Next]_vars 是允許清單：free > 0 時 Acquire enabled，但 behavior 可以永遠只走 Release 或原地踏步。「等得到」是 liveness，要 fairness（見 ch07）。讀任何 spec 的最後一問永遠是：它承諾的是「不出事」還是「會發生」——這份只有前者。\n\n### 題 3：幫 PlusCal 翻譯補 TypeOK（[15 分鐘] ★★）\n\n本章 PlusCal 一節的翻譯產物（settle_one）沒有 TypeOK。補一條，四個變數都要交代；然後回答：「cur ≠ \"idle\" 時 pc 必不是 \"Loop\"」這句話該不該寫進 TypeOK？\n\n### 推演解答\n\n```tla\nTypeOK == /\\ queue \\subseteq {\"m1\", \"m2\"}\n          /\\ done \\subseteq {\"m1\", \"m2\"}\n          /\\ cur \\in {\"m1\", \"m2\", \"idle\"}\n          /\\ pc \\in {\"Loop\", \"Fetch\", \"Credit\", \"Done\"}\n```\n\n要點三個。其一，pc 的值域＝標籤集 ∪ {\"Done\"}——拿到任何 PlusCal 翻譯，pc 的型別照這個公式抄。其二，cur 的值域要記得收哨兵 \"idle\"——漏了它，TypeOK 在 Init 就破，這種「第 0 步就紅」的錯反而是好事，秒級定位。其三，`queue ⊆ S` 與 `queue ∈ SUBSET S` 是同一句話的兩種寫法（ch04 的冪集），讀 spec 兩種都會遇到。\n\n至於「cur ≠ \"idle\" 時 pc 必不是 \"Loop\"」：這句話為真（cur 只在 Fetch 後非 idle、在 Credit 末尾歸位），但它是**動作規則掙來的秩序**，不是值的形狀——寫進 TypeOK 就是陷阱表第 1 條的走私。它該去的地方是一條獨立的 invariant（而且 ch14 你會發現：證 done 相關性質時，正是這類「pc 與資料的綁定」要被強化進歸納不變量——PlusCal 翻譯物的證明幾乎總是繞著 pc 轉）。\n\n### 題 4：spec 與白話需求的不一致（[25 分鐘] ★★★）\n\n白話需求四條：\n\n1. consumer 隨時可能 crash；\n2. crash 的 consumer 手上的訊息會被佇列服務重新投遞；\n3. 同一 msgId 至多入帳一次；\n4. 已重複投遞的訊息由 consumer 端冪等處理。\n\n同事據此交出一份 v1 的變體，與本章 v1 唯一的差異是 Crash 多了一個 guard：\n\n```tla\nCrash(c) == /\\ working[c] # \"idle\"\n            /\\ working[c] \\notin dedup\n            /\\ queue' = queue \\cup {working[c]}\n            /\\ working' = [working EXCEPT ![c] = \"idle\"]\n            /\\ UNCHANGED <<ledger, dedup>>\n```\n\n他的說法：「入帳都做完了，這時候 crash 也沒什麼好建模的，加個 guard 讓模型小一點。」TLC 在基準參數下檢查 `NoDoublePay`：全綠。指出 spec 與需求的不一致、說明那個綠燈為什麼幾乎不值錢，並給出修正與自我察覺的方法。\n\n### 推演解答\n\n**不一致在需求 1**：「隨時可能 crash」被改成了「只在還沒入帳時 crash」。這個 guard 引用了 dedup——但 crash 的執行者（死神、OOM killer、preemption）看不到你的 DB，憑什麼挑時機？陷阱表第 4 條的鐵律被踩穿：guard 用了執行者觀察不到的資訊，模型在替現實讀心。\n\n**綠燈為什麼不值錢**：加了這個 guard，「入帳之後、確認之前」的 crash 不可能發生，已入帳的訊息**永遠**不會回到佇列。推下去：m ∈ queue ∧ m ∈ dedup 不可達，於是 Credit 的 dedup guard 從未真正擋下任何一步、Ack 的「重複丟棄」劇本從未上演——整條 dedup 防線在這個模型裡是**從未承壓的劇場道具**。`NoDoublePay` 確實全綠，但成立的理由是「危險被定義掉了」，不是「防線擋住了危險」。這正是 ch02 那句話的工程版：性質成立，有時只因為你的模型說不出那種失敗。哪天有人把 dedup 表的寫入弄壞，這份 spec 一聲不吭。\n\n**修正**：刪掉 `working[c] \\notin dedup` 那行，回到本章的 Crash。代價是狀態空間變大——這是誠實的價格，照付。\n\n**自我察覺**：兩個習慣。一，對每個防禦機制（這裡是 Credit 的 dedup guard）手構一條讓它「真的擋下一步」的 trace——構不出來，防線就是道具（本章 s₀…s₅ 那條 trace 就是 dedup 的承壓證明）。二，review 故障動作時逐字審 guard：每多一個 conjunct 就問「這個資訊，故障發生的那一方拿得到嗎」。故障動作的 guard 越乾淨，模型越誠實——你巴不得 crash 無條件 enabled，因為現實裡它就是。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. spec 解剖學的十個部位各回答什麼問題？拿到一份陌生的 .tla，你的前三站是哪裡、為什麼？\n2. TypeOK 為什麼幾乎總是第一個 invariant？它與 ASSUME 的分工是什麼（提示：一個管變數、一個管常數）？「ledger ∈ [Msgs → 0..1]」為什麼是走私？\n3. DieHard 的招式是什麼？為什麼 BFS 的反例自動是最短解？這招回答「可能性」還是「必然性」——差別在哪個量詞上？\n4. v0 的 Settle 為什麼必須拆成 Credit 與 Ack？crash 必須能插在哪兩步之間，double-pay 的風險才真實存在？\n5. v1 的 `NoDoublePay` 為什麼從「已入帳 ⇒ 徹底離開系統」改寫成 ledger[m] ≤ 1？v0 的舊寫法在 v1 的哪個可達狀態上陣亡？\n6. dedup 的 guard 為什麼放在 Credit 而不是 Fetch？Ack 的兩種劇本（正常完成、重複丟棄）為什麼能共用同一個動作？\n7. PlusCal 的標籤立的是什麼法？pc 變數是誰生出來的、值域怎麼讀？「標籤切太粗」對應 v0 的哪個謊言？\n8. `THEOREM Spec => []NoDoublePay` 這行字「說」了什麼、「沒說」什麼？要讓它從主張變成事實，你有哪兩條路、各在哪一章？\n\n## 延伸閱讀\n\n- **DieHard.tla 原文**：`https://github.com/tlaplus/Examples/blob/master/specifications/DieHard/DieHard.tla`——本章所有引文的出處，註解比程式碼多三倍，Lamport 式教學的標本；同目錄的 DieHarder.tla 把壺的數量與容量推廣成 CONSTANTS，讀完本章正好接得住（連結驗證於 2026-06）。\n- **TLA+ Video Course, Lecture 4 “Die Hard”**：`https://lamport.azurewebsites.net/video/videos.html`——本章精讀的影片版，Lamport 親自把這份 spec 餵給 TLC、看反例變成解；課程自述「We save the lives of two Hollywood action heroes.」（連結與講次驗證於 2026-06）。\n- **Specifying Systems**（Lamport, 2002），免費 PDF：`https://lamport.azurewebsites.net/tla/book.html`——第一部分（第 1–7 章）是 spec 結構慣例的原典；本章解剖學那張表的每一格，那裡都有 Lamport 自己的辯護。\n- **A PlusCal User's Manual**：P-syntax 版 `https://lamport.azurewebsites.net/tla/p-manual.pdf`、C-syntax 版 `https://lamport.azurewebsites.net/tla/c-manual.pdf`——讀前幾節就夠「看得懂」；兩份手冊對照翻兩頁，你就知道兩種語法真的只是換皮（連結驗證於 2026-06）。\n- **learntla.com 的 PlusCal 一章**（Hillel Wayne）：`https://learntla.com/core/pluscal.html`——標籤＝原子性這件事講得最清楚的教材；它走的是「先 PlusCal 後 TLA+」的路線，與本書相反，正好當對照組（連結驗證於 2026-06）。\n"}, {"id": "ch09-model-checking", "file": "ch09-model-checking.md", "group": "Part III — TLA+ 與時序邏輯", "title": "ch09 — 模型檢查器的原理：TLC 能與不能", "md": "# ch09 — 模型檢查器的原理：TLC 能與不能\n\n> **本章解決什麼問題**：ch08 結尾立了兩張字據——`THEOREM Spec ⇒ □TypeOK` 與 `THEOREM Spec ⇒ □NoDoublePay`——但字據不會自己變成事實。本章打開第一台查證機器：TLC。你不會安裝它（本書不動鍵盤），但你會在紙上完整理解它：顯式狀態 BFS 怎麼走、fingerprint 怎麼用 64 個 bit 記住一個狀態、為什麼反例 trace 天生最短、liveness 檢查為什麼是找循環而不是找狀態。主場範例是 ch08 的 SettlementV1——它的型別空間無限、可達空間有限，正好把「TLC 需要什麼才能窮舉」這件事攤開來算。Part IV 的四個協議章會大量出現 TLC 風格的 trace，讀 trace 的本事在本章建立；窮舉之上的「任意參數」承諾，欠到 ch14。\n\n## 從你已知的出發\n\nTLC 的每一個零件，你都用過它的工程版本。\n\n- **BFS 你會。** 爬蟲的 frontier 加 visited 集合、圖題的逐層展開——而且你不只會，你已經**手動執行過**：ch02 手畫 v0 的八個狀態、ch08 手畫 DieHard 的十六格，做的就是「從初始狀態逐層算後繼、見過的不再展開、直到沒有新貨」。TLC 的核心迴圈跟你那天做的事一字不差，只是它每秒做幾百萬次。\n- **fingerprint ≈ 雜湊去重。** visited 集合大到放不下完整狀態時怎麼辦？存雜湊。你在 dedup 表、cache key、bloom filter 裡都做過同一個決定——而 bloom filter 的假陽性（沒看過卻說看過）正是 fingerprint 碰撞的形狀，連失效模式都同款。\n- **state explosion ≈ 容量規劃的乘法。** 「每個變數的值域相乘」這套算術，你估 Redis 記憶體、估分區數、估測試矩陣時天天在做。ch04 已經把公式給你了；本章把它變成「這組參數跑不跑得動」的決策工具。\n- **反例 trace ≈ 最小重現步驟。** 一份好的 bug report 不是五十步的操作錄影，是砍到不能再砍的五步重現。TLC 交出來的反例天生就是砍好的——這不是貼心，是 BFS 的數學性質。\n\n一個約定先立好：本章所有「TLC 怎麼做」的陳述，都翻成紙上可重演的演算法；涉及工具的具體行為，以 2026-06 時點的穩定版（tla2tools v1.7.4）文件為準，不教任何操作。\n\n## TLC 的主迴圈：把你手畫圖的紀律寫成演算法\n\nTLC 是**顯式狀態（explicit-state）**模型檢查器：一個狀態一個狀態地搬——算出後繼、查 fingerprint、進佇列，直到搬完或爆炸。主迴圈用偽碼寫出來，你會發現它就是 ch02 的封閉性檢查加上一個 FIFO 佇列：\n\n```text\nqueue <- 所有滿足 Init 的狀態            (BFS 佇列, FIFO)\nseen  <- 這些狀態的 fingerprint          (去重集合)\n對每個初始狀態檢查 invariant\n\nwhile queue 非空:\n    s <- 取出佇列頭\n    for 每個動作 A (含每組參數代入):\n        for 每個使 <s, t> 滿足 A 的後繼狀態 t:\n            檢查 t 滿足 invariant; 違反 -> 回溯印出 trace, 停\n            if fp(t) 不在 seen:\n                seen  <- seen + {fp(t)}\n                queue <- queue 尾端加入 t\n全部搬完仍無違反 -> 回報狀態總數, 綠燈\n```\n\n幾個句子值得放大：\n\n**「所有滿足 Init 的狀態」**。Init 是述語不是賦值，滿足它的狀態可以不只一個（非決定性的起點）；SettlementV1 的 Init 四個變數全釘死，恰好一個。\n\n**「每個使 ⟨s, t⟩ 滿足 A 的後繼」**。s 固定，把動作當方程解出所有 t。動作裡的 ∃ m ∈ queue 在這裡變成枚舉：佇列裡每個 m 各生一個後繼。兩個此刻就能講清楚的故障模式：其一，動作若完全沒約束某個變數（ch06 陷阱表的「漏了 UNCHANGED」），t 的那一格語意上是「任何值」，TLC 不可能枚舉全宇宙，直接報錯——這就是 ch06 預告的「TLC 也會在這裡直接報錯」。其二，**檢查成員資格與枚舉集合是兩回事**：invariant 裡問 ledger[m] ∈ Nat 只是測一個值，無限集合也沒事；但動作裡寫 x′ ∈ Nat，TLC 得枚舉 Nat 才能生後繼——報錯。無限值域可以「住在」spec 裡，不能「住在」後繼生成裡。\n\n**「違反 → 回溯印出 trace」**。BFS 逐層外擴，每個狀態記著「我從誰來」；撞到壞狀態，沿前驅指標一路走回初始狀態，反著印——這條路徑的長度等於壞狀態所在的層號，也就是最短距離。下一節單獨講這件事的份量。\n\n**「全部搬完」**。佇列空了＝清單封閉＝可達空間窮舉完畢。ch02 那句「做不完就是還沒畫完」的機械版。注意這個迴圈**不需要事先知道**可達空間有限——它就是走，走得完就停，走不完就直到記憶體用罄。「會停」對 TLC 是觀察，對你是定理；這個差別在本章的 worked example 會變得非常具體。\n\n還有一個預設行為要先知道：搬到一個**沒有任何後繼**的狀態時，TLC 預設把它當錯誤回報（deadlock）。對「會做完」的系統——v0 的 S7（見 ch02）、待會 v1 的終局——這是誤報；怎麼跟真的卡死區分，陷阱表算帳。\n\n## fingerprint：用 64 個 bit 記住一個狀態\n\nseen 集合是 TLC 的記憶體瓶頸：一個狀態是四個變數的完整賦值，序列化幾十到幾百 byte；上億個狀態就是幾十 GB。TLC 的解法是**只存 fingerprint——每個狀態算一個 64-bit 雜湊**，完整狀態用過即丟（待展開的 frontier 與前驅資訊另外安排，細節不影響原理）。一個狀態 8 byte，十億個狀態 8 GB——這就是顯式狀態檢查能在工業上活下來的原因之一。\n\n代價是雜湊的原罪：**碰撞**。兩個不同的可達狀態算出同一個 fingerprint 時，後到的那個會被誤判為「看過了」——它不再被展開，**它後面的整片子圖就這樣無聲消失**。注意失效的方向：invariant 是對手上的具體狀態檢查的，所以碰撞不會讓 TLC 報假錯；它只會讓 TLC **漏看**。換句話說：紅燈永遠是真的，綠燈帶一個機率上的星號。bloom filter 的假陽性吞掉一次寫入，fingerprint 碰撞吞掉一塊狀態空間——同一個形狀，後果重一個量級。\n\n這個星號有多大？64 bit 的指紋空間有 2⁶⁴ ≈ 1.8 × 10¹⁹ 格；塞 n 個狀態，生日悖論型的量級估算是 n² ∕ 2⁶⁵：n ＝ 10⁷ 時約 3 × 10⁻⁶，n ＝ 10⁹ 時約 3%。所以小模型可以當零，大模型不行——而 TLC 自己知道：跑完會印出本次碰撞機率的估計值（2026-06 文件）。重要結果的防禦法也是現成的：**換一個指紋函數重跑**（工具備有多組可選；2026-06 文件稱 64 組）。兩次跑出的狀態總數不一致，至少有一次碰撞了；一致，則「兩次都碰撞」的機率是單次的平方——10⁻⁶ 的平方是 10⁻¹²，你的 RDS 壞得都比這個快。\n\n把工程姿態擺正：fingerprint 是一場**勝率極高、但你必須知道自己在賭**的賭局。「TLC 全綠」的完整陳述是「在這組參數下、扣除指紋碰撞的機率後，無反例」。括號裡的字平常不用念出來，寫驗證報告的那天要。\n\n## 反例＝狀態圖上的最短路徑\n\nBFS 按距離分層：第 k 層的狀態，距初始狀態恰好 k 步。所以**第一個被發現的壞狀態，必然出現在壞狀態裡離起點最近的那一層**——回溯出來的 trace 就是「最短犯罪路徑」。DieHard 那條 6 步解（見 ch08）不是 TLC 挑出來的，是 BFS 的幾何送的：第 6 層撞到 big ＝ 4，前五層查無此事，所以 6 步就是下限。\n\n對 debug 體驗來說這是天大的事，你拿 QA 的 50 步重現影片砍過步驟就懂：**短 trace ＝ 每一步都承重**。沒有繞路、沒有巧合、沒有「這三步其實無關」——你可以對著 trace 的每一步問「你為什麼被允許」，而每一問都會問到點上。ch01 那個 35 步的 DynamoDB 反例（見 ch01）之所以嚇人，正因為它是**最短的**35 步：這個 bug 不存在更短的觸發方式，人腦推演五步封頂，差距就是測試蓋不住的那片海。\n\n兩個邊界說清楚。其一，「最短」以**步數**計，不是以「現實中的機率」計——BFS 給最短，不給最常見；最短反例可能走一條模型允許、實作罕見的路（本章後面有個漂亮的實例）。其二，最短的是「TLC 交給你的那條」；同一層可能有多個壞狀態、同一個壞狀態可能有多條等長路徑，TLC 按它的枚舉順序交一條，同構的兄弟不另附。\n\n## 完整推演：SettlementV1 的帳——上界、可達空間、BFS 前三層\n\n主場開演。對象是 ch08 的 SettlementV1，基準參數 Msgs ＝ {m1, m2}、Consumers ＝ {c1, c2}；變數 queue、working、ledger、dedup；動作 Fetch、Credit、Ack、Crash，一字不改。\n\n### 上界：這次算不出來\n\n照 ch04 的算法逐個值域數：\n\n- queue ∈ 𝒫(Msgs)：2² ＝ 4；\n- working ∈ [Consumers → Msgs ∪ {idle}]：3² ＝ 9；\n- dedup ∈ 𝒫(Msgs)：2² ＝ 4；\n- ledger ∈ [Msgs → Nat]：|Nat|² ＝ **無限**。\n\n4 × 9 × 4 × ∞ ＝ ∞。對照 v0 的 48 與 144（見 ch04），v1 的型別空間直接出界——ch08 在 TypeOK 那行埋的話現在引爆：值域是整個 Nat，不是 0..1。如果當初把 ledger 宣告成 [Msgs → 0..1]，上界是 4 × 9 × 4 × 4 ＝ 576（恰好 ＝ v0 的 144 × dedup 的 4——加一個變數，乘上它的值域，ch04 的算術）；但那是把 `NoDoublePay` 走私進型別（ch08 陷阱表第 1 條），我們不幹。\n\n那 TLC 拿無限的型別空間怎麼辦？答案分兩半。檢查 TypeOK 沒問題——逐狀態問 ledger[m] ∈ Nat 是成員資格測試，不用枚舉。真正的問題是：**BFS 走的是可達空間，可達空間有限嗎？**\n\n### 每則訊息的七種人生：把可達空間算出來\n\n把 ch08 那張訊息一生圖按 dedup 戳記拆細。每則訊息在任一可達狀態的處境，由兩件事決定：**人在哪**（佇列、某個 consumer 手上、已離場）與**dedup 有沒有它的記錄**（0 ＝沒有、1 ＝有）：\n\n```text\n        Fetch           Credit            Ack\n  Q0 ──────────► H0 ───────────► H1 ───────────► OUT\n  ▲              │               │   ▲\n  │    Crash     │         Crash │   │ Fetch\n  └──────────────┘               ▼   │\n                                 Q1 ─┘\n```\n\n（Q0 ＝在佇列、無記錄；H0 ＝被手持、無記錄；H1 ＝被手持、有記錄；Q1 ＝在佇列、有記錄——ch08 六步危險路徑裡 s₃ 的 m1 就站在這格；OUT ＝已確認離場。H 格還要再記「被誰持」，c1 或 c2。）\n\n所以每則訊息的狀態共 3 ＋ 2 × 2 ＝ **7 種**：Q⁰、Q¹、OUT、c1⁰、c1¹、c2⁰、c2¹（上標是 dedup 戳記；OUT 的戳記必為 1，理由見下，故不標）。整個系統的狀態＝兩則訊息各選一種處境，唯一的耦合是**同一個 consumer 不能同時手持兩則**（Fetch 的 guard：working[c] ＝ idle）。\n\n這個「狀態＝每訊息處境的組合」宣稱，承重在三條口頭論證上，逐條交代：\n\n1. **每則訊息至多一份。** 初始在佇列恰一份；Fetch 搬運、Crash 搬回、Ack 銷毀，沒有任何動作複製——所以「人在哪」是良定義的單選題。\n2. **ledger 由戳記決定。** 動 ledger 或 dedup 的只有 Credit，而它在同一步裡「+1 ＋寫入 dedup」，guard 又要求 ∉ dedup——所以每則訊息至多被 Credit 一次，ledger[m] ∈ {0, 1} 且恰等於戳記。這正是 ch14 那條 DedupCovers 的非正式版。\n3. **OUT 必有戳記。** 離場唯一的門是 Ack，guard 是 ∈ dedup。\n\n停一拍，看清楚第 2 條的份量：**我們為了數出「可達空間有限」，先口頭證了一遍幾乎就是 `NoDoublePay` 的東西。**「v1 可以窮舉」與「v1 沒有雙重入帳」是同一股秩序——dedup 只進不出、Credit 拿它當門票（ch08 原話）。ch14 警告過的繞圈在這裡現形：用「先窮舉看看」去確認「可不可以窮舉」，邏輯上走不通；好在 TLC 不需要這個事先保證——它直接走，這個模型剛好走得完。\n\n### 數出來，雙路複核\n\n**路一：扣除法。** 7 × 7 ＝ 49 種組合，扣掉「同一 consumer 雙持」：m1、m2 同在 c1 手上（戳記各自由，2 × 2 ＝ 4 種）、同在 c2 手上（4 種）——49 − 8 ＝ **41**。\n\n**路二：按手持數分組。** 非手持的處境每訊息 3 種（Q⁰、Q¹、OUT）；手持的處境＝選 consumer × 選戳記：\n\n- 0 則被持：3 × 3 ＝ 9；\n- 1 則被持：選哪則（2）× 哪個 consumer（2）× 戳記（2）× 另一則的非手持處境（3）＝ 24；\n- 2 則被持：兩則分給兩個 consumer 的指派（2）× 兩個戳記（2 × 2）＝ 8。\n\n9 ＋ 24 ＋ 8 ＝ **41**。✓ 兩路同數。\n\n還欠一句「每種組合都真的可達」：構造性劇本跟 ch02 的同款——想要哪個快照，先讓需要戳記或離場的訊息逐一走完 Fetch–Credit（–Crash 或 –Ack），consumer 借完就還（這些段落結束時 consumer 都回到 idle）；最後再把指定的訊息擺上指定的手。兩個極端抽查：⟨Q¹, Q¹⟩——對兩則各走 Fetch–Credit–Crash，六步到位；⟨c2¹, c1¹⟩——Fetch(c2, m1)、Credit(c2)、Fetch(c1, m2)、Credit(c1)，四步到位。\n\n**可達 41，對上無限的型別上界。**如果你硬要一個有限的對照組：拿走私版上界 576 來比，可達佔 7%——其餘 93% 的「型別合法、永不發生」，全是四個動作掙來的秩序（ch02 的老話，這次有了無限版的款式）。\n\n### BFS 前三層，逐格手搖\n\n現在當一回 TLC。狀態記作 ⟨m1 的處境, m2 的處境⟩，逐層展開、標注新發現：\n\n**第 0 層**：⟨Q⁰, Q⁰⟩（Init 唯一解）。有人手持才 enabled 的 Credit／Ack／Crash 全不可走；可走的只有 Fetch，2 個 consumer × 2 則訊息＝ 4 條出邊，四個落點全新。\n\n**第 1 層（新增 4）**：⟨c1⁰, Q⁰⟩、⟨c2⁰, Q⁰⟩、⟨Q⁰, c1⁰⟩、⟨Q⁰, c2⁰⟩。逐個展開（對稱的兄弟用「同理」，這是 ch02 的合法偷懶，待會還會升級成正式的武器）：\n\n| 狀態 | 出邊 | 落點（新？） |\n|---|---|---|\n| ⟨c1⁰, Q⁰⟩ | Credit(c1) | ⟨c1¹, Q⁰⟩ **新** |\n| | Crash(c1) | ⟨Q⁰, Q⁰⟩ 舊（回到 L0） |\n| | Fetch(c2, m2) | ⟨c1⁰, c2⁰⟩ **新** |\n| | Ack(c1) 不可走：m1 ∉ dedup；Fetch(c1, ·) 不可走：c1 非 idle | — |\n| ⟨c2⁰, Q⁰⟩ | 同理 | ⟨c2¹, Q⁰⟩ **新**；⟨Q⁰, Q⁰⟩ 舊；⟨c2⁰, c1⁰⟩ **新** |\n| ⟨Q⁰, c1⁰⟩ | Credit(c1)／Crash(c1)／Fetch(c2, m1) | ⟨Q⁰, c1¹⟩ **新**；舊；⟨c2⁰, c1⁰⟩（與上格**會合**） |\n| ⟨Q⁰, c2⁰⟩ | 同理 | ⟨Q⁰, c2¹⟩ **新**；舊；⟨c1⁰, c2⁰⟩（會合） |\n\n**第 2 層（新增 6）**：⟨c1¹, Q⁰⟩、⟨c2¹, Q⁰⟩、⟨Q⁰, c1¹⟩、⟨Q⁰, c2¹⟩、⟨c1⁰, c2⁰⟩、⟨c2⁰, c1⁰⟩。注意「會合」：不同路徑撞進同一狀態，seen 集合擋下重複展開——這正是 ch01 說的「把調度的樹壓成狀態的圖」，fingerprint 在這裡上工。繼續：\n\n| 狀態 | 出邊 | 落點（新？） |\n|---|---|---|\n| ⟨c1¹, Q⁰⟩ | Ack(c1) | ⟨OUT, Q⁰⟩ **新** |\n| | Crash(c1) | ⟨Q¹, Q⁰⟩ **新**——已入帳的 m1 回到佇列，ch08 的主角路徑 |\n| | Fetch(c2, m2) | ⟨c1¹, c2⁰⟩ **新** |\n| | Credit(c1) 不可走：m1 ∈ dedup（防線在站崗） | — |\n| ⟨c2¹, Q⁰⟩ | 同理 | ⟨OUT, Q⁰⟩（會合）；⟨Q¹, Q⁰⟩（會合）；⟨c2¹, c1⁰⟩ **新** |\n| ⟨Q⁰, c1¹⟩ | 同理（對 m2） | ⟨Q⁰, OUT⟩ **新**；⟨Q⁰, Q¹⟩ **新**；⟨c2⁰, c1¹⟩ **新** |\n| ⟨Q⁰, c2¹⟩ | 同理 | （會合 ×2）；⟨c1⁰, c2¹⟩ **新** |\n| ⟨c1⁰, c2⁰⟩ | Credit(c1)／Credit(c2) | ⟨c1¹, c2⁰⟩（會合）；⟨c1⁰, c2¹⟩（會合） |\n| | Crash(c1)／Crash(c2) | ⟨Q⁰, c2⁰⟩ 舊；⟨c1⁰, Q⁰⟩ 舊。Fetch 不可走：佇列空 | — |\n| ⟨c2⁰, c1⁰⟩ | 同理 | ⟨c2¹, c1⁰⟩（會合）；⟨c2⁰, c1¹⟩（會合）；舊 ×2 |\n\n**第 3 層（新增 8）**：⟨OUT, Q⁰⟩、⟨Q¹, Q⁰⟩、⟨Q⁰, OUT⟩、⟨Q⁰, Q¹⟩、⟨c1¹, c2⁰⟩、⟨c2¹, c1⁰⟩、⟨c2⁰, c1¹⟩、⟨c1⁰, c2¹⟩。\n\n每個新狀態出現的同時，TLC 都對它驗一次 NoDoublePay——前三層 19 個狀態，ledger 全程不超過 1，無事。\n\n### 後三層與收斂\n\n接下來的展開照同一套紀律做完（你可以自己搖，對稱性會幫你省一半力氣），只報帳：\n\n- **第 4 層新增 10**：⟨OUT, c1⁰⟩、⟨OUT, c2⁰⟩、⟨Q¹, c1⁰⟩、⟨Q¹, c2⁰⟩、⟨c1⁰, OUT⟩、⟨c2⁰, OUT⟩、⟨c1⁰, Q¹⟩、⟨c2⁰, Q¹⟩、⟨c1¹, c2¹⟩、⟨c2¹, c1¹⟩；\n- **第 5 層新增 8**：⟨OUT, c1¹⟩、⟨OUT, c2¹⟩、⟨Q¹, c1¹⟩、⟨Q¹, c2¹⟩、⟨c1¹, OUT⟩、⟨c2¹, OUT⟩、⟨c1¹, Q¹⟩、⟨c2¹, Q¹⟩；\n- **第 6 層新增 4**：⟨OUT, OUT⟩、⟨OUT, Q¹⟩、⟨Q¹, OUT⟩、⟨Q¹, Q¹⟩；\n- **第 7 層零新增——窮舉收斂。**\n\n合計 1 ＋ 4 ＋ 6 ＋ 8 ＋ 10 ＋ 8 ＋ 4 ＝ **41**，與封閉式的兩路計數對上。✓\n\n層號還藏著第三條複核路。給每種處境標「最少幾步走到」：Q⁰ ＝ 0、c⁰ ＝ 1（一次 Fetch）、c¹ ＝ 2（Fetch–Credit）、Q¹ ＝ 3（Fetch–Credit–Crash）、OUT ＝ 3（Fetch–Credit–Ack）。每個動作恰推進**一則**訊息的進度至多一格，兩則訊息又能各走各的最短路互不干擾——所以**每個狀態的 BFS 層號＝兩則訊息進度之和**。拿它重算各層人數（記進度 0 的處境 1 種、進度 1 的 2 種、進度 2 的 2 種、進度 3 的 2 種，再扣同 consumer 雙持）：L2 ＝ 1×2 ＋ (2×2−2) ＋ 2×1 ＝ 6 ✓、L3 ＝ 2 ＋ 2 ＋ 2 ＋ 2 ＝ 8 ✓、L6 ＝ 2×2 ＝ 4 ✓。三路同帳，41 釘死。\n\n最後一格看仔細：⟨OUT, OUT⟩ 是全圖**唯一**沒有出邊的狀態（佇列空、兩手空、無人可 Crash）——兩季帳結清、系統功成身退。TLC 預設會把這格當 deadlock 報錯；這是誤報還是設計，陷阱表見。\n\n## State explosion：乘法的暴政，手算版\n\n41 個狀態，紙上剛好搖得完。現在看它怎麼長。把計數法推廣成通式（m 則訊息、c 個 consumer；P(c, k) ＝ c×(c−1)×…，k 個 consumer 的排列數）：\n\n可達(m, c) ＝ Σₖ C(m, k) × P(c, k) × 2ᵏ × 3^(m−k)　（k ＝ 被手持的訊息數）\n\n代幾組數，並列 v0 的可達數（見 ch02）當對照：\n\n| 配置 (m, c) | v0 可達 | v1 可達 | 倍率 |\n|---|---|---|---|\n| (2, 1) | 8 | 21 | ×2.6 |\n| (2, 2) | 14 | 41 | ×2.9 |\n| (3, 2) | 44 | 207 | ×4.7 |\n| (10, 2) | 34,304 | 3,208,329 | ×94 |\n\n兩個讀法。第一，**誠實的價格是複利**：v1 比 v0 多的不是常數倍——每則訊息的非手持處境從 2 種（Q、已入帳）變 3 種（Q⁰、Q¹、OUT）、手持處境多帶一個戳記，倍率隨 m 以指數疊上去。建模 crash 與 dedup 不是加幾個狀態，是給每一格都發一張分身卡。第二，**加誰比較貴**：從 (2, 2) 出發，加一個 consumer 得 69（×1.7），加一則訊息得 207（×5.0）。理由 ch04 就鋪好了——訊息同時住在 queue、ledger、dedup 三個值域裡，還拉胖 working 的對應域；consumer 只住在 working 裡。**每加一個變數，乘上它的值域；每加一個元素，好幾個值域同時長胖。**\n\n跨章對帳，給爆炸一個業界尺度：Lamport 的 TwoPhase 從 2 個 RM 的 56 個可達狀態，到擴充版的 72，到 6 個 RM 的 50,816（見 ch11）——參數小步走，狀態大步爆。而 (10, 2) 的三百萬狀態對 TLC 是什麼負擔？fingerprint 一個 8 byte，3.2 × 10⁶ × 8 ≈ 26 MB——筆電輕鬆。對你的紙是什麼負擔？不用算了。這就是 ch02 結尾那句「機器怎麼接手」的答案：**機器把你手搖的紀律加速了六七個數量級，但它跑的是同一個演算法，所以也死於同一種乘法**——(10, 4) 就是 1.25 × 10⁸ 個狀態、1 GB 的指紋，再往上很快就不是記憶體的問題而是天數的問題。\n\n順帶把一個懸念收掉：v1 的可達空間有限，是 dedup 掙來的；那 BadCredit（ch08 那個刪掉 Credit 第二個 guard 的變體）呢？Credit 不再被擋，同一則訊息可以無限次 +1——**可達空間無限**。但拿 NoDoublePay 去檢查它，TLC 照樣秒停：BFS 在第 3 層就撞到 ledger[m1] ＝ 2（下下節你會親眼看到這條 trace）。一句話釘住這個不對稱：**紅燈總在有限深度，綠燈需要窮舉終止。**找反例不需要空間有限；宣告無反例才需要。真正的災難組合是「可達空間無限 ＋ 你檢查的性質恰好不會破」——比如對 BadCredit 只檢查 TypeOK（它不違反）——TLC 就真的一聲不吭跑到記憶體用罄。\n\n## 緩解三招：constraint、symmetry、抽象\n\n爆炸不可消滅，只能議價。三招都講原理不講操作。\n\n**第一招：state constraint——圈一塊地，只在圈內窮舉。**給 TLC 一條狀態述語（如 ∀ m ∈ Msgs : ledger[m] ≤ 2），它照常檢查每個生成的狀態，但**不再展開**違反述語的狀態的後繼——圈外是斷崖。這是對付無限可達空間的標準手段：BadCredit 加上這條 constraint，狀態空間被斬成有限，TLC 又能給出「結論」了。但綠燈的語意從此變了：**「圈內無反例」**，不是「無反例」。兩條紀律配套：其一，圈至少比性質寬一格——驗 ledger ≤ 1 的性質，圈畫在 ≤ 2，讓「剛剛越界」的犯罪現場留在看得到的地方，而不是跟著斷崖一起消失；其二，敏感度測試——把圈放寬一格重跑，狀態總數沒長，說明圈根本沒咬到東西、綠燈接近無條件；長了，說明你真的在裁剪，結論必須帶著條件陳述出門。\n\n**第二招：symmetry——同構的狀態只算一次。**v1 的 c1 與 c2 是可互換的：把任何可達狀態裡的 c1、c2 對調，得到的還是可達狀態，走勢一模一樣（檢查三件事：Init 對稱、每個動作只透過參數 c 提到 consumer、性質 NoDoublePay 壓根不提 c）。既然如此，⟨c1⁰, Q⁰⟩ 與 ⟨c2⁰, Q⁰⟩ 何必各存一份？宣告 Consumers 為對稱集合後，TLC 把彼此置換可達的狀態收成一條**軌道（orbit）**，每軌道只存代表——41 個狀態坍成 25 條軌道（怎麼數的，紙上推演題 4）。理論上 n 個元素的對稱集合最多省 n! 倍（learntla 的說法是「約 n!」，要讀成上限——固定點會吃掉折扣，41 → 25 只有 ×1.6）。兩條鐵則：**性質必須對稱**——哪天你想問「m1 是否總比 m2 先入帳」，Msgs 就不准宣告對稱，否則 TLC 連這兩種狀態的差別都看不見；**liveness 檢查不掛 symmetry**——官方文件明言兩者並用可能漏掉真錯誤、也可能報出不存在的錯誤（2026-06），原理下節講完 liveness 你就懂：軌道坍縮會弄壞「循環」的結構。\n\n**第三招：抽象——把性質分不出來的差異，在模型裡抹掉。**NoDoublePay 只在乎 ledger[m] 是 0、1、還是 ≥ 2——那把值域從 Nat 摺成三檔，型別空間立刻有限。方向的鐵律 ch04 立過：**寧亂勿乖**。抽象模型必須涵蓋具體模型的所有行為（只准多、不准少），綠燈才能往下傳遞到具體系統；代價是可能出現「抽象走得到、具體走不到」的假反例——拿到 trace 要回具體模型重演驗收。這個「涵蓋」關係的正式名字叫 refinement（見 ch15）；而你其實從 ch02 就在用這一招——「用 2 則訊息代表 30 萬筆」本身就是一次抽象。Part IV 每份協議 spec 裡的「訊息集合而非網路」「一步原子」全是它的產物。\n\n三招的共同點：**都在拿「結論的範圍」換「計算的可行」**。砍下去之前先寫下你換掉了什麼——這句話就是本章版的抽象記帳（ch02）。\n\n## Liveness 檢查：找滿足 fairness 的壞循環\n\n到目前為止 TLC 檢查的都是 invariant——對**狀態**的判斷，BFS 逐點驗收就好。但 `AllPaid`（見 ch07）這類 liveness 性質對**整條無限 behavior**說話，沒有任何單一狀態能定它的罪（ch07：liveness 永遠可補救）。那有限的機器怎麼檢查無限的事？\n\n靠一個鴿籠觀察：**有限狀態圖上，任何無限 behavior 走到最後必然在某一撮狀態裡兜圈子。**所以 liveness 反例如果存在，必可寫成「一段有限前綴 ＋ 一個循環」——套索（lasso）形狀。於是檢查 liveness 變成圖論問題：\n\n> **liveness 檢查＝在狀態圖上找滿足 fairness 的壞循環。**\n\n逐字拆。**壞**：目標事件（如 ledger[m1] 變 1）在圈上一次都不發生——繞一輩子，好事永不來，這正是 ¬(P ⤳ Q) ≡ ◇(P ∧ □¬Q) 那條無限尾巴（見 ch07）的圖上長相。**滿足 fairness**：這個圈必須是 fairness 條款允許的擺爛方式——WF 要求「圈上持續 enabled 的動作必須真的在圈上發生過」、SF 要求「圈上反覆 enabled 的也得發生過」；過不了這關的圈不是反例，只是被 fairness 沒收的懶調度（ch07 的整套機制，在這裡變成過濾條件）。**循環**：而循環都住在強連通分量（SCC，互相可達的最大狀態團）裡——所以演算法的骨架是：建圖、找 SCC、逐一檢查每個 SCC 裡有沒有藏這種圈。TLC 的實作把狀態圖與「性質還欠什麼」的記憶疊成 behavior graph，用 Tarjan 演算法找 SCC，且隨圖成長分批執行（2026-06，對照 TLA+ Wiki 的開發者文件）；細節不必背，骨架值得背：**safety 看點，liveness 看圈。**\n\n拿 v1 演一次。給它配上 ch07 的最低限度假設 WF_vars(Next)，問 AllPaid（v1 版：∀ m ∈ Msgs : ◇(ledger[m] ＝ 1)）。TLC 會交出這種形狀的答案：\n\n```text\nState 1: <Initial predicate>        queue = {\"m1\",\"m2\"}, 全 idle, ledger 全 0\nState 2: <Fetch(c1, m1)>            c1 取走 m1\nBack to state 1: <Crash(c1)>        m1 回到佇列, 狀態與 State 1 相同 ——\n                                    循環記號: 1 -> 2 -> 1 從此永遠重播\n```\n\n`Back to state 1` 就是 ch07 預告過的循環記號——沒有它，一段有限 trace 對 liveness 什麼都證明不了。驗收這個圈：它壞（ledger[m1] 永遠 0）；它滿足 WF_vars(Next)（圈上步步都是真動作，系統沒擺爛，它只是忙得毫無進展）。所以 WF_vars(Next) 之下 AllPaid 在 v1 **不成立**——Fetch–Crash 鬼打牆是合法人生，ch08 結尾那句話現在有了機器版的證詞。要殺這個圈得加碼：Credit(c1) 在圈上只有 State 2 那一刻 enabled、State 1 又斷掉——間歇 enabled，WF 管不到，得上 SF（ch07 的 Requeue 之戰，同一個劇本）。v1 的完整 fairness 處方留給你當 ch07 方法的練習；本章只交付那個判斷力：**看到 liveness 反例，先驗它的圈滿足哪些 fairness、目標為何不發生——這兩問就是反例的全部內容。**\n\n成本也要誠實：liveness 檢查比 safety 貴得多——圖要保留邊的結構、SCC 要全圖分析，而且如上節所說，不能與 symmetry 並用（軌道坍縮後，「圈」可能是幾條真路徑的拼貼，fairness 的帳算不清——漏報與誤報都可能，官方文件因此直接勸退，2026-06）。實務慣例是 safety 用大參數、liveness 另開小模型（learntla 的建議，2026-06）。\n\n## 讀懂 TLC 的反例 trace\n\nPart IV 的協議章會大量出現 TLC 風格的 trace，這裡把讀法練起來。教材是 ch08 的 BadCredit——刪掉 Credit 那行 `working[c] \\notin dedup` 的 v1 變體。檢查 NoDoublePay，TLC 的輸出長這樣（行號為示意；函數值的寫法 `:>` 與 `@@` 是 TLC 的函數字面量——`\"m1\" :> 0 @@ \"m2\" :> 0` 讀作「m1 映到 0、m2 映到 0 的那張表」）：\n\n```text\nError: Invariant NoDoublePay is violated.\nError: The behavior up to this point is:\nState 1: <Initial predicate>\n/\\ queue = {\"m1\", \"m2\"}\n/\\ working = (\"c1\" :> \"idle\" @@ \"c2\" :> \"idle\")\n/\\ ledger = (\"m1\" :> 0 @@ \"m2\" :> 0)\n/\\ dedup = {}\n\nState 2: <Fetch line 24, col 16 to line 28, col 47 of module SettlementV1Bad>\n/\\ queue = {\"m2\"}\n/\\ working = (\"c1\" :> \"m1\" @@ \"c2\" :> \"idle\")\n/\\ ledger = (\"m1\" :> 0 @@ \"m2\" :> 0)\n/\\ dedup = {}\n\nState 3: <Credit line 30, col 15 to line 33, col 44 of module SettlementV1Bad>\n/\\ queue = {\"m2\"}\n/\\ working = (\"c1\" :> \"m1\" @@ \"c2\" :> \"idle\")\n/\\ ledger = (\"m1\" :> 1 @@ \"m2\" :> 0)\n/\\ dedup = {\"m1\"}\n\nState 4: <Credit line 30, col 15 to line 33, col 44 of module SettlementV1Bad>\n/\\ queue = {\"m2\"}\n/\\ working = (\"c1\" :> \"m1\" @@ \"c2\" :> \"idle\")\n/\\ ledger = (\"m1\" :> 2 @@ \"m2\" :> 0)\n/\\ dedup = {\"m1\"}\n```\n\n先處理你的錯愕：**這不是 ch08 那條六步危險路徑。**你心中預演的反例是 Credit–Crash–Fetch–Credit 的 crash 重投遞劇本；TLC 交回來的卻是三步——Fetch 之後，同一個 consumer **連按兩次 Credit**。回去驗 spec：Credit 的效果不動 working，所以按完一次，guard `working[c] ≠ idle` 還亮著；正版 v1 靠第二個 guard（∉ dedup）擋第二按，BadCredit 把它拆了，於是三步斃命。BFS 永遠交最短的——而最短反例暴露的洞，比你預想的劇本**更原始**：這個變體根本不需要 crash 配合就會雙重入帳。最短反例有時走「模型允許、實作罕見」的路（你的 consumer 程式碼大概不會無端重跑入帳交易）——但別急著駁回它：它指認的洞（dedup 防線失守）是真的，crash 版只是同一個洞的六步遠路。模型比實作「亂」，是 ch04 選過的方向，誤報的排查成本本來就在帳上。\n\n把剛才的動作整理成**讀 trace 五步協定**，之後每條 trace 都這樣過：\n\n1. **讀第一行**：哪條性質、哪種違反（invariant／temporal property／deadlock）——三種的讀法不同，先分類。\n2. **跳到最後一個 state**：犯罪現場。把性質逐項代入，指出破的那一項（這裡：ledger[\"m1\"] ＝ 2 ≰ 1）。\n3. **自己做 diff**：TLC 印的是全量快照，逐欄比對相鄰 state，標出每一步動了哪些變數，對照 header 的動作名（State 3 → 4：ledger 的 m1 格 +1、dedup 不變——又一次 Credit）。\n4. **倒著走，找犯罪時刻**：從案發往回，找第一個讓防線述語破掉的步——**犯罪時刻常早於案發時刻**。這裡 DedupCovers（見 ch14）全程沒破，案發步即犯罪步；下一條 trace（紙上推演題 1）就不是這樣了。\n5. **問 spec**：對關鍵步翻出動作定義，問「哪個 guard 放它過的？我以為哪個 guard 會擋？」期望與現實的差，就是 bug 的座標——在 spec 裡，或在你對系統的理解裡。\n\ntrace 是中性的機器產物（ch08 的 DieHard 之課）：在 BadCredit 這邊它是事故報告，第 4 步是兇手；同一台機器在 DieHard 那邊印出來的是攻略。立場由 invariant 決定，讀法協定不變。\n\n## TLC 能與不能：有限窮舉不是定理\n\n把本章的機器能力誠實封箱。\n\n**能。**有限參數下：可達空間完整窮舉、invariant 逐狀態驗收、最短反例回溯、（小模型上）liveness 的壞循環搜尋。「(2, 2) 下 41 個可達狀態全數滿足 NoDoublePay」——這句話 TLC 說得出口，而且是徹底的：不是抽樣，是全稱，量化在那 41 個上。\n\n**不能。**ch08 的 THEOREM 寫的是 Spec ⇒ □NoDoublePay，對**任意**非空的 Msgs 與 Consumers——這是無限多組參數的全稱主張，TLC 一次只能咬一組。(2, 2) 全綠不蘊涵 (3, 5) 沒事；50,816 個狀態的 6 RM 全綠，也照樣不是任意 RM 數的定理——Lamport 在 TwoPhase 檔尾的用詞是 checked，不是 proved（見 ch11）。從 checked 到 proved 之間隔著的，正是 ch14 的歸納不變量：歸納證明一次買斷所有規模（ch05 的話），TLC 一格一格付租金。\n\n那有限窮舉到底值多少？業界的辯護叫 **small scope hypothesis**（出自 Alloy 傳統的經驗法則，見 ch18）：**絕大多數設計層的 bug，在很小的參數下就有反例**——因為它們源於邏輯交錯的疏漏，不是數量的累積。這裡有個容易搞混的軸要先拆開：那個 35 步的 DynamoDB 反例，驚人的是 trace 的**長度**——而 trace 長與參數大是兩回事，BFS 的深度是免費的，寬度才要錢；步數驚人的反例，不必然需要驚人的參數才擺得出來。我認為這個辯護在「先找 bug」的用途上站得住：小模型快、反例短、修完即重跑，這個迴圈的工程價值無可替代。\n\n但 hypothesis 三個字要念出聲——它是經驗賭注，不是定理，而且輸的方式是已知的：**性質涉及「數量本身」時，小參數連反例的舞台都搭不起來。**三方 split vote 要 5 個節點才擺得出來（見 ch13）；2/4 的 quorum 分歧要 4 個 acceptor（見 ch12）；「至多重送 k 次」的 k 本身就是個要辯護的上限（見 ch04）。誠實的姿態是 ch13 陷阱表那句：把驗過的參數寫進結論，並反問「這個規模擺不出什麼」——答不出來，就把參數加一格再跑一次。\n\n最後一句對照，給走到無限那天的你：同一份 spec，**Apalache 不搬狀態、改解方程**——把 Init 與 Next 編成 SMT 約束，問「k 步之內可不可能壞」；ledger ∈ [Msgs → Nat] 這種無限值域它直接吃，但承諾有界、參數照樣寫死。原理、用法與它在嚴謹度光譜上的位置，見 ch16。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| constraint 把反例圈到圈外 | 圈畫得跟性質一樣緊（驗 ledger ≤ 1、圈也設 ≤ 1），越界的犯罪現場隨斷崖消失，綠燈是你親手剪出來的 | 圈比性質寬至少一格；放寬一格重跑做敏感度測試——狀態數沒長＝圈沒咬到、長了＝結論要帶條件出門 |\n| fingerprint 碰撞的假綠 | 兩狀態同指紋，後到者被當「看過」，整片子圖靜默蒸發；invariant 在那片裡破了也沒人知道 | 記住方向：紅燈必真、綠燈帶星號。看 TLC 跑完印的碰撞機率；要緊的結論換指紋函數重跑、比對狀態總數（2026-06 文件） |\n| 把「TLC 停了」當理所當然 | 可達空間無限＋檢查的性質恰好不會破（BadCredit 配 TypeOK）＝跑到記憶體用罄都不會有結論，而你以為它只是慢 | 跑之前先口頭回答「什麼讓可達空間有限」——v1 的答案是 dedup 的單調性。答不出來就上 constraint 當保險 |\n| symmetry 濫用 | 性質不對稱（問 m1 是否先結）卻宣告 Msgs 對稱——TLC 看不見你要分辨的差別；或 liveness 模型掛 symmetry——可能漏真反例、報假反例（官方文件，2026-06） | 宣告對稱前驗三件事：Init、各動作、性質都對置換不變；liveness 一律另開不掛 symmetry 的小模型 |\n| deadlock 誤報與誤解 | v1 的 ⟨OUT, OUT⟩ 被當錯誤報出，你反射性關掉 deadlock 檢查——真的卡死從此也靜音 | 區分「合法終局」與「卡死」：要嘛在 spec 立法（終局自環，PlusCal 翻譯的 Done disjunct 正是此用，見 ch08），要嘛把「不會卡」升級成 liveness 性質去問——逐狀態的卡死檢查看不見 blocking（ch11 的教訓） |\n| 把最短 trace 當「最可能的事故」 | BFS 給最短不給最常見；你拿三步的 BadCredit trace 去跟同事說「系統會連刷兩次入帳」，被一句「程式碼不會這樣跑」駁回，連帶真洞也被丟掉 | 反例的價值是證明**可達**，不是估計頻率（ch02：非決定性 vs 機率）。報告時把洞與路徑分開講：洞是 dedup 失守，這條路徑只是最短的見證 |\n\n## 紙上推演\n\n### 題 1：讀 trace 找 bug（[20 分鐘] ★★）\n\n同事給 v1 加了一個動作，模擬 dedup 表的 TTL 清理（ch08 抽象帳第 5 筆的「還債」嘗試）：\n\n```tla\nExpire(m) == /\\ m \\in dedup\n             /\\ dedup' = dedup \\ {m}\n             /\\ UNCHANGED <<queue, working, ledger>>\n```\n\nTLC 檢查 NoDoublePay，輸出如下（已省略未變的變數行）：\n\n```text\nError: Invariant NoDoublePay is violated.\nError: The behavior up to this point is:\nState 1: <Initial predicate>\n/\\ queue = {\"m1\", \"m2\"}   /\\ working = (\"c1\" :> \"idle\" @@ \"c2\" :> \"idle\")\n/\\ ledger = (\"m1\" :> 0 @@ \"m2\" :> 0)   /\\ dedup = {}\n\nState 2: <Fetch ...>      queue = {\"m2\"}, working[\"c1\"] = \"m1\"\nState 3: <Credit ...>     ledger[\"m1\"] = 1, dedup = {\"m1\"}\nState 4: <Expire ...>     dedup = {}\nState 5: <Credit ...>     ledger[\"m1\"] = 2, dedup = {\"m1\"}\n```\n\n用五步協定回答：(a) 案發在哪個 state？犯罪時刻（ch14 的 DedupCovers 第一次破掉的步）在哪？(b) 這條 trace 全程沒有 Crash，也沒有重投遞——這說明 TTL 的危險比「TTL 短於重投遞窗口」的值班直覺更深一層，深在哪？(c) ch14 證明裡哪一塊磚被 Expire 敲掉了？(d) 寫出一條**含 Crash** 的更長違反路徑（不必最短），說明為什麼 TLC 不交這條。\n\n### 推演解答\n\n(a) **案發在 State 5**（ledger[\"m1\"] ＝ 2）；**犯罪時刻在 State 4**：Expire 之後 ledger[\"m1\"] ＝ 1 而 m1 ∉ dedup——DedupCovers（m ∉ dedup ⇒ ledger[m] ＝ 0）在這裡先死，NoDoublePay 下一步才死。讀 trace 的回手就是這個：從案發倒走，找防線述語斷掉的第一步——它幾乎總是比案發早，而且它才是要修的地方。\n\n(b) 直覺版的事故是「老訊息復活時 key 已被清掉」——需要 crash、重投遞、TTL 三者合謀。trace 顯示的更深一層是：**guard 引用的狀態一旦可以倒退，引用它的所有防線同時失效**，連重投遞都不必等——手上這則還沒 Ack 的訊息，就能在 Expire 後立刻再 Credit 一次。dedup 的防禦力從來不在「它記得」，而在「它**永遠**記得」；TTL 把「永遠」改成「一陣子」，被它守住的不變量全得重審。\n\n(c) 「dedup 只進不出」——ch14 歸納步裡 ⟨3⟩5 那句「集合只變大」。Credit 與 Ack 的 case 都站在這塊磚上；Expire 一進 Next，這些步驟的「照搬歸納假設」全數失效，DedupCovers 不再 inductive。證明先於模型告訴你哪裡不能動——這就是 ch14 說「證明的前提要抄錄在結論旁」的實戰版。\n\n(d) 例：Fetch(c1, m1) → Credit(c1) → Crash(c1)（m1 帶戳回佇列）→ Expire(m1) → Fetch(c2, m1) → Credit(c2)——6 步，ledger[\"m1\"] ＝ 2。這是值班直覺裡的那個劇本。TLC 不交它，因為 BFS 在第 4 層（題目那條 trace 的深度）就撞到了違反，輪不到第 6 層的劇本出場——**最短反例先報案，常見反例要自己會寫**。兩條都該進你的報告：前者定罪，後者說服人。\n\n### 題 2：兩組參數，跑得動嗎（[15 分鐘] ★★）\n\n用本章的可達通式估算 v1 在 (4, 2) 與 (10, 4) 的可達狀態數，並做可行性判斷：fingerprint 一個 8 byte，哪組是筆電輕鬆、哪組要認真考慮（記憶體、時間量級即可，不必精確）。再回答：哪一組對「檢查 NoDoublePay」其實是浪費？\n\n### 推演解答\n\n(4, 2)：k ＝ 0：3⁴ ＝ 81；k ＝ 1：4 × 2 × 2 × 3³ ＝ 432；k ＝ 2：C(4,2) × 2 × 2² × 3² ＝ 6 × 2 × 4 × 9 ＝ 432。合計 **945**——紙上已經很痛，TLC 毫秒級，指紋不到 8 KB。\n\n(10, 4)：k ＝ 0：3¹⁰ ＝ 59,049；k ＝ 1：10 × 4 × 2 × 3⁹ ＝ 1,574,640；k ＝ 2：45 × 12 × 4 × 3⁸ ＝ 14,171,760；k ＝ 3：120 × 24 × 8 × 3⁷ ＝ 50,388,480；k ＝ 4：210 × 24 × 16 × 3⁶ ＝ 58,786,560。合計 **124,980,489 ≈ 1.25 × 10⁸**——指紋約 1 GB，加上每個狀態要枚舉幾十個候選後繼，單機時間量級從小時起跳（依硬體與 spec 複雜度浮動，量級僅供決策）。可行，但已是「下班前掛著跑」的等級，逼近單機舒適區邊緣。\n\n哪組浪費？**對 NoDoublePay 而言，(10, 4) 幾乎是。**這條性質的攻防只發生在「一則訊息 × 它的 dedup 記錄 × 兩個會搶它的 consumer」這個局部；訊息數從 2 加到 10 複製了十份同樣的戰場，consumer 從 2 加到 4 才略增新交錯（兩個以上 consumer 圍攻同一則訊息的劇本——而 v1 的「至多一份」讓這也擺不出來，見 ch08 抽象帳第 3 筆）。small scope 的正面用法正是這個：**先想清楚性質的反例需要多大的舞台，再決定參數**——而不是反射性地把參數開到跑不動為止。\n\n### 題 3：加一個變數，爆多少倍（[10 分鐘] ★）\n\n為了排查，你想給 v1 加觀測變數 `deliveries ∈ [Msgs -> 0..3]`：每次 Fetch 把對應格 +1。(a) 走私版上界 576（ledger 砍成 0..1 的那個）會變成多少？(b) 可達空間能直接乘同一個倍數嗎？(c) 若不設上限（deliveries ∈ [Msgs → Nat]）會發生什麼？封頂在 3 的兩種寫法——「到頂就飽和不再加」與「到頂就禁止 Fetch」——各自怎麼說謊？\n\n### 推演解答\n\n(a) 乘上新值域：4² ＝ 16 倍，576 → **9,216**。上界層面的乘法是精確的（ch04：每加一個變數，乘上它的值域）。\n\n(b) **不能。**可達空間的成長要重新窮舉：deliveries 與其他變數高度相關（被手持或已有戳記的訊息必有 deliveries ≥ 1；Q⁰ 的訊息 deliveries 可以是 0..3 中走 Crash 圈攢出來的任何值……），實際倍數介於 1 與 16 之間，只有重算才知道。上界的乘數是算術，可達的乘數是實證——兩者混用就是 ch04 那句「值域給上界，動作決定可達」的反面教材。\n\n(c) 不設上限：Fetch–Crash 圈每繞一次 deliveries +1，**可達空間無限**——而 deliveries 是純觀測變數，TypeOK 與 NoDoublePay 都不會破，TLC 一聲不吭跑到死（陷阱表第 3 條的活例：觀測變數不是免費的）。飽和式封頂的謊：第 4 次之後的重送「免費」，任何依賴計數的性質（「至多重送 3 次」）被飽和悄悄豁免——驗了等於沒驗。禁止式封頂的謊：第 4 次重送被立法為不可能——模型比現實乖（ch04 的禁忌方向），依賴「重送有上限」才成立的性質會漂亮地假通過。第三條路是不改 spec、上 constraint 圈住 deliveries ≤ 3：謊言相同，但立法位置在模型組態而非 spec 本文，綠燈的條件陳述（「≤ 3 次投遞的世界裡」）寫在驗證報告而不是藏在型別裡——三者選誰都行，**選了要寫出來**。\n\n### 題 4：對稱軌道，自己數（[20 分鐘] ★★★）\n\n宣告 Consumers ＝ {c1, c2} 為對稱集合後，v1 的 41 個可達狀態坍成幾條軌道？用兩條路算：(a) 直接分組：按手持數 0／1／2 分別數軌道；(b) Burnside 引理：軌道數 ＝（|固定點(恆等)| ＋ |固定點(對調)|）∕ 2。兩路必須同數。算完回答：為什麼省不到 2! ＝ 2 倍？\n\n### 推演解答\n\n(a) 手持 0（9 個狀態：兩訊息各在 {Q⁰, Q¹, OUT}）：c1、c2 對調不改變這些狀態——**9 個狀態各自成軌，9 軌**。手持 1（24 個）：對調把「m 在 c1 手上」換成「m 在 c2 手上」，兩兩配對——**12 軌**。手持 2（8 個）：⟨c1ᵃ, c2ᵇ⟩ ↔ ⟨c2ᵃ, c1ᵇ⟩ 兩兩配對——**4 軌**。合計 9 ＋ 12 ＋ 4 ＝ **25**。\n\n(b) 恆等置換固定全部 41 個；對調的固定點＝「換完還是自己」的狀態＝沒有任何訊息被手持的那 9 個（只要有訊息在某個 consumer 手上，對調就把它搬到另一隻手，狀態必變）。(41 ＋ 9) ∕ 2 ＝ **25**。✓ 兩路同數。\n\n省不到 2 倍的原因就是那 9 個固定點：它們在除以 2 的世界裡「不打折」。一般地，對稱集合的折扣上限是 n!，實得 ＝ n! × (1 − 固定點的攤提)；狀態裡「不提 consumer 身分」的成分越多，折扣越差。順帶看穿一件事：Msgs 也對稱（動作與 NoDoublePay 對 m1↔m2 一視同仁），兩組對稱一起上還能再砍——但每多一組宣告，就多一份「性質真的對稱嗎」的審查義務；題目只敢動 Consumers，就是這個謹慎的示範。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 向同事白板講 TLC 主迴圈：frontier、seen、fingerprint 各扮演什麼角色？你在 ch02 手畫 v0 狀態圖的哪個動作，分別對應這三樣東西？\n2. fingerprint 碰撞時 TLC 漏掉什麼？為什麼是假綠燈而不可能是假紅燈？兩道防禦各是什麼？\n3. 為什麼 TLC 的反例 trace 天生最短？「最短」與「最可能」差在哪——拿這條差距解釋你該怎麼跟同事報告一條反例。\n4. v1 的型別空間無限，TLC 檢查 NoDoublePay 為什麼照樣會停？對 BadCredit 只檢查 TypeOK 為什麼不會停？用「紅燈總在有限深度，綠燈需要窮舉終止」把這兩件事串起來。\n5. constraint、symmetry、抽象各拿什麼換什麼？三者的綠燈各自帶著什麼條件陳述？\n6. 為什麼 liveness 檢查是找圈不是找點？「滿足 fairness 的壞循環」逐詞解釋，並用 v1 的 Fetch–Crash 圈說明 WF_vars(Next) 為什麼擋不住它。\n7. 「TLC 在 (2, 2) 全綠」與 ch08 的 THEOREM 之間差了什麼？small scope hypothesis 的辯護詞與已知的敗法各舉一例（提示：35 步 vs 5 節點）。\n\n## 延伸閱讀\n\n- **Leslie Lamport, *Specifying Systems*（2002），第 14 章〈The TLC Model Checker〉** — 免費 PDF 見 `https://lamport.azurewebsites.net/tla/book.html`（頁面驗證於 2026-06）——TLC 的官方原典：狀態如何生成、fingerprint、constraint 與模型的關係，本章的機制描述以它為底；讀的時候對照本章的偽碼，會看到同一台機器的兩種解析度。\n- **Yuan Yu, Panagiotis Manolios, Leslie Lamport, “Model Checking TLA+ Specifications”（CHARME 1999）** — `https://lamport.azurewebsites.net/pubs/yuanyu-model-checking.pdf`——TLC 的出生論文：為什麼要為無型別的集合論語言做顯式狀態檢查器、fingerprint 的設計取捨。注意當時尚未支援 liveness 檢查，讀它正好能體會 liveness 是後來補的另一台機器（連結定位於 2026-06，內文意旨經摘要核對）。\n- **Hillel Wayne, learntla.com〈Optimizing Model Checking〉** — `https://learntla.com/topics/optimization.html`（開頁驗證於 2026-06）——constraint、symmetry（「約 n!」）、view 的實戰面，以及「liveness 慢且擋 symmetry、另開小模型」的工程慣例；本章講原理，它講你哪天真的開工具時的手感。\n- **TLA+ Wiki〈codebase: liveness〉** — `https://docs.tlapl.us/codebase:liveness`——開發者視角的 liveness 檢查實作：behavior graph、Tarjan SCC、隨圖成長分批執行；本章 SCC 直覺版的工程對照（搜尋定位於 2026-06，未逐段核對）。\n- **Jack Vanlightly, “An introduction to symmetry in TLA+”（2024-12）** — `https://jack-vanlightly.com/blog/2024/12/5/an-introduction-to-symmetry-in-tla`（開頁驗證於 2026-06）——用視覺化把軌道坍縮講透，含「對稱與 liveness 不合」的警告與隱性不對稱的踩坑案例；題 4 算完軌道再讀它，畫面會自己動起來。\n"}, {"id": "ch10-mutual-exclusion", "file": "ch10-mutual-exclusion.md", "group": "Part IV — 協議精讀", "title": "ch10 — 互斥：Peterson 演算法全手推", "md": "# ch10 — 互斥：Peterson 演算法全手推\n\n> **本章解決什麼問題**：Part III 給了你語言（動作邏輯、時序邏輯、完整 spec）與機器原理（TLC 的 BFS）。從本章起的 Part IV，把這套工具按在四個經典分散式協議上。第一個是最小的：互斥（mutual exclusion）——兩個 process 怎麼在只有原子讀寫的世界裡，不靠任何現成的鎖，保證不同時進入臨界區。本章做全書第一次「整個協議的狀態空間手推」：把 Peterson 演算法的所有可達狀態一個不漏畫出來、逐邊驗證 `MutualExclusion`。這個手藝是 ch11–13 讀 2PC、Paxos、Raft 的基本功，也是 ch14 歸納證明的前菜。\n\n你現在的位置：\n\n```text\n┌──────────────────────────────────────────────────────────────────┐\n│ Part I    為什麼                                                 │\n│   ch01 測試的極限 → ch02 狀態機                                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part II   數學地基                                               │\n│   ch03 邏輯 → ch04 集合 → ch05 歸納                              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part III  TLA+ 與時序邏輯                                        │\n│   ch06 動作邏輯 → ch07 時序邏輯 → ch08 完整 spec → ch09 TLC 原理 │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part IV   協議精讀                                               │  ← 你在這裡\n│   ch10 互斥 → ch11 2PC → ch12 Paxos → ch13 Raft                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part V    證明                                                   │\n│   ch14 歸納不變量 → ch15 Refinement → ch16 機器證明              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part VI   實務                                                   │\n│   ch17 業界案例 → ch18 方法地圖                                  │\n└──────────────────────────────────────────────────────────────────┘\n```\n\n## 從你已知的出發\n\n你的職業生涯大概沒有一天離開過鎖。`SELECT ... FOR UPDATE` 是鎖；Redis 的 `SETNX` 加 TTL 是鎖；你排查過的那次 RDS 鎖競爭、那個兩條 transaction 互相等待的 deadlock，全是互斥問題的工程現場。但注意一件事：這些鎖都是**買來的**。DB 的 lock manager 幫你做好了互斥，Redis 靠單執行緒事件迴圈幫你做好了「單一 key 的操作不會交錯」。你站在別人蓋好的互斥之上工作。\n\n那最底下那層互斥是誰蓋的、怎麼蓋的？把問題推到極限：硬體只給你「對單一變數的原子讀」和「原子寫」，沒有 compare-and-swap、沒有 test-and-set、沒有任何現成的鎖。兩個 process 要共用一段臨界區（critical section）——你能只用幾個共享變數，徒手蓋出一把保證正確的鎖嗎？\n\n這個問題由 Dijkstra 在 1965 年的 CACM 論文正式提出並給出 n 個 process 的解；兩個 process 的第一個正確解出自荷蘭數學家 Th. J. Dekker（Dijkstra 在講義《Cooperating Sequential Processes》中歸功於他），但 Dekker 的演算法出名地難讀。十六年後，Gary Peterson 在 1981 年用一篇**兩頁**的論文給出一個簡潔到令人發笑的解——論文標題就叫〈Myths About the Mutual Exclusion Problem〉，要破除的迷思正是「這問題的解必然複雜」。\n\n本章拿 Peterson 當第一個精讀協議，有三個理由。第一，它小：小到你能把**整個**可達狀態空間畫在一頁紙上，逐邊驗證——這是唯一一個我們能做到「窮舉不靠機器」的協議，正好用來建立 Part IV 的手感。第二，它精巧得恰到好處：差一個變數會死鎖、改一行會破互斥，每個零件的「為什麼」都問得出來。第三，它把 ch07 的抽象詞彙全部落地：safety 是哪條、liveness 是哪條、deadlock 與 starvation 差在哪、WF 在哪裡開始幹活——全部在 20 個狀態裡看得見摸得著。\n\n對照你的世界：你評估一把分散式鎖，問的也是同樣兩件事——「會不會兩個 client 同時拿到鎖」（safety；`SETNX` 靠 Redis 對單 key 操作的原子性）、「鎖會不會永遠拿不到」（liveness；TTL 在賭持有者掛了之後鎖終會釋放）。Peterson 是這兩個問題最純粹的標本。\n\n## 互斥問題：規則與計分板\n\n先把問題說精確。兩個 process（依全書基準，編號 0 與 1）各自反覆執行：\n\n```text\nloop:\n  非臨界區（ncs）   \\* 想待多久待多久，包括永遠\n  進入協議（entry protocol）\n  臨界區（cs）\n  離開協議（exit protocol）\n```\n\n遊戲規則：\n\n1. **只有共享暫存器的原子讀與原子寫。**一步只能讀或寫一個變數；不能「讀了馬上改」當成一步。\n2. **process 可以永遠待在 ncs。**不想進臨界區的人沒有義務配合任何人。\n3. **不能假設速度。**兩個 process 的相對速度任意，調度任意——這正是 ch01 講的「調度不可控」。\n\n計分板上有一條 safety 與一階梯 liveness：\n\n| 性質 | 類型 | 白話 |\n|---|---|---|\n| `MutualExclusion` | safety | 任何時刻至多一個 process 在臨界區 |\n| deadlock-freedom | liveness（弱） | 只要有人想進，**就有人**終會進去 |\n| starvation-freedom | liveness（強） | **每個**想進的 process 自己終會進去 |\n\nstarvation-freedom 蘊涵 deadlock-freedom，反之不然——「整體有進展」跟「每個個體都有進展」是兩回事，你在搶不到連線池的服務身上看過這個差距。兩條 liveness 都是 ◇ 型的承諾，照 ch07 的教訓，之後談它們時必須交代 fairness。\n\n**本章的原子性假設，先講清楚**：我們建模時假設**每個動作是一步原子的**——寫一個變數是一步，連「同時讀 flag 與 turn 做判斷」也包成一步（下文會給這個簡化的理由與代價）。真實多核硬體不保證這件事：弱記憶體模型下寫入可能延遲可見、讀寫可能重排，裸寫 Peterson 在現代 CPU 上會壞——記憶體一致性模型是全書不涵蓋的主題，工程上請用語言提供的同步原語，想深究見延伸閱讀。\n\n## 天真方案：兩面旗子，然後一起卡死\n\n不看答案，你會怎麼設計 entry protocol？最自然的直覺：各舉一面旗。`flag[i] = TRUE` 表示「我想進」；進去之前先看對方的旗。\n\n```text\nflag[i] := TRUE;              \\* 舉旗：我要進\nawait flag[1-i] = FALSE;      \\* 等對方旗子放下\n臨界區;\nflag[i] := FALSE;             \\* 放旗\n```\n\n把它看成狀態機：每個 process 的 pc（執行到哪一行）只有三個位置——n（在 ncs）、w（已舉旗、卡在 await）、c（在臨界區）。flag 不用另外記：flag[i] = TRUE 若且唯若 pc 不在 n（舉旗與進入同一步、放旗與離開同一步）。動作三種：R(i) 舉旗（n → w）、E(i) 通過 await（w → c，guard：對方 flag 為 FALSE）、X(i) 離開（c → n）。\n\n狀態寫成 ⟨pc₀, pc₁⟩。pc 組合共 3 × 3 = 9 個，逐一展開可達的部分（ch09 的 BFS，這次完全手動）：\n\n```text\n                         nn\n                       /     \\\n                  R0/           \\R1\n                 v                 v\n                wn                nw\n              /     \\R1       R0/     \\\n          E0/          \\     /          \\E1\n         v                v                v\n        cn               ww               nc\n       /   \\                             /   \\\n  X0/        \\R1                     R0/        \\X1\n  v            v                     v            v\n(nn)          cw                    wc          (nn)\n               |                     |\n               |X0                   |X1\n               v                     v\n             (nw)                  (wn)\n```\n\n（括號節點代表「回到上方已畫過的狀態」，是同一個節點不重複畫；全章狀態圖都用這個慣例。每個狀態還允許 stuttering 步，依 ch06 慣例不畫。）\n\n可達狀態 8 個：9 個 pc 組合裡只有 cc 不可達——也就是說 **`MutualExclusion` 成立**。對帳：cc 的入口只有兩個——cw 走 E1，或 wc 走 E0——但 guard 要求對方的 flag 為 FALSE，而對方 pc 在 c 上、旗子正舉著，兩個入口都被擋死。兩面旗子確實守住了 safety。\n\n但看 ww 這個節點：**沒有任何一條出邊**。R 不行（兩人都不在 n）、E0 不行（flag[1] = TRUE）、E1 不行（flag[0] = TRUE）、X 不行（沒人在 c）。兩個 process 都舉著旗、都在等對方放旗——這就是 deadlock，而且它不是機率事件，是**狀態圖上一個白紙黑字的節點**，從初始狀態走兩步就到：\n\nnn →R0→ wn →R1→ ww。卡死。\n\n最短反例 2 步。值得停一拍體會這個諷刺：這個方案的 `MutualExclusion` 驗起來**全綠**。如果你只檢查 safety，它看起來完美——沒有人會同時進臨界區，因為很快就**沒有人能進任何地方**。一個死掉的系統不會違反任何 safety 性質（ch07 講過：safety 說「壞事不發生」，而什麼都不發生是它最便宜的滿足方式）。這是本書反覆敲打的假安全感模式裡最經典的一款。\n\n順帶一提另一個直覺方向「先看再舉」（先確認對方旗子沒舉，再舉自己的）：它不死鎖，但直接破互斥——兩個 process 可以同時通過檢查、再同時舉旗進場。這正是你在 ch01 看過的 check-then-act race，dedup 檢查與入帳之間被插隊的同款形狀。反例留給紙上推演題 2。\n\n兩個天真方案，一個死於「都讓」，一個死於「都搶」。缺的是一個**打破對稱**的裁決機制。\n\n## Peterson：多一個 turn，讓位給對方\n\nPeterson 的解法是在兩面旗之外加一個共享變數 turn ∈ {0, 1}，並且在舉旗之後做一件反直覺的事：**把優先權讓給對方**。\n\n```text\nflag[i] := TRUE;                       \\* 舉旗：我要進\nturn := 1 - i;                         \\* 讓位：你先\nawait flag[1-i] = FALSE \\/ turn = i;   \\* 等：對方不想進，或輪到我\n臨界區;\nflag[i] := FALSE;                      \\* 放旗\n```\n\n進入條件讀作：「對方根本不想進（flag[1−i] = FALSE），或者對方比我後讓位（turn = i——turn 的值是被**最後一次寫入**蓋掉的，所以 turn = i 表示對方在我之後執行了讓位、把 turn 寫回了 i）。」兩個人同時想進時，誰最後寫 turn，誰等。客氣不是裝飾，是裁決演算法。\n\n寫成 TLA+。每個 process 的 pc 有四個位置：`\"ncs\"`（還沒開始）、`\"set\"`（已舉旗，下一步寫 turn）、`\"wait\"`（已讓位，卡在 await）、`\"cs\"`（臨界區內）。ch08 看過 PlusCal 翻譯出的 pc 變數，這裡我們直接手寫同一個建模手法：\n\n```tla\nProcs == {0, 1}\nOther(i) == 1 - i\n\nVARIABLES pc, flag, turn\nvars == <<pc, flag, turn>>\n\nTypeOK == /\\ pc \\in [Procs -> {\"ncs\", \"set\", \"wait\", \"cs\"}]\n          /\\ flag \\in [Procs -> BOOLEAN]\n          /\\ turn \\in Procs\n\nInit == /\\ pc = [i \\in Procs |-> \"ncs\"]\n        /\\ flag = [i \\in Procs |-> FALSE]\n        /\\ turn = 0\n\nRequest(i) == /\\ pc[i] = \"ncs\"\n              /\\ flag' = [flag EXCEPT ![i] = TRUE]\n              /\\ pc' = [pc EXCEPT ![i] = \"set\"]\n              /\\ UNCHANGED turn\n\nSetTurn(i) == /\\ pc[i] = \"set\"\n              /\\ turn' = Other(i)\n              /\\ pc' = [pc EXCEPT ![i] = \"wait\"]\n              /\\ UNCHANGED flag\n\nEnter(i) == /\\ pc[i] = \"wait\"\n            /\\ flag[Other(i)] = FALSE \\/ turn = i\n            /\\ pc' = [pc EXCEPT ![i] = \"cs\"]\n            /\\ UNCHANGED <<flag, turn>>\n\nExit(i) == /\\ pc[i] = \"cs\"\n           /\\ flag' = [flag EXCEPT ![i] = FALSE]\n           /\\ pc' = [pc EXCEPT ![i] = \"ncs\"]\n           /\\ UNCHANGED turn\n\nNext == \\E i \\in Procs :\n          Request(i) \\/ SetTurn(i) \\/ Enter(i) \\/ Exit(i)\n\nSpec == Init /\\ [][Next]_vars\n\nMutualExclusion == ~(pc[0] = \"cs\" /\\ pc[1] = \"cs\")\n```\n\n逐段讀：\n\n- **四個動作對應四行程式**。Request 舉旗、SetTurn 讓位、Enter 通過 await、Exit 放旗回家。每個動作三個變數三個著落（ch06 的紀律）。\n- **Enter 的 guard 是整個演算法的靈魂**：flag[Other(i)] = FALSE ∨ turn = i。注意它是狀態述語，讀的是當下這一拍的兩個共享變數。\n- **Init 裡 turn = 0 是任意選的**，與 Lamport 的版本一致。初值不影響任何性質——事實上待會的圖裡 nn1（同一條起跑線、turn = 1）本來就是可達狀態，兩種初值的可達閉包相同；釘死一個值是讓 BFS 有單一起點。\n- `MutualExclusion` 照全書基準命名：兩個 pc 不得同時是 \"cs\"。\n\n**建模的三個誠實聲明**（每次精讀 spec 都要做的功課——spec 跟現實之間隔著哪些選擇）：\n\n1. **ncs 與 cs 抽象成單一 label。**臨界區裡做什麼我們不關心；ncs 可以永遠待著（規則 2），所以 Request 之後不會有任何 fairness 強迫它發生。\n2. **await 的判斷是一步原子讀兩個變數。**真實程式是迴圈裡兩次分開的讀。這是本章為了把全圖控制在一頁內做的**約化**：拆成兩步會讓每個 process 多一個 pc 位置、狀態數進一步膨脹。約化的底氣有二：Lamport 自己網站上的 PlusCal 版 Peterson 用的就是同一粒度的單步 await（2026-06 查證，見延伸閱讀）；而把讀拆開之後互斥**仍然**成立——Peterson 的設計本來就只依賴單變數原子讀寫，這是它有名的強項（標準結果，本書不驗，見延伸閱讀）。\n3. **舉旗（Request）與讓位（SetTurn）絕不合併成一步。**這兩個寫入之間的縫隙正是演算法的戲肉：兩個 process 可以都舉完旗、還沒讓位。如果你把它們合併，狀態空間更小、驗證更輕鬆——但你驗的就不是 Peterson，而是一個硬體根本做不到的強化版。原子粒度寬一格，反例就少一批，這是 spec 騙過你的標準手法之一（陷阱與防禦再算帳）。\n\n## 全狀態空間手推：20 個狀態、34 條邊\n\n現在做本章的招牌動作：把 Spec 的**全部**可達狀態畫出來，每條邊驗一次 `MutualExclusion`。不開 TLC——我們自己當 TLC（演算法照 ch09 的 BFS）。\n\n### 第一步：把上界從 128 壓到 32\n\n照 TypeOK 數狀態上界：pc 每人 4 個位置（4 × 4 = 16）、flag 每人 2 值（× 4）、turn 2 值（× 2）——上界 **128**。手畫 128 個格子不現實，先找便宜的縮減。\n\n觀察：**flag[i] 完全由 pc[i] 決定**。\n\n⟨1⟩1. 宣稱：所有可達狀態滿足 FlagSync ≜ ∀ i ∈ Procs : flag[i] ≡ (pc[i] ≠ \"ncs\")。\n⟨1⟩2. Init：pc 全 \"ncs\"、flag 全 FALSE，兩邊同假。理由：Init 的定義。\n⟨1⟩3. 每步保持：Request(i) 把 flag[i] 設 TRUE 同時把 pc[i] 帶離 \"ncs\"（同步翻真）；Exit(i) 把 flag[i] 設 FALSE 同時把 pc[i] 設回 \"ncs\"（同步翻假）；SetTurn 與 Enter 不動 flag，pc[i] 在 {\"set\",\"wait\",\"cs\"} 內移動、不跨越 \"ncs\" 邊界；對方的 flag 與 pc 都沒被動到。四種動作都保持。\n⟨1⟩4. Q.E.D. 由 ch05 的不變量規則（起點成立＋每步保持）。\n\n所以 flag 不帶資訊，狀態可以壓成三元組 ⟨pc₀, pc₁, turn⟩：16 種 pc 組合 × 2 種 turn ＝上界 **32**。注意這一步本身就是一次小型歸納證明——你剛剛用 ch05 的工具把狀態空間砍掉四分之三。\n\n以下狀態縮寫成三個字元：pc 取首字母 **n**（ncs）、**s**（set）、**w**（wait）、**c**（cs），第三碼是 turn。例如 ws1 ≜ ⟨pc₀ = \"wait\", pc₁ = \"set\", turn = 1⟩。\n\n### 第二步：BFS，逐層展開\n\n從 Init（即 nn0）開始，每層把 frontier 的每個狀態、每個動作試一遍：\n\n- **第 0 層**：{nn0}。累計 1。\n- **第 1 層**：展開 nn0——只有兩個 Request enabled：R0 → sn0、R1 → ns0。新增 2，累計 3。\n- **第 2 層**：sn0：T0 → wn1（讓位，turn 翻成 1）、R1 → ss0。ns0：R0 → ss0（已入列）、T1 → nw0。新增 wn1、ss0、nw0，累計 6。\n- **第 3 層**：wn1：E0 → cn1（guard 走 flag[1] = FALSE 這個 disjunct——對手不想進，直接過）、R1 → ws1。ss0：T0 → ws1、T1 → sw0。nw0：R0 → sw0、E1 → nc0。新增 cn1、ws1、sw0、nc0，累計 10。\n- **第 4 層**：cn1：X0 → nn1、R1 → cs1。**ws1：E0 被擋**（flag[1] = TRUE 且 turn = 1——兩個 disjunct 都假），唯一出路 T1 → ww0。**sw0：E1 被擋**（鏡像），唯一出路 T0 → ww1。nc0：X1 → nn0（第一條回頭邊）、R0 → sc0。新增 nn1、cs1、ww0、ww1、sc0，累計 15。\n- **第 5 層**：nn1：R0 → sn1、R1 → ns1。cs1：X0 → ns1、T1 → cw0。**ww0：兩人都在等，裁決時刻**——E0 enabled（turn = 0），E1 被擋（flag[0] = TRUE 且 turn = 0），唯一出路 E0 → cw0。ww1 鏡像：唯一出路 E1 → wc1。sc0：T0 → wc1、X1 → sn0（回頭）。新增 sn1、ns1、cw0、wc1，累計 19。\n- **第 6 層**：sn1：T0 → wn1（回頭）、R1 → ss1。ns1：R0 → ss1、T1 → nw0（回頭）。**cw0：0 在臨界區、1 在等——E1 被擋**（flag[0] = TRUE 且 turn = 0），唯一出路 X0 → nw0（回頭）。wc1 鏡像：唯一出路 X1 → wn1（回頭）。新增 ss1，累計 20。\n- **第 7 層**：ss1：T0 → ws1、T1 → sw0，都已入列。**frontier 空，BFS 收斂。**\n\n**可達狀態共 20 個。**這個數字是本章自己推的，等下用第二條路複核。\n\n### 全圖\n\n34 條邊全部畫出（括號節點＝跳回上方同名節點；stuttering 不畫）：\n\n```text\n                                   nn0\n                                 /     \\\n                             R0/         \\R1\n                            v               v\n                           sn0             ns0\n                          /    \\R1     R0/    \\\n                      T0/        \\     /        \\T1\n                      v             v             v\n                     wn1           ss0           nw0\n                    /   \\R1     T0/   \\T1     R0/   \\\n                E0/        \\   /         \\   /         \\E1\n                v            v             v             v\n               cn1          ws1           sw0           nc0\n              /   \\           \\             \\           /   \\\n          X0/       \\R1        \\T1          \\T0       R0/      \\X1\n          v           v         v            v         v          v\n         nn1         cs1       ww0          ww1       sc0       (nn0)\n         /   \\R1   X0/  \\T1  E0/              \\E1    /   \\\n     R0/       \\   /       \\  /                 \\T0/       \\X1\n      v           v          v                   v           v\n     sn1         ns1        cw0                 wc1        (sn0)\n     /  \\R1   R0/  \\          \\                    \\\n  T0/     \\   /      \\T1       \\X0                   \\X1\n   v        v         v         v                      v\n (wn1)     ss1      (nw0)     (nw0)                  (wn1)\n          /   \\\n      T0/       \\T1\n      v           v\n    (ws1)       (sw0)\n```\n\n先看圖的骨架再看細節：最左一縱列（sn0 → wn1 → cn1 → nn1 → sn1 → 回 wn1）是 process 0 在對手不搶時的「獨走循環」，最右側鏡像是 process 1 的；中間那團（ss、ww、cw、wc）才是兩人交鋒的戰場。整張圖有一個漂亮的對稱：把兩個 process 互換、turn 翻面（σ(⟨a, b, k⟩) = ⟨b, a, 1−k⟩），圖映到自己——20 個狀態恰好配成 10 對鏡像（如 ws1 ↔ sw0、cw0 ↔ wc1），等下對帳會用它當第三重複核。\n\n### 逐狀態 × 逐動作總表：34 條邊全驗\n\n「逐邊驗 invariant」對狀態述語來說等於兩件事：(1) 每個狀態本身滿足 `MutualExclusion`；(2) 每條邊的終點都還在這 20 個狀態之內（圖是封閉的）。下表把 20 個狀態的**每個動作**都交代掉——enabled 的給出終點，被擋的給出是哪個 guard 擋的，一步不跳：\n\n| # | 狀態 | 出邊（動作 → 終點） | 被擋的 await（原因） | cs 占用 |\n|---|---|---|---|---|\n| 1 | nn0 | R0 → sn0、R1 → ns0 | — | 無 |\n| 2 | sn0 | T0 → wn1、R1 → ss0 | — | 無 |\n| 3 | ns0 | R0 → ss0、T1 → nw0 | — | 無 |\n| 4 | wn1 | E0 → cn1、R1 → ws1 | — | 無 |\n| 5 | ss0 | T0 → ws1、T1 → sw0 | — | 無 |\n| 6 | nw0 | R0 → sw0、E1 → nc0 | — | 無 |\n| 7 | cn1 | X0 → nn1、R1 → cs1 | — | 僅 0 |\n| 8 | ws1 | T1 → ww0 | E0 ✗：flag[1] = T 且 turn = 1 | 無 |\n| 9 | sw0 | T0 → ww1 | E1 ✗：flag[0] = T 且 turn = 0 | 無 |\n| 10 | nc0 | X1 → nn0、R0 → sc0 | — | 僅 1 |\n| 11 | nn1 | R0 → sn1、R1 → ns1 | — | 無 |\n| 12 | cs1 | X0 → ns1、T1 → cw0 | — | 僅 0 |\n| 13 | ww0 | E0 → cw0 | E1 ✗：flag[0] = T 且 turn = 0 | 無 |\n| 14 | ww1 | E1 → wc1 | E0 ✗：flag[1] = T 且 turn = 1 | 無 |\n| 15 | sc0 | T0 → wc1、X1 → sn0 | — | 僅 1 |\n| 16 | sn1 | T0 → wn1、R1 → ss1 | — | 無 |\n| 17 | ns1 | R0 → ss1、T1 → nw0 | — | 無 |\n| 18 | cw0 | X0 → nw0 | E1 ✗：flag[0] = T 且 turn = 0 | 僅 0 |\n| 19 | wc1 | X1 → wn1 | E0 ✗：flag[1] = T 且 turn = 1 | 僅 1 |\n| 20 | ss1 | T0 → ws1、T1 → sw0 | — | 無 |\n\n每個狀態還有 Request／SetTurn／Exit 沒列的部分：guard 是 pc 等式，不在對應位置就不 enabled，從狀態縮寫一眼可判，表中不贅列；表裡單獨點名的是六個「await 被擋」——它們才需要看兩個變數。\n\n**邊數對帳**：14 個狀態各 2 條出邊、6 個狀態各 1 條，合計 2 × 14 + 6 = **34**。換個方向數：R 邊＝「pc 為 n 的格子數」＝ 12（pc₀ = n 的狀態 6 個、pc₁ = n 的 6 個），T 邊同理 12，X 邊＝「pc 為 c 的格子數」＝ 6，E 邊＝ w 格子 10 個減被擋 6 個＝ 4。12 + 12 + 6 + 4 = **34** ✓。兩種數法一致。\n\n**逐邊驗 `MutualExclusion`**：34 條邊的終點全部出現在表中 20 個狀態之列（BFS 已收斂，圖封閉）；而 20 個狀態的「cs 占用」欄沒有任何一格是「0 與 1 同時」——**沒有任何 ⟨c, c, ·⟩ 狀態。每條邊都把系統送進一個滿足 `MutualExclusion` 的狀態。驗訖。**\n\n值得把鏡頭推近到防守動作真正發生的地方。臨界區的入口只有 4 條 E 邊（#4、#6、#13、#14），而擋下入侵的是 6 個「✗」：\n\n- **ww0／ww1（#13、#14）是裁決點**：兩人都讓完位，turn 的終值＝後讓位者讓出去的值，先讓位的人進場，另一人被「flag 為真 ∧ turn 不利」雙重鎖死。\n- **cw0／wc1（#18、#19）是守門點**：有人已在臨界區內，門口那位的 E 被同一組條件擋住——這兩格就是 `MutualExclusion` 的最前線。對照天真方案：那裡擋住 cw／wc 的只有 flag，付出的代價是 ww 變成死路；Peterson 用 turn 把 ww 的死路改成單行道，又沒放鬆 cw／wc 的防守。\n\n### 兩路對帳：32 個候選裡為什麼恰好缺 12 個\n\nBFS 給了 20。第二條路：從 32 個候選（16 種 pc 組合 × turn 兩值）反向清點誰**不在**圖裡，並且要求每個缺席者都講得出缺席的理由——數字對上、理由齊全，才算對帳閉合。\n\n對照 BFS 結果，32 − 20 = 12 個缺席者是：wn0、ws0、cn0、cs0（及其鏡像 nw1、sw1、nc1、sc1），cw1、wc0、cc0、cc1。它們由兩條引理解釋：\n\n**引理 L1（讓位有記錄）**：若 pc_i ∈ {wait, cs} 且 pc_{1−i} ∈ {ncs, set}，則 turn = 1−i。\n\n⟨1⟩1. 取 i 最後一次執行的 SetTurn(i)。它存在（i 進入 wait 的唯一入口），寫下 turn = 1−i；此後 i 一直留在 {wait, cs}（離開得經過 Exit 回 ncs，再回來就得再執行一次 SetTurn，跟「最後一次」矛盾），所以此後 flag[i] 恆為 TRUE（FlagSync）。\n⟨1⟩2. 反設現在 turn = i。turn 被改寫的唯一途徑是 SetTurn，而 SetTurn(i) 已是最後一次，故存在更晚的 SetTurn(1−i) 寫下 turn = i，且它是對 turn 的最後一次寫入。\n⟨1⟩3. 那次 SetTurn(1−i) 把 pc_{1−i} 帶到 wait。從那一刻到現在：turn 恆為 i（⟨1⟩2：沒有更晚的寫入）、flag[i] 恆為 TRUE（⟨1⟩1）——Enter(1−i) 的 guard「flag[i] = FALSE ∨ turn = 1−i」兩個 disjunct 恆假，1−i 出不了 wait。\n⟨1⟩4. 所以現在 pc_{1−i} = wait，與前提 pc_{1−i} ∈ {ncs, set} 矛盾。Q.E.D.\n\n白話：**你讓過位、對方在那之後沒讓過位，turn 就還停在你讓出去的值。**L1 一口氣解釋 8 個缺席者：wn0、ws0、cn0、cs0 都是「0 已過讓位線（w/c）、1 還沒（n/s）」卻 turn = 0 的狀態，違反 L1；4 個鏡像同理。\n\n**引理 L2（交鋒時 turn 屬於場內者）**：若 pc_i = cs 且 pc_{1−i} ∈ {wait, cs}，則 turn = i。\n\n論證（工程師嚴謹度的散文版）：i 在臨界區內，看它最後一次 Enter(i) 與對手最後一次 SetTurn(1−i) 誰先誰後。若 SetTurn(1−i) 在後：它寫下 turn = i，之後沒有人再寫（i 要再寫得先離開 cs，對手要再寫得先通過 Enter 繞一圈——但它正卡在 wait），所以現在 turn = i，證畢。若 Enter(i) 在後：Enter 那一刻對手已在 {wait, cs}、flag[1−i] = TRUE，guard 只能靠 turn = i 這個 disjunct 通過；之後同樣無人再寫 turn，現在仍是 turn = i。兩種情況都得到 turn = i。∎\n\nL2 解釋剩下 4 個：cw1、wc0 直接違反；cc0 與 cc1 則是把 L2 同時套在兩人身上得到 turn = 0 且 turn = 1——矛盾，所以 **⟨c, c, ·⟩ 根本不可能可達，這正是 `MutualExclusion` 的「為什麼」**，而不只是「窮舉後沒看到」。\n\n對帳閉合：32 候選 − L1 殺 8 − L2 殺 4 = **20** ✓，與 BFS 一致。第三重複核：20 個狀態配成 10 對鏡像、34 條邊也兩兩成對（抽查：ws1 -T1→ ww0 的鏡像是 sw0 -T0→ ww1 ✓；cw0 -X0→ nw0 的鏡像是 wc1 -X1→ wn1 ✓），對稱無破口。\n\n最後預告：FlagSync ∧ L1 ∧ L2 ∧ TypeOK 這一包，其實就是 Peterson 的 **inductive invariant**（ch14 的主角）的雛形——它蘊涵 `MutualExclusion`，而且每步保持。本章用 BFS「走」出了它；ch14 教你在狀態空間大到走不完（或無限）時，不靠窮舉、直接對任意參數**證**出同樣的結論。這是「20 個狀態的窮舉」與「定理」之間的橋。\n\n## Deadlock、starvation 與 fairness\n\nsafety 結案了，換 liveness。先把兩個常被混用的詞釘死：\n\n| | deadlock | starvation |\n|---|---|---|\n| 定義 | 系統卡死：到達某狀態後，再也沒有任何（非 stuttering 的）動作 enabled | 系統整體有進展，但某個 process 永遠等不到它要的 |\n| 在圖上長什麼樣 | **節點性質**：一個沒有出邊的節點 | **無限路徑性質**：單看任何節點看不出來，要看整條 behavior |\n| 屬於哪類 | 有限前綴就能反駁 ⇒ 可當 safety 檢（TLC 的 deadlock check，見 ch09） | 純 liveness，要配 fairness 才談得下去（ch07） |\n\n天真方案的 ww 是 deadlock 的標本。掃一眼 Peterson 的總表：**20 個狀態每個都至少一條出邊——無 deadlock 節點**。這條等於免費驗掉了 deadlock-freedom 的 safety 面。\n\nstarvation 呢？先寫下主張與它需要的燃料：\n\n```tla\nTrying(i) == pc[i] \\in {\"set\", \"wait\"}\n\nStarvationFree == \\A i \\in Procs : Trying(i) ~> (pc[i] = \"cs\")\n\nFairSpec == Spec /\\ \\A i \\in Procs :\n              /\\ WF_vars(SetTurn(i))\n              /\\ WF_vars(Enter(i))\n              /\\ WF_vars(Exit(i))\n```\n\n三件事要說清楚。\n\n**第一，沒有 fairness 時 StarvationFree 必假。**ch06 念過的咒語：□[Next]_vars 是允許清單，不是待辦清單。反例便宜到難堪——behavior 走到 ww0 之後永遠 stuttering：Spec 完全允許，Enter(0) 永遠 enabled 卻永遠不被執行。注意這不是演算法的錯，是調度器的懶惰；fairness 公理的職責正是把這種「明明能走卻永遠不走」的 behavior 排除出考慮範圍（ch07）。\n\n**第二，Request 故意不加 fairness。**規則 2 說 process 有權永遠待在 ncs。如果你給 Request 加了 WF，spec 就主張「每個人都會一直想進臨界區」——這是對現實撒謊，而且會讓某些以「對手永遠不來」為前提的性質空洞地變化。fairness 不是越多越好，是「對誰承諾、就對誰負責」的精確選擇。\n\n**第三，WF 就夠了，不需要 SF。**這點值得證一遍，因為它揭露 Peterson 第二個精巧之處。對 process 0（對 1 對稱）：\n\n⟨1⟩1. 反設某條滿足 FairSpec 的 behavior 裡，0 從某時刻起 Trying(0) 恆真、永遠進不了 cs。\n⟨1⟩2. 0 不會永遠停在 \"set\"：SetTurn(0) 的 guard 只看 pc[0]，持續 enabled，WF 逼它發生。所以從某時刻起 pc[0] = \"wait\" 恆真。\n⟨1⟩3. 從那時起，turn 一旦變成 0 就永遠是 0：把 turn 寫成 1 的唯一動作是 SetTurn(0)，它需要 pc[0] = \"set\"——不再可能。\n⟨1⟩4. 情況 A：某時刻 turn = 0。由 ⟨1⟩3 此後恆 0，Enter(0) 的 guard 靠 turn = 0 持續成立，WF(Enter(0)) 逼它發生，0 進 cs。與 ⟨1⟩1 矛盾。\n⟨1⟩5. 情況 B：turn = 1 恆真。看 pc[1] 在哪：\n  ⟨2⟩1. \"set\"：WF(SetTurn(1)) 逼它讓位，turn := 0——回到情況 A，矛盾。\n  ⟨2⟩2. \"wait\"：turn = 1 使 Enter(1) 持續 enabled，WF 逼 1 進 cs，轉 ⟨2⟩3。\n  ⟨2⟩3. \"cs\"：WF(Exit(1)) 逼 1 離開，flag[1] := FALSE，轉 ⟨2⟩4。\n  ⟨2⟩4. \"ncs\"：若 1 永遠待著，flag[1] = FALSE 持續成立，Enter(0) 持續 enabled，WF 逼 0 進場——矛盾；若 1 再度 Request（允許但不強迫），它來到 \"set\"，回 ⟨2⟩1——矛盾。\n  ⟨2⟩5. Q.E.D. 每條路都通向矛盾。\n⟨1⟩6. Q.E.D. StarvationFree 在 FairSpec 下成立。\n\nWF 何以足夠？回想 ch07 的分工：WF 對付「持續 enabled」，SF 對付「enabled 閃爍不定」。Peterson 給了等待者一個**單調性**保證（⟨1⟩3）：turn 對你不利的值只會被翻成有利、不會翻回去——你的 Enter 一旦因 turn 而 enabled 就不再熄滅，所以最便宜的 WF 就能收割。如果一個演算法裡兩個 process 會反覆打掉對方的 guard，liveness 就得乞求 SF 甚至更多——ch12 的 Paxos 會讓你見識活性處境惡劣得多的世界。\n\n順手收割一個更強的結論：圖上能直接**看見**有界等待（bounded waiting）。從 ww1（兩人都在等、輪到 1）出發走非 stuttering 步，路徑被圖逼死：\n\nww1 →E1→ wc1 →X1→ wn1 →R1→ ws1 →T1→ ww0 →（E1 被擋，唯一出路）E0→ cw0\n\n對手 1 插隊**恰好一次**之後，它自己的第二次讓位（T1）把 turn 還給 0，從此它被擋在門外、0 必然是下一個進場者。更一般地：圖上所有避開「pc₀ = c」的環，都是 pc₀ = n 的環（0 根本沒在排隊；例如 nn0 → ns0 → nw0 → nc0 → nn0）——0 一旦舉旗，圖上**不存在**讓 1 連刷兩次臨界區的路徑（試著從 sn0 或 wn1 讓 1 繞圈，會在 sw0／ww0 撞牆）。這就是 ch09 說的「liveness 檢查＝在狀態圖上找滿足 fairness 的壞循環」：我們手工掃完了所有循環，壞循環不存在，剩下的 starvation 反例只有懶調度器一族，全數被 WF 沒收。\n\n## 陷阱與防禦\n\n互斥這個題目小，但它暴露的建模陷阱張張都是通用款。照本書固定問法：它怎麼給你假安全感、你怎麼發現。\n\n| 故障模式 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 原子粒度作弊 | 把「舉旗＋讓位」合併成一步，或把 await 的兩讀合成一讀，狀態空間縮小、反例消失——你驗過的是一個硬體做不到的演算法，報告卻全綠 | 每個動作旁問一句「硬體／runtime 真能一步做完嗎」；做了約化就白紙黑字寫下來（本章聲明 2），並交代為什麼結論不因此失效 |\n| 只驗 safety，不問進展 | 天真方案 `MutualExclusion` 全綠，因為它很快死鎖——什麼都不發生的系統不違反任何 safety | 每張 safety 綠燈旁邊放一個問題：「那它會前進嗎？」至少檢查圖上有無零出邊節點（deadlock check 是便宜的） |\n| 把 deadlock-freedom 當 starvation-freedom | 「系統整體有吞吐」聽起來像沒問題，但個體可以餓死——連線池搶不到的那個服務就是反例 | 兩條性質分開寫、分開驗：「有人進得去」與「每個想進的人進得去」是不同的時序公式 |\n| liveness 主張不寫 fairness | StarvationFree 在裸 Spec 下被「永遠 stuttering」秒殺，而 spec 不會警告你忘了加燃料（ch07 主軸重演） | 寫 liveness 必同時寫明 fairness 給**哪些動作**；並反向檢查：哪些動作（如 Request）**不該**加 |\n| 讓位寫反：turn′ = i | 一字之差，互斥陣亡；更毒的是反例要 6 步、特定交錯才現形，隨手試幾條 trace 多半全綠 | 對關鍵行做變異測試：故意改壞 spec，確認你的驗證流程真的抓得到（紙上推演題 3 親手做一次） |\n| 紙上的 Peterson 直接上真硬體 | 本章全部論證建立在「每步原子、寫入立即可見」；弱記憶體模型下讀寫會重排，論證前提整包作廢 | 模型假設寫在 spec 旁邊；工程上用語言／平台的同步原語，不要手刻演算法（一句話聲明＋延伸閱讀，本書不展開） |\n| 「2 個 process 驗過＝n 個也對」 | 我們窮舉的是 {0, 1} 這個配置；Peterson 的 n-process 推廣是另一個演算法、需要另一次驗證 | 把「驗過的配置」寫進結論裡（ch09 的 small scope：窮舉的辯護與限度）；推廣請另開一局 |\n\n## 紙上推演\n\n### 題 1：站在一個狀態，把八個動作問一遍（[10 分鐘] ★）\n\n(a) 用 spec 逐合取驗證 ws1 -T1→ ww0 這條邊（unprimed 用 ws1、primed 用 ww0，ch06 的手追法）。\n(b) 站在 cw0，把 R0、T0、E0、X0、R1、T1、E1、X1 八個動作逐一判斷 enabled 與否；不 enabled 的，指出是哪個 guard 擋的。\n\n### 推演解答\n\n(a) T1 ＝ SetTurn(1) 的四個著落，對 ⟨w, s, 1⟩ → ⟨w, w, 0⟩：\n\n- pc[1] = \"set\"？ws1 的第二碼是 s ✓\n- turn′ = Other(1) = 0？ww0 的 turn 是 0 ✓\n- pc′ = [pc EXCEPT ![1] = \"wait\"]？pc₀ 不動（w → w）、pc₁ 改成 w ✓\n- UNCHANGED flag？把縮寫展開：ws1 的 flag 是 (TRUE, TRUE)（兩個 pc 都在非 ncs 側），ww0 也是 (TRUE, TRUE)，相等 ✓\n\n四個合取全真，邊成立。終點 ww0 無人在 cs，`MutualExclusion` 保持 ✓。\n\n(b) cw0 ＝ ⟨pc₀ = \"cs\", pc₁ = \"wait\", turn = 0⟩，flag 兩面都 TRUE（FlagSync）：\n\n- R0 ✗（pc[0] ≠ \"ncs\"）、T0 ✗（pc[0] ≠ \"set\"）、E0 ✗（pc[0] ≠ \"wait\"）、**X0 ✓**（pc[0] = \"cs\"）→ nw0\n- R1 ✗（pc[1] ≠ \"ncs\"）、T1 ✗（pc[1] ≠ \"set\"）、X1 ✗（pc[1] ≠ \"cs\"）\n- **E1 ✗**：pc[1] = \"wait\" 過了第一關，但 guard 第二行——flag[0] = TRUE 且 turn = 0 ≠ 1——兩個 disjunct 都假\n\n唯一出路 X0。這格就是互斥的最前線：1 已經到門口，擋住它的是「0 的旗還舉著」加「turn 不站在 1 這邊」。注意 E1 與其他七個的不同：別的 guard 只看自己的 pc，E 的 guard 還要讀共享變數——這就是為什麼總表只替 E 寫「被擋原因」。\n\n### 題 2：先看再舉，親手抓出互斥破口（[15 分鐘] ★★）\n\n天真方案 B：「先確認對方旗子沒舉，再舉自己的旗」。\n\n```text\nawait flag[1-i] = FALSE;   \\* 看：對方沒舉旗\nflag[i] := TRUE;           \\* 舉旗\n臨界區;\nflag[i] := FALSE;\n```\n\npc 三個位置：n（將檢查）、p（檢查已通過、將舉旗）、c（臨界區）；動作 C(i)（n → p，guard：flag[1−i] = FALSE）、S(i)（p → c，舉旗）、X(i)（c → n，放旗）。注意這裡 flag[i] = TRUE 若且唯若 pc_i = c。請手推一條打破 `MutualExclusion` 的 behavior，並指出反例的最短步數。\n\n### 推演解答\n\n關鍵：檢查（C）與舉旗（S）之間有縫。讓兩人都先鑽過檢查：\n\n| 步 | 動作 | 狀態 ⟨pc₀, pc₁⟩ | flag |\n|---|---|---|---|\n| 0 | — | ⟨n, n⟩ | (F, F) |\n| 1 | C(0)：flag[1] = FALSE ✓ | ⟨p, n⟩ | (F, F) |\n| 2 | C(1)：flag[0] = FALSE ✓——0 還沒舉旗！ | ⟨p, p⟩ | (F, F) |\n| 3 | S(0) | ⟨c, p⟩ | (T, F) |\n| 4 | S(1) | ⟨c, c⟩ | (T, T) |\n\n第 4 步抵達 ⟨c, c⟩，`MutualExclusion` 陣亡，最短反例 **4 步**。這就是 check-then-act：檢查當下為真的事，到行動那一刻已經不是真的。你在 ch01 的結算 race（dedup 檢查與入帳之間被插隊）、在 `if not exists then insert` 的每一次 code review 裡，見過它一百次。對照方案 A 與 Peterson：A 把「舉旗」放在「檢查」之前，堵住這個縫但換來死鎖；Peterson 同樣先舉旗，再用 turn 拆掉死鎖——順序與裁決，缺一不可。\n\n### 題 3：改一行，讓 Peterson 壞掉（[25 分鐘] ★★★）\n\n同事重構時手滑，把 SetTurn 的讓位寫反了：\n\n```tla\nSetTurn(i) == /\\ pc[i] = \"set\"\n              /\\ turn' = i          \\* 原版是 Other(i)\n              /\\ pc' = [pc EXCEPT ![i] = \"wait\"]\n              /\\ UNCHANGED flag\n```\n\n「turn 設成自己，輪到我，很合理啊。」請手推一條打破 `MutualExclusion` 的 behavior（狀態縮寫沿用本章三碼記法），並回答：為什麼同樣的交錯在原版 Peterson 走不通？\n\n### 推演解答\n\n讓位寫反後，「最後表態的人」從等待者變成插隊者。讓 0 先完整走到臨界區，再讓 1 姍姍來遲：\n\nnn0 →R0→ sn0 →T0（turn := 0）→ wn0 →E0（flag[1] = F ✓）→ cn0 →R1→ cs0 →T1（turn := 1）→ cw1 →E1（turn = 1 ✓）→ **cc1**\n\n**6 步**抵達 ⟨c, c, 1⟩。第 5 步是兇案現場：1 讓位給**自己**，把 0 在場內這個事實直接蓋掉；第 6 步 E1 的 guard 靠 turn = 1 放行，兩人同處臨界區。\n\n原版同樣的交錯走到第 5 步：T1 寫的是 turn := 0，狀態是 cw0——查總表 #18，E1 被「flag[0] = TRUE 且 turn = 0」擋死，1 只能等 0 離場。一模一樣的調度，一個字的差別。兩個教訓：第一，「讓位給對方」不是禮貌是 safety 機制——它保證後到者把優先權判給先到者，正是 L2 引理的內容；第二，這個反例要 6 步、要特定的「一快一慢」交錯，手測幾條 happy path 根本碰不到（ch01 的調度爆炸重演）。改壞一行、確認驗證流程抓得到，是檢驗「你的驗證是不是擺設」最便宜的辦法。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 互斥問題的計分板上有哪三條性質？各屬 safety 還是 liveness？starvation-freedom 與 deadlock-freedom 誰強誰弱、差距的工程含義是什麼？\n2. 天真兩 flag 方案的 deadlock 為什麼「不是機率問題」？說出那個狀態、到它的最短路徑，以及為什麼這個方案的 `MutualExclusion` 檢查反而全綠。\n3. 重建 128 → 32 → 20 兩次縮減：各靠什麼？第一次縮減用到了 ch05 的哪個工具？\n4. 不看書，講出 L1（讓位有記錄）的論證骨架：誰最後寫了 turn、為什麼之後沒人再寫、被卡住的是誰。再用 L2 解釋為什麼 ⟨c, c, ·⟩ 不可達。\n5. deadlock 與 starvation 在狀態圖上分別「長什麼樣」？為什麼前者可以當 safety 檢、後者必須談 fairness？\n6. StarvationFree 為什麼 WF 就夠、不需要 SF？關鍵的單調性是哪一條？哪個動作刻意**不**加 fairness、為什麼？\n7. 本章的「每步原子」假設具體簡化了哪兩處？哪一處是安全的約化、哪一處在真硬體上會出事？\n8. 從圖上指出「對手最多插隊一次」的證據：哪條路徑、在哪個狀態被堵死？\n\n## 延伸閱讀\n\n- **G. L. Peterson, \"Myths About the Mutual Exclusion Problem\", Information Processing Letters 12(3), 1981, pp. 115–116**——原始論文，兩頁。看一個傳世演算法可以多短，也看 1981 年的正確性論證跟你本章做的手推差在哪。\n- **E. W. Dijkstra, \"Solution of a Problem in Concurrent Programming Control\", CACM 8(9), 1965**：`https://cacm.acm.org/research/solution-of-a-problem-in-concurrent-programming-control/`——互斥問題的開山之作，一頁紙，n 個 process。Dekker 的兩 process 解則記載於 Dijkstra 的講義《Cooperating Sequential Processes》（EWD 123）。\n- **Lamport 網站上的 Peterson 短文**：`https://lamport.azurewebsites.net/tla/peterson.html`——用 PlusCal 寫 Peterson 並以 TLC 驗互斥與 starvation-freedom，await 粒度與本章相同（2026-06 查證）。讀它可以對照：機器跑出來的，跟你手推的同一張圖。\n- **tlaplus/Examples 的 Peterson spec**：`https://github.com/tlaplus/Examples/tree/master/specifications/locks_auxiliary_vars`——Peterson 對抽象 Lock 規格的 refinement，含 auxiliary variables。現在讀吃力是正常的，ch15 之後回來收割。\n- **M. Herlihy & N. Shavit, *The Art of Multiprocessor Programming*（書）**——第 2 章系統性地講互斥：Peterson、filter lock（n-process 推廣）、Lamport bakery，以及這些演算法在真實硬體（弱記憶體模型、cache）上的命運。本章「每步原子」假設之外的世界，從這裡開始。\n- **tlaplus/Examples 的 DijkstraMutex**：`https://github.com/tlaplus/Examples/tree/master/specifications/dijkstra-mutex`——Dijkstra 1965 原始 n-process 演算法的 PlusCal 版。想體會「為什麼 Peterson 被視為簡潔的奇蹟」，讀它最快。\n"}, {"id": "ch11-two-phase-commit", "file": "ch11-two-phase-commit.md", "group": "Part IV — 協議精讀", "title": "ch11 — Two-Phase Commit：把你寫過的交易正式化", "md": "# ch11 — Two-Phase Commit：把你寫過的交易正式化\n\n> **本章解決什麼問題**：ch10 手推了第一個協議，但那是單機記憶體裡的互斥；本章走進你的主場——分散式交易。我們對照 Lamport 的兩份原文 spec 精讀：TCommit 寫「交易承諾要什麼」，TwoPhase 寫「兩階段提交怎麼做」，而「TwoPhase 實作了 TCommit」這個主張本身就寫在 spec 的最後一行——這是 refinement 的活教材（正式機械見 ch15）。本章的核心論點：2PC 在 TM 故障時把 prepared 的 RM 卡死，這不是實作 bug，是「不犧牲一致性」的本質代價——我們會手推完整的 blocking scenario 證明給你看。「那能不能不卡？」由 ch12 的共識接手。\n\n## 從你已知的出發\n\n你大概沒親手寫過 two-phase commit，但你一定跟它的鬼魂打過交道。\n\nMySQL 跑 `XA RECOVER`，列出一排卡在 prepared 的交易，文件管它們叫 **in-doubt transaction**：本地工作做完了、資源鎖著、日誌寫了「我可以 commit」，然後就停在那裡，等一個永遠沒有回來的協調者告訴它最後一步往哪走。DBA 半夜被叫起來，對著這排殭屍交易決定手動 commit 還是 rollback——那一刻，人類就是備援的 transaction manager。你排查過的「懸掛交易」「鎖被一筆不明交易抱著不放」，十之八九就是這個形狀。\n\n另一條線索藏在你的結算 pipeline 的設計裡。跨服務的「扣庫存＋入帳」，你們沒有用分散式交易，而是用 SQS at-least-once 加 idempotent consumer 慢慢把最終一致性磨出來。這個「繞開」本身就是一張選票：團隊用腳投票表態 2PC 的代價——同步等待、協調者單點、卡住時全員抱鎖——付不起。至於補償交易（saga）那套繞法是另一本帳，本章不展開；本章要做的是把 2PC 這筆帳本身算清楚：它買到什麼、付出什麼、哪部分的代價是任何協議都躲不掉的。\n\n本章的精讀材料是 Lamport 的兩份原文 spec：`TCommit.tla` 與 `TwoPhase.tla`——它們正是 Lamport 影片課程第 5、6 講的主角，與 Gray–Lamport 的論文同一脈絡，現存於 tlaplus/Examples（本章引用 2026-06 抓取的 master 版本，原文照貼）。兩份合計不到 250 行，卻是一組教科書級的示範：**先寫問題、再寫協議**。TCommit 是需求文件——「什麼結局算對」；TwoPhase 是設計文件——「誰在何時憑什麼資訊動作」。你天天在寫的 API 契約與其背後實作，就是這兩層關係的工程版。\n\n配置沿全書基準：**1 個 TM（transaction manager，交易管理者）＋ 2 個 RM（resource manager，資源管理者）{r1, r2}**。\n\n## TCommit：先寫「什麼叫對」，再操心「怎麼做到」\n\n交易承諾（transaction commit）問題長這樣：一筆交易橫跨多個 RM——每個分庫、每個服務的本地交易各算一個。每個 RM 先各自做完本地工作，然後全體要對「這筆交易算不算數」收斂到同一個答案：**要嘛全 commit、要嘛全 abort**；而且只有在每個 RM 都表態過「我這邊可以 commit」之後，才允許任何人 commit。\n\nLamport 的 TCommit 模組把這個問題寫成 spec。開頭只有一個常數、一個變數：\n\n```tla\n------------------------------- MODULE TCommit ------------------------------\nCONSTANT RM       \\* The set of participating resource managers\nVARIABLE rmState  \\* `rmState[rm]' is the state of resource manager rm.\n-----------------------------------------------------------------------------\nTCTypeOK == \n  (*************************************************************************)\n  (* The type-correctness invariant                                        *)\n  (*************************************************************************)\n  rmState \\in [RM -> {\"working\", \"prepared\", \"committed\", \"aborted\"}]\n\nTCInit ==   rmState = [rm \\in RM |-> \"working\"]\n  (*************************************************************************)\n  (* The initial predicate.                                                *)\n  (*************************************************************************)\n```\n\n沒有 TM、沒有訊息、沒有網路。整個世界只有一個函數 rmState ∈ [RM → {\"working\", \"prepared\", \"committed\", \"aborted\"}]：每個 RM 處在四個狀態之一。TCTypeOK 是第一個 invariant（ch08 講過：型別正確幾乎總是第一條），TCInit 說所有 RM 從 \"working\" 出發。單一 RM 的局部視角是一張小狀態圖：\n\n```text\n ┌─────────┐  Prepare(r)   ┌──────────┐  Decide(r)：commit 分支    ┌───────────┐\n │ working │ ────────────→ │ prepared │ ─────────────────────────→ │ committed │\n └─────────┘               └──────────┘   guard：canCommit          └───────────┘\n      │                         │\n      │  Decide(r)：abort 分支  │\n      │  guard：notCommitted    │\n      ▼                         ▼\n ┌──────────────────────────────────┐\n │              aborted             │\n └──────────────────────────────────┘\n```\n\n四個狀態裡，\"committed\" 與 \"aborted\" 是終態（沒有出邊）；\"working\" 可以前進到 \"prepared\" 或直接放棄；\"prepared\" 只能往兩個終態走。讓這張圖「分散式起來」的是兩個 guard，它們定義在動作之前：\n\n```tla\ncanCommit == \\A rm \\in RM : rmState[rm] \\in {\"prepared\", \"committed\"}\n  (*************************************************************************)\n  (* True iff all RMs are in the \"prepared\" or \"committed\" state.          *)\n  (*************************************************************************)\n\nnotCommitted == \\A rm \\in RM : rmState[rm] # \"committed\" \n  (*************************************************************************)\n  (* True iff neither no resource manager has decided to commit.           *)\n  (*************************************************************************)\n```\n\n（原文這行註解有個小筆誤——\"neither no\"——照引不改，你讀的是真檔案，不是教科書的淨化版。）\n\n注意兩個 guard 的不對稱，這是整個問題的形狀：\n\n- **commit 要全票**：canCommit 是全稱量詞——每一個 RM 都得在 {\"prepared\", \"committed\"} 裡。一票未到，誰都不准 commit。\n- **abort 只要沒人越線**：notCommitted 只要求「還沒有任何人 commit」。abort 不需要全員同意——任何一個 RM 在表態前都可以單方面把整筆交易拖下水。\n\n動作只有兩個：\n\n```tla\nPrepare(rm) == /\\ rmState[rm] = \"working\"\n               /\\ rmState' = [rmState EXCEPT ![rm] = \"prepared\"]\n\nDecide(rm)  == \\/ /\\ rmState[rm] = \"prepared\"\n                  /\\ canCommit\n                  /\\ rmState' = [rmState EXCEPT ![rm] = \"committed\"]\n               \\/ /\\ rmState[rm] \\in {\"working\", \"prepared\"}\n                  /\\ notCommitted\n                  /\\ rmState' = [rmState EXCEPT ![rm] = \"aborted\"]\n\nTCNext == \\E rm \\in RM : Prepare(rm) \\/ Decide(rm)\n  (*************************************************************************)\n  (* The next-state action.                                                *)\n  (*************************************************************************)\n-----------------------------------------------------------------------------\nTCSpec == TCInit /\\ [][TCNext]_rmState\n```\n\nDecide 是兩個析取：commit 分支要求自己已 prepared 且 canCommit 全域成立；abort 分支允許從 \"working\" 或 \"prepared\" 出發，只要 notCommitted。讀到這裡你應該停下來，問一個工程師的問題：**canCommit 是讀遍所有 RM 狀態的全稱條件——現實裡哪個節點讀得到？**\n\n答案是：沒有任何節點讀得到，而且這正是重點。TCommit 不是協議，是**問題規格**。它假設了一個上帝視角，一步到位地說「當全員 prepared，某個 RM 可以變 committed」。它故意不回答「RM 怎麼知道全員 prepared」——那是協議的事。spec 的本分是先把「什麼叫對」釘死，再讓協議去操心「誰知道什麼」。你寫 API 契約時也是這樣：契約說「回 200 表示扣款成功且僅扣一次」，不說「內部用哪個鎖」。\n\n最後是本章的主角性質與 spec 的主張：\n\n```tla\nTCConsistent ==  \n  (*************************************************************************)\n  (* A state predicate asserting that two RMs have not arrived at          *)\n  (* conflicting decisions.                                                *)\n  (*************************************************************************)\n  \\A rm1, rm2 \\in RM : ~ /\\ rmState[rm1] = \"aborted\"\n                         /\\ rmState[rm2] = \"committed\"\n\nTHEOREM TCSpec => [](TCTypeOK /\\ TCConsistent)\n```\n\nTCConsistent 用 Unicode 寫出來：∀ rm1, rm2 ∈ RM : ¬(rmState[rm1] = \"aborted\" ∧ rmState[rm2] = \"committed\")——**不准有人 abort 的同時另一個人 commit**。這是一條狀態述語（沒有 prime），THEOREM 主張它（連同 TCTypeOK）在所有可達狀態成立，是 invariant。\n\n順手把 2 RM 配置的帳算一下。型別狀態共 4² = 16 個；我把轉移圖完整窮舉過，**可達的恰是 12 個**。缺席的 4 個很有意思：⟨aborted, committed⟩ 與 ⟨committed, aborted⟩ 正是 TCConsistent 的反例；⟨committed, working⟩ 與 ⟨working, committed⟩ 則違反「有人 commit ⇒ 全員至少 prepared 過」——被 canCommit 的全稱 guard 擋在門外。更妙的是：TCTypeOK ∧ TCConsistent 在 TCommit 上**直接就是 inductive 的**（ch05 的詞彙：每一步都保持，不需要強化）——因為 guard 把一致性所需的條件原封不動寫了進去。這一步的證明手感很好，留給紙上推演的題 1；你會在那裡看到 guard 怎麼一個字一個字地把壞結局堵死。\n\n## TwoPhase：把上帝視角拆成訊息\n\nTwoPhase 模組開頭的註解是一份誠實的簡化聲明，值得整段照讀：\n\n```tla\n(***************************************************************************)\n(* This specification describes the Two-Phase Commit protocol, in which a  *)\n(* transaction manager (TM) coordinates the resource managers (RMs) to     *)\n(* implement the Transaction Commit specification of module $TCommit$.  In *)\n(* this specification, RMs spontaneously issue $Prepared$ messages.  We    *)\n(* ignore the $Prepare$ messages that the TM can send to the               *)\n(* RMs.\\vspace{.4em}                                                       *)\n(*                                                                         *)\n(* For simplicity, we also eliminate $Abort$ messages sent by an RM when   *)\n(* it decides to abort.  Such a message would cause the TM to abort the    *)\n(* transaction, an event represented here by the TM spontaneously deciding *)\n(* to abort.\\vspace{.4em}                                                  *)\n(*                                                                         *)\n(* This specification describes only the safety properties of the          *)\n(* protocol--that is, what is allowed to happen.  What must happen would   *)\n(* be described by liveness properties, which we do not specify.           *)\n(***************************************************************************)\n```\n\n（註解裡的 `$...$` 與 `\\vspace` 是 Lamport 排版工具的標記，照引。）三條簡化逐一翻譯：\n\n1. **RM 自發送出 Prepared**，TM 不用先送「請準備」的請求——少一輪訊息，不影響本質。\n2. **RM 決定 abort 時不送訊息**——現實中這會觸發 TM abort；spec 裡直接讓 TM「自發地」abort，把「RM 拒絕」「逾時」「TM 自己反悔」等所有 abort 理由折疊成同一個非決定性動作。ch02 的老原則：建模「都可能」，不建模「為什麼」。\n3. **只寫 safety**——這份 spec 從頭到尾不承諾任何事「終將發生」。記住這句話，它是後面兩個關鍵討論（訊息建模、crash 建模）的鑰匙。\n\n變數從一個變成四個：\n\n```tla\nVARIABLES\n  rmState,       \\* $rmState[rm]$ is the state of resource manager RM.\n  tmState,       \\* The state of the transaction manager.\n  tmPrepared,    \\* The set of RMs from which the TM has received $\"Prepared\"$\n                 \\* messages.\n  msgs           \n```\n\nrmState 與 TCommit 的同名同型別——不是巧合，是為了最後那行 INSTANCE（稍後揭曉）。tmState 是 TM 自己的狀態；tmPrepared 是 TM 收過誰的 Prepared 訊息。注意 tmPrepared 與 rmState 的本質差異：**rmState 是事實，tmPrepared 是 TM 的知識**。TM 不能讀 rmState——它只能從訊息裡拼湊世界，而訊息永遠是過去式。分散式系統的全部難處被這兩個變數的距離概括了。\n\n而 msgs 的註解是全檔最值得偷學的一段建模技巧：\n\n```tla\n    (***********************************************************************)\n    (* In the protocol, processes communicate with one another by sending  *)\n    (* messages.  Since we are specifying only safety, a process is not    *)\n    (* required to receive a message, so there is no need to model message *)\n    (* loss.  (There's no difference between a process not being able to   *)\n    (* receive a message because the message was lost and a process simply *)\n    (* ignoring the message.)  We therefore represent message passing with *)\n    (* a variable $msgs$ whose value is the set of all messages that have  *)\n    (* been sent.  Messages are never removed from $msgs$.  An action      *)\n    (* that, in an implementation, would be enabled by the receipt of a    *)\n    (* certain message is here enabled by the existence of that message in *)\n    (* $msgs$.  (Receipt of the same message twice is therefore allowed;   *)\n    (* but in this particular protocol, receiving a message for the second *)\n    (* time has no effect.)                                                *)\n    (***********************************************************************)\n```\n\n拆開看，這段話做了兩個漂亮的推理：\n\n- **msgs 只增不減，卻不是在假設網路可靠**——恰恰相反。因為只寫 safety，沒有任何動作「必須」發生；「訊息遺失導致收不到」與「訊息躺在那裡但對方永遠不去收」產生的行為集合一模一樣。既然區分不出來，就不建模。遺失被 stuttering 吃掉了（ch06 的設計紅利在這裡兌現）。\n- **重複接收是允許的，但無害**——「收到訊息」被建模成「msgs 裡存在這則訊息」的 guard，同一則訊息可以觸發兩次接收動作。對這個協議無害，因為接收動作是冪等的：把已經 committed 的 RM 再 commit 一次，狀態不變。這就是你的 idempotent consumer 直覺，在 spec 裡的長相。\n\n代價也要誠實記帳：這個便宜佔得成，**全靠 safety-only 這個前提**。哪天你要寫 liveness（「每個 RM 終將決定」），「收不到＝不想收」的等價立刻失效——你得把遺失、重送、逾時搬回模型裡，msgs 也許就得換成 bag 或帶上投遞狀態（ch04 吵過的 set vs bag 在這裡復活）。\n\n剩下的宣告：\n\n```tla\nMessage ==\n  [type : {\"Prepared\"}, rm : RM]  \\cup  [type : {\"Commit\", \"Abort\"}]\n   \nTPTypeOK ==  \n  /\\ rmState \\in [RM -> {\"working\", \"prepared\", \"committed\", \"aborted\"}]\n  /\\ tmState \\in {\"init\", \"committed\", \"aborted\"}\n  /\\ tmPrepared \\subseteq RM\n  /\\ msgs \\subseteq Message\n\nTPInit ==   \n  /\\ rmState = [rm \\in RM |-> \"working\"]\n  /\\ tmState = \"init\"\n  /\\ tmPrepared   = {}\n  /\\ msgs = {}\n```\n\n（引用時略去原檔各定義上方的註解框，程式本體照原文逐字。）Message 是 record 的集合（ch04）：Prepared 訊息帶寄件人欄位 rm，Commit 與 Abort 是 TM 的廣播、不帶欄位、全集合只有一份——所以 2 RM 配置下 Message 恰有 4 個元素：P(r1)、P(r2)、Commit、Abort（本章後面用這組縮寫，P(r) ≜ [type ↦ \"Prepared\", rm ↦ r]）。\n\n七個動作，先看 TM 的三個：\n\n```tla\nTMRcvPrepared(rm) ==\n  /\\ tmState = \"init\"\n  /\\ [type |-> \"Prepared\", rm |-> rm] \\in msgs\n  /\\ tmPrepared' = tmPrepared \\cup {rm}\n  /\\ UNCHANGED <<rmState, tmState, msgs>>\n\nTMCommit ==\n  /\\ tmState = \"init\"\n  /\\ tmPrepared = RM\n  /\\ tmState' = \"committed\"\n  /\\ msgs' = msgs \\cup {[type |-> \"Commit\"]}\n  /\\ UNCHANGED <<rmState, tmPrepared>>\n\nTMAbort ==\n  /\\ tmState = \"init\"\n  /\\ tmState' = \"aborted\"\n  /\\ msgs' = msgs \\cup {[type |-> \"Abort\"]}\n  /\\ UNCHANGED <<rmState, tmPrepared>>\n```\n\n- **TMRcvPrepared(rm)**：guard 是「訊息存在」，效果是把 rm 記進自己的小本子 tmPrepared。注意 rmState 動都沒動——TM 收訊息是 TM 的事。\n- **TMCommit**：tmPrepared = RM——小本子集滿了——TM 才能決定 commit，並廣播 Commit 訊息。這就是 canCommit 的協議版實作：**用「收齊的訊息」代替「讀遍全域狀態」**。\n- **TMAbort**：只要還在 \"init\"，TM 隨時可以 abort 並廣播。沒有任何前提——這個非決定性吸收了所有現實裡的 abort 理由。\n\n再看 RM 的四個：\n\n```tla\nRMPrepare(rm) == \n  /\\ rmState[rm] = \"working\"\n  /\\ rmState' = [rmState EXCEPT ![rm] = \"prepared\"]\n  /\\ msgs' = msgs \\cup {[type |-> \"Prepared\", rm |-> rm]}\n  /\\ UNCHANGED <<tmState, tmPrepared>>\n  \nRMChooseToAbort(rm) ==\n  /\\ rmState[rm] = \"working\"\n  /\\ rmState' = [rmState EXCEPT ![rm] = \"aborted\"]\n  /\\ UNCHANGED <<tmState, tmPrepared, msgs>>\n\nRMRcvCommitMsg(rm) ==\n  /\\ [type |-> \"Commit\"] \\in msgs\n  /\\ rmState' = [rmState EXCEPT ![rm] = \"committed\"]\n  /\\ UNCHANGED <<tmState, tmPrepared, msgs>>\n\nRMRcvAbortMsg(rm) ==\n  /\\ [type |-> \"Abort\"] \\in msgs\n  /\\ rmState' = [rmState EXCEPT ![rm] = \"aborted\"]\n  /\\ UNCHANGED <<tmState, tmPrepared, msgs>>\n```\n\n四個動作裡藏著本章最重要的一行 guard：**RMChooseToAbort 要求 rmState[rm] = \"working\"**。一旦 prepared，RM 就喪失單方面 abort 的權利——之後它的命運只剩兩條路：RMRcvCommitMsg 或 RMRcvAbortMsg，兩條都握在 TM 廣播的訊息手裡。「prepared」這個詞的真正語意就是**交出自決權**：我已經把「可以 commit」說出口，從此聽憑發落。blocking 的種子就埋在這行 guard 裡——先記住它，worked example 會回來收割。\n\n收尾三行：\n\n```tla\nTPNext ==\n  \\/ TMCommit \\/ TMAbort\n  \\/ \\E rm \\in RM : \n       TMRcvPrepared(rm) \\/ RMPrepare(rm) \\/ RMChooseToAbort(rm)\n         \\/ RMRcvCommitMsg(rm) \\/ RMRcvAbortMsg(rm)\n-----------------------------------------------------------------------------\nTPSpec == TPInit /\\ [][TPNext]_<<rmState, tmState, tmPrepared, msgs>>\n\nTHEOREM TPSpec => []TPTypeOK\n```\n\n狀態空間的帳：上界是 4²（rmState）× 3（tmState）× 2²（tmPrepared）× 2⁴（msgs）= 3072；實際可達 **56 個**（這兩個數字我把 2 RM 的轉移圖完整窮舉後數出來的，上界與前兩層展開你可以在紙上自行複核）。而原檔末尾的註解給了一個更大配置的數字，照引：\n\n```tla\n(***************************************************************************)\n(* The two theorems in this module have been checked with TLC for six      *)\n(* RMs, a configuration with 50816 reachable states, in a little over a    *)\n(* minute on a 1 GHz PC.                                                   *)\n(***************************************************************************)\n```\n\n從 2 個 RM 的 56 到 6 個 RM 的 50,816——state explosion 的手感（ch09）。也注意 Lamport 的措辭：theorems **checked with TLC for six RMs**。有限配置的窮舉不是任意 RM 數的證明；真正的證明欠著，ch14 還。\n\n## 兩層關係：實作定理就寫在 spec 裡\n\nTwoPhase.tla 的最後一段，是本書反覆預告的 refinement 第一次以原文現身：\n\n```tla\n(***************************************************************************)\n(* We now assert that the Two-Phase Commit protocol implements the         *)\n(* Transaction Commit protocol of module $TCommit$.  The following         *)\n(* statement defines $TC!TCSpec$ to be formula $TCSpec$ of module           *)\n(* $TCommit$.  (The TLA$^+$ \\textsc{instance} statement is used to rename  *)\n(* the operators defined in module $TCommit$ avoids any name conflicts     *)\n(* that might exist with operators in the current module.)                 *)\n(***************************************************************************)\nTC == INSTANCE TCommit \n\nTHEOREM TPSpec => TC!TCSpec\n```\n\n兩行，一個世界觀。`TC == INSTANCE TCommit` 把 TCommit 模組整份搬進來，所有名字前掛 `TC!`；TCommit 的 CONSTANT RM 與 VARIABLE rmState 用本模組的同名者代換（同名時代換是隱式的；改名要用 WITH，正式語意見 ch15）。於是 `TC!TCSpec` 就是「用 TwoPhase 的 rmState 講出來的 TCSpec」。然後：\n\n**THEOREM TPSpec ⇒ TC!TCSpec**——TwoPhase 的每一條合法 behavior，都是 TCommit 允許的 behavior。實作正確＝一條蘊涵式（ch06 埋的伏筆原句兌現）。\n\n```text\n┌────────────────────────────────────────────────────┐\n│ TCommit（問題層）                                  │\n│ 變數：只有 rmState                                 │\n│ 說的是「什麼結局合法」                             │\n└────────────────────────────────────────────────────┘\n           ▲\n           │  THEOREM TPSpec => TC!TCSpec\n           │  TwoPhase 的每條行為，遮住 TM 與訊息\n           │  之後，都是 TCommit 允許的行為\n┌────────────────────────────────────────────────────┐\n│ TwoPhase（協議層）                                 │\n│ 變數：rmState、tmState、tmPrepared、msgs           │\n│ 說的是「誰在何時憑什麼資訊動作」                   │\n└────────────────────────────────────────────────────┘\n```\n\n這條蘊涵為什麼有機會成立？把鏡頭只對準 rmState，逐動作對照——TwoPhase 的每一步，在「只看 rmState 的觀察者」眼裡是什麼：\n\n| TwoPhase 的一步 | 在 TCommit 眼裡 |\n|---|---|\n| RMPrepare(r) | Prepare(r) |\n| RMChooseToAbort(r) | Decide(r) 的 abort 分支 |\n| RMRcvCommitMsg(r)，r 原為 \"prepared\" | Decide(r) 的 commit 分支 |\n| RMRcvCommitMsg(r)，r 已為 \"committed\" | stuttering（rmState 沒動） |\n| RMRcvAbortMsg(r)，r 原為 \"working\" 或 \"prepared\" | Decide(r) 的 abort 分支 |\n| RMRcvAbortMsg(r)，r 已為 \"aborted\" | stuttering |\n| TMRcvPrepared(r)、TMCommit、TMAbort | stuttering |\n\nTM 的三個動作只碰 tmState、tmPrepared、msgs——對只看 rmState 的觀察者，這些步什麼都沒發生。**ch06 的時鐘寓言在此完整重演**：TwoPhase 是時分時鐘，TCommit 是小時鐘；TM 與訊息是「分針」，stuttering 條款讓「實作比規格多動很多步」不構成違約。如果當初 TCSpec 寫成裸的 □TCNext（每步都得真的動 rmState），這條 THEOREM 一個字都成立不了。\n\n但這張表沒有看起來那麼便宜。每一格都偷偷依賴「可達狀態的事實」：RMRcvCommitMsg 要對映到 Decide 的 commit 分支，得先確認那一刻 canCommit 成立——也就是「Commit 訊息在 msgs 裡時，全員必在 {\"prepared\", \"committed\"}」。這句話憑什麼？憑一串環環相扣的可達性事實：Commit ∈ msgs ⇒ tmState = \"committed\" ⇒ tmPrepared = RM ⇒ 人人送過 Prepared ⇒ 沒有人還在 \"working\"，也沒有人 aborted。這串鏈條正是 ch14 要逐節鍛造的強化不變量；把這張表升格為定理的機械（refinement mapping），是 ch15 的主題。本章先讓你看見：**兩層關係不是文學比喻，是寫在 spec 裡、可以被證明的數學主張。**\n\n## Blocking：手推一場 TM 之死\n\n現在來驗證本章標題裡的指控。先把一件事說清楚，免得你帶著錯誤的期待讀原文：\n\n**Lamport 的 TwoPhase.tla 沒有建模 TM crash——原版裡找不到任何 crash 動作。**這不是疏漏，是 safety-only 的直接後果：spec 從不要求任何人動作，所以「TM 從此再也不動」本來就是合法行為——一條 TM 收齊 prepared 之後永遠 stuttering 下去的 behavior，原版 TPSpec 照單全收。換句話說，**blocking 場景在原版 spec 裡早就存在**，crash 與「永遠拖延」在行為集合上不可區分，正如訊息遺失與「永遠不收」不可區分。同一個建模哲學，用了兩次。\n\n那為什麼本章還要加 crash 動作？因為「卡住」是 liveness 層的指控，要把它說得字字有據，你需要能說出：「**即使**給足 fairness，prepared 的 RM 也走不出去」。ch07 教過，fairness 只能拯救 enabled 的動作——WF 說「持續 enabled 就終將發生」。對永遠 stuttering 的 TM，加上 WF(TMCommit) 就能逼它動起來，blocking 像是被「治好」了——但這是假象，治好的只是「懶」，不是「死」。要表達「死」，必須讓 TM 的動作從某一刻起**永遠不再 enabled**，這樣任何 fairness 都無計可施。這就得在狀態裡動手腳。\n\n於是，擴充版（**以下全部是本書外加，非 Lamport 原文**）：\n\n```tla\n\\* ---- 本書擴充：TM crash（非 Lamport 原文）----\n\nTMCrash == /\\ tmState = \"init\"\n           /\\ tmState' = \"crashed\"\n           /\\ UNCHANGED <<rmState, tmPrepared, msgs>>\n\nTPCrashNext == TPNext \\/ TMCrash\n\nTPCrashSpec == TPInit /\\ [][TPCrashNext]_<<rmState, tmState, tmPrepared, msgs>>\n```\n\n清點改了什麼、沒改什麼：\n\n- **變數一個都沒加、沒刪**。tmState 的值域多一個 \"crashed\"（TPTypeOK 的第二行要對應改成 `tmState \\in {\"init\", \"committed\", \"aborted\", \"crashed\"}`），其餘三個變數的型別原封不動。\n- **TMCrash 不碰 rmState、tmPrepared、msgs**。所以它在 TCommit 眼裡是 stuttering——上一節那張對照表加一列就好，兩層關係毫髮無傷；ch14 對 TCConsistent 的歸納證明裡，TMCrash 的 case 也是平凡的（不動 rmState 的步打不破只談 rmState 的述語）。\n- **只允許從 \"init\" crash**。從 \"committed\"/\"aborted\" crash 對 safety 沒有新內容（決定已經躺在 msgs 裡，RM 照樣收得到），徒增狀態；最小擴充就夠演示。\n- 建模的是 **crash-stop**：倒了就不再起來。真實 DB 的 TM 重啟後會讀災後日誌續傳——那是縮短 blocking 時間的工程手段，不在本章模型裡（它消除不了 blocking 視窗本身）。\n- 還有一個誠實聲明：原文的 TMCommit 把「做決定」與「廣播 Commit」綁成原子的一步，所以教科書裡更細的「決定已寫進日誌、訊息還沒出門就倒了」的窗口，在這個抽象層**不存在**。我們的 crash 窗口是「收齊 prepared、尚未做決定」——對演示 blocking 的本質，足夠了。\n\n擴充後 2 RM 的可達狀態從 56 長到 72（同樣窮舉複核過）。值得一提：原版 56 個可達狀態裡，**每個狀態都至少有一個 enabled 的動作**（哪怕只是把同一則訊息再收一次），逐狀態的「卡死檢查」會全綠；擴充版裡出現了 9 個「零後繼」狀態，其中 8 個含有被永遠卡住的 prepared RM（另 1 個是全員已 abort、單純無事可做）。現在，手推最痛的那一條。\n\n### Worked example：收齊 prepared 之後，TM 倒下\n\n縮寫沿用：P(r) ≜ [type ↦ \"Prepared\", rm ↦ r]，Commit 與 Abort 訊息記作 C、A。六個狀態、五步：\n\n| 狀態 | rmState[r1] | rmState[r2] | tmState | tmPrepared | msgs |\n|---|---|---|---|---|---|\n| s₀ | working | working | init | {} | {} |\n| s₁ | prepared | working | init | {} | {P(r1)} |\n| s₂ | prepared | prepared | init | {} | {P(r1), P(r2)} |\n| s₃ | prepared | prepared | init | {r1} | {P(r1), P(r2)} |\n| s₄ | prepared | prepared | init | {r1, r2} | {P(r1), P(r2)} |\n| s₅ | prepared | prepared | crashed | {r1, r2} | {P(r1), P(r2)} |\n\n逐步驗證，unprimed 用步前狀態、primed 用步後狀態（手法同 ch06 的 worked example）：\n\n**起點**：s₀ 滿足 TPInit？rmState 全 \"working\" ✓；tmState = \"init\" ✓；tmPrepared = {} ✓；msgs = {} ✓。過。\n\n**步 1：⟨s₀, s₁⟩ 是 RMPrepare(r1)**。\n- rmState[r1] = \"working\"？s₀ 裡是 ✓\n- rmState′ = [rmState EXCEPT ![r1] = \"prepared\"]？s₁：r1 ↦ prepared，r2 ↦ working（沒動）✓\n- msgs′ = msgs ∪ {P(r1)}？{} ∪ {P(r1)} = {P(r1)} ✓\n- UNCHANGED ⟨tmState, tmPrepared⟩？\"init\" 與 {} 原封不動 ✓\n\n**步 2：⟨s₁, s₂⟩ 是 RMPrepare(r2)**。\n- rmState[r2] = \"working\"？s₁ 裡是 ✓\n- rmState′：只有 r2 那格改成 \"prepared\" ✓\n- msgs′ = {P(r1)} ∪ {P(r2)} = {P(r1), P(r2)} ✓\n- UNCHANGED ⟨tmState, tmPrepared⟩ ✓\n\n**步 3：⟨s₂, s₃⟩ 是 TMRcvPrepared(r1)**。\n- tmState = \"init\"？✓\n- P(r1) ∈ msgs？P(r1) ∈ {P(r1), P(r2)} ✓\n- tmPrepared′ = tmPrepared ∪ {r1} = {} ∪ {r1} = {r1} ✓\n- UNCHANGED ⟨rmState, tmState, msgs⟩？三者在 s₃ 與 s₂ 相同 ✓\n\n**步 4：⟨s₃, s₄⟩ 是 TMRcvPrepared(r2)**。\n- tmState = \"init\"？✓\n- P(r2) ∈ msgs？✓\n- tmPrepared′ = {r1} ∪ {r2} = {r
