質從合取項裡畢業，這是強化迴圈收斂時常見的好結局。定稿：\n\n```tla\nIndTP == /\\ TPTypeOK\n         /\\ \\A r \\in RM :\n              rmState[r] = \"committed\" => [type |-> \"Commit\"] \\in msgs\n         /\\ [type |-> \"Commit\"] \\in msgs => tmState = \"committed\"\n         /\\ [type |-> \"Abort\"]  \\in msgs => tmState = \"aborted\"\n         /\\ \\A r \\in RM :\n              r \\in tmPrepared => [type |-> \"Prepared\", rm |-> r] \\in msgs\n         /\\ \\A r \\in RM :\n              [type |-> \"Prepared\", rm |-> r] \\in msgs => rmState[r] # \"working\"\n         /\\ \\A r \\in RM :\n              rmState[r] = \"aborted\" => \\/ [type |-> \"Abort\"] \\in msgs\n                                        \\/ [type |-> \"Prepared\", rm |-> r] \\notin msgs\n         /\\ [type |-> \"Commit\"] \\in msgs =>\n              \\A r \\in RM : rmState[r] \\in {\"prepared\", \"committed\"}\n```\n\n七條條款的角色卡（依出場順序 T、I1…I7）：\n\n| 條款 | 白話 | 主要在哪些歸納步當主力 |\n|---|---|---|\n| T（TPTypeOK） | 值域地基 | 處處墊底 |\n| I1 | committed 要有依據：有人 commit ⇒ C 在場 | 蘊涵步；TMAbort |\n| I2 | C 的寄件人只能是已 commit 的 TM | RMRcvAbortMsg；TMAbort、TMCrash |\n| I3 | A 的寄件人只能是已 abort 的 TM | TMCommit（排除 aborted）；RMRcvAbortMsg |\n| I4 | 小本子不說謊：記了誰就收過誰的信 | TMCommit |\n| I5 | 發過 Prepared 的人回不去 \"working\" | TMCommit；RMChooseToAbort |\n| I6 | aborted 的兩種身世：被通知，或從沒準備過 | TMCommit |\n| I7 | C 在場 ⇒ 全員就位（canCommit 的條款化） | RM 端全部四個動作；蘊涵步 |\n\n### 完整證明\n\n**定理**：TPCrashSpec ⇒ □TCConsistent（任意有限非空 RM 集合）。\n\n先立三條速記，給接下來 8 × 8 = 64 份義務裡的多數一行帳：\n\n- **速記一（未動照搬）**：某條款引用的變數本步全未變，其真值不可能變，照搬歸納假設。\n- **速記二（msgs 單調）**：每個動作至多往 msgs 加一封信、從不刪。所以「x ∈ msgs」形的**後件**不會因走步而由真變假；「x ∈ msgs」形的**前件**只在「本步加的恰是 x」時才可能由假轉真，「x ∉ msgs」形的析取只在同一情況下才可能由真變假。\n- **速記三（單格修改）**：動 rmState 的動作只改 r 那一格；∀ r̃ 形條款對 r̃ ≠ r 照搬，只需驗 r̃ = r 那格。\n\n封閉義務的總帳——動作 × 條款矩陣（◯ ＝ 一行帳：憑速記、guard 或效果直接結案，正文至多點名一句；● ＝ 需要動用歸納假設或多步推理，正文有編號步驟）：\n\n| 動作＼條款 | T | I1 | I2 | I3 | I4 | I5 | I6 | I7 |\n|---|---|---|---|---|---|---|---|---|\n| RMPrepare(r) | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ● |\n| RMChooseToAbort(r) | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ● | ● |\n| RMRcvCommitMsg(r) | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ● |\n| RMRcvAbortMsg(r) | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ● |\n| TMRcvPrepared(r) | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ | ◯ |\n| TMCommit | ◯ | ◯ | ◯ | ● | ◯ | ◯ | ◯ | ● |\n| TMAbort | ◯ | ● | ● | ◯ | ◯ | ◯ | ◯ | ● |\n| TMCrash | ◯ | ◯ | ● | ● | ◯ | ◯ | ◯ | ◯ |\n\n六十四格、十二格戲肉，而且半數擠在 I7 那一欄——封閉證明的劇本永遠是這樣：最強的條款打工最多。開證。\n\n⟨1⟩1. 起點：TPInit ⇒ IndTP。\n  T：rmState 全 \"working\"、tmState = \"init\"、tmPrepared = {}、msgs = {} 逐項在值域內。\n  其餘七條的前件逐一驗假：msgs = {} 殺死 I2、I3、I5、I7 的前件；tmPrepared = {} 殺死 I4 的；rmState 全 \"working\" 殺死 I1（無人 committed）與 I6（無人 aborted）的。七條全靠空洞成立。\n  這種空洞合法——義務一只問初始世界，而初始世界乾淨。警鈴要留給另一種空洞：前件在**所有可達世界**都假（見下一節）。這裡不是：worked 過的 trace 裡（ch11 的 s₀…s₅）每條前件都真實亮起過。\n⟨1⟩2. 封閉：設步前滿足 IndTP，TPCrashNext 拆掉 ∃ rm 量詞後分八類動作。\n  ⟨2⟩1. 情況 RMPrepare(r)（guard：rmState[r] = \"working\"；效果：r ↦ \"prepared\"、msgs 加 P(r)）。\n    ⟨3⟩1. I7′：若 C ∈ msgs，I7 給 rmState[r] ∈ {\"prepared\", \"committed\"}，與 guard 的 \"working\" 矛盾，故 C ∉ msgs；本步加的是 P(r) ≠ C，故 C ∉ msgs′，I7′ 空洞成立。（弦外之音：Commit 已在場的世界裡，RMPrepare 根本不該 enabled——條款在替協議看門。）\n    ⟨3⟩2. 對 r 自己：I1′ 前件假（prepared 不是 committed）；I5′ 後件直接真（prepared ≠ working）；I6′ 前件假。\n    ⟨3⟩3. 其餘：I2′、I3′（加的不是 C／A，前件不變，tmState 未動）；I4′（速記二，後件單調）；I1′、I5′、I6′ 對 r̃ ≠ r（速記三；I6 的 P(r̃) ∉ msgs 析取由速記二保住——加的是 P(r) 不是 P(r̃)）；T′ 直接。\n    ⟨3⟩4. Q.E.D.\n  ⟨2⟩2. 情況 RMChooseToAbort(r)（guard：\"working\"；效果：r ↦ \"aborted\"）。\n    ⟨3⟩1. P(r) ∉ msgs。理由：I5 的逆否——若 P(r) ∈ msgs 則 rmState[r] ≠ \"working\"，與 guard 矛盾。\n    ⟨3⟩2. I6′ 對 r：第二個析取成立——P(r) ∉ msgs′ = msgs，由 ⟨3⟩1（msgs 本步未動）。\n    ⟨3⟩3. I7′：同 ⟨2⟩1 ⟨3⟩1——C ∈ msgs 與 guard 的 \"working\" 不相容，故 C ∉ msgs = msgs′，空洞成立。\n    ⟨3⟩4. 對 r 自己：I1′ 前件假（aborted 不是 committed）；I5′ 後件真（aborted ≠ working）。其餘照三條速記。T′ 直接。\n    ⟨3⟩5. Q.E.D.（第〇輪在這個動作上卡死；定稿後 TCConsistent 甚至不必出場——「有人 committed 而我還能自發 abort」的世界被 I7 整個排除了。）\n  ⟨2⟩3. 情況 RMRcvCommitMsg(r)（guard：C ∈ msgs；效果：r ↦ \"committed\"）。\n    ⟨3⟩1. I7′：前件 C ∈ msgs′ 為真。步前 I7（前件由 guard 為真）給全員 ∈ {\"prepared\", \"committed\"}；本步只把 r 改成 \"committed\"，仍在 {\"prepared\", \"committed\"} 內。成立。\n    ⟨3⟩2. 對 r 自己：I1′ 後件真（guard 給 C ∈ msgs，而 msgs 本步未動）；I5′ 後件真；I6′ 前件假（committed 不是 aborted）。\n    ⟨3⟩3. 其餘照三條速記；T′ 直接。Q.E.D.（順帶：⟨3⟩1 說明步前 rmState[r] 已在 {\"prepared\", \"committed\"}——對已 committed 的 RM 重複投遞 Commit 是冪等的；ch11 引的原文註解「第二次收到同一訊息無效」在這裡有了證明級版本。）\n  ⟨2⟩4. 情況 RMRcvAbortMsg(r)（guard：A ∈ msgs；效果：r ↦ \"aborted\"）。\n    ⟨3⟩1. C ∉ msgs。理由：若 C ∈ msgs，I2 給 tmState = \"committed\"；guard 的 A ∈ msgs 配 I3 給 tmState = \"aborted\"——一個變數兩個值，矛盾。（「C 與 A 不可能同時在場」：不是條款，是 I2 ∧ I3 的推論。）\n    ⟨3⟩2. I7′：由 ⟨3⟩1，C ∉ msgs′ = msgs，前件假，空洞成立。\n    ⟨3⟩3. 對 r 自己：I6′ 第一析取真（A ∈ msgs′，guard）；I1′ 前件假；I5′ 後件真。\n    ⟨3⟩4. 其餘照三條速記；T′ 直接。Q.E.D.\n  ⟨2⟩5. 情況 TMRcvPrepared(r)（guard：tmState = \"init\"、P(r) ∈ msgs；效果：tmPrepared 加 r）。\n    引用 tmPrepared 的條款只有 I4：對 r，後件 P(r) ∈ msgs 由 guard 為真；對 r̃ ≠ r 照搬（速記三的 tmPrepared 版）。其餘七條的變數本步全未動（速記一）。Q.E.D.\n  ⟨2⟩6. 情況 TMCommit（guard：tmState = \"init\"、tmPrepared = RM；效果：tmState ↦ \"committed\"、msgs 加 C）。高峰的那一格。\n    ⟨3⟩1. I2′：前件 C ∈ msgs′ 真，後件 tmState′ = \"committed\" 真。\n    ⟨3⟩2. A ∉ msgs′。理由：若 A ∈ msgs，I3 給 tmState = \"aborted\"，與 guard 的 \"init\" 矛盾；本步加的是 C。於是 I3′ 前件假，空洞成立。\n    ⟨3⟩3. I7′：前件真，需全員 ∈ {\"prepared\", \"committed\"}（rmState 本步未動）。任取 r̃ ∈ RM：\n      ⟨4⟩1. r̃ ∈ tmPrepared。理由：guard tmPrepared = RM。\n      ⟨4⟩2. P(r̃) ∈ msgs。理由：I4 套在 ⟨4⟩1。\n      ⟨4⟩3. rmState[r̃] ≠ \"working\"。理由：I5 套在 ⟨4⟩2。\n      ⟨4⟩4. rmState[r̃] ≠ \"aborted\"。理由：反設 aborted，I6 給 A ∈ msgs ∨ P(r̃) ∉ msgs；右析取與 ⟨4⟩2 矛盾，左析取與 ⟨3⟩2 的推導（A ∉ msgs）矛盾。\n      ⟨4⟩5. Q.E.D. T 給四值，排掉兩個，剩 {\"prepared\", \"committed\"}。\n    ⟨3⟩4. 其餘：I1′ 後件恆真（C ∈ msgs′）；I4′ 速記二；I5′、I6′（加的是 C，P 訊息與 A 訊息的有無不變，rmState 未動）；T′ 直接。\n    ⟨3⟩5. Q.E.D.\n    把 ⟨3⟩3 讀慢一點：ch11 末尾那串鏈條沒有消失，它整條搬進了這一步——guard 是橋，I4、I5、I6、I3 是四節車廂。協議在 guard 裡寫下的每個字，終究會在某個歸納步裡變成你的彈藥；反過來說，**guard 上省掉的每個字，都會在某個歸納步上變成你的卡點**。\n  ⟨2⟩7. 情況 TMAbort（guard：tmState = \"init\"；效果：tmState ↦ \"aborted\"、msgs 加 A）。\n    ⟨3⟩1. I3′：前後件直接真。I6′：第一析取 A ∈ msgs′ 恆真，整條直接成立。\n    ⟨3⟩2. C ∉ msgs′。理由：若 C ∈ msgs，I2 給 tmState = \"committed\"，與 guard 的 \"init\" 矛盾；本步加的是 A。於是 I2′ 與 I7′ 前件假，空洞成立。\n    ⟨3⟩3. I1′：由 ⟨3⟩2 與 I1 的逆否，步前無人 \"committed\"；rmState 未動，前件依然假。\n    ⟨3⟩4. 其餘照速記（I4 後件單調；I5 前件不變）；T′ 直接。Q.E.D.\n  ⟨2⟩8. 情況 TMCrash（guard：tmState = \"init\"；效果：tmState ↦ \"crashed\"，其餘全未動）。\n    ⟨3⟩1. 引用 tmState 的條款只有 I2、I3（與 T）。兩條同型處理：前件成立會分別逼出 tmState = \"committed\"／\"aborted\"，皆與 guard 的 \"init\" 矛盾——故 C ∉ msgs 且 A ∉ msgs，而 msgs 未動，兩條在步後空洞成立。T′：\"crashed\" 在擴充值域內。\n    ⟨3⟩2. 其餘五條（I1、I4、I5、I6、I7）引用的變數本步一個都沒動，速記一照搬。\n    ⟨3⟩3. Q.E.D.\n    ch11 開的支票在此兌現：TMCrash 的 case 確實平凡——但精確的理由比「它不動 rmState」多一層：IndTP 裡有兩條談 tmState 的條款，殺死它們前件的是 crash 自己的 guard「只有還活在 \"init\" 的 TM 才能倒」。把 crash 放寬成任何狀態都能倒，這兩條就真的會破——紙上推演題 3 帶你修那個模型。\n  ⟨2⟩9. Q.E.D. 八類動作蓋住 TPCrashNext 的所有真步。\n⟨1⟩3. 蘊涵：IndTP ⇒ TCConsistent。反設某狀態滿足 IndTP 且 rmState[r1] = \"aborted\"、rmState[r2] = \"committed\"。I1 套 r2 給 C ∈ msgs；I7 給 rmState[r1] ∈ {\"prepared\", \"committed\"}，與 \"aborted\" 矛盾。∎\n⟨1⟩4. Q.E.D. 由不變量規則，TPCrashSpec ⇒ □IndTP；配 ⟨1⟩3 得 TPCrashSpec ⇒ □TCConsistent；原版 TPSpec 的行為是子集合，一併成立。∎\n\n### 高峰回望\n\n**買到的東西。**2 個 RM 的 72 個可達狀態、6 個 RM 的五萬個、一千個 RM 的天文數字——一次買斷。Lamport 寫的 checked，從這一頁起，在我們的模型上是 proved。\n\n**s_bad 死在哪一條。**回頭驗收：ch11 的 s_bad（committed 配 working、msgs 空）被 I1 在第一節就擋下——r1 committed 卻沒有 C。ch11 題 2 (d) 的預言「s_bad 在第一節就斷裂」，現在是定稿條款的一次點名。\n\n**I7 是 ch15 的預付款。**ch11 的兩層對照表裡，「RMRcvCommitMsg 對映到 Decide 的 commit 分支」欠的正是 canCommit 在那一刻成立——也就是 I7。ch15 把對照表升格成 refinement mapping 時，IndTP 就是你帶進場的彈藥庫：refinement 的逐步驗證幾乎總是「在 inductive invariant 的保護下」進行的。\n\n**七條沒有一條是靈感。**I1、I2、B（後來退役）來自第一個卡點，I7 來自第二個，I3、I6 是 I7 自己的歸納步逼出來的，I4、I5 是鏈條的零件。技藝的全部內容是紀律：卡了就讀，讀了就寫，寫了就重證，定稿前審計。\n\n## vacuous truth 的清算：空洞通過的歸納步\n\nch03 簽過一張支票：「歸納假設是整個歸納步的前件；如果它強到沒有任何狀態能滿足，歸納步會『證明成功』——空洞地。」現在兌現，用一份完整的假證明。\n\n同事也要證 v1 的 `NoDoublePay`，嫌強化麻煩，交出這份候選：\n\nStrongInd ≜ NoDoublePay ∧ dedup = Msgs\n\n他的證明：「義務二，逐動作——Fetch、Ack、Crash 不動 ledger 也不動 dedup，照搬；Credit 的 guard 要求 working[c] ∉ dedup，但 TypeOK 給 working[c] ∈ Msgs = dedup，**前件不可滿足，此案空洞通過**。義務三，第一個合取項就是目標。義務一，初始帳本乾淨，顯然滿足。Q.E.D.」\n\n每個歸納 case 都綠燈，蘊涵也綠燈，報告看起來無懈可擊。但你已經在 ch05 被訓練過：看到「顯然」就拔保險。義務一逐字驗——Init ⇒ StrongInd 要求 dedup = {} 等於 Msgs，而 ASSUME 說 Msgs 非空。**義務一不成立，整份證明作廢。**\n\n值得解剖的是這個錯為什麼這麼香。強化是有方向的誘惑：條款越強，歸納假設火力越大，歸納步越好過——極限就是強到把危險動作的 guard 直接堵死（Credit 在 StrongInd 的世界裡永遠不 enabled），歸納步全綠，**因為它什麼都沒檢查**。一份號稱保證「不重複入帳」的證明，從頭到尾沒有審過任何一次入帳——這跟 ch03 那個三個月沒亮過的退款 invariant、ch08 那座 N = 0 的空城，是同一隻鬼的第三次現身。\n\n三個義務是串聯的保險絲，這個例子展示了它們怎麼互相兜底：**歸納步借來的火力，起點要還**。強化是借貸，義務一是討債的。自我察覺的動作清單：\n\n1. **三義務逐項打勾，起點不是儀式。**你的 Ind 越強，Init ⇒ Ind 越可疑——它是「強過頭」唯一的出口檢查。\n2. **witness 紀律（ch03 的老警報器）。**對每個空洞通過的 case 問：有沒有**可達**狀態真的踏進這個 case？Credit 是唯一動 ledger 的動作，它的 case 空洞＝你的證明沒看過一次入帳。對照合法的空洞：IndTP 的起點七條全空洞，但每條前件在 worked trace 裡都真實亮起過——空洞發生在初始是日常，發生在「整個可達世界」是事故。\n3. **量一下 Ind 圈出的世界還能做什麼。**滿足 StrongInd 的狀態裡系統只剩 Fetch、Ack、Crash 在倒水——一個幾乎凍結的世界。把系統「證死」了，證的就是一座空城。\n\n## leads-to 淺談：liveness 證明長什麼樣\n\n本章到此全是 safety。liveness 的證明是另一座山，本書不爬（先說死），但站在埡口看一眼山形，值得五分鐘。\n\n你其實已經見過一個雛形：ch07 證 FairSpec ⇒ AllPaid 時用的遞減量尺 M ≜ 2·|queue| ＋ 忙碌數——每個真步讓 M 嚴格遞減、M 非負、M = 0 時全入帳。把那個論證放進正式的形狀，地基是 Lamport 的 WF1 規則（出自他 1994 年的 TLA 論文；此處按其形狀轉述、符號換成本書慣例）：要證 □[Next]_vars ∧ WF_vars(A) ⇒ (P ⤳ Q)，交三份作業——\n\n1. P ∧ [Next]_vars ⇒ (P′ ∨ Q′)——不做 A 的任何一步，要嘛留在 P、要嘛直接到 Q；\n2. P ∧ ⟨Next ∧ A⟩_vars ⇒ Q′——真的做了 A，就到 Q；\n3. P ⇒ ENABLED ⟨A⟩_vars——在 P 的世界裡，A 永遠可做。\n\n然後 fairness 收尾：A 不可以永遠可做卻永遠不做（ch07），所以困在 P 的行為終究被踢進 Q。注意前兩份作業都是**動作層的蘊涵**——跟歸納步同一種義務、同一種驗法；而且實際使用時 P 幾乎總是合取著你的 inductive invariant（不然連 ENABLED 都論證不動）。**safety 證明是 liveness 證明的地基**，這句話是字面意思。\n\n整條 liveness 證明的形狀於是浮現：用 WF1／SF1 鍛造一節一節的 P ⤳ Q，再用 ⤳ 的遞移性串鏈、用析取分案合流，長行為靠量尺壓陣——「M = k ⤳ M < k」對每個 k 成立，well-founded 的 ℕ 不允許無限遞減，所以 M ⤳ 0。歸納不變量是在**狀態上**做歸納，leads-to 鏈是在**量尺上**做歸納——同一把刀，換個磨法。SF 對應的規則（SF1）前提更繞，lattice 規則管無限分岔的鏈——到此打住；想看全套，Specifying Systems 第 8 章（ch07 延伸閱讀已列）是標準讀本。\n\n## 陷阱與防禦\n\nch05 的陷阱表全部繼續適用；下面是證明規模放大之後新長出來的坑。\n\n| 故障模式 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| 把目標當 Ind 直接證，卡住就懷疑性質是假的 | 卡死的挫折感像極了「性質不成立」 | 先校準預期：有意義的 safety 幾乎從不 inductive（Lamport：seldom the case）。卡住是迴圈的第一步，不是終點；判可達之前不准下結論 |\n| 歸納步偷用沒寫進條款的可達性事實 | 條款多了，「這種狀態實際上不會發生」混在十幾行推理裡不顯眼，還常披著「顯然」的皮 | 歸納步的彈藥清單只有四樣：歸納假設的條款、guard、效果、ASSUME。每一步指認彈藥來源；指認不出來的，要嘛是漏的條款（去強化），要嘛是循環論證 |\n| 64 格矩陣漏格 | 「這動作跟這條款無關」憑感覺跳過——漏的那格往往正是 bug 門；漏一格，整份證明無效 | 動作 × 條款矩陣逐格清帳；「未動」也是一格、也要一行理由（速記一不是免檢，是檢完的章） |\n| 強化過頭，歸納步空洞通過 | 歸納步全綠最快的方法是讓它檢查不到東西；StrongInd 的 Credit case 就是現場 | 義務一逐字驗；每個空洞 case 找可達 witness；問「滿足 Ind 的世界還能做什麼」 |\n| 條款堆積、互相糾纏、目標漂移 | 七八條條款疊完，證出來的東西跟當初的 S 失聯；或者死條款白繳維護稅 | 定稿審計：每條條款標注「被哪些格用到」，沒人用的刪掉重驗（B 的下場）；義務三白紙黑字重寫一遍 |\n| 小模型 TLC 掃過 Ind 就當證完 | 「Init ≔ Ind 跑一步沒紅」在 2 RM、0..2 上成立 ≠ 任意參數成立 | 角色分清：TLC 是歸納步的快篩（找壞前驅神速），定理還是要手上或機器上（ch16）走完三義務；反過來，動手證之前先讓 TLC 篩一輪，是聰明而不是作弊 |\n| 對模型成立 ≠ 對系統成立 | IndV1 全程站在「Credit 原子」與「dedup 永存」上；定理越漂亮，越容易忘記它的地基 | 把證明實際引用的 spec 假設抄成清單貼在定理旁（ch08 的抽象帳）；實作變更時拿清單對照，失配即失效 |\n\n## 紙上推演\n\n**題 1 [20 分鐘] ★★ — 三個候選，三種命運。**對 SettlementV1（含 TypeOK 為前提），判斷下列三個候選各是什麼身分：(i) 是 invariant 嗎？(ii) 是 inductive 嗎？(iii) 對證明 `NoDoublePay` 有用嗎？非 inductive 的要給出具體壞前驅；不是 invariant 的要指出可達反例。\n\n- (a) Inv_a ≜ ∀ m ∈ Msgs : ledger[m] ≤ 1\n- (b) Inv_b ≜ ∀ m ∈ Msgs : m ∈ dedup ⇒ ledger[m] ≥ 1\n- (c) Inv_c ≜ ∀ m ∈ Msgs : m ∈ queue ⇒ ledger[m] = 0\n\n### 推演解答\n\n(a) **是 invariant（本章主定理），不 inductive。**壞前驅即正文的 s_x：⟨queue = {m2}, working = (c1 ↦ m1, c2 ↦ \"idle\"), ledger = (m1 ↦ 1, m2 ↦ 0), dedup = {}⟩——滿足 Inv_a，Credit(c1) 一步打穿。不可達（DedupCovers 排除它），所以走強化分支——正文走完了。\n\n(b) **是 invariant，而且 inductive，但沒用。**封閉逐動作：只有 Credit 相干——對 m₀：dedup′ 收編 m₀ 而 ledger′[m₀] = ledger[m₀] + 1 ≥ 1（TypeOK 給 ledger[m₀] ∈ Nat）；對 m̃ ≠ m₀：dedup 對 m̃ 的隸屬與 ledger[m̃] 都未變。Fetch、Ack、Crash 不動兩個變數。起點：dedup = {}，空洞成立。三義務的死穴在第三條：Inv_b 對 ledger 只給**下界**，蘊涵不出 ≤ 1。這就是正文說的「雙向耦合多出來的那一半」：自己站得住，對目標毫無貢獻——**inductive 不等於有用，義務三把關**。\n\n(c) **根本不是 invariant。**直接歸納會在 Crash 卡住（c 手持已入帳的 m，crash 把 m 送回佇列），壞前驅是 ch08 危險路徑的 s₂——而這次它**可達**：ch08 那張表給了完整的三步 trace（s₀ →Fetch→ s₁ →Credit→ s₂），接上 Crash(c1) 就是反例，s₃ 本身就是 Inv_c 的可達反例（m1 ∈ queue 且 ledger[m1] = 1）。強化迴圈的「可達」分支長這樣：不要強化，舉反例，宣告性質為假。三個候選湊齊三種命運：真而不 inductive、inductive 而無用、假。判定永遠按這個順序問。\n\n**題 2 [15 分鐘] ★★ — 守恆強化。**派工機：常數 N ∈ ℕ（ASSUME N ≥ 1）；變數 pending（待派）、active（進行中）、closed（已結案），皆屬 ℕ。Init：pending = N ∧ active = 0 ∧ closed = 0。動作 Assign：前提 pending > 0，效果 pending 減一、active 加一。動作 Finish：前提 active > 0，效果 active 減一、closed 加一。目標：closed ≤ N。\n（a）直接歸納，找出卡點、寫出壞前驅、判可達。（b）強化並完成三義務的層級證明。\n\n### 推演解答\n\n（a）Assign 不動 closed，無事。Finish 卡：步前 closed ≤ N 容許 closed = N，配上 active ≥ 1，步後 closed′ = N + 1。壞前驅 ⟨pending = 0, active = 1, closed = N⟩（滿足 closed ≤ N，Finish enabled）。可達嗎？不可達——工單不會憑空增生：每張工單恆在三個桶子之一。這句話是守恆。\n\n（b）Sum ≜ pending + active + closed = N；IndJob ≜ TypeOK ∧ Sum（TypeOK：三變數 ∈ ℕ）。\n\n⟨1⟩1. 起點：N + 0 + 0 = N；三值皆 ∈ ℕ。\n⟨1⟩2. 封閉：分兩動作。\n  ⟨2⟩1. Assign：pending 減一、active 加一，和不變；guard pending > 0 保證 pending′ ∈ ℕ；closed 未動。\n  ⟨2⟩2. Finish：active 減一、closed 加一，和不變；guard active > 0 保證 active′ ∈ ℕ。\n  ⟨2⟩3. Q.E.D. 動作只有兩個。\n⟨1⟩3. 蘊涵：closed = N − pending − active ≤ N。理由：pending, active ∈ ℕ 故非負。\n⟨1⟩4. Q.E.D. ∎\n\n這是守恆量啟發法的第三次出場：ch05 的 copies(m)、ch08 題 2 的 free + held = N、這裡的三桶總和。同一招用到第三次，該進肌肉了：**看到「東西在桶子之間搬」的系統，第一個候選條款永遠是桶子總和。**另外注意 ⟨1⟩3 用了 TypeOK 的非負——「守恆＋型別」才蘊涵得出上界，單獨一條都不夠。\n\n**題 3 [30 分鐘] ★★★ — 在 IndTP 上動刀，驗兩個歸納步。**\n（a）把 ch11 題 3 的變體動作加進擴充版 TwoPhase：RMTimeoutAbort(r) ≜ rmState[r] = \"prepared\" ∧ rmState′ = [rmState EXCEPT ![r] = \"aborted\"] ∧ UNCHANGED ⟨tmState, tmPrepared, msgs⟩。對 IndTP 跑這個新動作的歸納步：哪些條款的哪些格會卡？卡點的壞前驅可達嗎？結論是什麼？\n（b）回到沒有 RMTimeoutAbort 的擴充版，把 TMCrash 的 guard 從 tmState = \"init\" 放寬成 TRUE（任何時候都能倒）。IndTP 的哪些條款在 TMCrash 的歸納步上破？給出最小修補，並指出修補波及哪些其他格。\n\n### 推演解答\n\n（a）逐條款過 RMTimeoutAbort(r)：T′ ✓；I1′ 對 r 前件假；I2′、I3′、I4′ 變數未動。卡在兩格。**I6′ 對 r**：步後 aborted，要 A ∈ msgs ∨ P(r) ∉ msgs——但 guard 只說 r 是 \"prepared\"，兩個析取都沒著落（正常準備過的 r 有 P(r) ∈ msgs 而 A 不在場）。**I7′**：若 C ∈ msgs，步前 I7 給 r ∈ {\"prepared\", \"committed\"}——prepared 滿足 guard，動作 enabled，步後 r 是 \"aborted\"，I7′ 直接破。把 I7 的卡點具體化：⟨rmState = (r1 ↦ \"committed\", r2 ↦ \"prepared\"), tmState = \"committed\", tmPrepared = RM, msgs = {P(r1), P(r2), C}⟩——逐條款驗它滿足 IndTP（I1 ✓、I2 ✓、I3 空洞、I4 ✓、I5 ✓、I6 空洞、I7 ✓）。可達嗎？**可達**——它正是 ch11 題 3 那條七步 trace 走到第 6 步的狀態。可達分支沒有回頭路：不必修補、不能修補，RMTimeoutAbort(r2) 接上去就是 TCConsistent 的反例，性質在這個變體上是假的。注意收穫：**證明的卡點直接指出設計的承重牆**——RMChooseToAbort 那行 \"working\" guard（ch11 說 blocking 的種子埋在那裡）拆掉的瞬間，I7 應聲而碎。證明不只是驗收工具，是定位工具。\n\n（b）放寬後 TMCrash 可以從 \"committed\"／\"aborted\" 倒下，tmState′ = \"crashed\"。**I2′ 破**：C ∈ msgs 且步前 tmState = \"committed\"（I2 容許），步後 tmState ≠ \"committed\"。**I3′ 對稱地破**。其餘六條不引用 tmState，照舊。最小修補：弱化兩條——I2w ≜ C ∈ msgs ⇒ tmState ∈ {\"committed\", \"crashed\"}；I3w ≜ A ∈ msgs ⇒ tmState ∈ {\"aborted\", \"crashed\"}（放寬 crash 後它們才是真話）。然後**重審所有用過 I2、I3 的格**（審計紀律）：⟨2⟩6 ⟨3⟩2 與 ⟨2⟩7 ⟨3⟩2 的論證形如「前件 ⇒ tmState ≠ \"init\" 與 guard 矛盾」——弱化版照樣給出 ≠ \"init\"，存活；⟨2⟩8 換一種活法——guard 沒了，但弱化後件被「直接保持」：從 \"committed\"／\"aborted\" 倒下落在 \"crashed\"，仍在弱化值域內。唯一斷裂的是 ⟨2⟩4 ⟨3⟩1 的 C ∧ A 互斥：I2w ∧ I3w 容許兩者並存於 tmState = \"crashed\"。把當初「當推論不當條款」的那句話請回來當條款：I8 ≜ ¬(C ∈ msgs ∧ A ∈ msgs)。驗它 inductive：TMCommit 加 C，需 A ∉ msgs——I3w 配 guard \"init\" 給出；TMAbort 對稱；其餘動作不加 C 也不加 A；放寬版 TMCrash 不動 msgs。⟨2⟩4 與 ⟨2⟩6 改用 I8 收口，全盤重新閉合。教訓有二：模型動一寸，invariant 動一尺，而且**動完要全矩陣重審**；「推論 vs 條款」的選擇不是一次性的——模型弱化時，便宜的推論會漲價成必要的條款。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 三個義務各是什麼？義務二嚴格說面對的是 [Next]_vars——為什麼 stuttering 步免費，所以證明只列真動作？\n2. 「invariant 為真」與「inductive」差在哪？用 s_bad 講一遍：它滿足什麼、打破什麼、為什麼歸納步必須照顧這個不可達的狀態？\n3. 強化迴圈的五個動作是什麼？「讀卡點」的三問是什麼？卡點可達與不可達各走哪條路——本章哪個例子走了可達分支？\n4. IndV1 的耦合條款怎麼讀（正讀與逆否）？整份證明為什麼不需要「訊息至多一份」的守恆？這對你的 pipeline 防線設計說了哪句話？\n5. IndTP 七條，每條一句白話角色。TMCommit 的 I7 步驟用到哪四條條款加哪個 guard？ch11 那條強化鏈在定稿證明裡搬到了哪裡？\n6. TMCrash 的 case 為什麼平凡？精確理由是什麼（不只是「不動 rmState」）？guard 放寬成 TRUE 之後哪兩條條款先破、怎麼修？\n7. 空洞的歸納步是怎麼製造出來的？三義務裡哪一條是它的最後防線？「合法的初始空洞」與「致命的恆假前件」怎麼分？\n8. TLC 與 Apalache 在證明工作流裡的新工位是什麼？「Init ≔ Ind 跑一步」驗的是哪個義務、不驗哪個？它的綠燈為什麼仍然不是定理？\n\n## 延伸閱讀\n\n- **Leslie Lamport, “Using TLC to Check Inductive Invariance”（2018-08-23）**：<https://lamport.azurewebsites.net/tla/inductive-invariant.pdf> — 兩頁紙把本章三個義務一字不差地寫出來（含那句「我們在乎的 invariant 很少自己 inductive」），然後教你把 Init 換成候選 Ind、讓 TLC 當歸納步快篩。讀完正文再讀它，你會認出每一句。（2026-06 開頁核對）\n- **Leslie Lamport, “Proving Safety Properties”（2019-05-18）**：<https://lamport.azurewebsites.net/tla/proving-safety.pdf> — 從找 inductive invariant、寫 ⟨1⟩ 層級證明、到把每一步餵給 TLAPS 的完整工作流，以互斥協議為例。本章手寫的東西，它的第 4–6 節給出工具化對應——是 ch16 之前最好的橋。（2026-06 開頁核對目錄）\n- **Leslie Lamport, “Teaching Concurrency”（2009）**：<https://lamport.azurewebsites.net/pubs/teaching-concurrency.pdf> — ch05 引過；文末那個小演算法的 invariant 習題，是練本章強化迴圈最便宜的啞鈴——先自己卡一次，再看他的解。\n- **Lorin Hochstein, “Inductive invariants”（Surfing Complexity, 2018-12）**：<https://surfingcomplexity.blog/2018/12/27/inductive-invariants/> — 用最小的例子把「為真但不 inductive」講透的短文，並親手解了上面那道習題；當本章的第二視角複習。\n- **Leslie Lamport, *A Science of Concurrent Programs***：<https://lamport.azurewebsites.net/tla/science-book.html> — Lamport 晚期的集大成之作（Cambridge University Press 2026 年出版，官網提供免費 PDF；2026-06 開頁核對）。歸納不變量與 refinement 在完整理論裡的位置都在這裡；建議讀完 ch15、ch16 再回來啃。\n- **Apalache 手冊〈Running the Tool〉**：<https://apalache-mc.org/docs/apalache/running.html> — 用 `--init=IndInv --inv=IndInv --length=1` 兩段式查詢機械化本章兩個義務的官方說明（2026-06；原理見 ch16）。\n"}, {"id": "ch15-refinement", "file": "ch15-refinement.md", "group": "Part V — 證明", "title": "ch15 — Refinement：實作蘊涵規格", "md": "# ch15 — Refinement：實作蘊涵規格\n\n> **本章解決什麼問題**：ch14 教你證「spec 滿足性質」；但全書還欠著另一種主張的證法——「這個系統**實作了**那個規格」。ch11 的 `THEOREM TPSpec => TC!TCSpec`、ch12 的 `THEOREM Spec => V!Spec`，你都只是看見，還沒拆開。本章把它做成機械：規格與實作是同一種東西（都是時序公式），「實作正確」是一條貨真價實的蘊涵；驗它的工具叫 refinement mapping——把實作狀態映到規格狀態、把每個實作步映成規格步**或 stuttering**。ch06 你簽下的 stuttering 條款，今天到期。收官之作：把「at-least-once＋dedup 實作了 exactly-once」這句你講過無數次的黑話，寫成定理。ch16 會讓機器來查這些證明義務。\n\n## 從你已知的出發\n\n你做過這樣的重構：結算 pipeline 的 dedup 原本是 MySQL 的唯一鍵，你把它換成 Redis SETNX 加 TTL 補償；或是把直連的入帳呼叫拆成佇列加 consumer。PR 描述裡你寫了那句行話：「**對外行為不變**」。reviewer 信了，上線也沒出事。但如果有人逼問——「對外行為」的精確定義是什麼？「不變」拿什麼證？——你大概只能指著回歸測試說：你看，全綠。\n\nch01 就把這條路堵死過：測試是抽樣，不是全稱。本章給你第二條路。「對外行為」可以是一條公式——一份只談你在乎的變數的抽象 spec；「不變」可以是一條定理——新舊實作都蘊涵它。介面與實作的契約、Liskov 替換的直覺（子型別可以無痛頂替父型別出現的位置），在 TLA 的世界裡全部塌縮成同一個記號：⇒。\n\n另一句你常講的黑話這章也要清算。「SQS 是 at-least-once，但我們有 idempotency key，所以整體是 exactly-once。」這句話在 design review 裡人人點頭，可它的邏輯地位是什麼？口號？經驗法則？本章結束時它是：**SettlementV1 的每一條合法行為，都是理想 exactly-once 帳本允許的行為**——一條可以逐步驗證的蘊涵式。\n\n最後是還債。ch06 講 stuttering 時明寫「這是 ch15 的伏筆」；ch11 的兩層、ch12 的三層樓，每層之間都吊著一條沒拆的 THEOREM。今天全部兌現。\n\n## 規格與實作是同一種東西\n\n先把世界觀說死。ch02 起我們就說：一份 spec ＝ 一個允許的行為集合；ch06 把它寫成公式 Init ∧ □[Next]_vars。注意這個定義裡**沒有出現「規格」與「實作」的區分**——TCommit 是一條時序公式，TwoPhase 也是；Consensus 是，Paxos 也是；它們是同一種數學物件，差別只在粗細：粗的變數少、允許的行為多；細的變數多、允許的行為少。\n\n於是「I 實作了 S」有了唯一合理的定義：**I 的每一條行為，S 都允許**。行為集合的 ⊆，在邏輯上就是蘊涵——一條公式蘊涵另一條，若且唯若滿足前者的行為都滿足後者：\n\n```text\n所有可能的 behavior\n┌───────────────────────────────────────┐\n│  S 允許的行為                         │\n│                                       │\n│      ┌─────────────────────┐          │\n│      │  I 的行為           │          │\n│      └─────────────────────┘          │\n│                                       │\n└───────────────────────────────────────┘\n```\n\nI ⇒ S，「實作正確」＝一條蘊涵式。沒有專門的「符合性檢查器」、沒有另一套理論——就是你 ch03 學的那個 ⇒，搬到時序公式上。\n\n這個定義能成立，全靠 ch06 那個當時看起來像漏洞的設計。實作幾乎總是比規格多變數、多步驟：TwoPhase 比 TCommit 多了 tmState、tmPrepared、msgs，它的大多數步——TM 收訊息、TM 廣播——根本不碰 rmState。如果 TCommit 的公式要求「每一步 rmState 都得照 TCNext 動」，蘊涵當場死亡。但 TCSpec 寫的是 □[TCNext]_rmState：每一步，**要嘛是 TCNext、要嘛 rmState 不動**。TM 的忙碌，在只看 rmState 的觀察者眼裡是靜止——被 stuttering 條款接住。ch06 的時鐘寓言（時分時鐘實作小時鐘）就是這件事的最小版本；ch11 那張對照表是它的中型版本；本章要給你通用的機械。\n\n還有一個推論值得先記下：refinement 是**遞移**的。Paxos ⇒ Voting、Voting ⇒ Consensus，所以 Paxos ⇒ Consensus——三層樓靠兩條蘊涵焊死，每層只需要對它的直接上層負責。這就是分層開發在邏輯裡的長相：規格也是某人的實作，實作也是某人的規格。\n\n## Refinement mapping：把行為層的主張化約成逐步檢查\n\nI ⇒ S 是行為層的主張——量化在所有（可能無限長的）行為上，沒辦法逐條檢查。ch05 你遇過一模一樣的困境：「所有可達狀態都滿足 Inv」也量化在無限多條路徑上，解法是歸納——把它化約成「起點成立＋每步保持」兩個局部義務。refinement mapping 對 I ⇒ S 做的是同一件事。**inductive invariant 之於 □Inv，恰如 refinement mapping 之於 I ⇒ S**：都是把行為層的全稱主張，化約成一步之內查得完的義務。\n\n設規格 S 的變數是 y、實作 I 的變數是 x（各自可以是好幾個）。一個 **refinement mapping** 是一組**狀態函數** ȳ ＝ f(x)：用實作的變數，算出每個規格變數「此刻應該是什麼值」。直覺：f 是一副眼鏡，戴上它看實作，看到的是規格的世界。三個義務：\n\n- ⟨1⟩1 **起點**：I 的每個初始狀態，戴上眼鏡滿足 S 的 Init。\n- ⟨1⟩2 **逐步**：I 的每一步（在可達狀態上，所以前件帶著 Inv），戴上眼鏡是 S 的一步、**或 S 的 stuttering**（ȳ 沒動）。\n- ⟨1⟩3 **Inv 本身**：Spec_I ⇒ □Inv——⟨1⟩2 用到的可達性事實要另案證明（ch14 的手藝）。\n\n三個義務都過，I ⇒ S 成立：沿著 I 的任何一條行為做歸納（ch05），映出來的狀態序列起點合法、每步合法，就是 S 的一條行為。\n\n畫出來。拿 ch08 那條最危險的 trace（s₂ → s₃ 正是「入帳之後、確認之前 crash」）的中段，戴上稍後會正式定義的眼鏡 f：\n\n```text\n抽象層   T1 ─PayOnce(m1)─→ T2 ============== T2 ============== T2\n         ▲                 ▲                 ▲                 ▲\n         │f                │f                │f                │f\n實作層   s1 ──Credit(c1)─→ s2 ──Crash(c1)──→ s3 ─Fetch(c2,m1)→ s4\n```\n\n（═ 表示抽象狀態原地不動，即 stuttering。）實作走了三步驚心動魄的災難劇，抽象層只看到一件事發生：m1 被入帳了一次。Crash、redelivery、重複領取——全是分針。**stuttering 不是規格的寬容，是抽象的代價結構：你選擇不看的東西，必須有地方放。**ch06 的本票，兌現在這張圖的每一根 ▲ 上。\n\n一個此刻就要立的警告，後面會反覆回來敲：**蘊涵是數學，mapping 是主張。**f 把規格的 y 接到實作的哪個東西上，是你的建模決定；接錯了（或接到常數上），定理可以為真而毫無意義。「陷阱與防禦」算總帳。\n\n## INSTANCE：代換就是全部的語意\n\nTLA+ 裡寫下 refinement mapping 的語法是 INSTANCE。Specifying Systems 第 4 章有一節的標題把語意說死了：*Instantiation Is Substitution*——引入模組＝做代換，沒有更多了。\n\n從 ch11 已引的原文開始逐字拆：\n\n```tla\nTC == INSTANCE TCommit\n\nTHEOREM TPSpec => TC!TCSpec\n```\n\n第一行做三件事。其一，把 TCommit 模組的**每一個定義**搬進來，名字前掛 `TC!`：TC!TCInit、TC!TCNext、TC!TCSpec、TC!TCConsistent……（前綴就是 TwoPhase 原文註解說的避免撞名）。其二，TCommit 有兩個參數——CONSTANT RM 與 VARIABLE rmState——每個參數都必須給代換。其三，**沒寫 WITH 的參數，隱式用當前模組的同名符號代換**：TwoPhase 自己有 RM 和 rmState，所以 TC!TCSpec 就是「把 TCommit 全文裡的 rmState 換成 TwoPhase 的 rmState」之後的 TCSpec——ch11 說的「用 TwoPhase 的 rmState 講出來的 TCSpec」，一字不差。\n\n所以這裡的 refinement mapping 是最便宜的一種：**投影**。規格變數 rmState 的眼鏡函數就是實作的 rmState 本身（恆等），多出來的 tmState、tmPrepared、msgs 被遮掉。便宜，但義務一個不少——下一節逐案清算。\n\n要代換成別的東西，用 WITH：\n\n```tla\nM == INSTANCE SomeSpec WITH y <- expr\n```\n\nexpr 可以是任何狀態函數——不只變數，**算出來的東西也行**。這正是 ch12 結尾那兩行的玩法（原文照引）：\n\n```tla\nvotes == [a \\in Acceptor |->\n           {<<m.bal, m.val>> : m \\in {mm \\in msgs: /\\ mm.type = \"2b\"\n                                                   /\\ mm.acc = a }}]\n\nV == INSTANCE Voting\n\nTHEOREM Spec => V!Spec\n```\n\nVoting 的參數變數是 votes 與 maxBal。maxBal 同名，隱式恆等；votes 在 Paxos 模組裡**不是變數，是定義**——從 msgs 裡撈出所有 2b 訊息重建的投票記錄——而隱式代換規則「用當前模組的同名符號」照樣適用：V!Spec 就是「votes 一詞處處讀作那個重建式」的 Voting spec。ch12 說它是「refinement mapping 的雛形」；現在你知道它不是雛形，**它就是 mapping 本體**：f 把 Paxos 狀態（msgs、maxBal…）映到 Voting 狀態（votes、maxBal）。同一招再往上一層：Voting 裡 `chosen` 是從 votes 定義出來的狀態函數，`C == INSTANCE Consensus` 把 Consensus 的變數 chosen 隱式代換成它，`THEOREM Spec => C!Spec`（2026-06 對照 Voting.tla 原文）。三層樓的每一道焊縫，都是一次代換。\n\n逐動作的對映也順手立起來（對照 Voting.tla 的兩個動作 IncreaseMaxBal 與 VoteFor，2026-06）：Phase1a 與 Phase2a 只動 msgs，votes 與 maxBal 紋風不動——Voting 眼裡是 stuttering；Phase1b(a) 把 maxBal[a] 推高、不投票——映成 IncreaseMaxBal(a, m.bal)；Phase2b(a) 發出 2b、三欄齊更新——映成 VoteFor(a, m.bal, m.val)，而 VoteFor 那條全知 guard（∃ Q : ShowsSafeAt）憑什麼成立？憑可達性事實：2a 訊息存在 ⇒ 發出它時收齊過 quorum 的 1b ⇒ ShowsSafeAt 的證據還躺在 msgs 裡。**ch12 那句「Voting 的 VoteFor 是全知 guard、Paxos 的工作是把全知換成訊息」，refinement 把它從口號變成義務**：每個 Phase2b 步，你都欠一個「訊息證據足以重建全知 guard」的證明。這筆帳跟 ch11 的「對照表沒那麼便宜」是同一筆，記在 ⟨1⟩3。\n\n兩個收尾細節。其一，**prime 怎麼過代換**：ȳ′ 讀作「把 f 的定義式裡每個變數加 prime」——f(x) 在步後狀態的值。其二，**定理跟著搬**：抽象模組裡證過的 THEOREM，代換後仍然是定理（所以 Consensus 層證一次 Cardinality(chosen) ≤ 1，三層樓全體受益）。唯一的著名例外：含 ENABLED 的公式（包括 WF/SF）在代換下不保真——fairness 想跟著 mapping 下樓，得另外論證。這是 liveness refinement 比 safety 難的技術原因之一，本書不深入，先知道地雷在哪。\n\n## 把 ch11 的對照表升格為定理\n\nch11 給過一張表：TwoPhase 的每種步，在 TCommit 眼裡是什麼。當時的話是「這張表沒有看起來那麼便宜」。現在付錢。義務照上節的三件套，目標：TPSpec ⇒ TC!TCSpec。\n\n先把 ⟨1⟩3 要用的可達性事實列清楚（就是 ch11 題 2(d) 那條鏈的三節；它們對七個動作的歸納證明是 ch14 的正戲，這裡直接取用）：\n\n- **F1**：[type ↦ \"Commit\"] ∈ msgs ⇒ ∀ rm ∈ RM : rmState[rm] ∈ {\"prepared\", \"committed\"}\n- **F2**：[type ↦ \"Commit\"] ∈ msgs ⇒ [type ↦ \"Abort\"] ∉ msgs\n- **F3**：rmState[rm] = \"committed\" ⇒ [type ↦ \"Commit\"] ∈ msgs\n\n證明骨架（Inv ≜ TPTypeOK ∧ F1 ∧ F2 ∧ F3）：\n\n⟨1⟩1. **起點**：TPInit ⇒ TC!TCInit。TPInit 的第一個合取 rmState = [rm ∈ RM ↦ \"working\"] 逐字就是 TCInit。∎\n\n⟨1⟩2. **逐步**：Inv ∧ [TPNext]_⟨rmState, tmState, tmPrepared, msgs⟩ ⇒ [TC!TCNext]_rmState。分案：\n\n  ⟨2⟩1. **stuttering、TMRcvPrepared、TMCommit、TMAbort**：四者都含 UNCHANGED rmState（或 vars 全等）⇒ rmState′ = rmState ⇒ [TC!TCNext]_rmState 的第二個 disjunct。TM 忙它的，小時鐘不動。∎\n  ⟨2⟩2. **RMPrepare(r)**：guard rmState[r] = \"working\" 與效果「r 那格改 \"prepared\"」逐字等於 TC!Prepare(r)。∎\n  ⟨2⟩3. **RMChooseToAbort(r)**：效果是 r 改 \"aborted\"，候選對映是 TC!Decide(r) 的 abort 分支，需要 rmState[r] ∈ {\"working\", \"prepared\"}（guard 給了 \"working\" ✓）與 notCommitted。反證：若某 rm committed，由 F3 得 Commit ∈ msgs，由 F1 得全員 ∈ {\"prepared\", \"committed\"}——與 r 在 \"working\" 矛盾。故 notCommitted 成立。∎\n  ⟨2⟩4. **RMRcvCommitMsg(r)**：guard 給 Commit ∈ msgs，由 F1 知 rmState[r] ∈ {\"prepared\", \"committed\"}，分兩案。**案 prepared**：對映 TC!Decide(r) 的 commit 分支，其 guard canCommit ＝「全員 ∈ {\"prepared\", \"committed\"}」——正是 F1。✓ **案 committed**：EXCEPT 把 \"committed\" 蓋寫成 \"committed\"，rmState′ = rmState——**stuttering**。這就是原文註解那句「同一訊息收第二次無害」在證明裡的著落：**冪等的重複接收，映成規格的原地踏步**。∎\n  ⟨2⟩5. **RMRcvAbortMsg(r)**：guard 給 Abort ∈ msgs。先證 notCommitted：若某 rm committed，F3 給 Commit ∈ msgs，F2 給 Abort ∉ msgs——矛盾。再分案：r ∈ {\"working\", \"prepared\"} → Decide(r) 的 abort 分支（notCommitted 剛證完）✓；r = \"aborted\" → 蓋寫同值，stuttering ✓；r = \"committed\" 已被 notCommitted 排除。∎\n\n⟨1⟩3. TPSpec ⇒ □Inv：見 ch14。⟨1⟩4. 三件套齊 ⇒ TPSpec ⇒ TC!TCSpec。∎\n\nch11 的擴充版（TMCrash）一行收掉：TMCrash 含 UNCHANGED rmState，落進 ⟨2⟩1——**TM 之死，在問題層眼裡也是 stuttering**，所以 TPCrashSpec ⇒ TC!TCSpec 同樣成立。blocking 傷的是 liveness，refinement（safety 層）毫髮無傷——跟 ch11 手推的結論完全咬合。\n\n回頭看那張表：它一直都是這個證明的目錄，每一格是一個 ⟨2⟩ 案；「沒那麼便宜」的部分就是 F1–F3——**對映表值多少錢，invariant 說了算**。\n\n## Worked example：結算系統收官\n\n現在輪到你的系統。目標：寫一份抽象的 exactly-once 帳本 spec，然後證 SettlementV1（ch08 原文，變數 queue、working、ledger、dedup，動作 Fetch、Credit、Ack、Crash）⇒ 它。\n\n### 第一幕：BOOLEAN 抽象層，與它的盲區\n\n第一直覺：理想的帳本不就是 v0 那種布林表嗎？每則訊息一格，從「未入帳」翻到「已入帳」，至多翻一次：\n\n```tla\n\\* 第一幕的候選抽象層（最後會被退貨）：ExactlyOnceB\nVARIABLE ledger      \\* 預期 ledger \\in [Msgs -> BOOLEAN]\n\nInitB == ledger = [m \\in Msgs |-> FALSE]\n\nPayOnceB(m) == /\\ ledger[m] = FALSE\n               /\\ ledger' = [ledger EXCEPT ![m] = TRUE]\n```\n\nv1 的 ledger 是計數（[Msgs → Nat]），型別對不上，隱式代換用不得——這正是 WITH 出場的時刻，**型別轉換必須白紙黑字寫出來**：\n\n```tla\nEOB == INSTANCE ExactlyOnceB WITH ledger <- [m \\in Msgs |-> ledger[m] >= 1]\n```\n\n眼鏡函數：抽象格子為 TRUE ⇔ 實作計數 ≥ 1。驗證義務出乎意料地順：起點（全 0 映成全 FALSE）✓；Fetch、Ack、Crash 不動 ledger → stuttering ✓；Credit 把某格從 k 加到 k+1——k = 0 時 FALSE→TRUE，映成 PayOnceB ✓；k ≥ 1 時 TRUE→TRUE，映成 stuttering ✓。每案都過，THEOREM Spec ⇒ EOB!Spec 成立。\n\n慶祝之前，做 ch08 題 4 教你的那個動作：讓防線承壓。拿 BadCredit 變體（刪掉 `working[c] \\notin dedup` 那行 guard 的 v1——ch08 親手示範過它會 double pay）重驗一遍：第一次入帳 0→1 映成 PayOnceB ✓；**第二次入帳 1→2 映成 TRUE→TRUE——stuttering ✓**。全部義務照過。**壞掉的系統，拿到了同一張定理。**\n\n驗屍兩刀。第一刀：Nat→BOOLEAN 的壓扁把「第二次入帳」變成抽象層的不可見事件——ch08 早警告過布林帳本看不見 double pay，這裡它以更陰的形式回魂：**stuttering 既是 refinement 的潤滑劑，也是藏屍處——mapping 壓扁掉的資訊，正是定理看不見的故障**。第二刀更誠實：回看第一幕的驗證過程，**從頭到尾沒有用到 dedup**——k = 0 與 k ≥ 1 的分案對任何系統都成立。一個對 dedup 防線隻字未提的定理，憑什麼宣稱定理化了「dedup 實作 exactly-once」？綠燈，但防線從未承壓（ch08 的劇場道具，定理版）。退貨。\n\n### 第二幕：把抽象層改誠實\n\n病根是抽象層太瞎，藥方是讓它看得見計數。理想帳本自己用 Nat——但它的動作規則保證值永遠只有 0 和 1：\n\n```tla\n---------------------------- MODULE ExactlyOnce ----------------------------\nEXTENDS Naturals\n\nCONSTANT Msgs\n\nASSUME Msgs # {}\n\nVARIABLE ledger\n\nTypeOK == ledger \\in [Msgs -> Nat]\n\nInit == ledger = [m \\in Msgs |-> 0]\n\nPayOnce(m) == /\\ ledger[m] = 0\n              /\\ ledger' = [ledger EXCEPT ![m] = 1]\n\nNext == \\E m \\in Msgs : PayOnce(m)\n\nSpec == Init /\\ [][Next]_ledger\n\nNoDoublePay == \\A m \\in Msgs : ledger[m] <= 1\n\nTHEOREM Spec => []NoDoublePay\n==============================================================================\n```\n\n十來行，零機制：沒有佇列、沒有 consumer、沒有 crash。每格是一個單向閂——從 0 出發，唯一的動作把 0 扳成 1，扳過就永遠扳不動（guard 死了，只剩 stuttering）。認出來了嗎？**這是 Consensus.tla 的結算版**（ch12 的頂樓：chosen 從 {} 到 {v}，一步定終身）——「定案」與「入帳」是同一個數學形狀。抽象層的 NoDoublePay 直接 inductive：Init 全 0 ✓；PayOnce 只造 1 ✓；TypeOK 注意寫 Nat 而不是 0..1——值域 0..1 是動作**掙來的秩序**，不是型別宣告（ch08 的走私紅線，在抽象層同樣有效）。\n\nmapping 呢？v1 的 ledger 與抽象的 ledger 同名、同型別——隱式代換，恆等眼鏡。在 SettlementV1 末尾加兩行：\n\n```tla\nEO == INSTANCE ExactlyOnce\n\nTHEOREM Spec => EO!Spec\n```\n\n（展開等價於 `INSTANCE ExactlyOnce WITH Msgs <- Msgs, ledger <- ledger`。）**為什麼這個定理不空洞**：恆等 mapping 把抽象帳本接到 v1 的 ledger 本人——也就是你資料庫裡那張下游真的會去讀的表。定理說的是這張表的事，不是某個影子的事。\n\n驗證開始。⟨1⟩3 先行——Credit 案會用到一條可達性事實（dedup 與 ledger 同步）：\n\nSync ≜ ∀ m ∈ Msgs : ledger[m] = (IF m ∈ dedup THEN 1 ELSE 0)\n\n⟨1⟩1. Init ⇒ Sync：dedup = {} 使 IF 全取 0，ledger 全 0。∎\n⟨1⟩2. TypeOK ∧ Sync ∧ Next ⇒ Sync′，分五案：\n  ⟨2⟩1. Fetch、Ack、Crash：三者都 UNCHANGED ⟨ledger, dedup⟩，Sync 原封。∎\n  ⟨2⟩2. Credit(c)：令 m₀ ≜ working[c]。guard 給 m₀ ≠ \"idle\"，配 TypeOK 與 ASSUME 的 \"idle\" ∉ Msgs，得 m₀ ∈ Msgs（那條 ASSUME 又一次自食其力）。guard 給 m₀ ∉ dedup，由 Sync 得 ledger[m₀] = 0。步後：ledger′[m₀] = 0 + 1 = 1 且 m₀ ∈ dedup′ ✓；其餘 m 兩邊都沒動 ✓。∎\n  ⟨2⟩3. stuttering：全等。∎\n（TypeOK 自身的保持是 ch14 的標準起手式，不重複。Sync 蘊涵 NoDoublePay——ledger[m] 只取 0 或 1。這正是 ch14 為 v1 鍛造的那型「dedup 是 ledger 的影子」事實。）\n\n主菜，逐 action 對映。義務：TypeOK ∧ Sync ∧ [Next]_vars ⇒ [EO!Next]_ledger。\n\n⟨1⟩1. **起點**：v1 的 Init 給 ledger = [m ∈ Msgs ↦ 0]，逐字就是 EO!Init。∎\n⟨1⟩2. **Fetch(c, m)**：UNCHANGED ⟨ledger, dedup⟩ ⇒ ledger′ = ledger ⇒ stuttering disjunct。領取訊息，帳本沒動——分針。∎\n⟨1⟩3. **Credit(c)**：令 m₀ ≜ working[c] ∈ Msgs（同上）。對映目標：EO!PayOnce(m₀)。\n  ⟨2⟩1. guard：EO!PayOnce(m₀) 要求 ledger[m₀] = 0。由 Credit 的 guard m₀ ∉ dedup 與 Sync，成立。**這一步是整個定理的承重點：dedup guard 經由 Sync 換來抽象 guard——防線在證明裡真正承壓了。**\n  ⟨2⟩2. 效果：Credit 給 ledger′ = [ledger EXCEPT ![m₀] = @ + 1]，而 @ ＝ ledger[m₀] ＝ 0，故 ledger′ = [ledger EXCEPT ![m₀] = 1]——與 EO!PayOnce(m₀) 的效果逐字相等。\n  ⟨2⟩3. 故這一步滿足 EO!PayOnce(m₀) ⇒ EO!Next。∎\n⟨1⟩4. **Ack(c)**：UNCHANGED ⟨queue, ledger, dedup⟩ ⇒ stuttering。確認與丟棄重複——分針。∎\n⟨1⟩5. **Crash(c)**：UNCHANGED ⟨ledger, dedup⟩ ⇒ stuttering。**連 crash 加 redelivery 都是分針**——理想帳本不知道世上有死亡這回事。∎\n⟨1⟩6. **v1 自己的 stuttering**：vars 全等 ⇒ ledger′ = ledger ⇒ stuttering。∎\n⟨1⟩7. 起點＋逐步＋□(TypeOK ∧ Sync)，沿行為歸納（ch05）：Spec ⇒ EO!Spec。∎\n\n定理到手，馬上做兩個對照。**其一**，BadCredit 這次逃不掉：取 ch08 那個懸崖狀態（c2 手持 m1、ledger[m1] = 1、m1 ∈ dedup），BadCredit(c2) 走一步，ledger[m1]: 1 → 2。抽象層三個出口逐一驗：EO!PayOnce(m1)？guard 要 ledger[m1] = 0，是 1，死；效果要改成 1，是 2，死。EO!PayOnce(m2)？動錯格子，死。stuttering？ledger 變了，死。**三路全滅——這一步映不出去，蘊涵破裂**。第一幕看不見的屍體，第二幕躺在光天化日之下。**其二**，白拿的紅利：抽象層證過 EO!Spec ⇒ □EO!NoDoublePay，定理過代換保持，而恆等代換下 EO!NoDoublePay 逐字就是 v1 的 NoDoublePay——所以 Spec ⇒ □NoDoublePay **免費掉出來**。refinement 比單條 invariant 說得更多：它鎖死了 ledger 的全部動力學（不減、不跳、每格至多一次跨越），NoDoublePay 只是它的影子之一。\n\n最後，誠實記帳。那句黑話的完整版是兩半：「**至多**一次」是 safety——本章定理；「**至少**一次（終將入帳）」是 liveness——v1 沒有 fairness，AllPaid 不成立（ch08 結尾記過這筆帳），抽象層的 □[Next]_ledger 同樣只是允許清單，從不承諾 PayOnce 真的發生。要補齊，得在兩層各加 fairness、再證 fairness 過 mapping 仍成立——撞上前面說的 ENABLED 代換地雷。所以本章定理的精確名字是：**at-least-once＋dedup 實作了 at-most-once-and-nothing-weird**；exactly 的另一半，掛在 ch07 的帳上。把黑話定理化的最大收穫，往往就是發現黑話原來說了兩件事。\n\n## 找不到 mapping 的時候：auxiliary variables\n\n三個義務裡藏著一個沒明說的限制：f 是**狀態**函數——它只能看實作的現在，看不到過去，更看不到未來。有些 refinement 是真的（行為集合確實 ⊆），mapping 卻不存在，原因恰好兩種。\n\n**實作忘了過去（history variable 補）。**規格的狀態若記著實作已經丟掉的歷史，f 無米可炊。你其實見過近親：TwoPhase 的 msgs 只增不減，本身就像一個內建的 history variable——「誰曾經說過什麼」全部留底，所以 ch11 的 F1–F3 才有得寫。反例也在你家：v1 的 dedup 是集合、ledger 是計數，**誰先入帳的順序**沒有任何變數記得——想證 v1 refine 一份記「入帳序列」的規格，f 就得從不記順序的狀態變出順序，不可能（紙上推演題 3 讓你親手撞牆＋修牆）。修法：給實作加一個只寫不讀的變數（history variable），把缺的歷史記回來——工程版你早就會：為了對帳而加的 audit log 欄位，不影響業務邏輯，只為「事後能回答問題」存在。\n\n**實作還沒決定未來（prophecy variable 補）。**這個方向違反直覺，值得走完最小例子。兩份 spec，外部都只有 out：\n\n```tla\n\\* SpecL（晚決定）：第二步才現場擲骰子\nInitL   == out = << >>\nFirst   == out = << >>   /\\ out' = <<\"a\">>\nSecondB == out = <<\"a\">> /\\ out' = <<\"a\", \"b\">>\nSecondC == out = <<\"a\">> /\\ out' = <<\"a\", \"c\">>\nSpecL   == InitL /\\ [][First \\/ SecondB \\/ SecondC]_out\n\n\\* SpecE（早決定）：第 0 步就在內部變數 d 押好注\nInitE   == out = << >> /\\ d \\in {\"b\", \"c\"}\nFirstE  == out = << >>   /\\ out' = <<\"a\">>        /\\ d' = d\nSecondE == out = <<\"a\">> /\\ out' = Append(out, d) /\\ d' = d\nSpecE   == InitE /\\ [][FirstE \\/ SecondE]_<<out, d>>\n```\n\n兩者的 out 行為集合一模一樣（⟨⟩ → ⟨a⟩ → ⟨a,b⟩ 或 ⟨a,c⟩，外加各處 stuttering），所以「SpecL 實作了把 d 藏起來的 SpecE」直覺上為真。但畫出狀態圖就看到死穴：\n\n```text\nSpecL：分岔點是同一個狀態        SpecE：分岔在第 0 步就發生了\n\n ⟨⟩ ──First──→ ⟨a⟩ ──SecondB──→ ⟨a,b⟩     (⟨⟩, b) ─→ (⟨a⟩, b) ─→ (⟨a,b⟩, b)\n                 │\n                 └────SecondC──→ ⟨a,c⟩     (⟨⟩, c) ─→ (⟨a⟩, c) ─→ (⟨a,c⟩, c)\n```\n\nmapping 必須給出 d̄ ＝ f(out)。SpecL 在 out = ⟨a⟩ 只有**一個**狀態，f 只能押一個值，不妨說 d̄ = \"b\"。現在看走 SecondC 的那條行為：⟨a⟩ → ⟨a,c⟩ 這一步映過去，SecondE 要求被 append 的字元等於步前的 d̄——是 \"b\"，實際是 \"c\"，死；FirstE 不合（out ≠ ⟨⟩），stuttering 不合（out 動了）。**f 被要求在分岔前就知道骰子的點數。**修法：給 SpecL 加 prophecy variable p——Init 時 p ∈ {\"b\", \"c\"}，SecondB 加 guard p = \"b\"、SecondC 加 guard p = \"c\"。p 把「未來的決定」搬進現在的狀態（⟨a⟩ 裂成兩個狀態），而對 out 而言行為集合分毫未變——每條原行為都有唯一一種 p 的填法：照它未來真做的事填。在 spec 的數學裡，預知未來是合法的建構。然後 d̄ ≜ p，義務全過。\n\n兩個收尾。其一，「把 d 藏起來」嚴格說要用一個本書沒教的算子：時序存在量詞 ∃∃（ASCII `\\EE`），∃∃ d : SpecE 的行為集合＝「存在某條 d 軌跡使 SpecE 成立」的 out 行為。本章其他例子（TCommit、Consensus、ExactlyOnce）的變數全是對外的，所以 THEOREM 都不需要它；但 auxiliary variables 的完整理論離不開 hiding，入口見延伸閱讀。其二，理論的天花板：Abadi 與 Lamport 在〈The Existence of Refinement Mappings〉證明了**完備性定理**——只要 refinement 在行為層為真，加上 history 與 prophecy variables 之後 mapping 必定存在（需三個技術條件：實作 machine closed、規格的不可見非決定性有限、規格內部連續；條件不滿足時 mapping 可以真的不存在——深水區到此為止，本書不證）。這篇 1988 年的論文拿了 LICS Test of Time Award；而「怎麼在 TLA+ 裡實際把這些變數加進 spec」有一份手把手的教材：Lamport 與 Merz 的〈Auxiliary Variables in TLA+〉，連 stuttering variable（第三種：給實作墊步數的）都教。皆見延伸閱讀。\n\n## 重構的安全證書\n\n把鏡頭拉回你的日常。「對外行為不變的重構」現在有了精確版本：**新舊實作 refine 同一份抽象 spec**。抽象 spec 是「對外行為」這四個字的數學名字；refinement 定理是你貼在 PR 上的安全證書。把 v1 的 dedup 從 MySQL 唯一鍵換成 Redis SETNX、把 SQS 換成 Kafka——只要新系統仍然 ⇒ ExactlyOnce，下游連一個字都不用改，而「不用改」這次有證據。反過來，找不到 mapping、又加不出合理的 aux variable，往往是在告訴你：這次改動**不是**重構，外部行為真的變了——這個訊號比回歸測試靈敏得多。\n\n什麼時候值得付這筆錢？我的判準：(1) 系統有自然的「需求／機制」兩層，且需求層能用一兩個變數寫完（TCommit、Consensus、ExactlyOnce 都做到了）——寫不出小的抽象層，多半表示你還沒想清楚對外承諾是什麼；(2) 你正要做元件替換或協議升級，需要「外部行為」的可對齊定義；(3) 協議本身是階梯式設計（Paxos 三層）。不滿足這些，一層 spec 加 invariant（ch14）就夠——mapping 的成本是 invariant 那套再來一遍，別為了儀式感付雙倍。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| 空實作通過 | 永遠 stuttering 的系統 refine 一切（起點合法的）safety spec——「我們的新版通過了 refinement 檢查」可能只證明它什麼都沒做 | safety refinement 從不要求事情發生。問：哪條 liveness 性質排除了空實作？沒有就去 ch07 補 fairness |\n| mapping 與現實脫鉤 | 把抽象變數映到常數或無關欄位（ledger ↦ 恆 FALSE），義務全過、定理全真、意義全無 | 檢查你在乎的對外變數：mapping 是恆等或誠實的觀測函數嗎？你最在乎的實作動作映成了規格動作、還是被 stuttering 吞了？ |\n| 型別壓扁丟資訊 | Nat→BOOLEAN 之後，double pay 映成 TRUE→TRUE 的 stuttering——壞系統與好系統拿同一張定理（本章第一幕） | 對每個最怕的故障 trace 手算抽象投影：抽象層**看得見**它嗎？再檢查證明有沒有用到防線（沒用到 dedup 的定理保護不了 dedup） |\n| 逐步義務忘了帶 Inv | 在不可達狀態上驗 mapping：要嘛假卡住（ledger = 5 映不出去，誤判 mapping 錯），要嘛假通過 | 義務寫成 Inv ∧ [Next]_x ⇒ …；卡住先問 ch14 的老問題：這個壞前驅可達嗎？ |\n| 隱式代換型別錯位 | INSTANCE 同名隱式代換把 Nat 塞進期待 BOOLEAN 的模組——TLA+ 無型別，不在門口報錯，公式安靜地變假或 vacuous 地真 | 每個 INSTANCE 逐參數列代換表（含隱式的）；型別不同必用 WITH 明寫轉換函數 |\n| 以為 liveness 自動繼承 | safety refinement 證完就宣稱 AllPaid 也有了——抽象層沒承諾過，或實作的 fairness 沒能過代換（ENABLED 不保真） | 逐條列「這個定理帶過去了什麼」；fairness 的搬運另案論證，搬不動就誠實標注 |\n\n## 紙上推演\n\n### 題 1：第一張眼鏡（[15 分鐘] ★）\n\n抽象 spec OneShot 與實作 Pipeline：\n\n```tla\n\\* OneShot：一件事，做一次\nVARIABLE done\nInitO == done = FALSE\nFire  == done = FALSE /\\ done' = TRUE\nSpecO == InitO /\\ [][Fire]_done\n\n\\* Pipeline：三段式部署\nVARIABLE pc\nInitP  == pc = \"build\"\nBuild  == pc = \"build\"  /\\ pc' = \"test\"\nTest   == pc = \"test\"   /\\ pc' = \"deploy\"\nDeploy == pc = \"deploy\" /\\ pc' = \"ok\"\nSpecP  == InitP /\\ [][Build \\/ Test \\/ Deploy]_pc\n```\n\n寫出 INSTANCE 句與 mapping，逐 action 驗證 SpecP ⇒ 實例化後的 SpecO。哪些步是分針？這題需要可達性 invariant 嗎、為什麼？\n\n### 推演解答\n\nmapping：done 映成「pc 到站了沒」。\n\n```tla\nOS == INSTANCE OneShot WITH done <- (pc = \"ok\")\n\nTHEOREM SpecP => OS!Spec\n```\n\n逐案：起點——pc = \"build\" ⇒ (pc = \"ok\") = FALSE ＝ InitO ✓。Build：pc 從 \"build\" 到 \"test\"，眼鏡值 FALSE→FALSE——stuttering ✓。Test：FALSE→FALSE，stuttering ✓。Deploy：guard pc = \"deploy\" 給步前眼鏡值 FALSE，步後 pc′ = \"ok\" 給 TRUE——FALSE→TRUE 逐字滿足 Fire ✓。Pipeline 自己的 stuttering：pc 不動 ⇒ 眼鏡值不動 ✓。分針是 Build 與 Test：抽象層只關心「成了沒」，中間站全是過場。**不需要** invariant：每案用到的事實（步前眼鏡值是 FALSE）都直接寫在該動作自己的 guard 裡（pc 的值決定一切），不需要任何「歷史掙來的」可達性事實——對照本章 Credit 案（guard 給的是 dedup，要換成 ledger 的事實得靠 Sync），你就摸到了「mapping 何時欠 invariant」的手感：**guard 談的變數跟眼鏡讀的變數不是同一個時，中間的橋就是 invariant**。\n\n### 題 2：誰 refine 誰（[15 分鐘] ★★）\n\n三份 spec 共用同一個變數 x：\n\n- SpecA ≜ (x = 0) ∧ □[x′ = x + 1]_x\n- SpecB ≜ (x = 0) ∧ □[x′ = x + 1 ∨ x′ = x + 2]_x\n- SpecZ ≜ (x = 0) ∧ □[FALSE]_x\n\n判斷六個方向的蘊涵各是否成立：A ⇒ B、B ⇒ A、Z ⇒ A、A ⇒ Z、Z ⇒ B、B ⇒ Z。每個不成立的給一條反例 behavior。先想清楚：[FALSE]_x 是什麼意思？\n\n### 推演解答\n\n[FALSE]_x ≜ FALSE ∨ (x′ = x) ＝ x′ = x：SpecZ 說「x 生為 0，永遠不動」——空實作。變數相同，不需要 INSTANCE 與 mapping，refinement 就是裸的蘊涵＝行為集合的 ⊆。\n\n- **A ⇒ B 成立**：逐步檢查，[x′ = x+1]_x 的兩個 disjunct（+1 或不動）都被 [x′ = x+1 ∨ x′ = x+2]_x 允許。加一是「加一或加二」的特例——實作比規格更具體＝行為更少。\n- **B ⇏ A**：behavior 0 → 2 → 2 → …（一步 +2，從此 stuttering）。+2 既不是 +1 也不是不動，A 的第一步就拒收。\n- **Z ⇒ A 成立**：Z 只有一條行為（0 永遠不動），而 A 的 stuttering 條款照單全收。**空實作 refine 了計數器規格。**\n- **A ⇏ Z**：behavior 0 → 1 → …，x 動了，Z 不允許。\n- **Z ⇒ B 成立**：同 Z ⇒ A（或由 Z ⇒ A ⇒ B 遞移）。\n- **B ⇏ Z**：同 A ⇏ Z 的反例即可。\n\n教訓有二。其一，refinement 的偏序方向：越細、越具體＝允許的行為越少＝在 ⇒ 的左邊。其二，Z 的位置應該讓你發涼：它 refine 這裡每一份 spec——只要起點合法，「什麼都不做」永遠是合格的實作。這不是悖論，是 safety 的定義（壞事不發生——不做事就不出事），也是陷阱表第一條的數學本體：要逼系統做事，safety refinement 給不了，去找 liveness。\n\n### 題 3：忘了順序的帳本（[25 分鐘] ★★★）\n\n有人要求結算系統對外提供**入帳順序**的保證，於是寫了抽象 spec PayLog：\n\n```tla\n\\* log 是入帳的「流水帳」：嚴格按發生順序記錄，不重複\nVARIABLE log\nRange(s) == {s[i] : i \\in 1..Len(s)}\nInitG == log = << >>\nLogPay(m) == /\\ m \\in Msgs \\ Range(log)\n             /\\ log' = Append(log, m)\nSpecG == InitG /\\ [][\\E m \\in Msgs : LogPay(m)]_log\n```\n\n要求 mapping **忠實**：每個 Credit 步必須映成一個 LogPay 步（不准映成 stuttering）。(a) 證明：不存在從 SettlementV1 現有變數出發的忠實 refinement mapping（提示：構造兩條收斂到同一個狀態的 behavior）。(b) 加什麼 auxiliary variable 能修好？寫出它與新 mapping，並指出驗證需要的新 invariant。(c) 如果拿掉「忠實」要求，有沒有義務全過、但毫無意義的 mapping？它對應陷阱表哪一條？\n\n### 推演解答\n\n(a) 基準配置（Msgs = {m1, m2}）下構造兩條 behavior：\n\n- w₁：Fetch(c1, m1)、Credit(c1)、Ack(c1)、Fetch(c1, m2)、Credit(c1)、Ack(c1)\n- w₂：同一劇本，把 m1 與 m2 對調（m2 先入帳）。\n\n兩條的終點是**同一個狀態** s⋆ ＝ ⟨queue = {}, working 全 \"idle\", ledger = (1, 1), dedup = {m1, m2}⟩——逐變數對一遍，分毫不差。忠實性要求 w₁ 的兩個 Credit 步分別映成 LogPay(m1)、LogPay(m2)（按此順序，因為第一個 Credit 步前 loḡ 必須還沒收 m1），所以 loḡ(s⋆) ＝ ⟨m1, m2⟩；對 w₂ 同理要求 loḡ(s⋆) ＝ ⟨m2, m1⟩。但 loḡ 是**狀態的函數**，s⋆ 只有一個——矛盾。∎ 根因：v1 把「誰先入帳」這段歷史忘得一乾二淨——dedup 是集合、ledger 是計數，沒有任何變數記順序。規格記得實作忘了的過去：history variable 的標準病徵。\n\n(b) 加 history variable h（入帳流水帳）：Init 加一條 h = ⟨⟩；Credit(c) 加一條 h′ = Append(h, working[c])；Fetch、Ack、Crash 各加 UNCHANGED h。h 只寫不讀（沒有任何 guard 看它），所以不改變原變數的行為——auxiliary 的本分。mapping：`PL == INSTANCE PayLog WITH log <- h`。驗證 Credit ↦ LogPay(m₀) 時，guard 需要 m₀ ∉ Range(h)——這不是白給的，要一條新 invariant：**Range(h) = dedup**（Init 兩邊皆空；Credit 同步各收一個 m₀；其餘不動——自己跑一遍五案歸納，一分鐘）。配上 Credit 原有的 guard m₀ ∉ dedup，橋就搭通了。工程對應赤裸裸：h 就是你為了對帳加的 audit log——「不影響業務邏輯、只為事後回答問題而存在的欄位」，ch14 的那句橋接在 refinement 這裡有了定理級的版本。\n\n(c) 有：loḡ ≜ ⟨⟩（常數空序列）。一切實作步映成 stuttering，起點義務 ⟨⟩ ＝ ⟨⟩ ✓，逐步義務「沒動」✓——SpecG 是允許清單，從不要求 log 成長，定理空洞成立。這就是陷阱表「mapping 與現實脫鉤」那條的最小標本：**忠實性不在三個義務裡，它是你對定理意義的額外要求**——數學只負責蘊涵為真，「定理在說你的系統」這件事，永遠要人來把關。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. 「規格與實作是同一種東西」的精確含義是什麼？I ⇒ S 對應行為集合的什麼關係？為什麼同一份 TwoPhase 既是（TCommit 的）實作、又可以是（更細系統的）規格？\n2. refinement mapping 的三個義務各是什麼？它跟 ch05／ch14 的歸納法在方法論上同構在哪裡（提示：行為層主張怎麼變成逐步檢查）？\n3. 逐字解釋 `TC == INSTANCE TCommit`：隱式代換的規則是什麼？什麼時候必須用 WITH？抽象層證過的定理會跟著搬下來嗎——例外是哪類公式？\n4. TwoPhase 的哪些步映成 TCommit 的 stuttering？「同一訊息收第二次無害」在 ⟨2⟩4 的哪一案落地？這一切靠 ch06 的哪個設計決定？\n5. 第一幕的 BOOLEAN mapping 為什麼讓 BadCredit 也通過？「整個證明沒用到 dedup」這個觀察為什麼本身就是警報？\n6. 第二幕 Credit ↦ PayOnce 的驗證在哪一步用了 Sync？對 BadCredit 的 1 → 2 那一步，抽象層的三個出口各怎麼死的？\n7. history 與 prophecy variable 各修哪種「mapping 不存在」？各舉一個最小例子（一個在本章正文、一個在題 3）。\n8. 為什麼永遠 stuttering 的空實作 refine 所有起點相容的 safety spec？要把它趕出去得加什麼、那是哪一章的工具？\n\n## 延伸閱讀\n\n- **Martín Abadi & Leslie Lamport, “The Existence of Refinement Mappings”**, *Theoretical Computer Science* 82(2), 1991, pp. 253–284（會議版 LICS 1988，2008 年獲 LICS Test of Time Award）：`https://lamport.azurewebsites.net/pubs/pubs.html#abadi-existence`。refinement mapping 與 prophecy variable 的出生地；讀引言與 §1–2，看「mapping 何時存在」的三個條件（machine closure、finite invisible nondeterminism、internal continuity）怎麼陳述（2026-06 查證）。\n- **Leslie Lamport & Stephan Merz, “Auxiliary Variables in TLA+”**（2017）：`https://lamport.azurewebsites.net/pubs/auxiliary.pdf`（arXiv:1703.05121）。history／prophecy／stuttering 三種輔助變數在 TLA+ 裡的具體加法規則，配玩具例子與一個 snapshot 演算法的完整驗證——本章概念層的施工手冊（2026-06 查證）。\n- **Leslie Lamport, “Hiding, Refinement, and Auxiliary Variables”**（2019）：`https://lamport.azurewebsites.net/tla/hiding-and-refinement.pdf`。∃∃（hiding）與 refinement 關係的短篇講義，比論文好入口（2026-06 連結見於 Lamport 網站，內文未逐頁核對）。\n- **Specifying Systems** 第 4 章（含 “Instantiation Examined” 與 “Instantiation Is Substitution” 兩節），免費 PDF：`https://lamport.azurewebsites.net/tla/book.html`。INSTANCE／WITH 的官方語意，用 FIFO 把「內層 spec ＋ hiding ＋ 實例化」完整走一遍——本章 INSTANCE 一節的原典。\n- **Voting.tla 原文**：`https://github.com/tlaplus/Examples/blob/master/specifications/Paxos/Voting.tla`。對照本章的 Paxos→Voting 對映表讀它的 IncreaseMaxBal 與 VoteFor，再看檔尾的 `C == INSTANCE Consensus`——三層樓中間那層的焊縫（2026-06 開頁驗證）。\n- **TwoPhase.tla 原文**：`https://github.com/tlaplus/Examples/blob/master/specifications/transaction_commit/TwoPhase.tla`。讀完本章回去重看最後兩行，它們現在是你能逐義務複核的定理，不再只是兩行咒語。\n"}, {"id": "ch16-machine-proofs", "file": "ch16-machine-proofs.md", "group": "Part V — 證明", "title": "ch16 — 機器證明：TLAPS、Apalache 與定理證明全景", "md": "# ch16 — 機器證明：TLAPS、Apalache 與定理證明全景\n\n> **本章解決什麼問題**：ch14 你手寫了 8 × 8 的義務矩陣、ch15 又添上 refinement 的逐步義務——但查證者始終是你自己，而 ch14 的陷阱表說得明白：漏一格，整份證明無效。本章把「查證」這份工作交給機器：TLAPS 把你的 ⟨1⟩ 層級證明拆成一條條 proof obligation 丟給後端 prover 逐條查驗；Apalache 把歸納檢查編成 SMT 查詢；再往右是 Lean、Rocq、Isabelle 的深度數學。Part V 在此收官：全書的嚴謹度光譜補上最後一格，並回答一個務實的問題——工程師走多深才划算。\n\n## 從你已知的出發\n\n你最信任的品質機制大概不是任何一個人，而是 CI 的 required checks。一個 PR 要進 main，得讓每一條 check 變綠：lint、型別檢查、單元測試、整合測試。沒有任何一條 check「理解」你的 PR 在做什麼——每條只負責一小件事，但**全部通過**這件事本身就是承諾。而且機器不會累、不會給面子：你少跑一條，它就紅一條。\n\nTLAPS 的工作模式就是這個形狀。你交出一份 ⟨1⟩ 層級證明（你從 ch05 寫到現在的那種），proof manager 把它拆成一條條獨立的 **proof obligation**（證明義務）——每條義務是一小句「在這些事實之下，這個斷言成立」——然後逐條丟給後端 prover 查驗。全綠，定理成立；紅一條，整份不算。ch14 那張 64 格矩陣你靠紀律逐格清帳，靠「速記不是免檢，是檢完的章」撐住品質；機器版的好處很直白：**漏格在語法上不可能**——QED 步沒湊齊案例，義務直接生不出來或直接紅。\n\n第二條經驗也搬得進來。你不會把三千行的 PR 丟給 reviewer——會被退、會漏看、會拖一週。你拆成小 PR，每個小到 reviewer 一眼看得完。TLAPS 的後端 prover 就是那位 reviewer：一條義務塞太多推理，後端在時限內啃不動，回你一個 timeout。處方跟拆 PR 一字不差：把那一步往下展開一層，⟨3⟩ 拆成幾個 ⟨4⟩，每條義務變小，後端就吃得下了。「SMT 搞不定就拆步驟」是本章的工作迴圈，而你已經用它管理程式碼審查很多年——只是名字叫「把大 PR 拆小」。\n\n第三條是你該帶進本章的戒心。CI 全綠不代表功能是對的——測試本身寫錯，綠燈就是假的。機器證明同理：TLAPS 查證的是「**這份證明確實證出了這條定理**」，至於定理寫的是不是你以為的那句話、spec 對不對得上現實，機器一個字都沒擔保。這條裂縫貫穿全章，「陷阱與防禦」算總帳。\n\n## 嚴謹度光譜：每一層買什麼、付什麼\n\n把全書用過的驗證手段排成一條光譜。這張圖是本章的骨架，也是 ch17、ch18 回頭引用的座標系：\n\n```text\n┌────────────────────────────────────────────────────────┐\n│ 測試                                    （你的日常）   │\n│ 買到：抽樣的證據——跑過的案例沒出錯                     │\n│ 付出：案例要人想；調度與交錯靠運氣                     │\n└───────────────────────────┬────────────────────────────┘\n                            │  保證變強\n                            ▼  成本變貴\n┌────────────────────────────────────────────────────────┐\n│ TLC：顯式窮舉                              （ch09）    │\n│ 買到：這組有限參數下的全部狀態，一個不漏               │\n│ 付出：狀態爆炸；參數寫死——checked，不是 proved         │\n└───────────────────────────┬────────────────────────────┘\n                            │  保證變強\n                            ▼  成本變貴\n┌────────────────────────────────────────────────────────┐\n│ Apalache：符號／SMT                                    │\n│ 買到：固定步數的反例搜尋＋歸納檢查，值域不必砍         │\n│ 付出：型別註記；步數有上界；參數維度仍寫死             │\n└───────────────────────────┬────────────────────────────┘\n                            │  保證變強\n                            ▼  成本變貴\n┌────────────────────────────────────────────────────────┐\n│ TLAPS：機器查證的證明                                  │\n│ 買到：任意參數、任意規模的定理——proved                 │\n│ 付出：證明仍由人寫，機器只負責查；以天、週計           │\n└───────────────────────────┬────────────────────────────┘\n                            │  保證變強\n                            ▼  成本變貴\n┌────────────────────────────────────────────────────────┐\n│ Lean／Rocq／Isabelle：深度數學                         │\n│ 買到：從邏輯地基蓋到屋頂的確定性（seL4、CompCert）     │\n│ 付出：以人年計——那是另一個職業                         │\n└────────────────────────────────────────────────────────┘\n```\n\n三句讀圖說明。**其一，這是工具箱，不是排行榜。**左端不可恥、右端不高尚——每往下一格，你買到更強的保證，也簽下更貴的帳單；「該停在哪格」是工程判斷，本章末尾給決策框架。**其二，你的手寫證明住在第四格。**ch14 的 IndTP 證明在數學上就是 TLAPS 等級的物件——任意參數、逐步可查——差別只在查證者是你自己，而人會累、會漏、會對自己的「顯然」心軟。**其三，相鄰層是同事不是對手。**ch14 已經演過一次：TLC 與 Apalache 當歸納步的快篩、人簽定理；本章會看到 TLAPS 紅燈時你反過來請 TLC 幫忙分診。光譜上的實戰永遠是混編的。\n\n## TLAPS：你已經會寫它的證明了\n\n先把 ch05 簽的那張本票兌現。當年立層級格式時說過：「到 ch16 讀真 TLAPS 證明時無縫接軌。」現在正式宣布：**本書的手寫格式就是 TLAPS 的證明語言**——⟨1⟩1 在 ASCII 裡寫成 `<1>1.`，Q.E.D. 步寫成 `QED`，「理由：…」寫成 `BY ...`。你不是要學一門新語言，是要看熟一套你寫了十一章的格式換上機器讀得懂的衣服。\n\n機器這邊的分工（依官方文件與 repo 的描述，2026-06）：proof manager `tlapm` 負責讀懂層級結構、把證明拆成義務、調度後端、彙整紅綠；後端 prover 負責真正的推理，成員包括 SMT solver（預設 Z3，也支援其他）、一階邏輯的 tableau prover Zenon、客製化的 Isabelle/TLA+，以及吃命題時序邏輯的 LS4。專案如今由 TLA+ 社群維護在 `tlaplus/tlapm`。\n\n### Proof obligation：證明的最小可查單位\n\ntlapm 走訪你的證明樹，對每個**葉步驟**（不再往下展開的步）產出一條義務：\n\n> 在「此步可用的事實與定義」之下，證明「此步的斷言」。\n\n義務彼此獨立——可以平行送後端、可以快取（已證過的義務會被記住，改了 spec 只重查受影響的那些，跟增量編譯同款邏輯）。這個設計把 ch05 的觀察做成了架構：層級證明讓每個跳步「肉眼可見地少一層」，而在 TLAPS 裡，每一層就是一道閘門——你想跳步，義務就會胖到後端吃不下，紅燈逼你補層。**「顯然」在這套系統裡不是修辭問題，是會超時的工程問題。**\n\n關鍵語意三件套，對照你的手寫習慣：\n\n| TLAPS 寫法 | 語意 | 你手寫時的對應動作（ch05／ch14） |\n|---|---|---|\n| `BY e1, e2 DEF d1, d2` | 用事實 e1、e2（前面的步驟名、引理、CASE 假設…），並展開定義 d1、d2，證本步 | 「理由：⟨3⟩2 與 guard；展開 Credit 的定義」——彈藥逐項指認 |\n| `OBVIOUS` | 不引額外事實，光靠當前上下文就該成立 | 「理由：直接由型別／上下文」——最薄的一行理由 |\n| `<2>. SUFFICES ASSUME P PROVE Q` | 把本層目標改寫成「假設 P、證 Q」 | 「設步前狀態滿足 Ind，分動作討論」 |\n| `<2>1. CASE A` | 在「析取肢 A 為真」的假設下證目標；步名 `<2>1` 引用的就是這個假設 | ⟨2⟩ 層的「情況 Fetch(c, m)」 |\n| `<2>. USE DEF TypeOK` | 此後所有義務自動展開 TypeOK | 「這行豁免引用一次、全章有效」的速記宣告 |\n| `<2>. QED BY <2>1, ..., <2>7 DEF Next` | 本層目標由列出的步湊齊；展開 Next 以確認案例蓋滿 | 「Q.E.D. 七類動作蓋住所有真步」 |\n\n注意一個容易錯過的預設：**TLAPS 不自動展開定義**。你不寫 `DEF Credit`，後端看到的 Credit 就是一個不透明符號，義務多半證不動。這不是不便，是紀律的語法強制版——ch14 說歸納步的彈藥清單只有四樣、每一步要指認來源；TLAPS 把「指認」變成必填欄位，忘了指認的下場從「審稿人皺眉」升級成「義務翻紅」。\n\n### 後端與工作迴圈\n\n一條義務送出後，預設策略是依序嘗試：**先 SMT，不行換 Zenon，再不行上 Isabelle**（依官方文件的預設順序，2026-06；各自的時限本書不抄死）。三位的胃口不同：SMT 擅長算術與基本的集合、函數推理，怕的是量詞層層疊的式子；Zenon 是一階邏輯出身，量詞與集合推理在行，但完全不懂算術；Isabelle 當壓陣，偶爾撿起前兩位都漏接的球，特別是需要歸納模式的目標。時序推理的葉步驟（馬上會看到 `PTL`）則交給 LS4。你也可以在 `BY` 後面點名指定後端——但對讀者而言，知道「有分工、有預設順序」就夠了。\n\n於是日常工作迴圈長這樣，跟 ch14 的強化迴圈互為表裡：\n\n1. 先寫**粗**的：每個 ⟨2⟩ 步直接 `BY` 一坨事實加 `DEF` 一串定義，賭後端吃得下。\n2. 紅了，先分診——紅燈有兩種病：**斷言是假的**，或**義務太胖**。這是與手寫卡點唯一的本質差異：手寫時卡住幾乎總是「缺條款」，機器紅燈多了一種「後端讀不懂」的假陽性。\n3. 分診的工具是光譜的左鄰：把出事的那條義務交給 TLC 或 Apalache 找反例（ch14 教過的快篩）。找到反例＝真的假，回去走強化迴圈；找不到＝多半太胖，進下一步。\n4. **拆步驟**：把胖義務往下展開一層，每個子步驟附上自己的小 `BY`。拆到後端全綠為止——跟把大 PR 拆小到 reviewer 看得完，同一個動作。\n\n## 熱身：Consensus.tla 的九行證明\n\nch12 在延伸閱讀裡埋過一句：「Consensus.tla 裡那段 TLAPS 證明是 ch16 的預習材料。」現在兌現。Consensus.tla 你熟到能背——chosen 從空集合到單元素集合的一步定終身（ch12 的頂樓）——它檔尾的 Invariance 定理是世界上最小的真 TLAPS 證明之一（tlaplus/Examples 原文，2026-06 逐字對照）：\n\n```tla\nTHEOREM Invariance == Spec => []Inv\n<1>1. Init => Inv\n  BY FS_EmptySet DEF Init, Inv, TypeOK\n<1>2. Inv /\\ [Next]_chosen => Inv'\n  <2>1. Inv /\\ Next => Inv'\n    BY FS_Singleton DEF Inv, TypeOK, Next\n  <2>2. Inv /\\ UNCHANGED chosen => Inv'\n    BY DEF Inv, TypeOK\n  <2>. QED  BY <2>1, <2>2\n<1>3. QED   BY <1>1, <1>2, PTL DEF Spec\n```\n\n逐步認親。⟨1⟩1 是**起點義務**：Init ⇒ Inv，理由欄裡 `DEF Init, Inv, TypeOK` 是展開定義，`FS_EmptySet` 是引理——FiniteSetTheorems 模組的庫存定理（空集合是有限集、基數為 0），用來餵 Cardinality(chosen) ≤ 1 這個斷言。站在別人證好的定理上，就像你 import 一個函式庫。⟨1⟩2 是**封閉義務**，內部拆兩案：⟨2⟩1 真步（FS_Singleton：單元素集合有限、基數 1），⟨2⟩2 stuttering。注意這個 ⟨2⟩2——ch14 開頭你立過「stuttering 步免費，全章豁免」的條款，手寫時引用一次就好；**機器不送這個人情**，[Next]_chosen 的兩個析取肢一肢一案，少一案 QED 就湊不齊。⟨1⟩3 的 `PTL` 是全段的點睛：從「起點」與「封閉」兩個動作層事實推出 □Inv 這個時序結論——這一步推理你在 ch05 親手證過，它叫**不變量規則**。在 TLAPS 裡，你的 ⟨1⟩3「由不變量規則」變成一次 PTL 後端呼叫：機器替你執行了那條你證明過的規則。\n\n同檔再往下還有一段 LivenessTheorem，順手看一眼（原文節錄，2026-06）：\n\n```tla\n<1>1. [][Next]_chosen /\\ WF_chosen(Next) => [](Init => Success)\n  <2>1. Init' \\/ (chosen # {})'\n    BY DEF Init\n  <2>2. Init /\\ <<Next>>_chosen => (chosen # {})'\n    BY DEF Init, Next\n  <2>3. Init => ENABLED <<Next>>_chosen\n    BY ValuesNonempty, ExpandENABLED DEF Init, Next\n  <2>. QED  BY <2>1, <2>2, <2>3, PTL DEF Success\n```\n\n認出來了嗎？⟨2⟩1、⟨2⟩2、⟨2⟩3 正是 ch14「leads-to 淺談」裡 WF1 規則的三份作業：不做 A 也走不出 P ∪ Q、做了 A 必到 Q、在 P 裡 A 永遠可做。`ExpandENABLED` 是把 ENABLED 展開成存在量詞的指令（ch15 警告過 ENABLED 是代換的地雷區，機器處理它也得用專門工具）。liveness 的山本書不爬（ch14 立的界碑不動），但你現在知道：山上也通機器的路，而且路標跟你學過的一模一樣。\n\n## 精讀 DieHard_proof.tla：手寫動作的機器對應\n\n主菜。tlaplus/Examples 的 DieHard 目錄裡，spec 旁邊躺著一份 `DieHard_proof.tla`（2026-06 開頁下載、逐字對照）——對 ch08 精讀過的那兩個水壺，機器查證 `Spec => []TypeOK`。選它當精讀對象的理由：spec 你手推過全狀態空間（ch08 的六層 BFS），TypeOK 你知道為什麼幾乎總是第一個 invariant（ch08 的四層理由），所以全部注意力可以放在**證明語言**本身。\n\n檔頭的註解先交代立場（原文）：\n\n```tla\n(* TLAPS proof of  Spec => []TypeOK.                                       *)\n(* (NotSolved is meant to be violated -- it's the puzzle's \"find a         *)\n(*  solution\" search invariant -- so we don't try to prove it.)            *)\n```\n\nNotSolved 本來就是要被打破的——它是「把目標寫成 invariant 的否定」那記招式的道具（ch08），所以沒人會去證它。同一份 spec，TLC 拿 NotSolved 找解、TLAPS 拿 TypeOK 簽定理：**反例是中性的機器產物，定理也是——立場都由人定**。\n\n### 第一塊：引理\n\n```tla\nLEMMA MinNat ==\n  ASSUME NEW m \\in Nat, NEW n \\in Nat\n  PROVE  Min(m, n) \\in Nat /\\ Min(m, n) <= m /\\ Min(m, n) <= n\n  BY DEF Min\n```\n\n`ASSUME NEW m \\in Nat ... PROVE ...` 讀作「任取 m, n ∈ ℕ，證明…」——數學裡的 ∀ 引入，你每份手寫證明開頭的「任取 m ∈ Msgs」。LEMMA 是抽出來重用的小定理：Min 的三條基本性質後面要用好幾次，抽成引理，正文就能像引用速記一樣 `BY MinNat`——ch14 開證前先立三條速記，同一個動作。理由欄 `BY DEF Min` 只展開 Min 的定義（一個 IF-THEN-ELSE），後端自己分案搞定。\n\n### 第二塊：骨架\n\n```tla\nTHEOREM TypeCorrect == Spec => []TypeOK\n<1>1. Init => TypeOK\n  BY DEF Init, TypeOK\n<1>2. TypeOK /\\ [Next]_<<big, small>> => TypeOK'\n  <2>. SUFFICES ASSUME TypeOK, [Next]_<<big, small>>  PROVE TypeOK'\n    OBVIOUS\n  <2>. USE DEF TypeOK\n  <2>1. CASE FillSmallJug\n    BY <2>1 DEF FillSmallJug\n  <2>2. CASE FillBigJug\n    BY <2>2 DEF FillBigJug\n```\n\n骨架與你的手寫證明逐行同構：\n\n- `<1>1`＝**起點義務**。big = 0、small = 0 逐項在值域內——ch14 ⟨1⟩1 的「逐項在值域內」，這裡一行 `BY DEF` 就讓 SMT 收工。\n- `<1>2`＝**封閉義務**。第一個子步 `SUFFICES ASSUME ... PROVE TypeOK'` 就是你寫了三章的開場白「設步前滿足 TypeOK」；它自己的理由是 `OBVIOUS`——改寫目標成假設前件、證後件，邏輯上是 ⇒ 的定義，不需要彈藥。\n- `<2>. USE DEF TypeOK`＝速記宣告：此後每條義務自動展開 TypeOK，不必每步重抄。注意這兩個 `<2>.` 都**沒有編號尾碼**——無名步，不能被引用，專門放「改寫目標」「注入事實」這類管家動作。\n- `<2>1` 到 `<2>6`＝**逐動作分案**，每案一行：CASE 假設（該動作為真）加上動作定義，後端直接驗「新值在值域內」。FillSmallJug 把 small 設成 3、big 不動——3 ∈ 0..3，SMT 眨個眼。\n\n收尾（原文）：\n\n```tla\n  <2>7. CASE UNCHANGED <<big, small>>\n    BY <2>7\n  <2>. QED  BY <2>1, <2>2, <2>3, <2>4, <2>5, <2>6, <2>7 DEF Next\n<1>. QED  BY <1>1, <1>2, PTL DEF Spec\n```\n\n`<2>7` 又是那個機器不肯豁免的 stuttering 案——兩個變數都沒動，TypeOK′ 照搬，理由就是 CASE 假設本人。倒數第二行的 QED 是**裝配說明**：七案蓋滿 [Next]_vars 的所有析取肢，`DEF Next` 讓後端親自核對「真的蓋滿了」——你手寫的「七類動作蓋住所有真步」在這裡不是宣告，是一條被機器驗算的義務。最後一行 `PTL DEF Spec`：跟 Consensus 的 ⟨1⟩3 同款，不變量規則收官。\n\n### 第三塊：SmallToBig——機器禁止「顯然」的現場\n\n六個動作裡有四個一行就過，剩下兩個倒水動作是戲肉。SmallToBig 的定義你在 ch08 拆過：big′ ＝ Min(big + small, 5)，small′ ＝ small − (big′ − big)——第二條等式裡引用了 big′，「方程式不是賦值」的最佳實例。手寫驗它的 TypeOK 保持，你大概一句話：「倒完水兩壺都還在容量內，顯然。」機器的回答是 24 行（原文，逐字照引）：\n\n```tla\n  <2>5. CASE SmallToBig\n    <3>1. big \\in Nat /\\ small \\in Nat /\\ big + small \\in Nat\n      OBVIOUS\n    <3>2. big' = Min(big + small, 5) /\\ small' = small - (big' - big)\n      BY <2>5 DEF SmallToBig\n    <3>3. big' \\in 0..5\n      <4>. Min(big + small, 5) \\in Nat /\\ Min(big + small, 5) <= 5\n        BY <3>1, MinNat\n      <4>. QED  BY <3>2\n    <3>4. small' \\in 0..3\n      <4>1. big' \\in Nat /\\ big' >= big\n        <5>1. big + small >= big\n          BY <3>1\n        <5>. Min(big + small, 5) >= big\n          BY <5>1, <3>1 DEF Min\n        <5>. QED  BY <3>2, <3>3\n      <4>2. big' <= big + small\n        <5>. Min(big + small, 5) <= big + small\n          BY <3>1, MinNat\n        <5>. QED  BY <3>2\n      <4>3. small - (big' - big) \\in 0..small\n        BY <4>1, <4>2, <3>1, <3>3\n      <4>. QED  BY <3>2, <4>3\n    <3>. QED  BY <3>3, <3>4\n```\n\n逐行走，每步標出它對應 ch14 手寫證明的哪個動作：\n\n- **⟨3⟩1（OBVIOUS）**：big、small、big + small 都是自然數。彈藥是上下文裡的 TypeOK（SUFFICES 假設了它、USE DEF 展開了它），0..5 ⊆ ℕ 的推理後端自理。對應手寫的**型別墊底**——ch14 每個 ⟨3⟩ 步開頭那句「TypeOK 給 working[c] ∈ …」。為什麼要先立這一步？因為 SMT 對「加法不會變小」這種事，只在確認運算元是自然數之後才敢點頭——型別是算術推理的入場券。\n- **⟨3⟩2（BY <2>5 DEF SmallToBig）**：把動作的兩條效果等式請進上下文。`<2>5` 引用的是 CASE 假設（SmallToBig 為真），`DEF` 展開它的定義。對應手寫的**引用動作效果**：「Credit(c) 的效果：ledger′[m₀] 是 ledger[m₀] + 1」——先指認出處，再使用。\n- **⟨3⟩3（big′ ∈ 0..5）**：拆兩小步。無名的 ⟨4⟩ 步引 MinNat 拿到「Min ∈ ℕ 且 ≤ 5」，QED 步用 ⟨3⟩2 把 Min(big + small, 5) 換名成 big′。對應手寫的**等式替換**——⟨2⟩2 裡「由 ⟨3⟩2 是 0 + 1」那種代入。\n- **⟨3⟩4（small′ ∈ 0..3）**：全檔最深的一塔，鑽到 ⟨5⟩。手寫時最容易被「顯然」糊掉的位置，機器逼你把直覺拆成三個彼此獨立的事實：\n  - **⟨4⟩1：big′ ≥ big**——倒水只會讓大壺變多。注意它居然還要 ⟨5⟩1 先證 big + small ≥ big（加法不變小，靠 ⟨3⟩1 的型別），再 `DEF Min` 分案取下界。MinNat 引理在這裡幫不上忙——它只給了上界方向的兩條，下界這條只能現場展開定義。**引理沒收錄的性質就是沒有**，跟 ch14「歸納假設只給 ≤ 1、不給 = 0」的卡點同一種誠實。\n  - **⟨4⟩2：big′ ≤ big + small**——大壺再多也多不過兩壺總量。這次 MinNat 有貨，一行引理一行替換。\n  - **⟨4⟩3：small − (big′ − big) ∈ 0..small**——純算術收割：扣掉的量非負（⟨4⟩1），所以不超過 small；扣掉的量不超過 small（⟨4⟩2 移項），所以不會扣成負水。SMT 的甜蜜點，四個事實餵進去一行過。\n  - **⟨4⟩ QED**：⟨3⟩2 把表達式換名成 small′，而 0..small ⊆ 0..3 的最後一哩靠上下文裡的 TypeOK（small ≤ 3）。\n- **⟨3⟩ QED（BY <3>3, <3>4）**：TypeOK′ 的兩個合取項到齊，**裝配說明**——你每一層收尾的那句「⟨3⟩4 與 ⟨3⟩5 合起來蓋住所有訊息」。\n\n讀完的兩個帶走點。**第一，這就是 ch05 測謊器的機器版。**「倒水顯然不會溢出」被拆成 big′ ≥ big、big′ ≤ big + small 兩個方向的比較式，每個比較式又得先押上型別——你手寫時省掉的每句「顯然」，在這裡都有一行對應的義務。寫過 ch14 的 64 格矩陣再看這 24 行，你該有的感想不是「機器好囉嗦」，而是「我手寫時到底心軟放過了多少步」。**第二，深度是局部的。**六個動作四個一行過、兩個鑽到 ⟨5⟩——層級格式讓嚴謹度按需分配，簡單的案例不陪葬。這正是 ch05 說的「信任可以分層發放」，現在連機器的算力也照這個原則分配。\n\n## Apalache：把歸納步編成 SMT 查詢\n\n光譜第三格。ch09 講過 TLC 的工作方式：一個狀態一個狀態地搬——算出後繼、查 fingerprint、進佇列，直到搬完或爆炸。Apalache 走完全不同的路：**不搬狀態，解方程**。它把變數變成 SMT 求解器裡的符號、把 Init 與每一步 Next 變成約束、把「k 步之內性質被打破」也變成約束，然後把整包丟給 Z3 問：這組約束可滿足嗎？可滿足——解出來的賦值就是一條反例 trace；不可滿足——k 步之內無反例。這叫 **bounded model checking**：官方手冊說得直白（2026-06 開頁核對）：找到 bug 就回報反例，找不到就只承諾「到這個長度為止沒有」。誠實，但有界。\n\n它的甜蜜點恰好補 TLC 的短板。TLC 的成本跟**狀態數**走：值域砍不小、可達集合太大，就是死。SMT 的成本跟**約束的難度**走：ledger ∈ [Msgs → Nat] 這種無限值域，符號變數直接吃下，不必先砍成 0..2——ch14 說 Apalache「連砍值域都省了」，原理就是這個。代價也明碼標價：TLA+ 是無型別的語言，要編進有型別的 SMT 世界，每個變數得先標型別註記、過型別檢查器這關；而且不是每個 TLA+ 運算子都編得動（遞迴定義等角落要繞路，2026-06 時點）。\n\n對你最重要的用法是 ch14 預告過的**兩段式歸納檢查**——把三個義務裡最苦的兩個機械化（指令照官方手冊，2026-06）：\n\n1. 起點義務：`--init=Init --inv=IndInv --length=0`——零步，問「所有初始狀態都滿足 IndInv 嗎」。\n2. 封閉義務：`--init=IndInv --inv=IndInv --length=1`——把 IndInv 當出發點集合，走**一步**，問「走得出 IndInv 嗎」。出得去，解出來的那組賦值就是你的壞前驅，強化迴圈的「讀卡點」直接有料；出不去，封閉成立。\n3. 蘊涵義務照樣有得查：`--init=IndInv --inv=Safety --length=0`——零步的純蘊涵。\n\n對照 ch14 的手工流程，這是同一套三義務換了執行者；對照 TLC 的「Init ≔ Ind 跑一步」快篩，差別是不必先有限化值域。但要看清楚綠燈的邊界：**參數維度仍然是寫死的常數**。RM ＝ {r1, r2} 之下歸納步全綠，是「這組常數下 IndInv 是 inductive」；「任意 RM 集合」那張字據，光譜上只有下一格簽得出來。Apalache 是 ch14 迴圈裡最好的陪練——找壞前驅比你快幾個數量級——但簽名欄還是留給 TLAPS 或你的手。\n\n維護現況一句（2026-06，開頁核對 README）：Apalache 由原核心開發者**獨立維護**，repo 在 apalache-mc 組織下，README 明言不受任何組織資助——網路舊資料常寫「Informal Systems 維護」，已過時。它同時是 Quint 的後端引擎（見 ch18）。\n\n| | TLC（ch09） | Apalache |\n|---|---|---|\n| 引擎 | 顯式 BFS ＋ fingerprint | 轉移編成 SMT 約束，問 Z3 |\n| 回答的問題 | 這組參數下的全部可達狀態 | k 步之內有沒有反例 |\n| 無限值域 | 必須砍成有限 | 整數等值域符號處理，不必砍 |\n| 歸納檢查 | Init ≔ Ind 走一步（先有限化） | 兩段式查詢，原值域直上 |\n| 綠燈的意思 | 窮舉完畢，此參數組無反例 | k 步內無反例；歸納模式＝該組常數下義務成立 |\n\n## 定理證明全景：光譜最右端住著誰\n\n最後一格不是一個工具，是另一個世界。TLAPS 的證明語言刻意長得像數學系作業，後端自動化撐起大半苦工；最右端的互動式定理證明器（interactive theorem prover）則把「證明」本身變成一種程式設計——每一步都在型別檢查器的監督下構造，信任鏈從邏輯公理一路焊到結論。本書不教任何一個的語法，但你該知道三個名字的定位與代表作，因為它們定義了「最嚴謹」這個詞的現行匯率。\n\n**Lean 4**——數學社群與 AI 的交會點。由 Lean FRO 維護，既是定理證明器也是一門程式語言。它最大的社群資產是 mathlib：協作建成的數學庫，從大學課程一路蓋到研究前沿，規模以數十萬條定理計（2026-06 時點的量級）。它也是「AI 做數學」這條戰線的主場：DeepMind 的 AlphaProof（2024）用強化學習在 Lean 裡搜尋證明、達到 IMO 銀牌等級；其後陸續有系統宣稱在 IMO 等級的題目上達到金牌等級、解答由 Lean 全程查證（截至 2026 年中的報導，本書未逐一驗證）。注意這個架構的形狀：**模型負責起草，Lean 負責把關**——不管生成器多會說話，進得了庫的只有過了型別檢查的證明。這跟 ch18 要談的「LLM 起草、符號工具查證」是同一個信任結構。\n\n**Rocq**——程式驗證的老牌重鎮。原名 Coq，2025 年 3 月隨 9.0 版完成改名（讀舊文獻時兩個名字是同一個東西）。理論底座是「命題即型別、證明即程式」的對應，本書不展開。代表作 CompCert：經機器證明的 C 編譯器，定理是「編譯不改變程式語意」——程式碼級驗證的旗艦（ch01 的全景地圖、ch18 的分界線都拿它當錨）。離本書最近的親戚：ch13 延伸閱讀提過，Verdi 團隊在 Coq 裡完成了 Raft 核心安全性的機器證明——你在 ch13 手推的那五條性質，光譜最右格有人付了全價。\n\n**Isabelle/HOL**——老牌互動式證明器，工程驗證的另一座燈塔。代表作 seL4：一個 microkernel 的 C 實作被證明在功能上符合其抽象規格，作業系統核心等級的全程式碼驗證，人力以人年計（ch18 拿它當成本的刻度原器）。對本章還有一層直接關係：TLAPS 的後端之一就是 Isabelle/TLA+——你前面精讀的證明裡，SMT 與 Zenon 啃不動的義務，最後就是送進 Isabelle 查的。光譜的第四格與第五格之間，有一條現成的管線。\n\n三個名字的共同點，也是與你的距離：它們驗證的對象通常是**數學本身就是產品**的東西——編譯器、核心、密碼學原語、數學定理。後端工程師的日常問題很少長這樣。所以這一格對你的正確姿勢是「知道在哪、讀得懂結論」，不是「搬進去住」。\n\n## 決策框架：走多深才划算\n\n把光譜變成決策表。對每一行，誠實標出你買到什麼、付出什麼——這是給你（資深後端，帶一條結算 pipeline）的版本：\n\n| 你的問題長相 | 建議停在哪格 | 為什麼 |\n|---|---|---|\n| CRUD 後台、單機業務邏輯 | 測試（＋property-based testing，見 ch18） | 沒有協議級併發；形式化的固定成本攤不到回報 |\n| 併發協議、故障 × 交錯，有限配置的反例就能說服你改設計 | 寫 spec ＋ TLC | 性價比之王：AWS 的主力用法（ch17）；反例 trace 直接變設計評審材料 |\n| TLC 被狀態爆炸卡死；或你在練 ch14 的強化迴圈、需要快篩 | ＋Apalache | 符號檢查不數狀態；兩段式歸納檢查是壞前驅產生器 |\n| 協議是公司的核心資產，需要「任意參數」的定理；或 spec 要長期當權威文件 | ＋TLAPS | 唯一能機器簽發任意規模字據的層；預算以天、週計 |\n| 編譯器、OS 核心、密碼學——數學即產品 | Lean／Rocq／Isabelle | 以人年計；對你是地圖知識，不是工作地點 |\n\n三句誠實話收尾。**第一句**：對你的結算 pipeline，九成的價值在第二格就拿完了——「寫 spec 的最大價值是先想清楚」（ch01）加上 TLC 的反例，已經覆蓋 AWS 論文裡七個團隊的主要用法。**第二句**：學會**讀** TLAPS 證明的回報，比學會寫高得多——寫是另一份工作，讀讓你接得住社群裡現成的證明資產（Paxos、Raft、各種佇列協議），也讓你手寫證明的紀律有了校準器。本章教的是讀。**第三句**：機器證明不修「spec 對不對現實」的裂縫——IndV1 的定理再怎麼機器查證，你的 production 把 Credit 拆成兩步它就作廢（ch14 的前提清單），而 spec 與 code 的漂移是工業界真實的痛（ch17 的 MongoDB 案例）。光譜往右走買的是「推理無誤」，永遠買不到「模型如實」。\n\n## 陷阱與防禦\n\n| 故障模式 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| 綠燈崇拜：把「證明通過」當「系統正確」 | 機器查的是「這份證明證出了這條定理」；定理寫弱了、變數寫錯了、ASSUME 塞了矛盾（矛盾前提下萬物可證——vacuous truth 的終極形態），照樣全綠 | 把定理唸成白話講給自己聽；檢查每條 ASSUME 是否可滿足；問 ch15 的老問題——定理說的是「我的系統」嗎 |\n| 定理少寫一半，機器不會替你想 | 把定理寫成 Ind ∧ [Next]_vars ⇒ Ind′ 而不是 Spec ⇒ □Ind——起點義務根本沒進場，封閉全綠就慶祝 | 機器只查你交來的義務，不查你沒交的；對照 ch14 三義務清單逐項點名（紙上推演題 3 的劇本） |\n| 把 Apalache 的 bounded 綠燈當定理 | 「k = 10 沒反例」說的是十步以內；第十一步的反例一個字都沒否認 | 報告永遠帶著 k；要「永遠」，走兩段式歸納檢查或上 TLAPS |\n| 大顆 BY 的技術債 | 今天後端撐得起一條胖義務；spec 改一行、義務變胖一圈，紅在離修改最遠的地方 | 戲肉步驟主動拆層（DieHard 的 ⟨5⟩ 塔是示範）；把「義務小而多」當投資不當囉嗦 |\n| 兩種紅燈不分診 | 義務失敗＝「假了」或「後端讀不懂」，急著拆步驟的人會把真反例拆到看不見 | 先丟 TLC／Apalache 對紅掉的義務找反例：有反例走強化迴圈，沒反例才拆步驟 |\n| DEF 漏掛 | 定義沒展開，後端面對不透明符號，紅得莫名其妙；於是亂加事實直到「碰巧」綠 | 每步指認彈藥（ch14 的清單紀律）；紅燈先查「我給後端看得到它需要的定義嗎」 |\n| 證明腐化 | spec 改了、證明沒跟上——跟 ch17 的 spec–code 漂移同型，只是發生在樓上 | 把證明當程式碼管理：spec 變更必重跑 tlapm；快取讓重跑只付增量的錢 |\n\n## 紙上推演\n\n### 題 1：把 ch14 的手寫證明穿上 TLAPS 的衣服（[25 分鐘] ★★）\n\n拿 ch14 的 IndV1 證明（TypeOK ∧ NoDoublePay ∧ DedupCovers），在紙上改寫成 TLAPS 風格的骨架：定理宣告、起點義務、SUFFICES 開場、逐動作 CASE、每步的 BY 與 DEF 清單、各層 QED。不要求語法逐字合規（量詞怎麼拆成 CASE 的細節可以含糊），要求：層級結構完整、每個葉步驟的彈藥指認得出來、stuttering 案不漏。提示：Credit 案照 ch14 的 ⟨3⟩1–⟨3⟩7 搬，想清楚每個 ⟨3⟩ 步的 BY 該列誰。\n\n### 推演解答\n\n骨架（紙上版；真要餵 tlapm 還得打磨量詞與 vars 元組的寫法，但層級與彈藥就是這份）：\n\n```tla\nTHEOREM Spec => []IndV1\n<1>1. Init => IndV1\n  BY DEF Init, IndV1, TypeOK, NoDoublePay, DedupCovers\n<1>2. IndV1 /\\ [Next]_vars => IndV1'\n  <2>. SUFFICES ASSUME IndV1, [Next]_vars PROVE IndV1'\n    OBVIOUS\n  <2>. USE DEF IndV1, TypeOK, NoDoublePay, DedupCovers\n  <2>1. ASSUME NEW c \\in Consumers, NEW m \\in Msgs, Fetch(c, m)\n        PROVE  IndV1'\n    BY <2>1 DEF Fetch, vars\n  <2>2. ASSUME NEW c \\in Consumers, Credit(c) PROVE IndV1'\n    <3>1. working[c] \\in Msgs\n      BY <2>2 DEF Credit          \\* guard 排除 \"idle\"，TypeOK 給值域\n    <3>2. ledger[working[c]] = 0\n      BY <2>2 DEF Credit          \\* guard: notin dedup ＋ DedupCovers\n    <3>3. ledger'[working[c]] = 1\n      BY <3>2, <2>2 DEF Credit    \\* EXCEPT 0 + 1\n    <3>4. \\A mt \\in Msgs : mt # working[c] =>\n            ledger'[mt] = ledger[mt] /\\ (mt \\notin dedup' => mt \\notin dedup)\n      BY <2>2 DEF Credit          \\* EXCEPT 單格；dedup 只變大\n    <3>. QED  BY <3>1, <3>2, <3>3, <3>4\n  <2>3. ASSUME NEW c \\in Consumers, Ack(c) PROVE IndV1'\n    BY <2>3 DEF Ack\n  <2>4. ASSUME NEW c \\in Consumers, Crash(c) PROVE IndV1'\n    BY <2>4 DEF Crash\n  <2>5. CASE UNCHANGED vars\n    BY <2>5 DEF vars\n  <2>. QED  BY <2>1, <2>2, <2>3, <2>4, <2>5 DEF Next\n<1>3. QED  BY <1>1, <1>2, PTL DEF Spec\n```\n\n對帳重點：（i）⟨2⟩5 的 stuttering 案必須在——ch14 的「豁免條款」是修辭，機器要的是案例。（ii）Credit 案的 ⟨3⟩2 是整份證明的承重點，它的 BY 清單裡 `<2>2`（guard）與 DedupCovers（經 USE 注入）缺一不可——這正是 ch14 第一輪卡死、強化後「債有人還了」的那一步，機器版的還債就是這行 BY。（iii）Fetch、Ack、Crash 一行收掉，理由跟手寫版相同：兩條承重條款只談 ledger 與 dedup，這三個動作不動它們——但「不動」也要 DEF 展開動作定義讓後端親眼看見。\n\n### 題 2：三條義務，三種胃口（[15 分鐘] ★★）\n\n下列三條 proof obligation 分別交給 TLAPS 的預設後端鏈，哪條最容易、哪條會逼你拆步驟、哪條三個自動後端可能全啞？說出理由（提示：回想各後端的胃口——SMT 怕量詞、Zenon 不懂算術、歸納模式要 Isabelle 或手動展開）。\n\n- (a) 已知 ledger[m₀] = 0 與 TypeOK，證 ledger′ = [ledger EXCEPT ![m₀] = @ + 1] 之後 ledger′[m₀] ≤ 1。\n- (b) 已知 IndTP 與 TMCommit 的 guard 和效果，證 ∀ r ∈ RM : rmState′[r] ∈ {\"prepared\", \"committed\"}（即 ch14 ⟨2⟩6 的 I7′ 步）。\n- (c) 證對所有 n ∈ ℕ：0 + 1 + ⋯ + n = n(n+1)/2（ch05 的開場定理）。\n\n### 推演解答\n\n(a) **SMT 的甜蜜點，一行過。**函數單格更新加小算術（0 + 1 ≤ 1），沒有量詞嵌套——這正是 DieHard ⟨4⟩3 那型義務。\n(b) **會逼你拆。**斷言本身帶 ∀，推理還要串四條條款（I4 → I5 → I6 → I3 的鏈，ch14 ⟨2⟩6 ⟨3⟩3 的四節車廂）——量詞加多步串接是 SMT 的弱項；Zenon 吃量詞但這裡混著集合與記錄的雜活。實務解法不是換後端，是把 ch14 手寫的 ⟨4⟩1–⟨4⟩5 直接搬成 TLAPS 子層：每節車廂一條小義務，節節皆綠。手寫時的好結構就是機器時代的好結構——這題是本章「接軌」的全部意義。\n(c) **自動後端基本全啞，因為它需要歸納。**SMT 與 Zenon 都不會自己發明歸納假設；這類目標要嘛點名 Isabelle 後端碰運氣，要嘛在 TLA+ 裡引用自然數歸納規則手動展開層級（基底一義務、歸納步一義務）。「歸納這個動作本身」永遠是人的決定——ch05 教的那把刀，機器只替你磨，不替你揮。\n\n### 題 3：把 ch14 的假證明餵給機器（[15 分鐘] ★★）\n\nch14 那位同事的 StrongInd ≜ NoDoublePay ∧ dedup = Msgs，配上他「義務二全空洞通過、義務三第一個合取項」的證明。（a）把這份證明寫成 TLAPS 骨架餵給 tlapm，哪條義務翻紅？紅燈訊息會指向哪個具體事實？（b）反過來：如果他狡猾地把定理只寫成 `THEOREM StrongInd /\\ [Next]_vars => StrongInd'`，tlapm 會給全綠嗎？這個全綠值多少錢？\n\n### 推演解答\n\n（a）翻紅的是**起點義務** `Init => StrongInd`：Init 給 dedup = {}，StrongInd 要 dedup = Msgs，而 ASSUME 說 Msgs 非空——後端輕鬆找到矛盾，紅燈直指 dedup = Msgs 這個合取項。注意機器的判決跟 ch14 的人工驗屍完全一致（義務一不成立，整份作廢），但快得多、而且不會被「封閉全綠」的氣勢唬住：義務彼此獨立，一條紅就是紅。三義務是串聯保險絲——機器把每顆保險絲分開測。\n\n（b）**會全綠，而且這個全綠一文不值。**那條定理本身是真的（空洞地真：StrongInd 的世界裡 Credit 永不 enabled，封閉確實成立）——機器忠實地證明了你交給它的句子。但 Spec ⇒ □NoDoublePay 從來沒被主張過：少了起點義務與 PTL 收尾，□ 根本沒出場。這是陷阱表第二條的現場：**機器不會替你想你沒交的義務**。自我防衛只有一招：每次慶祝全綠之前，回頭核對定理的形狀是不是 `Spec => []...`——字據上少一個 □，整張白簽。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. proof obligation 是什麼？tlapm 把一份層級證明變成什麼東西的集合？「CI required checks」這個類比在哪裡成立、在哪裡會誤導你？\n2. BY、DEF、OBVIOUS、SUFFICES、CASE 各自的語意是什麼？TLAPS 預設不展開定義——這個設計跟 ch14 的「彈藥清單只有四樣、逐步指認」是什麼關係？\n3. 後端的預設嘗試順序是什麼？三位的胃口各是什麼？「SMT 搞不定就拆步驟」的工作迴圈，分診那一步為什麼要先請 TLC／Apalache 出場？\n4. DieHard 證明的 `<2>7. CASE UNCHANGED` 對應你手寫證明裡的哪句話？為什麼機器不接受「全章豁免」？\n5. 兩份精讀證明的最後一行都是 `BY ... PTL DEF Spec`——PTL 後端在那一步執行的推理，你在哪一章親手證過？\n6. Apalache 的兩段式歸納檢查各對應 ch14 三義務的哪條？它的綠燈與 TLAPS 的綠燈，各自承諾到哪裡為止？\n7. Lean 4、Rocq、Isabelle 各用一句話定位，並各說一個代表作。三者中誰跟 TLAPS 有直接的管線關係？\n8. 嚴謹度光譜五格，每格買到什麼、付出什麼？你自己的結算 pipeline 該停在哪格——用決策表的判準說出理由。\n\n## 延伸閱讀\n\n- **DieHard_proof.tla（tlaplus/Examples）**：<https://github.com/tlaplus/Examples/blob/master/specifications/DieHard/DieHard_proof.tla> — 本章精讀的原檔，全文 81 行（2026-06 開頁下載，引文逐字一致）。讀完本章再通讀一次全檔，BigToSmall 那個對稱案是現成的自我測驗。\n- **Consensus.tla（tlaplus/Examples）**：<https://github.com/tlaplus/Examples/blob/master/specifications/Paxos/Consensus.tla> — ch12 鉤子的本尊（2026-06 開頁核對）。Invariance 是最小的不變量證明範本；LivenessTheorem 是 WF1 規則的機器版，對照 ch14 的三份作業讀。\n- **Denis Cousineau, Damien Doligez, Leslie Lamport, Stephan Merz 等, “TLA+ Proofs”（FM 2012）**：<https://lamport.azurewebsites.net/pubs/tlaps.pdf> — 證明語言的設計論文（2026-06 連結可達）：為什麼是層級、為什麼宣告式（證明寫「什麼成立」而不是「按哪個鍵」）、義務怎麼生成。讀 §2–3 就夠。\n- **TLAPS 官網與 tlapm repo**：<https://proofs.tlapl.us/> 與 <https://github.com/tlaplus/tlapm>（2026-06 開頁）— 文件、教學與原始碼；後端組成與預設策略的權威出處。本書不裝工具，但哪天你想動手，入口在這裡。\n- **Apalache 手冊〈Running the Tool〉**：<https://apalache-mc.org/docs/apalache/running.html> — bounded model checking 與兩段式歸納檢查的官方說明（2026-06 開頁核對指令與措辭）；ch14 引用過，配合本章的原理段重讀。\n- **Leslie Lamport, “Proving Safety Properties”（2019）**：<https://lamport.azurewebsites.net/tla/proving-safety.pdf> — ch14 已列；現在你有了 TLAPS 的讀法，它的第 4–6 節（從手寫不變量到逐步餵進 TLAPS）會從「預告」變成「操作手冊」。手寫與機器之間最好的一座橋。\n"}, {"id": "ch17-industry-cases", "file": "ch17-industry-cases.md", "group": "Part VI — 實務與地圖", "title": "ch17 — 業界案例研究：誰在用、用在哪、值不值", "md": "# ch17 — 業界案例研究：誰在用、用在哪、值不值\n\n> **本章解決什麼問題**：Part I 到 Part V 把你從「測試蓋不住」一路帶到機器證明，但有個問題從 ch01 就懸著：這套東西在工業界到底是不是玩具？本章把證據攤開——AWS、MongoDB、Azure Cosmos DB、CockroachDB 四組查證過的案例，其中包含一份罕見而珍貴的失敗報告——然後從案例裡萃取決策框架：什麼問題值得形式化、成本誠實算在哪、spec 寫完之後誰來養。最後把框架按在你自己的結算 pipeline 上，逐判準走完、給出有數字的結論。ch18 接著把整個方法版圖收成一張地圖。\n\n你現在的位置：\n\n```text\n┌──────────────────────────────────────────────────────────────────┐\n│ Part I    為什麼                                                 │\n│   ch01 測試的極限 → ch02 狀態機                                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part II   數學地基                                               │\n│   ch03 邏輯 → ch04 集合 → ch05 歸納                              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part III  TLA+ 與時序邏輯                                        │\n│   ch06 動作邏輯 → ch07 時序邏輯 → ch08 完整 spec → ch09 TLC 原理 │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part IV   協議精讀                                               │\n│   ch10 互斥 → ch11 2PC → ch12 Paxos → ch13 Raft                  │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part V    證明                                                   │\n│   ch14 歸納不變量 → ch15 Refinement → ch16 機器證明              │\n└─────────────────────────────────┴────────────────────────────────┘\n                                  │\n                                  ▼\n┌─────────────────────────────────┬────────────────────────────────┐\n│ Part VI   實務                                                   │  ← 你在這裡\n│   ch17 業界案例 → ch18 方法地圖                                  │\n└──────────────────────────────────────────────────────────────────┘\n```\n\n## 從你已知的出發\n\n你做過技術評估。引入新的 message broker、換一顆資料庫、決定要不要自研一個元件之前，你翻官方文件、找 production 案例、潛水論壇討論串、估導入成本，最後寫一頁「採用建議」。你也早就學會這門手藝的潛規則：vendor 部落格的成功案例要打對折，「某大廠在用」不等於「適合我們」，真正值錢的是**失敗報告**與**成本數字**——而這兩樣最稀有，因為沒人愛寫自己的失敗，寫了也沒流量。倖存者偏差讓你只看得到講台上的贏家。\n\n本章做的就是一次你熟悉的技術評估，標的換成形式化方法。評估紀律也照舊：每個案例標注查證狀態與時點；數字綁年份；唯一一份誠實的失敗報告（MongoDB）被當成最有價值的證據細讀。還有一條本章特有的紀律——**只列查證過的案例**。網路上流傳的 TLA+ 採用者名單很長，但其中不少是傳聞滾傳聞；本書未能以原始來源確認的名字，一個都不會出現。寧缺勿錯。\n\n另一件值得先說的事：接下來的主角你全都用過。你的結算 pipeline 跑在 SQS 上、檔案丟在 S3、表可能在 DynamoDB；你選型時評估過 MongoDB 與 CockroachDB 這類分散式資料庫。這些系統的核心協議被本書教的方法驗過——你每天其實都在消費這些驗證成果，只是發票上沒印。\n\n最後，這個評估有個你以前沒有的優勢：讀完 Part I 到 V 的你已經付完學費。「值不值得」的算式裡，學習成本那一項對你而言已經攤提掉了。這會實質改變本章結尾那個 ROI 評估的結論。\n\n## AWS：從一篇論文到一個工具箱\n\n### 2011–2015：把「玩具」標籤撕掉的那篇論文\n\nch01 用 AWS 的證詞當開場白；現在把整份證據攤開。論文是 “How Amazon Web Services Uses Formal Methods”，發表於 *Communications of the ACM* Vol. 58 No. 4（2015 年 4 月），作者 Chris Newcombe、Tim Rath、Fan Zhang、Bogdan Munteanu、Marc Brooker、Michael Deardeuff——六位都是一線工程師，不是研究部門。開頭第一句話就把時間錨釘下：\n\n> Since 2011, engineers at Amazon Web Services (AWS) have used formal specification and model checking to help solve difficult design problems in critical systems.\n\n論文的核心證據是一張表（原文 Table 1，行數不含註解），值得整張搬過來：\n\n| 系統 | 元件 | 規格規模 | 成果（原文意旨） |\n|---|---|---|---|\n| S3 | 容錯的低階網路演算法 | 804 行 PlusCal | 找到 2 個 bug，後續在提議的最佳化中又找到更多 |\n| S3 | 資料的背景重分布 | 645 行 PlusCal | 找到 1 個 bug，又在第一版修法中找到另 1 個 |\n| DynamoDB | 複寫與群組成員系統 | 939 行 TLA+ | 找到 3 個 bug，其中需要長達 35 步的 trace |\n| EBS | Volume 管理 | 102 行 PlusCal | 找到 3 個 bug |\n| 內部分散式鎖管理服務 | Lock-free 資料結構 | 223 行 PlusCal | 提升信心；未找到某個 liveness bug——因為沒有檢查 liveness |\n| 內部分散式鎖管理服務 | 容錯的複寫與重組態演算法 | 318 行 TLA+ | 找到 1 個 bug，並驗證了一個激進的最佳化 |\n\n三個讀法。\n\n**第一，看行數。**六份 spec 全部落在 102～939 行之間。對照這些系統動輒數十萬行的實作，spec 不是第二份實作，是設計的 X 光片：把「規則少、交錯多」的協議核心抽出來照。這個尺寸感是後面決策框架的第一個判準。\n\n**第二，看那個 35 步。**最深的 bug 出自 DynamoDB 的複寫與群組成員系統（注意：是 DynamoDB，不是 S3——這是被轉述最常弄錯的一格）。原文的措辭值得逐字讀：\n\n> The shortest error trace exhibiting the bug included 35 high-level steps. … The bug had passed unnoticed through extensive design reviews, code reviews, and testing.\n\n35 步的高階交錯，意味著設計審查、code review、測試三道防線全部翻過去了——這正是 ch01「調度不可控＋狀態空間指數」論點的工業界對照組。而且原文特別反駁了「這麼複雜的事件組合不會真的發生」：AWS 工程師在歷史上觀測過的事件組合，複雜度不輸給能觸發這個 bug 的那些。Murphy 在超大規模下不是定律，是日常。\n\n**第三，看 S3 那行的前傳。**S3 團隊在用 TLA+ 之前，原本打算寫一支 Java 程式暴力窮舉可能的執行——原文說那本質上是 “a hard-wired form of model checking”。工程師被併發 bug 逼急了，會本能地自製模型檢查器；TLA+ 讓他們把這個輪子省下來。作者之一 Fan Zhang 從零開始，兩週內寫出兩版 spec，論文還記了一筆她「用 PlusCal 比用 TLA+ 更有生產力」——工具的人因工程是真議題，不是細節。\n\n組織面的證詞同樣綁著 2015 這個時點：\n\n> At the time of this writing, seven Amazon teams have used TLA+, all finding value in doing so. … Executive management actively encourages teams to write TLA+ specs for new features and other significant design changes. In annual planning, managers now allocate engineering time to TLA+.\n\n「七個團隊」是 2015 年論文寫作時點的數字，引用時必須帶年份——十年後拿它說「Amazon 只有七個團隊在用」是讀錯，拿它說「現在有七個團隊」也是讀錯。學習曲線的證詞則是：從新進到 principal 等級的工程師都能從零學起，並在「兩到三週內拿到有用的結果」（get useful results in two to three weeks）。記住這個數字，成本帳會用到。\n\n### 2015 之後：工具箱長大了\n\nAWS 在 2025 年發了續篇：“Systems Correctness Practices at Amazon Web Services”（*CACM* Vol. 68 No. 6，2025 年 6 月；另有 ACM Queue 版）。先誠實交代：本書查證時點（2026-06）這篇的全文被擋在取用限制之後，多次嘗試只拿得到摘要與二手轉述（轉述指作者為 Marc Brooker 與 Ankush Desai——Brooker 正是 2015 年論文的作者之一）。所以以下細節，凡是只出自這篇文章的，一律用保守措辭；能找到第一手來源的，我直接去開了第一手來源。\n\n文章的大方向（多個獨立轉述一致）：AWS 把正確性實務描述成一個**工具箱**，正式與半正式方法並陳——TLA+、P、程式碼級驗證、property-based testing、fuzzing、deterministic simulation、fault injection 等。TLA+ 仍在工具箱裡，但不再是唯一主角。其中兩件事查得到第一手來源：\n\n**P language。**源自 Microsoft 的規格語言，約 2019 年起轉入 AWS 內部發展並維持開源（時點為二手轉述）。P 的官方案例頁（2026-06 開頁查證）寫得很直接：開發者把系統建模成 communicating state machines——「Amazon 開發者群體熟悉的心智模型」。最著名的應用是 S3 在 2020 年 12 月上線的 strong read-after-write consistency；官方原文：\n\n> P was used for creating formal models of all the core distributed protocols involved in S3's strong consistency and checking that the system model satisfies the desired correctness guarantees.\n\nS3 從最終一致性遷移到強一致性，是在不能停機的全球規模存儲上換引擎；這種「協議級、故障×併發、錯誤代價極高」的問題形狀，正是形式化方法的甜蜜點。對你這個天天寫 SQS consumer 的人，P 的「通訊狀態機」心智模型會比 TLA+ 的「全域狀態＋動作」更眼熟——兩者的取捨放在 ch18 講。\n\n**Kani 與 Firecracker。**這是光譜的另一端：程式碼級驗證（見 ch16 的嚴謹度光譜）。Kani 是對 Rust 程式碼做模型檢查的開源工具；Firecracker（AWS Lambda 底下的 microVM）團隊用它驗證安全邊界。Kani 官方部落格的案例文（2026-06 開頁查證）給了難得的細節：驗證 I/O rate limiter 時找到 5 個 bug，包括一個捨入誤差讓 guest 可以超出配定頻寬上限約 0.01%；驗證 virtio 佇列時找到「不受信任的 guest 可以建出與 MMIO 區域部分重疊的佇列、讓 Firecracker 開機即崩潰」的 bug；最終 27 個驗證 harness 進了 CI 常駐執行。注意這些性質的形狀——「絕不 panic」「不越過頻寬上限」——是程式碼級的 invariant，跟 TLA+ 驗的設計級 invariant 是同一個概念在不同樓層的化身（見 ch02、ch14）。\n\n**一個必須拆掉的地雷：ShardStore。**S3 的儲存節點 ShardStore 有一篇 SOSP 2021 論文 “Using Lightweight Formal Methods to Validate a Key-Value Storage Node in Amazon S3”（本書未開原文，論文存在經多來源交叉確認）。它用的是**輕量級形式化方法——Rust 參考模型加 property-based testing——不是 P，也不是 TLA+**。網路轉述極常把它算進 TLA+ 或 P 的戰績；引用 AWS 案例時，這是僅次於「35 步 bug 張冠李戴」的第二大誤植來源。\n\n把 2015 與 2025 連起來讀，AWS 的軌跡很清楚：TLA+ 沒有退場，但它從「那個方法」變成「工具箱裡負責設計級驗證的那一格」；旁邊長出了更貼近工程師心智模型的 P、管程式碼樓層的 Kani 與輕量方法。對你的啟示不是「選哪個」，而是**分層**：設計級與程式碼級是兩個樓層的正確性，各有各的工具（ch18 的地圖會把這件事畫全）。\n\n## MongoDB：一份誠實的失敗報告\n\n成功案例看多了會麻痺，來看失敗的。“eXtreme Modelling in Practice”（A. Jesse Jiryu Davis、Max Hirschhorn、Judah Schvimer，*PVLDB* Vol. 13 No. 9，2020；2026-06 對照論文原文）報告了 MongoDB 的兩個案例：一個成、一個敗，而且作者把敗因解剖得毫不留情。這篇論文要解的問題正是形式化方法最大的軟肋——**spec 與實作的一致性**（conformance）：TLC 驗的是 spec，不是你的程式碼（見 ch09）；那怎麼確保程式碼真的長得像 spec？\n\n### MBTC：二十人週買到一個教訓\n\n第一個案例對 MongoDB Server 的複寫協議（協議本身與 Raft 同族，機制見 ch13）做 model-based trace-checking（MBTC）：在 C++ 實作裡埋 log，把真實執行的事件序列收集成 trace，再檢查每條 trace 是否為 TLA+ spec 允許的行為（行為＝狀態序列，見 ch02）。理論上這是把 spec 當成裁判、讓實作上場考試。\n\n實際上是災難。兩位工程師投入 10 週，寫了 570 行 C++ 儀器化程式碼、改了 252 行 TLA+、外加 484 行 Python 後處理，結果 5 個手寫測試裡只有 1 個能產出通過檢查的 trace——其他 4 個的失敗不是抓到實作 bug，而是 trace 收集本身對不上 spec 的抽象層次。最痛的一段是「可見性與鎖」：要在「entry 進了 leader 的 oplog 之後、follower 能複製它之前」這個精確時刻記下事件，得跟資料庫內部的階層式鎖搏鬥——光這一項就吃掉約一個月。團隊最後取消專案，原文的結語冷靜得像驗屍報告：\n\n> We canceled the MBTC project because we had achieved disappointingly little utility from our efforts.\n\n更狠的是成本外推：他們估計，對下一份 spec 做同樣的事，邊際成本不會比第一份便宜多少。根因在原文第 4 節說得明白——**spec 是為了文件化與模型檢查而寫的，不是為了 trace-checking 而寫的**；RaftMongo.tla 抽象層次很高、狀態變數很少，而實作是數萬行的併發 C++，兩者之間的 abstraction gap 得用儀器化程式碼一吋一吋填。原文的判決：“MBTC is only practical if the specification is written with MBTC in mind.”\n\n### MBTCG：四週換 4,913 個測試\n\n第二個案例對 MongoDB Realm Sync 的 operational transformation 演算法做 model-based test-case generation（MBTCG），方向整個反過來：不檢查實作的行為，而是**把 TLC 跑出來的狀態圖直接變成測試集**。他們把約 1,000 行 C++ 的合併規則（6 種陣列操作、21 條規則）幾乎逐行轉寫成 795 行 TLA+（原文坦白：「copy-paste C++ 再手改成合法 TLA+」），再用 755 行 Golang 解析 TLC 輸出的狀態圖，生成 4,913 個 C++ 測試案例。一位工程師，四週完工。\n\n成績單：生成的測試達成 100% 分支覆蓋（86/86）；對照組是 36 個手寫測試的 21%、AFL fuzzing 的 92%。途中 TLC 還在 ArraySwap 與 ArrayMove 的合併規則上撞出 StackOverflowError——查下去發現 C++ 原版有同一個 bug，**轉寫 spec 時把 bug 也忠實地抄過來了**，這直接促成新版實作棄用 ArraySwap。這個插曲值得玩味：spec 不是魔法，從有 bug 的程式碼轉寫出來的 spec 會繼承 bug；但窮舉式的檢查讓這顆 bug 在 spec 裡無所遁形，而它在 C++ 裡藏過了所有測試。\n\n### 一成一敗的解剖\n\n為什麼同一家公司、同一套方法論，結果天差地遠？論文自己的分析可以濃縮成一張對照：\n\n| | MBTC（敗） | MBTCG（成） |\n|---|---|---|\n| 標的 | 數萬行併發分散式協議實作 | 約千行、輸入輸出明確的純函式 |\n| spec 與實作的距離 | 高度抽象 spec vs 真實系統，鴻溝巨大 | spec 由實作逐行轉寫，距離趨近於零 |\n| 接縫工程 | 儀器化、鎖、trace 後處理，貴到放棄 | 解析 TLC 輸出生成測試，一次寫完 |\n| 狀態空間 | 真實執行的交錯，收不全也對不準 | 約束後可窮舉（3 客戶端、單操作、3 元素陣列） |\n| 投入 | 2 人 × 10 週 | 1 人 × 4 週 |\n\n這份報告對本章的價值有兩層。第一層是方法選擇：核心若能隔離成純函式，MBTCG 是黃金標準；核心若是活的併發系統，conformance 檢查貴到需要在寫 spec 之初就為它設計。第二層更普遍：**spec 與程式碼的同步是真實的、持續的、會吃預算的痛**，不是文件末尾一行「記得更新 spec」就能打發的——這是下面「spec 腐化」一節的主證據。\n\n## Azure Cosmos DB：spec 存在 ≠ spec 為真\n\nMicrosoft 的 Cosmos DB 是 TLA+ 的招牌案例之一：官方 spec repo（`Azure/azure-cosmos-tla`，2026-06 開頁查證）公開了五種一致性等級——strong、bounded staleness、session、consistent prefix、eventual——的 TLA+ 規格，外加三個由簡到繁的情境模型；團隊自述「heavily relies on TLA+」。README 還連到一段 Lamport 的受訪影片，談 TLA+ 在 Cosmos DB 的應用。這裡先把人物關係說準：**Lamport 曾與 Cosmos DB 團隊合作、受訪談其 TLA+ 實踐；他不是 Cosmos DB 或其一致性協定的設計者。**把發明 TLA+ 的人寫成用 TLA+ 的每個系統的設計者，是案例轉述的另一個常見變形。\n\n故事有趣的部分在後頭。Hackett、Rowe 與 Kuppe 的論文 “Understanding Inconsistency in Azure Cosmos DB with TLA+”（ICSE-SEIP 2023；2026-06 對照 arXiv 2210.13661 摘要）做了一件事：不站在實作者視角、改站在**使用者視角**重寫一份 spec——只描述「客戶端能觀測到什麼」。結果（摘要原文意旨）：這份 spec 比既有的任何 Cosmos DB 規格都更小、概念上更簡單，卻涵蓋了**更廣**的合法可觀測行為；其中不少行為「在 Cosmos DB 開發團隊之外此前連非正式的理解都談不上」。對使用者語意理解不足，已在依賴 Cosmos DB 的 Microsoft 產品裡造成過資料一致性錯誤；這項工作修正了兩處文件問題，並為另一個 Azure 服務先前一次高影響度的故障提供了根本解法（細節以摘要所述為準）。\n\n這個案例的教訓比表面深一層。官方 spec 一直都在、團隊一直在用 TLA+，但 spec 是**寫給實作者看的**——它描述內部協議怎麼運作，而不是使用者會看到什麼。第三方研究者用同一個語言、換一個視角，就照出了縫隙。所以「有沒有 spec」是個太粗的問題，要問的是：**spec 的受眾是誰、它最後一次對齊現實是什麼時候、誰負責它**。一份過期或視角錯位的 spec 比沒有 spec 更危險，因為它頂著「已形式化」的權威讓人放下戒心——這是 vacuous truth 的組織版（ch03 的老朋友：看起來成立，因為你問錯了問題）。\n\n## CockroachDB：一場 workshop 能買到什麼\n\n最後一個案例最小，也最容易複製。CockroachDB 的 Parallel Commits 是分散式交易 commit 協議的延遲最佳化：把傳統 2PC（見 ch11）裡「先 prepare 再 commit」的兩輪往返壓成一輪，代價是引入一個「implicit commit」中間狀態——交易在所有寫入意圖就位的瞬間就算邏輯上已提交，顯式的 commit 紀錄之後補寫。你的 ch11 直覺應該立刻拉警報：**新增中間狀態＋協調者可能在任何一步故障**，這正是 2PC blocking 問題的高危地形，憑感覺設計必死。\n\n所以他們寫了 spec。官方部落格（Nathan VanBenschoten，2019-11-07，2026-06 開頁查證）記載，團隊用 TLA+ 驗了兩條性質，名字取得教科書般工整：\n\n- **AckImpliesCommit**（safety）：coordinator 一旦向客戶端回報提交成功，該交易必然已提交——不存在「跟客戶說好了、系統裡卻沒有」的世界。\n- **ImplicitCommitLeadsToExplicitCommit**（liveness）：進入 implicit commit 狀態的交易終將進入 explicit commit，**即使 coordinator 故障**。用 ch07 的語言：這是一條 leads-to（⤳）性質，而且他們真的驗了它——對照 AWS Table 1 裡那行「沒驗 liveness 所以沒抓到 liveness bug」，這是補上另一半的示範。\n\nspec（`ParallelCommits.tla`）就放在 CockroachDB 的 GitHub repo。背景更值得注意：這份 spec 是在請 Hillel Wayne（learntla.com 作者）帶的內部 workshop 中發展出來的。換句話說，這不是 AWS 等級的多年投入，而是「一個資料庫團隊＋一位外聘講師＋一場 workshop」的產出規模，就對一個生死攸關的新協議拿到了 safety 與 liveness 兩張保證書。對在小團隊工作的你，這是四個案例裡尺寸最接近現實的一個。\n\n## 模式歸納：什麼問題值得形式化\n\n把四組案例放在一起，值得寫 spec 的問題長相可以收斂成七個判準。每個判準後面都站著一個案例。\n\n| # | 判準 | 案例根據 |\n|---|---|---|\n| 一 | **核心是「規則少、交錯多」的協議**：能用百行級 spec 描述的設計核心 | AWS Table 1：六份 spec 全在 102～939 行 |\n| 二 | **bug 主要來自故障×併發的交錯**，測試無法控制調度 | DynamoDB 35 步 bug 穿過三道人工防線 |\n| 三 | **錯誤代價高且不可逆**：資料毀損、錢、信任，而非可重試的瞬時失敗 | S3 強一致性遷移；CockroachDB 的 AckImpliesCommit |\n| 四 | **最壞反例很深**：需要多步精確交錯才觸發，人腦與隨機測試都搆不到 | 35 步；Firecracker 的 virtio 重疊佇列 |\n| 五 | **介入時機在設計期**：spec 最大紅利是在蓋之前想清楚；已上線系統的 spec 紅利轉為理解與文件 | AWS 高層把 spec 排進年度規劃 vs Cosmos DB 的考古式重寫 |\n| 六 | **有人養 spec**：明確 owner 與同步策略，否則註定腐化 | MongoDB conformance 之痛；Cosmos DB 視角錯位 |\n| 七 | **學習成本攤提得掉**：首次投入兩到三週，之後邊際成本驟降 | CACM 2015 學習曲線證詞；Fan Zhang 兩週兩版 spec |\n\n反面清單同樣重要——這些形狀**不**值得動用 TLA+：規則多但交錯少的業務 CRUD（測試、型別、code review 的性價比更高）；效能問題（TLA+ 不談快慢，見 ch09 對 TLC 能與不能的劃界）；UI 流程；以及能隔離成小純函式的邏輯——那是 property-based testing 或 MBTCG 的地盤（MongoDB 案例的正面教材，方法光譜見 ch18）。\n\n## 成本誠實帳\n\n案例讀完，把帳攤開。形式化方法的成本不只「學語言」一項，完整的帳有五行：\n\n**學習曲線。**CACM 2015 的證詞：從新進到 principal 的工程師都能從零學起，兩到三週拿到有用的結果。這個數字有兩個前提常被略過：一是「有用的結果」指第一份能跑 TLC 的 spec，不是精通；二是 AWS 有高階主管把這幾週排進年度規劃——學習時間是**編列出來的**，不是工程師用晚上擠的。你已經用這本書付掉這一行，但替團隊評估時，這行要照實列。\n\n**寫 spec 的成本。**百行級 spec、單人數天到數週（Fan Zhang：兩週兩版；CockroachDB：一場 workshop；MongoDB MBTCG：四週含測試生成器）。便宜的前提是判準一成立——你 spec 的是協議核心，不是整個系統。\n\n**驗證的極限。**spec 過了 TLC，買到的是「這個設計在這組參數下沒有反例」（見 ch09 的 small scope hypothesis），不是「程式碼正確」。設計與實作之間的 conformance gap 要嘛花錢驗（MongoDB 的帳單在上面）、要嘛誠實地接受為殘餘風險。多數團隊選後者——選了就寫下來，別假裝沒有。\n\n**維護成本。**spec 不會自動跟著程式碼演化。這行的單價見下一節。\n\n**隱藏的紅利（負成本）。**寫 spec 逼你在蓋之前把設計想清楚——ch01 的論點，四個案例全數佐證：S3 團隊省下自製模型檢查器、MongoDB 從轉寫過程揪出陳年 bug、Cosmos DB 的重寫照出連團隊都沒明說過的語意。就算 spec 寫完即丟，這份紅利已經落袋。\n\n## spec 腐化：維運視角\n\n你維運過的每種文件都會腐化：API 文件落後三個版本、runbook 寫著已下線的指令、架構圖畫著去年的拓撲。spec 也是文件，一樣會腐化——但它腐化得更危險，因為它頂著「已驗證」的光環。過期的 runbook 你會半信半疑，過期的 spec 你會全信。\n\n兩個案例已經把這件事演示完了：MongoDB 想用機器逼 spec 與程式碼同步，二十人週買到「除非 spec 為此而設計，否則不可行」；Cosmos DB 的官方 spec 一直活著、團隊一直在用，第三方仍然照出了 spec 視角與使用者現實的落差。腐化不是「會不會」的問題，是「漂移速度 vs 對齊頻率」的問題——跟你管 schema migration、管 infra-as-code 的 drift 是同一道題。\n\n對策是一條光譜，成本遞增：\n\n| 對策 | 做法 | 成本 | 適用 |\n|---|---|---|---|\n| 凍結標註 | spec 註明「驗證於設計 vX／對應 commit」，過期即明示 | 近乎零 | 一次性設計驗證 |\n| 流程掛鉤 | 協議級改動的 PR checklist 強制「review 並更新 spec」 | 低 | 小團隊、低頻改動 |\n| MBTCG | spec 生成測試集，測試掛 CI——spec 過期測試就會說話 | 中（MongoDB：1 人 4 週） | 核心可隔離成純函式 |\n| MBTC / trace checking | 實作軌跡對 spec 檢查 | 高（MongoDB：2 人 10 週仍敗） | spec 自始為此設計、多實作對齊 |\n| Runtime 監控 | 生產日誌對 spec 驗證（P 生態的 PObserve 走這個方向，2026-06 僅見官方簡述，細節未查證） | 高 | 超大規模、持續驗證需求 |\n\n維運鐵律一條：**spec 要有 owner，跟 runbook 一樣**。沒有 owner 的 spec 不是資產，是一張會誤導後人的過期地圖。團隊只有一個人？那就是你——把對齊動作掛進你自己的變更流程（本章紙上推演的題 3 就是這道題）。\n\n## Worked example：你的結算 pipeline 值不值得寫 spec\n\n把七個判準按在本書的貫穿範例上，從頭走到尾。評估標的（見 ch02 引入、ch08 升級）：K8s CronJobs → SQS → idempotent consumers → 入帳 ledger；at-least-once 投遞、consumer 可能 crash、redelivery、dedup 表；量級每季 10 萬～30 萬筆結算訊息。問題：**這個系統值不值得寫 TLA+ spec？**\n\n**判準一：核心是不是百行級的協議？**是。整個 pipeline 很大（排程、拉取、業務計算、入帳、報表），但「正確性吃緊」的核心只有一塊：redelivery × dedup × 入帳的 exactly-once 語意。規則少（收訊、查 dedup、入帳、寫 dedup、ack、crash、redeliver 七八個動作）、交錯多。對照 AWS Table 1 的尺寸感，這是 EBS volume 管理（102 行）那一級的 spec，不是 DynamoDB（939 行）那一級。估計 50～150 行。✓\n\n**判準二：bug 是否來自故障×併發交錯？**是，而且你有第一手證據：ch01 開場那個 race——dedup 檢查與入帳之間被插隊——正是這個形狀。integration test 沒辦法命令 SQS「請在 consumer 寫完 dedup、還沒 ack 的那 200 毫秒裡 redeliver 給另一個 consumer」；調度不可控，這是 ch01 的老結論。✓\n\n**判準三：錯誤代價高且不可逆？**是——這條 pipeline 碰錢。算兩個情境。常態損耗：假設 double-pay 率十萬分之一，每季 10 萬～30 萬筆 ⇒ 每季 1～3 筆錯帳，每筆對帳＋客服＋修數抓 2～4 小時工程時間，一年燒掉約 8～48 小時，即 0.2～1.2 個人週——單看這條，連 spec 的成本都未必回得來，低頻但持續流血而已。尾部風險才是大頭：一次 deploy 引入的調度型 race 在尖峰期把錯誤率拉到千分之一 ⇒ 單季 100～300 筆錯帳，這是「全體對帳＋對外道歉」等級的事故，成本以人月與信任計。✓\n\n**判準四：最壞反例多深？**中等深。`NoDoublePay` 的典型反例（ch08 的 v1 攤開過這類窗口）需要「consumer A 入帳→crash 落在寫 dedup 與 ack 之間→redelivery→consumer B 查 dedup 撲空→再入帳」，約 5～8 步精確交錯。不到 35 步，但已經超出 code review 可靠目視的深度，也超出非決定性測試穩定重現的能力。✓\n\n**判準五：設計期還是考古期？**誠實說：考古期——系統已上線，最大紅利（蓋之前想清楚）已經錯過。但兩個殘值仍在：(a) pipeline 還會演化（加 DLQ、改 batch consumer、換 broker 的議題都在 backlog），每次協議級改動都是一個 mini 設計期；(b) spec 是 onboarding 與交接的高密度文件（Cosmos DB 路線的正面用法）。△——半分。\n\n**判準六：誰養 spec？**你，而且只有你。所以策略選光譜最便宜的兩格：凍結標註＋流程掛鉤——spec 標明對應版本，協議級改動時更新並紙上重驗。明確**不**做 MBTC：MongoDB 用二十人週證明了那條路對這個規模不成立。dedup 查寫邏輯若日後隔離成純函式，可以考慮 MBTCG，但目前不是。✓（有策略即算過，策略要寫進 spec 檔頭。）\n\n**判準七：學習成本攤提了嗎？**已攤提——你讀到 ch17 了。邊際成本不是 CACM 2015 的兩三週，是寫一份你已經在 ch02～ch15 反覆操作過的系統的 spec：抓 2～5 個工作天。✓\n\n**結論（有數字版）：值得，但範圍嚴格限定。**只 spec「redelivery × dedup × ledger」核心（約百行、2～5 個工作天，外加每次協議級改動 0.5～1 天的維護），不 spec CronJob 排程、SQS 內部、業務計算。收益端：防住的主要不是每季 1～3 筆的常態損耗（那用對帳 job 防更便宜），而是判準三算出來的尾部事故——單次 100～300 筆錯帳、人月級清理。只要你估「未來兩年內因協議級改動引入一次這種 race」的機率高於一成，期望損失就已經超過 spec 的全部成本。而本書其實已經把答案演示完了：這份 spec 在 ch02～ch15 被一路寫出來、驗過、證過——你現在做的這個評估，是事後替一個已完成的投資補上投資備忘錄，而備忘錄說：投對了。\n\n**誠實的反轉條款**：把同一條 pipeline 換成不碰錢的內部報表系統，判準三倒下——錯一筆的代價是重跑 job，不可逆性消失，整個 ROI 隨之瓦解。那種系統的正確答案是 idempotent consumer 的常識模式＋一個對帳 job，spec 免了。判準框架的價值不在「告訴你要寫 spec」，在於讓「不寫」也成為一個有論證的決定。\n\n## 陷阱與防禦\n\n讀業界案例自己的故障模式。每一條都在本章出現過實例：\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 倖存者偏差 | 部落格只刊成功案例，你以為方法戰無不勝 | 主動找失敗報告；MongoDB MBTC 那份比十篇成功案例值錢 |\n| 張冠李戴 | 「S3 找到 35 步 bug」「ShardStore 用 TLA+」「Lamport 設計了 Cosmos DB」——全錯 | 回到原始來源；本章正文已給對照：35 步＝DynamoDB、ShardStore＝Rust＋property-based testing、Lamport＝合作與受訪 |\n| 數字脫離時點 | 「七個團隊」被當成永恆事實引用 | 數字一律綁年份：「2015 年論文時點七個團隊」 |\n| 有 spec＝沒問題 | 官方 spec repo 活著，就以為語意被正確理解 | 問三件事：spec 受眾是誰、最後對齊現實是何時、owner 是誰（Cosmos DB 教訓） |\n| 工具只答你問的 | 「TLC 全綠」但你根本沒寫 liveness 性質——空洞的安心 | 顯式列性質清單；AWS lock manager 那行（沒驗 liveness 就沒抓到 liveness bug）與 ch07 的 fairn
