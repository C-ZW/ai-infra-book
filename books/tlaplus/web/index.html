<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>把系統寫成定理 — 閱讀器</title>
<style>
:root{ --fs:18px; --lh:1.95; --ls:0.02em; --ps:1.0; --pw:52; }
/* Monospace CJK=2-columns fix: CJK runs inside <pre> are wrapped in .cjkw
   spans at render time (see wrapCJK) and scaled so a fullwidth PingFang glyph
   is exactly 2x Menlo's advance (2 x 0.60205em -> 120.41%). Done with spans
   instead of @font-face size-adjust because WebKit ignores size-adjust on
   local() sources. Assumes Apple platform fonts. */
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
/* themes */
body[data-theme="paper"]{--bg:#f7f2e9;--fg:#2f2b24;--muted:#8d8474;--border:#e2d9c6;--codebg:#efe8d7;--link:#a05a17;--accent:#b06a1e;--side:#f0e9d8;--sideactive:#e4d9bf}
body[data-theme="light"]{--bg:#ffffff;--fg:#24292f;--muted:#6e7781;--border:#e8eaed;--codebg:#f5f7f9;--link:#0a69c2;--accent:#0a69c2;--side:#f7f8fa;--sideactive:#e9edf2}
body[data-theme="sepia"]{--bg:#f4ecd8;--fg:#52432e;--muted:#9b8a6d;--border:#dfd2b3;--codebg:#ebdfc3;--link:#985a1f;--accent:#985a1f;--side:#eee2c8;--sideactive:#e2d3ae}
body[data-theme="dark"]{--bg:#22262c;--fg:#c4ccd4;--muted:#828d99;--border:#3a424b;--codebg:#2b323a;--link:#7ab8f5;--accent:#7ab8f5;--side:#1d2126;--sideactive:#2e353d}
body{background:var(--bg);color:var(--fg)}
a{color:var(--link)}
/* layout */
#layout{display:flex;height:100%}
#sidebar{width:288px;min-width:288px;background:var(--side);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0 40px;transition:transform .2s}
#main{flex:1;overflow-y:auto;position:relative;scroll-behavior:auto}
#sidebar .brand{font-weight:700;font-size:15px;padding:6px 18px 12px;line-height:1.5}
#sidebar .grp{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;padding:14px 18px 4px}
#sidebar a.ch{display:block;padding:6px 18px;font-size:13.5px;line-height:1.5;color:var(--fg);text-decoration:none;border-left:3px solid transparent}
#sidebar a.ch:hover{background:var(--sideactive)}
#sidebar a.ch.active{background:var(--sideactive);border-left-color:var(--accent);font-weight:600}
#sidebar .allbtn{margin:16px 18px 0;display:block;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--fg);text-decoration:none;background:var(--bg)}
#topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
#topbar .ttl{flex:1;font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:8px;padding:6px 11px;font-size:14px;line-height:1}
.btn:hover{background:var(--codebg)}
a.btn{text-decoration:none;display:inline-block;white-space:nowrap}
#hamburger{display:none}
/* prose */
.prose{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:2.4rem 1.7rem 3rem;font-size:var(--fs);line-height:var(--lh);letter-spacing:var(--ls)}
body[data-font="sans"] .prose{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
body[data-font="serif"] .prose{font-family:"Songti TC","Noto Serif TC",Georgia,"PMingLiU",serif}
.prose p{margin:calc(var(--ps)*1em) 0}
.prose h1{font-size:1.5em;line-height:1.45;margin:.2em 0 .9em}
.prose h2{font-size:1.3em;line-height:1.45;margin:2em 0 .8em;padding-bottom:.35em;border-bottom:1px solid var(--border)}
.prose h3{font-size:1.13em;margin:1.7em 0 .6em}
.prose h4{font-size:1.02em;margin:1.4em 0 .5em}
.prose li{margin:.45em 0}
.prose ul,.prose ol{padding-left:1.6em}
.prose blockquote{margin:1.3em 0;padding:.7em 1.2em;border-left:4px solid var(--accent);background:var(--codebg);border-radius:0 8px 8px 0}
.prose blockquote p{margin:.5em 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:2.4em 0}
.prose img{max-width:100%}
.prose pre{background:var(--codebg);border:1px solid var(--border);border-radius:8px;padding:.9em 1.1em;overflow-x:auto;font-size:.84em;line-height:1.6;letter-spacing:0;font-family:Menlo,ui-monospace,monospace}
.prose pre code{background:none;padding:0;border:none;font-size:1em}
.prose pre .cjkw{font-family:"PingFang TC","PingFangTC-Regular","PingFang SC","Noto Sans TC",sans-serif;font-size:120.41%;line-height:0;letter-spacing:0}
.prose code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"PingFang TC",monospace;background:var(--codebg);border:1px solid var(--border);border-radius:5px;padding:.08em .35em;font-size:.86em;letter-spacing:0}
.prose table{border-collapse:collapse;display:block;overflow-x:auto;margin:1.3em 0;font-size:.9em;line-height:1.65;letter-spacing:0}
.prose th,.prose td{border:1px solid var(--border);padding:.5em .75em;text-align:left;vertical-align:top}
.prose th{background:var(--codebg);white-space:nowrap}
#pager{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:0 1.7rem 5rem;display:flex;gap:12px;justify-content:space-between}
#pager .btn{flex:1;text-align:center;padding:13px;font-size:14px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* settings panel */
#panel{position:fixed;top:0;right:0;height:100%;width:300px;background:var(--side);border-left:1px solid var(--border);z-index:20;padding:18px 20px 40px;overflow-y:auto;transform:translateX(105%);transition:transform .2s;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
#panel.open{transform:none}
#panel h3{margin:4px 0 14px;font-size:16px}
#panel .row{margin:0 0 16px}
#panel label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
#panel input[type=range]{width:100%}
#panel .seg{display:flex;gap:6px;flex-wrap:wrap}
#panel .seg .btn{flex:1;min-width:56px;text-align:center;font-size:13px}
#panel .seg .btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9;display:none}
#backdrop.show{display:block}
@media (max-width:880px){
  #sidebar{position:fixed;left:0;top:0;height:100%;z-index:15;transform:translateX(-102%)}
  #sidebar.open{transform:none;box-shadow:6px 0 24px rgba(0,0,0,.15)}
  #hamburger{display:inline-block}
  .prose{padding:1.6rem 1.1rem 2.5rem}
}

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "把系統寫成定理", "md": "# 把系統寫成定理\n\n> TLA+ 與形式化方法——寫給一位資深後端工程師的紙上之旅。\n\n## 這本書是什麼\n\n你寫了六年的高併發系統：佇列、冪等 consumer、分散式交易、WebSocket 叢集。你靠測試、code review 與直覺把它們撐在線上——而你也清楚，有些 bug 是這三樣東西天生抓不到的。這本書教另一條路：把系統寫成數學物件，把「它不會出錯」變成可以證明的定理。\n\n三個設定，開讀前先知道：\n\n- **純紙上推演**。全書不裝任何工具、不寫程式。TLC、TLAPS 這些工具只學原理與讀法，動手的部分是紙和筆：手畫狀態空間、手追 trace、手寫歸納證明。\n- **深入到證明層**。不止於「會讀 spec」：歸納不變量、refinement、機器證明的讀法都是正餐，不是甜點。\n- **你的系統是貫穿範例**。一個 SQS 風格的結算 pipeline 從 ch02 的狀態機開始，一路走到 ch15 把「at-least-once＋dedup＝exactly-once」變成定理。\n\n## 怎麼讀\n\n每章固定骨架：開場地圖 → **從你已知的出發**（橋接你的後端經驗）→ 核心機制 → **陷阱與防禦**（這個概念怎麼給你假安全感）→ **紙上推演**（2~4 題，附完整解答與預估時間）→ **自我檢核**（口頭自答：講不清楚＝還沒懂）→ 延伸閱讀。\n\n推演題請真的拿紙筆做完再看解答；自我檢核用說的，不是用想的。考核過關制：上一章的檢核講不順，先別開下一章。\n\n## 路線\n\n- **Part I（ch01–02）**：為什麼測試不夠；一切都是狀態機。\n- **Part II（ch03–05）**：邏輯、集合、歸納法——數學地基，從「大學看過」磨到能用。\n- **Part III（ch06–09）**：TLA+ 的動作邏輯與時序邏輯；讀懂完整 spec；TLC 的原理與極限。\n- **Part IV（ch10–13）**：四個經典協議精讀手推——Peterson、2PC、Paxos、Raft。\n- **Part V（ch14–16）**：證明層——歸納不變量、refinement、TLAPS 與定理證明全景。\n- **Part VI（ch17–18）**：業界誰在用、值不值；TLA+ 之外的方法地圖與下一步。\n\n事實性內容（工具版本、業界案例）的查證基準時點是 **2026-06**；維護方式見 `_meta/maintenance.md`。\n"}, {"id": "ch01-why-formal-methods", "file": "ch01-why-formal-methods.md", "group": "Part I — 為什麼", "title": "ch01 — 測試的極限：為什麼需要形式化方法", "md": "# ch01 — 測試的極限：為什麼需要形式化方法\n\n> **本章解決什麼問題**：你已經有單元測試、整合測試、k6 壓測、staging 環境，為什麼還需要另一套方法？本章把「測試與證明在能力上的本質差別」說清楚：測試是對調度空間抽樣，正確性卻是對所有調度的主張。我們從一個你親手處理過的 race 出發，手算交錯數讓你體感組合爆炸，用 AWS 的第一手證詞確認這不是學術焦慮，最後攤開形式化方法的全景地圖、標出 TLA+ 與本書的位置。它是全書的「為什麼」；「用什麼心智模型」在 ch02。\n\n```text\n《把系統寫成定理》全書地圖\n\nPart I 為什麼\n  ch01 測試的極限    ← 你在這裡\n  ch02 狀態機\n      │\n      ▼\nPart II 數學地基\n  ch03 邏輯 ─ ch04 集合 ─ ch05 歸納\n      │\n      ▼\nPart III TLA+ 與時序邏輯\n  ch06 動作邏輯 ─ ch07 時序邏輯 ─ ch08 完整 spec ─ ch09 TLC 原理\n      │\n      ▼\nPart IV 協議精讀\n  ch10 互斥 ─ ch11 2PC ─ ch12 Paxos ─ ch13 Raft\n      │\n      ▼\nPart V 證明\n  ch14 歸納不變量 ─ ch15 Refinement ─ ch16 機器證明\n      │\n      ▼\nPart VI 實務\n  ch17 業界案例 ─ ch18 方法地圖\n```\n\n## 從你已知的出發\n\n下面這個故事是合成的，但每個零件你都見過。\n\n季結算夜。K8s CronJob 把十幾萬筆結算訊息丟進 SQS，一排 consumer 把訊息撈出來入帳。冪等的做法是教科書式的：入帳前先查 ledger 表有沒有這個 msgId，沒有才寫入。單元測試全綠、整合測試全綠、k6 壓測跑了一整個下午也沒事。上線幾個月後的某個結算夜，監控撈出兩筆重複入帳：同一個 msgId、兩筆款項、相隔 11 毫秒。\n\n你大概已經猜到劇本。SQS 是 at-least-once：visibility timeout 一到，同一則訊息被第二個 consumer 撈走。兩個 consumer 幾乎同時查 ledger——都查到「沒有」——然後都寫入。dedup 檢查與入帳之間，被插隊了。\n\n修法你也知道：把檢查與寫入包進同一個交易、或在 msgId 上加 unique constraint 讓資料庫當最後防線。真正麻煩的是修完之後那個沒人敢大聲回答的問題：**還有沒有別的調度會出事？**\n\n事後你會發現三件事都沒說謊，但也都沒幫上忙：\n\n- **測試沒說謊**。它說的是「我跑過的那些執行都沒出事」，它從來沒承諾過別的。\n- **壓測沒說謊**。k6 製造的是「大量請求」，不是「剛好在 dedup 檢查與入帳之間插隊的那 11 毫秒」。heisenbug 的特性就是：你越想觀察它，它越不出現。\n- **你的 code review 直覺沒說謊**。看到 check-then-act 就皺眉、問「這兩行之間會不會被插隊」——那其實是你腦中的非正式模型檢查。但它的深度大概兩三步、一次只能盯一兩個變數。\n\n這本書要做的事說穿了很簡單：把那個 code review 直覺接上數學，讓它能走到 35 步深（這個數字從哪來，本章後面有第一手證詞），而且走完之後敢說：**全部的調度我都看過了**。\n\n## 測試在對抗什麼：調度是你控制不了的輸入\n\n先把單執行緒的世界說清楚，才能看出併發的世界差在哪。\n\n一支單執行緒的純函式，行為完全由輸入決定。測試它的方法論是成熟的：列等價類、夾邊界值、量覆蓋率。輸入空間雖大，但你抽樣的空間就是行為空間本身，抽得好，信心是有道理的。\n\n併發與分散式系統多了一個輸入：**調度**（schedule）——誰先執行哪一步的順序。它由 OS 排程器、網路延遲、GC 停頓、connection pool、SQS 的重送時機共同決定。這個輸入有三個討厭的性質：\n\n1. **你控制不了它**。測試框架能固定輸入、mock 時鐘，但沒有一個 `--schedule-seed` 能讓你指定「這次請讓 consumer B 在 A 的第 2 步與第 3 步之間插進來」。\n2. **它的空間大到天文數字**。下一節手算給你看。\n3. **測試環境抽到的調度分布，跟生產環境不一樣**。CI 上兩個請求經過 HTTP、連線池、資料庫，自然錯開；生產環境的高負載、GC 停頓、多核搶占，會把分布推向你沒抽過的角落。\n\n所以一條綠色 CI pipeline 的精確語意是：「在我這個環境的調度分布下，抽了 n 個樣本，沒抽到反例。」這句話跟「不存在反例」之間的距離，就是這本書存在的理由。\n\nDijkstra 在 1970 年前後把這件事說成了一句話：\n\n> Program testing can be used very effectively to show the presence of bugs but never to show their absence.\n> （程式測試可以非常有效地展示 bug 的存在，但永遠無法展示 bug 的不存在。）\n\n這句話一般考據最早出現在 1969 年 NATO 軟體工程會議的報告；本書引用的版本出自他的手稿 EWD303（連結見延伸閱讀）。注意它不是在說測試沒用——「有效地展示 bug 的存在」是真心話，測試是工程上最划算的找 bug 工具。它說的是測試的**陳述能力**有上限：\n\n- 測試能說的是**存在性**：「存在一個執行出了錯」（找到 bug）或「在抽過的執行裡沒看到錯」。\n- 正確性是**全稱**的主張：「所有可能的執行都不出錯」。\n\n抽樣永遠到不了全稱。要到全稱只有兩條路：把所有可能執行**窮舉**一遍（模型檢查，原理見 ch09），或者**證明**一個對所有執行都成立的論證（見 ch05、ch14）。這就是測試與證明在能力上的本質差別——不是嚴謹程度的差別，是陳述類型的差別。\n\n還有一個常見的誤解要先拆掉：覆蓋率。行覆蓋、分支覆蓋量的是**程式碼空間**，不是**調度空間**。一支 100% 行覆蓋的程式，仍然可以在九成的調度下是錯的——不信的話，下一節的程式只有三行，任何一個測試都覆蓋全部三行，然後我們數數看二十種調度裡有幾種會出事。\n\n## 把「插隊」算清楚：一個 counter 的二十種劇本\n\n這是本章的 worked example。規則：每一步手算，不跳步。\n\n### 程式與建模假設\n\n兩個執行緒 A、B 各跑一次同一段程式，對共享變數 `counter`（初始值 0）做遞增：\n\n```text\n步驟 1：r := counter      （讀：把共享值抄進私有變數 r）\n步驟 2：r := r + 1        （算：私有變數加一）\n步驟 3：counter := r      （寫：把私有變數寫回共享值）\n```\n\nA 的三步記作 A1、A2、A3，B 的記作 B1、B2、B3。私有變數分別是 r_A、r_B。兩個執行緒都跑完後，期望 `counter = 2`。\n\n建模假設先講明白：**每一步是原子的**——一步要嘛完整發生、要嘛還沒發生，沒有「寫到一半」。這是一個刻意的抽象選擇（真實 CPU 的記憶體模型會讓事情更糟，本書全程假設步驟原子、不涵蓋記憶體一致性模型）。抽象的選擇本身是門手藝，ch02 會正面討論。\n\n### 交錯數：C(6,3) = 20\n\n一個**調度**（也叫交錯，interleaving）就是把 A1A2A3 與 B1B2B3 合併成一條 6 步的序列，且各自的內部順序不變：A1 在 A2 前、A2 在 A3 前，B 同理。\n\n數法：6 個時間槽裡選 3 個給 A（剩下的自動給 B），各執行緒內部順序唯一，所以交錯數就是組合數：\n\nC(6,3) = 6! / (3!·3!) = 720 / (6×6) = 720 / 36 = **20**\n\n### 手列全部 20 種調度\n\n用 6 個字母的字串表示調度，第 i 個 A 代表 A 的第 i 步。逐一手追每條的最終 `counter` 值（怎麼追，下面有三條完整示範）：\n\n| # | 調度 | counter | # | 調度 | counter |\n|---|---|---|---|---|---|\n| 1 | AAABBB | **2** | 11 | BAAABB | 1 |\n| 2 | AABABB | 1 | 12 | BAABAB | 1 |\n| 3 | AABBAB | 1 | 13 | BAABBA | 1 |\n| 4 | AABBBA | 1 | 14 | BABAAB | 1 |\n| 5 | ABAABB | 1 | 15 | BABABA | 1 |\n| 6 | ABABAB | 1 | 16 | BABBAA | 1 |\n| 7 | ABABBA | 1 | 17 | BBAAAB | 1 |\n| 8 | ABBAAB | 1 | 18 | BBAABA | 1 |\n| 9 | ABBABA | 1 | 19 | BBABAA | 1 |\n| 10 | ABBBAA | 1 | 20 | BBBAAA | **2** |\n\n行數對帳：AA 開頭的有 C(4,1) = 4 條（#1–4）、AB 開頭 C(4,2) = 6 條（#5–10）、BA 開頭 6 條（#11–16）、BB 開頭 4 條（#17–20），共 4+6+6+4 = 20，跟公式一致。\n\n三條代表性調度，完整手追：\n\n**調度 #1（AAABBB）——好的：**\n\n| 步 | 動作 | r_A | r_B | counter |\n|---|---|---|---|---|\n| 初始 | — | – | – | 0 |\n| A1 | r_A := counter | 0 | – | 0 |\n| A2 | r_A := r_A + 1 | 1 | – | 0 |\n| A3 | counter := r_A | 1 | – | 1 |\n| B1 | r_B := counter | 1 | 1 | 1 |\n| B2 | r_B := r_B + 1 | 1 | 2 | 1 |\n| B3 | counter := r_B | 1 | 2 | **2** |\n\n**調度 #6（ABABAB）——壞的：**\n\n| 步 | 動作 | r_A | r_B | counter |\n|---|---|---|---|---|\n| 初始 | — | – | – | 0 |\n| A1 | r_A := counter | 0 | – | 0 |\n| B1 | r_B := counter | 0 | 0 | 0 |\n| A2 | r_A := r_A + 1 | 1 | 0 | 0 |\n| B2 | r_B := r_B + 1 | 1 | 1 | 0 |\n| A3 | counter := r_A | 1 | 1 | 1 |\n| B3 | counter := r_B | 1 | 1 | **1** |\n\n兩次遞增，一次蒸發——經典的 lost update，跟你在 DB 隔離等級實戰裡看過的是同一隻鬼。\n\n**調度 #4（AABBBA）——壞的，而且壞得比較隱蔽：**\n\n| 步 | 動作 | r_A | r_B | counter |\n|---|---|---|---|---|\n| 初始 | — | – | – | 0 |\n| A1 | r_A := counter | 0 | – | 0 |\n| A2 | r_A := r_A + 1 | 1 | – | 0 |\n| B1 | r_B := counter | 1 | 0 | 0 |\n| B2 | r_B := r_B + 1 | 1 | 1 | 0 |\n| B3 | counter := r_B | 1 | 1 | 1 |\n| A3 | counter := r_A | 1 | 1 | **1** |\n\nA 明明是先讀的，最後一步才寫回，把 B 的成果蓋掉。\n\n### 為什麼是 18/20 壞\n\n規則可以一句話說清楚：最終值是 2，若且唯若其中一個執行緒的**寫**（第 3 步）發生在另一個執行緒的**讀**（第 1 步）之前。但 A3 是 A 的最後一步、B1 是 B 的第一步，「A3 在 B1 之前」等於「A 整個跑完 B 才開始」——也就是調度 #1；對稱地，#20 是另一條。其餘 18 條裡，兩個讀都發生在兩個寫之前，兩邊都讀到 0、都寫回 1。\n\n所以這支三行程式，**20 種調度裡 18 種是錯的，錯誤率 90%**。\n\n那為什麼你的測試跑一千次還是全過？因為這三步在真實機器上只花奈秒等級的時間，OS 的時間片是毫秒等級，兩個執行緒又不會在同一奈秒起跑——實際的調度分布幾乎全部質量都壓在 #1 和 #20 上。**數學上 90% 的劇本是壞的，物理上 99.99% 的抽樣落在好的那 2 條。**測試量測的是「你的環境抽到壞調度的機率」，工程要回答的是「壞調度存不存在」。這兩個問題的答案可以差很遠，而且生產環境會自己把機率調高：負載、GC、核心數，都在幫你抽你沒抽過的調度。\n\n### 把規模推上去：組合爆炸\n\n把「執行緒數 × 每執行緒步數」調大，交錯數是多項式係數（推導同 C(6,3)：先選 A 的位置、再選 B 的、再選 C 的）：\n\n| 配置 | 公式 | 交錯數 |\n|---|---|---|\n| 2 執行緒 × 3 步 | 6!/(3!)² | 20 |\n| 3 執行緒 × 3 步 | 9!/(3!)³ = C(9,3)×C(6,3) = 84×20 | 1,680 |\n| 2 執行緒 × 10 步 | C(20,10) | 184,756 |\n| 3 執行緒 × 10 步 | 30!/(10!)³ = C(30,10)×C(20,10) = 30,045,015×184,756 | 5,550,996,791,340 |\n\n3 個執行緒、各 10 步——這還只是一段沒有迴圈、沒有 crash、沒有重送的直線程式——交錯數約 5.55×10¹²。假設有個神奇框架每秒能驗 100 萬種**不重複**的調度：5,550,996,791,340 ÷ 10⁶ ≈ 5,550,997 秒 ≈ 64 天。每秒一千種的話，約 5.55×10⁹ 秒 ≈ 176 年。而真實測試既不保證不重複，也不均勻抽樣。\n\n而且這個數字還是**低估**。真實系統有迴圈與重試（步驟序列本身不固定）、crash 與重送（行為可以無限延長）、訊息數與節點數都是參數。窮舉調度的樹是不可能的——不過先別絕望，這 20 條調度其實共享大量中間狀態，把「調度的樹」壓成「狀態的圖」之後，事情會突然變得可行。這是 ch02 與 ch09 的主線，也是模型檢查能在工業上活下來的原因。\n\n## AWS 的證詞：35 步深的 bug\n\n「狀態空間爆炸、測試蓋不住」聽起來像學術焦慮，所以這裡放工業界最有名的一份第一手證詞：Amazon Web Services 的工程師在 *Communications of the ACM* 2015 年 4 月號發表的〈How Amazon Web Services Uses Formal Methods〉（Newcombe、Rath、Zhang、Munteanu、Brooker、Deardeuff）。開頭第一句：\n\n> Since 2011, engineers at Amazon Web Services (AWS) have used formal specification and model checking to help solve difficult design problems in critical systems.\n> （自 2011 年起，AWS 的工程師就使用形式化規格與模型檢查，協助解決關鍵系統中的困難設計問題。）\n\n論文的 Table 1 列出他們在幾個核心系統上的成果（行數不含註解）：\n\n| 系統 | 元件 | 規格 | 成果 |\n|---|---|---|---|\n| S3 | 容錯低階網路演算法 | 804 行 PlusCal | 找到 2 個 bug，後續在提議的最佳化中又找到更多 |\n| S3 | 背景資料重分配 | 645 行 PlusCal | 找到 1 個 bug，第一版修正裡又找到 1 個 |\n| DynamoDB | 複寫與群組成員系統 | 939 行 TLA+ | 找到 3 個 bug，需要長達 35 步的 trace |\n| EBS | Volume 管理 | 102 行 PlusCal | 找到 3 個 bug |\n| 內部分散式鎖管理器 | lock-free 資料結構 | 223 行 PlusCal | 提升信心；未找到一個 liveness bug，因為沒檢查 liveness |\n| 內部分散式鎖管理器 | 容錯複寫與重新配置演算法 | 318 行 TLA+ | 找到 1 個 bug，並驗證了一個激進的最佳化 |\n\n重點是 **DynamoDB** 那一行。複寫與群組成員系統的 spec 找到三個 bug，其中一個的**最短**錯誤路徑要 35 個高層步驟。論文原文值得整段讀：\n\n> …shortest error trace exhibiting the bug included 35 high-level steps. The improbability of such compound events is not a defense against such bugs; historically, AWS engineers have observed many combinations of events at least as complicated as those that could trigger this bug. The bug had passed unnoticed through extensive design reviews, code reviews, and testing…\n> （……展示這個 bug 的最短錯誤路徑包含 35 個高層步驟。「這種複合事件機率太低」並不是防線；AWS 工程師在歷史上觀察過許多至少同樣複雜的事件組合。這個 bug 通過了大量的設計審查、code review 與測試而未被察覺……）\n\n把這段對回你的經驗：你的 code review 直覺能往前看兩三步；設計審查的白板推演大概五步以內；測試抽樣抽到一條特定 35 步調度的機率，跟中樂透是同一個量級。而模型檢查器找到它，靠的不是運氣，是窮舉（怎麼窮舉的，見 ch09）。「機率太低不是防線」這句話，建議直接裱起來——它就是 Murphy 定律的工業版本。\n\n另外兩個細節對「值不值得學」這個問題很有資訊量：\n\n- S3 團隊本來打算寫一支 Java 程式暴力枚舉可能的執行——本質上是手刻一個寫死的模型檢查器。改用 TLA+ 之後省下了這個工。寫 spec 的工程師兩週內寫出兩版規格。論文也提到，從新人到 principal 等級的工程師都能從零學起，**二到三週內得到有用的結果**。\n- 截至論文寫作時點（**2015 年**），有**七個** Amazon 團隊用過 TLA+，全部都認為有價值；管理層主動鼓勵新功能與重大設計變更寫 TLA+ spec，年度規劃裡會為此排工程時間。注意這個「七個團隊」是 2015 年的快照，不是今天的數字；AWS 後來的工具箱還加進了 P 語言與更輕量的方法（見 ch17）。\n\n還有一行容易被跳過、但對本書讀者特別重要：lock-free 資料結構那行的「未找到一個 liveness bug，**因為沒檢查 liveness**」。工具誠實得很——你沒問的問題，它不會替你回答。這件事在「陷阱與防禦」一節還會回來。\n\n## 形式化方法全景地圖：TLA+ 在哪裡\n\n「形式化方法」是一整個大陸，不是一個工具。用兩個問題就能把地圖攤開：\n\n**第一個問題：驗的是什麼層次？**\n\n- **規格層（設計層）**：驗演算法與協議的設計本身。對象是「這個兩階段提交的設計有沒有洞」，不是某段 TypeScript。TLA+ 住在這層。\n- **程式碼層**：驗實作本身，連同語言語意一起。代表作：seL4（用 Isabelle 證明的 OS 核心）、CompCert（用 Rocq 證明的 C 編譯器）、Dafny（內建驗證的程式語言）。代價高一到兩個數量級，本書只在 ch16、ch18 給定位，不展開。\n\n**第二個問題：怎麼驗？**\n\n- **Model checking**：機器自動窮舉（或符號化覆蓋）狀態空間，找性質的反例。輸出是**反例 trace**——一條從初始狀態走到出錯的具體路徑，像一份完美的 bug report。極限：通常只能在有限的小模型上窮舉（見 ch09）。\n- **Theorem proving**：人寫證明、機器逐步查證每個推理義務。輸出是**定理**——對任意參數、無限狀態都成立。極限：要人花腦力，而且證明卡住時不會給你反例（見 ch14–16）。\n\n兩軸交叉，加上你已經會的方法，地圖長這樣：\n\n| | 自動找反例（model checking） | 人寫證明（theorem proving） |\n|---|---|---|\n| **規格層** | **TLA+ ＋ TLC**；Alloy（關聯邏輯＋小模型窮舉）；P（通訊狀態機，見 ch18） | **TLA+ ＋ TLAPS**；Event-B（以逐步精化為核心，見 ch18） |\n| **程式碼層** | 較少見，多半先抽象成模型再檢查 | seL4、CompCert、Dafny | \n\n注意測試、property-based testing、fuzzing 不在表裡——它們是**抽樣**方法，住在地圖之外的另一塊大陸；這張地圖上的居民共同點是做**全稱**主張。兩塊大陸是互補不是取代（ch18 會把光譜接起來）。\n\n第三個維度是投資多重，從輕到重大致是：\n\n```text\n輕量 ──────────────────────────────────────────────────► 重型\n型別系統   PBT   模型檢查（TLC）   符號檢查（Apalache）   機器證明（TLAPS）   全程式碼驗證\n```\n\nTLA+ 的生態位置：一門規格語言，配三個引擎——\n\n```text\n            ┌──────────────────┐\n            │  TLA+ 規格       │\n            └────────┬─────────┘\n     ┌───────────────┼───────────────────────┐\n     ▼               ▼                       ▼\n┌──────────────┐   ┌──────────────┐   ┌──────────────┐\n│ TLC 窮舉檢查 │   │ Apalache SMT │   │ TLAPS 證明   │\n└──────────────┘   └──────────────┘   └──────────────┘\n```\n\n- **TLC**：在有限參數下窮舉所有可達狀態、檢查性質，給反例 trace。原理是圖搜尋加指紋，極限是組合爆炸與「有限不等於定理」（見 ch09）。\n- **Apalache**：把固定步數內的轉移編成 SMT 約束交給求解器，走符號路線（見 ch16）。\n- **TLAPS**：人寫層級式證明，機器拆成證明義務交給後端 prover 查證，能證「任意參數」的定理（見 ch16）。\n\n本書的路線就是沿著這張地圖走：先學會把系統說成數學（Part I–III）、在經典協議上手推（Part IV）、最後爬上證明層（Part V）、回到工業界的地面（Part VI）。\n\n該誠實的也要誠實：這張地圖上沒有銀彈。窮舉受限於規模、證明受限於人力、spec 與程式碼會漂移（見 ch17）。決策框架——什麼時候值得動用這套、什麼時候測試就夠——放在「陷阱與防禦」之後的判準表，ch17 會用真實成本資料再算一次帳。\n\n## 寫 spec 的最大價值：先想清楚\n\n到目前為止的敘事都是「找 bug」，但用過 TLA+ 的團隊常說最大的紅利在更早的地方。Lamport 在同一期 CACM 的觀點文章標題就是論點本身：〈Who Builds a House Without Drawing Blueprints?〉——蓋房子沒有人不畫藍圖，寫系統為什麼不畫？\n\n藍圖的價值不是「畫得漂亮」，是**精確性逼你回答你還沒問過自己的問題**。拿你的結算 pipeline 試試，把「同一筆訊息不會入帳兩次」寫精確：\n\n- 「同一筆」是指 msgId 相同，還是業務內容相同？SQS 重送的訊息算同一筆，那上游重發、msgId 不同但內容相同的呢？\n- consumer 在「入帳之後、ack 之前」crash，訊息會重送——這時「至多一次」還成立嗎？靠什麼成立？\n- 「每筆訊息終究會入帳」——如果某個 consumer 反覆 crash-restart 呢？「終究」依賴什麼假設？\n\n用白話寫 design doc，這些問題可以含糊過去；寫成精確的規格，寫不下去的地方就是你還沒想清楚的地方。這件事發生在你寫第一行實作**之前**——這是槓桿最大的時刻，改一行 spec 的成本與改一套上線系統的成本差了幾個數量級。AWS 論文裡那些「在設計審查就被殺掉的 bug」，省下的不只是修復成本，是整條返工鏈。\n\n所以本書雖然不碰鍵盤，你也不會白讀：把「系統永遠不會 X」的清單寫進 design doc、用狀態機的眼睛審別人的設計，這些紅利不需要任何工具就能帶走（ch18 會把這個習慣整理成可以日常使用的形式）。\n\n## 陷阱與防禦\n\n本章層級的誤用模式。左欄的每一句話你大概都聽過（或說過）：\n\n| 陷阱 | 它怎麼給你假安全感 | 怎麼自我察覺與防禦 |\n|---|---|---|\n| 「覆蓋率 95%，很安全」 | 行覆蓋量的是程式碼空間，不是調度空間。本章那支 counter 程式，任何一個測試都是 100% 行覆蓋，然後 20 種調度裡 18 種是錯的。 | 對每段共享狀態的程式碼問：哪些步驟之間可以被插隊？插隊空間有多大？覆蓋率對這個問題的答案貢獻是零。 |\n| 「壓測一週都沒事」 | 壓測抽的是**你這個環境**的調度分布。分布的質量集中在無害區；換硬體、換負載、GC 行為一變，分布就移動。 | 把「沒看到反例」與「不存在反例」當成兩句不同的話來說。被要求簽「不會出事」時，問自己簽的是哪一句。 |\n| 「我們用了形式化方法，所以系統是對的」 | 反向的假安全感，而且更危險。驗過的是**模型**不是程式碼；TLC 窮舉的是**有限參數**；驗的只有**你寫出來的性質**。AWS 的鎖管理器團隊 223 行 spec 提升了信心，但一個 liveness bug 沒抓到——因為他們沒檢查 liveness。 | 三連問：驗的是哪個模型（抽象掉了什麼）？哪些性質（漏了什麼沒問）？多大的參數（見 ch09 的 small scope 討論）？答不出來的那格就是洞。 |\n| 「先寫 code，spec 以後補」 | 事後補 spec 仍有價值（MongoDB 的經驗見 ch17），但「先想清楚」的槓桿在設計期，返工成本已經付掉了。 | 在 design doc 階段就寫下不變的性質清單，哪怕用白話。發現寫不精確的地方，就是設計還沒收斂的地方。 |\n| 「學了形式化方法，測試可以少寫了」 | 過度修正。spec 驗設計、測試驗實作，對象不同；設計對了，實作照樣能寫錯。 | 記住地圖：抽樣大陸與全稱大陸是互補的。決策用下面的判準表，方法全景見 ch18。 |\n\n什麼時候值得形式化、什麼時候測試就夠——第一版判準（ch17 會用業界成本資料精煉它）：\n\n| 訊號 | 測試就夠 | 值得考慮形式化 |\n|---|---|---|\n| 失敗的形狀 | 單執行緒業務邏輯、純函式 | 併發 × 故障的交錯（crash、重送、亂序） |\n| 錯誤的代價 | 可重跑、可補償 | 錢、資料遺失、不可逆的對外承諾 |\n| 重現難度 | 失敗可穩定重現 | heisenbug，重現一次要等下個結算夜 |\n| 空間的形狀 | 輸入空間大、調度空間小 | 調度空間爆炸（本章算過的那種） |\n| 設計的壽命 | 需求月月變的 CRUD | 一次設計、多年不動的核心協議 |\n\n## 紙上推演\n\n**第 1 題 [10 分鐘] ★ —— dedup 的交錯數**\n\n兩個 consumer 同時拿到同一則訊息（at-least-once 重送）。每個 consumer 兩步：C（查 ledger 有沒有這個 msgId）、P（沒有就入帳並寫入 ledger）。consumer 1 的兩步記 C₁、P₁，consumer 2 記 C₂、P₂。\n\n(a) 交錯共有幾種？列出全部。\n(b) 哪些交錯違反「同一 msgId 至多入帳一次」？\n(c) 把 C 與 P 包進同一個資料庫交易（視為一個原子步）後，交錯數變多少？還有壞的嗎？\n\n### 推演解答\n\n(a) 4 個時間槽選 2 個給 consumer 1：C(4,2) = 6 種。\n\n| # | 調度 | 結果 |\n|---|---|---|\n| 1 | C₁P₁C₂P₂ | 好：C₂ 查到已入帳，跳過 |\n| 2 | C₁C₂P₁P₂ | **壞**：兩個 C 都查到空，雙重入帳 |\n| 3 | C₁C₂P₂P₁ | **壞**：同上 |\n| 4 | C₂C₁P₁P₂ | **壞**：同上 |\n| 5 | C₂C₁P₂P₁ | **壞**：同上 |\n| 6 | C₂P₂C₁P₁ | 好：C₁ 查到已入帳，跳過 |\n\n(b) 6 種裡 4 種壞。壞的共同形狀：**兩個檢查都發生在任何入帳之前**——check-then-act 的經典裂縫，跟本章開場的事故一模一樣。\n(c) 原子化之後每個 consumer 只剩 1 步，交錯數 C(2,1) = 2：先到的入帳，後到的在交易裡查到已存在、跳過。兩種都好。這就是「交易為什麼有效」的狀態空間版解釋：**原子化把 6 種劇本砍成 2 種，而且砍掉的剛好是全部的壞劇本**。注意成本：交易範圍變大，鎖競爭上升——你在 RDS 上調過這種 trade-off。\n\n**第 2 題 [20 分鐘] ★★ —— 測過 1,000 次都對的提款**\n\n共享變數 `balance = 100`。兩個請求並發執行 `withdraw(80)`：\n\n```text\nw1. r := balance              （讀餘額）\nw2. if r < 80 then abort      （檢查）\nw3. balance := balance - 80   （扣款：UPDATE ... SET balance = balance - 80）\n```\n\n測試報告：整合測試連跑 1,000 次，每次先後送出兩個 withdraw(80)，斷言第二個被拒絕且餘額不為負，1,000 次全過。請求 A 的三步記 A1–A3，B 的記 B1–B3。\n\n(a) 寫出一條讓 balance 變成 −60 的調度，逐步列出 r_A、r_B、balance。\n(b) 20 種調度裡有幾種會出事？\n(c) 為什麼 1,000 次測試一個都沒抓到？至少給兩個理由。\n(d) 「balance 永遠 ≥ 0」這個主張，測試最多能告訴你什麼？\n\n### 推演解答\n\n(a) 調度 A1 B1 A2 B2 A3 B3：\n\n| 步 | 動作 | r_A | r_B | balance |\n|---|---|---|---|---|\n| 初始 | — | – | – | 100 |\n| A1 | r_A := balance | 100 | – | 100 |\n| B1 | r_B := balance | 100 | 100 | 100 |\n| A2 | 100 ≥ 80，通過 | 100 | 100 | 100 |\n| B2 | 100 ≥ 80，通過 | 100 | 100 | 100 |\n| A3 | balance := 100−80 | 100 | 100 | 20 |\n| B3 | balance := 20−80 | 100 | 100 | **−60** |\n\n「這個欄位永遠不會是負的」——你在 code review 守的那條規矩——在第 6 步被打破。\n\n(b) 出事的條件：兩邊都通過檢查，也就是 B1 發生在 A3 之前**且** A1 發生在 B3 之前（兩邊都讀到 100）。跟 worked example 同一個論證：唯二安全的調度是 AAABBB 與 BBBAAA（後跑的那個讀到 20，檢查擋下）。**18/20 壞**。同一個 bug，換了一身業務的衣服。\n(c) 理由一：測試是「先後送」——await 完第一個請求才送第二個，調度被測試程式自己序列化了，20 種劇本永遠只抽到 #1。理由二：就算真的並發送，w1 到 w3 的時間窗是微秒級，兩個請求隔著 HTTP、連線池、資料庫，自然錯開。理由三（加分）：斷言只驗證了抽到的那條執行，它對其他 19 條劇本沒有任何陳述能力。\n(d) 「在我抽過的調度裡，沒看到負餘額。」僅此而已。要說「永遠」，需要窮舉所有可達狀態（ch09），或對「所有可達狀態都滿足 balance ≥ 0」做歸納證明——這正是 ch05 與 ch14 要教的事，「永遠」這個詞在那裡會得到精確的定義（ch02）。\n\n**第 3 題 [25 分鐘] ★★★ —— 估算狀態空間，殺死一個壓測企劃**\n\n(a) 4 個 consumer 各執行 5 個原子步（共享一張 dedup 表）。交錯數的公式與數值？\n(b) 假設有個理想框架每秒能跑 10,000 種**保證不重複**的調度，跑完 (a) 要多久？\n(c) 同樣總步數 20 步：「2 執行緒 × 10 步」與「10 執行緒 × 2 步」哪邊交錯多？各算出來，並說出直覺。\n(d) 以上計算為什麼仍然**低估**真實系統的行為數？給兩個理由。\n\n### 推演解答\n\n(a) 20 個時間槽依序分給 4 個 consumer：20!/(5!)⁴ = C(20,5)×C(15,5)×C(10,5) = 15,504 × 3,003 × 252。手算：15,504 × 3,003 = 46,558,512；46,558,512 × 252 = **11,732,745,024**，約 1.17×10¹⁰。\n(b) 11,732,745,024 ÷ 10,000 ≈ 1,173,275 秒 ≈ **13.6 天**。而且「保證不重複」是現實中不存在的奢侈品——真實壓測是有偏的重複抽樣，大部分樣本砸在同幾條無害調度上。13.6 天是不可達的下界，不是預估工時。\n(c) 2×10：C(20,10) = **184,756**。10×2：20!/(2!)¹⁰ = 20!/1,024 = **2,375,880,867,360,000**，約 2.4×10¹⁵——多了 **10 個數量級**。直覺：交錯數 = 總排列 ÷ 各執行緒內部順序的約束；執行緒越多，每條內部的順序約束越短，除掉的東西越少（分母 (10!)² ≈ 1.3×10¹³ 對上 (2!)¹⁰ = 1,024）。工程含義：把工作拆給更多並發單元，正確性論證的空間不是線性變大，是爆炸。\n(d) 理由一：crash 與重送讓步驟序列本身不固定，行為可以無限延長（「無限的行為」如何嚴格定義，見 ch02）。理由二：訊息數、consumer 數都是參數，每組參數是另一個空間，窮舉了 (2,2) 不代表 (3,5) 沒事（見 ch09 的 small scope 討論）。理由三（加分）：「每步原子」本身是抽象假設，真實的交易隔離等級與記憶體模型會再放大空間。\n\n## 自我檢核\n\n口頭回答，講得出來才算過。講不清楚的，回去重讀對應小節。\n\n1. 用 30 秒向另一個工程師解釋：測試與形式化驗證的本質差別是什麼？（關鍵詞：抽樣、全稱主張——如果你只說了「比較嚴謹」，不算過。）\n2. 為什麼「再多測十倍」無法把併發系統的信心推到 100%？哪兩個分布的落差讓「測了很多次」失去意義？\n3. 不看書，重新推導 C(6,3) = 20：為什麼交錯數是「選位置」的組合數？20 條裡安全的是哪兩條、為什麼恰好是那兩條？\n4. AWS 的 35 步 bug 出在哪個系統的哪個元件？「機率太低不是防線」這句話的論據是什麼？「七個團隊」這個數字綁定哪一年？\n5. 形式化方法地圖的兩個軸是什麼？TLA+ 落在哪一格？TLC 與 TLAPS 在地圖上差在哪裡？\n6. 「工具只回答你問了的問題」——用 AWS 鎖管理器的例子說明這句話，並說出你自己系統裡一個「從來沒被問過」的性質。\n7. 三個系統：內部 CRUD 後台、分散式鎖服務、你的結算 pipeline——用判準表逐一評估哪個最值得形式化，說出每條判準的打分。\n\n## 延伸閱讀\n\n- Newcombe et al., \"How Amazon Web Services Uses Formal Methods\", *CACM* 58(4), 2015. DOI：`https://doi.org/10.1145/2699417`（正式版有付費牆）。本章引用的所有 AWS 數字與引文都出自這篇；先讀 Table 1 與 DynamoDB 一節。\n- 同文前身（免費 PDF）：「Use of Formal Methods at Amazon Web Services」（2014 技術報告），Lamport 網站存檔：`https://lamport.azurewebsites.net/tla/formal-methods-amazon.pdf`。內容與 CACM 版高度重疊，引用數字時以 CACM 版為準。\n- Dijkstra, \"On the reliability of programs\"（EWD303），UT Austin 檔案館轉錄：`https://www.cs.utexas.edu/~EWD/transcriptions/EWD03xx/EWD303.html`。名言的原始脈絡——他不是在罵測試，是在論證「正確性需要不同種類的論證」。\n- Lamport, \"Who Builds a House Without Drawing Blueprints?\", *CACM* 58(4), 2015. DOI：`https://doi.org/10.1145/2736348`。「先想清楚」論點的原典，四頁，一杯咖啡的長度。\n- Lamport, *Specifying Systems*（Addison-Wesley, 2002），官方頁免費 PDF：`https://lamport.azurewebsites.net/tla/book.html`。全書的最終參考書；現在先收藏，從 ch06 起會反覆對照。\n- Hillel Wayne 的 learntla：`https://learntla.com`。免費線上教材，偏實作操作路線——本書刻意不碰鍵盤，哪天你想動手跑 TLC，從這裡開始最快。\n"}, {"id": "ch02-state-machines", "file": "ch02-state-machines.md", "group": "Part I — 為什麼", "title": "ch02 — 一切都是狀態機：state、behavior、invariant", "md": "# ch02 — 一切都是狀態機：state、behavior、invariant\n\n> **本章解決什麼問題**：ch01 的結論是測試窮舉不完調度，最後一道防線是證明。但「證明系統正確」要成立，得先把「系統」變成一個數學上可以操作的東西——本章給出這個東西：狀態機。你會拿到全書通用的四個詞：狀態（state）、步（step）、行為（behavior）、規格（specification）＝允許行為的集合；並第一次見到貫穿全書的範例「結算系統 v0」與它的第一條不變量 `NoDoublePay`。ch03–05 負責磨利描述這套模型所需的數學，ch06 再把整套東西寫成 TLA+。\n\n## 從你已知的出發\n\n你其實天天在跟狀態機打交道，只是沒人逼你把詞說清楚。\n\n- **DB 的一筆 row 在某個瞬間的值，就是一個狀態的片段。** 你 debug 線上事故時拼湊的那張全景——這筆訂單的 row、Redis 裡的鎖、佇列深度、consumer 的記憶體裡掛著什麼——把它們全部疊起來，那個完整快照才是本章說的「狀態」。\n- **一筆 UPDATE 是一個步。** 交易 commit 前後各照一張快照，這一對「之前／之後」就是步的全部內容。\n- **transaction log（binlog、WAL、event store）是一條行為。** 你做過 replay：從初始狀態出發，把事件一條一條套用，重建出現在的狀態。Event sourcing 與 Redux 的世界觀——「狀態＝初始狀態 fold 上事件序列」——就是狀態機觀點，你早就在寫了。\n- **Code review 時你腦中跑的 what-if，是在窮舉行為。**「這裡如果被插隊呢？如果 consumer 在這行掛掉呢？」你審的從來不是「程式會做什麼」，而是「程式**可能**做什麼」。本章只是把這件你做了六年的事，從直覺升級成可以數、可以畫、可以證的東西。\n\nch01 的痛點是：行為太多，測試只能抽樣。本章的回應是：那就把「所有行為」本身定義成一個數學物件。物件定義清楚了，ch05 之後才有資格談「對所有行為證明」。\n\n## 狀態、步、行為：三個定義\n\n### 狀態（state）：變數的一組賦值\n\n先選定一組變數，**狀態就是給每個變數各指定一個值的一組賦值（assignment）**。沒有別的了——不需要「目前執行到哪一行」這種特殊地位的東西；程式計數器要的話，自己也宣告成一個變數（ch08 會看到 PlusCal 翻譯出來的 `pc` 變數正是這樣）。\n\n兩個立刻要釘住的推論：\n\n1. **狀態是整體快照，不是單一變數。** 「queue 還剩什麼」不是狀態，「queue 還剩什麼＋consumer 手上有什麼＋帳本長什麼樣」合起來才是。併發 bug 幾乎都藏在「兩個變數各自看都合理、合在一起不合理」的組合裡——所以單位必須是整組賦值。\n2. **所有可能的賦值組合構成「狀態空間」。** 注意這是「型別上寫得出來的全部組合」，跟「系統實際走得到的狀態」是兩回事——這個區分在本章後半是主角。\n\n順帶把詞釘準：本書說「狀態機」，不是 regex 課本裡那種有限自動機，也不是 UML 裡畫給產品經理看的小圈圈圖。變數可以多個、值域可以無限大；「狀態機」在這裡只是「初始狀態＋轉移規則」這個極簡結構的名字。\n\n### 步（step）：一對前後狀態\n\n**步就是一對狀態 ⟨s, t⟩：之前是 s，之後是 t。** 哪些步被允許，由「動作規則」決定——每條規則說清楚兩件事：\n\n- **前提**：在什麼樣的狀態 s 才可以走這條規則；\n- **效果**：走完之後 t 的每一個變數是什麼。**每一個**變數——沒提到的變數不是「隨便」，而是「不變」。漏寫這件事是寫規格時最常見的 bug（ch06 會看到 TLA+ 用一個專門的寫法堵這個洞）。\n\n橋接：一條動作規則就是一筆交易的 before/after 契約。前提 ≈ `WHERE` 條件與鎖的取得；效果 ≈ commit 之後資料庫的長相。\n\n### 行為（behavior）：一條可以無限長的狀態序列\n\n**行為就是一條狀態序列 s₀ → s₁ → s₂ → …**，其中 s₀ 是合法的初始狀態，而且每一對相鄰狀態 ⟨sᵢ, sᵢ₊₁⟩ 都是某條動作規則允許的步。\n\n- 行為可以**有限**（系統做完了、或者就是停了），也可以**無限**（伺服器不關機）。形式化的慣例是把有限執行看成「之後永遠停在最後一個狀態」的無限序列——這個看起來無聊的小動作，之後會變成 TLA+ 最深思熟慮的設計之一（見 ch06）。\n- 一台狀態機通常生出**很多條**行為：每個狀態可能有好幾條規則可走，每個分岔都是一條新的行為。你的 binlog 是其中一條被現實抽中的；狀態機是「所有可能的 binlog」的集合。\n\n## 規格：允許行為的集合\n\n現在可以把全書的核心視角一句話說完：\n\n> **一個系統的規格（specification），就是它允許的行為的集合。**「系統正確」＝「實際發生的每一條行為，都落在這個集合裡」。\n\n這句話翻轉了一個習慣：規格不是「程式會怎麼跑」的描述，而是「我允許世界怎麼演化」的立法。立法的對象不只你的程式——consumer 的程式碼、佇列的投遞、機器的當機、使用者的重試，全部寫進同一台狀態機的動作規則。你的 spec 裡沒寫的事，就是你宣告不可能發生的事；這個責任本章最後一節（抽象的選擇）會回來算帳。\n\n### 非決定性：不是隨機，是「都可能」\n\n一個狀態可以同時有好幾條規則可走。誰決定走哪條？**沒有人。** 規格只回答「允不允許」，不回答「多常發生」、也不附機率分布。這叫**非決定性（nondeterminism）**，它跟「隨機」是兩種世界觀：\n\n- 隨機說：「這條路 0.1% 機率。」\n- 非決定性說：「這條路**存在**。」\n\n對驗證來說，非決定性才是對的工具，原因很工程：你要的保證是「**所有**允許的行為都不出事」，那麼調度器就必須當成對手而不是骰子——對手永遠挑最壞的那條路走。ch01 那個要 35 步才踩到的 DynamoDB bug（見 ch01）機率上低到測不到，但它**可達**；可達，乘上你的流量，就是遲早的事故報告。\n\n這也預告了故障怎麼建模：consumer 會 crash，不是寫「以某機率失敗」，而是加一條「只要它活著，隨時允許走」的動作規則。crash 與重送正式進場是 v1 的事（見 ch08）；本章的 v0 先活在不會當機的童話裡——而且我們會誠實地標出童話的邊界。\n\n## 結算系統 v0：把你的 pipeline 削到剩骨頭\n\n全書的貫穿範例登場。原型是你維護過的東西：CronJob 把結算訊息丟進 SQS，idempotent consumer 撈出來入帳，每季十萬到三十萬筆。v0 把它削到只剩骨頭：\n\n- **2 則訊息**：m1、m2。\n- **1 個 consumer**（本章稍後加到 2 個）。\n- **3 個變數**：\n\n| 變數 | 值域 | 意義 |\n|---|---|---|\n| `queue` | {m1, m2} 的子集 | 還在佇列裡的訊息（集合，不記順序——這是個刻意的抽象，後面算帳） |\n| `working` | idle、m1、m2 三選一 | consumer 手上正在處理的訊息；idle ＝空手 |\n| `ledger` | 每則訊息對應 0 或 1 | 帳本：msgId → 是否已入帳（0 ＝未入帳、1 ＝已入帳，ch06 寫成 TLA+ 時用 FALSE/TRUE；↦ 讀作「對應到」） |\n\n- **初始狀態**（恰好一個）：⟨queue = {m1, m2}, working = idle, ledger = [m1 ↦ 0, m2 ↦ 0]⟩。\n- **2 條動作規則**：\n\n| 規則 | 前提 | 效果 |\n|---|---|---|\n| `Fetch(m)` | m ∈ queue 且 working = idle | queue 移除 m；working 變成 m；ledger 不變 |\n| `Settle(m)` | working = m | ledger[m] 改成 1；working 回到 idle；queue 不變 |\n\n就這樣。沒有 crash、沒有重送、沒有 visibility timeout、入帳和「把訊息處理完」綁成原子的一步。v0 不是因為現實長這樣，而是因為**心智模型要先在最小的世界裡站穩**；每一項被省略的現實，都會在後面的章節以升級的形式還回來（v1 見 ch08）。\n\n## 手畫 v0 的完整狀態空間（worked example）\n\n現在動手。目標：把 v0（2 則訊息、1 個 consumer）**所有走得到的狀態**畫成一張圖——節點是狀態、邊是步。這張圖之後很多章要回來對帳，所以這裡一步不跳。\n\n### 八個狀態，一個一個數\n\n從初始狀態開始做廣度優先的窮舉：每拿到一個新狀態，就把兩條規則逐一比對前提，看能走去哪。\n\n**第 0 層**：只有初始狀態，叫它 S0。\n\n- S0 = ⟨queue = {m1, m2}, working = idle, ledger = [m1 ↦ 0, m2 ↦ 0]⟩\n- 可走的規則：`Fetch(m1)`（m1 ∈ queue ✓、working = idle ✓）、`Fetch(m2)`（同理 ✓）。`Settle` 不可走：手上沒訊息。\n\n**第 1 層**：S0 的兩條出邊各到一個新狀態。\n\n- S1 = ⟨queue = {m2}, working = m1, ledger = [m1 ↦ 0, m2 ↦ 0]⟩ —— 由 `Fetch(m1)` 到達。\n  可走：`Settle(m1)` ✓。`Fetch(m2)` 前提 m2 ∈ queue ✓ 但 working ≠ idle ✗，**不可走**——單一 consumer 一次只拿一則。\n- S2 = ⟨queue = {m1}, working = m2, ledger = [m1 ↦ 0, m2 ↦ 0]⟩ —— 由 `Fetch(m2)` 到達。\n  可走：只有 `Settle(m2)`，理由同上。\n\n**第 2 層**：\n\n- S3 = ⟨queue = {m2}, working = idle, ledger = [m1 ↦ 1, m2 ↦ 0]⟩ —— S1 經 `Settle(m1)`。\n  可走：`Fetch(m2)` ✓（m2 ∈ queue、空手）。`Fetch(m1)` ✗：m1 ∉ queue（∉ ＝不屬於）。\n- S4 = ⟨queue = {m1}, working = idle, ledger = [m1 ↦ 0, m2 ↦ 1]⟩ —— S2 經 `Settle(m2)`。\n  可走：只有 `Fetch(m1)`。\n\n**第 3 層**：\n\n- S5 = ⟨queue = ∅, working = m2, ledger = [m1 ↦ 1, m2 ↦ 0]⟩ —— S3 經 `Fetch(m2)`。可走：只有 `Settle(m2)`。\n- S6 = ⟨queue = ∅, working = m1, ledger = [m1 ↦ 0, m2 ↦ 1]⟩ —— S4 經 `Fetch(m1)`。可走：只有 `Settle(m1)`。\n\n**第 4 層**：\n\n- S7 = ⟨queue = ∅, working = idle, ledger = [m1 ↦ 1, m2 ↦ 1]⟩ —— S5 經 `Settle(m2)`、S6 經 `Settle(m1)`，兩條路在這裡會合。\n  可走：沒有。queue 空了，`Fetch` 前提不成立；手是空的，`Settle` 前提不成立。系統停在這裡（「停」這件事在形式化裡怎麼安頓，ch06 有個漂亮的答案）。\n\n沒有第 5 層。**可達狀態總數：8。**\n\n整理成表（位置欄是個速記：每則訊息此刻在哪——Q ＝佇列、C ＝ consumer 手上、L ＝已入帳）：\n\n| 代號 | (m1, m2) 位置 | queue | working | ledger |\n|---|---|---|---|---|\n| S0 | (Q, Q) | {m1, m2} | idle | [m1 ↦ 0, m2 ↦ 0] |\n| S1 | (C, Q) | {m2} | m1 | [m1 ↦ 0, m2 ↦ 0] |\n| S2 | (Q, C) | {m1} | m2 | [m1 ↦ 0, m2 ↦ 0] |\n| S3 | (L, Q) | {m2} | idle | [m1 ↦ 1, m2 ↦ 0] |\n| S4 | (Q, L) | {m1} | idle | [m1 ↦ 0, m2 ↦ 1] |\n| S5 | (L, C) | ∅ | m2 | [m1 ↦ 1, m2 ↦ 0] |\n| S6 | (C, L) | ∅ | m1 | [m1 ↦ 0, m2 ↦ 1] |\n| S7 | (L, L) | ∅ | idle | [m1 ↦ 1, m2 ↦ 1] |\n\n### 狀態空間圖\n\n```\n          ┌────────────────────────────┐\n          │         S0  (Q, Q)         │\n          └────┬───────────────────┬───┘\n               │                   │\n               ▼ Fetch(m1)         ▼ Fetch(m2)\n        ┌──────┴─────┐      ┌──────┴─────┐\n        │ S1  (C, Q) │      │ S2  (Q, C) │\n        └──────┬─────┘      └──────┬─────┘\n               │                   │\n               ▼ Settle(m1)        ▼ Settle(m2)\n        ┌──────┴─────┐      ┌──────┴─────┐\n        │ S3  (L, Q) │      │ S4  (Q, L) │\n        └──────┬─────┘      └──────┬─────┘\n               │                   │\n               ▼ Fetch(m2)         ▼ Fetch(m1)\n        ┌──────┴─────┐      ┌──────┴─────┐\n        │ S5  (L, C) │      │ S6  (C, L) │\n        └──────┬─────┘      └──────┬─────┘\n               │ Settle(m2)        │ Settle(m1)\n               └─────────┬─────────┘\n                         ▼\n                 ┌───────┴────────┐\n                 │   S7  (L, L)   │\n                 └────────────────┘\n```\n\n**8 個狀態、8 條邊**，左右兩條歧路（先處理 m1 還是先處理 m2）在 S7 會合。從 S0 走到 S7 的完整路徑恰好 2 條——v0 的全部人生劇本。S0 那個分岔就是非決定性的長相：規格不挑邊，兩條都合法。\n\n### 怎麼知道沒漏：封閉性檢查\n\n「我畫完了」不是感覺問題，是可以機械檢查的主張：**對清單裡每一個狀態，列出它所有可走的規則，確認每條邊的落點都還在清單內。** 落點全都在裡面＝清單封閉＝再走一萬步也跳不出這 8 個——所以它就是全部的可達狀態。\n\n| 狀態 | 出邊（規則 → 落點） | 出邊數 |\n|---|---|---|\n| S0 | Fetch(m1) → S1；Fetch(m2) → S2 | 2 |\n| S1 | Settle(m1) → S3 | 1 |\n| S2 | Settle(m2) → S4 | 1 |\n| S3 | Fetch(m2) → S5 | 1 |\n| S4 | Fetch(m1) → S6 | 1 |\n| S5 | Settle(m2) → S7 | 1 |\n| S6 | Settle(m1) → S7 | 1 |\n| S7 | （無） | 0 |\n\n合計 8 條邊，落點全數命中清單。✓ 你剛剛手動執行的，就是模型檢查器 TLC 的核心演算法——廣度優先搜尋加封閉性判定（原理見 ch09）。\n\n### 48 與 8：型別空間 vs 可達空間\n\n換個算法：不管規則，光看型別，v0 的變數能拼出幾種賦值？\n\n- queue：{m1, m2} 的子集，4 種；\n- working：3 種；\n- ledger：每則訊息 0 或 1，2 × 2 ＝ 4 種。\n\n4 × 3 × 4 ＝ **48 種賦值組合**。可達的只有 8 種——剩下 40 種是「寫得出來、走不到」的狀態。例如：\n\n- ⟨queue = {m1}, working = m1, ledger = [m1 ↦ 0, m2 ↦ 0]⟩：m1 同時在佇列又在手上；\n- ⟨queue = {m1}, working = idle, ledger = [m1 ↦ 1, m2 ↦ 0]⟩：m1 已入帳卻又躺回佇列——**雙重入帳的前夜**。\n\n這 40 種不可達不是型別系統的功勞，是兩條動作規則一步一步「掙來的」秩序。把「掙來的」變成「證出來的」，是 ch05 的工作；在型別層面系統性地計算這種上界、跟本章的 8 對帳，是 ch04 的習題。\n\n## 第二個 consumer 進場：狀態怎麼長\n\n現實裡你不會只跑一個 consumer。加一個：working 從單格變成一張表 [c1 ↦ …, c2 ↦ …]，每格仍是 idle／m1／m2；`Fetch`、`Settle` 規則對每個 consumer 各自適用，前提多一條「同一則訊息不能同時被兩個 consumer 拿」（v0 的佇列取走即消失，這條自動成立）。位置速記擴成四種：Q、C1、C2、L。\n\n老老實實一個一個數。按「已入帳幾則」分組：\n\n**0 則已入帳**（m1、m2 各在 Q／C1／C2，扣掉「同一個 consumer 同時拿兩則」的 (C1,C1) 與 (C2,C2)，3 × 3 − 2 ＝ 7 個）：\n\n| # | (m1, m2) | 出邊（規則 → 落點） | 出邊數 |\n|---|---|---|---|\n| T0 | (Q, Q) | c1 Fetch m1 → (C1,Q)；c2 Fetch m1 → (C2,Q)；c1 Fetch m2 → (Q,C1)；c2 Fetch m2 → (Q,C2) | 4 |\n| T1 | (C1, Q) | c1 Settle m1 → (L,Q)；c2 Fetch m2 → (C1,C2) | 2 |\n| T2 | (C2, Q) | c2 Settle m1 → (L,Q)；c1 Fetch m2 → (C2,C1) | 2 |\n| T3 | (Q, C1) | c1 Settle m2 → (Q,L)；c2 Fetch m1 → (C2,C1) | 2 |\n| T4 | (Q, C2) | c2 Settle m2 → (Q,L)；c1 Fetch m1 → (C1,C2) | 2 |\n| T5 | (C1, C2) | c1 Settle m1 → (L,C2)；c2 Settle m2 → (C1,L) | 2 |\n| T6 | (C2, C1) | c2 Settle m1 → (L,C1)；c1 Settle m2 → (C2,L) | 2 |\n\n**1 則已入帳**（已入帳者固定在 L，另一則在 Q／C1／C2，3 種；誰先入帳 × 2，共 6 個）：\n\n| # | (m1, m2) | 出邊 | 出邊數 |\n|---|---|---|---|\n| T7 | (L, Q) | c1 Fetch m2 → (L,C1)；c2 Fetch m2 → (L,C2) | 2 |\n| T8 | (Q, L) | c1 Fetch m1 → (C1,L)；c2 Fetch m1 → (C2,L) | 2 |\n| T9 | (L, C1) | c1 Settle m2 → (L,L) | 1 |\n| T10 | (L, C2) | c2 Settle m2 → (L,L) | 1 |\n| T11 | (C1, L) | c1 Settle m1 → (L,L) | 1 |\n| T12 | (C2, L) | c2 Settle m1 → (L,L) | 1 |\n\n**2 則已入帳**（1 個）：\n\n| # | (m1, m2) | 出邊 | 出邊數 |\n|---|---|---|---|\n| T13 | (L, L) | （無） | 0 |\n\n7 ＋ 6 ＋ 1 ＝ **14 個狀態**；出邊合計 4＋2×6＋2×2＋1×4＋0 ＝ **24 條邊**。每條邊的落點都在這 14 個裡——封閉性 ✓。\n\n完整路徑（從 T0 走到 T13 的劇本數）也數得出來，倒著算：令 f(狀態) ＝ 從該狀態走到 T13 的路徑數，等於各出邊落點的 f 相加。\n\n- f(T13) ＝ 1；\n- f(T9) ＝ f(T10) ＝ f(T11) ＝ f(T12) ＝ 1（各只有一條邊通往 T13）；\n- f(T7) ＝ f(T9) ＋ f(T10) ＝ 2；f(T8) ＝ 2；\n- f(T5) ＝ f(T10) ＋ f(T11) ＝ 2；f(T6) ＝ f(T9) ＋ f(T12) ＝ 2；\n- f(T1) ＝ f(T7) ＋ f(T5) ＝ 4；同理 f(T2) ＝ f(T3) ＝ f(T4) ＝ 4；\n- f(T0) ＝ 4 ＋ 4 ＋ 4 ＋ 4 ＝ **16**。\n\n對照表：\n\n| | 1 consumer | 2 consumers | 倍率 |\n|---|---|---|---|\n| 狀態 | 8 | 14 | ×1.75 |\n| 邊 | 8 | 24 | ×3 |\n| 完整路徑（調度劇本） | 2 | 16 | ×8 |\n\n注意哪一行長得最兇：**劇本數**。你要測試蓋住的正是劇本，不是狀態——這就是 ch01「調度爆炸」的數學臉孔。\n\n再往外推一格。數法可以重用：把狀態按「幾則訊息被拿在手上」分組——沒人拿（每則訊息各在佇列或帳本，2 種）、恰一則被拿（選訊息 × 選 consumer × 其餘各 2 種）、兩則都被拿（兩則訊息分給兩個 consumer 的排法 × 其餘各 2 種）。先用它驗算一次 2 則訊息的情形：2² ＋ 2×2×2 ＋ 2×1 ＝ 4 ＋ 8 ＋ 2 ＝ 14 ✓。然後：\n\n- **3 則訊息、2 個 consumer**：2³ ＋ 3×2×2² ＋ (3×2)×2 ＝ 8 ＋ 24 ＋ 12 ＝ **44**。\n- **10 則訊息、2 個 consumer**：2¹⁰ ＋ 10×2×2⁹ ＋ (10×9)×2⁸ ＝ 1,024 ＋ 10,240 ＋ 23,040 ＝ **34,304**。\n\n（每一種組合都真的走得到：想要哪個快照，就先讓該入帳的訊息一則一則走完 Fetch–Settle，再讓指定的 consumer 把指定的訊息拿在手上。）\n\n10 則訊息——你真實 pipeline 一季量的十萬分之一——三萬四千個狀態。而這還是不會 crash、不會重送、帳本只有一個 bit 的童話世界。手畫到此為止是合理的極限；機器怎麼接手、以及為什麼連機器也會被淹沒，見 ch09。\n\n## 不變量：在所有可達狀態都成立的述語\n\n圖在手上了，可以開始對它**主張**些什麼。最重要的一類主張叫**不變量（invariant）**：\n\n> 一個關於狀態的述語（predicate，「對單一狀態非真即假的判斷句」），如果在**每一個可達狀態**都為真，它就是這台狀態機的不變量。\n\n三個例子，從無聊到值錢，全部拿 8 狀態圖當場驗：\n\n1. **值域述語**：「working 永遠是 idle、m1、m2 三者之一。」對 S0–S7 逐一看 working 欄：idle, m1, m2, idle, idle, m2, m1, idle——✓。無聊，但它是每份規格的第一道防線（這類述語在 TLA+ 慣例裡有個固定角色，見 ch08），抓的是「變數被寫進鬼值」這種最低級也最常見的錯。\n2. **恰好一處**：「每則訊息在任何時刻恰好處於佇列、手上、帳本三者之一。」看位置速記欄：八個狀態每則訊息都恰好一個字母——✓。這條就是把 48 砍成 8 的那股秩序本身。\n3. **反例示範**：「佇列永遠非空。」S5 的 queue ＝ ∅——✗。**不是**不變量。注意判定方式：只要找到**一個**可達狀態打破它就出局；而「可達」要附證據（S0 → S1 → S3 → S5，每步都驗過規則）。\n\n釘住量化範圍：不變量說的「永遠」，範圍是**全部可達狀態**——不是 48 種型別組合（那叫要求過頭，很多有用的不變量在不可達區根本不成立），也不是「我手追過的那幾條行為」（那叫測試）。\n\n### NoDoublePay 首次登場\n\n全書最重要的 safety 性質，現在正式命名：\n\n> **`NoDoublePay`：同一個 msgId 至多入帳一次。**\n\n字面上它談的是**整條行為的歷史**（「至多一次」是數整段過程中入帳動作的次數）。要在狀態圖上逐點檢查，得先把它翻成一條關於單一狀態的看門狗述語：\n\n> 對每一則訊息 m：如果 ledger[m] ＝ 1，那麼 m ∉ queue，而且沒有任何 consumer 的手上是 m。\n\n直覺連結：入帳只會發生在 `Settle`，`Settle` 的前提是 m 在手上，而要拿到手上得先從佇列 `Fetch`。所以只要「已入帳的訊息永遠不再出現於佇列或手上」在每個可達狀態都成立，第二次入帳就無路可走。對 8 個狀態逐一驗：位置速記裡標 L 的訊息，其所在狀態的 queue 與 working 都查無此訊息（S3、S4、S5、S6、S7 全數通過；S0–S2 沒有 L，前提落空，自動過關——這個「前提落空就算過」的邏輯細節先欠著，ch03 會正式跟它算帳）。**v0 滿足 `NoDoublePay`。** ✓\n\n先別慶祝，誠實面對一件事：這個「成立」有兩種成分——\n\n- 一部分是**設計的功勞**：取走即消失＋一次只拿一則，確實堵住了重複處理；\n- 另一部分是**模型的盲區**：v0 根本沒有把「會導致雙重入帳的機制」建進來。沒有 redelivery、沒有 crash、入帳與移除綁成原子一步——失敗被建模成不可能，性質當然成立。\n\n這是 Murphy 原則的形式化版第一課：**性質成立，有時是因為系統真的安全，有時只是因為你的模型說不出那種失敗。** 分辨方法：問「違反這條性質的狀態長什麼樣？我的模型畫得出來嗎？」v0 畫得出來（48 種組合裡就有「已入帳又在佇列」的賦值），只是不可達——所以 `NoDoublePay` 在 v0 是一條真的有內容、但還沒受過真正考驗的不變量。考驗在 v1：加入 crash 與 redelivery 之後（見 ch08），「已入帳的訊息又回到佇列」會變成貨真價實的可達狀態，到時候守住 `NoDoublePay` 的就不再是運氣，而是 dedup 表——以及一份要證明的功課（見 ch14）。\n\n### safety 與 liveness：一句話的對比\n\n`NoDoublePay` 屬於 **safety**：「壞事永遠不會發生」。它的特徵是違反的證據是**有限的**——行為走到第 k 步出現雙重入帳，當場定罪，後面不用看。\n\n對照組是 **liveness**：「好事終究會發生」，例如「每則訊息終究會入帳」。違反它的證據永遠湊不齊有限版本——看到第一百萬步還沒入帳，你仍不能定罪，因為「再等等」永遠是合法辯護。\n\n順手戳破一個直覺：v0 **並不**保證「每則訊息終究會入帳」。「系統停在 S1 從此不動」是一條完全合法的行為——沒有任何規則強迫 consumer 工作。你對 SQS「訊息總會被消費」的營運信心，其實是一條額外的公平性（fairness）假設，而不是動作規則的推論。這整套區分的正式定義、以及「終究」怎麼寫成數學，是 ch07 的主題；本章你只需要帶走這句對比：**safety 看得到犯罪現場，liveness 永遠在等待戈多。**\n\n## 抽象的選擇：建模什麼、忽略什麼\n\nv0 丟掉了很多現實。列出來，並且記帳：\n\n| 被丟掉的現實 | 後果：哪些問題從此問不了 | 何時還債 |\n|---|---|---|\n| 金額與訊息內容 | 「入帳金額對不對」問不了；`NoDoublePay` 只關心次數，不關心錢數 | 不還——對本書的性質，金額自始無關 |\n| 佇列順序（set 而非 sequence） | 「m1 比 m2 先到就先結」這類順序性質**連說都說不出來** | ch04 有一題專門算這筆帳 |\n| consumer crash、redelivery | at-least-once 的核心風險整個不在模型裡 | v1（見 ch08） |\n| 入帳與移除訊息的兩步性 | 「入帳成功、ack 之前掛掉」這個雙重入帳的經典開局不存在 | v1（見 ch08） |\n| 時間與延遲 | 任何 SLA、timeout 性質問不了 | 不還——本書始終不建模時間量 |\n| 真實訊息量（用 2 代表 N） | 「2 則沒事，2,000 則會不會有事」是個真問題 | ch09（small scope 的辯護與限度） |\n\n從這張表提煉本章最後一個方法論：**先寫你要驗的性質，再決定模型留什麼。** 問 `NoDoublePay`，就必須保留訊息身分、入帳狀態、以及一切可能導致重複處理的機制；可以丟金額、順序、延遲。反過來，如果哪天要驗順序性，set 就得換成 sequence。模型不是現實的縮小版，是**針對特定問題的證詞**；抽象不是說謊，是控制謊言的範圍——而控制的手段，就是像上表那樣把每一筆省略寫成白紙黑字。這也是 ch01 那句「寫 spec 的最大價值是先想清楚」的具體操作版。\n\n## 陷阱與防禦\n\n| 陷阱 | 長相 | 防禦 |\n|---|---|---|\n| 把非決定性讀成機率 | 「這個交錯太刁鑽，現實不會發生」——然後它在第三季發生了 | 規格的世界只有可達／不可達。可達的壞狀態 × 夠大的流量 ＝ 排程中的事故。機率直覺只准用來排優先級，不准用來宣告安全 |\n| 性質空洞成立 | 模型表達不出那種失敗，於是性質「通過」——v0 的 `NoDoublePay` 有一半是這樣成立的 | 替每條性質找出「最小違反狀態」：在型別空間裡畫出違反的長相。畫不出來＝性質對這個模型沒有牙齒，先補模型再談驗證 |\n| 混淆型別空間與可達空間 | 拿 48 嚇人、或拿 8 自滿；在不可達區檢討不變量，或宣稱「我走過的路都沒事」 | 講不變量先講量化範圍：「所有**可達**狀態」。估規模時兩個都算——差距越大，代表動作規則扛的秩序越多，也代表越值得證明（見 ch05） |\n| 窮舉漏狀態 | 畫了幾條順路就收工；漏一條邊，漏掉的可能是一整片大陸 | 封閉性檢查：清單裡每個狀態 × 每條規則，落點必須回到清單。這是機械工作，不是藝術——做不完就是還沒畫完 |\n| 用「合理」代替「允許」 | 「consumer 不會拿著訊息不放」——模型裡它就是可以 | 判斷行為合法只看動作規則。常識要嘛寫成規則，要嘛閉嘴。你覺得「不會發生」的事，規格眼裡都是合法行為 |\n| 為了好畫而裁模型 | 因為圖會爆炸所以不建 crash——於是驗了一個不存在的系統 | 順序不能反：先性質、後模型。裁掉的每一項記進「何時還債」表；圖太大是換工具的訊號（見 ch09），不是改題目的藉口 |\n\n## 紙上推演\n\n### 題 1：行為合不合法 **[10 分鐘]** ★\n\n以下四條狀態序列（代號見 8 狀態表），逐一判斷是不是 v0（1 個 consumer）的合法行為。不合法的，指出第一個非法的步與原因。\n\n- (a) S0 → S2 → S4 → S6 → S7\n- (b) S0 → S3 → S5 → S7\n- (c) S0 → S1 → S0 → S2 → S4 → S6 → S7\n- (d) S0 → S1（序列到此結束）\n\n### 推演解答\n\n**(a) 合法。** 逐步驗，每步要核對三個變數：\n\n1. S0 → S2：`Fetch(m2)`。前提：m2 ∈ {m1, m2} ✓、working ＝ idle ✓。效果：queue {m1, m2}→{m1} ✓、working idle→m2 ✓、ledger 不變 ✓。\n2. S2 → S4：`Settle(m2)`。前提：working ＝ m2 ✓。效果：ledger[m2] 0→1 ✓、working 回 idle ✓、queue 不變（{m1}）✓。\n3. S4 → S6：`Fetch(m1)`。前提 ✓；queue {m1}→∅ ✓、working idle→m1 ✓、ledger 不變 ✓。\n4. S6 → S7：`Settle(m1)`。前提 ✓；ledger[m1] 0→1 ✓、working 回 idle ✓、queue 不變 ✓。\n\n**(b) 不合法**，第 1 步就掛。S0 → S3 要求 queue 少了 m1、ledger[m1] 變 1、working 維持 idle。逐條規則比對：`Fetch(m1)` 會讓 working 變成 m1（不是 idle）✗；`Settle` 前提要求手上有訊息，S0 是空手 ✗。沒有任何單一規則能完成這個變化——「拿了就地入帳」是**兩步的合成**，不是一步。現實版教訓：你以為原子的操作其實是兩步時，中間就有縫可以被插隊（ch01 的 race 正是這個形狀）。\n\n**(c) 不合法**，第 2 步（S1 → S0）非法。它要求 m1 從手上回到佇列；但 v0 的兩條規則裡，`Fetch` 只會從佇列拿走、`Settle` 根本不碰 queue。「放回去」這個動作不存在，所以這個步不被任何規則允許。（劇透：題 3 會把這個動作加進來，到時它就合法了——合法與否永遠是相對於規則集合說的。）\n\n**(d) 合法。** 每一步（只有一步，S0 → S1，即 `Fetch(m1)`，驗法同 (a)）都合法，序列就是合法行為；v0 沒有任何規則強迫系統繼續走。停在 S1 手握 m1 直到宇宙熱寂，完全合規。如果這讓你不舒服——很好，那個不舒服的學名叫 liveness，工具在 ch07。\n\n### 題 2：候選不變量的審判 **[15 分鐘]** ★★\n\n對 v0 的 8 狀態圖逐一審判下列述語：是不變量的，說明你怎麼驗完；不是的，交出打破它的可達狀態＋一條從 S0 走到它的路徑。\n\n- P1：「至少還有一則訊息未入帳。」\n- P2：「不存在這樣的狀態：consumer 手上有訊息，而佇列同時還是滿的（＝ {m1, m2}）。」\n- P3：「如果 m2 已入帳，那麼 m1 也已入帳。」（業務部的願望：m1 單比較早建立，應該先結。）\n\n### 推演解答\n\n**P1：不是不變量。** 反例 S7 ＝ ⟨∅, idle, [m1 ↦ 1, m2 ↦ 1]⟩，兩則都入帳了。可達性證據：S0 → S1（Fetch m1）→ S3（Settle m1）→ S5（Fetch m2）→ S7（Settle m2），四步各自驗過前提與效果。P1 把「過程中的常態」誤當「永恆的真理」——很多假不變量都是這樣寫出來的：它在你腦中預設的「進行中」畫面成立，在終局不成立。\n\n**P2：是不變量。** 驗法：手上有訊息的狀態只有 S1、S2、S5、S6，它們的 queue 分別是 {m2}、{m1}、∅、∅——沒有一個是滿的 ✓；其餘四個狀態（S0、S3、S4、S7）手上沒訊息，述語的條件部分落空，不構成違反 ✓。八個全查完，成立。為什麼成立？因為 `Fetch` 把「從佇列移除」與「拿到手上」做成同一步——P2 實際上在偵測「拿了卻沒從佇列消失」這種 bug 形狀。記住這個影子：at-least-once 世界裡它有個名字叫 redelivery，v1 登場後這一帶的所有不變量都要重審（見 ch08）。\n\n**P3：不是不變量。** 反例 S4 ＝ ⟨{m1}, idle, [m1 ↦ 0, m2 ↦ 1]⟩：m2 已入帳、m1 還沒。可達性證據：S0 → S2（Fetch m2，前提 m2 ∈ queue ✓、空手 ✓）→ S4（Settle m2 ✓）。兩步到案。深一層的教訓有兩個。其一，**指控一個述語不是不變量，標準格式是「可達反例＋路徑」**——這條路徑就是 ch09 反例 trace 的手工雛形。其二，P3 死因不在運氣，在抽象：v0 的佇列是集合，「m1 比較早」**在模型裡沒有這句話**；想立順序性質，得先把順序建回模型（見 ch04）。性質與模型必須門當戶對。\n\n### 題 3：加上 consumer 重啟，重畫狀態圖 **[25 分鐘]** ★★★\n\n給 v0（1 個 consumer）加第三條動作規則：\n\n| 規則 | 前提 | 效果 |\n|---|---|---|\n| `Restart(m)` | working ＝ m | m 放回 queue；working 回 idle；ledger 不變 |\n\n（情境：consumer 重啟，手上沒處理完的訊息回到佇列——SQS visibility timeout 到期的簡化版。）回答：\n\n1. 重畫狀態空間圖（標出新邊）。可達狀態變多了嗎？用封閉性檢查支持你的答案。\n2. 行為的集合發生了什麼**質變**？（提示：看長度。）\n3. `NoDoublePay` 的看門狗述語還在所有可達狀態成立嗎？\n4. 這個 `Restart` 模型跟真實的 consumer crash 差在哪——它看不見哪種事故？\n\n### 推演解答\n\n**1. 狀態數不變，仍是 8；新增 4 條邊。** 先找新邊：`Restart` 的前提是手上有訊息，逐一檢查手上有東西的狀態——\n\n- S1（手持 m1，queue ＝ {m2}）：放回後 queue ＝ {m1, m2}、空手、帳本全 0 ＝ **S0**；\n- S2（手持 m2）：放回後 ＝ **S0**；\n- S5（手持 m2，queue ＝ ∅，m1 已入帳）：放回後 ⟨{m2}, idle, [m1 ↦ 1, m2 ↦ 0]⟩ ＝ **S3**；\n- S6（手持 m1）：放回後 ＝ **S4**。\n\n四條新邊的落點 S0、S0、S3、S4 全是舊面孔；其餘狀態（S0、S3、S4、S7）空手，`Restart` 不可走，不產生邊。原本的 8 條邊也原封不動。清單封閉 ✓——所以可達集合還是那 8 個。**加動作不一定加狀態**；但別把這當通則：新動作的落點只要有一個跳出清單，整張圖就要重新窮舉（這次只是運氣好）。\n\n重畫的圖（▼ ＝ Fetch 往下、▲ ＝ Restart 往上；Settle 邊維持單向）：\n\n```\n          ┌────────────────────────────┐\n          │         S0  (Q, Q)         │\n          └─┬────▲──────────────┬────▲─┘\n            │    │              │    │\n            ▼    │              ▼    │\n        ┌───┴────┴───┐      ┌───┴────┴───┐\n        │ S1  (C, Q) │      │ S2  (Q, C) │\n        └──────┬─────┘      └──────┬─────┘\n               │                   │\n               ▼ Settle(m1)        ▼ Settle(m2)\n        ┌──────┴─────┐      ┌──────┴─────┐\n        │ S3  (L, Q) │      │ S4  (Q, L) │\n        └───┬────▲───┘      └───┬────▲───┘\n            │    │              │    │\n            ▼    │              ▼    │\n        ┌───┴────┴───┐      ┌───┴────┴───┐\n        │ S5  (L, C) │      │ S6  (C, L) │\n        └──────┬─────┘      └──────┬─────┘\n               │ Settle(m2)        │ Settle(m1)\n               └─────────┬─────────┘\n                         ▼\n                 ┌───────┴────────┐\n                 │   S7  (L, L)   │\n                 └────────────────┘\n```\n\n（左上雙線：S0 ⇄ S1 之間 ▼ ＝ Fetch(m1)、▲ ＝ Restart(m1)；右上同理對 m2；中段 S3 ⇄ S5 是 Fetch(m2)／Restart(m2)、S4 ⇄ S6 是 Fetch(m1)／Restart(m1)。）\n\n**2. 質變：圖上出現了環，於是出現了無限長的行為。** 原本的圖是一路向下的，所有行為最多 4 步就終結；現在 S0 → S1 → S0 → S1 → … 是合法行為——consumer 永遠在拿起與放下之間鬼打牆，永遠不入帳。「每則訊息終究會入帳」原本只是「沒人保證」，現在是「有具體的無限反例」。要排除這種行為，靠的不是加狀態，而是加公平性假設——ch07 的正題。\n\n**3. 仍然成立。** 關鍵觀察：可達狀態集合沒變（第 1 小題已證），而看門狗述語是**關於狀態**的判斷——8 個狀態上它本來全數成立，現在還是那 8 個狀態，所以還是全數成立。加邊只可能透過「開出新的可達狀態」來打破不變量；這次一個新狀態都沒開出來。另外從機制看也合理：`Restart` 不碰 ledger，且它的前提是訊息在手上——而看門狗述語恰恰保證已入帳的訊息不會在手上，所以 `Restart` 永遠搬不動已入帳的訊息。\n\n**4. 它看不見「入帳成功之後、ack 之前」的 crash。** 我們的 `Settle` 把「寫帳本」與「訊息從系統消失」綁成原子一步，`Restart` 只能發生在入帳前。真實世界裡 consumer 寫完 DB、還沒來得及刪訊息就掛掉——訊息帶著「已入帳」的事實回到佇列，下一個 consumer 撿起來再結一次——這正是雙重入帳的經典開局，而**本模型連表達它的詞彙都沒有**（陷阱表第 2 條：性質空洞成立）。把 `Settle` 拆成兩步、讓這隻幽靈進場、再用 dedup 表把它擋下來，就是 v1 的劇本（見 ch08）；證明擋得住，是 ch14 的戰役。\n\n## 自我檢核\n\n口頭回答，講得出來才算數；每一題的標準是「能教會另一個沒讀過本章的後端工程師」。\n\n1. 用自己的話定義 state、step、behavior、規格，並各舉一個你維護過的系統裡的對應物（提示：快照、交易的 before/after、binlog、API 契約——最後一個為什麼不太對？）。\n2. 「規格＝允許行為的集合」這個視角，跟「規格＝程式功能的描述」差在哪？它把誰寫進了模型、把什麼責任丟回給你？\n3. 非決定性與隨機差在哪？為什麼驗證要用前者建模調度與故障？「這個 bug 機率太低」在這個世界觀裡是什麼地位？\n4. 不變量的「永遠成立」量化在哪個集合上？「型別空間都成立」與「我追過的行為都成立」各差在哪裡、各自對應什麼錯覺？\n5. v0 的 `NoDoublePay` 成立——這句話裡有多少是設計的功勞、多少是模型的盲區？你用什麼問題分辨這兩種成分？\n6. safety 與 liveness 的一句話對比是什麼？為什麼違反前者的證據是有限的、違反後者的不是？「停在 S1 不動」打破了哪一邊？\n7. 從 1 個 consumer 加到 2 個：狀態 8→14、邊 8→24、完整路徑 2→16。哪個數字跟「測試蓋不住」最直接相關？為什麼？\n8. 挑一個你手上的系統：你會建模哪三個變數、丟掉哪五個細節、第一條想驗的不變量是什麼？丟掉的細節裡哪一個最可能讓那條不變量空洞成立？\n\n## 延伸閱讀\n\n- **Leslie Lamport, “Computation and State Machines” (2008)** — `https://lamport.azurewebsites.net/pubs/state-machine.pdf` — Lamport 親自論證「計算就該用狀態機描述、而描述狀態機用數學就夠了」的立場文，本章世界觀的源頭；讀前半部（含把一段 C 程式直接寫成狀態機的例子）就值回票價。（連結驗證於 2026-06）\n- **Leslie Lamport, *Specifying Systems*（2002），第 1–2 章** — 免費 PDF 見 `https://lamport.azurewebsites.net/tla/book.html` — 第 2 章用一個時鐘把 state／behavior 講到不能再乾淨，「behavior 描述宇宙的一種可能歷史」這個說法的出處；本章的定義是它的白話版。（連結驗證於 2026-06）\n- **TLA+ Video Course, Lecture 1–2** — `https://lamport.azurewebsites.net/video/videos.html` — Lecture 2「State Machines in TLA+」（15 分鐘）示範把本章的心智模型直接寫成 TLA+，等於 ch06 的預告片；Lamport 開場警語「這些影片不是輕鬆娛樂」所言不虛。（連結驗證於 2026-06）\n- **Hillel Wayne, learntla.com — Core 部的 “Writing an Invariant” 與 “Nondeterminism” 兩節** — `https://learntla.com/` — 與本章相同的概念，從工具使用者的視角再走一遍；本書刻意不動鍵盤，但讀它能看到不變量與非決定性在工具裡的長相。（連結驗證於 2026-06）\n"}, {"id": "ch03-logic", "file": "ch03-logic.md", "group": "Part II — 數學地基", "title": "ch03 — 命題與謂詞邏輯：精確說話的語法", "md": "# ch03 — 命題與謂詞邏輯：精確說話的語法\n\n> **本章解決什麼問題**：ch02 說 invariant 是「所有可達狀態都成立的述語」——但「述語」到底是什麼、「所有」怎麼寫才不留歧義、規則被打破時長什麼樣？這些都需要一套精確的語法。本章把你大學看過的命題與謂詞邏輯磨利成工作工具：五個連接詞、兩個量詞、一套機械的否定推移規則。它是 Part II 數學地基的第一塊：ch04 的集合語言、ch05 的歸納證明、乃至 ch06 之後的整個 TLA+，全都用這套語法說話。\n\n你現在站在全書地圖的這裡：\n\n```text\n┌────────────────────────────────────────────────────────────────────┐\n│ Part I   為什麼需要形式化                                          │\n│   ch01 測試的極限 · ch02 狀態機                                    │\n├────────────────────────────────────────────────────────────────────┤\n│ Part II  數學地基                                      ← 你在這裡  │\n│   ch03 邏輯 · ch04 集合 · ch05 歸納                                │\n├────────────────────────────────────────────────────────────────────┤\n│ Part III TLA+ 與時序邏輯                                           │\n│   ch06 動作邏輯 · ch07 時序邏輯 · ch08 完整 spec · ch09 TLC 原理   │\n├────────────────────────────────────────────────────────────────────┤\n│ Part IV  協議精讀                                                  │\n│   ch10 互斥 · ch11 2PC · ch12 Paxos · ch13 Raft                    │\n├────────────────────────────────────────────────────────────────────┤\n│ Part V   證明                                                      │\n│   ch14 歸納不變量 · ch15 Refinement · ch16 機器證明                │\n├────────────────────────────────────────────────────────────────────┤\n│ Part VI  實務                                                      │\n│   ch17 業界案例 · ch18 方法地圖                                    │\n└────────────────────────────────────────────────────────────────────┘\n```\n\nPart II 三章的節奏跟 Part I 不一樣：這裡是磨刀，不是看風景。你在大學看過這些東西，所以我們可以走得快；但「看過」與「能拿來抓 bug」之間隔著一層肌肉記憶，本章的任務就是把它練出來。特別是 ⇒ 的一個陷阱——vacuous truth——會講到超出大學課本的篇幅，因為它是這本書後半段一個真實事故模式的種子。\n\n## 從你已知的出發\n\n你每天都在寫邏輯，只是用的是程式語法：\n\n- **guard clause 就是 ⇒**。`if (!order.isCommitted) return;` 之後的每一行程式碼，隱含的正確性主張是「isCommitted ⇒ 這段處理是安全的」。被 guard 擋掉的路徑你從不覺得需要負責——這個「前件不成立就不關我的事」的直覺，正是邏輯蘊涵的定義。\n- **`[].every(...)` 回 `true` 就是 vacuous truth**。Node.js 裡 `[].every(x => x.paid)` 永遠回 `true`：空陣列上的「全部都……」無條件成立。你大概踩過一次：上游查詢條件寫錯、回了空陣列，下游「全部驗證通過」的綠燈亮著，資料卻根本沒被檢查過。\n- **SQL 的 `NOT EXISTS` 改寫就是量詞推移**。「每張訂單都有對帳記錄」直接寫 SQL 很難下手；你實際寫的是「不存在沒有對帳記錄的訂單」——`WHERE NOT EXISTS (...)`。∀ 與 ¬∃¬ 的互換，你的手指早就會了，本章只是給它名字和規則。\n- **code review 的爭論常常是量詞之爭**。「所有 retry 都會被 dedup 擋住」對上「存在一條 retry 路徑繞過 dedup」——前者是 ∀，後者是它的否定 ∃¬。吵直覺沒有結果；把兩句話寫成式子，戰場立刻清楚：找到一條繞過的路徑就分出勝負，找不到就得說明為什麼找不到。\n\n所以本章的目標不是教你新東西，而是把這些散落的直覺接上同一套語法，並且練到三件事變成反射動作：把白話翻成邏輯式、把邏輯式翻回白話、否定一條規則得到「bug 的形狀」。\n\n## 命題：能判定真假的句子\n\n命題（proposition）：一個非真即假的宣告句。看四個例子就知道邊界在哪：\n\n- 「m1 已入帳」——在一個給定的系統狀態下非真即假：**是**命題。\n- 「佇列深度超過 1000 就該加 consumer」——這是規範性意見，不是事實宣告：不是命題。\n- 「這段程式碼很乾淨」——沒有公認判準：不是命題。\n- 「x > 3」——x 沒給值之前無法判定：還不是命題，是**述語**（本章後半的主角）。\n\n第一個例子值得多看一眼：「m1 已入帳」的真假取決於你問的是哪個狀態。在 ch02 的語言裡，狀態是變數的一組賦值；本章前半段先把狀態凍結住——想像你對著某一瞬間的系統快照說話，一句話在這個快照上非真即假，它就是命題。同一句話在不同狀態下真值不同，這正是 invariant 在處理的事（每個可達狀態上都為真）；但那是把本章的工具套到 ch02 的模型上之後的事，工具本身先不用管狀態。\n\n順帶聲明本章刻意不教的東西：自然演繹、推理規則表這類形式證明系統，本書全程不碰。我們的標準是「工程師的嚴謹」——每一步都能口頭說出理由、能用真值表或具體例子驗證，但不玩符號系統的機械推導。之後需要管理證明結構時（ch05、ch14），用的是層級式寫法，不是推理規則的名字。\n\n## 五個連接詞與真值表\n\n命題是原子，連接詞把原子接成分子。全書內文一律用 Unicode 符號（TLA+ 原始碼裡的 ASCII 寫法，對照表見 ch06）：\n\n| 符號 | 讀法 | 白話 |\n|---|---|---|\n| ∧ | and | 兩者都成立 |\n| ∨ | or | 至少一個成立（可以同時） |\n| ¬ | not | 不成立 |\n| ⇒ | implies | 若…則…（小心，下一節整節都在講它） |\n| ≡ | 等價 | 兩邊真值永遠相同 |\n\n五個連接詞的完整定義就是一張真值表（T＝真、F＝假）：\n\n| p | q | ¬p | p ∧ q | p ∨ q | p ⇒ q | p ≡ q |\n|---|---|---|---|---|---|---|\n| T | T | F | T | T | T | T |\n| T | F | F | F | T | F | F |\n| F | T | T | F | T | T | F |\n| F | F | T | F | F | T | T |\n\n三個提醒：\n\n1. ∨ 是 inclusive or：兩邊同時成立也算成立。白話的「或」常常暗示二選一；需求若真的是「恰好一個」，要明寫成 (p ∨ q) ∧ ¬(p ∧ q)。\n2. ≡ 是「真值表完全相同」。要驗證兩條式子等價，列出所有真值組合、逐列比對即可——純機械，不需要靈感。n 個命題變數就是 2ⁿ 列，這也是你第一次摸到狀態爆炸的邊（見 ch01 的組合爆炸，ch09 會正面處理）。\n3. ∧ 與 ∨ 各自滿足交換律、結合律，彼此有分配律，還有 De Morgan 律 ¬(p ∧ q) ≡ ¬p ∨ ¬q 與 ¬(p ∨ q) ≡ ¬p ∧ ¬q。全部可用真值表驗證，其中兩條留在「紙上推演」給你親手做。\n\n## ⇒：最重要、也最會騙人的連接詞\n\n把 ⇒ 的兩列單獨拿出來看：\n\n| p | q | p ⇒ q | 怎麼讀 |\n|---|---|---|---|\n| T | T | T | 前件成立、後件做到：履約 |\n| T | F | **F** | 前件成立、後件沒做到：**唯一的違約世界** |\n| F | T | T | 前件不成立：契約自動履行 |\n| F | F | T | 前件不成立：契約自動履行 |\n\n「若 p 則 q」的日常語感帶著因果和時間：先有 p、後有 q、p 導致 q。邏輯的 ⇒ 三個都不是。p ⇒ q 只是一個關於真值組合的宣告：「不會出現 p 真而 q 假」。跟因果無關、跟先後無關；唯一讓它為假的世界是第二列。\n\n三種讀法，挑你順手的：\n\n1. **契約讀法**：p ⇒ q 是一紙契約，只有「p 成立而 q 沒做到」算違約；p 沒成立，契約自動算履行。\n2. **guard 讀法**：q 只在 p 的範圍內被檢查；p 為假的狀態直接放行——正是 `if (!p) return;` 的語意。\n3. **排除讀法**：p ⇒ q ≡ ¬(p ∧ ¬q)：我只排除一種世界，其他都接受。\n\n### vacuous truth：前件為假，整句為真\n\n第三、四列值得單獨開一節，因為它是這本書後半段一個真實事故模式的根。\n\n當 p 恆假——或在你實際碰到的所有情況下為假——p ⇒ q 恆真，**不管 q 是什麼**。「所有獨角獸都會寫 TLA+」是真的，因為沒有獨角獸。這叫空洞地為真（vacuously true）。\n\n工程現場的屍體展示：\n\n- `[].every(x => x.paid)` 回 `true`：空集合上的「全部都」無條件成立。\n- 監控主張「每個 5xx 都觸發了 alert」，在今天沒有任何 5xx 的系統上為真。綠燈。但它完全沒告訴你 alert pipeline 是好的——可能 alert 根本沒接上，你要等第一個 5xx 才會知道。\n- 測試斷言「所有被處理的訊息都恰好入帳一次」，在 consumer 掛掉、什麼都沒處理的環境裡：全數通過。\n- 寫 spec 時，一條 invariant 的前件用了永遠不可能滿足的條件（打錯字、或對系統的誤解），檢查器回報 invariant 成立——它當然成立，它什麼都沒檢查。\n\n關鍵的反直覺點一句話：**「P 為真」與「P 檢查過東西」是兩回事**。空洞為真的性質給你的安全感是純粹的假貨，而且它不會自己暴露——空轉的綠燈跟真正驗證過的綠燈長得一模一樣，你必須主動拆穿。\n\n防禦動作，現在就養成：寫下任何 p ⇒ q 形式的主張之後，**為前件找一個 witness**——舉出一個具體的、真實會發生的情況讓 p 為真。舉不出來，這條主張就在空轉，要嘛改寫、要嘛承認它沒驗證任何東西。本書後面凡是寫 invariant，這個動作都應該是反射。\n\n把話說在前頭：**這個陷阱在 ch14 會回來咬人**。歸納證明裡，歸納假設是整個歸納步的前件；如果它強到沒有任何狀態能滿足，歸納步會「證明成功」——空洞地。你會看到一個每一步都通過、結論卻毫無價值的完整案例。先把警報器裝好。\n\n### 逆否命題，以及它的兩個冒牌貨\n\n從真值表可以驗證（或用排除讀法直接看出）：\n\n- p ⇒ q **≡** ¬q ⇒ ¬p（逆否，contrapositive）——同一條主張的兩種說法。\n- p ⇒ q **不等價於** q ⇒ p（converse）。\n- p ⇒ q **不等價於** ¬p ⇒ ¬q（inverse）。\n\n工程例：「部署成功 ⇒ 健康檢查通過」等價於「健康檢查沒過 ⇒ 部署沒成功」。但「健康檢查通過 ⇒ 部署成功」是另一條主張——健康檢查可能太弱，這條可以是假的。你每天的排查推理其實常走逆否：alert 響了（¬q），所以系統不在正常路徑上（¬p）。會混淆的是冒牌貨：「沒有 alert，所以沒問題」走的是 inverse，邏輯上不成立——alert 沒接上時就是沒有 alert。\n\n## 述語與量詞：把「哪些東西」說清楚\n\n述語（predicate）：帶洞的命題。P(x) 在 x 填入具體值之前沒有真假；填進去就變成命題。工程對照：回傳 boolean 的純函式——`isPaid(msgId)` 本身不是真也不是假，`isPaid('m1')` 在給定狀態下才是。\n\n量詞把「填洞」從「給一個值」升級成「掃一整袋值」：\n\n- ∀ m ∈ Msgs : P(m)——袋子裡**每一個** m 都滿足 P。\n- ∃ m ∈ Msgs : P(m)——袋子裡**至少一個** m 滿足 P。\n\n「袋子」（像 Msgs 這種範圍）的正式名稱是集合，細節是 ch04 的事；本章只需要「一袋可以逐一檢視的東西」這個直覺。另外，本書一律寫**有界量詞**——∀ x ∈ S 明寫範圍。無界的「對宇宙中一切 x」在 TLA+ 的世界幾乎不出現，而且容易讓你忘記問「範圍到底是誰」——後面會看到，範圍不明是翻譯錯誤的頭號來源。\n\n袋子有限時，量詞可以攤開：\n\n∀ m ∈ {m1, m2} : Paid(m) ≡ Paid(m1) ∧ Paid(m2)\n∃ m ∈ {m1, m2} : Paid(m) ≡ Paid(m1) ∨ Paid(m2)\n\n這個攤開讓量詞的性質都能從連接詞繼承，包括下一節的 De Morgan。它也順手解釋了空袋子的行為：範圍為空時，∀ 攤開成「零個條件的 ∧」——恆真（`[].every`）；∃ 攤開成「零個條件的 ∨」——恆假（`[].some`）。JavaScript 在這件事上跟邏輯學家站同一邊。\n\n### bound 與 free：誰的變數誰負責\n\n在 ∀ m ∈ Msgs : PayCount(m) ≤ 1 裡，m 是**約束變數**（bound variable）：它是量詞自己的迴圈變數，對外不可見，整條式子的真假不取決於「外面某個叫 m 的東西」。把 PayCount(m) ≤ 1 單獨抽出來，m 就是**自由變數**（free variable）：式子的真假取決於誰來填 m。\n\n工程對照很直接：bound variable ≈ `msgs.every(m => ...)` 的 callback 參數，scope 只在 callback 裡，外面沒有 m 這個東西、改名也不影響語意；free variable ≈ 從外層閉包抓進來的變數，值由外面決定。\n\n判讀規則：一條式子是不是命題，看它有沒有 free variable——全部 bound（或根本沒變數）就是命題；有 free 的是述語。這個區分在 ch02 的圖景下有個漂亮的應用：invariant 裡的狀態變數（ledger 之類）嚴格說是 free 的，由「目前狀態」這個外層 scope 填值——所以同一條 invariant 在不同狀態下有不同真值，而「invariant 成立」的完整主張是「在每個可達狀態填值後都為真」。\n\n### 量詞順序：∀∃ 與 ∃∀ 差一個世界\n\n- ∀ m ∈ Msgs : ∃ c ∈ Consumers : Handles(c, m)——每則訊息都有 consumer 處理它；**誰處理可以各自不同**。\n- ∃ c ∈ Consumers : ∀ m ∈ Msgs : Handles(c, m)——存在**一個** consumer，獨自處理了所有訊息。\n\n第二條強得多（它成立時第一條必成立，反之不然）。交換 ∀∃ 順序是翻譯白話時最常見的錯誤，因為中文天生兩可：「有 consumer 處理每則訊息」——你讀讀看，兩種解釋都通。防禦：碰到「有」和「每」同時出現的句子，把兩種順序都寫出來、各自翻回白話，問哪一句才是需求的本意。同類量詞相鄰可以交換（∀∀、∃∃），異類不行——這是肌肉記憶等級的規則。\n\n## 否定推移：機械地求出 bug 的形狀\n\n先說為什麼否定值得單獨一節。在這本書裡，**找反例＝證明否定式可滿足**。你主張「每個可達狀態都滿足 Inv」；模型檢查器（ch09）做的事，是在可達狀態裡搜尋讓 ¬Inv 成立的狀態。¬Inv 長什麼樣，決定你知不知道自己在找什麼——而 ¬Inv 不需要靈感，它是機械推導出來的。\n\n推移規則一張表（每條都能用真值表或有限攤開驗證；量詞那兩條就是 De Morgan 的量詞版）：\n\n| 原式 | 等價式 | 名字 |\n|---|---|---|\n| ¬¬p | p | 雙重否定 |\n| ¬(p ∧ q) | ¬p ∨ ¬q | De Morgan |\n| ¬(p ∨ q) | ¬p ∧ ¬q | De Morgan |\n| ¬(p ⇒ q) | p ∧ ¬q | **反例的形狀** |\n| ¬(∀ x ∈ S : P(x)) | ∃ x ∈ S : ¬P(x) | 量詞推移 |\n| ¬(∃ x ∈ S : P(x)) | ∀ x ∈ S : ¬P(x) | 量詞推移 |\n\n兩條值得駐足。\n\n**¬(p ⇒ q) ≡ p ∧ ¬q**。蘊涵的否定不是另一個蘊涵，是一個 ∧：「前件成立**而且**後件失敗」。反例必須同時呈現兩件事——這正是一份合格 bug report 的格式：重現條件（p 成立）加錯誤現象（q 沒發生）。順手拆穿常見錯誤：把 ¬(p ⇒ q) 寫成 p ⇒ ¬q 或 ¬p ⇒ ¬q 都是錯的——前者在 p 為假時空洞為真，後者根本是另一條主張，真值表立判。\n\n**¬∀ ≡ ∃¬**。「並非全部都好」＝「存在一個壞的」。推翻一條全稱主張只需要一個證人（witness）。這就是為什麼反例 trace 殺傷力這麼大（ch09）：它是一個具體的證人，不容辯駁；而你要守住 ∀，就得對每一個成員負責。\n\n推移演算法本身純機械：把 ¬ 從最外層往內推，每經過一層就查一次表——∀ 翻成 ∃、∃ 翻成 ∀、∧ 翻成 ∨、∨ 翻成 ∧、⇒ 拆成 ∧，直到所有 ¬ 都貼在原子述語上（原子層級的否定通常能再化簡，例如 ¬(n ≤ 1) 在自然數上就是 n ≥ 2）。推完之後做一次抽查：挑一組具體值，代入原式和結果式，真值必須相反——這是給推導上的保險。\n\n## 把白話規則翻成邏輯式：方法論與 worked example\n\n累積到這裡，工具齊了。翻譯的步驟固定五步：\n\n1. **先找量詞範圍**：這句話在對「哪一袋東西」說話？袋子是誰、有限還是會長大？\n2. **名詞變述語**：每個性質一個帶參數的 boolean。\n3. **接上連接詞**：注意中文的「的」常常藏著 ⇒——「已發放的獎勵」＝「若它已發放」。\n4. **否定它**：機械推移，讀出 bug 的形狀。\n5. **兩頭 sanity check**：原式在無聊狀態（初始、空袋）下真值合理嗎？有沒有空洞？否定式描述的是你真正想抓的 bug 嗎？\n\n為什麼第一步是量詞範圍：範圍錯，後面全錯。「所有訊息」是這一季的、目前 in-flight 的、還是含未來重送的副本？範圍變，真值就變，而白話從來不明說。\n\n### Worked example：NoDoublePay 的形狀\n\n設定沿用 ch02 的結算系統 v0：訊息 Msgs = {m1, m2}，consumer 從佇列取訊息入帳，ledger 記錄哪些 msgId 已入帳。要翻譯的業務規則，白話版：\n\n> 已發放的獎勵不會再發。\n\n一步一步來，不跳步。\n\n**步驟 1：量詞範圍。**「已發放的獎勵」在對哪些東西宣告？這個系統裡獎勵跟著訊息走，每則訊息對應一筆入帳，所以範圍是 Msgs。這句話對**每一則**訊息都成立（沒說哪則可以例外），所以最外層是 ∀ m ∈ Msgs。\n\n**步驟 2：名詞變述語。**「已發放」「不會再發」合起來談的其實是**次數**：發過一次之後，次數不能變成二。引入述語的原料 PayCount(m)：到目前為止 m 被入帳的累計次數。注意，這是個觀察值——ch02 的 ledger 只記「有沒有入帳」（boolean），沒記次數。在紙上我們可以自由談 PayCount，數學不在乎它有沒有被實作；但若要讓機器檢查它，狀態就得記得它。「invariant 需要的資訊必須存在於狀態裡」這個觀察先放在口袋，ch14 會把它升級成一門技藝（輔助述語）。\n\n**步驟 3：接連接詞。**「不會再發」＝次數至多 1。定義：\n\nNoDoublePay：∀ m ∈ Msgs : PayCount(m) ≤ 1\n\n停一下，比對另一種更貼字面的翻法。「已發放的」聽起來像個前件，所以也有人會寫：\n\n候選 B：∀ m ∈ Msgs : Paid(m) ⇒ PayCount(m) = 1，其中 Paid(m) 定義為 PayCount(m) ≥ 1\n\n攤開檢查兩者是否等價：對任一 m，若 PayCount(m) = 0，候選 B 的前件為假、整條空洞為真，而 0 ≤ 1 也為真——兩邊一致；若 PayCount(m) ≥ 1，候選 B 要求恰為 1，NoDoublePay 要求至多 1，配上「至少 1」也是恰為 1——兩邊一致。所以等價。但第一種寫法更好：它不需要讀者看穿一層 vacuous truth 才能確認初始狀態合法。**能不用 ⇒ 就不用**，是寫 invariant 的品味——每多一個 ⇒，就多一個需要驗 witness 的點。\n\n**步驟 4：否定。**機械推移：\n\n```text\n  ¬NoDoublePay\n≡ ¬(∀ m ∈ Msgs : PayCount(m) ≤ 1)\n≡ ∃ m ∈ Msgs : ¬(PayCount(m) ≤ 1)      -- ¬∀ 翻成 ∃¬\n≡ ∃ m ∈ Msgs : PayCount(m) ≥ 2         -- 次數是自然數\n```\n\n讀出來：「**存在一則訊息被入帳兩次以上**」。這就是 double pay 這個 bug 的形狀——一句話、零歧義、可以拿著去搜尋。\n\n**步驟 5：兩頭 sanity check。**原式在初始狀態（什麼都沒入帳，PayCount 全為 0）：0 ≤ 1 為真，而且不是空洞真——它真實檢查了每則訊息的計數。否定式描述的情境正是結算 pipeline 最怕的事故。兩頭都過，翻譯收工。\n\n最後示範「找反例＝證明否定式可滿足」是什麼意思。手追一條 at-least-once 世界裡的路徑（這個版本的 consumer 不查 dedup）：\n\n| 狀態 | 發生的事 | PayCount(m1) | PayCount(m2) | NoDoublePay |\n|---|---|---|---|---|\n| s0 | 初始 | 0 | 0 | 真 |\n| s1 | consumer 取 m1、入帳 | 1 | 0 | 真 |\n| s2 | m1 重送（at-least-once）、consumer 未查重、再入帳 | 2 | 0 | **假** |\n\n在 s2 取證人 m ≔ m1：PayCount(m1) = 2 ≥ 2，∃ 式成立，¬NoDoublePay 為真。這條從 s0 走到 s2 的路徑，就是「否定式在某個可達狀態上可滿足」的構造性證明——也就是一條反例 trace。ch09 你會看到 TLC 做的正是這件事，而且保證交出最短的那條。\n\n補一句誠實話：白話裡的「**再**發」其實藏著時間——「先發了一次、之後又發」。本章的工具只能對單一狀態說話，所以我們把歷史壓進 PayCount 這個計數裡，抓到的是結果（至多一次）。要直接對「步」說話（「這一步若 m 已發放，就不會再入帳 m」）得等 ch06 的動作邏輯；要對「永遠、終究」說話得等 ch07 的時序邏輯。知道自己手上工具的邊界在哪，也是精確的一部分。\n\n## 陷阱與防禦\n\n本章每個工具都有它給假安全感的方式。一張表收齊，左欄是事故，右欄是你的自救動作：\n\n| 陷阱 | 它怎麼給你假安全感 | 怎麼自我察覺 |\n|---|---|---|\n| vacuous truth | 前件不可滿足（打錯字、條件過強、情境還沒發生過），p ⇒ q 恆真；invariant 綠燈，但什麼都沒檢查 | 為前件找 witness：舉出一個真實會發生的情況讓前件為真，舉不出來就改寫。這個警報器 ch14 會再用一次 |\n| 把 ⇒ 讀成因果或時序 | 「p ⇒ q」被讀成「p 導致 q」或「p 之後 q」，把需要時序邏輯（見 ch07）的主張誤寫成單狀態述語，自以為涵蓋了 | 自問：這條主張談的是「同一瞬間的真值關係」還是「先後發生」？句子裡出現「之後」「終究」「再也不」→ 本章工具寫不了，標記下來等 ch07 |\n| 量詞順序錯置 | ∃c∀m 與 ∀m∃c 差一個世界；中文白話兩可，翻錯的那條往往更弱、更容易「驗證通過」 | 兩種順序都寫出來、各自翻回白話，對照需求問哪句才是本意 |\n| 否定只推一半 | ¬(p ∧ q) 寫成 ¬p ∧ ¬q、推 ¬∀ 忘了翻量詞——得到錯的 bug 形狀，去找一個不存在的 bug，或漏掉真的 | 全程查表推移，不心算；推完拿一組具體值代回原式與結果式，真值必須相反 |\n| 量詞範圍含混 | 「所有訊息」沒說是哪一袋：含不含重送副本？含不含未來才進來的？範圍縮小，∀ 變容易成立 | 翻譯第一步先寫下範圍集合的名字與內容物；範圍會隨時間長大的，特別標記（這正是 ch02 的 behavior 在管的事） |\n| 空袋子邊界 | ∀ 在空範圍上恆真：「所有 prepared 的交易都 commit 了」在沒有 prepared 交易時成立 | 對每條 ∀ 主張問一次：「範圍為空時它為真，是我要的嗎？」通常是，但要「知情地是」 |\n\n共同的主旋律：**綠燈有兩種**——驗證過的，和空轉的。邏輯不會替你分辨，分辨是你的工作。\n\n## 紙上推演\n\n**題 1 [15 分鐘] ★ 真值表驗證等價式**\n\n用完整真值表驗證以下兩條等價，並各用一句白話說明它們為什麼理當如此：\n\n(a) p ⇒ q ≡ ¬p ∨ q\n(b) ¬(p ∧ q) ≡ ¬p ∨ ¬q\n\n### 推演解答\n\n(a) 四列攤開：\n\n| p | q | ¬p | ¬p ∨ q | p ⇒ q |\n|---|---|---|---|---|\n| T | T | F | T | T |\n| T | F | F | F | F |\n| F | T | T | T | T |\n| F | F | T | T | T |\n\n第四、五欄逐列相同，等價成立。白話：「若 p 則 q」唯一排除的世界是「p 真 q 假」；「要嘛 p 不成立、要嘛 q 成立」排除的也正是那個世界。工程版：`if (p && !q) throw` 跟 `assert(!p || q)` 是同一條檢查。這條等價也是推導的潤滑劑——遇到 ⇒ 推不動時，先把它換成 ¬p ∨ q，世界會變簡單。\n\n(b) 同樣四列：\n\n| p | q | p ∧ q | ¬(p ∧ q) | ¬p ∨ ¬q |\n|---|---|---|---|---|\n| T | T | T | F | F |\n| T | F | F | T | T |\n| F | T | F | T | T |\n| F | F | F | T | T |\n\n第四、五欄相同，等價成立。白話：「並非兩者都成立」＝「至少一個不成立」。常見錯誤是把右邊寫成 ¬p ∧ ¬q（「兩個都不成立」）——那是 ¬(p ∨ q) 的等價式，第二、三列就會被抓出來。\n\n**題 2 [20 分鐘] ★★ 中⇄邏輯互翻三題**\n\n(a) 中→邏輯：「每筆已 commit 的訂單都有 ledger 記錄。」（量詞範圍自己定，要明寫。）\n(b) 中→邏輯：「要嘛至少有一個 consumer 是空閒的，要嘛佇列是空的。」\n(c) 邏輯→中：∀ c ∈ Consumers : Busy(c) ⇒ (∃ m ∈ Msgs : AssignedTo(m, c))\n\n### 推演解答\n\n(a) 範圍：Orders ＝ 本結算期的所有訂單。述語：Committed(o)、HasLedger(o)。\n\n∀ o ∈ Orders : Committed(o) ⇒ HasLedger(o)\n\n「已 commit 的」是中文的「的」藏起來的前件。witness check：committed 的訂單真實存在，所以不空洞。順手否定一次：∃ o ∈ Orders : Committed(o) ∧ ¬HasLedger(o)——對帳作業每天在找的就是這個 ∃ 的證人；SQL 寫出來正是 `NOT EXISTS` 的形狀：查詢回空 ⇔ 原式成立。\n\n(b) 述語：Idle(c)、QueueEmpty。\n\n(∃ c ∈ Consumers : Idle(c)) ∨ QueueEmpty\n\n兩個討論點。第一，白話的「要嘛…要嘛…」這裡是 inclusive or：佇列空、同時又有人閒著，不算違規；若需求真是恰好一邊，必須明寫排他。第二，否定它：(∀ c ∈ Consumers : ¬Idle(c)) ∧ ¬QueueEmpty——「所有 consumer 都在忙，而且佇列非空」，這是 backpressure 告警的形狀。一條健康主張的否定式往往就是你該設的 alert 條件。\n\n(c) 白話：「每個忙碌中的 consumer 都至少被指派了一則訊息。」重點在 ∃ 住在 ∀ 裡面：每個 consumer 各有各的訊息，不要求同一則。常見錯翻是「有一則訊息被指派給所有忙碌的 consumer」——那是 ∃ m ∀ c，順序翻錯差一個世界。另外注意這條主張容忍空閒的 consumer（前件為假、放行），它防的是「殭屍忙碌」：標記為忙、手上卻沒有任何工作。\n\n**題 3 [15 分鐘] ★★ 否定推移（巢狀量詞）**\n\n求下式的否定範式（把 ¬ 全部推到原子述語上），把結果翻成白話，並說出它是哪種 bug 的形狀：\n\n∀ m ∈ Msgs : Delivered(m) ⇒ (∃ c ∈ Consumers : Processed(c, m))\n\n### 推演解答\n\n逐層推移，每步只動一層：\n\n```text\n  ¬(∀ m ∈ Msgs : Delivered(m) ⇒ (∃ c ∈ Consumers : Processed(c, m)))\n≡ ∃ m ∈ Msgs : ¬(Delivered(m) ⇒ (∃ c ∈ Consumers : Processed(c, m)))\n                                        -- ¬∀ 翻成 ∃¬\n≡ ∃ m ∈ Msgs : Delivered(m) ∧ ¬(∃ c ∈ Consumers : Processed(c, m))\n                                        -- ¬(p ⇒ q) ≡ p ∧ ¬q\n≡ ∃ m ∈ Msgs : Delivered(m) ∧ (∀ c ∈ Consumers : ¬Processed(c, m))\n                                        -- ¬∃ 翻成 ∀¬\n```\n\n白話：「存在一則已投遞的訊息，**所有** consumer 都沒處理它。」——訊息黑洞（掉單）的形狀。三層結構各自翻面：∀ 變 ∃、⇒ 變 ∧、∃ 變 ∀。最容易犯的錯在第二步：把 ⇒ 的否定寫成 Delivered(m) ⇒ ¬(∃ c : …)——這句話會空洞地放過所有「未投遞」的訊息沒錯，但它根本不是否定式：拿「m 未投遞」的情況代入抽查，原式為真、它也為真，真值沒有相反，立刻穿幫。\n\n**題 4 [10 分鐘] ★★ 拆穿空洞的 invariant**\n\n你接手一份 spec，裡面有一條三個月來從沒亮過紅燈的 invariant（Refunded(m)：m 已退款）：\n\n∀ m ∈ Msgs : Refunded(m) ⇒ PayCount(m) = 0\n\n問：(1) 它到目前為止證明了什麼？(2) 怎麼判定它是不是在空轉？(3) 若真在空轉，怎麼處置？\n\n### 推演解答\n\n(1) 如果這三個月沒有任何訊息走過退款流程（Refunded 恆假），這條 invariant 一直是空洞為真——它證明的唯一一件事是「沒有東西被退款過」，後件 PayCount(m) = 0 從未被檢查。三個月的綠燈，資訊量是零。\n\n(2) witness check：找一個 Refunded(m) 為真的實例——查資料、查可達狀態，任何形式都行。找得到，invariant 真的驗過東西；找不到，它在空轉。記住「invariant 通過」與「invariant 驗過東西」是兩個獨立的問題，第二個問題沒有任何工具會自動替你問。\n\n(3) 兩種情況。若退款流程在系統裡存在、只是模型沒涵蓋到，就把場景補進模型，並用一招確認場景真的被走到：故意寫一條錯的主張（例如 ∀ m ∈ Msgs : ¬Refunded(m)），它被打破才表示退款狀態真的可達——「讓反例替你做展示」這招 ch08 的 DieHard 會正式登場。若退款根本不在這個模型的範圍內，誠實的處置是把這條 invariant 連同「本模型不含退款」的註記一起移除或標示——留著一條永遠空轉的 invariant，是給下一個讀 spec 的人埋假安全感。\n\n## 自我檢核\n\n口頭回答，講得出來才算過：\n\n1. p ⇒ q 在 p 為假時為什麼定義為真？用契約或 guard clause 的語言給一個工程上說得通的理由，不准回答「定義就是這樣」。\n2. 什麼是 vacuous truth？舉一個你自己系統裡「綠燈但什麼都沒檢查」的真實例子，並說出拆穿它的具體動作。\n3. ¬(p ⇒ q) 等價於什麼？為什麼說它是「bug report 的格式」？\n4. ∀ m ∃ c 與 ∃ c ∀ m 差在哪？哪條強？用訊息與 consumer 造一對例句示範。\n5. 怎麼判斷一條式子是命題還是述語？bound／free variable 跟這個判斷有什麼關係？\n6. 空集合上的 ∀ 與 ∃ 各取什麼真值？為什麼說 JavaScript 的 `[].every` 與 `[].some` 跟邏輯學家站同一邊？\n7. 把白話規則翻成邏輯式的五個步驟是什麼？為什麼第一步是找量詞範圍？\n8. 「找反例」在邏輯上等於對哪條式子做什麼事？這跟 ch09 模型檢查器的工作有什麼關係？\n\n## 延伸閱讀\n\n- Hillel Wayne，《Learn TLA+》〈Operators and Values〉：https://learntla.com/core/operators.html ——TLA+ 視角的命題連接詞入門，對 ⇒ 的講法（「A 至少跟 B 一樣真」）與本章互補，附 contrapositive 練習；量詞在 Core 後續章節循序登場（2026-06 確認站點持續維護）。\n- Leslie Lamport，《Specifying Systems》第 1 章〈A Little Simple Math〉：https://lamport.azurewebsites.net/tla/book.html （官方免費 PDF）——Lamport 用十來頁講完本章加 ch04 的數學，乾燥但精準；讀它可以校準「TLA+ 把邏輯當什麼用」。\n- Richard Hammack，《Book of Proof》第 3 版：https://richardhammack.github.io/BookOfProof/ （官方免費 PDF）——第 2 章〈Logic〉用最少的形式機械把真值表、量詞、否定推移講完，習題量大；想把本章練成厚實的肌肉，做它的習題最划算。\n- Lehman、Leighton 與 Meyer，《Mathematics for Computer Science》：https://people.csail.mit.edu/meyer/mcs.pdf （MIT 開放教材，免費 PDF）——〈Logical Formulas〉一章從數位電路與程式驗證的動機講命題與謂詞邏輯，工程味最重的一本；之後讀 ch05 歸納法時它也是好補充。\n"}, {"id": "ch04-sets-functions-relations", "file": "ch04-sets-functions-relations.md", "group": "Part II — 數學地基", "title": "ch04 — 集合、函數、關係：TLA+ 的原料", "md": "# ch04 — 集合、函數、關係：TLA+ 的原料\n\n> **本章解決什麼問題**：ch03 給了你精確說話的文法——連接詞與量詞。但句子裡談論的「東西」本身：訊息、佇列、帳本、組態，還沒有精確的身分。本章把集合、函數、關係磨利成建模工具，並立起 TLA+ 的核心世界觀：**函數是一張總是查得到的表**。這是 Part II 數學地基的第二塊：ch05 要在上面做歸納證明，而 ch06 之後每一份 spec 的每個變數，裝的值全是本章的原料。\n\n## 從你已知的出發\n\n你每天的工作語言裡早就有這一章的所有東西，只是掛著別的名字：\n\n| 你每天寫的 | 數學名字 | 本章符號 |\n|---|---|---|\n| `Set<T>`、SQL 的 DISTINCT 結果 | 集合（set） | {m1, m2}、∈、⊆ |\n| `Map<K, V>`（且保證每個 key 都有值） | 函數（function） | [K → V]、f[k] |\n| JSON object | record（定義域是欄位名的函數） | [state ↦ \"paid\"] |\n| array | sequence（定義域是 1..n 的函數） | ⟨m1, m2⟩ |\n| join table | 關係（relation） | R ⊆ S × T |\n| feature flags 的所有組合 | 冪集（power set） | 𝒫(Flags) |\n\n具體一點：你在結算 pipeline 裡維護的 dedup 表——`msgId → 處理狀態`——就是一張函數；SQS standard queue 的 at-least-once 讓「同一則訊息出現兩份」成為日常，這逼你天天面對「該用 set 還是 multiset」的問題，只是你從來不用這個詞；後台那十幾個 feature flag 的全部組合，就是一個冪集。\n\n差別不在名字，在**保證**。`Map.get()` 可能回 `undefined`；LEFT JOIN 會生出 NULL；物件少個欄位要 optional chaining。你的工程直覺裡，「查表」天生是 partial 的——查不到是日常，所以你寫了滿手的 `?.` 與 `??`。數學世界把這件事整個翻過來：**函數對定義域裡的每個輸入都有值，沒有例外**。查不到不是「回 undefined」，而是你問了一個不合法的問題。這個翻轉乍看只是潔癖，但它正是規格語言能夠精確的原因：partial 的地方，就是規格含糊的地方。\n\n回到 ch02 的心智模型：狀態＝給每個變數賦一個值。那「值」是什麼？在 TLA+ 的世界裡答案只有一種：**某個集合的元素**。佇列是一個集合、帳本是一張表、「誰在處理誰」是一個關係。把每個變數允許取值的集合（本書叫它這個變數的**值域**）寫精確，整個系統的狀態空間就有了邊界——本章結尾會替結算系統 v0 把這個邊界真的算出來。\n\n## 集合：唯一的原料\n\n集合是「一堆東西」，由**成員資格**唯一決定：給任何東西 x，「x ∈ S」（x 屬於 S）有明確的是或否。就這麼一條定義，兩個推論直接跟著來，而且都會咬人：\n\n- **沒有順序**：{m1, m2} = {m2, m1}。\n- **沒有重複**：{m1, m1} = {m1}。塞第二次，等於沒塞。\n\n這兩條「失憶」性質是本章後半 multiset 討論的伏筆：對 at-least-once 的訊息，第二條會悄悄吞掉你最關心的資訊。\n\n基本操作四件套，配上你熟的對應物：\n\n- **∈ / ∉**（屬於／不屬於）：成員資格查詢，`set.has(x)`。\n- **⊆**（包含於）：S ⊆ T ≜ S 的每個元素都在 T 裡。「整包都在範圍內」。\n- **∪ / ∩ / \\**（聯集／交集／差集）：合併、共同部分、扣掉。SQL 的 UNION／INTERSECT／EXCEPT。\n- **=**：兩個集合相等 ⟺ 元素完全相同（順序、寫法、重複都不算數）。\n\n一個馬上要立的警告：**∈ 和 ⊆ 是兩件事**。m1 ∈ Msg 說「m1 是 Msg 的成員」；{m1} ⊆ Msg 說「{m1} 這一包的每個元素都在 Msg 裡」。兩句都對，但 m1 ⊆ Msg 是另一回事（陷阱段細談）。口訣：∈ 問身分，⊆ 問範圍。\n\n還有兩個你天天在寫、值得知道數學名字的操作（這裡用數學記法，TLA+ 寫法見 ch06 之後）：\n\n- **篩選**：{x ∈ S : P(x)}——S 裡滿足 P 的那些。就是 `filter`，也是 SQL 的 WHERE。\n- **映射**：{e(x) : x ∈ S}——把 S 的每個元素丟進表達式 e 得到的所有結果。就是 `map`，也是 SELECT 的表達式欄位。\n\n### 冪集與笛卡兒積：組合爆炸的兩具引擎\n\n**冪集** 𝒫(S)：S 的所有子集收成一個集合。拿 Flags ≜ {dark, billing, beta} 來手數一次：\n\n```text\n𝒫(Flags) = { {},\n             {dark}, {billing}, {beta},\n             {dark, billing}, {dark, beta}, {billing, beta},\n             {dark, billing, beta} }\n```\n\n8 個，= 2³。公式 |𝒫(S)| = 2^|S| 的理由值得口頭講得出來：造一個子集，就是替**每個元素獨立做一次二選一**（進，或不進），n 個元素就是 2 × 2 × … × 2 共 n 次。你的服務有 10 個 feature flag？所有組態就是 𝒫(Flags)，共 1,024 種——你的測試矩陣不可能全蓋。ch01 用交錯數看過組合爆炸，這是它的代數面孔。\n\n**笛卡兒積** S × T：所有「左邊取一個、右邊取一個」的有序對 ⟨s, t⟩。|S × T| = |S| × |T|，純乘法。它是本章最重要的計數引擎，因為**狀態空間天生就是笛卡兒積**：每個狀態＝每個變數各取值域裡一個值，所以「型別正確的狀態總數」就是各值域大小相乘——worked example 全靠它。\n\n## Tuple 與 sequence：順序回來了\n\n集合丟掉的兩樣東西——順序與重複——由 **tuple** 撿回來：⟨m1, m2⟩ 是有序的，⟨m1, m2⟩ ≠ ⟨m2, m1⟩；長度固定；允許重複，⟨m1, m1⟩ 是正經八百的東西。\n\n**sequence** 是「長度不固定的 tuple」：⟨⟩、⟨m1⟩、⟨m2, m1, m1⟩ 都是 Msg 上的 sequence。你的 array 直覺幾乎全部成立，只有一條要記：這個世界的 sequence 是 **1-indexed**——第一個元素是第 1 格，不是第 0 格。\n\n一個之後會回收的事實：S 上所有有限 sequence 的集合（記作 Seq(S)）是**無限的**——長度沒有上限。紙上數學毫不在意；想窮舉的人非常在意（見 ch09）。\n\ntuple 和 sequence「其實是什麼」，等講完函數再揭曉——答案會把本章所有資料結構統一成一種東西。\n\n## 函數：總是查得到的表\n\n本章的主角。先把定義立正。一個函數 f 由兩件事完全決定：\n\n1. **定義域**（domain）：一個集合，列出所有合法的輸入。\n2. 對定義域裡**每一個** x，**恰好一個**值 f[x]。\n\n就這樣。沒有第三件事：沒有程式碼、沒有執行過程、沒有副作用、沒有 undefined。函數就是一張表——左欄把定義域的元素列好列滿，右欄一格不空。結算系統的帳本就是一例：\n\n```text\nledger:   m1 ↦ FALSE\n          m2 ↦ TRUE\n```\n\n（套用寫成 f[x]，跟你的陣列下標同形；這也是之後 TLA+ 的寫法，現在先把手感養起來。）\n\n「總是查得到的表」這個世界觀，有三個推論值得各給一段：\n\n**一、查表不會失敗，但問錯問題沒人救你。**對定義域裡的 x，f[x] 必有值。對定義域**外**的 x 呢？f[x] 不是錯誤、不會拋例外、也不是 undefined——它是**無意義**的式子，值不明，但推理可以面不改色地繼續。Lamport 把這類式子叫 silly expression：「ledger[佇列] 」這種垃圾不會炸，只會默默讓你後面的結論全部作廢。防禦方式見陷阱段；現在先記住手感的差異：程式裡查錯 key 是 runtime 問題，數學裡查錯 key 是**你的問題**。\n\n**二、「每個 key 都有值」從要維護的紀律，變成結構本身的保證。**在 TypeScript 裡，「dedup 表涵蓋所有 msgId」是你要靠初始化邏輯與 code review 守住的不變量；在數學裡，你宣告 ledger ∈ [Msg → BOOLEAN]，涵蓋性就是定義的一部分——不用維護，不會壞。寫 spec 時這是巨大的優點：**你被迫在建模當下回答「這張表到底涵蓋誰」**，而不是把這個問題留給 runtime。\n\n**三、函數是值，不是行為。**一張表可以放進集合、存進變數、跟另一張表比較（f = g ⟺ 定義域相同且逐點相等）。它也可以無限大：「平方」就是一張定義域為自然數的無限長表格，紙上完全合法。在 TLA+ 裡，函數跟數字一樣是一級公民——可以賦給變數、可以當參數傳——語法見 ch06 與 ch08。\n\n**更新＝抄表改一格。**數學函數是 immutable 的。「把 ledger 的 m1 改成 TRUE」的意思是：造一張**新表**，m1 那格填 TRUE，其他格照抄。你寫 reducer 時的 `{ ...state, m1: true }` 就是這個語意，一模一樣。ch06 的 x′（下一個狀態的值）會大量依賴這個觀念：狀態轉移不是「就地改」，是「舊表參照、新表登場」。\n\n最後一個記號：**[S → T]** 表示「定義域是 S、值都落在 T」的**所有**函數收成的集合。它的大小：\n\n|[S → T]| = |T|^|S|\n\n理由跟冪集同款：定義域的每個元素**獨立**挑一個值，|S| 個元素各有 |T| 種挑法。拿 [Msg → BOOLEAN] 手數一次（|BOOLEAN| = 2、|Msg| = 2，所以應該有 2² = 4 張表）：\n\n```text\nf1:  m1 ↦ FALSE,  m2 ↦ FALSE\nf2:  m1 ↦ FALSE,  m2 ↦ TRUE\nf3:  m1 ↦ TRUE,   m2 ↦ FALSE\nf4:  m1 ↦ TRUE,   m2 ↦ TRUE\n```\n\n四張，沒有第五張。注意指數的方向：**定義域在指數上**。|[S → T]| 和 |[T → S]| 一般不相等，背反了會把上界算錯一個數量級（紙上推演有練習）。\n\n## Record：定義域是欄位名的函數\n\n[id ↦ \"p-001\", state ↦ \"paid\"] 長得就像 JSON object，而它的數學身分是：**一張定義域為 {\"id\", \"state\"} 的函數**。r.state 只是 r[\"state\"] 的縮寫——欄位存取就是查表。JSON 直覺幾乎全保留，外加一條升級：record 不會「少欄位」——定義域裡的欄位，格格有值。\n\n「某型別的所有 record」也是一個集合，大小用乘法：欄位逐一獨立挑值。例如 [merchant: MerchantId, state: {pending, paid}] 的 record 共 |MerchantId| × 2 個。\n\n現在揭曉剛剛賣的關子。**全家都是表**：\n\n| 東西 | 其實是函數，定義域是…… |\n|---|---|\n| sequence ⟨a, b, c⟩ | 1..3（第 i 格 ↦ 第 i 個元素） |\n| tuple ⟨s, t⟩ | 1..2 |\n| record | 欄位名的集合 {\"id\", \"state\", …} |\n| bag（下一節） | 元素的集合，值是「份數」 |\n\n學會一種東西（函數），整個資料結構動物園就統一了。這是 TLA+ 數學的經濟學：概念極少，組合力極強。learntla 講得更直白：sequence 和 structure「只是語法糖」。\n\n## 關係：join table 的數學名字\n\n**關係**（relation）：R ⊆ S × T——「哪些配對成立」的完整清單。你資料庫裡的多對多 join table，例如 payout_msgs(payout_id, msg_id)，**就是** PayoutId × MsgId 的一個子集。這裡沒有類比修辭：逐字面相等。\n\n三件值得帶走的事：\n\n- **函數是特殊的關係**：每個 s 恰好配一個 t 的那種。你在 join table 上加 UNIQUE 約束，就是把關係收緊成函數——DDL 約束＝替關係加數學結構，同一個動作。\n- **1-N、N-N** 這些你畫 ER 圖的詞，全是關係的形狀描述：N-N 是任意子集，1-N 是沿某個方向「至多一個」。\n- **計數**：S × T 上的關係共 |𝒫(S × T)| = 2^(|S| × |T|) 個。3 × 4 = 12 格的勾選表，每格獨立打勾或不打：2¹² = 4,096 種。關係值域有多胖，這條公式先告訴你。\n\n「誰在處理誰」——consumer 與訊息之間——天生是個關係。但若每個 consumer 同時至多處理一則訊息，這個關係沿 consumer 方向就是函數。worked example 替 working 變數挑值域時，用的正是這個觀察。\n\n## Set、sequence 還是 bag？——at-least-once 的訊息該裝在哪\n\n你的結算 pipeline 用 SQS standard queue：at-least-once、不保證順序（FIFO queue 是另一個產品、另一份保證）。建模「還沒處理完的訊息」時，三種容器擺在面前。先看各自的記憶力：\n\n| 容器 | 記得什麼 | 忘記什麼 | 「第二份 m1 抵達」這步會怎樣 |\n|---|---|---|---|\n| set | 在不在 | 份數、順序 | queue ∪ {m1} ＝ 原樣——被靜默吞掉 |\n| sequence | 份數＋順序 | （最少） | 真的多一份，而且有位置 |\n| bag | 份數 | 順序 | m1 的計數 +1 |\n\n**bag**（又叫 multiset，多重集）不需要新原料：它就是「元素 ↦ 正整數份數」的函數——又一張表。TLA+ 的標準模組 Bags 正是這樣編碼的：bag B 裡，e 有 B[e] 份。\n\n接下來是誠實的部分。三個觀察：\n\n**第一，set 不一定錯，但它錯起來無聲。**判準是你關心的性質。如果性質只問「這則訊息還可能被遞送嗎」——一個是非題——set 通常夠用：redelivery 可以建模成「處理過之後，訊息還能再被放回佇列」的動作，雙重處理的危險交錯依然存在於模型裡。但如果你下意識以為「set 自動去重＝幫我擋掉了重複」，那你不是建模了 dedup，是**免費假設**了 dedup——而現實的 standard queue 沒給你這個保證。模型比現實乾淨的地方，正是 bug 的藏身處。\n\n**第二，sequence 白送你一個現實沒有的保證。**用 sequence 建模 standard queue，模型自動擁有全序。任何依賴「先進先出」才成立的性質，在這個模型裡會漂亮地通過驗證——而在生產環境沒有任何依據。這比「漏抓 bug」更陰險：**你驗證的是一個比現實更乖的系統**。方向感要建立起來：寧可讓模型比現實「更亂」（多出一些現實不會發生的行為——代價是多花力氣排除誤報），不要讓模型比現實「更乖」（少掉現實會發生的行為——漏掉真 bug，而且毫無徵兆）。\n\n**第三，bag 最忠實，帳單也最貴。**份數沒有先天上界——重送可以一再發生——所以狀態空間直接變成無限。想窮舉就得人為設限（「至多重送 2 次」），而這個上限本身又是一條要寫明、要辯護的建模假設（small scope 的辯護與限度，見 ch09）。所以 bag 不是「永遠最對」，而是「性質真的依賴份數時，才值得付錢」：backpressure（in-flight 總數 ≤ K）、「同一訊息至多被遞送 N 次」這類計數性質，非它不可。\n\n決策框架收成一句話：**先寫性質，再挑容器**。讓「性質需要分辨哪些狀態」決定容器，而不是讓容器的預設行為悄悄改寫你的性質。結算系統 v1 要正面處理 redelivery 與 dedup 表，它最後挑了什麼容器，見 ch08。\n\n## 有限、無限，與「一切皆集合」\n\nMsg 有限；自然數、Seq(S) 無限。紙上推演與證明不怕無限——ch05 與 ch14 的歸納法正是對付無限的武器；窮舉怕得要死（ch09）。替變數挑有限還是無限的值域，是「想交給模型檢查」與「想要一般性定理」之間真實的取捨，本書兩條路都會走。\n\n最後補上一句承諾過的話：TLA+ 的數學底是 **ZF 集合論**（Zermelo–Fraenkel set theory），在這個世界裡**一切皆集合**——數字、tuple、函數、record，原則上都能編碼成集合。你永遠不需要看那些編碼，但這個事實有一個工程上的直接後果：**TLA+ 沒有型別系統**。「x 是布林值」不是編譯期的判定，而是 x ∈ BOOLEAN 這個普通命題——可真可假、要被檢查或證明。所以 {1, \"a\", {2}} 是完全合法的異質集合，沒有編譯器攔你；也所以之後每份 spec 的第一個不變量幾乎都是 TypeOK——「所有變數都落在宣告的值域裡」在這個世界要當**定理**來驗，而不是當型別來標（寫法見 ch08，機器怎麼驗見 ch09）。自由與風險，是同一枚硬幣。\n\n## 完整推演：結算系統 v0 的值域與狀態空間上界\n\n把本章的原料一次用上。v0 的口語規格（ch02 引入，safety 性質 `NoDoublePay`——同一 msgId 至多入帳一次——也在那裡登場）：兩則訊息 m1、m2 等著入帳；consumer 從佇列撿訊息、入帳；帳本記錄每個 msgId 是否已入帳。先一個 consumer，再加到兩個。\n\n**第一步：固定常數集合。**\n\n- Msg ≜ {m1, m2}\n- Consumer ≜ {c1}（第五步加到 {c1, c2}）\n\n**第二步：替每個變數挑值域。**這就是「用集合語言定義狀態型別」，每個決定都附理由：\n\n- **queue**——還沒被撿走的訊息。v0 沒有 redelivery，每則訊息至多出現一份，set 不丟資訊（上一節的判準在這裡兌現：先確認動作與性質都不依賴份數，才有資格用 set）。值域：**𝒫(Msg)**。\n- **working**——每個 consumer 手上正在處理哪則訊息。「沿 consumer 方向恰好一個值」——函數。手上沒事做也要能表示，值域加哨兵 idle，並要求 **idle ∉ Msg**（撞名陷阱見下節）。值域：**[Consumer → Msg ∪ {idle}]**。\n- **ledger**——基準定義：msgId → 是否已入帳。一張涵蓋所有 msgId 的布林表。值域：**[Msg → BOOLEAN]**。\n\n三條合起來，就是 v0 的型別述語（ch08 會叫它 TypeOK，而且它幾乎總是 spec 的第一個不變量）：\n\nqueue ∈ 𝒫(Msg) ∧ working ∈ [Consumer → Msg ∪ {idle}] ∧ ledger ∈ [Msg → BOOLEAN]\n\n一個狀態＝三個變數各取值域中一個值。v0 裡一則訊息的一生：\n\n```text\n┌──────────┐  Fetch   ┌──────────────┐  Settle   ┌────────────────┐\n│  queue   │ ───────► │   working    │ ────────► │ ledger[m]=TRUE │\n│ 還在佇列 │          │ consumer 手上│           │     已入帳     │\n└──────────┘          └──────────────┘           └────────────────┘\n```\n\n**第三步：逐個數值域大小，不跳步。**\n\n- queue：|𝒫(Msg)| = 2² = **4**。逐一列出：{}、{m1}、{m2}、{m1, m2}。✓\n- working（1 個 consumer）：|Msg ∪ {idle}| = 3，所以 |[{c1} → Msg ∪ {idle}]| = 3¹ = **3**。逐一列出：(c1 ↦ idle)、(c1 ↦ m1)、(c1 ↦ m2)。✓\n- ledger：|[Msg → BOOLEAN]| = |BOOLEAN|^|Msg| = 2² = **4**。逐一列出：就是前面數過的 f1、f2、f3、f4 四張表。✓\n\n**第四步：乘起來。**\n\n狀態空間上界 = 4 × 3 × 4 = **48**。\n\n這個 48 是什麼？是所有**型別正確**的狀態總數——三個值域的笛卡兒積大小。它**不是**可達狀態數。可達狀態是「從初始狀態出發、沿著動作一步一步走得到」的那些（ch02 正在一張一張手畫）；上界只看值域，完全不看動作。一句口訣，全書沿用：**值域給上界，動作決定可達**。\n\n可達狀態遠少於 48。為什麼？因為 v0 的動作維護著一條守恆律：**每則訊息在任一時刻恰好在一個地方**——佇列裡、某個 consumer 手上、或已入帳。48 格裡大多數狀態違反它。例如 ⟨queue = {m1, m2}, working = (c1 ↦ m1), ledger = f1⟩：m1 同時在佇列裡又在 c1 手上——沒有任何動作序列能走到這裡。它型別正確，卻永遠不可達。可達狀態的精確張數與全圖，是 ch02 手畫圖的工作；兩邊的帳必須對得起來——那張圖的每一個節點，都得是這 48 格之一。\n\n順帶一提：上界既然總是高估，算它幹嘛？三個實際用途。（a）**可行性試算**：動作都還沒設計就能算，30 秒告訴你這組參數值不值得手畫或窮舉；（b）**對帳工具**：任何聲稱的可達數若超過上界，必有人算錯；（c）**設計訊號**：值域選太胖，上界第一個告訴你。\n\n**第五步：加到 2 個 consumer。**\n\n只有 working 的值域變了：|[{c1, c2} → Msg ∪ {idle}]| = 3² = **9**（兩個 consumer 各自獨立挑 3 種）。上界 = 4 × 9 × 4 = **144**。加一個 consumer，上界乘一次 |Msg ∪ {idle}| = 3。\n\n**第六步：把通式寫下來，感受指數。**\n\nm 則訊息、c 個 consumer：\n\n上界 = 2^m × (m+1)^c × 2^m = **4^m × (m+1)^c**\n\n| m（訊息） | c（consumer） | 上界 |\n|---|---|---|\n| 2 | 1 | 16 × 3 = 48 |\n| 2 | 2 | 16 × 9 = 144 |\n| 3 | 2 | 64 × 16 = 1,024 |\n| 4 | 3 | 256 × 125 = 32,000 |\n| 10 | 4 | 1,048,576 × 14,641 ≈ 1.5 × 10¹⁰ |\n\nch01 用交錯數看過組合爆炸，這是它的值域版本：**每加一個變數，上界乘上整個值域的大小；每加一個元素，好幾個值域同時長胖**。這也是為什麼 Part III 之前我們把參數釘得這麼小——不是偷懶，是讓紙還夠用。\n\n## 陷阱與防禦\n\n本章的概念怎麼被誤用、驗證怎麼假通過、怎麼自我察覺：\n\n| 陷阱 | 怎麼害你（往往無聲） | 防禦 |\n|---|---|---|\n| ∈ 與 ⊆ 混用 | m1 ⊆ Msg 在 ZF 裡甚至不報錯（一切皆集合，式子合法），只是值不明——推理照走，結論作廢 | 口訣：∈ 問身分、⊆ 問範圍。檢查兩側：∈ 左邊是元素；⊆ 兩邊都是集合 |\n| 用 set 裝會重複的東西 | 第二份訊息被 ∪ 靜默吞掉；「佇列中每則訊息至多一份」之類的性質**由結構保證恆真**——驗了等於沒驗（vacuous truth 的資料結構版，ch03 的老朋友） | 對每個 set 變數問：「現實裡兩份能同時存在嗎？」能，就考慮 bag 或顯式計數 |\n| 用 sequence 白拿順序 | 模型比現實乖：依賴 FIFO 的性質在模型裡通過，在生產環境沒有依據 | 問「系統真的承諾順序嗎」；性質不依賴順序就降級到 set／bag，讓模型保持「比現實亂」 |\n| 定義域外查表 | f[x]（x ∉ 定義域）是 silly expression：不是錯誤、是垃圾，後續推理面不改色地繼續 | 每個函數寫下定義域；之後養成 TypeOK 習慣（ch08），讓檢查器抓（ch09） |\n| 哨兵值撞名 | 若 idle ∈ Msg，「c1 沒事做」與「c1 在處理一則叫 idle 的訊息」是**同一個狀態**——狀態空間悄悄黏合，數錯、推錯都從這裡開始 | 哨兵與正常值取自不相交的集合；之後把 idle ∉ Msg 寫成 spec 的明文前提（ch08 的 ASSUME 預告） |\n| 值域選太胖 | 上界爆炸；更糟的是胖值域裡大量「型別正確但概念荒謬」的狀態，會讓 ch14 找 inductive invariant 時多受很多苦 | 先算上界再定案；夠用 {0, 1, 2} 就不用自然數，夠用函數就不用關係 |\n\n共同的後設教訓：這些陷阱**全都不報錯**。數學不會替你 lint；自我察覺的訊號是「一條性質怎麼改動作都不會破」（懷疑被結構保證，而不是被設計保證）與「一個式子兩側的東西種類對不上」（懷疑 silly expression）。\n\n## 紙上推演\n\n### 題 1：集合算術熱身 **[10 分鐘] ★**\n\n設 S ≜ {a, b, c}、T ≜ {b, c, d}。手算：\n\n1. S ∪ T、S ∩ T、S \\ T、T \\ S。\n2. |S × T|、|𝒫(S)|，以及 S × T 上所有關係的個數。\n3. |[S → T]| 與 |[T → S]|——一樣大嗎？若把 T 換成 {b, c, d, e} 呢？\n4. 你的服務有 6 個 feature flag。所有組態幾種？「包含 dark_mode」的組態幾種？\n\n### 推演解答\n\n1. S ∪ T = {a, b, c, d}（重複只算一次）；S ∩ T = {b, c}；S \\ T = {a}；T \\ S = {d}。\n2. |S × T| = 3 × 3 = 9。|𝒫(S)| = 2³ = 8：{}、{a}、{b}、{c}、{a,b}、{a,c}、{b,c}、{a,b,c}。關係＝S × T 的子集，所以共 |𝒫(S × T)| = 2⁹ = 512 個——一張 9 格勾選表，每格獨立打勾或不打。\n3. |[S → T]| = |T|^|S| = 3³ = 27；|[T → S]| = |S|^|T| = 3³ = 27。一樣大是巧合（兩集合等大）。把 T 換成 4 個元素：|[S → T]| = 4³ = 64，|[T → S]| = 3⁴ = 81——不一樣了。**定義域在指數上**，方向背反，上界就錯。\n4. 2⁶ = 64 種。包含 dark_mode：把它釘死為「在」，剩 5 個 flag 自由，2⁵ = 32 種。常見錯路是想用 64 去除以什麼——冪集計數永遠回到「每個元素獨立二選一」的結構去想，不要硬套排列組合公式。\n\n### 題 2：把一張 DB schema 翻成 record 與關係 **[20 分鐘] ★★**\n\n結算系統的周邊 schema：\n\n```text\nmerchants(id PK, status)              -- status ∈ {active, frozen}\npayouts(id PK, merchant_id FK, state) -- state ∈ {pending, paid}\npayout_msgs(payout_id FK, msg_id FK)  -- 多對多，無其他欄位\n```\n\n用本章的原料寫出三張表的「型別」：每張表是什麼數學物件、值域是什麼。並回答：（a）PK 的唯一性在你的翻譯裡由什麼保證？（b）若 payouts 加一個 nullable 欄位 paid_at，怎麼建模？（c）若在 payout_msgs 上加 UNIQUE(msg_id)，數學上發生了什麼？\n\n### 推演解答\n\n先固定 id 的宇宙：MerchantId、PayoutId、MsgId 各是一個有限集合。\n\n- **merchants ∈ [MerchantId → [status: {active, frozen}]]**——以 PK 為定義域的函數，值是「其餘欄位」的 record。注意我們**沒有**翻成「record 的集合」：若用 set of records，兩筆同 id、不同 status 的 record 可以同時共存，PK 唯一性就得另外當不變量去維護；翻成函數，唯一性是結構免費送的。若想表達「不是所有 MerchantId 都已註冊」，就讓定義域是 MerchantId 的某個子集——這是一個要寫明的建模決定。\n- **payouts ∈ [PayoutId → [merchant: MerchantId, state: {pending, paid}]]**。外鍵約束變成值域宣告：merchant 欄位的值**只能**落在 MerchantId 裡。\n- **payout_msgs ⊆ PayoutId × MsgId**——多對多、無其他欄位的 join table 就是關係本人，一個字都不用多寫。\n\n（a）函數對定義域裡每個元素恰好給一個值——PK 唯一性由「函數」這個結構保證，零成本。（b）nullable＝值域加哨兵：paid_at 的值域取 Timestamp ∪ {none}，並要求 none ∉ Timestamp（哨兵撞名）。另一條路：把 paid_at 抽成一張只涵蓋「已付款 payout」的部分表。兩條都合法；後者多管理一個定義域，但不必發明 none。挑哪條，理由要寫下來。（c）UNIQUE(msg_id) 把關係沿 MsgId 方向收緊成「每個 msg 至多配一個 payout」——關係變成以 MsgId 一側為定義域的（部分）函數。你在 DDL 裡寫的每個約束，都是在替關係加數學結構；反過來說，關係的數學形狀，DB 沒有約束替你守。\n\n### 題 3：set 建模佇列，到底丟了什麼 **[15 分鐘] ★★★**\n\nv1 之前的思想實驗。把佇列建模成 set，動作兩個：Send 把訊息加進 queue；Deliver 把訊息從 queue 移除、交給 consumer。broker 是 at-least-once：同一則訊息可能被 Send 兩次。\n\n（a）queue = {m1, m2} 時第二份 m1 抵達（Send(m1)），前後的 queue 值各是什麼？這一步在模型裡「看起來像」什麼？\n（b）描述一個現實中可能發生、但這個模型**表示不出來**的情境（提示：兩份 m1 同時 in-flight）。\n（c）寫一條在這個模型裡**恆真**、但對真實 standard queue **不成立**的性質，並說明為什麼這種「通過」最危險。\n（d）改用 bag 後，（a）那一步變成什麼？代價是什麼？\n\n### 推演解答\n\n（a）前：{m1, m2}；後：{m1, m2} ∪ {m1} = {m1, m2}。**狀態完全沒變**——這一步在模型裡等於「什麼都沒發生」。重送事件被結構靜默吞掉，而且模型裡不留任何痕跡讓你發現它被吞掉。\n\n（b）現實：佇列裡同時躺著兩份 m1；c1 取走一份開始處理，**另一份還在佇列裡**，隨後被 c2 取走——兩個 consumer 同時在處理 m1，`NoDoublePay` 岌岌可危。set 模型裡，Deliver(m1) 把 m1 從集合移除之後，佇列裡就**完全沒有** m1 了；「取走一份、還剩一份」這個中間狀態不存在於任何可達狀態。（模型還能不能間接製造雙重處理？能——如果你另外寫一個「重新入列」的動作。但那是你**手動補回**被 set 丟掉的行為，不是 set 替你保留的。誠實的建模者要分得清這兩件事。）\n\n（c）例如：「任一時刻，queue 裡每則訊息至多一份」。在 set 模型裡這是**結構恆真**——動作隨便亂改都不可能違反，於是「驗證通過」。對真實的 standard queue，它就是假的。這種通過最危險，因為它長得跟真的驗證一模一樣：檢查跑了、綠燈亮了，但這條性質從頭到尾沒有檢查任何東西——ch03 的 vacuous truth 在資料結構層的轉世。自我察覺的訊號：一條性質如果「怎麼改動作都不會破」，要懷疑它是被**結構**保證的，不是被**設計**保證的。\n\n（d）bag 版：m1 的份數 1 → 2——重送第一次在狀態裡留下痕跡；（b）的情境也能忠實表示（份數 2，Deliver 後份數 1，另一份照常可被遞送）。代價：份數沒有先天上界，狀態空間變無限；想窮舉就得設「至多重送 k 次」的人為上限，而 k 本身又是一條要寫明、要辯護的假設（ch09）。沒有免費的忠實——這正是「先寫性質，再挑容器」的理由。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 用 60 秒向同事解釋「函數＝總是查得到的表」，並說明它跟 `Map.get()` 可能回 undefined 的差別，為什麼對寫規格是優點而不是不便。\n2. 口頭推導 |[S → T]| = |T|^|S|。接著心算：4 則訊息、3 個 consumer 時 working 的值域多大？（應得 5³ = 125——說得出 5 是誰、為什麼在 3 次方。）\n3. record、tuple、sequence 各自「是定義域為什麼的函數」？三句話一口氣講完。\n4. 佇列可能有重複訊息時，set、sequence、bag 各記得什麼、忘記什麼？「模型比現實乖」和「模型比現實亂」哪個更危險？為什麼？\n5. 「值域給上界，動作決定可達」是什麼意思？上界明明總是高估，它的三個實際用途是什麼？\n6. TLA+ 為什麼沒有型別系統？「x 是布林值」在一切皆集合的世界裡是什麼？這跟「TypeOK 是不變量而不是型別標註」有什麼關係？\n7. 為什麼 |𝒫(S)| = 2^|S|？一個值域是 𝒫(S) 的變數，會讓狀態空間上界付出多大代價？\n\n## 延伸閱讀\n\n以下連結均於 2026-06 驗證存在：\n\n- **《Specifying Systems》**，Leslie Lamport（Addison-Wesley, 2002）——官方頁面提供免費 PDF：`https://lamport.azurewebsites.net/tla/book.html`。第 1 章〈A Little Simple Math〉複習本章與 ch03 的全部數學；第 5 章〈A Caching Memory〉的 Functions 與 Tuples as Functions 小節是「函數＝表」世界觀的原典；第 6 章〈Some More Math〉的 Silly Expressions 一節把「定義域外查表是垃圾、不是錯誤」講透。\n- **learntla.com〈Operators and Values〉**，Hillel Wayne：`https://learntla.com/core/operators.html`——集合操作、篩選與映射、笛卡兒積在工具裡的寫法。本章刻意不碰語法；到 ch06 之後想看「這些數學長成什麼程式碼」，從這一頁開始。\n- **learntla.com〈Structured Data〉**：`https://learntla.com/core/functions.html`——函數、function set [S → T]、record 與 sequence；原文直說 sequence 和 structure「只是語法糖」，與本章「全家都是表」互相印證。\n- **TLA+ 標準模組 Bags.tla**：`https://github.com/tlaplus/tlaplus/blob/master/tlatools/org.lamport.tlatools/src/tla2sany/StandardModules/Bags.tla`——bag 被編碼成「元素 ↦ 正整數份數」的函數，印證本章的 multiset 討論；讀檔頭註解與 IsABag、(+)、(-) 三個定義即可。\n"}, {"id": "ch05-induction", "file": "ch05-induction.md", "group": "Part II — 數學地基", "title": "ch05 — 歸納法：證明「永遠」的唯一辦法", "md": "# ch05 — 歸納法：證明「永遠」的唯一辦法\n\n> **本章解決什麼問題**：ch02 把 invariant（不變量）定義成「所有可達狀態都成立的述語」，但可達狀態往往多到畫不完，甚至無限多——逐一檢查不是辦法。本章交給你處理「永遠」的唯一有限手段：歸納法——起點成立、每步保持，就永遠成立。全書最重要的單一概念 **inductive invariant（歸納不變量）** 在此正式登場，全書沿用的層級證明格式也從本章開始養成。Part V 的整個證明工程（ch14–16）都站在這一章上面。\n\n## 從你已知的出發\n\n你其實天天在做歸納證明，只是沒這樣叫它。\n\n第一個例子：code review 時你守著「`balance` 永遠不會是負的」。你怎麼說服自己？你不會（也不可能）列舉這個帳戶未來所有可能的請求序列。你做的是兩件有限的事：一、開戶時 balance = 0，不是負的；二、逐條檢查每一段會動到 balance 的程式碼，確認它在扣款前都驗過餘額。然後你就敢說「永遠」。\n\n第二個例子：你相信 production 的 DB schema 跟 repo 裡的 migration 資料夾一致。這份信心不是來自每天 diff 一次，而是一條遞推鏈：最初的 schema 由第一份 migration 建立；之後每一次變更都只透過 migration 進行。起點對、每一步保持，所以永遠對。也注意這份信心有多脆弱：只要有人 SSH 進去手改一次 schema——繞過「每一步」——整條鏈應聲而斷，而且斷在哪你不知道。\n\n第三個例子：binary search 的迴圈不變量（loop invariant）：「目標若存在，必在 [lo, hi) 內」。進迴圈前成立、每圈保持、迴圈結束時拿它收割結論。
