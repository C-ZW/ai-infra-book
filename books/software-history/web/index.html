ome degree, are leaky.」 | https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/ |\n| ⚠️ 「two hard things in CS: cache invalidation and naming things」 | 確切年代不明（一說 CMU 約 1970s） | **Phil Karlton**（一般歸屬；Martin Fowler 等採此） | 原始出處與確切時間**無一手記載**；作者寫「一般歸於 Phil Karlton」即可，勿給確切年份。 | https://www.karlton.org/2017/12/naming-things-hard/ ；https://quotesondesign.com/phil-karlton/ |\n| 📌 「premature optimization is the root of all evil」 | **1974**「Structured Programming with go to Statements」（*ACM Computing Surveys* 6(4), p.268） | **Donald Knuth** | **完整脈絡務必帶**：「We should forget about small efficiencies, say about 97% of the time: premature optimization is the root of all evil. **Yet we should not pass up our opportunities in that critical 3%.**」常被斷章取義成「不要優化」。Knuth **1989** 在「The Errors of TeX」中稱此為「Hoare's Dictum」，故有 Knuth/Hoare 歸屬之辯——但 1974 原文並未引 Hoare。作者寫「Knuth 1974，後 Knuth 自己歸給 Hoare」。 | https://en.wikiquote.org/wiki/Donald_Knuth ；https://shreevatsa.wordpress.com/2008/05/16/premature-optimization-is-the-root-of-all-evil/ |\n| 🟢 「Worse is Better」 | 概念 1989；文「Lisp: Good News, Bad News, How to Win Big」1990；「The Rise of Worse is Better」正式刊 *AI Expert* **1991-06** | Richard P. Gabriel | 年份分層如左 | https://en.wikipedia.org/wiki/Worse_is_better ；https://dreamsongs.com/WorseIsBetter.html |\n| （見 ch10）Brooks's Law、No Silver Bullet、Conway's Law | — | — | 措辭與年份見 §I | — |\n\n---\n\n## S. 跨章基準年份表（Appendix A 主時間軸）\n\n> 僅收錄上方已查證條目。**strand** 欄：抽象（語言/型別/抽象層）｜方法（流程/工程實務）｜both。\n\n| 年份 | 里程碑 | strand |\n|---|---|---|\n| 1837 | Babbage Analytical Engine 設計提出 | 抽象 |\n| 1843 | Lovelace Notes（含 Note G／Bernoulli）⚠️「第一位程式設計師」標籤有爭議 | 抽象 |\n| 1936 | Turing「On Computable Numbers」；Church 發表 untyped λ-calculus | 抽象 |\n| 1945 | First Draft of a Report on the EDVAC（儲存程式概念，⚠️署名爭議） | both |\n| 1945–46 | ENIAC 運轉/公開；ENIAC Six | both |\n| 1948 | Manchester Baby 跑首支儲存程式 | 抽象 |\n| 1949 | EDSAC 運轉；Wheeler「Initial Orders」＝首個組譯器 | 抽象 |\n| 1951–52 | Hopper A-0（⚠️「第一個編譯器」需保留） | 抽象 |\n| 1957 | FORTRAN 出貨 | 抽象 |\n| 1958–60 | LISP（McCarthy）；GC、homoiconicity | 抽象 |\n| 1959–60 | COBOL（CODASYL；Hopper 經 FLOW-MATIC 影響） | 抽象 |\n| 1960 | ALGOL 60 Report；BNF | 抽象 |\n| 1966 | Böhm–Jacopini 結構化定理 | 抽象 |\n| 1967 | Simula 67（OOP 源頭） | 抽象 |\n| 1968 | NATO Garmisch（software crisis / software engineering）；Dijkstra「Go To…Harmful」；Conway's Law 刊 Datamation | both |\n| 1969 | ARPANET；Hoare logic 論文；NATO Rome；Unix 起步 | both |\n| 1970 | Codd 關聯模型；Royce 論文（📌被誤讀為瀑布之父） | both |\n| 1972 | C 語言；Parnas information hiding | both |\n| 1973 | Unix pipes（McIlroy） | 抽象 |\n| 1974 | TCP/IP 論文（Cerf/Kahn）；SEQUEL（→SQL）；Knuth premature-optimization；Dijkstra separation of concerns | both |\n| 1975 | 《The Mythical Man-Month》；Brooks's Law | 方法 |\n| 1976 | 「Waterfall」一詞首現（Bell & Thayer） | 方法 |\n| 1978 | K&R《C》；Unix 哲學原則（McIlroy 等，⚠️整齊三句版是 Salus 1994 轉述） | both |\n| 1979 | C with Classes（→C++ 1983） | 抽象 |\n| 1980s | Smalltalk-80；ML/Hindley–Milner | 抽象 |\n| 1983 | GNU 宣告；TCP/IP flag day；ACID 一詞 | both |\n| 1985 | FSF；Miranda | both |\n| 1986 | 📌「No Silver Bullet」（Brooks，**非 1975**）；Takeuchi & Nonaka HBR（Scrum 根源） | 方法 |\n| 1989 | WWW 提案（Berners-Lee）；GPLv1；Worse is Better（概念） | both |\n| 1990 | Haskell 1.0 | 抽象 |\n| 1991 | WWW 公開；Linux | both |\n| 1993 | Mosaic 圖形瀏覽器；**CERN 宣布 WWW 進入公有領域（4/30）** | 抽象 |\n| 1995 | Java 1.0（WORA）；Scrum 發表（OOPSLA）；IE 1.0 | both |\n| 1997 | Cathedral and the Bazaar | 方法 |\n| 1998 | 「Open Source」一詞；VMware 成立 | both |\n| 1999 | XP Explained；Refactoring（Fowler）；VMware Workstation | both |\n| 2000 | CAP conjecture（Brewer） | 抽象 |\n| 2001 | Agile Manifesto（Snowbird, 17 簽署人） | 方法 |\n| 2002 | CAP 證明（Gilbert/Lynch）；Law of Leaky Abstractions | both |\n| 2003 | Xen；Google SRE 起 | both |\n| 2004–05 | Web 2.0（O'Reilly）；AJAX（Garrett）；Free Lunch Is Over（Sutter 2005）；Puppet 2005；MapReduce 論文（Dean & Ghemawat, OSDI 2004） | both |\n| 2006 | AWS S3/EC2；Google Bigtable 論文 | both |\n| 2007 | Linux cgroups（Google）；Amazon Dynamo 論文 | both |\n| 2009 | DevOpsDays（Debois）；NoSQL meetup；Chef | 方法 |\n| 2010 | 《Continuous Delivery》（Humble/Farley） | 方法 |\n| 2013 | Docker 公開；《The Phoenix Project》 | both |\n| 2014 | Kubernetes；Microservices 定義文（Lewis/Fowler）；Terraform | both |\n| 2015 | CNCF 成立 | 方法 |\n| 2016 | 《Site Reliability Engineering》（Google/O'Reilly） | 方法 |\n| 2019 | 《Team Topologies》 | 方法 |\n| 2021 | GitHub Copilot technical preview | 抽象 |\n| 2022 | GitHub Copilot GA | 抽象 |\n| 2023–26 | ⚠️ agentic coding 工具興起（Cursor / Claude Code / Copilot agent 等，截至 2026-06） | 抽象 |\n\n---\n\n## 脆弱事實清單（作者必須照本檔、不可憑記憶）\n\n下列是「大眾記憶最容易錯」的高危事實。作者引用這些時，**必須**回到本檔對應條目照措辭/年份寫，並帶上保留條件：\n\n1. **Royce / waterfall 神話（§J）**：Royce 1970 並未提倡純瀑布、也沒造「waterfall」一詞；他是把純線性當反例、倡議迭代。「waterfall」一詞出自 Bell & Thayer **1976**。\n2. **Lovelace「第一位程式設計師」（§A）**：是有爭議的後世標籤；Note G 更近「執行軌跡」；Babbage 自承 Bernoulli 數部分代數推演是他先做的。寫「常被譽為」。\n3. **Hopper A-0「第一個編譯器」（§B）**：以現代定義更像 loader/linker，不是現代意義 compiler。\n4. **「Considered Harmful」標題（§D）**：是編輯 **Niklaus Wirth** 加的；Dijkstra 原題「A Case Against the Goto Statement」。\n5. **Kay「OOP=messaging」引文（§F）**：精確句為「…The big idea is 'messaging'.」⚠️ 原始出處單一（1998 email）。\n6. **Brooks「No Silver Bullet」是 1986、不是 1975（§I）**：原書 1975，No Silver Bullet 是 1986 論文，1995 才併入週年版。\n7. **Conway's Law 1968（§I）**：刊 Datamation 1968-04（1967 投稿、被 HBR 退稿）；名稱由 Mealy 後冠。\n8. **Knuth「premature optimization」完整脈絡（§R）**：必帶「Yet we should not pass up our opportunities in that critical 3%」與「97% of the time」；勿斷章成「不要優化」。Knuth 1989 自稱「Hoare's Dictum」。\n9. **所有 LOC／使用量／市佔統計一律 ⚠️**：COBOL「2,200 億行」（Reuters 2015/17，單一來源）、「$3 兆/日」、AI coding 市場/SWE-bench 數字等——只能寫「據（單一/二手來源）估計」，不可斷言。\n10. **Hoare「billion-dollar mistake」場合（§G）**：是 **2009 QCon London**，**不是** 1980 圖靈獎演說（那場是「The Emperor's Old Clothes」）。\n11. **「a language so far ahead of its time」（§C）**：是 Hoare 論 ALGOL 60，精確句見 §C。\n12. **Unix「do one thing well」（§E）**：1978 原句是「Make each program do one thing well」；流傳的整齊三句版是 Salus 1994 轉述。\n\n---\n\n*掃描日誌：2026-06-13 初版，涵蓋 ch02–ch21 全部事實區。約 60 次 web 搜尋/查證。下次重掃重點：Q 區（AI coding 半年內必過期）、所有 ⚠️ 統計、Kay 引文一手出處若有更可靠來源則升級。*\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書：《複雜度守恆：軟體發展史的工程師讀法》。本檔是改任何內容前的第一站。改 `book-src/` 前依序讀：本檔 → `style-guide.md` → `outline.md`；史實以 `landscape-2026-06.md` 為錨。\n\n## 一、跨章一致性基準（改任一處必照表全書同步）\n\n### 核心命名（全書統一用語，不得各章自創）\n| 概念 | 全書統一說法 | 定調章 |\n|---|---|---|\n| 核心主張 | 「複雜度守恆」——抽象不消滅複雜度、只把偶然複雜度往下搬家；本質複雜度搬不掉；每次搬家在新接縫留一道會漏的縫。**守恆是「眼鏡／預設懷疑」，不是物理定律**（ch01、ch19 都已明標此分寸——改其一須同步另一） | ch01 立、ch19 校準 |\n| 兩條 strand | 「抽象 strand（用什麼蓋）」＋「方法 strand（怎麼蓋）」 | ch01 |\n| 招牌段 | 每章末 `## 複雜度搬去哪了` 結一筆「複雜度帳單」 | 全書 |\n| 本質/偶然複雜度 | Brooks《No Silver Bullet》**1986**（非 1975）的手術刀；偶然可被吸收下沉（對上層像消失、是真進步）、本質搬不掉 | ch10 立、ch08/ch19/ch20 回收 |\n| 抽象洩漏 | Joel Spolsky《The Law of Leaky Abstractions》**2002** | ch19 |\n| 鐘擺 | 四組張力：效能↔生產力、集中↔分散、單體↔微服務、手工↔自動 | ch01 提、全書回收、ch19/ch21 收束 |\n\n### 關鍵年份（一律照 landscape；以下為高頻引用、易記錯者）\n- 儲存程式：EDVAC 報告 1945；Manchester Baby 1948、EDSAC 1949。\n- FORTRAN 1957；LISP 1958–60；ALGOL 60；COBOL 1959–60。\n- Dijkstra GOTO 1968（**標題〈…Considered Harmful〉是編輯 Wirth 改的**；原題〈A Case against the GO TO Statement〉）。\n- Parnas 1972；Unix 1969–71；C ~1972；pipe 1973；K&R 1978。\n- Simula 67；Smalltalk 1970s；C++ 1983 命名；Java 1995。\n- Hoare logic 1969；**Hoare「billion dollar mistake」= QCon London 2009**（非 1980 圖靈獎演說〈The Emperor's Old Clothes〉）。\n- Codd 1970；SQL(SEQUEL) 1974；ACID 一詞 1983。\n- Brooks《人月神話》1975、《No Silver Bullet》**1986**；**Conway's Law 1968 Datamation 刊出（1967 投 HBR 被退稿）**。\n- Royce 1970（**他畫純瀑布圖是當反例、主張迭代「do it twice」**；「waterfall」一詞 Bell & Thayer 1976）。\n- Agile Manifesto 2001（Snowbird, 17 人）；XP 的 C3 專案約 **1993 啟動、Kent Beck 1996 進場**（landscape 原「1995-01」已於 2026-06-13 校正）、1997 上線、2000-02 取消。\n- GNU 1983、FSF 1985、**GPLv1 1989**（三者不同年）；Linux 1991。\n- **WWW 公開 1991-08-06；CERN 釋入公有領域 1993-04-30**（兩個不同里程碑）。\n- **Git 2005-04：起於 4/3、4/7 自我託管、數週內接手 kernel**——**勿寫死「三週」**（ch14 已以「數天自我託管、數週接手 kernel」表述）。\n- AWS S3/EC2 2006；Docker 2013；Kubernetes 2014；DevOpsDays 2009；Google SRE book 2016；GitHub Copilot 預覽 2021／GA 2022。\n\n## 二、脆弱事實清單（引用前必回查 landscape，禁憑記憶；多為「大家記錯的事」）\n1. Royce 瀑布誤讀（ch11 主場）。\n2. Lovelace「第一位程式設計師」歷史學爭議（ch02）。\n3. Hopper A-0「第一個編譯器」分寸＝以現代定義更像 loader/linker（ch03）。\n4. 「Considered Harmful」標題是編輯 Wirth 下的（ch05）。\n5. Kay「OOP=訊息傳遞」引文＝單一原始載體 squeak-dev 1998-10-10 email（ch07，已標 ⚠️）。\n6. Brooks《No Silver Bullet》是 1986、非 1975（ch10/ch19/ch20）。\n7. Conway's Law 1968 刊出（ch10/ch17/ch21）。\n8. Knuth「過早最佳化」完整脈絡含「關鍵 3%」、1989 自歸 Hoare（ch05/ch19）。\n9. Hoare「billion dollar mistake」= QCon London 2009、非圖靈獎演說（ch08）。\n10. Unix「do one thing well」整齊三句版是 Salus 1994 轉述、非 McIlroy 1978 原句（ch06）。\n11. Phil Karlton「兩大難事」確切出處無一手記載、只能「一般歸於」（ch01/ch19）。\n12. **所有 LOC／市佔／金額／營收統計一律標估計、禁斷言**（COBOL 行數、AI coding 數字尤甚）。\n\n## 三、時效性與最須重掃區\n- **landscape §Q（AI 輔助編程 2023–2026）半年內必過期**：ch20 只保留「工具存在性」、零具體數字（市佔／SWE-bench／營收一律禁）。下次掃描重點。\n- 平台工程、agentic coding 工具景觀（ch18/ch20）仍在演化，判斷標 `（2026-06）`。\n\n## 四、結構同步提醒（橫向複製處，最易在局部修訂後悄悄過期）\n- **ch19 全書總帳表**：17 列（ch02–ch18），逐列對應各章 `## 複雜度搬去哪了` 原文。**改任一章的帳單措辭 → 必回頭同步 ch19 該列**。表內「ch10 是空格（不搬、指出本質搬不動）」是全表的錨，勿填。**全書帳單數＝17（ch02–ch18），ch19 內文三處數字與表列數須一致**（已於 2026-06-13 統一為 17）。\n- **ch21 總帳表**：19 列（ch02–ch20）。同上，改任一章帳單須同步。\n- **附錄 A 時間軸「章」欄**：人工判讀的主場章，重排章節或搬動論述後須複核。\n- **附錄 B 人物/術語「首次出現章」**：序章預告詞標 ch01、概念主場另標；搬動內容後複核。\n- **附錄 C 延伸閱讀**：彙整自各章 `## 延伸閱讀`；改章內連結須同步。\n- **路線圖**：7 個 Part 首章（ch01/04/07/10/13/16/19）＋ch21 收官各含一張全書 ASCII 路線圖（基準圖在 outline.md）。改基準圖須同步 8 處；CJK=2 欄對齊。\n\n## 五、改動後必跑\n- 動 ASCII 圖：`python3 ../../../tools/md-reader/check_diagrams.py book-src`（從 `books/software-history/` 執行；CJK=2 欄，exit 0 才算過；**傳目錄非單檔**，單檔會假通過）。\n- 動任何內容：`python3 ../../../tools/md-reader/build_reader.py web/book.config.json` 重新打包；書架有變動先 `python3 ../../../tools/md-reader/build_shelf.py`。\n- 簡體詞 lint 用 Python 逐字元比對（shell grep 對繁簡同形字如 息/硬/境/存/挑 會誤報）。\n- `web/index.html`、專案根 `bookshelf.html` 是產生物，**不要手改**。\n\n## 六、掃描協定（「掃描時效性」＝執行此節）\n1. 逐項對 landscape 的 ⚠️／📌 與本檔「脆弱事實清單」重新查證，優先 §Q 與所有統計數字。\n2. 有修正：更新 landscape → 依本檔基準表同步所有引用章 → ch19/ch21 總帳表 → 附錄 A/B/C → 本檔掃描日誌記一行。**重大修正（推翻既有基準）需兩個獨立來源。**\n3. 可選：用 agy（`agy --model \"Gemini 3.5 Flash (High)\" -p \"...\"`）做結構/論點/教學審查（無網路，不准質疑年份事實）；帶網路的事實 spot-check 由協調者用 WebSearch 做。\n\n## 七、掃描日誌\n- **2026-06-13（建書）**：Opus 4.8 從零寫成 21 章＋3 附錄。landscape 由研究 agent 約 60 次查證建立。P3 一致性：診斷圖 37/0、骨架齊、簡體 lint CLEAN、推演解答層級統一為 `### 推演題N`＋`#### 推演解答`。事實校正 5 項：XP/C3 日期（1995-01→約1993啟動/Beck1996）、Git 時間軸（三週→數天/數週）、補 CERN 1993-04-30 公有領域、補 MapReduce 2004、Hoare QCon 確認 London。清掉 6 章誤入的協調者 meta。P4：agy 結構審（82/100）採納——ch01/ch19 守恆論點加誠實但書（守恆＝眼鏡非物理定律）、ch19 帳單數 18→17 校正、WebSocket/TCP 排障改寫為 thundering herd（技術精確）、ch19 加 AI Infra 鐘擺橋接。協調者 WebSearch 8/8 高風險事實確認無誤（Wirth 標題、Royce do-it-twice、No Silver Bullet 1986、Hoare QCon London 2009、Conway 1968、Git 2005-04、CERN 1993-04-30、Agile 2001 17 人）。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《複雜度守恆：軟體發展史的工程師讀法》\n形態：21 章、七個 Part、3 個附錄。欣賞與直覺書（不是編年帳、不是教科書；純敘事＋紙上思辨，無可執行 lab）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；歷史與時效性事實以 `landscape-2026-06.md` 為錨。\n\n## 全書敘事弧\n\n機器只懂 0 與 1，人腦裝不下複雜度——這條鴻溝就是軟體史的引擎。\n**儲存程式**讓程式變成可操作的資料（ch02）→ 第一層**抽象**：組語與編譯器，把「對機器說話」外包出去（ch03）→ 語言開始有**哲學**：Lisp 的程式即資料 vs Algol 的結構（ch04）→ 程式大到失控，1968 喊出 **software crisis**，方法 strand 正式登場：結構化編程（ch05）→ 怎麼切大程式：**模組化與資訊隱藏**、Unix 的小工具哲學（ch06）→ 抽象的大廈：**OOP** 把資料與行為綁一起（ch07）→ 另一條治複雜度的路：**型別與形式方法**，用「證明」對抗 bug（ch08）→ 被冷落四十年又回來的 **函數式**：不可變如何治並行（ch09）→ 方法 strand 的智慧書：**人月神話**，複雜度的人性面（ch10）→ 流程的兩極：被誤讀的**瀑布**（ch11）與反叛它的**敏捷**（ch12）→ 把資料的複雜度搬給引擎：**關聯模型**（ch13）→ 把所有權與協作重寫：**開源與 Git**（ch14）→ 軟體從盒子搬到伺服器：**網路與 Web**（ch15）→ 再搬到別人的機房：**雲與 IaC**（ch16）→ 拆成很多小服務、用容器封裝：**微服務與 Kubernetes**（ch17）→ 把維運也變成工程：**DevOps 與 SRE**（ch18）→ 回望：每層**抽象都會洩漏**、鐘擺擺回來（ch19）→ 當下：**AI 輔助編程**是第幾次「自動編程」的夢（ch20）→ 總收官：**複雜度守恆**、反覆出現的模式、四十年前的真話為何今天還準（ch21）。\n\n歷史暗線（兩條 strand 交織，不另立章）：\n- **抽象 strand**：機器碼 → 組語 → 高階語言 → 結構/模組 → 物件/型別/函數 → 關聯資料 → 網路服務 → 雲 → 容器 → AI 輔助。\n- **方法 strand**：個人手藝 → 軟體危機自覺 → 結構化紀律 → 人月神話的人性洞察 → 重量級流程（瀑布/CMM）→ 敏捷反叛 → DevOps 融合開發與維運 → SRE 把可靠度工程化 → 平台工程治微服務複雜度。\n兩條反覆**互相觸發**：結構化編程同時是語言事件與方法事件；微服務同時是部署抽象與組織方法（Conway）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n## 跨章基準（一致性掃描的依據；各章不得另創年份與歸屬，一律照 landscape）\n\n**核心隱喻「複雜度帳單」**——每章末的 `## 複雜度搬去哪了` 都要結出一筆帳，全書累積成 ch21 的總帳。基準命名：\n\n| 概念 | 全書統一說法 | 首次定調 |\n|---|---|---|\n| 核心主張 | 「複雜度守恆」：抽象不消滅複雜度、只把它搬家；帳單在抽象洩漏時回來 | ch01 |\n| 兩條 strand | 「抽象 strand（用什麼蓋）」與「方法 strand（怎麼蓋）」 | ch01 |\n| 軟體危機 | 1968 NATO 會議（Garmisch）喊出 software crisis；「software engineering」是會議刻意挑釁的命名 | ch05 |\n| 沒有銀彈 | Brooks 1986《No Silver Bullet》：本質複雜度 vs 偶然複雜度——區分是全書的分析工具 | ch10 |\n| Conway's Law | Conway 1968（Datamation 刊出；1967 投 HBR 被退稿）：系統結構照抄組織溝通結構 | ch10 首次、ch17 回收 |\n| 抽象洩漏 | Joel Spolsky 2002《The Law of Leaky Abstractions》 | ch19 |\n| 鐘擺 | 效能↔生產力、集中↔分散、單體↔分散式、手工↔自動 | ch01 提出、全書回收、ch21 收束 |\n\n**關鍵年份基準（照 landscape，各章引用必須一致；此處為骨架，最終值以 landscape 為準）**：\n- 儲存程式：EDVAC 報告 1945；首台運行 Manchester Baby 1948、EDSAC 1949。\n- FORTRAN 1957（IBM, Backus）；LISP 1958–60（McCarthy）；ALGOL 60；COBOL 1959–60。\n- Dijkstra「Go To … Considered Harmful」1968（CACM；標題是編輯 Wirth 下的）。\n- Parnas 模組分解論文 1972；Unix 1969–71（Thompson/Ritchie）；C ~1972；K&R 1978。\n- Simula 67；Smalltalk 1970s（Kay）；C++ 1983 命名；Java 1995。\n- Hoare logic 1969；Codd 關聯模型 1970；SQL（SEQUEL）1974；ACID 一詞 1983。\n- Brooks《人月神話》1975、《No Silver Bullet》1986；Conway's Law 1968（Datamation；1967 投稿被退）。\n- Royce 瀑布論文 1970（他其實反對純瀑布）；Agile Manifesto 2001。\n- GNU 1983；Linux 1991；Git 2005；WWW 提案 1989／公開 1991。\n- AWS S3/EC2 2006；Docker 2013；Kubernetes 2014；DevOpsDays 2009；Google SRE book 2016。\n- GitHub Copilot 預覽 2021／GA 2022。\n（完整版＋來源 URL＋⚠️ 不確定項，見 landscape-2026-06.md；附錄 A 是總時間軸。）\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀）：\n- 程式語言語法教學、任何「怎麼寫 X」的 how-to（本書講來歷與動機，不教操作）。\n- 硬體史本身（CPU 微架構、摩爾定律的物理細節）——只在「硬體約束逼出軟體形態」時帶到，深入指向延伸閱讀。\n- 純 AI/ML 演算法史（神經網路、Transformer 內部）——ch20 只談「AI 作為寫程式的工具」這一面，模型本身指向讀者書架上的 AI Infra 書。\n- 特定公司商業史八卦（微軟反壟斷案細節、賈伯斯傳記式敘事）——只取與「複雜度/抽象/方法演化」相關的部分。\n- 遊戲史、個人電腦消費史、UI/UX 設計史——除非與兩條 strand 直接相關。\n- 資安史作為獨立主線（只在相關章帶到）。\n\n---\n\n## Part I — 機器與第一層抽象（ch01–03）\n\n### ch01 — 對抗複雜度：軟體史的一條主線（序章）\n- **目標**：讀完能說出本書的讀法——軟體史是「反覆撞上複雜度、用抽象或方法翻越」的故事；能講出「複雜度守恆」與「兩條 strand」兩個全書工具；能畫出全書地圖。\n- **必涵蓋**：開宗明義拋出核心主張（複雜度守恆、抽象只是搬家）；兩條 strand 的定義與它們如何交織；鐘擺隱喻（四組張力）先亮相；全書 ASCII 路線圖（基準圖首次出場）＋全書四條驗收主線（守恆、交織、鐘擺、永恆真話）；用一個讀者熟悉的當代例子當「全書縮影」——例如 ORM：它把 SQL 的複雜度搬到框架裡，N+1 query 與 leaky abstraction 是帳單回來找你（預告 ch13/ch19）。\n- **不涵蓋**：任何具體歷史（從 ch02 開始）；任何結論性判斷（留給 ch21）。\n- **橋接**：你的多層 cache library 全團隊採用——你已經在做「把複雜度搬到一個抽象後面讓別人不用想」這件事，也吃過 cache 失效（cache invalidation，CS 兩大難題之一）的帳單。本書就是這件事的七十年版。\n- **個案（worked example）**：拿讀者自己的 cache library 當顯微鏡，逐項拆解「它消滅了什麼負擔／製造了什麼新負擔（失效、一致性、debug 變難）」，示範全書每章末「複雜度帳單」的記法。\n- **紙上推演**：用「複雜度搬去哪了」拆解你維運過的一個抽象（自選：ORM、message queue、K8s）；把「鐘擺」四組張力各舉一個你親身經歷的例子；口頭講「為什麼說抽象不消滅複雜度只是搬家」給一個資淺工程師聽。\n\n### ch02 — 儲存程式：當程式變成資料\n- **目標**：能講清楚「儲存程式」為什麼是軟體史的第一次大躍遷（程式從接線變成可操作的資料）；能說出在它之前「寫程式」是什麼樣子；能擺正 Lovelace/圖靈/馮紐曼各自的真實貢獻與歷史學爭議。\n- **必涵蓋**：Babbage 分析機與 Lovelace 的 Note G（Bernoulli 數）——「第一位程式設計師」標籤的歷史學爭議照 landscape，誠實呈現兩種觀點；圖靈 1936《On Computable Numbers》與「可計算」的邊界（圖靈機是思想實驗、不是機器）；ENIAC（1945–46）怎麼「編程」——接線與插板、ENIAC Six 女程式設計師；**儲存程式概念**：EDVAC 報告（1945，馮紐曼署名與 Eckert/Mauchly 的功勞爭議照 landscape）、首台運行機（Manchester Baby 1948／EDSAC 1949）；為什麼「程式與資料放同一個記憶體」是關鍵——程式變成可被程式操作的東西（編譯器、直譯器、後來的一切都靠這個前提）。\n- **不涵蓋**：編譯器（ch03）；圖靈機的數學細節（指向延伸閱讀）；硬體電路細節；二戰密碼學史（一句話帶過）。\n- **橋接**：你部署的每個 container image 都是「資料」，跑起來才是「程式」——code as data 是你天天依賴卻不會注意的前提；自我修改的部署腳本、用程式產生程式（codegen、你的 OpenAPI→client 生成）都站在 1945 這個概念上。\n- **個案**：ENIAC 改算一道新題目要重接幾天的線 vs 儲存程式機器只要載入新指令——把「換工作 = 換資料 vs 換接線」對比攤開，講清楚這一跳省掉的是什麼複雜度。\n- **紙上推演**：解釋「為什麼說圖靈機不是一台機器」給一個只聽過『圖靈』的人；反事實：如果程式與資料分屬不同記憶體（哈佛架構極端版），編譯器還可能出現嗎；找出「Lovelace 是第一位程式設計師」這句話需要加上哪些但書。\n\n### ch03 — 編譯器的賭注：把「對機器說話」外包\n- **目標**：能講出從機器碼→組語→高階語言的兩跳各自外包掉什麼；能重講 FORTRAN「自動編程」的賭注（機器產生的碼能不能跟人手寫的一樣快）——這是「效能 vs 生產力」鐘擺的第一次擺動；能擺正 Hopper「第一個編譯器」的歷史學分寸。\n- **必涵蓋**：機器碼的痛（位址全手算、改一行牽動全部）；**組語與組譯器**：符號取代數字，第一次「不直接對機器說話」（Wilkes/EDSAC 的 initial orders）；**Grace Hopper 與 A-0（1952）**——「第一個編譯器」的說法照 landscape 校準（A-0 以現代定義更像 loader/linker）、FLOW-MATIC 對 COBOL 的影響；飛蛾 bug（1947）標明為流傳故事；**FORTRAN（1957，Backus，IBM）**：「automatic programming」的賭注、當年程式設計師對「編譯器寫的碼會不會慢」的真實懷疑、Backus 為什麼做它（程式設計成本已超過機器成本）；這一跳定調全書反覆出現的「效能↔生產力」鐘擺。\n- **不涵蓋**：編譯器原理（lexer/parser/codegen 細節——指向延伸閱讀）；語言設計哲學（ch04）；型別（ch08）。\n- **橋接**：你寫 TypeScript 由 tsc 編譯成 JS、再被 V8 JIT——你每天信任「機器產生的碼夠快」，這份信任始於 1957 的賭注；你選 NestJS（生產力）而非手寫 C（效能）就是在這條鐘擺上選邊。\n- **個案**：FORTRAN 編譯器團隊為了讓產出碼夠快下的苦工（最佳化是 FORTRAN 被接受的關鍵）——「為了贏得『生產力不必犧牲效能』這場賭，他們做了什麼」。\n- **紙上推演**：把「組語→高階語言」這一跳用你熟的「手寫 SQL→ORM」類比並指出類比在哪裡會破；口頭講 FORTRAN 的賭注與你選框架的取捨是同一條鐘擺；查證題：說清楚為什麼 Hopper 的 A-0「是不是第一個編譯器」取決於你怎麼定義編譯器。\n\n## Part II — 語言的哲學與第一次危機（ch04–06）\n\n### ch04 — Lisp 與 Algol：語言開始有哲學\n- **目標**：能講出 Lisp（程式即資料）與 Algol（結構化、語言的語言）兩條血脈各自的世界觀，以及它們為什麼至今還在影響你用的語言；能說出 GC、遞迴、BNF 這些「現在理所當然」的東西當年是發明。\n- **必涵蓋**：**LISP（McCarthy, 1958–60）**：程式即資料（homoiconicity）、遞迴、garbage collection 的誕生、AI 實驗室脈絡、eval 被 Steve Russell 手工編成機器碼的故事（照 landscape）；**ALGOL 60**：block structure、BNF（Backus-Naur Form）、「一個遠超時代的語言」（Hoare 名言照 landscape 查證）、它如何成為後世語言（C/Pascal/Java…）的共同祖先；**COBOL（1959–60）**：另一極——為商業可讀性設計、Hopper 的影響、為什麼它活了 60 年（不是因為好，是因為遷移成本＝複雜度搬不動）；三條路線（Lisp 的數學/AI、Algol 的結構、COBOL 的商業）定義了語言設計的價值光譜。\n- **不涵蓋**：函數式編程的完整故事（ch09）；OOP（ch07）；型別系統（ch08）；語言語法教學。\n- **橋接**：你的 JS 是「Algol 後裔（C 系語法）裝了 Lisp 的靈魂（first-class function、closure、GC）」——你天天在用兩條血脈的混血；你信賴 GC 不手動管記憶體，這個奢侈始於 Lisp。\n- **個案**：garbage collection 的誕生——McCarthy 為了讓 Lisp 能自由配置 cons cell 而發明自動記憶體回收，把「記得 free」這個複雜度永久搬給 runtime（帳單：GC pause、你調過的 Node.js 堆積記憶體）。\n- **紙上推演**：把「程式即資料」對應到你寫過的 codegen／用 AST 操作程式碼的經驗；解釋「為什麼 COBOL 還沒死」用複雜度搬不動來論證；反事實：如果 Algol 沒發明 BNF，描述語言語法會變多難。\n\n### ch05 — 軟體危機與結構化編程：方法 strand 登場\n- **目標**：能講清楚 1968 為什麼喊出「軟體危機」、它撞的是哪一面複雜度的牆（程式大到一個人腦裝不下）；能重講 Dijkstra 反 GOTO 的真正論點（不是「GOTO 邪惡」而是「人腦追不上跳來跳去的控制流」）；能說出這是方法 strand 第一次正式登場。\n- **必涵蓋**：**1968 NATO 會議（Garmisch）**：software crisis 一詞、「software engineering」是刻意挑釁的命名（照 landscape）；當年的痛——大型系統（如後來的 OS/360）超支、延遲、不可靠；**Dijkstra「Go To Statement Considered Harmful」（1968）**：標題是編輯 Wirth 下的（照 landscape）、真正論點是「靜態程式文本與動態執行過程的差距」；結構化編程（Böhm-Jacopini 定理 1966：三種控制結構足夠）；Dijkstra 名言查證版（「測試只能證明 bug 存在、不能證明不存在」「簡單是可靠的前提」）；為什麼這同時是語言事件（控制結構）與方法事件（紀律）——兩條 strand 第一次明顯交織。\n- **不涵蓋**：模組化（ch06）；形式方法的深入（ch08）；OOP（ch07）；具體語言語法。\n- **橋接**：你做 code review 時要求別人別寫巢狀地獄、早 return、控制圈複雜度——你執行的就是結構化編程的紀律；你讀別人的 async 控制流追不上時的痛，正是 Dijkstra 說的「靜態文本 vs 動態過程」。\n- **個案**：把一段 GOTO 義大利麵程式 vs 結構化版本攤開（ASCII 控制流圖），講清楚「為什麼後者人腦追得上」——不是美學，是人類工作記憶的容量限制。\n- **紙上推演**：用「人腦工作記憶容量」解釋為什麼結構化編程是對複雜度的回應；找出「Dijkstra 說 GOTO 邪惡」這個流行說法錯在哪；對帳：你的 lint 規則（max-depth、complexity）哪幾條是結構化編程的後裔。\n\n### ch06 — 模組化與 Unix：怎麼切一個大程式\n- **目標**：能講出 Parnas「資訊隱藏」的原始洞見（模組該照「藏住什麼決策」切，不是照流程切）；能講出 Unix 哲學（小工具、組合、可移植）如何成為你今天微服務/pipeline 的祖宗；能區分「分解」的好壞標準。\n- **必涵蓋**：**Parnas 1972《On the Criteria To Be Used in Decomposing Systems into Modules》**：資訊隱藏、模組邊界該包住「最可能改變的設計決策」——而不是照處理步驟切（這個洞見今天仍被違反）；separation of concerns（Dijkstra 用語）；**Unix（Thompson/Ritchie, 1969–71）**＋**C（~1972）**：可移植性（用高階語言寫 OS 是賭注）、**Unix 哲學**（McIlroy：寫只做一件事並做好的程式、讓程式協作——pipe 1973，引文照 landscape）；K&R（1978）；為什麼「小工具用 pipe 組合」是抽象與方法的雙重遺產。\n- **不涵蓋**：OOP 的封裝（ch07，明寫 OOP 是資訊隱藏的另一條實作路線）；微服務（ch17，明寫是 Unix 哲學的分散式版）；作業系統內部原理。\n- **橋接**：你切微服務邊界時在做 Parnas 的事——按「會一起改變的東西」分而不是按 CRUD 步驟分（切錯就是分散式單體）；你的 FluentBit+Lua pipeline 就是 Unix「小工具 pipe 組合」哲學的現代轉世。\n- **個案**：Parnas 的 KWIC 索引例子——同一個程式用「照流程切」vs「照資訊隱藏切」兩種分解，當需求變時哪一種要改得少；把這個 1972 的例子對應到你切錯微服務邊界的痛。\n- **紙上推演**：用資訊隱藏原則檢驗你切過的一個服務邊界（切對了嗎、藏住了哪個會變的決策）；解釋「Unix pipe」與「微服務 + message queue」在哲學上是同一件事、在複雜度上差在哪；反事實：如果 Unix 當年用組語而非 C 寫，可移植性與後續影響會怎樣。\n\n## Part III — 抽象的大廈：物件、型別、函數（ch07–09）\n\n### ch07 — 物件導向：把資料與行為綁在一起\n- **目標**：能講出 OOP 在解什麼複雜度（大系統裡資料與操作散落各處）、它的原意（Kay 的訊息傳遞）與它後來被簡化成什麼（class/繼承）；能評價繼承為什麼從銀彈變成要小心的東西。\n- **必涵蓋**：**Simula 67**（Dahl & Nygaard）：為模擬而生、class/object 概念的起源；**Smalltalk**（Kay/Ingalls/Goldberg, Xerox PARC, 1970s）：Kay 造詞「object-oriented」、**他後來說原意是訊息傳遞不是 class**（引文照 landscape）；**C++（Stroustrup, 1983 命名）**把 OOP 帶進主流效能語言、**Java（1995）**「write once run anywhere」與 JVM；OOP 解的複雜度＝封裝（資訊隱藏的另一條路，回收 ch06）＋多型；帳單：繼承的脆弱（fragile base class）、「組合優於繼承」的反省、企業級 OOP 的過度設計（AbstractFactoryFactory 之譏）。\n- **不涵蓋**：設計模式目錄（一句話＋延伸閱讀 GoF）；型別系統（ch08）；FP 對 OOP 的批評（ch09）；語法教學。\n- **橋接**：你寫 NestJS 的 service/controller/module、用 DI——這是 OOP 企業化的直系後代；你選「組合優於繼承」、用 interface 而非深繼承樹，是在還 OOP 早期的複雜度帳單。\n- **個案**：Alan Kay 的訊息傳遞原意 vs 業界落地的 class 中心 OOP——把「Kay 想要的（像細胞間傳訊的生物系統）」與「我們得到的（Java 的 class 階層）」攤開，講清楚一個好點子在規模化落地時如何被複雜度改形。\n- **紙上推演**：用「訊息傳遞」原意解釋為什麼 actor model／微服務比 class 繼承更接近 Kay 的願景；舉一個你看過/寫過的繼承濫用並說明組合會怎麼修；解釋「封裝」與 ch06 資訊隱藏的血緣。\n\n### ch08 — 型別與形式方法：用證明對抗 bug\n- **目標**：能講出「靜態型別」與「形式驗證」是同一種衝動（在執行前就排除一類錯誤）的不同強度；能擺正型別之爭（靜態 vs 動態）的真實 trade-off；能講出形式方法的理想為何沒成為主流、又在哪裡活著。\n- **必涵蓋**：**Hoare logic（1969）**：用前後條件「證明」程式正確的理想；**Hoare 的「billion dollar mistake」**（null reference，ALGOL W 1965，引文照 landscape）；型別系統的演化：從 Algol 的型別到 **ML 與 Hindley-Milner 型別推論**（Milner, 1970s）——「型別檢查器是最普及的形式方法」；靜態 vs 動態之爭的真實 trade-off（早抓錯 vs 開發速度，回收 ch03 效能↔生產力鐘擺的變體）；形式驗證為什麼留在高成本領域（航太、晶片、協定）而非主流——成本帳；**一句話接書架上的 TLA+ 書**（不依賴）。\n- **不涵蓋**：型別理論細節（System F、dependent types 指向延伸閱讀）；TLA+ 教學（書架另有書）；測試方法（ch12 的 TDD）。\n- **橋接**：你從 JS 轉 TypeScript 就是在這條歷史上選邊——用編譯期型別換執行期驚嚇；你寫的 `strictNullChecks` 正是在補 Hoare 說的十億美元錯誤；你用 OpenAPI schema 當「輕量形式規格」強制 CI 同步。\n- **個案**：null 的十億美元錯誤——Hoare 1965 為了「方便」加入 null reference，四十年後在台上道歉；把「一個圖方便的設計決策如何變成全球性的複雜度負擔」攤開，對應你被 `undefined is not a function` 坑過的每一次。\n- **紙上推演**：用「複雜度搬家」解釋 TypeScript 把什麼負擔從執行期搬到開發期（帳單是什麼）；解釋為什麼形式驗證沒有取代測試（成本/本質複雜度，預告 ch10 沒有銀彈）；對帳：你的 OpenAPI/型別 schema 算不算一種形式方法。\n\n### ch09 — 函數式的回歸：被冷落四十年的答案\n- **目標**：能講出 FP 從 Lisp/lambda calculus 出發、被主流冷落、又在 2010 年代回歸的因果（多核心讓不可變變值錢）；能講出純函數/不可變如何治並行的複雜度；能把它接回你的冪等與最終一致性直覺。\n- **必涵蓋**：**lambda calculus（Church, 1930s）**作為計算的另一個理論根；FP 的潛流（Lisp→ML→**Haskell, 1990**，惰性純函數）；為什麼主流冷落它四十年（硬體、心智模型、效能）；**回歸的觸發：多核心**——「免費的午餐結束了」（Herb Sutter, 2005，照 landscape）、時脈不再自動變快、平行化變成必修，而**不可變資料天生對並行友善**（沒有共享可變狀態就沒有 race condition）；map/reduce、純函數、不可變如何進入主流語言（你的 JS 的 `map/filter/reduce`、React 的不可變狀態、Rust 的 ownership 借鏡）。\n- **不涵蓋**：monad/category theory 教學（一句話＋延伸閱讀）；Haskell 語法；並行理論細節（讀者書架上有 queueing 書談排隊、TLA+ 書談並行正確性——可一句話接，不依賴）。\n- **橋接**：你靠冪等消費者、無共享狀態、最終一致性處理 SQS 訊息——你已經在用 FP 的核心直覺（不可變 + 純粹 = 可重試、可平行）；你的 SQS 結算 pipeline 之所以能安全重試，正因為它逼近純函數。\n- **個案**：「免費的午餐結束了」（2005）——時脈撞牆、核心數開始長，於是「如何安全地用多核」變成全產業問題，而四十年前 Lisp 就給的答案（不可變）突然變值錢；把這個「老答案等到問題出現才被需要」的模式攤開（呼應 ch21 鐘擺）。\n- **紙上推演**：用「無共享可變狀態」解釋為什麼你的冪等消費者可以安全平行重試；解釋「為什麼 FP 等到 2005 才紅」用硬體鐘擺論證；對帳：你的程式裡哪些地方其實是純函數、哪些是被可變狀態汙染的麻煩來源。\n\n## Part IV — 流程的戰爭：方法 strand 的高潮（ch10–12）\n\n### ch10 — 人月神話：複雜度的人性面\n- **目標**：能重講 Brooks 的核心洞見（軟體的本質複雜度無法靠加人/加工具消除）；能講清楚 Brooks's Law、概念完整性、本質 vs 偶然複雜度（沒有銀彈）這三件全書級的分析工具；能講 Conway's Law 並預告它在微服務的回收。\n- **必涵蓋**：**Brooks《人月神話》（1975）**＋ OS/360 的脈絡；**Brooks's Law**（加人到遲到的專案讓它更遲到——溝通成本 O(n²)、ramp-up 時間）；**概念完整性**（一致的設計願景比功能堆疊重要）；**《No Silver Bullet》（1986）**：**本質複雜度 vs 偶然複雜度**——工具只能砍偶然複雜度、本質複雜度砍不掉（這是全書反覆用的手術刀，回收到 ch08 形式方法、ch19 抽象洩漏、ch20 AI）；**Conway's Law（1968 Datamation 刊出；1967 投稿被退）**：系統結構＝組織溝通結構（照 landscape）；為什麼這些 1960–80 年代的話今天還準——它們講的是人與複雜度，不是技術。\n- **不涵蓋**：瀑布（ch11）；敏捷（ch12）；具體估算方法；Conway 在微服務的展開（ch17）。\n- **橋接**：你帶過 greenfield 專案、訂過團隊慣例——你親身驗過「加人不是線性加速」「沒有一致願景的 codebase 會分裂」；你的微服務邊界往往照團隊邊界長（Conway），切錯就是組織問題偽裝成技術問題。\n- **個案**：OS/360 的延遲與 Brooks 的反省——把「為什麼加更多程式設計師反而更慢」用溝通路徑數 O(n²) 與新人 ramp-up 攤開算一遍（具體數字示意），講清楚這是數學不是管理失誤。\n- **紙上推演**：用本質 vs 偶然複雜度分類你最近一個專案的難點（哪些是工具能救的、哪些不能）；用 O(n²) 溝通成本解釋一次你經歷的「加人沒加速」；預測：你切過的某個服務邊界是不是 Conway's Law 的產物。\n\n### ch11 — 瀑布：一個被讀反的模型\n- **目標**：能講出瀑布的歷史真相（Royce 1970 其實畫它是為了說「這樣不行、要迭代」）；能講出重量級流程（瀑布/CMM）在解什麼複雜度（協調大團隊、可稽核）、它的帳單是什麼；能公平評價它（不是純粹的笑話）。\n- **必涵蓋**：**Royce 1970《Managing the Development of Large Software Systems》**：他畫出純瀑布圖是當作**有缺陷的起點**、主張迭代與原型（照 landscape，這是全書最重要的「大家讀反了」案例）；「waterfall」一詞與純瀑布的刻板印象是後人貼的（Bell & Thayer 1976 等）；重量級流程為什麼興起——大型國防/企業專案需要可預測、可稽核、可分工（**CMM/CMMI**, Humphrey, SEI）；它的帳單：對需求不確定性脆弱、回饋太慢、文件成為目的本身；公平話：在需求真的穩定、變更成本真的高（航太、醫療）的領域，重流程不是錯。\n- **不涵蓋**：敏捷（ch12，明寫是對重量級的反叛）；具體 CMM 等級細節；專案管理工具。\n- **橋接**：你做 greenfield 時也得先定 API 契約（OpenAPI）再並行開發——這是「先設計後實作」的瀑布基因的合理殘留；你在強監管 B2B 場景感受過「為什麼有些地方真的需要文件與簽核」。\n- **個案**：Royce 論文的真實內容——逐段攤開他畫純瀑布圖之後緊接著說「這行不通，所以要…」，對比後世只截了那張圖當聖經；這是「一個想法被斷章取義五十年」的活標本。\n- **紙上推演**：用 Royce 的原意解釋「瀑布 vs 敏捷」這個對立其實有多大成分是稻草人；找出你工作中哪些環節「瀑布式（先定契約）」其實是對的、為什麼；反事實：如果需求永遠不變，敏捷還有優勢嗎。\n\n### ch12 — 敏捷：對重量級流程的反叛\n- **目標**：能講出敏捷在反叛什麼（重量級流程對變化的脆弱）、它的核心賭注（用短迴圈擁抱變化而非預測變化）；能擺正敏捷的理想 vs 它被企業收編後的變形；能把 TDD/CI/重構接回你的日常。\n- **必涵蓋**：**Agile Manifesto（2001, Snowbird）**：四個價值、十七人脈絡；前史——**XP（Kent Beck, 1996–99, Chrysler C3）**、**Scrum（Schwaber/Sutherland, ~1995；根在 Takeuchi & Nonaka 1986）**；配套實踐：**TDD（Beck）**、**重構（Fowler 1999）**、**持續整合（Booch 造詞、XP 推廣）**——它們如何把「擁抱變化」變成可操作的紀律；敏捷的複雜度策略＝把「需求不確定性」這個本質複雜度用短回饋迴圈馴服（不是消滅）；帳單：敏捷被企業收編成「Scrum 儀式劇場」、velocity 變成績效棒子、與原始宣言的背離。\n- **不涵蓋**：DevOps（ch18，明寫是敏捷往維運的延伸）；具體 Scrum 儀式 how-to；專案管理工具。\n- **橋接**：你做 CI 強制 OpenAPI 同步、寫測試、重構——你執行的是敏捷技術實踐的直系後代；你大概也經歷過「敏捷變成每天站會報進度」的儀式化走味。\n- **個案**：XP 的 C3 專案——把「為什麼一群人在 1990 年代末決定反叛重流程、他們具體改了什麼（短迭代、結對、測試先行）」攤開，講清楚敏捷不是「不寫文件」而是「把賭注從預測改成適應」。\n- **紙上推演**：用「擁抱變化 vs 預測變化」解釋敏捷與瀑布的根本分歧（不是文件多寡）；診斷你經歷過的一次「假敏捷」走味在哪、背離了宣言哪一條；對帳：你的 CI/CD pipeline 實現了敏捷宣言的哪些主張。\n\n## Part V — 資料、開源與網路（ch13–15）\n\n### ch13 — 關聯模型：把資料的複雜度搬給引擎\n- **目標**：能講出 Codd 關聯模型的抽象勝利（用宣告式查詢把「怎麼存取」的複雜度搬給資料庫引擎）；能講出 SQL/ACID 的歷史與它們解的複雜度；能講 NoSQL 的反動是在還哪一筆帳（規模 vs 一致性，CAP）。\n- **必涵蓋**：前關聯時代的痛（階層式/網狀資料庫，存取路徑寫死在程式裡）；**Codd 1970《A Relational Model of Data》**：關聯代數、**資料獨立性**——你說要什麼（宣告式）、引擎決定怎麼拿（查詢最佳化器）；System R / Ingres、**SQL（SEQUEL, Chamberlin & Boyce, 1974）**；**ACID（一詞 1983，概念源於 Jim Gray）**把交易的複雜度標準化；**NoSQL 反動（~2009；Google Bigtable 2006、Amazon Dynamo 2007）**＋**CAP（Brewer 2000 猜想、Gilbert-Lynch 2002 證明）**：規模逼迫放棄強一致——鐘擺從「引擎包辦一切」擺回「應用自己處理一致性」。\n- **不涵蓋**：SQL 語法教學；查詢最佳化器內部（指向延伸閱讀）；分散式一致性協定細節（讀者書架上 TLA+/queueing 書可一句話接）；NewSQL 深入（一句話）。\n- **橋接**：你天天寫 SQL、調 index、處理 isolation 與 deadlock、用 read replica 與 partition——你站在 Codd 的肩膀上享受「資料獨立性」這個奢侈；你選 Redis/NoSQL 處理某些負載就是在 CAP 上選邊、自己扛一致性。\n- **個案**：宣告式的勝利——同一個查詢，前關聯時代要在程式裡手寫存取路徑與走訪迴圈，關聯時代只要一句 `SELECT … WHERE … JOIN`，引擎的最佳化器決定其餘；把「Codd 把什麼複雜度搬給引擎、帳單在哪（N+1、慢查詢、最佳化器猜錯）」攤開，回收 ch01 的 ORM 縮影。\n- **紙上推演**：用「資料獨立性」解釋為什麼你能換 index 而不改應用程式碼（複雜度搬給了誰）；用 CAP 解釋你某次選 NoSQL/Redis 的取捨（放棄了什麼換了什麼）；對帳：N+1 query 是哪一層抽象的洩漏（接 ch19）。\n\n### ch14 — 開源與 Git：重寫所有權與協作\n- **目標**：能講出自由軟體/開源如何把軟體的「所有權與協作模式」重寫（從私有到公共財）；能講 Git 的分散式版控如何解協作的複雜度；能擺正「自由軟體 vs 開源」的理念差異。\n- **必涵蓋**：**GNU（Stallman, 1983）＋GPL＋FSF（1985）**：「free as in freedom」、copyleft 的法律駭客；**Linux（Torvalds, 1991）**作為開源協作的證明；**《The Cathedral and the Bazaar》（Raymond, 1997）**：大教堂式 vs 市集式開發；**「open source」一詞（1998, OSI）**與它和「自由軟體」的理念分歧（務實 vs 理想）；版本控制的演化：CVS→SVN（集中式）→**Git（Torvalds, 2005, BitKeeper 爭議觸發、極短時間內成形——數天內自我託管、數週內接手 kernel；勿寫死「三週」）**：分散式、便宜分支、merge——把「多人協作的複雜度」用內容定址與 DAG 重新組織；GitHub 如何把開源變成社交。\n- **不涵蓋**：Git 內部物件模型細節（指向延伸閱讀）；授權條款法律細節；具體 Git 指令教學（讀者已精通）。\n- **橋接**：你每天 commit/branch/merge、用個人 GitHub 帳號累積足跡、靠開源 vLLM/llm-d 生態——你活在 Stallman 與 Torvalds 重寫的世界裡；你的 PR-based 協作就是市集模式的日常。\n- **個案**：Git 的誕生——BitKeeper 撤回免費授權後，Torvalds 在極短時間內（一手 commit 紀錄：數天內自我託管、數週內接手 kernel）為了 Linux 核心的協作規模寫出 Git，核心設計（內容定址、便宜分支）如何直接回應「上千人併行改一個 codebase」的複雜度；把「協作複雜度如何逼出一個資料結構」攤開。\n- **紙上推演**：用「複雜度搬家」解釋 Git 把什麼從集中式伺服器搬到每個人的本機（帳單是什麼）；解釋「自由軟體」與「開源」的理念差異為什麼不只是用詞；反事實：如果沒有便宜的分支與 merge，PR 工作流還可能存在嗎。\n\n### ch15 — 網路與 Web：軟體從盒子搬到伺服器\n- **目標**：能講出軟體交付形態的根本轉變（從「裝在使用者機器」到「跑在我們的伺服器」）如何改變一切；能講 Web 的開放標準如何成為史上最大的應用平台；能把這條線接到你的 B2B/B2C 服務。\n- **必涵蓋**：底層：ARPANET（1969）、**TCP/IP（Cerf & Kahn, 1974 論文、1983 cutover）**——封包交換把網路的複雜度標準化；**WWW（Berners-Lee, CERN, 1989 提案／1991 公開）**：HTTP/HTML/URL 三件套、開放標準的決定性（沒有專利）；瀏覽器戰爭（Netscape vs IE）與標準的代價；**LAMP** 與動態網站；**Web 2.0（O'Reilly, ~2004）＋AJAX（一詞 2005）**：瀏覽器從文件檢視器變成應用平台；交付形態轉變的後果——更新不再靠寄光碟、複雜度從用戶端搬到伺服器端（你要為所有人維運）。\n- **不涵蓋**：HTTP 協定細節（指向延伸閱讀）；前端框架史（一句話）；雲（ch16，明寫是「伺服器搬到別人機房」的下一跳）。\n- **橋接**：你做的 B2B/B2C 資料中介、REST API、WebSocket 即時系統——全都站在「軟體跑在伺服器、用戶端只是窗口」這個轉變上；你維運的痛（為所有用戶的可用性負責）正是這次複雜度搬家的帳單。\n- **個案**：開放標準的決定性——Web 贏過當年各種專有的線上服務（如 AOL 圍牆花園），關鍵是 HTTP/HTML 無專利、任何人可實作；把「為什麼開放標準擊敗封閉平台」與「複雜度/控制權的分配」攤開。\n- **紙上推演**：用「複雜度搬到伺服器端」解釋為什麼 SaaS 能持續更新而盒裝軟體不能（帳單：你要 24/7 維運）；解釋開放標準為何擊敗圍牆花園（接 ch14 開源的所有權主題）；對帳：你的即時系統（WebSocket）解的是哪一類「網路的複雜度」。\n\n## Part VI — 雲與分散式：複雜度再次搬家（ch16–18）\n\n### ch16 — 從伺服器到雲：基礎設施變成程式碼\n- **目標**：能講出雲的本質轉變（把機房的複雜度搬給別人、按用量計費）；能講 IaaS/PaaS/SaaS 的分層各搬走哪一層複雜度；能講 IaC 如何把基礎設施也納入軟體工程。\n- **必涵蓋**：虛擬化前史（IBM CP/CMS 1960s、VMware 1998、Xen 2003）——一台機器假裝成多台；**AWS（S3/EC2, 2006）**：把資本支出變營運支出、把「買機器、進機房、接網路」的複雜度整包外包；**IaaS/PaaS/SaaS 分層**（各層把「你不用管什麼」往上推）；**Infrastructure as Code**（CFEngine 1993→Puppet 2005→Chef 2009→**Terraform 2014**）：基礎設施從手動點擊變成版本控制下的程式碼——可重現、可審查、可回溯；雲的帳單：抽象洩漏（網路分區、冷啟動、供應商鎖定）、成本失控、「別人的電腦」的信任問題。\n- **不涵蓋**：特定雲服務 how-to（讀者已精通 ECS/Lambda/RDS）；容器（ch17）；微服務（ch17）；K8s（ch17）。\n- **橋接**：你用 CloudFormation 定義基礎設施、用 ECS/Lambda/RDS/SQS——你完全活在「基礎設施即程式碼、機房是別人的」這個世界；你調過的冷啟動、踩過的供應商相依，就是雲抽象的洩漏帳單。\n- **個案**：AWS 2006 的轉折——亞馬遜把自己的內部基礎設施對外開放成 API（S3/EC2），把「擁有並維運機房」這個巨大複雜度變成一行 API 呼叫；把「資本支出→營運支出、所有權→租用」的轉變與它的帳單（鎖定、信任、成本）攤開。\n- **紙上推演**：用 IaaS/PaaS/SaaS 分層說明你的某個系統「把哪幾層複雜度外包、自己留哪幾層」；用「複雜度搬家」解釋 serverless（Lambda）把什麼搬走、帳單是什麼（冷啟動、可觀測性變難）；對帳：你的 CloudFormation 算不算 ch11「先設計」基因的回歸。\n\n### ch17 — 微服務與容器：把單體拆散再封裝\n- **目標**：能講出微服務在解什麼複雜度（大團隊在單體上互相踩腳）、它把複雜度搬去哪（從程式內搬到網路上）；能講容器/K8s 如何成為這個分散式世界的作業系統；能用 Conway's Law 解釋微服務的組織本質。\n- **必涵蓋**：SOA 的前身與教訓；**微服務（一詞 ~2011–14；Lewis & Fowler 2014；Netflix 早期實踐）**：按業務能力切、獨立部署、團隊自治——解的是「大團隊在單體上協調」的複雜度；**容器：Docker（2013, Hykes）**＋cgroups/LXC 血脈（Google cgroups 2007）——把「在我機器上能跑」的複雜度封進 image（回收 ch02 code as data）；**Kubernetes（Google, 2014, 血脈 Borg）＋CNCF（2015）**：分散式系統的作業系統、宣告式調度（回收 ch13 宣告式）；**Conway's Law 回收（ch10）**：微服務本質是把組織結構固化成系統結構；帳單：複雜度從「程式內的函式呼叫」搬到「網路上的分散式系統」——你現在要面對網路分區、分散式交易、可觀測性、最終一致性（這正是讀者 AI Infra 之路的核心，一句話接 ch18 與書架 AI Infra 書）。\n- **不涵蓋**：K8s 操作 how-to（讀者學習中、書架另有 AI Infra 書）；service mesh 細節（一句話）；分散式一致性協定（書架 TLA+ 書）；DevOps/SRE（ch18）。\n- **橋接**：你做 AWS ECS 上的 TypeScript/NestJS 微服務、處理服務間的最終一致性與冪等——你天天在付微服務把複雜度搬上網路的帳單；你切的服務邊界往往照團隊邊界（Conway 活生生）。\n- **個案**：「在我機器上能跑」問題的終結——Docker 如何把執行環境連同程式打包成不可變 image（呼應 ch02 程式即資料），把環境差異的複雜度一次搬走；再攤開它製造的新複雜度（image 體積、編排、網路），講清楚這是搬家不是消滅。\n- **紙上推演**：用「複雜度從程式內搬到網路上」列出微服務讓你多付的三筆帳（網路、一致性、可觀測性）；用 Conway's Law 解釋你某次服務拆分的真正驅動力是技術還是組織；解釋容器 image 與 ch02 儲存程式的血緣。\n\n### ch18 — DevOps 與 SRE：把維運變成工程\n- **目標**：能講出 DevOps 在彌合什麼裂縫（開發丟給維運的牆）、SRE 如何把可靠度變成可量化工程（SLO/error budget）；能講平台工程為何作為對微服務複雜度的回應而興起；能把這條線接到你的可觀測性實戰與 AI Infra 之路。\n- **必涵蓋**：開發 vs 維運的傳統對立（「丟過牆」）；**DevOps（一詞 ~2009, Debois, DevOpsDays Ghent）**＋**持續交付（Humble & Farley, 2010）**＋《The Phoenix Project》（2013）：把開發與維運融合、自動化部署流水線（敏捷往維運的延伸，回收 ch12）；**Google SRE（Treynor, ~2003；SRE book 2016）**：用軟體工程方法做維運、**SLO/SLI/error budget**——把「多可靠才夠」變成可談判的數字（可靠度的本質複雜度用工程紀律馴服，回收 ch10）；可觀測性（metrics/logs/traces）的興起；**平台工程（~2020s, 內部開發者平台, Team Topologies 2019）**作為對「每個團隊都要懂全套微服務維運」這個複雜度爆炸的回應——把維運複雜度再搬到一個平台抽象後面（鐘擺：又一次集中化）。\n- **不涵蓋**：特定監控工具 how-to（讀者精通 CloudWatch/FluentBit）；K8s 細節（ch17）；具體 SLO 計算（一句話＋指向 SRE book）。\n- **橋接**：你自建 FluentBit+Lua 可觀測性 pipeline（供 Nexon 用）、設計 metric、做 event-driven 結算——你已經是在實踐 SRE 的可觀測性與自動化；你的 AI Infra 目標（讓大模型跑得穩、快、省）本質就是 SRE+平台工程在 LLM serving 上的應用（一句話接書架 AI Infra 書）。\n- **個案**：error budget 的發明——Google SRE 如何用「允許的不可靠額度」化解開發（要快上線）與維運（要穩）的永恆衝突，把一場立場之爭變成一個共享的數字；把「可靠度如何從信仰變成可談判的工程量」攤開。\n- **紙上推演**：用 error budget 重新框架你經歷過的一次「上線 vs 穩定」衝突；解釋平台工程是 ch16 雲抽象之上的「再一層抽象」、它把什麼複雜度搬走（帳單是什麼）；對帳：你的 FluentBit pipeline 對應 SRE 三本柱（metrics/logs/traces）的哪一根。\n\n## Part VII — 當下與回望（ch19–21）\n\n### ch19 — 抽象會洩漏：鐘擺擺回來\n- **目標**：能講出「所有重大抽象都會洩漏」這條定律（Joel 2002）與它為什麼是複雜度守恆的必然；能用全書累積的帳單盤點鐘擺的每一次回擺；能講出「為什麼我們週期性地回到底層」。\n- **必涵蓋**：**Joel Spolsky《The Law of Leaky Abstractions》（2002）**：TCP/SQL/ORM/網路檔案——抽象在邊緣總會漏出底層細節（回收 ch13 N+1、ch16 雲的網路分區、ch08 型別）；**本質 vs 偶然複雜度回收（ch10）**：抽象只能藏偶然複雜度，本質複雜度終究漏回來；**鐘擺總盤點**——效能↔生產力（ch03/ch08）、集中↔分散（ch13 NoSQL、ch16 雲、ch18 平台工程）、單體↔微服務↔（近年「回到單體」的反思）、手工↔自動；為什麼資深工程師要懂底層——抽象洩漏時你得能跳下去；幾句被反覆驗證的老話（「過早最佳化是萬惡之源」Knuth 的完整脈絡照 landscape、「cache 失效與命名是兩大難題」、「worse is better」Gabriel）。\n- **不涵蓋**：新的歷史事件（本章是回收與綜合）；AI（ch20）；最終總結（ch21）。\n- **橋接**：你被 ORM 的 N+1、雲的冷啟動、TCP 的重傳坑過——每一次都是抽象洩漏；你之所以值錢正因為抽象漏的時候你能跳到底層（你的 profiling 與瓶頸診斷就是在抽象的裂縫裡工作）。\n- **個案**：把全書的「複雜度帳單」彙整成一張大表（每章一筆：搬走了什麼、新增了什麼、在哪洩漏），讓讀者親眼看見「守恆」不是比喻而是反覆出現的事實；挑三筆讀者親身踩過的帳單深入。\n- **紙上推演**：用「抽象洩漏」解釋你最近一次必須跳到底層 debug 的經歷（哪層漏了）；論證「過早最佳化是萬惡之源」這句話被濫用成什麼、Knuth 原意是什麼；盤點你的技術棧裡三個鐘擺，各自現在擺到哪一邊。\n\n### ch20 — AI 輔助編程：第幾次「自動編程」的夢\n- **目標**：能把 AI 輔助編程放進歷史座標（FORTRAN「自動編程」→4GL→低程式碼→Copilot 是同一個夢的反覆）；能用本質 vs 偶然複雜度判斷它能砍什麼、砍不掉什麼；能對「它是不是又一次抽象躍遷」給出有歷史縱深的、誠實 hedge 的判斷（2026-06）。\n- **必涵蓋**：「自動編程」夢的歷史（回收 ch03 FORTRAN 當年也叫 automatic programming、4GL、CASE 工具、低程式碼/無程式碼的反覆承諾與反覆落空）；**程式碼補全→GitHub Copilot（預覽 2021／GA 2022，基於 OpenAI Codex）→agentic 編程工具（2023–2026，照 landscape，明確標時點與 hedge）**；用 Brooks 的手術刀分析：AI 砍的多是**偶然複雜度**（樣板、查 API、翻譯語言）、**本質複雜度（搞清楚到底要建什麼、跨系統的一致性）砍不掉**——所以「沒有銀彈」在 2026 仍是合理的預設懷疑；歷史視角的兩面判斷：這次和以往「自動編程」承諾有什麼**真的不同**（自然語言介面、規模）、又有什麼**似曾相識**（高估、把偶然當本質）；誠實聲明：這是還在演化的當下、本章的判斷可能被未來推翻（與「已成定局的歷史」嚴格區分）。\n- **不涵蓋**：LLM/Transformer 內部機制（讀者書架上 AI Infra 書；本章只談「AI 作為寫程式的工具」）；特定產品功能比較；對未來的預言（明寫不預言）。\n- **橋接**：你正在用 AI 輔助工具（包括寫這本書的 Claude Code）、也在轉職 AI Infra——你既是這次浪潮的使用者也將是建造者；用你的判斷力檢驗：它幫你砍的是哪種複雜度。\n- **個案**：把「automatic programming」這個詞從 1957（FORTRAN）到 2026（AI agent）的反覆出現攤開成一條線，每一代都宣稱「讓寫程式更接近說人話」——講清楚哪些承諾兌現了（抽象確實升高了）、哪些是每代都犯的高估（以為能消滅本質複雜度）。\n- **紙上推演**：用本質 vs 偶然複雜度，列出 AI 工具在你的工作裡砍掉的三筆偶然複雜度、與它砍不掉的一筆本質複雜度；論證「為什麼『沒有銀彈』在 AI 時代仍是合理的預設」；反事實/前瞻（標明是推測）：如果 AI 真能砍本質複雜度，那會意味著什麼被自動化了。\n\n### ch21 — 複雜度守恆：總收官\n- **目標**：把全書收進一條能口頭講完的故事線；用四條驗收主線（守恆、交織、鐘擺、永恆真話）當口試題完成總自我檢核；知道讀完之後往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**複雜度守恆的最終陳述**：七十年史就是複雜度反覆搬家的歷史——每層抽象/每套流程都是把複雜度移到別處，從未消滅（總帳表回收 ch19）；**兩條 strand 的交織收束**：抽象（用什麼蓋）與方法（怎麼蓋）始終互相觸發，列出全書關鍵的交織點；**鐘擺收束**：四組張力各自的歷史擺動軌跡與「下次會往哪擺」的思考框架（不預言、給判斷工具）；**永恆真話收束**：Brooks/Conway/Dijkstra 的話為何四十年不過時——因為它們講的是人與複雜度的關係，不是技術；**口試總驗收**：四條主線各出一題口頭題＋每題「模範答案要點清單」（檢核表式，不是逐字稿）；下一步地圖：往深處走（讀經典原著）、往應用走（你的 AI Infra 之路就是這部歷史的最新一章）、往廣處走（電腦科學史/科普）——對應附錄 C。\n- **不涵蓋**：任何新歷史；任何新概念；對未來的預言。\n- **橋接**：回到 ch01 的你——當時你怎麼看「軟體史」vs 現在你會怎麼對另一個工程師講「我們為什麼走到今天」；你的 AI Infra 轉職本身就是站在這條七十年長河的最前緣（LLM serving 是分散式系統複雜度的最新形態）。\n- **個案**：「軟體史一條主線」的 10 分鐘口述版逐段大綱——給讀者照著練的講稿骨架，標出每段必須命中的關鍵詞（機器→抽象→危機→方法→資料→網路→雲→分散式→AI，每跳一句「搬走什麼、帳單什麼」）。\n- **紙上推演**：四條口試主線正式作答（口頭、各 3–5 分鐘，對照要點清單自評）；給「軟體業每隔幾年就有革命性突破」這句話寫一段有歷史縱深的回應（200 字內）；一年後重讀清單：哪三章值得在什麼工作場景重讀。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 軟體史總時間軸\n單一編年總表：年份 | 里程碑 | strand（抽象／方法／both） | 哪一章。從各章與 landscape 實際用過的事件 grep 彙整，只收書中出現過的；這是「跨章年份一致性」的最終對帳表。\n\n### 附錄 B — 人物與術語表\nEN–ZH–一句話貢獻/定義–首次出現章。人物（Turing/von Neumann/Hopper/McCarthy/Dijkstra/Parnas/Kay/Hoare/Brooks/Conway/Codd/Stallman/Torvalds/Berners-Lee…）與術語（複雜度守恆、本質/偶然複雜度、抽象洩漏、Conway's Law、ACID、CAP…）從實際內容萃取。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源（原始論文、當事人的書/演講、可信歷史整理），分三條路線（往深處讀經典／往應用接 AI Infra／往廣處讀科普），給出「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-fighting-complexity.md、ch02-stored-program.md、ch03-compiler-bet.md、ch04-lisp-and-algol.md、ch05-software-crisis.md、ch06-modularity-and-unix.md、ch07-object-oriented.md、ch08-types-and-formal-methods.md、ch09-functional-return.md、ch10-mythical-man-month.md、ch11-waterfall.md、ch12-agile.md、ch13-relational-model.md、ch14-open-source-and-git.md、ch15-network-and-web.md、ch16-server-to-cloud.md、ch17-microservices-and-containers.md、ch18-devops-and-sre.md、ch19-leaky-abstractions.md、ch20-ai-assisted-coding.md、ch21-conservation-of-complexity.md；\n附錄 appendix-a-timeline.md、appendix-b-glossary.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《複雜度守恆：軟體發展史的工程師讀法》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的軟體史書，從**資深後端工程師的視角**讀。目標是讓讀者看懂——軟體七十年史不是一串產品與人名的編年帳，而是**人類反覆撞上「複雜度」這堵牆、再反覆翻過去**的故事；每一次翻越要嘛是一層新**抽象**（idea strand），要嘛是一套新**流程／方法**（method strand）。讀完有「原來我每天用的東西是這樣長出來的、原來這個坑前人早就踩過」的通透感，**而且能用自己的話對另一個工程師講清楚「我們為什麼會走到今天」**。\n- **不是**：\n  - 不是編年大事記——不是「某年某人發明某物」的條列；歷史事件**服務於思想與方法的演化邏輯**，不是為了湊時間軸（時間軸總表進附錄 A）。\n  - 不是技術教科書——不教你寫 Lisp、不教你 OOP 語法、不教你架 K8s；本書講的是「**為什麼會有這東西、它在解什麼複雜度、它的代價是什麼**」，機制只講到能支撐這個判斷的深度。\n  - 不是懷舊抒情——不堆「那個純真年代」式的鄉愁；歷史要冷靜、有觀點、可被另一個工程師檢驗。\n  - 不是轉職用書——純興趣，不服務 AI Infra 敘事；但工程橋接要讓它讀起來像母語，不是外語。\n- **全書貫穿主張（核心商品，ch21 總收官驗收）**：\n  1. **複雜度守恆**：抽象不消滅複雜度，它把複雜度**搬家**——搬到別人看不見的地方（編譯器、runtime、雲、別人的團隊），代價在抽象洩漏時回來找你。\n  2. **兩條 strand 交織**：「我們用什麼蓋（抽象）」與「我們怎麼蓋（方法）」是同一場對抗複雜度戰爭的兩面，全程互相觸發（結構化編程既是語言事件也是方法事件）。\n  3. **鐘擺**：效能↔生產力、集中↔分散、單體↔分散式、手工↔自動——同一組張力反覆擺盪，每次回擺都帶著上次的教訓。\n  4. **永恆的真話**：Brooks（沒有銀彈）、Conway（組織形狀=系統形狀）、Dijkstra（測試只能證明 bug 存在）——這些四十年前的話為什麼今天還準。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js、NestJS）。可直接當橋接錨點的經歷與直覺（**第一次出現一個橋接錨點時點名具體場景，不要泛泛說「你的後端經驗」**）：\n\n- 高併發系統（500K+ 使用者、10K+ CCU）、佇列（SQS）、冪等消費者、最終一致性、backpressure、rate limiting。\n- 微服務 greenfield（AWS ECS、TypeScript/NestJS、B2B/B2C 資料中介）；自建輕量 Lambda decorator 框架、多層 cache library（全團隊採用）、CI 強制 OpenAPI 同步。\n- 效能工程：profiling（Clinic.js）、負載測試（k6/Vegeta）、瓶頸診斷（招牌敘事：尖峰 RDS CPU 降 40%）。\n- 資料層精通：MySQL/PostgreSQL 調校（read replica、partition、isolation、deadlock、index）、Redis Pub/Sub。\n- 維運：K8s 基礎物件（Deployment/Service/HPA/CronJob）、Docker、CI/CD、CloudWatch、自建 FluentBit+Lua 可觀測性 pipeline、event-driven 結算 pipeline（K8s CronJob→SQS→idempotent consumer）。\n- 即時通訊：WebSocket、Socket.io、Redis Pub/Sub、WebRTC。\n\n**不需要解釋**（讀者已精通，可直接當錨點）：REST/OpenAPI、JWT/OAuth、版本控制日常用法（Git 的指令層）、CI/CD pipeline、container 與 K8s 物件、雲服務（ECS/Lambda/RDS/SQS）、SQL 與交易隔離、cache 模式、佇列與冪等、HPA/autoscaling 的工程意義。\n\n**快速複習即可**（聽過、用過，但沒讀過它的來歷）：OOP 的 class/繼承/多型語法、SOLID、設計模式名稱、TDD 的操作、瀑布 vs 敏捷的刻板印象、ACID。用「你天天在用，現在把它的身世補上」的節奏帶，不當新手教。\n\n**要從零講來歷**（本書主體，讀者多半只知其然）：儲存程式為何是躍遷、編譯器的賭注、Lisp/Algol 的設計哲學、軟體危機與結構化編程的真實脈絡、資訊隱藏的原始論文、OOP 的原意（Kay 的訊息傳遞）、瀑布的歷史真相（Royce 其實反對純瀑布）、人月神話與沒有銀彈、敏捷的反叛對象、關聯模型的抽象勝利、開源的所有權革命、雲與 IaC 的世界觀、SRE 的誕生、AI 輔助編程在歷史中的座標。\n\n**跨書資源**：讀者書架上有《把系統寫成定理：TLA+ 與形式化方法》（形式驗證、invariant、∀∃ 思維）與《馴服無限：微積分》。談 Hoare logic／形式方法（ch08）時**可以**一句話接上 TLA+ 書（「書架上的 TLA+ 書把這條路走到底」），但**不得依賴**——本書自身要把概念講到能懂。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。技術名詞中英並用：第一次出現給「中文（English）」或直接保留通行英文（compiler、garbage collection、microservices…多數情況技術詞保留英文即可，不硬翻）。**第二次起可只用通行的那一種，全書一致**。\n- 人名用通行中譯＋原文第一次出現附原文，之後用中譯或原文擇一全書一致：圖靈（Alan Turing）、馮紐曼（von Neumann）、Hopper（Grace Hopper，多用原文）、Dijkstra、Parnas、Alan Kay、Brooks、Conway、Codd、Stallman、Torvalds、Berners-Lee。**有把握的通行中譯才用，沒有就保留原文**（多數電腦科學家保留原文更自然）。\n- 台灣用語基準：程式／程式碼（不用「代碼」）、函式／函數（程式脈絡用「函式」）、編譯器、直譯器、最佳化（也可「優化」，全書擇一：用「最佳化」）、記憶體（不用「內存」）、預設（不用「默認」）、物件（不用「對象」）、品質（不用「質量」）、資訊（不用「信息」）、相依（dependency）、容器（container）。**禁止簡體中文詞彙**。\n- 專有名詞照原文：waterfall、Agile、Scrum、DevOps、SRE、microservices、container 等保留英文（已是工程界通用語）。\n- 第二人稱「你」直接對讀者說話。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書「對抗複雜度」地圖的哪裡、撞的是哪一面複雜度的牆、跟前後章的因果關係，3–5 行）`\n   每個 Part 的第一章（ch01、ch04、ch07、ch10、ch13、ch16、ch19）在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，照抄並把「◄你在這裡」標到本章），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章的核心問題錨定在讀者**具體的**工程實戰上（點名場景：你的 cache library、ECS 微服務、RDS CPU 降 40%、FluentBit pipeline、SQS 冪等消費者…），讓他在讀歷史前先「站在自己的經驗上」。要具體，不要泛泛。\n3. 核心內容（多個 `##` section）。**歷史敘事與工程洞見交織，但歷史服務於「對抗複雜度」的邏輯**，不是編年史。每章明確點出：撞的是哪一面複雜度的牆、用抽象還是方法翻越、複雜度搬去了哪、代價是什麼。**兩條 strand（抽象/方法）哪一條主導要說清楚**。\n4. `## 複雜度搬去哪了` — 本書招牌段落（每章必有，名稱照抄）：本章的躍遷**消滅了什麼負擔、又製造了什麼新負擔**；新抽象/新流程**在什麼情況下會洩漏／反噬**（對應讀者偏好的「故障視角」）；用一句話總結「這一跳的帳單是什麼」。用表格或條列。\n5. `## 紙上推演` — 動手做的形式（純敘事書，無可執行 lab；2026-06-13 訪談定案）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：**口頭重講**一段歷史因果、**翻譯**（把一個現代工具對應回它的歷史原型）、**反事實推理**（如果沒有 X 會怎樣）、**找出**一個流行說法的史實破綻、**對帳**（把你維運過的某系統對應到本書某個歷史模式）。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見誤解）。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。問題對齊「能不能把這段歷史的**因果**講給另一個工程師聽」的深度，優先出「為什麼」與「如果不這樣會怎樣」而不是「是什麼／哪一年」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段／看哪一段。優先：原始論文、當事人的書/演講、可信的歷史整理。\n\n## 深度標準\n\n- **每章至少一個 worked example（歷史書的版本＝一個被講透的個案）**：不是計算題，而是**把一個關鍵事件／決策／論證攤開到讀者能複述其因果**——例如「Royce 1970 論文到底畫了什麼、為什麼後人讀反了」「Brooks 為什麼說加人會更慢，OS/360 發生了什麼」「Codd 的關聯模型把什麼複雜度搬走了」。要有具體細節（人、時間、技術約束、決策的代價），不准只給結論。outline 已為每章指定基準個案。\n- **史實照 landscape，不准憑記憶**：年份、歸屬、引文、軼事一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 **3~8 次** WebSearch/WebFetch）並 hedge。**傳說要明白標為傳說**（Hopper 的飛蛾 bug、Lovelace「第一位程式設計師」的歷史學爭議、Royce 瀑布誤讀、「Considered Harmful」標題是編輯下的、Kay「OOP 是訊息傳遞」的原意）——這些「大家記錯的事」是本書的趣味與可信度所在，**必須引用 landscape 的查證版而非流行版**。\n- **名言要查證**：禁止憑記憶引用「名人名言」。引用前對照 landscape；landscape 沒有的自行查到原始出處，查不到原文就**改寫成「大意是」並標未逐字查證**，不偽造逐字引文。\n- **誠實標示「這是傳說／這有爭議」**：歷史歸屬常被簡化（誰「發明」了 X）。凡有爭議的優先權／歸屬，明寫「歸屬有爭議」並給 landscape 的版本，不選邊站當定論。\n- **每個躍遷都要回答「它在解什麼複雜度」**：禁止無動機的「然後出現了 X」。每個新抽象/新流程出場都要先講清楚**前一個狀態的痛**（撞了哪面牆），再講它怎麼翻越，再講帳單（複雜度搬去哪）。\n- **每章至少一處明確的「工程師的領悟」**：本書核心商品是「通透感」。每章至少一處回答「**這段歷史對今天的你意味著什麼**」——而且寫到讀者能用自己的話轉述，不是堆形容詞。\n- **時效性與前瞻誠實 hedge**：談 2023–2026 的當下（AI 輔助編程、平台工程等）一律標時點 `（2026-06）`，明確區分「已成定局的歷史」與「還在演化、判斷可能被推翻」的當下；不假裝預知未來。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、人物、論文、引文、產品版本、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 與 landscape 衝突時：**以 landscape 為準**；若你查到 landscape 可能有誤，**在章末用註記標出疑點**（「⚠️ 待協調者複核：landscape 說 X，但來源 Y 說 Z」），不要自行改寫 landscape（一致性由協調者 P3/P4 統一處理；重大修正需兩個獨立來源）。\n- 任何「使用量／市佔／LOC」類統計一律標為估計值並 hedge（這類數字最常被以訛傳訛）。\n- 延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（全書地圖、演化譜系圖、strand 交織圖、時間軸片段），必須通過 `check_diagrams.py` 檢查（**CJK=2 欄寬規則**——中文字佔 2 欄、ASCII 佔 1 欄，框線要對齊）。譜系/演化圖用 `─ │ ┌ ┐ └ ┘ ├ → ↓` 繪製；不追求精確比例，追求關係清楚。\n- 跨章引用格式：`（見 chNN）`，不要寫死檔名路徑。跨章主題點到為止＋指向擁有它的章，不重複展開（範圍邊界見 outline.md）。\n- 表格用於：複雜度帳單對照、strand 對照、年代里程碑對照、流行說法 vs 史實對照。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是軟體史上最被低估的一篇論文」）。不行銷、不喊口號、不堆「太神奇了」式空洞感嘆——通透感要用內容本身造成，形容詞是結果不是手段。允許冷幽默與對「業界迷思」的吐槽（但吐槽要有史實根據）。歷史人物當人寫，不造神也不踩低：講清楚他們當年面對的真實約束，讓讀者理解「換成我在那個時空也未必想得到」。對今天的技術潮流保持歷史縱深的清醒——見過鐘擺擺過幾輪的人，不會把每個新詞都當革命。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="swhist";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">複雜度守恆<br><span style="font-weight:400;font-size:12px;color:var(--muted)">軟體發展史的工程師讀法</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 複雜度守恆';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
