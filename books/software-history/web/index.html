版的服務，比一個單體更糟（你多付了網路與分散式的帳，耦合卻一點沒減）。\n\n如果你第 (2) 題答得出一串名字——恭喜，你親手復現了 Parnas 1972 的 Modularization 1。這不丟臉，這是預設陷阱；丟臉的是知道了還繼續照流程切。\n\n### 推演題二：Unix pipe 與「微服務＋message queue」在哲學上是同一件事、在複雜度上差在哪 **[15 分鐘] ★★**\n\n口頭講清楚：(a) Unix pipe 把小工具串起來，和你用 SQS 把微服務串起來，在「哲學」上為什麼是同一件事？(b) 但在「複雜度帳單」上，後者比前者多付了哪些東西？\n\n#### 推演解答\n\n(a) **哲學同源**：兩者都是「小單元各做一件事、藏住自己怎麼做、只透過一個窄介面把輸出交給下一個」。pipe 的窄介面是純文字串流，message queue 的窄介面是訊息格式。`grep` 不在乎前後是誰、你的 idempotent consumer 不在乎訊息哪來——這份「彼此不知道對方內部」正是 McIlroy「expect the output of every program to become the input to another」放大到分散式的樣子。你寫 SQS pipeline 時的直覺和寫 `cat | grep | sort` 的直覺是同一個。\n\n(b) **複雜度差在「接合劑跨了機器」**。Unix pipe 的兩個工具跑在同一台機器、同一個核心調度下：資料傳遞近乎瞬時且可靠，一個工具掛了整條 pipe 一起死（失敗是同步且明確的）。換成 SQS：接合劑變成**網路**，於是你繼承了一整套 pipe 沒有的帳——訊息可能重複送達（所以你需要冪等消費者）、可能延遲或亂序、下游掛了訊息得排隊重試、整條鏈路要靠 trace 才看得出資料流經哪裡。pipe 的失敗是「整條一起死」，message queue 的失敗是「某一段悄悄壞掉、其餘照跑」——後者難 debug 得多。哲學沒變，但**把接合劑從記憶體換成網路，你就買下了分散式系統的全部複雜度**（這正是 ch17 要算的大帳）。一句話：同一個好點子，搬到網路上要另外付一筆過路費。\n\n### 推演題三（反事實）：如果 Unix 當年用組語而非 C 寫，後續會怎樣 **[15 分鐘] ★★★**\n\n假設 1973 年 Thompson 和 Ritchie 沒賭那一把，繼續用 PDP-11 組合語言寫 Unix。推演：(a) 可移植性會怎樣？(b) Unix 後來的擴散（進大學、長出 BSD／Linux 這條線、變成今天伺服器與雲的底座）還可能發生嗎？(c) 這對「效能 vs 生產力」鐘擺說明了什麼？\n\n#### 推演解答\n\n(a) **可移植性基本歸零**。組語貼著 PDP-11 的指令集，換一款 CPU 等於整套核心重寫。1978 年那次搬到 Interdata 8/32 之所以可能，正因為核心是 C、機器相關的只剩一小塊。沒有 C，這次移植大概不會發生，Unix 會跟 PDP-11 一起變成一座孤島，命運跟著那款硬體走。\n\n(b) **擴散幾乎不可能**。Unix 能進大學、被無數人讀原始碼學習、長出 BSD 再長出今天的 Linux 與整個雲端伺服器生態，前提是它能**被搬到各式各樣的機器上**。一個焊死在某款已停產硬體上的 OS，不會有這個未來。你今天 ECS 容器底下那個 Linux 核心，血緣上能追到 1973 那次賭贏——抽掉 C，這條線斷在起點。\n\n(c) **這是鐘擺的關鍵一課**：當年「用高階語言寫 OS 會慢」的恐懼是真的（早期確實有效能代價），選 C 是往「生產力／可移植」那邊押。但這次押注的回報不是當下的開發速度，而是**幾十年的存活與擴散**——可移植性讓 Unix 活過了它出生的那款硬體。鐘擺往生產力擺的那些時刻，帳常常不在當下結，而在十年後以「還活著、還能搬家」的形式回報。效能是當下的事，可移植性是時間的事；Thompson 和 Ritchie 賭的是時間。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過：\n\n1. Parnas 說模組不該照流程切、該照「會變的決定」切——用 KWIC 的例子講清楚：照流程切時，「句子存記憶體還是磁碟」這個決定為什麼會逼你改全部四個模組？照資訊隱藏切時為什麼只改一個？\n2. 「資訊隱藏」和「關注點分離」差在哪？哪個是思考方法、哪個是切割準則？separation of concerns 這個詞是誰造的、哪一年？（提示：不是 Parnas。）\n3. 你那次切出「分散式單體」，用 Parnas 的話精確診斷：你藏錯了什麼、把哪個會變的決定洩漏到了多個服務？\n4. Unix 用 C 重寫核心，賭的是什麼、賭資是什麼、贏面是什麼？用「資訊隱藏」解釋 C 替 Unix 藏住了哪個會變的決定。\n5. McIlroy 1978 那兩句原則裡，「expect the output of every program to become the input to another」為什麼是整個 Unix 組合哲學的關鍵？它逼出了什麼機制（pipe）、為什麼接合劑非得是「純文字」這種窄介面不可？\n6. 網路上那個整齊的「do one thing and do it well / work together / handle text streams」三句版——它的出處是哪裡、為什麼不能當成 McIlroy 1978 的逐字原文引用？\n7. 你的 FluentBit pipeline 和 `cat | grep | sort` 在哲學上是同一件事——講清楚「同一件事」具體指什麼（每個單元藏住什麼、承諾什麼）。\n8. 這章的複雜度帳單一句話是「複雜度從程式碼內部搬到了邊界的選擇上」——為什麼說「該怎麼切」是搬不掉的本質複雜度？（提示：它要求你預測未來什麼會變。）\n\n## 延伸閱讀\n\n- **David Parnas, 〈On the Criteria To Be Used in Decomposing Systems into Modules〉, *CACM* 1972**（https://dl.acm.org/doi/10.1145/361598.361623 ；全文鏡像 http://sunnyday.mit.edu/16.355/parnas-criteria.html）。本章的源頭，只有十幾頁，**一定要讀原文**。重點看他怎麼把 KWIC 用兩種切法各切一次、再列那串「likely to change」的決策——你會發現 2026 年切微服務的所有道理，1972 年都寫完了。\n- **The morning paper（Adrian Colyer）對這篇的導讀**（https://blog.acolyer.org/2016/09/05/on-the-criteria-to-be-used-in-decomposing-systems-into-modules/）。如果原文的 1972 行文讀起來吃力，先看這篇現代工程師視角的拆解，再回頭讀原文。\n- **Doug McIlroy 等, Unix Time-Sharing System Foreword, *Bell System Technical Journal* 1978**（哲學原則的逐字出處；亦見整理頁 https://en.wikipedia.org/wiki/Unix_philosophy）。看那幾條原則的**原句**，順手對照網路流傳的三句版差在哪——這是一手史料 vs 後人轉述的好練習。\n- **Eric S. Raymond, 〈The Origins and History of Unix, 1969–1995〉, *The Art of Unix Programming*** 第 2 章（http://www.catb.org/~esr/writings/taoup/html/ch02s01.html）。把 Unix 的誕生、C 重寫、擴散講成連貫故事；對「可移植性為什麼是決定性勝利」這點寫得最清楚。\n- **Kernighan & Ritchie, *The C Programming Language*, 1978**（俗稱 K&R）。不必當教科書讀，翻它的序與前幾章，感受「小而克制」這套品味是怎麼被一本薄書傳給幾代人的——這本書本身就是 Unix 哲學的文體示範。\n"}, {"id": "ch07-object-oriented", "file": "ch07-object-oriented.md", "group": "Part III — 抽象的大廈：物件、型別、函數", "title": "ch07 — 物件導向：把資料與行為綁在一起", "md": "# ch07 — 物件導向：把資料與行為綁在一起\n\n> **本章解決什麼問題**：ch06 的 Parnas 教你「照會變的決定切模組」，但留了一個問題沒答：切出來的那塊「祕密」，在程式語言層面該長什麼樣？OOP 給的答案是——把資料和操作那筆資料的行為**綁成一個東西**（物件），讓資料不再裸奔在全域、被四散的函式各自蹂躪。這章撞的是**大系統裡「資料與操作散落各處」的牆**：狀態在這、改它的程式碼在那，沒人知道誰動過誰。OOP 用「封裝」回收 ch06 的資訊隱藏、用「多型」處理「同一個動作、不同型別各自實作」。但這章真正的故事是一場走形：OOP 的造詞人 Alan Kay 後來說，他要的核心是**訊息傳遞**（像細胞、像 Internet 上互相發訊的節點），不是 class 與繼承；而業界規模化落地時得到的，是 Java 的 class 階層。一個好點子在落地時被複雜度改了形——這是本章的個案，也預告了 ch08（型別）、ch09（函數式對 OOP 的反省）。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向 ◄你在這裡\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n## 從你已知的出發\n\n你每天寫 NestJS。停下來看一眼你最熟的那個檔案結構：`OrderController` 接 HTTP、`OrderService` 放業務邏輯、`OrderModule` 把它們組裝起來，`constructor` 裡那一串 `private readonly xxxService` 是框架幫你注入（DI）的相依。你大概沒想過——你寫的這套東西，是 1960 年代一個為了跑模擬而生的語言，經過 Smalltalk 的理想、C++ 的妥協、Java 的企業化之後，傳到你手上的直系後代。NestJS 的官方文件第一句就說它「heavily inspired by Angular」，而 Angular 的 DI 與裝飾器（decorator）模型，骨子裡是 Java/Spring 那一脈企業級 OOP 的搬遷。你不是在用一個「現代框架」，你是在還一筆五十年的帳。\n\n而且你已經在還早期 OOP 的另一筆帳，只是你可能沒意識到。回想你怎麼設計那套 service：你大概**不太用繼承**。你不會搞一個 `BaseService` 然後讓 `OrderService extends PaymentService extends BaseService` 疊三層深的繼承樹；你比較常的是定義一個 `interface`（`PaymentProvider`），讓 `StripeProvider`、`PaypalProvider` 各自 `implements` 它，再用 DI 把具體實作注進去。這個選擇——**用 interface 加組合，而不是用深繼承**——不是你的個人品味，是整個產業在 1990 到 2000 年代撞了一輪牆之後得出的集體教訓，後來被濃縮成一句口號：「組合優於繼承」。你天天在實踐它，卻多半沒聽過它從哪場災難裡長出來。\n\n這章把這兩筆帳的身世補給你。先講 OOP 在解什麼複雜度（為什麼要把資料和行為綁一起），再講它的原意（Kay 想要的）和它落地後的樣子（你得到的 Java class 階層）為什麼差這麼多，最後算清楚繼承這把當年的銀彈，是怎麼變成今天「能不用就不用」的東西。\n\n## OOP 在解什麼複雜度：資料與操作的離散\n\n先把 OOP 出場前的痛說清楚，不然「把資料和行為綁一起」聽起來只是個沒來由的口號。\n\nch05、ch06 講的是「怎麼切大程式」：結構化編程治控制流、模組化治分解。但它們都沒正面處理一件事——**資料和操作資料的程式碼，在當年的主流結構化語言裡是分家的**。想像一個 1970 年代用 C 風格寫法的銀行系統：你有一個 `struct Account`（裡面是餘額、戶名、利率），這是「資料」；然後你有一堆散落在各檔案的函式 `deposit(account, amount)`、`withdraw(account, amount)`、`applyInterest(account)`，這是「操作」。資料和操作之間沒有任何語言層面的綁定關係——`account.balance` 是一個**裸露的欄位**，系統裡任何一段程式碼，只要拿得到那個 `struct` 的指標，都能直接 `account.balance = -999` 把它改成負數，繞過你所有的提款檢查。\n\n這就是 OOP 要撞的牆，我把它叫做**資料與操作的離散**：\n\n- **沒有人守門。** 餘額這個狀態，誰都能改，改的程式碼散在十幾個檔案。出了一筆不該存在的負餘額，你要 debug，得在整個 codebase 裡 grep 所有寫過 `.balance` 的地方——因為任何一處都可能是兇手。狀態沒有單一的看門人。\n- **「能對這筆資料做什麼」沒有歸屬。** 新人接手，想知道一個 `Account` 合法的操作有哪些，沒地方查——操作散在各處的全域函式裡，跟資料本身沒有目錄式的關聯。\n- **改資料結構＝全域地震。** 你想把 `balance` 從一個數字改成「主餘額＋凍結餘額」兩個欄位，所有直接讀寫 `.balance` 的程式碼全部要改——這正是 ch06 Parnas 警告的洩漏，只是發生在資料層。\n\nOOP 的核心動作就一句話：**把資料和「合法操作那筆資料的行為」綁進同一個東西（物件），並且把資料藏起來，只准透過行為去碰。** 那個 `struct Account` 變成 `class Account`，`balance` 變成 private（外面碰不到），`deposit`／`withdraw` 變成這個 class 的 method（方法）——現在改餘額**只有一條路**：呼叫 method，而 method 裡有檢查。狀態有了單一看門人。\n\n這個動作有個名字你天天用：**封裝**（encapsulation）。而你應該已經聞到熟悉的味道了——這不就是 ch06 的**資訊隱藏**嗎？\n\n是的。這是本章第一個要釘死的血緣關係：**封裝是資訊隱藏落在「物件」這個粒度上的實作。** Parnas 1972 說「模組該藏住一個會變的設計決策」，那是檔案／模組層級的洞見。OOP 說「物件該藏住自己的資料，只露出方法」，是把同一個洞見做進語言的型別系統裡——把「祕密」的單位從「一個模組檔案」縮小到「一個物件」。ch06 是洞見，OOP 是它的另一條落地路線（Unix 用模組與 pipe 走，OOP 用 class 與 method 走）。你選 NestJS 的 `private readonly` 欄位、用 getter 而不讓外面直接改 state，做的就是 1972 年那個洞見的 2026 年版。\n\n封裝解的是「資料沒人守門」。OOP 還配了第二件武器，解另一個痛：**多型**（polymorphism）。\n\n## 多型：同一個動作，不同型別各自實作\n\n封裝把守門人立起來了，但大系統還有另一種離散：**同一個概念上的動作，對不同型別要做不同的事，而呼叫方不該為此寫一堆 if-else。**\n\n具體場景：你的系統要「結算一筆付款」，但付款方式有信用卡、有銀行轉帳、有點數折抵。結構化寫法是一個大 switch：\n\n```text\n結構化寫法：呼叫方扛著型別判斷\n\n  function settle(payment) {\n    switch (payment.type) {\n      case 'card':     settleCard(payment);     break\n      case 'transfer': settleTransfer(payment); break\n      case 'points':   settlePoints(payment);   break\n    }\n  }\n   ↑ 每加一種付款方式，這個 switch 就要改一次\n     系統裡每一處「依型別分流」的地方都要同步改\n```\n\n問題在那個箭頭那行：每新增一種付款方式，你得回頭找出系統裡所有 `switch (payment.type)` 的地方，每一處都補一個 `case`。漏掉一處，就是一個沉默的 bug。型別判斷的責任落在**每一個呼叫方**身上，而呼叫方有很多個。\n\n多型把這件事翻過來：**讓「該做什麼」歸屬到型別自己身上，呼叫方只管發出動作。** 你定義一個共同的介面 `Payment`，有一個 `settle()` 方法；`CardPayment`、`TransferPayment`、`PointsPayment` 各自實作自己版本的 `settle()`。呼叫方只寫 `payment.settle()`——它**不知道也不需要知道**手上這個 `payment` 具體是哪一種，執行期會自動分派（dispatch）到正確的實作：\n\n```text\n多型寫法：型別自己知道該怎麼做\n\n  payment.settle()      ← 呼叫方只發動作，不問型別\n        │\n        ├─ CardPayment.settle()      各自實作\n        ├─ TransferPayment.settle()\n        └─ PointsPayment.settle()\n   ↑ 新增一種付款方式 = 多一個 class、實作自己的 settle()\n     呼叫方一行都不用改，那個 switch 消失了\n```\n\n這就是封裝之外，OOP 解的第二筆複雜度：**它把「依型別分流」的判斷，從散落的呼叫方收攏回型別自己身上。** 對你來說這應該極其眼熟——這正是你用 `interface PaymentProvider` 加 DI 在做的事。你定義介面、各家 provider 各自實作、呼叫方靠注入拿到具體實作而不寫型別判斷。你以為這是「框架的設計模式」，其實這是 OOP 1960 年代就埋下的兩個核心承諾之一。\n\n封裝＋多型，就是 OOP 解的兩面複雜度：**資料有了單一看門人，分流判斷有了單一歸屬。** 大系統裡「狀態誰都能改、型別判斷散一地」這個離散，被收攏進了「物件」這個單位。\n\n那麼這個好點子，是從哪來的？它的故事比「class 與繼承」深得多，也比業界記得的版本更值得講——因為原版和落地版差了一個本質。\n\n## 源頭一：Simula 67——為了模擬，意外發明了 class\n\nOOP 的 class 與 object 概念，不是某個人坐下來說「我要設計物件導向」憑空想出來的。它是兩個挪威人為了解一個很具體的工程問題——**模擬**——順手長出來的副產品。\n\n1960 年代，Ole-Johan Dahl 與 Kristen Nygaard 在奧斯陸的 Norwegian Computing Center 要做離散事件模擬（discrete event simulation）：模擬港口的船、工廠的生產線、排隊系統這類「很多個各自有狀態、各自會動的東西，在時間軸上互相影響」的場景。他們先做了 Simula I（1960 年代初），再在 1967 年 5 月奧斯陸的 IFIP 模擬語言工作會議上提出 **Simula 67**——這是史上**第一個帶有 class、object、inheritance（繼承）、virtual method（虛擬方法）的語言**。Dahl 與 Nygaard 因為「為物件導向程式設計的出現奠定基礎性思想」，在 2001 年拿了圖靈獎。\n\n關鍵在於——**class 是為了模擬而生的**。當你要模擬一個港口，你腦中的世界本來就是「一艘艘船」「一個個碼頭」，每個都是一個有自己狀態（位置、載重）、有自己行為（進港、卸貨）的獨立實體。Dahl 後來回憶，他是透過「想像一個 Algol 60 程式在執行期的記憶體長相」而得到 class 的點子——對有眼光的人來說，物件其實早就存在於每個正在跑的 Algol 程式裡了，只是被困在堆疊紀律（stack discipline）裡，需要把它們解放出來、讓它們能比一次函式呼叫活得更久。換句話說，class 不是一個抽象的哲學發明，而是**把「現實世界由一個個有狀態的實體組成」這件事，直接搬進程式語言**。一個 object 就是程式裡的一艘船。\n\n這個出身決定了 OOP 後來的兩面性。好的一面：用「物件」建模，貼近人對世界的直覺（系統由一個個東西組成，東西有狀態有行為）。但也埋下了後來的麻煩——當大家把「程式裡的物件對應現實世界的東西」這個直覺推得太遠（「`Dog extends Animal`，因為狗是一種動物嘛」），就走向了繼承的濫用。這個我們等下算帳時再回來。\n\nSimula 給了 class。但「object-oriented」這個詞、以及這個詞背後真正激進的願景，來自另一個人。而這裡，就是本章那個被走形的好點子的起點。\n\n## 源頭二：Smalltalk 與 Kay——他要的是訊息傳遞，不是 class\n\n1970 年代，在 Xerox PARC（全錄帕羅奧圖研究中心，那個發明了滑鼠、視窗、乙太網路、雷射印表機卻沒商業化的傳奇實驗室），Alan Kay、Dan Ingalls、Adele Goldberg 一群人做了 **Smalltalk**（經歷了 Smalltalk-72、-76，到 1980 年的 Smalltalk-80）。Alan Kay 就是造出「object-oriented」這個詞的人。\n\n但這裡有本書最重要的「大家記錯的事」之一，必須照原文釘死。Kay 後來公開表示，他造這個詞造得有點後悔，因為大家抓錯了重點。在一封廣為流傳、被社群當作原始出處的 squeak-dev 郵件列表郵件裡（1998 年 10 月 10 日），他寫下這段（逐字引用）：\n\n> \"I'm sorry that I long ago coined the term 'objects' for this topic because it gets many people to focus on the lesser idea. The big idea is 'messaging'...\"\n>\n> （大意是：我很抱歉很久以前為這個主題造了「物件」這個詞，因為它讓很多人把注意力放在比較次要的概念上。真正的大想法是「訊息傳遞」。）\n\n> ⚠️ 這段引文的原始載體是單一的——就是上面那封 1998 squeak-dev 郵件（後續訪談多次重述，文字一致）。本書照此句引用、並標明它是 Kay「後來表示」的回顧性說法。另外在 OOPSLA 1997 的演講裡他也說過「I made up the term object-oriented, and I can tell you I did not have C++ in mind.」（我造了 object-oriented 這個詞，而我可以告訴你，我心裡想的絕不是 C++。）\n\n那 Kay 心裡想的「訊息傳遞」到底是什麼？在同一封 1998 郵件裡，他直接點出他的模型是 **Internet**：\n\n> \"Think of the internet -- to live, it (a) has to allow many different kinds of ideas and realizations that are beyond any single standard and (b) to allow varying degrees of safe interoperability between these ideas.\"\n>\n> （大意是：想想 Internet——它要能活下去，必須一、容許超出任何單一標準的各種想法與實作；二、容許這些想法之間有不同程度的、安全的互通。）\n\nKay 的背景是生物學與數學，他反覆用的另一個比喻是**生物細胞**（這個細胞比喻散見於他多年來的訪談與 HOPL 等回顧文獻，非出自上面那封 1998 郵件，故此處標為他的一貫說法而非該郵件原文）。把這兩個比喻合起來，他的願景是這樣的：\n\n**理想中的「物件」應該像一個細胞、或像 Internet 上的一台獨立電腦。** 它內部有自己完全私有、外界絕對碰不到的狀態（細胞膜把內外隔開）；它跟外界**唯一**的互動方式，是收發**訊息**（message）——你不能伸手進去改它的狀態，你只能「請求」它做某件事，由它自己決定怎麼回應、甚至要不要回應。系統的智慧不在每個物件內部有多複雜，而在**這些獨立單元之間怎麼互相發訊息**。Kay 自己的話：做出偉大且可成長的系統，關鍵更在於設計「模組之間怎麼溝通」，而不是「它們內部的屬性與行為該長怎樣」。\n\n停在這裡，把這個願景和你的工程直覺對一下——你會發現一件很驚人的事：**Kay 1970 年代描述的「物件」，根本不像你寫的 Java/TypeScript class，它像你做的微服務。** 一個獨立部署、有自己私有資料庫（狀態外界碰不到）、只透過 API／訊息跟其他服務互動（不能伸手進去改別人的 DB）、彼此不知道對方內部怎麼實作的服務——那才是 Kay 要的「物件」。你的 SQS 訊息、你服務之間的非同步通訊，比你 class 裡的 method call 更接近 Kay 的訊息傳遞。\n\n那為什麼我們今天講 OOP，想到的是 class、繼承、`new` 一個物件然後 `.呼叫方法`，而不是 Kay 那個「細胞互發訊息」的願景？因為一個好點子在規模化落地的路上，被複雜度改了形。\n\n## 個案：Kay 想要的 vs 我們得到的\n\n把這個走形攤開，是本章的 worked example。我們對照兩欄：Kay 的訊息傳遞願景，和業界實際落地的 class 中心 OOP。\n\n| 面向 | Kay 想要的（訊息傳遞願景） | 我們得到的（class 中心 OOP） |\n|---|---|---|\n| 互動的本質 | 物件之間**發訊息**：請求一個獨立單元做某事，由它自己決定如何回應（late binding，執行期才決定） | **呼叫方法**：`obj.method()` 多半被理解成「直接執行 obj 上那段程式碼」，更像一次同步函式呼叫 |\n| 物件像什麼 | 像細胞、像 Internet 上的一台機器——自治、狀態完全私有、唯一介面是訊息 | 像一個「裝了資料和函式的盒子」——封裝有做到，但自治與「唯一靠訊息」這層被弱化 |\n| 系統智慧在哪 | 在**單元之間怎麼溝通**（訊息的設計） | 在**class 階層怎麼設計**（繼承樹、型別關係） |\n| 核心機制 | messaging ＋ 極致的封裝 ＋ late binding | class ＋ inheritance（繼承反而成了焦點） |\n| 最接近原意的現代產物 | actor model（Erlang／Akka）、微服務、你的 SQS pipeline | Java／C++／C# 的 class 階層、企業級框架 |\n\n中間那一欄到右邊那一欄的滑動，不是誰背叛了誰，是**規模化落地時複雜度的自然選擇**。原因有幾層，都很現實：\n\n**第一，效能與既有語言的引力。** Kay 的純訊息模型（每個動作都是一次動態分派的訊息）在 1970 年代的硬體上慢。當 OOP 要進入主流、要跟 C 那種貼著機器的效能語言競爭時，妥協幾乎是必然。Bjarne Stroustrup 從 1979 年開始做「C with Classes」，1983 年改名 **C++**——它的設計哲學就是「把 OOP 的好處加進 C，但**不為你不用的東西付出效能代價**（zero-overhead）」。這意味著 C++ 的「物件」是貼著 C 的記憶體模型實作的，方法呼叫盡量編譯成接近直接函式呼叫的東西——這跟 Kay「每次都是動態訊息」的願景在根上就不同。C++ 把 OOP 帶進了主流，代價是它帶進去的是「class 與繼承」這一面，不是「訊息傳遞」那一面。主流對 OOP 的第一印象，從此被 C++ 定義了。\n\n**第二，Java 把這個 class 中心的版本工業化、全球化了。** 1995 年 5 月，Sun 的 James Gosling 團隊釋出 **Java 1.0**，帶著那句史上最成功的口號之一：**「Write Once, Run Anywhere」（WORA，一次編寫、到處執行）**。Java 的賭注是 **JVM**（Java Virtual Machine）：你的 Java 程式不編譯成某款 CPU 的機器碼，而是編譯成中介的 **bytecode**，由各平台上的 JVM 在執行期翻譯。於是同一份程式在 Windows、Solaris、後來的 Linux 上都能跑——這把 ch06 Unix「用 C 換可移植性」那條路又往上推了一層（從「原始碼可移植、要重編譯」推到「編譯產物可移植、不用重編譯」）。Java 趕上了 1995 年的 Web 浪潮（Netscape 瀏覽器支援 Java applet，網頁第一次能跑互動程式），加上 Sun 的市場推力，讓 Java 成為接下來二十年企業後端的預設語言。而 Java 教給整個世界的 OOP，是**徹底 class 中心的**：一切都得包在 class 裡（連 `main` 都得是某個 class 的 static method）、繼承是頭等公民、`interface` 與 `extends` 是你建模的主要工具。一整代工程師（包括教科書、大學課程）學到的「OOP＝class＋繼承＋多型」，是 Java 定義的，不是 Kay 定義的。\n\n**第三，繼承這個機制，被當成了 OOP 的招牌賣點——而這是走形最深的一刀。** 接下來單獨講它，因為這是你天天在還的那筆帳。\n\n工程師的領悟到這裡可以先收一句：**你今天用 NestJS 的 DI、用 interface 加組合、用非同步訊息串服務，其實在不知不覺中走回了 Kay 的原意——而不是你大學課本教的那套深繼承 class 階層。** 你不是在用「更現代的 OOP」，你是在繞過 OOP 落地時的那個走形，回到它本來想去的地方。下一節講清楚那個走形是怎麼回事。\n\n## 繼承：從銀彈到「能不用就不用」\n\n繼承（inheritance）一度是 OOP 最閃亮的賣點。它的承諾聽起來無懈可擊：**程式碼重用**。你有一個 `Animal` class，寫好了 `eat()`、`sleep()`；現在要做 `Dog`，不用重寫，直接 `Dog extends Animal`，免費繼承所有行為，再加上 `bark()` 就好。世界乾淨、整齊、像生物分類學。1990 年代的 OOP 教科書畫滿了這種繼承樹，把它當成軟體重用的銀彈。\n\n然後產業大規模用了十幾年，撞出了一身傷。傷的名字叫**脆弱基底類別問題**（fragile base class problem）：\n\n**當你 `extends` 一個 class，你不是「重用」它，你是把自己的命運和它的內部實作焊死了。** 子類別常常隱性地依賴父類別「內部怎麼做」——某個 method 內部呼叫了另一個 method、某幾個操作的先後順序。父類別的作者哪天為了修 bug 或加功能，改了一個看起來人畜無害的內部細節（改了某個 protected method 的行為、調了內部呼叫的順序），**所有繼承它的子類別可能就悄悄壞掉**，而且父類別作者根本不知道有誰在依賴那個細節。繼承把「父類別的內部實作」變成了子類別依賴的一部分——這恰恰**違反了封裝**。你以為繼承在重用，其實它在你父子之間開了一個後門，讓本該藏起來的實作細節洩漏給了子類別。這是 ch06 那個「不該洩漏的實作從窄介面漏出去」的問題，在繼承這個機制上的化身。\n\n更麻煩的是繼承樹一深就僵。`is-a`（是一種）關係被推到極端會打架：經典的例子是 `Square extends Rectangle`（正方形是一種長方形嘛）——數學上對，但程式上災難：長方形可以獨立改寬和高，正方形不行（改寬必須同步改高），於是子類別沒辦法忠實履行父類別的契約。現實世界的分類學，硬塞進單一繼承樹，遲早爆炸。\n\n產業學到的教訓，被 1994 年那本 OOP 聖經——**《Design Patterns: Elements of Reusable Object-Oriented Software》**（作者 Gamma、Helm、Johnson、Vlissides 四人，人稱 Gang of Four，GoF；1994 年 10 月在 OOPSLA 首發，版權頁標 1995）——濃縮成一句被印成斜體、強調再強調的原則：\n\n> \"Favor object composition over class inheritance.\"\n>\n> （偏好物件組合，勝過類別繼承。）\n\n這就是你天天在用、卻可能沒查過出處的「組合優於繼承」。它的意思是：與其讓 `Car extends Engine`（車是一種引擎？根本不通），不如讓 `Car` **持有一個** `Engine`（`has-a`，組合）——車裡有一個引擎物件，車透過引擎的介面去用它，但不繼承它的實作。組合是 `has-a`（有一個），繼承是 `is-a`（是一種）；組合靠介面互動（封裝沒被打破），繼承靠共享實作（封裝被打破）。\n\n把這條教訓接回你的日常，閉環就合上了：**你用 `interface PaymentProvider` 加 DI 注入具體實作，而不是 `StripeProvider extends BasePaymentService`，正是「組合優於繼承」的直接實踐。** DI 容器幫你做的，本質就是「把一個物件持有的相依，從外面組裝進去」——這是組合的自動化。你選 interface 而非深繼承樹，是在替 1990 年代那場繼承災難還帳，而你多半是被框架和社群慣例「養成」這個習慣的，沒親身踩過深繼承的坑。這章的價值就在這：讓你知道你手上這個「正確的習慣」是從哪場血戰裡長出來的，這樣你下次看到別人疊三層繼承時，講得出為什麼不該那樣。\n\n順帶清掉一個常被笑的東西：所謂「企業級 OOP 過度設計」——`AbstractFactoryFactory`、`SimpleBeanFactoryAwareAspectInstantiationStrategy` 這種讓人發笑的長名字。這不是 OOP 本身的錯，是**把封裝與多型的工具用過了頭**：明明一個函式能解決的事，硬要包成五個 class 加三層抽象介面，美其名「為了未來的擴充」。這是 ch10「沒有銀彈」會講的偶然複雜度（accidental complexity）的活標本——你用抽象去防禦一個未必會來的未來，付出的是當下實實在在看不懂的複雜度。組合優於繼承的更深一層讀法是：**抽象要按需引入，不是預先囤積。**\n\n（設計模式這個目錄本身——23 個 GoF 模式、Strategy／Observer／Factory 那一串——本書不展開，那是一本工具書的範圍；要學去讀 GoF 原書，本章延伸閱讀有列。本書關心的是「為什麼會有設計模式這種東西」：它們大多是在**繞過繼承的僵硬**、用組合與多型補 OOP 落地後留下的洞。型別系統那一面——`interface` 背後的型別理論、靜態 vs 動態之爭——留給 ch08；函數式陣營對「物件把狀態和行為綁一起」這件事本身的根本批評，留給 ch09。)\n\n## 複雜度搬去哪了\n\n這一跳（OOP：封裝＋多型，以 class 為主流落地形態）搬動的複雜度，記成一筆帳：\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼負擔** | (1) 「狀態誰都能改、改它的程式碼散一地」——封裝把狀態關進物件，立了單一看門人，改 state 只有一條路（經過有檢查的 method）。(2) 「依型別分流的 switch 散落在每個呼叫方」——多型把判斷收攏回型別自己身上，新增型別不必改呼叫方。(3) 用「物件」建模貼近人對世界的直覺，降低「程式結構 vs 問題結構」的心智落差 |\n| **製造了什麼新負擔** | (1) **繼承的脆弱**：`extends` 把子類別焊死在父類別的內部實作上，父類別一改、子類別暗壞——封裝被繼承自己打破（fragile base class）。(2) **class 階層成了新的複雜度沼澤**：深繼承樹、`is-a` 硬塞、為未來預先囤積抽象（企業級過度設計、`AbstractFactoryFactory` 之譏）。(3) **走形稅**：主流落地的 class 中心 OOP 弱化了 Kay 要的「自治＋訊息」，於是物件之間常常是緊耦合的同步呼叫，而非鬆耦合的訊息——這筆複雜度要到微服務／actor model 才被搬回原意 |\n| **在什麼情況下洩漏／反噬** | 當你用繼承做「程式碼重用」（而非真正的 `is-a` 型別關係）時——父類別內部一變，繼承鏈悄悄崩，封裝形同虛設；當 class 階層被推到過深、抽象被預先囤積時，讀程式的人得在繼承樹裡爬上爬下才搞懂一個物件的真實行為（行為散在父類別、祖父類別……離散又回來了，只是換了個方向） |\n| **這一跳的帳單一句話** | **OOP 把「資料與操作的離散」收攏進物件，但繼承又把「實作的離散」沿著繼承樹重新散開**——複雜度從「水平散落（資料和函式分家）」搬成了「垂直散落（行為藏在繼承鏈各層）」；而 Kay 想用「訊息傳遞」根治的耦合，在 class 中心的落地裡其實沒被根治，只是延後到了分散式時代（微服務）才被迫面對 |\n\n最後一格是這章的核心，也是它在全書地圖上的位置：OOP 沒有消滅「離散」這個本質複雜度，它把離散**換了個方向搬**。封裝與多型收攏了「資料和操作分家」的水平離散，做得漂亮；但繼承這個落地時被當招牌的機制，又沿著繼承樹製造了「行為藏在哪一層」的垂直離散。而 Kay 那個真正想根治耦合的願景（自治單元＋訊息），被效能與既有語言的引力按住了二十年，直到複雜度大到一個程式裝不下、必須拆成分散式系統時，才以「微服務」「actor model」的形態重新浮現——那時你會發現，你在用 SQS 串服務時憑的直覺，是 1970 年代 Kay 就描述過的。好點子沒有死，它只是繞了四十年的遠路。\n\n## 紙上推演\n\n### 推演題一：為什麼 actor model／微服務比 class 繼承更接近 Kay 的原意 **[20 分鐘] ★★**\n\n用 Kay 在 1998 squeak-dev 郵件裡的兩個比喻（Internet、以及他一貫用的生物細胞）口頭講清楚：(a) Kay 要的「物件」具備哪三個特徵？(b) 為什麼你的微服務（或 Erlang/Akka 的 actor）滿足這三個特徵，而一個典型的 Java `class` 物件不滿足？(c) 這對「我們對 OOP 的標準理解走形了多少」說明了什麼？\n\n#### 推演解答\n\n(a) Kay 的物件三特徵：**狀態完全私有**（像細胞膜把內外隔開——外界絕對碰不到內部 state）、**唯一介面是訊息**（你不能伸手改它，只能發訊息「請求」它做事，由它自己決定怎麼回應）、**自治**（像 Internet 上一台獨立電腦，late binding——執行期才決定怎麼回應，能容許超出單一標準的多樣實作互通）。核心一句：智慧在「單元之間怎麼溝通」，不在單元內部多複雜。\n\n(b) **微服務滿足這三個**：每個服務有自己私有的資料庫（別的服務不能直連你的 DB，這是鐵律——一違反就是分散式單體）；服務之間只透過 API／訊息互動（你發一個 SQS 訊息或打一個 HTTP 請求，不能伸手進別人的記憶體）；每個服務獨立部署、獨立決定怎麼處理收到的請求（自治）。**典型 Java class 物件不滿足**：它的「私有」常被繼承、reflection、或同進程的直接引用穿透；`obj.method()` 多半是同步直接呼叫，不是「發訊息給一個自治單元、由它決定要不要回應」；物件之間常緊耦合，A 物件持有 B 物件的引用直接呼叫，沒有 Kay 要的那層鬆耦合訊息邊界。\n\n(c) 說明走形很深：我們把 OOP 理解成「class＋繼承＋封裝」這個**語言內**的東西，而 Kay 要的是一個**像分散式系統**的東西。最接近他原意的產物（微服務、actor model）今天甚至**不被歸類為 OOP**——這正是「造詞人後悔造了那個詞」的具體後果：詞把大家的注意力鎖在了「物件（盒子）」這個次要概念，遮蔽了「訊息（溝通）」這個主要概念。常見誤解是以為 Kay 在「批評 OOP」；不是，他是在說大家把他的點子裡比較小的那一半當成了全部。\n\n### 推演題二：找一個你看過或寫過的繼承濫用，說明組合會怎麼修 **[20 分鐘] ★★**\n\n回想一個你親手寫過、或在 code review 看過的「用繼承做程式碼重用」的例子（常見長相：`extends` 一個 `BaseXxxService`／`BaseController` 只為了拿它幾個共用 method；或一條三層以上的繼承鏈）。(a) 指出它依賴了父類別的哪個內部實作，使它脆弱。(b) 用「組合優於繼承」改寫，說明改完後封裝為什麼回來了。(c) 把這個改動對應到你 NestJS 裡實際在用的機制。\n\n#### 推演解答\n\n(a) 典型脆弱點：`OrderService extends BaseService`，只為了用 `BaseService` 裡的 `this.logTransaction()` 和 `this.validateTenant()`。子類別其實隱性依賴了——比方說 `BaseService` 的 constructor 裡初始化了某個 `this.cache`，而子類別的某個 method 假設 `this.cache` 已經存在。父類別作者哪天把 cache 初始化挪到 lazy（第一次用才初始化），子類別就在某個時序下拿到 `undefined`——父類別作者完全不知道自己弄壞了誰。繼承把父類別的初始化順序變成了子類別的隱性契約。\n\n(b) 組合改寫：不 `extends`，改成 `OrderService` 的 constructor **持有** `private readonly logger: TransactionLogger` 和 `private readonly tenantValidator: TenantValidator`，透過它們公開的介面去用（`this.logger.log(...)`）。封裝回來了，因為現在 `OrderService` 只依賴 `TransactionLogger` 的**公開介面**（一個明確的承諾），碰不到也不依賴它的內部實作——`TransactionLogger` 怎麼改內部，只要介面不變，`OrderService` 無感。`has-a` 把依賴限制在介面上，`is-a` 則讓依賴穿透到實作。\n\n(c) 對應到 NestJS：你根本不用手動 `new TransactionLogger()`——你在 constructor 宣告 `private readonly logger: TransactionLogger`，DI 容器幫你注入。**DI 就是組合的自動化**：它把「一個物件需要持有哪些相依」從程式碼裡的 `new` 抽出來，由容器在外面組裝好注進去。所以你會發現：NestJS 整個框架的骨架（service 互相注入、provider 實作 interface）天生就在引導你走組合，深繼承在 NestJS 裡反而寫起來彆扭——框架把產業的教訓焊進了它的設計。你「自然就這樣寫」，是因為站在了還完帳的人的肩膀上。\n\n### 推演題三：解釋「封裝」與 ch06「資訊隱藏」的血緣 **[15 分鐘] ★★**\n\n口頭講清楚：(a) Parnas 1972 的資訊隱藏，原本講的是什麼粒度的東西？(b) OOP 的封裝把同一個洞見搬到了什麼粒度？(c) 為什麼說「封裝是資訊隱藏的一條落地路線」，而 Unix 的模組＋pipe 是「另一條」？\n\n#### 推演解答\n\n(a) Parnas 1972 講的是**模組／檔案粒度**：一個模組該藏住「一個很可能會變的設計決策」，只露出一個窄而穩的介面，把祕密關在裡面（ch06 的 KWIC：Line Storage 模組藏住「句子存記憶體還是磁碟」）。洞見是「邊界該包住會變的決定」。\n\n(b) OOP 封裝把同一個洞見搬到**物件粒度**：一個物件藏住自己的資料（private state），只露出 method。把「祕密」的單位從一個模組檔案，縮小到一個物件實例。`Account` 物件藏住 `balance` 怎麼存、改它要過哪些檢查，外界只能透過 `deposit()`／`withdraw()` 碰——跟 Parnas 的 Line Storage 是同構的，只是粒度更細、做進了語言的型別系統。\n\n(c) 「資訊隱藏」是**洞見**（該藏會變的決定），它不規定你用什麼語言機制落地。OOP 用「class 的 private＋method」這套語言機制落地它——這是一條路。Unix 用「獨立的小程式＋純文字 pipe」落地它——每個工具藏住自己怎麼做、只承諾讀寫文字，這是另一條路（ch06）。兩條路實作的是同一個 1972 年的洞見。常見誤解是把封裝當成 OOP 獨有的發明——不是，封裝是資訊隱藏的 OOP 方言；同一個意思，Unix 用 pipe 講、微服務用 API＋私有 DB 講（ch17）。看懂這條血緣，你就不會被「OOP vs 函數式 vs 微服務」這種陣營之爭迷惑——它們在「藏住會變的決定」這件事上其實同源，只是把線畫在不同粒度。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過：\n\n1. OOP 出場前，「資料與操作的離散」具體痛在哪？用銀行帳戶的 `balance` 這個裸露欄位舉例：為什麼「狀態沒有單一看門人」會讓 debug 一筆負餘額變成全 codebase grep？\n2. 封裝解的是哪一面複雜度、多型解的是哪一面？用你的 `PaymentProvider`／那個付款 switch 的例子，講清楚多型把「依型別分流的判斷」從哪裡搬到了哪裡。\n3. 封裝和 ch06 的資訊隱藏是什麼關係？粒度差在哪？為什麼說它們是「同一個洞見的兩條落地路線」？\n4. Kay 那句「The big idea is 'messaging'」原意是什麼？他要的「物件」用 Internet／細胞比喻來說具備哪三個特徵？為什麼說你的微服務比你的 Java class 更接近他的願景？\n5. 為什麼主流落地的 OOP 變成 class 中心、而不是 Kay 的訊息中心？把 C++（效能／C 的引力）和 Java（WORA／JVM／趕上 Web 與企業浪潮）兩個力道講出來。\n6. 「脆弱基底類別問題」是什麼？為什麼說「繼承違反了封裝」？用一個父類別改了內部實作、子類別暗壞的場景說明。\n7. 「組合優於繼承」（GoF 1994）在反對什麼、主張什麼？`is-a` 和 `has-a` 在「封裝有沒有被打破」這件事上差在哪？這條原則怎麼對應到你用 interface＋DI 而非深繼承？\n8. 這章的複雜度帳單一句話是「OOP 把資料與操作的水平離散收攏進物件，繼承又把實作沿繼承樹垂直散開」——講清楚這兩個「離散」方向的不同，以及為什麼 Kay 想根治的耦合，要到微服務時代才被真正面對。\n\n## 延伸閱讀\n\n- **Alan Kay 的 1998 squeak-dev 郵件**（http://lists.squeakfoundation.org/pipermail/squeak-dev/1998-October/017019.html）。本章那句「The big idea is 'messaging'」的原始載體，也是他用 Internet 比喻講願景的地方。**一定要讀原文那幾段**——它短，但會徹底改變你對「OOP 是什麼」的預設理解。讀的時候對照你做微服務的直覺，你會起雞皮疙瘩。\n- **Ole-Johan Dahl, 〈The Birth of Object Orientation: the Simula Languages〉, 2001**（https://www.mn.uio.no/ifi/english/about/ole-johan-dahl/bibliography/the-birth-of-object-orientation-the-simula-languages.pdf）。class 與 object 的源頭，由發明者本人回顧。看他怎麼從「模擬港口的船」這種具體需求、和「想像 Algol 程式執行期的記憶體長相」長出 class——你會懂為什麼 OOP 的出身決定了它後來「用物件對應現實世界東西」的直覺與陷阱。\n- **Gamma, Helm, Johnson, Vlissides, 《Design Patterns: Elements of Reusable Object-Oriented Software》, 1994**（GoF）。「組合優於繼承」的出處。**不必整本啃**——讀它的〈Introduction〉那章，特別是把「Favor object composition over class inheritance」印成斜體的那一頁，以及它為什麼這樣主張的論證。其餘 23 個模式當工具書按需查即可（本書不展開模式目錄）。\n- **Bjarne Stroustrup, 〈A History of C++〉, HOPL II, 1993**（https://www.stroustrup.com/hopl2.pdf）。C++ 作者親述「為什麼是 class with classes、為什麼 zero-overhead」。看「OOP 進主流要付什麼妥協」這件事最清楚的一手材料——它解釋了為什麼主流 OOP 是 class 中心而非訊息中心。\n- **Steve Yegge, 〈Execution in the Kingdom of Nouns〉, 2006**（一篇廣傳的部落格長文；搜標題可得）。對「Java 把一切都硬塞進 class（名詞王國）」的著名吐槽。讀它感受一下「class 中心 OOP 被推到極致」的荒謬，再回頭對照 Kay 的訊息願景——你會更懂這章說的「走形」到底走到了哪。（觀點文，非史料，當作對照組讀。）\n<\/content>\n<\/invoke>\n"}, {"id": "ch08-types-and-formal-methods", "file": "ch08-types-and-formal-methods.md", "group": "Part III — 抽象的大廈：物件、型別、函數", "title": "ch08 — 型別與形式方法：用證明對抗 bug", "md": "# ch08 — 型別與形式方法：用證明對抗 bug\n\n> **本章解決什麼問題**：ch05 的結構化編程治控制流、ch06 的資訊隱藏治分解、ch07 的 OOP 治資料與行為的散落——三章都在「組織程式碼」這個層面對抗複雜度。這章換一個更激進的方向：能不能在程式**跑起來之前**，就把一整類錯誤排除掉？這撞的是**正確性的牆**——你怎麼知道一段程式是對的？兩個答案沿著同一種衝動排成光譜：弱的一端是**型別系統**（你天天用、便宜、被嫌不夠），強的一端是**形式驗證**（用數學證明、貴、被供在神壇）。本章告訴你它們是同一件事的不同強度，型別之爭（靜態 vs 動態）的真實 trade-off 是什麼，以及為什麼最強的那一端四十年來進不了主流、卻活在你想不到的地方。你從 JS 轉 TypeScript，就是在這條歷史上選了邊。\n\n## 從你已知的出發\n\n你被 `undefined is not a function` 坑過。不只一次。\n\n那是 Node.js 後端最經典的死法之一：某個欄位在多數情況下都有值，於是整條呼叫鏈都假設它存在；直到某個邊界 case——一筆髒資料、一個漏掉的 await、一個上游沒回傳的欄位——它變成 `undefined`，然後 `.toUpperCase()` 或 `.map()` 在半夜的 production 炸開，CloudWatch 跳一個 stack trace，告訴你「在這一行，某個東西不是它該是的型別」。錯誤訊息精準地指出了**症狀發生的位置**，卻完全沒告訴你**那個 `undefined` 是從哪一層流進來的**——它可能在三個 service、五次 await 之前就已經是空的了，只是一路被當成有值傳遞，直到撞上一個真的要用它的地方才現形。\n\n然後你做了一個選擇。你把專案從 JavaScript 遷到 TypeScript，打開 `tsconfig.json` 裡的 `strict`，其中包含一個叫 `strictNullChecks` 的開關。打開那一刻，編譯器開始對你嘮叨：這個值的型別是 `string | undefined`，你不能直接當 `string` 用，要嘛先檢查、要嘛標記它可能為空。一開始很煩，紅色波浪線鋪滿螢幕。但你很快發現，那些波浪線出現的位置，**正是過去半夜會炸的位置**——只是現在它在你打字的時候就炸，不在 production 炸。\n\n你做的這個選擇，不是一個工具偏好。它是一場**始於 1965 年、爭論了六十年的戰爭**裡的一次選邊。你選了「在執行前就排除一類錯誤」這條路——這條路最弱的版本叫型別檢查（你每天 `tsc` 一次），最強的版本叫形式驗證（用數學證明程式絕無 bug，貴到只有航太和晶片公司付得起）。而那個逼你打開 `strictNullChecks` 的 `undefined`，它的源頭有名有姓：1965 年，一個叫 Tony Hoare 的人，為了「方便」，在一個語言裡加進了 null。四十多年後，他站上台公開道歉，說那是他的「十億美元錯誤」。\n\n這章講的，就是這條從「用前後條件證明程式正確」的理想，一路降強度降到「你每天按的那個 `tsc`」的光譜——以及為什麼最理想的那一端，至今沒有、也可能永遠不會成為主流。\n\n## 同一種衝動：在執行前就排除錯誤\n\n先把這章的主軸釘死，後面所有東西都掛在它上面。\n\n對抗 bug 有兩種根本不同的時機。一種是**事後**：把程式跑起來，餵它各種輸入，看它會不會壞——這是測試（testing），是 ch12 的主場。另一種是**事前**：不跑程式，光憑分析程式的「文本」就斷定它不會犯某一類錯——這是本章的主場。Dijkstra 在 ch05 留下那句被你引用過無數次的話，精確版是「Program testing can be used to show the presence of bugs, but never to show their absence!」（程式測試能證明 bug 存在，永遠無法證明 bug 不存在）。這句話的言下之意是一把鑰匙：**如果你想要「不存在」這種等級的保證，測試這條路天生走不到，你得換一條路——事前的、分析式的、最好是「證明」的路。**\n\n這條「事前證明」的路，從理想到現實，是一道連續光譜。我把它畫成一條從強到弱的軸：\n\n```text\n「執行前就排除一類錯誤」的強度光譜\n\n 強 ◄──────────────────────────────────────────────► 弱\n 形式驗證          形式規格         型別系統        測試\n (full proof)     (spec/model)    (type check)   (runtime)\n 證明「對」        描述「該怎樣」    證明「型別一致」 跑跑看\n ┌────────┐       ┌────────┐      ┌────────┐     ┌────────┐\n │seL4    │       │ TLA+   │      │ tsc    │     │ jest   │\n │CompCert│       │OpenAPI │      │ rustc  │     │  k6    │\n └────────┘       └────────┘      └────────┘     └────────┘\n 貴到只有          中間地帶         你每天按       事後、只能\n 航太/晶片付       (見書架TLA+書)   一次的那個     證明bug存在\n   保證越強 → 成本越高、覆蓋的錯誤類別越窄、寫起來越痛\n```\n\n注意最右邊的測試被我放在光譜外、用虛線隔開——它不屬於「事前」這一族，但放在這裡是為了讓你看清對比：型別系統和形式驗證在光譜的**同一側**（事前、分析式、給的是「這類錯不會發生」的保證），它們的差別只是**強度**。型別檢查器說的是「你不會把 string 當 number 用、不會對 undefined 取屬性」；形式驗證說的是「這個程式在所有可能的輸入與排程下，都滿足這條規格」。後者強得多，但它們**想做的是同一件事**：把一類錯誤從「執行期的驚嚇」變成「執行前的拒絕」。\n\n這就是本章要你帶走的第一個領悟：**靜態型別和形式驗證不是兩個領域，是同一種衝動的兩個強度檔位。** 你打開 `strictNullChecks`，和航太公司花三年證明一個微核心無 bug，動機完全一樣——都是不信任「跑跑看」，都想在程式碰到真實世界之前就把某類災難擋掉。差別只在你願意付多少成本、想擋掉多寬的災難。理解了這一點，這章剩下的就是沿著這條光譜走一遍：先看最強那端的理想（Hoare logic），再看它如何縮水成你每天用的型別檢查，最後算清楚為什麼最強那端進不了主流。\n\n## Hoare logic（1969）：用「前後條件」證明程式正確的理想\n\n光譜最強那一端的理論基礎，1969 年就奠定了。\n\n那一年，Tony Hoare（全名 C. A. R. Hoare，後來受封爵士，圈內常稱 Tony Hoare）在 *CACM* 發表〈An Axiomatic Basis for Computer Programming〉。這篇論文做的事，用今天的話講，是給「程式正確」這個含糊的概念一個**數學上精確的定義**，精確到可以拿來證明。\n\n他的核心發明是一個記法，今天叫 **Hoare triple（霍爾三元組）**，寫成 `{P} S {Q}`：\n\n```text\nHoare triple：{P} S {Q}\n\n  {P}          S            {Q}\n 前置條件      程式碼        後置條件\n precondition  statement    postcondition\n ┌────────┐   ┌────────┐   ┌────────┐\n │執行前  │──►│ 一段   │──►│執行後  │\n │成立的  │   │ 程式   │   │保證成立│\n │假設    │   │        │   │的結論  │\n └────────┘   └────────┘   └────────┘\n 讀法：若 P 在 S 執行前成立，則 S 執行後 Q 成立\n```\n\n讀法是：「**如果** P 在執行 S 之前為真，**那麼** S 執行完之後 Q 為真。」舉個土例子：`{x > 0} y := x + 1 {y > 1}`——如果進來時 x 大於 0，那 `y := x + 1` 跑完後，y 一定大於 1。這看起來無聊到可笑，但 Hoare 的洞見是：他為每一種程式結構（賦值、條件、迴圈、循序組合）都給了一條**推論規則**，讓你能像做幾何證明一樣，從小程式的三元組一步步組合出整支程式的三元組。最關鍵也最難的是迴圈——他引入了**迴圈不變式（loop invariant）**的概念：一個在迴圈每一輪前後都保持為真的條件，你只要證明它一直成立，就能推出迴圈結束後程式的性質。（這套思路建基於 Robert Floyd 1967 年對流程圖的類似工作，所以也叫 Floyd–Hoare logic；歸屬上 Hoare 自己也承認 Floyd 在先。）\n\n停下來體會一下這件事的野心。Hoare 想要的不是「測了一百個 case 都過」，而是「我**證明**了：對所有滿足前置條件的輸入，這支程式都會給出滿足後置條件的結果」。這是數學等級的「不存在 bug」——正面回應了 Dijkstra 那句「測試證明不了不存在」的挑戰。如果這條路走得通，軟體就能像橋樑一樣被計算、被證明、被簽核，而不是被「跑跑看、出事再修」。\n\n這個理想美得讓一整代理論計算機科學家投入畢生。它也**部分地**兌現了——只是兌現的地方，不是你以為的地方（後面〈形式驗證活在哪裡〉會講）。但對 1969 年的 Hoare 來說，這還只是純理論。真正讓「型別」這個概念走進每個工程師日常的，是另一條從 Hoare logic 縮水、降強度、換取「便宜到能自動跑」的支線——而諷刺的是，**也正是 Hoare 自己，在 1965 年，往程式裡埋了一個會反覆引爆的地雷**。我們先把這個地雷挖出來，因為它是整章最值得攤開的個案，也是你那個 `undefined` 的祖宗。\n\n## 個案：null，那個十億美元的錯誤\n\n時間倒回 1965 年。Hoare 當時在設計 ALGOL W——ALGOL 60（ch04 那個「遠超時代的語言」）的一個後續方言。他在做一件當年很前衛的事：為「物件參照（reference）」設計一套完整的型別系統，讓編譯器能檢查「你拿一個參照去用時，它指向的東西型別對不對」。這套型別檢查的目標，恰恰是**安全**——在編譯期擋掉一整類「用錯型別」的災難。這完全是本章光譜上「往強的一端走」的正派努力。\n\n然後，他做了一個圖方便的決定。\n\n參照要指向某個物件，但總有些時候，一個參照「還沒指向任何東西」——比如一個剛宣告、還沒賦值的變數。Hoare 需要一個值來表示「這裡暫時什麼都沒有」。他大可以設計一套機制，強迫每個參照在使用前必須先指向一個合法物件（型別系統明明有能力做到這件事）。但那比較麻煩。於是他選了最簡單的：引入一個特殊值 **null**，代表「指向空無」。任何參照型別都可以是 null。\n\n用他自己 2009 年在台上的原話（大意，已對照錄影來源）：他「忍不住誘惑放進了一個 null 參照，**單純因為它太容易實作了**（simply because it was so easy to implement）」。\n\n問題出在這個決定**從根上戳穿了他自己那套型別系統的保證**。型別系統本來承諾的是「一個宣告為 `Person` 的參照，一定指向一個 `Person`，你可以放心對它取 `.name`」。但 null 一旦被允許塞進任何參照型別，這個承諾就破了：現在一個 `Person` 型別的東西，可能其實是 null，你對它取 `.name` 就會在執行期爆炸。型別檢查器**看不出來**——在它眼裡那個變數的型別是 `Person`，完全合法；null 是型別系統的一個官方核可的後門，它合法地穿過了所有編譯期檢查，把炸彈延後到執行期。**一個為了安全而生的型別系統，被一個圖方便的特例打開了一道貫穿全身的裂縫。**\n\n這道裂縫，順著程式語言的家譜，遺傳了下去。ALGOL 的後裔——C、C++、Java、C#、JavaScript、Python……幾乎每一個主流語言都繼承了某種形式的 null（C 的 null pointer、Java 的 `NullPointerException`、JS 的 `null` 和 `undefined`）。於是過去六十年，地球上每一個程式設計師，都在反覆償還 1965 年那個「太容易實作」的決定的利息：空指標解參照、`NullPointerException`、`undefined is not a function`——同一個地雷，換了無數個語言的外殼，在無數個半夜引爆。\n\n2009 年，已經是計算機科學泰斗、拿過圖靈獎的 Hoare，在 QCon 的一場演講（標題就叫〈Null References: The Billion Dollar Mistake〉）上，公開為這件事道歉。他說他「稱它為我的十億美元錯誤」——粗估這幾十年來 null 造成的錯誤、漏洞、系統崩潰，加總起來的損失大概有十億美元等級。\n\n> ⚠️ 一個你大概也記混的事，務必分清：這場「billion dollar mistake」的道歉，是 **2009 年的 QCon 演講**，**不是**他 1980 年的圖靈獎演說。圖靈獎那場演說標題是〈The Emperor's Old Clothes〉（皇帝的舊衣），講的是另一回事（軟體簡單性與他職涯的教訓）。網路上極多文章把「十億美元錯誤」繫到圖靈獎演說上，那是錯的。本書照查證版：1965 埋雷、2009 道歉、場合是 QCon London 2009。\n\n這個個案攤開後，你該看見的不只是「null 很討厭」這種人盡皆知的牢騷，而是一個**結構性的教訓**：\n\n一個為了「方便」而開的特例，如何變成一筆全球性的複雜度負擔。Hoare 當年面對的約束是真實的——他需要表達「空」，而強制初始化的方案在 1965 年的語言設計與編譯器技術下確實更費工。換成你在那個時空，趕著把語言做出來，大概也會選那條容易的路。這不是他笨，是一個**局部最優的便利決定，在六十年的尺度上累積成了全域的災難**。而你今天打開 `strictNullChecks`，做的正是反向工程：TypeScript 用 `T | null`、`T | undefined` 這種「可空型別」把 null 重新拉回型別系統的管轄之內——逼你在型別層面承認「這個東西可能是空的」，於是編譯器能在你取屬性前攔住你。**你那個 `strict` 開關，是在補 Hoare 1965 年那道裂縫。** 六十年後，型別系統終於把它當年漏掉的那個特例，收編回了編譯期。\n\n## 從 Hoare logic 到型別檢查：理想如何縮水成你每天用的工具\n\n現在把光譜接起來。Hoare logic 是最強的理想（證明任意性質），null 是它被自己戳的洞。那麼，介於「證明一切」和「什麼都不證」之間，有沒有一個甜蜜點——強到能擋掉一大類真實的 bug，又弱到能讓編譯器**自動、即時、零負擔**地檢查？\n\n有。那就是**型別系統**。而讓它從「Algol 那種你得手寫每個型別」進化成「聰明到能自己推出型別」的關鍵一步，是 1970 年代的 ML 與 Hindley–Milner 型別推論。\n\nALGOL 已經有型別了，但你得把每個變數的型別老老實實寫出來（`int x; real y;`）。1970 年代，Robin Milner 在愛丁堡做一個叫 LCF 的定理證明器時，為它設計了一個元語言（meta-language），就叫 **ML**。ML 帶來一個漂亮的東西：**型別推論（type inference）**——你不必標註每個型別，編譯器能從你怎麼用一個值，**自己推導**出它的型別，而且推導出的型別檢查依然嚴格。背後的演算法後來叫 **Hindley–Milner**（型別系統由 J. Roger Hindley 先描述、Milner 獨立重新發現、Luis Damas 形式化證明，這個三方歸屬本身也是個「誰先發明」的小公案）。它是第一個有**多型型別推論**的實用系統。\n\n為什麼這對本章重要？因為型別推論解決了型別系統最大的政治問題：**嫌麻煩**。動態語言的人嫌靜態型別「要寫一堆型別宣告、囉嗦、拖慢開發」，型別推論直接砍掉這個成本——你享受編譯期檢查的保護，卻幾乎不用多打字。這條血脈直接流到你身上：TypeScript 的型別推論（`const x = 5` 它自己知道 x 是 number，你不用寫）、Rust 的 `let` 推論、現代 C++ 的 `auto`，祖宗都是 1970 年代的 Hindley–Milner。你寫 TS 時那種「型別大多自己長出來、只在介面邊界手動標註」的舒服體驗，是五十年前在一個定理證明器的副產品裡誕生的。\n\n現在可以講出本章第二個關鍵領悟，它來自型別理論家 Benjamin Pierce 在權威教科書《Types and Programming Languages》（2002）裡的一句定調（精確措辭）：型別系統是「**by far the most popular and best established lightweight formal methods**」——目前為止最普及、最成熟的**輕量級形式方法**。\n\n讀慢一點：型別檢查**是一種形式方法**。它不是形式方法的對立面、不是「形式方法太難所以我們用型別湊合」——它就站在那條從 Hoare logic 延伸下來的光譜上，只是把強度調低、把成本壓到趨近於零。你每次按 `tsc`，跑的就是一次微型的、自動化的「程式性質證明」：編譯器在證明「你的程式裡，沒有任何地方把一個型別的值當成不相容的另一個型別來用」。這是個很窄的性質（它不證明你的業務邏輯對、不證明你的迴圈會終止），但它**便宜到你可以每次存檔都跑一遍、零思考成本**。\n\n這就是甜蜜點的祕密：**型別系統用「能證明的性質很窄」換來了「便宜到能融進日常」**。Hoare logic 能證明深刻的性質，但貴到要人類專家手動推導；型別檢查只能證明膚淺的「型別一致」，卻全自動、即時、人人會用——於是它成了史上唯一真正普及到每個工程師日常的形式方法。你以為形式方法是學術象牙塔的東西，其實它最成功的化身，就是你 IDE 裡那條紅色波浪線。\n\n## 靜態 vs 動態：型別之爭的真實 trade-off\n\n既然型別檢查這麼好，為什麼還有一大票人——而且是很厲害的人——堅持用沒有靜態型別的動態語言（JavaScript、Python、Ruby、Clojure）？「型別之爭」吵了幾十年，網路上多半吵成宗教戰爭。我們把它還原成一筆**冷靜的工程帳**。\n\n先講清楚兩邊到底在爭什麼。靜態型別（你 `tsc` 編譯期檢查）和動態型別（值在執行期才帶著型別跑）的差別，不是「有沒有型別」——JavaScript 當然有型別（`typeof` 一下就知道），差別是**型別錯誤在什麼時候被抓到**：\n\n```text\n同一個型別錯誤，在哪個時間點被抓到（時間由上往下流）\n\n                  ┌──────────┐\n   靜態型別在此抓 │ 你打字時 │ 動態型別：沒人管\n                  ├──────────┤\n   tsc / 紅波浪線 │  編譯期  │ 動態型別：沒有這步\n                  ├──────────┤\n        (已沒事)  │  執行期  │ 動態型別：半夜炸在這\n                  └──────────┘\n   靜態 = 把錯誤往上推、早抓     動態 = 留在執行期、開發當下沒摩擦\n```\n\n這張圖就是整場爭論的全部。靜態型別把型別錯誤**往左推**——推到你打字、編譯的當下；動態型別讓它**留在右邊**——一路放行到執行期。兩邊各自的帳是這樣：\n\n| 維度 | 靜態型別（TypeScript） | 動態型別（JavaScript） |\n|---|---|---|\n| **何時抓到型別錯** | 編譯期，最早 | 執行期，最晚（或測試碰到才抓到） |\n| **付出的成本** | 寫型別／標註介面／與型別系統搏鬥（雖然推論減輕了） | 幾乎零前期成本，打開就寫 |\n| **回收的價值** | 一整類錯永不進 production；重構時編譯器當安全網；型別即文件 | 開發初期飛快、原型／探索性程式爽 |\n| **最痛的時候** | 型別體操（複雜泛型搞到型別比邏輯難寫）、與動態資料邊界搏鬥 | 程式長大後，沒有編譯器擋著，重構像走鋼索、邊界 case 在 prod 炸 |\n\n看出來了嗎——**這是 ch03 那把「效能 vs 生產力」鐘擺的變體。** ch03 講 FORTRAN 時，那場賭是「機器產生的碼能不能跟手寫的一樣快」，本質是「拿一點效能換生產力划不划算」。型別之爭是同一把鐘擺換了座標軸：拿的不是效能，是**早抓錯的安全**；換的不是生產力的全部，是**開發初期的速度與彈性**。靜態型別這邊押「前期多花一點、後期少還很多」；動態型別那邊押「前期快就是王道、錯誤用測試和紀律補」。\n\n而且——這是關鍵——**沒有一邊是絕對對的，因為押注的回報取決於程式的壽命與規模。** 寫一個五十行的腳本、一個一次性的資料清洗、一個探索性的 notebook，動態型別的「零前期成本」幾乎穩賺，你根本活不到「重構時沒安全網」那一天。但寫一個會被五個人維護三年、跑在 production 上服務 50 萬使用者的後端——這正是你的場景——靜態型別那筆「前期多花、後期少還」的帳就壓倒性地划算：你那套全團隊採用的 cache library、那些跨 service 的 DTO，每一次重構若沒有編譯器當安全網，都是在 50 萬使用者面前走鋼索。**你從 JS 轉 TS，不是因為靜態型別「比較對」，是因為你的程式跨過了那條讓這筆帳翻盤的壽命×規模門檻。** 鐘擺沒有正確的一端，只有「對這個專案而言此刻該擺哪邊」。一個資深工程師的標誌，不是死守一邊，是知道自己的專案站在鐘擺的哪個位置、為什麼。\n\n## 形式驗證活在哪裡：為什麼最強那端進不了主流\n\n現在回到光譜最強的那一端——Hoare 1969 的理想：用數學證明程式完全正確。六十年過去，這個理想**沒有**成為主流。你寫後端從來不會「證明」你的 service 正確，你測試它。為什麼？這不是因為理想破滅了——它在某些地方活得好好的——而是一筆**成本帳**算下來的必然結果。\n\n先看它活在哪裡。形式驗證（formal verification，用機器輔助的數學證明確認程式滿足規格）真實地、商業地、救命地運作著，但只在三類地方：\n\n- **晶片**。1994 年 Intel 的 Pentium FDIV bug——浮點除法在極少數情況算錯——逼 Intel 認列約 4.75 億美元的損失把瑕疵晶片換掉。一個 bug 燒掉近五億美元，因為晶片**召回的成本是天文數字、且改不了已出貨的硬體**。這件事直接把形式驗證推進了硬體業：從此晶片大廠用形式方法證明浮點運算單元的正確性，因為證明的成本遠低於再來一次 FDIV。\n- **航太與安全攸關系統**。航空軟體的認證標準 DO-178C 明文接受形式驗證作為證據；Airbus 用形式驗證取代部分安全攸關航電程式的單元測試。原因同上：**一個 bug 等於人命與墜機**，本質複雜度的代價極端到任何前期投入都划算。\n- **作業系統核心與編譯器**。seL4 是第一個被完整形式驗證的微核心——數學證明它的實作符合規格、沒有特定類別的 bug；CompCert 是一個被證明「編譯出的機器碼忠實對應原始碼」的 C 編譯器，是商業產品，用在航太。\n\n看出共通點了嗎？這三類全是**「錯一次就毀滅性、且修補成本極高或根本沒機會修」**的領域。在這些地方，Dijkstra 那句「測試證明不了 bug 不存在」是會死人的——你需要的就是「不存在」這個等級的保證，而形式驗證是唯一給得起的。\n\n那為什麼它進不了你的後端、進不了主流的網頁與 app？成本帳，三筆：\n\n第一，**寫證明的成本是天文數字**。形式驗證一個系統，往往要花比寫這個系統本身多好幾倍、甚至一個數量級的人力與時間，而且需要稀缺的形式方法專家。seL4 那種等級的驗證是以「人年」計的。你的 CRUD service 用幾天寫完，你不可能花幾個月去證明它。\n\n第二，也是更深的一筆——**就算你證明了，你證明的是「程式符合規格」，不是「規格符合你真正要的東西」**。形式驗證把「程式對不對」這個問題，搬成了「規格對不對」這個問題。但寫出一份完全正確、毫無遺漏地捕捉了你真正意圖的規格，本身就極難——而且這個難，是 ch10 要講的 Brooks〈No Silver Bullet〉裡那個**本質複雜度（essential complexity）**：搞清楚「到底要建什麼」這件事，沒有任何工具能替你做。形式驗證能砍掉「實作有沒有忠於規格」這層偶然複雜度，但「規格有沒有忠於需求」這層本質複雜度，它一點忙都幫不上。你在 production 遇到的多數事故，根源往往不是「程式不符合規格」，而是「我們當初根本沒想到這個情況」——而那種 bug，再完美的證明也擋不住，因為它在規格層面就漏了。\n\n第三，**你的世界本來就不確定**。形式驗證在「規格穩定、變更成本極高」的領域最划算（晶片下線就改不了、航電認證後不能亂動）。但你的後端天天在變——需求每週調整、API 每月演化、上游服務不在你掌控內。為一個下週就要改的 service 寫數學證明，等於為流沙澆灌混凝土。\n\n所以形式驗證沒「失敗」，它只是**找到了自己成本划算的棲位**，並理性地待在那裡。這正是本書反覆出現的母題：**沒有銀彈**（ch10 會正式展開）。最強的正確性工具存在、有效、且不會普及——因為它砍的是偶然複雜度，而軟體最貴的那部分複雜度是本質的，砍不掉。形式驗證沒取代測試，不是因為它不夠好，是因為它和測試在對抗複雜度的不同層面工作：證明保證「實作忠於規格」，測試探查「規格之外我沒想到的現實」，而後者——「我沒想到」——是人類認知的本質限制，沒有工具能根除。\n\n（光譜中間還有一檔，介於「完整證明」和「型別檢查」之間：**形式規格**——你不證明整支程式，但用一套精確的數學語言描述「系統該滿足什麼性質」，再用工具檢查模型。你書架上那本《把系統寫成定理：TLA+ 與形式化方法》就把這條路走到底——TLA+ 讓你對「並行系統會不會違反某條不變式」做窮舉檢查，特別適合你那種分散式、最終一致性、冪等消費者的場景。本書不依賴它，但若你想真的動手摸「事前證明」的中間檔位，那本書是入口。這裡點到為止。）\n\n## 複雜度搬去哪了\n\n這一跳（用型別系統／形式方法在執行前排除錯誤）搬動的複雜度，記成一筆帳：\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼負擔** | 把「一整類錯誤」從執行期搬到執行前——型別檢查讓「型別不一致」這類 bug 永遠進不了 production；形式驗證讓「實作不符規格」這類 bug 在數學上被排除。最直接的：你不再在半夜 debug 一個三層之前就空掉的 `undefined`，編譯器在你打字時就攔住它 |\n| **製造了什麼新負擔** | (1) 你得**前置**地把意圖寫成型別／規格——複雜度從「執行期 debug」搬到「開發期標註與設計」。(2) 型別系統本身會長成一門學問——型別體操、複雜泛型、與動態邊界（外部 API、JSON）搏鬥。(3) 形式驗證把「程式對不對」搬成「規格對不對」，而寫對規格是本質複雜度，更難。(4) 強度越高、成本越爆炸——光譜往左走一格，付出的人力是數量級跳升 |\n| **在什麼情況下洩漏／反噬** | 型別系統的洩漏點：邊界。編譯期型別保證**止於程式邊界**——一旦資料從外部進來（API response、`JSON.parse`、`any`、資料庫的 raw row），型別系統就瞎了，你用 `as` 強制斷言的那一刻就在說謊，謊言會在執行期現形。形式驗證的洩漏點：規格與現實的縫——你證明了程式符合規格，但規格漏掉了真實世界的某個情況，證明擋不住那個 bug |\n| **這一跳的帳單一句話** | **複雜度從「執行期的驚嚇」搬到了「開發期的紀律」**——你用「現在多想一點、多寫一點」換「將來少炸一點」；但你能擋掉的只到「型別一致／符合規格」為止，「我到底想要什麼」這層本質複雜度，光譜上沒有任何一檔工具砍得掉 |\n\n最後一格是這章的核心，也是它和全書接榫的地方。型別與形式方法沒有消滅 bug，它們把「對抗 bug」的工作**從事後搬到了事前**——從執行期的偵錯，搬到開發期的標註、設計與證明。這是一筆好交易（早抓的錯便宜得多），但它有一條鐵打的天花板：**這些工具擋的都是「偶然複雜度」類的錯（型別、實作、語法），擋不掉「本質複雜度」類的錯（我們根本搞錯了要建什麼）。** 你那個 `strictNullChecks` 補好了 Hoare 1965 的洞，但它救不了「這個功能本來就不該這樣設計」這種根上的錯——那是 ch10 沒有銀彈、ch19 抽象洩漏要繼續算的帳。型別系統把 null 收編回編譯期，是這條光譜六十年來最普及的一次小勝；而最強那端的形式驗證，依然被供在航太與晶片的神壇上，理性地拒絕走下來——因為它知道，自己砍不掉那筆最貴的本質複雜度。\n\n## 紙上推演\n\n### 推演題一：用「複雜度搬家」拆解 `strictNullChecks` **[15 分鐘] ★★**\n\n你打開 TypeScript 的 `strictNullChecks`。用本書的「複雜度搬家」框架精確回答：(a) 它把哪一類負擔，從哪個時間點，搬到了哪個時間點？(b) 你為這次搬家付的帳單具體是什麼（你打字時多了什麼麻煩）？(c) 把這件事接回 Hoare 1965——`strictNullChecks` 在「補」什麼？\n\n#### 推演解答\n\n(a) 它把「對可能為空的值取屬性」這一類錯誤，從**執行期**（半夜在 production 炸 `undefined is not a function`）搬到了**開發期**（你打字時的紅色波浪線）。本質是把一類 bug 沿著本章那條強度光譜，從「事後跑跑看才發現」往左推到「事前分析就拒絕」。\n\n(b) 帳單：你不能再假設值都存在了。每個可能為空的值，型別變成 `T | undefined`，你被迫在用它之前**顯式處理空的情況**——加判斷、加 optional chaining（`?.`）、加 early return、或在型別層面證明它非空。打字當下多了摩擦，紅波浪線一開始鋪滿螢幕。但這摩擦的位置，精確地等於過去會炸的位置——你只是把 debug 的痛，預付成了打字的麻煩。\n\n(c) `strictNullChecks` 在補 Hoare 1965 那道裂縫。Hoare 當年讓 null 能塞進任何參照型別，等於在型別系統上開了一個官方後門，讓「可能為空」這件事**逃出了型別系統的管轄**——編譯器看一個 `Person` 看不出它其實可能是 null。TypeScript 的可空型別（`T | null`、`T | undefined`）把 null **拉回型別系統的帳本**：強迫你在型別層面承認「這東西可能空」，於是編譯器重新能管它。一句話：六十年後，型別系統終於把當年漏掉的那個特例收編回了編譯期。常見誤解：以為 `strictNullChecks` 是「TypeScript 的一個 lint 嚴格度選項」——不，它是在修一個 1965 年的語言設計缺陷的繼承後果。\n\n### 推演題二：為什麼形式驗證沒有取代測試 **[20 分鐘] ★★★**\n\n形式驗證能用數學「證明」程式正確，比測試強得多。可是你的後端從來只測試、不證明，全世界絕大多數軟體也一樣。用**成本帳**和**本質 vs 偶然複雜度**論證：為什麼最強的正確性工具存在、有效，卻不會普及？（這題預告 ch10 的「沒有銀彈」。）\n\n#### 推演解答\n\n分三層論證。\n\n第一層，**寫證明貴到數量級**。形式驗證一個系統的人力，常是寫它本身的數倍到一個數量級，且需要稀缺的形式方法專家（seL4 的驗證以人年計）。你幾天寫完的 CRUD service，不可能花幾個月證明——成本和回報不成比例。\n\n第二層，也是更深的——**證明只把問題搬家，沒消滅**。形式驗證證明的是「程式符合規格」，它把「程式對不對」搬成了「規格對不對」。但寫一份完整、無遺漏地捕捉真正意圖的規格，本身極難，而且這個難是**本質複雜度**：搞清楚「到底要建什麼」沒有工具能代勞。你 production 上的多數事故，根源是「我們根本沒想到這情況」——這種 bug 在規格層面就漏了，再完美的證明也擋不住，因為證明只保證實作忠於規格，不保證規格忠於現實。\n\n第三層，把它接到 Brooks（ch10 正式展開）：形式驗證砍的是**偶然複雜度**（實作有沒有忠於規格、型別對不對），砍不掉**本質複雜度**（理解問題本身、規格忠於需求）。而軟體最貴的複雜度是本質的。所以「沒有銀彈」：最強的工具也只能砍偶然複雜度那一半。\n\n結論：形式驗證沒「失敗」，它找到了成本划算的棲位——錯一次就毀滅性、規格相對穩定的領域（晶片、航太、核心）——並理性地待在那裡。它和測試不是替代關係，是分工：證明保證「實作忠於規格」，測試探查「規格之外我沒想到的現實」。後者是人類認知的本質限制，無法被根除，所以測試永遠不會消失。常見誤解：以為「形式驗證沒普及＝它不夠成熟、再等幾年就行」。不是。是它砍不到本質複雜度那一半，這是原理上的天花板，不是技術成熟度問題。\n\n### 推演題三（對帳）：你的 OpenAPI schema 算不算一種形式方法 **[15 分鐘] ★★**\n\n你在 CI 裡強制 OpenAPI schema 同步——schema 一旦和實作不一致，CI 就紅。把這個機制放到本章那條「執行前就排除錯誤」的強度光譜上：(a) 它落在哪一檔，憑什麼說它是（或不是）形式方法？(b) 它擋掉了哪一類錯、擋不掉哪一類？(c) 它的「洩漏點」在哪？\n\n#### 推演解答\n\n(a) 它落在光譜中間偏弱、靠近「形式規格／型別系統」那一帶，**算一種輕量形式方法**。理由：OpenAPI schema 是一份**精確的、機器可檢查的規格**——它用一套形式語言描述「這個 API 的請求／回應該長什麼型別」。你在 CI 強制它與實作同步，等於用自動化工具**在執行前**檢查「實作符合這份規格」。這完全是本章的衝動（事前、分析式、排除一類錯）的低強度版，和 Pierce 說型別檢查是「最普及的輕量形式方法」是同一個道理——你只是把型別檢查從「函式邊界」擴大到了「服務邊界」。\n\n(b) 擋掉的：「實作回傳的形狀和契約不一致」這類錯——欄位少了、型別變了、必填變選填，CI 在合併前就攔下，不會等到前端串接或下游消費者在執行期炸。也擋掉「文件與實作不同步」這個經典的人禍。擋不掉的：schema 本身**對不對**——如果你的 schema 設計就錯了（漏了一個狀態、把一個該必填的設成選填、語意理解錯了），CI 全綠，但 API 的行為依然不是使用者要的。這精確對應推演題二的第二層：它保證「實作忠於 schema」，不保證「schema 忠於需求」。\n\n(c) 洩漏點和所有型別系統一樣，在**邊界**。OpenAPI 的保證止於「被它描述的那層介面」。一旦資料穿過邊界——你在 handler 裡 `as any`、上游傳來 schema 沒涵蓋的欄位、執行期的真實 payload 和宣告的型別不符（schema 是「宣稱」，執行期未必驗證每個 byte）——保證就漏了。而且它管的是**形狀**（型別、結構），管不了**業務不變式**（「折扣不能超過原價」這種跨欄位的語意規則）——那種約束要更強的形式規格（如 TLA+，見書架）或執行期驗證才擋得住。一句話：OpenAPI 是型別系統的服務間版本，它的力量和它的盲點，都和 `tsc` 完全同源——強在形狀、瞎在邊界與語意。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過：\n\n1. 為什麼說「靜態型別」和「形式驗證」是同一種衝動的不同強度，而不是兩個不同的領域？（提示：用那條強度光譜講——它們想做的同一件事是什麼？測試為什麼不在這條光譜上、或在哪一端？）\n2. Hoare logic 的 `{P} S {Q}` 在表達什麼？它的野心（相對於測試）為什麼是對 Dijkstra「測試證明不了 bug 不存在」那句話的正面回應？\n3. 把 null 那個個案完整講一遍：Hoare 1965 為什麼加 null、它為什麼從根上戳穿了他自己那套型別系統的保證、為什麼這個決定會遺傳給後世幾乎每個語言？\n4. 「billion dollar mistake」是哪一場演講、哪一年？為什麼說「把它繫到圖靈獎演說」是錯的？（圖靈獎那場演說叫什麼、講的是別的事。）\n5. Pierce 說型別系統是「最普及的輕量形式方法」——這句話為什麼重要？「型別檢查是一種形式方法」這個說法，改變了你怎麼看待你每天按的 `tsc`？\n6. 靜態 vs 動態型別的真實 trade-off 是什麼？為什麼說它是 ch03「效能 vs 生產力」鐘擺的變體、為什麼沒有絕對正確的一邊？（用「壽命×規模門檻」解釋你自己從 JS 轉 TS 的決定。）\n7. 形式驗證真實地活在哪三類領域？這三類有什麼共通點？為什麼它在那裡划算、在你的後端不划算？（要講出成本帳的三筆，特別是「證明只把問題搬成『規格對不對』」那筆。）\n8. 為什麼形式驗證沒有、也不會取代測試？用「本質複雜度 vs 偶然複雜度」講——它砍得掉哪一半、砍不掉哪一半？（這題你該能把答案接到 ch10 沒有銀彈。）\n\n## 延伸閱讀\n\n- **Tony Hoare,〈Null References: The Billion Dollar Mistake〉, QCon 2009（InfoQ 有完整錄影）**（https://www.infoq.com/presentations/Null-References-The-Billion-Dollar-Mistake-Tony-Hoare/）。本章個案的一手出處，**務必看本人親口講**。重點看他怎麼描述 1965 年那個「太容易實作」的決定——你會發現一個圖靈獎得主的自我反省，比任何「null 很爛」的牢騷都有份量。順帶親耳確認：這是 2009 QCon，不是 1980 圖靈獎演說。\n- **C. A. R. Hoare,〈An Axiomatic Basis for Computer Programming〉, *CACM* 1969**（https://dl.acm.org/doi/10.1145/363235.363259 ；經典 PDF 多處可得）。Hoare logic 的原典，只有幾頁。即使你不打算讀完那些推論規則，讀它的引言——感受 1969 年有人認真想「像證明數學定理一樣證明程式正確」這件事的野心，是理解整條光譜「強的那一端」的鑰匙。\n- **Benjamin C. Pierce, *Types and Programming Languages*（TAPL）, MIT Press 2002——讀「Preface / 第 1 章 Introduction」**（https://www.cis.upenn.edu/~bcpierce/tapl/）。型別系統的權威教科書，但你**不必讀內文**（那是型別理論硬核，本書明言不展開）。只讀引言那幾頁，看他怎麼把型別系統定位成「最普及的輕量形式方法」——這幾頁就把本章的主軸講透了。System F、dependent types 想深入，這本是入口。\n- **Gerwin Klein 等, seL4: Formal Verification of an OS Kernel（CACM 摘要版）**（https://cacm.acm.org/research/sel4-formal-verification-of-an-operating-system-kernel/）。想知道「形式驗證真的拿來驗一個能跑的系統」長什麼樣，看這篇。重點不是技術細節，是感受「為了證明一個微核心無 bug 要付出的人力規模」——你會立刻明白為什麼它進不了你的後端。\n- **書架上的《把系統寫成定理：TLA+ 與形式化方法》**。本章光譜的「中間檔位」（形式規格／模型檢查）那本書走到底，特別針對你那種分散式、並行、最終一致性的場景——如果你想真的動手摸「事前證明」而不只是讀歷史，那是下一步。本書到此為止，不展開。\n"}, {"id": "ch09-functional-return", "file": "ch09-functional-return.md", "group": "Part III — 抽象的大廈：物件、型別、函數", "title": "ch09 — 函數式的回歸：被冷落四十年的答案", "md": "# ch09 — 函數式的回歸：被冷落四十年的答案\n\n> **本章解決什麼問題**：ch07 的 OOP 把「資料與行為綁在一起」做成抽象的大廈，ch08 的型別與形式方法用「證明」在執行前排除一類錯誤。但這兩條路都沒正面回答一個 2005 年突然變致命的問題：**當一台機器有很多顆核心、很多條 thread 同時改同一份資料時，怎麼不出錯？** 這章撞的是**並行的牆**——共享可變狀態（shared mutable state）讓 race condition、deadlock 變成沒人能在腦中完整模擬的複雜度。而答案早在四十年前就有人給了：函數式編程的「不可變＋純函數」。它從 Lisp 和 lambda calculus 出發，被主流冷落四十年，又因為一件硬體事件（時脈撞牆、核心數開始長）突然變得值錢。這是全書「鐘擺」與「老答案等到問題出現才被需要」最乾淨的一個案例（ch21 收）。你做 SQS 冪等消費者時用的直覺，就是它。\n\n## 從你已知的出發\n\n你已經在用函數式編程的核心直覺了，只是沒人這樣跟你說。\n\n回想你那套 event-driven 結算 pipeline：K8s CronJob 把任務丟進 SQS，下游一個 idempotent consumer 把訊息撈出來、算帳、寫結果。你在設計它的時候，腦子裡其實一直在繞同一件事——**這條訊息可能被送兩次。** SQS 是 at-least-once 投遞，網路會抖，consumer 可能在 ack 之前就掛掉、訊息於是回到佇列被別人再撈一次。所以你做了一件事：讓「處理一條訊息」這個動作**重複執行幾次，結果都一樣**。同一張帳算兩遍，第二遍要嘛被去重擋掉、要嘛覆寫成同樣的值，總之不會多扣一次錢。\n\n這個性質有個名字，你天天在講：**冪等**（idempotent）。\n\n現在把它翻譯成另一套語言。一個「重複執行結果都一樣」的操作，意味著它**不依賴、也不偷改任何外部的可變狀態**——它要的東西全在輸入裡，它的效果全在輸出裡，跑一次跟跑十次對世界的影響一樣。如果一個函式滿足這個條件，函數式編程管它叫**純函數**（pure function）。你為了讓 consumer 能安全重試而逼近的那個性質，正是純函數的性質。你不是在「用函數式」，但你被分散式系統的現實逼著，獨立重新發明了它的一半。\n\n而你之所以能放心讓多個 consumer **平行**撈同一個佇列、不必擔心它們互相踩到對方算到一半的中間結果，是因為每條訊息的處理彼此**沒有共享可變狀態**——A 算 A 的帳、B 算 B 的帳，誰也不碰誰的記憶體。這是函數式編程的另一半直覺：**沒有共享可變狀態，就沒有 race condition。** 你靠它換來了「可以橫向加 consumer 來提高吞吐」這件事，而你大概從沒想過，這個讓你能平行擴展的設計原則，跟 1958 年 McCarthy 設計 Lisp 時的某個選擇是同一個東西。\n\n這章要做的，就是把這條線接起來：一個四十年前就被想清楚、卻被主流冷落了四十年的答案，怎麼會在 2005 年因為一件硬體事件突然變得人人都需要——而你，在完全不知道這段歷史的情況下，早已在用它。\n\n## 另一個計算的根：lambda calculus\n\n我們得先回到比 Lisp 還早的地方，因為函數式編程的根不在某個語言，在一套數學。\n\nch02 講過圖靈 1936 年的〈On Computable Numbers〉，用一台想像的機器（圖靈機）定義了「什麼叫可計算」。但 1936 年同時，普林斯頓有另一個人——**Alonzo Church**——用一套完全不同的數學給了「可計算」另一個定義，叫 **lambda calculus**（λ-演算）。\n\n兩者長得天差地遠。圖靈機是一條無限長的紙帶、一個讀寫頭、一張狀態轉移表——它把計算想成「一步一步改寫紙帶上的符號」，本質是**狀態的演進**。lambda calculus 裡沒有紙帶、沒有狀態、沒有「下一步」，它只有一種東西：函數。你能做的事只有兩件——定義一個函數、把一個函數套用到一個值上。計算就是不斷地「把函數套用、化簡」，直到化不下去為止。它把計算想成**函數的求值**，全程沒有任何「可變的記憶體」這種東西。\n\n> 一句歷史校準：Church 1935 年提出的原始系統被 Kleene–Rosser 悖論證明不一致，他 1936 年抽出其中能對應「可計算」的那部分（untyped λ-calculus）才站穩。所以引用時寫「1930 年代、1936 定型」最穩。\n\n這裡有個對你關鍵的事實：**這兩套看起來毫無關係的模型，被證明是等價的**——任何圖靈機能算的，lambda calculus 都能算，反之亦然。這個等價（加上後來其他等價模型）就是大家合稱的 **Church–Turing thesis**（注意 thesis 是「論題」不是定理，名稱是後人合稱）。意思是：計算這件事，有至少兩個同樣根本、卻在哲學上對立的描述方式。\n\n把這個對立記牢，因為它就是後面整章的張力——\n\n```text\n計算的兩個根（1936，同一年）\n\n  圖靈機 ──────────────► 計算 = 一步步改寫狀態\n  （Turing）              「機器在做什麼」\n                          狀態會變、有先後、貼著硬體\n                          → 後來的主流：命令式（imperative）\n\n  lambda calculus ─────► 計算 = 把函數套用、化簡求值\n  （Church）              「值是什麼」\n                          沒有可變狀態、沒有先後\n                          → 後來的潛流：函數式（functional）\n\n  兩者等價（Church–Turing thesis）\n  但「哪一個對應到真實硬體」決定了誰當主流\n```\n\n馮紐曼架構的真實機器——有記憶體、有位址、你往位址裡**寫值**、值會**變**——長得幾乎就是圖靈機的物理版。所以命令式編程（你 `x = x + 1`、改變一個變數的值）是「順著硬體長相」的那條路，它幾乎不需要解釋就贏了。lambda calculus 那條路——「不要有會變的狀態、一切都是求值」——在 1936 年看起來像個漂亮但不切實際的數學玩具：真實機器明明就是靠改記憶體在算，你硬要假裝沒有可變狀態，圖什麼？\n\n這個「圖什麼」，要等七十年後多核心出現才有答案。先記住：函數式那條路不是某個語言的怪癖，它是計算的兩個理論根之一，從一開始就在那裡。\n\n## 四十年潛流：Lisp、ML、Haskell\n\n函數式那條根第一次長成能跑的語言，是 **Lisp**（McCarthy，1958 構思、1960 論文）。ch04 已經把 Lisp 講過一輪（程式即資料、garbage collection 的誕生），這裡只補它跟本章相關的那一面：Lisp 把 lambda calculus 的「函數是第一等公民」帶進了真實程式——函數可以被當值傳遞、可以當參數、可以當回傳值。你今天在 JavaScript 裡隨手寫的 `arr.map(x => x * 2)`，把一個函數 `x => x * 2` 當參數傳給另一個函數 `map`，這個動作的血緣直接通到 1958 年的 Lisp，再通到 1936 年 Church 的 lambda。`lambda` 這個關鍵字本身就是 Church 的 λ。\n\n但 Lisp 沒有把「不可變」做成紀律——它允許你改變狀態（`setq`、改 list 的內容），只是不鼓勵。真正把函數式推向「純粹」的，是後面兩步：\n\n**ML（Milner，1970 年代，Edinburgh）。** ch08 從型別的角度講過它（Hindley–Milner 型別推論）。從函數式的角度，ML 的貢獻是把「函數是核心、用型別系統撐住」這套做法做成了一個嚴肅的語言，影響了後來幾乎所有帶型別推論的函數式語言。\n\n**Haskell（委員會，1990）。** 這是函數式「純粹化」的終點。1985 年 David Turner 的 Miranda 證明了「惰性、純函數」的語言可以好用，但它是專有軟體。1987 年 FPCA 研討會上，一群研究者決定為這類語言定一個開放標準，委員會在 **1990 年 4 月 1 日**發表了第一份 Haskell Report（Haskell 1.0）。\n\nHaskell 做了一件之前的函數式語言都沒做到底的事：**預設不可變、預設純粹**。在 Haskell 裡，一個變數一旦綁定就不能再變（沒有 `x = x + 1` 這種事，那在 Haskell 裡根本講不通）；一個函數預設不能有副作用（不能偷偷改外部狀態、不能直接印東西到螢幕）。如果你**真的**要跟外界互動——讀檔、印字、改狀態——Haskell 逼你把這件事用型別系統明白標記出來（這就是 monad 的用途之一）。\n\n> 不涵蓋：monad 是什麼、category theory 怎麼回事——本書不教，一句話帶過：你可以先把 monad 理解成「Haskell 用型別把『有副作用』這件事標記並隔離起來的機制」，細節見章末延伸閱讀。Haskell 語法本書也不教，這裡只取它「純粹到底」這個設計決策。\n\n把這條潛流畫出來：\n\n```text\n函數式的潛流（四十年沒進主流）\n\n  lambda calculus（Church, 1936）── 理論根：沒有可變狀態\n        │\n        ▼\n  Lisp（McCarthy, 1958–60）─────── 函數是第一等公民；但允許改狀態\n        │\n        ▼\n  ML（Milner, 1970s）───────────── 函數式＋型別推論，認真的語言\n        │\n        ▼\n  Miranda（Turner, 1985）────────── 惰性、純，但專有\n        │\n        ▼\n  Haskell（委員會, 1990）────────── 預設不可變、預設純：純粹化的終點\n        │\n        │  ……然後在學界與小圈子裡待了十五年，主流沒興趣……\n        ▼\n  2005：硬體出事，這套東西突然變值錢\n```\n\n注意這條線從 1936 拉到 1990，五十多年，**始終是潛流**——它在學界、在編譯器研究、在少數信徒手裡活著，但你打開任何一本 1990 年代的「找工作該學什麼」清單，上面是 C、C++、後來的 Java，不會是 Haskell。為什麼？\n\n## 為什麼主流冷落它四十年\n\n不是因為函數式不好，是因為**它解的問題在 2005 年之前還不夠痛**，而它的代價在 2005 年之前看起來純粹是賠本。三筆代價：\n\n**第一，它逆著硬體長。** 真實機器就是一塊可以反覆讀寫的記憶體。命令式編程「把值寫進位址、之後改它」是硬體的母語，幾乎零翻譯成本。函數式說「不要改值，每次都產生新的值」——在單核心時代，這聽起來純粹是浪費：明明改一個 byte 就好，你卻要複製一整份。不可變在當年是一種你付得起、但看不出回報的奢侈。\n\n**第二，效能帳當年是負的。** 不可變意味著大量的「產生新值、丟棄舊值」，這給 garbage collector 很大壓力（ch04 講過 GC 的帳）；惰性求值（Haskell 的特色）難以預測什麼時候真的算、佔多少記憶體。在一個「效能就是一切、機器比人貴」的年代（回想 ch03，FORTRAN 之所以難被接受就是因為大家怕編譯器產出的碼慢），一個「為了優雅而犧牲效能」的範式，賣不出去。\n\n**第三，也是最深的——心智模型的慣性。** 整個產業是踩著命令式長大的：你被教「程式是一連串步驟，改變狀態直到達成目標」。迴圈、計數器、可變陣列、`for (i = 0; i < n; i++)`——這是幾代工程師的母語。函數式要你換一套想法：不要想「怎麼一步步改」，要想「結果是輸入的什麼函數」；不要寫迴圈改計數器，要寫 `map`／`reduce` 把一個集合變換成另一個。這個切換對一個已經會寫命令式的人來說，是逆著肌肉記憶走，貴得要命。沒有夠痛的理由，沒人想付這個學習成本。\n\n所以四十年的冷落不是業界瞎了眼。在**單核心、效能至上、大家都會寫命令式**的世界裡，函數式的帳本確實是：代價明確（逆硬體、效能差、要重學），好處模糊（「更乾淨」「更好推理」這種說不出具體錢的東西）。理性的選擇就是不選它。\n\n直到那個讓好處變得具體、而且具體到要命的事件發生。\n\n## 個案：免費的午餐結束了（2005）\n\n2005 年 3 月，*Dr. Dobb's Journal* 登了一篇文章，標題是 **〈The Free Lunch Is Over: A Fundamental Turn Toward Concurrency in Software〉**，作者 **Herb Sutter**（C++ 標準委員會的核心人物之一）。這篇文章後來被當成一個時代的分界線。它講的事，用一句話說就是：**程式設計師躺著就能變快的好日子，結束了。**\n\n先講清楚那個「免費的午餐」是什麼。在 2005 年之前，有一條鐵律般的經驗：你的程式今天跑得慢沒關係，**什麼都不用做**，等個一年半載換一台新 CPU，它就自動變快了——而且常常是快一倍。你不用改一行程式碼，效能就隨硬體白白漲上來。這就是「免費的午餐」：硬體的進步幫你買單，你只管寫，速度它會給。\n\n這頓午餐是怎麼供應的？CPU 變快，傳統上靠幾條路一起推（Sutter 文中歸納的主要有：**時脈頻率（clock speed）愈拉愈高、單條指令流的執行最佳化（instruction-level parallelism）、以及更大的 cache**）。其中最直接、最像「免費」的就是時脈：同一種程式，時脈從 1 GHz 變 2 GHz，幾乎所有東西都跟著快一倍，程式設計師什麼都不必懂。\n\n問題是時脈這條路**撞牆了**。把時脈拉高要付出的功耗與發熱，到了 2000 年代初開始失控——頻率再往上推，晶片會熱到化掉，功耗曲線陡得不可接受（這背後是物理，硬體史的細節本書不展開，指向延伸閱讀）。於是主流 CPU 的時脈大約在 **3 GHz 一帶停了下來**，不再像過去那樣年年自動翻倍。Sutter 的文章就是在宣告這件事已成定局：**靠拉時脈白送效能的時代，到頭了。**\n\n那 CPU 製造商怎麼辦？摩爾定律（電晶體數量還在長）還沒停，所以他們把多出來的電晶體拿去做另一件事——**不把一顆核心做得更快，改成在一塊晶片上放更多顆核心**。單核變雙核、四核、八核……一路長下去。算力的總量還在漲，但**漲的形式變了**：以前是「一顆核心變快」，現在是「核心數變多」。\n\n這個轉變對軟體是一記悶棍。Sutter 點破的關鍵在這裡：\n\n- 「一顆核心變快」的午餐是**免費**的——你的舊程式什麼都不改，自動受益。\n- 「核心數變多」的算力**不是免費**的——一個普通的單執行緒程式，無論你給它 4 核還是 64 核，它**只會用到其中一顆**，其餘全部閒置。你的程式不會因為機器有更多核心就自動變快。\n\n換句話說：硬體繼續給你算力，但從此你**得自己寫程式去領**。要榨出多核的效能，你的程式必須**並行化**（parallelize）——把工作拆成很多份、讓很多 thread 同時跑。並行從一個「高效能運算的小眾專業」，一夜之間變成**每個寫主流軟體的人遲早要面對的必修課**。Sutter 那句被反覆引用的判斷大意是：並行將是繼物件導向之後，軟體開發的下一場重大革命（這句是我轉述其論點，非逐字引文）。\n\n## 為什麼是這件事讓函數式變值錢\n\n並行化變成必修，這跟函數式有什麼關係？關係就是**整章的轉折點**：並行化本身極其困難，而它困難的根源，正好是函數式四十年前就決定要消滅的那個東西——**共享可變狀態**。\n\n把並行的痛攤開。當兩條 thread 同時跑、又共用同一份可變的資料時，你會撞上一整類沒人能在腦中可靠模擬的 bug：\n\n- **race condition**：兩條 thread 同時讀同一個變數、各自加一、各自寫回——結果只加了一次，因為它們讀到的是同一個舊值。誰先誰後不確定，所以這個 bug 時有時無、難以重現。\n- **deadlock**：為了防 race，你用鎖（lock）；但兩條 thread 各自鎖住對方要的東西、互相等對方放手，整個卡死。\n- **這類 bug 的共通點**：它們不是「某一行寫錯」，而是「兩段各自正確的程式，在某個你想不到的交錯時序下一起出錯」。可能的交錯時序多到你不可能全部在腦中走一遍——這是人類工作記憶根本裝不下的複雜度（呼應 ch05：人腦追不上的東西就是複雜度的牆）。\n\n> 並行正確性怎麼系統性地推理、怎麼證明一個並行演算法不會出錯——這是一門深學問，你書架上的 TLA+ 書把這條路走到底（用 invariant 與窮舉狀態空間去驗證）。本書不依賴它，只需要你接受一件事：**共享可變狀態下的並行，難到需要專門的形式工具才推理得清。**\n\n現在看函數式給的答案有多直接。並行之所以難，難在「**共享**的「**可變**」狀態」這兩個詞的組合。函數式把這兩個詞**各砍一刀**：\n\n- **不可變**（immutable）：資料一旦產生就不能改。如果沒有任何東西會變，那「兩條 thread 同時改同一個東西」這件事**根本不可能發生**——race condition 在定義上消失了。多條 thread 可以同時讀同一份不可變資料，讀再多次也不會有人改到它，完全安全，不需要鎖。\n- **純函數**（pure function）：函數不依賴也不修改外部狀態，輸出只由輸入決定。一個純函數無論在哪條 thread 上跑、跑幾次、跟誰並行跑，行為都一樣——因為它跟外界沒有任何共享狀態的牽連。你可以放心把一堆純函數的計算撒到不同核心上同時跑，它們之間沒有任何會互相污染的東西。\n\n這就是那個「老答案」。四十年前 lambda calculus 說「計算裡不要有可變狀態」，當時看像不切實際的數學潔癖；Lisp、Haskell 把它做成語言，當時看像逆硬體的奢侈。但 2005 年問題的形狀變了：當「安全地用多核」成為全產業的痛，「沒有可變狀態」這個四十年來的代價，**一夕之間變成了解藥**。不可變不再是浪費——它是你不必為並行寫鎖、不必 debug race condition 的原因。函數式不是突然變聰明了，是**世界終於撞上了它一直在解的那個問題**。\n\n```text\n同一個性質，兩個時代的兩種評價\n\n                    單核時代（~2004 前）      多核時代（2005~）\n  不可變           浪費（多複製、GC 壓力）    解藥（無 race、可並行、免鎖）\n  純函數           綁手綁腳（不能隨意改狀態）  解藥（可隨意撒到多核、可安全重試）\n  ─────────────────────────────────────────────────────────────\n  同樣的代價沒變，變的是「並行」從小眾變必修——\n  於是帳本翻面：以前的負債，成了現在的資產\n```\n\n這是本書「鐘擺」與「老答案等問題出現才被需要」最乾淨的一個標本（ch21 會把它跟其他幾個並列收束）。技術的價值不是絕對的，是**相對於當下的問題**的。一個答案可以正確地躺在那裡四十年，無人問津，不是因為它錯，是因為對應它的問題還沒夠痛。然後問題來了，它就從冷板凳直接上場。\n\n## 它怎麼進了主流（包括你天天寫的）\n\n函數式回歸主流，**幾乎不是**靠大家都改去寫 Haskell——純函數式語言至今仍是小眾。它回歸的方式更聰明也更隱蔽：**主流語言把函數式的好東西一件件偷渡進來**，讓你在寫 JavaScript、寫 Java、寫 C# 的時候，不知不覺就在用函數式的核心觀念。你大概從沒說過「我在寫函數式」，但你天天在用它的三件法寶：\n\n**`map`／`filter`／`reduce`（你天天在寫）。** 你寫 `users.filter(u => u.active).map(u => u.name)`，做的就是函數式那套「不要寫迴圈改計數器、而是把一個集合變換成另一個集合」。`map` 不改原陣列，它**產生一個新陣列**（不可變的做法）；你傳給它的 `u => u.name` 是個純函數。這正是 Lisp 1958 年就有的 `map`，也正是 Google 2004 年那篇 MapReduce 論文的靈感來源——Dean 與 Ghemawat 明說 MapReduce 的名字與概念直接取自 Lisp 的 `map` 和 `reduce`，因為這兩個操作**天生可平行**：對集合裡每個元素套用純函數、彼此互不依賴，所以可以撒到上千台機器同時算。你寫 `arr.map()` 跑在單機，Google 把同一個概念放大到資料中心——是同一個函數式直覺，只是規模差了幾個數量級。\n\n**不可變狀態（你寫 React 在遵守的鐵律）。** 如果你碰過前端，你知道 React 有一條鐵律：**不要直接改 state，要產生一份新的**（`setState({...old, x: 1})`，不是 `state.x = 1`）。為什麼？因為 React 靠「比較新舊狀態的參照是否相同」來快速判斷要不要重繪——如果你原地改了舊物件，新舊是同一個參照，React 偵測不到變化。整個現代前端狀態管理（React、Redux）建立在「狀態不可變、每次更新產生新狀態」這個函數式原則上。你遵守這條鐵律時，你在實踐 Haskell 1990 年就預設的東西。\n\n**ownership 與「預設不可變」的擴散（Rust 借去當地基）。** 函數式的影響甚至滲進了系統程式語言。Rust 不是函數式語言，但它把「控制誰能改、何時能改」做成了語言的核心——它的 ownership / borrowing 機制在編譯期就保證「同一份可變資料不會被兩條 thread 同時改」，從而在編譯期就擋掉一大類 race condition。Rust 變數預設也是不可變（要可變得明寫 `mut`）。這是函數式「管好可變狀態」的洞見，被搬進一個追求極致效能的語言裡，用型別系統來執行。\n\n把這三件法寶接回你最開頭的 SQS pipeline，這章就閉環了：\n\n- 你的 consumer 是**純函數**的逼近——同一條訊息算幾次結果都一樣（冪等），因為它的效果只由輸入決定、不偷改共享狀態。\n- 多個 consumer 能**安全平行**撈同一佇列，因為訊息處理之間**沒有共享可變狀態**——這正是不可變帶來的「無 race 即可平行」。\n- 你能靠「橫向加 consumer」提高吞吐，本質上就是在領那頓 Sutter 說「不再免費」的多核午餐——只是你領的方式不是多 thread 共享記憶體，而是**多個無共享狀態的處理單元各跑各的**。這是函數式直覺在分散式尺度的展開（分散式系統就是把「共享可變狀態」的代價放到最大，所以它最歡迎函數式的做法）。\n\n你不是先學了函數式才這樣設計的。你是被分散式系統「at-least-once 投遞、節點隨時會掛、要能橫向擴展」的現實逼著，獨立走到了和 1936 年 Church、1958 年 McCarthy、2005 年 Sutter 同一個結論：**不可變＋純粹＝可重試、可平行。** 這章只是把你早就在用的直覺，補上了它四十年的身世。\n\n## 複雜度搬去哪了\n\n這一跳（函數式的不可變＋純函數成為治並行複雜度的主流工具）搬動的複雜度，記成一筆帳：\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼負擔** | **並行的一整類最惡 bug**：不可變讓 race condition 在定義上不可能（沒東西會變，就沒有「同時改」）；純函數讓「這段程式並行跑安不安全」變成可以局部判斷的事（不碰共享狀態就安全）。你不必為讀取共享資料寫鎖、不必 debug 那種「時有時無、無法重現」的時序 bug |\n| **製造了什麼新負擔** | (1) **心智模型的切換成本**——逼你從「一步步改狀態」換成「用函數變換值」，逆著幾代人的命令式肌肉記憶。(2) **效能的取捨**——不可變意味著大量「產生新值」，GC 壓力與記憶體用量上升（雖然多核時代「能正確並行」常常比「省那點記憶體」值錢，帳翻面了，但代價本身沒消失）。(3) **副作用沒消失，只是被推到邊界**——真實程式總得讀檔、寫庫、印字，純函數核心外面終究包著一層「不純」的殼，你得管好那層殼（Haskell 用 monad 管，你的後端用「把純計算和 I/O 分開」管） |\n| **在什麼情況下洩漏／反噬** | 當「不可變」只做半套：你以為某個物件不會變，其實某處偷偷原地改了它（JavaScript 的物件預設可變，`map` 給你新陣列但裡面的物件還是共享參照——改了一個元素的屬性，舊陣列也跟著變，這是無數前端 bug 的來源）。或當你以為某函式是純的、其實它偷偷依賴了外部狀態（讀了一個全域變數、看了系統時間），於是它「重複執行結果一樣」的假設破了——你的冪等消費者要是不小心讓處理依賴了「現在幾點」，重試就會算出不同結果，冪等就破功了 |\n| **這一跳的帳單一句話** | **複雜度從「執行期的時序」搬到了「設計期的紀律」**——並行 bug 不再靠執行時加鎖、debug 詭異時序去救，而是靠**設計時就堅持不可變、保持純粹**去避免；代價是這份紀律要時時維持，一旦哪裡破例（偷改了狀態、偷依賴了外部），洩漏就回來找你 |\n\n最後一格是這章的核心，也呼應 ch08：型別與形式方法把「執行期的驚嚇」搬到「開發期的檢查」，函數式把「執行期的時序災難」搬到「設計期的紀律」——**同一個方向：把問題從『跑的時候才爆』往前搬到『寫的時候就擋掉』。** 這是抽象與方法兩條 strand 反覆做的同一件事（ch01 的主張在這裡又一次具體化）。而帳單也一致：往前搬不是免費的，你付出的是「必須時時維持那份紀律」，紀律一鬆，複雜度就從它被搬去的地方漏回來。\n\n## 紙上推演\n\n### 推演題一：用「無共享可變狀態」解釋你的冪等消費者為什麼能安全平行重試 **[15 分鐘] ★★**\n\n口頭講清楚三件事：(a) 你的 SQS idempotent consumer 在什麼意義上「逼近一個純函數」？(b) 為什麼「逼近純函數」這個性質，正好是它能**被重複執行**（重試）而不出錯的原因？(c) 為什麼它又正好是多個 consumer 能**平行**處理同一佇列而不互相污染的原因？把「冪等」「純函數」「無共享可變狀態」三個詞串成一條因果。\n\n#### 推演解答\n\n(a) **逼近純函數的意思**：你的 consumer 處理一條訊息時，理想上「要的東西全在訊息裡（輸入）、做的事全反映在結果寫出（輸出）」，過程中不偷改任何別人也在用的可變狀態。純函數的定義就是「輸出只由輸入決定、無副作用」——你的 consumer 為了能安全重試，被迫往這個方向靠。（之所以是「逼近」而非「純粹」：它終究有副作用——它要寫資料庫。關鍵是它把這個副作用設計成**冪等的**：寫第二次覆寫成同樣的值，所以從外界看，跑一次跟跑兩次效果一樣，行為上等同純函數。）\n\n(b) **為什麼這讓它能重試**：重試＝同一個輸入再跑一次。如果這個操作的效果**只由輸入決定**，那再跑一次必然得到同樣的效果——多算的那次要嘛被去重擋掉、要嘛覆寫成同值，世界的狀態不變。反過來，如果你的 consumer 依賴或修改了某個會變的外部狀態（比如「在現有餘額上扣錢」這種讀-改-寫），那重試第二次讀到的是已經被第一次改過的狀態，結果就錯了（扣兩次）。冪等的本質，就是把「讀-改-寫」這種依賴可變狀態的操作，改寫成「給定輸入算出最終值、直接設定」這種純函數式的操作。\n\n(c) **為什麼這讓它能平行**：兩個 consumer 各處理一條不同的訊息時，如果它們之間沒有共享可變狀態——A 不會改到 B 算到一半的中間結果，反之亦然——那它們同時跑就跟分開跑結果一樣，沒有 race condition。這正是函數式「無共享可變狀態 ⇒ 無 race ⇒ 可安全並行」的直接套用。你能「橫向加 consumer 提吞吐」，本質上就是因為你的設計逼近了這個無共享狀態的理想。\n\n一句話收束：**冪等是純函數在分散式裡的化名，而純函數的兩個紅利——可重試、可平行——就是冪等消費者最值錢的兩個性質。**\n\n### 推演題二：用硬體鐘擺解釋「為什麼函數式等到 2005 才紅」 **[15 分鐘] ★★**\n\n有人說「函數式 2010 年代才紅，是因為大家終於懂了它的優雅」。用本章的史實反駁這個說法，給出真正的因果。要點出：函數式被冷落四十年的三個真實原因、2005 年改變了什麼、為什麼是「問題變了」而不是「人變聰明了」。\n\n#### 推演解答\n\n「大家終於懂了優雅」這個說法把因果搞反了，而且帶著一種「以前的人比較笨」的傲慢。函數式的優雅四十年來一直在那裡，學界一直懂，業界不是不懂，是**算過帳之後理性地不選它**。\n\n被冷落的三個真實原因：(1) **逆硬體**——真實機器就是可讀寫的記憶體，命令式「改值」是硬體母語、零翻譯成本，函數式「不可變」在單核時代純粹是浪費。(2) **效能帳是負的**——不可變帶來大量產生新值、GC 壓力，惰性求值難預測，在「機器比人貴」的年代賣不出去。(3) **心智模型慣性**——幾代人踩著命令式長大，換範式逆著肌肉記憶，學習成本高，而好處（「更好推理」）在單核時代換不成具體的錢。\n\n2005 年改變的不是人的智商，是**問題的形狀**：時脈撞牆（約 3 GHz 停住）、CPU 改靠堆核心數成長、於是「安全地用多核」從小眾變成全產業必修；而並行的核心難點正是「共享可變狀態」造成的 race／deadlock。函數式四十年前就決定砍掉可變狀態——這個當年的代價，現在直接變成「不必為並行寫鎖、不必 debug 時序 bug」的解藥。\n\n所以真正的因果是：**不是函數式變好了，是世界終於撞上了它一直在解的那個問題。** 這是鐘擺：硬體從「單核拚時脈」擺向「多核拚並行」，把一個躺了四十年的答案從冷板凳直接推上場。技術的價值是相對於當下問題的——同一個答案，問題不夠痛時無人問津，問題夠痛時人人需要。（這個「老答案等問題出現才被需要」的模式，ch21 會跟其他幾個並列。）\n\n### 推演題三（對帳）：你的程式碼裡哪些是純函數、哪些是被可變狀態污染的麻煩來源 **[20 分鐘] ★★★**\n\n挑你最近寫的一個 service（或一段不小的模組），把它的函式分成三堆：(1) **真正的純函數**（輸出只由輸入決定、無副作用）；(2) **被可變狀態污染、但其實能改純的**（它依賴或修改了某個外部可變狀態，但這個依賴是可以拿掉的）；(3) **本質上就得有副作用的**（讀庫、寫庫、發網路請求、印 log）。然後針對第 (2) 堆，挑一個，說明「把它改純」會讓它在並行或測試上多出什麼好處。\n\n#### 推演解答\n\n這題沒有標準答案，但有標準的判斷框架，三堆各自的識別法：\n\n**第 (1) 堆（純函數）**最好認：給它同樣的輸入，它永遠回同樣的輸出，而且跑完世界沒有任何變化。你的計算邏輯、資料轉換、驗證規則、格式化——這些通常是純的。純函數是你程式裡最好測（不用 mock、餵輸入比對輸出就行）、最好並行（撒到多核無所謂）、最好推理（看它就懂，不用追外部狀態）的部分。理想的架構是讓這堆盡可能大。\n\n**第 (3) 堆（本質副作用）**也好認：它存在的目的就是跟外界互動——寫資料庫、呼叫別的服務、發訊息、印 log。這堆**砍不掉**（程式總得跟世界互動，否則沒用），這是本質複雜度（ch10 的詞）。能做的不是消滅它，是**把它推到邊界、集中管理**，別讓副作用散落在純計算中間。\n\n**第 (2) 堆是真正的功課**：那些「其實能純、卻被偷偷污染了」的函式。典型污染源——讀了一個全域可變變數、看了 `Date.now()` 或系統時間、依賴了某個會被別處改動的快取、在計算中間順手改了傳進來的參數（mutate argument）。挑一個來改純，好處有二：(a) **可測**——一個讀系統時間的函式很難測（你得想辦法 mock 時間），把時間改成參數傳進去，它立刻變純、變好測；(b) **並行／冪等安全**——一個偷改傳入參數或偷依賴外部狀態的函式，在並行下可能跟別人撞、在重試下可能算出不同結果。把它改純（要的外部值都當參數傳入、不原地改東西），它就獲得了「可安全並行、可安全重試」這兩個你在 SQS pipeline 裡最需要的性質。\n\n收束：好的設計不是「全部純」（不可能，總得有副作用），是**把純的核心做大、把不純的殼做薄並推到邊界**。你維護過的最難 debug 的並行／時序 bug，回頭看，幾乎都出在第 (2) 堆——一個本該純、卻偷偷依賴或修改了共享可變狀態的函式。函數式給你的不是「全用 Haskell」，是「認得出第 (2) 堆，並有意識地把它往第 (1) 堆推」這個判斷力。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過：\n\n1. lambda calculus 和圖靈機都定義了「可計算」，它們在「怎麼想像計算」這件事上根本的不同是什麼？為什麼說命令式編程是「順著馮紐曼硬體長相」的那條路，而函數式是另一條？\n2. 函數式從 Lisp（1958）到 Haskell（1990）這條線，Haskell 比前面的函數式語言多做了哪件決定性的事？（提示：預設不可變、預設純。）\n3. 為什麼主流冷落函數式四十年？講出三個真實原因，並說明它們**都不是**「業界沒眼光」。\n4. 「免費的午餐」具體指什麼？2005 年它為什麼結束了？把「時脈撞牆」「改堆核心數」「單執行緒程式只用得到一顆核心」串成因果。\n5. 並行為什麼難？把難點精確定位到「共享」的「可變」狀態這兩個詞，並說明 race condition 為什麼是一種「人腦工作記憶裝不下」的複雜度。\n6. 函數式怎麼一刀砍掉並行的難點？分別說明「不可變」消滅了什麼、「純函數」保證了什麼。\n7. 為什麼說這是「鐘擺」與「老答案等問題出現才被需要」的標本？同一個性質（不可變）在單核時代和多核時代的評價為什麼會翻面——變的是技術還是問題？\n8. 把你的 SQS 冪等消費者用本章的語言重講一遍：它在什麼意義上逼近純函數？這個性質為什麼同時給了它「可重試」和「可平行」兩個紅利？\n\n## 延伸閱讀\n\n- **Herb Sutter, 〈The Free Lunch Is Over: A Fundamental Turn Toward Concurrency in Software〉, *Dr. Dobb's Journal* 2005-03**（http://www.gotw.ca/publications/concurrency-ddj.htm）。本章個案的源頭，不長，**一定要讀**。重點看他怎麼論證「時脈撞牆、未來是並行」，以及那句「免費午餐結束」對整個產業意味著什麼——讀完你會懂為什麼一篇 2005 年談 CPU 的文章，會讓函數式四十年後翻身。\n- **John McCarthy, 〈Recursive Functions of Symbolic Expressions and Their Computation by Machine, Part I〉, *CACM* 1960**（http://jmc.stanford.edu/articles/lisp/lisp.pdf）。Lisp 的原典（ch04 也引）。從本章角度，看它怎麼把「函數是第一等公民」帶進真實程式——你今天的 `arr.map(fn)` 血緣直通這裡。\n- **Jeffrey Dean & Sanjay Ghemawat, 〈MapReduce: Simplified Data Processing on Large Clusters〉, OSDI 2004**（https://research.google.com/archive/mapreduce-osdi04.pdf）。看 Google 怎麼明說 MapReduce 的名字與概念取自 Lisp 的 `map`／`reduce`，以及「純函數天生可平行」這個性質如何被放大到上千台機器——你 `arr.map()` 的資料中心版本。\n- **Paul Hudak et al., 〈A History of Haskell: Being Lazy with Class〉, 2007**（https://www.microsoft.com/en-us/research/wp-content/uploads/2016/07/history.pdf）。Haskell 委員會自己寫的歷史，講清楚 1987 FPCA 為什麼決定組委員會、Miranda 的影響、為什麼選擇「純粹到底」。想知道「純函數式」這個極端選擇背後的取捨，看這篇。\n- **Stanford Encyclopedia of Philosophy, 〈The Church–Turing Thesis〉**（https://plato.stanford.edu/entries/church-turing/）。想把「lambda calculus 與圖靈機等價」這件事弄精確、搞懂 thesis 為什麼是「論題」不是定理，看這條——但只需要讀到「兩個模型等價、各自如何定義可計算」即可，後面的哲學辯論本書用不到。\n"}, {"id": "ch10-mythical-man-month", "file": "ch10-mythical-man-month.md", "group": "Part IV — 流程的戰爭", "title": "ch10 — 人月神話：複雜度的人性面", "md": "# ch10 — 人月神話：複雜度的人性面\n\n> **本章解決什麼問題**：前面九章，對抗複雜度的主角不是機器就是程式——抽象 strand 蓋了組語、編譯器、語言、結構、物件、型別、函數的大廈，方法 strand 也在 ch05 用結構化編程登過一次場。但有一面牆，這些全都翻不過去：軟體最終是**人**寫的、**一群人**一起寫的，而人腦的容量、人與人之間的溝通成本、一群人能不能共享同一個願景——這些是任何工具都搬不走的複雜度。1975 年，一個剛從 IBM OS/360 的火坑裡爬出來的經理把這面牆寫成了一本書。本章交給你三件全書級的手術刀：**Brooks's Law**（加人到遲到的專案讓它更遲到）、**概念完整性**、以及 1986 年那篇《No Silver Bullet》劃下的**本質複雜度 vs 偶然複雜度**之分——這把刀後面 ch19（抽象洩漏）、ch20（AI 輔助編程）都要再拿出來用。順帶第一次引入 **Conway's Law**，預告它在微服務章（見 ch17）的回收。這是 Part IV「流程的戰爭」的第一章；ch11 講被讀反的瀑布、ch12 講反叛它的敏捷，但要先有 Brooks 把「複雜度的人性面」攤開，那兩章的戰爭才有戰場。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 ◄你在這裡 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n你進入 Part IV 了。前三個 Part 講的是「用什麼蓋、怎麼把程式本身寫好」；接下來三章換一個主角——**一群人怎麼一起蓋**。這條線的源頭，就是 Brooks。\n\n## 從你已知的出發\n\n你帶過一個 greenfield 專案——AWS ECS、TypeScript、NestJS、做 B2B/B2C 的資料中介。它一開始只有你和另外兩三個人。那段日子有種奇特的順暢：一個決定在白板上畫五分鐘就拍板，誰都知道為什麼某個欄位叫那個名字、為什麼那層快取要那樣失效，因為那些決定全在同一群人腦子裡。程式碼有一種「一個人寫出來的」氣質——命名一致、邊界一致、連錯誤處理的風格都一致。\n\n然後專案成功了，於是要加人。這是好消息，也是你第一次撞上本章的牆。\n\n**第一個場景：加人沒有加速。** 季度壓力大、deadline 在逼，上面說「再給你三個工程師」。你心裡其實清楚，但還是抱著一絲希望接了。結果頭一兩個月，你的交付速度不但沒變快，反而**變慢了**。新人要看懂這套 cache library 怎麼分層、要搞清楚 OpenAPI 契約為什麼 CI 會擋、要學會那套自製的 Lambda decorator 框架——這些東西的知識在老成員腦袋裡，傳出去要花時間。而你，那個最懂全局的人，被迫停下手邊的活去帶人、去回答問題、去 review 他們踩坑的 PR。你親身驗過一件反直覺的事：**人月不是一個可以隨意拆分的單位**。一個人做十二個月的事，丟給十二個人，不會在一個月內做完——有些工作就是有它自己的最短時間，而溝通與帶人的成本還會反過來吃掉你本來有的速度。\n\n**第二個場景：沒有一致願景的 codebase 會分裂。** 團隊一大，你開始在 code review 裡看到裂縫。三個人實作三個 service，三種錯誤處理風格、三種命名慣例、三種對「什麼該放 cache」的理解。沒有一條是錯的，但它們**湊不成一個整體**。一個新來的人讀這套程式碼，再也感覺不到「一個人寫出來的」那種一致性——它變成了一堆各自合理、合起來彆扭的決定。於是你做了一件事：你訂了團隊慣例。你規定全團隊用同一套 cache library、用同一個 decorator 框架、CI 強制 OpenAPI 同步。你當時可能覺得這只是「工程紀律」，但你其實在做一件 Brooks 在 1975 年命名過的事——你在用人為的手段，搶救一個正在流失的東西：**概念完整性**。\n\n**第三個場景：服務邊界長得像組織圖。** 回頭看你切的微服務邊界，你會發現一件有點不安的事：它們往往不是照「最乾淨的技術分界」長的，而是照**團隊的邊界**長的。哪個服務歸哪個小組維護，邊界就劃在那裡；兩個服務之間的 API 有多囉嗦，往往反映的是那兩個小組平常溝通有多順。這不是巧合。這是一條 1968 年就被寫下來的定律在你的 AWS 帳號裡活生生上演——Conway's Law。本章只先把它放上檯面、講清楚它在說什麼；它在微服務世界的完整展開，我們留到 ch17。\n\n這三件事——加人沒加速、codebase 分裂、邊界照組織長——是同一本書的三個章節。那本書叫《人月神話》，作者剛從一個比你的專案大上幾百倍的火坑裡爬出來。本章告訴你他在那個火坑裡學到什麼，以及為什麼他學到的東西，五十年後在你的 ECS 叢集上仍然分毫不差。\n\n## OS/360：一個把「人月」這個詞燒成灰的專案\n\n要懂 Brooks，得先懂他是在什麼地方學到這些的。不是在課堂上，是在 1960 年代 IBM 史上最大的一場軟體豪賭裡。\n\n1964 年，IBM 發表 System/360——一個野心驚人的計畫：一整個系列、從小到大相容的電腦，跑同一套指令集、同一套作業系統。硬體本身是場豪賭，而配套的作業系統 **OS/360** 是那場豪賭裡最難的一塊。Brooks（Frederick P. Brooks Jr.）是 System/360 硬體的專案經理，後來又接手 OS/360 的開發管理。這個專案的規模在當年是空前的：上千名程式設計師、數百萬行程式碼、跨好幾年。它嚴重延遲、嚴重超支，而且——這是最關鍵的——**它的延遲不是因為某個人偷懶或某個技術選錯了，而是因為當專案落後時，他們做了那件「看起來最理所當然」的事：加人**。\n\n加了人，更慢了。Brooks 在火裡待了夠久，久到他看清這不是他管理不善，而是一種**結構性的、可以推導的現象**。1975 年，他把這段經驗寫成《人月神話》（*The Mythical Man-Month*；1995 年出了加入新文章的二十週年增訂版）。書名本身就是論點：**「人月」（man-month）這個單位是個神話**。\n\n「人月」這個詞假設了一件事：人和時間是可以互換的。一個專案要 12 個人月，意思好像是「12 個人做 1 個月」等於「1 個人做 12 個月」等於「6 個人做 2 個月」——人數和月數的乘積是個守恆的量，你可以在兩個因子之間自由換算。這個假設在搬磚這種**完全可分割、且工人之間不需要溝通**的工作上成立。但軟體開發兩個前提都不滿足：它的工作**不能任意切分**（有些事必須先做完才能做下一件，順序排好排滿，加人也插不進去），而且它的工作者**必須大量溝通**（每個人都得跟別人協調介面、共享設計決策、對齊對系統的理解）。一旦這兩個前提破掉，「人月」就不是一個守恆量，而是一個會騙人的會計幻覺。\n\n> **流行說法 vs 史實**\n>\n> | 流行說法 | 史實（照查證） |\n> |---|---|\n> | 《人月神話》是一本教你怎麼估算工時的專案管理書 | 它的核心不是估算技巧，而是論證「人和時間不可互換」「軟體的某些複雜度是人性的、搬不走的」 |\n> | 「No Silver Bullet（沒有銀彈）」是《人月神話》1975 原書的內容 | **錯**。它是 Brooks 1986 年的**獨立論文**，1995 年才併進二十週年增訂版。年份務必寫 1986 |\n> | Conway's Law 是 Brooks 提出的 | 不是。是 Melvin Conway 1968 年發表的；Brooks 在《人月神話》裡引用並替它取名「Conway's Law」 |\n\n## Brooks's Law：為什麼加人讓專案更慢，這是數學不是管理失誤\n\nBrooks 把那段火坑經驗濃縮成一句後來被稱為 **Brooks's Law** 的話。原文是：\n\n> \"Adding manpower to a late software project makes it later.\"\n\n**對一個已經遲到的軟體專案加人，會讓它更遲到。** 注意這句話的精確邊界：它說的是「**已經遲到的**專案」加人。專案開始時就配足人手是另一回事；Brooks 的矛頭對準的是那個最常見的反射動作——專案落後了，恐慌之下塞更多人進去救火。這個動作不但救不了，還會火上澆油。為什麼？Brooks 給的理由有兩條，兩條都不是「管理沒做好」，而是冷冰冰的結構。\n\n**第一條：新人的 ramp-up（上手）成本，而且這個成本由最寶貴的人來付。** 新人不是一進來就能產出的。他要學這個專案——技術、目標、整體策略、工作計畫——這段時間他不但不貢獻淨產出，還是個淨負擔。更糟的是，教他的人是誰？是專案裡**最懂全局、因此本來生產力最高**的那些人。你把最值錢的人從產出工作上拉下來去帶新人，等於用你最快的引擎去拖一節暫時空載的車廂。在一個**已經遲到、時間最稀缺**的專案裡，這筆交易特別致命：你付出的是當下最缺的東西（資深人力的時間），換來的回報要好幾個月後新人上手了才兌現——而那時 deadline 早過了。\n\n**第二條，也是更深的一條：溝通成本隨人數呈 O(n²) 成長。** 這是 Brooks's Law 裡最該被當成數學來理解的部分，把它算一遍你就再也不會把它當成一句管理格言。\n\n一個團隊裡，如果每個人都要跟每個其他人協調（對齊介面、共享設計決策、確認對系統的共同理解），那麼 n 個人之間的溝通路徑數是：\n\n```text\n        溝通路徑數 = n × (n - 1) / 2\n```\n\n這個式子的來歷很簡單：每個人要跟其他 (n − 1) 個人溝通，n 個人就是 n × (n − 1)，但「A 跟 B」和「B 跟 A」是同一條路徑，所以除以 2。重點不在式子本身，在它長得多快。把幾個 n 代進去看：\n\n```text\n        n =  3  →  路徑數 =  3        ← 草創期，白板五分鐘拍板\n        n =  6  →  路徑數 = 15\n        n = 12  →  路徑數 = 66        ← 人數翻倍，路徑數變四倍多\n        n = 20  →  路徑數 = 190\n        n = 50  →  路徑數 = 1,225     ← 人數約 4 倍於 12，路徑數近 19 倍\n```\n\n看清楚這條曲線的形狀：**人數線性成長，溝通路徑數平方成長**。你把團隊從 3 人加到 6 人（人力理論上多一倍），溝通路徑卻從 3 條暴增到 15 條（五倍）。從 12 人到 50 人，人力多約四倍，要維護的溝通路徑卻多了將近十九倍。每一條路徑都是真實的成本——一次會議、一次 Slack 來回、一次「等等，這個欄位你那邊是怎麼定義的？」、一次因為兩人理解不一致而生的 bug。\n\n現在把兩條理由疊起來，Brooks's Law 的機制就完整了：你加的人，**新增的淨產出**要好幾個月後才到（被 ramp-up 延後），而他們**新增的溝通負擔**——那一堆新長出來的 O(n²) 路徑——是**立刻生效**的。在一個本來就遲到、時間已經見底的專案裡，立刻到帳的負擔壓過了延後才來的產出，淨效果就是：**更慢**。\n\n```text\n        加人之後，兩股力量的時間錯位\n        ────────────────────────────────────────────\n        溝通負擔（O(n²) 路徑）   ▕████████ 立刻到帳\n        新人淨產出（被 ramp-up） ▕░░░░░░░░░░░░░░░▶ 幾個月後才到\n        ────────────────────────────────────────────\n        在「已經遲到」的專案裡，左邊壓過右邊 → 更遲到\n```\n\n這就是為什麼 Brooks 堅持這是**數學不是管理失誤**。一個再優秀的經理，面對一個必須協同、不可任意切分的軟體任務，加人時也躲不開這條 O(n²) 曲線和這個 ramp-up 延遲。它不是某次失敗專案的特例，是「一群人協作建構一個必須概念一致的東西」這件事的固有性質。你那次「加三個人反而變慢」的親身經歷，不是你帶人帶得差——你只是在不知道名字的情況下，重演了一遍 1960 年代 OS/360 的縮小版。\n\n值得補一句 Brooks 自己提的緩解方向，免得你把這條定律讀成「永遠不能加人」。他並不是說團隊不能成長，而是說：要對抗 O(n²)，就得想辦法**讓不是每個人都得跟每個人溝通**——把人組織成有結構的小團隊、用清楚的介面把子團隊隔開，讓溝通路徑不要全連通。他著名的「surgical team（外科手術團隊）」構想就是這個思路：像一台手術由一位主刀醫師主導、其他人各司其職地輔助，而不是十個外科醫師圍著病人同時動刀。這個「用結構切斷不必要的溝通路徑」的直覺，你其實天天在用——你切微服務、定義 API 契約、把團隊拆成有明確邊界的小組，做的正是把全連通的 O(n²) 圖剪成幾個稀疏連通的子圖。這條線會在 ch17 接回 Conway's Law。\n\n## 概念完整性：比多塞功能更重要的東西\n\n如果說 Brooks's Law 解釋了你「加人沒加速」的痛，那 Brooks 的第二把刀——**概念完整性（conceptual integrity）**——解釋了你「codebase 會分裂」的痛，以及你為什麼會本能地去訂團隊慣例。\n\nBrooks 的主張很尖銳：**一個系統的概念完整性，比它擁有多少功能更重要。** 他的原話大意是，與其要一個塞滿了各種獨立好點子、但彼此不協調的系統，不如要一個功能少一點、但每個部分都服從同一套設計理念的系統。一個概念一致的系統，使用者學一部分就能推測其他部分（因為它們遵循同樣的規律）；一個概念分裂的系統，每個角落都要重新學，因為它由一群各自為政的好主意拼湊而成。\n\n問題是：概念完整性怎麼來？Brooks 的答案在當年很不民主，但他認為這是物理事實——**概念完整性只能來自少數人、甚至一個人的心智**。他主張把**架構（architecture）與實作（implementation）分離**：由一位首席架構師（或一個極小的架構團隊）代表使用者的利益，決定「什麼進系統、什麼不進」，定義整套概念；而實作交給更大的團隊去填。架構是「系統對使用者呈現出來的完整概念模型」，實作是「怎麼把它做出來」——前者必須出自統一的心智，後者才能分工。\n\n這背後其實是 Brooks's Law 的另一面。為什麼概念完整性難？因為一旦參與設計決策的人變多，那條 O(n²) 的溝通曲線就保證了**不可能**讓每個人對「整個系統該長什麼樣」達成同樣細緻的共識——共識會在傳遞中走樣，每個人腦中的「系統該是什麼樣」都會略有不同，而這些細微的不同，最後就長成你 code review 裡看到的那三種錯誤處理風格、三種命名慣例。概念完整性會自然流失，這是溝通成本的必然後果。要對抗它，就得人為地把「定義概念」這件事收斂到極少數人手上，讓它不要散到 O(n²) 的網裡去稀釋掉。\n\n現在回頭看你做的事。你訂團隊慣例——全團隊用同一套 cache library、同一個 decorator 框架、CI 強制 OpenAPI 同步——你做的正是 Brooks 說的「人為搶救概念完整性」。你那套 cache library 之所以該全團隊統一，不只是為了少寫重複程式碼，更是為了讓「快取在這個系統裡是怎麼一回事」只有**一個**答案，而不是每個 service 一個答案。你的 OpenAPI CI 強制同步，是在用工具當「架構師」，逼所有人服從同一套契約定義。你在無意識中執行 Brooks 1975 年的處方：**當人多到概念會分裂時，用紀律和工具把「定義概念」這件事重新收斂起來。** 你不是團隊裡有潔癖的那個人，你是那個在替整個系統守住「一個人寫出來的」那種一致性的人。\n\n順帶一提 Brooks 在同一本書裡的另一個有名的小刀：**second-system effect（第二系統效應）**。一個架構師設計他的**第二個**系統時，是他這輩子最危險的時候——因為他會忍不住把第一個系統裡因為時間/經驗不足而忍痛砍掉的所有功能，一股腦全塞進第二個，結果做出一個臃腫、過度設計的怪物。這跟概念完整性是同一個硬幣的兩面：第一個系統往往因為資源受限反而保有了某種精簡的一致性，第二個系統則因為「這次我什麼都要」而失去了它。你大概在某個「重寫版本 2.0」的專案裡見過這隻怪物。\n\n## No Silver Bullet：本質複雜度 vs 偶然複雜度——全書的手術刀\n\nBrooks 留給這本書最鋒利的一把刀，不在 1975 年的原書裡。它在 **1986 年的一篇獨立論文**《No Silver Bullet — Essence and Accident in Software Engineering》（沒有銀彈——軟體工程中的本質與偶然）。這個年份是「大家最容易記錯」的熱點之一：很多人以為「沒有銀彈」是《人月神話》原書的章節，**不是**——它是十一年後的論文，1995 年才被收進二十週年增訂版。寫到這個概念時，年份請務必標 1986。\n\n論文開頭是一個讓它出名的比喻。Brooks 把軟體專案比作會變身的怪物：\n\n> \"The familiar software project ... is usually innocent and straightforward, but is capable of becoming a monster of missed schedules, blown budgets, and flawed products. So we hear desperate cries for a silver bullet—something to make software costs drop as rapidly as computer hardware costs do.\"\n\n熟悉的軟體專案，平常看起來無害又直白，卻隨時可能變身成「進度延誤、預算爆炸、產品有缺陷」的怪物——於是人們絕望地呼喊一顆銀彈，一個能讓軟體成本像硬體成本那樣快速下降的東西。（銀彈是西方傳說裡唯一能殺死狼人的武器。）然後 Brooks 給出整篇論文的論點，這句話是全書級的，請記住：\n\n> \"there is no single development, in either technology or management technique, which by itself promises even one order of magnitude [tenfold] improvement within a decade in productivity, in reliability, in simplicity.\"\n\n**沒有任何單一的發展——無論是技術上的還是管理方法上的——能單憑自身，在十年內帶來哪怕只是一個數量級（十倍）的生產力、可靠度或簡單度的提升。** 注意這個主張下得多重：不是「很難找到銀彈」，是「**沒有**銀彈」，而且把標準訂在「十年內十倍」這個具體門檻上。Brooks 怎麼能這麼有把握地斷言一個未來不會發生的事？答案藏在這篇論文真正的貢獻裡——那個區分。\n\nBrooks 借用亞里斯多德的詞，把軟體開發的困難分成兩類：\n\n> \"Following Aristotle, I divide them into essence, the difficulties inherent in the nature of software, and accidents, those difficulties that today attend its production but are not inherent.\"\n\n- **本質（essence）＝本質複雜度**：軟體**本性裡固有的**困難。它來自你要解決的那個問題本身的複雜——搞清楚到底要建什麼、各種規則和例外、各部分之間錯綜的關係、跨系統的一致性。這塊複雜度，不管你換什麼語言、什麼工具、什麼流程，它都在那裡，因為它就是問題本身。\n- **偶然（accident／accidental）＝偶然複雜度**：**今天碰巧伴隨**著軟體生產、但**並非固有**的困難。它來自我們表達解法的方式——你得把腦中的概念翻譯成某種程式語言、得處理記憶體配置、得對付特定平台的怪癖、得寫一堆樣板。這塊複雜度是「工具還不夠好」造成的，理論上可以靠更好的工具一路削減。\n\n論文的整個論證就立在這個區分上：**過去三十年（到 1986 為止）的所有重大進步——高階語言、分時系統、整合開發環境——砍的幾乎都是偶然複雜度。** 高階語言把「手算記憶體位址、寫機器碼」這種偶然負擔砍掉了一大塊（回收 ch03 編譯器、ch05 結構化編程）。但正因為偶然複雜度已經被砍掉很多，今天程式設計師花在**本質複雜度**上的時間比例反而更高了——而本質複雜度，按定義，是任何工具都砍不掉的。所以「再來一個更好的工具就能十倍提升」的夢，撞上一道天花板：你能砍的偶然複雜度本來就所剩不多，而真正吃掉時間的本質複雜度，工具碰不到。沒有銀彈，不是因為人類不夠聰明，是因為**狼人的本體就是問題本身的複雜，而銀彈只能打掉問題的外衣**。\n\nBrooks 還細數了本質複雜度為什麼特別頑固，列了它的四個性質。你不必背，但認得它們會讓你對「為什麼軟體就是難」有更冷靜的理解：\n\n| 本質的性質 | Brooks 的意思 | 你的現場 |\n|---|---|---|\n| **複雜（complexity）** | 軟體可能是人造物裡相對其體積最複雜的——因為沒有兩個部分是一樣的（一樣的就抽成函式了），不像橋樑、汽車有大量重複元件 | 你的系統沒有「重複的零件」，每個 service、每條業務規則都是獨一無二的 |\n| **配合（conformity）** | 大量複雜是**任意的**——被人類的制度、既有系統、別人的介面硬塞給你，沒有道理可講 | 你得配合上游 API 的怪規格、配合監管要求、配合一個你沒法改的舊系統 |\n| **可變（changeability）** | 所有成功的軟體都會被改——越成功越被要求改，因為它有用，所以人們不斷想拿它做新的事 | 你維運過的每個系統，需求都在動；越多人用的服務，改它的壓力越大 |\n| **不可見（invisibility）** | 軟體沒有天然的幾何形狀，無法被視覺化；你沒辦法像看建築藍圖那樣「一眼看到」一個系統的結構 | 你得靠 distributed tracing、架構圖、文件去「想像」系統的形狀，因為它本身不可見（呼應 ch05 文字↔過程的鴻溝） |\n\n這把「本質 vs 偶然」的手術刀，是本書後面反覆要拿出來用的。提前打個預告，讓你知道它會怎麼回收：\n\n- **接 ch08（型別與形式方法）**：型別系統、形式驗證砍的是哪一類複雜度？它們能在執行前排除一整類**偶然**錯誤（型別不匹配、null），但「你到底想算什麼」這個**本質**問題，它們碰不到。這就是為什麼形式方法沒有變成銀彈。\n- **接 ch19（抽象會洩漏）**：複雜度守恆的本質，就是「抽象只能藏偶然複雜度，本質複雜度終究會漏回來」。一個抽象洩漏的時候，漏出來的往往就是它沒能、也不可能消滅的那塊本質複雜度。\n- **接 ch20（AI 輔助編程）**：這是最當代的一刀。截至 2026-06，AI 輔助工具最擅長砍的是**偶然複雜度**——產生樣板、查 API、在語言間翻譯。但「搞清楚到底要建什麼、跨系統的一致性」這塊**本質複雜度**，目前看仍砍不掉。所以「沒有銀彈」在 AI 時代仍然是一個合理的預設懷疑——這個判斷是 2026-06 的，可能被未來推翻，但 Brooks 的手術刀本身，是判斷它的最好工具。\n\n學會用這把刀，你看任何一個「revolutionary（革命性的）新工具/新流程」時，就有一個冷靜的第一問：**它砍的是偶然複雜度還是本質複雜度？** 如果是前者，它可能是個真實的進步（但別期待十倍）；如果有人宣稱它砍掉了本質複雜度，那多半是把偶然當本質的銷售話術。這個提問，是這本書想給你的、最耐用的一件裝備。\n\n## Conway's Law：系統的形狀，是組織形狀的影子\n\n本章最後一把刀不是 Brooks 的，但 Brooks 替它取了名字。它解釋你的第三個場景——為什麼你的服務邊界長得像組織圖。\n\n**1968 年 4 月**，一篇題為〈How Do Committees Invent?〉（委員會如何發明？）的文章刊在 *Datamation* 雜誌上，作者是 **Melvin Conway**。（一個小插曲很能說明它的命運：這篇文章 1967 年先投給了《哈佛商業評論》，被退稿，理由是「論點未經證實」——這個今天被當成鐵律的觀察，當年差點沒能發表。）文章的核心論點，後來被 Brooks 在《人月神話》裡引用、並冠上 **Conway's Law（康威定律）** 之名。原文是：\n\n> \"Any organization that designs a system (defined broadly) will produce a design whose structure is a copy of the organization's communication structure.\"\n\n**任何設計系統的組織，最終產出的設計，其結構都會是這個組織溝通結構的翻版。** 注意關鍵詞是「**溝通**結構」，不是「組織圖」——雖然兩者常常重疊。Conway 的論點和 Brooks's Law 其實同根：因為系統各部分之間的介面，是由設計它們的人之間的溝通定義的。兩個模組要協作，負責它們的人就得溝通；兩個人/兩組人**沒有**順暢的溝通管道，他們負責的那兩塊就**不會**長出緊密整合的介面——系統的接縫，會精準地落在組織溝通的接縫上。系統結構於是變成組織溝通結構的一張影子。\n\n把它接回你的場景：你切微服務邊界時，覺得自己是在做純技術判斷——按業務能力切、按變動軸切（這是 Parnas 資訊隱藏的事，見 ch06）。但 Conway 提醒你一個不舒服的真相：你切的邊界，**很大一部分其實是照組織邊界長的**。哪塊歸哪個小組維護，邊界就劃在那；兩個服務之間的 API 之所以囉嗦或乾淨，往往反映那兩個小組平常溝通順不順。這帶出一個本章只點到、ch17 才展開的深刻推論——**如果你的服務邊界切錯了，那往往不是一個技術問題，而是一個偽裝成技術問題的組織問題**：你的組織溝通結構本身就不對，系統只是忠實地把它複製了出來。想改系統結構而不動組織結構，是逆著 Conway's Law 推石頭。（這個推論的完整版，以及「Inverse Conway Maneuver（逆康威操作）——刻意先設計組織來長出想要的系統」，留到 ch17。）\n\n這裡先把 Conway 放上檯面就好。你只要記住一件事：**1968 年有人就看清了，系統的形狀是組織形狀的影子。** 這是本章三把人性手術刀的最後一把，也是 Part IV「人的複雜度」這條線最反直覺的一刀。\n\n## 為什麼這些 1960–80 年代的話，今天還準\n\n把本章三件工具排在一起——Brooks's Law（1975）、概念完整性（1975）、本質 vs 偶然複雜度（1986）、加上 Conway's Law（1968）——你會發現一個奇怪的事實：軟體領域幾乎沒有任何**技術**主張能撐過五十年（1975 年的人在用什麼語言、什麼硬體、什麼架構，今天全變了），但這幾條卻分毫不差地套在你 2026 年的 ECS 叢集上。為什麼？\n\n因為它們講的根本不是技術。它們講的是**人與複雜度的關係**，而這個關係的兩個變數——人腦的容量、人與人之間的溝通成本——在五十年裡一格都沒變。\n\n```text\n                技術會過時，這些不會\n        ┌─────────────────────┬─────────────────────┐\n        │  會過時的（技術）   │  不過時的（人性）   │\n        ├─────────────────────┼─────────────────────┤\n        │ 語言、框架、架構    │ 人腦容量是個位數    │\n        │ 硬體、雲、容器      │ 溝通成本 O(n²)      │\n        │ 具體的工具與平台    │ 概念在傳遞中走樣    │\n        └──────────┬──────────┴──────────┬──────────┘\n                   │                     │\n              每幾年換一輪          五十年沒變一格\n                   │                     │\n                   ▼                     ▼\n            「又一次革命」         Brooks / Conway 仍然準\n```\n\nBrooks's Law 的 O(n²) 曲線，是人類溝通的幾何結構，跟你用 Slack 還是用 1970 年代的備忘錄無關。概念完整性會流失，是因為共識在多人之間傳遞必然走樣，跟你用不用 Figma、用不用 RFC 文件無關。Conway's Law 成立，是因為介面由溝通定義，這跟 SOAP 還是 gRPC 無關。本質 vs 偶然複雜度的區分能用在 AI 上，是因為「問題本身的複雜」不會因為你的編輯器旁邊多了一個 AI 助手就減少。\n\n這呼應了本書四條驗收主線裡的第四條：**永恆的真話**。Brooks、Conway、Dijkstra（測試只能證明 bug 存在，見 ch05）這些四十、五十年前的話為什麼今天還準——因為它們瞄準的不是會過時的技術層，而是人與複雜度這個不變的底層。一個見過鐘擺擺過幾輪的工程師，會本能地對「這次的新工具終於是銀彈了」這類宣稱保持冷靜，不是因為犬儒，而是因為他手上有 Brooks 1986 年那把刀，知道該先問：你砍的是哪一種複雜度？\n\n## 複雜度搬去哪了\n\n本章和前幾章不太一樣——它沒有發明一層新抽象、也沒有提出一套新流程。它做的是**把一塊一直存在、卻沒人正面命名的複雜度指出來**：軟體裡那塊**搬不走的、人性的**複雜度。所以這一筆帳，記的是「Brooks 把什麼看清楚了」，而不是「某個發明把複雜度搬去哪了」。\n\n| 項目 | 內容 |\n|---|---|\n| **撞的牆** | 軟體是一群人一起蓋的，而人腦容量有限、人與人溝通成本隨人數呈 O(n²) 成長、共識在傳遞中必然走樣——這面「人的牆」，前九章的抽象與紀律全都翻不過去 |\n| **這次主導的 strand** | 方法 strand 的高潮（Part IV 開篇）。但 Brooks 的最大貢獻其實是劃出一條**所有 strand 都翻不過去的界線**：本質複雜度 |\n| **看清了什麼（而非搬走了什麼）** | ① Brooks's Law——加人到遲到專案讓它更遲到，機制是 ramp-up 延遲＋O(n²) 溝通，是數學不是管理失誤；② 概念完整性——比功能多寡更重要，會隨溝通成本自然流失，須人為收斂到少數人；③ **本質 vs 偶然複雜度**——工具只砍得動偶然，本質砍不掉，所以沒有銀彈；④ Conway's Law——系統結構是組織溝通結構的影子 |\n| **這把刀製造的新負擔** | 「本質 vs 偶然」這個區分本身是個判斷負擔——哪塊複雜度是本質、哪塊是偶然，沒有客觀公式，容易被各說各話（樂觀者把本質說成偶然來賣銀彈，悲觀者把偶然說成本質來拒絕進步）。用這把刀需要誠實和經驗，它不是一個能機械套用的演算法 |\n| **它在哪洩漏／反噬** | 當有人把這幾條當教條而非工具時：把 Brooks's Law 讀成「永遠不能加人」（其實 Brooks 給了 surgical team 這類緩解）、把概念完整性讀成「必須獨裁」、把 Conway's Law 讀成宿命論。這些是把「對人性複雜度的觀察」僵化成「規則」時的反噬——和 ch05 把 Dijkstra 讀成「GOTO 邪惡」是同一種病 |\n| **這一跳的帳單一句話** | Brooks 沒有搬走任何複雜度——他做了更重要的事：**指出有一塊複雜度（本質的、人性的）是搬不走的**，並給了你一把刀去把它和搬得走的那塊分開。這把刀，是「複雜度守恆」這個全書主張最早、最鋒利的一次表述 |\n\n## 紙上推演\n\n純敘事書，沒有可跑的 lab。下面三題是口頭重講、對帳、預測式的思辨。先自己想，再看解答。\n\n### 推演題一 **[20 分鐘]** ★★\n\n拿你最近一個專案，把它的難點用 **本質複雜度 vs 偶然複雜度** 各分一堆。要求：本質那堆至少寫三項、偶然那堆至少寫三項；對每一項說清楚你判它是本質還是偶然的**理由**（關鍵問句：換一個更好的工具/語言/框架，這個難點會不會消失？會→偶然；不會→本質）。最後回答：你那堆偶然複雜度裡，有哪一項是 AI 輔助工具（2026-06）已經在幫你砍的？\n\n#### 推演解答\n\n沒有標準答案，但合格的分類要能扛住那個關鍵問句。示範（以一個你熟的 B2B 資料中介服務為例）：\n\n- **偶然複雜度**（換更好的工具會消失）：① 寫一堆 DTO/序列化樣板——AI 補全或 codegen 就能砍掉一大半；② 記不住某個 AWS SDK 的 API 簽名、查文件的時間——AI 輔助工具正在砍的就是這個；③ 把同一個概念在 TypeScript 型別、OpenAPI schema、資料庫 schema 三處手動同步——更好的工具鏈（或你那套 CI 強制同步）能消滅這個摩擦。這三項的共同點：它們都不是「問題本身」的複雜，是「表達解法的方式」帶來的摩擦。\n- **本質複雜度**（換工具不會消失）：① 搞清楚這個中介到底要保證什麼一致性語意——上游送來矛盾資料時誰贏？這是業務規則的本質，沒有工具能替你決定；② 跨好幾個系統的最終一致性對帳邏輯——這個複雜來自「分散式」這個問題本身（你的 SQS 冪等消費者在處理的就是它），不是任何框架造成的；③ 各種業務例外和邊界情況（這個客戶有特殊合約、那個地區有特殊法規）——這是 Brooks 說的「conformity」，被外部制度硬塞給你的任意複雜，工具碰不到。\n\n判分關鍵：能不能對每一項誠實地回答「換工具會不會消失」。最常見的錯誤是把②類本質複雜度（一致性、業務規則）誤當偶然，幻想「下一個框架就能解決」——這正是 Brooks 說的「把本質當偶然」的銀彈幻覺。能避開這個陷阱，你就握住這把刀了。\n\n### 推演題二 **[15 分鐘]** ★★\n\n用 O(n²) 溝通成本，向一個剛升上 team lead 的人解釋：為什麼你那次「專案落後、上面加了三個人、結果更慢」不是你帶人帶得差，而是**結構性的、可以預期的**。要求你的解釋裡出現「n(n-1)/2」「ramp-up」「立刻到帳 vs 延後才來」這三個錨點，並且不能用「新人就是會拖慢」這種空話當理由。\n\n#### 推演解答\n\n一份合格的解釋大致是這樣：\n\n「這不是你的問題，是 Brooks 1975 年就算清楚的數學。加人之後有兩股力量。第一股是**溝通負擔**：團隊裡每個人要跟其他人協調介面、對齊理解，n 個人的溝通路徑數是 n(n−1)/2。我們從 4 個人加到 7 個，人力理論上多了快一倍，但溝通路徑從 6 條跳到 21 條——三倍多。這些路徑全是真成本：會議、來回確認、因理解不一致而生的 bug。而且這股負擔是**立刻到帳**的，新人一進來，路徑數當天就漲。\n\n第二股是**新人的產出**，但它被 **ramp-up** 延後了。新人要花好幾週才搞懂這套 codebase、契約、慣例，這段時間他不但沒淨產出，還得占用你——團隊裡最懂全局、本來生產力最高的人——的時間去帶他。所以新人的正貢獻是**延後才來**的。\n\n把兩股疊起來：負擔立刻到帳、產出延後才來。在一個**本來就落後、時間已經見底**的專案裡，立刻到帳的負擔壓過延後才來的產出，淨效果就是更慢。這就是 Brooks's Law。它沒說團隊不能成長，它說的是『對一個**已經遲到**的專案臨時加人救火』這個特定動作會反效果。你那次照做了，結果完全符合預期——不是你的鍋，是那條曲線的鍋。」\n\n判分關鍵：有沒有把「立刻到帳的負擔」和「延後才來的產出」這個時間錯位講出來。只說「溝通變多所以變慢」是不及格的——少了時間錯位，就解釋不了「為什麼偏偏是**已經遲到**的專案加人才致命」。\n\n### 推演題三 **[15 分鐘]** ★★★\n\n預測＋對帳：挑你切過的一個微服務邊界，先憑記憶說出你當初切它的「技術理由」（按業務能力？按效能？按資料庫邊界？）。然後用 Conway's Law 重新審問它：這條邊界，有多少其實是照**組織/團隊邊界**長的？如果當初負責這兩塊的是同一個小組、或溝通極其順暢的兩個人，這條邊界還會切在同一個地方嗎？最後判斷：這是一條「技術驅動」還是「組織驅動」的邊界——以及它切得對不對。\n\n#### 推演解答\n\n沒有標準答案，重點是審問的誠實度。一個有深度的回答長這樣：\n\n「我當初切這條邊界的技術理由是『訂單』和『結算』是兩個業務能力，該獨立部署。聽起來很乾淨。但 Conway 逼我誠實一點：訂單組和結算組本來就是兩個小組，分屬不同的人、開不同的會、有不同的 on-call。如果這兩塊當初是同一個三人小組維護的，我**幾乎確定**不會把它切成兩個跨網路的服務——我會把它做成同一個服務裡兩個模組，省掉那條 API、省掉分散式一致性、省掉跨服務追蹤的成本。所以這條邊界**主要是組織驅動的**：它切在那裡，是因為人就分在那裡，溝通的接縫就在那裡，系統忠實地把它複製了出來。\n\n切得對不對？要分兩面看。如果這個組織劃分本身是合理的（兩塊業務確實該由兩個自治團隊擁有），那 Conway 驅動的邊界反而是好的——系統結構配合了健康的組織結構。但如果這個組織劃分本身是歷史包袱（兩塊業務其實高度耦合、天天要一起改，只是當年因為人事原因分了組），那我這條邊界就是一個**偽裝成技術決策的組織問題**：我付著分散式的稅，只為了複製一個本來就不該存在的組織接縫。要修它，得先改組織，不是先改程式碼——這正是 ch17 要展開的 Inverse Conway。」\n\n判分關鍵：能不能識別出「邊界的真正驅動力是組織而非技術」這個不舒服的可能，並且看出「切得對不對」取決於**底層的組織劃分本身對不對**，而不是程式碼層面好不好看。能走到這一步，你就提前摸到了 ch17 的門把。\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. 為什麼說「人月」（man-month）是一個神話？它假設了人和時間之間的什麼關係，而軟體開發的哪兩個前提破壞了這個假設？\n2. Brooks's Law 的兩條機制是什麼（ramp-up、O(n²) 溝通）？把 n(n−1)/2 用幾個具體的 n 算一遍，並解釋為什麼「立刻到帳的負擔 vs 延後才來的產出」這個時間錯位，是它在**已經遲到**的專案上特別致命的原因。\n3. 為什麼說 Brooks's Law 是「數學不是管理失誤」？一個再優秀的經理，為什麼也躲不開它？\n4. 「概念完整性」是什麼？為什麼 Brooks 說它比功能多寡更重要、而且只能來自少數人的心智？把它接到你「訂團隊慣例」這件事上——你在搶救什麼？\n5. 「No Silver Bullet」是哪一年的、哪一種文獻（不是哪本書的章節）？本質複雜度和偶然複雜度的分界線在哪裡？用「換一個更好的工具，這個難點會不會消失」這個問句各舉一例。\n6. 為什麼 Brooks 敢斷言「沒有銀彈」——這個斷言怎麼從「本質 vs 偶然」這個區分推導出來？（提示：偶然已被砍得差不多，本質工具碰不到。）\n7. Conway's Law 在說什麼？為什麼它的關鍵詞是「溝通結構」而不是「組織圖」？「服務邊界切錯往往是偽裝成技術問題的組織問題」這句話是什麼意思？\n8. 為什麼這些 1960–80 年代的話今天還準，而同年代的技術主張全過時了？（提示：它們瞄準的是人與複雜度，不是技術。）\n\n## 延伸閱讀\n\n- **Fred Brooks, 《The Mythical Man-Month》（1975；二十週年增訂版 1995）** — 本章的核心一手文獻。若只讀兩章：讀同名的〈The Mythical Man-Month〉（Brooks's Law 與 O(n²) 溝通的原始論證）和〈Aristocracy, Democracy, and System Design〉（概念完整性與架構/實作分離）。1995 版多收了〈No Silver Bullet〉和 Brooks 自己回顧「哪些我說對了、哪些說錯了」的〈\"The Mythical Man-Month\" after 20 Years〉，後者是難得的作者自我修正，很值得讀。\n- **Fred Brooks, 〈No Silver Bullet — Essence and Accident in Software Engineering〉（1986）** — 本質 vs 偶然複雜度這把手術刀的原典，網路上有全文（如 worrydream.com 的 refs 收錄的 PDF、或數個 HTML 轉錄）。短、論證緊。讀的時候帶著一個問題：他 1986 年說「過去的進步砍的都是偶然複雜度」——對照你 2026 年用的 AI 工具，這句話過時了嗎還是更準了？（這正是 ch20 要接的。）\n- **Melvin Conway, 〈How Do Committees Invent?〉（Datamation, 1968-04）** — Conway's Law 原文，melconway.com 上作者本人放了全文。短文，重點看那句定律的原始措辭與他的推理（介面由溝通定義）。讀完你會發現它比流行的「組織圖=系統圖」說法精細得多——關鍵字是「溝通結構」。它在微服務世界的完整回收見 ch17。\n- **Brooks's Law 的 O(n²) 推導與批評** — 網路上有不少把 n(n−1)/2 攤開計算、並討論「Brooks's Law 在什麼條件下不成立」（例如工作高度可切分、溝通需求極低時）的文章（如 gigamonkeys 的部落格分析）。讀正反兩面，能讓你把這條定律當工具而非教條——知道它的適用邊界，比死背它更有用。\n- **本書 ch17（微服務與容器）** — 如果你被本章 Conway's Law 那段勾住了，可以先翻 ch17 看它怎麼展開「微服務本質是組織結構的固化」與 Inverse Conway Maneuver；但建議讀完 ch11、ch12 的流程戰爭再去，那時你對「方法 strand」的全貌會更完整。\n"}, {"id": "ch11-waterfall", "file": "ch11-waterfall.md", "group": "Part IV — 流程的戰爭", "title": "ch11 — 瀑布：一個被讀反的模型", "md": "# ch11 — 瀑布：一個被讀反的模型\n\n> **本章解決什麼問題**：上一章（見 ch10）攤開了複雜度的人性面——加人不會線性加速、本質複雜度砍不掉。但人月神話是「診斷」，不是「處方」。1970 年代，大型國防與企業專案需要的不是更多警語，而是一套能落地的流程：怎麼把幾百人、跨好幾年的開發，組織成可預測、可稽核、可分工的東西。本章講方法 strand 在這個需求下長出的第一套重量級答案——以及它如何被一張圖綁架了五十年。瀑布撞的不是技術的牆，是**組織協調與課責**的牆；它用「先設計後實作的線性流程」翻越，帳單則是對需求不確定性的脆弱。而最諷刺的是：那篇被當成瀑布聖經的論文，作者本人畫那張圖是為了說「這樣不行」。本章是全書最重要的「大家讀反了」案例。\n\n## 從你已知的出發\n\n你對「瀑布」這個詞的第一反應，大概跟業界 90% 的人一樣：那是個笑話。一個老古板的、先寫三個月文件再寫程式、需求一變就全盤崩潰的恐龍流程，是敏捷站起來打倒的那個反派。你在某次 sprint retrospective 聽過有人嘲諷「這根本是瀑布」，全場心領神會地笑。\n\n先把這個反射收起來，因為它讓你看不見一件你每天在做、而且做得對的事。\n\n第一個場景：你開一個 greenfield 微服務專案，AWS ECS、TypeScript/NestJS、要當 B2B 與 B2C 之間的資料中介。你做的第一件事不是寫 business logic，是坐下來定 **OpenAPI 契約**。你把 endpoint、request/response schema、錯誤碼先談清楚、寫進 spec，CI 強制這份 spec 跟實作同步，前端團隊拿著它就能並行開工、後端拿著它各自實作。你沒有先寫程式再回頭補文件——你**先設計、後實作**，而且把「設計」固化成一份能被機器檢查的契約。\n\n停一下。你剛剛做的，骨子裡就是瀑布的核心基因：**在動手寫第一行實作之前，先把介面與設計定下來、寫成文件、讓它成為協作的基準**。你不會覺得這是恐龍流程，你覺得這是基本的工程紀律——少了這份契約，三個團隊各寫各的，整合那天就是一場災難。\n\n第二個場景：你做過強監管的 B2B 系統——資料中介常常碰到合約、稽核、資安審查。在那種場景裡，你親身感受過一種在純 B2C 玩法裡不存在的壓力：**有些變更不能「先上線再說、壞了再 rollback」**。它要先有文件、要有人簽核、要留下「誰在什麼時候基於什麼理由批准了這個改動」的軌跡。你那時可能覺得綁手綁腳，但你也隱約知道——在這個場景，這套東西不是純粹的官僚主義，它在解一個真實的問題。\n\n這兩個場景——先定契約、需要簽核——是同一個東西的兩張臉，而那個東西就是本章要替你正名的「重量級流程」。本章要做三件事：第一，把瀑布的歷史真相挖出來，告訴你那篇 1970 年的論文**實際上**說了什麼（劇透：跟你以為的相反）；第二，講清楚重量級流程在解什麼複雜度、它的帳單是什麼；第三，給它一個公平的評價——它不是笑話，它是對一面真實的牆的合理回應，只是後來被用在了錯的地方。\n\n## 那篇論文：一個被斷章取義五十年的活標本\n\n我認為這是軟體史上最被冤枉的一篇論文，沒有之一。\n\n**1970 年 8 月，Winston W. Royce 在 IEEE WESCON 會議上發表了一篇論文，題為「Managing the Development of Large Software Systems」**（管理大型軟體系統的開發）。這篇論文後來被全世界當成「瀑布模型」的奠基文獻、瀑布之父的宣言。問題是：Royce 在這篇論文裡**沒有**用過「waterfall」這個詞，**沒有**主張純線性的開發流程，而且——這是關鍵——他畫出那張著名的線性流程圖，是為了當作一個**有缺陷的反例**，緊接著就說「這樣行不通」。\n\n讓我們照論文的實際結構走一遍，因為理解這篇論文怎麼被讀反，比記住任何結論都重要。\n\n**第一步：他先畫了一張極簡的圖。** Royce 開場先給一個最樸素的兩步驟概念——分析（analysis），然後寫程式（coding）。他說對於小程式，這就夠了。然後他指出，大型系統光這兩步遠遠不夠，於是把它展開成一張更完整的、由上往下流的階段圖：系統需求 → 軟體需求 → 分析 → 程式設計 → 寫程式 → 測試 → 運轉。每一階段的產出餵給下一階段。**這張圖，就是後世截圖當聖經的那張「瀑布圖」。** 把它跟 Royce 緊接著主張的版本並排，你會一眼看出後人截走了什麼：\n\n```text\n    純線性（後人截走的那張圖）          Royce 主張的（帶回饋與迭代）\n    ┌──────────┐                       ┌──────────┐\n    │ 系統需求 │                       │ 系統需求 │◄─────┐\n    └────┬─────┘                       └────┬─────┘      │\n         ▼                                  ▼            │ 回饋\n    ┌──────────┐                       ┌──────────┐      │ 修正\n    │ 軟體需求 │                       │ 軟體需求 │◄───┐ │ 設計\n    └────┬─────┘                       └────┬─────┘    │ │\n         ▼                                  ▼          │ │\n    ┌──────────┐                       ┌──────────┐    │ │\n    │ 分析     │                       │ 分析     │◄─┐ │ │\n    └────┬─────┘                       └────┬─────┘  │ │ │\n         ▼                                  ▼        │ │ │\n    ┌──────────┐                       ┌──────────┐  │ │ │\n    │ 程式設計 │                       │ 程式設計 │  │ │ │\n    └────┬─────┘                       └────┬─────┘  │ │ │\n         ▼                                  ▼        │ │ │\n    ┌──────────┐                       ┌──────────┐  │ │ │\n    │ 寫程式   │                       │ 寫程式   │  │ │ │\n    └────┬─────┘                       └────┬─────┘  │ │ │\n         ▼                                  ▼        │ │ │\n    ┌──────────┐                       ┌──────────┐  │ │ │\n    │ 測試     │                       │ 測試 ────┼──┴─┴─┘\n    └────┬─────┘                       └────┬─────┘\n         ▼                                  ▼\n    ┌──────────┐                       ┌──────────┐\n    │ 運轉     │                       │ 運轉     │\n    └──────────┘                       └──────────┘\n    一路往下，不回頭            測試暴露的風險回饋去改前面（＝迭代）\n    （Royce：risky and          外加「Do it twice」：先做縮小試作版\n     invites failure）           走完全程再正式做\n```\n\n**第二步——這是所有人漏掉的一步——他立刻說這張圖有問題。** Royce 沒有停在那張漂亮的線性圖上歌頌它。他緊接著指出：這個純線性的模型，問題出在測試階段。因為測試是整個流程的**最後一步**，而很多風險（時序、I/O、資源極限這類只有跑起來才會暴露的問題）要到測試才會現形——可是這時候設計早已凍結，要改就得回頭大改前面所有階段，成本爆炸。他對這個純線性實作下的判決，原文是這一句（已查證，多個獨立來源確認逐字一致）：\n\n> \"I believe in this concept, but the implementation described above is risky and invites failure.\"\n\n翻成你的話：**「我認同這個概念，但上面描述的這種（純線性）實作方式是有風險的、是在招致失敗。」** 注意他的精準——他不是否定「分階段」這個概念本身，他否定的是「一條路走到底、不准回頭」的那種天真實作。換句話說，那張被當成理想範本的圖，在原作者眼裡是**起點兼反例**，是「我們不能就這樣做」的示範。\n\n**第三步：他提出五項修正，把這個有缺陷的起點改造成一個可行的東西。** Royce 沒有只破不立。他給了五條具體建議（以下是他論文裡的五個小節標題，照查證）：\n\n```text\n
