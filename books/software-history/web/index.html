   Royce 1970 的五項修正\n        （把純線性的「反例」改造成可行流程）\n  ┌──────────────────────────────────────────────────┐\n  │ 1. Program design comes first                    │\n  │    程式設計先行——在分析定案前先做初步設計        │\n  │ 2. Document the design                           │\n  │    把設計寫成文件——讓它可溝通、可稽核            │\n  │ 3. Do it twice                                   │\n  │    做兩次——先建一個試作版（pilot）再正式做       │\n  │ 4. Plan, control and monitor testing             │\n  │    規劃、控制並監督測試——別把它推到最後賭        │\n  │ 5. Involve the customer                          │\n  │    讓客戶涉入——正式、深入、持續地參與            │\n  └──────────────────────────────────────────────────┘\n```\n\n這五條裡，第三條「**Do it twice**」是壓垮「Royce 主張純瀑布」這個說法的決定性證據。他主張：在投入完整開發之前，**先做一個縮小版的試作（pilot model）跑一遍整個流程**，用它來提早暴露那些只有實作了才看得見的風險。他形容這個試作版（已查證，逐字）：\n\n> \"Note that it is simply the entire process done in miniature, to a time scale that is relatively small with respect to the overall effort.\"\n\n**這是迭代。** 「先做一個小版本走完全程、學到東西、再正式做」——這正是後來敏捷、原型法、MVP 的精神內核。Royce 在 1970 年就寫進論文了。一個被全世界當成「反迭代、純線性」象徵的人，論文裡白紙黑字主張迭代。\n\n第五條「**Involve the customer**」同樣反直覺。瀑布的刻板印象是「需求一次談定、之後客戶閉嘴等驗收」。Royce 說的恰恰相反——他主張客戶的涉入要「正式、深入、且持續」（formal, in-depth, and continuing）。他甚至寫過一句很有畫面的話（大意是「在需求定義與系統上線之間放手讓承包商自己跑，是在自找麻煩」，未逐字核對到精確措辭，故標為大意）。這跟敏捷宣言第三條「客戶協作重於合約談判」隔了三十一年遙遙呼應。\n\n所以把整篇論文的真實主張收攏成一句：**Royce 把純線性流程當作一個危險的、會招致失敗的起點，然後主張用「先設計、寫文件、做兩次、嚴管測試、客戶持續涉入」把它改造成一個帶迭代與回饋的流程。** 他是純瀑布的**批判者**，不是它的傳道者。\n\n| 流行說法（瀑布神話） | 史實（照查證） |\n|---|---|\n| Royce 1970 發明了瀑布模型 | 他畫的線性圖是**反例**；他下的判決是「risky and invites failure」 |\n| Royce 主張純線性、不准回頭 | 他主張「Do it twice」（先做試作版）、要回饋環、要迭代 |\n| Royce 創了「waterfall」這個詞 | 他**沒用過**這個詞；該詞是後人貼上去的 |\n| 瀑布的客戶談定需求後就閉嘴 | Royce 主張客戶涉入要「正式、深入、持續」 |\n| 那張線性圖是 Royce 的理想範本 | 那是他要你**別照做**的起點兼警示 |\n\n## 那「waterfall」這個詞是誰貼的？\n\n如果 Royce 沒說瀑布，那這個綁架了他五十年的詞是哪來的？\n\n一般歸給 **Bell 與 Thayer，1976 年**在第二屆國際軟體工程會議（ICSE）發表的論文「Software Requirements: Are They Really a Problem?」（軟體需求：它們真的是問題嗎？）。他們在文中提到 Royce 的論文時，用了「the 'waterfall' of development activities」這個說法——把那張由上往下流的階段圖比喻成瀑布的水流，一級一級往下落、不回頭。注意這個時間差：**「waterfall」這個詞，比 Royce 的論文晚了整整六年才出現**，而且不是 Royce 自稱的，是別人讀他的圖讀出來的印象。\n\n更糟的是後續。Bell 與 Thayer 只是順手用了個比喻，他們的論文重點是需求分析、不是在替整個開發流程背書。但這個生動的比喻流傳開來，而流傳的過程中發生了一件本書一再出現的事——**斷章取義**。後人取走了那張線性圖（因為它好畫、好教、好寫進政府採購標準），丟掉了 Royce 緊接在後的五項修正、丟掉了「Do it twice」、丟掉了「risky and invites failure」那句判決。一張示意「別這樣做」的圖，被裱起來掛在牆上當「該這樣做」的範本。\n\n這裡有個更深的歷史機制值得點出，否則你會以為這只是一場單純的閱讀理解失誤。**為什麼是這張圖、而不是 Royce 的五項修正，被歷史選中？** 因為那張線性圖正好是大型採購官僚體系**想要**的東西。一張清楚的、階段分明的、每階段有明確產出物可以驗收付款的流程圖，完美契合國防部與大企業簽合約、分包、稽核、究責的需求。Royce 的「Do it twice」「客戶持續涉入」反而麻煩——它們意味著計畫會變、需求會調、付款里程碑不好定。組織不是讀錯了 Royce，組織是**選擇性地只聽見它想聽的那一半**。這比單純的誤讀更值得記住：一個想法被斷章取義五十年，往往不是因為大家不識字，而是因為被截走的那一半剛好服務了某種需求。\n\n## 重量級流程在解什麼複雜度\n\n把瀑布從「笑話」裡撈出來，你得先問一個本書每章都要問的問題：它撞的是哪一面複雜度的牆？\n\n不是技術的牆。結構化編程撞的是「人腦裝不下控制流」（見 ch05），OOP 撞的是「資料與行為散落」（見 ch07）——那些是**技術複雜度**。瀑布與它背後的重量級流程撞的是另一種牆：**組織協調與課責的複雜度**。\n\n想像你不是在帶一個五人 squad，而是在 1975 年管一個五百人、橫跨三年、要交付給美國國防部的軍事指揮系統。你面對的問題清單跟你今天的問題清單**根本不在同一個宇宙**：\n\n- **分工**：五百個人不可能擠在同一個 Slack 頻道即興協調。你必須把工作切成能獨立指派、有明確介面的塊，而切塊的前提是先有一份大家都同意的整體設計。\n- **可預測**：政府給你一筆固定預算、一個固定交付日，要求你現在就告訴他三年後會交出什麼、花多少錢。你不能說「我們先 sprint 兩週看看」。\n- **可稽核**：出了事——飛彈系統算錯座標——要有人負責，要查得出「是哪個環節、誰的決定、基於什麼規格」。沒有文件軌跡，這整件事無法究責。\n- **人員流動**：三年的專案，中途一定有人離職、有人加入。新人 ramp-up（見 ch10 的 Brooks's Law）的唯一指望，是有一份寫下來的設計能讓他讀懂這個系統，而不是去問某個「腦袋裡裝著全部」的人——那種人一走，知識就蒸發了。\n\n看出來了嗎？**瀑布的每一個你討厭的特徵，都是對上面某一條的回應。** 先設計後實作，是為了能分工與預測；大量文件，是為了能稽核與抵抗人員流動；階段化的簽核關卡（phase gate），是為了能在每個里程碑究責與付款。這套流程不是某個老古板拍腦袋想出來折磨工程師的——它是一群人面對「在強課責、固定預算、大規模、長週期、高人員流動」的約束下，怎麼把軟體做出來的真實答案。\n\n換成你在那個時空，你未必想得出更好的。\n\n這套思路在 1980–90 年代被系統化、制度化，最具代表性的就是 **CMM（Capability Maturity Model，能力成熟度模型）**。它的脈絡值得知道，因為它把「為什麼需要重量級流程」這件事講得很白：1984 年，美國國防部出資成立了卡內基美隆大學的軟體工程研究所（SEI）；**Watts Humphrey**（從 IBM 退休後加入 SEI）在美國空軍的要求下，著手做一件具體的事——**國防部把軟體外包給一堆廠商，但它沒有任何工具能評估這些廠商「做軟體的能力到底靠不靠譜」**，於是 Humphrey 設計了一套模型，把一個組織的軟體開發過程成熟度分成五級（從第一級的「混亂、靠英雄」到第五級的「持續最佳化」）。CMM 後來演化成 CMMI，成了你接政府或大型企業案子時可能聽過的那串認證。\n\n我不展開 CMM 的各等級細節（本書範圍邊界），但你要抓住它的**動機**：CMM 解的複雜度，跟瀑布是同一面牆——**當你要把關鍵任務外包給一個你不認識的組織，你需要一種方法去相信他們做事是可預測、可重複、可稽核的，而不是靠運氣和個別英雄。** 這是「可信任的協調」這個複雜度的制度化答案。你今天看一家廠商有沒有 SOC 2、ISO 27001 認證才敢把資料交給它——那股「我需要一個可稽核的信任憑證」的衝動，跟國防部當年要 CMM 是同一個。\n\n## 帳單：重量級流程付出了什麼\n\n公平歸公平，瀑布與重量級流程的帳單是真實而沉重的，而且這些帳單正是下一章敏捷反叛的全部理由（見 ch12，那是對重量級流程的正面反叛）。把帳算清楚：\n\n**第一筆，也是最致命的一筆：對需求不確定性的脆弱。** 純線性瀑布有一個藏在骨子裡的假設——**需求在一開始就能被完整、正確地知道並凍結**。整個流程是建立在「先把要做什麼想清楚，之後就照著做」之上的。但軟體最難的部分恰恰是「搞清楚到底要建什麼」（這是 Brooks 說的本質複雜度，見 ch10），而這件事在真實世界裡**幾乎不可能在動工前就完全想清楚**。需求會變，因為客戶看到半成品才知道自己真正要的不是當初說的那個；市場會變；理解會深化。一旦需求變了，瀑布的成本曲線就反咬你——你要回頭改設計、改文件、改一切，而越往後改越貴。諷刺的是，Royce 的「Do it twice」正是為了治這個病，而後人偏偏把這帖藥丟了。\n\n**第二筆：回饋太慢。** 在純瀑布裡，你要走到測試階段——可能是專案開始一年後——才第一次看到系統真的跑起來，才第一次拿到「這東西到底對不對」的回饋。一年的猜測無人驗證。等回饋來時，錯誤已經層層疊在彼此之上，修起來是天文數字。你今天靠 CI/CD 一天部署好幾次、靠 feature flag 灰度放量、靠監控即時看真實流量的反應——你享受的是**短回饋環**，而瀑布的原罪就是回饋環長到以年計。\n\n**第三筆，最微妙的一筆：文件變成目的本身。** 重量級流程要文件，本意是讓文件**服務**於溝通、稽核、抵抗人員流動。但流程一旦制度化、一旦文件成為 phase gate 的驗收物、成為究責時的擋箭牌，它就會發生異化——**人開始為了通過審查而寫文件，而不是為了把事情想清楚而寫文件**。你大概見過那種沒人讀、跟實作早已脫節、純粹為了應付稽核而存在的設計文件。那一刻，文件從手段墮落成了目的，從減少複雜度的工具變成了增加複雜度的官僚負擔。這是所有重量級流程的通病：**為了治理複雜度而引入的流程，本身會長成一種新的複雜度。**\n\n但——這是本章要你記住的公平話——**帳單沉重不等於這套流程是錯的。它只是有適用邊界。**\n\n在某些領域，重流程不是錯，是必須。問問自己第二筆帳「回饋太慢」與第一筆帳「需求會變」的前提是什麼：它們假設**需求其實會變、而且變更成本不高、回饋拿得到**。但如果你在做的是：\n\n- **航太飛控軟體**：需求由物理定律與適航法規定死，不會因為「使用者想要個深色模式」而變；而「先上線壞了再 rollback」在這裡的代價是飛機掉下來。\n- **醫療器材韌體**：受 FDA 等監管，每個變更都要重新驗證、留軌跡；變更成本高到你**寧可前期多花十倍力氣想清楚**。\n- **核電廠控制系統**：同上，需求穩定、變更成本是災難級。\n\n在這些領域，**需求真的相對穩定、變更成本真的極高、且不允許「快速試錯」**。瀑布前期的「先把一切想清楚、寫成可稽核的文件、嚴格分階段驗證」——不是官僚主義，是工程倫理。你在強監管 B2B 場景隱約感受到的那股「有些地方真的需要文件與簽核」的直覺，就是這個邊界的縮影。同一套流程，用在需求飛速變動的消費級 App 上是災難，用在飛控上是救命。**問題從來不是瀑布本身好或壞，是有沒有用在它適用的牆上。** 把適用於航太的流程套到一個三人的 CRUD App，跟把適用於三人 CRUD 的「先上線再說」套到飛控上，是同一種錯誤的兩個方向。\n\n這正是鐘擺隱喻的一次具體擺動（見 ch01）：手工↔自動、輕量↔重量這組張力，會隨著「課責壓力」與「變更速度」的不同而擺到不同位置。沒有一個位置永遠對。\n\n## 複雜度搬去哪了\n\n瀑布與重量級流程這一跳，照例結一筆帳——它消滅了什麼負擔，又製造了什麼新負擔。\n\n| 項目 | 內容 |\n|---|---|\n| **撞的牆** | 組織協調與課責的複雜度：在強課責、固定預算、大規模（數百人）、長週期（數年）、高人員流動的約束下，怎麼把軟體做出來且做得可信 |\n| **這次主導的 strand** | 純粹的方法 strand（流程/治理），與抽象 strand 幾乎無關——它管的是「怎麼蓋」而非「用什麼蓋」 |\n| **消滅了什麼負擔** | 「靠英雄與口頭協調」的不可規模化負擔——用先設計後實作換來可分工、用文件換來可稽核與抗人員流動、用階段關卡換來可預測與可究責 |\n| **複雜度搬到哪** | 從「執行時的混亂協調」搬到「**前期的設計與文件成本**」——複雜度沒消失，它被移到專案開頭，變成一大筆必須先付的規劃、文件與簽核成本 |\n| **新製造的負擔** | (1) 對需求不確定性脆弱——整套流程賭「需求能在動工前凍結」，賭輸了改起來成本隨階段指數上升；(2) 回饋環長到以年計，錯誤層層堆疊才被發現；(3) 文件異化——制度化後人為通過審查而寫文件，文件從手段墮落成目的，反而變成新的官僚複雜度 |\n| **會在哪洩漏／反噬** | 當它被用在**需求高速變動、變更成本低、能快速試錯**的領域（消費級軟體、新創探索期）時，前期凍結需求的假設徹底失效，整套流程從資產變成枷鎖——這正是 1990 年代末敏捷反叛的全部燃料（見 ch12）。反過來，當輕量流程被用在需求穩定、變更成本災難級的領域（飛控、醫療）時，缺乏文件與驗證又會反噬——抽象兩端都會洩漏 |\n| **這一跳的帳單一句話** | 用「前期的設計與文件成本」換「大規模協作的可預測與可稽核」——複雜度從執行期搬到了規劃期，而一旦需求在動工後改變，這筆預付的成本就大半打了水漂 |\n\n## 紙上推演\n\n### 推演題一 **[15 分鐘]** ★★\n\n「瀑布 vs 敏捷」常被講成一場善惡分明的對決——僵化過時的瀑布，被靈活進步的敏捷打倒。用 Royce 1970 論文的**真實主張**，論證這個對立有多大成分其實是個**稻草人**（straw man）。具體說：Royce 論文裡的哪些主張，其實跟後來敏捷宣言的主張是同一個方向？你的解釋裡要出現「Do it twice」與「客戶涉入」這兩個錨點。\n\n#### 推演解答\n\n這個對立的稻草人成分非常大，因為它把「瀑布」等同於「純線性、需求凍結、客戶閉嘴」這個**從來不是 Royce 主張、而是後人從一張圖誤讀出來的版本**，再讓敏捷去打這個稻草人。\n\n對照 Royce 論文的真實主張：\n\n- **「Do it twice」對上敏捷的迭代**：Royce 主張先做一個縮小版的試作（pilot model）走完整個流程、學到東西再正式做。這就是迭代、就是原型法、就是 MVP 的精神內核。敏捷的「短迭代、先交付能跑的小版本、從回饋中學」並不是推翻 Royce，而是把 Royce 這條被丟掉的建議**撿回來放大**。兩者在這一點上同向。\n\n- **「客戶涉入」對上敏捷宣言第三條**：Royce 主張客戶的參與要「正式、深入、持續」。敏捷宣言第三條是「客戶協作重於合約談判」。隔了三十一年，講的是同一件事——別讓客戶談定需求後就消失，要他持續在場校正方向。又是同向。\n\n所以真實的歷史不是「敏捷推翻瀑布」，而是「**敏捷推翻的是後人對 Royce 的誤讀版（純線性瀑布），而這個誤讀版恰恰也是 Royce 自己反對的**」。Royce、敏捷、與「純瀑布」三者的關係是：Royce 和敏捷站在一邊（都要迭代、要回饋、要客戶涉入），純瀑布的刻板印象站在另一邊——而這個刻板印象沒有真正的作者，它是一張圖被斷章取義的產物。\n\n常見誤解要點破：以為「替瀑布平反」就是「敏捷錯了」。不是。敏捷對「純線性、需求凍結」這個東西的批判完全正確——只是那個東西本來就不該叫「Royce 的瀑布」。平反的是 Royce 這個人，不是純瀑布這套做法。\n\n### 推演題二 **[10 分鐘]** ★★\n\n找出你目前工作中，哪些環節其實是「瀑布式」的（先把設計/契約定下來、後實作）——而且這樣做是**對的**。挑一個具體環節，說清楚：它為什麼適合先設計後實作？如果反過來「先寫實作、再回頭補設計」會付出什麼代價？\n\n#### 推演解答\n\n最乾淨的例子就是本章開頭的 **OpenAPI 契約先行**。\n\n為什麼這個環節適合先設計後實作：因為它是一個**多方協作的介面**。前端、後端、可能還有第三方串接，三方要並行開工。介面是他們之間的共享假設——如果不先把它定死，三方各自憑想像實作，整合那天就是 Brooks 說的 O(n²) 溝通成本總爆發（見 ch10）。先定契約，等於先把「我們之間怎麼對接」這個最容易出協調災難的點凍結下來，讓各方能在穩定的假設上獨立工作。這正是瀑布解的那面牆——大規模協作下的可分工——在小尺度上的合理殘留。\n\n反過來「先實作再補契約」的代價：後端各 endpoint 各長各的、命名與錯誤碼不一致、前端只能等後端寫完才知道介面長怎樣（序列化而非並行，速度砍半），整合期才發現雙方對某個欄位的理解不同——而這時兩邊程式都寫好了，改任一邊都牽動一票已完成的程式碼，成本遠高於動工前在 spec 上改一行。這就是瀑布「越往後改越貴」的成本曲線，在你自己專案裡的微縮版。\n\n關鍵領悟：「先設計後實作」不是瀑布的原罪，是它的**正確基因**。瀑布的錯不在「先設計」，在「**把整個系統的所有設計都凍結在最前面、且不准回頭**」。把設計先行用在「穩定的協作介面」上是對的（介面本就該穩定），用在「會隨理解深化而變的 business logic」上才是錯的。你的 CI 強制 OpenAPI 同步，是把瀑布基因用對了地方的範例。\n\n### 推演題三 **[15 分鐘]** ★★★\n\n反事實推理：**如果需求永遠不變、而且變更成本極高，敏捷還有優勢嗎？** 用這個極端假設，反推「敏捷優於瀑布」這個常見說法到底依賴哪些隱藏前提。然後用這個分析回答：為什麼航太、醫療這些領域至今仍大量採用重量級流程，這是不是它們「落後」？\n\n#### 推演解答\n\n如果需求永遠不變、且變更成本極高，那麼**敏捷的核心優勢會大幅消失，瀑布式的重流程反而更合理**。\n\n先看敏捷的核心賭注是什麼：它賭「需求一定會變，所以與其花大力氣預測未來、不如用短迭代去**適應**變化」（這是 ch12 的核心，敏捷把賭注從「預測」改成「適應」）。這個賭注的價值，完全建立在「需求會變」這個前提上。把前提抽掉——假設需求真的永遠不變——那麼「擁抱變化」這個能力就無處可用，敏捷為了保持靈活而付出的成本（不預先做完整設計、接受重工、持續重構）反而變成純粹的浪費。在一個不會變的世界裡，前期一次把設計做到位、之後嚴格照做，是**最有效率**的，因為你不必為從不發生的變化保留彈性。\n\n再加上「變更成本極高」這條：它讓「快速試錯、壞了再改」的敏捷打法直接變成自殺——因為這裡沒有便宜的「改」。當改一次的代價是飛機墜毀或病人受害時，「先上線再說」不是勇敢，是不負責任。此時前期窮盡一切、把需求與設計驗證到滴水不漏（即使慢、即使貴），才是唯一負責任的做法。\n\n所以「敏捷優於瀑布」這個說法依賴的**隱藏前提**至少有三條：(1) 需求會變且無法預先完全知道；(2) 變更成本不高、能負擔重工與試錯；(3) 拿得到快速回饋（能上線、能觀測真實反應）。這三條在消費級軟體裡幾乎總是成立，所以敏捷在那裡幾乎總是對的——但它們不是宇宙定律。\n\n航太、醫療大量採用重量級流程，**不是落後，是它們所在的牆不一樣**。在那些領域，上述三個前提全部翻轉：需求由物理與法規定死、相對穩定；變更成本是災難級；且不允許拿真實使用者試錯。在這組約束下，重流程是對的工具。把它們的選擇叫「落後」，等於用消費級軟體的世界觀去評判一個前提完全不同的世界——這恰恰是本章警告的那種錯誤：把一套流程的適用邊界忘掉，當成普世真理。**成熟的工程判斷不是「永遠敏捷」或「永遠瀑布」，是認得出自己站在哪一面牆前。**\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. Royce 1970 論文裡那張「瀑布圖」，在他自己的論證裡扮演什麼角色？他緊接著對純線性實作下了什麼判決（那句 risky and invites failure 的精確意思）？\n2. Royce 提出的五項修正裡，哪一項最能證明「他主張迭代而非純線性」？為什麼「Do it twice」直接打臉「Royce 是純瀑布之父」這個說法？\n3. 「waterfall」這個詞是誰、在哪一年貼上去的？它比 Royce 的論文晚了幾年？為什麼說組織是「選擇性地只聽見想聽的那一半」，而不只是單純讀錯？\n4. 重量級流程（瀑布/CMM）撞的是哪一面複雜度的牆？為什麼這面牆跟結構化編程、OOP 撞的牆**性質不同**？（提示：技術複雜度 vs 組織課責複雜度）\n5. 把瀑布「你討厭的三個特徵」（先設計後實作、大量文件、階段簽核）各自對應到它在解的一個組織問題（分工/稽核/抗人員流動/可預測）。\n6. CMM 的真實動機是什麼？國防部為什麼需要它？這跟你今天要求廠商有 SOC 2 / ISO 27001 認證是同一股什麼衝動？\n7. 重量級流程的三筆帳單是什麼？其中「文件異化」是怎麼發生的——文件本來服務於什麼、又怎麼墮落成目的本身？\n8. 為什麼說「瀑布在航太/醫療不是落後」？「敏捷優於瀑布」這句話依賴哪三個隱藏前提？這三個前提在什麼領域不成立？\n\n## 延伸閱讀\n\n- **Royce, \"Managing the Development of Large Software Systems\"（Proc. IEEE WESCON, 1970）**——本章的核心一手文獻，全書最該親自讀的論文之一，約 11 頁，網路上有多份 PDF（如 praxisframework.org、cs.huji.ac.il 等）。**讀法**：讀到那張線性流程圖時先別停，往下讀他怎麼說它「risky and invites failure」、再讀五項修正特別是「Do it twice」那節——你會親眼看見一篇論文怎麼被截走一半。讀完你對「瀑布」這個詞的感覺會永久改變。\n- **Bell & Thayer, \"Software Requirements: Are They Really a Problem?\"（Proc. 2nd ICSE, 1976）**——「waterfall」一詞的出處。不必通讀，找到它引用 Royce、稱之為「the 'waterfall' of development activities」那一句，看一個影響五十年的詞是多隨手地被造出來的。\n- **David Wheeler, \"The Waterfall Model\"（dwheeler.com/essays/waterfall.html）**——對瀑布神話最冷靜可靠的二手整理之一。Wheeler 點明 Royce 稱自己的純線性版本為「simpler method」並明確「recommended against」它，並追溯瀑布如何被後來的標準（如 DOD-STD-2167）固化進政府採購。適合在讀完 Royce 原文後拿來對照、確認自己沒讀偏。\n- **Watts Humphrey, \"Managing the Software Process\"（1989）**——CMM 思想的奠基書。本書不展開 CMM 等級細節，但若你想理解「為什麼有人會想把軟體開發過程分成五級成熟度」，這是源頭。讀「為什麼需要評估一個組織的過程成熟度」的動機部分即可，對應你今天看廠商認證的直覺。\n- **Tobias Mayer / pragtob 等「reading the original Royce paper」系列部落格**——若你一時拿不到或讀不動原論文，這類「逐段帶你讀 Royce 原文」的文章是好的入口（搜尋關鍵字 \"reading the original waterfall paper\"）。挑有**逐字引用** Royce 原句的那幾篇讀，避開只給結論的。它們的共同主題正是本章主題：一篇主張迭代的論文，如何被讀成了它的反面。\n"}, {"id": "ch12-agile", "file": "ch12-agile.md", "group": "Part IV — 流程的戰爭", "title": "ch12 — 敏捷：對重量級流程的反叛", "md": "# ch12 — 敏捷：對重量級流程的反叛\n\n> **本章解決什麼問題**：上一章（見 ch11）替瀑布翻案——重量級流程不是笑話，它在「需求穩定、變更昂貴、可稽核要緊」的世界裡是合理的。但軟體的世界大多不是那樣。1990 年代末，一群人撞上重量級流程的死穴：它把賭注全壓在「我們能在開工前把需求想清楚」上，而真實專案的需求一直在變。這面牆瀑布翻不過去——你沒辦法靠寫更厚的規格文件，把「客戶其實也不知道自己要什麼」這件事消滅掉。敏捷是對這面牆的回應，而它的招數不是更好的預測，是換一種賭法：用短回饋迴圈擁抱變化，而不是預測變化。本章是「方法 strand」的高潮收尾（接 ch10 人月神話、ch11 瀑布），也接住你每天在做的測試、CI、重構——它們是敏捷技術實踐的直系後代。敏捷往維運的延伸（DevOps/SRE）留給 ch18。\n\n## 從你已知的出發\n\n你每天都在實踐敏捷的技術核心，而且你大概也親眼看過敏捷的靈魂被掏空。這兩件事同時為真，正是本章要拆開的張力。\n\n先說你在實踐的那一面。你做 greenfield 微服務時，CI 上有一條規則：OpenAPI schema 一改、client 不同步就擋下整個 pipeline。你寫這條規則不是為了好看，是為了讓「契約變了」這件事立刻、自動、無情地被抓出來，而不是等到三個禮拜後某個前端工程師在 production 才發現欄位對不上。你寫單元測試，不只是為了證明現在對，更是為了讓你**敢改**——有測試網接著，重構才不是賭命。你 review 時把一段醜但能跑的程式留言「先合進去、開個 ticket 之後重構」，你在做的是把「改善設計」變成一件可以分批、持續、安全進行的事，而不是攢到某個神話般的「之後會有時間重寫」。\n\n這三件事——測試先行的安全網、CI 的即時回饋、持續重構——不是雜湊的工程習慣。它們是 1990 年代末一場明確反叛的技術遺產，那場反叛的核心主張只有一句：**既然你擋不住變化，就別再假裝能預測它；改成讓系統隨時都能安全地被改。** 你的 CI 強制同步、你的測試網、你的重構紀律，全都是這句話的可操作版本。\n\n再說被掏空的那一面。你大概也經歷過另一種「敏捷」：每天早上站會，輪流報「我昨天做了什麼、今天要做什麼」，像在跟主管交代進度，沒人真的在「同步」什麼；sprint 結束算 velocity，然後 velocity 變成 PM 拿來壓你「上一季 40 分這一季怎麼只有 35」的棒子；retrospective 變成走過場，講完「下次會更好」沒人跟進。你心裡隱約知道哪裡不對，但說不清楚——明明每個儀式都照著做了，為什麼它感覺跟「敏捷」該有的樣子背道而馳？\n\n本章給你說清楚的工具。那種走味不是你的錯覺——它有名字、有歷史，連當年寫下敏捷宣言的人自己都跳出來罵過。要看懂它，得先回到反叛的現場：一群人到底在反叛什麼、具體改了什麼、那個核心賭注是什麼。\n\n## 反叛的對象：不是文件，是「先預測再執行」這個賭法\n\n先把最常見的誤解清掉，因為它會讓你整章都讀偏。\n\n流行的刻板印象是：「瀑布＝寫一堆文件，敏捷＝不寫文件、快速迭代。」這個對立是錯的，而且錯得很有破壞性——它讓無數團隊以為「我們不寫文件了，所以我們敏捷了」。敏捷宣言裡那句「**Working software over comprehensive documentation**」（可運作的軟體勝過詳盡的文件），關鍵字是 **over**，不是 **without**。宣言結尾那句話常被跳過、卻是整份文件的鑰匙（以下為原文）：\n\n> \"That is, while there is value in the items on the right, we value the items on the left more.\"\n\n也就是說：右邊那些（流程、文件、合約、計畫）**有價值**，敏捷沒說它們是垃圾；只是當你必須在兩者間取捨時，左邊更值錢。把敏捷讀成「不寫文件」，跟把上一章 Royce 讀成「瀑布之父」是同一種病——把一個關於**權衡**的精緻主張，壓扁成一句非黑即白的口號。\n\n那麼反叛的真正對象是什麼？是重量級流程背後那個賭法：**「我們可以在開工前，把需求、設計、計畫都想清楚，然後照計畫執行。」** 上一章說過，Royce 1970 自己畫純線性圖時就警告過它對需求變更脆弱、主張要迭代（見 ch11）；但 1980、1990 年代的企業與政府專案，把這套「先全部想清楚再做」用 CMM 這類成熟度模型制度化、規模化，變成一台龐大的、以文件和階段簽核為骨架的機器。這台機器有一個它無法消化的輸入：**變化**。\n\n把痛攤開來看。重量級流程的生命週期大致是：需求分析（幾個月）→ 設計（幾個月）→ 實作（幾個月）→ 測試（幾個月）→ 上線。整條鏈的有效性，完全建立在一個假設上——**第一階段寫下的需求，到最後一階段還成立**。但真實世界裡：\n\n- 客戶在看到第一版能跑的東西**之前**，往往講不清楚自己要什麼（他要看到才知道「不是這個」）。\n- 市場、法規、競爭對手在這幾個月裡會動。\n- 連團隊自己對問題的理解，都會在動手做的過程中才變深。\n\n於是最致命的事發生了：在這個瀑布模型裡，「需求錯了」這個事實，要等到**最後**整合測試或上線時才會浮現——也就是在你已經把所有錢和時間都花掉之後。回饋迴圈長達數月甚至數年。等帳單回來，沉沒成本已經高到沒人敢喊停，於是大家含淚交付一個「照規格做對、但根本不是客戶要的」的系統。\n\n這就是敏捷撞的牆，而它跟前幾章的牆性質不同。ch05 的牆是「程式大到一個人腦裝不下」（規模 vs 認知）；ch10 的牆是「軟體的本質複雜度砍不掉」（Brooks）。這一章的牆是**時間維度上的**：**世界在你交付之前就變了，而你的流程假設它不會變**。重量級流程不是不努力，是它把全部賭注押在一個會輸的假設上——押「未來可被預測」。\n\n```text\n        重量級流程的賭法：押「需求在開工時就能定死」\n        ┌──────┐  ┌──────┐  ┌──────┐  ┌──────┐  ┌──────┐\n        │ 需求 │─►│ 設計 │─►│ 實作 │─►│ 測試 │─►│ 上線 │\n        └───┬──┘  └──────┘  └──────┘  └──────┘  └───┬──┘\n            │                                        │\n            └────────────────────────────────────────┘\n        回饋要等到「上線」才回來（數月～數年）；等帳單回來，\n        沉沒成本已高到不敢喊停\n```\n\n## 核心賭注：用短迴圈擁抱變化，而不是預測變化\n\n如果問題是「未來無法被準確預測」，那解法的形狀就清楚了：**別再賭預測，改賭適應**。這是敏捷全部主張的根，其餘一切（迭代、測試、CI、重構）都是為了讓「適應」變得便宜又安全而長出來的工具。\n\n敏捷宣言背後的十二條原則裡，第二條把這個賭注講得最白（原文）：\n\n> \"Welcome changing requirements, even late in development. Agile processes harness change for the customer's competitive advantage.\"\n\n**歡迎變更的需求，即使是在開發後期。** 注意這句的攻擊性——它不是「容忍」變化、不是「管理」變化，是 **welcome**、是 **harness**（駕馭、為我所用）。重量級流程把「需求變更」當成要嚴防的災難（change control board、變更申請、影響評估），敏捷把它當成競爭優勢的來源。這是世界觀的一百八十度翻轉。\n\n為什麼「短迴圈」能駕馭變化？因為它把那條長達數月的回饋迴圈，剁成一段段一兩週的小迴圈。每個迭代結束，你交出一塊**真的能跑**的軟體，拿給真實的人看，收到「不對、其實我要的是這個」的回饋——然後在下一個迭代修正。關鍵的數學在這裡：**錯誤的成本，正比於它被發現得多晚。** 在瀑布裡，一個需求理解錯誤潛伏數月才爆，炸掉的是整個專案；在兩週迭代裡，同一個錯誤兩週內就被一塊能跑的軟體照出來，你只損失了兩週。你沒有變得更會預測，你是讓「猜錯」的代價小到可以一直猜、一直修。\n\n這裡要釘死一個觀念，因為它是本章最重要的領悟：**敏捷不是「不做計畫」，是「把賭注從預測改成適應」。** 它沒有取消計畫——它把「一份賭上全部、不容修改的長期計畫」，換成「一連串廉價、隨時可丟棄重來的短期計畫」。你還是規劃，只是你規劃的單位從「整個專案」縮到「下一個迭代」，並且接受每個迭代的結尾都可能推翻你對後面的假設。用你熟的語言講：重量級流程像一次性的大 batch、強一致、回滾代價極高的交易；敏捷像一串小的、冪等的、可重試的訊息——**每一則都小到失敗了也不痛，靠大量短迴圈逼近一個你開工時根本不知道的目標**。你做 SQS 結算 pipeline 時把大工作切成可重試小訊息，是同一個直覺：縮短回饋迴圈、壓低單次失敗代價。敏捷只是把這個你早已內化的原則，用在「整個產品開發流程」這個尺度上。\n\n敏捷面對的是 Brooks 說的**本質複雜度**的一種——「需求不確定性」。它的策略不是消滅（沒有銀彈，見 ch10：沒有任何流程能讓客戶開工時就完全清楚自己要什麼），而是**馴服**——承認需求不確定是不可消除的本質，然後讓它以「可承受的小步損失」持續釋放，而不是「壓抑到最後一次性引爆」。這是方法 strand 的共同底色：方法不創造銀彈，只把不可消除的複雜度安排成人能承受的形狀。\n\n## 前史：反叛不是憑空冒出來的（XP 與 Scrum）\n\n2001 年那份宣言不是起點，是一場已經打了好幾年的仗的**停戰簽字**。在 Snowbird 之前，好幾條獨立的「輕量級流程」血脈各自演化，最重要的兩條是 XP 與 Scrum。\n\n### Extreme Programming：把好實踐推到極致\n\nExtreme Programming（XP，極限編程）的主角是 **Kent Beck**。名字裡的「extreme」是個工程笑話也是個主張：如果 code review 是好事，那就**一直**做（結對編程，pair programming，兩個人共用一個鍵盤、隨時互相 review）；如果測試是好事，那就在寫程式碼**之前**先寫測試（測試先行）；如果整合是好事，那就**一天整合很多次**（持續整合）。XP 的招數不是發明全新的東西，是把一堆「大家都知道是好習慣、但偶爾才做」的實踐，調到最大、變成持續不間斷的紀律。\n\nXP 的鍛造場是一個具體的、有名有姓的專案：**克萊斯勒的 C3 薪資系統（Chrysler Comprehensive Compensation System）**。把這個個案攤開，比任何抽象定義都更能讓你看懂敏捷在反叛什麼。\n\n### 個案：C3——一場反叛的解剖\n\nC3 的目標是用一套新系統取代克萊斯勒好幾套老舊的薪資程式。專案大約 **1993 年**啟動（最初由 Tom Hadfield 主導，1994 年起用 Smalltalk 開發）。到 **1996 年** Kent Beck 被找進來時，系統已經做了好幾年，卻**連一張薪資單都還沒印出來過**——這是重量級開發的典型死法：投入巨大、進度看似在動（文件一份份產出、模組一個個「完成」），但離「能交付的真實價值」始終遙遠。\n\nBeck 進來後做了什麼？他把整套 XP 實踐裝上去：\n\n- **短迭代**：不再追求一次做完整個系統，而是切成小週期，每個週期結束都要有可展示的進展。\n- **結對編程**：兩個人一台機器，知識即時擴散、缺陷即時被抓，沒有「某段程式只有一個人懂」的單點。\n- **測試先行**：先寫測試定義「對」長什麼樣，再寫程式碼讓它通過（這後來被 Beck 整理成 TDD，下節談）。\n- **現場客戶**（on-site customer）：一個真實的業務代表坐在團隊裡，隨時回答「這個 case 該怎麼算」——把那條數月長的需求回饋迴圈，縮短到「轉頭問一句」。\n\n成果：**1997 年系統上線，發出大約九千到一萬人的薪資**（不同來源數字略有出入，未逐一逐字核對；都指向「絕大多數月薪員工」這個量級）。一個卡了好幾年、印不出半張薪資單的專案，在裝上短迭代與現場回饋後跑起來了。Beck 把這套經驗寫成 **《Extreme Programming Explained: Embrace Change》（1999）**——副標題 **Embrace Change**（擁抱變化）就是整章那個核心賭注的四個字版本。\n\n但 C3 的結局，恰恰是本章後半「敏捷理想 vs 現實」最誠實的預演，必須照實講、不能只講成功的上半場。1997 上線後，C3 **再也沒有成功發布過下一個版本**，新開發在 1999 年停掉，專案在 **2000 年 2 月**（克萊斯勒與 Daimler-Benz 合併後）被取消。更刺的一個細節：上線沒幾個月，那個關鍵的「現場客戶」角色——XP 賴以縮短回饋迴圈的人——**因為過勞而離職，且找不到人接替**。\n\n這個細節值得你停下來想。敏捷不是免費的午餐：它把「持續、即時的回饋」當燃料，而這份回饋需要真實的人持續付出（一個全心投入的客戶代表、一群願意天天結對與寫測試的工程師）。當組織只想要敏捷的「快」，卻不願持續供應它賴以運轉的「人的投入」，引擎就會空轉、燒乾。C3 既證明了 XP 能讓卡死的專案跑起來，也預告了它最脆弱的地方——而這個脆弱，正是後來「敏捷被收編」時第一個被犧牲掉的東西。\n\n### Scrum：把節奏與角色制度化\n\n另一條血脈是 **Scrum**，主角是 **Ken Schwaber 與 Jeff Sutherland**。如果 XP 偏重「工程師怎麼寫程式」的技術實踐，Scrum 偏重「團隊怎麼組織節奏」的管理框架——固定長度的迭代（sprint）、每天的同步、明確的角色。兩人在 **1995 年的 OOPSLA 會議**正式發表 Scrum（第一個 Scrum 團隊約在 1993–94）。\n\nScrum 這個名字的來歷，本身就濃縮了整章的主張，值得講清楚——**它不是縮寫**。它的根在一篇商管論文：**竹內弘高（Hiroaki Takeuchi）與野中郁次郎（Ikujiro Nonaka）1986 年發表在《哈佛商業評論》的〈The New New Product Development Game〉**。這兩位學者研究 Honda、Canon、Fuji-Xerox 等公司的產品開發，提出一個對比（以下為論文大意，非逐字引文）：傳統的開發像**接力賽（relay race）**——每一棒（部門/階段）跑完自己這段，把棒子交給下一棒，分工清楚但僵硬；他們觀察到的高效團隊則像**橄欖球（rugby）**——整支隊伍抱成一團、一起朝球門推進，球在隊員之間靈活地來回傳遞。「Scrum」正是橄欖球裡那個全隊擠在一起爭球的陣式。\n\n看出這個隱喻在反叛什麼了嗎？**接力賽就是瀑布**——需求組跑完交給設計組，設計組跑完交給開發組，一棒交一棒、回不了頭。**橄欖球就是敏捷**——跨職能的一隊人一起、同時、持續地往目標推，需求、設計、實作交織進行而非依序交棒。Sutherland 後來把這篇論文的洞見，結合迭代增量開發、物件導向、經驗式流程控制，落地成軟體開發的 Scrum 框架（具體的 sprint/站會/角色 how-to 不在本書範圍，這裡只取它的歷史與哲學）。\n\n```text\n        竹內・野中 1986：兩種開發節奏\n\n        接力賽（=瀑布）：一棒交一棒，回不了頭\n        [需求]──棒──►[設計]──棒──►[開發]──棒──►[測試]\n\n        橄欖球（=敏捷）：跨職能一隊，抱團一起推進\n        ┌─────────────────────────────────────┐\n        │  需求 ◄─► 設計 ◄─► 開發 ◄─► 測試    │\n        └──────────────────┬──────────────────┘\n                           │   整隊同時往前\n                           ▼\n                   球門（可交付的價值）\n```\n\n## 把「擁抱變化」變成可操作的紀律（TDD／重構／CI）\n\n「擁抱變化」聽起來像一句勵志標語。它之所以沒淪為空話，是因為敏捷給了它三件具體的工程紀律當骨架。少了這三件，「歡迎變更」只是嘴上說說——因為一個你**不敢改**的系統，再怎麼歡迎變化也是假的。這三件事的共同目的只有一個：**讓系統隨時都能被安全地改動**。它們是你今天日常的直系祖先，值得各自釘清楚來歷。\n\n**測試驅動開發（TDD）**。歸給 **Kent Beck**，但他自己說是「重新發現」而非發明——這個謙遜很重要，本書反覆出現（McCarthy 的 GC、Hopper 的編譯器都有歸屬該不該算「發明」的分寸問題）。TDD 的節奏是 red-green-refactor：先寫一個會失敗的測試（red，定義「對」是什麼）→ 寫最少的程式碼讓它通過（green）→ 在測試保護下重構（refactor）。TDD 真正搬走的複雜度不是「驗證正確」——是**讓你敢改**。一套覆蓋夠的測試，是一張隨時告訴你「你剛剛有沒有弄壞什麼」的安全網；沒有它，每次修改都是在沒繩索的情況下走鋼索，於是人會本能地**不敢動**舊程式碼，系統就僵化、腐爛。TDD 是「擁抱變化」的技術前提：你得先有網，才敢談擁抱。\n\n**重構（Refactoring）**。系統化的論述歸給 **Martin Fowler 的《Refactoring》（1999）**（學術源頭可上溯到 William Opdyke 1992 的博士論文）。重構的定義很精確：**在不改變外部行為的前提下，改善內部結構**。為什麼這是敏捷的必需品？因為敏捷放棄了「開工時就把設計想到完美」——它接受你會邊做邊懂、設計會隨理解加深而需要調整。重構就是讓「持續調整設計」變成一件安全、日常、小步進行的事，而不是攢到某個傳說中的「大重寫」。它和 TDD 是一對：測試提供安全網，重構在網上改善結構。你 review 時說「先合進去、開 ticket 重構」，你執行的就是 Fowler 這套——把改善設計從「一次性豪賭」變成「持續償還的小額分期」。\n\n**持續整合（CI）**。歸屬要小心，照 landscape：「CI」一詞**一般歸於 Grady Booch**（1990 年代，在他的物件導向分析與設計著作裡用到），**由 Beck 與 XP 發揚光大**——這個歸屬常被簡化成「XP 發明了 CI」，並不準確。CI 的痛點來自一個你太熟的災難：**整合地獄（integration hell）**。重量級流程裡，大家各自開發數週甚至數月，最後才把所有人的程式碼合在一起——然後發現它們互相衝突、誰也兜不攏，整合本身變成一個漫長痛苦、充滿驚嚇的階段。CI 的解法和敏捷的核心賭注完全同構：**別讓回饋迴圈變長**。一天整合很多次，每次只合一小塊，衝突在它還小、還好解的時候就被抓出來。你的 CI 強制 OpenAPI 同步、PR 一推就跑全套測試與 lint——這正是 Booch 命名、XP 發揚的那個主張，在 2026 年的成熟形態：**把「壞掉了」這個訊號的延遲，壓到接近零**。\n\n三件紀律連起來看，是一台精巧的機器：\n\n```text\n        三件紀律，一個目的：讓系統隨時可被安全改動\n        ┌────────────────┐\n        │ TDD：先寫測試  │  造出「敢改」的安全網\n        └───────┬────────┘\n                ▼\n        ┌────────────────┐\n        │ 重構：在網上改 │  持續調整設計，不攢到大重寫\n        └───────┬────────┘\n                ▼\n        ┌────────────────┐\n        │ CI：頻繁整合   │  把「壞了」的回饋延遲壓到近零\n        └───────┬────────┘\n                ▼\n            擁抱變化（變成可操作，而非口號）\n```\n\n這台機器就是「把賭注從預測改成適應」的物理實現。預測的賭法不需要這些——如果你相信開工就能想清楚一切，你不需要隨時能安全改動的能力。正因為敏捷賭的是「我會一直猜錯、一直要修」，它才**必須**有一套讓「修」變便宜又安全的工具。你天天在用這台機器，現在你知道它是為了押哪個賭注而造的了。\n\n## 帳單：當反叛被收編成儀式劇場\n\n到這裡為止都是敏捷的上半場——一個漂亮、有道理、被你日常驗證為真的賭注。但本書不寫鄉愁、也不寫行銷，必須誠實記下半場：**敏捷贏了，然後被它的勝利反噬。** 這是方法 strand 一個反覆出現的悲劇模式，值得攤開。\n\n機制是這樣的。敏捷宣言的核心是**價值與原則**——個人與互動重於流程與工具、可運作的軟體重於文件、擁抱變化。但價值與原則很難賣、很難稽核、很難寫進顧問合約。於是市場做了它總會做的事：**把難賣的靈魂，換成好賣的軀殼**。「個人與互動重於流程與工具」這條，被一整套**流程與工具**（認證、儀式、看板軟體、教練顧問）給包裝起來販賣——這本身就是對宣言第一條價值的精準背叛。敏捷宣言反的是重量級流程，結果催生了一個新的重量級流程產業。\n\n落到你身上的具體走味，你都見過：\n\n- **站會變成進度匯報**。每日站會（daily stand-up）的原意是團隊**互相同步**、暴露阻礙、好讓大家自組織地排除障礙。被收編後，它變成輪流對著主管（或 Scrum Master 代理的主管之眼）報「昨天/今天/阻礙」三段式進度——**溝通的方向從「橫向同步」偷偷轉成了「縱向交代」**。一個本來服務團隊的儀式，變成服務管理層監控的工具。\n- **velocity 變成績效棒子**。velocity（團隊每個迭代完成的工作量估計）的原意是**團隊自己**用來預測「下個 sprint 大概能吃多少」的內部規劃工具，是給團隊看的、會自然波動的估計。被收編後，它變成管理層拿來跨團隊比較、施壓、考核的 KPI——「為什麼這隊 velocity 比那隊低」。一旦估計值變成考核指標，它立刻被 Goodhart 定律反噬：工程師學會灌水點數，數字漂亮了、意義消失了。一個本來幫團隊誠實面對自己速度的工具，變成逼團隊對自己撒謊的棒子。\n- **儀式照做、靈魂出走**。sprint planning、retrospective、grooming 一個不漏地開，但每個都變成走過場——retrospective 講完「下次會更好」沒人跟進，planning 變成把上面交辦的工作硬塞進固定 sprint。**形式被完整保留，目的被完整抽空**。\n\n這不是我的吐槽，是當年寫下宣言的人自己的判決，而且分量極重——**簽署那份宣言的十七人裡，有人公開宣告它已死**。**Dave Thomas**（宣言十七位簽署人之一）2014 年寫了〈Agile is Dead (Long Live Agility)〉，大意是說「Agile」這個詞已經被顛覆到幾乎失去意義，如今所謂的敏捷社群，很大程度淪為顧問與廠商兜售服務和產品的場子（非逐字引文，已查證其立場與文章存在）。同為十七人之一的 **Martin Fowler**，在 2018 年 Agile Australia 的演講裡，把敏捷的現狀稱為一場 **travesty**（拙劣的諷刺），矛頭指向一個他命名為「**Agile Industrial Complex**（敏捷工業複合體）」的東西——一個把「方法」強加於人的產業，而這恰恰是宣言第一條價值（個人與互動 **over** 流程與工具）所反對的。\n\n把這件事的諷刺講到底：**敏捷反叛的是「重量級流程把過程本身變成目的」，而被收編後的敏捷，自己變成了一套「把儀式本身變成目的」的重量級流程。** 鐘擺盪了一整圈，回到它出發時反對的東西旁邊。你經歷過的「假敏捷」，不是個別公司執行不力的偶發事故，是一個有名字、被原作者親自認證的系統性現象。看懂這個，你就有了診斷自己團隊的工具：問一句「這個儀式現在服務的是團隊的回饋，還是管理層的監控？」——答案會告訴你，你做的是敏捷，還是敏捷的標本。\n\n## 複雜度搬去哪了\n\n敏捷這一跳，照例結一筆帳——它消滅了什麼負擔，又製造了什麼新負擔。\n\n| 項目 | 內容 |\n|---|---|\n| **撞的牆** | 時間維度的牆：世界（需求、市場、團隊自己的理解）在交付之前就變了，而重量級流程把全部賭注押在「未來可被預測、需求可在開工時定死」這個會輸的假設上 |\n| **這次主導的 strand** | 方法 strand（流程方法的反叛與重組），但與抽象 strand 交織——TDD/重構/CI 把「適應」這個方法主張，沉澱成測試框架、CI 工具、IDE 重構功能等技術抽象 |\n| **消滅了什麼負擔** | 「猜錯需求要等數月/數年、付出整個專案才發現」的巨額延遲成本；把一條超長回饋迴圈剁成一串短迴圈，讓單次猜錯的代價從「炸掉專案」降到「損失一個迭代」 |\n| **複雜度搬到哪** | 「需求不確定性」這個本質複雜度沒被消滅（沒有銀彈，見 ch10），它被**搬成一筆持續支付的成本**——持續的回饋、持續的測試維護、持續的重構、持續的整合，由團隊每天小額償還，取代「最後一次性引爆」 |\n| **新製造的負擔** | (1) 敏捷靠「人的持續投入」當燃料（投入的客戶代表、願意天天結對與寫測試的工程師），這份投入難以持續、易過勞（見 C3 現場客戶燒乾）；(2) 測試/CI 本身是要長期維護的資產，測試腐爛、CI 變慢會反過來拖累迭代；(3) 沒有了長期計畫的錨，弱組織容易滑進「無止境地對需求做反應、看不見全局方向」的另一種失控 |\n| **會在哪洩漏／反噬** | 當組織只要敏捷的「快」、不願供應它賴以運轉的「人的投入與信任」時，敏捷退化成**儀式劇場**：站會變進度匯報、velocity 變績效棒子、儀式照做而靈魂出走——反叛重量級流程的敏捷，自己變成一套把儀式當目的的重量級流程（鐘擺盪回原點） |\n| **這一跳的帳單一句話** | 用「持續的小額成本（回饋、測試、重構、整合）」換「猜錯需求的代價從炸掉專案降到損失一個迭代」——複雜度從「最後一次性引爆」搬成「每天分期償還」，而分期一旦停付（或被異化成考核儀式），帳單立刻以走味的形式回來 |\n\n## 紙上推演\n\n### 推演題一 **[15 分鐘]** ★★\n\n用「擁抱變化 vs 預測變化」這組對立，向一個資淺工程師解釋敏捷與瀑布的**根本**分歧。要求：你的解釋**不准**用「文件多寡」或「快不快」當主要區別（那是表面症狀，不是病根），而要落在「兩者各自賭未來是不是可預測的」這個賭法差異上。並說清楚為什麼「敏捷＝不寫文件」是個有破壞性的誤讀。\n\n#### 推演解答\n\n根本分歧在賭法，不在文件量。**重量級流程賭「未來可被預測」**——它假設你能在開工前把需求、設計、計畫想清楚，然後照計畫執行；它的整個生命週期（需求→設計→實作→測試）的有效性，都建立在「第一階段寫下的需求，到最後一階段還成立」這個假設上。**敏捷賭「未來不可被準確預測」**——它承認客戶在看到能跑的東西之前講不清要什麼、市場與理解都會變，所以放棄預測，改用短迭代＋持續回饋來**適應**變化。\n\n把賭法講清楚後，「文件多寡」與「快不快」就只是這個賭法差異的下游症狀：因為瀑布賭預測，它需要厚重的前期文件把預測固定下來、需要階段簽核確保大家照預測走；因為敏捷賭適應，它把規劃單位縮到一個迭代、把投入導向「能跑的軟體」這個最誠實的回饋來源。文件變少是**結果**，不是目的。\n\n為什麼「敏捷＝不寫文件」有破壞性？因為它讓團隊以為「我們停掉文件就敏捷了」，完全錯過了真正的轉變（賭法）。宣言原文是「Working software **over** comprehensive documentation」——關鍵是 over（取捨時的優先序）不是 without（拋棄）；結尾還明說「右邊那些仍有價值，只是左邊更重要」。把它讀成「不寫文件」，跟把 Royce 讀成「瀑布之父」（見 ch11）是同一種病——把一個關於**權衡**的主張，壓扁成非黑即白的口號。\n\n常見誤解點破：學徒最容易抓著「站會、sprint、不寫文件」這些**儀式與症狀**來定義敏捷，於是「照做儀式」就自認敏捷。反駁的關鍵是把定義從「做哪些儀式」搬到「押哪個賭注」——一個團隊就算開齊所有儀式，只要它骨子裡還在賭「需求開工就能定死」，它就還是瀑布。\n\n### 推演題二 **[15 分鐘]** ★★★\n\n診斷你親身經歷過的一次「假敏捷」走味。具體說清楚：(a) 哪個儀式或指標被異化了；(b) 它**原本**服務的對象/目的是什麼；(c) 被收編後它**實際**服務的對象/目的變成什麼；(d) 它背離了敏捷宣言四條價值或十二條原則裡的哪一條。試著至少診斷「站會變進度匯報」與「velocity 變績效棒子」其中一個，並對照宣言原文。\n\n#### 推演解答\n\n以「velocity 變績效棒子」為例（站會那題同理可套）：\n\n(a) 被異化的指標：velocity（團隊每迭代完成的工作量估計）。\n\n(b) 原本的對象/目的：**給團隊自己用**的內部規劃工具，用來預測「下個 sprint 大概能承接多少工作」。它本質是一個會自然波動的估計值，服務的是團隊的自我規劃。\n\n(c) 收編後實際的對象/目的：變成**管理層**拿來跨團隊比較、施壓、考核的 KPI（「為什麼這隊比那隊低」「上季 40 這季怎麼掉到 35」）。服務對象從「團隊的規劃」偷換成「管理層的監控」。\n\n(d) 背離哪一條：最直接背離第一條價值「**Individuals and interactions over processes and tools**」——把一個服務人與團隊互動的估計工具，異化成一個用流程/指標去管控人的棒子。它也踩到「**信任**團隊、給他們所需的支持」這條原則的反面：用估計值當考核棒，等於宣告不信任團隊會誠實規劃。\n\n關鍵機制要講出來：一旦一個**估計值**被當成**考核指標**，它就觸發 Goodhart 定律——「當一個量度變成目標，它就不再是好的量度」。工程師理性的反應是灌水點數（同樣的工作估更多分），於是數字越來越漂亮、越來越沒意義。**這不是執行不力，是把工具用在它被設計來抵抗的方向上。**\n\n延伸的領悟：診斷任何「假敏捷」都有一把通用鑰匙——問「這個儀式/指標現在服務的，是團隊的回饋與自組織，還是管理層的監控與考核？」方向一旦從橫向（團隊內同步）偷轉成縱向（向上交代），它就從敏捷的工具，變成了敏捷的標本。\n\n### 推演題三 **[10 分鐘]** ★★\n\n對帳：把你的 CI/CD pipeline 拆開，逐項對應它實現了敏捷的哪些主張。至少涵蓋：(1) CI 強制 OpenAPI 同步、PR 一推就跑全套測試與 lint；(2) 自動化測試套件；(3) 頻繁、小批量的部署。每一項說清楚它在押「把賭注從預測改成適應」這個核心賭注的哪一面。\n\n#### 推演解答\n\n- **CI 強制 OpenAPI 同步 + PR 跑全套測試/lint**：這是「持續整合」的直系後代（Booch 命名、XP 發揚）。它押的賭注是「**別讓回饋迴圈變長**」——把「契約壞了/測試掛了」這個訊號的延遲壓到接近零（推 PR 的當下就知道），對抗的是重量級流程的「整合地獄」（大家各自做數週、最後才合、然後兜不攏）。對應核心賭注的「適應」面：你不預測「大家寫的不會衝突」，你讓衝突在它還小的時候就被自動照出來。\n\n- **自動化測試套件**：是 TDD 留下的安全網（就算你沒嚴格 red-green-refactor，測試的目的一致）。它押的是「**讓系統隨時能被安全改動**」——有網才敢改，敢改才談得上擁抱變化。它對應的不是「驗證正確」這麼淺，而是「讓修改的代價與恐懼降到可以一直修」。\n\n- **頻繁、小批量部署**：把「交付」這條回饋迴圈也剁短——小批量上線，一旦出事，回滾範圍小、定位快（呼應你 SQS pipeline 把大工作切成可重試小訊息的直覺）。它押的是「**單次失敗的代價要小到可承受**」——你不賭「這次大版本不會出事」，你賭「就算出事，因為批量小，損失也有限」。\n\n對帳的領悟：你的整條 pipeline，本質上是一台「把回饋迴圈縮短、把單次失敗代價壓低」的機器——而這正是敏捷核心賭注（用短迴圈適應、而非長計畫預測）的自動化、工程化形態。你可能從沒讀過敏捷宣言，但你的 CI/CD 每一條規則都在替它的核心主張背書。值得注意的反差：你在**技術實踐**這一層把敏捷做得很紮實（CI、測試、重構），但很多團隊正是在**流程儀式**那一層把敏捷做壞了（站會、velocity 走味）——這提示你，敏捷真正活著的地方，往往在 pipeline 裡，而不在會議室裡。\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. 敏捷反叛的真正對象是什麼？為什麼說「瀑布＝寫文件、敏捷＝不寫文件」這個對立是錯的、而且有破壞性？（提示：宣言裡的 over vs without、結尾那句保留條件）\n2. 敏捷撞的那面牆，跟 ch05（規模 vs 認知）、ch10（本質複雜度）撞的牆，性質有什麼不同？為什麼這面牆瀑布翻不過去？\n3. 用你自己的話講清楚敏捷的核心賭注——「用短迴圈擁抱變化，而不是預測變化」。為什麼「縮短回饋迴圈」能駕馭變化？這跟你把大工作切成可重試小訊息的直覺是同一件事嗎？\n4. 把 C3 專案的故事講給另一個工程師聽：它卡在哪、Beck 裝上 XP 後改了什麼、為什麼最後仍然失敗（現場客戶過勞那個細節）。這個失敗預告了敏捷後來被收編時，第一個被犧牲的是什麼？\n5. Scrum 這個名字為什麼來自橄欖球？竹內・野中 1986 年的「接力賽 vs 橄欖球」對比，怎麼對應「瀑布 vs 敏捷」？\n6. TDD、重構、CI 三件紀律的共同目的是什麼？為什麼說「擁抱變化」少了這三件就只是口號？（提示：一個你不敢改的系統，再怎麼歡迎變化也是假的）\n7. 「敏捷被收編成儀式劇場」的機制是什麼？為什麼「個人與互動重於流程與工具」這條價值，特別諷刺地被一個流程與工具的產業給包裝販賣了？\n8. 用「velocity 變績效棒子」當例子，講清楚 Goodhart 定律怎麼把一個團隊內部的估計工具，異化成逼團隊對自己撒謊的棒子。診斷任何「假敏捷」的那把通用鑰匙是什麼？\n\n## 延伸閱讀\n\n- **《Manifesto for Agile Software Development》（agilemanifesto.org，2001）**——四個價值＋十二條原則，全文不到一頁，必讀原文。重點看四句 over 後面那句保留條件「while there is value in the items on the right, we value the items on the left more」，以及十二原則第二條「Welcome changing requirements, even late in development」——整章的核心賭注就在這兩句裡。網站的 history.html 頁有 Snowbird 現場的第一手回憶。\n- **Kent Beck, 《Extreme Programming Explained: Embrace Change》（1999）**——XP 的綱領，副標題就是本章核心四個字。不必通讀，看它怎麼論證「把好實踐推到極致」（為什麼整合好就一天整合很多次、測試好就先寫測試）；這是「把擁抱變化變成可操作紀律」的源頭文本。\n- **Takeuchi & Nonaka, 〈The New New Product Development Game〉（Harvard Business Review, 1986）**——Scrum 的思想根。看「接力賽 vs 橄欖球」那組對比，你會發現敏捷對「跨職能團隊一起推進、而非依序交棒」的主張，1986 年就被兩位商管學者在汽車與相機工廠裡觀察到了——軟體業是後來才追上。\n- **Martin Fowler, 《Refactoring》（1999；第 2 版 2018 改用 JavaScript 範例）**——重構的系統化論述。讀「為什麼重構」那幾章就好：理解「在不改變外部行為下持續改善內部結構」為什麼是敏捷的必需品（因為敏捷放棄了開工就設計完美、必須邊做邊改）。martinfowler.com 上有大量免費的 bliki 短文可先嚐。\n- **Dave Thomas, 〈Agile is Dead (Long Live Agility)〉（2014，部落格文與演講）**——宣言十七位簽署人之一，親手宣告「Agile」一詞已被掏空。配 **Martin Fowler「The State of Agile Software in 2018」（Agile Australia 2018 keynote）**裡的「Agile Industrial Complex」一段一起看——兩位原作者親口診斷自己的孩子怎麼被收編，是本章「帳單」那節最有分量的一手佐證。\n- **Winston Royce, 〈Managing the Development of Large Software Systems〉（1970）**——讀過 ch11 的話回頭再看一次：Royce 1970 就主張迭代與「do it twice」，敏捷某種意義上是把這個被埋沒三十年的主張，補完成一整套可操作的流程。瀑布與敏捷的對立，有很大成分是後人對 Royce 的誤讀製造出來的稻草人。\n"}, {"id": "ch13-relational-model", "file": "ch13-relational-model.md", "group": "Part V — 資料、開源與網路", "title": "ch13 — 關聯模型：把資料的複雜度搬給引擎", "md": "# ch13 — 關聯模型：把資料的複雜度搬給引擎\n\n> **本章解決什麼問題**：前面十二章，抽象 strand 把「對機器說話」「組織控制流」「綁定資料與行為」這些複雜度一層層外包出去，方法 strand 也從軟體危機一路打到敏捷。但有一塊複雜度一直被晾在角落沒人系統性處理：**資料怎麼存、怎麼取**。在 1970 年以前，這件事的答案是「程式設計師自己在程式裡寫存取路徑」——你想找一筆資料，得親手沿著指標一個一個跳。本章講一個 IBM 研究員怎麼用一篇論文把這整塊複雜度搬走：Codd 的關聯模型提出**資料獨立性**——你只說「要什麼」（宣告式），引擎決定「怎麼拿」（查詢最佳化器）。這是抽象 strand 在資料層的一次乾淨勝利，也是你天天靠它吃飯卻很少回頭看的奢侈。然後本章講帳單：這個奢侈在規模逼到牆角時開始洩漏（N+1、慢查詢、最佳化器猜錯），以及 2009 年前後 NoSQL 的反動——當資料大到單機放不下、要橫跨機房時，CAP 逼你在一致性上選邊，鐘擺從「引擎包辦一切」擺回「應用自己扛一致性」。這是 Part V「資料、開源與網路」的第一章；ch14 講開源與 Git 重寫協作的所有權，ch15 講軟體從盒子搬到伺服器——但先有 Codd 把資料的複雜度搬給引擎，後面那條「軟體變成服務」的線才有地基。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型 ◄你在這裡\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n你進入 Part V 了。前面四個 Part 講「用什麼蓋程式、一群人怎麼一起蓋」；接下來三章換一個主角——**程式之外的那些複雜度怎麼被馴服**：資料（本章）、協作與所有權（ch14）、交付形態（ch15）。這條線的源頭，是一個你每天用到、卻幾乎從不感謝的奢侈。\n\n## 從你已知的出發\n\n你寫過的 SQL，這輩子大概數不清了。隨手一句：\n\n```sql\nSELECT u.name, COUNT(o.id) AS order_count\nFROM users u\nJOIN orders o ON o.user_id = u.id\nWHERE u.created_at > '2026-01-01'\nGROUP BY u.id\nHAVING COUNT(o.id) > 5;\n```\n\n你寫這句的時候在想什麼？你在想**你要什麼**：建立在 2026 年後的使用者裡，下單超過五次的，給我名字和單數。你**沒有**在想：先掃 `users` 還是先掃 `orders`？走哪個 index？用 nested loop join 還是 hash join？要不要先把 `orders` 依 `user_id` 排序再 merge？這些「**怎麼拿**」的決定，你一個都沒下——你把它們整包丟給了資料庫引擎的**查詢最佳化器（query optimizer）**，它讀了你的 schema、看了 index、估了每張表的列數與資料分布，自己挑了一條執行計畫。\n\n這件事有多奢侈，要等你親眼看過它的代價才會懂。回想你那個招牌戰績：某次尖峰時段 RDS 的 CPU 爆到頂，你下去 profiling，發現是一句查詢漏了 index，全表掃描。你做了什麼？你**加了一個 index**，CPU 降了 40%。注意這裡發生了什麼魔法——**你改了資料「怎麼被存取」（多了一個 B-tree），但你一行應用程式碼都沒動**。那句 `SELECT` 原封不動，它跑得快了一個數量級。應用程式根本不知道、也不需要知道底下多了個 index。\n\n這個「改存取方式不用改程式」的能力，有個名字，叫**資料獨立性（data independence）**。它不是天上掉下來的。1970 年以前，這件事是**做不到的**——那時候，「怎麼存取」這件事是用手寫死在你程式裡的，你想換個存取路徑，就得改一堆程式。你今天能加 index、能調 isolation level、能設 read replica 把讀流量導走、能對大表做 partition——這些調校全都建立在一個前提上：**底層怎麼變，上層的查詢語意不變**。這個前提，是一個叫 Edgar F. Codd 的人在 1970 年用一篇論文掙來的。\n\n而當你在某些場景放棄了 SQL、改用 Redis 或某種 NoSQL——比如你拿 Redis 當 cache 或做 Pub/Sub、用最終一致性處理 SQS 訊息——你其實是在做一個更深的決定：你**主動放棄了 Codd 那套引擎包辦一切的奢侈**，換取規模或延遲，自己把一致性的擔子扛回了應用層。這也不是新鮮事。它是 2009 年前後一整代工程師集體做過的同一個選擇，背後有一條定律（CAP）在逼著你選邊。\n\n本章講的就是這條從「自己手寫存取路徑」到「引擎包辦」再到「為了規模又把一部分擔子要回來」的完整弧線。你天天站在這條弧線的某個點上，現在我們把它從頭走一遍。\n\n## 前關聯時代：程式設計師是「領航員」\n\n要懂 Codd 翻過的是哪面牆，得先看牆的另一邊長什麼樣。\n\n1960 年代，企業開始把大量資料放進電腦——銀行帳戶、庫存、訂單、保單。當時的資料庫主要有兩種模型：**階層式（hierarchical）**，代表是 IBM 的 **IMS**（Information Management System，1960 年代末隨 Apollo 計畫而生），資料組成一棵樹；以及**網狀式（network）**，由 CODASYL committee 標準化（CODASYL 標準約 1971 年定案），資料組成一張用指標串起來的網。這兩種後來被合稱為**導航式資料庫（navigational database）**——因為存取資料的方式，是「導航」。\n\n導航是什麼意思？意思是：你的程式想找一筆資料，得**自己沿著指標一個一個跳**。資料庫開啟時給你一個起點記錄，那筆記錄裡有指向其他記錄的指標；你要找的東西不在這筆，就順著指標跳到下一筆，再下一筆，直到找到為止。**存取路徑（access path）——先讀哪筆、沿哪條指標鏈走、走訪的迴圈怎麼寫——全部是程式設計師手寫在應用程式裡的。**\n\n這個世界觀有一個再貼切不過的官方代言。1973 年，網狀資料庫的主要設計者 **Charles Bachman** 拿了圖靈獎，他的得獎演說標題就叫——**〈The Programmer as Navigator〉（程式設計師作為領航員，刊於 *CACM* 1973 年 11 月）**。Bachman 在台上熱情地描繪一個新世界：程式設計師應該把自己想成一個在資料的「空間」裡航行的領航員，從一筆記錄出發，熟練地在記錄之間穿梭、跳轉、定位。對 Bachman 來說，這是進步——程式設計師終於從「死記憶體位址」裡解放出來，能在更高層的記錄結構間導航了。\n\n從今天回看，這個比喻精準到反諷。它精準地點出了那個時代的全部複雜度，然後把它當成榮耀。「領航員」是什麼意思？意思是**你得知道路**。你得知道資料是怎麼擺的、哪筆連到哪筆、走哪條路最快。這些知識——資料的物理結構與存取路徑——被焊死在你的應用程式裡。後果是一連串的脆弱：\n\n- **存取路徑相依（access path dependence）**：你的程式寫死了「沿著這條指標鏈走」。哪天 DBA 為了效能改了資料的組織方式、調整了指標結構，你那段導航程式就**全錯了**，得重寫。\n- **順序相依（ordering dependence）**：程式假設了記錄的物理排列順序。底層一換排法，邏輯就崩。\n- **索引相依（indexing dependence）**：要加一個 index 或拿掉一個 index，可能逼著應用程式跟著改——因為程式知道、也依賴 index 的存在。\n\n把這三條合起來看：**在前關聯時代，「資料怎麼存」和「程式怎麼寫」是死死綁在一起的。** 你動不了其中一個而不動另一個。這正是 ch06 Parnas 說的「資訊隱藏」在資料層的反面教材——導航式資料庫把「資料的物理結構」這個**最該被藏起來、最可能改變的決策**，大喇喇地暴露給每一支應用程式，於是每一次物理變更都漏成上層的災難。\n\n用你的語言講：想像你的 ORM 不存在，連 SQL 都不存在。你要查「2026 年後下單超過五次的使用者」，你得**自己寫一個迴圈**：開啟使用者檔，拿到第一筆，檢查建立日期，是的話順著這個使用者的「訂單指標鏈」一筆一筆數他的訂單，數完超過五就收進結果，然後跳到下一個使用者……而且這條走訪路徑，你還得確保它走的是當前最快的那條，不然效能慘不忍睹。你不只要說「我要什麼」，你得從頭到尾規定「怎麼拿」。這就是 Bachman 口中那個值得驕傲的「領航」。Codd 看著這個世界，覺得這整件事根本就錯了。\n\n## Codd 1970：把「怎麼拿」整包搬給引擎\n\nEdgar F. Codd 是 IBM San Jose 研究中心的研究員，數學家出身。1970 年 6 月，他在 *CACM* 發表了 **〈A Relational Model of Data for Large Shared Data Banks〉**。這篇論文，我認為是軟體史上影響力最被「日用而不知」掩蓋的一篇——它太成功了，成功到它解決的問題今天的人根本想像不到曾經是個問題。\n\nCodd 的核心洞見可以用一句話講：**把資料的「邏輯結構」和「物理結構」徹底切開，讓程式只面對邏輯結構。**\n\n他的武器是數學裡的「關係（relation）」——白話講就是**表（table）**：列（row）是元組、欄（column）是屬性，沒有指標、沒有指向別筆記錄的鏈、沒有規定的順序。表與表之間的關聯不靠物理指標，而靠**值**（一張表的某欄值，去對應另一張表的某欄值——也就是你天天寫的 JOIN）。配套的是**關聯代數（relational algebra）**：selection、projection、join 這些集合運算，定義了「可以對表做哪些操作」，而且這些操作的定義**完全不提資料在磁碟上長什麼樣**。\n\n但 Codd 真正的目標，論文裡寫得很白——不是「表」這個資料結構本身，而是**資料獨立性（data independence）**。他把它定義為「應用程式與終端活動，獨立於資料型別的增長與資料表示方式的變更」。他在論文裡明確點名要消滅前面那三種相依：**存取路徑相依、順序相依、索引相依**——這三條，正是導航式資料庫把程式設計師釘死在物理結構上的三根釘子。Codd 要把它們一次拔掉。\n\n拔掉之後是什麼世界？是**宣告式（declarative）**的世界。這是整章的樞紐，值得停下來把它和你天天做的事對齊：\n\n- **導航式（命令式）**：你告訴電腦**怎麼做**——開檔、拿第一筆、檢查、沿指標跳、迴圈、收集。你是領航員，你得知道路。\n- **關聯式（宣告式）**：你告訴電腦**你要什麼**——「給我滿足這些條件的列」。**怎麼拿，是引擎的事，不是你的事。**\n\n這個切換把一塊巨大的複雜度從**每一支應用程式**裡，搬到了**一個地方**——資料庫引擎。而引擎裡負責「決定怎麼拿」的那個元件，就是**查詢最佳化器**。它讀你的宣告式查詢，自己決定走哪個 index、用哪種 join 演算法、先過濾哪張表。你那句 `SELECT` 不再規定路徑，它只描述目標；路徑由最佳化器當下、根據當下的資料分布與可用 index，動態決定。\n\n這也解釋了你那個「加 index 不用改程式」的魔法為什麼成立。因為你的查詢從一開始就**沒有**承諾任何存取路徑——它只說了要什麼。你加 index，等於給了最佳化器一條新路；它發現新路更快，就改走新路。你的查詢一個字都不用改，因為它本來就把「怎麼走」的決定權讓給了引擎。**這就是資料獨立性，這就是 Codd 1970 搬給你的奢侈。**\n\n> **一個誠實的歷史補丁**：Codd 的論文一開始在 IBM 內部並不順利。IBM 當時的金雞母是階層式的 IMS，內部有龐大的既得利益。Bachman 陣營（導航派）和 Codd 陣營（關聯派）在 1970 年代初是真刀真槍辯論過的——導航派認為關聯模型「太慢、不切實際」，因為讓引擎自動決定路徑，怎麼可能比人手工調的路徑快？這個質疑你應該覺得似曾相識：它和 ch03 裡「編譯器產生的碼怎麼可能比手寫機器碼快」是**同一個質疑、同一條鐘擺**（效能 ↔ 生產力）。而答案也一樣：一開始確實慢，但當「自動的那一方」（最佳化器／編譯器）被打磨到夠好，生產力的勝利就壓倒了效能的疑慮。\n\n## SQL 與 ACID：把勝利標準化\n\nCodd 給了模型，但模型要落地，得有兩樣東西：一個讓人能用的**語言**，和一套讓人敢把錢存進去的**保證**。\n\n**語言：SEQUEL → SQL（1974）。** Codd 的關聯代數是數學家的語言，一般程式設計師看了頭痛。IBM 的 **System R** 計畫（1970 年代中，第一個實作 Codd 模型的原型系統）需要一個給人用的查詢語言，於是 **Donald Chamberlin 與 Raymond Boyce 在 1974 年的 SIGFIDET 研討會發表了 SEQUEL（Structured English Query Language）**。設計目標很明確：用**英文關鍵字**（SELECT、FROM、WHERE、GROUP BY、ORDER BY）讓沒受過電腦訓練的人也能描述查詢。後來因為「SEQUEL」這個名字撞了別家商標，縮成了 **SQL**。（Boyce 在 1974 年就英年早逝，沒能看到自己參與的東西成為往後半世紀資料界的通用語。）\n\nChamberlin 後來在口述歷史裡，把當年那場路線之爭講得再清楚不過，大意是：Bachman 認為你該寫一支**程序式（procedural）**的程式，一步步告訴電腦怎麼找到答案；而 Codd 說「不，這全錯了，我們該用**宣告式（declarative）**的方法，讓電腦自己想辦法找到答案」。（這段是轉述其口述歷史的論點，非逐字引文。）SQL 就是把 Codd 這個「你說要什麼、電腦想怎麼拿」的哲學，包裝成一個人類能讀能寫的介面。你每天寫的 SQL，骨子裡就是這場 1970 年代路線之爭的勝方留下的遺產。\n\n**保證：ACID（一詞 1983）。** 光能查還不夠。資料庫要存銀行帳戶，就得回答一個要命的問題：**一筆操作做到一半掛了會怎樣？** 兩個帳戶轉帳，扣了 A 的錢、還沒加到 B 的帳上，這時候斷電，錢去哪了？這類「交易（transaction）的可靠性」複雜度，需要被標準化地解決。\n\n這裡有個歸屬要照史實講清楚：**ACID 這個縮寫是 Theo Härder 與 Andreas Reuter 在 1983 年的論文裡造的**（〈Principles of Transaction-Oriented Database Recovery〉）。但概念的奠基者是 **Jim Gray**——他在 1970 年代末就刻畫了交易的性質，命名了 **atomicity（原子性）、consistency（一致性）、durability（持久性）**，但**沒有包含 isolation（隔離性）**；isolation 是 Härder 與 Reuter 補進去湊成 ACID 四件套的。對你來說這四個字一點不陌生——你天天在跟它們的帳單打交道：\n\n- **Atomicity**：轉帳要嘛全成、要嘛全不成，不會卡在中間。\n- **Consistency**：交易前後資料庫都滿足約束（外鍵、唯一性…）。\n- **Isolation**：併發的交易互不干擾——而你早就知道，這個「互不干擾」是有**等級**的。你調過 isolation level，你處理過 deadlock，你知道 `READ COMMITTED` 和 `SERIALIZABLE` 之間隔著效能與正確性的取捨。這一整片你熟悉的戰場，就是 ACID 的 I 在現實裡的展開。\n- **Durability**：commit 了就不會因為當機而消失（靠 write-ahead log 之類的機制）。\n\n所以「關聯模型」這個勝利，其實是三件事疊起來的：**Codd 的模型**（資料獨立性）＋**SQL**（人用得了的宣告式語言）＋**ACID**（交易可靠性的標準保證）。三者合體，造就了往後三十年資料庫的霸主地位，也造就了你「寫 SQL、調 index、設 isolation」這份工作的全部前提。\n\n## 個案：同一個查詢，兩個時代\n\n把抽象拉回地面。我們拿一個具體查詢，看它在兩個時代分別要你做什麼。任務：**找出 2026 年後註冊、且下單超過五次的使用者名字**。\n\n**前關聯時代（導航式，命令式）**，你得在應用程式裡親手寫出全部存取邏輯，大意像這樣：\n\n```text\n開啟 USERS 檔，取得第一筆使用者記錄\n迴圈 每一筆使用者:\n    若 該使用者.註冊日 <= 2026-01-01: 跳下一筆\n    訂單數 = 0\n    沿著 該使用者 的「訂單指標鏈」走:        ← 存取路徑寫死在這\n        每跳到一筆訂單記錄: 訂單數 += 1\n    若 訂單數 > 5: 把 該使用者.名字 收進結果\n    沿「下一位使用者」指標跳到下一筆          ← 走訪迴圈也寫死在這\n回傳 結果\n```\n\n你看這段程式裡承載了多少「怎麼拿」的知識：你知道使用者之間靠指標串成鏈、知道每個使用者掛著一條訂單指標鏈、知道要怎麼走訪。這些知識一旦被 DBA 改動（比如為了效能把訂單改成另一種組織方式），**這整段都得重寫**。你是領航員，你扛著全部的路線圖。\n\n**關聯時代（宣告式）**，同一個任務，本章開頭那句 SQL 就是全部：\n\n```sql\nSELECT u.name\nFROM users u JOIN orders o ON o.user_id = u.id\nWHERE u.created_at > '2026-01-01'\nGROUP BY u.id HAVING COUNT(o.id) > 5;\n```\n\n差別不在「短」。差別在於：**這段裡沒有任何一個字在講「怎麼拿」。** 沒有迴圈、沒有指標、沒有走訪順序、沒有先掃哪張表。它只描述了結果該滿足的條件。「怎麼拿」整包被搬進了最佳化器——它會自己決定：是先用 `created_at` 的 index 過濾 `users` 再去 join `orders`，還是反過來；用 hash join 還是 nested loop；要不要先聚合。而且它的決定會**隨資料量變化**——表小的時候全表掃可能更快，表大了它會改走 index。你完全不用管。\n\n這就是 Codd 搬走的複雜度，攤在你眼前：**前一個時代，「存取路徑」這塊複雜度乘上你所有的應用程式；關聯時代，它被收斂到一個地方（最佳化器），對每一支應用程式都隱形了。** 這是抽象 strand 教科書級的一次勝利——和 ch03 的編譯器同型：編譯器把「怎麼對機器說話」收進一個地方，最佳化器把「怎麼從磁碟拿資料」收進一個地方。兩者都是「把怎麼做外包，讓你只管要什麼」。\n\n而這也正是 ch01 那個全書縮影 **ORM** 的故事的下半場。ORM 想做的事，是在 SQL 這層宣告式抽象**之上**再加一層——讓你連 SQL 都不用寫，操作物件就好。它把「物件 ↔ 表」的對應這塊複雜度也搬走了。但搬得乾不乾淨？這就要講帳單了。\n\n## 複雜度搬去哪了\n\nCodd 的勝利不是免費的。複雜度守恆——「怎麼拿」這塊複雜度沒有消失，它被搬進了引擎。大部分時候引擎扛得很好，你享受著資料獨立性的奢侈。但抽象總會洩漏（這條定律 ch19 會正式講），而關聯模型洩漏的地方，恰好就是你職業生涯花最多時間 debug 的那些地方。\n\n| 這一跳 | 搬走了什麼複雜度 | 製造了什麼新複雜度（帳單在哪洩漏） |\n|---|---|---|\n| 導航式 → 關聯式（Codd 1970） | 「存取路徑、走訪迴圈」從每支程式裡消失，收進最佳化器；資料獨立性讓你改物理結構不改程式 | **最佳化器猜錯**：它靠統計（表列數、資料分布）估執行計畫，統計過期或資料傾斜時它選錯路，一句該毫秒回的查詢變成全表掃；你得學會讀 `EXPLAIN`、手動 hint、更新統計——**你被迫部分變回領航員** |\n| 命令式 → 宣告式 SQL | 你只說要什麼，引擎決定怎麼拿 | **抽象不透明**：因為你不寫路徑，你也就「看不見」路徑——慢查詢的根因藏在你看不到的執行計畫裡，要 profiling 才挖得出來（你的 RDS CPU 降 40% 就是這種考古） |\n| 表 ↔ 物件（ORM，建在 SQL 之上） | 你連 SQL 都不寫，操作物件就好 | **N+1 query**：你以為在操作物件，ORM 偷偷對每個物件發一句 SQL——拿 100 個使用者再各拿其訂單＝1+100 句查詢。這是 ch01 預告的全書縮影：ORM 把 SQL 的複雜度搬進框架，**帳單在你不知不覺發出 N 句查詢時回來找你**（這是抽象洩漏的標本，ch19 回收） |\n| 單機 ACID → 規模 | （下一節）為了橫向擴展，放棄強一致 | **CAP 的帳單**：你得自己處理最終一致性、衝突解決、冪等——複雜度從引擎搬回了你的應用層 |\n\n一句話總結這一跳的帳單：**Codd 把「怎麼拿資料」這塊複雜度從你的程式裡搬進了引擎，代價是當引擎猜錯、或當你疊太多層抽象（ORM）、或當規模逼引擎放棄保證時，那塊複雜度會以「慢查詢／N+1／一致性 bug」的形式漏回來找你——而且因為它本來被藏起來了，漏回來時特別難 debug。** 你值錢的地方，正在於抽象漏的時候你能跳下去讀執行計畫、能看穿 ORM 發了幾句 SQL。\n\n## NoSQL 的反動：規模逼你把擔子要回來\n\n關聯模型統治了三十年。然後在 2000 年代中後期，一群人開始**主動放棄**它的一部分。不是因為 Codd 錯了，而是因為他們撞上了一面 Codd 沒打算翻的牆：**規模**。\n\n故事的主角是當年資料量爆炸的幾家公司。Google 要索引整個網路、Amazon 要扛全球購物車——它們的資料大到**單機放不下**，必須橫跨成千上萬台機器、跨越多個機房。而傳統關聯資料庫的 ACID 保證，是為「單機、或緊密耦合的少數機器」設計的；一旦你的資料散在地球兩端的機房，機房之間的網路隨時可能斷（network partition，這對你不陌生——你處理過分散式系統的網路分區），這時候「強一致性」和「可用性」就會打架。\n\n技術源頭有兩篇論文，照史實要分清：**Google 的 Bigtable 論文（2006，OSDI）** 與 **Amazon 的 Dynamo 論文（2007，SOSP）**。這兩篇展示了「為了規模與可用性，可以放棄關聯模型與強一致性」的具體做法——Dynamo 尤其直白地擁抱最終一致性。它們是後來整場運動的技術藍本。\n\n而逼著大家在「一致性」和「可用性」之間選邊的，是一條定律：**CAP**。順序要講對：**Eric Brewer 在 2000 年的 PODC 會議上提出 CAP 作為一個猜想（conjecture，他 1999 年就先講過）；2002 年由 Seth Gilbert 與 Nancy Lynch 證明成定理。** CAP 說的是：在一個會發生網路分區（Partition）的分散式系統裡，當分區真的發生時，你只能在**一致性（Consistency）**和**可用性（Availability）**之間二選一——分區兩邊要嘛拒絕服務以保持一致（選 C），要嘛繼續服務但可能讀到舊資料（選 A）。你不能在分區下同時要到 C 和 A。（CAP 的精確語意、以及它後來被 Brewer 自己澄清的諸多細節，分散式一致性的協定層面，本章點到為止——你書架上的 TLA+ 書把「分散式系統的正確性怎麼證」這條路走到底，這裡不展開。）\n\nNoSQL 運動就是這個取捨的產品化。這裡有個**名字的陷阱**，照史實必須講清楚：\n\n- **1998 年，Carlo Strozzi** 用過「NoSQL」這個詞，但指的是一個**仍然是關聯式、只是不用 SQL 介面**的東西。他自己後來說，2009 年那場運動既然根本背離了關聯模型，更該叫「NoREL」（not relational）才對。\n- **2009 年**，「NoSQL」這個詞被**重新借用**：在一場由 Johan Oskarsson 在舊金山主辦的 meetup 上，**Eric Evans 提議**用這個詞來指「開源、分散式、非關聯」的那一批新資料庫。**這個 2009 的 NoSQL，和 1998 的 Strozzi NoSQL 是不同的所指**——前者背離關聯模型，後者只是換掉查詢語言。流行敘事常把兩者混為一談，別跟著錯。\n\n「NoSQL」這個詞本身有點命名失敗（它聽起來像「反 SQL」，其實更準的意思是「不只是 SQL／非關聯」，後來很多人改讀成 \"Not Only SQL\"）。但它指向的轉變是真的：**鐘擺從「引擎包辦一切」擺回「應用自己處理一致性」。** 當你選了一個 eventual consistency 的 NoSQL，引擎不再替你保證「讀到的一定是最新的」——這塊一致性的複雜度，被退回給了你的應用層。於是你得自己做：冪等的寫入、衝突解決、版本向量、補償交易……這些你在 SQS 結算 pipeline 裡天天做的事，本質上就是在**手工補回引擎放棄掉的那部分一致性保證**。\n\n把你的日常對到這條線上：你拿 **Redis** 當 cache 或 Pub/Sub，你就是在 CAP 上選了**可用性與低延遲**，放棄了「Redis 裡的值和資料庫永遠一致」——所以你得處理 cache 失效（cache invalidation，CS 兩大難題之一，ch01 提過）。你對某個寫多讀少、能容忍短暫不一致的負載選了某種 NoSQL，你就是在替那個負載做 Brewer 逼你做的那道選擇題。**你不是在用一個比 SQL「更新」的東西；你是在一條 1970 年就開始、2009 年回擺的鐘擺上，為這個負載挑了一邊站。**\n\n> **鐘擺要誠實**：NoSQL 不是關聯模型的「進化終點」，正如關聯模型也沒「殺死」前面的一切。鐘擺擺回來過：2010 年代後期，**NewSQL**（如分散式 SQL 資料庫）試圖「在分散式規模下把 ACID 與 SQL 要回來」——也就是想兩邊都要。它有它的代價（這裡一句帶過，不展開）。重點是：沒有哪一邊是終局。你選 SQL 還是 NoSQL，永遠是看**這個負載**要的是引擎的保證、還是規模與可用性——這是個工程取捨，不是個信仰問題。能看穿這一點的工程師，不會把每個新資料庫都當革命，也不會死守單一答案。\n\n## 紙上推演\n\n### 推演 1：用資料獨立性解釋你的「降 40%」 **[15 分鐘]** ★\n\n回到你那次經典戰績：尖峰時段 RDS CPU 爆頂，你加了一個 index，CPU 降 40%，**且一行應用程式碼都沒改**。用本章的概念，向一個資淺工程師解釋：為什麼你能「只改存取方式、不改程式」？這個能力的歷史名字是什麼？在 1970 年以前，同樣這件事你得付出什麼代價？\n\n#### 推演解答\n\n這個能力叫**資料獨立性**，是 Codd 1970 年關聯模型的核心目標。能成立的關鍵是：你的 SQL 查詢是**宣告式**的——它只說「要什麼」（滿足這些條件的列），**從來沒有承諾任何存取路徑**。所以當你加一個 index，等於給了查詢最佳化器一條新的、更快的路；它發現新路更快就改走新路，而你的查詢一個字都不用動，因為它本來就把「怎麼拿」的決定權讓給了引擎。\n\n在 1970 年以前的導航式資料庫裡，這件事**做不到**。那時候存取路徑（走哪條指標鏈、怎麼走訪）是手寫在每一支應用程式裡的（存取路徑相依）。你想換一條更快的路徑，就得**回去改所有相關的應用程式碼**。換句話說，你那次「只動 DB、不動程式」的輕鬆，在前關聯時代是一場要動很多程式的重構。常見誤解是把「加 index 不用改程式」當成理所當然的天性——它不是天性，它是 Codd 用一篇論文掙來的、你每天免費繼承的奢侈。\n\n### 推演 2：用 CAP 解釋一次你的選型 **[20 分鐘]** ★★\n\n挑一個你真實做過的決定：某個場景你選了 Redis 或某種 NoSQL，而不是丟進關聯資料庫。用 CAP 的語言說清楚：在這個選擇裡，你**放棄了什麼**、**換到了什麼**？當網路分區真的發生時，你選的那個系統會偏向 C 還是 A？這個放棄，把哪塊複雜度退回給了你的應用層、你又是怎麼補的？\n\n#### 推演解答\n\n範例（以 Redis 當 cache 為例）：你選 Redis 是為了**低延遲與可用性**——讀取走記憶體、毫秒級回應，扛得住尖峰流量。你放棄的是「Redis 裡的值和後端資料庫**永遠一致**」這個保證：cache 裡的資料可能是舊的。對到 CAP，當「Redis 的值」與「DB 的真相」出現分歧（一種廣義的分區／不同步）時，你選擇了**繼續用可能過期的值服務（偏 A）**，而不是每次都回源確認（那會犧牲低延遲這個你選 Redis 的初衷）。\n\n這個放棄把**一致性的複雜度退回給了你的應用層**——具體就是 **cache 失效（cache invalidation）**：你得決定 TTL、得在資料變更時主動失效或更新 cache、得處理「失效的瞬間有人讀到舊值」的窗口。這正是 ch01 點名的「CS 兩大難題之一」。關鍵領悟：**你選 NoSQL/cache 不是因為它「比較新」，而是因為這個負載的取捨點，落在了 CAP 逼你選的可用性那一側；而你省下的一致性保證，是引擎不幫你扛、你自己扛回來的擔子。** 一個資淺工程師常見的誤解是「Redis 比 MySQL 快所以更好」——錯，它不是更好，它是在一條鐘擺上選了不同的邊，而你為這個選擇付了「自己維護一致性」的帳。\n\n### 推演 3：N+1 是哪一層抽象的洩漏 **[15 分鐘]** ★★\n\n你一定踩過 N+1 query：拿一份清單，迴圈裡每個元素又各觸發一句查詢，1 變成 1+N。用本章「複雜度搬家／抽象洩漏」的框架回答：N+1 是**哪一層抽象**漏的？它漏的是 Codd 那層（SQL），還是更上面那層（ORM）？為什麼說它是「把搬走的複雜度漏回來」的標本？（這題接 ch19。）\n\n#### 推演解答\n\nN+1 漏的是 **ORM 這層**，不是 SQL 那層。要分清楚這個堆疊：Codd/SQL 把「怎麼拿資料」從你的程式搬進了引擎（宣告式）；ORM 又在 SQL **之上**疊了一層，把「物件 ↔ 表的對應、什麼時候發 SQL」也搬走，讓你以為自己只是在操作記憶體裡的物件。N+1 就是這層 ORM 抽象的洩漏：你寫 `users.forEach(u => u.orders)`，看起來在走訪物件，但 ORM 偷偷對**每一個** `u` 發了一句 `SELECT ... WHERE user_id = ?`——於是拿 100 個使用者各自的訂單，變成 1（拿使用者）＋100（拿訂單）句查詢。\n\n為什麼是「搬走的複雜度漏回來」的標本？因為 ORM 搬走的那塊複雜度——「什麼時候、發幾句 SQL」——並沒有消失（複雜度守恆），它只是被藏到了框架裡。平常它藏得好好的，你享受著「操作物件就好」的方便；但當資料量一上來，它就以「莫名其妙發了 101 句查詢、效能塌掉」的形式漏回來找你。而且因為它本來被藏起來，你光看應用程式碼**看不出**這裡會發 N 句 SQL——你得開 query log 或 profiling 才抓得到。這完全符合 ch19 要講的 Joel Spolsky「抽象洩漏定律」：抽象藏得越多，漏的時候你越看不見根因。修法（eager loading / JOIN 一次拿完）本質上是**你部分接管了 ORM 放棄的「怎麼拿」決策**——又一次，抽象漏了，值錢的工程師跳下去補。\n\n### 推演 4：反事實——如果 Codd 沒贏 **[20 分鐘]** ★★★\n\n反事實推理：假設關聯模型在 1970 年代的路線之爭裡輸了，導航式資料庫（Bachman 那套）一路統治到今天。在這個平行世界裡，你今天的工作會有哪些**現在不存在的痛**？特別想想：read replica、加 index、換 ORM、甚至「換一個資料庫廠商」這些事，會變成什麼樣？這題幫你體會 Codd 那篇論文到底搬走了多大一塊複雜度。\n\n#### 推演解答\n\n在這個導航式統治的平行世界裡，最根本的差別是：**「資料怎麼存」和「程式怎麼寫」永遠綁死**（沒有資料獨立性）。一連串你今天視為理所當然的事都會變成大工程：\n\n- **加 index**：今天你加個 index、應用程式無感。那個世界裡，因為程式可能依賴特定的存取路徑與索引結構（索引相依、存取路徑相依），加或改一個 index 可能逼著你回去改一堆導航程式碼。「只動 DB 不動程式」這種事不存在。\n- **read replica / partition**：今天你把讀流量導到 replica、把大表 partition，應用層的查詢幾乎不用改（語意不變）。那個世界裡，資料的物理組織一變，導航路徑就變，應用程式得跟著重寫——水平擴展的成本高到嚇人。\n- **換 ORM、換資料庫廠商**：今天換 ORM 或從 MySQL 遷 PostgreSQL 雖然麻煩，但有 SQL 這個（大致）共通的宣告式介面墊著。那個世界沒有 Codd 的標準化邏輯模型，每家導航式資料庫的存取 API 各長各的，你的程式焊死在某一家的物理模型上，遷移幾乎等於重寫。\n- **臨時查詢（ad-hoc query）**：今天你想撈個沒預想過的報表，當場寫句 SQL 就好。那個世界裡，沒有預先鋪好指標路徑的查詢，可能得寫一支新程式去導航——「問資料一個新問題」的成本極高。\n\n把這些痛加起來，你就摸到了 Codd 那篇論文的份量：**它搬走的不是「某個查詢」的複雜度，而是「資料的物理結構」與「所有應用程式」之間的那條死綁。** 一旦解綁，加 index、擴展、遷移、臨時查詢全都從「改程式的大工程」降級成「日常操作」。常見誤解是覺得關聯模型只是「把資料畫成表格」這種表面改變——不，它真正的革命是**資料獨立性**，是把整個產業從 Bachman 的「人人都是領航員、人人扛著路線圖」裡解放出來。你今天工作之所以能這麼輕鬆地動資料層，是因為這場仗在 1970 年代已經替你打贏了。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過關：\n\n1. 在 Codd 之前，「程式設計師作為領航員」是什麼意思？為什麼說導航式資料庫把「資料的物理結構」這個最該藏起來的決策暴露給了每一支應用程式？（接 ch06 資訊隱藏）\n2. 「資料獨立性」到底獨立了什麼跟什麼？用你「加 index 不改程式」的經驗講清楚它為什麼成立——關鍵在於宣告式查詢從來沒承諾過什麼？\n3. 為什麼說「宣告式 vs 命令式」「最佳化器 vs 手寫路徑」這場 1970 年代的爭論，和 ch03「編譯器產生的碼會不會比手寫慢」是同一條鐘擺？它們的答案為什麼也一樣？\n4. ACID 的歸屬：哪些是 Jim Gray 命名的、哪一個是後來補進去湊成縮寫的、ACID 這個詞本身是誰在哪一年造的？（不能含糊成「Jim Gray 提出 ACID」）\n5. CAP 在說什麼？為什麼順序是「Brewer 2000 猜想 → Gilbert-Lynch 2002 證明」？當網路分區發生時，你的系統「選 C」和「選 A」分別會有什麼可觀察的行為？\n6. 1998 的 Strozzi NoSQL 和 2009 的 NoSQL 運動，所指有什麼根本不同？為什麼把兩者混為一談是史實錯誤？\n7. NoSQL 的反動，把哪一塊複雜度從引擎退回給了應用層？你在 SQS pipeline 或 Redis cache 裡做的哪些事，本質上是在「手工補回引擎放棄的一致性保證」？\n8. N+1 query 是哪一層抽象的洩漏（SQL 還是 ORM）？為什麼說它是「複雜度守恆」的標本——搬走的東西沒消失、只是藏起來、然後漏回來？\n\n## 延伸閱讀\n\n- **E. F. Codd, 〈A Relational Model of Data for Large Shared Data Banks〉, *CACM* 1970-06**（[dl.acm.org/doi/10.1145/362384.362685](https://dl.acm.org/doi/10.1145/362384.362685)）。本章的原典。讀它對「data independence」的定義，以及他點名要消滅的三種相依（ordering / indexing / access path）——你會發現整篇的目標不是「表」，是「解綁」。\n- **Charles W. Bachman, 〈The Programmer as Navigator〉, 1973 圖靈獎演說, *CACM* 1973-11**（[people.csail.mit.edu/tdanford/6830papers/bachman-programmer-as-navigator.pdf](https://people.csail.mit.edu/tdanford/6830papers/bachman-programmer-as-navigator.pdf)）。讀 Codd 的對手怎麼**驕傲地**描述那個被 Codd 推翻的世界觀。把它和 Codd 的論文對讀，你會親眼看到一場範式轉移的兩邊。\n- **Donald Chamberlin 口述歷史（Computer History Museum）**（[archive.computerhistory.org/resources/text/Oral_History/Chamberlin_Don/102702111.05.01.acc.pdf](http://archive.computerhistory.org/resources/text/Oral_History/Chamberlin_Don/102702111.05.01.acc.pdf)）。SEQUEL/SQL 的共同設計者親口講當年那場「程序式 vs 宣告式」的路線之爭，以及為什麼要用英文關鍵字。看歷史當事人怎麼回憶決策現場。\n- **Eric Brewer, CAP 的回顧〈CAP Twelve Years Later: How the \"Rules\" Have Changed〉（2012, IEEE Computer）**（搜尋標題可得）。CAP 提出者本人十二年後的澄清——「三選二」其實是過度簡化，分區只在真的發生時才逼你選。讀它能讓你不把 CAP 講成口號。\n- **Joel Spolsky, 〈The Law of Leaky Abstractions〉(2002)**（[joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/](https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/)）。本章的帳單（N+1、慢查詢）在這篇被升級成一條定律。ch19 會正式收它；先讀它對 SQL 抽象洩漏的那段。\n- **書架上的《把系統寫成定理：TLA+ 與形式化方法》**。本章談 CAP、最終一致性都點到為止；那本書把「分散式系統的正確性怎麼用 invariant 證明」這條路走到底——當你想真正搞懂「為什麼分區下不能同時要 C 和 A」，去那裡。\n"}, {"id": "ch14-open-source-and-git", "file": "ch14-open-source-and-git.md", "group": "Part V — 資料、開源與網路", "title": "ch14 — 開源與 Git：重寫所有權與協作", "md": "# ch14 — 開源與 Git：重寫所有權與協作\n\n> **本章解決什麼問題**：前面所有章節談的是「怎麼把軟體蓋好」——抽象 strand 蓋語言、型別、資料模型，方法 strand 蓋流程與紀律。但有兩個更底層的問題，到這一章才被掀開：軟體**屬於誰**，以及一群陌生人怎麼**一起改同一份程式碼而不互相踩死**。這不是技術問題，是制度問題與資料結構問題的合體。自由軟體運動把「軟體是私有財產」這個預設翻成「軟體可以是公共財」，用的不是程式而是一份授權條款——一個法律駭客。Git 則把「多人併行改一個 codebase」這面協作複雜度的牆，用內容定址與 DAG 重新組織，讓便宜分支與 merge 變成日常。本章接 ch06 的 Unix 哲學（Unix 是這個協作文化的搖籃）、回收 ch10 的 Conway's Law（協作結構決定系統結構），並替後面的雲與微服務（見 ch16、ch17）鋪路——因為你今天靠的整個開源生態，就是這一章寫下來的。\n\n## 從你已知的出發\n\n你今天做的每件事，幾乎都站在這一章重寫過的兩塊地基上，而你大概從沒想過它們本來可以是另一個樣子。\n\n第一塊地基是**所有權**。你用個人 GitHub 帳號 C-ZW 累積足跡——你的 commit 歷史、你 star 過的 repo、你發過的 PR，是一份對外公開的工程履歷。你做 AI Infra 轉職，靠的是 vLLM、llm-d 這些開源專案的生態：你可以 clone 它們、讀它們的原始碼、改它們、把改回貢獻回去，不必付授權費、不必簽 NDA、不必問任何人同意。這件事你視為理所當然，但它在四十年前是不存在的世界。1980 年代初，主流的軟體是「黑盒子」：你買到的是編譯好的二進位，原始碼是商業機密，反編譯它、修改它、散布修改版，是違法的。你今天賴以維生的「讀別人的程式碼、改它、把它組進自己的系統」這整套工作方式，是一場運動把它從非法變成常態的。\n\n第二塊地基是**協作**。你每天 commit、開 branch、merge、發 PR、review——這套流程順到你不會注意它的形狀。想一個場景：你的 greenfield 微服務團隊從三人長到十幾人，五個人同時改五個服務、各跑各的分支，你不會因此恐慌，因為「開分支」在你的心智模型裡是免費、無痛的——隨手開、隨手 merge、衝突了就解。這份「分支是免費的」的直覺正是 Git 帶來的；在 Git 之前，分支昂貴、危險、能不開就不開，merge 是讓人冒冷汗的高風險手術。你能輕鬆用 PR 工作流跟一群人協作，是因為有人在 2005 年很短的時間裡，把「多人併行改一份程式碼」這個問題，重新設計成一個資料結構。\n\n這一章講的就是這兩塊地基怎麼被鋪下來：Stallman 用一份授權條款重寫所有權，Torvalds 用一個 DAG 重寫協作。它們是同一場革命的兩面——一面制度、一面工具——而你活在它們重寫過的世界裡，每天用、卻很少回頭看它本來的樣子。\n\n## 所有權的革命：Stallman 與「free as in freedom」\n\n要懂這場革命的力道，得先懂它反叛的對象。\n\n1970 年代的早期電腦文化，軟體大多是「附帶的」——買硬體、軟體跟著來、原始碼通常也跟著來，因為大家都在同一個圈子裡互相改、互相用。Stallman（Richard Stallman）在 MIT 人工智慧實驗室就活在這種文化裡：程式碼共享，看到 bug 就改、改了就分享。但 1980 年代初這個世界崩了：商業軟體公司興起，軟體變成獨立販售、需要保護的商品——原始碼變成商業機密，授權條款明文禁止你修改、反編譯、散布。Stallman 撞上這道牆的著名軼事，是一台 Xerox 印表機的驅動：他想改它在卡紙時通知使用者，卻因為它是專有的而拿不到原始碼——一件以前五分鐘就能自己動手修的事，他被法律擋在門外。\n\n對 Stallman 來說，這不是不方便，是**道德問題**：一個程式設計師被禁止幫助鄰居、被禁止理解自己在用的工具、被迫接受一個無法檢查的黑盒子——這在他眼裡是對使用者的剝奪。1983 年 9 月 27 日，他公開宣告 **GNU 計畫**（GNU 是「GNU's Not Unix」的遞迴縮寫，一個工程師才覺得好笑的命名），要從零打造一整套自由、相容 Unix 的作業系統，讓人不必再依賴任何專有軟體。1985 年他成立 **Free Software Foundation（FSF）** 把這件事制度化；同年 3 月已先在 *Dr. Dobb's Journal* 發表《GNU Manifesto》把理念寫成文件。\n\n這裡有一個全書最容易被英語害到的詞要先擺正：**free**。中文常譯成「免費」，但 Stallman 反覆強調，他要的 free 是 **free as in freedom（自由），不是 free as in beer（免費）**。他有一句廣為流傳、精煉到變成口號的講法（大意是「想想言論自由，而不是免費啤酒」——\"think free speech, not free beer\"，未逐字查證確切首次出處）。自由軟體的「自由」指的是四項使用者的權利：自由地執行、自由地研究與修改（這需要原始碼）、自由地散布、自由地散布你的修改版。價格無關緊要——你可以賣自由軟體賺錢，自由指的是這四項權利不被剝奪。\n\n```text\n        free 的兩種意思（這個詞坑了二十年的中文翻譯）\n\n        free as in beer（免費）         free as in freedom（自由）\n        ──────────────────             ──────────────────────────\n        重點：價格 = 0                  重點：四項使用者權利不被剝奪\n        可以是黑盒子                    必須給原始碼（否則無法研究/修改）\n        ✗ 不是 Stallman 要的            ✓ 這才是自由軟體的「free」\n```\n\n### copyleft：用著作權法反著打的法律駭客\n\n光是把程式碼公開還不夠。Stallman 看穿一個漏洞：如果你只是把程式碼丟到公領域（public domain），任何人都可以拿走它、加一點東西、然後把整包重新包成**專有**軟體賣出去——使用者的自由在下一手就被剝奪了。公開不等於能持續自由。\n\n他的反制是軟體史上最漂亮的一招法律駭客：**copyleft**。它的核心機制是用著作權法（copyright）來達成跟著作權相反的目的。一般的著作權說「保留所有權利，不准複製散布」；copyleft 反過來說「你可以複製、修改、散布——**但有一個條件**：你散布出去的衍生版本，必須用同樣的條款釋出，同樣保障下游使用者那四項自由」。它把「自由」變成一種會自我複製、無法被回收的屬性：任何碰了 copyleft 程式碼的衍生作品，都被這個條款黏住，不能變回專有。\n\n這個機制的法律載體是 **GPL（GNU General Public License）**。這裡有一個本書必須替你擺正的高危事實——**GPL 的第一版（GPLv1）是 1989 年，不是 1985 年**。FSF 是 1985 成立，GNU Manifesto 是 1985 發表，但統一的 GPL 條款第一版要到 1989 才出現（GPLv2 在 1991、GPLv3 在 2007）。FSF 1985 與 GPLv1 1989 這兩個年份非常容易被混成同一年，網路上錯得到處都是；本書照查證版寫成兩個不同年份。\n\n這個「衍生版本必須同樣開源」的條款，業界俗稱**病毒式（viral）授權**（帶貶意，是商業公司怕被「傳染」的觀點），自由軟體陣營則叫它**互惠式（reciprocal）**。不管叫什麼，工程後果是真實的：你要把某個 GPL 函式庫組進商業產品時，法務會跳出來問「這會不會逼我們整個 codebase 開源」——那焦慮的源頭就是 Stallman 1989 年寫下的這個自我複製條款。授權的法律細節本書不展開（指向延伸閱讀），你只需記住：**copyleft 不是技術，是制度設計；它用既有的法律武器，反向達成了一個法律本來要阻止的目的。** 這是「方法 strand」在所有權層面的一次出手——不是新抽象，是新規則。\n\n## Linux：開源協作不只是理想，是能贏的工程\n\n理念再漂亮，沒有作品撐腰就只是宣言。GNU 計畫到 1990 年代初，周邊工具（GCC、Emacs）都很出色，唯獨最核心的作業系統核心（kernel）遲遲做不出來。自由軟體運動需要一個證明：一群素未謀面、沒有薪水、沒有公司指揮的志願者，**真的能協作蓋出一個嚴肅的、能跑生產環境的大型系統**嗎？還是說認真的軟體終究得靠一家公司、一支領薪水的團隊、一套指揮鏈來蓋？\n\n1991 年，芬蘭大學生 Torvalds（Linus Torvalds）出於興趣開始寫自己的作業系統核心，丟上網讓大家一起改——這就是 **Linux**（1992 年改用 GPL 授權，與 GNU 工具鏈結合成完整的自由作業系統）。接下來十年就是那個證明：Linux 在沒有中央公司、靠全球志願者用 email 寄 patch 協作的模式下，長成了今天跑在絕大多數伺服器、雲端、Android 底層的核心。你部署的每個 container、ECS 上的每個 task，底下幾乎都是 Linux。一群陌生人真的蓋出了能贏的東西。\n\n這個證明的份量，在於它**反駁了一個關於協作複雜度的直覺**。直覺告訴你：人越多、越分散、越沒有統一指揮，協調成本就越爆炸（這正是 ch10 Brooks 講的 O(n²) 溝通成本）。照這個直覺，一個上千人、散布全球、沒有老闆的專案應該會在自身的混亂裡崩潰。Linux 沒有崩潰。它怎麼做到的？這個問題的答案，催生了本章下半場的兩個東西：一篇講「為什麼這種混亂反而有效」的文章，和一個讓這種混亂變得可管理的工具。\n\n## 大教堂 vs 市集：Raymond 把開源的協作模式寫成理論\n\n1997 年，Raymond（Eric S. Raymond）在一場 Linux 研討會（Linux Kongress, Würzburg）發表了《The Cathedral and the Bazaar》（大教堂與市集；1999 出書）。它做的事是把 Linux 現象**理論化**——回答「為什麼這種看似混亂的開發法行得通」。\n\nRaymond 提出兩種開發模式的對比：\n\n- **大教堂（Cathedral）**：軟體由一小群核心開發者，在封閉中精雕細琢，到成熟了才釋出。像蓋一座大教堂，有總設計師、有藍圖、由內而外控制。傳統商業軟體、甚至早期的 GNU 工具，多是這個模式。\n- **市集（Bazaar）**：軟體在公開、喧鬧、看似無序的環境裡開發。「早發布、常發布」（release early, release often），讓盡可能多的人看到原始碼、回報 bug、提交修改。像一個吵雜的市集，沒有中央規劃，秩序從大量參與者的互動裡**湧現**出來。Linux 是這個模式的代表。\n\nRaymond 從這個對比裡提煉出一句廣被引用的格言（大意是「眼睛夠多，所有 bug 都無所遁形」——\"given enough eyeballs, all bugs are shallow\"，他稱之為 Linus's Law，未逐字查證原始措辭）。它的論點是：在市集模式裡，因為原始碼對所有人公開、參與者夠多，每個 bug 總會有某個人剛好有對的背景一眼看穿——找 bug 這件難事被**平行化**了。\n\n這裡要替 Raymond 加個但書：「眼睛夠多 bug 就淺」後來被現實多次打臉——最有名的是 2014 年 OpenSSL 的 Heartbleed，一個攸關全網安全的核心開源庫，原始碼公開多年，嚴重漏洞卻沒被「夠多的眼睛」抓到。準確的講法是：開源**讓**檢查成為可能，但不**保證**檢查真的發生（沒人付錢去看那段碼，眼睛再多也是零）。別把它讀成「開源所以一定安全」——那是另一種銀彈幻覺（回收 ch10）。\n\n對你的意義很直接：**你每天的 PR-based 工作流，就是市集模式的縮小版日常。** 你開分支、推上去、發 PR、讓隊友 review、收到 comment、改、合進去——這套「公開地、增量地、讓多人看到並提交修改」的流程，正是 Raymond 1997 描述的那套協作哲學，被工具化、制度化之後，變成了今天每個團隊的標準動作。你不會用「市集」這個詞稱呼它，但你天天住在裡面。\n\n## 自由軟體 vs 開源：一場用詞之爭，底下是理念分裂\n\n到這裡有個你必須擺正的觀念，因為它常被當成同義詞混用，其實底下是一道真實的裂縫。\n\n1998 年 2 月，在一場策略會議上（VA Linux 的辦公室，配合 Netscape 把瀏覽器原始碼開放這件大事），一群人決定要造一個新詞來推廣這套開發模式。「open source（開源）」這個詞由 **Christine Peterson** 提出；隨後 **OSI（Open Source Initiative）** 成立（Raymond 任首任主席，Bruce Perens 等共同創立）。\n\n為什麼要造新詞？因為「free software」這個招牌有兩個問題：一是 free 的「免費」歧義一直在誤導人（前面講過），二是——更關鍵的——它帶著 Stallman 那套**道德訴求**，而道德訴求對企業是有威脅性的。你跟一家公司說「使用專有軟體在道德上是錯的、是剝奪使用者自由」，公司會把你當激進份子請出門。「open source」這個新詞是刻意去道德化的：它把重點從「使用者的自由是一種權利」搬到「公開原始碼的開發模式能做出更好、更可靠的軟體」——一個**務實的、可以對 CTO 推銷的**論點。\n\n於是這裡形成了本書要替你擺正的核心分歧：**自由軟體（free software）與開源（open source）不只是同一件事的兩個名字，是兩種不同的世界觀。**\n\n> **自由軟體 vs 開源：底下的理念分裂**\n>\n> | | 自由軟體（FSF/Stallman, 1985） | 開源（OSI, 1998） |\n> |---|---|---|\n> | 核心訴求 | **倫理**：軟體自由是使用者的權利 | **務實**：開放開發模式能做出更好的軟體 |\n> | 「為什麼要開放」 | 因為剝奪使用者自由在道德上是錯的 | 因為它在工程上更有效、更可靠 |\n> | 對企業的姿態 | 帶對抗性（專有軟體是不義的） | 友善（這對你的生意有好處） |\n> | 招牌的用意 | 強調 freedom，哪怕嚇跑企業 | 刻意去道德化，方便對企業推銷 |\n> | 對立的不是技術 | 是「軟體該屬於誰、為什麼」這個價值問題 | |\n\n兩邊在「程式碼要公開、要能改、要能散布」這些**操作**上幾乎重疊，所以實務上常被合稱 FOSS（Free and Open Source Software）。但它們對「**為什麼**」的答案根本不同。Stallman 至今堅持用「free software」、拒絕被收編進「open source」這個去道德化的框架，不是文人相輕，是他認為一旦把運動的理由從「權利」降格成「好處」，那這個運動隨時可以因為「在某個情況下專有更划算」而被放棄——權利不能談判，好處可以。\n\n這場分歧對今天的你不是純歷史：你選套件時看的授權——MIT/Apache 這種**寬鬆式（permissive）**（愛怎麼用就怎麼用、可組進閉源產品）vs GPL 這種 **copyleft**（碰了就得跟著開源）——正是這兩種世界觀的對峙（permissive 是務實派、copyleft 是理想派的武器）。你做技術選型時就在這條線上選邊，只是多半沒意識到自己在替一場 1998 年的理念之爭投票（這條帳本章末與推演題 2 再展開）。\n\n## 個案：Git 的誕生——協作複雜度如何逼出一個資料結構\n\n現在進入本章的個案，也是全書最乾淨的一個「複雜度逼出資料結構」的標本。前面說過，Linux 證明了上千人能協作蓋出大系統。但「能」不等於「不痛」——那個協作本身需要工具撐著，而這個工具的故事，把「協作複雜度如何具體地塑造一個資料結構」攤得清清楚楚。\n\n### 前史：集中式版控的牆\n\n先看 Git 之前的世界。你早就精通版控指令層，這裡只講形狀、不講操作。\n\n早期的版本控制是**集中式（centralized）**的：CVS（1990 起流行）、後來的 SVN（Subversion，2000 起、1.0 於 2004）。它們的模型是有一台**中央伺服器**保管唯一的、權威的版本歷史；每個開發者從伺服器 checkout 一份工作副本，改完 commit 回伺服器。這個模型的麻煩，在「上千人併行改一個 codebase」的規模下會被放大成牆：\n\n- **分支昂貴。** 開分支往往是重操作（早期 CVS 甚至用複製目錄硬幹），merge 更是惡夢。結果大家養成「能不開分支就不開」的習慣——跟你今天「隨手開分支」的直覺完全相反。\n- **每個操作都要連伺服器。** commit、看歷史、diff 很多都得跟中央伺服器來回，伺服器一掛、網路一斷你就動不了。\n- **權威集中、不適合大規模分散協作。** 上千個志願者不可能都有中央伺服器的 commit 權限；Linux 於是長期靠土法協作——大家用 email 互寄 patch、由維護者手動整合，能用但累、又不 scale。\n\n### 引爆點：BitKeeper 撤回免費授權\n\n2002 年起，Linux kernel 的開發改用一個叫 **BitKeeper** 的**分散式**版控工具——它是當時少見能讓分散式協作順暢運作的東西，但它是**專有軟體**。一個全世界最重要的自由軟體專案，核心協作工具竟是專有的，這在社群裡一直是個刺。BitKeeper 是它的公司 BitMover 出於善意，免費（注意，是 free as in beer）授權給 Linux 社群用的。\n\n2005 年 4 月，這個脆弱的安排崩了。事件的導火線：另一位 kernel 開發者 Andrew Tridgell 著手對 BitKeeper 的協定做反向工程（想做一個能跟 BitKeeper repo 溝通的自由工具）。BitMover 認定這違反了授權精神，於是**撤回了給 Linux 社群的免費授權**。一夜之間，全世界最關鍵的軟體專案，失去了它的協作工具。\n\n對 Torvalds 來說，市面上現有的選項都不合格：集中式的 CVS/SVN 撐不起 Linux 的規模與分散協作；其他分散式工具不是太慢就是設計不對他胃口。於是他做了一個典型 Torvalds 的決定——**自己寫一個**。\n\n### 三週寫成：直接回應「上千人併行改一份程式碼」\n\n接下來是本章最該被記住的部分。把可查證的時間軸攤開（照一手 commit 紀錄）：開發**從 2005 年 4 月 3 日開始**；4 月 7 日 Git 就能用自己管理自己的原始碼（self-hosting，第一個 commit 著名地自嘲為 \"the information manager from hell\"）；4 月 18 日完成第一次多分支 merge；到 6 月 16 日已實際接手管理 Linux kernel 2.6.12 的發布；7 月 26 日 Torvalds 把日常維護交棒給 Junio Hamano。\n\n所以「三週寫成」這個流傳說法要稍微 hedge：更精確地說，**核心在幾天內就能自我管理、數週內就接手管理真正的 Linux kernel**——速度本身已經驚人。重點不在天數的精確，而在於：一個規模到上千人的協作複雜度問題，逼出了一個在數天到數週內成形、好到二十年後統治全行業的資料結構。\n\n它為什麼能這麼快又這麼好？因為 Torvalds 沒把它當「版控軟體」設計，而是當**一個內容定址的檔案系統**設計——版控只是蓋在上面的薄薄一層。核心設計直接對準協作複雜度的痛點（內部物件模型細節本書不展開，指向延伸閱讀；這裡只講它**為什麼長這樣**）：\n\n- **內容定址（content-addressable）。** Git 把每一塊內容（檔案、目錄樹、commit）用它**內容的雜湊值**（當年用 SHA-1）當作名字存起來。同樣的內容必然有同樣的名字，不同的內容必然有不同的名字。這帶來一個對分散協作至關重要的性質：**完整性是內建的**——任何一塊資料被竄改或損壞，它的雜湊就對不上，立刻被抓出來。當上千個互不信任、散布全球的人在交換程式碼時，這個性質讓你不必信任傳輸通道，只要雜湊對得上，內容就一定是對的。\n- **歷史是一個 DAG（有向無環圖）。** 每個 commit 記錄它的父 commit（merge 時是多個父），於是整個版本歷史是一張節點指向祖先的有向無環圖，而不是一條線。這正是「分支」與「merge」在資料結構上的真身：分支只是圖上的一個指標，merge 就是讓一個 commit 認領多個父節點。在這個模型裡，**開分支幾乎零成本**（不過是多一個指標），merge 是圖的合併運算而非高風險手術。你今天「隨手開分支」的直覺，直接來自這個 DAG 設計。\n- **分散式（distributed）：每個 clone 都是完整的。** 沒有「中央伺服器才有完整歷史」這回事——你 `git clone` 下來的，是**整個物件圖、完整的歷史**。每台機器都是一個完整、自足的 repo，可以離線 commit、離線看歷史、離線開分支。中央伺服器（如後來的 GitHub）變成一個**約定**而非**必須**——大家同意把某個 repo 當「官方」，但技術上沒有哪個 clone 比別的更權威。\n\n```text\n   集中式（CVS/SVN）             分散式（Git）\n\n   ┌──────────────┐             每個 clone = 完整歷史的 DAG\n   │ central repo │\n   │ 唯一權威歷史 │             ○──○──○──○   ←── main\n   └──────┬───────┘                    ＼\n       ┌──┼──┐                          ○──○   ←── feature\n       │  │  │                 開分支＝多一個指標、近乎零成本\n      副本 副本 副本            merge＝讓一個 commit 認領多個父\n   （凡事要連伺服器）            （每台機器都能離線 commit/分支/看歷史）\n```\n\n把這個個案的因果講透：**這不是天才憑空變出工具，而是一個非常具體的協作複雜度（上千人、分散全球、互不信任、要併行改一份 codebase、原本的工具一夜消失）逼出了一個非常具體的資料結構（內容定址 + DAG + 全量分散）。** 複雜度沒有被消滅，是被**重新組織**了——原本散落在「中央伺服器的協調」「email 寄 patch 的人工整合」「不敢開分支的保守」裡的協作摩擦，被收攏進一張可雜湊驗證的有向無環圖，讓機器去扛大部分協調。這是「複雜度搬家」最教科書的一次演示：從人的協調，搬到資料結構的設計。\n\n## GitHub：把開源變成社交網路\n\nGit 解決了「機器之間怎麼交換與整合歷史」，但它本身是個冷硬的工具——沒有網頁、沒有帳號、沒有「在哪裡放官方 repo」的答案。把 Git 從工程師的命令列工具，變成一個全球性的協作與社交平台的，是 **GitHub**（2008 年創立，公開上線於 2008 年 4 月 10 日；創辦人 Tom Preston-Werner、Chris Wanstrath 等）。\n\nGitHub 做的事，是在 Git 這個分散式引擎外面包一層**集中的社交層**。注意這裡的鐘擺——Git 技術上徹底分散（每個 clone 平等），GitHub 卻在它上面重新引入一個事實上的中心（大家都把官方 repo 放這裡）。這不矛盾，是分工：底層協議分散（誰都能離線、能自架），上層協調集中（大家**自願**約定一個共同的會合點）。它把開源協作從「散落各處、靠郵件列表」收攏成「有一個地方能看到所有人在做什麼」。\n\nGitHub 加上去的東西裡，有一個是它的發明、也徹底改變了你的日常：**pull request（PR）**。在純 Git 裡，把修改提議給別人是手動流程（推到某處、通知對方來拉）。GitHub 把它變成一個網頁上、可見、可討論的物件：你 fork 一個 repo（複製到你名下，也是把「每個 clone 平等」社交化的呈現）、改、開 PR，於是有一個頁面，上面是 diff、討論串、review 意見、CI 的綠勾紅叉。這套你天天做的動作，是 GitHub 把 Git 的分散式能力，包裝成一個任何人都能參與、旁觀、社交的儀式。\n\n於是開源從「一種授權與協作模式」變成了「一種社交活動」。你的個人 GitHub 帳號 C-ZW 成了履歷——你 star 什麼、貢獻過哪些專案、commit 的密度，公開可見，成為一種工程聲望的貨幣；你做 AI Infra 轉職時讀 vLLM、llm-d 的原始碼、追它們的 issue 與 PR，整個入口都建立在 GitHub 把開源社交化這件事上。Stallman 在乎自由、Torvalds 在乎工具扛不扛得住 Linux 的規模，而 GitHub 在他們的地基上蓋了一個讓開源變得**好玩、可見、會上癮**的層——這正是開源在 2010 年代之後爆炸式擴張的一大推力。（這層社交化的帳單，下一段算。）\n\n## 複雜度搬去哪了\n\n這一章有兩筆帳要結：一筆是所有權（自由軟體/開源），一筆是協作（Git/GitHub）。\n\n| 這一跳 | 消滅／搬走了什麼負擔 | 製造了什麼新負擔 | 什麼情況下洩漏／反噬 |\n|---|---|---|---|\n| **copyleft / 開源授權** | 軟體不再非得是黑盒子私產；你能讀、改、組裝別人的程式碼，不必重造輪子 | 授權相容性成了新複雜度：GPL/MIT/Apache 能不能混、會不會「傳染」、組進閉源產品合不合法 | 你把一個 copyleft 函式庫組進商業產品，法務發現整個 codebase 可能被要求開源；不同授權的相依互相衝突 |\n| **「open source」去道德化** | 開源變得對企業友善，採用門檻降到最低，生態爆炸式擴張 | 運動的「為什麼」從權利降格成好處——當專有更划算時，理由隨時可被放棄 | 開源專案被大公司吸乾貢獻卻不回饋；「開放核心」「改授權」爭議（理想被務實稀釋） |\n| **Git：協作搬進 DAG** | 分支與 merge 從高風險手術變成零成本日常；協作摩擦從人工協調搬給資料結構 | 一個你大多時候不必懂、但偶爾會漏的內部模型（物件、ref、rebase 改寫歷史） | rebase/force push 改寫共享歷史搞爛協作；衝突的 merge 還是要人腦解；歷史一旦複雜，工具的抽象就漏給你看底層 |\n| **集中搬到本機（分散式）** | 離線可 commit/分支/看歷史；中央伺服器從「必須」降為「約定」 | 每個 clone 都扛全量歷史（大 repo 變肥）；「哪個是權威」從技術問題變成社交約定 | monorepo 大到 clone 要很久；沒有強制的中央權威，要靠流程紀律維持秩序 |\n| **GitHub：開源社交化** | 開源從散落各處收攏成一個會合點；PR/fork 讓參與門檻降到點幾下 | 分散式的理想上重新長出一個事實壟斷的中心（鐘擺擺回集中） | 一個平台成了開源的單點依賴（它一掛、被收購、改政策，整個生態跟著抖） |\n\n**這一跳的帳單，一句話：軟體的所有權從私有變成可公共，協作的複雜度從人的協調搬進了一張可驗證的有向無環圖——代價是你多扛了「授權相容性」這種制度複雜度，和「分散式理想最後又長回一個中心（GitHub）」這個鐘擺反噬。** 留意這裡的鐘擺（回收 ch01）：集中（CVS/SVN）→ 分散（Git）→ 又集中（GitHub）。技術上分散是進步，但人類協作終究需要一個共同的會合點，於是中心以另一種形式回來了——只是這次的中心是約定的、可替換的，而不是技術上不可少的。這個「分散了又自願集中」的模式，你在後面的雲（見 ch16）會再看到一次。\n\n## 紙上推演\n\n### 推演題 1 — 複雜度搬家：Git 把什麼從伺服器搬到了你的本機？ **[15 分鐘] ★★**\n\n口頭講清楚：相較於 SVN 這類集中式版控，Git 把哪些東西從中央伺服器搬到了每個人的本機？這次搬家**消滅了什麼負擔、又新增了什麼負擔**？用「複雜度守恆」的框架回答，不要只說「Git 比較好」。\n\n#### 推演解答\n\n搬走的是「凡事都要連伺服器、凡事都要中央權威」這個負擔。集中式模型裡，完整的版本歷史只在伺服器上，所以 commit、看歷史、diff、開分支這些操作很多都得跟伺服器來回——伺服器掛了或網路斷了你就動彈不得，而且開分支/merge 在伺服器端是重操作，大家養成不敢開分支的習慣。Git 把**整個歷史（DAG 物件圖）搬到每一台 clone**：你的本機就是一個完整自足的 repo，可以離線 commit、離線開分支、離線看全部歷史，分支不過是圖上多一個指標，幾乎零成本。\n\n但複雜度沒有消失，是搬了家、換了形狀，記下三筆新負擔：\n\n1. **每個 clone 都扛全量歷史。** 方便的代價是肥——大型 monorepo 的歷史可能很大，clone 一次要很久、佔很多磁碟（這也是為什麼有 shallow clone、partial clone 這些後來的補丁）。\n2. **「哪個是權威」從技術問題變成社交問題。** 集中式有天然的唯一真相（伺服器上那份）；Git 技術上每個 clone 平等，於是「哪個 repo 是官方的」不再由技術決定，得靠人的約定（這正是 GitHub 後來填的位）。\n3. **一個你偶爾得跳下去懂的內部模型。** 平常你不必懂物件、ref、reflog；但當你 rebase 改寫歷史、force push 搞爛別人的分支、或要從一個爛掉的狀態救回來時，這個被藏起來的內部模型就漏給你看——這是抽象洩漏的標準場景（預告 ch19）。\n\n**常見誤解**：以為「分散式」只是「不用伺服器」。不是——GitHub 證明了你還是會（自願）用一個中心。分散式的真正意義是「中央伺服器從技術上的必須，降格成社交上的約定」，這讓中心變得可替換（你能搬家、能自架），而不是讓中心消失。\n\n### 推演題 2 — 自由軟體 vs 開源：為什麼這不只是用詞之爭？ **[20 分鐘] ★★★**\n\n有人跟你說「free software 跟 open source 是同一件事，Stallman 只是在計較用詞」。請反駁他：講清楚這兩個詞底下是**兩種不同的世界觀**，以及這個分歧為什麼在你今天的技術選型（選授權）裡仍然活著。\n\n#### 推演解答\n\n它們在**操作**上幾乎重疊（都要求程式碼公開、可改、可散布），所以實務常合稱 FOSS——這是「只是用詞」這個誤解的來源。但它們對「**為什麼**要開放」的答案根本不同，而那才是分歧的本體：\n\n- **自由軟體（Stallman/FSF, 1985）的答案是倫理的**：軟體自由是使用者的**權利**，剝奪它（用專有黑盒子綁住使用者）在道德上是錯的。開放不是手段，是目的本身。\n- **開源（OSI, 1998）的答案是務實的**：開放的開發模式能做出**更好、更可靠**的軟體（市集模式、眾人之眼），所以值得做。「open source」這個詞 1998 年由 Christine Peterson 提出，刻意去道德化，就是為了把它變成一個能對企業 CTO 推銷的、關於「好處」的論點，而不是一個關於「權利」的、會嚇跑企業的道德指控。\n\n為什麼這個分歧是真的、不是計較？因為**理由的性質決定了運動在壓力下會不會崩**。如果開放的理由是「它有好處」，那麼在某個「專有更划算」的情境下，這個理由就站不住——好處是可以被成本效益翻盤的。如果理由是「這是權利」，那它不隨情境動搖——權利不能拿來做成本效益分析。Stallman 拒絕被「open source」收編，正是怕運動的地基從不可談判的權利，被換成可談判的好處。\n\n這個分歧在你今天的選型裡活生生：選 **permissive（MIT/Apache）** 還是 **copyleft（GPL）**，技術後果完全不同（前者能閉源商用、後者會「傳染」），而這個差別的根就是 1985（權利）與 1998（好處）那兩種世界觀。\n\n**常見誤解**：以為 copyleft（GPL）比 permissive（MIT）「更開放」。不是「更」，是**不同方向**的開放——GPL 用強制條款保護下游的自由（限制了你閉源的自由，來保障使用者的自由），MIT 把幾乎所有自由都給你（包括閉源的自由）。哪個「更自由」取決於你問的是誰的自由——這正是兩種世界觀的核心差異，不是程度問題。\n\n### 推演題 3 — 反事實：沒有便宜的分支與 merge，PR 工作流還可能存在嗎？ **[15 分鐘] ★★**\n\n反事實推理：假設版本控制停在集中式時代（分支昂貴、merge 是高風險手術、沒有便宜的本地分支）。你今天的 PR-based 協作工作流——人人開 feature branch、發 PR、review、merge——還可能以現在這個形狀存在嗎？為什麼？\n\n#### 推演解答\n\n不可能以現在的形狀存在。整套 PR 工作流的前提，是**分支便宜到可以隨手開、merge 安全到可以天天做**。抽掉這個前提，三件事都崩：「人人開 feature branch」變成製造大量痛苦 merge 的奢侈品，大家會退回主線直接改；「先各做各的、最後再合」太危險，團隊會傾向在共享主線上頻繁同步而非長出分支；fork-and-PR 更無從談起，因為它整個建立在「每個 clone 都是完整平等的 repo」這個 Git 的分散式 DAG 性質上，而集中式模型裡根本沒有「平等的完整 clone」。\n\n所以準確的因果鏈是：**Git 的便宜分支與安全 merge（來自 DAG 設計）→ 讓「隔離每個改動到分支、再合回」變成廉價安全的日常 → GitHub 把它包裝成 PR/fork 的社交儀式 → 才有你今天的協作工作流。** 抽掉第一環，後面整條鏈都不成立。PR 工作流不是憑空的最佳實踐，是被一個資料結構的性質「允許」出來的——工具能力先變，工作方式才跟著長出來（全書反覆的模式：抽象變了，方法跟著變）。\n\n**常見誤解**：以為 PR 是一種「管理流程/方法論」，跟工具無關，換個版控也能照搬。錯——PR 工作流是 Git 的 DAG 性質**長出來**的，不是先有方法論再找工具實作。沒有便宜分支，這套方法論連想都不會被想出來。\n\n## 自我檢核\n\n口頭自答，講得出因果才算過關：\n\n1. Stallman 的 free「不是 free as in beer」到底在強調什麼？為什麼光把程式碼公開（丟 public domain）還不夠，非得要 copyleft？copyleft 用了什麼既有的法律武器、反向達成了什麼？\n2. 為什麼說 copyleft 是「法律駭客」而不是「技術」？它屬於抽象 strand 還是方法 strand？\n3. Linux（1991）證明了什麼是「能贏的工程」、反駁了關於協作複雜度的哪一個直覺？（提示：回收 ch10 的 O(n²)。）\n4. 「大教堂 vs 市集」各是什麼？Raymond 的「眼睛夠多 bug 就淺」要加什麼但書（Heartbleed 教你的）？你的 PR 工作流是哪一種模式的日常？\n5. 「自由軟體」與「開源」在操作上幾乎一樣，那它們**真正**的分歧在哪？為什麼這個分歧不是計較用詞、而是會決定運動在壓力下崩不崩？這個分歧怎麼活在你選 MIT vs GPL 的決定裡？\n6. Git 誕生的觸發事件是什麼（BitKeeper 那段）？Torvalds 把「上千人併行改一份 codebase」這個協作複雜度，用哪三個核心設計（內容定址、DAG、全量分散）重新組織？各自解了什麼痛？\n7. 用「複雜度守恆」講：Git 把協作複雜度搬去哪了？這次搬家的帳單是什麼（至少兩筆）？\n8. GitHub 在 Git 的「徹底分散」上重新引入了一個「事實上的中心」，這是不是倒退？用鐘擺（分散↔集中）解釋為什麼這不矛盾。\n\n## 延伸閱讀\n\n- **Richard Stallman,《The GNU Manifesto》（1985）** — 自由軟體運動的創世文件，讀第一手的理念訴求（而非二手轉述）。看他怎麼把「分享程式碼」講成一個倫理立場。線上：gnu.org/gnu/manifesto。\n- **Richard Stallman,《The GNU Project》** — 比 Manifesto 更完整的回顧，講 GNU 的緣起、free 的兩種意思、copyleft 的動機。要分清 FSF（1985）與 GPLv1（1989）兩個年份，讀這篇最清楚。線上：gnu.org/gnu/thegnuproject。\n- **Eric S. Raymond,《The Cathedral and the Bazaar》（1997）** — 把 Linux 現象理論化的那篇。重點讀「大教堂 vs 市集」的對比與 Linus's Law；讀完記得自己補上 Heartbleed 這個反例的但書。線上：catb.org/~esr/writings/cathedral-bazaar。\n- **Linus Torvalds, Git 最初的 commit 與 2005 年的 git mailing list 討論** — 想看「協作複雜度逼出資料結構」的第一手現場，去看 Git 倉庫裡那個 2005-04-07 自嘲 \"the information manager from hell\" 的初始 commit，與當時郵件列表上他解釋設計取捨的貼文。\n- **Scott Chacon & Ben Straub,《Pro Git》（線上免費）** — 本章刻意沒展開的「Git 內部物件模型」在這裡有最清楚的講解。讀第 10 章「Git Internals」，你會看到內容定址、blob/tree/commit、DAG 在程式碼層面長什麼樣。線上：git-scm.com/book。\n- **Christine Peterson,「How I coined the term 'open source'」（opensource.com, 2018）** — 「open source」這個詞 1998 年怎麼被造出來、為什麼要刻意去道德化的第一手回憶，理解自由軟體 vs 開源分歧的好入口。\n"}, {"id": "ch15-network-and-web", "file": "ch15-network-and-web.md", "group": "Part V — 資料、開源與網路", "title": "ch15 — 網路與 Web：軟體從盒子搬到伺服器", "md": "# ch15 — 網路與 Web：軟體從盒子搬到伺服器\n\n> **本章解決什麼問題**：到上一章為止，軟體還是一個「東西」——你把它編譯成一份可執行檔，刻進光碟、裝箱、寄到使用者手上，它在「他的機器」上跑。這一章講一次比任何新語言、新流程都更動搖根基的轉變：軟體的交付形態變了——它不再裝在使用者的機器上，而是跑在**我們的伺服器**上，使用者手上只剩一扇窗（瀏覽器）。撞的牆不是「程式太大」（ch05）也不是「需求會變」（ch12），而是**交付**這件事本身的成本與控制權：盒裝軟體一旦寄出去就改不動了，而世界不會停下來等你下一版光碟。Web 的開放標準（HTTP/HTML/URL，無專利、任何人可實作）把「網路」這層複雜度標準化，讓它成為史上最大的應用平台；而這一跳的帳單，正是你每天在付的那筆——軟體跑在你的伺服器上，於是「為所有人 24/7 可用」變成你的責任。雲（把伺服器再搬進別人的機房）是下一跳，留給 ch16。\n\n## 從你已知的出發\n\n你整個職業生涯，都站在一個你大概從沒當成「歷史事件」來想的前提上：**你寫的軟體不在使用者的電腦裡。**\n\n把你做過的東西攤開看。你做的 B2B/B2C 資料中介服務，跑在 AWS ECS 上；對接你的那家企業客戶，他們的工程師從沒拿到過你的程式碼，他們拿到的是一份 OpenAPI 規格和一個 endpoint。你的 REST API 改了一版邏輯，當天部署上去，全世界打這支 API 的人下一個請求就吃到新版——你不需要寄任何東西給任何人，不需要任何人「安裝更新」。你那套 500K 註冊、尖峰 3,200 並發的 WebSocket 即時系統，使用者那端只是一個瀏覽器分頁（或一個 app 裡的 WebView），真正的狀態、真正的邏輯、真正的「程式」全在你的伺服器上；使用者的裝置只是一扇窗，負責把畫面畫出來、把點擊送回來。\n\n這個安排你習以為常到不會去想它，但它在歷史上**相當晚近**才成立。在它之前，軟體業四十年的預設是反過來的：軟體是一份你**交付給對方、由對方執行**的製品；要讓使用者用上新功能，唯一的辦法是把新版本送到他手上——壓成軟碟、刻成光碟、裝箱、寄出，然後祈禱他真的會去安裝。\n\n這個反轉——軟體從「裝在使用者機器的盒子」變成「跑在我們伺服器的服務」——是本章的主線。而它替你帶來的那筆帳單，你也每天在付：因為軟體跑在你的伺服器上，**所有人的可用性都是你的責任**。盒裝軟體商賣完光碟，使用者的電腦當機是使用者的事；你的服務掛了，是你半夜被 CloudWatch 叫醒。你做的所有事——多層 cache、read replica、HPA autoscaling、冪等消費者、那條 FluentBit pipeline——本質上都是在替「軟體搬到伺服器端」這次複雜度搬家還帳。你不是在維運一個產品，你是在替全世界的使用者**持有**那個產品的執行。\n\n要看懂這筆帳怎麼來的，得回到兩件事：網路怎麼從一堆互不相通的機器變成一張標準化的網，以及 Web 怎麼用三個無專利的小東西，贏過當年所有財大氣粗的封閉平台。\n\n## 第一層標準化：把「網路」這面牆抹平\n\n在軟體能搬到伺服器之前，得先有一張能讓任何機器跟任何機器講話的網。這件事本身就是一場對複雜度的征服，而且征服的方式——**用一個標準把底層差異藏起來**——跟全書其他每一次抽象躍遷同形。\n\n### ARPANET 與封包交換：別讓一根斷線拖垮整張網\n\n1969 年底，ARPANET 接上頭四個節點（照 landscape）。它要解的本質是個複雜度問題：一堆異質、昂貴的電腦散在不同機構，你想讓它們互通。最直覺的做法是「電路交換」——像打電話，通訊前先在兩端建一條專屬線路，獨佔到講完。這個模型**脆弱又浪費**：線路上任一中繼點壞掉，整通連線就斷；就算你沒在傳資料，那條線也被你佔著。\n\nARPANET 押的是另一個賭注：**封包交換（packet switching）**。把訊息切成小封包，每個自帶目的地、獨立在網路裡找路；某條路斷了就繞別條走。關鍵性質是**沒有中央、沒有專屬線路**——智慧分散在每個節點，任何單點故障都不致命。你今天信賴的「網路大致總是通的」，根就在這裡。這已經是一次「複雜度搬家」：它把「保證送達」從「維持一條完美的專屬線路」搬成「在不可靠的網路上，靠重傳與繞路逼近可靠」——這筆帳會在很久以後以 TCP 重傳、亂序、壅塞控制的形式，漏回你的 production（接 ch19 抽象洩漏）。\n\n### TCP/IP：一個讓「任何網」都能互連的協定\n\nARPANET 證明了封包交換可行，但它本身只是一張網。真正的問題更大：1970 年代冒出一堆**互不相通**的網路（ARPANET、衛星網、無線封包網……），各說各話。要怎麼讓「網路與網路」互連成一張「網際網路（inter-net）」？\n\n1974 年 5 月，Vint Cerf 與 Bob Kahn 發表〈A Protocol for Packet Network Intercommunication〉（照 landscape），提出後來演化成 TCP/IP 的那套協定。它的核心洞見就是整個網際網路的設計哲學：**讓底層的各種網路保持笨，把互連的智慧放到端點。** 每個網路內部怎麼運作不管，只要能傳封包就好；不同網路之間靠 IP 這層共同語言定址、靠 TCP 這層在端點「把切碎的封包重組成有序、可靠的串流」。\n\n這就是著名的 **end-to-end 原則**：網路本身只負責盡力把封包送過去（best-effort），可靠性、順序、重傳這些聰明事全部在兩端主機上做。你做後端時直覺依賴的那條分界——「網路會掉包、會亂序，所以我得在應用層處理冪等與重試」——正是 TCP/IP 這個五十年前的決策劃下的：網路被刻意設計成笨的、不保證的，聰明與責任被推到你這端。\n\n1983 年 1 月 1 日，ARPANET 正式從舊的 NCP 協定切換到 TCP/IP（照 landscape，著名的 flag day）。值得記住的對比：這種「全網同一天硬切、不准回頭」的做法，在今天這個規模的網際網路上**完全不可能**——這本身就說明了當年的網有多小，以及一個標準一旦普及、複雜度漲起來後就再也搬不動（這主題會在本章下半場與 ch19 反覆出現）。\n\nTCP/IP 做的事，用一句話總結：**它把「網路」這層複雜度標準化、藏到一個統一介面後面。** 從此，軟體不必管底層是光纖還是衛星、是哪家廠商的路由器——你只要會講 IP，你就在網上。這是「軟體搬到伺服器」的**前提條件**：沒有一張任何機器都能上的標準化網，就沒有「跑在遠端伺服器、人人可連」這回事。\n\n```text\n   電路交換（打電話模型）：建一條專屬線路，獨佔到講完\n   ┌─────┐                          ┌─────┐\n   │ A端 │ === 專屬線路（獨佔）==== │ B端 │   線斷＝整通斷、佔線＝浪費\n   └─────┘                          └─────┘\n\n   封包交換 + TCP/IP：訊息切成封包，各自找路，端點重組\n   ┌─────┐                          ┌─────┐\n   │ A端 │ -> 封包各自找路繞節點 -> │ B端 │   任一段斷＝繞路、端點重組\n   └─────┘                          └─────┘\n```\n\n關於 TCP/IP 的協定機制細節（三向交握、壅塞視窗、封包格式），本書不展開——你需要時，延伸閱讀有原典。本章在意的只有一件事：**它把網路的複雜度標準化了，於是上面才長得出 Web。**\n\n## Web：用三個無專利的小東西，造出史上最大的應用平台\n\n網路通了，但網路不等於 Web。1980 年代末，網上能做的事（email、FTP 傳檔、Usenet、各種登入式服務）彼此割裂，沒有一個統一的方式去「指向並取得任何一份文件」。複雜度的牆在這裡：**資訊散落在無數不相通的孤島上，每座島有自己的存取方式、自己的位址規則。**\n\n### Berners-Lee 的三件套：HTTP、HTML、URL\n\n1989 年 3 月，CERN 的 Tim Berners-Lee 寫了提案〈Information Management: A Proposal〉（照 landscape）。他要解的是 CERN 自己的痛——一個龐大、人員流動快的研究機構，資訊散在各種不相容系統裡，新人來了找不到東西。他老闆在提案上批了句後來很有名的話，大意是「vague, but exciting（含糊，但令人興奮）」（廣為流傳，未逐字查證原件）。\n\n他造出來的東西，是三個小到驚人的標準：\n\n- **URL**：一個全球統一的定址法。`http://host/path` 這個格式讓你能用一個字串，唯一地指向網路上任何一份資源。這是把「資訊孤島各有各的位址」這個複雜度一舉抹平——所有東西都用同一種地址。\n- **HTTP**：一個極簡的、無狀態的請求／回應協定。客戶端說「GET 這個 URL」，伺服器回「這是內容」。無狀態（stateless）是關鍵設計——每個請求自帶全部所需資訊、伺服器不必記住你上一次幹了什麼。你做 REST API、靠 token 在每個請求裡自證身分、把 session 狀態外推到 Redis 而非綁在某台機器上——你做的全部是 HTTP 這個「無狀態」基因的後代。它讓「水平擴展」成為可能：任何一台伺服器都能接任何一個請求，因為請求不依賴特定機器的記憶。\n- **HTML**：一個描述文件結構、且能**內嵌指向其他文件的連結**的標記語言。超連結（hyperlink）是 Web 之所以是「網」的那條線——任何一份文件可以指向任何另一份，不需要對方同意、不需要中央目錄登記。\n\n三件套合起來，第一次給了世界一個**統一的方式去發布、定址、取得、並互相連結任何文件**。1991 年 8 月 6 日，Berners-Lee 把 WWW 對外公開（照 landscape）。\n\n### 決定性的一步：把它變成沒有人能擁有的東西\n\n這裡是本章最關鍵、也最容易被略過的史實，請你慢讀。\n\nWeb 真正的勝負手，不是技術上多巧妙——三件套都簡單到近乎簡陋。真正決定一切的是一個**所有權決策**：**1993 年 4 月 30 日，CERN 正式宣告放棄 WWW 相關程式碼的所有智慧財產權，把它釋入公有領域（public domain），任何人都能免費使用、複製、修改、再散布，不收任何權利金。**（這份聲明的原文大意是：「CERN 放棄對此程式碼——無論原始碼或二進位形式——的一切智慧財產權，並允許任何人使用、複製、修改與再散布。」我查到 CERN 官方說法確認此日期與大意，逐字措辭以 CERN 原件為準。）\n\n請注意這是**兩個不同的日子**，別搞混：1991 年 8 月是 WWW 軟體與概念「對外公開」；**1993 年 4 月 30 日才是 CERN 把它正式釋入公有領域、宣告無人可擁有**。前者是「能用了」，後者是「沒有人需要付錢或求許可就能實作它」——而軟體史的天平，是被後面這一天壓下去的。\n\n為什麼這一步是決定性的？因為它意味著：**HTTP、HTML、URL 沒有專利、沒有授權費、沒有守門人。** 任何人——任何公司、任何學生、任何國家——都可以寫一個瀏覽器、架一台伺服器、發明一個新的 server-side 語言，而不必向任何人請求許可、不必付任何權利金、不會被告侵權。這個「無人可擁有」的性質，把 Web 從「一個好技術」變成了「一塊任何人都能在上面蓋東西的公共地基」。\n\n你可以把它跟 ch14 的開源精神接起來看：那一章講軟體的**程式碼**所有權如何被重寫（從私有到公共財）；這一章講軟體的**平台標準**所有權如何被重寫。兩者是同一個主題的兩面——當一個東西「沒有人擁有」時，它反而能被「所有人建造」，於是它的成長不再受任何單一守門人的意願與商業利益限制。控制權的下放，換來的是爆炸性的、無需許可的（permissionless）創新。這是本書「複雜度／控制權的分配」這條暗線在網路時代的主場。\n\n## 個案：開放標準如何擊敗圍牆花園\n\n抽象講「開放贏過封閉」太廉價了。把它攤成一個有人、有時間、有代價的具體個案，你才會真的信。最乾淨的對照組不是別的，是一個今天幾乎被遺忘、但當年比 Web 還紅的競爭者：**Gopher**。\n\n### Gopher：差一步就贏，輸在一個授權決定\n\n1991 年，明尼蘇達大學推出了 Gopher——一個用選單階層組織、瀏覽全球文件的系統。它解的問題跟 Web 幾乎一樣，而且在早期**更受歡迎、更好用**：選單式的介面對當時的人來說比超連結直覺，部署也簡單。1993 年時，Gopher 的流量還遠大於 Web（照我查到的多份整理）。\n\n然後明尼蘇達大學做了一個決定，親手把自己送進歷史的註腳。1993 年，校方宣布要**對商業使用者收取 Gopher 伺服器軟體的授權費**（據多份整理，校方的理由是要籌措開發經費，並類比 Unix 等軟體也收費）。費用其實不高，但傷害不在金額——在於那個訊號：**用 Gopher，你頭上就懸著一個守門人，他今天能收一點、明天能收更多、後天能改規則。** 工程師與機構的反應是理性的：大量 Gopher 部署停止開發、轉向，以避開這份不確定性。\n\n對照之下，就在同一個 1993 年 4 月，CERN 把 Web 釋入公有領域、明說不收任何權利金。一邊是「免費，但我們保留收費的權利」，一邊是「無人可擁有，永遠免費」。差距是天壤之別。後來的數字像在演示這個原理：1993 年 Gopher 流量年成長約 997%，而 Web 的年成長率是離譜的數十萬個百分比（照我查到的整理，這類成長率數字屬估計、僅作量級示意）。明尼蘇達大學在 2000 年才把 Gopher 改成 GPL 開源——但木已成舟，遲了七年。\n\n這個個案把本章的核心命題講得再清楚不過：**Web 贏 Gopher，技術不是主因，所有權結構才是。** 一個「保留收費權」的守門人，哪怕現在不收，光是「他有權收」這件事，就足以讓人不敢在上面下重注。開放標準的決定性，不在它今天免費，在它**結構上不可能有人收你過路費**。\n\n### AOL 與圍牆花園：把同一個道理放大到消費端\n\n把鏡頭從技術社群拉到一般消費者，同樣的劇本在 AOL（America Online）身上重演。1990 年代中後期，對多數美國家庭來說「上網」幾乎等於「上 AOL」。AOL 是經典的**圍牆花園（walled garden）**：精緻、好用、被策展過——它幫你把內容整理好、體驗顧好，代價是你**出不去**，你看到的是 AOL 決定讓你看到的，它的商業利益就是你的世界邊界（很多用戶甚至不知道牆外還有整個開放的 WWW，照我查到的整理）。一旦使用者嚐到開放 Web 那種「任何人都能發布、任何頁面都能連到任何頁面、沒人決定你能看什麼」的狂野，牆內那套「我們幫你選好」就從便利變成束縛；內容與創新在牆外爆炸性地長，而牆內受限於單一公司的策展意願。結局你知道：AOL 成了歷史名詞，開放 Web 接管了世界。\n\nGopher 與 AOL 是同一個道理的兩個尺度：**封閉平台的成長上限，是那個擁有它的人的意願與利益；開放標準沒有這個上限，因為沒有「那個人」。** 把複雜度與控制權集中在一個守門人手上，短期換來整潔與便利的體驗；但長期，那個集中點就是天花板。這是本書「集中↔分散」鐘擺（ch01 提出）在平台層的一次清楚擺動——而且請你記著它，因為到了 ch16 的雲、乃至今天各種平台，這個鐘擺會擺回來：當年贏在開放的 Web，後來又長出了新的、更精緻的圍牆花園。沒有哪一邊是終局。\n\n## 從文件檢視器到應用平台：複雜度往伺服器端流\n\n到這裡，Web 還只是個「把文件連起來」的東西。要走到你今天賴以維生的那個世界——軟體跑在伺服器、瀏覽器是窗口——還需要兩步：讓網頁能**動**，以及讓瀏覽器從「看文件的」變成「跑應用的」。\n\n### LAMP 與動態網站：頁面不再是死的\n\n最早的網頁是**靜態**的：伺服器上躺著一份寫死的 HTML 檔，誰來要都給同一份。這撐不起「你的帳戶餘額」「你的搜尋結果」這類**因人因時而異**的內容。於是出現**動態網站**——HTML 不是事先寫死，而是伺服器在收到請求那一刻，根據資料庫、根據你是誰，**即時產生**出來的。\n\n承載這波的，是 1990 年代末成形、後來叫做 **LAMP** 的組合：**Linux**＋**Apache**（Web 伺服器）＋**MySQL**＋**PHP/Perl/Python**（server-side 語言）（照 landscape）。它在歷史上的分量不在任何單一元件多先進，而在它**整套都是開源、免費、無需許可**——這正是上一節那個「無人可擁有」的地基結出的果。一個學生、一間小公司，零授權成本就能架起服務全世界的動態網站；Web 的開放，往下傳染給了建在它上面的整套工具鏈。\n\n對你來說，LAMP 是你那套 NestJS + PostgreSQL 後端的直系祖先。你寫的每一個「收到請求 → 查資料庫 → 組出回應」的 handler，做的就是當年 PHP 腳本做的事：**在伺服器上即時產生回應**。中間隔了三十年的抽象演進（框架、ORM、型別、容器），但那個基本動作——伺服器端動態生成——是 LAMP 時代定下來的。而它定下的同時也定下了那筆帳：**邏輯在伺服器跑，意味著伺服器得一直開著、一直能扛住流量。** 靜態檔案誰都能 cache、誰都能鏡像；動態生成則把計算的重擔牢牢釘在你的伺服器上。你做的多層 cache、read replica、autoscaling，全部是在替「動態生成」這個從 LAMP 開始的選擇，持續付運算與可用性的帳。\n\n### Web 2.0 與 AJAX：瀏覽器變成應用程式的執行環境\n\n最後一步，是瀏覽器本身的角色翻轉。\n\n早期的 Web 互動模型很笨：你點任何東西，瀏覽器就向伺服器要一整張**新的頁面**、整頁重新載入、白屏一下、重畫。在這個模型裡，瀏覽器始終是個「文件檢視器」——它的工作是顯示伺服器送來的一份份文件。\n\n2005 年 2 月，Jesse James Garrett 寫了一篇短文，給一個已經存在的技術組合起了個名字：**AJAX**（Asynchronous JavaScript and XML，照 landscape）。它的核心招數是：網頁裡的 JavaScript 可以**在背景**、不重新載入整頁的情況下，跟伺服器交換資料，然後**只更新頁面的一小塊**。Google Maps 可以讓你拖曳地圖、新區塊在背景悄悄載入而不白屏；Gmail 可以收到新信而不必你按重新整理。瀏覽器從「顯示一份份文件」，變成了「一個持續運行、會在背景跟伺服器對話的應用程式」。\n\n差不多同時（名詞出於 2004 年 O'Reilly 與 MediaLive 的腦力激盪，定義文〈What Is Web 2.0〉發表於 2005 年，照 landscape），Tim O'Reilly 等人用 **Web 2.0** 這個詞替整波轉變命名：Web 從「人們閱讀的文件集」變成「人們使用的應用平台」、變成使用者自己生產內容、彼此互動的地方。\n\n對你來說，這一步是你那套 WebSocket 即時系統的世界觀源頭。AJAX 打破了「一次請求一整頁」的桎梏，讓瀏覽器能持續、細碎地跟伺服器通訊；WebSocket 把它推到極致——一條一直開著的雙向通道，伺服器能主動推訊息給瀏覽器。你那套 500K 註冊、3,200 並發的即時系統能存在，前提就是「瀏覽器是個能跑常駐邏輯、能維持長連線的應用執行環境」——而這前提是 Web 2.0／AJAX 那幾年才落定的。在那之前，瀏覽器是文件檢視器，根本承載不了「即時」這個概念。\n\n（至於這之後前端如何從散落的 jQuery 演化到 React、Vue 這類框架——那是另一條完整的故事線，本書不展開，一句帶過：前端框架是「把瀏覽器當應用平台」這個前提一旦成立後，為了管理瀏覽器端日益膨脹的應用複雜度而長出來的。）\n\n### 交付形態的根本反轉：更新不再靠寄光碟\n\n現在把這幾步合起來，那個本章開頭的主線就完整了。\n\n軟體業頭四十年的交付模型是：開發一份軟體 → 壓成媒介（軟碟、光碟）→ 裝箱、鋪貨、寄出 → 使用者**安裝**到自己的機器 → 軟體在**他的機器**上跑。在這模型裡，你要修 bug 得發 patch、祈禱使用者去裝（多數不會），於是市面上同時跑著你軟體的 v1.2、v1.5、v2.0，你得全部支援（碎片化）；但相對地，使用者電腦當機、灌不起來、跟別的軟體衝突，那是**他的**問題——你交付完光碟，可用性的責任就轉給了使用者。\n\nWeb 把整個模型反轉。當軟體跑在**你的**伺服器上、使用者只用瀏覽器連過來：你要修 bug、上新功能，部署到伺服器即可，下個請求**所有人**同時吃到新版，沒有寄出、沒有安裝、沒有碎片化（你做的就是這個：REST API 改一版、當天部署、全世界下個請求就是新版）。但可用性的責任**整個搬到了你頭上**——使用者那端只剩一扇窗，他不再「持有」你的軟體，是你替他持有著它的執行；於是你的軟體掛了、慢了、被流量打爆了，全是你的事，而且是**所有使用者同時**的事。\n\n這就是本章那筆複雜度帳單的全貌，也是 SaaS（software as a service）這個商業模式的技術根。一個常被當作里程碑的具體場景：2013 年 Adobe 宣告 Creative Suite 的 DVD 之死、全面轉向訂閱制的雲端交付（照我查到的整理）——那是「盒裝軟體」這個延續了三十年的形態，在一個大型消費軟體商身上正式落幕的象徵。軟體不再是你買來「擁有」一份拷貝的東西，而是你訂閱、由廠商在他的伺服器上「持續提供」給你的服務。\n\n```text\n   盒裝模型（~1990s）：軟體在使用者機器跑\n   ┌────────┐   寄光碟、求人安裝   ┌──────────────┐\n   │ 開發商 │─────────────────────►│ 使用者的機器 │   可用性＝使用者的事\n   └────────┘                      └──────────────┘   改版＝寄新光碟\n\n   伺服器模型（Web 之後）：軟體在你機器跑，客戶端只是窗口\n   ┌─────────────┐   瀏覽器當窗口   ┌────────────┐\n   │ 使用者（窗）│◄────────────────►│ 你的伺服器 │   可用性＝你的事\n   └─────────────┘                  └────────────┘   改版＝部署一次、人人即得\n```\n\n你維運的痛——半夜被叫醒、為 SLA 負責、為每一個你從沒見過面的使用者的可用性扛責任——不是你倒楣，是這次交付形態反轉的**內建帳單**。軟體搬到伺服器，省掉了「寄光碟、求人安裝、支援一堆版本」的複雜度；但它把「替全世界持有這個軟體的執行、24/7 不能倒」這個全新的、巨大的複雜度，搬到了你身上。這就是複雜度守恆在交付形態上的演示：負擔沒有消失，它從使用者的機器，搬到了你的 on-call 排班表上。\n\n## 複雜度搬去哪了\n\n| 維度 | 搬家前（盒裝軟體時代） | 搬家後（軟體跑在伺服器） | 帳單／在哪洩漏 |\n|---|---|---|---|\n| 交付 | 壓媒介、裝箱、鋪貨、寄出；使用者自行安裝 | 部署到伺服器一次，所有人下個請求即得 | 你得 24/7 維運；部署成了高風險動作（一錯全體中招） |\n| 更新 | 發 patch，祈禱使用者去裝；版本碎片化 | 統一版本，伺服器端說了算 | 你**不能**有「使用者還在用舊版」當藉口，鍋全是你的 |\n| 可用性責任 | 使用者電腦的事，交付即轉移 | 全在你身上，且是「所有使用者同時」 | on-call、SLA、半夜被 CloudWatch 叫醒（你的日常） |\n| 狀態與邏輯 | 在使用者機器上 | 在你的伺服器上；客戶端只是窗口 | 伺服器得一直開、扛得住流量；cache/replica/autoscaling 是這筆帳 |\n| 平台控制權 | 各家專有格式、各自為政 | 開放標準（HTTP/HTML/URL，無專利） | 控制權下放換來 permissionless 創新；但也讓「標準一旦普及就改不動」 |\n| 網路可靠性 | （單機，不涉網） | 靠 TCP 在不可靠網路上逼近可靠 | 重傳、亂序、壅塞、分區會漏回應用層（接 ch19） |\n\n**這一跳的帳單一句話**：軟體搬到伺服器，消滅了「把軟體實體送到每個人手上、再求他安裝、再支援一堆版本」的交付複雜度；但它製造了一個對等巨大的新負擔——**你從此替全世界持有這個軟體的執行，所有人的可用性、效能、安全都是你一個人的 24/7 責任**。複雜度沒有消失，它從千千萬萬台使用者機器上的「安裝與相容」問題，凝聚成你機房裡的「永不停機」問題。而開放標準這一手，則是用「放棄擁有」換到「人人可建」——控制權的下放，是 Web 能長成史上最大平台的真正代價與真正紅利。\n\n什麼情況下這個抽象會洩漏、反噬？當「軟體在遠端、網路總是通的、伺服器總是在的」這三個你習慣性假設的前提**不成立**時：網路分區了（你的 WebSocket 連線無預警斷開、重連風暴打爆伺服器）、伺服器扛不住了（尖峰流量、你那次靠調 cache 把 RDS CPU 降 40% 的場景）、底層的 TCP 漏了（重傳堆積、延遲尖刺）。每一次這類事故，都是「軟體搬到伺服器」這層抽象在邊緣漏出它藏起來的複雜度——而你之所以值錢，正因為漏的時候你跳得下去。\n\n## 紙上推演\n\n### 推演題一 **[15 分鐘]** ★★\n\n用「複雜度搬到伺服器端」這個框架，向一個只用過盒裝軟體的人解釋：**為什麼 SaaS（如線上文件、你的 B2B API 服務）能持續、無痛地更新，而盒裝軟體（如當年的盒裝 Office）做不到？** 要求：(a) 講清楚兩種模型裡「軟體在誰的機器上跑」這個根本差異；(b) 說清楚這個差異如何決定了「更新」的難易；(c) 誠實講出 SaaS 為此付出的帳單是什麼，別把它講成只有好處。\n\n#### 推演解答\n\n(a) 根本差異在「軟體在誰的機器上跑」。盒裝軟體：你買一份拷貝、**安裝到自己的機器**，它在你的機器上執行；開發商手上沒有「正在執行中的那一份」。SaaS：軟體跑在**廠商的伺服器**上，你的瀏覽器只是一扇窗，負責顯示畫面、送回操作；你從不「持有」那份執行中的軟體。\n\n(b) 這個差異直接決定更新難易。盒裝模型裡，「更新」意味著把新版本**送到每一台已安裝的使用者機器上**、再依賴使用者主動安裝——你管不到對方的機器，於是永遠有一堆人停在舊版，市面上同時跑著 v1、v2、v3，你得全部支援（版本碎片化）。SaaS 模型裡，「更新」只是**在你自己的伺服器上部署一次**——全世界用的都是那份在你伺服器上跑的執行，下個請求所有人同時是新版；沒有寄送、沒有安裝、沒有碎片化。差異的根，就在「執行中的那一份」在誰手上。\n\n(c) 帳單：可用性責任整個搬到廠商頭上。盒裝模型裡，你交付完光碟，使用者電腦當機、裝不起來是**他的**問題；SaaS 模型裡，因為軟體在你的機器上跑，它掛了、慢了、被打爆了全是**你的**問題，而且是所有使用者**同時**遭殃。你換到了「人人即時更新」的便利，代價是簽下了「24/7 為全世界的可用性負責」這張賣身契——這正是 on-call、SLA、半夜被叫醒的由來。把這題講完整的關鍵，是不能只說 SaaS 的好處：它不是消滅了複雜度，是把「交付與相容」的複雜度，換成了「永不停機」的複雜度。\n\n常見誤解：以為 SaaS 的優勢是「雲端很神奇」。不是——優勢純粹來自「執行那一份在廠商手上、使用者只連過來」這個結構，跟它跑在自家機房還是 AWS 無關（那是 ch16 的下一跳）。\n\n### 推演題二 **[20 分鐘]** ★★★\n\n解釋**開放標準為何擊敗圍牆花園**。要求：(a) 以 Gopher vs Web 為主軸，講清楚 Gopher 輸的關鍵**不是技術**而是 1993 年那個授權決定；(b) 點出「無人可擁有」與「免費」是兩回事，為什麼前者才是決定性的；(c) 把這個結論接回 ch14 開源的所有權主題——說清楚「開放標準擊敗圍牆花園」與「開源擊敗私有軟體」是不是同一個道理。\n\n#### 推演解答\n\n(a) Gopher 在早期其實**更受歡迎、更好用**：選單式介面對當時的人比超連結直覺，1993 年它的流量還遠大於 Web。它輸的轉捩點，是 1993 年明尼蘇達大學宣布要對商業使用者收 Gopher 伺服器軟體的授權費。費用其實不高，但傷害不在金額，在**訊號**：用 Gopher，你頭上就有一個守門人，他今天能收一點、明天能收更多、後天能改規則。理性的工程師與機構不敢在這種不確定性上下重注，於是紛紛轉向。對照之下，CERN 在同一年（1993-04-30）把 Web 釋入公有領域、明說永不收權利金。所以 Gopher 輸的不是技術較量，是**所有權結構**的較量——它有個守門人，Web 沒有。\n\n(b) 「無人可擁有」≠「免費」，而前者才決定性。Gopher 在被收費前也是免費的；很多圍牆花園（早期 AOL 的某些服務）使用者也不直接付費。「免費」是一個**現狀**，一個擁有者隨時可以改變的現狀。「無人可擁有」是一個**結構性質**——CERN 放棄了智財權，意味著結構上**不存在任何人有權**向你收過路費或撤回許可。差別在於：在「免費但有主人」的平台上下注，你賭的是主人的善意會延續；在「無人可擁有」的標準上下注，你不需要賭任何人的善意，因為沒有那個人。正是這個「不需要信任任何守門人」的性質，讓無數人敢在 HTTP/HTML 上投入重本去蓋東西——permissionless（無需許可）的創新，只有在「無人可擁有」時才成立。\n\n(c) 跟 ch14 是**同一個道理的兩面**。ch14 講軟體**程式碼**的所有權被重寫（開源：原始碼公共化，沒人能私有地鎖住它）；本章講軟體**平台標準**的所有權被重寫（Web 三件套釋入公有領域，沒人能私有地擁有這平台）。核心機制一致：**把「擁有權」拿掉，換來「人人可建」，於是成長不再受任何單一主人的意願與利益封頂。** 兩者背後是同一條暗線——複雜度與控制權的分配：把控制權集中在一個擁有者手上，換來短期整潔便利，但那集中點就是天花板；把它下放成「無人可擁有」，你失去整潔的掌控，換來無上限的、permissionless 的生長。\n\n常見誤解：以為 Web 贏是因為超連結比選單「更先進」。技術差異在早期甚至是反過來的。真正的勝負手是所有權，不是介面。\n\n### 推演題三 **[15 分鐘]** ★★\n\n對帳：你那套 500K 註冊、3,200 並發的 **WebSocket 即時系統**，解的是哪一類「網路的複雜度」？要求把它拆到三層歷史地基上：(a) 它依賴 TCP/IP 解掉的是什麼；(b) 它依賴「Web 2.0／瀏覽器變應用平台」解掉的是什麼；(c) 它自己額外解的、前兩層沒給的是什麼。最後說一句：這套系統把複雜度搬到了哪裡、帳單是什麼。\n\n#### 推演解答\n\n(a) **依賴 TCP/IP 這層**：它解掉「在不可靠、會掉包的網路上，建立一條兩端有序、可靠的位元組串流」這件事。你的 WebSocket 底層就是一條 TCP 連線——封包亂序、遺失、繞路這些 TCP 在端點替你重組，應用層不必管。沒有它把「網路」標準化、提供可靠串流，你連「一條穩定的長連線」這個前提都沒有。\n\n(b) **依賴 Web 2.0／瀏覽器變應用平台這層**：它解掉「瀏覽器只是文件檢視器、只能一次要一整頁」這個限制。WebSocket 要成立，瀏覽器得是個能跑常駐 JavaScript、維持背景長連線、收到推送時局部更新畫面的**應用執行環境**——這正是 AJAX／Web 2.0 那幾年才落定的角色翻轉給的。舊世界裡「即時」根本無處安放。\n\n(c) **它自己額外解的**：前兩層給了你「一條可靠的長連線」和「一個能用它的瀏覽器」，但沒給你「**伺服器主動、即時地把狀態變化推給成千上萬個同時在線者**」這件事。HTTP 本身是無狀態請求／回應——客戶端問才答；你的系統要的是反過來、伺服器主動推、且要在 3,200 條並發連線間維持一致狀態（誰在哪個房間、誰該收到哪則訊息）。這得你自己搭：Redis Pub/Sub 在多台伺服器間廣播事件、處理連線狀態、重連風暴、backpressure。\n\n一句話：這套系統把「即時協調大量同時在線者」的複雜度，從**不存在於前兩層的真空**，搬到了**你的伺服器叢集與 Redis Pub/Sub** 裡。帳單是：你得替每一條長連線維護狀態、得讓多台無狀態 Web 伺服器在 Redis 這個共享真相源上協調、得在斷線重連時不被自己的重連風暴打垮——這些全是「軟體在伺服器、客戶端只是窗口、而我要為即時性與全員可用性負責」這個本章核心轉變的、最尖銳的帳單形態。\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. 本章撞的牆，跟 ch05（程式太大）、ch12（需求會變）撞的牆，性質有什麼不同？為什麼說「交付形態」這件事本身會是一道複雜度的牆？\n2. 封包交換相對於電路交換，把「可靠送達」這個複雜度從哪裡搬到了哪裡？TCP/IP 的 end-to-end 原則為什麼把「聰明」放在端點、把網路本身留笨？這跟你「在應用層處理冪等與重試」的直覺是什麼關係？\n3. HTTP 的「無狀態」是個設計決策。它讓什麼變可能（提示：水平擴展）？你把 session 外推到 Redis、靠每個請求自證身分，是在還這個 1989 年的基因的哪一筆？\n4. 1991 年 8 月與 1993 年 4 月 30 日，對 Web 來說各自是什麼日子？為什麼說軟體史的天平是被 1993 那天壓下去的、而不是 1991？\n5. 為什麼 Gopher 輸給 Web 的關鍵不是技術而是 1993 年的授權決定？「無人可擁有」和「現在免費」差在哪、為什麼前者才決定性？\n6. 「開放標準擊敗圍牆花園」與 ch14 的「開源擊敗私有軟體」，是同一個道理嗎？用「控制權的分配」這個框架講清楚它們的共同機制。\n7. 把交付形態的反轉講給另一個工程師聽：盒裝模型裡「可用性是誰的責任」、伺服器模型裡又變成誰的？為什麼說你的 on-call 排班表就是這次複雜度搬家的帳單？\n8. AJAX／Web 2.0 把瀏覽器從「文件檢視器」變成了「應用執行環境」——這一步為什麼是你那套 WebSocket 即時系統能存在的前提？在它之前，「即時」這個概念為什麼無處安放？\n\n## 延伸閱讀\n\n- **Vint Cerf & Bob Kahn, 〈A Protocol for Packet Network Intercommunication〉（IEEE Trans. Comm., 1974）**——TCP/IP 的原典。不必啃完數學，看它怎麼論證「讓底層網路保持笨、把互連智慧放到端點」這個 end-to-end 的核心決策——你「在應用層處理可靠性」的整套直覺，根就在這篇 1974 年的論文裡。\n- **Tim Berners-Lee, 〈Information Management: A Proposal〉（CERN, 1989）**——Web 的起點提案，CERN 有原件掃描檔。看它要解的痛（一個人員流動快的大機構，資訊散在不相容系統裡找不到東西）多麼具體、多麼不像「要發明改變世界的東西」——這提醒你重大躍遷往往始於一個樸素的本地問題。配 CERN「30 years of a free and open Web」一頁讀 1993-04-30 釋入公有領域的那段。\n- **W3C / CERN「The birth of the Web」（home.cern 的 birth-web 頁）**——CERN 官方的 Web 誕生時間軸，把 1989 提案、1991 公開、1993 公有領域三個日子分清楚的最可靠一手整理。本章最關鍵的「1991 ≠ 1993」就靠它釘死。\n- **Gopher 興衰的歷史整理（如 MinnPost「The rise and fall of the Gopher protocol」, 2016；及 abortretry.fail 的 Gopher 長文）**——把本章「開放標準擊敗圍牆花園」個案的另一半補齊：一個差點贏、卻被一個授權決定親手葬送的競爭者。讀「1993 年授權費」那段，你會對「無人可擁有」的決定性有體感。（歷史整理，非一手檔案，年份與流量數字屬估計。）\n- **Tim O'Reilly, 〈What Is Web 2.0〉（oreilly.com, 2005）**——「瀏覽器從文件檢視器變成應用平台」這波轉變的命名文。看它怎麼描述「Web as platform」——你今天視為理所當然的「在瀏覽器裡跑應用」這件事，在 2005 年還是個需要被命名、被論證的新觀念。\n- **Jesse James Garrett, 〈Ajax: A New Approach to Web Applications〉（adaptivepath.com, 2005-02）**——AJAX 一詞的出處短文，很短。看它怎麼描述「背景非同步交換資料、只更新局部」如何打破「一次一整頁」的舊模型——這是你的 WebSocket 即時系統那條「持續、細碎的伺服器對話」之路的起點。\n"}, {"id": "ch16-server-to-cloud", "file": "ch16-server-to-cloud.md", "group": "Part VI — 雲與分散式", "title": "ch16 — 從伺服器到雲：基礎設施變成程式碼", "md": "# ch16 — 從伺服器到雲：基礎設施變成程式碼\n\n> **本章解決什麼問題**：上一個 Part 的最後一跳，是軟體從「裝在使用者的機器」搬到「跑在我們的伺服器」（見 ch15）——但那些伺服器還是你的：你得買機器、進機房、接網路、半夜爬起來換壞掉的硬碟。這一章講下一跳：把**伺服器本身**也搬進別人的機房，變成一行 API 呼叫、按用量計費。這是 Part VI「雲與分散式」的第一章，撞的是新的一面牆——「擁有並維運機房」這個巨大複雜度該怎麼辦。雲的答案是**把它整包外包**；而 Infrastructure as Code 把外包來的東西重新拉回軟體工程的紀律：基礎設施從手動點擊變成版本控制下的程式碼。帳單在抽象洩漏時回來找你：冷啟動、網路分區、供應商鎖定、成本失控、以及「別人的電腦」那個揮之不去的信任問題。接著 ch17 把雲上的單體拆成微服務、用容器封裝，ch18 把維運本身也變成工程。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲 ◄你在這裡 ← ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n你進入 Part VI 了。前面十五章，複雜度一路從機器碼搬到語言、方法、資料、網路。接下來三章，它要搬到一個你最熟悉、卻可能從沒回頭想過它身世的地方——**別人的機房**。\n\n## 從你已知的出發\n\n打開你某個專案的 repo，裡面大概有一個 `infra/` 或 `cdk/` 目錄，或者一份 CloudFormation 的 YAML。那份檔案裡，你**宣告**了一整套基礎設施：一個 VPC、幾個 subnet、一個 ECS service 跑你的 NestJS 容器、一個 RDS 的 PostgreSQL 實例、一條 SQS queue、一個 ALB 在前面分流、幾條 IAM policy 把權限綁好。你 `git push`，CI 跑起來，幾分鐘後——一整座資料中心的縮影就在 AWS 某個 region 裡長出來了。你沒有打電話給任何人、沒有簽採購單、沒有走進任何一棟掛著「機房重地」牌子的房間、沒有碰過一條網路線。\n\n退一步看這件事有多荒謬。你剛剛用一份**文字檔**，調度了實體的伺服器、網路、儲存；而且這份文字檔在 Git 裡，可以 code review、可以 `git revert`、出事時可以 `git blame` 找出是哪次 commit 把 security group 開錯了。**你的基礎設施是程式碼。** 這句話今天聽起來像廢話，但它是這一章要拆開的整個世界觀——而它的歷史比你想的短得多，短到你職業生涯的長度就裝得下大半。
