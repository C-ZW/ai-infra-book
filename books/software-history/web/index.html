<script id="bookdata" type="application/json">{"chapters": [{"id": "ch01-fighting-complexity", "file": "ch01-fighting-complexity.md", "group": "Part I — 機器與第一層抽象", "title": "ch01 — 對抗複雜度：軟體史的一條主線", "md": "# ch01 — 對抗複雜度：軟體史的一條主線\n\n> **本章解決什麼問題**：這是序章，給你一副讀完整本書的眼鏡。軟體七十年史不是「某年某人發明某物」的編年帳，而是人類反覆撞上「複雜度」這堵牆、再反覆翻過去的故事——每次翻越，要嘛搬出一層新**抽象**，要嘛長出一套新**方法**。本章先把全書的三個工具（複雜度守恆、兩條 strand、鐘擺）與四條驗收主線交到你手上，並用你天天在用的 ORM 與你自己寫的 cache library 當顯微鏡，示範全書每章末「複雜度帳單」的記法。後面每一章都是這副眼鏡的一次實戰；ch02 才開始進歷史。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序) ◄你在這裡  ch04 Lisp vs Algol     ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n這張圖你會在每個 Part 的第一章再看到一次，箭頭走的方向就是本書的閱讀順序。現在你在最左上角。讀完全書再回頭看 ch21，每一格你都會走過一遍。\n\n## 從你已知的出發\n\n你帶過一個 greenfield 的 B2B/B2C 資料中介系統，跑在 AWS ECS 上，TypeScript＋NestJS。某天你發現團隊裡每個服務都在用各自的方式做 cache：有人 Redis 直接 `get`/`set`、有人在記憶體裡塞個 `Map`、有人乾脆在 service 方法裡硬寫一段 TTL 判斷。讀的人不知道哪層有沒有 cache，改的人不知道改了會不會炸到別人。於是你做了一件資深工程師會做的事——你寫了一個多層 cache library，把 L1（行程內記憶體）、L2（Redis）、回源（RDS）這三層包進一個統一介面，全團隊採用。從那天起，呼叫端只要寫 `cache.get(key, loaderFn)`，剩下的它不用想。\n\n你做的這件事，有一個名字。你把「快取的複雜度」搬到了一個抽象後面，讓別人不用想。這正是這本書要講的事——只是規模是七十年、是整個產業。\n\n但你也記得帳單怎麼回來的。某次促銷，一筆資料在 L1 過期了、L2 沒過期，兩個 pod 讀到不同版本，客戶看到忽高忽低的庫存數字。你花了一個下午盯 log，才意識到問題不在哪個 service 的程式碼裡——問題在你那個「讓人不用想」的抽象的縫裡。cache invalidation（快取失效）一向被列為電腦科學最難的事之一；這句話的出處與確切年代其實沒有一手記載，一般歸給 Phil Karlton（Martin Fowler 等人也採這個歸屬），完整的玩笑版是「電腦科學只有兩件難事：cache invalidation 和命名」。你那個下午，就是在還這筆帳。\n\n把這件事放大七十年，你就得到了這本書。每一次有人發明一層新抽象——編譯器、garbage collection、關聯式資料庫、雲、容器——都是在做你做過的事：把一塊複雜度搬到別人看不見的地方，讓上面的人不用想。而每一次，帳單都在抽象洩漏的時候回來找人。你不是在學一段陌生的歷史，你是在看你每天做的事的七十年版本。\n\n## 第一個工具：複雜度守恆\n\n先把本書最核心的一句話講清楚，因為後面二十章都在驗證它：\n\n**抽象不消滅複雜度，它只是把複雜度搬家。**\n\n這句話聽起來像廢話，但它推翻了一個很多人沒意識到自己抱著的假設——我們以為「好的抽象讓事情變簡單」。不對。好的抽象讓**你面前**的事情變簡單——而且是真的變簡單，這就是進步，是我們今天能蓋出比七十年前龐大數萬倍的系統的原因。但「你面前變簡單」是有代價的：複雜度被移到了別處——移到編譯器裡、移到 runtime 裡、移到資料庫引擎裡、移到雲廠商的機房裡、移到另一個團隊的待命名單裡。**對你這一層消失，不等於從這個世界消失**——它換了地址，而且常常在搬家途中，於新的接縫上又長出一塊新的。\n\n我用「守恆」這個物理詞，是借它的神髓、不是它的字面：不是宣稱複雜度像能量那樣總量精確不變（它不是物理量，沒有守恆方程式），而是借它提醒你一件反直覺的事——**你按一個按鈕讓麻煩消失時，麻煩多半沒被真的消滅，只是搬到了你看不見的地方，並在那裡留下一張將來會回來找你的帳單。** 守恆在這裡是一副眼鏡、一個預設懷疑，不是一條定律（這個分寸 ch19 會再校準一次）。軟體的複雜度大致這樣運作。你寫 `cache.get(key, loaderFn)` 的時候，「怎麼判斷該不該回源」這塊複雜度沒有消失，它變成了你 library 內部的失效邏輯、TTL 策略、序列化規則。你只是把它從**每個呼叫端**搬到了**一個地方**——這通常是好交易，但它是搬家，不是消滅。\n\n而搬家有一個你必須記住的副作用：**帳單會在抽象洩漏的時候回來。** 你的 cache library 平常很乖，直到 L1/L2 不一致那天，底層的「兩台機器、兩份狀態、沒有強一致」這個事實，從你那層光滑的介面底下漏了上來。這不是 bug，這是**所有非平凡抽象的本性**——這條定律有人正式寫下來過（Joel Spolsky，2002，「所有非平凡的抽象在某種程度上都會洩漏」），我們留到 ch19 細談，這裡你只要先記住：洩漏不是抽象做壞了，洩漏是抽象的稅。\n\n所以本書每一章的末尾，都有一個固定的段落叫 **`## 複雜度搬去哪了`**。它逼我們對每一次歷史躍遷結一筆帳：這一跳**消滅了什麼負擔、又製造了什麼新負擔、新抽象在什麼情況下會洩漏**。這些帳一筆一筆累積起來，就是 ch21 的總帳——你會親眼看到「守恆」不是一個比喻，而是反覆出現的事實。\n\n## 第二個工具：兩條 strand\n\n如果複雜度守恆是「會發生什麼」，那兩條 strand 是「用什麼翻牆」。\n\n人類對抗軟體複雜度，歷史上只用過兩種武器，而且全程交織使用。我把它們叫做兩條 strand（線股）：\n\n- **抽象 strand——「我們用什麼蓋」**：換一層更高的東西來表達同一件事，把低層細節外包出去。機器碼 → 組語 → 高階語言 → 結構/模組 → 物件/型別/函數 → 關聯資料 → 網路服務 → 雲 → 容器 → AI 輔助。每一跳都是「不再直接對更低的那層說話」。\n- **方法 strand——「我們怎麼蓋」**：不換工具，換**蓋的方式**——換紀律、換流程、換組織協作的規則。個人手藝 → 軟體危機的自覺 → 結構化紀律 → 人月神話的人性洞察 → 重量級流程（瀑布/CMM）→ 敏捷反叛 → DevOps 融合開發與維運 → SRE 把可靠度工程化 → 平台工程治微服務複雜度。\n\n關鍵不在於分清楚哪件事屬於哪條 strand，而在於看清——**這兩條從來不是分開走的，它們反覆互相觸發。**\n\n```text\n抽象 strand（用什麼蓋）：機器碼 → 組語 → 高階語言 → 結構化 → 物件/函數 → 雲 → 容器\n                                          │            │\n                                          │            │   兩條反覆互相觸發\n                                          │            │   （結構化編程既是\n                                          │            │    語言事件也是方法事件）\n方法 strand（怎麼蓋）：手藝 → 危機自覺 → 結構化紀律 → 人月神話 → 敏捷 → DevOps → SRE\n```\n\n舉個你會在 ch05 看到的例子先嚐味道：1960 年代末，程式大到一個人腦裝不下，於是有了「結構化編程」。這同時是一個**語言事件**（語言該提供哪些控制結構、該不該有 GOTO）和一個**方法事件**（寫程式該守哪些紀律、怎麼讓人腦追得上控制流）。你沒辦法說它「屬於」抽象還是方法——它是同一場對抗複雜度的戰爭的兩面，一面逼出另一面。\n\n這對你不抽象。你做 code review 時要求別人早 return、別寫巢狀地獄、控制圈複雜度別爆——這是**方法**。你的 lint 規則 `max-depth`、`complexity` 把這套紀律自動化——這是**抽象**（把判斷外包給工具）。同一個目標（讓控制流人腦追得上），兩條 strand 同時在動。你已經天天在交織使用它們，只是沒這樣命名過。\n\n讀這本書的時候，每遇到一個躍遷，你可以問自己：這一跳主要是哪條 strand 在主導？它有沒有觸發另一條？這是本書要你練的第一個動作。\n\n## 第三個工具：鐘擺\n\n第三個工具不解釋「翻牆」，它解釋「為什麼我們好像一直在繞圈」。\n\n你做這行夠久了，大概有過這種感覺：某個「新趨勢」聽起來莫名眼熟。微服務喊了幾年，最近又有人在認真討論「回到單體」（modular monolith）；serverless 把運算切到最碎，然後大家開始抱怨冷啟動、開始把函式合併回去。不是你的錯覺。軟體史上有幾組張力，**反覆來回擺盪**，我把它叫做鐘擺。我認為這是全書最被低估的觀察：很多「革命」其實是上一輪的回擺。\n\n四組主要的鐘擺，你全都親身待過某一邊：\n\n| 鐘擺 | 一端 | 另一端 | 你的親身座標 |\n|---|---|---|---|\n| 效能 ↔ 生產力 | 手寫 C 榨乾每個 cycle | NestJS/TypeScript 換開發速度 | 你選框架而非手刻，就是在這條上選邊 |\n| 集中 ↔ 分散 | 一台大主機包辦 | 拆成很多小服務/節點 | 你的微服務 vs 有人開始談回到單體 |\n| 單體 ↔ 分散式 | 一個 process 內的函式呼叫 | 跨網路的服務呼叫 | 你付的「網路、一致性、可觀測性」三筆稅 |\n| 手工 ↔ 自動 | 手動點 console 開機器 | CloudFormation 一鍵起基礎設施 | 你寫 IaC，就是把手工搬到自動這一端 |\n\n鐘擺的重點不是「歷史在重複」這種廉價的犬儒。重點是：**每次回擺都帶著上一輪的教訓。** 今天有人談「回到單體」，他談的不是 2005 年那種什麼都塞一起的大泥球，而是「學過微服務的痛之後、刻意保留模組邊界的單體」。鐘擺不是圓，是螺旋——擺回同一側，但高了一層。\n\n見過鐘擺擺過幾輪的人，有一個別人沒有的能力：他不會把每個新詞都當革命，也不會把每個舊東西都當過時。他會問——這次往哪邊擺？帶著上輪什麼教訓？這是這本書想給你的歷史縱深。我們不預言鐘擺下次擺去哪（那是算命），但讀完你會有一套判斷它的框架。\n\n## 全書縮影：ORM 這個你每天用的例子\n\n工具講完了，拿一個你天天用的東西當縮影，把三個工具一次跑一遍。ORM 是最好的標本，因為它把整本書的劇情濃縮在一個你閉著眼睛都會用的工具裡。\n\n**它在解什麼複雜度？** 你的物件世界（TypeScript 的 class、巢狀的關聯、繼承）和關聯式資料庫的世界（扁平的 table、外鍵、JOIN）是兩套不相容的模型——這個落差有個正式名字叫 object-relational impedance mismatch（物件關聯阻抗不匹配）。沒有 ORM 的時候，你得在每個 query 點手寫 SQL、手動把 row 組裝回物件、手動處理關聯的載入。ORM 用一層抽象把這塊複雜度包起來：你操作物件，它幫你生 SQL。\n\n**複雜度搬去哪了？** 沒消失。它搬進了 ORM 框架的內部——查詢產生器、關聯映射、lazy/eager loading 策略、identity map。你不用寫 SQL 了，但「物件圖怎麼對應到關聯查詢」這塊複雜度，只是從**你的程式碼**搬到了**框架的程式碼**。這是好交易嗎？多數時候是。是消滅嗎？不是。經典的 object-relational impedance mismatch 沒有被消滅，只是被抽象藏起來了。\n\n**帳單什麼時候回來？** 你太知道了——N+1 query。你寫一個看起來人畜無害的迴圈，跑 100 筆訂單、每筆讀一次客戶，ORM 在你背後默默發了 101 條 SQL。RDS CPU 上去了。這一刻，底層的「物件導覽 ≠ 關聯查詢」這個事實，從 ORM 那層光滑的介面底下漏了上來。你被迫打開 query log、看它到底生了什麼 SQL、加 eager loading 或手寫一條 JOIN——你被迫回到你以為被抽象掉的那一層。\n\n這就是整本書。一個抽象(ORM)→ 解一塊複雜度(impedance mismatch)→ 把複雜度搬家（進框架）→ 帳單在洩漏時回來(N+1)→ 你得能跳到底層（讀 SQL）。關聯模型本身的故事在 ch13（Codd 怎麼把「怎麼存取」的複雜度搬給引擎），抽象洩漏的完整理論在 ch19——這裡先不展開，你只要看清：**這個你每天用的工具，就是複雜度守恆的一次完整演出。**\n\n## 個案：把你的 cache library 攤在顯微鏡下\n\n現在做一次完整的「複雜度帳單」示範，用的不是歷史人物，是你自己寫的那個 cache library。這就是本書每章末 `## 複雜度搬去哪了` 段落的記法——你看完這個，後面二十章的帳單你都讀得懂、也記得出來。\n\n先講清楚它**消滅了什麼負擔**。在你寫這個 library 之前，團隊的痛是真實的：每個 service 各搞各的 cache，呼叫端要自己判斷該不該回源、自己處理序列化、自己記 TTL；沒有人知道一條讀路徑上到底有幾層 cache；改一個 cache 策略要去 N 個地方改。你的 library 把這些**收斂到一個地方**。我們把帳記下來：\n\n| 項目 | 內容 |\n|---|---|\n| **消滅的負擔** | ① 呼叫端不再各寫各的 cache 邏輯（收斂到一個介面）② 不用手動判斷該不該回源（loaderFn 模式包掉）③ 不用各自處理序列化/TTL ④ 改策略只改一個地方 |\n| **製造的新負擔** | ① **失效**：多了 invalidation 的責任——誰在資料變更時通知 cache？漏一個寫入點就是髒資料 ② **一致性**：L1（行程內）在多個 pod 間天然不一致，L1/L2 之間也可能不同步 ③ **debug 變難**：多了一層，出問題時要先排除「是不是 cache 給了舊值」，問題現場從「我的 service」變成「我的 service ＋ 你的 library 的縫」 ④ **新的失敗模式**：cache stampede（同 key 同時過期、大量請求一起回源打爆 RDS）、序列化版本不相容 |\n| **它在哪洩漏** | 當底層的「這是兩台機器、兩份狀態、沒有強一致」這個事實，從統一介面底下漏上來時——典型現場：L1 過期但 L2 沒過期、兩個 pod 讀到不同版本、客戶看到忽高忽低的數字 |\n| **這一跳的帳單** | 你用「一處集中的失效/一致性複雜度」換掉了「N 處分散的 cache 樣板」。多數時候划算，但失效這塊複雜度搬不掉、只能搬家；它從每個呼叫端，搬到了你和你的 on-call 待命名單上 |\n\n最後一行是重點，也是本書的縮影：**你沒有消滅 cache 的複雜度，你把它搬到了自己頭上。** 全團隊不用想 cache 了，代價是你成了那個半夜被 invalidation bug 叫起來的人。這不是設計失誤，這是抽象的本性——複雜度守恆。一個好的抽象設計者，清楚自己是在做一筆交易，而不是在施一個消滅複雜度的魔法。\n\n注意這張帳單的形狀：**消滅了什麼 / 製造了什麼 / 在哪洩漏 / 帳單一句話**。後面每一章末尾都長這樣。ch02 的儲存程式、ch07 的物件導向、ch16 的雲、ch20 的 AI 輔助編程——全都會用這個格式結帳。你現在學會的不是一個 cache 的個案，是讀這整本書的記帳法。\n\n## 四條驗收主線：讀完你該能交出什麼\n\n本書不考你年份。它考你**能不能把因果講給另一個工程師聽**。整本書收在 ch21，而 ch21 的口試只有四題，對應四條貫穿全書的主線。現在先把它們亮出來，讓你帶著問題讀——每讀一章，就往這四條線上各掛一筆證據：\n\n1. **守恆**：你能不能對任何一次歷史躍遷，結出一筆「消滅了什麼 / 製造了什麼 / 在哪洩漏」的帳？（每章 `## 複雜度搬去哪了` 在練這個。）\n2. **交織**：你能不能指出某個事件同時是抽象事件和方法事件，並說清楚一條 strand 怎麼觸發另一條？（結構化編程、微服務都是現成的交織點。）\n3. **鐘擺**：你能不能拿全書累積的證據，說出某一組張力歷史上擺過哪幾輪、每輪帶著上輪什麼教訓？（效能↔生產力從 ch03 的 FORTRAN 賭注就開始擺。）\n4. **永恆真話**：你能不能解釋，為什麼 Brooks（沒有銀彈）、Conway（組織形狀=系統形狀）、Dijkstra（測試只能證明 bug 存在）這些四十年前的話，今天還準？（提示：因為它們講的是人與複雜度的關係，不是某個會過時的技術。）\n\n這四條就是這本書的驗收標準。如果讀完你能對另一個資深工程師，用自己的話把這四題各講三五分鐘、講到他點頭——這本書對你就成立了。如果講不出來，那是還沒讀懂，不是記性不好。\n\n## 複雜度搬去哪了\n\n序章自己也要結一筆帳——只是這一章搬的不是某個技術的複雜度，是**你讀這段歷史的複雜度**。\n\n| 項目 | 內容 |\n|---|---|\n| **消滅的負擔** | 把「軟體史」從一串需要死背的人名與年份（編年帳），換成三個可重複套用的分析工具（守恆、strand、鐘擺）。你不再需要記住「誰在哪年發明什麼」，只需要對每個躍遷問同樣三個問題 |\n| **製造的新負擔** | 這副眼鏡會逼你做功課——每讀一章都要主動結帳、找交織點、定位鐘擺，比被動讀故事累。而且工具是有觀點的：把歷史套進「守恆/strand/鐘擺」的框架，本身是一種簡化，可能讓你忽略框架照不到的細節 |\n| **它在哪洩漏** | 當某段歷史不乾淨地落進三個工具裡時（有些事件就是混亂、偶然、人事鬥爭的產物，沒有漂亮的複雜度邏輯）——這時要誠實承認框架的邊界，而不是硬把史實掰彎來遷就工具 |\n| **這一跳的帳單** | 你用「主動思考的負擔」換掉了「死背的負擔」。這是本書下的賭注：給你三個工具，比給你一堆事實更耐用——因為工具能套到還沒發生的躍遷上（比如 ch20 的 AI 輔助編程，和你明天會遇到的下一個新框架） |\n\n注意：序章**故意不給任何結論**。複雜度守恆到底成不成立、四十年前的話為什麼還準，這些判斷留到 ch21，讓你帶著一路累積的證據自己驗收。現在你手上只有工具和問題，沒有答案——這是設計，不是偷懶。\n\n## 紙上推演\n\n這是純敘事書，沒有可跑的 lab。下面的題目是「口頭重講」「翻譯」「對帳」式的思辨，做完你才真的握住了這三個工具。每題標了預估時間與難度。先自己想，再看解答。\n\n### 推演 1 — 拆解你維運過的一個抽象 **[20 分鐘] ★★**\n\n從你維運過的東西裡挑一個抽象（ORM、message queue、K8s 三選一，或自選），照本章 cache library 那張帳單的格式，結一筆完整的帳：它消滅了什麼負擔、製造了什麼新負擔、在哪洩漏、一句話帳單。要寫到具體——不要寫「它讓事情變簡單」，要寫「它把 X 從 A 搬到了 B」。\n\n#### 推演解答\n\n以 message queue（你熟的 SQS）為例，一份合格的帳單長這樣：\n\n- **消滅的負擔**：生產者和消費者解耦——生產者不用知道誰在消費、消費者不在線時訊息不丟、流量尖峰被 queue 吸收（你不用為了瞬間峰值 over-provision 消費端）。\n- **製造的新負擔**：① **至少一次投遞**意味著重複，你被迫做冪等消費者（你確實做了）② 訊息順序不再保證（FIFO queue 有代價、有 throughput 上限）③ 多了一個要監控的東西（queue depth、DLQ、消費延遲）④ debug 變成分散式問題——一筆業務失敗，現場橫跨生產者、queue、消費者三處。\n- **它在哪洩漏**：當你需要「剛好一次」「嚴格全域順序」「即時回應」時——queue 的非同步、最終一致本性就漏上來，你得在應用層自己補（去重表、版本號、最終一致性對帳）。\n- **帳單一句話**：你用「冪等 + 最終一致性的複雜度」換掉了「生產者與消費者必須同時在線且同速」的耦合。複雜度沒消失，從「同步協調」搬到了「非同步去重」。\n\n關鍵不在你選哪個抽象，而在你能不能把「搬家」這個動作寫具體——從哪裡搬到哪裡。寫不出「從 A 到 B」，就還沒看懂守恆。\n\n### 推演 2 — 用親身經歷餵養四組鐘擺 **[15 分鐘] ★**\n\n本章的鐘擺表給了四組張力。請你不要抄表，而是各舉一個**你自己親身經歷過**的例子，並標出你當時待在哪一邊、為什麼選那邊。\n\n#### 推演解答\n\n沒有標準答案，但合格的回答要能說出「取捨」，不能只說「我用了 X」。示範：\n\n- **效能↔生產力**：「我選 NestJS 而不是手刻 HTTP server，因為團隊交付速度比那幾毫秒值錢——直到某條熱路徑成為瓶頸，我才針對那一條手動最佳化（招牌那次尖峰 RDS CPU 降 40%，就是在生產力的預設上、對 3% 的關鍵路徑做效能例外）。」這個回答的好，在於它呼應了 Knuth 那句被斷章取義的話的原意——97% 的時候別過早最佳化，但要抓住關鍵 3% 的機會（完整脈絡見 ch19）。\n- **集中↔分散**：「我把單體拆成微服務（分散），因為團隊在單體上互相踩腳；但我最近會質疑某幾個過度切分的服務，它們的網路與一致性成本超過了自治的收益。」\n- **單體↔分散式**：能說出你付的三筆稅（網路延遲、分散式一致性、可觀測性變難）就及格。\n- **手工↔自動**：「我把手動開 ECS 服務換成 CloudFormation——可重現、可審查、可回溯，代價是多了一層 IaC 要學、要維護，而且 IaC 自己也會洩漏（stack drift、circular dependency）。」\n\n能講出每組的「我選這邊，放棄了什麼」，你就握住鐘擺了。只會說「我用了微服務」是沒握住。\n\n### 推演 3 — 把「抽象只是搬家」講給一個資淺工程師聽 **[15 分鐘] ★★**\n\n一個剛進來的工程師說：「我們用了 ORM，SQL 的複雜度就不用管了。」請你用兩三句話，在不打擊他的前提下，把「抽象不消滅複雜度、只是搬家」這件事講到他懂——而且要用一個他能立刻驗證的具體現象。\n\n#### 推演解答\n\n一個好的回答長這樣：「ORM 沒有讓 SQL 的複雜度消失，它把它搬進了框架裡——平常框架幫你扛，所以你感覺不到。但它沒消失。你跑一個讀 100 筆訂單、每筆又讀客戶的迴圈試試，打開 query log，你會看到它默默發了 101 條 SQL——這就是 N+1。那一刻，被搬走的 SQL 複雜度漏回來了，你還是得懂底層在生什麼 query。ORM 是好工具，但它是把複雜度搬家、不是消滅；你值錢的地方，正是在它漏的時候能跳下去看 SQL。」\n\n這個回答的三個要件：① 點明「搬家不是消滅」② 給一個他能**立刻自己重現**的現象(N+1)③ 把它接回「為什麼你還是得懂底層」——不是要他放棄抽象，是要他知道抽象的稅長什麼樣。能做到這三點，你不只懂了守恆，你還能**傳**它——這正是本書最終要你達到的：用自己的話把因果講清楚。\n\n## 自我檢核\n\n口頭自答。講得出來才算過——講不清楚就是還沒懂，回去重讀對應段落。\n\n1. 「複雜度守恆」這句話到底在主張什麼？它推翻了哪個我們平常沒意識到自己抱著的假設？\n2. 為什麼說「抽象洩漏」不是抽象做壞了、而是抽象的稅？用你的 cache library 或 ORM 的 N+1 舉一個例子。\n3. 兩條 strand 各是什麼？為什麼說它們「從來不是分開走的」？舉一個你日常工作裡兩條 strand 同時在動的場景。\n4. 鐘擺和「歷史在重複」這種犬儒說法差在哪？「螺旋而非圓」是什麼意思？\n5. 拿你自己維運過的任一抽象，當場結一筆「消滅了什麼 / 製造了什麼 / 在哪洩漏」的帳。\n6. 本書的四條驗收主線是哪四條？為什麼說它考的是「能不能把因果講給人聽」而不是「記不記得年份」？\n7. 為什麼序章故意不給任何結論？如果現在就告訴你「複雜度守恆成立」，你會少掉什麼？\n\n## 延伸閱讀\n\n- **Joel Spolsky，《The Law of Leaky Abstractions》（2002）** — joelonsoftware.com 上的原文。本章「帳單在洩漏時回來」的源頭，全文短、結論一句話（所有非平凡抽象都會洩漏）；先讀它，ch19 會把這條定律接回全書每一筆帳。\n- **Phil Karlton 的「兩件難事」與 Martin Fowler 的考據(martinfowler.com/bliki/TwoHardThings.html)** — Fowler 整理了這句名言的歸屬與「找不到一手出處」的來龍去脈。讀它一方面知道 cache invalidation 為何被列為難事，一方面學一個態度：連一句業界人人會背的話，認真考據起來都站不太穩——這正是本書對待「大家都這麼說」的標準。\n- **本書 ch21（複雜度守恆：總收官）** — 如果你想先看這趟旅程的終點長怎樣，可以翻到最後一章的四條口試主線；但建議讀完全書再去，那時每一格地圖你都走過了，口試才驗收得出東西。\n- **（進階，選讀）object-relational impedance mismatch 的爭論** — 網路上有「根本沒有所謂阻抗不匹配」的反方長文（如 jOOQ 部落格）。讀正反兩面，你會更清楚 ORM 這個全書縮影到底搬走了什麼、又把什麼留在了縫裡——這對你日後設計任何抽象都有用。\n"}, {"id": "ch02-stored-program", "file": "ch02-stored-program.md", "group": "Part I — 機器與第一層抽象", "title": "ch02 — 儲存程式：當程式變成資料", "md": "# ch02 — 儲存程式：當程式變成資料\n\n> **本章解決什麼問題**：在「對抗複雜度」這張地圖上，這是第一塊地基。機器只懂 0 與 1，而人類想表達的東西無限複雜——這條鴻溝就是全書的引擎（見 ch01）。本章要回答：在抽象 strand 動工之前，最底層那一跳是怎麼跳的。答案是「儲存程式」：程式從「你得親手接的線」變成「一段可以被載入、被搬動、甚至被另一段程式產生的資料」。這一跳本身不消滅任何複雜度，但它打開了門——沒有「程式即資料」這個前提，後面 ch03 的編譯器、ch04 的直譯器、乃至你今天的 codegen 與 container image，全都不可能存在。這是抽象 strand 的起跑線。\n\n## 從你已知的出發\n\n先看一件你天天做、但大概從沒停下來想過的事。\n\n你 `docker build` 出一個 image，推到 registry。那個 image 此刻是什麼？它是一坨資料——分層的 tarball，躺在 S3 後面的某個 blob store 裡，跟一張 JPEG、一份 PDF 在儲存層眼中沒有本質差別。你可以 `pull` 它、`cp` 它、用內容雜湊（content hash）定址它、把它當成 artifact 在 CI 之間傳來傳去。它完全是被動的、可操作的資料。\n\n然後你 `docker run`。同一坨資料被載入、被作業系統當成指令來執行——這一刻，它才從「資料」變成「程式」。\n\n你大概覺得這理所當然到不值一提。但這個「同一個東西，靜止時是資料、被載入後是程式」的二象性，正是 1945 年人類花了好幾年、吵了好幾十年功勞、才確立下來的觀念。在它之前，「程式」不是一坨可以搬來搬去的資料——它是機器的**物理狀態**，是你用幾千條跳線在插板上接出來的接線圖。換一個程式，意思是換一張接線圖，得有人花好幾天，拿著電線爬上爬下重接。\n\n你還做了別的事，全都站在這個前提上：\n\n- 你用 OpenAPI schema 跑 `openapi-generator`，**用一個程式產生另一個程式**（client SDK）。產生出來的 TypeScript 對 generator 而言只是輸出資料——字串而已；對你的 build 而言它才是會被編譯執行的程式。\n- 你寫過會自己改自己的部署腳本、會生成 CloudFormation 的腳本——程式吐出程式。\n- 你的 `tsc` 把 TypeScript 當輸入資料、吐出 JavaScript 當輸出資料，而那份 JavaScript 待會兒會被 V8 當程式跑（這條線 ch03 接）。\n\n這些全都依賴一個前提：**程式跟它處理的資料，是同一種東西，活在同一個記憶體裡，可以被彼此操作。** 這個前提有個名字，叫「儲存程式」（stored-program），它是軟體史第一次真正的躍遷。這一章講它從哪來、為什麼是躍遷、以及那段歷史裡哪些「大家都這麼說」的故事其實要打折扣。\n\n## 在儲存程式之前：程式是你接出來的線\n\n要看懂這一跳省掉了什麼，得先看清楚跳之前有多痛。我們從一台真正存在、真正運轉過的機器看起：ENIAC。\n\nENIAC（Electronic Numerical Integrator and Computer）在 Moore School（賓州大學）由 J. Presper Eckert 與 John Mauchly 領銜建造，1945 年 12 月 10 日跑出第一道題（一道來自 Los Alamos、與氫彈相關的計算），1946 年 2 月 15 日對外公開揭露。它是一頭巨獸：上萬個真空管、佔滿一整個房間。它快——以當年標準是飛快——但它有個今天聽來不可思議的限制：**它不「儲存」程式。**\n\nENIAC 怎麼「編程」？你不是寫一段碼載進去。你是拿著纜線跟插頭，在插板（plugboard）上把運算單元一個一個接起來，再加上幾千個十段位的旋鈕開關（switch）要逐一撥到對的位置。整台機器的「程式」，就是它此刻的物理接線狀態本身。當年根本還沒有「program」這個動詞——他們叫這件事「setting up」（設定），就像你設定一台機器去做某件事。\n\n這帶來一個關鍵後果，請把它記牢，因為整章的對比都繞著它轉：\n\n**ENIAC 換一道新題目，要重接幾千條線。** 為一道問題的每一條指令插好對應的線、撥好開關，要好幾天；接完還要再花更多天去檢查哪裡接錯。實務上，一台機器設定好一道題就跑上好一陣子，改題（changeover）大約每隔幾週才會發生一次。\n\n這活兒誰幹的？六位女性程式設計師，後世稱 ENIAC Six：Kathleen McNulty、Frances \"Betty\" Snyder Holberton、Marlyn Wescoff Meltzer、Frances Bilas Spence、Ruth Lichterman Teitelbaum、Jean Jennings Bartik。當年沒有程式設計手冊、沒有課可上——機器的 40 個面板都還在組裝、真空管技術都還沒穩定——她們是直接讀機器的邏輯與電路方塊圖，自己摸索出 ENIAC 怎麼運作、再想出怎麼「設定」它。1946 年公開展示時，她們沒有被介紹，名字被忽略了好幾十年。這是軟體史裡一筆值得記住的帳，不是因為要政治正確，而是因為——**「寫程式」這件事從第一天起就是一門獨立於造硬體的、被低估的手藝。** 這個低估會反覆出現（見 ch10）。\n\n把這個畫面釘在腦子裡：在儲存程式之前，「程式」＝「機器的接線狀態」。它不是可以存檔的東西，不是可以複製的東西，不是可以被另一個程式讀寫的東西。它是物理現實。改程式＝改物理。\n\n```text\n儲存程式之前（ENIAC 模式）\n┌──────────────┐        ┌──────────────┐\n│  新題目 A    │        │  新題目 B    │\n└──────┬───────┘        └──────┬───────┘\n       │                       │\n   重接幾千條線            重接幾千條線\n   撥幾千個開關            撥幾千個開關\n   （數天 + 數天檢查）      （數天 + 數天檢查）\n       │                       │\n       ▼                       ▼\n   機器物理狀態 = 程式 A    機器物理狀態 = 程式 B\n```\n\n## 兩條更早的伏筆：Babbage／Lovelace 與 Turing\n\nENIAC 是「真機器、笨方法」。但在它之前一百年與十年，有兩條概念上的伏筆，得擺正——因為這兩段是「大家最常記錯」的熱區。\n\n### Babbage 的分析機與 Lovelace 的 Note G\n\nCharles Babbage 在 1821 年構思差分機（Difference Engine），1837 年起描述更野心的分析機（Analytical Engine）——一台用齒輪、可程式化的通用計算機器，有相當於「處理器」與「記憶體」的分工，靠打孔卡（借自 Jacquard 織布機）輸入。它從未被完整建成；它是一套**設計**，不是一台機器。這點要先講清楚。\n\nAda Lovelace（愛達·勒芙蕾絲）在 1843 年，為義大利人 Menabrea 描述分析機的法文講稿做英譯時，附上了她自己的一系列註記 Notes A–G。其中 **Note G** 給出了一套計算 Bernoulli 數的詳細步驟。這套步驟，是「Lovelace 是第一位程式設計師」這個流行標籤的全部根據。\n\n這個標籤要打幾個但書，請照下面這個誠實版本講，別跟著流行版走：\n\n- **「程式設計師」這個詞，在 1843 年根本不存在。** 「to program」當作「為計算機器編寫指令」的動詞用法，是將近一個世紀後（大致到二戰、ENIAC 那個年代）才出現的。Lovelace 自己描述分析機的說法是它「編織代數的花樣，就像 Jacquard 織布機織出花葉」——詩意、精準，但不是「我在寫程式」。用「程式設計師」這個現代詞去套一個 1843 年的人，本身就是時代錯置（anachronism）。\n- **Note G 嚴格說更像「執行軌跡」（trace）而非現代意義的「程式」。** 它是一張把每一步運算列出來的表，記錄機器執行時會發生什麼，而不是一段可被機器讀取、載入、執行的指令序列。\n- **歸屬本身有爭議。** Babbage 自己在通信裡提到，Bernoulli 數那部分的代數推演是他先做了、為了替她省麻煩。而歷史學家如 Allan Bromley 指出，Babbage 在 1837–1840 年間就準備了數十個示範程式（雖然從未發表、也比較簡單），時間上早於 Lovelace 的 Notes。\n\n那麼公平的講法是什麼？**「Lovelace 常被譽為第一位程式設計師」**——注意「常被譽為」這四個字。Note G 一般被認為是「最早專為一台計算機器寫出的演算法」之一，這個成就是真實的、值得記住的；近年研究她與 De Morgan 的數學通信，也支持 Bernoulli 演算法那套逐步方法確實出自她手。但「**第一位**程式設計師」是一個有爭議的後世標籤，不是一個可以拍板的史實。本書的立場：把功勞給足，把但書講清，不選邊站當定論。\n\n> 順帶一提：這整段「她到底算不算第一位」的爭論，在電腦史學界本身就是一個小小的專門領域。一個有趣的提醒——**「誰第一個發明了 X」幾乎永遠比教科書講的複雜。** 這個教訓你會在這本書裡一再遇到（Hopper 的「第一個編譯器」見 ch03、Royce 的「瀑布之父」見 ch11，全是同一種被簡化的歸屬）。\n\n### Turing 1936：一台不是機器的「機器」\n\n第二條伏筆是純理論的。Alan Turing（圖靈）1936 年的論文，題目要寫全：**《On Computable Numbers, with an Application to the Entscheidungsproblem》**（論可計算數，及其在判定問題上的應用）。投稿於 1936 年 5 月 28 日，分兩部刊在《Proceedings of the London Mathematical Society》——正式卷期常被標成 1937，但投稿與主要發表都在 1936，所以引用寫「1936」最常見也可接受。\n\n這篇論文常被通俗化成「圖靈發明了圖靈機」。這裡有兩個要擺正的點：\n\n第一，**圖靈機不是一台機器。** 它是一個思想實驗——一條無限長的紙帶、一個讀寫頭、一張狀態轉移表，用來「定義」什麼叫「可被機械化計算」。圖靈用它來回答一個純數學問題（Hilbert 的判定問題：有沒有一套機械程序能判定任意數學命題真假？答案是沒有）。他不是在設計一台要造出來的電腦。如果有人跟你說「圖靈造了第一台電腦」，那是把思想實驗誤當成工程。（圖靈機的數學細節——停機問題、可計算性的邊界——本書不展開，留給延伸閱讀。）\n\n第二，而這正是它跟本章的連結：圖靈在論文裡描述了一台**通用圖靈機**（Universal Turing Machine）。它的妙處在於——它能讀一條紙帶，紙帶上**同時寫著「要模擬哪一台機器的描述」與「那台機器的輸入」**。換句話說，圖靈在 1936 年就在理論層面做了一件事：**把「程式」（一台機器的描述）寫成「資料」（紙帶上的符號），跟輸入放在同一條帶子上。** 這就是「程式即資料」最早的、純抽象的版本。\n\n圖靈與 von Neumann 在 1936–1938 年都在普林斯頓，彼此認識。後來一些以圖靈為中心的史家主張，正是圖靈這個「把指令跟資料放進同一個記憶體」的洞見，深刻影響了 von Neumann 對 EDVAC 的構想。這個影響鏈很誘人，但要 hedge：**它是被主張的、不是被公認蓋章的**，因為儲存程式概念的功勞歸屬本身就是一團爭議（下一節就會看到）。你只要記住一件不爭的事：**1936 年的紙上，「程式即資料」已經以理論形式存在了；剩下的問題是怎麼把它變成電子電路。**\n\n## 那一跳：EDVAC 報告與「程式放進記憶體」\n\n把理論變成工程藍圖的，是 1945 年那份文件——以及它惹出的、吵了四十年的功勞官司。\n\n1945 年 6 月 30 日，一份 101 頁、未完成的草稿由 Herman Goldstine 分發出去，標題是 **《First Draft of a Report on the EDVAC》**（EDVAC 報告初稿）。EDVAC 是 ENIAC 的後繼機規劃。這份報告第一次系統性地描述了我們今天叫「von Neumann 架構」的東西：一個統一的記憶體，**指令與資料放在一起**；一個處理單元從記憶體取指令、執行、再取下一條。這就是儲存程式的工程藍圖。\n\n但這份文件是軟體史最有名的功勞糾紛之一，談它必須帶上爭議，否則就是傳播一個被簡化的版本：\n\n- **這份草稿封面只署了一個名字：John von Neumann。** 它本是預備稿，裡面有大量留白等著填人名與交叉引用，最終版本本應「把功勞給該給的人」。但 Goldstine 在沒有 Eckert 與 Mauchly 知情的情況下，加了封面、只列 von Neumann 一人、就這麼散發出去了。\n- **Eckert 與 Mauchly（造硬體那兩位）主張，儲存程式概念基本上是他們的**——他們在 von Neumann 介入之前約八個月就已經在討論。von Neumann 把這些集體發展出來的想法做了精彩的整理與形式化，但「只署他一人」讓全部功勞集中到了他身上，「von Neumann 架構」這個名字就是這麼來的。\n- 更糟的是專利後果：這份單獨署名的草稿形同「公開發表」，後來在法庭上被認定為一種「先前技術」（prior art），反而**破壞了 Eckert/Mauchly 自己的專利布局**——描述的明明是他們做的工程。\n\n本書的講法：**「von Neumann 架構」這個名字記錄的是一次署名，不是一次獨立發明。** 儲存程式概念是 Moore School 那個團隊集體的成果；von Neumann 的貢獻（把它寫成一份清晰、有影響力的藍圖）真實且巨大，但「von Neumann 一人發明了它」是被那張封面誤導出來的簡化。談這段歷史，把這個 ⚠️ 帶上，是對前人的基本誠實。\n\n### 第一台真的跑起來的儲存程式機\n\n藍圖是一回事，跑起來是另一回事。第一台真正運轉的電子儲存程式電腦，不在美國，在英國曼徹斯特：**Manchester Baby**（正式名 Small-Scale Experimental Machine, SSEM），由 Frederic Williams、Tom Kilburn、Geoff Tootill 打造，**1948 年 6 月 21 日**跑出了它的第一支程式。\n\n這支程式值得講細節，因為它把整章的論點濃縮成一個畫面。它只有 **17 條指令**，任務是找出 2^18（也就是 262,144）的最大真因數。它跑了 **52 分鐘**，過程中執行了大約 210 萬條指令、約 350 萬次記憶體存取。\n\n慢得可笑？對。但重點完全不在快慢。重點在於：**這 17 條指令是以資料的形式，存在機器的記憶體裡（一支威廉斯管，Williams tube）。** 要讓 Baby 算別的題，你不用重接任何線——你只要把記憶體裡那 17 個數字換掉。換程式＝換記憶體內容＝換資料。這跟 ENIAC「換程式＝重接幾天線」是兩個世界。\n\n緊接著在 1949 年 5 月 6 日，劍橋的 Maurice Wilkes 讓 **EDSAC** 運轉——這是第一台「實用的」完整儲存程式電腦（Baby 是驗證概念的實驗小機）。從 EDSAC 開始，這套模式就成了之後一切電腦的預設骨架。\n\n## 為什麼這是躍遷：程式變成「可被程式操作的東西」\n\n到這裡，得回答那個核心問題：把指令跟資料放進同一個記憶體，到底有什麼了不起？省下重接線的麻煩，聽起來只是個方便，算得上「軟體史第一次躍遷」嗎？\n\n算。而且關鍵不在「方便」，在於一個質變的後果：\n\n**當程式變成記憶體裡的資料，程式就變成了「可以被另一個程式讀、寫、產生的東西」。**\n\n請慢慢咀嚼這句。在 ENIAC 模式下，程式是物理接線，你不可能寫一個程式去「產生」另一個程式的接線——接線是人爬上爬下的體力活，不在運算的範疇內。但一旦程式是記憶體裡的一串數字，它就跟任何其他資料一樣，可以被運算單元讀取、修改、甚至生成。於是下面這一整條食物鏈才成為可能：\n\n- **組譯器**（assembler）：一個程式，讀「人比較看得懂的助記符」當輸入資料，吐出「機器看得懂的數字指令」當輸出資料。輸出的那串數字，待會兒會被當程式跑。（這是 ch03 的起點。）\n- **編譯器、直譯器**：同一個把戲，更高一層——讀高階語言當資料、產生低階指令當資料。沒有「程式即資料」，編譯器這個概念連想都想不出來。\n- **loader、linker、後來的一切工具鏈**：全都是「把程式當資料處理」的程式。\n- 一路推到今天：你的 **codegen**（OpenAPI → client SDK，用程式產生程式）、你的 **container image**（靜止是資料、`run` 才是程式）、你信任 **`tsc`** 產生的 JS、你寫過的會生成基礎設施定義的腳本——**每一個都是 1945 年那個前提的直系後代。**\n\n換句話說，儲存程式不是「軟體史的一章」，它是**軟體之所以能成為一門可以自我建構的學科的前提**。沒有它，就沒有「用工具造工具」這條路，整個抽象 strand（機器碼 → 組語 → 高階語言 → …，見 ch01）連第一步都邁不出去。這就是為什麼它排在 ch02、排在編譯器（ch03）之前——它是地基底下的地基。\n\n> **一個你能帶走的領悟**：你之所以能過「不直接對機器說話」的日子——寫 TypeScript 而不是手撥開關、跑 generator 而不是手抄 client、build 一個 image 而不是進機房接線——根本原因是 1945 年人類決定「讓程式跟資料住在一起」。你每天享受的「用程式產生程式」的一切便利，帳是記在這個決定上的。下次你 `docker run` 一個剛 build 好的 image，可以想一下：你正在做的，是把一坨資料宣告成一個程式——這個動作本身，七十年前還是一件需要好幾天、好幾千條線才能完成的事。\n\n## 個案：同一台 ENIAC，兩種命運\n\n最能把這一跳講透的個案，不是拿 ENIAC 跟別的機器比，而是拿 **ENIAC 跟它自己比**——因為 ENIAC 後來真的被改造成了儲存程式模式，前後對照恰好就是這一跳的全部。\n\n**第一幕（1945–1947，接線模式）。** 前面說過：ENIAC 換一道題，要重接幾千條線、撥幾千個開關，花上數天，再花更多天檢查。「換工作」這件事的成本，是**物理重組整台機器**。一群人爬上爬下。改題大約每幾週才一次——因為改一次太貴了，自然就傾向一道題跑久一點。\n\n**第二幕（1947–1948，改造）。** 1947 年春天，von Neumann 提議：何不把 ENIAC 改成用他在 EDVAC 報告裡描述的新方式來「編程」？到 1948 年 4 月，Nick Metropolis 在 Adele Goldstine 等人發展的方案基礎上完成了改造。做法很巧妙：ENIAC 本來有三張「函數表」（function table），原本只用來儲存彈道的阻力資料；改造後，**程式就以數字的形式存進這些函數表裡**。指令變成了查表查得到的資料。\n\n**第三幕（改造之後，載入模式）。** 改造後的 ENIAC，換一道新題目要做什麼？**設定那些函數表上的開關**——把代表新指令的數字撥進去。是的，這還是手動、還是撥開關，比起 Baby 把指令存進電子記憶體還是粗糙得多；它跑得也比原本的純接線模式慢（因為指令要一條一條查表讀進來，不再是電路直連）。但**質變已經發生**：換程式不再是「重接整台機器的線」，而是「換一組數字」。程式從機器的物理結構，搬進了可設定、可載入的資料。\n\n把這三幕並排，整章的論點就赤裸裸攤在眼前了：\n\n| | 接線模式的 ENIAC | 儲存程式模式（改造後的 ENIAC／Baby／EDSAC） |\n|---|---|---|\n| 「程式」是什麼 | 機器的物理接線狀態 | 記憶體（或函數表）裡的一串數字＝資料 |\n| 換一道題＝ | 重接幾千條線、撥幾千個開關 | 換掉一組數字（載入新指令） |\n| 換題的成本 | 數天接線＋數天檢查 | 從「設定函數表」到 Baby 的「改記憶體」，量級驟降 |\n| 改題頻率 | 約每幾週一次（太貴） | 想換就換 |\n| 程式能不能被程式產生 | 不能（接線是體力活，不在運算範疇） | **能**——這才是真正的分水嶺 |\n\n注意最後一列。前四列講的是「方便」——省時間、省力氣，重要但不算革命。**真正的躍遷是最後一列**：當程式變成資料，程式就進入了「可被運算」的世界，「用程式造程式」從不可能變成可能。ENIAC 改造的故事最妙的地方在於——**機器幾乎沒變（還是同一堆真空管），變的只是「程式住在哪裡、是什麼形態」**。這恰恰證明了：儲存程式是一個**觀念**的躍遷，不是一個硬體的躍遷。\n\n## 複雜度搬去哪了\n\n照本書的記帳法，每一跳都要結一筆帳：消滅了什麼負擔、又製造了什麼新負擔、新東西在什麼情況下會反噬。儲存程式這一跳的帳是這樣的——\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼** | 「換程式＝重組硬體」的物理複雜度。程式不再是接線狀態，而是可儲存、可複製、可載入、可被內容定址的資料。「換工作」從數天的體力活，降為「載入一組數字」。 |\n| **搬到哪裡去了** | 複雜度搬進了**記憶體與軟體**。從此「程式是什麼、對不對、好不好維護」變成一個全新的、會無限長大的問題空間——軟體本身的複雜度。硬體不再是瓶頸，**人腦裝不下的程式**成了新瓶頸（這面牆會在 1968 年正式撞上，見 ch05）。 |\n| **製造了什麼新負擔** | (1) 既然程式是可寫的資料，程式就能**改自己**——self-modifying code，早年被當技巧用，後來變成 debug 惡夢與安全漏洞的溫床。(2) 指令與資料共用一條通往記憶體的路，這條路成了效能瓶頸（後世稱 **von Neumann bottleneck**）。(3) 指令與資料不分家，意味著「資料」如果被當成「指令」執行，就出事——這是日後整類記憶體安全漏洞（buffer overflow、注入攻擊）的遠祖。 |\n| **什麼情況下會洩漏／反噬** | 當「程式只是資料」這個抽象太成功、讓人忘了它的物理代價時。von Neumann bottleneck 在你跑記憶體頻寬受限的工作負載時回來找你（這正是你未來在 AI Infra 之路上，面對 LLM 推論時 memory-bound 的祖宗級成因——一句話接書架上的 AI Infra 書，不展開）。而「資料可被當指令執行」這個當年的優雅統一，是今天每一道 `eval()` 注入、每一次 RCE 的結構性根源。 |\n| **這一跳的帳單一句話** | **用「程式即資料」的統一，換來了軟體這門可以自我建構的學科——代價是從此你要對付的，不再是電線，而是一個沒有上限、會自我繁殖的複雜度宇宙。** |\n\n這筆帳定調了全書：**抽象不消滅複雜度，它把複雜度搬家。** 儲存程式把複雜度從「銅線與插板」搬到了「記憶體裡的軟體」。搬得漂亮——但搬過去的那一頭，正是接下來七十年所有故事發生的地方。\n\n## 紙上推演\n\n> 純敘事書，沒有可跑的 lab。下面每題請**口頭講出來**或寫下來，講得清楚才算過。\n\n### 推演一：解釋「為什麼說圖靈機不是一台機器」 **[15 分鐘]** ★\n\n對一個只聽過「圖靈」這個名字、以為他造了第一台電腦的人，用三句話講清楚：圖靈機是什麼、它解的是什麼問題、它跟「真的電腦」差在哪。\n\n#### 推演解答\n\n三句話的骨架：\n\n1. **它是什麼**：圖靈機是一個**思想實驗**——一條無限長紙帶、一個讀寫頭、一張狀態轉移規則表——用來精確定義「什麼叫做可以被機械步驟計算」。它是數學定義，不是要造出來的設備。\n2. **它解什麼問題**：圖靈 1936 年提出它，是為了回答一個純數學問題（Hilbert 的判定問題：有沒有一套機械程序能判定任意數學命題的真假）。他的答案是「沒有」。電腦只是這個證明的副產品概念，不是目的。\n3. **它跟真電腦差在哪**：真電腦是有限資源的工程品；圖靈機是有無限紙帶的抽象。圖靈機不能「跑得快」或「當機」——它沒有實體。它的價值是**劃出可計算的邊界**，不是執行任務。\n\n常見誤解：把「通用圖靈機」（能模擬任何其他圖靈機）誤當成「圖靈造的第一台通用電腦」。通用圖靈機是個**證明工具**，妙在它把「被模擬機器的描述」寫成紙帶上的資料——這正是「程式即資料」的理論版，但它依然是黑板上的東西，不是賓州那台燒著上萬真空管的鐵傢伙。\n\n### 推演二：反事實——如果程式與資料分屬不同記憶體 **[25 分鐘]** ★★★\n\n想像一個極端的哈佛架構（Harvard architecture）世界：程式存在一塊**唯讀**、且**運算單元無法寫入**的記憶體，資料存在另一塊；兩者老死不相往來，沒有任何程式能產生或修改另一段程式的內容。在這個世界裡，編譯器還可能出現嗎？你今天的 codegen 工作流呢？\n\n#### 推演解答\n\n先講結論：在「絕對版」的哈佛架構世界（程式記憶體對所有程式都完全唯讀、不可由運算產生），**編譯器作為一個「在這台機器上跑、並產出這台機器能執行的新程式」的程式，是不可能的。** 因為編譯器的本質就是「把程式當輸出資料來寫」——它必須能**生成**一段待會兒會被當程式執行的位元。如果「能被執行的記憶體」永遠無法由運算寫入，這個生成動作就沒有著力點。\n\n但要小心別把話講死，這正是這題的價值——魔鬼在「絕對版」三個字：\n\n- **現實的哈佛架構並不絕對。** 很多嵌入式晶片（如某些微控制器）是哈佛架構，指令與資料分匯流排——但它們照樣用編譯器。為什麼？因為編譯通常**不在目標機器上跑**（在你的 PC 上交叉編譯，PC 是 von Neumann 架構），產出的 binary 再被**燒錄**進唯讀程式記憶體。燒錄是一個「跳出運算之外」的物理動作，扮演了當年 ENIAC 接線工的角色。\n- 所以真正的洞見是：**「程式即資料」這個前提可以被局部放寬，只要在系統的某一層存在一個「能把資料變成可執行程式」的環節。** von Neumann 架構的優雅在於把這個環節內建在每一台機器裡；哈佛架構把它外包給「燒錄」這道工序。\n\n至於你的 codegen：`openapi-generator` 吐出 TypeScript 字串，這一步在任何架構下都行（產出的只是文字資料）。卡關的是下一步——那串 TypeScript 要被**編譯、被執行**。在絕對哈佛世界裡，這一步需要一個外部的、唯讀程式記憶體之外的「燒錄」管道。換句話說，codegen 的「產生程式碼」很自由，但「讓產生出來的程式碼跑起來」這件事，永遠需要某處有一道「資料→可執行程式」的門。1945 年的貢獻，就是把這道門做成了**記憶體本身的預設性質**，而不是一道額外工序。\n\n### 推演三：找出「Lovelace 是第一位程式設計師」需要加哪些但書 **[20 分鐘]** ★★\n\n有人很篤定地跟你說「Ada Lovelace 是史上第一位程式設計師」。你不打算潑冷水否定她，但要把這句話修到「歷史上站得住」。請列出至少三條但書，並給一個你願意說出口的、公平的版本。\n\n#### 推演解答\n\n三條（以上）但書：\n\n1. **時代錯置（anachronism）**：「to program／programmer」當作「為計算機器寫指令」的用法，是將近一個世紀後才出現的詞。1843 年沒有「程式設計師」這個概念，Lovelace 自己的說法是分析機「編織代數的花樣」。用一個一百年後的職稱去冊封她，本身就需要打折。\n2. **Note G 更像「執行軌跡」（trace）而非「程式」**：它是一張列出每一步運算會發生什麼的表，比較像我們今天說的 execution trace，而不是一段可載入、可執行的指令序列。\n3. **歸屬有爭議**：Babbage 自承 Bernoulli 數那部分的代數推演是他先做的；歷史學家也指出 Babbage 在 1837–1840 間就準備了數十個（更簡單、未發表的）示範程式，時間上早於她的 Notes。\n4. **（加分）機器本身不存在**：分析機從未建成，這套步驟從未在真機器上跑過——它是為一台不存在的機器寫的、未經執行驗證的演算法。\n\n公平版本：「Lovelace **常被譽為**第一位程式設計師。她的 Note G 一般被認為是最早**專為一台計算機器寫出的演算法**之一，這個成就是真實的；近年研究也支持那套 Bernoulli 計算方法出自她手。但『**第一位程式設計師**』是個有爭議的後世標籤——詞是後造的、Note G 形態更像執行軌跡、且 Babbage 有更早的未發表示範。所以把功勞給足，但別把這個標籤當成蓋過章的史實。」\n\n注意這題的元教訓（會貫穿全書）：凡是「誰**第一個**發明／做了 X」的斷言，幾乎都要打折。歷史是漸進的、歸屬是被簡化的；本書的習慣是把「常被譽為」「一般歸於」這類保留詞當成預設配備。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 在儲存程式之前，ENIAC 的「程式」具體是什麼形態？「換一道題」對它而言是什麼樣的工程？（答不出「物理接線、數天重接」就還沒進入狀況。）\n2. 為什麼說「程式與資料放進同一個記憶體」是**質變**而不只是**方便**？關鍵那一句是什麼？（提示：可被程式讀寫產生。）\n3. 把「儲存程式」這個 1945 年的前提，連到你今天的三件事（container image、codegen、tsc），各用一句話講清楚它怎麼站在這個前提上。\n4. 「Lovelace 是第一位程式設計師」這句話，你會怎麼**誠實地**修正它？至少講兩條但書。\n5. 為什麼說圖靈機「不是一台機器」？通用圖靈機跟「程式即資料」有什麼關係？\n6. 「von Neumann 架構」這個名字，記錄的是一次發明還是一次署名？這個爭議的兩造各主張什麼？\n7. 儲存程式消滅了哪一種複雜度、又把複雜度搬去了哪裡？它製造的新負擔裡，哪一個跟你未來的 AI Infra 之路（memory-bound 推論）有血緣？\n\n## 延伸閱讀\n\n- **John von Neumann, _First Draft of a Report on the EDVAC_（1945）**。儲存程式的工程藍圖原典，也是「von Neumann 架構」命名爭議的源頭文件。讀它你會發現它其實是一份未完成、滿是留白的草稿——這個「未完成」本身就是功勞官司的關鍵。配著讀 Wikipedia 的「First Draft of a Report on the EDVAC」條目了解爭議全貌。\n- **Alan Turing, _On Computable Numbers, with an Application to the Entscheidungsproblem_（1936）**。原文數學很硬，不必硬啃；建議讀「通用機器讀紙帶」那一段的二手導讀（如 Charles Petzold《The Annotated Turing》逐行註解版），體會「程式即資料」最早的理論形態。\n- **ENIAC Programmers Project（eniacprogrammers.org）與 IEEE Spectrum「The Women Behind ENIAC」**。把 ENIAC Six 的故事補齊——「寫程式是一門被低估的獨立手藝」這個全書暗線，從第一天就成立。\n- **Computer History Museum 線上展「The Stored Program」（computerhistory.org/revolution）**。圖文並茂講 Baby／EDSAC／EDVAC 這條線，適合先建立畫面再讀文字。\n- **twobithistory.org「What Did Ada Lovelace's Program Actually Do?」（2018）**。逐步拆解 Note G 到底算了什麼、為什麼說它更像 trace——是把「第一位程式設計師」爭議講得最清楚、最不情緒化的一篇。\n- **arXiv:2402.00749「Comment on: Was Ada Lovelace Actually the First Programmer?」**。學術界對這個爭議的近期交鋒，想看「歷史學家怎麼吵這件事」可讀，體會本章「歸屬永遠比教科書複雜」的元教訓。\n"}, {"id": "ch03-compiler-bet", "file": "ch03-compiler-bet.md", "group": "Part I — 機器與第一層抽象", "title": "ch03 — 編譯器的賭注：把「對機器說話」外包", "md": "# ch03 — 編譯器的賭注：把「對機器說話」外包\n\n> **本章解決什麼問題**：上一章（見 ch02）讓程式變成可被程式操作的資料，這一章就動手用程式操作程式——把「翻譯成機器聽得懂的話」這件苦工外包給另一支程式。我們撞的是「人腦追不上機器細節」這面牆：位址要手算、暫存器要手調、改一行牽動全表。翻越的方式是**抽象**（從機器碼到組語到高階語言，兩跳），但每一跳都有人懷疑「機器產生的碼會不會比人手寫的慢」。FORTRAN（1957）正面押了這個賭——這是全書「效能↔生產力」鐘擺的第一次擺動，後面每一章的取捨都在這條鐘擺上。\n\n## 從你已知的出發\n\n你每天寫 TypeScript，存檔，`tsc` 把它編成 JavaScript，丟給 Node 跑，V8 再把熱路徑 JIT 成機器碼。這條翻譯鏈有四五層，你一層都沒親手碰過，卻每天把產品壓在它身上。你信任「機器產生的碼夠快」——快到你從來不會打開 V8 吐出的組語去檢查它有沒有偷懶。\n\n這份信任不是天生的，是 1957 年有一群人替你賭贏來的。\n\n把鏡頭再拉近一點。你選 NestJS 而不是手寫一個 epoll loop 的 C 服務，理由是「開發速度、團隊好維護、生態完整」——你心裡有一筆帳：NestJS 的 decorator、DI、middleware 多繞的那幾層 overhead，換來的生產力划算。你那次把尖峰 RDS CPU 砍掉四成，靠的是改 query 與加 index，不是去重寫 V8。也就是說，你**預設**了「抽象層的效能損失在可接受範圍內，瓶頸在別處」。\n\n這個預設就是本章的主題。「用更高的抽象換生產力，賭效能損失可接受」——這個賭，第一次有人正式押下注、而且賭贏，是 1957 年 IBM 那支寫 FORTRAN 編譯器的團隊。在他們之前，「機器產生的碼能不能跟人手寫一樣快」不是預設，是一個被資深程式設計師公開嘲笑的妄想。\n\n這一章講的就是：這份妄想怎麼變成你每天的預設。\n\n## 機器碼的痛：你是 CPU 的祕書\n\n先把「沒有抽象」的世界講清楚，不然你感受不到後面每一跳省掉了什麼。\n\n最底層，程式是一串數字。不是「看起來像數字的助記符」，是真的數字：這個位元組是「載入」的操作碼，接下來幾個位元組是要載入的記憶體位址，下一條是「相加」，再下一條是「跳到位址 0x4A2」。你不是在「寫邏輯」，你是在當 CPU 的祕書，替它把每一個動作的編號和位址都抄對。\n\n這裡有三種痛，而且彼此會放大：\n\n**第一，位址全靠手算。** 你想跳到某段程式，得知道它在記憶體第幾個字。這個位址不是你取的名字，是它**實際擺放的位置**。所以你得一邊寫一邊數：這支副程式從第 100 個字開始、佔 37 個字，那下一段就從 137 開始……你在心裡維護一張位址表，而這張表只存在你腦裡。\n\n**第二，改一行牽動全表。** 真正要命的是這個。假設你在中間插入三條指令。後面所有東西的位址全部往後挪三格——而每一條「跳到位址 X」的指令裡，那個 X 都是寫死的數字。你得回頭把所有受影響的位址手動 +3。漏改一個，程式不是壞掉，是**安靜地跳到錯的地方**繼續跑。這是你在 production 最怕的那種 bug 的史前版本：沒有 stack trace，沒有 type error，機器忠實地執行了一個你沒打算下的指令。\n\n**第三，暫存器要自己調度。** CPU 只有少數幾個暫存器（快速的工作記憶體）。哪個值該留在暫存器、哪個該先寫回記憶體騰位置、什麼時候再載回來——全是人腦排程。排得好程式快，排得差程式慢，而「排得好」需要對整支程式的資料流瞭如指掌。\n\n你對這三種痛其實不陌生，只是你遇到的是它們的後代。手算位址＝你沒有變數名、只有 magic number 寫死的偏移量；改一行牽動全表＝你改了一個共用常數卻漏掉三處引用（還好你有編譯器報錯）；暫存器調度＝你在 hot path 上手動算 cache locality。差別在於：你只在**最痛的那一小段**做這種事，1950 年代的人**整支程式**都得這樣寫。\n\n```text\n機器碼世界裡，人腦扛的三筆負擔\n\n  位址簿記 ──┐\n  暫存器調度 ─┼──► 全在程式設計師腦中，沒有任何工具替你記\n  資料流追蹤 ─┘\n            一改全動，漏一個就安靜跑錯\n```\n\n關鍵不是「當年的人比較笨所以覺得痛」。是這些負擔的本質：它們都是**機器的細節**，跟你想算的東西（一道物理方程、一筆薪資）毫無關係，卻佔掉你一半以上的腦力。要翻過這面牆，方向只有一個——把機器的細節外包出去，讓某個東西替你記、替你算、替你調。\n\n那個東西，就是另一支程式。能這樣做的前提，正是上一章的儲存程式：程式既然是資料，就能被別的程式讀進來、加工、產出。**用程式產生程式**——你做 OpenAPI schema 生 client、用 codegen 生 boilerplate，做的是同一件事，只是你站在這個前提上太久，久到不會注意它是個前提。\n\n## 第一跳：組語——不再直接對機器說話\n\n第一個外包很小，但方向決定了一切。\n\nEDSAC（1949，Cambridge，Wilkes 的機器）上，一個叫 David Wheeler 的研究生寫了一套叫 **Initial Orders** 的東西。它讓你不用寫純二進位：每條指令的操作碼可以寫成一個助記字母（`A` 代表 add，剛好用字母 A 的位元樣式編碼），位址可以寫成十進位，而且——這是關鍵——你可以用**相對位址**，讓程式被載入時自動算出實際位置。整套東西只有 31 個字（words），卻同時做了後來「組譯器」（assembler）與「載入器」（loader）兩件事的雛形。它一般被認為是世界上第一個組譯器。\n\nWheeler 順手還奠基了副程式（subroutine）的概念（所謂 Wheeler Jump），隔兩年（1951）和 Wilkes、Gill 合寫了史上第一本程式設計教科書《The Preparation of Programs for an Electronic Digital Computer》，裡面就有副程式庫的想法。你今天 `import` 一個函式庫、不用自己重寫，這條線一路接到這裡。\n\n組語外包掉了什麼？看那三筆負擔：\n\n| 機器碼的負擔 | 組語怎麼外包 | 還沒外包的 |\n|---|---|---|\n| 位址手算 | 用符號名字代替數字，組譯器替你算實際位址 | — |\n| 改一行牽動全表 | 你改的是符號，重新組譯時位址自動重算 | — |\n| 暫存器調度 | **沒動**——還是你自己排 | 全部留著 |\n\n這一跳的本質：你不再直接對機器說它的位址數字，你說**符號**，讓一支程式把符號翻成數字。但組語跟機器碼還是**一對一**的——一條組語指令對應一條機器指令。你說話的「詞彙」沒變，變的只是你不用記每個詞的編號。暫存器調度、資料流、演算法的每一步，仍然得你親手攤開成一條一條機器動作。組語讓你不用當 CPU 的「祕書」，但你還是得當 CPU 的「翻譯」，逐字逐句。\n\n所以第一跳是個安全的賭：因為一對一，沒人會懷疑組譯器產生的碼比手寫慢——它產生的就是你寫的那些指令。真正的賭注在第二跳。\n\n## 第二跳：高階語言——說人話，讓機器自己想辦法\n\n第二跳要外包的，是組語沒碰的那塊：**怎麼把「一個想法」拆成一條一條機器動作**。\n\n你想寫「把這個陣列的每個元素乘以二再加總」。組語裡，這是一個迴圈：設一個計數器、設一個位址指標、載入、相乘、相加、位址往前移、計數器減一、檢查歸零沒、沒歸零就跳回去。八九條指令，每一條你都得親手寫對。高階語言的賭注是：**讓你寫一行接近數學或人話的式子，由一支程式去拆成那八九條指令**。\n\n這就跨過了一對一的界線。一行高階語言會展開成多條機器指令，而且**怎麼展開有好幾種選擇**。同一個迴圈，計數器放暫存器還是記憶體、檢查歸零的條件怎麼安排、要不要把不變的計算提到迴圈外——不同選擇跑起來快慢可以差很多。在組語裡這些選擇是**你**做的；在高階語言裡，這些選擇被外包給了編譯器。\n\n於是那個要命的問題第一次浮現：**機器自己做的選擇，會不會比人手做的差？**\n\n在這之前，有兩個重要的中間站，把「說人話」這個方向先試了水溫。\n\n**Grace Hopper 與 A-0（1951–52）。** Hopper 在 UNIVAC I 上做了一套叫 A-0 的系統，常被稱為「第一個編譯器」。這個說法得校準。A-0 做的事，以現代定義來看，更接近**連結載入器**（linker / loader）：它把一串編了號的副程式按你給的序列串接、載入記憶體，而不是把一種高階語言翻譯成機器碼。所以「A-0 是不是第一個編譯器」這個問題，**答案完全取決於你怎麼定義「編譯器」**——如果「編譯器」指「自動把人寫的東西組裝成可執行程式的工具」，A-0 算；如果指「把高階語言語句翻成機器碼」，A-0 不太算，那個榮譽更接近 FORTRAN。本書的立場：誠實地說 A-0 是這條路上的重要先驅，但別用「第一個編譯器」這頂帽子蓋過定義的模糊。（這也是本書反覆要做的事：凡「誰第一個發明 X」的歸屬，先問「X 怎麼定義」。）\n\nHopper 後來（1955–59）做了 **FLOW-MATIC**（原名 B-0），第一個用英語化語句寫資料處理的編譯語言，直接影響了後來的 COBOL（見 ch04）。她真正的賭注不在「快」，在「**讓不是數學家的人也能寫程式**」——這條「可讀性、英語化」的血脈，跟 FORTRAN 的「給科學家算數值」是兩種不同的價值取向，ch04 會把這兩條血脈攤開。\n\n順帶澄清一個你大概聽過的故事。1947 年，Harvard Mark II 的繼電器裡夾死了一隻蛾，工程團隊把牠貼進日誌，旁邊寫 \"First actual case of bug being found\"。這常被講成「Hopper 發明了 debug 這個詞」——**這是流傳的故事，不是詞源**。\"bug\"（小故障）和 \"debug\" 這兩個詞在那之前工程界早就在用了；那句日誌之所以好笑，正是因為他們在玩這個既有的雙關（這次真的是隻蟲）。Hopper 確實在場、也樂於講這個故事讓它流傳，但她沒有發明這個詞。歷史的趣味往往就在這種「比傳說無聊一點、但更準確」的版本裡。\n\n## 個案：FORTRAN 團隊怎麼贏下這場賭\n\n現在進入這一章真正的主角。\n\n1953–54 年，IBM 的 John Backus 提了一個計畫。動機很實際，是一筆帳：**寫程式的成本已經追上、甚至超過機器本身的成本**。一個電腦中心，請程式設計師的錢往往不比那台機器便宜；機器時間有四分之一到一半花在 debug 上。Backus 看到的不是「程式設計師不夠聰明」，是「人力是瓶頸，而且會越來越貴」。這個經濟論證很重要——它讓 Backus 拿得到資源組隊（IBM 想賣更多機器，而機器賣不動的原因之一是程式難寫）。\n\n注意這個論證的形狀，因為它會在本書反覆出現：**當某種資源變便宜、另一種變貴，抽象的方向就會轉向去省那個貴的。** 1954 年，機器相對變便宜了（704 把浮點運算搬進硬體，算得飛快），人變貴了。於是「多花一點機器時間、省下大量人時」第一次划算。這正是你選 NestJS 的同一套算盤，只是把「機器時間」換成「雲帳單」、把「人時」換成「團隊速度」。鐘擺往「生產力」這邊擺，是因為帳算得過來，不是因為誰比較有遠見。\n\n但賭注就在這裡。Backus 的團隊很清楚一件事，這件事決定了 FORTRAN 的生死：\n\n> 大意是：如果 FORTRAN 產生的機器碼，跑得比一個好程式設計師手寫的明顯慢，那再好寫也沒人會用。\n> （這是 1957 年原始論文與 Backus 後來回顧反覆強調的核心約束；此處為轉述，非逐字引文。）\n\n這不是杞人憂天。當年的程式設計師裡有一種近乎「祭司」的文化——他們以能榨出機器每一滴效能為傲，把「機器自動產生程式」視為對這門手藝的冒犯，公開表達敵意與嘲諷。一個普遍的信念是：**機器不可能做到人手寫的那些精巧、有創意的最佳化。** 在這種氛圍下，一個「好寫但慢」的編譯器只會證明懷疑者是對的，然後被丟進歷史的垃圾桶。\n\n所以 FORTRAN 團隊把絕大部分力氣，不是花在「好寫」，是花在「**夠快**」。他們做的，是世界上第一個**最佳化編譯器**（optimizing compiler）。這場仗打了大約三年、約 18 個人年（person-years），整個編譯器約兩萬三千多條組語指令——以當年的尺度是巨大的工程。產品 1957 年 4 月出貨給 IBM 704 的用戶。\n\n最值得攤開的，是他們**怎麼**讓產出的碼夠快。編譯器分成六個 section，最精彩的是第 4 與第 5 section 的配合：\n\n```text\nFORTRAN I 編譯器：兩個 section 怎麼合謀產生快碼\n\n  你的程式\n     │\n     ▼\n  [Section 4]  Lois Haibt 主導\n     │  把程式切成 basic block（一段沒有分支進出的直線碼）\n     │  用 Monte Carlo「假跑」一遍程式，估計每個 block\n     │  多常被執行——熱的地方標記出來\n     ▼\n  [Section 5]  暫存器/索引配置\n     │  把寶貴的索引暫存器，優先分給最熱的 block\n     │  熱路徑上的變數留在暫存器，冷路徑才肯寫回記憶體\n     ▼\n  夠快的機器碼\n```\n\n停下來看清楚這件事的份量。**1957 年，這群人就在做「先估計程式哪裡熱、再把資源砸在熱的地方」。** Section 4 由 Lois Haibt 負責：她讓編譯器用蒙地卡羅（Monte Carlo）的方式「模擬執行」程式——遇到 `IF` 和分支，用加權的亂數決定走哪邊——藉此統計出哪些 basic block 是高頻熱區。Section 5 再拿這份熱度地圖，把數量有限的索引暫存器優先配置給最熱的迴圈。\n\n你應該覺得這個套路很眼熟。**這就是 profile-guided optimization（PGO）的祖先**，比它正式成為主流早了幾十年。你今天做效能工程的核心動作——先 profiling（Clinic.js 找熱點）、再把優化力氣集中在那 3% 的瓶頸上——跟 1957 年 Haibt 做的事，是同一個思想：別平均用力，先量出熱在哪，再針對熱區下手。當年沒有 profiler 可跑（程式還沒寫完呢），所以她讓編譯器用統計**模擬**出一份熱度估計。換成今天的話：靜態 PGO 的史前版本。\n\n賭贏了。FORTRAN 產生的碼，跑得**接近**手寫機器碼的水準——好到連團隊自己的人都驚訝。據說這個最佳化編譯器產生的碼，效率紀錄保持了大約二十年才被超越（這類「保持紀錄 N 年」的說法是業界流傳的讚譽，難以精確查證，當佐證、別當定論）。重點不在那個確切數字，在於：**懷疑者輸了。** 「機器產生的碼必然比人慢」這個信念，被一個能估熱度、配暫存器的編譯器當場推翻。\n\n從這一刻起，鐘擺的位置被重新校準。不是「效能 vs 生產力，只能選一個」，而是「**在大多數情況下，你可以兩個都要**——把效能的苦工外包給一支夠聰明的編譯器，省下的人力遠大於損失的那點機器時間」。你今天能安心地不看 V8 產出的組語，就是站在這個被校準過的鐘擺上。\n\n但請記住「大多數情況」這五個字。FORTRAN 沒有消滅效能的問題，它把效能的責任**搬家**了——從「每個程式設計師逐行負責」搬到「編譯器團隊集中負責」。這筆帳，下一節結。\n\n## 複雜度搬去哪了\n\n把這一章的兩跳結成一筆帳。\n\n| | 消滅了什麼負擔 | 製造了什麼新負擔 | 在哪洩漏／反噬 |\n|---|---|---|---|\n| **第一跳：組語** | 位址手算、改一行牽動全表 | 多了一道組譯步驟；得信任組譯器算對位址 | 幾乎不漏（一對一，產出可預測） |\n| **第二跳：高階語言** | 把「想法拆成機器動作」整包外包；暫存器調度、最佳化都交出去 | 你**看不到也控制不了**機器碼長怎樣；效能交給編譯器決定 | 編譯器選錯最佳化、或你的寫法讓它無法最佳化時，效能莫名變差，而你離產出的碼隔了好幾層 |\n\n這一跳的帳單，一句話：**你用「不必懂機器碼」換來生產力，代價是當效能出問題時，你和真相之間多了一個你不完全理解的黑盒。**\n\n這個帳單你天天在付，只是平常它不來收。它來收的時候長這樣：\n\n- 你寫了一段 TypeScript，跑起來莫名其妙慢。問題不在你的邏輯，在 V8 因為你的物件形狀（hidden class）一直變，放棄了某個最佳化、把函式 deopt 回慢路徑。你得懂一點「編譯器/JIT 在背後怎麼決定要不要最佳化」，才追得到。這就是**抽象洩漏**（見 ch19）——平常編譯器替你藏好的機器細節，在效能的邊緣漏了回來。\n- 你信任 `tsc` 的型別檢查，但 `tsc` 編出來的 JS 不帶任何型別保護，執行期一個 `any` 穿進來照樣炸。編譯器幫你擋的是一類錯，不是所有錯（型別這條線，見 ch08）。\n\n注意一個全書會反覆出現的模式：**抽象不消滅複雜度，它把複雜度搬到一個你看不見的地方，並指定一群人專門替你扛。** 機器碼的最佳化複雜度沒有消失——它從「每個寫程式的人」搬到了「編譯器團隊」。對你是淨賺：你不用懂暫存器配置，FORTRAN 團隊（和今天 V8、LLVM 的人）替全世界懂了一次。代價是當那個黑盒在邊緣出錯，你得有能力暫時跳進去——這正是資深工程師值錢的地方（見 ch19）。\n\n還有一個鐘擺的讀法，記著它，後面每一章都會用到。「效能↔生產力」不是一次性擺到「生產力」就停了。它一直在擺：\n\n```text\n效能 ◄─────────────────────────► 生產力\n  手寫機器碼        FORTRAN(1957)        高階語言/GC語言\n  你手寫 C 服務     你選 NestJS          你用 ORM 不寫 SQL\n\n  每次往「生產力」擺，都靠「夠聰明的某個層替我扛效能」這個賭\n  賭的前提：瓶頸不在這層、損失可接受——前提不成立時，鐘擺就回擺\n```\n\n什麼時候回擺？當「夠聰明的層」不夠聰明、或抽象的損失大到吃掉了生產力的好處時。你在 hot path 上手寫一段繞過 ORM 的原生 SQL，就是一次小回擺。整個產業也會回擺——FP 因為多核心回來（見 ch09）、有人從微服務退回單體（見 ch17、ch19）。每一次回擺都帶著上次的教訓。FORTRAN 是這條鐘擺有記載的第一次大擺動，方向定了調：只要那個賭算得過帳，人類就會一次又一次把更多細節外包出去。\n\n## 紙上推演\n\n### 推演一：手寫 SQL → ORM，這個類比在哪裡會破 [15 分鐘] ★★\n\n把「組語 → 高階語言」這一跳，類比成你熟悉的「手寫 SQL → 用 ORM」。先講清楚類比成立的地方，再**主動找出**它會破的地方。\n\n#### 推演解答\n\n**成立的地方**：兩者都是「把一個低階、囉嗦、要懂底層細節的東西，外包給一支程式自動產生」。手寫 SQL ↔ 手寫一條條機器動作；ORM 的 `user.posts` ↔ 高階語言的一行式子。兩者都做了「一對多展開」：你寫一行 ORM，它可能展開成多條 SQL；你寫一行 FORTRAN，它展開成多條機器指令。而且兩者都引發**同一種懷疑**——「自動產生的會不會比手寫的差」。ORM 的 N+1 query，正是「自動產生的 SQL 比手寫的慢」這個古老懷疑的當代版本。\n\n**會破的地方**（這才是重點）：\n\n1. **FORTRAN 的賭最後贏了，ORM 的賭只贏了一半。** FORTRAN 的最佳化編譯器讓產出碼接近手寫；ORM 的查詢產生器在簡單情況夠好，但碰到複雜 join、N+1、需要特定 index hint 時，它產生的 SQL 經常明顯比手寫差。差別在於：機器碼的最佳化是個**封閉、可窮盡**的問題（暫存器就那幾個、指令就那些），編譯器團隊能集中解決一次；而 SQL 的最佳化牽涉資料分布、統計、執行計畫，跨出了 ORM 能掌握的邊界。所以你常常得「跳下去」手寫原生 SQL——這個動作在 FORTRAN 之後幾乎沒人對機器碼做了。\n2. **層數與可見性不同。** 你能看到 ORM 產生的 SQL（打開 query log 就有），所以洩漏時你抓得到、改得動。FORTRAN 產生的機器碼你理論上看得到，但實務上沒人會去逐條改它——抽象封得更死。\n3. **誰扛最佳化責任不同。** 編譯器的最佳化是全自動、你無法介入的；ORM 通常留了逃生口（raw query、query hint），等於它**承認**自己這個賭不一定贏，先給你留了回擺的門。\n\n一個好的類比，價值往往在它破的地方——破的地方告訴你「這兩個抽象賭贏的程度不一樣」。\n\n### 推演二：口頭講「FORTRAN 的賭」與「你選框架」是同一條鐘擺 [10 分鐘] ★\n\n對著一個資淺工程師，用不超過三分鐘把這件事講清楚：1957 年 FORTRAN 團隊下的賭，跟你上週選 NestJS 而不是手寫 C 服務，是鐘擺上的同一個動作。不准用「抽象」「鐘擺」這種詞——用大白話。\n\n#### 推演解答\n\n一個可用的講法（你的版本只要命中因果即可）：\n\n「1957 年以前，寫程式就是直接對機器下指令，每一步都你親手排，所以程式跑得快、但人累得半死、而且超容易出錯。後來有群人在 IBM 想：人越來越貴、機器越來越便宜，不如讓我寫一行接近數學的式子，由一支程式幫我翻成那一堆機器指令。當時一堆高手嘲笑這個想法，說機器翻出來的碼一定比我手寫的慢。結果這群人做了一個很會偷偷最佳化的翻譯程式——甚至會先猜程式哪裡最常跑、把力氣集中在那——翻出來的碼快到跟手寫差不多。於是大家發現：原來不用在『好寫』跟『夠快』之間二選一，多數時候可以兩個都要。\n\n我上週選 NestJS 不手寫 C，做的是一模一樣的決定。手寫 C 會更快，但團隊維護成本高、開發慢。我賭的是：NestJS 那點 overhead 反正不是我們的瓶頸（瓶頸在資料庫），用它換來的開發速度划算。這個『用一點效能換生產力、賭損失可接受』的決定，1957 年那群人第一次正式下注。我只是那個賭的第六十幾年受益人。」\n\n**常見誤解**：講的時候容易把它講成「進步論」——好像抽象越高越好、歷史單向前進。要避開。重點是**這是一筆帳，不是進步**：往生產力擺，是因為當下的成本結構讓帳算得過來；當瓶頸真的落在這一層（你手寫原生 SQL 那次），帳就反過來，你會往效能回擺。鐘擺，不是階梯。\n\n### 推演三：A-0 是不是「第一個編譯器」，取決於你怎麼定義 [15 分鐘] ★★★\n\n有人說 Grace Hopper 的 A-0（1952）是第一個編譯器，也有人說第一個編譯器是 FORTRAN（1957）。寫一段，說清楚**為什麼這個爭論的答案完全取決於「編譯器」怎麼定義**，並給出在哪個定義下誰算。\n\n#### 推演解答\n\n關鍵：「第一個 X」這種問題，幾乎都不是史實之爭，是**定義之爭**。把「編譯器」攤成兩種合理定義：\n\n**定義 A：「自動把人寫的高階描述，組裝／轉換成可執行程式的工具」（寬定義）。** 在這個定義下，A-0 算得上——它把一串編了號的副程式按指定序列串接、載入成一支可跑的程式，確實自動化了「人手組裝程式」這件事。Hopper 自己用 \"compiler\" 這個詞，取的就是「compile＝把零件編組在一起」的本義。\n\n**定義 B：「把一種高階語言的語句，翻譯成較低階語言（機器碼/組語）的工具」（現代定義）。** 在這個定義下，A-0 比較不算——它做的事更接近**連結載入器**（linker / loader），把預先寫好的副程式串接，而不是去「翻譯」一種語言的語法結構。符合這個定義的、第一個被廣泛使用的，是 FORTRAN：它把 FORTRAN 語言的式子翻成 IBM 704 的機器碼。\n\n所以正確的講法不是「A-0 是／不是第一個編譯器」，而是：\n\n> A-0 是這條路上不可抹滅的先驅，它示範了「程式可以自動組裝程式」；但若用今天「把高階語言翻成機器碼」的標準，它更接近連結載入器，那個意義下的第一個廣用編譯器是 FORTRAN。\n\n**常見誤解一**：以為這是在「貶低 Hopper」。不是。誠實標明定義的模糊，比塞給她一頂尺寸不對的帽子更尊重她——她真正的、無爭議的貢獻是「英語化、讓更多人能寫程式」這條血脈（FLOW-MATIC → COBOL）。**常見誤解二**：以為一定有個「正確答案」。歷史的優先權之爭，多數時候沒有正確答案，只有「在哪個定義下成立」。本書遇到每一個「誰第一個發明 X」，都先問這句：你說的 X，是哪個定義？\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 機器碼世界裡，程式設計師腦中扛的三筆負擔是什麼？為什麼「改一行牽動全表」比另外兩個更致命？\n2. 組語（第一跳）跟高階語言（第二跳）外包掉的東西，本質差別在哪？為什麼第一跳沒人懷疑、第二跳才需要賭？（提示：一對一 vs 一對多）\n3. Backus 為什麼做 FORTRAN？把那筆「人力 vs 機器」的帳講出來——並說清楚這筆帳跟你選 NestJS 的帳是同一個形狀。\n4. FORTRAN 團隊把力氣主要花在「好寫」還是「夠快」？為什麼這個選擇決定了 FORTRAN 的生死？\n5. Lois Haibt 的 Section 4 用 Monte Carlo 做了什麼？為什麼說這是 profile-guided optimization 的祖先、跟你用 Clinic.js 做效能工程是同一個思想？\n6. 「A-0 是第一個編譯器」這句話要怎麼校準？為什麼答案取決於定義？\n7. 用「複雜度搬家」講清楚：FORTRAN 消滅了什麼、製造了什麼、這個帳單什麼時候會來找你？\n8. 「效能↔生產力」這條鐘擺，為什麼說它「不是階梯」？舉一個你自己回擺（往效能那邊）的真實例子。\n\n## 延伸閱讀\n\n- **John Backus,《The History of FORTRAN I, II, and III》**（HOPL, 1978）——當事人寫的一手史料，講團隊怎麼想、怎麼賭、怎麼做最佳化。讀它對「效能懷疑」與 Section 4/5 的描述。softwarepreservation.computerhistory.org 有全文 PDF。\n- **Backus et al.,《The FORTRAN Automatic Coding System》**（1957 原始論文）——編譯器的原始技術描述，六個 section 的分工在此。要看 Monte Carlo 頻率估計與暫存器配置的原文讀這篇（Stanford 有掃描版）。\n- **The New Stack,〈How John Backus' Fortran Beat the Machine Code 'Priesthood'〉**——把「祭司文化」的敵意與 Backus 如何贏過它講得生動，適合先讀建立畫面感（二手整理，史實以上面兩篇一手為準）。\n- **EDSAC Initial Orders 相關**（Cambridge Computer Lab，Martin Richards 的 EDSAC 資料）——想看「第一個組譯器」長什麼樣、Wheeler 怎麼用 31 個字做出組譯＋載入，看這份。\n- **編譯器原理本身**（lexer / parser / codegen 怎麼運作）不在本書範圍——若想補，經典是「龍書」（Aho et al.,《Compilers: Principles, Techniques, and Tools》），但那是另一條路，本書只關心「這個賭外包了什麼複雜度」。\n"}, {"id": "ch04-lisp-and-algol", "file": "ch04-lisp-and-algol.md", "group": "Part II — 語言的哲學與第一次危機", "title": "ch04 — Lisp 與 Algol：語言開始有哲學", "md": "# ch04 — Lisp 與 Algol：語言開始有哲學\n\n> **本章解決什麼問題**：上一章（見 ch03）語言只是把「對機器說話」外包出去的工具，賭的是效能。到了 1958–60，語言第一次有了**世界觀**——它不只想跑得快，還想表達某種「程式該長什麼樣」的信念。本章撞的是抽象 strand 的一面新牆：當語言開始替你做決定（怎麼配置記憶體、怎麼描述語法、可不可讀），它就把一部分複雜度永久搬進了 runtime 與規格本身。Lisp（程式即資料）與 Algol（結構化、語言的語言）是兩條至今仍流在你 JS 血管裡的血脈；COBOL 則是第三極，示範了「複雜度搬不動」這件事最極端的後果——一個活了六十年的決定。這一章是 Part II 的起點，往後三章（危機、結構化、模組化）都站在這裡分出去的路口上。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol ◄你在這裡  ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)        ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n## 從你已知的出發\n\n打開你任何一個 NestJS 專案，隨手挑一段你天天寫、卻從沒想過「這是誰發明的」的程式碼：\n\n```ts\nconst handlers = routes.map((route) => {\n  const cache = new Map();              // 你不會去 free 它\n  return async (req) => cache.get(req.id) ?? await fetch(route, req);\n});\n```\n\n這短短三行裡，住著兩個來自 1960 年的幽靈。\n\n第一個幽靈是**那個傳進 `map` 的箭頭函式**——一個可以被當成值傳來傳去、還記得外層 `cache` 變數的東西（closure）。你大概覺得「函式是一種值」天經地義，就像你覺得水是濕的。它不是天經地義。它是 1958 年 McCarthy 為了把數學裡的函數搬進機器，刻意做的設計決定。你寫的每一個 callback、每一個 `.map().filter().reduce()`、每一個高階函式，靈魂都來自 Lisp。\n\n第二個幽靈更隱形：**你建了一個 `Map`，卻從來不去回收它**。你信賴一件事——當這個 closure 沒人用了，那塊記憶體會自己消失，你不必寫 `free(cache)`，也不必擔心忘了寫。這份「不必記得 free」的奢侈，是這一章的個案主角。它有名字，叫 garbage collection，1959 年由 McCarthy 為了讓 Lisp 能自由配置記憶體而發明。而你調過的那次 Node.js 記憶體爆掉、盯著 `--max-old-space-size` 和 GC pause 看半天的下午——那就是這份奢侈的帳單，六十多年後寄到你信箱。\n\n至於你那行 `route` 怎麼長成 `routes.map(...)` 這種「大括號分塊、用縮排表達結構、控制流一層套一層」的樣子——那是**第三條血脈**。C 系語法（`{ }`、`if/while`、巢狀區塊）不是 C 發明的，C 是繼承來的。源頭是 Algol 60，一個你大概沒寫過一行、卻決定了你每天敲的每個大括號的語言。\n\n所以你的 JavaScript 是一場混血：**Algol 後裔的骨架（C 系語法、block structure），裝了 Lisp 的靈魂（first-class function、closure、GC）**。這一章要講的，就是這兩條血脈當年各自在賭什麼、為什麼至今還在你身上打架，以及為什麼它們旁邊那條看起來最土的血脈（COBOL）反而活得最久。\n\n## 三條路線：語言第一次需要「相信什麼」\n\nch03 講過 FORTRAN（1957）的賭注：機器產生的碼能不能跟人手寫的一樣快。那是一場關於**效能**的賭。賭贏之後，門打開了——既然高階語言可行，那麼「高階」到底該長什麼樣？1958 到 1960 短短三年，三個答案幾乎同時出現，各自押在不同的價值上：\n\n| 語言 | 年份 | 押注的價值 | 世界觀 | 留給你的遺產 |\n|---|---|---|---|---|\n| **LISP** | 構思 1958、論文 1960 | 數學的優雅、表達力 | 程式和資料是同一種東西 | first-class function、closure、GC、REPL、AST 操作 |\n| **ALGOL 60** | 1960 報告 | 結構的嚴謹、可被精確描述 | 語言該有數學般精確的語法定義 | block structure、C/Pascal/Java 的語法骨架、BNF |\n| **COBOL** | 規格 1959、正式 1960 | 商業的可讀、可維護 | 程式該像英文，讓非數學家也能讀 | 它本身——以及「遷移成本」這堂課 |\n\n注意這張表的重點不是年份，是**它們第一次在「相信什麼」上分了岔**。FORTRAN 只想跑得快，沒空管哲學。這三個有空了。它們定義了往後六十年語言設計的價值光譜：一端是數學家的優雅（Lisp），一端是工程師的結構（Algol），一端是會計師的可讀（COBOL）。你今天選 TypeScript 而不選 Haskell、選 Go 而不選 Clojure，本質上還是在這條光譜上選邊。\n\n## Lisp：當程式發現自己也是資料\n\n先說背景，因為背景就是動機。1950 年代末，McCarthy（John McCarthy）在 MIT 搞的是**人工智慧**——他要讓機器做符號推理、下棋、證明定理。這類問題有個共同特徵：你事先不知道資料會長多大、什麼形狀。一棵推理的樹可能長三層也可能長三百層，一份符號運算式可能五個符號也可能五萬個。FORTRAN 那種「開頭宣告固定大小陣列」的世界對這種工作毫無用處——你怎麼可能事先知道要配多大？\n\n所以 McCarthy 需要一種能**動態長出結構、自由連接、隨意拆開**的資料表示。他的答案是**list**（串列），由一格一格的 **cons cell** 串成——每格裝一個值、一個指向下一格的指標。需要更大就再配一格，需要分支就指出去。LISP 這名字就是 **LISt Processor**。\n\n到這裡都還只是一種資料結構。真正的躍遷是下一步，而這一步是軟體史上最漂亮的一招之一。\n\n### 程式即資料：homoiconicity\n\nMcCarthy 做了一個決定：**程式本身，也用 list 來寫**。\n\n一個函式呼叫 `(+ 1 2)`，在 Lisp 裡就是一個三元素的 list：符號 `+`、數字 `1`、數字 `2`。它既是「把 1 和 2 相加」這段**程式**，又是「一個裝著三個東西的串列」這份**資料**。同一個東西，看你怎麼對待它。這個性質後來有個拗口的名字叫 **homoiconicity**（同像性，code as data），但概念極簡單：**在 Lisp 裡，程式和資料是同一種東西，所以程式可以像捏黏土一樣捏程式**。\n\n這對你意味著什麼？意味著 Lisp 程式可以讀、改、生成另一段 Lisp 程式，因為「另一段程式」對它來說只是一個 list，跟它平常處理的任何 list 沒兩樣。你做過 codegen（你的 OpenAPI schema 自動生出 client）、你用過 AST 工具（Babel、TypeScript compiler API、ESLint 的 rule）去分析或改寫程式碼——你做這些事的時候，得先把原始碼**解析**成一棵抽象語法樹（AST），在那棵樹上動手腳，再**印**回字串。你是在「程式」和「資料」之間來回翻譯，因為在你的語言裡它們本來是兩種東西。\n\nLisp 不用翻譯。**Lisp 的原始碼本來就已經是那棵樹**。括號就是樹枝。這就是為什麼 Lisp 的 macro 系統威力大到嚇人——macro 不是字串替換（像 C 的前置處理器那種危險把戲），而是直接拿一段程式（一個 list）當輸入、回傳另一段程式（另一個 list）。你在 JavaScript 裡得架整套 Babel plugin 基礎設施才能做的事，Lisp 把它做成了語言的內建能力。\n\n我認為這是理解 Lisp 為什麼六十年來一直被「重新發現」的關鍵：每隔一陣子就有人撞上「我需要程式來操作程式」的需求（template engine、ORM 的 query builder、React 的 JSX、各種 DSL），然後慢慢重新發明一個比較笨的 Lisp。Greenspun 那句著名的酸話「任何夠大的 C 或 Fortran 程式，都包含一個臨時、未明確規定、滿是 bug、跑得很慢、只實作了一半的 Common Lisp」——講的就是這件事。\n\n### eval：當紙上的數學被人偷偷編成了機器碼\n\n這是本章必講的故事，因為它把「程式即資料」這個抽象概念，變成了一個有血有肉的歷史時刻。\n\nMcCarthy 在 1960 那篇論文〈Recursive Functions of Symbolic Expressions and Their Computation by Machine, Part I〉裡，為了**證明** Lisp 的表達力夠強，寫了一個叫 `eval` 的函式：一個能讀進任何 Lisp 運算式、並算出它結果的 Lisp 函式。換句話說，他用 Lisp 寫了一個 Lisp 直譯器，當作一份數學上的存在性證明——「看，這語言強到可以描述自己」。在他心裡，這純粹是理論，是寫給人讀的，是黑板上的東西。\n\n然後他的研究生 **Steve Russell**（史提夫·羅素）讀了這份論文，做了一件 McCarthy 沒料到的事：他發現紙上這個 `eval` 可以**直接手工編成 IBM 704 的機器碼**。McCarthy 自己後來的回憶大意是——羅素說「我來把這個 eval 寫成程式吧」，McCarthy 笑他「ho, ho，你把理論跟實務搞混了，這個 eval 是寫來讀的，不是拿來算的」。但羅素不管，真的把論文裡的 eval 一行一行編成機器碼、修掉 bug，然後宣布這是一個 Lisp 直譯器——而它確實就是。（此事為 McCarthy 本人多次轉述，史料一致。）\n\n這個故事為什麼重要？因為它是「程式即資料」的活體示範。一個本來只是**寫在紙上描述計算的東西**（資料、規格、證明），被當成**程式**跑了起來。理論和實作之間那道牆，被 homoiconicity 這個設計直接捅穿了。順帶一提，這也是世界上第一個 REPL 的雛形——你在 Node.js 終端機敲 `node` 進去那個互動環境、即打即評估的體驗，血緣可以一路追到羅素 1959 年那次「不聽勸」。\n\n## 個案：garbage collection 的誕生——把「記得 free」永久外包\n\n現在來到本章的 worked example，也是你最有切膚之痛的一筆帳。\n\n回到 cons cell。McCarthy 的 Lisp 要做符號推理，就得不停地配置新的 cons cell——每長出一個串列節點配一格，每做一次運算可能產生一堆中間結構。問題立刻來了：**這些 cell 用完之後怎麼辦？**\n\n在 1959 年，標準答案是「程式設計師自己負責」。你配置（allocate）了記憶體，你就得記得在用完時歸還（free）。FORTRAN、組語、後來的 C，全都是這套規矩。但 McCarthy 的工作有個要命的特性：**串列結構會互相共享、互相指來指去**。同一個 cons cell 可能被三個不同的串列同時指到。這時候「誰該負責 free 它」根本算不清——你 free 早了，另外兩個串列就指向一塊被回收的廢墟（懸空指標）；你 free 晚了或忘了，記憶體就慢慢漏光。在一個會自動長出任意形狀結構的系統裡，要人腦去追蹤「每一格現在還有沒有人在用」，是不可能的任務。這就是 McCarthy 撞上的那面牆：**動態、共享的資料結構，讓手動記憶體管理在認知上破產**。\n\n他翻越這面牆的方式，是發明 **garbage collection**：讓 runtime 自己定期掃描，找出「從程式還搆得到的」所有 cell（從根開始追指標，能走到的就是活的），其餘搆不到的就是垃圾，整批回收。程式設計師再也不必寫 `free`——你只管配置，回收是 runtime 的事。這個概念第一次被描述，就在 1960 那篇 Lisp 論文裡，只佔了一頁多，講的是後來人人都學過的 mark-and-sweep。\n\n停下來體會一下這一跳的份量。**McCarthy 把「記得 free」這件事，從每一個程式設計師的腦袋裡，永久搬進了 runtime。** 這是你今天能寫出本章開頭那段「建個 Map 卻從不回收」程式碼的全部原因。你寫 JavaScript、Java、Python、Go——你信賴 GC，你的整個職業生涯幾乎沒手動 free 過記憶體，這份信賴的源頭就是 1959 年那群在 MIT 配置 cons cell 的人。\n\n但這是一本講「複雜度守恆」的書。複雜度沒有消失，它搬家了。下一節結帳。\n\n## Algol：語言的語言\n\n如果說 Lisp 押的是「表達力」，Algol 60 押的是「精確」。而且 Algol 的影響力有個弔詭之處：**幾乎沒人用它寫過正式產品，它卻是你今天用的幾乎每個語言的祖宗**。\n\nAlgol（ALGOrithmic Language）60 是一個國際委員會的產物，1960 年在巴黎定案，編輯是 **Peter Naur**（彼得·諾爾）。它的目標很學術：做一個乾淨、通用、能精確描述演算法的語言。它帶來了兩樣東西，至今活在你每一行程式裡。\n\n### Block structure：你的大括號從哪來\n\n第一樣是 **block structure**——用 `begin ... end`（後來在 C 系變成 `{ ... }`）把一群陳述句框成一個區塊，區塊可以巢狀，變數有**語彙作用域**（lexical scope，在哪個區塊宣告就只在那個區塊裡有效）。\n\n這聽起來平淡到不值一提，因為你從寫程式第一天起就活在這個世界裡。但在 Algol 之前，控制流主要靠 GOTO 跳來跳去（這條線會在 ch05 軟體危機那章爆發成大事），變數多半是全域的。Algol 說：不，程式有**結構**，結構可以巢狀，而且這個結構應該直接反映在你寫的程式長相上——縮排、巢狀、區塊。你 ESLint 設的 `max-depth`、你 code review 時嫌人家巢狀太深要求早 return——你管的那個「深度」，正是 Algol 在 1960 年發明的概念。你寫的每一對大括號，都是 Algol 的後代。C 從 Algol/BCPL 一脈繼承了它，C 又生了 C++、Java、JavaScript、Go……你的 NestJS 那層層 `{ }`，族譜直通巴黎那場會議。\n\n### BNF：用一個語言去描述另一個語言\n\n第二樣更深，也是 Algol 最被低估的貢獻：**BNF（Backus–Naur Form）**。\n\n問題是這樣的：你要怎麼**精確地**告訴別人（和編譯器）「這個語言的語法長什麼樣」？在 Algol 之前，語言的語法都是用自然語言含混描述的——「一個運算式可以是一個數字，或者兩個運算式中間加個運算子」——這種描述充滿歧義，不同人實作出來的編譯器行為都不一樣。\n\nBNF 是一套**用來描述語法的形式記號**：你用一組規則（grammar）精確定義「什麼樣的字串才是合法的程式」。它最初由 John Backus 為描述 Algol 提出、Peter Naur 在 Algol 60 報告裡改良採用，所以叫 Backus–Naur Form。這是史上第一次，一個程式語言的語法被用**數學般的嚴謹**寫下來，而不是靠自然語言比手畫腳。\n\n這件事的份量你每天在吃它的紅利卻看不見它。任何 parser generator（你可能用過或聽過的 ANTLR、Yacc、PEG）、任何語言的官方語法規格、你 TypeScript compiler 背後那套把原始碼切成 token 再組成 AST 的機器——全都站在 BNF 上。「用一個形式系統去精確描述另一個語言的結構」這個想法，是 Algol 留給整個 CS 的工具。注意這裡的對稱性：Lisp 讓**程式**變成可操作的資料；Algol（透過 BNF）讓**語言的語法**變成可精確描述的形式對象。兩條血脈都在做「把某種原本含混、靠人腦掌握的東西，變成可被機器精確處理的形式」——只是下手的層次不同。\n\n### Hoare 的悼詞\n\nAlgol 60 商業上不算成功（太學術、IBM 沒大力推、I/O 規格留白），但它在語言設計圈的地位近乎神話。最常被引的評價來自 **C. A. R. Hoare**（東尼·霍爾，後來發明 Quicksort、Hoare logic 的那位），在他 1980 年的圖靈獎演說〈The Emperor's Old Clothes〉（刊於 *CACM* 1981）裡論 Algol 60：\n\n> 「Here is a language so far ahead of its time that it was not only an improvement on its predecessors but also on nearly all its successors.」\n> （這是一個遠遠超越其時代的語言，它不只勝過它的前輩，也勝過它幾乎所有的後繼者。）\n\n這句話之所以辛辣，在於「也勝過它幾乎所有的後繼者」——Hoare 是在說，後來那些更紅、更實用的語言（包括把 null 引進來、被他自己稱為「十億美元錯誤」的那些設計，見 ch08），有些地方反而**退步**了。一個遠超時代的設計，可能要等幾十年，後人才慢慢追回它已經想清楚的東西。這個「好點子提早出現、然後被市場繞過、幾十年後才被重新需要」的模式，你會在這本書裡反覆看到（函數式的回歸是最戲劇化的一次，見 ch09）。\n\n## COBOL：複雜度搬不動的活標本\n\n第三條路線，和前兩條的氣質完全相反。Lisp 是數學家寫給數學家的，Algol 是電腦科學家寫給電腦科學家的，**COBOL（COmmon Business-Oriented Language）是工程師寫給「不是工程師的人也要看得懂」的**。\n\nCOBOL 規格 1959 公布、1960 正式，出自 CODASYL 委員會。**Grace Hopper**（葛麗絲·霍普）透過她先前的 FLOW-MATIC 語言深刻影響了它的設計方向——注意是「深刻影響」，不是「唯一作者」，COBOL 是委員會的集體產物。它的核心信念是：**程式碼應該像英文一樣可讀**，讓商業領域的人（而不只是寫程式的人）能看懂、能稽核。所以你會看到 COBOL 寫成這樣：`MULTIPLY HOURS BY RATE GIVING GROSS-PAY.`——幾乎是一句英文。\n\n在 1960 年，這是個合理的賭。當時程式設計師稀缺、商業電腦化正要起飛，「讓更多人能讀程式」直接對應到真金白銀的成本。Lisp 押表達力、Algol 押結構、COBOL 押**可讀與可維護**——三條路線各自押在語言設計價值光譜的一端，沒有誰天生比較蠢。\n\n但 COBOL 在這本書裡的角色，不是它的設計，而是**它的壽命**。它活了六十多年。直到今天（2026-06），全球大量銀行、保險、政府的核心系統，底層還在跑 COBOL。\n\n這裡要極度小心地處理數字。你會在網路上讀到各種驚人統計——「全球還有兩千多億行 COBOL 在跑」「43% 的銀行系統」「每天處理數兆美元交易」。**這些數字幾乎全部源自單一來源（多半輾轉自一份 Reuters 的估計），彼此還互相矛盾**（我查證時就同時看到「2,200 億行」和「8,000 億行」兩種版本）。所以本書的立場是：**COBOL 至今仍大量運行於金融與政府核心系統，這件事是真的；但任何具體行數、市佔、交易額都只是某個單一來源的估計，不可當確切事實引用**。重點不在數字多大，在於「它就是搬不動」這個現象本身。\n\n那麼問題來了：COBOL 既不優雅（Lisp 笑它土）也不嚴謹（Algol 嫌它鬆），為什麼偏偏是它活得最久？\n\n**答案就是這本書的核心主張：複雜度守恆，而 COBOL 系統裡的複雜度，搬不動。**\n\n一個跑了四十年的銀行核心系統，它的價值早就不在那幾百萬行 COBOL 程式碼本身，而在**那些程式碼裡固化的業務邏輯**——四十年來無數監管規則、邊界案例、特殊處理、「為什麼這裡要這樣算」的決定，層層疊疊堆進了程式裡，而且**大多沒有寫進任何文件**。寫程式的人退休了、走了、過世了，知識只剩在程式碼裡。你想把它遷移到「現代」系統，等於要先把這四十年的隱性知識**逆向工程**出來——而你連需求是什麼都搞不清楚（這正是 ch10 會講的「本質複雜度」：搞清楚到底要建什麼，這部分的複雜度任何工具都砍不掉）。業界對大型 legacy 重寫的失敗率有各種估計，普遍偏高；澳洲一家銀行的核心遷移傳出耗時五年、花掉十億澳幣量級的成本（單一來源，數字僅供示意）。\n\n所以 COBOL 不死，**不是因為它好，是因為遷移成本＝複雜度搬不動**。那些複雜度沒消失、也沒辦法搬到別的地方，它就卡在那裡，逼著一整個產業繼續餵養六十年前的語言。這是「複雜度守恆」最冷酷的版本：有時候複雜度不只是搬到別人看不見的地方，而是**重到誰也搬不動，只能繞著它蓋房子**。\n\n你的職涯裡會遇到你自己的 COBOL——某個沒人敢動的服務、某段註解寫著「別碰，會壞，原因不明」的程式碼、某個遷移計畫年年列進 roadmap 又年年砍掉。當你遇到它，記得這不是哪個前人偷懶，這是複雜度守恆在小尺度上的重演。\n\n## 複雜度搬去哪了\n\n這一章其實搬了三次家，方向各不相同。把帳結清楚：\n\n| 躍遷 | 消滅了什麼負擔 | 製造了什麼新負擔 | 在什麼情況下洩漏／反噬 | 這一跳的帳單 |\n|---|---|---|---|---|\n| **Lisp：程式即資料** | 「操作程式」不再需要在 code 與 data 兩種表示間翻譯（macro、REPL、自舉直譯器幾乎免費） | 一切都是括號的串列，可讀性與工具支援的代價；強大到容易自造方言、生態碎裂 | 當 macro 被濫用，程式變成「只有作者懂的私房語言」——彈性過頭反成複雜度 | 用「無結構的均質性」換來「無上限的表達力」 |\n| **Lisp：garbage collection** | 程式設計師永遠不必再記得 `free`、不必再追懸空指標與記憶體洩漏 | 「何時回收」的決定權交給 runtime，你失去了對時機的控制 | GC pause（stop-the-world 停頓）、記憶體用量比手動管理高、在低延遲/即時場景會咬你 | 用「不可預測的延遲尖刺」換來「不必記得 free 的奢侈」——**這就是你那次 Node.js 堆積記憶體與 GC pause 的帳** |\n| **Algol：block structure＋BNF** | 控制流不再是 GOTO 的義大利麵；語法不再靠自然語言含混描述 | 語言設計變成一門需要形式規格的嚴肅工程；門檻變高 | 規格與實作的落差（編譯器沒完全照 BNF 實作），以及過度結構化的儀式感 | 用「形式化的前期成本」換來「可精確描述、可自動解析的語言」 |\n| **COBOL：複雜度搬不動** | （當年）讓非程式設計師也能讀程式、降低人力門檻 | 業務知識固化進程式碼、無文件、隨人員流失而失傳 | 六十年後遷移成本高到沒人敢動，整個產業被鎖死 | 用「四十年後的不可遷移性」換來「當年的可讀性」——複雜度重到搬不動 |\n\n**這四筆帳裡，GC 那一筆是你最該記住的。** 它是「複雜度守恆」最乾淨的示範：手動 free 的負擔沒有消失，它從「你的腦袋」搬到了「runtime 的 GC 排程器」。大部分時候你享受著它（寫了六年程式幾乎沒 free 過記憶體），直到某個高負載的尖峰，GC 決定 stop-the-world、你的 p99 延遲突然爆了一根尖刺——這時帳單就回來找你了，你得跳進 V8 的堆積快照、調 GC 參數、改你的配置模式去減少垃圾產生。**抽象洩漏的時候，你得能跳到它底下**（這正是 ch19 的主題）。McCarthy 1959 年那個善意的決定，六十多年後變成你下午的 debug 工作——而這完全公平，因為那份奢侈你已經免費享受了六年。\n\n## 紙上推演\n\n### 推演題 1 — 把「程式即資料」對應回你的 codegen 經驗 **[20 分鐘] ★★**\n\n你做過 OpenAPI schema → client 程式碼的自動生成，也用過 AST 工具（Babel／TS compiler API／ESLint rule）去分析或改寫程式碼。請口頭講清楚：（a）你做這些事時，原始碼在你手上經歷了哪幾種「形態」？（b）Lisp 的 homoiconicity 讓哪一步消失了？（c）為什麼這個差異讓 Lisp 的 macro 比你的 Babel plugin 更直接？\n\n#### 推演解答\n\n（a）在你的世界裡，原始碼經歷三種形態：**字串**（檔案裡的文字）→ **AST**（parser 把字串解析成的樹）→ 改完之後再**印回字串**（serialize/codegen）。你的工作永遠是「先把程式 parse 成資料，動完手腳再把資料 print 回程式」。OpenAPI codegen 也一樣：schema（資料）→ 你的生成器邏輯 → 吐出 client 程式碼（字串）。\n\n（b）Lisp 讓 **parse 和 print 這兩步幾乎消失**。因為 Lisp 的原始碼**本來就已經是 list**（那棵 AST），不需要把字串解析成樹——括號就是樹。你拿到的程式，本來就是你平常處理的那種資料結構。\n\n（c）你的 Babel plugin 要能跑，背後得有一整套基礎設施：lexer、parser、AST 節點型別定義、visitor pattern、再把改過的 AST 印回合法的 JavaScript。Lisp 的 macro 不需要這些——macro 就是一個「吃一段 list、吐一段 list」的普通函式，因為程式和資料是同一種東西。常見誤解是把 Lisp macro 想成 C 的 `#define` 那種字串替換；不是，C 的前置處理器在「字串」層次盲目貼字，不懂結構，所以危險；Lisp macro 在「結構（list/AST）」層次操作，安全得多。這就是 homoiconicity 的實際紅利：你在 JS 裡得自己搭一座橋（Babel）才能跨越的 code↔data 鴻溝，在 Lisp 裡根本不存在那條鴻溝。\n\n### 推演題 2 — 用「複雜度搬不動」論證為什麼 COBOL 還沒死 **[15 分鐘] ★★**\n\n有人對你說：「COBOL 又老又醜，這麼多年了銀行怎麼還不換掉？一定是那些老古板不思進取。」請用本書的「複雜度守恆／搬不動」框架，給一個比「老古板不思進取」更深的解釋。注意：論證裡如果要提到行數或金額，你必須怎麼說？\n\n#### 推演解答\n\n關鍵不在 COBOL 這個語言，在於**那些 COBOL 程式碼裡固化了什麼**。一個跑了四十年的核心系統，真正的資產不是程式碼，是四十年來層層堆進去的**業務邏輯**——監管規則、邊界案例、特殊處理、「為什麼這筆要這樣算」的無數決定，而且大多**沒有文件**，知識隨著原作者退休而流失。\n\n要遷移，你得先把這四十年的隱性知識逆向工程出來——你連「需求到底是什麼」都搞不清楚。這部分的複雜度（搞清楚要建什麼）是**本質複雜度**（ch10 會正式定義），不是換個語言、換個框架就能砍掉的。所以複雜度不是搬到別處，是**重到搬不動**：它卡在原地，逼整個產業繞著它蓋房子。COBOL 不死不是因為它好，是因為**遷移成本＝複雜度搬不動**。\n\n至於數字：你**必須** hedge。不能說「全球有 X 億行 COBOL」當定論，因為這類統計幾乎全來自單一來源、彼此矛盾（我查到的就有「2,200 億行」與「8,000 億行」兩種）。正確說法是「**據（單一來源）估計**，COBOL 仍大量運行於金融核心系統」——現象是真的，確切數字一律標為估計。這個自律本身就是一種專業：分得清「廣為流傳」和「經得起查證」。\n\n### 推演題 3 — 反事實：如果 Algol 沒發明 BNF **[20 分鐘] ★★★**\n\n假設歷史走了另一條路：Algol 60 沒有用 BNF，語言語法繼續像 1950 年代那樣用自然語言描述。請推演：（a）這會讓「實作一個編譯器」這件事變難在哪？（b）這對「同一個語言在不同機器上行為一致」有什麼影響？（c）把這個反事實接回本章主題——BNF 把哪一種複雜度從哪裡搬到了哪裡？\n\n#### 推演解答\n\n（a）沒有 BNF，語法只能靠自然語言描述（「一個運算式可以是一個數字，或兩個運算式中間加運算子」）。自然語言充滿歧義：邊界案例怎麼算？運算子優先順序到底誰先？巢狀深度有沒有上限？每個讀規格的人理解都不同，於是每個人實作出來的 parser 行為都不一樣。實作編譯器從「照著一套精確規則把 token 組成樹」退化成「猜原作者到底是什麼意思」。\n\n（b）災難性影響：A 廠的編譯器和 B 廠的編譯器對同一段程式可能解析出不同結果，因為它們對含混的規格各有各的解讀。「同一個語言」名存實亡，每家實作都是方言。可移植性（ch03 講過這是高階語言的賣點）會嚴重打折。\n\n（c）BNF 把「語法的歧義」這種複雜度，從**每個編譯器實作者各自的腦袋與猜測**，搬到了**一份所有人共享的、形式化的精確規格**。代價（帳單）是前期成本變高——你得先學會用形式記號精確描述語法，語言設計變成一門嚴肅工程而非隨手定義。但收益是：歧義被一次性消滅在規格層，下游所有實作者拿到的是同一份不會吵架的真相。這和 Lisp 用 homoiconicity 把「程式」變成可操作對象是同一種衝動的兩面——**把原本靠人腦含混掌握的東西，變成可被機器精確處理的形式**。\n\n## 自我檢核\n\n口頭回答，講得出因果才算過關（不是背年份）：\n\n1. 為什麼說你的 JavaScript 是 Algol 和 Lisp 的混血？分別指出哪些東西來自哪一條血脈，並各舉一個你天天寫的具體例子。\n2. 「程式即資料（homoiconicity）」具體是什麼意思？用 `(+ 1 2)` 同時是程式又是資料來解釋。它讓 Lisp 的 macro 比你的 Babel plugin 強在哪？\n3. McCarthy 為什麼**需要**發明 garbage collection？（提示：從 cons cell 會共享、結構會動態長大講起，講到為什麼手動 free 在這種系統裡算不清。）\n4. GC 是「複雜度守恆」的範例——手動 free 的負擔沒消失，它搬去哪了？帳單在什麼時候、以什麼形式回來找你？把它接回你調過的 Node.js GC pause。\n5. BNF 解決了什麼問題？如果沒有它，「實作一個編譯器」和「語言的可移植性」會變難在哪？\n6. Hoare 說 Algol 60「不只勝過前輩，也勝過它幾乎所有的後繼者」——這句話辛辣在哪？它暗示了一個本書反覆出現的模式，是哪個模式？\n7. COBOL 又土又老，為什麼偏偏活得最久？用「複雜度搬不動」回答，而不是「銀行老古板」。當你被問到 COBOL 的行數或市佔時，你**必須**怎麼說、為什麼？\n8. 這三條路線（Lisp 數學、Algol 結構、COBOL 商業）各押在「語言設計價值光譜」的哪一端？你今天選 TypeScript 而非 Haskell、選 Go 而非 Clojure，是在這條光譜上怎麼選的？\n\n## 延伸閱讀\n\n- **John McCarthy,〈Recursive Functions of Symbolic Expressions and Their Computation by Machine, Part I〉(*CACM*, 1960)** — Lisp 的原典，garbage collection 第一次被描述就在這裡（只佔一頁多）。原文 PDF：`http://jmc.stanford.edu/articles/lisp/lisp.pdf`。不必全讀，看它怎麼用 eval 證明語言能描述自己——那就是「程式即資料」的最初現場。\n- **John McCarthy,〈History of Lisp〉(1979)** — McCarthy 本人回顧 Lisp 怎麼長出來，包括 Steve Russell 把 eval 編成機器碼那段的第一手敘述（Stanford 線上有原文）。想聽當事人講「我笑他把理論跟實務搞混」的人讀這篇。\n- **C. A. R. Hoare,〈The Emperor's Old Clothes〉(1980 圖靈獎演說，刊 *CACM* 24(2), 1981)** — 「a language so far ahead of its time…」這句話的原始出處。整篇是一位大師對「簡單 vs 複雜」的反省，和本書「複雜度守恆」的主題直接共鳴，值得完整讀一遍。\n- **ALGOL 60 Report (Naur 編, 1960)** — 想親眼看 BNF 第一次被用來描述一個真語言長什麼樣，翻這份報告的語法定義段落。歷史文件，當古蹟看，看「用形式記號描述語法」這件事在 1960 年是多新的東西。\n- **Paul Graham,〈The Roots of Lisp〉** — 用現代讀者讀得懂的方式重講 McCarthy 1960 論文的核心（eval 的七個原始運算子）。如果原典太硬，從這篇進去（Graham 個人網站有 PDF）。\n- **延伸（COBOL 壽命）**：IEEE *Spectrum*「COBOL programming shelf life」一類報導 — 看「為什麼這語言不死」的當代討論。讀的時候練本章教的自律：凡看到行數/金額統計，先問「這數字有幾個獨立來源」，多半只有一個。\n"}, {"id": "ch05-software-crisis", "file": "ch05-software-crisis.md", "group": "Part II — 語言的哲學與第一次危機", "title": "ch05 — 軟體危機與結構化編程：方法 strand 登場", "md": "# ch05 — 軟體危機與結構化編程：方法 strand 登場\n\n> **本章解決什麼問題**：前四章蓋的都是「抽象 strand」——把對機器說話這件事一層層外包出去（組語、編譯器、高階語言、語言哲學）。但 1960 年代末，業界撞上一面新的牆：抽象讓寫程式變便宜了，於是程式變大了，大到一個人腦再也裝不下整份控制流。這面牆不是「機器不夠快」或「語言不夠高階」能翻過去的——它是人的牆。1968 年的 NATO 會議替它取了名字：software crisis。對它的第一波回應不是新語言、而是新紀律：結構化編程。本章是「方法 strand」第一次正式登場，也是兩條 strand 第一次明顯交織——結構化編程同時是語言事件（控制結構）與方法事件（寫程式的規矩）。\n\n## 從你已知的出發\n\n你每天都在執行 1968 年那場危機的對策，只是沒人告訴你它有名字。\n\n第一個場景：你做 code review，看到一個 service method 縮排縮到第六層——`if` 裡面 `for`、`for` 裡面 `try`、`try` 裡面又一個 `if`，每一層都 early-`continue` 或 `throw` 跳出去。你不會逐行讀它，你直接留言：「拆函式、early return、把巢狀壓平。」你說不出完整的學理，但你知道一件事——**這段程式碼能不能跑是一回事，你的腦袋能不能在三十秒內確定它做了什麼，是另一回事**。你守的是後者。\n\n第二個場景：你接手別人的 async 流程，`Promise.all` 包著 `.then` 包著一個會 re-throw 的 `catch`，中間還夾一個 `await` 在迴圈裡。程式是對的，CI 也綠的，但你盯著看了二十分鐘還是說不準「如果第三個 promise 失敗、第一個已經 resolve，現在的狀態是什麼」。你不是看不懂語法，你是**追不上執行的時候那段文字會怎麼活過來**。你讀到的是攤平在螢幕上的靜態文字，你要在腦中重建的是它沿時間軸跑起來的動態過程——這兩者之間有一道鴻溝，而它寬到你的工作記憶接不住。\n\n第三個場景：你的 lint 設定裡有 `max-depth`、`complexity`（cyclomatic complexity）、`max-nested-callbacks` 這幾條規則，CI 會擋。你大概把它們當成「團隊風格潔癖」。它們不是。它們是 1968 年那道牆在 2026 年的化石——是一群人在發現「程式大到人腦裝不下」之後,逼出來的量化防線的直系後裔。\n\n這三件事——壓巢狀、追不上 async、lint 擋複雜度——是同一個問題的三張臉。本章告訴你這張臉第一次被看清楚是什麼時候、被誰、用什麼話講出來的。先說結論裡最反直覺的一條：你以為的「Dijkstra 說 GOTO 是邪惡的」，是後世把一篇精緻論證壓扁成的口號；他真正說的，是上面第二個場景——靜態文字與動態過程的鴻溝。\n\n## 1968：抽象成功了，於是撞上人的牆\n\n先把因果接好，不要把「軟體危機」當成一個憑空冒出來的災難。它恰恰是前幾章那些勝利的帳單。\n\n回想這條線：儲存程式讓程式變成可操作的資料（見 ch02），組語與編譯器把「對機器說話」外包出去（見 ch03），FORTRAN 賭贏了「機器產生的碼夠快」，高階語言讓寫程式變便宜（見 ch03–ch04）。每一跳都在降低「寫出一行能跑的程式」的成本。而成本一降，需求就膨脹——這是軟體業七十年來最穩定的規律之一。1960 年代中後期，硬體（IBM System/360 那一代）開始支撐前所未有的大型系統：作業系統、航空訂位、軍事指揮、銀行批次。程式的尺度從「一個人寫幾百行」跳到「幾百人寫幾十萬行、跨好幾年」。\n\n問題來了：抽象解決的是「人對機器說話」的複雜度，它對「**人對人、人對自己過去寫的程式**」這層複雜度束手無策。一個一百萬行、由三百人寫了三年的系統，沒有任何一個人的腦袋裝得下它的全貌。沒人知道改這裡會不會弄壞那裡；沒人能保證它在所有輸入下都對；進度表變成集體幻覺。系統超支、延遲、上線即不可靠——而且大家本來以為這是自己團隊管理不善，直到他們聚在一起，才發現所有人都在淹同一片水。\n\n這個「集體覺醒」發生在一個具體的房間裡。**1968 年 10 月 7 至 11 日，NATO 在德國的 Garmisch 辦了一場會議**，主席是 Friedrich L. Bauer，報告由 Peter Naur 與 Brian Randell 編成。會議名稱本身就是一記挑釁——叫「Software **Engineering**」。\n\n這個命名要慢慢品。當時根本沒有「軟體工程」這門學科；把寫程式跟「工程」並列，是 Bauer 一群人故意選的、帶刺的措辭。潛台詞是：橋樑工程師蓋橋會算載重、會有規範、會被究責，而我們寫軟體像在憑感覺施工、出事就攤手——**我們配不上「工程」這兩個字，現在開始該配上**。會議名是一個目標，不是一個現況描述。這是「方法 strand」的出生證明：第一次，一群人公開承認「我們怎麼蓋」本身是個獨立的、需要被嚴肅對待的問題，跟「我們用什麼蓋」一樣重要。\n\n> **流行說法 vs 史實**\n>\n> | 流行說法 | 史實（照查證） |\n> |---|---|\n> | 「software crisis」是某一個人發明的金句 | 是 1968 Garmisch 與會者的集體共識用語，難歸給單一人；會議報告（Naur & Randell 編）是一手出處 |\n> | 「software engineering」是中性的學科名 | 是 Bauer 一群人**刻意挑釁**選的名字，潛台詞是「我們還配不上工程」 |\n> | 軟體危機是某次大專案爆炸引發的單一事件 | 是一整代大型系統（OS/360 等）普遍超支/延遲/不可靠的**集體覺醒**，會上眾人才發現彼此淹在同一片水 |\n\n撞的是哪一面複雜度的牆？是**規模對上人腦容量**的牆。前幾章翻越的是「機器太笨、要手動」的牆，用的是抽象；這一章的牆抽象翻不過去，因為牆的另一邊是人類認知的固定上限——你沒辦法靠發明一個更高階的語言，就把一個人能同時握住的概念數量變多。既然牆是人的牆，對策也只能是人的對策：紀律。怎麼寫、寫成什麼形狀、不准寫成什麼形狀——這就是結構化編程要管的事。\n\n## Dijkstra 真正說了什麼：不是 GOTO 邪惡，是文字與過程的鴻溝\n\n同一年，1968 年 3 月，*Communications of the ACM* 刊了一封短信，作者 Edsger W. Dijkstra，標題是後來人人會背的那句：**「Go To Statement Considered Harmful」**。這篇是「方法 strand」的第一份技術綱領，也是全書最常被引錯的文獻之一。先拆兩個你大概信了很久的誤解。\n\n**誤解一：標題是 Dijkstra 自己下的。** 不是。Dijkstra 投稿時原題是「**A Case against the GO TO Statement**」——「反對 GOTO 的一個論證」，是一篇有立論的文章。把它改成「Considered Harmful」這種斬釘截鐵、像道德判決的句型的，是當時 CACM 的編輯 **Niklaus Wirth**（Pascal 之父）；他為了加快刊登，把它改成 letter 的形式並換了這個標題。換句話說，那個流傳半個世紀、被無數「X Considered Harmful」標題模仿到爛的句型，根本不是原作者的語氣。順帶一提，這也是為什麼後來有人寫「'Considered Harmful' Essays Considered Harmful」來反諷——這個句型已經變成一種廉價的、把複雜權衡壓成口號的寫作公式。\n\n**誤解二（更重要）：Dijkstra 說 GOTO 是邪惡的、該禁。** 這是把論證讀成了禁令。Dijkstra 反 GOTO 的真正理由，跟「邪惡」「乾淨」這類美學或道德詞沒有關係。他的論證是一個關於**人腦怎麼運作**的觀察。原文兩句話是整篇的鑰匙（以下為原文，未經改寫）：\n\n> \"Our intellectual powers are rather geared to master static relations and that our powers to visualize processes evolving in time are relatively poorly developed.\"\n\n> \"We should do (as wise programmers aware of our limitations) our utmost best to shorten the conceptual gap between the static program and the dynamic process, to make the correspondence between the program (spread out in text space) and the process (spread out in time) as trivial as possible.\"\n\n翻成你的話：**我們的腦袋擅長處理靜態的關係，不擅長想像「沿時間演化的過程」**；所以聰明的程式設計師應該盡力縮短「攤在文字裡的程式」和「跑在時間裡的過程」這兩者之間的鴻溝，讓「讀到的文字」對應到「會發生的事」這件事盡可能簡單。\n\n這就是你 code review 第二個場景的學名。你追不上那段 async，不是因為你笨，是因為那段程式的「文字順序」和「執行順序」對不起來——你眼睛由上往下讀，程式卻在 `await`、`catch`、callback 之間跳著跑。Dijkstra 在 1968 年講的，正是這個對不上。\n\nGOTO 在這裡只是頭號嫌犯，不是論證的核心。為什麼 GOTO 最糟？因為它讓「文字位置」和「執行到哪了」徹底脫鉤。考慮一個問題：程式跑到某一行時，你想問「我是怎麼走到這裡的？現在的狀態該滿足什麼條件？」。在沒有 GOTO 的結構化程式裡，這個問題有有限、可數的答案——你可以用「進到這個迴圈第幾圈」「走的是 `if` 的哪一支」這種**座標**把執行點標定出來。Dijkstra 的原文就在追求這個：他想要一組能精準描述「過程進行到哪」的座標，而 GOTO 把座標系炸碎了。一個可以從任何地方跳到任何地方的程式，你無法用任何有限的標記說清楚「執行到此處時，之前發生過什麼」。文字不再能當作過程的地圖。\n\n所以準確的一句話是：**Dijkstra 反對的不是 GOTO 這個關鍵字，而是「讓靜態程式文字無法充當動態執行過程之地圖」的那種控制流**。GOTO 是製造這種控制流最方便的工具，所以它被點名。把這篇讀成「GOTO 邪惡」，等於把一篇講人類認知極限的論文，降格成一條風格規則。\n\n## 結構化編程：人腦裝不下，就只用人腦裝得下的三種積木\n\n如果問題是「人腦追不上任意跳轉」，那解法的形狀就清楚了：**只准用那些『文字能當過程地圖』的控制結構**。這就是結構化編程（structured programming）的核心主張，而它有一個漂亮的數學靠山。\n\n**1966 年，Corrado Böhm 與 Giuseppe Jacopini** 發表了一篇論文（題為「Flow Diagrams, Turing Machines and Languages with Only Two Formation Rules」，刊於 CACM），後世稱為**結構化定理**（structured program theorem）。它證明了一件讓「禁 GOTO」從美學變成可行工程主張的事：**任何可計算的程式，都可以只用三種控制結構改寫出來**——\n\n- **循序（sequence）**：一件事做完做下一件，由上而下。\n- **選擇（selection）**：`if/else`，依條件走兩條路之一。\n- **迭代（iteration）**：`while`，條件成立就重複。\n\n換句話說，GOTO 在表達能力上不是必需品。你不會因為放棄它而少算任何一個函式——你頂多需要多引一個布林變數或多包一層迴圈。這一點至關重要：它把「我們應該放棄 GOTO」從「一種品味」升級成「一種沒有功能代價的紀律」。你不是在能力與整潔之間取捨，你是用零表達力成本，換來「文字能當過程地圖」。Dijkstra 本人引用過這篇——理論（Böhm-Jacopini 說三種就夠）與綱領（Dijkstra 說所以別用 GOTO）在此扣上。\n\n為什麼這三種積木「人腦裝得下」，而 GOTO「裝不下」？關鍵字是**單一入口、單一出口**。這三種結構每一種都是一個只有一個入口、一個出口的盒子。盒子可以裝盒子（`if` 裡面放 `while`），但盒子之間不會交叉穿透。於是任何一段程式都對應到一個乾淨的巢狀結構，而巢狀結構有一個救命的性質：**你可以在任何一層把下面整個盒子「摺起來」當成一個黑箱**，只看這一層的循序/選擇/迭代,而不必同時把所有層的細節都握在腦中。\n\n這正好對上人腦的硬限制。心理學裡有個著名的數字：George Miller 1956 年的「神奇數字 7±2」（短期記憶能握住約七個項目）。要誠實說，這個「七」現在被認為更像一句修辭、被高估了——Nelson Cowan 2001 年控制掉複誦效應後重估，真正的工作記憶容量大約是**四個**塊（chunk）。不論你信七還是信四，重點是同一個：**那個數字是個位數，而且小得可憐**。一個一百萬行的系統有遠超四個的活動部件。你之所以還能改它，唯一的辦法就是任何時刻只把四個左右的塊調進工作記憶、其餘全部摺成黑箱。結構化編程的三種積木，恰好就是「保證任何程式都能被這樣一層層摺起來」的積木。GOTO 不能摺——一條從盒子中間射進另一個盒子中間的跳轉，讓你沒辦法把任何東西當黑箱，因為黑箱的邊界被射穿了。\n\n這裡值得停一下，挑明本書的一個立場：**結構化編程的好處不是美學，是認知工程**。把巢狀壓平、early return、控制圈複雜度——這些不是為了讓程式「好看」，是為了讓任意一段程式碼所需的工作記憶量，壓回那個可憐的個位數以下。當你 review 時要求別人別寫巢狀地獄，你不是在伸張品味，你是在替對方的（以及未來所有讀者的）工作記憶省額度。這是 1968 年那群人留給你的、最被低估的一份遺產。\n\n## 個案：一段義大利麵，攤開給你看人腦在哪裡斷線\n\n抽象講完，來看實物。下面是同一段邏輯的兩個版本：「在陣列裡找第一個負數，找到就回報它的位置，沒有就回報找不到」。第一個版本用 GOTO 寫（仿 1960 年代 BASIC/FORTRAN 風格的虛擬碼），第二個用結構化控制流寫。\n\n**版本 A：GOTO 義大利麵**\n\n```text\n        10  i = 0\n        20  IF i >= len THEN GOTO 60\n        30  IF arr[i] < 0 THEN GOTO 80\n        40  i = i + 1\n        50  GOTO 20\n        60  result = -1\n        70  GOTO 90\n        80  result = i\n        90  PRINT result\n```\n\n把它的控制流畫出來，你會看到為什麼它叫「義大利麵」——線跨來跨去、往回鉤：\n\n```text\n        ┌─────────────────────────┐\n        │  10 i = 0               │\n        └───────────┬─────────────┘\n                    ▼\n        ┌─────────────────────────┐   i>=len     ┌──────────────┐\n   ┌───►│  20 IF i>=len ──────────┼─────────────►│  60 result=-1│\n   │    └───────────┬─────────────┘              └──────┬───────┘\n   │                ▼ else                               │\n   │    ┌─────────────────────────┐  arr[i]<0           │\n   │    │  30 IF arr[i]<0 ────┐    │                     ▼\n   │    └───────────┬─────────┼────┘            ┌──────────────┐\n   │                ▼ else    └────────────────►│  80 result=i │\n   │    ┌─────────────────────────┐             └──────┬───────┘\n   │    │  40 i = i + 1           │                    │\n   │    └───────────┬─────────────┘                    │\n   │                ▼                                   ▼\n   └────────────────┘  50 GOTO 20          ┌──────────────────┐\n                                           │  90 PRINT result │\n                                           └──────────────────┘\n```\n\n數一下你要同時握住的東西：行號 20 既是迴圈頭、又是 60 那條路的分岔點；行號 50 往回鉤到 20；行號 30 往前射到 80；70 又把 60 接到 90。要回答「程式跑到行 90 時 result 是什麼」，你得在腦中同時追兩條入線（從 60 來、從 80 來），而每一條入線又各自有自己的來歷。沒有任何一個盒子能被摺起來，因為箭頭穿過了它們的邊界。這就是工作記憶斷線的現場——活動的跳轉關係超過了那個個位數。\n\n**版本 B：結構化控制流**\n\n```text\n        function findFirstNegative(arr):\n            for i in 0 .. len-1:\n                if arr[i] < 0:\n                    return i\n            return -1\n```\n\n控制流圖：\n\n```text\n        ┌─────────────────────────────┐\n        │  function 進入              │\n        └──────────────┬──────────────┘\n                       ▼\n        ┌─────────────────────────────┐\n        │  for i in 0 .. len-1   ◄─┐  │\n        └──────────────┬───────────┼──┘\n                       ▼           │\n        ┌─────────────────────────┐│\n        │  if arr[i] < 0 ?        ││\n        └───┬─────────────────┬───┘│\n       true ▼            false ▼    │ 下一圈\n        ┌─────────┐      ┌─────────┐│\n        │ return i│      │ 繼續   ─┼┘\n        └─────────┘      └─────────┘\n                       │\n        （迴圈正常結束）▼\n        ┌─────────────────────────────┐\n        │  return -1                  │\n        └─────────────────────────────┘\n```\n\n同樣的邏輯，但現在每個結構是一個單一入口、單一出口的盒子。`for` 是一個盒子，裡面包著一個 `if` 盒子。要回答「函式回傳什麼」，你只要看兩個出口：迴圈裡的 `return i`、迴圈外的 `return -1`，兩者互斥、各自有清楚的條件。沒有往回鉤的義大利麵，沒有穿牆的箭頭。你可以把 `for` 整個摺成「掃過陣列找負數」一句話的黑箱，而不必記得它內部第幾圈在幹嘛。\n\n兩個版本算的是同一個函式（Böhm-Jacopini 保證了這一定做得到）。差別**完全不在機器**——對 CPU 來說兩者都是一堆條件跳轉，版本 A 甚至可能少幾條指令。差別在**人**：版本 B 把「讀到的文字」和「會發生的過程」之間的鴻溝壓到幾乎為零，版本 A 把它撐到超過你工作記憶的容量。這就是 Dijkstra 那兩句原文的具體展示。你 lint 規則裡的 `max-depth`、`complexity`，量的就是「這段程式把鴻溝撐多寬」——cyclomatic complexity 本質上在數控制流圖裡有幾條獨立路徑，路徑越多、要同時握住的分支越多、越接近版本 A。\n\n## 兩條 strand 第一次明顯交織\n\n本章標題說「方法 strand 登場」，但你應該已經察覺：結構化編程不純粹是方法，它一隻腳踩在抽象 strand 上。這是全書反覆出現的交織模式第一次清楚現形，值得標記下來。\n\n它是**語言事件**：循序/選擇/迭代是控制結構，是語言提供的抽象。1960 年代末到 1970 年代的語言設計（Pascal 由 Wirth 設計、Algol 系的後裔）開始把這三種結構做成一等公民、把 GOTO 邊緣化甚至移除——這是抽象 strand 的動作，語言把「好的控制流」內建成預設、把壞的變得不方便寫。\n\n它同時是**方法事件**：就算語言還留著 GOTO（C 至今有 `goto`），結構化編程要求**人自己選擇不那樣寫**。它是一套紀律、一種 code review 會抓的規矩、一種寫程式的職業倫理——這是方法 strand 的動作。\n\n```text\n            結構化編程：一個事件，兩條 strand\n        ┌───────────────────┬───────────────────┐\n        │  抽象 strand      │  方法 strand      │\n        │ （用什麼蓋）      │ （怎麼蓋）        │\n        ├───────────────────┼───────────────────┤\n        │ 語言把三種控制    │ 人自願不寫義大利  │\n        │ 結構做成一等公民  │ 麵、壓巢狀、控制  │\n        │ 把 GOTO 邊緣化    │ 圈複雜度的紀律    │\n        └─────────┬─────────┴─────────┬─────────┘\n                  │                   │\n                  ▼                   ▼\n            語言內建好預設       review/lint 把關\n                  └─────────┬─────────┘\n                            ▼\n              同一個目標：縮短「文字↔過程」鴻溝\n```\n\n為什麼這個交織重要？因為它告訴你：抽象與方法不是兩件可以分開談的事，它們是同一場對抗複雜度戰爭的兩面，全程互相觸發。語言把好結構變便宜（抽象），紀律才推得動（方法）；紀律先看清了什麼是好結構（方法），語言才知道要內建什麼（抽象）。本書後面你會一再看到這個雙人舞——微服務同時是部署抽象與組織方法（見 ch17），型別系統同時是語言特性與「在執行前排除錯誤」的方法主張（見 ch08）。結構化編程是這支舞的第一拍。\n\n## 順帶把 Dijkstra 的另外兩句話查清楚\n\nDijkstra 是本書會反覆引用的人，而他的話是被張冠李戴、隨意縮寫的重災區。趁這章把兩句你一定會在別處看到的名言釘死，免得你日後引錯。\n\n**第一句**（全書級的工具，ch08、ch10、ch19 都會回收）：\n\n> \"Program testing can be used to show the presence of bugs, but never to show their absence!\"\n\n**測試只能證明 bug 存在，永遠不能證明 bug 不存在。** 這是精確原文。它最早見於 **1969 年 NATO Rome 會議報告**，也出現在 1970 年的「Notes on Structured Programming」（EWD249）。網路上流傳的「Testing shows the presence, not the absence, of bugs」是後世的通俗縮寫版——意思沒錯，但不是逐字原句。這句話為什麼跟本章扣在一起？因為它跟結構化編程是同一個世界觀的兩面：既然測試窮舉不完所有輸入（你跑一萬個 test case，第一萬零一個還是可能爆），那麼可靠性就不能只靠「事後測」，得靠「事前讓程式的結構簡單到你能論證它對」。結構化編程就是讓「能論證」變可能的前提——一段你工作記憶接得住的程式，你才有機會說服自己它對。\n\n**第二句**：\n\n> \"Simplicity is prerequisite for reliability.\"\n\n**簡單是可靠的前提。** 這句出自 **EWD498「How do we tell truths that might hurt?」（1975）**。網路上常把它繫錯年份、甚至安到別人頭上，引用時請註明 EWD498 / 1975。它幾乎是結構化編程的一句口號式總結：不是「簡單比較優雅」，是「**不簡單，就別談可靠**」——複雜到沒人能完整理解的系統，沒有人能保證它對，於是它就是不可靠的，無論它今天看起來多正常。你維運過的每一個「平常好好的、某天毫無預警炸掉」的系統，都是這句話的學費。\n\n把這兩句和本章主軸連起來：危機（程式大到沒人懂）→ 診斷（人腦處理不了任意跳轉的過程）→ 對策（用人腦裝得下的結構、把簡單當可靠的前提）。這是一條完整的因果鏈，不是三條互不相干的格言。\n\n## 複雜度搬去哪了\n\n結構化編程這一跳，照例要結一筆帳——它消滅了什麼負擔，又製造了什麼新負擔。\n\n| 項目 | 內容 |\n|---|---|\n| **撞的牆** | 規模對上人腦容量：程式大到一個人裝不下整份控制流，超支/延遲/不可靠成為系統性災難（1968 software crisis） |\n| **這次主導的 strand** | 方法 strand 首次登場（紀律），但與抽象 strand 交織（語言把控制結構做成一等公民） |\n| **消滅了什麼負擔** | 「任意跳轉導致文字無法當執行過程地圖」的認知負擔；用三種單一入口/出口的結構，讓任何一段程式都能一層層摺成黑箱，把所需工作記憶壓回個位數 |\n| **複雜度搬到哪** | 從「執行時追不上的混亂」搬到「**寫程式時必須遵守的紀律**」——複雜度沒消失，它變成了一筆持續支付的自律成本，由寫的人、review 的人、lint 規則共同承擔 |\n| **新製造的負擔** | (1) 紀律要靠人持續執行，鬆懈就回到義大利麵——所以才要把它編碼進 lint/CI 自動把關；(2) 強行避免一切 GOTO 有時逼出更彆扭的結構（多餘的旗標變數、深巢狀），後來的 `break`/`continue`/early `return`/例外，某種意義上是「結構化的受控逃生口」，是對純粹主義的修正 |\n| **會在哪洩漏／反噬** | 結構化只馴服了**單一函式內**的控制流。當系統長成幾百個服務、async 回呼、事件驅動，控制流又跳到了**函式與程序之間**——你的分散式追蹤（distributed tracing）要解決的「這個請求到底流經哪些服務、現在卡在哪」，正是同一個「文字↔過程鴻溝」在分散式尺度上的復活（見 ch17、ch18）。鴻溝沒被填平，它被搬到了更大的尺度 |\n| **這一跳的帳單一句話** | 用「寫程式時的自律」換「讀程式時的可理解」——複雜度從執行期搬到了開發紀律，而紀律一鬆，帳單立刻回來 |\n\n## 紙上推演\n\n### 推演題一 **[15 分鐘]** ★★\n\n用「人腦工作記憶容量」這條硬限制，向一個資淺工程師解釋：為什麼結構化編程是對「軟體危機」的直接回應，而不只是一種讓程式碼比較整齊的風格偏好。要求你的解釋裡出現「黑箱」「個位數」「文字與過程的鴻溝」這三個錨點，並且不能用「比較好讀」「比較乾淨」這種空話當理由。\n\n#### 推演解答\n\n軟體危機的牆是「規模對上人腦容量」：一百萬行的系統，沒有任何一個人的工作記憶裝得下它全部的活動部件，而工作記憶的容量是個**個位數**（Miller 說約七、Cowan 修正後說約四，總之小得可憐且改不了）。既然改不了人腦，就只能改程式的形狀，讓人不必一次握住全部。\n\n結構化編程的三種積木（循序/選擇/迭代）每一種都是單一入口、單一出口的盒子，於是任何程式都能一層層**摺成黑箱**——你看外層時，內層整個摺起來當一句話，所需的工作記憶就壓回個位數以內。GOTO 不行，因為穿牆的跳轉讓你沒有任何一個邊界完好的盒子可以摺。\n\n所以這不是「比較好讀」的品味問題，是**認知工程**：它在做的事是把「理解任意一段程式所需的工作記憶量」這個量，壓到人腦的硬上限以下。而這正是 Dijkstra 講的「縮短文字與過程的鴻溝」——讓你眼睛讀到的文字，盡量直接對應到它跑起來會發生的事，中間不需要你的腦袋額外重建一張跳轉地圖。\n\n常見誤解要點破：學徒最容易把它聽成「規則潔癖」。反駁的關鍵是把它從美學軸搬到容量軸——重點不是好不好看，是裝不裝得下。\n\n### 推演題二 **[10 分鐘]** ★★\n\n「Dijkstra 在 1968 年說 GOTO 是邪惡的（evil），所以我們不該用它。」這句廣為流傳的話，至少有**三處**史實或理解上的破綻。把它們一一找出來並改正。\n\n#### 推演解答\n\n破綻一（理解）：**Dijkstra 沒說 GOTO「邪惡」**。「邪惡」「乾淨」是道德/美學詞，他的論證跟這些無關。他的真正理由是認知性的——人腦擅長靜態關係、不擅長想像沿時間演化的過程，而 GOTO 讓靜態文字無法充當動態過程的地圖。他反對的是「文字追不上過程」的那種控制流，GOTO 只是製造它最方便的工具、頭號嫌犯，不是論證本身。把論證讀成「GOTO 邪惡」，是把一篇講人類認知極限的文章降格成一條風格禁令。\n\n破綻二（史實）：**那個斬釘截鐵的標題不是 Dijkstra 下的**。他原投稿題為「A Case against the GO TO Statement」（反對 GOTO 的一個論證），是 CACM 編輯 Niklaus Wirth 為加速刊登、改成 letter 時換上「Considered Harmful」這個句型的。所以連那股「judgement」的語氣，都不是原作者的。\n\n破綻三（理解，較細）：**「不該用它」這個全稱禁令過頭了**。Böhm-Jacopini 證明三種結構足以表達任何程式，這讓「避免 GOTO」成為一個沒有功能代價的合理預設；但 Dijkstra 的論證是「縮短文字與過程的鴻溝」，不是「GOTO 出現零次」。事實上後世保留了受控的局部跳轉（`break`、`continue`、early `return`、例外、C 的 `goto` 用於集中錯誤清理），因為這些不破壞「文字當地圖」的性質。把它讀成「GOTO 必須絕對為零」是把一條認知原則僵化成教條。\n\n（若只想得出前兩處也算過關；第三處是進階。）\n\n### 推演題三 **[15 分鐘]** ★★★\n\n對帳：打開你某個專案的 lint 設定（ESLint / TypeScript），找出 `max-depth`、`complexity`（cyclomatic complexity）、`max-nested-callbacks`、`no-fallthrough` 這幾條規則中你有開的。對每一條，說清楚它在「執行 1968 年結構化編程的哪一條主張」、以及「它在量化地阻止程式碼把文字↔過程的鴻溝撐到多寬」。哪一條規則最直接對應 Dijkstra 反 GOTO 的核心論點？\n\n#### 推演解答\n\n- **`max-depth`**（限制巢狀深度）：直接執行「任何一段程式都要能一層層摺成黑箱」這條主張。巢狀越深，要同時握住的「我現在在第幾層的什麼條件下」越多。它在保護工作記憶的層數預算。\n- **`complexity`（cyclomatic complexity）**：量的是控制流圖裡的獨立路徑數。這是**最直接對應 Dijkstra 核心論點**的一條——獨立路徑越多，「文字讀到這裡時可能是經由哪條路來的」分支越多，文字當過程地圖的能力越差。cyclomatic complexity 幾乎就是「文字↔過程鴻溝寬度」的一個可計算代理指標。義大利麵版本的 `findFirstNegative` 路徑交織、複雜度高；結構化版本路徑清晰、複雜度低。\n- **`max-nested-callbacks`**：是「控制流跳出單一函式、散進回呼鏈」這個現代變體的防線。它防的是 callback hell——async 時代的義大利麵，文字順序與執行順序徹底脫鉤的重災區（呼應你 review 追不上 async 的場景）。\n- **`no-fallthrough`**（`switch` 不准忘記 `break` 而貫穿）：守的是「單一入口、單一出口」裡的單一出口——`switch` 的每個 case 應該是一個邊界完好的盒子，fallthrough 是讓控制流穿過盒子邊界、退化回 GOTO 式跳轉的後門。\n\n最直接對應 Dijkstra 的是 **`complexity`**：它把「這段程式把鴻溝撐多寬」變成一個 CI 能擋的數字，是 1968 年那篇論文最量化的後裔。\n\n對帳的領悟：這些規則你以為是團隊潔癖，其實每一條都能上溯到一篇 1968 年的論文與一條人腦容量的硬限制。你的 CI 在替你執行一份五十多年前寫下的認知工程紀律。\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. 1968 年喊出「software crisis」時，撞的是哪一面複雜度的牆？為什麼這面牆跟前幾章（編譯器、高階語言）撞的牆**性質不同**，導致抽象翻不過去、只能用方法翻？\n2. 為什麼說「software engineering」這個會議名是一記**挑釁**而不是中性命名？它的潛台詞是什麼？這跟「方法 strand 登場」有什麼關係？\n3. 把「Dijkstra 說 GOTO 邪惡」這句流行話的三處破綻，講給另一個工程師聽（標題誰下的、真正論點是什麼、全稱禁令為何過頭）。\n4. 用你自己的話複述 Dijkstra 那兩句原文的意思（intellectual powers / 鴻溝），並用「你追不上一段 async」這個親身場景說明它指的是什麼。\n5. Böhm-Jacopini 定理證明了什麼？這個定理為什麼是「禁 GOTO 從美學變成可行工程主張」的關鍵——它砍掉了哪一種反對理由？\n6. 為什麼三種控制結構「人腦裝得下」而 GOTO「裝不下」？用「單一入口/出口」「黑箱」「工作記憶個位數」把因果串起來。\n7. 為什麼說結構化編程同時是語言事件與方法事件？少了哪一邊，另一邊推不動？\n8. 結構化編程馴服的是哪個尺度的控制流？它沒馴服的、在今天又復活了的，是哪個尺度的控制流？（提示：你的 distributed tracing 在解什麼）\n\n## 延伸閱讀\n\n- **Dijkstra, \"Go To Statement Considered Harmful\"（CACM, 1968-03）**——本章的核心一手文獻，兩頁，必讀原文。重點看「our intellectual powers are rather geared to master static relations」那一段；讀完你會發現它跟「GOTO 邪惡」的口號差多遠。EWD215 是 Dijkstra 投稿原題版本（A Case against the GO TO Statement），可對照標題的改動。\n- **NATO Software Engineering Conference 報告（Garmisch 1968，Naur & Randell 編）**——線上有全文 PDF。不必通讀，挑「software crisis」與「software engineering」一詞出現的段落，看當年與會者的原話有多焦慮、多誠實；這是「方法 strand 出生現場」的一手紀錄。\n- **Böhm & Jacopini, \"Flow Diagrams, Turing Machines and Languages with Only Two Formation Rules\"（CACM, 1966）**——結構化定理原典。數學偏硬，但你只要理解「三種結構足以表達任何程式」這個結論，就拿到了禁 GOTO 的理論彈藥。維基百科「Structured program theorem」條目是好的入門整理。\n- **Dijkstra, \"Notes on Structured Programming\"（EWD249, 1970）**——結構化編程綱領的較完整版本，也是「測試只能證明 bug 存在」那句的出處之一。Dijkstra Archive（cs.utexas.edu/~EWD）有全部 EWD 手稿掃描，本書後面還會多次回到這個檔案庫。\n- **Knuth, \"Structured Programming with go to Statements\"（ACM Computing Surveys, 1974）**——平衡的反思，主張「不是 GOTO 絕對不能用，是要懂它什麼時候破壞結構」。也是「過早最佳化是萬惡之源」完整脈絡的出處（那句話的真正意思見 ch19），順手讀。\n- 工作記憶容量：**Miller, \"The Magical Number Seven, Plus or Minus Two\"（1956）** 是「七」的源頭，**Cowan, \"The Magical Number 4 in Short-Term Memory\"（2001）** 是修正版。不必細讀心理學細節，知道「容量是個改不掉的小個位數」就夠了——這是結構化編程整套主張的生物學地基。\n"}, {"id": "ch06-modularity-and-unix", "file": "ch06-modularity-and-unix.md", "group": "Part II — 語言的哲學與第一次危機", "title": "ch06 — 模組化與 Unix：怎麼切一個大程式", "md": "# ch06 — 模組化與 Unix：怎麼切一個大程式\n\n> **本章解決什麼問題**：ch05 的結構化編程治的是「一個函式內部」的複雜度——控制流亂跳，人腦追不上。但真正的大系統不是一個大函式，而是幾十、幾百個模組要拼在一起。切錯了，改一個需求要動十個檔；切對了，只動一個。這章撞的是**分解的牆**：一個大程式該照什麼準則切成模組？Parnas 1972 給的答案（照「會變的決策」切，不照流程切）至今仍被天天違反——你切出分散式單體那次就是。同一個洞見，Unix 用另一條路走給你看：把它做成「小工具＋pipe」的文化。這章是 ch07（OOP 封裝）、ch17（微服務）的共同祖先。\n\n## 從你已知的出發\n\n你切過微服務邊界，所以你知道這件事有多容易出錯。\n\n回想你做那套 AWS ECS 上的 B2B/B2C 資料中介。最初的草圖大概是這樣切的：一個 service 管「接收訂單」、一個管「驗證」、一個管「計價」、一個管「寫帳」、一個管「通知」——照著一筆訂單**走過的流程**一刀一刀切下去。看起來乾淨，每個 service 一個動詞，畫成圖也漂亮。\n\n然後需求變了。客戶要求計價邏輯要看「訂單來源通路」，而通路這個欄位是「接收訂單」那個 service 定義的。於是你得改接收、改計價、還要改它們中間那段共享的 DTO，三個 service 一起發版，CI 卡了一下午。再過一個月，又一個跨越流程步驟的需求進來，又是三四個 service 連動。你開始有種不對勁的感覺：這些「獨立」的 service 根本不獨立——它們得一起改、一起發、一起回滾。你拆出來的不是微服務，是一個被網路切開、但耦合一點沒少的**分散式單體**（distributed monolith）。最糟的版本：耦合還在，但你現在得多付網路延遲、序列化、分散式交易、跨服務 trace 的帳。\n\n這個痛不是你發明的。1972 年，一個叫 David Parnas 的人寫了一篇論文，把「為什麼照流程切會痛、該照什麼切才不痛」講得清清楚楚。那篇論文我認為是軟體史上最被低估、也最常被違反的一篇——它的標題甚至沒提到後來最常用它的詞（「模組化」「資訊隱藏」業界都記得，論文本身很少人讀過）。這章先把 Parnas 的洞見攤開，再看 Unix 怎麼用一條完全不同的路——文化而非論文——把同一件事做成你今天的 pipeline。\n\n## Parnas 1972：模組不是「流程的一段」，是「一個祕密」\n\n先把場景放回 1972。那時「模組化」這個詞已經有人在喊了——大家都同意大程式要拆成小塊，理由很素樸：分工（一塊一個人寫）、可讀（一次只看一塊）、可測（一塊一塊測）。問題是**照什麼切**。當時的標準答案幾乎是條件反射：照流程切。程式要做的事是一連串步驟，那就一個步驟一個模組，資料像輸送帶一樣從第一個模組流到最後一個。這跟畫流程圖（flowchart）的直覺完全一致，自然到沒人覺得需要質疑。\n\nParnas 質疑了。他在 *CACM* 1972 年 12 月號發表〈On the Criteria To Be Used in Decomposing Systems into Modules〉，標題直譯就是「該用什麼準則來把系統分解成模組」——他攻擊的正是「準則」這件事：大家都在切，但沒人說得清切的準則是什麼，於是默認用了最壞的那個。\n\n他的論證方式很工程師：不空談，給你看一個具體的小程式，用兩種切法各切一次，然後讓需求變一變，數哪種改得少。\n\n### 個案：KWIC 索引的兩種切法\n\n他選的例子是 **KWIC 索引**（Key Word in Context，關鍵詞索引）。功能很單純：給你一堆句子（每句是一串字），程式要對每句做「循環移位」——把第一個字搬到句尾，重複到每個字都當過開頭，產生這句的所有循環移位版本；最後把全部句子的全部循環移位**照字母排序**輸出。這是早年做書目索引的真實需求（讓每個關鍵詞都能當索引的開頭被查到）。\n\n你不用管它的用途，只要看它怎麼被切。\n\n**切法一：照流程切（Parnas 叫它 Modularization 1）。** 順著資料流，一刀一個步驟：\n\n```text\n切法一：照流程（會痛的那種）\n\n  輸入        循環移位       排序          輸出\n┌──────┐   ┌──────┐   ┌──────┐   ┌──────┐\n│Input │──►│Shift │──►│ Sort │──►│Output│\n└──────┘   └──────┘   └──────┘   └──────┘\n   每個模組讀上一個丟出來的資料、加工、丟給下一個\n   所有模組共享「句子在記憶體裡長什麼樣」這個祕密\n```\n\n這切法的問題藏在最後一行：每個模組都得知道「資料在記憶體裡實際怎麼擺」——是一個大字元陣列？每個字前面放長度？句子之間用什麼分隔？因為要直接讀別人丟出來的 buffer，這個「記憶體佈局」的決定**漏給了每一個模組**。四個模組，四份對同一個格式的依賴。\n\n**切法二：照祕密切（Modularization 2）。** Parnas 重切一次，這次每個模組包住「一個會變的設計決策」：\n\n```text\n切法二：照「藏住什麼決策」（不會痛的那種）\n\n  Line Storage ── 藏住：句子到底存哪、怎麼存\n  Input        ── 藏住：輸入資料的格式怎麼讀\n  Circular Shift ─ 藏住：循環移位是先算好存起來、還是查的時候才算\n  Alphabetizer ── 藏住：用哪種排序演算法\n  Output       ── 藏住：輸出格式長怎樣\n  Master Control ─ 藏住：這幾個模組誰先誰後的呼叫順序\n```\n\n注意切法二的模組**不對應任何一個流程步驟**。「Line Storage」不是流程裡的一步，它是一個祕密保管箱：別的模組要存字、取字，都透過它提供的函式（「給我第 i 句的第 j 個字」），永遠不直接碰底層的記憶體。循環移位模組甚至不真的「移位」——它只提供一個介面說「第 i 句循環移位 k 次後的內容是什麼」，至於背後是事先算好全部存起來、還是每次查才現算，是它一個人的祕密。\n\n### 為什麼切法二改得少：數一筆帳\n\n光看圖看不出差別，得讓需求變。Parnas 列了一串「很可能要改」的決策，挑最有殺傷力的一個：**「所有句子都放在記憶體裡」這個決定如果要改成「放在磁碟上」，要動幾個模組？**\n\n（這在 1972 年是真問題：記憶體貴且小，資料一大就得放外存。換成今天，等價問題是「資料從單機記憶體改成放 Redis／放 S3」。）\n\n| 需求變動 | 切法一（照流程）要改 | 切法二（照祕密）要改 |\n|---|---|---|\n| 句子從記憶體改放磁碟 | **全部四個模組**（每個都直接讀記憶體格式） | 只改 Line Storage 一個 |\n| 改排序演算法（記憶體不夠，要外部排序） | 排序模組＋可能牽動共享格式 | 只改 Alphabetizer 一個 |\n| 循環移位改成「不預存、查時現算」 | 改 Shift 模組＋下游讀它的人 | 只改 Circular Shift 一個 |\n| 輸入格式改變 | Input＋共享格式假設 | 只改 Input 一個 |\n\n差別不是「切法二比較整齊」這種美學。差別是**改一個需求要碰幾個檔**。切法一裡，「記憶體佈局」這個決定洩漏到每個模組，所以它一變，全部跟著變——這正是你那次三個 service 一起發版的 1972 年版本。切法二把每個會變的決定關進一個模組，需求變了，改動被**關在一個盒子裡**，不外溢。\n\nParnas 給這條準則一個名字：**資訊隱藏**（information hiding）。一個模組的價值不在於它「做了流程的哪一步」，而在於它**藏住了哪一個別人不該知道、而且很可能會變的決定**。模組的介面是它願意公開的承諾（「我提供取字、存字」），介面背後的實作是它的祕密（「我存在記憶體還是磁碟」）。只要承諾不變，祕密怎麼換都不影響別人。\n\n這裡有個反直覺但關鍵的推論，值得你停一下：**好的模組邊界讓介面又小又抽象，而流程切法的介面又大又具體。** 切法一裡，模組之間傳的是「一大塊有特定格式的 buffer」——介面又寬又脆。切法二裡,模組之間傳的是「給我第 i 句第 j 個字」——介面又窄又穩。介面越抽象，藏住的祕密越多，能獨立變動的空間越大。\n\n### 工程師的領悟：你切微服務邊界，做的就是這件事\n\n把 1972 搬到你的 ECS。你最初照流程切（接收→驗證→計價→寫帳→通知），就是 Modularization 1。「訂單通路」這個欄位的定義、訂單在系統裡的資料形狀——這些「會變的決定」散落、洩漏在每個 service，所以它一變，三四個 service 連動。你拆的不是會變的決定，是流程的步驟。\n\nParnas 的準則翻譯成你的語言就一句話：**照「會一起改變的東西」切，不照「一筆資料流過的步驟」切。** 一個服務邊界該包住一個業務能力（business capability）裡那些**會一起變的決策**——通路規則變，最好只動一個服務。如果你發現某類需求一進來就要動三個服務、它們得一起發版，那不是「服務間正常協作」，那是 Parnas 在 1972 就警告過的：你照流程切了，把會變的決定洩漏到了每個服務。分散式單體的技術定義，就是「切法一被部署到了網路上」。\n\n（這條準則 ch17 會以微服務的完整形態回收；ch07 會讓你看到 OOP 的「封裝」是實作資訊隱藏的**另一條路**——把祕密藏進物件而非藏進模組檔案。資訊隱藏是洞見，封裝與模組是兩種落地。）\n\n順帶澄清一個常見混淆：資訊隱藏不等於「關注點分離」（separation of concerns）。後者這個詞是 Dijkstra 在 1974 年的 EWD447〈On the Role of Scientific Thought〉裡造的，講的是「一次只專注一個面向去想」的思考紀律，範圍比資訊隱藏更廣。資訊隱藏是關注點分離落到「模組邊界」上的一個具體準則。兩個都對，但別把它們當同義詞——一個是思考方法，一個是切割準則。\n\n## Unix：同一個洞見，用文化而不是論文走\n\nParnas 用一篇嚴謹的論文論證「該怎麼切」。差不多同一時期，在 Bell Labs 的另一群人，用一個能跑的系統把同一件事做成了文化——而且他們多半不是讀了 Parnas 才這麼做的，是被現實逼出來的。這群人是 Ken Thompson、Dennis Ritchie，以及把哲學講得最精的 Doug McIlroy。\n\n### 先看清楚他們撞的牆\n\n1969 年 Thompson 在 Bell Labs 一台沒人要的舊 PDP-7 上開始寫 Unix（起點之一是他想玩一個叫 Space Travel 的程式）。當年寫作業系統的常識是：作業系統是效能最敏感的東西，必須用組合語言（assembly）一行一行手寫，貼著特定機器的指令集。代價你應該猜得到——這個 OS 跟這台機器**焊死**了。換一台硬體，整套重寫。1960 年代的軟體就是這樣一座座孤島，每座島綁一款機器。\n\nThompson 和 Ritchie 下了一個在當年看來很冒險的賭注：**用高階語言寫作業系統。** Ritchie 為此把一個叫 B 的語言加上型別與結構，做成了 **C**（約 1972）。1973 年，他們用 C 把 Unix 核心的大部分重寫了一遍。\n\n這個賭注的賭資是效能（大家都怕編譯器產出的碼跑不過手寫組語——這正是 ch03 FORTRAN 那場「效能 vs 生產力」鐘擺的同一場賭，只是賭注更大：這次賭的是作業系統本身），贏面是**可移植性**（portability）。賭贏了：因為核心是 C 寫的，要搬到新硬體，理論上只要重寫一小塊機器相關的部分、其餘重新編譯即可，不必整套重來。1978 年 Unix 成功移植到一台跟 PDP-11 架構完全不同的 Interdata 8/32 上——這是「作業系統能跨硬體搬家」第一次被真正證明。在那之前，「可移植的作業系統」幾乎是個矛盾詞。\n\n把它接回 Parnas：C 對 Unix 做的，正是資訊隱藏的最大規模示範——**「我們跑在哪款 CPU 上」這個會變的決定，被藏進了 C 編譯器和一小塊機器相關代碼裡。** 上層幾乎所有程式都不知道、也不需要知道底下是 PDP-11 還是 Interdata。換硬體，動的是那個被藏起來的盒子，不是整個系統。你今天信任「同一份 TypeScript 在你的 Mac、CI 的 Linux、ECS 的容器裡跑出一樣的結果」，這份信任的祖宗就是 1973 年那次 C 重寫。\n\n### Unix 哲學：把「小」做成紀律\n\n可移植性是底層的勝利，但 Unix 真正傳給你的遺產在上層：它的**哲學**。這套哲學最權威的文字版，是 McIlroy、E. N. Pinson、B. A. Tague 三人 1978 年在 *Bell System Technical Journal* 那期 Unix 專號的前言裡列的幾條原則。McIlroy 寫的原句是這樣（這裡逐字引用 1978 原文）：\n\n- 「**Make each program do one thing well.** To do a new job, build afresh rather than complicate old programs by adding new 'features'.」（讓每個程式把一件事做好；要做新工作就重新蓋一個小的，別把舊程式塞滿新功能搞複雜。）\n- 「**Expect the output of every program to become the input to another, as yet unknown, program.**」（預期每個程式的輸出，會成為另一個你還不知道的程式的輸入。）\n\n> ⚠️ 校準一個你大概也記錯的事：網路上流傳的那個整齊三句版——「Write programs that do one thing and do it well. Write programs to work together. Write programs to handle text streams.」——**不是 McIlroy 1978 的逐字原文**，而是 Peter H. Salus 在 1994 年《A Quarter-Century of Unix》裡的歸納轉述。意思對，但若要逐字引用，請用上面 1978 的原句。本書照原句。\n\n這兩句話為什麼是「方法」而不只是「品味」？因為第二句藏著整個系統的設計賭注：**如果每個程式的輸出都能餵給下一個程式，那程式之間就需要一種通用的接合劑。** Unix 的答案是：所有程式都讀寫純文字串流（text stream），用一個叫 **pipe** 的東西把一個程式的 stdout 直接接到下一個的 stdin。pipe 這個機制是 McIlroy 鼓吹多年、由 Thompson 在 1973 年實作進 Unix 的。\n\n於是你得到一個組合爆炸式的好處：你不需要為每個新任務寫一個大程式，你寫很多個只做一件事的小程式，再用 pipe 把它們**像積木一樣串起來**：\n\n```text\nUnix 的接合劑：pipe\n\n  cat access.log │ grep 500 │ awk '{print $7}' │ sort │ uniq -c\n\n  ┌─────┐   ┌──────┐   ┌─────┐   ┌──────┐   ┌────────┐\n  │ cat │──►│ grep │──►│ awk │──►│ sort │──►│ uniq-c │\n  └─────┘   └──────┘   └─────┘   └──────┘   └────────┘\n   出檔案    濾500行    取欄位    排序       去重計數\n   每個工具不知道也不在乎前後是誰；接合劑是純文字\n```\n\n關鍵在那最後一行。`grep` 不知道它前面是 `cat` 還是別的東西，也不知道後面接誰；它只認一件事——從 stdin 讀文字、把符合的行寫到 stdout。這就是資訊隱藏的另一種長相：**每個工具藏住自己怎麼做，只承諾一個窄到不能再窄的介面（讀文字、寫文字）。** 介面窄到極致，所以任意兩個工具都能接——組合的自由度來自介面的克制。\n\n這同時是抽象事件，也是方法事件（兩條 strand 又一次交織）。抽象面：純文字串流是一層通用介面，把「資料具體長怎樣」藏在每個工具內部。方法面：「寧可寫小工具再組合，不要寫大程式」是一條**文化紀律**——它約束的不是程式碼，是工程師的衝動（別把功能往一個程式裡塞）。1978 年那本 K&R（Kernighan & Ritchie 的《The C Programming Language》第 1 版）把 C 與這套品味一起傳播出去，讓「小而組合」成了整整幾代工程師的母語。\n\n### 工程師的領悟：你的 FluentBit pipeline 是這套哲學的現代轉世\n\n你自建過 FluentBit＋Lua 的可觀測性 pipeline。停下來看它的形狀：log 進來 → 一個 filter 解析 → 一個 Lua script 加工 → 一個 filter 改寫欄位 → 一個 output 送出去。每個 stage 只做一件小事，前一個的輸出是後一個的輸入，你靠把這些小 stage **接起來**而不是寫一個大程式，得到你要的處理流。\n\n這不是巧合地「像」Unix——它**就是** Unix 哲學的直系後代。FluentBit 的 input/filter/output 是 Unix 小工具，它的 pipeline 設定是 pipe，Lua script 是你臨時插進管線的自訂小工具。你做這套東西時憑的工程直覺（「每個 stage 單純一點、用組合而非堆功能」），正是 McIlroy 1978 寫下的那兩句。你已經在實踐它，這章只是把它的身世補給你。\n\n（同樣這套「小工具用 pipe 組合」的哲學，放大到分散式、把 pipe 換成 message queue、把工具換成獨立部署的服務，就是 ch17 的微服務——微服務本質是 Unix 哲學的分散式版。這裡先埋一句，不展開。）\n\n## 複雜度搬去哪了\n\n這一跳（模組化＋資訊隱藏＋Unix 組合哲學）搬動的複雜度，記成一筆帳：\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼負擔** | 「改一個需求要動全系統」的牽一髮動全身——把會變的決定關進模組，改動被局部化；「每個任務寫一個大程式」的重複勞動——改成小工具組合，舊工具重用 |\n| **製造了什麼新負擔** | (1) 切割本身變成一門難學的功夫——**「會變的決定」要靠預判，預判錯了照樣牽一髮動全身**，只是你以為自己切對了。(2) 模組／工具一多，**散在哪、誰呼叫誰、組合關係怎麼追**成了新複雜度（你的微服務「這個請求到底流經哪幾個服務」就是這筆帳）。(3) 介面是承諾，**承諾一旦公開就難改**——你被自己當初定的介面綁住 |\n| **在什麼情況下洩漏／反噬** | 當你把祕密**藏錯了**（沒包住真正會變的那個決定），或當「不該洩漏的實作」從窄介面**漏出去**（呼叫方偷偷依賴了你介面背後的行為），資訊隱藏就失效，改動又開始外溢。微服務裡這叫「共享資料庫」「跨服務偷讀對方的表」——介面之外的後門 |\n| **這一跳的帳單一句話** | **複雜度從「程式碼內部」搬到了「邊界的選擇」上**——你不再煩惱每個模組怎麼寫，改成煩惱該把線畫在哪；而畫線需要預測未來（什麼會變），這是本質複雜度，搬不掉 |\n\n最後一格是這章的核心。Parnas 沒有消滅複雜度，他把它**搬到了一個更前期、更需要判斷力的位置**：分解的決策。寫程式的複雜度降了，但「該怎麼切」這個複雜度升了——而且它要求你預測「未來什麼會變」，這是出了名地難。所以「切錯邊界」這個痛，五十年來換了無數包裝（模組、物件、套件、服務），核心一直沒變：**你賭了什麼會變，賭錯就還債。**\n\n## 紙上推演\n\n### 推演題一：用資訊隱藏檢驗你切過的一個服務邊界 **[20 分鐘] ★★**\n\n挑你親手切過的一個微服務（或一個模組／套件）。先寫下它對外的介面（公開的端點／函式）。然後問三個問題並寫下答案：(1) 這個服務**藏住了哪一個會變的決定**？(2) 過去一年，有沒有某類需求一進來就逼你「這個服務和另外幾個一起改、一起發版」？(3) 如果有，那個「一起變」的東西，本來該被關進哪一個服務、卻洩漏到了多個服務？\n\n#### 推演解答\n\n判斷標準只有一條：**改動有沒有被關在一個盒子裡。** 切對了的服務，多數需求變動只動它自己；它藏住的那個決定（某段業務規則、某個外部系統的接法、某種資料表示）變了，外面無感。切錯了的服務，你會在第 (2) 題列出一串「總是一起改」的服務——那串服務其實是**一個會變的決定被攤開切到了多處**。\n\n常見誤解一：以為「一個 service 一個動詞／一個 CRUD 資源」就是切對了。不是。「動詞」是流程步驟，「CRUD 資源」是資料表——兩者都是 Modularization 1 的變形。問的不是「它做什麼」，是「它藏住哪個會變的決定」。常見誤解二：以為服務數量多＝模組化好。數量無關，**改動的局部性**才是。十個總是一起發
