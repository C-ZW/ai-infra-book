譯表達、回憶表達、解釋表達。** 這正是偶然複雜度的定義：它不是問題本身的難，是「把腦中的解法翻譯成某種形式」的摩擦。AI 把這層摩擦壓得非常薄，薄到前所未有——這是真實的、可觀的進步，別小看它。但它砍的**種類**，和 FORTRAN 砍的、和你那台 tsc 編譯器砍的，是**同一種**：偶然複雜度。它砍得更廣（不挑領域）、介面更順（自然語言），但它沒有跨過那條 Brooks 1986 年劃下的界線。\n\n那條界線的另一側——本質複雜度——AI 砍掉了嗎？把你「不敢交給它」的那一堆事擺出來：\n\n- **「這個系統到底要保證什麼？」** 上游送來矛盾資料誰贏、要不要強一致還是最終一致、這個 trade-off 對這個業務該怎麼選——這是 Brooks 說的本質複雜度的核心，**答案不在任何訓練資料裡**，因為它取決於你這個系統、你這個業務、你這份合約的特定處境。AI 能生出你**已經決定**的任何一種設計，但那個「決定」本身，是本質複雜度，它替不了。\n- **跨系統的一致性。** 你那條 K8s CronJob → SQS → 冪等消費者的結算 pipeline（見 ch18），它的難不在任何單一段程式碼——AI 都寫得出來——而在「這幾個分散的部分合起來，在各種失敗時序下，還能不能對得上帳」。這是分散式這個**問題本身**的本質複雜度，你的書架上那本 TLA+ 書整本都在跟它搏鬥。AI 能寫出每一塊，但「這些塊合起來是否正確」這個全局判斷，目前（2026-06）仍然壓在你肩上。\n- **搞清楚到底要建什麼。** 這是最頂層、也最頑固的本質複雜度。Brooks 說過一句話，大意是：**軟體開發最難的部分，不是把東西寫出來，而是決定到底要寫什麼。** AI 把「寫出來」這段壓縮了，於是「決定要寫什麼」這段，在你的工作裡佔的比重不減反增——這恰恰是 Brooks 1986 年預言的場景的重演：**偶然複雜度被砍得越乾淨，剩下的本質複雜度就越赤裸地佔滿你的時間。**\n\n所以，把 Brooks 的刀架上去之後，結論是冷靜的：**截至 2026-06,AI 輔助編程砍的絕大多數是偶然複雜度，而且砍得比歷史上任何一次都廣、都順；但本質複雜度——搞清楚要建什麼、跨系統的一致性——它目前沒砍掉，而且按 Brooks 的論證，它也不該被期待砍掉。** 「沒有銀彈」在 2026 年，仍然是一個合理的預設懷疑。\n\n我得在這裡明確地標一個 hedge：**上面這個判斷是 2026-06 的，它可能被未來推翻。** 如果有一天 AI 真的開始穩定、可信地替你做「決定系統該保證什麼一致性語意」這種決定，Brooks 的界線就被跨過了——那會是軟體史上一件真正巨大的事（本章不預言它會不會發生）。但到 2026-06 為止它還沒發生，而每一次有人宣稱它發生了，你都該先掏出 Brooks 的刀問一句：**你砍的是偶然還是本質？** 這個提問不會過期，即使答案有一天會變。\n\n## 似曾相識 vs 真的不同：把兩張臉並排看\n\n把前面的分析收進一張表，讓你能一眼握住「這次和以往，哪裡像、哪裡真不一樣」——這也是你能轉述給另一個工程師的最濃縮版本。\n\n| 維度 | 似曾相識（和 FORTRAN/4GL/CASE/低程式碼一樣） | 真的不同（這次特有） |\n|---|---|---|\n| 核心夢想 | 「讓寫程式更接近說人話、機器自動補完細節」——七十年沒變 | — |\n| 介面 | — | 第一次是**真正的自然語言**，不是又一套要學的形式記法 |\n| 涵蓋面 | — | **不挑領域**（前四代都綁死在窄領域） |\n| 砍的複雜度種類 | 還是**偶然複雜度**（表達的摩擦）——和 FORTRAN 同一種 | 砍得更廣、更順手，但種類沒變 |\n| 對本質複雜度 | 一樣**砍不掉**（要什麼、一致性）——CASE 也在這撞牆 | — |\n| 行銷音量 | 一樣喊「這次寫程式要被大幅自動化/不需要那麼多人了」 | — |\n| 最該警惕的誤讀 | **把偶然當本質**：以為砍掉表達苦工=砍掉問題本身的難 | — |\n\n這張表的形狀本身就是答案：**「真的不同」全集中在「介面」和「涵蓋面」這兩格——也就是它「怎麼砍、砍多廣」變了；而「似曾相識」全集中在「砍的是哪種複雜度」「對本質無能為力」「行銷誇大」這幾格——也就是它「砍的種類、撞的牆、犯的誇大」沒變。** 用一句話總結這個判斷（2026-06）:\n\n> 這一輪 AI 輔助編程，在「**怎麼砍偶然複雜度**」上是七十年來最大的一次質變（自然語言、通用），但在「**能不能砍本質複雜度**」上，它和前四次站在同一條 Brooks 1986 年劃下的界線前——目前都沒跨過去。\n\n這就是一個有歷史縱深的人，在 2026-06 該給出的判斷：**既不當潑冷水的犬儒**（它的偶然複雜度砍得是真的猛，自然語言介面是真的質變，看不到這點是瞎），**也不當喊銀彈的信徒**（它沒跨過本質複雜度那條線，宣稱它跨過的多半是把偶然當本質的老誤讀）。你手上有 Brooks 的刀，你不需要選邊站隊，你只需要對著每一個具體的宣稱，問那一句不會過期的話。\n\n## 一個我不回答的問題：如果它真能砍本質複雜度\n\n本章到這裡，你可能憋著一個問題：「那將來呢？AI 會不會最終跨過那條線？」\n\n**本章不回答這個問題，而且這個拒絕是刻意的。** 這本書嚴格區分「已成定局的歷史」和「還在演化的當下」：FORTRAN 砍了什麼、CASE 為什麼死、Copilot 哪年 GA，這些是定局的歷史，可以斷言;但「AI 將來會不會消滅本質複雜度」是**對未來的預言**，而這本書不預言未來——不是謙虛，是因為一個見過四次「這次不一樣」的人，知道預言這種事的命中率有多難看。\n\n我能做的，只是把這個問題的**形狀**講清楚，讓你自己拿著去想（這是推測，明白標為推測）:\n\n**如果**有一天 AI 真的能可信地替你做「這個系統該保證什麼」「上游矛盾時誰贏」「這個 trade-off 該怎麼選」這類決定——那它砍掉的就不再是「把解法翻譯成程式碼」的偶然複雜度，而是「**決定解法是什麼**」的本質複雜度。那意味著什麼被自動化了？意味著**「搞清楚到底要建什麼」這件 Brooks 說是軟體最難的事，被自動化了**。如果那天真的到來，它的份量遠遠超過「寫程式變快了」——它更像是某種「判斷」「意圖」「對處境的理解」被自動化了，那會是一個比本章大得多的故事，大到不屬於一本軟體史的範圍。\n\n但**到 2026-06 為止，那天還沒到**。今天的 AI 砍的是表達，不是判斷；是偶然，不是本質。所以本章在這裡停手，把這個問題原封不動地交還給未來，只留下那把不會過期的刀給你：不管哪一天、面對哪一個新宣稱，先問——**你砍的是偶然還是本質？** 答案會變，問題不會。\n\n## 複雜度搬去哪了\n\nAI 輔助編程沒有發明一層新的語言抽象，也沒有提出一套新流程——它做的是**把「表達」這個動作的偶然複雜度，搬到一個統計模型後面**。這一跳的帳，和前四代「自動編程」記在同一本帳簿上，但有它自己的幾筆新負擔。\n\n| 項目 | 內容 |\n|---|---|\n| **撞的牆** | 七十年的老牆：「寫程式」這件事裡，有一大塊是把腦中已知的解法翻譯成程式碼的**偶然摩擦**（樣板、查 API、語言翻譯）——這塊一直在吃時間，卻不是問題本身的難 |\n| **這次主導的 strand** | 抽象 strand 的最新一格（機器碼→組語→高階語言→…→AI 輔助）。但它和前幾格不同：它不提供一個**確定性**的抽象（編譯器永遠把 `A+B` 翻成同樣的碼），而是一個**機率性**的助手（同樣的提示可能給出不同、甚至有時錯的碼） |\n| **搬走了什麼** | 「表達」的偶然複雜度，砍得比歷史上任何一次都廣（不挑領域）、都順（自然語言介面）。你查文件、敲樣板、跨語言翻譯的時間被大幅壓縮——這是真實的、可觀的進步 |\n| **製造了什麼新負擔（帳單）** | ① **審查負擔**：你從「寫程式碼」變成「審查機器生的程式碼」，而**審查一段你沒寫的、看起來對的程式碼，比審查自己寫的更難**——這是新的、且被低估的本質工作；② **機率性的不可靠**：它會一本正經地產生看似合理但錯誤的碼（俗稱 hallucination），你得有能力抓出來——這要求你**懂得比它生的更深**，否則你只是在批准你看不懂的東西；③ **技能空洞化的風險**：如果偶然複雜度全外包，新一代工程師可能沒機會練就「跳到底層」的肌肉（呼應 ch19：抽象洩漏時你得能跳下去，但你得先有那個能力）；④ **信任校準**：它哪裡可信、哪裡不可信，沒有明確邊界，你得自己長出一套「什麼該信、什麼該查」的判斷 |\n| **它在哪洩漏/反噬** | 當你把它當銀彈、交給它本質複雜度時：你叫它「設計這個系統的一致性」，它會非常流暢地給你一個**看起來很專業、實則沒理解你真實處境**的設計——而流暢正是危險所在，因為它降低了你的警覺。AI 抽象的洩漏，不是報錯，是**自信地給你錯的東西**（回收 ch19，但這是一種新型態的洩漏：不是底層細節漏出來，是「理解」根本沒在那裡） |\n| **這一跳的帳單一句話** | AI 把「表達」的偶然複雜度搬到了一個機率模型後面，搬得又廣又順——但它沒有、目前（2026-06）也不該被期待消滅本質複雜度；它把你的工作從「寫」推向了「**審與決定**」，而審與決定，正是本質複雜度的所在。複雜度沒有消失，它從你的鍵盤，搬到了你的判斷力 |\n\n最後一句值得你停一下：**複雜度從你的鍵盤，搬到了你的判斷力。** 這就是為什麼你——一個能用 Brooks 的刀分辨偶然與本質、能在抽象洩漏時跳到底層、能判斷「這個系統到底該保證什麼」的資深工程師——在 AI 時代不是被取代，而是被**重新定位**：你動手敲的那部分被壓縮了，你判斷與審查的那部分被放大了。這恰好也是你轉職 AI Infra 的底氣——AI Infra 要建造的，正是讓這些模型跑得穩、快、省的系統，而那是一個本質複雜度密集到爆的分散式問題（見 ch17、ch18），是 AI 自己目前最砍不動的那種牆。**你既是這次浪潮的使用者，也將是它的建造者——而建造者要對付的，恰恰是使用者那一側的工具砍不掉的本質複雜度。**\n\n## 紙上推演\n\n純敘事書，沒有可跑的 lab。下面三題用本章的刀，對著你**真實在用**的 AI 工具開刀。先自己想，再看解答。\n\n### 推演題一 **[20 分鐘]** ★★\n\n拿你最近一週用 AI 輔助工具（Claude Code 或任何）的真實經驗，做一次對帳。要求：列出 **AI 幫你砍掉的三筆偶然複雜度**，和 **它砍不掉、你只能自己扛的一筆本質複雜度**。對每一筆，用 Brooks 的關鍵問句檢驗——「這個難點是來自表達解法的方式，還是來自問題本身？換一個更強的 AI，它會消失嗎？」最後回答：你那筆本質複雜度，和七十年前 CASE 工具撞的牆，是不是同一面？\n\n#### 推演解答\n\n沒有標準答案，但合格的對帳要扛得住那個問句。示範：\n\n**三筆偶然複雜度**（換更強的 AI 會砍得更乾淨，因為難在表達不在問題）：① 我要一段把 AWS SDK 呼叫包成帶 exponential backoff 的 retry 的 TypeScript——我知道我要什麼，只是懶得敲、懶得查簽名，AI 即答；② 把一個 NestJS 的 DTO 同步成 OpenAPI schema——純翻譯，語意不變換形式；③ 寫一段 jest 測試的樣板與 mock 資料——「測什麼」是我定的，但「寫成 jest 的樣子」是苦工，AI 砍的是後者。三者共同點：它們都不是「我不知道要什麼」，是「我知道，但要花時間表達」。\n\n**一筆本質複雜度**（換多強的 AI 都砍不掉）：這個 B2B 中介在上游送來時間戳衝突的兩筆資料時，該以哪一筆為準——這取決於我和客戶的合約怎麼定義「真相來源」，而那份合約**不在任何訓練資料裡**。AI 能寫出「以較晚時間戳為準」或「以特定來源優先」的任何一種程式碼，但**哪一種是對的**，是我這個系統的特定本質，它替不了。\n\n和 CASE 是不是同一面牆？**是。** CASE 工具當年也能從你畫的圖自動產生程式碼骨架——前提是「圖能完整描述系統」。它撞的牆是：真實系統的本質複雜度（例外、業務規則、跨系統一致性）畫不進圖裡。今天 AI 撞的是同一面牆，只是換了個入口：本質複雜度**說不進提示詞裡**——因為你自己往往都還沒完全想清楚要什麼。判分關鍵：能不能看出「介面從圖換成自然語言，但撞的本質複雜度是同一面牆」。\n\n### 推演題二 **[15 分鐘]** ★★\n\n向一個剛開始重度依賴 AI 寫程式、且開始覺得「以後是不是不太需要懂底層了」的資淺工程師，論證：**為什麼「沒有銀彈」在 AI 時代仍然是一個合理的預設懷疑。** 要求你的論證裡出現「偶然 vs 本質複雜度」「Brooks 1986」「介面變了不等於砍的種類變了」這三個錨點，而且不能用「AI 就是不行啦」這種空話——你得承認它真的很強，再說明它強在哪一側。\n\n#### 推演解答\n\n一份合格的論證大致是:\n\n「先說清楚，AI 真的很強，我不是要潑冷水——它把查 API、敲樣板、跨語言翻譯壓縮得前所未有地快，這是真進步。但「強」和「銀彈」是兩回事。Brooks 1986 年那篇《No Silver Bullet》把軟體的難分成兩種：偶然複雜度（把解法翻譯成程式碼的摩擦）和本質複雜度（問題本身的難——到底要建什麼、跨系統怎麼一致）。AI 強的地方**全部集中在偶然複雜度這一側**。你回想一下，你真正燒掉一整個下午的時刻，是「不會寫某段程式碼」，還是「搞不清楚這東西該怎麼設計、該保證什麼」？後者是本質複雜度，AI 給不了——因為答案不在文件裡，在你對這個系統的判斷裡。\n\n關鍵在這：AI 這次的質變在「介面」（自然語言）和「涵蓋面」（不挑領域），**不在它砍的複雜度的種類**——它砍的還是偶然複雜度，和 1957 年 FORTRAN 同一種，只是砍得更廣。**介面變了，不等於砍的種類變了。** 而 Brooks 的論證是：偶然複雜度被砍得越乾淨，剩下的本質複雜度就越赤裸地佔滿你的時間——所以你用 AI 之後寫程式的時間少了，「想清楚要寫什麼」的時間反而更突出。這就是為什麼你越不能放掉懂底層的能力：當表達層被抹平，值錢的就只剩判斷，而判斷需要你懂得比它深。」\n\n判分關鍵：有沒有把「它強在偶然複雜度這一側、本質那條 Brooks 界線它沒跨」講清楚。能承認它的強、又精準指出它強在哪一側，才算握住了刀。\n\n### 推演題三 **[15 分鐘]** ★★★（標明：含推測，非預言）\n\n反事實/前瞻推理。**先把這題的性質講清楚：這是推測，不是預言，本書不預言未來。** 問題：假設有一天，AI 真的能可信地替你做「這個系統該保證什麼一致性語意」這類決定——那會意味著什麼被自動化了？它和今天 AI 做的事（砍偶然複雜度）在**種類**上差在哪？以及，為什麼這件事（如果發生）的份量，遠遠超過「寫程式變快了」？\n\n#### 推演解答\n\n這題沒有「對」的答案，重點是把「偶然 vs 本質」這條界線推到邏輯終點，並守住「這是推測」的誠實。一個有深度的回答:\n\n「今天 AI 砍的是**表達**：我已經決定系統該以較晚時間戳為準，它幫我把這決定寫成程式碼——它自動化的是「翻譯」。這是偶然複雜度。題目假設的那一天，自動化的是**決定本身**：不是我決定了它來寫，而是**它來決定**「該以哪筆為準」——而這需要理解我的業務、我的合約、客戶的真實意圖、各種 trade-off 的後果。這是本質複雜度，是 Brooks 說軟體最難的那部分（「決定到底要建什麼」）。所以那天和今天的差別不是「快了多少」，是**種類變了**：從自動化「翻譯」變成自動化「判斷」。\n\n份量為什麼大得多？「寫程式變快」只是把既有工種做得更有效率，工程師還是那個下判斷的人;但「判斷被自動化」意味著**「搞清楚要什麼」這件人類本來以為非自己不可的事被機器接手了**——那已不只是軟體工程的事，它觸到了「意圖」「理解」能不能被自動化的更大問題，大到超出一本軟體史的範圍。\n\n但我必須收回來、誠實標清楚：**到 2026-06，這沒有發生。** 今天的 AI 砍的是表達不是判斷，是偶然不是本質。上面整段是推測，本書不預測它會或不會到來。我能確定的只有那把刀：不管哪一天，先問「你砍的是偶然還是本質」。」\n\n判分關鍵：能不能識別出「自動化判斷 ≠ 自動化表達，是種類之差不是程度之差」，並**自覺守住「這是推測、不是預言」的界線**——後者是這本書這一章最看重的紀律。\n\n## 自我檢核\n\n口頭自答；講得出因果才算過關，講不清楚代表還沒懂。\n\n1. 「automatic programming（自動編程）」這個詞第一次當賣點是哪一年、哪個產品？把它從 1957 排到 2026，中間經過哪幾代（4GL、CASE、低程式碼）？它們共享的那個「句型」是什麼？\n2. 前四代「自動編程」，各自**兌現了什麼、落空了什麼**？用一句話概括那個反覆出現的落差（提示：兌現偶然複雜度被砍、抽象升高；落空本質複雜度被消滅、人被取代）。\n3. CASE 工具為什麼死？它撞的是哪一面牆？（提示：畫得進圖的是偶然，畫不進圖的本質複雜度才是要命的。）這面牆和今天 AI 撞的牆是不是同一面？\n4. 這一輪 AI 輔助編程，有哪兩點是**真的和以往不同**的？（自然語言介面、通用性）為什麼說「介面變了、涵蓋面變了」不等於「砍的複雜度種類變了」？\n5. 用 Brooks 的刀：AI 砍的絕大多數是哪一種複雜度？舉兩個它砍得動的例子、兩個它砍不動的例子，並對每個說清楚你怎麼判定它是偶然還是本質。\n6. 為什麼說「沒有銀彈」在 2026 年仍是一個合理的預設懷疑？這個結論怎麼從「它砍偶然、不砍本質」推導出來？\n7. 本章為什麼**拒絕引用任何 AI 編程工具的市佔/效能/SWE-bench 數字**？這個拒絕和一個見過 CASE 工具當年也被吹上天的人的紀律有什麼關係？\n8. 「複雜度從你的鍵盤，搬到了你的判斷力」是什麼意思？這對「你既是這次浪潮的使用者、也將是 AI Infra 的建造者」這件事，意味著什麼？\n\n## 延伸閱讀\n\n- **Fred Brooks, 〈No Silver Bullet — Essence and Accident in Software Engineering〉（1986）** — 本章的軸心工具的原典（也是 ch10 的）。如果你只重讀一篇，讀這篇，而且帶著本章的問題讀：他 1986 年說「過去的進步砍的都是偶然複雜度」，對照你 2026 年手上的 AI agent，這句話過時了還是更準了？讀完你會發現，判斷 AI 的最好工具，是一篇四十年前的論文。\n- **John Backus et al., 《The FORTRAN Automatic Coding System》（1957）** — 史上第一次把「自動編程」當賣點的一手文件，Software Preservation Group 有掃描全文。不必細讀技術細節，看標題、看引言怎麼描述它的承諾就夠了——你會驚訝於那個句型（「讓程式設計師擺脫底層苦工」）和今天 AI 工具官網的文案有多像。\n- **James Martin, 《Application Development Without Programmers》（1981）** — 4GL 運動的綱領，光看書名就值得記住：這是「不需要程式設計師」這個夢最赤裸的一次命名。對照低程式碼/無程式碼今天的文案，你會看見同一個承諾隔四十年的兩次發聲。（此書較難找，讀不到原書，讀它的維基條目與 4GL 條目即可掌握脈絡。）\n- **維基百科〈Computer-aided software engineering〉條目 + 1993 年 GAO 對 CASE 工具的評估** — 把 CASE 工具的興衰當成一個教學案例讀：它怎麼被吹上天（1990 年近 200 種產品、IBM 的 AD/Cycle）、又怎麼安靜地死掉（GAO「幾乎沒有證據顯示能改善生產力」）。這是「把偶然當本質的自動編程夢」最完整的一具屍體解剖，讀它能讓你對 2026 的喧囂多一分免疫力。\n- **GitHub 官方部落格〈Introducing GitHub Copilot: your AI pair programmer〉（2021）** — 這一輪的起點公告，年份穩固可引。讀它不是為了懷舊，是為了一件事：把它的措辭（「your AI pair programmer」、強調它幫你補完樣板與常見模式）和本章「它砍的是偶然複雜度」的判斷對照——你會發現，連它自己的定位，都落在偶然複雜度這一側。\n- **本書 ch10（人月神話）與 ch19（抽象會洩漏）** — 本章的兩根支柱。ch10 給你 Brooks 的刀（本質 vs 偶然），ch19 給你「抽象洩漏」的視角（AI 自信地給錯的東西，是一種新型態的洩漏）。如果你覺得本章的判斷太快，回去把這兩章讀紮實，你就有了自己重新做一遍這個判斷的全部工具——這正是本書想給你的：不是我的結論，是讓你自己下結論的那把刀。\n"}, {"id": "ch21-conservation-of-complexity", "file": "ch21-conservation-of-complexity.md", "group": "Part VII — 當下與回望", "title": "ch21 — 複雜度守恆：總收官", "md": "# ch21 — 複雜度守恆：總收官\n\n> **本章解決什麼問題**：你走完了。從 ch01 那副眼鏡到 ch20 的 AI 輔助編程，七十年史在你眼前攤完了。這一章不開任何新史實——它只做一件事：把整本書收進**一條你能用嘴巴從頭講到尾的故事線**，並用 ch01 就交給你的四條驗收主線（守恆、交織、鐘擺、永恆真話）當口試題，讓你親手驗收自己讀懂了沒。本章撞的不是新的複雜度牆，而是「你讀完之後留得下什麼」這個牆——讀過跟講得出來，中間隔著一道你現在要跨過去的縫。最後給你一張往下走的地圖：往深處讀經典、往應用接 AI Infra、往廣處讀科普。讀完這章，這本書對你成不成立，你自己就能判。\n\n```text\nPart I 機器與第一層抽象   Part II 語言的哲學與危機   Part III 抽象的大廈\nch01 對抗複雜度(序)        ch04 Lisp vs Algol         ch07 物件導向\nch02 儲存程式         →    ch05 軟體危機/結構化   →   ch08 型別與形式方法\nch03 編譯器的賭注          ch06 模組化與 Unix         ch09 函數式的回歸\n                                                            │\n                                                            ↓\nPart VII 當下與回望       Part VI 雲與分散式        Part V 資料/開源/網路\nch19 抽象會洩漏       ←    ch16 從伺服器到雲     ←   ch13 關聯模型\nch20 AI 輔助編程          ch17 微服務與容器          ch14 開源與 Git\nch21 複雜度守恆(收)全走完  ch18 DevOps 與 SRE         ch15 網路與 Web\n                                  ↑___________________________│\n        Part IV 流程戰爭：ch10 人月神話 → ch11 瀑布 → ch12 敏捷\n        （方法 strand 的高潮，夾在抽象大廈與資料/網路之間）\n```\n\n每一格你都走過了。ch01 第一次給你這張圖時，你站在左上角，後面二十格還是空白的地名。現在每一格都有了內容、有了帳單、有了一個你能講的故事。這章把它們連成一條線。\n\n## 從你已知的出發\n\n回到 ch01 的你。\n\n那時候，如果有人問你「軟體史是什麼」，你大概會給一個誠實但無聊的答案：一串發明。1957 年 FORTRAN、1970 年代 Unix、1991 年 Linux、2006 年 AWS、2013 年 Docker……一份按時間排好的功勞簿。你能背幾個里程碑，但你講不出**它們之間的因果**——為什麼 Unix 之後會長出微服務，為什麼 Codd 一篇 1970 年的論文你今天每天還在用，為什麼一個 1975 年的經理講的話能套在你上禮拜那個 sprint 上。它們在你腦子裡是離散的點，不是一條線。\n\n現在不一樣了。現在如果一個比你資淺的工程師——比方說剛進公司、正在被你的 cache library 與微服務架構淹沒的那個新人——問你「我們為什麼會走到今天這個樣子」，你能給他一條線。不是一份功勞簿，是一個**機制**：人腦裝不下複雜度，於是七十年來我們反覆做兩件事——換一層更高的抽象、或換一套更好的方法——把複雜度從一個地方搬到另一個地方。從來沒消滅過，只是搬家。每一次搬家都換來一段甜蜜期，然後在抽象洩漏的那一刻，帳單回來找你。\n\n這個轉變——從「我知道一堆事實」到「我能講一個有因果的故事」——就是這本書唯一想給你的東西。ch01 那張帳單說得很白：本書下的賭注，是**給你三個工具比給你一堆事實更耐用**，因為工具能套到還沒發生的躍遷上。你現在手上握的，就是那三個工具加四條主線。這一章是它們的結算。\n\n而這件事對你不只是智識上的通透。你正在轉職 AI Infra、做 LLM serving——這不是離開這條歷史，這是站在它的**最前緣**。你待會會看到：LLM serving 撞的每一面牆，都是這本書講過的牆換了個尺度重來一次。所以驗收這本書，某種意義上也是在驗收你看自己下一份工作的眼光。\n\n先把故事線講完整，再用四條主線逐一驗收。\n\n## 複雜度守恆：七十年史的最終陳述\n\n把整本書壓成一句話：**軟體七十年史，是複雜度反覆搬家的歷史，從未消滅。**\n\n這句話在 ch01 是一個**主張**——一個我請你帶著走、但故意不替你證明的假設。現在它是一個**結論**，因為你手上有二十筆帳。把它們攤開排成一列，你會親眼看到「守恆」不是一個漂亮的比喻，而是反覆出現的事實。每一章末尾的 `## 複雜度搬去哪了`，結的就是這一筆帳；現在是總帳。\n\n| 章 | 躍遷 | 複雜度從哪搬到哪 |\n|---|---|---|\n| ch02 | 儲存程式 | 從「銅線與插板」搬到「記憶體裡的軟體」——換來一門能自我建構的學科，代價是一個沒有上限、會自我繁殖的複雜度宇宙 |\n| ch03 | 編譯器 | 從「每個寫程式的人」搬到「編譯器團隊」——你不必懂暫存器配置，代價是效能出問題時，你和真相之間多了一個你不完全理解的黑盒 |\n| ch04 | Lisp／Algol／COBOL | GC 把「記得 free」從你的腦袋搬到 runtime 的排程器（帳單：GC pause）；COBOL 示範了複雜度重到搬不動的極端 |\n| ch05 | 結構化編程 | 從「執行時追不上的混亂控制流」搬到「寫程式時必須遵守的紀律」——紀律一鬆，義大利麵立刻回來 |\n| ch06 | 模組化與 Unix | 從「程式碼內部」搬到「邊界的選擇」——你不再煩惱每個模組怎麼寫，改成煩惱該把線畫在哪，而畫線要預測未來什麼會變 |\n| ch07 | 物件導向 | 把「資料與操作的水平離散」收攏進物件，但繼承又把「實作的離散」沿繼承樹垂直散開——離散換了個方向搬 |\n| ch08 | 型別與形式方法 | 從「執行期的驚嚇」搬到「開發期的紀律」——多想一點換少炸一點，但擋不掉「我到底想要什麼」這層本質複雜度 |\n| ch09 | 函數式回歸 | 從「執行期的時序災難」搬到「設計期的紀律」——不可變讓 race condition 在定義上不可能，代價是紀律得時時維持 |\n| ch10 | 人月神話 | 沒搬走任何東西——它做了更重要的事：**指出有一塊複雜度（本質的、人性的）搬不走**，並給你一把刀去分它和搬得走的那塊 |\n| ch11 | 瀑布／重量級流程 | 從「執行期的混亂協調」搬到「前期的設計與文件成本」——需求一動，這筆預付成本就大半打水漂 |\n| ch12 | 敏捷 | 「需求不確定性」沒被消滅，它被搬成一筆持續支付的成本（回饋、測試、重構、整合）——每天分期償還，取代最後一次性引爆 |\n| ch13 | 關聯模型 | 把「怎麼拿資料」從你的程式裡搬進引擎——代價是引擎猜錯、ORM 疊太厚、規模逼引擎放棄保證時，以慢查詢／N+1／一致性 bug 漏回來 |\n| ch14 | 開源與 Git | 所有權從私有變可公共；協作的複雜度從人的協調搬進一張可驗證的 DAG——代價是授權相容性，與「分散了又自願集中（GitHub）」的鐘擺反噬 |\n| ch15 | 網路與 Web | 從「千萬台使用者機器上的安裝與相容」凝聚成「你機房裡的永不停機」——軟體跑在你的伺服器，可用性變成你一個人的 24/7 責任 |\n| ch16 | 雲與 IaC | 「擁有機房」的巨大複雜度搬給別人——代價是把命運綁在別人的機器、API、帳單上；合約最下面那行小字寫好了它漏回來的所有方式 |\n| ch17 | 微服務與容器 | 把函式呼叫的複雜度搬到網路上——買到讓一百個人不在同一塊程式上互相等待，帳單在你每次處理逾時、冪等、最終一致性、跨服務 trace 時回來 |\n| ch18 | DevOps／SRE | 維運從「丟過牆讓別人承擔」搬成「共同擁有、持續消化」——代價是持續的工程投入，而對齊誘因的工具一旦被異化成施壓工具，舊牆換個名字回來 |\n| ch19 | 抽象洩漏 | 不搬新東西——它證明前面每一筆帳都還在：所有非平凡抽象都會洩漏，本質複雜度終究漏回來（這是「守恆」的定律化） |\n| ch20 | AI 輔助編程 | AI 砍的多是偶然複雜度（樣板、查 API、翻譯語言）；本質複雜度（搞清楚到底要建什麼）砍不掉——所以「沒有銀彈」在 2026 仍是合理的預設 |\n\n讀這張表的方式，不是一行一行讀，是**看它的形狀**。每一筆帳的左半邊都寫著「消滅了什麼」，看起來像進步；右半邊都寫著「搬到哪、帳單是什麼」，提醒你那是交易不是魔法。十九筆帳，沒有一筆是「複雜度被消滅了」。一筆都沒有。這就是守恆——不是物理意義上的精確守恆，而是一個反覆被驗證的工程事實：**抽象與方法都不消滅複雜度，它們只決定複雜度由誰來扛、在什麼時候以什麼形式回來找你。**\n\nch10 那一筆要特別停一下，因為它是整個守恆主張的源頭。Brooks 在《No Silver Bullet》（1986，注意不是 1975 那本《人月神話》，這是兩份東西）裡把複雜度切成兩塊：**本質複雜度（essential）**——問題本身固有的難，比如「搞清楚這個系統到底要做什麼」；**偶然複雜度（accidental）**——我們用的工具、語言、流程帶來的、原則上可以削掉的難。他下的論斷是：所有工具進步砍的都是偶然複雜度，**本質複雜度砍不掉**。這把刀是整本書的手術刀。它解釋了為什麼型別系統擋得住 null 卻擋不住「這功能根本不該這樣設計」（ch08）、為什麼敏捷馴服得了需求變化卻消滅不掉需求不確定性（ch12）、為什麼 AI 能幫你寫樣板卻定義不了你要建什麼（ch20）。守恆定律的底層，就是 Brooks 這一刀：你能搬走的永遠只有偶然複雜度，本質複雜度只會換地方待著。\n\n## 兩條 strand 的交織：它們從來不是分開走的\n\n第二件事：你蓋東西用的兩種武器——**抽象 strand（我們用什麼蓋）**與**方法 strand（我們怎麼蓋）**——全程互相觸發，從來不是兩條平行線。\n\nch01 給你這兩條 strand 時，是兩個乾淨的定義加一張交織示意圖。現在你有了二十章的證據，可以看清楚交織不是偶爾發生的巧合，而是這場對抗複雜度戰爭的**常態**。把全書最清楚的幾個交織點列出來，你會發現每一個都是「一條 strand 撞牆、逼出另一條」：\n\n| 交織點 | 抽象事件（用什麼蓋） | 方法事件（怎麼蓋） | 誰觸發誰 |\n|---|---|---|---|\n| 結構化編程（ch05） | 三種控制結構成為語言一等公民 | 「別亂跳轉」成為寫程式的紀律 | 抽象不夠用（語言給了 GOTO），逼出方法（紀律）；方法又回頭塑形語言 |\n| 模組化與 Unix（ch06） | 模組／pipe 作為組合的抽象 | 資訊隱藏、separation of concerns 作為分解的準則 | 抽象（模組邊界）與方法（該怎麼切）是同一個決定的兩面 |\n| 物件導向（ch07） | class／封裝／多型的語言機制 | Kay 的訊息傳遞願景、組合優於繼承的設計守則 | 抽象落地（class）背離了原始方法理念（訊息），帳延到分散式時代才付 |\n| 關聯模型（ch13） | 宣告式查詢、資料獨立性 | 「說要什麼、別管怎麼拿」的開發方式 | 抽象（關聯代數）直接重寫了寫資料層程式的方法 |\n| 微服務（ch17） | 容器、服務作為部署抽象 | 按業務能力切、團隊自治（Conway's Law） | 組織方法（團隊邊界）直接決定了系統抽象（服務邊界）——Conway 活生生 |\n| DevOps／SRE（ch18） | 部署流水線、可觀測性作為抽象 | 把維運當工程、error budget 當談判工具 | 維運的方法革命，逼出一整套新的工具抽象 |\n\n最值得你帶走的兩個交織點，一頭一尾：\n\n**結構化編程（ch05）**是這本書第一次明明白白的交織。「別寫 GOTO」既是語言事件（控制結構變成語言的一等公民，`if`／`while`／`for` 取代 `goto label`），也是方法事件（一條寫程式的紀律，你今天的 lint 規則 `max-depth`、`complexity` 都是它的後裔）。Dijkstra 反對的不是 GOTO 這個關鍵字本身，是**人腦追不上跳來跳去的控制流**——靜態的程式文本和動態的執行過程之間裂開的那道鴻溝。抽象（控制結構）和方法（紀律）在這裡是同一件事，根本分不開。\n\n**微服務（ch17）**是這交織最戲劇化的一次兌現。它表面是部署抽象（把單體拆成容器、各自獨立發版），骨子裡是組織方法（Conway's Law：系統結構照抄組織溝通結構）。你切服務邊界往往不是技術決定，是**組織決定**——這個服務歸這個團隊、那個服務歸那個團隊，於是程式就照團隊的形狀長。切錯邊界往往不是技術沒做好，是組織問題偽裝成技術問題。你那個「拆出來卻還是得一起發版」的分散式單體，本質是 Conway 在懲罰你：你的服務邊界沒對上你的團隊邊界。一個 1968 年的觀察（Conway's Law 刊在 Datamation），精準預言了你 2026 年的架構痛。\n\n交織這條主線的領悟是：當你看到一個新技術，別急著問「這是抽象還是方法」。問的是——**它在哪條 strand 上撞了牆，又逼另一條 strand 出來補？** 微服務是抽象（容器）來補方法（團隊協調）的牆；敏捷是方法（短迴圈）來補「需求預測不準」這個沒有抽象能解的牆。看懂這個觸發關係，你就不會把任何新詞當成憑空的革命。\n\n## 鐘擺：四組張力擺過哪幾輪，下次往哪擺\n\n第三件事：軟體史上有幾組張力**反覆來回擺盪**，每次回擺都帶著上一輪的教訓。ch01 把這叫鐘擺，並提醒你一句關鍵的話——**鐘擺不是圓，是螺旋：擺回同一側，但高了一層。**\n\n四組張力，ch01 就定義好了，全書一路擺給你看。現在把每組的歷史軌跡收束起來：\n\n```text\n效能 ↔ 生產力\n  手寫機器碼 → FORTRAN「自動編程」賭注(ch03) → 高階語言贏 → JIT/編譯器最佳化\n  把效能贏回來一部分 → 你選 NestJS(生產力)、對 3% 熱路徑手動最佳化(效能)\n集中 ↔ 分散\n  大主機(集中) → 個人電腦/分散 → NoSQL 放棄強一致(ch13,分散) → 雲(ch16)\n  → 平台工程把維運複雜度再集中(ch18) → CVS/SVN(集中)→Git(分散)→GitHub(又集中,ch14)\n單體 ↔ 分散式\n  一個 process 的函式呼叫 → SOA → 微服務(ch17,分散式) → 近年「回到單體」反思\n  (modular monolith：學過微服務的痛之後、刻意保留邊界的單體)\n手工 ↔ 自動\n  手動接線(ch02) → 手動點 console 開機器 → IaC 一鍵起基礎設施(ch16)\n  → AI 輔助編程把「寫程式」也往自動端推(ch20)\n```\n\n讀這張圖，重點不是「歷史在重複」這種廉價的犬儒。重點是**每次回擺都站得比上次高**。今天有人認真討論「回到單體」，他要的不是 2005 年那種什麼都塞一起的大泥球，而是「吃過微服務的網路稅、一致性稅、可觀測性稅之後，刻意保留模組邊界的單體」——這是螺旋，不是圓。NoSQL 把一致性還給應用層，不是退回前關聯時代，是「知道 CAP 之後、有意識地在一致性上選邊」。每一次回擺都帶著傷疤。\n\n那「下次往哪擺」呢？這本書不預言——預言未來不是歷史書能做的事，也不是這本書要教你的。但它給你一個**判斷框架**，比預言耐用得多。當你看到一個鐘擺正在往某一側擺，問三個問題：\n\n1. **它在還上一輪的什麼帳？** 微服務還的是「大團隊在單體上互相踩腳」的帳；「回到單體」還的是「網路、一致性、可觀測性三筆稅太貴」的帳。每一次擺動都是在償還上一側累積的代價。看清楚它在還哪筆帳，你就知道它擺到對側後會累積出什麼新帳。\n2. **這次的高度在哪？** 純粹的重複不存在。新的一側一定帶著上一輪學到的東西。如果你看不出新高度，那要嘛是你還沒看懂，要嘛這真的只是行銷話術在炒冷飯。\n3. **本質還是偶然？** 用 Brooks 的刀切：這個鐘擺如果是在搬偶然複雜度（工具、部署形態），那它擺來擺去都合理，看你的脈絡選邊。但如果有人宣稱某次擺動消滅了某個**本質複雜度**（「微服務讓你不必再想一致性」「AI 讓你不必再想要建什麼」），那他在賣銀彈，鐘擺一定會擺回來打他的臉。\n\n這個框架的價值在於：見過鐘擺擺過幾輪的人，不會把每個新詞都當革命，也不會犬儒到把每個新詞都當炒冷飯。你會冷靜地問「它在還哪筆帳、站多高、搬的是本質還是偶然」——然後給出一個有歷史縱深的判斷。這就是你讀完這本書該有的眼光。\n\n## 永恆真話：為什麼四十年前的話今天還準\n\n第四件事，也是最反直覺的一件：技術以十年為單位淘汰，但有幾句話四十年不過時。為什麼？\n\n把全書反覆回收的三句話放在一起：\n\n- **Brooks（1986，《No Silver Bullet》）：沒有銀彈。** 本質複雜度砍不掉，沒有任何單一技術能讓軟體生產力一個數量級地跳升。\n- **Conway（1968，刊於 Datamation）：組織形狀＝系統形狀。** 設計系統的組織，產出的設計結構會照抄組織的溝通結構。\n- **Dijkstra（最早見 1969 NATO Rome 報告）：測試只能證明 bug 存在，不能證明它不存在。** 精確原句是「Program testing can be used to show the presence of bugs, but never to show their absence!」\n\n這三句話跨越的技術環境天差地別——Brooks 講的是 OS/360 的大型主機，Conway 講的是 1960 年代的委員會，Dijkstra 講的是結構化編程剛萌芽的年代。它們講的系統你一個都沒碰過。但它們今天準到讓人發毛：你親身驗過「加人到遲到的專案讓它更遲到」（ch10）、你的微服務邊界照團隊邊界長（ch17）、你寫了一萬個測試還是不敢說「沒有 bug」只敢說「目前沒測出 bug」。\n\n為什麼四十年不過時？**因為它們講的不是技術，是人與複雜度的關係。**\n\n技術會過時，是因為技術是偶然複雜度的解法——它解的是「這個工具在這個時代不夠好」這類問題，而工具會被更好的工具取代。但 Brooks、Conway、Dijkstra 講的東西站在更底層：\n\n- Brooks 講的是**本質複雜度的不可消滅性**——這不是哪個工具的缺陷，是「問題本身固有的難」這件事的性質。換再多工具都不會變。\n- Conway 講的是**人類溝通結構如何決定產出結構**——這不是某種架構的問題，是「一群人協作」這件事的數學。只要軟體還是人寫的、一群人寫的，它就準。\n- Dijkstra 講的是**測試這種方法的邏輯邊界**——測試是抽樣，抽樣永遠覆蓋不了無限的輸入空間。這是邏輯，不是技術，邏輯不會因為你換了測試框架而改變。\n\n這就是這三句話的共同點，也是它們不過時的唯一原因：**它們描述的是約束，不是解法。** 解法會被淘汰，約束不會。人腦的容量、人與人的溝通成本、問題本身的固有難度、抽樣的邏輯極限——這些是軟體這門學科的物理常數。任何宣稱推翻了它們的新技術，要嘛是在偷換概念（把本質當偶然），要嘛還沒撞上自己的洩漏帳單。\n\n這條主線的領悟，是這本書最想留給你的一句話：**當你下次聽到一個革命性的宣稱，先用這三句話去測它。** 它宣稱消滅了本質複雜度嗎（Brooks 會搖頭）？它宣稱組織不影響架構嗎（Conway 會笑）？它宣稱「測過就等於沒 bug」嗎（Dijkstra 會嘆氣）？四十年前的三個人，替你準備好了三把照妖鏡。\n\n## 你的座標：AI Infra 是這部歷史的最新一章\n\n把鏡頭轉回你身上。你正在做 LLM serving，這不是離開這條七十年長河，這是站在它的最前緣。用你剛驗收完的四條主線看你的下一份工作，你會發現它沒有一處是新的——全是這本書的模式換了尺度重來：\n\n- **守恆**：LLM serving 的每一個優化都是搬家不是消滅。KV cache 把「重算」的複雜度搬成「記憶體」的複雜度（換來 memory-bound 的瓶頸，這是 ch02 的 von Neumann bottleneck 在 2026 的化身）；batching 把延遲換吞吐；量化把精度換速度。沒有一個是免費的午餐。\n- **交織**：模型服務框架（抽象）與「怎麼編排一群 GPU 節點」（方法）互相觸發，跟微服務裡容器與團隊協調互相觸發是同一回事。\n- **鐘擺**：集中（一個大模型）↔ 分散（MoE、分散式推論）、效能（手刻 CUDA kernel）↔ 生產力（用現成框架）——你會在 GPU 上重新打一遍 ch03 就開始的那場仗。\n- **永恆真話**：把一個分散式推論系統做穩，撞的還是 Conway（你的服務拓樸照你的團隊長）、還是 Dijkstra（你壓測過不等於它在尾延遲不會炸）、還是 Brooks（沒有哪個框架能消滅「搞清楚這個推論服務到底要保證什麼 SLO」這層本質複雜度）。\n\nch18 已經替你把這句話說白了：你轉職 AI Infra 的目標（讓大模型跑得穩、快、省），本質就是 SRE＋平台工程用在 LLM serving 上。換句話說——**你不是要去學一門全新的東西，你是要把這本書講的七十年，在一個新尺度上再活一遍。** 這本書是你看懂下一份工作的眼鏡，不是它的替代品（模型內部的事，書架上的 AI Infra 書接手）。\n\n## 複雜度搬去哪了\n\n這是全書最後一筆帳。但它記的不是某個技術——前面二十筆已經把技術記完了。這一筆記的是**這套讀法本身**：你用「複雜度守恆＋兩條 strand＋鐘擺」這副眼鏡讀完了七十年史，這副眼鏡幫你搬走了什麼、又讓你欠下什麼。\n\n| 項目 | 內容 |\n|---|---|\n| **消滅了什麼負擔** | 把「軟體史＝一份要死背的功勞簿」換成「一個能套用的分析機制」。你不再需要記住誰在哪年發明什麼，你只要對任何躍遷問同三個問題（搬走什麼／製造什麼／在哪洩漏）。二十章下來，你得到的不是二十段故事，是一副能套到第二十一段、第一百段躍遷上的眼鏡 |\n| **製造了什麼新負擔** | (1) 框架有觀點，觀點會遮蔽。把所有歷史塞進「守恆／strand／鐘擺」三個盒子，本身是一種簡化——有些史實是混亂、偶然、人事鬥爭的產物，硬塞進框架會扭曲它。(2) 「能講出一條漂亮的因果線」會誘你過度自信，把一個其實很骯髒的歷史講得太順。(3) 這副眼鏡只是**一種**讀法，不是唯一正解——別人從經濟史、從硬體史、從個人史讀軟體，都能讀出別的真東西 |\n| **它在哪洩漏** | 當你拿這套讀法去**預測**而不是去**理解**時。框架解釋過去很好用，但歷史不保證重演——下一個躍遷可能落在三個工具都照不到的地方。一旦你開始用「鐘擺一定會擺回來」當預言而非判斷工具，你就把一副分析眼鏡誤用成水晶球了，那一刻它就洩漏了 |\n| **這一跳的帳單一句話** | 你用「主動思考、誠實面對框架邊界的負擔」換掉了「死背事實的負擔」——這副眼鏡的價值在於它耐用（能套到還沒發生的躍遷），它的限制在於它有觀點（會遮蔽框架照不到的東西）。**知道它何時好用、何時該摘下來，才算真的讀懂了這本書** |\n\n最後一格是這整本書的收束。守恆定律本身也遵守守恆定律：這套讀法沒有消滅「理解軟體史」這件事的複雜度，它把複雜度從「記憶」搬到了「判斷」。記憶的負擔輕了，判斷的負擔重了——而判斷是搬不走的本質複雜度（Brooks 在最後一頁還在對你笑）。一個好的讀者，跟一個好的抽象設計者一樣，清楚自己握的是一筆交易，不是一個消滅複雜度的魔法。這，就是全書總帳的最後一筆。\n\n## 紙上推演\n\n這是全書最後一組推演，也是真正的口試。前四題是 ch01 就預告的四條驗收主線，每一題都請你**站起來、對著一個想像中的資深工程師、用嘴巴講三到五分鐘**——講得出來才算讀懂，講不清楚就是還沒懂，不是記性問題。每題後面給的是「模範答案要點清單」，是檢核表不是逐字稿：你自己的話講完，逐項打勾，缺哪一項就回去補哪一章。\n\n### 推演 1 — 守恆主線：對任一躍遷結出一筆帳 **[15 分鐘] ★★**\n\n隨機挑一個本書講過的躍遷（編譯器／OOP／關聯模型／雲／微服務，自選一個），對一個資淺工程師結出它的完整複雜度帳單，並用它證明「複雜度守恆」不是比喻。\n\n#### 推演解答\n\n**要點清單（逐項打勾）：**\n\n- [ ] 講出**撞了哪面牆**（前一個狀態的痛）——不能跳過動機直接講解法。\n- [ ] 講出**消滅了什麼負擔**（左半邊，看起來像進步的那部分）。\n- [ ] 講出**複雜度搬到哪、由誰扛**（右半邊：不是消失，是換人換地方扛）。\n- [ ] 講出**帳單在什麼情況下回來**（洩漏的具體場景，最好是你親身踩過的）。\n- [ ] 用這筆帳明確說出「**這一跳沒有消滅複雜度**」——守恆的證明就在「搬走的那塊在別處還在」。\n\n**常見講不好的地方**：只講「它解決了什麼」（左半邊），忘了右半邊。一個只講好處的答案，是行銷話術不是工程判斷。守恆主線的整個重點，就是逼你永遠把右半邊也講出來。範例答案（微服務）：牆是「大團隊在單體上互相踩腳」；消滅的是「發版要等所有人」；搬去的是「網路上」——函式呼叫變成會逾時、會重試的網路呼叫；帳單在你處理冪等、最終一致性、跨服務 trace 時回來；所以複雜度沒消滅，它從「程式內」搬到了「網路上」，你用「程式內的簡單」買了「組織上的可擴展」。\n\n### 推演 2 — 交織主線：找一個既是抽象又是方法的事件 **[15 分鐘] ★★**\n\n挑一個本書事件，說清楚它**同時**是抽象事件和方法事件，並講出一條 strand 怎麼觸發了另一條。\n\n#### 推演解答\n\n**要點清單：**\n\n- [ ] 明確指認**抽象事件那一面**（用什麼蓋：某個語言機制／部署形態／資料模型）。\n- [ ] 明確指認**方法事件那一面**（怎麼蓋：某條紀律／流程／組織方式）。\n- [ ] 講出**觸發方向**——是抽象撞牆逼出方法，還是方法撞牆逼出抽象？（兩個方向都對，重點是你說得出是哪個方向。）\n- [ ] 點出「**這兩面其實是同一個決定**」——交織不是兩件事剛好同時發生，是一件事的兩個側面。\n\n**最乾淨的兩個範例**：結構化編程（ch05）——控制結構是抽象面、「別亂跳轉」的紀律是方法面，抽象不夠用逼出方法、方法又回頭塑形語言；微服務（ch17）——容器是抽象面、Conway's Law（按團隊切）是方法面，組織方法直接決定了系統抽象。**講不好的地方**：把交織講成「這件事既用了新工具又改了流程」，那只是兩件事並列，不是交織。交織的精髓是**因果觸發**——一條 strand 撞了牆，逼另一條出來補。\n\n### 推演 3 — 鐘擺主線：一組張力擺過哪幾輪 **[20 分鐘] ★★★**\n\n挑四組張力（效能↔生產力、集中↔分散、單體↔分散式、手工↔自動）裡的一組，講出它歷史上擺過哪幾輪、每輪帶著上輪什麼教訓，並用「下次往哪擺」的判斷框架推演它接下來可能怎麼動（記住：是判斷不是預言）。\n\n#### 推演解答\n\n**要點清單：**\n\n- [ ] 講出**至少三個歷史擺動點**，標出每個點擺向哪一側。\n- [ ] 對至少一次回擺，講出它**帶著上一輪的什麼教訓**（證明這是螺旋不是圓）。\n- [ ] 用判斷框架的三問推演「下次」：**它在還上一輪什麼帳／這次站多高／搬的是本質還是偶然**。\n- [ ] 明確聲明「**這是判斷不是預言**」——你給的是分析框架，不是水晶球。\n\n**範例（單體↔分散式）**：單體（一個 process 的函式呼叫）→ SOA → 微服務（分散式，還的是「大團隊互相踩腳」的帳）→ 近年「回到單體」（modular monolith，還的是「網路／一致性／可觀測性三筆稅太貴」的帳，且帶著微服務的傷疤——刻意保留模組邊界）。下次怎麼擺：問它在還哪筆帳。如果「回到單體」這一側累積出「單體又長太大、團隊又開始踩腳」，鐘擺就會再往分散式擺一次，但會站得更高（可能是「邊界更聰明的服務拆分」）。**講不好的地方**：把鐘擺講成犬儒的「都是炒冷飯」。鐘擺主線的反面教材就是犬儒——你要講出每次回擺的**新高度**，否則你沒讀懂「螺旋不是圓」。\n\n### 推演 4 — 永恆真話主線：為什麼四十年不過時 **[20 分鐘] ★★★**\n\n挑 Brooks／Conway／Dijkstra 三句話的一句，講清楚它為什麼跨越四十年的技術變遷還準，並用它去「測」一個你最近聽到的技術宣稱。\n\n#### 推演解答\n\n**要點清單：**\n\n- [ ] 講出這句話**精確在說什麼**（不要含混——No Silver Bullet 是「本質複雜度砍不掉」，不是「沒有好工具」）。\n- [ ] 講出它不過時的**根本原因**：它描述的是**約束（constraint）不是解法（solution）**——約束是這門學科的物理常數，解法才會被淘汰。\n- [ ] 把這句話接到一個**你親身驗過的場景**（你的「加人沒加速」、你的「服務照團隊長」、你的「測過還是炸」）。\n- [ ] 拿它去**測一個當代宣稱**——這個宣稱有沒有偷偷把本質複雜度當偶然複雜度賣？\n\n**範例（用 Brooks 測 AI 編程）**：No Silver Bullet 說本質複雜度砍不掉、沒有單一技術能讓生產力一個數量級跳升。它不過時，因為「本質複雜度」是「問題本身固有的難」的性質，不是哪個工具的缺陷——換工具不改變問題的固有難度。拿它測「AI 讓寫程式快十倍」：AI 砍的是偶然複雜度（樣板、查 API、語言翻譯，這部分是真的），但「搞清楚到底要建什麼、跨系統一致性」這層本質複雜度它砍不掉——所以這個宣稱在偷換概念，把偶然當本質賣。Brooks 在 2026 還是對的（這正是 ch20 的結論）。**講不好的地方**：把「不過時」歸因於「這些人很聰明」。聰明不是原因，**講的是約束而非解法**才是原因。\n\n### 推演 5 — 給「軟體業每隔幾年就有革命性突破」寫一段有縱深的回應 **[15 分鐘] ★★**\n\n200 字以內，寫一段你會對一個剛入行、覺得「軟體業日新月異、每年都在革命」的工程師說的話。要有歷史縱深，不要犬儒，不要說教。\n\n#### 推演解答\n\n**要點清單**：用上「鐘擺（很多革命是上一輪的回擺）」「守恆（新東西多半是搬家不是消滅）」「Brooks 的刀（砍的是偶然還是本質）」至少兩個工具；保持冷靜不犬儒（不能變成「都是炒冷飯」）；給一個可操作的判斷方法而非結論。\n\n**範例答案**（約 180 字）：「日新月異是真的，但別把每個新詞都當革命。軟體史上有幾組張力反覆擺盪——單體↔分散式、集中↔分散、效能↔生產力——很多你以為的『突破』，其實是鐘擺擺回上一側，只是這次帶著上輪的傷疤站得高一點。判斷一個新東西值不值得追，問自己兩件事：它把複雜度搬去哪了（多半是搬家不是消滅，找出帳單在哪）？它砍的是偶然複雜度還是本質複雜度（Brooks 那把刀——宣稱砍掉本質複雜度的，幾乎都在賣銀彈）？這樣你既不會錯過真進步，也不會每兩年就把整套技術棧推倒重來。冷靜地追，比熱情地追，走得遠。」\n\n### 推演 6 — 一年後重讀清單：哪三章值得在什麼工作場景重讀 **[15 分鐘] ★★**\n\n替未來的自己列一張清單：在什麼具體的工作場景下，該回頭重讀哪一章。挑三個場景。\n\n#### 推演解答\n\n**要點清單**：每條都要綁**具體的工作場景觸發條件**（不是「想複習時」這種空話），並說清楚那章能幫你看清什麼。\n\n**範例三條**：\n- **當你又切出一個分散式單體（拆了卻還是得一起發版）→ 重讀 ch06＋ch17**：Parnas 的資訊隱藏（照會變的決定切，不照流程切）＋Conway's Law（你的邊界沒對上團隊邊界），這兩章合起來能診斷你到底切錯在哪。\n- **當團隊在吵「上線 vs 穩定」、開發要快維運要穩 → 重讀 ch18**：error budget 把這場永恆的立場之爭變成一個可談判的數字，你能用它重新框架那場吵架。\n- **當有人興奮地推一個「會改變一切」的新工具/新架構 → 重讀 ch19＋ch20**：抽象洩漏（再好的抽象都會漏）＋沒有銀彈（砍的是偶然還是本質），這兩章是你的照妖鏡，幫你冷靜判斷它到底是真進步還是又一次高估。\n\n## 自我檢核\n\n口頭自答。每一題請對著一個想像中的資深工程師講出來——講得出來才算過關，講不清楚代表那條主線還沒收束，回去重讀對應的章。\n\n1. **十分鐘口述版**：不看書、不看小抄，把軟體七十年史從頭講一遍，每一跳一句「搬走什麼、帳單什麼」。能從「機器只懂 0 與 1」一路講到「AI 輔助編程」、中間不卡殼嗎？（這題是全書的終極驗收，下面個案給你逐段骨架。）\n2. **守恆**：為什麼說「複雜度守恆」是結論而不只是比喻？你能用總帳表裡至少三筆帳，證明每一跳都是搬家不是消滅嗎？\n3. **交織**：為什麼結構化編程「同時是語言事件和方法事件」不是巧合，而是兩條 strand 的常態？你能再舉一個交織點並說出觸發方向嗎？\n4. **鐘擺**：「鐘擺不是圓，是螺旋」這句話到底在說什麼？拿「回到單體」當例子，它高在哪、它在還哪輪的帳？\n5. **永恆真話**：為什麼 Brooks／Conway／Dijkstra 的話四十年不過時？關鍵詞是「約束」還是「解法」，為什麼這個區分決定了一句話會不會過時？\n6. **判斷框架**：下次聽到一個「革命性」宣稱，你會用哪三把照妖鏡去測它？（提示：本質 vs 偶然、它在還哪筆帳、它搬走什麼留下什麼。）\n7. **你的座標**：為什麼說「LLM serving 是分散式系統複雜度的最新形態」、你的 AI Infra 轉職是站在這條歷史的最前緣而不是離開它？舉一個你下一份工作會撞上的牆，把它對應回本書某一章。\n8. **這套讀法的限制**：這副「守恆／strand／鐘擺」眼鏡在什麼時候會誤導你、該摘下來？（提示：解釋過去 vs 預測未來的差別。）\n\n## 延伸閱讀\n\n讀完這本書，往下走有三條路。這裡只給每條路的入口與「如果只看一樣」的建議；完整的延伸閱讀總地圖在**附錄 C**（彙整全書各章的延伸閱讀，按這三條路線分類，並標出 landscape 驗證過的連結）。\n\n**往深處走——讀經典原著**。這本書是導遊，原著才是現場。三篇你讀完這本書後最讀得進去、回報也最高的一手文獻：\n\n- **Fred Brooks，《No Silver Bullet — Essence and Accident in Software Engineering》（1986）**。全書那把手術刀的原文，不長，論證乾淨。本質 vs 偶然複雜度這個分法你已經用了一整本書，現在去看 Brooks 自己怎麼立論。注意它是 1986 的獨立論文，不是 1975 那本《人月神話》的內容（1995 週年版才併進去）。\n- **David Parnas，《On the Criteria To Be Used in Decomposing Systems into Modules》（CACM, 1972）**。資訊隱藏的原典。你每次切微服務邊界切錯，Parnas 五十年前就解釋了為什麼。KWIC 那個例子至今有效。\n- **Melvin Conway，〈How Do Committees Invent?〉（Datamation, 1968）**。Conway's Law 的原文。讀它，然後看你自己的服務拓樸圖——你會看到你的組織結構印在上面。\n\n**如果這三篇只挑一篇先讀：Brooks 的《No Silver Bullet》。** 它是全書四條主線的交會點，也是你拿來測下一個技術宣稱最常用的那把刀。\n\n**往應用走——接你的 AI Infra 之路**。這部歷史的最新一章，是你正要去寫的那一章。你書架上的 **AI Infra 書**接手模型內部與 LLM serving 的細節（這本軟體史書刻意不展開那塊）。把這本書當成那本書的「為什麼會走到今天」前傳：你會發現 LLM serving 的每一面牆——memory-bound、分散式推論、SLO、節點編排——都是這本書講過的牆換了尺度重來，用本章四條主線去讀它。\n\n**往廣處走——讀電腦科學史與科普**。想把這本書的「工程師讀法」對照其他讀法（人物史、機構史、社會史），擴大視野。附錄 C 列了 landscape 驗證過的可信歷史整理與當事人的書／演講；這本書給你的是一副有觀點的眼鏡，多讀幾種讀法，你才知道這副眼鏡照得到什麼、照不到什麼——而知道一個工具的邊界，正是這本書從頭到尾在教你的事。\n\n---\n\n### 個案：「軟體史一條主線」的十分鐘口述版逐段大綱\n\n這是給你照著練的講稿骨架——不是要你背逐字稿，是給你**九段的順序**和**每段必須命中的關鍵詞**。練到能不看小抄、對著一個工程師講十分鐘、每一跳都帶上「搬走什麼、帳單什麼」，這本書對你就成立了。每段約一分鐘。\n\n**第一段——機器（ch02）**。開場錨點：機器只懂 0 與 1，人腦裝不下複雜度，這條鴻溝是全書的引擎。儲存程式（Manchester Baby 1948）讓程式從「你得親手接的線」變成「可載入、可被另一段程式產生的資料」。**搬走什麼**：「換程式＝重組硬體」的物理複雜度。**帳單**：打開了一個沒有上限、會自我繁殖的複雜度宇宙——後面七十年都在這個宇宙裡。\n\n**第二段——抽象（ch03→ch04→ch06→ch07）**。一口氣串起抽象 strand 的爬升：組語→高階語言（FORTRAN 1957 賭「機器產生的碼夠快」，效能↔生產力鐘擺第一次擺動）→語言有了哲學（Lisp 程式即資料、Algol 結構）→模組化（Parnas 1972：照會變的決定切）→OOP（把資料和行為綁一起）。**搬走什麼**：「對機器說話」「組織程式碼」的複雜度，一層層外包。**帳單**：每外包一層，就多一個你看不見、洩漏時得跳進去的黑盒。\n\n**第三段——危機（ch05）**。轉折：抽象讓寫程式變便宜，於是程式變大，大到一個人腦裝不下。1968 NATO 會議喊出 software crisis。**搬走什麼**：Dijkstra 的結構化編程把「執行時追不上的控制流」搬成「寫程式時的紀律」。**帳單**：紀律要靠人持續執行，一鬆就回到義大利麵——而且這是兩條 strand 第一次明顯交織（控制結構是抽象、紀律是方法）。\n\n**第四段——方法（ch10→ch11→ch12）**。方法 strand 的高潮。Brooks《人月神話》1975＋《No Silver Bullet》1986：本質 vs 偶然複雜度，**這是全書的手術刀**。瀑布（Royce 1970 其實在說「純線性不行、要迭代」，被讀反五十年）→敏捷（2001 Manifesto：用短迴圈擁抱變化而非預測變化）。**搬走什麼**：敏捷把「需求不確定性」搬成每天分期償還的小額成本。**帳單**：分期一停付（或異化成考核儀式），帳單立刻走味回來。\n\n**第五段——資料（ch13）**。Codd 1970 關聯模型：資料獨立性——你說要什麼（宣告式），引擎決定怎麼拿。**搬走什麼**：「怎麼拿資料」從你的程式搬進引擎。**帳單**：引擎猜錯、ORM 疊太厚、規模逼引擎放棄保證時，以慢查詢／N+1／一致性 bug 漏回來（NoSQL 反動：CAP 逼你在一致性上選邊）。\n\n**第六段——網路（ch14→ch15）**。開源與 Git（Stallman 把所有權從私有翻成可公共、Torvalds 2005 三週寫出 Git 把協作搬進一張 DAG）→Web（Berners-Lee 1989 提案，開放標準擊敗圍牆花園）。**搬走什麼**：軟體從「裝在使用者機器」搬到「跑在我們的伺服器」。**帳單**：你從此替全世界持有這個軟體的執行——24/7 可用性是你一個人的責任。\n\n**第七段——雲（ch16）**。AWS 2006（S3／EC2）把「擁有並維運機房」整包外包成 API 呼叫；IaC（Terraform 2014）把外包來的東西拉回軟體工程的紀律（基礎設施即程式碼）。**搬走什麼**：「擁有機房」的巨大複雜度搬給別人。**帳單**：命運綁在別人的機器、API、帳單上——冷啟動、分區、鎖定，合約小字裡寫好了它漏回來的所有方式。\n\n**第八段——分散式（ch17→ch18）**。微服務（2014 Lewis & Fowler）把單體照業務能力切開，容器（Docker 2013）＋K8s（2014）封裝。**搬走什麼**：把函式呼叫的複雜度搬到網路上（買到讓一百個人不互相等待）。**帳單**：逾時、冪等、最終一致性、跨服務 trace——而且 Conway's Law 在懲罰你（服務邊界沒對上團隊邊界就是分散式單體）。DevOps／SRE 把維運變成工程（error budget 把可靠度變成可談判的數字）。\n\n**第九段——AI 與收束（ch19→ch20→ch21）**。回望：所有非平凡抽象都會洩漏（Joel 2002），本質複雜度終究漏回來——鐘擺擺回來，你週期性地回到底層。AI 輔助編程（Copilot 2022→2026 的 agentic 工具）是第幾次「自動編程」的夢（回收 FORTRAN 1957 也叫 automatic programming）。**搬走什麼**：AI 砍偶然複雜度（樣板、查 API、翻譯）。**帳單／收束**：本質複雜度（搞清楚要建什麼）砍不掉——所以沒有銀彈在 2026 仍是合理的預設。**收尾一句**：七十年，複雜度反覆搬家、從未消滅；四十年前 Brooks、Conway、Dijkstra 的話今天還準，因為它們講的是人與複雜度的關係，不是技術。而你的 AI Infra 之路，是這條長河的最新一段——同一條河，新的尺度。\n\n練熟這九段，你就握住了這本書。剩下的，去寫你自己的下一章。\n"}, {"id": "appendix-a-timeline", "file": "appendix-a-timeline.md", "group": "附錄", "title": "附錄 A — 軟體史總時間軸", "md": "# 附錄 A — 軟體史總時間軸\n\n> 這張表把全書二十一章散落各處的里程碑收進一條編年線，每一條標出它屬於哪一條 strand（抽象／方法／both）、以及主要在哪一章被講透——它是全書「跨章年份一致性」的最終對帳表，年份與歸屬一律照 `_meta/landscape-2026-06.md` 的主時間軸。\n\n## 主時間軸\n\n下表只收**書中（任一章）實際講過**的事件；年份照 landscape 主時間軸，landscape 用區間或標 ⚠️ 的，這裡照樣 hedge。「strand」欄沿用全書定調：**抽象**＝用什麼蓋（語言／型別／抽象層）、**方法**＝怎麼蓋（流程／工程實務）、**both**＝同時是語言事件與方法事件。「章」欄填該事件**主要**在哪一章被攤開（多章回收的，標主場章；跨章回收見該章內文）。\n\n| 年份 | 里程碑 | strand | 章 |\n|---|---|---|---|\n| 1837 | Babbage 提出 Analytical Engine 設計（從未完整建成；是「設計」不是「機器」） | 抽象 | ch02 |\n| 1843 | Lovelace 隨 Menabrea 講稿英譯所附 Notes A–G（含 Note G／Bernoulli 數）⚠️「第一位程式設計師」是有爭議的後世標籤，Note G 嚴格說更像執行軌跡 | 抽象 | ch02 |\n| 1936 | Turing〈On Computable Numbers〉；Church 抽出 untyped λ-calculus（計算的另一個理論根，FP 的源頭） | 抽象 | ch02／ch09 |\n| 1945 | 《First Draft of a Report on the EDVAC》——儲存程式工程藍圖 ⚠️ 單獨署名 von Neumann，與 Eckert/Mauchly 的功勞爭議照書 | both | ch02 |\n| 1945–46 | ENIAC 運轉（1945-12-10 首題、1946-02-15 公開）；非儲存程式機，以插線板設定；ENIAC Six 女程式設計師 | both | ch02 |\n| 1948 | Manchester Baby（SSEM）跑出第一支儲存程式（世界第一台運轉的電子儲存程式電腦，實驗機） | 抽象 | ch02 |\n| 1949 | EDSAC 運轉（第一台「實用的」完整儲存程式電腦）；Wheeler「Initial Orders」＝史上第一個組譯器系統 | 抽象 | ch02（機器）／ch03（組譯器） |\n| 1951–52 | Hopper A-0 ⚠️「第一個編譯器」需保留——以現代定義更接近 loader/linker，非把高階語言翻成機器碼的現代 compiler | 抽象 | ch03 |\n| 1957 | FORTRAN 出貨——第一個廣泛使用的高階語言；「automatic programming」的賭注（效能↔生產力鐘擺第一次擺動） | 抽象 | ch03 |\n| 1958–60 | LISP（McCarthy）——程式即資料（homoiconicity）、遞迴、garbage collection 的誕生；eval 被 Steve Russell 手工編成機器碼 | 抽象 | ch04（語言哲學）／ch09（FP 源頭） |\n| 1959–60 | COBOL（CODASYL；Hopper 經 FLOW-MATIC 深刻影響，非唯一作者）——為商業可讀性設計、長壽 | 抽象 | ch04 |\n| 1960 | ALGOL 60 Report；block structure；BNF（Backus–Naur Form）；後世語言的共同祖先 | 抽象 | ch04 |\n| 1965 | Hoare 在 ALGOL W 引入 null reference——後來他稱為「billion-dollar mistake」（道歉場合是 2009 QCon，非 1980 圖靈獎演說） | 抽象 | ch08 |\n| 1966 | Böhm–Jacopini 結構化定理——sequence／selection／iteration 三結構足夠 | 抽象 | ch05 |\n| 1967 | Simula 67（Dahl & Nygaard）——首個帶 class／object／inheritance 的語言，OOP 概念源頭 | 抽象 | ch07 |\n| 1968 | NATO Garmisch 會議喊出 software crisis、「software engineering」刻意挑釁命名；Dijkstra〈Go To Statement Considered Harmful〉（標題是編輯 Wirth 下的）；Conway〈How Do Committees Invent?〉刊於 Datamation（1967 投稿被 HBR 退稿；「Conway's Law」之名後人冠上） | both | ch05（NATO／GoTo）／ch10（Conway） |\n| 1969 | ARPANET 上線（年底四節點）；Hoare logic〈An Axiomatic Basis for Computer Programming〉；NATO Rome 會議；Unix 開發起步（Thompson, Bell Labs） | both | ch15（ARPANET）／ch08（Hoare logic）／ch05（NATO）／ch06（Unix） |\n| 1970 | Codd〈A Relational Model of Data〉——關聯模型原典、資料獨立性；Royce〈Managing the Development of Large Software Systems〉📌 常被誤讀為瀑布之父，實際上他把純線性當反例、倡議迭代 | both | ch13（Codd）／ch11（Royce） |\n| 1970s | Smalltalk-72/-76/-80（Kay/Ingalls/Goldberg, Xerox PARC）——Kay 造「object-oriented」一詞；ML 與 Hindley–Milner 型別推論（Milner, Edinburgh）——第一個有多型型別推論的實用系統 | 抽象 | ch07（Smalltalk）／ch08（ML/HM） |\n| 1972 | C 語言（Ritchie）；Parnas〈On the Criteria To Be Used in Decomposing Systems into Modules〉——information hiding 原典 | both | ch06 |\n| 1973 | Unix pipes（McIlroy 推動進 Unix）——小工具用 pipe 組合的哲學 | 抽象 | ch06 |\n| 1974 | TCP/IP 論文（Cerf & Kahn）；SEQUEL（→SQL，Chamberlin & Boyce）；Knuth「premature optimization is the root of all evil」完整脈絡（97%／關鍵 3%）；Dijkstra 在 EWD447 造「separation of concerns」一詞 | both | ch15（TCP/IP）／ch13（SQL）／ch19（Knuth）／ch06（SoC） |\n| 1975 | 《The Mythical Man-Month》（Brooks，經驗來自 OS/360）；Brooks's Law（加人到遲到的專案讓它更遲到）；概念完整性 | 方法 | ch10 |\n| 1976 | 「Waterfall」一詞首現（一般歸 Bell & Thayer）——晚於 Royce 論文 6 年、非 Royce 自稱 | 方法 | ch11 |\n| 1978 | K&R《The C Programming Language》；Unix 哲學原則（McIlroy 等，1978 原句「Make each program do one thing well」；⚠️ 流傳的整齊三句版是 Salus 1994 轉述） | both | ch06 |\n| 1979 | 「C with Classes」起步（1983 改名 C++）（Stroustrup, Bell Labs） | 抽象 | ch07 |\n| 1983 | GNU 宣告（Stallman）；TCP/IP flag day（NCP 切到 TCP/IP）；ACID 一詞（Härder & Reuter；概念奠基 Jim Gray，原未含 isolation） | both | ch14（GNU）／ch15（flag day）／ch13（ACID） |\n| 1985 | Free Software Foundation（Stallman，「free as in freedom」）；Miranda（Turner）——惰性純函數、Haskell 主要靈感 | both | ch14（FSF）／ch09（Miranda） |\n| 1986 | 📌《No Silver Bullet》（Brooks，**1986 論文**，非 1975 原書；本質 vs 偶然複雜度——全書的分析手術刀） | 方法 | ch10 |\n| 1989 | WWW 提案〈Information Management: A Proposal〉（Berners-Lee, CERN）；「Worse is Better」概念（Gabriel，正式刊 1991） | both | ch15（WWW 提案）／ch19（Worse is Better） |\n| 1990 | Haskell 1.0（委員會；1987 FPCA 決議組委員會、1990-04 發表第一份 Report）——惰性、純函數式的終點 | 抽象 | ch09 |\n| 1991 | WWW 對外公開（1991-08）；Linux kernel（Torvalds，1992 改自由軟體授權） | both | ch15（WWW）／ch14（Linux） |\n| 1993 | Mosaic 圖形瀏覽器（Andreessen & Bina, NCSA）；**CERN 宣告 WWW 進入公有領域（1993-04-30，無人可擁有）**；CFEngine（IaC 工具線起點） | both | ch15（Mosaic／CERN）／ch16（CFEngine） |\n| 1995 | Java 1.0（Gosling, Sun；「Write Once, Run Anywhere」）；Scrum 正式發表（OOPSLA；根在 Takeuchi & Nonaka 1986） | both | ch07（Java）／ch12（Scrum） |\n| 1997 | 〈The Cathedral and the Bazaar〉（Raymond）——大教堂式 vs 市集式開發 | 方法 | ch14 |\n| 1998 | 「Open Source」一詞（Peterson 造詞，OSI 成立）；VMware 成立 | both | ch14（Open Source）／ch16（VMware） |\n| 1999 | 《Extreme Programming Explained》（Beck）；《Refactoring》（Fowler）；VMware Workstation | both | ch12（XP/重構）／ch16（VMware Workstation） |\n| 2000 | CAP conjecture（Brewer, PODC）——規模逼迫放棄強一致 | 抽象 | ch13 |\n| 2001 | Agile Manifesto（Snowbird, 17 簽署人）——四大價值、對重量級流程的反叛 | 方法 | ch12 |\n| 2002 | CAP 證明（Gilbert & Lynch）；〈The Law of Leaky Abstractions〉（Joel Spolsky）——「所有非平凡抽象都會洩漏」 | both | ch13（CAP 證明）／ch19（抽象洩漏） |\n| 2003 | Xen（paravirtualization）；Google SRE 起（約 2003，Treynor Sloss 創立） | both | ch16（Xen）／ch18（SRE 起源） |\n| 2004 | MapReduce 論文（Dean & Ghemawat, OSDI；名字與概念取自 Lisp 的 map/reduce，純函數天生可平行）；Web 2.0 命名（O'Reilly–MediaLive 腦力激盪） | both | ch09（MapReduce）／ch15（Web 2.0） |\n| 2005 | 〈The Free Lunch Is Over〉（Sutter, *Dr. Dobb's*）——多核轉折、不可變值錢；AJAX 一詞（Garrett）；Web 2.0 定義文〈What Is Web 2.0〉（O'Reilly）；Puppet（IaC）；Git（Torvalds，BitKeeper 授權爭議觸發，極短時間成形） | both | ch09（Free Lunch）／ch15（AJAX/Web 2.0）／ch16（Puppet）／ch14（Git） |\n| 2006 | AWS S3（2006-03）／EC2（2006-08）——IaaS 起點，伺服器從「擁有」變「按片租用」；Google Bigtable 論文（NoSQL 技術源頭） | both | ch16（AWS）／ch13（Bigtable） |\n| 2007 | Linux cgroups 進 kernel（Google 主推，容器底層血統）；Amazon Dynamo 論文 | both | ch17（cgroups）／ch13（Dynamo） |\n| 2009 | 首屆 DevOpsDays（Debois, Ghent）——DevOps 一詞；NoSQL meetup（命名 Eric Evans）；Chef（IaC） | 方法 | ch18（DevOps）／ch13（NoSQL）／ch16（Chef） |\n| 2010 | 《Continuous Delivery》（Humble & Farley）——自動化部署流水線 | 方法 | ch18 |\n| 2013 | Docker 公開（Hykes, PyCon lightning talk）——把環境差異封進不可變 image（回收 code as data）；《The Phoenix Project》 | both | ch17（Docker）／ch18（Phoenix Project） |\n| 2014 | Kubernetes（Google 宣布並開源，血脈承 Borg）；Microservices 定義文（Lewis & Fowler）；Terraform（HashiCorp） | both | ch17（K8s／微服務）／ch16（Terraform） |\n| 2015 | CNCF 成立（K8s 為首個種子專案） | 方法 | ch17 |\n| 2016 | 《Site Reliability Engineering》（Google／O'Reilly）——SLO/SLI/error budget 由此普及 | 方法 | ch18 |\n| 2019 | 《Team Topologies》（Skelton & Pais）——平台工程運動奠基文本、cognitive load | 方法 | ch18 |\n| 2021 | GitHub Copilot technical preview（基於 OpenAI Codex） | 抽象 | ch20 |\n| 2022 | GitHub Copilot GA | 抽象 | ch20 |\n| 2023–26 | ⚠️ agentic coding 工具興起（Cursor／Claude Code／Copilot agent 等，截至 2026-06）——「自動編程」夢的最新一輪，判斷可能被推翻 | 抽象 | ch20 |\n\n## 怎麼用這張表\n\n這張表不是給你背年份的——書一開頭就說了，軟體史不是「某年某人發明某物」的編年帳。它的用法是當**驗收清單**：把手指蓋住「里程碑」欄以外的部分，對每一跳問自己兩個問題——\n\n1. **這一跳搬走了什麼複雜度？** 它撞的是哪一面牆（人腦裝不下、機器太難說話、大團隊互相踩腳、規模逼著放棄一致性……），用的是抽象還是方法翻越的？\n2. **帳單是什麼？** 它把複雜度搬去哪了（搬進編譯器、搬上網路、搬給雲、搬給別人的團隊），這筆帳在什麼情況下會洩漏、回來找你？\n\n講得出這兩件事的那一行，你才算真的懂了它——而不只是記得它發生在哪一年。能對整條時間軸從 1837 講到 2026、每一跳都說清楚「搬走什麼、帳單是什麼」，你就完成了全書的核心驗收：軟體七十年史是一部**複雜度反覆搬家、從未消滅**的歷史（總帳回收見 ch19，最終陳述見 ch21）。\n\n另外提醒：標 ⚠️ 的幾行（Lovelace「第一位程式設計師」、EDVAC 署名爭議、Hopper「第一個編譯器」、Salus 轉述的 Unix 哲學三句版、2023–26 的當下判斷）是「大家最容易記錯／還沒蓋棺」的地方——這些保留條件本身，正是本書要你帶走的東西之一：對流行說法保持歷史縱深的清醒。\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 人物與術語表", "md": "# 附錄 B — 人物與術語表\n\n> 從各章實際寫出的內容萃取的速查表，只收書中真正出現、且講過貢獻或意義的人與詞。本書的驗收靠口述——所以這裡每一筆都寫成「一句話講出他/它在解什麼複雜度」的形式：你若能把這張表的任一列用自己的話對另一個工程師講清楚，那一章就算過了。首次出現章以全書 grep 對到的最早章為準（序章 ch01 會先預告幾個全書工具，真正攤開的「主場章」在一句話裡用「（見 chNN）」標出）。\n\n## 人物\n\n| 原文名 | 中譯（書中用法） | 一句話貢獻 | 首次出現章 |\n|---|---|---|---|\n| Charles Babbage | Babbage | 構思分析機（Analytical Engine, 1837 起），第一個把「通用可程式化機器」當成設計來畫的人——但機器從未完整建成，留下的是設計不是機器。 | ch02 |\n| Ada Lovelace | Lovelace | 為分析機寫下含 Bernoulli 數演算法的 Note G（1843）；「第一位程式設計師」是有爭議的後世標籤（Note G 嚴格說更像執行軌跡），本書照 landscape 寫「常被譽為」而非斷言。 | ch02 |\n| Alan Turing | 圖靈 | 1936《On Computable Numbers》用圖靈機（一個思想實驗、不是機器）劃出「可計算」的邊界，奠定計算的理論地基。 | ch02 |\n| John von Neumann | 馮紐曼 | 1945 EDVAC 報告單獨署名，使「程式與資料同住一個記憶體」的儲存程式概念以他冠名（馮紐曼架構）——但功勞歸屬對 Eckert/Mauchly 有爭議，本書照 landscape 帶出。 | ch02 |\n| J. Presper Eckert | Eckert | 與 Mauchly 共同設計 ENIAC（1945–46）；儲存程式概念的早期討論者，是馮紐曼署名爭議裡被蓋過功勞的一方。 | ch02 |\n| John Mauchly | Mauchly | ENIAC 的另一位主設計者；與 Eckert 同為儲存程式信用爭議的當事人。 | ch02 |\n| Herman Goldstine | Goldstine | 1945 把馮紐曼署名的 EDVAC 報告分發出去的人，這份「形同公開發表」的動作正是命名爭議的引爆點。 | ch02 |\n| Maurice Wilkes | Wilkes | 主持 EDSAC（1949），第一台實用的完整儲存程式電腦；其 Initial Orders 把儲存程式從理論變成日常可操作的機器。 | ch02 |\n| David Wheeler | Wheeler | EDSAC 的 Initial Orders（1949）作者——史上第一個組譯器系統，讓人用助記符而非二進位寫指令，並奠基副程式（Wheeler Jump）概念。 | ch03 |\n| Grace Hopper | Hopper（多用原文） | A-0（1951–52）與 FLOW-MATIC——把「英語化、自動串接副程式」推上路，深刻影響 COBOL；「第一個編譯器」之說以現代定義更像連結載入器，本書照 landscape 校準。 | ch02 |\n| John Backus | Backus | 領導 IBM 做出 FORTRAN（1957），第一個廣泛使用的高階語言，賭贏了「機器產生的碼能不能跟手寫一樣快」這場效能↔生產力之爭；後又提出 BNF。 | ch03 |\n| John McCarthy | McCarthy | 1958–60 設計 LISP，引入 S-expression、程式即資料（homoiconicity）與 garbage collection——把「記得釋放記憶體」這個複雜度永久搬給 runtime。 | ch04 |\n| Steve Russell | Russell | 發現 McCarthy 紙上的 eval 可直接寫成機器碼，做出第一個 LISP 直譯器，令 McCarthy 自己都吃驚——「理論被人手工變成可跑的程式」的經典一幕。 | ch04 |\n| Peter Naur | Naur | ALGOL 60 報告的編輯；把 Backus 的記法改良成 Backus–Naur Form（BNF），讓「描述語言語法」本身有了形式工具。 | ch04 |\n| C. A. R. Hoare | Hoare（東尼·霍爾） | Hoare logic（1969）用前後條件「證明」程式正確；又自承把 null 引進 ALGOL W（1965）是「十億美元錯誤」——一個圖方便的決定如何變成全球性的複雜度負擔（見 ch08）。 | ch04 |\n| Edsger W. Dijkstra | Dijkstra | 反 GOTO（1968，標題是編輯下的）、結構化編程、separation of concerns（1974）；名言「測試只能證明 bug 存在、不能證明不存在」——方法 strand 的紀律源頭（見 ch05）。 | ch01 |\n| Niklaus Wirth | Wirth | 身為《CACM》編輯把 Dijkstra 原題改成「Go To Statement Considered Harmful」，意外開創了「…Considered Harmful」這個句型。 | ch05 |\n| Corrado Böhm | Böhm | 與 Jacopini 證明結構化定理（1966）：任何程式可只用順序／選擇／迭代三種結構改寫——給了「為什麼不需要 GOTO」的數學底氣。 | ch05 |\n| Giuseppe Jacopini | Jacopini | Böhm–Jacopini 結構化定理的共同作者。 | ch05 |\n| F. L. Bauer | Bauer | 1968 NATO Garmisch 會議主席；「software engineering」作為會議名是刻意的挑釁式命名，多歸功於他。 | ch05 |\n| Brian Randell | Randell | 與 Naur 共同編纂 1968/69 NATO 會議報告，使「software crisis」與這門學科的自覺定形於文獻。 | ch05 |\n| David L. Parnas | Parnas | 1972 information hiding 原典：模組該按「藏住哪個會變的設計決策」切，不是照處理流程切——切大程式的判準至今仍被違反。 | ch06 |\n| Ken Thompson | Thompson | 與 Ritchie 開創 Unix（1969 起）；把「小工具＋可移植」的工程文化做成一整套作業系統。 | ch06 |\n| Dennis Ritchie | Ritchie | C 語言（約 1972）的作者，用高階語言重寫 Unix 核心——可移植性這個賭注讓 Unix 擴散全世界。 | ch06 |\n| Doug McIlroy | McIlroy | 推動 pipe 進 Unix（1973）並提出「Make each program do one thing well」——把組合哲學變成你今天 pipeline／微服務的祖宗。 | ch06 |\n| Brian Kernighan | Kernighan | 與 Ritchie 合著 K&R《The C Programming Language》（1978），把 C 與 Unix 風格傳遍一整代工程師。 | ch06 |\n| Ole-Johan Dahl | Dahl | 與 Nygaard 設計 Simula 67，首個帶 class／object／inheritance／virtual method 的語言——OOP 的概念源頭。 | ch07 |\n| Kristen Nygaard | Nygaard | Simula 67 的共同設計者，OOP 血脈的另一位開山者。 | ch07 |\n| Alan Kay | Alan Kay | 在 Xerox PARC 造出「object-oriented」一詞；後來強調 OOP 的大想法是 messaging（訊息傳遞）而非 class——一個好點子規模化落地時如何被改形的活標本。 | ch07 |\n| Dan Ingalls | Ingalls | Smalltalk 的主要實作者之一，把 Kay 的願景做成能跑的系統。 | ch07 |\n| Adele Goldberg | Goldberg | Smalltalk 的共同打造與推廣者（Xerox PARC）。 | ch07 |\n| Bjarne Stroustrup | Stroustrup | 「C with Classes」→C++（1983 命名），把 OOP 帶進主流效能語言。 | ch07 |\n| James Gosling | Gosling | Java（1995）的主要設計者，以 JVM 兌現「Write Once, Run Anywhere」——把平台差異的複雜度搬進 runtime。 | ch07 |\n| Robin Milner | Milner | 1970s 在愛丁堡設計 ML 與 Hindley–Milner 型別推論——「型別檢查器是最普及的形式方法」，讓靜態型別不再囉嗦。 | ch08 |\n| J. Roger Hindley | Hindley | 先描述了後來叫 Hindley–Milner 的型別系統，是這個「誰先發明」三方公案的一方。 | ch08 |\n| Luis Damas | Damas | 形式化證明 Hindley–Milner 型別推論（Algorithm W），補上三方歸屬的最後一塊。 | ch08 |\n| Alonzo Church | Church | 1936 發表 untyped lambda calculus，與圖靈機並列為「可計算」的另一個等價理論根——也是函數式編程的數學祖宗。 | ch09 |\n| David Turner | David Turner | 設計 Miranda（1985），惰性純函數語言，是 Haskell 的主要靈感。 | ch09 |\n| Herb Sutter | Herb Sutter | 〈The Free Lunch Is Over〉（2005）標誌時脈撞牆、多核心成為必修——讓四十年前 Lisp 就給的「不可變」答案突然變值錢。 | ch09 |\n| Fred Brooks | Brooks | 《人月神話》（1975）與《No Silver Bullet》（1986）：Brooks's Law、概念完整性、本質 vs 偶然複雜度——本書反覆動用的手術刀（見 ch10）。 | ch01 |\n| Melvin Conway | Conway | Conway's Law（1968 刊 Datamation）：系統結構照抄組織的溝通結構——切錯微服務邊界往往是組織問題偽裝成技術問題（見 ch10、ch17）。 | ch01 |\n| Winston W. Royce | Royce | 1970 論文常被當「瀑布之父」，實際上他把純線性圖當作有缺陷的反例、主張迭代——本書最重要的「人人都讀反了」案例（見 ch11）。 | ch02 |\n| Watts Humphrey | Humphrey | 在 SEI 推動 CMM／CMMI，把「過程成熟度」變成可稽核的重量級流程模型。 | ch11 |\n| Kent Beck | Kent Beck | Extreme Programming（XP）與 TDD（red-green-refactor）的推手；把敏捷「擁抱變化」變成可操作的技術紀律。 | ch12 |\n| Ken Schwaber | Schwaber | 與 Sutherland 正式發表 Scrum（OOPSLA 1995），把短迭代框架化。 | ch12 |\n| Jeff Sutherland | Sutherland | Scrum 的共同創立者。 | ch12 |\n| William Opdyke | Opdyke | 重構（refactoring）的學術源頭（1992 博論），先於 Fowler 把它系統化。 | ch12 |\n| Grady Booch | Booch | 一般歸於他造了「Continuous Integration」一詞（後由 XP 發揚）。 | ch12 |\n| Martin Fowler | Martin Fowler | 《Refactoring》（1999）、微服務定調文（與 Lewis, 2014）等的作者；本書多處引他的考據（含 Phil Karlton 名言的歸屬整理）。 | ch01 |\n| E. F. Codd | Codd | 1970 關聯模型原典：用宣告式查詢與資料獨立性，把「怎麼存取資料」的複雜度整包搬給資料庫引擎（見 ch13）。 | ch01 |\n| Donald Chamberlin | Chamberlin | 與 Boyce 設計 SEQUEL（1974，後改名 SQL），把關聯代數變成人能讀寫的查詢語言。 | ch13 |\n| Raymond Boyce | Boyce | SEQUEL/SQL 的共同設計者（1974 年英年早逝）。 | ch13 |\n| Jim Gray | Jim Gray | 1970s 末刻畫交易性質、命名 atomicity/consistency/durability（尚無 isolation），是 ACID 的概念奠基者。 | ch13 |\n| Theo Härder | Härder | 與 Reuter 在 1983 造出 ACID 縮寫，把 Gray 的概念補上 isolation 湊成四件套。 | ch13 |\n| Andreas Reuter | Reuter | ACID 縮寫的共同提出者（1983）。 | ch13 |\n| Eric Brewer | Brewer | CAP 猜想（2000 PODC）：規模逼你在一致性與可用性之間選邊——鐘擺從「引擎包辦一切」擺回「應用自己扛一致性」。 | ch13 |\n| Seth Gilbert | Gilbert | 與 Lynch 在 2002 把 CAP 從猜想證明成定理。 | ch13 |\n| Nancy Lynch | Lynch | CAP 定理的共同證明者（2002）。 | ch13 |\n| Eric Evans | Eric Evans | 在 2009 meetup 提議用「NoSQL」一詞稱呼當時的分散式資料庫運動（與 1998 Strozzi 那個 NoSQL 不同所指）。 | ch13 |\n| Richard Stallman | Stallman | GNU（1983）、FSF（1985）、copyleft：用授權當法律駭客，把「free as in freedom（自由而非免費）」這個所有權主張寫進軟體。 | ch14 |\n| Linus Torvalds | Torvalds | Linux 核心（1991）證明開源協作能成；又在 2005 極短時間內寫出 Git，用內容定址與 DAG 重組「上千人併行改一個 codebase」的協作複雜度。 | ch14 |\n| Eric S. Raymond | Raymond | 《The Cathedral and the Bazaar》（1997）把 Linux 現象理論化——回答「這種看似混亂的市集式開發為什麼行得通」（見 ch14）。 | ch06 |\n| Christine Peterson | Peterson | 1998 造出「open source」一詞，配合 Netscape 開源的策略命名。 | ch14 |\n| Bruce Perens | Perens | 與 Raymond 等共同創立 OSI，把開源從理念變成有定義、有招牌的運動。 | ch14 |\n| Andrew Tridgell | Tridgell | 反向工程 BitKeeper 的事件觸發了授權爭議，間接逼出 Git 的誕生。 | ch14 |\n| Vint Cerf | Cerf | 與 Kahn 的 1974 論文奠定 TCP/IP：讓底層網路保持笨、把互連的智慧放到端點——你「在應用層處理可靠性」的直覺根在這裡。 | ch15 |\n| Bob Kahn | Kahn | TCP/IP 的共同作者（1974）。 | ch15 |\n| Tim Berners-Lee | Berners-Lee | 在 CERN 提出 WWW（1989 提案／1991 公開），用無專利的 HTTP/HTML/URL 三件套，讓開放標準擊敗圍牆花園、長成史上最大應用平台。 | ch15 |\n| Tim O'Reilly | O'Reilly | 推廣「Web 2.0」（2004 構思／2005 定義文），標記瀏覽器從文件檢視器變成應用平台。 | ch15 |\n| Jesse James Garrett | Garrett | 2005 造「AJAX」一詞，給「網頁不重整就更新」這個體驗一個名字。 | ch15 |\n| Jeff Bezos | Bezos | 主導 Amazon 把內部基礎設施對外開放成 API（AWS, 2006），把「擁有並維運機房」的巨大複雜度變成一行 API 呼叫。 | ch16 |\n| Solomon Hykes | Hykes | 2013 PyCon 五分鐘 lightning talk 展示 Docker，把「在我機器上能跑」的環境複雜度封進不可變 image（回收 ch02 程式即資料）。 | ch17 |\n| James Lewis | Lewis | 與 Fowler 的 2014 定調文〈Microservices〉，把一個已在發生的實踐命名定調（注意：是命名不是發明）。 | ch17 |\n| Adrian Cockcroft | Cockcroft | Netflix 早期微服務實踐的代表人物，為撐住串流爆量很早走上細粒度服務。 | ch17 |\n| Patrick Debois | Debois | 2009 首屆 DevOpsDays（Ghent）的發起者，給「彌合開發與維運之牆」這件事一個名字：DevOps。 | ch18 |\n| Jez Humble | Humble | 與 Farley 合著《Continuous Delivery》（2010），把自動化部署流水線系統化。 | ch18 |\n| David Farley | Farley | 《Continuous Delivery》共同作者（2010）。 | ch18 |\n| Gene Kim | Gene Kim | 《The Phoenix Project》（2013）作者之一，用小說把 DevOps 的價值講進產業常識。 | ch18 |\n| Ben Treynor Sloss | Treynor | 約 2003 在 Google 創立 SRE：「叫軟體工程師去做維運會得到的東西」；error budget／SLO 由 2016 SRE book 普及。 | ch18 |\n| Matthew Skelton | Skelton | 與 Pais 合著《Team Topologies》（2019），平台工程運動的奠基文本（cognitive load、stream-aligned/platform team）。 | ch18 |\n| Manuel Pais | Pais | 《Team Topologies》共同作者（2019）。 | ch18 |\n| Donald Knuth | Knuth | 「過早最佳化是萬惡之源」（1974）——但完整脈絡是「97% 的時候別過早最佳化，但要抓住關鍵 3%」，常被斷章取義成「不要優化」（見 ch19）。 | ch01 |\n| Phil Karlton | Karlton | 一般歸於他的名言「CS 兩大難事：cache invalidation 與命名」——本書用它示範「連人人會背的話，認真考據都站不太穩」的態度。 | ch01 |\n| Joel Spolsky | Spolsky | 〈The Law of Leaky Abstractions〉（2002）：「所有非平凡的抽象在某種程度上都會洩漏」——複雜度守恆的必然結果（見 ch19）。 | ch01 |\n| Richard P. Gabriel | Gabriel | 「Worse is Better」（1989–91）：把「夠用、簡單、先出貨」為何常勝過「正確、完整、優雅」寫成一條反覆應驗的觀察。 | ch19 |\n\n## 術語\n\n| English | 中文 | 一句話定義（它在解什麼複雜度） | 首次出現章 |\n|---|---|---|---|\n| conservation of complexity | 複雜度守恆 | 全書核心主張：抽象不消滅複雜度，只把它搬家（搬給編譯器、runtime、雲、別人的團隊），帳單在抽象洩漏時回來找你。 | ch01 |\n| two strands（abstraction / method） | 兩條 strand（抽象／方法） | 「我們用什麼蓋（抽象）」與「我們怎麼蓋（方法）」是同一場對抗複雜度戰爭的兩面，全程互相觸發。 | ch01 |\n| pendulum | 鐘擺 | 效能↔生產力、集中↔分散、單體↔分散式、手工↔自動——同一組張力反覆擺盪，每次回擺帶著上次的教訓。 | ch01 |\n| essential complexity | 本質複雜度 | 問題本身固有、任何工具都砍不掉的困難（搞清楚到底要建什麼、跨系統一致性）——Brooks 的手術刀，ch10 正式定義。 | ch10 |\n| accidental complexity | 偶然複雜度 | 不是問題本身、而是我們的工具與做法附帶製造的負擔（樣板、語言囉嗦）——工具能砍的只有這一塊。 | ch10 |\n| leaky abstraction | 抽象洩漏 | 抽象在邊緣總會漏出它本想藏住的底層細節（N+1、冷啟動、TCP 重傳）——這不是 bug，是抽象的稅（見 ch19）。 | ch01 |\n| stored-program | 儲存程式 | 把程式與資料放進同一個記憶體，讓程式變成「可被程式操作的資料」——編譯器、直譯器、容器 image 後來的一切都站在這個前提上（見 ch02）。 | ch01 |\n| Turing machine | 圖靈機 | 一個思想實驗（不是機器），用來劃出「什麼可被計算」的理論邊界。 | ch02 |\n| assembler | 組譯器 | 用助記符取代手寫二進位／手算位址，第一次「不直接對機器說話」——把記位址這個負擔外包出去。 | ch03 |\n| automatic programming | 自動編程 | 從 FORTRAN（1957）到 AI agent（2026）反覆出現的夢：讓寫程式更接近說人話；每代都兌現了一部分抽象、又都高估了能消滅本質複雜度（見 ch20）。 | ch03 |\n| garbage collection | 垃圾回收 | 自動回收不再使用的記憶體，把「記得 free」這個複雜度永久搬給 runtime（帳單：GC pause）。 | ch01 |\n| homoiconicity（code as data） | 程式即資料 | 程式用與資料相同的結構表示，於是程式能操作程式（eval、codegen、巨集）——LISP 帶來的世界觀。 | ch04 |\n| BNF（Backus–Naur Form） | 巴科斯–諾爾範式 | 一套形式記法，把「描述程式語言的語法」這件事本身變得可精確定義。 | ch04 |\n| structured programming | 結構化編程 | 只用順序／選擇／迭代取代滿天飛的 GOTO，讓靜態程式文本與動態執行過程的差距縮到人腦追得上——方法 strand 第一次登場（見 ch05）。 | ch01 |\n| software crisis | 軟體危機 | 1968 NATO 會議喊出：大型系統大到一個人腦裝不下、超支延遲不可靠，逼出「software engineering」這門學科的自覺。 | ch05 |\n| information hiding | 資訊隱藏 | 模組該按「它對外藏住哪個會變的設計決策」來切，而不是照處理步驟切——讓需求變動時要改的範圍最小。 | ch06 |\n| separation of concerns | 關注點分離 | Dijkstra（1974）造詞：把不同面向的問題分開各自處理，別讓它們在腦子裡糾纏。 | ch06 |\n| Unix philosophy | Unix 哲學 | 寫只做一件事並做好的小程式、讓它們用 pipe 協作——你今天 pipeline／微服務的哲學祖宗。 | ch06 |\n| object-oriented | 物件導向 | 把資料與行為綁在一起（封裝＋多型），收攏「資料和操作散落各處」的複雜度——封裝是資訊隱藏的另一條實作路線（見 ch07）。 | ch07 |\n| messaging | 訊息傳遞 | Kay 說 OOP 的大想法不是 class 而是 messaging：自治單元之間傳訊（像細胞）——actor model／微服務比 class 繼承更接近這個原意。 | ch07 |\n| inheritance | 繼承 | 沿類別樹共享行為；落地時被當招牌，卻製造「行為藏在哪一層」的垂直離散，後來才有「組合優於繼承」的反省。 | ch07 |\n| Hoare logic | 霍爾邏輯 | 用前後條件（P{Q}R）「證明」程式正確的理想——靜態型別與形式驗證同一種衝動的最嚴格那一端。 | ch04 |\n| null reference | 空引用 | Hoare 1965 為圖方便加入、四十年後自稱「十億美元錯誤」——一個圖方便的設計決策變成全球性的複雜度負擔。 | ch08 |\n| type inference | 型別推論 | 編譯器從你怎麼用一個值自己推出型別，省掉手寫型別宣告——讓靜態型別的保護不必付「囉嗦」的代價。 | ch08 |\n| Hindley–Milner | Hindley–Milner（型別系統） | 第一個有多型型別推論的實用系統——TypeScript/Rust/現代 C++ 型別推論的共同祖宗。 | ch08 |\n| formal methods | 形式方法 | 在執行前用數學「證明」排除一整類錯誤；因成本高留在航太/晶片/協定，但型別檢查器是它最普及的輕量版。 | ch08 |\n| lambda calculus | Lambda 演算 | Church 1936 的計算理論根，與圖靈機等價——函數式編程的數學祖宗。 | ch09 |\n| pure function | 純函數 | 同輸入必得同輸出、無副作用——可重試、可平行、可推理（你的冪等消費者逼近的就是它）。 | ch09 |\n| immutability | 不可變 | 資料一旦建立不再改動，天生對並行友善（沒有共享可變狀態就沒有 race condition）——多核心時代讓這個老答案變值錢。 | ch09 |\n| The Free Lunch Is Over | 免費的午餐結束了 | Sutter 2005：時脈不再自動變快、平行化變必修——「老答案（不可變）等到問題出現才被需要」的範例。 | ch09 |\n| Brooks's Law | Brooks 定律 | 「加人到一個遲到的軟體專案會讓它更遲到」——溝通路徑 O(n²)＋新人 ramp-up，是數學不是管理失誤。 | ch10 |\n| conceptual integrity | 概念完整性 | 一致的設計願景比堆功能更重要；沒有它，codebase 會分裂——複雜度的人性面。 | ch10 |\n| No Silver Bullet | 沒有銀彈 | Brooks 1986：工具只能砍偶然複雜度、砍不掉本質複雜度——所以「沒有銀彈」是面對每次革命承諾的合理預設懷疑。 | ch01 |\n| Conway's Law | Conway 定律 | 系統結構照抄組織的溝通結構——微服務本質是把組織結構固化成系統結構（見 ch10、ch17）。 | ch10 |\n| data independence | 資料獨立性 | 你說要什麼（宣告式），引擎決定怎麼拿——所以你能換 index 而不改應用程式碼，把存取路徑的複雜度搬給查詢最佳化器。 | ch13 |\n| declarative | 宣告式 | 描述「要什麼結果」而非「怎麼一步步做」，把執行細節的複雜度交給引擎（SQL、K8s 調度同一個衝動）。 | ch13 |\n| relational model | 關聯模型 | Codd 1970：用關聯代數與資料獨立性把「怎麼存取資料」整包搬給引擎——抽象的一次大勝利。 | ch13 |\n| ACID | ACID | 把交易的複雜度標準化成原子性／一致性／隔離性／持久性四件套——你天天在跟它的帳單打交道。 | ch13 |\n| CAP theorem | CAP 定理 | 分散式系統在一致性與可用性之間必須取捨——規模逼你放棄強一致、自己在應用層扛一致性。 | ch13 |\n| NoSQL | NoSQL | 2009 起的分散式資料庫運動，為規模而放棄關聯/強一致——鐘擺從「引擎包辦」擺回「應用自理」。 | ch13 |\n| free software | 自由軟體 | Stallman 的理念：free as in freedom（自由而非免費）——把軟體的所有權主張寫進授權。 | ch14 |\n| copyleft | copyleft | 用著作權法反向操作（GPL），強制衍生作品也必須自由——把「保持開放」變成可執行的法律條款。 | ch14 |\n| open source | 開源 | 1998 造詞，務實版的自由軟體（強調協作效益而非道德）——與 Stallman 的理想派分歧不只是用詞。 | ch14 |\n| distributed version control | 分散式版本控制 | Git（2005）把整個版本歷史搬到每個人本機，用便宜分支與 merge 重組「上千人併行改一個 codebase」的協作複雜度。 | ch14 |\n| TCP/IP | TCP/IP | 讓底層各種網路保持笨、把互連與可靠性的智慧放到端點——你「在應用層處理可靠性」的根。 | ch15 |\n| World Wide Web | 全球資訊網 | 無專利的 HTTP/HTML/URL 三件套，讓開放標準擊敗圍牆花園、長成史上最大應用平台。 | ch15 |\n| open standard | 開放標準 | 無人可獨佔、任何人可實作的規格——Web 贏過封閉線上服務的決定性原因（複雜度/控制權如何分配）。 | ch15 |\n| virtualization | 虛擬化 | 一台機器假裝成多台，把硬體與工作負載解耦——雲「按片租用」的技術前提。 | ch16 |\n| cloud / IaaS-PaaS-SaaS | 雲／三層服務 | 把「買機器、進機房、接網路」的複雜度整包外包、按用量計費；分層各把「你不用管什麼」往上推一層。 | ch16 |\n| Infrastructure as Code | 基礎設施即程式碼 | 把基礎設施從手動點擊變成版本控制下的程式碼（可重現、可審查、可回溯）——維運也納入軟體工程（見 ch16）。 | ch01 |\n| microservices | 微服務 | 按業務能力切、獨立部署、團隊自治，解「大團隊在單體上互相踩腳」的複雜度；代價是把複雜度從程式內搬到網路上（見 ch17）。 | ch01 |\n| container | 容器 | 把執行環境連同程式打包成不可變 image，一次搬走「在我機器上能跑」的環境差異複雜度（回收 ch02 程式即資料；見 ch17）。 | ch01 |\n| Kubernetes | Kubernetes | 分散式系統的作業系統，用宣告式調度管理容器（回收 ch13 宣告式）——治微服務的編排複雜度。 | ch16 |\n| DevOps | DevOps | 彌合「開發丟給維運」那道牆，把開發與維運融合、自動化部署（敏捷往維運的延伸；見 ch18）。 | ch01 |\n| SRE | SRE | 用寫軟體的方法做維運（自動化、消除重複勞動），把可靠度從信仰變成可量化工程（見 ch18）。 | ch01 |\n| error budget | 錯誤預算 | 「允許的不可靠額度」——把開發（要快）與維運（要穩）的永恆衝突，從立場之爭變成一個共享的數字。 | ch18 |\n| SLO / SLI | 服務等級目標／指標 | 把「多可靠才夠」變成可談判的數字，讓可靠度的本質複雜度能被工程紀律馴服。 | ch18 |\n| platform engineering | 平台工程 | 對「每個團隊都要懂全套微服務維運」的複雜度爆炸的回應，把維運複雜度再搬到一個內部平台抽象後面（鐘擺：又一次集中化）。 | ch18 |\n| Law of Leaky Abstractions | 抽象洩漏定律 | Joel Spolsky 2002：「所有非平凡的抽象在某種程度上都會洩漏」——複雜度守恆的必然推論（見 ch19）。 | ch19 |\n| premature optimization | 過早最佳化 | Knuth 1974 名言的完整脈絡：97% 的時候別過早最佳化、但要抓住關鍵 3%——常被斷章成「不要優化」。 | ch01 |\n| Worse is Better | 「夠用即是好」 | Gabriel 1989–91：簡單、夠用、先出貨，常勝過正確、完整、優雅——一條反覆應驗的工程觀察。 | ch19 |\n| agentic coding | 代理式編程 | 截至 2026-06，AI 寫程式從「行內補全」轉向「跨檔自主 agent」；用 Brooks 手術刀看，它砍的多是偶然複雜度、本質複雜度砍不掉（見 ch20）。 | ch20 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> 這份地圖把全書 21 章各自的 `## 延伸閱讀` 收成一張表，去重後分成三條路線：**往深處讀**（該親自讀一次的一手原典）、**往應用走**（把這部歷史接上你的 AI Infra 轉職目標）、**往廣處讀**（給想輕鬆讀軟體／計算史的書與整理）。只收書中各章實際推薦過、且經 landscape 驗證或可獨立查證為真實存在的資源；沒把握的標「（未驗證）」。連結照各章已寫的版本，沒有自行編造新連結。後面標的「（出自 chNN）」是該資源在書中第一次出現的位置，跨多章引用的列出全部。\n\n---\n\n## 往深處讀：經典原典\n\n這些是「導遊講完、你該親自走進現場」的一手文獻。讀完這本書之後，它們是你最讀得進去、回報也最高的。每條附「為什麼值得讀、讀哪一段」。\n\n- **Fred Brooks，《No Silver Bullet — Essence and Accident in Software Engineering》（1986）** — 全書那把手術刀（本質複雜度 vs 偶然複雜度）的原典，不長、論證乾淨。**讀法**：帶著一個問題讀——他 1986 年說「過去的進步砍的都是偶然複雜度」，對照你 2026 年手上的 AI agent，這句話過時了還是更準了？注意它是 1986 的獨立論文，**不是** 1975《人月神話》的內容（1995 週年版才併入）。網路上有全文 PDF/HTML 轉錄。（出自 ch10／ch19／ch20／ch21）\n\n- **Fred Brooks，《The Mythical Man-Month》（1975；二十週年增訂版 1995）** — 方法 strand 的智慧書。若只讀兩章：同名的〈The Mythical Man-Month〉（Brooks's Law 與 O(n²) 溝通的原始論證）與〈Aristocracy, Democracy, and System Design〉（概念完整性、架構與實作分離）。1995 版多收的〈\"The Mythical Man-Month\" after 20 Years〉是難得的作者自我修正。（出自 ch10）\n\n- **David Parnas，《On the Criteria To Be Used in Decomposing Systems into Modules》（CACM, 1972）** — 資訊隱藏的原典，只有十幾頁，**一定要讀原文**。重點看他把 KWIC 索引用「照流程切」與「照資訊隱藏切」各切一次，再列那串「likely to change」的決策——你 2026 年切微服務的所有道理，1972 年都寫完了。原文：https://dl.acm.org/doi/10.1145/361598.361623 （全文鏡像 http://sunnyday.mit.edu/16.355/parnas-criteria.html）。（出自 ch06／ch21）\n\n- **Melvin Conway，〈How Do Committees Invent?〉（Datamation, 1968-04）** — Conway's Law 的原文，melconway.com 上作者本人放了全文。重點看那句定律的原始措辭——關鍵詞是「溝通結構」，比流行的「組織圖＝系統圖」精細得多。讀完看你自己的服務拓樸圖，你會看到組織結構印在上面。（出自 ch10／ch17／ch21）\n\n- **E. W. Dijkstra，〈Go To Statement Considered Harmful〉（CACM, 1968-03）** — 結構化編程的核心一手文獻，只有兩頁，必讀。重點看「our intellectual powers are rather geared to master static relations」那段；讀完你會發現它離「GOTO 邪惡」的口號有多遠。可對照投稿原題版 EWD215（A Case against the GO TO Statement），看標題如何被編輯改動。（出自 ch05）\n\n- **E. W. Dijkstra，〈Notes on Structured Programming〉（EWD249, 1970）** — 結構化編程綱領的較完整版本，也是「測試只能證明 bug 存在、不能證明不存在」那句的出處之一。Dijkstra Archive（cs.utexas.edu/~EWD）有全部 EWD 手稿掃描。（出自 ch05）\n\n- **John McCarthy，〈Recursive Functions of Symbolic Expressions and Their Computation by Machine, Part I〉（CACM, 1960）** — Lisp 的原典，garbage collection 第一次被描述就在這裡（只佔一頁多）。看它怎麼用 eval 證明語言能描述自己——「程式即資料」的最初現場；也是你今天 `arr.map(fn)` 的血緣源頭。原文 PDF：http://jmc.stanford.edu/articles/lisp/lisp.pdf 。（出自 ch04／ch09）\n\n- **C. A. R. Hoare，〈An Axiomatic Basis for Computer Programming〉（CACM, 1969）** — Hoare logic 的原典，只有幾頁。即使不讀完那些推論規則，讀引言——感受 1969 年有人認真想「像證明數學定理一樣證明程式正確」的野心，是理解「型別／形式方法」這條光譜「強的那一端」的鑰匙。https://dl.acm.org/doi/10.1145/363235.363259 。（出自 ch08）\n\n- **C. A. R. Hoare，〈The Emperor's Old Clothes〉（1980 圖靈獎演說，刊 CACM 24(2), 1981）** — 「a language so far ahead of its time…」這句論 ALGOL 60 的名言的原始出處。整篇是大師對「簡單 vs 複雜」的反省，與本書「複雜度守恆」主題直接共鳴。（出自 ch04）\n\n- **Tony Hoare，〈Null References: The Billion Dollar Mistake〉（QCon London 2009，InfoQ 有完整錄影）** — **務必看本人親口講**。看他怎麼描述 1965 那個「太容易實作」的決定；順帶親耳確認這是 2009 QCon，**不是** 1980 圖靈獎演說（那場是上一條的〈The Emperor's Old Clothes〉，兩場常被搞混）。https://www.infoq.com/presentations/Null-References-The-Billion-Dollar-Mistake-Tony-Hoare/ 。（出自 ch08）\n\n- **Winston Royce，〈Managing the Development of Large Software Systems〉（Proc. IEEE WESCON, 1970）** — 全書最該親自讀的論文之一，約 11 頁。**讀法**：讀到那張線性流程圖時先別停，往下讀他怎麼說它「risky and invites failure」、再讀五項修正特別是「Do it twice」那節——你會親眼看見一篇主張迭代的論文怎麼被截走一半、被讀成它的反面。網路上有多份 PDF（如 praxisframework.org）。（出自 ch11／ch12）\n\n- **E. F. Codd，〈A Relational Model of Data for Large Shared Data Banks〉（CACM, 1970-06）** — 關聯模型的原典。讀它對「data independence」的定義，以及他點名要消滅的三種相依（ordering／indexing／access path）——整篇的目標不是「表」，是「解綁」。https://dl.acm.org/doi/10.1145/362384.362685 。（出自 ch13）\n\n- **Charles Bachman，〈The Programmer as Navigator〉（1973 圖靈獎演說，CACM 1973-11）** — 讀 Codd 的對手怎麼**驕傲地**描述那個被 Codd 推翻的世界觀。和 Codd 1970 對讀，你會親眼看到一場範式轉移的兩邊。（出自 ch13）\n\n- **Donald Knuth，〈Structured Programming with go to Statements〉（ACM Computing Surveys, 1974）** — 「premature optimization is the root of all evil」的原始出處。讀 p.268 那段的**完整**上下文（含「97% of the time」與「critical 3%」），你會發現你以為你懂的那句話意思跟流行版相反；它本身也是結構化編程辯論的一手史料。（出自 ch05／ch19）\n\n- **Joel Spolsky，《The Law of Leaky Abstractions》（2002-11-11）** — 「所有非平凡抽象都會洩漏」這條全書收官定律的源頭，原文很短，半小時讀完。留意結尾那句「abstractions save us time working, but they don't save us time learning」——那是這條定律最實際的推論。https://www.joelonsoftware.com/2002/11/11/the-law-of-leaky-abstractions/ 。（出自 ch01／ch13／ch16／ch19）\n\n- **Richard P. Gabriel，《The Rise of Worse is Better》（概念 1989／刊 1991）** — 對比「MIT 派（the right thing）」與「New Jersey 派（worse is better）」，理解為什麼「先簡單地活下來」常常打敗「做到完美」。免費全文：https://www.dreamsongs.com/WorseIsBetter.html 。（出自 ch19）\n\n- **Alan Kay 的 1998 squeak-dev 郵件** — 「The big idea is 'messaging'」那句的原始載體，也是他用 Internet 比喻講 OOP 願景的地方。**一定要讀原文那幾段**，它短，但會徹底改變你對「OOP 是什麼」的預設理解；對照你做微服務的直覺讀。http://lists.squeakfoundation.org/pipermail/squeak-dev/1998-October/017019.html 。（出自 ch07）\n\n- **Ole-Johan Dahl，〈The Birth of Object Orientation: the Simula Languages〉（2001）** — class 與 object 的源頭，由發明者本人回顧。看他怎麼從「模擬港口的船」這種具體需求長出 class，你會懂為什麼 OOP 的出身決定了它後來「用物件對應現實世界東西」的直覺與陷阱。（出自 ch07）\n\n- **Manifesto for Agile Software Development（agilemanifesto.org, 2001）** — 四個價值＋十二條原則，全文不到一頁，必讀。重點看那句保留條件「while there is value in the items on the right, we value the items on the left more」，與十二原則第二條「Welcome changing requirements」——整章核心賭注就在這兩句。history.html 頁有 Snowbird 現場的第一手回憶。（出自 ch12）\n\n- **Herb Sutter，〈The Free Lunch Is Over〉（Dr. Dobb's Journal, 2005-03）** — 函數式四十年後翻身的觸發點。看他怎麼論證「時脈撞牆、未來是並行」——讀完你會懂為什麼一篇 2005 年談 CPU 的文章，會讓 1958 年就有的「不可變」答案突然變值錢。http://www.gotw.ca/publications/concurrency-ddj.htm 。（出自 ch09）\n\n- **John Backus et al.，《The FORTRAN Automatic Coding System》（1957）／John Backus，《The History of FORTRAN I, II, and III》（HOPL, 1978）** — 史上第一次把「自動編程」當賣點的一手文件，與當事人事後寫的史料。1957 原文看標題與引言的承諾句型（和今天 AI 工具官網文案有多像）；1978 史料看團隊怎麼想、怎麼賭、怎麼為了讓產出碼夠快下最佳化的苦工。Software Preservation Group / softwarepreservation.computerhistory.org 有掃描全文。（出自 ch03／ch20）\n\n- **Tim Berners-Lee，〈Information Management: A Proposal〉（CERN, 1989）** — Web 的起點提案，CERN 有原件掃描。看它要解的痛多麼具體、多麼不像「要發明改變世界的東西」——提醒你重大躍遷往往始於一個樸素的本地問題。（出自 ch15）\n\n- **Vint Cerf & Bob Kahn，〈A Protocol for Packet Network Intercommunication〉（IEEE Trans. Comm., 1974）** — TCP/IP 的原典。不必啃數學，看它怎麼論證「讓底層網路保持笨、把互連智慧放到端點」這個 end-to-end 決策——你「在應用層處理可靠性」的整套直覺，根就在這篇。（出自 ch15）\n\n- **Richard Stallman，《The GNU Manifesto》（1985）／《The GNU Project》** — 自由軟體運動的創世文件與較完整回顧。Manifesto 看他怎麼把「分享程式碼」講成倫理立場；GNU Project 看 free 的兩種意思、copyleft 的動機，也是分清 FSF（1985）與 GPLv1（1989）兩個年份最清楚的地方。線上：gnu.org/gnu/manifesto、gnu.org/gnu/thegnuproject。（出自 ch14）\n\n---\n\n## 往應用走：接上你的 AI Infra 之路\n\n這部歷史的最新一章，是你正要去寫的那一章。下面這些把軟體史接到「讓大模型跑得穩、快、省」這個目標——LLM serving 的每一面牆（memory-bound、分散式推論、SLO、節點編排）都是前面這些書講過的牆換了尺度重來。每條附「它接上你哪一段路」。\n\n- **《Site Reliability Engineering: How Google Runs Production Systems》（Google／O'Reilly, 2016，全書免費線上版在 sre.google/sre-book）** — SRE 的聖經，也是你那本 AI Infra 書談「推論延遲 SLO、成本最佳化」的方法地基。**只要讀兩章就值回票價**：〈Embracing Risk〉把「100% 是錯的目標」與 error budget 的邏輯講到底；〈Service Level Objectives〉把 SLI/SLO 怎麼定講清楚。（出自 ch18）\n\n- **Jez Humble & David Farley，《Continuous Delivery》（2010）** — 把「部署從大事件變成按鈕級非事件」這條流水線講透的綱領書，是你天天在用的 CI/CD 的源頭文本。讀「deployment pipeline」那幾章就好。（出自 ch12／ch18）\n\n- **Matthew Skelton & Manuel Pais，《Team Topologies》（2019，teamtopologies.com）** — 平台工程運動的奠基書。讀「cognitive load」與「platform team」兩個概念就好：理解為什麼微服務的「團隊自治」會逼出認知負荷過載、為什麼答案是把複雜度收進一個自助平台——這正是「把 GPU 排程／serving 複雜度收進內部平台」的理論骨架。（出自 ch18）\n\n- **James Lewis & Martin Fowler，〈Microservices〉（martinfowler.com, 2014-03）** — 微服務最權威的定調文。重點看「Organized around Business Capabilities」（用 Conway's Law 論證為什麼按業務能力切）與「Smart endpoints and dumb pipes」兩段——你會發現它通篇都在講組織，不只是技術。https://martinfowler.com/articles/microservices.html 。（出自 ch17）\n\n- **Werner Vogels（訪談 Jim Gray），〈A Conversation with Werner Vogels〉（ACM Queue, 2006）** — 「You build it, you run it」的出處。看 Amazon 怎麼把服務所有權整個交給建造它的團隊——「團隊自治」與「products not projects」的一手源頭，也預告了開發與維運那道牆怎麼被拆掉。（出自 ch17）\n\n- **John Allspaw & Paul Hammond，〈10+ Deploys Per Day: Dev and Ops Cooperation at Flickr〉（Velocity 2009）** — DevOps 的「示範現場」一手史料。2009 年就示範了開發與維運共用版本控制、共用 metric、一鍵部署、feature flag，與那句世界觀翻轉的話：維運的工作不是「保持穩定」，是「讓業務能安全地改變」。（出自 ch18）\n\n- **Benjamin Black，〈EC2 Origins〉（2009，blog.b3k.us/2009/01/25/ec2-origins.html）** — EC2 共同發起人之一的第一手回憶：2003 年那份給 Bezos 的文件、把虛擬伺服器當服務賣的點子怎麼來的。讀它看「雲」如何從一家公司的內部痛點長出來，而非某個宏大藍圖——你租 GPU 算力跑推論，租的是這條線的延伸。（出自 ch16）\n\n- **NIST SP 800-145,〈The NIST Definition of Cloud Computing〉（2011，csrc.nist.gov）** — 只有短短幾頁，是 IaaS/PaaS/SaaS 與雲特性（on-demand、measured service…）的權威定義。當你需要一個不被行銷詞汙染的分類學基準時讀它。（出自 ch16）\n\n- **HashiCorp Terraform 文件的〈What is Infrastructure as Code〉段落（developer.hashicorp.com）** — 當代 IaC 思維最清楚的官方陳述（宣告式、plan/apply、狀態管理）。把「基礎設施即程式碼」對應回你天天寫的 CloudFormation/CDK，再延伸到你會用來宣告 serving 叢集的那套。（出自 ch16）\n\n- **Brendan Burns, Joe Beda, Kelsey Hightower，《Kubernetes: Up and Running》** — 從「天天用 K8s」走向「理解 K8s 為何長這樣」。看它講宣告式 API 與 reconciliation loop 的部分就好——抓住「期望狀態 vs 實際狀態的持續收斂」這個跟 SQL、Terraform 同源的世界觀（你之後排度 GPU 工作負載會一直用到）。（出自 ch17）\n\n- **Jeffrey Dean & Sanjay Ghemawat，〈MapReduce: Simplified Data Processing on Large Clusters〉（OSDI, 2004）** — 看 Google 怎麼明說 MapReduce 的名字與概念取自 Lisp 的 `map`／`reduce`，以及「純函數天生可平行」如何被放大到上千台機器——你 `arr.map()` 的資料中心版本，也是你日後做大規模批次推論／資料前處理的思維原型。https://research.google.com/archive/mapreduce-osdi04.pdf 。（出自 ch09）\n\n- **你書架上的《把系統寫成定理：TLA+ 與形式化方法》** — 本書談 Hoare logic、CAP、最終一致性都點到為止；那本書把「分散式系統的正確性怎麼用 invariant 證明」這條路走到底，正對你那種分散式、並行、最終一致性的 serving 場景。當你想真正搞懂「為什麼分區下不能同時要 C 和 A」，去那裡。（出自 ch08／ch13）\n\n- **你書架上的 AI Infra 書** — 這部歷史的「最新一章」由它接手：模型內部、LLM serving、GPU 排程、推論延遲 SLO、KV cache、成本最佳化。把這本軟體史書當它的「為什麼會走到今天」前傳——你會發現 LLM serving 的每一面牆，都是前面講過的牆換了尺度重來。（出自 ch18／ch21）\n\n---\n\n## 往廣處讀：科普與歷史\n\n想把這本書的「工程師讀法」對照其他讀法（人物史、機構史、社會史、考據態度），擴大視野。下面是給想輕鬆讀軟體／計算史的書、導讀與整理。每條附一句「它補上哪一塊」。\n\n- **Charles Petzold，《The Annotated Turing》** — 逐行註解圖靈 1936〈On Computable Numbers〉。原文數學很硬不必硬啃，這本帶你體會「程式即資料」最早的理論形態。（出自 ch02）\n\n- **Computer History Museum 線上展〈The Stored Program〉與〈ENIAC Programmers Project〉（eniacprogrammers.org）＋ IEEE Spectrum〈The Women Behind ENIAC〉** — 圖文並茂講 Baby／EDSAC／EDVAC 這條線，並把 ENIAC Six 的故事補齊。適合先建立畫面再讀文字。（出自 ch02）\n\n- **twobithistory.org〈What Did Ada Lovelace's Program Actually Do?〉（2018）** — 逐步拆解 Note G 到底算了什麼、為什麼說它更像 trace，是把「第一位程式設計師」爭議講得最清楚、最不情緒化的一篇。（出自 ch02）\n\n- **Eric S. Raymond，〈The Origins and History of Unix, 1969–1995〉（《The Art of Unix Programming》第 2 章）** — 把 Unix 的誕生、C 重寫、擴散講成連貫故事，對「可移植性為什麼是決定性勝利」寫得最清楚。http://www.catb.org/~esr/writings/taoup/html/ch02s01.html 。（出自 ch06）\n\n- **Eric S. Raymond，《The Cathedral and the Bazaar》（1997）** — 把 Linux 現象理論化的那篇。讀「大教堂 vs 市集」的對比與 Linus's Law，讀完記得自己補上 Heartbleed 這個反例的但書。catb.org/~esr/writings/cathedral-bazaar。（出自 ch14）\n\n- **Paul Graham，〈The Roots of Lisp〉** — 用現代讀者讀得懂的方式重講 McCarthy 1960 論文的核心（eval 的七個原始運算子）。如果 Lisp 原典太硬，從這篇進去。（出自 ch04）\n\n- **Paul Hudak et al.，〈A History of Haskell: Being Lazy with Class〉（2007）** — Haskell 委員會自己寫的歷史，講清楚 1987 FPCA 為什麼決定組委員會、Miranda 的影響、為什麼選擇「純粹到底」。https://www.microsoft.com/en-us/research/wp-content/uploads/2016/07/history.pdf 。（出自 ch09）\n\n- **The morning paper（Adrian Colyer）對 Parnas 1972 的導讀** — 若 Parnas 原文的 1972 行文讀起來吃力，先看這篇現代工程師視角的拆解，再回頭讀原文。https://blog.acolyer.org/2016/09/05/on-the-criteria-to-be-used-in-decomposing-systems-into-modules/ 。（出自 ch06）\n\n- **David Wheeler，〈The Waterfall Model〉（dwheeler.com/essays/waterfall.html）** — 對瀑布神話最冷靜可靠的二手整理之一。Wheeler 點明 Royce 稱自己的純線性版本為「simpler method」並明確 recommended against 它，並追溯瀑布如何被後來的標準固化進政府採購。讀完 Royce 原文後拿來對照、確認自己沒讀偏。（出自 ch11）\n\n- **Bjarne Stroustrup，〈A History of C++〉（HOPL II, 1993）** — C++ 作者親述「為什麼是 class with classes、為什麼 zero-overhead」，是「OOP 進主流要付什麼妥協」最清楚的一手材料。https://www.stroustrup.com/hopl2.pdf 。（出自 ch07）\n\n- **Steve Yegge，〈Execution in the Kingdom of Nouns〉（2006）** — 對「Java 把一切硬塞進 class（名詞王國）」的著名吐槽。當作對照組讀，感受「class 中心 OOP 被推到極致」的荒謬，再回頭對照 Kay 的訊息願景。（觀點文，非史料。）（出自 ch07）\n\n- **Takeuchi & Nonaka，〈The New New Product Development Game〉（Harvard Business Review, 1986）** — Scrum 的思想根。看「接力賽 vs 橄欖球」那組對比，你會發現敏捷對「跨職能團隊一起推進」的主張，1986 年就被兩位商管學者在汽車與相機工廠裡觀察到了。（出自 ch12）\n\n- **Martin Fowler，《Refactoring》（1999；第 2 版 2018 改用 JavaScript 範例）** — 重構的系統化論述。讀「為什麼重構」那幾章就好，理解「在不改變外部行為下持續改善內部結構」為什麼是敏捷的必需品。martinfowler.com 上有大量免費 bliki 短文可先嚐。（出自 ch12）\n\n- **Dave Thomas，〈Agile is Dead (Long Live Agility)〉（2014）＋ Martin Fowler 談「Agile Industrial Complex」（Agile Australia 2018 keynote）** — 宣言原作者親口診斷「Agile」一詞如何被掏空、被企業收編，是「敏捷帳單」最有分量的一手佐證。（出自 ch12）\n\n- **The Phoenix Project（Gene Kim, Kevin Behr, George Spafford, 2013）** — DevOps 的傳教小說。想理解「為什麼那道牆是組織與文化問題、不是工具問題」，讀小說比讀論文有效；配套《The DevOps Handbook》（2016）是它的實務版。（出自 ch18）\n\n- **Gerwin Klein 等，seL4: Formal Verification of an OS Kernel（CACM 摘要版）** — 想知道「形式驗證真的拿來驗一個能跑的系統」長什麼樣，看這篇。重點不是技術細節，是感受「為了證明一個微核心無 bug 要付出的人力規模」——你會立刻明白為什麼它進不了你的後端。https://cacm.acm.org/research/sel4-formal-verification-of-an-operating-system-kernel/ 。（出自 ch08）\n\n- **Benjamin C. Pierce，《Types and Programming Languages》（TAPL）—— 只讀 Preface／第 1 章** — 型別系統的權威教科書，但**不必讀內文**（型別理論硬核，本書不展開）。只讀引言那幾頁，看他怎麼把型別系統定位成「最普及的輕量形式方法」。System F、dependent types 想深入，這本是入口。https://www.cis.upenn.edu/~bcpierce/tapl/ 。（出自 ch08）\n\n- **Scott Chacon & Ben Straub，《Pro Git》（線上免費，git-scm.com/book）** — 本書刻意沒展開的「Git 內部物件模型」在這裡有最清楚的講解。讀第 10 章〈Git Internals〉，你會看到內容定址、blob/tree/commit、DAG 在程式碼層面長什麼樣。（出自 ch14）\n\n- **Christine Peterson，〈How I coined the term 'open source'〉（opensource.com, 2018）** — 「open source」這個詞 1998 年怎麼被造出來、為什麼要刻意去道德化的第一手回憶，理解「自由軟體 vs 開源」分歧的好入口。（出自 ch14）\n\n- **Tim O'Reilly，〈What Is Web 2.0〉（oreilly.com, 2005）＋ Jesse James Garrett，〈Ajax: A New Approach to Web Applications〉（2005-02）** — 「瀏覽器從文件檢視器變成應用平台」這波轉變的命名文與 AJAX 一詞的出處。看「在瀏覽器裡跑應用」在 2005 年還是個需要被命名、被論證的新觀念。（出自 ch15）\n\n- **MinnPost〈The rise and fall of the Gopher protocol〉（2016）等 Gopher 興衰整理** — 把「開放標準擊敗圍牆花園」個案的另一半補齊：一個差點贏、卻被一個授權決定親手葬送的競爭者。（歷史整理、非一手檔案，年份與流量數字屬估計。）（出自 ch15）\n\n- **Eric Brewer，〈CAP Twelve Years Later: How the \"Rules\" Have Changed〉（2012, IEEE Computer）** — CAP 提出者本人十二年後的澄清：「三選二」其實是過度簡化，分區只在真的發生時才逼你選。讀它能讓你不把 CAP 講成口號。（出自 ch13）\n\n- **James Martin，《Application Development Without Programmers》（1981）** — 4GL 運動的綱領，光看書名就值得記住：這是「不需要程式設計師」這個夢最赤裸的一次命名。對照低程式碼／無程式碼今天的文案，你會看見同一個承諾隔四十年的兩次發聲。（原書較難找，讀其維基條目與 4GL 條目即可掌握脈絡。）（出自 ch20）\n\n- **維基百科〈Computer-aided software engineering〉條目 ＋ 1993 年 GAO 對 CASE 工具的評估** — 把 CASE 工具的興衰當教學案例：怎麼被吹上天（1990 年近 200 種產品、IBM 的 AD/Cycle）、又怎麼安靜地死掉（GAO「幾乎沒有證據顯示能改善生產力」）。讀它能讓你對 2026 的喧囂多一分免疫力。（出自 ch20）\n\n- **Martin Fowler，《TwoHardThings》（bliki）** — 關於「cache 失效與命名」這句話，Fowler 親自考據歸屬、坦承找不到一手出處的短文。讀它示範「廣為流傳 ≠ 經得起查證」的引用自律——這本身就是本書一直在教你的事。https://martinfowler.com/bliki/TwoHardThings.html 。（出自 ch01／ch19）\n\n---\n\n## 如果只看三樣\n\n從上面三條路線各挑一個最高槓桿的：\n\n1. **Fred Brooks，《No Silver Bullet》（1986，往深處讀）** — 全書四條主線的交會點，也是你拿來測下一個技術宣稱（包括 AI coding）最常用的那把刀。三篇最該讀的原典裡若只挑一篇，挑它。\n\n2. **《Site Reliability Engineering》的〈Embracing Risk〉＋〈Service Level Objectives〉兩章（2016，往應用走）** — 你 AI Infra 之路的方法地基：error budget 與 SLO 把「可靠度」從信仰變成可談判的工程量，這正是 LLM serving 要你建的東西。兩章、免費、立刻能用。\n\n3. **Joel Spolsky，《The Law of Leaky Abstractions》（2002，往廣處／回望）** — 半小時讀完，但會永久改變你看每一層抽象的方式。讀完你會在每一次 ORM 的 N+1、每一次 Lambda 冷啟動、每一張爆掉的雲帳單裡，認出同一條定律——這是「複雜度守恆」最日常的證據。\n\n---\n\n> **協調者複核備註（編譯時觀察，非書內容）**\n>\n> 各章延伸閱讀的連結與資源逐條對照 landscape 與獨立查證後，**未發現偽造或明顯不存在的連結**；下列幾條僅標示「需留意」而非「可疑」，供複核時參考：\n> - **ch16〈EC2 Origins〉**：landscape 無此條，但已獨立查證 blog.b3k.us/2009/01/25/ec2-origins.html 真實存在（Benjamin Black 本人部落格）。⚠️ 待協調者複核是否要把此一手來源升格進 landscape。\n> - **ch20《Application Development Without Programmers》（James Martin, 1981）**：landscape 無此條，已獨立查證該書真實存在（Prentice Hall, 1981, ISBN 0130389439）。各章亦自承「原書較難找」。⚠️ 待協調者確認是否補進 landscape。\n> - 部分二手導讀（The New Stack 的 FORTRAN 文、gigamonkeys 的 Brooks's Law 分析、pragtob/Tobias Mayer 的 Royce 逐段導讀、abortretry.fail 的 Gopher 長文）各章以「搜標題可得」帶過、未給固定 URL；它們存在但網址未釘死，本附錄從略或只保留有穩定連結者，避免收錄會腐爛的連結。⚠️ 此為編譯取捨，待協調者確認是否需要補回。\n> - landscape 已標 ⚠️ 的資源（Kay 1998 email 單一來源、COBOL LOC 統計）本附錄沿用各章既有 hedge，未另作斷言。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "事實基準表（landscape）—《軟體發展史》", "md": "# 事實基準表（landscape）—《軟體發展史》\n\n> **本檔性質**：內部事實基準（非書內容）。掃描日期 **2026-06-13**。\n> **使用契約**：本檔是 21 章作者引用日期、人名、引文、「首次出現」主張的**唯一真相來源**。寫作時若與記憶衝突，以本檔為準；本檔沒有的事實，請先查證再補進來，不要憑記憶寫。\n> **標記約定**：\n> - 🟢 = 兩個以上獨立來源確認，可放心使用。\n> - ⚠️ = 有爭議／傳說性／單一來源／統計可疑。**作者引用時必須照本檔的措辭與保留條件寫，不可斷言。**\n> - 📌 = 「大眾記憶錯誤」熱點，作者最容易寫錯，務必照本檔。\n>\n> **散文用繁體中文（台灣用語）；人名、書名、論文名、引文、URL 保留原文。**\n\n---\n\n## A. 史前與儲存程式（ch02）\n\n| 事實 | 年份 | 歸屬 | 常見誤解／注意 | 來源 |\n|---|---|---|---|---|\n| 🟢 Babbage 構思 Difference Engine | 1821（構想）；政府資助計畫 1823 起 | Charles Babbage | — | https://www.computerhistory.org/babbage/engines |\n| 🟢 Analytical Engine 首次提出設計 | 1837 起描述；研究延續到他過世（1871） | Charles Babbage | 從未完整建成；是「設計」不是「機器」 | https://en.wikipedia.org/wiki/Analytical_engine |\n| 📌⚠️ Ada Lovelace「Note G／Bernoulli 數演算法」 | 1843（隨 Menabrea 1842 法文講稿英譯所附 Notes A–G 出版） | Ada Lovelace（譯註者）；Babbage 自承 Bernoulli 數部分的代數推演是他先做以省她麻煩 | **「第一位程式設計師」是有爭議的後世標籤**。Note G 嚴格說更像「執行軌跡（trace）」而非現代意義的「程式」；「to program」一詞是數十年後才有，套用在她身上是 anachronism。作者應寫成「常被譽為／一般認為」而非斷言。 | https://en.wikipedia.org/wiki/Note_G ；https://twobithistory.org/2018/08/18/ada-lovelace-note-g.html ；https://arxiv.org/pdf/2402.00749（\"Was Ada Lovelace Actually the First Programmer?\" 的回應論文） |\n| 📌 Turing「On Computable Numbers, with an Application to the Entscheidungsproblem」 | 投稿 1936-05-28；分兩部刊於 *Proc. London Math. Soc.* s2-42（1936 年底印行），**正式卷期標 1937**；1937-04 另有更正 | Alan Turing | 引用時寫「1936」最常見且可接受（投稿與主要發表都在 1936）；若要精確可註「卷期標 1937」。論文題目務必完整，不要寫成「Turing machine 論文」。 | https://www.historyofinformation.com/detail.php?id=619 ；https://londmathsoc.onlinelibrary.wiley.com/doi/abs/10.1112/plms/s2-42.1.230 |\n| 🟢 Church–Turing thesis | 1930s | Alonzo Church（lambda calculus）＋ Alan Turing（machine），兩套等價模型 | thesis 是「論題／猜想」非定理；名稱是後人合稱 | https://plato.stanford.edu/entries/church/ |\n| 🟢 ENIAC 首次運轉解題 | 1945-12-10（Los Alamos 題目）；1946-02-15 公開揭露 | J. Presper Eckert ＆ John Mauchly，Moore School, U. Penn | ENIAC **不是儲存程式機**；以插線板（plugboard）＋纜線＋3 個 portable function table、上千個 10 段開關「設定」程式 | https://www.aps.org/apsnews/2022/11/eniac-first-top-secret-program ；https://www.columbia.edu/cu/computinghistory/eniac.html |\n| 📌 ENIAC Six（女性程式設計師） | 1945–46 | Kathleen McNulty (Mauchly Antonelli)、Frances \"Betty\" Snyder Holberton、Marlyn Wescoff Meltzer、Frances Bilas Spence、Ruth Lichterman Teitelbaum、Jean Jennings Bartik | 1946 公開時未被介紹，長年被忽略；六人名字務必照此 | https://eniacprogrammers.org/documentary-info/ ；https://spectrum.ieee.org/the-women-behind-eniac |\n| 📌⚠️ 「First Draft of a Report on the EDVAC」 | 1945-06-30 由 Herman Goldstine 分發（101 頁、未完成稿） | 文件單獨署名 **John von Neumann**——這正是「von Neumann architecture」命名爭議的根源 | **信用爭議**：Eckert/Mauchly 主張儲存程式概念基本上是他們的（早於 von Neumann 介入約 8 個月已討論）；單獨署名讓功勞集中於 von Neumann，且形同「公開發表」，破壞了他們的專利布局。作者談 von Neumann 架構必須帶這個爭議。 | https://en.wikipedia.org/wiki/First_Draft_of_a_Report_on_the_EDVAC |\n| 🟢 Manchester Baby（SSEM）跑出第一支程式 | 1948-06-21 | F. C. Williams、Tom Kilburn、Geoff Tootill（Manchester） | **世界第一台運轉的電子儲存程式電腦**（實驗性小機） | https://en.wikipedia.org/wiki/Manchester_Baby ；https://www.computinghistory.org.uk/det/6013/ |\n| 🟢 EDSAC 運轉 | 1949-05-06 | Maurice Wilkes（Cambridge） | 第一台「實用的」完整儲存程式電腦（Baby 是實驗機） | https://en.wikipedia.org/wiki/EDSAC |\n\n---\n\n## B. 第一層抽象：組語與編譯器（ch03）\n\n| 事實 | 年份 | 歸屬 | 注意 | 來源 |\n|---|---|---|---|---|\n| 🟢 EDSAC「Initial Orders」——史上第一個組譯器系統 | 1949-05 | David Wheeler（Wilkes 的研究生） | 介於 bootstrap loader 與 assembly routine 之間；讓指令用助記符而非寫二進位，僅 31 字。**「assembler」一詞、組語概念由此奠基。** Wheeler 也奠基了 subroutine 概念（Wheeler Jump）。 | https://en.wikipedia.org/wiki/EDSAC ；https://hopl.info/showlanguage.prx?exp=3411 |\n| 🟢 Wilkes/Wheeler/Gill《The Preparation of Programs for an Electronic Digital Computer》 | 1951 | Wilkes, Wheeler, Gill | 第一本程式設計教科書，含 subroutine library | https://cacm.acm.org/opinion/in-praise-of-wilkes-wheeler-and-gill/ |\n| 📌⚠️ Grace Hopper「A-0 system」 | 1951–52，原為 UNIVAC I | Grace Murray Hopper | **「第一個編譯器」需加保留**：A-0 以現代定義更像 loader/linker（把編號的副程式序列串接載入），不是把高階語言翻成機器碼的現代 compiler。作者寫「常被稱為第一個編譯器，但以現代定義更接近連結載入器」。 | https://en.wikipedia.org/wiki/A-0_System ；https://cacm.acm.org/blogcacm/did-grace-hopper-create-the-first-compiler/ |\n| 📌⚠️ 「第一隻電腦 bug」蛾 | 1947-09-09，Harvard Mark II | 工程團隊（含 William \"Bill\" Burke 等）；Hopper 在場並推廣此說 | **傳說 vs 事實**：日誌寫 \"First actual case of bug being found\"，本身就是在玩「bug」既有的工程俚語梗——**不是** bug/debug 詞源的起點（這兩詞此前已存在）。日誌可能不是 Hopper 本人所記。那是蛾（Lepidoptera），嚴格說不是昆蟲學意義的 \"bug\"。作者勿寫「Hopper 發明 debug 一詞」。 | https://americanhistory.si.edu/collections/object/nmah_334663 ；https://daily.jstor.org/the-bug-in-the-computer-bug-story/ |\n| 🟢 FLOW-MATIC（原名 B-0） | 1955–59 | Grace Hopper（UNIVAC） | 第一個「英語化」資料處理編譯語言；**直接影響 COBOL** | https://en.wikipedia.org/wiki/Grace_Hopper |\n\n---\n\n## C. 高階語言誕生（ch03–ch04）\n\n| 事實 | 年份 | 歸屬 | 注意 | 來源 |\n|---|---|---|---|---|\n| 🟢 FORTRAN 計畫啟動 | 1954（語言規格約 1954 末完成；compiler 1955–56 寫成測試） | John Backus 領導，IBM（為 IBM 704） | 賣點是「automatic programming」；當時普遍懷疑自動產生的碼跑不過手寫機器碼（效能 vs 生產力之爭） | https://www.ibm.com/history/john-backus |\n| 🟢 FORTRAN 出貨 | 1957-04（首批給 IBM 704 用戶） | 同上 | **第一個廣泛使用的高階語言**。Backus 等人寫「The history of FORTRAN I, II, and III」為一手史料 | https://www.historyofinformation.com/detail.php?id=755 |\n| 🟢 ALGOL 60 Report | 1960（巴黎會議 1960-01） | 委員會；**Peter Naur 任編輯** | block structure；BNF 主要由 John Backus 提出、Naur 為 ALGOL 60 改良（故名 **Backus–Naur Form**） | https://en.wikipedia.org/wiki/ALGOL_60 |\n| 📌 Hoare 名言「a language so far ahead of its time…」 | 引文約 1973；最常見出處是 **1980 圖靈獎演說「The Emperor's Old Clothes」**（刊 *CACM* 24(2), 1981） | C. A. R. Hoare 論 ALGOL 60 | **精確措辭**：「Here is a language so far ahead of its time that it was not only an improvement on its predecessors but also on nearly all its successors.」作者引用務必照此句、別自行縮寫。 | https://www.cs.ru.ac.za/compilerbook/Modula2Standardisation/hoare.htm ；https://dl.acm.org/doi/10.1145/1283920.1283936 |\n| 🟢 LISP 構思 / 論文 | 構思 1958（MIT）；論文「Recursive Functions of Symbolic Expressions and Their Computation by Machine, Part I」刊 *CACM* 1960 | John McCarthy | 引入 S-expression、**garbage collection**（GC 概念由此論文首次描述）、code-as-data／homoiconicity；AI lab 脈絡 | http://jmc.stanford.edu/articles/lisp/lisp.pdf ；https://en.wikipedia.org/wiki/Lisp_(programming_language) |\n| 🟢 eval 被手工編成機器碼 | 約 1958–60 | **Steve Russell**（研究生）發現 McCarthy 紙上的 eval 可直接寫成 IBM 704 機器碼，做出第一個 LISP interpreter，令 McCarthy 驚訝 | 故事為真，常被引用 | https://en.wikipedia.org/wiki/Lisp_(programming_language) |\n| 🟢 COBOL | 規格 1959 公布；1960 正式 | CODASYL；Grace Hopper 經 FLOW-MATIC 深刻影響（非「唯一作者」） | 為商業設計、強調可讀性／英語化；長壽 | https://en.wikipedia.org/wiki/Grace_Hopper |\n| ⚠️ COBOL 至今仍大量運行（統計） | Reuters 估計常被引：2015/2017 **約 2,200 億行** COBOL、
