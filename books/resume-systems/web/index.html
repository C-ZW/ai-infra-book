C 套用（見 CDC，領域 L，套用順序錯了資料就花）。\n\n不需要的，比想像多：彼此獨立的通知、可交換的聚合（計數、求和，加法可交換）、最終以版本收斂的同步（LWW）。對這些硬上全域順序，是拿吞吐換一個用不到的保證——典型的 over-engineering。判準很簡單：**問「這兩則訊息交換次序，結果會不會不同？」不會，就不需要它們之間有序。**\n\n### 常見誤解與陷阱\n\n- **以為「FIFO 佇列」＝全域有序**。FIFO 通常是「每個 group / 每個 partition 內有序」，跨 group 無序。把不同業務鍵塞進同一 group 只會白白損失並行度。\n- **partition key 選錯造成熱點**。用 `country` 當 key，流量全壓在少數熱門國家的 partition；該用更細的鍵（如 user／order）才分得開。\n- **多 consumer 並行就破壞順序**。即使 broker 保 partition 有序，consumer group 內一個 partition 同時只該由一個 consumer 處理；自己起多執行緒並行消費同一 partition，順序立刻沒了。\n- **把「順序」和「exactly-once」混為一談**。有序不代表不重複；重投仍可能來同一則（見 交付語意三選一，領域 A）。順序解決「次序」，去重解決「重複」，是兩個正交問題。\n- **重排緩衝的缺號永遠不來**。等一個永遠不會到的序號會卡死整條；要有 gap timeout 與「跳過並告警」策略。\n\n### 延伸閱讀\n\n- Apache Kafka, \"Producer Configs\"（`enable.idempotence`、`max.in.flight.requests.per.connection`、ordering）：https://kafka.apache.org/documentation/#producerconfigs\n- KIP-185: Make exactly once in order delivery per partition the default producer setting：https://cwiki.apache.org/confluence/display/KAFKA/KIP-185\n- Aiven, \"Does Apache Kafka really preserve message ordering?\"：https://aiven.io/blog/kafka-real-ordering\n- AWS, \"Amazon SQS FIFO queues\"（message group ID 與排序）：https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/FIFO-queues.html\n\n## 重試、退避、jitter\n\n### 定義與原理\n\n重試是對抗**暫時性失敗**的基本手段：網路抖一下、對端剛好在 GC、限流回了 429——這些再試一次就好。但重試本身是把雙面刃：盲目立刻重試，會在對端最虛弱的時候追加負載，把「暫時性失敗」推成「持續性失敗」。退避（backoff）讓每次重試間隔拉長，jitter（隨機抖動）讓多個 client 的重試時刻錯開。\n\n第一原理：**重試前要先回答兩個問題**——(1) 這個操作可不可以重試（冪等嗎？非冪等的重試可能重複扣款，見 冪等 idempotency，領域 A）；(2) 這個錯誤值不值得重試（4xx 多半是請求本身錯，重試還是錯；5xx／逾時／429 才是暫時性）。退避與 jitter 是「值得重試」之後的事，不是免死金牌。\n\n### 解法空間\n\n- **固定間隔（fixed delay）**：每次都等同樣秒數。簡單，但 N 個 client 同時失敗會同時重試，形成同步尖峰。\n- **指數退避（exponential backoff）**：`delay = base × 2^attempt`，間隔翻倍成長。讓壓力隨重試次數快速衰減。\n- **指數退避 + full jitter**：`delay = random(0, min(cap, base × 2^attempt))`。AWS 的建議做法——在整個退避窗內均勻取樣，把同步尖峰攤成穩定細流。\n- **equal jitter**：保留一半固定退避、另一半隨機，避免取到太短的 sleep。\n- **decorrelated jitter**：`delay = min(cap, random(base, prev × 3))`，下次上界跟著上次的實際值走，收斂與分散兼顧。\n- **配套防線**：最大重試次數（retry budget）、總時間上限（deadline，見 timeout / deadline / budget，領域 P）、區分可重試錯誤碼、尊重 `Retry-After` 標頭。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 固定間隔 | 實作最簡 | 單一 client、低並發 | 多 client 同步尖峰；對過載對端最毒 |\n| 指數退避（無 jitter） | 壓力隨次數衰減 | 重試方很少、不會撞車 | 多 client 仍同步——大家同一個 `2^n` 時刻一起回來 |\n| 指數退避 + full jitter | 衰減 + 攤平尖峰 | 大量 client、雲端 SDK 預設 | 偶爾取到很短 sleep；要配 cap 與最大次數 |\n| equal jitter | 攤平但不會太短 | 不想要極短間隔時 | 分散度略低於 full jitter |\n| decorrelated jitter | 攤平且自適應 | 長尾退避、想更快爬出谷底 | 上界會增長，要 cap 住避免爆炸 |\n\n**Worked example（為什麼一定要 jitter）**：假設一個下游服務瞬斷，1,000 個 client 在同一毫秒收到逾時。用「指數退避無 jitter，base=1s」，所有人都在第 1 秒、第 2 秒、第 4 秒整齊重試——下游每到那個時刻就被 1,000 個請求同時砸，根本爬不起來。換成 full jitter、cap=20s，第一次重試的延遲在 0～1s 間均勻分布，平均約 500 個 client 落在前半秒、其餘攤到後半秒，下游看到的是「每毫秒約 1～2 個」的細流而非「某一刻 1,000 個」的尖峰。同樣的重試總量，存活與否取決於是否攤平。這個正回饋一旦失控就是 metastable failure（見 retry storm · metastable failure，領域 E）。\n\n### 何時需要\n\n需要：跨網路的 RPC／HTTP 呼叫、對佇列的投遞、對外部 API 的整合——任何「對端是別人、可能暫時不可用」的邊界。配 jitter 的必要性與**並發 client 數**成正比：client 越多，同步尖峰越致命。\n\n不需要 / 要收斂的：本地純函數、明確的 4xx 客戶端錯誤（重試只是重複犯錯）、非冪等且沒有冪等鍵保護的寫入（重試＝重複副作用）。還有一種反模式是**多層各自重試**：gateway 重 3 次、service 重 3 次、client 重 3 次，乘起來是 27 倍放大——重試應該集中在某一層，並用全域 deadline 收口（見 timeout / deadline / budget，領域 P）。\n\n### 常見誤解與陷阱\n\n- **退避有了就不會雪崩**。退避只攤平單一 client 的時間軸；跨 client 的同步尖峰要靠 jitter 才打散。沒 jitter 的指數退避照樣 thundering herd。\n- **無腦重試非冪等操作**。沒有冪等鍵保護就重試 POST，可能重複建單、重複扣款。先做冪等，再談重試。\n- **沒有總上限**。只設「最多重 5 次」不夠；5 次指數退避可能累積到分鐘級，早超過上游的 deadline。要有牆鐘總預算。\n- **忽略 `Retry-After` 與 429 語意**。對端已經明說「等 N 秒」，自己的退避演算法不該蓋過它。\n- **重試放大藏在依賴鏈裡**。每一層都「貼心地」加了重試，整條鏈的放大倍率是各層相乘。架構上要規定哪一層負責重試。\n\n### 延伸閱讀\n\n- AWS Architecture Blog, \"Exponential Backoff And Jitter\"（full / equal / decorrelated jitter 對比實驗）：https://aws.amazon.com/blogs/architecture/exponential-backoff-and-jitter/\n- Amazon Builders' Library, \"Timeouts, retries, and backoff with jitter\"：https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/\n- Google SRE Book, Ch. 22 \"Addressing Cascading Failures\"（retry amplification、jittered backoff）：https://sre.google/sre-book/addressing-cascading-failures/\n\n## DLQ 死信與毒訊息\n\n### 定義與原理\n\n死信佇列（dead-letter queue, DLQ）是一條「處理失敗的訊息最終停放處」。當一則訊息反覆處理失敗、超過最大接收次數，broker 不再無限重投，而是把它移到 DLQ。核心要對付的是**毒訊息（poison message）**：一則內容讓 consumer 每次都崩潰／拒絕的訊息。沒有 DLQ 時，毒訊息會被無限重投，卡住整條佇列的 head——後面正常的訊息全部餓死。\n\n第一原理：**重試是給暫時性失敗的，DLQ 是給持久性失敗的**。把這兩類分開，是讓「正常流量不被一則壞訊息拖垮」的關鍵。DLQ 不是垃圾桶，是**未決問題的收件匣**：每一筆進 DLQ 的訊息都代表一個需要人或自動化去看的事件。\n\n### 解法空間\n\n- **broker 原生 DLQ + maxReceiveCount**：訊息被接收並回到佇列超過 N 次，自動轉投 DLQ（SQS redrive policy、RabbitMQ dead-letter exchange）。\n- **應用層分流**：consumer 自己判斷「這是不可恢復的失敗」，主動把訊息送到一條 error topic，不依賴接收次數。\n- **parking lot / retry topic 階梯**（Kafka 常見）：失敗訊息進 retry-5s → retry-1m → retry-10m 多級延遲 topic，全失敗才入 DLQ，把退避做在 topic 拓樸上。\n- **DLQ 回灌（redrive）**：修好 bug 或下游恢復後，把 DLQ 訊息批次重投回主佇列。\n- **丟棄 + 告警**：對真的無價值的訊息（如格式徹底壞掉、無業務意義），記錄、告警、直接丟，不佔 DLQ。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| SQS redrive + maxReceiveCount | 超次數自動入 DLQ；隔離毒訊息 | 標準佇列消費 | maxReceiveCount 太小會把暫時性失敗誤判為毒訊息；DLQ 也有 retention（與來源同上限 14 天） |\n| RabbitMQ DLX | 拒絕／逾期／溢出訊息路由到 DLX | 需細分死信原因（`x-death` 標頭記原因） | DLX 也可能再死信，配置不當會迴圈 |\n| Kafka retry-topic 階梯 | 分級退避後才死信 | 想要可觀測的多級重試 | topic 數膨脹；跨 topic 後原 partition 順序不再保（見 訊息順序，領域 A） |\n| 應用層 error topic | 由語意而非次數決定死信 | 能明確分辨可恢復／不可恢復 | 判斷邏輯散在程式碼裡，要測 |\n\n**Worked example**：一條佇列日均 100 萬則訊息，其中 0.1% 因下游短暫 5xx 而失敗，另有 50 則是 schema 壞掉的毒訊息。若沒 DLQ、`maxReceiveCount` 等於無限，那 50 則毒訊息每則無限重投，consumer 不斷崩潰重啟，整條佇列吞吐歸零。設 `maxReceiveCount=5`：暫時性失敗的那 0.1%（約 1,000 則）多半在 5 次內隨下游恢復而成功；50 則毒訊息各被收 5 次後（共約 250 次無效處理）進 DLQ，主佇列恢復正常。代價是那 250 次處理與每則 5 倍延遲——這是把「一則壞訊息的傷害」上限化的成本。\n\n### 何時需要\n\n需要：任何「會遇到無法處理的單則訊息、且不能讓它拖垮整條」的消費路徑——支付事件、訂單處理、外部回呼落地。尤其當訊息來源不完全受控（第三方推送、跨團隊 topic）時，毒訊息幾乎必然出現。\n\n不需要 / 過度：純內部、訊息格式完全受控、且「失敗就該整批停下來人工介入」的低量管線——這種直接讓它卡住反而是對的訊號。另一種是**把 DLQ 當功能用**（正常分支也往 DLQ 丟），那是濫用：DLQ 滿了沒人看，等於沒有。\n\n### 常見誤解與陷阱\n\n- **DLQ 設了就沒人看**。最常見的失效模式：訊息默默堆進 DLQ，沒有「DLQ depth > 0」的告警，問題積壓到 retention 到期被丟掉才發現。DLQ 必須配告警與儀表板。\n- **`maxReceiveCount` 設太小**。設成 1～2，會把「下游抖一下」的暫時性失敗也踢進 DLQ，DLQ 充滿其實可重試的訊息。要和退避策略一起調。\n- **回灌不檢查就重投**。bug 沒修就把 DLQ 整批 redrive 回主佇列，訊息再死一輪、再回 DLQ，形成迴圈。回灌前要確認根因已除。\n- **DLQ 訊息缺上下文**。只存原始 payload、不存失敗原因／堆疊／重試次數，事後完全無從 debug。死信時要連同 metadata 一起保存。\n- **以為 DLQ 保證不丟**。DLQ 本身也有 retention 與容量上限；積壓超過期限照樣消失。\n\n### 延伸閱讀\n\n- AWS, \"Amazon SQS dead-letter queues\"：https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html\n- RabbitMQ, \"Dead Letter Exchanges\"：https://www.rabbitmq.com/docs/dlx\n- Confluent, \"Error Handling Patterns for Apache Kafka\"（retry topic 與 DLQ 階梯）：https://www.confluent.io/blog/error-handling-patterns-in-kafka/\n\n## outbox / saga\n\n### 定義與原理\n\n這條解的是分散式系統最頑固的一致性問題之一：**一筆業務要同時改自己的資料庫、又對外發訊息（或呼叫別的服務），怎麼讓它們要嘛全發生、要嘛全不發生**。兩個子問題：\n\n- **dual-write 問題**：「寫 DB」和「發 MQ」是兩個獨立系統，沒有跨它們的交易。先寫 DB 再發 MQ——發 MQ 前崩潰，DB 改了訊息沒出去；先發 MQ 再寫 DB——寫 DB 失敗，訊息已出去但狀態沒改。**outbox pattern** 解這個：把「要發的訊息」當成一筆資料，和業務變更**寫在同一個本地交易**裡（同一張 DB 的 outbox 表），交易原子性保證「狀態改了 ⇔ 訊息記了」。再由一個獨立的 relay（輪詢或 CDC，見 CDC，領域 L）把 outbox 的訊息真正投到 broker。投遞是 at-least-once，所以下游要冪等（見 冪等 idempotency，領域 A）。\n\n- **跨多服務的業務交易**：一筆下單要扣庫存、扣餘額、建物流單，分屬三個服務、三個 DB，沒有全域 ACID 交易（2PC 太貴又脆，見 2PC 與分散式交易，領域 M）。**saga** 解這個：把長交易拆成一串本地交易，每步都有對應的**補償交易（compensating transaction）**；某步失敗就反向執行已完成步驟的補償，達到「語意上的回滾」（不是真回到原狀態，是用一筆反向操作抵銷）。saga 概念出自 Garcia-Molina 與 Salem 1987 年 SIGMOD 的論文〈Sagas〉，原本是為單機長交易設計，微服務時代被重新發掘（見延伸閱讀）。\n\n### 解法空間\n\noutbox 的投遞 relay：\n- **輪詢 outbox 表**：relay 定期 `SELECT ... WHERE published=false`，投遞後標記。簡單、不依賴 DB 特性，代價是輪詢延遲與 DB 壓力。\n- **CDC tailing**：用 Debezium 之類讀 DB 的 WAL（見 WAL，領域 O），把 outbox 表的 insert 變成事件流。低延遲、不增 DB 查詢，代價是要架 CDC（見 CDC，領域 L）。\n\nsaga 的協調風格：\n- **choreography（編舞）**：無中央協調者，每個服務消費上游事件、做自己的事、再發自己的事件。去中心、低耦合，但全域流程「藏在事件之間」，難一眼看懂。\n- **orchestration（編排）**：一個中央 orchestrator 明確下令「先扣庫存，成功後扣款，失敗則補償」。流程集中可見、好監控，但 orchestrator 是新的耦合點與單點。\n- **durable execution**：用持久化工作流引擎（Temporal、Step Functions）把 saga 的狀態與重試／補償邏輯交給引擎管，是 orchestration 的工程化版本（durable execution 的機制屬領域 K）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| outbox（輪詢 relay） | 狀態變更與訊息原子（同 DB 交易）；at-least-once 投遞 | 單服務內「改 DB ＋ 發事件」要一致 | 輪詢延遲；outbox 表要清理；下游必須冪等 |\n| outbox（CDC relay） | 同上，延遲更低 | 已有 CDC 基礎設施 | 多一套 CDC 要維運；訊息順序依 WAL 順序 |\n| saga choreography | 最終一致；無中央單點 | 步驟少（2～4）、團隊各自擁有服務 | 流程不可見、難 debug；事件迴圈風險；補償順序要想清楚 |\n| saga orchestration | 最終一致；流程集中可見 | 步驟多、需審計與監控 | orchestrator 是耦合點與單點；要自己保證 orchestrator 高可用 |\n\n**Worked example**：下單 saga 三步——扣庫存、扣餘額、建物流單。庫存成功、餘額成功、建物流單時下游回 5xx 且重試耗盡。orchestrator 觸發補償：先「取消物流單」（這步根本沒成功，補償是 no-op 或冪等地確認不存在），再「退餘額」、再「還庫存」，補償**逆序**執行。注意補償本身也會失敗也要重試、也要冪等：若「退餘額」補償投遞兩次，不能退兩次款——所以補償操作要帶冪等鍵。整個過程不是 ACID 的瞬時回滾，而是一段**可觀測的、最終收斂的**反向流程；中間存在「庫存已扣、款已退、但物流未建」的暫態，這正是 saga 用最終一致換可用性的本質。\n\n### 何時需要\n\n需要 outbox：只要「改本地狀態」和「通知外界」必須同生同滅——幾乎所有事件驅動服務的發件端都該用。它幾乎是 dual-write 的標準答案。\n\n需要 saga：跨服務的業務交易、且**不能用單一 DB 交易**（資料分屬不同服務／不同 DB）。choreography 適合步驟少、耦合鬆；步驟一多（補償組合爆炸、流程看不懂）就轉 orchestration 或 durable execution。\n\n不需要：能放進**單一本地 ACID 交易**的，就別拆 saga——saga 的最終一致、補償複雜度、暫態不一致都是真實成本。「為了微服務而微服務」把本可一個交易搞定的事拆成三服務 saga，是典型 over-engineering。\n\n### 常見誤解與陷阱\n\n- **outbox 之後就 exactly-once**。outbox 保證「狀態變更不丟訊息」，但 relay 投遞仍是 at-least-once——relay 標記「已投」前崩潰會重投。下游一定要冪等（見 交付語意三選一，領域 A）。\n- **忘了清 outbox 表**。outbox 只進不出，表無限膨脹拖垮 DB。要有「已投遞 N 天後刪除」的清理。\n- **補償＝rollback**。補償是語意逆向操作，不是還原快照。寄出去的 email 收不回，只能補發「取消通知」。設計補償要從「業務上怎麼抵銷」想，不是「怎麼回到上一個狀態」。\n- **choreography 變成隱形的義大利麵**。事件 A 觸發 B 觸發 C 觸發 A，繞成迴圈沒人看得出；步驟一多務必上 orchestration 把流程顯式化。\n- **補償不冪等 / 不重試**。補償也是分散式呼叫，也會逾時重投；補償若沒冪等鍵，重複補償會超扣超退。\n- **暫態不一致沒對外講清楚**。saga 中間存在「扣了庫存還沒扣款」的視窗，產品與對帳（見 對帳 reconciliation，領域 L）都要承認這個視窗存在。\n\n### 延伸閱讀\n\n- Hector Garcia-Molina, Kenneth Salem, \"Sagas\"（SIGMOD '87，原始論文）：https://dl.acm.org/doi/10.1145/38713.38742\n- microservices.io, \"Pattern: Transactional outbox\"：https://microservices.io/patterns/data/transactional-outbox.html\n- microservices.io, \"Pattern: Saga\"（choreography vs orchestration）：https://microservices.io/patterns/data/saga.html\n- Chris Richardson, \"Saga distributed transactions\"（補償語意）：https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/saga/saga\n\n## webhooks\n\n### 定義與原理\n\nwebhook 是**伺服器對伺服器的回呼**：當提供方（payment、VCS、SaaS）發生某事件，它主動對你預先登記的 URL 發一個 HTTP POST，把事件推給你——是 server→client 推送的一種，但對端是「另一台伺服器」而非瀏覽器。它把「你輪詢問狀態」反轉成「事件發生時對方通知你」，省掉輪詢延遲與浪費。\n\n但 webhook 跑在公開網路上，誰都能對你的端點發 POST，所以它的核心難點不是「怎麼收」，而是四件保證：**這真的是對方送的（簽章）／不能被重放（防 replay）／送不到要能重投（交付＋重試）／重投不能造成重複副作用（冪等）**。本質上 webhook 是「別人家的 at-least-once 投遞打到你家」，所以接收端要按 at-least-once 的所有要求來設計。\n\n### 解法空間\n\n- **簽章驗證（HMAC）**：提供方用共享 secret 對 payload 算 HMAC（多為 SHA-256），放在 header；接收端用同 secret 重算比對。Stripe 用 `Stripe-Signature: t=...,v1=...`、GitHub 用 `X-Hub-Signature-256: sha256=...`。驗證必須用**原始 raw bytes**，不能用重新序列化的物件（多一個空白、改 key 順序、Unicode 正規化都會破壞簽章）。\n- **時間戳 + 容忍窗防 replay**：簽章內含 timestamp，接收端拒收「太舊」的事件。Stripe 預設容忍 5 分鐘（300 秒），高價值端點再縮短。\n- **冪等收件**：每個事件帶唯一 event ID，接收端用它去重（見 去重 dedup，領域 A；冪等定義見 冪等 idempotency，領域 A），同一事件處理過就直接回 2xx 不重做。\n- **快速回 2xx + 非同步處理**：handler 收到後先落地（寫 DB / 入佇列）立刻回 2xx，重活丟背景做。否則處理慢會讓對方判定逾時而重投。\n- **重試與 DLQ（提供方側）**：提供方對非 2xx 回應做退避重試（見 重試、退避、jitter，領域 A），多次失敗後停送或落 DLQ；接收端要能容忍亂序與重複到達。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| HMAC-SHA256 簽章 | 來源真實性＋完整性 | 所有對外 webhook 端點 | 必須用 raw body；secret 輪替要支援雙 secret 並存窗口 |\n| 時間戳容忍窗 | 防 replay | 簽章可能外洩的高價值端點 | 接收端時鐘要對齊（NTP）；窗太緊會誤殺正常延遲 |\n| event ID 冪等去重 | 重投不重複副作用 | at-least-once 必備 | 去重 key 存哪、TTL 多久要定（見 去重 dedup，領域 A） |\n| 快速回 2xx + 非同步 | 避免被判逾時重投 | 處理較重的 handler | 落地後才回 2xx，否則落地失敗卻已回 2xx＝丟事件 |\n| 常數時間比對簽章 | 防時序側信道 | 所有簽章驗證 | 用 `hmac.compare_digest` 類，不要用 `==` |\n\n**Worked example**：一個 webhook 端點日收 50,000 個支付事件，提供方對逾時／5xx 做 at-least-once 重投。若 handler 同步處理（寫 DB + 發確認信 + 更新快取）平均 800ms，遇到下游慢時超過對方 10 秒逾時——對方判定失敗，重投。假設 0.5% 觸發重投（250 個事件），其中半數其實第一次已成功只是回應慢，於是同一筆支付被處理兩次：若沒有 event ID 冪等，就是 125 封重複確認信、甚至重複入帳。正確做法：handler 收到先用 event ID 查去重表，沒見過才寫入、入佇列、立刻回 2xx（耗時降到約 20ms），確認信與快取更新在背景非同步做。重投來的 125 個重複事件命中去重表，直接回 2xx，零重複副作用。\n\n### 何時需要\n\n需要：整合第三方事件源（支付成功、PR 合併、訂閱狀態變更）且不想輪詢；或自己當提供方、要把事件推給客戶。webhook 是 server-to-server 事件整合的事實標準。\n\n不需要 / 換方案：對方在防火牆後、沒有公開可達的 URL（改用對方輪詢或拉模式）；事件量極大且要嚴格有序／可重放（用訊息佇列或 event streaming 更合適，webhook 不保證順序也難重放）；瀏覽器端即時更新（那是 WebSocket／SSE 的活，見領域 C）。\n\n### 常見誤解與陷阱\n\n- **不驗簽章**。最危險的一條：端點公開，不驗簽就信任任何 POST，等於開放任何人偽造事件。簽章驗證是底線。\n- **用解析後的 JSON 算簽章**。框架自動 parse 過 body 再 re-stringify，位元組已變、簽章必不符。必須拿 raw bytes，且常見坑是 body parser 中介層已消費掉原始流。\n- **用 `==` 比對簽章**。字串相等比對有時序側信道；要用常數時間比對。\n- **同步處理重活才回 2xx**。處理太久被對方判逾時而重投，雪上加霜；要先落地再回 2xx，重活非同步。\n- **沒有冪等**。提供方是 at-least-once，重投必然發生（見 交付語意三選一，領域 A）；不靠 event ID 去重就會重複副作用。\n- **secret 不能輪替**。secret 寫死、無雙 secret 並存窗口，輪替時要嘛漏驗要嘛全掛。設計時就要支援「舊新 secret 同時有效」的過渡。\n\n### 延伸閱讀\n\n- Stripe Docs, \"Check webhook signatures\"：https://docs.stripe.com/webhooks/signature\n- GitHub Docs, \"Validating webhook deliveries\"（`X-Hub-Signature-256`）：https://docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries\n- webhooks.fyi（webhook 安全與最佳實踐目錄）：https://webhooks.fyi/\n- OWASP, \"Server Side Request Forgery Prevention Cheat Sheet\"（webhook 端點易成 SSRF 標的時參考）：https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html\n\n## 序列化與 schema 演進\n\n### 定義與原理\n\n兩個服務（或一個服務的新舊版本）要交換資料，得先約定「位元組怎麼排成有意義的欄位」——這是序列化格式。但系統會演進：今天加一個欄位、明天棄用一個欄位，而生產者與消費者**不會同時升級**（rolling deploy 期間新舊版本並存，見 blue-green / canary / rolling，領域 Q）。於是核心問題是 **schema 演進的相容性**：改了 schema，舊版的對端還能不能正確讀／寫？\n\n兩個方向的相容是這條的脊椎：\n- **向後相容（backward compatible）**：用**新 schema** 的消費者，能讀**舊 schema** 寫的資料。典型安全變更：加可選欄位、刪欄位。\n- **向前相容（forward compatible）**：用**舊 schema** 的消費者，能讀**新 schema** 寫的資料（要能忽略不認得的欄位）。典型安全變更：加欄位、刪可選欄位。\n- **完全相容（full）**：同時向前與向後——只能加／刪可選欄位。\n\n本條只管**線上協定（wire）相容**：跨服務傳的訊息／RPC payload 怎麼平滑演進。資料庫**結構**變更（加欄位、改型別、拆表怎麼不停機）是另一回事，在 零停機 schema 遷移（領域 B）——兩者互引：協定相容讓「傳輸」不破、schema 遷移讓「儲存」不停機。\n\n### 解法空間\n\n格式（各自的相容機制）：\n- **JSON（無 schema 或配 JSON Schema）**：欄位靠名字，天生較寬容——多的欄位忽略、缺的當沒有。代價是無強型別、體積大、無內建相容檢查。\n- **Protobuf**：欄位靠**field number**（不是名字）。相容規則靠「永不重用 field number、刪欄位要 `reserved` 保留其號」。proto3 移除了 `required`，因為 required 讓相容變脆。\n- **Avro**：寫入時帶 writer schema，讀取時用 reader schema，靠**schema resolution** 對齊：reader 有而 writer 沒有的欄位用 reader 的 default 補；writer 有而 reader 沒有的欄位忽略。強依賴「default 值」做相容。\n- **schema registry（如 Confluent）**：集中存所有版本 schema，註冊新版本時**自動做相容性檢查**，不相容就拒絕註冊——把「相容」從口頭約定變成 CI gate。\n\n相容策略（registry 的 compatibility type，2026-06）：BACKWARD（預設，只比最新版）、FORWARD、FULL，以及對應的 TRANSITIVE 變體（比**所有**歷史版本而非只比最新版）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| JSON（無 schema） | 寬容、人類可讀；無相容保證 | 對外 public API、低頻整合 | 無型別檢查、體積大；相容靠紀律與測試，沒人替你擋 |\n| JSON Schema | 加上結構驗證 | 想驗 JSON 又不想換格式 | 驗證是執行期的、不像 registry 在註冊時擋 |\n| Protobuf | 強型別、緊湊；field number 不重用即相容 | gRPC、高吞吐內部服務（見 gRPC / Protobuf，領域 N） | 刪欄位必須 `reserved` 號與名；改型別多半破壞相容 |\n| Avro | schema resolution + default 補欄位 | Kafka 事件、資料管線 | 強依賴 default；reader/writer schema 都要可得 |\n| Confluent Schema Registry | 註冊時自動擋不相容變更 | 多團隊共用 topic、要強制相容 | 預設 BACKWARD 只比最新版；要防「跨多版本回放」得用 *_TRANSITIVE |\n\n**Worked example（Protobuf 加欄位安全、改號災難）**：一個 `Order` 訊息，欄位 `string id = 1; int64 discount = 2; int64 amount = 5;`。新版要加 `string currency = 3;`——這是安全的向後＋向前變更：舊消費者收到帶 field 3 的訊息會忽略不認得的 field，新消費者讀舊訊息時 field 3 取預設空字串。但若有人「整理」schema，把已棄用的 `discount = 2` 刪掉、又把 `amount` 從 `= 5` 改成 `= 2` 重用了 2 號——災難：舊資料裡 2 號是 `discount`，新程式按 `amount` 解，wire format 沒有任何機制偵測這種錯位，於是把折扣金額讀成訂單金額，靜默地把資料解爛。正確做法是 `reserved 2; reserved \"discount\";`，永久封印 2 號不再重用。這就是為什麼「永不重用 field number」是 Protobuf 相容的鐵律。\n\n### 何時需要\n\n需要嚴格 schema 與 registry：多團隊共用的事件 topic、長期保存要回放的事件流（event sourcing，見領域 K）、高吞吐內部 RPC——這些「對端很多、升級不同步、錯了很貴」的場景，值得用 Protobuf/Avro + registry 把相容變成 CI 擋得住的東西。\n\n夠用 JSON：對外 public API（消費者不可控，JSON 的寬容反而是優點，配版本化端點，見 REST 設計 · 版本化 · OpenAPI 契約，領域 H）、低頻低量整合、原型階段。對這些上 registry 是 over-engineering。\n\n判準：**對端是否受你控制 + 升級是否同步 + 演進是否頻繁**。三個都「否」就往強 schema + registry 走，都「是」就 JSON 夠了。\n\n### 常見誤解與陷阱\n\n- **以為加欄位永遠安全**。對 Protobuf／忽略未知欄位的格式是；但若舊消費者把「未知欄位」當成錯誤拒絕（嚴格模式），加欄位就破壞向前相容。要先確認對端對未知欄位的處理。\n- **重用 Protobuf field number**。如上例，wire format 偵測不到，靜默解爛資料。刪欄位必 `reserved`。\n- **Avro 加欄位不給 default**。Avro 靠 default 做 schema resolution；加欄位沒 default，舊資料用新 reader 讀就會失敗。\n- **registry 預設只比最新版**。Confluent 預設 BACKWARD 是非遞移的——只跟「最新註冊版」比，不跟所有歷史版比。若要回放很久以前的資料，得用 BACKWARD_TRANSITIVE 才會跨全部版本檢查（2026-06）。\n- **把 wire 相容和 DB 遷移混為一談**。協定相容讓傳輸不破，但欄位真正落進 DB、改型別、拆表是 零停機 schema 遷移（領域 B）的事；只顧一邊另一邊會炸。\n- **改欄位型別當小事**。`int32 → int64`、`string → bytes` 這類在多數格式都是破壞性變更；要當新欄位加、舊欄位 deprecate，而非原地改型別。\n\n### 延伸閱讀\n\n- Protocol Buffers, \"Language Guide (proto 3)\"（field number、`reserved`、相容規則）：https://protobuf.dev/programming-guides/proto3/\n- Apache Avro Specification, \"Schema Resolution\"：https://avro.apache.org/docs/1.12.0/specification/#schema-resolution\n- Confluent Docs, \"Schema Evolution and Compatibility\"（BACKWARD/FORWARD/FULL 與 TRANSITIVE）：https://docs.confluent.io/platform/current/schema-registry/fundamentals/schema-evolution.html\n- Martin Kleppmann, *Designing Data-Intensive Applications*, Ch. 4 \"Encoding and Evolution\"\n"}, {"id": "A3-messaging-tools", "file": "A3-messaging-tools.md", "group": "Part 1 — 訊息、交付與整合", "title": "A · 訊息工具對照", "md": "# A · 訊息工具對照\n\n這個檔回答的不是「該選哪個訊息保證」（那是交付語意條目的事），而是「**市面上具體的訊息工具，各自把哪些保證做進預設、又把哪些坑留給你**」。本檔含六個條目：SQS、SNS、Kafka、RabbitMQ、Bull／BullMQ，以及一個比較條目「Redis Pub/Sub vs Streams」。它們共用同一條脊椎：每個工具都是一組「保證 ＋ 適用條件 ＋ 坑」的打包，你選工具就是在選你願意承擔哪一組坑。與相鄰領域的邊界一句話：**交付語意（at-least-once／exactly-once）、冪等、去重、順序、DLQ 等「機制」在交付語意與重複處理的條目深講，本檔只講「某個工具怎麼實作或不實作這些機制」**；Redis 自身的單執行緒內幕、持久化、io-threads 在領域 G 的「Redis」深講，本檔只比交付語意差異。\n\n## SQS（Standard vs FIFO、visibility timeout）\n\n### 是什麼與內部機制\n\nAmazon SQS 是全託管的分散式訊息佇列：producer 呼叫 `SendMessage` 把訊息寫進佇列，consumer 用 `ReceiveMessage` 拉取（pull 模型，沒有 push），處理完呼叫 `DeleteMessage` 把訊息刪掉。關鍵機制是 **visibility timeout**：當一個 consumer 收到一則訊息，這則訊息不會立刻被刪，而是進入「in-flight」狀態、在 visibility timeout 這段時間內對其他 consumer 隱形。如果 consumer 在這段時間內 `DeleteMessage`，訊息消失；如果沒有（崩潰、處理超時），timeout 一到訊息重新變可見，另一個 consumer 會再拿到它——這正是 SQS「至少一次」的根源：刪除是主動的，沒成功刪就會重投。\n\nSQS 有兩種佇列。**Standard**：近乎無限吞吐、at-least-once delivery、best-effort ordering（盡量但不保證順序，可能重排）。**FIFO**：strict ordering（同一 message group 內嚴格先進先出）、在 5 分鐘的 deduplication window 內提供 exactly-once processing（靠 deduplication ID 去重）。visibility timeout 預設 **30 秒**，範圍 **0 秒到 12 小時**；message retention 預設 4 天、可設 60 秒到 14 天（2026-06）。\n\n### 在哪些系統扮演什麼角色\n\nSQS 最典型的角色是**服務間的非同步解耦緩衝**：上游把工作丟進佇列就回，下游 worker 自己的步調拉取，上下游不必同時在線（時間解耦）。常見搭配是把它放在 SNS 後面當 fan-out 的落點（見 SNS），或當 Lambda 的事件來源（event source mapping）。FIFO 佇列則用在「順序不能亂、重複會出事」的場景，例如同一個帳戶的一連串狀態變更必須照序處理——用 message group ID 把同一帳戶的訊息綁進同一個有序群組，不同帳戶之間仍可並行。\n\n### 保證與限制\n\n保證：Standard 是 at-least-once ＋ best-effort ordering；FIFO 是 exactly-once processing（5 分鐘窗內）＋ strict ordering。兩者都支援 DLQ（超過 `maxReceiveCount` 的訊息轉進死信佇列）。\n\n硬限制（必須記牢，會直接影響架構）：\n\n- **單則訊息 payload 上限為 1 MiB（1,048,576 bytes）（2026-06）**。這是 2025-08-04 才從 256 KiB 提升上來的——在那之前是 256 KiB，所以許多既有系統與函式庫的假設仍停在 256 KiB（見下方陷阱）。超過 1 MiB 要用 Extended Client Library 把 payload 放 S3、訊息只帶指標，這條路最大可到 2 GB。\n- FIFO 預設吞吐為**整條佇列共用**每 API action 每秒 300 則（非批次）／3,000 則（批次）；要靠 message group 粒度平行擴展，必須開 high throughput mode（`FifoThroughputLimit=perMessageGroupId`），開啟後每 message group／partition 各自 300／3,000，主要 region（us-east-1／us-west-2／eu-west-1）**非批次**即可達約 70,000 訊息/秒、含批次更高（2026-06）。\n- 計費以每 64 KB 為一個請求單位計：一則 1 MiB 訊息算 16 個請求，不是一個。\n\n**Worked example（payload 上限）**：假設一個系統把使用者上傳的結構化資料整包塞進 SQS 訊息，平均 700 KiB、尖峰偶爾 1.3 MiB。在 1 MiB 上限下，那批 1.3 MiB 的訊息會被 `SendMessage` 直接拒絕（拋 message-too-long）。若每天有 10 萬則訊息、其中 0.5% 超過 1 MiB，就是每天 500 則靜默失敗（如果沒檢查回傳）。正解是對所有 > 1 MiB 的 payload 走 S3 offload，而不是賭尖峰不發生。同時注意計費：700 KiB 的訊息算 `ceil(700/64) = 11` 個請求單位，10 萬則就是 110 萬個請求單位，不是 10 萬。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| SQS Standard | at-least-once、best-effort ordering | 一般非同步解耦、可容忍重複/重排的工作佇列 | 一定會遇到重複與亂序，consumer 必須冪等 |\n| SQS FIFO | exactly-once processing（5 分鐘窗）、strict ordering | 同群組內順序敏感、重複會出錯 | 預設整佇列 300／3,000 TPS；按 message group 擴展須開 high throughput mode |\n| Kafka（見 Kafka） | at-least-once，可開 EOS；保留期內可重放 | 高吞吐事件流、需要重放/多訂閱者 | 自運維（或付託管）、partition＝順序與並行單位 |\n| RabbitMQ（見 RabbitMQ） | at-least-once（手動 ack）；豐富 routing | 複雜路由、低延遲任務分發 | 訊息預設消費即走、無內建長期保留/重放 |\n\n跟 Kafka 的本質差異：SQS 是「訊息被消費刪除即消失」的佇列語意（沒有 replay、沒有「新訂閱者讀歷史」），Kafka 是「append-only log、保留期內可任意重讀」的日誌語意。要重放或多組互不影響的消費者讀同一份資料，SQS 做不到、要靠前面接 SNS 扇出多個佇列。\n\n### 常見誤解與陷阱\n\n- **把 256 KiB 當上限寫死**：很多既有程式、第三方 SDK 或 mental model 仍假設 256 KiB（這在 2025-08 之前是對的）。升級後若你的程式碼還在 250 KiB 處硬切分訊息，是在做沒必要的工。反過來，有些舊版 SDK／驗證邏輯尚未更新到 1 MiB，曾出現「server 接受 1 MiB 但 client 端 SDK 仍按 256 KiB 報錯」的案例——升限後請以一手 quotas 文件為準、並實測你的 SDK 版本。\n- **以為 FIFO ＝ 訊息層 exactly-once delivery**：FIFO 給的是 exactly-once **processing**（5 分鐘去重窗內），不是物理上保證只投一次。窗外的重送、或下游處理本身的重複，仍要靠冪等兜底（見冪等與去重條目，本領域）。\n- **visibility timeout 設太短**：若處理時間 > visibility timeout，訊息會在你還在處理時重新可見、被另一個 consumer 並行拿走，造成重複處理甚至 double-spend。長任務要嘛把 timeout 設足，要嘛在處理中呼叫 `ChangeMessageVisibility` 續租。\n- **把 SQS 當廣播**：SQS 是點對點，一則訊息被一個 consumer 拿走刪掉就沒了。要一份訊息給多個下游，前面要接 SNS（見 SNS）。\n\n### 延伸閱讀\n\n- [Amazon SQS message quotas（官方 quotas，含 1 MiB 上限）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/quotas-messages.html)\n- [Amazon SQS visibility timeout（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-visibility-timeout.html)\n- [Amazon SQS increases maximum message payload size to 1 MiB（2025-08 公告）](https://aws.amazon.com/about-aws/whats-new/2025/08/amazon-sqs-max-payload-size-1mib/)\n- [FIFO queues exactly-once processing（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/FIFO-queues-exactly-once-processing.html)\n\n## SNS（fan-out、SNS→SQS）\n\n### 是什麼與內部機制\n\nAmazon SNS 是全託管的 pub/sub 服務：producer 把訊息 `Publish` 到一個 **topic**，SNS 把同一則訊息推（push）給所有訂閱該 topic 的端點——這就是 **fan-out**（一發、多收）。訂閱端可以是 SQS 佇列、Lambda、HTTP(S) endpoint、email、SMS、行動推播等。它與 SQS 的根本差別是方向：SQS 是 consumer 主動拉、且一則訊息只給一個 consumer；SNS 是 SNS 主動推、且一則訊息複製給所有訂閱者。\n\nSNS 有 Standard topic 與 FIFO topic 兩種。Standard topic：高吞吐、best-effort ordering、at-least-once。**FIFO topic**：strict ordering（同一 message group 內）＋ deduplication（5 分鐘窗，可用訊息內容 SHA-256 自動產生去重 ID）。\n\n### 在哪些系統扮演什麼角色\n\nSNS 的招牌角色是 **SNS→SQS fan-out**：一個事件（例如「訂單成立」）發到 SNS topic，扇出到多個 SQS 佇列，各佇列後面掛不同的下游服務（出貨、發票、通知各拉各的、互不影響）。這個組合是 AWS 官方推薦的標準解耦架構，因為它同時拿到 SNS 的扇出與 SQS 的緩衝/重試/DLQ。SNS 也常單獨用於通知（推播、簡訊、email）這類「發完即忘、不需緩衝」的場景。\n\n### 保證與限制\n\n保證：Standard topic 是 at-least-once delivery、best-effort ordering；FIFO topic 是 strict ordering ＋ deduplication。訂閱端不可用時，SNS 執行 delivery retry policy，並可搭配 DLQ 保存最終投遞失敗的訊息。\n\n限制（FIFO topic 的投遞規則要記牢，2026-06）：**SNS FIFO topic 不能直接投遞給 email/SMS/HTTP(S)/行動推播/Lambda，只能投遞到 SQS 佇列**。它可以投到：\n\n- **SQS FIFO 佇列** → 保留 strict ordering ＋ exactly-once（端到端有序、不重複）；\n- **SQS Standard 佇列**（2023-09 起支援）→ **降級為 best-effort ordering ＋ at-least-once**，換取較低成本。\n\n也就是說，端到端的順序保證能不能成立，取決於落點佇列的型別——FIFO topic 配 Standard queue，等於在最後一段把順序與去重保證丟掉了。\n\n**Worked example（fan-out 計費直覺）**：一個 SNS topic 扇出到 4 個 SQS 佇列。發布 100 萬則訊息，SNS 端是 100 萬次 publish，但會產生 100 萬 × 4 ＝ 400 萬次對 SQS 的投遞。如果其中一個下游（例如通知服務）暫時掛掉，受影響的只有它那條佇列裡的積壓——其他三條照常流動，這正是「各佇列獨立緩衝」的價值。但別忽略：扇出數越多，下游請求數與費用就線性放大。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| SNS（fan-out） | at-least-once 推送給所有訂閱者 | 一個事件要給多個獨立下游 | 推模型、無緩衝；下游慢/掛要靠後面的 SQS 兜 |\n| SNS→SQS | 扇出 ＋ 每條下游各自緩衝/重試/DLQ | 解耦多下游、要獨立重試與背壓 | FIFO topic 配 Standard queue 會降級有序保證 |\n| Kafka（見 Kafka） | consumer group 天然多訂閱、可重放 | 同一份事件流多組消費者、要重放 | 自運維成本高；非「託管即用」 |\n| EventBridge | 規則路由、schema registry、跨帳號 | 需要內容過濾/路由規則的事件匯流 | 與 SNS 重疊但偏「事件總線」、語意更重 |\n\nSNS 與 Kafka 都能做「一發多收」，但 SNS 是推、無歷史、新訂閱者讀不到過去的訊息；Kafka 是拉、有保留期、新 consumer group 可從頭重放。要「重放歷史給新加入的消費者」選 Kafka；要「託管、零運維、即發即扇」選 SNS。\n\n### 常見誤解與陷阱\n\n- **以為 SNS 有緩衝**：SNS 是推、不是佇列，它本身不替你存著等下游。下游處理不過來或暫時掛掉，緩衝來自它後面的 SQS——直接訂閱 Lambda/HTTP 而沒接 SQS，遇到下游故障只能靠 SNS 的 retry policy ＋ DLQ，控制力遠不如 SQS。\n- **以為 SNS FIFO 能直接給任何端點有序投遞**：它只能投到 SQS。想要端到端有序，必須 FIFO topic → FIFO queue，且整段都不可換成 Standard。\n- **把 fan-out 當免費**：扇出 N 個訂閱者就是 N 倍下游請求量與費用，且任何一個下游的放大都會被乘上去。\n- **混淆 SNS 與 SQS 的訊息歸屬**：SQS 一則訊息只一個 consumer 拿；SNS 一則訊息每個訂閱者各拿一份。把 SQS 當廣播、或把 SNS 當工作分發，都是用錯工具。\n\n### 延伸閱讀\n\n- [Amazon SNS message delivery for FIFO topics（官方，含可投遞端點限制）](https://docs.aws.amazon.com/sns/latest/dg/fifo-message-delivery.html)\n- [Amazon SNS FIFO topics now support delivery to SQS Standard queues（2023-09 公告）](https://aws.amazon.com/about-aws/whats-new/2023/09/amazon-sns-fifo-topics-message-delivery-sqs-standard-queues/)\n- [Introducing Amazon SNS FIFO（AWS Blog）](https://aws.amazon.com/blogs/aws/introducing-amazon-sns-fifo-first-in-first-out-pub-sub-messaging/)\n\n## Kafka（log/partition/consumer group/EOS）\n\n### 是什麼與內部機制\n\nApache Kafka 不是傳統佇列，而是一個**分散式、可持久化、可重放的 append-only commit log**。核心抽象：\n\n- **Topic**：一個邏輯訊息流，切成多個 **partition**。\n- **Partition**：append-only、嚴格有序的訊息序列，每則訊息有單調遞增的 offset。partition 是**順序與並行的最小單位**——順序只在單一 partition 內保證，跨 partition 不保證。producer 用 partition key 決定訊息落哪個 partition（同 key → 同 partition → 有序）。\n- **Consumer group**：一組 consumer 共同消費一個 topic，Kafka 把 partition 分配給組內各 consumer，**一個 partition 在同一時刻只給組內一個 consumer**。不同 consumer group 彼此獨立、各自從頭或從某 offset 讀同一份 log（這就是「多訂閱者」與「重放」的來源）。\n- **Offset commit**：consumer 自己記錄讀到哪（commit offset）。「消費」不刪訊息——訊息留在 log 直到 retention 過期。讀進度只是一個 offset 指標。\n\n因為訊息不隨消費刪除、而是按 retention（時間或大小）保留，Kafka 天然支援 replay 與多組互不干擾的消費者——這是它與 SQS/RabbitMQ「消費即走」語意的根本分野。\n\n### 在哪些系統扮演什麼角色\n\nKafka 的典型角色：高吞吐**事件流匯流排**（所有服務的事件往這裡寫、各下游各自訂閱）、**event sourcing 的存放層**（狀態＝不可變事件序列，log 天然契合，見 K 領域的 Event sourcing）、**串流處理的來源/落點**、以及 **CDC 的傳輸層**（資料庫變更 → Kafka → 下游同步，見 L 領域）。當需求是「一份事件流、很多消費者、還要能重放歷史」，Kafka 幾乎是預設選擇。\n\n### 保證與限制\n\n預設保證是 **at-least-once**：producer 重試可能造成重複、consumer 在 commit offset 前崩潰會重讀。順序只在 partition 內保證。\n\n**Kafka EOS（exactly-once semantics）成立的條件與限制（2026-06，務必精確）**：Kafka 能在「Kafka 內部」達到 exactly-once，但它是三個機制疊起來的，缺一不可：\n\n1. **冪等 producer**（`enable.idempotence=true`，新版預設開）：broker 給每個 producer 一個 PID ＋ 每則訊息一個 sequence number，重試造成的重複在 broker 端被去掉。這只解決「單一 producer session、單一 partition」的重複。\n2. **交易（transactional producer）**：跨多個 partition／topic 的寫入原子化（兩階段提交式），並把「寫資料 ＋ commit consumer offset」綁進同一個交易，達成 read-process-write 的原子性。要設 `transactional.id` 並用 `beginTransaction`/`commitTransaction`。\n3. **consumer 設 `isolation.level=read_committed`**：consumer 只讀到已 commit 交易的訊息，跳過 aborted 交易的訊息；只讀到 offset 低於 LSO（last stable offset）的訊息。\n\n**關鍵限制**：Kafka 的 EOS 是「**Kafka-to-Kafka**」的——它保證「從 Kafka 讀、處理、寫回 Kafka」這條鏈路 exactly-once。一旦你的處理有**外部副作用**（寫第三方資料庫、呼叫外部 API、發 email），那個外部系統不在 Kafka 交易裡，EOS **不延伸到它**——對外部系統仍要靠冪等寫入或 outbox 模式（見 outbox/saga 條目，本領域）來兜。把 Kafka EOS 當成「整條業務鏈端到端只執行一次」是最常見的誤判。\n\n**Worked example（重複數量直覺）**：用預設 at-least-once、broker 重投率約 0.1%，每天流經 1,000 萬則訊息，下游約有 `10,000,000 × 0.001 = 10,000` 筆重複要靠冪等吸收。若改開 EOS（Kafka 內部鏈路），這 1 萬筆在 Kafka↔Kafka 段被消掉，但若下游同時還在寫一個外部 PostgreSQL，那段仍需自己的冪等鍵——EOS 沒幫你保證那一步。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Kafka | at-least-once（可開 Kafka 內 EOS）；保留期內可重放、多 consumer group | 高吞吐事件流、event sourcing、需重放/多訂閱 | 自運維重；EOS 不含外部副作用；partition＝順序與並行單位 |\n| SQS（見 SQS） | at-least-once / FIFO exactly-once processing | 託管即用的解耦佇列 | 無 replay、無「多組讀同份」、無長期保留 |\n| RabbitMQ（見 RabbitMQ） | at-least-once（手動 ack）、豐富 routing | 複雜路由、低延遲任務分發 | 非日誌語意、無原生長期保留/重放 |\n| Pulsar | 類 Kafka log ＋ 內建分層儲存、多租戶 | 需要 segment/storage 分離、地理複製 | 生態與人才池小於 Kafka |\n\n選擇判準：要「重放 ＋ 多組獨立消費 ＋ 超高吞吐」→ Kafka；只要「託管解耦佇列、不重放」→ SQS；要「靈活 routing、低延遲、訊息量中等」→ RabbitMQ。\n\n### 常見誤解與陷阱\n\n- **以為開了 EOS 就整條業務 exactly-once**：EOS 是 Kafka-to-Kafka。外部資料庫/API 的副作用不在交易裡，仍要冪等。這是本條最重要的一句。\n- **以為 Kafka 全域有序**：順序只在 partition 內。要讓某類訊息有序，必須用同一個 partition key 把它們綁進同一個 partition——代價是該 key 的吞吐被單一 partition 上限。\n- **partition 數設太低或太高**：partition 數是並行度上限（consumer group 內並行消費者數 ≤ partition 數）。設太低限制吞吐；設太高增加 metadata/rebalance 負擔，且 partition 數通常只能加不能減。\n- **把 commit offset 當「處理完成」**：若在處理完成前就自動 commit offset，崩潰會造成訊息遺失（變成 at-most-once）；若處理完才 commit，崩潰造成重讀（at-least-once）。語意取決於 commit 時機，不是預設就對。\n\n### 延伸閱讀\n\n- [Kafka Documentation: Design / Message Delivery Semantics（官方）](https://kafka.apache.org/documentation/#semantics)\n- [Confluent: Transactions and Exactly-Once Semantics（官方課程）](https://developer.confluent.io/courses/architecture/transactions/)\n- [Exactly-once semantics with Kafka transactions（Strimzi blog）](https://strimzi.io/blog/2023/05/03/kafka-transactions/)\n\n## RabbitMQ（exchange/routing/ack/confirms）\n\n### 是什麼與內部機制\n\nRabbitMQ 是基於 AMQP 的訊息 broker，核心模型把「發布」與「投遞」用一層 routing 解耦：producer 不直接寫佇列，而是把訊息發到 **exchange**，exchange 依照 **binding** 與 **routing key** 把訊息路由到一個或多個 **queue**，consumer 從 queue 取訊息。四種 exchange 決定路由邏輯（2026-06）：\n\n- **direct**：routing key 完全相符才投（點對點/按類型）。\n- **topic**：routing key 做萬用字元比對（`*` 一段、`#` 多段），用於主題訂閱。\n- **fanout**：忽略 routing key，廣播到所有綁定的 queue（扇出）。\n- **headers**：依訊息 header 而非 routing key 比對。\n\n可靠性靠兩個**正交且互不相關**的機制（官方明確說兩者彼此無感知）：\n\n- **consumer acknowledgements（ack）**：consumer 處理完呼叫 `basic.ack`，broker 才把訊息標記可刪。手動 ack 模式下，consumer 在 ack 前崩潰，訊息會 requeue 給別人——這是 RabbitMQ 的 at-least-once 來源。自動 ack（auto-ack）則一投遞就視為完成，崩潰即遺失（at-most-once，效能高但危險）。\n- **publisher confirms**：broker 收到並安置好訊息後回 `basic.ack` 給 producer，讓 producer 知道訊息沒在「producer → broker」這段掉。它只覆蓋發布端與所連節點/queue leader 之間，與 consumer ack 無關。\n\n### 在哪些系統扮演什麼角色\n\nRabbitMQ 的典型角色是**任務分發與工作佇列**（把耗時工作丟給一群 worker，competing consumers 各搶各的）、**需要靈活路由的事件分送**（用 topic exchange 做主題訂閱、用 fanout 做廣播），以及**請求/回覆式的非同步整合**。它的強項是 routing 表達力與低延遲；弱項是它本質是「消費即走」的 broker，沒有 Kafka 那種長期保留與任意重放（雖然有 Streams 外掛補強，但不是預設心智模型）。\n\n### 保證與限制\n\n保證：手動 ack ＋ 持久化 queue ＋ 持久化訊息 ＋ publisher confirms，能達 at-least-once（producer 端確認沒掉、consumer 端確認處理完才刪）。\n\n限制與條件：\n\n- **at-least-once 不是免費的**：要同時做到「queue 宣告 durable」「訊息標 persistent」「consumer 手動 ack」「producer 開 publisher confirms」，少一環就有對應的遺失或重複窗口。auto-ack ＋ 非持久化＝高吞吐但隨時可能掉訊息。\n- **沒有原生 exactly-once**：requeue 機制本身會造成重複，下游要冪等。\n- **publisher confirms 的吞吐取捨**：逐則同步等 confirm 會嚴重拖慢吞吐；實務上批次發布、每 50–100 則等一次 confirm，在安全與吞吐間取平衡。\n\n**Worked example（confirm 批次的吞吐差異）**：假設單則往返 confirm 的網路 RTT 是 1 ms。若逐則同步等 confirm，理論上限約 1,000 則/秒（被 RTT 卡死）。若改成批次：一次送 100 則、只等一次 confirm，同樣 1 ms RTT 下吞吐可拉高約兩個數量級（受限轉為 broker 處理能力而非 RTT）。代價是：一個 batch 內若有訊息沒被 confirm，你只知道「這批有問題」、要整批重送或逐則重查——安全性換吞吐的具體取捨就在這裡。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| RabbitMQ | at-least-once（手動 ack ＋ confirms ＋ 持久化）；豐富 routing | 任務分發、靈活路由、低延遲、量中等 | 消費即走、無原生重放；可靠性需手動湊齊四環 |\n| Kafka（見 Kafka） | at-least-once，可開 EOS；可重放、多 consumer group | 高吞吐事件流、event sourcing | routing 表達力弱於 RabbitMQ（靠 partition key/topic 設計） |\n| SQS（見 SQS） | at-least-once / FIFO exactly-once processing | 託管零運維解耦佇列 | routing 極簡（無 exchange 概念）、要扇出靠 SNS |\n| Redis Streams（見 Redis Pub/Sub vs Streams） | at-least-once（consumer group ＋ XACK） | 輕量持久化流、已有 Redis | 持久化/可靠性弱於上述專用 broker |\n\n判準：需要複雜 routing（topic/header 比對）、低延遲任務分發 → RabbitMQ；需要重放與超高吞吐 → Kafka；要託管免運維 → SQS；只是已有 Redis、想要輕量持久化流 → Redis Streams。\n\n### 常見誤解與陷阱\n\n- **把 publisher confirms 當成 end-to-end 保證**：confirm 只證明「producer → broker」沒掉，不證明 consumer 處理成功。端到端要 confirm（前段）＋ consumer 手動 ack（後段）兩者都做。\n- **用 auto-ack 還以為可靠**：auto-ack 在訊息投遞瞬間就視為完成，consumer 崩潰＝訊息已從 queue 消失、無法 requeue。要可靠就得手動 ack。\n- **忘了標 durable/persistent**：queue 沒宣告 durable、訊息沒標 persistent，broker 重啟就清空——「我有 ack 機制」救不了沒持久化的訊息。\n- **把 RabbitMQ 當 Kafka 用（要重放）**：預設語意是消費即走、無歷史。需要重放或多組互不影響地讀同一份歷史，這不是 RabbitMQ 的設計甜蜜點。\n\n### 延伸閱讀\n\n- [Consumer Acknowledgements and Publisher Confirms（官方）](https://www.rabbitmq.com/docs/confirms)\n- [RabbitMQ Tutorials（含各 exchange 類型）](https://www.rabbitmq.com/tutorials)\n- [AMQP 0-9-1 Model Explained（官方）](https://www.rabbitmq.com/tutorials/amqp-concepts)\n\n## Bull / BullMQ（Redis-backed delayed/job queue）\n\n### 是什麼與內部機制\n\nBull／BullMQ 是 Node.js 的**以 Redis 為後端的 job queue**：不是獨立的 broker 進程，而是一個函式庫，用 Redis 的資料結構（list、sorted set、hash、加上以 Lua 腳本保證原子性的操作）把「工作」存進 Redis，由 worker 進程拉取執行。它和 SQS/Kafka 那種「訊息傳遞」不同，定位是 **background job processing**：你 `add` 一個 job（帶 payload、選項），worker `process` 它，框架管狀態流轉（waiting → active → completed/failed）、重試、延遲、優先序、可重複排程（repeatable/cron-like）、rate limiting、流程編排（flows）。\n\n延遲投遞靠 Redis 的 sorted set：把「該執行時間」當 score，到時間才從 delayed 集合移到 waiting。原子性靠 Lua：例如「從 waiting 取一個 job 並移到 active 並設 lock」必須是不可分割的單一操作，否則兩個 worker 會搶到同一個 job。\n\n**版本與維護狀態（2026-06，務必精確）**：原始的 **Bull（OptimalBits）已進入 legacy/maintenance 模式**（只收 bug fix、不加新功能）；**現役後繼者是 BullMQ**，以 TypeScript 重寫，由 **Taskforce.sh 維護**（持續活躍更新，2026-06 仍為 v5.x 系列）。**新專案應選 BullMQ**。注意：BullMQ 由 Taskforce.sh 維護，**不是 Redis 官方／Redis Ltd. 的產品**（沒有 Redis 收購 BullMQ 的證據）——Taskforce.sh 是 BullMQ 與 Bull 背後的團隊與商用 dashboard 提供者。BullMQ 相對 Bull 有破壞性 API 變更（Queue/Worker 拆分、獨立的 QueueEvents 類別、不再允許整數 job ID 等）。\n\n### 在哪些系統扮演什麼角色\n\n典型角色：Node.js 應用裡的**非同步背景工作**——寄信、產報表、影像/檔案處理、webhook 重送、排程性任務（用 repeatable jobs 取代外部 cron）。它的甜蜜點是「已經有 Redis、想要帶延遲/重試/優先序/排程的工作佇列、又不想多養一個 SQS/RabbitMQ」。它常被放在 web 請求路徑外：HTTP handler 只 `add` job 就回應，重活交給 worker 池。\n\n### 保證與限制\n\n保證：at-least-once 處理——job 被 worker 取走時上 lock，處理完才標 completed；worker 崩潰、lock 到期後 job 被視為 stalled、會被重新拉起處理（所以可能重複）。內建重試（含 backoff）、延遲、優先序、並發控制、rate limiting。\n\n硬限制：\n\n- **可靠性的天花板是 Redis 的持久化**。Redis 預設 AOF/RDB 設定下，崩潰可能丟失最近一小段未落盤的資料（見領域 G 的 Redis 持久化）——也就是說，job 佇列的耐久性等於你 Redis 的耐久性，不會更高。要求金融級不丟，Redis-backed queue 不是首選。\n- **沒有 exactly-once**：stalled job 重拉就是重複來源，handler 必須冪等。\n- **規模受單一 Redis（或 cluster）限制**，吞吐與資料量綁在 Redis 的記憶體與單執行緒執行模型上（見領域 G）。\n\n**Worked example（stalled 重複數量）**：假設一個 worker 池處理 100 萬個 job，平均處理 2 秒，部署/OOM 造成約 0.05% 的 job 在處理中途 worker 被殺。這些 job 的 lock 到期後會被當 stalled 重新處理：`1,000,000 × 0.0005 = 500` 個 job 會被執行第二次。如果其中是「扣款」「寄信」這類有副作用的工作而 handler 不冪等，就是 500 次重複扣款/重複寄信——所以 Redis-backed queue 的 handler 必須帶冪等鍵（見冪等條目，本領域）。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| BullMQ（Redis-backed） | at-least-once；內建延遲/重試/優先序/排程 | Node.js 背景工作、已有 Redis、要延遲/cron-like | 耐久性 = Redis 耐久性；stalled 重複；單 Redis 規模限制 |\n| Bull（legacy） | 同上但只收 bugfix | 既有專案維持現狀 | 新專案勿選；遷 BullMQ 有破壞性 API 變更 |\n| SQS（見 SQS） | at-least-once / FIFO；託管耐久 | 跨語言、要託管耐久與大規模 | 無內建 job 狀態機/優先序/cron，要自己組 |\n| Sidekiq（Ruby）/ Celery（Python） | at-least-once（多 backend） | 對應語言生態的背景工作 | 與 BullMQ 同類、語言綁定不同 |\n\n判準：Node.js ＋ 已有 Redis ＋ 要延遲/重試/排程而非跨語言耐久傳遞 → BullMQ；要託管、跨語言、更高耐久 → SQS；其他語言生態 → Sidekiq/Celery 等對應物。\n\n### 常見誤解與陷阱\n\n- **履歷/文件仍寫「Bull」**：Bull 已是 legacy（只收 bug fix）。現役是 BullMQ，新專案用它（2026-06）。把 Bull 當「現在要採用的選擇」是過時資訊。\n- **以為 BullMQ 屬於 Redis 官方**：它由 Taskforce.sh 維護，不是 Redis Ltd. 產品。它「用 Redis 當後端」不等於「是 Redis 的東西」。\n- **把它的耐久性想得比 Redis 高**：job 佇列不會比底層 Redis 更可靠。Redis 沒設好持久化，崩潰就會丟 job——這不是 BullMQ 的 bug，是它後端的本質。\n- **handler 不冪等**：at-least-once ＋ stalled 重拉 ＝ 一定會有重複執行。有副作用的 job handler 必須冪等，這是用任何 at-least-once 工作佇列的前提。\n\n### 延伸閱讀\n\n- [BullMQ GitHub（Taskforce.sh 維護）](https://github.com/taskforcesh/bullmq)\n- [Bull GitHub（OptimalBits，legacy）](https://github.com/OptimalBits/bull)\n- [BullMQ Documentation](https://docs.bullmq.io/)\n\n## Redis Pub/Sub vs Streams\n\n### 定義與原理\n\nRedis 提供兩種「把訊息從發布者送到消費者」的機制，交付語意天差地別，選錯會在「訊息可不可以掉」這件事上踩坑。本條只比**交付語意**；Redis 自身的單執行緒執行、io-threads、持久化（RDB/AOF）等內部機制在領域 G 的「Redis」深講（見 Redis，領域 G）。\n\n- **Pub/Sub**：`PUBLISH` / `SUBSCRIBE`，**fire-and-forget、at-most-once、無持久化**。訊息只送給「發布當下正連線且已訂閱」的 subscriber。離線的、或在訊息發出後才訂閱的，**永久錯過**——沒有 replay、沒有歷史、沒有消費進度追蹤。它是純廣播管道，訊息發完不留痕。\n- **Streams**：`XADD` 寫入一個 **append-only log**（持久化於 Redis 資料結構，受 RDB/AOF 保護），每則訊息有單調遞增的 ID。消費可用 `XREAD`（無消費進度、自己記 ID），或用 **consumer group**（`XREADGROUP`）達 **at-least-once**：每則被讀走的訊息進入 **PEL（Pending Entries List）**，消費者處理完必須 `XACK` 明確確認；沒 ack 的訊息留在 PEL，消費者崩潰後可重讀、或用 `XCLAIM`/`XAUTOCLAIM` 被別的消費者接手。語意上 Streams 像「Redis 內的迷你 Kafka」。\n\n第一原理差異：Pub/Sub 把訊息當「當下的事件信號」（沒人聽就沒了）；Streams 把訊息當「持久化的記錄」（保留、可重讀、要確認）。\n\n### 解法空間\n\n當需求是「Redis 內把訊息傳給消費者」，可走的路：\n\n- **Pub/Sub（普通）**：一發、所有當下訂閱者收、不留。適合「即時但可丟」的廣播。\n- **Sharded Pub/Sub**（Redis 7.0+）：把 channel 依 slot 分片，解決 cluster 模式下 Pub/Sub 訊息要在所有節點間擴散的擴展瓶頸——語意仍是 at-most-once，只是擴展性改善。\n- **Streams ＋ `XREAD`**：持久化 log、自己管讀到哪、無 ack；適合「要歷史但消費者自己管進度」。\n- **Streams ＋ consumer group（`XREADGROUP` ＋ `XACK`）**：at-least-once、多消費者分攤、PEL 追未確認、可重認領；適合「不能掉、要重試、要多 worker 分攤」。\n- **Keyspace notifications**：Redis 把 key 變更事件透過 Pub/Sub 推出來——但底層是 Pub/Sub，因此一樣 at-most-once、會漏，不能當可靠事件源。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Pub/Sub | at-most-once、無持久化、無 replay | 即時廣播、可容忍丟失（線上狀態、即時通知扇出） | 離線/晚訂閱者永久漏訊；不可當可靠事件源 |\n| Sharded Pub/Sub（7.0+） | at-most-once，但 cluster 下可擴展 | cluster 模式高扇出廣播 | 語意不變，仍會丟；只是解擴展瓶頸 |\n| Streams ＋ XREAD | 持久化、可重讀，但無內建 ack/分攤 | 單消費者、要歷史、自管進度 | 沒 consumer group 就沒 at-least-once 的重認領機制 |\n| Streams ＋ consumer group | at-least-once、PEL 追蹤、可重認領 | 不能掉、要重試、多 worker 分攤 | 需 XACK；不 ack 的留 PEL，要監控 PEL 積壓；可能重複（要冪等） |\n\n核心取捨一句話：**Pub/Sub 用「會丟」換「零狀態、最低延遲、最簡單」；Streams（consumer group）用「要管 PEL、要 ack、可能重複」換「不丟、可重放、多消費者」**。\n\n### 何時需要\n\n- **選 Pub/Sub**：訊息是「現在這一刻的事件信號」，丟了無所謂或可從別處補（例如把快取失效信號廣播給所有節點、即時狀態更新、Socket.IO 跨節點 fan-out 的 backplane）。沒人在線聽 ＝ 那一刻沒人需要，這正是可接受的語意。\n- **選 Streams（consumer group）**：訊息代表「必須被處理至少一次的工作或事件」，消費者可能離線、崩潰、要重試，或要多個 worker 分攤同一條流。需要 at-least-once、需要重放、需要追蹤誰處理到哪——這些都是 Pub/Sub 給不了的。\n- **Over-engineering 警訊**：若訊息可丟、消費者永遠在線、又不需要歷史，硬上 Streams ＋ consumer group ＋ PEL 監控，是替「不會發生的丟失」付管理成本。反過來，把「不能掉的工作」放 Pub/Sub，是在賭消費者永不離線——這個賭遲早輸。\n\n### 常見誤解與陷阱\n\n- **以為 Pub/Sub 可靠**：它是 at-most-once。subscriber 一旦斷線重連，斷線期間的訊息**永久消失、無法補**。把訂單、扣款、不可丟的事件放 Pub/Sub 是經典誤用。\n- **以為 Streams ＝ exactly-once**：Streams consumer group 是 at-least-once。`XACK` 之前消費者崩潰、訊息被 `XCLAIM` 重認領，會被處理第二次——消費端仍要冪等（見冪等條目，本領域）。\n- **不監控 PEL**：消費者讀了卻一直不 `XACK`（卡死、bug），訊息堆在 PEL 不會自己消失、也不會被自動重投給別人，除非你主動 `XAUTOCLAIM`。PEL 積壓是 Streams 的隱形背壓，要監控。\n- **用 Streams 卻不設 maxlen**：`XADD` 預設不自動修剪，log 會無上限增長吃光記憶體。要用 `XADD ... MAXLEN ~ N`（近似修剪）或定期 `XTRIM` 控制長度。\n- **把 keyspace notifications 當可靠事件源**：它底層是 Pub/Sub，一樣會漏。要可靠捕捉資料變更應走 CDC 或 Streams（見 CDC，領域 L）。\n\n**Worked example（漏訊量直覺）**：用 Pub/Sub 廣播即時更新，平均每秒 200 則。某個 subscriber 因部署滾動更新斷線 8 秒。Pub/Sub 下，這 8 × 200 ＝ 1,600 則在斷線期間發出的訊息對它**全部永久遺失**，重連後只收得到「重連之後」的新訊息。同樣場景若用 Streams ＋ consumer group，這 1,600 則仍在 log 裡，消費者重連後從上次 ack 的 ID 之後繼續讀、一則不漏——這就是兩者語意差異的直接後果。\n\n### 延伸閱讀\n\n- [Redis Pub/Sub（官方）](https://redis.io/docs/latest/develop/interact/pubsub/)\n- [Redis Streams intro（官方）](https://redis.io/docs/latest/develop/data-types/streams/)\n- [XREADGROUP command reference（官方，consumer group 語意）](https://redis.io/docs/latest/commands/xreadgroup/)\n"}, {"id": "B1-isolation-concurrency", "file": "B1-isolation-concurrency.md", "group": "Part 2 — 資料、一致性與儲存", "title": "B · 隔離與並發控制", "md": "# B · 隔離與並發控制\n\n本領域回答的問題只有一句：**多個交易同時碰同一份資料，你想要它們彼此隔離到什麼程度，又願意為此付多少並發代價。** 本檔含七個條目——從異常分類（隔離級別）、到實作隔離的兩大引擎（MVCC、鎖）、到兩種並發控制哲學（樂觀／悲觀）、再到兩個資料庫操作面的鄰題（索引與查詢計畫、多租戶隔離），最後以一條 PostgreSQL vs MySQL 工具對照收尾。邊界：一致性的「分散式／跨副本」面（線性化、CAP、複製延遲）在領域 B 的另一檔與領域 M；本檔只談**單一資料庫節點內**的交易隔離與並發。\n\n---\n\n## 隔離級別與異常（dirty / non-repeatable / phantom / write-skew）\n\n### 定義與原理\n\n隔離（isolation）是 ACID 的 I：交易並發執行時，每個交易應該「像是」獨佔資料庫。完全的隔離＝serializable（可序列化）＝結果等同於某個串列執行順序。但完全隔離很貴，所以 SQL 標準退而求其次，用「**容許哪些異常**」來定義較弱的級別。隔離級別不是用「鎖什麼」定義的，而是用**它禁止哪些讀寫交錯現象**定義的——這是理解它的第一原理。\n\n四個經典異常，由弱到強排：\n\n- **dirty read（髒讀）**：讀到另一個**尚未 commit** 交易寫的值；對方一旦 rollback，你讀到的是從未存在的資料。\n- **non-repeatable read（不可重複讀）**：同一交易內讀同一**列**兩次，值不同（中間別人改了並 commit）。\n- **phantom read（幻讀）**：同一交易內用同一**範圍查詢**（`WHERE age > 30`）兩次，回傳的**列集合**變了（別人插入／刪除了符合條件的列）。non-repeatable 是「列被改」，phantom 是「列集合變動」。\n- **write skew（寫偏序）**：兩個交易各自讀一個重疊的資料集、各自據此寫**不同的列**，單獨看都合法，合起來破壞了一個跨列不變量。經典例子：兩個醫生各自看到「現在有兩人值班」，於是各自把自己設為休假——結果零人值班。write skew **不在** SQL 標準的四異常之列，是 snapshot isolation 留下的著名漏洞。\n\nSQL 標準的四級別正是按「禁止哪些異常」定義：\n\n| 級別 | dirty read | non-repeatable | phantom | write skew |\n|---|---|---|---|---|\n| Read Uncommitted | 可能 | 可能 | 可能 | 可能 |\n| Read Committed | 禁止 | 可能 | 可能 | 可能 |\n| Repeatable Read（標準語意） | 禁止 | 禁止 | 可能 | 可能 |\n| Serializable | 禁止 | 禁止 | 禁止 | 禁止 |\n\n注意：這是**標準**的語意。實際 DB 各有偏差——PostgreSQL 的 Repeatable Read 比標準強（連 phantom 都防），MySQL 的 Repeatable Read 在某些測試下比 snapshot isolation 還弱（見「PostgreSQL vs MySQL」）。\n\n### 解法空間\n\n要實作這些級別，引擎手上只有兩類武器，再加上兩個版本化策略：\n\n- **悲觀鎖（pessimistic locking）**：讀前／寫前先上鎖，衝突的交易等待。Read Committed 用短命的讀鎖（讀完即放）；Serializable 的純鎖實作（2PL，two-phase locking）讀鎖持有到 commit。\n- **MVCC（多版本並發控制）**：寫不覆蓋舊值，而是產生新版本；讀走「快照」看一致的舊版本，讀不擋寫、寫不擋讀（見「MVCC」）。Read Committed＝每條語句一個新快照；Repeatable Read／snapshot isolation＝整個交易一個快照。\n- **next-key locking**：在索引上對「列＋列前的間隙」上鎖，專門用來在 Repeatable Read 級別擋 phantom（MySQL InnoDB 的做法）。\n- **SSI（Serializable Snapshot Isolation）**：在 snapshot isolation 上加「讀寫依賴追蹤」，偵測到危險環就中止一個交易，用以達成真正的 serializable 又不必上讀鎖（PostgreSQL 的做法）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Read Committed | 不讀到未 commit 的值 | 絕大多數 OLTP 預設 | 同交易內兩次讀可能不同；不保護任何跨語句不變量 |\n| Snapshot Isolation（多數 DB 的 RR） | 整個交易看一致快照、防 non-repeatable／phantom | 報表、需要交易內穩定視圖 | **不防 write skew**；長交易撐快照會脹版本 |\n| 2PL Serializable（純鎖） | 真 serializable | 強一致需求、寫衝突低 | 讀也上鎖，並發低、易死結 |\n| SSI Serializable | 真 serializable、讀不上鎖 | 寫衝突中等、可接受重試 | 偵測到衝突會中止交易，**應用必須有 retry 邏輯** |\n\n### 何時需要\n\n判準是「**這條業務有沒有跨列／跨範圍的不變量，且兩個交易可能同時打它**」。\n\n- 只是讀單列、寫單列、彼此不相關：Read Committed 夠了，升級隔離只是白付並發成本。\n- 交易內要對同一份資料多次計算（先 `SELECT` 算總額、再 `UPDATE`）：至少 snapshot isolation，否則中途值會變。\n- 有「總和不得超過上限」「至少留一人值班」這種**跨列不變量**：snapshot isolation 不夠（會 write skew），要 Serializable，或在應用層用顯式鎖（`SELECT ... FOR UPDATE` 把相關列鎖住）把它降級成單純的寫衝突。\n\nworked example：一張帳戶表，規則「兩個共用帳戶的總餘額 ≥ 0」。A 餘額 100、B 餘額 100。交易 T1 讀到「A+B=200」、決定從 A 領 150（剩 A=-50，但 A+B=50≥0，合法）；T2 同時讀到「A+B=200」、從 B 領 150（B=-50，A+B=50，也合法）。在 snapshot isolation 下兩者各自的快照都看到 200、都通過檢查、都 commit——最終 A=-50、B=-50、總和 -100，不變量被打破。這是 write skew 的標準現場：**沒有任何一列被兩個交易同時寫，所以版本檢查抓不到**。Serializable（SSI）會偵測到兩交易讀寫集的危險交叉、中止其中一個。\n\n### 常見誤解與陷阱\n\n- **「Repeatable Read 就是 SQL 標準那個」**——錯。標準的 RR 容許 phantom，但 PostgreSQL 的 RR 連 phantom 都不會出現（因為它其實是 snapshot isolation）。級別名稱是個壞契約：同名在不同 DB 行為不同。\n- **「升到最高隔離就一勞永逸」**——Serializable 不是免費的隔離開關，它把問題從「資料錯」換成「交易被中止、要 retry」。沒寫 retry 迴圈，使用者就看到隨機報錯。\n- **「write skew 很罕見」**——任何「先查一個聚合條件、再據此寫入」的邏輯都有風險：庫存扣減、預約衝突、唯一性檢查（先 `SELECT` 查不存在、再 `INSERT`）全是。\n- **把隔離級別當效能旋鈕亂調**——調低級別省並發成本，但你買進來的是上面那些異常；該標清楚「降到 Read Committed，代價是放棄交易內可重複讀」。\n\n### 延伸閱讀\n\n- PostgreSQL 官方文件，Transaction Isolation：https://www.postgresql.org/docs/current/transaction-iso.html\n- Berenson 等人，\"A Critique of ANSI SQL Isolation Levels\"（1995，指出標準異常定義的歧義）：https://www.microsoft.com/en-us/research/publication/a-critique-of-ansi-sql-isolation-levels/\n- Jepsen，PostgreSQL 12.3 分析（隔離異常的實測）：https://jepsen.io/analyses/postgresql-12.3\n\n---\n\n## MVCC\n\n### 定義與原理\n\nMVCC（Multi-Version Concurrency Control，多版本並發控制）的核心想法一句話：**寫不就地覆蓋，而是寫一個新版本；讀去找「對我可見」的那個版本。** 這樣讀者和寫者不必互相等待——讀走快照看舊版本，寫產生新版本，兩條路徑解耦。它是現代 OLTP 資料庫（PostgreSQL、MySQL InnoDB、Oracle、SQL Server 的 RCSI）實作隔離的主力引擎。\n\n每個版本帶兩個關鍵元資料：**創建它的交易 ID（xmin）** 與**刪除／取代它的交易 ID（xmax）**。讀的時候，引擎拿你的快照（一組「哪些交易在我開始時已 commit」的資訊）去判斷每個版本可見不可見：版本的 xmin 必須是「我看得到的已 commit 交易」，且 xmax 必須是「我看不到的或未發生的」。可見性判斷把「隔離級別」具體化為「快照取得的時機」：Read Committed＝每條語句重取快照、Repeatable Read＝交易開始取一次。\n\n### 解法空間\n\nMVCC 不是單一做法，舊版本放哪、怎麼清，有兩條主要路線：\n\n- **就地存新版本＋表內留舊版本（append-in-heap）**：PostgreSQL。`UPDATE` 寫一條新 tuple，舊 tuple 標記過期但留在 heap 裡，靠背景的 **VACUUM** 回收。優點是 commit／rollback 便宜（不用搬資料），缺點是膨脹（bloat）與 VACUUM 壓力。\n- **undo log 還原舊版本（rollback segment）**：MySQL InnoDB、Oracle。最新版本就地寫在資料頁，舊版本靠 **undo log** 反推回去。讀舊版本要沿 undo 鏈回溯，優點是主表不膨脹，缺點是長交易讓 undo 鏈變長、purge 跟不上時讀很慢（\"history list length\" 暴增）。\n- **可見性判斷**：靠快照／交易 ID 比對（上面說的 xmin/xmax 或 read view）。\n- **舊版本回收**：背景程序（VACUUM／purge），不是即時的——這是 MVCC 所有麻煩的根源。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| heap 內多版本 + VACUUM（PostgreSQL） | 讀不擋寫、commit/rollback 便宜 | 寫密集、rollback 常見 | 表膨脹；長交易卡住 VACUUM → bloat 與 XID wraparound 風險 |\n| undo log + purge（InnoDB/Oracle） | 主表緊湊、最新版本就地讀快 | 讀最新版本為主 | 讀舊版本要沿 undo 回溯變慢；長交易撐住 undo → history list 暴增 |\n| 純鎖（無 MVCC，2PL） | 不需版本與回收 | 教科書／極簡引擎 | 讀寫互擋，並發差——現代 OLTP 幾乎不用 |\n\n### 何時需要\n\nMVCC 不是你「選用」的，而是你用的資料庫已經替你選了。你真正要做的判斷是**怎麼配合它別把它搞爆**：\n\n- 讀寫並發高、且讀多：MVCC 是天賜——讀者完全不擋寫者。\n- 有長時間執行的交易（大報表、ETL、忘了 commit 的連線）：這是 MVCC 的頭號殺手。一個跑了一小時的交易，會讓引擎**不敢回收**這一小時內所有被更新列的舊版本（因為這個老交易可能還要看），全庫膨脹。\n\nworked example：一張 100 萬列、每列 200 bytes 的表（約 200 MB）。某連線開了交易忘了 commit，一直掛著。期間應用對全表做了一輪 `UPDATE`（每列改一次）。在 PostgreSQL 下，舊版本因為那個老交易還在而無法被 VACUUM 回收——表從 200 MB 膨脹到約 400 MB，且這個膨脹直到老交易結束才會被回收。在 InnoDB 下對應的是 undo history list length 持續上升，purge 執行緒追不上。教訓很實際：**最便宜的 MVCC 調校是「別讓交易開著不關」**。\n\n### 常見誤解與陷阱\n\n- **「MVCC＝沒有鎖」**——只對「讀」成立。寫同一列仍然要排隊：第二個 `UPDATE` 會等第一個 commit／rollback（行鎖，見「鎖與死結」）。MVCC 消除的是**讀寫互擋**，不是寫寫互擋。\n- **「`SELECT` 不影響任何東西」**——一個只讀的長交易，照樣會撐住快照、阻止舊版本回收。唯讀不等於無害。\n- **把 bloat 當「需要更大硬碟」**——通常是長交易或 VACUUM 跟不上，加硬碟只是延後爆炸。要查 `pg_stat_activity` 最老的交易、InnoDB 的 history list length。\n- **以為 rollback 很貴**——在 append 式 MVCC（PostgreSQL）裡 rollback 反而便宜（不用撤銷，直接把這些版本標廢）；貴的是 undo 式引擎的大交易 rollback（要逐筆反推）。引擎不同，直覺要反過來。\n\n### 延伸閱讀\n\n- PostgreSQL 官方文件，Concurrency Control / MVCC：https://www.postgresql.org/docs/current/mvcc.html\n- PostgreSQL 官方文件，Routine Vacuuming（含 XID wraparound）：https://www.postgresql.org/docs/current/routine-vacuuming.html\n- MySQL 官方文件，InnoDB Multi-Versioning：https://dev.mysql.com/doc/refman/8.4/en/innodb-multi-versioning.html\n\n---\n\n## 鎖與死結（行鎖/gap/next-key、wait-for graph）\n\n### 定義與原理\n\n當 MVCC 不夠（寫寫衝突、要擋 phantom、要顯式序列化），引擎落回**鎖**。鎖是並發控制最直接的武器：在資源上掛一個標記，要動它的交易得先拿到相容的鎖，拿不到就等。鎖的麻煩不在「擋住」本身，而在**互相等成環**——A 等 B 手上的鎖、B 又等 A 手上的鎖，誰也不放，這就是死結（deadlock）。\n\n引擎用 **wait-for graph（等待圖）** 形式化死結：節點是交易，「T1 等 T2」就畫一條 T1→T2 的邊。**圖裡出現環＝死結。** 偵測器週期性找環，找到就選一個「受害者」中止（通常選回滾代價小的），讓其餘的繼續。\n\n```\n  wait-for graph（死結＝有環）\n\n      lock A           lock B\n   ┌─────────┐      ┌─────────┐\n   │   T1    │ ───▶ │   T2    │   T1 想要 B（T2 持有）\n   │ holds A │      │ holds B │\n   └─────────┘ ◀─── └─────────┘   T2 想要 A（T1 持有）\n        環 T1 → T2 → T1：偵測器中止其一\n```\n\n鎖的**粒度**從粗到細：表鎖 → 頁鎖 → 行鎖（row lock）。OLTP 主要靠行鎖。InnoDB 還有兩種特別的鎖用來擋 phantom：\n\n- **record lock（記錄鎖）**：鎖住一筆索引記錄本身。\n- **gap lock（間隙鎖）**：鎖住兩筆索引記錄**之間的空隙**，purely inhibitive——它不擋讀、只擋「往這個間隙插入新列」，這正是擋 phantom 的手段。\n- **next-key lock**：record lock ＋ 它前面那段 gap lock 的組合。InnoDB 在 Repeatable Read 下對範圍掃描預設用 next-key lock，於是「範圍內的列＋範圍內的所有間隙」都被鎖住，別人插不進來 → 沒有 phantom。\n\n### 解法空間\n\n對付死結，有四條路，本質是「預防 vs 偵測」之分：\n\n- **偵測後中止（detection）**：放任死結發生，靠 wait-for graph 找環、犧牲一個交易（PostgreSQL、InnoDB 的預設）。\n- **逾時放棄（timeout）**：不畫圖，等鎖超過 `innodb_lock_wait_timeout`／`lock_timeout` 就放棄。簡單但會誤殺（慢交易被當死結）也會漏判（真死結等滿逾時才解）。\n- **固定加鎖順序（ordering）**：應用層約定「永遠先鎖 id 小的列」，從根本消除環。最有效的預防，但要全應用配合。\n- **降低鎖需求**：縮短交易、用樂觀並發控制（見下一條）、把多列操作拆小，從源頭減少持鎖時間與範圍。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| wait-for graph 偵測 | 保證死結被解、選代價小的犧牲 | DB 引擎內建（PG/InnoDB） | 偵測有延遲（PG 預設等 `deadlock_timeout`=1s 才查）；應用仍須能 retry 受害者 |\n| 鎖逾時 | 實作簡單、無圖計算 | 簡單系統、分散式鎖 | 誤殺慢交易＋真死結反應慢，逾時值難調 |\n| 固定加鎖順序 | 根除死結（無環可成） | 多資源批次更新 | 要全應用紀律；動態決定鎖哪些列時難套用 |\n| 縮短交易/樂觀控制 | 減少持鎖時間與衝突面 | 衝突率低的高並發 | 衝突率高時樂觀控制的重試成本反而更高（見「樂觀 vs 悲觀」） |\n\n### 何時需要\n\n- 寫同一列的併發本來就由行鎖串起來、不用你管——你要管的是**別讓持鎖交易拖太久**（中間穿插網路呼叫、等使用者輸入都是大忌）。\n- 多筆列要在一個交易裡一起更新（轉帳：扣 A 加 B）：這是死結高發區，套**固定加鎖順序**（永遠按主鍵排序加鎖）。\n- 範圍更新／範圍刪除在 Repeatable Read 下會吃 gap/next-key lock，鎖的範圍比你以為的大很多——這是 InnoDB 的隱藏死結來源（見陷阱）。\n\nworked example：轉帳服務，兩筆交易同時做相反方向轉帳。T1：`UPDATE acct SET bal=bal-100 WHERE id=1`（鎖住列 1），再 `... WHERE id=2`。T2：先 `... WHERE id=2`（鎖住列 2），再 `... WHERE id=1`。現在 T1 持列 1 等列 2、T2 持列 2 等列 1——wait-for graph 成環，引擎中止其一。修法：兩個交易都**先鎖 id 較小者**（`ORDER BY id` 或顯式 `SELECT ... FOR UPDATE` 按序），環就無法形成。一行排序約定換掉一整類死結。\n\n### 常見誤解與陷阱\n\n- **「死結是 bug，正確的程式不該有」**——死結是高並發下的正常現象，不是邏輯錯誤。正解是**讓受害交易能安全 retry**（這要求操作冪等或交易性，見「冪等」，領域 A），不是假裝它不會發生。\n- **「我只更新一列，不會死結」**——會。如果該 `UPDATE` 走了次級索引，InnoDB 可能在主鍵與索引上各加鎖、與另一交易反序相遇成環。也別忘了**外鍵檢查會默默對父表加鎖**。\n- **gap lock 的範圍被低估**——`DELETE FROM t WHERE status='pending'` 在 RR 下可能鎖住一大段索引間隙，擋住別人對該範圍的插入，把不相干的併發插入串成死結。`WHERE` 條件命不中索引時更糟（退化成更粗的鎖）。\n- **把 `deadlock_timeout` 當死結逾時**——PostgreSQL 的 `deadlock_timeout`（預設 1s）是「等多久才**開始查**有沒有死結」，不是「等多久放棄鎖」。它調的是偵測延遲，不是放棄門檻（2026-06）。\n\n### 延伸閱讀\n\n- MySQL 官方文件，InnoDB Locking（record/gap/next-key）：https://dev.mysql.com/doc/refman/8.4/en/innodb-locking.html\n- MySQL 官方文件，Deadlocks in InnoDB：https://dev.mysql.com/doc/refman/8.4/en/innodb-deadlocks.html\n- PostgreSQL 官方文件，Explicit Locking：https://www.postgresql.org/docs/current/explicit-locking.html\n\n---\n\n## 樂觀 vs 悲觀並發控制（CAS、version/ETag、conditional request）\n\n### 定義與原理\n\n並發控制有兩種哲學，差別在「**衝突發生前先防，還是發生後再驗**」。\n\n- **悲觀（pessimistic）**：假設衝突常發生。動資料前先上鎖（`SELECT ... FOR UPDATE`），別人得等。衝突在「進場前」就被擋住，代價是持鎖期間的等待與死結風險。\n- **樂觀（optimistic, OCC）**：假設衝突罕見。讀的時候不上鎖，只記住「我讀到的版本」；寫的時候用一個**原子的條件更新**——「只有當版本還是我讀到的那個時才寫」。版本變了表示有人插隊，這次寫就失敗，由呼叫端決定重試還是放棄。\n\n樂觀控制的技術核心是一個**比較並交換**的原子操作：\n\n- **CAS（compare-and-swap）**：硬體／引擎層的「值還等於 expected 才換成 new」原子指令，是所有樂觀控制的底座。\n- **version 欄位 / row version**：表上加一個 `version`（或 `updated_at`、`xmin`）欄，更新時 `UPDATE ... SET v=v+1 WHERE id=? AND v=?`；affected rows = 0 即衝突。\n- **ETag + conditional request**：把上述模式搬到 HTTP。伺服器回應帶 `ETag`（資源版本指紋），客戶端寫回時帶 `If-Match: <etag>`；版本不符伺服器回 **412 Precondition Failed**，這是 RFC 9110 定義的標準樂觀並發控制（2026-06）。\n\n樂觀控制與**冪等**是兩件事，常被混淆：冪等保證「同一操作重放不重複生效」（見「冪等」，領域 A）；樂觀控制保證「過期的寫不會覆蓋新值（lost update）」。重試一個失敗的樂觀寫時，你會用到冪等來確保重試本身安全，但樂觀控制本身解的是 lost update，不是去重。\n\n### 解法空間\n\n- **悲觀行鎖**：`SELECT ... FOR UPDATE` / `FOR SHARE`，引擎層串行化。\n- **version 欄位 OCC**：應用層維護版本欄，條件更新。\n- **DB 原生時間戳 / 系統欄位**：用 `xmin`（PG）或 `ROWVERSION`（SQL Server）當版本，免自己維護欄位。\n- **HTTP 條件請求**：`If-Match` / `If-Unmodified-Since` + ETag，把並發控制推到 API 邊界。\n- **CAS 在分散式 KV**：Redis `WATCH`/`MULTI`（或 Lua）、DynamoDB conditional write、etcd compare-and-swap——同一套樂觀模式的分散式版本。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 悲觀 `SELECT ... FOR UPDATE` | 進場即互斥、無 lost update | 高衝突、重試成本高（複雜長交易） | 持鎖期間阻塞、死結風險、不能跨請求持鎖 |\n| version 欄位 OCC | 無 lost update、讀期間零鎖 | 低衝突、讀多寫少 | 高衝突時重試風暴；要處理 affected rows=0 的分支 |\n| ETag + `If-Match`（HTTP） | 跨無狀態請求防 lost update | REST API、跨網路的編輯 | 客戶端必須回傳並尊重 ETag；弱比較 vs 強比較語意要對齊 |\n| 分散式 CAS（Redis/DynamoDB） | 單鍵原子條件寫 | 跨節點計數、狀態機轉移 | 只保單鍵原子；跨多鍵要交易或別的協調 |\n\n### 何時需要\n\n決策只看一個數字：**衝突率（同一筆資料被併發寫的機率）**。\n\n- **低衝突**（多數使用者編輯自己的資料、很少撞上同一列）：樂觀。讀期間零鎖、零等待，偶爾撞上就重試一次，整體吞吐最高。\n- **高衝突**（熱點列：秒殺庫存、全域計數器、被多人搶改的同一份文件）：樂觀會陷入重試風暴（讀-改-寫-失敗-重來，反覆消耗），此時悲觀鎖反而便宜——排隊雖慢但不空轉。\n- **跨請求 / 無狀態邊界**（你不可能在 HTTP 請求 A 持鎖等請求 B）：只能樂觀，用 ETag。\n\nworked example：一個庫存欄位 `stock=10`，預期一天賣幾筆、衝突低。用 version OCC：客戶讀到 `stock=10, version=7`，下單時送 `UPDATE items SET stock=stock-1, version=8 WHERE id=? AND version=7`。若這期間沒人改，affected rows=1，成功。若另一筆併發訂單先把 version 推到 8，本次 `WHERE version=7` 命中 0 列，affected rows=0 → 應用收到「版本過期」、重讀、重試。對照同一場景如果是秒殺（5000 人搶 10 件）：樂觀控制下 4990 次都會撞 version 失敗、瘋狂重試，CPU 燒在空轉上——這時改悲觀 `FOR UPDATE` 排隊，或乾脆用 Redis 原子 `DECR` 把搶量擋在 DB 之外，才是對的。同一個欄位，衝突率不同，答案相反。\n\n### 常見誤解與陷阱\n\n- **「樂觀控制比較快」**——只在低衝突時。它把「等待」換成「重試」，高衝突下重試成本可以遠超過鎖等待。沒有絕對更快，只有「對的衝突率配對的策略」。\n- **忘了檢查 affected rows**——version OCC 的全部安全性都在「`UPDATE` 影響 0 列＝衝突」這個分支上。很多 bug 是 `UPDATE` 默默改了 0 列、程式卻當成功繼續，lost update 照樣發生。\n- **ETag 客戶端不回傳**——伺服器發了 ETag，客戶端寫回時不帶 `If-Match`，等於沒做樂觀控制。要嘛伺服器對缺 `If-Match` 的寫一律拒絕（要求 `If-Match: *` 或具體值），要嘛明確接受「無條件覆蓋」的語意——別含糊。\n- **拿樂觀控制當去重**——它防的是 lost update，不是重複處理。同一筆冪等鍵被重送兩次的去重，是另一回事（見「冪等」，領域 A）。\n- **跨多列的不變量靠單欄 CAS 守不住**——version 欄只保護「這一列」的原子更新；跨列的不變量（write skew 那類）要靠交易隔離或顯式鎖，CAS 救不了。\n\n### 延伸閱讀\n\n- RFC 9110，HTTP Semantics（§13 Conditional Requests、ETag/If-Match/412）：https://www.rfc-editor.org/rfc/rfc9110.html\n- MDN，If-Match header：https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/If-Match\n- AWS 文件，DynamoDB Condition Expressions（conditional write）：https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/Expressions.ConditionExpressions.html\n\n---\n\n## 索引與查詢計畫（B-tree、覆蓋/複合索引、查詢計畫）\n\n### 定義與原理\n\n索引是一份**額外維護的、排好序的資料結構**，讓引擎不必掃全表就能定位列。它換的是空間與寫入成本（每筆寫要同步更新索引），買的是讀的速度。它和並發放在同一領域，是因為**索引決定鎖的範圍**：InnoDB 的 gap/next-key lock 鎖在索引上，查詢命不命中索引，直接決定它鎖多大一片、會不會和別人死結（見「鎖與死結」）。\n\n主力結構是 **B-tree**（嚴格說多是 B+tree）：一棵平衡的、排序的多叉樹，葉節點存索引鍵與指向列的指標。它的關鍵性質是樹高極矮——分支因子大，幾百萬列也只需 3–4 層，所以一次查詢只讀少數幾個頁。B-tree 同時支援等值查找、範圍查找、前綴查找、與有序輸出（`ORDER BY` 可免排序），這是它當預設索引的原因。\n\n**查詢計畫（query plan）** 是引擎的查詢優化器產出的執行方案：要不要用索引、用哪個、是 index scan 還是 seq scan、怎麼 join。它基於**統計資訊**（表有多少列、欄位值的分佈）估算各方案成本、選最便宜的。`EXPLAIN` 看計畫，`EXPLAIN ANALYZE` 實際跑一遍給真實時間與列數。\n\n### 解法空間\n\n不是「加索引」一個動作，而是一組選擇：\n\n- **單欄 B-tree**：最基本，對單一過濾欄。\n- **複合索引（composite / multi-column）**：對 `(a, b, c)` 排序，遵守**最左前綴規則**——能服務 `WHERE a`、`WHERE a AND b`、`WHERE a AND b AND c`，但**不能**只靠 `WHERE b` 或 `WHERE c`。欄位順序就是設計（等值欄放前、範圍欄放後）。\n- **覆蓋索引（covering index）**：查詢需要的欄全在索引裡，引擎直接從索引取值、**不回表**（index-only scan）。PostgreSQL 用 `INCLUDE` 把非鍵欄掛進索引而不影響排序。\n- **部分索引（partial index）**：只索引符合條件的列（`WHERE status='active'`），省空間、提命中。\n- **其他結構**：hash（純等值）、GIN/GiST（全文、陣列、地理，機制見領域 O 的 inverted index）、BRIN（巨大且物理有序的表）。\n- **skip scan**：PostgreSQL 18 起，複合索引在只約束後段欄位（前段欄位基數低）時也能用上索引，部分鬆綁最左前綴的限制（2026-06）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單欄 B-tree | 等值/範圍/排序皆快 | 通用過濾與排序 | 每個寫操作要維護它；高基數欄才划算 |\n| 複合索引 `(a,b,c)` | 服務含最左前綴的查詢、可一索引頂多查詢 | 多條件常一起出現 | 受最左前綴限制；欄序錯了等於沒用對 |\n| 覆蓋索引（INCLUDE） | 免回表，I/O 大降 | 熱查詢的固定欄位集 | 索引變大、寫更貴；查詢欄一變就失效 |\n| 部分索引 | 體積小、命中高 | 查詢恆帶固定條件（如只查 active） | 條件外的查詢用不到它 |\n\n### 何時需要\n\n- 查詢用某欄過濾且該欄**選擇性高**（不同值多、每個值對應的列少）：值得加 B-tree。低選擇性欄（如布林 `is_deleted`，半數列都符合）加了優化器也常不用，因為走索引再回表比掃全表還貴。\n- 一組欄位**總是一起**出現在 `WHERE`：用複合索引，按「等值欄在前、範圍欄在後、最常用的在最左」排。\n- 某條熱查詢只取少數幾欄、跑超頻繁：上覆蓋索引換掉回表 I/O。\n- 別的方向：**寫密集、讀少**的表，索引是負擔不是資產——每筆 `INSERT` 都要改全部索引。\n\nworked example：一張 1000 萬列的訂單表，查 `WHERE user_id=? AND status='paid' ORDER BY created_at DESC LIMIT 20`。無索引：seq scan 掃 1000 萬列、排序、取 20，每次查讀數十萬個頁。建複合索引 `(user_id, status, created_at DESC)`：優化器用 user_id+status 定位、created_at 已排好序，直接從索引頭取 20 列就停——讀的頁數從數十萬降到 B-tree 樹高（約 4 頁）＋20 列所在的少數葉頁，三到四個數量級的差距。若再把 `LIMIT 20` 要顯示的欄（如 `amount`）用 `INCLUDE` 掛進去做成覆蓋索引，連回表那 20 次隨機 I/O 都省掉。用 `EXPLAIN ANALYZE` 應看到 `Index Scan`／`Index Only Scan` 取代 `Seq Scan`，且 `Rows Removed by Filter` 接近 0。\n\n### 常見誤解與陷阱\n\n- **「欄上有索引，查詢就會用」**——不一定。函數包住欄（`WHERE lower(email)=?` 對 `email` 索引）、隱式型別轉換（字串欄用數字比）、`LIKE '%x'` 前綴萬用、低選擇性條件，都會讓優化器放棄索引。看 `EXPLAIN` 才算數，別憑「我建了」就以為命中。\n- **複合索引欄序搞反**——`(status, user_id)` 服務不了「只給 user_id」的查詢，因為 user_id 不是最左前綴。索引設計的一半是**欄序設計**。\n- **索引越多越好**——每個索引都加重寫成本、吃空間、誤導優化器。沒被任何查詢用到的索引是純負債，要定期用 `pg_stat_user_indexes` 之類找出零命中的砍掉。\n- **覆蓋索引的「免回表」有前提**——PostgreSQL 的 index-only scan 還要 visibility map 是新的（VACUUM 跟得上），否則仍得回 heap 查可見性，「免回表」打折。MVCC 的回收節奏（見「MVCC」）會回頭影響索引效益。\n- **把查詢計畫當穩定的**——它依賴統計資訊。資料分佈大變而沒重算統計（`ANALYZE`），優化器會用過時估計選錯計畫；同一條 SQL 昨天走索引今天走全掃，常是統計過期或參數嗅探（parameter sniffing）作怪。\n\n### 延伸閱讀\n\n- PostgreSQL 官方文件，B-Tree Indexes：https://www.postgresql.org/docs/current/btree.html\n- PostgreSQL 官方文件，Using EXPLAIN：https://www.postgresql.org/docs/current/using-explain.html\n- Use The Index, Luke!（B-tree 索引與查詢調校的權威入門）：https://use-the-index-luke.com/\n\n---\n\n## 多租戶隔離（row / schema / db-per-tenant）\n\n### 定義與原理\n\n多租戶（multi-tenancy）＝同一套系統服務多個彼此獨立的客戶（tenant），共用程式碼與基礎設施。核心問題：**租戶 A 的資料絕不能被租戶 B 看到或改到，而你又想盡量共用資源省成本。** 這條問句的脊椎是「**隔離強度 vs 資源效率**」——越強的隔離越貴、越好遷移／合規，越共享越省、但爆炸半徑越大。\n\n三種主要模型（業界也叫 pool / bridge / silo）：\n\n- **row-level（共池 pool）**：所有租戶資料同表，靠一個 `tenant_id` 欄區分，每個查詢都要帶 `WHERE tenant_id=?`。最省，隔離最弱——少一個 `WHERE` 就漏資料。\n- **schema-per-tenant（橋接 bridge）**：同一個資料庫實例，每個租戶一個 schema（一組同名表）。邏輯隔離、可做租戶級客製。\n- **db-per-tenant（穀倉 silo）**：每個租戶一個獨立資料庫（甚至獨立實例）。隔離最強、最好遷移與合規，最貴最難管。\n\n### 解法空間\n\n- **row-level + 應用層過濾**：每條 query 注入 `tenant_id`。最脆，全靠紀律。\n- **row-level + 資料庫強制（RLS）**：PostgreSQL Row-Level Security——在 DB 層綁 policy（`USING (tenant_id = current_setting('app.tenant'))`），即使應用忘了帶條件，引擎也擋住。把「別漏 WHERE」從人腦移到引擎。\n- **schema-per-tenant**：連線時 `SET search_path`（PG）或 `USE db`（MySQL）切到租戶 schema。migration 要對每個 schema 各跑一次。\n- **db-per-tenant**：路由層（連線字串／服務發現）把請求導到對的庫。\n- **混合（hybrid）**：小租戶共池、大客戶獨庫——常見的成熟做法，按租戶大小分層。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| row-level（共 `tenant_id`） | 資源利用率最高、onboarding 最快 | 海量小租戶、SaaS 早期 | 隔離最弱；漏一個 `WHERE` 即跨租戶洩漏；noisy neighbor；難按租戶刪資料/合規 |\n| row-level + RLS | 引擎層強制過濾、補上「漏 WHERE」 | 同上但要更硬的隔離 | policy 設計與 `current_setting` 注入要對；繞過 RLS 的角色（owner/superuser）是後門 |\n| schema-per-tenant | 邏輯隔離、可租戶客製、好按租戶備份 | 中量級租戶、需差異化 | migration ×N 個 schema；上千 schema 撐爆系統目錄、效能掉 |\n| db-per-tenant | 隔離最強、爆炸半徑＝單租戶、易遷移/合規/獨立調校 | 大客戶、強監管、資料落地要求 | 成本最高、連線數膨脹、營運與監控 ×N 個庫 |\n\n### 何時需要\n\n按「租戶數量 × 隔離要求 × 客戶大小」三軸選：\n\n- 租戶**多而小**、隔離要求一般（典型 B2C-ish SaaS）：row-level，最好加 RLS 兜底。\n- 租戶**中量**、需要租戶級客製或獨立備份：schema-per-tenant。\n- 客戶**少而大**、強合規（金融／醫療）、資料主權／落地要求、要能獨立調效能：db-per-tenant。\n- 多半最後是**混合**：絕大多數小租戶共池，少數付費大客戶獨庫——別讓一個模型硬撐所有規模。\n\nworked example：一個 SaaS 有 5000 個小租戶＋20 個大企業客戶。全用 db-per-tenant＝5020 個資料庫，連線池、migration、監控全部 ×5020，營運成本爆炸且小租戶閒置浪費。全用 row-level＝大客戶的查詢和小租戶擠同一批表，一個大客戶的全表掃描拖慢所有人（noisy neighbor），且大客戶常要求「我的資料要能單獨匯出／刪除／落在指定區域」，共池下做這些要在十億列裡按 `tenant_id` 篩，痛苦。務實解：5000 小租戶共池（row-level + RLS），20 大客戶各自 db-per-tenant。一次 migration 要跑 1 次（共池）＋20 次（獨庫），而不是 5020 次。同一個產品，按租戶大小分層放，才同時拿到效率與隔離。\n\n### 常見誤解與陷阱\n\n- **「加了 `tenant_id` 欄就安全」**——row-level 的全部安全性掛在「每條 query 都正確帶 `WHERE tenant_id=?`」上。一個 ORM 的 lazy load、一條手寫報表 SQL、一個忘了過濾的 join，就跨租戶洩漏。要嘛上 RLS 讓引擎兜底，要嘛在 data access 層強制注入、禁止裸 query。\n- **schema-per-tenant 在「幾千租戶」時撞牆**——每個 schema 的表都進系統目錄（catalog），上千租戶＝幾萬張表，`pg_class` 膨脹、規劃器變慢、`pg_dump` 變慢、連線啟動變慢。它適合「幾十到幾百個租戶」，不適合「無上限增長」。\n- **db-per-tenant 的連線數陷阱**——每個庫各自要連線池，1000 個庫 × 每庫 10 連線＝1 萬連線，遠超單一 PG 實例的 `max_connections`（預設百級）。要靠 pooler（PgBouncer）和多實例分散，不是「再開一個庫」這麼便宜。\n- **把多租戶當「之後再說」的事**——`tenant_id` 沒從第一天進每張表、每個索引（複合索引要 `tenant_id` 當最左欄，否則查詢掃全租戶），事後補是大手術。多租戶模型是**地基決策**，難可逆（見領域 U 的可逆 vs 不可逆決策）。\n\n### 延伸閱讀\n\n- AWS 文件，SaaS Tenant Isolation Strategies（pool/silo/bridge 與隔離模型）：https://docs.aws.amazon.com/whitepapers/latest/saas-tenant-isolation-strategies/saas-tenant-isolation-strategies.html\n- PostgreSQL 官方文件，Row Security Policies（RLS）：https://www.postgresql.org/docs/current/ddl-rowsecurity.html\n- AWS Database Blog，Multi-tenant data isolation with PostgreSQL Row Level Security：https://aws.amazon.com/blogs/database/multi-tenant-data-isolation-with-postgresql-row-level-security/\n\n---\n\n## PostgreSQL vs MySQL（隔離預設、SSI vs next-key 的本質差）\n\n### 是什麼與內部機制\n\nPostgreSQL 與 MySQL（InnoDB 引擎）是兩大開源關聯式資料庫。兩者都用 MVCC 做並發，但**實作隔離的內部機制走了相反的路線**，這在「Repeatable Read 到底保證什麼」「怎麼擋 phantom」「怎麼達成真 serializable」三件事上分得最開（截至 2026-06，PostgreSQL 18、MySQL 8.4 LTS 為當前主線）。\n\n- **PostgreSQL**：純 MVCC 路線。舊版本存在 heap、靠 VACUUM 回收。隔離預設 **Read Committed**。它的 **Repeatable Read 實際上是 snapshot isolation**——交易看一致快照，連 phantom 都不會出現（比 SQL 標準的 RR 強），但**不防 write skew**。要防 write skew 得升到 **Serializable**，PostgreSQL 用 **SSI（Serializable Snapshot Isolation）**：不靠讀鎖，而是用 predicate locking 追蹤交易間的讀寫依賴，偵測到「危險結構」（會導致不可序列化的讀寫環）時，中止其中一個交易並回報 `could not serialize access`，由應用 retry。\n\n- **MySQL / InnoDB**：MVCC ＋ 鎖的混合路線。隔離預設 **Repeatable Read**。它的 RR 靠 **next-key lock**（record lock ＋ gap lock）在範圍掃描時鎖住「列＋列前間隙」來擋 phantom——是**用鎖**擋幻讀，而非純快照。它的 Serializable 基本上是把普通 `SELECT` 隱式升級成 `SELECT ... FOR SHARE`（8.0 前的舊寫法是 `LOCK IN SHARE MODE`；2PL 風格的共享讀鎖，且僅在 autocommit 關閉時發生——autocommit 開啟的單句 SELECT 仍走非鎖一致讀），不是 SSI。\n\n本質差一句話：**PostgreSQL 用「偵測衝突後中止重試」達成可序列化（樂觀風格的 SSI）；MySQL 用「加範圍鎖預先擋住」防幻讀（悲觀風格的 next-key）。** 一個賭衝突少、發生才處理；一個先上鎖、寧可擋住。\n\n### 在哪些系統扮演什麼角色\n\n- **PostgreSQL**：複雜查詢、需要強一致與真 serializable、重 JSONB／地理／全文／擴充（PostGIS、pgvector）的場景常選它。SSI 讓「需要 serializable 但不想自己上一堆顯式鎖」變可行，代價是要寫 retry。\n- **MySQL/InnoDB**：簡單高並發 OLTP、讀多寫少、生態（複製、託管服務、運維工具）成熟度與既有部署量大的場景。預設 RR ＋ next-key 對「讀範圍要穩定」的交易直覺友善（不用自己想快照），但 gap lock 帶來的隱性鎖範圍是死結來源。\n\n### 保證與限制\n\n| 維度 | PostgreSQL（18） | MySQL / InnoDB（8.4） |\n|---|---|---|\n| 預設隔離級別 | Read Committed | Repeatable Read |\n| RR 的真實語意 | snapshot isolation（連 phantom 都防、**不防 write skew**） | 比 snapshot isolation 弱：Jepsen 測出 RR 仍有 G-single（read skew）、lost update、write skew |\n| 擋 phantom 的手段 | 快照（RR 即不出現幻讀） | next-key lock（鎖列＋間隙） |\n| 真 serializable 的實作 | SSI（依賴追蹤＋中止重試） | 2PL 風格讀鎖（普通讀升級為共享鎖） |\n| 死結偵測 | wait-for graph，`deadlock_timeout` 預設 1s 後才查 | wait-for graph，`innodb_lock_wait_timeout` 預設 50s（逾時放棄） |\n| 多版本回收 | heap + VACUUM（bloat 風險） | undo log + purge（history list 風險） |\n\n關鍵限制／提醒（2026-06）：\n\n- PostgreSQL 的 SSI **要求應用能 retry**——交易隨時可能因 `could not serialize` 被中止；沒寫 retry，serializable 等於把錯誤丟給使用者。\n- MySQL InnoDB 的 RR **不等於 snapshot isolation**：Jepsen 對 MySQL 8.0.34 的測試發現它的 RR 連 snapshot isolation 都不滿足（出現 G-single、lost update、write skew）。把 InnoDB RR 當「安全的可重複讀」會踩坑；需要時用顯式 `SELECT ... FOR UPDATE` 補。MariaDB 為此在 11.8 起加了預設開啟的 `innodb_snapshot_isolation`，但 Jepsen 指出該修補在併發負載下仍可重現異常。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| PostgreSQL（SSI serializable） | 真 serializable、讀不上鎖、防 write skew | 跨列不變量強、寫衝突中等、能寫 retry | 中止重試成本；長交易脹 bloat；高衝突下中止率高 |\n| MySQL InnoDB（RR + next-key） | 範圍讀穩定、擋 phantom、無中止 | 高並發 OLTP、讀多、生態成熟度優先 | RR 弱於 SI、要防 write skew 須顯式鎖；gap lock 隱性死結 |\n| 升 Serializable 解一切 | 最強隔離 | 一致性壓倒吞吐 | PG 是 SSI 重試成本、MySQL 是讀鎖並發崩——都不是免費 |\n\n選型上：跨列不變量多、要 DB 幫你扛序列化正確性、團隊能處理 retry → PostgreSQL Serializable。以高並發單列 OLTP 為主、生態與運維熟悉度優先、能接受自己用顯式鎖補強 → MySQL。不要因為「名字都叫 Repeatable Read」就假設兩邊行為一樣——這是本條最大的陷阱。\n\n### 常見誤解與陷阱\n\n- **「兩邊的 Repeatable Read 一樣」**——最致命的誤解。PG 的 RR＝snapshot isolation（強、不防 write skew）；MySQL 的 RR 在實測下比 snapshot isolation 還弱。同名不同義，遷移時隔離行為會悄悄變。\n- **「PostgreSQL Serializable 慢所以別用」**——SSI 的成本主要是**中止重試**，在低衝突下接近 snapshot isolation。先量你的衝突率再下結論，別憑「serializable 一定貴」就放棄正確性。\n- **「MySQL RR 能擋 write skew」**——InnoDB 的 next-key 擋的是 phantom（插入），不是 write skew（各寫不同列）。要防 write skew 得自己 `SELECT ... FOR UPDATE` 把相關列鎖起來，或升 Serializable。\n- **把 PG `deadlock_timeout` 和 MySQL `innodb_lock_wait_timeout` 當同一個東西**——前者（PG，預設 1s）是「等多久**開始查**死結」；後者（MySQL，預設 50s）是「等鎖多久就**放棄**」。語意與量級都不同，調校時別混。\n- **以為換 DB 只是換連線字串**——隔離預設不同（RC vs RR）、RR 語意不同、serializable 機制不同、鎖逾時行為不同。跨 PG/MySQL 的應用，並發正確性不會自動平移。\n\n### 延伸閱讀\n\n- PostgreSQL 官方文件，Transaction Isolation（含 SSI 與 retry 要求）：https://www.postgresql.org/docs/current/transaction-iso.html\n- MySQL 官方文件，InnoDB Transaction Isolation Levels：https://dev.mysql.com/doc/refman/8.4/en/innodb-transaction-isolation-levels.html\n- Jepsen，MySQL 8.0.34（RR 弱於 snapshot isolation 的實測）：https://jepsen.io/analyses/mysql-8.0.34\n- PostgreSQL wiki，Serializable Snapshot Isolation：https://wiki.postgresql.org/wiki/SSI\n"}, {"id": "B2-consistency-replication", "file": "B2-consistency-replication.md", "group": "Part 2 — 資料、一致性與儲存", "title": "B · 一致性、複製與演進", "md": "# B · 一致性、複製與演進\n\n本領域的另一半回答：當資料被**複製到多個副本、被水平切分到多台機器**時，讀到的值還能保證什麼？這個檔含七條互相咬合的條目——先給「一致性光譜」的全景（線性／因果／讀己之寫／最終一致），再展開讀寫複製延遲的實務後果、分片的一致性代價、最終一致下的補償與對帳語意，接著把 CAP／PACELC 與 ACID／BASE 兩組「保證模型框架」並排講清楚，最後落到一個高度實務的 owning 主題：**零停機 schema 遷移**。複製策略、consistent hashing、quorum、共識的**機制本身**在領域 M 深講，本檔只講它們投射到一致性與資料庫操作面的後果；對帳機制屬領域 L，本檔只談一致性模型那一面。\n\n## 一致性光譜\n\n### 定義與原理\n\n「一致性（consistency）」是被嚴重多載的字。在複製系統裡，它問的是一件具體的事：**多個副本上，讀操作能看見哪些寫操作、以什麼順序看見**。這不是一個開關，而是一條從「最強、最貴」到「最弱、最便宜」的**光譜**。第一原理是 Lamport 與後續研究確立的層級：越往上，副本間需要越多協調（coordination），協調＝延遲＋在分區時犧牲可用性。\n\n由強到弱排四個常被引用的點：\n\n- **線性一致性（linearizability）**：每個操作看起來在它的呼叫與回傳之間的某個瞬間「原子地」生效，且這個全域順序與真實時間（real-time）一致。直覺：系統表現得像只有一份資料、所有人即時看到最新寫入。它是**單一物件**上最強的保證。\n- **順序一致性（sequential consistency）**：所有行程看到的操作交錯順序相同，且各自保留自己的程式順序——但**不要求與真實時間一致**（你寫完，別人「之後」的讀不保證看到）。比線性弱一級。\n- **因果一致性（causal consistency）**：有因果關係的操作（A 影響了 B）所有副本都以一致順序看見；互相獨立（concurrent）的操作各副本可看到不同順序。它捕捉「回覆必在原文之後出現」這類直覺，又不需全域協調，是「能在分區下保持可用」的最強模型。\n- **最終一致性（eventual consistency）**：若停止寫入，所有副本**最終**會收斂到同一值——但沒說多久、過程中讀到什麼都可能。最弱、最便宜、可用性最高。\n\n另有一組正交的、以「單一使用者視角」定義的**會話保證（session guarantees）**——讀己之寫、單調讀、單調寫、讀後寫——它們不要求全域強一致，只要求「對同一個 client 自己的動作前後一致」（見「複製延遲與讀己之寫」）。\n\n### 解法空間\n\n光譜上每個點對應一組實作機制：\n\n- **線性一致**：靠共識協定（Raft／Paxos）讓一份 replicated log 全序提交，所有讀寫過 leader 或過 quorum 並校時（見領域 M）。代價最大。\n- **順序／因果一致**：因果一致用**版本向量（version vector）／依賴追蹤**標記操作的因果先序，副本依此排序套用；不需全域時鐘。\n- **讀己之寫等會話保證**：把同一 client 的讀導向主庫一小段時間、或用「讀至少新到我上次寫的版本」的版本門檻（read-your-writes token）。\n- **最終一致**：無主複製（Dynamo 式）＋背景反熵（anti-entropy／gossip）＋衝突合併（LWW／CRDT），寫入只要求少數副本確認、其餘非同步補上（見領域 M、領域 L）。\n\n「可調一致性（tunable consistency）」是現代資料庫的常態：同一個系統，不同操作可選不同強度。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 線性一致 | 像單份資料、即時最新、與真實時間一致 | 分散式鎖、leader 選舉、餘額這種不能讀到舊值的單鍵 | 每次操作要過共識/quorum，延遲最高；分區時要犧牲可用性 |\n| 順序/因果一致 | 因果順序一致、並發可分歧 | 留言串、社群動態、協作編輯 | 要追蹤因果依賴（版本向量），實作較重；不防並發衝突本身 |\n| 讀己之寫（會話） | 同一 client 讀得到自己剛寫的 | 使用者更新個資/貼文後立刻自己看 | 只對「同一 client」成立，換裝置/換 session 可能破功 |\n| 最終一致 | 無新寫入終會收斂 | 高可用、可容忍短暫舊值（追蹤數、瀏覽計數） | 收斂時間無上界；需衝突解決策略；讀到舊值要設計成不致命 |\n\n### 何時需要\n\n在光譜上選點的準則是：**這份資料讀到「不是最新值」會造成什麼？**\n\n- **讀到舊值會破壞不變量或損失金錢** → 往線性一致靠（餘額、庫存、唯一性保留）。但別整個系統都拉滿，只對那幾個關鍵單鍵拉。\n- **讀到舊值只是「慢半拍」、使用者能接受** → 最終一致足矣（按讚數、觀看數、推薦結果）。\n- **使用者要立刻看到自己的動作、但別人慢半拍沒關係** → 讀己之寫這種會話保證最划算，避開全域強一致的成本。\n- **需要「回覆不能出現在原文之前」這類順序，但不需即時** → 因果一致。\n\n過度工程的典型：把整個 NoSQL 叢集設成 quorum 強讀只為了「保險」，犧牲了當初選它的可用性與延遲。\n\n### 常見誤解與陷阱\n\n- **把 consistency 一個字當成同一件事**——ACID 的 C（不變量不被破壞）、CAP 的 C（線性一致）、最終「一致」性，是**三個不同概念**。混用會讓討論失焦。\n- **以為線性一致＝serializable**——前者是**單一物件**的即時性保證，後者是**多物件交易**的可序列化保證；兩者正交（見「隔離級別與異常」）。一個系統可以線性一致但不可序列化，反之亦然。\n- **以為最終一致＝「很快就一致」**——「最終」沒有時間上界；分區或高負載時可長達數秒甚至更久。設計要能容忍這段窗口讀到舊值。\n- **把會話保證當成全域保證**——讀己之寫只保證「你讀得到你自己的寫」，不保證別人讀得到你的寫，也不保證你讀得到別人的寫。\n\n### 延伸閱讀\n\n- Jepsen — Consistency Models（互動式層級圖，最佳入門）：https://jepsen.io/consistency\n- Aphyr, \"Strong consistency models\"：https://aphyr.com/posts/313-strong-consistency-models\n- Terry et al., \"Session Guarantees for Weakly Consistent Replicated Data\"（會話保證原始論文）：https://www.cs.cornell.edu/courses/cs734/2000FA/cached%20papers/SessionGuaranteesPDIS_1.html\n\n## 複製延遲與讀己之寫\n\n### 定義與原理\n\n把讀流量導到 read replica（讀副本）是擴展讀吞吐最常見的手段：主庫（primary）負責寫，多個副本非同步接收 WAL／binlog 並重放，承接讀。代價是**複製延遲（replication lag）**——副本永遠落後主庫一小段時間（毫秒到數秒，負載高時更久）。這直接打破一個使用者最在意的直覺：**「我剛寫的，自己應該讀得到。」** 寫入落在主庫、緊接著的讀卻打到還沒追上的副本，於是讀到舊值或 null，使用者以為「我的更新不見了」。\n\n這就是**讀己之寫（read-your-writes，又稱 read-after-write）**保證要解決的問題：它不要求全域強一致，只要求「同一 client 讀得到自己剛提交的寫」。\n\n### 解法空間\n\n在「主寫、副本讀」架構下達成讀己之寫的辦法：\n\n- **寫後讀主庫一小段時間（sticky-to-primary）**：使用者寫入後，把他接下來幾秒的讀都導回主庫。最簡單，但抵銷了部分讀擴展效益。\n- **追蹤寫入版本/位置（read-your-writes token）**：記下這次寫提交後的複製位置（如 LSN／GTID），後續讀要求「副本至少追到這個位置才回應」，否則改打主庫或等待。精準但要傳遞 token。\n- **單調讀的副本黏著（pin to one replica）**：把同一 client 黏在同一副本上，至少保證不會「前進又後退」（單調讀），但不保證讀得到主庫最新。\n- **關鍵讀全走主庫**：對「寫完馬上要讀」的少數路徑直接標記為強讀、繞過副本。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 寫後黏主庫 N 秒 | 該窗口內讀己之寫 | 寫完立刻自看（編輯個資後回看） | N 設太短仍可能 miss；主庫讀壓力回升 |\n| 寫入位置 token | 精準讀己之寫 | 需嚴格、又想盡量用副本 | 要在請求間傳遞/儲存 token；跨服務難傳遞 |\n| 黏同一副本 | 單調讀（不倒退） | 分頁瀏覽、列表翻頁不抖動 | 不保證看到主庫最新；該副本掛了要重新選 |\n| 關鍵讀走主庫 | 該路徑線性一致 | 少數「絕不能舊」的讀 | 路徑分類錯就破功；主庫成瓶頸 |\n\n### 何時需要\n\n- **使用者會「寫完立刻自己看」** → 必須有讀己之寫，否則體驗像「資料丟了」。最典型：貼文、改設定、下單後看訂單。\n- **資料只給別人看、寫者不馬上回看** → 不必特別處理，最終一致即可（如後台批次匯入的報表）。\n- **跨裝置/跨 session 也要一致** → 單純的 client 黏著不夠（手機寫、電腦讀），要 token 或走主庫。\n\n**Worked example**：某服務讀寫比 9:1，把讀導到 3 個副本後讀吞吐約 ×3。平均複製延遲 200 ms，但 p99 達 1.2 s。若使用者「改完暱稱→立刻刷新個人頁」平均間隔 800 ms，則約有一段尾巴（延遲 > 間隔的請求）會讀到舊暱稱——在 1.2 s 的 p99 下，這類「刷新比複製快」的情況並非罕見邊角。解法不必對全部讀做強一致：只要對「改完→自看」這一條路徑做寫後黏主庫 2 s（覆蓋 p99 的 1.2 s 有餘量），其餘 99% 讀仍享受副本擴展。一個窄路徑的特例，換掉「資料不見了」的客訴。\n\n### 常見誤解與陷阱\n\n- **以為加副本只賺不賠**——你買到讀吞吐，同時買進複製延遲這個新的一致性問題；不設計讀己之寫，就把延遲變成 bug。\n- **把「平均延遲很低」當沒問題**——傷害發生在尾巴（p99／p999）。平均 50 ms 但 p99 2 s，受害的就是那批倒楣使用者，而且難以重現。\n- **同步複製當成萬靈丹**——改成同步複製（等副本確認才回 client）能消除延遲，但寫延遲與失敗率上升、副本慢就拖垮寫入；通常只對極少數資料這麼做。\n- **忽略「寫到主、讀到副本」的跨服務裂縫**——A 服務寫主庫、B 服務讀副本，token 傳不過去，讀己之寫在服務邊界就斷了。\n\n### 延伸閱讀\n\n- Martin Kleppmann, *Designing Data-Intensive Applications*, Ch.5 \"Replication\"（讀己之寫/單調讀的權威整理）：https://dataintensive.net/\n- Shopify Engineering, \"Read Consistency with Database Replicas\"：https://shopify.engineering/read-consistency-database-replicas\n- PostgreSQL — Hot Standby & replication（官方文件）：https://www.postgresql.org/docs/current/hot-standby.html\n\n## 分片 partition\n\n### 定義與原理\n\n當單機放不下資料或扛不住寫入，就把一張大表/一個資料集**水平切分（horizontal partitioning，即 sharding／分片）**到多台機器，每台只存一部分列。切分鍵（shard key）決定一筆資料落在哪個分片；路由層（router／coordinator／client-side logic）負責把請求送到正確的分片。第一原理：**分片把「規模」問題換成「跨分片協調」問題**——單分片內你還有資料庫原本的保證（交易、唯一性、線性讀），跨分片你幾乎全部失去，得自己補。\n\n注意術語：本書統一用**分片（shard/sharding）**指這種「資料分散到多節點」的水平切分；**分區（partition）**保留給 CAP 語境裡的網路分區，與 Kafka 的 partition。\n\n### 解法空間\n\n切分鍵與路由策略決定一致性與熱點：\n\n- **範圍分片（range）**：依鍵的區間切（A–M 在 shard1、N–Z 在 shard2）。範圍查詢友善，但易出**熱點**（如以時間為鍵，最新資料全擠在最後一個分片）。\n- **雜湊分片（hash）**：對鍵取雜湊再分桶，分佈均勻、無範圍熱點，但範圍查詢要掃所有分片。重新分片時若用樸素 `hash % N`，N 一變幾乎所有鍵都要搬——**consistent hashing** 就是為了讓擴縮容只搬一小部分鍵（機制見領域 M）。\n- **目錄/查表分片（directory）**：維護一張「鍵→分片」對照表，最靈活（可手動搬熱點），但對照表本身成為單點與一致性負擔。\n- **地理分片（geo）**：按使用者所在區切，降延遲＋符合資料落地法規，代價是跨區操作昂貴。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 範圍分片 | 範圍查詢落單分片、有序 | 時序、按帳號區間掃描 | 易熱點（尾端分片）；需監控與再平衡 |\n| 雜湊分片 | 分佈均勻、無範圍熱點 | 點查為主、key 基數高 | 範圍查詢要 scatter-gather 所有分片 |\n| consistent hashing | 擴縮容只搬約 1/N 的鍵 | 動態增減節點的快取/儲存 | 仍可能傾斜，需 virtual node 平衡（見領域 M） |\n| 目錄分片 | 可任意搬鍵、處理熱點靈活 | 少數超大租戶需單獨安置 | 目錄是單點＋一致性熱點；查一次多一跳 |\n\n### 何時需要\n\n- **單機已到天花板**（容量、寫 IOPS、連線數）→ 才分片。分片前先窮盡讀副本、快取、索引最佳化、垂直升級——分片的營運複雜度極高，是最後手段。\n- **跨分片交易/JOIN 是常態** → 重新檢討切分鍵；好的切分鍵讓**絕大多數操作落在單一分片**（如以 tenant_id 分片，單租戶操作天然不跨片）。\n- **熱點集中在少數鍵** → 範圍分片要避開，或對熱鍵特殊處理。\n\n**Worked example**：一張 20 億列的訂單表，單機寫入到頂。以 `user_id` 雜湊分到 16 個分片，平均每片 1.25 億列、寫壓力 ÷16。代價：原本一句 `SELECT ... WHERE user_id=?` 仍落單片（因為切分鍵就是 user_id），但「全站訂單總額」這種跨所有 user 的彙總，從一句 SQL 變成對 16 片各查一次再合併（scatter-gather）。若改用 `order_date` 範圍分片，最新月份的寫入會全擠在最後一片，16 片裡 15 片閒置——切分鍵選錯，分片帶來的是傾斜而非均衡。選 user_id 而非 order_date，差別就是「寫壓力 ÷16」與「寫壓力全壓一片」。\n\n### 常見誤解與陷阱\n\n- **太早分片**——分片是不可逆的複雜度躍升（跨片交易、再平衡、運維）。很多「需要分片」的系統其實只是缺索引或缺快取。\n- **切分鍵選錯導致跨片操作變常態**——若最熱的查詢/交易頻繁跨多片，等於把分片的成本全付了、好處全沒拿到。切分鍵應對齊**最高頻、最在意延遲**的存取模式。\n- **以為分片後還能用 DB 的唯一約束跨片保證唯一**——`UNIQUE` 只在單分片內有效；全域唯一要另設（如中央發號器或在切分鍵內含唯一性）。\n- **用 `hash % N` 當長久方案**——擴容時 N 一變幾乎全表要搬，期間一致性與可用性都受創；要動態增減節點就上 consistent hashing（見領域 M）。\n\n### 延伸閱讀\n\n- Martin Kleppmann, *Designing Data-Intensive Applications*, Ch.6 \"Partitioning\"：https://dataintensive.net/\n- \"Consistent Hashing and Random Trees\"（Karger et al., 1997，原始論文）：https://dl.acm.org/doi/10.1145/258533.258660\n- Vitess — Sharding（MySQL 水平分片的工程化文件）：https://vitess.io/docs/concepts/shard/\n\n## 最終一致 · 補償 · 對帳\n\n### 定義與原理\n\n選了最終一致性（為了高可用＋低延遲），就接受了一個事實：**在收斂之前，系統會短暫處於「不一致」狀態**——兩個副本、或兩個服務的資料，在某個瞬間彼此矛盾。這不是 bug，是這個一致性模型的定義。問題不在「如何避免不一致」（避不掉），而在「如何讓系統在不一致的窗口裡仍正確運作、並保證最終收斂」。本條只談這個**一致性模型面**：補償（compensation）與對帳（reconciliation）作為「最終達成一致」的兩種手段在語意上意味什麼。對帳的**具體機制**（怎麼比對兩邊、漂移怎麼修）屬領域 L，本條只講它在一致性模型裡扮演的角色。\n\n第一原理：當沒有跨資源的原子交易（跨服務、跨庫），你無法讓「兩件事一起成功或一起失敗」。於是改用**先各自做、事後修正**——前向用補償抵銷失敗的半成品，後向用對帳偵測並修補漂移。\n\n### 解法空間\n\n讓最終一致系統「最終真的一致」的手段：\n\n- **補償交易（compensating transaction）**：無法回滾的跨服務操作，用一個「語意上的反向操作」抵銷（訂了位→取消訂位；扣了款→退款）。這是 saga 的核心（機制見 outbox／saga，領域 A）；本條只強調它是「達成最終一致的前向修正」。\n- **對帳（reconciliation）**：定期把兩邊（或多邊）的真實狀態拉出來比對，找出漂移（drift）的記錄，依規則修正。它是「最終一致」這個承諾的**兌現機制與安全網**——不管中間漏了什麼，對帳保證偏差被發現並收斂（機制見對帳 reconciliation，領域 L）。\n- **收斂式合併（convergent merge）**：副本各自接受寫入，靠 LWW／版本向量／CRDT 在合併時無衝突地收斂到同一值（見衝突解決，領域 L）。\n- **讀修復（read repair）／反熵（anti-entropy）**：讀到副本不一致時順手修，或背景持續比對補齊（見領域 M）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 補償交易 | 失敗的跨服務操作被語意抵銷 | 訂位/扣款這類可語意反向的流程 | 補償本身可能失敗，要可重試/冪等；有「已讀到中間態」的窗口 |\n| 對帳 | 漂移最終被偵測並修正 | 任何跨系統的金額/數量需可稽核 | 對帳週期＝最大不一致窗口；要有可信「真相源」 |\n| 收斂合併（CRDT/LWW） | 並發寫無衝突收斂同值 | 計數器、購物車、協作狀態 | LWW 會默默丟資料；CRDT 限定資料型別、metadata 成本 |\n| 讀修復/反熵 | 副本間差異被背景補齊 | 無主複製叢集 | 只修被讀到/被掃到的；冷資料漂移可長期潛伏 |\n\n### 何時需要\n\n- **跨服務/跨庫、又不能上分散式交易（2PC）** → 用補償＋對帳這對組合：補償管前向回滾、對帳當最後安全網。幾乎所有微服務金流都這樣。\n- **資料涉及金額/數量、需可稽核** → 對帳是**非選項**，是底線。再強的一致性設計都可能有縫，對帳是兜底。\n- **資料只是衍生/可重算** → 多數時候直接重算比對帳便宜，不必補償。\n\n**Worked example**：一個下單流程跨「訂單服務」「庫存服務」「支付服務」三庫，無分散式交易。一天 10 萬筆訂單，假設每筆三步、每步失敗率 0.1%，則約 `100,000 × (1 − 0.999³) ≈ 100,000 × 0.3% ≈ 300` 筆會卡在「扣了庫存但沒扣款」或「扣了款但訂單沒建立」的中間態。前向靠 saga 補償自動回滾大部分；剩下補償也失敗的零頭（再 0.1%，約 0.3 筆/天）由每日對帳掃出來人工或自動修。沒有對帳，這 0.3 筆/天會無聲累積成帳目對不上的長期漂移；補償＋對帳兩層，把「300 筆異常/天」收斂到「最終全部一致」。\n\n### 常見誤解與陷阱\n\n- **以為補償＝rollback**——資料庫 rollback 是「當沒發生過」；補償是「再做一個反向操作」，中間態**對外可見過**（別人可能已讀到「已訂位」又看到「已取消」）。\n- **沒有對帳就宣稱最終一致**——「最終一致」不會自己發生，它需要反熵/對帳這類機制兜底。少了它，不一致可能永久潛伏（尤其冷資料）。\n- **對帳週期當免費**——對帳週期就是你的**最大不一致窗口**。一天對一次，最壞情況帳就錯一天；金流場景可能要近即時對帳。\n- **LWW 默默丟資料卻沒人知道**——last-write-wins 在並發寫時用時間戳裁決，輸的那筆**直接消失**，且時鐘偏移會讓「贏家」不直觀（見衝突解決，領域 L）。\n\n### 延伸閱讀\n\n- AWS, \"Saga pattern\"（補償交易的工程化說明）：https://docs.aws.amazon.com/prescriptive-guidance/latest/cloud-design-patterns/saga.html\n- Pat Helland, \"Life beyond Distributed Transactions\"（為何要用補償而非 2PC 的經典）：https://dl.acm.org/doi/10.1145/3012426.3025012\n- Werner Vogels, \"Eventually Consistent\"（ACM Queue，最終一致性的權威科普）：https://queue.acm.org/detail.cfm?id=1466448\n\n## CAP / PACELC\n\n### 定義與原理\n\nCAP 定理回答一個分散式系統避不掉的取捨。三個屬性：**一致性（Consistency，此處指線性一致）**、**可用性（Availability，每個請求都得到非錯誤回應）**、**分區容忍（Partition tolerance，網路被切開時系統仍運作）**。CAP 由 **Eric Brewer** 在 **2000 年 PODC keynote** 以 conjecture（猜想）提出，再由 **Seth Gilbert 與 Nancy Lynch 於 2002 年**以反證法形式化證明為定理（論文〈Brewer's Conjecture and the Feasibility of Consistent, Available, Partition-Tolerant Web Services〉，ACM SIGACT News）。\n\n常被誤念成「三選二」。更準確的讀法：**網路分區（P）在分散式系統裡不是選項而是現實**（封包會丟、節點會失聯），所以真正的選擇只發生在**分區當下**——要嘛保一致性（拒絕在可能不一致的副本上回應，犧牲 A），要嘛保可用性（照常回應，可能回舊值，犧牲 C）。沒分區時 CAP 沒說話。\n\n**PACELC** 補上 CAP 沒說的那一半。由 **Daniel Abadi** 提出（**2010 年部落格初提、2012 年 IEEE Computer 論文**〈Consistency Tradeoffs in Modern Distributed Database System Design: CAP is Only Part of the Story〉形式化）。它說：**if Partition（分區時）→ 在 Availability 與 Consistency 間選；Else（正常運作時）→ 在 Latency 與 Consistency 間選。** 關鍵洞見：即使沒有分區，強一致仍要付協調延遲的代價——你天天在 L 與 C 之間取捨，分區只是偶發的極端情形。\n\n### 解法空間\n\n把一個系統依 PACELC 歸類，就回答了它的取捨人格：\n\n- **PC/EC**：分區時選一致（犧牲可用），正常時也選一致（犧牲延遲）。最重一致。例：傳統單主關聯式資料庫、用線性一致設定的系統。\n- **PA/EL**：分區時選可用，正常時選低延遲。最重可用與速度。例：Dynamo 式無主、Cassandra 預設、許多最終一致 KV。\n- **PA/EC**：分區時選可用，但正常時仍盡量一致。例：部分可調系統在「無分區就強讀、分區就降級」的配置。\n- **PC/EL**：分區時選一致，正常時選低延遲（分區外不強求一致）。較少見，但可調系統能配出來。\n\n實作上「選哪邊」由**寫入需多少副本確認（W）、讀取需讀多少副本（R）、與總副本數 N**等旋鈕決定（見 quorum，領域 M）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | PACELC 取向 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|---|\n| 單主關聯式（強一致設定） | PC/EC | 線性一致、可序列化 | 金流、需強保證的核心交易 | 分區時主庫側不可寫；強讀有協調延遲 |\n| Dynamo 式無主（如 Cassandra 預設） | PA/EL | 高可用、低延遲、最終一致 | 大規模寫入、可容忍舊值 | 並發衝突要合併；讀可能舊；需對帳兜底 |\n| 可調 quorum（R+W>N） | 視 R/W 配置而定 | 配置出強讀或快讀 | 想按操作選強度 | 配錯（R+W≤N）會悄悄讀到舊值 |\n\n> 提醒：表中「Cassandra 預設」「單主關聯式」是**取向示例**，非斷言某產品在所有配置下永遠如此；多數現代系統可調，PACELC 描述的是「預設/典型配置下的傾向」。\n\n### 何時需要\n\n- **設計或選型分散式儲存時，先問 PACELC 兩個問題**：分區時我要可用還是一致？正常時我願意為一致多付多少延遲？這比背「CAP 三選二」有用得多。\n- **核心交易（錢、庫存、唯一性）** → PC/EC 那一格，寧可分區時拒絕服務也不讀錯。\n- **大規模、可容忍舊值、要求永遠在線（社群計數、推薦、購物車）** → PA/EL，把一致性讓給可用與延遲，再用對帳兜底。\n\n### 常見誤解與陷阱\n\n- **把 CAP 念成「平時三選二、可任意放棄 P」**——分散式系統裡 P 不是你能放棄的選項，分區終會發生；真正的選擇是分區當下的 C vs A。能放棄 P 的只有單機。\n- **混淆 CAP 的 C（線性一致）與 ACID 的 C（不變量）**——同字不同義（見「一致性光譜」）。\n- **以為 CAP 涵蓋了全部取捨**——它只談分區時。日常 99.9% 時間沒分區，那段的 L vs C 取捨要靠 PACELC 才看得見。\n- **把 Brewer 與 Gilbert-Lynch 混為一人/一事**——Brewer 提 conjecture（2000），Gilbert-Lynch 給 proof（2002）；PACELC 是 Abadi（2012 論文）。屬性別記錯。\n\n### 延伸閱讀\n\n- Gilbert & Lynch, \"Brewer's Conjecture and the Feasibility of Consistent, Available, Partition-Tolerant Web Services\"（2002 證明）：https://groups.csail.mit.edu/tds/papers/Gilbert/Brewer2.pdf\n- Abadi, \"Consistency Tradeoffs in Modern Distributed Database System Design\"（PACELC，IEEE Computer 2012）：https://www.cs.umd.edu/~abadi/papers/abadi-pacelc.pdf\n- Brewer, \"CAP Twelve Years Later: How the 'Rules' Have Changed\"（InfoQ，2012 回顧）：https://www.infoq.com/articles/cap-twelve-years-later-how-the-rules-have-changed/\n\n## ACID vs BASE\n\n### 定義與原理\n\nACID 與 BASE 是**兩套一致性哲學**，常被對立呈現——但它們不是「好壞」，而是光譜兩端，對應不同的取捨優先序（這個分類與 CAP／PACELC 同層，都在描述「你選什麼保證」）。\n\n**ACID**（傳統交易資料庫的契約）：\n\n- **Atomicity（原子性）**：交易要嘛全做、要嘛全不做。\n- **Consistency（一致性）**：交易把資料庫從一個合法狀態帶到另一個合法狀態（不變量不被破壞）——注意這個 C 與 CAP 的 C 不同義。\n- **Isolation（隔離性）**：並發交易彼此不互相干擾，效果如同某種序（見「隔離級別與異常」）。\n- **Durability（持久性）**：一旦 commit，斷電也不丟。\n\n**BASE** 是刻意取的反義詞（化學上酸 acid／鹼 base），由 **Eric Brewer** 在 CAP 脈絡下提出、Dan Pritchett 的〈BASE: An Acid Alternative〉（ACM Queue, 2008）廣為傳播：\n\n- **Basically Available（基本可用）**：系統大多時候可用，分區/故障時可能降級但不整個倒。\n- **Soft state（軟狀態）**：狀態可能隨時間自行改變（即使沒有新輸入），因為副本在背景收斂。\n- **Eventual consistency（最終一致）**：最終會收斂，不保證即時。\n\n第一原理：ACID 為**正確性**買單（用協調換強保證），BASE 為**可用性與規模**買單（放鬆一致性換高可用低延遲）。\n\n### 解法空間\n\n「選 ACID 還是 BASE」其實是「在系統不同部位各放多少」——現代系統幾乎都混用：\n\n- **核心交易走 ACID**：用支援交易的資料庫（關聯式或支援多文件交易的 NoSQL），對錢、庫存、唯一性這類資料拉滿。\n- **大規模/高可用部位走 BASE**：用最終一致儲存承接動態、計數、快取、衍生資料。\n- **介於之間用會話保證/因果一致**：不要全域強一致的成本，但要「對使用者自己一致」（見「一致性光譜」）。\n- **跨服務用補償＋對帳兜 BASE 的縫**：放鬆強一致後，用 saga 與對帳保證最終正確（見「最終一致 · 補償 · 對帳」）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| ACID（交易資料庫） | 原子、隔離、即時一致、持久 | 金流、庫存、訂單、任何不變量神聖的核心 | 跨節點協調有延遲；極大規模/跨區擴展難、分區時要犧牲可用 |\n| BASE（最終一致儲存） | 高可用、低延遲、最終收斂 | 計數、動態、購物車、快取、衍生資料 | 中間態可讀到舊值/矛盾；需衝突解決＋對帳；不可放金流核心 |\n| 混合（多數真實系統） | 各部位各取所需 | 幾乎所有中大型系統 | 邊界要清楚：哪些資料 ACID、哪些 BASE，別讓 BASE 資料偷偷承載不變量 |\n\n### 何時需要\n\n- **資料承載「不能錯」的不變量**（餘額不為負、座位不重賣、唯一帳號）→ ACID，沒得商量。\n- **資料是「慢半拍沒關係」的高頻動態**（讚數、瀏覽量、推薦、最近瀏覽）→ BASE，換可用與規模。\n- **介於之間** → 不必非黑即白；用會話/因果一致取中間，或核心 ACID＋衍生 BASE 的混合。\n\n**Worked example**：一個社群貼文系統。「發文」這個動作本身（建立貼文記錄、扣除每日發文額度）走 ACID 單筆交易——額度不能因並發而扣成負數，這是不變量。「貼文的按讚數」走 BASE——10 萬人同時按讚，若每個讚都進強一致交易，熱門貼文的那一行會變成所有寫入排隊的瓶頸（單行鎖爭用）；改成最終一致的計數（各節點本地累加、背景彙總），吞吐從「序列化的數百/秒」躍到「平行的數萬/秒」，代價是讚數短暫顯示舊值——沒人會因為讚數慢 200 ms 更新而受傷。同一個貼文系統，發文 ACID、計數 BASE，是教科書式的混合。\n\n### 常見誤解與陷阱\n\n- **把 ACID／BASE 當成「整個系統二選一」**——它是**每塊資料**的選擇，真實系統幾乎都混用。把它當全域開關會逼你在「全部很慢」與「全部不可靠」間做假選擇。\n- **把 BASE 的 Consistency 與 ACID 的 C 混為一談**——前者是「最終收斂」，後者是「不變量不破」，差很遠。\n- **讓 BASE 資料偷偷承載不變量**——例如用最終一致的計數器當「庫存」，並發超賣就發生了。不變量資料必須 ACID。\n- **以為 NoSQL＝必然 BASE**——不少現代 NoSQL（如支援多文件 ACID 交易的文件庫）能提供 ACID；ACID/BASE 是配置與資料模型的選擇，不是「SQL vs NoSQL」的同義詞（見 SQL vs NoSQL，領域 O）。\n\n### 延伸閱讀\n\n- Dan Pritchett, \"BASE: An Acid Alternative\"（ACM Queue, 2008）：https://queue.acm.org/detail.cfm?id=1394128\n- \"ACID\" — Wikipedia（屬性定義整理）：https://en.wikipedia.org/wiki/ACID\n- Werner Vogels, \"Eventually Consistent\"（ACM Queue）：https://queue.acm.org/detail.cfm?id=1466448\n\n## 零停機 schema 遷移\n\n### 定義與原理\n\n線上系統的資料庫結構（schema）總要演進：加欄位、改型別、拆表、改索引。難點在於**部署不是瞬間的**——新舊版本的應用程式碼會**同時**連著同一個資料庫運行一段時間（rolling 部署期）。若直接 `ALTER TABLE` 做破壞性變更（改名、改型別、刪欄位），舊碼會撞上它不認識的結構而崩潰，或新碼撞上還沒改的結構。零停機 schema 遷移的核心契約是：**任何一個時刻的 schema，都必須同時相容「正在退場的舊碼」與「正在進場的新碼」。**\n\n本條是本書「資料庫結構變更」的 owning 條目；與「序列化與 schema 演進」（領域 A，講的是**線上協定／訊息格式**的向前後相容）分工：那條管「服務之間傳的訊息」，這條管「資料庫裡的表結構」，兩者都靠同一個「新舊並存期必須雙向相容」的原理，但作用面不同。\n\n### 解法空間\n\n達成零停機結構變更的標準做法，核心是 **expand-contract（擴張—收縮，又稱 parallel change）**，把一個破壞性變更拆成數個各自相容的小步：\n\n- **Expand（擴張）**：先**只加不改**——加新欄位/新表，與舊結構並存。加 nullable 欄位、或在現代資料庫加帶靜態預設值的欄位，多為 metadata-only、不鎖全表（如 PostgreSQL 11+ 對非 volatile 預設的 `ADD COLUMN` 不重寫整表）。此時新舊碼都還能跑。\n- **遷移期雙寫（dual-write）**：部署能「同時寫新欄位與舊欄位」的應用碼（或用 DB trigger 同步），確保新結構從此不再落後。\n- **Backfill（回填）**：把歷史資料分批（典型每批 1k–10k 列、批間刻意 sleep 避免 I/O 飽和與長鎖）寫進新欄位，補齊雙寫之前的舊資料。\n- **切讀**：確認新欄位已填滿、雙寫穩定後，把讀路徑切到新欄位，觀察一段時間。\n- **Contract（收縮）**：等到**沒有任何碼還在讀寫舊欄位**（含 drain 掉舊版本的在途請求）後，才刪舊欄位。此時刪除多為 metadata-only、毫秒級。\n\n其他配套：線上建索引（`CREATE INDEX CONCURRENTLY`／`ONLINE`／`INSTANT`，避免建索引鎖表）、影子表（shadow table，整表重建型變更用新表並雙寫再切換）、feature flag 控制切換時機。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| expand-contract（雙寫+backfill） | 全程相容新舊碼、零停機 | 加欄位、改型別、改名、拆表的主流做法 | 步驟多、跨多次部署；中途要保證雙寫不漏 |\n| 應用層雙寫 | 應用碼控制、可觀測 | 多數遷移 | 漏寫某條路徑就資料分歧；直連 DB 的腳本繞過雙寫 |\n| DB trigger 雙寫 | 連直連寫入都同步 | 有外部腳本/多寫入源 | trigger 增寫入開銷、隱性邏輯難維護 |\n| 影子表 + 切換 | 整表重建型變更也不停機 | 大改（換主鍵、大規模型別變更） | 雙寫＋backfill＋一致性校驗成本高 |\n| 直接 ALTER（破壞性一步） | 簡單 | 離線維護窗、或極小無流量表 | 線上跑會鎖表/讓舊碼崩潰，**非零停機** |\n\n### 何時需要\n\n- **服務不能停、且做 rolling 部署** → expand-contract 是預設做法，幾乎所有線上結構變更都該這樣拆。\n- **表很小、或有維護窗、或無流量** → 直接 ALTER 即可，硬套 expand-contract 是 over-engineering。\n- **變更涉及大表＋會鎖表的操作**（改型別、加 NOT NULL 帶 volatile 預設、重建主鍵）→ 一定要拆步＋線上索引＋分批，否則一句 ALTER 鎖住大表幾分鐘＝事實上的停機。\n\n**Worked example**：要把使用者表的 `name`（單欄）拆成 `first_name`／`last_name`，表 5,000 萬列、全天有流量。直接做不行：刪 `name` 會讓舊碼崩、加 NOT NULL 新欄會鎖表。按 expand-contract：(1) **Expand**：加兩個 nullable 欄位 `first_name`／`last_name`（PG 11+ 為 metadata-only、毫秒級，不鎖表）。(2) **雙寫**：部署新碼，寫入時同時填 `name` 與拆分後的兩欄。(3) **Backfill**：背景每批 5,000 列、批間 sleep 100 ms 把舊資料拆填——5,000 萬列約 1 萬批，即使每批含 sleep 約 200 ms，總計約 `10,000 × 0.2s ≈ 2,000s ≈ 33 分鐘`跑完，全程不鎖表、不影響線上。(4) **切讀**：讀路徑改讀新欄，觀察數日。(5) **Contract**：確認無碼再用 `name`、舊版本實例全下線後，才 `DROP COLUMN name`（metadata-only）。把一個「會停機數分鐘」的破壞性變更，拆成五個各自零停機的小步。\n\n### 常見誤解與陷阱\n\n- **以為 `ADD COLUMN ... NOT NULL DEFAULT ...` 一定鎖表重寫**——要看資料庫版本與預設值是否 volatile：PG 11+ 對**非 volatile** 靜態預設是 metadata-only；但 volatile 預設（如每列算一個 UUID）仍會重寫整表。版本與預設型別決定生死，別一概而論（2026-06）。\n- **跳過 backfill 校驗就切讀**——雙寫若有漏寫的路徑（某個直連 DB 的腳本、某條冷路徑），新欄會有缺口；切讀前要校驗新舊一致。\n- **Contract 太早**——舊版本實例還沒完全下線、在途請求還在用舊欄位時就 drop，舊碼立刻崩。要等到確定無人再用。\n- **backfill 一把梭不分批**——一句 `UPDATE` 掃 5,000 萬列會長時間持鎖＋撐爆 WAL/replication，等於自造停機。必須分批＋限速。\n- **把它和線上協定相容搞混**——資料庫結構變更（本條）與服務間訊息格式演進（領域 A）是兩件事，各有各的相容規則，別用一邊的做法套另一邊。\n\n### 延伸閱讀\n\n- \"Expand/Contract\" / Parallel Change（Martin Fowler 的 ParallelChange 模式）：https://martinfowler.com/bliki/ParallelChange.html\n- PostgreSQL — ALTER TABLE（官方文件，含 ADD/DROP COLUMN 的鎖與重寫行為）：https://www.postgresql.org/docs/current/sql-altertable.html\n- Xata, \"Schema changes and the power of expand-contract with pgroll\"：https://xata.io/blog/pgroll-expand-contract\n"}, {"id": "O-storage-engines", "file": "O-storage-engines.md", "group": "Part 2 — 資料、一致性與儲存", "title": "O · 儲存引擎與資料模型", "md": "# O · 儲存引擎與資料模型\n\n這個領域解的是「資料落到磁碟之前那一層」的問題：同樣一張表，底下用什麼結構排列位元組，決定了你寫得快還是讀得快、放不放得下
