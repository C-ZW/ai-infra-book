工作拆成可交錯推進的單元），平行是「執行」（同一瞬間多核一起跑），兩者正交。（見 並發 ≠ 平行，領域 D）\n\n**並發模型比較**：thread / event-loop / actor / coroutine / CSP 五大模型，差別歸結為「共享記憶體 vs 傳訊息」「搶佔 vs 協作讓出」兩軸。（見 並發模型比較，領域 D）\n\n**分散式失敗模型**：partial failure——任一節點/連線/訊息可獨立失敗，且發請求無回應時無法區分「丟了/在處理/回應丟了/掛了」。（見 分散式失敗模型，領域 M）\n\n**分散式鎖**：跨機器無共享記憶體，靠外部協調者（Redis/ZooKeeper/etcd/DB）發放鎖記號達成互斥；正確性須配 fencing token。（見 分散式鎖，領域 M）\n\n**可逆 vs 不可逆決策（one-way / two-way door）**：拆出「反悔的代價」這軸——不可逆決策要慢要多方會診，可逆決策可快、可由小團隊拍板。（見 可逆 vs 不可逆決策，領域 U）\n\n**可觀測性與品質工具地圖**：工具是用來換保證的、且會老化（停維護/改授權/被取代），選型除「能做什麼」更要看「還活著嗎」。（見 可觀測性與品質工具地圖，領域 I）\n\n**失效 · 雪崩 · 穿透 · 擊穿**：四類快取失效災難——大量同時過期（雪崩）、查不存在的鍵繞過快取（穿透）、熱鍵過期瞬間擊穿到 DB。（見 失效 · 雪崩 · 穿透 · 擊穿，領域 G）\n\n**自建 vs 採用**：每加一個相依都是「省自己不寫」換「交出一部分控制權」；判準是「這塊是不是我的核心競爭力」。（見 自建 vs 採用與相依管理，領域 U）\n\n**同步 vs 非同步通訊**：A 呼叫 B 要不要卡住等回應——同步阻塞等結果、非同步發完即走、結果之後回送。（見 同步 vs 非同步通訊，領域 K）\n\n**告警設計**：對「使用者正在受影響的症狀」告警而非「某零件壞了的原因」，症狀少而穩定且自動涵蓋沒想到的故障模式。（見 告警設計，領域 V）\n\n**技術選型**：在資訊不對稱下選一個並承擔維護後果，真正風險常不在「它好不好」而在「它把你綁多深」（退場成本）。（見 技術選型，領域 U）\n\n**資料同步**：把「變更」從一端搬到另一端，差別只在怎麼界定變更、何時搬、搬多少。（見 資料同步總覽，領域 L）\n\n**資料生命週期**：每筆資料該活多久、老了去哪、被「刪除」時到底發生什麼（軟刪除/封存/合規刪除）。（見 資料生命週期，領域 O）\n\n**跨區與異質庫同步**：在 multi-region 高延遲＋隨時分區、且來源與目的地是不同庫的雙重約束下同步，並想清楚實際拿到什麼一致性。（見 跨區與異質庫同步，領域 L）\n\n**慣例的自動化強制**：靠人記憶的慣例會衰減為零，把它從「人的善意」搬到「機器的硬閘」，讓不照做的程式碼進不來。（見 慣例的自動化強制，領域 T）\n\n**衝突解決**：多處獨立更新同一值時決定「最後算誰的」，且須讓所有副本收斂到同一確定結果（LWW/CRDT/應用層合併）。（見 衝突解決，領域 L）\n\n**簡單性 vs 過度工程**：過度工程是替還沒出現的需求預付複雜度（過早抽象、過早最佳化）；用 YAGNI 對抗。（見 簡單性 vs 過度工程，領域 U）\n\n**錯誤處理哲學**：每個會出錯處都要決定「誰知道、哪一層處理、處理到什麼程度」，先分類錯誤再對不同錯誤選 fail-fast 或容錯。（見 錯誤處理哲學，領域 U）\n\n**負載測試**：在真實流量形狀下逼出 p99/p999 長尾與吞吐天花板，而非跑很多次取平均。（見 負載測試，領域 I）\n\n**測試策略**：把有限測試預算分配到各層（單元/整合/端到端），在「真實度 vs 速度穩定」軸上用最低成本買最高信心。（見 測試策略，領域 I）\n\n**無狀態 vs 有狀態**：無狀態實例兩次請求間不持有處理所必需的記憶體狀態，可隨意替換；有狀態則殺掉就丟。（見 無狀態 vs 有狀態，領域 J）\n\n**從 log 算 metric 的陷阱**：聚合正確性取決於樣本完整性，而 log 在高流量下會被取樣/丟/截斷，三者都不保證。（見 從 log 算 metric 的陷阱，領域 I）\n\n**程式碼審查**：表面抓 bug（其實最弱），真正保護的是知識擴散、設計把關與集體所有權。（見 程式碼審查，領域 V）\n\n**分支與發布策略**：規則骨子裡決定整合頻率，而整合頻率直接決定合併衝突有多痛、壞變更多快被發現、發布有多敢頻繁。（見 分支與發布策略，領域 V）\n\n**多層快取與優雅降級**：串多級快取（CDN→行程內→Redis→DB），離請求越近越快越小越易分叉；某層掛了要能退到下一層而非整鏈倒。（見 多層快取與優雅降級，領域 G）\n\n**與 AI 協作的工程工作流**：當寫程式一部分可委派給「會生成但不為結果負責」的協作者時，工作流須重新設計委派/驗收/信任邊界（原理層，不綁工具）。（見 與 AI 協作的工程工作流 / AI 怎麼移動判斷的天平，領域 T、U）\n\n**AI 輔助的大規模變更**：讓 AI 做「單調重複量大但每處判斷淺」的苦工，工作流要防它「製造一千個一致的錯誤」。（見 AI 輔助的大規模變更，領域 T）\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C · 延伸閱讀總地圖", "md": "# 附錄 C · 延伸閱讀總地圖\n\n這是全書各條目「延伸閱讀」的彙整，把散落各處的外部來源依主題分群成一張地圖。想深入某個領域時，從這裡找權威起點：RFC 與規格、奠基論文、官方文件、權威工程文章。同一連結若在多處出現，只列在最相關的領域一次。\n\n## A · 訊息交付與佇列\n\n- [Apache Kafka — Message Delivery Semantics（官方）](https://kafka.apache.org/documentation/#semantics)：at-most/at-least/exactly-once 三種交付語意的權威定義出處。\n- [You Cannot Have Exactly-Once Delivery（Brave New Geek）](https://bravenewgeek.com/you-cannot-have-exactly-once-delivery/)：為何網路上「交付」層面不可能真正 exactly-once 的清楚論證。\n- [The Two Generals' Problem（Wikipedia）](https://en.wikipedia.org/wiki/Two_Generals%27_Problem)：交付不可靠的根本不可能性結果，exactly-once 真相的理論底座。\n- [Exactly-Once Semantics Are Possible: Here's How Apache Kafka Does It（Confluent）](https://www.confluent.io/blog/exactly-once-semantics-are-possible-heres-how-kafka-does-it/)：Kafka 如何用 idempotent producer + 交易把「處理」做成 exactly-once。\n- [Designing robust and predictable APIs with idempotency（Stripe Engineering）](https://stripe.com/blog/idempotency)：冪等鍵在生產環境的設計，at-least-once 下避免重複處理的範本。\n- [Implementing Stripe-like Idempotency Keys in Postgres（brandur.org）](https://brandur.org/idempotency-keys)：用 Postgres 落地冪等鍵的具體實作與狀態機。\n- [RFC 9110 §9.2.2 Idempotent Methods（IETF）](https://www.rfc-editor.org/rfc/rfc9110.html#name-idempotent-methods)：HTTP 方法冪等性的規格定義。\n- [Stripe API — Idempotent requests（官方）](https://docs.stripe.com/api/idempotent_requests)：冪等鍵 header 與行為的 API 契約範例。\n- [IETF draft — The Idempotency-Key HTTP Header Field](https://datatracker.ietf.org/doc/draft-ietf-httpapi-idempotency-key-header/)：把冪等鍵標準化進 HTTP header 的草案。\n- [Amazon SQS — Using the message deduplication ID（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/using-messagededuplicationid-property.html)：FIFO 佇列用 dedup ID 做去重的具體機制。\n- [Apache Kafka — Idempotent Producer（KIP-98）](https://cwiki.apache.org/confluence/display/KAFKA/KIP-98+-+Exactly+Once+Delivery+and+Transactional+Messaging)：producer ID + 序號偵測重複的原始設計文件。\n- [Bloom Filters by Example](https://llimllib.github.io/bloomfilter-tutorial/)：去重常用的機率資料結構，互動式理解誤判率取捨。\n- [KIP-185: exactly once in order delivery per partition（官方）](https://cwiki.apache.org/confluence/display/KAFKA/KIP-185)：為何 idempotent producer 成為預設、以及它如何保 partition 內順序。\n- [Aiven — Does Apache Kafka really preserve message ordering?](https://aiven.io/blog/kafka-real-ordering)：重試與 in-flight 設定如何破壞順序的實務剖析。\n- [AWS — Amazon SQS FIFO queues（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/FIFO-queues.html)：message group ID 作為排序單位的機制。\n- [AWS Architecture Blog — Exponential Backoff And Jitter](https://aws.amazon.com/blogs/architecture/exponential-backoff-and-jitter/)：full / equal / decorrelated jitter 的對比實驗，退避設計的經典。\n- [Amazon Builders' Library — Timeouts, retries, and backoff with jitter](https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/)：重試放大與退避/jitter 的工程權衡。\n- [AWS — Amazon SQS dead-letter queues（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-dead-letter-queues.html)：DLQ 接住毒訊息的標準做法。\n- [RabbitMQ — Dead Letter Exchanges（官方）](https://www.rabbitmq.com/docs/dlx)：RabbitMQ 的死信路由機制。\n- [Confluent — Error Handling Patterns for Apache Kafka](https://www.confluent.io/blog/error-handling-patterns-in-kafka/)：retry topic 與 DLQ 的階梯式錯誤處理。\n- [Hector Garcia-Molina, Kenneth Salem — Sagas（SIGMOD '87）](https://dl.acm.org/doi/10.1145/38713.38742)：saga 與補償交易的原始論文，跨服務一致性的源頭。\n- [microservices.io — Pattern: Transactional outbox](https://microservices.io/patterns/data/transactional-outbox.html)：用 outbox 解 dual-write 問題的權威模式描述。\n- [microservices.io — Pattern: Saga](https://microservices.io/patterns/data/saga.html)：choreography vs orchestration 兩種 saga 編排的取捨。\n- [Microsoft — Saga distributed transactions](https://learn.microsoft.com/en-us/azure/architecture/reference-architectures/saga/saga)：補償語意的工程化參考架構。\n- [Stripe Docs — Check webhook signatures](https://docs.stripe.com/webhooks/signature)：webhook 簽章驗證的具體做法。\n- [GitHub Docs — Validating webhook deliveries](https://docs.github.com/en/webhooks/using-webhooks/validating-webhook-deliveries)：用 `X-Hub-Signature-256` 驗證 webhook 來源。\n- [webhooks.fyi](https://webhooks.fyi/)：webhook 安全與最佳實踐的目錄站。\n- [OWASP — Server Side Request Forgery Prevention Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Server_Side_Request_Forgery_Prevention_Cheat_Sheet.html)：webhook 端點易成 SSRF 標的時的防護清單。\n- [Protocol Buffers — Language Guide (proto 3)](https://protobuf.dev/programming-guides/proto3/)：field number、`reserved` 與向前後相容規則。\n- [Apache Avro — Schema Resolution](https://avro.apache.org/docs/1.12.0/specification/#schema-resolution)：Avro 讀寫 schema 解析與演進規則。\n- [Confluent — Schema Evolution and Compatibility](https://docs.confluent.io/platform/current/schema-registry/fundamentals/schema-evolution.html)：BACKWARD/FORWARD/FULL 與 TRANSITIVE 相容模式定義。\n- [Amazon SQS — message quotas（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/quotas-messages.html)：含 1 MiB 訊息上限等硬限制。\n- [Amazon SQS — visibility timeout（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-visibility-timeout.html)：可見性逾時與重投語意。\n- [Amazon SQS — payload size increases to 1 MiB（2025-08 公告）](https://aws.amazon.com/about-aws/whats-new/2025/08/amazon-sqs-max-payload-size-1mib/)：訊息上限調整的時效性來源。\n- [SQS FIFO queues exactly-once processing（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/FIFO-queues-exactly-once-processing.html)：FIFO 的去重視窗與一次處理語意。\n- [Amazon SQS — Standard vs FIFO queues（官方）](https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-queue-types.html)：兩種佇列的保證差異總表。\n- [Amazon SNS — message delivery for FIFO topics（官方）](https://docs.aws.amazon.com/sns/latest/dg/fifo-message-delivery.html)：SNS FIFO 的可投遞端點限制。\n- [Amazon SNS FIFO topics → SQS Standard（2023-09 公告）](https://aws.amazon.com/about-aws/whats-new/2023/09/amazon-sns-fifo-topics-message-delivery-sqs-standard-queues/)：fan-out 端點組合的能力更新。\n- [Introducing Amazon SNS FIFO（AWS Blog）](https://aws.amazon.com/blogs/aws/introducing-amazon-sns-fifo-first-in-first-out-pub-sub-messaging/)：SNS FIFO 的設計脈絡。\n- [Confluent — Transactions and Exactly-Once Semantics（課程）](https://developer.confluent.io/courses/architecture/transactions/)：Kafka 交易與 EOS 的官方教學。\n- [Exactly-once with Kafka transactions（Strimzi blog）](https://strimzi.io/blog/2023/05/03/kafka-transactions/)：在 Kubernetes 上跑 Kafka 交易的實作觀點。\n- [RabbitMQ — Consumer Acknowledgements and Publisher Confirms（官方）](https://www.rabbitmq.com/docs/confirms)：ack 與 confirm 如何決定 RabbitMQ 的交付保證。\n- [RabbitMQ Tutorials（官方）](https://www.rabbitmq.com/tutorials)：各 exchange 類型與路由模式的入門。\n- [AMQP 0-9-1 Model Explained（官方）](https://www.rabbitmq.com/tutorials/amqp-concepts)：exchange/queue/binding 的協定模型。\n- [BullMQ GitHub](https://github.com/taskforcesh/bullmq)：Redis-backed 延遲/任務佇列的現役維護版。\n- [Bull GitHub（legacy）](https://github.com/OptimalBits/bull)：BullMQ 的前身，理解設計沿革。\n- [BullMQ Documentation](https://docs.bullmq.io/)：任務佇列的官方文件與保證說明。\n- [Redis — Pub/Sub（官方）](https://redis.io/docs/latest/develop/interact/pubsub/)：fire-and-forget 發布訂閱、無持久化的交付特性。\n- [Redis — Streams intro（官方）](https://redis.io/docs/latest/develop/data-types/streams/)：持久化流與 consumer group 的對照面。\n- [Redis — XREADGROUP（官方）](https://redis.io/docs/latest/commands/xreadgroup/)：Streams 的 consumer group 語意與 pending 列表。\n\n## L · 資料同步與整合\n\n- [PostgreSQL — Logical Replication（官方）](https://www.postgresql.org/docs/current/logical-replication.html)：邏輯複製作為增量同步的核心機制。\n- [AWS DMS — full load + CDC（官方）](https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Task.CDC.html)：先全量再持續變更的遷移模式。\n- [Debezium 官方文件](https://debezium.io/documentation/reference/stable/)：log-based CDC 的架構與各家連接器。\n- [PostgreSQL — Logical Decoding 概念（官方）](https://www.postgresql.org/docs/current/logicaldecoding-explanation.html)：CDC 從 WAL 解出變更串流的底層原理。\n- [Using logs to build a solid data infrastructure（Confluent / Kleppmann）](https://www.confluent.io/blog/using-logs-to-build-a-solid-data-infrastructure-or-why-dual-writes-are-a-bad-idea/)：為何 dual-write 是壞主意、log 作為單一變更來源。\n- [Debezium — Outbox Event Router](https://debezium.io/documentation/reference/stable/transformations/outbox-event-router.html)：把 outbox 表變成事件流的具體轉換。\n- [Conflict-free Replicated Data Types（Shapiro et al., 2011）](https://hal.inria.fr/inria-00609399/document)：CRDT 的原始形式化，無需協調即收斂的條件。\n- [Dynamo: Amazon's Highly Available Key-value Store（DeCandia et al., 2007）](https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf)：版本向量、quorum、anti-entropy（Merkle tree）與 gossip 的奠基論文。\n- [Dotted Version Vectors: Logical Clocks for Optimistic Replication](https://arxiv.org/abs/1011.5808)：版本向量的改良，避免 false conflict。\n- [Apache Cassandra — Repair / anti-entropy（官方）](https://cassandra.apache.org/doc/latest/cassandra/managing/operating/repair.html)：對帳/修副本差異的生產實作。\n- [Merkle — A Digital Signature Based on a Conventional Encryption Function（1987）](https://link.springer.com/chapter/10.1007/3-540-48184-2_32)：雜湊樹的原始概念，對帳找差異的資料結構。\n- [PostgreSQL — Logical Replication Restrictions（官方）](https://www.postgresql.org/docs/current/logical-replication-restrictions.html)：明列不複製 DDL 等異質同步陷阱。\n- [AWS — Multi-Region application fundamentals（官方）](https://docs.aws.amazon.com/whitepapers/latest/aws-multi-region-fundamentals/aws-multi-region-fundamentals.html)：跨區複製的設計考量。\n\n## B · 資料一致性、交易與複製\n\n- [Martin Kleppmann — Designing Data-Intensive Applications](https://dataintensive.net/)：複製、分片、編碼演進、資料模型的權威整理，全書多處的母本。\n- [Jepsen — Consistency Models](https://jepsen.io/consistency)：互動式一致性層級圖，光譜入門首選。\n- [Aphyr — Strong consistency models](https://aphyr.com/posts/313-strong-consistency-models)：把一致性模型講清楚的經典長文。\n- [Terry et al. — Session Guarantees for Weakly Consistent Replicated Data](https://www.cs.cornell.edu/courses/cs734/2000FA/cached%20papers/SessionGuaranteesPDIS_1.html)：讀己之寫/單調讀等會話保證的原始論文。\n- [Shopify Engineering — Read Consistency with Database Replicas](https://shopify.engineering/read-consistency-database-replicas)：複製延遲下保讀己之寫的工程做法。\n- [PostgreSQL — Hot Standby & replication（官方）](https://www.postgresql.org/docs/current/hot-standby.html)：讀副本與複製延遲的官方說明。\n- [PostgreSQL — Transaction Isolation（官方）](https://www.postgresql.org/docs/current/transaction-iso.html)：隔離級別、異常與 SSI/retry 要求的權威來源。\n- [Berenson et al. — A Critique of ANSI SQL Isolation Levels（1995）](https://www.microsoft.com/en-us/research/publication/a-critique-of-ansi-sql-isolation-levels/)：指出標準隔離異常定義歧義的經典。\n- [Jepsen — PostgreSQL 12.3](https://jepsen.io/analyses/postgresql-12.3)：隔離異常的實測分析。\n- [Jepsen — MySQL 8.0.34](https://jepsen.io/analyses/mysql-8.0.34)：MySQL RR 弱於 snapshot isolation 的實測。\n- [PostgreSQL — Concurrency Control / MVCC（官方）](https://www.postgresql.org/docs/current/mvcc.html)：多版本並發控制的內部機制。\n- [PostgreSQL — Routine Vacuuming（官方）](https://www.postgresql.org/docs/current/routine-vacuuming.html)：含 XID wraparound，MVCC 的維運代價。\n- [MySQL — InnoDB Multi-Versioning（官方）](https://dev.mysql.com/doc/refman/8.4/en/innodb-multi-versioning.html)：InnoDB 的 MVCC 實作。\n- [MySQL — InnoDB Locking（官方）](https://dev.mysql.com/doc/refman/8.4/en/innodb-locking.html)：record/gap/next-key 鎖的機制。\n- [MySQL — Deadlocks in InnoDB（官方）](https://dev.mysql.com/doc/refman/8.4/en/innodb-deadlocks.html)：死結偵測與 wait-for graph。\n- [PostgreSQL — Explicit Locking（官方）](https://www.postgresql.org/docs/current/explicit-locking.html)：`SELECT FOR UPDATE` 等顯式鎖，跨 runtime 原子性也常引此。\n- [MySQL — InnoDB Transaction Isolation Levels（官方）](https://dev.mysql.com/doc/refman/8.4/en/innodb-transaction-isolation-levels.html)：MySQL 各隔離級別的行為。\n- [PostgreSQL wiki — Serializable Snapshot Isolation](https://wiki.postgres ：git-flow 原文，含作者後來對持續交付的註記。\n\n## T · 工程實踐與團隊推動\n\n- [Martin Fowler — Strangler Fig Application](https://martinfowler.com/bliki/StranglerFigApplication.html)：漸進替換而非一次切換的思維底層。\n- [Martin Fowler — Parallel Change](https://martinfowler.com/bliki/ParallelChange.html)：expand-contract 的記述與定名，用於流程與資料遷移。\n- [Microsoft Azure — Strangler Fig pattern](https://learn.microsoft.com/en-us/azure/architecture/patterns/strangler-fig)：絞殺榕模式的工程化步驟說明。\n- [Software Engineering at Google（abseil.io）](https://abseil.io/resources/swe-book/)：大型組織讓慣例落地、設計文件運作的文化與流程章節。\n- [Spotify — Golden Paths to Solve Fragmentation](https://engineering.atspotify.com/2020/08/how-we-use-golden-paths-to-solve-fragmentation-in-our-software-ecosystem/)：golden path / 鋪路概念的原始出處。\n- [Netflix Technology Blog](https://netflixtechblog.com/)：自由與責任文化下 paved road 引導而非強制的脈絡。\n- [Backstage](https://backstage.io/)：Spotify 開源、捐給 CNCF 的開發者入口，golden path 的工具載體。\n- [Oxide Computer — RFD Process](https://rfd.shared.oxide.computer/rfd/0001)：一套公開可參考的工程 RFC 流程實作。\n- [RFC 7282 — On Consensus and Humming in the IETF](https://www.rfc-editor.org/rfc/rfc7282)：「徵求意見」傳統與「粗略共識」判準的源頭。\n- [Google — Engineering Practices Documentation](https://google.github.io/eng-practices/)：code review 與自動化把關如何分工。\n- [Conventional Commits 1.0.0](https://www.conventionalcommits.org/en/v1.0.0/)：可被 CI 自動強制的 commit message 慣例規格。\n- [pre-commit framework](https://pre-commit.com/)：跨語言的提交前檢查框架。\n- [Michael Nygard — Documenting Architecture Decisions（2011）](https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions)：ADR 的原始提案。\n- [Martin Fowler — Architecture Decision Record](https://martinfowler.com/bliki/ArchitectureDecisionRecord.html)：ADR 的概念與適用。\n- [adr.github.io](https://adr.github.io/)：ADR 社群索引與多種範本（Nygard、MADR…）。\n- [Ward Cunningham — The WyCash Portfolio Management System（1992）](https://c2.com/doc/oopsla92.html)：技術債比喻的原始出處。\n- [Martin Fowler — Technical Debt](https://martinfowler.com/bliki/TechnicalDebt.html)：技術債概念的整理。\n- [Martin Fowler — Technical Debt Quadrant](https://martinfowler.com/bliki/TechnicalDebtQuadrant.html)：技術債四象限分類（deliberate/inadvertent × prudent/reckless）。\n- [Fred Brooks — No Silver Bullet](https://en.wikipedia.org/wiki/No_Silver_Bullet)：本質複雜度無法被工具消除，框定 AI 能與不能省的部分。\n- [Hyrum Wright — Large-Scale Changes（SWE at Google ch.22）](https://abseil.io/resources/swe-book/html/ch22.html)：確定性大規模變更的分批與驗證實務。\n- [Refactoring at Scale（Maude Lemaire, O'Reilly）](https://www.oreilly.com/library/view/refactoring-at-scale/9781492075523/)：大規模重構的分批、驗證、回退策略。\n\n## U · 工程判斷與決策\n\n- [Amazon 2015 Letter to Shareholders](https://s2.q4cdn.com/299287126/files/doc_financials/annual/2015-Letter-to-Shareholders.PDF)：one-way / two-way doors 決策框架的原文。\n- [Martin Fowler — Sacrificial Architecture](https://martinfowler.com/bliki/SacrificialArchitecture.html)：刻意設計成可丟棄的系統。\n- [xz Utils 後門 CVE-2024-3094（CISA 通報）](https://www.cisa.gov/news-events/alerts/2024/03/29/reported-supply-chain-compromise-affecting-xz-utils-data-compression-library-cve-2024-3094)：供應鏈攻擊解剖，自建 vs 採用的風險案例。\n- [OWASP — Software Component Verification Standard](https://owasp.org/www-project-software-component-verification-standard/)：相依盡職調查的框架。\n- [Martin Fowler — Yagni](https://martinfowler.com/bliki/Yagni.html)：YAGNI 的精準定義與適用邊界。\n- [Knuth — Structured Programming with go to Statements（1974）](https://dl.acm.org/doi/10.1145/356635.356640)：「過早最佳化是萬惡之源」的原文脈絡。\n- [Dan McKinley — Choose Boring Technology](https://mcfunley.com/choose-boring-technology)：「無聊技術」與創新額度的經典論述。\n- [ThoughtWorks Technology Radar](https://www.thoughtworks.com/radar)：技術成熟度與採用建議的持續評估框架。\n- [The Fallacies of Distributed Computing（Wikipedia 整理）](https://en.wikipedia.org/wiki/Fallacies_of_distributed_computing)：為何對網路錯誤不處理會悄悄壞掉。\n- [Joe Duffy — The Error Model](http://joeduffyblog.com/2016/02/07/the-error-model/)：recoverable error vs bug 的分類哲學長文。\n- [Google DORA — 2024 research on AI in software development](https://dora.dev/research/2024/dora-report/)：AI 對交付效能與品質的實證影響。\n- [Jeff Dean / Peter Norvig — Latency Numbers Every Programmer Should Know（互動版）](https://colin-scott.github.io/personal_website/research/interactive_latency.html)：量級估算的錨點數字，可看隨年份演進。\n- [Simon Eskildsen — napkin-math](https://github.com/sirupsen/napkin-math)：持續更新的當代硬體吞吐/成本錨點。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "《名詞底下》時效性事實基準（2026-06）", "md": "---\nlast_verified: 2026-06-21\nreview_after_days: 120\npurpose: 本書時效性事實基準。章節遇到版本/語意/狀態類事實以此檔為錨；查證後有修正先改這裡。\n---\n\n# 《名詞底下》時效性事實基準（2026-06）\n\n本檔逐項驗證書中倚賴的「會隨時間漂移」的技術事實。每節格式：**結論** → **來源** → 必要時加 ⚠️。\n語意類（at-least-once、snapshot isolation 等）相對穩定；版本／價格／維護狀態／授權類最易腐，引用時務必標日期。\n\n最關鍵的「老化事實」（履歷／作者很可能記成舊版的）集中在：Twilio Video 關閉論點已被官方撤回、Redis 改授權＋Valkey 分裂、Bull→BullMQ、Clinic.js 已停止積極維護、OAuth 2.1 仍是 draft、Prisma 7 已去 Rust、Fluent Bit 已到 v5。\n\n---\n\n## 1. Amazon SQS — 投遞語意與上限\n\n**結論：** Standard queue 為 at-least-once delivery、可能 duplicates、best-effort ordering；FIFO queue 在 5 分鐘 deduplication window 內提供 exactly-once processing、strict ordering。Visibility timeout 預設 30s、最大 12h、最小 0s；DLQ 支援；message retention 預設 4 天、最小 60s、最大 14 天（1,209,600s）。FIFO 預設吞吐為每 partition 每秒 300 非批次／3,000 批次；high throughput mode 在主要 region 可達約 70,000 messages/s（批次，region-dependent）。\n\n⚠️ **老化事實（需更正）：** SQS 單則訊息上限現為 **1 MiB（1,048,576 bytes）**，不是常被記得的 256 KB。**年份校正（2026-06-21，兩來源確認，原稿誤記 2022）**：256 KB 上限存在很久，AWS 於 **2025-08-04** 才把單則上限提升到 1 MiB（來源：AWS what's-new 公告＋多家同日第三方報導）。對讀者（2019–2024 在職）而言「256 KB」在當年是**正確**的，是世界 2025 才變——這是一個「記憶當年沒錯、世界後來變了」型的老化事實，不是「你一直記錯」。超過上限用 Extended Client Library 把 payload 放 S3、最大 **2 GB**。high throughput FIFO 的精確 TPS 隨 region 變動，引用時宜標「最高約 70,000 msg/s（批次，主要 region），region-dependent」而非單一全域數字。\n\n**來源：**\n- https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/quotas-messages.html\n- https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/high-throughput-fifo.html\n- https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/FIFO-queues-exactly-once-processing.html\n\n---\n\n## 2. Amazon SNS — fan-out 與 FIFO\n\n**結論：** SNS 的 fan-out（一個 topic 扇出多個訂閱端）為核心模式；**SNS→SQS fan-out 是標準推薦架構**。**SNS FIFO topics 確實存在**，提供 strict ordering 與 deduplication，可投遞到 SQS FIFO queue（保留 ordering / exactly-once），也可（2023-09 起）投遞到 SQS Standard queue（降級為 best-effort ordering / at-least-once 以省成本）。SNS FIFO 不能直接投遞給 email/SMS/HTTP(S)/mobile/Lambda，須先經 SQS。訂閱端不可用時 SNS 執行 delivery retry policy，並可搭 DLQ 保存最終未送達訊息。\n\n**來源：**\n- https://docs.aws.amazon.com/sns/latest/dg/fifo-message-delivery.html\n- https://aws.amazon.com/blogs/aws/introducing-amazon-sns-fifo-first-in-first-out-pub-sub-messaging/\n\n---\n\n## 3. Redis Pub/Sub vs Streams 語意\n\n**結論：** Redis Pub/Sub 是 fire-and-forget、at-most-once、無持久化：訊息只送給「發佈當下正連線」的 subscriber，離線者永久錯過、無 replay、無 consumer tracking。Redis Streams 相反——訊息持久化為 append-only log，透過 consumer group（`XREADGROUP`）達 at-least-once，需 `XACK` 明確確認；未確認訊息留在 Pending Entries List，consumer crash 後可重讀或被他人接手。\n\n**來源：**\n- https://redis.io/docs/latest/develop/use-cases/streaming/\n- https://redis.io/docs/latest/commands/xreadgroup/\n\n---\n\n## 3b. Redis 授權演進與 Valkey 分裂（load-bearing 老化事實）\n\n**結論：** 授權演進：Redis 2024-03 從 BSD-3-Clause 改為雙授權 SSPLv1 / RSALv2；2025-05 在 **Redis 8** 加入 **AGPLv3**，成為三授權（tri-license：RSALv2 或 SSPLv1 或 AGPLv3，三選一），其中只有 AGPLv3 是 OSI 認可的開源授權。產品名自 8.0 起為「Redis Open Source」，RediSearch/RedisJSON 等模組已併入核心並同受三授權。**當前 Redis 已是 8.x**（最新穩定版約 8.8.0，2026-05-25；另有 8.6.x／8.4.x／8.2.x 維護分支），**不是 7.x**。\n\nValkey fork：由 Linux Foundation 主導、2024 自 **Redis 7.2.4** fork、採 BSD-3-Clause。當前狀態：9.0 GA 於 2025-10-21，**最新穩定版 9.1.0（2026-05-19）**；採每年一個大版本節奏。主要 Linux distro（Fedora、Debian、Ubuntu、Arch、openSUSE 等）與雲端（AWS ElastiCache、Google Memorystore for Valkey 9.0 GA）已普遍轉向 Valkey。\n\n⚠️ **引用注意：** 書若仍寫「Redis 是 BSD / 仍在 7.x」即過時。distro 的「精確版本號」（Fedora 42／Ubuntu 26.04／Debian 13 等）與部分廠商效能宣稱（「快 8%／省 20%／已遷數百萬節點」）多來自部落格而非官方逐一證實，引用時宜以「主要 distro 與雲端已普遍轉向 Valkey」概括，避免綁死單一版本號。\n\n**來源：**\n- https://redis.io/legal/licenses/\n- https://redis.io/blog/agplv3/\n- https://github.com/redis/redis/releases\n- https://github.com/valkey-io/valkey/releases\n- https://valkey.io/blog/introducing-valkey-9/\n\n---\n\n## 4. Redis internals — 單執行緒、I/O threads、持久化、驅逐\n\n**結論：** 指令**執行仍為單執行緒**（單一 main thread、原子性）。Redis 6.0+ 加入 threaded I/O（把網路 read/parse 與寫回 response 卸載到多執行緒），但**指令執行本身永遠不平行**。Redis 8 重寫了 I/O threading 實作、效能顯著提升（並用 AVX2/AVX-512 SIMD 加速 CRC64 等）。持久化：RDB（point-in-time 快照）vs AOF（append-only log，含 fsync 策略 always／everysec／no）。驅逐策略：`noeviction`（預設）、allkeys-lru、allkeys-lfu、volatile-lru、volatile-lfu、volatile-ttl、allkeys-random、volatile-random（八種核心）；**Redis 8.6 起再加 `volatile-lrm`／`allkeys-lrm`（Least Recently Modified，以改寫而非讀取為準），8.6+ 共十種**（來源 https://redis.io/docs/latest/develop/whats-new/8-6/）。\n\n⚠️ **易錯 nuance：** 即使在 Redis 8，`io-threads` **預設仍為 1（等於關閉）**，須手動設為 4–8 才生效（`io-threads-do-reads` 預設 off）。書中若稱「Redis 8 預設開啟 I/O threading」是錯的——應寫「Redis 8 強化了 I/O threading 能力，但仍需手動啟用」。\n\n**來源：**\n- https://redis.io/blog/redis-8-ga/\n- https://redis.io/blog/redis-8-0-m03-is-out-even-more-performance-new-features/\n\n---\n\n## 5. WebRTC — 標準狀態 / ICE-STUN-TURN / SDP / SFU-MCU-mesh / JVB\n\n**結論：** WebRTC 1.0 自 2021-01-26 成為 W3C Recommendation，至今仍是現行標準；W3C 後續以 amended Recommendation 重新發布（最新版日期 2025-03-13），故標準持續有效、未被取代。ICE 是 NAT 穿透的整體框架（蒐集 candidate、配對連通性）；STUN 發現自己經 NAT 映射後的 public IP/port；TURN 在直連失敗時作 relay 中繼。SDP offer/answer 為協商媒體能力的標準機制。拓樸三分法：mesh = P2P N×N、不可擴展；MCU = server 混流成單一 stream、CPU 重；SFU = server 選擇性轉發/路由各 stream、擴展性最佳。**Jitsi Videobridge（JVB）確實是 SFU**（官方 repo 自稱「WebRTC compatible video router or SFU」）。\n\n⚠️ **完整性提醒：** 若只寫「2021 W3C Recommendation」不算錯但不完整，可補「2025-03-13 amended Recommendation 仍為現行」。\n\n**來源：**\n- https://www.w3.org/press-releases/2021/webrtc-rec/\n- https://www.w3.org/TR/webrtc/\n- https://github.com/jitsi/jitsi-videobridge\n\n---\n\n## 6. Jitsi / Twilio Video / Agora（履歷前提需修正的最關鍵老化事實）\n\n**結論（Jitsi）：** 8x8 於 2018-10 自 Atlassian 收購 Jitsi，2026 仍由 8x8 維護，採 Apache 2.0。JVB 為現役活躍維護——`master` 最新 commit 至 2026-06（如改用 Jackson、Java 21 支援）。\n\n⚠️ **結論（Twilio Programmable Video）— 履歷假設已過時：** Twilio 最早在 **2023-12** 首次宣告 Programmable Video EOL（原訂約 2024-12 關閉）、2024-03 更新把 EOL 延到 **2026-12-05**，但於 **2024-10-21 公開撤回**，官方原文：「we've reversed our earlier decision to retire Twilio Video in 2026」「Twilio Video will remain a standalone product」。故 2026-06 現況是 Twilio Video **未關閉、仍是現役產品**。履歷／書中若寫「因 Twilio 即將關閉而選 Jitsi」**論點已不成立**，應改為純成本／自架掌控／開源授權角度（Jitsi 開源可自架、零授權費 vs Twilio/Agora 商用按量計費）。\n\n**結論（Agora）：** 仍為活躍商用 WebRTC/RTE 平台，2026 持續更新（Web SDK v4.24.x，release notes 有 2026-02 更新）。作為商用替代方案定位成立。\n\n⚠️ **陷阱：** jitsi-videobridge 的 GitHub Releases 頁面最後一個 tagged release 停在 2024-06，僅憑 release 頁會誤判已停更；實際活躍度須看 commits。任何用 release tag 判斷「是否停更」的敘述都會誤判。\n\n**來源：**\n- https://www.twilio.com/en-us/changelog/-twilio-video-will-remain-a-standalone-product\n- https://github.com/jitsi/jitsi-videobridge/commits/master\n- https://github.com/jitsi/jitsi-meet/blob/master/LICENSE\n- https://docs.agora.io/en/video-calling/overview/release-notes\n\n---\n\n## 7. TURN/STUN — coturn 與 RFC 編號\n\n**結論：** RFC 編號（以 IETF datatracker 為準）：STUN 原 **RFC 5389**，已被 **RFC 8489** obsolete；TURN 原 **RFC 5766**，已被 **RFC 8656** obsolete；ICE 原 **RFC 5245**，已被 **RFC 8445** obsolete。coturn 為事實上的開源 TURN/STUN server。TURN 在 STUN 失敗時改走 relay 的原因：**symmetric NAT** 的映射是依目的地而異（destination-specific），故對 STUN server 探到的 public mapping 對真正對端 peer 不適用、candidate 連不通，只能退而經 TURN server 中繼。\n\n**來源：**\n- https://www.rfc-editor.org/rfc/rfc8489.html\n- https://datatracker.ietf.org/doc/rfc5766/\n- https://www.rfc-editor.org/info/rfc8445/\n\n---\n\n## 8. coturn — 維護狀態與版本\n\n**結論：** coturn（github.com/coturn/coturn）2026 仍活躍維護；最新版約 **4.13.1（2026-06-15）**，近期版本含安全修補與 Linux UDP fast path（recvmmsg、UDP-GSO）等。\n\n⚠️ **易腐：** 版本號高頻變動，引用時建議標日期、視為易腐事實。\n\n**來源：**\n- https://github.com/coturn/coturn/releases\n\n---\n\n## 9. Fluent Bit — 版本、Lua filter、vs Fluentd、S3 輸出\n\n**結論：** Fluent Bit 在 2026-06 已進入 **v5.0** 系列（最新約 v5.0.7，2026-06-05）；v4.2 系列仍維護（v4.2.5）但支援於 2026-06-30 結束。**Lua scripting filter（config 名 `lua`）確認仍受支援、無棄用標記**，並在 v4.0.4+ 加入 OpenTelemetry metadata-aware callback 等新功能。Fluent Bit 為 C 撰寫的輕量代理；Fluentd 為 Ruby 核心＋gem plugin 生態；**兩者皆為 CNCF graduated**。典型 pipeline：input → parser → filter → output；輸出至 Amazon S3 用 `out_s3` plugin。\n\n⚠️ **老化事實：** 書中若寫「Fluent Bit v3.x／v4.x」需更新為「2026 已達 v5（v5.0.x），v4.2 維護至 2026-06-30」。Lua filter 確定未棄用。\n\n**來源：**\n- https://fluentbit.io/announcements/\n- https://docs.fluentbit.io/manual/data-pipeline/filters/lua\n- https://docs.fluentbit.io/manual/about/fluentd-and-fluent-bit\n\n---\n\n## 10. Node.js event loop / libuv\n\n**結論：** 截至 2026-06，Node.js active LTS 是 **Node 24（codename \"Krypton\"，active LTS 自 2025-10-28）**；Node 22（\"Jod\"）已降為 maintenance LTS，Node 26 為 current（非 LTS）。libuv 事件迴圈 phase 順序：**timers → pending callbacks → idle/prepare → poll（I/O）→ check（setImmediate）→ close callbacks**；microtask（先 `process.nextTick` queue、再 Promise microtask queue）在每個 phase 之間／每個 macrotask 之後排空。thread pool：**UV_THREADPOOL_SIZE 預設 4**，用於 fs、dns（`getaddrinfo`/`dns.lookup`）、async crypto（pbkdf2/scrypt 等）、所有 async zlib——但**不用於 network I/O**（network I/O 走 OS async 原語 epoll/kqueue/IOCP，在 loop 自己的單一執行緒上完成）。setTimeout 最小延遲會被 clamp，且 timer 只在迴圈走到 timers phase 時才觸發，故不精確。\n\n⚠️ **老化事實：** active LTS 已是 Node 24（Krypton），不是 Node 22（Jod）——2026-06 已換。書若寫 Node 18/20/22 為 active LTS 需更新。\n\n**來源：**\n- https://nodejs.org/en/about/previous-releases\n- https://github.com/nodejs/Release/blob/main/CODENAMES.md\n- https://docs.libuv.org/en/v1.x/design.html\n\n---\n\n## 11. Bull vs BullMQ\n\n**結論：** Bull（OptimalBits）已在 legacy/maintenance 模式（只收 bug fix、不加新功能）；**BullMQ 是以 TypeScript 重寫的活躍後繼者**，由 **Taskforce.sh** 維護，最新版約 v5.71.0（2026-03）。2026 的明確建議：新專案用 BullMQ；履歷上若仍列「Bull」即是老化事實，宜註明已轉 BullMQ。兩者有破壞性 API 變更（Queue/Worker 拆分、QueueEvents 類別、整數 job ID 不再允許等）。\n\n⚠️ **需修正的前提：** 找不到 Redis Ltd. 收購 Taskforce.sh / BullMQ 的證據——**不要寫「BullMQ 屬於／associated with Redis」**，應寫「由 Taskforce.sh 維護」。\n\n**來源：**\n- https://github.com/taskforcesh/bullmq\n- https://github.com/OptimalBits/bull\n\n---\n\n## 12. Clinic.js（明確的老化警示）\n\n**結論：⚠️ Clinic.js 已停止積極維護。** 由 NearForm 開發，官方 README 現直接寫「Clinic.js is not being actively maintained. Due to its strong ties to Node.js internals, it may not work or the results you get may not be accurate.」最後一個正式 release 是 **v13.0.0（2023-06-28）**，距今約 3 年；repo 未被 formally archived（仍 public）但實質 dormant/maintenance-only。其四工具仍是 **Doctor、Flame、Bubbleprof、Heap Profiler**。寫書務必把「未積極維護、可能與新版 Node 不相容」當關鍵警示，不要呈現為現役推薦工具。\n\n**來源：**\n- https://github.com/clinicjs/node-clinic\n- https://github.com/clinicjs/node-clinic/releases\n\n---\n\n## 13. k6 與 Vegeta\n\n**結論：** **Grafana k6**——Grafana Labs 於 2021 收購 k6，官方名稱即 Grafana k6；open source、Go 引擎、測試腳本以 JavaScript（現也支援 TypeScript）撰寫，授權為 **AGPLv3**（Grafana 系 2021 起由 Apache 2.0 改 AGPLv3）。積極維護中，最新主版本約 k6 2.0（2025-05）。**Vegeta**——tsenart 的 Go HTTP load testing tool（github.com/tsenart/vegeta），採 constant request rate（固定速率）模型，可作 CLI 或 Go library，仍維護中（最新約 v12.13.0，2025-10）。\n\n⚠️ **易錯：** k6 授權是 AGPLv3（非 Apache/MIT）；名稱應寫「Grafana k6」。\n\n**來源：**\n- https://github.com/grafana/k6/blob/master/LICENSE.md\n- https://grafana.com/blog/k6-2-0-release/\n- https://github.com/tsenart/vegeta\n\n---\n\n## 14. OAuth 2.0 / OAuth 2.1 + JWT + Introspection\n\n**結論：** OAuth 2.1（`draft-ietf-oauth-v2-1`）在 2026-06 **仍是 IETF Internet-Draft、尚未成為 RFC**；最新修訂 **draft-15（2026-03-02 發布，Standards Track，expires 2026-09-03）**。它整併 OAuth 2.0（RFC 6749）＋ BCP，四大變更：**PKCE 對所有用 authorization code flow 的 client 強制必要**、**移除 implicit grant**、**移除 Resource Owner Password Credentials（ROPC）grant**、**redirect URI 必須 exact string matching**。JWT（RFC 7519）走 short-lived access token（典型 15–60 分鐘）＋ long-lived refresh token；JWT 難以即時撤銷的根因是 **stateless / self-contained**，簽發到 expiry 前都有效，除非額外維護 denylist（而查 denylist 又抵銷本地自驗的好處，這正是要拆短命 access＋長命 refresh 的理由）。opaque/可撤銷 token 靠 **token introspection（RFC 7662）** 由 resource server 向 authorization server 即時查 active 狀態。\n\n⚠️ **措辭提醒：** 坊間「OAuth 2.1 Is Here」標題易被誤讀為已成 RFC。datatracker 為準——**仍是 draft**。書中請寫「2.1 仍在 draft 階段（draft-15，2026-06）」而非「OAuth 2.1 標準／RFC」。\n\n**來源：**\n- https://datatracker.ietf.org/doc/draft-ietf-oauth-v2-1/\n- https://oauth.net/2.1/\n- https://www.rfc-editor.org/rfc/rfc7662.html\n\n---\n\n## 15. PostgreSQL / MySQL(InnoDB) 隔離級別\n\n**結論：** PostgreSQL **預設 Read Committed**，以 MVCC 實作。關鍵 nuance（官方文件證實）：PG 的 **Repeatable Read 實際上是 Snapshot Isolation**——防 non-repeatable read 與 phantom read，但 **Serialization Anomaly 在該級別仍 Possible，即不防 write skew**。要防 write skew 須升到 **Serializable，PG 用 SSI（Serializable Snapshot Isolation）**：以 predicate locking 追蹤 read/write dependencies，偵測危險結構時以「could not serialize access due to read/write dependencies」中止交易，**應用程式必須準備 retry**（SSI 比其他級別昂貴）。`deadlock_timeout` **預設 1s**（衝突後先等這段時間才跑 deadlock detection）。對照 MySQL/InnoDB：**預設 REPEATABLE READ**，其 RR 是 **locking ＋ MVCC 混合**——用 **next-key lock（record lock ＋ 前方 gap lock）** 阻止 phantom；這與 PG RR（純 snapshot、不上鎖、不防 write skew）本質不同。\n\n⚠️ **並排呈現以防混淆：** PG「RR ≠ Serializable、不防 write skew」與 MySQL「RR 是預設且靠 next-key lock 防 phantom」是兩個容易被作者與讀者混為一談的對立事實。\n\n**來源：**\n- https://www.postgresql.org/docs/current/transaction-iso.html\n- https://www.postgresql.org/docs/current/runtime-config-locks.html\n- https://dev.mysql.com/doc/refman/8.4/en/innodb-transaction-isolation-levels.html\n- https://dev.mysql.com/doc/refman/8.4/en/innodb-next-key-locking.html\n\n---\n\n## 16. KrakenD（vs Kong / AWS API Gateway）\n\n**結論：** KrakenD 是以 **Go 寫的 stateless、declarative、高效能 API Gateway**，無 runtime database、靠啟動時讀 JSON 設定；招牌能力是 **native API aggregation**（合併多個 backend 回應、過濾/重塑欄位）。治理需精確：**並非整個 KrakenD 捐給基金會，而是其核心 framework 於 2021-05 捐成 Linux Foundation 主持的 `Lura Project`**；KrakenD Community／Enterprise 是 Lura engine 的兩個實作。2025-09 KrakenD（公司）被 Shop Circle 收購，仍維持團隊與路線，Lura framework 續留 Linux Foundation。對照：**Kong** 是 NGINX/OpenResty ＋ Lua plugin 架構、控制面有 DB（PostgreSQL/Cassandra）、plugin 生態為其強項（KrakenD 無 runtime plugin 系統）；**AWS API Gateway** 為全託管。\n\n⚠️ **一致性陷阱：** 說「KrakenD 是 CNCF 專案」會錯——它是 **Linux Foundation**（且嚴格說是其 framework Lura，非 KrakenD 本身）；別寫成「KrakenD 仍是獨立開源公司」（2025 起已屬 Shop Circle）。CNCF 與 LF 不可混用。\n\n**來源：**\n- https://www.krakend.io/open-source/\n- https://www.linuxfoundation.org/press/press-release/open-source-api-gateway-krakend-becomes-linux-foundation-project\n- https://github.com/luraproject/lura\n\n---\n\n## 17. AWS Lambda\n\n**結論：** 事件驅動執行模型、按 invocation 啟動 execution environment。帳號預設併發上限 **1,000（per region，可申請調高）**；reserved concurrency 可預留、provisioned concurrency 預先初始化環境降 cold start。Max timeout **900s（15 分鐘）**，預設 3s。Memory **128 MB–10,240 MB**；/tmp ephemeral storage 預設 512 MB、可調至 10,240 MB。**SnapStart 在 2026 已對 Java（11/17/21）、Python（3.12+）、.NET（8+）全部 GA**（Python/.NET 於 2024-11 GA），可去除約 70–90% init latency；Node.js、Ruby、OS-only、container image 不支援。Payload：**synchronous 6 MB**；**asynchronous 已從 256 KB 提升至 1 MB（2025-10-24 生效）**。\n\n⚠️ **老化事實：** 書若寫「async payload 256 KB」**已過時**——2025-10-24 起為 **1 MB**（sync 仍 6 MB）。這是本批最易悄悄過時的數字之一。\n\n**來源：**\n- https://aws.amazon.com/about-aws/whats-new/2025/10/aws-lambda-payload-size-256-kb-1-mb-invocations/\n- https://docs.aws.amazon.com/lambda/latest/dg/snapstart.html\n- https://docs.aws.amazon.com/lambda/latest/dg/gettingstarted-limits.html\n\n---\n\n## 18. AWS ALB vs API Gateway\n\n**結論：** **ALB**（L7 load balancer）以 target groups 為核心、支援 host/path/header-based routing，但不做 per-request request/response transformation、原生 auth 有限（OIDC/Cognito listener auth 可、但非 per-request fine-grained）、無原生 throttling（需搭 WAF 做 rate limiting）；成本走 LCU 模型，高吞吐下較便宜、延遲較低。**API Gateway** 提供 throttling（REST API 帳號預設約 10,000 RPS burst / 5,000 RPS steady-state per region）、auth（JWT / Lambda authorizers / IAM）、request transformation、usage plans，整體較貴。**HTTP API vs REST API**：HTTP API 較新、約便宜 70%、延遲較低、支援 JWT authorizer，但缺 VTL mapping templates、usage plans、API keys、private endpoints 等；REST API 功能最完整。經驗法則：需 VTL transform / usage plans / API keys → REST API；只要便宜快速 proxy + 簡單 JWT auth → HTTP API；純 L7 routing 到容器/EC2 且不需 per-request auth/transform → ALB。\n\n**來源：**\n- https://docs.aws.amazon.com/apigateway/latest/developerguide/api-gateway-request-throttling.html\n- https://aws.amazon.com/api-gateway/faqs/\n\n---\n\n## 19. Kubernetes CronJob\n\n**結論：** CronJob 為穩定資源（**batch/v1**，自 v1.21 GA），具 `schedule`（cron 格式）、`concurrencyPolicy`（**Allow / Forbid / Replace**）、`startingDeadlineSeconds` 等欄位。Missed-schedule：controller 計算自上次排程以來錯過次數，**超過 100 次則停止排程並記錄 error**（除非設了 `startingDeadlineSeconds`，此時改以該秒數窗口計算）。官方文件明確聲明 CronJob **非 exactly-once**——「在某些情況下，一個 job 可能被建立兩次，或一次都不建立」，故 job 應為 idempotent。\n\n**來源：**\n- https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/\n\n---\n\n## 20. Snyk\n\n**結論：** Snyk 是 developer-security platform，核心為 **SCA（software composition analysis，開源相依套件漏洞掃描，即 Snyk Open Source）**，並涵蓋 SAST（Snyk Code）、Container、IaC、API & Web (DAST)。2026 仍為商業 freemium：Free 層（各產品有測試次數上限）、Team 約 $25 per developer/月、Enterprise 客製報價；深度整合 IDE / Git / CI/CD，提供自動修復 PR。\n\n⚠️ **易腐：** 定價數字（$25/dev/月、free 配額）時效敏感，引用時標 2026-06 並以官網 pricing 頁為準。\n\n**來源：**\n- https://snyk.io/\n\n---\n\n## 21. Socket.io\n\n**結論：** Socket.IO 主程式庫當前為 **v4.x**（最新約 4.8.3，2025-12），仍活躍維護。相對 raw WebSocket 的差異：transport fallback（WebSocket 優先，v4.7+ 加入 WebTransport，最後退回 HTTP long-polling）、自動重連（指數退避 + heartbeat）、rooms、acknowledgements、namespaces。多節點水平擴展/跨實例 fan-out 由 **`@socket.io/redis-adapter`**（當前約 v8.3.0）提供，依賴 Redis Pub/Sub 在多台 Socket.IO server 間廣播封包；新部署另可用 Redis 7.0 sharded Pub/Sub 的 sharded adapter，或處理斷線重續的 Redis Streams adapter。\n\n⚠️ **小提醒：** redis-adapter 8.3.0 已發布約兩年，若書中強調「最新」宜寫「v8.x」而非綁死小版本。\n\n**來源：**\n- https://socket.io/docs/v4/redis-adapter/\n- https://www.npmjs.com/package/@socket.io/redis-adapter\n\n---\n\n## 22. WebSocket\n\n**結論：** WebSocket 由 **RFC 6455** 定義。Frame 結構含 opcodes（0x0 continuation、0x1 text、0x2 binary、0x8 close、0x9 ping、0xA pong），**client→server 的 frame 一律 masked**（32-bit masking key），server→client 則 MUST NOT mask；ping/pong 為 control frame，用於 heartbeat/keepalive（payload ≤ 125 bytes、不可分片）。橫向擴展問題：WebSocket 連線為 stateful/long-lived，多節點擴展需 **sticky session（session affinity）** ＋ pub/sub backplane 共享連線狀態／跨節點 fan-out。\n\n⚠️ **界定：** sticky session ＋ backplane 屬部署架構慣例，RFC 6455 本身不規範擴展策略。\n\n**來源：**\n- https://www.rfc-editor.org/rfc/rfc6455\n\n---\n\n## 23. Eventual Consistency / CAP / PACELC（歸屬精確性）\n\n**結論：** **CAP theorem 由 Eric Brewer 提出**（2000 PODC keynote 的 conjecture），**由 Seth Gilbert 與 Nancy Lynch 於 2002 形式化證明**（\"Brewer's Conjecture and the Feasibility of Consistent, Available, Partition-Tolerant Web Services\", ACM SIGACT News 2002）。**PACELC 由 Daniel Abadi 提出**——最早見於 2010 年部落格文章，於 **2012 年 IEEE Computer 論文**〈Consistency Tradeoffs in Modern Distributed Database System Design: CAP is Only Part of the Story〉(vol. 45, no. 2, pp. 37–42) 正式形式化。PACELC 擴展 CAP：**if Partition → 選 Availability 或 Consistency；Else（正常運作）→ 選 Latency 或 Consistency**。Eventual consistency：若無新更新，所有副本最終會收斂到同一值（換取高可用＋低延遲、犧牲即時強一致）。\n\n⚠️ **精確措辭：** PACELC 歸屬 Abadi 宜寫「2010 年部落格初提、2012 年 IEEE Computer 論文形式化」；勿把 Brewer（conjecture）與 Gilbert-Lynch（證明）混為一人。\n\n**來源：**\n- https://dl.acm.org/citation.cfm?id=2360959\n- https://www.cs.umd.edu/~abadi/papers/abadi-pacelc.pdf\n\n---\n\n## 24. Prisma ORM\n\n**結論：** Prisma 是 Node.js/TypeScript ORM：`schema.prisma` 宣告 schema、type-safe client、內建 migrations。最重大近期變更：**Prisma 已棄用 Rust query engine，改走 TypeScript/WASM 的 query compiler**——**Prisma 7（2025-11-19 發布）起，no-Rust 的 TS query compiler 為預設**，官方稱查詢最高約 3x 快、bundle 縮約 90%（約 14MB→1.6MB）。**當前 major 版本為 v7。** 連線池：Prisma Client 自帶 connection pool，但在 **serverless 下每個 function 實例各自開連線、auto-scale 時極易耗盡 DB 連線上限**，故需外部 pooler（**PgBouncer** 或 **Prisma Accelerate**）；代價是 transaction-mode pooling 下 session 狀態（prepared statements / advisory locks / temp tables）不跨 transaction 保留。\n\n⚠️ **老化事實：** 寫「Prisma 仍用 Rust query engine」已過時（那是 v6 及更早）。應以「v7（2026-06）已預設 Rust-free TS query compiler」表述；major 版本號最易 aging，建議標日期。\n\n**來源：**\n- https://www.prisma.io/blog/from-rust-to-typescript-a-new-chapter-for-prisma-orm\n- https://www.prisma.io/docs/postgres/database/connection-pooling\n\n---\n\n## ⚠️ 未能確認 / 需人工複查\n\n以下項目未能從一手官方來源逐字鎖定，或本質上會隨時間漂移，下次掃描（review_after_days 到期）時優先複查：\n\n1. **SQS synchronous payload 6 MB** — 多來源一致但 AWS Lambda agent 未逐字 fetch quotas 頁；高可信，建議直接 fetch Lambda quotas 頁定錨。（註：6 MB 屬 Lambda sync invoke 限制，非 SQS 本身。）\n2. **high throughput FIFO 的精確 TPS** — AWS 以「per API request TPS / per-partition 3,000 批次」表述、無單一全域數字；「約 70,000 msg/s（批次，主要 region）」為 region-dependent，引用須標 region。\n3. **Valkey distro 精確版本號**（Fedora 42／Ubuntu 26.04／Debian 13 等）與廠商效能宣稱（快 8%／省 20%／AWS 已遷數百萬節點）— 多來自部落格而非官方逐一公告；建議概括陳述，勿綁死數字。\n4. **BullMQ 與 Redis 的關係** — 未找到 Redis Ltd. 收購 Taskforce.sh / BullMQ 的證據；目前證據指向「由 Taskforce.sh 維護」。若書中需斷言歸屬，須另找官方併購公告，否則寫「Taskforce.sh 維護」。\n5. **Snyk 定價**（$25/dev/月、free 配額）— 時效敏感，以官網 pricing 頁為準、標查證日期。\n6. **OAuth 2.1 定案時程** — 仍是 draft-15，無確定 RFC 發布日；若書中要給讀者「預計何時定案」需另查 OAuth WG 的 last-call/IESG 時程，避免讀者把 draft 當凍結標準。\n7. **各專案最新 patch 版本號**（Redis 8.8.0、Valkey 9.1.0、coturn 4.13.1、Fluent Bit 5.0.7、BullMQ 5.71.0、Socket.IO 4.8.3、Vegeta 12.13.0 等）— 高頻變動，引用時一律標日期、視為易腐；本檔記錄的是 2026-06-21 當下狀態。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n《保證與取捨——後端與分散式系統的概念地圖》的維護基準。改任何時效性事實前，先讀這份；改完在文末掃描日誌記一行。\n\n## 本書性質與掃描重點\n\n- 通用概念參考書，**對象是一般資深工程師**（非特定作者）。掃描時優先確認：**沒有任何個人/特定公司系統洩漏**、**沒有「我以為 vs 實際」糾錯口吻**、**沒有指向其他書**、**沒有練習段**（這四項是改版紅線，見 style-guide「明確禁止」）。\n- 內容多為「機制與取捨」（低腐蝕），但夾帶一批**時效性事實**（版本/授權/產品狀態/預設值），這是最易老化的部分，集中列在下面脆弱事實清單。\n- 結構鐵律：每個 `##` 概念底下恰好六個 `###`（問題型：定義與原理/解法空間/各方案的保證與取捨/何時需要/常見誤解與陷阱/延伸閱讀；工具型：是什麼與內部機制/在哪些系統扮演什麼角色/保證與限制/跟替代品的取捨/常見誤解與陷阱/延伸閱讀）。標題逐字、不加括號註解。\n\n## 跨檔一致性基準\n\n- **術語**：照 style-guide「主要術語對照表」（partition＝分區、shard＝分片、queue＝佇列、cache＝快取…）。簡繁同形字（們/效/系/准/值）用 Python 逐字元比對、別用 shell grep 誤報。\n- **交付語意基準**（多檔引用，須一致）：SQS Standard＝at-least-once、SQS FIFO＝exactly-once（限流量上限內）、Redis Pub/Sub＝at-most-once（無持久化）、Redis Streams＝可重放、K8s CronJob＝非 exactly-once。改任一處要全書一致。\n- **owning 條目表**（同一主題機制只在 owning 條目深講一次，別處用「（見 X，領域 Y）」帶過）：見 outline.md「跨領域去重」表。改機制描述時只動 owning 條目，引用處不必同步機制、但若 owning 條目改名要更新引用。\n- **worked-example 數字是各條目自帶的示意設例**（標「假設/約/示意」），**非跨檔共享基準**，不必跨檔同步；但同一條目內的算術要自洽（掃描時用算術健全性檢查）。\n\n## 脆弱事實清單（高風險老化，逐項標了所在領域）\n\n時效性事實（標 `（2026-06）`），逐項以官方來源複查；重大修正（推翻基準）需**兩個獨立來源**。\n\n**A 級——版本/授權/產品狀態（最易腐，每次掃描必查）**\n1. SQS 單則 payload 上限 **1 MiB（自 2025-08-04）**——A3、A2（DLQ 保留期 14 天上限亦在此）。\n2. Bull 已停更、現役 **BullMQ**，維護方 Taskforce.sh（非 Redis 官方）——A3。\n3. Redis 授權三階段：BSD → SSPL/RSAL（2024）→ Redis 8 加回 AGPLv3（2025）；**Valkey** 為 Linux Foundation fork——G。版本號（Redis 8.x、Valkey 9.x）寫「8.x／9.x」不綁小版本。\n4. Redis 驅逐政策數量與名稱（含 volatile-lrm / allkeys-lrm，約 10 種 maxmemory-policy）——G。\n5. **OAuth 2.1 在 2026-06 仍是 IETF draft**（非 RFC）——F。\n6. AWS Lambda **SnapStart 支援的 runtime**（Java 支援；Node.js 現況須查）——J、S（冷啟動）。\n7. AWS API Gateway REST API 帳戶層預設 **10,000 RPS steady-state / 5,000 burst**——H。\n8. 觀測/品質工具現況：Clinic.js 維護狀態、k6（Grafana，2.0）、Vegeta 版本、Snyk 定價（$25/dev/月＋credit model 變動）——I2。\n9. 12-factor 現況（官方/Google 正在為容器・AI 時代改版，別當凍結標準）——Q。\n10. Temporal 現況（由 Cadence 原班人馬創立、持續活躍；版本/fork 年份不綁死）——K。\n11. Let's Encrypt 憑證效期 **90 天**——N。\n12. DynamoDB TTL 刪除延遲（約 48 小時內，敘述保守）——O。\n\n**B 級——預設值/數量級（中風險）**\n13. PostgreSQL `deadlock_timeout` 1s、MySQL `innodb_lock_wait_timeout` 50s——B1。\n14. PostgreSQL REPEATABLE READ＝snapshot isolation（不防 write-skew）、MySQL RR 比 SI 弱（Jepsen）——B1。\n15. PostgreSQL 18 skip scan 對最左前綴的鬆綁條件——B1。\n16. runc 預設 seccomp 封掉的 syscall 數（約 44，敘述用「約」）、Node V8 old-space heap 預設上限（約 2 GB，依版本/平台）——Q。\n17. TrueTime ε（典型約數毫秒、commit-wait 約 2ε）——M2。\n\n**C 級——歸屬與年份（低腐蝕，驗一次即可）**\n18. CAP＝Brewer 提出／Gilbert-Lynch 證明；PACELC＝Abadi——B2。\n19. Raft＝Ongaro-Ousterhout（2014）；Paxos＝Lamport；FLP＝Fischer-Lynch-Paterson（1985）；2PC 阻塞性＝Skeen——M1。\n20. Actor model＝Hewitt（1973）——D；consistent hashing＝Karger 等、jump hash＝Lamping-Veach——M2。\n21. RFC：HTTP semantics 9110、WebSocket 6455、HTTP/3 9114、QUIC 9000——A1/C/N。Idempotency-Key 仍是 IETF draft——A1。\n\n## 延伸閱讀連結\n\n各條目「延伸閱讀」放外部真實連結。部分連結（論文 PDF 鏡像、blog 永久連結）寫入時未逐一 WebFetch 驗活，標為穩定權威網域；下次大掃描時抽樣 fetch 確認可達，失效者改用 DOI 或官方鏡像。**不得指向作者的其他書。**\n\n## 掃描協定（「掃描書的時效性」＝執行這套）\n\n1. **紅線 grep**（必 0）：個人系統/糾錯/練習/他書（`NeoBards|LetsTalk|Bahwan`、糾錯口吻、`## 自我檢核`、書名號 `《》`）＋編輯註記（`待回填|本任務`）＋tool-call 殘留（`<\/?(content|invoke|parameter|antml)`）。\n2. **結構驗證**：每個 `##` 恰六個 canonical `###`（strip code fence → 比對六標題集合）。\n3. **lint**：`python3 ../../../tools/md-reader/lint_book.py book-src`（0 error；全量這字在資料同步語境是已裁定保留的 WARN 偽報）。\n4. **圖**：`python3 ../../../tools/md-reader/check_diagrams.py book-src`（0 suspicious）。\n5. **事實**：對脆弱事實清單逐項 WebSearch（反駁框架，找它是否已過時）；A 級每次必查、B/C 級抽查。修正後：更新對應條目 → 若動到 landscape 基準同步 landscape-2026-06.md → 文末記掃描日誌一行。\n6. **打包**：`build_reader.py web/book.config.json` → `build_shelf.py`；render check 抽一張 CJK box 圖。\n\n## 掃描日誌\n\n- **2026-06-21**：本書由舊個人書《名詞底下》就地重寫為通用概念書《保證與取捨》。27 領域檔（~150 條目）以平行 agent 產出；P3 結構/lint/圖全綠（per-entry 六段 0 偏離、lint 0 error＋2 個已裁定保留的「全量」WARN、check_diagrams 0 suspicious）；舊 chNN 移至 `_archive-personal-book/`。P4 跨 27 檔反駁框架事實查證（490 條事實確認）：套用 18 項事實修正＋6 項算術修正。重點——InnoDB 預設自 MySQL 5.5（非 8.0，唯一 high）、KrakenD 被 Shop Circle 收購為 2025-09（非 08）、DORA 第四指標更名於 2023（非 2024）、3PC 出處 Skeen 1981、IANA tz 去釘版（如 2026b）、Vegeta v12.13.0、RocksDB 11.0.x、Debezium/BullMQ 版本去釘、Avro 1.12、Go 1.25 GOMAXPROCS 轉 cgroup-aware、RFC 8656 與 Kleppmann/SRE-Book Ch.6 連結修正；算術——M2 Redlock（⌊N/2⌋+1）與 consistent-hashing 公式、M1 捨入、J 誤判率（250 ms≈1%／900 ms≈0.1%）、H 聚合往返數、E GiB 捨入。\n- **2026-06-21（逐章三重審）**：Claude 逐章 holistic 審（27 agent，concept/math/fact/structure/voice/clarity）＋ agy 逐章跨家族審（Gemini Flash High，逐項展示核對）＋ 15 條 web 爭點獨立複查。套用 **32 項修正**。重點事實——SQS FIFO 70k 是**非批次**數字、FIFO 預設 300/3,000 是**整佇列共用**非 per-group（per-group 需開 high-throughput mode）；K8s CronJob 漏跑只補**一個** Job、不批量回填；TCP+TLS 1.3 新連線＝**2-RTT**（非 1）；JS Temporal 預定納入 **ES2027**（非 2026）；DORA 第四指標更名於 **2023**、且 2024 重組分組；公開 CA 效期上限 **200 天**（2026-03 起，LE 自採 90）；Node 12+ V8 **container-aware**（old-space≈cgroup 上限一半）；Debezium **3.5.x**；DynamoDB TTL「數日內」非 48 小時；Redis io-threads **預設不卸載讀路徑**；OIDC ID Token 非「一律」非對稱（持 client_secret 可 HS256）；coordinated omission 由 Gil Tene **約 2013** 提出。概念——D 多核切塊≠SIMD、A2 Protobuf 範例改號自洽、MySQL SERIALIZABLE 用 FOR SHARE＋限 autocommit off。算術——G single-flight（20ms 窗內約 100 非 4,999）、G LRU 掃描需容量<鍵數、M1 99.28%、N L4 失衡 800 QPS。**verify-before-apply 擋下 2 個審稿偽陽**：Redis 8.6 LRM/10 策略與 Fluent Bit v4.2 EOL **書本正確、未改**。agy 對 L（及首輪 A3/I2）content-filter 回空（工具限制、已由 Claude＋web 複查覆蓋）。C 另補：推送訊息算術（1,000 筆/2s＝500/s、「請求數」改「推送訊息數」）與 MASK 措辭（cache poisoning）。**verify-before-apply 第 3 次擋下偽陽**：agy 誤指「Safari 26.4 是穿越版本、WebTransport 應在 Safari 17.4（2024）」——web 查證 Apple 2025 改年份制（Safari 26＝2025-09）、且 WebTransport 確實到 **2026-03 Safari 26.4** 才支援（達 baseline），**書本正確、未改**。脆弱事實清單應加：WebTransport baseline＝2026-03 Safari 26.4（易腐）。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名：《保證與取捨——後端與分散式系統的概念地圖》\n形態：**通用資深後端概念參考書**。約 **150 條目 / 22 領域 / 8 個 Part**。純觀念，無練習。每條照 `style-guide.md` 的五段模板；自足、不指向其他書；不提任何作者個人系統。\n\n> **改版說明**：取代舊個人書（`chNN-*.md` 作廢）。每個**領域**＝一個檔（大領域可切 2 檔）；每個概念是檔內一個 `##`。\n\n## 全書脊椎\n\n每一條都在回答同一件事：**你想要什麼保證（guarantee），你願意付什麼取捨（trade-off）。** 五段模板把它拆成：定義 → 解法空間 → 各方案的保證與取捨 → 何時需要 → 常見誤解與陷阱。\n\n## 兩副透鏡（Part 0 前置）\n\nT（推動）與 U（判斷）放最前面，當讀全書的眼鏡：讀每條技術概念時，同時想「我會怎麼**判斷/選**它（U）＋怎麼讓**團隊採用**它（T）」。T/U 並融入「與 AI 協作」維度（原理層，見 style-guide）。\n\n---\n\n## 完整 TOC\n\n標記：`[問]`＝問題條目（五段：定義/解法空間/保證對照/何時需要/誤解陷阱）；`[工]`＝工具條目（五段：是什麼機制/用法地圖/保證限制/替代取捨/誤解陷阱）。\n\n### Part 0 — 透鏡：怎麼判斷、怎麼推動\n\n**T 工程實踐與團隊推動**（檔 `T-driving-adoption.md`）\n- `[問]` 推動工具/慣例的採用（誘因、轉換成本、信任；top-down vs bottom-up vs 鋪路；含 AI 維度）\n- `[問]` RFC／設計文件流程\n- `[問]` 鋪路 paved road／golden path（讓對的做法＝最省力）\n- `[問]` 慣例的自動化強制（linter/formatter/CI gate/codegen）\n- `[問]` 漸進式遷移與淘汰（strangler、expand-contract 用在流程、退役舊東西）\n- `[問]` 架構決策紀錄 ADR\n- `[問]` 技術債管理（量化、排序、何時還/何時忍；含 AI 維度）\n- `[問]` **與 AI 協作的工程工作流**（什麼交給 AI、review gate、信任邊界、驗收）\n- `[問]` **AI 輔助的大規模變更**（codemod/遷移/重構：AI 做苦工、人定方向與驗收）\n\n**U 工程判斷與決策**（檔 `U-judgment.md`）\n- `[問]` 可逆 vs 不可逆決策（one-way / two-way doors）\n- `[問]` 自建 vs 採用 + 相依管理（何時加 dependency、供應鏈風險、NIH vs 過度相依）\n- `[問]` 簡單性 vs 過度 mbda（冷啟動/SnapStart/payload/併發）\n- `[問]` 無狀態 vs 有狀態（為什麼 serverless 要無狀態；「持久化是主動的、記憶體狀態重啟即失憶」也在此點明）\n- `[工]` K8s CronJob（schedule/concurrencyPolicy/非 exactly-once）\n- `[問]` 時間與排程（單調鐘 vs 牆鐘、漏跑/補跑）\n- `[問]` 失敗偵測（逾時是唯一手段、慢 vs 死）\n\n**Q 部署與發布**（檔 `Q-deployment.md`）\n- `[問]` blue-green / canary / rolling\n- `[工]` Docker（容器隔離原理）\n- `[工]` Kubernetes（Pod/Service/HPA 核心物件）\n- `[問]` IaC（宣告式、漂移、冪等 apply）\n- `[問]` 12-factor app（聚焦容器/serverless 時代哪些 factor 仍成立、哪些需更新：config/stateless/logs-as-streams）\n- `[問]` config 與機密管理\n\n### Part 7 — 觀測與營運文化\n\n**I 可觀測性與品質**（檔 `I-observability.md`）\n- `[問]` 三本柱 metric / log / trace\n- `[問]` 從 log 算 metric 的陷阱（取樣/遺漏/視窗）\n- `[問]` cardinality 爆炸\n- `[問]` SLI / SLO / error budget · p99/p999\n- `[問]` 告警設計（症狀 vs 原因、告警疲勞）\n- `[問]` 負載測試（開放 vs 封閉模型、coordinated omission）\n- `[問]` 分散式追蹤（trace context 傳播、span、取樣）\n- `[問]` 測試策略（unit / integration / contract / e2e；contract testing）\n- `[問]` 可觀測性與品質工具地圖（各類別選什麼、為什麼：日誌採集 FluentBit/Fluentd、Node 診斷 Clinic.js、負載測試 k6/Vegeta、相依掃描 Snyk——定位/現況/替代）\n\n**V 營運與事故文化**（檔 `V-ops-culture.md`）\n- `[問]` 事故應變與無咎事後檢討（incident response、blameless postmortem、runbook）\n- `[問]` SRE 文化（toil、error budget 當談判工具、SLO-driven）\n- `[問]` DORA 四指標（deploy frequency / lead time / MTTR / change failure rate）\n- `[問]` 程式碼審查（審什麼、怎麼給/收回饋、它在保護什麼）\n- `[問]` 分支與發布策略（trunk-based vs git-flow，配 CD）\n\n---\n\n## 每條目模板（照 style-guide「五段模板」；此處不重複，僅提醒）\n\n- 問題條目：`### 定義與原理` / `### 解法空間` / `### 各方案的保證與取捨` / `### 何時需要` / `### 常見誤解與陷阱` / `### 延伸閱讀`\n- 工具條目：`### 是什麼與內部機制` / `### 在哪些系統扮演什麼角色` / `### 保證與限制` / `### 跟替代品的取捨` / `### 常見誤解與陷阱` / `### 延伸閱讀`\n- 每條 ≥1 具體案例：技術條目（A–S、V 技術面）帶真實數字的 worked example；判斷/實踐/文化條目（T、U、V 軟性面）用具體情境/案例代替數字（見 style-guide）。對照表是招牌；可貼不可執行 pseudo-code。\n\n## 檔案與命名規範\n\n- **一個領域一個檔**，命名 `<領域字母>-<英文 slug>.md`（如 `A1-delivery-semantics.md`、`M2-coordination-time.md`）。**目標每檔 ≤7 條，方便一個 agent 寫好一檔**：A（17 條）切 3 檔、B（13 條）切 2 檔、M（10 條）切 2 檔、I（9 條）切 2 檔；其餘領域一檔即可。\n- 領域檔開頭 `# <字母> — <領域名>`＋前言；每概念 `##`；五段 `###`。**切多檔的領域，每檔 h1 用子題區分**（如 A 三檔：`# A · 交付語意與重複處理`、`# A · 順序、重試與跨服務交付`、`# A · 訊息工具對照`），別三檔同名，否則 reader 側欄分不開。\n- reader 設定 `book.config.json` 依 Part 0→7 順序把領域檔分組（groups 標題＝Part 名）。\n- **閱讀/打包順序微調（reviewer 採納，config 依此排）**：L（資料同步）歸入 **Part 2**（與 B/O/G 同組，因它與一致性/對帳同源）；**Part 3 順序為 N → C → H → F**（網路基礎先於即時傳輸、身分緊鄰 API）。outline 上方 TOC 的區塊位置未動，以本行為準。\n- 附錄（全部寫完後編）：`appendix-A-guarantee-cheatsheet.md`（保證速查：問題×各工具保證一覽）、`appendix-B-glossary.md`（術語表）、`appendix-C-reading-map.md`（外部延伸閱讀總地圖）。\n\n## 跨領域去重：owning 條目（避免平行 agent 把同一主題寫兩次）\n\n同一主題在兩處出現時，**機制/原理只在 owning 條目深講一次，另一處從自己的角度切入、用「（見 X）」帶過、不重講機制**：\n\n| 主題 | owning（深講） | 另一處（只引用） |\n|---|---|---|\n| 連線池 connection pool | **N**「連線池」（機制與語意） | S「連線池調校」只講調參/監控 |\n| 時間/時鐘 | **M**「邏輯時鐘與排序」＋「時間與日期處理」 | J「時間與排程」只講排程觸發語意（單調鐘量逾時、漏跑/補跑） |\n| outbox | **A**「outbox/saga」（交付機制） | L「dual-write→outbox」從資料同步角度引 A |\n| 對帳/最終一致 | 對帳機制 **L**「reconciliation」 | B「最終一致·補償·對帳」只講一致性模型面 |\n| 冷啟動 | **S**「冷啟動與暖機」（通用機制） | J「Lambda」只點 Lambda 特有的 SnapStart 等 |\n| 負載均衡/ALB | LB 機制 **N**「負載均衡 L4 vs L7」 | H「ALB vs API Gateway…」從 API 閘道角度比 |\n| 複製/分片 | 策略 **M**「複製策略」「consistent hashing」 | B「複製延遲」「分片」講一致性後果與 DB 操作面 |\n| schema 變更 | 協定相容 **A**「序列化與 schema 演進」；DB 結構 **B**「零停機 schema 遷移」 | 兩者互引、各守一面 |\n| rate limiting / 限流 | 機制 **E**「rate limiting」 | H「API gateway 的角色」只講「閘道層做限流」、引 E |\n| 降級 fallback | 通用 **P**「fallback · 降級」 | G「多層快取與優雅降級」只講快取層降級、引 P |\n| 冪等 idempotency | 定義/原理 **A**「冪等」 | B「樂觀並發控制」、M「分散式鎖/2PC」、Q「IaC 冪等 apply」只引用、不重講定義 |\n| 重試/退避/jitter | 做法 **A**「重試、退避、jitter」 | E「retry storm」講放大機制、P「timeout/budget」只引做法 |\n| circuit breaker | 三態機制 **E**「circuit breaker」 | P「fallback·降級」引它當觸發機制、不重講三態 |\n| health check | 機制/定義 **P**「health check」 | J「失敗偵測」講分散式視角、Q「K8s」只點 probe 設定語意 |\n| event sourcing / CQRS | 原理 **K**「Event sourcing 與 CQRS」 | A「Kafka」只說 log 天然支援 ES、L「CDC」引 K |\n| Protobuf 序列化 | **A**「序列化與 schema 演進」 | N「gRPC/Protobuf」只講 gRPC 怎麼用 Protobuf 當 IDL＋傳輸語意 |\n| Redis 內部 | **G**「Redis」 | A「Redis Pub/Sub vs Streams」只講交付語意差異、引 G |\n\n## 全域不涵蓋（守住核心，任何條目都不展開）\n\n- **特定應用域**：feed/timeline 設計、推薦/搜尋排序、串流處理、資料湖/倉、向量資料庫、ML serving、邊緣運算。\n- **範圍外**：前端/行動端/UI、DevOps 工具鏈品牌操作、特定雲廠牌 console 操作、敏捷/Scrum 流程、估點方法論、職涯階梯/影響力/招募/績效。\n- **資安只收與本書主題交界的**：TLS/mTLS 當傳輸協定（N）、config/secrets 當部署實踐（Q）、JWT/OAuth/RBAC 當身分（F）——這些**在範圍內**。**不收**：加密演算法內部、注入/XSS/CSRF 等應用層攻防、KMS/HSM 進階機密、滲透測試。\n- **絕對禁止**（見 style-guide）：作者個人系統/履歷、糾錯口吻、指向其他書、練習段、AI 工具版本。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一條目都必須遵守，否則整本會失去一致性。\n書名：《保證與取捨——後端與分散式系統的概念地圖》。\n\n> **重大改版（2026-06-21）**：本書從「挖作者履歷系統的個人書」**整個重新定位**成「**給一般資深工程師的通用概念參考書**」。舊的 `chNN-*.md`（個人書 20 章）一律作廢、將被新的領域檔取代。寫作前務必理解這個轉向，別把舊書的個人化口吻帶進來。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本**通用的後端與分散式系統概念地圖**。對每一個概念/工具，回答四件事再加一個防雷：**它保證什麼／解什麼問題 → 有哪些解法（解法空間）→ 不同工具給什麼保證與坑（對照）→ 什麼時候需要這種保證 → 常見誤解與陷阱**。讀者讀完一條，腦中要有「這個問題的**整張選項地圖**與取捨」，不是單一答案。\n- **不是**：\n  - **不是個人書**。**完全不提任何特定作者的系統、公司、履歷、經歷**。沒有「你當年做的那個版本」「你的結算 pipeline」這種錨點。對象是**所有人**。\n  - **不是糾錯書**。**禁用「我以為 vs 實際」「老兵記憶會過時」這類『預設讀者記錯』的裝置**（這是舊版被推翻的主因）。讀者是懂行的同儕，平視對話，不打臉。\n  - **不是教學書**。讀者是**資深工程師**：不從零解釋什麼是資料庫、HTTP、交易。每個概念**從定義講起，但直接切深水區**，不鋪基礎。\n  - **不是自足以外的書**。**不指向任何其他書**（不寫「數學見《等待的數學》」「故障見《正常意外》」）。需要的深度就在本書內把它講到夠、或點到為止用外部權威來源（RFC/論文/官方文件），但**不外包給作者的其他著作**。\n  - **不含練習**。沒有「紙上推演／自我檢核」段。它是參考書，不是習題本。\n- **全書脊椎（每條都在回答）**：保證（guarantee）與取捨（trade-off）。書名就是脊椎——每個概念底下都是「你想要什麼保證、你願意付什麼代價」。\n\n## 讀者是誰\n\n唯一假設：**一般資深後端／軟體工程師**（不特指任何人）。\n\n- **預設已具備**：會寫程式、熟悉基本 web/HTTP/資料庫/並發/雲端的工作級使用。不要解釋這些是什麼。\n- **本書提供的**：把每個概念**從定義講到機制、講到取捨、講到陷阱**的深度——資深讀者「會用但沒系統化想過底層與選項空間」的那一層。\n- **語氣**：工程師對工程師、平視、有觀點。不諂媚、不打臉、不喊口號。\n\n## 兩副閱讀透鏡（Part 0 的 T/U 前置存在的理由）\n\nT（工程實踐與團隊推動）與 U（工程判斷與決策）放在最前面，是刻意的：讀者讀**後面每一條技術概念**時，要同時戴著兩副眼鏡——\n- **U 的眼鏡**：我會怎麼**判斷/選**它？（建vs買、簡單性、退場成本…）\n- **T 的眼鏡**：我會怎麼讓**團隊採用**它？\n\n技術條目不必每條都明寫這兩副眼鏡，但全書的編排假設讀者已先讀過 T/U。\n\n## 每條目的模板（六個 `###`＝五段內容＋延伸閱讀；必守，標題照抄，lint 會 grep）\n\n每個領域檔 = 一個 `# <領域字母> — <領域名>`（h1）＋簡短前言，其下每個概念是一個 `## <概念名>`（h2）。每個 `##` 概念底下，依類型用下面**其中一組** `###` 小標：\n\n**問題條目（`[問]`）**——標題照抄：\n1. `### 定義與原理` — 它是什麼、解什麼問題、第一原理。\n2. `### 解法空間` — 處理它的**所有**辦法（不只一種），條列＋一句機制。\n3. `### 各方案的保證與取捨` — 把解法空間的各方案（工具／做法／變體）並排對照：各給什麼保證、各有什麼坑、各適合什麼（對照表）。**很多概念/判斷條目沒有「工具」——這一段就是「做法對照」，別硬湊工具或品牌。**\n4. `### 何時需要` — 決策框架：什麼場景要這種保證、什麼場景是 over-engineering。\n5. `### 常見誤解與陷阱` — 最容易誤解/踩雷的點。\n6. `### 延伸閱讀` — 外部真實連結（RFC/論文/官方文件）。\n\n**工具條目（`[工]`）**——標題照抄：\n1. `### 是什麼與內部機制` — 它本身是什麼、底層怎麼運作。\n2. `### 在哪些系統扮演什麼角色` — 用法地圖：它在 cache/lock/queue/… 各被用來幹嘛。\n3. `### 保證與限制` — 它給的保證、它的硬限制。\n4. `### 跟替代品的取捨` — 跟同類工具並排比（對照表）。\n5. `### 常見誤解與陷阱`\n6. `### 延伸閱讀`\n\n兩組共用的固定錨點是 `### 常見誤解與陷阱` 與 `### 延伸閱讀`（每條都必有，lint 抓這兩個最穩）。\n\n## AI 協作維度（只在 T/U，原理層）\n\n- T 與 U 的每一條，在 `### 解法空間`／`### 常見誤解與陷阱` 裡**多問一句「AI 在這件事裡能做什麼、又帶來什麼新陷阱」**（例：技術債→AI codemod 能還也能製造「能跑沒人懂」的債）。\n- T/U 另含 3 條**專門**講 AI 協作的條目（見 outline）。\n- **鐵律：只寫原理層，不寫工具版本**——講委派/驗收/review gate/信任邊界/新故障模式，**不**講「用某 model／某 IDE」。AI 工具再換代也不腐。\n- 技術領域（A–S）**不**強加 AI 維度（避免發散）；V 雖是軟性領域，但其「程式碼審查」「事故應變」等條目可在陷阱段點一句 AI 的影響，非必要。\n\n## 深度標準\n\n- **每條至少一個具體案例**（不准用任何特定作者的系統當例子）。**技術條目（A–S）帶真實數字的 worked example**——例：交付語意手算「10 萬則訊息、broker 重投率 0.1% → 約 100 筆重複」。**判斷/實踐/文化條目（T、U、V——V 全是軟性條目）用具體情境/案例代替數字**（如「一個三人小團隊要導入新 lint 規則」的推演），不硬湊數字。\n- **允許不可執行的 pseudo-code／設定片段**追邏輯（資深讀者想看碼）；標清楚是示意、不保證可跑。程式碼與註解一律英文。\n- **每條都要有「保證 + 適用條件 + 坑」**：禁止給「最佳實踐」口號而不講它在什麼條件下成立、什麼條件下騙你。這是本書與「背名詞」的根本差別。\n- **決策框架優先於教條**：什麼時候用 A、什麼時候用 B——給判準，不給「就用 X」。\n- **嚴謹度誠實標示**：分清「規格保證的」「常見實作的行為」「我的判斷/觀點」。別把某工具的行為當成所有同類都這樣。\n- 對照表是本書招牌：工具 × 保證 × 注意事項。沒有「注意事項」欄的對照表是危險品。\n- 寧深勿廣、不灌水。長度不限——該深就深，但每段都要有資訊量。\n\n## 事實正確性\n\n- 時效性事實（版本、產品狀態、授權、預設值、交付語意）標時點 `（2026-06）`，並以可查證的官方來源為準；寫條目時自行 WebSearch/WebFetch 查證（每條 3–8 次）。\n- **延伸閱讀只放外部真實連結**（RFC / 論文 / 官方文件 / 權威技術文章）；**不指向作者的其他書**。沒把握的連結標「（未驗證）」或不收。\n- 屬性與年份（CAP=Brewer/Gilbert-Lynch、PACELC=Abadi、RFC 編號…）查證後寫，禁憑記憶。\n\n## 格式\n\n- Markdown。檔案 `# 領域`（h1）→ 概念 `##`（h2）→ 五段 `###`（h3）。\n- ASCII 對照表/圖（box-drawing）必須過 `check_diagrams.py`（CJK=2 欄；box 中間行含全形標點易讓右框漂一欄，用 Python 精算寬度自測）。對照表能用 Markdown pipe 表就用（不需過 check_diagrams、較好維護），只有需要畫機制/時序/狀態圖才用 ASCII box。\n- 跨條目引用用「（見 <概念名>）」或「（見領域 X）」，不要寫死檔名路徑、不要寫死章號（領域會增刪）。\n- 語言：繁體中文台灣用語，技術名詞保留英文。**禁簡體詞**（信息→訊息、默認→預設、緩存→快取、線程→執行緒、調用→呼叫、對象→物件、代碼、概率、方差…）。簡繁同形字（們/效/系/准/值/程）用 Python 逐字元比對、別用 shell grep 誤報。\n\n## 平行產出一致性規範（27 個 agent 必守，避免發散）\n\n- **「六段」澄清**：每條 6 個 `###`＝前五段內容（定義/解法空間/各方案保證取捨/何時需要/常見誤解陷阱）＋第六段 `### 延伸閱讀`。一律六個，別漏延伸閱讀。\n- **主要術語對照表（全書統一，不得自創譯法）**：\n  | English | 統一中文 | 備註 |\n  |---|---|---|\n  | partition | 分區 | 與「分片」不混用 |\n  | shard / sharding | 分片 | |\n  | replica / replication | 副本 / 複製 | |\n  | consumer group | consumer group | 保留英文 |\n  | worker thread | 工作執行緒 | |\n  | event loop | event loop | 保留英文 |\n  | idempotent / idempotency | 冪等 | |\n  | backpressure | 背壓 | |\n  | throughput / latency | 吞吐 / 延遲 | |\n  | eventual consistency | 最終一致性 | |\n  | queue | 佇列 | 一律「佇列」，勿用陸式同義詞 |\n  | cache | 快取 | |\n  | thread / process | 執行緒 / 行程 | |\n\n  其餘術語第一次出現給「中文（English）」、之後擇一；拿不準保留英文。\n- **條目長度（軟建議，非硬限）**：問題條目正文約 600–1500 中文字、工具條目 ≤2000；對照表/pseudo-code 不計入。深度需要可超過，但別灌水、也別短到一段帶過。\n- **領域檔前言（2–4 句）**：(1) 本領域解什麼問題；(2) 條列本檔包含哪些條目；(3) 一句點明與相鄰領域的邊界（如 A 前言：「schema 協定相容在此、DB 結構變更在 B」）。\n- **跨條目引用格式**：統一放句尾括號 `（見 <概念名>，領域 X）`；不插在句中。\n- **對照表最小欄位**（欄名照抄、可增不可減）：`方案/工具 | 保證 | 適用場景 | 注意事項`。\n- **時效性標注**：放句尾括號 `（2026-06）`，一段最多標一次。\n- **`[工]` 對照深度**：同類工具列 2–4 個；本書已有專屬條目的工具，交叉引用、不重建對照表；無專屬條目的同類，簡表即可。\n- **「光譜/分類型」問題條目**（如「一致性光譜」「SQL vs NoSQL」「ACID vs BASE」）：`### 解法空間` 改寫成「各選項/各維度的機制」、`### 何時需要` 改寫成「如何在光譜上選點的準則」——標題照抄、語意調整。\n- **AI 專門條目**（T/U 的 AI 條目）：`### 定義與原理`＝AI 在這維度改變了什麼；`### 解法空間`＝對應的工程做法（review gate/信任邊界/驗收）；其餘段照常。\n\n## 明確禁止（舊版的毛病，別重犯）\n\n1. 提及任何特定作者的系統／公司／履歷／經歷（NeoBards/LetsTalk/Bahwan/結算 pipeline…一律不准出現）。\n2. 第二人稱「對做過這件事的你」那種個人化口吻；改成中性的「你（泛指讀者）」或「我們」。\n3. 「我以為 vs 實際」「老兵記憶會過時」「打臉/三巴掌」這類預設讀者記錯的糾錯裝置。\n4. 指向作者的其他書（queue/aiib/fail/tla…）。需要深度就自足講或用外部來源。\n5. 練習段（紙上推演/自我檢核）。\n6. AI 維度寫成工具版本/品牌（只准原理層）。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="rsys";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">保證與取捨<br><span style="font-weight:400;font-size:12px;color:var(--muted)">後端與分散式系統的概念地圖</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 保證與取捨';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
