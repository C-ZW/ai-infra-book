序（total order），但這個全序是任意的，不反映真實因果。\n- **vector clock（向量時鐘）**：每個行程維護一個長度 = 節點數的向量 V，只增自己那格，收訊息時逐格取 max。保證：`V(a) < V(b) ⇔ a → b`，且能**偵測並行**（兩向量互不 ≤ 即並行）——這是 Lamport 純量做不到的。代價：向量大小隨節點數線性成長，跨服務傳遞成本高。\n- **version vector（版本向量）**：vector clock 用在資料副本上的變體，每個副本一格，用來偵測寫入衝突（見衝突解決，領域 L）。\n- **Hybrid Logical Clock（HLC）**：Kulkarni、Demirbas 等於 OPODIS 2014 論文〈Logical Physical Clocks〉提出。把牆鐘（physical time）與一個邏輯計數器組成 tuple `(pt, c)`，取本地實體鐘、收到的 HLC、本地 HLC 三者最大值，只有當實體時間沒前進時才 bump 計數器。保證：單調遞增、捕捉因果、又貼近真實時間（誤差不超過 NTP 偏移上界），且塞得進 64 位元欄位。CockroachDB、MongoDB cluster time、YugabyteDB 用它排序交易。\n- **TrueTime（Google Spanner）**：不假裝時鐘準，而是把時鐘的**不確定性**顯式表示成一個區間 `[earliest, latest]`，半寬 ε（epsilon）在 Google 機房靠 GPS + 原子鐘維持，典型 ε 約數毫秒（常引用 < 4ms）。寫入交易做 **commit-wait**：等 2ε 過後才提交，確保任何後續交易的時間區間一定在它之後，由此得到外部一致性（external consistency）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Lamport timestamp | a→b ⇒ C(a)<C(b)；加 ID 得全序 | 只需「一致的全序」、不需偵測並行（如全序廣播） | 反向不成立；無法判斷兩事件是否並行；全序是任意的、不反映因果 |\n| vector clock | V(a)<V(b) ⇔ a→b；可偵測並行 | 需要知道「誰因果在前、誰是衝突」（衝突偵測、因果一致） | 大小隨節點數線性成長；節點動態增減時 GC 舊條目麻煩 |\n| HLC `(pt, c)` | 單調、捕捉因果、貼近牆鐘、64-bit | 分散式資料庫排序交易、做一致性快照、無原子鐘可用時 | 仍受 NTP 偏移上界約束；不是真實時間、不能當絕對 timestamp 對外承諾 |\n| TrueTime（commit-wait） | 外部一致性（線性化 + 反映真實時間先後） | 全球跨區、需要外部一致性的強交易系統 | 需要 GPS + 原子鐘硬體；每筆寫入付 2ε（約 8ms）commit-wait 延遲；非自架可得 |\n\n**Worked example（commit-wait 成本）**：Spanner 在 ε ≈ 4ms 時，每筆寫入交易要 commit-wait 約 2ε = 8ms 才提交。若一條請求鏈含 3 筆序列寫入，光 commit-wait 就疊加約 24ms——這是「外部一致性」換來的、無法消除的延遲底價。對照 HLC：不付這個 wait，但放棄了「timestamp 嚴格反映真實世界先後」的保證，只保證單調與因果。**這就是脊椎：你想要的保證越強（外部一致性），付的取捨越具體（每寫一次都等 2ε）。**\n\n### 何時需要\n\n- **只要排序、不跨機器比時間**：用 Lamport 或直接讓單一節點/單一 partition 序列化（領域 A 的順序）就夠，別上向量時鐘。\n- **要偵測寫入衝突 / 因果一致**：用 vector / version vector（衝突解決見領域 L）。\n- **分散式資料庫要單調且貼近真實時間的排序、又不想要原子鐘**：HLC 是現代主流答案。\n- **需要外部一致性（read 一定看到所有先於它真實完成的 write）且願意付硬體與延遲**：才需要 TrueTime 等級。絕大多數應用**不需要**——把「事件用牆鐘排序」改成「用單調鐘量間隔、用邏輯時鐘排因果」就解決九成問題。\n\n### 常見誤解與陷阱\n\n- **用 `Date.now()` / `System.currentTimeMillis()` 比兩個跨機器事件的先後**：牆鐘會被 NTP 往回校、跨機器有偏差，這個比較隨時會給出錯誤的因果。量「經過多久」要用單調鐘（monotonic clock，見時間與日期處理），判因果要用邏輯時鐘。\n- **以為 Lamport `C(a) < C(b)` 代表 a 因果在 b 前**：只有 a → b ⇒ C(a) < C(b)，反向不成立。要區分「並行」必須用向量時鐘。\n- **把 HLC 的 timestamp 當成可對外承諾的精確時間**：HLC 的計數器部分讓它可能略超前真實牆鐘，它是排序工具不是計時工具。\n- **以為自己「需要 Spanner 等級」**：commit-wait 的延遲與原子鐘的硬體門檻很高；多數系統用最終一致 + 因果排序就夠（見一致性光譜，領域 B）。\n\n### 延伸閱讀\n\n- Leslie Lamport, \"Time, Clocks, and the Ordering of Events in a Distributed System\"（CACM 1978，邏輯時鐘原典）：https://lamport.azurewebsites.net/pubs/time-clocks.pdf\n- Kulkarni, Demirbas, et al., \"Logical Physical Clocks and Consistent Snapshots in Globally Distributed Databases\"（HLC，OPODIS 2014）：https://cse.buffalo.edu/tech-reports/2014-04.pdf\n- Corbett et al., \"Spanner: Google's Globally-Distributed Database\"（TrueTime，OSDI 2012）：https://research.google.com/archive/spanner-osdi2012.pdf\n\n## consistent hashing\n\n### 定義與原理\n\n問題：你有一份資料（或請求）想分散到 N 個節點上，最自然的做法是 `node = hash(key) % N`。它的致命缺陷是**N 一變，幾乎全部 key 都要重新映射**。從 4 台加到 5 台，`% 4` 變 `% 5`，平均約 80% 的 key 落到不同節點——對快取叢集就是瞬間 cache miss 風暴，對有狀態儲存就是幾乎全部資料都要搬遷。\n\nConsistent hashing（David Karger 等，1997 年 STOC 論文〈Consistent Hashing and Random Trees: Distributed Caching Protocols for Relieving Hot Spots on the World Wide Web〉，原為 web 快取設計）的核心洞見：把節點和 key **都雜湊到同一個環狀空間**（hash ring，例如 0 到 2³²−1 首尾相接）。一個 key 順時針找到的第一個節點就是它的歸屬。這樣**加減一個節點，只影響環上相鄰的一段 key**，期望搬動量是 K/N（K 為 key 總數），而非全部。這是本書 owning 條目；領域 B 的分片只談分片後的一致性後果與 DB 操作面。\n\n### 解法空間\n\n- **基本環（每節點一個點）**：節點少時環上分佈不均，某節點可能負責一大段、負載傾斜（hot spot）。\n- **virtual node（vnode，虛擬節點）**：每個實體節點在環上放 V 個點（如 V=100~200），用「節點 ID + 序號」雜湊。實體節點負責的是分散在環上的許多小段，分佈更均勻、且加減節點時負載均攤到所有節點而非單一鄰居。Dynamo、Cassandra、memcached client、Riak 都用 vnode。\n- **rendezvous hashing（HRW，highest random weight）**：對每個 (key, node) 算 `hash(key, node)`，取最大值的 node。免維護環、加減節點同樣只搬一小部分，且不需 vnode 就分佈均勻；代價是查一個 key 要對所有節點算雜湊（O(N)），節點極多時較慢。\n- **jump consistent hash（Google）**：一個無需儲存、O(ln N) 時間把 key 映到 `[0, N)` 桶的演算法，記憶體極省、分佈均勻；但桶只能從尾端增減（不能任意移除中間節點），適合節點編號連續、只在尾部擴縮的場景。\n- **bounded-load consistent hashing**：在環的基礎上加「單節點負載上限」，超載就順延到下一個節點，避免熱 key 把單一節點打爆。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| `hash(key) % N` | 分佈均勻、O(1) | N 永遠不變的固定分區 | N 一變幾乎全部 key 重映射，禁用於會擴縮的叢集 |\n| 基本環（無 vnode） | 加減節點只搬 K/N | 教學/原型 | 節點少時負載傾斜嚴重；移除節點時負載全壓到單一鄰居 |\n| 環 + vnode | 均勻 + 加減節點負載均攤 | 快取叢集、Dynamo 式 KV、分片路由 | vnode 數要夠（數百）才均勻；過多會吃記憶體與 metadata |\n| rendezvous (HRW) | 均勻、免維護環狀態 | 節點數中等、要避免 vnode 複雜度 | 查 key 為 O(N)，節點極多時慢 |\n| jump consistent hash | 極省記憶體、O(ln N) | 桶只在尾端增減（如固定編號的 shard） | 不能任意移除中間節點 |\n\n**Worked example（搬動量對照）**：1,000 萬個 key、4 個節點。用 `% N` 從 4 加到 5：約 1,000萬 × (1 − 1/5) = 約 **800 萬** key 改變歸屬（80%）。用 consistent hashing 從 4 加到 5：理論只搬約 K/N_new = 1,000萬 / 5 = **約 200 萬** key（20%，新節點從各舊節點各接一小段）。差距 4 倍，對快取就是 miss 率從 80% 降到 20%。\n\n### 何時需要\n\n當節點集合**會動態變化**（自動擴縮、節點故障替換、滾動部署）且資料/連線有狀態綁定（快取、sticky 路由、有狀態分片）時，需要 consistent hashing 把擴縮的搬動成本壓到最小。若節點數固定不變、或無狀態（任一節點都能處理任一請求，靠 L4/L7 LB 輪詢即可，見負載均衡，領域 N），就**不需要**——直接 round-robin 或 `% N` 更簡單。把 consistent hashing 用在無狀態服務上是徒增複雜度。\n\n### 常見誤解與陷阱\n\n- **以為環自動均勻**：沒有 vnode，節點少時環上分佈很傾斜，一個節點可能扛 40% 流量。均勻來自 vnode（或 rendezvous），不是環本身。\n- **熱 key 問題不被環解決**：consistent hashing 均勻分佈的是 **key 空間**，不是 **流量**。若單一 key 超熱（某爆紅商品），它永遠落在同一節點，環救不了——要靠 key 拆分/複製或 bounded-load 變體。\n- **移除節點時的負載突刺**：基本環移掉一個節點，它那段全部順延到單一鄰居，可能把鄰居壓垮。vnode 把這份負載打散到多個節點才平滑。\n- **vnode 數量被當無關緊要**：太少（如每節點 1~10 個）仍傾斜；要數百個才接近均勻——但要平衡 metadata 與記憶體開銷。\n\n### 延伸閱讀\n\n- Karger et al., \"Consistent Hashing and Random Trees...\"（STOC 1997，consistent hashing 原典）：https://www.akamai.com/site/en/documents/research-paper/consistent-hashing-and-random-trees-distributed-caching-protocols-for-relieving-hot-spots-on-the-world-wide-web-technical-publication.pdf\n- Thaler & Ravishankar, \"Using Name-Based Mappings to Increase Hit Rates\"（rendezvous/HRW hashing）：https://www.eecs.umich.edu/techreports/cse/96/CSE-TR-316-96.pdf\n- Lamping & Veach, \"A Fast, Minimal Memory, Consistent Hash Algorithm\"（jump consistent hash）：https://arxiv.org/abs/1406.2294\n\n## gossip / anti-entropy\n\n### 定義與原理\n\n問題：在一個沒有中央協調者、節點數可能成百上千、且節點會隨時加入/離開/故障的叢集裡，怎麼讓「成員清單」「故障狀態」「設定」「資料副本」這類資訊**最終傳遍每個節點並趨同**，而不靠一個會成為瓶頸與單點的中央伺服器？\n\nGossip（流言/八卦協定，又稱 epidemic protocol，疫情式協定）借用流行病傳播的數學：每個節點**週期性地隨機挑幾個對等節點交換資訊**，被感染（收到新資訊）的節點再去感染別人。Alan Demers 等 1987 年 PODC 論文〈Epidemic Algorithms for Replicated Database Maintenance〉是奠基之作，提出兩大機制：**anti-entropy**（反熵——隨機配對、比對並調和兩邊的完整狀態差異，把副本間的「熵」降下來）與 **rumor mongering**（謠言傳播——只散播「最近的更新」，傳夠多次沒人沒聽過就停）。核心保證是**機率性最終一致**：資訊以 O(log N) 個回合傳遍全網，且容忍訊息遺失與節點故障（沒有單點）。\n\n### 解法空間\n\n- **anti-entropy（背景對帳）**：節點隨機選對端，比對全部（或一段）狀態的摘要（如 Merkle tree 根雜湊），只傳差異把兩邊調和一致。pull（我問你有什麼新的）比 push 收斂快。代價：要掃整份狀態、頻寬與 CPU 開銷較大，通常低頻跑。對應領域 L 的 reconciliation 對帳，是把漂移最終修平的底層機制。\n- **rumor mongering / dissemination（前景擴散）**：只傳「熱」更新（rumor），每次隨機轉發給 k 個節點，當遇到「已知道」的節點達一定次數就把該 rumor 標為冷、停止傳。快、省頻寬，但有極小機率某些節點漏掉（所以通常搭配 anti-entropy 兜底）。\n- **failure detection（SWIM 式）**：Das、Gupta、Motivala 2002 年的 SWIM 協定用 gossip 散播成員與故障狀態：節點隨機 ping 對端、ping 不到就請其他節點代 ping（間接探測，避免單一網路抖動誤判），疑似失效標 suspect、確認後標 dead 並 gossip 出去。把「成員管理」與「故障偵測」都做成 gossip。\n- **push / pull / push-pull**：push 在感染初期快、後期慢（多數人已知）；pull 後期快；push-pull 結合兩者，收斂最快，是多數實作的選擇。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| anti-entropy（全狀態調和） | 一定收斂、修補任何漂移 | 背景對帳、資料副本最終一致 | 掃整份狀態，開銷大，需低頻跑；常配 Merkle tree 降比對成本 |\n| rumor mongering（只傳熱更新） | 快、省頻寬、O(log N) 回合 | 即時擴散成員/設定變更 | 有極小機率漏節點，需 anti-entropy 兜底 |\n| SWIM 故障偵測 | 成員與故障狀態 gossip 散播、間接探測防誤判 | 大規模叢集的成員管理（Consul、Serf 用之） | 偵測延遲 vs 誤判率要調參；網路分割時可能誤標大量節點 dead |\n| 中央協調者（對照） | 強一致、即時 | 小叢集、需要即時強成員視圖 | 單點、瓶頸；節點數大時不可行——這正是 gossip 存在的理由 |\n\n**Worked example（收斂回合數）**：1,000 個節點的叢集，gossip 每回合每節點隨機聯絡幾個對端。資訊傳遍全網所需回合數約與 log₂(N) 成正比：log₂(1000) ≈ **10 回合**。若每回合間隔 1 秒，一條成員變更約 10 秒內擴散到全部 1,000 節點——且過程中容忍部分節點當機與封包遺失，沒有任何中央節點參與。對照中央協調者：要嘛 1,000 個節點同時連它（連線數爆炸），要嘛它一掛全叢集失明。\n\n### 何時需要\n\n當叢集**夠大（數十到數千節點）**、需要**去中心化的成員管理/故障偵測/最終一致狀態傳播**、且能接受**秒級而非即時的收斂延遲**時，gossip 是標準答案（Cassandra、Consul、Serf、Dynamo 式系統都用）。若叢集很小（個位數節點）或需要**即時、強一致的成員視圖**（如需要精確的 leader 唯一性判定），用共識系統（領域 M 的另一檔）或中央協調者更直接——gossip 的機率性與收斂延遲此時反而是負擔。\n\n### 常見誤解與陷阱\n\n- **以為 gossip 是即時的**：它是**最終**一致，收斂要數個回合（秒級）。任何依賴「立刻全網一致」的邏輯不能建在 gossip 上。\n- **把 gossip 當強一致成員視圖**：網路分割時，兩側可能各自 gossip 出不同的「誰活著」，這正是它換來可用性的代價。要強一致成員（fencing、leader 唯一性）得靠共識。\n- **只用 rumor mongering 不配 anti-entropy**：謠言傳播有極小漏網機率，長期會累積漂移；必須有低頻 anti-entropy 把漂移最終修平（這是 Demers 論文的核心論點之一）。\n- **故障偵測誤判**：SWIM 式偵測在網路抖動下可能把活著的節點標 dead，間接探測（請第三方代 ping）就是為降低這種誤判而設；偵測門檻調太敏感會在尖峰流量時誤殺一片節點。\n\n### 延伸閱讀\n\n- Demers et al., \"Epidemic Algorithms for Replicated Database Maintenance\"（PODC 1987，anti-entropy 原典）：https://dl.acm.org/doi/10.1145/41840.41841\n- Das, Gupta, Motivala, \"SWIM: Scalable Weakly-consistent Infection-style Process Group Membership Protocol\"（2002）：https://www.cs.cornell.edu/projects/Quicksilver/public_pdfs/SWIM.pdf\n- DeCandia et al., \"Dynamo: Amazon's Highly Available Key-value Store\"（SOSP 2007，gossip 用於成員/故障）：https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf\n\n## 時間與日期處理（UTC / epoch / timezone / DST 的應用層坑）\n\n### 定義與原理\n\n這是最被資深工程師低估、卻最常在生產踩雷的一類問題：把「時間」這個實體世界概念正確地對應進系統。三個必須分清的概念：\n\n- **瞬間（instant）vs 民用時間（civil / wall time）**：「現在這個物理瞬間」是絕對的、全球唯一的；「2026-06-21 14:00」這種民用時間是相對於某個 timezone 才有意義的。把兩者混為一談是萬惡之源。\n- **UTC vs epoch**：UTC 是協調世界時（含閏秒概念的民用標準）；**Unix epoch time** 是「自 1970-01-01T00:00:00Z 起經過的秒數」，且**刻意忽略閏秒**（每天固定當 86,400 秒），所以 epoch 不是嚴格的物理流逝秒數，但它單調、無時區、是儲存與傳輸瞬間的事實標準。\n- **timezone ≠ 固定偏移**：timezone（如 `America/New_York`）是一組**隨歷史變動的規則**，含 DST（daylight saving time，日光節約時間）轉換、歷史上偏移的修改等。它由 **IANA tz database** 維護（每年發布數個版本，如 2026b），規則每年改數次（某國臨時改 DST、某地廢除 DST）。`UTC+8` 是固定偏移，`America/New_York` 不是——後者夏天 UTC−4、冬天 UTC−5。\n\n第一原理：**儲存與運算用絕對瞬間（UTC / epoch），只在「對人顯示」與「對人輸入」的最後一哩才套 timezone**。時間/時鐘的因果排序面是本領域另一條目（見邏輯時鐘與排序）的範疇；排程的觸發語意（漏跑/補跑）在領域 J 只談那一面，這裡聚焦應用層的存、算、顯示坑。\n\n### 解法空間\n\n- **一律以 UTC / epoch 儲存**：DB 欄位用 `timestamptz`（PostgreSQL 內部存 UTC）或存 epoch 整數；絕不存「不帶時區的本地時間」（naive datetime），那是把未來自己坑死的根源。\n- **顯示層才轉 timezone**：在 render 前用使用者的 IANA timezone（不是固定偏移）把 UTC 轉成本地時間。需要的是 zone ID（`Asia/Taipei`），不是 `+08:00`。\n- **量「經過多久」用單調鐘（monotonic clock）**：`CLOCK_MONOTONIC` / `performance.now()` / `System.nanoTime()`，它不受 NTP 校正與 DST 影響、只會前進、可能在不同開機間無意義但「兩次讀數相減」永遠正確。**永遠別用牆鐘相減算時長**（牆鐘會往回跳，可能算出負的耗時）。\n- **保持 tzdata 更新**：系統與執行時的 IANA tz database 要隨 OS/runtime 更新，否則某國剛改的 DST 規則沒進來，排程與顯示就會在那個區錯一小時。\n- **用正確的日期時間函式庫**：避開語言內建的有缺陷 API。JavaScript 的 `Date` 不支援非本地時區、DST 處理不可靠；其替代 **Temporal API 已於 2026 年 3 月 TC39 會議進入 Stage 4、預定納入 ECMAScript 2027**（Firefox 139 自 2025-05、Chrome 144 自 2026-01 已預設支援），其 `ZonedDateTime` 正確處理 DST 轉換下的日期運算（2026-06）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 存 UTC / epoch | 絕對、單調、無時區歧義 | 所有「瞬間」的儲存與傳輸 | epoch 忽略閏秒；顯示時必須轉 timezone，別直接給人看 |\n| 存 naive local datetime | （反例）看似直覺 | 幾乎沒有正確用途 | DST 那兩小時無法表達/有歧義；跨區搬家即錯亂；強烈不建議 |\n| timezone 用 IANA zone ID | 正確含 DST 與歷史規則 | 對人顯示/排程在本地時間 | 依賴 tzdata 更新；規則每年改，需隨 OS/runtime 同步 |\n| timezone 用固定偏移 `+08:00` | 簡單 | 該地永不實施 DST 且偏移永不變 | 對有 DST 的地區會錯一小時；別拿固定偏移代替 zone ID |\n| 單調鐘量時長 | 不受 NTP/DST 影響、永遠單調 | timeout、量耗時、rate limit 視窗 | 不同行程/開機間數值無可比性，只能同源相減 |\n\n**Worked example（DST 那兩小時的坑）**：在 `America/New_York`，2025 年 11 月 2 日當地時鐘從 02:00 退回 01:00（DST 結束）。於是「2025-11-02 01:30」**在當地出現兩次**——一次是 UTC−4 的 01:30（epoch X），一次是一小時後 UTC−5 的 01:30（epoch X+3600）。若你把使用者排的「01:30 提醒」存成 naive local time，系統無法判斷該對應哪個瞬間，可能不觸發、觸發兩次、或差一小時。反向地，春天「跳過」的那一小時（02:00 直接跳到 03:00），naive 的「02:30」是**不存在的瞬間**。存 UTC / epoch 從根本上沒有這個歧義——因為瞬間是唯一的，歧義只發生在「把民用時間反推成瞬間」時，而那一步應在輸入端用明確 zone 一次解析掉。\n\n### 何時需要\n\n幾乎**任何**碰到使用者可見時間、排程、跨時區、計費週期、保留期（retention）的系統都需要嚴守這些規則——成本極低（就是「存 UTC、顯示轉 zone、量時長用單調鐘」三條紀律），不守的代價是難重現的「差一小時」「DST 當天出錯」的 bug。唯一可放鬆的場景：純內部、單一固定時區、永不顯示給跨區使用者、且不依賴時長精度的拋棄式腳本——但即便如此，存 UTC 也不會更貴，沒有理由不存。\n\n### 常見誤解與陷阱\n\n- **用牆鐘相減算時長**：NTP 校正會讓牆鐘往回跳，`end - start` 可能是負數或暴衝。量耗時/timeout/rate-limit 視窗一律用單調鐘。\n- **把 timezone 當固定偏移存**：存 `+08:00` 而非 `Asia/Taipei`，對有 DST 的地區（如多數歐美時區）會在 DST 切換後錯一小時。zone ID 才含完整規則。\n- **以為 UTC 沒有 DST 就萬事大吉**：UTC 確實無 DST，但「使用者排的本地時間提醒」仍要在輸入端用使用者的 zone 正確轉成 UTC——轉換點才是出錯處，存成 UTC 後就安全。\n- **tzdata 不更新**：某國臨時宣布廢除/改動 DST（近年屢見），若伺服器 tzdata 沒更新，該區的顯示與排程就錯一小時，且很難察覺。\n- **閏秒與 epoch 的細節**：epoch 每天當 86,400 秒、忽略閏秒，所以兩個 epoch 相差不完全等於物理流逝秒數（極端精度場景才在意）；多數系統靠 NTP 用 leap smear（把閏秒抹平到一段時間）規避，但要知道這個前提存在。\n- **以為內建 Date 型別可靠**：很多語言的原生日期 API（典型如 JavaScript `Date`）在時區/DST 上行為怪異，該用成熟函式庫或新標準（如 Temporal）。\n\n### 延伸閱讀\n\n- IANA Time Zone Database（tz database 官方，含 NEWS 變更日誌）：https://www.iana.org/time-zones\n- RFC 9557 / RFC 3339（Internet 日期時間格式，含時區標註）：https://www.rfc-editor.org/rfc/rfc3339\n- TC39 Temporal proposal（JavaScript 新日期時間 API，DST-aware）：https://tc39.es/proposal-temporal/docs/\n"}, {"id": "K-decoupling", "file": "K-decoupling.md", "group": "Part 6 — 架構、雲端與發布", "title": "K · 系統設計與解耦", "md": "# K · 系統設計與解耦\n\n這個領域回答的是：**怎麼讓系統的各部分「少知道彼此」——少知道對方在哪、用什麼寫、何時上線、內部資料長什麼樣——好讓任一部分能獨立變更、獨立失敗、獨立擴展，而不會牽一髮動全身。** 本檔含六個條目：解耦（拆解耦合的維度與各手段對應到哪一維）、耦合 vs 內聚（一體兩面的判準）、同步 vs 非同步通訊（呼叫的時間耦合）、事件驅動架構 EDA（用事件當通訊媒介，event notification vs event-carried state transfer）、Event sourcing 與 CQRS（狀態＝不可變事件序列、讀寫分離）、持久化工作流與 durable execution（把長流程的執行狀態本身持久化以便重試恢復）。脊椎：你想要哪一維的解耦（換來獨立演化、容錯、可擴展），你願意付什麼取捨（最終一致、除錯變難、間接層增加、難追蹤的全域流程）。與相鄰領域的邊界一句話：**這裡講「系統怎麼切、怎麼用事件接起來」的架構面；交付機制（outbox、saga 補償、訊息順序）由領域 A 深講，資料同步與 CDC 由領域 L 深講，一致性模型由領域 B 深講——本檔引用、不重講。**\n\n## 解耦 decoupling\n\n### 定義與原理\n\n解耦要解的問題是：**當兩個元件之間的「假設」太多時，改動其中一個就會逼著另一個跟著改、跟著重新部署、甚至跟著失敗。** 耦合（coupling）就是「A 對 B 的假設量」——A 假設 B 在某個固定位址、用某種協定、永遠在線、回傳某個欄位結構、跟自己同步上線。每一條假設都是一條繩子；解耦就是有意識地剪掉某些繩子，換取「兩端能各自變動」的自由。\n\n第一原理是：**耦合不是一個純量，而是多個正交維度**。把它們分開，才看得出「我加了一個訊息佇列」到底解了哪一條繩子、又沒解哪一條。常見的維度（沿用 Gregor Hohpe 與 Bobby Woolf 在 *Enterprise Integration Patterns* 的整理，並擴充）：\n\n- **時間耦合（temporal）**：A 呼叫 B 時，B 必須當下就在、當下就回。同步 HTTP 呼叫是強時間耦合：B 掛了，A 這次呼叫就失敗。\n- **空間耦合（spatial / location）**：A 必須知道 B 的具體位址（IP／host）。寫死 endpoint 是強空間耦合；服務發現（見領域 N）把它換成邏輯名稱。\n- **同步性耦合（synchronization）**：A 發出請求後必須「卡住等」B 回來才能往下。這與時間耦合相關但不同——你可以時間解耦（B 不必當下在）卻仍同步等（A 卡著等回應）。\n- **資料格式耦合（data / schema）**：A 必須知道 B 的內部資料結構。共享資料庫是最強的資料耦合：A 直接讀 B 的表，B 一改欄位 A 就裂。\n- **實作耦合（implementation / technology）**：A 假設了 B 用什麼語言、什麼框架、什麼內部演算法。透過穩定的契約（API／訊息 schema）隔開，B 換實作 A 無感。\n\n關鍵洞見：**不同的解耦手段，剪的是不同的繩子**。把「上訊息佇列」當成「萬用解耦」是最常見的誤判——佇列主要剪時間與同步性耦合，但若兩端共用同一個事件 schema，資料耦合一條都沒剪。\n\n### 解法空間\n\n各手段對應到它主要解的維度（一句機制）：\n\n- **訊息佇列／非同步訊息**：A 把訊息丟進佇列就走，B 之後自己取。主要剪**時間＋同步性**耦合（B 掛了訊息留在佇列，A 不卡）。\n- **服務發現／DNS／load balancer**：A 用邏輯名稱找 B，由中間層解析到實際位址。主要剪**空間**耦合（見領域 N）。\n- **API 契約／schema registry／向後相容演進**：兩端只依賴「契約」而非「實作」。主要剪**資料格式＋實作**耦合（見領域 A 的序列化與 schema 演進）。\n- **事件驅動（發布訂閱）**：發布者不認識訂閱者，只發事件到 topic。剪**空間（不知有誰在聽）＋時間＋同步性**（見事件驅動架構 EDA）。\n- **API gateway／facade／反向代理**：在前面加一層，把後端的位址、協定、聚合細節藏起來。剪**空間＋部分實作**耦合（見領域 H）。\n- **資料庫 per service（每服務私有庫）**：禁止跨服務直接讀彼此的表，只能走 API／事件。剪**資料格式**耦合（這是微服務最關鍵也最常被偷懶跳過的一條）。\n- **介面／依賴反轉（DIP）**：程式碼層級，依賴抽象介面而非具體類別。剪**實作**耦合（單元層的解耦）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證（剪哪條繩子） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 非同步訊息佇列 | 時間＋同步性解耦：B 暫時不在，A 照樣往下 | 工作可延後處理、可容忍最終完成、要吸收尖峰 | 換來最終一致與「訊息何時被處理」的不確定；下游要冪等（見領域 A）；除錯要追跨佇列的流程 |\n| 服務發現 / DNS | 空間解耦：endpoint 變動 A 無感 | 動態擴縮、藍綠／滾動部署、多副本 | DNS 快取 TTL 會讓變更生效有延遲；發現層自己成為依賴（見領域 N） |\n| API 契約 + 相容演進 | 資料格式＋實作解耦：B 換實作／加欄位 A 不裂 | 任何長期維護的服務間介面 | 契約本身要治理（破壞性變更要版本化）；過度寬鬆的契約＝沒解耦（見領域 A） |\n| 事件驅動發布訂閱 | 空間＋時間＋同步性：發布者不知有誰在聽 | 一個變更要扇出給多個未知／可增的下游 | 全域流程變隱性、難一眼看出「誰觸發了誰」；事件 schema 仍是耦合點 |\n| DB per service | 資料格式解耦的最強形式 | 真正要獨立演化、獨立擴展的服務 | 跨服務查詢／交易變難（要靠事件複製或 API 組合）；很多團隊偷懶共用庫，等於沒拆 |\n\n一個帶數字的取捨。一個「使用者下單後寄確認信」的流程，原本是同步呼叫：下單 API 內直接呼叫郵件服務。郵件服務 SLA 是 **99.5%**（每月約 **3.6 小時** 不可用），下單 API 自己是 **99.9%**。同步串接後，下單成功率被郵件服務拖到 **約 99.4%**（0.999 × 0.995），因為郵件服務一掛、整個下單就失敗。把「寄信」改成丟一則訊息到佇列（剪掉時間＋同步性耦合）後，郵件服務掛掉只影響「信晚點才到」，下單本身回到 **99.9%**——這就是時間解耦用「信的即時性」換「下單的可用性」。但代價同時出現：現在「信到底寄出去沒」不再是同步可知，你得靠佇列的監控與 DLQ（見領域 A）才知道有沒有卡住。\n\n### 何時需要\n\n- **需要解耦**：兩個元件的變更／部署／失敗應該獨立，但現在被某條繩子綁死（改 B 的欄位 A 就裂、B 掛了 A 也掛、B 換位址 A 要改設定）。先定位「哪一維耦合在痛」，再選對應手段。\n- **過度解耦是 over-engineering**：把一個本該同步、本該強一致的流程（如「扣庫存」必須當下成功才能確認訂單）硬拆成非同步事件，換來的最終一致反而製造對帳負擔與「訂單已成立但庫存沒扣」的窗口。**不是所有耦合都該剪**——強一致需求下的時間耦合是特性、不是缺陷。\n- **判準**：問「這兩端真的需要獨立演化／獨立失敗嗎？」需要→剪對應維度的繩子；不需要（同一團隊、同一發布週期、同一交易邊界）→保持同步直連，省下間接層的複雜度。\n\n### 常見誤解與陷阱\n\n- **「加佇列＝解耦」**：佇列剪時間與同步性，但若兩端共用事件 schema，資料耦合一條沒少。改事件結構照樣兩邊一起裂。解耦要看「剪了哪一維」，不是看「有沒有中間件」。\n- **把間接層當免費**：每加一層（佇列、gateway、發現層）都引入新的故障點、新的延遲、新的要監控的東西。解耦永遠是「用一種複雜度換另一種」——把「直接依賴」換成「對中間層的依賴＋對最終一致的處理」。\n- **隱性耦合最危險**：共用資料庫、共用的「魔術字串」狀態值、跨服務假設對方的處理順序——這些不在 API 上，但綁得最死。真正的解耦要連這些檯面下的假設一起剪。\n- **過早分散式化**：在還沒有獨立演化需求時就把單體拆成一堆非同步服務，得到的是分散式系統的全部痛（部分失敗、最終一致、難追蹤），卻沒有對應的好處。先單體、痛了再拆，通常比反過來省。\n\n### 延伸閱讀\n\n- Gregor Hohpe, Bobby Woolf, *Enterprise Integration Patterns*（2003）——耦合維度與整合模式的奠基之作。\n- Sam Newman, *Building Microservices*, 2nd ed.（O'Reilly, 2021）— 服務邊界與耦合／內聚的系統性討論。\n- Martin Fowler, \"What do you mean by 'Event-Driven'?\"（2017-01）：https://martinfowler.com/articles/201701-event-driven.html\n\n## 耦合 vs 內聚\n\n### 定義與原理\n\n這一條要解的問題是：**「該把什麼放在一起、什麼拆開」沒有絕對答案，但有一對互補的判準。** 耦合（coupling）＝**模組「之間」的依賴強度**，越低越好（改一個不必動另一個）。內聚（cohesion）＝**模組「內部」元素的相關程度**，越高越好（一個模組裡的東西都在服務同一個目的）。這對概念出自 Larry Constantine 與 Edward Yourdon 1970 年代的結構化設計，是「怎麼切模組／服務」最古老也最耐用的判準。\n\n第一原理：**這兩個量必須一起看，單看一個會切錯**。只追求低耦合，可以把所有東西塞進一個巨大模組（內部沒有跨模組依賴，但內聚爛、什麼都混在一起）；只追求高內聚，可以把每個函式都拆成一個服務（每個都極專注，但彼此呼叫成網、耦合爆炸）。好的切法是**同時**：每個模組內部高內聚（職責單一），模組之間低耦合（依賴少而穩定）。\n\n衡量的經典啟發是 **Constantine 的耦合光譜**（由弱到強：data → stamp → control → common → content coupling）與**內聚光譜**（由弱到強：coincidental → logical → temporal → procedural → communicational → functional cohesion）。實務上不必背全表，但要會分辨「兩個東西經常一起改」是內聚信號（該放一起）、「改 A 老是被迫改 B」是耦合信號（該拆開或穩定介面）。\n\n### 解法空間\n\n把「怎麼判斷邊界切對沒」拆成幾個可操作的視角：\n\n- **變更軸線（axis of change）**：經常「一起改」的東西放一起（高內聚），很少一起改的拆開。一個檔／服務若每次需求變更都要動，可能塞了太多不相關職責。\n- **領域邊界（DDD 的 bounded context）**：依業務語言／概念的自然接縫切，而非依技術層（不是「所有 controller 一個服務、所有 DAO 一個服務」）。\n- **依賴方向**：穩定的東西被依賴、易變的東西去依賴別人（穩定依賴原則）。讓依賴箭頭指向不常變的核心。\n- **連接點數量與型態**：模組對外暴露的介面越窄、越穩定，耦合越低。傳一整個物件進去（stamp coupling）比只傳需要的欄位（data coupling）耦合更強。\n- **共享狀態**：共用可變狀態（common coupling，如全域變數、共享庫）是強耦合；改成各自持有、透過介面交換是弱化。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 依「變更軸線」切 | 高內聚：常一起改的在一起，改動侷限 | 已能觀察到「哪些東西總是一起變」的成熟系統 | 早期需求不明時軸線會變，過早固化反而切錯 |\n| 依領域邊界（bounded context）切 | 邊界對齊業務語言，耦合沿自然接縫最弱 | 業務概念清晰、團隊依領域分工 | 需要領域知識；技術人易誤按技術分層切，造成跨層耦合 |\n| 窄而穩定的介面 | 弱化耦合到 data coupling（只傳必要欄位） | 任何跨模組／跨服務邊界 | 介面太細會囉嗦、太粗（傳大物件）又把內部結構洩漏出去 |\n| 消除共享可變狀態 | 拆掉 common/content coupling（最強的耦合） | 多模組共用全域狀態或同一張表 | 改成訊息／事件交換會引入最終一致（見解耦） |\n\n一個帶數字的場景。一個 200 個檔的單體，假設用工具量出「平均一次功能變更要動 12 個檔、分散在 5 個模組」。這是**低內聚＋高耦合**的徵狀：相關邏輯散落、改一處要連帶改四處。按變更軸線重切後，把「常一起改」的聚進同一模組，目標是「一次功能變更只動 1–2 個模組」。判準很具體：**如果你的 commit 歷史顯示某幾個檔總是一起出現在同一個 PR，它們多半該住在一起**——版本控制的共變（co-change）資料是內聚最誠實的證據，比任何架構圖都準。\n\n### 何時需要\n\n- **需要重新切**：每次小需求都觸發跨多模組的散彈式修改（低內聚徵狀）；或改一個模組老是弄壞另一個看似無關的（高耦合徵狀）。這兩個痛點是「邊界切錯」的直接信號。\n- **別為了切而切**：一個內部高內聚、對外介面已經穩定的單體模組，沒必要因為「微服務比較潮」就拆成網路呼叫。拆開＝把行程內呼叫換成跨網路呼叫，引入部分失敗、延遲、序列化成本——只有當「獨立部署／獨立擴展／獨立團隊」的好處超過這些成本時才值得。\n- **判準**：耦合與內聚是「診斷工具」不是「目標」。先看痛在哪（散彈修改？連鎖損壞？），再決定是把東西聚起來（提內聚）還是把繩子剪掉（降耦合）。\n\n### 常見誤解與陷阱\n\n- **「微服務＝低耦合」**：拆成服務若還共用資料庫、若事件 schema 緊綁、若部署必須同步，那是「分散式單體」——擁有單體的耦合，外加分散式的全部痛。服務邊界畫錯，比不拆還糟。\n- **把技術分層當內聚**：「所有 repository 一層、所有 service 一層」是 logical cohesion（按種類分組），不是 functional cohesion（按目的分組）。改一個業務功能要橫切所有層，正是低內聚。\n- **追求「零耦合」**：模組之間總要協作，耦合不可能歸零，目標是「弱且穩定的耦合」（data coupling、依賴穩定介面），不是消滅依賴。\n- **內聚被「DRY 過頭」破壞**：為了不重複，把兩個「碰巧長得像但會各自演化」的東西強行抽成共用模組，製造了它們之間本不該有的耦合（共用模組一改兩邊都被迫改）。**有時刻意重複比錯誤抽象更解耦。**\n\n### 延伸閱讀\n\n- Edward Yourdon, Larry Constantine, *Structured Design*（1979）——耦合／內聚光譜的原典。\n- Robert C. Martin, *Clean Architecture*（2017）— 依賴方向、穩定依賴原則。\n- Martin Fowler, \"BoundedContext\"：https://martinfowler.com/bliki/BoundedContext.html\n\n## 同步 vs 非同步通訊\n\n### 定義與原理\n\n這一條要解的問題是：**「A 呼叫 B」這個動作，A 要不要卡住等 B 回來？** 同步（synchronous）通訊＝A 發出請求後**阻塞等待**回應，拿到結果才往下走（典型：HTTP request/response、gRPC unary、同步 RPC）。非同步（asynchronous）通訊＝A 發出請求／訊息後**立刻往下走**，不等回應；結果（若有）之後透過回呼、輪詢、或另一條訊息送回（典型：丟訊息到佇列、發事件、webhook 回呼）。\n\n第一原理：**這個選擇決定了「失敗如何傳遞」與「兩端的命運是否綁在一起」**。同步呼叫下，B 的延遲就是 A 的延遲、B 的失敗就是 A 當下的失敗——兩端在這次呼叫期間命運共同體（強時間耦合，見解耦）。非同步下，A 把「請求」交給一個中介（佇列／事件匯流排），B 之後自己取；B 慢、B 掛，A 都不直接受影響，但代價是 A 不再當下知道結果，整個系統進入最終一致。\n\n要釐清一個常被混淆的點：**「同步 vs 非同步」是「呼叫者要不要等」，與「程式碼用不用 async/await 語法」是兩回事**。Node.js 用 `await fetch()` 在語言層是非阻塞的（event loop 可去做別的，見領域 D），但在**通訊語意**上它仍是同步呼叫——這個邏輯流程卡在這裡等 HTTP 回應才能繼續。真正的非同步通訊是「發了訊息就不等這個邏輯流程的回應」。\n\n### 解法空間\n\n通訊的「同步性」其實是一條光譜，不只二選一：\n\n- **純同步 request/response**：A 阻塞等 B 回應。機制：一來一回，A 直接拿到結果或錯誤。\n- **同步但有逾時／斷路器**：仍等回應，但設上限與保護（見領域 P 的 timeout、領域 E 的 circuit breaker）。機制：等，但不無限等、不把失敗放大。\n- **fire-and-forget 非同步**：A 發出就走，不要任何回應（如發一個「使用者登入了」事件）。機制：單向，A 不在乎結果。\n- **非同步 + 回呼（callback / webhook）**：A 發請求附一個回呼位址，B 處理完反向呼叫 A。機制：結果之後反向送回（webhook 見領域 A）。\n- **非同步 + 輪詢（polling / request-reply）**：A 發請求拿到一個 job id，之後週期性查「好了沒」。機制：A 主動拉結果。\n- **非同步 request-reply over 佇列**：A 把請求丟到請求佇列、附一個 correlation id 與回覆佇列；B 處理完把結果丟回覆佇列。機制：用兩條佇列模擬「要回應但不阻塞」。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 純同步 request/response | 即時拿到結果或錯誤；流程線性、最好懂、最好除錯 | 需要當下結果才能往下（查餘額、驗證、即時讀） | A 的延遲＝Σ 下游延遲；下游掛 A 當下失敗；同步鏈越長尾延遲越糟（見領域 S） |\n| fire-and-forget 非同步 | A 不被 B 拖累；B 可吸收尖峰、可重試 | 通知、稽核、可延後的副作用、扇出 | A 不知結果；要靠監控／DLQ 才知有沒有卡（見領域 A）；最終一致 |\n| 非同步 + webhook 回呼 | 不阻塞又能拿到結果；省輪詢 | 處理耗時、結果重要（金流、第三方批次） | 回呼可能丟失／重複／亂序，要簽章＋冪等（見領域 A 的 webhooks） |\n| 非同步 + 輪詢 | 簡單、A 完全掌控節奏、無需暴露回呼端點 | A 在防火牆後、無法被回呼 | 輪詢間隔＝結果延遲；高頻輪詢空轉浪費；要設輪詢上限避免無限等 |\n\n一個帶數字的取捨。一個 API 要呼叫三個下游：認證（p99 **20 ms**）、定價（p99 **50 ms**）、庫存（p99 **80 ms**）。若**同步串接**，A 的 p99 至少是三者相加再加自身——約 **150 ms** 起跳，且只要任一個下游在某次請求落到長尾，A 就被拖到長尾（尾延遲在串接下會放大，見領域 S）。若庫存查詢其實「不影響是否回應、只是預熱快取」，把它改成 **fire-and-forget 非同步**（丟個訊息讓背景去做），A 的同步路徑就只剩認證＋定價約 **70 ms**，砍掉近半。**判準很清楚：只有「這次回應真的需要的結果」才該同步等；其餘副作用都該推到非同步路徑。** 但別忘了代價——那筆庫存預熱現在是「最終會做」，若它失敗了，A 不會知道，要靠獨立監控補上。\n\n### 何時需要\n\n- **該同步**：呼叫者需要結果才能決定下一步（驗證、授權、讀取當前值、需要強一致地「現在就確認成功」）；或流程短、下游可靠、簡單性壓倒一切。\n- **該非同步**：副作用可延後（通知、稽核、索引更新）；要吸收流量尖峰（佇列當緩衝）；要扇出給多個下游；下游慢或不穩、不想被它拖累可用性；流程本身就很長（見持久化工作流與 durable execution）。\n- **判準**：對每個下游呼叫問「這次回應**需要**它的結果嗎？」需要→同步（並配逾時／斷路器）；不需要→非同步推走。不要因為「非同步比較快」就把需要強一致確認的步驟也推成最終一致。\n\n### 常見誤解與陷阱\n\n- **把 `async/await` 語法當成「非同步通訊」**：語言層非阻塞 ≠ 通訊語意非同步。`await` 一個 HTTP 呼叫，邏輯流程仍卡在這裡等回應、仍是同步通訊、仍承擔下游的延遲與失敗。\n- **同步鏈過長**：A→B→C→D 全同步，A 的可用性＝各環節可用性相乘、延遲＝各環節相加、尾延遲被逐級放大。深同步呼叫鏈是脆弱性與長尾的主要來源（見領域 S 的 tail latency）。\n- **非同步＝沒有錯誤處理**：fire-and-forget 不代表可以忽略失敗，只是失敗從「同步拋給呼叫者」變成「事後在佇列／DLQ 裡」。沒有 DLQ 與監控的非同步，是把錯誤掃到地毯下（見領域 A 的 DLQ）。\n- **用非同步逃避強一致需求**：把「必須當下成功」的步驟（如扣款後才確認訂單）硬改非同步，製造「訂單已成立、款還沒扣」的不一致窗口。非同步換來的是可用性與吞吐，代價是放棄即時一致——別用在不能放棄的地方。\n\n### 延伸閱讀\n\n- Gregor Hohpe, Bobby Woolf, *Enterprise Integration Patterns*——Request-Reply、Correlation Identifier 等非同步通訊模式。\n- gRPC 官方文件，\"Core concepts\"（unary vs streaming，同步阻塞 vs 非同步 stub）：https://grpc.io/docs/what-is-grpc/core-concepts/\n- Martin Fowler, \"What do you mean by 'Event-Driven'?\"：https://martinfowler.com/articles/201701-event-driven.html\n\n## 事件驅動架構 EDA\n\n### 定義與原理\n\n事件驅動架構（Event-Driven Architecture, EDA）要解的問題是：**怎麼讓「某件事發生了」這個事實，能被任意多個（包含未來才出現的）關心者知道，而事實的產生者不必認識任何一個關心者。** 核心轉變是把通訊媒介從「命令」（command：我叫你做某事，我知道你是誰）換成「事件」（event：某件事發生了，我廣播這個事實，誰要聽自便）。**事件是過去式、是已發生的事實**（`OrderPlaced`、`PaymentCaptured`），它陳述「發生過什麼」而不是「請你做什麼」——這個語法差別正是解耦的來源：產生者只負責「說發生了什麼」，怎麼反應是聽眾的事。\n\nMartin Fowler 在〈What do you mean by 'Event-Driven'?〉（2017-01）裡把常被混為一談的「事件驅動」拆成**四種不同的模式**：**event notification**（事件通知）、**event-carried state transfer**（事件攜帶狀態傳遞）、**event sourcing**、**CQRS**。後兩者本檔另條深講（見 Event sourcing 與 CQRS）；這一條聚焦前兩者——它們是「用事件當通訊」最常見的兩種風格，差別在**事件裡裝多少資料**。\n\n- **event notification（事件通知）**：事件只帶「某事發生了＋一個 id」，幾乎不帶資料。訂閱者收到後若需要細節，**回頭去呼叫來源**問。好處是事件小、來源資料庫仍是單一真相；壞處是製造了「回頭查」的反向流量與隱性耦合（訂閱者又得認識來源）。\n- **event-carried state transfer（事件攜帶狀態傳遞）**：事件帶上訂閱者「會用到的全部資料」，訂閱者**不必回頭查**，自己存一份副本。好處是訂閱者徹底解耦於來源、效能好、來源負載低、可用性高（來源掛了訂閱者照樣運作）；壞處是**資料被複製、且引入最終一致**——訂閱者那份副本永遠晚於來源一點點（見領域 L 的 event-carried state transfer）。\n\n### 解法空間\n\nEDA 的設計選擇主要落在幾個軸上：\n\n- **事件裝多少資料**：thin（只帶 id，event notification）↔ fat（帶完整狀態，event-carried state transfer）。中間有「帶部分常用欄位」的折衷。\n- **傳輸基礎建設**：broker-based（Kafka／RabbitMQ／SNS+SQS 等中介，見領域 A）↔ brokerless。broker 決定持久性、順序、重放能力。\n- **topic 粒度**：粗（一個 topic 一堆事件型別）↔ 細（一個事件型別一個 topic）。影響訂閱者的過濾負擔與耦合。\n- **事件契約治理**：事件 schema 是公開契約，要向後相容演進（見領域 A 的序列化與 schema 演進）。事件一旦發出去就是「已發布的 API」。\n- **訂閱模型**：competing consumers（一群 worker 分攤，每則只一個處理）↔ pub/sub fan-out（每個訂閱者都收到一份，見領域 A 的 SNS／consumer group）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| event notification（thin event） | 事件小、來源是單一真相、不複製資料 | 事件頻繁、訂閱者只偶爾需要細節、資料敏感不宜廣播 | 訂閱者要「回頭查」→ 反向流量＋仍耦合來源；來源掛了訂閱者也卡；查到的可能已是更新後的值（時序坑） |\n| event-carried state transfer（fat event） | 訂閱者完全自足、來源負載低、來源掛了仍可運作 | 訂閱者頻繁需要資料、要高可用、要跨服務複製狀態 | 資料複製＋最終一致；fat event 變大；事件 schema 變更影響面廣（見領域 L） |\n| broker-based（Kafka 等） | 持久化、可重放、有序（partition 內）、解耦 | 要重放歷史、多下游、要保證不丟 | 運維 broker；順序只在 partition 內保證（見領域 A） |\n| pub/sub fan-out | 一個事件扇出給 N 個未知／可增訂閱者 | 一個變更要驅動多個獨立反應 | 每個訂閱者各自要冪等；扇出放大下游負載（見領域 A 的 SNS） |\n\n一個帶數字的取捨。一個訂單服務每秒產生 **1,000 筆** `OrderPlaced` 事件，有三個下游：出貨、發票、推薦。\n\n- 用 **event notification**（事件只帶 `orderId`）：每筆事件約 **100 bytes**，三個下游各自要回頭呼叫訂單服務拿明細。下游負載：訂單服務每秒被多打 **3,000 次** 查詢（3 下游 × 1,000）——事件雖小，反向查詢流量是事件量的三倍，且訂單服務成了所有下游的同步依賴。\n- 用 **event-carried state transfer**（事件帶完整訂單，約 **2 KB**）：頻寬從 100 KB/s 升到 2 MB/s，但**三個下游零回頭查**，訂單服務不再被下游拖累，且它掛了的時候三個下游照樣能處理手上的事件。\n\n判準：**反向查詢的成本（流量＋耦合）vs 複製資料的成本（頻寬＋最終一致）**。下游越多、越頻繁需要資料，越偏向 fat event；事件超大或資料敏感、下游又很少真的需要細節，才用 thin event。\n\n### 何時需要\n\n- **需要 EDA**：一個變更要驅動多個、可能未來才增加的獨立反應（下單→出貨＋發票＋推薦＋通知…）；要時間／空間解耦；要能事後重放歷史驅動新功能。\n- **EDA 是 over-engineering 的時候**：流程是線性的、反應者固定就一兩個、且需要強一致的當下確認。為一個「A 做完叫 B 做」的簡單同步流程套上事件匯流排，得到的是難以追蹤的隱性流程，沒有對應好處。\n- **判準**：問「關心這件事的人是固定且少數、還是會增長且未知？」固定少數→直接呼叫可能更清楚；增長未知→事件解耦讓你加訂閱者不必動產生者。\n\n### 常見誤解與陷阱\n\n- **event 與 command 混用**：把 `SendEmail`（命令，我知道誰該做、期待它做）當事件發，等於偷渡了耦合——產生者其實知道下游、期待特定反應。真事件是 `OrderPlaced`（事實），誰反應、怎麼反應與產生者無關。命名用過去式事實能逼自己想清楚。\n- **隱性流程難追蹤**：EDA 把「A 觸發 B 觸發 C」藏進事件流，沒有一個地方能一眼看出端到端流程。複雜的事件鏈會變成「沒人完整知道一筆訂單會觸發什麼」的迷宮——要靠分散式追蹤（見領域 I）與事件文件補回可見性。\n- **event notification 的時序坑**：訂閱者收到「something changed, id=123」後回頭查，查到的可能已經是**再下一次更新後的值**（事件在途中，來源又被改了），導致處理的不是事件當下的狀態。fat event 沒這個問題（狀態就在事件裡）。\n- **把事件 schema 當內部結構隨意改**：事件一發布就是公開契約，所有訂閱者依賴它。破壞性地改欄位＝悄悄弄裂所有下游。事件 schema 要當 API 治理、向後相容演進（見領域 A）。\n- **以為 EDA 自動帶來最終一致以外的好處**：解耦、可擴展是真的，但你**買下了**最終一致、隱性流程、重複投遞（要冪等，見領域 A）這一整包代價。EDA 不是免費的解耦，是「用一組複雜度換另一組」。\n\n### 延伸閱讀\n\n- Martin Fowler, \"What do you mean by 'Event-Driven'?\"（四種模式的權威拆解）：https://martinfowler.com/articles/201701-event-driven.html\n- Gregor Hohpe, Bobby Woolf, *Enterprise Integration Patterns*——Publish-Subscribe、Event Message 等模式。\n- Ben Stopford, *Designing Event-Driven Systems*（O'Reilly, 2018，Confluent 免費電子書）：https://www.confluent.io/designing-event-driven-systems/\n\n## Event sourcing 與 CQRS\n\n### 定義與原理\n\n這一條要解的問題是：**傳統做法只存「現在的狀態」（帳戶餘額＝500），歷史被覆蓋掉、永遠回答不了「它怎麼變成 500 的、某個時間點是多少」。** Event sourcing（事件溯源）翻轉這件事：**不存當前狀態，而存導致這個狀態的「不可變事件序列」**（`Deposited(100)`、`Withdrew(30)`、`Deposited(430)`…），當前狀態是「把所有事件依序套用（fold/replay）算出來的結果」。事件是 append-only 的事實，永不修改、永不刪除——這是它與「存當前狀態再 UPDATE」的根本差別。CQRS（Command Query Responsibility Segregation，命令查詢職責分離）由 Greg Young 提出與命名（約 2006–2010），Martin Fowler 推廣：**把「改狀態的寫入模型（command）」與「讀資料的查詢模型（query）」拆成兩個分開的模型**，各自最佳化。兩者常一起出現但**互相獨立**：可以只用 CQRS 不用 event sourcing，也可以反過來；但**用 event sourcing 幾乎一定要配某種 CQRS**——因為「append-only 事件流」不適合直接查詢，得另建一個讀模型。\n\n第一原理：\n\n- **Event sourcing 的核心保證**：事件是不可變的真相，**完整的審計軌跡天然存在**（每次變更都留痕）、**可時光回溯**（replay 到任一時點的狀態）、**可重建任意讀模型**（同一份事件可投影成多種視圖）。代價：讀「當前狀態」要 replay（靠 snapshot 加速）、事件 schema 演進棘手（舊事件永遠在、得永遠看得懂）。\n- **CQRS 的核心保證**：讀寫模型分開後，**寫端可為一致性／交易最佳化、讀端可為查詢／反正規化最佳化**，各自獨立擴展（讀多寫少時讀端可大量複製）。代價：兩個模型之間要同步，通常是**最終一致**（寫完到讀模型更新有延遲，見領域 B 的一致性光譜）。\n\n### 解法空間\n\n圍繞「狀態＝事件序列」與「讀寫分離」的具體做法：\n\n- **純 CQRS（不溯源）**：寫模型仍存當前狀態（正規化的關聯表），但另維護一份為查詢最佳化的讀模型（反正規化視圖／物化視圖／搜尋索引），兩者透過事件或 CDC 同步。機制：一份權威狀態＋一份查詢副本。\n- **Event sourcing + 投影（projection）讀模型**：事件流是唯一真相，背景把事件投影成各種讀模型（一個給列表頁、一個給詳情頁、一個給報表）。機制：事件 → 投影器 → 多個讀視圖。\n- **snapshot 加速**：定期把「replay 到某版本的狀態」存成 snapshot，之後只需從 snapshot 往後 replay 少數事件。機制：用快照截斷 replay 長度。\n- **事件投遞給讀端的管線**：寫端 append 事件後，怎麼可靠地讓讀端／投影器看到——常用 outbox（見領域 A）或從事件儲存的 log 訂閱、或 CDC（見領域 L）。機制：把事件可靠搬到讀模型。\n- **事件儲存（event store）**：專用的 append-only 儲存（如 EventStoreDB／Kurrent），或用 Kafka 的 log、或關聯表當 events 表。機制：保證事件有序、不可變、可依 stream 讀回。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 純 CQRS（讀寫分離、不溯源） | 讀寫各自最佳化與擴展；讀端可大量複製 | 讀遠多於寫、查詢型態與寫入型態差異大 | 讀模型最終一致（寫完讀不到自己剛寫的，要處理 read-your-writes，見領域 B）；兩模型同步成本 |\n| Event sourcing + 投影 | 完整審計軌跡、可時光回溯、可重建任意讀視圖 | 法遵／審計要求高、需歷史分析、需多種視圖 | 讀當前狀態要 replay（靠 snapshot）；事件 schema 演進難（舊事件永存）；學習曲線陡 |\n| snapshot 加速 | 把 replay 成本從 O(事件數) 降到 O(snapshot 後的事件數) | event-sourced 系統的長 stream | snapshot 也要隨事件 schema 演進；snapshot 是衍生物可重建、但別當真相 |\n| 事件儲存（專用 event store） | append-only、有序、stream-级讀回、樂觀並發（版本檢查） | 認真做 event sourcing | 多一個要運維的儲存；或用既有 DB/Kafka 替代各有取捨 |\n\n一個帶數字的場景。一個帳戶在 **3 年** 間累積了約 **5,000 筆** 交易事件。要算「當前餘額」，純 replay 要把 5,000 筆依序套用——若每筆套用 **0.02 ms**，約 **100 ms**，對高頻讀取太慢。引入 snapshot：每 **500 筆** 存一次當前狀態 snapshot，那麼讀「當前餘額」最多只需從最近的 snapshot 往後 replay **< 500 筆**（約 10 ms 以內）。而「審計」這件事在傳統「只存餘額」的系統裡幾乎做不到——你只有當前 500，問「2 年前的某天餘額多少」要靠另外維護的 log；在 event-sourced 系統裡，replay 到那天的事件即得，**審計能力是天生的、零額外成本**。這就是 event sourcing 的核心交換：**用「讀當前狀態變貴」換「歷史與審計變免費」。**\n\n跨領域接點：把事件從寫端可靠搬到讀端／其他服務，常靠 **outbox**（與 append 同交易寫出，見領域 A）或 **CDC**（從事件表的 log 擷取變更，見領域 L 的 CDC）；讀寫模型之間的最終一致與「讀己之寫」屬一致性模型問題（見領域 B 的一致性光譜）。Kafka 的 log 結構天然適合當事件流（見領域 A 的 Kafka）。\n\n### 何時需要\n\n- **需要 event sourcing**：審計／法遵要求「每一次變更都要可追溯、不可竄改」（金融、醫療、帳務）；需要時光回溯或重放歷史驅動新分析；同一份資料要餵多種差異很大的視圖。\n- **需要 CQRS（可不溯源）**：讀寫負載／型態嚴重不對稱（讀爆量、查詢複雜、寫入簡單），單一模型同時服務兩者很彆扭。\n- **明確是 over-engineering**：簡單 CRUD、無審計需求、讀寫對稱、團隊不熟這套——硬上 event sourcing 會引入 replay、snapshot、事件演進、最終一致一整包複雜度，換來用不上的能力。**這是最常被濫用的兩個模式之一**：大多數系統用「存當前狀態＋一張審計表」就夠，不需要把整個狀態翻成事件流。\n- **判準**：問「我真的需要『每次變更的完整不可變歷史』嗎？」是→考慮 event sourcing；問「讀寫負載／模型是否嚴重不對稱到單一模型很痛？」是→考慮 CQRS。兩個問題都否，就別碰。\n\n### 常見誤解與陷阱\n\n- **以為 CQRS 一定要配 event sourcing**：兩者獨立。純 CQRS（寫端存當前狀態＋讀端反正規化視圖）很常見也輕量，不必把狀態翻成事件流。把兩者綁死是過度複雜化的常見起點。\n- **低估事件 schema 演進**：傳統表改欄位是一次性遷移；event-sourced 系統裡**舊事件永遠存在、永遠要看得懂**。改事件結構要靠 upcasting（讀舊事件時轉成新格式）等技巧，這是長期維護最痛的點。\n- **忽略讀模型的最終一致**：CQRS 下寫完，讀模型更新有延遲，使用者「剛改完卻讀到舊值」。要嘛對關鍵讀走寫端、要嘛用 read-your-writes 技巧（見領域 B），不能假裝讀寫即時一致。\n- **把 snapshot 當真相**：snapshot 是「事件 replay 的快取」，是衍生物、可從事件重建。若把 snapshot 當權威來源去改它，就破壞了「事件是唯一真相」的核心保證。\n- **事件裡塞「命令意圖」或可變引用**：事件該是已發生的不可變事實（含當時的值），不該存「指向會變的外部資料的引用」——否則 replay 出來的歷史會隨外部資料變動而失真。事件要自足記錄「當時發生了什麼」。\n\n### 延伸閱讀\n\n- Martin Fowler, \"CQRS\"：https://martinfowler.com/bliki/CQRS.html\n- Martin Fowler, \"Event Sourcing\"：https://martinfowler.com/eaaDev/EventSourcing.html\n- Greg Young, \"CQRS Documents\"（原創者的權威整理，PDF）：https://cqrs.files.wordpress.com/2010/11/cqrs_documents.pdf\n\n## 持久化工作流與 durable execution\n\n### 定義與原理\n\n這一條要解的問題是：**一個跨越數秒、數天、甚至數月的長流程——下單 → 等付款 → 扣庫存 → 安排出貨 → 等簽收 → 結案——中間任一步崩潰（行程被殺、機器重啟、部署滾動），怎麼讓它「從斷點繼續」而不是從頭重來、也不是卡在半路？** 傳統做法是把流程狀態散在資料庫欄位裡（`order.status = 'awaiting_payment'`），靠一堆 cron／重試／補救 job 推進——這種「狀態機散在各處」的做法極易出現「卡在某狀態沒人推」「重試把已完成的步驟又做一遍」的洞。\n\nDurable execution（持久化執行）翻轉這件事：**把「程式的執行狀態本身」持久化**。你用一般的程式碼寫流程（順序、迴圈、if、呼叫子步驟），但底層引擎把**每一步的輸入、輸出、決策**都記進一個持久化的事件歷史（history）。當行程崩潰後在別處重啟，引擎**重放（replay）這段歷史**，把你的函式「快轉」回崩潰前的那一行，已完成的步驟**不重做**（直接從歷史取回結果），從斷點繼續往下。對你的程式碼來說，它「感覺不到」自己崩潰過——這就是「durable」的意思：執行狀態像資料一樣持久。代表系統：**Temporal**（開源，MIT 授權，由 Uber Cadence 的原班人馬 Maxim Fateev 與 Samar Abbas 創立的 Temporal Technologies 維護，2026-06 持續活躍）、**AWS Step Functions**（全託管，用 ASL 定義狀態機）、Azure Durable Functions、Cadence 等。\n\n第一原理：**它把「重試與恢復」從你的業務邏輯裡抽出來，下沉成平台保證**。你不再手寫「這步失敗了存個狀態、之後 cron 來重試」，而是寫一個「看起來像同步、實則可中斷可恢復」的函式，崩潰恢復由引擎負責。代價是你的工作流程式碼必須**deterministic（決定性）**——replay 時每次走的路徑要一致，所以不能直接在工作流裡 `new Date()`、`Math.random()`、直接打 I/O（這些要透過引擎提供的 activity／side-effect 封裝，讓結果被記進歷史、replay 時取回同一值）。\n\n### 解法空間\n\n讓長流程能跨崩潰恢復的辦法，由「手刻」到「平台化」：\n\n- **手刻狀態機 + 持久化欄位**：用 DB 欄位記流程狀態，cron／worker 輪詢推進，每步自己處理重試與冪等。機制：狀態在資料、推進靠輪詢。\n- **saga 編排（orchestration）**：一個協調者依序呼叫各步驟，失敗時逆序執行補償交易（compensating transaction）回滾已做的（見領域 A 的 outbox／saga）。機制：用「補償」抵銷而非「回滾」，因為跨服務無分散式交易。\n- **durable execution 引擎（Temporal／Step Functions 等）**：把執行狀態（事件歷史）持久化，崩潰後 replay 回斷點。機制：持久化「程式走到哪、每步結果是什麼」，恢復＝重放歷史。\n- **持久化計時器／長等待**：流程要「等 3 天」或「等外部事件（付款回呼）」時，引擎持久化這個等待，期間不佔執行資源，到時或事件到達才喚醒。機制：等待本身也是持久化狀態。\n\ndurable execution 與 saga 的關係常被搞混：**它們解的層次不同，且互補**。saga 是一個**模式**（怎麼在沒有分散式交易下維持跨服務一致性——靠補償），它不關心「協調者自己崩潰了怎麼辦」。durable execution 是一個**執行基礎建設**（怎麼讓任何長流程——包括一個 saga 的協調者——崩潰後可靠恢復）。實務上常見的組合是：**用 durable execution 引擎來實作 saga 的協調者**——這樣連「協調者執行到一半掛掉」都被引擎的 replay 兜住，補償邏輯本身也保證會被執行完。saga 的補償語意見領域 A 的 outbox／saga。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 手刻狀態機 + cron 推進 | 無框架依賴、簡單流程下最直接 | 流程短、步驟少、團隊不想引入新平台 | 「卡在某狀態沒人推」「重試重做已完成步驟」靠你自己防；步驟一多狀態爆炸、難維護 |\n| saga 編排 + 補償 | 跨服務最終一致：要嘛全做完、要嘛補償回滾 | 跨多服務、無分散式交易、可定義補償動作 | 補償邏輯難寫（有些動作無法真正撤銷，如「已寄出的信」）；協調者自身的可靠性要另解（見領域 A） |\n| Temporal（durable execution） | 執行狀態持久化、崩潰自動 replay 回斷點、已完成步驟不重做、持久化長等待 | 長流程、多步驟、要可靠恢復、要可見性 | 工作流碼必須 deterministic（不可直接用時間／隨機／I/O）；要運維 Temporal 叢集或用 Cloud；學習曲線 |\n| AWS Step Functions（Standard） | 全託管、Standard workflow 對狀態轉移提供 exactly-once 語意、最長可跑 **1 年**、可審計 | AWS 生態、不想自運維、流程可用 ASL 狀態機表達 | Standard 每次轉移有成本（高頻短流程貴）；Express workflow 改 at-least-once、最長 **5 分鐘**、需冪等（2026-06） |\n\n一個帶數字的取捨。一個「下單後等付款，逾時 **30 分鐘** 未付則取消」的流程。\n\n- **手刻**：下單時寫 `status=awaiting_payment`、`expire_at=now+30min`，再跑一個 cron 每分鐘掃「`expire_at < now` 且仍 awaiting」的訂單去取消。問題：cron 掛了一段時間 → 一批訂單該取消沒取消；cron 重疊跑 → 同一訂單可能被取消邏輯跑兩次（要冪等防）；流程一複雜（付款後還要扣庫存、排出貨…）狀態欄位與 cron 規則爆炸。\n- **durable execution**：工作流碼直接寫「`await sleep('30min')`；醒來檢查付款狀態，未付就取消」。那個 30 分鐘的等待被引擎**持久化**——worker 在這 30 分鐘可以全部重啟、可以擴縮、可以部署新版，醒來時引擎 replay 把流程接回那一行繼續。一個流程實例的等待**不佔執行緒、不靠輪詢**。假設有 **10 萬筆** 在途訂單同時各自等 30 分鐘：手刻 cron 每分鐘要掃這 10 萬筆判斷誰到期；durable execution 則是 10 萬個持久化計時器，到期才精準喚醒對應實例，沒有全表掃描。**判準：流程越長、步驟越多、「等待」越久越多，手刻狀態機的維護與可靠性成本上升越快，durable execution 的「把恢復下沉成平台保證」越划算。**\n\n### 何時需要\n\n- **需要 durable execution**：多步驟、跨服務、含長等待（等付款、等審批、等外部回呼）的長流程；要求「中途崩潰能精確從斷點恢復、已完成步驟不重做」；流程邏輯複雜到散在 cron／狀態欄位裡已難維護。\n- **明確是 over-engineering**：單步或兩三步的短同步流程、無長等待、無跨服務協調——套上 durable execution 引擎是用大砲打蚊子，多一個要運維／學習的平台。一個簡單的「呼叫 A 再呼叫 B」用同步呼叫＋逾時重試就夠。\n- **判準**：問「這流程會不會跨越行程生命週期（含部署、重啟）、含分鐘／天級的等待、且崩潰後必須精確恢復？」三者都中→durable execution；只是個短請求→別碰。\n\n### 常見誤解與陷阱\n\n- **以為 durable execution＝saga 的替代品**：兩者不同層。saga 是「跨服務一致性怎麼維持（補償）」的模式；durable execution 是「長流程怎麼可靠執行與恢復」的基礎建設。**最佳實務常是用後者實作前者**——別把它們當二選一。\n- **在工作流碼裡直接用時間／隨機／I/O**：durable execution 靠 replay 恢復，要求工作流碼 deterministic。直接 `new Date()`、`Math.random()`、直接打 HTTP，會讓 replay 時走的路與當初不同，狀態錯亂。這些副作用必須透過引擎的 activity／side-effect 封裝（結果記進歷史、replay 時取回同一值）。\n- **把 activity 當成「保證只跑一次」**：durable execution 保證「工作流的編排邏輯」精確恢復，但**activity（實際的外部呼叫）本身通常是 at-least-once**——崩潰時機可能讓同一個 activity 被重試。activity 的副作用（扣款、發信）仍須冪等（見領域 A 的冪等）。Step Functions Standard 對「狀態轉移」是 exactly-once，但它呼叫的下游動作是否冪等仍是你的責任。\n- **誤判 Step Functions 的工作流型別**：Standard 是 exactly-once、可跑到 1 年、適合非冪等關鍵流程；Express 是 at-least-once、上限 5 分鐘、為高吞吐短流程，套錯型別（拿 Express 跑非冪等的金流）會出重複執行（2026-06）。\n- **以為「持久化執行」就不必想冪等與補償**：引擎兜住「協調邏輯的恢復」，但「已經對外造成的真實副作用」（信已寄、款已扣）它撤不回——那仍要靠冪等防重、靠補償邏輯回滾（有些動作根本無法撤銷，設計時就要避免）。\n\n### 延伸閱讀\n\n- Hector Garcia-Molina, Kenneth Salem, \"Sagas\"（SIGMOD '87, pp. 249–259）——長流程與補償交易的原典：https://dl.acm.org/doi/10.1145/38713.38742\n- Temporal 官方文件，\"Workflow Execution\"（執行歷史、replay、determinism）：https://docs.temporal.io/workflow-execution\n- AWS Step Functions 官方文件，\"Choosing workflow type\"（Standard vs Express：exactly-once／at-least-once、時長上限）：https://docs.aws.amazon.com/step-functions/latest/dg/choosing-workflow-type.html\n"}, {"id": "J-cloud-primitives", "file": "J-cloud-primitives.md", "group": "Part 6 — 架構、雲端與發布", "title": "J · 雲端與編排原語", "md": "# J · 雲端與編排原語\n\n雲端的運算原語（serverless function、排程器、編排器）把「何時跑、跑幾次、跑在哪台機器」這些調度決策從你手裡接走，換來彈性與免運維——但同時也把一組分散式系統的硬保證問題搬到你面前：執行環境隨時可丟、排程不是 exactly-once、節點的死活只能用逾時去猜。本檔涵蓋五條：Lambda（serverless function 的執行模型與特有調校）、無狀態 vs 有狀態（為什麼這層運算必須把狀態外置）、K8s CronJob（排程觸發的交付語意）、時間與排程（排程觸發的時間語意：用哪種鐘量逾時、漏跑怎麼補）、失敗偵測（在這層只能用逾時判生死）。邊界：冷啟動的通用機制在領域 S，本檔只點 Lambda 特有的 SnapStart；時間/時鐘的完整機制（邏輯時鐘、UTC/DST 應用層坑）在領域 M，本檔只講排程觸發語意；health check 的探針機制在領域 P，本檔只講「逾時是唯一手段」這個分散式視角。\n\n## Lambda\n\n### 是什麼與內部機制\n\nAWS Lambda 是事件驅動的 serverless 運算：你交一段函式碼與一個 handler，平台在事件到來時啟動一個 **execution environment**（一個受隔離的 microVM）來跑它，跑完保留一段時間以便重用，閒置夠久就回收。一個 execution environment 在任一瞬間只服務**一個** invocation——這是理解 Lambda 併發模型的關鍵：要同時處理 N 個請求，平台就得有 N 個 environment 同時存在。\n\n一次冷啟動（cold start）= 找/造一個新 microVM → 下載你的程式碼 → 啟動 runtime → 跑你的 init 程式碼（handler 外的頂層程式）→ 才進 handler。重用既有 environment 時這些全跳過，是為 warm start。冷啟動的通用成因與暖機策略屬通用機制（見冷啟動與暖機，領域 S）；這裡只談 Lambda 特有的減速手段。\n\n**SnapStart** 是 Lambda 特有機制：它在你發布版本時先把 init 跑完，對初始化完成的 microVM 記憶體拍一個加密快照（Firecracker microVM snapshot），之後的冷啟動直接從快照還原，跳過「啟動 runtime + 跑 init」這段，官方稱可去除約 70–90% 的 init latency。代價是 snapshot 是在發布時拍的、之後每個 invocation 共用同一份還原起點，所以 init 期間建立的東西（產生的亂數種子、開好的 DB 連線、快取的時間戳）在還原後可能「不新鮮」——須用 runtime hook（`beforeCheckpoint` / `afterRestore`）在還原後重建。\n\n### 在哪些系統扮演什麼角色\n\n- **事件處理 worker**：S3 物件到達、SQS/SNS 訊息、DynamoDB Streams、EventBridge 事件觸發一段處理邏輯。Lambda 在這裡是「免管理機器的 consumer」。\n- **API 後端**：API Gateway 或 ALB 把 HTTP 請求轉成同步 invoke，Lambda 當無狀態 request handler（見 API gateway 的角色，領域 H）。\n- **排程任務**：EventBridge Scheduler 定時觸發，當 cron 用（與 K8s CronJob 同類角色，語意差異見 K8s CronJob 與時間與排程）。\n- **膠水 / 編排步驟**：Step Functions 的一個 task state 呼叫 Lambda 當單一步驟（持久化工作流見領域 K）。\n\n### 保證與限制\n\n帶數字的硬限制（2026-06，以官方 quotas 為準）：\n\n| 維度 | 值 | 注意事項 |\n|---|---|---|\n| Timeout | 預設 3s、最大 **900s（15 分鐘）** | 超過即被砍，長流程須拆步或改用 durable workflow |\n| Memory | 128 MB–10,240 MB | CPU 隨 memory 線性配比，調記憶體＝同時調 CPU |\n| 帳號預設併發 | **1,000（per region，可申請調高）** | 是「同時存在的 environment 數」上限，非 RPS |\n| Sync payload | **6 MB**（request＋response 各自上限） | 超過要把大 payload 放 S3 傳引用（見 S3 / 物件儲存，領域 G） |\n| Async payload | **1 MB**（2025-10-24 起，原為 256 KB） | 這是 2025 才放大的數字，舊資料常仍寫 256 KB |\n| /tmp 暫存 | 預設 512 MB、可調至 10,240 MB | ephemeral，跨 invocation 不保證保留 |\n\n**Worked example（併發推算）**：每個請求平均跑 200 ms、要支撐穩定 2,000 req/s。同時在跑的 environment 數約 = 到達率 × 平均處理時間 = 2,000 × 0.2 = **400 個併發**——在預設 1,000 上限內。但若處理時間因下游變慢漲到 800 ms，需求變 2,000 × 0.8 = **1,600 個**，直接撞上預設 1,000 上限，後續請求收到 throttle（429）。這就是 Lambda 併發的陷阱：併發需求 = 流量 × 延遲，下游一慢、所需併發成倍漲，限流不是被流量打爆而是被延遲打爆。\n\nSnapStart 支援的 runtime（2026-06，已查證）：\n\n| Runtime | SnapStart | 備註 |\n|---|---|---|\n| Java | 支援（11 / 17 / 21） | Java 託管 runtime 無額外費用 |\n| Python | 支援（3.12+） | 2024-11 GA |\n| .NET | 支援（8+） | 2024-11 GA |\n| Node.js | **不支援**（2026-06） | nodejs 各版皆不支援；container image、OS-only runtime 亦不支援 |\n| Ruby | 不支援 | 同上 |\n\nSnapStart 另不支援 provisioned concurrency、EFS、>512 MB 的 ephemeral storage。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| AWS Lambda | 免運維、毫秒計費、自動擴縮到 0 | 突發/稀疏流量、事件處理、膠水 | 冷啟動延遲、15 分鐘上限、本地無持久狀態 |\n| 容器（ECS/EKS 常駐） | 長連線、無冷啟動、可有狀態 sidecar | 穩定高流量、長流程、需 WebSocket | 要自管擴縮與機器，閒置仍計費 |\n| Cloud Run / Knative | 介於兩者：容器化 + 縮到 0 | 想要容器彈性又要自動縮放 | 仍有冷啟動，並發模型與 Lambda 不同 |\n| Provisioned concurrency | 預先初始化環境、近零冷啟動 | 延遲敏感、可預測尖峰 | 預留即計費，與 SnapStart 互斥 |\n\n判準：**流量稀疏或尖峰陡 → Lambda**（縮到 0 省錢）；**流量穩定且高 → 常駐容器**（攤平後容器更便宜、無冷啟動）。延遲敏感的尖峰用 provisioned concurrency 或（Java/Python/.NET）SnapStart 補冷啟動。\n\n### 常見誤解與陷阱\n\n- **「Lambda 是無狀態的所以我不用管狀態」**：函式碼語意上無狀態，但 execution environment 會被**重用**——頂層（init 外）的全域變數、`/tmp` 內容會跨 invocation 殘留。把使用者資料快取在全域變數，下一個請求（不同使用者）可能讀到上一個的——這是真實的資料外洩路徑。全域只放無狀態的東西（DB client、設定）。\n- **「SnapStart 全 runtime 都能用」**：Node.js / Ruby 不支援（2026-06）。Node 冷啟動本就相對低，這是官方不優先支援的理由，但若你押注 SnapStart 來救 Node 冷啟動會落空。\n- **「async payload 還是 256 KB」**：2025-10-24 起已是 1 MB。仍照 256 KB 設計的截斷邏輯會在 256 KB–1 MB 區間放行原本預期會被擋的訊息。\n- **冷啟動連線風暴**：每個新 environment 各自開 DB 連線，併發 400 就是 400 條連線，瞬間擴張可打爆 DB 連線上限——serverless 連 DB 應走外部連線池（見連線池，領域 N）。\n- **併發上限是 environment 數不是 RPS**：1,000 併發在 200 ms 處理下約等於 5,000 req/s，但在 2s 處理下只剩 500 req/s。換算永遠要乘上延遲。\n\n### 延伸閱讀\n\n- [Improving startup performance with Lambda SnapStart](https://docs.aws.amazon.com/lambda/latest/dg/snapstart.html)（官方，含支援 runtime 與限制）\n- [Lambda quotas](https://docs.aws.amazon.com/lambda/latest/dg/gettingstarted-limits.html)（官方，timeout/memory/payload/併發上限）\n- [AWS Lambda payload size 256 KB → 1 MB for async invocations](https://aws.amazon.com/about-aws/whats-new/2025/10/aws-lambda-payload-size-256-kb-1-mb-invocations/)（2025-10 公告）\n- [SnapStart for Python and .NET is now GA](https://aws.amazon.com/blogs/aws/aws-lambda-snapstart-for-python-and-net-functions-is-now-generally-available/)\n\n## 無狀態 vs 有狀態\n\n### 定義與原理\n\n一個運算單元是**無狀態**的，意思是：它在兩次請求之間不持有任何「下一次請求正確處理所必需」的記憶體狀態。任意一個實例都能處理任意一個請求，把實例殺掉再換一個，行為不變。**有狀態**則相反：實例的記憶體裡握著外面取不到的東西（連線進度、累計計數、會話資料、本地排序緩衝），殺掉這個實例就丟了。\n\n第一原理是一句殘酷的事實：**process 的記憶體是 process 的私產，process 一死即蒸發。** serverless / 自動擴縮的世界裡，execution environment 與 container 是「牲口不是寵物」——隨時可能被回收、搬遷、因擴縮而增減。所以一條鐵律浮現：**持久化是一個主動動作，不是預設行為。** 你寫進記憶體的東西不會自己活下來；要它活過重啟，你得**主動**把它寫到一個重啟後仍在的地方（DB、Redis、物件儲存、訊息佇列）。沒主動寫出去的，重啟就是失憶，平台不會替你保管。\n\nserverless 要求無狀態，正是因為平台保留「隨時換掉你的實例」的權利——它用這個權利換來彈性擴縮、滾動更新、故障自癒。你交出「狀態留在記憶體」的便利，換來「實例可被任意替換」的彈性，這是一筆明確的交易。\n\n### 解法空間\n\n把狀態外置（externalize）的辦法：\n\n- **會話/使用者狀態 → 外部 store**：session 放 Redis 或 DB，不放 process 記憶體；請求自帶 token（JWT，見領域 F）讓任一實例都能驗。\n- **進行中的工作狀態 → 持久佇列 / durable workflow**：長流程的中間狀態交給 Step Functions / Temporal（見持久化工作流與 durable execution，領域 K），實例死了流程能從上次的持久點續跑。\n- **本地快取 → 接受它是易失的**：把記憶體快取定位成「可重建的加速層」，重啟就重建，不當權威來源（cache-aside，見快取策略，領域 G）。\n- **連線/檔案 → 每次重建或走外部池**：DB 連線交給外部 pooler，臨時檔放 `/tmp` 但不假設它跨 invocation 存在。\n- **累計型狀態（計數、聚合）→ 原子化到外部**：用 Redis `INCR` 或 DB 的原子更新，而非「讀進記憶體 +1 再寫回」（那是 race，見 race condition，領域 D）。\n- **真的需要黏住 → sticky session（次選）**：WebSocket 等長連線靠 session affinity 把同一 client 綁到同一實例（見連線狀態與水平擴展，領域 C），但這是把無狀態的好處部分讓出去換來的，擴縮時仍會斷。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 狀態外置到 DB/Redis | 任一實例可服務任一請求，可隨意擴縮 | 絕大多數無狀態服務的預設 | 每請求多一次外部往返；外部 store 變成新的單點，要它自己的 HA |\n| Durable workflow | 長流程中間狀態持久、可從斷點恢復 | 多步驟、跨服務、長時程的編排 | 引入額外平台與心智模型；非所有流程都值得 |\n| 本地快取（易失） | 命中時快、重啟自動重建 | 讀多寫少、可容忍 miss 的加速 | 不可當權威來源；多實例間快取不一致 |\n| Sticky session | 同 client 落同實例、保留連線態 | WebSocket、無法外置的長連線狀態 | 負載不均、擴縮/重啟時連線斷、實例死即丟該 client 狀態 |\n\n判準：**能外置就外置**（換來自由擴縮）；只有外置成本過高（如即時媒體的記憶體緩衝）才退而用 sticky，並接受它的脆弱。\n\n### 何時需要\n\n- **必須無狀態**：任何要自動擴縮 / 滾動更新 / 跑在 serverless 的請求處理層——沒有選擇，平台會替你殺實例。\n- **可以有狀態（且接受代價）**：單實例的批次工具、開發期原型、明確不需擴縮的內部工具。一旦要橫向擴展或上 serverless，有狀態就成了擴縮的天花板。\n- **over-engineering 警訊**：把本來單機就夠、永遠不會擴縮的小工具硬塞進「全狀態外置」架構，徒增 Redis/DB 往返延遲與運維面。無狀態是擴縮的手段，不是無條件的美德。\n\n### 常見誤解與陷阱\n\n- **「我沒存全域變數所以是無狀態」**：連線池、模組級快取、`/tmp` 的累積檔案、甚至 logging buffer 都是狀態。無狀態的檢驗標準是「殺掉換一個，行為不變嗎」，不是「我有沒有寫 `global`」。\n- **把記憶體當持久層**：「先寫進 map，背景再 flush 到 DB」——實例在 flush 前死掉，那段資料憑空消失且沒人知道。持久化必須在「回應成功」之前完成，或明確走 outbox（見 outbox / saga，領域 A）。\n- **以為 serverless 自動幫你保存狀態**：平台只保證「會給你一個能跑的實例」，不保證「是同一個」「上次的記憶體還在」。\n- **sticky session 當高可用用**：sticky 只決定「路由去哪」，不複製狀態。被綁的實例一死，那批 client 的記憶體狀態照樣全丟——sticky 不是備援。\n- **跨 invocation 殘留誤當作快取**：Lambda environment 重用會讓全域變數殘留，初學者誤以為這是「平台幫我快取」，實則不可靠（環境隨時被回收）且有把上一請求資料洩漏給下一請求的風險。\n\n### 延伸閱讀\n\n- [The Twelve-Factor App — VI. Processes（Execute the app as stateless processes）](https://12factor.net/processes)\n- [The Twelve-Factor App — IV. Backing services](https://12factor.net/backing-services)\n\n## K8s CronJob\n\n### 是什麼與內部機制\n\nKubernetes CronJob 是一個依 cron 時間表反覆建立 **Job** 的控制器資源（穩定 API：`batch/v1`，自 v1.21 GA）。它本身不跑你的程式——它的工作是「到點了就建一個 Job」，Job 再建 Pod、Pod 才跑你的容器。所以 CronJob 是「排程器」這一層，真正的執行語意（重試幾次、算不算成功）落在它生出的 Job 上。\n\nCronJob controller 的運作迴圈大致是：週期性醒來 → 算「從上次排程到現在，照 `schedule` 應該觸發幾次」→ 對每個該觸發的時間點，依 `concurrencyPolicy` 決定建不建 Job。關鍵欄位：\n\n- `schedule`：標準 cron 字串（如 `*/5 * * * *` 每 5 分鐘），可指定 `timeZone`。\n- `concurrencyPolicy`：上一個 Job 還沒跑完、下一個排程到了時怎麼辦——`Allow`（預設，並行跑）、`Forbid`（跳過這次、不重疊）、`Replace`（殺掉舊的、跑新的）。\n- `startingDeadlineSeconds`：排程時間到了但 controller 太晚才處理（如 controller 當機重啟），超過這個秒數就放棄這次觸發。\n- `successfulJobsHistoryLimit` / `failedJobsHistoryLimit`：保留幾個歷史 Job 物件（預設 3 / 1）。\n\n**Missed-schedule 行為（官方）**：controller 算「自上次排程以來錯過幾次」，若**超過 100 次**就停止排程並記 error（`too many missed start time (> 100)`）——典型成因是 controller / 叢集當機很久、或 `startingDeadlineSeconds` 沒設。若設了 `startingDeadlineSeconds`，則只在該秒數的窗口內數錯過次數，避開這個 100 次的死結。\n\n### 在哪些系統扮演什麼角色\n\n- **定期批次**：對帳、報表、清理過期資料、TTL 掃描。\n- **週期維護**：cache 預熱、憑證輪替觸發、健康巡檢。\n- **外部 cron 的叢集內替代**：取代散落在各機器 crontab 的腳本，集中受 K8s 調度與可觀測性管理。\n- **觸發長流程的起點**：CronJob 只負責「按時點火」，點火後的長流程交給 durable workflow 或佇列（見領域 K / A）。\n\n### 保證與限制\n\n**最重要的限制：CronJob 不是 exactly-once。** 官方文件明說「在某些情況下，一個 job 可能被建立兩次，或一次都不建立」。原因是排程觸發跨越了 controller 的故障邊界：controller 重啟、時鐘抖動、API server 暫時不可達，都可能讓某次觸發漏掉或重複。因此**你的 Job 必須冪等**（見冪等，領域 A）——同一邏輯時間點跑兩次不能造成雙重副作用。\n\n`concurrencyPolicy` 提供的也只是**盡力**保證，不是分散式互斥鎖。`Forbid` 不保證「絕對不重疊」（兩個 controller 視角下的競態仍可能讓兩個 Job 短暫並存）；要真正的單一執行者保證，需在 Job 內部再加一把分散式鎖 + fencing token（見分散式鎖，領域 M）。\n\n**Worked example（漏跑的代價）**：一個 `*/5 * * * *`（每 5 分鐘）的 CronJob，叢集 control plane 升級導致 controller 停了 4 小時。4 小時 = 240 分鐘 = **48 次**排程被錯過。重啟後 48 < 100，controller 會為**最近一個**漏掉的時間點補建『一個』Job（K8s 刻意只補最新一次、不會把那 48 次批量回填）。但若停了 **9 小時** = 540 分鐘 = 108 次 > 100，controller 直接放棄、記 error 並**不再排程**——一個沒設 `startingDeadlineSeconds` 的每分鐘 CronJob，叢集斷 1 小時 41 分（101 分鐘）就會永久卡住，直到人工介入。這是真實的生產陷阱：高頻 CronJob + 沒設 deadline + 一次長停機 = 排程默默死掉。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| K8s CronJob | 至少觸發（非 exactly-once）、叢集內統一調度 | 已在 K8s 上的週期批次 | 100 次漏跑死結、`Forbid` 非真互斥、Job 須冪等 |\n| 傳統 crontab | 單機簡單、無依賴 | 單台機器的本地腳本 | 機器死即不跑、無 HA、無集中觀測 |\n| EventBridge Scheduler / 雲 cron | 託管、高可用觸發 | serverless / 雲原生排程 | 仍非 exactly-once，下游須冪等 |\n| Durable workflow 的 schedule | 排程 + 持久化狀態 + 自動重試恢復 | 長流程、需斷點恢復的排程任務 | 重，單純定時跑腳本用不到 |\n\n判準：**已在 K8s 上、任務是冪等的短批次 → CronJob**；**任務本身是有狀態長流程 → 用 CronJob 只點火、流程交 durable workflow**；**需要嚴格不重疊 → CronJob 外加應用層分散式鎖**。\n\n### 常見誤解與陷阱\n\n- **「concurrencyPolicy: Forbid 等於分散式鎖」**：它只防同一 CronJob 的相鄰排程重疊，不防你別處手動觸發、不跨叢集、競態下仍可能短暫並存。要互斥保證得自己加鎖。\n- **「CronJob 會 exactly-once 執行」**：不會。漏跑與重複都在官方承認的可能範圍內，Job 必須冪等。\n- **沒設 `startingDeadlineSeconds` 的高頻任務**：一次長停機累積過 100 次漏跑，CronJob 會永久停擺且只在 controller log 留一行 error，監控若沒抓這條，會以為任務還在跑。\n- **把 `schedule` 的時區當預設本地**：不指定 `timeZone` 時的解讀依叢集設定，跨時區團隊容易誤判觸發時刻（DST 邊界更亂，見時間與日期處理，領域 M）。\n- **依賴 Job 一定成功**：CronJob 只管「建 Job」，Job 失敗的重試由 Job 的 `backoffLimit` 管，CronJob 不會因 Job 失敗而「補一次」——別把「建了 Job」當成「任務成功了」。\n\n### 延伸閱讀\n\n- [Kubernetes — CronJob](https://kubernetes.io/docs/concepts/workloads/controllers/cron-jobs/)（官方，含 concurrencyPolicy、100 次漏跑、非 exactly-once 聲明）\n- [Kubernetes — Jobs](https://kubernetes.io/docs/concepts/workloads/controllers/job/)（CronJob 生出的 Job 的重試/完成語意）\n\n## 時間與排程\n\n### 定義與原理\n\n排程系統要回答兩個獨立的時間問題，混用任一個都會出事：**「現在幾點？要不要觸發？」**（牆鐘 wall clock 問題）和**「過了多久？逾時了沒？」**（間隔 interval 問題）。前者要的是與真實世界對齊的時刻，後者要的是穩定遞增的計時。\n\n- **牆鐘（wall clock，`CLOCK_REALTIME`）**：與 UTC 對齊的「真實時刻」。它會被 NTP 校正、被管理員手動改、會因校時而**往前跳或往後退**。它能回答「現在是不是 03:00、該不該跑這個 cron」。\n- **單調鐘（monotonic clock，`CLOCK_MONOTONIC`）**：從某個任意固定起點起**只增不減、不被 NTP 跳動影響**的計數（NTP 只能讓它緩慢 slew、不會讓它跳）。它能回答「我等了多久、逾時了沒」。\n\n鐵律：**判斷「到點觸發」用牆鐘，判斷「過了多久 / 逾時」用單調鐘。** 用牆鐘量間隔的經典 bug：你記下開始時間 `t0 = now()`，NTP 在中途把牆鐘往回撥 2 秒，你算 `now() - t0` 得到**負的**經過時間——逾時邏輯瞬間錯亂（可能永不逾時，或立刻誤判逾時）。時間/時鐘的完整機制（邏輯時鐘、向量時鐘、UTC/DST 應用層坑）是領域 M 的範圍；本條只談排程觸發的這層語意。\n\n排程的另一面是**觸發保證**：排程器和被觸發的工作之間隔著故障邊界，於是有兩個必答問題——**漏跑**（該觸發的時刻沒觸發，怎麼補？）與**補跑**（事後補觸發，會不會跟原本疊起來、會不會一口氣補一大批）。\n\n### 解法空間\n\n- **計時（逾時/退避）一律用單調鐘**：語言通常有對應 API（如 `process.hrtime`、`steady_clock`、`time.monotonic()`），別用 `Date.now()` / `gettimeofday` 量間隔。\n- **觸發判斷用牆鐘 + 明確時區**：cron 表達式錨在某時區（指定 `timeZone`），不靠機器本地時區的隱含預設。\n- **漏跑偵測**：記錄「上次成功觸發的邏輯時間」，重啟時比對應觸發時間，算出漏了幾次。\n- **補跑策略二選一**：\n  - **catch-up（補做）**：把漏掉的每個時間點都補跑一次（適合「每個時間點都有獨立工作」如每小時對帳）。\n  - **skip-to-latest（只做最新）**：漏了 N 次只跑最新一次（適合「冪等的全部重刷」如重算快取，補做 N 次是浪費）。\n- **設窗口上限**：給補跑加 deadline（如 K8s 的 `startingDeadlineSeconds`），避免長停機後一次補建一大批把系統打爆。\n- **去重邏輯時間鍵**：每次觸發帶一個「邏輯排程時間」當冪等鍵，重複觸發同一時間點被去重（見冪等 / 去重，領域 A）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單調鐘量間隔 | 逾時/退避計算不受校時影響 | 所有 timeout、retry backoff、計時 | 不能拿去顯示「現在幾點」，它無對應真實時刻 |\n| 牆鐘判觸發 | 與真實時刻對齊、人看得懂 | cron 觸發、「每天 03:00 跑」 | 受 NTP/DST 影響，跨時區須明確指定 |\n| catch-up 補跑 | 不漏掉任一時間點的工作 | 每時間點工作獨立（對帳、計費窗） | 長停機後可能一次補一大批，要配窗口上限 |\n| skip-to-latest | 避免補跑風暴 | 冪等的全部重刷（重算/重建） | 中間時間點的「那一刻狀態」會永久缺失 |\n| 邏輯時間鍵去重 | 重複觸發不造成雙重副作用 | 任何非 exactly-once 的排程 | 需要一個持久的去重 store 與 TTL |\n\n### 何時需要\n\n- **必須區分兩種鐘**：任何同時做「定時觸發」又做「逾時控制」的系統——幾乎所有排程器/worker 都是。\n- **必須想清補跑策略**：任務在「漏跑代價高」（計費、對帳缺一窗就少算錢）或「補跑代價高」（一次補 100 次把下游打爆）的場景。\n- **可以簡化**：純展示用、漏一兩次無感、人工隨時可手動重觸發的內部小任務——不必上完整的漏跑偵測 + 去重，但「量間隔用單調鐘」這條仍該守（成本幾乎為零、踩雷代價高）。\n\n### 常見誤解與陷阱\n\n- **用牆鐘量逾時**：`const t0 = Date.now(); ... if (Date.now() - t0 > TIMEOUT)`（示意，不可執行）——NTP 往回撥時 `Date.now() - t0` 可能變負或暴增，逾時判斷錯亂。改用單調鐘。\n- **假設 cron「不會漏、不會重」**：排程器跨故障邊界，漏跑與重複是常態（CronJob 官方就明說非 exactly-once，見 K8s CronJob）。沒有去重 + 冪等，補跑就是雙重副作用。\n- **補跑風暴**：長停機後 catch-up 一口氣補建幾十上百個 Job，瞬間把下游打爆——補跑必須有窗口上限或改 skip-to-latest。\n- **時區與 DST**：把 cron 錨在會 DST 的本地時區，春季跳鐘那天「02:30」這個時刻不存在、秋季回撥那天出現兩次——觸發時刻會詭異（機制細節見時間與日期處理，領域 M）。生產排程多以 UTC 錨定。\n- **把「該幾點」和「過多久」當同一個時間源**：兩個問題、兩種鐘，混用就是埋雷。\n\n### 延伸閱讀\n\n- [Linux `clock_gettime(2)` — CLOCK_MONOTONIC vs CLOCK_REALTIME](https://man7.org/linux/man-pages/man2/clock_gettime.2.html)\n- [Cron expression format（crontab(5)）](https://man7.org/linux/man-pages/man5/crontab.5.html)\n\n## 失敗偵測\n\n### 定義與原理\n\n在分散式系統裡，你想知道「對面那個節點/任務還活著嗎」，但你能依靠的只有一件事：**你發出去的東西，在限定時間內有沒有得到回應。** 沒有別的訊號。對方沒回應，可能是它死了、可能是它還活著只是慢、可能是網路把訊息或回應吞了——而**你無法從外部區分這三者**。這是失敗偵測的第一原理，也是它最殘酷的地方：**逾時（timeout）是唯一可用的失敗偵測手段，而逾時無法區分「慢」與「死」。**\n\n這直接推出一個著名結論的工程版本：在一個訊息可能任意延遲的非同步網路裡，你不可能造出一個「絕不誤判」的完美失敗偵測器。任何逾時值都是一個賭注——設太短，把只是慢的健康節點誤判為死（false positive），可能引發不必要的 failover、重試、甚至把工作重複執行；設太長，真的死了卻遲遲不發現（高偵測延遲），故障期間請求持續打進黑洞。你只能在「誤判率」與「偵測延遲」之間選一個點，沒有兩全。\n\nhealth check 探針的具體機制（liveness vs readiness 的差異與設計）是領域 P 的範圍；本條只講「逾時是唯一手段、慢與死不可分」這個分散式視角下的根本約束。\n\n### 解法空間\n\n既然單次逾時無法區分慢與死，工程上的辦法是**加更多訊號、把「賭注」做得更聰明**：\n\n- **逾時 + 重試（有限次）**：一次逾時可能是暫時慢，重試幾次再判死。但重試本身會放大負載（見 retry storm，領域 E），且若對方其實活著只是慢，重試 = 重複執行，必須冪等。\n- **心跳 / keepalive**：對方週期性主動發「我還在」，連續漏 N 拍才判死。把「一次逾時」軟化成「連續多次無訊號」，降誤判。\n- **phi accrual failure detector**：不輸出「死/活」二元，而輸出一個「懷疑值」（φ）隨無回應時間連續上升，讓上層自己決定門檻——同一偵測器服務不同敏感度需求。\n- **間接探測 / gossip**：A 判不準 B，就問 C「你連得到 B 嗎」，多方視角降單點誤判（見 gossip / anti-entropy，領域 M）。\n- **fencing token**：承認「誤判無法消除」，改為讓誤判**無害**——被判死的節點若其實沒死、事後醒來想寫資料，用單調遞增的 fencing token 讓它的舊請求被拒（見分散式鎖，領域 M）。這是面對失敗偵測不完美的正解：不是追求零誤判，是讓誤判不造成資料損壞。\n- **deadline 而非 timeout**：傳遞「絕對截止時刻」而非「相對逾時」，跨多跳呼叫時逾時預算才不會被重置累加（見 timeout / deadline / budget，領域 P）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單次逾時 | 簡單、立即判定 | 單跳呼叫、誤判可容忍 | 慢=死不可分，誤判率與偵測延遲難兩全 |\n| 逾時 + 有限重試 | 降低暫時性慢的誤判 | 冪等操作、瞬時抖動多的環境 | 放大負載；對活著只是慢的節點＝重複執行 |\n| 心跳 / 連續 N 拍 | 把瞬時抖動過濾掉，降誤判 | 叢集成員存活偵測 | 偵測延遲 = N × 心跳間隔，更慢；網路分區下整片誤判 |\n| phi accrual | 連續懷疑值、可分級反應 | 對誤判成本不同的多種消費者 | 較複雜，需調參與歷史視窗 |\n| fencing token | 讓誤判不造成損壞（而非消除誤判） | 任何「被判死的節點復活仍可能寫」的場景 | 需要寫入端配合檢查 token；不能單獨用 |\n\n判準：**誤判代價低（重連即可）→ 簡單逾時 + 重試**；**誤判代價高（會 failover、會雙寫）→ 心跳降誤判 + fencing token 讓殘餘誤判無害**。\n\n### 何時需要\n\n- **必須認真做**：任何有 failover、leader 切換、把「死掉的」工作重派給別人的系統——誤判直接導致雙主、重複執行、資料衝突。\n- **必須配冪等/fencing**：只要失敗偵測會觸發「重做」或「換人做」，下游就必須冪等或有 fencing，因為被判死的節點可能其實沒死。\n- **可以從簡**：請求/回應的單跳同步呼叫，逾時後直接回錯給上游、由上游決定——這時一個合理逾時 + 上游重試就夠，不需要完整偵測器。\n\n**Worked example（逾時值的賭注）**：一個服務正常回應 p99 = 200 ms、p999 = 900 ms。把 client 逾時設 **250 ms**（略高於 p99）：所有跑超過 250 ms 的請求都會被當成失敗——這大約是 p99 以上那一小撮、約 **1%** 的請求，它們其實還活著、只是慢，卻被誤判而重試。若這些重試又疊到其他慢請求上，會把更多請求推過 250 ms，形成正回饋。反過來把逾時放寬到 **900 ms（≈ p999）**：誤判降到約 **0.1%**（只剩最尾巴那千分之一），但真的死掉的節點要等滿約 1s 才被發現，故障期間每個打進去的請求都白等近 1s。250 ms vs 900 ms，就是「誤判率 vs 偵測延遲」這枚硬幣的兩面——沒有同時把兩者都壓到零的設定。\n\n### 常見誤解與陷阱\n\n- **「沒回應就是死了」**：沒回應 = 死、或慢、或網路丟包，三者外部不可分。當成「一定死了」去 failover，就會在對方其實活著時造成雙主/重複執行。\n- **逾時設太短引發 retry storm**：誤判 → 重試 → 加負載 → 更多請求變慢 → 更多誤判，正回饋雪崩（見 retry storm · metastable failure，領域 E）。\n- **以為加心跳就「準了」**：心跳只是把單次逾時換成「連續 N 拍無訊號」，降誤判但拉長偵測延遲，且網路分區時分區另一側會被整片誤判為死——準不了，只是換了賭注的位置。\n- **追求零誤判**：在非同步網路裡這做不到。正確心態是「假設誤判一定會發生，讓它無害」——這就是 fencing token 存在的理由。\n- **逾時跨多跳不傳 deadline**：每一跳各自重設一個相對逾時，總時間預算被悄悄放大，外層以為設了 1s、實際下游可能跑了好幾秒（見 timeout / deadline / budget，領域 P）。\n\n### 延伸閱讀\n\n- [Unreliable Failure Detectors for Reliable Distributed Systems（Chandra & Toueg, 1996）](https://www.cs.utexas.edu/~lorenzo/corsi/cs380d/papers/p225-chandra.pdf)\n- [The φ Accrual Failure Detector（Hayashibara et al., 2004）](https://www.computer.org/csdl/proceedings-article/srds/2004/22390066/12OmNvT2phv)\n"}, {"id": "Q-deployment", "file": "Q-deployment.md", "group": "Part 6 — 架構、雲端與發布", "title": "Q · 部署與發布", "md": "# Q · 部署與發布\n\n這個領域回答的是「**新版本怎麼從你的機器走到生產、走錯了怎麼安全退回**」，以及支撐這件事的兩個基礎設施：把應用打包成可重現執行單位的容器，與把基礎設施本身寫成程式碼的 IaC。本檔含六個條目：發布策略（blue-green／canary／rolling）、Docker（容器隔離原理）、Kubernetes（核心物件）、IaC（宣告式、漂移、冪等 apply）、12-factor app（容器/serverless 時代的取捨），以及 config 與機密管理。脊椎與全書一致：每種發布方式、每個工具，都是一組「你想要什麼保證（零停機？快速回滾？低 blast radius？）、你願意付什麼代價（資源翻倍？流量切換複雜度？）」。與相鄰領域的邊界一句話：**probe 怎麼判斷一個 process 死活、graceful shutdown 怎麼不丟在途請求，這些健康檢查機制在韌性與容錯領域深講，本檔只講「Kubernetes 上 probe 設定的語意」與「發布時這些機制怎麼被用上」；冪等的定義在訊息交付領域深講，本檔的「冪等 apply」只引用、不重講定義**。\n\n## blue-green / canary / rolling\n\n### 定義與原理\n\n部署的核心矛盾是：你要把執行中的系統從版本 N 換成 N+1，而**換的過程本身就是一段風險窗口**——舊的還沒退場、新的還沒驗證，這段時間任何不相容、任何 bug、任何資源不足都會打到真實流量。發布策略就是在管理這段窗口：用什麼順序把流量從舊版挪到新版、出事時退回有多快、壞掉時打到多少使用者（blast radius）。\n\n三種主流策略對應三種不同的「窗口管理哲學」：\n\n- **rolling（滾動更新）**：一批一批換。10 個 replica 先換 2 個、健康了再換 2 個，直到全換完。任何時刻都是新舊混跑，總容量大致維持。\n- **blue-green（藍綠部署）**：開一整套全新環境（green）跑新版，舊環境（blue）原封不動。驗證 green 沒問題後，把流量一次性從 blue 切到 green。出事就把流量切回 blue，回滾≈一次路由切換。\n- **canary（金絲雀）**：新版先只接一小部分流量（如 5%），盯著它的錯誤率/延遲，沒問題才逐步放大到 100%。名字來自礦工帶金絲雀下礦坑探毒氣——讓一小撮流量替全體先試錯。\n\n三者不互斥：實務常是「canary 控制放量節奏 + rolling 控制底層 pod 替換 + 出大事時 blue-green 式整批切回」。\n\n### 解法空間\n\n- **重建式（recreate）**：先全停舊版、再起新版。中間有一段全停機窗口，最簡單但有 downtime；只在能接受停機（如內部批次系統）時用。\n- **rolling**：上面說的分批替換。Kubernetes Deployment 的預設策略，由 `maxUnavailable`（更新時最多幾個不可用）和 `maxSurge`（最多超額起幾個）兩個旋鈕控制換的激進程度。\n- **blue-green**：兩套等量環境 + 一個流量切換點（LB target group、DNS、Service selector、Ingress 權重）。切換是原子的、回滾極快，代價是**部署期間要雙倍資源**。\n- **canary**：細粒度按比例放量，搭配自動分析（盯 SLI，達標才繼續放、超標自動回滾）。需要能按權重切流量的入口（service mesh、L7 LB、Ingress controller）與夠好的可觀測性才玩得起來。\n- **shadow / dark launch（影子流量）**：把生產流量「複製」一份打到新版，但新版的回應丟棄、不影響使用者。純粹拿真實流量壓測新版正確性與效能，零使用者風險，代價是要處理副作用（影子請求不能真的扣款、真的寄信）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| recreate | 最簡單、無新舊混跑 | 可接受停機的內部/批次系統 | 有 downtime；不適合面向使用者的服務 |\n| rolling | 零停機、資源不翻倍 | 多數無狀態 web 服務的預設 | 部署期間新舊版同時在線，必須向後相容（見下方陷阱）；回滾＝再滾一輪、不是瞬間 |\n| blue-green | 回滾近乎瞬間（切流量）、新版可先完整驗證 | 高風險發布、回滾速度是硬需求 | 部署期間雙倍資源；DB schema 跨兩版共用是最大難點 |\n| canary | blast radius 可控（先打小流量）、可自動化回滾 | 大流量服務、想用真實流量驗證 | 需要按權重切流量的入口＋好的 SLI 監控；放量太快等於沒 canary |\n| shadow | 零使用者風險的真流量驗證 | 驗正確性/效能、不敢直接放量時 | 必須隔離副作用（不可真的寫入/扣款/外呼）；流量複製有成本 |\n\n一個貫穿全部的硬約束：**rolling 與 canary 期間，新舊版本同時對外服務**，所以新版必須與舊版**雙向相容**——舊 client 能打新版、新版寫的資料舊版能讀。這把「資料庫 schema 怎麼在不停機下演進」直接拉進發布策略的設計（加欄位要先部署能讀新欄位的版本、再部署寫它的版本，分兩次發；零停機 schema 遷移見資料一致性與交易領域）。\n\n**Worked example（blue-green vs canary 的 blast radius）**：一個服務每秒 2,000 次請求，新版有個 bug 會讓 1% 的請求回 500。\n\n- 用 **rolling**（10 個 replica、`maxSurge=2`、`maxUnavailable=0`）：替換到第 5 個 replica 時，約 50% 流量打到新版，故障率 = 50% × 1% = 0.5% 的總請求出錯，即每秒約 10 筆 500。你發現問題、按下回滾，rolling 還要再滾一輪把新版換回舊版，期間錯誤持續累積。\n- 用 **canary**（先放 5%）：故障率 = 5% × 1% = 0.05%，即每秒約 1 筆 500。自動分析在數十秒內偵測到錯誤率異常、自動把權重打回 0，受影響請求數比 rolling 少一個數量級。\n\n差距不在「會不會出事」，而在「出事時打到多少人、回退多快」——這正是發布策略要買的保證。\n\n### 何時需要\n\n- **能接受停機 → recreate**：內部工具、夜間批次、單機 side project，沒必要上零停機的複雜度。\n- **一般無狀態 web 服務 → rolling**：Kubernetes Deployment 預設、夠用、資源不翻倍。多數團隊的起點。\n- **回滾速度是硬需求、且資源翻倍可接受 → blue-green**：金流、發布出錯損失大、需要「驗證完整一套再切」的場合。\n- **大流量、且有像樣的可觀測性 → canary**：你有足夠流量讓 5% 也具統計意義、有 SLI 能在放量途中即時判生死。**沒有監控的 canary 等於慢動作的全面發布**——只是把炸彈引信拉長，不是拆彈。\n- **over-engineering 的訊號**：每天部署一次、流量很小的服務硬上自動化 canary analysis，維運這套 pipeline 的成本遠超它擋下的風險。\n\n### 常見誤解與陷阱\n\n- **以為換了發布策略就不用管相容性**：rolling/canary 的零停機建立在「新舊版能共存」上。一個破壞性的 schema 變更（如直接 rename 欄位）會讓滾動期間舊 pod 讀到不認得的資料而崩——發布策略管的是流量，不管你的變更本身是否相容。\n- **把 canary 當「先發一台看看」**：真 canary 要盯指標、要有放量/回滾的判準與自動化。手動發一台、人去肉眼看 dashboard、然後憑感覺全面放量，這是「有 canary 的形、沒 canary 的魂」。\n- **blue-green 忽略 DB 是共用的**：應用層可以瞬間切，但 blue 和 green 通常**共用同一個資料庫**。green 跑的新版若改了 schema，blue（你準備回滾的後路）可能就讀不了了——回滾路徑被自己的 migration 切斷。schema 必須對兩版都相容，blue-green 的「秒回滾」才成立。\n- **回滾不等於「沒發生過」**：流量可以切回舊版，但新版已寫進 DB／已發出的訊息／已觸發的副作用不會自動撤銷。回滾是停損，不是時光機。\n- **健康檢查綠燈 ≠ 新版正確**：rolling 靠 readiness probe 判斷新 pod 能不能接流量，但 probe 通常只查「process 活著、能回 200」，不查業務邏輯對不對。probe 全綠的版本照樣可能算錯帳（probe 語意見 Kubernetes 條目本領域，機制見韌性與容錯領域）。\n\n### 延伸閱讀\n\n- [Kubernetes — Performing a Rolling Update（官方教學）](https://kubernetes.io/docs/tutorials/kubernetes-basics/update/update-intro/)\n- [Kubernetes — Deployment 的 strategy / maxSurge / maxUnavailable（官方）](https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy)\n- [Martin Fowler — BlueGreenDeployment](https://martinfowler.com/bliki/BlueGreenDeployment.html)\n- [Martin Fowler — CanaryRelease](https://martinfowler.com/bliki/CanaryRelease.html)\n\n## Docker（容器隔離原理（namespace / cgroup））\n\n### 是什麼與內部機制\n\n容器**不是輕量虛擬機**——這是理解它的起點。VM 用 hypervisor 虛擬化硬體、各跑一份完整 guest kernel；容器則是**同一個 host kernel 上的一群普通 process**，只是被 Linux kernel 的兩組原語罩住，讓它們「以為」自己獨占一台機器。這兩組原語是：\n\n- **namespace（命名空間）= 隔離「看得到什麼」**。每種 namespace 隔離一類系統資源的「視野」。Linux 目前有八種：**pid**（process 編號，容器內第一個 process 是 PID 1，看不到 host 的其他 process）、**net**（網路堆疊，獨立的網卡、IP、路由表、iptables）、**mnt**（檔案系統掛載點，看到的是自己那份根目錄）、**uts**（主機名與 domain name）、**ipc**（System V IPC、POSIX 訊息佇列）、**user**（user/group ID 映射，容器內的 root 可映射成 host 上的非特權使用者）、**cgroup**（隱藏 host 的 cgroup 階層）、**time**（boot/monotonic 時鐘偏移，Linux 5.6 加入）。一個容器＝一組 namespace 的組合。\n- **cgroup（control group）= 限制「能用多少」**。namespace 管隔離、cgroup 管資源額度：這個容器最多用 0.5 顆 CPU、512 MiB 記憶體、多少 I/O 頻寬。超過記憶體上限會被 OOM killer 殺掉。現代 Linux 用 **cgroup v2**（單一統一階層，取代 v1 的多階層），是 2026 容器執行的主流（2026-06）。\n\nDocker 本身是上層工具與打包格式；真正建容器的是分層的執行時：你下 `docker run`，Docker daemon 交給 **containerd**（高階 runtime，管 image 拉取、解壓成 OCI bundle），containerd 再呼叫 **runc**（低階 OCI runtime）去實際 `clone()` 出帶上述 namespace 的 process、掛上 cgroup、套上 seccomp 與 capabilities，最後 `execve` 啟動你的程式（2026-06）。「Docker image」則是另一回事：一疊唯讀的檔案系統層（layer）＋一份 metadata，靠 union/overlay 檔案系統疊成容器看到的根目錄，啟動時最上面再加一層可寫層。\n\n### 在哪些系統扮演什麼角色\n\n- **可重現的打包單位**：把「程式 ＋ 它的所有相依（runtime、系統庫、設定）」凍進一個 image，消滅「在我機器上能跑」。CI 建一次 image，dev/staging/prod 跑的是同一份位元組。\n- **Kubernetes 的執行底層**：K8s 排程的最小單位 Pod 裡跑的就是容器（見 Kubernetes 條目本領域）。\n- **CI/CD 的隔離執行環境**：每個 build job 跑在乾淨容器裡，互不污染。\n- **本機開發環境**：用 Compose 一鍵起 DB、cache、訊息佇列，不用在自己機器裝一堆服務。\n- **安全沙箱（有限度）**：用 namespace + seccomp + 砍掉多餘 capabilities 限制不信任程式碼——但容器**共用 host kernel**，隔離強度遠不如 VM（見下方陷阱）。\n\n### 保證與限制\n\n保證：**環境一致性**（image 是 immutable 的，到處跑都一樣）、**process 級隔離**（各容器看不到彼此的 process/檔案/網路）、**資源額度**（cgroup 限制 CPU/記憶體，防一個容器吃垮鄰居）、**快速啟動**（沒有 guest kernel 要開機，啟動是毫秒到秒級，不是 VM 的數十秒）。\n\n硬限制：\n\n- **共用 kernel**：所有容器與 host 跑同一個 kernel。kernel 漏洞 = 跨容器/逃逸的潛在破口。隔離強度 < VM。多租戶跑不信任程式碼時，常在容器外再包一層（如 gVisor、Kata Containers 這類用輕量 VM/syscall 攔截補強隔離的方案）。\n- **預設仍偏寬**：runc 預設套一份 seccomp profile，封掉 300 多個 syscall 裡的約 44 個（2026-06）——擋掉明顯危險的，但不是最小權限。`--privileged` 會幾乎拆光所有隔離，等於把 host 交出去。\n- **記憶體限制是硬殺**：cgroup 的記憶體上限超過就 OOM kill，不像 CPU 是限速。設太低會無預警被殺。\n- **不是「迷你 VM」**：沒有獨立 kernel、不能跑不同 OS kernel（Linux 容器要 Linux kernel；Docker Desktop 在 macOS/Windows 上其實是偷偷跑一個 Linux VM 再在裡面跑容器）。\n\n**Worked example（cgroup 記憶體上限）**：你給容器設 `--memory=512m`，裡面跑一個 Node 服務。現代 Node（12+，含 20／22）預設已是 **container-aware**：它讀 cgroup 記憶體上限、把 V8 old space 設成容器上限的約一半（512 MiB 容器→約 256 MiB heap），所以多半不會再「以為自己有 2 GB」。但坑沒消失、只是換位置：(1) 老舊 runtime、或顯式把 `--max-old-space-size` 設過大時，V8 仍會無視 cgroup 一路長到撞牆；(2) heap 只是記憶體的一部分——native buffer、執行緒堆疊、其他 runtime 開銷都不算在 old space 帳上，即使 heap 守規矩、總 RSS 仍可能碰 512 MiB。一旦實體用量碰上限，host kernel 的 OOM killer 立刻把 PID 1 殺掉，容器直接消失、退出碼 137（128 + SIGKILL 的 9）：沒有 OutOfMemoryError、沒有優雅崩潰。正解是顯式對齊（`--max-old-space-size` 設成略低於容器上限、留出非 heap 開銷）並**監控 RSS 而非只看 heap**——這是「程式以為自己擁有的，跟盒子實際給的不一致」的經典坑。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Docker（containerd + runc） | 環境一致、process 級隔離、生態最大 | 開發/CI/單機與多數容器化 | 共用 kernel；隔離 < VM |\n| Podman | 同 OCI 生態、daemonless、預設可 rootless | 想免常駐 daemon、偏好 rootless 的伺服器 | CLI 與 Docker 高度相容但非 100% 等價 |\n| 傳統 VM（KVM 等） | 強隔離（獨立 kernel） | 多租戶跑不信任程式碼、需跑不同 OS | 啟動慢、資源開銷大、密度低 |\n| 輕量 VM 沙箱（gVisor/Kata 類） | 接近 VM 的隔離 + 接近容器的啟動 | 在容器密度下要更強隔離 | 有效能/相容性取捨，非全 syscall 透明 |\n\nDocker 與 Podman 都遵 OCI 標準（image 格式、runtime spec 通用），底層常是同一個 runc，差異在架構（有無常駐 daemon、rootless 預設）。容器 vs VM 不是誰取代誰：**容器買「密度與啟動速度」、VM 買「隔離強度與跑異質 OS」**，多租戶平台常兩者疊著用（VM 切大塊隔離、容器在 VM 裡切密度）。\n\n### 常見誤解與陷阱\n\n- **以為容器是輕量 VM**：最根本的誤解。沒有 guest kernel、共用 host kernel，安全邊界完全不同。把容器當 VM 來放不信任程式碼，是低估了逃逸風險。\n- **容器內 root = host 上的 root（沒開 user namespace 時）**：預設情況容器裡的 UID 0 就是 host 的 UID 0。一旦逃逸，拿到的是 host root。開 user namespace 把容器 root 映射成 host 非特權使用者，能大幅縮小爆炸半徑。\n- **`--privileged` 隨手加**：它幾乎拆光所有隔離（給全部 capabilities、放開 device 存取、關掉多數限制）。debug 時加了忘了拿掉，等於常態裸奔。\n- **把資料寫進容器內**：容器是 ephemeral 的，可寫層隨容器銷毀而消失。狀態要寫進 volume 或外部儲存，別寫進容器自己的檔案系統（無狀態原則見雲端與編排原語領域）。\n- **latest tag 當版本**：`image:latest` 不是固定版本，今天拉到的和上週可能不同——可重現性的保證被自己破壞。用明確 tag 或 digest 釘死。\n- **以為 cgroup CPU 限制和記憶體限制行為一樣**：CPU 超額是限速（throttle，變慢），記憶體超額是處決（OOM kill，直接死）。兩者的失敗模式天差地別。\n\n### 延伸閱讀\n\n- [namespaces(7) — Linux manual page（七/八種 namespace 總覽）](https://man7.org/linux/man-pages/man7/namespaces.7.html)\n- [cgroups(7) — Linux manual page](https://man7.org/linux/man-pages/man7/cgroups.7.html)\n- [Open Container Initiative — Runtime Specification](https://github.com/opencontainers/runtime-spec)\n- [Docker — Seccomp security profiles for Docker（官方）](https://docs.docker.com/engine/security/seccomp/)\n\n## Kubernetes（Pod/Service/HPA 核心物件；probe 設定語意、health check 機制見領域 P）\n\n### 是什麼與內部機制\n\nKubernetes 的本質是一個**宣告式的控制迴圈系統**：你不下「啟動三個容器」這種命令式指令，而是宣告「我要這個 Deployment 永遠有 3 個健康的 replica」這種**期望狀態（desired state）**，寫進 etcd（叢集的一致性 key-value 儲存）。然後一群 **controller** 持續跑「觀察實際狀態 → 比對期望狀態 → 採取行動讓兩者收斂」的迴圈（reconciliation loop）。一個 pod 掛了，實際變成 2 個，controller 看到差異、補一個回來——這個「自我修復」不是特殊功能，就是控制迴圈的自然結果。\n\n核心物件，由內而外：\n\n- **Pod**：排程與部署的最小單位。一個 Pod 包一個或多個共用網路 namespace（同一個 IP、可 localhost 互通）與儲存的容器。Pod 是 ephemeral 的——掛了不會原地復活，而是被**新建一個**（新 IP、新身分）。所以你幾乎不直接管 Pod，而是透過上層 controller。\n- **Deployment**：管一組無狀態 Pod 的副本與滾動更新。它透過 ReplicaSet 維持 N 個 replica、並在更新時用 rolling 策略換版（見發布策略條目本領域）。有狀態服務則用 StatefulSet（穩定的網路身分與儲存）。\n- **Service**：給「一組會變動的 Pod」一個穩定的虛擬 IP 與 DNS 名。Pod 的 IP 一直在變（重建就換），Service 用 label selector 動態追蹤「目前哪些 Pod 是 ready 的」，把流量負載均衡過去。它解的是「後端會漂移、前端要有固定入口」的服務發現問題。\n- **HPA（HorizontalPodAutoscaler）**：依指標（CPU、記憶體、或自訂/外部指標）自動調整 replica 數。current API 是 **`autoscaling/v2`**（自 Kubernetes 1.23 GA，2026-06 仍為穩定版），支援多指標。它跑的也是控制迴圈：週期性算「目標指標 / 當前指標 → 該要幾個 replica」。\n\n**probe（探針）設定語意**——Kubernetes 上每個容器可設三種探針，kubelet 週期性執行，決定該「重啟」還是「停止送流量」（健康檢查的機制與 liveness/readiness 設計在韌性與容錯領域深講，這裡只講 K8s 上的設定語意，2026-06）：\n\n- **liveness probe**：問「這 process 卡死了嗎」。連續失敗 `failureThreshold` 次（預設 3）→ kubelet **殺掉容器並依 restartPolicy 重啟**。\n- **readiness probe**：問「這 process 現在能接流量嗎」。失敗 → 把這個 Pod 的 IP **從 Service 的 endpoints 移除**（停止送流量，但**不重啟**）。\n- **startup probe**：問「這 process 開機完成了嗎」。成功前，liveness/readiness 都暫停——專治啟動慢的應用被 liveness 在開機途中誤殺。\n\n關鍵旋鈕：`periodSeconds`（多久探一次，預設 10s）、`failureThreshold`（連續幾次失敗才算數，預設 3）。實際反應時間 ≈ `periodSeconds × failureThreshold`。\n\n### 在哪些系統扮演什麼角色\n\n- **容器編排平台**：在一群機器（node）上排程容器、處理失效轉移、滾動更新、自動擴縮——把「一堆機器」抽象成「一個資源池」。\n- **服務發現與負載均衡**：Service + 內建 DNS 讓服務間用名字互找，不必硬編 IP（DNS/服務發現機制見網路與協定領域）。\n- **宣告式部署的承載**：IaC 把期望狀態寫成 YAML/Helm/Kustomize，apply 進叢集（見 IaC 條目本領域）。\n- **自動擴縮**：HPA 依負載調 Pod 數、Cluster Autoscaler 依 Pod 需求調 node 數。\n- **批次與排程**：Job（一次性）與 CronJob（定時，非 exactly-once，見雲端與編排原語領域）。\n\n### 保證與限制\n\n保證：**宣告式收斂**（你說期望狀態，系統持續往那收斂）、**自我修復**（Pod/node 掛了自動重建/重排）、**水平擴縮**（HPA/Cluster Autoscaler）、**滾動更新與回滾**（Deployment 內建）、**服務發現**（Service + DNS 抽象掉 Pod IP 漂移）。\n\n限制：\n\n- **最終一致、非即時**：控制迴圈是收斂式的，從你 apply 到實際達成有延遲。HPA 有 stabilization window 防抖、Service endpoints 更新有傳播延遲——別假設「改了就立刻生效」。\n- **Pod 是 ephemeral 的**：沒有穩定身分（除非 StatefulSet）。把狀態寄望在 Pod 本地＝重建就失憶。\n- **複雜度極高**：網路（CNI）、儲存（CSI）、權限（RBAC）、Ingress、各種 controller……自運維一個生產叢集是專職工作量。對小團隊常是 over-engineering。\n- **probe 只查表象**：readiness/liveness 通常只查「能回 200」，查不出業務邏輯對錯（見下方陷阱）。\n- **資源限制不設＝鄰居遭殃**：不設 requests/limits，一個 Pod 可能吃垮整個 node 上的鄰居（cgroup 機制見 Docker 條目本領域）。\n\n**Worked example（HPA 算 replica 數）**：一個 Deployment 設 HPA target「CPU 平均使用率 50%」，目前 4 個 replica、實測平均 CPU 80%。HPA 的演算法是 `desiredReplicas = ceil(currentReplicas × currentMetric / targetMetric)` = `ceil(4 × 80 / 50)` = `ceil(6.4)` = **7**。它會把 replica 拉到 7，理論上把平均 CPU 壓回 `4×80/7 ≈ 46%`（低於 50%，穩住）。反過來若實測 25%，`ceil(4 × 25 / 50)` = `ceil(2)` = 2，縮到 2 個。注意：scale-up 反應快，但 scale-down 預設有 5 分鐘 stabilization window 防止抖動造成的反覆擴縮——突發流量退去後不會立刻縮回，這是刻意的保守。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Kubernetes | 宣告式收斂、自我修復、可移植、生態最大 | 多服務、需自動擴縮/失效轉移的中大型系統 | 運維複雜度高；小團隊常 over-engineering |\n| 託管容器服務（如雲廠的 Fargate/Cloud Run 類） | 免管 node/control plane | 想要容器但不想管叢集 | 較貴、被廠商抽象綁定、彈性較低 |\n| serverless（函式即服務） | 免管基礎設施、scale-to-zero | 事件驅動、突發/間歇負載 | 冷啟動、執行時間/payload 上限、無常駐狀態（見雲端與編排原語領域） |\n| 直接跑 VM + systemd | 最簡單、零學習曲線 | 單體/少數服務、團隊小 | 自我修復/擴縮/服務發現全要自己拼 |\n\n選 K8s 的判準不是「先進」，而是「你的規模與動態性是否值得這套複雜度」。3 個服務、流量平穩、團隊 4 人——一台 VM 加 systemd 可能比一個 K8s 叢集更可靠也更省心。30 個服務、流量起伏大、要頻繁部署——K8s 抹平的運維成本才回得了本。\n\n### 常見誤解與陷阱\n\n- **probe 綠燈以為健康**：readiness 回 200 只代表「process 活著、能回 HTTP」，不代表它能正確處理請求。一個 readiness 探 `/health`、但 `/health` 只回靜態 200 不查下游 DB 連線的服務，DB 掛了它照樣對外宣稱 ready、照樣收流量然後全 500。probe 要探到真正的就緒條件才有意義。\n- **liveness probe 設太敏感引發連鎖重啟**：liveness 探的端點若依賴一個暫時變慢的下游，整批 Pod 會同時 liveness 失敗、同時被重啟，把暫時的慢拖成全面的 crash loop。liveness 該只查「自己卡死沒」，別把外部相依綁進去（這是 readiness 的活）。\n- **以為 Pod 有固定 IP/身分**：Deployment 管的 Pod 重建就換 IP、換名字。需要穩定身分（如某些有狀態叢集）要用 StatefulSet，別在 Deployment 上假設 Pod 不變。\n- **不設 resource requests/limits**：不設 requests，排程器無從正確 binpack；不設 limits，一個失控 Pod 吃垮 node。兩個都該設。\n- **把 K8s 當銀彈**：它解的是編排問題，不解你應用本身的架構問題。把一個耦合很深的單體塞進 K8s，得到的是一個難搞的單體加一層 K8s 複雜度。\n- **HPA 看 CPU 卻是 I/O bound 服務**：HPA 預設拿 CPU 當訊號，但很多服務的瓶頸是 I/O 或下游延遲，CPU 一直很低、HPA 永遠不擴，過載照樣發生。該擴的訊號（佇列長度、p99 延遲）要用自訂/外部指標餵 HPA。\n\n### 延伸閱讀\n\n- [Kubernetes — Pods（官方概念）](https://kubernetes.io/docs/concepts/workloads/pods/)\n- [Kubernetes — Service（官方概念）](https://kubernetes.io/docs/concepts/services-networking/service/)\n- [Kubernetes — Horizontal Pod Autoscaling（官方，含演算法）](https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/)\n- [Kubernetes — Configure Liveness, Readiness and Startup Probes（官方）](https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/)\n\n## IaC（宣告式、漂移、冪等 apply）\n\n### 定義與原理\n\nIaC（Infrastructure as Code，基礎設施即程式碼）的核心主張：**基礎設施的期望狀態應該寫成可版控的程式碼，由工具負責把現實收斂到那份程式碼**——而不是靠人去 console 點按鈕、靠記憶與口耳維護。它解的問題是「**雪花伺服器**（snowflake server）」：每台機器都是手工調出來的、沒人說得清它現在是什麼狀態、壞了重建不出來、環境之間悄悄漂移。\n\n兩種風格：\n\n- **宣告式（declarative）**：你描述「最終要長什麼樣」（要一個 t3.medium、開 443 port、掛這顆磁碟），工具自己算出「從現狀到目標要做哪些動作」。Terraform/OpenTofu、Kubernetes manifest、CloudFormation 屬此類。\n- **命令式（imperative）**：你寫「依序執行哪些步驟」（先建 VM、再裝套件、再改設定）。傳統 shell script、部分 Ansible 用法屬此類。\n\n本書的脊椎在宣告式，因為它直接給三個保證：**冪等**（同一份程式碼 apply 幾次，結果都收斂到同一個狀態，不重複建資源——冪等的定義在訊息交付領域深講，此處只引用）、**可重現**（從零照程式碼重建出一模一樣的環境）、**可審計**（基礎設施變更走 PR/review，有歷史）。\n\n**漂移（drift）** 是宣告式 IaC 最核心的概念之一：**實際狀態偏離了程式碼宣告的狀態**。有人手動去 console 改了個 security group、某個資源被別的系統動了——這時「程式碼說的」和「現實的」不一致。宣告式工具靠一份 **state**（記錄「我上次管到的實際狀態」）來偵測漂移：`plan` 階段把 state、真實雲端現況、程式碼三方比對，算出差異給你看；`apply` 才真的執行。\n\n### 解法空間\n\n- **provisioning 類（建基礎設施本身）**：Terraform / OpenTofu（宣告式、跨雲、靠 state、`plan/apply` 兩段式）、各雲廠原生（CloudFormation、ARM/Bicep 等，綁單一雲）、Pulumi（用通用程式語言寫，仍是宣告式收斂）。\n- **configuration management 類（管機器內部設定）**：Ansible（agentless、push、可寫成偏宣告式的 playbook）、Chef/Puppet（agent、pull、宣告式 resource）。與 provisioning 是不同層：一個建出機器，一個管機器裡裝什麼。\n- **GitOps（把 Git 當唯一真相來源）**：宣告式 manifest 放 Git，一個 controller（如 Argo CD/Flux 這類）持續把叢集實際狀態往 Git 宣告的狀態收斂、並回報漂移。等於把「宣告式收斂」變成常駐的閉迴路，而非人手動 apply。\n- **漂移處理策略**：定期 `plan` 偵測（detect-only，只告警）、自動 re-apply 矯正（把現實拉回程式碼）、或反向 import（把手改的現狀吸收進程式碼）。2026 的趨勢是從「只偵測」走向「自動矯正」（2026-06）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 宣告式 + state（Terraform/OpenTofu 類） | 冪等、可重現、漂移可偵測、跨雲 | 管雲端基礎設施的主流選擇 | state 是單點要害（鎖、加密、誰持有）；`apply` 前不看 `plan` 等於閉眼開車 |\n| 命令式 script | 直觀、零學習門檻 | 一次性、簡單的開機腳本 | 非冪等（重跑可能重複建或出錯）、無漂移概念、難重現 |\n| configuration management（Ansible 類） | 管機器內設定、(偏)冪等 | 在已存在的機器上裝/設軟體 | 不負責 provision 機器本身；冪等性看 module 寫法 |\n| GitOps（Argo CD/Flux 類） | 持續收斂、Git 即真相、漂移自動回報 | Kubernetes 叢集狀態管理 | 要一個常駐 controller；Git 與叢集的雙向同步邏輯要想清楚 |\n\n授權現況需注意：Terraform 自 **2023-08 從 MPL 2.0 改為 BSL（Business Source License）1.1**，社群隨即 fork 出 **OpenTofu**（仍 MPL 2.0、由 Linux Foundation 主持），2026 已是可直接替換多數 Terraform 工作流的選項（2026-06）。選工具時這條授權分裂是真實的決策因素，不是歷史註腳。\n\n### 何時需要\n\n- **基礎設施會被重建/複製 → 一定要 IaC**：多環境（dev/staging/prod 要一致）、災難重建、頻繁開關環境。手工點按鈕在這些場景下必然漂移。\n- **基礎設施變更要審計/協作 → 要宣告式 + 版控**：多人改、要 review、要回溯「誰在什麼時候改了什麼」。\n- **一台機器、永遠手動、沒人複製 → IaC 可能 over-engineering**：一個 side project 的單台 VM，硬上 Terraform + state 管理的成本未必回本（但連這種情境，一個簡單的 provisioning script 也比純手工強）。\n- **判準**：問「這個環境如果整個被刪掉，我多久能照程式碼重建出一模一樣的？」答不出來，就是該上 IaC 的訊號。\n\n### 常見誤解與陷阱\n\n- **手動改了 console 又跑 apply**：你在 console 手改的東西，下次 `apply` 時工具看到漂移，會**把它改回程式碼宣告的樣子**——你的手動修復被無聲覆蓋。要嘛別手改，要嘛把手改回填進程式碼。這是漂移最常見的傷人方式。\n- **state 不上鎖**：兩個人同時 `apply` 同一份 state，會互相踩、把 state 寫壞，導致工具對「現實是什麼」的認知錯亂（後續 plan 全錯）。state 必須上鎖（remote backend 提供鎖）。\n- **state 含機密卻沒加密**：Terraform state 會把資源屬性（可能含密碼、金鑰）以明文存進 state 檔。state 放沒加密的 bucket 或 commit 進 Git ＝洩密。\n- **以為宣告式就自動冪等到任何程度**：宣告式工具對它「管得到的」資源冪等；對 provider 沒模型化的副作用（某些 provisioner 跑的 shell、外部系統的狀態）不一定冪等。`local-exec` 跑一個非冪等 script，apply 兩次就出事。\n- **把 IaC 當「跑一次就好」**：IaC 的價值在「程式碼＝真相、持續收斂」。寫完 apply 一次就再也不管、之後全手改，等於退回雪花伺服器，只是多了一份過時的程式碼假裝在管。\n- **AI 生成的 IaC 直接 apply**：請 AI 產一段 Terraform 很快，但它可能開了過寬的 security group、用了過時的資源寫法、或對 state 的影響沒被理解。IaC 的 `apply` 直接動真實基礎設施——`plan` 的 diff 必須由人讀懂、確認 blast radius 後才放行，這正是宣告式兩段式設計的價值所在。\n\n### 延伸閱讀\n\n- [Terraform — What is Infrastructure as Code with Terraform（官方）](https://developer.hashicorp.com/terraform/tutorials/aws-get-started/infrastructure-as-code)\n- [OpenTofu（MPL 授權的 Terraform fork，官方）](https://opentofu.org/)\n- [Terraform — Managing resource drift（官方）](https://developer.hashicorp.com/terraform/tutorials/state/resource-drift)\n- [Kubernetes — Declarative Management of Kubernetes Objects（官方）](https://kubernetes.io/docs/tasks/manage-kubernetes-objects/declarative-config/)\n\n## 12-factor app\n\n### 定義與原理\n\n12-factor app 是 Heroku 共同創辦人 Adam Wiggins 於 **2011** 整理出的一套方法論（原文 12factor.net），把「會在 PaaS 上跑得好、好擴展、好維運的應用」歸納成十二條原則。它出現在容器與 Kubernetes 普及之前，但它定義的很多模式——把 config 從程式碼抽出、process 無狀態、log 當 stream——正好成了後來雲原生世界的預設假設。理解它的價值不在背十二條，而在看清**哪些原則是恆久的工程約束、哪些只是它那個年代（2011 的 PaaS）的具體實作建議**。\n\n完整十二條（編號照原文）：I. 程式碼庫（一份 codebase 多份部署）、II. 相依（顯式宣告並隔離）、III. config（存在環境裡）、IV. backing services（後端服務當可替換的 attached resource）、V. build/release/run（三階段嚴格分離）、VI. processes（無狀態、share-nothing）、VII. port binding（自帶 server、靠 port 對外）、VIII. concurrency（靠 process model 水平擴展）、IX. disposability（快速啟動、優雅關閉）、X. dev/prod parity（環境盡量一致）、XI. logs（當 event stream，不自己寫檔）、XII. admin processes（一次性管理任務當 one-off process 跑）。\n\n關鍵時效更新：**12-factor 方法論已於 2024-11 開源**（搬到 GitHub `twelve-factor/twelve-factor`、轉社群治理），目前有一個「更新版」在 `next` 分支開發中，要把這套東西刷新到 Kubernetes/GitOps/workload identity 的時代，最終會取代 12factor.net 上的舊版（2026-06）。同時 Google 等也提出「為 AI 工作負載重新思考」的延伸（如把它擴成更多因子的版本）。所以正確的態度是：**核心抽象仍站得住，但細節在 2026 確實顯老、官方自己在改**。\n\n### 解法空間\n\n把十二條按「在容器/serverless 時代的處境」分三類看，比逐條背更有用：\n\n**仍然完全成立（甚至被現代平台變成預設）**：\n- **III. config 存環境**：把 config 與程式碼分離的原則恆久正確。K8s 用 ConfigMap、serverless 用環境變數，都是這條的實作。\n- **VI. 無狀態 process**：水平擴展、scale-to-zero、滾動更新全建立在「process 可隨時被殺/複製」上。容器與 serverless 把這條推到極致（見無狀態 vs 有狀態，雲端與編排原語領域）。\n- **XI. logs 當 stream**：應用只管把 log 寫 stdout/stderr，由平台（容器 runtime、orchestrator、log agent）收集路由。容器世界這條是鐵律——應用自己寫 log 檔反而是反模式。\n- **IX. disposability（快速啟動、優雅關閉）**：K8s 的 rolling update、HPA、Spot 中斷全靠 process 能秒起秒停、收到 SIGTERM 能 graceful shutdown（機制見韌性與容錯領域）。\n- **V. build/release/run 分離**：對應現代的 immutable image + 不可變部署，比 2011 更被嚴格落實。\n\n**仍成立但細節需更新**：\n- **III. config「存環境變數」的具體形式**：原則對，但「一律塞環境變數」在 K8s 時代未必最佳——機密用環境變數有洩漏面（見 config 與機密管理條目本領域），常改用掛載檔案（mounted Secret）或專門的機密管理器。「config 與程式碼分離」恆久，「一定用 env var」不必死守。\n- **IV. backing services 當 attached resource**：原則對，但現代多了 sidecar、service mesh、託管服務等更豐富的「attach」方式。\n- **X. dev/prod parity**：容器讓這條前所未有地容易達成（dev 跑的就是 prod 的 image），算是被現代工具大幅強化的一條。\n\n**顯出年代局限、需要補**：\n- **可觀測性的缺口**：12-factor 只談 log，**完全沒提 metrics 與 traces**（三本柱見可觀測性與品質領域）。2011 年的單純 log stream 在分散式系統時代不夠用——這是它最常被點名的盲區。\n- **機密管理**：config 那條把一般 config 與機密混為一談、都丟環境變數。現代把機密當獨立問題處理（輪替、最小權限、稽核），不該與一般 config 同等對待。\n- **狀態與資料**：方法論假設應用無狀態、狀態全外放到 backing service，但對「有狀態服務怎麼辦」幾乎沒著墨——而現實有大量有狀態系統。\n\n### 各方案的保證與取捨\n\n| 原則/做法 | 在容器/serverless 時代的效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| config 存環境（III） | 仍成立；config 與碼分離恆久正確 | 所有環境 | 「一律 env var」需更新——機密宜用掛載 Secret/機密管理器，別與一般 config 混用 |\n| 無狀態 process（VI） | 完全成立並被推到極致 | 水平擴展、serverless | 真有狀態的部分要誠實外放，別假裝無狀態 |\n| logs 當 stream（XI） | 容器世界的鐵律 | 所有容器化應用 | 只談 log 不夠——要補 metrics + traces（三本柱） |\n| disposability（IX） | 完全成立 | rolling update、HPA、Spot | 沒實作 graceful shutdown 會在每次部署丟在途請求 |\n| 可觀測性涵蓋 | 不足——只有 log，缺 metrics/traces | 分散式系統 | 把 12-factor 當完整觀測指引會有大盲區 |\n\n整體判斷（屬本書觀點，非規格）：**12-factor 是「雲原生的最小公因數心智模型」**——它的抽象（無狀態、config 外置、log as stream、disposability）仍是評估一個服務「能不能在容器/K8s/serverless 上跑得好」的好 checklist；但別把它當 2026 的完整工程指南，它在可觀測性與機密管理上明顯不足，且官方自己正在改版。\n\n### 何時需要\n\n- **要上容器/K8s/serverless → 拿它當就緒檢查**：一個服務若違反「無狀態、config 外置、log as stream、可秒起秒停」，它在這些平台上會處處卡（無法水平擴展、部署丟資料、log 收不到）。12-factor 是「這個服務雲原生就緒了嗎」的快速體檢表。\n- **設計新服務 → 拿它當預設骨架**：從一開始就無狀態、config 外置，比事後改造省太多。\n- **不要當教條**：「一定要十二條全中」不是目的。一個刻意的有狀態服務（如資料庫本身）違反 VI 是天經地義，不是錯。原則是用來理解取捨的，不是用來打勾的。\n\n### 常見誤解與陷阱\n\n- **把它當完整的現代雲原生指南**：它沒提 metrics、traces、機密管理、有狀態服務、安全。當 checklist 起點很好，當終點會有大洞。\n- **死守「config 一律環境變數」**：原則是「config 與程式碼分離」，不是「必須是 env var」。機密塞環境變數有實際洩漏面（見下一條目）；K8s 時代掛載檔案常更安全。\n- **以為「無狀態」= 不能有任何狀態**：是指**應用 process 不在本地保存跨請求狀態**，狀態外放到 DB/cache/物件儲存。不是說系統不能有狀態。\n- **引用一個其實在改版的「凍結標準」**：12-factor 在 2024-11 開源後正由社群更新中（2026-06），引用時別把它講成一份十多年沒動的權威定本——它的官方版本正在演進。\n- **logs 當 stream 卻又自己 rotate 檔案**：應用一旦自己寫 log 檔、自己切割，就破壞了「平台收集」的前提，在容器裡反而製造問題（容器銷毀 log 就沒了）。寫 stdout/stderr 就好，收集交給平台。\n\n### 延伸閱讀\n\n- [The Twelve-Factor App（原方法論，12factor.net）](https://12factor.net/)\n- [Twelve-Factor App Methodology is now Open Source（2024-11 開源公告）](https://12factor.net/blog/open-source-announcement)\n- [twelve-factor/twelve-factor（GitHub，更新版開發中）](https://github.com/twelve-factor/twelve-factor)\n\n## config 與機密管理\n\n### 定義與原理\n\n這條回答「**會隨環境而變、或不該寫進程式碼的值，要放哪、怎麼遞給應用、怎麼在不重啟的前提下換**」。它分兩個性質不同的子問題，混為一談是大坑：\n\n- **一般 config（組態）**：feature flag、超時時間、外部服務 URL、log level 之類。會隨環境（dev/staging/prod）而變，但洩漏了不直接致命。核心需求是「與程式碼分離、可按環境注入」（12-factor 第 III 條，見上一條目）。\n- **機密（secrets）**：DB 密碼、API key、私鑰、token。洩漏 = 直接被打穿。核心需求遠超過「與碼分離」——還要**加密儲存、最小權限存取、可輪替（rotation）、可稽核（誰在何時取用了哪個機密）**。\n\n第一原理：**機密不是「比較敏感的 config」，它是一個不同的問題類別**。一般 config 的目標是「正確注入」；機密的目標是「在它必然會被洩漏的假設下，把爆炸半徑與爆炸後的修復成本壓到最小」。把兩者用同一套機制（如都塞環境變數）處理，等於用 config 的安全等級保護機密。\n\n### 解法空間\n\nconfig 的注入方式：\n\n- **環境變數**：12-factor 的經典做法。簡單、語言無關，但不適合大型/結構化 config，且對機密有洩漏面（見下）。\n- **設定檔（掛載）**：把 config 以檔案掛進容器（K8s ConfigMap volume）。適合結構化、量大的 config，可不重啟 reload（看應用是否支援 watch）。\n- **集中式 config 服務**：應用啟動時（或執行中）向一個中央 config 系統拉取，支援動態更新、版控、漸進式放量。\n\n機密的處理層級（由弱到強）：\n\n- **明文存進程式碼/repo**：最糟，等於公開。任何進到 repo 歷史的機密都該視為已洩漏（git 歷史撤不乾淨）。\n- **環境變數注入**：比寫死好，但機密以明文存在 process 環境、可能被子 process 繼承、被 crash dump/error log 帶出、被 `/proc/<pid>/environ` 讀到。\n- **K8s Secret**：把機密與 ConfigMap 分開的物件。但**預設只是 base64 編碼、不是加密**——etcd 裡若沒開 encryption-at-rest，Secret 形同明文。要開 etcd 加密 + RBAC 限制誰能讀。\n- **專門的機密管理器**：集中加密儲存、細粒度存取控制、**動態機密**（用時才生成、短 TTL 自動過期）、自動輪替、完整稽核日誌。是機密問題的「完整解」。\n- **掛載而非環境變數**：把機密以檔案掛進容器（tmpfs，不落盤）而非塞環境變數，縮小洩漏面（環境變數的繼承/dump 問題見上）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證（提供什麼防護） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 寫進程式碼/repo | 無——等於公開 | 永遠不該用於機密 | 進過 git 歷史的機密＝已洩漏，必須輪替 |\n| 環境變數 | 與碼分離；無加密、無輪替、無稽核 | 一般 config、低敏感值 | 機密用它有洩漏面（子 process 繼承、dump、/proc） |\n| K8s Secret（預設） | 與 ConfigMap 分離 | K8s 上的基本機密 | 預設只 base64、非加密；要另開 etcd encryption-at-rest + RBAC |\n| 機密管理器（動態機密類） | 加密、最小權限、輪替、短 TTL、稽核 | 生產級機密管理 | 引入相依與運維成本；應用要改成「向它拉」 |\n| 掛載檔案（tmpfs） | 縮小洩漏面（不落盤、不進環境） | 機密注入的較安全形式 | 應用要支援從檔案讀、且能 reload |\n\n一條決策原則：**機密的理想狀態是「短命 + 用時才給 + 用完即棄 + 全程有記錄」**。靜態長命機密（一個密碼用三年、散落在十個地方）是最差的形態——它一旦洩漏，你既不知道何時被誰拿走，輪替起來又因散落各處而痛苦。\n\n**Worked example（機密輪替的成本）**：一個系統把同一個 DB 密碼硬編在 5 個服務的環境變數裡。某天懷疑外洩要輪替：你得改 DB 密碼、同步更新這 5 個服務的環境變數、依序重新部署、且要處理「改 DB 密碼的瞬間到 5 個服務全更新完之間，用舊密碼的連線會被拒」的空窗——這是一次協調式停機。對照用動態機密：每個服務啟動時向機密管理器拿一份 TTL 1 小時的臨時憑證，輪替＝撤銷舊憑證、下次續租自動拿新的，無需改任何服務的設定、無需重新部署、無協調空窗。把「輪替一次要動幾個地方、要不要停機」當成衡量機密管理成熟度的尺，比看用了哪個工具更實在。\n\n### 何時需要\n\n- **任何有多環境的系統 → config 一定要外置**：硬編環境差異（prod 連到 staging 的 DB）是事故常客。\n- **任何持有機密的系統（≈ 全部）→ 至少做到「與 config 分離 + 加密儲存 + 不進 repo」**：這是底線，不是進階。\n- **機密多、合規要求稽核/輪替、團隊大 → 上專門機密管理器**：要回答「這個 key 上次輪替是何時、誰能讀、誰讀過」時，環境變數答不出來，就是該升級的訊號。\n- **over-engineering 訊號**：一個單人 side project、兩個機密、無合規要求，硬上一整套動態機密基礎設施——維運它的成本超過它擋的風險。一個加密的、不進 repo 的設定來源就夠。\n\n### 常見誤解與陷阱\n\n- **以為 K8s Secret 是加密的**：預設只是 base64 編碼（人人可解），etcd 沒開 encryption-at-rest 的話形同明文。「我用了 Secret 物件」不等於「機密被保護了」。\n- **機密進了 git 歷史以為刪掉 commit 就沒事**：git 歷史幾乎撤不乾淨（別人 clone 過、CI 快取過、reflog 留著）。一旦 commit 過，唯一安全假設是「已洩漏」，必須輪替那個機密，而不是改 commit。\n- **機密塞環境變數又印整包 env 到 log**：很多框架在啟動或出錯時會 dump 整個環境變數方便 debug——機密就這樣進了 log，再被 log 系統長期保存、被一堆人看到。\n- **config 與機密用同一機制、同一權限**：把 DB 密碼和 log level 放同一個 ConfigMap、給同一組人讀權限，等於用 config 的安全等級保護機密。兩者該分離、機密該更嚴。\n- **靜態長命機密散落各處**：同一個密碼複製到十個地方、永不過期。它的問題不在「現在會不會洩」，而在「洩了你不知道、要輪替時十個地方全要動」。短命 + 集中 + 動態生成才是解。\n- **AI 協作下的新洩漏面**：把含機密的設定檔、log、stack trace 貼給 AI 工具，或讓 AI 生成的程式碼把機密寫死進範例——機密就這樣離開了你的信任邊界。AI 在手邊時，「什麼能貼出去」要有明確的紅線，這是個新的、容易被忽略的洩漏管道。\n\n### 延伸閱讀\n\n- [The Twelve-Factor App — III. Config（store config in the environment）](https://12factor.net/config)\n- [Kubernetes — Secrets（官方，含「預設僅 base64、需開 encryption at rest」）](https://kubernetes.io/docs/concepts/configuration/secret/)\n- [Kubernetes — Encrypting Confidential Data at Rest（官方）](https://kubernetes.io/docs/tasks/administer-cluster/encrypt-data/)\n- [OWASP — Secrets Management Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html)\n"}, {"id": "I1-observability-signals", "file": "I1-observability-signals.md", "group": "Part 7 — 觀測與營運文化", "title": "I · 觀測訊號", "md": "# I · 觀測訊號\n\n可觀測性處理的是同一個老問題：系統在生產環境出事時，你能不能**從外部輸出推斷內部狀態**，而不必登入機器重現。本檔收六條訊號層的概念——三本柱 metric / log / trace、從 log 算 metric 的陷阱、cardinality 爆炸、SLI / SLO / error budget、告警設計、分散式追蹤。它們回答「我想要什麼程度的『可推斷性』、願意付多少儲存與基數的代價」。本檔的邊界：只談**訊號本身**（怎麼產生、怎麼聚合、怎麼不爆掉、怎麼據此告警）；測試策略、負載測試、工具地圖在領域 I 的另一檔；事故應變、SRE 文化、DORA 在領域 V。\n\n## 三本柱 metric / log / trace\n\n### 定義與原理\n\n可觀測性的「三本柱」是三種互補的遙測訊號，各自在不同的維度上把系統的內部行為外顯出來：\n\n- **Metric（指標）**：把事件聚合成隨時間變化的數字序列（time series）。本質是「在一段視窗內，某件事發生了幾次／加總多少／分布如何」。儲存成本低（一條 time series 不論承載多少請求都只是一串 `(timestamp, value)`），但**有損**——聚合的那一刻，個別事件的細節就丟了。\n- **Log（日誌）**：離散的、帶時間戳的事件紀錄，通常是文字或結構化的鍵值物件。本質是「在某個時刻，發生了這一件具體的事，這是它的全部欄位」。資訊量最高、最不失真，但**量最大、最貴**，且彼此孤立（一條 log 不知道它屬於哪個請求的哪一段）。\n- **Trace（追蹤）**：把「一個請求穿越多個服務」的因果路徑串成一棵樹。每段工作是一個 span，span 之間有父子關係。它回答的是 metric 與 log 都答不了的問題：「這一次慢，是慢在哪一跳？」（機制見「分散式追蹤」）\n\n三者不是三選一，而是**同一個事件的三種投影**：一次 HTTP 請求可以同時讓 request counter +1（metric）、寫一行 access log（log）、產生一個 root span（trace）。第一原理是**資訊量與成本成反比**：metric 便宜但粗，log 貴但細，trace 補上 metric/log 都缺的「跨服務因果」維度。\n\n### 解法空間\n\n把三種訊號落地，常見的做法：\n\n- **各自獨立的 pipeline**：metric 進時序資料庫（如 Prometheus）、log 進日誌系統（如 Loki／Elasticsearch）、trace 進追蹤後端（如 Jaeger／Tempo）。簡單，但三者割裂，排障時要在三個 UI 間手動跳。\n- **統一的採集層**：用一個 agent／SDK 同時產生三種訊號，並在它們之間植入**關聯 ID**（把 trace_id 寫進 log、把 exemplar 從 metric 連到 trace）。OpenTelemetry 是這條路的事實標準（2026-06：traces 與 logs 規格已 stable、metrics data model 已 stable）。\n- **從一種訊號衍生另一種**：例如從 structured log 聚合出 metric（見「從 log 算 metric 的陷阱」），或從 trace 抽出 RED 指標。省一套 pipeline，但繼承來源訊號的取樣／遺漏問題。\n- **寬事件（wide events）流派**：放棄「先決定要哪些 metric」，改成每個請求寫一條欄位極多的結構化事件，查詢時才即席聚合。彈性最高，儲存與查詢成本最高。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Metric（時序聚合） | 固定低成本、可長期保留、適合告警與儀表板 | 「現在系統健康嗎、趨勢如何」 | 聚合即失真；高基數標籤會讓成本爆炸（見「cardinality 爆炸」） |\n| Log（離散事件） | 單一事件無損、可事後任意查詢 | 「這一筆到底發生什麼、錯誤訊息是什麼」 | 量大、貴；高流量下幾乎一定要取樣；跨服務難關聯 |\n| Trace（因果樹） | 跨服務延遲歸因、父子關係 | 「這次慢/錯在哪一跳、調用鏈長什麼樣」 | 幾乎一定取樣（全量太貴）；需全鏈路傳播 context 才完整 |\n| 三者關聯（trace_id 貫穿） | 一個 ID 在三訊號間跳轉 | 端到端排障 | 需採集層支援注入；漏注入則退回各自孤立 |\n\n判準：**告警與容量趨勢用 metric；根因細節用 log；跨服務延遲歸因用 trace。** 三者要靠共同的 trace_id 串起來才有「1+1+1>3」的效果。\n\n### 何時需要\n\n- **單體服務、低流量**：metric + log 兩本柱通常就夠；trace 的價值在「跨服務」，單體內 trace 收益遞減（用 profiler 反而更直接）。\n- **微服務、請求跨多跳**：trace 從「nice to have」變成必需——沒有它，「p99 慢」這種問題在多服務拓樸下幾乎無法定位到具體那一跳。\n- **over-engineering 警訊**：流量每天幾千請求卻先上全套 OTel + 三後端 + tail sampling，維運這套的成本可能超過它省下的排障時間。先 metric + structured log，trace 等到「跨服務排障真的痛」再加。\n\nWorked example：一個服務每秒 1,000 請求。若每請求寫 1 條 access log（約 1 KB），一天就是 1000 × 86,400 × 1 KB ≈ **86 GB/天** 純 access log。同樣的流量做成 metric，只要 `http_requests_total` 一條 counter＋幾條 histogram，一天的時序資料是 **MB 等級**。這個約 4–5 個數量級的差距，正是「為什麼 metric 永遠開全量、log 與 trace 幾乎一定要取樣」的根本原因。\n\n### 常見誤解與陷阱\n\n- **「有 log 就有可觀測性」**：log 答不了「跨服務這次慢在哪」，也答不了「過去 30 天 p99 趨勢」。三本柱缺一就有盲區。\n- **把三本柱當成三個獨立專案**：不植入共同 trace_id，排障時就退化成「在三個 UI 之間靠時間戳猜對應關係」，等於白建。\n- **以為 metric 可以事後補細節**：metric 在寫入時就聚合了，事後想知道「那一秒到底是哪些 user 觸發的」——資訊已經不在了。要事後可查的細節，當下就得進 log/trace。\n- **把高基數塞進 metric**：想用 metric 的便宜換 log 的細粒度（每個 user_id 一條 time series），結果是 cardinality 爆炸（見下條）。需要高基數維度的，那是 log/trace 的工作，不是 metric 的。\n- **AI 輔助排障的新陷阱**：把三訊號丟給工具自動歸因，能加速找線索，但若採集層本身漏注入 trace_id 或 metric
