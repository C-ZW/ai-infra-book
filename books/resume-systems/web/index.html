n| thread（共享記憶體） | 真平行、最低抽象開銷 | CPU 密集、需精細控制 | 共享狀態需鎖；死結/競態風險高；執行緒貴 |\n| event-loop | 海量 I/O 並發、無資料競爭、極省記憶體 | I/O 密集、大量連線 | CPU 重活卡死全線；回呼/async 風格 |\n| actor | 狀態隔離、容錯（監督樹）、易分散 | 高容錯、有狀態並發、分散式 | 訊息延遲；mailbox 無界會爆；非同步難 debug |\n| coroutine（如 goroutine） | 海量輕量並發＋線性可讀性＋多核 | 高並發＋混合 I/O 與 CPU | 阻塞系統呼叫會漏；channel 用錯易 deadlock |\n| CSP（channel） | 通訊即同步、無共享記憶體競爭 | 管線式並發、生產者-消費者 | 無界 channel 失去背壓；select 邏輯易出錯 |\n\n### 何時需要\n\n模型多半由你選的語言/平台決定，但理解取捨能讓你在「同一平台內怎麼用」與「跨平台選型」時選對：\n\n- **I/O 密集、海量連線、團隊熟 JS**：event-loop（Node）夠用且省資源；CPU 重活外送 worker（見 thread pool / worker threads）。\n- **高並發＋同時有可觀的 CPU 計算、要吃滿多核**：coroutine ＋ M:N 排程（Go）最甜——線性程式碼、自動多核、搶佔保護。\n- **高容錯、有狀態、節點可能掛掉要自癒、天然分散式**：actor（Elixir/Erlang）——監督樹讓「讓它崩潰再重啟」成為一等策略。\n- **CPU 密集、需貼硬體精細調優、低層控制**：thread（C++/Java + 執行緒池）。\n- **生產者-消費者管線、明確的資料流階段**：CSP channel 把每階段串成 pipeline，背壓靠有界 channel 自然成立。\n\nworked example：同樣服務 50,000 個並發長連線。thread-per-connection 模型每執行緒堆疊約 1 MB，光堆疊約 50 GB ＋ 5 萬條執行緒的排程開銷——不可行。event-loop（Node）一條主執行緒 ＋ epoll 照看 5 萬 fd，記憶體以數百 MB 計，但只用單核、且任一 CPU 重活全線凍結。goroutine（Go）每個 goroutine 初始堆疊僅約 2 KB（按需成長），5 萬個約 100 MB 起，且 GMP 把它們攤到所有核心、有搶佔保護不怕單一卡死。同一個負載，三種模型的記憶體從 50 GB 到 100 MB、多核利用從 1 核到 N 核——模型選擇直接決定一個量級的差異。\n\n### 常見誤解與陷阱\n\n- **「actor 和 CSP 是同一回事」**：都靠傳訊息、都避免共享記憶體，但一等公民不同——actor 送給「具名的行為者」（有 mailbox、非同步），CSP 送進「匿名 channel」（誰收不指定，經典 CSP 為同步交會）。\n- **「Go 的並發 ＝ CSP」**：Go 提供 channel（CSP 風）也提供 `sync.Mutex`/共享記憶體（thread 風），實務常混用，不是純 CSP。\n- **「goroutine 是免費的」**：每個初始約 2 KB 不代表無限開——數百萬個仍吃記憶體與排程，且每個若各持一個 DB 連線會瞬間耗盡連線池（見領域 N 的連線池）。\n- **「event-loop 模型不可能死結」**：無鎖確實不會有傳統死結，但兩個 async 流程互等對方的 Promise（A 等 B 的結果、B 等 A）照樣 deadlock。\n- **「換個並發模型就能解決效能問題」**：模型決定的是「並發結構與省不省資源」，CPU 瓶頸換模型也救不了（見 並發 ≠ 平行）——先確認瓶頸在等待還是在計算，再談選模型。\n- **「coroutine 永遠不會卡 OS 執行緒」**：協程在純非阻塞操作上不卡，但呼叫一個**真阻塞的 C 函式庫或系統呼叫**時會佔住底層 M；runtime 多半會補開執行緒救場，但這條協程期間就不是「免費讓出」了。\n\n### 延伸閱讀\n\n- C. A. R. Hoare, \"Communicating Sequential Processes\"（CACM 1978，CSP 原始論文）：https://dl.acm.org/doi/10.1145/359576.359585\n- Carl Hewitt et al., \"A Universal Modular ACTOR Formalism for Artificial Intelligence\"（1973，actor model 原始論文）：https://dl.acm.org/doi/10.5555/1624775.1624804\n- The Go Memory Model 與 scheduler 設計（GMP、搶佔）：https://go.dev/ref/mem\n- Rob Pike, \"Concurrency is not Parallelism\"：https://go.dev/blog/waza-talk\n"}, {"id": "E-overload", "file": "E-overload.md", "group": "Part 4 — 並發、過載與韌性", "title": "E · 過載與流量控制", "md": "# E · 過載與流量控制\n\n當需求超過系統當下能處理的量，問題不再是「怎麼算對」而是「怎麼決定誰被慢、誰被拒、誰被丟」——過載是一個關於**分配稀缺處理能力**的問題。本領域回答的是：在流量打超容量時，你想保住什麼保證（公平、低延遲、不雪崩），願意付什麼代價（拒絕一部分請求、丟資料、增加複雜度）。本檔含六個條目：背壓（讓壓力沿管線往上游傳）、rate limiting（主動限制進入速率，本書限流的 owning 條目）、load shedding（過載時主動丟低價值工作）、circuit breaker（對下游故障快速失敗，本書三態機制的 owning 條目）、retry storm 與 metastable failure（重試如何把小故障放大成持續性崩潰）、排隊直覺（為什麼利用率逼近 1 時延遲爆炸）。邊界：重試的退避與 jitter 做法在領域 A（本檔只講重試的「放大」效應）；通用 fallback 與降級在領域 P；timeout／deadline／budget 在領域 P；閘道層做限流的整合在領域 H（機制在本檔）。\n\n## 背壓 backpressure\n\n### 定義與原理\n\n背壓指的是：當下游消費者處理不過來時，把「慢下來」這個訊號沿著管線**往上游傳遞**，讓生產者降速或暫停，而不是讓中間的緩衝無限長大。第一原理只有一條守恆律——**在任何穩定的管線裡，長期生產速率不可能超過最慢一段的處理速率**。若生產者不理會這條守恆律繼續灌，多出來的工作只能去三個地方：堆在一個會無限長大的佇列（直到記憶體耗盡）、被阻塞擋在門外（生產者被迫等待）、或被丟棄（部分工作永遠不做）。背壓就是「如何選擇並執行這三條路其中之一」的機制。\n\n關鍵的觀念轉變：**一個沒有背壓的系統不是「沒有上限」，而是「把上限藏在記憶體耗盡那一刻」**——它會跑得好好的，直到某次流量尖峰讓無界佇列吃光記憶體、行程被 OOM killer 殺掉，從「慢一點」直接跳到「全死」。背壓把這個隱藏的懸崖換成一條可控的、漸進的減速曲線。\n\n### 解法空間\n\n處理「下游跟不上」的辦法本質上就是上面三條路，每條再細分：\n\n- **有界佇列 + 阻塞（blocking / bounded buffer）**：佇列設一個固定上限，滿了之後 `put` 操作阻塞，生產者執行緒被擋住，自然降速。壓力透過「生產者被卡住」這件事往上傳。\n- **有界佇列 + 拒絕（reject / fail-fast）**：佇列滿了直接回錯誤（如 HTTP 429 / 503），由更上游決定要重試還是放棄。把背壓變成一個明確的回應，而非隱性阻塞。\n- **基於需求的拉取（demand-based pull）**：消費者主動告訴生產者「我現在還能收 N 筆」，生產者只送這麼多。Reactive Streams 規格就是把這個「需求訊號」做成一個非阻塞的控制通道（`request(n)`），所有緩衝都有界且由訂閱端控制。\n- **取樣 / 丟棄最舊（sampling / drop-oldest）**：對「只要最新值」的串流（如即時報價、感測器讀數），滿了就丟掉舊的留新的，犧牲完整性換新鮮度與有界記憶體。\n- **批次 / 合併（batch / coalesce）**：把多筆工作合併成一筆處理，提高下游每單位時間的有效吞吐，從另一端緩解壓力（見領域 S 的批次／coalescing）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 有界佇列 + 阻塞 | 記憶體有界；不丟資料 | 生產者可被安全地慢下來（同步管線、可降速的上游） | 阻塞會沿呼叫鏈往上傳，可能反過來卡住整個請求執行緒池；event-loop 模型裡阻塞是大忌 |\n| 有界佇列 + 拒絕 | 記憶體有界；延遲有上界 | 對外 API、上游能處理 429／重試 | 把壓力推給上游，需上游有退避（否則變 retry storm，見 retry storm 條目）；丟掉的是「最新進來」的請求 |\n| demand-based pull | 記憶體有界；端到端流量守恆 | 串流處理、Reactive 管線、gRPC streaming | 需整條鏈都支援拉取語意；單一不支援的環節就會在那裡退化成無界緩衝 |\n| 丟棄最舊 / 取樣 | 記憶體有界；資料保新鮮 | 只在乎最新值的遙測／即時資料 | 會丟資料——不可用於每筆都要處理的場景（金流、訂單） |\n| 批次 / 合併 | 提升有效吞吐 | 寫入可合併、下游有 per-call 固定成本 | 增加單筆延遲（要等湊批）；不解決根本的速率不匹配，只是把天花板抬高 |\n\nworked example：一個 ingestion 服務每秒收 12,000 筆事件，但下游寫入只能消化 10,000 筆/秒。若用無界佇列，每秒淨積壓 2,000 筆——假設每筆事件物件約佔 1 KiB，10 分鐘就積壓 `2,000 × 600 = 1,200,000` 筆，約 1.1 GiB，足以在記憶體有限的容器裡觸發 OOM。換成上限 50,000 筆的有界佇列（約 50 MiB）+ 拒絕策略：佇列在約 `50,000 / 2,000 = 25` 秒內填滿，之後每秒拒絕約 2,000 筆（回 429），記憶體穩定在 50 MiB，由上游決定這 2,000 筆要退避重送還是丟。系統從「10 分鐘後猝死」變成「持續以 10,000/秒 穩定運作 + 明確拒絕超量」。\n\n### 何時需要\n\n- 任何「生產速率可能超過消費速率、且兩者解耦（中間有佇列）」的管線——這幾乎涵蓋所有訊息佇列消費者、串流處理、WebSocket 廣播扇出。\n- 生產者與消費者速率天生不匹配且尖峰不可控（外部流量、上游批次倒灌）時，背壓是唯一能避免無界積壓的結構性手段。\n- over-engineering 警訊：若整個管線是同步請求-回應、沒有中間佇列（如一個簡單的 HTTP handler 直接查 DB 回傳），背壓已經隱含在「連線數有限 + DB 連線池有界」裡，不必再額外造一層顯式背壓。先確認管線哪裡真的有「無界緩衝」風險，再針對那一點加保護。\n\n### 常見誤解與陷阱\n\n- **「加大佇列就解決了」**：加大佇列只是把懸崖往後挪，並沒有改變「生產 > 消費」這條不等式。佇列越大，積壓時的延遲越糟（一筆請求要排在前面所有人後面），最後不是更晚 OOM 就是延遲爆到等同逾時。佇列是緩衝尖峰用的，不是用來吸收持續性超載的。\n- **阻塞式背壓在 event-loop 裡反咬一口**：在單執行緒 event-loop（見領域 D）裡，「阻塞 put」會卡住整個 loop，所有其他連線一起停擺——這時必須用非阻塞的拉取或拒絕，不能用阻塞。背壓策略要配合並發模型選。\n- **背壓只防住了自己、沒通知上游**：在邊界拒絕（429）若上游不認得這個訊號、立刻無退避重試，背壓反而觸發 retry storm（見 retry storm 與 metastable failure）。有效的背壓是「拒絕 + 上游有退避」的組合，缺一不可。\n- **AI 協作面**：用 AI 生成串流或管線的程式碼時，最常見的隱性缺陷是「示範碼用無界佇列或無 `request(n)` 的 push 模型」——能跑、demo 漂亮，但少了背壓這層在壓力下才會暴露的保護。驗收串流碼時要專門問一句「這條管線的緩衝在哪裡、有沒有界」。\n\n### 延伸閱讀\n\n- Reactive Streams 規格（非阻塞背壓的標準介面 Publisher/Subscriber/Subscription）：https://www.reactive-streams.org/\n- AWS Builders' Library〈Using load shedding to avoid overload〉（背壓與丟棄工作的取捨）：https://aws.amazon.com/builders-library/using-load-shedding-to-avoid-overload/\n\n## rate limiting\n\n### 定義與原理\n\nRate limiting 是**主動限制單位時間內允許進入的請求數**，在請求真正消耗下游資源之前就把超量擋下。它與背壓的差別在「方向與時機」：背壓是被動的、事後的（下游滿了才回傳訊號）；rate limiting 是主動的、事前的（用一個預先設定的速率上限，在門口就決定放行或攔截）。第一原理：**處理能力是有限且可被預估的，那就把進入速率約束在這個能力之內，把「保護」從事後救火變成事前配額。** 限流回答的核心問題是「在這段時間窗內，我允許多少工作進來，多出來的怎麼辦」。\n\n兩種經典演算法是這條問句的兩種答案，差別全在「容不容許突發（burst）」：\n\n- **token bucket（令牌桶）**：以固定速率 `r` 往桶裡放令牌，桶有容量上限 `b`。每個請求消耗一個令牌；桶空了就限流。因為桶能**累積**令牌，閒置一陣子後能一次放行一批（最多 `b` 個），所以**容許突發**，長期平均速率受 `r` 約束。\n- **leaky bucket（漏桶）**：請求進入一個固定容量的佇列，佇列以**固定速率**漏出（被處理）。輸出速率恆定、平滑，**不容許突發**；桶滿了就丟。它本質上就是「有界佇列 + 固定速率消費」。\n\n### 解法空間\n\n- **token bucket**：允許短突發、長期均速受控。最常見的 API 限流選擇（人類互動天然是突發式的）。\n- **leaky bucket**：輸出絕對平滑、保護一個只能吃恆定速率的下游。代價是請求要排隊，增加延遲。\n- **fixed window counter（固定窗計數）**：每個固定時間窗（如每分鐘）一個計數器，超過上限就拒。實作最簡單，但有「窗邊界突刺」——兩個相鄰窗的邊界各打滿，瞬間吃進兩倍配額。\n- **sliding window log / sliding window counter（滑動窗）**：記錄每筆請求的時間戳（log）或用加權平滑（counter）來消除固定窗的邊界突刺，較精確但較吃記憶體／計算。\n- **分散式限流（中央 vs 本地）**：當限流要跨多個節點共享一個全域配額時，計數狀態放哪裡是核心取捨：\n  - **中央計數（centralized）**：所有節點對一個共享儲存（如 Redis，用 `INCR` + TTL 或 Lua 腳本做原子的 token bucket）讀寫計數。全域精確，但每個請求多一次網路往返、且那個共享儲存成為單點與熱點。\n  - **本地計數（local / 配額分攤）**：把全域配額除以節點數，每個節點本地獨立限流（如全域 1,000 RPS、10 個節點，每節點本地限 100 RPS）。零協調、零額外延遲，但流量不均時會誤殺（某節點被導入較多流量就先到頂，而其他節點還有餘額）。\n  - **折衷（本地 + 週期同步）**：本地先擋，背景週期性向中央回報/領取配額（如每秒同步一次剩餘額度），用「短暫的不精確」換掉每請求的協調成本。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| token bucket | 長期均速 ≤ r、容許突發 ≤ b | API 限流、人類互動、可吸收尖峰 | 突發大小 b 設太大等於沒限流瞬時；要同時想清楚 r 與 b |\n| leaky bucket | 輸出恆定速率、絕對平滑 | 保護只能吃定速的下游、webhook 投遞 | 請求排隊增加延遲；桶滿丟請求；不容突發對 bursty 流量不友善 |\n| fixed window | 實作最簡、O(1) 記憶體 | 粗粒度配額、容忍邊界突刺 | 窗邊界可吃進 2× 配額；對抗濫用不夠精確 |\n| sliding window | 消除邊界突刺、較精確 | 需要平滑且精確的配額 | log 版吃記憶體（存每筆時間戳）、counter 版是近似 |\n| 中央計數（Redis） | 全域精確、跨節點一致 | 嚴格全域配額（如付費方案額度） | 每請求一次往返；共享儲存是單點/熱點；需原子操作避免 race |\n| 本地配額分攤 | 零協調、零額外延遲 | 節點間流量均勻、可容忍誤差 | 流量不均→提早誤殺或整體超額；節點數變動要重算配額 |\n| 本地 + 週期同步 | 低延遲 + 近似全域精確 | 大規模、嚴格度可放寬一點 | 同步間隔內可短暫超額；實作較複雜 |\n\nworked example（token bucket 手算）：設 `r = 100 tokens/s`、`b = 200`。系統閒置 3 秒後桶累滿到上限 200（不是 300，桶有容量上限）。此時來一波 250 筆突發：前 200 筆立刻放行（用光桶內令牌），剩 50 筆中，每 10 ms 補一個令牌（100/s），所以這 50 筆會在約 `50 × 10 ms = 500 ms` 內陸續放行或（若同時到達且不等待）被限流 50 筆。長期看，無論突發怎麼來，平均通過率被牢牢釘在 100/s。對比 leaky bucket（同樣定速 100/s、桶容量 200）：這 250 筆突發中 200 筆進佇列、50 筆立刻被丟，佇列裡的 200 筆以恆定 100/s 漏出，最後一筆要等約 2 秒——換來的是下游永遠只看到平穩的 100/s，沒有任何瞬間尖峰。\n\nworked example（本地分攤的誤殺）：全域上限 1,000 RPS、10 節點、本地各限 100 RPS。若 L4 負載均衡用 hash 導流造成傾斜，某節點實際吃到 180 RPS——它會在 100 RPS 處開始回 429，誤殺 80 RPS，而此刻其他節點可能總共只用了 600 RPS、全域遠未到 1,000。這就是本地分攤用「省掉協調」換來的代價：**全域配額沒用滿，局部卻已在拒絕**。\n\n### 何時需要\n\n- 對外暴露的 API、可被濫用或被單一租戶打爆的端點 → 需要限流做配額與防濫用（常配合身分做 per-tenant 限流）。\n- 下游是脆弱或昂貴資源（第三方 API 有自己的配額、DB 連線有限、付費外部服務按量計費）→ 用限流把自己的流量整形到下游能吃的速率，避免把下游打掛或超支。\n- 選 token vs leaky：要保護的下游能吸收突發、且使用者體驗在乎「平時不卡」→ token bucket；下游只能吃恆定速率、或要絕對平滑的輸出（如對外投遞 webhook 不想被對方限流）→ leaky bucket。\n- 選中央 vs 本地：配額是「硬合約」（付費方案額度，超了要負責）→ 中央精確計數；配額是「保護性軟限」（防雪崩，差個幾趴無所謂）→ 本地分攤夠用、且更便宜更快。\n- over-engineering 警訊：內部、可信、流量可預測的服務間呼叫，往往用連線池上界 + 背壓就夠，不必再疊一層精算的滑動窗限流。\n\n### 常見誤解與陷阱\n\n- **「限流 = 背壓」**：兩者互補但不同。限流是事前用固定速率擋、不看下游真實狀態；背壓是事後依下游真實飽和度回壓。最穩的系統兩者都有：限流防可預期的配額濫用，背壓防無法預期的下游變慢。\n- **fixed window 的邊界突刺被當成精確**：上限「每分鐘 100」，攻擊者在 0:59 打 100 筆、1:00 再打 100 筆，2 秒內通過 200 筆——固定窗在邊界允許 2× 瞬時。要精確就用滑動窗。\n- **中央限流的計數操作不是原子的**：用「先讀計數、判斷、再寫回」三步在分散式下有 race（兩個節點同時讀到 99，都判定可放行，計數變 101 卻都過了）。必須用單一原子操作（Redis Lua 腳本或 `INCR` 配合 token bucket 的原子實作），把讀-判-寫收成一步。\n- **回 429 卻沒給 `Retry-After`**：限流回應若不告訴客戶端「多久後再試」，客戶端只能瞎猜或立刻重試，把限流變成 retry storm 的觸發器。限流的回應要包含退避指引。\n- **閘道層 vs 應用層**：限流可放在 API gateway（見領域 H）也可在應用內。閘道層擋得早、省下應用資源，但看不到應用層的細粒度語意（如「這個操作很貴」）；兩層常並存、各擋一種濫用。\n\n### 延伸閱讀\n\n- Stripe Engineering〈Scaling your API with rate limiters〉（token bucket 在生產環境的分層限流）：https://stripe.com/blog/rate-limiters\n- Cloudflare〈How we built rate limiting capable of scaling to millions of domains〉（滑動窗近似的工程取捨）：https://blog.cloudflare.com/counting-things-a-lot-of-different-things/\n\n## load shedding\n\n### 定義與原理\n\nLoad shedding（卸載）是：當系統已經過載、無法服務所有進來的請求時，**主動、有選擇地丟棄一部分工作**，以保住對「剩下那部分」的服務品質。它和 rate limiting 看似都在「拒絕請求」，但觸發條件根本不同——rate limiting 依**預設的固定速率**擋（不管系統當下忙不忙），load shedding 依**系統當下的真實飽和度**擋（CPU、佇列深度、延遲超標才丟）。第一原理是一個殘酷但正確的取捨：**在過載時，「服務 100% 的請求但全部很慢甚至超時」遠不如「服務 80% 的請求且都快又正常、明確拒絕另外 20%」。** 因為前者往往連那個「全部」都保不住——延遲爆炸會引發逾時、重試、進而完全崩潰（見排隊直覺與 metastable failure）。\n\n最關鍵的洞察來自一個反直覺現象：**過載時系統的有效吞吐（goodput，真正完成且有用的工作）會隨負載上升而下降**——因為越來越多 CPU 花在處理那些「最後會逾時、客戶端早已放棄」的請求上。Load shedding 的目的就是把這條下墜的 goodput 曲線拉平：寧可早早拒絕注定失敗的請求，把資源留給能成功的。\n\n### 解法空間\n\n- **基於佇列深度 / 等待時間丟（queue-based）**：當請求在進入佇列時，若佇列已超過閾值、或這筆請求預估等待時間已超過它的 deadline，直接丟掉——反正排到它時客戶端早就逾時了，做了也白做。\n- **基於資源飽和度丟（resource-based）**：監控 CPU、記憶體、event-loop 延遲、in-flight 請求數，超過水位就開始拒絕新請求（回 503）。\n- **依優先級 / 重要性丟（priority-based）**：把請求分級（如付費 vs 免費、寫 vs 讀、互動 vs 批次），過載時先丟低優先級的，保住高價值流量。\n- **依成本丟（cost-based）**：丟掉昂貴的請求（大查詢、無快取的複雜操作）保住便宜的，用最少的犧牲換最多的存活請求數。\n- **客戶端側卸載（client-side / deadline propagation）**：客戶端帶上 deadline，每一跳檢查「剩餘時間還夠不夠做完」，不夠就提早放棄、不送出注定逾時的請求（與領域 P 的 deadline/budget 呼應）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 佇列深度 / 等待時間丟 | 已逾時的請求不浪費資源 | 有明確佇列與 deadline 的管線 | 需準確估等待時間；閾值設太保守會誤丟可服務的請求 |\n| 資源飽和度丟 | 系統不被推過崩潰點、延遲有界 | 通用過載保護 | 水位選錯（太高來不及、太低浪費容量）；要選對指標（event-loop 延遲常比 CPU 更早反映飽和） |\n| 優先級丟 | 高價值流量在過載時存活 | 有清楚分級的多租戶/混合負載 | 需要請求攜帶優先級資訊；低優先級被持續餓死要有機制兜底 |\n| 成本丟 | 用最小犧牲保最多請求 | 請求成本差異大 | 需能在執行前估成本；可能系統性地排擠某類用戶 |\n| 客戶端 deadline 傳播 | 不送出注定失敗的請求、省全鏈資源 | 微服務多跳呼叫鏈 | 需全鏈支援 deadline 傳遞；時鐘/時區不一致會誤判（見領域 M） |\n\nworked example（goodput 崩塌）：一個服務每秒能完成 1,000 個請求（每個耗 1 ms CPU，單核）。客戶端 deadline 是 100 ms。當進入流量升到 1,500 RPS、無 load shedding 時：佇列持續積壓，請求平均等待時間飆過 100 ms，於是**每個完成的請求其實客戶端早已逾時離開**——服務花滿 100% CPU 做的全是白工，有效 goodput 趨近 0。加上「進佇列時若預估等待 > 100 ms 就丟」的 load shedding 後：系統只收約 1,000 RPS 進來處理（其餘約 500 RPS 立刻回 503），這 1,000 個都在 deadline 內完成，goodput 穩在 1,000 RPS。同樣的 CPU，goodput 從約 0 回到 1,000——這就是「丟掉一部分」反而救活整體的算術。\n\n### 何時需要\n\n- 任何「流量尖峰會超過容量、且超過時延遲會爆炸到引發逾時」的線上服務——尤其當客戶端會在逾時後重試（把過載放大）時，load shedding 幾乎是必備。\n- 多租戶或混合優先級系統，過載時必須保住關鍵流量（付費、健康檢查、控制面）→ 需要優先級式卸載。\n- over-engineering 警訊：流量遠低於容量、或這是個離線批次系統（慢一點沒人在乎、沒有逾時客戶端）→ load shedding 是多餘的，背壓讓它自然降速就好。Load shedding 的價值專屬於「有逾時客戶端 + 會超容量」的線上場景。\n\n### 常見誤解與陷阱\n\n- **「過載時更努力處理」是反的**：直覺想「越忙越要把每個請求都做完」，但過載時把資源花在注定逾時的請求上，會把 goodput 推向 0、進而觸發 metastable failure。正確方向是**過載時更願意丟**。\n- **健康檢查也被一起丟掉**：粗暴的「飽和就回 503」若連 liveness/readiness 探針也擋掉（見領域 P），會讓編排器以為服務死了而重啟它——本來只是過載，變成被殺。卸載要對控制面流量（健康檢查、優先級最高）網開一面。\n- **丟棄訊號沒回饋給客戶端**：load shedding 回 503 卻不帶退避指引，客戶端立刻重試，等於把卸載掉的負載又加倍打回來——卸載必須配合客戶端退避（見 retry storm）才有效，否則只是空轉。\n- **用錯飽和指標**：在 event-loop 模型裡（見領域 D），CPU 使用率可能還沒滿但 event-loop 已經延遲嚴重；用 CPU 當卸載觸發會太晚。要選「最早反映飽和」的指標。\n\n### 延伸閱讀\n\n- AWS Builders' Library〈Using load shedding to avoid overload〉（goodput、佇列丟棄、優先級卸載）：https://aws.amazon.com/builders-library/using-load-shedding-to-avoid-overload/\n- Google SRE Book 第 22 章〈Addressing Cascading Failures〉（load shedding、graceful degradation）：https://sre.google/sre-book/addressing-cascading-failures/\n\n## circuit breaker\n\n### 定義與原理\n\nCircuit breaker（斷路器）是一個包在「對外部依賴的呼叫」外面的狀態機：當下游故障率超過閾值時，它**主動切斷後續呼叫、立刻快速失敗**，而不是讓每個請求都去撞一個已知掛掉的下游、各自慢慢逾時。名字借自電路斷路器——偵測到異常就跳閘，保護整條電路。這個模式由 Michael Nygard 在《Release It!》（2007）提出。第一原理：**對一個已經故障的下游，繼續送請求過去不但救不了它，還會反過來拖垮自己**——每個呼叫都佔住一個連線/執行緒等到逾時，逾時佔用會耗盡呼叫方的資源池，把下游的局部故障傳染成呼叫方的全域故障（級聯失敗）。Circuit breaker 用「快速失敗」換掉「慢慢逾時」，把資源從注定失敗的呼叫上釋放出來。\n\n它的核心是**三態狀態機**：\n\n- **Closed（閉合，正常）**：呼叫正常通過，斷路器在背景統計失敗率。失敗率/連續失敗數超過閾值 → 跳到 Open。\n- **Open（斷開，跳閘）**：所有呼叫**立刻失敗**（不真的去打下游），通常直接走 fallback。停留一段冷卻時間（reset timeout）後 → 跳到 Half-Open。\n- **Half-Open（半開，試探）**：放**少量**試探請求通過，去探下游有沒有恢復。若這些試探成功 → 回到 Closed（恢復正常）；若失敗 → 退回 Open（再等一個冷卻週期）。\n\n```\n            失敗率超過閾值\n   ┌──────────────────────────────┐\n   │                              ▼\n┌──────┐   冷卻時間到   ┌───────────┐   試探失敗   ┌──────┐\n│Closed│ ◀──────────── │ Half-Open │ ───────────▶ │ Open │\n│ 正常 │               │   試探    │              │ 跳閘 │\n└──────┘ ◀──────────── └───────────┘              └──────┘\n   ▲        試探成功                                   │\n   │                                                  │\n   └──────────────────────────────────────────────────┘\n                   （Open 期間所有呼叫立即失敗）\n```\n\n### 解法空間\n\n斷路器本身是一個機制，但「怎麼判斷該跳閘、跳閘後怎麼辦」有多種設計選項：\n\n- **觸發條件**：連續失敗計數（連 N 次失敗就跳）vs 失敗率窗（滑動窗內失敗率 > X% 且樣本數足夠就跳）。後者對流量波動更穩健，但需要足夠樣本才有意義。\n- **半開試探策略**：放單一試探 vs 放固定比例試探。試探太多會在下游還沒好時又一次打它；太少則恢復偵測慢。\n- **跳閘後的行為**：直接回錯 / 回 fallback（快取舊值、預設值、降級回應）/ 排進佇列稍後重試（見領域 P 的 fallback·降級——斷路器是觸發降級的機制之一）。\n- **粒度**：per-依賴（整個下游服務一個斷路器）vs per-端點/per-實例（更細，能隔離單一壞節點，但狀態更多）。\n- **與重試/限流配合**：斷路器擋的是「對已知故障下游的呼叫」，配合 retry token bucket（成功補令牌、失敗扣令牌）能在「重試」與「不放大故障」間取得平衡（見 retry storm）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 連續失敗計數觸發 | 實作簡單、反應直接 | 流量穩定、失敗訊號清楚 | 偶發抖動（單筆超時）可能誤跳；對低流量不穩 |\n| 失敗率窗觸發 | 對波動穩健、需足夠樣本 | 高流量、失敗率有意義 | 低流量時樣本不足、判斷失準；窗大小要調 |\n| 半開放單一試探 | 恢復時對下游壓力最小 | 下游恢復後仍脆弱 | 恢復偵測較慢（一次只試一筆） |\n| 半開放比例試探 | 恢復偵測快 | 下游恢復後能立刻承載 | 試探比例過高可能把剛恢復的下游又打掛 |\n| per-依賴粒度 | 狀態少、好管理 | 下游是單一同質服務 | 無法隔離下游叢集中單一壞節點 |\n| per-實例粒度 | 隔離單一壞節點 | 下游是多實例、故障常是單點 | 狀態爆炸；需與服務發現/LB 配合 |\n\nworked example：服務 A 呼叫服務 B，B 突然全掛、每個呼叫要等 30 秒逾時才報錯。A 的請求執行緒池有 200 條。**無斷路器**時：每秒進來 100 個需呼叫 B 的請求，每個各佔一條執行緒等 30 秒——`100 × 30 = 3,000` 條執行緒需求遠超 200 條，約 2 秒內執行緒池就被耗盡，連那些**不呼叫 B** 的請求也拿不到執行緒而一起失敗，B 的局部故障傳染成 A 的全域癱瘓。**加斷路器**（連 20 次失敗跳閘、冷卻 10 秒）：跳閘後對 B 的呼叫立刻失敗（耗時約 0 ms）走 fallback，執行緒幾乎不被佔用，A 對其他功能照常服務；每 10 秒放一個試探探 B 是否恢復。級聯失敗被斷在 A 與 B 之間，沒往上傳。\n\n### 何時需要\n\n- 任何跨網路呼叫**外部依賴**、且該依賴故障時你不想被它拖垮的場景——尤其是同步呼叫鏈（A 等 B、B 等 C），一處故障最容易級聯。\n- 下游故障時你有**可接受的 fallback**（快取舊值、降級回應、稍後重試）——斷路器跳閘後總得有個 Plan B，否則只是把「慢慢失敗」換成「快速失敗」、對使用者體驗未必更好。\n- over-engineering 警訊：對同行程內的本地呼叫、或極可靠且故障時根本沒有 fallback 的關鍵依賴（如自己的主資料庫——它掛了你也沒救），加斷路器收益有限。斷路器的價值在「下游會獨立故障 + 你有降級空間」。\n\n### 常見誤解與陷阱\n\n- **冷卻時間設太短，斷路器在 Open/Half-Open 間抖動**：下游還沒真的恢復就放試探、失敗、又跳回 Open，反覆抖動既偵測不準也持續騷擾下游。冷卻時間要給下游真正喘息與恢復的時間。\n- **半開放太多試探把剛恢復的下游又打死**：下游剛從過載恢復、承載力還很脆弱，此時一次放大量試探等於再來一波尖峰。試探要少、要漸進。\n- **把斷路器當限流用**：斷路器依「下游健康度」開關（故障才跳），限流依「速率配額」開關（不管下游健不健康）。用斷路器做配額控制，會在下游明明健康時不該跳、在你只是想限速時跳不了。兩者解不同問題。\n- **沒有 fallback 的斷路器只是把錯誤提早**：若跳閘後直接把錯誤往上拋而沒有降級路徑，使用者得到的還是失敗，只是快一點。斷路器要配 fallback 才完整（見領域 P）。\n- **單機斷路器在叢集裡各自為政**：每個實例獨立統計失敗率，可能某些實例跳了某些沒跳，行為不一致。需要全域一致時要共享狀態，但那又引入協調成本——多數情況接受「各自判斷」即可，但要知道這個不一致存在。\n\n### 延伸閱讀\n\n- Martin Fowler〈CircuitBreaker〉（三態機制與實作要點，源自 Nygard《Release It!》）：https://martinfowler.com/bliki/CircuitBreaker.html\n- Marc Brooker〈Fixing retries with token buckets and circuit breakers〉（斷路器與 retry token bucket 配合）：https://brooker.co.za/blog/2022/02/28/retries.html\n\n## retry storm 與 metastable failure\n\n### 定義與原理\n\nRetry storm（重試風暴）是：當下游變慢或短暫故障，上游的重試機制把**一個失敗的請求放大成多個請求**，這些額外流量讓本就吃緊的下游更撐不住、失敗更多、於是觸發更多重試——一個正回饋迴圈把小故障滾成大災難。Metastable failure（亞穩定故障）是這現象的一般化與更深刻的版本：系統因為某個觸發事件（流量尖峰、一次部署、一次 GC 暫停）進入一個**過載狀態，而這個狀態會自我維持**——即使最初的觸發消失了，系統也卡在低 goodput 的壞狀態出不來，因為**有一個正回饋迴圈在持續餵養過載**。這個概念由 Bronson、Aghayev、Charapko、Zhu 在 HotOS 2021 的論文〈Metastable Failures in Distributed Systems〉中正式提出。\n\n第一原理（這是本檔最重要的機制）：**重試的數學是乘法的，不是加法的。** 正常時重試是安全網（失敗的少數請求重送一下就成功）；但當下游整體變慢、大批請求開始逾時，每個逾時請求觸發 `k` 次重試，瞬間把下游流量乘上 `(1+k)` 倍——而下游正是因為流量太大才變慢的。於是「變慢 → 逾時 → 重試 → 流量更大 → 更慢」形成閉環。Metastable 的關鍵特徵是**遲滯（hysteresis）**：把流量降回觸發前的水準，系統**不會**自己恢復，因為正回饋迴圈（積壓的重試、被污染的快取、排滿的佇列）仍在自我餵養。要打破它通常得「比觸發點更猛地」降載——例如完全停止流量讓它排空，才能跳回好狀態。\n\n### 解法空間\n\n放大機制一旦理解，防禦就是「掐斷正回饋迴圈」的各種手段：\n\n- **限制重試次數 + 退避 + jitter**：每個請求最多重試 `k` 次（k 小，如 1–2），重試間指數退避加隨機抖動，避免同步重試造成的尖峰（退避/jitter 的具體做法見領域 A，本檔強調的是「為什麼必須限制」）。\n- **retry budget / retry token bucket**：給整個客戶端一個「重試預算」——成功的呼叫往桶裡滴少量令牌（如 0.1），每次重試扣一個令牌，桶空了就不再重試。這把重試率天然鎖在「成功流量的一個小比例」內，下游全掛時重試自動趨近 0（因為沒有成功來補令牌），從根本掐斷放大。\n- **circuit breaker**：下游故障時直接跳閘、停止呼叫（見 circuit breaker），等於把「對已知故障下游的重試」整批掐掉。\n- **load shedding**：過載時主動丟請求（見 load shedding），把系統推回好狀態的負載區間。\n- **deduplication of work / 去重**：對「重複觸發同一工作」的迴圈（如多個請求重建同一快取），用 single-flight 合併，避免放大（見領域 G 的擊穿防護、領域 A 的去重）。\n- **打破迴圈的「重啟級」手段**：metastable 一旦進入，常需要主動清空佇列、清快取、暫停入口流量讓系統排空，再緩慢放流量回來——因為遲滯讓它不會自己好。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 限重試次數 + 退避 + jitter | 把放大倍數壓到 (1+k)、削平同步尖峰 | 所有有重試的客戶端（基本盤） | k 仍是乘數；多層呼叫鏈各自重試會層層相乘（見下） |\n| retry token bucket | 下游全掛時重試自動趨 0 | 客戶端側、想要自適應重試 | 桶參數要調；正常抖動別把桶耗光 |\n| circuit breaker | 整批掐掉對故障下游的呼叫 | 下游會整體故障 | 需 fallback；半開試探別又打爆（見 circuit breaker） |\n| load shedding | 把負載推回好狀態區間 | 已過載、要主動降載 | 需配客戶端退避，否則丟掉的又被重試打回 |\n| single-flight 去重 | 消除「重建同一工作」的放大 | 快取擊穿類重複工作 | 只解重複類放大，不解一般重試風暴 |\n| 入口暫停 + 緩放（打破遲滯） | 把卡死的 metastable 拉回好狀態 | 已陷入亞穩定故障 | 是救火手段不是預防；放流量太快會立刻再陷入 |\n\nworked example（多層相乘）：一條呼叫鏈 A → B → C，每層各自設「失敗重試 3 次」（即每個請求最多送 4 次）。當最底層 C 短暫過載開始逾時：C 對每個請求被打 4 次；但 B 也會對它送給 C 的每個請求重試，所以 B 因為 C 失敗而把自己對 C 的請求重送，乘上 4；A 又對 B 重試乘上 4——最壞情況下，使用者**一個**請求在最底層放大成 `4 × 4 × 4 = 64` 次對 C 的呼叫。C 本來只是稍微過載，瞬間被打 64 倍流量，徹底崩潰並把整條鏈拖進 metastable 狀態。正確做法：**只在最接近使用者或最有上下文的一層重試，其餘層不重試（fail-fast 往上傳）**，把總放大倍數從 64 壓回 4；再加 retry budget 讓 C 全掛時這 4 倍也自動收斂到 1。\n\n### 何時需要\n\n- 任何有重試 + 共享下游 + 流量可能尖峰的分散式系統——這幾乎是所有微服務架構，所以「防重試放大」應視為預設要考慮的，不是可選項。\n- 系統曾經歷「故障已修但服務遲遲不恢復、要重啟/清快取才好」的事故 → 那很可能就是 metastable failure，需要從正回饋迴圈下手而非只修觸發點。\n- over-engineering 警訊：單體、無重試、或下游不共享（每個請求打獨立資源）的系統，放大迴圈不成立，不必套用全套防禦。判準是「有沒有一個共享資源 + 一個會在它變慢時增加它負載的正回饋」。\n\n### 常見誤解與陷阱\n\n- **「加重試讓系統更可靠」是半真**：正常時對，過載時反——同一個重試把小故障放大成大故障。重試是把「常態的少量失敗」變好、把「過載時的大量失敗」變更糟。必須限次數 + 退避 + budget 才安全。\n- **修了觸發點卻沒恢復**：metastable 的反直覺處在於——把流量降回故障前的水準，系統**不會**自己好（遲滯）。團隊常困惑「流量明明已經正常了為什麼還掛」，答案是正回饋迴圈還在自我餵養，得更猛地降載才能跳出。\n- **多層各自重試**：每層獨立設重試看似各自合理，乘起來是指數放大（上面的 64 倍）。重試應集中在單一層，跨層用 deadline/budget 傳遞而非各自重試。\n- **退避了但沒 jitter**：所有客戶端同時逾時、同時退避同樣的時間、於是同時重試——退避只是把尖峰整體往後挪，沒削平。必須加隨機 jitter 把重試攤開（見領域 A）。\n- **把 metastable 當「容量不足」**：直覺想「加機器」，但若正回饋迴圈還在，加的容量也會被放大的重試吃掉、然後一起陷進去。先掐迴圈，再談擴容。\n\n### 延伸閱讀\n\n- Bronson, Aghayev, Charapko, Zhu〈Metastable Failures in Distributed Systems〉（HotOS 2021）：https://sigops.org/s/conferences/hotos/2021/papers/hotos21-s11-bronson.pdf\n- Marc Brooker〈Metastability and Distributed Systems〉（遲滯與正回饋迴圈直覺）：https://brooker.co.za/blog/2021/05/24/metastable.html\n- AWS Builders' Library〈Timeouts, retries, and backoff with jitter〉（重試放大與退避/jitter）：https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/\n\n## 排隊直覺（utilization 與 ρ→1 爆炸）\n\n### 定義與原理\n\n這條回答一個每個過載決策底下都站著的問題：**為什麼系統在利用率（utilization）還沒到 100% 時，延遲就已經爆炸了？** 直覺上「CPU 用到 80% 應該還好、還有 20% 餘裕」，但實務上 80% 利用率的佇列延遲，可能已經是 50% 時的好幾倍。理解這個非線性，是所有限流、卸載、容量規劃的數學底座，所以本書在此把它講到「直覺夠用」、不外包。\n\n用一個單一伺服器的排隊模型（排隊論裡稱 M/M/1：請求到達是 Poisson 隨機、服務時間是指數分布、單一伺服器）建立直覺。定義**利用率** `ρ = λ/μ`，其中 `λ` 是平均到達率、`μ` 是平均服務率（伺服器滿載時每秒能處理幾個）。`ρ` 就是「伺服器有多忙」的比例，必須 `ρ < 1` 系統才穩定（否則佇列無限長大）。這個模型給出一條招牌公式——**系統內平均請求數**：\n\n```\nE[N] = ρ / (1 − ρ)\n```\n\n關鍵全在分母那個 `(1 − ρ)`：當 `ρ` 逼近 1，分母逼近 0，`E[N]`（以及與它成正比的延遲）**爆炸式趨向無窮**。這不是線性的「越忙越慢」，而是雙曲線的「接近滿載時災難性地慢」。第一原理上的解釋是**變異性（variability）**：請求不是均勻到達的，到達有隨機叢集、服務時間有長有短。當伺服器幾乎全忙（ρ→1），任何一個瞬間叢集到達或一個慢請求，都沒有空閒容量去吸收，後面的人只能排隊等——而越接近滿載，「沒有空閒去吸收抖動」的情況越普遍，等待時間就越非線性地暴漲。**正是這個變異性讓你無法把利用率推到 100% 還指望低延遲。**\n\n### 解法空間\n\n「排隊直覺」不是一個要解的故障，而是一組要內化的判準——它告訴你過載防禦該把目標利用率設在哪、為什麼。對應的工程做法：\n\n- **把目標利用率設在 70–80%、留意 (1−ρ) 的非線性**：不要把容量規劃做到「平均利用率 95%」就以為還有 5% 餘裕——那 5% 對應的延遲已經爆了。留 hysteresis 餘量。\n- **降低變異性（讓 ρ 能更高仍穩）**：變異性是延遲爆炸的根因，所以平滑到達（限流/leaky bucket，見 rate limiting）、平滑服務時間（拆大請求、超時砍長尾、批次化）都能讓同一個 ρ 下延遲更低，或讓你安全地把 ρ 推更高。\n- **增加伺服器數（M/M/c 的規模經濟）**：多伺服器共享一個佇列時，同樣的總利用率下延遲遠低於多個各自獨立的單伺服器——因為一個忙不過來時別的能接手，吸收抖動的能力更強。這就是「集中一個大池子比切成多個小池子」在排隊上更省的原因。\n- **控制佇列長度（有界 + 卸載）**：既然 ρ→1 時佇列會炸，就用有界佇列 + load shedding 主動截斷，把「無限排隊」換成「明確拒絕」（見背壓、load shedding）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 目標利用率 70–80% | 留出吸收抖動的餘量、延遲可控 | 對延遲敏感的線上服務 | 浪費約 20–30% 名目容量；對成本敏感者心理上難接受 |\n| 降低到達變異性（限流/平滑） | 同 ρ 下延遲更低、可安全推高 ρ | 流量突發、可整形 | 限流本身增加被擋請求的延遲；整形有成本 |\n| 降低服務時間變異性（砍長尾/批次） | 縮短佇列、削長尾 | 服務時間分布長尾明顯 | 砍長尾請求＝丟一部分工作；批次增單筆延遲 |\n| 增加伺服器（共享佇列 M/M/c） | 同總利用率下延遲大降（規模經濟） | 可水平擴展、共享佇列 | 共享佇列需負載均衡正確分派；不能分成各自獨立的小池 |\n| 有界佇列 + load shedding | 把無限排隊換成明確拒絕 | ρ 可能逼近/超過 1 | 會丟請求；閾值要對（見 load shedding） |\n\nworked example（ρ→1 爆炸的算術）：用 `E[N] = ρ/(1−ρ)` 直接代數字：\n\n| 利用率 ρ | E[N]（系統內平均請求數） | 相對 ρ=0.5 的倍數 |\n|---|---|---|\n| 0.5 | 0.5 / 0.5 = 1 | 1× |\n| 0.8 | 0.8 / 0.2 = 4 | 4× |\n| 0.9 | 0.9 / 0.1 = 9 | 9× |\n| 0.95 | 0.95 / 0.05 = 19 | 19× |\n| 0.99 | 0.99 / 0.01 = 99 | 99× |\n\n從 ρ=0.5 到 ρ=0.9，利用率只多了 80%（0.5→0.9），但系統內平均請求數（及與之成正比的平均延遲）漲了 **9 倍**；再從 0.9 推到 0.99，利用率只多了 10%，延遲卻再漲 11 倍（9→99）。這就是為什麼「把利用率從 90% 榨到 99% 省機器」是個延遲陷阱——名目上只多用 10% 容量，延遲代價是一個數量級。反過來看也解釋了 load shedding 的算術：在 ρ 逼近 1 時丟掉一小撮請求把 ρ 從 0.99 拉回 0.9，延遲就從 99 個排隊數掉回 9，**丟一點點換回一個數量級的延遲改善**。\n\n（M/M/1 是理想化模型——真實系統的到達與服務分布更複雜，絕對數字會不同；但「分母 (1−ρ) 主導、接近滿載時超線性爆炸」這個定性結論對幾乎所有排隊系統都成立，這正是要記住的直覺。）\n\n### 何時需要\n\n- 做容量規劃、設定自動擴展（HPA）的目標利用率、或回答「這台機器還能再加多少流量」時——排隊直覺直接決定你把閾值設在哪（不是 95%，是 70–80%）。\n- 解釋「為什麼系統明明 CPU 沒滿延遲卻很糟」這類事故時——答案往往是利用率已進入 (1−ρ) 的陡峭區。\n- 決定「集中大池 vs 切多小池」「要不要做請求平滑」這類架構取捨時——M/M/c 的規模經濟與變異性論點是判準。\n- over-engineering 警訊：流量遠低於容量（ρ 長期在 0.3 以下）的系統，排隊效應微不足道，不必為這個非線性做特別設計——但仍要知道它存在，以免某天流量長到 0.9 時措手不及。\n\n### 常見誤解與陷阱\n\n- **「利用率 80% 還有 20% 餘裕」的線性誤解**：餘裕不是線性的。80% 利用率對應的排隊延遲已是 50% 的 4 倍、是 99% 災難的前奏。利用率與延遲的關係是雙曲線，不能用「還剩幾趴」做線性外推。\n- **追求 100% 利用率**：把利用率推到 100% 在排隊上等於 ρ→1，延遲趨向無窮、佇列無限長大。「機器跑滿才划算」對批次離線任務或許成立（沒有延遲要求），但對線上服務是災難。\n- **忽略變異性**：兩個平均利用率都 80% 的系統，到達/服務變異性大的那個延遲糟得多。只看平均利用率、不看變異性（尤其長尾服務時間，見領域 S 的 tail latency）會嚴重低估排隊延遲。\n- **把多個小池當一個大池估**：把流量切成 N 個各自獨立的小佇列，總延遲遠差於一個共享的大佇列（規模經濟反向）。分區/分片（見領域 B）在隔離性上有好處，但在排隊延遲上要付這個代價。\n- **誤把這當「需要更多數學」**：實務上不需要解 M/M/1 的完整分布——記住 `ρ/(1−ρ)` 這條曲線的形狀、知道分母會在接近滿載時主導，就足夠做對所有過載與容量決策。直覺夠用，不必背完整排隊論。\n\n### 延伸閱讀\n\n- M/M/1 queue（Wikipedia，含 `E[N] = ρ/(1−ρ)` 與 Little's Law 推導）：https://en.wikipedia.org/wiki/M/M/1_queue\n- Little's Law（Wikipedia，`L = λW`，連結佇列長度與延遲的基本恆等式）：https://en.wikipedia.org/wiki/Little%27s_law\n"}, {"id": "P-resilience", "file": "P-resilience.md", "group": "Part 4 — 並發、過載與韌性", "title": "P · 韌性與容錯", "md": "# P · 韌性與容錯\n\n韌性領域處理的問題是：當一個依賴變慢、變死、或部分過載時，怎麼讓「壞掉的只壞一塊、不要拖垮整個行程」，以及怎麼讓服務在上下線之間不掉資料、不丟流量。本檔含五個條目：timeout / deadline / budget（單次呼叫的等待上限與跨層預算）、bulkhead 艙壁隔離（把資源切艙，故障不蔓延）、health check（liveness / readiness——本書 health check 的 owning 條目）、graceful shutdown（行程退場時把進行中的工作收尾乾淨）、fallback · 降級（本書通用降級的 owning 條目，依賴不可用時退回次等正確的結果）。邊界：重試／退避／jitter 的做法在領域 A（本檔只引用，不重講退避公式）；circuit breaker 的三態機制在領域 E（本檔把它當「降級的觸發機制」引用）；過載側的 backpressure / load shedding / rate limiting 也在領域 E。\n\n## timeout / deadline / budget\n\n### 定義與原理\n\n任何跨越行程邊界的呼叫（網路、子行程、檔案鎖）都可能永遠不回。沒有上限的等待不是「慢」，是「掛起」——一個 worker 卡在 socket recv 上不會釋放執行緒、不會釋放連線、不會釋放記憶體。**timeout** 就是替這個等待設一個硬上限：超過就放棄、回一個明確的錯誤，把資源還回去。\n\n三個詞常被混用，但語意不同：\n\n- **timeout（逾時）**＝相對時長：「從現在起最多等 2 秒」。它是 socket / library 層的設定，每一跳重新計時。\n- **deadline（截止點）**＝絕對時間點：「最晚到 12:00:03.250 為止」。它的好處是可以**跨跳傳遞**——上游把 deadline 算出來，往下游一路帶下去，每一層只要看「現在離 deadline 還剩多少」就知道自己還能花多久。gRPC 內部正是把 timeout 轉成 deadline，再在跨服務時換回「扣掉已耗時間的剩餘 timeout」傳給下游，藉此繞開兩台機器時鐘不同步的問題（2026-06）。\n- **budget（預算）**＝把一個端點的總時間預算，分配給它扇出的多個下游呼叫，使各段相加不超過對外承諾。常見的還有 **retry budget**：限制重試佔總請求的比例，避免重試風暴（見「重試、退避、jitter」，領域 A）。\n\n第一原理：**逾時是分散式系統裡偵測「對方死了還是只是慢」的唯一手段**——你無法區分「對方崩潰」與「對方還在算、只是很慢」，只能設一個你願意等的上限，過了就當它失敗。所以 timeout 值的本質不是「對方多久會回」，而是「我願意為這個呼叫凍結多少資源」。\n\n### 解法空間\n\n- **固定 timeout（per-call）**：每個出站呼叫各設一個常數上限。最簡單，但每跳獨立、不會累加，多層串起來總時間可能爆掉。\n- **deadline 傳遞（deadline propagation）**：入站請求帶一個 deadline，往下游所有出站呼叫一路傳。下游發現 deadline 已過就直接放棄、不浪費算力。gRPC 在 Java／Go 預設會傳，C++ 等需顯式開啟（2026-06）。\n- **time budget 拆分**：對外承諾 p99 = 1s 的端點，內部扇出 A、B、C 三個下游，就把 1s 拆成「A 400ms、B 400ms、留 200ms 給序列化與餘裕」，而不是三個都設 1s。\n- **連線 vs 讀取分離**：connect timeout（建連線）通常該短（毫秒級，連不上要快速失敗），read/idle timeout（等回應）按業務 p99 設。兩者混成一個值是常見錯誤。\n- **可取消（cancellation）**：逾時除了「不再等」，最好還能向下游送取消訊號（gRPC cancellation、HTTP 斷連、context.Done()），讓下游也停手、別繼續燒 CPU 算一個沒人要的結果。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 固定 per-call timeout | 單跳資源不會無限凍結 | 扁平架構、單跳呼叫 | 多層串接時總時間 = 各層相加，可能遠超對外承諾 |\n| deadline 傳遞 | 全鏈路共享一個截止點，過期的請求全鏈路一起放棄 | 微服務深鏈、gRPC | 需框架支援＋下游檢查 deadline；時鐘偏移要靠「剩餘 timeout」換算化解 |\n| time budget 拆分 | 對外延遲承諾可被內部各段加總滿足 | 一個端點扇出多個下游 | 拆分要留餘裕（序列化、排隊、GC）；某段超支會吃掉別段的額度 |\n| connect/read 分離 | 連不上快速失敗、慢回應按業務容忍 | 所有外部呼叫 | 兩個值要分開設；很多 client 預設只有一個總 timeout |\n\n**worked example**：一個 API 端點對外承諾 p99 ≤ 1000ms。它同步呼叫服務 A 再呼叫服務 B（序列），各設 timeout = 1000ms。某次 A 卡在 950ms 才回，B 又花 900ms——總共 1850ms，遠超承諾，但兩個呼叫各自「都沒逾時」，監控看起來健康。換成 deadline 傳遞：入站帶 deadline = now + 1000ms，呼叫 A 時剩 1000ms、A 用掉 950ms 回來後剩 50ms，呼叫 B 時把「50ms」當 timeout 傳下去，B 在 50ms 內沒回就立刻 DEADLINE_EXCEEDED——整個請求準時失敗，而不是悄悄超時一倍。\n\n### 何時需要\n\n- **任何跨行程邊界的呼叫都該有 timeout**，沒有例外。預設無限等是最危險的設定（gRPC client 預設不設 deadline，等於可能等到天荒地老，2026-06）。\n- **deadline 傳遞**在三層以上的同步呼叫鏈才值得引入；單跳系統用固定 timeout 就夠，硬上 deadline propagation 是 over-engineering。\n- **time budget 拆分**在「一個對外端點扇出多個內部依賴、且有明確 SLO」時才需要刻意算；內部背景工作不必。\n\n### 常見誤解與陷阱\n\n- **「timeout 設大一點比較安全」**——反了。timeout 越大，一個慢依賴能凍結的資源越多、越久，過載時越容易把執行緒池／連線池吃光、引發連鎖。timeout 該設在「正常 p99 之上留一點餘裕」，不是「絕不誤殺」。\n- **多層 timeout 不協調**：外層 timeout 比內層短，內層還在重試、外層已經放棄並回錯給使用者——內層的重試全是白工，還在持續加壓。原則：**外層 timeout 要 ≥ 內層 timeout × 內層重試次數**，否則重試永遠來不及完成。\n- **逾時了卻沒取消下游**：client 端 timeout 只是「我不等了」，下游往往還在算。沒有 cancellation 傳遞，過載時這些「沒人要的計算」會持續燒資源。\n- **把 connect timeout 和 read timeout 混為一談**：連線階段該秒級甚至更短地失敗，回應階段可能要等業務邏輯跑完，兩者量級差很多。\n- **重試與 timeout 各自為政**：timeout 是單次上限，重試是再試幾次，兩者要一起算進 budget（重試的退避做法見「重試、退避、jitter」，領域 A）。\n\n### 延伸閱讀\n\n- gRPC, \"Deadlines\" — https://grpc.io/docs/guides/deadlines/\n- gRPC blog, \"gRPC and Deadlines\" — https://grpc.io/blog/deadlines/\n- Google SRE Book, \"Handling Overload\"（client-side throttling、retry budget）— https://sre.google/sre-book/handling-overload/\n\n## bulkhead 艙壁隔離\n\n### 定義與原理\n\nbulkhead（艙壁）來自造船：船體用隔艙壁分成多個獨立水密艙，一個艙破洞進水，水不會漫到其他艙，船因此不沉。Michael Nygard 在 2007 年的《Release It!》把它引進軟體穩定性模式，與 circuit breaker、timeout 並列。\n\n軟體裡的「進水」是**資源耗盡**。最典型的場景：一個服務有一個共用的執行緒池（或連線池），它對外呼叫 A、B、C 三個下游。某天 A 變慢，所有打 A 的請求都卡住、佔住執行緒不放，執行緒池很快被 A 的慢請求填滿——結果連只需要 B、C 的請求也拿不到執行緒、一起失敗。**A 的局部故障透過共用資源池蔓延成全域故障**。bulkhead 的解法：把資源切成幾個獨立的艙（A 一個池、B 一個池、C 一個池），A 的池滿了只影響 A，B、C 照常服務。\n\n第一原理：**共用資源是故障傳播的管道**。隔離的代價是資源利用率下降（每個艙都要預留容量、整體用不滿），換來的是「故障被框在一個艙裡」。這是典型的保證換取捨——你用一部分閒置容量，買到「壞一塊不壞全部」。\n\n### 解法空間\n\n- **執行緒池隔離（thread-pool bulkhead）**：每個下游依賴一個獨立執行緒池。慢依賴只能塞滿自己的池。隔離最徹底（連阻塞都被框住），但執行緒有記憶體與切換成本，池子多了開銷大。\n- **信號量隔離（semaphore bulkhead）**：不開新執行緒，用一個計數信號量限制「同時打某依賴的並發數」，超過就立即拒絕。輕量、無額外執行緒，但不能隔離阻塞（呼叫仍在原執行緒上跑），不適合會長時間阻塞的呼叫。\n- **連線池分離**：給不同依賴／不同租戶開獨立的 DB／HTTP 連線池，一個用戶把連線打爆不會餓死其他人。\n- **行程／實例隔離**：把高風險或高優先的工作負載拆到獨立的 deployment／node pool，物理上不共享 CPU／記憶體。最強隔離，成本也最高。\n- **租戶／優先級分艙**：把「付費租戶」「免費租戶」、「線上請求」「背景批次」分到不同艙，避免一類流量餓死另一類（noisy neighbor）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 執行緒池隔離 | 慢／阻塞依賴被框在自己池中，連阻塞都不外溢 | 會阻塞、且必須隔離阻塞的同步呼叫 | 每池一組執行緒，記憶體＋context switch 開銷；池數要克制 |\n| 信號量隔離 | 限制單依賴並發數、立即拒絕超額 | 非阻塞或短呼叫、想要輕量隔離 | 不隔離阻塞（呼叫仍在原執行緒），長阻塞會拖垮原池 |\n| 連線池分離 | 一個依賴／租戶耗盡連線不波及其他 | 多依賴共用 DB／外部 API | 連線總數 = 各池之和，別超過後端上限 |\n| 行程／實例隔離 | CPU／記憶體層級完全隔離 | 高風險或高 SLO 負載 | 成本最高、運維更複雜、資源利用率最低 |\n\n**worked example**：一個服務有 200 條工作執行緒，同時服務「下單」與「查歷史」兩條路徑，共用同一個池。某天「查歷史」打的報表 DB 變慢，每個查歷史請求平均佔住執行緒 4 秒。若查歷史的入站速率是 60 req/s，依 Little's law 它穩態會佔用約 60 × 4 = 240 條執行緒——超過 200，整池被填滿，下單請求也排不進來、一起超時。改成 bulkhead：給「查歷史」分一個上限 50 的信號量艙，第 51 個查歷史請求直接被拒（回降級結果），下單路徑的執行緒因此最多被查歷史佔走 50 條、永遠留得住 150 條給下單。局部慢被框住，下單不受影響。\n\n### 何時需要\n\n- **一個服務混跑多種工作負載、且它們重要性／延遲特性差很多時**（線上 vs 批次、付費 vs 免費、關鍵路徑 vs 次要功能）——這是 bulkhead 最該出手的場景。\n- **下游依賴有「可能單獨變慢」的歷史**，而它和其他呼叫共用資源池時。\n- **不需要**：單一同質工作負載、只有一個下游、或流量小到資源從不接近上限——這時切艙只是徒增閒置與複雜度。\n\n### 常見誤解與陷阱\n\n- **以為信號量隔離能擋住阻塞**：信號量只限並發數，呼叫還是在原執行緒上阻塞。要隔離「阻塞本身」必須用獨立執行緒池。會長阻塞的呼叫用信號量艙，等於沒隔離。\n- **艙切太細**：每個下游都一個專屬執行緒池，池數膨脹、每池都要留 buffer，整體資源利用率崩掉，還更難調參。隔離有邊際效益遞減，按「故障爆炸半徑」分艙、別按「依賴數量」分。\n- **只切了應用層、忘了共用底層**：應用切了三個執行緒池，但它們連到同一個 DB 連線池、或同一個下游實例——底層仍是共用管道，故障照樣穿透。隔離要一路切到真正的瓶頸資源。\n- **把 bulkhead 當 circuit breaker**：兩者互補不互替。bulkhead 限制「故障能佔多少資源」，circuit breaker 在偵測到故障後「直接快速失敗、不再嘗試」（三態機制見 circuit breaker，領域 E）。實務上常一起用。\n- **艙滿之後沒有降級**：艙的並發到頂、請求被拒，但沒給 fallback，使用者看到的就是硬錯誤。拒絕之後要接降級（見「fallback · 降級」）。\n\n### 延伸閱讀\n\n- Wikipedia, \"Bulkhead pattern\" — https://en.wikipedia.org/wiki/Bulkhead_pattern\n- Michael Nygard, *Release It!*（Stability Patterns 講義 PDF）— https://cdn.oreillystatic.com/en/assets/1/event/79/Stability%20Patterns%20Presentation.pdf\n- Microsoft Azure Architecture Center, \"Bulkhead pattern\" — https://learn.microsoft.com/en-us/azure/architecture/patterns/bulkhead\n\n## health check（liveness / readiness）\n\n### 定義與原理\n\nhealth check 是讓編排器／負載均衡器**從外部判斷一個實例現在能不能用**的探測端點。本書在這裡 owning health check 的機制定義；分散式失敗偵測的視角見領域 J、K8s probe 的設定欄位見領域 Q，那兩處只從各自角度引用、不重講。\n\n核心是把「活著」和「能服務」分成兩個正交的問題，對應兩種探針：\n\n- **liveness（存活）**：這個行程是不是壞死了、需要重啟？liveness 失敗的唯一動作是**殺掉並重啟**。它要回答的是「重啟能不能救」——deadlock、記憶體無法回收、事件迴圈卡死這類「只能重來」的狀態。\n- **readiness（就緒）**：這個實例現在能不能接流量？readiness 失敗的動作是**把它從負載均衡的後端摘掉**（不重啟）。它回答「現在送請求過來會不會失敗」——還在暖機、下游依賴暫時斷了、佇列積壓過深、正在優雅退場。\n- **startup（啟動，K8s 特有）**：應用是不是「啟動完成」了？只在啟動期跑，沒成功前不跑 liveness／readiness，給慢啟動的應用一段不被 liveness 誤殺的窗口（2026-06）。\n\n第一原理：**「行程在跑」不等於「行程能服務」**。一個 JVM 可以活得好好的，但它連不上 DB、所以每個請求都會失敗——這時它該被摘流量（readiness fail），但不該被重啟（重啟救不了 DB）。把這兩件事混成一個 `/health` 端點，是最常見的健康檢查設計錯誤。\n\n### 解法空間\n\n- **TCP 探測**：能不能建 TCP 連線。最弱——port 開著不代表應用邏輯正常。\n- **HTTP 探測**：打一個 HTTP 端點看 2xx。最常用。關鍵在「這個端點檢查什麼」：是只回 200（淺），還是真的去確認關鍵依賴可用（深）。\n- **exec 探測**：在容器內跑一個命令、看 exit code。適合沒有 HTTP 介面的工作負載。\n- **gRPC 探測**：用 gRPC Health Checking Protocol 的標準 health service。\n- **淺 vs 深 health check**：淺＝只證明行程在跑（適合 liveness）；深＝連同關鍵下游一起檢查（適合 readiness，但深 check 會放大連鎖故障，見陷阱）。\n- **K8s 三探針的標準分工**：startup 罩住啟動期、liveness 管重啟、readiness 管摘流量——這是把上面語意落到設定的標準做法（欄位細節見領域 Q）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| TCP 探測 | port 可連 | 沒有 HTTP 的服務、最低限度存活 | port 開著 ≠ 應用正常，最弱 |\n| 淺 HTTP（只回 200） | 行程在跑、事件迴圈沒卡死 | liveness | 不能驗業務能力；用在 readiness 會放行壞掉的實例 |\n| 深 HTTP（含下游檢查） | 關鍵依賴此刻可用 | readiness | 下游抖一下會讓整批實例同時 unready；要小心連鎖（見陷阱） |\n| gRPC health protocol | 標準化、與 gRPC 生態整合 | gRPC 服務 | 需 client/平台支援 |\n| startup probe | 啟動期不被 liveness 誤殺 | 慢啟動應用 | K8s 特有；忘了設會在暖機時被反覆重啟 |\n\n**worked example**：K8s 預設 readiness 探針 `periodSeconds=10`、`failureThreshold=3`、`timeoutSeconds=1`、`successThreshold=1`（2026-06）。某實例的下游 DB 連線斷了，深 readiness 開始回 503。要連續 3 次失敗、每次間隔 10 秒，才會被判 unready——也就是說最壞情況下，這個壞實例還會被送進約 3 × 10 = 30 秒的流量才被摘掉。若想更快摘流量，得把 `periodSeconds` 與 `failureThreshold` 調小，但調太敏感又會被瞬時抖動誤摘——這就是「偵測速度 vs 抗抖動」的取捨，沒有免費的快。\n\n### 何時需要\n\n- **任何被編排器（K8s 等）或 LB 管生命週期的服務**都該有 readiness——否則流量會被送進「還沒準備好」或「正在退場」的實例。\n- **liveness 要保守**：只在「重啟確實能救」的狀態下失敗。很多服務其實不需要 liveness，或該設得非常寬鬆（見陷阱）。\n- **startup**：啟動時間明顯（載入大模型、跑 migration、暖快取）的應用才需要；秒級啟動的不必。\n\n### 常見誤解與陷阱\n\n- **liveness 和 readiness 用同一個端點**：最常見的錯。深 health check 接到 liveness，下游 DB 一抖，liveness 就失敗，K8s 把實例**重啟**——但重啟救不了 DB，於是所有實例陸續進 CrashLoopBackOff，把一次「DB 暫時不可用」放大成「整個服務反覆重啟、徹底癱瘓」。**liveness 用淺 check（只證明行程沒卡死），readiness 才掛下游依賴**。\n- **liveness 太敏感造成連鎖重啟**：probe 的 `timeoutSeconds` 太短、`initialDelaySeconds` 太短，GC 暫停或暖機就被判死亡並重啟，K8s 的重啟退避是 10s、20s、40s…上限 5 分鐘（CrashLoopBackOff），連續 10 分鐘無事才重置——一旦進這個迴圈很難自己爬出來（2026-06）。慢啟動該用 startup probe 罩住、別靠調鬆 liveness。\n- **深 readiness 引發 readiness 風暴**：所有實例的 readiness 都去 ping 同一個下游，下游一慢，所有實例同時 unready，服務後端瞬間歸零、流量無處可去——比「部分實例壞掉」更糟。共用下游的 readiness 要小心，必要時讓它「下游慢但本機還能服務快取／降級結果」時仍回 ready。\n- **退場時 readiness 沒先翻 false**：實例收到關閉訊號卻沒先把 readiness 設成 fail，LB 還在送新流量過來（與優雅退場銜接，見「graceful shutdown」）。\n- **把 health check 當監控告警源**：health check 是給機器做「上/下線」二元決策的，不是觀測指標。健康趨勢／SLO 屬可觀測性領域（領域 I），別混用。\n\n### 延伸閱讀\n\n- Kubernetes, \"Configure Liveness, Readiness and Startup Probes\" — https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/\n- Kubernetes, \"Liveness, Readiness, and Startup Probes\"（概念）— https://kubernetes.io/docs/concepts/configuration/liveness-readiness-startup-probes/\n- gRPC Health Checking Protocol — https://github.com/grpc/grpc/blob/master/doc/health-checking.md\n\n## graceful shutdown\n\n### 定義與原理\n\ngraceful shutdown（優雅退場）解決的問題是：行程被要求結束時（部署、縮容、節點重開），**不要硬斷正在進行的工作**。硬斷的後果是丟掉處理到一半的請求（使用者看到連線重置）、留下半完成的交易、消費者沒 ack 的訊息被重投、連線洩漏。優雅退場就是把「結束」變成一個有序流程：停止收新工作 → 把手上的工作做完（或安全交還）→ 釋放資源 → 退出。\n\n在容器世界裡這個流程由訊號驅動。以 Kubernetes 為例（2026-06）：\n\n1. Pod 被標記終止，kubelet 啟動 `preStop` hook，**同時**開始倒數寬限期計時器；待 `preStop` 完成後才對容器主行程送 **SIGTERM**（與 preStop 並行的是寬限期計時，不是 SIGTERM）。\n2. 同時，Pod 被從 Service 的 EndpointSlice 移除——但這個移除是**最終一致**的，kube-proxy 更新 iptables／外部 LB 更新後端需要時間，這段時間內仍可能有新請求打進來。\n3. 給一段寬限期 `terminationGracePeriodSeconds`（**預設 30 秒**）。\n4. 寬限期一到還沒退出，送 **SIGKILL** 強殺、不再等。\n\n第一原理：**SIGTERM 是「請你收尾」的禮貌請求，SIGKILL 是「時間到了強制結束」**。你只有寬限期那麼長的時間把事情做乾淨；應用必須主動捕捉 SIGTERM 並執行退場邏輯，否則預設行為（多數 runtime 收到 SIGTERM 直接退出）就等於硬斷。\n\n### 解法空間\n\n- **捕捉 SIGTERM 並排空（drain）**：監聽 SIGTERM，停止 accept 新連線／停止從佇列拉新訊息，等手上的請求做完再退。\n- **先翻 readiness 為 false（pre-drain）**：退場第一步先讓 readiness 探針回失敗，把自己從 LB 後端摘掉，停止「新流量流入」，再開始排空已有請求（與 health check 銜接，見「health check」）。\n- **preStop sleep**：在 preStop hook 放一個短 sleep（如 `sleep 10`），給 LB／kube-proxy 時間把這個 Pod 從後端拿掉，再讓 SIGTERM 開始排空——填補上面那個「EndpointSlice 移除是最終一致」的時間差。\n- **連線排空（connection draining）**：對長連線（WebSocket、gRPC stream、SSE），主動發送關閉訊號（GOAWAY、close frame）讓 client 重連到別的實例，而不是等它自然斷。\n- **訊息消費者的安全交還**：消費者退場時，對「已拉未 ack」的訊息不要 ack，讓 broker 重投給別人（依賴下游冪等，見「冪等」，領域 A）。\n- **設對寬限期**：`terminationGracePeriodSeconds` 要 ≥ 最長的合理請求時間 + drain 時間；長批次工作要顯式調大，否則 30 秒到就被 SIGKILL。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 捕捉 SIGTERM + drain | 進行中請求做完才退、不硬斷 | 所有長駐服務 | 不處理 SIGTERM＝預設硬斷；drain 要有自己的逾時上限 |\n| 先翻 readiness false | 退場期間不再被送新流量 | 被 LB／Service 管的服務 | 摘除是最終一致，仍需 preStop sleep 補時間差 |\n| preStop sleep | 補上 LB 後端更新的傳播延遲 | K8s + 外部 LB／ingress | sleep 算進寬限期，要把它計入 `terminationGracePeriodSeconds` |\n| 連線排空（GOAWAY/close） | 長連線優雅遷移、不集中斷線 | WebSocket／gRPC stream／SSE | client 要會處理重連；否則只是換個地方斷 |\n| 消費者不 ack 交還 | 未完成訊息被重投、不遺失 | 訊息／工作佇列消費者 | 下游必須冪等，否則重投＝重複處理 |\n\n**worked example**：一個 HTTP 服務 p99 請求耗時 800ms，`terminationGracePeriodSeconds` 用預設 30 秒。部署時的正確退場時序：收到終止 → preStop `sleep 5`（這 5 秒內 readiness 已翻 false、kube-proxy 把它從 iptables 移除，新流量停止流入，但舊連線上的請求繼續）→ SIGTERM 觸發應用停止 accept、把已收下的請求做完（最久約 800ms）→ 全部完成後主動退出，總共約 6 秒，遠在 30 秒寬限期內，零請求被硬斷。反例：應用沒捕捉 SIGTERM，收到就立刻退出——那些正在 800ms 處理中的請求全部連線重置，使用者直接看到 5xx／連線錯誤。\n\n### 何時需要\n\n- **任何處理線上請求或消費佇列的長駐服務**都需要——只要它會被重新部署／縮容（也就是幾乎所有服務）。\n- **批次／長任務工作者**尤其需要把寬限期調大到任務時長之上，或設計成「可中斷後重續」（與持久化工作流呼應，見領域 K）。\n- **真正無狀態、單次冪等、極短的函式**（如純查詢）容忍度高，被硬斷重試即可，優雅退場的收益較低——但「捕捉 SIGTERM 早點關連線」幾乎零成本，仍建議做。\n\n### 常見誤解與陷阱\n\n- **以為摘流量是瞬時的**：readiness 翻 false 到「LB 真的不再送流量」之間有傳播延遲（EndpointSlice 更新、kube-proxy 改 iptables、外部 LB 同步），這段時間還會有新請求進來。少了 preStop sleep，就會在退場瞬間丟掉一批新到的請求。\n- **preStop 和 SIGTERM 的關係搞錯**：K8s 不會等 preStop 跑完才送 SIGTERM 嗎？——實際上 preStop 與寬限期計時同時開始，SIGTERM 在 preStop 完成後送出；但**整個寬限期是固定的**，preStop 用掉的時間會壓縮留給 drain 的時間。preStop sleep 太長會吃掉 drain 額度。\n- **drain 沒有自己的上限**：等所有請求做完才退，但若有一個請求卡死（沒設 timeout，見「timeout / deadline / budget」），drain 永遠不結束，最後被 SIGKILL 硬殺，反而比主動截斷更糟。drain 要有自己的 deadline。\n- **寬限期短於最長請求**：`terminationGracePeriodSeconds` 用預設 30 秒，但有些請求要跑 60 秒——這些請求必被 SIGKILL 截斷。寬限期要對齊真實的請求時長分布。\n- **忽略 SIGTERM 直接被 SIGKILL**：應用沒裝訊號處理器，等於放棄優雅退場、每次部署都在硬斷流量。預設不等於安全。\n- **退場時還在啟動新工作**：收到 SIGTERM 後仍從佇列拉新訊息／接新連線，等於邊關門邊進貨，永遠關不乾淨。退場第一步必須是「停止收新工作」。\n\n### 延伸閱讀\n\n- Kubernetes, \"Pod Lifecycle\"（Termination of Pods）— https://kubernetes.io/docs/concepts/workloads/pods/pod-lifecycle/\n- Google Cloud Blog, \"Kubernetes best practices: terminating with grace\" — https://cloud.google.com/blog/products/containers-kubernetes/kubernetes-best-practices-terminating-with-grace\n- CNCF, \"Decoding the pod termination lifecycle in Kubernetes\" — https://www.cncf.io/blog/2024/12/19/decoding-the-pod-termination-lifecycle-in-kubernetes-a-comprehensive-guide/\n\n## fallback · 降級\n\n### 定義與原理\n\n本條是本書通用降級的 owning 條目。fallback（後備／降級）解決的問題是：當主路徑失敗或不可用時，**回一個次等但仍可用的結果**，而不是把錯誤直接甩給使用者。核心信念是「部分可用 > 完全不可用」——不能給最新最準的答案時，給一個稍舊、稍粗、或功能縮水的答案，往往遠勝於一個 500。\n\n它和容錯其他原語的分工：timeout 決定「等多久放棄」、circuit breaker 決定「要不要直接快速失敗」（三態機制見領域 E）、bulkhead 決定「故障能佔多少資源」，而 **fallback 決定「放棄／失敗之後，端給使用者什麼」**。前三者是「怎麼偵測與框住故障」，fallback 是「故障已經發生，怎麼還能交付價值」。降級層級（graceful degradation）就是把「失敗」變成一條從「完整功能」到「最小可用」連續滑落的坡，而不是一個非黑即白的懸崖。\n\n### 解法空間\n\n- **回快取／陳舊資料（stale-while-error）**：主資料源掛了，回上次成功的快取值。即使過期也比沒有好（快取層降級見「多層快取與優雅降級」，領域 G——那裡只講快取面、機制在本條）。\n- **回預設值／靜態值**：給一個保守的常數（如風控分數預設「需人工複審」、推薦清單回熱門榜）。\n- **功能降級（feature degradation）**：關掉非核心功能保住核心。如電商在推薦服務掛掉時不顯示「猜你喜歡」，但下單照常。\n- **降低品質**：回低解析度、少欄位、近似結果代替完整精確結果。\n- **重導到備援來源**：主供應商掛了切次要供應商（可能更貴或更慢，但能用）。\n- **明確失敗（fail loud）**：對「寧可不做也不能做錯」的操作（扣款、轉帳），不降級、直接回明確錯誤——降級在這裡是反模式（見何時需要）。\n- **觸發機制**：fallback 由誰觸發？常見是 circuit breaker 跳開時走 fallback、或 timeout／exception 時走 fallback、或 bulkhead 艙滿被拒時走 fallback。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 回快取／陳舊資料 | 主源掛了仍有（過期的）答案 | 讀多、容忍少量陳舊 | 要標明「資料可能過期」；陳舊上限要可控，別回上古資料 |\n| 回預設／靜態值 | 永遠有個保守答案 | 評分、推薦、配置類 | 預設值要「安全方向」偏（寧嚴勿鬆）；別讓預設掩蓋故障 |\n| 功能降級 | 核心活著、非核心暫關 | 有明確核心/非核心之分的系統 | 要事先想清楚哪些是非核心，臨場分不出來 |\n| 降低品質 | 用近似換可用 | 可接受近似的計算／媒體 | 使用者要能感知是降級版，避免誤以為是真值 |\n| 切備援來源 | 換一條路繼續服務 | 有等價次要供應商 | 備援也要被測試（平時沒用＝退化的備援）；成本可能更高 |\n| 明確失敗（不降級） | 不會給出錯誤的「成功」 | 金流、唯一性、強一致操作 | 對這類操作降級＝資料錯誤，必須 fail loud |\n\n**worked example**：一個商品頁同步呼叫「個人化推薦」服務。推薦服務的 SLO 是 p99 = 50ms，但偶爾抖到 2 秒。若不設降級，商品頁的延遲會被推薦服務的長尾拖著走，p99 跟著爆。加上 fallback：對推薦呼叫設 timeout = 80ms，超時就回「全站熱門 Top 10」這個每 5 分鐘刷新一次的靜態榜單。結果：推薦健康時使用者看到個人化清單；推薦抖動時，超過 80ms 的請求改顯示熱門榜（稍舊、非個人化，但秒開）。商品頁 p99 因此被自己的 80ms timeout 封頂，不再受下游長尾牽連——這是「降級換延遲穩定性」的典型交換。\n\n### 何時需要\n\n- **使用者體驗能接受「次等正確」的讀路徑**：推薦、搜尋補全、個性化、儀表板、非交易型展示——這些是 fallback 的主場。\n- **有明確的「核心 vs 非核心」邊界**時，功能降級能在故障時保住核心交易。\n- **不該降級**：涉及金錢、唯一性、授權、強一致的寫操作。對「轉帳成功了嗎」這種問題，回一個「降級的猜測」比回明確錯誤糟糕得多——這類操作要 fail loud，讓上游決定重試或人工介入。\n- **over-engineering 警訊**：給一個本來就很穩、且失敗時硬報錯也無妨的內部呼叫硬塞 fallback，增加的是「故障被靜默掩蓋」的風險，得不償失。\n\n### 常見誤解與陷阱\n\n- **fallback 把故障藏起來**：降級成功了，使用者沒感覺，監控也沒告警——於是主路徑壞了好幾天沒人知道，直到快取也過期才爆。**降級必須伴隨可觀測性**：每次走 fallback 都該計數／告警（fallback rate 是關鍵指標，見領域 I），讓「正在降級」是顯眼的，不是無聲的。\n- **fallback 路徑自己也會失敗、卻沒人測**：備援來源、降級快取平時沒人走，真出事時才發現它早就壞了／配置漂移了。fallback 路徑要被定期演練（注入故障驗證），否則就是退化的安全網。\n- **降級放大負載**：主源掛了，所有請求湧向 fallback（如全打那個熱門榜的快取），把 fallback 也壓垮——降級路徑的容量要能扛住「主路徑全倒」的流量，否則只是把雪崩換個方向。\n- **對寫操作／金流降級**：把「不確定成功與否」降級成「假裝成功」，是製造資料不一致的捷徑。強一致與交易操作的正解是 fail loud，不是 fallback。\n- **降級沒有恢復路徑**：切到備援後，主源恢復了卻沒切回去，長期跑在次等模式（成本更高或品質更差）。降級要有「主源恢復後自動回正」的機制（circuit breaker 的 half-open 探測正是做這件事，見領域 E）。\n- **靜默回「空結果」當降級**：把錯誤吞掉、回空陣列，讓上游以為「真的沒資料」——這比拋錯更危險，因為錯誤被偽裝成正常的空狀態。降級要明確標示自己是降級結果。\n\n### 延伸閱讀\n\n- Wikipedia, \"Graceful degradation\"（fault tolerance）— https://en.wikipedia.org/wiki/Fault_tolerance#Graceful_degradation\n- Michael Nygard, *Release It!*（Stability Patterns，含 fallback／steady state）講義 — https://cdn.oreillystatic.com/en/assets/1/event/79/Stability%20Patterns%20Presentation.pdf\n- Google SRE Book, \"Addressing Cascading Failures\"（degradation、graceful behavior）— https://sre.google/sre-book/addressing-cascading-failures/\n"}, {"id": "S-performance", "file": "S-performance.md", "group": "Part 4 — 並發、過載與韌性", "title": "S · 效能與延遲", "md": "# S · 效能與延遲\n\n這個領域處理的是「同一段邏輯，為什麼在真實負載下比在開發機慢、或慢得不穩定」。不是談演算法複雜度（那是程式本身的事），而是談**系統交界處**的延遲來源：第一次呼叫特別慢（冷啟動）、平均很快但偶爾很慢（長尾）、一個請求悄悄變成上百次 I/O（N+1）、太多細碎呼叫該合併（批次）、以及把連線這個稀缺資源調到剛好（連線池調校）。本檔含五條：冷啟動與暖機、tail latency 與長尾、N+1 查詢、批次／coalescing／debounce、連線池調校。脊椎仍是保證與取捨——每條都在問「你想要 p99 多低、你願意為它付多少常駐成本與複雜度」。邊界：連線池本身的機制（取得/歸還/語意）在領域 N 深講，本檔的「連線池調校」只談調參與監控；Lambda 特有的 SnapStart 在領域 J；過載下 ρ→1 的排隊爆炸在領域 E；p99/p999 的觀測與 SLO 在領域 I。\n\n## 冷啟動與暖機\n\n### 定義與原理\n\n冷啟動（cold start）指一個執行單位**第一次**服務請求時，必須先付一筆只在「冷」狀態才付的一次性成本：載入程式碼、建立 runtime、初始化相依、建連線、預熱快取與 JIT。暖機（warmup）是反過來——在真正流量到達前，主動先把這些一次性成本付掉，讓第一個真實請求落在「已熱」的環境上。\n\n第一原理是：**幾乎所有高效能執行體都把成本攤平到「之後的每一次呼叫」上，代價是「第一次呼叫」特別貴。** 三個典型來源層層疊加：\n\n- **環境層**：新的容器/行程/函式環境要被排程、拉映像、解壓、啟動 runtime。serverless 與自動擴容的 pod 在擴容瞬間最明顯。\n- **行程層**：載入並連結相依、讀設定、建立連線池（每條 TCP+TLS 握手）、預載入 in-process 快取。\n- **執行體層**：JIT 與分層編譯。JVM HotSpot 啟動時全部走 interpreter（tier 0），方法被呼叫到門檻才升級——預設 `Tier3CompileThreshold≈2000` 進 C1（含 profiling）、`Tier4CompileThreshold≈15000` 進 C2（重度最佳化）；在跨過這些門檻前，熱路徑跑的是慢版本（2026-06）。V8（Node）類似，從 Ignition interpreter 到 TurboFan 也需要被多次執行才會被最佳化。\n\n關鍵分辨：冷啟動是**狀態問題**，不是 bug。它總會發生在「每一個新環境的第一次」，所以高擴容比、低 QPS、突發尖峰、頻繁部署的系統受害最深；穩定高流量的長壽行程幾乎感覺不到。\n\n### 解法空間\n\n- **保溫（keep-warm / 常駐）**：讓環境不要被回收。serverless 用 provisioned/預留環境（見領域 J），長壽服務用 min-replicas 不縮到 0。直接消滅冷啟動，代價是常駐成本。\n- **預初始化快照**：在啟動後、服務前先跑完 init，把記憶體狀態存成快照，之後從快照恢復而非重跑 init（Lambda SnapStart 是此類，見領域 J；CRaC 等屬同一思路）。\n- **主動暖機請求**：部署後對新實例打一批合成請求，把熱路徑、連線、JIT 先跑熱，再放進負載均衡輪轉。配合 readiness probe 在「真的熱了」之前不收流量（見領域 P 的 health check）。\n- **延遲/惰性初始化收斂**：把「只有第一次才需要、且昂貴」的初始化挪出請求路徑——例如建立連線池在啟動時就建滿 min connections，而不是等第一個請求才現連。\n- **減少 init 本身**：縮小相依、砍掉啟動時的同步 I/O、用更輕的 runtime、AOT 編譯（如 GraalVM native image）把 JIT 暖機成本前移到 build 時。\n- **流量塑形**：用漸進放量（canary/rolling，見領域 Q）讓新實例承接的初始流量緩慢爬升，避免一個冷實例瞬間吃滿。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證（消除哪段冷成本） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 常駐保溫（min-replicas / provisioned） | 消除環境+行程冷啟動；p99 平穩 | 對延遲敏感、流量有底盤的服務 | 你為「沒在用的容量」付錢；尖峰超過保溫量時仍冷啟 |\n| 預初始化快照（SnapStart 類） | 消除大部分 init/JIT 暖機，恢復快 | init 重（大量相依/框架）的函式 | 快照恢復後**唯一性狀態被複製**（隨機種子、連線、暫存 ID 須在恢復鉤子重生）；非所有 runtime 支援（見領域 J） |\n| 主動暖機請求 + readiness gate | 消除「第一個真實請求」的冷峰 | 自部署的長壽服務、容器化 | 合成請求要打到真實熱路徑（光打 /health 沒暖到業務碼）；暖機沒蓋到的路徑仍冷 |\n| 啟動時建滿連線池 | 消除「首次查詢現連」延遲 | DB/下游連線昂貴的服務 | 啟動變慢、下游連線數在擴容瞬間放大（見連線池調校） |\n| AOT / native image | 把 JIT 暖機移到 build 時 | 短壽、高擴容、要極速啟動 | 失去 JIT 的 peak 最佳化（長跑吞吐可能略低）、build 複雜、反射需設定 |\n\n**worked example（量化保溫成本）**：一個函式冷啟動 init 耗 800 ms、熱呼叫 40 ms。平均 QPS 20、但每天部署 3 次、且自動縮放每小時回收一次環境。若不保溫，每個新環境的第一個請求多付約 760 ms；在 p99 觀測上，只要冷啟比例 >1% 就會把 p99 從 40 ms 拉到接近 800 ms（長尾被冷啟主導，見 tail latency）。改成預留 2 個常駐環境後，冷啟比例壓到突發尖峰才出現的 <0.1%，p99 回到 ~60 ms——代價是 2 個環境的常駐費用，無論有沒有流量都計。決策就是「常駐月費」對「p99 從 800 降到 60」這筆交換值不值。\n\n### 何時需要\n\n- **需要**：對 p99/p999 有硬 SLO 的同步請求路徑；流量會縮到 0 又突然來（活動、cron 觸發的批次喚醒）；init 很重（大框架、大量相依、JIT 語言）；高擴容比（一個尖峰要拉起幾十個新實例）。\n- **過度**：穩定高流量、行程長壽、init 很輕的服務——它天然全熱，加保溫只是燒錢。離線批次/非同步 worker 對單次延遲不敏感，冷啟動被吞吐攤平，通常不必處理。先量「冷啟動佔請求比例」與「冷/熱延遲差」，差小或佔比低就別做。\n\n### 常見誤解與陷阱\n\n- **把保溫當「永遠不冷」**：保溫量是固定的，尖峰超過保溫量的那部分流量還是落在冷啟環境上。保溫降低冷啟「頻率」，不保證「絕不發生」。\n- **暖機只打健康檢查端點**：沒走到真實業務碼、沒觸發真正的 DB 查詢與 JIT 熱路徑，等於沒暖。暖機請求要盡量擬真。\n- **快照恢復忘了重生唯一性狀態**：從同一份記憶體快照恢復出多個環境，會共用恢復前產生的隨機種子、快取的時間、開到一半的連線。必須在恢復鉤子裡重建這些（見領域 J）。\n- **把惰性初始化留在請求路徑**：「第一次用到才建」會把冷成本轉嫁給某個倒楣的真實請求，而非啟動階段。能在 init 期做完的就別惰性。\n- **AOT 一律更快的迷思**：native image 啟動快，但放棄了 JIT 在長跑時依 profile 做的 peak 最佳化；長壽高吞吐服務的穩態吞吐可能反而輸給 JIT 暖機後的版本。\n\n### 延伸閱讀\n\n- [Understanding the Lambda execution environment lifecycle (AWS Lambda Developer Guide)](https://docs.aws.amazon.com/lambda/latest/dg/lambda-runtime-environment.html)\n- [Understanding and Remediating Cold Starts: An AWS Lambda Perspective (AWS Compute Blog)](https://aws.amazon.com/blogs/compute/understanding-and-remediating-cold-starts-an-aws-lambda-perspective/)\n- [Tiered Compilation in JVM (Baeldung)](https://www.baeldung.com/jvm-tiered-compilation)\n- [How Tiered Compilation works in OpenJDK (Microsoft for Java Developers)](https://devblogs.microsoft.com/java/how-tiered-compilation-works-in-openjdk/)\n\n## tail latency 與長尾\n\n### 定義與原理\n\ntail latency 指延遲分布的尾端——p99、p999、最大值，而非平均或中位數。「長尾」是說：即使每個元件平均很快，**整體分布的尾巴會被放大、且被尾巴主導**。這條只談尾巴是怎麼長出來的（成因機制）；如何量它（p99/p999、coordinated omission）在領域 I。\n\n第一原理有兩個：\n\n**(1) fan-out 放大尾巴。** 一個請求若需要並行向 N 個後端取結果並全部等齊，整體延遲是這 N 個的**最大值**。即使每個後端只有 1% 機率變慢，整體碰到「至少一個慢」的機率是 1−0.99^N。N=100 時是 1−0.99^100 ≈ **63%**——也就是說，p99 的單機慢，在 fan-out 100 下會變成「多數請求都慢」。這是 Dean & Barroso〈The Tail at Scale〉（CACM, 2013）的核心觀察。\n\n**(2) 變異來源無所不在且會疊加。** 單一元件的尾巴來自：共享資源競爭（CPU、鎖、連線池排隊）、背景活動（GC pause、compaction、log flush、快取失效後的回填）、排隊（ρ→1 時等待時間爆炸，見領域 E）、冷啟動（見上條）、網路重傳與 head-of-line blocking、以及偶發的慢碟/慢鄰居。請求路徑越長、串接的元件越多，這些獨立尾巴沿路徑相乘/相加，端到端尾巴遠比任一段嚴重。\n\n平均值會騙人：一個服務平均 20 ms、p99 200 ms，若它在每個使用者操作裡被呼叫 10 次（串接或 fan-out），使用者體感的是尾巴而非平均。\n\n### 解法空間\n\n- **hedged requests（對沖請求）**：發給後端 A，若到了 p95 還沒回，**再發一份**給後端 B，取先回的。用少量額外負載換大幅尾巴下降——原論文示範對沖可把高百分位延遲砍掉一大截。\n- **tied requests（綁定請求）**：同時發兩份但讓它們能互相取消——一份開始處理就通知另一份放棄，避免雙倍浪費。針對「尾巴主要來自佇列等待、一旦開始處理就快」的情況。\n- **減少 fan-out 寬度或要求齊全度**：能不齊就不齊。用「夠好就回」（收到 95% 後端就回、慢的那 5% 走補資料）取代「等齊 100%」。\n- **隔離背景活動**：把 GC、compaction、batch job 排到離峰或獨立資源，別和線上請求搶 CPU/IO（bulkhead，見領域 P）。\n- **micro-partition + 動態再平衡**：把資料切成遠多於機器數的小分片，讓慢機器上的分片能快速搬走，避免單台慢機器拖累固定的一塊。\n- **timeout/deadline budget**：給每段設預算，超時即放棄/降級（見領域 P），讓尾巴有上界、不無限拖。\n- **加速最慢段**：用 profiling 找出貢獻尾巴的那個元件（慢查詢、鎖競爭、冷快取），對症處理——往往 80% 尾巴來自一兩個點。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證（對尾巴的效果） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| hedged requests | 砍高百分位（p99/p999），效果顯著 | 可冪等重發、後端有多副本 | 增加總負載（典型多 5–10%）；必須冪等，否則重複副作用；過載時對沖會火上澆油（要設上限） |\n| tied requests | 砍尾巴且幾乎不增浪費 | 尾巴主因是佇列等待 | 需要後端支援「開始即取消同伴」的協定，較複雜 |\n| 降低 fan-out 齊全度 | 直接削掉「等最慢」的成本 | 結果可容忍部分缺失 | 改變正確性語意（回的是近似/部分結果），要產品端認可 |\n| 隔離背景活動 / bulkhead | 消除 GC/compaction 撞線上 | 有明顯背景峰值的儲存/服務 | 需要資源隔離能力；排程錯了反而製造新峰 |\n| timeout + 降級 | 給尾巴上界、可預期 | 任何有 SLO 的同步路徑 | 設太短砍掉本來會成功的慢請求（誤殺）；設太長等於沒設 |\n\n**worked example（fan-out 放大）**：搜尋頁向 50 個分片並行查、等齊才回。單分片 p99 = 100 ms、中位數 = 10 ms。整體碰到「至少一個分片落在它自己 p99 尾巴」的機率 = 1−0.99^50 ≈ **39.5%**——意思是約四成的搜尋請求端到端 ≥100 ms，儘管單分片中位數只有 10 ms。加上 hedged requests（過了 30 ms 還沒回就對沖到副本），把單分片有效 p99 從 100 ms 壓到約 35 ms，整體「至少一慢」的尾巴隨之大幅收斂——代價是約多打了百分之幾的查詢量到副本上。\n\n### 何時需要\n\n- **需要**：高 fan-out 的讀路徑（搜尋、聚合、儀表板）；對 p99/p999 有硬 SLO；使用者一次操作串接多個服務（尾巴沿路徑放大）；後端有多副本可供對沖。\n- **過度**：低 fan-out、單一後端、對單次延遲不敏感的非同步/批次工作。對沖/綁定請求在「無多副本」「副作用非冪等」「系統已接近過載」時不但無益還有害——這時該先處理過載與容量（見領域 E），而不是加對沖。\n\n### 常見誤解與陷阱\n\n- **用平均/中位數做容量與 SLO 決策**：尾巴才是使用者體感與級聯逾時的來源。盯 p99/p999（見領域 I）。\n- **對沖請求未設上限**：系統一旦變慢，每個請求都觸發對沖 → 負載翻倍 → 更慢 → 更多對沖，演成 retry storm（見領域 E）。對沖必須有比率上限與熔斷。\n- **對沖打到非冪等操作**：對寫入或有副作用的呼叫對沖會造成重複執行。對沖只用於可安全重發者（見領域 A 的冪等）。\n- **把尾巴歸給單一兇手**：尾巴常是多個獨立來源疊加（GC + 鎖 + 冷快取 + 排隊），逐一量化貢獻、別只猜一個。\n- **忽略 coordinated omission**：負載產生器若在系統卡住時也跟著不發請求，會系統性低估尾巴（見領域 I）。\n\n### 延伸閱讀\n\n- [The Tail at Scale — Dean & Barroso, Communications of the ACM 56(2):74–80, 2013 (PDF)](https://www.barroso.org/publications/TheTailAtScale.pdf)\n- [The Tail at Scale — summary (the morning paper)](https://blog.acolyer.org/2015/01/15/the-tail-at-scale/)\n\n## N+1 查詢\n\n### 定義與原理\n\nN+1 查詢是：取一份清單花 1 次查詢（拿到 N 個項目），接著為**每一個項目各發一次**後續查詢去補它的關聯資料，總共 1+N 次 round-trip。問題不在每次查詢本身慢，而在**次數**——N 個各自獨立的網路+解析+執行往返，把本該 2 次的事變成 N+1 次。\n\n第一原理是延遲的可加性：每次 DB round-trip 有一筆**固定成本**（網路 RTT、查詢規劃、連線取得、結果序列化），即使每筆查的資料很小。N+1 把這筆固定成本乘以 N。它最典型出現在三個地方：ORM 的惰性關聯載入（存取 `order.customer` 觸發一次查詢）、迴圈裡發查詢、以及 GraphQL resolver 對清單的每個元素獨立解析欄位。\n\n它是**隱性**的：在開發機上 N=5、資料在快取、看起來秒回；上線後 N=500、跨網段、DB 有負載，同一段碼就慢上百倍且難以從程式碼一眼看出（查詢藏在 ORM 的屬性存取後面）。\n\n### 解法空間\n\n- **eager loading / join**：在第一次查詢就把關聯一起取回（SQL JOIN，或 ORM 的 `include`/`JOIN FETCH`/`prefetch_related`）。1 次查詢拿齊。\n- **IN-list 批次（兩段式）**：先查清單拿到 N 個 id，再用一次 `WHERE fk IN (id1,…,idN)` 把所有關聯一次撈回，記憶體裡 join。2 次查詢、不放大。\n- **per-request 批次載入器（DataLoader 模式）**：在同一個事件迴圈 tick 內收集所有 `load(id)` 呼叫，coalesce 成單一批次查詢（`WHERE id IN (...)`），並在請求範圍內去重/快取。專治 GraphQL 的 resolver N+1，把 1+N 變 1+1（見批次／coalescing）。\n- **查詢層投影**：只取需要的欄位、用資料庫端聚合/子查詢一次算完，避免「拉回來再逐筆補」。\n- **快取關聯**：高重複的關聯（如商品分類）放快取，讓 N 次查詢多數命中快取而非 DB（見領域 G）。\n- **偵測**：ORM 的 query log、APM 的「同一 SQL 模板在一個請求內被執行多次」告警、測試裡斷言「一個端點的查詢數 ≤ 門檻」。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| JOIN / eager loading | 1 次查詢取齊主表+關聯 | 關聯基數低、確定要用到 | 多個一對多 JOIN 造成笛卡兒乘積（行數爆炸、重複資料）；過度 eager 反而拉回用不到的欄 |\n| IN-list 兩段式 | 固定 2 次查詢、不隨 N 放大 | 一對多、想避免 JOIN 爆行 | IN 清單過長（上萬）會撐爆查詢規劃/parser，須分批（如每批 1000） |\n| DataLoader（per-request batch） | 1+1 次；同 tick 自動合併+去重 | GraphQL、巢狀 resolver | 快取是 request-scoped（別跨請求重用，會讀到舊資料）；只在同一 tick 內的 load 才會合併 |\n| 關聯快取 | N 次查詢多數命中快取 | 關聯資料變動慢、重複率高 | 失效一致性問題（見領域 G）；只解重複關聯，不解「清單本身」的 N+1 |\n\n**worked example**：訂單列表頁顯示 50 筆訂單，每筆要顯示客戶名。N+1 寫法 = 1 次查 50 筆訂單 + 50 次各查一個客戶 = 51 次 round-trip。設單次 DB round-trip 固定成本 2 ms（網路+規劃），純資料傳輸忽略，則 51 × 2 = **102 ms** 花在往返上。改成 IN-list：1 次查訂單 + 1 次 `SELECT … WHERE id IN (50 個 customer_id)` = 2 × 2 = **4 ms**。同樣的資料、同一個結果，延遲差 25 倍——而且 N 越大差距越大（N=500 時是 1002 ms vs 4 ms）。\n\n### 何時需要\n\n- **需要修**：任何「列表 + 逐項補關聯」的讀路徑；ORM 重的應用（惰性載入是預設行為，極易誤觸）；GraphQL 服務（巢狀查詢天然 N+1）；任何在迴圈裡發查詢的地方。\n- **可以放著**：N 恆定且很小（如固定取 3 筆關聯）、且該路徑非熱點時，修它的收益低於複雜度。但要警惕「N 現在小不代表以後小」——資料長大後 N+1 會自己變嚴重。先用查詢計數測，超門檻才動手。\n\n### 常見誤解與陷阱\n\n- **以為 ORM 會自動避免**：絕大多數 ORM 預設惰性載入，存取關聯屬性就靜默發查詢——N+1 是 ORM 的預設陷阱，不是例外。\n- **用 JOIN 一律解決**：一對多的 eager JOIN 會把主表行數乘上關聯數（笛卡兒膨脹），50 筆訂單 × 每筆 20 個明細 = 1000 行重複的訂單欄位回傳。這時 IN-list 兩段式才對。\n- **開發機看不出來**：小資料 + 本機 DB（RTT ≈ 0）讓 N+1 在開發時無感。必須在「真實 RTT + 真實 N」下量。\n- **DataLoader 跨請求共用快取**：DataLoader 的快取是設計給單一請求生命週期的；跨請求重用 instance 會發舊資料。每個請求建新的。\n- **修了主關聯、漏了巢狀**：GraphQL 裡 A→B→C 每層都可能 N+1，只在 A→B 加 loader、B→C 仍逐筆。每一層關聯都要套。\n\n### 延伸閱讀\n\n- [Solving the N+1 Problem with DataLoader (GraphQL.js docs)](https://www.graphql-js.org/docs/n1-dataloader/)\n- [graphql/dataloader (GitHub README — batching & caching semantics)](https://github.com/graphql/dataloader)\n- [Batching (GraphQL Java documentation)](https://graphql-java.com/documentation/batching/)\n\n## 批次 / coalescing / debounce\n\n### 定義與原理\n\n這三者都在做同一件事——**把多個小操作合併成較少的大操作**——但觸發語意不同，混用會出錯：\n\n- **批次（batching）**：累積到「夠多」或「等夠久」就一次處理一整批。把 N 次固定成本（連線、RTT、規劃、commit）攤平成 1 次。典型參數：max batch size + max wait（湊不滿也別等太久）。\n- **coalescing（合併/去重）**：把「指向同一目標的重複請求」收斂成一次實際工作，其餘等同一個結果。最常見是 **single-flight**：N 個並行請求要同一個還沒好的快取 key，只讓一個去後端、其餘共享它的結果（防快取擊穿，見領域 G）。\n- **debounce**：高頻觸發時，**只在停止觸發一段時間後**才真正執行一次——「等它安定下來」。對照 **throttle**：固定時間窗內最多執行一次（限頻率，不等安定）。\n\n第一原理都是「固定成本攤平 + 重複工作去除」：每次操作有與 payload 大小無關的固定開銷，合併把這筆開銷除以合併數。\n\n辨析：批次是**主動湊量**（為了攤平固定成本）；coalescing 是**被動去重**（恰好撞在一起的相同工作只做一次）；debounce 是**抑制抖動**（連續觸發只認最後一次）。三者可疊加。\n\n### 解法空間\n\n- **size-or-time 批次窗**：累積到 N 筆或等到 T 毫秒（先到者觸發），兩個旋鈕一起調。寫入聚合、批次 insert、批次 ack 都用這個。\n- **per-tick 批次（DataLoader 模式）**：在事件迴圈一個 tick 內把所有 `load()` 合併成一次後端呼叫（見 N+1 查詢）。延遲幾乎為零（下一個 tick 就發），無需固定等待窗。\n- **single-flight / request coalescing**：用「進行中請求表」攔截對同一 key 的並行請求，第一個去做、其餘掛在它的 future 上等結果。\n- **micro-batching（串流）**：把連續事件流切成小時間窗（如每 100 ms）成批處理，在「逐筆低延遲」與「批次高吞吐」間取折衷。\n- **debounce / throttle**：對使用者輸入、resize、自動儲存、webhook 風暴等高頻觸發，debounce 等安定、throttle 限頻率。\n- **寫入合併（write coalescing / write-behind）**：對同一筆資料的多次更新先在記憶體合併，再一次落盤/落 DB（見領域 G 的 write-behind）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| size-or-time 批次 | 固定成本除以批量；吞吐↑ | 高頻小寫入、批次 ack/insert | 引入最多 T 的延遲；批越大單批失敗影響越多筆（要能部分重試/拆批） |\n| per-tick batch（DataLoader） | 1+N → 1+1，延遲幾乎 0 | 同一 tick 內的重複/平行載入 | 只合併同 tick 內的；快取 request-scoped（見 N+1） |\n| single-flight coalescing | 並行重複請求只打一次後端 | 熱 key 重建、防擊穿 | 第一個請求慢/失敗會連累全體（要設 timeout、失敗別快取）；只合併「同 key 且重疊時間」的 |\n| debounce | 抖動期間只執行最後一次 | 輸入、自動儲存、UI 事件 | 持續觸發會無限延後執行（要設 maxWait 上限）；不適合「每次都得處理」的事件 |\n| throttle | 每窗最多一次 | 限制下游呼叫頻率 | 會丟棄窗內其餘觸發（若不能丟，要改用佇列） |\n\n**worked example（批次攤平固定成本）**：要寫 10,000 筆事件到 DB。逐筆 insert：每筆一次 round-trip + commit，設固定成本 1 ms/筆 → 10,000 × 1 = **10 s**。改用批次 insert（每批 500 筆、一次 `INSERT … VALUES (…),(…),…` + 一次 commit）：批數 = 10000/500 = 20 批，設每批固定成本仍 ~1 ms + 傳輸 1 ms = 2 ms → 20 × 2 = **40 ms**。同樣 10,000 筆，延遲從 10 s 降到 40 ms（250 倍），代價是：批量 500 引入最多「湊滿一批的等待」延遲、且一批若違反約束，整批 insert 失敗需拆批重試。批太大（如 50000 筆一批）又會撐爆單一交易、鎖太久、失敗代價過高——所以批量要在「攤平收益」與「單批風險」間取點。\n\n### 何時需要\n\n- **批次**：高頻小操作且每次固定成本佔比高（DB 寫入、外部 API 呼叫、訊息 ack）；下游支援批次介面；能容忍最多 T 的延遲。低頻或對單筆即時性要求高（如付款確認）就別批。\n- **coalescing**：熱 key 在快取失效瞬間會被一群請求同時打（thundering herd），用 single-flight 收斂（見領域 G 的擊穿）。\n- **debounce**：來源會「連發然後安定」（搜尋輸入、視窗調整、檔案監看），且只關心最終狀態。若每個事件都有獨立意義（每筆交易）就絕不能 debounce——會吃掉事件。\n\n### 常見誤解與陷阱\n\n- **batch 等待窗無上限**：只設 max size 不設 max wait，低流量時湊不滿一批會無限期卡住第一筆。size **與** time 兩個觸發都要有。\n- **debounce 吃掉必須處理的事件**：對「每筆都得落地」的事件用 debounce，等於主動丟資料。debounce 只適合「只認最終狀態」的場景。\n- **debounce 沒有 maxWait**：使用者持續打字，debounce 永遠在重置計時器、真正的搜尋永不執行。要設 maxWait 保證最遲一定觸發。\n- **single-flight 不處理 leader 失敗**：被選去做事的那個請求若 hang 住，掛在它身上的全部一起 hang。必須給 leader 設 timeout，失敗時讓其餘 fallback，且失敗結果別寫快取。\n- **批太大放大失敗半徑**：一批 N 筆，任一筆出錯可能讓整批回滾。批量要讓「單批失敗的重做成本」可接受，並設計成可拆批重試。\n- **混淆 debounce 與 throttle**：要「限頻率、每窗都動一次」用 throttle；要「等安定、只動最後一次」用 debounce。選錯會是「該動時沒動」或「不該動時一直動」。\n\n### 延伸閱讀\n\n- [graphql/dataloader (GitHub — per-tick batching & coalescing)](https://github.com/graphql/dataloader)\n- [golang.org/x/sync/singleflight (Go package — request coalescing)](https://pkg.go.dev/golang.org/x/sync/singleflight)\n\n## 連線池調校\n\n### 定義與原理\n\n連線池的機制（為什麼要池化、取得/歸還/語意、leak 與 validation）在領域 N 深講。這條只談**調參與監控**：在池已經就位的前提下，怎麼把「池大小、逾時、生命週期」這幾個旋鈕調到剛好。\n\n第一原理反直覺：**池不是越大越快。** 資料庫能並行有效處理的查詢數，大致受限於它的核心數與磁碟——再多的連線只是讓查詢在 DB 內部排隊、互相搶 CPU/鎖、製造 context switch，整體吞吐反而下降、延遲上升。HikariCP 官方〈About Pool Sizing〉給的經驗公式是 `connections = ((core_count × 2) + effective_spindle_count)`，其中 core 用**資料庫伺服器的實體核心數**、spindle 在資料全在快取時趨近 0、SSD 約為 1（2026-06）。也就是說一台 4 核、SSD 的 DB，最佳池大小約 `(4×2)+1 = 9`，「湊個整數叫 10」——往往遠小於工程師憑直覺設的數字。\n\n另一個第一原理：**池大小是乘上實例數的。** 每個應用實例各開一個池，DB 看到的總連線 = 池大小 × 實例數。autoscale 到 50 個實例、每個池 20，就是 1000 條連線打向 DB——很容易撞穿 DB 的 `max_connections`。serverless 尤其致命：每個函式環境各自開連線、擴容瞬間連線數暴增，這是要在 DB 前面擺 PgBouncer/Accelerate 一類 pooler 的根本原因。\n\n### 解法空間\n\n- **算池大小，別猜**：用 `(cores×2)+spindle` 起步，再依負載測試微調。盯的是「DB 端的並行有效查詢數」，不是「應用端想要的並發」。\n- **設連線取得逾時**：池滿時請求等不到連線該快速失敗，而非無限等。HikariCP `connectionTimeout` 預設 30,000 ms（30 s）——對線上請求往往太長，常調到 1–5 s 讓它 fail-fast（2026-06）。\n- **設連線生命週期上限**：`maxLifetime`（連線最長壽命，到期回收重建，避開 DB 端/中間設備的閒置斷線）、`idleTimeout`（閒置連線回收到 minimumIdle）。要小於 DB/防火牆的閒置超時。\n- **min/max 與預熱**：把 min 設足夠（甚至 = max）讓啟動就建滿，避免首次查詢現連的冷成本（見冷啟動與暖機）；max 依上面公式封頂。\n- **前置 pooler（多實例/serverless）**：在 DB 前擺 PgBouncer，把上千個應用端連線收斂成 DB 能承受的數十條。模式要選對：session（最安全、相容所有功能、預設）、transaction（連線僅在交易期間綁定，併發最高、但 prepared statement/advisory lock/temp table 等 session 狀態不跨交易保留）、statement（最激進、禁多語句交易）。`default_pool_size` 預設約 20（2026-06）。\n- **監控**：盯 active/idle/waiting 連線數、取得連線的等待時間、取得逾時次數、池耗盡事件、連線建立速率。這些指標比 CPU 更早預警「池配錯了」。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 公式定池大小（`(cores×2)+spindle`） | 吞吐接近 DB 上限、避免內部排隊 | 直連 DB 的服務 | 是起點不是終點，須用負載測試校正；用 DB 實體核心數，不是應用核心數 |\n| 短 `connectionTimeout`（1–5 s） | 池滿時快速失敗、不堆積 | 線上同步請求 | 太短在正常尖峰誤殺；要配合 max 池大小與監控一起調 |\n| `maxLifetime` < DB/FW 閒置超時 | 避免用到已被對端默默關掉的死連線 | 有 idle timeout 的 DB/中間設備 | 設太短頻繁重建連線（握手成本）；要比下游 timeout 略小留餘裕 |\n| PgBouncer transaction 模式 | 上千客戶端收斂成數十 DB 連線 | 多實例/serverless、短交易 | session 狀態（prepared statement/advisory lock/temp table）不跨交易保留，ORM 預設要相容調整 |\n| 連線池指標監控 | 提早發現耗盡/等待/泄漏 | 所有用池的服務 | 沒有 waiting/timeout 指標等於盲調；只看 CPU 看不到池問題 |\n\n**worked example（池大小撞穿 DB）**：應用每實例 HikariCP `maximumPoolSize=20`，autoscale 從 5 個實例擴到 30。DB 的 `max_connections=200`。直連時 DB 看到的連線 = 20 × 30 = **600**，遠超 200——新連線被拒、應用端報「too many connections」、整片掛掉，而且這發生在「流量大到要擴容」的最糟時刻。兩個修法：(a) 把每實例池調到符合 `(cores×2)+spindle`——若 DB 是 8 核 SSD，最佳並行查詢約 `(8×2)+1=17`，那麼**全體**實例共享的有效並發應接近 17 而非 600，逐實例池該設得很小（如 2–4）並前置 pooler；(b) 擺 PgBouncer，應用端開 600 條到 PgBouncer，PgBouncer 用 transaction 模式把對 DB 的實際連線壓在 `default_pool_size`（如 20）內。多實例/serverless 幾乎一定要走 (b)。\n\n### 何時需要\n\n- **需要認真調**：DB 連線是瓶頸或接近 `max_connections`；多實例/autoscale/serverless（連線數會乘上實例數）；看到「取得連線等待時間」或「too many connections」上升。\n- **可以用預設**：單實例、低並發、DB 連線遠未飽和的服務——預設池（如 HikariCP `maximumPoolSize=10`）通常夠用，過早調校是 over-engineering。先量「池等待時間」與「DB 連線數 / max_connections」兩個指標，有壓力再動。\n\n### 常見誤解與陷阱\n\n- **池越大越快**：超過 DB 能並行有效處理的數量後，加連線只增加 DB 內部排隊與爭用，吞吐降、延遲升。池大小是個有最佳值的凹函數，不是越大越好。\n- **忘了乘以實例數**：每實例池 × 實例數才是 DB 看到的總連線。憑單實例直覺設池，一擴容就撞穿 `max_connections`。\n- **連線取得逾時用預設 30 s**：線上請求在池滿時會排隊等到 30 s 才失敗，期間請求堆積、執行緒佔住——往往該調到 1–5 s 快速失敗（2026-06）。\n- **`maxLifetime` 沒小於下游閒置超時**：DB 或防火牆默默關掉閒置連線，池卻以為它還活著，下次借出時才在查詢中途爆「connection reset」。`maxLifetime` 要比下游的 idle timeout 短。\n- **在 transaction 模式 pooler 下用 session 狀態**：PgBouncer transaction 模式不保證同一連線跨交易，prepared statement / advisory lock / temp table / session 變數會錯亂。ORM（如某些預設用 prepared statement 的）要設定相容（見領域 N、B）。\n- **只看 CPU 不看池指標**：池耗盡時 CPU 可能很閒（大家都在等連線），光看 CPU 完全看不出問題。必須監控 active/idle/waiting 與取得逾時次數。\n\n### 延伸閱讀\n\n- [About Pool Sizing (brettwooldridge/HikariCP Wiki)](https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing)\n- [HikariCP configuration knobs (HikariCP README)](https://github.com/brettwooldridge/HikariCP#configuration-knobs-baby)\n- [PgBouncer configuration (pgbouncer.org)](https://www.pgbouncer.org/config.html)\n- [PgBouncer pooling modes / features (pgbouncer.org)](https://www.pgbouncer.org/features.html)\n"}, {"id": "M1-consensus-replication", "file": "M1-consensus-replication.md", "group": "Part 5 — 分散式系統核心", "title": "M · 共識與複製", "md": "# M · 共識與複製\n\n分散式系統的核心難題是：多台機器在「部分故障、訊息會延遲遺失、各自時鐘不一致」的環境下，怎麼對「某件事發生了」達成可靠的一致認定。本檔處理這條主線上的六個概念：**分散式失敗模型**（為什麼分散式比單機難的第一原理）、**共識 consensus**（Raft / Paxos 怎麼讓一組節點同意一份 replicated log）、**leader election**（共識協定怎麼選出唯一寫入點）、**quorum**（R + W > N 這種「多數重疊」式一致）、**複製策略**（單主 / 多主 / 無主三種把資料複製到多節點的範式）、**2PC 與分散式交易**（跨資源原子提交與它的阻塞代價）。協調用的時鐘、邏輯排序、分散式鎖、consistent hashing、gossip 留在本領域另一檔；一致性模型與隔離級別的「資料庫操作面後果」屬領域 B；冪等定義屬領域 A，本檔只引用。\n\n## 分散式失敗模型\n\n### 定義與原理\n\n單機程式只有兩種狀態：整個行程在跑，或整個行程掛了（fail-stop）——你不會遇到「一半的記憶體還活著、另一半已死」。分散式系統的第一原理是 **partial failure（部分失敗）**：在一群協作的節點中，任一節點、任一條網路連線、任一段訊息，都可能**獨立地**失敗，而系統的其餘部分繼續運作、對此一無所知。你發出一個請求，沒收到回應——你**無法區分**這四種情況：請求在路上丟了、對方還在處理、對方處理完了但回應在路上丟了、對方整個掛了。在非同步網路（訊息延遲無上界）裡，這個區分**原則上不可能**做到。\n\n失敗模型由弱到強分三層：\n\n- **crash-stop（fail-stop）**：節點要麼正確運作，要麼直接停掉、不再參與，且**停了就不回來**。最樂觀的模型。\n- **crash-recovery**：節點可能崩潰後**重啟回來**，記憶體狀態全失（只剩持久化到磁碟的部分），帶著「失憶」重新加入。這是真實系統的常態——所以協定必須假設「一個沉默的節點可能稍後帶著舊認知復活」。\n- **Byzantine（拜占庭）**：節點可能**任意行為**——傳送矛盾訊息給不同對端、偽造資料、甚至惡意配合。最悲觀的模型。\n\n為什麼 partial failure 比 fail-stop 難？因為 fail-stop 下「沒回應」＝「死了」，你可以據此安全地做決定（接手、重試、報錯）。partial failure 下「沒回應」是**多義的**，任何「假設它死了」而採取的行動（例如接手它的工作）都可能在它其實還活著時造成**雙重執行**或**腦裂（split-brain）**。逾時（timeout）是你唯一能用的偵測手段，但逾時只能告訴你「它沒在我等的時間內回應」，永遠無法證明「它死了」——這是失敗偵測的根本侷限（見領域 J 的「失敗偵測」）。\n\n### 解法空間\n\n面對 partial failure，工程上的應對不是「消除它」（消不掉），而是**選一個失敗模型假設、據此設計**：\n\n- **假設 crash-stop，用逾時 + 重試 + 冪等**：最常見的工作級做法。承認「沒回應可能是死也可能是慢」，所以重試，並用冪等（見領域 A 的「冪等」）讓重複執行無害。\n- **假設 crash-recovery，狀態持久化 + epoch/term 防陳舊**：把關鍵決定寫進持久日誌（WAL，見領域 O），復活的節點靠遞增的世代編號（term/epoch）被識別為「上一輪的」而拒絕其陳舊指令。\n- **用共識協定吸收 partial failure**：把「達成一致」這件事外包給 Raft/Paxos（見「共識 consensus」），它們的安全性證明就建立在 crash-recovery + 非同步網路之上，只要多數節點存活就能繼續。\n- **針對 Byzantine 才用 BFT 協定**：拜占庭容錯（如 PBFT、區塊鏈共識）成本高——需要 **n ≥ 3m + 1** 個節點才能容忍 m 個惡意節點（Lamport-Shostak-Pease 1982 證明的下界）。一般企業內部系統（節點都是自己人、只會崩潰不會說謊）**不需要**付這個代價。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 假設 crash-stop | 最簡單；逾時即視為死 | 節點不會復活、或復活也無害的無狀態服務 | 真實節點會復活；「沉默＝死」會誤判慢節點 |\n| 假設 crash-recovery | 容忍崩潰後復活、失憶 | 絕大多數有狀態的後端 / 共識系統 | 必須持久化 + 用 term/epoch 排除陳舊復活者 |\n| 共識協定（Raft/Paxos） | 多數存活即安全進展 | 需要強一致的中樞（leader 選舉、metadata、鎖） | 少數派被擋（無法寫入）；延遲＝多數確認的 RTT |\n| BFT（n≥3m+1） | 容忍惡意/任意行為節點 | 互不信任的多方、開放網路、區塊鏈 | 節點數與訊息複雜度暴增；企業內網過度設計 |\n\n### 何時需要\n\n**幾乎所有跨機器的後端都需要把 crash-recovery 當預設假設**——一旦你的系統有多個行程協作、且任一個會重啟，「沉默的節點可能帶著舊狀態復活」就是必須處理的真實情況。**Byzantine 模型**只在「參與節點可能說謊或被攻陷、且後果嚴重」時才值得：跨組織的去中心化帳本、開放的多方計算。把 BFT 套用在「全是自家機房、互相信任」的內部系統上，是典型的 over-engineering——你付出 3 倍以上的節點與訊息成本，去防一個在你威脅模型裡不存在的敵人。\n\nworked example：一個 3 節點叢集，每節點年故障率約 5%（單節點可用性 95%）。若系統設計成「任一節點掛就整體不可用」（fail-stop 串聯），整體可用性 ≈ 0.95³ ≈ 85.7%。若改成「多數存活即可服務」（共識，容忍 1 個故障），整體不可用＝同時 ≥2 個掛，機率 ≈ C(3,2)·0.05²·0.95 + 0.05³ ≈ 0.007125 + 0.000125 ≈ 0.725%，可用性 ≈ 99.28%。同樣三台機器，把失敗模型從「全活才行」換成「多數活就行」，把停機從約 14.3% 壓到約 0.73%。\n\n### 常見誤解與陷阱\n\n- **「逾時到了就一定死了」**：最危險的假設。逾時只代表「沒在我等的窗口內回應」。在它其實活著時就接手它的工作 → split-brain、雙寫。任何「接手」動作必須配 fencing（見「分散式鎖」，本領域另一檔）或共識，不能單憑逾時。\n- **把 partial failure 當 all-or-nothing**：以為「網路斷了就是兩邊都知道斷了」。實際上分區（partition）時，兩邊各自可能都以為對方死了、自己是唯一活著的——這正是 split-brain 的溫床。\n- **重試卻不冪等**：承認 partial failure 就會重試，但重試一個非冪等操作（扣款、發貨）會在「請求其實成功了、只是回應丟了」時造成重複。重試的前提是冪等（見領域 A）。\n- **誤用 Byzantine**：把「節點可能回傳錯資料（因為 bug）」當成 Byzantine 而上 BFT。bug 導致的錯誤不是惡意對手，用測試、校驗和、對帳（見領域 L）解，比 BFT 便宜得多。\n\n### 延伸閱讀\n\n- Fischer, Lynch, Paterson, \"Impossibility of Distributed Consensus with One Faulty Process\", JACM 32(2):374-382, 1985（FLP 不可能性，partial failure 下共識的根本侷限）: https://dl.acm.org/doi/10.1145/3149.214121\n- Lamport, Shostak, Pease, \"The Byzantine Generals Problem\", ACM TOPLAS 4(3):382-401, 1982（n≥3m+1 下界）: https://dl.acm.org/doi/10.1145/357172.357176\n\n## 共識 consensus\n\n### 定義與原理\n\n共識（consensus）解的問題：**一組節點，在部分故障與不可靠網路下，對「某個值」達成不可推翻的一致決定**。這個「值」在實務上通常不是單一數字，而是**一份 replicated log（複製日誌）裡下一筆要追加的條目**——也就是「狀態機複製（state machine replication）」：所有節點對同一份指令序列達成一致，按同序套用，於是所有節點的狀態收斂相同。「對 log 的下一個位置放什麼達成共識」反覆做，就構成了一個強一致的複製系統。\n\n共識協定必須同時滿足三個性質：**agreement**（所有正確節點決定同一個值）、**validity/integrity**（決定的值來自某個被提議的值，不憑空捏造）、**termination**（最終會決定，不會永遠卡住）。FLP 不可能性（Fischer-Lynch-Paterson 1985）證明了：在完全非同步的網路裡，只要有一個節點可能崩潰，就**沒有**確定性協定能同時保證這三者——因為你永遠無法區分「崩潰的節點」和「很慢的節點」。實務協定靠引入**逾時（部分同步假設）**繞過：放棄「在最壞情況下保證 termination」，換取「在網路最終穩定下保證 termination」，但**任何時候都不犧牲 agreement**（安全性絕不妥協，活性靠運氣與逾時）。\n\n### 解法空間\n\n達成共識的主流協定家族：\n\n- **Paxos**（Lamport，\"The Part-Time Parliament\", ACM TOCS 16(2):133-169, 1998）：理論上的奠基者。單值 Paxos（Synod）以 proposer/acceptor/learner 角色、兩階段（prepare/accept）＋ proposal number 達成單一值共識；**Multi-Paxos** 把它擴展成連續 log，並用穩定 leader 省掉每筆的 prepare 階段。以難懂著稱。\n- **Raft**（Ongaro-Ousterhout，\"In Search of an Understandable Consensus Algorithm\", USENIX ATC 2014）：刻意為「可理解」設計，把共識拆成三個相對獨立的子問題——**leader election、log replication、safety**。功能上等價於 Multi-Paxos、效率相當，但結構更清楚，是近十年新系統的主流選擇。\n- **Zab（ZooKeeper Atomic Broadcast）**：ZooKeeper 專用，為「穩定 leader 廣播有序更新」這個特例最佳化，與 Paxos 同類但獨立設計。\n- **Viewstamped Replication（VR）**：與 Paxos 同期、思路相近的早期協定，近年重新受重視。\n- **BFT 共識（PBFT、各式區塊鏈協定）**：把共識推廣到容忍惡意節點，代價是更多節點與訊息輪次。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Paxos / Multi-Paxos | 多數存活下安全 + 最終進展 | 理論基準；Google Chubby/Spanner 等 | 規格留白多、難正確實作；論文不直接給工程藍圖 |\n| Raft | 同 Multi-Paxos，且強 leader、log 不允許空洞 | 多數新系統的預設（見下方實作） | 強 leader ＝寫入吞吐受單 leader 上限約束 |\n| Zab | 為 ZooKeeper 的有序廣播最佳化 | 協調服務（watch、有序事件） | 與通用共識耦合在 ZooKeeper，不獨立取用 |\n| BFT 共識 | 容忍 m 個惡意節點（n≥3m+1） | 互不信任多方、公鏈 | 訊息複雜度高、節點數多、延遲大 |\n\n實作映射（2026-06）：**etcd**（Kubernetes 的後端儲存）、**Consul**、**TiKV** 用 Raft；**Kafka** 自 KRaft 起以 Raft 取代 ZooKeeper 做 controller metadata 的共識（KRaft 在新版已是預設）；**ZooKeeper** 用 Zab；Google **Chubby/Spanner** 用 Paxos 系。\n\n### 何時需要\n\n共識**昂貴**——每個決定都要等過半節點持久化並確認（一個跨可用區的 RTT 量級），且少數派被擋住無法寫入。所以共識只用在「**少量、關鍵、必須全域唯一一致**」的決定上：**誰是 leader、叢集成員資格、分片路由表、分散式鎖的持有者、設定的當前版本**。它**不該**用在高吞吐的業務資料路徑上——你不會讓每筆使用者請求都跑一輪共識。\n\nworked example：一個 5 節點 Raft 叢集，quorum＝3。假設每次寫入需 leader 把條目持久化、平行送給其餘 4 個 follower、收到任意 2 個 follower 的 ack（湊滿含 leader 的 3）。若節點間單程網路延遲 1 ms、fsync 約 5 ms，一次提交延遲 ≈ max(本地 fsync 5ms, 1ms 送出 + follower fsync 5ms + 1ms ack) ≈ 約 7 ms。即使吞吐做到單 leader 每秒上萬筆，這個延遲下限決定了「每筆使用者交易都走共識」在高 QPS 下不可行——共識管的是 metadata，不是 payload。\n\n### 常見誤解與陷阱\n\n- **「共識＝強一致＝慢，所以避開它」**：誤把共識當成所有跨機操作都要付的稅。正解是「把需要共識的決定縮到最小集合」，其餘走複製/quorum/最終一致。\n- **以為 Raft「等價 Multi-Paxos」就等於兩者可互換實作**：等價指的是達成的保證等價，不代表你能隨意混用其工程細節。Raft 的「log 不允許空洞、強 leader」是它可理解性的來源，也是它的約束。\n- **自己手刻共識**：Paxos 規格留白極多、Raft 看似簡單但邊角（log 截斷、成員變更、快照、term 持久化）多到容易出安全性漏洞。生產上幾乎總是用成熟函式庫/系統（etcd、其 raft 函式庫等），不自刻。\n- **誤以為共識能在網路分區時兩邊都繼續寫**：共識在分區時**只允許多數派那一邊進展**，少數派停寫。這是 CAP 裡選 C 棄 A 的具體呈現（見領域 B 的 CAP/PACELC）。\n- **把「leader 還在」當成「leader 一定收到了我的寫」**：寫入只有在被多數持久化後才算 committed；leader 在 commit 前崩潰，該寫可能丟失，client 必須靠「未收到成功回應就重試 + 冪等」處理。\n\n### 延伸閱讀\n\n- Ongaro, Ousterhout, \"In Search of an Understandable Consensus Algorithm\", USENIX ATC 2014: https://raft.github.io/raft.pdf\n- Raft 官方網站（含視覺化、實作清單）: https://raft.github.io/\n- Lamport, \"The Part-Time Parliament\", ACM TOCS 16(2):133-169, 1998: https://lamport.azurewebsites.net/pubs/lamport-paxos.pdf\n- Lamport, \"Paxos Made Simple\", 2001: https://lamport.azurewebsites.net/pubs/paxos-simple.pdf\n\n## leader election\n\n### 定義與原理\n\n許多複製協定（尤其 Raft、Multi-Paxos、主從複製）需要一個**唯一的 leader（主節點）**：所有寫入經由它排序，避免多個節點同時對同一份 log 寫入造成衝突。**leader election** 解的問題：在沒有中央仲裁者、且節點會崩潰/復活、訊息會延遲的環境下，**選出且只選出一個 leader，並在它失效時自動換人**。難點不在「選出一個」，而在「**保證任一時刻最多一個有效 leader**」——若兩個節點同時自認 leader（split-brain），各自接受寫入，資料就分岔了。\n\nRaft 的機制是教科書範例：時間切成遞增的 **term（任期，邏輯時鐘）**，每個 term 至多一個 leader。每個 follower 維持一個**隨機化的 election timeout**（典型 150–300 ms），收到 leader 心跳（空的 AppendEntries）就重置；逾時沒收到，就遞增自己的 term、轉為 candidate、向所有人發 RequestVote。**每個節點在一個 term 內只投一票**，candidate 收到**過半票**即成為該 term 的 leader。隨機化逾時是關鍵：它讓節點不會同時超時開選（避免持續 split vote／平票），通常一個節點先超時、先拿到多數、先發心跳壓住其他人。term 號則保證舊 leader 復活時，它的陳舊 term 會被拒絕——它一看到更高的 term 就自動退位成 follower。\n\n### 解法空間\n\n- **共識內建的選舉（Raft term + 隨機逾時 + 多數投票）**：選舉與 log 安全性綁在一起（Raft 還要求「只有 log 夠新的 candidate 才可能當選」，確保已 committed 的條目不丟）。最穩，但要整套共識。\n- **靠外部協調服務搶租約（lease）**：把選 leader 外包給 ZooKeeper/etcd——所有候選者去搶建同一個 ephemeral key／lock，搶到者持有有時限的 **lease（租約）**並定期續租，沒續到就釋放、觸發重選。應用層不必自己實作共識。\n- **Bully / Ring 等經典演算法**：以節點 ID 大小或環狀傳遞選出 leader。理論教材常見，但對 partial failure 的處理較弱，生產少用。\n- **固定/手動指定 + 故障切換**：主從資料庫常見——主由設定指定，故障時由哨兵/operator 提升某個 replica。簡單，但切換決策本身需要防 split-brain（見陷阱）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Raft 內建選舉 | 每 term 至多一 leader + 不丟 committed log | 自身就是共識系統 | 須完整共識；選舉期間（typ. 數百 ms）無 leader、寫入暫停 |\n| 外部 lease（ZK/etcd） | 至多一持租者（在時鐘假設成立下） | 應用層要選 leader 但不想自刻共識 | 依賴外部服務可用；lease 過期判定受時鐘漂移影響 |\n| Bully / Ring | 邏輯上選出唯一 leader | 教學、受控環境 | 對訊息遺失/分區韌性弱 | \n| 主從 + 哨兵切換 | 故障時提升 replica | 傳統關聯式/Redis 主從 | 切換邏輯本身要防雙主；需 fencing |\n\n### 何時需要\n\n需要 leader election 的訊號是「**這個角色必須全域唯一**」：唯一的寫入排序者、唯一的排程觸發者、唯一的某資源協調者。若你的工作天生可由多個 worker 平行無協調地做（無狀態、冪等、無需排序），就**不要**引入 leader——它增加選舉延遲、複雜度與單點瓶頸。常見落點：資料庫主節點、分散式工作排程器的「誰來觸發」、有狀態服務的 primary。\n\nworked example：Raft 叢集 election timeout 設 [150, 300] ms、心跳間隔 50 ms。leader 崩潰後，follower 平均約 (150+300)/2 ≈ 225 ms 才超時開選，加一輪 RequestVote 往返（~1–2 ms）與成為 leader 後首個心跳，故障切換的「無 leader 寫入暫停窗」典型在約 150–300 ms 量級。若把 election timeout 設太小（如 20 ms），網路抖動就頻繁誤判 leader 死亡、反覆改選（election storm）；設太大（如 5 s），故障切換變慢、可用性下降。150–300 ms 是論文以實驗權衡出的範圍。\n\n### 常見誤解與陷阱\n\n- **split-brain（雙主）**：最核心的失敗。網路分區後，舊 leader 在少數派側仍自認是 leader 並繼續接寫，新 leader 在多數派側選出——兩邊都寫。防法：寫入必須驗證「我仍持有當前 term/lease 的多數認可」，且接手者要用 fencing token 讓舊 leader 的陳舊寫入被下游拒絕（見「分散式鎖」，本領域另一檔）。\n- **以為「持有 lease」＝「現在仍是 leader」**：lease 是過去某刻拿到的，到你執行寫入時可能已因 GC 暫停、時鐘跳動而過期、別人已接手。lease 必須配 fencing，不能只靠「我記得我有 lease」。\n- **election timeout 不隨機化**：所有節點同時超時 → 持續平票、選不出 leader。隨機化是打破對稱的關鍵。\n- **選舉與資料新鮮度脫鉤**：若允許 log 落後的節點當選，已 committed 的資料會被它的舊 log 覆蓋而丟失。Raft 的「投票限制」（只投給 log 至少和自己一樣新的 candidate）正是防這個。\n- **把 leader 當成永不換**：leader 會因 GC 暫停、網路抖動被誤判而換人；系統其餘部分必須容忍 leader 隨時更替、寫入短暫不可用，不能假設 leader 恆定。\n\n### 延伸閱讀\n\n- Raft 論文第 5.2 節（Leader election）: https://raft.github.io/raft.pdf\n- Raft 視覺化（觀察隨機逾時與選舉）: https://raft.github.io/\n- Lamport, \"Paxos Made Simple\"（distinguished proposer 的角色）: https://lamport.azurewebsites.net/pubs/paxos-simple.pdf\n\n## quorum（R + W > N）\n\n### 定義與原理\n\nquorum（法定數）是一種**不靠單一 leader、靠「多數重疊」達成一致**的複製機制，常見於無主（leaderless）複製。把資料複製到 **N** 個副本，每次寫入要求至少 **W** 個副本確認成功才算成功，每次讀取至少向 **R** 個副本查詢。核心不等式：\n\n**R + W > N**\n\n它的威力來自鴿巢原理：任一組「W 個寫過的副本」和任一組「R 個讀的副本」**必然至少有一個交集**——因為 W + R 個位置擠進 N 個槽，超過 N 就一定有重疊。那個交集副本持有最新的寫，於是讀取**至少看得到最新版本**（再靠版本號/時間戳在 R 個回應中挑出最新的）。這保證了「讀得到最近一次成功的寫」，而**不需要每個副本都同步**——只要多數派重疊即可。\n\n另一條相關不等式 **W > N/2**（寫 quorum 過半）保證**兩次寫之間也重疊**，避免兩個並行寫各自只達到不重疊的副本集而都「成功」、造成無法定序的衝突。\n\n### 解法空間\n\nquorum 是個參數可調的旋鈕，不同 (N, R, W) 給不同取捨：\n\n- **R + W > N（嚴格 quorum）**：保證讀寫重疊、讀得到最新寫。N=3,W=2,R=2 是經典平衡點。\n- **W=N, R=1（讀最佳化）**：寫要所有副本、讀只要一個。讀快寫慢，且任一副本掛了就無法寫。\n- **W=1, R=N（寫最佳化）**：寫只要一個、讀要全部。寫快讀慢，寫的耐久性差（那一個副本掛了就丟）。\n- **R + W ≤ N（放寬 quorum）**：故意不保證重疊，換更高可用與更低延遲，接受最終一致——讀可能讀到舊值，靠讀修復（read repair）與反熵（anti-entropy，本領域另一檔）背景收斂。\n- **sloppy quorum + hinted handoff**（Dynamo 式）：分區時，把寫暫存到「本該負責的節點以外的健康節點」上（hinted handoff），先湊滿 W 保住可用性，待原節點恢復再交還。提升可用性，但會**犧牲嚴格 quorum 的重疊保證**。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| R+W>N（如 N3W2R2） | 讀必見最新成功寫 | 要可調一致性的無主儲存 | 並行寫仍可能衝突，需版本向量 + 衝突解決 |\n| W=N, R=1 | 讀極快、強讀一致 | 讀多寫極少 | 任一副本不可用即無法寫；寫延遲＝最慢副本 |\n| W=1, R=N | 寫極快 | 寫多、可容忍丟失 | 耐久性弱；讀要等最慢副本 |\n| R+W≤N（放寬） | 高可用、低延遲、最終一致 | 可容忍讀到舊值的場景 | 讀可能舊；靠 read repair / anti-entropy 收斂 |\n| sloppy quorum | 分區時仍可寫 | 極高可用優先（Dynamo 式） | 「W 個確認」可能不含正規副本，重疊保證被打破 |\n\n### 何時需要\n\nquorum 適合**無主、要在一致性與可用性間細調**的場景：Dynamo 式 KV（Cassandra、Riak）、需要「多數確認才算數」的去中心化複製。若你已經有 leader-based 共識（Raft），leader 路徑本身就含 quorum（過半 ack 才 commit），不必另設 R/W。若你的資料就放單一強一致資料庫、靠它的交易保證，也不需要手調 quorum——這是無主複製特有的旋鈕。\n\nworked example：N=3、W=2、R=2，R+W=4>3，重疊保證成立。寫入 key=`x` 到副本 {A,B}（C 暫時沒收到），寫成功。隨後讀取向 {B,C} 查：B 持新值（versioned，較高時間戳/向量）、C 持舊值，讀端比對版本取 B 的新值——正確讀到最新。對照 N=3、W=1、R=1：R+W=2≤3，寫只到 A、讀只問 C，兩者無交集，讀到舊值。可用性算術：N=3,W=2 時寫需 2/3 副本健康，能容忍 1 個故障；若把 W 設成 3，任一副本故障就無法寫——這就是為什麼 W 過大會傷可用性。\n\n### 常見誤解與陷阱\n\n- **以為 R+W>N＝線性一致（強一致）**：不是。它只保證「讀到的版本集合含最新成功寫的版本」，但仍可能讀到尚未收斂的並行寫、或在 sloppy quorum 下完全失去重疊。它是「能讀到最新」而非「全域單一最新」。要線性一致仍需共識。\n- **忽略並行寫衝突**：R+W>N 解決「讀寫重疊」，不解決「兩個 client 同時寫不同值」。並行寫需要版本向量（vector clock）或 LWW 等衝突解決策略（見領域 L 的「衝突解決」），否則靜默丟更新。\n- **把 sloppy quorum 當嚴格 quorum**：開了 hinted handoff 以求高可用，卻仍假設「W 個確認＝多數正規副本確認」——分區下這個假設破裂，讀可能讀不到剛寫的值。要清楚自己用的是嚴格還是 sloppy。\n- **R/W 設定與耐久性混淆**：W=1 寫很快，但若那個副本在複製給其他副本前崩潰，這筆寫就丟了。低 W 換來的低延遲，代價是耐久性窗口。\n- **以為 quorum 數字越大越安全**：W、R 拉高會犧牲可用性與延遲；安全與可用是此消彼長，要按業務對「讀到舊值」的容忍度選點。\n\n### 延伸閱讀\n\n- DeCandia 等, \"Dynamo: Amazon's Highly Available Key-value Store\", SOSP 2007（R/W/N、sloppy quorum、hinted handoff 出處）: https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf\n- Apache Cassandra 一致性等級文件（quorum 在生產的可調呈現）: https://cassandra.apache.org/doc/latest/cassandra/architecture/dynamo.html\n\n## 複製策略\n\n### 定義與原理\n\n複製（replication）＝把同一份資料保存在多個節點上，目的有三：**容錯**（一個副本掛了還有別的）、**讀擴展**（讀分散到多副本）、**就近服務**（副本放使用者附近降延遲）。難點全在「**多個副本怎麼保持一致、寫入由誰主導、衝突怎麼處理**」。按「誰能接受寫入」這個維度，複製範式分三類，這是本書複製策略的 owning 條目——機制在此深講一次，領域 B 的「複製延遲」「分片」只講其一致性後果與 DB 操作面。\n\n- **單主（single-leader / primary-backup）**：只有一個 leader 接受寫入，依序把變更（複製日誌）傳給 follower。**所有寫經單一定序點**，所以避免了寫衝突；讀可分散到 follower（但有複製延遲）。\n- **多主（multi-leader）**：多個節點都能接受寫入（典型用於多資料中心、各區一個 leader），彼此非同步互相複製。寫入就近、可用性高，但**同一筆資料可能在兩地被並行改**，產生衝突需解決。\n- **無主（leaderless，Dynamo 式）**：沒有 leader，client（或協調者）直接對多個副本讀寫，靠 quorum（見「quorum」）保證重疊、靠版本與 read repair 收斂。對節點故障最寬容。\n\n### 解法空間\n\n複製的同步性與衝突處理各有選擇：\n\n- **同步 vs 非同步 vs 半同步複製（單主內部）**：同步＝leader 等 follower 確認才回 client（不丟資料但慢、follower 掛就阻塞）；非同步＝leader 寫完就回（快、但 leader 崩潰時未複製的寫會丟）；半同步＝至少一個 follower 同步、其餘非同步（折衷）。\n- **單主的故障切換**：leader 掛了提升某 follower（見「leader election」）；非同步複製下切換可能丟失「leader 已回 client 但未複製」的寫。\n- **多主的衝突解決**：LWW（last-write-wins，丟資料但簡單）、版本向量、CRDT（保證收斂、語意受限）——機制見領域 L 的「衝突解決」。\n- **無主的讀寫修復**：read repair（讀到不一致就順手修）＋ anti-entropy（背景比對修補，本領域另一檔）。\n- **複製拓樸**：鏈式、星狀、全互聯（多主下影響衝突傳播與延遲）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單主 + 同步複製 | 不丟已確認的寫、無寫衝突 | 強耐久性優先、單區 | follower 慢/掛則寫阻塞；延遲＝最慢同步副本 |\n| 單主 + 非同步複製 | 寫低延遲、無寫衝突 | 多數 OLTP 主從 | 切換時可能丟未複製的寫；follower 有複製延遲 |\n| 多主 | 各區就近寫、高可用 | 多資料中心、離線優先 | 並行寫衝突必須解（LWW/向量/CRDT）；收斂前不一致 |\n| 無主（quorum） | 可調一致性、對節點故障寬容 | Dynamo 式 KV | 需版本 + read repair；sloppy quorum 削弱保證 |\n\n### 何時需要\n\n**預設從單主開始**——它無寫衝突、心智模型最簡單，覆蓋絕大多數需求；讀擴展用 follower、容錯用故障切換。**多主**只在「**多個地理區都要能本地寫、且能接受最終一致與衝突解決成本**」時才值得（跨洲低延遲寫、行動裝置離線編輯後同步）——衝突解決的複雜度被嚴重低估，不要為了「看起來更高可用」就上多主。**無主**適合「**極高可用、可調一致性、KV 型資料**」且團隊願意處理版本與修復機制的場景。錯配的代價：把多主用在「其實只有一個寫入區」上，徒增衝突風險而無收益。\n\nworked example：單主非同步複製，leader 每秒寫 5,000 筆、複製管線把變更傳給跨區 follower，跨區網路延遲 80 ms。某瞬間 leader 崩潰，此時「已寫入 leader 但尚未送達 follower」的窗口約等於 80 ms 的在途量 ≈ 5,000 × 0.08 ≈ 400 筆。若這些寫的 client 已收到成功回應，故障切換到該 follower 後這 400 筆**消失**（client 以為成功、實際丟了）。這就是非同步複製「切換丟資料」的具體量；要消除它得用同步/半同步複製，代價是每筆寫多付一個跨區 RTT。\n\n### 常見誤解與陷阱\n\n- **以為 follower 讀＝即時資料**：單主下 follower 有複製延遲，讀 follower 可能讀到舊值，甚至「寫完立刻讀自己寫的卻讀不到」（讀己之寫違反）。需要時要讀 leader 或做 read-your-writes 路由（一致性後果見領域 B）。\n- **多主下低估衝突**：以為「衝突很罕見」。一旦兩地並行改同一鍵，LWW 會靜默丟掉一邊的更新；計數器、集合這類資料用 LWW 會錯，需要 CRDT 或顯式合併。\n- **非同步複製＝可能丟資料，卻當成不會丟**：只要 leader 在複製前崩潰，「已對 client 確認」的寫就可能在切換後消失。要「絕不丟已確認寫」必須付同步複製的延遲代價。\n- **把複製當備份**：複製是即時同步，刪錯/寫壞會**即時同步到所有副本**。複製防的是節點故障，不防邏輯錯誤與誤刪——那需要時間點備份（見領域 O 的資料生命週期）。\n- **混淆複製與分片**：複製是「同一份資料多副本」（解容錯/讀擴展），分片是「不同資料切到不同節點」（解寫擴展/容量）。兩者正交、常同時用（每個分片再各自複製）；分片的一致性與路由面見領域 B。\n\n### 延伸閱讀\n\n- DeCandia 等, \"Dynamo: Amazon's Highly Available Key-value Store\", SOSP 2007（無主複製原型）: https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf\n- PostgreSQL 高可用、負載平衡與複製官方文件（單主同步/非同步的工程呈現）: https://www.postgresql.org/docs/current/high-availability.html\n\n## 2PC 與分散式交易\n\n### 定義與原理\n\n分散式交易要解的問題：**一筆操作跨越多個獨立資源（多個資料庫、或 DB + 訊息佇列），要嘛全部生效、要嘛全部不生效（原子性），不能一半成功一半失敗**。單機交易的 ACID 由單一引擎保證；跨資源就沒有共同引擎了，需要一個協定協調各方一起提交或一起回滾。\n\n**兩階段提交（2PC, Two-Phase Commit）**是經典方案，由一個 **coordinator（協調者）** 主導兩個階段：\n\n1. **prepare（投票）階段**：coordinator 問所有 participant「你能提交嗎？」。每個 participant 做完所有檢查、把變更寫入持久日誌但**先不提交**，鎖住相關資源，回覆 **yes（prepared）** 或 **no**。回了 yes 就進入「**不確定（in-doubt）**」狀態——它承諾「之後 coordinator 叫我 commit 我就一定能 commit」，因此**不能單方面反悔**。\n2. **commit/abort（決定）階段**：只要有一個回 no（或逾時），coordinator 決定 abort，通知所有人回滾；全部 yes 才決定 commit，通知所有人提交。\n\n關鍵安全性質：一旦有 participant 回了 yes，它就**不能自己決定**，必須等 coordinator 的最終裁決。這帶來 2PC 的致命弱點——**阻塞（blocking）**。\n\n### 解法空間\n\n跨資源達成一致提交/或繞過它的辦法：\n\n- **2PC（含 XA）**：強原子性，但 coordinator 是單點、會阻塞（見保證取捨）。XA 是 2PC 的標準化介面（多數關聯式 DB、部分訊息中介支援）。\n- **3PC（三階段提交，Skeen 1981）**：在 prepare 與 commit 間插一個 pre-commit 階段，理論上消除 2PC 的阻塞——但**只在「無網路分區、僅節點崩潰」的同步假設下成立**，分區時仍可能不一致，且多一輪訊息更慢，生產極少用。\n- **共識式原子提交**：把 coordinator 的決定本身用 Raft/Paxos 複製（如 Spanner 的 2PC over Paxos groups），讓「決定」不因 coordinator 單點崩潰而丟失，緩解阻塞。\n- **saga（補償交易）**：放棄全域原子性，把長交易拆成一串本地交易，每步配一個「補償動作」回退已完成的步驟，靠最終一致替代原子提交（機制與 choreography/orchestration 取捨見領域 A 的「outbox/saga」）。\n- **outbox + 事件**：用本地交易把「業務變更 + 待發事件」原子寫入同一 DB，再非同步可靠投遞，避開跨資源的 dual-write（見領域 A、L）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 2PC / XA | 跨資源原子提交（強一致） | 少數參與者、同機房、低頻關鍵交易 | coordinator 崩潰 → in-doubt participant 鎖資源無限阻塞；同步、慢 |\n| 3PC | 同步無分區下不阻塞 | 理論/受控環境 | 分區下仍可能不一致；多一輪訊息；幾無生產採用 |\n| 2PC over Paxos | coordinator 決定不丟（緩解阻塞） | 跨分片強一致 DB | 實作複雜；延遲＝多輪共識 + 2PC |\n| saga + 補償 | 最終一致、無全域鎖 | 跨微服務長流程 | 中間態可見、補償邏輯難寫且要冪等 |\n| outbox + 事件 | 本地原子 + 可靠投遞 | DB 變更要可靠發事件 | 最終一致；消費端要去重（見領域 A） |\n\n### 何時需要\n\n2PC 適合「**參與者少、同機房、低頻但必須原子**」的關鍵操作（如一筆橫跨兩個內部 DB 的資金移轉），且你能接受它在 coordinator 故障時鎖住資源等待人工/恢復。**跨微服務、跨網際網路、高頻**的場景**不要用 2PC**——同步阻塞與單點會在規模下變成系統性風險，改用 saga / outbox / 事件驅動的最終一致（見領域 A、K）。判準：你是否真的需要「同一瞬間全有或全無」的強原子性，還是「最終都會一致、中間態短暫可見」就夠？絕大多數業務流程是後者。\n\nworked example：3 個 participant 的 2PC，每段網路單程 2 ms、各自 prepare 的 fsync 5 ms。正常路徑延遲 ≈ prepare（2ms 送 + 5ms fsync + 2ms 回 ≈ 9ms）+ commit（2 + 5 + 2 ≈ 9ms）≈ 18 ms，期間 3 個 participant 全程持有資源鎖。現在設想 coordinator 在收齊 3 個 yes、剛要送 commit 前崩潰：3 個 participant 都停在 in-doubt，**各自鎖住的資料行無限期鎖住**，直到 coordinator 從持久日誌恢復重發決定（可能數秒～人工介入的數分鐘）。在這段時間，任何想碰這些行的交易全部阻塞——這就是「2PC 的阻塞」具體長什麼樣，也是它在高吞吐下不可接受的原因。\n\n### 常見誤解與陷阱\n\n- **以為 2PC 不會阻塞**：2PC 的核心弱點就是阻塞——coordinator 在「決定」階段崩潰，回了 yes 的 participant 進退不得（不能自行 commit 也不能 abort），鎖住資源等到天荒地老。這不是實作 bug，是協定本身的性質。\n- **把 3PC 當「解決了阻塞的 2PC」直接上**：3PC 只在「無網路分區」假設下不阻塞；真實網路會分區，此時 3PC 可能不一致。它換來的「不阻塞」有前提，不是免費。\n- **以為「exactly-once 提交＝exactly-once 交付」**：2PC 解的是跨資源的原子提交，不等於跨網路的訊息只送一次。交付語意是另一回事（見領域 A 的交付語意）。\n- **saga 的補償當成「就是反向 SQL」**：補償要處理「中間態已被別人看到/依賴」的情況，且補償本身要冪等、要能重試——它比「DELETE 剛才 INSERT 的」複雜得多。\n- **忽略 in-doubt 交易的運維成本**：用 XA/2PC 的系統，DBA 必須懂得處理卡住的 in-doubt 交易（手動 commit/rollback、辨識哪些鎖該放）；這是 2PC 隱藏的長期維運稅。\n- **把冪等定義在這裡重講**：2PC 的恢復、saga 的補償都依賴冪等，但冪等的定義與冪等鍵生命週期屬領域 A，本條只引用、不重述。\n\n### 延伸閱讀\n\n- Gray, Lamport, \"Consensus on Transaction Commit\", ACM TODS 31(1):133-160, 2006（把原子提交與共識統一看待）: https://lamport.azurewebsites.net/pubs/consensus-on-transaction-commit.pdf\n- Skeen, \"Nonblocking Commit Protocols\", ACM SIGMOD 1981（3PC 的源頭）: https://dl.acm.org/doi/10.1145/582318.582339\n- X/Open XA 規格（分散式交易的標準介面）: https://pubs.opengroup.org/onlinepubs/009680699/toc.pdf\n"}, {"id": "M2-coordination-time", "file": "M2-coordination-time.md", "group": "Part 5 — 分散式系統核心", "title": "M · 協調、雜湊與時間", "md": "# M · 協調、雜湊與時間\n\n本領域處理分散式系統裡「沒有單一全域真相、節點之間要協調卻又彼此不完全信任」的問題：誰能獨佔資源（分散式鎖）、事件之間誰先誰後（邏輯時鐘與排序）、資料該落在哪個節點且擴縮時搬動最少（consistent hashing）、狀態怎麼在沒有中央協調者的情況下趨同（gossip / anti-entropy），以及最被低估的一類坑——把實體世界的「時間與日期」對應進系統的應用層陷阱。共識、leader election、quorum、複製策略等核心機制在領域 M 的另一檔深講，本檔聚焦「協調原語、資料放置與時間」這一面。本檔的 consistent hashing 與時鐘是本書的 owning 條目：分片在領域 B 只談一致性後果，排程觸發語意在領域 J 只談漏跑/補跑。\n\n## 分散式鎖（Redlock / fencing token）\n\n### 定義與原理\n\n分散式鎖要回答的問題是：在多台機器、多個行程同時想做同一件「同一時間只能有一個人做」的事（扣同一筆庫存、跑同一個批次、寫同一個檔案）時，怎麼保證互斥（mutual exclusion）。單機上互斥靠作業系統的 mutex；跨機器沒有共享記憶體，只能靠一個外部協調者（Redis、ZooKeeper、etcd、資料庫）發放「鎖」這個共識性的記號。\n\n分散式鎖的第一原理麻煩在於：**鎖的擁有權是有時效的，而持有者隨時可能「失聯但沒死」**。為了避免持有者崩潰後鎖永遠卡住，鎖一定帶 TTL（lease，租約）。但 TTL 一旦存在，就出現一個無法靠鎖本身消除的裂縫：行程 A 拿到鎖、TTL 30 秒，A 在第 5 秒進入一個 40 秒的 GC stop-the-world 暫停（或被 OS 換出、或網路黑洞）。鎖在第 30 秒過期，協調者把鎖發給 B；A 在第 45 秒醒來，**它不知道自己已經失去鎖**，仍然以為持有鎖去寫資料——此刻 A 和 B 同時在臨界區。這不是 bug，是「靠時間判定存活」的根本限制（見領域 J 的失敗偵測：逾時是唯一手段，無法區分「慢」與「死」）。\n\n### 解法空間\n\n- **單實例 Redis 鎖（`SET key val NX PX ttl`）**：原子地「不存在才設、帶過期」，`val` 用唯一隨機值，解鎖用 Lua 腳本比對 `val` 再刪（避免刪到別人的鎖）。簡單、快，但單點，且有上述 TTL 裂縫。\n- **Redlock（多 Redis 實例多數決）**：向 N 個獨立 Redis（典型 5 個）依序請求鎖，在多數（≥⌊N/2⌋+1，即 3 個）成功且總耗時遠小於 TTL 時才算拿到。設計目的是消除單點。\n- **共識系統發鎖（ZooKeeper / etcd）**：用順序節點（ephemeral sequential znode）或 lease + 線性化 KV。持有者 session 斷線，協調者主動讓鎖過期；znode 的版本號或 etcd 的 revision 天然單調遞增，可直接當 fencing token。\n- **fencing token（柵欄記號）**：不論用哪種鎖，每次發鎖附帶一個**單調遞增的整數**。受保護的資源（資料庫、儲存）在每次寫入時檢查 token，**拒絕比已見過的最大 token 還小的寫入**。這把「正確性」從「鎖服務 + 時鐘」轉移到「資源端的版本檢查」，是唯一能堵住 TTL 裂縫的辦法。\n- **完全不用分散式鎖**：把臨界操作改成資源端的條件寫入（CAS / 樂觀並發，見領域 B），或用單一分區序列化（同一 key 永遠路由到同一 consumer，見訊息順序，領域 A）。很多「需要分散式鎖」的需求其實是這兩者能更便宜解掉。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單實例 Redis `SET NX PX` | 高效能、近似互斥（efficiency lock） | 偶爾重複做也只是浪費、不會錯（去重器、避免重複寄信） | 單點故障；TTL 裂縫仍在；不提供 fencing token |\n| Redlock（多數決） | 容忍少數 Redis 掛掉 | 想去單點但仍是 efficiency 用途 | Martin Kleppmann 2016 指出：仍假設有界的網路延遲、行程暫停與時鐘誤差，三者皆可能被現實打破，且**不產生 fencing token**；不適合「正確性依賴鎖」 |\n| ZooKeeper / etcd lease | 線性化、session 斷即釋放、內建單調版本號 | 正確性關鍵（leader 唯一性、單一寫入者） | 比 Redis 重、延遲高；仍需把版本號當 fencing token 帶到資源端才完整 |\n| fencing token（疊加在任一鎖上） | 把互斥落實到資源端，堵住 TTL 裂縫 | 任何「兩個持有者同時寫會出錯」的場景 | 資源端必須能拒絕舊 token（要可改寫、有條件寫入能力）；只發 token 而資源不檢查＝沒用 |\n\n關鍵分界是 Kleppmann 的「efficiency vs correctness」：若鎖只是**最佳化**（避免重複工作，偶爾兩個人同時做不會壞資料），單實例 Redis 鎖足夠；若鎖關係到**正確性**（同時兩個寫入者就會損壞資料），就**必須**有 fencing token，且光有鎖服務不夠——資源端要驗 token。\n\n### 何時需要\n\n需要分散式鎖的真實場景比直覺少。先問三題：(1) 臨界資源能不能自己做條件寫入？能就用 CAS / 樂觀並發（領域 B），不需要鎖。(2) 能不能把同一實體的操作路由到單一節點/單一 partition 序列化？能就用分區（領域 A），天然互斥。(3) 偶爾重複執行會不會壞？不會壞就用便宜的 efficiency lock，會壞就上 fencing token。只有在「資源無法條件寫入、又無法分區、且重複會損壞」三者皆中時，才真正需要帶 fencing token 的強分散式鎖。把分散式鎖當成第一選擇，通常是 over-engineering，且引入一個新的可用性瓶頸。\n\n### 常見誤解與陷阱\n\n- **以為拿到鎖就安全**：TTL 裂縫讓「持有鎖」永遠只是「直到某個時間點之前大概持有」。沒有 fencing token，再貴的鎖服務都救不了 GC 暫停 + 過期續發。\n- **Redlock 的時鐘假設**：Redlock 的多數決安全性依賴各節點的時鐘以接近的速率前進；若某節點時鐘跳變（NTP 校正、VM 遷移），鎖可能提早過期或重複發放。\n- **TTL 設太短**：為了快速釋放把 TTL 設成幾秒，結果正常 GC 或慢查詢就讓鎖過期，臨界區內的人變成「無照駕駛」。TTL 要大於臨界操作的合理最壞耗時，但越大、崩潰後卡死越久——這是個取捨，不是有最佳值。\n- **解鎖刪到別人的鎖**：A 過期、B 拿到，A 醒來直接 `DEL key` 把 B 的鎖刪了。解鎖必須「比對自己的唯一值再刪」（Lua 原子腳本），不能無條件刪。\n- **冪等定義不在這裡重講**：分散式鎖常被誤當成「保證只執行一次」的手段，但鎖會過期、會重複發；真正的「重複也不出錯」要靠冪等（見冪等，領域 A），鎖只降低重複機率、不消除。\n\n### 延伸閱讀\n\n- Martin Kleppmann, \"How to do distributed locking\"（Redlock 批評與 fencing token 的經典論述）：https://martin.kleppmann.com/2016/02/08/how-to-do-distributed-locking.html\n- Redis 官方分散式鎖文件（Redlock 演算法描述）：https://redis.io/docs/latest/develop/clients/patterns/distributed-locks/\n- ZooKeeper Recipes — Locks（順序節點實作鎖）：https://zookeeper.apache.org/doc/current/recipes.html#sc_recipes_Locks\n\n## 邏輯時鐘與排序（Lamport / vector / HLC / TrueTime）\n\n### 定義與原理\n\n分散式系統裡沒有可信的全域時間：每台機器的牆鐘（wall clock）各走各的，NTP 校正會讓時鐘**往回跳**，跨機房的時鐘誤差可達數十毫秒。所以你**不能用 `timestamp` 比大小來判斷兩個事件的先後**——這是分散式系統最常見的隱性 bug 來源。\n\nLeslie Lamport 在 1978 年的論文〈Time, Clocks, and the Ordering of Events in a Distributed System〉（CACM 21(7):558–565，2000 年獲 Dijkstra 獎）給出第一原理：我們真正需要的不是「絕對時間」，而是**因果順序**（causality）——事件 a「happens-before」事件 b（記作 a → b），當且僅當：a、b 在同一行程且 a 在前；或 a 是送訊息、b 是收該訊息；或有傳遞鏈 a → c → b。沒有 happens-before 關係的兩事件是**並行的**（concurrent），它們之間沒有客觀的先後，硬要排序只能靠人為規則打破平手。邏輯時鐘就是用計數器來捕捉這個偏序，而非依賴會騙人的牆鐘。\n\n### 解法空間\n\n- **Lamport timestamp（純量邏輯時鐘）**：每個行程一個整數計數器 C。本地事件 C++；送訊息附帶 C；收訊息時 `C = max(C_local, C_msg) + 1`。保證：若 a → b 則 `C(a) < C(b)`。但**反向不成立**——`C(a) < C(b)` 不代表 a → b，可能只是並行。配上行程 ID 當 tie-breaker 可得全
