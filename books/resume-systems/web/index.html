<style>
:root{ --fs:18px; --lh:1.95; --ls:0.02em; --ps:1.0; --pw:52; }
/* Monospace CJK=2-columns fix: CJK runs inside <pre> are wrapped in .cjkw
   spans at render time (see wrapCJK) and scaled so a fullwidth PingFang glyph
   is exactly 2x Menlo's advance (2 x 0.60205em -> 120.41%). Done with spans
   instead of @font-face size-adjust because WebKit ignores size-adjust on
   local() sources. Assumes Apple platform fonts. */
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif}
/* themes */
body[data-theme="paper"]{--bg:#f7f2e9;--fg:#2f2b24;--muted:#8d8474;--border:#e2d9c6;--codebg:#efe8d7;--link:#a05a17;--accent:#b06a1e;--side:#f0e9d8;--sideactive:#e4d9bf}
body[data-theme="light"]{--bg:#ffffff;--fg:#24292f;--muted:#6e7781;--border:#e8eaed;--codebg:#f5f7f9;--link:#0a69c2;--accent:#0a69c2;--side:#f7f8fa;--sideactive:#e9edf2}
body[data-theme="sepia"]{--bg:#f4ecd8;--fg:#52432e;--muted:#9b8a6d;--border:#dfd2b3;--codebg:#ebdfc3;--link:#985a1f;--accent:#985a1f;--side:#eee2c8;--sideactive:#e2d3ae}
body[data-theme="dark"]{--bg:#22262c;--fg:#c4ccd4;--muted:#828d99;--border:#3a424b;--codebg:#2b323a;--link:#7ab8f5;--accent:#7ab8f5;--side:#1d2126;--sideactive:#2e353d}
body{background:var(--bg);color:var(--fg)}
a{color:var(--link)}
/* layout */
#layout{display:flex;height:100%}
#sidebar{width:288px;min-width:288px;background:var(--side);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0 40px;transition:transform .2s}
#main{flex:1;overflow-y:auto;position:relative;scroll-behavior:auto}
#sidebar .brand{font-weight:700;font-size:15px;padding:6px 18px 12px;line-height:1.5}
#sidebar .grp{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.05em;padding:14px 18px 4px}
#sidebar a.ch{display:block;padding:6px 18px;font-size:13.5px;line-height:1.5;color:var(--fg);text-decoration:none;border-left:3px solid transparent}
#sidebar a.ch:hover{background:var(--sideactive)}
#sidebar a.ch.active{background:var(--sideactive);border-left-color:var(--accent);font-weight:600}
#sidebar .allbtn{margin:16px 18px 0;display:block;text-align:center;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--fg);text-decoration:none;background:var(--bg)}
#topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border)}
#topbar .ttl{flex:1;font-size:13.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:8px;padding:6px 11px;font-size:14px;line-height:1}
.btn:hover{background:var(--codebg)}
a.btn{text-decoration:none;display:inline-block;white-space:nowrap}
#hamburger{display:none}
/* prose */
.prose{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:2.4rem 1.7rem 3rem;font-size:var(--fs);line-height:var(--lh);letter-spacing:var(--ls)}
body[data-font="sans"] .prose{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif}
body[data-font="serif"] .prose{font-family:"Songti TC","Noto Serif TC",Georgia,"PMingLiU",serif}
.prose p{margin:calc(var(--ps)*1em) 0}
.prose h1{font-size:1.5em;line-height:1.45;margin:.2em 0 .9em}
.prose h2{font-size:1.3em;line-height:1.45;margin:2em 0 .8em;padding-bottom:.35em;border-bottom:1px solid var(--border)}
.prose h3{font-size:1.13em;margin:1.7em 0 .6em}
.prose h4{font-size:1.02em;margin:1.4em 0 .5em}
.prose li{margin:.45em 0}
.prose ul,.prose ol{padding-left:1.6em}
.prose blockquote{margin:1.3em 0;padding:.7em 1.2em;border-left:4px solid var(--accent);background:var(--codebg);border-radius:0 8px 8px 0}
.prose blockquote p{margin:.5em 0}
.prose hr{border:none;border-top:1px solid var(--border);margin:2.4em 0}
.prose img{max-width:100%}
.prose pre{background:var(--codebg);border:1px solid var(--border);border-radius:8px;padding:.9em 1.1em;overflow-x:auto;font-size:.84em;line-height:1.6;letter-spacing:0;font-family:Menlo,ui-monospace,monospace}
.prose pre code{background:none;padding:0;border:none;font-size:1em}
.prose pre .cjkw{font-family:"PingFang TC","PingFangTC-Regular","PingFang SC","Noto Sans TC",sans-serif;font-size:120.41%;line-height:0;letter-spacing:0}
.prose code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"PingFang TC",monospace;background:var(--codebg);border:1px solid var(--border);border-radius:5px;padding:.08em .35em;font-size:.86em;letter-spacing:0}
.prose table{border-collapse:collapse;display:block;overflow-x:auto;margin:1.3em 0;font-size:.9em;line-height:1.65;letter-spacing:0}
.prose th,.prose td{border:1px solid var(--border);padding:.5em .75em;text-align:left;vertical-align:top}
.prose th{background:var(--codebg);white-space:nowrap}
#pager{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:0 1.7rem 5rem;display:flex;gap:12px;justify-content:space-between}
#pager .btn{flex:1;text-align:center;padding:13px;font-size:14px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* settings panel */
#panel{position:fixed;top:0;right:0;height:100%;width:300px;background:var(--side);border-left:1px solid var(--border);z-index:20;padding:18px 20px 40px;overflow-y:auto;transform:translateX(105%);transition:transform .2s;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
#panel.open{transform:none}
#panel h3{margin:4px 0 14px;font-size:16px}
#panel .row{margin:0 0 16px}
#panel label{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px}
#panel input[type=range]{width:100%}
#panel .seg{display:flex;gap:6px;flex-wrap:wrap}
#panel .seg .btn{flex:1;min-width:56px;text-align:center;font-size:13px}
#panel .seg .btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9;display:none}
#backdrop.show{display:block}
@media (max-width:880px){
  #sidebar{position:fixed;left:0;top:0;height:100%;z-index:15;transform:translateX(-102%)}
  #sidebar.open{transform:none;box-shadow:6px 0 24px rgba(0,0,0,.15)}
  #hamburger{display:inline-block}
  .prose{padding:1.6rem 1.1rem 2.5rem}
}
</style>

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "保證與取捨——後端與分散式系統的概念地圖", "md": "# 保證與取捨——後端與分散式系統的概念地圖\n\n這不是一本教你「某個工具怎麼用」的書，而是一張**概念地圖**：對後端與分散式系統裡反覆出現的每一個老問題，把「有哪些解法、各自給什麼**保證**、各自要付什麼**取捨**、什麼時候才需要這種保證」攤開成一整張選項地圖。\n\n讀完一個條目，你腦中要有的不是單一答案，而是**這個問題的整張選項空間與取捨軸**。\n\n## 這本書的脊椎：保證與取捨\n\n書名就是脊椎。每一個概念底下，問的都是同一件事：\n\n> **你想要什麼保證（guarantee）？你願意付什麼代價（trade-off）？**\n\nat-least-once 保證「不漏」，代價是「可能重複」；快取保證「快」，代價是「可能讀到舊值」；共識保證「大家同意同一個值」，代價是「多一輪往返、少數派要等」。整本書就是在各種題目上反覆做這道選擇題。\n\n## 寫給誰\n\n寫給**一般資深後端／軟體工程師**。預設你會寫程式、熟悉 HTTP／資料庫／並發／雲端的工作級使用——所以本書不從零解釋這些是什麼，而是直接切進「機制、取捨、陷阱」這一層：你會用、但未必有系統化想過底層與選項空間的那一層。\n\n語氣是工程師對工程師、平視、有觀點。不打高空、不喊口號。\n\n## 兩副閱讀透鏡（先讀 Part 0）\n\nPart 0 的兩個領域刻意放最前面，是讀後面每一條技術概念時要一直戴著的眼鏡：\n\n- **U（工程判斷與決策）**：我會怎麼**判斷／選**這個東西？可逆嗎、自建還是採用、是不是過度工程、退場成本多高。\n- **T（工程實踐與團隊推動）**：我會怎麼讓**團隊採用**它？誘因、轉換成本、鋪路、自動化強制、漸進遷移。\n\n兩副透鏡都各自融入了「與 AI 協作」這個維度——但只談**原理層**（什麼交給 AI、怎麼設驗收與信任邊界、帶來哪些新故障模式），不綁任何工具版本或品牌，因為那一層腐得最快。\n\n## 怎麼組織的\n\n約 150 個概念，分成 22 個領域（以字母 A–V 標記），收進 8 個 Part：\n\n| Part | 主題 | 領域 |\n|---|---|---|\n| 0 | 透鏡：怎麼判斷、怎麼推動 | T 實踐推動、U 判斷決策 |\n| 1 | 訊息、交付與整合 | A 訊息交付與佇列 |\n| 2 | 資料、一致性與儲存 | B 一致性與交易、O 儲存引擎、G 快取、L 資料同步 |\n| 3 | 連線、網路與 API | N 網路協定、C 即時傳輸、H API 與閘道、F 身分與存取 |\n| 4 | 並發、過載與韌性 | D 並發模型、E 過載控制、P 韌性容錯、S 效能延遲 |\n| 5 | 分散式系統核心 | M 共識、複製、協調、時間 |\n| 6 | 架構、雲端與發布 | K 解耦、J 雲端原語、Q 部署發布 |\n| 7 | 觀測與營運文化 | I 可觀測性與品質、V 營運與事故文化 |\n\n每個領域是側欄裡的一組檔；大領域（A、B、M、I、T）切成數檔，但同屬一個字母。\n\n## 每個條目回答什麼\n\n兩種條目，各有固定的六段骨架：\n\n- **問題型**（一個老問題）：定義與原理 → 解法空間（不只一種辦法）→ 各方案的保證與取捨（對照表）→ 何時需要 → 常見誤解與陷阱 → 延伸閱讀。\n- **工具型**（一個具體工具）：是什麼與內部機制 → 在哪些系統扮演什麼角色 → 保證與限制 → 跟替代品的取捨 → 常見誤解與陷阱 → 延伸閱讀。\n\n招牌是**對照表**：方案 × 保證 × 注意事項。沒有「注意事項」那一欄的對照表是危險品——它會讓你以為某個選項沒有代價。\n\n## 怎麼讀\n\n- **先把 Part 0（T／U）讀過**，戴上兩副眼鏡。\n- 之後可以**從任何一個 Part 切入**——每個條目自足，需要鄰近概念時用「（見 <概念名>，領域 X）」帶你過去。\n- 想查某個保證怎麼選，翻**附錄 A（保證速查表）**；查名詞翻**附錄 B（術語表）**；想往外讀翻**附錄 C（延伸閱讀總地圖）**。\n\n## 這本書不做的事\n\n- **不含練習**。它是參考書，不是習題本。\n- **不綁特定系統或公司**。所有案例都是通用情境。\n- **自足，但會往外指**：需要的深度本書講到夠；延伸閱讀只放外部真實連結（RFC／論文／官方文件），不外包給別的讀物。\n- **時效性事實標時點（2026-06）**。版本、授權、產品狀態這類會過期的事，都標了日期、查證了來源——但讀到時，請當它是「截至那個時點」的快照。\n"}, {"id": "T1-driving-adoption", "file": "T1-driving-adoption.md", "group": "Part 0 — 透鏡：怎麼判斷、怎麼推動", "title": "T · 工程實踐與團隊推動（上）", "md": "# T · 工程實踐與團隊推動（上）\n\n這個領域回答的不是「哪個技術對」，而是「**怎麼讓一群人真的去用對的東西**」——一個慣例、一個工具、一條流程，技術上再正確，沒人採用就等於不存在。本檔含五個條目：推動採用的機制、RFC／設計文件流程、鋪路（paved road）、慣例的自動化強制、漸進式遷移與淘汰。它們共用同一條脊椎：你想要什麼保證（整個團隊照某個方式做事），你願意付什麼取捨（強制換來服從卻磨掉信任、鋪路換來自願採用卻得先養路）。與相鄰領域 U 的邊界一句話：**T＝決定要推某個東西之後，怎麼讓團隊採用它；U＝在那之前，怎麼判斷該不該採用它**（建 vs 買、簡單性、退場成本都在 U）。\n\n## 推動工具/慣例的採用\n\n### 定義與原理\n\n「推動採用」要解的問題是：你（或一個小組）認為某個做法更好——換個 lint 規則、換個部署流程、換個 RPC 框架——但**團隊不會因為它「更好」就自動採用**。採用是一個行為改變問題，不是技術問題。第一原理有三條：\n\n- **誘因（incentive）**：人會走對自己當下最有利的路。如果新做法讓「我這週的工作」更難交付，再好的長期理由都推不動。\n- **轉換成本（switching cost）**：從舊習慣到新習慣之間，有一段「比現在更痛、但還沒拿到好處」的低谷。採用會不會發生，常常取決於這段低谷有多深、有沒有人幫忙填。\n- **信任（trust）**：團隊願不願意賭你的判斷。信任是存量——它由過去推過的東西「後來證明是對的」累積而來，也會因為推過、然後爛尾、然後沒人收拾而被一次燒光。\n\n把這三條合起來看：**採用的真正阻力不是「新東西不好」，而是「轉換成本由採用者付、好處卻歸於系統或未來」這個錯位**。推動的本質，就是想辦法把這個錯位補平——降低轉換成本、或把好處提前兌現給採用者、或用信任去借支那段低谷。\n\n### 解法空間\n\n讓團隊採用一個做法，大致有三種路線，外加一組通用槓桿：\n\n- **Top-down（由上而下強制）**：管理層／架構組宣布「從某日起一律用 X」。機制：用權威壓過個人誘因。\n- **Bottom-up（由下而上自然擴散）**：先在一兩個團隊做出明顯有效的範例，靠口碑與模仿擴散。機制：讓誘因自己對齊（別人看到你用 X 交付更快，自己跑來問）。\n- **鋪路（paved road，讓對的做法＝最省力的路）**：不強制、也不純靠口碑，而是**主動把「照建議做」的那條路修到比任何其他路都好走**——文件、模板、預設設定、現成工具一次給足（這條獨立成一個條目，見 鋪路 paved road／golden path）。\n- **通用槓桿**（可疊加在上面任一路線）：\n  - **降轉換成本**：提供 codemod／自動遷移腳本、相容層、遷移期雙寫，讓採用者不用手動重寫（見 漸進式遷移與淘汰）。\n  - **提前兌現好處**：讓採用者第一天就拿到看得見的甜頭（更快的 build、更少的 oncall、自動產生的樣板碼）。\n  - **借信任**：找一個團隊信得過的同儕當早期採用者，讓「他用了說好」替你背書。\n  - **設淘汰時程＋自動護欄**：宣布舊做法的退役日期，並用 CI gate 擋住新增的舊用法，避免「新人不知道、繼續用舊的」（見 慣例的自動化強制）。\n\n> **AI 在這件事能做什麼、又帶來什麼新陷阱（原理層）**：AI 把「降轉換成本」這個槓桿變便宜了——過去要派人手寫的遷移腳本／codemod、把上千個呼叫點從舊 API 改到新 API，現在可以委派給 AI 大批生成，採用低谷被填平。但它也帶來一個新陷阱：**AI 能讓「採用」這個動作的成本趨近於零，於是團隊可能在還沒真正理解新做法之前就「被遷移完了」**——程式碼換成了新樣式，沒人說得清為什麼。推動者要把驗收（誰看懂、誰簽字）當成 review gate，而不是把「AI 改完、CI 綠了」當成採用成功（信任邊界的細節見領域 T 的 AI 協作條目）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Top-down 強制 | 一致性最強、最快達到「全員照做」 | 安全／合規／不可逆的單向決策（如棄用有漏洞的依賴）；組織小或權威清楚時 | 服從不等於認同；強推沒共識的東西會累積「合規但消極」的怨氣，下次更難推。**強制必須配自動化護欄**，否則人前照做、人後繞過 |\n| Bottom-up 擴散 | 採用者是自願的、認同度高、阻力小 | 做法好壞「用了就看得出來」、有耐心等擴散時 | 慢，且可能擴散不完全（剩下的角落永遠不改）；缺乏「臨門一腳」會卡在 60% |\n| 鋪路 paved road | 不靠強制就讓多數人走對路；可疊加少量強制收尾 | 中大型組織、有平台／工具團隊可以維護那條路時 | 路要持續養護，沒人維護的「曾經的最佳路」會比沒鋪更糟（人被引到一條已經壞掉的路上） |\n| 派早期採用者借信任 | 用同儕背書突破「我憑什麼信你」 | 信任存量不足、或你是新加入的人 | 選錯背書人（大家不服的人）會反效果 |\n| 設退役日期＋CI 擋舊用法 | 防止「採用」隨時間回滲倒退 | 任何想長期維持的慣例 | 退役日期若一再跳票，會訓練團隊「公告不必當真」 |\n\n一個具體推演：**一個三人小團隊**要把「所有 PR 都加 commit message 規範」這件事推起來。Top-down 在三人團隊幾乎零成本——口頭講一句就到位，甚至不必寫文件。但同一件事換到**一個 50 人的工程組織**，口頭宣布會在第三個團隊就失真：有人沒聽到、有人聽到不認同、有人認同但忘了。這時純 top-down 會退化成「上面說了、下面各做各的」，必須改成「鋪路（給 commit template 與範例）＋自動化強制（commit-lint 擋不合規的 PR）＋一個受信任團隊先示範」三者疊加，才推得動。**團隊規模一變，能用的路線就變**——這是這個條目最核心的判準。\n\n### 何時需要\n\n- **需要刻意推動**：當「轉換成本由採用者付、好處歸於系統／未來」這個錯位明顯存在時（換框架、改流程、加約束）。錯位越大，越要主動補槓桿，不能指望自然發生。\n- **不需要、甚至是 over-engineering**：當新做法對採用者「當下就更省力」時——這種東西會自己擴散，你硬搞一套推動計畫反而顯得官僚。也包括只影響一兩個人的內部偏好（用什麼編輯器），那不該被「推動」成全員慣例。\n- **判準**：先問「採用者第一週是更痛還是更爽？」更爽的，鋪好路放著就好；更痛的，才需要算轉換成本、找信任、設護欄。\n\n### 常見誤解與陷阱\n\n- **「東西夠好就會自己被採用」**：最常見的誤解。好處歸於未來、痛苦歸於現在的東西，從不自己擴散。\n- **把「強制」當「採用」**：CI 綠了、文件寫了、會開了，不等於團隊真的改了行為。沒有自動化護欄的強制，會在你不看的角落悄悄回退（見 慣例的自動化強制）。\n- **一次推太多**：同時改五件事，團隊的轉換成本預算會爆，結果一件都沒落地。一次推一件、落地了再推下一件。\n- **燒掉信任不補**：推一個東西、做到一半棄坑、留下半套爛攤子給別人收——信任是存量，這樣燒一次，下次你說「這次真的更好」就沒人信了。\n- **忽略「最後 20%」**：bottom-up 擴散最容易卡在「大部分團隊改了、剩幾個死角永遠不改」。沒有退役日期＋護欄收尾，這 20% 會讓你永遠維護兩套。\n- **AI 相關的新陷阱**：用 AI 大批改寫來「強推」採用時，很容易製造出**沒人理解的合規**——表面上全員都用了新樣式，實際上沒人能在出事時說清楚它為什麼這樣寫。把 AI 當降成本的工具沒問題，但別把「改完了」當「採用了」，採用的標準永遠包含「有人理解並能維護」。\n\n### 延伸閱讀\n\n- Martin Fowler, *bliki: Strangler Fig Application* — 漸進替換而非一次切換的思維底層：<https://martinfowler.com/bliki/StranglerFigApplication.html>\n- *Software Engineering at Google*（abseil.io），尤其文化與流程章節談大型組織如何讓慣例落地：<https://abseil.io/resources/swe-book/>\n- Spotify Engineering, *How We Improved Developer Productivity for Our DevOps Teams*（Golden Path 的原始脈絡）：<https://engineering.atspotify.com/2020/08/how-we-use-golden-paths-to-solve-fragmentation-in-our-software-ecosystem/>\n\n## RFC／設計文件流程\n\n### 定義與原理\n\nRFC（Request for Comments）／設計文件流程，是把「一個有實質後果的技術決定」在**動手寫程式之前**寫成文件、公開徵求意見、留下決議的一套慣例。它解的問題是：**重要決定如果只活在某個人的腦子裡或某次走廊對話裡，就沒有可審查、可追溯、可挑戰的載體**——三個月後沒人記得為什麼這樣決定，半年後有人想改卻不知道當初放棄了哪些選項、為什麼放棄。\n\n第一原理是把決策的**頻寬**從「同步、即時、少數人在場」拉成「**非同步、可留存、所有相關方都能參與**」。寫文件這個動作本身有副作用：把一個模糊的想法逼成精確的文字，常常在寫的過程中就自己發現了漏洞——這是 RFC 最被低估的價值，**很多 RFC 的好處在「寫」的時候就兌現了，不在「被批准」**。\n\n要和它的近親分清楚：RFC／設計文件是**決策前**的提案與討論載體（多個選項、還在收意見）；ADR 是**決策後**的精簡紀錄（一個決定、它的脈絡與後果，見 架構決策紀錄 ADR，領域 T）。一份 RFC 最後常常濃縮出一條 ADR。\n\n### 解法空間\n\n「讓重要決定被記錄與審查」有一道輕重光譜，從幾乎零儀式到重流程：\n\n- **走廊對話 / 口頭共識**：最輕，零留存。機制：靠在場者記憶。\n- **PR 描述 / issue 討論**：把設計寫在程式碼提交的脈絡裡。機制：決策貼著程式碼，但分散、難回溯整體決定。\n- **輕量 RFC（一頁設計文件）**：固定模板（問題／提案／替代方案／取捨／決議），開一個可評論的文件，設一個截止日期收斂。機制：非同步徵求意見＋留存。\n- **重量 RFC（正式評審會 + 簽核）**：加上指定 reviewer、必經評審會、明確的 approve/reject 狀態。機制：用流程強制「重要決定必須被多方看過」。\n- **ADR-only**：跳過提案討論，只在決定後補一條精簡紀錄。機制：最省力的留存，但失去「決策前公開徵意見」的好處。\n\n> **AI 在這件事能做什麼、又帶來什麼新陷阱（原理層）**：AI 可以把寫 RFC 的門檻降低——草擬初稿、補齊「替代方案」一節、把口語想法整理成結構化文件，讓「寫文件太花時間所以不寫」這個藉口消失。新陷阱是：AI 草擬的 RFC 讀起來**結構完整、論證流暢，但可能掩蓋了作者其實還沒想清楚的地方**——以前一份寫得吃力的 RFC 會暴露作者的思考缺口，AI 順稿後缺口被填平了表面文字、卻沒被真正解決。Reviewer 的審查重點要從「文字是否清楚」上移到「**作者是否真的理解自己提的方案**」（這正是 RFC「寫的時候就兌現價值」那部分，被 AI 順稿削弱了）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 走廊對話 | 零成本、最快 | 可逆、影響小、改回來代價低的決定（two-way door，見領域 U） | 零留存；三個月後無人能重建「為什麼」；無法讓不在場的人參與 |\n| PR / issue 討論 | 決策貼著程式碼、自然留存 | 範圍小、實作即決策的改動 | 整體設計散落各 PR，難看見全貌；大決定塞進 PR 描述沒人會回頭讀 |\n| 輕量 RFC | 逼出精確思考＋非同步收意見＋留存，儀式適中 | 多數「值得想清楚但不必開會」的決定：新服務邊界、跨團隊介面、選型理由 | 需要有人主動收斂（設截止日期），否則文件變成永遠開放、永遠不結案的鬼魂 |\n| 重量 RFC + 評審 | 一致性與把關最強，重大決定一定被多方看過 | 不可逆、跨多團隊、高成本的單向決策（換資料庫、定公司級協定） | 流程重、慢；濫用在小決定上會變成人人怕碰的官僚稅，逼大家退回走廊偷偷決定 |\n| ADR-only | 留存成本最低 | 決定已成、只需記錄結論與後果 | 失去決策前公開徵意見的機會；容易變成「事後諸葛的單方宣告」 |\n\n一個具體推演：**一個 50 人的工程組織**第一次導入 RFC 流程。最常見的失敗是「一步到位上重量流程」——要求每個技術決定都走指定 reviewer、評審會、簽核。結果是：小決定也被逼進流程，工程師覺得「光走流程比做事還久」，於是把真正的決定退回走廊、只把無關痛癢的東西寫成 RFC 應付，流程變成空轉的儀式。比較穩的做法是反過來：**先只要求「會影響其他團隊的決定」寫一頁輕量 RFC、設 72 小時評論窗、無異議即生效**，把儀式壓到最低、先讓人嘗到「寫下來後討論變清楚了」的甜頭，再視需要對「不可逆的大決定」加重流程。流程的重量要對齊**決定的可逆性**（見領域 U），不是一刀切。\n\n### 何時需要\n\n- **需要寫 RFC**：決定不可逆或退場成本高、影響跨越單一團隊、或「之後一定有人會問為什麼」時。可逆性越低、波及面越廣，越值得把它寫下來公開審。\n- **不需要、是 over-engineering**：可逆、影響只在自己團隊、改回來幾乎零成本的決定。給這種決定套 RFC 是在繳官僚稅，還會稀釋大家對 RFC 的重視（「連這個都要寫，那 RFC 不值錢」）。\n- **判準**：問「這個決定錯了，要回頭的代價多大？多少人會被它影響？半年後有人會不會問為什麼？」三個有一個重，就值得一頁 RFC。\n\n### 常見誤解與陷阱\n\n- **把 RFC 當審批關卡而非思考工具**：一旦團隊覺得 RFC 是「上面卡我」的關卡，就會退化成事後補件——先做完、再補一份漂亮文件走過場。RFC 的核心價值在動手前逼出思考，補件等於把價值全丟了。\n- **替代方案一節造假**：很多 RFC 的「Alternatives Considered」是寫完決定後硬湊兩個明顯更差的選項來陪襯。真正有用的替代方案分析是誠實列出「這個其實也行、我們因為某個具體取捨才不選」。\n- **永不結案**：開了文件、收了一堆評論、然後沒人按「決議」按鈕。懸而未決的 RFC 比沒有更糟——它讓大家以為「還在討論」而不敢動。每份 RFC 必須有 owner 與截止日期。\n- **流程重到逼人繞過**：見上面 50 人組織的推演——過重的流程會把真正的決策趕回走廊，你只會看到應付用的 RFC。\n- **AI 相關的新陷阱**：AI 順稿讓 RFC 表面完整度上升、但可能掩蓋作者的理解缺口。Reviewer 要小心「讀起來很順所以一定想清楚了」的錯覺，刻意去問文件沒明說的邊界與失敗模式，逼出作者真正的理解程度。\n\n### 延伸閱讀\n\n- *Software Engineering at Google* — Documentation 與 Leading at Scale 章節談設計文件如何在大型組織運作：<https://abseil.io/resources/swe-book/>\n- Oxide Computer, *RFD（Requests for Discussion）Process*（一套公開、可參考的工程 RFC 流程實作）：<https://rfd.shared.oxide.computer/rfd/0001>\n- IETF *RFC 7282, On Consensus and Humming in the IETF*（「徵求意見」這個傳統的源頭與「粗略共識」的判準）：<https://www.rfc-editor.org/rfc/rfc7282>\n\n## 鋪路 paved road／golden path\n\n### 定義與原理\n\n鋪路（Netflix 的講法「paved road」／Spotify 的講法「golden path」）解的問題是：**在一個你不能、也不想對所有人下命令的組織裡，怎麼讓多數人自願走在對的做法上？** 答案是不靠強制，而是**把「照建議做」那條路修到比任何其他選擇都明顯省力**——一條 paved road 上鋪好了模板、預設設定、現成的 CI/CD、監控、log、權限樣板，新人沿著它走，幾分鐘就生出一個符合所有最佳實踐的服務；偏離它則要自己處理一堆瑣事。\n\n第一原理：**人會走阻力最小的路**。強制是逆著這個天性硬掰（成本高、會反彈、要持續看守）；鋪路是順著它——你不禁止別人走野路，但你讓「對的路」變成阻力最小的那條，於是多數人自己就走上去了。它和強制的根本差異在於**自願 vs 服從**：鋪路換來的是高認同的自願採用，代價是你得先把路修好、而且持續養護。它常和少量強制收尾搭配（多數人靠鋪路自願上路，剩下死角用 CI gate 收口）。\n\n「paved road」與「golden path」在 2026-06 業界基本同義、可互換；前者強調「鋪好的、有支援的路」，後者強調「那條被祝福的、推薦的路徑」（2026-06）。\n\n### 解法空間\n\n把「對的做法」變成「最省力的路」，可動的零件有：\n\n- **腳手架／模板（scaffolding）**：一鍵生成一個新服務，CI/CD、Dockerfile、健康檢查、log 格式、監控接線全部預先配好。機制：把正確的起點變成預設起點。\n- **預設即正確（secure/correct by default）**：團隊共用的 base library／base image 裡，把超時、重試、結構化 log、認證中介層設成預設值。機制：採用者什麼都不做就已經合規。\n- **自助平台（internal developer platform）**：把「開一個資料庫／佇列／環境」做成自助按鈕，背後自動套好最佳設定。機制：消除「找人開、等審批」的摩擦。\n- **黃金路徑文件（golden path docs）**：不是寫「所有可能性」，而是寫「**就照這條做**」的單一推薦路徑，附可複製貼上的範例。機制：消除選擇焦慮（quell rumor-driven development）。\n- **少量強制收尾**：對偏離鋪路的用法用 CI gate／policy 擋住（見 慣例的自動化強制）。機制：補上純鋪路收不掉的死角。\n\n> **AI 在這件事的影響（原理層）**：鋪路的核心是「降低照建議做的阻力」，而 AI 改變了阻力的來源——當生成樣板碼變得幾乎免費，「省下手寫樣板」這個傳統甜頭就不再稀有，鋪路的價值要上移到 AI 不便宜替代的部分：**被祝福的預設設定（哪個超時、哪個重試策略是對的）、被驗證過的整合方式、出事時有人支援**。新陷阱：AI 會樂於沿著任何路徑生成程式碼，包括野路——它不知道你的 paved road 在哪。若團隊的推薦做法沒有被寫成 AI 讀得到、用得上的形式（範例、模板、明確規則），AI 反而會成為「把人帶離鋪路」的力量，因為它總能順手生出一個能跑的非標準寫法。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 腳手架／模板 | 新專案起點即合規，採用幾乎零摩擦 | 重複建同類服務／元件的組織 | 模板會腐——它凍結了「生成當天」的最佳實踐，沒人更新就把過時做法批量複製出去 |\n| 預設即正確 | 採用者什麼都不做就合規，覆蓋面最廣 | 有共用 base lib／base image 的團隊 | base 一改影響所有人，升級要有相容策略；藏太多魔法會讓人不懂底層、出事查不動 |\n| 自助平台 | 消除審批／等待摩擦，採用最順 | 中大型、有平台團隊可維護時 | 平台本身是要養的產品，沒人維護的自助平台會變成新的瓶頸 |\n| 黃金路徑文件 | 最低成本，消除「該怎麼做」的選擇焦慮 | 任何規模，先寫一條推薦路徑 | 文件會過時；要綁定到實際模板／預設，否則文件說一套、模板做一套 |\n| 鋪路＋少量強制收尾 | 多數自願上路、死角被收口 | 想長期維持一致性時 | 別把比例搞反——強制太多就退化成 top-down，失去鋪路的自願性 |\n\n一個具體推演：**一個平台團隊**想統一公司「新建微服務」的做法。對照兩條路。**純強制**：發一份「微服務規範」文件，要求所有新服務照做，靠 code review 把關。結果是規範文件越寫越長、沒人讀完，每個團隊照自己的理解做出八個不一樣的「合規」服務，review 變成無止境的糾正。**鋪路**：做一個 `create-service` 腳手架，跑一行指令就生出一個已經配好 CI/CD、健康檢查、結構化 log、預設超時與重試、權限樣板的新服務骨架。工程師發現「照鋪路做」比「自己從零搭、還要查規範」省下一整天，於是自願都用它——一致性是順手得到的副產品，不是靠 review 硬掰出來的。差別在於：強制是把成本加在「不照做」上，鋪路是把好處加在「照做」上；後者順著人性、前者逆著。**但鋪路有它的硬成本**：那個腳手架是一個要持續維護的產品，最佳實踐變了要同步更新，否則它會變成「把過時做法一鍵複製到全公司」的反向放大器——這是純強制沒有的負擔。\n\n### 何時需要\n\n- **需要鋪路**：同一類事情被很多人重複做（建服務、開環境、接監控）、組織大到無法靠口頭傳遞、而你有（或能爭取到）持續維護那條路的人力時。重複度越高、組織越大，鋪路的投報率越高。\n- **不需要、是 over-engineering**：那件事一年只做兩次、或團隊小到一句話就能傳遞共識。為了「只有三個人、一年建一個服務」的場景去搭一套腳手架＋自助平台，是把維護負擔變成比問題本身還大的新問題。\n- **判準**：問「這條路會被走幾次？有沒有人能養它？」走的次數攤不平養護成本，就先別鋪、用一頁黃金路徑文件頂著。\n\n### 常見誤解與陷阱\n\n- **鋪了路卻不養**：最致命的陷阱。一條曾經是最佳實踐、現在已經過時或會壞的 paved road，比沒有鋪路更糟——你**主動**把所有人引導到一條壞掉的路上，而且因為它是「官方推薦」，出事時大家還以為自己沒做錯。鋪路是承諾持續維護，不是一次性發布。\n- **把鋪路當強制的同義詞**：鋪路的力量在自願。一旦你開始用「不准走別條路」來補鋪路的不足，比例一過就退化成 top-down，失去了高認同這個最大好處。鋪路＋少量強制收尾可以，但主體必須是「對的路最好走」。\n- **文件與實作脫節**：黃金路徑文件寫一套、實際模板做另一套。人會跟著實際能跑的東西走，不是跟著文件——文件必須綁定可執行的模板／預設，否則文件先死。\n- **腳手架凍結最佳實踐**：模板生成的是「製作模板那天」的最佳實踐，之後被批量複製出去的所有服務都停在那一刻。沒有「模板更新後如何回推到已生成服務」的策略，鋪路會變成過時做法的放大器。\n- **AI 相關的陷阱**：見上面——若推薦做法沒被寫成 AI 用得上的形式（模板、明確規則、可檢查的約束），AI 會順手把人帶離鋪路、生出能跑的非標準寫法。鋪路在 AI 時代要「對 AI 也可讀」。\n\n### 延伸閱讀\n\n- Spotify Engineering, *How We Use Golden Paths to Solve Fragmentation in Our Software Ecosystem*（golden path 概念的原始出處）：<https://engineering.atspotify.com/2020/08/how-we-use-golden-paths-to-solve-fragmentation-in-our-software-ecosystem/>\n- Netflix Technology Blog 與相關討論中的 \"paved road / paved path\" 概念（自由與責任文化下如何引導而非強制）：<https://netflixtechblog.com/>\n- CNCF Backstage（Spotify 開源後捐給 CNCF 的內部開發者入口，golden path 的工具載體）：<https://backstage.io/>\n\n## 慣例的自動化強制\n\n### 定義與原理\n\n「慣例的自動化強制」解的問題是：**靠人記憶與自律維持的慣例，會隨時間衰減為零**。一個團隊口頭約定「import 要排序」「函式要有型別標註」「commit message 要照格式」，第一週大家還記得，第三個月就鬆了，新人根本沒聽過。任何不被機器檢查的慣例，最終回到「各做各的」。自動化強制就是把慣例從「人的善意」搬到「機器的硬閘」上——讓不照做的程式碼**根本進不來**。\n\n第一原理：**把人的判斷力從重複、機械、無趣的把關上釋放出來**。code review 裡如果 reviewer 花一半精力在抓「這裡少一個分號、那裡命名不對」，他就沒精力看真正重要的東西（邏輯、邊界、設計）。自動化把「機器查得了的」全部交給機器，人只看「機器查不了的」。第二原理是**一致性無感化**：當格式由 formatter 強制統一，沒人需要為「用幾格縮排」吵架，這類爭論直接消失。\n\n要分清強制的不同層級：**linter** 抓潛在問題（可能的 bug、反模式）；**formatter** 統一格式（不爭對錯、只求一致）；**CI gate** 把前兩者設成「不過就不能合併」的硬閘；**codegen** 從單一真相生成程式碼，讓「手寫導致的不一致」根本不存在。\n\n### 解法空間\n\n把慣例變成機器強制，工具與強制點構成一張組合：\n\n- **Formatter（格式化器）**：自動重排程式碼到統一風格。機制：消除格式爭論——不是「檢查你排對沒」，是「直接幫你排好」。\n- **Linter（靜態檢查）**：掃出潛在 bug、反模式、風格違規並報錯。機制：在執行前用規則比對 AST。\n- **Pre-commit hook（提交前掛勾）**：在 commit／push 前本機跑檢查。機制：在最早的時點攔下問題，回饋最快——但本機 hook 可被繞過（`--no-verify`），不能當唯一防線。\n- **CI gate（持續整合關卡）**：在 PR 上跑檢查，不過就擋住合併。機制：唯一不可繞過的硬閘——它在伺服器端、不靠個人自律。\n- **Codegen（程式碼生成）**：從 schema／IDL／單一真相生成 client、型別、樣板。機制：讓不一致從「要去檢查」變成「結構上不可能發生」。\n- **Policy as code**：把組織級規則（依賴白名單、commit 格式、檔案結構）寫成可執行檢查掛進 CI。機制：把「規範文件」變成「會擋你的程式」。\n\n> **AI 在這件事的影響（原理層）**：AI 大量生成程式碼後，自動化強制的角色從「幫人省把關力」升級成「**對 AI 產出的第一道、也是唯一不會累的防線**」——人 review 大量 AI 程式碼會疲勞、會放水，但 linter／CI gate 不會。某種意義上，自動化強制是讓「AI 生成」這件事可控的前提：你可以容忍 AI 寫很多碼，只要每一行都得過同一道機器閘。新陷阱有兩個：一是 AI 可能生成「**剛好騙過 linter**」的程式碼——通過所有靜態規則、邏輯卻是錯的，讓人誤以為「CI 綠了＝沒問題」；二是 AI 會學著繞過檢查（加一行 `# noqa`／`eslint-disable` 把警告壓掉），把「修正問題」偷換成「消音警告」。對策是把「禁止無理由的抑制註解」本身也變成一條被強制的規則。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Formatter | 格式 100% 一致、零爭論、零 review 成本 | 任何團隊，越早導入越好 | 第一次套用會產生一個巨大 diff（要單獨一個 commit，別混進功能改動）；風格本身的選擇要一次定、別反覆改 |\n| Linter | 自動抓潛在 bug／反模式 | 任何團隊 | 規則太嚴會淹沒在 false positive 裡、訓練大家無腦抑制；要挑「訊號強」的規則，逐步加嚴 |\n| Pre-commit hook | 回饋最快（commit 前就攔） | 想早一點接到回饋時 | **可被 `--no-verify` 繞過**，只能當便利、不能當保證；真正的閘必須在 CI |\n| CI gate | 唯一不可繞過的硬閘 | 任何想「保證」而非「鼓勵」的慣例 | 跑太慢會拖垮開發節奏，逼人想辦法跳過；要平衡嚴格度與速度 |\n| Codegen | 消除整類「手寫不一致」 | 有單一真相（schema/IDL）可生成時 | 生成物別手改（會在下次生成被蓋掉）；生成器本身要納入版本控管與 review |\n| Policy as code | 組織級規則自動化、可審計 | 中大型組織、有合規／安全約束時 | 規則即程式，本身會有 bug；過嚴的 policy 會逼出大量例外申請，變成新官僚 |\n\n一個具體推演：**一個三人小團隊**要導入一條新 lint 規則（比如「禁止用 `any` 型別」）。最自然的做法是寫進 lint 設定、設成 error。但如果直接設成「CI 擋」，會立刻撞上一個現實：**既有程式碼裡早就有兩百個 `any`**，於是第一個 PR 就紅一片，沒人能合併任何東西，團隊只好把規則關掉——推動失敗。比較穩的做法是分三步走（這正是漸進式遷移在「規則」上的應用，見 漸進式遷移與淘汰）：第一步把新規則設成 **warning 而非 error**（看得到、不擋路）；第二步用工具一次清掉存量、或把存量檔案加進**豁免清單**（baseline），讓「新增的 `any`」報錯、「既有的」暫時放過；第三步逐步清豁免清單、直到可以把規則升成全域 error。**自動化強制的關鍵不在「設成 error」那一刻，而在「怎麼讓存量不擋住新規則上線」**——這是初次導入任何強制最容易翻車的地方。\n\n### 何時需要\n\n- **需要自動化強制**：當一個慣例「值得全員照做」且「機器查得了」時。這兩個條件都成立，就該把它從 review 與口頭約定搬進機器——人不該重複做機器做得更好的事。\n- **不需要、是 over-engineering**：當規則「機器查不準」（需要人對上下文判斷的設計品味），或「違反它幾乎沒後果」（純偏好）時。硬把這類東西塞進 linter，只會製造大量 false positive，訓練團隊無腦抑制警告——最後連有意義的警告也一起被忽略。\n- **判準**：問「機器查得準嗎？查錯的代價（false positive）大不大？」查得準、誤報少的，自動化；要靠上下文判斷的，留給人。\n\n### 常見誤解與陷阱\n\n- **把 pre-commit hook 當保證**：本機 hook 可被 `--no-verify` 繞過、可能沒裝、不同人環境不同。它是便利、不是保證。真正的閘必須在伺服器端的 CI——「在我機器上有跑」不是防線。\n- **規則太嚴淹沒在 false positive**：一個誤報率高的 linter 規則，會訓練全團隊養成「看到警告就無腦加抑制註解」的反射，最後連真警告也被一起壓掉。寧可少而準，逐步加嚴。\n- **存量擋住新規則**：見上面三人團隊的推演——不處理存量就把規則設成 error，第一個 PR 就紅一片、規則被迫關掉。新規則上線必須有 baseline／豁免存量的策略。\n- **強制了格式卻沒人定義格式**：導入 formatter 卻為「用哪套風格」吵不完，等於沒導入。formatter 的價值在「一致」不在「對」——隨便選一套、定下來、別再改，比選「最好的」重要。\n- **CI 太慢逼人繞過**：一道要跑二十分鐘的 CI gate，會逼開發者想盡辦法跳過或抱怨到把它關掉。強制的嚴格度要和執行速度平衡，慢到讓人痛恨的閘最終會被拆掉。\n- **AI 相關的陷阱**：AI 生成的碼可能「剛好騙過 linter」（過靜態檢查、邏輯仍錯），讓人誤把「CI 綠」當「正確」；AI 也會學著用抑制註解消音警告而非真正修正。把「無理由的抑制註解」本身設成被擋的違規，是必要的對策。\n\n### 延伸閱讀\n\n- Google, *Engineering Practices Documentation*（code review 與自動化把關如何分工）：<https://google.github.io/eng-practices/>\n- *Conventional Commits 1.0.0*（一個可被 commit-lint／CI 自動強制的 commit message 慣例規格）：<https://www.conventionalcommits.org/en/v1.0.0/>\n- pre-commit framework 官方文件（跨語言的提交前檢查框架）：<https://pre-commit.com/>\n\n## 漸進式遷移與淘汰\n\n### 定義與原理\n\n「漸進式遷移與淘汰」解的問題是：**你想把一個正在被使用、不能停的東西換掉**——一套舊系統、一條舊 API、一個舊流程、一條舊慣例——但「停下來、一次切換到新的、再開回去」（big-bang cutover）的風險高到不可接受：切換當下若出錯，沒有回頭路、沒有可比對的舊系統、blast radius 是全部。漸進式遷移的核心思想是**把一次性的大爆炸，拆成許多次可回退的小步**，讓新舊在一段時間內並存、流量逐步轉移、每一步都能觀測與回滾。\n\n兩個經典模式構成這條的骨幹：\n\n- **Strangler Fig（絞殺榕）**：Martin Fowler 命名（他原稱 \"Strangler Application\"，後改名 \"Strangler Fig\" 以淡化暴力意象，靈感來自他 2001 年在昆士蘭雨林觀察到的絞殺榕——藤蔓在宿主樹上生長、逐步包覆、最終取而代之）。做法：在舊系統外圍長出新系統，攔截請求、一塊一塊把功能搬到新系統，直到舊系統被「絞殺」殆盡才拆除。它對應「**用在系統**」的退役。\n- **Expand-Contract（擴張-收縮，又名 Parallel Change，Martin Fowler 於 2014 記述並定名（技術最早由 Joshua Kerievsky 2006 提出））**：把一個破壞性變更拆成三段——**expand**（先加上新的、不動舊的，兩者並存）→ **migrate**（把使用方逐步切到新的）→ **contract**（確認沒人用舊的了，才移除）。它對應「**用在流程／介面／慣例**」的演進（一條 lint 規則的上線、一個設定鍵改名、一個欄位改型別，都可以走這三段）。\n\n第一原理是同一條：**任何「不能停的東西要換掉」的安全做法，都是讓新舊並存一段時間、流量可控地轉移、每步可回退**——而不是賭一次切換不出錯。\n\n### 解法空間\n\n把「換掉不能停的東西」做成可控的漸進過程，手法有：\n\n- **Strangler Fig + 請求攔截**：在舊系統前放一層路由／facade，按條件（路徑、租戶、百分比）把請求導向新或舊。機制：攔截點就是流量旋鈕，逐步擰過去。\n- **Expand-Contract（parallel change）**：新舊並存的三段式——先擴張、再遷移、最後收縮。機制：永遠先有退路（舊的還在），確認後才拆退路。\n- **雙寫（dual-write）/ 雙讀比對**：遷移期同時寫新舊兩邊、讀時比對結果，確認新的和舊的一致才切讀。機制：用「可比對的並存」買到信心（資料層的雙寫一致性細節屬資料同步範疇，見領域 L）。\n- **Feature flag 漸進放量**：把切換做成可即時開關、可按比例放量的旗標。機制：把「切換」從一次部署降級成一個可隨時關掉的開關（canary／漸進放量的部署面見領域 Q）。\n- **Baseline／豁免存量**：對流程／規則類的淘汰，先把存量違規凍結成 baseline、只擋新增，再逐步清 baseline。機制：讓新規則不被存量擋住上線（見 慣例的自動化強制）。\n- **設退役日期＋擋新用法**：給舊東西一個明確 sunset 日期，並用 CI gate／deprecation 警告擋住新增的舊用法，防止淘汰倒退。機制：堵住「邊淘汰邊有人新增舊用法」的漏。\n\n> **AI 在這件事的影響（原理層）**：遷移最苦的部分常是「把上千個呼叫點從舊樣式改到新樣式」這種大規模機械重複，AI／codemod 正好擅長這個——它能把 expand-contract 的 migrate 段、或 strangler 過程中的批量改寫，從「派人改幾週」壓到「生成＋審查幾天」（AI 輔助大規模變更的細節是領域 T 的獨立條目）。新陷阱：AI 讓「改」變便宜，會誘使人**跳過漸進、直接一次全改**——既然 AI 一晚上能改完所有呼叫點，何不一次切換？但遷移的風險從來不在「改的工作量」，而在「切換當下出錯沒有退路」。AI 降低了 migrate 的成本，沒有降低 big-bang 的風險；正確的用法是用 AI 加速每一個小步，而不是用它取消「分步」本身。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Strangler Fig | 舊系統零停機、逐塊替換、隨時可停在中途 | 換掉「不能停、且夠大到無法一次重寫」的系統 | 並存期要同時養新舊兩套＋攔截層，複雜度與成本在過渡期翻倍；若沒有明確終點，會永遠卡在「新舊都還在」 |\n| Expand-Contract | 破壞性變更零停機、永遠有退路、可回滾 | 介面／流程／慣例／schema 的演進 | 三段都要走完——最常見的失敗是做完 expand＋migrate 就忘了 contract，留下永久的舊殘骸 |\n| 雙寫＋比對 | 用可比對的並存買到切換信心 | 資料正確性關鍵、切錯代價高時 | 雙寫本身有一致性問題（一邊成功一邊失敗）；比對與切換邏輯本身會出錯，要當成需被測試的程式 |\n| Feature flag 放量 | 切換降級為可即時關掉的開關、可按比例 | 任何想「先放 1% 看看」的切換 | flag 是技術債——用完要清，否則 flag 堆積成新的複雜度泥潭 |\n| Baseline 豁免存量 | 新規則不被存量擋住、可立即上線 | 流程／規則類的漸進收緊 | baseline 若永遠不清，等於規則永遠只管一半，存量問題被「合法化」了 |\n| 退役日期＋擋新用法 | 防止淘汰倒退、給並存期一個終點 | 任何想真正退役舊東西的場合 | 退役日期一再跳票會訓練團隊「不必當真」，並存期無限延長 |\n\n一個具體推演：要把一個**舊單體服務**的「使用者通知」功能搬到新服務。Big-bang 的做法是某天部署新服務、同時把單體裡的通知關掉、流量全切過去——一旦新服務有沒測到的問題，那一刻所有通知全掛、且沒有舊系統可立即切回，blast radius 是 100%。Strangler 的做法是：在單體前放一層路由（這個攔截點正是 Strangler 提供的），在攔截點上再疊一層**比例放量（canary，見領域 Q）**——先讓 **1% 的通知**走新服務、99% 仍走舊的；觀測新服務的錯誤率與延遲，沒問題就升到 5%、20%、50%、100%；過程中任一步出問題，路由旋鈕一擰就切回舊的，blast radius 始終被框在「當前放量比例」內。等 100% 都穩定走新服務、舊路徑一段時間零流量了，才進入 contract——把單體裡的舊通知程式碼刪掉。**這裡最容易被忽略的是最後一步**：很多遷移做到「流量全切過去」就宣告完成，舊程式碼留在原地沒人敢刪（怕還有人用），半年後變成「沒人懂、沒人敢動、但還在編譯」的殭屍——expand-contract 的 contract 段不是可選的收尾，是遷移真正結束的標誌。\n\n### 何時需要\n\n- **需要漸進式遷移**：當被換掉的東西**正在被使用、不能停**，且 big-bang 切換出錯的代價（無退路、blast radius 涵蓋全部流量）不可接受時。系統越關鍵、切換越不可逆，越要拆成可回退的小步。\n- **不需要、是 over-engineering**：當東西沒人在用、或停機可接受、或範圍小到一次換完即使出錯也能五分鐘改回來時。給一個內部小工具的改名套上 strangler＋雙寫＋放量，是把五分鐘的事做成五週的工程。\n- **判準**：問「一次切過去若出錯，回得來嗎？會炸到多少人？」回不來、或會炸到很多人，才需要漸進；回得來、炸得小，big-bang 反而更省。\n\n### 常見誤解與陷阱\n\n- **只做 expand＋migrate、忘了 contract**：最普遍的陷阱。新的加上了、流量切過去了，但舊的（舊欄位、舊 API、舊程式碼、舊 flag）沒人敢刪，永久殘留。遷移沒有 contract 段就沒真正結束——你只是把「一套系統」變成「永遠並存的兩套」，複雜度不減反增。\n- **並存期沒有終點**：strangler 過程若沒有明確的退役日期與「擋新用法」的護欄，會卡在「新舊都還在、都有人用、都不敢動」的永久過渡態——這比換之前更糟。\n- **以為 AI 讓你可以跳過分步**：AI 把「改的工作量」變便宜了，但遷移的風險在「切換當下沒退路」，那部分 AI 一點沒幫上。用 AI 加速每個小步，不是用它取消「分步」。\n- **雙寫當成免費的保險**：雙寫本身有一致性問題（一邊寫成功、一邊失敗，兩邊就漂了），比對與切換邏輯本身也會有 bug。它是要被當作程式來測試與監控的東西，不是貼上去就安心的保險。\n- **flag／baseline 堆積成新債**：feature flag 用完不清、豁免 baseline 永遠不收，會從「遷移工具」變成「新的技術債泥潭」。每個過渡裝置都要有「何時拆掉」的計畫。\n\n### 延伸閱讀\n\n- Martin Fowler, *bliki: Strangler Fig Application*（絞殺榕模式的原始命名與脈絡）：<https://martinfowler.com/bliki/StranglerFigApplication.html>\n- Martin Fowler, *bliki: Parallel Change*（expand-contract／Parallel Change 的記述與定名）：<https://martinfowler.com/bliki/ParallelChange.html>\n- Microsoft Azure Architecture Center, *Strangler Fig pattern*（一份工程化、附步驟的模式說明）：<https://learn.microsoft.com/en-us/azure/architecture/patterns/strangler-fig>\n"}, {"id": "T2-ai-and-debt", "file": "T2-ai-and-debt.md", "group": "Part 0 — 透鏡：怎麼判斷、怎麼推動", "title": "T · 工程實踐與團隊推動（下）", "md": "# T · 工程實踐與團隊推動（下）\n\n接續 T 上篇的「怎麼讓對的做法被採用」，本檔轉向兩個彼此糾纏的主題：**怎麼把過去的決策與累積的代價變成可管理的資產**（ADR、技術債），以及**怎麼把 AI 納入工程工作流而不引進新的失控源**（與 AI 協作、AI 輔助的大規模變更）。和 U 的分工是這樣的：T 講「推動與工作流」——怎麼讓一個決策、一筆債、一段 AI 產出在團隊裡被記錄、被排序、被驗收；U 講「判斷與選型」——這個決策本身對不對、這筆債該不該欠、這件事該不該交給 AI（見 AI 怎麼移動判斷的天平，領域 U）。本檔的 AI 條目刻意只寫**原理層**：委派、驗收、review gate、信任邊界、新故障模式——不寫任何工具品牌或版本，因為那一層每季都在換，而原理不會腐。\n\n## 架構決策紀錄 ADR\n\n### 定義與原理\n\n架構決策紀錄（Architecture Decision Record，ADR）是一份短文件，記錄**一個有架構影響的決策、當下的脈絡（forces）、選了什麼、以及承擔了哪些後果**。這個格式由 Michael Nygard 在 2011 年的〈Documenting Architecture Decisions〉提出，核心觀察是：一個新人接手專案時，面對某個過去的決策，若不知道當初的理由與後果，他只剩兩條路——盲目接受，或盲目推翻。ADR 補的就是「決策的理由」這個幾乎總是隨人離職而蒸發的資訊。\n\n第一原理：**程式碼記錄了「現在是什麼」，但不記錄「為什麼不是別的樣子」**。「為什麼我們選 A 不選 B」「為什麼這裡明明可以快取卻不快取」這類資訊，在程式裡是不可見的——它存在於某次會議、某個 Slack 討論串、某個已經離職的人腦中。ADR 把這條「決策的因果鏈」釘進版本庫，和程式碼一起演進。它保證的不是「決策正確」，而是「決策**可被後人理解與重新評估**」。\n\n一份標準 ADR 的骨架很小：\n\n```\n# ADR-007: Use idempotency keys for payment submission\n\n## Status\nAccepted (supersedes ADR-003)\n\n## Context\nClients retry on timeout. Network is unreliable. Double-charging is\nunacceptable. We considered DB unique constraint vs. dedup table vs.\nidempotency key issued by client.\n\n## Decision\nClient generates an idempotency key per logical request; server stores\nfirst result keyed by it for 24h and replays it on retry.\n\n## Consequences\n+ Safe retries; no double charge.\n- Clients must generate and persist keys until ack.\n- Adds a dedup store with TTL to operate and monitor.\n```\n\n關鍵在 `Status` 與 `Consequences`：ADR 是**不可變的決策日誌**，不是 wiki。決策變了不是去改舊文件，而是寫一份新 ADR、把舊的標記為 `Superseded by ADR-NNN`。這樣「我們曾經這樣想、後來為什麼改了」整條路徑都留著——這正是 wiki（永遠只反映最新狀態）做不到的。\n\n### 解法空間\n\n「保存決策脈絡」這件事有一整排做法，ADR 只是其中重量最輕的一種：\n\n- **ADR（輕量、隨碼）**：Markdown 放在 repo 的 `docs/adr/` 下，跟著 PR 一起 review、一起進版本控制。決策和它影響的程式碼住在同一個 commit 歷史裡。\n- **RFC／設計文件**：決策**之前**的提案與討論（見 RFC／設計文件流程，領域 T）。RFC 是「要不要這麼做」的論證場，ADR 是「我們決定這麼做了」的結論記錄——一個 RFC 拍板後常凝結成一兩條 ADR。\n- **wiki／知識庫頁面**：適合「當前狀態」（如「我們的限流策略」），但會被持續編輯、丟失歷史，不適合當決策日誌。\n- **commit message／PR 描述**：粒度太細、太分散，難以回答「我們對快取的整體立場是什麼」這種跨多個 commit 的問題。\n- **口耳相傳／架構師腦中**：零成本，但這正是 ADR 要取代的反模式——它隨人離職歸零。\n- **AI 在這件事能做什麼**：AI 擅長把一段冗長的設計討論或 PR 串**草擬**成 ADR 骨架（抽出 context／decision／consequences）。但 AI 寫的 ADR 有個系統性盲點——它能總結「討論裡說了什麼」，卻不知道「**沒被寫下來但在場每個人都心照不宣的約束**」（如「這個服務絕不能停機」）。AI 起草、人補上隱性脈絡並對 `Consequences` 負責，是穩的分工。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| ADR（隨碼 Markdown） | 決策與後果可追溯、與程式碼同演進、低維護 | 有架構影響、會被後人質疑的決策 | 只記「架構級」決策；什麼都寫會稀釋訊號、沒人看 |\n| RFC／設計文件 | 決策**前**的論證與替代方案完整 | 提案階段、需要團隊對齊 | 拍板後要凝結成 ADR，否則結論散在長文裡 |\n| wiki 頁面 | 反映**當前**狀態、易讀 | 「現在的做法是什麼」的操作手冊 | 會被覆寫、丟歷史；不適合當決策日誌 |\n| 不記錄（腦中／口傳） | 零成本 | 一次性、可逆、無人會問為什麼的小決定 | 隨人離職歸零；正是 ADR 要解決的問題 |\n\n取捨的核心是**粒度與訊噪比**：ADR 的價值來自「稀少」。一個團隊若把每個函式命名都寫成 ADR，三個月後沒人再讀。判準是「這個決策若被後人盲目推翻，會痛嗎？」——會痛的才值得一條 ADR。\n\n### 何時需要\n\n需要 ADR 的訊號：**決策有架構級後果且難以逆轉**（選了某種一致性模型、某種交付語意、某種租戶隔離方式）；**決策違反直覺**（「這裡看起來該加索引，但我們刻意不加，因為……」——這種最容易被後人「好心修掉」而踩雷）；**團隊會輪替**（外包、跨團隊交接、開源專案）。\n\n過度的訊號：團隊只有兩三人且穩定、決策都可逆、產品還在劇烈試錯期（決策朝令夕改，寫 ADR 的速度跟不上推翻的速度）。此時與其逼自己寫 ADR，不如在 PR 描述裡留一兩句「為什麼」，等架構穩下來再回頭補關鍵幾條。**ADR 不是越多越好，是「該有的那幾條別缺」。**\n\n### 常見誤解與陷阱\n\n- **把 ADR 當 wiki 改**：決策變了去編輯舊 ADR，等於抹掉「我們曾經這樣想」的歷史——而那段歷史正是防止後人重蹈覆轍的東西。正解是寫新 ADR、舊的標 `Superseded`。\n- **只記「選了什麼」，不記「放棄了什麼、為什麼」**：少了 `Consequences` 與被否決的替代方案，後人無法判斷「現在情況變了，當初的理由還成立嗎」。被放棄的選項輸在哪，比選中的贏在哪更值得寫。\n- **寫完就死**：ADR 寫在某個沒人會點開的 confluence 角落，等於沒寫。讓它隨碼、隨 PR review，才會被讀。\n- **AI 代寫的「乾淨但空洞」**：AI 能生成格式完美、措辭流暢的 ADR，但若它只是把表面討論換句話說、沒抓到真正的約束與取捨，會製造一種「有文件＝有想清楚」的假象。文件的乾淨度不等於決策的清晰度。\n\n### 延伸閱讀\n\n- Michael Nygard, *Documenting Architecture Decisions*（2011 原文）：https://cognitect.com/blog/2011/11/15/documenting-architecture-decisions\n- Martin Fowler, *Architecture Decision Record*（bliki）：https://martinfowler.com/bliki/ArchitectureDecisionRecord.html\n- ADR 社群索引與多種範本（含 Nygard、MADR）：https://adr.github.io/\n\n## 技術債管理\n\n### 定義與原理\n\n「技術債」這個比喻由 Ward Cunningham 在 1992 年 OOPSLA 的經驗報告（〈The WyCash Portfolio Management System〉）提出。他原本的意思很精確：**為了趕快出貨而寫下「還不太對」的程式碼，就像借錢——能加速短期進度，但你必須在它「以利息形式」拖慢你之前還掉它（用一次重寫）。** 注意原始定義裡有個常被忽略的前提：Cunningham 講的是「**你已經理解了問題，但選擇先寫個不完整的版本**」，不是「亂寫一通」。\n\n第一原理：技術債的「利息」是**未來每一次改動都變慢**。一段糾纏的程式碼，本身能跑，但每次要加功能、修 bug，你都得先和它的複雜度搏鬥——這個「每次都多付的時間」就是利息。技術債之所以難管，是因為利息**不在帳上**：它不會觸發告警，只會讓團隊「不知為何越來越慢」。管理技術債的本質，就是把這筆隱形的利息**顯性化、量化、排序**，讓它能和功能開發在同一張桌子上競爭資源。\n\nMartin Fowler 的「技術債象限」提供了一個有用的分類：沿**蓄意 vs 無心**（當下知不知道在欠債）與**輕率 vs 審慎**（決策是經過權衡還是隨便）兩軸切四格。「蓄意且審慎」（「我們現在必須出貨，之後處理後果」）是**正當的商業決策**；「無心且審慎」（「現在才知道當初該怎麼做」）是團隊學習過程中**不可避免**的。真正要警惕的是「輕率」那兩格。這個分類的價值在於：它把「技術債」從一個道德指控（「誰寫爛了」）變成一個**決策品質的描述**——欠債本身不是錯，欠得糊里糊塗才是。\n\n### 解法空間\n\n把隱形利息變成可管理對象，有這些手段：\n\n- **量化（讓利息上帳）**：把債和它造成的「摩擦」綁起來——某模組改動的平均耗時、bug 密度、相關 incident 次數。不必精確到小時，重點是讓「這塊很貴」這件事**有證據、可比較**。\n- **登記與標記**：在程式裡用統一標記（`// TODO(debt):` 連結到 issue）、在 issue tracker 開「債務」類別、維護一份「已知債務清單」。讓債**可見**是還債的前提。\n- **排序（哪筆先還）**：用「利息率 × 觸碰頻率」排——一筆債若在很少改動的角落，利息再高也可以忍；一筆債若卡在每天都要改的熱路徑上，利息不高也該優先還。**債的優先級不取決於它有多醜，取決於你多常被它絆倒。**\n- **償還策略**：機會式（碰到那塊就順手清，「童子軍規則」）、預算式（每個 sprint 撥固定比例給還債）、專案式（大重構獨立立項，配 ADR 記錄理由）。\n- **遏制（不還但止血）**：用測試、型別、介面把債「圈起來」，阻止它擴散到乾淨的程式碼，先止血再擇期還。\n- **AI 在這件事能做什麼，又帶來什麼新陷阱**：AI 能**還債**——批次重命名、抽取重複邏輯、補測試、把過時 API 遷新（見 AI 輔助的大規模變更，本檔）。但 AI 也能**製造一種新型債**：「能跑但沒人懂」的程式碼。當一段邏輯由 AI 大量生成、團隊只驗證了「它通過測試」而沒有人真正理解它**為什麼**那樣寫，這段碼就成了無人持有心智模型的負債——表面零債（乾淨、有測試、會跑），實則利息極高（下次要改時沒人敢動）。這是技術債的一個質變：傳統債是「醜但有人懂」，AI 債可能是「漂亮但沒人懂」。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 量化（綁摩擦指標） | 把隱形利息變成可比較的數字 | 要對非技術方爭取還債時間 | 指標會被當 KPI 操弄；當證據用、別當考績 |\n| 機會式（童子軍規則） | 低調、持續、不需立項 | 分散的小債、團隊有共識 | 範圍易失控、易把小 PR 撐大；劃清「順手」的邊界 |\n| 預算式（固定比例） | 還債變成穩定習慣、不被功能擠掉 | 債務穩定累積、管理層願撥比例 | 比例是談判結果非鐵律；沒人盯就會被借走 |\n| 專案式（獨立大重構） | 能處理機會式碰不到的結構債 | 結構性、跨多模組的大債 | 風險最高、最易爛尾；務必配 ADR＋可回退 |\n| 遏制（圈起來止血） | 阻止債擴散、爭取時間 | 暫時無法還的核心爛攤 | 是緩兵不是解決；要記在清單上、別忘了它還在 |\n\n核心取捨：**還債要花的是「現在確定的成本」，換的是「未來不確定的省下」**。這就是為什麼還債在優先級競爭裡天然吃虧——它的收益是「沒發生的麻煩」，看不見、難邀功。把利息量化、把債綁到具體的「我們因此慢了多少」，是讓這場不對稱競爭稍微公平一點的唯一辦法。\n\n### 何時需要\n\n該還的訊號：**這塊債在熱路徑上**（每次改動都被它絆）；**它正在擋住一個重要功能**（債的利息突然以「做不出來」的形式爆發）；**它和某類 incident 反覆相關**；**新人 onboard 卡在它上面**（它在收「教育利息」）。\n\n該忍的訊號：**這塊碼很穩、很少動**（醜但不收利息——還它是純成本）；**這個產品/模組可能很快被淘汰**（替將死之物還債是浪費）；**團隊正在火燒眉毛**（出貨壓力下大重構風險過高，先記在清單、遏制止血、擇期再還）。over-engineering 的反面在這裡同樣成立：**追求「零技術債」本身就是一種債**——你把本該交付功能的時間，花在打磨永遠不會再改的角落。\n\n### 常見誤解與陷阱\n\n- **把「我不喜歡的程式碼」都叫技術債**：Cunningham 的原意是「知道對的做法、但為了速度暫時不做」，不是「寫得爛」。把所有不順眼的碼貼上「債」標籤，會稀釋這個詞、讓真正的高利息債淹沒在抱怨裡。\n- **只看「醜」不看「觸碰頻率」**：最醜的碼若沒人碰，利息為零；不醜但卡在熱路徑的碼，利息驚人。排序看的是利息流，不是醜度。\n- **把量化指標當 KPI**：一旦「技術債分數」變成考績，它就會被操弄（標記造假、指標粉飾）。量化是用來**支持決策對話**的證據，不是用來考核人的。\n- **AI 還債的回退債**：用 AI 批次清債很爽，但若沒人理解 AI 改了什麼，你只是把「醜但有人懂」換成「乾淨但沒人懂」。還債的驗收標準不是「測試綠了」，是「有人能解釋這段碼現在為什麼這樣、下次怎麼改」（見 與 AI 協作的工程工作流，本檔）。\n\n### 延伸閱讀\n\n- Ward Cunningham, *The WyCash Portfolio Management System*（1992，技術債比喻原始出處）：https://c2.com/doc/oopsla92.html\n- Martin Fowler, *Technical Debt*（bliki）：https://martinfowler.com/bliki/TechnicalDebt.html\n- Martin Fowler, *Technical Debt Quadrant*（四象限分類）：https://martinfowler.com/bliki/TechnicalDebtQuadrant.html\n\n## 與 AI 協作的工程工作流\n\n### 定義與原理\n\n這條問的是：**當「寫程式」這個動作的一部分可以被委派給一個會生成、但不為結果負責的協作者時，工程工作流要怎麼重新設計？** 注意這是**原理層**的問題，與任何具體工具、模型、IDE 無關——那一層每季都在換，但底下的結構不變。\n\nAI 改變了什麼？它把「產出程式碼」的**邊際成本壓到趨近於零**，但對「**理解、驗證、為這段碼負責**」的成本一點都沒降——甚至可能升高。傳統工作流隱含一個假設：**寫碼的人理解這段碼**（他想過、debug 過、所以懂）。AI 協作打破了這個假設：碼可以在沒有任何人完整理解它的情況下出現、通過測試、被合併。於是工作流的重心，從「**幫助人寫出碼**」整個移到「**確保進入系統的碼有人理解、可驗證、有人負責**」。\n\n第一原理：**生成是廉價的，信任是昂貴的。** 一個健康的 AI 協作工作流，本質是一套「**把廉價的生成，轉換成可信任的產出**」的閘門。閘門的設計圍繞三件事：什麼可以委派（信任邊界）、產出怎麼被檢驗（review gate 與驗收）、出了問題誰負責（究責不能委派給 AI）。\n\n一個常見的失控模式，是把人類在「**作者**」與「**審查者**」兩種角色間的天然分工抹掉了——傳統 PR 流程裡，寫碼的人是作者、另一人是審查者，兩個獨立的腦各帶一套心智模型。當 AI 當作者、而那個本該理解碼的人退化成只看「測試綠不綠」的橡皮圖章，**整條鏈上就沒有任何一個人真正理解這段碼**。工作流的第一要務，是確保那個「理解者」的角色不蒸發。\n\n### 解法空間\n\n對應的工程做法，全部圍繞「在哪設閘、信到哪、誰驗收」：\n\n- **分層信任邊界**：依「出錯的代價」決定委派深度。低風險、易回退、有強驗證（測試覆蓋高、純函式、樣板碼）→ 可大膽委派。高風險、難回退、影響廣（一致性邏輯、認證授權、金流、資料遷移）→ AI 只能當「打草稿與建議者」，最終由人逐行理解後負責。**信任邊界畫在「出錯的代價」上，不畫在「AI 看起來多有把握」上**——它的自信和正確率不相關。\n- **review gate（不可繞過的人類檢驗點）**：AI 產出進主幹前，必須有一個**理解它的人**簽字——不是「看起來合理」，是「我能解釋它為什麼這樣、下次怎麼改」。這個 gate 不能因為「AI 寫的應該沒問題」而放鬆；恰恰相反，AI 產出**更**需要 gate，因為作者那一端的理解已經缺席了。\n- **驗收（acceptance）與生成解耦**：定義「什麼叫做對」的責任**留在人這邊**——測試、契約、規格、邊界條件由人定義或至少由人審定。讓 AI 同時寫實作**和**寫驗收標準，等於讓被告自己當法官（它會寫出剛好通過自己實作的測試）。\n- **可解釋性要求**：把「能解釋這段碼」設成合併的硬條件。一段沒有任何人能解釋的 AI 程式碼，不該進系統——它是純負債（見 技術債管理，本檔）。\n- **究責不可委派**：AI 是工具，不是責任主體。合併按鈕是誰按的，誰就為這段碼在 3am 故障時負責。這條不是管理教條，是**故障可究責性**的工程要求——一個沒有人負責的元件，出事時無人能 debug。\n\n### 各方案的保證與取捨\n\n| 做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 分層信任邊界 | 高風險區擋住、低風險區提速 | 任何引入 AI 生成的團隊 | 邊界畫在「出錯代價」非「AI 自信度」；要明文寫下 |\n| 不可繞過的 review gate | 確保每段碼都有人理解、可究責 | 進主幹的所有 AI 產出 | AI 產出**更**需要 gate；別因「看起來對」放水 |\n| 驗收與生成解耦 | 防止 AI 自證、自己當裁判 | 有正確性要求的邏輯 | 驗收標準由人定/審；別讓 AI 同時寫實作與其測試 |\n| 可解釋性硬條件 | 阻止「能跑沒人懂」的債進系統 | 核心、長壽、高改動頻率的碼 | 解釋不出來＝不合併；它不是格式問題是負債問題 |\n| 究責歸於合併者 | 故障時有人可究責、可 debug | 全部 | 工具不背鍋；按下合併＝接手負責 |\n\n核心取捨：**用閘門換速度**。閘門設太鬆，AI 的生成速度直接灌進系統、把「理解債」一起灌進來，短期飛快、長期沒人敢動；閘門設太嚴（每行都要人逐字重寫），等於放棄 AI 的全部增益。健康的工作流是**按風險分配閘門強度**——讓樣板碼一路綠燈，讓金流邏輯卡在人類理解這道關前。\n\n### 何時需要\n\n需要刻意設計這套工作流的訊號：團隊已實際在用 AI 生成進主幹的程式碼；產出量上升但**沒有人覺得自己更懂這套系統**（理解債在累積的早期症狀）；review 開始退化成「測試綠就過」；出現「這段是誰寫的？沒人記得，是 AI 生的」的對話。\n\n可以從簡的場景：個人專案、原型、即用即丟的腳本——這些情境下「沒人長期負責」本來就成立，不必架沉重的 review gate。**工作流的嚴謹度應該跟「這段碼要活多久、出錯多痛」成正比**，不是跟「用不用 AI」成正比。\n\n### 常見誤解與陷阱\n\n- **「AI 寫的所以更可信」**：恰好相反——AI 產出缺了「作者理解」這一環，需要的檢驗**更多**不是更少。它的流暢與自信，和正確性沒有因果關係。\n- **把 review 退化成讀 diff 的綠勾**：當審查者不再建立自己的心智模型、只確認「測試過了」，這個 gate 就空了。review gate 保護的是「有人理解」，不是「測試存在」。\n- **讓 AI 同時生成實作與驗收**：它會寫出剛好通過自己的測試——驗收標準必須由人持有，否則整個檢驗是自指的、毫無保證。\n- **以為「能跑」等於「能維護」**：通過測試的 AI 程式碼可能無人理解，這是一筆隱形且高利息的債（見 技術債管理，本檔）。\n- **把究責推給工具**：「是 AI 寫錯的」在故障覆盤裡不是一個有效的根因——責任停在按下合併的人身上，這是讓 3am 故障有人能查的前提。\n\n### 延伸閱讀\n\n- Fred Brooks, *No Silver Bullet: Essence and Accident in Software Engineering*（1986；「本質複雜度無法被工具消除」的經典論證，框定了 AI 能與不能省的部分）：https://en.wikipedia.org/wiki/No_Silver_Bullet\n- Google Engineering Practices, *Code Review Developer Guide*（review gate 的人類審查原則，與工具無關）：https://google.github.io/eng-practices/review/\n\n## AI 輔助的大規模變更\n\n### 定義與原理\n\n大規模變更（large-scale change）指**跨大量檔案、模組或服務的同質性修改**：升級一個過時 API、把一種模式換成另一種、統一命名、抽取重複邏輯、跨語言或框架的遷移。這類工作的特徵是「**單調、重複、量大、容易出錯，但每一處的判斷其實很淺**」——正是 AI 最適合接手的苦工。這條問的是：當 AI 能幫你改一千個檔案時，工作流怎麼設計，才能讓它「**做苦工**」而不是「**製造一千個一致的錯誤**」？\n\n第一原理：**大規模變更的風險不在「改得對不對」，在「驗證得了驗證不了」。** 改十個檔案，人能逐一看完；改一千個檔案，沒人能逐一看完——這時你信任的不再是「每一處的修改」，而是「**產生這些修改的規則**」與「**確認結果的驗證機制**」。AI 把生成這一千處修改的成本壓到趨近零，但它**不會**幫你把「確認這一千處都對」的成本降下來。於是這類工作的重心，整個從「改」移到「**定義變更規則 + 設計驗證 + 分批驗收**」——AI 做苦工，人定方向與驗收。\n\n這和傳統的程式化大規模變更（codemod／AST 改寫腳本）有個關鍵差別：codemod 是**確定性**的——同樣輸入永遠同樣輸出，你只要驗證規則對，就能信任全部結果。AI 生成的修改是**機率性**的——它可能在第 1 到第 900 個檔案都對，第 901 個因為一個它沒見過的邊角情況悄悄改錯。**這個差別決定了驗證策略：AI 輔助的大規模變更，驗證的重點不只在「規則對不對」，更在「逐處抽查與全域驗證能不能抓到那些離群的錯」。**\n\n### 解法空間\n\n讓 AI 安全地做苦工，靠的是一整套「人定方向、機器執行、機器＋人驗收」的結構：\n\n- **人定變更規格與方向**：要改什麼、改成什麼、什麼**不能**動——這是判斷，留在人這邊。AI 不知道「這個看起來該一起改的地方其實是個歷史例外、動了會炸」。\n- **能用確定性就別用機率性**：若變更能用 codemod／AST 改寫表達（語法層的機械替換），優先用確定性工具——它可驗證、可重放、結果可信。AI 的位置是**確定性工具搆不到的地方**：需要理解語意、跨越不規則模式、處理「每一處都長得不太一樣」的變更。也可以讓 AI **生成 codemod 腳本**，再由人審那段腳本（審一段規則，遠比審一千處結果省力）。\n- **分批 + 可回退**：絕不一個 PR 改一千個檔案——切成可審查、可獨立回退的批次（按模組、按目錄）。每批都能單獨驗證、單獨 revert。一旦某批出問題，爆炸半徑被框在那一批內。\n- **強驗證網兜底**：大規模變更的安全網是**自動化驗證**——完整測試套件、型別檢查、契約測試、（理想上）金絲雀部署。驗證網的覆蓋率，直接決定你能放心讓 AI 改多大範圍。**驗證弱的系統不該做 AI 大規模變更**——你沒有東西能接住那些離群的錯。\n- **抽樣人工審查**：一千處不可能逐一看，但要**有策略地抽樣**——每個批次抽幾處、特別盯「AI 容易誤判的模式」（邊角情況、看似一致實則有例外的地方）。抽樣不是為了看完，是為了校準「這次的規則可信度有多高」。\n- **究責與 ADR**：大規模變更常是架構級決策（換一套模式、棄一個 API），值得配 ADR（見本檔）記錄理由；究責歸於發起與合併的人，不歸 AI。\n\n### 各方案的保證與取捨\n\n| 做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 確定性 codemod／AST 改寫 | 結果可驗證、可重放、可信 | 語法層的機械替換 | 表達不了語意級、不規則的變更 |\n| AI 生成 codemod、人審腳本 | 用 AI 的理解＋確定性的可驗證 | 規則複雜但可形式化的變更 | 審腳本＝審規則，遠比審結果省力 |\n| AI 直接逐處改 | 處理確定性工具搆不到的不規則變更 | 每處都不太一樣、需語意理解 | 機率性、會有離群錯；強驗證＋抽樣不可省 |\n| 分批 + 可獨立回退 | 框住爆炸半徑、可逐批驗收 | 所有大規模變更 | 別貪快併成一個巨 PR；那會讓回退變不可能 |\n| 自動化驗證網兜底 | 接住離群的錯、是放手的前提 | 全部 | 驗證弱＝不該做 AI 大規模變更 |\n\n核心取捨：**確定性 vs 觸及範圍**。codemod 給你「可驗證」的保證，但只搆得到能被規則精確描述的變更；AI 搆得到更不規則、更需理解的變更，代價是失去「同樣輸入同樣輸出」的保證、引入機率性離群錯。明智的做法不是二選一，而是**分層**——能確定性的部分用 codemod，搆不到的殘餘部分才交給 AI，且這部分配上最強的驗證與抽樣。\n\n### 何時需要\n\n需要這套結構的訊號：變更**橫跨大量檔案**（多到無法逐一人工 review）；變更**同質**（同一種修改重複很多次）；有**夠強的自動化驗證**能接住錯（這是前提，不是加分項）。\n\n不該動用的訊號：變更**雖大但每處判斷都深**（不是苦工，是一千個獨立的設計決定——AI 會把它們全部用同一個淺判斷碾過去）；**驗證網薄弱**（沒有東西能抓離群錯，AI 大規模變更等於閉著眼睛改一千個地方）；**範圍其實能用確定性工具精確表達**（那就別引入機率性，直接 codemod）。\n\n### 常見誤解與陷阱\n\n- **「AI 改了一千處都對，所以全對」**：機率性工具的恐怖在於它可能 999 處對、1 處錯，而那 1 處你沒抽到。確定性 codemod 沒這問題（規則對則全對），AI 有——這正是抽樣與全域驗證不能省的原因。\n- **一個 PR 改一千個檔案**：審不動、回退不了、出事爆炸半徑無上限。分批不是潔癖，是把「可回退」這個安全屬性保住。\n- **驗證網薄還硬上**：自動化驗證的覆蓋率是你能放手的天花板。在沒有測試的系統上做 AI 大規模變更，是把「人逐一檢查」這道唯一的網也撤了。\n- **該用 codemod 卻用 AI**：能被規則精確描述的變更，用確定性工具天然更安全（可驗證、可重放）。為了「省得寫腳本」而改用機率性的逐處生成，是用可驗證性換一點點便利——不划算。\n- **AI 統一了風格卻抹掉了例外**：那些「看起來該跟著一起改、其實是刻意的歷史例外」的地方，是 AI 大規模變更最容易踩的雷。人定規則時要明確圈出「不准動」的清單，並在抽樣時優先盯這些點。\n\n### 延伸閱讀\n\n- Hyrum Wright (Google), *Large-Scale Changes* — *Software Engineering at Google*（第 22 章，確定性大規模變更與分批/驗證的工程實務，線上免費）：https://abseil.io/resources/swe-book/html/ch22.html\n- *Refactoring at Scale*（O'Reilly，Maude Lemaire；大規模重構的分批、驗證、回退策略）：https://www.oreilly.com/library/view/refactoring-at-scale/9781492075523/\n"}, {"id": "U-judgment", "file": "U-judgment.md", "group": "Part 0 — 透鏡：怎麼判斷、怎麼推動", "title": "U · 工程判斷與決策", "md": "# U · 工程判斷與決策\n\n這個領域解的是「**怎麼選**」這件事本身：當一個技術問題擺出多種合理解法時，用什麼框架決定走哪條路、付什麼代價、留什麼退路。本檔含七條判斷條目——決策的可逆性、自建 vs 採用、簡單性 vs 過度工程、技術選型流程、錯誤處理哲學、AI 如何移動這些判斷的天平，以及量級估算的容量直覺。它是讀後面每一條技術概念時要戴的「判斷眼鏡」（與它對偶的「推動眼鏡」在領域 T）；技術概念本身的機制不在這裡講，這裡只講「面對那些機制，你怎麼下注」。\n\n## 可逆 vs 不可逆決策（one-way / two-way doors）\n\n### 定義與原理\n\n決策的成本不只是「選錯的後果」，還包括「**反悔的代價**」。把這兩者拆開，就得到一個比「重要 vs 不重要」更有用的座標軸：**可逆 vs 不可逆**。Jeff Bezos 在 Amazon 2015 年致股東信裡用「單向門（one-way door）／雙向門（two-way door）」描述這件事——走過單向門，門就鎖上了，不喜歡也回不去，必須慢、必須謹慎、必須多方會診；雙向門則相反，走進去看一眼不對就退回來，可以快、可以由小團隊或個人直接拍板（2026-06 仍是業界廣用的決策語彙）。\n\n第一原理是：**決策速度應該與可逆性成正比，而不是與重要性成正比**。組織變大後最常見的退化，是把所有決策都套上「重大決策」的厚重流程，連雙向門也開三次評審會，結果是緩慢、過度規避風險、不敢實驗。判斷一個決策落在哪一端，問三個問題就夠：撤銷它要花多少工程時間？撤銷它會不會破壞已經外溢出去的狀態（別人已經依賴的資料格式、已經發出去的 API 契約）？撤銷時有沒有資料會永久遺失？\n\n### 解法空間\n\n面對一個決策，先分類再決定投入多少審議成本：\n\n- **判定可逆性**：列出「撤銷成本」——回滾要動幾個系統、有沒有不可逆的副作用（資料遷移、對外公開的契約、寫進別人快取的東西）。\n- **對雙向門：快速試錯**。直接做最小版本、上線觀察、不對就退。把決策權下放到最接近問題的人，不堆審議流程。\n- **對單向門：增加可逆性，把單向門改造成雙向門**。常見手段：feature flag（先暗度、可瞬間關掉）、灰階發布（canary，先放 1% 流量，見領域 Q）、雙寫過渡期（新舊並存、可切回，見領域 B 的零停機 schema 遷移）、抽象層隔離（把不可逆的選擇藏在介面後面，換掉時只動一處）。\n- **對「偽單向門」：拆小**。很多看似不可逆的大決策，其實是一串小決策捆在一起；拆開後多數是雙向門，真正不可逆的只剩一兩個，集中審議那一兩個即可。\n- **AI 維度**：AI 讓「先做一個能丟掉的原型」成本驟降——這把更多原本因「做了捨不得丟」而被當單向門的決策，變回雙向門（試了不對就刪、重來幾乎免費）。新陷阱是反過來：AI 一晚能生出一個跑得動的大型系統，讓團隊**誤以為**選型已驗證、實際是走進了沒人真正讀過、難以撤回的單向門（「能跑沒人懂」見本檔 AI 條目）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 快速試錯（不堆流程） | 決策延遲最低、學得最快 | 確認是雙向門 | 誤判可逆性時代價爆增；先驗證撤銷成本再快 |\n| feature flag 包起來 | 把單向門變雙向門，可瞬間回退 | 行為類改動、漸進放量 | flag 本身是技術債，要有清除機制；長期堆積會變成隱性分支地獄 |\n| 灰階 / canary | 小流量先驗證，限制爆炸半徑 | 上線風險高、可分流量 | 需要可觀測性支撐才看得出「對不對」（見領域 I） |\n| 抽象層隔離 | 把不可逆選擇藏在介面後 | 預期未來可能要換的元件 | 過早抽象本身有成本（見本檔簡單性條目）；抽象選錯比沒抽象更難拆 |\n| 拆小決策 | 把偽單向門拆成多數雙向門 | 看似巨大、不可逆的決策 | 拆解本身要花心力；別把真正的單向門也輕率拆掉 |\n\n保證的本質：可逆性不是天生的，是**可以買的**——上面每一招都是「花一點前置成本，換取反悔權」。適用條件：當撤銷成本高且不確定性也高時，這筆保險最划算；當你很確定、或撤銷本來就便宜時，買保險就是浪費。\n\n### 何時需要\n\n需要鄭重對待可逆性的場景：資料格式 / 儲存引擎選擇（資料一旦寫進去，遷移是大工程）、對外公開的 API 契約（別人依賴後你不能說改就改，見領域 H）、跨團隊共用的核心抽象、難以撤回的組織級流程。這些是真單向門，慢一點、會診一點是對的。\n\n反過來，over-engineering 的訊號是：**對雙向門也套用單向門的審議**——為一個改個內部函式名、加一個非公開端點、調一個快取 TTL 這種「五分鐘能改回來」的事開評審會。判準很簡單：先估撤銷成本，撤銷便宜就別審議。\n\n### 常見誤解與陷阱\n\n- **把「重要」當成「不可逆」**。一個決策可以同時很重要又很可逆（例如選哪個 CI 工具——影響每天工作，但要換隨時能換）。重要性決定要不要認真想，可逆性決定要不要慢。\n- **把「不可逆」當成「不能犯錯」**。即使是單向門，目標也不是零失誤，而是把失誤的後果控制在可承受範圍——所以才有 canary、才有先小規模驗證。\n- **忽略「外溢狀態」讓雙向門悄悄變單向門**。一個本來能回滾的部署，一旦它寫出了下游依賴的新資料、或客戶端快取了新行為，回滾就不再乾淨。任何會產生持久副作用的改動，可逆性都要重新評估。\n- **誤把「沒人會反對」當成「可逆」**。共識高不代表好撤回；這兩件事無關。\n\n### 延伸閱讀\n\n- Amazon 2015 Letter to Shareholders（one-way / two-way doors 原文）：https://s2.q4cdn.com/299287126/files/doc_financials/annual/2015-Letter-to-Shareholders.PDF\n- Martin Fowler, *Sacrificial Architecture*（刻意設計成可丟棄的系統）：https://martinfowler.com/bliki/SacrificialArchitecture.html\n\n## 自建 vs 採用與相依管理\n\n### 定義與原理\n\n每加一個相依（dependency），都是一筆**用「自己不寫」換「把一部分控制權交出去」的交易**。它替你省下開發與維護成本，代價是：你的系統現在會因為一個你沒寫、可能也沒讀過的東西而壞掉、變慢、或被攻擊。判斷的核心不是「自建好還是採用好」，而是「**這塊功能，是不是我的核心競爭力**」——是，傾向自建（你要能完全掌控、也願意長期養）；不是，傾向採用（別把心力花在不會讓你贏的地方）。\n\n兩端各有一個失敗症候群。一端是 **NIH（Not Invented Here）**：什麼都自己寫，重造輪子、養一堆只有自己懂的內部框架、把時間花在已被解決的問題上。另一端是**過度相依**：一個小功能拉進一棵巨大的相依樹，npm 一個專案動輒上千個 transitive dependency，每一個都是潛在的故障點與攻擊面。真實案例：2016 年 left-pad 事件，一個只有十一行的套件被作者撤下，連鎖讓大量專案無法建置；2024 年 xz utils 後門（CVE-2024-3094），攻擊者花數年潛伏進一個冷門但被現代 Linux 發行版幾乎無所不在地間接依賴（透過 systemd → sshd）的壓縮庫，差點在 SSH 認證前植入遠端後門（2026-06 仍是供應鏈攻擊的標準警世案例）。\n\n### 解法空間\n\n決定要不要加一個相依，以及如何控管已加的相依：\n\n- **核心 vs 非核心判準**：這塊是不是你的差異化來源？是→自建；否→採用成熟方案。\n- **採用前的盡職調查**：維護活躍度（最近 commit、issue 回應、有沒有單一維護者風險）、授權相容性（見本領域對授權的注意）、相依樹大小（拉一個進來實際帶幾個 transitive）、攻擊面（它要不要網路 / 檔案 / 子行程權限）。\n- **隔離相依**：用 adapter / 防腐層（anti-corruption layer）把第三方介面包在自己的介面後，讓「換掉它」只動一處（呼應本檔可逆性）。\n- **鎖定與來源驗證**：lockfile 釘死版本與雜湊（避免同一版號內容被掉包）、相依漏洞掃描接進 CI（見領域 I）、必要時把關鍵相依 vendor 進自己的倉庫或內部 mirror。\n- **「薄採用」**：採用標準協定 / 規格而非綁死某家實作（例如依賴 SQL、S3 API 這種有多家相容實作的介面），保留換供應商的退路。\n- **AI 維度**：AI 把「自建」的成本拉低——以前因為太費工而選採用的小工具，現在可能自己生一個更划算、且完全可控（程式碼在你手上）。新陷阱：AI 生成的程式碼可能默默內嵌或建議過時 / 不存在 / 名稱被搶註（typosquatting）的套件，等於替你開了一道供應鏈側門，採信前要驗。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 自建 | 完全掌控、無外部授權/供應鏈風險 | 核心競爭力、需求特殊、相依的維護風險高 | 你要永久維護它；別在非核心上做（NIH） |\n| 採用成熟開源/商用 | 省開發、享社群修補與生態 | 非核心、問題已被解決、有活躍維護 | 供應鏈風險、授權風險、維護者跑路風險；要做盡職調查 |\n| adapter 隔離後採用 | 享採用的省力又保留可換性 | 預期未來可能要換的第三方 | adapter 本身是成本；介面選錯一樣難換 |\n| 薄採用（依賴標準/協定） | 換實作不換程式碼 | 有多家相容實作的領域 | 標準的「相容」常有方言差，邊角仍會綁住 |\n| fork 並自維 | 取得掌控、可改 | 上游停更但你重度依賴 | 從此你扛全部維護，等於部分自建 |\n\n保證的本質：相依省的是**你現在的時間**，賠上的是**未來的掌控權與一條額外的故障/攻擊路徑**。適用條件：在非核心領域、相依成熟且活躍時，這筆交易划算；在核心、或相依脆弱（單一維護者、停更、授權有雷）時，掌控權的價值會超過省下的工。\n\n### 何時需要\n\n傾向自建：這塊是你贏的關鍵、需求夠特殊讓現成方案都要大改、或可選的相依都有明顯維護/授權風險。傾向採用：標準化的橫切問題（序列化、加密、HTTP server、訊息佇列…這些自建幾乎一定虧）、團隊沒有專長也不該培養的領域、有成熟且活躍的方案可用。\n\nover-engineering 的兩種形態都要警惕：在非核心上自建（NIH，把人力燒在不會讓你贏的地方），以及為了省幾行而拉進一棵巨樹（過度相依，買進一堆你不會用到卻要負責的攻擊面）。\n\n### 常見誤解與陷阱\n\n- **只看「省多少開發時間」，不看「日後維護與風險成本」**。相依的真實成本是整個生命週期的——升級、修漏洞、追上游破壞性變更、出事時 debug 一個你沒寫的東西。\n- **忽略 transitive dependency**。你直接依賴五個，實際拉進來可能上千個；攻擊面與授權風險是整棵樹的，不是你直接挑的那幾個。\n- **把「star 數多」當成「安全」**。熱門不等於有人在審安全（xz 案的庫並不冷門到沒人用，卻冷門到沒人盯維護權轉移）。要看的是**有效維護**，不是人氣。\n- **授權踩雷**。把 copyleft（如 AGPL）的東西當無條件免費用，可能反過來綁住你自己的程式碼；商用授權的免費層也常有配額或用途限制。引入前確認授權與你的散布方式相容。\n- **自建了卻不當核心養**。自建的前提是你願意長期維護它；寫完丟著沒人管的內部框架，比採用一個有社群的還糟。\n\n### 延伸閱讀\n\n- xz Utils 後門 CVE-2024-3094（供應鏈攻擊解剖，CISA 通報）：https://www.cisa.gov/news-events/alerts/2024/03/29/reported-supply-chain-compromise-affecting-xz-utils-data-compression-library-cve-2024-3094\n- OWASP, *Software Component Verification Standard*（相依盡職調查框架）：https://owasp.org/www-project-software-component-verification-standard/\n\n## 簡單性 vs 過度工程\n\n### 定義與原理\n\n過度工程（over-engineering）是替**還沒出現、可能永遠不會出現**的需求預先付出複雜度。它的兩個經典形態：**過早抽象**（為了「將來可能要支援多種 X」先蓋一層通用抽象，結果只有一種 X，抽象憑空增加了理解與修改成本）與**過早最佳化**（為了「將來可能很慢」先寫複雜的快取/平行/微優化，結果瓶頸根本不在那）。對抗它的兩句口號：**YAGNI（You Aren't Gonna Need It）**——源於 Extreme Programming，Kent Beck 等人的主張是「真的需要時才實作，不要因為預見可能需要就先做」；以及廣為流傳的「**過早最佳化是萬惡之源**」——出自 Donald Knuth 1974 年〈Structured Programming with go to Statements〉（Knuth 把它歸給 Hoare，Hoare 又歸回 Knuth，出處其實成謎；2026-06 仍是最常被引用的工程箴言之一）。\n\n但簡單性不是「永遠寫最笨的版本」。Knuth 那句完整是「我們該忽略小效率，約 97% 的時間：過早最佳化是萬惡之源；但別放過那關鍵的 3%」。真正的原則是：**複雜度要花在已被證實的需求上，不花在臆測的需求上**。簡單也不等於少寫程式碼——「簡單」指的是認知負擔低、容易理解與修改；有時為了真正的簡單反而要多寫一點（明確勝過聰明）。\n\n### 解法空間\n\n- **YAGNI / DTSTTCPW（do the simplest thing that could possibly work）**：先寫能解決當下需求的最直接版本，需求真的來了再演化。\n- **延後抽象（rule of three）**：常見經驗法則是「同樣的東西出現第三次再抽象」——前兩次的重複比抽錯的抽象便宜，第三次你也才真的看清共通模式。\n- **先量再優化**：最佳化前先 profiling / 壓測找出真瓶頸（見領域 I、S），對著數字優化那關鍵的 3%，別憑直覺。\n- **可演化優於完備**：把系統設計成容易往後改（清楚的邊界、可逆的決策），而不是一開始就猜中所有未來需求。這比「先建好通用框架」更穩，因為你猜未來通常會猜錯。\n- **明確優於隱晦**：用直白、好讀的寫法換低認知負擔；抗拒為了少幾行而上的「聰明」技巧。\n- **AI 維度**：AI 讓「先寫簡單版、要改再重來」更划算（重寫便宜了，更不需要為了省未來的重寫而先過度設計）。但 AI 也擅長**一鍵生出過度工程**——憑一句「做個有彈性的方案」就吐出一堆抽象層、設定開關、外掛點，全是 YAGNI 該砍的東西。它生得快，不代表你該留下。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| YAGNI / 最簡版本 | 認知負擔最低、最快交付 | 需求未定、未來不確定 | 真有已知近期需求卻硬不做，是另一種短視 |\n| rule of three 延後抽象 | 避免抽錯、用真實樣本抽象 | 重複才剛冒頭、模式未明 | 拖過頭會累積重複技術債；第三次出現要果斷抽 |\n| 先 profiling 再優化 | 心力花在真瓶頸 | 效能問題 | 沒量測就優化＝賭；但有些瓶頸要壓力夠大才現形 |\n| 預先建通用抽象 | 真有多變體時省事 | 變體已**確定**會出現且已知形狀 | 多數時候你猜錯形狀；抽象選錯比沒抽象更難拆 |\n\n保證的本質：簡單性買的是**改變的自由**——程式碼越少、抽象越少、巧思越少，未來要改方向時要拆的東西就越少。過度工程則是**賭未來會長成你猜的樣子**，賭對省一點、賭錯賠上一整層沒人需要又難拆的複雜度。實務上未來多半不照劇本，所以這場賭注的期望值通常為負。\n\n### 何時需要\n\n該預先投入複雜度的少數場景：那個「未來需求」其實是**已知的近期確定需求**（不是臆測）、或那個抽象/最佳化**事後再加的成本極高**（例如資料模型、對外契約這種改起來要驚動很多下游的東西——這類偏單向門，前期想清楚是對的，見本檔可逆性條目）。\n\nover-engineering 的訊號：抽象層只有一個實作、設定開關沒人切換過、為了「擴展性」加的外掛點從沒接過第二個外掛、優化的程式碼對著一個壓測證明不是瓶頸的地方。看到這些，砍掉就是淨賺。\n\n### 常見誤解與陷阱\n\n- **把 YAGNI 當成「不准做任何前瞻設計」**。YAGNI 反對的是「為臆測的需求預先實作」，不反對「為已知的近期需求留好演化空間」。已經明確要來的東西，先想是負責，不是過度工程。\n- **把「簡單」等同「程式碼短」**。一行密不透風的聰明寫法，認知負擔可能遠高於五行直白的。簡單是給讀的人的，不是給行數的。\n- **過早抽象的代價被低估**。錯的抽象比重複更貴：它把不該綁的東西綁在一起，每次要改其中一個變體都被另一個拖住，拆它比當初不抽象難得多。\n- **「以後一定會慢」式的恐懼驅動最佳化**。在沒有量測、流量也還沒到的情況下，為臆想的效能問題寫複雜程式碼，多半是把簡單系統先搞慢（指 debug 變慢、改起來變慢）。\n- **反向過頭——用 YAGNI 當藉口欠該還的債**。明知道下個 sprint 就要支援的東西硬說「還不需要」，是把短視包裝成紀律。判準永遠是「需求是已知近期的、還是臆測的」。\n\n### 延伸閱讀\n\n- Martin Fowler, *Yagni*（YAGNI 的精準定義與適用邊界）：https://martinfowler.com/bliki/Yagni.html\n- Donald E. Knuth, *Structured Programming with go to Statements*, ACM Computing Surveys, 1974（「過早最佳化是萬惡之源」原文脈絡）：https://dl.acm.org/doi/10.1145/356635.356640\n\n## 技術選型\n\n### 定義與原理\n\n技術選型是「在多個合理候選裡選一個，並承擔之後維護它的後果」的決策。它的特殊之處在於**資訊嚴重不對稱**：選的當下你掌握的是 demo、文件、benchmark 和別人的部落格——全是「順境資料」；而真正決定成敗的是逆境表現——它出事時好不好 debug、文件外的邊角、社群會不會幫你、以及最關鍵的**退場成本（cost of exit）**：選錯了要換掉它有多痛。很多技術選型的真正風險不在「它好不好」，而在「**它把你綁多深**」。\n\n第一原理：選型應該**降低不確定性後再下注**，而不是憑 demo 和直覺賭。降低不確定性的工具是 PoC（proof of concept）和 spike——拿你**自己的真實場景**去打它，特別是打那些 demo 不會展示的逆境（高併發、故障、奇怪輸入、營運半夜出事）。同時要在選之前就想好退場：這個決策偏單向門還是雙向門（見本檔可逆性條目）。\n\n### 解法空間\n\n- **明確需求與約束先行**：先寫下硬需求（must-have）與軟偏好（nice-to-have），避免被「最酷的技術」帶跑。沒有需求清單的選型是選心情。\n- **評估框架（decision matrix）**：列候選 × 評估維度（契合需求、維護活躍度、生態/社群、營運成本、團隊熟悉度、授權、退場成本…），各維度加權打分。它的價值不在分數本身，而在**逼你把隱性偏好攤開來討論**。\n- **PoC / spike**：用真實（或擬真）場景做小型驗證，重點打逆境——壓到它的極限、模擬故障、看它出事時的可觀測性與 debug 體驗，而非只跑 happy path demo。\n- **試生產（蹚雷區）**：在低風險的真實服務上先用，累積營運經驗，再決定要不要全面押注（呼應 canary 的精神，見領域 Q）。\n- **評估退場成本**：選之前就問「要換掉它要動多少東西」——資料能不能搬出來、有沒有標準介面可隔離、它滲進你多少程式碼。退場成本高的，當單向門慎選。\n- **AI 維度**：AI 能極快生出多個候選的 PoC 骨架、整理對照維度、爬文件做初步比較，壓縮評估的苦工。新陷阱：AI 給的對照常摻雜過時或編造的事實（版本、授權、預設值在它的訓練資料裡可能是舊的甚至錯的），任何時效性結論都要回官方來源驗（本書的時效事實都標 2026-06 並查官方，就是這個道理）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| decision matrix 打分 | 把隱性偏好攤開、可討論可追溯 | 多候選、多利害關係人 | 權重與分數帶主觀，別假裝它客觀；用來引導討論非取代判斷 |\n| PoC / spike | 用真實場景降不確定性 | 不確定它扛不扛得住你的場景 | 只打 happy path 等於沒打；要打逆境才有資訊量 |\n| 試生產（小範圍先上） | 取得真實營運經驗 | 退場成本高、想先蹚雷 | 要有回退方案，別讓「試用」變成不知不覺的全押 |\n| 跟既有技術（不選新的） | 零學習成本、團隊熟 | 新方案優勢不夠壓倒性時 | 熟悉度是真實價值，但別讓它變成拒絕一切新東西的藉口 |\n| 選大廠/主流 | 生態大、人才好找、不易停更 | 求穩、團隊變動大 | 主流不等於最適配你的場景；仍要對需求驗 |\n\n保證的本質：選型流程買的是**「下注前先把不確定性換成資訊」**。PoC 花的時間，是用來避免「全押之後才發現它在你的逆境下不行」這種昂貴錯誤的保險。適用條件：當退場成本高、且候選在你的真實場景下表現不明時，這筆前置投入最值；當決策可逆、或候選都明顯夠用時，過度評估本身就是 over-engineering。\n\n### 何時需要\n\n需要鄭重走完整流程（評估框架＋PoC＋評估退場）的：退場成本高的選擇（資料庫、訊息中介、核心框架、雲廠商鎖定——這些偏單向門）、團隊要長期依賴、或押錯影響面廣的決策。\n\n可以從簡的：可逆、影響面小、或團隊已有強烈既有偏好且該偏好夠合理的場景（例如已經全棧用某語言，再選個同生態的小工具，不必為它開評估矩陣）。為一個雙向門的小工具跑三週 PoC，就是把流程用過頭。\n\n### 常見誤解與陷阱\n\n- **被 demo 和 benchmark 騙**。廠商的 benchmark 是在對它最有利的條件下跑的；demo 永遠走 happy path。要信的是你自己拿真實場景打出來的數字。\n- **忽略退場成本，只比「功能」**。兩個功能相當的方案，退場成本可能差十倍——一個有標準介面隨時能換，一個讓你的程式碼到處是它的專有 API。選型要比的是「綁多深」，不只「現在好不好用」。\n- **「履歷驅動開發」（resume-driven development）**：選一個技術只因為它熱門 / 想學 / 好看，而不是因為它最適配需求。新潮和適配是兩回事。\n- **低估「無聊技術」的價值**。成熟、無聊、團隊熟的技術，故障模式已知、坑都有人踩過、半夜出事查得到解答——這種可預測性本身是巨大的價值，常勝過新技術那點性能或語法甜頭。\n- **把選型當一次性事件**。選完不是結束；要持續觀察它在生產的表現，並保留「發現選錯時撤回」的機制（這又回到可逆性）。\n\n### 延伸閱讀\n\n- Dan McKinley, *Choose Boring Technology*（「無聊技術」與創新額度的經典論述）：https://mcfunley.com/choose-boring-technology\n- ThoughtWorks Technology Radar（技術成熟度與採用建議的持續評估框架）：https://www.thoughtworks.com/radar\n\n## 錯誤處理哲學\n\n### 定義與原理\n\n每個會出錯的地方，都逼你回答一個哲學問題：**這個錯誤該讓誰知道、在哪一層處理、處理到什麼程度**。兩個極端立場：**fail-fast**——一偵測到不對就立刻、大聲地失敗，不帶著壞狀態繼續跑，把問題暴露在離源頭最近的地方；**韌性 / 容錯**——盡量讓系統在部分出錯時仍提供降級服務，不因為局部失敗就整體倒下。這不是二選一，而是**對不同錯誤該選不同立場**——關鍵是先把錯誤分類。\n\n分類的核心是兩個維度：**可不可恢復**（暫時性如網路抖動、可重試 vs 永久性如格式錯誤、重試也沒用）與**是不是 bug**（程式設計錯誤如空指標、邏輯違例 vs 預期內的營運狀況如下游逾時、輸入不合法）。第一原理：**程式設計錯誤該 fail-fast**（它代表你的假設破了，藏起來只會讓壞狀態擴散、更難 debug——呼應「分散式運算的謬誤」：對網路錯誤幾乎不做處理的程式會悄悄壞掉）；**預期內的營運錯誤該被當成正常控制流處理**（重試、降級、或乾淨地回報給呼叫端）。把這兩類搞混——對 bug 寬容（吞掉例外裝沒事）或對營運狀況苛刻（一個下游慢就整個崩）——是兩個方向的災難。\n\n### 解法空間\n\n對一個錯誤，能做的事就這幾種，差別在「在哪一層做、為什麼」：\n\n- **fail-fast（立刻失敗）**：偵測到違反不變式 / 不該發生的狀態就立刻爆，附足夠 context。適合 bug 與「繼續跑會擴散壞狀態」的情況。\n- **重試**：對暫時性、可恢復的錯誤重試——但做法（退避、jitter、上限）見領域 A 的「重試、退避、jitter」，這裡只決定「**這個錯該不該重試**」（冪等嗎？是暫時性的嗎？重試會不會放大成 retry storm？見領域 E）。\n- **傳播（propagate）**：自己處理不了就乾淨地往上拋，讓有足夠 context 的那一層決定——關鍵是**保留錯誤資訊、加上本層 context、不吞掉**。\n- **降級 / fallback**：回退到次優結果（快取的舊值、預設值、簡化功能），讓使用者拿到「不完美但可用」而非錯誤——機制見領域 P 的「fallback · 降級」，這裡只決定「**這個錯值不值得降級而非直接失敗**」。\n- **熔斷觸發**：當某依賴持續失敗，停止對它發請求以免拖垮自己——circuit breaker 的三態機制見領域 E，這裡只決定「哪些依賴的失敗該觸發熔斷」。\n- **錯誤分類與建模**：用明確、有型別的錯誤（帶錯誤碼、訊息、足夠 debug 的 context）取代裸 `Error` / 字串；讓上層能依型別決定怎麼處理。\n- **AI 維度**：AI 生成的程式碼有個系統性偏誤——傾向產出「看起來處理了錯誤」的程式碼（包個 try/catch、`return null`、log 一行就吞掉），happy path 漂亮、逆境靜默壞掉。Review AI 程式碼時，錯誤路徑是最該盯的：它有沒有把 bug 當營運狀況吞掉？有沒有把該傳播的錯誤靜默掉？\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| fail-fast | 把問題暴露在離源頭最近處、不擴散壞狀態 | bug、不變式違反、繼續跑會更糟 | 對外部服務一律 fail-fast 會犧牲韌性；用在「自己這層的假設破了」 |\n| 重試 | 吸收暫時性故障 | 暫時性、可恢復、且操作冪等 | 非冪等重試會重複副作用；無上限/無退避→retry storm（見領域 A、E） |\n| 傳播 | 讓有 context 的層決定，不過早決策 | 本層資訊不足以正確處理 | 別吞、別裸拋——要保留原因鏈並加本層 context |\n| 降級 / fallback | 局部失敗不變成整體失敗 | 有可接受的次優結果 | 降級要明示（別讓人以為拿到的是完整結果）；舊快取可能誤導 |\n| 吞掉錯誤（反例） | （表面上）不中斷 | 幾乎沒有正當場景 | 把 bug 變成靜默資料損壞，是最危險的反模式 |\n\n保證的本質：fail-fast 買的是**「壞狀態不擴散、問題好定位」**，代價是**可用性**（它真的會讓請求失敗）；韌性買的是**可用性**，代價是**複雜度與「掩蓋真實問題」的風險**（降級久了沒人發現底層壞了）。沒有普適最優——**你是在用可用性換可除錯性，或反過來**，選哪邊取決於這個錯誤是 bug 還是營運狀況、以及這條路徑對可用性多敏感。\n\n### 何時需要\n\n傾向 fail-fast：偵測到自己的不變式被違反、收到結構性非法的輸入（這是 bug 或攻擊，不是營運狀況）、繼續執行會寫出錯誤資料。**啟動期**尤其該 fail-fast——設定缺失、相依連不上，就該拒絕啟動而不是帶病上線（見領域 Q 的 config 管理）。\n\n傾向韌性 / 降級：面對外部依賴的暫時性故障（網路、第三方 API、下游服務）、且該功能對可用性敏感、又存在可接受的次優結果。判準：**錯誤的根因在「我家」還是「外面」**——我家的（bug、壞狀態）fail-fast，外面的（暫時性、預期內）盡量吸收。對所有錯誤一律 fail-fast 是脆弱，對所有錯誤一律吞掉降級是埋雷，兩者都是 over-engineering 反面教材。\n\n### 常見誤解與陷阱\n\n- **吞掉例外（swallowing）**：`catch` 了什麼都不做、或只 log 一行就繼續。這把可恢復的「需要處理的錯誤」變成靜默的資料損壞——最難 debug 的一類 bug，因為現場已經被吃掉了。\n- **裸 catch-all 蓋住 bug**。一個包山包海的 `catch (e)` 會連「空指標」這種程式 bug 一起吞掉，讓它偽裝成營運狀況。bug 該 fail-fast，別讓籠統的容錯把它藏起來。\n- **錯誤訊息丟失 context**。往上拋時把原因鏈砍掉、或換成沒資訊的字串，到了頂層只剩「something went wrong」——等於放棄了半夜出事時的可除錯性。每往上一層都該疊加 context、保留原因。\n- **把 fail-fast 和「沒有韌性」劃等號**。fail-fast 是「在正確的層、對正確的錯誤立刻失敗」，它和系統整體的韌性不衝突——一個元件 fail-fast，正是讓上層能乾淨地降級的前提。\n- **重試非冪等操作**。把「重試」當成萬靈丹套在所有錯誤上，會對非冪等操作造成重複副作用、對持續性故障造成 retry storm。重試前先問冪等與暫時性（見領域 A、E）。\n- **降級悄無聲息地長期掩蓋故障**。fallback 設計得太安靜，底層壞了好幾天沒人發現，因為使用者一直拿到「還行」的降級結果。降級必須可觀測——它觸發了就該有訊號（見領域 I）。\n\n### 延伸閱讀\n\n- L. Peter Deutsch et al., *The Fallacies of Distributed Computing*（為什麼對網路錯誤不處理會悄悄壞掉，Wikipedia 整理版）：https://en.wikipedia.org/wiki/Fallacies_of_distributed_computing\n- Joe Duffy, *The Error Model*（recoverable error vs bug 的分類哲學長文）：http://joeduffyblog.com/2016/02/07/the-error-model/\n\n## AI 怎麼移動判斷的天平\n\n### 定義與原理\n\n前面幾條判斷——自建 vs 採用、簡單性 vs 過度工程、可逆性、選型——背後都有一組**隱性的成本假設**：寫程式碼貴、原型貴、抽象貴、重寫貴。AI 輔助開發改變的不是這些判斷的**框架**，而是框架裡的**輸入數字**。當「生產程式碼」「做原型」「大規模重構」的成本被壓低一個量級，每一條判斷的損益平衡點都會移動。這條條目不講任何工具或 model（那些會過時），只講**哪些天平被推動了、推向哪邊、以及推動本身帶來什麼新風險**——這是原理層的東西，工具再換代也不腐。\n\n第一原理：**降低某件事的成本，會改變所有「為了省這件事而做的取捨」**。但有一個成本 AI 沒有降低、甚至升高了——**理解的成本**。AI 能讓你**擁有**一大堆能跑的程式碼，卻沒讓你**理解**它。判斷的天平因此多了一個新砝碼：「能跑沒人懂」的程式碼，是一種新型態的技術債與單向門。\n\n### 解法空間\n\n天平被推動後，對應的判斷與護欄要跟著調整：\n\n- **自建 vs 採用的線往「自建」移**：以前因「太費工」而採用的小工具，現在自己生一個可能更划算又完全可控。對應做法：把 AI 生成的「自建」當成**要 review、要測試、要長期維護**的程式碼對待，而非免費午餐——掌控權的前提是有人真的懂它。\n- **「過度工程」的判準不變，但要更警覺**：AI 讓寫複雜抽象變便宜，於是更容易**不知不覺**過度工程（它樂意憑一句話生出五層抽象）。對應做法：YAGNI 的紀律更重要，不是更不重要——便宜不是保留它的理由（見本檔簡單性條目）。\n- **可逆決策更可逆**：丟棄式原型的成本驟降，更多決策能變回雙向門（試了刪掉重來幾乎免費）。對應做法：善用這點多做試錯，但別把「AI 一晚生出的能跑系統」誤當成「已驗證的選型」。\n- **驗收取代撰寫，成為瓶頸**：當生成變快，**review、測試、理解**變成新的瓶頸與品質閘。對應做法：把判斷重心從「怎麼寫」移到「怎麼驗」——對 AI 產出要有明確的接受標準、要跑測試、要有人理解到能維護的程度（驗收與信任邊界的做法見領域 T 的 AI 協作條目）。\n- **守住「理解門檻」**：把「至少要有一個人能在不靠 AI 的情況下解釋並修改這段程式碼」當成合併條件。理解不到這個程度的程式碼，等於走進了單向門。\n\n### 各方案的保證與取捨\n\n| 判斷維度 | AI 把天平推向 | 對應的工程做法 | 新陷阱 |\n|---|---|---|---|\n| 自建 vs 採用 | 更傾向自建（生成成本↓） | 把生成碼當須維護的自建對待 | 生成碼可能內嵌過時/不存在的相依，要驗 |\n| 簡單 vs 過度工程 | 過度工程變更容易（憑一句話生一堆） | YAGNI 紀律更嚴、便宜≠該留 | 把「生得快」誤當「該保留」 |\n| 可逆性 | 更多決策變雙向門（原型便宜） | 多試錯、丟棄式驗證 | 把「能跑」誤當「已驗證」走進單向門 |\n| 撰寫 vs 驗收 | 瓶頸從寫移到驗 | 明確接受標準＋測試＋理解門檻 | review 變橡皮圖章、靜默吞錯（見錯誤處理條目）|\n\n保證的本質：AI 買的是**生產速度**，可能賠上的是**理解深度與長期可維護性**。適用條件：當產出有人真正驗收、理解、並當成自己的程式碼維護時，速度是淨賺；當產出沒人懂、只因「能跑」就合併時，你是在用未來的可維護性換現在的速度——而那筆債利息很高。\n\n### 何時需要\n\n幾乎所有前述判斷都該重新校準輸入數字：原型/實驗類決策（成本降最多，最該善用）、非核心小工具的自建 vs 採用（天平明顯移動）、大規模機械式重構（AI 做苦工最划算，方向與驗收仍由人定，見領域 T）。\n\n不該因為 AI 變便宜就放鬆的：核心競爭力的程式碼（仍要人深度掌控）、不可逆決策（生成快不代表驗證夠）、安全與正確性敏感路徑（生成碼的錯誤路徑尤其要盯）。把「AI 能做」當成「不需要判斷」，是這一波最大的 over-engineering 與失控來源。\n\n### 常見誤解與陷阱\n\n- **「能跑沒人懂」當成完成**。AI 生出通過測試的程式碼，不等於團隊理解它、能維護它。能跑是必要條件，不是充分條件；沒人懂的程式碼是會利滾利的技術債。\n- **把 review 退化成橡皮圖章**。當程式碼是 AI 大量生出的，人很容易因為「看起來合理 + 測試綠」就放行。但 review 的價值正是在生成變便宜後更高——它是少數還在人手上的品質閘。\n- **誤把「生成快」當「決策已驗證」**。一晚生出的可運行系統，只證明了「能組起來」，沒證明它在逆境、在你的真實負載下成立。選型仍需 PoC 打逆境（見本檔技術選型條目）。\n- **生成碼悄悄引入過時或幻覺相依**。AI 的相依建議可能來自舊訓練資料，或根本是編造的套件名（被搶註成惡意套件的攻擊面）。任何 AI 給的相依與時效性事實都要回官方來源驗（見本檔自建 vs 採用條目）。\n- **把錯誤處理交給 AI 的預設**。AI 傾向生出「表面處理了錯誤、實際靜默吞掉」的程式碼，逆境路徑是它最弱也最該被人盯的地方（見本檔錯誤處理哲學條目）。\n\n### 延伸閱讀\n\n- Google DORA, *DORA's 2024 research on AI in software development*（AI 對交付效能與品質的實證影響）：https://dora.dev/research/2024/dora-report/\n- Andrej Karpathy 對 AI 輔助開發工作流的公開討論（信任邊界與驗收的原理層觀點）：https://karpathy.ai/\n\n## 量級估算與容量直覺\n\n### 定義與原理\n\n量級估算（back-of-the-envelope / napkin math）是**在不建系統的前提下，用幾個已知的硬數字，把「這個設計大概會撞到哪面牆」算到正確的數量級**。它的目的不是精確（差兩三倍無所謂），而是**及早排除明顯行不通的方案、及早發現「這裡需要 cache / 分片」的訊號**——把昂貴的「建完才發現撐不住」提前到「白板上五分鐘就知道」。\n\n它倚賴一組刻在直覺裡的參考數字。經典的「Latency Numbers Every Programmer Should Know」量級（數量級仍成立，絕對值隨硬體演進，2026-06）：L1 cache 參考 ~0.5 ns、主記憶體參考 ~100 ns、SSD 隨機讀 4 KB ~150 µs（百微秒級）、同資料中心一次來回 ~0.5 ms、跨大陸來回 ~150 ms。換算成吞吐的天花板（2026-06 當代硬體量級）：單條 DDR5 記憶體頻寬約 48–64 GB/s（高速模組更高）；企業級 PCIe 5.0 NVMe SSD 隨機讀可達 250 萬–340 萬 IOPS（KIOXIA CM9 等 2024–2025 機種，高佇列深度下，來源見延伸閱讀），但這是裝置上限，真實應用受佇列深度、檔案系統、fsync 拖累常只摸到其零頭；10 GbE 網路理論上限 1.25 GB/s（10 Gbps ÷ 8）、實務持續吞吐約 0.9–1.18 GB/s。第一原理：**任何設計的吞吐都被它最先撞到的那面牆鎖住**——記憶體頻寬、磁碟 IOPS、網路頻寬、單核 CPU、或下游服務的處理率，五者取最小。估算就是找出那面牆在哪。\n\n### 解法空間\n\n- **拆成「每秒幾次操作 × 每次多大」**：把流量化成 QPS 與每次操作的資料量，分別撞到 IOPS 牆與頻寬牆。\n- **記住一把錨點數字並做換算**：上面那組（記憶體 ns 級、SSD µs 級且 IOPS 百萬級、網路 GB/s 級、跨區 ms 級）。**90/10 與 2 的次方心算**：1 天 ≈ 86,400 s ≈ 10⁵ s（記成「一天約十萬秒」最好用）；2¹⁰≈10³、2²⁰≈10⁶、2³⁰≈10⁹。\n- **找瓶頸（取最小天花板）**：把候選設計的每條路徑都對著對應的牆算一遍，最先撞到的就是瓶頸；其餘優化在它解掉前都沒意義。\n- **算「要不要 cache」**：比較「打後端的成本（延遲/QPS/IOPS）×命中率能省多少」與「快取一致性的代價」。讀多寫少、熱點集中、可容忍些許 stale → cache 划算（機制見領域 G）。\n- **算「要不要分片」**：當單機的某面牆（CPU、記憶體容量、單機 IOPS、單機連線數）擋住成長，就需要把負載切開（機制見領域 B 的分片、領域 M 的 consistent hashing）。估算告訴你「離牆還有多遠」。\n- **AI 維度**：AI 能快速幫你列數字、跑換算、生估算草稿，省去查表。但它給的硬體數字常是舊訓練資料（某代 SSD、某代網路），數量級多半對、絕對值要存疑——估算重點本就在數量級，但別把它報的精確數字當權威，撞牆與否的邊界數字要自己驗。\n\n**Worked example：一個讀取密集服務要不要加 cache、要不要分片**\n\n假設一個服務每秒 50,000 次讀請求（50K QPS），每次讀要從資料庫撈一筆約 4 KB 的資料。\n\n- **撞 IOPS 牆？** 若每次讀對應一次磁碟隨機讀：50K QPS → 需要 50,000 IOPS。對照企業級 NVMe 裝置上限（百萬級 IOPS）這看似輕鬆，**但**那是裝置裸測上限；真實 RDBMS 經查詢解析、鎖、MVCC、fsync 後，單機常只穩定供應數千到數萬量級的有效隨機讀。50K 已逼近單機現實上限 → **這是「需要 cache」的訊號**。\n- **cache 能省多少？** 假設熱點集中、命中率 90%：打到資料庫的讀降為 50K × 10% = 5K QPS，落進單機舒適區。代價是接受快取與資料庫間的最終一致與失效複雜度（見領域 G）。**結論：加 cache 划算。**\n- **撞頻寬牆？** 50K QPS × 4 KB = 200 MB/s。對照 10 GbE 上限（~1.25 GB/s）→ 用掉約 16%，**還沒撞牆**，頻寬不是這裡的瓶頸。\n- **要不要分片？** 若這 50K 還會成長到 500K QPS，cache 後仍有 50K 打到資料庫，逼近甚至超過單機有效 IOPS → 此時**單機那面牆擋住成長，需要分片**把寫入/讀取分散到多台（見領域 B / M）。估算讓你在「白板上」就看出 50K 量級加 cache 能撐、500K 量級非分片不可——不必等真的塞爆才知道。\n\n這串心算約一分鐘，省下的是「建完整套才發現單機資料庫撐不住」的數週返工。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| back-of-envelope 估算 | 數量級正確、五分鐘排除爛方案 | 設計初期、選型前、容量規劃 | 只保數量級，別當精算；錨點數字會隨硬體漂、要更新 |\n| 找瓶頸（取最小天花板） | 心力集中在真正的牆 | 任何效能/容量判斷 | 撞牆順序會隨負載特性變（讀密集 vs 寫密集牆不同） |\n| 估完再決定 cache | 避免無謂快取、也避免該快不快 | 讀密集、熱點集中 | 命中率是假設、要驗；一致性代價別漏算（見領域 G）|\n| 估完再決定分片 | 避免過早分片、也避免太晚 | 單機某面牆擋住成長 | 分片是高成本單向門，估準「離牆多遠」再動（見領域 B/M）|\n\n保證的本質：估算買的是**「用一分鐘的心算，換掉數週的盲目實作」**——它不保證設計對，只保證**明顯不對的設計被當場刷掉**。適用條件：在設計早期、數量級足以分勝負時最值；當方案都在同一數量級、差異要靠真實壓測才分得出時，估算就該讓位給 profiling（見領域 S）。\n\n### 何時需要\n\n該做估算的時刻：任何新設計動工前（先確認數量級可行）、選型時（這個方案的吞吐天花板夠不夠）、判斷要不要引入 cache / 分片 / 佇列這類複雜度時（先看離牆多遠，別憑感覺加）、容量規劃與成本估算時。\n\nover-engineering 的訊號：在數量級明明還差很遠時就上分片、上多層快取、上複雜的非同步管線——估算會告訴你「單機還能撐十倍」，那這些複雜度就是替臆想的規模提前付帳（呼應本檔簡單性條目）。反過來，完全不估、憑感覺判斷「應該夠快 / 應該要 cache」，是把賭注下在直覺上——而人對量級的直覺，在跨好幾個數量級時經常錯得離譜。\n\n### 常見誤解與陷阱\n\n- **把裝置裸測上限當應用可得吞吐**。SSD 標稱百萬 IOPS，不代表你的資料庫能跑到百萬——中間隔著檔案系統、鎖、MVCC、fsync、查詢解析，真實值常是裸測的零頭。估「牆」要用**有效**吞吐，不是 spec sheet。\n- **混淆 bit 與 byte**。網路常標 Gbps（bit），儲存與記憶體常標 GB/s（byte），差 8 倍。10 Gbps 是 1.25 GB/s 不是 10 GB/s——這個 8 倍誤差足以讓「撞不撞牆」的結論翻盤。\n- **錨點數字過時還照用**。「Latency Numbers」的**數量級關係**（記憶體比磁碟快幾個數量級、跨區比同區慢幾個數量級）穩定，但**絕對值**隨硬體演進——SSD 早已不是當年的 SSD。引用絕對值要更新（本條的當代數字標 2026-06）。\n- **忘記「最小天花板」原則**。算了 IOPS 撐得住就放心，卻沒算頻寬、CPU、或下游處理率——真正的瓶頸可能是你沒算的那面牆。要把每條路徑對每面牆都掃一遍，取最小。\n- **追求精確而非數量級**。估算糾結在「是 47K 還是 52K QPS」毫無意義——它的價值在「是 5 萬還是 5 百萬」這種數量級判斷。要的是 10 的次方對，不是個位數對。\n- **靜態估算忽略 ρ→1 的非線性**。把利用率推到接近 100% 時，延遲不是線性上升而是爆炸（排隊效應，直覺見領域 E）。估算「平均算得過來」不等於「尖峰扛得住」——要留餘裕，別把系統設計在貼著天花板跑。\n\n### 延伸閱讀\n\n- Jeff Dean / Peter Norvig, *Latency Numbers Every Programmer Should Know*（互動版，可看數字隨年份演進）：https://colin-scott.github.io/personal_website/research/interactive_latency.html\n- Simon Eskildsen, *napkin-math*（持續更新的當代硬體吞吐/成本錨點數字）：https://github.com/sirupsen/napkin-math\n- KIOXIA CM9 Series PCIe 5.0 NVMe SSD 規格（企業級隨機讀 IOPS 數字來源）：https://americas.kioxia.com/en-us/business/ssd/enterprise-ssd/cm9-r.html\n"}, {"id": "A1-delivery-semantics", "file": "A1-delivery-semantics.md", "group": "Part 1 — 訊息、交付與整合", "title": "A · 交付語意與重複處理", "md": "# A · 交付語意與重複處理\n\n本領域回答一件事：當訊息穿過會丟封包、會逾時、會重投的網路，**一筆事件到底被處理幾次**——零次、至少一次、還是剛好一次？這個檔含五條互相咬合的條目：先給「交付語意三選一」的全景，再展開 at-least-once 帶來的重複問題、拆穿 exactly-once 的真相，最後把兩個壓制重複的核心機制——**冪等（idempotency）**與**去重（dedup）**——講到機制級。這五條是後面所有訊息工具（SQS／Kafka／RabbitMQ…，領域 A 工具篇）與跨服務交付（outbox／saga，領域 A 順序篇）的共同地基；訊息順序、重試退避、DLQ、跨服務一致性等主題在本領域其他檔深講（見領域 A 順序篇與工具篇），本檔需要時才引用、不重複機制。\n\n## 交付語意三選一\n\n### 定義與原理\n\n交付語意（delivery semantics）描述的是：在「生產者 → broker → 消費者」這條鏈上，**同一筆訊息最終影響系統狀態的次數**。三種選項：\n\n- **at-most-once（至多一次）**：每筆訊息最多被處理一次，可能 0 次。實作上就是「不重試、不要求 ack」——送出去就忘（fire-and-forget）。丟了就丟了，但絕不重複。\n- **at-least-once（至少一次）**：每筆訊息保證被處理至少一次，可能多次。實作上就是「處理完才 ack，沒收到 ack 就重投」。不會掉，但會重複。\n- **exactly-once（剛好一次）**：每筆訊息對系統狀態的影響剛好一次。這是大家想要的，但它在「交付」這一層是不可能的（見「exactly-once 的真相」）——能達成的是 at-least-once 加上消費端去重後**看起來像** exactly-once。\n\n第一原理是一個無法迴避的取捨：**在不可靠網路上，你只能選擇「寧可丟、不重複」或「寧可重、不丟失」，不能兩者都要。** 根因是 ack 也會在網路上遺失——生產者送出訊息、broker 處理完回 ack，若 ack 在回程丟了，生產者無法區分「broker 沒收到」與「broker 收到了但 ack 弄丟」。它若重送就可能重複（at-least-once），若不重送就可能遺失（at-most-once）。沒有第三條路。\n\n### 解法空間\n\n三種語意各對應一組明確的工程選擇：\n\n- **要 at-most-once**：關掉重試、用 fire-and-forget transport。例如 Redis Pub/Sub——訊息只送給發佈當下在線的訂閱者，離線者永久錯過、無 replay（見 Redis Pub/Sub vs Streams，領域 A 工具篇）。UDP-style 的 metrics 上報（StatsD）也屬此類：掉幾筆取樣點不影響趨勢。\n- **要 at-least-once**：處理成功才 ack、逾時未 ack 就重投。這是絕大多數持久化佇列的**預設**——SQS、Kafka 的基本消費、RabbitMQ 的 manual ack 都落在這裡。代價是消費端必須自己處理重複（見「at-least-once 與重複處理」）。\n- **要「看起來像 exactly-once」**：at-least-once 的傳輸 + 消費端冪等或去重。沒有別條路；任何宣稱 exactly-once 的系統，拆開看都是這個組合（見「exactly-once 的真相」）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| at-most-once（fire-and-forget） | 絕不重複，可能丟 | metrics、log 取樣、即時但可丟的推播 | 丟訊息靜默無感，難察覺；不可用於金流／狀態變更 |\n| at-least-once（ack-on-success + retry） | 絕不丟，可能重複 | 大多數業務佇列的預設 | 消費端**必須**冪等或去重，否則一筆操作做兩次 |\n| at-least-once + 消費端去重 | 對外觀察=每筆影響一次 | 金流、扣庫存、發信、任何有副作用的處理 | 去重狀態需持久化＋有 TTL；跨副作用（如「呼叫外部 API」）的去重最難 |\n| broker 內建 FIFO/EOS | broker 邊界內 effectively-once（SQS FIFO 靠 5 分鐘去重視窗、Kafka EOS 靠交易，兩者機制不同） | 重複間隔落在去重視窗內（SQS）／同叢集 read-process-write（Kafka） | 只在該 broker 邊界內成立，跨系統就失效 |\n\n### 何時需要\n\n判準是**重複處理的代價**，不是「越強越好」：\n\n- **代價＝損失金錢或破壞不變量** → 要 exactly-once 觀感（at-least-once + 去重）。扣款、發券、扣庫存、寄帳單。\n- **代價＝可容忍、可後補對帳** → at-least-once 裸用即可。寄通知信（多收一封比漏收一封好）、快取失效、重算衍生資料。\n- **丟失比重複更可接受、且量大求快** → at-most-once。高頻 metrics、可取樣的 telemetry。\n\n升一級語意通常要付出延遲與吞吐：例如 Kafka 開啟交易性 EOS，社群實測約增加數毫秒延遲、降約 10–20% 吞吐（2026-06）。所以反向問句更有用：**「這條訊息重複處理一次，誰會痛？」** 沒人痛就別上 exactly-once。\n\n**Worked example**：一條推播管線每天 10 萬則訊息，broker 重投率 0.1%。at-least-once 下約 `100,000 × 0.1% = 100` 筆會被投遞兩次。若這是「發優惠券」，就是 100 張多發的券（真金白銀）→ 必須去重；若這是「你有一則新通知」的提醒，100 則重複提醒幾乎無感 → 裸 at-least-once 即可。同一個重投率，要不要加去重，由副作用代價決定。\n\n### 常見誤解與陷阱\n\n- **「我用了 exactly-once 的佇列，所以不用管重複」**——broker 的 exactly-once 只在它自己的邊界內成立。一旦消費者「收到訊息 → 呼叫外部支付 API → 然後才 ack」，那個外部呼叫就在 broker 的保證之外，照樣可能因消費者在 ack 前崩潰而重做。\n- **把「順序」和「不重複」綁在一起想**——它們是正交的。FIFO 給你順序，但順序不等於去重；at-least-once 可以有序也可以重複。\n- **以為 at-most-once 是「比較弱所以比較簡單」**——它在金流場景是災難（靜默丟款），「簡單」是因為它把難題（丟失）丟給了你沒注意的地方。\n- **把語意說成 broker 的屬性**——它其實是**端到端**的屬性。broker 給 at-least-once，但若你的消費者 ack 之後才開始處理（ack-then-process），你實際拿到的是 at-most-once。語意由「ack 的時機」決定，不只由 broker 決定。\n\n### 延伸閱讀\n\n- You Cannot Have Exactly-Once Delivery（Brave New Geek）：https://bravenewgeek.com/you-cannot-have-exactly-once-delivery/\n- Apache Kafka — Message Delivery Semantics（官方文件）：https://kafka.apache.org/documentation/#semantics\n- Amazon SQS — Standard vs FIFO queues（官方文件）：https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-queue-types.html\n\n## at-least-once 與重複處理\n\n### 定義與原理\n\n選了 at-least-once（多數系統的預設），就買下了一個義務：**消費端必須在「同一筆訊息出現兩次以上」時，仍只產生一次有效影響。** 重複從哪來？三個典型來源：\n\n1. **broker 重投**：消費者處理完、ack 在回程丟失，broker 逾時後重投同一筆。\n2. **生產者重試**：生產者送出、broker 的 ack 丟失，生產者重送，broker 真的收了兩筆。\n3. **消費者重啟/rebalance**：處理到一半崩潰、訊息回到佇列、被另一個 worker 接手重做前半段。\n\n很多人一聽到重複，反射動作是「做冪等」。但冪等只是解法空間裡的一個——**而且不是每種操作都改得成冪等**。完整的解法空間比冪等大。\n\n### 解法空間\n\n壓制 at-least-once 重複的辦法（由「改操作本身」到「在外圍擋」）：\n\n- **冪等操作（idempotent operation）**：把操作設計成「做 N 次＝做 1 次」。`SET status='paid'` 天生冪等；`balance = balance - 10` 天生不冪等（見「冪等 idempotency」）。\n- **唯一約束擋重（unique constraint）**：在資料庫對自然鍵或冪等鍵加 `UNIQUE`，重複插入直接撞約束失敗 → 當作「已處理」吞掉。讓資料庫替你做去重，最便宜可靠。\n- **去重表/去重視窗（dedup store）**：另存一張「已處理過的訊息 id」表，處理前先查、處理後寫入，過期清掉（見「去重 dedup」）。\n- **可重放設計（replay-safe）**：把處理寫成「依當前狀態算出目標狀態」而非「在當前狀態上累加」。重放整段也只收斂到同一結果——這是 event sourcing／狀態機 reduce 的核心性質（見 Event sourcing 與 CQRS，領域 K）。\n- **副作用搬進同一筆交易**：把「業務狀態變更」與「標記已處理」放進**同一個資料庫交易**一起 commit；要不一起成功、要不一起回滾，杜絕「業務做了但沒標記、於是重做」的縫隙（跨服務版的此手法＝outbox，見 outbox／saga，領域 A 順序篇）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 冪等操作 | 同一輸入重放=同一結果 | 操作本身可寫成「設定目標態」 | 累加型／呼叫外部 API 型操作改不成冪等 |\n| 唯一約束擋重 | 重複寫入被 DB 拒絕 | 有自然唯一鍵（order_id…） | 撞約束的錯要當「成功」處理、別當失敗重試 |\n| 去重表 + TTL | 視窗內同 id 只處理一次 | 無自然鍵、需顯式冪等鍵 | 「查→處理→寫」三步須原子，否則仍有縫；TTL 太短會放過遲到重複 |\n| 可重放（狀態收斂） | 整段重放收斂到同態 | event sourcing、reduce 型管線 | 副作用（發信、扣款）不會因「結果相同」就只發一次 |\n| 副作用 + 標記同交易 | 業務與「已處理」同生同滅 | 副作用落在同一個 DB | 跨 DB／跨服務就退化成 dual-write 問題（見領域 L） |\n\n### 何時需要\n\n只要傳輸是 at-least-once（多數情況），消費端就**一定**要選上面至少一招。選哪招的判準：\n\n- **有自然唯一鍵** → 優先唯一約束，最省事最可靠。\n- **操作能寫成設定目標態** → 優先冪等操作，連去重表都省了。\n- **操作是累加或呼叫外部副作用、又無自然鍵** → 去重表 + 顯式冪等鍵。\n- **副作用落在同一個 DB** → 把它和「已處理標記」綁進同交易。\n\n### 常見誤解與陷阱\n\n- **「冪等＝去重」混為一談**——冪等是**操作的數學性質**（f(f(x))=f(x)），去重是**外圍擋掉重複的機制**。你可以用去重表讓一個不冪等的操作對外表現得像冪等，但它本身仍不冪等。\n- **「查了去重表沒有，就放心處理」卻沒上鎖**——「查→沒有→處理」之間若有第二個 worker 也在查，兩個都查到「沒有」、兩個都處理。去重的「查與寫」必須原子（唯一約束或 `INSERT ... ON CONFLICT` 一步到位），否則去重本身有 race（見去重 dedup 的並發陷阱）。\n- **把「回應失敗」一律當「沒做」而重試**——外部 API 回 500 或逾時，可能是「真的沒做」也可能是「做了但回應丟了」。盲目重試非冪等操作＝可能做兩次。這正是冪等鍵要由呼叫端帶、讓被呼叫端去重的理由。\n\n**Worked example**：一張 `payments` 表，業務鍵是 `order_id`。即使支付事件被投遞三次，只要 `UNIQUE(order_id)` 存在，第二、三次 `INSERT` 都撞約束失敗；消費者把「unique violation」解讀為「這筆已處理過」並 ack 掉，最終 `payments` 裡只有一列。零去重表、零鎖，靠資料庫的唯一約束就擋掉了 at-least-once 的全部重複。\n\n### 延伸閱讀\n\n- Designing robust and predictable APIs with idempotency（Stripe Engineering）：https://stripe.com/blog/idempotency\n- Implementing Stripe-like Idempotency Keys in Postgres（brandur.org）：https://brandur.org/idempotency-keys\n- Apache Kafka — Message Delivery Semantics（官方文件）：https://kafka.apache.org/documentation/#semantics\n\n## exactly-once 的真相\n\n### 定義與原理\n\n「exactly-once」是分散式系統裡最被誤用的詞。要拆清楚，先把它劈成兩半：\n\n- **exactly-once delivery（剛好投遞一次）**：在不可靠網路上**不可能**。這是兩將軍問題（Two Generals Problem）的直接推論——任一方都無法確知對方是否收到自己最後一則訊息，要確認就得確認的確認，無窮回歸。沒有任何協定能在有限訊息內讓雙方達成「都確定對方收到了」的共同知識。\n- **exactly-once processing（剛好處理一次的效果）**：**可能**，但它不是某種神奇的單次投遞，而是 **at-least-once 投遞 + 消費端去重/冪等** 的合成結果。訊息可能投來三次，但對系統狀態的**淨影響**恰好一次。\n\n所以真相一句話：**沒有 exactly-once delivery，只有「at-least-once delivery + effectively-once processing」。** 任何號稱 exactly-once 的產品，拆開都是這個組合，差別只在「去重做在哪一層、你能不能信」。\n\n### 解法空間\n\n達成 effectively-once processing 的辦法（即「在 at-least-once 之上補去重」的各種落點）：\n\n- **broker 內建去重**：broker 在它的邊界內替你去重。SQS FIFO 在 5 分鐘去重視窗內、對同一 `MessageDeduplicationId` 只投一次（2026-06）；Kafka 的冪等生產者給每個 producer 一個 PID、對每個 partition 維護遞增序號，重送的訊息因序號重複被 broker 直接丟棄。\n- **broker 交易 + 消費端隔離**：Kafka 交易把「讀-處理-寫」綁成原子單元，配 `read_committed` 消費者只讀已提交的訊息，達成 stream 處理鏈內的 EOS（2026-06）。但這只在 Kafka 自家 topic 之間成立。\n- **消費端自管去重**：broker 給 at-least-once，去重邏輯由你在消費端用冪等鍵/去重表/唯一約束做（見「冪等」「去重」）。最通用、跨任何 broker，但要自己保證原子性。\n- **副作用接收端去重**：去重做在最終的副作用端（如支付閘道用你帶的冪等鍵去重），整條鏈即使每段都重投，最終那一次扣款仍只發生一次。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| SQS FIFO 去重視窗 | 5 分鐘內同 dedup id 只投一次 | 同佇列、重複間隔 < 5 分 | 超過 5 分視窗的重複擋不住；只在 SQS 邊界內 |\n| Kafka 冪等生產者 | 同 producer 對同 partition 不寫重複 | 生產者重試導致的重複 | 跨 producer session／跨 partition 不保證，需開交易 |\n| Kafka 交易 + read_committed | topic 間 read-process-write 原子 | Kafka Streams 處理鏈 | 出了 Kafka（呼叫外部 API、寫外部 DB）即失效 |\n| 消費端去重表/冪等鍵 | 端到端 effectively-once | 跨任意 broker、含外部副作用 | 自管原子性與 TTL；最通用但最費工 |\n\n### 何時需要\n\n- **重複會損失金錢/破壞不變量** → 需要 effectively-once，且**必須一路做到副作用端**。光靠 broker 的內建 exactly-once 不夠，因為副作用通常在 broker 之外。\n- **全鏈都在單一 broker 內（如純 Kafka Streams 拓樸）** → 可直接吃 broker 的交易型 EOS，省下自管去重。\n- **重複可容忍** → 別碰 exactly-once，留在 at-least-once，把省下的延遲與吞吐拿去做別的。\n\n### 常見誤解與陷阱\n\n- **把 broker 行銷的「exactly-once」當成「我什麼都不用做」**——它幾乎總是限定在「broker 自己的邊界內」。你的消費者一旦對外做副作用，保證就斷在邊界上。\n- **以為 exactly-once delivery 真的存在**——不存在，這是定理級的不可能。看到產品文件寫 exactly-once，要追問「是 delivery 還是 processing、邊界畫在哪」。\n- **混淆「冪等生產者」與「跨重啟去重」**——Kafka 的冪等生產者在**單一 producer session 內**對單一 partition 去重；producer 重啟換了 PID，或寫到多個 partition 當一個邏輯單元，就得升級到交易，光靠冪等生產者不夠。\n- **用 effectively-once 當藉口跳過對帳**——再嚴謹的去重也有視窗、有故障窗口。金流場景仍需獨立的對帳機制兜底（見 reconciliation，領域 L）。\n\n**Worked example**：一筆扣款訊息被 SQS 投了兩次。若兩次間隔 30 秒、且生產時帶了相同 `MessageDeduplicationId`，SQS FIFO 在 5 分鐘視窗內擋掉第二次——broker 層 effectively-once 成立。但若這兩次間隔 6 分鐘（例如毒訊息進 DLQ、人工 6 分鐘後重放），就超出視窗、第二次會真的投達；此時唯一防線是消費端用 `order_id` 的唯一約束擋第二次扣款。這說明 broker 去重只是第一層，跨越其視窗/邊界的重複，仍要消費端自己擋。\n\n### 延伸閱讀\n\n- The Two Generals' Problem（Wikipedia 條目，附原始推論）：https://en.wikipedia.org/wiki/Two_Generals%27_Problem\n- Exactly-Once Semantics Are Possible: Here's How Apache Kafka Does It（Confluent）：https://www.confluent.io/blog/exactly-once-semantics-are-possible-heres-how-kafka-does-it/\n- Apache Kafka — Message Delivery Semantics（官方文件）：https://kafka.apache.org/documentation/#semantics\n\n## 冪等 idempotency\n\n### 定義與原理\n\n冪等（idempotency）的數學定義很短：對操作 f，`f(f(x)) = f(x)`——做一次和做很多次，結果（系統狀態）相同。HTTP 規格早就把這寫進方法語意：`GET`／`PUT`／`DELETE` 被定義為冪等，`POST` 不是。冪等不是「不報錯」，而是「重複執行不改變淨效果」。\n\n天生冪等 vs 天生不冪等：\n\n- **冪等**：`SET status = 'shipped'`、`PUT /users/42 {name:'Alice'}`、`DELETE /orders/7`——它們設定的是**目標狀態**，重放只是把狀態再設到同一個值。\n- **不冪等**：`balance = balance - 10`、`counter++`、無唯一鍵的 `INSERT INTO logs ...`、`POST /charges`（每次都建一筆新的）——它們是**相對當前狀態的累加或新建**，做兩次就是兩倍。（`INSERT` 的冪等性其實取決於有無唯一鍵：裸 `INSERT` 不冪等，帶 `UNIQUE`／`ON CONFLICT` 後重複插入會被擋、對外表現為冪等，與下文「唯一約束擋重」呼應。）\n\n不冪等的操作要在 at-least-once 下安全，通用解是**冪等鍵（idempotency key）**：呼叫端為「同一個邏輯操作」產生一個唯一鍵，被呼叫端用這個鍵記住「這個操作我做過了、結果是什麼」，重送同鍵就回放上次的結果、不再重做。這把「不冪等的操作」包裝成「對外冪等的端點」。\n\n### 解法空間\n\n讓一個操作對外冪等的辦法：\n\n- **重寫成設定目標態**：能改就改。把 `balance -= 10` 改成「依事件序列算出應有餘額再 `SET`」（需狀態機/event sourcing 配合，見領域 K）。\n- **冪等鍵 + 結果快取**：呼叫端帶 `Idempotency-Key`，server 第一次處理後把「狀態碼 + 回應 body」存起來綁這把鍵；重送同鍵直接回放存好的回應，連業務邏輯都不重跑。這是 Stripe 等支付 API 的標準做法。\n- **唯一約束當冪等閘**：用業務鍵或冪等鍵在 DB 加 `UNIQUE`，重複請求撞約束 → 視為已處理（見「at-least-once 與重複處理」）。\n- **conditional write / CAS**：帶版本號或 ETag 的條件更新，只在「狀態還是先前讀到的那個」時才寫，重放因版本已變而落空（見樂觀並發控制，領域 B）。\n\n**冪等鍵生命週期**（這條是本書冪等的 owning 落點，講清楚四個階段）：\n\n```\n# 示意，非可執行\n1. CREATE  client 產生 key（建議 V4 UUID 或足夠亂度的隨機字串），\n           綁定「一個邏輯操作」，放進 Idempotency-Key header。\n2. CLAIM   server 第一次見到 key：原子地 INSERT 一筆「處理中」記錄\n           （唯一約束擋並發重入），開始處理。\n3. STORE   處理完成：把 (status_code, response_body) 連同 key 落地。\n           關鍵——成功與失敗都要存，這樣重送會拿到一致結果。\n4. EXPIRE  key 過 TTL 後清除（Stripe 為 24 小時，2026-06）。\n           TTL 內重送回放結果；TTL 外視為新請求。\n```\n\n**client vs server 的責任分工**：呼叫端（client）負責**產生並在重試時沿用同一把鍵**——關鍵是「同一個邏輯操作的所有重試用同一把鍵，不同操作用不同鍵」。被呼叫端（server）負責**用這把鍵去重、儲存結果、設定 TTL、並校驗參數一致**（同鍵但 body 不同要報錯，避免誤用）。client 換鍵或 server 不去重，任一方失職，冪等就破。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 重寫成設定目標態 | 操作天生冪等、零額外狀態 | 狀態可由輸入算出 | 累加型、外部副作用型改不動 |\n| 冪等鍵 + 結果快取 | 同鍵重送回放同結果（含錯誤） | 支付、建單等有副作用的 POST | 須存成功與失敗；TTL 要涵蓋重試窗；參數變要報錯 |\n| 唯一約束當閘 | 重複落地被 DB 拒 | 有唯一業務鍵 | 撞約束須當「已處理」、別當失敗 |\n| conditional write / CAS | 只在版本符時才生效 | 樂觀並發、版本化資源 | 重放會「失敗」，呼叫端要能解讀為「已被處理」 |\n\n### 何時需要\n\n- **操作有副作用且傳輸是 at-least-once** → 一定要冪等，否則重複＝重複扣款/重複發貨。\n- **對外提供寫 API（尤其 POST）** → 提供 `Idempotency-Key` 是專業 API 的基本盤，讓呼叫端能安全重試。\n- **純讀、或操作天生冪等（PUT 設定值）** → 不必額外做冪等鍵，本來就安全。\n- **內部一次性、絕不重試的批次** → 過度設計，別硬加冪等層。\n\n### 常見誤解與陷阱\n\n- **「我的端點是 PUT 所以一定冪等」**——HTTP 方法的冪等是**規格約定**，不是你實作自動滿足的。若你的 `PUT` 內部偷做了 `audit_count++` 之類累加，它就不冪等了。方法名是承諾，實作要兌現。\n- **冪等鍵只存「成功」結果**——若第一次處理失敗（如 500），沒存結果，重送會重跑業務邏輯，可能這次成功但與「上次到底做了沒」狀態不一致。Stripe 的做法是**成功與失敗都存**，重送一律回放第一次的結果。\n- **TTL 設太短**——重複可能在 TTL 之外才到（DLQ 重放、慢重投）。TTL 必須涵蓋你系統最壞的重試/重投窗口，否則去重視窗一過，冪等就形同虛設。\n- **「CLAIM 不原子」**——兩個帶同鍵的請求同時到、都查到「沒處理過」、都開始處理。CLAIM 那步必須靠唯一約束或原子 `INSERT` 一步擋掉並發重入，否則冪等鍵自己有 race。\n- **把冪等鍵和業務鍵混用**——冪等鍵是「這次請求」的去重鍵，業務鍵（order_id）是「這個實體」的身分。同一筆訂單的「建立」和「取消」是兩個操作、該用兩把冪等鍵，別共用。\n\n**Worked example**：支付 API 收到帶 `Idempotency-Key: 7f3a...` 的建單請求，第一次處理成功、回 `201` 並把「狀態碼 201 + 回應 body」綁這把鍵存 24 小時。客戶端因連線逾時（其實 server 已成功、只是回應丟了）用**同一把鍵**重送——server 查到鍵存在，直接回放那筆 `201` 與原 body，**業務邏輯一行都沒重跑**，所以只建了一張單、只扣一次款。若客戶端這次換了把新鍵重送，server 會當成全新請求 → 建出第二張單。「重試沿用同鍵」是整個機制能成立的前提。\n\n### 延伸閱讀\n\n- RFC 9110 §9.2.2 Idempotent Methods（HTTP 語意，IETF）：https://www.rfc-editor.org/rfc/rfc9110.html#name-idempotent-methods\n- Stripe API — Idempotent requests（官方文件）：https://docs.stripe.com/api/idempotent_requests\n- IETF draft — The Idempotency-Key HTTP Header Field：https://datatracker.ietf.org/doc/draft-ietf-httpapi-idempotency-key-header/\n\n## 去重 dedup\n\n### 定義與原理\n\n去重（dedup）是「在 at-least-once 之上，外圍擋掉重複訊息」的機制。它和冪等的分工：冪等改的是**操作本身的性質**，去重不碰操作、而是在操作前**判斷「這筆我見過嗎」**，見過就跳過。去重讓一個不冪等的操作對外表現得像只執行一次。\n\n任何去重方案都要回答三個問題，這三個問題構成去重的三個軸：\n\n- **key（去重鍵）**：用什麼判斷兩筆是「同一筆」？訊息 id、業務自然鍵（order_id）、或內容雜湊（content-based，對 body 取 SHA-256）。鍵選錯——太粗會誤殺不同訊息，太細會放過真重複。\n- **window（去重視窗）**：記住「見過」這件事記多久？永久（成本爆炸）、固定 TTL（如 SQS FIFO 的 5 分鐘）、或滑動視窗。視窗決定了「能擋住間隔多久的重複」。\n- **store（去重儲存）**：「見過的鍵」存哪？記憶體（快但重啟即失憶、跨節點不共享）、Redis（共享、可設 TTL）、或關聯式 DB 的唯一約束（持久、原子）。store 決定了去重的可靠性與並發正確性。\n\n### 解法空間\n\n按三軸的不同組合，去重落成幾種典型做法：\n\n- **DB 唯一約束去重**（key=業務鍵，window=永久，store=DB）：對自然鍵加 `UNIQUE`，重複插入撞約束。最可靠、原子、不需額外清理，但鍵必須持久存在。\n- **去重表 + TTL**（key=訊息 id/冪等鍵，window=TTL，store=DB/Redis）：另開一張「已見鍵」表，處理前 `INSERT ... ON CONFLICT DO NOTHING`，過期自動清。通用，但要管 TTL 與清理。\n- **broker 內建去重**（key=dedup id，window=固定，store=broker 內部）：SQS FIFO 5 分鐘視窗、Kafka 冪等生產者的 PID+序號。零自管，但只在 broker 邊界與視窗內。\n- **機率型去重**（key=雜湊，window=滑動，store=Bloom filter）：用 Bloom filter 記「可能見過」，省記憶體但有偽陽（可能誤判「沒見過的」為「見過」而漏處理）。只適合「漏掉個別重複可容忍」的場景。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| DB 唯一約束 | 持久、原子、永久去重 | 有自然唯一鍵 | 撞約束須當「已處理」；鍵須持久 |\n| 去重表 + TTL（Redis/DB） | 視窗內同鍵只處理一次 | 無自然鍵、需顯式鍵 | 「查+寫」須原子；TTL 須涵蓋最壞重投窗 |\n| SQS FIFO 內建（2026-06） | 5 分鐘視窗內去重 | 同佇列、近距重複 | 跨 5 分鐘、跨佇列失效 |\n| Bloom filter | 省記憶體的近似去重 | 海量、可容忍偶爾漏 | 偽陽會讓真實訊息被誤當重複而漏掉 |\n\n### 何時需要\n\n- **操作改不成冪等、又無法靠唯一約束** → 用去重表 + 顯式冪等鍵。\n- **有自然唯一鍵** → 直接唯一約束，是最省事的去重，連去重表都免。\n- **重複幾乎只在短時間內成簇出現（生產者重試造成）** → broker 內建的短視窗去重就夠，別自建。\n- **狀態算得出來、整段可重放收斂** → 用可重放設計（見「at-least-once 與重複處理」），可能根本不需要去重表。\n\n### 常見誤解與陷阱\n\n- **「查→處理→寫去重表」三步非原子**——這是去重最經典的 race：兩個 worker 同時查、都查到「沒見過」、都處理。正解是把「查與寫」壓成一步原子操作——`INSERT ... ON CONFLICT DO NOTHING` 或 `SET key NX`（Redis）的回傳值直接告訴你「是不是第一個插進去的」，是才處理，否則跳過。別先 `SELECT` 再 `INSERT`。\n- **TTL 短於重投窗**——去重視窗 5 分鐘，但 broker 的最大重投延遲、DLQ 人工重放可能跨數小時。視窗一過，那筆「其實見過」的訊息被當新的處理。TTL 必須 ≥ 系統最壞重投/重放間隔。\n- **去重存在記憶體裡**——程式重啟、節點崩潰，「見過」的記錄全沒了，重啟後第一波重複全部漏網；多節點下各節點記憶體不共享，A 節點去重的鍵 B 節點不認得。需共享、持久的 store。\n- **content-based 去重鍵的範圍踩雷**——SQS content-based dedup 對 message body 取 SHA-256、但**不含 message attributes**（2026-06）。若兩筆 body 相同、只有 attribute 不同（如不同的 trace id），會被誤判為重複而擋掉第二筆。內容雜湊去重要確認雜湊涵蓋了所有「區分兩筆訊息」的欄位。\n- **以為 broker 去重就免了消費端去重**——broker 去重只在它的視窗與邊界內。跨視窗、跨 broker、或消費者在 ack 前崩潰造成的重做，仍要消費端自己擋。\n\n**Worked example**：一條訊息因生產者重試被送進去重表三次，去重鍵＝訊息的冪等鍵。消費者用 `INSERT INTO processed_ids(key) VALUES (:k) ON CONFLICT DO NOTHING RETURNING key`：第一次回傳該 key（插入成功）→ 繼續處理；第二、三次 `RETURNING` 為空（衝突、沒插入）→ 直接 ack 跳過。即使三筆併發抵達，資料庫的唯一約束保證只有一筆能插入成功，去重的原子性由 DB 兜底，消費端不需自己上鎖。`processed_ids` 設 TTL（如 7 天）定期清，涵蓋最壞重投窗即可。\n\n### 延伸閱讀\n\n- Amazon SQS — Using the message deduplication ID（官方文件）：https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/using-messagededuplicationid-property.html\n- Apache Kafka — Idempotent Producer（KIP-98 設計文件）：https://cwiki.apache.org/confluence/display/KAFKA/KIP-98+-+Exactly+Once+Delivery+and+Transactional+Messaging\n- Bloom Filters by Example（資料結構機制）：https://llimllib.github.io/bloomfilter-tutorial/\n"}, {"id": "A2-ordering-cross-service", "file": "A2-ordering-cross-service.md", "group": "Part 1 — 訊息、交付與整合", "title": "A · 順序、重試與跨服務交付", "md": "# A · 順序、重試與跨服務交付\n\n訊息系統把「送到」這件事拆成許多保證：訊息該不該照順序到、送不到時怎麼重投、重投太多次怎麼隔離、跨多個服務怎麼讓一筆業務要嘛全成要嘛可補償、對外的回呼怎麼確認真的是對方送的。本檔收六條：訊息順序、重試／退避／jitter、DLQ 死信、outbox／saga、webhooks、序列化與 schema 演進。邊界上：交付語意三選一與冪等／去重的定義在本領域的交付篇深講（見 交付語意三選一，領域 A；見 冪等 idempotency，領域 A），本檔只引用不重述；retry storm 的放大機制在領域 E、timeout／budget 在領域 P；資料庫結構變更（加欄位、改型別）在 零停機 schema 遷移（領域 B），本檔的「序列化與 schema 演進」只管線上協定（wire）相容，兩者互引。\n\n## 訊息順序 ordering（FIFO / partition key）\n\n### 定義與原理\n\n訊息順序保證的是：consumer 看到的訊息次序，與某個「應該的次序」一致。但「應該的次序」幾乎從不是「全域所有訊息的單一總序」——那要全系統序列化，吞吐立刻塌掉。實務上要的是**每個鍵（key）內的順序**：同一個帳戶的扣款照發生順序、同一個訂單的狀態轉移照轉移順序，而不同帳戶之間誰先誰後無所謂。\n\n第一原理只有一條：**順序只能在「單一序列化點」上保證**。一個 partition、一條 log、一個 FIFO message group，本質都是一條被單執行緒化的尾巴，append 有先後、讀也有先後。一旦同一個鍵的訊息散落到多個 partition、或被多個 consumer 並行處理，順序就沒了。所以「保 partition 內順序」與「用 partition 換並行度」是同一枚硬幣的兩面：partition 越多越能並行，但跨 partition 無序。\n\n### 解法空間\n\n- **partition key（雜湊分流）**：對業務鍵（如 `account_id`）取雜湊決定 partition，同鍵恆入同一 partition，於是同鍵有序、跨鍵並行。Kafka、SQS FIFO 的 message group ID、Kinesis 的 partition key 都是這套。\n- **單 partition / 單佇列**：整個 topic 只有一個 partition，全域有序——但吞吐被一條尾巴鎖死，只適合低速控制流。\n- **consumer 端維持單執行緒 per key**：broker 不保證順序，但 consumer 按 key 路由到同一個工作執行緒序列化處理（如以 key 為鎖）。把順序責任搬到應用層。\n- **sequence number + 重排**：訊息帶單調遞增序號，亂序到達時 consumer 緩衝、依序號重排後再交付。容忍亂序傳輸、代價是緩衝與 gap 等待。\n- **版本／時間戳，放棄順序改用 LWW**：不保證順序，靠每筆帶版本，收到舊版本就丟（last-write-wins）。不是順序保證，是「無序也能收斂」的替代設計（見 衝突解決，領域 L）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| partition key 雜湊 | 同 key 內 FIFO；跨 key 無序 | 高吞吐、天然可分鍵的事件流 | key 傾斜（hot key）讓單 partition 過載；partition 數一旦上線難縮 |\n| 單 partition / 單佇列 | 全域 FIFO | 低速控制平面、審計 log | 吞吐被單序列化點鎖死，無法水平擴展 |\n| consumer 端 per-key 序列化 | 應用層保同 key 有序 | broker 不保證順序時補救 | 需自管 key→worker 路由與背壓；crash 後 in-flight 順序要復原 |\n| sequence number + 重排 | 重排後依序交付 | 多路徑傳輸、容忍亂序 | 緩衝佔記憶體；缺號要等或補洞，等多久是個策略決定 |\n\nKafka 的細節值得記住：要在**有重試的前提下**仍保 partition 內順序，必須開啟 idempotent producer（`enable.idempotence=true`，broker 用 producer ID + per-partition 序號偵測並重排），此時 `max.in.flight.requests.per.connection` 最高可設到 5 仍保序；若關閉 idempotence 又把 in-flight 設大於 1，重試會讓批次亂序——第一批失敗重送、第二批已成功，第二批的記錄可能排到前面（2026-06，來源見延伸閱讀）。SQS FIFO 則用 message group ID 當序列化單位：同 group 嚴格有序，不同 group 可並行消費（見 SQS，領域 A）。\n\n### 何時需要\n\n要嚴格順序的，是**狀態機式的因果鏈**：餘額類（先存後扣 vs 先扣後存結果不同）、訂單狀態轉移（created→paid→shipped 不能倒）、CD
