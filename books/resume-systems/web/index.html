已失真，AI 只是更快地給出**有信心的錯誤結論**；訊號品質是上游問題，再聰明的下游分析也補不回來。\n\n### 延伸閱讀\n\n- OpenTelemetry — Observability primer：https://opentelemetry.io/docs/concepts/observability-primer/\n- OpenTelemetry — Signals（traces/metrics/logs）：https://opentelemetry.io/docs/concepts/signals/\n- Google SRE Book, Ch.6 \"Monitoring Distributed Systems\"（四個黃金訊號 golden signals 的出處）：https://sre.google/sre-book/monitoring-distributed-systems/\n\n## 從 log 算 metric 的陷阱\n\n### 定義與原理\n\n「從 log 算 metric」是一種很自然的省事做法：既然每個請求都寫了 log，何必再額外埋一個 counter？直接在日誌系統裡 `count by (status)` 或對 `latency` 欄位算分位數，就「免費」得到 metric 了。這條路在低流量下確實划算，但它把 metric 的正確性**綁死在 log 的完整性上**——而 log 偏偏是最容易被取樣、被丟、被截斷的訊號。第一原理：**聚合的正確性取決於樣本的代表性與完整性**；log 在高流量下三者都不保證。三個結構性陷阱：取樣（sampling）、遺漏（loss）、視窗（windowing）。\n\n### 解法空間\n\n- **直接埋指標（不經 log）**：在程式碼裡用 metric SDK 維護 counter / histogram，與 log 各走各的 pipeline。counter 是「每個事件原子 +1」，不受取樣影響。\n- **全量 log + 事後聚合**：完全不取樣 log，查詢時即席算 metric。正確，但儲存成本可能無法承受。\n- **取樣 log + 帶權重還原**：log 取樣時記下取樣率，聚合時用 `1/rate` 加權還原總量。能修「總量低估」，但修不了分位數與長尾的代表性。\n- **結構化 log 嚴格 schema**：保證每條 log 都有 `latency_ms`、`status` 等欄位且型別一致，讓聚合不會因解析失敗而靜默漏算。\n- **兩條路並行對帳**：關鍵指標同時用埋點 metric 和 log 聚合各算一份，定期比對差距，把「log 聚合」當便宜的補充而非真相來源。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 直接埋 metric | 計數精確、不受取樣影響、成本固定 | 告警、SLO、容量趨勢這類要準的數字 | 維度受限（高基數會爆）；需在程式碼裡埋點 |\n| 全量 log 聚合 | 任意維度可事後算、最靈活 | 低流量、需要事後切任意維度 | 高流量下儲存成本可能不可行 |\n| 取樣 log + 加權還原 | 修正總量級偏差 | 高流量下只要量級對的計數 | 分位數/長尾仍失真；尾端事件被取樣機率低 |\n| metric + log 並行對帳 | 互為校驗、抓得到漂移 | 關鍵業務指標 | 兩套維護成本；需定義「差多少算異常」 |\n\n### 何時需要\n\n- **要拿來告警或當 SLO 的數字，一律走埋點 metric**——這種數字錯了會直接誤導決策。\n- **探索性、事後才想到要看的維度**，用 log 聚合很合適：你沒辦法事先為每個未知問題埋好 metric。\n- **流量小到 log 全量保留無壓力**，從 log 算 metric 是合理的省事，不必為它另起一套埋點。\n\nWorked example：一個服務每秒 10,000 請求，log 因成本設了 **1% head sampling**（每 100 條留 1 條）。現在想從 log 算「過去 5 分鐘的錯誤率」。實際發生 3,000,000 個請求、其中 3,000 個錯誤（錯誤率 0.1%）。取樣後 log 裡約有 30,000 條請求、30 條錯誤——若**忘了用 `1/rate=100` 加權**，你算出的「錯誤數＝30」會把真實的 3,000 個錯誤低估 100 倍；而即使加權還原了總量，**p99 延遲仍然失真**：真正拖慢系統的那 0.1% 長尾請求，被 1% 取樣命中的期望只有 `3,000,000 × 0.001 × 0.01 = 30` 條，分位數估計的方差大到不可信。這就是「總量可加權修、長尾分位數修不回來」的具體形狀。\n\n### 常見誤解與陷阱\n\n- **取樣**：以為「log 取樣不影響算出來的比率」。比率（如錯誤率）若兩邊同率取樣大致還行，但**絕對量一定要加權還原**，否則低估；而長尾分位數（p99/p999）本質上樣本就稀，取樣後幾乎不可信。\n- **遺漏**：log pipeline 在背壓時會**靜默丟棄**（buffer 滿了就丟）——而它最常在「系統出事、log 暴量」時丟，於是你最需要數據的那一刻，恰恰是數據最不完整的一刻。從 log 算出的「事故期間請求數」往往莫名偏低，就是這個原因。\n- **視窗**：log 的時間戳是「事件發生時間」還是「寫入時間」？跨時區、延遲到達（late arrival）的 log 會落在錯誤的聚合視窗裡，讓「某分鐘的 QPS」忽高忽低。固定視窗邊界還會切斷跨視窗的請求。\n- **解析失敗靜默漏算**：某次發版改了 log 格式，聚合的正則沒跟上，於是那一批 log 被悄悄跳過——metric 看起來「流量下降」，其實只是算不出來了。\n- **把 log 聚合當 SLO 真相來源**：SLO 是要拿去談判和告警的（見「SLI / SLO / error budget」），用一個會被取樣、會被丟、會因格式漂移而漏算的來源去定它，等於把承諾建在流沙上。\n\n### 延伸閱讀\n\n- OpenTelemetry — Sampling（取樣對聚合的影響）：https://opentelemetry.io/docs/concepts/sampling/\n- Prometheus — Instrumentation best practices（為什麼計數要用 counter 埋點）：https://prometheus.io/docs/practices/instrumentation/\n- Prometheus — Histograms and summaries（分位數估計的前提）：https://prometheus.io/docs/practices/histograms/\n\n## cardinality 爆炸\n\n### 定義與原理\n\n在時序系統裡，一條獨立的 time series 由「指標名 + 一組標籤鍵值（labels）」唯一決定。**Cardinality（基數）＝不同標籤組合的總數＝實際存在的 time series 條數**。爆炸的根因是組合爆炸：總基數約等於各標籤可能取值數的**乘積**。一個 `http_requests_total{method, status, endpoint, user_id}`，若 method 有 5 種、status 有 6 種、endpoint 有 50 種、user_id 有 100 萬種，理論上限是 `5 × 6 × 50 × 1,000,000 = 1.5 × 10⁹` 條 series。\n\n為什麼這會殺死系統？時序資料庫（如 Prometheus）為了快速查詢，會把**每一條 active series 的標籤索引常駐記憶體**。series 數量直接決定記憶體佔用，而不是樣本（datapoint）數量。所以一個高基數標籤（user_id、request_id、完整 URL with query string）就足以讓記憶體從幾 GB 飆到 OOM。第一原理：**metric 的成本由基數決定，不由流量決定**——這跟直覺相反，但正是 metric 與 log 的分工線。\n\n### 解法空間\n\n- **不把高基數維度放進 metric 標籤**：user_id、session_id、request_id、raw URL、error message 這些天然高基數的東西，屬於 log/trace 的維度，不是 metric 的。\n- **標籤值正規化／分桶**：把 `/users/12345/orders` 正規化成 route template `/users/{id}/orders`；把連續值（如金額、延遲）放進 histogram bucket 而非當標籤。\n- **限制標籤值集合**：對可能無界的標籤（如 customer_tier）設白名單，未知值歸到 `other`，避免被惡意或意外的值灌爆。\n- **exemplar 取代高基數標籤**：要從某條 metric 跳到具體那個慢請求，用 exemplar（在 histogram bucket 上附帶少數樣本的 trace_id）而非把 trace_id 變成標籤。\n- **設防護欄**：在採集端（如 Prometheus 的 `sample_limit`、relabel drop）或 SDK 端設每指標的 series 上限，超過就丟並告警，避免單一壞指標拖垮整個系統。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 高基數維度只進 log/trace | metric 基數可控、成本可預測 | user_id/request_id 等天然無界的維度 | 失去在 metric 上直接按該維度切分的能力 |\n| route template 正規化 | 把 N 個 URL 收斂成少數路由 | 含路徑參數的 HTTP 指標 | 正規化規則要維護；漏一條就漏一片基數 |\n| 標籤值白名單 + other | 防無界標籤被灌爆 | 來源不可信或可能新增值的維度 | `other` 桶會把細節糊掉 |\n| exemplar 連到 trace | 低基數 metric ＋按需跳到單筆 | 「p99 高，給我一個例子」 | 需後端支援 exemplar；只是樣本不是全量 |\n| 採集端 series 上限 | 單一壞指標不會 OOM 整個系統 | 防呆、止血 | 觸發上限後該指標數據不完整 |\n\n### 何時需要\n\n- **任何用 Prometheus 類拉式時序系統的場景**，基數治理都是必修——它的記憶體模型讓基數成為硬天花板。\n- **多租戶、面向終端使用者的服務**：天然有大量高基數維度（每個 user、每個 device），最容易不小心把它們塞進標籤。\n- **不必過早治理的場景**：內部低流量工具、標籤維度天生有限（只有 region × status 幾種組合）時，基數根本到不了危險區，先別為它設一堆防護欄。\n\nWorked example：某團隊在 `http_request_duration_seconds` 上加了一個 `user_id` 標籤想做 per-user 延遲分析。服務有 50 萬活躍 user，histogram 預設 10 個 bucket，再乘上 status（5 種）：`500,000 × 10 × 5 = 2.5 × 10⁷` 條 series。Prometheus 每條 active series 約佔數 KB 記憶體（含索引），保守抓 3 KB，光這一個指標就吃掉 `2.5×10⁷ × 3 KB ≈ 75 GB` 記憶體——遠超單機可用，直接 OOM。修法：拿掉 `user_id`，per-user 延遲改用 trace（用 exemplar 從 bucket 跳到具體慢請求），基數立刻掉回 `10 × 5 = 50` 條。\n\n### 常見誤解與陷阱\n\n- **「多加個標籤又沒多少資料」**：危險的不是資料量，是**新標籤與既有標籤的乘積**。在 1,000 條 series 的指標上加一個 1,000 取值的標籤，瞬間變 100 萬條。\n- **以為刪掉標籤就立刻回收記憶體**：series 變成 inactive 後，仍會在保留期內佔用資源（要等 churn 出視窗）。高 churn（標籤值不斷出現又消失，如每次都用新 request_id）比高基數更陰險——它讓**新舊 series 同時佔記憶體**。\n- **raw URL 當 endpoint 標籤**：含 query string 或路徑 ID 的 URL 是無界的；一定要正規化成 route template。\n- **error message 當標籤**：錯誤訊息常含動態內容（ID、時間戳），每個都不同，等於無界基數。錯誤細節進 log，metric 只留 error type / code。\n- **把基數問題當成「買更大記憶體」**：基數是組合爆炸，是指數級的；加記憶體是線性的，追不上。治理維度才是解，加硬體只是把爆炸延後。\n\n### 延伸閱讀\n\n- Prometheus — Naming and labels（標籤基數警告）：https://prometheus.io/docs/practices/naming/\n- Prometheus — Instrumentation：do not use high cardinality labels：https://prometheus.io/docs/practices/instrumentation/#do-not-overuse-labels\n- OpenTelemetry — Metrics data model（attributes 與 cardinality）：https://opentelemetry.io/docs/specs/otel/metrics/data-model/\n\n## SLI / SLO / error budget（p99 / p999）\n\n### 定義與原理\n\n這三個詞是 SRE 把「可靠性」從感覺變成可談判數字的一條鏈：\n\n- **SLI（Service Level Indicator，服務水準指標）**：一個量測「使用者體驗到的好壞」的比值，標準形式是 `好事件數 / 有效事件數`。例如「回應 < 300ms 且非 5xx 的請求 / 全部有效請求」。SLI 必須從**使用者視角**量，不是 CPU 使用率這種內部指標。\n- **SLO（Service Level Objective，服務水準目標）**：對 SLI 訂的目標門檻，例如「過去 28 天，99.9% 的請求是好的」。它是**你自己對自己的承諾**，比對外的 SLA（合約，違約要賠）寬一級。\n- **Error budget（錯誤預算）**：`1 − SLO`。SLO 99.9% 就是「允許 0.1% 的請求是壞的」。這 0.1% 不是失敗，是**預算**——它是「可以拿去冒險（發版、實驗、容忍小故障）」的額度。預算沒燒完，就大膽發版；燒完了，凍結變更、專心穩定。\n\np99 / p999 是訂 SLI 門檻時最常用的**分位數**：p99 = 99% 的請求比這個值快（等價地，最慢的 1% 比它慢）；p999 = 千分之一的尾巴。第一原理：**平均值會被長尾騙，分位數才反映「最差的那批使用者」的體驗**。\n\n### 解法空間\n\n- **用什麼 SLI**：可用性比（成功率）、延遲分位數（p99/p999）、新鮮度（資料延遲）、正確性（對帳一致率）、吞吐——依服務性質選。\n- **怎麼量延遲分位數**：用 histogram（預先分桶、可跨副本聚合，`histogram_quantile()` 插值算分位）vs summary（在 client 端算好分位數、**不能跨實例聚合**）。本書取捨見下表。\n- **視窗策略**：rolling window（過去 28 天滾動）給穩定的趨勢；calendar window（每月歸零）對齊商業週期但月初月末行為不同。\n- **怎麼用 error budget 告警**：固定門檻告警（燒到剩 X% 就告）vs **burn rate alert**（看「以目前速度多久燒完」，快燒給高優先告警、慢燒給工單）。\n- **多目標分層**：對同一服務訂多個 SLO（p99 < 300ms 且 p999 < 1s），分別管「一般體驗」與「最差體驗」。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Histogram 算分位數 | 可跨副本/跨時間聚合、可改算任意分位 | 多實例服務的 p99/p999 SLI | 精度取決於 bucket 邊界；窄桶才準 |\n| Summary（client 端分位） | 單實例精確分位、不需後端插值 | 單實例、不需聚合 | **不能跨實例聚合**（平均多個 p99 是錯的） |\n| Rolling window SLO | 趨勢平滑、無月初歸零的鋸齒 | 大多數服務 | 老故障要滾出視窗才「還預算」 |\n| Burn-rate 告警 | 燒得快才吵醒人、燒得慢只開工單 | 想降告警疲勞又不漏快速燒穿 | 需調多重視窗（短窗抓急、長窗抓慢） |\n\n### 何時需要\n\n- **有明確使用者、可靠性會影響留存或收入的服務**：SLO 讓「要不要為穩定性踩煞車」變成看預算的客觀決定，而非拍腦袋或誰嗓門大。\n- **跨團隊依賴**：上游給下游一個 SLO，下游才能合理設計自己的逾時與降級（見領域 P）。\n- **over-engineering 警訊**：一個內部 cron、掛了重跑就好、沒人即時依賴它——為它訂 99.99% SLO 與 burn-rate 告警是浪費。SLO 的成本（量測、維護、值班）只有在「可靠性真的有人在乎」時才划算。\n\nWorked example：服務月流量 1 億請求，SLO「99.9% 成功」。error budget ＝ `0.1% × 100,000,000 = 100,000` 個失敗請求／月。若某次發版引入 bug，每分鐘多 200 個失敗，則 `100,000 / 200 = 500` 分鐘 ≈ **8.3 小時**就會燒光整月預算。Burn-rate 視角：正常每分鐘該燒 `100,000 / (30×24×60) ≈ 2.3` 個，現在燒 200 個，burn rate ≈ **86×**——這種速度該立刻 page 值班，而不是等到月底才發現預算見底。對照分位數：若把 SLI 從成功率換成 p99 < 300ms，平均延遲可能只有 50ms（看起來很健康），但 p99 是 280ms、p999 是 1.2s——**平均值完全藏住了那 0.1% 體驗極差的使用者**，這正是要看分位數而非平均的理由。\n\n### 常見誤解與陷阱\n\n- **平均多個 p99 得到總 p99**：數學上錯的。三台副本各自的 p99 平均起來，不等於合併資料集的 p99。要正確聚合，必須用 histogram 在 bucket 層面合併後再算 `histogram_quantile()`，不能拿算好的分位數去平均。\n- **把內部指標當 SLI**：CPU 80%、queue 長度——這些是原因不是症狀，使用者不在乎 CPU 多少，在乎請求成不成功、快不快。SLI 要從使用者那一端量。\n- **SLO 訂成 100%**：100% 沒有 error budget，意味著任何發版風險都不能冒、任何單點故障都違約。**刻意留出不可靠的額度**正是 error budget 的價值；追求 100% 是反生產力的。\n- **分位數的取樣陷阱**：若 SLI 來自取樣的 trace/log，p999 這種千分之一的尾巴本身樣本就稀，取樣後估計方差大到不可信（見「從 log 算 metric 的陷阱」）。p999 SLI 最好建在全量的 histogram 上。\n- **error budget 燒完卻照常發版**：那 SLO 就只是裝飾。error budget 的整個重點是它**有牙齒**——燒完就觸發凍結變更的政策（見領域 V 的 SRE 文化），否則訂它沒意義。\n\n### 延伸閱讀\n\n- Google SRE Book — Service Level Objectives：https://sre.google/sre-book/service-level-objectives/\n- Google SRE Workbook — Implementing SLOs（含 burn-rate alerting）：https://sre.google/workbook/implementing-slos/\n- Prometheus — Histograms and summaries（為何不能平均分位數）：https://prometheus.io/docs/practices/histograms/\n\n## 告警設計（症狀 vs 原因、告警疲勞）\n\n### 定義與原理\n\n告警是「系統把『需要人介入』的判斷主動推給人」的機制。它的核心矛盾是兩種錯誤的取捨：**漏報（false negative）**——真出事卻沒告，與**誤報（false positive）**——沒事卻吵醒人。把門檻調鬆會漏報，調緊會誤報，沒有免費午餐。第一原理（源自 SRE）：**好的告警對應的是「使用者正在受影響」的症狀，而不是「某個內部零件壞了」的原因**。原因有千百種、會隨架構變，症狀（請求失敗、變慢）少而穩定且直接對應使用者體驗。對症狀告警，自然涵蓋你還沒想到的故障模式。\n\n**告警疲勞（alert fatigue）** 是這套機制的慢性病：誤報多了，人會開始無視告警、調靜音、條件反射地點掉——於是真正重要的那一條被淹沒。一個吵但大多是雜訊的告警系統，比沒有告警更危險，因為它給人「有在看」的假象。\n\n### 解法空間\n\n- **症狀告警（symptom-based）**：對 SLI 燒穿告警（錯誤率、延遲分位數超標），對應使用者影響。少而準。\n- **原因告警降級為診斷訊號**：CPU 高、磁碟快滿、queue 堆積——這些不直接 page 人，而是進儀表板，等症狀告警觸發後拿來查根因。例外：「磁碟 30 分鐘後寫滿」這種**有前導期、不處理必出事**的原因，值得提早告（但給工單而非半夜 page）。\n- **多視窗 burn-rate 告警**：用快窗（如 5 分鐘）抓急速燒穿、慢窗（如 1 小時/6 小時）抓緩慢漏血，分別對應 page / ticket，避免單一固定門檻又吵又漏（見「SLI / SLO / error budget」）。\n- **分級與路由**：page（立刻吵醒）、ticket（上班看）、log-only（只記錄）三級；按嚴重度與緊急度路由，不是所有告警都 page。\n- **去抖與抑制**：for duration（持續 N 分鐘才告，濾掉瞬間抖動）、依賴抑制（上游掛了就別讓下游一起狂告）、分組（同一事件的多條告警合併成一則）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 症狀告警（對 SLI） | 涵蓋未知故障、對應使用者影響、條目少 | 面向使用者的服務的主力告警 | 需要先有好的 SLI；只告「壞了」不告「為何壞」 |\n| 原因告警（資源/零件） | 指向具體零件、利於快速定位 | 當診斷輔助、或有前導期的容量問題 | 當主力會爆量且會隨架構漂移；多數不該 page |\n| 多視窗 burn-rate | 急燒快告、緩燒開單，降疲勞又不漏 | error-budget-driven 的成熟告警 | 視窗與門檻要調，初期較複雜 |\n| for-duration 去抖 | 濾掉瞬間尖峰、減少誤報 | 本來就會短暫抖動的指標 | 拉長＝延後真實事件的告警，要權衡 |\n| 依賴抑制/分組 | 一個根因不變成一場告警風暴 | 有明確依賴拓樸的系統 | 抑制規則錯了會把真問題也吞掉 |\n\n### 何時需要\n\n- **任何有值班、半夜會被吵醒的團隊**：告警設計直接決定值班的人能不能睡、會不會 burnout。這不是 nice-to-have。\n- **剛上線、故障模式未知的新系統**：先上**少數症狀告警**（SLI 燒穿），別一開始就鋪滿原因告警——你還不知道哪些原因重要，鋪滿只會製造疲勞。\n- **over-engineering / 反模式警訊**：為每個內部指標都設一條告警、每條都 page、門檻憑感覺定——這是製造告警疲勞的標準配方。告警要少而狠，每一條都該能回答「它響了，人現在要做什麼」。\n\nWorked example：某團隊有 120 條告警規則，其中約 90 條是原因告警（CPU > 80%、記憶體 > 85%、某 queue > 1000…）。一個月統計：總共觸發 800 次，事後標記只有約 **40 次**對應真正需要人介入的事件——**誤報率 95%**。值班的人三週後養成「先靜音再說」的習慣，於是某次真正的資料庫連線池耗盡告警也被條反靜音，事故延誤 40 分鐘才有人處理。改法：刪掉 90 條原因告警的 page 屬性（降為儀表板/工單），只保留約 6 條症狀告警（對 SLI 的多視窗 burn-rate），page 量從每月數百降到個位數，每一條 page 都對應「使用者正在受影響」。\n\n### 常見誤解與陷阱\n\n- **對原因告警 page**：CPU 高不等於使用者有問題（可能只是批次任務在跑），對它 page 是誤報工廠。對症狀 page、把原因留作診斷。\n- **「多告總比漏告好」**：在告警疲勞面前這是錯的。淹沒在雜訊裡的關鍵告警＝實質的漏報。**訊噪比**比覆蓋率更決定告警系統的真實價值。\n- **靜態門檻撞上日夜/週期波動**：「QPS < 100 就告」在半夜本來就低流量，天天誤報。要嘛用相對基準（同比上週），要嘛只對 SLI 燒穿告警（它自帶流量歸一化）。\n- **告警沒有 runbook**：一條 page 響了，值班的人不知道該做什麼——這條告警的價值大打折扣。每條 page 級告警都該連到「現在做什麼」（見領域 V 的事故應變）。\n- **AI 輔助告警的新陷阱**：用工具做異常偵測/動態門檻能減少手動調參，但它會引入**不可解釋的告警**——半夜被一條「模型覺得異常」的 page 吵醒卻沒有明確症狀與 runbook，反而加重疲勞與不信任。AI 適合當「降噪/聚合/建議」的輔助，最終 page 人的判準仍應回到可解釋的使用者影響症狀。\n\n### 延伸閱讀\n\n- Google SRE Book — Monitoring Distributed Systems（symptom vs cause）：https://sre.google/sre-book/monitoring-distributed-systems/\n- Google SRE Workbook — Alerting on SLOs（multi-window burn-rate）：https://sre.google/workbook/alerting-on-slos/\n- Rob Ewaschuk — \"My Philosophy on Alerting\"（症狀告警原典）：https://docs.google.com/document/d/199PqyG3UsyXlwieHaqbGiWVa8eMWi8zzAn0YfcApr8Q/edit\n\n## 分散式追蹤（trace context 傳播、span、取樣）\n\n### 定義與原理\n\n分散式追蹤把「一個請求穿越多個服務」的完整因果路徑重建成一棵樹。三個核心概念：\n\n- **Trace**：一次端到端請求的全部記錄，由一個全域唯一的 `trace_id` 標識。\n- **Span**：trace 樹裡的一個節點＝一段有起止時間的工作（一次 RPC、一次 DB 查詢、一段內部計算）。每個 span 有自己的 `span_id`、指向上游的 `parent_span_id`、開始/結束時間戳，以及 attributes（如 HTTP status、DB statement）。父子 span 的時間區間嵌套，就還原出「誰調用誰、各花多久」。\n- **Context propagation（context 傳播）**：要把分散在 N 個服務的 span 拼成一棵樹，每個服務在往下游發請求時，必須把 `trace_id` 和當前 `span_id` **隨請求傳下去**——通常透過 HTTP header。W3C 把這個格式標準化成 **`traceparent`／`tracestate` header**（Trace Context 於 **2020-02-06 成為 W3C Recommendation**；Level 2 在 2026-06 仍是 Candidate Recommendation Draft，主要強化 trace-id 隨機性，不改 header 結構）。`traceparent` 形如 `00-<32hex trace-id>-<16hex span-id>-<2hex flags>`。\n\n第一原理：**沒有 context 傳播，每個服務的 span 都是孤兒**——你有一堆 span 卻拼不成樹，等於沒有 trace。傳播鏈只要斷一環（某個服務沒轉發 header），那一跳之後的因果就丟了。\n\n### 解法空間\n\n- **傳播格式**：W3C Trace Context（`traceparent`/`tracestate`，跨廠商互通的標準）vs 各家私有格式（如 B3、Jaeger header）。混用多語言/多廠商時，標準格式才能無縫接力。\n- **怎麼植入傳播**：手動在每個出站呼叫塞 header（細粒度但易漏）vs 自動 instrumentation（SDK/agent 攔截 HTTP/gRPC client 自動注入，省事但要該語言有支援）。\n- **取樣決策點**：\n  - **Head-based sampling（頭部取樣）**：在 root span 產生的當下就擲骰決定整條 trace 留不留（如 10%）。便宜、無狀態、低延遲，但**錯誤與慢請求只占極少數，隨機取樣大機率漏掉它們**——而那恰恰是你最想看的。\n  - **Tail-based sampling（尾部取樣）**：等整條 trace 完成、看到全貌（有沒有錯、夠不夠慢）再決定留不留。能精準留下錯誤/長尾，但 collector 必須**緩衝一條 trace 的所有 span 直到完成**，且同一 trace 的 span 要路由到同一個 collector 實例，記憶體與架構成本高。\n- **取樣率還原**：取樣後算 metric/統計，要記錄取樣率以加權還原（見「從 log 算 metric 的陷阱」）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| W3C Trace Context 傳播 | 跨語言/跨廠商互通 | 異質微服務、多廠商後端 | 傳播鏈斷一環就丟下游因果 |\n| 自動 instrumentation | 省手動、漏埋少 | 主流框架/語言 | 非標準協定或自家 transport 仍需手動補 |\n| Head-based 取樣 | 成本固定、低延遲、無狀態 | 高吞吐、只要代表性樣本 | 大機率漏掉錯誤/長尾這些最有價值的 trace |\n| Tail-based 取樣 | 精準留住錯誤/慢 trace | 排障價值高、預算夠 | 需緩衝整條 trace；同 trace span 要同實例；記憶體貴 |\n\n### 何時需要\n\n- **請求跨 ≥ 3 個服務、且「慢/錯在哪一跳」是反覆出現的問題**：這是 trace 不可替代的場景——metric 告訴你「p99 高」，log 告訴你「這台機器這條 log」，只有 trace 把「整條鏈各跳耗時」攤開。\n- **單體或極簡拓樸**：trace 收益遞減，profiler / APM 內視更直接，先別上整套追蹤基礎設施。\n- **取樣策略的選擇**：流量低（每秒幾百）可以接近全量、不必取樣；高流量先上 head-based 控成本，等「老是漏掉想看的錯誤 trace」變成痛點，再評估 tail-based。**別一開始就上 tail-based**——它的架構複雜度只有在規模到了才值得。\n\nWorked example：一個請求路徑 gateway → orders → payments → DB，p99 端到端延遲 800ms，但四個服務各自的 dashboard 都顯示「自己很健康」（各自 p99 < 250ms）。沒有 trace 時，這是個無解的羅生門——每個團隊都說不是自己。接上 trace 後，把這條 trace 的 span 攤開：gateway 自身 20ms、orders 30ms、payments **620ms**、DB 80ms（四段相加 750ms，與端到端 800ms 的差約 50ms 落在跨服務網路傳輸與序列化等不被 span 計入的縫隙）——payments 對某個外部風控 API 的調用沒設好逾時，瓶頸一目了然。取樣面：若用 head-based 10%，這條 800ms 的慢 trace 只有 10% 機率被留下；改用 tail-based「latency > 500ms 全留」，這類慢 trace 100% 保留，而正常的快 trace 仍只留 10% 控成本——這就是 tail-based 在排障上的價值所在。\n\n### 常見誤解與陷阱\n\n- **傳播鏈悄悄斷掉**：某個老服務、某條非 HTTP 路徑（如丟進 message queue 再被消費）沒有轉發 `traceparent`，trace 就在那裡斷成兩棵孤樹。跨非同步邊界（queue/event）的傳播最常被漏（要把 trace context 塞進訊息 metadata）。\n- **以為 head-based 取樣能事後補看錯誤 trace**：head-based 在請求一開始就決定丟棄，等你發現某筆出錯想回頭看，它的 span 根本沒被記錄——錯誤 trace 的「事後可得性」是 tail-based 才有的能力。\n- **取樣後直接拿 trace 數量當流量指標**：trace 是取樣的，數出來的「請求數」不是真實量；要量請求數請用全量的 counter metric。\n- **span 太細或太粗**：每個函式都開 span 會爆量又難讀；整個服務只有一個 span 又看不出內部瓶頸。粒度應對齊「有意義的工作單元」（一次 RPC、一次 DB query、一段關鍵計算）。\n- **clock skew 扭曲 span 時間**：span 起止時間戳來自各機器的本地時鐘，跨機器時鐘不同步會讓子 span 看起來「比父 span 還早開始」或負延遲。追蹤後端通常會用因果關係修正顯示，但底層時間仍不可全信（時鐘問題見領域 M）。\n\n### 延伸閱讀\n\n- W3C — Trace Context（Recommendation）：https://www.w3.org/TR/trace-context/\n- OpenTelemetry — Traces / Context propagation：https://opentelemetry.io/docs/concepts/signals/traces/\n- OpenTelemetry — Sampling（head vs tail）：https://opentelemetry.io/docs/concepts/sampling/\n- Sigelman et al. — \"Dapper, a Large-Scale Distributed Systems Tracing Infrastructure\"（2010，分散式追蹤原典）：https://research.google/pubs/pub36356/\n"}, {"id": "I2-testing-quality", "file": "I2-testing-quality.md", "group": "Part 7 — 觀測與營運文化", "title": "I · 測試與品質", "md": "# I · 測試與品質\n\n本領域處理「如何在上線前與上線後**取得對系統行為的信心**」這個老問題：什麼樣的測試給什麼樣的保證，又付出什麼代價。本檔含三條：負載測試（量化系統在壓力下的延遲與吞吐真相）、測試策略（unit / integration / contract / e2e 的金字塔與 contract testing）、可觀測性與品質工具地圖（各類別工具選什麼、為什麼）。線上指標（metric / log / trace、SLI/SLO、cardinality、告警、分散式追蹤）屬可觀測性本身，在領域 I 的另一檔；本檔聚焦「測試取得信心」與「工具選型」這兩面。\n\n## 負載測試\n\n### 定義與原理\n\n負載測試問的是：**系統在「真實流量形狀」下，延遲分佈與吞吐天花板是什麼**。它不是「跑很多次取平均」，而是要逼出 p99 / p999 這條長尾——因為使用者體驗由長尾決定，不由平均決定（成因見 tail latency 與長尾，領域 S）。\n\n關鍵的第一原理是**流量模型**：你怎麼產生負載，決定你量到什麼。兩個對立模型——\n\n- **封閉模型（closed model / closed loop）**：固定數量的虛擬使用者（VU），每個 VU 送一個請求、**等回應、再送下一個**。系統一慢，VU 自然降速、送得更少。它模擬「請求數受限於在線使用者數」的場景（如固定連線數的內部服務）。\n- **開放模型（open model / arrival rate）**：以**固定到達率**（如每秒 1000 個請求）灌入，**不管前一個有沒有回來**。它模擬「使用者不會因為你變慢就減少點擊」的真實外部流量（公開 API、網站）。\n\n兩者量到的延遲可以差一個數量級，根因是**coordinated omission（協同遺漏）**——這個詞由 Gil Tene 約 2013 年提出。封閉模型在系統卡住時，VU 也跟著停下不發新請求，於是那段「本來應該被很多人撞上的高延遲」只被少數請求記到，**長尾被系統性地低估**。\n\n### 解法空間\n\n要量到誠實的延遲分佈，處理 coordinated omission 有幾條路：\n\n- **改用開放模型**：以 arrival rate 驅動，到時間就發、不等回應。系統卡住期間累積的請求一樣被記錄，長尾不被抹掉。\n- **constant-rate 工具補償**：固定速率送請求（如 Vegeta 的 constant request rate；wrk2 也走這條），把「該發而沒發」的請求視為延遲一併計入。\n- **回填式校正（latency correction）**：用 HdrHistogram 這類直方圖，在已知預期請求間隔時，把缺漏的延遲樣本以該間隔回填補上，事後修正封閉模型的低估。\n- **混合 / ramping 場景**：先封閉模型暖機（避免冷啟動污染，見冷啟動與暖機，領域 S），再切開放模型壓長尾；或用階梯式提升負載找出吞吐崩潰點（ρ→1 的爆炸，見排隊直覺，領域 E）。\n- **影子流量 / 重放**：把生產真實流量錄下重放到測試環境，流量形狀天然真實，但需處理冪等與副作用（見冪等，領域 A）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 封閉模型（固定 VU） | 模擬有界並發；不會把系統灌爆 | 內部服務、固定連線數、想量「N 個並發下多快」 | 有 coordinated omission，長尾被低估；VU 數不等於 RPS |\n| 開放模型（arrival rate） | 長尾誠實；模擬外部不退讓流量 | 公開 API / 網站、要量 p99/p999 真相 | 系統一崩請求會無限堆積、測試端先 OOM，需設上限與背壓 |\n| constant-rate（Vegeta/wrk2） | 固定速率、補償遺漏 | 要可重現的速率基準、CI 回歸 | 速率設太高會打爆測試端網路；rate=0 表示盡全力發 |\n| HdrHistogram 校正 | 事後補長尾、保留高動態範圍 | 已有封閉模型數據要修正 | 需正確的「預期間隔」才補得準；補錯反而失真 |\n| 流量重放 / 影子 | 流量形狀最真實 | 上線前驗證、容量規劃 | 副作用與冪等是大坑；需資料隔離 |\n\n### 何時需要\n\n需要嚴肅負載測試的訊號：**對外承諾了 SLO**（p99 < Xms，見 SLI/SLO，領域 I）、要做**容量規劃**（買多少機器、何時分片）、上線前驗證**新架構**能不能扛預期尖峰、或要找出**吞吐崩潰點**（ρ 逼近 1 的位置）。\n\n不需要過度投入的場景：低流量內部工具、流量遠低於單機天花板（先用量級估算判斷，見量級估算與容量直覺，領域 U）、或還在快速迭代、架構未定——這時花大力氣建負載測試框架是 over-engineering，跑一次粗略開放模型壓測拿個數量級就夠。\n\nworked example：一個 API 平均回應 50ms，你用封閉模型 100 個 VU 測。若系統每分鐘卡頓一次 5 秒，封閉模型那 5 秒只記到約 100 個請求超時（VU 停發），p99 看起來漂亮。但若真實到達率是 2000 RPS，那 5 秒本該湧入約 2000 × 5 = **10,000 個請求**全部撞上高延遲——開放模型會把這 1 萬個慢請求記進分佈，p99 從「看起來 60ms」變成「真相 3000ms+」。差距不是測量誤差，是模型選錯。\n\n### 常見誤解與陷阱\n\n- **「平均延遲很好」≠ 系統健康**：平均把長尾稀釋掉；使用者撞上的是 p99/p999。只看平均等於沒測。\n- **把 VU 數當 RPS**：100 個 VU 不等於 100 RPS——RPS = VU / 每請求耗時。系統變慢時封閉模型的實際 RPS 會自己掉下來——名義上設定 2000 RPS、實際可能只發出 800，量到的是兩者不一致的假象。\n- **測試端自己是瓶頸**：負載產生器的 CPU / 網路 / GC（或 event loop 卡頓，見 event loop，領域 D）會污染數據；先確認瓶頸在被測系統不在產生器。\n- **忽略暖機**：第一波請求撞上冷快取、冷連線池、JIT 未熱（見冷啟動與暖機，領域 S），把暖機數據混進穩態結果會高估延遲。\n- **在共用環境測**：鄰居噪音（noisy neighbor）讓結果不可重現；負載測試要隔離環境或標注是「帶噪音的生產近似」。\n\n### 延伸閱讀\n\n- Gil Tene, \"How NOT to Measure Latency\"（演講，coordinated omission 的原始論述）：https://www.infoq.com/presentations/latency-response-time/\n- HdrHistogram（高動態範圍直方圖，含 coordinated omission 校正）：https://github.com/HdrHistogram/HdrHistogram\n- wrk2（constant throughput、correct latency 的 wrk 變體）：https://github.com/giltene/wrk2\n\n## 測試策略\n\n### 定義與原理\n\n測試策略要回答的不是「要不要測」，而是**把有限的測試預算分配到哪一層，才能用最低成本買到最高信心**。每一層測試在「真實度 vs 速度/穩定」的軸上佔不同位置：\n\n- **unit（單元）**：測單一函式 / 類別的邏輯，依賴全部用 mock / stub 替掉。**快、穩、定位精準**，但完全不保證「各部件兜起來能跑」。\n- **integration（整合）**：測幾個真實部件協作——程式碼配真實資料庫、真實快取、真實 queue（常用 testcontainers 起一個真 PostgreSQL）。保證**接線正確**（SQL 語法、序列化、交易語意），代價是慢、需環境。\n- **contract（契約）**：測**服務 A 對服務 B 的 API 假設**是否與 B 的實際行為一致——不需把 A、B 同時跑起來。它填補 unit（各自 mock、可能 mock 錯）與 e2e（全跑、太貴）之間的縫。\n- **e2e（端到端）**：把整條真實系統串起來跑使用者旅程。**真實度最高、信心最強**，但**最慢、最脆（flaky）、定位最差**（紅了不知道哪一環壞）。\n\n經典的**測試金字塔**主張：底層 unit 多、中層 integration 適量、頂層 e2e 少。倒過來（e2e 一堆、unit 沒幾個）叫「冰淇淋甜筒反模式」，會慢到沒人想跑、脆到沒人信。\n\n### 解法空間\n\n- **測試金字塔**：大量 unit + 中量 integration + 少量關鍵路徑 e2e。預設策略。\n- **測試獎盃（testing trophy）**：把重心壓在 **integration** 那層（Kent C. Dodds 提倡）——因為純 unit 對重 mock 的程式碼信心低，integration 的「信心/成本比」更好。適合 I/O 密集、邏輯薄的服務。\n- **contract testing**：在服務邊界放契約。**consumer-driven contract（CDC）**——消費端先寫下「我會這樣呼叫你、期待這樣的回應」，產生契約（pact 檔），供應端在自己的 CI 對著契約驗證自己沒破壞它。Pact 是這條路的事實標準（2026-06）。另一變體是 **schema/spec 契約**（用 OpenAPI/Protobuf 當合約，見序列化與 schema 演進，領域 A）。\n- **snapshot / approval testing**：把輸出整塊存成快照、之後比對差異。對複雜輸出（如序列化結果、render 結果）省事，但容易養出「亂更新快照」的壞習慣。\n- **property-based testing**：不寫死案例，宣告「對所有合法輸入應成立的性質」，由框架自動生成大量輸入找反例。對純函式、解析器、編解碼特別有效。\n- **mutation testing**：故意改壞程式碼（注入 mutant），看測試有沒有抓到——量測「測試本身的有效性」而非覆蓋率。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| unit | 單元邏輯正確；快、定位準 | 純邏輯、演算法、邊界條件 | mock 可能與真實行為不符，買到「假信心」 |\n| integration | 接線正確（DB/queue/序列化） | I/O 密集、薄邏輯服務 | 慢、需環境；testcontainers 起容器有開銷 |\n| contract（CDC/Pact） | 服務間 API 假設一致 | 微服務多、跨團隊邊界 | 需雙方都接入並維護 pact broker；契約漂移要治理 |\n| e2e | 整條路徑可跑、信心最高 | 關鍵使用者旅程（登入→下單） | 最慢最脆；只挑少數黃金路徑，別當主力 |\n| property-based | 覆蓋大量自動生成輸入 | 解析器、編解碼、純函式 | 寫「性質」比寫案例難；失敗的最小反例需 shrink |\n| mutation | 量測測試本身有效性 | 想知道覆蓋率有沒有騙人 | 極慢；當定期體檢、不進每次 CI |\n\n### 何時需要\n\ncontract testing 的決策點很清楚：**當「把所有服務一起跑 e2e」的成本/脆度高到不可接受、而 mock 又怕 mock 錯**時，contract 是甜蜜點——它讓消費端與供應端**各自獨立 CI**，卻仍能在供應端改 API 時把消費端的真實假設打紅。單體應用、或服務邊界少且穩定，不值得引入契約框架與 broker 的維運成本。\n\n金字塔的形狀該因系統而異：重邏輯的計算核心，unit 為主；薄邏輯重 I/O 的 CRUD 服務，重心上移到 integration（測試獎盃）。**別教條地追覆蓋率數字**——80% 覆蓋率可能全是沒斷言的 happy path，不如 50% 覆蓋率但每條都驗了失敗分支。\n\nworked example：三個微服務 A→B→C，每個各 5 個版本要兼容。純 e2e 要驗的組合是 5×5×5 = **125 種**，且每次跑要把三個都拉起來、平均 8 分鐘、flaky 率 5%（一條 25 步的旅程，每步 99.8% 穩，整體 0.998²⁵ ≈ 95% 才會綠）。改成 contract：A↔B、B↔C 兩個邊界各自驗，A 的 CI 只跑自己 + 對 pact 驗證、約 40 秒，B 改 API 時若破壞 A 的契約，B 的 CI 直接紅——把 125 種組合的組合爆炸，拆成兩個線性可驗的邊界。\n\n### 常見誤解與陷阱\n\n- **覆蓋率 = 信心**：行覆蓋率只說「這行被執行過」，不說「有斷言驗證它」。100% 覆蓋率配空斷言是純擺設。\n- **e2e 堆太多**：冰淇淋甜筒反模式——慢、脆、紅了沒人查得動，最後團隊習慣性 retry 到綠，等於沒測。\n- **mock 漂移**：unit 裡 mock 的回應與供應端真實回應悄悄分歧，unit 全綠但上線就爆——這正是 contract testing 要堵的洞。\n- **flaky 測試當背景噪音**：放任偶發紅就 retry，會慢慢侵蝕對整套測試的信任，最後真 bug 也被當 flaky 略過。flaky 要當 bug 修，不是當天氣忍。\n- **把 contract 當完整 e2e**：契約只驗「雙方對 API 形狀/語意的假設一致」，不驗端到端業務正確；兩者互補，不互相取代。\n- **AI 生成測試的假信心**：AI 能快速補大量測試提高覆蓋率數字，但容易生出「測 getter/setter、斷言寫成永真」的湊數測試——覆蓋率漲、實際信心沒漲，review 要盯斷言而非行數。\n\n### 延伸閱讀\n\n- Martin Fowler, \"Test Pyramid\"：https://martinfowler.com/articles/practical-test-pyramid.html\n- Martin Fowler, \"Contract Test\" / \"Consumer-Driven Contracts\"：https://martinfowler.com/bliki/ContractTest.html\n- Pact 官方文件（consumer-driven contract testing）：https://docs.pact.io/\n- Kent C. Dodds, \"The Testing Trophy and Testing Classifications\"：https://kentcdodds.com/blog/the-testing-trophy-and-testing-classifications\n\n## 可觀測性與品質工具地圖\n\n### 定義與原理\n\n這條不講某個概念的機制，而是給一張**選型地圖**：在「日誌採集、執行期診斷、負載測試、相依掃描」這幾個品質/可觀測性類別裡，**該選哪類工具、為什麼、現況如何、有什麼替代**。第一原理是——**工具是用來換取某種保證的，而工具會老化**（停止維護、改授權、被後繼者取代），所以選型時除了「能做什麼」，更要看「**還活著嗎、授權能用嗎、有沒有更好的接班**」。\n\n四個類別各自要的保證不同：日誌採集要**不漏不重、低資源佔用**；執行期診斷要**貼合 runtime、結果準確**；負載測試要**長尾誠實**（見負載測試）；相依掃描要**漏洞庫新、誤報低、能進 CI gate**。\n\n### 解法空間\n\n按類別列各自的代表工具與機制：\n\n- **日誌採集 / 轉發**：\n  - **Fluent Bit**——C 寫的輕量代理，pipeline 是 input → parser → filter → output，記憶體足跡小，適合當每節點 / sidecar 的 log forwarder。2026-06 已到 **v5.0** 系列（CNCF graduated）。\n  - **Fluentd**——Ruby 核心 + 龐大 gem plugin 生態，外掛最齊、較重，適合中央聚合層。同為 CNCF graduated。\n  - 常見組合：節點端用 Fluent Bit 收集轉發、中央用 Fluentd 做複雜路由（兩者同源、可混用）。\n- **Node 執行期診斷**：\n  - **Clinic.js**——NearForm 的 Node 效能診斷套件（Doctor / Flame / Bubbleprof / Heap Profiler 四工具）。⚠️ **2026-06 官方 README 明言「不再積極維護、因深綁 Node 內部、可能失效或結果不準」**，最後正式 release 為 v13.0.0（2023-06）。\n  - 替代：Node 內建 `--prof`、`--cpu-prof`、`node --inspect` 配 Chrome DevTools、`0x`（flamegraph）、`autocannon`（本機快速壓測）、以及 OpenTelemetry / APM 的 profiling 能力。\n- **負載測試**：\n  - **Grafana k6**——Go 引擎、測試腳本以 JavaScript（也支援 TypeScript）撰寫，open source、授權 **AGPLv3**（Grafana 系自 2021 由 Apache 2.0 改 AGPLv3）。積極維護，最新主版 **k6 2.0（GrafanaCON 2026 發表）**。支援開放/封閉模型（scenarios / executors）。\n  - **Vegeta**——tsenart 的 Go HTTP 壓測工具，採 **constant request rate**（固定速率）模型、天然對抗 coordinated omission（見負載測試）；可當 CLI 或 Go library，最新約 **v12.13.0**（2026-06）。\n  - 機制差異：k6 是「寫腳本表達情境」的全功能框架；Vegeta 是「一行打固定速率」的尖刀，CI 回歸基準很順手。\n- **相依 / 漏洞掃描**：\n  - **Snyk**——developer-security 平台，核心是 **SCA（software composition analysis，開源相依漏洞掃描＝Snyk Open Source）**，另涵蓋 SAST（Snyk Code）、Container、IaC。深整合 IDE / Git / CI/CD，能開自動修復 PR。2026-06 為商業 freemium。\n  - 替代：`npm audit`（內建、免費但庫較淺）、OWASP Dependency-Check、Trivy（容器+相依，開源）、GitHub Dependabot（相依更新 + 告警）。\n\n### 各方案的保證與取捨\n\n| 工具 | 類別/保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Fluent Bit（v5，2026-06） | 日誌轉發；輕量、低足跡 | 每節點/sidecar log forwarder | v4.2 維護至 2026-06-30，宜上 v5；外掛數少於 Fluentd |\n| Fluentd | 日誌聚合；外掛生態最齊 | 中央路由/聚合層 | Ruby、較重；高吞吐節點端不如 Fluent Bit |\n| Clinic.js | Node 診斷；四合一視覺化 | 既有專案的歷史分析 | ⚠️ 已停止積極維護、可能與新版 Node 不相容，勿當現役推薦（2026-06） |\n| Grafana k6（2.0） | 負載測試；情境腳本、雙模型 | 要寫複雜情境/CI 壓測回歸 | 授權 AGPLv3（非 MIT/Apache），自架服務化需留意條款 |\n| Vegeta（v12.13.0） | 負載測試；固定速率、抗遺漏 | 簡單高頻速率基準、CLI/library | 不適合複雜多步情境；速率設過高會打爆測試端 |\n| Snyk | 相依掃描（SCA）；自動修復 PR | 跨語言 SCA + SAST + IaC 一站 | 商業 freemium，Free 層有測試次數上限、Team 約 $25/dev/月（2026-06，以官網為準） |\n\n### 何時需要\n\n- **日誌採集**：一旦有多節點 / 容器化、需把分散日誌集中化就需要；單機單體直接寫檔/stdout 即可（logs as streams，見 12-factor app，領域 Q）。選 Fluent Bit 還是 Fluentd 看「節點端輕量 vs 中央外掛齊」。\n- **Node 診斷**：定位 event loop 卡頓、記憶體洩漏、CPU 熱點時需要——但 Clinic.js 既已 dormant，新專案優先用內建 profiler / OpenTelemetry，把 Clinic.js 當「能用就用、不可依賴」。\n- **負載測試**：見負載測試的「何時需要」；簡單速率基準選 Vegeta、複雜情境選 k6。\n- **相依掃描**：任何有開源相依、且相依會隨時間冒漏洞的專案都需要某種 SCA 進 CI（這是供應鏈風險的第一道防線，見自建 vs 採用 + 相依管理，領域 U）。要不要上 Snyk（付費、功能全）vs `npm audit`/Trivy（免費、較淺），看團隊預算與合規需求。\n\nworked example：一個 Node 服務有 800 個傳遞相依（transitive dependencies），手動追 CVE 不可能。接上 SCA 掃描後，假設漏洞密度約每 200 個套件 1 個可修高危漏洞，一次掃描約報出 **4 個高危**並各開一個升版 PR；接進 CI gate 後，新引入帶已知高危漏洞的相依會在 PR 階段就被擋下，把「上線後才發現用到有漏洞的套件」變成「合併前就攔截」。代價是誤報需人工 triage、以及付費層的 per-developer 成本。\n\n### 常見誤解與陷阱\n\n- **把停更工具當現役**：Clinic.js 是典型——文件還在、看起來能跑，但官方已明說不維護、深綁 Node 內部可能在新版失準（2026-06）。選工具要查「最後 release 日期 + 維護聲明」，不能只看「搜得到、星很多」。\n- **授權沒看清**：k6 是 **AGPLv3** 不是寬鬆授權——若你把它包進對外提供的服務、或內嵌進產品，AGPL 的網路條款可能觸發義務。選 OSS 工具先讀 LICENSE，不是讀 README。\n- **SCA 報告 = 安全**：相依掃描只覆蓋**已知**漏洞（CVE 已揭露的），零日與自家程式碼的邏輯漏洞它看不到；且高誤報率若不 triage 會養出「狼來了」、整批被忽略。\n- **負載測試工具選錯模型**：用封閉模型的工具量對外 API 的長尾會被 coordinated omission 騙（見負載測試）——這是工具選型直接影響數據真相的例子。\n- **日誌採集器自己變瓶頸**：log forwarder 設定不當（無背壓、buffer 無界）會在日誌暴量時吃光記憶體或拖垮節點；轉發層也要有背壓與丟棄策略（見背壓，領域 E）。\n- **版本號當永恆**：本條所有版本/授權/定價都標了（2026-06）——它們是會腐的事實，引用時務必回官方來源複查，別把今天的版本號寫成定律。\n\n### 延伸閱讀\n\n- Fluent Bit 官方文件：https://docs.fluentbit.io/manual\n- Fluent Bit vs Fluentd（官方對比）：https://docs.fluentbit.io/manual/about/fluentd-and-fluent-bit\n- Clinic.js（GitHub，含維護狀態聲明）：https://github.com/clinicjs/node-clinic\n- Grafana k6 官方文件：https://grafana.com/docs/k6/latest/\n- Vegeta（GitHub）：https://github.com/tsenart/vegeta\n- Snyk 官方網站（產品與定價）：https://snyk.io/\n"}, {"id": "V-ops-culture", "file": "V-ops-culture.md", "group": "Part 7 — 觀測與營運文化", "title": "V · 營運與事故文化", "md": "# V · 營運與事故文化\n\n這個領域解的是「系統會壞、人會犯錯，團隊怎麼把壞掉與犯錯變成可學習、可改善的資產」——也就是把可靠性從個人英雄主義變成組織能力。本檔含五個條目：事故應變與無咎事後檢討、SRE 文化（toil／error budget／SLO-driven）、DORA 四指標、程式碼審查、分支與發布策略。邊界：技術層的觀測機制（metric/log/trace、SLI/SLO 怎麼算、告警設計）屬可觀測性領域；本檔只談這些訊號**長出來之後**，團隊用什麼文化與流程去回應它們、用什麼指標去衡量自己、用什麼協作機制保護程式碼品質與發布安全。\n\n## 事故應變與無咎事後檢討\n\n### 定義與原理\n\n事故（incident）是「使用者可見的服務劣化或中斷」。事故應變（incident response）是從偵測到緩解到復原的那條時間軸上，團隊如何協調行動；無咎事後檢討（blameless postmortem）是事故落幕後，團隊如何把這次經驗轉成「下次不會再犯」的書面學習；runbook 則是把「這類事故怎麼處理」事先寫下來的操作手冊。\n\n第一原理只有一句：**人不是事故的根因，系統才是。** 一個工程師在半夜按錯了切換指令，真正該問的不是「他為什麼這麼粗心」，而是「為什麼這個系統允許一個疲憊的人一鍵造成全面中斷、而且沒有任何護欄攔住他」。這個視角源自安全科學的「Just Culture（公正文化）」——把調查焦點放在失敗發生的情境機制與當事人當下握有的資訊，而不是事後諸葛地懲罰當事人。最有影響力的工程界落地版本是 John Allspaw 在 Etsy 任 CTO 時於 2012 年發表的〈Blameless PostMortems and a Just Culture〉一文（2026-06）。\n\n保證是什麼？無咎不是「沒人需要負責」，而是「我們保證：誠實揭露細節的人不會因此受罰」——這個保證換來的是**資訊的完整性**。一旦工程師預期被究責，他會隱藏、淡化、合理化，於是組織永遠拿不到事故的真實機制，下次照樣踩。無咎用「不罰人」交換「拿到真相」。\n\n### 解法空間\n\n處理事故與檢討，不是一招，而是一整套互相銜接的機制：\n\n- **事故分級（severity levels）**：用 SEV1/SEV2/… 之類的分級，決定「要喚醒多少人、多快、用什麼管道」。分級的本質是一個觸發器：不同等級對應不同的應變強度，避免每個小毛病都驚動全公司，也避免大事故被當小事拖延。\n- **角色化的事故指揮（Incident Command）**：借自消防體系的 ICS，明確分出 Incident Commander（決策與協調，不親手修）、Communications Lead（對內外同步狀態）、Operations（實際動手）。核心是把「協調」與「動手」分開，避免唯一懂行的人一邊救火一邊回十個人的訊息。\n- **runbook / playbook**：對「已知會發生」的事故（憑證過期、磁碟寫滿、主從切換）事先寫下步驟，讓 on-call 不必在半夜重新推理。runbook 是把專家的隱性知識顯性化。\n- **無咎事後檢討會議與文件**：事故結束後產出時間軸（timeline）、影響範圍、根因分析（常用 Five Whys 或更嚴謹的因果圖）、以及帶 owner 與期限的行動項（action items）。\n- **行動項的追蹤閉環**：postmortem 最常見的失敗不是寫得不好，而是行動項寫完就沒人管。需要把它接回正常的工作排程，否則檢討淪為儀式。\n- **（AI 維度）** 大型語言模型可以草擬事故時間軸、彙整 log、生成 postmortem 初稿——這能省下整理的苦工；但新陷阱是「看起來完整的根因」可能是模型把零散事實圓成的順暢敘事，掩蓋了真正沒查清楚的環節。AI 適合做苦工與初稿，根因判斷與行動項仍須人來定。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 事故分級（SEV levels） | 把應變強度與事故嚴重度對齊，避免反應過度或不足 | 任何有 on-call 的團隊 | 分級標準要客觀（可量化的使用者影響），否則人人把自己的事故往高報或往低壓 |\n| 事故指揮角色分工 | 救火時不亂、溝通不斷線 | 中大型事故、跨團隊 | 小事故硬套角色是儀式負擔；要有「升級門檻」才啟動 |\n| runbook | 縮短已知事故的處理時間、降低對特定人的依賴 | 重複出現、步驟明確的故障 | 會腐化——系統一變 runbook 就過時，需綁進變更流程定期校驗 |\n| 無咎事後檢討 | 換到事故的真實機制、累積組織記憶 | 所有 SEV1/SEV2 級事故 | 「無咎」需高層真心背書；一次秋後算帳就摧毀所有人的誠實 |\n| Five Whys 根因分析 | 從表象往下挖到系統性原因 | 單一主因清晰的事故 | 複雜事故常是多因耦合，硬挖「唯一根因」會誤導；此時改用因果圖 |\n\n要點：runbook 給你「快」但要付「維護」的代價；無咎給你「真相」但要付「組織必須真的不罰人」的代價——後者是文化承諾，不是寫進 wiki 就生效。\n\n### 何時需要\n\n只要服務有真人使用、且故障會被使用者感受到，就需要某種程度的事故應變。但強度要匹配規模：\n\n- **一人或小團隊、低流量內部工具**：一份簡單的 on-call 聯絡方式加幾條 runbook 就夠，硬上 Incident Commander 角色是 over-engineering。\n- **有 SLA 承諾、有付費使用者、跨多團隊**：需要完整的分級、指揮體系、強制 postmortem。這時「沒有事故流程」本身就是最大的風險。\n- **判準**：問自己「下一次半夜大故障，誰會先知道、誰來指揮、第一步看哪份文件」。如果答案是「看誰運氣好醒著」，就到了該建流程的時候。\n\n情境推演：一個團隊半夜遇到資料庫主從切換失敗，主庫掛了、自動切換卡在中途，寫入全部失敗。沒有流程的版本——三個人同時連進去、各自下指令、互相覆蓋，狀態越救越亂。有流程的版本——告警觸發 SEV1，on-call 升級並指定一位 Incident Commander，他不動手，只負責決策與同步；Operations 照 runbook 確認切換卡在哪一步、手動完成 failover；Communications Lead 每十五分鐘對內更新狀態。事後跑 blameless postmortem，發現根因不是「誰按錯」，而是「自動切換在這個版本有已知 bug、且沒有監控覆蓋這個中間態」。行動項是補上監控與修 bug，沒有人被點名。下一次同類故障，因為監控補上了，在卡住前就被攔截。\n\n### 常見誤解與陷阱\n\n- **把「無咎」誤解成「無責任」。** 無咎是不懲罰個人，但行動項仍有明確 owner、組織仍對改善負責。沒有行動項閉環的無咎，會退化成「大家互相安慰一下就散會」。\n- **追求「唯一根因」。** 真實的大事故幾乎都是多個小問題在錯誤時機疊加（觸發條件 + 缺失的護欄 + 延遲的偵測）。執著於找出單一根因，會讓你修掉一個誘因卻留下整片地雷。\n- **runbook 寫完就不管。** runbook 與系統一起腐化，過時的 runbook 比沒有更危險——它讓人在半夜照著一份已經不成立的步驟操作。\n- **只對大事故檢討。** 反覆出現的小事故（near miss）才是免費的學習機會，它在低成本時就告訴你系統的脆弱點。\n- **把 MTTR 當唯一目標。** 一味追求「修得快」會誘導團隊草草緩解、跳過真正理解，導致同一事故反覆發生。緩解（mitigate）與理解（understand）是兩件事，都要做。\n\n### 延伸閱讀\n\n- John Allspaw, \"Blameless PostMortems and a Just Culture\", Etsy Code as Craft, 2012：https://www.etsy.com/codeascraft/blameless-postmortems\n- Google SRE Book, \"Postmortem Culture: Learning from Failure\"：https://sre.google/sre-book/postmortem-culture/\n- PagerDuty Incident Response Documentation：https://response.pagerduty.com/\n\n## SRE 文化\n\n### 定義與原理\n\nSRE（Site Reliability Engineering，網站可靠性工程）是 Google 提出的一種「用軟體工程的方法做維運」的實踐。它的文化核心不是一堆工具，而是三個互鎖的概念：**toil（瑣務）**、**error budget（錯誤預算）**、**SLO-driven（以服務水準目標驅動決策）**。\n\n第一原理是一個反直覺的命題：**100% 可靠不是對的目標。** Google SRE 的論述是——對絕大多數服務而言（心律調節器、防鎖死煞車這類例外不算），使用者根本分不出 100% 可用與 99.999% 可用的差別，因為使用者到服務之間還隔著筆電、家用 WiFi、ISP、電網，這些加起來遠不到 99.999%。既然 100% 不是目標，那就存在一段「允許壞掉的額度」——這就是 error budget。\n\n- **SLO（Service Level Objective）**：你對某個服務水準訂的目標值，例如「過去 28 天內 99.9% 的請求成功」。\n- **error budget = 1 − SLO**：99.9% 的 SLO 就有 0.1% 的錯誤預算。這 0.1% 不是失敗，而是**可以花用的資源**——你可以拿它去冒險發布、做實驗、跑混沌測試。\n- **toil**：手動、重複、可自動化、隨系統規模線性增長、反應式、不留長期價值的工作。SRE 的目標是把 toil 壓到一定比例以下（Google 內部慣例是 50%），把省下的時間投入能根本減少未來 toil 的工程。\n\n保證與取捨在這裡特別清晰：SLO 是一個**雙向契約**。它向使用者保證「我們會維持這個水準」，同時向開發團隊保證「只要還在預算內，你有發布的自由」。代價是團隊必須誠實地量測、並接受「燒光預算就得停下來修穩定性」的紀律。\n\n### 解法空間\n\n把 SRE 文化落地，有幾條相對獨立的施力點：\n\n- **定義 SLI/SLO**：先選出真正反映使用者體驗的服務水準指標（SLI，如成功率、延遲），再為它訂目標（SLO）。機制細節（SLI 怎麼從訊號算出來、p99/p999 怎麼回事）屬可觀測性領域；這裡關心的是「訂多少、為誰訂」。\n- **error budget policy（錯誤預算政策）**：事先白紙黑字約定「預算燒到剩多少時、發生什麼事」——例如預算耗盡就凍結功能發布、全員轉去修可靠性，直到預算回補。把它寫成政策，是為了讓「該不該繼續冒險」變成一條客觀規則，而不是每次都靠資深工程師與產品經理在會議室拉鋸。\n- **error budget 當談判工具**：這是 SRE 文化最聰明的一招。當產品想加速發布、SRE 想穩定，傳統做法是兩派各執一詞、最後比誰嗓門大。error budget 把爭論變成數字：**還有預算 → 放手發；預算見底 → 客觀地停**。它把「穩定 vs 速度」的對立，轉成同一個帳戶的收支，雙方都對著同一個事實說話。\n- **toil 量測與消除**：先量「團隊花多少時間在 toil 上」，超過閾值就把它當成一級工作項去自動化。\n- **on-call 的可持續性**：限制單人 on-call 的事故密度與時長，把過量的告警與手動操作當成 toil 的訊號。\n- **（AI 維度）** AI 可承接一部分 toil——自動分類告警、生成緩解腳本、值班摘要。原理層的新風險是：當例行操作越來越多由 AI 代勞，團隊對系統的「肌肉記憶」會退化，真正非典型的事故來臨時反而更慌；自動化要留下「人仍理解在發生什麼」的觀測窗。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 訂 SLO | 把「夠可靠了沒」變成可量測的客觀問題 | 有明確使用者、可定義成功的服務 | SLO 訂太高＝永遠在救火、沒預算創新；訂太低＝使用者已經在抱怨你還說達標 |\n| error budget policy | 預先約定觸發條件，省去每次臨時拉鋸 | 開發與維運由不同人/團隊負責 | 政策若沒有高層背書，預算燒光時照樣被「這次例外」推翻，等於沒訂 |\n| error budget 當談判工具 | 把速度與穩定的對立轉成共用帳戶 | 產品壓力與可靠性需求長期衝突 | 前提是 SLO 與量測雙方都信；若數字本身有爭議，談判工具就失靈 |\n| toil 量化與消除 | 把重複勞動換成一次性工程投資 | toil 已吃掉大量工程時間 | 「自動化一切」也可能是過度工程；只值得自動化會反覆發生、且穩定的 toil |\n\n### 何時需要\n\nSRE 是一套重量級文化，不是每個團隊都該全盤照搬：\n\n- **小團隊、產品早期**：完整的 error budget policy 與 SLO 治理是 over-engineering——產品還在找市場，過早的可靠性紀律會拖慢探索。此時取其精神（別追求 100%、把重複勞動自動化）即可，不必上完整制度。\n- **服務已有規模、可靠性直接影響營收或信任**：這時 SLO 與 error budget 的價值最大——它讓「要不要為了發新功能而冒穩定性風險」這個每天都在發生的爭論，有了一把客觀的尺。\n- **判準**：當「產品要快」與「維運要穩」已經演變成跨團隊的長期角力、且每次都靠人情或職級擺平時，就是引入 error budget 當談判工具的時機。\n\n情境推演：一個團隊訂了 99.9% 的月度可用性 SLO。月初一次糟糕的發布燒掉了大半預算，月中又一次小事故把預算燒到見底。按照事先寫好的 error budget policy，團隊自動進入「功能凍結」狀態——所有新功能發布暫停，全員轉去補測試覆蓋、修那兩次事故的根因，直到下個計費週期預算回補。關鍵在於：產品經理沒有跟 SRE 吵架，因為這是月初大家都同意的規則；爭論的對象是「事實（預算還剩多少）」，不是「立場（你想快還我想穩）」。\n\n### 常見誤解與陷阱\n\n- **把 SLA 與 SLO 混為一談。** SLA 是對外、帶法律與賠償後果的合約承諾；SLO 是對內、用來驅動工程決策的目標。SLO 通常訂得比 SLA 嚴（留緩衝），以便在違反 SLA 前就先警覺。\n- **追求 100% 可靠。** 這不只浪費，還會誤導優先序——把資源砸在使用者根本感受不到的那幾個 9 上，排擠了更該做的事。\n- **把 error budget 當「失敗額度」消極看待。** 它的精神是「沒花的預算等於浪費的冒險機會」——有預算就該拿去發布、實驗，而不是抱著不用。\n- **toil 與「困難的工作」混淆。** toil 的關鍵不是難不難，而是「重複、可自動化、不留長期價值」。一件很難但只做一次、且推進了系統的工作不是 toil。\n- **訂了 SLO 卻沒有 error budget policy。** 只有目標、沒有「燒光了會怎樣」的後果約定，SLO 就只是個儀表板數字，不會真正改變任何決策。\n\n### 延伸閱讀\n\n- Google, Site Reliability Engineering（書），尤其 \"Embracing Risk\"（Marc Alvidrez）與 \"Eliminating Toil\"：https://sre.google/sre-book/embracing-risk/\n- Google SRE Workbook, \"Implementing SLOs\" 與 \"Error Budget Policy\"：https://sre.google/workbook/error-budget-policy/\n\n## DORA 四指標\n\n### 定義與原理\n\nDORA（DevOps Research and Assessment）是一個始於 2014 年、後被 Google 收編的研究計畫，透過大規模問卷（即每年的 Accelerate State of DevOps Report）找出「軟體交付效能與哪些做法相關」。它最有名的產出，是把「一個團隊交付軟體的能力」濃縮成四個可量測的指標，並用統計證明它們同時與交付速度與系統穩定相關——也就是書《Accelerate》（Forsgren、Humble、Kim，2018）的核心論點：**速度與穩定不是取捨關係，高效能團隊兩者都好。**\n\n四個指標傳統上分兩組——吞吐 vs 穩定（注意：DORA 在 2024 年的報告重組過分類，新增第五個指標 Deployment Rework Rate、並把「失敗部署復原時間」從穩定組移到吞吐組；但「四指標分兩組」仍是最通用的入門記法，2026-06）：\n\n- **吞吐（throughput / 速度）**\n  - **Deployment Frequency（部署頻率）**：在給定期間內部署的次數，或兩次部署之間的間隔。\n  - **Lead Time for Changes（變更前置時間）**：一筆變更從 commit 進版本控制，到部署上線，所經過的時間。\n- **穩定（stability）**\n  - **Change Failure Rate（變更失敗率）**：部署後需要立即介入（修補、rollback、hotfix）的比例。\n  - **Failed Deployment Recovery Time（失敗部署復原時間）**：一次失敗的部署需要多久才復原。**這個指標原名 MTTR / Time to Restore Service，DORA 在 2023 年正式更名並收窄定義**（2026-06）——舊定義不分「失敗是不是由變更造成」，新定義只算「因變更導致的劣化」的復原時間，讓它在統計上跟其他三個交付指標對齊。\n\n第一原理：這四個指標必須**一起看、不能單獨優化**。如果只看部署頻率，團隊會狂發爛 code；如果只看變更失敗率，團隊會不敢發布。**四個一起看，才能逼出「又快又穩」**——這正呼應 DORA 的招牌發現：速度與穩定不是零和，只盯其中一兩個的做法會被其餘指標抓包（把它們想成「兩兩對抗」只是防呆記法，不代表速度與穩定之間有內建取捨）。\n\n補充：DORA 在 2024 年加入了第五個指標 **Deployment Rework Rate（部署返工率，因生產事故而產生的非計畫部署比例）**（2026-06）；但「DORA 四指標」作為通稱仍指上述四個。\n\n### 解法空間\n\nDORA 指標是「量尺」不是「藥」——它告訴你團隊現在在哪，但改善要靠底層工程做法。研究本身指出的高效能團隊做法包括：\n\n- **縮短 Lead Time**：小批量提交、trunk-based development、自動化測試與 CI/CD，讓變更從 commit 到上線的路徑短而自動（見 分支與發布策略）。\n- **提高 Deployment Frequency**：把大發布拆成小而頻繁的部署，配合自動化部署管線；批量越小、單次風險越低。\n- **降低 Change Failure Rate**：強化自動化測試、code review、漸進式發布（canary）讓壞變更在小範圍就被攔（見 程式碼審查）。\n- **縮短 Failed Deployment Recovery Time**：快速 rollback 能力、feature flag 即時關閉、完善的 runbook 與監控（見 事故應變與無咎事後檢討）。\n- **量測方式的選擇**：可以用 CI/CD 與版控的工程資料自動算（客觀但要接管線），也可以用 DORA 官方的快速問卷自評（主觀但零接入成本，適合起步）。\n\n### 各方案的保證與取捨\n\n四個指標各自衡量什麼、單獨看會被什麼遊戲化：\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Deployment Frequency | 反映批量大小與發布自動化程度 | 想知道交付節奏快不快 | 單獨衝高＝鼓勵亂發；務必與失敗率同看 |\n| Lead Time for Changes | 反映從寫完到上線的摩擦 | 想找出流程瓶頸（卡 review？卡部署？） | 定義要一致——是「commit 到上線」還是「開始寫到上線」？混用無法比較 |\n| Change Failure Rate | 反映發布品質 | 想知道發布有多常出包 | 「失敗」定義要明確、且誠實上報；定義太鬆會自我感覺良好 |\n| Failed Deployment Recovery Time | 反映復原能力 | 想知道出事後多快站起來 | 2023 後只算「變更造成」的復原；別跟廣義 MTTR 混用 |\n\n要點：這四個是**團隊層級的趨勢指標，不是個人 KPI**。一旦拿來考核個人，立刻被遊戲化（拆成更多假部署衝頻率、不敢上報失敗壓低失敗率），指標就死了。它們的保證僅在「誠實量測、整體觀察」的前提下成立。\n\n### 何時需要\n\n- **想客觀回答「我們的交付效能到底好不好、有沒有變好」時**：DORA 提供一套有大規模研究背書、跨團隊可比的共同語言，避免「我覺得我們很快」這種無法驗證的自我評價。\n- **想推動工程改善但缺乏說服高層的數據時**：DORA 把「投資 CI/CD、改用 trunk-based」這類提案，連結到可量測的速度與穩定改善（見 SRE 文化中 error budget 當談判工具，是同一種「用數字談判」的思路）。\n- **不需要的時候**：團隊太小、部署本來就很頻繁且沒痛點時，正式量測四指標可能是 over-engineering——重點是有沒有實際瓶頸，不是有沒有儀表板。最大的反模式是**把指標本身當目標**（見陷阱）。\n\n情境推演：一個團隊覺得「我們發布好像很慢，但說不上來慢在哪」。導入 DORA 量測後發現：Deployment Frequency 不低（每天好幾次），但 Lead Time 很長——細查發現變更卡在「等人 review」與「等手動部署排程」這兩段。於是團隊不是去逼大家寫快一點，而是縮小 PR 尺寸、加上自動化部署。三個月後 Lead Time 明顯下降，且 Change Failure Rate 沒有惡化——這正是 DORA 設計的用意：用指標定位瓶頸，而不是拿指標鞭打人。\n\n### 常見誤解與陷阱\n\n- **把四指標當 KPI 考核個人或團隊績效。** 這是頭號陷阱。Goodhart 定律會立刻生效——指標一旦成為目標，就不再是好指標。DORA 是給團隊自我診斷與追蹤趨勢用的。\n- **以為四指標就是 DORA 的全部。** DORA 研究還包含一大堆「能力」（文化、自動化、精實管理等），四指標只是結果面的量測。光看指標不看背後做法，等於只看體溫不看病因。\n- **沿用舊的 MTTR 定義。** 第四個指標 2023 年已更名為 Failed Deployment Recovery Time 並收窄為「變更造成的劣化」的復原時間（2026-06）；若仍用廣義 MTTR（含資料中心斷電等非變更因素），會跟 DORA 的最新定義不一致。\n- **以為「elite」是唯一正確終點。** DORA 的分級（elite/high/medium/low）是描述性的分布，不是道德排名。一個低變更需求的內部系統，硬要追 elite 級部署頻率毫無意義。\n- **混淆 Lead Time for Changes 與產品 lead time。** DORA 的 Lead Time 是「commit 到上線」的交付管線時間，不是「點子到上線」的整段產品週期；兩者都重要，但別混用同一個名字。\n\n### 延伸閱讀\n\n- DORA, \"DORA's software delivery performance metrics\"：https://dora.dev/guides/dora-metrics/\n- DORA, \"A history of DORA's software delivery metrics\"：https://dora.dev/insights/dora-metrics-history/\n- Forsgren, Humble, Kim, *Accelerate: The Science of Lean Software and DevOps*, IT Revolution Press, 2018：https://itrevolution.com/product/accelerate/\n\n## 程式碼審查\n\n### 定義與原理\n\n程式碼審查（code review）是「變更在合進主幹前，由作者以外的人讀過並提出意見」的流程，現代多以 pull request / merge request 形式進行。表面上它在抓 bug，但抓 bug 其實是它最弱的功能（研究與經驗都顯示自動化測試抓 bug 更有效）。它真正保護的東西更深：\n\n- **集體所有權與知識擴散**：審查強迫至少兩個人理解每段變更，避免系統出現「只有某一個人懂」的孤島。當那個人請假或離職時，這就是團隊的保險。\n- **可維護性與一致性**：審查者站在「未來要讀這段 code 的人」的位置，攔下會讓系統越來越難改的設計與命名。\n- **設計層面的早期攔截**：在變更還小、還沒長進系統前，質疑「這個方向對嗎」，比上線後重構便宜得多。\n- **一道社會性的品質閘**：知道有人會讀，作者下筆時自然更謹慎——這個「被看見」的預期本身就在提升品質。\n\n所以審查的保證不是「沒有 bug」，而是「**沒有變更是只有一個人知道、且沒有第二雙眼睛覺得它可維護的**」。\n\n### 解法空間\n\n「讓變更被有效審查」有很多種強度與形式，可以混用：\n\n- **非同步 pull request 審查**：最主流。作者開 PR、審查者留 comment、來回到 approve。優點是不卡時間、留下書面紀錄；缺點是來回延遲拉長 Lead Time。\n- **結對程式設計（pair programming）**：兩人同時寫，等於即時、連續的審查。攔得最早，但持續佔用兩個人的時間。\n- **設計審查前置**：對大變更，先審「設計文件」再寫 code，把方向性問題擋在投入大量實作之前（與 RFC／設計文件流程同源，屬團隊推動領域）。\n- **自動化先行、人審其餘**：把格式、lint、明顯錯誤、測試覆蓋交給 CI 自動擋，人類審查者只看機器看不出的東西——設計、命名、邊界情況、可讀性。這是讓人審不被瑣事淹沒的關鍵。\n- **審查的範圍與粒度約定**：團隊約定「多大的 PR 需要幾人 approve」「哪些路徑需要特定 owner（CODEOWNERS）核可」，把審查強度與風險對齊。\n- **（AI 維度）** AI 可以做第一輪審查——指出明顯問題、生成摘要、解釋 diff——減輕人類審查者的負擔；但原理層的新陷阱有二：其一，AI 生成的程式碼會製造「能跑但沒人真正理解」的變更，人類審查反而更該追問「我們懂這在做什麼嗎」；其二，把審查整個外包給 AI，會抽掉審查最重要的功能——讓**人**理解這段變更、達成知識擴散。AI 審查補強細節，不取代「至少一個活人懂這段 code」。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 非同步 PR 審查 | 留書面紀錄、不卡時間、知識擴散 | 絕大多數團隊的預設 | 來回延遲會拖長 Lead Time；大 PR 會讓審查者放棄細看、直接 approve |\n| 結對程式設計 | 最即時的審查、最強的知識共享 | 高風險、高複雜、新人帶教 | 持續佔兩人時間，成本高，不適合全面採用 |\n| 設計審查前置 | 在投入實作前攔下方向性錯誤 | 大型、不可逆、跨團隊的變更 | 小變更硬要設計審查是儀式負擔 |\n| 自動化 + 人審分工 | 人不被瑣事淹沒、專注高價值意見 | 任何有 CI 的團隊 | 自動化擋不掉設計與意圖層的問題，別以為 CI 綠了就不用人審 |\n\n要點：審查的代價是 Lead Time 與審查者的注意力。**PR 越大、審查品質越差**——這是審查最反直覺的規律：一個 1000 行的 PR 往往得到的有效意見比 50 行的還少，因為審查者讀不動就放水。所以「小批量」不只利於部署，也是讓審查真正有效的前提。\n\n### 何時需要\n\n- **多人協作、變更會長期影響他人**：幾乎一定要審查——它是集體所有權的主要機制。\n- **單人專案或拋棄式原型**：審查可能是純負擔，自我審查（隔一天再讀一次）或工具自動檢查就夠。\n- **判準**：問「這段 code 半年後出問題時，除了作者還有誰能改它」。如果答案是「沒有人」，就是需要審查的訊號——不是為了挑錯，是為了讓知識不只活在一個人腦裡。\n\n情境推演：一個三人小團隊原本人人直接 push 到主幹。某天一段沒人審過的快取失效邏輯上線後，在特定併發下偶發地回傳舊資料，查了兩天才定位。事後他們改成「所有變更走 PR、至少一人 approve」。導入初期確實慢了一點，但兩個月後的收穫不在於「審查抓到多少 bug」（其實沒抓到太多），而在於：每個人現在都大致知道彼此那塊在幹嘛，請假時不再有「只有你懂、別碰」的死角，新人也能靠讀別人的 PR 快速熟悉 codebase。\n\n關於回饋的給與收（這是審查文化的軟性核心）：\n\n- **給回饋**：對事不對人——評論的是 code 不是作者；區分「必須改（blocking）」與「建議（nit，可選）」，別把個人偏好包裝成硬性要求；解釋「為什麼」，讓回饋能教育而不只是命令。\n- **收回饋**：把審查意見當成對 code 的、不是對自己人格的；不同意時用討論而非防衛回應；記住審查者花時間讀你的 code 是在幫你。\n\n### 常見誤解與陷阱\n\n- **把審查當抓 bug 的主力。** 抓 bug 是測試的工作；審查的核心價值是知識擴散與可維護性。用「審查能不能抓到 bug」評價審查，會低估它真正的作用。\n- **橡皮圖章（rubber-stamping）。** PR 太大、太趕，審查者掃一眼就 approve。這比沒有審查更糟——它製造了「有人看過」的假象。對策是強制小批量。\n- **把個人風格偏好當阻擋理由。** 能自動化的格式爭議（縮排、引號）交給 formatter，別佔用人類審查的頻寬與情緒；人審只談機器談不了的事。\n- **回饋傷人。** 「這寫得很爛」與「這裡在高併發下會 race，建議用 CAS」是天差地別的兩句話，後者教人、前者只傷人。審查的長期成本是團隊的心理安全，措辭是它的一部分。\n- **用審查當守門人的權力。** 審查不是資深者卡資淺者的關卡；它是雙向的——資淺者審資深者的 code 同樣有價值，且是最好的學習。\n\n### 延伸閱讀\n\n- Google, \"Code Review Developer Guide\"（engineering practices）：https://google.github.io/eng-practices/review/\n- \"Modern Code Review: A Case Study at Google\"（Sadowski et al., ICSE-SEIP 2018）：https://research.google/pubs/modern-code-review-a-case-study-at-google/\n\n## 分支與發布策略\n\n### 定義與原理\n\n分支策略（branching strategy）是團隊約定「程式碼如何在分支間流動、何時合進主幹、如何走向發布」的規則。它表面上是 Git 用法，骨子裡決定了**整合的頻率**——而整合頻率直接決定了「合併衝突有多痛、壞變更多快被發現、發布有多敢頻繁」。\n\n兩個典型端點：\n\n- **git-flow**：Vincent Driessen 於 2010 年提出的分支模型（2026-06），有多條長命分支——`main`、`develop`、`feature/*`、`release/*`、`hotfix/*`。功能在 feature 分支上長時間開發，完成後才合回。它為「有明確版本發布、需要平行維護多版本」的軟體（如套裝產品、需支援舊版的 SDK）設計。\n- **trunk-based development（主幹開發）**：所有人每天至少一次把變更合進單一共享分支（trunk / `main`），分支只活幾小時、絕不長期偏離主幹。它為「持續交付（CD）、頻繁部署」設計。\n\n第一原理是 **continuous integration 的本義**：整合得越頻繁，每次整合的差異越小，衝突與「合併地獄」就越少、壞變更暴露得越早。長命分支推遲整合，等於把痛苦累積到最後一次性爆發。這也是 DORA／《Accelerate》研究的明確發現之一：**trunk-based development 是高效能團隊的關鍵技術實踐**（2026-06）。值得一提的是，連 git-flow 的作者 Driessen 後來都在原文加註：若你在做持續交付，建議改用更簡單的工作流（如 GitHub Flow），別硬把 git-flow 套上去（2026-06）。\n\n### 解法空間\n\n分支策略是一條光譜，不是二選一；常見的點包括：\n\n- **trunk-based（嚴格版）**：直接 commit 到 trunk 或用幾小時的短命分支，配 feature flag 把「未完成的功能」藏在主幹裡不對外。\n- **GitHub Flow**：trunk-based 的輕量版——`main` 永遠可部署，功能走短命分支 + PR，merge 後即可部署。介於嚴格 trunk-based 與 git-flow 之間，是多數網路服務的主流。\n- **GitLab Flow**：在 GitHub Flow 上加 environment / release 分支，給需要明確「上到哪個環境」的團隊一點額外結構。\n- **git-flow**：完整的多長命分支模型，適合版本化發布。\n- **feature flag（功能旗標）**：與分支策略正交但關鍵的配套——它把「程式碼合併」與「功能對使用者開啟」解耦，讓你能用 trunk-based 頻繁整合，卻不必等功能完整才合併。這是 trunk-based 能成立的技術前提。\n- **發布手段的配套**：分支策略決定 code 怎麼流到「可發布狀態」，實際怎麼安全地放給使用者（rolling / blue-green / canary）是部署策略的事（見部署與發布領域）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| trunk-based development | 整合最頻繁、衝突最小、最配 CD；DORA 認證的高效能實踐 | 持續交付、頻繁部署的網路服務 | 強烈依賴自動化測試與 feature flag；測試不夠強時，主幹會頻繁壞掉 |\n| GitHub Flow | trunk-based 的輕量版，`main` 永遠可部署 | 多數 web/SaaS 團隊的合理預設 | 仍需要好的 CI 與小 PR；長命 feature 分支會讓它退化成 git-flow |\n| git-flow | 支援平行維護多個發布版本、明確的 release/hotfix 流程 | 套裝軟體、需長期支援舊版、無法持續部署 | 長命分支推遲整合 → 合併衝突大、回饋慢；不適合持續交付 |\n| feature flag | 解耦「合併」與「對外開啟」，讓主幹整合不必等功能完整 | 配 trunk-based 做漸進發布 | flag 會累積成技術債，需有清理機制；錯設旗標等於偷偷上了未完成功能 |\n\n要點：trunk-based 用「強制頻繁整合」換來「小衝突、快回饋」，但這個保證**有前提**——它把賭注押在自動化測試上。沒有夠強的測試與 CI gate，頻繁合進主幹只會讓主幹頻繁處於壞掉狀態。git-flow 用「長命分支的隔離」換來「版本管理的清晰」，代價是整合延遲帶來的衝突與遲到的回饋。沒有放諸四海皆準的選擇，只有「你的發布模型是什麼」決定的合適選擇。\n\n### 何時需要\n\n- **持續部署、SaaS／網路服務、單一線上版本**：trunk-based 或 GitHub Flow 幾乎總是更好——它與「想頻繁、安全地部署」的目標同向。\n- **套裝軟體、需同時維護多個已發行版本、有正式 release cycle**：git-flow 那套 release/hotfix 長命分支才有存在理由——你確實需要「在維護 v3 的同時為 v2 出修補」。\n- **判準**：問「我們是『持續把同一個服務推上線』還是『一版一版地發行、且要支援舊版』」。前者選 trunk-based 系，後者才需要 git-flow 的結構。**把 git-flow 套在持續交付團隊上，是最常見的 over-engineering**——你付了多分支的複雜度，卻沒有多版本維護的需求。\n\n情境推演：一個原本用 git-flow 的 SaaS 團隊，發現每次從 `develop` 合到 `release` 都是一場合併衝突惡夢，功能分支一拖兩週、合回來時主幹早已面目全非。他們轉向 trunk-based：所有變更走短命分支當天合進 `main`，未完成的功能用 feature flag 藏起來，靠強化後的自動化測試守住主幹綠燈。轉換的代價是必須先把測試補起來、學會用 flag；收穫是合併衝突大幅減少、壞變更幾小時內就被 CI 抓到、部署頻率自然上升——因為主幹隨時可部署，發布不再是需要協調多分支的大工程。\n\n### 常見誤解與陷阱\n\n- **以為 trunk-based 就是「沒有分支、亂 push」。** 它仍用短命分支與 PR 審查，只是分支活得很短、整合得很頻繁。它要求的紀律（測試、小 PR、feature flag）其實比 git-flow 更高。\n- **把 git-flow 當「正統」「專業」的預設。** git-flow 是為特定情境（版本化發布）設計的，套在持續交付團隊上是用錯工具；連作者本人都建議持續交付團隊別用（2026-06）。\n- **沒有 feature flag 就硬上 trunk-based。** 沒有把「合併」與「對外開啟」解耦的手段，要嘛被迫等功能完整才合（又變回長命分支），要嘛把半成品推上線。feature flag 是 trunk-based 的前提，不是可選配件。\n- **以為換分支策略就能變快。** 分支策略只是 Lead Time 的一環。如果瓶頸在「測試跑很久」「部署要人工排程」，光改分支模型不會讓交付變快——它甚至可能在測試不足時讓主幹更常壞（見 DORA 四指標，用 Lead Time 定位真正的瓶頸）。\n- **feature flag 永遠不清理。** 旗標會累積成一層難以推理的條件分支技術債——一個早該全開或全關的 flag 留著，等於系統裡藏著一條沒人記得的隱藏路徑。flag 要有生命週期與清理機制。\n\n### 延伸閱讀\n\n- \"Trunk Based Development\"（Paul Hammant 等人維護的權威站點）：https://trunkbaseddevelopment.com/\n- Martin Fowler, \"Patterns for Managing Source Code Branches\"：https://martinfowler.com/articles/branching-patterns.html\n- Vincent Driessen, \"A successful Git branching model\"（git-flow 原文，含作者後來的持續交付註記，2010 / 後續更新）：https://nvie.com/posts/a-successful-git-branching-model/\n"}, {"id": "appendix-a-guarantee-cheatsheet", "file": "appendix-a-guarantee-cheatsheet.md", "group": "附錄", "title": "附錄 A · 保證速查表", "md": "# 附錄 A · 保證速查表\n\n這張速查表把全書各條目的「各方案的保證與取捨」濃縮成一面查找用的牆：當你要某個保證、想快速看有哪些方案與各自代價時，先在這裡掃一眼選項與坑，再回正文把選定的那條讀深。每個問題只列最關鍵的幾列，欄位固定為「方案/工具 → 保證 → 適用場景 → 注意事項」——**注意事項那一欄才是這張表的價值所在，別只看保證**。表後括號指回正文概念與領域。\n\n---\n\n## Part 0 · 透鏡：怎麼判斷、怎麼推動\n\n**怎麼推動一個工具/慣例的採用？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Top-down 強制 | 一致性最強、最快達到全員照做 | 安全／合規／不可逆的單向決策 | 服從不等於認同；強制**必須**配自動化護欄，否則人前照做、人後繞過 |\n| Bottom-up 擴散 | 採用者自願、認同度高、阻力小 | 做法好壞「用了就看得出來」 | 慢、且常卡在 60%，剩下的角落永遠不改 |\n| 鋪路 paved road | 不靠強制就讓多數人走對路 | 有平台／工具團隊可維護那條路 | 路要持續養護；沒人維護的舊路比沒鋪更糟 |\n\n（見 推動工具/慣例的採用，領域 T）\n\n**怎麼讓一個慣例「保證」而非「鼓勵」被遵守？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Formatter | 格式 100% 一致、零爭論 | 任何團隊，越早越好 | 第一次套用產生巨大 diff，要單獨一個 commit |\n| Pre-commit hook | 回饋最快（commit 前就攔） | 想早點接到回饋 | 可被 `--no-verify` 繞過，只能當便利、不能當保證 |\n| CI gate | 唯一不可繞過的硬閘 | 任何想保證的慣例 | 跑太慢會逼人想辦法跳過；要平衡嚴格度與速度 |\n| Codegen | 消除整類手寫不一致 | 有單一真相（schema/IDL） | 生成物別手改（下次生成會被蓋掉） |\n\n（見 慣例的自動化強制，領域 T）\n\n**一個決策該花多重的流程？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 快速試錯（不堆流程） | 決策延遲最低、學得最快 | 確認是雙向門（two-way door） | 誤判可逆性時代價爆增；先驗證撤銷成本再快 |\n| feature flag 包起來 | 把單向門變雙向門、可瞬間回退 | 行為類改動、漸進放量 | flag 本身是技術債，要有清除機制 |\n| 灰階／canary | 小流量先驗證、限制爆炸半徑 | 上線風險高、可分流量 | 需可觀測性支撐才看得出對不對（見領域 I） |\n| 重量 RFC + 評審 | 把關最強、重大決定一定被多方看過 | 不可逆、跨多團隊、高成本 | 流程重、慢；濫用在小決定上會變成官僚稅 |\n\n（見 可逆 vs 不可逆決策、RFC／設計文件流程，領域 U／T）\n\n**自建還是採用？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 自建 | 完全掌控、無外部授權／供應鏈風險 | 核心競爭力、需求特殊 | 你要永久維護它；別在非核心上做（NIH） |\n| 採用成熟開源／商用 | 省開發、享社群修補與生態 | 非核心、問題已被解決 | 供應鏈／授權／維護者跑路風險，要做盡職調查 |\n| adapter 隔離後採用 | 享省力又保留可換性 | 預期未來可能要換的第三方 | adapter 本身是成本；介面選錯一樣難換 |\n\n（見 自建 vs 採用與相依管理，領域 U）\n\n---\n\n## Part 1 · 訊息、交付與整合\n\n**我要哪一種交付語意？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| at-most-once | 絕不重複，可能丟 | metrics、log 取樣、可丟的推播 | 丟訊息靜默無感；不可用於金流／狀態變更 |\n| at-least-once | 絕不丟，可能重複 | 多數業務佇列的預設 | 消費端**必須**冪等或去重，否則一筆操作做兩次 |\n| at-least-once + 消費端去重 | 對外觀察＝每筆影響一次 | 金流、扣庫存、發信等有副作用者 | 去重狀態需持久化＋有 TTL；跨外部副作用的去重最難 |\n| broker 內建 FIFO/EOS | 視窗內 exactly-once processing | 同 broker 內的 read-process-write | 只在該 broker 邊界內成立，跨系統就失效 |\n\n（見 交付語意三選一、exactly-once 的真相，領域 A）\n\n**怎麼擋住 at-least-once 的重複？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 冪等操作（設定目標態） | 同一輸入重放＝同一結果 | 操作可寫成「設定狀態」 | 累加型／呼叫外部 API 型改不成冪等 |\n| 唯一約束擋重 | 重複寫入被 DB 拒絕 | 有自然唯一鍵 | 撞約束要當「已處理」、別當失敗重試 |\n| 冪等鍵 + 結果快取 | 同鍵重送回放同結果（含錯誤） | 支付、建單等有副作用的 POST | 須存成功與失敗；TTL 要涵蓋重試窗 |\n| 去重表 + TTL | 視窗內同 id 只處理一次 | 無自然鍵、需顯式冪等鍵 | 「查→處理→寫」三步須原子，否則仍有縫 |\n\n（見 冪等 idempotency、去重 dedup，領域 A）\n\n**重試怎麼退避才不會打爆下游？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 固定間隔 | 實作最簡 | 單一 client、低並發 | 多 client 同步尖峰，對過載對端最毒 |\n| 指數退避（無 jitter） | 壓力隨次數衰減 | 重試方很少、不會撞車 | 多 client 仍在同一個 `2^n` 時刻一起回來 |\n| 指數退避 + full jitter | 衰減 + 攤平尖峰 | 大量 client、雲端 SDK 預設 | 偶爾取到極短 sleep；要配 cap 與最大次數 |\n\n（見 重試、退避、jitter，領域 A）\n\n**跨服務的「改 DB ＋ 發事件」怎麼一致？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| outbox + relay | 狀態變更與訊息同交易原子；at-least-once 投遞 | 單服務內要可靠發事件的絕大多數場景 | 下游必須冪等；outbox 表要清理；多一個 relay 要運維 |\n| saga choreography | 最終一致、無中央單點 | 步驟少（2～4）、各服務自治 | 流程不可見、難 debug；補償順序要想清楚 |\n| saga orchestration | 最終一致、流程集中可見 | 步驟多、需審計與監控 | orchestrator 是耦合點與單點，要自己保證它高可用 |\n| 2PC | 跨兩系統真原子提交 | 兩端支援 XA、需強一致、低頻 | 同步阻塞、協調者單點、效能差；多半避用（見領域 M） |\n\n（見 outbox／saga、dual-write 問題與 outbox，領域 A／L）\n\n**訊息工具怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| SQS Standard | at-least-once、best-effort ordering | 託管即用、可容忍重複/重排的工作佇列 | 一定遇到重複與亂序，consumer 必須冪等 |\n| SQS FIFO | exactly-once processing（5 分鐘窗）、嚴格有序 | 同群組內順序敏感 | 吞吐受 message group 數限制；跨群組才並行 |\n| Kafka | at-least-once（可開 EOS）、保留期內可重放、多 consumer group | 高吞吐事件流、event sourcing、需重放 | 自運維重；EOS 不含外部副作用；partition＝順序與並行單位 |\n| RabbitMQ | at-least-once（手動 ack ＋ confirms）、豐富 routing | 複雜路由、低延遲任務分發 | 消費即走、無原生長期保留/重放 |\n\n（見 SQS／Kafka／RabbitMQ，領域 A）\n\n**怎麼把資料從一處同步到另一處？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 全量覆蓋 batch | 每次覆蓋自我修復、無「漏一筆」風險 | 資料量小、可容忍每日級陳舊 | 成本隨資料量線性漲；大表全量會壓垮來源與網路 |\n| 時間戳輪詢增量 | 只搬變動列、便宜、門檻低 | 來源有可信 `updated_at`、刪除可軟刪除 | **抓不到硬刪除**；同秒多筆易漏；watermark 邊界要「≥ 且去重」 |\n| log-based CDC | 抓得到所有變更含硬刪除、不漏序、對來源負擔低 | 需即時、需完整變更、資料量大 | 要運維長運管線；replication slot 未消費會撐爆磁碟 |\n\n（見 資料同步總覽、CDC 變更資料擷取，領域 L）\n\n---\n\n## Part 2 · 資料、一致性與儲存\n\n**我要哪一種一致性？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 線性一致 | 像單份資料、即時最新 | 分散式鎖、leader 選舉、餘額這種單鍵 | 每次操作過共識／quorum，延遲最高；分區時犧牲可用性 |\n| 順序／因果一致 | 因果順序一致、並發可分歧 | 留言串、社群動態、協作編輯 | 要追蹤因果依賴（版本向量），實作較重 |\n| 讀己之寫（會話） | 同一 client 讀得到自己剛寫的 | 使用者更新後立刻自看 | 只對同一 client 成立，換裝置/換 session 可能破功 |\n| 最終一致 | 無新寫入終會收斂 | 高可用、可容忍短暫舊值 | 收斂時間無上界；讀到舊值要設計成不致命 |\n\n（見 一致性光譜，領域 B）\n\n**隔離級別怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Read Committed | 不讀到未 commit 的值 | 絕大多數 OLTP 預設 | 同交易內兩次讀可能不同；不保護跨語句不變量 |\n| Snapshot Isolation | 整交易看一致快照、防 non-repeatable／phantom | 報表、需交易內穩定視圖 | **不防 write skew**；長交易撐快照會脹版本 |\n| SSI Serializable | 真 serializable、讀不上鎖 | 寫衝突中等、可接受重試 | 偵測到衝突會中止交易，**應用必須有 retry 邏輯** |\n\n（見 隔離級別與異常，領域 B）\n\n**並發更新同一筆資料怎麼防 lost update？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 悲觀 `SELECT ... FOR UPDATE` | 進場即互斥、無 lost update | 高衝突、重試成本高的長交易 | 持鎖阻塞、死結風險；不能跨請求持鎖 |\n| version 欄位 OCC | 無 lost update、讀期間零鎖 | 低衝突、讀多寫少 | 高衝突時重試風暴；要處理 affected rows=0 分支 |\n| ETag + `If-Match`（HTTP） | 跨無狀態請求防 lost update | REST API、跨網路的編輯 | client 必須回傳並尊重 ETag；弱/強比較語意要對齊 |\n\n（見 樂觀 vs 悲觀並發控制，領域 B）\n\n**強一致還是高可用（CAP/PACELC）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單主關聯式（強一致設定，PC/EC） | 線性一致、可序列化 | 金流、需強保證的核心交易 | 分區時主庫側不可寫；強讀有協調延遲 |\n| Dynamo 式無主（PA/EL） | 高可用、低延遲、最終一致 | 大規模寫入、可容忍舊值 | 並發衝突要合併；讀可能舊；需對帳兜底 |\n| 可調 quorum（R+W>N） | 按 R/W 配置出強讀或快讀 | 想按操作選強度 | 配錯（R+W≤N）會悄悄讀到舊值 |\n\n（見 CAP / PACELC、ACID vs BASE，領域 B）\n\n**儲存引擎怎麼選（讀重還是寫重）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| B+tree（PostgreSQL/InnoDB） | 穩定低讀延遲、優秀範圍掃描、就地讀即最新 | 讀多寫少、強範圍查詢、OLTP | 隨機寫成本高；高寫入吞吐被 I/O 與鎖頂住 |\n| LSM（RocksDB/Cassandra） | 高寫吞吐（順序寫）、好壓縮 | 寫密集、時序、KV、append-heavy | 讀放大與尾延遲；compaction 與前台爭資源；刪除靠墓碑 |\n\n（見 LSM-tree vs B-tree，領域 O）\n\n**怎麼選資料模型（SQL/NoSQL）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 關係（PostgreSQL/MySQL） | 固定 schema、多表 ACID、任意查詢、外鍵完整性 | 複雜實體關係、報表、強交易 | 分片要自己做、跨分片 join/交易困難 |\n| 文件（MongoDB） | 彈性 schema、單文件原子更新 | 聚合根清楚、欄位多變 | 跨文件交易昂貴；彈性會養出隱形 schema 漂移 |\n| KV（Redis/DynamoDB） | O(1) 查找、極高吞吐、易水平擴展 | 快取、session、簡單查找 | 無原生 join/二級查詢；查法綁死 key 設計 |\n| 寬欄（Cassandra） | 線性水平擴展、寫吞吐極高、可調一致性 | 寫密集、已知查詢、跨區 | 一張表服務一種查詢（要反正規化）；最終一致為常態 |\n\n（見 SQL vs NoSQL，領域 O）\n\n**快取策略怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| cache-aside | DB 為真相；快取最終一致 | 讀多寫少、可容忍短暫舊讀 | miss 風暴要配防擊穿；寫後刪快取仍有罕見競態 |\n| write-through | 讀恆新鮮、恆命中 | 讀後立即重讀、要求一致 | 寫延遲＝cache+DB；冷資料也被寫進快取浪費記憶體 |\n| write-behind | 寫延遲最低、可合併寫 | 高頻寫、可容忍丟少量最新寫 | 快取崩潰丟未刷回資料；需處理刷回失敗與背壓 |\n\n（見 快取策略，領域 G）\n\n**快取失效的四種災難怎麼防？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| TTL 加 jitter | 失效時間分散、削平 DB 尖峰（防雪崩） | 大量同生成批次的鍵 | spread 太小無效、太大讓部分鍵過早失效降命中率 |\n| null caching / Bloom filter | 擋穿透（查不存在的鍵） | 大量查不存在 ID | 空值 TTL 要短；Bloom 有偽陽性且刪除難 |\n| single-flight 鎖 | 同鍵同時只一個重建（防擊穿） | 少數超熱鍵 | 鎖超時要短於重建上限，否則鎖過期又群起重建 |\n\n（見 失效 · 雪崩 · 穿透 · 擊穿，領域 G）\n\n**Redis 持久化要多保險？**\n\n| 方案/工具 | 保證（崩潰丟失窗口） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| RDB only | 丟「上次快照→崩潰」全部寫入 | 可容忍丟幾分鐘、要快重啟 | fork 在大資料集上短暫吃 CPU/記憶體 |\n| AOF `everysec`（預設） | 最多約 1 秒 | 多數場景的甜蜜點 | 「約 1 秒」非硬保證；磁碟卡頓時窗口更大 |\n| AOF `always` | 幾乎零丟失 | 不可丟任何已確認寫 | 吞吐大降；延遲被 fsync 主導 |\n\n（見 持久化（RDB vs AOF），領域 G）\n\n---\n\n## Part 3 · 連線、網路與 API\n\n**HTTP 版本怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| HTTP/1.1 + keep-alive | 連線重用、無多工 | 簡單 REST、proxy 相容性最高 | 高並行下被迫開多條連線；應用層隊頭阻塞 |\n| HTTP/2 | 單連線多工、header 壓縮 | 同 host 大量小請求、行動端省連線 | TCP 層隊頭阻塞在高丟包網路仍痛 |\n| HTTP/3 (QUIC) | 無傳輸層隊頭阻塞、連線遷移、0-RTT | 行動／高丟包／跨國高延遲、CDN 邊緣 | 跑 UDP，部分企業防火牆封 UDP/443；CPU 成本較高 |\n\n（見 HTTP/1.1 · 2 · 3，領域 N）\n\n**負載均衡放 L4 還是 L7？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| L4 LB | 高吞吐、低延遲、協定無關、連線級分配 | TCP/UDP 直通、TLS passthrough | 長連線（HTTP/2/gRPC/WS）下請求嚴重不均；無法按 path 路由 |\n| L7 LB | per-request 分配、path/header 路由、TLS 終結 | HTTP 微服務、需路由規則 | CPU/延遲成本高；要解密才能看內容 |\n\n（見 負載均衡 L4 vs L7，領域 N）\n\n**TLS 怎麼配（含服務間）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單向 TLS 1.3 | server 身分 + 加密 + 完整性、1-RTT | 公網 HTTPS、對外 API | 不驗 client；憑證輪換漏掉就全站掛 |\n| mTLS | 雙向身分 + 加密 | 服務對服務零信任 | 憑證管理複雜度倍增；client 憑證輪換是運維重擔 |\n| 公開 CA（90 天） | 瀏覽器原生信任 | 對外網域 | 須自動續簽（ACME）；忘了續＝服務中斷 |\n\n（見 TLS / mTLS，領域 N）\n\n**server 怎麼推資料給 client？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 短輪詢 | 延遲上界＝輪詢間隔；無狀態、極易擴展 | 更新罕見、延遲容忍秒級以上 | 大量空請求；要低延遲就請求量爆炸 |\n| SSE | server→client 單向串流、自動重連、可 resume | 只需 server 推（通知、進度、log 串流） | 單向；HTTP/1.1 下受每網域連線數上限拖累 |\n| WebSocket | 全雙工、低延遲、frame 開銷小 | 雙向高頻互動（聊天、協作、遊戲） | 連線有狀態，水平擴展要 sticky session＋backplane |\n\n（見 server→client 推送全景、WebSocket，領域 C）\n\n**有狀態長連線怎麼水平擴展？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| sticky session | 連線回到同台、in-memory 狀態可用 | 連線狀態只關乎單台 | 負載傾斜；該台掛了狀態全失；擴縮容既有連線不重平衡 |\n| 連線狀態外移 | 任一節點可服務任一連線 | 大規模、節點頻繁增減 | 每次操作多一次 Redis/DB 往返；外部 store 成新單點 |\n| pub/sub backplane | 跨節點廣播、節點互不直連 | 房間/頻道廣播 | 每筆廣播 fan-out 到全部節點，N 大時成瓶頸 |\n\n（見 連線狀態與水平擴展，領域 C）\n\n**API 範式怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| REST + OpenAPI | HTTP 快取友善、生態最廣、人類可讀 | 對外公開 API、CRUD、需 CDN 快取 | over/under-fetch；多資源組合要多次往返；契約非強制 |\n| GraphQL | client 精準取欄位、單請求組合多資源 | 多端裝置欄位需求各異、聚合多後端 | HTTP 快取要自建；N+1 要 dataloader；query 複雜度需限制防 DoS |\n| gRPC | 強型別契約、二進位省頻寬、雙向 streaming | 內部微服務、低延遲高吞吐 | 瀏覽器需 gRPC-Web；不可讀難 curl；HTTP 快取難用 |\n\n（見 API 範式對照、gRPC / Protobuf，領域 H／N）\n\n**分頁用 offset 還是 cursor？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| offset/limit | 可跳任意頁碼、實作最簡 | 後台分頁、總筆數小、淺頁 | 深 OFFSET 線性變慢；翻頁中插入/刪除會重複或漏 |\n| keyset/cursor | 每頁成本恆定、邊界穩定 | 無限下拉、API feed、大表 | 不能跳頁；排序鍵須唯一；換排序欄位 cursor 失效 |\n\n（見 分頁 pagination，領域 H）\n\n**認證／授權怎麼放？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Session（有狀態認證） | 即時可撤銷、server 完全掌控 | 單體或有共享 session store | 擴展需 sticky session 或集中 store；跨域 cookie 麻煩 |\n| JWT/token（無狀態認證） | 免查 store、易水平擴展 | 多服務、無共享 store、邊緣驗證 | **撤銷困難**；token 簽發後到 expiry 前都有效 |\n| RBAC（授權） | 角色集中管理、易稽核 | 角色數有限、權限隨組織結構 | 角色爆炸；細粒度需求會撐爆 |\n| ABAC（授權） | 細粒度、規則表達力強 | 多維度條件（時間/地點/資源屬性） | 規則難測難稽核、「為何被拒」難解釋 |\n\n（見 認證 vs 授權、RBAC vs ABAC，領域 F）\n\n**token 怎麼撤銷？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 短 TTL + refresh | 撤銷延遲 ≤ 一個 access TTL、驗證仍無狀態 | 多數 web/mobile/API | 撤銷非即時，洩漏的 access token 在 TTL 內仍可用 |\n| denylist（jti 清單） | access token 也能即時撤銷 | 高敏感操作、需即時收回 | 每次驗都查 store，犧牲無狀態；清單須隨 TTL 清理 |\n| introspection（opaque） | 完全即時、權威集中 | 集中式 authz server、可承受往返 | 每請求一次往返，延遲與可用性綁 authz server |\n\n（見 token 生命週期與撤銷、JWT，領域 F）\n\n---\n\n## Part 4 · 並發、過載與韌性\n\n**並發模型怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單執行緒 event loop | 海量 I/O 並發、無資料競爭、極省記憶體 | I/O 密集、大量連線 | 任一 CPU 重活卡死整條線；回呼/async 風格 |\n| 多執行緒（共享記憶體） | 真平行、可吃滿多核 | CPU 密集、需精細控制 | 共享狀態需鎖；死結/競態風險高；執行緒貴 |\n| actor | 狀態隔離、容錯（監督樹）、易分散 | 高容錯、有狀態並發、分散式 | 訊息延遲；mailbox 無界會爆；非同步難 debug |\n| coroutine（如 goroutine） | 海量輕量並發＋線性可讀＋多核 | 高並發＋混合 I/O 與 CPU | 阻塞系統呼叫會漏；channel 用錯易 deadlock |\n\n（見 並發模型比較、event loop，領域 D）\n\n**跨 DB/cache/runtime 的原子性怎麼保？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| DB 原子 `UPDATE x = x + 1` | 行鎖下原子、無 lost update | 計數、餘額增減 | 僅限單條 SQL 可表達；高併發同一行成熱點 |\n| 版本號／ETag（樂觀） | 偵測衝突、無鎖等待 | 衝突率低、寫少讀多 | 衝突時要重試；重試需冪等否則放大副作用 |\n| Redis `INCR`（原子） | 單執行緒天然原子 | 跨實例計數、限流計數 | 多步邏輯仍需 WATCH/Lua；非持久化崩潰可能丟更新 |\n\n（見 race condition 與原子性，領域 D）\n\n**過載時怎麼施加背壓？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 有界佇列 + 阻塞 | 記憶體有界、不丟資料 | 生產者可被安全地慢下來 | 阻塞會沿呼叫鏈往上傳；event-loop 模型裡阻塞是大忌 |\n| 有界佇列 + 拒絕 | 記憶體有界、延遲有上界 | 對外 API、上游能處理 429／重試 | 需上游有退避，否則變 retry storm |\n| demand-based pull | 記憶體有界、端到端流量守恆 | 串流處理、Reactive 管線、gRPC streaming | 整條鏈都要支援拉取，單一環節不支援就退化成無界緩衝 |\n\n（見 背壓 backpressure，領域 E）\n\n**限流用哪種演算法？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| token bucket | 長期均速 ≤ r、容許突發 ≤ b | API 限流、可吸收尖峰 | 突發 b 設太大等於沒限瞬時；r 與 b 要一起想 |\n| leaky bucket | 輸出恆定速率、絕對平滑 | 保護只能吃定速的下游 | 請求排隊增延遲；對 bursty 流量不友善 |\n| 中央計數（Redis） | 全域精確、跨節點一致 | 嚴格全域配額 | 每請求一次往返；共享儲存是單點/熱點 |\n| 本地配額分攤 | 零協調、零額外延遲 | 節點間流量均勻、可容忍誤差 | 流量不均→提早誤殺或整體超額 |\n\n（見 rate limiting，領域 E）\n\n**斷路器怎麼設？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 連續失敗計數觸發 | 實作簡單、反應直接 | 流量穩定、失敗訊號清楚 | 偶發抖動可能誤跳；對低流量不穩 |\n| 失敗率窗觸發 | 對波動穩健 | 高流量、失敗率有意義 | 低流量時樣本不足、判斷失準；窗大小要調 |\n| 半開放單一試探 | 恢復時對下游壓力最小 | 下游恢復後仍脆弱 | 恢復偵測較慢（一次只試一筆） |\n\n（見 circuit breaker、retry storm 與 metastable failure，領域 E）\n\n**timeout 怎麼配（多跳呼叫鏈）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 固定 per-call timeout | 單跳資源不會無限凍結 | 扁平架構、單跳呼叫 | 多層串接時總時間＝各層相加，可能遠超對外承諾 |\n| deadline 傳遞 | 全鏈共享一個截止點、過期一起放棄 | 微服務深鏈、gRPC | 需框架支援＋下游檢查 deadline；用「剩餘 timeout」化解時鐘偏移 |\n| time budget 拆分 | 對外延遲承諾可被內部各段加總滿足 | 一個端點扇出多個下游 | 拆分要留餘裕；某段超支會吃掉別段的額度 |\n\n（見 timeout / deadline / budget，領域 P）\n\n**降級怎麼降才不出錯？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 回快取／陳舊資料 | 主源掛了仍有（過期的）答案 | 讀多、容忍少量陳舊 | 要標明資料可能過期；陳舊上限要可控 |\n| 功能降級 | 核心活著、非核心暫關 | 有明確核心/非核心之分 | 要事先想清楚哪些非核心，臨場分不出來 |\n| 明確失敗（不降級） | 不會給出錯誤的「成功」 | 金流、唯一性、強一致操作 | 對這類操作降級＝資料錯誤，必須 fail loud |\n\n（見 fallback · 降級、bulkhead 艙壁隔離，領域 P）\n\n**怎麼壓長尾延遲？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| hedged requests | 砍高百分位（p99/p999），效果顯著 | 可冪等重發、後端有多副本 | 增加總負載（典型 5–10%）；過載時對沖會火上澆油，要設上限 |\n| 隔離背景活動 / bulkhead | 消除 GC/compaction 撞線上 | 有明顯背景峰值的儲存/服務 | 需資源隔離能力；排程錯了反而製造新峰 |\n| timeout + 降級 | 給尾巴上界、可預期 | 任何有 SLO 的同步路徑 | 設太短砍掉本會成功的慢請求；設太長等於沒設 |\n\n（見 tail latency 與長尾、冷啟動與暖機，領域 S）\n\n---\n\n## Part 5 · 分散式系統核心\n\n**用什麼達成共識？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Raft | 多數存活下安全 + 最終進展、強 leader、log 無空洞 | 多數新系統的預設 | 強 leader＝寫入吞吐受單 leader 上限約束；選舉期間寫入暫停 |\n| Paxos / Multi-Paxos | 多數存活下安全 + 最終進展 | 理論基準、Google 系統 | 規格留白多、難正確實作 |\n| BFT 共識（n≥3m+1） | 容忍 m 個惡意節點 | 互不信任多方、公鏈 | 訊息複雜度高、節點多、延遲大；企業內網過度設計 |\n\n（見 共識 consensus、分散式失敗模型，領域 M）\n\n**quorum 怎麼配 R/W？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| R+W>N（如 N3W2R2） | 讀必見最新成功寫 | 要可調一致性的無主儲存 | 並行寫仍可能衝突，需版本向量 + 衝突解決 |\n| W=N, R=1 | 讀極快、強讀一致 | 讀多寫極少 | 任一副本不可用即無法寫；寫延遲＝最慢副本 |\n| R+W≤N（放寬） | 高可用、低延遲、最終一致 | 可容忍讀到舊值 | 讀可能舊；靠 read repair / anti-entropy 收斂 |\n\n（見 quorum（R + W > N）、複製策略，領域 M）\n\n**分散式鎖怎麼做才正確？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單實例 Redis `SET NX PX` | 高效能、近似互斥（efficiency lock） | 偶爾重複做也只是浪費、不會錯 | 單點故障；TTL 裂縫仍在；不提供 fencing token |\n| ZooKeeper / etcd lease | 線性化、session 斷即釋放、內建單調版本號 | 正確性關鍵（leader 唯一性、單一寫入者） | 比 Redis 重、延遲高；仍需把版本號當 fencing token 帶到資源端 |\n| fencing token（疊在任一鎖上） | 把互斥落實到資源端、堵住 TTL 裂縫 | 任何「兩持有者同時寫會出錯」的場景 | 資源端必須能拒絕舊 token；只發 token 而資源不檢查＝沒用 |\n\n（見 分散式鎖，領域 M）\n\n**邏輯時鐘／排序怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Lamport timestamp | a→b ⇒ C(a)<C(b)；加 ID 得全序 | 只需一致全序、不需偵測並行 | 反向不成立；無法判斷兩事件是否並行 |\n| vector clock | V(a)<V(b) ⇔ a→b；可偵測並行 | 需要知道誰因果在前、誰是衝突 | 大小隨節點數線性成長；GC 舊條目麻煩 |\n| HLC `(pt, c)` | 單調、捕捉因果、貼近牆鐘、64-bit | 分散式資料庫排序、一致性快照 | 仍受 NTP 偏移上界約束；不是真實時間 |\n\n（見 邏輯時鐘與排序、時間與日期處理，領域 M）\n\n**擴縮容時 key 怎麼不大搬家（consistent hashing）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| `hash(key) % N` | 分佈均勻、O(1) | N 永遠不變的固定分區 | N 一變幾乎全部 key 重映射，禁用於會擴縮的叢集 |\n| 環 + vnode | 均勻 + 加減節點負載均攤 | 快取叢集、Dynamo 式 KV、分片路由 | vnode 數要夠（數百）才均勻；過多吃記憶體 |\n| rendezvous (HRW) | 均勻、免維護環狀態 | 節點數中等 | 查 key 為 O(N)，節點極多時慢 |\n\n（見 consistent hashing、gossip / anti-entropy，領域 M）\n\n---\n\n## Part 6 · 架構、雲端與發布\n\n**用什麼手段解耦？**\n\n| 方案/工具 | 保證（剪哪條繩子） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 非同步訊息佇列 | 時間＋同步性解耦：B 暫時不在 A 照走 | 可延後處理、要吸收尖峰 | 換來最終一致；下游要冪等；除錯要追跨佇列流程 |\n| 服務發現 / DNS | 空間解耦：endpoint 變動 A 無感 | 動態擴縮、藍綠/滾動部署 | DNS 快取 TTL 讓變更生效有延遲；發現層自己成依賴 |\n| API 契約 + 相容演進 | 資料格式＋實作解耦 | 任何長期維護的服務間介面 | 契約本身要治理；過度寬鬆的契約＝沒解耦 |\n| DB per service | 資料格式解耦的最強形式 | 真正要獨立演化的服務 | 跨服務查詢/交易變難；偷懶共用庫等於沒拆 |\n\n（見 解耦 decoupling、同步 vs 非同步通訊，領域 K）\n\n**事件驅動：thin 還是 fat event？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| event notification（thin） | 事件小、來源是單一真相、不複製資料 | 事件頻繁、訂閱者偶爾需細節 | 訂閱者要回頭查→反向流量＋仍耦合來源；可能讀到更新後的值 |\n| event-carried state transfer（fat） | 訂閱者完全自足、來源負載低 | 訂閱者頻繁需資料、要高可用 | 資料複製＋最終一致；事件 schema 變更影響面廣 |\n\n（見 事件驅動架構 EDA、Event sourcing 與 CQRS，領域 K）\n\n**長流程怎麼可靠地跑完（durable execution）？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 手刻狀態機 + cron 推進 | 無框架依賴、簡單流程下最直接 | 流程短、步驟少、不想引入新平台 | 「卡住沒人推」「重做已完成步驟」靠你自己防；步驟一多狀態爆炸 |\n| saga 編排 + 補償 | 跨服務最終一致：全做完或補償回滾 | 跨多服務、無分散式交易 | 補償邏輯難寫（有些動作無法真正撤銷）；協調者可靠性要另解 |\n| Temporal（durable execution） | 執行狀態持久化、崩潰自動 replay 回斷點、已完成步驟不重做 | 長流程、多步驟、要可靠恢復 | 工作流碼必須 deterministic；要運維叢集或用 Cloud |\n\n（見 持久化工作流與 durable execution，領域 K）\n\n**serverless 還是常駐容器？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| AWS Lambda | 免運維、毫秒計費、自動擴縮到 0 | 突發/稀疏流量、事件處理、膠水 | 冷啟動延遲、15 分鐘上限、本地無持久狀態 |\n| 容器（ECS/EKS 常駐） | 長連線、無冷啟動、可有狀態 sidecar | 穩定高流量、長流程、需 WebSocket | 要自管擴縮與機器，閒置仍計費 |\n| Provisioned concurrency | 預先初始化環境、近零冷啟動 | 延遲敏感、可預測尖峰 | 預留即計費，與 SnapStart 互斥 |\n\n（見 Lambda、無狀態 vs 有狀態，領域 J）\n\n**排程怎麼避免漏跑/重複？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| K8s CronJob | 至少觸發（非 exactly-once）、叢集內統一調度 | 已在 K8s 上的週期批次 | 100 次漏跑死結、`Forbid` 非真互斥、Job 須冪等 |\n| catch-up 補跑 | 不漏掉任一時間點的工作 | 每時間點工作獨立（對帳、計費窗） | 長停機後可能一次補一大批，要配窗口上限 |\n| 邏輯時間鍵去重 | 重複觸發不造成雙重副作用 | 任何非 exactly-once 的排程 | 需要持久的去重 store 與 TTL |\n\n（見 K8s CronJob、時間與排程、失敗偵測，領域 J）\n\n**部署策略怎麼選？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| rolling | 零停機、資源不翻倍 | 多數無狀態 web 服務的預設 | 部署期間新舊版同時在線，必須向後相容；回滾＝再滾一輪 |\n| blue-green | 回滾近乎瞬間（切流量）、新版可先完整驗證 | 高風險發布、回滾速度是硬需求 | 部署期間雙倍資源；DB schema 跨兩版共用是最大難點 |\n| canary | blast radius 可控（先打小流量）、可自動回滾 | 大流量服務、想用真實流量驗證 | 需按權重切流量＋好的 SLI 監控；放量太快等於沒 canary |\n\n（見 blue-green / canary / rolling，領域 Q）\n\n**機密怎麼管？**\n\n| 方案/工具 | 保證（提供什麼防護） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 環境變數 | 與碼分離；無加密、無輪替、無稽核 | 一般 config、低敏感值 | 機密用它有洩漏面（子 process 繼承、dump、/proc） |\n| K8s Secret（預設） | 與 ConfigMap 分離 | K8s 上的基本機密 | 預設只 base64、非加密；要另開 etcd encryption-at-rest + RBAC |\n| 機密管理器（動態機密類） | 加密、最小權限、輪替、短 TTL、稽核 | 生產級機密管理 | 引入相依與運維成本；應用要改成「向它拉」 |\n\n（見 config 與機密管理、IaC，領域 Q）\n\n---\n\n## Part 7 · 觀測與營運文化\n\n**三本柱：哪個訊號回答哪種問題？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Metric（時序聚合） | 固定低成本、可長期保留、適合告警 | 「現在健康嗎、趨勢如何」 | 聚合即失真；高基數標籤讓成本爆炸 |\n| Log（離散事件） | 單一事件無損、可事後任意查詢 | 「這一筆到底發生什麼」 | 量大、貴；高流量幾乎一定取樣；跨服務難關聯 |\n| Trace（因果樹） | 跨服務延遲歸因、父子關係 | 「這次慢/錯在哪一跳」 | 幾乎一定取樣；需全鏈路傳播 context 才完整 |\n\n（見 三本柱 metric / log / trace、cardinality 爆炸，領域 I）\n\n**SLO 的分位數與告警怎麼算？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Histogram 算分位數 | 可跨副本/跨時間聚合、可改算任意分位 | 多實例服務的 p99/p999 | 精度取決於 bucket 邊界；窄桶才準 |\n| Summary（client 端分位） | 單實例精確分位 | 單實例、不需聚合 | **不能跨實例聚合**（平均多個 p99 是錯的） |\n| Burn-rate 告警 | 燒得快才吵醒人、燒得慢只開工單 | 想降告警疲勞又不漏快速燒穿 | 需調多重視窗（短窗抓急、長窗抓慢） |\n\n（見 SLI / SLO / error budget、告警設計，領域 I）\n\n**負載測試用開放還是封閉模型？**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 封閉模型（固定 VU） | 模擬有界並發、不會把系統灌爆 | 內部服務、固定連線數 | 有 coordinated omission，長尾被低估；VU 數不等於 RPS |\n| 開放模型（arrival rate） | 長尾誠實、模擬外部不退讓流量 | 公開 API/網站、要量 p99/p999 真相 | 系統一崩請求無限堆積、測試端先 OOM，需設上限與背壓 |\n\n（見 負載測試、測試策略，領域 I）\n\n**事故與發布文化的做法對照**\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 無咎事後檢討 | 換到事故真實機制、累積組織記憶 | 所有 SEV1/SEV2 級事故 | 「無咎」需高層真心背書；一次秋後算帳就摧毀所有人的誠實 |\n| runbook | 縮短已知事故處理時間、降對特定人的依賴 | 重複出現、步驟明確的故障 | 會腐化——系統一變就過時，需綁進變更流程定期校驗 |\n| trunk-based + feature flag | 整合最頻繁、衝突最小、最配 CD | 持續交付、頻繁部署的網路服務 | 強烈依賴自動化測試；flag 會累積成技術債，需清理機制 |\n\n（見 事故應變與無咎事後檢討、分支與發布策略，領域 V）\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B · 術語表", "md": "# 附錄 B · 術語表\n\n這份術語表把全書出現的關鍵概念與重要英文名詞收成一條一行的速查清單，定義刻意壓到「資深工程師看一眼就想起來」的密度。每條句尾的「（見 …，領域 X）」指向正文裡把它講深的那個條目；想看機制、取捨與陷阱，回到該條目。定義與正文一致，不在此新增書裡沒講的概念。按英文（或中文音序）字母分組，未必有對應英文者排在 Z 之後的「中文索引」。\n\n## A–B\n\n**ABAC（Attribute-Based Access Control）**：以「主體／資源／環境的屬性」即時運算授權，而非預先綁角色，換靈活與細粒度但難審計。（見 RBAC vs ABAC，領域 F）\n\n**ABI / 漂移（drift）**：宣告的期望狀態與真實基礎設施悄悄分叉的現象；IaC 的核心敵人之一。（見 IaC，領域 Q）\n\n**ACID**：交易的原子性／一致性／隔離性／持久性四保證，強一致哲學的代名詞；與 BASE 為光譜兩端。（見 ACID vs BASE，領域 B）\n\n**ADR（Architecture Decision Record）**：記錄一個有架構影響的決策、其脈絡（forces）、選擇與後果的短文件，補回隨人離職而蒸發的「決策理由」。（見 架構決策紀錄 ADR，領域 T）\n\n**AEAD**：同時提供加密與完整性的對稱加密模式；TLS 1.3 只留 AEAD cipher。（見 TLS / mTLS，領域 N）\n\n**ALB（Application Load Balancer）**：AWS 的 L7 負載均衡器，可做路徑/標頭路由，但非完整 API 閘道。（見 ALB vs API Gateway vs KrakenD vs Kong，領域 H）\n\n**anti-entropy**：副本間週期性比對差異並修補，使資料最終收斂的背景修復機制；常與 gossip 搭配。（見 gossip / anti-entropy，領域 M）\n\n**AOF（Append-Only File）**：Redis 把每條寫指令追加進日誌的持久化模式，比 RDB 丟得少但檔案大、重放慢。（見 持久化，領域 G）\n\n**API gateway**：擺在外部 client 與後端服務群之間的反向代理，集中認證、限流、TLS 終結、路由等橫切關注。（見 API gateway 的角色，領域 H）\n\n**at-least-once**：訊息至少送達一次的交付語意（多數系統預設），代價是消費端必須自己處理重複。（見 交付語意三選一 / at-least-once 與重複處理，領域 A）\n\n**at-most-once**：訊息至多送達一次的交付語意，不重複但可能丟。（見 交付語意三選一，領域 A）\n\n**AuthN / AuthZ（認證 / 授權）**：AuthN 問「你是誰」、AuthZ 問「你能做什麼」，兩者正交；OIDC 補的是 AuthN 那塊。（見 認證 vs 授權，領域 F）\n\n**backpressure（背壓）**：下游處理不過來時把「慢下來」訊號往上游傳，避免緩衝無限長大；穩定管線的守恆律。（見 背壓 backpressure，領域 E）\n\n**back-of-the-envelope（量級估算）**：不建系統、用幾個硬數字把設計會撞到哪面牆算到正確數量級的判斷工具。（見 量級估算與容量直覺，領域 U）\n\n**BASE（Basically Available, Soft state, Eventually consistent）**：以可用性與最終一致換強一致的哲學；ACID 的對立端。（見 ACID vs BASE，領域 B）\n\n**blameless postmortem（無咎事後檢討）**：事故後把經驗轉成「下次不會再犯」的書面學習，對事不對人。（見 事故應變與無咎事後檢討，領域 V）\n\n**blocking I/O（阻塞 I/O）**：發起 I/O 的呼叫會把該執行緒停住等到資料就緒；與非阻塞相對。（見 阻塞 vs 非阻塞 I/O，領域 D）\n\n**blue-green**：同時備好新舊兩套環境、一次性把流量整批切到新版的發布策略，回退快但需雙倍資源。（見 blue-green / canary / rolling，領域 Q）\n\n**B-tree**：就地維護有序的索引/儲存結構，讀放大低、寫較分散；與 LSM-tree 為兩大流派。（見 LSM-tree vs B-tree / 索引與查詢計畫，領域 O、B）\n\n**budget（deadline budget）**：跨多跳呼叫時把總時間預算逐跳遞減傳遞，避免下游各自從零計時導致總延遲失控。（見 timeout / deadline / budget，領域 P）\n\n**Bull / BullMQ**：Node.js 以 Redis 為後端的 job queue 函式庫，定位是 background job processing 而非訊息傳遞。（見 Bull / BullMQ，領域 A）\n\n**bulkhead（艙壁隔離）**：把資源（執行緒池、連線池）分艙，一艙耗盡不波及其他，防局部故障擴散。（見 bulkhead 艙壁隔離，領域 P）\n\n## C–D\n\n**canary**：先把新版放給一小撮流量觀察、再逐步放大的發布策略，縮小 blast radius。（見 blue-green / canary / rolling，領域 Q）\n\n**CAP**：分散式系統在分區時只能在一致性與可用性間二選一的定理（Brewer 2000 猜想，Gilbert-Lynch 2002 證明）。（見 CAP / PACELC，領域 B）\n\n**cardinality（基數）爆炸**：time series 數＝各標籤取值數的乘積，把高基數欄位（如 user_id）放進 label 會炸掉時序庫。（見 cardinality 爆炸，領域 I）\n\n**CAS（Compare-And-Swap）**：「比對舊值相符才寫」的原子操作，樂觀並發控制的基礎。（見 樂觀 vs 悲觀並發控制，領域 B）\n\n**cache-aside（look-aside）**：讀未命中時應用自己回填快取的策略；最常見、但有並發回填與失效裂縫。（見 快取策略，領域 G）\n\n**CDC（Change Data Capture）**：讀資料庫交易日誌（WAL/binlog）解析成變更串流餵下游，可靠且不漏地擷取每筆變更。（見 CDC 變更資料擷取，領域 L）\n\n**circuit breaker（斷路器）**：下游故障率超閾值時主動切斷呼叫、快速失敗，防慢逾時耗盡資源池釀級聯失敗。（見 circuit breaker，領域 E）\n\n**coalescing（合併）**：把短時間內對同一目標的多個請求併成一次，去重式地省下重複工作。（見 批次 / coalescing / debounce，領域 S）\n\n**cohesion（內聚）**：模組內部元素為同一目的服務的程度，越高越好；與耦合互補。（見 耦合 vs 內聚，領域 K）\n\n**cold start（冷啟動）**：執行單位第一次服務請求須先付的一次性成本（載碼、建 runtime、建連線、JIT）。（見 冷啟動與暖機，領域 S）\n\n**connection pool（連線池）**：預建、保活、可重借的連線集合，攤平建連成本並當天然並發閘門。（見 連線池 connection pool / 連線池調校，領域 N、S）\n\n**consensus（共識）**：一組節點在部分故障與不可靠網路下對某值（通常是 replicated log 下一條目）達成不可推翻的一致決定。（見 共識 consensus，領域 M）\n\n**consistent hashing**：把 key 與節點映到同一個 hash 環，節點增減只搬動相鄰一段 key，避免 `% N` 的全量重映射。（見 consistent hashing，領域 M）\n\n**coordinated omission**：負載測試/量測在系統卡住時漏記被延誤的請求，導致 p99 被嚴重低估的陷阱。（見 tail latency 與長尾 / 負載測試，領域 S、I）\n\n**CQRS（Command Query Responsibility Segregation）**：把改狀態的寫模型與讀查詢模型拆成兩個各自最佳化的模型；常與 event sourcing 搭配。（見 Event sourcing 與 CQRS，領域 K）\n\n**CRDT（Conflict-free Replicated Data Type）**：設計成合併天然可交換的資料型別，多副本各自更新後總能收斂到同一結果，無需協調。（見 衝突解決，領域 L）\n\n**CronJob（K8s）**：依 cron 時間表反覆建立 Job 的控制器；它只排程，真正執行語意落在它生出的 Job 上。（見 K8s CronJob，領域 J）\n\n**cursor / keyset pagination**：以「上一頁最後一筆的排序鍵值」當座標往下翻，避開深分頁的 offset 掃描成本與漂移。（見 分頁 pagination，領域 H）\n\n**DLQ（dead-letter queue，死信佇列）**：反覆處理失敗、超過上限的訊息的最終停放處，防毒訊息無限重投卡住 head。（見 DLQ 死信與毒訊息，領域 A）\n\n**deadlock（死結）**：多個交易互相等對方手上的鎖形成環、誰也不放；靠 wait-for graph 偵測或逾時打破。（見 鎖與死結，領域 B）\n\n**debounce**：只在一連串事件「停下來」後才觸發一次，與只取頭/尾的合併語意不同。（見 批次 / coalescing / debounce，領域 S）\n\n**decoupling（解耦）**：有意識地剪掉「A 對 B 的假設」這些繩子，換兩端各自變動的自由。（見 解耦 decoupling，領域 K）\n\n**dedup（去重）**：在 at-least-once 之上於操作前判斷「這筆見過嗎」，讓不冪等操作對外表現得像只執行一次。（見 去重 dedup，領域 A）\n\n**DNS-based service discovery**：用名字→IP 解析做服務發現，但 DNS 快取模型與實例頻繁變動天生矛盾。（見 DNS 與服務發現，領域 N）\n\n**Docker / 容器**：同一 host kernel 上被 namespace（隔離視野）＋cgroup（限制資源）罩住的一群普通行程，非輕量 VM。（見 Docker，領域 Q）\n\n**DORA 四指標**：部署頻率、變更前置時間、變更失敗率、復原時間；證明速度與穩定不是取捨。（見 DORA 四指標，領域 V）\n\n**dual-write 問題**：一個操作要原子地更新兩個無共同交易邊界的系統，兩次寫之間的崩潰會讓兩端分叉。（見 dual-write 問題與 outbox / outbox / saga，領域 L、A）\n\n**durable execution（持久化工作流）**：把長流程的狀態與進度持久化，讓行程崩潰後能「從斷點繼續」而非從頭重來或卡死。（見 持久化工作流與 durable execution，領域 K）\n\n## E–G\n\n**EDA（Event-Driven Architecture）**：用「事件＝已發生的事實」廣播取代「命令＝叫你做事」，產生者不必認識任何消費者。（見 事件驅動架構 EDA，領域 K）\n\n**error budget（錯誤預算）**：1 − SLO 給出的「允許不可靠的額度」，把可靠性變成可消費、可談判的數字。（見 SLI / SLO / error budget / SRE 文化，領域 I、V）\n\n**eventual consistency（最終一致性）**：副本短暫不一致但保證最終收斂；高可用低延遲的代價。（見 一致性光譜 / 最終一致 · 補償 · 對帳，領域 B）\n\n**event loop**：單執行緒輪詢就緒事件、跑 callback 的並發機制；鐵律是主執行緒永不同步阻塞。（見 event loop，領域 D）\n\n**event sourcing（事件溯源）**：不存當前狀態、改存導致它的不可變事件序列，當前狀態由 replay 算出。（見 Event sourcing 與 CQRS，領域 K）\n\n**Envoy**：service mesh 常用的 sidecar 代理，承載 mTLS、重試、熔斷、路由、可觀測性。（見 service mesh，領域 N）\n\n**EOS（exactly-once semantics, Kafka）**：Kafka 以冪等 producer ＋ 交易把「讀-處理-寫」串成原子，得到端到端有效一次的效果。（見 Kafka / exactly-once 的真相，領域 A）\n\n**ETag**：資源版本指紋，配 conditional request 做樂觀並發控制（If-Match）。（見 樂觀 vs 悲觀並發控制，領域 B）\n\n**eviction（驅逐）**：記憶體滿時依某種「未來最不可能被用」的近似（LRU/LFU/TTL）丟掉既有鍵；與過期不同。（見 驅逐 eviction，領域 G）\n\n**exactly-once**：被最常誤用的詞；真相是「傳輸恰好一次」幾乎不可得，可得的是「效果有效一次」＝at-least-once ＋ 冪等/去重。（見 exactly-once 的真相，領域 A）\n\n**fail-fast**：一偵測到不對就立刻、大聲失敗、不帶壞狀態續跑，把問題暴露在離源頭最近處。（見 錯誤處理哲學，領域 U）\n\n**fallback（降級）**：主路徑失敗時回一個次等但仍可用的結果，「部分可用 > 完全不可用」。（見 fallback · 降級，領域 P）\n\n**fan-out**：一發多收；SNS 把一則訊息推給所有訂閱端點是典型。（見 SNS，領域 A）\n\n**fencing token**：分散式鎖發放的單調遞增記號，讓被搶走鎖的舊持有者的延遲寫入能被資源端拒絕。（見 分散式鎖，領域 M）\n\n**FIFO ordering**：每個 key（partition key）內訊息照發生序消費，而非全域單一總序（那會塌掉吞吐）。（見 訊息順序 ordering / SQS，領域 A）\n\n**fsync**：強制把寫入落穩到磁碟的呼叫；fsync 越勤丟得越少但吞吐越低，是持久化的核心旋鈕。（見 持久化，領域 G）\n\n**full-text search（全文搜尋）**：靠 inverted index 把「掃所有文件找詞」翻轉成「查一個詞直接拿含它的文件清單」。（見 全文搜尋與 inverted index，領域 O）\n\n**gap / next-key lock**：InnoDB 鎖在索引區間上、用來擋 phantom 的鎖；查詢命不命中索引直接決定鎖多大一片。（見 鎖與死結 / PostgreSQL vs MySQL，領域 B）\n\n**golden path / paved road（鋪路）**：把「照建議做」那條路修到比任何其他選擇都明顯省力，靠引力而非強制推採用。（見 鋪路 paved road／golden path，領域 T）\n\n**gossip**：節點隨機互傳狀態、讓成員/故障/設定資訊最終傳遍叢集並趨同，無中央瓶頸。（見 gossip / anti-entropy，領域 M）\n\n**graceful shutdown（優雅退場）**：結束時停收新工作→做完手上工作→釋放資源→退出，不硬斷進行中的請求。（見 graceful shutdown，領域 P）\n\n**GraphQL**：由 client 決定回傳資料形狀的查詢式 API 範式；解 over/under-fetching 但有 N+1 與快取難題。（見 API 範式對照，領域 H）\n\n**gRPC / Protobuf**：以 `.proto` 當 IDL、跑 HTTP/2、Protobuf 二進位序列化的跨語言 RPC 框架。（見 gRPC / Protobuf，領域 N）\n\n## H–L\n\n**HLC（Hybrid Logical Clock）**：混合牆鐘與邏輯時鐘，既能比因果先後又貼近物理時間。（見 邏輯時鐘與排序，領域 M）\n\n**health check（liveness / readiness）**：liveness 答「該不該重啟我」、readiness 答「該不該送流量給我」，兩者語意不可混。（見 health check，領域 P）\n\n**HPA（Horizontal Pod Autoscaler）**：K8s 依指標自動增減 Pod 數的控制器。（見 Kubernetes，領域 Q）\n\n**HTTP/1.1 · 2 · 3**：keep-alive 重用連線、HTTP/2 多工、HTTP/3 用 QUIC 解 TCP 層 head-of-line blocking。（見 HTTP/1.1 · 2 · 3，領域 N）\n\n**HS256 / RS256**：HS256 對稱簽章（同一把密鑰簽與驗）、RS256 非對稱簽章（私鑰簽、公鑰驗，配 JWKS 發布公鑰）。（見 對稱 vs 非對稱簽章，領域 F）\n\n**IaC（Infrastructure as Code）**：把基礎設施期望狀態寫成可版控程式碼、由工具收斂現實，治「雪花伺服器」與漂移。（見 IaC，領域 Q）\n\n**idempotency（冪等）**：`f(f(x)) = f(x)`，重複執行不改變淨效果；at-least-once 之上的安全網。（見 冪等 idempotency，領域 A）\n\n**inverted index（倒排索引）**：詞→文件清單的索引結構，全文搜尋的核心。（見 全文搜尋與 inverted index，領域 O）\n\n**isolation level（隔離級別）**：用「容許哪些讀寫交錯異常」（dirty/non-repeatable/phantom/write-skew）定義，而非用「鎖什麼」。（見 隔離級別與異常，領域 B）\n\n**jitter**：在退避間隔加隨機抖動，讓多個 client 重試時刻錯開，避免同步重試把下游再打垮。（見 重試、退避、jitter，領域 A）\n\n**JWKS（JSON Web Key Set）**：發布驗章用公鑰的端點，讓驗證方按 `kid` 取對應公鑰、支援輪替。（見 對稱 vs 非對稱簽章 / JWT，領域 F）\n\n**JWT（JSON Web Token）**：自包含、可簽章的 token 格式，三段 base64url 以 `.` 連接，驗章通過即信任 claims。（見 JWT，領域 F）\n\n**Kafka**：分散式、可持久化、可重放的 append-only commit log；以 partition、consumer group、offset 為核心抽象。（見 Kafka，領域 A）\n\n**Kong / KrakenD**：API 閘道；Kong 偏外掛生態（Lua/插件）、KrakenD 偏無狀態高效能聚合。（見 ALB vs API Gateway vs KrakenD vs Kong，領域 H）\n\n**Kubernetes**：宣告式控制迴圈系統，靠 controller 持續把實際狀態收斂到期望狀態，自我修復是其自然結果。（見 Kubernetes，領域 Q）\n\n**L4 vs L7 load balancing**：L4 只看 IP/port 轉發、L7 看 HTTP 內容（路徑、標頭）可做更聰明路由但較貴。（見 負載均衡 L4 vs L7，領域 N）\n\n**Lambda**：事件驅動 serverless 運算，一個 execution environment 同一瞬間只服務一個 invocation，N 並發＝N 個環境。（見 Lambda，領域 J）\n\n**Lamport clock**：邏輯時鐘，給事件單調遞增計數以推因果先後，不依賴不可信的牆鐘。（見 邏輯時鐘與排序，領域 M）\n\n**leader election**：在崩潰/復活、訊息延遲下選出且只選出一個 leader，難點是保證任一時刻最多一個有效 leader（防 split-brain）。（見 leader election，領域 M）\n\n**load shedding（卸載）**：過載時依真實飽和度主動丟一部分工作，保住剩下那部分的品質；與 rate limiting 觸發條件不同。（見 load shedding，領域 E）\n\n**long-poll**：client 發請求後 server 一直掛著到有資料才回，再立刻重連，模擬 server 推送的退路機制。（見 SSE / long-poll / WebTransport，領域 C）\n\n**LRU / LFU**：最近最少使用 / 最不常使用的驅逐策略；各有被特定存取樣式打敗的弱點。（見 驅逐 eviction，領域 G）\n\n**LSM-tree**：先追加再合併整理的儲存流派，寫放大低、讀放大較高；與 B-tree 相對。（見 LSM-tree vs B-tree，領域 O）\n\n## M–O\n\n**MCU（Multipoint Control Unit）**：WebRTC 多方架構，伺服器把多路混成一路再下發，省 client 解碼但伺服器重。（見 WebRTC，領域 C）\n\n**mesh（WebRTC）**：多方各自全網狀直連的架構，無中心伺服器但人數一多連線數爆炸。（見 WebRTC，領域 C）\n\n**metastable failure（亞穩定故障）**：觸發事件讓系統進入自我維持的過載壞狀態，即使觸發消失也卡在低 goodput 出不來。（見 retry storm 與 metastable failure，領域 E）\n\n**migration（漸進式遷移）**：把一次性 big-bang cutover 拆成許多次可回退小步，新舊並存、流量逐步轉移。（見 漸進式遷移與淘汰，領域 T）\n\n**mTLS（雙向 TLS）**：client 與 server 互相用憑證驗身分，service mesh 內服務間通訊的常用底座。（見 TLS / mTLS，領域 N）\n\n**multi-tenancy（多租戶）**：同一套系統服務多個獨立客戶，核心取捨是隔離強度 vs 資源效率（row/schema/db-per-tenant）。（見 多租戶隔離，領域 B）\n\n**MVCC（多版本並發控制）**：寫不就地覆蓋、改寫新版本；讀去找對自己可見的版本，讀寫不互等。（見 MVCC，領域 B）\n\n**N+1 查詢**：取清單 1 次再為每項各查 1 次，總 1+N 次往返；問題在次數而非單次慢。（見 N+1 查詢，領域 S）\n\n**namespace / cgroup**：容器隔離的兩組 Linux 原語——namespace 隔離視野、cgroup 限制資源。（見 Docker，領域 Q）\n\n**non-blocking I/O（非阻塞 I/O）**：無資料時 `read()` 立刻返回、執行緒去做別的，靠就緒通知（epoll/kqueue）回頭處理。（見 阻塞 vs 非阻塞 I/O，領域 D）\n\n**NoSQL**：一組為特定存取模式放棄關係模型某部分（換水平擴展/寫吞吐/貼合資料形狀）的家族（文件/KV/寬欄/圖/時序）。（見 SQL vs NoSQL，領域 O）\n\n**OAuth2 / OAuth 2.1**：授權委派框架（給第三方有限存取權），2.1 收斂為強制 PKCE、棄用隱式流程等安全預設。（見 OAuth2 / OIDC / OAuth 2.1，領域 F）\n\n**offset pagination**：用「跳過 N 筆」當翻頁座標；簡單但深分頁時掃描成本高、資料變動會漂。（見 分頁 pagination，領域 H）\n\n**OIDC（OpenID Connect）**：架在 OAuth2 上補認證（AuthN）那塊、發 ID token 的協定。（見 OAuth2 / OIDC / OAuth 2.1 / 認證 vs 授權，領域 F）\n\n**OpenAPI**：以機器可讀契約描述 REST API（路徑、schema、狀態碼），讓契約可驗證、可生碼。（見 REST 設計 · 版本化 · OpenAPI 契約，領域 H）\n\n**outbox**：把「對外發訊息」與業務寫入放進同一筆本地交易（寫 outbox 表），再由獨立投遞器搬出去，解 dual-write。（見 outbox / saga / dual-write 問題與 outbox，領域 A、L）\n\n## P–R\n\n**p99 / p999（尾延遲分位數）**：延遲分布尾端，使用者體驗由它主導而非平均；長尾會被組合放大。（見 tail latency 與長尾 / SLI / SLO，領域 S、I）\n\n**PACELC**：CAP 的延伸——分區時在 A/C 取捨，否則（Else）在延遲 L 與一致性 C 取捨（Abadi 提出）。（見 CAP / PACELC，領域 B）\n\n**partition（分區）**：網路被切開使節點互不可達，分散式失敗模型的核心威脅；也指 Kafka 等的並行/順序單位。（見 分散式失敗模型 / CAP，領域 M、B）\n\n**partition key**：決定訊息落哪個 partition 的鍵，同 key 內保序、不同 key 間可並行。（見 訊息順序 ordering，領域 A）\n\n**phantom read（幻讀）**：同一交易內兩次範圍查詢結果集因他人插入而改變的異常；可重複讀以下級別可能出現。（見 隔離級別與異常，領域 B）\n\n**poison message（毒訊息）**：內容讓 consumer 每次都崩潰/拒絕的訊息，無 DLQ 時會無限重投卡住佇列。（見 DLQ 死信與毒訊息，領域 A）\n\n**PostgreSQL vs MySQL**：兩者都用 MVCC，但實作隔離走相反路線（SSI 序列化快照 vs next-key lock），在 RR 保證、擋 phantom、真 serializable 上分得最開。（見 PostgreSQL vs MySQL，領域 B）\n\n**probe（liveness / readiness probe）**：K8s 探針，設定欄位語意決定何時重啟或摘流量；機制本質見 health check。（見 Kubernetes / health check，領域 Q、P）\n\n**QUIC**：HTTP/3 的底層傳輸，跑在 UDP 上、把 TLS 內建、解 TCP 層 head-of-line blocking。（見 HTTP/1.1 · 2 · 3，領域 N）\n\n**quorum（R + W > N）**：無主複製靠「讀寫多數重疊」達成一致，調 R/W 在一致性、可用性、延遲間取捨。（見 quorum，領域 M）\n\n**race condition（競態）**：多單元並發存取共享狀態、結果取決於交錯時序的不確定 bug；原子性是解藥之一。（見 race condition 與原子性，領域 D）\n\n**RabbitMQ**：AMQP broker，以 exchange＋binding＋routing key 把「發布」與「投遞」解耦，consumer 從 queue 取。（見 RabbitMQ，領域 A）\n\n**rate limiting**：事前依預設速率上限在門口擋超量請求，把保護從事後救火變事前配額；與 load shedding 觸發條件不同。（見 rate limiting，領域 E）\n\n**RBAC（Role-Based Access Control）**：把權限綁到角色、使用者綁角色來授權；簡單可審計但細粒度與跨維度條件較弱。（見 RBAC vs ABAC，領域 F）\n\n**RDB（Redis snapshot）**：Redis 定點把整份記憶體快照到磁碟的持久化，快但崩潰會丟兩次快照間的寫入。（見 持久化，領域 G）\n\n**reconciliation（對帳）**：對兩份本該一致的資料做「持續驗證＋主動修復」，因為任何長跑同步管線最終都會漂移。（見 對帳 reconciliation / 最終一致 · 補償 · 對帳，領域 L、B）\n\n**Redis**：記憶體型資料結構儲存，指令單執行緒序列執行故天然原子，代價是慢指令會阻塞全部。（見 Redis，領域 G）\n\n**Redis Pub/Sub vs Streams**：Pub/Sub 不持久、訂閱者不在就丟（at-most-once）；Streams 持久、可重放、有 consumer group。（見 Redis Pub/Sub vs Streams，領域 A）\n\n**Redlock**：Redis 多節點分散式鎖演算法；其安全性有爭議，關鍵互斥仍須配 fencing token。（見 分散式鎖，領域 M）\n\n**replication lag（複製延遲）**：副本非同步重放 WAL/binlog 落後主庫的時間差，會打破「讀己之寫」直覺。（見 複製延遲與讀己之寫，領域 B）\n\n**replication（複製）**：把同份資料存多節點以容錯/讀擴展/就近服務；按「誰能接受寫入」分單主/多主/無主三範式。（見 複製策略，領域 M）\n\n**REST**：以資源為中心、用統一 HTTP 介面操作的架構約束；真正的保證來自可機器驗證的契約而非漂亮 URL。（見 REST 設計 · 版本化 · OpenAPI 契約，領域 H）\n\n**retry storm（重試風暴）**：下游一慢、上游重試把一個失敗放大成多個請求，正回饋把小故障滾成大災難。（見 retry storm 與 metastable failure，領域 E）\n\n**RFC 流程（設計文件）**：把有實質後果的技術決定在動手前寫成文件、公開徵求意見、留下決議的慣例。（見 RFC／設計文件流程，領域 T）\n\n**rolling**：逐批替換實例的發布策略，過程中新舊版本同時在線（須 schema 與訊息相容）。（見 blue-green / canary / rolling，領域 Q）\n\n**runbook**：把「這類事故怎麼處理」事先寫下的操作手冊，縮短事故應變的決策時間。（見 事故應變與無咎事後檢討，領域 V）\n\n## S–T\n\n**S3 / 物件儲存**：以不可變物件（bytes＋metadata＋key）存於扁平 bucket、經 HTTP 存取，無目錄樹、無部分就地更新。（見 S3 / 物件儲存，領域 G）\n\n**saga**：用一串本地交易＋對應補償動作完成跨服務「交易」，失敗時逐步補償回滾，換的是不要分散式鎖定。（見 outbox / saga，領域 A）\n\n**schema 演進**：生產者與消費者不同時升級，故 schema 改動須維持前向/後向相容，舊版對端仍能正確讀寫。（見 序列化與 schema 演進 / 零停機 schema 遷移，領域 A、B）\n\n**SFU（Selective Forwarding Unit）**：WebRTC 多方架構，伺服器只轉發不混流，伺服器較輕、client 收多路。（見 WebRTC，領域 C）\n\n**service discovery（服務發現）**：在實例自動擴縮漂移的環境裡，讓呼叫端知道目標服務現在跑在哪些 IP:port。（見 DNS 與服務發現，領域 N）\n\n**service mesh**：把服務間通訊的橫切關注（mTLS、重試、熔斷、路由、可觀測性）下放到 sidecar，成平台層統一策略。（見 service mesh，領域 N）\n\n**sharding（分片）**：把大資料集水平切分到多機，每台存一部分；把規模問題換成跨分片協調問題。（見 分片 partition，領域 B）\n\n**SLI / SLO**：SLI＝可靠性的量測指標、SLO＝對它的目標值；兩者把可靠性變成可談判數字，配 error budget。（見 SLI / SLO / error budget，領域 I）\n\n**SNS**：全託管 pub/sub，把一則訊息推給所有訂閱端點（fan-out）；常配 SNS→SQS 做扇出緩衝。（見 SNS，領域 A）\n\n**Socket.io**：架在 WebSocket 之上的即時函式庫，補上 fallback、rooms、自動重連、redis-adapter 等應用層能力（非協定本身）。（見 Socket.io，領域 C）\n\n**SQL vs NoSQL**：本質是資料模型與一致性/擴展取捨之爭，不是查詢語言之爭。（見 SQL vs NoSQL，領域 O）\n\n**SQS**：全託管分散式佇列，pull 模型，靠 visibility timeout 達成至少一次（沒成功刪就重投）。（見 SQS，領域 A）\n\n**SRE（Site Reliability Engineering）**：用軟體工程方法做維運，文化核心是 toil、error budget、SLO-driven 三個互鎖概念。（見 SRE 文化，領域 V）\n\n**SSE（Server-Sent Events）**：基於 HTTP 的單向 server→client 文字串流，比 WebSocket 簡單、自帶斷線重連。（見 SSE / long-poll / WebTransport，領域 C）\n\n**SSI（Serializable Snapshot Isolation）**：PostgreSQL 達成真 serializable 的路線，在快照隔離上偵測危險的讀寫相依環並中止其一。（見 PostgreSQL vs MySQL / 隔離級別與異常，領域 B）\n\n**state machine replication（狀態機複製）**：所有節點對同一指令序列達成共識、按同序套用，使狀態收斂相同。（見 共識 consensus，領域 M）\n\n**sticky session**：負載均衡把同一使用者的連線固定打到同一台 server，是長連線狀態水平擴展的權宜手段。（見 連線狀態與水平擴展，領域 C）\n\n**tail latency（尾延遲）**：延遲分布尾端（p99/p999/max），即使每個元件平均快、整體尾巴仍被放大並主導。（見 tail latency 與長尾，領域 S）\n\n**technical debt（技術債）**：為趕快出貨而寫下「還不太對」的程式碼，像借錢——加速短期但以利息形式拖慢之後（Cunningham 原意是「已理解問題仍選擇寫不完整版」）。（見 技術債管理，領域 T）\n\n**timeout / deadline**：替任何跨行程呼叫設硬上限，超過就放棄、回明確錯誤、把資源還回去；逾時無法區分「慢」與「死」。（見 timeout / deadline / budget / 失敗偵測，領域 P、J）\n\n**TLS 1.3**：當前現役主力（RFC 8446），握手縮到 1-RTT、強制前向保密、只留 AEAD。（見 TLS / mTLS，領域 N）\n\n**token 撤銷**：自包含 token「持有即有效」與「想立刻撤銷」的矛盾，常用短 TTL＋refresh 或 denylist 折衷。（見 token 生命週期與撤銷，領域 F）\n\n**toil（瑣務）**：手動、重複、可自動化、無長期價值的維運工作；SRE 以收斂 toil 為核心指標。（見 SRE 文化，領域 V）\n\n**trace / span**：分散式追蹤把一個請求穿越多服務的因果路徑重建成一棵 span 樹，靠 trace context 跨服務傳播。（見 分散式追蹤，領域 I）\n\n**TrueTime**：Google Spanner 用有界誤差的時鐘區間提供外部一致性的時間機制。（見 邏輯時鐘與排序，領域 M）\n\n**TTL（Time To Live）**：資料/快取項的存活時限，到期主動清除（與記憶體滿時的驅逐不同）。（見 驅逐 eviction / 資料生命週期，領域 G、O）\n\n**12-factor app**：Heroku 2011 整理的雲原生應用十二原則（config 外置、process 無狀態、log 當 stream…）。（見 12-factor app，領域 Q）\n\n**2PC（兩階段提交）**：協調者用 prepare→commit 兩階段讓跨資源交易一起提交或一起回滾；阻塞且有協調者單點。（見 2PC 與分散式交易，領域 M）\n\n## U–Z\n\n**utilization（利用率）與 ρ→1**：佇列延遲隨利用率非線性上升，逼近 100% 時爆炸；故 80% 利用率延遲可能已是 50% 的數倍。（見 排隊直覺，領域 E）\n\n**vector clock（向量時鐘）**：每節點各記一個計數向量，能判斷兩事件是因果先後還是並發（無法比序即衝突）。（見 邏輯時鐘與排序，領域 M）\n\n**visibility timeout**：SQS 訊息被取走後對其他 consumer 隱形的一段時間；沒在內刪掉就重新可見、被重投。（見 SQS，領域 A）\n\n**WAL（Write-Ahead Logging，預寫日誌）**：改資料頁前先把變更順序追加進日誌並落穩，是崩潰恢復與 CDC 的共同基礎。（見 WAL 預寫日誌，領域 O）\n\n**warmup（暖機）**：在真實流量到達前主動把冷啟動的一次性成本付掉，讓首個真實請求落在已熱環境。（見 冷啟動與暖機，領域 S）\n\n**webhook**：伺服器對伺服器的回呼——事件發生時提供方主動對你登記的 URL 發 HTTP POST，把輪詢反轉成通知。（見 webhooks，領域 A）\n\n**WebRTC**：瀏覽器/App 間直傳即時音視訊與資料、不經伺服器中轉媒體；拆媒體/傳輸/信令三塊，多方分 SFU/MCU/mesh。（見 WebRTC，領域 C）\n\n**WebSocket（RFC 6455）**：從 HTTP 升級而來的全雙工長連線協定，握手後脫離 HTTP 語意改用 frame，兩端隨時可送。（見 WebSocket，領域 C）\n\n**WebTransport**：基於 HTTP/3/QUIC 的新雙向傳輸，支援多串流與不可靠資料報，成熟度仍在演進。（見 SSE / long-poll / WebTransport，領域 C）\n\n**write-behind（write-back）**：寫先進快取、非同步回寫底層儲存，吞吐高但崩潰會丟未回寫的資料。（見 快取策略，領域 G）\n\n**write-skew（寫偏斜）**：兩交易各自讀後寫、單獨看都合法但合起來違反不變量的異常；需 serializable 才完全擋。（見 隔離級別與異常，領域 B）\n\n**write-through**：寫同時更新快取與底層儲存，一致性好但每次寫多一跳延遲。（見 快取策略，領域 G）\n\n**YAGNI（You Aren't Gonna Need It）**：源於 Extreme Programming——真的需要時才實作，別為預見可能需要而先做；對抗過度工程。（見 簡單性 vs 過度工程，領域 U）\n\n## 中文索引（無單一對應英文者）\n\n**並發 ≠ 平行**：並發是「結構」（把
