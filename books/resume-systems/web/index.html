、刪不刪得乾淨。本檔含五條：底層結構的兩大流派（LSM-tree vs B-tree）、所有引擎賴以存活的崩潰保護（WAL）、資料模型的選型地圖（SQL vs NoSQL 各家族）、全文搜尋的核心資料結構（inverted index）、以及資料的「死法」（retention / TTL / 封存 / 軟刪除 / 合規刪除）。邊界：交易隔離與一致性語意在領域 B、快取與物件儲存在領域 G、跨庫同步與對帳在領域 L——本檔只談「單機引擎怎麼把資料存好、查到、刪掉」。\n\n## LSM-tree vs B-tree（寫放大 vs 讀放大）\n\n### 定義與原理\n\n一個儲存引擎的核心抉擇是：**資料在磁碟上要「就地維護有序」還是「先追加、之後再整理」。** 這個抉擇分出兩大流派。\n\n**B-tree（實務上多為 B+tree）**：把鍵維持在一棵高扇出、平衡的樹裡，所有資料在葉節點且就地（in-place）更新。一次查詢從根走到葉，路徑長度約 `log_B(N)`（B 是每頁能放的鍵數，常數百到上千）。一次寫入要找到對應頁、改它、刷回磁碟——**改一個值就要改寫整個頁（page，常見 4–16 KiB）**，這是 B-tree 的寫放大來源。讀則很直接：一條路徑到底，命中即得。\n\n**LSM-tree（Log-Structured Merge tree）**：寫入永不就地更新。新值先進記憶體裡的有序結構（memtable），滿了就整批 flush 成一個不可變的有序檔（SSTable，sorted string table），檔與檔之間靠背景 **compaction（壓實）** 逐層合併、丟棄被覆蓋的舊版本與墓碑（tombstone）。寫入因此是「順序追加」，對 SSD/HDD 都友善——但代價是**一個鍵的最新值可能散在多個 SSTable**，讀取得從新到舊一層層找（靠 bloom filter 與每層稀疏索引剪枝），這是 LSM 的讀放大來源。\n\n一句話的脊椎：**B-tree 把整理成本付在寫入當下（就地維護有序），LSM 把它延後到背景 compaction（換取寫入是純追加）。** 兩者都是「在寫放大、讀放大、空間放大之間選你願意付的那個」。\n\n**代表系統現況（2026-06，已查證）**：\n- **LSM 流派**：RocksDB（Meta，基於 LevelDB 演化，最新穩定版約 11.0.x／2026-04）、LevelDB、Apache Cassandra（5.0 起導入 BTI SSTable 格式與 Unified Compaction Strategy）、TiKV、CockroachDB 底層皆 LSM。\n- **B-tree 流派**：PostgreSQL（heap 表 + B-tree 次級索引）、MySQL InnoDB（clustered B+tree，主鍵即葉節點順序；InnoDB 自 MySQL 5.5 起為預設引擎、8.4 LTS 仍然）。\n\n### 解法空間\n\n「我要怎麼把有序資料存上磁碟」這題的辦法，沿一條軸展開：\n\n- **純 B+tree（就地更新）**：傳統 RDBMS 預設。讀延遲穩定、範圍掃描漂亮、空間放大低；寫入受隨機 I/O 與頁改寫拖累。\n- **純 LSM（追加 + compaction）**：寫密集、SSD 友善。寫吞吐高、壓縮率好；讀延遲受層數與 compaction 進度影響、有尾延遲。\n- **可調 LSM compaction 策略**：同樣 LSM，換 compaction 策略就換取捨——\n  - **Leveled（分層）**：每層大小遞增、層內不重疊鍵，讀放大低（一個鍵每層至多一個 SSTable），寫放大高。\n  - **Size-tiered（分桶）**：同大小的 SSTable 攢夠就合併，寫放大低，但同一鍵可能散在多桶、讀放大與空間放大高。\n  - **Unified / 混合**：Cassandra 5.0 的 UCS、RocksDB 的 universal compaction，用一個密度參數在 leveled 與 tiered 之間連續調節。\n- **Fractal/Bw-tree 等變體**：在 B-tree 葉子掛 delta buffer 攢寫、延後合併，想取兩者之長；實作複雜，較少見。\n- **混合儲存**：同一個系統熱資料走一種、冷資料走另一種（見「資料生命週期」本領域）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| B+tree（PostgreSQL／InnoDB） | 穩定低讀延遲、優秀範圍掃描、低空間放大、就地讀即最新 | 讀多寫少、需要強範圍查詢與複雜索引、OLTP | 隨機寫成本高；頁分裂（page split）造成碎片；高寫入吞吐會被 I/O 與鎖頂住 |\n| LSM（RocksDB／Cassandra） | 高寫吞吐（順序寫）、好壓縮率、SSD 壽命友善 | 寫密集、時序、KV、append-heavy 工作負載 | 讀放大與尾延遲（多 SSTable 查找）；compaction 吃 CPU/I/O、會與前台爭資源；刪除靠墓碑、空間延遲回收 |\n| Leveled compaction | 讀放大低（每鍵每層 ≤1 SSTable）、空間放大低 | 讀偏多的 LSM 工作負載 | 寫放大最高（一筆資料可能被重寫多次） |\n| Size-tiered compaction | 寫放大低 | 寫極密、可容忍讀放大的工作負載 | 空間放大高（合併前舊版本佔位）、讀要查多桶 |\n\n**Worked example（寫放大量級感）**：假設 leveled LSM 共 5 層、層間放大係數 10，最壞情況下一筆資料從 L0 一路被 compaction 重寫到 L4，每下一層都被讀出再寫回，**寫放大可達約 5×10/2 ≈ 25 倍**（粗估，與資料分布有關）。對照同樣一筆 100-byte 的更新打進 B+tree：若它落在一個 16 KiB 的頁，最小刷盤單位就是那 16 KiB，**頁層級寫放大約 16384/100 ≈ 164 倍**——這正解釋了「為什麼小筆高頻更新的工作負載，LSM 常常整體寫放大反而更低」這個反直覺結論：B-tree 的放大藏在頁粒度裡。\n\n### 何時需要\n\n- **選 B-tree**：工作負載讀多於寫、需要可預測的低讀延遲（如金融讀路徑）、大量範圍查詢與排序、需要豐富的次級索引與外鍵——絕大多數 OLTP 系統的預設選擇就對了。\n- **選 LSM**：寫入是瓶頸（時序、事件日誌、計數器、IoT、寫密集 KV）、資料量大且要好壓縮、能接受讀有尾延遲。\n- **不需要操心這層**：用通用 RDBMS 跑一般 CRUD 時，引擎的預設結構已經夠好，與其換引擎不如先加對索引、修掉 N+1（見 N+1 查詢，領域 S）。選錯結構是「寫吞吐撞到天花板」或「冷資料壓不下去」時才該重新審視的決策，不是起手式。\n\n### 常見誤解與陷阱\n\n- **「LSM 一定比 B-tree 寫得快」**：只在「寫放大佔主導」時成立。鍵很大、value 很大、或讀路徑被 compaction 尾延遲拖累時，LSM 不一定贏。\n- **「LSM 的刪除立刻釋放空間」**：錯。LSM 刪除只是寫一個墓碑，真正的空間要等 compaction 把墓碑與被覆蓋的舊版本都清掉才回收；墓碑過多（大量刪除/TTL 過期）會讓讀變慢，這是時序資料庫的經典陷阱（見「資料生命週期」本領域）。\n- **「B-tree 沒有寫放大」**：頁粒度本身就是寫放大；隨機寫造成的頁分裂與碎片還會放大它。\n- **「compaction 是免費的背景工作」**：它與前台讀寫爭 CPU/I/O，調不好會造成週期性延遲尖峰。\n- **把 compaction 策略當成不可調的常數**：同一個 LSM 引擎換策略（leveled↔tiered↔unified）就是換一整組讀/寫/空間放大取捨，是個第一級調校旋鈕。\n\n### 延伸閱讀\n\n- Patrick O'Neil et al., *The Log-Structured Merge-Tree (LSM-Tree)*（1996 原始論文）: https://www.cs.umb.edu/~poneil/lsmtree.pdf\n- Luo & Carey, *LSM-based Storage Techniques: A Survey*（VLDB Journal 2020）: https://arxiv.org/abs/1812.07527\n- RocksDB Wiki — RocksDB Overview: https://github.com/facebook/rocksdb/wiki/RocksDB-Overview\n- Apache Cassandra — Unified Compaction Strategy: https://cassandra.apache.org/_/blog/Apache-Cassandra-5.0-Features-Unified-Compaction-Strategy.html\n\n## WAL 預寫日誌\n\n### 定義與原理\n\n**Write-Ahead Logging（WAL，預寫日誌）的鐵律一句話：在把任何資料頁的變更寫到它最終的位置之前，先把「這個變更」以順序追加的方式寫進一個日誌、並讓它落穩（durable）。** 之所以叫「預寫」，就是日誌寫在資料頁之前。\n\n它解的是**崩潰原子性與持久性**：行程在改了一半資料頁時被斷電/被 kill，磁碟上會是個半完成的爛狀態。有了 WAL，重啟時引擎重放（replay）日誌——已提交但未刷到資料頁的，redo 補上；未提交卻已沾染資料頁的，undo 回滾——把資料庫帶回一個一致的點。WAL 是 ACID 裡 **D（durability）與 A（atomicity）** 的物理實作基礎（隔離與一致性語意見領域 B）。\n\n第一原理：**順序寫遠快於隨機寫。** WAL 把「許多筆散落各處的隨機資料頁更新」轉成「一條順序追加的日誌」，先讓日誌落穩拿到 durability，資料頁可以稍後再從容刷回（checkpoint）。這也是 LSM 與 B-tree 引擎都帶 WAL 的原因——RocksDB 有 WAL、PostgreSQL 有 WAL、InnoDB 有 redo log，本質都是同一招。\n\n### 解法空間\n\nWAL 的設計變奏圍繞「日誌何時算落穩、落穩到哪」：\n\n- **fsync 時機（per-commit vs 批次 group commit）**：每筆交易提交都 fsync（最安全、最慢）vs 把多筆並發提交的 fsync 合併成一次（group commit，攤平 fsync 成本）。\n- **fsync 嚴格度**：嚴格 fsync（等磁碟回報落穩）vs 放寬（只寫到 OS page cache 就回、靠定時 flush）——後者快但崩潰會丟最後一小段。\n- **日誌格式**：physical logging（記改了哪個 byte/頁的影像）／logical logging（記「做了什麼操作」）／physiological（折衷：頁內邏輯、頁間物理，InnoDB redo log 走這路）。\n- **checkpoint 策略**：多久把資料頁刷回一次、刷多少——影響崩潰後要重放多長的日誌（recovery 時間）與平時的 I/O 平滑度。\n- **WAL 的二次利用**：同一條日誌天然能當複製串流（PostgreSQL 邏輯/物理複製、MySQL binlog）與 CDC 來源（見 CDC，領域 L）——WAL 不只防崩潰，它是真相的有序流水帳。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 每筆提交 fsync | 提交即持久，崩潰零丟失（在磁碟誠實的前提下） | 金流、不可丟的交易 | 受單次 fsync 延遲限制吞吐；高頻提交須配 group commit |\n| group commit | 攤平 fsync 成本，吞吐大增、仍零丟失 | 高並發 OLTP | 個別交易延遲略增（要等湊批）；需引擎支援 |\n| 放寬 fsync（如每秒 flush） | 吞吐最高 | 可容忍崩潰丟最後 ~1 秒的場景（快取、計數、可重算資料） | 崩潰會丟最後一個 flush 窗口的已「提交」資料——名義 durable、實際不是 |\n| WAL 當複製/CDC 來源 | 下游可重建狀態、順序一致 | 複製、CDC、event sourcing | 日誌保留期、消費者落後、格式相容性都要管（見領域 L） |\n\n**Worked example（fsync 主導吞吐）**：一顆需要 fsync 落穩的 SSD，單次 durable fsync 約 1 ms。若每筆交易各自 fsync，單執行緒提交吞吐天花板 ≈ 1000 commits/s。開 group commit、把同一個 ~1 ms 窗口內到達的 100 筆並發提交合併成一次 fsync，**有效吞吐躍升到約 100,000 commits/s**——這就是為什麼高並發資料庫離不開 group commit：瓶頸從來不是 CPU，是那一次次 fsync。\n\n### 何時需要\n\n- **任何宣稱「提交後資料不會因崩潰而丟」的系統，必有等價於 WAL 的機制**——你用 RDBMS 就已經在用它，不必自己造。\n- **要自己實作 WAL** 的場景：寫自訂儲存引擎、嵌入式 KV、需要崩潰一致的本地佇列/狀態機。\n- **可以放寬甚至省略 durable WAL**：資料本身可重算或可從上游重放（快取、衍生視圖、能從 Kafka 重放的物化結果）——這時硬要 per-commit fsync 是付了持久性的成本卻不需要那個保證。\n- **要動 WAL 的 fsync 旋鈕**：當崩潰丟失的容忍度與吞吐需求有明確結論時，才去調 `synchronous_commit`／`innodb_flush_log_at_trx_commit` 這類參數，並寫進文件——這是個「拿持久性換吞吐」的明確取捨，不該是某人隨手改的。\n\n### 常見誤解與陷阱\n\n- **「寫進 WAL 就持久了」**：只有當 `write()` 後接了成功的 `fsync()`（且磁碟/控制器沒在說謊地快取）才持久。很多「資料神祕消失」的事故是 OS page cache 或磁碟 write cache 在 fsync 上撒謊。\n- **「WAL 讓寫變慢」**：恰恰相反——它把隨機資料頁寫換成順序日誌寫，通常讓整體寫更快；慢的是不必要的 per-commit fsync，那是另一回事。\n- **把放寬 fsync 的設定當預設值帶上線**：開發環境圖快關掉 durable fsync、忘了上 production，崩潰才發現提交其實沒落穩。\n- **忽略 checkpoint 與 WAL 保留**：WAL 無限長會塞爆磁碟；checkpoint 太疏會讓崩潰恢復重放很久（recovery 時間 = RTO 的一部分）。\n- **以為 WAL 防得了應用層邏輯錯誤**：WAL 保證的是「把你下的指令原子且持久地做下去」，它忠實地把一筆錯誤刪除也持久化了——它防崩潰，不防 bug。\n\n### 延伸閱讀\n\n- C. Mohan et al., *ARIES: A Transaction Recovery Method...*（WAL 恢復的奠基論文，1992）: https://dl.acm.org/doi/10.1145/128765.128770\n- PostgreSQL 官方文件 — Write-Ahead Logging (WAL): https://www.postgresql.org/docs/current/wal-intro.html\n- MySQL 官方文件 — InnoDB redo log: https://dev.mysql.com/doc/refman/8.4/en/innodb-redo-log.html\n\n## SQL vs NoSQL（文件 / KV / 寬欄 / 圖 / 時序各擅場）\n\n### 定義與原理\n\n「SQL vs NoSQL」表面是查詢語言之爭，**本質是資料模型與一致性／擴展取捨之爭**。關係模型（SQL）的核心保證是：固定 schema、宣告式 join、跨列跨表的 ACID 交易；它把「資料如何被查」與「資料如何被存」解耦，讓你事後才決定查法。NoSQL 不是單一東西，而是一組「為了某個特定存取模式而放棄關係模型某部分」的家族——放棄通常換來水平擴展、寫吞吐、或更貼合資料形狀的模型。\n\n判斷的第一原理：**先問存取模式，再選模型。** 關係庫讓你「先存好、查法之後想」；多數 NoSQL 要你「先想清楚怎麼查，再決定怎麼存」（尤其寬欄與 KV 是圍繞主要查詢設計 partition key 的）。\n\n### 解法空間\n\n這是個「分類型」條目——以下是各模型的機制與擅場，而非單一解法：\n\n- **關係（SQL）**：列存於表、固定 schema、B-tree 索引、宣告式 join 與多表 ACID 交易。擅長：實體關係複雜、需要事後任意查詢與報表、需要強交易一致性。代表：PostgreSQL、MySQL。\n- **文件（document）**：以巢狀 JSON-like 文件為單位存取，schema 彈性、聚合資料就近放在一個文件裡（避 join）。擅長：聚合根明確、欄位多變、讀寫以「整份文件」為粒度。代表：MongoDB、Couchbase。\n- **鍵值（KV）**：`key → opaque value`，O(1) 查找、無查詢結構。擅長：快取、session、極簡高速查找。代表：Redis（見 Redis，領域 G）、DynamoDB（KV/文件混合）。\n- **寬欄（wide-column）**：`(partition key, clustering key) → 列`，圍繞查詢設計的 LSM 引擎，寫吞吐極高、線性水平擴展。擅長：寫密集、已知查詢路徑、大規模時間序列化資料。代表：Cassandra、HBase、ScyllaDB。\n- **圖（graph）**：節點＋邊為一等公民，遍歷（traversal）是原生操作、不靠遞迴 join。擅長：多跳關係查詢（社交、推薦的鄰接、權限鏈、詐欺偵測的關聯）。代表：Neo4j、Amazon Neptune。\n- **時序（time-series）**：以時間為主軸、針對 append-only 與時間範圍聚合最佳化（常配自動 retention/降採樣）。擅長：監控指標、IoT、事件計數。代表：TimescaleDB（PostgreSQL 擴充）、InfluxDB、Prometheus。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 關係（PostgreSQL/MySQL） | 固定 schema、多表 ACID、宣告式任意查詢、外鍵完整性 | 複雜實體關係、報表、強交易 | 水平擴展（分片）需自己做、跨分片 join/交易困難（見分片，領域 B） |\n| 文件（MongoDB） | 彈性 schema、單文件原子更新、聚合就近 | 聚合根清楚、欄位多變 | 跨文件交易雖支援但昂貴；schema 彈性會養出「隱形 schema 漂移」 |\n| KV（Redis/DynamoDB） | O(1) 查找、極高吞吐、易水平擴展 | 快取、session、簡單查找 | 無原生 join/二級查詢（DynamoDB 靠 GSI 補）；查法綁死 key 設計 |\n| 寬欄（Cassandra） | 線性水平擴展、寫吞吐極高、可調一致性 | 寫密集、已知查詢、跨區 | 一張表服務一種查詢（要反正規化、寫多份）；無 join；最終一致為常態 |\n| 圖（Neo4j） | 原生多跳遍歷、關係即一等公民 | 深度關聯查詢 | 水平擴展與跨分片遍歷較難；超大圖的分區是公開難題 |\n| 時序（TimescaleDB/InfluxDB） | 時間範圍查詢/聚合最佳化、自動 retention | 指標、IoT、事件 | 非時間維度的查詢弱；高基數 tag 會撐爆索引（見 cardinality 爆炸，領域 I） |\n\n**Worked example（反正規化的代價）**：一個寬欄資料庫要同時支援「依使用者查訂單」與「依商品查訂單」兩種查詢，沒有 join，於是把同一筆訂單**寫進兩張表**（一張 partition by user、一張 partition by product）。10 萬筆訂單就變成磁碟上 20 萬筆列，寫入吞吐與儲存翻倍——這是寬欄模型用「寫放大與儲存成本」換「讀路徑無 join、可線性擴展」的具體標價。換成關係庫，這是一張表加兩個索引就解決的事，但那兩個索引的維護成本與單機擴展上限，又是另一邊的標價。\n\n### 何時需要\n\n- **預設先用關係庫**：除非有明確理由，PostgreSQL/MySQL 能服務絕大多數系統到很大規模；「NoSQL 比較潮/比較快」不是理由。\n- **轉向某 NoSQL 家族的觸發點**：\n  - 查詢路徑單一且寫吞吐撞單機天花板 → 寬欄/KV。\n  - 資料天生是巢狀聚合、且幾乎不跨聚合查 → 文件。\n  - 核心問題是「多跳關係遍歷」、用 join 寫到自己都怕 → 圖。\n  - 資料是「時間戳 + 值」且查詢都是時間範圍聚合 → 時序。\n- **polyglot persistence（混用）很常見也很正常**：交易資料在關係庫、快取在 Redis、指標在時序庫——別硬要一個庫包山包海。但每多一種庫就多一份維運、一致性與資料同步負擔（見領域 L）。\n\n### 常見誤解與陷阱\n\n- **「NoSQL 沒有 schema」**：應該說 schema 在「寫時不強制、讀時隱含存在」。應用程式仍假設欄位形狀；沒有 DB 把關，schema 漂移會在讀路徑炸開。\n- **「NoSQL 一定比 SQL 快/可擴展」**：快的是「它被設計來服務的那一種查詢」；換個查法常常更慢甚至做不到。關係庫也能分片擴展，只是工你來做。\n- **「文件庫可以避免所有 join」**：只在聚合邊界與查詢邊界吻合時成立；一旦要跨聚合關聯，你會在應用層手刻 join，那更糟。\n- **「上 NoSQL 就放棄了交易」**：不一定——許多 NoSQL 提供單鍵/單文件原子性，部分（如 MongoDB、DynamoDB）有多項交易，但通常較貴、範圍受限。要看清楚它保證的交易邊界，而非二分法。\n- **用時序庫存高基數維度**：把 user_id 當 tag 塞進時序庫，基數爆炸會拖垮它——時序庫的甜蜜點是「低基數標籤 + 高頻時間點」。\n\n### 延伸閱讀\n\n- Martin Kleppmann, *Designing Data-Intensive Applications*, Ch. 2（資料模型與查詢語言）: https://dataintensive.net/\n- Codd, *A Relational Model of Data for Large Shared Data Banks*（1970 關係模型原典）: https://dl.acm.org/doi/10.1145/362384.362685\n- MongoDB 官方文件 — Data Modeling Introduction: https://www.mongodb.com/docs/manual/data-modeling/\n- Apache Cassandra 官方文件 — Data Modeling: https://cassandra.apache.org/doc/latest/cassandra/developing/data-modeling/index.html\n\n## 全文搜尋與 inverted index\n\n### 定義與原理\n\n關係庫的 `LIKE '%word%'` 為什麼慢到不能用？因為它對每一列做子字串掃描，是 O(N × 文件長度) 的全表掃描，且無法走索引。**全文搜尋的核心資料結構是 inverted index（倒排索引）**，它把這題從「掃所有文件找詞」翻轉成「查一個詞直接拿到含它的文件清單」——這就是「倒排」的意思：不是 `文件 → 詞`，而是 `詞 → 文件清單`。\n\n機制三步：\n1. **Analysis（分析）**：把文件文字切成 token（tokenization）、正規化（小寫、去標點、stemming 把 running→run、去 stop words）。中文/日文無空格，需斷詞器（如 jieba、ICU），這步直接決定搜得到搜不到。\n2. **建立 postings**：對每個 term（正規化後的詞），維護一個 **posting list**——含該 term 的文件 ID 列表，常附位置資訊（positions，用於片語查詢「恰好相鄰」）與詞頻（term frequency）。\n3. **查詢**：把查詢字也跑一遍同樣的 analysis，得到 term，去 inverted index 取各 term 的 posting list，再對多個 list 做交集（AND）／聯集（OR）／差集（NOT），得到候選文件集。\n\n範圍界定：**本條只講 inverted index 這個資料結構與機制。** 拿到候選文件後「哪篇最相關、怎麼排序」（TF-IDF、BM25、向量檢索）屬於相關度排序，是搜尋域、本書全域不涵蓋，不展開。\n\n### 解法空間\n\n「我要支援關鍵字搜尋」的辦法：\n\n- **`LIKE '%x%'`／全表掃描**：零建置、能跑，但 O(N) 不可規模化、不能用索引、無斷詞與正規化。\n- **資料庫內建全文索引**：PostgreSQL 的 `tsvector`/`tsquery` + GIN 索引、MySQL 的 `FULLTEXT` 索引——本質就是在 RDBMS 裡建一個 inverted index，省一個外部系統。\n- **trigram 索引**（如 PostgreSQL `pg_trgm`）：把字串切成 3-gram 建索引，能加速模糊/子字串匹配，但不是真正的詞級全文搜尋。\n- **專用搜尋引擎**：Elasticsearch / OpenSearch、Apache Lucene（前兩者的底層）、Apache Solr——獨立的 inverted index 系統，附完整 analysis pipeline、分散式分片、近即時索引。\n- **嵌入式搜尋庫**：Lucene、Tantivy、SQLite FTS5——把 inverted index 嵌進你的行程，免維運外部叢集。\n\nposting list 本身還有壓縮機制：文件 ID 排序後存差值（delta encoding）再做 variable-byte/Roaring bitmap 壓縮，這是搜尋引擎能把巨大索引塞進記憶體的關鍵。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| `LIKE '%x%'` | 零建置、即時最新 | 資料量小（千級）、偶爾查 | O(N) 掃描，資料一大就垮；無斷詞/正規化 |\n| PostgreSQL GIN + tsvector | 真正詞級索引、與交易資料同庫同交易、即時 | 中等規模、不想多養一個系統 | analysis 能力與 ranking 不如專用引擎；中文需額外斷詞配置 |\n| pg_trgm 三元組 | 加速模糊/子字串/拼錯容忍 | 自動完成、相似字串 | 非詞級語意；索引較大 |\n| Elasticsearch/OpenSearch（Lucene） | 強 analysis、分散式、近即時、豐富查詢 | 大規模、複雜搜尋、需求高 | 額外系統與維運；與來源庫之間是最終一致（要同步，見領域 L）；非交易性 |\n\n**Worked example（倒排的量級）**：一個含 100 萬篇文件、平均每篇 200 個 term 的語料，總共約 2 億個 token。要查「同時含 `payment` 與 `refund`」的文件：`LIKE` 路徑要掃 100 萬篇做子字串比對；inverted index 路徑只取 `payment` 的 posting list（假設命中 5,000 篇）與 `refund` 的（假設 3,000 篇），對兩個已排序的 ID 列表做交集，成本約 O(5000 + 3000) = 8,000 次比較——**從百萬級降到萬級**，這就是倒排把搜尋從掃描變成查找的具體效益。\n\n### 何時需要\n\n- **需要 inverted index/全文搜尋**：使用者要對自由文字下關鍵字、片語、布林查詢，且資料量讓 `LIKE` 不可行。\n- **先用 DB 內建全文**：中小規模、且搜尋不是核心競爭力時，PostgreSQL GIN/MySQL FULLTEXT 足夠，省掉一個分散式系統與一條資料同步管線。\n- **才上 Elasticsearch/OpenSearch**：規模、近即時、複雜 analysis（多語言、同義詞、自訂分詞）或高查詢吞吐成為真實需求時。引入它＝引入一條「來源庫 → 搜尋索引」的同步管線與它的最終一致性問題。\n- **over-engineering 警訊**：為了「未來可能要搜尋」就先架一座 ES 叢集，卻只有幾萬筆資料——這是用維運複雜度換一個還沒到來的需求。\n\n### 常見誤解與陷阱\n\n- **「全文搜尋就是 `LIKE` 加速版」**：不是。`LIKE '%x%'` 是子字串匹配、無語意；全文搜尋有 analysis（斷詞、stemming、stop words），兩者結果與能力都不同。\n- **忽略 analysis 階段**：索引與查詢必須用**同一套** analyzer，否則建索引時 `Running` 存成 `run`、查詢時 `running` 沒被 stem，就搜不到。中文不配斷詞器，等於沒切詞。\n- **把 Elasticsearch 當主資料庫**：它是搜尋索引、近即時、非交易性，且與來源庫最終一致——它可能丟你的權威資料，不該當 source of truth。\n- **以為 inverted index 自帶排序相關性**：資料結構只給你「哪些文件含這些詞」；「哪篇最相關」是另一層（ranking，本書不涵蓋）。\n- **位置資訊的成本**：要支援片語查詢（\"machine learning\" 恰好相鄰）就得存 positions，索引顯著變大——不需要片語就別開。\n\n### 延伸閱讀\n\n- Manning, Raghavan & Schütze, *Introduction to Information Retrieval*, Ch. 1（The inverted index）: https://nlp.stanford.edu/IR-book/\n- PostgreSQL 官方文件 — Full Text Search: https://www.postgresql.org/docs/current/textsearch.html\n- Apache Lucene — 官方文件: https://lucene.apache.org/core/\n\n## 資料生命週期（retention / TTL / 封存 / 軟刪除 / 合規刪除）\n\n### 定義與原理\n\n資料不是寫進去就永遠躺著——它有生命週期。**這條解的問題是：每一筆資料應該活多久、老了去哪、被「刪除」時到底發生了什麼。** 把這件事當設計問題而非事後補救，是區分「成熟系統」與「磁碟總有一天會滿、且某天收到合規刪除令時手忙腳亂」的分水嶺。\n\n核心是區分幾種語意上完全不同的「結束」：\n\n- **Retention（保留期）**：資料保留多久的政策，到期即清。\n- **TTL（time-to-live）**：給單筆資料的存活時長，由引擎自動到期清除（Redis key TTL、DynamoDB TTL、時序庫的 retention policy）。\n- **封存（archival）**：不刪，但從熱儲存搬到冷儲存（如物件儲存／冷層，見 S3，領域 G）——降成本、仍可取回。\n- **軟刪除（soft delete）**：不真的刪，標記 `deleted_at`／`is_deleted`，列還在、只是查詢過濾掉它。可復原、可審計。\n- **合規刪除（hard / compliant delete）**：把資料**真正地、不可復原地**從所有副本（含備份、快取、衍生索引、日誌）抹掉，以滿足法規（GDPR Art. 17 right to erasure、CCPA 等）。\n\n關鍵張力：**軟刪除 ≠ 合規刪除。** 軟刪除對使用者「看起來刪了」，但資料仍在磁碟——對「右被遺忘權」這種法規要求是**不合規**的。這兩個被混為一談是本領域最危險的陷阱。\n\n### 解法空間\n\n- **TTL 自動過期**：引擎層設每筆資料存活時長，背景回收。最省心，但回收是惰性/批次的（過期 ≠ 立刻被刪，見陷阱）。\n- **分區輪替（partition rotation）**：按時間分區（如每日一個 partition），過期就 `DROP PARTITION`——比逐列刪快得多，是時序資料的標準做法。\n- **冷熱分層 + 封存**：熱層保留近期、過期搬冷層（物件儲存/Glacier 類），保留可取回性、砍成本。\n- **軟刪除**：寫 `deleted_at`，配合查詢層統一過濾與唯一索引處理（軟刪除的列仍佔用唯一鍵，需設計）。\n- **合規硬刪除管線**：收到刪除請求 → 在主庫硬刪 → 連鎖刪除/匿名化所有衍生資料（搜尋索引、快取、analytics、日誌）→ 處理備份（標記「beyond use」或等備份輪替過期）→ 留下「已刪除」的稽核憑證（但憑證本身不含個資）。\n- **匿名化/假名化替代刪除**：法規允許時，用不可逆匿名化（讓資料無法再關聯到個人）取代物理刪除，保留統計價值。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| TTL 自動過期 | 引擎自動回收、零維運 | 快取、session、可丟的時序資料 | 過期是惰性/背景的，「過期」與「實際被刪」之間有窗口；不適合當合規刪除手段 |\n| 分區輪替 DROP | O(1) 砍掉整段時間資料 | 時序/日誌、按時間 retention | 需一開始就按時間分區；粒度受分區大小限制 |\n| 封存到冷層 | 大幅降成本、仍可取回 | 法規要求長期保存、低頻存取 | 取回有延遲與費用；冷層資料也受合規刪除約束 |\n| 軟刪除 | 可復原、保留審計與外鍵完整性 | 使用者「刪除」可反悔、需稽核 | **不是合規刪除**；deleted 列仍佔空間與唯一鍵；查詢全得記得過濾，漏一處就外洩 |\n| 合規硬刪除 | 法規意義上真正抹除、不可復原 | GDPR/CCPA 刪除請求 | 必須涵蓋所有副本（備份/快取/索引/日誌）；不可復原，誤刪無救；要有稽核軌跡 |\n\n**Worked example（合規刪除的爆炸半徑）**：一筆使用者資料在系統裡的副本遠不只主庫一份：主庫 1 份、read replica 2 份、Redis 快取 1 份、Elasticsearch 搜尋索引 1 份、資料倉/analytics 1 份、每日備份保留 30 天 = 30 份、應用日誌裡夾帶的 PII = 不定份。收到一筆 GDPR Art. 17 刪除請求，「真正刪掉」要協調**這 36+ 處**。漏掉備份或搜尋索引，就是名義合規、實際外洩。GDPR 違規上限為 **€20M 或全球年營業額 4%**（取高者，2026-06 查證），所以合規刪除是「一個刪除動作要設計成一條覆蓋全副本的管線」，不是 `DELETE FROM users WHERE id=?` 一行了事。\n\n### 何時需要\n\n- **每個存使用者資料的系統都需要一套生命週期政策**——區別只在嚴格度。沒有政策＝磁碟無限增長 + 法規來敲門時的危機。\n- **必須有合規硬刪除**：處理 EU/加州/受 GDPR-CCPA 影響使用者的個資時，是法律義務、非選配。\n- **軟刪除足夠的場景**：內部資料、需要「垃圾桶/復原」、需保留審計鏈、且不受被遺忘權約束。\n- **TTL/分區輪替足夠**：資料本質短命或純時序（快取、session、原始日誌、指標）。\n- **over-engineering 警訊**：對一個不含任何個資的內部工具，套一整套合規刪除管線是浪費——先確認資料分類，再決定嚴格度。\n\n### 常見誤解與陷阱\n\n- **把軟刪除當合規刪除**：最危險的一條。`deleted_at IS NOT NULL` 的列資料還躺在磁碟與備份裡，對「右被遺忘權」完全不合規。\n- **忘了備份與衍生副本**：主庫刪了，備份/快取/搜尋索引/analytics/日誌裡的影子還在。合規刪除的爆炸半徑是「所有副本」，不是一張表。\n- **TTL 過期 ≠ 立刻刪除**：Redis 的過期是惰性 + 取樣式背景回收，DynamoDB TTL 官方說明刪除是 best-effort、通常於數日內完成——「設了 TTL」不等於「過期那一秒資料就不在了」，安全/合規敏感場景別倚賴它的即時性。\n- **軟刪除列撐爆唯一索引**：軟刪一個 `email` 後使用者想用同 email 重註冊，卻被唯一索引擋住——軟刪除與唯一約束的互動要一開始就設計（如把 email 加進部分索引條件、或刪除時改寫值）。\n- **LSM 引擎的刪除是墓碑**：在 Cassandra/RocksDB 上「刪除」只是寫墓碑，空間要等 compaction 才回收；大量刪除/TTL 過期累積的墓碑會拖慢讀取（見「LSM-tree vs B-tree」本領域）——以為刪了就釋放空間是錯的。\n- **無限保留「以防萬一」**：留越多資料＝越大的外洩面與合規負擔。資料是負債也是資產；該過期就讓它過期。\n\n### 延伸閱讀\n\n- GDPR Art. 17 — Right to erasure（'right to be forgotten'）原文: https://gdpr-info.eu/art-17-gdpr/\n- UK ICO — Right to erasure（合規實作指引）: https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/individual-rights/individual-rights/right-to-erasure/\n- DynamoDB 官方文件 — Time to Live (TTL)（過期刪除非即時的說明）: https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/TTL.html\n"}, {"id": "G-caching", "file": "G-caching.md", "group": "Part 2 — 資料、一致性與儲存", "title": "G · 快取與儲存", "md": "# G · 快取與儲存\n\n快取用「一份較快但可能過時的副本」換吞吐與延遲，代價是多了一致性與失效的責任；本領域回答的是：你願意讓資料舊多久、容忍多大一致性裂縫，換多少 IOPS 與延遲省下來。本檔含七個條目：快取策略（cache-aside／write-through／write-behind）、失效與三種快取災難（雪崩／穿透／擊穿）、驅逐 eviction、快取存的持久化（RDB vs AOF）、多層快取與快取層降級，外加兩個工具條目——Redis（本書 Redis 內部機制的 owning 條目）與 S3／物件儲存。邊界：通用 fallback／降級機制在領域 P，本檔的「優雅降級」只談快取層那一段；交付語意與 Redis Pub/Sub vs Streams 的交付差異在領域 A，本檔的 Redis 只深講內部機制與多重角色；分散式鎖的正確性（Redlock／fencing token）在領域 M，本檔只點 Redis 作為鎖底層的限制。\n\n## 快取策略（cache-aside / write-through / write-behind）\n\n### 定義與原理\n\n快取策略要回答的不是「要不要快取」，而是**讀路徑誰負責填快取、寫路徑何時更新快取與底層儲存、兩者的先後**。三個維度組合出常見的三種模式：讀觸發填充（cache-aside / look-aside）、寫同步雙更（write-through）、寫非同步回寫（write-behind / write-back）。第一原理只有一條：**快取與資料庫是兩份獨立狀態，任何「先寫哪個、後寫哪個、中間能不能崩」的排列，都對應一種一致性風險與一種效能收益。** 選策略＝選你能接受哪種裂縫。\n\n### 解法空間\n\n- **cache-aside（旁路快取）**：應用程式自己讀寫快取。讀：先查快取，miss 就讀 DB、回填快取、設 TTL。寫：更新 DB 後**刪除**（而非更新）快取項，讓下次讀重新填。快取只是 DB 的旁路副本，DB 是真相來源。\n- **read-through**：把「miss 就回填」的邏輯收進快取層／client library，應用程式只對快取讀；語意接近 cache-aside，差別是回填責任在快取元件而非業務碼。\n- **write-through（寫穿）**：寫時同步寫快取**與** DB，兩者都成功才回應。讀永遠命中且新鮮，代價是寫延遲＝兩段之和。\n- **write-behind / write-back（回寫）**：寫只更新快取就回應，由背景批次／非同步把髒項刷回 DB。寫延遲最低、可合併多次寫，但快取崩潰會丟掉未刷回的資料。\n- **write-around**：寫只進 DB、不碰快取，靠後續讀 miss 自然回填。適合寫多讀少、避免把一次性寫資料灌進快取。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| cache-aside | DB 為真相；快取最終一致 | 讀多寫少、可容忍短暫舊讀 | 寫後「先更 DB 再刪快取」仍有罕見競態（見下）；miss 風暴要配防擊穿 |\n| read-through | 同上，回填邏輯集中 | 想把快取邏輯藏進元件 | 快取元件需懂 DB schema，耦合上移 |\n| write-through | 讀恆新鮮、恆命中 | 讀後立即重讀、要求一致 | 寫延遲＝cache+DB；冷資料也被寫進快取浪費記憶體 |\n| write-behind | 寫延遲最低、可合併寫 | 高頻寫、可容忍丟少量最新寫 | 快取崩潰丟未刷回資料；需處理刷回失敗、順序、背壓（見領域 E） |\n| write-around | 不污染快取 | 一次性寫、寫多讀少 | 寫後立即讀必 miss，首讀延遲高 |\n\nworked example（cache-aside 寫競態）：兩個請求同時對同一鍵操作——A 讀 DB 得舊值 `v1`、B 更新 DB 為 `v2` 並刪快取、A 才把 `v1` 回填快取。此後快取卡在 `v1` 直到 TTL 到期。發生機率低（要求 A 的讀回填晚於 B 的刪），但在高並發熱鍵上一天可命中數次；防法是回填時用 `SET ... NX` 加短 TTL，或在寫路徑用延遲雙刪（更 DB→刪快取→延遲數百 ms 再刪一次）。即使如此也只是**降低**機率，不能消滅——這正是「快取與 DB 兩份狀態」的本質代價。\n\n### 何時需要\n\n- 讀遠多於寫、且讀可容忍毫秒到秒級的舊值 → cache-aside（預設首選，最簡單、爆炸半徑小）。\n- 寫後極可能立刻被讀、且要求讀到自己剛寫的值（讀己之寫，見領域 B）→ write-through。\n- 寫吞吐是瓶頸、且業務能接受「崩潰丟掉最後幾秒寫入」→ write-behind（通常用於計數器、metrics、可重算的聚合，不用於金流）。\n- over-engineering 警訊：讀寫比接近 1:1、或資料總量小到 DB 自帶的 buffer pool 已能全駐記憶體時，外加一層快取只是多一個失效來源。\n\n### 常見誤解與陷阱\n\n- **「寫時更新快取比刪除好」**：更新快取看似省一次 miss，但兩個並發寫可能讓快取與 DB 的最終值不一致（寫順序在兩個系統可能相反）。cache-aside 標準做法是**刪除**讓下次讀重填，把一致性責任收斂到單一回填路徑。\n- **「write-through 保證一致」**：它保證**讀命中時新鮮**，但若寫快取成功、寫 DB 失敗（或反之）而沒有原子提交，仍會分叉；要嘛接受短暫不一致，要嘛用 outbox 類機制（見領域 A）讓兩段最終一致。\n- **把 write-behind 當持久儲存**：回寫快取的記憶體狀態是易失的；崩潰即失憶（見領域 J）。未刷回的寫就是會丟，這不是 bug 是設計取捨。\n\n### 延伸閱讀\n\n- AWS 白皮書〈Database Caching Strategies Using Redis〉（cache-aside / write-through 對照）：https://docs.aws.amazon.com/whitepapers/latest/database-caching-strategies-using-redis/welcome.html\n- Redis 官方〈Client-side caching〉（read-through 與失效追蹤）：https://redis.io/docs/latest/develop/reference/client-side-caching/\n\n## 失效 · 雪崩 · 穿透 · 擊穿\n\n### 定義與原理\n\n快取的省力來自「命中」，而命中率被三類失效災難侵蝕，它們的根因不同、解法也不同：\n\n- **雪崩（cache avalanche）**：大量鍵在同一時刻集體失效（或快取整體重啟），瞬間把流量全打到 DB。根因是失效時間集中。\n- **穿透（cache penetration）**：查詢的鍵**在 DB 裡根本不存在**，快取永遠 miss、每次都打到 DB（常見於惡意掃描不存在的 ID）。根因是「不存在」這個答案沒被快取。\n- **擊穿（cache breakdown / hotspot invalid）**：**單一熱門鍵**過期的瞬間，大量並發請求同時 miss、同時去 DB 重建。根因是熱鍵＋同時重建。\n\n三者的共通脊椎：**快取失效那一刻，後端要不要、會不會被流量擊垮。** 失效是快取最難的部分，因為它牽涉時間（何時過期）、空間（哪些鍵）與並發（多少請求同時撞上）。\n\n### 解法空間\n\n- **抗雪崩**：給 TTL 加隨機抖動（jitter），如 `base + rand(0, spread)`，把集體到期攤平到一段時間；快取重啟時預熱（warmup）熱資料；分層 TTL（見「多層快取」）。\n- **抗穿透**：把「查無此鍵」也快取成空值（null caching）並設較短 TTL；或在快取前置 **Bloom filter**——一個機率資料結構，能斷言「一定不存在」（無偽陰性），擋掉根本不該查 DB 的鍵。\n- **抗擊穿**：重建時用**互斥鎖／single-flight**，只放一個請求去 DB 重建、其餘等待結果；或對極熱鍵設「邏輯過期」（值永不物理過期，存一個過期時間戳，過期後由背景或單一請求非同步刷新，其餘讀仍回舊值）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| TTL 加 jitter | 失效時間分散、削平 DB 尖峰 | 大量同生成批次的鍵 | spread 太小無效、太大讓部分鍵過早失效降命中率 |\n| null caching | 不存在的鍵也命中、擋穿透 | 大量查不存在 ID | 空值 TTL 要短，否則「之後真的新增」被舊空值遮住；佔記憶體 |\n| Bloom filter | 「一定不存在」零誤判、省 DB 查詢 | 鍵空間大、穿透流量明顯 | 有偽陽性（誤判存在→仍查一次 DB）；刪除難（標準 Bloom 不支援刪除，用 counting/cuckoo 變體） |\n| single-flight 鎖 | 同鍵同時只一個重建 | 少數超熱鍵 | 鎖超時要短於重建時間上限，否則鎖過期又群起重建；鎖本身是熱點 |\n| 邏輯過期 | 熱鍵永不集體 miss | 不可容忍任何一次直穿 DB 的熱鍵 | 過期後短暫回舊值（最終一致）；需背景刷新機制 |\n\nworked example（擊穿）：一個熱門商品頁的快取項 TTL 到期，當下讀取速率 5,000 QPS（均勻分佈≈每毫秒 5 個）。重建一次約需 20 ms，這段空窗內約有 **100 個**請求到達。沒有保護時，這約 100 個全部 miss、全部去 DB 重建同一份資料（相對穩態瞬間放大約 100×），20 ms 後快取才填回。加 single-flight 後：只有第 1 個請求去 DB，其餘約 99 個等同一把鎖、共享它的結果，空窗後的請求直接命中新快取——**重建空窗內打到 DB 的查詢從約 100 降為 1**。\n\n### 何時需要\n\n- 鍵集中由同一批次生成（例如夜間批次預熱整批）→ 一定要 jitter，否則隔天同一時刻集體到期。\n- 對外開放、ID 可被枚舉的查詢端點 → 需要 null caching 或 Bloom filter 擋穿透。\n- 有明確的少數超熱鍵（首頁、熱門商品、明星貼文）→ 需要 single-flight 或邏輯過期。\n- over-engineering 警訊：流量小、DB 扛得住整批 miss 時，這些保護是多餘複雜度——先量「失效瞬間 DB 能不能撐」再決定。\n\n### 常見誤解與陷阱\n\n- **把三者混為一談**：雪崩是「多鍵同時失效」、擊穿是「單熱鍵失效」、穿透是「鍵不存在」。解法不同——對穿透加 jitter 沒用，對擊穿加 Bloom filter 沒用。先分類再開藥。\n- **null caching 沒設短 TTL**：之後真的新增了該鍵，卻被長 TTL 的空值遮住，變成「明明有資料卻查不到」。\n- **single-flight 鎖超時設太長**：若鎖 TTL 比重建還久而重建卡住，所有等待者一路阻塞直到鎖過期；若太短，鎖過期瞬間又是一輪群起重建（驚群再現）。\n- **以為 Bloom filter 零誤判**：它只保證「說不存在就一定不存在」（無偽陰性），但會偽陽性（說存在其實不存在），偽陽性只是多查一次 DB、不影響正確性，但別把它當精確集合用。\n\n### 延伸閱讀\n\n- Burton Bloom, \"Space/Time Trade-offs in Hash Coding with Allowable Errors\", CACM 1970（Bloom filter 原始論文）：https://dl.acm.org/doi/10.1145/362686.362692\n- Redis 官方〈Key eviction〉（含 TTL 與隨機抖動討論）：https://redis.io/docs/latest/develop/reference/eviction/\n\n## 驅逐 eviction（LRU / LFU / TTL / LRM…）\n\n### 定義與原理\n\n驅逐回答的是：**記憶體滿了、又要寫新資料時，丟掉哪一個既有鍵。** 它和「過期（expiration）」是兩回事——過期是 TTL 到了主動清除（被動於存取時、或主動由背景採樣清除），驅逐是記憶體達上限時被動騰位。驅逐策略的第一原理：**用「哪些鍵未來最不可能被用到」的某種近似，換最高的留存命中率，但任何近似都有它被打敗的存取樣式。** 沒有對所有 workload 最佳的策略，只有對你的存取分布最不糟的。\n\n### 解法空間\n\n以 Redis 的 `maxmemory-policy` 為座標（OSS 預設為 `noeviction`，達上限即對寫入回錯）。8.6 起共 **10 種**策略（2026-06），維度是「候選範圍 × 淘汰準則」：\n\n- **候選範圍**：`allkeys-*`（所有鍵都可淘汰）vs `volatile-*`（只淘汰設了 TTL 的鍵）。\n- **淘汰準則**：\n  - **LRU（Least Recently Used）**：淘汰最久沒被**存取**（讀或寫）的。Redis 是近似 LRU——對採樣的 `maxmemory-samples`（預設 5）個鍵比 idle time，非全域精確 LRU。\n  - **LFU（Least Frequently Used）**：淘汰存取**頻率**最低的，用帶衰減的計數器近似，避免「曾經很熱、現在已冷」的鍵賴著不走。\n  - **TTL（`volatile-ttl`）**：淘汰剩餘 TTL 最短的（快過期的先走）。\n  - **Random**：隨機淘汰，最省 CPU、最不智慧。\n  - **LRM（Least Recently Modified，8.6 新增 `volatile-lrm`／`allkeys-lrm`，2026-06）**：類似 LRU 但時間戳**只在寫入時更新、讀取不更新**。用於「被狂讀但不再被改」的鍵應該先被淘汰的場景。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| `noeviction`（OSS 預設） | 絕不丟資料；滿了就拒寫 | 快取即真相、丟資料不可接受 | 滿了寫入直接報錯，呼叫端必須處理；不是快取慣用 |\n| `allkeys-lru` | 近似留住最近用過的 | 通用快取、所有鍵都是可丟副本 | 近似非精確；掃描型存取（一次性遍歷）會污染 recency |\n| `allkeys-lfu` | 留住長期高頻鍵 | 熱度穩定、有明顯熱鍵 | 計數器需暖機；突發熱鍵起步慢 |\n| `volatile-lru/lfu/ttl` | 只在有 TTL 的鍵中淘汰 | 快取與持久資料**共用**同一實例 | 若可淘汰的鍵都沒設 TTL，行為退化同 `noeviction`（無鍵可淘→寫入報錯） |\n| `*-lrm`（8.6+） | 只看「最近是否被改」 | 讀重寫少、想先淘汰只讀不改的冷資料 | 被高頻讀但不更新的鍵會被優先淘汰——這正是它的目的，但若你其實想留住熱讀資料就選錯了 |\n| `*-random` | O(1) 最省 CPU | 鍵價值均等、極端吞吐 | 命中率最差；幾乎只在診斷或特殊場景用 |\n\nworked example（LRU vs LFU）：一個快取**容量上限 1,000 個鍵**，其中 10 個是長期熱鍵（每秒各被讀 100 次），快取已被它們與其他常用鍵占滿。某段時間做了一次全表掃描、陸續讀進 **5,000 個一次性的冷鍵**——容量只有 1,000，每個新冷鍵進來都得驅逐一個既有鍵：在 LRU 下，這些剛被讀的冷鍵 recency 最新、排在驅逐隊尾，反而把 10 個真正的熱鍵擠出去（掃描污染）；在 LFU 下，熱鍵的頻率計數（每秒 100 次）遠高於只被讀一次的冷鍵，冷鍵先被淘汰、10 個熱鍵留存。這就是讀重、且有掃描型查詢時 LFU 勝過 LRU 的典型情形。\n\n### 何時需要\n\n- 快取實例**純做快取**、所有鍵都是可重算副本 → `allkeys-lru`（最常見預設）或 `allkeys-lfu`（熱度穩定時）。\n- 同一實例**混放**快取與不可丟的持久資料 → `volatile-*`，並確保持久資料**不設 TTL**、快取資料設 TTL，讓淘汰只動快取那批。\n- 存取以讀為壓倒多數、且想保留「正在被更新」的活資料而非「只被狂讀的死資料」→ 考慮 `*-lrm`（8.6+）。\n- over-engineering 警訊：資料量遠小於 `maxmemory` 時，永遠觸發不到驅逐，糾結策略是浪費——TTL（過期）才是你實際在用的清理機制。\n\n### 常見誤解與陷阱\n\n- **把驅逐當過期**：到了 TTL 自動消失是過期；記憶體滿才丟是驅逐。`noeviction` 下 TTL 仍會讓鍵過期，只是滿了不會再額外驅逐。\n- **`volatile-*` 卻沒鍵設 TTL**：若所有鍵都沒 expire，`volatile-*` 找不到可淘汰的鍵，寫入會像 `noeviction` 一樣報錯——靜默地退化成「滿了就掛」。\n- **以為 Redis LRU 是精確的**：它是採樣近似；`maxmemory-samples` 越大越準也越耗 CPU（10 已接近真 LRU）。把它當教科書精確 LRU 會在邊角案例上對不上。\n- **LFU 計數器是線性的**：Redis LFU 用對數型計數器並隨時間衰減（`lfu-log-factor`／`lfu-decay-time`），不是單純累加；不懂衰減會誤判它的行為。\n\n### 延伸閱讀\n\n- Redis 官方〈Key eviction〉（policies、近似 LRU、LFU 計數器）：https://redis.io/docs/latest/develop/reference/eviction/\n- Redis 8.6 〈What's new〉（`volatile-lrm`／`allkeys-lrm`）：https://redis.io/docs/latest/develop/whats-new/8-6/\n\n## 持久化（RDB vs AOF、fsync 取捨）\n\n### 定義與原理\n\n記憶體型儲存的資料是易失的，重啟即失憶（見領域 J）。持久化是**主動**把記憶體狀態寫到磁碟，讓崩潰／重啟後能還原。它要回答的核心取捨是：**你願意在崩潰時丟掉「最後多久」的寫入（durability window），換多大的寫入吞吐與重啟速度。** 這是一條連續光譜：fsync 越勤、丟得越少，但每次寫都等磁碟、吞吐越低。\n\n### 解法空間\n\n以 Redis 兩種機制為座標：\n\n- **RDB（snapshot）**：定期把整個資料集做 point-in-time 快照（fork 子行程、寫成緊湊二進位檔）。重啟時載入單一檔案、最快；但兩次快照之間崩潰，會丟掉自上次快照以來的全部寫入。\n- **AOF（Append Only File）**：把每個改寫指令追加到 log，重啟時重放還原。durability 由 fsync 策略決定：\n  - `appendfsync always`：每次寫都 fsync，最安全、最慢（每寫一筆等一次磁碟）。\n  - `appendfsync everysec`：每秒 fsync 一次（預設），崩潰最多丟約 1 秒寫入——延遲與安全的折衷點。\n  - `appendfsync no`：交給 OS 決定何時刷盤，最快、丟失窗口不可控（可能丟掉 OS buffer 中數十秒的寫）。\n  - AOF 會隨指令累積膨脹，靠 **AOF rewrite**（重寫成等效的最小指令集）壓縮。\n- **混合（aof-use-rdb-preamble）**：AOF 檔以 RDB 格式做前段（快速載入基底）＋其後增量指令，兼顧重啟速度與低丟失窗口。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證（崩潰丟失窗口） | 適用場景 | 注意事項 |\n|---|---|---|---|\n| RDB only | 丟「上次快照→崩潰」全部寫入 | 可容忍丟幾分鐘、要快重啟／備份 | fork 在大資料集上短暫吃 CPU/記憶體（copy-on-write）；快照頻率＝丟失上限 |\n| AOF `always` | 幾乎零丟失（已回應即落盤） | 不可丟任何已確認寫 | 吞吐大降；每寫等磁碟，延遲被 fsync 主導 |\n| AOF `everysec`（預設） | 最多約 1 秒 | 多數場景的甜蜜點 | 「約 1 秒」非硬保證；磁碟卡頓時實際窗口更大 |\n| AOF `no` | 不可控（OS 決定） | 純快取、丟失無所謂、要最高吞吐 | 等同沒怎麼保證，別用在需要 durability 的資料 |\n| RDB＋AOF 混合 | ≈ AOF 的丟失窗口＋RDB 的快重啟 | 同時要低丟失與快恢復 | 設定較複雜；佔較多磁碟 |\n\nworked example（fsync 與丟失量）：一個 Redis 以 `appendfsync everysec` 跑、承受 50,000 writes/s。崩潰時最後一次 fsync 之後、尚未落盤的寫入最壞情況約 1 秒份 ＝ **約 50,000 筆**寫入面臨丟失風險。若改 `appendfsync always`，理論丟失趨近 0，但每筆寫都要等一次 fsync——在一顆每次 fsync 約 1 ms 的磁碟上，序列 fsync 把單執行緒寫入吞吐天花板壓到約 1,000 writes/s 量級（除非批次合併多筆寫共用一次 fsync）。50,000→約 1,000 的差距，就是「零丟失」的標價。\n\n### 何時需要\n\n- 資料是**可重算的快取副本** → 可以乾脆關閉持久化，或只留 RDB 當暖機加速；崩潰直接從 DB 重建。\n- 資料**只在 Redis 裡有真相**（如某些 session、計數）→ 至少 AOF `everysec`；不可丟的金流類別資料，要嘛 `always`＋接受吞吐代價，要嘛根本不該只放記憶體型儲存。\n- 要快速備份／搬遷整份資料 → RDB 快照檔最方便。\n- over-engineering 警訊：對純快取開 `appendfsync always` 是拿吞吐換一份你本來就會從 DB 重建的資料，純浪費。\n\n### 常見誤解與陷阱\n\n- **以為 `everysec` 保證「只丟 1 秒」**：那是正常情況的近似。若磁碟 I/O 卡住、fsync 排隊，背景 fsync 落後，實際丟失窗口會超過 1 秒。durability 是統計性的，不是硬上限。\n- **以為開了 AOF 就不會丟**：fsync 之前的寫仍在 OS page cache，崩潰會丟。`always` 才接近零丟，且代價巨大。\n- **把持久化當高可用**：持久化解的是「單機崩潰後能還原」，不是「崩潰期間還能服務」。後者要複製／副本（見領域 M）；磁碟壞了、單點仍會停。\n- **RDB fork 的記憶體尖峰**：fork 用 copy-on-write，寫入越多的瞬間、被複製的頁越多，記憶體可能短暫接近翻倍；在記憶體吃緊的機器上做快照可能觸發 OOM。\n\n### 延伸閱讀\n\n- Redis 官方〈Persistence〉（RDB / AOF / 混合 / fsync 策略）：https://redis.io/docs/latest/operate/oss_and_stack/management/persistence/\n- 〈Redis persistence demystified〉(antirez)：http://oldblog.antirez.com/post/redis-persistence-demystified.html\n\n## 多層快取與優雅降級\n\n### 定義與原理\n\n多層快取＝在請求路徑上**串多級快取**，每級各有不同的容量、延遲、命中率與一致性特性：典型是 client/CDN → 應用程式行程內（local，如 LRU map）→ 分散式快取（remote，如 Redis）→ DB。第一原理：**離請求越近的層越快但越小、越容易與真相分叉；越遠的層越大越一致但越慢。** 而「優雅降級」在快取脈絡下特指：**當某一層（尤其遠端快取）掛了，請求路徑要能退到下一層或退到 DB，而不是整條鏈一起倒。** 通用的 fallback／降級機制（含 circuit breaker 觸發）見領域 P，本條只談快取層自身的降級。\n\n### 解法空間\n\n- **分層 TTL**：近端層（local）給很短 TTL（秒級，容忍些微不一致換低延遲），遠端層（Redis）給較長 TTL，DB 為真相。\n- **快取掛掉時的降級路徑**：遠端快取不可用時，退到「直接打 DB」並對 DB 套保護（限流／single-flight，見領域 E），避免快取一掛就把整批流量灌爆 DB（這本身就是雪崩的一種觸發）。\n- **本地快取兜底**：遠端不可用時，短暫用行程內 local cache 撐住熱資料（可能更舊，但好過直接 503）。\n- **失效傳播**：多層下，一次寫要讓**每一層**都失效——常見漏洞是更新了 DB 與 Redis、卻忘了行程內 local cache，導致那台機器持續回舊值直到 local TTL 到。可用 pub/sub 廣播失效事件通知各節點清 local（見領域 A 的 Pub/Sub 交付語意）。\n- **stale-while-revalidate**：返回過期值的同時非同步刷新（HTTP 與應用層皆有此模式），用「可控的舊」換可用性。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 效果 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 分層 TTL | 近端極低延遲＋遠端較一致 | 讀密集、可容忍近端秒級舊值 | local 各節點獨立過期，同一時刻不同機器可能回不同值 |\n| 快取掛→退 DB＋限流 | 遠端快取故障不致命 | 遠端快取非單點不可或缺 | 退 DB 瞬間流量暴增，必須配 DB 側保護否則換 DB 雪崩 |\n| local cache 兜底 | 遠端掛時仍回（較舊的）值 | 可接受短暫更舊資料的讀 | 失效難傳播；故障期一致性更鬆 |\n| pub/sub 廣播失效 | 多節點 local 同步失效 | 有行程內快取的水平部署 | pub/sub 是 at-most-once，漏訊息→某節點殘留舊值（見領域 A） |\n| stale-while-revalidate | 刷新期間零等待、零 miss 風暴 | 可容忍短暫舊值的熱資料 | 過期窗口內回舊值；需背景刷新且要防刷新風暴 |\n\nworked example（分層命中率）：請求路徑 local → Redis → DB。設 local 命中率 80%、Redis 對 local-miss 的命中率 90%、其餘打 DB。每 1,000 個請求：local 命中 800、剩 200 進 Redis、Redis 命中 180、最後 20 打 DB。**只有 2% 的請求最終觸及 DB。** 若延遲為 local 0.01 ms、Redis 0.5 ms、DB 10 ms，平均讀延遲 ≈ 0.8×0.01 + 0.18×0.5 + 0.02×10 ≈ **0.298 ms**，相較全打 DB 的 10 ms 降約 97%。但代價是：寫一次資料要失效兩層，且 local 的 80% 那批可能在各節點回到秒級舊值。\n\n### 何時需要\n\n- 單一遠端快取已成延遲或頻寬瓶頸、且熱資料高度集中 → 加 local 層吃掉大部分讀。\n- 遠端快取的可用性會直接決定服務可用性（快取一掛服務就掛）→ 必須設計快取層降級路徑（退 DB＋DB 保護）。\n- over-engineering 警訊：流量不大、單層 Redis 命中率已高（>95%）時，再加 local 層帶來的失效複雜度與跨節點不一致，往往大於它省的那點延遲。\n\n### 常見誤解與陷阱\n\n- **「快取掛了退 DB 就好」卻沒保護 DB**：遠端快取一掛，原本被擋住的全部讀瞬間直撲 DB——這是把快取故障升級成 DB 故障的典型路徑。退 DB 必須同時上限流／single-flight。\n- **忘了 local 層的失效**：更新時只清了 Redis、漏清各節點行程內 cache，造成「部分機器一直回舊值」，且因為是少數機器、難重現難 debug。\n- **層數越多越好**：每加一層就多一處要失效、多一種不一致來源、多一個故障點。層數是成本不是免費的命中率。\n- **把多層快取降級當通用 fallback**：本條只解「快取層自己掛了怎麼退」；服務間呼叫的整體降級、預設值、熔斷觸發是更廣的韌性主題（見領域 P）。\n\n### 延伸閱讀\n\n- RFC 5861〈HTTP Cache-Control Extensions for Stale Content〉（stale-while-revalidate / stale-if-error）：https://www.rfc-editor.org/rfc/rfc5861\n- Redis 官方〈Client-side caching〉（行程內快取與失效追蹤 invalidation）：https://redis.io/docs/latest/develop/reference/client-side-caching/\n\n## Redis\n\n### 是什麼與內部機制\n\nRedis 是記憶體型資料結構儲存，把 string / hash / list / set / sorted set / stream / bitmap / HyperLogLog 等結構放在記憶體裡，以單一行程提供低延遲存取。最關鍵的內部事實：**指令的執行是單執行緒的**——所有指令在單一 main thread 上序列執行，因此每個指令對資料的操作天然原子、不需鎖；這也是 Redis 簡單與可預測的根源，代價是**一個慢指令（如對大集合做 `KEYS *` 或 `SORT`）會阻塞所有其他指令**。\n\nRedis 6.0 起加入 **threaded I/O（`io-threads`）**：把網路 socket 的 response 寫回（及視設定的 read/parse）卸載到多執行緒，但**指令執行本身永遠仍在單一執行緒、永不平行**。注意預設只卸載寫回（`io-threads-do-writes`）、**讀路徑的 parse 預設不卸載**，需另設 `io-threads-do-reads yes` 才生效（官方註明讀的卸載通常幫助不大）。Redis 8 重寫了 I/O threading 實作、效能顯著提升（並以 SIMD 加速 CRC64 等）（2026-06）。**易錯 nuance：即使在 Redis 8，`io-threads` 預設仍為 1（等於關閉），需手動設為 4–8 才生效**——「Redis 8 預設開啟 I/O threading」是錯的。\n\n持久化（RDB / AOF / fsync）見本領域「持久化」條目；驅逐策略（`maxmemory-policy`）見本領域「驅逐」條目。\n\n授權演進（load-bearing 老化事實，2026-06）：\n\n- **BSD-3-Clause**（至 2024-03）→ **2024-03 改雙授權 SSPLv1 / RSALv2**（皆非 OSI 開源授權，引發社群分裂）→ **2025-05 隨 Redis 8 加入 AGPLv3**，成為**三授權（tri-license）**：使用者可三選一（RSALv2、SSPLv1、AGPLv3），其中**只有 AGPLv3 是 OSI 認可的開源授權**。產品名自 8.0 起為「Redis Open Source」，RediSearch/RedisJSON 等模組併入核心同受三授權。回加 AGPLv3 與原作者 antirez 於 2024-11 回歸 Redis 公司有關。當前 Redis 已是 **8.x**（非 7.x）。\n- **Valkey**：由 **Linux Foundation** 主導、2024-03（宣布 2024-03-28）自 **Redis 7.2.4** fork、採 **BSD-3-Clause** 開源授權，AWS / Google Cloud / Oracle 等支持。當前已到 9.x（2026-06）。主要 Linux distro 與雲端（如 AWS ElastiCache、Google Memorystore for Valkey）已普遍轉向 Valkey。\n\n### 在哪些系統扮演什麼角色\n\nRedis 的價值在於「一個元件、多重角色」，因為它的資料結構直接對映多種系統需求：\n\n- **快取**：最主流用途，配 TTL ＋ `maxmemory-policy`（見本領域前述條目）。\n- **分散式鎖**：用 `SET key val NX PX ttl` 取鎖。但 Redis 鎖**不保證分散式正確性**——Redlock 演算法與其爭議、fencing token 的必要性見領域 M；本條只說它常被當鎖底層、且單實例鎖在 failover 時可能雙重持有。\n- **佇列／延遲任務**：用 List（`LPUSH`/`BRPOP`）做簡單佇列，或 Stream（`XADD`/`XREADGROUP`）做帶 consumer group 的 at-least-once 佇列；交付語意（Pub/Sub at-most-once vs Stream at-least-once）見領域 A。Redis-backed job queue（如 BullMQ）即建於此。\n- **Pub/Sub**：`PUBLISH`/`SUBSCRIBE` 做即時廣播，fire-and-forget、at-most-once（離線訂閱者永久錯過）——常用於多節點快取失效廣播、WebSocket backplane（見領域 C）。\n- **排行榜 leaderboard**：Sorted Set（`ZADD`/`ZRANGE`/`ZRANK`）以分數排序，天然支援 top-N 與名次查詢。\n- **限流 rate limiting**：用計數器＋TTL，或更精確的滑動視窗／token bucket（常以 Lua script 保證多步原子）；限流機制本身見領域 E，本條只說 Redis 因單執行緒原子性適合做計數底層。\n\n### 保證與限制\n\n- **保證**：單執行緒序列執行 → 單指令原子；多步原子可用 `MULTI/EXEC`（transaction，非回滾型）或 Lua script（單執行緒內整段原子執行）。`WAIT` 可要求寫已複製到 N 個副本後才回（但仍非強一致同步複製）。\n- **限制**：\n  - **複製是非同步的**：master 回應 client 後才異步推給 replica，master 崩潰時未複製的寫會丟（見領域 M 的複製延遲）。\n  - **單執行緒 = 單慢指令全堵**：一個 O(N) 大指令會卡住整個實例。\n  - **記憶體上限即容量上限**：資料超過 `maxmemory` 就驅逐或拒寫；它不是無限磁碟儲存。\n  - **持久化是 best-effort**：`everysec` 仍可能丟約 1 秒（見「持久化」條目）。\n\nworked example（單執行緒延遲放大）：Redis 單執行緒每秒能處理數十萬個 O(1) 小指令（如 `GET`/`SET`，單指令微秒級）。但若有一個請求對一個 100 萬元素的 set 跑 `SMEMBERS`（O(N)、假設耗時 50 ms），在這 50 ms 內**所有**其他指令排隊等待——對一個本來 p99 < 1 ms 的實例，這一個慢指令會把同窗口內所有請求的尾延遲推到 50 ms 以上。這就是「禁用 `KEYS *`／大範圍 O(N) 指令於生產」的根本原因，不是慣例而是單執行緒模型的直接後果。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| Redis（Redis Ltd.） | 全功能、模組生態、單執行緒原子 | 要最新功能與商業支援 | 8.x 為三授權，純開源只有 AGPLv3 那條；商用以服務形式提供須留意 SSPL/RSAL |\n| Valkey | 語意與 Redis 7.2.4 相容、BSD 開源 | 要無爭議開源授權、避雲鎖定 | 與 Redis 8+ 新功能逐漸分流，非永遠對等 |\n| Memcached | 純 KV 快取、多執行緒、極簡 | 只要最單純的 KV 快取、想吃多核 | 無豐富資料結構、無持久化、無複製；功能少即優勢也是限制 |\n| 嵌入式 local cache（如行程內 LRU） | 零網路延遲 | 單機熱資料兜底 | 不跨節點共享、失效難傳播；屬「多層快取」的 local 層 |\n\n授權正是當前選 Redis vs Valkey 的核心取捨：要無爭議的 OSI 開源、避免商用服務化的授權義務 → Valkey（BSD）；要 Redis 8+ 最新功能與生態 → Redis（接受三授權，純開源走 AGPLv3）。\n\n### 常見誤解與陷阱\n\n- **「Redis 是單執行緒所以慢／吃不滿多核」**：單執行緒指的是**指令執行**；網路 I/O 自 6.0 起可多執行緒。單實例吃不滿多核是真的，但解法是多實例／cluster 分片，不是把執行多執行緒化（那會破壞原子性前提）。\n- **「Redis 8 預設開了 io-threads」**：錯，預設仍是 1（關閉），須手動設。\n- **「Redis 是 BSD／還在 7.x」**：過時（2026-06）。2024 起已改授權、現為 8.x 三授權；純 BSD 開源那條已由 Valkey 接手。\n- **把 Redis 當主資料庫**：它的複製非同步、持久化 best-effort、容量受記憶體限——可當真相來源但要清楚 durability 與一致性的代價，金流類資料通常仍以持久化 DB 為真相、Redis 為快取。\n- **`MULTI/EXEC` 當成可回滾交易**：Redis transaction 不回滾，`EXEC` 中某指令執行期錯誤不會撤銷前面已執行的指令；它保證的是「中間不被別的 client 插隊」，不是 ACID 的原子回滾。\n- **用單實例 Redis 鎖當分散式互斥的正確性保證**：failover／網路分區下可能兩個 client 同時持鎖，正確性需 fencing token（見領域 M）。\n\n### 延伸閱讀\n\n- Redis 官方文件（資料結構、persistence、eviction、client-side caching）：https://redis.io/docs/latest/\n- Redis 8 GA 公告（I/O threading 重寫、效能）：https://redis.io/blog/redis-8-ga/\n- Redis 授權頁（RSALv2 / SSPLv1 / AGPLv3 三授權）：https://redis.io/legal/licenses/\n- Valkey 專案（Linux Foundation、BSD fork）：https://valkey.io/\n\n## S3 / 物件儲存\n\n### 是什麼與內部機制\n\nS3（Amazon Simple Storage Service）是物件儲存：資料以**不可變的物件**（object＝bytes ＋ metadata ＋ key）存在扁平的 bucket 命名空間裡，透過 HTTP API（`PUT`/`GET`/`DELETE`/multipart upload）存取，**沒有檔案系統的目錄樹、沒有部分就地更新**——改一個物件＝整個重寫（覆蓋）。它不是掛載的磁碟，是經網路的 HTTP 端點，因此延遲是毫秒到數十毫秒級（非記憶體／本地磁碟的微秒級），但容量近乎無限、單位儲存成本極低。\n\n內部機制的核心是**冗餘換耐久**：物件被切片、加上 erasure coding，**跨單一 region 內至少 3 個可用區（AZ）冗餘存放**，設計耐久度達 **99.999999999%（11 個 9）**（2026-06）——直觀上，存 1,000 萬個物件平均約每一萬年才預期丟一個。一致性上，S3 現提供**強讀後寫一致性（strong read-after-write consistency）**：`PUT` 成功後立即 `GET` 必讀到新版本（早年的最終一致性已不再是限制）。\n\n大小：單一物件最大 **50 TB**（2025-12 由 5 TB 上調，2026-06）；單次 `PUT` 上限 **5 GB**，更大要用 **multipart upload**（每片 5 MB–5 GB，可平行上傳、斷點續傳，物件範圍 5 MB–50 TB）。\n\n### 在哪些系統扮演什麼角色\n\n- **大 payload offload（與訊息系統交接）**：訊息佇列有單則大小上限（如 SQS 單則 1 MiB，見領域 A），超過就把實際 payload 放 S3、訊息只帶一個 S3 物件鍵（claim-check 模式）。消費端拿到鍵再去 S3 取大物件——用一次額外往返換掉訊息系統的大小限制。\n- **服務間資料交接**：批次產物、報表、匯出檔、備份（如 RDB 快照）丟 S3，下游服務或排程任務按鍵取用，把「傳大檔」從同步請求路徑卸到物件儲存。\n- **靜態資源與媒體**：圖片、影片、前端打包產物存 S3、常配 CDN 邊緣快取。\n- **資料湖／log 落地（與本書邊界）**：log 採集（如 Fluent Bit `out_s3`）與資料湖把 S3 當底層儲存層；資料湖／倉本身的查詢與建模在本書範圍外。\n\n### 保證與限制\n\n- **保證**：11 個 9 耐久度（跨 ≥3 AZ）；強讀後寫一致性；物件不可變（版本化可保留歷史版本）；近乎無限容量。\n- **限制**：\n  - **延遲是網路 HTTP 級**：首位元組延遲毫秒到數十毫秒，不適合每請求高頻小讀寫（那是快取／DB 的活）。\n  - **無部分更新**：改一個 byte 也得重寫整個物件；不能像檔案系統 seek-and-write。\n  - **無交易、無跨物件原子**：每個物件操作各自獨立，沒有「同時原子更新兩個物件」。\n  - **list 操作較貴且非即時排序**：大量物件下 `LIST` 是分頁掃描，別當資料庫查詢用。\n  - **可用性 ≠ 耐久度**：11 個 9 是**耐久度**（資料不丟），可用度 SLA（能不能取到）是另一個較低的數字；耐久不等於永遠可讀。\n\nworked example（claim-check 省成本）：一個圖片處理管線每天傳 100 萬則任務訊息，每則平均帶一張 3 MB 原圖。若把原圖塞進訊息（超過 SQS 1 MiB 上限根本不行，假設用支援大訊息的系統），佇列要扛 100 萬 × 3 MB ＝ **約 3 TB/日**的訊息流量，且 broker 記憶體／儲存壓力巨大。改 claim-check：原圖 `PUT` 到 S3（3 TB/日 落在便宜的物件儲存），訊息只帶約 100 bytes 的 S3 鍵 ＋ metadata ＝ 佇列流量降到 100 萬 × 約 100 bytes ＝ **約 100 MB/日**，降約 3 萬倍。代價是消費端每則多一次 S3 `GET`（約 20–50 ms）與最終一致的清理責任（任務失敗的 S3 物件要有 lifecycle 規則回收）。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| S3 / 物件儲存 | 11 個 9 耐久、近乎無限、強讀後寫一致 | 大檔、不可變物件、備份、offload | HTTP 級延遲；無部分更新／跨物件原子 |\n| 區塊儲存（如 EBS） | 低延遲、可掛載、可隨機寫 | 需檔案系統語意、資料庫底層磁碟 | 單機掛載、容量有上限、隨 AZ／實例綁定 |\n| 網路檔案系統（如 EFS/NFS） | POSIX 檔案語意、多機共享 | 多機共享檔案、需目錄樹 | 比物件儲存貴、延遲較高、擴展性不如 S3 |\n| Redis / 記憶體快取 | 微秒級延遲 | 熱小資料、需極低延遲 | 容量受記憶體限、易失、貴；非大檔倉庫 |\n\n選擇準則：要存的是**大的、不常改的、要極高耐久的整塊資料** → S3；要**隨機就地更新、低延遲、檔案系統語意** → 區塊／檔案儲存；要**極低延遲的熱小資料** → 快取。把 S3 當高頻小 KV 讀寫用會被延遲與每請求成本懲罰。\n\n### 常見誤解與陷阱\n\n- **把 S3 當檔案系統**：它沒有目錄、沒有就地部分更新、`LIST` 不是廉價排序查詢。`a/b/c.txt` 裡的 `/` 只是鍵字串的一部分，不是真目錄。\n- **以為 11 個 9 = 永遠讀得到**：那是耐久度（資料極不可能丟），不等於可用度；region/AZ 事件期間仍可能短暫取不到。耐久 ≠ 可用。\n- **忽略最終一致以外的非原子性**：S3 物件讀後寫已是強一致，但「同時原子更新兩個物件」不存在；需要跨物件一致要在應用層自己處理。\n- **claim-check 漏清理**：把大 payload offload 到 S3 後，失敗或過期的物件若沒有 lifecycle 規則回收，會無聲累積成可觀成本。\n- **小檔海量塞 S3**：每個 `PUT`/`GET` 都是一次計費請求，幾百萬個微小物件的請求費與 list 成本可能遠超預期；海量小資料更適合打包或放 KV/DB。\n\n### 延伸閱讀\n\n- Amazon S3 FAQs（物件大小、耐久度、一致性）：https://aws.amazon.com/s3/faqs/\n- AWS 文件〈Multipart upload limits〉（5 MB–5 GB 分片、5 GB 單 PUT 上限）：https://docs.aws.amazon.com/AmazonS3/latest/userguide/qfacts.html\n- AWS what's-new〈Amazon S3 increases the maximum object size to 50 TB〉（2025-12）：https://aws.amazon.com/about-aws/whats-new/2025/12/amazon-s3-maximum-object-size-50-tb/\n"}, {"id": "L-data-sync", "file": "L-data-sync.md", "group": "Part 2 — 資料、一致性與儲存", "title": "L · 資料同步與整合", "md": "# L · 資料同步與整合\n\n這個領域回答的是：**同一份資料以多個副本、或以多種型態，散在不只一個地方時，怎麼讓它們保持一致——而當它們不一致時，怎麼發現、怎麼修。** 本檔含六個條目：資料同步總覽（full／incremental、push／pull、batch／streaming 的座標軸）、CDC 變更資料擷取、dual-write 問題與 outbox、衝突解決（LWW／版本向量／CRDT）、對帳 reconciliation、跨區與異質庫同步。它們共用同一條脊椎：你想要兩邊資料一致到什麼程度（即時／最終／可容忍多少漂移），你願意付什麼取捨（延遲、寫入放大、複雜度、一份真相 vs 多份各自演化）。與相鄰領域的邊界一句話：**一致性「模型」面（最終一致是什麼、補償怎麼算）屬領域 B；本檔只講「機制」面——怎麼把變更搬過去、衝突怎麼判、兩邊不一致怎麼比對與修**。交付機制（outbox 怎麼運作、saga 補償）由領域 A 深講，本檔從資料同步角度引用、不重講。\n\n## 資料同步總覽\n\n### 定義與原理\n\n資料同步要解的問題是：**一份資料的「來源版本」變了，怎麼讓「目的地版本」也跟著變，而且在可接受的時間內、用可接受的代價。** 「來源」與「目的地」可以是同一份資料的兩個副本（主庫→唯讀副本）、兩種儲存（DB→搜尋索引、DB→快取）、或兩個服務各自的私有庫。第一原理是：**同步永遠是「把『變更』從一端搬到另一端」**——差別只在你怎麼界定「變更」、什麼時候搬、搬多少。\n\n任何同步方案都落在三條正交的座標軸上，先把這三軸講清楚，後面的 CDC、outbox、對帳都只是這三軸的具體取值：\n\n- **full（全量）vs incremental（增量）**：每次搬「整份資料」還是只搬「上次同步後變動的部分」。全量簡單、無狀態、天生自我修復（每次都覆蓋成最新），但代價隨資料量線性成長；增量便宜、可即時，但要維護「上次同步到哪」的位置（watermark / cursor / log offset），且一旦這個位置算錯就會漏資料或重複。\n- **push（推）vs pull（拉）**：來源端主動把變更推給目的地，還是目的地週期性來問來源「有什麼新的」。push 延遲低、但來源要知道有哪些下游、下游掛了要處理重試與背壓（見領域 E）；pull 解耦（來源不必認識下游）、下游自己控節奏，但有輪詢延遲、且高頻輪詢會空轉打爆來源。\n- **batch（批次）vs streaming（串流）**：累積一批一起搬（每小時、每天一個 job），還是一筆變更發生就近即時搬一筆。batch 吞吐高、單位成本低、易重跑，但資料有「批次窗口」的陳舊度；streaming 新鮮度高，但要長期運行的管線、要處理亂序與背壓、運維面更重。\n\n這三軸可任意組合：「full + pull + batch」＝每晚把整張表 dump 一份匯出（最樸素的 ETL）；「incremental + push + streaming」＝CDC 把每筆變更即時推給下游（見 CDC 變更資料擷取）。沒有哪一組永遠對——選哪一組，取決於資料量、可容忍的陳舊度、以及來源端能不能可靠地告訴你「什麼變了」。\n\n### 解法空間\n\n把「怎麼界定變更、什麼時候搬」拆開，常見做法有：\n\n- **全量覆蓋（full snapshot replace）**：定期 dump 整份，目的地整批換掉。機制：不追蹤變更，用「覆蓋」換取「不必正確追蹤」。\n- **時間戳輪詢（timestamp / high-watermark polling）**：來源表有 `updated_at`，目的地記住上次同步的最大時間戳，每輪只拉 `updated_at > watermark` 的列。機制：用「修改時間」當增量游標。\n- **觸發器 / 應用層雙寫（trigger / app-level dual-write）**：在寫來源的同一條路徑上，順手把變更也寫一份給同步用（DB trigger 寫一張變更表、或應用程式同時寫兩處）。機制：在寫入點就分叉（dual-write 的一致性風險見 dual-write 問題與 outbox）。\n- **日誌型擷取（log-based CDC）**：直接讀資料庫的交易日誌（WAL／binlog），把每筆 commit 的 row-level 變更解析出來。機制：把「資料庫已經為了持久化而寫的 log」當成變更來源（見 CDC 變更資料擷取）。\n- **outbox / event-carried state transfer**：把「狀態變更」當事件寫進同一交易的 outbox 表，再可靠地投遞出去（見 dual-write 問題與 outbox）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 全量覆蓋 batch | 最終一定收斂到來源現值（每次覆蓋自我修復）；無「漏一筆」風險 | 資料量小、可容忍每日級陳舊、來源無可靠變更信號 | 成本隨資料量線性漲；覆蓋窗口內目的地是舊的；大表全量會壓垮來源與網路 |\n| 時間戳輪詢增量 | 只搬變動列，便宜；實作門檻低 | 來源有可信 `updated_at`、刪除可用軟刪除標記 | **抓不到硬刪除**（DELETE 不留痕）；同一秒多筆更新易漏；時鐘回撥或批次未提交會漏抓；watermark 邊界要用「≥ 且去重」防漏 |\n| 應用層雙寫 | 延遲低、即時 | 只有兩個目的地、且能接受偶發不一致 | 兩次寫非原子，中間崩潰就分叉（見 dual-write 問題與 outbox） |\n| log-based CDC streaming | 抓得到所有變更含硬刪除、不漏序、對來源負擔低 | 需即時、需完整變更（含 DELETE）、資料量大 | 要運維長運管線；綁資料庫日誌格式；初始全量快照＋切換到 log 的接縫要處理 |\n| outbox + 事件投遞 | 變更與事件同交易，至少一次投遞 | 跨服務、要把「狀態變更」當事件廣播 | 至少一次→下游要冪等（見領域 A） |\n\n一個帶數字的權衡：一張 **5,000 萬列、每列約 1 KB** 的使用者表（約 50 GB）要同步到搜尋索引。**全量**每次搬 50 GB，若每晚跑一次、網路有效 100 MB/s，光傳輸就約 **500 秒**，且這 50 GB 對來源是一次重讀；資料新鮮度＝最多 24 小時陳舊。**增量輪詢**若每天實際變動 **0.5%＝25 萬列**，只搬約 250 MB、約 2.5 秒，新鮮度可降到輪詢間隔（如 1 分鐘）——但代價是你必須正確處理硬刪除與同秒衝突，否則索引會慢慢長出「來源已刪、索引還在」的鬼資料。**這就是同步的核心取捨：全量用成本換正確性（不會漏），增量用正確性的風險換成本與新鮮度。**\n\n### 何時需要\n\n- **需要 streaming／incremental**：資料量大到全量搬不動、或業務要求秒級新鮮度（搜尋、即時報表、跨服務狀態廣播）。\n- **full batch 就夠、上 streaming 是 over-engineering**：資料量小（幾萬列）、下游能接受每日級陳舊、團隊沒有運維長運管線的人手。一個每晚重跑的全量 job 無狀態、好除錯、天生自我修復——別為了「即時」硬上 CDC 管線然後三個月後沒人會修。\n- **判準**：先問「能不能容忍 N 小時陳舊」與「來源有沒有可靠的變更信號」。能容忍且資料小→full batch；不能容忍或資料大→往 incremental／streaming 走，並接受要處理刪除、亂序、watermark 的複雜度。\n\n### 常見誤解與陷阱\n\n- **「增量一定比全量好」**：增量便宜，但把「漏一筆」的風險轉嫁給你的 watermark 邏輯。全量雖貴，但「每次覆蓋」這個性質讓它天生自我修復——很多團隊低估了「永遠不會悄悄漂移」的價值。\n- **用 `updated_at` 輪詢卻忘了刪除**：時間戳輪詢只看得到 INSERT／UPDATE，硬 DELETE 不留時間戳。目的地會累積「來源已不存在」的殭屍列，且這種漂移無聲無息。要嘛改軟刪除、要嘛改用 log-based CDC。\n- **watermark 用 `>` 而非 `>=`＋去重**：用嚴格大於，邊界那一秒的列可能在你讀取的瞬間還沒提交，下一輪又被跳過。安全做法是 `>=` 取重疊窗口、下游靠主鍵去重（見 對帳 reconciliation 與領域 A 的去重）。\n- **push 不管背壓**：來源端一有變更就猛推，下游消化不了就堆積、甚至拖垮來源。push 必須配有界佇列與背壓（見領域 E）。\n- **把同步當「設定一次就忘」**：任何 incremental 管線都會在某次崩潰／重啟／schema 變更後悄悄落後或分叉。**沒有對帳的同步＝沒有保證的同步**（見 對帳 reconciliation）。\n\n### 延伸閱讀\n\n- Martin Kleppmann, *Designing Data-Intensive Applications*, Ch. 5（Replication）— full/incremental 與 leader-follower 同步的系統性整理。\n- PostgreSQL 官方文件，Logical Replication：https://www.postgresql.org/docs/current/logical-replication.html\n- AWS Database Migration Service — full load + CDC 模式文件：https://docs.aws.amazon.com/dms/latest/userguide/CHAP_Task.CDC.html\n\n## CDC 變更資料擷取\n\n### 定義與原理\n\nCDC（Change Data Capture，變更資料擷取）要解的問題是：**怎麼可靠且即時地知道「資料庫裡哪一列、被改成了什麼」，而不必去輪詢整張表、也不漏掉任何變更（包含刪除）。** 第一原理很漂亮：**關聯式資料庫為了崩潰恢復，本來就把每一筆變更循序寫進交易日誌（PostgreSQL 的 WAL、MySQL 的 binlog）。這份 log 是事實上「所有變更的完整、有序、已提交的清單」**——CDC 做的就是把這份既有的 log 讀出來、解析成「INSERT/UPDATE/DELETE + 前後值」的串流，餵給下游。\n\n對比之下，「查詢型 CDC」（query-based，即上一條的時間戳輪詢）是用 `SELECT ... WHERE updated_at > X` 去問資料庫「什麼變了」。它能用，但有三個天生缺陷：抓不到硬刪除、抓不到同一輪內的中間狀態（一列被改三次只看到最後一次）、且輪詢本身有負擔。**log-based CDC 沒有這三個缺陷**，因為它讀的是「事實發生的順序」而非「現在的快照」。\n\n### 解法空間\n\n- **log-based（日誌型）**：讀 WAL／binlog 解析變更。PostgreSQL 透過 logical decoding，輸出外掛常見有 **pgoutput**（PG 10+ 內建、預設、無需額外安裝）、**wal2json**（JSON 格式）、**decoderbufs**（Protobuf）；MySQL 讀 row-format binlog（2026-06）。代表工具 **Debezium**（開源、跑在 Kafka Connect 上，最新穩定版約 3.5.x（2026-06）、持續維護）。機制：訂閱 replication slot／binlog，把 commit 串流化。\n- **query-based（查詢型 / 輪詢）**：靠 `updated_at` 游標輪詢（見 資料同步總覽）。機制：週期性 SELECT 增量列。\n- **trigger-based（觸發器型）**：在表上掛 AFTER INSERT/UPDATE/DELETE trigger，把變更寫進一張審計表，下游讀審計表。機制：在 DB 層攔截寫入。\n- **timestamp + tombstone**：輪詢 + 對刪除改用軟刪除（標 `deleted_at`）讓查詢型也抓得到刪除。機制：把刪除轉成可被輪詢看見的更新。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| log-based（Debezium 等） | 完整變更含硬刪除、嚴格保留 commit 順序、對來源負擔最低（讀 log 不掃表） | 即時、需完整變更串流、資料量大、要餵多個下游 | 需 replication slot（slot 未消費會讓 WAL 無限堆積、撐爆磁碟）；綁 DB 日誌格式；初始快照→log 切換的接縫；schema 變更要處理 |\n| query-based 輪詢 | 實作最簡、無需 DB 特權 | 小資料、可容忍輪詢延遲、無硬刪除 | 抓不到硬刪除與中間狀態；輪詢有負擔；同秒/邊界易漏 |\n| trigger-based | DB 層保證每筆寫入都被攔；可在 trigger 裡加工 | DB 不支援邏輯解碼、或需在擷取點做轉換 | trigger 拖慢每筆寫入（在交易關鍵路徑上）；trigger 邏輯難維護、易成隱形耦合 |\n| 軟刪除 + 輪詢 | 讓便宜的輪詢也能抓到刪除 | 已用輪詢、只缺刪除這一塊 | 軟刪除列堆積要定期清理；應用層全程要記得帶 `WHERE deleted_at IS NULL` |\n\n一個帶數字的場景：一張 **3,000 萬列**的訂單表要把變更同步到資料倉與搜尋索引兩個下游。用輪詢：每分鐘 `SELECT ... WHERE updated_at > X`，若索引非覆蓋、得掃描判斷，高峰每分鐘掃描成本可觀，且若一筆訂單在一分鐘內從 `pending→paid→shipped` 改三次，輪詢只會看到 `shipped`——中間兩個狀態對下游永遠不存在。用 log-based CDC：WAL 裡這三次 UPDATE 是三筆有序事件，下游拿到完整軌跡；對來源的額外負擔只是「多一個消費 replication slot 的連線」。**代價是那個 slot 必須一直被消費**——若 Debezium 掛了一天沒人發現，PostgreSQL 為了保留未消費的 WAL 會持續累積，磁碟可能在無預警下被填滿。這是 log-based CDC 最現實的運維陷阱。\n\n### 何時需要\n\n- **需要 log-based CDC**：要完整、有序、含刪除的變更串流；資料量大到不能輪詢掃表；要把同一份變更扇出給多個異質下游（搜尋、快取、資料倉、其他服務）。\n- **輪詢或 trigger 就夠**：資料量小、能容忍延遲、沒有硬刪除需求、或 DB／權限不允許開 replication slot。在受管雲端資料庫上，logical replication 權限有時要特別申請，這也是選型考量。\n- **過度工程警訊**：只有一個下游、且該下游能接受每日批次時，架一整套 Kafka + Debezium 是把運維複雜度提前付清卻沒對應收益。\n\n### 常見誤解與陷阱\n\n- **「CDC 給你 exactly-once」**：不會。CDC 串流本質是至少一次投遞——管線重啟、offset 重播都會讓同一筆變更出現兩次。下游必須冪等／去重（見領域 A）。\n- **忽略 replication slot 的反壓代價**：未被消費的 slot 會釘住 WAL／binlog 不讓回收，磁碟被悄悄填滿。CDC 消費端的存活與落後量是必須監控的一級指標。\n- **以為 CDC 會自動同步 schema**：CDC 搬的是資料變更，不是 DDL。來源加一欄、改型別，下游 schema 與消費邏輯要另外協調（協定相容見領域 A，DB 結構變更見領域 B）。\n- **把 CDC 事件當「業務事件」**：CDC 給的是「`orders` 表第 N 列的 `status` 從 A 變 B」這種資料層事件，不是「訂單已出貨」這種業務語意事件。把資料表結構直接洩漏成跨服務契約，會讓下游緊耦合到你的表結構；要業務語意該用 outbox 發明確事件（見 dual-write 問題與 outbox）。\n- **初始快照被忽略**：CDC 只給「從現在起」的變更，歷史資料要先做一次初始全量快照、再無縫接上 log 串流。這個接縫沒處理好會漏掉快照期間的變更。\n\n### 延伸閱讀\n\n- Debezium 官方文件（CDC 架構與 PostgreSQL/MySQL connector）：https://debezium.io/documentation/reference/stable/\n- PostgreSQL Logical Decoding 概念：https://www.postgresql.org/docs/current/logicaldecoding-explanation.html\n- Martin Kleppmann, “Using logs to build a solid data infrastructure”（log 作為變更來源的論述）：https://www.confluent.io/blog/using-logs-to-build-a-solid-data-infrastructure-or-why-dual-writes-are-a-bad-idea/\n\n## dual-write 問題與 outbox\n\n### 定義與原理\n\ndual-write（雙寫）問題是分散式系統最常見的隱性資料漏洞：**一個操作要「同時」更新兩個沒有共同交易邊界的系統——例如『寫資料庫』＋『發一則訊息到 broker』、或『寫主庫』＋『寫搜尋索引』——而這兩次寫入無法是原子的。** 第一原理很簡單也很殘酷：兩次獨立的網路/磁碟寫入之間，永遠存在一個「第一次成功、第二次還沒做」的時間窗，任何在這個窗內的崩潰都會讓兩端分叉。\n\n具體拆解失敗排列：先寫 DB 成功、再發訊息——若發訊息前行程崩潰，DB 變了但下游永遠收不到（漏事件）。反過來先發訊息、再寫 DB——若寫 DB 失敗但訊息已發出，下游收到一個「其實沒發生」的事件（幽靈事件）。加上重試又可能造成重複。**沒有任何「兩次寫入的順序」能消除這個窗**——這是 dual-write 的本質：你想要兩個系統原子一致，但你手上只有兩個各自獨立的交易。\n\n解法的核心洞見是：**把「兩次跨系統寫入」收斂成「一次本地交易」**。既然 DB 寫入本身是原子的，那就把「要通知下游的這件事」也寫進同一個 DB 交易裡——這就是 **outbox 模式**：在同一個本地交易內，既更新業務資料表、也往一張 `outbox` 表插一筆「待發送事件」。交易要嘛全成功（資料與事件都在），要嘛全回滾（兩者都沒有），分叉的窗被消滅。之後再由一個獨立的投遞器把 outbox 裡的事件可靠地搬到 broker。\n\n> outbox 的投遞機制、relay 怎麼讀 outbox、與 saga（choreography vs orchestration）的補償邏輯，由領域 A 深講（見 outbox / saga，領域 A）。本條目只從「資料同步／一致性」角度切入：**為什麼非用它不可、以及它換來什麼語意**。\n\n這裡值得獨立講的是 **event-carried state transfer（事件攜帶狀態傳遞）**：outbox 發出的事件，可以只攜帶「發生了什麼 + 主鍵」（event notification，下游要自己回來查狀態），也可以攜帶「這個實體的完整新狀態」（event-carried state transfer，下游不必回查、直接把狀態存成自己的本地副本）。後者讓下游服務能持有一份它需要的資料的本地複本、降低同步呼叫耦合——這正是資料同步的一種形態：**用事件流，把一個服務的狀態變更，持續同步成另一個服務的本地讀模型**（與 EDA／CQRS 的關係見領域 K）。\n\n### 解法空間\n\n- **outbox 表 + 投遞器**：業務寫入與「事件」同交易寫 outbox 表，獨立 relay 投遞。機制：用本地交易的原子性涵蓋「資料 + 待發事件」（見領域 A）。\n- **log-based CDC 當投遞器**：不另設投遞器，直接用 CDC 讀 outbox 表（或直接讀業務表）的變更當事件源。機制：把 outbox 投遞外包給日誌擷取（見 CDC 變更資料擷取）。\n- **listen-to-yourself / 事件先行**：先寫一筆事件（單一寫入），消費自己的事件去更新狀態。機制：把「狀態更新」也變成事件的下游，避免雙寫源頭。\n- **2PC（兩階段提交）**：用 XA／分散式交易讓兩個系統真原子。機制：協調者跨資源協調 prepare/commit（取捨見領域 M）。\n- **接受不一致 + 對帳**：明知會偶發分叉，靠週期性對帳偵測並修補（見 對帳 reconciliation）。機制：用事後修復替代事前原子。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| outbox 表 + relay | 資料與「待發事件」原子一致；事件至少一次投遞 | 寫 DB 同時要可靠通知下游／發事件的絕大多數場景 | 下游必須冪等（至少一次）；outbox 表要清理；多一個 relay 元件要運維（見領域 A） |\n| CDC 讀 outbox/業務表 | 同上，且省掉自寫 relay | 已有 CDC 管線 | 直接讀業務表會把表結構洩漏成契約，建議仍走 outbox 表發明確事件 |\n| 事件先行 / listen-to-yourself | 源頭只有一次寫入、無雙寫 | 系統可重塑成「狀態＝事件的投影」（event sourcing 取向） | 改變整個寫入模型、學習曲線陡（見領域 K） |\n| 2PC | 跨兩系統真原子提交 | 兩端都支援 XA 且需強一致、低頻 | 同步阻塞、協調者單點、效能差、broker 多半不支援；分散式系統普遍避用（見領域 M） |\n| 接受不一致 + 對帳 | 最終收斂（非即時） | 偶發分叉可容忍、有對帳兜底 | 不一致窗內下游是錯的；對帳本身要建（見 對帳 reconciliation） |\n\n一個帶數字的推演：一條每天處理 **100 萬筆**訂單的路徑，要「寫訂單 DB ＋ 發一則 `order.created` 給通知服務」。若用天真雙寫，假設「寫 DB 成功後、發訊息前崩潰」的機率僅 **0.01%**（萬分之一），每天仍有約 **100 筆**訂單資料存在、但通知永遠不發——這 100 個使用者下了單卻收不到任何確認。換成 outbox：訂單與 `order.created` 同交易落地，崩潰只會讓整筆回滾（使用者會看到下單失敗、重試即可），絕不會出現「單成立但事件遺失」。代價是 relay 採至少一次投遞，下游通知服務要用冪等鍵去重，否則少數訂單可能收到兩封通知——**這正是 outbox 的語意取捨：把『可能遺失』換成『可能重複』，而重複是可以靠冪等消化的、遺失不行。**\n\n### 何時需要\n\n- **需要 outbox**：任何「寫本地 DB 且必須可靠地讓外部知道」的場景——發領域事件、同步到另一服務、餵搜尋索引/快取且不容遺失。這幾乎是事件驅動架構的預設地基。\n- **不需要、是 over-engineering**：操作只動單一系統（沒有第二個寫入端）；或下游遺失可容忍且本就有全量對帳兜底（如純分析用、隔天重算）。為一個無關緊要的旁路事件架 outbox + relay 是過度設計。\n- **判準**：問「第二次寫入若靜默失敗，會不會造成使用者可見的、不可接受的不一致？」會→outbox；不會→可接受裸雙寫 + 對帳。\n\n### 常見誤解與陷阱\n\n- **「先寫 DB 再發訊息就安全了」**：順序不能消除窗。任何「兩次獨立寫入」的排列都有崩潰點，差別只在分叉方向（漏 vs 幽靈）。\n- **「outbox 給 exactly-once」**：outbox 給的是「資料與待發事件原子一致」＋「至少一次投遞」。下游仍會看到重複，仍需冪等（見領域 A）。\n- **把 broker 的 publish ack 當交易保證**：訊息成功送進 broker，不代表它和你的 DB 寫入是原子的——publish 成功而 DB 交易最後回滾，就製造了幽靈事件。原子性只能靠「同一個本地交易」取得，不是靠 broker 的 ack。\n- **直接拿業務表做 CDC 當事件源**：能動，但把資料表結構變成跨服務契約，下游就緊耦合到你的 schema，你連改個欄位名都會打到別人。要長期穩定的契約，發明確的 outbox 事件、而非洩漏表結構。\n- **忘了 outbox 表會無限長**：投遞成功的列要定期清理／分區輪替，否則 outbox 表自己變成效能問題。\n\n### 延伸閱讀\n\n- Chris Richardson, microservices.io — Transactional Outbox 模式：https://microservices.io/patterns/data/transactional-outbox.html\n- Martin Fowler — Event-Driven Architecture（含 event notification vs event-carried state transfer）：https://martinfowler.com/articles/201701-event-driven.html\n- Debezium 部落格 — Outbox Event Router：https://debezium.io/documentation/reference/stable/transformations/outbox-event-router.html\n\n## 衝突解決\n\n### 定義與原理\n\n當同一份資料允許在多個地方各自被獨立更新（多主複製、離線編輯後再同步、跨區雙寫），就會出現**衝突**：兩個更新並發地（concurrent，互相沒看到對方）改了同一個值，同步到一起時系統得決定「最後算誰的」。衝突解決要解的就是這個問題——**而且要解到讓所有副本最終收斂到同一個確定結果，不論訊息以什麼順序、重複幾次到達。**\n\n第一原理是區分「並發」與「有因果順序」。若更新 B 是在「看到了 A 之後」才做的，那 B 因果上晚於 A，沒有衝突——B 該贏。真正的衝突只發生在兩個更新**並發**（誰都沒看到誰）時。能不能正確判斷「並發 vs 因果先後」，是衝突解決品質的分水嶺：**只看牆鐘時間戳的方案無法區分這兩者**（時間戳大不代表因果上更晚），而版本向量/向量時鐘能精確判斷。收斂的數學保證最強的一端是 **CRDT**——它把資料結構設計成「合併操作天生滿足交換律、結合律、冪等」，於是不論順序、不論重複，所有副本必然收斂（Strong Eventual Consistency，強最終一致）。\n\n### 解法空間\n\n- **LWW（Last-Write-Wins，最後寫入者贏）**：給每個寫入一個時間戳，衝突時保留時間戳較大的。機制：用一個全序（通常是牆鐘）強行打破平手。Cassandra 預設即 LWW，以 microsecond 時間戳逐 cell 比較（2026-06）。\n- **版本向量 / 向量時鐘（version vector / vector clock）**：每個副本維護一組 `{副本→計數}`，寫入時遞增自己的計數。比較兩個向量可精確判定「A 因果先於 B」「B 先於 A」還是「並發」。並發時不自動丟棄，而是保留多個版本（sibling）交給應用層或使用者解決。Dynamo（2007）用版本向量；其改良 **DVV（Dotted Version Vectors）** 避免 false conflict，用於 Riak（2026-06）。機制：追蹤因果，把真衝突暴露出來而非掩蓋。\n- **CRDT（Conflict-free Replicated Data Type，無衝突複製資料型別）**：把資料設計成合併必然收斂的型別（計數器、集合、序列…）。由 Shapiro、Preguiça、Baquero、Zawirski 於 **2011** 形式化。機制：靠代數性質保證收斂，無需中央協調。\n- **應用層合併（application-defined merge）**：把並發版本交給領域邏輯自訂合併（如購物車取聯集、餘額取相加）。機制：用業務語意決定怎麼合。\n- **單主排序（avoid by single-writer）**：根本不讓並發發生——所有寫某個 key 的請求路由到單一主（見領域 M 的複製策略）。機制：用「不產生衝突」取代「解決衝突」。\n\nCRDT 內部又分兩大流派，收斂語意不同：\n\n- **state-based（CvRDT，convergent）**：副本間交換「整個狀態」，用一個 **merge** 函式合併。merge 必須是 **交換律、結合律、冪等**的「join」，狀態落在一個 **join-semilattice（聯結半格）** 上、且更新只會讓狀態單調「往上」走。因為 merge 冪等且可交換，訊息重複、亂序、重送都不影響最終結果——這讓它對不可靠網路（甚至 gossip／anti-entropy，見領域 M）極其寬容。代價是傳整個狀態較重（有 delta-CRDT 等優化）。\n- **op-based（CmRDT，commutative）**：副本間只傳「操作」（如「+3」「加入元素 x」），每個副本重放收到的操作。要求並發操作**兩兩可交換**，但通常**要求投遞層保證每個操作恰好被送達一次、且滿足因果順序**（exactly-once、causal delivery）。傳輸量小，但對投遞通道的要求比 state-based 嚴。\n\n一句話對照：**state-based 把「正確性」放進 merge 函式（半格＋冪等），對通道幾乎無要求；op-based 把一部分正確性外包給投遞層（恰好一次＋因果序），換取更小的傳輸量。**\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| LWW（時間戳） | 確定收斂到「時間戳最大」者；實作最簡、無 sibling | 衝突罕見、丟掉並發的另一筆可接受（如 last-seen、設定旗標） | **靠牆鐘 → 時鐘偏移會讓「較晚的真實寫入」被較早的覆蓋＝靜默 lost update**；無法表達「兩筆都該保留」 |\n| 版本向量 / 向量時鐘 | 精確區分並發 vs 因果先後；不靜默丟資料 | 需要正確判斷因果、願意讓應用層解 sibling（購物車類） | 向量大小隨副本數成長；sibling 解決邏輯要寫；客戶端要回傳 context |\n| CRDT | 強最終一致：不論順序/重複必收斂、無需協調 | 多主/離線協作/計數器/集合/協同編輯 | 型別受限（要能塑成 CRDT）；某些語意（如「全域唯一約束」「餘額不可為負」）天生塞不進 CRDT；metadata 開銷 |\n| 應用層合併 | 用業務語意得到「對的」合併結果 | 合併規則有明確領域意義時 | 要為每種資料寫合併邏輯；寫錯就靜默產生錯資料 |\n| 單主排序避免衝突 | 根本不產生衝突，語意最簡單 | 能接受單主的可用性/延遲代價（跨區尤其） | 主故障要 failover；跨區寫要繞到主、延遲高（見領域 M） |\n\n一個帶數字的 LWW 陷阱：兩個應用節點對同一個 key 寫入，節點 A 的時鐘比節點 B **快 50 ms**。使用者先在 B 寫了正確的新值（真實時間 `t`，但 B 打的時間戳是 `t`），50 ms 後在 A 寫了一個其實該被新值取代的舊操作（真實時間 `t+50ms`，A 打的時間戳卻是 `t+100ms`，因為 A 快）。LWW 比時間戳：`t+100ms > t`，於是 A 那筆「真實上較舊、但時間戳較大」的寫入贏了——**使用者剛存的正確值被靜默覆蓋成舊的，沒有任何錯誤、沒有任何日誌**。這就是為什麼「LWW + 牆鐘」在有並發寫的系統裡是個有牙的陷阱：它總會收斂，但可能收斂到錯的值。版本向量在這裡會判定兩者並發、保留 sibling，把「該保留誰」的決定權交還給應用而非交給不可靠的時鐘。\n\n### 何時需要\n\n- **需要顯式衝突解決**：採用多主／無主複製、或支援離線編輯後再同步、或跨區雙寫。只要「同一 key 能在多處並發被改」，就得選一種衝突策略。\n- **不需要**：單主架構（所有寫某 key 都到同一主、由主定序）——這時根本沒有並發衝突要解，別為不存在的問題引入 CRDT 的複雜度。\n- **選 LWW vs 版本向量 vs CRDT 的判準**：丟掉並發另一筆可接受且衝突罕見→LWW（最簡）；不能靜默丟資料、且能讓應用解 sibling→版本向量；要無人工介入的自動收斂、且資料能塑成 CRDT 型別→CRDT；有強約束（唯一、非負）塞不進 CRDT→退回單主排序。\n\n### 常見誤解與陷阱\n\n- **「LWW 安全因為它總能決出贏家」**：它總有贏家，但贏家可能是錯的。LWW 的「最後」是**時間戳的最後**，不是**真實因果的最後**；牆鐘偏移會讓它靜默丟掉本該保留的寫入。\n- **以為向量時鐘自動解衝突**：版本向量只負責**偵測**衝突（判定並發），不負責**解決**。並發時它給你多個 sibling，怎麼合還是要 LWW／應用邏輯／使用者選——它的價值是「不靜默丟、把衝突誠實暴露」。\n- **以為 CRDT 萬用**：CRDT 對「能塑成半格／可交換操作」的資料才成立。需要全域不變量（庫存不可超賣、餘額不可為負、用戶名全域唯一）的場景，CRDT 天生做不到——那類約束需要協調（共識／單主，見領域 M）。\n- **混淆 state-based 與 op-based 的通道要求**：把 op-based CRDT 接到一個會重複投遞的通道上、卻沒保證恰好一次與因果序，會破壞收斂。state-based 對通道寬容（冪等 merge），op-based 不寬容——選錯流派配錯通道是隱性 bug。\n- **把因果順序和接收順序搞混**：訊息「先到」不代表它因果上更早。衝突解決的正確性建立在因果關係上，不是 socket 的到達順序上。\n\n### 延伸閱讀\n\n- M. Shapiro, N. Preguiça, C. Baquero, M. Zawirski, “Conflict-free Replicated Data Types”（2011，CRDT 原始形式化）：https://hal.inria.fr/inria-00609399/document\n- DeCandia et al., “Dynamo: Amazon’s Highly Available Key-value Store”（2007，版本向量實作）：https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf\n- “Dotted Version Vectors: Logical Clocks for Optimistic Replication”（DVV，避免 false conflict）：https://arxiv.org/abs/1011.5808\n\n## 對帳 reconciliation\n\n### 定義與原理\n\n對帳要解的問題是：**你有兩份本該一致的資料（主庫 vs 副本、DB vs 搜尋索引、你的帳 vs 對方的帳、來源 vs 同步出去的目的地），怎麼系統性地確認它們真的一致——而當它們不一致時，怎麼定位差在哪、怎麼把漂移修回去。** 第一原理是一句殘酷的事實：**任何長期運行的同步管線，最終都會漂移。** 崩潰、重啟、漏處理一則訊息、bug、手動改庫、schema 變更接縫——每一個都會在兩端之間留下一點差。**沒有對帳的同步，等於沒有保證的同步**：你以為一致，但沒有任何機制能告訴你何時不再一致。對帳就是這個「持續驗證 + 主動修復」的機制。\n\n> 一致性「模型」面（最終一致是什麼、補償交易的語意）屬領域 B；本條目是**本書對帳機制的 owning 條目**，只講機制：**怎麼比對兩邊、怎麼定位差異、怎麼把漂移修回去**。\n\n### 解法空間\n\n對帳的核心是「用最少的比對成本找出兩邊的差」，做法按「比多細」與「比多省」排開：\n\n- **全量逐筆比對（full row-by-row）**：兩邊各拉出來，逐主鍵比每個欄位。機制：最徹底、找得到一切差，但成本＝資料量。\n- **整體 checksum / 計數比對**：先比「兩邊總列數」「某欄位的總和（金額類）」「整批的 hash」。機制：用聚合值快速判斷「有沒有差」，但不告訴你差在哪。\n- **分段 checksum（chunked / bucketed hash）**：把 key 空間切成 N 段，每段算一個 hash，只比 hash；只有 hash 不同的段才往下鑽。機制：用分治把比對成本從「資料量」降到「差異量」。\n- **Merkle tree（雜湊樹）**：把分段 checksum 做成樹——葉子是各段 hash，內部節點是子節點 hash 的 hash。先比 root hash，相同就整棵一致；不同就只往 hash 相異的子樹下鑽。機制：交換的資訊量正比於「差異量」而非「資料量」，Cassandra/DynamoDB 的 anti-entropy 即用此（2026-06）。\n- **以 log/事件重放驗證**：拿來源的變更 log 重放一遍，比對目的地是否吻合。機制：用事實序列當基準。\n\n找到差之後的**修復**做法：\n\n- **以來源為準覆蓋（source-of-truth wins）**：認定一邊是真相，把另一邊差異列覆蓋成來源值。最常見、最簡單。\n- **重放缺漏變更（replay）**：把目的地漏掉的那幾筆從來源重新投遞（需來源可重放，如 CDC offset 回播）。\n- **產差異報表給人工裁決（金融類）**：金額對不上時不自動覆蓋，產出 break list 交人工查清原因再修。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 全量逐筆比對 | 找得到所有欄位級差異，最徹底 | 資料量小、或週期性深度稽核、金額/合規 | 成本＝資料量；對線上庫是重讀，要排離峰或讀副本；兩邊「同一瞬間快照」難對齊（移動目標問題） |\n| 整體 checksum / count | 極快判斷「有沒有差」 | 第一道哨兵、高頻輕量健檢 | 只說有沒有差、不說差在哪；hash 碰撞理論上可能（用強 hash 可忽略） |\n| 分段 / Merkle tree | 比對成本正比於差異量、不正比資料量 | 大資料集要定期對帳、anti-entropy | 兩邊分段邊界與排序要一致；資料持續變動時 hash 是移動目標，要對齊快照點 |\n| log 重放驗證 | 以事實序列為基準、可定位漏哪筆 | 有完整變更 log（CDC/event sourcing） | 需 log 可保留夠久、可回放 |\n| 以來源為準覆蓋修復 | 修復後必收斂到來源 | 來源明確是唯一真相 | 會無條件蓋掉目的地的本地修正；若「目的地才是對的」就蓋錯方向 |\n| 人工裁決差異報表 | 不盲目覆蓋、保留稽核軌跡 | 金額/合規/雙方各有帳本 | 慢、要人力；只適合 break 量可控 |\n\n一個帶數字的場景：對帳一張主庫與唯讀副本各 **1,000 萬列**的表。**全量逐筆**要把雙邊各 1,000 萬列拉出比對，I/O 與記憶體都重，且在拉取的幾分鐘內資料還在變（移動目標）。改用 **Merkle tree**：把 key 空間切成譬如 1,024 段，雙邊各算 1,024 個段 hash（外加上層樹節點）。若實際只有 **3 段**裡共 **50 列**不一致，root hash 一比就知「有差」，往下鑽兩三層 hash 後鎖定那 3 段，最後只需逐筆比對那 3 段（約 3 萬列）就能定位出 50 筆差異列——**比對與傳輸的工作量正比於『差異所在的少數段』，而非 2,000 萬列總量**。代價是雙邊的分段邊界、排序規則、快照時間點必須對齊，否則 hash 會因「比的不是同一瞬間的同一批列」而全段不符，反而退化成全量。\n\n### 何時需要\n\n- **必須有對帳**：任何長運的 incremental／streaming 同步（CDC、雙寫、多主）、任何「兩個系統各記一份本該相等的帳」的場景（金額尤其——對不上是事故）。把對帳當同步管線的標配，不是可選加值。\n- **可省略或極輕量**：full-overwrite 同步本身每次覆蓋＝自帶對帳（不會漂移）；或資料無關緊要、不一致無後果。\n- **頻率判準**：金額類→每日強對帳 + 即時聚合哨兵；一般資料→定期 Merkle 對帳 + 持續的計數/checksum 哨兵。漂移的代價越高、對帳越頻繁越細。\n\n### 常見誤解與陷阱\n\n- **「同步管線沒報錯就代表一致」**：最危險的假設。漏一則訊息、消費端靜默重啟、一個 bug——都不會「報錯」，只會留下無聲的漂移。一致是要被**主動驗證**的，不是「沒出錯就有」。\n- **比對「移動目標」**：線上資料在你拉取兩邊的過程中還在變，逐筆比會冒出一堆「假差異」（其實只是時間差）。對帳要對齊快照點（同一個一致性快照、或容許一個 grace window 把「正在途中的變更」排除）。\n- **找到差就無腦以來源覆蓋**：若差異的成因是「目的地有一段本地修正」或「來源自己有 bug」，盲目以來源覆蓋會把對的蓋成錯的。修復前要先理解差異的**方向與成因**，金額類尤其要人工確認再修。\n- **只比計數不比內容**：兩邊列數相同不代表內容相同（一邊多一筆 X、少一筆 Y，計數仍相等）。計數/總和是便宜哨兵，不能取代欄位級或 hash 級比對。\n- **對帳本身沒有可觀測性**：對帳跑了沒、找到幾筆差、修了幾筆、還剩幾筆——這些必須是有告警的指標。一個「悄悄掛掉三週沒人發現」的對帳 job，比沒有對帳更危險（給了虛假的安心感）。\n\n### 延伸閱讀\n\n- Amazon Dynamo 論文（anti-entropy 用 Merkle tree 修副本差異的原始描述）：https://www.allthingsdistributed.com/files/amazon-dynamo-sosp2007.pdf\n- Apache Cassandra 文件 — Repair / anti-entropy：https://cassandra.apache.org/doc/latest/cassandra/managing/operating/repair.html\n- Merkle, R. C., “A Digital Signature Based on a Conventional Encryption Function”（1987，雜湊樹原始概念）：https://link.springer.com/chapter/10.1007/3-540-48184-2_32\n\n## 跨區與異質庫同步\n\n### 定義與原理\n\n這個條目把前面所有機制放進兩個最硬的現實約束：**(1) 跨地理區域（multi-region）——副本之間隔著幾十到上百毫秒的網路、且分區隨時可能發生；(2) 異質庫（heterogeneous）——來源與目的地是不同的資料庫（PostgreSQL ↔ MySQL、關聯式 ↔ 文件庫、OLTP ↔ 資料倉），型別系統、交易語意、甚至「一列長什麼樣」都不同。** 要解的問題是：在這兩個約束下，怎麼把資料同步過去、且想清楚你實際拿到的是什麼一致性。\n\n第一原理是兩條物理／工程的不可繞過：**跨區的光速延遲是物理常數**（東京↔維吉尼亞往返就是上百毫秒，不是調參能消的），所以「跨區強同步寫」必然慢；而 **CAP 在跨區分區時逼你二選一**（分區期間要嘛拒寫保一致、要嘛放行寫接受分叉，理論面見領域 B）。異質庫則是「**沒有共同的交易、沒有共同的型別語意**」——你不能用一個 DB 交易跨兩個不同的庫，型別與 NULL／時間／精度語意還會在轉換中悄悄走樣。\n\n### 解法空間\n\n**跨區（multi-region）：**\n\n- **單主跨區（single-leader, async replica in other regions）**：一個區當主、其他區是非同步唯讀副本。機制：寫都回主、讀可就近，跨區只承擔複製延遲。\n- **多主跨區（multi-leader, active-active）**：每區都能寫，跨區非同步互相複製、靠衝突解決收斂。機制：用本地寫低延遲換「必然有並發衝突」（見 衝突解決）。\n- **同步複製 / quorum 跨區**：寫要等跨區多數確認（如 R+W>N）。機制：用延遲換強一致（見領域 M 的 quorum、共識）。\n\n**異質庫（heterogeneous）：**\n\n- **CDC + 型別映射管線**：用 log-based CDC 從來源擷取變更，經一個轉換層做型別/編碼映射，寫入異質目的地。機制：把「變更」標準化成中介格式再落地（見 CDC 變更資料擷取）。\n- **ETL / ELT 批次**：定期全量或增量抽取、轉換、載入。機制：批次 + 顯式轉換腳本。\n- **雙寫到兩種庫**：應用層同時寫兩種庫（有 dual-write 風險，見 dual-write 問題與 outbox）。\n\n注意：PostgreSQL 內建的 logical replication 是**同構**（PG→PG）方案，且**不複製 DDL／schema**（建表與後續 ALTER 都要兩端手動同步，2026-06）；要 PG↔MySQL 這種異質，得靠 Debezium 等 CDC 或專用遷移工具（如 AWS DMS）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單主跨區 + 非同步副本 | 寫線性化於主；讀就近（但可能讀到舊值） | 讀多寫少、可接受跨區寫延遲、要單一真相 | 副本有複製延遲（讀己之寫問題，見領域 B）；主所在區故障要 failover、可能丟尚未複製的尾端寫入 |\n| 多主 active-active | 本地寫低延遲、區故障仍可寫 | 各區要低延遲寫、能設計出可收斂的衝突策略 | **必然有並發衝突**，要選 LWW/版本向量/CRDT（見 衝突解決）；有強約束（唯一/非負）的資料不適合 |\n| 跨區 quorum / 同步 | 跨區強一致 | 不容分叉的關鍵資料（少量、可付延遲） | 每次寫付跨區 RTT；分區時犧牲可用性（見領域 M） |\n| CDC + 型別映射 | 即時、含刪除、解耦異質兩端 | PG↔MySQL、DB→資料倉/索引 | 型別/編碼/NULL/時間精度映射要顯式定義且測試；schema 變更要管 |\n| ETL/ELT 批次 | 簡單、可重跑、轉換邏輯集中 | 可容忍批次陳舊、分析用 | 非即時；增量 ETL 仍有 watermark/刪除問題（見 資料同步總覽） |\n\n一個帶數字的跨區推演：主在維吉尼亞（us-east），副本在東京（ap-northeast），跨區往返網路延遲約 **150 ms**（單程約 75 ms）。若採**單主非同步副本**，東京的使用者讀就近副本只需本地往返（幾 ms），但寫必須回到維吉尼亞主——一次寫的網路成本就是約 **150 ms RTT**，且東京副本落後主一個「複製延遲」（健康時數十至數百 ms，網路抖動時可達秒級），所以東京使用者「剛寫完、立刻讀東京副本」可能讀不到自己剛寫的（讀己之寫，見領域 B）。若改採**跨區 quorum 同步寫**（N=3 分三區、W=2），每次寫要等至少一個遠端區確認，寫延遲被釘在「最近的那個遠端區 RTT」量級——強一致拿到了，但每筆寫都付這個延遲。**這就是跨區的鐵律：你能買到低延遲讀、或低延遲寫、或強一致，但跨上百毫秒的距離，三者很難同時要。**\n\n一個異質庫的隱性坑（帶具體值）：把 MySQL 的 `DATETIME`（無時區、秒或微秒精度）同步到 PostgreSQL 的 `timestamptz`（帶時區）。若轉換層沒顯式指定來源時區，一個存成 `2026-06-21 09:00:00` 的 MySQL 值，可能被當成 UTC、也可能被當成伺服器本地時區寫進 PG——同一筆資料在兩庫表示的「絕對時刻」差了好幾個小時，且這種錯**不會報錯**，只會在報表/排序時悄悄錯位（時間語意坑見領域 M）。異質同步的轉換層必須對型別/時區/編碼/NULL 語意逐一顯式定義並測試。\n\n### 何時需要\n\n- **需要 multi-region**：使用者分佈在多大洲要低延遲、或要區級容災（單區故障仍可服務）、或資料落地合規要求資料留在特定區。\n- **需要異質同步**：OLTP 庫要餵分析倉/搜尋/快取；遷移期新舊庫並行（見領域 B 的零停機遷移）；不同服務選了不同最適儲存但要共享資料。\n- **過度工程警訊**：使用者都在單一區、無容災硬需求時，硬上 active-active multi-region 是把「並發衝突 + 跨區運維」的巨大複雜度提前付清卻沒收益——單區 + 跨區唯讀副本（純災備）通常已足夠。\n- **判準**：跨區先問「能不能單主就好（讀多寫少）」，能就別碰多主；異質先問「能不能就用 CDC + 明確映射」，別輕易裸雙寫到兩種庫。\n\n### 常見誤解與陷阱\n\n- **「加個跨區副本就有多區高可用」**：非同步副本只是災備，不是 active-active。主區掛了要 failover、且可能丟掉尚未複製的尾端寫入；把「有副本」當成「能無縫接管」是常見誤判。\n- **低估跨區延遲是物理常數**：上百毫秒的跨洲 RTT 不是調 TCP 參數或加機器能消的。任何「每個請求都要跨區同步往返一次」的設計，延遲天花板就被釘死在那個 RTT。\n- **異質同步只搬資料、不搬語意**：型別、時區、NULL、字元編碼、數值精度、自增主鍵語意在兩庫間都可能不同。「值搬過去了」不代表「意思一樣」——時區與精度走樣是最常見的靜默資料損壞。\n- **以為 PG 邏輯複製能同步 schema**：PostgreSQL logical replication 不複製 DDL，加欄位/改型別要兩端手動同步、且通常要在訂閱端先加（additive 先行）才不會卡住複製（2026-06）。把它當「全自動同步含結構」會在第一次 schema 變更就出事。\n- **多主卻沒想清楚衝突**：開了 active-active 卻沒顯式選衝突策略，等於把「最後算誰的」交給預設 LWW + 牆鐘——於是悄悄 lost update（見 衝突解決）。多主的第一個設計問題永遠是「衝突怎麼收斂」，不是「怎麼把資料複製過去」。\n\n### 延伸閱讀\n\n- PostgreSQL 官方文件 — Logical Replication Restrictions（明列不複製 DDL 等限制）：https://www.postgresql.org/docs/current/logical-replication-restrictions.html\n- AWS — Multi-Region application architecture / 跨區複製設計考量：https://docs.aws.amazon.com/whitepapers/latest/aws-multi-region-fundamentals/aws-multi-region-fundamentals.html\n- Debezium 文件（log-based CDC 作為異質庫同步來源）：https://debezium.io/documentation/reference/stable/\n"}, {"id": "N-network-protocols", "file": "N-network-protocols.md", "group": "Part 3 — 連線、網路與 API", "title": "N · 網路與協定", "md": "# N · 網路與協定\n\n本領域處理的問題是：兩個行程要在不可靠的網路上互相呼叫，要付出什麼代價、換到什麼保證。本檔含七個條目：HTTP 的三個世代（連線重用／多工／QUIC）、gRPC 怎麼拿 Protobuf 當 IDL、連線池、L4/L7 負載均衡、TLS/mTLS、DNS 與服務發現、service mesh。邊界：傳輸層之上的 API 設計（REST/版本化/分頁）在領域 H、即時雙向推送（WebSocket/SSE/WebRTC）在領域 C；本檔只管「位元組怎麼從 A 到 B、連線怎麼建立與分配」這一層。\n\n## HTTP/1.1 · 2 · 3（keep-alive / 多工 / QUIC）\n\n### 定義與原理\n\nHTTP 是請求-回應的應用層協定。三個世代解的是同一件事的不同層次：**怎麼在一條（或多條）底層連線上塞進多個請求，而不讓彼此互相卡住**。\n\n- **HTTP/1.1**（RFC 9112，原 RFC 2616/7230）引入 **keep-alive**（persistent connection）：一條 TCP 連線連續送多個請求，省掉每次重建連線的三向交握。但同一條連線上請求是**嚴格序列化**的——前一個回應沒回完，下一個請求不能發（pipelining 規格上允許但實務上幾乎沒人開，因為 server 仍須照順序回應，反而引入隊頭阻塞）。\n- **HTTP/2**（RFC 9113，原 RFC 7540）引入**多工（multiplexing）**：一條 TCP 連線上開多個獨立編號的 **stream**，多個請求/回應的 frame 交錯傳輸，互不等待。解決了 HTTP/1.1 的應用層隊頭阻塞，也帶來 header 壓縮（HPACK）與 server push（後者已被主流廢棄）。\n- **HTTP/3**（RFC 9114，2022-06 成為 Proposed Standard）把傳輸從 TCP 換成 **QUIC**（RFC 9000，2021-05），QUIC 跑在 UDP 上、自帶多工與加密。\n\n關鍵第一原理是**隊頭阻塞（head-of-line blocking）發生在哪一層**：HTTP/1.1 是**應用層**隊頭阻塞；HTTP/2 消除了應用層的，但因為所有 stream 仍共用一條 TCP 連線，**一個 TCP 封包遺失會卡住該連線上所有 stream**（TCP 不知道 stream 的存在，把所有東西當一條 byte stream，遺失重傳期間後面全等）——這是**傳輸層**隊頭阻塞。HTTP/3 用 QUIC 的**每 stream 獨立遺失復原**徹底解掉它：丟包只影響該 stream（2026-06）。\n\n### 解法空間\n\n選哪個世代，本質是在四個維度上取捨：\n\n- **連線重用**：1.1 keep-alive 已能省交握；2/3 在此之上再共用單一連線。\n- **多工**：1.1 靠「開多條並行連線」（瀏覽器慣例每 host 約 6 條）模擬並行；2/3 靠單連線多 stream。\n- **隊頭阻塞層級**：1.1 應用層／2 傳輸層（TCP）／3 無傳輸層隊頭阻塞。\n- **連線建立成本**：TCP+TLS 1.3 新連線需 2-RTT（TCP 1-RTT＋TLS 1.3 交握 1-RTT）；QUIC 把傳輸與加密交握合併成新連線 **1-RTT**、復用連線 **0-RTT**（有重放風險，須謹慎）。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| HTTP/1.1 + keep-alive | 連線重用、無多工、應用層隊頭阻塞 | 簡單 REST、debug 友善（純文字）、proxy 相容性最高 | 高並行下被迫開多條連線；每連線只能一個 in-flight 請求 |\n| HTTP/2 | 單連線多工、header 壓縮 | 同 host 大量小請求（API/微服務）、行動端省連線 | TCP 層隊頭阻塞在高丟包網路仍痛；單連線可能被中間設備拆 |\n| HTTP/3 (QUIC) | 無傳輸層隊頭阻塞、連線遷移（換網不斷線）、0-RTT 復用 | 行動/高丟包/跨國高延遲、CDN 邊緣 | 跑 UDP，部分企業防火牆封 UDP/443；CPU 成本較高（加密在使用者態） |\n\n### 何時需要\n\n- **內部服務對服務、低丟包資料中心網路**：HTTP/2 的多工就夠，HTTP/3 的傳輸層好處幾乎用不到，反而吃 CPU。gRPC 預設跑 HTTP/2 正是這個原因（見 gRPC / Protobuf）。\n- **面向公網、行動端、跨國、丟包率高**：HTTP/3 的每 stream 獨立復原與連線遷移有實質價值。CDN 通常已替你開好。\n- **純後台批次、debug 工具、低頻呼叫**：HTTP/1.1 最省心，別為了「新」而上 2/3。\n\n**Worked example**：一個頁面要抓 30 個小資源、RTT 100ms。HTTP/1.1 限每 host 6 條並行連線，30 個資源分 5 批、最少 5×100ms=**500ms** 才發完（未計回應）。HTTP/2 單連線 30 個 stream 一次全發出，**約 1 個 RTT（100ms）** 就全部 in-flight。但若這條 TCP 連線在傳輸中掉了 1 個封包、重傳需 1 個 RTT，HTTP/2 下這 100ms 內**全部 30 個 stream 都停**；HTTP/3 下只有踩到那個封包的 stream 停，其餘照走。\n\n### 常見誤解與陷阱\n\n- **「HTTP/2 多工就沒有隊頭阻塞了」**——只消了應用層的，TCP 層的還在，高丟包網路（行動/跨國）才見真章。\n- **「HTTP/3 一定比 HTTP/2 快」**——資料中心內低丟包環境，HTTP/3 的傳輸優勢趨近於零，加密在使用者態反而較耗 CPU；別無腦升級。\n- **「升 HTTP/2 就要少開連線、複用單一連線最好」**——單連線確實是 HTTP/2 的設計，但某些 L4 負載均衡會把單連線釘在一台後端，**反而讓負載不均**（見 service mesh 的 per-request LB）。\n- **0-RTT 不是免費的**：QUIC/TLS 1.3 的 0-RTT early data 可被**重放攻擊**，只能用於冪等請求（見冪等，領域 A）。\n\n### 延伸閱讀\n\n- RFC 9114 — HTTP/3：https://www.rfc-editor.org/rfc/rfc9114.html\n- RFC 9000 — QUIC Transport：https://www.rfc-editor.org/rfc/rfc9000.html\n- RFC 9113 — HTTP/2：https://www.rfc-editor.org/rfc/rfc9113.html\n- Head-of-Line Blocking in QUIC and HTTP/3: The Details（Robin Marx）：https://calendar.perfplanet.com/2020/head-of-line-blocking-in-quic-and-http-3-the-details/\n\n## gRPC / Protobuf\n\n### 是什麼與內部機制\n\ngRPC 是一套**跨語言 RPC 框架**：你用 Protocol Buffers（Protobuf）的 `.proto` 檔當 **IDL（Interface Definition Language）** 同時描述「服務介面」和「訊息結構」，`protoc` 加 gRPC 外掛由 `.proto` **產生 client stub 與 server skeleton**，呼叫遠端方法寫起來像呼叫本地函式。傳輸層固定跑 **HTTP/2**，訊息以 Protobuf 二進位序列化後放進 HTTP/2 的 data frame。\n\ngRPC 真正的招牌是它把 HTTP/2 的 stream 對應成**四種呼叫語意**：\n\n- **Unary**：一次請求、一次回應（最像傳統 RPC）。\n- **Server streaming**：一次請求、server 回一串訊息（如訂閱推送）。\n- **Client streaming**：client 送一串、server 回一次（如上傳分塊聚合）。\n- **Bidirectional streaming**：雙向各自一串、獨立讀寫（如雙工聊天）。\n\n每個呼叫是一個 HTTP/2 stream；streaming 語意直接寫在 `.proto` 的方法簽章裡（`stream` 關鍵字），由產碼決定 stub 的型別。狀態以 gRPC 自己的 status code（`OK`/`NOT_FOUND`/`DEADLINE_EXCEEDED`…）放在 HTTP/2 trailer 回傳，與 HTTP status 分開（2026-06）。\n\n> 註：以下為示意 `.proto`、不保證可跑。\n>\n> ```protobuf\n> service OrderService {\n>   rpc GetOrder(GetOrderRequest) returns (Order);                  // unary\n>   rpc WatchOrders(WatchRequest) returns (stream OrderEvent);      // server streaming\n> }\n> message GetOrderRequest { string order_id = 1; }\n> ```\n\nProtobuf 的**序列化格式與 schema 演進規則（欄位編號、向前後相容、保留欄位）本身的機制不在此重講**（見序列化與 schema 演進，領域 A）；本條只關心 gRPC 怎麼**用**它當 IDL 與傳輸語意。\n\n### 在哪些系統扮演什麼角色\n\n- **內部微服務之間的同步呼叫**：gRPC 是資料中心內服務對服務呼叫的主力，因為產碼省掉手寫 client、二進位省頻寬、HTTP/2 多工省連線。\n- **多語言團隊的契約中樞**：`.proto` 是唯一真相來源，Go server、Node client、Python 工具共用同一份契約，避免各自手刻 DTO 漂移。\n- **streaming 場景**：把長連線推送（如進度回報、事件訂閱）寫成 server streaming，比自己搭 WebSocket 協定簡單（但瀏覽器直連需 gRPC-Web，見下）。\n- **service mesh 的負載均衡單位**：gRPC 單條 HTTP/2 長連線會讓 L4 LB 失效（流量釘在一台），通常交給 L7/mesh 做 per-request 均衡（見負載均衡 L4 vs L7、service mesh）。\n\n### 保證與限制\n\n**保證**：強型別契約（編譯期擋掉欄位拼錯）、跨語言一致序列化、HTTP/2 多工與雙向 streaming、deadline 傳播（client 設的 deadline 隨 metadata 往下游傳，整條呼叫鏈共用一個時間預算，見 timeout / deadline / budget，領域 P）。\n\n**限制**：\n\n- **瀏覽器不能直接講 gRPC**——瀏覽器無法操作 HTTP/2 trailer 與底層 frame，需 **gRPC-Web** + proxy 轉換，或改用 gRPC 的 JSON transcoding。\n- **人類不可讀**：二進位 payload debug 不像 REST 能直接看，需 `grpcurl` 之類工具。\n- **無原生快取語意**：不像 HTTP GET 有成熟的快取/CDN 生態。\n- **負載均衡反直覺**：長連線特性使 L4 LB 形同虛設（見上）。\n\n**Worked example**：一個 `Order` 物件含 `int64 id`、`string status`（值 `\"PAID\"`）、`double amount`。JSON 表示約 `{\"id\":123456789,\"status\":\"PAID\",\"amount\":99.5}` 約 **48 bytes**；Protobuf 用欄位編號 + varint + 長度前綴，同樣資料約 **20 bytes** 上下（省約 55–60%）。每秒 5 萬次內部呼叫、平均省 28 bytes/則，就是約 **1.4 MB/s ≈ 11 Mbps** 的內網頻寬節省，外加省去 JSON parse 的 CPU。\n\n### 跟替代品的取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| gRPC (Protobuf/HTTP2) | 強型別、二進位省頻寬、雙向 streaming、deadline 傳播 | 內部微服務、多語言、streaming | 瀏覽器需 gRPC-Web；debug 較難；長連線 LB 要 L7 |\n| REST/JSON over HTTP | 人類可讀、快取/CDN 生態成熟、無需產碼 | 公開 API、瀏覽器直連、低頻呼叫 | 無強型別契約（除非搭 OpenAPI）；payload 較肥 |\n| GraphQL | client 自選欄位、單端點聚合 | 前端聚合多來源、欄位需求多變 | N+1 與快取複雜；非 RPC 心智模型 |\n| Thrift | 與 gRPC 類似的 IDL+RPC | 既有 Thrift 生態 | 生態與動能不如 gRPC |\n\n範式層面的 REST vs GraphQL vs gRPC 取捨從 API 設計角度更完整地比（見 API 範式對照，領域 H）；本表只從傳輸/序列化角度切。\n\n### 常見誤解與陷阱\n\n- **「gRPC = Protobuf」**——Protobuf 是序列化格式，gRPC 是用它當 IDL 的 RPC 框架；Protobuf 也能脫離 gRPC 單獨用（如存檔、Kafka 訊息）。\n- **「gRPC 比 REST 快所以一律用 gRPC」**——對公開 API、需快取、瀏覽器直連的場景，REST 的生態優勢常勝過序列化速度。\n- **「deadline 設了就安全」**——deadline 是傳播的，但下游服務若不檢查/不取消，仍可能做完無用功；deadline 是合作協定，不是強制中斷。\n- **把 streaming 當無限可靠管道**——gRPC stream 建在單一 HTTP/2 連線上，連線斷則整條 stream 斷，需自己處理重連與斷點續傳，不會自動恢復。\n\n### 延伸閱讀\n\n- gRPC Core concepts, architecture and lifecycle：https://grpc.io/docs/what-is-grpc/core-concepts/\n- gRPC over HTTP/2 協定規格：https://github.com/grpc/grpc/blob/master/doc/PROTOCOL-HTTP2.md\n- Protocol Buffers 官方文件：https://protobuf.dev/\n\n## 連線池 connection pool\n\n### 定義與原理\n\n連線池是一組**預先建立、保持開啟、可重複借用**的連線（到資料庫、HTTP 後端、gRPC channel…），讓呼叫端「借一條、用完還一條」而非每次現開。它解的問題是：**建立連線很貴（TCP 三向交握 + TLS 交握 + 資料庫認證可達數十毫秒到上百毫秒），而連線本身可重用**。把這個固定成本攤平，並順帶**對下游加上連線數上限**這個天然的並發閘門。\n\n核心語意是四件事：\n\n- **borrow（取用）**：要連線時從池子拿一條閒置的；沒有閒置且未達上限就新建；達上限就**等待**（阻塞到逾時）或**拒絕**。\n- **return（歸還）**：用完放回池子，不關閉。\n- **health/validation（驗活）**：歸還或借出前可選擇性檢查連線是否還活著（如 ping），剔除被對端或中間設備悄悄關掉的死連線。\n- **eviction（汰除）**：閒置超過 idle timeout 的連線被關閉回收，避免養一堆沒用的連線。\n\n### 解法空間\n\n- **固定大小池**：min=max，永遠維持 N 條。可預測、無擴張抖動，但離峰浪費。\n- **彈性池（min/max + idle timeout）**：低載縮到 min、高載擴到 max、閒置汰除。多數函式庫預設（如各語言的 DB driver pool）。\n- **每執行緒/每連線一條 vs 共享池**：共享池讓並發數 > 連線數時排隊；thread-per-connection 模型則 1:1（見並發模型比較，領域 D）。\n- **等待策略**：池滿時 **borrow** 要 (a) 阻塞等到 timeout、(b) 立刻失敗（fail-fast）、(c) 視為背壓往上拒絕（見背壓，領域 E）——這是設計取捨，不是預設值。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 固定大小池 | 並發上限明確、無擴張抖動 | 穩態流量、下游連線數寶貴（如 PG） | 離峰浪費連線；尖峰若 max 設太小直接排隊 |\n| 彈性池 (min/max) | 攤平建立成本、離峰省資源 | 流量有日夜波動 | 擴張瞬間有冷連線延遲；idle timeout 與下游 idle kill 要對齊 |\n| 借用阻塞 + timeout | 平滑尖峰、不立刻拒絕 | 短暫尖峰可吸收 | 等待時間算進請求延遲；timeout 設太長放大隊頭阻塞 |\n| 借用 fail-fast | 過載立刻可見、不堆積 | 寧可掉請求也不要 latency 爆炸 | 尖峰期錯誤率上升，需搭重試（見重試，領域 A） |\n\n### 何時需要\n\n- **任何到資料庫的存取**幾乎都該用池——DB 連線昂貴且數量硬上限（如 PostgreSQL 預設 `max_connections=100`，每連線還吃記憶體）。\n- **高頻 HTTP/gRPC 對固定下游呼叫**：池化省交握。HTTP/2/gRPC 因單連線多工，「池」常退化成「少數幾條長連線 + 多工」，不是傳統意義的大池。\n- **serverless 反而是陷阱**：每個函式實例各自開池、auto-scale 時連線數暴衝、極易打爆 DB 上限，這時要外掛**連線池中介**（如 PgBouncer 之類的 pooler）把多實例的連線收斂到一處（2026-06）。\n- **不需要的場景**：低頻批次、一次性腳本、呼叫對象多變（每次不同 host）——池的攤平效益出不來。\n\n**Worked example**：DB 連線建立含交握約 30ms，請求本身查詢約 2ms。無池：每請求 30+2=**32ms**，連線成本佔 94%。固定 20 條的池、穩態 QPS=2000：每連線每秒可服務 1/0.002=500 次查詢，20 條理論上限 **10,000 QPS**，2000 QPS 下池利用率約 20%、借用幾乎零等待。若把 max 砍到 4 條：理論上限 2000 QPS，**利用率逼近 100%**，依排隊直覺（ρ→1）借用等待時間爆炸（見排隊直覺，領域 E）——這就是池太小的代價。\n\n### 常見誤解與陷阱\n\n- **「池越大越好」**——池大小是**對下游的並發上限**，設太大等於把過載直接灌進 DB（連線各吃記憶體、context switch、鎖競爭），常見的反而是**池太大壓垮 DB**。max 應由下游能承受的並發回推。\n- **連線洩漏**：借了不還（忘了 close、例外路徑沒釋放）會慢慢耗盡池，表現為「跑一陣子後全部請求卡在借用等待」。務必用 try-with-resources/defer 確保歸還。\n- **死連線**：防火牆/LB/DB 會悄悄關掉閒置太久的連線，池裡卻還以為活著，借出去第一個查詢才爆「connection reset」。需驗活或把 pool idle timeout 設得比下游的 idle kill **更短**。\n- **池上限 vs DB 上限不對齊**：N 個應用實例各開 max=20 的池，DB `max_connections=100`，6 個實例就 120 > 100，第 6 個實例的連線直接被拒。算總帳：實例數 × 每池 max ≤ DB 上限（留餘量給維運連線）。\n- **本條只管機制與語意**；連線池的**調參、監控指標、暖機**（pool size 怎麼壓測、看哪些 metric）見領域 S 的連線池調校。\n\n### 延伸閱讀\n\n- PostgreSQL — Connection Pooling 與 `max_connections`：https://www.postgresql.org/docs/current/runtime-config-connection.html\n- HikariCP — About Pool Sizing（連線池大小的經典分析）：https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing\n- PgBouncer 官方文件（外部 pooler）：https://www.pgbouncer.org/\n\n## 負載均衡 L4 vs L7\n\n### 定義與原理\n\n負載均衡器（LB）把進來的流量分配到多個後端，目標是**讓沒有一台被打爆、有壞掉的繞過去**。分水嶺在它看到**哪一層**：\n\n- **L4（傳輸層）**：只看 TCP/UDP 的 IP + port，按連線轉發，**不解析內容**。一旦一條連線被指派到某後端，整條連線都黏在那台。快、便宜、協定無關。\n- **L7（應用層）**：解析 HTTP（path/header/cookie/method），可按 URL 路由、依請求做決策、改寫 header、終結 TLS。每個**請求**都能重新選後端。功能多、成本高。\n\n第一原理：**L4 的分配單位是「連線」，L7 的分配單位是「請求」**。這個差異在長連線協定（HTTP/2、gRPC、WebSocket）上會放大成致命問題——L4 下一條長連線上的一萬個請求全去同一台，看起來連線數均衡、實際請求量爆炸不均。\n\n### 解法空間\n\n分配演算法（與 LB 在哪一層正交）：\n\n- **Round Robin**：依序輪流。後端同質、請求同質時夠用。\n- **Weighted Round Robin**：依後端容量加權。異質機型用。\n- **Least Connections**：選當前連線最少的。天然適應慢後端（慢的累積連線、自動少收）。\n- **Power of Two Choices (P2C)**：隨機抽兩台、選連線少的那台。用極小協調成本拿到接近 least-connections 的效果，避免「所有 LB 一起衝同一台最閒後端」的羊群效應。\n- **Peak EWMA**：以指數加權移動平均追蹤每後端的延遲，選**預測延遲最低**的。對長尾敏感、適合延遲差異大的後端（Linkerd/某些 mesh 採用）。\n- **Consistent Hashing**：依 key（如 user id）固定打到同一台，做 session affinity 或快取親和（機制見 consistent hashing，領域 M）。\n\n健康檢查：\n\n- **主動（active）**：LB 定期主動探測（如每 5s 打一次 `/healthz`），連續 N 次失敗就摘除。\n- **被動（passive / outlier detection）**：觀察真實流量的錯誤/逾時，某後端連續失敗就暫時摘除（ejection），過一段時間再試放回。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| L4 LB | 高吞吐、低延遲、協定無關、連線級分配 | TCP/UDP 直通、TLS passthrough、極高吞吐 | 長連線（HTTP/2/gRPC/WS）下請求嚴重不均；無法按 path 路由 |\n| L7 LB | per-request 分配、path/header 路由、TLS 終結、可改寫 | HTTP 微服務、需路由規則、gRPC per-request 均衡 | CPU/延遲成本高；要解密才能看內容 |\n| 主動健康檢查 | 主動探測、可預測摘除 | 後端有現成 health endpoint | 探測頻率 vs 反應速度取捨；探測自身有成本 |\n| 被動 outlier detection | 用真實流量判斷、零額外探測 | 故障難用 health endpoint 表達 | 需累積失敗樣本，反應較慢；ejection 比例要設上限免雪崩 |\n\n### 何時需要\n\n- **純 TCP/UDP 直通、追求極致吞吐與低延遲、不需內容路由**：用 L4（如資料庫前的代理、TLS passthrough）。\n- **HTTP 微服務、需按 path/host 路由、需 per-request 均衡、需在邊緣終結 TLS**：用 L7。\n- **跑 gRPC/HTTP2 而想要請求級均衡**：**必須** L7 或 client-side LB（見 service mesh、DNS 與服務發現），L4 在此基本失效。\n- **過度工程警訊**：三台後端、同質、短連線 REST——L4 round robin 就夠，別急著上 service mesh 那套 per-request EWMA。\n\n**Worked example**：100 個 client，每個對 gRPC 服務開 1 條 HTTP/2 長連線，背後 5 台後端。L4 round robin 按連線分：每台約 20 條連線，看似均衡。但若其中 10 個 client 是高頻批次、各自在自己那條連線上跑 1000 QPS，其餘 90 個各 10 QPS——這 10 條高頻連線恰好可能都落在同一台後端，那台扛 ~10,000 QPS、其餘四台合計 ~800 QPS。L4 完全看不見這個失衡（它只數連線）。換 L7 per-request 均衡後，每個 RPC 重新選後端，10,900 QPS 才會被攤成每台約 2180 QPS。\n\n### 常見誤解與陷阱\n\n- **「L4 比 L7 好因為快」**——快是真的，但 L4 對長連線協定的請求級失衡是隱形殺手；選層級要看協定，不是看快慢。\n- **「LB 演算法選 least-connections 一定比 round robin 好」**——多個獨立 LB 各自算 least-connections 會羊群效應（一起衝最閒那台）；分散式環境 P2C 通常更穩。一句話：**好的健康檢查比好的演算法更重要**——演算法再優，健康檢查有盲點（把死後端當活的）照樣打進黑洞。\n- **健康檢查探的端點太淺**：只探 TCP port 通不通、或一個永遠回 200 的 `/ping`，無法反映「DB 連不上但 HTTP 還活著」的半死狀態。readiness 應反映真實依賴（見 health check，領域 P）。\n- **摘除過猛引發雪崩**：被動 ejection 沒設比例上限，一波瞬時錯誤把半數後端全摘掉、流量灌剩下一半、再被打死——連鎖摘除。務必設 `max_ejection_percent` 之類的上限。\n\n### 延伸閱讀\n\n- Envoy — Load Balancing（演算法、outlier detection、panic threshold）：https://www.envoyproxy.io/docs/envoy/latest/intro/arch_overview/upstream/load_balancing/overview\n- HAProxy — Load Balancing Algorithms：https://www.haproxy.com/glossary/what-are-load-balancing-algorithms\n- The Power of Two Choices in Randomized Load Balancing（Mitzenmacher, 1996）：https://www.eecs.harvard.edu/~michaelm/postscripts/tpds2001.pdf\n\n## TLS / mTLS（握手、憑證管理）\n\n### 定義與原理\n\nTLS（Transport Layer Security）在 TCP（或 QUIC 內建）之上提供三件事：**加密**（防竊聽）、**完整性**（防竄改）、**身分驗證**（防冒充）。當前現役主力是 **TLS 1.3（RFC 8446，2018-08）**，相對 1.2 的關鍵改進是**握手縮到 1-RTT**、強制前向保密（ephemeral 金鑰交換）、砍掉一堆不安全的舊 cipher suite、只留 AEAD（2026-06）。\n\n握手的第一原理：client 在第一個訊息裡就**投機性地送出自己的 key share**，server 回 key share 後雙方各自算出共享金鑰，**一個來回就能開始加密通訊**（1-RTT）。\n\n預設只有 **server 出示憑證**讓 client 驗證（單向）。**mTLS（mutual TLS）** 是**雙向**：client 也出示自己的憑證、server 也驗它。差別在於「誰需要證明身分」——公網 HTTPS 通常只需 client 確認 server 是真的（單向）；服務對服務則常要互相確認（mTLS），這正是 service mesh 的零信任基礎（見 service mesh）。\n\n憑證管理是 TLS 的隱形主體：憑證有**效期**（公網 CA 效期上限 2026-03 起為 200 天、2027／2029 續降至 100／47 天；Let's Encrypt 自採更短的 90 天），到期前必須**自動輪換（rotation）**，否則服務集體掛掉。內部 mTLS 通常自建 CA、簽發短效期（小時級）憑證、由 mesh 自動輪換。\n\n### 解法空間\n\n- **單向 TLS（server-only）**：標準 HTTPS。client 用內建 CA 信任鏈驗 server 憑證。\n- **mTLS（雙向）**：再加 client 憑證。可用於服務對服務零信任、API client 強身分、VPN-less 內網。\n- **憑證信任來源**：公網用公開 CA（Let's Encrypt/商業 CA）；內網自建私有 CA（如 mesh 內建 CA、HashiCorp Vault、step-ca）。\n- **撤銷**：CRL（撤銷清單，笨重）/ OCSP（線上查詢，有延遲與隱私問題）/ **短效期憑證**（用過期取代撤銷，現代 mesh 的主流做法——憑證活幾小時，壞了等它自然過期就好）。\n- **TLS 終結位置**：邊緣 LB 終結（內部明文，簡單但內網不加密）/ 一路加密到後端（passthrough 或 mesh re-encrypt）。\n\n### 各方案的保證與取捨\n\n| 方案/做法 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 單向 TLS 1.3 | server 身分 + 加密 + 完整性、1-RTT | 公網 HTTPS、API 對外 | 不驗 client；憑證輪換漏掉就全站掛 |\n| mTLS | 雙向身分 + 加密 | 服務對服務零信任、強身分 client | 憑證管理複雜度倍增；client 憑證輪換是運維重擔 |\n| 公開 CA（效期上限 200 天，2026-03 起且將續降；Let's Encrypt 採 90 天） | 瀏覽器原生信任 | 對外網域 | 須自動續簽（ACME）；忘了續＝服務中斷 |\n| 私有 CA + 短效期 | 完全自控、撤銷靠過期 | 內部 mesh/服務間 | 須自建簽發與分發；client 不認你的 CA |\n| 邊緣終結 TLS | 後端免處理加密、省 CPU | 內網可信、簡單拓樸 | 終結點之後是明文，不符零信任 |\n\n### 何時需要\n\n- **任何對外流量**：單向 TLS 是底線，沒有例外。\n- **服務對服務、零信任網路、合規要求內網加密**：mTLS。但別在三個互信服務的小系統硬上 mTLS——憑證輪換的運維負擔可能超過收益，除非有 mesh 自動化（見 service mesh）。\n- **強 client 身分（B2B API、IoT 裝置）**：mTLS 比 API key 更難偽造、可細到單一裝置撤銷。\n- **over-engineering 警訊**：純內網、低敏感、無合規壓力的早期系統，先把單向 TLS 與憑證自動續簽做穩，mTLS 等有 mesh 再說。\n\n**Worked example**：一個面向公網的服務用 Let's Encrypt 憑證（90 天效期），靠 ACME client 在到期前 30 天自動續簽。若續簽 cron 壞了沒人發現，**第 90 天整站 TLS 憑證過期、所有 HTTPS 連線報 `CERT_DATE_INVALID`、全部流量歸零**——這是最常見的「沉默到爆炸」事故。防禦：對「憑證剩餘天數」設告警（如 < 14 天告警），把它當 SLI（見告警設計，領域 I）。換算：1-RTT 握手在 RTT=50ms 的連線上多約 50ms 首次延遲，TLS 1.3 的 session resumption（0-RTT）可把復用連線的握手成本壓到接近零（代價是重放風險，僅限冪等請求）。\n\n### 常見誤解與陷阱\n\n- **「TLS 終結在 LB 就安全了」**——終結點之後若是明文內網，攻破網路即可竊聽；零信任要求一路加密或 mesh re-encrypt。\n- **「mTLS 自動防一切」**——mTLS 只證明「對端持有某張被我信任的 CA 簽的憑證」，**不等於授權**；誰能做什麼仍是 AuthZ 的事（見認證 vs 授權，領域 F）。\n- **憑證效期 vs 輪換頻率搞混**：90 天效期不代表 90 天才輪換一次；要在過期前留足重試餘量自動續，別卡死線。\n- **「自簽憑證 = 不安全」**——自簽只是「不被公開 CA 信任」，內網自建 CA + 短效期是完全正當且更安全的做法；不安全的是把私鑰外洩或不驗憑證鏈。\n- **TLS 版本協商降級**：未停用 TLS 1.0/1.1 可能被降級攻擊；現代部署應只開 1.2/1.3。\n\n### 延伸閱讀\n\n- RFC 8446 — TLS 1.3：https://www.rfc-editor.org/rfc/rfc8446.html\n- Cloudflare — A Detailed Look at RFC 8446 (TLS 1.3)：https://blog.cloudflare.com/rfc-8446-aka-tls-1-3/\n- Let's Encrypt — How It Works（ACME 自動續簽）：https://letsencrypt.org/how-it-works/\n\n## DNS 與服務發現（service discovery）\n\n### 定義與原理\n\n服務發現解的問題是：**呼叫端怎麼知道「order-service」現在跑在哪些 IP:port 上**——在實例會自動擴縮、漂移、重啟的環境，這份名單時時在變。DNS 是最古老的服務發現機制（名字 → IP），但它的快取模型與「實例頻繁變動」天生矛盾。\n\n三種模式：\n\n- **DNS-based**：把服務名解析成一組 A/AAAA 記錄（或 SRV 帶 port）。client 拿到 IP 後自己連。簡單、語言無關，但**受制於 TTL 快取**——一個死掉的實例在 TTL 過期前仍可能被解析給 client。\n- **Client-side discovery**：client 直接查 registry（如 Consul）拿健康實例清單，**自己做負載均衡**選一台。少一跳、可用 P2C/EWMA 等聰明演算法，但每種語言都要 registry client SDK。\n- **Server-side discovery**：client 只認一個穩定虛擬位址（如 K8s Service 的 ClusterIP），背後由平台（kube-proxy / LB）轉發到健康實例。client 無腦、語言無關，但多一跳。\n\n第一原理：**服務發現 = registry（誰是真相）+ 健康判定（哪些活著）+ 解析/分配（怎麼挑一台）**。DNS 把這三件揉在一起且更新慢；現代 registry（Consul / K8s endpoints）把三者拆開、更新近即時。\n\n### 解法空間\n\n- **靜態設定/設定檔**：把後端 IP 寫死。最簡單，但實例一變就過時——只適合極穩定的少量端點。\n- **DNS + 低 TTL**：把 TTL 設到 5–30s 縮短失效窗口。改善有限，且很多 client/resolver 不尊重短 TTL（會自己多快取）。\n- **K8s 內建（Service + DNS + endpoints controller）**：Pod 變動時 endpoints 近即時更新，Service 的 ClusterIP 穩定不變，kube-proxy/IPVS 轉發。容器世界的預設。\n- **專用 registry（Consul / etcd / Eureka）**：服務啟動時註冊、定期心跳、registry 做健康檢查、client 或 sidecar 查詢。跨平台、跨叢集適用。\n- **service mesh 的 xDS**：control plane 把端點清單即時推給每個 sidecar（見 service mesh），是 client-side discovery 的進化版。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 靜態設定 | 零依賴、可預測 | 極少數穩定端點 | 實例一變就過時；無健康感知 |\n| DNS（A/SRV）| 語言無關、生態成熟 | 變動慢的服務、跨組織 | TTL 快取讓失效慢；多層快取不可控 |\n| K8s Service + DNS | 端點近即時更新、ClusterIP 穩定 | 容器化微服務 | 限叢集內；跨叢集需額外方案 |\n| Consul / etcd | 跨平台、主動健康檢查、KV | 混合/多叢集/VM+容器 | 自己要運維 registry 的高可用 |\n| Mesh xDS push | 端點即時推送、配合 LB 策略 | 已上 mesh 的大型微服務 | 綁定 mesh 的複雜度 |\n\n### 何時需要\n\n- **變動慢、跨組織、被各種 client 消費**：DNS 仍是最通用解（如對外網域、第三方 API）。\n- **容器化微服務、實例頻繁擴縮**：用 K8s Service 或 registry，別靠 DNS TTL 賭時效。\n- **需要聰明的 client-side LB（P2C/EWMA）或跨叢集**：registry + client-side discovery 或 mesh。\n- **over-engineering 警訊**：單體 + 一個資料庫，根本不需要服務發現；別為了「微服務感」硬塞 Consul。\n\n**Worked example**：DNS A 記錄 TTL=300s，一個實例當機。在最壞情況下，client 端 resolver 與函式庫快取會讓這個死 IP **最長被解析給新連線達 5 分鐘**，期間打到死 IP 的請求全部逾時失敗。把 TTL 降到 15s 可把窗口縮到約 15s，但 (a) 增加 DNS 查詢量、(b) 不少 client 自帶更長的內部快取不甩你的 TTL。改用 K8s endpoints 時，Pod 一掛、endpoints controller 通常**秒級**把它從清單移除，失效窗口從分鐘級降到秒級——這就是「為什麼頻繁擴縮的環境不該用 DNS TTL 當健康機制」。\n\n### 常見誤解與陷阱\n\n- **「降低 DNS TTL 就能即時切換」**——resolver、OS、函式庫、JVM（早期預設永久快取 DNS）各有自己的快取，你的 TTL 常被無視；別把 DNS TTL 當可靠的故障切換手段。\n- **「服務發現 = 負載均衡」**——發現是「拿到健康清單」，均衡是「從清單挑一台」，兩件事。DNS round-robin 把兩者混在一起且都做不好（無健康感知、TTL 慢）。\n- **註冊但不註銷**：實例當機若沒主動註銷、又沒心跳超時剔除，registry 裡會殘留殭屍端點；health check 是 registry 的命脈，不是可選項。\n- **DNS 解析也是依賴**：DNS server 掛了、解析變慢，會讓「看起來和網路無關」的呼叫集體變慢或失敗；DNS 查詢要有 timeout 與快取，別當它永遠瞬間回應。\n- **thundering herd on cache expiry**：大量 client 的 DNS 快取同時到期、同時去查，可能瞬間打爆 DNS——加 jitter（見重試、退避、jitter，領域 A）。\n\n### 延伸閱讀\n\n- Kubernetes — DNS for Services and Pods：https://kubernetes.io/docs/concepts/services-networking/dns-pod-service/\n- Consul — Service Discovery 概念：https://developer.hashicorp.com/consul/docs/use-case/service-discovery\n- RFC 2782 — DNS SRV 記錄：https://www.rfc-editor.org/rfc/rfc2782.html\n\n## service mesh（sidecar / Envoy）\n\n### 定義與原理\n\nservice mesh 把「服務間通訊的橫切關注點」——**mTLS、重試、逾時、熔斷、負載均衡、流量路由、可觀測性**——從**應用程式碼裡抽出來**，下放到一層獨立的網路基礎設施。它解的問題是：當你有幾十上百個微服務，這些通訊邏輯若散落在每個服務、每種語言各刻一遍，會漂移、不一致、難治理。mesh 讓它變成**平台層的統一策略**，應用幾乎無感。\n\n兩層架構：\n\n- **data plane（資料面）**：實際攔截並處理流量的代理，最常見是 **Envoy**（CNCF 專案、高效能 L7 代理）。傳統做法是 **sidecar 模式**——每個 Pod 旁注入一個 Envoy，應用的所有進出流量都先經它。\n- **control plane（控制面）**：下發設定給所有 data plane 代理（端點清單、路由規則、憑證、策略）。Istio 用 **xDS** 協定把這些即時推給每個 Envoy。\n\n第一原理：**把跨服務的網路策略從「每個服務各自實作」變成「基礎設施統一執行」**，代價是**多一層代理跳轉**（延遲與資源）與**整體複雜度**。\n\nsidecar 模式的成本（每 Pod 一個 Envoy 吃記憶體與 CPU）催生了 **sidecarless / ambient 模式**：把功能拆成節點級的 L4 代理（**ztunnel**，做 mTLS/telemetry）+ 按需的 L7 代理（**waypoint**），不再每 Pod 注入。Istio 的 ambient mode 於 **v1.24（2024-11）達 GA/Stable**（2026-06）。\n\n### 解法空間\n\n- **不用 mesh，函式庫做（如 client-side LB/重試函式庫）**：少一層代理、低延遲，但每種語言要各自實作、版本升級要動所有服務。\n- **sidecar mesh（Istio/Linkerd 經典模式）**:每 Pod 一代理。功能最全、應用零改動，但資源開銷大、Pod 啟動鏈變長。\n- **ambient / sidecarless mesh**：節點級 L4（ztunnel）+ 選用 L7（waypoint）。省資源、降延遲，L7 功能按需才加。\n- **只取 mesh 的一部分**：有些團隊只要 mTLS 與可觀測，不要全套流量管理——可只啟用 L4 層。\n\n### 各方案的保證與取捨\n\n| 方案/工具 | 保證 | 適用場景 | 注意事項 |\n|---|---|---|---|\n| 函式庫（無 mesh） | 無額外跳轉、低延遲 | 少數服務、單一語言 | 多語言要各自實作；升級要動所有服務 |\n| sidecar mesh（Envoy） | 統一 mTLS/重試/路由/觀測、應用零改 | 大量多語言微服務、需細緻流量控制 | 每 Pod 一代理吃資源；複雜度高；多一跳延遲 |\n| ambient / sidecarless | 省資源、L4 全覆蓋、L7 按需 | 想要 mTLS+觀測但嫌 sidecar 重 | 較新、L7 進階功能仍演進中；運維心智模型不同 |\n| 純 L4 mesh（只 mTLS） | 零信任加密 + telemetry、最輕 | 只要加密與可見性 | 拿不到 L7 路由/重試 |\n\n### 何時需要\n\n- **幾十個以上的微服務、多語言、需要統一的 mTLS/重試/路由/可觀測策略**：mesh 的治理收益開始壓過複雜度。\n- **零信任合規要求服務間全程 mTLS 且要自動憑證輪換**：mesh 自動化憑證是它最實在的賣點。\n- **需要漸進式流量切換（canary by header/percentage）**：L7 mesh 的流量路由很適合（見 blue-green / canary / rolling，領域 Q）。\n- **明顯 over-engineering**：少於約 5–10 個服務、單一語言、無零信任壓力——一個函式庫 + 一個 L7 LB 就夠，硬上 mesh 是拿巨大運維複雜度換用不到的功能。mesh 是「服務數量與治理痛點到一定規模」才回本的投資。\n\n*
