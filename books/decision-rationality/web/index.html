<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "在不確定中下注", "md": "# 在不確定中下注\n\n### 決策與理性的直覺與驚嘆\n\n> 人類花了三百年把「在不確定下該怎麼選」寫成一套漂亮到近乎強制的數學，正常、聰明、受過訓練的人卻在最簡單的賭局前系統性地違反它——而且違反得很有規律。這本書要讓你親身感受這道裂縫，並且能用自己的話對另一個工程師講清楚：**聖彼得堡、Allais、Ellsberg 各自從哪一條公理把理性掀翻，而展望理論又如何用另一套數學把「人怎麼選」寫成方程式。**\n\n---\n\n## 這本書怎麼讀\n\n**純紙上推演。** 每章的「紙上推演」是手算期望效用、反解確定等值、算貝氏後驗、倒推決策樹——不是要你開終端機。所有數值示範一律手算，攤在 ` ```text ` 表裡。你帶一支鉛筆就夠。\n\n**直覺與精確意義優先。** 每個概念先回答「它在解決什麼決策問題」——期望效用在問「凹效用下該不該接這個賭」，資訊的價值在問「這次再驗一次值不值它的成本」，展望理論在問「人實際上把哪些東西算進去了」——再給形狀與公式。定理給直覺、給公理、給結論，嚴格證明指向延伸閱讀。\n\n**講得出來才算過。** 每章末的「自我檢核」是口頭題，對齊「能不能把這個概念講給另一個工程師聽」的深度。優先問「為什麼」而不是「是什麼」。如果你能對另一個工程師講清楚「Allais 悖論為何讓人在兩道題之間必然不一致」，你才真正懂了那章。\n\n**故障視角是賣點。** 決策理論正是人類直覺與規範理論最常打架的領域。每章的「直覺的陷阱」段，專門守住那些被講爛了的庸俗版（「期望值無限所以該無限下注」、「展望理論證明人不理性」、「損失趨避就是膽小」），還你正確版。\n\n---\n\n## 一條脊椎貫穿全書\n\n整本書反覆回到**同一個帶不確定性的決策**，每深入一個 Part 就用一套新工具把它重算一次。這條脊椎有**兩條交織的線**：\n\n**賭注線（the bet）**：擲一枚公正硬幣，正面贏 NT$200、反面輸 NT$100。期望值 +50，多數人拒絕。這個懸念從 ch01 開始，七層重看直到 ch18 對帳。\n\n**檢查線（the test）**：某病盛行率 1%、檢查敏感度 99%、偽陽率 5%。驗出陽性後到底有多可能真的有病？貝氏告訴你：後驗約 16.7%——不是 99%，不是 95%，是 16.7%。這條線在 ch05 登場，ch07 問「要不要再驗一次」，ch18 收官。\n\n```text\n脊椎七層：同一個決策，七種眼光\n\n  第一層  ch02  期望值          E[L]=+50，期望值正 ⇒ 該接（第一種演算法）\n  第二層  ch03  期望效用        u=√，EU=8.66<10 ⇒ 拒絕（風險趨避）\n  第三層  ch04  風險vs不確定    同一個賭，硬幣已知vs未知，模糊趨避額外發動\n  第四層  ch05  貝氏決策        檢查線：後驗16.7% × 效用矩陣 → 最適行動\n  第五層  ch07  資訊的價值      再驗一次的 EVSI：若行動不翻轉，精確等於零\n  第六層  ch08–09 展望理論      v(−100)被λ放大 ⇒ 拒絕（機制是損失更重）\n  第七層  ch18  五種演算法對帳    規範說X、人做Y、兩者都對——兩種問題的兩個答案\n```\n\n中央張力始終不變：**規範理性（你該怎麼選）與描述現實（人實際怎麼選）之間那道穩定的裂縫——它不是 bug，是兩套都對的數學在描述兩件不同的事。**\n\n---\n\n## 全書地圖\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n\n  附錄 A 記號與公式速查  附錄 B 詞彙表  附錄 C 閱讀地圖\n```\n\n---\n\n## 書架上的鄰居\n\n這本書只做一件事：把「單人在不確定下該怎麼選」以及「人實際怎麼選」這兩件事說清楚。需要更深的東西時，它會指向書架上相鄰的書，而不是重講一遍：\n\n- **機率的機制**——貝氏定理怎麼算、條件機率的推導、大數法則為何成立 →《馴服隨機》（本書 ch05–07 只用結果，機制在那裡；注意本書醫療檢查用盛行率 1%，那本書用 0.1%，是刻意差異）\n\n- **偏離的心理機制**——展望理論的數學描述本書收了，人**為什麼**會這樣偏、雙系統與捷思怎麼運作、為什麼察覺不到 →《思考的陷阱》（理性三角的心理機制角，ch12 是明確交棒點）\n\n- **多人策略互動**——當對手會對你的選擇反應，單人期望效用就不夠了 →《賽局：當理性互相碰撞》（本書 ch16 立界碑，細節在那裡；決策↔賽局是同一枚硬幣兩面）\n\n- **制度防線**——信念更新作為科學確證、如何設計流程防自欺 →《如何不騙自己》（理性三角的制度角，ch17 是總交棒點）\n\n- **凹凸函數與邊際遞減**——凹效用的幾何直覺、Jensen 不等式的圖像版 →《馴服無限》（ch03、ch08 觸及時點到指向）\n\n這五本構成**理性三角**（決策＋偏誤＋科學方法）及其週邊，合起來才是完整的圖——本書承擔的是規範基準那一角。\n\n---\n\n## 給誰讀\n\n唯一讀者：一位六年以上的資深後端工程師。你不需要任何決策理論背景——你需要的直覺，凌晨三點的 rollback 賭注、alert 偽陽性的折扣、漸進式放量的資訊成本、「多算幾步也不值」的滿意就停，早就教會你了。\n\n本書把這些工程經驗當成錨點，從「期望值算出來是正的，為什麼你還是不接」起步，一路帶你看到「規範的美麗 × 描述的裂縫，為什麼兩者都對」。你的直覺正準備在接下來每一章被校準一次——不是被推翻，是被擦亮。\n\n準備好了，就從 **ch01 — 一個賭注與一次檢查：決策登場** 開始。\n"}, {"id": "ch01-bet-and-test", "file": "ch01-bet-and-test.md", "group": "Part I — 理性的地基", "title": "ch01 — 一個賭注與一次檢查：決策登場", "md": "# ch01 — 一個賭注與一次檢查：決策登場\n\n> **本章解決什麼問題**：這本書要追一道很具體的裂縫——人類花三百年把「在不確定下該怎麼選」寫成一套漂亮到近乎強制的數學，正常聰明的人卻在最簡單的賭局前系統性地違反它。但裂縫要有東西夾在中間才看得見。本章不算任何一個數，只做一件事：立起全書的脊椎——一個賭注、一次檢查——和全書地圖，把後面十七章要反覆重算的那個決策，先擺到你面前，留兩個懸念。你在 Part I 的入口。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發   ◄ 你在這裡\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n這張圖你現在不必看懂，只要記住它的形狀：左邊一根脊椎往下穿過五個 Part，每個 Part 都會把**同一個決策**用一套新工具重算一次。地圖的標語就是全書的劇情——理性許了一套漂亮的演算法（你該怎麼選），現實在最簡單的賭局前把它一條條掀翻（人怎麼選）。我認為這道裂縫是整個決策理論裡最值得一個工程師停下來看的東西，因為它兩邊都對，而且兩邊都不是你以為的那個意思。\n\n## 從你已知的出發\n\n先別管伯努利、馮紐曼、康納曼這些名字。我們從你昨天可能就做過的一件事開始。\n\n凌晨三點，pager 響了。某個服務的錯誤率從基線爬上來，但還沒到 SLA 違約線，也還沒有客訴。你面前有兩個動作：**rollback** 到上一版（確定能止血，但要中斷一個正在跑的資料遷移，代價是延後一週、團隊白做幾天），或是**再觀察十分鐘**（可能它只是一次抖動，自己會好；也可能它正在惡化，等十分鐘等出一場 P0）。\n\n你會怎麼選？你不會去翻教科書。你心裡跑的是一個你早就跑熟、熟到沒意識到自己在跑的算式：\n\n```text\n「再觀察」這個動作，在我腦子裡大概長這樣：\n\n   它只是抖動（七成？）── 那我省下一週的遷移工，很好\n   它正在惡化（三成？）── 那我賠一場 P0，凌晨被叫醒第二次，外加事後檢討\n\n   ⇒ 我把「每種結果有多可能」乘上「那個結果有多痛」，\n      在心裡加起來，跟「rollback」那一欄比一比，挑比較不痛的。\n```\n\n這個「把每種結果有多可能、乘上它有多痛，加起來，挑比較不痛的」動作——**機率乘代價、加總、取較優**——就是這整本書要解剖的東西。決策理論不是什麼高深的新發明，它是把你這個凌晨三點的直覺，慢動作拆開、寫成數學、然後問一句殺人的話：**你心裡那個算式，真的是你以為的那個算式嗎？**\n\n你已經有的直覺，比你想的多。容量規劃時你算「這個 region 掛掉的機率乘上掛掉的損失」，決定要不要多開一組備援——那是**期望成本最小化**，是這本書 ch02 的主角。你寧可把容量稍微過配一點、也不要冒「尖峰打爆」的險，明明過配天天在燒錢——那是**風險趨避**，是 ch03 的主角。你收到一個 alert，知道它命中率高但真故障的基率很低，所以心裡先打個折「八成又是偽陽」——那是**貝氏**，是 ch05 的主角。你猶豫「要不要再多跑一輪壓測才敢上線」——那是**資訊的價值**，是 ch07 的主角。\n\n這本書不會從零教你這些直覺。它做的是把它們擦亮、命名、然後指給你看：哪幾個你以為很穩的直覺，其實在某些賭局前會穩定地、可預測地把你帶下溝。\n\n## 一個決策最少需要幾個零件\n\n在拆你的凌晨三點之前，先把它的零件數清楚。決策理論有一個乾淨到近乎冷酷的觀察：**任何一個「在不確定下選一個動作」的決策，最少只要三個零件就描述完了。**\n\n```text\n決策的三要素\n\n  ① 行動（act）       你能控制的、要從中挑一個的東西。\n                      例：{ rollback, 再觀察 }、{ 治療, 不治療 }、{ 接這個賭, 不接 }\n\n  ② 狀態（state）     你控制不了、而且不確定的那個「世界到底是哪一種」。\n                      例：{ 只是抖動, 正在惡化 }、{ 有病, 健康 }、{ 硬幣正面, 反面 }\n\n  ③ 報酬（outcome）   每一個「行動 × 狀態」的格子裡，你拿到什麼。\n                      例：rollback × 抖動 = 白白延後一週遷移\n                          再觀察 × 惡化 = 一場 P0\n```\n\n這個三分法不是我隨手切的。它是 Savage 1954 年那套主觀期望效用理論的地基（見 ch06），而且切得很有道理：**狀態是你「信念」的所在，報酬是你「慾望」的所在。** 世界到底是哪一種（狀態），你只能去**相信**——它由不得你；每個結果（報酬）有多好或多壞，是你**想要**或不想要它——這是你的價值。把這兩件事分開，是整套理論能往下走的關鍵。一個動作，正式講，就是「一個從狀態到報酬的對應」：你選了動作，世界選了狀態，兩者一交叉，報酬就定了。\n\n工程師看到這裡應該很眼熟：這是一張二維表。行是你的動作，列是世界可能的樣子，每一格填一個報酬。你維運生涯裡畫過的每一張「if 這樣 then 那樣」的權衡表，骨子裡都是這張表。決策理論接下來要回答的，全部是同一個問題的變形：**面對這張表，到底該挑哪一行？**\n\n而「該挑哪一行」之所以變成一門需要三百年、好幾個諾貝爾獎才講清楚的學問，是因為列上有「不確定」這三個字。如果你**知道**世界是哪一種，這就不是決策、是查表。難就難在你不知道——你只有信念，而且信念可能是錯的，可能還能更新，甚至可能根本測不出來。\n\n## 把賭注擺上桌：脊椎的第一條線\n\n現在把這本書要陪你走完十八章的那個決策正式請上台。它刻意簡單——簡單到你一眼覺得沒什麼好算的，而那正是它的殺傷力。\n\n> **脊椎・賭注線（the bet）**：擲一枚公正硬幣。正面，你贏 NT$200；反面，你輸 NT$100。要不要接這個賭？\n\n用決策論的記法，把這個賭注（在決策論裡叫**彩券**（lottery）——別誤會，它只是「結果＋機率」的組合，跟刮刮樂無關）寫成一行：\n\n```text\nL =（+200, 0.5; −100, 0.5）\n\n  讀法：有 0.5 的機率拿到 +200，有 0.5 的機率拿到 −100。\n  分號隔開不同的「結果 ; 機率」對；單位 NT$。\n\n  攤成三要素表：\n\n                  狀態：正面 (p=0.5)   狀態：反面 (p=0.5)\n  行動：接這個賭          +200               −100\n  行動：不接               0                   0\n```\n\n這一行記法 `L =（+200, 0.5; −100, 0.5）`，全書會出現幾十次。每次你看到它，就是「ch01 那個賭注又回來了」。請現在就讓它住進你的腦子。\n\n關於這個賭注，本章只給你**一個**數字、留**一個**懸念。\n\n數字是：如果你把「機率乘報酬加總」這個動作硬套上去——0.5 乘 200，加上 0.5 乘負 100——平均下來，每接一次這個賭，你**長期**會賺 50 塊。這個 +50 叫期望值，正式怎麼算、它到底是什麼意思、為什麼說「長期」三個字是關鍵，全留給 ch02。本章你只要接受一件事：**這個賭的期望值是正的。** 數學上，它是個划算的賭。\n\n懸念是：**多數人不接。**\n\n把這兩句話並排看一分鐘：\n\n```text\n   一個期望值為正的賭   ── 數學說：划算，接。\n   多數正常人 ── 拒絕。\n\n   ⇒ 誰錯了？是人不理性，還是「划算」這個詞被你誤會了？\n```\n\n這就是全書第一道裂縫的種子，也是脊椎賭注線要承載的整條劇情。它會在 ch02 用期望值看一次（划算，該接）、ch03 用效用看一次（拒絕原來是理性的！）、ch08–09 用展望理論看一次（拒絕背後是「賠的比賺的更重」）、ch18 做總對帳。同一個賭，五種眼睛，五種看法。本章不揭曉任何一種——我只把賭注擺好、把「期望值為正卻被拒絕」這個怪事釘在你眼前。\n\n如果你現在心裡冒出「那當然不接啊，200 沒多到讓我願意冒掉 100 的險」——很好，記住這個感覺。你剛剛沒有算錯任何數學，你只是動用了一個**還沒被命名**的東西。這本書接下來幾章，就是去把那個東西揪出來、給它名字、再問它合不合規矩。\n\n## 把檢查擺上桌：脊椎的第二條線\n\n脊椎不只一條線。賭注線講的是「報酬」那一側——同樣的機率，不同的價值。但決策的另一半難題在「狀態」那一側：**世界到底是哪一種，你根本不知道，只能靠證據去猜。** 為了把這一半講透，本書還有第二條脊椎線。\n\n> **脊椎・檢查線（the test）**：有一種病，在人群裡的盛行率是 1%（一百人裡一個有）。有一種檢查，敏感度 99%（真有病的人，99% 會驗出陽性），偽陽率 5%（其實健康的人，也有 5% 會被驗成陽性）。現在，**你驗出了陽性。你到底有多可能真的有病？**\n\n本章一樣，只給設定、留懸念，**一個數都不算**。\n\n先讓你的直覺自己跳一下。檢查敏感度 99%，聽起來很準。你驗出陽性。你心裡那個數字是多少？九成？九成五？\n\n```text\n   盛行率 1%、敏感度 99%、偽陽率 5%\n   你驗出陽性\n   ⇒ P(真的有病 | 驗出陽性) = ？？\n\n   多數人脫口而出：「九成多吧，檢查那麼準。」\n   正確答案（ch05 揭曉）：差得遠。\n```\n\n我先不告訴你正確的數，但給你一個方向感：它比你直覺低**非常多**。低到「驗出陽性」這件聽起來很嚇人的事，其實沒你以為的那麼確定。為什麼？因為你的直覺偷偷把「真有病的人有多大機率驗出陽性」（這個的確是 99%），跟「驗出陽性的人有多大機率真有病」（這個完全是另一回事）混成了同一個數。這兩個條件機率方向相反、數值天差地別——把它們搞混，是 ch05 要解剖的**基率忽視**。\n\n你會問：這跟賭注有什麼關係，怎麼算同一個脊椎？關係在這裡——**驗出陽性之後，你還得做一個決策：治療，還是不治療。** 而「該不該治療」不只看「多可能有病」（那是狀態的信念），還要看「猜錯各自有多慘」（那是報酬，又回到效用矩陣）。檢查線最後會和賭注線在 ch18 會合：兩條線都是同一個動作——**機率乘代價、加總、取較優**——只是一條的難點在報酬怎麼估，一條的難點在機率怎麼更新。\n\n這條線也是和姊妹書的接點。「驗出陽性後到底多可能有病」這個後驗機率**怎麼算**，本書不重推——機率機制請看《馴服隨機》ch05。先說個你後面會用到的細節：那本書用的盛行率是 0.1%（後驗約 1.94%），本書**刻意改成 1%**（後驗約 16.7%），讓「驗出陽性」這件事剛好落在「有點可能、但遠不確定、所以值得認真做決策」的區間——這個差異是設計，不是手滑，後面每次引用都會提醒你。\n\n## 規範還是描述：這本書真正在追的東西\n\n到這裡，賭注和檢查都擺好了。但這本書的主角其實不是它們，而是夾在它們和「該怎麼選」之間的那道裂縫。要看見裂縫，得先把一個詞拆成兩半。\n\n「決策理論」這個詞，其實同時指兩門很不一樣的學問。它們長得像、用同一套符號、卻在回答**兩個不同的問題**：\n\n```text\n            規範（normative）                 描述（descriptive）\n            ─────────────────                 ─────────────────\n  問的是    你「應該」怎麼選？                 人「實際」怎麼選？\n            理性的選擇長什麼樣                 真實的腦袋怎麼運作\n\n  產出      一套演算法（期望效用最大化）         一套模型（展望理論）\n            從幾條公理逼出來                   從一堆實驗歸納出來\n\n  本書位置  Part I–II                         Part III\n            ch02–07 講「該怎麼選」            ch08–12 講「實際怎麼選」\n\n  招牌人物  馮紐曼、Savage                     康納曼、特沃斯基\n\n  代表句    「違反這條公理，你會被穩賺套利」   「人對變化估值，不對狀態估值」\n```\n\n這個區分是全書的中軸線，請花一分鐘把它焊牢。**規範**理論回答「該怎麼選」——它不太管人實際上怎麼做，它問的是「一個理性的決策者，面對這張表，邏輯上**必須**怎麼挑才不自相矛盾」。它的美，在於你只要接受幾條看起來無害到不行的公理（後面會講：完備、遞移、連續、獨立），這套理論就能**逼**出唯一的演算法。你幾乎沒得選——要嘛接受期望效用最大化，要嘛承認自己的偏好能被人牽著鼻子無限抽水。這是 ch03 的高潮，也是我認為這本書最該讓你「啊」一聲的地方之一。\n\n**描述**理論回答「人實際怎麼選」——它不管你該不該，它就是去看人在賭局前**真的**做了什麼，然後找出規律。而它找到的規律，驚人地穩定：人不是隨機亂選、不是「有時對有時錯」，而是**系統性地、可預測方向地**偏離規範理論。偏離本身能被另一套漂亮的數學（展望理論）描述到能預測你會往哪邊歪。\n\n於是這本書真正的那句話，那句它會反覆叩問你的話，是這個：\n\n> **規範理性（你該怎麼選）與描述現實（人實際怎麼選）之間，有一道穩定的裂縫。它不是 bug，是兩套都對的數學，在描述兩件不同的事。**\n\n請特別擋掉一個太容易上鉤的結論：「所以人是不理性的、所以那套漂亮的數學是錯的。」**不是這樣。** 規範理論沒有因為人不照做就失效，就像「最短路徑演算法」不會因為通勤族不走最短路就被推翻——它從來不是在預測人,它是在定義「最佳」。而展望理論也不是在罵人笨，它是在精確地描述「人實際把哪些東西算進去了」。兩套數學各自都對，只是回答的問題不同。能不能扛住這個張力、不滑進「所以人很笨」那個廉價結論，是讀懂這本書的門檻。ch12 和 ch17 會專門回來和解這道張力，但從本章起，你每讀一章都該問一次：這一章碰到的，是「該怎麼選」還是「實際怎麼選」？\n\n## worked example：把賭注翻成一個只有一格的決策\n\n本章不算數，但要示範一件事：怎麼把一句白話的「要不要賭」，翻成決策理論能處理的形狀。這個翻譯動作本身就是後面每一章的起手式，現在先練一次。\n\n```text\n白話：「擲公正硬幣，正面贏 200、反面輸 100，要不要接？」\n\n第 1 步：列出行動（你能控制的）\n   行動 = { 接這個賭, 不接 }                       ← 兩個選項，挑一個\n\n第 2 步：列出狀態（你控制不了、不確定的）\n   狀態 = { 正面, 反面 }\n   機率 = { 0.5,  0.5 }                            ← 公正硬幣，已知 50/50\n\n第 3 步：填報酬表（每個「行動 × 狀態」一格）\n                       正面 (0.5)      反面 (0.5)\n       接這個賭          +200            −100\n       不接                0               0\n\n第 4 步：寫成彩券記法\n       接 → L =（+200, 0.5; −100, 0.5）\n       不接 → L₀ =（0, 1）              ← 確定拿 0，一個退化的彩券\n\n第 5 步：問題定型\n       在 { L, L₀ } 之間挑一個。\n       這就是「一格決策」——單人、單步、機率已知。\n       後面整本書，都是在回答「這一格該挑哪個」，外加把\n       「機率已知」「只有一步」「沒有對手」這些假設一條條鬆開。\n```\n\n自我複核：這張表對嗎？行動兩個、狀態兩個、四個報酬格——對。機率加起來 0.5 + 0.5 = 1——對，沒有漏掉哪種世界。「不接」這一行兩格都填 0——對，因為不接就沒有任何金錢變動。記法 `L =（+200, 0.5; −100, 0.5）` 和上面基準表一致——對。這張表簡單到讓人想跳過，但請注意它已經藏了三個假設：① 機率是**已知**的（0.5/0.5，你信得過這枚硬幣）；② 報酬**等於金額**（效用就是你實際拿到的數字，沒有風險趨避或參考點）；③ 沒有**對手**（硬幣不會看你下注就偷偷變偏）。這三個假設，後面三個 Part 會分別拆掉：\n\n```text\n  鬆開「機率已知」    → 機率要靠證據去更新  → Part II（檢查線、貝氏）\n  鬆開「報酬＝金額」  → 報酬要換成效用、甚至看參考點 → ch03、Part III\n  鬆開「沒有對手」    → 對手會反應你的選擇  → ch16 交棒給《賽局》\n```\n\n預告一件會讓你停一下的事：**同一張表，ch02 用期望值算會說「接」，ch03 用期望效用算會說「拒絕」——而且兩個答案都對。** 不是其中一個算錯了。它們在回答「該不該接」時，偷偷用了不同的「該」。這就是為什麼一個四格的表，值得一本書。\n\n## 直覺的陷阱\n\n本章還沒進入任何具體機制，但有一個陷阱現在就該擋掉，因為它會毀掉你讀後面十七章的姿勢。\n\n**陷阱：把「人實際怎麼選」直接當成「人該怎麼選」的反證——一看到人偏離理論，就宣布「所以人不理性」或「所以那套理論沒用」。**\n\n```text\n  錯誤直覺在哪一步把你帶下溝：\n\n  你讀到「多數人拒絕一個期望值為正的賭」，\n  → 直覺第一反應：「那這些人不理性」或「期望值理論錯了」\n  → 你已經滑進溝裡了。\n\n  你預設了「規範理論就該預測人的行為」——但它從來不是幹這個的。\n  規範理論定義「最佳」，不預測「實際」；\n  說人偏離它，就像說「通勤族不走最短路、所以最短路演算法錯了」。\n```\n\n| | 大眾版（錯誤直覺） | 正確版（本書守住的） |\n|---|---|---|\n| 人拒絕正期望值賭 | 「人太膽小、不理性」 | 拒絕可能正是理性（凹效用下，見 ch03）；也可能是穩定的描述性偏離（展望理論，見 ch08–09）——兩種解讀都不是「笨」 |\n| 規範 vs 描述 | 「兩個衝突，必有一個錯」 | 兩套數學回答兩個不同問題，可並存、不互相否證（見 ch12、ch17） |\n| 展望理論 | 「證明了人不理性、期望效用沒用」 | 它是更好的**描述**，期望效用仍是合理的**規範**（見 ch12） |\n\n**怎麼自我察覺你掉進去了：** 當你心裡冒出「所以人很笨／所以這理論沒用」這種話，就是警報。停下來，問自己一句：**我現在說的是「該怎麼選」還是「實際怎麼選」？** 這兩個問題的答案不一樣，是正常的、是這本書的全部重點，不是矛盾。能穩住這個區分，你才讀得動 Part III；穩不住，展望理論在你眼裡就只剩「一堆人類很蠢的實驗」，那就把這本書最精彩的部分讀廢了。\n\n## 紙上推演\n\n本章是框架章，推演也是框架性的——練的是「把白話決策翻成三要素表」這個全書起手式，不是算數。全書純紙上推演，紙筆即可，不必碰任何程式。\n\n### 推演題\n\n**第 1 題（★，10 分鐘）** 用你自己的話，不照抄本章，定義決策的三要素：行動、狀態、報酬。然後說清楚一件事：為什麼「狀態」是你信念的所在、「報酬」是你價值的所在？如果有人把這兩者搞混（例如「我很想要正面，所以正面比較可能」），他犯了什麼錯？\n\n**第 2 題（★★，15 分鐘）** 挑一個你**真的**維運過的「要不要動作」決策（rollback、要不要擴容、要不要發 hotfix、要不要 page 某人……）。把它畫成一張完整的三要素表：列出至少兩個行動、至少兩個你當時不確定的狀態、把每個「行動 × 狀態」格子的報酬填上（用文字描述後果即可，不必算錢）。畫完後檢查三件事：機率有沒有漏掉某種世界？有沒有哪一格你其實填不出來、因為你根本沒想過那種狀態？哪一格的報酬最痛？\n\n**第 3 題（★★，15 分鐘）** 本章說脊椎賭注「期望值為正，多數人卻拒絕」。**先不要用效用、不要用任何後面章節的工具**，只用你現在的直覺，寫下三個可能的理由，解釋「為什麼一個期望值為正的賭，拒絕它也可能不是不理性的」。寫完後，把每個理由標上：它在質疑這張表的哪個部分——是質疑「報酬」（200 跟 100 的價值不對等？）、質疑「機率」（我不信這硬幣真的公正？），還是質疑「期望值」這個演算法本身（長期平均跟我這一次有什麼關係？）？\n\n### 推演解答\n\n**第 1 題：** 三要素中，**行動**是你能直接控制、要從中挑一個的選項集合；**狀態**是你控制不了、而且不確定的「世界到底是哪一種」；**報酬**是每個「行動 × 狀態」交叉格裡你實際拿到的後果。\n\n狀態是信念的所在，因為世界是哪一種**由不得你**——你只能去相信、去估機率、去蒐證據更新；你的願望改變不了它。報酬是價值的所在，因為每個結果有多好多壞，**完全是你的事**——同一筆錢、同一次當機，對不同人、不同處境，價值可以天差地別。把這兩者分開，是整套理論能往下走的關鍵：機率管狀態、效用管報酬，兩者最後相乘加總才得到決策（這正是 ch05 貝氏決策的形狀）。\n\n把兩者搞混的典型錯誤是「**我很想要它，所以它比較可能**」——把報酬（我多想要正面）偷渡進機率（正面多可能）。願望不改變機率。這個錯誤在工程上很常見：你**希望**這次只是抖動、不是真故障，於是不知不覺把「正在惡化」的機率在心裡調低了——這不是估計，是自我安慰。決策理論逼你把「我想要哪種」和「我相信哪種」寫在不同欄位，正是為了擋掉這種偷渡。\n\n**第 2 題：** 沒有標準答案，這題練的是「翻譯」這個動作本身。一個合格的答案長這樣（以 rollback 為例）：\n\n```text\n            狀態：只是抖動           狀態：正在惡化\n  rollback   白做幾天遷移工           止血成功，但仍白做遷移工\n             （早收手了，虧）         （幸好收手，但代價是遷移延後）\n  再觀察十分鐘  賺到，自己好了         一場 P0，凌晨被叫第二次 + 事後檢討\n```\n\n自我檢查的三個重點：(1) 你列的狀態有沒有蓋住所有可能的世界？很多人只列了「會好」跟「會壞」，漏了「會壞但慢到我來得及反應」這種中間狀態——漏掉的狀態，就是你決策時的盲區。(2) 有沒有哪格填不出報酬？填不出來，通常代表你當時根本沒沙盤推演那種情況。(3) 最痛的那格（這裡是「再觀察 × 正在惡化」），就是你真正在迴避的尾部風險——你後面的所有保守傾向，多半是衝它來的。\n\n**第 3 題：** 這題的目的是讓你**親手**指出裂縫在哪一塊，再由後面章節接手。三個合理的理由，分別質疑不同部分：\n\n```text\n  理由（直覺版）                          它在質疑表的哪部分    後面哪章接手\n  ──────────────────────────────         ──────────────       ──────────\n  「賠掉 100 的痛，比賺到 200 的爽更重」    報酬（價值不對稱）    ch03 效用 / ch09 損失趨避\n  「我才不信這硬幣真的剛好公正」            機率（50/50 可疑）    ch04 風險 vs 不確定\n  「期望值是長期平均，我只賭這一次」        演算法（EV 適不適用）   ch02 期望值的陷阱\n```\n\n常見錯路：很多人三個理由全擠在「報酬不對稱」那一格，沒意識到另外兩塊也能各自把賭注掀翻。這題若你三塊都點到了，恭喜——你剛剛獨立地畫出了 Part I 的地圖：ch02 質疑演算法、ch03 質疑報酬、ch04 質疑機率本身可不可信。另一個常見錯路是直接跳去用「效用」「展望理論」這些詞——但你還沒學它們，這題刻意要你用**裸的直覺**講，因為後面每一章的價值，正是把你這裡的裸直覺替換成精確的機制。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. **為什麼**一個決策最少只要三個零件（行動、狀態、報酬）就描述完了？少掉任何一個會怎樣——譬如一個沒有「不確定狀態」的問題，它還算不算決策？\n2. 「狀態是信念的所在、報酬是價值的所在」——用你自己的話講一遍，並舉一個把兩者搞混的例子。\n3. 脊椎賭注 `L =（+200, 0.5; −100, 0.5）`，本章只給了你一個數字和一個懸念。那個數字是什麼意思（不必算，講概念）？那個懸念又是什麼？\n4. 脊椎檢查（盛行率 1%、敏感度 99%、偽陽 5%），「真有病的人 99% 驗出陽性」跟「驗出陽性的人多可能真有病」，**為什麼**是兩個不同的數？哪一個是你真正想知道的？\n5. **規範**和**描述**的決策理論，各自回答哪個問題？為什麼說「人偏離規範理論」不等於「規範理論錯了」？舉一個非決策的類比。\n6. 為什麼說「人很笨」是讀這本書最該擋掉的結論？如果不是「笨」，那「人系統性地拒絕一個期望值為正的賭」這件事，該怎麼擺進你的世界觀？\n7. 把「要不要 rollback」翻成三要素表——你能在不看本章的情況下，當場畫出來嗎？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Decision Theory\"**（https://plato.stanford.edu/entries/decision-theory/）：規範與描述決策理論的權威概覽，本章「三要素＋規範/描述」的學術版。讀開頭的 framework 一節就夠，把行動是「從狀態到報酬的函數」這個 Savage 式定義講得很乾淨。\n- **《馴服隨機》ch05（貝氏定理）**：脊椎檢查線的後驗機率**怎麼算**在那本書。本書 ch05 起會反覆用結果、不重推機制；注意該書用盛行率 0.1%、本書用 1%，是刻意的差異。\n- **Daniel Kahneman,《快思慢想》（Thinking, Fast and Slow）**：展望理論作者本人寫的科普，是本書 Part III「描述」那一側的母本。現在不必讀，但 ch08 進入展望理論前翻一翻第四部（Choices）會很有感——本書補的是它略過的數學，它補的是本書略過的心理機制。\n- **Studocu / 各大決策論課程講義，\"Normative vs. Descriptive Decision Theory\"**（https://www.studocu.com/tw/document/national-tsing-hua-university/decision-making-and-game-theory/normative-and-descriptive-decision-theory/36876904）：把本章中軸「規範 vs 描述」用課堂語言再講一次，適合想看第二種講法把概念坐實的人。\n"}, {"id": "ch02-expected-value-st-petersburg", "file": "ch02-expected-value-st-petersburg.md", "group": "Part I — 理性的地基", "title": "ch02 — 期望值與它的陷阱：聖彼得堡", "md": "# ch02 — 期望值與它的陷阱：聖彼得堡\n\n> **本章解決什麼問題**：上一章把脊椎賭注 L=（+200, 0.5; −100, 0.5）擺上桌，只給了一個懸念——期望值 +50，多數人卻拒絕。這一章正式拆開「期望值（expected value, EV）」這個工具：它是什麼、為什麼好用到你天天在心裡用它、又在哪一格徹底崩壞。崩壞點有個名字——聖彼得堡悖論（St. Petersburg paradox），一個期望報酬無限大、卻沒有任何清醒的人願意多付的賭局。它是全書第一道裂縫的種子：期望值正確地告訴你平均報酬，卻不是你該付的價。下一章（見 ch03）會用「效用」把這道裂縫補上，但補丁本身又會帶來更深的問題。\n\n## 從你已知的出發\n\n你已經是期望值的熟練使用者，只是沒這樣稱呼它。\n\n回想你怎麼估「平均每次重試的成本」。一個外部 API 呼叫失敗率 2%，失敗後你 retry，每次 retry 多花 80ms。一次呼叫的「期望額外延遲」你會這麼算：0.98 次不重試（0ms）＋ 0.02 次重試（80ms）≈ 1.6ms。這就是期望值——把每個可能結果乘上它的機率，加起來。你算 P99 攤平後的平均延遲、算「這個 batch job 平均跑多久」、算「容量要預配多少才能在期望意義上不爆」，全都是同一個動作：**加權平均**，權重是機率。\n\n期望值之所以好用，是因為它有一個堅實的後盾：**大數法則**。當一件事可以重複很多次，長期的平均報酬會收斂到期望值。retry 這種事一天發生幾百萬次，所以「每次期望多花 1.6ms」是個踏實的工程數字——你拿它去估容量、估帳單，不會錯得離譜。期望值在「可重複、次數夠多」的世界裡，就是那個會真正發生的平均（機率機制與大數法則的嚴格版見《馴服隨機》ch13）。\n\n問題從這裡開始：**不是每個決策都可重複，也不是每個決策的尾部都溫和。**\n\n一次性的大遷移、一次凌晨三點的 rollback 賭注、一次「要不要砍掉跑了三個月的專案」——這些事你只做一次，做完就定生死，沒有「長期平均」可言。而當某個結果的代價極大（資料全毀、服務全掛），但機率極小時，期望值會把這個巨大的尾部「攤平」進那個漂亮的平均裡，讓你以為自己算清楚了，其實沒有。\n\n聖彼得堡悖論，就是這件事被推到極限的樣子：一個期望值算出來是「無限大」的賭局。如果你真的信「期望值＝該付的價」，你應該願意為玩它一次付出你全部的身家還嫌不夠。但你不會。本章要講清楚的，不是「你算錯了」——而是**期望值算對了，它就是無限大，可是它不是價**。\n\n## 期望值是什麼：長期平均，不是這一次\n\n先把定義釘死，因為後面整章都在打它的地基。一個彩券（lottery，決策論術語，指「結果＋機率」的組合）\n\n```text\nL = (x₁, p₁; x₂, p₂; … ; xₙ, pₙ)\n```\n\n它的期望值是\n\n```text\nE[L] = Σ pᵢ·xᵢ = p₁x₁ + p₂x₂ + … + pₙxₙ\n```\n\n每個結果乘上它的機率，全部加起來。脊椎賭注\n\n```text\nL = (+200, 0.5; −100, 0.5)\n\nE[L] = 0.5·(+200) + 0.5·(−100)\n     = 100 − 50\n     = +50\n```\n\n期望值 +50。\n\n這個 +50 是什麼意思？這是本章第一個要拆穿的直覺。它**不是**：\n\n- 不是「這一次會發生的」——這一次只會發生 +200 或 −100，永遠不會「發生 +50」。+50 從不出現在任何單次結果裡。\n- 不是「最可能的結果」——這個賭兩個結果各 50% 機率，沒有「最可能值」；就算有偏，期望值跟眾數（最常出現的值）也是兩回事。一個彩券 99% 機率得 0、1% 機率得 100，期望值是 1，但「最可能」永遠是 0。\n\n它**是**：如果你能把這個賭局**獨立重複玩很多很多次**，把每次的盈虧加總再除以次數，這個「每次平均」會越來越靠近 +50。玩一萬次，你大概贏個 50 萬上下（每次平均 +50）。這是大數法則保證的——次數越多，樣本平均越貼期望值。\n\n所以期望值的精確意義是「**可重複情境下的長期單次平均**」。它的力量全在「可重複」三個字上。retry 可重複（一天幾百萬次），所以期望值對它是踏實的；一次性的生死賭注不可重複，期望值對它只是一個你永遠經歷不到的虛擬平均。\n\n把這句話記牢，它就是聖彼得堡悖論的解剖刀。\n\n## 聖彼得堡賭局：一個期望值無限大的遊戲\n\n現在來看那個讓十八世紀數學家集體卡關的賭局。規則很簡單：\n\n> 擲一枚公正硬幣，一直擲到第一次出現**正面**為止。如果第一次正面出現在第 n 次投擲，莊家付你 2ⁿ 元。\n\n也就是說：\n\n- 第 1 次就正面（機率 1/2）→ 付 2¹ = 2 元\n- 第 1 次反面、第 2 次正面（機率 1/4）→ 付 2² = 4 元\n- 連兩次反面、第 3 次正面（機率 1/8）→ 付 2³ = 8 元\n- ……第 n 次才首次正面（機率 1/2ⁿ）→ 付 2ⁿ 元\n\n問題：你願意付多少錢買「玩這個賭局一次」的權利？\n\n工程師的直覺第一步：算期望值。我們逐項算，每一項是「這個結果的機率 × 報酬」：\n\n```text\n聖彼得堡賭局逐項期望值\n\nn（首次正面在第幾次）  機率 P     報酬 2ⁿ    貢獻 P·2ⁿ\n──────────────────────────────────────────────────────\n   1                  1/2        2          (1/2)·2   = 1\n   2                  1/4        4          (1/4)·4   = 1\n   3                  1/8        8          (1/8)·8   = 1\n   4                  1/16       16         (1/16)·16 = 1\n   …                  …          …          …\n   n                  1/2ⁿ       2ⁿ         (1/2ⁿ)·2ⁿ = 1\n──────────────────────────────────────────────────────\n                                            E[L] = Σ 1 = 1+1+1+… = ∞\n```\n\n每一項的機率剛好被報酬抵消，貢獻恆為 1。報酬以 2ⁿ 成長，機率以 1/2ⁿ 衰減，兩者完美相消。於是\n\n```text\nE[L] = Σ(n=1→∞) (1/2ⁿ)·2ⁿ = Σ(n=1→∞) 1 = ∞\n```\n\n期望值是無限大。\n\n我得在這裡按下暫停鍵——這個式子沒有任何一步算錯。級數真的發散，期望值真的是無限大。如果你只信「期望值＝該付的價」這條教條，那麼結論是：**你應該願意付任意大的金額——你全部的錢、加上你能借到的所有錢——來玩這個賭局一次。** 付一百萬玩一次是划算的，付十億也是。\n\n而這就是悖論：沒有任何一個清醒的人會這麼做。多數人玩這個賭局願意付的價，大概在十元上下、不會超過二、三十元。一個期望報酬無限大的賭局，真實意願價是個位數。理論說「付任意多」，每個人的胃說「付幾塊就好」。誰對？\n\n## 為什麼意願這麼低：尾部撐起了整個無限\n\n在跳到「效用」這個答案之前，先把無限大本身看清楚，因為這裡有個對工程師特別有用的洞見：**那個無限大，完全是由極其罕見的巨大尾部撐起來的。**\n\n無限的來源不是前面那些常見的小獎。前十項貢獻 1×10 = 10 元的期望值，這對應「絕大多數時候你會在前十次擲出正面」。而首次正面要拖到第 n 次的機率是 1/2ⁿ——拖到第 20 次的機率是 1/2²⁰，約一百萬分之一；拖到第 30 次約十億分之一。期望值之所以發散，是因為**每多等一級，報酬翻倍剛好補上機率減半**，於是無窮多個「幾乎不可能但報酬天文數字」的尾部結果，每個都頑固地貢獻 1，加起來沒有上限。\n\n我們可以用「截斷」把這件事量化。假設莊家不是無限有錢，他規定「最多付到第 N 次首次正面為止」（這也比較像現實——任何賭場、任何銀行都有有限的錢）。那麼期望值變成：\n\n```text\n截斷版聖彼得堡（最多付到第 N 次）\n\nE_N = Σ(n=1→N) (1/2ⁿ)·2ⁿ = Σ(n=1→N) 1 = N\n\nN = 10  → E = 10 元\nN = 20  → E = 20 元\nN = 30  → E = 30 元\nN = 40  → E = 40 元\n```\n\n看到了嗎？一旦尾部被截斷，期望值馬上變回一個很普通的有限數，而且增長極慢——要讓期望值到 40 元，莊家得準備好支付 2⁴⁰ ≈ 1.1 兆元的天價獎金（對應首次正面拖到第 40 次的那條極罕見路徑）。換句話說，**期望值從「漂亮的有限數」變成「無限」，全靠那條你這輩子幾乎不可能踩到的尾部。**\n\n這對你不該是新聞。你維運系統時就見過這個結構：\n\n- 一個「百萬分之一機率會觸發、但觸發就資料全毀」的 race condition，它對「系統期望損失」的貢獻可能比你天天在處理的小錯還大——因為損失額太巨大，把渺小的機率乘回來仍然可觀。\n- 容量規劃裡那個「黑色星期五級別」的尖峰，平時幾乎不出現，卻主導了你的最壞情況設計。\n- 重尾分布（heavy-tailed）裡，平均數可能被你永遠觀測不到的極端值主宰——你蒐集了一年的延遲數據算出的「平均」，可能在某次從未見過的尾部事件後完全失真。\n\n聖彼得堡是這個現象的純粹形式：**當尾部又罕見又巨大，期望值會被尾部綁架，變成一個不再代表「你會經歷到什麼」的數字。** 而一次性的賭局（你只玩一次聖彼得堡，不是玩一萬次取平均），大數法則的保護傘根本撐不開——你經歷到的幾乎一定是某個小獎，那個無限大的期望永遠不會在你身上「平均出來」。\n\n所以低意願價不是非理性。是你的胃比那條教條更早察覺到：**這是一個不可重複、尾部巨大的決策，期望值在這裡騙你。**\n\n## Daniel Bernoulli 的答案：效用不是金額（下一章的種子）\n\n那麼正確的處理方式是什麼？這個問題在 1738 年有了第一個漂亮的答案，而它正是整本書的轉折點。\n\n先把歷史擺正，因為這是個常被講錯的故事（landscape 標為 T3，我也查證過 2026-06）。這個賭局**不是** Daniel Bernoulli 發明的。最早提出它的是他的堂兄 **Nicolaus Bernoulli**，在 1713 年 9 月 9 日寫給法國數學家 Montmort（Pierre Rémond de Montmort）的一封信裡（原始版本用的是骰子，不是硬幣，但結構相同）。問題擺了二十五年沒有好答案。1738 年，**Daniel Bernoulli**（Nicolaus 的堂弟）在聖彼得堡科學院的期刊上發表了一篇論文〈Specimen Theoriae Novae de Mensura Sortis〉（《測量風險的新理論闡述》），提出了解法——這個賭局也因為發表在聖彼得堡而得名。\n\n所以正確版是：**問題是 Nicolaus 1713 年提出的，解是 Daniel 1738 年給的，名字來自發表地。** 別把這兩個 Bernoulli 搞混，也別說「Daniel 提出了悖論」。\n\nDaniel 的洞見，用一句話講就是本書下一章的全部：**人在乎的不是金額本身，而是金額帶給他的「好處」——而好處是邊際遞減的。** 第一個一百萬對一個窮人是命運的轉變，第一百個一百萬對一個富翁幾乎無感。Daniel 提議用「財富的對數」來衡量這個好處（他稱之為 moral value，後世叫它**效用**）：u(x) ≈ ln(x)。\n\n關鍵在於：對數成長**遠遠**慢於 2ⁿ 的線性（在對數尺度上）。當你算的不是「期望金額」而是「期望效用」時——\n\n```text\n期望效用（u = ln，示意）\n\nE[u] = Σ(n=1→∞) (1/2ⁿ)·ln(2ⁿ)\n     = Σ(n=1→∞) (1/2ⁿ)·n·ln2\n     = ln2 · Σ(n=1→∞) n/2ⁿ\n\n其中 Σ(n=1→∞) n/2ⁿ = 2（這個級數收斂）\n\nE[u] = ln2 · 2 = 2·ln2 ≈ 2·0.6931 ≈ 1.386 utiles（有限！）\n```\n\n期望**效用**收斂到一個有限值。報酬還是 2ⁿ 地往上爬，但效用 ln(2ⁿ) = n·ln2 只線性成長，被 1/2ⁿ 的機率衰減壓得死死的，級數收斂。於是「理性的人願付的價」對應到「能換得這麼多期望效用的金額」——一個有限、而且很小的數。意願價低不再是悖論，而是邊際遞減效用的必然後果。\n\n這就是「**效用不是金額**」的歷史起點，也是本書從 Part I 第二章交棒給第三章的那一棒。下一章會把這個 ln 換成全書統一的凹效用 u(x)=√(x+100)，用它重算脊椎賭注 L，你會看到同一個工具如何把「為什麼 EV 為正卻拒絕」算成一件理性的事（見 ch03）。\n\n但我要先誠實地補一刀，免得你把效用當成萬靈丹——這也是聖彼得堡最深的一層，多數科普不會講。\n\n## 效用沒有真正「解決」它（一個誠實的補刀）\n\n對數效用讓**這個**版本的聖彼得堡收斂了。但它沒有殺死悖論的核心，只是把它推到下一層。\n\n數學家 Karl Menger 在 1934 年指出（我在 2026-06 查證過這條，來源是 SEP 聖彼得堡條目）：只要莊家把獎金成長調得夠快，悖論就會復活。如果莊家不付 2ⁿ 元，而是付「能帶來 2ⁿ 個效用單位的金額」——也就是 e^(2ⁿ) 元——那麼期望效用又變回 Σ(1/2ⁿ)·2ⁿ = ∞ 了。對任何**無上界**的效用函數，都存在一個讓它重新發散的獎金結構。Menger 的結論很硬：**要讓聖彼得堡這類賭局永遠不發散，效用函數必須有上界**（人對「再多的好處」終究會麻木到趨近一個天花板）。\n\n我認為這是本章最值得你停十分鐘的地方。它告訴你：\n\n1. 效用不是把問題變不見的魔法，它是把問題**重新定位**——從「為什麼期望金額無限大不該付無限」變成「人的效用結構長什麼樣」。這個重新定位本身就是巨大的進步（它把一個算術謎題變成一個關於人的經驗問題），但它沒有「終結」討論。\n2. 期望效用最大化（下一章的主角）是一套漂亮到近乎強制的規範理論——但聖彼得堡從一開始就提醒我們，它的漂亮建立在一些對人類效用的假設上（例如有上界），而這些假設本身是經驗的、可被質疑的。\n\n這道「規範理論很美、但它的地基有經驗性的縫」的張力，會貫穿全書。聖彼得堡是你第一次摸到它。\n\n## 直覺的陷阱\n\n決策正是人類直覺與規範理論最常打架的地方，聖彼得堡這一章的陷阱尤其密集。守住正確版（對照 landscape 的 T1、T3）。\n\n| 你可能會這麼想（錯誤直覺） | 它在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|\n| 「期望值無限大，所以理性的人該付任意多錢玩」 | 把「期望值」直接當成「該付的價」。這一步偷渡了一個沒人證明過的等式：價格＝期望值。 | 期望值**不是**價。它正確地說「平均報酬發散」，但平均報酬不等於該付的價。Daniel Bernoulli 用邊際遞減效用指出，理性人的期望**效用**有限，故只願付有限。聖彼得堡是「期望值 ≠ 效用」的訊號，不是算術矛盾（T1）。|\n| 「期望值無限大一定是哪裡算錯了」 | 想去式子裡抓 bug。但式子沒有 bug——級數真的發散。 | 沒算錯。級數確實發散到 ∞。問題不在算術，在「把這個無限大當成行動依據」。把矛盾誤判成算錯，你會花力氣修一個沒壞的東西，錯過真正的教訓。|\n| 「期望值就是最可能發生的結果」 | 把期望值跟眾數（最常出現的值）混為一談。 | 兩者常常不相等，甚至 +50 這種期望值在脊椎賭注裡根本不是任何一個可能結果。期望值是長期平均，不是單次預測，更不是最可能值。|\n| 「期望值是 +50，所以這個賭一定值得接」 | 把「可重複的長期平均為正」直接套到「一次性決策該不該做」。 | 大數法則只在**可重複**時保證期望值會實現。一次性、不可重複、尾部巨大的決策，你經歷到的是單次結果不是平均值——這正是脊椎賭注被拒絕的種子（完整答案見 ch03）。|\n| 「是 Daniel Bernoulli 提出了聖彼得堡悖論」 | 把「提出解」記成「提出問題」。 | 問題最早由 **Nicolaus Bernoulli** 1713 年提出（致 Montmort 信）；**Daniel** 1738 年提出對數效用的**解**；名字來自發表地聖彼得堡（T3）。|\n\n**怎麼自我察覺**：當你發現自己在說「期望值是 X，所以應該……」時停一下，問三件事——(1) 這個決策可重複嗎？不可重複的話，那個平均你根本經歷不到。(2) 尾部溫和嗎？如果結論被一個極罕見的巨大結果主宰，期望值可能在騙你。(3) 我是不是把「期望值」偷偷當成了「該付的價／該做的事」？這三問任何一個觸警，你就站在聖彼得堡的溝邊了。\n\n## 紙上推演\n\n全程紙筆手算，不要碰任何程式。算完自己複核一遍。\n\n---\n\n**推演題 1（★，10 分鐘）— 脊椎賭注的期望值**\n\n脊椎賭注 L =（+200, 0.5; −100, 0.5）。\n(a) 算 E[L]。\n(b) 用一句話說明「為什麼這個賭被多數人拒絕，並不代表 E[L] 算錯了」。\n\n---\n\n**推演題 2（★★，15 分鐘）— 期望值無限為何不代表該無限下注**\n\n有人對你說：「聖彼得堡賭局期望值是無限大，所以一個理性的人應該願意付出他全部的身家來玩一次，越多越好。」這個論證錯在哪一步？請精確指出哪一個句子是「沒被證明就偷渡」的，並說明正確的圖像。\n\n---\n\n**推演題 3（★★，15 分鐘）— 截斷聖彼得堡，看見無限的來源**\n\n把聖彼得堡賭局改成「莊家最多付到第 N 次首次正面為止，超過第 N 次仍未出現正面則賭局結束、不再支付」。\n(a) 寫出截斷版期望值 E_N，並算 N=10、N=20、N=40 各是多少。\n(b) 用這個結果解釋「賭局的無限大期望值到底是從哪裡來的」。\n(c) 連到你的工作：舉一個「期望損失被一個罕見巨大尾部主宰」的系統情境。\n\n---\n\n### 推演解答\n\n**題 1 解答**\n\n(a)\n```text\nE[L] = 0.5·(+200) + 0.5·(−100)\n     = 100 + (−50)\n     = +50\n```\n複核：兩項機率和 = 0.5+0.5 = 1 ✓；加權平均落在 −100 與 +200 之間 ✓。E[L] = **+50**。\n\n(b) 因為期望值是「可重複情境下的長期單次平均」，不是「這一次的結果」，也不是「該不該做這個一次性決策」的最終依據。脊椎賭注是個一次性、且輸的那一端（−100）對你的痛可能遠大於贏的那一端（+200）的好——這要等效用登場才能精確說（見 ch03）。期望值 +50 算得完全正確；拒絕它的人不是在反駁「平均是 +50」，而是在說「平均不是我接這個一次性賭該看的東西」。**算術對，但算術不是決策的全部。**\n\n常見錯路：把「拒絕正期望值的賭」直接判成「不理性／膽小」。下一章會證明，在凹效用下這恰恰是理性的（landscape T4）。\n\n---\n\n**題 2 解答**\n\n錯誤藏在這一句：「**所以**一個理性的人應該願意付出全部身家。」這個「所以」偷渡了一個從未被證明的等式——**該付的價 ＝ 期望值**。\n\n正確的圖像分三層：\n\n1. 「期望值是無限大」——**這句是對的**，級數 Σ(1/2ⁿ)·2ⁿ = Σ1 確實發散。不要去式子裡找 bug，沒有 bug。\n2. 「期望值是該付的價」——**這句是錯的、而且沒人證明過**。期望值只是長期可重複情境的平均報酬；聖彼得堡是一次性的，那個無限大的平均你永遠經歷不到（你幾乎一定只擲幾次就中正面、拿個位數的小獎）。\n3. 正確的衡量是**期望效用**：Daniel Bernoulli 用 u=ln 算出期望效用有限（≈1.386 utiles，見正文），對應的願付金額也有限且很小。所以低意願價不是非理性，是邊際遞減效用的必然。\n\n一句話總結：**期望值算對了，但「期望值＝該付的價」是個沒人簽過字的假設，聖彼得堡正是來推翻它的。**（landscape T1）\n\n常見錯路：去質疑「機率怎麼可能讓報酬抵消」或「無限是不是不合法」——這是在攻擊正確的那一步（第 1 層），放過了真正的破綻（第 2 層那個偷渡的「所以」）。\n\n---\n\n**題 3 解答**\n\n(a) 截斷到第 N 次，前 N 項每項仍貢獻 1，第 N 項之後不再有貢獻：\n```text\nE_N = Σ(n=1→N) (1/2ⁿ)·2ⁿ = Σ(n=1→N) 1 = N\n\nN = 10 → E_10 = 10\nN = 20 → E_20 = 20\nN = 40 → E_40 = 40\n```\n複核：每一項機率 1/2ⁿ 乘報酬 2ⁿ 恰為 1，共 N 項，和為 N ✓。期望值就是「截斷在第幾級」這個數本身。\n\n(b) 無限大**完全來自尾部**。前十項只貢獻 10 元期望值（對應「幾乎一定會發生」的常見小獎）；要把期望值再往上推，得靠首次正面拖到第 20、30、40 次的極罕見路徑——它們機率小到（百萬分之一、十億分之一……）你這輩子幾乎踩不到，但報酬大到（2²⁰、2⁴⁰……）每一級仍頑固貢獻 1。把尾部一刀切掉，期望值立刻塌回有限的 N。**所以「無限」不是來自你會經歷的那部分，而是來自你幾乎不可能經歷、卻又無窮多級的巨大尾部。**\n\n(c) 工程情境（任一即可）：\n- 「百萬分之一機率觸發、觸發就靜默資料損毀」的 race condition——機率渺小，但損失額巨大，乘回來對「系統期望損失」的貢獻可能壓過你每天在處理的所有小錯。\n- 延遲的重尾分布：你用一年數據算的「平均延遲」，可能在某次從未觀測過的尾部事件後完全失真——平均數被你看不到的極端值綁架，正如聖彼得堡的期望值被尾部綁架。\n\n關鍵教訓：**當尾部又罕見又巨大、決策又不可重複時，期望值是個會騙你的數字。** 這正是脊椎賭注需要效用、需要 ch03 的原因。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先回答「為什麼」。\n\n1. 期望值 +50 在脊椎賭注裡，為什麼**從不**是任何一次的實際結果？「期望值」和「最可能結果」差在哪？\n2. 大數法則在期望值這件事上扮演什麼角色？為什麼「一次性、不可重複」的決策會讓期望值失去它的保護傘？\n3. 聖彼得堡賭局的期望值真的是無限大嗎？這是「算錯了」還是「算對了」？把這個區別講給一個堅持「無限一定有 bug」的同事聽。\n4. 那個無限大到底是從哪裡來的？為什麼把賭局截斷到第 N 次，期望值就乖乖變回 N？\n5. Daniel Bernoulli 1738 年的解，核心洞見用一句話是什麼？它跟「效用不是金額」是同一件事嗎？\n6. 聖彼得堡的歷史正確版是什麼？誰提出問題、誰提出解、名字哪來的？（別把兩個 Bernoulli 搞混。）\n7. 為什麼說「效用沒有真正解決聖彼得堡，只是把它推到下一層」？Menger 的「效用必須有上界」是什麼意思？\n8. 把這一章連到脊椎：期望值告訴你脊椎賭注是 +50，但全書要追的「裂縫」在這一章露出了哪個種子？\n\n## 延伸閱讀\n\n以下連結在 2026-06 查證過，優先放權威來源。\n\n- **Stanford Encyclopedia of Philosophy, \"The St. Petersburg Paradox\"**（https://plato.stanford.edu/entries/paradox-stpetersburg/）— 本章史實的主要依據。讀「History」一節看 Nicolaus 1713 致 Montmort、Daniel 1738、Cramér 的獨立發現；讀「Bounded utility」一節看 Menger「效用必須有上界」為何讓悖論在對數效用下也能復活。想把本章那條「效用沒真正解決它」的補刀弄透，這一節最值得。\n- **Daniel Bernoulli, \"Exposition of a New Theory on the Measurement of Risk\"（1738，英譯 1954 載於 *Econometrica* 22(1):23–36）**— 效用概念與對數效用的歷史原典英譯。讀它如何用「財富的效用」而非「財富本身」化解悖論——這是「效用不是金額」這整套思想的出生證明，也是下一章 vNM 期望效用的遠祖。\n- **Wikipedia, \"St. Petersburg paradox\"**（https://en.wikipedia.org/wiki/St._Petersburg_paradox）— 想看不同解法（有限銀行、有限時間、期望效用、邊際效用遞減）的快速地圖，這條最省事；對照 SEP 交叉核對年份與歸屬。\n- **期望值與大數法則的機率機制**——本章只用了「長期平均會收斂到期望值」這個結果，沒推它。想看期望值的嚴格機率定義與大數法則為何成立，見《馴服隨機》ch08 與 ch13；那裡會告訴你「可重複」這三個字背後到底是什麼數學在撐。\n"}, {"id": "ch03-utility-not-money", "file": "ch03-utility-not-money.md", "group": "Part I — 理性的地基", "title": "ch03 — 期望效用：為何效用不是金額", "md": "# ch03 — 期望效用：為何效用不是金額\n\n> **本章解決什麼問題**：上一章我們看見期望值在聖彼得堡賭局前崩潰——平均報酬無限，沒人願意付無限的賭金。這一章把崩掉的東西補回來：把「金額」換成「效用（utility）」，期望值就變成期望效用（expected utility, EU）。這個小動作有兩個我認為是全書最美的後果。其一，凹效用函數一出現，「拒絕一個期望值為正的賭」立刻從「膽小、不理性」變成「嚴格理性」——這正是脊椎賭注那道裂縫第一次被精確命名。其二，幾條你根本不會反對的公理（vNM 四公理），居然能**逼出唯一一種**理性的演算法：期望效用最大化。本章是 Part I「理性的地基」的承重牆，也是全書「規範之美」的第一個高潮；ch04 接著會問「如果連機率都測不出來呢」。\n\n## 從你已知的出發\n\n你早就在用效用，只是沒這樣叫它。\n\n凌晨三點 P0 當機，跟離峰時段的同一個服務掛掉，帳面上「損失的金額」可能一模一樣——都是少賺幾個小時的營收。但你心裡很清楚這兩件事**完全不是同一個重量**。凌晨三點的當機是 on-call 被叫醒、是睡眠債、是隔天整個團隊的判斷力打折、是 SLA 條款裡那個會被觸發的賠償門檻。同樣的金額，**對你的真實成本**天差地別。「真實成本函數」這個你天天在心裡跑的東西，就是效用函數，不是帳面數字。\n\n再看一個你更熟的形狀。容量規劃時，你寧可過度配置（over-provision）一點點——多開兩台機器的成本是線性的、可預期的、不痛不癢的；但**配置不足**導致的雪崩式故障，成本不是線性的，它會在某個臨界點突然爆炸。於是你心裡那條「賠掉 vs 賺到」的曲線是**不對稱**的：少賺一塊錢沒什麼，但在最糟的時候多賠一塊錢可能要命。「同樣多的錢，賠掉比賺到更傷」——這句工程直覺，數學上就叫**凹（concave）**，就叫**邊際效用遞減（diminishing marginal utility）**。你對快取命中率的既視感也是同一件事：命中率從 50% 拉到 60% 爽度很高，從 98% 拉到 99% 邊際效益小得多。同樣多的「增量」，越往上越不值錢——這就是凹。\n\n所以這一章不是要教你一個新東西，是要把你**已經在用的直覺**接上一個三百年前就寫好的數學，並且讓你看見：這個接法不是隨便接的，它幾乎是被逼出來的唯一接法。\n\n## 從金額到效用：那個改變一切的小動作\n\n回憶 ch02 的期望值定義。對彩券 `L = (x₁, p₁; x₂, p₂; …)`，期望值是把**金額**加權平均：\n\n```text\nE[L] = Σ pᵢ · xᵢ        ← 把「金額 xᵢ」用機率加權\n```\n\n聖彼得堡告訴我們這個量會誤導：它可以無限，但理性的人只願付有限。Daniel Bernoulli（丹尼爾·伯努利）1738 年在聖彼得堡科學院的期刊上給的解法簡單到近乎作弊——他說，理性的人最大化的不是金額的期望，是**效用**的期望。把上面那條式子裡的 xᵢ 換成 u(xᵢ)：\n\n```text\nEU(L) = Σ pᵢ · u(xᵢ)    ← 把「效用 u(xᵢ)」用機率加權\n```\n\nu 是**效用函數（utility function）**：一個把金額映射到「對你的價值」的函數。Bernoulli 主張 u 大致是對數的（u(x)≈ln x），財富越多，多一塊錢帶來的效用越小。這條對數曲線的尾巴壓得很扁，於是聖彼得堡那條「靠極大但極不可能的獎金撐起來」的無限尾巴，在效用世界裡被壓成有限的——理性的人願付有限，矛盾消失。（這是 Bernoulli 1738 的解，照事實基準；要注意悖論本身最早是 Nicolaus Bernoulli 1713 年寫給 Montmort 的信裡提出的，名字來自發表地聖彼得堡，不是 Daniel 提出的——見 ch02。）\n\n我請你停在這裡十秒，因為這個小動作的份量很容易被滑過去。**它沒有否定期望值的數學，它改寫了「期望值是對什麼東西取的」。** 平均報酬發散是對的；但「該付多少」問的是效用，不是金額。整本書要追的那道裂縫，種子就埋在這個替換裡：金額是世界的客觀屬性，效用是你的——一旦決策算的是效用，「理性」就有了個人的形狀。\n\n## 凹效用＝風險趨避：把脊椎賭注算到底\n\n現在我們把這套工具第一次套到全書脊椎那個賭注上。\n\n脊椎賭注（全書統一）：`L = (+200, 0.5; −100, 0.5)`，單位 NT$。擲一枚公正硬幣，正面贏 200、反面輸 100。ch02 算過它的期望值：\n\n```text\nE[L] = 0.5·(+200) + 0.5·(−100) = +100 − 50 = +50\n```\n\n期望值為正 +50。一個「期望值最大化」的決策者會毫不猶豫接受。但多數人會拒絕——包括你，多半也會。這不是膽小，是理性，我現在用效用把它算給你看。\n\n全書統一用這條凹效用：`u(x) = √(x + 100)`。這裡的 100 是**財富基準 W=100**——你不是從零開始賭，你身上本來就有相當於 100 單位的東西墊底，效用是建在「最終財富」上，不是建在「變化量」上（這個區別在 ch08 展望理論會變成主角，那裡的價值函數恰恰相反，是建在變化上的）。√ 是凹的：邊際遞減，跟你的容量規劃直覺同形。\n\n逐步算（每一步我都自己複核了一遍，不跳步）：\n\n```text\n不賭的效用（保持現狀，財富 = 100）：\n  u(不賭) = u(0)            ← 「不賭」= 財富變化 0，最終財富仍是 W=100\n          = √(0 + 100)\n          = √100\n          = 10\n\n賭的期望效用（兩個結果各代進 u，再加權）：\n  贏的那邊：u(+200) = √(200 + 100) = √300 = 17.3205   ← √300 ≈ 17.3205（校驗常數）\n  輸的那邊：u(−100) = √(−100 + 100) = √0   = 0         ← 輸掉 100，最終財富歸零，效用 0\n\n  EU(L) = 0.5·u(+200) + 0.5·u(−100)\n        = 0.5·17.3205 + 0.5·0\n        = 8.6603 + 0\n        = 8.6603\n\n比較：\n  EU(L) = 8.66   <   u(不賭) = 10\n  ────────────────────────────────\n  期望「效用」較低 ⇒ 理性的選擇是「不賭」\n```\n\n看清楚發生了什麼：**期望「金額」是 +50（賭比較好），期望「效用」卻是 8.66 < 10（不賭比較好）。** 同一個賭注，兩套演算法給相反的答案。而給「不賭」這個答案的那一套，正是規範理論說你**該**用的那一套。\n\n關鍵在那個 √0 = 0。輸掉 100 把財富打到底，效用直接歸零；而贏到 300 的效用只有 17.3，**不到** 10 的兩倍。因為曲線是凹的，越往上漲得越慢——贏的那邊帶來的效用增量（17.3−10=7.3），補不滿輸的那邊砍掉的效用（10−0=10）。機率對半，但效用的損失比效用的收益重。於是 EU 拉到 10 以下，理性的人收手。\n\n這就是**風險趨避（risk aversion）的精確意義**：不是性格、不是膽量，是「u 是凹的」這件事的純數學後果。背後是一條叫 Jensen 不等式的東西——對凹函數 u，`u(E[L]) ≥ E[u(L)]`：先平均再取效用，永遠不小於先取效用再平均。風險趨避就是這個不等式，一句話。（嚴格證明本書不展開，指向延伸閱讀與《馴服無限》談凹凸與導數；這裡給的是「工程師的嚴謹」：每一步我都能口頭說出理由——凹 ⇒ 邊際遞減 ⇒ 損失端的效用降幅大於收益端的效用升幅 ⇒ EU 被拉低。）\n\n我認為這是本書到目前為止最值得你停下來的一頁。三百年的爭論——「拒絕正期望值的賭到底理不理性」——答案是：**看你的 u 凹不凹。** 凹，就理性。風險趨避不需要辯護，它本來就是最大化期望效用的結論。\n\n### 確定等值與風險溢酬：把「值多少」反解出來\n\n既然賭注 L 的期望效用是 8.66，我們可以反問一個很實際的問題：**多少確定的錢，跟這個賭注一樣好？** 這個量叫**確定等值（certainty equivalent, CE）**——一筆「拿了就走、不賭」的確定金額，它的效用恰好等於賭注的期望效用。\n\n```text\n定義：u(CE) = EU(L)\n求解：√(CE + 100) = 8.6603        ← u(CE) = EU(L) = 8.66\n      CE + 100 = 8.6603²\n      CE + 100 = 75.0             ← 8.6603² ≈ 75.0（自我複核：8.66² = 74.99…≈75）\n      CE = 75.0 − 100\n      CE = −25.0\n```\n\n讀這個 −25：這個期望值 **+50** 的賭注，對你的價值等於「確定收到 −25」，也就是**確定賠 25**。你會花錢請別人把這個賭注拿走。然後是風險溢酬（risk premium）：\n\n```text\n風險溢酬 = E[L] − CE = (+50) − (−25) = +75\n```\n\n75 是你為了「躲開這個不確定」願意放棄的期望金額。期望值明明是 +50，你卻甘願把它整個吐出來、再倒貼 25——這 75 的縫，就是風險趨避用金錢標出來的價碼。你在容量規劃裡多開的那兩台機器、買保險時付的那筆保費，本質上都是在付這個風險溢酬。它不是浪費，是凹效用下理性地花錢買確定。\n\n### 對照一次：ln 效用怎麼解聖彼得堡\n\n為了把 ch02 的線收回來，這裡用對數效用快速對照一次聖彼得堡（全書只在這裡用一次 ln，其餘一律用 √）。聖彼得堡賭局：擲硬幣到首次正面，第 n 次正面付 2ⁿ。期望「金額」是 `Σ (1/2ⁿ)·2ⁿ = Σ 1 = ∞`，發散。但若你最大化的是 `u = ln(財富)`，假設你身上本有財富 w，玩這局的期望效用是：\n\n```text\nEU = Σ(n=1→∞) (1/2ⁿ) · ln(w + 2ⁿ)     ← 每項：機率 1/2ⁿ × 贏到 2ⁿ 後的對數效用\n```\n\n關鍵：ln(w + 2ⁿ) 大約隨 n 線性成長（ln(2ⁿ)=n·ln2），而前面的機率 1/2ⁿ 是指數衰減。指數壓線性，級數**收斂**——期望效用是有限的。有限的期望效用對應有限的願付金額。聖彼得堡的「無限」全部來自金額尾巴，一進對數效用就被馴服了。這就是「效用不是金額」最古老的證據，也是 Bernoulli 1738 的原始洞見。\n\n（一句點到、不展開：「該下多少注才不會破產」是另一個問題——Kelly 準則處理它，本書只當理論試金石、不教投注，細節指向延伸閱讀。）\n\n## vNM 四公理：幾條無害的規矩逼出唯一的演算法\n\n到目前為止我用的是 Bernoulli 的版本——「人最大化某個 u 的期望」。但這留了一個尷尬的洞：**憑什麼是 u 的期望？** 為什麼不是 u 的中位數、u 的最差情況、u 的某種別的混合？Bernoulli 沒回答這個。回答它的是 1944 年的馮紐曼（John von Neumann）與摩根斯坦（Oskar Morgenstern）。\n\n他們的書《Theory of Games and Economic Behavior》第一版是 1944 年出的；但**從公理推導期望效用的那段形式內容，是 1947 年第二版才補進附錄**（\"The Axiomatic Treatment of Utility\"）。科普常寫成「1944 年提出期望效用公理」，更精確是「1944 出書、1947 二版附錄給公理化」（事實基準 T2，引用時守住這個年份）。\n\n他們做的事，用工程的話講，是**從規格反推出唯一實作**。他們先寫下四條對「你的偏好」的約束——四條你看了會覺得「廢話，當然」的規矩。然後證明：只要你的偏好同時滿足這四條，你的選擇就**必然等價於**在最大化某個效用函數的期望。不是「可以這樣建模」，是「你**只能**這樣，否則你違反了你自己同意的某條規矩」。這個結論叫 **vNM 表現定理（representation theorem）**。\n\n四條公理（白話版，原文精確界定指向延伸閱讀）：\n\n| 公理 | 白話 | 違反它會怎樣 |\n|---|---|---|\n| 完備性（completeness） | 任何兩個彩券你都能比：要嘛偏好 A、要嘛偏好 B、要嘛覺得一樣好。不准說「沒法比」。 | 你「無法決定」——連賽局都還沒開始 |\n| 遞移性（transitivity） | 偏好 A 勝 B、B 勝 C ⇒ 必須偏好 A 勝 C。不准繞成一個圈（A>B>C>A）。 | 被當成 money pump 無限抽水（見下） |\n| 連續性（continuity） | 若 A 勝 B 勝 C，那存在某個機率 p，使「p 機率拿 A、否則拿 C」的混合彩券剛好跟 B 一樣好。——偏好沒有「無限好／無限壞」的斷層。 | 偏好出現無法被任何數字表示的斷崖 |\n| 獨立性（independence） | 若 A 勝 B，把同一個第三彩券 C 用同樣機率混進 A 和 B，偏好不該改變：混 A 的勝混 B 的。——共同的部分不該影響比較。 | Allais／Ellsberg 正是斷在這條（ch04／ch11） |\n\n讀這張表時，請帶著一個我認為很關鍵的觀察：**這四條沒有一條提到「期望」或「平均」。** 完備、遞移、連續、獨立——全是關於「你怎麼排序偏好」的結構性規矩，沒有一條偷偷塞進「你要算期望值」。然而表現定理證明：滿足這四條，你的選擇就**自動**等價於最大化某個 u 的**期望**。期望這個運算不是被規定的，是被這四條逼出來的。\n\n這就是我說的「規範之美」。你不是被命令去算期望效用；你是被問「你同不同意這四條」，你說同意，然後數學告訴你：那你已經在算期望效用了，你沒有別的選擇。（這裡我必須誠實標示嚴謹度：以上是**直覺與精神**，不是證明。表現定理的嚴格證明本書不展開，給直覺、指向延伸閱讀。我不會用「顯然」或「易證」蒙混——這個定理一點都不顯然，它是 20 世紀決策論的地基之一。）\n\n### money pump：違反公理為什麼會「漏錢」\n\n「四條公理你不會反對」這句話需要一點骨頭，否則只是修辭。最好捏的骨頭是遞移性——違反它的代價可以直接用錢量出來，這叫 **money pump（抽水幫浦）**。\n\n假設某人的偏好繞成一個圈：A > B > C > A（嚴格偏好，circular）。我來當那個牽你鼻子的人：\n\n```text\n起點：你手上拿著 C\n  ① 你偏好 B 勝 C  → 我說「付我 1 塊，我把 C 換成 B 給你」→ 你樂意付，因為 B 對你更好\n       現在你拿 B，我口袋 +1\n  ② 你偏好 A 勝 B  → 我說「再付 1 塊，把 B 換成 A」→ 你樂意付\n       現在你拿 A，我口袋 +2\n  ③ 你偏好 C 勝 A  → 我說「再付 1 塊，把 A 換成 C」→ 你樂意付\n       現在你拿 C，我口袋 +3 …… 而你又回到了起點 C\n  ↻ 回到①，無限循環。每轉一圈你付我 3 塊，東西卻回到原點。\n```\n\n注意每一步你都是**按自己的偏好**在行動、每一步都覺得自己換得更好——可是繞完一圈，你手上的東西沒變，錢卻少了 3 塊，而且可以無限榨下去。這就是違反遞移性的「代價」：你會被你自己的偏好牽著走進一個無底洞。（web 查證確認：money pump 只能榨**有循環的嚴格偏好**——A>B>C>A 這種；遞移但偶爾「沒法比」的偏好不一定能這樣榨，這是文獻裡的細緻處，本書點到為止。）\n\nmoney pump 把「公理不是品味問題」這件事講死了：你**可以**選擇有循環的偏好，但那等於在自己身上裝一個漏錢的洞。理性的最小公設不是某個教授的審美偏好，是「不要讓人能無限榨你」的自保。同一個精神在貝氏那邊叫 Dutch book（不自洽的信念會被組合成穩賠的賭局），那是 ch06 的事——你會看到「公理 ⇒ 不可被套利」這個結構在決策論裡反覆出現。\n\n## 直覺的陷阱\n\n決策正是人類直覺跟規範理論最常打架的地方，本章有兩個最常見的坑，兩個都很滑。\n\n| 錯誤直覺 | 在哪一步把你帶溝裡 | 正確版（守住） |\n|---|---|---|\n| 陷阱一：把效用當金額——「期望值為正就該接」 | 看到 E[L]=+50>0 就說「接啊，期望值正的」——漏掉了 u 的凹性，等於偷偷假設 u 是線性的 | 該算的是 EU 不是 E。u 凹時 EU(L)=8.66 < u(不賭)=10，拒絕才是最大化期望效用。金額是世界的、效用是你的，兩者不是同一個量。 |\n| 陷阱二：以為風險趨避是「膽小／不理性」（事實基準 T4） | 把「拒絕正期望值的賭」讀成性格缺陷，覺得「理性的人就該全接」 | 在凹效用下，拒絕正期望值賭注是嚴格理性（Jensen：u(E[L])≥E[u(L)]）。風險趨避＝u 凹這件事的純數學後果，不是膽量問題。「全接」反而是假設你風險中性（u 線性），那才是特例。 |\n\n**怎麼自我察覺你掉進去了**：\n\n- 陷阱一的徵兆——你發現自己在用「期望值是正的」當作「該接受」的**唯一**理由，卻說不出你的 u 長什麼形狀。一旦你停下來問「那如果輸的那邊不是 −100 而是 −10000 呢」，你會立刻不想接了——這就是你心裡的 u 其實是凹的證據，你只是剛才把它當線性了。\n- 陷阱二的徵兆——你在心裡偷偷鄙視「不敢賭」的人。但若你真信「拒絕正期望值＝不理性」，那你應該接受**任何**期望值為正的賭，包括「99% 機率破產換 1% 機率翻一千倍、但期望值勉強為正」的那種。你不會接。所以你其實是風險趨避的，你只是沒承認。風險趨避不是別人的毛病，是凹效用下每個正常人的理性常態。\n\n第三個值得提防的小坑：**把「u 凹」當成「u 一定是 √ 或 ln」**。√ 和 ln 只是本書選的兩條方便的凹曲線，不是物理定律。真正的規範內容是「u 凹 ⇒ 風險趨避」，至於你的 u 凹得多厲害（風險溢酬多大）是你個人的事，沒有標準答案。別把教學用的具體函數誤當成普世常數——這個提醒在 ch09 講展望理論參數時會變得更重要。\n\n## 紙上推演\n\n全部純紙筆手算，不要去跑任何程式。算完跟解答對，特別注意「常見錯路」。\n\n### 推演題\n\n**題 1（★★，20 分鐘）**：給效用函數 `u(x) = √(x + 100)`（財富基準 W=100）與脊椎賭注 `L = (+200, 0.5; −100, 0.5)`。手算：(a) E[L]；(b) EU(L)；(c) 確定等值 CE；(d) 風險溢酬。然後用一句話說明：為什麼期望值說「接」、期望效用說「拒」，哪個是規範上正確的，為什麼。\n\n**題 2（★★，口頭，15 分鐘）**：不准用 Jensen 不等式的名字，用你自己的話，向一個只懂「期望值」的工程師同事解釋：「為什麼**凹**效用就一定**風險趨避**？」要求他聽完能自己舉一個例子。\n\n**題 3（★★★，25 分鐘）**：造一個你工作中「明明期望值為正、你卻不會接」的真實賭注（例如某個有正期望收益但有小機率釀成大故障的架構變更），把它寫成彩券記法 `L = (好結果, p; 壞結果, 1−p)`。(a) 指出在什麼金額假設下它的期望值為正；(b) 論證你拒絕它這件事，蘊含你的隱含效用函數是凹的；(c) 額外問：你的 u 在「壞結果」那一端凹得特別厲害，這對應到什麼工程現實？\n\n---\n\n### 推演解答\n\n**題 1 解答**：\n\n```text\n(a) 期望值：\n    E[L] = 0.5·(+200) + 0.5·(−100) = 100 − 50 = +50\n\n(b) 期望效用：\n    u(+200) = √(200+100) = √300 = 17.3205\n    u(−100) = √(−100+100) = √0  = 0\n    EU(L)  = 0.5·17.3205 + 0.5·0 = 8.6603\n\n    對照不賭：u(0) = √(0+100) = √100 = 10\n    EU(L) = 8.66 < 10 ⇒ 拒絕\n\n(c) 確定等值 CE：u(CE) = EU(L) = 8.6603\n    √(CE+100) = 8.6603\n    CE+100 = 8.6603² = 75.0\n    CE = −25.0\n\n(d) 風險溢酬：E[L] − CE = (+50) − (−25) = +75\n```\n\n哪個正確：**期望效用（拒）是規範上正確的那一個。** 因為理性的選擇是最大化你**對結果的價值**（效用）的期望，不是最大化帳面金額的期望。金額的期望 +50 完全沒考慮「輸掉 100 把財富打到 0」對凹效用造成的重傷；效用的演算法考慮了，所以它說拒。\n\n**常見錯路**：(1) 把 u(−100) 算成「負的」——不對，u(−100)=√(−100+100)=√0=0，不是負數，重點是財富變化 −100 讓**最終財富**歸零，效用降到 0 而非變負。(2) CE 反解時忘記減 100，把 8.66²=75 直接當成 CE——CE 是金額變化，要 75−100=−25。(3) 把「期望效用比較低」說成「賭比較危險所以不賭」——這是對的結論但錯的理由，正確理由是「EU 較低」這個冷冰冰的數字，危險感只是它的副產品。\n\n**題 2 解答（要點）**：凹的意思是「邊際遞減」——同樣多的金額，越往上加，帶來的效用增量越小。現在賭一把「等機率贏 a 或輸 a」：贏的那邊你從現在的位置往上爬 a，但因為凹、上面那段爬得**慢**，賺到的效用少；輸的那邊你往下掉 a，但下面那段**陡**，掉掉的效用多。機率對半，可是「失去的效用」比「得到的效用」大，所以期望效用一定低於現狀——於是你拒絕。一句話：**凹 ⇒ 損失端的效用降幅大於收益端的升幅 ⇒ 公平甚至有利的賭也會讓期望效用下降 ⇒ 風險趨避。** 同事該舉的例子：「我現在有 100 萬，給我『等機率變 200 萬或變 0』我不要——因為從 100 萬掉到 0 的痛，遠大於從 100 萬漲到 200 萬的爽。」\n\n**常見錯路**：說成「因為可能會輸所以怕」——這是心理描述不是數學論證，沒解釋「為什麼明明期望值打平甚至為正還是拒」。關鍵字必須是「邊際遞減 ⇒ 兩端不對稱」，不是「怕輸」。\n\n**題 3 解答（示範一種）**：\n\n```text\n賭注：一次風險偏高的資料庫 schema 遷移（不停機方案）\n  好結果（順利）：省下未來 6 個月的維運痛苦，估值 +600（單位：某個你的效用幣）\n  壞結果（遷移中資料損毀）：估值 −1000\n  機率：你評估 p(順利)=0.9\n\n(a) 期望值 = 0.9·(+600) + 0.1·(−1000) = 540 − 100 = +440 > 0  ← 期望值為正\n(b) 但你不會接（你會先做雙寫、影子讀、可回滾，把壞結果機率壓到很低才動）。\n    「期望值為正卻拒絕」⇒ 你的 u 不是線性的；你對 −1000 的厭惡\n    遠超過 +600 的喜愛的兩倍弱（0.9:0.1 的機率本來偏向好結果），\n    這只可能是因為 u 在損失端陡、在收益端緩 ⇒ u 凹。\n(c) u 在「資料損毀」端凹得特別厲害，對應的工程現實是：\n    資料損毀往往不可逆、會連鎖（信任崩塌、合規問題、客戶流失），\n    它的真實成本是超線性的——這正是「凹效用」在最糟那端的具體模樣。\n```\n\n**常見錯路**：把「我不接」直接當成「期望值其實是負的我算錯了」——不，期望值真的是正的 +440，你拒絕它**不是**因為算錯期望值，而是因為你最大化的根本不是期望值。這正是本章的整個重點：拒絕正期望值賭注是理性的，前提是你的 u 凹。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂。優先回答「為什麼」。\n\n1. 從金額到效用，Bernoulli 改了什麼、沒改什麼？（提示：他沒否定期望值的演算法，他改了「期望是對什麼東西取的」。）\n2. 為什麼「u 凹」精確等於「風險趨避」？你能在不背 Jensen 名字的情況下講出兩端不對稱的論證嗎？\n3. 脊椎賭注 EU(L)=8.66 為什麼會 < u(不賭)=10？哪個結果、哪個效用值是把 EU 拉低的主因？\n4. 確定等值 −25 和風險溢酬 75 各自在回答什麼問題？風險溢酬 75 跟你買保險付的保費是同一種東西嗎，為什麼？\n5. vNM 四公理裡，哪一條都沒提到「期望」或「平均」，但表現定理卻逼出了「最大化期望效用」——這個「逼出」的力量，了不起在哪？你能用自己的話講給同事聽嗎？\n6. money pump 為什麼能把「違反遞移性」的代價用錢量出來？它只能榨哪一種偏好？\n7. 「風險趨避是膽小」這句話錯在哪？如果有人堅持「理性人該接受任何正期望值的賭」，你怎麼用一個極端賭注讓他自己反悔？\n8. 為什麼說 √ 和 ln 只是教學用的具體曲線、不是規範內容？真正的規範內容是哪一句？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，\"The St. Petersburg Paradox\"**（plato.stanford.edu/entries/paradox-stpetersburg/）：把聖彼得堡的歷史（Nicolaus 1713 提問、Daniel 1738 對數效用解）與「期望值≠該付的價」講得最乾淨的權威條目，讀「Bernoulli's resolution」那節，正好接本章 ln 對照。\n- **Stanford Encyclopedia of Philosophy，\"Expected Utility Theory\" / \"Decision Theory\"**：vNM 四公理與表現定理的標準直覺敘述，補上本章刻意不展開的證明骨架；想知道「為什麼這四條逼出期望」就讀這裡。\n- **von Neumann & Morgenstern,《Theory of Games and Economic Behavior》（1944；公理化在 1947 二版附錄）**：原典。不必硬啃全書，知道「期望效用公理化是 1947 二版補的附錄」這個年份，本身就能讓你在酒桌上糾正一個常見誤傳。\n- **Stanford Encyclopedia of Philosophy，\"Dutch Book Arguments\"** 與 money pump 相關條目：把「違反公理 ⇒ 可被穩賺套利」的精神講透；本章 money pump 與 ch06 的 Dutch book 是同一個結構的兩個面孔，先讀這裡能把兩章串起來。\n- 凹函數與邊際遞減的微分直覺，見《馴服無限》談導數與凹凸——本章的 Jensen 不等式 `u(E[L])≥E[u(L)]` 在那裡有圖像版；想看「凹」這件事的幾何長相就去那本。\n- 拒絕正期望值賭注的另一面（人實際怎麼算、為何 EV 為正仍拒）是描述性的展望理論，本書 ch08–09 用參考點＋損失趨避重算同一個脊椎賭注，與本章的凹效用殊途同歸、機制卻不同——讀完本章建議直接記住「等 Part III 我會用另一套數學再算一次這個賭」。\n"}, {"id": "ch04-risk-is-not-uncertainty", "file": "ch04-risk-is-not-uncertainty.md", "group": "Part I — 理性的地基", "title": "ch04 — 風險不是不確定：Knight 與 Ellsberg", "md": "# ch04 — 風險不是不確定：Knight 與 Ellsberg\n\n> **本章解決什麼問題**：前三章我們把「不確定下的決策」當成一回事在處理——機率乘以報酬，加權平均。這章要拆開「不確定」這個被你我天天混用的詞：機率**測得出來**的叫風險（risk），機率**測不出來**的叫不確定／模糊（uncertainty／ambiguity）。Knight 在 1921 年劃下這條線，Ellsberg 在 1961 年用一個三色甕證明：正常、聰明、受過機率訓練的人，對「測不出機率」這件事本身有獨立的趨避——而且這個趨避不是算錯，是對期望效用一條核心公理的乾淨拒絕。這是 Part I 的最後一章，也是全書「規範被現實掀翻」的第一槍（Allais 在 ch11 補第二槍）。\n\n## 從你已知的出發\n\n你上線一個新功能，依賴兩個外部服務。\n\n第一個是你自家的另一個 API，跑了三年，你手上有它過去 18 個月的錯誤率分布：p99 延遲、每月幾次 5xx、故障的時間分布你都查得到。你要不要為它加 retry、retry 上限設幾次、circuit breaker 的閾值設多少——這些你**算得出來**。你心裡那個「錯誤率 × 爆掉的代價」的乘法，每一項都有數字可填。這是**風險**。\n\n第二個是上週才接的某家第三方供應商，文件漂亮、demo 順暢，但你對它的真實故障率**一無所知**。沒有歷史數據，沒有同業口碑，連它背後是不是一台快撐爆的單機你都不知道。它的錯誤率可能是 0.01%，也可能是 5%,你**沒有任何依據**在這兩者之間選一個數字填進你的乘法裡。這是**不確定**——更精確地說，是**模糊（ambiguity）**。\n\n注意你對這兩者的反應有多不一樣。對第一個服務，你會理性地算閾值；對第二個，你會做一件「多算幾步也說不清為什麼」的事——你會**過度保守**。你會把它包在更厚的 timeout 裡、給它更嚴的熔斷、甚至先對 1% 流量放量觀察一個月。你不是在對某個你算出來的高錯誤率反應，你是在對「我根本不知道錯誤率是多少」這件事本身反應。\n\n這章就是要把這個直覺擰清楚：**你對「測不出機率」的額外保守，是一個真實、穩定、連理性人都會犯的現象，而且它違反的，正是 ch03 那套漂亮到近乎強制的期望效用公理。** 把賭注 L（ch01 那個 +200／−100 的硬幣）拿來，這章我們問一個新問題：**如果你連那枚硬幣公不公正都不知道呢？**\n\n## 兩個被混用成同義詞的詞\n\n先把詞定死。日常英文裡 risk 和 uncertainty 幾乎可以互換,中文「風險」和「不確定」也一樣。但在決策理論裡，自從 Frank Knight（奈特）1921 年的《Risk, Uncertainty and Profit》之後，這兩個詞指**兩件不同的事**。\n\n```text\n              不確定下的處境（你不知道會發生哪個結果）\n                          │\n            ┌─────────────┴─────────────┐\n            │                           │\n      風險（risk）                 不確定／模糊（uncertainty/ambiguity）\n      機率「測得出來」              機率「測不出來」\n            │                           │\n   你能填一個數 p 進去             你連 p 是多少都沒依據\n   例：公正硬幣 P(正)=0.5          例：來路不明的硬幣，P(正)=?\n   例：自家 API 歷史錯誤率          例：剛接的第三方供應商\n            │                           │\n      可保險、可下注                判斷、不可保險\n      （保險公司算得出保費）         （Knight：利潤來自承擔這個）\n```\n\nKnight 的原話大意是：**風險是「結果不確定、但機率可被測量」的處境；不確定是「結果不確定、而機率不可被測量」的處境**（risk＝probabilities capable of measurement；uncertainty＝not susceptible to measurement，Knight 1921，照 landscape）。後人把後者叫「Knightian uncertainty」（奈特式不確定），就是為了跟前面那個有機率可算的風險區分開。\n\nKnight 在意這條線，是因為他在解釋一個經濟學問題：**利潤從哪來？** 他的答案是——如果所有風險都可測（可保險），那承擔風險的人只是付保費、賺不到超額報酬；真正的利潤來自承擔那些**測不出機率、保不了險**的不確定。這個經濟學動機你不必深究，但記住那條界線的判準：**機率到底測不測得出來。**\n\n你會問：機率不是本來就「客觀存在、只是我們不知道」嗎？這是一個很深的哲學坑，我們不跳進去（機率到底是世界的性質、還是我們無知的度量，是「機率的詮釋」問題——見《馴服隨機》談頻率派、貝氏派、傾向詮釋三種看法）。這章只需要一個**操作性**的區分：在你做決策的當下，**你手上有沒有依據填一個具體的 p 進去**。有，是風險；沒有，是模糊。剛接的第三方供應商，它的真實故障率當然「客觀上有個值」，但你**現在**填不出來——對你的決策而言，它就是模糊。\n\n## 把賭注 L 拿來：同一個決定，風險版 vs 模糊版\n\n來把脊椎那個賭注（ch01／ch02／ch03 那個）放上手術台。\n\n**風險版**：擲一枚**你已知是公正**的硬幣，正面贏 NT$200、反面輸 NT$100。機率攤在桌上：P(正)=0.5、P(反)=0.5。ch02 算過 E[L]=+50；ch03 用凹效用 u(x)=√(x+100) 算過 EU=8.66<10，所以拒絕——而且那個拒絕是**理性的風險趨避**（凹效用的數學後果，不是膽小）。這一版的「不確定」全在硬幣的隨機性，但機率本身一清二楚。\n\n**模糊版**：同樣的賭局、同樣的 +200／−100，但這枚硬幣**來路不明**。可能公正、可能灌了鉛偏正面、可能偏反面，你**不知道**。它的 P(正) 可能是 0.5,也可能是 0.3 或 0.7,你沒有任何依據在這些值之間選。\n\n這兩版有什麼差別？一個**純規範**的期望效用主義者會跟你說：**沒差。** 既然你對 P(正) 一無所知，根據「無差別原則」（principle of indifference），你應該給它 0.5——對稱性下沒有理由偏向哪邊。於是模糊版該被當成風險版的同一道題來算，答案一樣是拒絕。理論上，乾淨俐落。\n\n但你的直覺不答應。多數人——包括你——對模糊版會**更不想碰**。同樣是 +200／−100、同樣（你被迫假設）是 50/50，可是「我連這硬幣偏不偏都不知道」這件事，讓你想離它更遠。這個「對模糊本身的額外趨避」就叫**模糊趨避（ambiguity aversion）**。\n\n問題來了：**這個額外的趨避，理性嗎？** 規範理論說它不該存在（無差別原則一套，模糊版就化約成風險版了）。你的直覺說它真實存在。誰對？\n\n這正是 Ellsberg（艾爾斯伯格）1961 年要回答的。而他的答案會讓你坐直身體：**不是「無差別原則對、你的直覺是 bug」，也不是「你的直覺對、無差別原則太天真」——而是「你的模糊趨避，數學上等價於拒絕期望效用的一條核心公理」。** 他用一個甕，把這件事證成了一個無法狡辯的兩難。\n\n## Ellsberg 三色甕：把「我不知道」逼成自相矛盾\n\n設定很簡單，簡單到你會懷疑它能證明什麼。\n\n```text\n一個甕，裝 90 顆球：\n   ┌────────────────────────────────────────────┐\n   │  30 顆紅        60 顆「黑 或 黃」          │\n   │  （已知數量）    （黑、黃各幾顆？不知道）  │\n   │  ● 紅=30        黑 + 黃 = 60，比例未知     │\n   └────────────────────────────────────────────┘\n   P(紅) = 30/90 = 1/3   ← 測得出來（風險）\n   P(黑) = ?  ∈ [0, 60/90]  ← 測不出來（模糊）\n   P(黃) = ?  ∈ [0, 60/90]  ← 測不出來（模糊）\n   但 P(黑) + P(黃) = 60/90 = 2/3   ← 這個和是已知的\n```\n\n你會從甕裡抽一顆球。Ellsberg 給你兩組各二選一的賭，每個賭「猜中顏色就贏 NT$100，否則 0」：\n\n```text\n第一組（二選一）：\n   賭 I  ：賭「紅」  → 抽中紅就贏 100      P(贏)=1/3       （機率已知）\n   賭 II ：賭「黑」  → 抽中黑就贏 100      P(贏)=未知       （機率模糊）\n\n第二組（二選一）：\n   賭 III：賭「紅 或 黃」→ 抽中紅或黃就贏 100   P(贏)=1/3+P(黃)  （含模糊）\n   賭 IV ：賭「黑 或 黃」→ 抽中黑或黃就贏 100   P(贏)=2/3        （機率已知）\n```\n\n把實驗做出來，結果極其穩定（1961 年至今無數次重做，照 landscape）：\n\n- **第一組多數人選 I（賭紅）**——「我知道紅是 1/3，黑我完全不知道，我選有把握的。」\n- **第二組多數人選 IV（賭黑或黃）**——「紅或黃我說不準（黃幾顆不知道），黑或黃我知道剛好是 2/3，我選有把握的。」\n\n兩次選擇都很有道理：**都選了「機率已知」的那一邊**，避開模糊。這就是模糊趨避，活生生的。\n\n現在看它為什麼自相矛盾。我們不需要知道黑、黃各幾顆，只需要假設你心裡**存在某個信念** P(黑)=b（不管 b 是多少，0 到 2/3 之間），看你的兩個選擇對 b 說了什麼。\n\n## Worked example：為什麼沒有任何 b 能同時合理化兩個選擇\n\n慢慢來，這是這章值得你停十分鐘的地方——你的直覺正要跟一條公理迎面相撞。\n\n我們把四個賭的「贏的機率」用 b＝P(黑) 表示。已知 P(紅)=1/3、P(黑)+P(黃)=2/3，所以 P(黃)=2/3−b。\n\n```text\n記 b = P(黑)，則 P(黃) = 2/3 − b，P(紅) = 1/3（固定）。\n\n賭 I  （賭紅）   ： 贏的機率 = P(紅)        = 1/3\n賭 II （賭黑）   ： 贏的機率 = P(黑)        = b\n賭 III（賭紅或黃）： 贏的機率 = P(紅)+P(黃) = 1/3 + (2/3 − b) = 1 − b\n賭 IV （賭黑或黃）： 贏的機率 = P(黑)+P(黃) = b + (2/3 − b)   = 2/3\n```\n\n獎金都是「贏得 100、否則 0」，所以期望效用就是「贏的機率 × u(100)」，比大小等於比「贏的機率」。把你的兩個選擇翻成不等式：\n\n```text\n你選 I 勝過 II（賭紅 > 賭黑）：\n        贏(I) > 贏(II)\n        1/3   > b                         …… (式 A)\n\n你選 IV 勝過 III（賭黑或黃 > 賭紅或黃）：\n        贏(IV) > 贏(III)\n        2/3   > 1 − b\n   ⇔    b     > 1 − 2/3\n   ⇔    b     > 1/3                        …… (式 B)\n```\n\n把兩條並排：\n\n```text\n   (式 A)   b < 1/3\n   (式 B)   b > 1/3\n   ───────────────────\n   同時要求 b < 1/3 且 b > 1/3   ⇒  無解（矛盾）\n```\n\n**沒有任何一個 b 能同時滿足兩條。** 也就是說：**不存在任何一組對「黑佔多少」的信念，能讓你的兩個選擇同時是期望效用最大化的結果。** 你選 I 等於宣稱「我認為黑少於 1/3」，你選 IV 等於宣稱「我認為黑多於 1/3」——同一個甕、同一顆即將被抽出的球，你對「黑有多少」的隱含信念在兩個選擇裡**自相矛盾**。\n\n我自己重核一遍上面的代數，確認沒跳步：\n\n```text\n式 B 推導複核：\n   2/3 > 1 − b\n   2/3 − 1 > − b\n   −1/3 > − b\n   兩邊乘 −1（不等號反向）：  1/3 < b   即 b > 1/3   ✓\n```\n\n對得上。這就是 Ellsberg 的手術刀：他沒有問你「黑有幾顆」，他讓你**用選擇暴露你的隱含機率信念**，然後證明這個信念無法自洽。\n\n值得停一下，看清楚這跟「賭徒謬誤」那類錯誤的本質差別。賭徒謬誤是**算錯**——以為連開五次紅、下一次黑的機率變高（其實沒變）；那是可以被糾正的算術錯誤，你指出來，受試者會說「啊對，我錯了」。Ellsberg 的受試者**沒有算錯任何一步**。你把上面的代數攤給他看，他會說：「我懂你的推導，每一步都對。但我**還是**選 I 和 IV，因為我就是不想賭一個我不知道機率的東西。」他不是被糾正，他是**拒絕**——拒絕那條說「你應該為模糊指定一個機率然後照辦」的公理。\n\n## 斷在哪條公理：確實事件原理（sure-thing principle）\n\n那條被拒絕的公理，在 Savage（薩維奇）1954 年的主觀期望效用體系裡叫**確實事件原理（sure-thing principle，又稱確定原理）**，它是 vNM **獨立公理**（ch03 那四條之一）在「主觀機率」版本下的化身。白話講它說的是：\n\n> **如果在「某個共同事件發生」時兩個選項給你一樣的結果，那麼你在它們之間的偏好，不該取決於那個共同部分是什麼。**\n\n套到三色甕上，那個「共同事件」就是**抽到黃球**。看清楚：\n\n```text\n                抽到紅      抽到黑      抽到黃\n   賭 I  （紅）    贏100       0          0\n   賭 II （黑）     0         贏100        0\n   ────────────────────────────────────────  「抽到黃」這欄：I、II 都是 0（共同）\n\n   賭 III（紅黃）  贏100       0         贏100\n   賭 IV （黑黃）   0         贏100       贏100\n   ────────────────────────────────────────  「抽到黃」這欄：III、IV 都是 贏100（共同）\n```\n\n看出來了嗎？**第二組（III vs IV）只是把第一組（I vs II）的「黃球那欄」從「都是 0」整列換成「都是 贏100」。** 除了這個共同欄，紅欄、黑欄的報酬一模一樣（I 與 III 在紅欄都贏、II 與 IV 在黑欄都贏）。\n\n確實事件原理說：既然「抽到黃」時兩個選項給你的東西**一樣**（第一組都 0、第二組都 100），那這個共同部分**不該影響你的偏好**。所以理性上：\n\n```text\n   偏好 I 勝過 II（在黃欄都=0 時，你偏紅）\n        ⇒ 必須  偏好 III 勝過 IV（黃欄整列換成 100，紅黑欄沒變，偏好該不變）\n```\n\n但多數人偏好 I **又**偏好 IV——把共同的黃欄一改，偏好就翻了。**這就是對確實事件原理的直接違反。** 換句話說：你的模糊趨避，不是一個無傷大雅的偏好；它在數學上**等價於**拒絕「共同部分不影響偏好」這條看起來無害到你根本不會反對的公理。\n\n這裡藏著本章最該被你用自己的話轉述的那個驚嘆點：**Ellsberg 沒有證明「人不理性」，他證明了一件更精細的事——人對「測不出的機率」的趨避，是一個穩定到可以被逼成數學矛盾的真實偏好，而它代價是放棄期望效用體系的一塊地基。** 你要嘛留著公理、承認自己的模糊趨避「不該有」；要嘛尊重自己的模糊趨避、承認期望效用不足以描述你。多數人——包括 Ellsberg 本人——選後者。\n\n順帶一提：這個 Daniel Ellsberg，就是後來 1971 年洩漏五角大廈文件（Pentagon Papers）的那位（軼事，hedge：兩件事是同一人，但本章只關心他 1961 年那篇 QJE 論文）。一個用三色甕把同行問到語塞的決策理論家，後來成了美國史上最著名的吹哨者之一——決策史的冷幽默之一。\n\n## 這對規範理論意味著什麼：Savage 想收編不確定，Ellsberg 給了反例\n\n退一步看歷史的張力。\n\nvNM（ch03）的期望效用很美，但它有個前提：**機率是客觀已知的**（彩券上明明白白寫著 0.5）。可現實裡大多數決策的機率**不是寫好的**——你做容量規劃時，「下季流量翻倍」的機率沒人發給你。Savage 1954 年的《The Foundations of Statistics》就是要補這個洞：他證明，只要你的選擇行為滿足一組公理（確實事件原理是核心），那麼就**好像**你心裡有一套**主觀機率**（subjective probability）和一條效用函數，你的選擇等價於拿這套主觀機率去最大化期望效用。\n\n這是個了不起的收編：它說「就算機率測不出來，理性的你也**應該**在心裡給每件事一個機率，然後照期望效用辦」——Knight 的「不確定」被一筆勾銷，全部化約成「主觀機率下的風險」。漂亮，但太漂亮了。\n\nEllsberg 的三色甕正是針對這個收編的反例。它說：**不行——人對模糊有獨立的趨避，這個趨避無法被任何一套自洽的主觀機率容納（我們上面證過：沒有 b 能同時合理化兩個選擇）。** Knight 的那條線不能被勾銷。模糊不是「還沒填好數字的風險」，它是一種**質**上不同的處境，人對它有質上不同的反應。\n\n那「先驗主觀機率到底能不能合理地填」這條線，我們留到 ch06 收（Ramsey／de Finetti 的 Dutch book 論證會說：你的主觀機率至少**得自洽**，否則被穩賺套利）。這章只立一件事：**風險和不確定是兩回事，而人對後者的趨避，是規範理論被掀翻的第一槍。** Allais（ch11）會用另一組對賭、從**同一條公理家族**（獨立／確實事件）再補一槍——到時你會看到 Ellsberg 不孤單。\n\n## 直覺的陷阱\n\n決策正是人類直覺與規範理論最常打架的領域，這章有兩個具名陷阱特別容易把你帶溝裡。\n\n| 陷阱 | 錯誤直覺長怎樣 | 它在哪一步帶你下溝 | 正確版（守住） |\n|---|---|---|---|\n| **把「風險」與「不確定」當同義詞**（T5） | 「不確定就是不確定，分那麼細幹嘛」 | 一旦你把模糊版的賭注**自動填上 0.5**（無差別原則），你就把模糊偷偷化約成風險，於是看不見「對模糊本身的趨避」這個真實現象——也就解釋不了自己為什麼對來路不明的第三方那麼保守 | Knight 的判準是**機率測不測得出來**。公正硬幣是風險，來路不明的硬幣是模糊；兩者你的理性反應**本來就該**不同，這不是你糊塗 |\n| **以為 Ellsberg 受試者「只是算錯機率」** | 「他們選 I 和 IV 是因為沒算清楚 P(黑)，算清楚就不會矛盾了」 | 你會把一個**對公理的拒絕**誤診成一個**算術錯誤**，於是以為「教育一下就好」——但你怎麼教都改不掉，因為根本沒有錯誤的算術可糾正 | 受試者**每一步機率都對**。矛盾不在他們的算術裡，在於「同時要 b<1/3 且 b>1/3」這個**他們的選擇所隱含**的不可能信念。他們是**拒絕**「該為模糊指定一個機率」，不是算錯（T5） |\n\n第三個更隱微的陷阱：**以為「無差別原則」幫你解決了模糊**。「我不知道偏哪邊，所以給 0.5，問題解決」——這句話聽起來無懈可擊，但它偷渡了一個強假設：**「我完全不知道」等於「兩邊機會均等」**。這兩者不一樣。「我有充分理由相信這枚硬幣公正」和「我對這枚硬幣一無所知」都讓你填 0.5,但它們是**不同的認知狀態**，而 Ellsberg 證明人的選擇**能分辨**這兩種 0.5——後者讓你想逃。怎麼自我察覺你掉進這個陷阱了？徵兆是：**當你發現自己對「機率算得出來的高風險」反而比「機率算不出來的中等風險」更敢碰時，你就是在對模糊本身反應，而不是對風險的大小反應。** 那一刻，無差別原則沒有真的幫你解決什麼，它只是把你的不安掃到地毯下。\n\n## 紙上推演\n\n全是紙筆推演，數值手算。建議拿筆。\n\n### 推演題\n\n**題 1（★，10 分鐘）** 把你系統裡的「風險」與「不確定」各找一個真實例子，並說清楚分類判準。要求：每個例子明確回答「機率測不測得出來、依據是什麼」，不准只是「感覺很不確定」。\n\n**題 2（★★★，25 分鐘）** 用三色甕證明「同時偏好賭紅與偏好賭非紅（黑或黃）」必然違反期望效用。要求：設 b=P(黑)，把四個賭的「贏的機率」用 b 表示，從兩個偏好各推一條對 b 的不等式，導出矛盾。然後用一句話說清楚這個矛盾**為什麼不是算錯**。\n\n**題 3（★★，15 分鐘）** 「模糊趨避為什麼不是算錯而是拒絕公理？」——口頭題，但請寫下你會怎麼跟一個堅持「他們就是沒算清楚」的工程師同事解釋。要求：你的解釋裡必須出現「確實事件原理」和「共同的黃球那一欄」。\n\n### 推演解答\n\n**題 1 解答。** 沒有標準答案，但好答案長這樣（區別判準是「機率測不測得出來」，不是「我緊不緊張」）：\n\n```text\n風險（機率測得出來）：\n   例：自家 API 的限流閾值該設多少。\n   依據：過去 18 個月每分鐘請求數的分布、p99、尖峰倍數，\n        都有 metrics。我能填一個具體的「超量機率」進成本計算。\n   → 這是風險：可以算期望成本最小的閾值。\n\n不確定／模糊（機率測不出來）：\n   例：剛接的第三方金流供應商，雙十一當天會不會掛。\n   依據：沒有歷史數據、沒有同業壓測報告、連它的架構都不透明。\n        我填不出「它當天故障」的機率。\n   → 這是模糊：我會做的不是「算」，是「過度保守」——\n     先漸進式放量、加更厚的 fallback、準備手動 failover。\n```\n\n常見錯路：把「後果嚴重」當成「不確定」。後果嚴重是報酬矩陣的事（ch03 凹效用、ch05 損失矩陣），跟「機率測不測得出來」是兩個維度。一個機率算得清清楚楚、但後果巨大的決策（比如已知 0.1% 機率的資料庫主從切換失敗），那是**高風險**、不是模糊。別把兩個維度混成一團。\n\n**題 2 解答。** 這是 worked example 的濃縮版，自己獨立做一遍才算過關。\n\n```text\n設 b = P(黑)，已知 P(紅)=1/3、P(黑)+P(黃)=2/3 ⇒ P(黃)=2/3−b。\n獎金「贏 100 / 否則 0」，故比期望效用＝比「贏的機率」。\n\n   賭 紅        ： 贏機率 = 1/3\n   賭 非紅(黑或黃)： 贏機率 = P(黑)+P(黃) = b + (2/3−b) = 2/3   ← 注意這是常數！\n\n等等——這裡要小心，題目問的是「賭紅」與「賭非紅」。\n「賭非紅」的贏機率剛好是 2/3（黑黃合起來是已知的 2/3），它不模糊。\n那矛盾從哪來？矛盾來自把它跟「第一組」對照（見下）。\n\n完整四賭（與正文同）：\n   賭 I  紅      ： 1/3\n   賭 II 黑      ： b\n   賭 III 紅或黃  ： 1 − b\n   賭 IV 黑或黃   ： 2/3   （＝「非紅」）\n\n偏好 I > II   ⇒  1/3 > b      …(A)  b < 1/3\n偏好 IV > III ⇒  2/3 > 1 − b  …(B)  b > 1/3\n\n(A) 與 (B) 並存 ⇒ b < 1/3 且 b > 1/3 ⇒ 無解，矛盾。 ∎\n```\n\n「為什麼不是算錯」一句話版：**每個機率都算對了，矛盾出在受試者的兩個選擇所隱含的 P(黑) 信念無法同時成立——這是偏好的不一致，不是算術的錯誤。** 他們不是把 1/3 算成別的數，他們是拒絕「該為黑指定一個固定的 b 然後照辦」。\n\n常見錯路一：把獎金 u(100) 的具體值代進去糾結。不用——四個賭獎金都是「贏 100／否則 0」，u(100) 是共同正係數，比大小時約掉，只剩「贏的機率」在比。常見錯路二：以為要知道黑、黃各幾顆才能證。正好相反，證明的力量就在於**不需要知道**——對任何 b 都導出矛盾。\n\n**題 3 解答。** 給同事的解釋（必須出現「確實事件原理」與「黃球那欄」）：\n\n> 你看這兩組賭，第二組只是把第一組裡「抽到黃球」那一欄的報酬整列改了一下——第一組賭紅和賭黑在「抽到黃」時都拿 0，第二組賭紅黃和賭黑黃在「抽到黃」時都拿 100。除了這個共同的黃球欄，紅欄黑欄的報酬完全沒變。確實事件原理說：既然「抽到黃」時兩個選項給你的東西一樣，這個共同部分就不該影響你的偏好——所以你在第一組偏紅，就**必須**在第二組也偏（紅黃）。但大家第一組選紅、第二組選（黑黃），偏好翻了。他們不是算錯機率，他們每一步機率都對；他們是**用選擇拒絕了**「共同部分不影響偏好」這條公理。你沒辦法靠教他算術修好這件事，因為根本沒有錯的算術。\n\n常見錯路：解釋成「他們高估了黑球的不確定性」。這還是把它當算錯。重點是**沒有任何一組對黑球的信念**能讓兩個選擇都對——問題不在「估得準不準」，在「再準也救不了，因為矛盾是結構性的」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 用一句話說 Knight 對「風險」和「不確定」的判準到底是什麼。（提示：不是「後果大小」，是「機率測不測得出來」。）\n2. 把脊椎賭注 L 的「風險版」和「模糊版」各描述一遍，並說清楚一個純規範的期望效用主義者為什麼會說「兩版沒差」。你同意嗎，為什麼？\n3. 為什麼說「無差別原則給 0.5」其實偷渡了一個強假設？「我有理由相信公正」的 0.5 和「我一無所知」的 0.5,差在哪？\n4. 不查正文，自己設 b=P(黑)，把三色甕四個賭的贏機率寫出來，導出 b<1/3 且 b>1/3 的矛盾。\n5. 為什麼 Ellsberg 的受試者「不是算錯」？把這句話講到一個堅持「他們沒算清楚」的人會閉嘴。\n6. 確實事件原理在三色甕裡，那個「共同事件」是抽到哪個顏色？為什麼把它從「都 0」換成「都 100」不該改變偏好？\n7. Savage 1954 想做的「收編」是什麼（把不確定化約成什麼）？Ellsberg 為什麼證明這個收編不完全成立？\n8. 為什麼說模糊趨避「違反公理但不是 bug」？這句話跟全書那道「規範 vs 描述」的中央裂縫是什麼關係？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Imprecise Probabilities」與「Decision Theory」條目** — 把「測不出機率」這件事在哲學上講透：無差別原則的麻煩、區間機率（imprecise probability）怎麼補。讀「為什麼一個數字的機率不夠用」那段，正是本章模糊版賭注的形式化。（landscape 驗證的 SEP 為一級科普來源）\n- **Daniel Ellsberg, 1961, \"Risk, Ambiguity, and the Savage Axioms,\" *Quarterly Journal of Economics* 75(4):643–669** — 原始論文，三色甕就出自這裡。讀前三節即可看懂全部論證，數學門檻不高、文筆極好；本章 worked example 是它的濃縮。\n- **Frank Knight, 1921, *Risk, Uncertainty and Profit*** — 風險／不確定區分的源頭（Online Library of Liberty 有全文）。讀第一篇第一章「The Place of Profit and Uncertainty in Economic Theory」即可掌握那條界線；後面的利潤理論可略。\n- **MIT News，「Explained: Knightian uncertainty」（2010）** — 一頁的科普導讀，把 Knight 的區分為什麼在 2008 金融危機後重新被重視講得很清楚。想快速複習「為什麼這條線到今天還重要」就讀它。\n- **《馴服隨機》談機率的三種詮釋（頻率派／主觀派／傾向派）** — 本章刻意不跳進「機率到底是什麼」的坑；那本書把「機率可不可測、是世界的性質還是無知的度量」講透，跟本章的風險／模糊區分互補。\n- **《賽局》談策略性模糊** — 本章的模糊是「自然不告訴你機率」；但有時模糊是**對手刻意製造**的（不讓你知道他的牌）。那種「故意讓你算不出機率」屬於多人賽局，見《賽局》談策略互動。\n"}, {"id": "ch05-bayesian-decision", "file": "ch05-bayesian-decision.md", "group": "Part II — 信念與證據", "title": "ch05 — 貝氏決策：信念 × 效用 → 行動", "md": "# ch05 — 貝氏決策：信念 × 效用 → 行動\n\n> **本章解決什麼問題**：Part I 把「不確定」當成一個固定的、已知的東西在處理（賭注的硬幣是 50/50、Ellsberg 的甕至少結構已知）。但你真實的決策不是這樣——你會**收到證據**，然後**改變信念**。這一章開始把「不確定」變成一個會隨證據更新的數，再把更新後的信念接上效用矩陣、算出該採取哪個行動。本章是 Part II（信念與證據）的第一章，脊椎的第二條線——醫療檢查——正式登場：一個陽性結果到底該不該讓你採取行動？這是「後驗 × 效用 → 最適行動」這條完整管線的第一次組裝，ch06 補「先驗從哪來」，ch07 補「要不要再蒐集一次證據」。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數   ◄ 你在這裡\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n## 從你已知的出發\n\n凌晨三點，P0 alert 響了：某服務的 5xx 比例跳上閾值。你被吵醒，盯著手機那行紅字，腦子裡其實在做一個非常精確的決策——只是你從來沒把它寫成式子。\n\n這個決策有兩個獨立的部分，你平常把它們糊在一起，但它們其實是兩件事：\n\n**第一部分：這個 alert 有多可能是真的故障？** 你心裡清楚，這條 alert 平常十次有八九次是偽陽——某個下游抖一下、某台機器 GC 卡頓、某個爬蟲打了一波。你知道「alert 響」這個證據，跟「真的出大事」之間隔著一個很大的折扣。你在心裡偷偷算的，就是 **P(真故障 | alert 響)**——這是一個**信念**，而且它不等於這條 alert 的命中率。一條敏感的 alert（真有事一定會響）跟「響了就真有事」是兩回事，這個差距就是後面整章的主角。\n\n**第二部分：就算多半是偽陽，我要不要爬起來查？** 這裡你算的是另一件事——**漏掉的代價**。如果真的是 P0、你翻身繼續睡，明天就是一場 postmortem、可能是一筆 SLA 賠償、可能是一個半夜被連鎖叫醒的團隊。相比之下，爬起來查一個假警報的成本只是十五分鐘的睡眠。所以即使你知道這多半是偽陽，你還是會爬起來——因為**「漏掉真故障」這一格的損失，大到壓過了「白忙一場」那一格**。\n\n注意這兩部分缺一不可。只看第一部分（「多半是偽陽，不理它」）的人會漏掉真 P0；只看第二部分（「漏掉很慘，每個 alert 都全力應對」）的人會 alert fatigue 燒乾。**你真正在做的，是把「信念」和「代價」乘在一起。** 這個乘法，就是這一章要講的貝氏決策（Bayesian decision）。\n\n你已經有的直覺，這一章只是把它擦亮、寫精確：\n\n- 你知道條件機率存在，知道「響了才有事」不等於「有事就會響」——這是貝氏定理在你工程腦裡的影子。\n- 你天天在權衡偽陽 vs 偽陰的代價——monitoring 閾值往哪邊調，本質是「漏報損失 vs 誤報損失」的損失矩陣。\n- 你做事不只看機率、還看後果——這正是貝氏決策跟「單純算個後驗」最關鍵的差別。\n\n這一章把脊椎的第二條線拉進來：一次醫療檢查決策。它跟 alert 的結構一模一樣——一個敏感的檢查、一個低基率的病、一個「驗出陽性後該怎麼辦」的行動選擇。我們會把它算到底。\n\n## 先複習：貝氏定理只是「按比例重新分配信念」\n\n貝氏定理的式子你大學看過，這裡只擦亮、不從零教（機制深入見《馴服隨機》ch05）。它在回答一個非常具體的問題：**我本來相信某件事的機率是 P(θ)，現在看到了證據 D，我該把信念更新成多少？**\n\n```text\n                P(D | θ) · P(θ)\n  P(θ | D) = ─────────────────────\n                    P(D)\n\n  後驗  =  概似 × 先驗 / 證據的全機率\n\n  ├ P(θ)     先驗（prior）：看到證據前，你相信 θ 的程度\n  ├ P(D | θ) 概似（likelihood）：若 θ 為真，看到這個證據的機率\n  ├ P(D)     證據出現的全機率（所有 θ 下看到 D 的加權和，當正規化常數）\n  └ P(θ | D) 後驗（posterior）：看完證據後，更新過的信念\n```\n\n一句話的直覺：**後驗 ∝ 概似 × 先驗**。後驗信念正比於「這個假設本來多可能（先驗）」乘上「若它為真、會看到這個證據的程度（概似）」。分母 P(D) 只是把所有可能性加起來、讓機率重新歸一，不影響哪個假設勝出，只決定刻度。\n\n我要你記住的不是式子，是它的**動作**：貝氏更新就是「按比例重新分配信念」。你本來把信念這塊餅切成幾塊（先驗），證據來了，它對每塊餅的支持度不同（概似），於是你**按支持度重新切這塊餅**（後驗）。沒有憑空多出來的信念，只有重新分配。\n\n這就是為什麼「敏感的檢查」會騙人。一個敏感度 99% 的檢查，意思是「若你真有病，它幾乎一定會喊陽性」——這是概似 P(陽|病) 很高。但它**完全沒說**「喊陽性的人裡有多少真有病」——那是後驗 P(病|陽)，還要乘上先驗（病有多罕見）。**這兩個條件機率被互換，是本章最致命的陷阱**，我們待會兒會專門解剖它。\n\n## 脊椎檢查線登場：盛行率 1%、敏感度 99%、偽陽 5%\n\n現在把脊椎的第二條線正式拉進來。設定如下（這組數字全書統一，各章不得另創）：\n\n- **盛行率（先驗）**：某病在人群中的盛行率是 1%。也就是隨機抓一個人，P(病) = 0.01。\n- **敏感度（真陽率）**：若你真有病，檢查喊陽性的機率是 99%。P(陽 | 病) = 0.99。\n- **偽陽率**：若你其實健康，檢查也可能誤喊陽性，機率 5%。P(陽 | 健康) = 0.05。\n\n> **與《馴服隨機》ch05 的刻意差異**：那本書講同一個醫療檢查、同樣的數學機制，但用的盛行率是 0.1%（後驗約 1.94%）。本書刻意把盛行率提到 **1%**，讓後驗落在 16.7% 這個「值得決策」的區間——0.1% 的版本後驗太低（驗出陽性也幾乎篤定沒病，決策很無聊），1% 的版本後驗 16.7% 不上不下，正好逼你去算「該不該治療」。貝氏定理的機率機制本身指向《馴服隨機》ch05，本章只用結果、不重推。\n\n問題：**一個人驗出陽性，他真的有病的機率是多少？**\n\n你的第一直覺多半會喊一個很高的數——畢竟檢查這麼準（敏感度 99%）。先把那個數記在心裡，等下對答案。我們用兩種完全獨立的方法算，互相驗算。\n\n### 方法一：貝氏公式直接代\n\n```text\n  P(病|陽) = P(陽|病)·P(病) / [ P(陽|病)·P(病) + P(陽|健康)·P(健康) ]\n\n  分子（真陽性的權重）：\n     P(陽|病)·P(病)     = 0.99 · 0.01  = 0.0099\n\n  分母第二項（偽陽性的權重）：\n     P(陽|健康)·P(健康) = 0.05 · 0.99  = 0.0495      ← 注意：健康者佔 99%\n\n  分母（所有陽性的全機率 P(陽)）：\n     P(陽) = 0.0099 + 0.0495 = 0.0594\n\n  後驗：\n     P(病|陽) = 0.0099 / 0.0594 = 0.16667 ≈ 16.7%\n```\n\n16.7%。驗出陽性，真有病的機率只有六分之一。剩下的六分之五——驗出陽性的人裡絕大多數——是健康的偽陽。\n\n關鍵在那個 0.0495。健康的人雖然每個只有 5% 偽陽率，但**健康的人實在太多了（佔 99%）**，5% 的偽陽乘上龐大的健康族群，產生的偽陽性數量（0.0495）遠遠淹沒了真陽性的數量（0.0099）。後驗低，不是因為檢查不準，是因為**病太罕見、健康者太多**。先驗（盛行率）才是這裡的隱形主角。\n\n### 方法二：自然頻率法（1 萬人想像實驗）\n\n公式對很多人是抽象的。換一種講法——想像一個具體的 1 萬人小鎮，每個人都來做這個檢查。這種「自然頻率」（natural frequency）的講法，被研究反覆證實能讓貝氏推理大幅變容易（Gigerenzer & Hoffrage 的一系列研究，把醫師答對醫療檢查題的比例從約 10% 拉到約 46%，2026-06 仍是這領域的標準範例，見延伸閱讀）。\n\n```text\n  想像 10,000 人，盛行率 1%：\n\n                          ┌──────────────────────────────────┐\n                          │         10,000 人                │\n                          └──────────────────────────────────┘\n                            │                       │\n              盛行率 1%     │                       │   99%\n                            v                       v\n                    ┌──────────────┐        ┌──────────────────┐\n                    │  100 人有病  │        │  9,900 人健康    │\n                    └──────────────┘        └──────────────────┘\n                      │         │              │            │\n          敏感度 99%  │         │ 1%   偽陽 5% │            │ 95%\n                      v         v              v            v\n                  99 真陽    1 漏掉         495 偽陽     9,405 真陰\n                  (陽性)    (偽陰)          (陽性)        (陰性)\n\n  陽性的人總共 = 99（真病）+ 495（健康偽陽）= 594 人\n  其中真有病的 =  99 人\n\n  P(病|陽) = 99 / 594 = 0.16667 ≈ 16.7%      ← 和方法一完全一致\n```\n\n兩種方法給同一個答案，這就是自我複核——不是把記憶裡的數字抄一遍，是用兩條獨立路徑撞出同一個 16.7%。自然頻率版還附帶一個禮物：你**看得見**那 495 個偽陽是怎麼來的。594 個被驗出陽性、緊張兮兮的人裡，只有 99 個真的生病，其餘 495 個白白被嚇一場。後驗 16.7% 不再是抽象的，是「594 人裡 99 人」這個你能在腦中數出來的比例。\n\n## 別停在後驗：把它接上效用矩陣\n\n到這裡，很多科普就結束了——「看，後驗只有 16.7%，所以別恐慌」。但**這在決策上是不夠的，甚至可能誤導你**。\n\n後驗只告訴你「真有病的機率」。它**沒告訴你該怎麼做**。「該不該治療」不只取決於你多可能有病，還取決於——**治療與不治療在每一種狀態下各自的後果有多嚴重**。一個 16.7% 的後驗，配上「漏治會死、治了只有點副作用」的後果，跟配上「漏治沒事、治了傷身」的後果，會給出**完全相反**的行動。\n\n這就是貝氏決策比「算個後驗」多出來的那一步：把後驗信念**接上效用矩陣**。\n\n### 效用矩陣：四格後果\n\n行動有兩個：{治療, 不治療}。世界的真實狀態有兩個：{病, 健康}。四種組合各有一個效用值（數字示意、單位是「決策者主觀的好壞」、全書一致）：\n\n```text\n                    │  狀態：病         │  狀態：健康\n  ──────────────────┼───────────────────┼──────────────────\n  行動：治療        │  u = −10          │  u = −20\n                    │  (對症治療，治好  │  (沒病卻治，白受\n                    │   但有治療負擔)   │   副作用/花費)\n  ──────────────────┼───────────────────┼──────────────────\n  行動：不治療      │  u = −100         │  u =   0\n                    │  (有病卻放著，    │  (沒病也沒治，\n                    │   後果最重)       │   最理想)\n```\n\n讀這張表的方式：每一格是「我選這個行動、世界其實是這個狀態」時的後果。最好的格子是「健康且不治療」（u=0，沒病也沒折騰）。最糟的是「有病卻不治療」（u=−100，漏掉真病）。治療不管哪種狀態都有點成本（−10 或 −20），因為治療本身有負擔。\n\n注意這張表編碼了一個價值判斷：**漏治真病（−100）比白治健康（−20）糟得多**。這是設計者的選擇，不是數學算出來的——醫療決策通常確實如此，但這四個數字本身是可調的，換一組數字結論會變（待會兒紙上推演就讓你調）。\n\n### 貝氏決策的完整公式：後驗加權的期望效用最大化\n\n現在把信念和後果乘起來。對每個行動 a，算它在後驗信念下的**期望效用**，然後選期望效用最大的：\n\n```text\n  a* = argmax  Σ  P(θ | D) · u(a, θ)\n        a      θ\n\n  白話：對每個行動，把「每種狀態的後果」用「該狀態的後驗機率」加權平均，\n        選那個加權後最不糟的行動。\n```\n\n這就是 Part I 講的期望效用最大化（ch03），只是現在機率不是天上掉下來的客觀 50/50，而是**從證據更新出來的後驗** 16.7%。規範的演算法沒變，換的是輸入的機率。這是 Part I 和 Part II 接榫的地方。\n\n### 代入算：陽性結果後，到底該不該治療？\n\n後驗：P(病|陽) = 0.1667，P(健康|陽) = 0.8333。代入兩個行動：\n\n```text\n  EU(治療 | 陽性):\n     = P(病|陽)·u(治療,病)  +  P(健康|陽)·u(治療,健康)\n     = 0.1667 · (−10)       +  0.8333 · (−20)\n     = −1.667               +  (−16.667)\n     = −18.33\n\n  EU(不治療 | 陽性):\n     = P(病|陽)·u(不治療,病) +  P(健康|陽)·u(不治療,健康)\n     = 0.1667 · (−100)      +  0.8333 · 0\n     = −16.67               +  0\n     = −16.67\n\n  比較： EU(不治療) = −16.67  >  EU(治療) = −18.33\n  ⇒  最適行動 a* = 不治療\n```\n\n停在這裡十分鐘，因為這個結論值得你的直覺打一架。\n\n**驗出陽性，最適行動竟然是「不治療」。** 你的直覺大概在尖叫「都驗出陽性了還不治？」——但算盤是冷靜的：陽性後雖然有 16.7% 機率真有病，但有 83.3% 機率是健康偽陽，而「健康卻硬治」這格的損失（−20）累積起來（0.8333·−20 = −16.67），略略壓過了「不治療」整體的期望損失（−16.67）。在這組效用數字下，治療的代價（要對 83% 的健康人施加 −20 的副作用）不划算。\n\n但這個結論**完全綁死在那四個效用數字上**。它不是「16.7% 後驗 ⇒ 永遠不該治」的普世真理。把「漏治真病」的後果調得更嚴重——比如那是一個漏治會致命的病——結論立刻翻轉。這正是貝氏決策的核心訊息：**後驗和效用一起決定行動，缺一不可。** 同一個 16.7%，配不同的效用矩陣，給相反的行動。\n\n### 翻轉點：當漏治的代價變大\n\n把 u(不治療, 病) 從 −100 改成 −500（漏治這個病會死，後果嚴重五倍），其餘不變，重算：\n\n```text\n  EU(不治療 | 陽性):\n     = 0.1667 · (−500)  +  0.8333 · 0\n     = −83.35           +  0\n     = −83.35\n\n  EU(治療 | 陽性) 不變 = −18.33\n\n  比較： EU(治療) = −18.33  >  EU(不治療) = −83.35\n  ⇒  最適行動翻轉成 a* = 治療\n```\n\n同樣的 16.7% 後驗，只因為「漏治的代價」從 −100 變 −500，最適行動就從「不治療」翻成「治療」。**後驗一個字沒變，行動卻反了。** 這把「光看後驗不夠」這句話釘死了：機率告訴你世界多可能是哪樣，效用告訴你每種樣子下你輸得多慘，缺任何一邊都會做出錯誤的決策。\n\n這也正好解釋了開頭的 P0 alert：你明知 alert 多半偽陽（後驗低），卻還是會爬起來——因為你的效用矩陣裡，「漏掉真 P0」那一格是 −500 不是 −100。你不是不懂機率，你是把機率和代價乘對了。\n\n## 那道裂縫：這一章站在規範這側，但縫已經露頭\n\n這本書反覆叩問一句話：**規範（你該怎麼選）和描述（人實際怎麼選）之間有道穩定的裂縫。** 這一章基本站在規範這側——貝氏決策是「給定信念與後果，你**該**怎麼選」的乾淨演算法，漂亮得近乎強制。\n\n但裂縫已經從一個地方露頭了：**人類算不出那個 16.7%。** 不是算術太難（自然頻率法一個小學生都會數），是人類的直覺有一個系統性的、可預測方向的偏誤——把 P(陽|病)=99% 直接當成 P(病|陽)。Casscells 等人 1978 年在哈佛醫學院的經典研究裡，問醫師、實習生、醫學生一個結構一模一樣的題目（盛行率 1/1000、偽陽 5%），**最常見的答案是 95%，正確答案約 2%**，只有約 18% 的人答對（2026-06 此研究仍是基率忽視的招牌證據，見延伸閱讀）。連受過訓練的醫師，直覺都被概似綁架。\n\n這就是後面 Part III 要展開的東西的預告：規範演算法（貝氏）說該算 16.7%，描述現實（人腦）卻穩定地喊出 95%。這道縫不是某個笨蛋的失誤，是**人類認知對「概似 vs 後驗」這個區分系統性看不見**。本章先把規範這側講透，縫的另一側（人為什麼這樣錯、雙系統怎麼運作）的心理機制指向《思考的陷阱》談基率忽視與捷思；而「信念如何作為證據被更新」的科學確證面，與本章互指（見《如何不騙自己》談貝氏確證）。\n\n## 直覺的陷阱\n\n決策正是人類直覺和規範理論最常打架的領域，這一章有兩個非常具名、非常致命的陷阱，都直接埋在脊椎檢查線上。\n\n| 陷阱 | 錯誤直覺長怎樣 | 它在哪一步把你帶溝裡 | 正確版 / 怎麼自我察覺 |\n|---|---|---|---|\n| **基率忽視（base rate neglect）** | 「檢查敏感度 99%，所以驗出陽性就有 99%（或 95%）機率有病」 | 把 P(陽\\|病) 直接當成 P(病\\|陽)——互換了兩個條件機率的方向，並完全忽略先驗（盛行率 1%）這個分母裡的隱形主角 | 真實後驗只有 16.7%。**自我察覺**：每次想喊一個高機率前，先問「健康的人有多少？他們貢獻多少偽陽？」病越罕見，敏感度再高，後驗也被偽陽淹沒。哈佛醫師都栽在這（Casscells 1978） |\n| **只看後驗、不看效用** | 「後驗才 16.7%，那當然不治療／不行動啊」 | 把「真有病的機率低」直接當成「該採取的行動」，跳過了效用矩陣這一步——機率低不等於漏掉的代價可以承受 | 後驗低 + 漏掉代價巨大（−500）⇒ 仍該行動。**自我察覺**：問自己「如果我猜錯了、而真相是最糟那種，我輸多少？」這格夠大時，低後驗也得行動（這就是你半夜爬起來查多半偽陽的 P0 的原因） |\n\n兩個陷阱方向相反但同源：**第一個忽略了先驗，第二個忽略了效用。** 一個完整的貝氏決策需要三樣東西——先驗、概似（更新出後驗）、效用矩陣——少任何一樣都會系統性地錯。基率忽視的人少了先驗的權重感，只看效用的人少了後果的權重感。\n\n還有一個更隱蔽的版本，工程師特別容易中：**把「敏感的偵測器」當成「準確的偵測器」。** 一條「真有事一定會響」的 alert（高敏感度）和一條「響了就真有事」的 alert（高後驗 / 高陽性預測值）是兩回事。你調 alert 把敏感度拉滿（怕漏），結果它在低基率的故障上瘋狂偽陽——這不是 bug，這是貝氏定理在收你的稅。要降偽陽，要嘛提高基率（只在更可疑的條件下觸發）、要嘛提高概似的鑑別力（讓真故障和雜訊的訊號差更大），單純調靈敏度只會讓你在 594 個陽性裡淹死。\n\n## 紙上推演\n\n全程純紙筆，不要打開任何程式。數值都能手算，建議你真的拿張紙算，因為這一章的反直覺要靠手算才會入腦。\n\n### 推演題\n\n**題 1（★★，[20 分鐘]）** 用兩種方法算脊椎檢查的後驗。\n盛行率 1%、敏感度 99%、偽陽率 5%。\n(a) 用貝氏公式直接算 P(病|陽)。\n(b) 用自然頻率法（想像 1 萬人）重算一次，畫出「病/健康 × 陽/陰」的四個數字，再算 99/594。\n(c) 兩個答案應該一致。用一句話說明「為什麼後驗這麼低，明明檢查這麼準」——關鍵是哪個數字？\n\n**題 2（★★，[15 分鐘]）** 翻轉最適行動。\n沿用後驗 16.7% 和效用矩陣 u(治療,病)=−10、u(治療,健康)=−20、u(不治療,健康)=0。\n(a) 先用原本的 u(不治療,病)=−100 算 EU(治療|陽) 和 EU(不治療|陽)，確認最適行動是「不治療」。\n(b) 把 u(不治療,病) 改成 −500，重算兩個期望效用，看最適行動是否翻轉。\n(c) 找出讓兩個行動「剛好打平」的那個 u(不治療,病) 臨界值（提示：令 EU(治療)=EU(不治療) 解一個一元方程）。\n\n**題 3（★★，[10 分鐘]）** 揪出混淆的條件機率。\n有人說：「他驗出陽性，這檢查九九%準，所以他九九%有病。」\n(a) 這句話把哪兩個條件機率搞混了？分別寫成 P(·|·) 的形式。\n(b) 「九成準」這個說法本身還藏了一個歧義——它可能指敏感度、也可能指別的，列出至少兩種它可能的意思。\n(c) 用一句話跟說這句話的人解釋他漏掉了什麼（提示：那 9,900 個健康的人）。\n\n### 推演解答\n\n**題 1 解答。**\n\n(a) 貝氏公式：\n\n```text\n  P(病|陽) = (0.99·0.01) / (0.99·0.01 + 0.05·0.99)\n           = 0.0099 / (0.0099 + 0.0495)\n           = 0.0099 / 0.0594\n           = 0.16667 ≈ 16.7%\n```\n\n(b) 自然頻率，1 萬人：\n\n```text\n  10,000 人，1% 盛行率\n    → 100 有病、9,900 健康\n  有病 100 × 敏感度 99%   = 99 真陽    （1 個漏掉=偽陰）\n  健康 9,900 × 偽陽率 5%  = 495 偽陽   （9,405 真陰）\n\n  陽性總數 = 99 + 495 = 594\n  P(病|陽) = 99 / 594 = 0.16667 ≈ 16.7%\n```\n\n(c) 兩法一致，16.7%。**關鍵數字是那 495 個偽陽**——它來自「健康者人數龐大（9,900）× 偽陽率 5%」。後驗低不是因為檢查不準（敏感度 99% 確實很準），是因為病太罕見，健康者就算只有 5% 偽陽，乘上龐大基數也能淹沒真陽。隱形主角是**盛行率（先驗）**。\n\n常見錯路：算成 99%（把敏感度當後驗，標準基率忽視）；或忘了分母要把偽陽也加進去，只算 99/100。\n\n**題 2 解答。**\n\n(a) 原矩陣，後驗 0.1667 / 0.8333：\n\n```text\n  EU(治療|陽)   = 0.1667·(−10)  + 0.8333·(−20) = −1.667 − 16.667 = −18.33\n  EU(不治療|陽) = 0.1667·(−100) + 0.8333·(0)   = −16.67 + 0      = −16.67\n  −16.67 > −18.33 ⇒ 最適行動 = 不治療 ✓\n```\n\n(b) u(不治療,病) 改 −500：\n\n```text\n  EU(不治療|陽) = 0.1667·(−500) + 0.8333·0 = −83.35\n  EU(治療|陽) 不變 = −18.33\n  −18.33 > −83.35 ⇒ 最適行動翻轉成 治療 ✓\n```\n\n(c) 臨界值。令 c = u(不治療,病)，求 EU(治療) = EU(不治療)：\n\n```text\n  EU(治療)   = −18.33               （固定）\n  EU(不治療) = 0.1667·c + 0.8333·0 = 0.1667·c\n\n  令相等：  0.1667·c = −18.33\n           c = −18.33 / 0.1667 = −109.96 ≈ −110\n\n  檢驗：c = −110 時 EU(不治療)=0.1667·(−110)=−18.34 ≈ −18.33 ✓\n```\n\n所以當「漏治真病」的後果劣於約 **−110** 時，最適行動就從「不治療」翻成「治療」。原本的 −100 剛好略好於這個臨界值，所以最適行動是不治療——但你看，它離翻轉點只差一點點。這正是要點：**結論對效用數字非常敏感**，−100 和 −500 給出相反行動，臨界就在 −110 附近。決策不是「後驗 16.7% ⇒ 標準答案」，是後驗與效用一起算出來的、而且可能在毫釐之間翻轉。\n\n常見錯路：以為「後驗低就一定不治療」（忽略了效用可以把它翻過來）；解臨界方程時忘了 u(治療) 那邊是固定的、只有 u(不治療) 隨 c 變。\n\n**題 3 解答。**\n\n(a) 搞混的是：\n- P(陽 | 病) = 0.99（敏感度——若有病、檢查喊陽的機率），和\n- P(病 | 陽) = 0.167（後驗——若喊陽、真有病的機率）。\n\n說話的人把前者當後者。這兩個條件機率方向相反，差了一個先驗和一個分母，數值差了將近六倍。\n\n(b) 「九成準」的歧義（至少兩種意思）：\n- 可能指**敏感度** P(陽|病)=99%（有病時抓得到）；\n- 可能指**特異度** P(陰|健康)=95%（沒病時不誤報，本題偽陽 5%）；\n- 也可能被外行當成**陽性預測值** P(病|陽)（驗出陽性後真有病）——但這才 16.7%，根本不到九成。\n「準」是個含糊詞，它把至少這三個截然不同的量糊成一個，正是基率忽視的溫床。\n\n(c) 一句話解釋：「你忘了那 9,900 個健康的人——他們每人雖然只有 5% 機率被誤判成陽性，但人數太多，光偽陽就有 495 個，把 99 個真陽淹沒了。所以陽性的人裡只有 99/594、約六分之一真有病。」\n\n常見錯路：只反駁「九成不對」卻說不出該換成多少、也說不清錯在哪一步（沒指出是先驗被忽略 + 條件機率方向被互換）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 貝氏定理的一句話直覺是什麼？為什麼說它是「按比例重新分配信念」、而不是「憑空產生新信念」？\n2. 敏感度 99% 的檢查，驗出陽性後真有病的機率為什麼只有 16.7%？那 495 個偽陽是怎麼冒出來的？盛行率在這裡扮演什麼角色？\n3. 為什麼「光算出後驗 16.7%」還不足以做決策？貝氏決策比「算個後驗」多了哪一步？\n4. 同樣是 16.7% 的後驗，為什麼把 u(不治療,病) 從 −100 改成 −500，最適行動就翻轉了？這說明機率和效用在決策裡各扮演什麼角色？\n5. 基率忽視具體是把哪兩個條件機率搞混了？為什麼連受過訓練的醫師都會中（Casscells 1978）？\n6. 自然頻率法（1 萬人）為什麼比貝氏公式更容易讓人算對、也更容易說服別人？它讓哪個原本隱形的東西變得看得見？\n7. 把這章接回你的工程直覺：為什麼你明知 P0 alert 多半偽陽（後驗低），卻還是會半夜爬起來查？用「後驗 × 效用」這個框架講一遍。\n8. 這一章站在「規範」還是「描述」這側？裂縫從哪裡露頭了——規範演算法說該算什麼、人腦卻穩定地喊出什麼？\n\n## 延伸閱讀\n\n- **Casscells, Schoenberger & Graboys, \"Interpretation by Physicians of Clinical Laboratory Results\"（New England Journal of Medicine, 1978）** — 基率忽視的招牌實驗，哈佛醫師面對「盛行率 1/1000、偽陽 5%」最常答 95%（正確約 2%）。讀它就為了體會：這個陷阱不是外行才中，是人類認知的系統性盲點。https://www.nejm.org/doi/full/10.1056/nejm197811022991808\n- **Gigerenzer & Hoffrage 的自然頻率研究（如 \"How to Improve Bayesian Reasoning Without Instruction\", Psychological Review, 1995；及後續綜述）** — 為什麼把機率改寫成「1 萬人裡有幾個」就能讓正確率從約 10% 跳到約 46%。本章方法二的理論根據，也是你日後要跟非技術同事解釋偽陽性時的最佳武器。可從 Gigerenzer 的綜述文章入手。\n- **《馴服隨機》ch05** — 貝氏定理的機率機制本身（後驗為何 ∝ 概似×先驗、條件機率的推導）。同一個醫療檢查題、但用盛行率 0.1%（後驗約 1.94%）；對照本書的 1%（16.7%）正好看出「先驗一動、後驗大變」。本章只用結果、機制看那裡。\n- **《如何不騙自己》談貝氏確證** — 把「信念如何被證據更新」從「決策演算法」換成「科學如何防自欺」的視角，與本章互指。同一個貝氏更新，這裡用來決定行動、那裡用來確證假說。\n- **《思考的陷阱》談基率忽視與捷思** — 本章只講基率忽視的**規範後果**（該算 16.7% 卻喊 95%）；它的**心理機制**（為什麼人腦看不見先驗、捷思怎麼運作、為何察覺不到）在那本書。理性三角的另一角。\n- **Berger, \"Statistical Decision Theory and Bayesian Analysis\"（Springer, 1985）** — 想看「後驗 × 損失 → 最適行動」這條管線的嚴格版（Wald、Savage 一脈的統計決策理論）。本章給的是直覺與精神，這本給的是公理與證明，行有餘力再翻。\n"}, {"id": "ch06-where-priors-come-from", "file": "ch06-where-priors-come-from.md", "group": "Part II — 信念與證據", "title": "ch06 — 先驗從哪來：信念可以有數學", "md": "# ch06 — 先驗從哪來：信念可以有數學\n\n> **本章解決什麼問題**：上一章的貝氏決策（見 ch05）有一個被刻意跳過的零件——那個「盛行率 1%」的先驗（prior）是從哪來的？整套後驗×效用的管線，源頭是一個你「事前就相信」的機率。但你憑什麼把信念寫成一個數？萬一兩個人對同一件事先驗不同怎麼辦？這一章把這個零件補上：主觀機率（subjective probability）為什麼不是「隨便喊」，而是一套受約束、可被穩賺套利懲罰的東西；貝氏更新（Bayesian updating）如何把證據一筆筆消化成新信念；以及頻率派（frequentist）與貝氏派（Bayesian）為什麼為了「機率到底是什麼」吵了一個世紀。這同時把 ch04 Ellsberg 留下的那條「主觀機率」線收回來，並預告 Part V 的「理性是什麼」。\n\n## 從你已知的出發\n\n你每天都在「事前相信一個機率」，只是沒把它寫成小數點。\n\n凌晨三點，一個服務的延遲突然飆高。在你看任何 log 之前，你腦子裡已經有一張排序：最可能是上游那個剛改過的 DB query（你心裡給它七成）、其次是某個快取節點掛了（兩成）、剩下的長尾是網路、是 GC、是某個你還沒想到的鬼（一成）。這張「還沒看證據前的懷疑度排序」，就是**先驗**。\n\n然後你開始看證據。你拉出 DB 的 slow query log——如果那個 query 真的慢爆了，你看到它的機率很高；如果 DB 一切正常，你看到「慢 query 滿屏」的機率就很低。這個「在某個假設成立的前提下、看到這份證據的可能性」，叫做**概似（likelihood）**。你看完 log，心裡那張排序就更新了——DB 從七成跳到九成五，或者反過來，DB 的 log 乾乾淨淨，你的懷疑瞬間轉向快取。**這就是貝氏更新**：先驗 × 概似 → 後驗，後驗再變成你下一步排查的新先驗。\n\n你做 incident 診斷的整個過程，就是一條沒寫成公式的貝氏管線。feature flag 漸進式放量也是——先驗是「這版大概安全」，每放一批拿到一批錯誤率數據（概似），更新「這版到底安不安全」的後驗，後驗夠高才全面上線。金絲雀部署（canary）是序貫貝氏（sequential Bayesian）的教科書範例：你不是一次決定，而是一邊放量一邊更新信念。\n\n但這裡藏著上一章沒回答的問題。ch05 的脊椎檢查線，我直接給了你「盛行率 1%」當先驗，然後算出後驗 16.7%。可是那個 1% 是哪來的？如果換一個人，他憑經驗覺得盛行率是 5%，他算出的後驗會完全不同。那麼——\n\n- 先驗如果是「主觀」的，貝氏決策算出來的後驗豈不是「你想要它是多少就是多少」？\n- 兩個理性的人可以對同一件事有不同先驗，那「機率」到底還客觀不客觀？\n- 「先驗從哪來」這個問題，是不是整套貝氏方法的阿基里斯腱？\n\n這一章就是來回答這三問的。先講結論：先驗確實可以是主觀的，**但主觀不等於隨便**——它受一條很硬的約束綁著，違反就會被人穩賺你的錢。\n\n## 主觀機率：把信念當賭率\n\n先把「機率是什麼」這個你以為早就懂的東西，重新看一眼。\n\n機率至少有兩種讀法（三種詮釋的完整版見《馴服隨機》談機率的詮釋）。一種是**頻率**讀法：P(正面)=0.5 的意思是「擲很多很多次，正面的比例趨近一半」。這個讀法漂亮、客觀，但它有個硬限制——它只對**可重複**的事有意義。「這枚特定硬幣下一擲是正面的機率」、「2027 年台灣會不會發生規模 7 地震」、「我這次 incident 是 DB 引起的機率」——這些事要嘛只發生一次、要嘛根本不能重複，頻率讀法無話可說。\n\n另一種是**主觀**（或叫**信念度**，degree of belief）讀法：機率是「你對某件事為真的相信程度」。在這個讀法下，「這次 incident 是 DB 的機率 0.7」是個完全合法、有意義的句子，即使這次 incident 不可重複。它說的是你的**信念狀態**，不是世界的長期頻率。\n\n工程師讀到這裡的第一反應通常是警鈴大作：「信念度？那不就是憑感覺喊一個數嗎？這還能叫數學？」這個警鈴是對的方向，但結論下早了。主觀機率的關鍵洞見，是 Frank Ramsey（1926 年寫成〈Truth and Probability〉、1931 年身後出版）和 Bruno de Finetti（1937 年在巴黎 Poincaré 研究所的系列講演〈La prévision〉）各自獨立發現的一件事：\n\n> **你的信念度可以被「測量」——透過你願意接受的賭率。**\n\n怎麼測？假設我想知道你對「明天這個服務會觸發 P0 告警」的信念度。我設計一個賭局：如果明天觸發 P0，我付你 100 元；如果沒觸發，你付我 X 元。然後我問你：X 要設多大，你會覺得「這個賭公平、接不接都行」？\n\n- 如果你覺得 X=100 才公平（賭注對等），代表你認為觸發跟不觸發各半，信念度 0.5。\n- 如果你覺得 X=11.11 才公平（觸發罕見、你很可能付錢、只肯賠得少），代表你覺得觸發很罕見——你願意接受「贏 100 vs 輸 11.11」的賠率，對應信念度 11.11/(100+11.11)≈0.1。\n\n你願意接受的「公平賠率」，就把你那個說不清的「感覺」釘成了一個數。Ramsey 和 de Finetti 的招數，是把「信念」這個內心狀態，translated 成「你會怎麼下注」這個可觀察的行為。機率不再是世界的屬性，而是**你的下注意願的屬性**——de Finetti 後來把這句話推到極致，說了那句有名的「機率不存在」（意思是：不存在獨立於信念者之外的客觀機率，只有信念度）。\n\n## 為什麼主觀不等於隨便：Dutch book\n\n到這裡，主觀機率還是可能「隨便喊」——我說我對 A 的信念度 0.6、對「非 A」也 0.6，誰能攔我？\n\n能攔你的，是一條叫 **Dutch book**（荷蘭賭）的論證。這是本章最該停下來體會的一頁。\n\n它的精神一句話：**如果你的信念度違反機率公理（不自洽），有人可以設計一組你「按你自己的賠率都覺得公平」的賭局，組合起來讓你穩輸——無論結果如何你都賠錢。** 而一個理性的人，不會接受一組保證讓自己賠錢的賭。所以理性信念**必須**自洽，自洽的條件恰好就是機率公理（非負、總和為 1、互斥事件相加）。\n\n來看最乾淨的數值例子。假設你對某件事 A 的信念度是 0.6，同時對「非 A」的信念度也是 0.6（兩個加起來 1.2，違反「互斥又窮盡的事件機率相加為 1」）。你覺得這沒什麼，反正是「感覺」。現在我這個莊家上場，按你自己宣稱的賠率跟你下兩個賭：\n\n```text\nDutch book：信念不自洽 ⇒ 穩賠\n\n你的信念：P(A)=0.6，P(非A)=0.6   ← 加起來 1.2，已違反機率公理\n\n賭局 1（押 A）：    你付 0.6，若 A 成真我付你 1\n賭局 2（押 非A）：  你付 0.6，若 非A 成真我付你 1\n   （兩個賭你都覺得「按我宣稱的機率，這價公平」，所以你都接）\n\n你一開始付出：       0.6 + 0.6 = 1.2\n\n結算（A 與 非A 必有且僅有一個成真）：\n  若 A 成真   → 賭局 1 付你 1、賭局 2 付你 0 → 你拿回 1\n  若 非A 成真 → 賭局 1 付你 0、賭局 2 付你 1 → 你拿回 1\n\n無論哪種：你拿回 1，但你付出了 1.2\n          淨損 = 1 − 1.2 = −0.2   ← 穩賠 0.2，跟結果無關\n```\n\n注意這裡發生了什麼：我沒有騙你，每一個賭的價格都是**你自己宣稱的信念度算出來的「公平價」**，你按自己的標準覺得每個賭都不虧。但因為你的兩個信念度加起來超過 1，它們之間有個你沒察覺的縫，我把這個縫變成了一台抽水機，無論硬幣怎麼落都從你身上抽走 0.2。\n\n這就是 Dutch book 的全部威力：**它不要求你的信念「對」（符合某個客觀真相），只要求你的信念彼此「自洽」（不互相矛盾到能被套利）。** 而「自洽到不能被 Dutch book」這個條件，數學上可以證明等價於「滿足機率公理」（Ramsey 和 de Finetti 各自給出了這個定理；嚴格證明本書不展開，指向延伸閱讀）。\n\n所以回到那個警鈴：主觀機率**不是**隨便喊。你可以選你的先驗（這是主觀的），但你選的那一整套信念必須像機率一樣自洽（這是被 Dutch book 強制的）。**主觀的是「值」，被強制的是「結構」。** 這正是「信念可以有數學」這句話的精確意思——信念的內容由你，但信念的文法由機率公理管。\n\n我認為這是整章最漂亮的轉折：它把「主觀＝不嚴謹」這個直覺反過來了。主觀機率不是放棄嚴謹，而是把嚴謹從「信念要符合客觀真相」這個你根本做不到的要求，換成「信念之間不能自相矛盾」這個你能檢查、且違反就被罰錢的要求。\n\n## 貝氏更新：信念怎麼隨證據移動\n\n有了「自洽的先驗」這個地基，現在看信念怎麼更新。貝氏定理你大學看過，這裡只把它擦亮（機率機制的完整推導見《馴服隨機》ch05）：\n\n```text\n                P(證據|假設) · P(假設)\nP(假設|證據) = ─────────────────────────\n                      P(證據)\n\n白話：後驗 ∝ 概似 × 先驗\n\n  先驗  P(假設)        ← 看證據前你的信念\n  概似  P(證據|假設)   ← 若假設為真，看到這份證據有多可能\n  後驗  P(假設|證據)   ← 看證據後你的更新信念\n```\n\n關鍵在那個「∝」（正比於）：後驗等於先驗乘上概似，再除以一個正規化常數（讓所有後驗加起來是 1）。**證據透過概似來「重新加權」你的先驗**——對某假設來說，這份證據越不意外（概似越高），那個假設的信念就被往上抬越多。\n\n來做一個完整的 worked example，把它一步步算到底。\n\n### worked example：一枚硬幣到底公不公正\n\n情境：你拿到一枚硬幣，懷疑它可能被動過手腳。你把世界簡化成兩種假設：\n\n- **公正**（fair）：P(正面)=0.5。\n- **灌鉛**（biased）：這是一枚幾乎只出正面的假幣，P(正面)=0.9。\n\n你的先驗：你覺得這枚硬幣**多半是正常的**，給 P(公正)=0.9、P(灌鉛)=0.1。現在你擲了兩次，**都是正面**（記為 H、H）。每擲一次就更新一次。\n\n**第一次正面 H：**\n\n```text\n先驗：     P(公正)=0.9      P(灌鉛)=0.1\n概似：     P(H|公正)=0.5    P(H|灌鉛)=0.9    ← 灌鉛幣出正面更可能\n\n未正規化後驗（先驗 × 概似）：\n   公正：  0.9 · 0.5 = 0.45\n   灌鉛：  0.1 · 0.9 = 0.09\n   ──────────────────────────\n   P(H) = 0.45 + 0.09 = 0.54        ← 正規化常數（這次看到 H 的總機率）\n\n正規化（各除以 0.54）：\n   P(公正|H) = 0.45 / 0.54 = 5/6 ≈ 0.8333\n   P(灌鉛|H) = 0.09 / 0.54 = 1/6 ≈ 0.1667\n```\n\n一次正面後，「公正」的信念從 0.9 微降到 0.833——一次正面對一枚正常硬幣毫不意外（畢竟正常幣也有一半機會出正面），所以證據很弱，信念只動了一點點。（順帶一提：這裡灌鉛幣的後驗 1/6≈16.7%，數字上恰好等於脊椎檢查線的後驗——巧合，但提醒你「99% 的檢查／90% 的灌鉛幣」這種強概似，配上一個很低的先驗，後驗仍可能不高，這是同一個基率算術。）\n\n**第二次正面 H（把上面的後驗當新的先驗）：**\n\n這是貝氏更新最核心的一句話——**後驗變成下一次的先驗**。信念是會滾動的。\n\n```text\n新先驗（＝上一步的後驗）：\n   P(公正)=5/6≈0.8333    P(灌鉛)=1/6≈0.1667\n概似（同上）：\n   P(H|公正)=0.5         P(H|灌鉛)=0.9\n\n未正規化後驗：\n   公正：  0.8333 · 0.5 = 0.4167\n   灌鉛：  0.1667 · 0.9 = 0.1500\n   ──────────────────────────\n   總和 = 0.4167 + 0.1500 = 0.5667\n\n正規化：\n   P(公正|HH) = 0.4167 / 0.5667 = 25/34 ≈ 0.7353\n   P(灌鉛|HH) = 0.1500 / 0.5667 = 9/34 ≈ 0.2647\n```\n\n兩次正面後，「公正」的信念降到 0.735，「灌鉛」爬到 0.265。\n\n**自我複核（一次算兩擲，看會不會一致）：** 如果我不分兩步、直接用「兩次都正面」當一份證據，從原始先驗算一次：\n\n```text\n概似 P(HH|公正)=0.5·0.5=0.25；P(HH|灌鉛)=0.9·0.9=0.81\n未正規化：公正 0.9·0.25=0.225；灌鉛 0.1·0.81=0.081\n總和 0.306\nP(公正|HH) = 0.225 / 0.306 = 25/34 ≈ 0.7353   ✓ 與逐步更新完全一致\n```\n\n一次算兩擲，和分兩步逐次更新，結果一模一樣（0.7353）。這不是巧合，是貝氏更新的一個重要性質：**只要證據之間在各假設下獨立，先合再算、或逐筆更新，殊途同歸。** 這就是為什麼金絲雀部署可以「放一批更新一批」，不必等所有數據到齊才算——逐筆滾動和最後一次性算，會收斂到同一個後驗。\n\n## 先驗會被沖淡：兩個人吵不久\n\n現在回到那個讓工程師警鈴大作的問題：如果先驗是主觀的，兩個先驗不同的人，會不會永遠得出不同結論？\n\n答案是：**只要證據夠多，不會。** 先驗會被資料沖淡。\n\n繼續用那枚硬幣，但這次比較兩個起點截然不同的人——一個是「沒主見」的（先驗 P(公正)=0.5，覺得公不公正各半），一個是「死忠相信公正」的（先驗 P(公正)=0.99）。讓他們各自看**連續 10 次正面**這串強烈證據（一枚正常硬幣連出 10 次正面的機率只有 1/1024，極不尋常），逐次更新：\n\n```text\n連續 10 次正面後，「公正」信念的收斂（手算前幾步、後面同法遞推）\n\n         先驗 0.5（沒主見）        先驗 0.99（死忠公正）\n─────────────────────────────────────────────────────────\n看證據前   P(公正)=0.5000           P(公正)=0.9900\n1 次 H 後  0.5/(0.5+0.9)=0.3571     0.99·0.5/(0.99·0.5+0.01·0.9)=0.9821\n2 次 H 後  0.2358                   0.9683\n3 次 H 後  0.1464                   0.9444\n   …          ↓ 持續下滑              ↓ 持續下滑\n10 次 H 後 ≈ 0.0028                 ≈ 0.2171\n```\n\n兩個人從天差地別的起點（0.5 vs 0.99）出發，看到同一串「10 次正面」的強證據後，**都被推向「這幣有問題」的方向**——沒主見的人已經幾乎確信灌鉛（公正只剩 0.3%），死忠的人雖然還沒投降（公正還有 21.7%），但已經從 99% 崩到 21.7%。再多給幾次正面，連死忠的人也會被壓垮。\n\n這就是先驗的「沖淡」（嚴格的漸近版叫 Bernstein–von Mises 定理：在溫和條件下，樣本越多，後驗越被概似主導、先驗的影響趨於消失，本書只用直覺、不證明）。它回答了那個警鈴：\n\n- **資料稀少時**，先驗的影響大——兩個人可能得出不同後驗。這時候誠實的做法是把先驗攤開來講（「我假設盛行率 1%，是基於 X」），讓人能質疑它。\n- **資料充足時**，先驗被沖淡——只要兩人的先驗都不是「死硬到 0 或 1」（給某假設機率 0 等於說「再多證據也不信」，那是不可更新的教條，不是先驗），他們會收斂到接近的後驗。\n\n注意那個但書：先驗不能是 0 或 1。如果你一開始就給「灌鉛」先驗 0，那無論看到多少次正面，0 乘任何概似還是 0，你永遠不會更新——你把自己鎖在一個證據打不穿的信念裡。**這是貝氏框架裡「教條」的精確定義：把先驗設成 0 或 1。** 工程版你見過：一個 on-call 工程師「堅信不可能是 DB」（先驗給 DB 設成 0），於是無論 log 多麼指向 DB，他都更新不動，繞了兩小時遠路。先驗太強導致誤判，本質是把一個本該開放的信念偷偷鎖死了。\n\n## 頻率派 vs 貝氏派：一個世紀的家務事\n\n講到這裡，必須交代一個你大概聽過名字、但沒搞清楚在吵什麼的世紀爭論。它不是本書要選邊的事，但作為故事，它能讓你看清「先驗從哪來」這個問題的份量。\n\n二十世紀上半葉，統計學分裂成兩派。**頻率派**（以 Ronald Fisher 1922 年的工作、Neyman 與 Pearson 的假設檢定為代表）主張：機率**只能**是長期頻率，是世界的客觀屬性。在這個世界觀裡，「這枚特定硬幣公正的機率」是一句沒意義的話——硬幣要嘛公正要嘛不公正，那是個事實，不是機率；你能談的只有「假設硬幣公正，看到這串數據有多罕見」（這就是 p 值的精神）。頻率派最痛恨貝氏的地方，正是那個**先驗**——他們覺得「憑主觀塞一個先驗進來」破壞了統計的客觀性，是不嚴謹的後門。\n\n**貝氏派**（Harold Jeffreys 在 1930 年代重新發掘並發揚了源自 Laplace 的貝氏方法，後由 de Finetti、Savage 在主觀機率與決策論上奠基）反擊：頻率派假裝客觀，其實只是把假設藏起來了。你選哪個檢定、設哪個顯著水準、停在哪裡收數據，全是主觀選擇，只是沒寫成先驗而已。貝氏派說：信念度是真實存在的東西（你做決策時明明就在用它），與其假裝沒有它，不如把它寫成先驗、攤在陽光下、受 Dutch book 約束、被資料沖淡。\n\n這場爭論的核心，其實就是本章開頭那三個警鈴的放大版：機率是客觀頻率還是主觀信念？先驗是不嚴謹的後門還是誠實的假設？我不在這裡選邊（Part V 的 ch17 會把這個「理性是什麼」的張力做哲學收束；信念更新作為科學確證的那一面、以及頻率派的血統，見《如何不騙自己》談貝氏確證與頻率派之爭）。但你該記住的工程版立場是：**這兩派不是「誰對誰錯」，而是「機率」這個詞在扛兩個不同的工作**——一個描述可重複世界的長期頻率，一個描述單一事件下你該怎麼下注。決策（你 ch05 在做的事）幾乎總是後者：你只 deploy 這一次、只處理這個 incident，你需要的是「在這個不可重複的當下，我該基於什麼信念行動」。對決策而言，貝氏的主觀機率不是 bug，是唯一說得通的語言。\n\n順帶把 ch04 那條線收回來：Ellsberg 三色甕（見 ch04）之所以是個難題，正是因為 Savage（1954）想用主觀機率把**所有**不確定都納入期望效用——他假設你對任何事件（包括「甕裡黑球佔比」這種你毫無資訊的事）都能有一個自洽的主觀機率。Ellsberg 的反例說：人不肯。面對「完全不知道比例」的模糊，人寧可拒絕給出一個主觀機率，也不接受被當成「等於某個已知機率」。所以主觀機率這套漂亮的框架，在 ch04 那道模糊的縫前面，自己也卡住了——這正是「規範很美、地基有經驗性的縫」這條全書張力，在信念這一側的版本。\n\n## 直覺的陷阱\n\n信念這個主題，是規範直覺最容易翻車的地方。守住正確版。\n\n| 你可能會這麼想（錯誤直覺） | 它在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|\n| 「主觀機率＝隨便喊一個數，所以貝氏不嚴謹」 | 把「值可以自選」誤當成「整套信念毫無約束」。 | 主觀的是**值**、被強制的是**結構**。你選的整套信念必須自洽（不能被 Dutch book 套利），自洽等價於滿足機率公理。違反就被人穩賺你的錢——這比「符合客觀真相」更可檢查。|\n| 「先驗不同的兩個人會永遠各說各話」 | 忽略了證據對先驗的沖淡作用。 | 只要兩人先驗都不是死硬的 0 或 1，資料夠多時後驗會收斂（先驗被概似主導）。吵不久——除非有人把先驗設成教條（0 或 1）。|\n| 「最客觀的做法是用『無資訊先驗』（中立先驗）」 | 以為「不選先驗」是一種沒有假設的中立。 | **沒有真正中立的先驗。** 「均勻分布」本身就是一個假設（在哪個尺度上均勻？換個參數化它就不均勻了）。無資訊先驗也是一種選擇，不是「沒選」。誠實的做法是把你選的先驗講清楚、讓人能質疑，而不是假裝沒選。|\n| 「先驗設得越強（越接近 0 或 1）越能表達我的確信」 | 把「強信念」和「不可更新的教條」混為一談。 | 先驗 0 或 1 不是「很確信」，是「永遠不更新」——0 乘任何概似都是 0，再多證據也打不穿。你以為在表達確信，其實把自己鎖進了一個證據進不來的房間（那個「堅信不是 DB」的 on-call 就是這樣繞遠路的）。|\n| 「貝氏的後驗是『真實機率』，頻率派算的才是估計」 | 把後驗當成世界的客觀屬性。 | 後驗是**你更新後的信念**，不是世界的客觀真相。它依賴你的先驗和模型；換個先驗、換個概似模型，後驗就變。它嚴謹（自洽、可更新），但它姓「主觀」。|\n\n**怎麼自我察覺**：當你在用一個貝氏結論（包括 ch05 那個 16.7%）時，問三件事——(1) 我的先驗是什麼？我講得出它從哪來、敢不敢攤給別人質疑嗎？(2) 我有沒有偷偷把某個假設的先驗設成 0（「絕不可能是 X」）？如果有，我其實關掉了對它的更新。(3) 我手上的證據夠多到先驗已被沖淡，還是少到結論主要由先驗驅動？第三問特別重要：資料稀少時，你的後驗其實是你的先驗穿了件證據的外衣。\n\n## 紙上推演\n\n全程紙筆手算，不要碰任何程式。算完自己複核一遍。\n\n---\n\n**推演題 1（★★，20 分鐘）— 先驗 × 兩筆證據，手算後驗**\n\n一個服務的某類 incident，你的兩個假設：**H1＝上游 DB 問題**、**H2＝快取節點問題**（簡化成只有這兩種，先驗 P(H1)=0.6、P(H2)=0.4）。你做了兩個獨立檢查：\n\n- 檢查 A（看 DB slow query log）：P(A 異常|H1)=0.9、P(A 異常|H2)=0.2。你看到 A **異常**。\n- 檢查 B（看快取命中率）：P(B 正常|H1)=0.8、P(B 正常|H2)=0.3。你看到 B **正常**。\n\n(a) 只用檢查 A 更新一次，算 P(H1|A 異常)。\n(b) 把 (a) 的後驗當新先驗，再用檢查 B 更新，算 P(H1|A 異常, B 正常)。\n(c) 改成「一次把 A、B 一起算」（從原始先驗 0.6/0.4 出發），驗證結果與 (b) 一致。\n\n---\n\n**推演題 2（★★，15 分鐘）— Dutch book：為什麼不自洽的信念會被穩賺**\n\n某人宣稱：「我覺得明天上線成功的機率是 0.7，失敗的機率也是 0.5。」（成功與失敗互斥又窮盡。）\n\n(a) 指出他的信念違反了哪條機率約束。\n(b) 設計一組賭局（按他自己宣稱的機率定價），讓他無論上線成功或失敗都穩賠，並算出他穩賠多少。\n(c) 用一句話說明這跟「他的信念對不對（上線到底會不會成功）」**無關**。\n\n---\n\n**推演題 3（★★，15 分鐘）— 先驗會不會被沖淡**\n\n接推演題 1 的硬幣脈絡（公正 P(H)=0.5 vs 灌鉛 P(H)=0.9）。兩個人先驗不同：阿哲 P(公正)=0.5，阿芸 P(公正)=0.95。兩人都看到**連續 3 次正面**。\n\n(a) 各自算 3 次正面後的 P(公正)。\n(b) 比較兩人「看證據前」與「看 3 次正面後」的差距，差距是變大還是變小？說明這對「先驗主觀會不會讓人永遠各說各話」的意義。\n(c) 如果阿芸的先驗是 P(公正)=1（而非 0.95），重算她 3 次正面後的後驗，並解釋發生了什麼。\n\n---\n\n### 推演解答\n\n**題 1 解答**\n\n(a) 只用檢查 A（看到 A 異常）：\n```text\n概似：P(A異常|H1)=0.9，P(A異常|H2)=0.2\n未正規化：H1: 0.6·0.9=0.54   H2: 0.4·0.2=0.08\n總和 = 0.54+0.08 = 0.62\nP(H1|A異常) = 0.54/0.62 ≈ 0.8710\nP(H2|A異常) = 0.08/0.62 ≈ 0.1290\n```\n複核：兩者相加 0.871+0.129=1 ✓。A 異常強烈指向 DB，H1 從 0.6 抬到 0.87，合理。\n\n(b) 把 0.871/0.129 當新先驗，用檢查 B（看到 B 正常）更新：\n```text\n概似：P(B正常|H1)=0.8，P(B正常|H2)=0.3\n未正規化：H1: 0.8710·0.8=0.6968   H2: 0.1290·0.3=0.0387\n總和 = 0.6968+0.0387 = 0.7355\nP(H1|A異常,B正常) = 0.6968/0.7355 ≈ 0.9474\n```\nB 正常（快取沒事）進一步排除 H2，H1 升到 0.947。\n\n(c) 一次合算（從原始 0.6/0.4，A、B 在各假設下獨立）：\n```text\n聯合概似 P(A異常,B正常|H1)=0.9·0.8=0.72\n         P(A異常,B正常|H2)=0.2·0.3=0.06\n未正規化：H1: 0.6·0.72=0.432   H2: 0.4·0.06=0.024\n總和 = 0.432+0.024 = 0.456\nP(H1|…) = 0.432/0.456 ≈ 0.9474   ✓ 與 (b) 一致\n```\n教訓：**逐筆更新與一次合算殊途同歸**（前提是證據在各假設下獨立）。這就是序貫診斷（看一條 log 更新一次）為何合法——不必等所有證據到齊。\n\n常見錯路：(c) 忘了「獨立」這個前提就直接把概似相乘。若 A、B 在某假設下不獨立（例如 DB 掛了會同時讓兩個指標異常、彼此相關），聯合概似就不是兩者相乘，逐筆更新也會出錯——這是貝氏更新最容易被忽略的假設。\n\n---\n\n**題 2 解答**\n\n(a) 成功與失敗互斥又窮盡，機率應相加為 1；他宣稱 0.7+0.5=1.2 > 1，違反「窮盡互斥事件機率和為 1」。信念不自洽。\n\n(b) 按他自己的機率定價（押某事件＝付「該事件機率」、若成真得 1）：\n```text\n賭局 1（押成功）：他付 0.7，成功則得 1\n賭局 2（押失敗）：他付 0.5，失敗則得 1\n他先付出：0.7 + 0.5 = 1.2\n\n結算（成功/失敗必有且僅有一個）：\n  成功 → 賭局1 得 1、賭局2 得 0 → 拿回 1\n  失敗 → 賭局1 得 0、賭局2 得 1 → 拿回 1\n無論哪種：拿回 1，付出 1.2 → 淨損 −0.2（穩賠 0.2）\n```\n他穩賠 **0.2**，與上線結果無關。\n\n(c) 這跟「上線到底會不會成功」**完全無關**——莊家不需要知道結果、也不賭結果。穩賠純粹來自他兩個信念度加起來超過 1 的內部矛盾。Dutch book 懲罰的是**不自洽**，不是**不準確**。一個信念可以自洽卻不準（先驗離真相很遠，但會被資料修正）；但不自洽的信念，連被資料修正的機會都沒有就先被套利了。\n\n---\n\n**題 3 解答**\n\n(a) 連續 3 次正面，概似 P(HHH|公正)=0.5³=0.125、P(HHH|灌鉛)=0.9³=0.729。\n\n阿哲（先驗 0.5）：\n```text\n未正規化：公正 0.5·0.125=0.0625   灌鉛 0.5·0.729=0.3645\n總和 0.4270\nP(公正|HHH) = 0.0625/0.4270 ≈ 0.1464\n```\n阿芸（先驗 0.95）：\n```text\n未正規化：公正 0.95·0.125=0.11875   灌鉛 0.05·0.729=0.03645\n總和 0.1552\nP(公正|HHH) = 0.11875/0.1552 ≈ 0.7652\n```\n\n(b) 看證據前差距：0.95 − 0.5 = 0.45。看 3 次正面後差距：0.7652 − 0.1464 ≈ 0.619。\n\n這裡要小心，別被數字嚇到：**這一步差距看起來反而變大了**（0.45→0.62），因為 3 次正面雖然是中等強度證據、還不足以壓垮阿芸的強先驗，把兩人推到曲線的不同陡峭段。但方向已經對了——兩人都往「灌鉛」移動，阿哲已過半倒向灌鉛。關鍵在**繼續加證據**：若改成連續 10 次正面（正文那張表），阿哲的 P(公正) 會掉到約 0.003、阿芸約 0.217，差距開始收窄；再多幾次，兩人都會逼近 0。所以正確的說法是：**先驗的影響會被足夠多的資料沖淡、最終收斂**——但「足夠多」是漸近的，中途差距可能先擴後縮，不是單調縮小。這個誠實的細節，比「先驗一更新就消失」的口號更接近真相。\n\n常見錯路：以為「一更新差距就縮小」。沖淡是**漸近**性質（資料趨於無窮才保證收斂），有限證據下強先驗可以頑抗一陣子，甚至中途讓差距變大。\n\n(c) 阿芸先驗 P(公正)=1（即 P(灌鉛)=0）：\n```text\n未正規化：公正 1·0.125=0.125   灌鉛 0·0.729=0\nP(公正|HHH) = 0.125/0.125 = 1   ← 紋風不動\n```\n她的後驗還是 1。**先驗設成 1（或 0）＝把信念鎖死、永不更新**——0 乘任何概似都是 0，灌鉛這個假設的後驗永遠是 0，無論看到幾次正面。這不是「很確信」，是「教條」。貝氏框架裡，0 和 1 是禁區：一旦把某假設的先驗設成 0，你就放棄了被證據說服的可能。這正是那個「堅信絕不是 DB」的 on-call 工程師的數學畫像。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先回答「為什麼」。\n\n1. 主觀機率和頻率機率差在哪？為什麼「這枚特定硬幣下一擲是正面的機率 0.5」在頻率讀法下是個尷尬的句子、在主觀讀法下卻完全合法？\n2. Dutch book 論證證明了什麼？它要求你的信念「對」（符合真相）還是「自洽」（不互相矛盾）？這兩者差在哪？\n3. 用那個「P(A)=0.6、P(非A)=0.6」的例子，講給一個堅持「機率隨便喊有什麼關係」的同事聽，他會穩賠多少、為什麼。\n4. 貝氏更新裡「後驗變成下一次的先驗」是什麼意思？為什麼這讓「逐筆更新」和「一次合算」會得到相同結果（前提是什麼）？\n5. 「先驗會被資料沖淡」是什麼意思？兩個先驗不同的人會永遠各說各話嗎？什麼情況下會（提示：有人把先驗設成了什麼）？\n6. 為什麼把某假設的先驗設成 0 或 1 是「教條」而非「強信念」？用 0 乘概似的算術說明。舉一個你 incident 診斷裡「先驗太強導致繞遠
