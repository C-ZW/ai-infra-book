路」的例子。\n7. 「無資訊先驗才客觀」這句話錯在哪？為什麼說「沒有真正中立的先驗」？\n8. 頻率派和貝氏派吵的核心是什麼？把這場爭論連回 ch04 Ellsberg：Savage 想用主觀機率納入所有不確定，Ellsberg 的反例說了什麼？\n\n## 延伸閱讀\n\n以下連結在 2026-06 查證過，優先放權威來源。\n\n- **Stanford Encyclopedia of Philosophy, \"Dutch Book Arguments\"**（https://plato.stanford.edu/entries/dutch-book/）— 本章 Dutch book 一節的主要依據。讀它如何把「信念自洽 ⇔ 滿足機率公理」說清楚，以及這個論證的限制與被質疑處（它不證明你的信念「對」、只證明「不自相矛盾」）。想把「主觀不等於隨便」這層弄透，這條最值得。\n- **Frank Ramsey, \"Truth and Probability\"（1926 寫成，1931 身後出版於 *The Foundations of Mathematics*）**— 主觀機率「用賭率測量信念」這個想法的出生地。讀它如何把「信念度」這個內心狀態，translated 成「你願意接受的賠率」這個可觀察的行為——這是整套主觀機率的第一塊磚。\n- **Stanford Encyclopedia of Philosophy, \"Interpretations of Probability\"**（https://plato.stanford.edu/entries/probability-interpret/）— 想看頻率派 vs 主觀派 vs 其他詮釋的完整地圖，這條最省事；對照本章「機率這個詞在扛兩個不同工作」的說法。機率三種詮釋的決策脈絡見《馴服隨機》談機率的詮釋。\n- **貝氏定理的機率機制與自然頻率法**——本章只用了貝氏更新的結果（後驗 ∝ 概似 × 先驗），沒推它的機率地基。想看貝氏定理為何成立、以及用「想像一萬人」的自然頻率法直觀算後驗，見《馴服隨機》ch05；脊椎檢查線的 16.7% 後驗就是在那套機制上算出來的。\n- **信念更新作為科學確證、頻率派與貝氏派之爭的制度面**——本章把這場爭論當故事講、不選邊；想看「證據如何更新對假說的信念」以及科學制度如何防自欺，見《如何不騙自己》談貝氏確證與頻率派之爭。那是理性三角的另一角，與本章的貝氏決策互指。\n"}, {"id": "ch07-value-of-information", "file": "ch07-value-of-information.md", "group": "Part II — 信念與證據", "title": "ch07 — 資訊的價值：要不要再驗一次", "md": "# ch07 — 資訊的價值：要不要再驗一次\n\n> **本章解決什麼問題**：前兩章把「不確定」變成一個可更新的數（ch05 後驗、ch06 先驗從哪來），然後接上效用矩陣算出最適行動。但真實決策還缺一步：在按下去之前，你常常還能**多蒐集一點證據**——再驗一次、多跑一輪壓測、多放一批流量。問題是證據不免費。本章把「要不要再蒐集資訊」算成一個期望值問題，給出資訊的價值（value of information）的精確意義，並引出全書最乾淨的一個洞見：**一條不會改變你決策的資訊，它的價值精確等於零。** 你在 Part II 的最後一章，下一章起轉向「人實際怎麼選」。\n\n## 從你已知的出發\n\n你每天都在替資訊定價，只是沒寫成式子。\n\n要上線一個有風險的改動。你已經跑過一輪 CI、過了 code review，心裡的把握大概七成。現在你站在一個岔路口：**直接全面上線**，還是**先放 1% 流量、看半小時的指標、再決定要不要全面上線或回滾**？\n\n漸進式放量不是免費的。它要多花你半小時盯盤、佔一個工程師的注意力、把上線時程往後推、還可能因為「只有 1% 流量」而暴露不出真正的問題。所以你心裡其實在算一筆帳——這半小時的漸進式放量，**值不值**它的成本？\n\n而你判斷「值不值」的真正依據，多數人講不清楚，但你做對了：**這批放量，有沒有可能讓我換一個動作？** 如果放量結果無論好壞，你都會繼續全面上線（因為你已經決定「就算有點小問題也先上、邊上邊修」），那這半小時的漸進式放量在**決策上**一文不值——你只是在買心安，不是在買資訊。反過來，如果放量有相當機率會讓你「看到不對勁就回滾」，那它就值錢，因為它可能讓你避開一場全面上線事故。\n\n```text\n   漸進式放量的決策價值 = 它「可能讓你換一個更好的動作」的程度\n\n   無論放量結果如何，你都會全面上線  →  決策價值 = 0（只剩心安價值）\n   放量有機會讓你改成回滾             →  決策價值 > 0（買到了避開事故的機會）\n```\n\n把這個直覺擦亮、寫成式子、再證明它精確成立——就是本章。你會發現你維運生涯裡那句口頭禪「這個監控加了也不會改變我們做什麼，純粹好看」，其實是一句嚴格的決策論命題：**不改變行動的資訊，期望價值是零。** 這不是修辭，是可以算出來、而且算出來真的是 0 的。\n\n順帶說一個你早就有的更深直覺：資訊蒐集**永遠不會讓你更糟**（在期望意義上）。多知道一點，最差也就是「這資訊沒用、我照原樣決策」，不會因為多看了一眼反而做出更壞的選擇——前提是你**理性地用**這個資訊。這條「資訊價值 ≥ 0」後面會證，它和你「多測一輪總沒壞處」的工程直覺是同一件事。\n\n## 資訊值錢，若且唯若它可能讓你換動作\n\n先把概念釘死，再上數字。\n\n決策理論對「資訊的價值」有一個冷酷而精確的定義，它和「資訊量大不大」「資訊有不有趣」**完全無關**，只和一件事有關：**這條資訊會不會改變你最後採取的行動。**\n\n為什麼？回想 ch05 的決策結構：你手上有一個後驗信念，把它乘上效用矩陣，算出一個最適行動 a*，然後執行 a*，拿到一個期望效用。現在有人要賣你一條資訊。這條資訊能幫你的唯一管道是：**它更新你的後驗，更新後的後驗可能指向一個不同的、更好的行動。** 如果它更新完後驗、你算一遍、最適行動還是同一個 a*——那你做的事一模一樣，拿到的期望效用一模一樣，這條資訊對你的決策**毫無貢獻**。\n\n```text\n資訊改變決策的唯一路徑：\n\n   資訊 D  →  更新後驗 P(θ|D)  →  重算 a* = argmax_a Σ P(θ|D)·u(a,θ)\n                                         │\n                          ┌──────────────┴──────────────┐\n                          ▼                             ▼\n              a* 變了（指向更好的行動）        a* 沒變（還是原來那個）\n                          │                             │\n                  資訊有正價值                    資訊價值 = 0\n              （買到了「換更好動作」的機會）   （你做的事完全一樣）\n```\n\n這就是本章的軸心，我認為它是整本書最違反工程師直覺的一頁——因為我們的本能是「資訊越多越好」「能測就測」。但決策論告訴你：**資訊的價值不在資訊本身，在它和你的行動集之間的關係。** 同一條資訊，對「行動會因它而改變」的人值錢，對「無論如何都做同一件事」的人一文不值。價值不是資訊的屬性，是「資訊 × 決策處境」的屬性。\n\n把它翻成你的語言：一個監控指標的價值，不取決於它多精確、多即時，而取決於**它報警時你會不會因此做出不同的動作**。如果某條 dashboard 線無論漲跌你都不會改變任何部署決定，它的決策價值是零——不管它畫得多漂亮、取樣多密。（它可能還有別的價值，比如事後 debug 的回溯價值、或團隊的心理安定，但那是另一回事，不是這裡定義的「決策資訊價值」。）\n\n## 兩把尺：完全資訊（EVPI）與樣本資訊（EVSI）\n\n「資訊的價值」要量化，得先問「哪種資訊」。決策論有兩把尺，一把量理論上限，一把量真實證據。\n\n**第一把：完全資訊期望價值（expected value of perfect information, EVPI）。** 想像有個神諭（clairvoyant），在你行動前**準確無誤地**告訴你世界的真實狀態（到底有病還是健康、這次部署到底會不會出事）。有了它，你每次都能挑那個狀態下最好的行動，再也不會猜錯。EVPI 就是「有神諭」與「沒神諭、只能靠現有信念決策」之間，期望效用的差額——也就是你**最多**願意為「消除這個不確定」付多少。\n\n```text\nEVPI = (有完全資訊時的期望效用)  −  (沒有資訊、用現有信念的最適期望效用)\n     = EV|PI − EV\n```\n\nEVPI 是**上限**：再厲害的檢查、再多輪的壓測，都不可能比「直接知道答案」更值錢。它回答一個很實用的問題——「這個不確定，最理想情況下值得我花多少去消除？」如果 EVPI 算出來只有 3 塊錢，那你就別花 10 塊去買任何檢查了，再準的檢查也不划算。這個概念由 Ronald Howard 在 1966 年的論文〈Information Value Theory〉（*IEEE Transactions on Systems Science and Cybernetics*, SSC-2(1):22–26）形式化（2026-06 查證，來源見延伸閱讀）。Howard 的關鍵貢獻是：把資訊的價值同時和**機率結構**與**後果（效用）**綁在一起算——這正是它跟 Shannon 資訊理論的分野，後者只量機率結構、不管後果。\n\n**第二把：樣本資訊期望價值（expected value of sample information, EVSI）。** 真實世界沒有神諭，你拿到的是**不完美**的證據：一次會出錯的檢查、一輪只覆蓋部分情境的壓測、一批只有 1% 流量的漸進式放量。EVSI 量的是「做這一次不完美觀測」帶來的期望效用增益。它由 Howard Raiffa 與 Robert Schlaifer 在 1961 年的《Applied Statistical Decision Theory》推廣（2026-06 查證）。\n\n兩者的關係很直觀，也是一個好用的自我複核：\n\n```text\n   0  ≤  EVSI（一次不完美觀測）  ≤  EVPI（神諭級的完美資訊）\n   └┬┘                            └┬┘\n    │                              └ 上限：完美資訊也不可能更值錢\n    └ 下限：資訊在期望意義上永不為負\n```\n\n任何真實檢查的價值，夾在 0 和 EVPI 之間。算完 EVSI 如果發現它比 EVPI 還大，你一定哪裡算錯了——這是寫章時我自己用的檢查，等下會看到脊椎的數字剛好印證（EVSI≈14.0 < EVPI=15.0）。\n\n## 為什麼資訊價值永遠 ≥ 0：一個你直覺早就懂的證明\n\n工程師會問：憑什麼說「多知道一點不會更糟」？萬一資訊把我**誤導**了呢？\n\n關鍵在「理性地用」這四個字。理性決策者拿到資訊後，會重算最適行動——而他**永遠保留「無視這條資訊、照原計畫做」的選項**。所以最差的情況是：資訊沒用，他照原樣決策，期望效用不變（增益 0）。只要資訊偶爾能指向更好的行動，增益就是正的。一個「永遠有保底選項、偶爾能更好」的東西，期望值不可能是負的。\n\n```text\n   拿到資訊後，你總是可以選擇「忽略它、做原本要做的 a*」\n   ⇒ 有資訊時的最適期望效用  ≥  無資訊時的期望效用\n   ⇒ 增益（資訊價值）≥ 0\n\n   注意「期望意義上」這五個字：某一次的某個結果可能讓你\n   事後懊悔（資訊騙了你、害你改了動作結果更糟）；但「平均\n   over 所有可能結果」一定 ≥ 0。資訊價值是事前的期望、不是\n   事後的保證。\n```\n\n這是**工程師的嚴謹**等級的論證（每一步你都能口頭說出理由），不是形式證明——但它對。嚴格版（資訊在期望效用意義下的次模性與非負性）見 Howard 1966 與 Raiffa–Schlaifer 1961，本章不展開。\n\n擋一個常見誤解：「資訊價值 ≥ 0」說的是**決策價值**，不是「蒐集成本」。資訊本身的期望價值非負，但蒐集它**要花錢**（時間、流量、注意力）。淨值 = 資訊價值 − 蒐集成本，這個**可以是負的**。所以「該不該再驗一次」的真正判據是：**EVSI（這次檢查的決策價值）有沒有大於做這次檢查的成本？** 資訊價值非負，不代表蒐集永遠划算——它只代表「如果免費，多測一輪不會虧」。\n\n## worked example：脊椎檢查線——要不要做第二次檢查？\n\n把脊椎的檢查線請回來。設定和 ch05 完全一致（盛行率 1%、敏感度 99%、偽陽 5%），你已經驗出第一次陽性，後驗是 16.7%（=1/6，機率機制見《馴服隨機》ch05，本書刻意用 1% 盛行率讓後驗落在「值得決策」的區間）。效用矩陣也沿用全書基準：\n\n```text\n脊椎檢查的效用矩陣（全書統一）\n\n                  狀態：有病          狀態：健康\n   行動：治療        −10               −20\n   行動：不治療      −100               0\n\n   讀法：治療有病＝小代價（−10，治對了但有副作用）；\n        治療健康＝白挨副作用（−20）；\n        不治療有病＝漏掉大病（−100，最慘）；\n        不治療健康＝什麼都沒發生（0，最好）。\n```\n\n**第 0 步：沒有第二次檢查時，最適行動是什麼？** 這是 ch05 算過的，先複算一遍當基準（後驗 p=1/6）：\n\n```text\n   EU(治療 | 後驗 1/6)   = (1/6)·(−10) + (5/6)·(−20)\n                        = −1.6667 − 16.6667 = −18.3333\n\n   EU(不治療 | 後驗 1/6) = (1/6)·(−100) + (5/6)·(0)\n                        = −16.6667 + 0     = −16.6667\n\n   −16.6667 > −18.3333  ⇒  最適行動 = 不治療，期望效用 = −16.67\n```\n\n意外吧——驗出陽性，最適行動竟是**不治療**。因為後驗只有 1/6，多數陽性者其實健康，「治療健康者白挨副作用」的累積代價壓過了「漏掉那 1/6 病人」。這是 ch05 的結論，本章拿它當「沒有新資訊」的基準線：**期望效用 = −16.67。**\n\n**第 1 步：做第二次（獨立）檢查，它有兩種結果。** 第二次檢查同樣 sens=99%、偽陽 5%。把「16.7% 後驗」當作第二次檢查的**新先驗**（這正是 ch06 講的「後驗變下一次先驗」的貝氏循環），算第二次檢查各自結果的機率與更新後的後驗：\n\n```text\n   第二次檢查的結果機率（先驗 = 1/6）：\n     P(2nd 陽性) = 0.99·(1/6) + 0.05·(5/6) = 0.1650 + 0.0417 = 0.2067\n     P(2nd 陰性) = 1 − 0.2067 = 0.7933\n\n   第二次陽性後，更新後驗：\n     P(病|2nd 陽) = 0.99·(1/6) / 0.2067 = 0.1650 / 0.2067 ≈ 0.7984  ← 兩次陽性，疑慮大增\n   第二次陰性後，更新後驗：\n     P(病|2nd 陰) = 0.01·(1/6) / 0.7933 = 0.001667 / 0.7933 ≈ 0.0021 ← 一陽一陰，幾乎排除\n```\n\n自我複核：兩個分支機率 0.2067 + 0.7933 = 1.0000 ✓。兩個分支的後驗也合理——兩次陽性把疑慮推到 ~80%，一陽一陰把疑慮幾乎清零到 ~0.2%。\n\n**第 2 步：每個分支各自的最適行動。** 在新後驗下重算 EU，挑大的：\n\n```text\n   分支 A：第二次也陽性（機率 0.2067，後驗 0.7984）\n     EU(治療)   = 0.7984·(−10) + 0.2016·(−20) = −7.984 − 4.032 = −12.02\n     EU(不治療) = 0.7984·(−100) + 0.2016·(0)   = −79.84\n     ⇒ 最適 = 治療，期望效用 = −12.02      ← 翻轉了！原本不治療，現在治療\n\n   分支 B：第二次陰性（機率 0.7933，後驗 0.0021）\n     EU(治療)   = 0.0021·(−10) + 0.9979·(−20) = −0.021 − 19.958 = −19.98\n     EU(不治療) = 0.0021·(−100) + 0.9979·(0)  = −0.21\n     ⇒ 最適 = 不治療，期望效用 = −0.21\n```\n\n注意分支 A：第二次檢查讓最適行動從「不治療」**翻轉**成「治療」。這就是資訊值錢的源頭——它**可能讓你換一個動作**。\n\n**第 3 步：把兩個分支加權，得到「做第二次檢查」的期望效用。**\n\n```text\n   EU(做第二次檢查) = P(2nd陽)·(分支A最適) + P(2nd陰)·(分支B最適)\n                   = 0.2067·(−12.02) + 0.7933·(−0.21)\n                   = −2.485 + (−0.167)\n                   = −2.65\n```\n\n**第 4 步：EVSI = 差額。**\n\n```text\n   EVSI = EU(做第二次檢查) − EU(不做、沿用基準)\n        = (−2.65) − (−16.67)\n        = +14.02\n\n   ⇒ 第二次檢查的決策價值 ≈ 14.0（單位同效用）。為正，因為它\n     有 20.67% 的機率（驗出第二次陽性）把你的行動從「不治療」\n     翻成「治療」，避開漏診那 0.80 機率病人的 −100 慘格。\n```\n\n複核 EVSI ≤ EVPI：等下算 EVPI = 15.0（見推演題 2），而 14.0 < 15.0 ✓——第二次檢查很接近完美資訊的上限，因為它真的相當準。\n\n結論：在這組數字下，**只要第二次檢查的成本低於 ~14（同單位），就值得做。** 這就是「要不要再驗一次」的精確答案——不是憑感覺，是算出來的。\n\n## worked example：同一條資訊，價值精確為零\n\n上面 EVSI = 14 是因為資訊**翻轉了行動**。現在示範本章的招牌洞見：把效用矩陣換一組，讓行動**無論第二次結果如何都不會翻轉**——你會看到 EVSI **精確等於 0**，不是「接近 0」，是代數上嚴格的 0。\n\n換一個情境：假設這個病「漏掉的代價」其實沒那麼可怕——比如它是一種拖一陣子再治也無妨的慢性病，漏診代價只有 −15（而不是 −100）。其餘格子不變：\n\n```text\n變體效用矩陣（漏診代價從 −100 降到 −15）\n\n                  狀態：有病          狀態：健康\n   行動：治療        −10               −20\n   行動：不治療       −15                0\n```\n\n先看沒有第二次檢查時（後驗 1/6）：\n\n```text\n   EU(治療)   = (1/6)·(−10) + (5/6)·(−20) = −1.67 − 16.67 = −18.33\n   EU(不治療) = (1/6)·(−15) + (5/6)·(0)   = −2.50\n   ⇒ 最適 = 不治療，期望效用 = −2.50\n```\n\n現在做第二次檢查，看兩個分支的最適行動（分支機率與後驗和前面一樣，0.7984 與 0.0021）：\n\n```text\n   分支 A（第二次陽性，後驗 0.7984）：\n     EU(治療)   = 0.7984·(−10) + 0.2016·(−20) = −12.02\n     EU(不治療) = 0.7984·(−15) + 0.2016·(0)   = −11.98\n     ⇒ 最適 = 不治療（−11.98 > −12.02），剛好沒翻轉！\n\n   分支 B（第二次陰性，後驗 0.0021）：\n     EU(治療)   = 0.0021·(−10) + 0.9979·(−20) = −19.98\n     EU(不治療) = 0.0021·(−15) + 0.9979·(0)   = −0.03\n     ⇒ 最適 = 不治療\n```\n\n兩個分支的最適行動都是**不治療**——和「沒有第二次檢查」時一模一樣。資訊來了，你卻什麼都不會改。算 EVSI：\n\n```text\n   EU(做第二次檢查) = 0.2067·(−11.98) + 0.7933·(−0.03)\n                   = −2.476 + (−0.024) = −2.50\n\n   EVSI = (−2.50) − (−2.50) = 0.000000   ← 精確的零\n```\n\n為什麼**精確**是零，不是「碰巧很接近」？因為當每個分支的行動都是同一個（不治療），那「做第二次檢查的期望效用」其實就是「不治療這個固定行動的期望效用，先按第二次結果分組再加權平均」——而按子集分組再加權平均，數學上就是把它**還原回**不分組的整體平均（這是條件期望的全期望公式／law of total expectation，機率機制見《馴服隨機》談期望值）。換句話說：\n\n```text\n   行動不翻轉  ⇒  你只是把同一個行動的效用「先拆組、再平均回去」\n              ⇒  和不拆組的基準期望效用恆等\n              ⇒  EVSI 代數上 ≡ 0，與檢查多準、結果怎麼分布都無關\n```\n\n這是我認為本章最該讓你「啊」一聲的地方，請用自己的話把它記住：**只要一條資訊不可能讓你換動作，它的決策價值就不是「很小」，而是恆等於零——再精確、再昂貴、再費工的檢查也一樣。** 一個能驗出八成把握的高級檢查，和一條毫無資訊量的雜訊，在「不會改變你動作」的情境下，決策價值完全相等：都是 0。\n\n回到漸進式放量：如果你已經鐵了心「就算放量爆了也先全面上線、邊上邊修」，那這批漸進式放量——不管它多精密、覆蓋多少情境——決策價值精確是零。你不是在蒐集資訊，你是在做一件讓自己心安、但不影響任何動作的儀式。值不值得做這個儀式是另一回事（團隊安心也有價值），但別騙自己說那是「為了更好的決策」。\n\n## 直覺的陷阱\n\n決策正是人類直覺與規範理論最常打架的領域，本章的陷阱尤其反直覺，因為它和工程師的職業本能正面衝突。\n\n**陷阱一（具名）：「資訊越多越好。」** 這是本章要擋掉的頭號錯誤直覺。\n\n```text\n   錯誤直覺在哪一步把你帶下溝：\n\n   你的本能：「多測一輪、多加一個監控、多驗一次，總比沒有好。」\n   → 第一步就錯了：你把「資訊」當成了無條件的好東西。\n   → 真相：資訊的決策價值，取決於它會不會改變你的行動。\n           不改變行動的資訊，決策價值精確是零，而蒐集它有成本。\n   → 於是「資訊越多越好」變成「持續為零價值的資訊付費」。\n```\n\n工程版的下場你很熟：dashboard 上一百條沒人會據以行動的線、每天響兩百次沒人會因它改變任何動作的告警（這正是 alert fatigue 的決策論根源——告警的決策價值是零，成本卻是注意力的持續流失）。\n\n**陷阱二：把「資訊有趣」當「資訊有價值」。** 一條資訊可能很有趣、很反直覺、讓你「喔原來如此」——但如果它不改變你接下來做什麼，它的**決策**價值仍是零。求知慾和決策價值是兩回事；混淆它們，你會把大量時間花在「知道了很爽但用不上」的探測上。\n\n| | 大眾版（錯誤直覺） | 正確版（本書守住的） |\n|---|---|---|\n| 資訊的價值來自 | 資訊本身（多、準、即時） | 資訊 × 決策處境（它會不會改變你的行動） |\n| 不改變決策的資訊 | 「總有點價值吧」 | 決策價值**精確**為零（不是很小，是 0） |\n| 「多測一輪」 | 「總沒壞處」 | 資訊價值 ≥ 0 但蒐集有成本；淨值可為負 |\n| 資訊價值 ≥ 0 的意思 | 「每次蒐集都划算」 | 只說「免費時不虧」；要不要蒐集看 EVSI vs 成本 |\n| 有趣的資訊 | 「有趣就值得查」 | 有趣 ≠ 有決策價值；不改變行動就是零 |\n\n**怎麼自我察覺你掉進去了：** 當你想加一個監控、想再測一輪、想再查一個數據，先問自己一句殺人的話——**「如果這個結果出來是 X，我會做什麼？如果是 Y，我又會做什麼？」** 如果兩個答案一樣（無論結果如何我都做同一件事），停手：這條資訊的決策價值是零，你只是在買心安或滿足好奇。如果兩個答案不同，那它就值錢，值得算一下 EVSI 夠不夠付成本。這一問，是 EVSI 的口袋版，幾乎不花時間，卻能擋掉你大半「為測而測」的衝動。\n\n## 紙上推演\n\n全書純紙上推演，紙筆即可，不必碰任何程式。數值請自己手算一遍，別抄。\n\n### 推演題\n\n**第 1 題（★★，15 分鐘）** 不算任何數，用你自己的話論證：**一條無論結果如何都不會改變你決策的資訊，它的決策價值為什麼是零？** 要求你的論證能讓另一個工程師點頭，至少觸及兩點：(a) 資訊幫你的唯一管道是什麼；(b) 為什麼「行動不翻轉 ⇒ 期望效用恆等於基準」是代數上的等式、不是近似。然後舉一個你工作中「為了心安而蒐集、其實零決策價值」的監控指標或測試，並指出：如果要讓它變得有價值，你的決策邏輯得怎麼改？\n\n**第 2 題（★★★，25 分鐘）** 用脊椎檢查線的**原始**效用矩陣（漏診 −100 那組）和後驗 1/6，算 **EVPI**（完全資訊的價值）。提示：神諭會準確告訴你「有病」或「健康」。分四步：(1) 沒有資訊時的最適期望效用（本章 worked example 第 0 步已給，−16.67）；(2) 如果神諭說「有病」，你會挑哪個行動、拿到多少效用？說「健康」呢？(3) 把這兩個「知道真相後的最佳效用」按真實機率（病 1/6、健康 5/6）加權，得到 EV|PI；(4) EVPI = EV|PI − (沒資訊的最適)。算完後回答：你算出的 EVPI 是否 ≥ 本章 worked example 的 EVSI≈14.0？為什麼一定該如此？\n\n**第 3 題（★★，15 分鐘）** 本章 worked example 顯示：原始矩陣（漏診 −100）下第二次檢查 EVSI≈14（值得做），但漏診代價降到 −15 的變體下 EVSI=0（白做）。**同一個檢查、同樣準，價值卻從 14 掉到 0。** 用一句話解釋這個落差的根源在哪（在檢查身上，還是在別處？），然後把它翻成一個你維運的場景：描述一個「同一個監控，在情境 A 值得、在情境 B 完全多餘」的例子，並點出是什麼變了讓它從值得變多餘。\n\n### 推演解答\n\n**第 1 題：** 合格論證如下。\n\n(a) 資訊幫你的**唯一**管道是：它更新你的後驗，更新後的後驗可能指向一個不同的、更好的行動。資訊不會憑空增加任何結果的效用（−100 的格子還是 −100），它能做的只有「讓你重新選一格」。所以如果它選出來的還是同一格，它什麼都沒做。\n\n(b) 為什麼是**等式**而非近似：假設無論第二次結果是陽是陰，最適行動都是同一個（譬如都「不治療」）。那麼「做第二次檢查的期望效用」=「不治療這個固定行動的效用，先按第二次結果分組、再按結果機率加權平均」。但把一個量先分組再加權平均，等於不分組直接平均（全期望公式：E[X] = E[E[X|分組]]，機率機制見《馴服隨機》談期望值）。所以它**恆等於**「不治療在原後驗下的期望效用」，也就是沒有第二次檢查的基準值。兩者相減，代數上嚴格為 0——不依賴檢查多準、結果機率怎麼分布。常見錯路：以為「資訊量總有一點，所以價值總大於零一咪咪」——錯，決策價值看的是行動有沒有翻轉，和資訊量（資訊理論意義的 bits）是兩個正交的東西；第二次檢查的「資訊量」明明不小（它會大幅改變你的後驗信念），但只要這個信念改變不足以**跨過行動翻轉的門檻**，決策價值就是零。\n\n你的零價值監控例子（如「一條無論漲跌都不會改變部署決定的 dashboard 線」）要讓它有價值，唯一的辦法是：**讓某個結果觸發一個不同的動作**——例如「這條線超過閾值就自動回滾」。一旦它能改變行動，它的 EVSI 就從零變正。沒有「不同的動作」掛在後面的資訊，再美也是零。\n\n**第 2 題：** EVPI 計算。\n\n```text\n   (1) 沒資訊的最適期望效用（後驗 1/6）= −16.67（不治療）。\n\n   (2) 神諭說「有病」→ 在「有病」這一列挑最好的：\n         u(治療,病)=−10 vs u(不治療,病)=−100  ⇒ 挑治療，得 −10\n       神諭說「健康」→ 在「健康」這一列挑最好的：\n         u(治療,健康)=−20 vs u(不治療,健康)=0  ⇒ 挑不治療，得 0\n\n   (3) EV|PI = P(病)·(知道有病時的最佳) + P(健康)·(知道健康時的最佳)\n            = (1/6)·(−10) + (5/6)·(0)\n            = −1.6667 + 0 = −1.6667\n\n   (4) EVPI = EV|PI − (沒資訊的最適)\n           = (−1.6667) − (−16.6667)\n           = +15.00\n```\n\nEVPI = 15.0。它 ≥ worked example 的 EVSI≈14.0 ✓，**必然**如此：完全資訊（神諭，每次都猜對）是任何不完美檢查的上限，沒有任何真實檢查能比「直接知道答案」更值錢。第二次檢查的 14.0 很接近 15.0 的上限，因為這個檢查確實很準（敏感度 99%）——但它仍有偽陽/偽陰，所以差那 1.0。常見錯路：(i) 在第 (3) 步用「後驗 1/6」當機率去加權——錯，神諭場景下要用**真實的狀態機率**（病 1/6 是當前後驗對「有病」的信念，這裡正確；重點是別把「治療」的決策權重混進來）；(ii) 忘記減去基準，直接把 EV|PI=−1.67 當成 EVPI——EVPI 是**差額**，不是有資訊後的絕對效用。\n\n**第 3 題：** 落差的根源**不在檢查身上**——同一個檢查、同樣準、同樣的後驗更新能力。根源在**效用矩陣**：原始矩陣裡「漏診 −100」這個慘格，讓「治療 vs 不治療」的最適行動對後驗敏感（後驗夠高就該翻成治療），於是第二次檢查能把後驗推過翻轉門檻、產生價值；變體矩陣把漏診降到 −15，使「不治療」幾乎在所有後驗下都最優，行動門檻被推到檢查推不到的地方，於是再準的檢查也翻不動行動，價值歸零。一句話：**資訊的價值不是資訊的屬性，是「資訊 × 效用結構」的屬性。**\n\n工程版例子（一種合格答案）：一個「磁碟使用率」告警。情境 A：服務寫入量大、磁碟滿了會直接當機且難恢復（「漏掉 = 大災難」），這時告警有價值，因為它會讓你在某個閾值觸發擴容/清理——行動會翻轉。情境 B：同一個服務改成有自動擴容 + 寫入量極小、就算滿了也只是降級無傷（「漏掉 = 小事」），這時無論告警響不響你都不會手動做什麼——同一個告警，決策價值掉到零。**變的不是告警（還是那個告警），是它後面那格「漏掉的代價」和「會不會因它翻轉動作」。**\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. **為什麼**一條資訊的價值，取決於它會不會改變你的行動，而不取決於它本身多精確、多即時？資訊幫你的唯一管道是什麼？\n2. 用你自己的話講清楚：為什麼「不改變決策的資訊」價值是**精確**的零，而不是「很小」？（提示：行動不翻轉時，期望效用為什麼恆等於基準？）\n3. EVPI 和 EVSI 各量什麼？為什麼任何真實檢查的 EVSI 一定夾在 0 和 EVPI 之間？舉一個你會用 EVPI 當「上限篩選」的工程判斷（先看上限值不值得，再決定要不要找具體檢查）。\n4. 「資訊價值 ≥ 0」說的是決策價值還是淨值？為什麼「多測一輪總沒壞處」這句話**只在資訊免費時**才對？\n5. 脊椎檢查線：第一次陽性後最適行動是「不治療」，但第二次也陽性後翻成「治療」——**為什麼**第二次檢查值錢（EVSI≈14）？它值錢的源頭是哪個分支、哪個翻轉？\n6. 你想加一個新監控/再測一輪時，那句「口袋版 EVSI」的自問是什麼？它怎麼幫你當場判斷這個資訊有沒有決策價值？\n7. 「資訊有趣」和「資訊有決策價值」差在哪？舉一個你查過、知道了很爽但對任何決定都沒影響的數據。\n8. 把本章和 ch05 接起來：ch05 教你「後驗 × 效用 → 行動」，ch07 教你「要不要先去拿更多後驗」。為什麼說 ch07 是 ch05 的「前一步」、而不是另一個獨立主題？\n\n## 延伸閱讀\n\n- **Ronald A. Howard, \"Information Value Theory\" (1966)**（*IEEE Transactions on Systems Science and Cybernetics*, SSC-2(1):22–26；概覽見 https://en.wikipedia.org/wiki/Expected_value_of_perfect_information ）：EVPI 與「資訊價值＝機率 × 後果」的原始形式化。讀它你會看懂為什麼這套理論刻意和 Shannon 資訊理論分家——後者只量 bits、不管你拿這些 bits 做什麼決策。\n- **Wikipedia, \"Expected value of sample information\"**（https://en.wikipedia.org/wiki/Expected_value_of_sample_information ）：EVSI 的定義、與 EVPI 的關係、以及「資訊價值非負」性質的乾淨陳述。Historical foundation 一段點明 Raiffa–Schlaifer 1961 的源頭，適合把本章兩把尺坐實。\n- **Howard Raiffa & Robert Schlaifer,《Applied Statistical Decision Theory》(1961)**：EVSI 與貝氏決策分析的奠基之作。不必通讀，但若你想看「決策樹倒推 + 資訊價值」的完整工程化版本，這是源頭；本書 ch15 序貫決策會再用到它的決策樹倒推直覺。\n- **《馴服隨機》ch05（貝氏定理）**：本章第二次檢查的後驗更新（16.7% → 79.8% 或 0.2%）背後的機率機制在那本書。本章只用結果、不重推；注意該書盛行率 0.1%、本書 1%，是刻意差異。\n- **《馴服隨機》談期望值與全期望公式**：本章「行動不翻轉 ⇒ EVSI 恆為零」的代數核心，是條件期望的全期望公式 E[X]=E[E[X|分組]]。想看它為什麼成立、不只是接受它，去那本書把「先分組再平均＝直接平均」這條補實。\n- **《如何不騙自己》談實驗設計**：本章把「要不要蒐集資訊」算成期望值，正是實驗設計的決策論骨架——一個實驗值不值得做，看它能不能改變你接下來的行動。那本書從「制度怎麼防自欺」的角度看同一件事，和本章互指。\n"}, {"id": "ch08-reference-point", "file": "ch08-reference-point.md", "group": "Part III — 描述的裂縫・展望理論", "title": "ch08 — 參考點：你算的是變化不是狀態", "md": "# ch08 — 參考點：你算的是變化不是狀態\n\n> **本章解決什麼問題**：前面七章講的都是「該怎麼選」（規範）——期望值、效用、貝氏、資訊的價值，一套漂亮到近乎強制的演算法。從這裡開始，鏡頭轉向「人實際怎麼選」（描述）。ch04 的 Ellsberg、後面 ch11 的 Allais 已經預示規範會被掀翻，但那都是「掀翻」；展望理論第一次給出**正面的描述模型**——人怎麼算的。本章只立第一根支柱：人對**變化**（相對某個參考點的得與失）估值，不對**最終財富狀態**估值。你在 Part III 的入口。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論          ◄ 你在這裡\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n注意這張圖的形狀變了。前兩個 Part 我們在搭一座橋——從「該怎麼選」的最小公設，一步步搭到貝氏決策與資訊的價值。那座橋很美，美在它幾條無害的公理（完備、遞移、連續、獨立）就逼出唯一的演算法：最大化期望效用。現在我們要走到橋的另一端，回頭看看橋上**真正走過的人**留下的腳印——而那些腳印，沒有一個踩在橋面正中央。\n\n我認為 Part III 是整本書最反直覺、也最值得一個工程師停下來的一段。因為它不是在說「人會犯錯」。它在說一件更難消化的事：**人偏離那座漂亮的橋，偏得很穩定、很有方向、可以寫成另一套數學。** 那套數學就是展望理論（prospect theory），本章先拆它的第一根、也是最底層的支柱：參考點。\n\n## 從你已知的出發\n\n先講一個你每季都在經歷、卻可能沒當成「決策理論」看的東西：SLA 的 9。\n\n假設你維運的服務上一季可用度做到 99.9%。這一季掉到 99.5%。三個 9 變兩個半，數字上是 0.4 個百分點。你心裡那一刀，痛。你會開檢討會、會被問「發生什麼事」、會花一整個 sprint 把它救回去。\n\n現在換一個情境。同一個服務，上一季是 99.1%，這一季升到 99.5%。同樣是 0.4 個百分點，方向相反。你的感受呢？大概是「不錯，有進步」，輕飄飄地過去，可能連 standup 都懶得提。\n\n停一下。**這兩個情境的「最終狀態」是同一個——99.5%。** 一個讓你開檢討會，一個讓你點個頭就過。如果你是按「最終可用度狀態」估值的——按 ch03 那套 u(最終財富) 的記帳法——這兩件事的效用應該一模一樣，因為終點一樣。但你的反應天差地別。\n\n差在哪？差在你心裡那個「零」放在哪。第一個情境，你拿 99.9% 當零，99.5% 是**損失**。第二個情境，你拿 99.1% 當零，99.5% 是**收益**。同一個終點，從不同的零看出去，一個是賠、一個是賺，估值完全不同。\n\n這就是參考點（reference point）。你不是在對「99.5% 這個狀態」估值，你是在對「相對於上次水準的變化」估值。績效考核是「比去年」不是看絕對值；你對一次 regression 的恐懼遠大於對「多上線一個功能」的渴望；你判斷一次發布「成功還失敗」用的是「達標沒有」而不是「絕對交付了多少」——這些全都是同一件事：**你的腦子記帳記的是變化，不是狀態。**\n\n工程師最容易低估這件事，因為它太自然了，自然到你不覺得它是個「選擇」。但它是。下一節我們把它跟 ch03 那套規範記帳法擺在一起，你會看見一道清楚的裂縫。\n\n## 兩套記帳系統：u(狀態) 對上 v(變化)\n\n回到脊椎賭注——ch01 立起、ch02 算過期望值、ch03 算過期望效用的那一個：\n\n```text\n脊椎賭注 L =（+200, 0.5; −100, 0.5），單位 NT$\n擲一枚公正硬幣，正面贏 200、反面輸 100。\n期望值 E[L] = 0.5·(+200) + 0.5·(−100) = +50（ch02）\n```\n\nch03 是怎麼記這筆帳的？它用一條凹效用 u(x)=√(x+W)，財富基準 W=100，把賭注的兩個結果**換算成最終財富**再估值：\n\n```text\nch03 的記帳法：u(最終財富)\n  接賭、贏 → 最終財富 = 100 + 200 = 300 → u = √300 = 17.32\n  接賭、輸 → 最終財富 = 100 − 100 = 0   → u = √0   = 0\n  不賭     → 最終財富 = 100             → u = √100 = 10\n\n  EU(接賭) = 0.5·17.32 + 0.5·0 = 8.66 < 10 = u(不賭)\n  ⇒ 拒絕（風險趨避，ch03 已算）\n```\n\n注意這套記帳的核心動作：它把「+200」「−100」這些**變化量**，先加到你的家底 W=100 上，變成「最終你手上有多少錢」（300、0、100），再對那個**最終狀態**估值。效用是「你站在哪」的函數，不是「你往哪走了一步」的函數。\n\n展望理論說：人不是這樣記的。人記的是**你往哪走了一步**。它換了一個記帳單位——不是最終財富 u(x+W)，而是相對參考點的變化 v(Δ)：\n\n```text\n展望理論的記帳法：v(變化)，參考點＝現狀（你現在的 100，當成零）\n  接賭、贏 → 變化 = +200（一筆「得」）→ v(+200)\n  接賭、輸 → 變化 = −100（一筆「失」）→ v(−100)\n  不賭     → 變化 =    0（沒動）        → v(0) = 0\n\n  ⇒ 評估的是 v(+200) 對上 v(−100)，不是 √300 對上 √0。\n```\n\n兩套系統的差別，不在「凹不凹」，而在**坐標原點放哪**。ch03 把原點釘死在「財富 = 0」（一無所有），所有狀態都從那裡量起；展望理論把原點放在「你現在站的地方」（現狀），所有東西都從那裡量得失。一個是絕對坐標，一個是相對坐標。\n\n這個差別聽起來小，後果很大。我先給你一個會卡住直覺的觀察，下一節用數字攤開：在 ch03 的絕對坐標裡，「你現在有多少家底 W」會直接改變你接不接賭（基準表特別挑 W=100 而不是 W=1000，就是因為 W 一變，結論就從「拒絕」翻成「接受」——這正是絕對坐標的特徵）。而在展望理論的相對坐標裡，只要參考點是現狀，「+200 對上 −100」這筆帳跟你家底多少**幾乎無關**——你算的永遠是「從這裡往上 200、往下 100」。\n\n```text\n裂縫的第一道縫（本章只立、ch09 才算到底）\n\n  ch03（規範）：對 u(x+W) 估值      ← 你站在哪（絕對狀態）\n  展望（描述）：對 v(Δ) 估值        ← 你往哪走了一步（相對變化）\n\n  兩套都得出「拒絕脊椎賭注」——但走的是不同的路：\n    ch03   靠「凹」（邊際遞減：贏到的第 200 元沒輸掉的第 100 元那麼重）\n    展望   靠「失比得更陡」（損失趨避，ch09 的主角）\n\n  同一個拒絕、兩種機制。這就是 ch12 要回答的：\n  「描述」和「規範」殊途同歸，到底證明了什麼？\n```\n\n本章的工作到此其實只有一句話：**把估值的對象從「狀態」搬到「變化」。** 損失趨避（失更陡）是 ch09，機率權重也是 ch09，框架是 ch10。但這一搬，是後面三章所有戲劇的地基——沒有參考點，就沒有「得」和「失」之分，沒有得失之分，就沒有損失趨避、沒有反射效應、沒有框架。所以我把它單獨放一章。\n\n## worked example：同一個終點，兩個參考點，兩種估值\n\n光說「人記變化不記狀態」還太抽象。我們用一個乾淨的數字把它逼出來。這個例子刻意**不用**脊椎賭注（脊椎賭注留到 ch09 用損失趨避重算），先用一個沒有不確定性的純記帳例子，把「參考點依賴」這件事本身看清楚。\n\n情境：一筆操作之後，你**最終手上確定有 NT$1100**。沒有賭、沒有機率，就是個確定的終點。問題是：這 1100 對你來說，是一筆「得」還是一筆「失」？\n\n答案完全取決於你拿什麼當零。\n\n```text\n最終財富固定 = 1100，從兩個不同參考點記帳\n\n  情境 A：參考點 = 1000（你本來預期會有 1000）\n    變化 = 1100 − 1000 = +100  → 這是一筆「得 100」\n    感受：賺到了，開心。\n\n  情境 B：參考點 = 1200（你本來預期會有 1200，臨時被砍了一刀）\n    變化 = 1100 − 1200 = −100  → 這是一筆「失 100」\n    感受：虧了，難受。\n\n  ⇒ 同一個 1100，A 是賺、B 是虧。終點一樣，估值相反。\n```\n\n現在把這兩種記帳，跟 ch03 的「u(最終財富)」記帳並排，看清楚它們是不同的系統。我用 ch03 的基準效用 u(x)=√(x+100) 把絕對記帳也算出來（這裡 x 是淨變化、家底 100 已含在公式裡，最終財富 1100 對應 x=1000）：\n\n```text\n三套記帳並排（終點都是「最終 1100」）\n\n  ┌──────────────────┬─────────────┬───────────────────────────┐\n  │ 記帳系統         │ 估的是      │ 1100 這個終點的值          │\n  ├──────────────────┼─────────────┼───────────────────────────┤\n  │ ch03 規範 u(x+W) │ 最終狀態    │ u = √(1000+100) = √1100    │\n  │                  │（絕對坐標） │   ≈ 33.17（一個固定的數）  │\n  ├──────────────────┼─────────────┼───────────────────────────┤\n  │ 展望 v，參考 1000│ 變化 +100   │ v(+100)：一筆「得」        │\n  │                  │（相對坐標） │   → 估成正值               │\n  ├──────────────────┼─────────────┼───────────────────────────┤\n  │ 展望 v，參考 1200│ 變化 −100   │ v(−100)：一筆「失」        │\n  │                  │（相對坐標） │   → 估成負值（且更陡，ch09）│\n  └──────────────────┴─────────────┴───────────────────────────┘\n\n  複核 √1100：33² = 1089，33.2² = 1102.24，故 √1100 ≈ 33.17 ✓\n```\n\n讀這張表的重點不在那個 33.17（它是個準確但無關緊要的數），重點在**它只有一個值**。ch03 的記帳法看「最終 1100」就是 √1100，跟你「本來預期多少」毫無關係——它不知道也不在乎你的參考點，因為它根本沒有參考點這個零件。\n\n而展望理論的兩行，**同一個 1100 給出符號相反的估值**：參考點 1000 時是正的「得」，參考點 1200 時是負的「失」。差別純粹來自「你把零放哪」。這就是參考點依賴（reference dependence）的精確意思：\n\n> 兩個在「最終財富」上完全相同的結果，可以因為參考點不同而被估成一得一失——這在 ch03 的規範記帳法裡是不可能發生的，因為那裡根本沒有「參考點」這個自由度。\n\n這正是 Tversky 與 Kahneman 後來（1991，\"Loss Aversion in Riskless Choice\"，QJE）把參考點依賴講得最白的地方：價值的載體是相對參考點的**得與失**，不是淨資產狀態；偏好可以在兩個「最終財富完全相同」的選項之間翻轉，只因為它們相對參考點被編碼成不同的得失（2026-06 查證）。\n\n我認為這是整本書最該停十分鐘的一頁。不是因為數學難——它一點都不難，就是個減法。難的是承認：**你以為你在對「結果」估值，其實你一直在對「相對某個你沒明說的零點的變化」估值，而那個零點是可以被移動的。** 後面整個 Part III 的戲劇——損失趨避、反射效應、框架效應——全都長在這個「零點可以被移動」上。ch10 會讓你看到：別人只要用措辭幫你把零點挪一下，你的選擇就翻轉，而你完全不會察覺。\n\n## 參考點通常是現狀，但不總是\n\n上一節為了乾淨，把參考點直接給定（1000 或 1200）。真實情況是：參考點從哪來？\n\nKahneman 與 Tversky 1979 的原始說法是：**參考點通常對應「當前的資產狀態」**，也就是現狀（status quo）（2026-06 查證，Econometrica 47:263–291）。這也是脊椎賭注的預設——你現在站在現狀，賭注的 +200/−100 就是相對現狀的得失。本書全書凡用展望理論重算脊椎賭注，參考點一律取**現狀 0**（基準表定案）。\n\n但「通常是現狀」不是「永遠是現狀」。1991 年那篇 riskless choice 的論文裡，Tversky 與 Kahneman 把參考點講得更鬆：它常是現狀，但也可以是**期望、抱負、規範、或社會比較**（2026-06 查證，QJE 106:1039–1061）。對工程師來說這非常好懂——同一個結果，把零點挪一下，得失就翻面：\n\n| 參考點來源 | 工程版的例子（同一結果、零點不同） |\n|---|---|\n| 現狀 | 「相比現在的延遲」——這次部署讓 p99 升了還是降了 |\n| 期望／承諾 | 「相比 SLA 承諾的 99.9%」——做到 99.95 是達標、99.85 是違約，哪怕兩者差距很小 |\n| 抱負／目標 | 「相比這季 OKR 設的目標」——同一個交付量，目標訂高了就是「沒達標」 |\n| 社會比較 | 「相比隔壁團隊」——同樣的 incident 數，別人少你就難受 |\n\n這裡有一個誠實標示要先打在前面：**參考點怎麼被決定，是描述心理學的開放問題，本書不深入。** 為什麼人會選現狀當零、為什麼期望有時會取代現狀、參考點怎麼隨時間漂移（你昨天的損失變成今天的新基準——快樂跑步機）——這些是「人腦怎麼運作」的心理機制，指向《思考的陷阱》談錨定與參考點。本書的工作是更窄、也更乾淨的一件事：**一旦參考點給定，得失就確定，估值就照 v(變化) 算。** 我們收的是這套記帳法的**數學後果**，不是它的心理成因（這條交棒線，ch12 會正式畫清楚——展望理論的數學由本書接手，心理機制指向偏誤書）。\n\n但即使只收數學後果，有一件事必須當場說清楚，否則整個 Part III 會被誤讀——這就是下一節。\n\n## 這是描述，不是規範——別把 v 當成 u\n\n整本書的中央張力，在這一章第一次以「正面描述模型」的形式出現，所以這條線必須劃得格外清楚。\n\nch03 的效用 u(x) 是**規範**的：它在回答「你**該**怎麼選」。那套理論說，如果你接受四條無害的公理（完備、遞移、連續、獨立），你的選擇就**等價於**在最大化某個 u 的期望值——這是個「應該」，違反它你會被 money pump 牽著鼻子抽水（ch03）。\n\n展望理論的價值函數 v(Δ) 是**描述**的：它在回答「人**實際**怎麼選」。它不主張「你應該按參考點記帳」，它只是觀察到「人就是按參考點記帳」，並且把這個觀察寫成一條可以預測方向的數學。它沒有公理逼你接受它，它有的是實驗——一大堆「正常聰明的人系統性地這樣選」的實驗。\n\n```text\n別把這兩個 v 和 u 搞混（這是 Part III 最容易出的錯）\n\n  u(x)   規範      「你該怎麼算」    對最終財富、凹、公理逼出來的\n  v(Δ)   描述      「人實際怎麼算」  對參考點變化、得凹失凸、實驗歸納出來的\n\n  把 v 當成「正確的 u」 → 你會以為展望理論在說「人該按參考點記帳」（錯）\n  把 u 當成「人真在算的」→ 你會以為 ch03 在描述真人（錯，它是規範）\n```\n\n這個區分為什麼這麼重要？因為一旦混淆，你會掉進兩個方向相反的坑。一個坑是把展望理論讀成「人很笨，居然不按最終財富算」——這是 T8 要守住的陷阱，下一節細談。另一個坑更隱蔽：把展望理論讀成「所以參考點記帳才是對的，期望效用過時了」——這同樣是誤讀，ch12 會正面回答。**參考點依賴是一個關於「人怎麼算」的事實，不是一個關於「該怎麼算」的主張。** 描述一座橋上的腳印偏哪邊，不等於主張「橋面該重畫到腳印那邊」。\n\n我把這句話放在這裡，是因為它是整個 Part III 的閱讀說明書：接下來四章，每當你看到「人會這樣」「人會那樣」，問自己一句——這是在說「人實際怎樣」（描述）還是「人該怎樣」（規範）？展望理論講的永遠是前者。它的了不起，不在於它推翻了什麼，而在於它證明了**人偏離規範的方式本身是有結構的、可建模的、可預測方向的**——這比「人會犯隨機的錯」深刻得多，也比「人很笨」尊重人得多。\n\n## 直覺的陷阱\n\n參考點這個概念，因為太貼近日常，反而最容易被兩種方向相反的直覺帶下溝。守住 landscape 的正確版（T7、T8）。\n\n| 陷阱 | 錯誤直覺長什麼樣 | 它在哪一步帶你下溝 | 正確版（怎麼自我察覺） |\n|---|---|---|---|\n| **把 v(Δ) 當成規範 u(x)**（T7 的本章版） | 「展望理論給了一條更好的價值函數，所以以後估值就該用 v、按參考點記帳。」 | 把一個**描述**模型（人怎麼算）讀成**規範**主張（該怎麼算）。一旦這樣讀，你會開始用 v 去「指導」決策，等於把人的系統性偏差當成目標。 | v 是描述、u 是規範，兩套數學描述**兩件不同的事**。徵兆：當你想說「展望理論告訴我們**應該**怎麼決策」時——停。它只告訴你人**實際**怎麼決策。「該怎麼決策」的問題，規範理論（ch03）還沒被推翻。 |\n| **把參考點依賴當「人很笨」**（T8） | 「人居然不看最終財富、只看相對變化，這明明是個 bug，是非理性。」 | 把一個**穩定、可預測方向**的描述性事實，當成「缺陷／隨機錯誤」的指控。一旦這樣讀，你會錯過全章的重點——重點不是「人錯了」，是「人偏離的方式有結構」。 | 參考點依賴跨情境、跨文化穩定，方向可預測（同一終點，零點挪向高處就變損失、挪向低處就變收益），可以寫成數學。它了不起正在於此：偏離不是噪音，是訊號。徵兆：當你想說「人怎麼這麼蠢」時——換個問法，「人偏的方向能不能預測」，能，那它就不是蠢，是規律。 |\n| **以為自己沒有參考點**（隱形零點） | 「我做決策看的是絕對的最終狀態，不會被『相對於什麼』影響。」 | 你確實有一個參考點，只是它隱形——通常是現狀或某個你沒明說的預期。看不見它，你就無法察覺它被移動。 | 自我察覺法：拿任何一個你最近的「成功/失敗」判斷，問「我是拿什麼當零點？」——上季水準？SLA 承諾？OKR 目標？隔壁團隊？通常你會發現那個零點是可以換的，而換了之後同一個結果就從「失敗」變「成功」。ch10 會證明：別人能用措辭幫你換零點，你還察覺不到。 |\n\n第三個陷阱是這章最該帶走的自我檢查工具。**「我的零點放在哪？它能不能被換到別處？」**——這一問，是你拆穿後面框架效應（ch10）的鑰匙。\n\n## 紙上推演\n\n純紙筆推演，不要碰任何程式碼。每題標難度與時間，先自己算/想，再讀解答。\n\n---\n\n**題 1（★，10 分鐘）**：把脊椎賭注 L =（+200, 0.5; −100, 0.5）分別用「最終財富」與「參考點變化」兩種記帳法各寫一次。用 ch03 基準 u(x)=√(x+100)、W=100，列出兩套記帳各自評估的對象（不必算到底，重點是寫清楚「估的是什麼」）。然後回答：這兩套記帳，差別到底在哪一個零件上？\n\n**題 2（★★，15 分鐘）**：某季你的服務可用度。情境甲：上季 99.92%，這季 99.70%。情境乙：上季 99.48%，這季 99.70%。\n(a) 兩個情境的「最終狀態」一樣嗎？\n(b) 用參考點記帳，這季的 99.70% 在甲、乙各是一筆「得」還是「失」？參考點各是多少？\n(c) 如果有人按 ch03 的 u(最終可用度) 估值，這兩個情境的效用該一樣還不一樣？為什麼真人的反應不一樣？這道落差正是本章的「裂縫」——用一句話講清它。\n\n**題 3（★★，15 分鐘）**：最終財富固定為 NT$1100。\n(a) 參考點 = 900 時，這是得還是失？變化多少？\n(b) 參考點 = 1300 時，這是得還是失？變化多少？\n(c) 用一句話說明：為什麼「最終財富一樣、估值卻能相反」這件事，在 ch03 的規範記帳法裡**不可能**發生？（提示：ch03 的記帳法少了哪個零件？）\n\n---\n\n### 推演解答\n\n**題 1 解答**\n\n兩套記帳並排：\n\n```text\n最終財富記帳（ch03 規範，u(x)=√(x+100)）：\n  估的對象 = 最終財富的效用\n    贏 → 最終財富 300 → u = √(300+100)? 不對，先看清楚 x 的定義。\n```\n\n這裡要小心一個常見錯路：u(x)=√(x+100) 的 x 是**淨變化量**（賭注的 +200 / −100），W=100 已經寫在 +100 裡。所以正確代入是：\n\n```text\n最終財富記帳（ch03）：x = 淨變化\n  贏 → x = +200 → u = √(200+100) = √300 = 17.32\n  輸 → x = −100 → u = √(−100+100) = √0 = 0\n  不賭 → x = 0 → u = √(0+100) = √100 = 10\n  估的對象：把變化加進家底後的「最終財富效用」（絕對坐標）\n\n參考點變化記帳（展望，參考點 = 現狀 0）：\n  贏 → 變化 = +200 → v(+200)（一筆「得」）\n  輸 → 變化 = −100 → v(−100)（一筆「失」）\n  不賭 → 變化 = 0 → v(0) = 0\n  估的對象：相對現狀的「得失」（相對坐標）\n```\n\n差別在哪個零件？**零點（參考點）。** ch03 把零點釘在「財富 = 0」，所有結果換算成最終財富再估值（u 是最終狀態的函數）；展望把零點放在「現狀」，所有結果換算成相對現狀的得失再估值（v 是變化的函數）。兩套都會得出「拒絕」，但 ch03 靠的是 u 的凹性（邊際遞減），展望靠的是 v 對失更陡（損失趨避，ch09 才算到底）。常見錯路：把 u(x)=√(x+100) 的 x 當成「最終財富」直接代 300/0/100——那會算成 √400、√100、√200，全錯。x 是變化，W=100 在公式裡。\n\n**題 2 解答**\n\n(a) 最終狀態一樣：兩個情境這季都是 **99.70%**。\n\n(b) 參考點記帳：\n\n```text\n情境甲：參考點 = 上季 99.92%\n  變化 = 99.70 − 99.92 = −0.22 個百分點  → 一筆「失」（退步了）\n\n情境乙：參考點 = 上季 99.48%\n  變化 = 99.70 − 99.48 = +0.22 個百分點  → 一筆「得」（進步了）\n```\n\n同一個 99.70%，甲是失、乙是得，純粹因為零點（上季水準）不同。\n\n(c) 按 ch03 的 u(最終可用度) 估值，兩情境**該一樣**——因為終點同樣是 99.70%，u 只看終點、不看你從哪來。但真人的反應不一樣：甲會開檢討會、乙會點頭過，因為真人按參考點記帳，甲是損失、乙是收益。一句話講清裂縫：**規範記帳法（看終點）說這兩件事一樣，真人的記帳法（看相對上季的變化）說一個是退步一個是進步——人估的是變化，不是狀態。** 這就是參考點依賴，也是本章的整道縫。\n\n**題 3 解答**\n\n```text\n最終財富固定 = 1100\n\n(a) 參考點 = 900：\n    變化 = 1100 − 900 = +200  → 「得 200」\n\n(b) 參考點 = 1300：\n    變化 = 1100 − 1300 = −200 → 「失 200」\n```\n\n(c) 一句話：在 ch03 的規範記帳法裡，「最終財富一樣、估值相反」**不可能**發生，因為那套記帳法的價值只是最終財富的函數 u(1100)——同一個 1100 永遠對應同一個 u 值，它**沒有「參考點」這個零件**可以移動。要讓同一個終點估出相反的值，你必須先有一個能被移動的零點；而那個零點，正是規範記帳法刻意不要、展望理論刻意加上的東西。常見錯路：以為「參考點 1300 時失 200」是因為「1100 比較少」——不是，1100 是固定的，變的是你拿來比的零點。得失是「終點減零點」，動的是零點。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先回答「為什麼」。\n\n1. 用一句話對另一個工程師講清楚「參考點」：人估值估的是什麼、不是什麼？為什麼這跟 ch03 的 u(最終財富) 是**兩套不同的記帳系統**，而不只是「同一套的不同寫法」？\n2. SLA 從 99.9% 掉到 99.5%，跟從 99.1% 升到 99.5%，最終狀態一樣。為什麼你的痛/喜完全不對稱？這個不對稱用「參考點」怎麼解釋？\n3. 「同一個最終財富 1100，可以被估成一得一失」——這件事在 ch03 的規範記帳法裡為什麼**不可能**發生？（答案要點到「缺了哪個零件」。）\n4. 為什麼本章一再強調「v 是描述、u 是規範」？把 v 當成「更好的 u」會掉進哪個坑？把 u 當成「人真在算的」又會掉進哪個坑？\n5. 「參考點依賴是人很笨的證據」——這句話錯在哪？正確版怎麼講才不會把「穩定可預測的偏離」誤當成「隨機的缺陷」？\n6. 參考點「通常是現狀」，但還可能是什麼？舉一個你工作裡「同一個交付結果、因為參考點不同（現狀／SLA 承諾／OKR 目標／隔壁團隊）而感受相反」的例子。\n7. 本章只立了參考點這一根支柱，刻意沒算「失比得更陡」（損失趨避）。為什麼說「沒有參考點，就沒有損失趨避、沒有框架」？參考點為什麼是 Part III 的地基？\n\n## 延伸閱讀\n\n以下連結在 2026-06 查證過，優先放權威來源。\n\n- **Kahneman, D. & Tversky, A., \"Prospect Theory: An Analysis of Decision under Risk\"（*Econometrica* 47(2):263–291, 1979）**（https://www.econometricsociety.org/publications/econometrica/1979/03/01/prospect-theory-analysis-decision-under-risk）— 展望理論的出生證明，本章參考點概念的原典。讀 value function 一節：它如何定義在「相對參考點的偏離」上、並指出參考點「通常對應當前資產狀態」。這是 Econometrica 史上被引用最多的論文，原文比任何二手轉述都清楚。\n- **Tversky, A. & Kahneman, D., \"Loss Aversion in Riskless Choice: A Reference-Dependent Model\"（*Quarterly Journal of Economics* 106(4):1039–1061, 1991）**（http://bear.warrington.ufl.edu/brenner/mar7588/Papers/tversky-kahneman-qji1991.pdf）— 把「參考點依賴」講得最白的一篇：兩個在最終財富上完全相同的選項，可以因參考點不同而偏好翻轉。本章那張「同一個 1100、兩種估值」的表，理論依據就在這。注意它把參考點放寬到不只現狀（也可以是期望、抱負、規範）。\n- **Wikipedia, \"Prospect theory\"**（https://en.wikipedia.org/wiki/Prospect_theory）— 想要參考點、損失趨避、機率權重、編輯/評估兩階段的快速地圖，這條最省事；可對照 1979 原文交叉核對「concave for gains, convex for losses, steeper for losses」這三句。讀完回到 ch09，那三句裡的後兩句（損失趨避、得失曲率）才會被算到底。\n- **參考點依賴的心理機制**——本章只收了參考點的**數學後果**（一旦給定，得失就確定）。人腦為什麼選現狀當零、參考點怎麼隨時間漂移（快樂跑步機）、為什麼你察覺不到自己的零點——這些**心理機制**指向《思考的陷阱》談錨定與參考點。本書與它是同一道裂縫的兩面：本書接數學，它接心理（這條交棒線 ch12 正式畫清）。\n- **凹效用的規範版**——本章對照的 u(x+W) 那套絕對坐標記帳法，完整內容在 ch03（vNM 公理、凹＝風險趨避）。想看「凹」的微分直覺（邊際遞減為什麼是導數遞減），點到為止指向《馴服無限》談導數與凹凸。\n<\/content>\n<\/invoke>\n"}, {"id": "ch09-loss-aversion-probability-weighting", "file": "ch09-loss-aversion-probability-weighting.md", "group": "Part III — 描述的裂縫・展望理論", "title": "ch09 — 損失趨避與機率權重", "md": "# ch09 — 損失趨避與機率權重\n\n> **本章解決什麼問題**：上一章（ch08）給了展望理論的第一支柱——人估的是相對參考點的**變化**，不是最終財富狀態。但「算變化」本身還不能解釋為什麼脊椎那個期望值為正的賭注會被拒絕。這一章補上第二、三支柱：**損失趨避（loss aversion）**——同樣大小的失，比得更重（一個常被引用的估計是 λ≈2.25）；以及**機率權重（probability weighting）**——人決策時用的不是機率本身，而是被扭曲過的「決策權重」，小機率被高估、中大機率被低估，畫出一條倒 S 曲線。有了這兩根柱子，我們就能把脊椎賭注用展望理論完整重算一次，得到「為何 EV 為正仍拒絕」的**描述性**解釋——它跟 ch03 凹效用的結論一樣（拒絕），但機制完全不同（一個是「邊際遞減」，一個是「損失更重」）。ch10 接著會讓這套機制被一句措辭觸發，翻轉答案（框架）。\n\n## 從你已知的出發\n\n你的團隊對「搞砸一次」的恐懼，遠大於對「多做好一件」的渴望。這不是膽小，是可以量出來的不對稱。\n\n想想你最近一次 code review。一個 PR 帶來「P99 延遲改善 5%」的可能收益，但有「引入一個 regression」的可能風險。就算你心裡估這兩件事「差不多大」，你的真實反應一定不對稱：regression 的陰影壓過延遲改善的吸引力。團隊會為了避免一次線上事故，放棄好幾個本來划算的優化。你寫 runbook、加 canary、上 feature flag——這些防禦工事的存在本身就在說：**一單位的「壞」比一單位的「好」貴**。這就是損失趨避，λ 就是「貴幾倍」那個倍數。\n\n再看你對機率的扭曲。你會為「百萬分之一的資料永久遺失」做三副備份、跨區複寫、定期演練還原——投入的力氣遠超過那個機率「按比例」該得的。同時，對「每天都在發生的小錯」（偶發的 5xx、零星的超時）你反而麻木，調個 retry 上限就算了。一個極小的災難機率被你的腦放大成「必須嚴防」，一個中等的日常機率被你縮小成「可以容忍」。**你對機率的反應不是線性的**——這正是機率權重函數要描述的東西。\n\n這一章要做的，是把你這兩個早就在用的工程直覺——「壞比好貴」與「機率被扭曲」——接上展望理論的兩條精確曲線。我先提醒一件全章最重要的事：**這是在說人怎麼算，不是在說人該怎麼算。** ch03 講的是規範（凹效用下你該風險趨避）；這一章講的是描述（人實際上把損失放大了 λ 倍、把機率掰彎成倒 S）。兩者會在同一個賭注上得到同樣的「拒絕」，但它們是兩套不同的數學在描述兩件不同的事——這道裂縫，是全書反覆叩問的那一句。\n\n## 第二支柱：損失趨避——失比得更陡\n\nch08 已經立起價值函數的骨架：價值 v 是定義在**變化**（相對參考點的得失）上的，不是定義在最終財富上的。展望理論給這條曲線的形狀是這樣：\n\n```text\n價值函數 v(x)（x = 相對參考點的得失，參考點在原點）\n\n              v(x)\n               │           ╭─────  得（gain）：x>0\n               │        ╭──╯       凹（concave）→ 對「得」風險趨避\n               │     ╭──╯\n               │   ╭─╯\n        ───────┼─╱──────────────── x（得失）\n            ╭──╯ │  ↑ 原點 = 參考點\n         ╭──╯    │\n       ╭─╯       │   失（loss）：x<0\n      ╱          │   凸（convex）→ 對「失」風險愛好\n     ╱           │   而且更「陡」→ 損失趨避（λ）\n    │            │\n```\n\n三件事一次發生，逐一拆開：\n\n1. **得的那邊是凹的**（往上爬越來越慢）——這跟 ch03 的凹效用同形，對「得」是風險趨避。\n2. **失的那邊是凸的**（往下掉越來越慢）——這跟 ch03 **相反**。對「失」，人是風險**愛好**的（寧可賭一把搏回來，也不接受確定的小損失）。得凹、失凸，整條曲線是 S 型。這個「得失風險態度相反」的現象叫**反射效應（reflection effect）**，下一節細講。\n3. **失的那邊整體更陡**——在原點附近，往下掉一單位砍掉的價值，比往上爬一單位加的價值**更多**。這個「更陡」就是**損失趨避**。\n\n展望理論用一條分段冪函數把這三件事寫死（Tversky–Kahneman 1992，累積展望理論，照事實基準）：\n\n```text\nv(x) =  x^α              當 x ≥ 0（得）        ← 凹（α<1）\nv(x) = −λ·(−x)^β         當 x < 0（失）        ← 凸，且乘上放大係數 λ\n\nTK1992 中位估計：α = β = 0.88，λ = 2.25\n```\n\nα=β=0.88 控制兩邊的彎曲程度（小於 1 ⇒ 得凹、失凸）；λ=2.25 是損失趨避係數，它把整個損失那邊**垂直壓低 2.25 倍**。直白講：在參考點附近，**輸掉 100 的痛，是贏到 100 的爽的 2.25 倍**（若問「贏多少才抵消」，正確答案是約 251，而非 225——因為 v(x)=x^0.88 非線性，G^0.88=2.25×100^0.88 解出 G≈251）。失比得重 2.25 倍——這就是 λ 的精確意義。\n\n我必須在這裡踩一次煞車，標明嚴謹度，因為這是全書最該誠實 hedge 的一處（事實基準 T6，標 2026-06）：\n\n> **λ=2.25 不是物理常數。** 它是 Tversky–Kahneman 1992 從一組實驗受試者估出來的**一組中位數**。後來的 meta-analysis 給出明顯較低的值：Walasek、Mullett、Stewart 在 *Journal of Economic Psychology*（2024）的整合分析得到 **λ≈1.31**（並指 TK1992 的 2.25「偏高」）；另一份 Brown 等人 2024 的 meta-analysis 則落在 **≈1.9–2.0** 附近。換句話說，不同整合給出的中心值橫跨大約 **1.3 到 2.0**，依領域、方法、是否含「不確定」而異（2026-06）。**損失趨避這個現象本身**（失比得重）跨文化、跨領域相當穩健；但**「重幾倍」這個具體數字變異很大**。本章後面會親自示範：在脊椎賭注上，換一個 λ 足以讓「拒絕」翻成「接受」——所以你要把 λ 當成一個有不確定區間的估計，不是一顆寫進憲法的常數。\n\n### 反射效應：同一個賭，得改成失，風險態度翻轉\n\n反射效應值得單獨停一下，因為它是「得凹、失凸」這個形狀最戲劇的後果，而且 ch10 的框架效應整個建在它上面。\n\n考慮兩個鏡像的選擇（這是 Kahneman–Tversky 1979 原始論文裡的經典結構，照事實基準）：\n\n```text\n得的版本（你手上多了一些，選怎麼處理「得」）：\n  A. 確定拿到 +100\n  B. 50% 拿到 +200，50% 拿到 0       （期望值同為 +100）\n  → 多數人選 A（確定的）          ← 對「得」風險趨避\n\n失的版本（把上面每個結果的正負號翻過來）：\n  C. 確定損失 −100\n  D. 50% 損失 −200，50% 損失 0       （期望值同為 −100）\n  → 多數人選 D（賭一把）          ← 對「失」風險愛好\n```\n\n同一個人，在「得」的世界裡求穩（選確定的 A），在「失」的世界裡卻寧可賭（選有風險的 D）。風險態度被「這是得還是失」翻了個面——這就是反射效應。\n\n機制就是那條 S 曲線：得那邊凹，凹 ⇒ 風險趨避，所以選確定的；失那邊凸，凸 ⇒ 風險愛好，所以選賭的。一句話：**S 型價值函數在原點兩側的曲率相反，就逼出了「得求穩、失搏命」的反射。**\n\n工程版你天天見：專案順利時（在「得」域），你保守，求穩穩交付、不冒險加新東西；專案已經炸了、deadline 必爆（在「失」域），你反而會孤注一擲上一個沒驗證過的猛藥方案——「反正都這樣了，賭一把」。同一個你，參考點一換邊，風險胃口就翻轉。這不是性格不穩定，是 S 型曲線的數學後果。\n\n## 第三支柱：機率權重——你用的不是機率，是被掰彎的決策權重\n\n到目前為止我們只動了「結果」這一側（把金額換成 v(x)）。展望理論還動了「機率」這一側：人在加權時用的不是機率 p 本身，而是一個被扭曲過的**決策權重 w(p)**。\n\n先講清楚這是什麼、不是什麼。w(p) **不是**「人對機率估計錯誤」——不是說你以為硬幣是 60/40。是說：**即使你完全知道機率是 50/50，你在做決策時給它的「分量」也不是 0.5。** 機率被正確認知，但在進入決策時被系統性地重新加權。\n\n形狀是這樣（倒 S，這是 web 查證過的標準描述）：\n\n```text\n決策權重 w(p)\n     |\n 1.0 |                                  ..o   在 p=1 收斂回 1\n     |                               ..o\n     |                            ..o         中大機率：w(p) < p（被低估）\n     |                         ..o            （曲線在對角線下方）\n     |                      ..o\n 0.5 |......... w=p 對角線 ..o ...............\n     |                 ..o\n     |              ..o                       小機率：w(p) > p（被高估）\n     |           ..o                          （曲線在對角線上方）\n     |        ..o\n 0.0 |.....o\n     +-----+---------+---------+--------- p\n          0.05      0.5       0.95\n       0.05      0.5       0.95\n```\n\n兩個端點（p=0、p=1）權重是準的（不可能就是不可能、確定就是確定）。中間整條被掰成倒 S：**小機率被高估**（曲線跑到對角線上方），**中大機率被低估**（曲線掉到對角線下方）。\n\nTK1992 給的函數與參數（照事實基準，web 查證確認）：\n\n```text\nw(p) = p^γ / ( p^γ + (1−p)^γ )^(1/γ)\n\nγ = 0.61（得域）、δ = 0.69（失域）；小機率高估、中大機率低估，倒 S 型\n```\n\n我親手代幾個數進去，讓「倒 S」變成具體的數字（這些是 γ=0.61 的得域權重，我自己複核過）：\n\n```text\n   p       w(p)        解讀\n 0.01  →  0.055     1% 的事，決策上被當成約 5.5% ── 高估超過 5 倍\n 0.05  →  0.132     5% 被當成約 13%             ── 高估\n 0.10  →  0.186     10% 被當成約 19%            ── 還在高估\n 0.50  →  0.421     50% 被當成約 42%            ── 開始低估\n 0.90  →  0.712     90% 被當成約 71%            ── 明顯低估\n 0.99  →  0.912     99% 被當成約 91%            ── 低估\n```\n\n看 p=0.01 那行：一個 1% 的機率，在決策時被當成 5.5% 來秤——放大了五倍多。再看 p=0.90：一個 90% 的機率，只被秤成 71%。前者解釋你為什麼買樂透（高估極小的中獎機率），後者解釋你為什麼對「九成會成功」的事還是放不下心。\n\n### 樂透與保險：同一條曲線的兩個出口\n\n機率權重最漂亮的解釋力，是它一口氣講通了兩個看似矛盾的行為：**同一個人，既買樂透（追求風險）又買保險（趨避風險）。**\n\n按期望效用，這很尷尬：買樂透是付出大於期望值的錢去賭（風險愛好），買保險是付出大於期望損失的錢去避險（風險趨避）——同一個人怎麼可能同時兩種風險態度？傳統解釋要編出一條又凹又凸的扭麻花效用函數。\n\n機率權重給的答案乾淨得多：\n\n```text\n買樂透：獎金大、中獎機率極小（如 0.000001）\n  → 極小機率被「高估」（w(p) ≫ p）\n  → 那個微乎其微的大獎在你心裡被放大，於是你願意付錢賭\n\n買保險：賠償大、出險機率極小（如房子燒掉）\n  → 同樣是極小機率被「高估」\n  → 那個微乎其微的大災難在你心裡被放大，於是你願意付保費避開\n\n兩個都是「高估極小機率」這一條規律的後果，方向相反只是因為\n一個是極小機率的「大好事」、一個是極小機率的「大壞事」。\n```\n\n所以「買樂透又買保險的人」**不是不一致**——他只是對「極小機率的極端結果」一律放大。一條倒 S 曲線，兩個出口。這是 ch09 我最想讓你帶走的一個「驚嘆點」：**你不需要兩種人格，只需要一條被掰彎的機率曲線。**（這個洞見在 ch11 還會回來——確定性效應就是這條曲線在 p→1 附近陡降的後果。）\n\n## 把脊椎賭注用展望理論重算\n\n工具齊了，現在第三次重算全書脊椎那個賭注。回顧前兩次：\n\n- **ch02（期望值）**：E[L] = +50，說「接」。\n- **ch03（期望效用，u=√，W=100）**：EU = 8.66 < u(不賭)=10，說「拒」——機制是**凹效用＝邊際遞減**。\n- **ch09（展望理論）**：現在用參考點＋損失趨避＋機率權重，看它說什麼、機制是什麼。\n\n脊椎賭注（全書統一）：`L = (+200, 0.5; −100, 0.5)`，單位 NT$。在展望理論裡，參考點＝現狀（原點 0），所以 +200 是「得」、−100 是「失」（這正是 ch08 的記帳：算變化，不算最終財富）。\n\n**第一步：先用 w(p)=p 簡化（暫時不扭曲機率），只看損失趨避的效果。**\n\n```text\n價值函數：v(x)=x^0.88 (x≥0)；v(x)=−2.25·(−x)^0.88 (x<0)，TK1992、hedge\n\n得的那邊：\n  v(+200) = 200^0.88\n          = exp(0.88·ln 200)             ← ln 200 ≈ 5.2983\n          = exp(0.88·5.2983)\n          = exp(4.6625)\n          ≈ 105.9                        ← 示意值，保留 1 位小數，自我複核過\n\n失的那邊：\n  |200^0.88 是 105.9；先算 100^0.88|\n  100^0.88 = exp(0.88·ln 100)            ← ln 100 ≈ 4.6052\n           = exp(0.88·4.6052)\n           = exp(4.0525)\n           ≈ 57.5\n  v(−100) = −λ·(−(−100))^0.88\n          = −2.25·100^0.88\n          = −2.25·57.5\n          ≈ −129.5                       ← 損失趨避把它放大到 −129.5\n\n加權（先用 w(0.5)=0.5 簡化）：\n  V(L) = 0.5·v(+200) + 0.5·v(−100)\n       = 0.5·(105.9) + 0.5·(−129.5)\n       = 52.95 − 64.75\n       = −11.8   < 0   ⇒  拒絕\n```\n\n讀這個 −11.8：**機率明明對半（0.5 vs 0.5），但因為 λ 把損失放大了 2.25 倍，|v(−100)|=129.5 壓過了 v(+200)=105.9，加權後是負的。** 拒絕。\n\n關鍵對比來了。ch03 的凹效用也說「拒」，但它的理由是**邊際遞減**（贏到的效用增量補不滿輸掉的）。展望理論說「拒」的理由完全不同：是**損失被整個放大了 λ 倍**。一個是曲線彎的形狀（凹），一個是損失那邊整體被壓低（λ）。殊途同歸到「拒絕」，但機制是兩回事——這正是「描述」與「規範」用不同數學描述同一個現象的活例。\n\n**第二步：把機率權重加回去，看方向。**\n\n剛才偷懶用了 w(0.5)=0.5。實際上 w(0.5)≈0.42（γ=0.61，我前面算過）——50% 被低估成 42%。但這裡得失兩邊都是 0.5，兩邊權重都往下調，**結論方向不變**（甚至因為損失那邊的權重 δ=0.69 算出 w(0.5)≈0.45 略高於得域的 0.42，損失被秤得還更重一點點，更傾向拒絕）。對這個對稱的 50/50 賭，機率權重微調數字、不翻方向；它真正大顯身手的場合是**極端機率**（樂透、保險、ch11 的 Allais 確定性效應），那裡 w(p) 與 p 的差距大到能改變決策。\n\n**第三步（全章最該記住的一步）：換 λ 重算，看結論會不會翻。**\n\n我前面 hedge 過 λ 不是常數。現在把 meta-analysis 的 λ≈1.31 代進去，其餘不變：\n\n```text\n用 λ = 1.31（Walasek 等 2024 meta-analysis 的中心值附近）重算損失那邊：\n  v(−100) = −1.31·100^0.88 = −1.31·57.5 ≈ −75.4\n\n  V(L) = 0.5·(105.9) + 0.5·(−75.4)\n       = 52.95 − 37.7\n       = +15.3   > 0   ⇒  接受！\n```\n\n**同一個賭注、同一套展望理論公式，只把 λ 從 2.25 換成 1.31，結論就從「拒絕」翻成「接受」。** 順帶算一下臨界點：讓 V(L)=0 需要 λ = 105.9 / 57.5 ≈ **1.84**。所以這個賭的命運卡在 λ≈1.84 這條線上——你信的 λ 在 1.84 以上就拒、以下就接。而文獻給的範圍（約 1.3 到 2.0）**正好橫跨這條線**。\n\n這就是為什麼我要你把 λ 當區間、不當常數。展望理論作為「方向性的描述」很穩（失比得重、小機率被高估，這些跨研究都成立）；但拿它去**算一個精確的決策數字**並聲稱「所以你一定會拒」，那是把實驗室估計當物理定律——在這個脊椎賭注上，這個錯誤足以讓你把結論說反。誠實的講法是：「在 λ≈2.25 的那組估計下，展望理論也預測拒絕，與凹效用一致；但若 λ 接近 meta-analysis 的較低值，預測會翻成接受——參數不確定大到能改變這個賭的命運。」\n\n## 直覺的陷阱\n\n機率權重和損失趨避是兩個極容易被講錯的概念，這裡守住正確版（事實基準 T6 等）。\n\n| 錯誤直覺 | 在哪一步把你帶溝裡 | 正確版（守住） |\n|---|---|---|\n| 陷阱一：把 λ≈2.25 當物理常數（事實基準 T6） | 看到「失比得重 2.25 倍」就拿它去算一切、聲稱「人就是 2.25 倍」 | λ=2.25 是 TK1992 一組中位估計，**有再現性討論**：meta-analysis 給 λ≈1.31（Walasek 2024）到 ≈1.9–2.0（Brown 2024），範圍約 1.3–2.0（2026-06）。現象穩健、係數值變異大。本章已示範：脊椎賭注在 λ≈1.84 翻盤，所以這個數字的不確定**能改變結論**。 |\n| 陷阱二：以為損失趨避＝風險趨避 | 把「對失更敏感」混成「對風險更保守」，以為損失趨避就是 ch03 那個凹效用 | 不同的東西。風險趨避是「得那邊凹」；損失趨避是「失那邊整體被壓低 λ 倍」。而且失那邊是**凸**的（風險**愛好**＝反射效應）——人在損失域反而愛賭。損失趨避講「失比得重」，不講「在損失裡也求穩」。 |\n| 陷阱三：以為機率權重＝「人把機率估錯了」 | 把 w(p) 讀成「他以為機率是別的數」（認知錯誤） | w(p) 不是估計錯誤。**即使你完全正確知道機率是 1%，你決策時仍給它約 5.5% 的分量。** 機率被正確認知、卻在決策時被系統性重新加權。這是「決策權重」不是「信念」。 |\n| 陷阱四：以為「買樂透又買保險」的人前後矛盾 | 覺得同一個人不可能既愛風險又避風險 | 不矛盾。兩者都是「高估極小機率」這一條規律：樂透是極小機率的大好事被放大、保險是極小機率的大災難被放大。一條倒 S 曲線、兩個出口，不需要兩種人格。 |\n\n**怎麼自我察覺你掉進去了**：\n\n- 陷阱一的徵兆——你發現自己在說「人對損失的敏感度是 2.25 倍」這種斬釘截鐵的句子，卻說不出這個數字來自哪份研究、區間多寬。一旦你開始把 λ 當成「跟 π 一樣的常數」，你就忘了它是從幾百個受試者估出來、而且不同 meta-analysis 差很多的東西。\n- 陷阱二的徵兆——你把「他很怕賠錢」直接等同於「他很保守、不愛冒險」。但問問那個賠了錢的賭徒為什麼還在加碼——他在損失域是**愛賭**的（凸、風險愛好）。怕賠 ≠ 求穩，這正是反射效應反直覺的地方。\n- 陷阱三的徵兆——你解釋買樂透時說「他高估了中獎機率」。不對。買樂透的人通常很清楚機率多渺茫，他**正確知道**機率、但在決策時給了它過大的權重。「知道」和「秤多重」是兩件事。\n- 陷阱四的徵兆——你想用一條扭來扭去的效用函數同時解釋樂透和保險，越解釋越複雜。停下來，換成機率權重：問題立刻塌成一條曲線。\n\n## 紙上推演\n\n純紙筆手算，不要跑任何程式。校驗常數：ln 200≈5.2983、ln 100≈4.6052、200^0.88≈105.9、100^0.88≈57.5。算完對解答，特別看「常見錯路」。\n\n### 推演題\n\n**題 1（★★，20 分鐘）**：用展望理論價值函數 `v(x)=x^0.88 (x≥0)；v(x)=−λ·(−x)^0.88 (x<0)`，先用 w(p)=p 簡化，對脊椎賭注 `L=(+200,0.5; −100,0.5)`：(a) 用 λ=2.25 算 V(L)，判斷接受或拒絕；(b) 一句話說明它跟 ch03 凹效用「也拒絕」的**機制差別**在哪；(c) 明確標出你用的 λ 來源並 hedge 一句。\n\n**題 2（★★，15 分鐘）**：向一個堅持「買樂透又買保險的人邏輯不一致」的同事解釋，為什麼用**機率權重**看，這兩個行為其實是同一條規律的後果、完全不矛盾。要求他聽完能自己再舉一個「同一規律、相反方向」的例子。\n\n**題 3（★★，15 分鐘）**：把題 1 的 λ 從 2.25 改成 meta-analysis 的 1.31，其餘不變，重算 V(L)。(a) 結論還是拒絕嗎？(b) 反求：λ 要等於多少，V(L) 才剛好等於 0（接受與拒絕的臨界）？(c) 這個結果對「展望理論能不能拿來預測一個精確決策」這件事，說明了什麼？\n\n**題 4（★★★，25 分鐘）**：反射效應題。考慮鏡像的兩組選擇：得版「A=確定 +100 / B=50% 得 +200, 50% 得 0」；失版「C=確定 −100 / D=50% 失 −200, 50% 失 0」。(a) 用 v(x)=x^0.88 / −2.25·(−x)^0.88（w(p)=p 簡化）分別算 A、B、C、D 的展望價值，預測每組選哪個；(b) 說明你算出的「得求穩、失搏命」如何由 S 型曲線的曲率推出；(c) 點出這跟 ch10 框架效應的關係（為什麼「同一個決策換個措辭」能觸發這個翻轉）。\n\n---\n\n### 推演解答\n\n**題 1 解答**：\n\n```text\n(a) λ=2.25：\n    v(+200) = 200^0.88 ≈ 105.9\n    v(−100) = −2.25·100^0.88 = −2.25·57.5 ≈ −129.5\n    V(L) = 0.5·105.9 + 0.5·(−129.5) = 52.95 − 64.75 = −11.8 < 0\n    ⇒ 拒絕\n\n(b) 機制差別：\n    ch03 凹效用「拒」的理由是「邊際遞減」——u 是凹的，贏到的效用增量\n    補不滿輸掉的效用降幅。\n    展望理論「拒」的理由是「損失被 λ 放大」——即使機率對半，\n    |v(−100)|=129.5 直接被乘大壓過 v(+200)=105.9。\n    殊途同歸（都拒），但一個是「曲線的凹」、一個是「損失被整體壓低」。\n\n(c) 來源與 hedge：λ=2.25、α=0.88 來自 Tversky–Kahneman 1992 的一組中位估計，\n    不是常數；meta-analysis 給 λ≈1.31（Walasek 2024）到 ≈1.9–2.0（Brown 2024），\n    範圍約 1.3–2.0（2026-06）。引用時務必標明。\n```\n\n**常見錯路**：(1) 把 v(−100) 算成「−2.25·(−100)^0.88」直接代負數進冪——錯，冪的底要先取絕對值再加負號：−λ·(−x)^β，(−x)=100，所以是 −2.25·100^0.88。(2) 忘了乘 λ，只算 −57.5，得 V(L)=+24.2 變成「接受」——漏掉損失趨避這支柱整個結論就反了。(3) 把展望理論的「拒」說成跟凹效用「同一個原因」——機制不同，這正是本題 (b) 的重點。\n\n**題 2 解答（要點）**：機率權重函數 w(p) 對極小機率一律**高估**（w(p)>p，曲線在對角線上方）。買樂透＝把「極小機率中大獎」這個好事的權重放大，於是願意付超過期望值的錢去賭；買保險＝把「極小機率出大災難」這個壞事的權重放大，於是願意付超過期望損失的保費去避。兩個行為的方向相反（一個追風險、一個避風險），但底層是**同一條規律**：對極小機率的極端結果一律放大。所以不是兩種矛盾的人格，是一條倒 S 曲線的兩個出口。同事該舉的例子：怕坐飛機（極小機率的大災難被放大 → 過度避險）vs 為「萬一中了」買了從沒中過的刮刮樂（極小機率的大好事被放大 → 過度追險）——同一個人、同一條規律、相反方向。\n\n**常見錯路**：說成「買樂透的人高估了中獎機率」——這是陷阱三。他通常正確知道機率多小，是**決策權重**放大了它，不是**信念**錯了。守住「知道機率 ≠ 秤多重」。\n\n**題 3 解答**：\n\n```text\n(a) λ=1.31：\n    v(−100) = −1.31·100^0.88 = −1.31·57.5 ≈ −75.4\n    V(L) = 0.5·105.9 + 0.5·(−75.4) = 52.95 − 37.7 = +15.3 > 0\n    ⇒ 接受！（從「拒絕」翻成「接受」）\n\n(b) 臨界 λ：令 V(L)=0\n    0.5·105.9 = 0.5·λ·57.5\n    105.9 = λ·57.5\n    λ = 105.9 / 57.5 ≈ 1.84\n    ⇒ λ>1.84 拒絕、λ<1.84 接受；脊椎賭注的命運卡在 λ≈1.84。\n\n(c) 說明了什麼：文獻給的 λ 範圍（約 1.3 到 2.0）正好橫跨臨界值 1.84。\n    所以展望理論的「方向性描述」（失比得重）很穩，但拿它去算一個\n    「精確會不會接這個賭」的預測時，參數的不確定大到足以翻轉答案。\n    結論：把 λ 當區間、別當常數；報告預測時要連同 λ 的不確定一起報。\n```\n\n**常見錯路**：(1) 算臨界 λ 時把兩邊的 0.5 也算進去導致約掉錯誤——兩邊機率都是 0.5，相消，臨界條件就是 v(+200)=λ·100^0.88，乾淨。(2) 看到「換個 λ 就翻盤」就下結論「展望理論沒用」——過頭了。方向性描述是穩的；不穩的是「拿不確定的參數去算精確決策數」。差別在於你對它要求什麼。\n\n**題 4 解答**：\n\n```text\n(a) 用 v(x)=x^0.88 (得)、v(x)=−2.25·(−x)^0.88 (失)，w(p)=p：\n\n得版：\n  A：確定 +100 → V(A) = v(+100) = 100^0.88 ≈ 57.5\n  B：0.5·v(+200)+0.5·v(0) = 0.5·105.9 + 0.5·0 = 52.95\n  V(A)=57.5 > V(B)=52.95 ⇒ 選 A（確定的）── 得域求穩、風險趨避\n\n失版：\n  C：確定 −100 → V(C) = −2.25·100^0.88 ≈ −129.5\n  D：0.5·v(−200)+0.5·v(0)\n     v(−200) = −2.25·200^0.88 = −2.25·105.9 ≈ −238.3\n     V(D) = 0.5·(−238.3) + 0.5·0 = −119.1\n  V(D)=−119.1 > V(C)=−129.5 ⇒ 選 D（賭一把）── 失域搏命、風險愛好\n\n⇒ 得求穩（A）、失搏命（D）：反射效應出現。\n\n(b) 由曲率推出：得那邊 α=0.88<1 ⇒ 凹 ⇒ 確定值高於等期望的賭（57.5>52.95），\n    所以求穩；失那邊也是冪 0.88 但乘上 −λ ⇒ 凸 ⇒ 確定的損失比賭一把的\n    期望損失「更難受」（−129.5 < −119.1），所以寧可賭。一條 S 曲線、\n    兩側曲率相反，逼出「得求穩、失搏命」。\n\n(c) 與 ch10 的關係：同一個最終結果，措辭可以把它框成「得」或「失」\n    （參考點被措辭設定）。一旦框成失，反射效應就把人從「求穩」推向\n    「搏命」——所以「同一個決策、兩種問法」能翻轉選擇。ch10 的框架\n    效應就是「用措辭觸發反射效應」。\n```\n\n**常見錯路**：(1) 算 V(C) 時忘了它是確定損失、整個要乘 λ：V(C)=−2.25·100^0.88，不是 −100^0.88。(2) 比較失版時被負號搞混方向——−119.1 比 −129.5「大」（離 0 近、損失小），所以選 D。負數比大小要小心。(3) 把反射效應說成「人立場不堅定」——不，它是 S 曲線的數學後果，方向可預測，不是隨機搖擺。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂。優先回答「為什麼」。\n\n1. 損失趨避（λ）和風險趨避（ch03 的凹效用）是同一回事嗎？如果不是，各自在價值函數的哪個部位、講的是哪件事？\n2. 反射效應是什麼？為什麼「得求穩、失搏命」可以從 S 型價值函數的曲率直接推出來？舉一個你工作中「專案炸了反而孤注一擲」的例子。\n3. 機率權重 w(p) 跟「把機率估計錯」差在哪？為什麼說「即使你正確知道機率是 1%，你決策時仍給它約 5.5% 的分量」這句話不是自相矛盾？\n4. 為什麼「買樂透又買保險」用機率權重看不矛盾？這兩個行為共用的是哪一條規律？\n5. 把脊椎賭注用展望理論（λ=2.25）算出拒絕，跟 ch03 凹效用算出拒絕，**機制**有什麼不同？為什麼說「殊途同歸」？\n6. 為什麼我堅持把 λ 當區間、不當常數？在脊椎賭注上，λ 從 2.25 換成 1.31 會發生什麼？臨界 λ 是多少，這個數字落在文獻範圍的哪裡？\n7. 機率權重對「50/50 的對稱賭」幾乎不改變結論，但對「樂透、保險、確定的事」影響巨大——為什麼？（提示：倒 S 曲線在哪些 p 跟對角線差最遠？）\n8. 「展望理論證明了人很笨／不理性」——這句話錯在哪？（呼應全書中央張力與 ch12。）\n\n## 延伸閱讀\n\n- **Tversky & Kahneman, \"Advances in Prospect Theory: Cumulative Representation of Uncertainty\",《Journal of Risk and Uncertainty》5(4):297–323（1992）**（link.springer.com/article/10.1007/BF00122574）：本章所有參數（α=β=0.88、λ=2.25、γ=0.61、δ=0.69）與價值函數、權重函數的原典。讀「the value function」與「the weighting function」兩節，數字就在那裡——但記得它們是一組估計、不是常數。\n- **Kahneman & Tversky, \"Prospect Theory: An Analysis of Decision under Risk\",《Econometrica》47(2):263–291（1979）**：反射效應與損失趨避最早登場的論文，讀第一節那一串配對賭局，反射效應（得求穩、失搏命）是用實驗對照逼出來的，很有說服力。\n- **Walasek, Mullett & Stewart, \"A meta-analysis of loss aversion in risky contexts\",《Journal of Economic Psychology》103:102740（2024）**（sciencedirect.com/science/article/pii/S0167487024000485）：把 λ≈2.25「偏高」這件事用整合分析講清楚的一篇，給出 λ≈1.31 的中心估計；想知道「為什麼不能把 2.25 當常數」就讀它的結論段。（另一份 Brown 等 2024 的 meta-analysis 落在 ≈1.9–2.0，兩篇對照著看更有感。）\n- **Wikipedia, \"Prospect theory\"**（en.wikipedia.org/wiki/Prospect_theory）：價值函數 S 型、機率權重倒 S、反射效應、確定性效應的整合條目，圖文版的快速複習；交叉核對年份與參數很方便。\n- 損失趨避與機率權重的**心理與演化機制**（為什麼人腦會這樣秤、為什麼察覺不到）不在本書範圍——見《思考的陷阱》談損失趨避的心理成因。本章只負責它的數學描述與決策後果。\n- 機率本身怎麼算、權重 w(p) 為什麼仍要滿足某些一致性——機率機制指向《馴服隨機》；本章只用機率的結果、把扭曲加在「決策權重」這一層，不重推機率。\n"}, {"id": "ch10-framing-effect", "file": "ch10-framing-effect.md", "group": "Part III — 描述的裂縫・展望理論", "title": "ch10 — 框架效應：同一個決策兩種問法", "md": "# ch10 — 框架效應：同一個決策兩種問法\n\n> **本章解決什麼問題**：ch08 講參考點（你算的是變化不是狀態）、ch09 講損失趨避與機率權重，這章補上展望理論第四根、也是最戲劇的一根支柱——框架（framing）。同一個決策，邏輯上**完全等價**的兩種措辭，會讓正常、聰明、受過訓練的人做出**相反**的選擇。這不是語言遊戲，是規範理論一條地基公理——描述不變性（description invariance）——最乾淨的失效。前三根支柱已經告訴你「人對得失的記帳跟規範不一樣」；這根支柱告訴你：**連『這是得還是失』本身，都可以被一句措辭從外面設定。** 它把 ch08 的參考點與 ch09 的反射效應接成一條線，也是全書「規範被現實掀翻」最容易在你身上現場重演的一章。Allais（ch11）會用另一條路再補一刀。\n\n## 從你已知的出發\n\n你在 review 一份發布計畫。RFC 上寫著：「本次漸進式發布方案的**成功率預估 99%**。」你點頭，覺得穩，approve。\n\n換個場景。同一個發布、同一套數據、同一個工程師，這次 RFC 上寫的是：「本次漸進式發布方案的**失敗率預估 1%**。」你忽然多看了兩眼。1% 的失敗——上次那個 P0 也是「小機率」啊。你開始想要不要加一道 canary、要不要先在內部環境多跑一輪。\n\n停一下。**99% 成功率和 1% 失敗率是同一個數字。** 完全等價，連四捨五入都不用。但這兩種寫法在你腦子裡觸發的反應不一樣：一個讓你放心，一個讓你警覺。你不是被數據說服，你是被**措辭**設定了參考點——「成功」把現狀框成「正在往好的方向走」，「失敗」把現狀框成「正在冒一個會賠的險」。同一件事，得的框架讓你保守地接受，失的框架讓你警覺地遲疑。\n\n你在工作裡天天被這個機制推著走，只是沒注意：\n\n- postmortem 寫「我們**救回了** 8 萬筆訂單」vs「我們**損失了** 2 萬筆訂單」——同一場事故，前者讓團隊覺得處理得不錯、後者讓團隊覺得該追加投資修這條路。哪個版本上 wiki，影響下一季的資源分配。\n- 容量規劃寫「這個配置能扛住 **95% 的尖峰日**」vs「這個配置會在 **5% 的尖峰日翻車**」——同一個容量，後者讓你想多買機器。\n- 你寫 RFC 挑哪個措辭——「保留現有架構的穩定」vs「博取新架構的效能」——你是在**替 reviewer 設參考點**，而且你多半沒意識到自己在這麼做。\n\n這章要把這個機制擰清楚：**理性的選擇不該因為等價的措辭而改變——這是一條你絕對不會反對的規範公理（描述不變性）。但人系統性地違反它，而且違反的方向可以被 ch08–09 的展望理論精確預測。** 框架效應是規範失效最戲劇的一槍，同時是描述模型最漂亮的一次命中。我們會把脊椎那個賭注（ch01 的 +200／−100 硬幣）用「得框架」和「失框架」各問一次，看它怎麼翻。\n\n## 描述不變性：那條你不會反對的公理\n\n先把被違反的公理講清楚，這樣你才知道框架效應到底掀翻了什麼。\n\nch03 給過 vNM 四公理（完備、遞移、連續、獨立）。框架效應違反的不在那四條裡，它違反的是一條更底層、底層到通常根本不被列出來、因為「不證自明」的前提：**描述不變性（description invariance），又叫不變性原理（invariance）**。Tversky（特沃斯基）與 Kahneman（康納曼）1981 年那篇〈The Framing of Decisions and the Psychology of Choice〉（《Science》211:453–458，照 landscape 與本章查證）把它寫成這句話：\n\n> **同一個決策問題的不同表述（representations），應該得出相同的偏好。**\n\n白話：如果兩段文字描述的是**邏輯上完全相同**的一組選項（同樣的結果、同樣的機率），那麼一個理性的人在它們之間的選擇，**不該因為文字不同而不同**。它就跟「3 + 5」和「5 + 3」該算出同一個答案一樣不證自明——一個決策問題可以被改寫成各種樣子，但那只是**換個寫法**，底下的東西沒變。\n\n期望效用理論**天生**滿足這條公理：EU(L)=Σ pᵢ·u(xᵢ) 只吃「結果 xᵢ」和「機率 pᵢ」兩個東西，你怎麼**措辭**它根本不進公式。把「200 人獲救」寫成「400 人死亡」（總共 600 人時），對期望效用而言是**同一個 xᵢ**，算出來一模一樣。這正是規範理論的乾淨之處：**它把所有等價的表述都化約成同一個正規形式（canonical form），再去評值。**\n\nTversky 與 Kahneman 自己把這條公理的地位說得很重（1986，照本章查證）：描述不變性是「任何宣稱有規範地位的選擇理論的**本質條件**」。也就是說——**如果一套理論連『等價的問題給等價的答案』都做不到，它就沒資格叫規範理論。** 這不是一條可有可無的技術假設，是規範性本身的底線。\n\n於是矛盾就尖銳了。他們接著證明：**人系統性地違反描述不變性。** 而且這就逼出本章——其實是全書中央張力——最赤裸的一句結論（TK 的原話大意，照查證）：\n\n> **因為這些規則在規範上是本質的、在描述上卻是無效的，所以沒有任何一套選擇理論能同時是規範上充分的、又是描述上準確的。**\n\n讀第二遍。這句話是整個 Part III 的縮影：**規範（該怎麼選）與描述（怎麼選）之間那道裂縫，不是某個理論還沒做好，而是一條邏輯上的不可能——你不可能要一套數學同時把『該怎樣』和『實際怎樣』都說對。** 框架效應是這句話最乾淨的證據。\n\n## 亞洲疾病問題：教科書級的翻轉\n\n現在看那個讓框架效應名留決策史的實驗。Tversky 與 Kahneman 1981 年設計，叫**亞洲疾病問題（Asian disease problem）**。它的力量在於：兩個框架邏輯上等價到連數學家都會同意「這是同一題」，但選擇翻得乾乾淨淨。\n\n設定：想像你的國家爆發一種不尋常的亞洲疾病，預計會死 600 人。有兩個防疫方案可選。\n\n**得框架（救活幾人）**——這一組受試者看到的是：\n\n```text\n得框架（以「救活人數」描述）：\n   方案 A：確定救活 200 人。\n   方案 B：1/3 機率救活 600 人，2/3 機率一個都救不了。\n\n   多數人選 A（確定救 200）。\n   原始實驗：72% 選 A、28% 選 B（TK1981，照本章查證）。\n```\n\n**失框架（死亡幾人）**——另一組受試者（看不到上面那組）看到的是：\n\n```text\n失框架（以「死亡人數」描述）：\n   方案 C：確定死 400 人。\n   方案 D：1/3 機率一個都不死，2/3 機率死 600 人。\n\n   多數人選 D（賭一把）。\n   原始實驗：78% 選 D、22% 選 C（TK1981，照本章查證）。\n```\n\n先確認這兩組真的是同一題。總人口 600：\n\n```text\n   方案 A：救活 200 ⇔ 死亡 400 ⇔ 方案 C    （完全相同的確定結果）\n   方案 B：1/3 救 600（即 0 死）+ 2/3 救 0（即 600 死）\n        ⇔ 1/3 不死 + 2/3 死 600 ⇔ 方案 D   （完全相同的賭局）\n```\n\n**A = C，B = D。** 一個都不差。在描述不變性下，選 A 的人就**必須**選 C，選 B 的人就**必須**選 D——因為它們是同一個東西。可是實驗結果是：得框架 72% 選確定（A），失框架 78% 選賭局（D）。**同一群人（統計意義上），同一個決策，只是把『救活』改成『死亡』，風險態度就從趨避翻成愛好。**\n\n這就是反射效應（ch09）的措辭觸發版。回憶 ch09：價值函數在得的一側是凹的（風險趨避）、在失的一側是凸的（風險愛好）。亞洲疾病問題做的事，是**用措辭決定你站在參考點的哪一側**：\n\n- **「救活 200 人」** → 措辭把參考點設在「600 人全死」，於是 200 是**得**。在得的一側你風險趨避，所以你選確定的 A（穩穩拿 200）。\n- **「死 400 人」** → 措辭把參考點設在「600 人全活」，於是 400 是**失**。在失的一側你風險愛好（凸效用＋損失趨避讓你想搏一把躲開損失），所以你選賭局的 D。\n\n看清楚這個機制有多巧：**措辭沒有改變任何結果或機率，它只改變了你拿什麼當『零』（參考點，ch08）。** 而參考點一變，同一個 200 人從「得」變「失」，你的風險態度就照展望理論的價值函數翻面。這是描述模型的勝利——展望理論不只說「人會被框架影響」，它**精確預測了翻轉的方向**：得框架趨避、失框架愛好。沒有哪個含糊的「人很情緒化」式解釋能做到這種定向預測。\n\n## Worked example：亞洲疾病四選項的完整對帳\n\n慢慢算一遍，把「邏輯等價」和「展望理論預測翻轉」兩件事都釘死。\n\n```text\n總人口 600。把四個方案攤平成「死亡人數的機率分布」：\n\n   方案 A（確定救 200）  ：死 400，機率 1（確定）\n   方案 B（1/3 救 600）   ：死 0 機率 1/3；死 600 機率 2/3\n   方案 C（確定死 400）  ：死 400，機率 1（確定）\n   方案 D（1/3 不死）     ：死 0 機率 1/3；死 600 機率 2/3\n\n   ⇒ A 與 C 的死亡分布相同（確定死 400）→ 邏輯等價\n   ⇒ B 與 D 的死亡分布相同（1/3 死 0、2/3 死 600）→ 邏輯等價\n\n期望死亡人數（規範視角，三種演算法都一樣）：\n   A=C：確定死 400              → 期望死 400\n   B=D：(1/3)·0 + (2/3)·600     → 期望死 400\n\n   四個方案的「期望死亡人數」全部等於 400。\n   → 期望值上完全打平，規範理論說「隨便選，無所謂」。\n```\n\n規範視角下，四個方案期望死亡人數都是 400，沒有一個更好。所以**任何一致的人**，要嘛四個都覺得無差異、要嘛偏好不該隨框架翻。但人不是這樣。用展望理論的價值函數 v 重算（參考點＝措辭設定的端點，符號照 ch08–09）：\n\n```text\n得框架：參考點 = 「600 全死」，結果以「救活人數」（正值=得）記。\n   v 在得的一側凹（風險趨避）。\n   方案 A：確定 v(救200)\n   方案 B：(1/3)·v(救600) + (2/3)·v(救0)\n   凹函數下，確定的 v(救200) 高於 B 的加權 v\n   （凹＝v(救200) > (1/3)v(救600)，邊際遞減讓「確定中等」勝過「賭大的」）\n   ⇒ 預測選 A（趨避）。✓ 對上 72% 選 A\n\n失框架：參考點 = 「600 全活」，結果以「死亡人數」（負值=失）記。\n   v 在失的一側凸（風險愛好），且損失端更陡（λ，ch09）。\n   方案 C：確定 v(死400) = −λ·(死400 的痛)\n   方案 D：(1/3)·v(死0) + (2/3)·v(死600)\n   凸函數下，賭局的加權 v 高於確定的 v(死400)\n   （凸＝平均的痛 > 痛的平均，搏一把「可能 0 死」比「確定死 400」感覺好）\n   ⇒ 預測選 D（愛好）。✓ 對上 78% 選 D\n```\n\n兩個框架的預測都對上實驗多數，而它們指向**相反**的選擇——可底層是同一題。自我複核一下這裡沒有偷換：A=C、B=D 是死亡分布層面的恆等式（上面算過期望死都是 400，分布也逐項相同），不依賴任何參數；翻轉則來自「參考點被措辭設在哪一端 → 落在 v 的凹側還是凸側」，這完全是 ch09 反射效應的結果，沒有引入新機制。**框架不是第四個獨立現象，它是『參考點可被外部措辭設定』+『反射效應』的合體。**\n\n這裡有一個值得停十分鐘的驚嘆點，請用自己的話轉述：**規範理論之所以滿足描述不變性，正是因為它把所有等價表述化約成同一個正規形式——它『看不見』措辭。而人之所以違反描述不變性，正是因為人『看得見』措辭，措辭替人設定了參考點。同一個能力（對措辭敏感）在規範上是 bug、在描述上是特徵。** 機器之所以不被框架騙，是因為它根本不讀框架；人之所以被騙，是因為人活在框架裡。\n\n## 保險與賭博：同一個結構，框架不同\n\n框架效應不只在生死問題上。它解釋一個你天天看到、卻覺得理所當然的矛盾：**很多人同時買保險（避險）又買樂透（搏險）。** ch09 用機率權重解釋過一半（極小機率被高估）；框架補上另一半。\n\n```text\n同一個結構，兩種框架：\n\n   保險：你面對「確定的小損失（保費）」vs「小機率的大損失（出事）」。\n        框架成「失」：你在損失的一側，本該風險愛好（搏一把不買保險）……\n        但「確定付一點點」vs「小機率賠很大」這個措辭，\n        加上對極小災難機率的高估（ch09 機率權重），\n        讓你選「確定付保費」躲開那個被放大的尾部。\n\n   樂透：你面對「確定的小損失（彩券錢）」vs「極小機率的大得」。\n        框架成「得」：你在得的一側……\n        但對極小中獎機率的高估（ch09），讓你願意付那一點點去搏。\n```\n\n把保險和樂透並排，你會發現：**一個人可以在同一天既買保險又買樂透，而且兩者都不矛盾**——因為機率權重（ch09）讓他高估兩端的極小機率，框架讓「確定付一點點」在兩個情境裡分別被接受。規範理論看這個人會說「你又風險趨避又風險愛好，自相矛盾」；展望理論看同一個人會說「你對極小機率的高估＋對得失的框架反應，完全一致地預測了你兩個行為」。**同一個行為，規範說『不一致』，描述說『高度一致』——這正是 ch12 要收的那道張力。**\n\n把這個帶回工程：你對「百萬分之一的資料永久遺失」做三重備份＋異地冷備（買保險，高估極小災難），同時又願意賭「這次 hotfix 不寫測試應該不會出事」（搏小機率僥倖）。這兩個看似矛盾的態度，用框架＋機率權重一起看，是同一套機制的兩面。\n\n## 脊椎賭注的框架版\n\n把脊椎那個賭注（L =（+200, 0.5; −100, 0.5），ch01 登場、ch08–09 重算過）也用框架翻一次。\n\n賭注本身對稱、機率對半，正好讓框架的作用看得清楚。我們設兩種問法，描述同一個 L：\n\n```text\n得框架（「博取更多」）：\n   問法：「你手上有現狀。要不要玩一局——有一半機會多賺 200，\n          一半機會把賺到的吐回去、再倒貼 100？」\n   參考點被設在「現狀」，焦點放在「可能的得（+200）」。\n   → 人傾向把它當「一個可能讓我變更好的機會」，\n     但凹的得側＋損失趨避（ch09）讓多數人還是拒絕（與 ch03/ch09 殊途同歸）。\n\n失框架（「保住現有的」）：\n   問法：「你現在穩穩擁有現狀。要不要冒險——有一半機會損失 100，\n          換一半機會多 200？不玩就保證一毛不少。」\n   參考點同樣是現狀，但焦點放在「可能的失（−100）」與「不玩＝保證安全」。\n   → 「保證一毛不少」這個措辭把『不玩』框成確定的得（安全），\n     損失趨避被措辭強化，拒絕更堅決。\n```\n\n注意脊椎賭注比亞洲疾病問題「溫和」——因為 L 本身就是個正期望值卻被拒絕的賭（ch03 算過 EU=8.66<10），兩種框架都傾向拒絕，框架在這裡**強化**而非翻轉。這正好示範一個細節：**框架不是萬能翻轉鍵，它的作用方向由結構決定。** 亞洲疾病問題之所以能乾淨翻轉，是因為它把「確定中等」對上「全有全無的賭」，剛好讓參考點移動把你從凹側推到凸側；脊椎賭注的兩個結果一正一負、不對稱地跨越參考點，框架就只能微調強度。把這條看懂，你就不會犯「以為任何措辭都能讓人選相反」的過度推論。\n\n```text\n脊椎賭注的展望重算（ch09 已算，這裡只標框架的角色）：\n   v(+200) = 200^0.88 ≈ 105.9   （TK1992 參數，hedge：非常數，見下）\n   v(−100) = −2.25·100^0.88 ≈ −129.5\n   加權（w(p)=p 簡化）：0.5·105.9 − 0.5·129.5 ≈ −11.8 < 0 → 拒絕\n\n   框架的作用：不改這些數，改你『把哪個當零、focus 在 +200 還是 −100』。\n   失框架強化對 −100 的關注 → 拒絕更堅決；\n   得框架弱化它 → 但凹側＋λ 仍不足以翻成接受。\n```\n\n提醒（照 landscape T6、標 2026-06）：上面的 α=0.88、λ=2.25 是 Tversky–Kahneman 1992 一組**常被引用的中位估計，不是物理常數**；meta-analysis（Brown et al. 2024）給 λ≈1.31、依領域範圍 1.8–2.7。框架效應**現象本身**極穩健（連大學教授與醫師都照樣中招，照本章查證），但**具體數字**請當示意。框架的定性結論（措辭設參考點、參考點決定凹凸側）不依賴這些參數值。\n\n## 框架是規範的鐵證，也是描述的勝利\n\n把這章的雙面性說透，因為它是 ch12 收束的引子。\n\n框架效應對規範理論是一記**鐵證級**的打擊。它不像 Allais（ch11）那樣需要你跨兩題對賭才看見不一致，也不像 Ellsberg（ch04）那樣要設一個甕逼出矛盾——它**單一一題**就讓你違反公理：你看得框架選 A、看失框架選 D，而 A=C、B=D，你**在同一個決策上對自己不一致**，連跨題都不用。更狠的是，描述不變性是規範性的**底線公理**（連它都不證自明），框架卻把它正面踩碎。所以你不能說「框架效應只是個小偏誤」——它打在地基上。\n\n但同一個現象，對描述模型是一場**漂亮的勝利**。展望理論不只說「人會被措辭影響」（那是廢話，誰都知道），它**定量、定向**地預測：得框架 → 風險趨避、失框架 → 風險愛好，而且預測對了（72%／78%）。一個能精確說出「人會往哪個方向偏、偏多少」的描述模型，比一個只會說「人很非理性」的抱怨高出好幾個量級。**框架效應的可預測性，本身就是它了不起的地方**——偏離不是隨機噪聲，是有結構、可建模、可預期的訊號（呼應 ch08 的 T8：別把它當「人很笨」的指控）。\n\n這就是為什麼 ch12 會說：展望理論沒有「打敗」期望效用，它們在描述**兩件不同的事**。期望效用回答「**該**怎麼選」（在這個答案裡，描述不變性是對的、必須成立）；展望理論回答「人**實際**怎麼選」（在這個答案裡，框架效應是真的、可預測）。框架效應同時是前者的反例和後者的範例——這不矛盾，因為它們問的是不同問題。\n\n框架的**心理成因**（為什麼人腦會對措辭這麼敏感、為什麼這發生在你察覺不到的層次、雙系統怎麼運作）不在本書範圍，交給《思考的陷阱》談框架與去偏；本書只負責它的**規範後果與數學描述**，這兩件本章已經收完。\n\n## 直覺的陷阱\n\n框架效應是全書最容易在你自己身上現場重演的偏離，兩個具名陷阱特別致命。\n\n| 陷阱 | 錯誤直覺長怎樣 | 它在哪一步帶你下溝 | 正確版（守住） |\n|---|---|---|---|\n| **「我不會被措辭影響」** | 「框架效應是給沒受過訓練的人準備的，我是工程師，我看數字不看包裝」 | 你會放下戒心，在 review 一份「99% 成功率」的 RFC 時用一套標準、review「1% 失敗率」時用另一套，而**自己完全沒察覺切換了標準**。最危險的偏誤是你以為自己免疫的那個 | 框架效應**對專家一樣有效**——原始與後續實驗在大學教授、醫師身上照樣翻轉（照本章查證）。而且它發生在你**察覺不到**的層次：你不會感覺到「被框架了」，你只會覺得「這個比較穩 / 這個比較危險」。察覺的工具（去偏）見《思考的陷阱》；本書只負責讓你知道**它真的存在、且打在你身上** |\n| **把框架當「語言問題」不是「決策問題」** | 「不就是措辭嘛，把話講清楚一點、兩種寫法都附上不就好了」 | 你會以為框架是溝通技巧層次的小事，於是低估它對**決策結果**的改寫力，也看不見它違反的是**規範地基**（描述不變性）而非「表達不夠精確」 | 框架改變的不是「理解」，是**選擇**——受試者完全理解 A 和 D 是什麼，他們不是看不懂，是看懂了還翻。它違反的是描述不變性這條規範底線公理，不是修辭問題。把它降格成「語言問題」會讓你錯過它真正的份量：**連『這是得還是失』都能被一句話從外面設定** |\n\n第三個更隱微的陷阱：**以為『同時附上兩種框架』就能中和它**。「我在 RFC 裡兩種寫法都寫——99% 成功率（1% 失敗率），這樣就公平了。」聽起來無懈可擊，但實證上**先讀到哪個框架、哪個框架在版面上更顯眼，仍會留下殘餘的錨定**；而且很多決策根本沒有「兩種都附上」的奢侈（口頭討論、一句話的 Slack 訊息、會議室裡脫口而出的措辭）。怎麼自我察覺你正被框架推著走？徵兆是：**當你發現自己對『99% 成功』和『1% 失敗』這兩句話的生理反應不一樣——一句讓你放鬆、一句讓你緊張——而你明知它們是同一個數字時，那一刻你就抓到框架的現行犯了。** 規範的你知道它們等價；描述的你身體還是反應了。那道裂縫不在書裡，就在你讀這句話的此刻。\n\n## 紙上推演\n\n全是紙筆推演，不寫任何程式。數值手算。建議拿筆。\n\n### 推演題\n\n**題 1（★★，15 分鐘）** 把脊椎賭注 L =（+200, 0.5; −100, 0.5）用「得框架」與「失框架」各寫一個問法，並預測兩種問法下多數人的選擇會不會翻轉、為什麼。要求：明確指出每個框架把參考點設在哪、焦點放在 +200 還是 −100，並用 ch09 的反射效應解釋你的預測。順便回答：為什麼脊椎賭注的框架**強化**拒絕、而亞洲疾病問題的框架**翻轉**選擇？\n\n**題 2（★，10 分鐘）** 亞洲疾病問題的四個方案 A、B、C、D，找出哪兩對在邏輯上等價，並用「死亡人數的機率分布」證明它們相同。要求：寫出每個方案的死亡分布，逐項對照。\n\n**題 3（★★，15 分鐘）** 口頭題，但請寫下來：向一個堅持「我看數字不看措辭、我不會被框架影響」的工程師同事解釋，為什麼他錯了，以及他可以怎麼當場抓到自己被框架。要求：你的解釋裡必須出現「描述不變性」「參考點」，並給一個工程場景的例子（RFC、postmortem、容量規劃任選）。\n\n### 推演解答\n\n**題 1 解答。**\n\n```text\n得框架（「博取更多」）：\n   「你手上有現狀。要不要玩一局：一半機會多賺 200、一半機會\n    倒貼 100？」\n   參考點：現狀（0）。焦點：可能的得 +200。\n   反射效應：在得的一側 v 凹（風險趨避）。\n   再加損失趨避 λ 放大那個 −100。\n   → 預測：多數人拒絕（凹側趨避 + λ）。\n\n失框架（「保住現有的」）：\n   「你現在穩穩擁有現狀，一毛不少。要不要冒險：一半機會損失\n    100、換一半機會多 200？不玩就保證安全。」\n   參考點：現狀（0）。焦點：可能的失 −100，且把「不玩」\n           框成確定的安全。\n   → 「保證一毛不少」強化損失趨避 → 預測拒絕更堅決。\n\n翻轉嗎？不會。兩種框架都傾向拒絕，差別在拒絕的「堅決程度」。\n```\n\n為什麼脊椎賭注框架**不翻轉**而亞洲疾病問題**翻轉**？關鍵在結構：\n\n```text\n亞洲疾病：選項是「確定中等結果」對「全有全無的賭」，且整題\n         可以整體被框成『純得』或『純失』。措辭把參考點移到\n         一端，使整題落在 v 的凹側（得框架）或凸側（失框架），\n         於是風險態度整個翻面 → 乾淨翻轉。\n\n脊椎賭注 L：兩個結果一正一負（+200 / −100），跨在參考點兩側，\n         無法被整體框成純得或純失。措辭只能調整焦點放在哪一側，\n         改變拒絕的強度，不足以把整題從凹側搬到凸側 → 不翻轉。\n```\n\n常見錯路：以為「任何決策都能用措辭翻成相反選擇」。錯。框架的翻轉力**由結構決定**——只有當措辭能把整題從 v 的凹側搬到凸側（如亞洲疾病的「全活/全死」端點），才會乾淨翻轉。一正一負跨參考點的賭（如 L）只能被微調。能分辨這兩種情況，才算真懂框架。\n\n**題 2 解答。**\n\n```text\n總人口 600，寫出每個方案的「死亡人數機率分布」：\n\n   方案 A（確定救 200）：救 200 ⇔ 死 400 → 死 400 機率 1\n   方案 C（確定死 400）：              → 死 400 機率 1\n   ⇒ A 與 C 分布相同：{死 400 : 機率 1}             ∴ A = C ✓\n\n   方案 B（1/3 救 600, 2/3 救 0）：\n        救 600 ⇔ 死 0（機率 1/3）；救 0 ⇔ 死 600（機率 2/3）\n        → {死 0 : 1/3, 死 600 : 2/3}\n   方案 D（1/3 不死, 2/3 死 600）：\n        → {死 0 : 1/3, 死 600 : 2/3}\n   ⇒ B 與 D 分布相同                                ∴ B = D ✓\n\n   四者期望死亡人數複核：\n   A=C：400·1 = 400\n   B=D：0·(1/3) + 600·(2/3) = 400\n   全部 = 400，期望值打平。\n```\n\n常見錯路：以為「200 人獲救」和「400 人死亡」是不同結果。在固定總數 600 下，它們是同一個世界狀態的兩種描述——救活數 + 死亡數 = 600 恆成立。把這個恆等式看漏，就看不見 A=C。\n\n**題 3 解答。** 給同事的解釋（必須含「描述不變性」「參考點」＋工程例子）：\n\n> 你說你看數字不看措辭，但我們做個實驗。我給你看一份 RFC：方案的**成功率是 99%**。你會 approve 吧？好。現在同一份 RFC、同一套數據，我改成：方案的**失敗率是 1%**。你剛剛要不要多想一下？這兩句話是同一個數字，連四捨五入都不用。理性上有條公理叫**描述不變性**——同一個決策的等價描述應該給同樣的選擇，這是任何「該怎麼選」的理論的底線。但你剛剛差點違反它。原因是「失敗」這個詞把你的**參考點**設在「本來該成功」，於是 1% 變成一個你正在冒的損失，你的損失趨避就上來了；「成功」把參考點設在「本來會出事」，99% 變成一個得，你就放鬆。Tversky 和 Kahneman 1981 年的亞洲疾病實驗，連大學教授和醫師都這樣翻。你抓自己的方法很簡單：下次讀到「95% 可用」和「5% 不可用」，注意你身體的反應一不一樣——明知是同一個數，反應卻不同，那就是框架抓到你了。\n\n常見錯路：把解釋停在「人會被措辭影響」。這太弱——同事會說「那我注意一點不就好了」。重點要打在**它違反規範底線公理**且**你察覺不到、注意也擋不掉**（去偏的方法是另一本書的事），這樣他才知道這不是「小心一點」能解決的修辭問題。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 用一句話說描述不變性（不變性原理）到底要求什麼。為什麼期望效用理論天生滿足它，而人天生違反它？（提示：機器讀不到措辭、人活在措辭裡。）\n2. 亞洲疾病問題裡，A=C、B=D 是怎麼證的？用「死亡人數的機率分布」說，不要用「直覺感覺一樣」。\n3. 為什麼得框架讓人選確定（趨避）、失框架讓人選賭局（愛好）？把這個翻轉接到 ch09 的反射效應與 ch08 的參考點上。\n4. 為什麼說框架效應「同時是規範理論的鐵證、又是描述模型的勝利」？這跟「沒有任何選擇理論能同時規範充分又描述準確」那句話什麼關係？\n5. 脊椎賭注 L 用得／失框架問，會不會翻轉？為什麼亞洲疾病問題會、L 不會？（關鍵字：整題能不能被搬到 v 的另一側。）\n6. 一個人同時買保險又買樂透，規範理論說他「不一致」，展望理論說他「高度一致」。各自的理由是什麼？\n7. 「我不會被框架影響，我看數字不看包裝」——這句話為什麼是本章最危險的陷阱？你會怎麼當場抓到自己被框架（哪個生理徵兆）？\n8. 框架的數學描述本書負責，框架的心理成因指向哪本書？為什麼這個分工是對的（本書 own 什麼、不 own 什麼）？\n\n## 延伸閱讀\n\n- **Tversky, A. & Kahneman, D. (1981). \"The Framing of Decisions and the Psychology of Choice.\" *Science*, 211, 453–458** — 框架效應與亞洲疾病問題的原始論文（landscape／本章查證的一級來源）。短、清楚、數學門檻低；讀亞洲疾病那一節就夠，本章 worked example 是它的濃縮。哥倫比亞大學統計系有公開全文。\n- **Tversky, A. & Kahneman, D. (1986). \"Rational Choice and the Framing of Decisions.\" *Journal of Business*, 59(4)** — 把描述不變性的**規範地位**講透的那篇：為什麼它是「任何宣稱有規範地位的選擇理論的本質條件」、以及「沒有理論能同時規範充分又描述準確」這句全書級結論的出處（本章查證）。想搞懂本章那道張力的哲學份量就讀它。\n- **Data Colada, \"[11] 'Exactly': The Most Famous Framing Effect Is Robust To Precise Wording\"** — 一篇方法學部落格，檢驗亞洲疾病問題在「把措辭改精確（如『exactly 200 saved』）」後是否還成立（結論：仍穩健）。想知道「這個經典實驗在再現性風暴後站不站得住」就讀它（本章查證的科普來源，hedge：部落格非論文，但作者群是知名方法學者）。\n- **《思考的陷阱》談框架與去偏** — 本章刻意不碰框架的**心理成因**（為什麼人腦對措辭這麼敏感、為什麼發生在察覺不到的層次、雙系統怎麼運作）與**怎麼去偏**。那本書接手這兩件；本書只負責框架的規範後果與數學描述。理性三角的明確交棒點之一。\n- **回看 ch08（參考點）與 ch09（反射效應）** — 框架不是第四個獨立現象，它是「參考點可被外部措辭設定」＋「反射效應」的合體。把這兩章和本章連起來讀，展望理論四支柱才真正連成一條線（ch12 會做總對帳）。\n"}, {"id": "ch11-allais-independence-axiom", "file": "ch11-allais-independence-axiom.md", "group": "Part III — 描述的裂縫・展望理論", "title": "ch11 — Allais 悖論：獨立公理斷在哪", "md": "# ch11 — Allais 悖論：獨立公理斷在哪\n\n> **本章解決什麼問題**：ch04 的 Ellsberg 用「測不出的機率」對期望效用開了第一槍，Part III 前三章（ch08–10）給出了正面的描述模型——展望理論的參考點、損失趨避、機率權重、框架。這章把鏡頭對準規範理論最關鍵的那條公理：**獨立公理**（vNM 四公理之一）。Allais 在 1953 年用兩個對賭證明，正常、聰明、受過機率訓練的人——包括幾位後來的諾貝爾經濟學獎得主——的選擇**系統性地違反它**，而且違反得有規律。這是「描述的裂縫」與「規範的地基」最乾淨的一次正面對撞：不是模糊（Ellsberg），是機率全都寫在桌上、你還是會不一致。本章是 Part III 的倒數第二章，下一章（ch12）會收束「展望理論到底證明了什麼」。\n\n## 從你已知的出發\n\n你在評審兩個發布計畫。\n\n方案 A：一條保守的漸進式發布路徑，工程上你**幾乎可以保證**這次上線不出事——慢、無聊，但穩。方案 B：一條更激進的路徑，期望收益明顯更高（更快交付、更少維運成本），但有 1% 的機率會在全面上線的那一刻翻車、引發一次面向使用者的事故。\n\n你選了 A。理由你說得出口：「那 1% 翻車的代價太大，我寧可要那份**確定**。」這聽起來無懈可擊。\n\n現在換一個場景。同樣兩條路，但這次基線已經很糟——無論哪個方案，都有 89% 的機率因為一個上游依賴的已知問題而失敗（這部分你改變不了）。在剩下那 11% 「上游沒掛」的世界裡，方案 C 給你「穩穩交付」，方案 D 給你「期望更高、但更可能空手而回」。這次你選了 D：「反正大機率上游會掛、這把多半是白忙，那不如賭大的，搏一個高收益。」\n\n兩個選擇，各自都很有道理。但我要讓你看一件事：**如果你在第一個場景偏好「保證」（A 勝 B），又在第二個場景偏好「賭大的」（D 勝 C），那麼這兩個選擇放在一起，在數學上是不一致的——它們違反了一條你絕不會當面反對的公理。** 而且你不是算錯了任何一步。\n\n這就是 Allais（阿萊）悖論的工程版。你對「保證不出事」那份超額的偏愛——決策理論叫它**確定性效應（certainty effect）**——會在你跨兩個結構相同的決定時，把你拖進邏輯上的自相矛盾。ch04 的 Ellsberg 是「機率測不出來」才出問題；Allais 更狠：**機率全都明明白白寫著，你照樣不一致。**\n\n## 先把獨立公理擦亮\n\nch03 給過 vNM 四公理（完備、遞移、連續、獨立），那時我們說「獨立公理」是逼出期望效用唯一性的關鍵一條，但只給了直覺。這章它是主角，得寫清楚。\n\n獨立公理（independence axiom）說的是：\n\n> **如果你偏好彩券 X 勝過彩券 Y，那麼把 X、Y 各自跟「同一個第三彩券 Z」按同一個機率 p 混合之後，你仍該偏好「混了 Z 的 X」勝過「混了 Z 的 Y」。**\n\n形式寫法（先別怕，下面就拆白話）：\n\n```text\n   X ≻ Y   ⇒   (p·X + (1−p)·Z)  ≻  (p·Y + (1−p)·Z)\n                └──────┬──────┘     └──────┬──────┘\n                 以機率 p 玩 X、         以機率 p 玩 Y、\n                 機率 1−p 玩 Z          機率 1−p 玩 Z\n            對任意 Z 與任意 p∈(0,1] 都成立\n```\n\n白話：**那個「共同混進去的 Z」不該影響你在 X 和 Y 之間的偏好。** 因為在「玩到 Z」的那 (1−p) 機率裡，兩邊給你的東西**一模一樣**（都是 Z），那一塊是個 wash、是個常數、是個共同項——理性上它應該被「約掉」，你的選擇只該取決於剩下那塊真正不同的地方（p 機率下的 X vs Y）。\n\n你天天在做這個約分。比較兩個方案的成本時，那些**兩個方案都一樣**的固定開銷（機房租金、團隊薪資），你會自動忽略，只比**差異項**——因為共同的部分不影響排序。獨立公理就是把這個「共同項約掉、只比差異」的算帳直覺，升級成一條選擇公理。它無害到你會覺得「這還要證？」——而這正是 Allais 的陷阱所在。你越覺得它顯然，被它掀翻時就越震撼。\n\n你可能注意到了：這正是 ch04 那個「確實事件原理（sure-thing principle）」的近親。沒錯，**獨立公理（vNM，客觀機率版）和確實事件原理（Savage，主觀機率版）是同一條公理家族的兩個化身**——「共同的部分不影響偏好」。ch04 的 Ellsberg 從**主觀機率**那一側（確實事件原理）把它掀翻；這章的 Allais 從**客觀機率**這一側（獨立公理）把它掀翻。同一條地基、兩記重錘（Ellsberg 那記的三色甕細節在 ch04，這裡不重畫）。\n\n## Allais 的兩個對賭\n\n1952 年 5 月，巴黎一場關於風險經濟學的國際研討會。Maurice Allais 在場，台下坐著當時與後來決策理論的半壁江山。他設計了兩組對賭，金額用百萬法郎級別（本書照 landscape 的經典版，單位用「萬」，金額是 100 萬、500 萬）。\n\n```text\n題 1：在 A 和 B 之間選一個\n\n   A ＝ 確定拿到 100 萬                         （certainty，鐵定）\n   B ＝ 10% 機率得 500 萬\n        89% 機率得 100 萬\n         1% 機率得     0\n\n題 2：在 C 和 D 之間選一個\n\n   C ＝ 11% 機率得 100 萬\n        89% 機率得     0\n   D ＝ 10% 機率得 500 萬\n        90% 機率得     0\n```\n\nAllais 觀察到（之後無數次重做都穩定，照 landscape）：**多數人在題 1 選 A，在題 2 選 D。**\n\n兩個選擇各自的「故事」都很順：\n\n- **題 1 選 A**：「B 比 A 多了個 10% 摸到 500 萬的機會，可是它讓我冒 1% 的風險，把**鐵定到手的 100 萬**變成 0。為了那 10% 的上檔，賭掉一個**確定**的百萬？不幹。我要那個確定。」——這就是確定性效應在說話。\n- **題 2 選 D**：「C 和 D 都很可能空手而回（89% vs 90% 拿 0，差不多）。既然多半拿不到，那這 10% 對 11% 的小差別我不在乎，我要那個更大的獎——500 萬 vs 100 萬，當然選 500 萬那邊。」\n\n聽起來都對。但**選 A 又選 D，在期望效用下是不可能同時成立的**。下一節我把這件事證給你看，而且要證得讓你無路可退。\n\n## Worked example：把共同的 89% 消掉，看見矛盾\n\n這是全書最該你停下來、拿筆跟著走一遍的推演之一。你的直覺正要跟獨立公理迎面對撞，慢慢來。\n\n**第一步：把每個彩券都寫成「在 100 個等可能情境上的報酬」。** 把機率拆成 1%＝1 格，總共 100 格。這樣四個彩券就攤成同一張底牌上的報酬分布，好對齊。\n\n```text\n把機率切成 100 格（1 格 = 1%）：\n\n           情境 1        情境 2–11      情境 12–100\n           （1 格）      （10 格）      （89 格）\n   ────────────────────────────────────────────────\n   A          100萬         100萬          100萬      ← A 把 89 格都填 100萬\n   B            0           500萬          100萬      ← B 在第 1 格變成 0、2–11 格變 500萬\n   ────────────────────────────────────────────────\n   C          100萬         100萬            0        ← C 把 89 格都填 0\n   D            0           500萬            0        ← D 在第 1 格 0、2–11 格 500萬\n```\n\n停一下，盯著最右邊那欄（情境 12–100，那 89 格）看：\n\n```text\n   題 1：A 和 B 在這 89 格裡，都是 100萬   ← 共同項！\n   題 2：C 和 D 在這 89 格裡，都是   0    ← 共同項！\n```\n\n**A、B 在那 89 格上給你一模一樣的東西（都 100 萬）；C、D 在那 89 格上也給你一模一樣的東西（都 0）。** 這 89 格，就是獨立公理裡那個「共同混進去的 Z」。\n\n**第二步：把共同的 89 格約掉。** 獨立公理說：那 89 格兩邊一樣，不該影響你在每一題內部的偏好。所以把它從每個彩券裡「劃掉」，只留下真正有差異的前 11 格（情境 1–11）：\n\n```text\n   約掉那共同的 89 格之後，剩下前 11 格：\n\n   A' （＝A 去掉 89 格）：  情境1 拿 100萬，  情境2–11 拿 100萬   →「11 格全是 100萬」\n   B' （＝B 去掉 89 格）：  情境1 拿   0  ，  情境2–11 拿 500萬   →「1 格 0、10 格 500萬」\n\n   C' （＝C 去掉 89 格）：  情境1 拿 100萬，  情境2–11 拿 100萬   →「11 格全是 100萬」\n   D' （＝D 去掉 89 格）：  情境1 拿   0  ，  情境2–11 拿 500萬   →「1 格 0、10 格 500萬」\n```\n\n**第三步：看見它。**\n\n```text\n   A' 與 C' ：一模一樣（11 格全是 100萬）\n   B' 與 D' ：一模一樣（1 格 0、10 格 500萬）\n```\n\nA' 和 C' 是同一個東西，B' 和 D' 是同一個東西。獨立公理說「劃掉共同的 89 格不改變偏好」，所以：\n\n```text\n   你在題 1 選 A 勝 B\n        ⇕（獨立公理：約掉共同 89 格，偏好不變）\n   等於你偏好 A' 勝 B'\n        ‖（A'＝C'、B'＝D'，是同一對彩券）\n   等於你偏好 C' 勝 D'\n        ⇕（獨立公理：把共同 89 格再加回去 [這次共同項是「89 格拿 0」]，偏好不變）\n   等於你在題 2 該選 C 勝 D\n```\n\n**結論：如果你在題 1 選 A，獨立公理逼著你在題 2 必須選 C。** 但你（和多數人）選了 D。**選 A 又選 D，直接違反獨立公理。** 沒有第三條路。\n\n我自己用期望效用的不等式再獨立複核一遍，確認上面的「劃格子」沒有作弊。記 u(0)、u(100)、u(500) 為三個獎額的效用（u 遞增，u(0)<u(100)<u(500)）：\n\n```text\n題 1：A ≻ B 寫成期望效用不等式\n   EU(A) > EU(B)\n   u(100) > 0.10·u(500) + 0.89·u(100) + 0.01·u(0)\n   兩邊都減去 0.89·u(100)，把 u(100) 寫成 (0.89+0.11)·u(100)：\n   0.11·u(100) > 0.10·u(500) + 0.01·u(0)        …… (式 ①)\n\n題 2：D ≻ C 寫成期望效用不等式\n   EU(D) > EU(C)\n   0.10·u(500) + 0.90·u(0) > 0.11·u(100) + 0.89·u(0)\n   兩邊都減去 0.89·u(0)：\n   0.10·u(500) + 0.01·u(0) > 0.11·u(100)        …… (式 ②)\n```\n\n把 (式 ①) 與 (式 ②) 並排：\n\n```text\n   (式 ①)   0.11·u(100)  >  0.10·u(500) + 0.01·u(0)\n   (式 ②)   0.10·u(500) + 0.01·u(0)  >  0.11·u(100)\n   ──────────────────────────────────────────────────\n   令 P = 0.11·u(100)，Q = 0.10·u(500) + 0.01·u(0)\n   (式 ①) 說 P > Q\n   (式 ②) 說 Q > P\n   ⇒ 同時要 P > Q 且 Q > P  ⇒  無解（矛盾）  ∎\n```\n\n**沒有任何一組效用值 u(0)、u(100)、u(500) 能讓「選 A」與「選 D」同時是期望效用最大化的結果。** 跟 ch04 的 Ellsberg 結構上是雙胞胎：那裡是「沒有任何 b＝P(黑) 能同時合理化兩個選擇」，這裡是「沒有任何效用函數能同時合理化兩個選擇」。劃格子法和不等式法給出同一個結論——兩法一致，我放心了。\n\n驚嘆點在這：**Allais 沒有問你任何難算的東西。** 四個彩券的機率全都印在紙上，沒有一格是模糊的（這就是它比 Ellsberg 更狠的地方）。他只是讓你做兩個各自看起來都很明智的選擇，然後把共同的 89 格一劃，你的兩個選擇就在你眼前自打嘴巴。**你違反的不是算術，是一條你打死都不會當面否認的公理。**\n\n## 罪魁是「確定性效應」：機率權重在 p→1 的那道懸崖\n\n那麼，人為什麼會掉進去？哪一步出了「描述上的真相」？\n\n關鍵在題 1 的 A：它是**確定的 100 萬**。人對「確定」這件事給了超額的權重——從「鐵定到手」往下調一點點（哪怕只調 1%，讓它有 1% 機率變 0），心理上的損失感遠大於那 1% 的數學份量。決策理論把這個叫**確定性效應（certainty effect）**：Kahneman 與 Tversky 1979 年用這個詞，指人**高估「確定」相對於「僅僅很可能」的價值**（照 landscape；確定性效應一詞由 KT1979 普及）。\n\n這正好接回 ch09 的**機率權重函數** w(p)。回憶那條倒 S 曲線：小機率被高估、中大機率被低估，而在 **p 趨近 1 的地方，w(p) 有一道陡降**——從 p=1（確定）往 p=0.99 移動時，決策權重 w 掉得比機率本身快得多。\n\n```text\n   機率權重 w(p)：靠近 p=1 的那道懸崖（示意，非精確繪製）\n\n   w(p)\n    1 ┤                                              ●  ← w(1)=1（確定，滿格權重）\n      │                                          ╱\n      │                                      ╱      ← 從 p=1 往左一點點，\n      │                                  ╱            w 急速掉下來（懸崖）\n      │                            ╱\n      │                    ╱                        ← 中段：w(p) < p（被低估）\n      │            ╱\n      │      ╱\n    0 ┤●╱\n      └┴───────────────────────────────────┴──────┴──\n       0                                   0.99    1   p\n\n   要點：w(1) 是「確定」獨享的滿格權重；只要不再確定（p=0.99），\n         w 就從懸崖上掉下來——這就是「確定性效應」的形狀。\n```\n\n用這道懸崖看 Allais：\n\n- **題 1**：A 站在 p=1 的崖頂，獨享確定性的滿格權重；B 把那份確定性破壞掉（引入 1% 的歸零風險），於是 B 裡「89% 得 100 萬」這塊的決策權重，因為不再有「確定」加持而**掉下懸崖**。A 的確定性溢價贏了那 10% 的上檔。→ 選 A。\n- **題 2**：C 和 D **都沒有任何確定的部分**（都是 89%／90% 拿 0 的賭局，沒人站在崖頂）。確定性效應在這裡**完全不起作用**，因為沒有「確定」可言。於是人退回比較「赤裸的機率與獎額」，10% 得 500 萬壓過 11% 得 100 萬。→ 選 D。\n\n看清楚了嗎：**確定性效應只在題 1 開火（因為只有題 1 有個確定選項 A），在題 2 啞火（兩邊都不確定）。** 同一個人，在「有確定選項」和「沒有確定選項」的兩題裡，對那共同的 89 格做了**不一致**的對待——這個不一致，就是獨立公理被掀翻的精確機制。展望理論不只說「人會這樣」，它還用 w(p) 在 p→1 的陡降**精確預測了違反會往哪個方向發生**（選 A、選 D，不是隨機亂選）。這是描述的勝利：裂縫不是隨機的噪音，是有方向、可建模的結構。\n\n## 一段該 hedge 的軼事：連 Savage 自己都選錯了\n\nAllais 把這兩題端給在場的人，據說（軼事，hedge：以下細節為學界轉述，非第一手實錄）當場就有幾位後來的諾貝爾經濟學獎得主給出了「選 A 又選 D」的不一致答案。最有名的是 Leonard Savage（薩維奇）——**主觀期望效用體系的奠基者本人**（ch04／ch06 那位）。\n\n故事大意是：1952 年那場巴黎研討會的午餐時間，Allais 把兩題拿給 Savage 選，Savage 的答案違反了他**自己理論的核心公理**（確實事件原理）。\n\n但故事的後半段才是重點，而且它對「規範 vs 描述」這道全書中央張力說了很深的一句話。Savage 知道自己選得不一致之後，**沒有放棄他的公理**。他的反應大致是（轉述，hedge）：「一個暫時接受了某個規範理論的人，遇到理論看似把他帶錯路的情況，他有義務認真檢視——逐一反思，決定到底是修正自己的第一直覺，還是修正理論。」他選擇了前者：**承認自己最初的選擇是一個『錯誤』，然後把偏好改回與公理一致。**\n\n這段軼事值得你品味，因為它把「規範」和「描述」的關係演活了：\n\n- 從**描述**的角度，Savage 的第一反應（選 A 又選 D）**就是人類真實的選擇**——連理論的發明人在不設防時都這樣選。展望理論說對了。\n- 從**規範**的角度，Savage 沒有因為「我也這樣選」就推翻公理。他把自己的第一直覺當成**需要被矯正的偏差**，因為他**反思後仍然認為**那幾條公理是他願意被約束的。\n\n換句話說：**Allais 證明了人會違反獨立公理（描述），但這不自動證明獨立公理是錯的規範。** Savage 的態度是：「我違反了它，這說明我的直覺有 bug，不說明我的公理有 bug。」這是一種立場——不是唯一的立場，Allais 本人就反對它，認為應該修正理論去配合人的選擇。誰對？這正是 ch12 要收的問題（展望理論到底證明了什麼），也是全書中央張力的核心。**這裡你只需要記住：「人這樣選」和「人該這樣選」是兩件事，Allais 的兩個對賭把它們之間的縫撐得很開。**\n\n（補一句歸屬正確性：與 Savage 同場「中槍」的還有哪些大人物，不同來源說法略有出入，本書不點名到具體個人以免誤傳；只說「包括幾位日後的諾貝爾得主」這個被廣泛轉述的版本，hedge。）\n\n## 直覺的陷阱\n\n決策正是人類直覺與規範理論最常打架的領域，這章兩個具名陷阱特別容易把你帶溝裡。\n\n| 陷阱 | 錯誤直覺長怎樣 | 它在哪一步帶你下溝 | 正確版（守住） |\n|---|---|---|---|\n| **「我的選擇明明都很合理、哪有矛盾」**（T9） | 「題 1 要確定、題 2 賭大的，各有各的道理，這兩個決定根本是不同情境，扯不上一起」 | 你把兩題當成**互不相干**的決定分開看，於是看不見它們共用的那 89 格結構——矛盾不在任何**單一題目內部**，它藏在**跨兩題對同一塊共同部分的不同對待**，所以分開看永遠找不到 | 矛盾在於：題 1 你把「共同的 89 格＝100萬」當回事（捨不得放棄那份確定），題 2 你把「共同的 89 格＝0」不當回事（反正多半拿 0）。同一塊共同部分，你在兩題裡偷偷換了重要性——這就是違反獨立公理。把 89 格一劃，矛盾立刻現形 |\n| **把「違反獨立公理」當成「算錯了」** | 「他們選 A 又選 D，是不是把機率算糊塗了？教他們算清楚期望值就好了」 | 你會把一個**對公理的系統性偏離**誤診成**算術錯誤**，以為「補課就能修好」——但你怎麼補都修不掉，因為根本沒有算錯的一步可糾正（每個機率都印在紙上、沒人算錯） | 跟 ch04 的 Ellsberg 一樣：受試者**每一步機率都對**。他們不是把 10% 算成別的數，他們是**用兩個選擇拒絕了**「共同部分不影響偏好」這條公理。這是穩定、有方向的偏離（確定性效應驅動），不是隨機的算術失誤（T9） |\n\n第三個更隱微的陷阱：**以為「只要金額夠大／夠真實，人就會變回一致」**。常見的反駁是「這些是假想賭局，給真錢、給夠大的錢，人就理性了」。經驗證據不支持這個樂觀（hedge：實驗結果依設計而異，但 Allais 型違反在真實賭注、高能力受試者身上**仍穩定出現**，甚至有研究指出違反隨數學能力**上升**而非下降）。怎麼自我察覺你掉進這個陷阱？徵兆是：**當你發現自己對「保證不出事」的方案願意付出明顯超過它數學份量的代價（多花很多工時去換掉那最後 1% 的風險），而在「反正大機率失敗」的場景裡又突然變得敢賭——你就正在上演 Allais。** 那不是你今天狀態不好，那是確定性效應，它對專家一樣有效，而且你察覺不到（為什麼察覺不到，屬於心理機制，見《思考的陷阱》談確定性效應與框架）。\n\n## 紙上推演\n\n全是紙筆推演，數值手算，不必跑任何程式。建議拿筆。\n\n### 推演題\n\n**題 1（★★★，30 分鐘）** 用「消去共同結果法」獨立證明 Allais 的不一致。要求：(a) 把 A、B、C、D 四個彩券攤成「100 格報酬表」（1 格＝1%）；(b) 指出題 1、題 2 各自的「共同 89 格」是什麼；(c) 把共同 89 格劃掉，證明 A' 與 C' 相同、B' 與 D' 相同；(d) 用一句話說清楚「選 A 又選 D」為什麼違反獨立公理。最後用期望效用不等式（式 ① 與式 ②）再驗一次，確認兩法一致。\n\n**題 2（★★，15 分鐘）** 解釋「確定性效應」如何用機率權重 w(p) 在 p→1 的陡降來描述。要求：說清楚為什麼這個效應**只在題 1 開火、在題 2 啞火**，並由此預測違反的方向（人會選哪個、不會選哪個）。\n\n**題 3（★★，15 分鐘）** 口頭／書面題。一個工程師同事堅持「我在那兩題的選擇都很合理，我哪有不一致」。寫下你會怎麼一步步讓他看見自己的矛盾。要求：你的說明裡必須出現「共同的 89 格」和「你在兩題裡偷偷改了它的重要性」這兩個關鍵動作。\n\n### 推演解答\n\n**題 1 解答。** 這是 worked example 的濃縮版，自己獨立做一遍才算過關。\n\n(a)、(b)、(c) 合在一張表上做：\n\n```text\n切成 100 格（1 格 = 1%）：\n\n           情境 1        情境 2–11      情境 12–100\n           （1 格）      （10 格）      （89 格 ← 共同欄）\n   ────────────────────────────────────────────────\n   A          100萬         100萬          100萬\n   B            0           500萬          100萬   ← 題1 共同欄：A、B 都 100萬\n   ────────────────────────────────────────────────\n   C          100萬         100萬            0\n   D            0           500萬            0      ← 題2 共同欄：C、D 都 0\n\n   劃掉共同的 89 格，只留前 11 格：\n   A' = B'? →  A'：11 格全 100萬       C'：11 格全 100萬     ⇒ A' = C' ✓\n              B'：1 格 0、10 格 500萬   D'：1 格 0、10 格 500萬 ⇒ B' = D' ✓\n```\n\n(d) 一句話版：**獨立公理說「劃掉共同的 89 格不該改變你的偏好」；劃掉後 A 變成 C、B 變成 D，所以「題 1 偏 A」邏輯上等於「題 2 偏 C」。但你題 2 選了 D（＝B 那一邊），偏好翻了——這就是對獨立公理的直接違反。**\n\n期望效用不等式複核（與正文同，自己重推一遍）：\n\n```text\n   A ≻ B：u(100) > 0.10u(500)+0.89u(100)+0.01u(0)\n          ⇒ 0.11u(100) > 0.10u(500)+0.01u(0)         …①\n   D ≻ C：0.10u(500)+0.90u(0) > 0.11u(100)+0.89u(0)\n          ⇒ 0.10u(500)+0.01u(0) > 0.11u(100)         …②\n   ① 說「左 > 右」，② 說「右 > 左」（同樣兩個量）⇒ 矛盾。∎\n```\n\n常見錯路一：忘記把 u(100) 拆成 (0.89+0.11)·u(100) 就減不掉共同項，卡在那裡。記住目標是「把兩邊都有的 0.89·u(100) 約掉」。常見錯路二：以為要給 u 一個具體形狀（比如 u=√）才能比。不用——證明的力量在於**對任何遞增的 u 都矛盾**，跟 ch04「對任何 b 都矛盾」同一個味道。\n\n**題 2 解答。**\n\n確定性效應＝人高估「確定」相對於「僅僅很可能」的價值。用機率權重 w(p) 描述：w 在 p=1 有滿格權重 w(1)=1，但只要 p 從 1 往下掉一點點（哪怕到 0.99），w(p) 就從一道**懸崖**上摔下來，掉得比機率本身快。\n\n```text\n   題 1：A 站在 p=1 崖頂（確定 100萬），獨享滿格權重。\n         B 摧毀了這份確定（1% 歸零），於是 B 裡「89% 得100萬」\n         那塊失去確定性加持、權重掉下懸崖 ⇒ A 的確定性溢價勝出 ⇒ 選 A。\n\n   題 2：C、D 都沒有任何確定部分（都 89%/90% 拿 0）。\n         沒人站在崖頂 ⇒ 確定性效應啞火 ⇒ 退回比裸機率與獎額\n         ⇒ 10% 得 500萬 壓過 11% 得 100萬 ⇒ 選 D。\n```\n\n**預測的方向**：確定性效應只在「有確定選項」的題開火。所以理論預測人會在題 1 偏向**那個確定的安全選項（A）**、在題 2 偏向**那個高獎額的賭（D）**——而這正是 Allais 觀察到的模式。注意這個預測是**有方向的**：它不只說「人會不一致」，它說「不一致會往 A＋D 這個方向發生，不會往 B＋C 那個方向」。能預測方向，正是展望理論作為**描述模型**的力量（接 ch12）。\n\n常見錯路：把確定性效應說成「人就是愛確定」這種同義反覆。重點不是「愛確定」這個標籤，而是 **w(p) 在 p→1 的陡降提供了一個能算、能預測方向的形狀**——它解釋了為什麼效應只在題 1 出現、不在題 2 出現。\n\n**題 3 解答。** 給堅持「我哪有不一致」的同事的說明（必須出現「共同的 89 格」與「偷偷改了它的重要性」）：\n\n> 你把兩題分開看，當然各自都合理——問題不在任何一題裡面，在兩題**之間**。我把四個彩券攤成 100 格報酬表給你看：題 1 的 A 和 B，在最後那 89 格上**給你的東西完全一樣**（都是 100 萬）；題 2 的 C 和 D，在那同一塊 89 格上**也一樣**（都是 0）。這 89 格就是兩題**共同的部分**。理性的規則（獨立公理）說：兩邊一樣的共同部分，應該被約掉、不影響你的選擇——你只該比剩下那 11 格不同的地方。可是你在題 1 裡，因為那 89 格是「確定的 100 萬」，你死命想保住它（所以選了穩的 A）；到了題 2，那同一塊 89 格變成「0」，你就完全不在乎了（所以敢賭 D）。**你在兩題裡偷偷改了這塊共同 89 格的重要性**——題 1 把它當寶、題 2 把它當無物。把這塊共同部分劃掉，A 就變成 C、B 就變成 D，你的「選 A 又選 D」立刻變成「在同一對彩券上自相矛盾」。你不是算錯了任何機率，你是對共同部分前後不一致。\n\n常見錯路：把它解釋成「他在題 2 對 10% vs 11% 的小差別判斷失誤」。不是——重點不在那 1% 的機率差，重點在**那塊共同的 89 格被前後不一致地對待**。糾結 10% vs 11% 反而會錯過 Allais 的手術刀落在哪。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 用一句話講獨立公理：那個「共同混進去的 Z」為什麼不該影響你在 X、Y 之間的偏好？拿你比較兩個方案成本時「自動忽略共同開銷」的習慣來類比。\n2. 不查正文，把 Allais 四個彩券攤成 100 格報酬表，指出題 1、題 2 各自的「共同 89 格」是什麼。\n3. 為什麼說「選 A 又選 D」的矛盾**不在任何單一題目內部**？它藏在哪兩題之間的什麼地方？\n4. 確定性效應是什麼？它如何用機率權重 w(p) 在 p→1 的陡降來描述？為什麼這個效應只在題 1 開火、在題 2 啞火？\n5. 為什麼 Allais 比 Ellsberg「更狠」？（提示：Ellsberg 至少還有「機率測不出來」當藉口，Allais 連這個藉口都沒有。）\n6. 獨立公理（vNM）和 ch04 的確實事件原理（Savage）是什麼關係？為什麼說 Allais 和 Ellsberg 是「同一條公理家族的兩記重錘」？\n7. Savage 自己選錯之後，為什麼**沒有**放棄公理、反而把選擇改回去？這個態度對「人違反公理是否證明公理是錯的」這個問題，提供了什麼立場？\n8. 為什麼「違反獨立公理」不是「算錯」？把這句話講到一個堅持「教他算清楚就好」的人會閉嘴。\n\n## 延伸閱讀\n\n- **Maurice Allais, 1953, \"Le Comportement de l'homme rationnel devant le risque…,\" *Econometrica* 21(4):503–546** — 原始論文（法文）。經典兩題對賭出自這裡；即使讀不動全文，光看他怎麼設計這兩題來「狙擊」美國學派的公理，就值得。（landscape 驗證的一級來源）\n- **Kahneman & Tversky, 1979, \"Prospect Theory,\" *Econometrica* 47(2):263–291** — 確定性效應一詞由此普及，本章「機率權重在 p→1 陡降」的解釋出自它。讀「certainty effect」與「isolation effect」兩節，正是本章 Allais 的展望理論解。\n- **Wikipedia,「Allais paradox」與「Certainty effect」條目** — 把消去共同結果（common consequence）的劃格子推導講得很清楚，附多種金額版本對照；想再找幾組數字練手就讀它。（landscape 交叉核對過的主條目）\n- **Stanford Encyclopedia of Philosophy,「Decision Theory」與「Expected Utility」條目** — 把獨立公理在 vNM 體系裡的角色、以及違反它的後果講透；讀「Independence」那節，配合本章 worked example 看「為什麼這條公理一斷、唯一性就垮」。\n- **《思考的陷阱》談確定性效應與框架** — 本章只講 Allais 違反的**數學描述**（獨立公理、機率權重的形狀）；人**為什麼**對確定有超額偏好、為什麼察覺不到自己在兩題裡不一致，屬於心理機制，見那本書。\n- **《賽局》談策略互動** — 本章是**單人**對固定機率的賭。但若桌子對面是會根據你的選擇調整賠率的莊家（你的「不一致」會被對手利用），就溢出到多人賽局，見《賽局》談策略互動。\n"}, {"id": "ch12-description-or-norm", "file": "ch12-description-or-norm.md", "group": "Part III — 描述的裂縫・展望理論", "title": "ch12 — 描述還是規範：展望理論到底證明了什麼", "md": "# ch12 — 描述還是規範：展望理論到底證明了什麼\n\n> **本章解決什麼問題**：Part III 收束。前面四章（ch08–11）把展望理論的四根支柱一根根立起來，也把規範理論的公理一條條掀翻——參考點、損失趨避、機率權重、框架、Allais。現在要回答一個你讀到這裡一定會問的問題：**所以呢？人系統性地違反期望效用，這到底證明了什麼？** 本章給出全書中央張力的正面回答——展望理論不是「人很笨」的證明，而是兩件事：① 規範理論作為**描述**失敗了；② 但偏離本身有精確的數學結構。順便把「偏離的心理機制」明確交棒給《思考的陷阱》，這是「理性三角」的第一個交棒點。\n\n## 從你已知的出發\n\n你的 codebase 裡有兩種文件，你天天在用，可能沒注意到它們是兩種不同的東西。\n\n第一種是 design doc、RFC、coding guideline。它寫的是「**應該**怎麼做」：這個服務應該怎麼分層、這個 API 應該怎麼設計、這個權衡應該怎麼取捨。它是**規範**的——它不描述任何人實際寫的程式碼，它規定一個標準，違反它的 PR 該被打回。\n\n第二種是 postmortem、incident timeline、你翻 git blame 翻出來的那段「當時為什麼會這樣寫」。它寫的是「**實際**發生了什麼」：那天凌晨三點，那個工程師在那個壓力下，**實際上**怎麼決定的。它是**描述**的——它不評判對錯（好的 postmortem 是 blameless 的），它只如實記錄人在真實約束下做了什麼。\n\n這兩種文件**都對**，因為它們在回答兩個不同的問題。design doc 回答「該怎樣」，postmortem 回答「實際怎樣」。你不會拿 postmortem 去否證 design doc（「你看，大家實際上都沒按 guideline 寫，所以 guideline 是錯的」——這話一聽就荒謬）；你也不會拿 design doc 去否證 postmortem（「按我們的 guideline 這事不該發生，所以它沒發生」——更荒謬）。它們描述兩件不同的事，井水不犯河水，而好的工程文化**同時需要兩種**。\n\n把這個直覺記住，因為它就是本章的全部。期望效用（ch03）是決策的 design doc——它規定「該怎麼選」。展望理論（ch08–11）是決策的 postmortem——它記錄「人實際怎麼選」。前面十一章你一直在這兩者之間來回，可能隱隱覺得它們在打架。本章要說的是：**它們根本沒在打架，它們在回答兩個不同的問題。** 而「人實際怎麼選」這份 postmortem 的了不起之處，不在於它抓到人犯錯，在於它證明了——人犯的錯**有結構、可預測方向、可以寫成數學**。\n\n## 先把帳對清楚：四根支柱，各掀翻哪一條規範\n\nPart III 走到這裡，我們手上有四根描述性支柱，每一根都對應規範理論的某一條被違反的公理。在回答「證明了什麼」之前，得先把這張帳對清楚——哪根支柱斷了哪條公理。這是本章的 worked example，也是全 Part III 的總帳。\n\n先複習一下「被掀翻的」那邊有哪些規範要求。期望效用理論不只有 ch03 的四條 vNM 公理，它還隱含幾條更基本的「理性選擇」假設，平常沒人明寫，因為它們太顯然了——顯然到 Kahneman 與 Tversky 之前沒人想到要去測它們：\n\n```text\n規範理論隱含的幾條「顯然」要求（被 Part III 一條條掀翻的）\n\n  ① 描述不變性（description invariance）\n     邏輯等價的兩種「問法」，不該改變你的選擇。\n     ——「99% 成功率」和「1% 失敗率」是同一件事，你的選擇該一樣。\n\n  ② 對最終狀態估值（asset integration）\n     理性的選擇看的是「最終你手上有多少」，不是「你從哪個零點走過來」。\n     ——終點 1100 就是 1100，你本來預期 1000 還是 1200 不該影響估值。\n\n  ③ 得失對稱（沒有「損失」這個特殊範疇）\n     +100 的好與 −100 的壞，量級該對稱（在期望效用裡根本沒有「參考點」\n     這個零件，自然也沒有「損失區」這種需要被特別放大的東西）。\n\n  ④ 機率線性（期望效用對機率是線性的）\n     EU = Σ pᵢ·u(xᵢ)，機率 pᵢ 是直接的權重；把一個機率乘以 2，\n     它對 EU 的貢獻就乘以 2。沒有「決策權重 ≠ 機率」這回事。\n\n  ⑤ 獨立公理（independence / sure-thing principle）\n     兩個彩券各混入同一個共同結果，偏好不該因此改變（ch11 的主角）。\n```\n\n現在把四根支柱對上去。這張表是 Part III 的總帳，也是你讀完這個 Part 該能默寫的一張表：\n\n```text\n四根支柱 × 被掀翻的規範要求（Part III 總帳）\n\n ┌─────────────┬──────────────────────┬──────────────────────────────┐\n │ 展望理論支柱│ 掀翻哪條規範要求     │ 本書出現過的具體例子         │\n ├─────────────┼──────────────────────┼──────────────────────────────┤\n │ 參考點      │ ② 對最終狀態估值     │ 同一個最終財富 1100，從參考點 │\n │（ch08）     │  （asset integration）│ 1000 看是「得」、從 1200 看是 │\n │             │                      │ 「失」——終點一樣、估值相反。 │\n │             │                      │ 規範記帳法裡這不可能（它沒有  │\n │             │                      │ 參考點這個零件）。            │\n ├─────────────┼──────────────────────┼──────────────────────────────┤\n │ 損失趨避    │ ③ 得失對稱           │ 脊椎賭注：|v(−100)| 被 λ≈2.25 │\n │（ch09）     │                      │ 放大，壓過 v(+200)，即使機率  │\n │             │                      │ 相等、期望值為正仍拒絕。失比  │\n │             │                      │ 得更重，不對稱。              │\n ├─────────────┼──────────────────────┼──────────────────────────────┤\n │ 機率權重    │ ④ 機率線性           │ 決策權重 w(p) ≠ p：小機率被高 │\n │（ch09）     │                      │ 估、中大機率被低估（倒 S）。  │\n │             │                      │ 同一個人買樂透（高估極小贏面）│\n │             │                      │ 又買保險（高估極小災難）——不 │\n │             │                      │ 是不一致，是 w(p) 在兩端的形狀│\n ├─────────────┼──────────────────────┼──────────────────────────────┤\n │ 框架        │ ① 描述不變性         │ 亞洲疾病問題：得框架（救活人  │\n │（ch10）     │                      │ 數）選穩、失框架（死亡人數）選│\n │             │                      │ 賭。邏輯等價、措辭不同，選擇翻│\n │             │                      │ 轉。措辭幫你挪了參考點。      │\n ├─────────────┼──────────────────────┼──────────────────────────────┤\n │ 確定性效應  │ ⑤ 獨立公理           │ Allais：選 A 又選 D，消去共同 │\n │（ch11，是機 │  （sure-thing）      │ 的 89% 後對剩下 11% 偏好相反。│\n │ 率權重在 p→1│                      │ 確定性被超額加權＝w(p) 在 p=1 │\n │ 的後果）    │                      │ 附近陡降。                    │\n └─────────────┴──────────────────────┴──────────────────────────────┘\n```\n\n注意這張表的兩個結構特徵，它們是本章後面所有討論的地基：\n\n**第一，掀翻不是隨機散落的，它有規律。** 框架（①）和參考點（②）其實是同一件事的兩面——框架之所以能改變選擇，正是因為它在偷偷挪參考點（ch10 已證）。確定性效應（⑤）和機率權重（④）也是同一件事的兩面——確定性被超額加權，正是 w(p) 在 p→1 陡降的後果（ch11 已證）。所以四根支柱不是四個獨立的「人會犯的錯」，它們互相咬合，由**少數幾個機制**（參考點記帳、損失區放大、機率非線性權重）生成。這是「偏離有結構」的第一層意思。\n\n**第二，每一格右邊的「具體例子」都是可重複的實驗，不是逸事。** 不是「某次某人做錯了」，是「一大群正常、聰明、受過機率訓練的人，在這個賭局前**系統性地、可預測方向地**這樣選」。康納曼（Daniel Kahneman）自己在很多場合說過，這些效應連他和特沃斯基（Amos Tversky）本人都躲不掉——他們知道答案、知道陷阱在哪，照樣會被自己設計的題目騙進去（2026-06，此為廣為流傳的轉述，視為逸事看待）。一個你明知是錯覺、卻還是看得到的錯覺，才叫穩定。\n\n這張表對完，「展望理論證明了什麼」這個問題就有了精確的答案，下一節正面回答。\n\n## 它證明的第一件事：規範理論作為「描述」失敗了\n\n先講清楚「失敗」是在什麼意義上失敗——這一步不講清楚，整章會被誤讀。\n\n期望效用理論誕生時，身上背著**兩個身份**，而且很長一段時間沒人把它們分開：\n\n```text\n期望效用理論的兩個身份（誕生時綁在一起）\n\n  身份 A（規範 / normative）：「你該怎麼選」\n    ——滿足 vNM 四公理，你的選擇就等價於最大化某個 EU（ch03）。\n    這是個「應該」：違反它會被 money pump 抽水。\n\n  身份 B（描述 / descriptive）：「人實際怎麼選」\n    ——經濟學長期假設「人**就是**按 EU 最大化在選」，\n    把它當成可以拿來預測真人行為的模型。\n```\n\n身份 A 和身份 B 在 1944 年（vNM 出書）之後被綁在一起用了三十多年。經濟學的標準做法是：假設人按期望效用最大化（身份 B），然後推導市場、推導需求、推導一切。沒人特別質疑「人真的這樣算嗎」，因為那幾條公理太無害了——誰會故意違反遞移性、誰會選一個各方面都更差的選項？既然公理這麼難反對，人**應該**按它選（身份 A），那人**實際上**大概也是這麼選的（身份 B），對吧？\n\n展望理論做的事，精確地說，是**斬斷這兩個身份**。它沒有碰身份 A——它沒有證明 vNM 公理錯了、沒有證明「該怎麼選」的標準有誤。它攻擊的是身份 B：\n\n> 展望理論證明的第一件事——**把期望效用當成「人實際怎麼選」的描述模型，是錯的**。人系統性地、可預測方向地偏離它。身份 B 失敗了。身份 A 一個字沒被動到。\n\n這個區分極其重要，重要到我認為是整本書最容易被讀反的一頁。「期望效用作為描述失敗了」**不等於**「期望效用錯了」。一個 design doc 沒人照著做，不代表 design doc 寫錯了——可能是 design doc 太理想、人腦成本有限做不到，但「該怎麼做」的標準本身可以完全正確。Allais 1953 那篇論文的標題就點破了這件事：他談的是「理性人面對風險的**行為**」——他在記錄行為（描述），不是在重寫公理（規範）。\n\n所以當你聽到「展望理論推翻了期望效用」，要在心裡補一個限定詞：推翻的是期望效用的**描述身份**（人實際這樣選嗎？不是），沒推翻它的**規範身份**（人該這樣選嗎？這個問題展望理論根本沒回答，也無意回答）。下一節講第二件事，那才是展望理論真正了不起的地方。\n\n## 它證明的第二件事：偏離本身有精確的數學結構\n\n如果展望理論只證明了「人偏離期望效用」，它不會是 Econometrica 史上被引用最多的論文，它頂多是一篇「人有時候不理性」的觀察報告。心理學裡這種報告多得是。\n\n它了不起的地方在第二件事：**它證明人偏離的方式不是隨機的噪音，而是有精確結構、可以寫成數學、可以反過來預測方向的。**\n\n把這兩種「偏離」對照一下，你立刻看出差別：\n\n```text\n兩種「偏離規範」，天差地別\n\n  隨機偏離（如果人只是「會犯錯」）：\n    ——偏差方向不可預測，這次偏左下次偏右，平均下來抵消。\n    ——除了「人不完美」之外，什麼都沒告訴你。\n    ——無法建模，因為它就是噪音。\n\n  結構性偏離（展望理論發現的）：\n    ——方向可預測：得區風險趨避、失區風險愛好（反射效應）；\n       小機率被高估、中大機率被低估（倒 S）；損失被放大 ≈λ 倍。\n    ——可以寫成數學：v(x)、w(p)、參考點，幾個零件就生成全部四根支柱。\n    ——可以反過來預測：給你一個新賭局，展望理論能**事先說出**\n       多數人會往哪邊偏——而且測下去常常對。\n```\n\n差別在最後一行。一個能**事先預測方向**的偏離模型，跟「人會犯錯」這種廢話，是兩個量級的東西。展望理論的價值函數 v(x)（得區凹、失區凸、失區更陡）和機率權重 w(p)（倒 S 型），不是事後拿來解釋已知結果的曲線配適——它們在 1979 年寫下後，可以拿去**預測**一個全新的、沒測過的賭局裡多數人會怎麼選，然後你去測，方向常常對。能預測，就不是噪音；不是噪音，就有結構。\n\n我認為這是 Part III 真正的驚嘆點，值得你用自己的話講清楚：**人偏離「該怎麼選」的方式本身是有規律的——這比「人會犯隨機的錯」深刻得多，也比「人很笨」尊重人得多。** 「人很笨」是個句點，講完就沒了；「人偏離的方向可以寫成 v(x) 和 w(p) 並事先預測」是個起點，它讓「人怎麼決策」變成一門能算的科學。把人的非理性說成「有結構的、可建模的」，這不是給人扣帽子，這是發現了一條自然律。\n\n這也回頭照亮了 ch08–11 每一章我反覆打的那句話——「這是描述，不是規範」。現在你看清楚為什麼那句話那麼重要了：因為展望理論的全部分量，正落在「它是一個**好的描述**」上。它好，不是好在它告訴你該怎麼選（它不管這個），是好在它**準確地、可預測地**抓住了人實際怎麼選。\n\n## 中央張力的正面回答：兩套都對的數學，描述兩件不同的事\n\n現在可以正面回答貫穿全書的那句話了。整本書我反覆叩問的中央張力是：\n\n> **規範理性（你該怎麼選）與描述現實（人實際怎麼選）之間，有一道穩定的裂縫。**\n\n讀到 Part III 你可能以為這道裂縫是個問題，是需要「解決」的矛盾——好像規範和描述總有一個是錯的，我們得選邊站。本章的回答是：**這道裂縫不是 bug，是兩套都對的數學在描述兩件不同的事。** 不需要選邊，因為它們根本不在同一個擂台上。\n\n```text\n中央張力的正面回答\n\n  期望效用（ch03）       展望理論（ch08–11）\n  ─────────────────      ──────────────────────\n  回答「該怎麼選」       回答「實際怎麼選」\n  規範（normative）      描述（descriptive）\n  由公理逼出來           由實驗歸納出來\n  u(最終財富)            v(相對參考點的變化)\n  機率 p 直接當權重      決策權重 w(p) ≠ p\n        │                        │\n        └────────┬───────────────┘\n                 │\n        兩套數學，描述兩件不同的事。\n        ——「人偏離 EU」不否證 EU 作為規範（該怎樣 ≠ 實際怎樣）；\n        ——「EU 是好規範」不否證展望理論作為描述（實際怎樣 ≠ 該怎樣）。\n        它們不矛盾，因為它們回答的不是同一個問題。\n```\n\n回到開頭那個比喻就全通了。「大家寫的程式碼都沒完全照 guideline」這件事（描述），不否證「guideline 規定的是對的寫法」（規範）；反過來，「guideline 規定的是對的寫法」（規範），也不保證「大家實際就這麼寫」（描述）。兩句話**同時為真**，因為一句講「該怎樣」、一句講「實際怎樣」。任何試圖用其中一句去推翻另一句的論證，都犯了同一個範疇錯誤——把「該怎樣」和「實際怎樣」當成在競爭同一個答案。\n\n所以「我該選哪個理論」這個問題本身就問錯了。看你要回答哪個問題：\n\n```text\n你要回答哪個問題，決定你用哪套\n\n  「我（理想上）該怎麼選這個賭？」     → 用期望效用（規範）。\n
