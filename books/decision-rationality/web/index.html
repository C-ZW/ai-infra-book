t 當真），也不知道**怎麼讓整個團隊穩定地不犯**。\n- 只有 ② 心理機制，你知道**為什麼會錯**，但沒有「對的演算法」當標竿（連「錯」都定義不出來），也沒有制度去攔截。\n- 只有 ③ 制度防線，你有流程，但不知道流程**該把什麼烤進去**（要烤進「先乘基率」這條規範），也不理解**它在補哪個心理漏洞**。\n\n這就是為什麼這三本書是一個三角而不是三本各自獨立的書：**規範定義了什麼叫對，心理機制解釋了為什麼會偏離，制度防線提供了不靠意志力的補救。** 本書是這個三角的規範角——我負責把「該怎麼算」和「偏離的數學長相」寫透，另外兩個角明確交棒給姊妹書。\n\n工程上你早就活在這個三角裡。**規範**＝你的 design doc 與演算法分析（該怎麼權衡）；**心理機制**＝你知道人在壓力下會慌、會錨定、會被措辭帶著走（為什麼 review 攔得住一個人攔不住的錯）；**制度防線**＝你的 runbook、checklist、code review、預先承諾的回滾條件（不靠任何人凌晨三點還清醒）。**好的工程流程，就是承認人腦的描述性限制（第三層），用規範性的工具（第一層）去補，靠制度（科學方法那本的地盤）讓這個補償不依賴個人狀態。** 你不靠記憶力，你靠 runbook——這句話本身就是整個理性三角的工程版總結。\n\n## 謙遜的收束：知道自己偏向哪，就能補它\n\n和解不是終點，它有一個非常實用的下游。如果你接受了「規範與描述之間有一道穩定、可預測方向的裂縫」，那麼一個直接的推論是：**你可以預先知道自己的決策會往哪個方向偏，於是可以針對性地設計補償。**\n\n這是描述模型「可預測方向」這個性質（T8）最值錢的地方。一個隨機的錯誤無法補償（你不知道它下次往哪偏）；但一個**有方向**的偏離可以——你知道它總往那邊偏，就在那邊架一道欄杆。\n\n```text\n   把可預測的偏向，翻成可設計的補償\n\n   你會穩定偏向哪（描述）         架什麼欄杆（規範性流程）\n   ──────────────────────       ──────────────────────────────\n   損失趨避：太怕一次當機，       預先承諾的回滾/熔斷條件——\n   會死守不該守的舊系統           「滿足 X 就回滾」事先寫死，\n   （ch09）                      別等事故當下用恐懼決策\n   ──────────────────────       ──────────────────────────────\n   框架效應：被 RFC 措辭、        刻意把同一決定用「得」和「失」\n   被「99% 成功」帶著走          兩種框架各問一次，看答案是否翻轉\n   （ch10）                      （翻轉＝你被框架推著走了）\n   ──────────────────────       ──────────────────────────────\n   沉沒成本：捨不得砍已投入       review 時強制問「如果今天從零開始、\n   三個月的專案（ch15）          忘掉已花的，還會選它嗎」——\n                                把「往前看」烤進流程\n   ──────────────────────       ──────────────────────────────\n   基率忽視：把 alert 當真        告警旁自動標真陽率、\n   （ch05）                      runbook 要求先看基率\n   ──────────────────────       ──────────────────────────────\n   過度自信／隧道視野            外部視角：找一個沒投入的人\n                                （描述事實）                  看（pre-mortem：「假設它失敗了，\n                                                              事後我們會說是因為什麼」）\n```\n\n注意這張表的每一行都是同一個動作：**用第一層的規範工具（事先算好的條件、強制的提問、外部的尺），去攔截第三層那個可預測的偏向。** 這就是 ch12 說的「好的流程是設計來補這道落差」的具體化。預先承諾（事先寫死回滾條件）、外部視角（找局外人看）、checklist（把規範烤進步驟）、pre-mortem（強迫想像失敗）——每一個都是在「人會往那邊偏」這個描述知識之上，架一道規範的欄杆。\n\n這就是「謙遜」的精確意思——不是「我承認我會犯錯」這種空泛的自謙，而是**具體到知道自己會往哪個方向犯、然後在那個方向上預先架好欄杆**。一個重要的警告（它也是 ch18 的核心陷阱）：**讀完這本書、知道了這些規範演算法，並不會自動修好你的描述性偏向。** 你讀完 ch09 不會因此就不損失趨避了——知識住在第一層，偏向住在第三層，兩層不會因為你「懂了」就自動對齊。康納曼（Kahneman）自己一輩子研究這些，據他坦言也仍會掉進自己研究的陷阱（這是被廣泛轉述的說法，hedge）。**所以補償必須是制度性的、外部的、不依賴你當下意志力的——這正是為什麼要靠 runbook 而不是靠記憶力，靠 review 而不是靠自律。** 規範知識的用途不是「升級你的腦」，是「讓你設計出補你腦的流程」。\n\n## 直覺的陷阱\n\n這章是哲學收束，最容易踩的陷阱也是觀念性的——把兩個不同層次的東西硬塞進一個對立。\n\n| 陷阱 | 錯誤直覺長怎樣 | 它在哪一步帶你下溝 | 正確版（守住） |\n|---|---|---|---|\n| **把「描述」與「規範」當成對立的兩個答案**（T7 的全書版） | 「展望理論和期望效用，總有一個是對的吧？既然人實際照展望理論走，那期望效用大概是被推翻的舊理論」 | 你預設了「同一個問題只能有一個對的答案」，於是把兩個**不同問題**的答案擺到擂台上分勝負。但「該怎麼選」和「實際怎麼選」不是同一個問題——讓它們打架就像問「地圖和行人的真實路線哪個對」 | 它們回答兩個不同問題：期望效用答「無限資源下該怎麼選」（規範），展望理論答「真實的腦怎麼選」（描述）。兩個都對，因為它們不在競爭同一個位子。一個描述事實不能反駁一個規範主張（「是」推不出「應」），所以「人這樣選」推不出「期望效用被推翻」 |\n| **把「理性」等同於「冷靜計算／壓抑情緒」** | 「理性的人就是不帶感情、純靠算的人；損失趨避那種情緒反應就是不理性」 | 你把「理性」窄化成**實質理性**的一種刻板印象（無限算力的冷血計算機），於是凡是省算力、帶情緒的快速策略都被你打成「不理性」——但這恰恰是程序理性所肯定的東西 | 理性有兩個意思：實質理性（結果對）和程序理性（過程對）。在真實約束下，一個用情緒當快速警報（損失趨避）、用捷思省算力的腦，可能是**程序理性**的——它在它的成本約束下做了對的事。把「理性＝冷血計算」當唯一意思，會讓你把所有務實的、有限資源下的好策略都誤判成缺陷 |\n\n第三個更隱微的陷阱：**以為「和解」＝「都對，所以怎樣都行／無所謂對錯」。** 這是把和解誤讀成相對主義。怎麼自我察覺你掉進去了？徵兆是你開始說「反正規範也只是一種觀點、人愛怎麼選怎麼選」——這就走過頭了。和解的主張很精確、一點都不相對主義：**在「該怎麼選」這個問題上，規範理論有它嚴格的對錯（違反公理就能被 money pump 抽乾，ch03）；在「實際怎麼選」這個問題上，描述模型有它經驗的對錯（預測錯方向就是壞模型）。** 兩個問題各自都有硬標準，和解只是說「別拿其中一個問題的標準去評判另一個問題的答案」。它讓對錯**各歸其位**，不是取消對錯。把和解讀成「怎樣都行」，等於把兩個都有硬標準的問題，攪成一鍋沒有標準的爛泥——那不是這章的主張，那是這章要防的誤讀。\n\n## 紙上推演\n\n純紙筆推演，不必跑任何程式。這章是觀念題，重點在你能不能把區分講清楚。\n\n### 推演題\n\n**題 1（★★，20 分鐘）** 拿一個你親身犯過的決策錯誤（基率忽視、沉沒成本、被框架帶走、損失趨避死守舊系統……挑一個真實的），把它拆成理性三角的三欄：① **規範上該怎麼算**（這個決定的「正確演算法」是什麼，引本書哪一章）；② **心理上為何會錯**（你當時的腦在跑什麼快速策略，為什麼它在那個情境下出錯——這欄指向《思考的陷阱》，你只要點出「這屬於心理機制」即可，不必深究）；③ **制度上怎麼防**（設計一個不依賴你當下意志力的流程，讓下次同樣的人不會再犯）。要求：三欄都要具體到「換一個同事在我的位子也會這樣」的程度，不要寫成自我批評。\n\n**題 2（★★★，20 分鐘）** 口頭／書面題。向一個堅持「行為經濟學證明了人是不理性的、所以那些『該怎麼選』的數學理論都是象牙塔廢話」的同事，把這個立場駁倒。要求你的反駁裡必須清楚出現兩步：(a) 指出他從「人實際怎麼選」（描述）跳到「該怎麼選的理論沒用」（規範）時，偷渡了什麼前提；(b) 用一個「人普遍做不到、但該做的事不因此改變」的非決策例子（如算術），讓他看見那個前提站不住。\n\n**題 3（★★，15 分鐘）** 區分程序理性與實質理性。給定情境：你的服務在凌晨被一個你從沒見過的錯誤打掛，你在資訊嚴重不全、且必須 5 分鐘內動作的壓力下，選了一個「夠安全、能立刻止血」的回滾，事後發現它不是「理論上最優」的處置（如果你有完整資訊和無限時間，有個更省事的修法）。問：(a) 用「實質理性」的尺量，你的決定理性嗎？(b) 用「程序理性」的尺量呢？(c) 這兩個答案不同，說明了「理性」這個詞的什麼？\n\n### 推演解答\n\n**題 1 解答。** 以「基率忽視導致誤判 incident」為範例（你可換成自己的真實案例，結構一樣）：\n\n```text\n   失誤：P0 alert 響了，我直接當成真故障，緊急回滾了上一個 deploy，\n        事後發現是監控規則偽陽，回滾本身還引發了二次抖動。\n\n   ① 規範上該怎麼算（本書 ch05 貝氏決策）：\n      收到 alert，正確動作是先算後驗 P(真故障|alert)，\n      把「這條規則歷史真陽率」（基率）乘進去——\n      若這條規則 10 次有 8 次是偽陽，後驗低到不該無腦回滾。\n      規範說：別把 P(alert|故障) 當成 P(故障|alert)（基率忽視）。\n\n   ② 心理上為何會錯（指向《思考的陷阱》，本欄只點到）：\n      凌晨三點、P0 的紅色很生動，「快做點什麼」的壓力壓過\n      「先估個基率」的冷靜——這屬於心理機制（雙系統、生動性\n      壓過抽象基率），不是本書地盤，見《思考的陷阱》談基率與雙系統。\n\n   ③ 制度上怎麼防（指向《如何不騙自己》，設計外部欄杆）：\n      ・告警卡片自動帶上「此規則近 30 天真陽率：20%」\n      ・runbook 第一步硬性要求：「回滾前確認真陽率 > 閾值」\n      ・高風險處置需第二人 ack（外部視角，攔截單人隧道視野）\n      ——不依賴 on-call 凌晨還記得算貝氏。\n```\n\n常見錯路一：把第①欄寫成「我應該更小心」——那不是規範演算法，是空泛的決心。規範欄必須給出**具體的演算法**（先乘基率算後驗），這才是本書教你的東西。常見錯路二：三欄寫成同一件事的三種說法。它們必須是**三個不同層次**：①是「對的演算法」、②是「為何腦跑不出對的演算法」、③是「怎麼用流程繞過腦的限制」。如果你的三欄能互相替換，就是還沒拆乾淨。\n\n**題 2 解答。** 反駁「人不理性所以該怎麼選的理論沒用」：\n\n> (a) **你偷渡了一個前提：「人實際怎麼做」能決定「人該怎麼做」。** 你從「行為經濟學發現人系統性違反期望效用」（這是真的，描述事實），跳到「所以那些規範理論沒用」（這是規範主張），中間需要一座橋：「凡是人普遍會犯的，就不算錯／就不該被要求。」這座橋你沒明說，但你整個論證靠它撐著。而它一攤開就垮。\n>\n> (b) **反例（非決策的）：人類普遍、穩定地心算不出 137 × 256。** 這是個鐵打的描述事實——隨便找一百個人，幾乎沒人能立刻口算對。那麼，這證明「137 × 256 = 35072 這條算術規範是廢話、是象牙塔」嗎？顯然不。它只證明「人腦不是為大數乘法優化的硬體」。算術規範（該等於多少）和人類能力（算不算得出來）是兩回事；後者再普遍，也撼不動前者。\n>\n> 同理：人違反期望效用（描述）撼不動「無限資源下該怎麼選」（規範）。要說期望效用沒用，你得去論證「它的公理本身不值得遵守」——那是一場規範辯論（可以打，Allais 就在打），但**不能靠「人不遵守它」來打贏**。「人做不到」從來不等於「不該做」。\n\n常見錯路：把反駁停在「人也有理性的一面啦」這種和稀泥。那沒擊中要害。要害是那個**從「是」滑到「應」的邏輯斷裂**，以及那個「人普遍做不到 ⇏ 不該做」的非決策反例——用算術（或任何「明顯該做但人做不好」的例子）把斷裂照亮，對方就無路可退。\n\n**題 3 解答。**\n\n```text\n   (a) 用「實質理性」量：嚴格說，不夠理性。\n       實質理性問「結果是不是最優」。你的回滾不是\n       「有完整資訊＋無限時間下的理論最優處置」，\n       所以以這把尺，它落在最優之下。\n\n   (b) 用「程序理性」量：是理性的，甚至是漂亮的。\n       程序理性問「在你真實的約束下，你用的程序對不對」。\n       約束是：資訊嚴重不全、5 分鐘死線、二次故障代價高。\n       在這組約束下，「選一個夠安全、能立刻止血的處置」\n       正是對的程序（這就是 satisficing：設一個\n       『夠安全＋能止血』的門檻，達標就動手，不追求最優）。\n       事後才知道有更省事的修法，不影響當下程序的理性——\n       因為當下你不可能知道（資訊不全是約束、不是你的錯）。\n\n   (c) 兩個答案不同，說明「理性」是個有歧義的詞，至少兩個意思：\n       實質（結果對）與程序（過程對）。把人腦的決策說成\n       「不理性」，常常只是拿實質理性那把尺（隱含無限資源）\n       去量一個在真實約束下程序良好的系統——量出落差就喊\n       「不理性」。但在它真實的成本約束下，它做了對的事。\n```\n\n常見錯路：覺得「(a) 不理性、(b) 理性」是矛盾、一定有一個答錯了。不矛盾——這正是本題的點：**同一個決定，用兩把不同的尺（兩種理性的意思）量，得到兩個都對的答案。** 認得出「我們在用哪把尺」，比爭「到底理不理性」有用得多。這也是整章和解的微縮版：先問「你在問哪個問題」，再談對錯。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 用 design doc 和 postmortem 各自對應「規範」和「描述」，跟另一個工程師解釋為什麼「兩者衝突時」不是「誰錯了」。\n2. 程序理性和實質理性差在哪？用「假設無限資源的演算法理論最優」vs「真實機器約束下跑得好的程式」這個比喻講一遍。\n3. 三層理性（規範·無限資源／規範·有限資源／描述·真實的腦）各回答什麼問題？為什麼說它們「不是三個對手」？第一層到第二層是「修正」、第一層到第三層是「裂縫」——這兩個關係差在哪？\n4. 「人系統性偏離規範」為什麼**不**證明規範錯了？那個壞推論在從「是」到「應」的哪一步斷掉？舉一個非決策的例子（如算術）說明「人做不到 ⇏ 不該做」。\n5. 「人系統性偏離規範」為什麼**不**證明人笨？挑損失趨避或機率權重，講出它在真實約束下解決了什麼問題、為什麼「有結構、可預測方向」配不上「笨」這個字。\n6. 理性三角是哪三本書、各站哪個角度？用「基率忽視」這個失誤，講出三本書各說的那一段（規範該怎麼算／心理為何錯／制度怎麼防），並說明為什麼缺任何一角都不完整。\n7. 「知道了這些規範演算法，就會做出更好的決策」——這句話哪裡不對？為什麼補償必須是制度性、外部、不依賴當下意志力的？\n8. 「規範與描述和解了」會不會就是「怎樣都對、無所謂對錯」的相對主義？為什麼不是？（提示：和解讓對錯**各歸其位**，不是取消對錯。）\n\n## 延伸閱讀\n\n- **Herbert A. Simon, 1955/1956 與其後關於有限理性的著作** — 程序理性 vs 實質理性的區分出自 Simon 對「古典經濟學理性人」的長期批判。想看「理性的兩個意思」的源頭，讀他談 bounded rationality 與 procedural rationality 的文章（如收於其論文集者）。本書取其精神，確切篇章請依其著作集查證。\n- **Stanford Encyclopedia of Philosophy,「Bounded Rationality」與「Decision Theory」條目** — 把「規範 vs 描述」「程序 vs 實質」這幾組區分講得很清楚、有哲學深度又不掉書袋。讀「normative vs descriptive」那段，正是本章中央張力的學術版。（landscape 交叉核對過的權威來源）\n- **Daniel Kahneman,《Thinking, Fast and Slow》（中譯《快思慢想》）的結語部分** — 康納曼本人對「知道了偏誤也未必能改、所以要靠外部與制度補償」這個謙遜收束的第一手陳述。讀最後幾章談「兩個自我」與如何用外部視角補償；本章「靠 runbook 不靠記憶力」的精神出處之一。\n- **《思考的陷阱》談雙系統與捷思** — 理性三角的「心理機制」角。本章只講偏離的數學描述與規範後果，人**為什麼**會偏離、**為什麼察覺不到**，屬於心理機制，見那本書。本章是理性三角招牌連結的總收束點。\n- **《如何不騙自己》談制度防線與貝氏確證** — 理性三角的「制度防線」角。怎麼設計同儕審查、預先註冊、可重現性等流程，讓「不自欺」不依賴個人意志力，見那本書；它與本書的貝氏決策在「信念更新」這件事上互指。\n- **《馴服隨機》談機率的詮釋** — 本章三層裡的「機率」（後驗、基率）怎麼算，機制在那本書。本章只用結果，把機率機制指向它。\n"}, {"id": "ch18-five-algorithms-one-decision", "file": "ch18-five-algorithms-one-decision.md", "group": "Part V — 收束", "title": "ch18 — 同一個決策，五種演算法重看：收官", "md": "# ch18 — 同一個決策，五種演算法重看：收官\n\n> **本章解決什麼問題**：你已經走完十七章。從 ch01 立起那個賭注與那次檢查，到這裡，全書其實只做了一件事——拿**同一個帶不確定性的決策**，用一套又一套工具重算。本章是總對帳：把那五種「眼睛」並排，看它們各對那個賭注說了什麼、各自看見了什麼別人看不見的東西。這章不引入任何新機制，它是收束。讀完你要能對另一個工程師講清楚：同一個下注的決定，規範說 X、人實際做 Y、為什麼這不是矛盾而是兩套都對的數學在描述兩件不同的事。你在 Part V 的終點，也是全書的終點。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）          ◄ 你在這裡（終點）\n```\n\n這是地圖最後一次出場。注意左邊那根脊椎——它從 ch01 一路穿下來，每進一個 Part 就被一套新工具重算一次。本章把這些重算結果攤在同一張桌上對帳。\n\n## 從你已知的出發\n\n你做過 postmortem。一場事故結束、止血了、服務回來了，然後你坐下來寫那份文件。\n\n好的 postmortem 有一個你大概沒明說但一直在用的結構：它不是只記「發生了什麼」，它從**好幾個視角**看同一件事。時間線視角（這幾個小時逐分鐘發生了什麼）、根因視角（最底層那個 bug 是什麼）、偵測視角（為什麼我們花了四十分鐘才發現）、止血視角（我們做的哪個動作真的有效、哪個只是巧合）、流程視角（這個流程哪裡該補一道閘）。\n\n這五個視角看的是**同一場事故**。它們不互相競爭——你不會問「時間線視角和根因視角哪個是對的」，那是個笨問題。它們是五副不同的眼鏡，每副讓你看見別副看不見的東西，合起來你才真正懂那場事故。一份只有時間線、沒有流程視角的 postmortem，是漏掉了一半；一份只罵根因、不看偵測延遲的，下次還會被同一類問題打。\n\n這一章就是全書那個賭注的 postmortem。同一個下注的決定——擲一枚公正硬幣，正面贏 NT$200、反面輸 NT$100——我們有五副眼鏡：期望值、期望效用、貝氏期望效用、展望理論、有限理性。你已經一副一副戴過了。本章把它們並排，看每副各看見什麼。而且——這是最關鍵的——我要你別問「哪副是對的」。那跟「時間線和根因哪個對」一樣，是個笨問題。\n\n不過這裡有一個 postmortem 那個比喻不完全對的地方，正好是全書的核心。事故的五個視角都在描述**同一個層次**的事實（都在說「實際發生了什麼」）。而這五副決策的眼鏡，分屬**兩個不同的層次**：前面幾副有的在說「你**該**怎麼選」（規範），有的在說「人**實際**怎麼選」（描述）。它們看見不同答案——不是因為其中一副算錯了，而是因為它們在回答**兩個不同的問題**。這道分層，就是全書追了十七章的那道裂縫。最後一章，我們把它對帳到底。\n\n## 五副眼鏡，先各自報到\n\n開始對帳前，先讓五副眼鏡各自講一句它是誰、看的是什麼層次的問題。這不是複習定義——是定位它們各自站在「規範 vs 描述」的哪一邊。\n\n```text\n五副眼鏡的身份證\n\n  ①  期望值（EV）           規範·最粗   長期平均報酬。問「可重複下無限次，平均賺賠多少」。\n                                       對單次、尾部巨大的決策會騙你（聖彼得堡）。\n\n  ②  期望效用（EU）         規範·完整   把金額換成效用 u(x)，凹效用＝風險趨避。\n                                       幾條 vNM 公理逼出的唯一演算法。問「該怎麼選」。\n\n  ③  貝氏期望效用          規範·帶證據  後驗信念 × 效用矩陣 → 最適行動。\n                                       ②的延伸：不確定可更新，再接效用算行動。\n\n  ④  展望理論（PT）         描述         人實際怎麼算：參考點、損失趨避、機率權重、框架。\n                                       問「人怎麼選」，不問「該怎麼選」。\n\n  ⑤  有限理性（satisficing）跨層·元      不對 L 算一個同型的數。問「這個決定值不值得算到底」。\n                                       設一條夠好門檻、達標就停。是「算到哪停」，不是「算什麼」。\n```\n\n最後一列你要特別留心。①到④都對那個賭注**算出一個可比的東西**——一個數字（接還是拒），或一個行動（治療還是不治療）。⑤不一樣。satisficing 不會給你「賭注 L 的 satisficing 值是多少」這種東西，因為它根本不是那個層次的問題。ch13 已經把這件事講透了：satisficing 退後一步，問的是「**這個 L 的決定，值不值得我一路算到展望理論這麼細**」。前四副是「算什麼」，第五副是「算到哪裡停」。把⑤當成第五個跟前四競爭的答案，是這一章最容易犯、後面「直覺的陷阱」會專門拆的誤讀。\n\n好，五副眼鏡都報到了。戴上去，看那個賭注。\n\n## 對帳：賭注線，四副眼鏡各算一次\n\n先把那個賭注用全書統一的彩券記法寫出來，這是 ch01 立起、後面每一章都回來碰過的脊椎：\n\n```text\n脊椎賭注  L =（+200, 0.5; −100, 0.5）    單位 NT$\n```\n\n下面是全書的核心對帳。每一格的數字我都在寫這章時重算過一遍（不抄記憶），算式攤開、不跳步。\n\n### ① 期望值（ch02）：+50，接\n\n```text\nE[L] = Σ pᵢ·xᵢ\n     = 0.5·(+200) + 0.5·(−100)\n     = 100 − 50\n     = +50                      ← 正的 ⇒ 期望值眼鏡說「接」\n```\n\n期望值眼鏡看見的是：如果你能把這個賭重複下無限次，平均每次淨賺 NT$50。在**可重複**的世界裡這是對的、有用的（大數法則讓平均收斂，機制見《馴服隨機》ch08／ch13）。但 ch02 那道種子裂縫就在這裡——多數人面對這個 +50 的賭，**拒絕**。期望值眼鏡解釋不了這個拒絕，它甚至會說拒絕的人「算錯了」。它沒算錯。是這副眼鏡看不到下一副眼鏡看得到的東西。\n\n### ② 期望效用（ch03）：8.66 < 10，拒\n\n把金額換成效用。全書統一的凹效用是 u(x)=√(x+100)，財富基準 W=100。\n\n```text\nu(不賭)  = √(0+100)             = √100  = 10\nEU(L)    = 0.5·u(+200) + 0.5·u(−100)\n         = 0.5·√(200+100) + 0.5·√(−100+100)\n         = 0.5·√300 + 0.5·√0\n         = 0.5·17.3205 + 0\n         = 8.6603               ← 8.66 < 10 ⇒ 期望效用眼鏡說「拒」\n\n確定等值  u(CE) = 8.6603  ⇒  CE = 8.6603² − 100 = 75.0 − 100 = −25.0\n風險溢酬  = E[L] − CE = 50 − (−25) = 75\n```\n\n期望效用眼鏡看見了第一副看不見的：那 NT$100 的潛在損失，砍進的是效用曲線**陡的那一段**（因為 u 是凹的、邊際遞減），而那 NT$200 的潛在收益，落在效用曲線**平的那一段**。同樣的機率，賠掉比賺到更傷。於是 EU=8.66 < u(不賭)=10，拒絕。\n\n這裡是全書第一個「規範之美」的高潮，值得你停一下重講一遍：**拒絕一個正期望值的賭，在凹效用下不是膽小、不是不理性——它正是理性**（守住 ch03 的 T4）。而且這個「該拒」不是我隨口規定的，它是 vNM 四公理（完備、遞移、連續、獨立）逼出來的唯一演算法。你只要不想被人用一串交換牽著鼻子無限抽水（money pump），你的選擇就**必須**等價於在最大化某個期望效用。規範眼鏡的力量在這裡：它不是建議，是幾條你不會反對的公理逼出的強制。\n\n確定等值 CE=−25 是另一個有用的讀數：這個賭對你（在這條效用下）的價值，等同於「確定拿到 −25」——你寧可確定賠 25 也不要玩這個期望值 +50 的賭。中間那 75 的差距（風險溢酬）就是你為了**避開不確定**願意付的價。\n\n### ③ 貝氏期望效用（ch05）：換到檢查線，最適行動是「不治療」\n\n賭注線到這裡已經被兩副規範眼鏡看過了。但脊椎有**兩條線**——還有那次檢查。第三副眼鏡是②的延伸：當不確定可以靠證據更新時，先算後驗、再接效用矩陣。這條線我們搬到檢查上算，因為它正是為「信念可更新」設計的。\n\n脊椎檢查：盛行率 1%、敏感度 99%、偽陽率 5%。先算「驗出陽性後，到底多可能真有病」。\n\n```text\n後驗（貝氏公式）\n  P(病|陽性) = P(陽|病)·P(病) / [P(陽|病)·P(病) + P(陽|健)·P(健)]\n            = (0.99·0.01) / (0.99·0.01 + 0.05·0.99)\n            = 0.0099 / (0.0099 + 0.0495)\n            = 0.0099 / 0.0594\n            = 0.16667 ≈ 16.7%\n\n自然頻率交叉驗算（1 萬人）\n  100 人有病  → 99 人真陽\n  9900 人健康 → 495 人偽陽\n  陽性共 594 人，其中真病 99 人 → 99/594 = 16.67%   ✅ 兩法一致\n```\n\n（這個盛行率 1%／後驗 16.7% 是本書刻意選的；機率機制與另一組基率見《馴服隨機》ch05，那裡用盛行率 0.1%、後驗 1.94%，差別是讓本書的後驗落在「值得拿來做決策」的區間。貝氏定理本身怎麼推，指向該書、本書不重推。）\n\n注意 16.7% 這個數字本身就反直覺：檢查敏感度 99%，但驗出陽性後真有病的機率只有六分之一。這是基率忽視的反面——你的後端直覺其實懂這個：alert 命中規則很準，但真故障的基率低，所以收到 alert 時真有事的機率可能低得驚人（見 ch05 的 alert fatigue 橋接）。\n\n但貝氏眼鏡的關鍵不只是後驗。決策＝**後驗 × 效用**。光看 16.7% 不能決定要不要治療——還要看「漏掉一個病人」跟「白治一個健康人」各有多痛。接上全書統一的效用矩陣：\n\n```text\n效用矩陣          狀態=病          狀態=健康\n  治療            −10              −20\n  不治療          −100              0\n\nEU(治療|陽性)   = 0.1667·(−10) + 0.8333·(−20) = −1.667 − 16.667 = −18.33\nEU(不治療|陽性) = 0.1667·(−100) + 0.8333·0     = −16.67\n\n最適行動  a* = argmax{ −18.33 , −16.67 } = 不治療   ← −16.67 > −18.33\n```\n\n貝氏眼鏡看見了：在**這組**效用與這個後驗下，居然是「不治療」期望效用較高。為什麼？因為 16.7% 還不夠高到讓「漏掉病人的 −100」壓過「白治健康人的 −20 在 83.3% 上反覆累積」。這不是說「別治病」——它說的是「在這個後驗、這個損失矩陣下，最適行動恰好是不治療」。把 u(不治療,病) 從 −100 改成 −500（漏掉的代價更高），最適行動立刻翻成治療（ch05 的紙上推演算過）。\n\n這一格的驚嘆點，是它把「決策＝後驗×效用」這件事釘死：**漏看任一邊都會做錯決定**。只看後驗（16.7% 不高，不治療吧）可能對也可能錯，要看效用矩陣才知道；只看效用（漏病很慘，治療吧）忽略了後驗，也可能浪費。第三副眼鏡的貢獻，是把「信念」與「代價」這兩件事**強制乘在一起**。\n\n### ④ 展望理論（ch08／ch09）：−11.8 < 0，拒（但機制不同，且框架可翻）\n\n回到賭注線。前三副是規範眼鏡（你該怎麼選）。第四副換層次了——展望理論問的是「人**實際**怎麼算」。它不用「最終財富的效用 u(x+100)」記帳，它用「相對參考點的得失 v(x)」記帳。參考點＝現狀 0：+200 是得、−100 是失。\n\n價值函數（Tversky–Kahneman 1992 形式）：v(x)=x^α（x≥0）、v(x)=−λ·(−x)^β（x<0）。用 TK1992 的中位參數 α=β=0.88、λ=2.25，先把機率權重簡化成 w(p)=p（待會點出加上它的方向）：\n\n```text\nv(+200) = 200^0.88 = exp(0.88·ln200) = exp(0.88·5.2983) = exp(4.6625) ≈ 105.9\nv(−100) = −λ·100^0.88 = −2.25·exp(0.88·ln100) = −2.25·exp(4.0526) = −2.25·57.5 ≈ −129.5\n\nPT 值 ≈ 0.5·(+105.9) + 0.5·(−129.5) = 52.95 − 64.75 = −11.8  < 0   ⇒ 拒\n```\n\n⚠️ **這些參數務必 hedge（2026-06）**：α=β=0.88、λ=2.25 是 TK1992 的一組常被引用的中位估計，**不是物理常數**。近期 meta-analysis（Brown 等，2024）以隨機效應給出 λ≈1.31，並指 2.25「可能偏高」；依領域範圍約 1.8–2.7（見 landscape T6）。損失趨避**現象本身**跨文化、跨領域穩健，但**具體係數值變異很大**。這不是小事——它足以翻轉這格的結論，下面立刻示範。\n\n第四副眼鏡看見的，跟第二副（期望效用）**結論一樣（拒），機制卻完全不同**。期望效用說「拒，因為邊際遞減（凹效用）」；展望理論說「拒，因為**損失本身被放大**（|v(−100)|=129.5 > v(+200)=105.9，即使機率相等）」。這是兩條不同的數學路徑通到同一個「拒」。\n\n而且展望眼鏡看得到前三副完全看不到的兩件事：\n\n**第一，結論對參數敏感到危險。** 把 λ 換成 meta-analysis 的 1.31 重算：\n\n```text\nv(−100) = −1.31·57.5 ≈ −75.3\nPT 值 ≈ 0.5·105.9 + 0.5·(−75.3) = 52.95 − 37.65 = +15.3  > 0   ⇒ 變成「接」\n```\n\n同一個賭、同一套展望理論、只換一個參數，結論從「拒」翻成「接」。這正是為什麼 landscape 把這條標成全書最該 hedge 的一項——**規範眼鏡（期望效用）給的「拒」是公理逼出的、穩；描述眼鏡（展望理論）給的「拒」依賴一個有再現性爭議的經驗參數、不穩。** 兩個「拒」看起來一樣，地基的硬度天差地別。寫到這裡我認為這是整張對帳表最容易被忽略、卻最重要的一頁：別把描述模型的數字當規範結論的硬度來用。\n\n**第二，框架一翻，答案可翻。** 加上機率權重 w(p)（小機率被高估、中大機率被低估，倒 S 型）只是讓 p=0.5 附近的權重略微偏移、方向上不改變這個賭的結論。但**框架**會。同一個賭，問成「你願不願意冒險博取 +200」（得框架，多數人傾向風險趨避、拒），跟問成「你要不要保住現狀、避免可能的 −100」（失框架，多數人傾向風險愛好），可以得出相反選擇（ch10 的反射效應）。規範眼鏡（②③）對措辭**免疫**——邏輯等價的問法該給同一個答案（描述不變性）。描述眼鏡（④）對措辭**敏感**——而且它精確預測往哪個方向翻。這既是規範失效的鐵證、也是描述的勝利。\n\n### ⑤ 有限理性（ch13）：不算數，問「值不值得算到底」\n\n前四副都對那個賭注交了一個可比的東西：+50（接）／8.66<10（拒）／檢查線最適行動（不治療）／−11.8<0（拒）。第五副不交。\n\nsatisficing 退後一步，看著前面這四欄密密麻麻的算式，問一個**元層次**的問題：\n\n```text\n前四副在回答：「這個 L，該怎麼算、算出來是接還是拒？」\nsatisficing 在回答：「這個 L 的決定，值不值得我一路算到展望理論這麼細？」\n```\n\n對那個賭注，多數人連期望值都沒掏出來算就拒絕了。satisficing 說這**未必不理性**：如果「再多算三套理論」能省下、能改變的東西，比不上「算它們的力氣」，那麼「達到夠好的把握就停手」本身就是元層次上的最優（守住 ch13 的 T10——satisficing 不是偷懶，把搜尋成本算進去後它可能就是最佳化）。\n\n所以 satisficing 在對帳表上是**獨立的一列、標成「定性／不同類」**，格子裡不放數字。它不是第五個跟前四競爭的答案——它是「算到哪裡停」的判斷，不是「算什麼」的結果。前四副是「該往桌上擺哪些算式」，第五副是「這桌算式什麼時候該收掉、去做別的事」。把它當第五個競爭答案，等於問「剪刀的兩片刀刃哪片是對的」——它們不在比同一件事。\n\n## 全書的對帳總表\n\n把上面五格收進一張表。這是全書十七章的總帳，每一格標出處章節，每一個數字都重算複核過。\n\n```text\n脊椎決策的五副眼鏡\n（賭注 L=（+200,0.5;−100,0.5）；檢查＝盛行率 1%／後驗 16.7%）\n每格＝層次 ／ 算出什麼 ／ 結論 ／ 出處 ／ 看見了別人沒看到的\n\n  ① 期望值\n       規範·粗   E[L] = +50                              接   ch02\n       看見：長期平均（可重複時對）；看不到單次與凹效用\n\n  ② 期望效用\n       規範·完整 EU = 8.66 < 10（CE=−25、溢酬=75）       拒   ch03\n       看見：凹效用＝風險趨避是理性；公理逼出的唯一演算法\n\n  ③ 貝氏期望效用（換到檢查線）\n       規範·帶證據 後驗 16.7% × 效用矩陣              不治療  ch05/07\n                  EU(不治)=−16.67 > EU(治)=−18.33   （此矩陣下）\n       看見：決策＝後驗×效用；漏看任一邊都做錯\n\n  ④ 展望理論\n       描述      PT ≈ −11.8 < 0                          拒   ch08/09/10\n                 ⚠ λ=2.25→拒；λ=1.31→+15.3→接      （框架可翻）\n       看見：損失被放大（不是邊際遞減）；框架與參數都能翻結論\n\n  ⑤ 有限理性 satisficing\n       跨層·元   ── 不算同型的數 ──                  定性門檻\n                 「值不值得算到底」                  夠好就停  ch13\n       看見：「算到哪停」不是「算什麼」；把思考成本寫進理性\n\n  讀法：①②④都對「同一個賭」說話，卻給不同結論——因為①是規範·粗、\n        ②是規範·完整、④是描述（換了問題）。③換到檢查線（信念可更新\n        時的規範眼鏡）。⑤站在另一層，問前四副這桌算式該不該擺到底。\n```\n\n這張表是全書的縮影。我要你盯著它看出一件事：**②（規範說拒）和④（描述也說拒）結論撞在一起，純屬巧合。** 它們的「拒」來自完全不同的機制，而且④的「拒」一換參數就翻。別被「結論一樣」騙了去以為「規範和描述是一回事」。它們是兩套各自自洽的數學，在這個特定的賭注上恰好同向——換個賭注（譬如 Allais 那兩題），它們會公開對撞，而那正是 ch11 的全部戲份。\n\n## 六條主線，逐條回收\n\n全書開宗明義立了六條驗收主線（ch01）。對帳表攤完，現在逐條收回——你能不能對每一條說出「它是什麼、在表上哪裡」：\n\n```text\n① 理性的最小公設\n   期望效用不是憑空規定，是 vNM 四公理（完備/遞移/連續/獨立）逼出的唯一演算法。\n   違反公理 ⇒ 可被 money pump 穩抽。 → 表②，地基在 ch03。\n\n② 效用不是金額\n   為什麼正期望值的賭可以理性地拒（聖彼得堡的種子、凹效用＝風險趨避）。\n   → 表①→②的轉折，ch02／ch03。E[L]=+50 卻 EU=8.66<10。\n\n③ 風險不是不確定\n   機率可測的「風險」(50/50 已知) vs 測不出的「模糊」(不知硬幣偏不偏)。\n   Ellsberg 三色甕：模糊趨避是拒絕一條公理、不是算錯。 → ch04（本書這格用檢查/賭注沒展開，\n   是規範地基的第三塊磚）。\n\n④ 信念可更新、資訊可標價\n   貝氏把「先驗＋證據→行動」算成管線（表③）；資訊的價值＝它能改變多少\n   決策的期望報酬——不改變決策的資訊，價值精確等於零。 → ch05/ch06/ch07。\n\n⑤ 描述 vs 規範的裂縫\n   展望理論（表④）不是「人很笨」的證明，是「人實際怎麼選」的精確模型。\n   每一支柱對應一條被掀翻的規範公理。 → ch08–ch12。\n\n⑥ 有限理性與務實收束\n   把最佳化放回成本有限的腦：satisficing（表⑤）。理性的盡頭不是放棄，\n   是知道在哪一格該停。 → ch13。\n```\n\n第④條那句「不改變決策的資訊，價值精確等於零」（ch07）值得在收官這裡再敲一次，因為它是全書最乾淨的洞見之一，而且你天天違反它。回到檢查線：在後驗 16.7%、最適行動「不治療」的狀態下，要不要花錢做**第二次**獨立檢查？算它——如果無論第二次驗出陽還是陰，最適行動都還是「不治療」，那這次檢查的決策價值**精確等於零**（EVSI=0），你做它只是在買心安。你那個「無論結果如何都會上線、卻還是再跑一輪的壓測」，就是這個零。資訊有趣 ≠ 資訊有價值——價值的定義是「能不能讓你換一個更好的行動」。\n\n## 中央張力的最終一句話\n\n全書反覆叩問同一句話：**規範理性（你該怎麼選）與描述現實（人實際怎麼選）之間，那道穩定的裂縫。** 走到這裡，可以給它一個收束的答案了。ch17 已經做了哲學收束，這裡用對帳表把它釘成一句能被工程師轉述的話：\n\n那道裂縫**不是 bug，是兩套都對的數學在描述兩件不同的事。**\n\n表②（期望效用）回答「該怎麼選」——它是規範，地基是公理，它的「拒」硬。表④（展望理論）回答「人怎麼選」——它是描述，地基是實驗數據，它的「拒」依賴一個會變的參數。當人系統性地偏離規範（Allais 兩題、框架翻轉、損失趨避），這**既不證明規範錯**（公理還是公理，違反它還是會被 money pump），**也不證明人笨**（偏離有結構、可預測方向、可建模——這正是它了不起的地方，守住 T8）。它只證明了一件樸素的事：**「人該怎麼選」和「人實際怎麼選」是兩個不同的問題，各有各的、各自漂亮的數學。**\n\n把這句話翻成你的母語：規範＝你 design doc 裡寫的「我們應該這樣權衡」；描述＝code review 真實發生時人**實際**怎麼拍板。兩者有穩定的落差。好的工程流程不假裝這落差不存在，也不罵人「怎麼不照 design doc」——它**設計來補這道落差**（就像 checklist 補人腦的捷思、runbook 補你凌晨三點的記憶力）。承認描述性限制、用規範性流程去補，這是全書留給你最實用的一件事。\n\n## 三個招牌跨書連結的去向\n\n本書是「推理六書」家族的一員，它**不負責**回答的問題，這裡明寫交給誰，免得你以為本書漏了：\n\n```text\n全書四度撞到別人的地盤，明寫交棒：\n\n  決策 ──→ 賽局     一旦「另一個理性主體會對你的選擇反應」，單人決策不夠了。\n                    脊椎賭注若對面是會調賠率的莊家而非公正硬幣，就溢出成賽局。\n                    把會反應的對手當固定機率＝系統性低估對手（T13）。\n                    納許均衡、混合策略、機制設計 → 見《賽局》談策略互動（ch16 交棒）。\n\n  決策 ──→ 偏誤     展望理論的「數學描述」本書已收（表④）；但「人為何這樣算、\n                    雙系統怎麼運作、為何察覺不到」的**心理機制** → 見《思考的陷阱》\n                    談雙系統與捷思（ch12 交棒）。本書講偏離長什麼樣，不講偏離為何發生。\n\n  決策 ──→ 科學方法 貝氏決策（表③）的「信念→行動」本書收了；但「制度怎麼防自欺、\n                    證據如何更新對假說的信念」 → 見《如何不騙自己》談貝氏確證。\n\n  ── 機率機制       期望值、條件機率、貝氏定理怎麼推 → 見《馴服隨機》ch05/ch08。\n     凹凸與邊際遞減的微分直覺 → 見《馴服無限》談導數與凹凸。\n```\n\n這就是所謂「理性三角」：**決策＝規範基準（該怎樣）、偏誤＝心理機制（怎麼錯）、科學方法＝制度防線（怎麼防）。** 三本各在交界互指，合起來才是一個人面對不確定的完整圖像。本書只是其中一角——但它是那個立**規範基準**的角，沒有它，另外兩本的「錯」與「防」就沒有對照的尺。\n\n## 直覺的陷阱\n\n收官這章的陷阱，是針對「讀完全書」這個狀態本身的——你現在最可能犯的兩個錯。\n\n| 陷阱 | 錯誤直覺帶你下溝的那一步 | 怎麼自我察覺 | 正確版 |\n|---|---|---|---|\n| **「五種演算法＝五個答案，要挑一個」** | 看到表上 +50（接）／8.66<10（拒）／−11.8<0（拒）給出不同結論，本能想問「那到底哪個對」、想選一個當「正解」 | 你發現自己在問「決策理論的標準答案是接還是拒」——這個問題本身就錯了。就像問「時間線視角和根因視角哪個是 postmortem 的正解」 | 五副眼鏡看**同一件事的不同面向**。①看長期平均、②看公理逼出的規範、④看人實際怎麼算。它們答案不同因為**問題不同**，不是因為其中一個算錯 |\n| **「學了這些就會做更好的決策」** | 以為「懂了展望理論、懂了損失趨避」＝以後就不會被它影響了；把規範知識當成描述性偏向的解藥 | 你下次照樣對 regression 的恐懼壓過對新功能的渴望、照樣被失框架推著賭——**知道病名不等於免疫**。如果你以為讀完就免疫了，那正是沒讀懂 | 規範知識**不自動修正**描述性偏向（呼應 ch17）。專家一樣會框架翻轉、一樣有確定性效應。要補它得靠**流程**（checklist、預先承諾、外部視角），不是靠「我知道了所以我不會」 |\n\n第二個陷阱我想多說一句，因為它是全書最反諷的地方。你花了十八章學「人怎麼系統性偏離規範」。學完之後最危險的念頭是：「好，現在**我**不會了。」——這念頭本身就是一種偏誤（高估自己的免疫力）。展望理論的參數在**你**身上一樣跑。康納曼自己——拿了諾貝爾、寫了一輩子這個的人——公開說過他研究了一輩子這些偏誤，自己照樣會掉進去（這是他常被引用的自述，我把它當態度而非逐字引文）。正確的收穫不是「我免疫了」，是「我知道我會偏向哪、所以我替自己設了流程去補」。runbook 不是因為你笨，是因為你知道凌晨三點的你記性不可靠。去偏流程同理。\n\n## 紙上推演\n\n收官的推演不再算新數字，而是測你能不能把全書**講出來**、**串起來**。\n\n---\n\n**題 1（★★，[15 分鐘]）—— 五分鐘電梯版**\n\n想像你和一個沒讀過這本書的資深工程師同搭電梯。用**五分鐘、不寫任何公式**，對他講清楚：同一個下注的決定（公正硬幣，正面贏 200、反面輸 100），為什麼「規範說該拒、人實際也拒、但兩個拒不是同一回事」，而且這不是矛盾。先自己講一遍（出聲或寫下逐字稿），再看解答對照。\n\n### 推演解答\n\n一個能過關的講法大致是這樣（你的用詞可以不同，但這幾個轉折必須在）：\n\n> 「有個賭，丟公正硬幣，正面給你 200、反面你賠 100。平均算下來每次賺 50，所以『期望值』說你該接。但多數人會拒——包括你。\n>\n> 這裡有兩個**不同**的理由解釋這個拒，這是重點。\n>\n> 第一個是**規範**的（你該怎麼選）：賠掉 100 對你的『痛』，比賺到 200 的『爽』更大——不是因為金額，是因為錢的價值邊際遞減（第一個一萬塊比第一百個一萬塊重要）。把這個算進去，拒絕這個賭其實是**理性**的。這套理論還是從幾條你不會反對的公理逼出來的，硬。\n>\n> 第二個是**描述**的（人實際怎麼算）：人腦不是算最終財富，是算『相對現狀的得失』，而且**賠錢的權重天生被放大**（差不多兩倍多，但這個數字學界還在吵，別當常數）。所以也得出拒。\n>\n> 兩個『拒』看起來一樣，其實一個在說『你**該**這樣』、一個在說『人**就是**這樣』。它們不是同一個答案重複兩次，是兩套各自漂亮的數學在回答**兩個不同的問題**。這就是為什麼明明結論一樣，我還要分開講——因為換個賭它們會吵起來。」\n\n**常見錯路**：(1) 只講一個理由（通常只講損失趨避），漏掉「規範 vs 描述是兩層」——那等於沒講出全書的點。(2) 把第二個理由講成「人很笨所以算錯」——錯，描述模型不是在說人笨，是在精確刻畫人怎麼算（守住 T7/T8）。(3) 把 λ≈2.25 講成定論——要 hedge。能把「兩個拒不同源、且不矛盾」這層講出來，才算過。\n\n---\n\n**題 2（★，[10 分鐘]）—— 改觀三點**\n\n不准翻書。憑記憶寫下：讀完這本書，你對「理性」這個詞的理解，改變了哪**三點**？每點一句話。寫完再看解答的參考清單對照（你的三點不必跟它一樣，但檢查你的有沒有踩到這幾個層次）。\n\n### 推演解答\n\n一份夠格的清單會碰到下面這些（任三點且言之成理即可）：\n\n```text\n參考清單（你的三點對到其中三個層次即算過）\n\n  · 風險趨避不是膽小：凹效用下拒絕正期望值的賭是理性的（不是性格缺陷）。\n  · 期望值不是該付的價：聖彼得堡——期望值無限不代表該無限下注。\n  · 風險 ≠ 不確定：能測機率的「風險」和測不出的「模糊」是兩件事，\n    對模糊額外保守也是理性人會犯的（不是算錯）。\n  · 不改變決策的資訊，價值精確等於零：再多資訊若不換行動就是零價值。\n  · 「人偏離規範」既不證明規範錯、也不證明人笨：兩套都對的數學、兩個問題。\n  · 理性的盡頭不是算到底，是知道在哪格該停（satisficing）。\n  · 規範知識不自動修正偏向：要靠流程補，不是靠「我知道了」。\n```\n\n**常見錯路**：把三點全寫成「我學到了某某理論的公式」——那是「學到什麼內容」不是「對理性改觀」。改觀指的是**對『理性是什麼』這個詞的理解**變了，而不是多背了幾條定義。如果你的三點抽掉具體理論名字後就什麼都不剩，再想一遍。\n\n---\n\n**題 3（★★，[20 分鐘]）—— 把你最近一個真實決策過五副眼鏡**\n\n挑一個你最近做過的、帶不確定性的真實技術決策（要不要 rollback、要不要先 canary 再全面上線、選哪個資料庫、要不要再跑一輪壓測）。把它**逐副眼鏡**過一遍：① 期望值眼鏡會怎麼算？② 期望效用眼鏡（你的隱含效用是凹的嗎，哪個損失砍在陡的那段）？③ 如果有可更新的證據（canary 結果、壓測數據），貝氏眼鏡的後驗×代價是什麼？④ 描述眼鏡：你當時**實際**是被什麼推著決定的（參考點？對 regression 的損失趨避？某人措辭的框架）？⑤ satisficing：你那時其實算到哪就停了，那個停手點合理嗎？\n\n### 推演解答\n\n沒有標準答案——這題的價值在「過一遍」本身。但一份做對了的答案會有這幾個特徵，拿來自檢：\n\n```text\n做對了的徵兆\n\n  · ① 和 ② 你能說出差別：期望值眼鏡可能說「接」（平均划算），\n     但你的效用是凹的（一次線上事故的痛 >> 省下的時間的爽），所以 ② 說「別賭」。\n     如果你的①②結論不同，你抓到了全書的核心張力在你自己決策裡的版本。\n  · ③ 你能指出「我當時其實有可更新的證據卻沒好好用」，或「canary 就是我的後驗更新」。\n  · ④ 最有價值：你誠實寫出「我**規範上**算出該 X，但我**實際**做了 Y，因為……」\n     ——那個「因為」往往是參考點、損失趨避、或某人的框架。\n  · ⑤ 你能說出「我算到 ___ 就停了」，並判斷那個停手點是合理的 satisficing\n     還是偷懶（把搜尋成本誠實算進去，它划算嗎）。\n```\n\n**常見錯路**：(1) 五副眼鏡全給同一個答案——多半是你沒真的切換層次，把規範和描述混成一團了。好的決策案例裡，①②④至少有兩副會給出**不同**的讀數（這正是有東西可學的訊號）。(2) 第④副跳過或美化——「我當時很理性地考量了所有因素」幾乎一定是事後合理化。誠實的④會讓你有點不舒服，那才對。\n\n---\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 為什麼表上①（期望值，接）和②（期望效用，拒）對同一個賭給出相反結論？哪一個「算錯了」？（提示：都沒錯，它們在算不同的東西。）\n2. 表②（期望效用，拒）和④（展望理論，拒）結論一樣——為什麼我說「別被這個一樣騙了」？兩個「拒」的機制差在哪、地基的硬度差在哪？\n3. 在檢查線（後驗 16.7%）上，為什麼光知道「16.7%」還不能決定要不要治療？貝氏眼鏡逼你乘上的另一半是什麼？\n4. 把展望理論的 λ 從 2.25 換成 1.31，那個賭的結論翻了。這件事告訴你「規範結論的硬度」和「描述結論的硬度」差在哪？\n5. 為什麼 satisficing 在對帳表上不放數字、被標成「定性／不同類」？它回答的問題跟前四副差在哪一個層次？\n6. 「人系統性偏離規範」既不證明規範錯、也不證明人笨——用你自己的話講，那它證明了什麼？\n7. 「不改變決策的資訊，價值精確等於零」——舉一個你工作中為了心安而蒐集、其實零決策價值的例子，並說明它為何是零。\n8. 讀完全書你最該警惕的那個念頭是什麼？（提示：跟「我現在免疫了」有關。）為什麼那個念頭本身就是個偏誤？\n\n## 延伸閱讀\n\n- **Kahneman, *Thinking, Fast and Slow*（2011）** — 康納曼把展望理論、雙系統、各種偏誤寫給一般讀者的集大成之作。本書收的是「偏離的數學描述」；想看「偏離的心理機制與作者本人的反省」（包括他承認自己研究一輩子照樣中招），讀這本，尤其談 prospect theory 與 framing 的章節。心理機制的深入則指向《思考的陷阱》。\n- **von Neumann & Morgenstern, *Theory of Games and Economic Behavior*（1944；公理化在 1947 二版附錄）** — 規範那一側的原典。期望效用公理的形式內容在 1947 二版的附錄 \"The Axiomatic Treatment of Utility\"（常被誤記成 1944，見 ch03）。不必通讀，看附錄感受「幾條公理逼出唯一演算法」的規範之美。\n- **Brown, Imai, Vieider & Camerer 等，損失趨避 meta-analysis（*Journal of Economic Psychology*，2024）** — 對 λ≈2.25 的再現性檢驗，隨機效應給 λ≈1.31（CI 約 1.10–1.53），指 TK1992 的 2.25 可能偏高。讀它來校準你對「展望參數不是常數」的直覺（2026-06；這是全書最該定期回頭看是否更新的一條）。\n- **Stanford Encyclopedia of Philosophy, \"Decision Theory\" 與 \"The St. Petersburg Paradox\"** — 規範決策理論與聖彼得堡的權威概念地圖。想把全書的規範地基（期望效用、公理、聖彼得堡是效用問題不是算術錯）放進更大的哲學脈絡，從這兩條目入手。\n- **本書內部回看** — 想重溫某一格：規範地基回 ch03（vNM 公理、凹＝風險趨避）；裂縫的描述模型回 ch08–ch12（四支柱與被掀翻的公理對照表在 ch12）；有限理性回 ch13（satisficing 為何是元層次最佳化）；哲學收束回 ch17（理性三角、規範與描述的和解）。這張對帳表是它們的總帳，不是替代品。\n"}, {"id": "appendix-a-notation", "file": "appendix-a-notation.md", "group": "附錄", "title": "附錄 A — 記號與公式速查", "md": "# 附錄 A — 記號與公式速查\n\n> 這是一張**速查表**，不是教學。每個記號都假設你已在正文某章遇過它；這裡只負責讓你在忘記「λ 是損失趨避還是別的、α 指展望曲率還是其他、π(p) 是機率本身還是被扭曲過的決策權重」時，能在十秒內查回來，並標出它**第一次正式登場**的章。要從零理解某個概念，回該章；要核對一個符號或一個基準數字，留在這裡。\n\n閱讀器不渲染 LaTeX，全書一律純文字 Unicode 記號——你看到的形狀就是書裡的形狀。\n\n---\n\n## 一、全書脊椎一眼定位\n\n全書十八章重看的是**同一個帶不確定性的決策**，有賭注線與檢查線兩條，先把關鍵數字釘在這裡，後面所有記號都繞著它轉。\n\n```text\n脊椎賭注（the bet）：ch01 登場，被七層重看直到 ch18\n  L = (+200, 0.5; −100, 0.5)    單位 NT$\n  E[L] = 0.5·(+200) + 0.5·(−100) = +50    ← 正期望值，但多數人拒絕\n  u(x) = √(x+100)，財富基準 W=100          ← 全書統一凹效用\n  u(不賭) = √100 = 10\n  EU(L) = 0.5·√300 + 0.5·√0 = 8.6603 < 10 ← 拒絕，風險趨避\n  CE：u(CE)=8.6603 ⇒ CE = 8.6603²−100 = −25.0\n  風險溢酬 = E[L]−CE = 50−(−25) = 75\n\n脊椎檢查（the test）：ch05 登場，ch07 問資訊價值，ch18 收官\n  盛行率 P(病) = 1%，敏感度 = 99%，偽陽率 = 5%\n  後驗 P(病|陽性) = (0.99·0.01)/(0.99·0.01+0.05·0.99) = 0.0099/0.0594 ≈ 16.7%\n  自然頻率交叉驗算：1 萬人→99 真陽+495 偽陽=594 陽性，99/594=16.7% ✓\n  效用矩陣：u(治療,病)=−10，u(不治療,病)=−100，\n            u(治療,健康)=−20，u(不治療,健康)=0\n```\n\n**⚠️ 注意**：本書盛行率 1%、後驗 16.7%；《馴服隨機》ch05 同題但用 0.1%、後驗約 1.94%，是刻意差異。引用本書檢查數字時用 1%/16.7%。\n\n---\n\n## 二、Unicode 記號表\n\n下表列出全書用到的每個主要記號：怎麼唸、在本書指什麼、第一次正式出現在哪章。同一符號在不同脈絡換義的，集中到第三節「同形記號歧義」逐條釐清，這裡先標主用法。\n\n```text\n記號          唸法／名稱              在本書的主要意義                            首次章\n─────────────────────────────────────────────────────────────────────────────────────\nE[X]          期望值                  機率加權平均：E[L]=Σ pᵢ·xᵢ                 ch02\nEU(L)         期望效用                效用的機率加權：EU=Σ pᵢ·u(xᵢ)              ch03\nu(x)          效用函數                財富 x 映射到「你的真實價值」的函數          ch03\nu′(x)         邊際效用                效用函數的導數；凹⇒u′遞減                  ch03\nv(x)          展望理論價值函數        相對參考點的得失映射到估值；S 型            ch08\nw(p)          機率權重函數            被扭曲的決策權重；不等於 p 本身              ch09\nπ(p)          決策權重（同 w(p)）     本書統一寫 w(p)，π(p) 在指引中偶爾出現      ch09\nP(A)          機率                    事件 A 發生的機率                           ch01\nP(A|B)        條件機率                在 B 成立下 A 發生的機率                    ch05\nP(θ|D)        後驗機率                看到資料 D 後對狀態 θ 的信念                ch05\nL             彩券（lottery）         結果+機率的組合，決策論術語                 ch01\nCE            確定等值                u(CE)=EU(L)；你願意用多少確定財富換掉賭注  ch03\nλ             損失趨避係數            失端放大倍數，TK1992 中位≈2.25              ch09\nα             展望價值曲率（得端）    v(x)=x^α (x≥0)，TK1992：α=0.88           ch09\nβ             展望價值曲率（失端）    v(x)=−λ(−x)^β (x<0)，TK1992：β=0.88     ch09\nγ             機率權重參數（得）      w_得(p)=p^γ/(p^γ+(1−p)^γ)^(1/γ)，γ=0.61  ch09\nδ             機率權重參數（失）      w_失(p) 的形狀參數，δ=0.69                 ch09\na*            最適行動                a*=argmax_a Σ_θ P(θ|D)·u(a,θ)             ch05\nEVPI          完全資訊期望價值        若能事前得知真實狀態，期望能多賺多少        ch07\nEVSI          樣本資訊期望價值        一次不完美觀測帶來的期望效用增益            ch07\nvⱼ(xⱼ)       屬性 j 的值函數         多屬性決策的單維正規化評分                  ch14\nwⱼ            屬性權重                加權加總值函數 v=Σ wⱼ·vⱼ 的各維權重        ch14\nW             財富基準（wealth base） u(x+W)；全書統一 W=100                     ch03\nΣ             求和                    如 EU=Σ pᵢu(xᵢ)                           ch02\n∞             無限大                  聖彼得堡 E=∞；大數不可測尾部               ch02\n≈             約等於                  如後驗≈16.7%、√300≈17.3205                 全書\n→             導致／趨近              後驗更新後 → 行動改變；或「指向下一步」     全書\n⇒             蘊含                    邏輯推出；如「凹 ⇒ EU<u(E[L])」             ch03\n⇔             若且唯若                充要條件；如「不改變行動 ⇔ EVSI=0」         ch07\n≻             偏好優於                A≻B：你偏好 A 勝過 B                        ch03\n×             乘號                    如 0.5×200                                  全書\n·             點乘                    乘號（避免和變數混）                        全書\n```\n\n---\n\n## 三、同形記號歧義專節（重要）\n\n決策理論的字母不多，同一個符號在不同脈絡常指不同東西。以下幾條是本書（及書架相鄰書）最容易撞名的記號。**查一個數字前先確認你查的是哪個 λ、哪個 α、哪個 δ，否則會把對的數字填到錯的格子裡。**\n\n```text\nλ —— 本書：損失趨避係數（loss aversion coefficient），TK1992 中位估計 2.25。    ch09\n     意義：失端陡度相對得端的放大倍數。λ=2.25 表示「失 1 元的痛≈得 2.25 元\n     的爽」。注意：(a) λ 不是圓周率；(b) 書架上《蝴蝶的鐵律》混沌書的\n     λ 是邏輯方程的生長參數，和損失趨避毫無關係；(c) 學術論文裡 λ\n     有時也出現在 Poisson 率或正則化項——看到 λ 先問它的脈絡是\n     「損失趨避」還是「別的數學」。\n     ⚠️ TK1992 的 2.25 是一組估計、不是常數。meta-analysis（Brown 等\n     2024）給 λ≈1.31（CI 1.10–1.53），TK 範圍 1.8–2.7，引用必 hedge\n     並標 (2026-06)。\n\nα, β —— 本書：展望理論價值函數的曲率參數（TK1992）。                           ch09\n      v(x)=x^α (x≥0)；v(x)=−λ(−x)^β (x<0)；TK1992 中位 α=β=0.88。\n      意義：α 控制得端凹的程度（α<1 ⇒ 凹），β 控制失端凸的程度。\n      易撞：書架上其他書的 α β 可能是學習率、迴歸係數、型一型二誤差\n      等。本書 α β 只出現在展望理論的 v(x) 式子裡，別和 ch03 那個\n      凹效用 u(x)=√(x+W) 的冪次混淆——那是 1/2 次方，不叫 α。\n\nγ, δ —— 本書：機率權重函數的形狀參數（TK1992）。                               ch09\n      w_得(p)=p^γ/(p^γ+(1−p)^γ)^(1/γ)，γ=0.61（得）；\n      δ=0.69（失）（w_失 用 δ 取代 γ）。\n      意義：γ, δ<1 ⇒ 小機率被高估、大機率被低估（倒 S 型）。\n      易撞：書架上《賽局》的 δ 是折扣因子（下一回合的貼現率 0≤δ<1）；\n      看到 δ 先問它的鄰居是「機率 p」還是「報酬/未來」。\n\nπ(p) —— 本書：偶爾用 π(p) 指機率權重（決策權重），和 w(p) 同義。              ch09\n       ⚠️ 圓周率 π≈3.14159 在本書完全不出現；看到 π(p) 就是決策權重、\n       不是圓周率乘以 p。附錄 A 統一用 w(p) 避免混淆，正文偶爾出現的\n       π(p) 都指決策權重。\n\nu(x) vs v(x) —— 兩個截然不同的函數，不能互換。                                ch03/ch08\n      u(x)：規範效用函數，吃「最終財富 x」，全書基準 u(x)=√(x+100)，\n             用於期望效用 EU=Σ pᵢu(xᵢ)（ch03）；這是「該怎麼選」的工具。\n      v(x)：展望理論價值函數，吃「相對參考點的得失 x」，S 型分段冪；\n             用於展望價值=Σ w(pᵢ)v(xᵢ)（ch08–09）；這是「人實際怎麼算」的描述。\n      同一個賭注 L=(+200,0.5;−100,0.5)，u 看最終財富（100+200=300 或 0），\n      v 看參考點偏離（+200 是得、−100 是失）——記帳系統完全不同。\n\nL（彩券）vs L（賭注） —— 本書用同一字母有兩層意思。                           ch01/ch02\n      廣義：任何一個「結果+機率」組合都可寫成 L=(x₁,p₁;x₂,p₂;…)。\n      脊椎賭注：L=(+200,0.5;−100,0.5) 是全書那個具體例子。\n      脈絡決定是哪個；多數時候「L」出現在等式旁就是脊椎賭注。\n\nW（財富基準）—— 本書：u(x+W) 裡的 W=100，是全書統一的財富基準。            ch03\n      ⚠️ 若用 W=1000：EU(L)=0.5·√1200+0.5·√900=32.32>√1000=31.62，\n      賭注「竟被接受」，裂縫消失。故全書定案 W=100。這是教學設計選擇、\n      不是經驗常數，各章不得另用 W（維護鐵律）。\n```\n\n一句總結：**λ＝損失趨避係數（ch09）、α β＝展望曲率（ch09）、γ δ＝機率權重參數（ch09）、π(p)＝決策權重（≠圓周率）、u vs v＝規範效用 vs 描述價值函數（ch03 vs ch08）——同一符號的身分由「它在哪一章、相鄰的式子是什麼」共同決定。** 跨到書架上別本書（混沌、機率、線代、賽局）要全部重新對表。\n\n---\n\n## 四、脊椎賭注與關鍵公式速查\n\n每條先一句「它在說什麼」，再給形狀與數值，最後標章。這一節是「不得互相矛盾」的基準數字濃縮。\n\n### 期望值（ch02）\n\n```text\n它在說什麼：可重複情境下的長期單次平均，不是「這一次會發生的」。\nE[L] = Σ pᵢ·xᵢ\n脊椎賭注：E[L] = 0.5·(+200) + 0.5·(−100) = +50\n聖彼得堡：E = Σ(n=1→∞) (1/2ⁿ)·2ⁿ = ∞（每項貢獻恰為 1，發散）\n截斷版（最多第 N 次）：期望值 = N（無限來自尾部）\n```\n\n### 期望效用與確定等值（ch03）\n\n```text\n它在說什麼：最大化效用的期望，不是金額的期望；凹效用 ⇒ 風險趨避。\nEU(L) = Σ pᵢ·u(xᵢ)\n脊椎基準：u(x)=√(x+100)，W=100\n  u(不賭) = √(0+100) = 10\n  EU(L) = 0.5·√300 + 0.5·√0 = 0.5·17.3205 + 0 = 8.6603\n  EU(L) = 8.66 < u(不賭) = 10  ⇒  拒絕（理性的風險趨避）\n確定等值 CE：u(CE) = EU(L)\n  8.6603² − 100 = 75.0 − 100 = −25.0\n  CE = −25（你願意接受確定失去 25 元來換掉這個賭）\n風險溢酬 = E[L] − CE = 50 − (−25) = 75\n\nJensen 不等式（凹效用下成立）：u(E[L]) ≥ E[u(L)]\n  u(50) = √150 = 12.25 > EU(L) = 8.66  ✓\n```\n\n### 貝氏決策（ch05）\n\n```text\n它在說什麼：後驗信念 × 效用矩陣 → 最適行動；兩個缺一不可。\n後驗：P(θ|D) ∝ P(D|θ)·P(θ)   ← 概似 × 先驗\n最適行動：a* = argmax_a Σ_θ P(θ|D)·u(a,θ)\n\n脊椎檢查驗算（陽性後的最適行動）：\n  P(病|陽性) ≈ 16.7%，P(健康|陽性) ≈ 83.3%\n  EU(治療)  = 0.167·(−10) + 0.833·(−20) = −1.67 − 16.67 = −18.33\n  EU(不治療) = 0.167·(−100) + 0.833·0  = −16.67\n  −16.67 > −18.33  ⇒  最適行動是「不治療」（在此矩陣下）\n  若把 u(不治療,病) 改成 −500，最適行動翻轉為「治療」\n```\n\n### 資訊的價值（ch07）\n\n```text\n它在說什麼：資訊值錢，若且唯若它可能讓你換一個更好的行動。\nEVPI = E[max_a u(a,θ)] − max_a E[u(a,θ)]    ← 神諭情境下的增益\nEVSI = E_D[max_a Σ_θ P(θ|D)·u(a,θ)] − max_a Σ_θ P(θ)·u(a,θ)\n\n核心性質：\n  EVSI ≥ 0    （多知道不會更糟，在期望意義上）\n  若資訊不改變最適行動 a*：EVSI = 0（精確等於零，不是「約等於」）\n```\n\n### 展望理論（ch08–09；TK1992，引用必 hedge，標 2026-06）\n\n```text\n它在說什麼：人估的是相對參考點的變化，損失被放大 λ 倍，機率被倒 S 扭曲。\n價值函數：\n  v(x) = x^α              (x ≥ 0，得)\n  v(x) = −λ·(−x)^β        (x < 0，失)\n  TK1992 中位估計：α=β=0.88，λ=2.25\n  ⚠️ meta-analysis（Brown 等 2024）給 λ≈1.31（CI 1.10–1.53）；\n     引用必 hedge：「一組常被引用的估計、有再現性討論、非常數、(2026-06)」\n\n機率權重：\n  w(p) = p^γ / (p^γ + (1−p)^γ)^(1/γ)\n  γ=0.61（得）、δ=0.69（失）；小機率被高估、中大機率被低估（倒 S 型）\n\n脊椎賭注展望重算（參考點=0，先用 w(p)=p 簡化）：\n  v(+200) = 200^0.88 ≈ 105.9\n  v(−100) = −2.25·100^0.88 ≈ −129.5\n  展望價值 ≈ 0.5·105.9 + 0.5·(−129.5) = −11.8 < 0  ⇒  拒絕\n  ⚠️ 若改用 λ=1.31：v(−100)≈−1.31·57.5=−75.3\n     0.5·105.9 + 0.5·(−75.3) = +15.3 > 0  ⇒  接受\n     ——足以翻轉結論，參數不確定的影響不可忽略。\n\n校驗常數（手算複核用）：\n  200^0.88 = exp(0.88·ln200) = exp(0.88·5.2983) = exp(4.6625) ≈ 105.9\n  100^0.88 = exp(0.88·4.6052) = exp(4.0526) ≈ 57.5\n  √300 ≈ 17.3205，√1000 ≈ 31.6228，ln2 ≈ 0.6931\n```\n\n### vNM 四公理（ch03）\n\n```text\n它在說什麼：滿足這四條公理 ⇒ 你的偏好等價於最大化某個 EU。\n① 完備性（completeness）：任兩個彩券之間你有偏好或無差異。\n② 遞移性（transitivity）：A≻B、B≻C ⇒ A≻C；違反 ⇒ money pump。\n③ 連續性（continuity）：偏好可被機率連續插值；極端結果不「無限可怕」。\n④ 獨立性（independence axiom）：X≻Y，把兩者都按機率 p 混入同一個 Z\n   後，你仍該 (p·X+(1−p)·Z) ≻ (p·Y+(1−p)·Z)；共同項可約掉。\n表現定理（不證明，給直覺）：滿足①②③④ ⇔ 存在效用函數 u 使得\n   L₁≻L₂ ⟺ EU(L₁)>EU(L₂)，且 u 在正線性轉換下唯一。\n```\n\n### Allais 對賭（ch11）\n\n```text\n它在說什麼：客觀機率完全透明，受試者還是違反獨立公理（確定性效應）。\n題 1：A=（確定 100 萬）vs B=（10% 得 500 萬, 89% 得 100 萬, 1% 得 0）\n題 2：C=（11% 得 100 萬, 89% 得 0）vs D=（10% 得 500 萬, 90% 得 0）\n多數人選 A 又選 D：把兩題共同的「89% 得 100 萬」消去後，\n   A 對剩下 11%：確定 100 萬\n   D 對剩下 10%：得 500 萬（另 1% 得 0）\n   A 與 D 在同樣的「89%」背景下，對剩下 11% 偏好相反  ⇒  違反獨立公理。\n```\n\n---\n\n## 五、各章「招牌數字」一覽\n\n下表把全書最常被引用、最不能填錯的數字收成一張。標 ⚠️ 者為估計值或時效性項，以 landscape 為準。\n\n```text\n脊椎賭注           L=(+200,0.5;−100,0.5)，E[L]=+50，W=100 下 EU=8.66 拒絕    ch02–03\n確定等值 CE        CE=−25，風險溢酬=75（u=√(x+100)，W=100）                    ch03\n聖彼得堡期望值     E=∞（每項貢獻 1，發散）；截斷 N 次版期望=N                   ch02\n檢查後驗           P(病|陽性)=99/594≈16.7%（盛行率 1%/敏感 99%/偽陽 5%）       ch05\n效用矩陣基準       u(治療,病)=−10，u(不治療,病)=−100，                         ch05\n                   u(治療,健康)=−20，u(不治療,健康)=0\n資訊價值鐵律       不改變最適行動的資訊，EVSI 精確等於 0                         ch07\n\n時效性／估計值項（以 landscape 為準，引用必 hedge＋標 2026-06）\n  ⚠️ 展望參數        α=β=0.88，λ=2.25，γ=0.61，δ=0.69（TK1992 中位估計）     ch09\n  ⚠️ 損失趨避範圍    meta-analysis 給 λ≈1.31（CI 1.10–1.53）；範圍 1.8–2.7   ch09/12\n  ⚠️ 展望 v 值       v(+200)≈105.9，v(−100)·λ≈−129.5（保留 1 位小數，示意值） ch09\n\n史實（年份照 landscape，不得改）\n  聖彼得堡悖論      Nicolaus Bernoulli 1713 致 Montmort 信首倡（非 Daniel）     ch02\n  Daniel Bernoulli  1738 對數效用解，發表於聖彼得堡科學院期刊                   ch02\n  vNM 期望效用公理  1944 一版出書；公理化在 1947 二版附錄（年份陷阱）           ch03\n  Allais 悖論       1953，Econometrica 21(4)（諾貝爾 1988）                      ch11\n  Ellsberg 悖論     1961，QJE 75(4)，三色甕，違反 sure-thing 公理               ch04\n  Knight 區分       1921，《Risk, Uncertainty and Profit》                       ch04\n  Simon 有限理性    諾貝爾 1978；satisficing = satisfy+suffice 合成詞            ch13\n  展望理論          Kahneman-Tversky 1979，Econometrica 47(2)                   ch08\n  累積展望理論      Tversky-Kahneman 1992，JRU 5(4)（TK1992 參數出處）          ch09\n  Kahneman 諾貝爾   2002，與 Vernon Smith 共享（Tversky 1996 歿，未含）         ch12\n```\n\n兩個一眼防呆：\n\n```text\n• EU vs v：前者吃「最終財富 x+W」，後者吃「相對參考點的偏離 Δx」。\n  同一個賭注 L，EU 看 √300 和 √0（ch03），展望 v 看 200^0.88 和 −100^0.88（ch09）。\n  記帳系統不同，數字自然不同，不能混貼。\n\n• λ≈2.25 換成 λ≈1.31 足以讓脊椎賭注從「拒絕」變成「接受」。\n  所以 ch09 的結論「拒絕」取決於用哪組估計——務必在引用時 hedge。\n  展望理論的「現象」（損失更重）是穩健的，但「2.25 這個數」不是常數。\n```\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 詞彙表", "md": "# 附錄 B — 詞彙表\n\n這本書每個關鍵詞，一句白話定義加上它第一次正式登場的章。定義抓直覺、不照抄正文長段；要看完整的來龍去脈與 worked example，去括號裡標的那一章。中英並列，方便你查原文文獻時對得上號。排序按全書的五條脈絡分組，不按筆畫——相鄰的詞彼此呼應，查一個常會順手看懂旁邊那個。\n\n最容易彼此混淆的幾組，先放一張對照表壓在前面（這幾組分不清，正是「直覺的陷阱」最常出事的地方）：\n\n```text\n最易混淆的成對術語（左右兩欄是兩回事，別當同一件）\n─────────────────────────────────────────────────────────────────────\n期望值（EV）         vs   期望效用（EU）\n（金額的機率加權平均）    （效用的機率加權平均）\n前者在聖彼得堡告訴你「應無限下注」，後者糾正它：「效用不是金額」。\n─────────────────────────────────────────────────────────────────────\n風險趨避             vs   損失趨避\n（凹效用下拒絕正期望值）  （失端估值被 λ 放大，描述性現象）\n一個是規範（ch03），一個是描述（ch09），兩者都會讓你拒絕賭注，機制不同。\n─────────────────────────────────────────────────────────────────────\n風險（risk）         vs   不確定／模糊（uncertainty／ambiguity）\n（機率可測、可保險）      （機率不可測、無依據填數）\nKnight 1921 的區分；Ellsberg 三色甕對後者展示模糊趨避。（ch04）\n─────────────────────────────────────────────────────────────────────\n先驗（prior）        vs   後驗（posterior）\n（看資料前的信念）        （看資料後更新的信念）\n後驗 = 概似 × 先驗（正規化後），全書醫療檢查後驗≈16.7%。\n─────────────────────────────────────────────────────────────────────\n效用函數 u(x)        vs   價值函數 v(x)\n（規範：最終財富映射效用）  （描述：相對參考點偏離映射估值）\nch03 的工具 vs ch08–09 的工具；記帳系統不同，不能互換。\n─────────────────────────────────────────────────────────────────────\nEVPI               vs   EVSI\n（完全資訊期望價值：神諭）  （樣本資訊期望價值：一次不完美觀測）\n前者是理論上限，後者是現實的一次觀測帶來的增益。（ch07）\n─────────────────────────────────────────────────────────────────────\n規範（normative）    vs   描述（descriptive）\n（你該怎麼選的數學）      （人實際怎麼選的數學）\n全書中央張力：兩套都對、各回答各的問題，不互相否證。\n─────────────────────────────────────────────────────────────────────\n```\n\n---\n\n## 決策的基本零件\n\n把一個「在不確定下選一個動作」的局面拆成可分析的零件——誰在算、算什麼、結果怎麼量。這組詞是全書共用的詞彙地基。\n\n**決策（decision）**：在不確定的狀態下選擇一個行動，以期達到某個目標；三要素：行動、狀態、報酬。（ch01）\n\n**行動（act）**：你能控制、必須從中選一個的東西，如 { rollback, 再觀察 }、{ 治療, 不治療 }。（ch01）\n\n**狀態（state）**：你控制不了的世界真相，如 { 有病, 健康 }、{ 硬幣正面, 反面 }。（ch01）\n\n**報酬（outcome）**：每個「行動 × 狀態」格子裡你拿到的結果；不一定是錢，是把一切在意的東西折算後的數字。（ch01）\n\n**彩券（lottery）**：決策論術語，指「結果＋機率」的組合，寫成 L=(x₁,p₁;x₂,p₂;…)；不只是指賭博，泛指任何帶機率的選項。（ch01）\n\n**不確定性（uncertainty）**：廣義指「不知道哪個結果會發生」；被 Knight 細分為機率可測的「風險」與不可測的「模糊」，見 ch04。（ch01）\n\n**規範理論（normative theory）**：回答「你**該**怎麼選」——在某套公理下的最佳演算法；期望效用最大化是本書的規範基準。（ch01）\n\n**描述理論（descriptive theory）**：回答「人**實際**怎麼選」——捕捉真實行為的數學模型；展望理論是本書的描述模型。（ch01）\n\n---\n\n## 期望值與效用\n\n聖彼得堡悖論揭示期望值不夠用，效用把它修好——然後公理把效用的唯一形式逼出來。\n\n**期望值（expected value, EV）**：把每個結果的「金額」乘上機率加總；E[L]=Σ pᵢxᵢ；精確意義是「可重複情境的長期單次平均」，不是「這一次會發生的」。（ch02）\n\n**聖彼得堡悖論（St. Petersburg paradox）**：期望報酬為∞的賭局；沒有任何清醒的人願意無限下注——說明「期望值≠該付的價」；首倡者是 Nicolaus Bernoulli（1713），Daniel Bernoulli（1738）給出對數效用解。（ch02）\n\n**效用（utility）**：把金額映射到「你的真實價值」的函數 u(x)；可以是你昨晚不眠的痛苦、錯過機會的後悔——不是帳面數字。（ch03）\n\n**效用函數（utility function）**：u(x)，以財富 x 為輸入、輸出效用值；本書基準 u(x)=√(x+100)，W=100。（ch03）\n\n**期望效用（expected utility, EU）**：把每個結果的「效用」乘上機率加總；EU(L)=Σ pᵢu(xᵢ)；規範決策的核心演算法。（ch03）\n\n**凹函數（concave function）**：往上爬越來越慢；如 √ 或 ln；圖像向下彎。（ch03）\n\n**邊際效用遞減（diminishing marginal utility）**：多賺一塊錢帶來的效用增量，隨財富增加而遞減；凹效用的直觀表述。（ch03）\n\n**風險趨避（risk aversion）**：凹效用函數的數學後果——EU(L)<u(E[L])，也就是「拒絕正期望值的賭注是理性的」；不是膽小，是效用凹的算術結論。（ch03）\n\n**風險愛好（risk seeking）**：凸效用的後果；對得端是凸的人願意接受對自己不利的賭注。展望理論裡，對「失」的一端是凸的（反射效應）。（ch03）\n\n**風險中性（risk neutral）**：線性效用；只看期望值，不在乎賭注的分散程度。（ch03）\n\n**確定等值（certainty equivalent, CE）**：讓你對「接受賭注」和「拿確定的 CE 元」無差異的那個金額；由 u(CE)=EU(L) 反解；CE<E[L] 時你是風險趨避者。（ch03）\n\n**風險溢酬（risk premium）**：E[L]−CE；你為了避開不確定性、願意放棄多少期望報酬。（ch03）\n\n**vNM 四公理（von Neumann–Morgenstern axioms）**：完備性、遞移性、連續性、獨立性；滿足這四條 ⇒ 你的偏好等價於最大化某個期望效用；公理化出現在 1947 年二版附錄（不是 1944 一版）。（ch03）\n\n**獨立公理（independence axiom）**：若你偏好 X 勝過 Y，把兩者各與同一個 Z 混入相同機率後，偏好不變；「共同項可約掉」的形式化；Allais 悖論正是斷在這裡。（ch03）\n\n**表現定理（representation theorem）**：滿足 vNM 四公理 ⇒ 存在唯一（在正線性轉換下）效用函數 u 使得選擇等價於最大化 EU；「幾條公理逼出唯一演算法」的精確意義。（ch03）\n\n**money pump**：當你的偏好違反遞移性，對手可以設計一系列「你自願接受」的交換，讓你一直付出、最後回到原點但口袋掏空了。（ch03）\n\n---\n\n## 不確定與信念\n\n從「你不知道哪個狀態」，到「你把信念寫成一個數」，再到「你更新它」。\n\n**風險（risk）**：機率「測得出來」的不確定——你有依據填一個具體的 p，如自家 API 的歷史錯誤率；Knight 1921 的術語。（ch04）\n\n**不確定／模糊（uncertainty／ambiguity）**：機率「測不出來」的不確定——你連 p 是多少都沒依據，如剛接的第三方供應商；Knight 稱之為 Knightian uncertainty。（ch04）\n\n**模糊趨避（ambiguity aversion）**：對「測不出機率」本身有獨立的趨避——即使強迫假設 50/50，你對模糊版也更不想碰；Ellsberg 三色甕揭示它違反 sure-thing 公理。（ch04）\n\n**確實事件原理（sure-thing principle）**：Savage（1954）的公理——在某個事件 E 下你偏好 A 勝過 B、在非 E 下也一樣，那你應該無條件偏好 A；Ellsberg 三色甕的受試者違反它。（ch04）\n\n**Ellsberg 三色甕（Ellsberg urn）**：90 球，30 紅，60 黑或黃（比例未知）；多數人同時偏好「賭紅」勝過「賭黑」、又偏好「賭（黑或黃）」勝過「賭（紅或黃）」——無法用任何單一信念同時成立，違反 sure-thing 公理。（ch04）\n\n**先驗（prior）**：在看到新資料之前，你對某個狀態的信念；貝氏決策的起點。（ch05/06）\n\n**後驗（posterior）**：看到資料 D 後更新過的信念；P(θ|D) ∝ P(D|θ)·P(θ)。（ch05）\n\n**概似（likelihood）**：在某個假設 θ 成立的前提下，觀測到資料 D 的可能性 P(D|θ)；貝氏更新的乘數。（ch05/06）\n\n**基率忽視（base rate neglect）**：把「P(陽性|有病)=99%」誤認為「P(有病|陽性)」——把概似當後驗；貝氏決策最常見的陷阱。（ch05）\n\n**貝氏決策（Bayesian decision）**：把後驗信念與效用矩陣結合，選出最大化期望效用的行動；a*=argmax_a Σ_θ P(θ|D)·u(a,θ)。（ch05）\n\n**主觀機率（subjective probability）**：把信念度寫成一個數（賭率）；不是頻率、不是憑感覺——受 Dutch book 約束，不自洽會被人穩賺套利。（ch06）\n\n**Dutch book（荷蘭賭）**：若你的信念度不自洽（不滿足機率公理），他人可設計一組賭局，讓你穩定輸錢；是主觀機率必須自洽的論證。（ch06）\n\n**貝氏更新（Bayesian updating）**：後驗 = 正規化後的（概似 × 先驗）；看到資料後把信念一筆筆消化的過程；後驗再變下一次的先驗。（ch06）\n\n---\n\n## 資訊的價值\n\n知道更多讓你更好——但只在「它改變你的行動」時。\n\n**資訊的價值（value of information, VOI）**：一條資訊在決策上帶來的增益——唯一有用的管道是「更新後驗→可能讓你換一個更好的行動」。（ch07）\n\n**完全資訊期望價值（expected value of perfect information, EVPI）**：若有神諭在行動前告訴你真實狀態，期望效用能增加多少；Howard 1966 形式化。（ch07）\n\n**樣本資訊期望價值（expected value of sample information, EVSI）**：一次不完美觀測（如第二次檢查）帶來的期望效用增益；Raiffa–Schlaifer 1961 推廣。（ch07）\n\n**資訊價值為零的充要條件**：若資訊無論結果如何都不改變最適行動，則 EVSI 精確等於零；「不改變決策的資訊，它的決策價值精確等於 0」是本書 ch07 的高潮洞見。（ch07）\n\n---\n\n## 描述的裂縫：展望理論\n\n人實際怎麼選——四根支柱，每一根都對應一條被違反的規範公理。\n\n**展望理論（prospect theory）**：Kahneman–Tversky 1979 提出的描述性決策模型；核心是價值函數（參考點＋S 型）與機率權重函數（倒 S 型）；累積展望理論（CPT）由 Tversky–Kahneman 1992 修正。（ch08）\n\n**參考點（reference point）**：你拿什麼當「零」——得與失都是相對它的偏離；通常是現狀，也可以是期望或抱負水準；展望理論第一根支柱。（ch08）\n\n**價值函數（value function, v(x)）**：把相對參考點的得失 x 映射到估值；S 型——得端凹（對得風險趨避）、失端凸（對失風險愛好）、且失端更陡（損失趨避）；v(x)=x^α (x≥0)，v(x)=−λ(−x)^β (x<0)。（ch08）\n\n**描述不變性（description invariance）**：理性要求——邏輯等價的問法應得到相同選擇；框架效應正是它最戲劇的失效。（ch10）\n\n**損失趨避（loss aversion）**：失端估值被放大 λ 倍，「同樣大小的失比得更重」；展望理論第二根支柱；TK1992 中位 λ≈2.25，但 meta-analysis（Brown 等 2024）給 λ≈1.31，引用必 hedge。（ch09）\n\n**機率權重（probability weighting）**：決策時用的是被扭曲過的 w(p)，而非機率 p 本身；小機率被高估（你對百萬分之一災難過度防禦）、中大機率被低估；倒 S 型曲線；展望理論第三根支柱。（ch09）\n\n**決策權重（decision weight）**：w(p)，機率被扭曲後的實際影響力；展望价值=Σ w(pᵢ)v(xᵢ)。（ch09）\n\n**反射效應（reflection effect）**：把賭注的所有結果從得改成失，風險態度翻轉——得端風險趨避、失端風險愛好；「同一顆大腦，得與失態度相反」。（ch09）\n\n**框架效應（framing effect）**：同一個決策、邏輯等價的兩種措辭，因為設定了不同參考點，讓人做出相反選擇；展望理論第四根支柱；違反描述不變性。（ch10）\n\n**亞洲疾病問題（Asian disease problem）**：Tversky–Kahneman 1981 的經典框架實驗——把挽救生命寫成「救活 200 人」（得框架）vs「死亡 400 人」（失框架），同一客觀結果讓受試者做出相反選擇。（ch10）\n\n**確定性效應（certainty effect）**：對「確定」給超額偏好——在機率很高（接近 1）時，人對機率的反應比線性更陡；Allais 悖論的心理機制；機率權重 w(p) 在 p→1 附近陡降的後果。（ch11）\n\n**Allais 悖論（Allais paradox）**：Allais（1953）設計的兩道對賭，多數人（包括 Savage 本人起初）選 A 又選 D，違反獨立公理；題1：A=確定 100 萬 vs B=（10% 得 500 萬, 89% 得 100 萬, 1% 得 0）；題2：C=（11% 得 100 萬, 89% 得 0）vs D=（10% 得 500 萬, 90% 得 0）。（ch11）\n\n---\n\n## 有限理性\n\n把「最佳化」放回一顆成本有限的腦裡——理性的盡頭不是放棄，是知道在哪格停。\n\n**有限理性（bounded rationality）**：Herbert Simon（1978 諾貝爾）提出——理性受認知、資訊與時間成本所「界」；真實的選擇者不能也不會把所有選項算到底。（ch13）\n\n**滿意即可／知足（satisficing）**：Simon 的決策策略——設一個「夠好」的 aspiration level（門檻），找到第一個跨過門檻的選項就停，不找全域最大；在「把搜尋成本算進去」的元層次上，可能就是最佳化。（ch13）\n\n**aspiration level（抱負水準）**：satisficing 裡那個「夠好就停」的門檻；不是最大值，是「可接受的最低要求」。（ch13）\n\n**捷思（heuristic）**：在有限資源下做出「夠好」決定的簡單規則；用對場合是有效的近似，用錯場合才出錯——心理機制見《思考的陷阱》。（ch13）\n\n**多屬性決策（multi-attribute decision）**：一個選項在好幾個維度（成本、延遲、可靠度）上都有值，要合成一個排序；不存在天生的全序，合成方式本身是價值判斷。（ch14）\n\n**加權加總值函數（additive value function）**：v=Σ wⱼ·vⱼ(xⱼ)；把各維度的正規化評分乘上權重加總；Keeney–Raiffa 1976 的 MAUT 核心工具。（ch14）\n\n**偏好獨立（preferential independence）**：加權加總法的核心假設——一維的好壞不受其他維度的水準影響；常被現實違反，違反時加法合成失效。（ch14）\n\n**邊際替代率（marginal rate of substitution）**：你願意拿多少一個屬性（如延遲）去換多少另一個屬性（如成本）；多屬性決策的核心概念。（ch14）\n\n**支配（dominance）**：A 在每個維度都不輸 B、且至少一維贏，則 A 支配 B；有支配關係時不用算就知道選 A。（ch14）\n\n**決策樹（decision tree）**：把「做一步、看結果、再做下一步」的序貫決策畫成樹；決策節點（你選，方框）、機運節點（自然選，圓圈）、葉子（報酬）三種零件。（ch15）\n\n**序貫決策（sequential decision）**：有時間順序的多步決策；現在的選擇改變未來的可選集與信念；倒推是解法。（ch15）\n\n**倒推／逆向歸納（backward induction）**：從決策樹最右邊的葉子往左推；遇機運節點取期望、遇決策節點取最大，直到算出第一步的最適行動。（ch15）\n\n**沉沒成本（sunk cost）**：已付且不可回收的成本；規範理論判斷：在「往前看」的決策裡，它的權重應精確等於零——只看未來的增量成本與報酬。（ch15）\n\n**協和號效應（Concorde effect）**：因為「已經投入很多」就繼續一個本不划算的計畫；沉沒成本謬誤的代表案例。（ch15）\n\n**選項價值（option value）**：保留彈性、未來還能選擇，本身就有價值；「鎖死選項」是有成本的，保留回滾性是有收益的。（ch15）\n\n---\n\n## 收束：理性三角與跨書邊界\n\n把全書的概念放回「理性」這個詞的兩種意思裡，並標清楚每本書的邊界。\n\n**程序理性（procedural rationality）**：Simon 的術語——問「過程對不對」；一個選擇是理性的，若它用對的方法做出來（即使結果不盡如意）。（ch17）\n\n**實質理性（substantive rationality）**：Simon 的對照術語——問「結果好不好」；隱含假設所有選項可見、算力無限。（ch17）\n\n**理性三角（rationality triangle）**：本套「推理六書」中三本的分工——決策書（本書）擁有規範基準（你該怎麼選）、偏誤書（《思考的陷阱》）擁有心理機制（人為何會偏）、科學方法書（《如何不騙自己》）擁有制度防線（怎麼設計流程防自欺）。（ch17）\n\n**招牌跨書連結**：本書承擔的兩個——決策↔賽局（「對手會反應時」ch16 交棒給《賽局》）、理性三角（ch12/17 明寫「描述心理機制指向《思考的陷阱》、制度防線指向《如何不騙自己》」）。（ch16/17）\n\n**規範 vs 描述的和解**：兩套數學不互相否證——期望效用回答「你該怎麼選」，展望理論回答「人實際怎麼選」；人系統性偏離規範，不證明規範錯，不證明人笨，只說明兩件事各需一套數學。（ch17/18）\n\n**五種演算法對帳（ch18 收官總表）**：\n- ① 期望值：+50，指向「接」（規範）\n- ② 期望效用（凹 u）：8.66<10，指向「拒」（規範）\n- ③ 貝氏期望效用：後驗×效用矩陣→最適行動（規範）\n- ④ 展望理論：|v(−100)|·λ>v(+200)，指向「拒」（描述）\n- ⑤ 有限理性（satisficing）：**不同類**——不算一個競爭答案，而是「值不值得把分析算到展望理論這麼細」的定性門檻；aspiration level 達到就停，不再追求最佳化。（ch18）\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 閱讀地圖", "md": "# 附錄 C — 閱讀地圖\n\n> **這份附錄做什麼**：把全書攤成一張地圖，再給你幾條依興趣的捷徑、一份指向書架鄰書的跨書連結與理性三角的完整分工、以及一份去重後的延伸閱讀總清單。你不必從 ch01 一路爬到 ch18——這裡告訴你：想懂某件事，該走哪幾章；讀完某章想往外走，該翻哪本姊妹書、哪篇原始論文。\n\n---\n\n## 全書地圖重述\n\n下面這張圖你在每個 Part 首章（ch01／ch05／ch08／ch13／ch16）都見過（「◄ 你在這裡」逐 Part 往下移）。這裡完整攤開，當作全書的索引：\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n這本書的脊椎，是同一個帶不確定性的決策（賭注線＋檢查線），被七層重看直到 ch18 對帳。ch18 那張五層總對帳表，就是全書的終點口試：\n\n```text\n五層對帳：同一個賭注 L=(+200,0.5;−100,0.5)，五種眼光，兩個層次\n\n  層次       演算法         賭注 L 的答案     層次歸屬\n  ───────────────────────────────────────────────────────\n  ①期望值    E[L]=+50      ⇒ 接             規範（ch02）\n  ②期望效用  EU=8.66<10   ⇒ 拒（風險趨避）  規範（ch03）\n  ③貝氏EU    後驗×效用矩   ⇒ 最適行動       規範（ch05）\n  ④展望理論  |v(−100)|>v(+200) ⇒ 拒（損失重） 描述（ch09）\n  ⑤有限理性  satisficing   ⇒ 定性門檻，不同類  橋接（ch13）\n             （「值不值得算到展望理論這麼細？」）\n  ───────────────────────────────────────────────────────\n  ⑤不是第五個競爭答案，而是「要不要把前四個都算」的元層決策。\n```\n\n同一道裂縫（規範 vs 描述），五種長相，從「期望值給你正確的平均」走到「展望理論說人實際上在用另一套數學」，再到「有限理性說你可能根本不必把每種演算法都跑完」。\n\n---\n\n## 依興趣的選讀路徑\n\n不想 18 章順著爬？下面五條捷徑各帶你去一個明確的目的地。每條都自成一個故事，讀完那幾章就夠回答標題那個問題。\n\n```text\n路徑 A：只想懂「為什麼拒絕正期望值的賭注是理性的」\n   ch01 → ch02 → ch03 → ch18（第②列）\n   先立框架（ch01），再看期望值在聖彼得堡崩壞（ch02），\n   再看效用把它補回來、凹效用讓拒絕賭注變成理性（ch03），\n   最後在收官章的對帳表第②列確認這個答案。\n   最短的「懂風險趨避」路線。\n\n路徑 B：只想懂「貝氏決策：收到告警後該不該行動」\n   ch01 → ch05 → ch07 → ch18（第③列）\n   先立框架與檢查線懸念（ch01），再算後驗 16.7%＋接效用矩陣\n   求最適行動（ch05），再問「要不要再蒐集一次資訊」（ch07），\n   最後在 ch18 對帳第③列。貝氏三部曲，缺哪章都不完整。\n\n路徑 C：想懂「展望理論到底在說什麼、和期望效用什麼關係」\n   ch03 → ch08 → ch09 → ch11 → ch12\n   先把規範（凹效用）的精確意義弄清楚（ch03），\n   再一根一根立展望理論的支柱（ch08 參考點、ch09 損失趨避與機率權重、\n   ch11 Allais 獨立公理），最後看 ch12 把兩套理論的關係說清楚。\n   「描述 vs 規範，為何不互相否證」的完整論證。\n\n路徑 D：想懂「有限理性與 satisficing，工程上的決策該怎麼收」\n   ch13 → ch14 → ch15 → ch17 → ch18（第⑤列）\n   先看「夠好就停」在元層次上為何可能就是最佳化（ch13），\n   再看多屬性選型的陷阱（ch14），再看決策樹倒推與沉沒成本（ch15），\n   然後看哲學收束「理性的兩個意思」（ch17），最後確認 ch18\n   第⑤列把 satisficing 放在「不同類」的那一格。\n\n路徑 E：想了解「本書和書架上其他書的邊界在哪」\n   ch01（全書地圖）→ ch04（模糊趨避，邊界與《賽局》）\n   → ch12（交棒給《思考的陷阱》）→ ch16（交棒給《賽局》）\n   → ch17（理性三角完整分工）\n   閱讀目的是搞清楚「哪些問題在本書、哪些要去哪本鄰書」。\n```\n\n---\n\n## 跨書連結整理：理性三角與書架鄰居\n\n本書在「推理六書」家族中承擔的角色是**規範基準**——「單人在不確定下該怎麼選」的完整數學。遇到不同問題就指向書架上相鄰的書，不重推那一側的內容。\n\n### 理性三角的三個頂點\n\n```text\n理性三角：同一個決策失誤，三本書各負責一個視角\n\n  失誤案例：P0 alert 響，on-call 因基率忽視誤判「九成有病」，\n            採取了錯誤行動。\n  ─────────────────────────────────────────────────────────────\n  本書（決策）         規範：P(病|陽)=16.7%（不是 99%），\n                       後驗×效用矩陣=最適行動；\n                       人「該」怎麼算，哪個步驟錯了。\n  ─────────────────────────────────────────────────────────────\n  《思考的陷阱》（偏誤）  描述：為什麼人腦看不見先驗——\n                           可得性捷思讓「檢測陽性」的生動性\n                           壓過了「基率」這個抽象數字；\n                           雙系統為何讓你察覺不到。\n  ─────────────────────────────────────────────────────────────\n  《如何不騙自己》（科學方法） 制度：設計什麼流程讓這種偏誤\n                               在「系統層面」不會發生——\n                               postmortem 模板的「後驗計算欄」、\n                               alert 觸發時強制顯示盛行率。\n  ─────────────────────────────────────────────────────────────\n  三本不互相否證：規範告訴你標準，偏誤告訴你為何偏離，\n                 科學方法告訴你制度怎麼補這道缺口。\n```\n\n本書的明確交棒點：\n- **ch12**（展望理論收束）：偏離的數學描述本書收了；**偏離的心理機制指向《思考的陷阱》**。\n- **ch16**（對手會反應）：**單人決策交棒給《賽局》**——納許均衡、混合策略、機制設計在那裡。\n- **ch17**（理性是什麼）：**理性三角總收束**，三本書的分工最後講清楚。\n\n### 各書邊界速查\n\n```text\n問題是什麼                                  去哪本書\n─────────────────────────────────────────────────────────────────\n「在不確定下，單人該怎麼選」                  本書（已收完）\n   期望效用、貝氏決策、資訊的價值\n   展望理論的數學、有限理性的決策後果\n─────────────────────────────────────────────────────────────────\n「機率是怎麼算的、貝氏定理的推導」            《馴服隨機》\n   條件機率機制、自然頻率法的嚴格版           （本書 ch05–07 只用結果）\n   大數法則為何讓期望值有意義\n─────────────────────────────────────────────────────────────────\n「人為什麼會偏離規範、心理機制是什麼」        《思考的陷阱》\n   雙系統、捷思怎麼運作、錨定、框架的          （ch08、ch09、ch12、ch13 交棒）\n   心理成因、為何察覺不到\n─────────────────────────────────────────────────────────────────\n「當對手也是理性主體、會針對我反應時」        《賽局：當理性互相碰撞》\n   納許均衡、混合策略、機制設計、              （ch04、ch16 交棒）\n   重複賽局、承諾、可信威脅\n─────────────────────────────────────────────────────────────────\n「信念更新作為科學確證、制度怎麼防自欺」      《如何不騙自己》\n   貝氏確證、頻率派之爭的制度面               （ch05、ch06、ch17 互指）\n   可重現性、預先承諾\n─────────────────────────────────────────────────────────────────\n「凹效用的微分直覺、Jensen 不等式的圖像」    《馴服無限》\n   凹凸函數、邊際遞減的導數版               （ch03、ch08 點到指向）\n─────────────────────────────────────────────────────────────────\n```\n\n### 三個招牌跨書連結（總綱 §2.3 定義的）\n\n1. **決策↔賽局**：單人理性決策（本書）與多人策略互動（《賽局》）是同一枚硬幣兩面；分水嶺在「那個讓你不確定的東西，會不會針對你反應」。本書 ch04（模糊趨避）、ch10（框架與對手）、ch16（交棒）、ch18（收官）各明寫一次。\n\n2. **決策↔偏誤**：展望理論的數學描述（本書 Part III）與偏誤的心理機制（《思考的陷阱》）是同一道裂縫的兩面。本書 ch12 是第一個明確交棒點，ch17 是總收束。\n\n3. **信念更新的兩個視角**：本書（ch05–07）從「信念→行動」的決策演算法角度用貝氏；《如何不騙自己》從「信念→真理」的科學確證角度用貝氏。兩者互指，不重推對方的核心。\n\n---\n\n## 延伸閱讀總清單（去重彙整）\n\n以下條目從各章「延伸閱讀」段去重、合併，按主題分組。連結在 2026-06 查證過；標 ⚠️ 者為估計值或時效性項，定期需回頭確認。\n\n### 原典與史料\n\n**Daniel Bernoulli, \"Exposition of a New Theory on the Measurement of Risk\"（1738，英譯 1954，*Econometrica* 22(1):23–36）**\n效用概念與對數效用的歷史出生證明；讀它如何用「財富的效用」而非「財富本身」化解聖彼得堡悖論，是「效用不是金額」這套思想的源頭。（ch02/03）\n\n**von Neumann & Morgenstern, *Theory of Games and Economic Behavior*（1944；期望效用公理化在 1947 二版附錄）**\n規範那一側的原典。期望效用公理的形式內容在附錄 \"The Axiomatic Treatment of Utility\"（常被誤記成 1944，見 ch03 的直覺的陷阱）。感受「幾條公理逼出唯一演算法」的規範之美。（ch03/16）\n\n**Frank Knight, *Risk, Uncertainty and Profit*（1921）**\n風險／不確定區分的源頭（Online Library of Liberty 有全文）。讀第一篇第一章掌握那條界線；後面的利潤理論可略。（ch04）\n\n**Daniel Ellsberg, \"Risk, Ambiguity, and the Savage Axioms,\" *Quarterly Journal of Economics* 75(4):643–669（1961）**\n三色甕出自這裡。讀前三節即可看懂全部論證，數學門檻不高、文筆極好。（ch04）\n\n**Maurice Allais, \"Le Comportement de l'homme rationnel devant le risque…,\" *Econometrica* 21(4):503–546（1953）**\nAllais 悖論的原始論文（法文）。即使讀不動全文，看他怎麼設計兩題來「狙擊」美國學派的公理也值得。（ch11）\n\n**Frank Ramsey, \"Truth and Probability\"（1926 撰，1931 身後出版，收錄於 *The Foundations of Mathematics*）**\n主觀機率「用賭率測量信念」這個想法的出生地；把信念度 translated 成可觀察的下注行為。（ch06）\n\n**Leonard Savage, *The Foundations of Statistics*（Wiley, 1954）**\n主觀期望效用的完整框架；sure-thing principle 出自這裡；Ellsberg 正是對它的反例。（ch04/06）\n\n**Herbert A. Simon, \"A Behavioral Model of Rational Choice\"（*Quarterly Journal of Economics*, 1955）**\nsatisficing 與 aspiration level 的原始論文，是 ch13 一切的源頭。（ch13）\n\n**Herbert A. Simon, *Administrative Behavior*（1947）**\n有限理性最早成形的地方，從組織內決策角度切入。（ch13）\n\n### 展望理論\n\n**Kahneman, D. & Tversky, A., \"Prospect Theory: An Analysis of Decision under Risk,\" *Econometrica* 47(2):263–291（1979）**\n（https://www.econometricsociety.org/publications/econometrica/1979/03/01/prospect-theory-analysis-decision-under-risk）\n展望理論出生證明，也是史上被引用最多的 Econometrica 論文；讀它如何把自己定位成**描述**理論（\"a critique of expected utility theory as a descriptive model\"）。（ch08/09/11/12）\n\n**Tversky, A. & Kahneman, D., \"Advances in Prospect Theory: Cumulative Representation of Uncertainty,\" *Journal of Risk and Uncertainty* 5(4):297–323（1992）**\n（https://link.springer.com/article/10.1007/BF00122574）\n累積展望理論（CPT），α=β=0.88、λ=2.25、γ=0.61、δ=0.69 這些數字的出處；讀「the value function」與「the weighting function」兩節，但記得這是估計值不是常數。⚠️（ch09/12）\n\n**⚠️ Walasek, Mullett & Stewart, \"A meta-analysis of loss aversion in risky contexts,\" *Journal of Economic Psychology* 103（2024）**\n（https://www.sciencedirect.com/science/article/pii/S0167487024000485）\n對 λ≈2.25「偏高」的整合分析，給出 λ≈1.31（CI 1.10–1.53）；讀它來校準「展望參數不是常數」的直覺（2026-06；全書最需定期回頭確認的一條）。（ch09/12/18）\n\n**Tversky, A. & Kahneman, D., \"Loss Aversion in Riskless Choice: A Reference-Dependent Model,\" *Quarterly Journal of Economics* 106(4):1039–1061（1991）**\n（http://bear.warrington.ufl.edu/brenner/mar7588/Papers/tversky-kahneman-qji1991.pdf）\n參考點依賴的直白版；兩個在最終財富上完全相同的選項因參考點不同而偏好翻轉。（ch08）\n\n**Tversky, A. & Kahneman, D., \"The Framing of Decisions and the Psychology of Choice,\" *Science* 211:453–458（1981）**\n框架效應與亞洲疾病問題的原始論文；短、清楚、數學門檻低。（ch10）\n\n**Tversky, A. & Kahneman, D., \"Rational Choice and the Framing of Decisions,\" *Journal of Business* 59(4)（1986）**\n把描述不變性的規範地位講透的那篇；「沒有理論能同時規範充分又描述準確」這句全書級結論的出處。（ch10）\n\n### 貝氏決策與資訊價值\n\n**Ronald A. Howard, \"Information Value Theory,\" *IEEE Transactions on Systems Science and Cybernetics* SSC-2(1):22–26（1966）**\n（https://en.wikipedia.org/wiki/Expected_value_of_perfect_information）\nEVPI 與「資訊價值＝機率 × 後果」的原始形式化；讀它看見這套理論如何刻意和 Shannon 資訊理論分家。（ch07）\n\n**Howard Raiffa & Robert Schlaifer, *Applied Statistical Decision Theory*（1961）**\nEVSI 與貝氏決策分析的奠基之作；「決策樹倒推 + 資訊價值」的完整工程化版本。（ch07/15）\n\n**Howard Raiffa, *Decision Analysis: Introductory Lectures on Choices under Uncertainty*（1968）**\n決策樹與倒推（rollback）的經典入門；「先探測再決定」如何系統化成樹。（ch15）\n\n**Casscells, Schoenberger & Graboys, \"Interpretation by Physicians of Clinical Laboratory Results,\" *New England Journal of Medicine*（1978）**\n（https://www.nejm.org/doi/full/10.1056/nejm197811022991808）\n基率忽視的招牌實驗——哈佛醫師最常答 95%（正確約 2%）；體會這是人類認知的系統性盲點。（ch05）\n\n**Gigerenzer & Hoffrage, \"How to Improve Bayesian Reasoning Without Instruction,\" *Psychological Review*（1995）**\n自然頻率法為何讓正確率大幅提升的理論根據；你日後要跟非技術同事解釋偽陽性時的最佳武器。（ch05）\n\n### 多屬性決策\n\n**Ralph Keeney & Howard Raiffa, *Decisions with Multiple Objectives: Preferences and Value Tradeoffs*（Wiley, 1976；Cambridge 1993 再版）**\n多屬性效用理論的奠基之作；看「偏好獨立／效用獨立」這些條件何時讓加權加總合法、何時必須改用乘法合成。（ch14）\n\n**Peter Fishburn, *Utility Theory for Decision Making*（1970）**\n加權加總法的「偏好獨立 ⇒ 可加分解」表現定理的嚴格版；行有餘力才翻。（ch14）\n\n### 沉沒成本\n\n**Hal Arkes & Catherine Blumer, \"The Psychology of Sunk Cost,\" *Organizational Behavior and Human Decision Processes* 35（1985）：124–140**\n沉沒成本謬誤的代表性實驗論文（劇院季票、滑雪票這些經典情境出自這裡）；看「人確實會被沉沒成本綁架」的乾淨實驗設計。（ch15）\n\n### 賽局理論（邊界外的指引）\n\n**Thomas Schelling, *The Strategy of Conflict*（1960）**\n謝林點、承諾、可信威脅的原典；ch16 交棒後的第一站。（ch16）\n\n**Stanford Encyclopedia of Philosophy, \"Game Theory\"**\n（https://plato.stanford.edu/entries/game-theory/）\n納許均衡、不動點、混合策略的嚴謹但可讀的入門；深入指向《賽局》全書。（ch16）\n\n### 概覽與科普\n\n**Stanford Encyclopedia of Philosophy, \"Decision Theory\"**\n（https://plato.stanford.edu/entries/decision-theory/）\n規範與描述決策理論的權威概覽；「三要素＋規範/描述」的學術版，也有序貫決策與有限理性的段落。（ch01/11/15）\n\n**Stanford Encyclopedia of Philosophy, \"The St. Petersburg Paradox\"**\n（https://plato.stanford.edu/entries/paradox-stpetersburg/）\n本書 ch02 史實的主要依據；讀「History」看 Nicolaus 1713 致 Montmort、Daniel 1738、Cramér；讀「Bounded utility」看效用為何沒真正終結悖論。（ch02）\n\n**Stanford Encyclopedia of Philosophy, \"Dutch Book Arguments\"**\n（https://plato.stanford.edu/entries/dutch-book/）\n把「信念自洽 ⇔ 滿足機率公理」說清楚；ch06 Dutch book 一節的主要依據。（ch06）\n\n**Stanford Encyclopedia of Philosophy, \"Interpretations of Probability\"**\n（https://plato.stanford.edu/entries/probability-interpret/）\n想看頻率派 vs 主觀派 vs 其他詮釋的完整地圖；對照 ch06「機率這個詞在扛兩個不同工作」的說法。（ch06）\n\n**Daniel Kahneman, *Thinking, Fast and Slow*（2011，中譯《快思慢想》）**\n展望理論作者本人寫給一般讀者的集大成之作；本書收的是「偏離的數學描述」，這本收的是「偏離的心理機制與作者本人的反省」（他承認研究一輩子照樣中招）。ch08 進入展望理論前翻一翻它的第四部（Choices）會很有感。（ch01/17/18）\n\n**MIT News, \"Explained: Knightian uncertainty\"（2010）**\n一頁科普，講 Knight 的區分為什麼在 2008 金融危機後重新被重視；快速複習「為什麼這條線到今天還重要」。（ch04）\n\n**Data Colada, \"[11] 'Exactly': The Most Famous Framing Effect Is Robust To Precise Wording\"**\n方法學部落格，檢驗亞洲疾病問題在精確措辭後是否仍穩健（結論：是）；想知道這個經典實驗在再現性風暴後站不站得住就讀它（hedge：部落格非論文，但作者群是知名方法學者）。（ch10）\n\n**Gerd Gigerenzer 等人，\"fast-and-frugal heuristics\" 研究系列**\n把 Simon 的有限理性接到「簡單規則在對的環境裡為何能勝過複雜模型」的現代延伸；讀「捷思不是次優、是生態理性」的論證，與本書 satisficing 觀點同調。（ch13）\n\n---\n\n## 給讀完全書的你：一道出口題\n\n你走到這裡，手上有五副眼鏡、兩個層次、一道裂縫。最後一個問題不是要你查書的：\n\n**挑你最近做過的一個決定（可以是技術選型、可以是要不要 rollback、可以是一次資源分配），用這五副眼鏡各看一遍：**\n\n1. 期望值怎麼說？\n2. 如果有隱含的效用函數，它是凹的嗎？拒絕正期望值的賭注是風險趨避的展現，還是真的判斷失誤？\n3. 你的先驗是什麼？看完資料（log、指標、測試結果）後後驗更新到哪裡？後驗 × 後果矩陣指向哪個行動？\n4. 你的決定有沒有被框架（措辭、別人怎麼描述）或參考點（上一版的水準、上季的目標）推著走？\n5. 你把分析做到哪一格停手？那個停手點，是 satisficing 還是偷懶？\n\n如果能對另一個工程師把這五個問題的答案講清楚，你就通過了這本書的口試。不需要答案完美——需要的是知道自己在哪個框架裡算。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="decide";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">在不確定中下注<br><span style="font-weight:400;font-size:12px;color:var(--muted)">決策與理性的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 在不確定中下注';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
