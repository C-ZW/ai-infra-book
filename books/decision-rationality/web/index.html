  money pump、被穩賺套利的風險，這套管。\n\n  「多數人面對這個賭會怎麼選、往哪偏？」→ 用展望理論（描述）。\n       設計介面、預測用戶行為、看穿自己的偏向，這套管。\n\n  「我實際上會怎麼選、我的偏向在哪、\n    我該設計什麼流程去補它？」         → 兩套一起用：\n       展望理論告訴你會偏哪，期望效用告訴你該往哪修。\n```\n\n最後一行是工程師最受用的一行，也是 ch17 會展開的：好的決策流程，正是**同時用兩套**——用描述（展望理論）認清自己會往哪偏，用規範（期望效用）知道該往哪修，中間用流程（checklist、預先承諾、外部視角）把落差補起來。就像你不靠記憶力靠 runbook：runbook 是規範（該做的步驟），你會漏步是描述（人腦有限），runbook 的存在正是為了補那道落差。承認落差、設計補償，這才是成熟，不是非要消滅落差、逼人變成期望效用機器。\n\n## 為什麼這道裂縫是穩定的、不是偶然的\n\n有人會退一步問：會不會這道裂縫只是實驗條件造成的偶然？換個情境、換批受試者，人就「正常」了，乖乖按期望效用選了？\n\n不會，而且「為什麼不會」正是展望理論最硬的地方。這道裂縫穩定，有幾個層次的理由：\n\n**一、方向可預測，不是隨機。** 如果是偶然誤差，方向會亂跳、平均抵消。但反射效應永遠是「得區趨避、失區愛好」這個方向，不會反過來；小機率永遠被高估、不會被低估。方向固定，就不是噪音（這點上一節已論，這裡是它在「穩定性」上的後果）。\n\n**二、跨情境、跨人群穩健。** 損失趨避這個**現象本身**——失比得更重——在很多文化、很多領域被重複觀察到，相當穩健（2026-06）。框架效應對專家一樣有效，連受過機率訓練的人、連 Kahneman 自己都躲不掉（ch10 已強調）。一個只要稍微改條件就消失的效應不會這麼出名；它出名正因為它**賴著不走**。\n\n**三、它咬在「人怎麼編碼問題」的層次，而不是「人算錯了」的層次。** 這是最深的一層。人偏離期望效用，不是因為加減乘除算錯了（那種錯一指出來就會改），而是因為人在**更前面一步**——把問題編碼成「得與失」而不是「最終狀態」——就已經分岔了。你沒辦法靠「算仔細一點」修掉它，因為錯不在計算，在編碼。這也是為什麼你**知道**框架效應存在、下一次照樣中招：知識在計算層，偏向在編碼層，知識管不到編碼。\n\n但這裡必須誠實踩一下煞車——這是本書最該 hedge 的一節。\n\n## 誠實標示：哪些是穩的、哪些會晃（再現性與參數）\n\n展望理論不是鐵板一塊。把它的東西分成兩堆，一堆穩、一堆會晃，這是一個誠實的人讀完 Part III 該有的態度：\n\n```text\n穩的一堆（現象，相對穩健）        會晃的一堆（具體參數，有爭議）\n─────────────────────────         ──────────────────────────────\n參考點依賴（人估變化不估狀態）    λ = 2.25（損失趨避係數的具體值）\n損失趨避現象（失比得重）          α = β = 0.88（價值函數曲率）\n反射效應（得失風險態度相反）      γ = 0.61、δ = 0.69（機率權重參數）\n機率權重倒 S（小機率被高估）      ↑ 這些是 TK1992 的「一組中位估計」\n框架效應（措辭改變選擇）          而不是物理常數，不同研究差很多。\n```\n\n左邊那堆——**現象本身**——相對穩健，本書放心用。右邊那堆——**具體參數值**——是本書最該打折扣的東西，引用時務必 hedge。把這件事講到位：\n\nα=β=0.88、λ=2.25、γ=0.61、δ=0.69 是特沃斯基與康納曼 1992 年那篇累積展望理論（\"Advances in Prospect Theory\"，*Journal of Risk and Uncertainty*）給的**一組中位估計**（2026-06）。它們**不是物理常數**——不是像光速那樣量一次就定了的東西，而是從一群受試者的選擇反推出來的中位數，換一群人、換一個領域、換一種估計方法，數字會變。\n\n具體變多少？2024 年一篇隨機效應的 meta-analysis（Brown 等人，*Journal of Economic Psychology*）給出的損失趨避係數是 **λ≈1.31**（95% 信賴區間約 1.10–1.53），並指出 TK1992 的 2.25「可能偏高」；其他研究依領域給的範圍大約落在 1.8–2.7（2026-06）。換句話說，**最常被引用的那個 2.25，和近期 meta-analysis 的 1.31，差了快一倍。**\n\n這個差距大到能翻轉結論，ch09 已經示範過一次，這裡再點明它的意義。脊椎賭注用 λ=2.25 算出展望價值約 −11.8（拒絕）；換成 λ=1.31 重算：\n\n```text\n脊椎賭注的展望重算對參數的敏感（先用 w(p)=p 簡化）\n  v(+200) = 200^0.88 ≈ 105.9\n  v(−100) = −λ·100^0.88，100^0.88 ≈ 57.5\n\n  用 λ=2.25：加權值 ≈ 0.5·105.9 − 0.5·(2.25·57.5)\n           = 0.5·105.9 − 0.5·129.5 = 52.95 − 64.75 = −11.8 < 0 → 拒絕\n  用 λ=1.31：加權值 ≈ 0.5·105.9 − 0.5·(1.31·57.5)\n           = 0.5·105.9 − 0.5·75.3 = 52.95 − 37.65 = +15.3 > 0 → 接受(!)\n\n  ⇒ 光是換損失趨避係數（兩個都是真實文獻給的值），同一個賭注\n    從「拒絕」翻成「接受」。具體參數值有這麼大的影響力。\n  （v 值為示意，依 α=0.88 手算保留 1 位小數；自我複核見下）\n```\n\n複核一下指數：ln200≈5.2983，0.88·5.2983≈4.6625，exp(4.6625)≈105.9 ✓；ln100≈4.6052，0.88·4.6052≈4.0526，exp(4.0526)≈57.5 ✓；2.25·57.5≈129.4，1.31·57.5≈75.3 ✓。\n\n所以本書的態度是：**用展望理論的形狀（v 的得凹失凸、失更陡；w 的倒 S），但對它的具體參數值打折扣。** 形狀承載了所有的定性結論（為什麼拒絕、為什麼框架翻轉、為什麼買樂透又買保險），這些穩；參數的精確值是「常被引用的一組估計、有再現性討論、會隨研究更新」，這些晃。任何把 λ=2.25 當成「人類損失趨避的真值」來用的論述，都犯了把估計當常數的錯（這是 ch09 那個具名陷阱的全 Part 版）。\n\n還有一道更細的裂縫值得標：實驗室 vs 田野。展望理論的參數多半從實驗室的假想賭局估出來；真實世界裡的決策有更多脈絡（你不是孤立地面對一個賭，你有預算、有情緒、有別人在看），效應的大小未必照搬。這不否證展望理論，只是提醒：**從受控實驗外推到真實決策，要留餘地。** 這也是你下一節「會對它打折扣的兩個理由」的第二個。\n\n## 明確交棒：心理機制歸《思考的陷阱》\n\n到這裡，本書對展望理論能說的，基本說完了——因為本書只負責它的**一半**。這是「理性三角」的第一個明確交棒點，得把界線畫清楚。\n\n回想 ch08 那條我答應「ch12 會正式畫清」的交棒線。本書是**理性的規範基準**：凡涉及「單人在不確定下該怎麼選」的數學，本書寫透。展望理論在本書的位置很特別——它是個**描述**模型，照理不是規範書的主場，但本書收它，因為它的**數學描述**正是「規範被掀翻」這件事的精確刻畫，不收就講不清那道裂縫。所以本書收的是展望理論的**數學**：v(x)、w(p)、參考點、四根支柱各自的形狀與後果。\n\n但展望理論還有另一半，本書**刻意不收**：\n\n```text\n展望理論的兩半，本書只收一半\n\n  數學描述（本書收，ch08–12）          心理機制（指向《思考的陷阱》）\n  ──────────────────────────          ──────────────────────────────\n  v(x)、w(p)、參考點的形狀             為什麼人按參考點記帳？\n  四根支柱各掀翻哪條公理              損失趨避的演化／神經由來是什麼？\n  脊椎賭注的展望重算                  框架為什麼有效、為什麼你察覺不到？\n  描述 vs 規範的範疇區分              快思（系統一）與慢想（系統二）怎麼分工？\n                                      捷思（heuristic）怎麼運作、何時失效？\n```\n\n右邊那一整欄——**為什麼**人會這樣偏、偏的心理與演化成因、為什麼你明知道卻躲不掉——是「人腦怎麼運作」的問題，不是「決策的數學是什麼」的問題。它指向《思考的陷阱》談雙系統與捷思。本書講「偏離長什麼樣、可以寫成什麼數學」（描述的**形狀**），它講「偏離為什麼會發生、人為什麼察覺不到」（描述的**成因**）。兩本書是同一道裂縫的兩面：本書接數學，它接心理。\n\n這就帶出「理性三角」——這套推理書裡，有三本書圍著「理性」這個主題，各守一個角，在交界處互相指：\n\n```text\n理性三角（三本書各守一角，交界互指；本章是第一個交棒點）\n\n                    決策（本書）\n                 「規範上該怎麼選」\n                 ＋「偏離的數學描述」\n                  /              \\\n                 /                \\\n     偏誤《思考的陷阱》───────《如何不騙自己》科學方法\n    「偏離的心理機制」          「制度上怎麼防自欺」\n    （雙系統、捷思、           （貝氏確證、實驗設計、\n      為何察覺不到）             同儕審查、制度防線）\n```\n\n同一個決策失誤（比方 ch05 的基率忽視導致誤判一次 incident），三本書各說一句：**決策書**說「規範上後驗該怎麼算、你算錯在哪」；**偏誤書**說「心理上你為什麼會把敏感度當後驗、為什麼這個錯這麼自然」；**科學方法書**說「制度上怎麼設計流程（自然頻率呈現、checklist、外部審查）讓這個錯不容易發生」。三句都對、互不否證，因為它們在三個不同的層次。ch17 會把這個三角完整鋪開，這裡先立起來——展望理論的數學在本書收尾了，它的心理機制，從這一頁起，交棒給偏誤書。\n\n## 直覺的陷阱\n\nPart III 走到收束，最危險的兩個誤讀都在「描述 vs 規範」這條線上。守住 landscape 的正確版（T6、T7）。\n\n| 陷阱 | 錯誤直覺長什麼樣 | 它在哪一步帶你下溝 | 正確版（怎麼自我察覺） |\n|---|---|---|---|\n| **「展望理論證明了人不理性／期望效用沒用了」**（T7） | 「實驗證明人系統性違反期望效用，所以期望效用是錯的、過時了，以後談決策用展望理論就好。」 | 把「期望效用的**描述身份**失敗」誤讀成「期望效用整個錯了」。一旦這樣讀，你會丟掉規範基準——但「該怎麼選」的問題展望理論根本沒回答，你等於把唯一回答這個問題的工具扔了。 | 兩套數學描述**兩件不同的事**：期望效用回答「該怎麼選」（規範，沒被推翻），展望理論回答「實際怎麼選」（描述，準確）。徵兆：當你想說「所以期望效用沒用了」時——問自己，沒用在回答**哪個**問題上？它在「該怎麼選」上完全還在，只是不該被當成「人實際怎麼選」的模型。 |\n| **把實驗室參數當普世常數**（T6） | 「λ=2.25 就是人類損失趨避的值，得失是 2.25 倍的關係，這是定律。」 | 把 TK1992 的一組**中位估計**當成**物理常數**。一旦這樣用，你會拿一個會晃的數字去做精確推論——換個 meta-analysis（λ≈1.31）結論就翻了，你的論述跟著垮。 | α=β=0.88、λ=2.25、γ=0.61、δ=0.69 是 TK1992 的中位估計、**非常數**；Brown 等人 meta-analysis 給 λ≈1.31（CI 約 1.10–1.53）；其他個別研究給的範圍約 1.8–2.7；兩者與 TK1992 的 2.25 都差快一倍（2026-06）。**現象**（失比得重）穩，**參數值**晃。徵兆：當你在論述裡寫死一個展望參數時——加一句「這是常被引用的一組估計、不是常數」，如果加了這句你的結論就站不住，那你本來就是踩在浮沙上。 |\n| **以為「描述」和「規範」必須選一個**（中央張力的全 Part 版） | 「規範說該這樣、描述說人那樣，總有一個是對的，我得選邊站。」 | 把兩個回答不同問題的理論，當成在競爭同一個答案——這是範疇錯誤。一旦這樣想，你會永遠在「人到底理不理性」這個假問題上打轉。 | 它們回答的不是同一個問題（該怎樣 vs 實際怎樣），所以不需要選邊，可以同時為真。徵兆：當你發現自己在問「展望理論和期望效用到底哪個對」時——停，問「對在回答**哪個**問題上」，你會發現它們各對各的。 |\n\n第三個陷阱是這章、也是全書中央張力最該帶走的工具。**「該怎樣」和「實際怎樣」不是競爭關係，是分工關係。** 把這句話內化，你看任何「人類其實很不理性」的暢銷書論述，都會自動補一個問號：它在偷偷把「實際怎樣」當成「該怎樣」的反證嗎？多半是。\n\n## 紙上推演\n\n純紙筆推演，不要碰任何程式碼。每題標難度與時間，先自己想/算，再讀解答。\n\n---\n\n**題 1（★★，20 分鐘）**：把展望理論的四根支柱，各對應到一條被它違反的規範要求，並各舉一個本書前面出現過的具體例子。做成一張你自己的對照表（不准翻前面的總帳表，憑理解默寫，寫完再回去對）。四根支柱：參考點、損失趨避、機率權重、框架。\n\n**題 2（★★★，15 分鐘，口頭）**：用自己的話，對一個堅持「展望理論證明了期望效用是錯的、該被淘汰」的工程師，解釋他錯在哪。要點到「期望效用的兩個身份」「失敗的是哪一個」「為什麼『作為描述失敗』不等於『錯了』」。目標是讓他承認「該怎樣」和「實際怎樣」是兩個問題。\n\n**題 3（★★，15 分鐘）**：列出兩個「你會對展望理論打折扣」的理由，並各用一句話說明為什麼。提示：一個跟參數有關，一個跟外推有關。然後回答：打了這兩個折扣之後，展望理論還剩下什麼是你願意相信的？\n\n---\n\n### 推演解答\n\n**題 1 解答**\n\n對照表（默寫版該長這樣，細節對到即可）：\n\n```text\n四根支柱 × 被掀翻的規範要求\n\n  參考點   ↔  對最終狀態估值（asset integration）\n    例：最終財富 1100，從參考點 1000 看是「得」、從 1200 看是「失」\n        ——終點一樣估值相反，規範記帳法裡不可能（它沒有參考點這零件）。\n\n  損失趨避 ↔  得失對稱\n    例：脊椎賭注 |v(−100)| 被 λ≈2.25 放大壓過 v(+200)，\n        機率相等、期望值為正仍拒絕——失比得重，不對稱。\n\n  機率權重 ↔  機率線性（EU 對 p 線性）\n    例：w(p)≠p，小機率被高估、中大機率被低估（倒 S）；\n        同一人買樂透又買保險——不是不一致，是 w(p) 兩端的形狀。\n\n  框架     ↔  描述不變性（description invariance）\n    例：亞洲疾病問題，得框架選穩、失框架選賭，邏輯等價措辭不同\n        選擇翻轉——措辭幫你挪了參考點。\n```\n\n常見錯路：(1) 把「損失趨避」對到「描述不變性」——錯，損失趨避違反的是「得失對稱」（規範理論裡根本沒有損失這個特殊範疇）；違反描述不變性的是框架。(2) 漏掉「框架其實是參考點的另一面」「確定性效應其實是機率權重的另一面」這層咬合——四根支柱不是四個獨立的錯，是少數幾個機制（參考點記帳、損失放大、機率非線性）生成的。能說出這層咬合，才算真懂這張表。\n\n**題 2 解答**\n\n完整版該包含三步：\n\n第一步，**拆開期望效用的兩個身份**。期望效用一直背著兩個身份：規範的「你**該**怎麼選」（由 vNM 公理逼出來），和描述的「人**實際**怎麼選」（經濟學長期拿它當人類行為模型）。1944 年之後這兩個身份綁在一起用，沒人分。\n\n第二步，**指出失敗的是哪一個**。展望理論攻擊的是**描述身份**——它用一堆實驗證明「把期望效用當成人實際怎麼選的模型，是錯的」。它**完全沒碰規範身份**——沒證明 vNM 公理錯、沒證明「該怎麼選」的標準有誤。Allais 的論文談的是「行為」（描述），不是重寫公理（規範）。\n\n第三步，**說清為什麼「作為描述失敗」不等於「錯了」**。一個 design doc 沒人完全照著做（描述失敗），不代表 design doc 寫錯了（規範可以完全正確）——可能只是人腦成本有限做不到理想。期望效用作為「該怎麼選」的標準可以完全成立，同時作為「人實際怎麼選」的模型徹底失敗。兩件事不衝突。\n\n目標達成的標誌：那位工程師能說出「喔，所以『人不這樣選』和『人不該這樣選』是兩回事，展望理論只證了前者」。常見錯路：自己也滑進「所以期望效用確實有問題」——沒有，它在「該怎麼選」上一個字沒被動到，被動到的只是「拿它當人類行為模型」這個用法。\n\n**題 3 解答**\n\n兩個折扣：\n\n```text\n理由一：參數不是常數（再現性）\n  λ=2.25、α=β=0.88、γ=0.61、δ=0.69 是 TK1992 的一組中位估計，\n  不是物理常數。Brown 等人 meta-analysis 給 λ≈1.31（CI 約 1.10–1.53）、其他研究範圍約 1.8–2.7，均與 2.25 差快一倍，\n  大到能把脊椎賭注從「拒絕」翻成「接受」。引用具體參數值要 hedge。\n\n理由二：實驗室外推到田野要留餘地\n  參數多半從實驗室的假想賭局估出；真實決策有預算、情緒、社會脈絡，\n  效應大小未必照搬。從受控實驗推到真實世界，要打折扣。\n```\n\n打完兩個折扣後還剩什麼願意相信？**剩下「現象」與「形狀」，扔掉的是「精確的參數值」。** 也就是：人估變化不估狀態（參考點依賴）、失比得重（損失趨避現象）、得失風險態度相反（反射效應）、小機率被高估（機率權重倒 S）、措辭能翻轉選擇（框架）——這些**定性的、有方向的**結論，跨情境跨文化相當穩健，本書放心用。會晃的只是「失比得**剛好** 2.25 倍」這種**精確數值**。常見錯路：因為參數有爭議，就把整個展望理論一起扔掉——那是把洗澡水和嬰兒一起倒了。現象和形狀承載了全部定性洞見，它們穩；只有精確參數值該打折。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先回答「為什麼」。\n\n1. 「展望理論證明了期望效用是錯的」——這句話錯在哪？期望效用有哪兩個身份、失敗的是哪一個、為什麼「作為描述失敗」不等於「錯了」？\n2. 用一句話講清全書的中央張力的**正面回答**：規範與描述之間那道裂縫，為什麼不是 bug、不需要選邊？（要點到「兩套都對的數學、描述兩件不同的事」。）\n3. 展望理論真正了不起的，不是「發現人偏離期望效用」，而是什麼？「結構性偏離」和「隨機偏離」差在哪一句話上？\n4. 把四根支柱（參考點、損失趨避、機率權重、框架）各對應到一條被違反的規範要求。哪兩對支柱其實是「同一件事的兩面」？\n5. 這道描述 vs 規範的裂縫為什麼是**穩定**的、不是實驗偶然？「它咬在『人怎麼編碼問題』而不是『人算錯了』的層次」這句話什麼意思？為什麼這解釋了「你知道框架效應還是會中招」？\n6. 展望理論的東西，哪些穩（放心用）、哪些晃（要 hedge）？λ=2.25 換成 1.31 對脊椎賭注的結論有什麼影響？這對你「引用展望參數」有什麼戒律？\n7. 「理性三角」是哪三本書、各守哪個角？本章為什麼是第一個交棒點——展望理論的哪一半留在本書、哪一半交給《思考的陷阱》？\n8. 為什麼說好的工程流程（runbook、checklist、預先承諾）正是「同時用兩套」？描述告訴你什麼、規範告訴你什麼、流程補的是什麼？\n\n## 延伸閱讀\n\n以下連結在 2026-06 查證過（年份、歸屬以本書 landscape 為事實錨點，該檔由帶網路研究流程查證），優先放權威來源。\n\n- **Kahneman, D. & Tversky, A., \"Prospect Theory: An Analysis of Decision under Risk\"（*Econometrica* 47(2):263–291, 1979）**（https://www.econometricsociety.org/publications/econometrica/1979/03/01/prospect-theory-analysis-decision-under-risk）— 展望理論的出生證明。讀它的開頭幾頁就好：它一開篇就把自己定位成**描述**理論（\"a critique of expected utility theory **as a descriptive model**\"），明說期望效用作為「人實際怎麼選」的模型失敗了——這正是本章「斬斷兩個身份」的原典依據。本章那句「它攻擊描述身份、沒碰規範身份」，原文比任何轉述都講得清楚。\n- **Tversky, A. & Kahneman, D., \"Advances in Prospect Theory: Cumulative Representation of Uncertainty\"（*Journal of Risk and Uncertainty* 5(4):297–323, 1992）**（https://link.springer.com/article/10.1007/BF00122574）— 累積展望理論，本章那組參數（α=β=0.88、λ=2.25、γ=0.61、δ=0.69）的出處。讀它就是為了知道這些數字**從哪來、怎麼估的**——一旦你看到它是「從一群受試者反推的中位估計」，你就再也不會把它當物理常數了。\n- **Brown, A. L. 等人的損失趨避 meta-analysis（*Journal of Economic Psychology*, 2024）**（https://www.sciencedirect.com/science/article/pii/S0167487024000485）— 本章 hedge 的依據。它用隨機效應給出 λ≈1.31（CI 約 1.10–1.53），並指 TK1992 的 2.25「可能偏高」。讀它是為了親眼看到「最常被引用的參數值，和近期 meta-analysis 差快一倍」——這是「別把估計當常數」最有力的證據（2026-06，再現性討論仍在進行，視為當前狀態）。\n- **偏離的心理機制與雙系統**——本章只收了展望理論的**數學描述**（偏離長什麼樣、可寫成什麼數學）。人**為什麼**這樣偏、為什麼明知卻躲不掉、快思慢想怎麼分工、捷思怎麼運作——這些**心理機制**指向《思考的陷阱》談雙系統與捷思。本章是理性三角的第一個明確交棒點：本書接數學，偏誤書接心理。\n- **規範那一側的原典**——本章對照的「規範身份」，完整內容在 ch03（vNM 四公理、凹＝風險趨避、表現定理的直覺）。想重溫「為什麼公理逼出唯一演算法」這道規範之美，回 ch03；想看四根支柱各自怎麼立起來，回 ch08（參考點）、ch09（損失趨避與機率權重）、ch10（框架）、ch11（Allais 與獨立公理）。本章是它們的總帳。\n"}, {"id": "ch13-bounded-rationality-satisficing", "file": "ch13-bounded-rationality-satisficing.md", "group": "Part IV — 有限理性", "title": "ch13 — 有限理性與 satisficing：Simon", "md": "# ch13 — 有限理性與 satisficing：Simon\n\n> **本章解決什麼問題**：前面十二章預設了一顆「無限的腦」——算期望效用要把所有結果都列出來、貝氏決策要把所有狀態都加權、展望理論精準地描述人怎麼偏離。但所有這些演算法都假裝了一件事：**算這些本身不要錢。** 真實的腦與真實的機器不是這樣。本章是 Part IV（有限理性）的第一章，把「最佳化」放回一顆成本有限的腦裡：賽門（Herbert Simon）的有限理性（bounded rationality）與 satisficing（夠好就停）。它既描述人實際怎麼決定，又給出在成本約束下「該怎麼做」的修正版規範——理性的盡頭不是放棄，是知道在哪一格該停手。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦       ◄ 你在這裡\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n這張圖換了個方向。前三個 Part 是一場拉鋸：Part I–II 搭起「該怎麼選」那座漂亮的橋（期望效用、貝氏決策），Part III 證明真實的人系統性地不走在橋面正中央（展望理論）。你大概以為 Part IV 會繼續挖「人哪裡又錯了」——不會。Part IV 換一個更根本的問題：**前面那些演算法，本身要花多少力氣去算？** 而當你把「算的成本」也算進去，會冒出一個讓人不太舒服的結論——很多時候，**不把帳算到底，才是理性的。**\n\n我認為這是整本書最容易被工程師低估、卻最貼近你日常的一章。因為你早就在做 satisficing，只是沒人告訴你它有名字、而且它不是偷懶。\n\n## 從你已知的出發\n\n你要為一個新服務選一個 HTTP client library。市面上有幾十個選項。一個「完全理性」的選法是這樣的：把所有候選 library 列出來，逐個讀原始碼、跑 benchmark、評估維護狀態、量測記憶體足跡、模擬各種失敗模式、估算未來三年的維護成本，然後對每一個算出一個總效用，挑最大的那個。\n\n你不會這樣做。你做的是另一件事：心裡先設一條線——「star 數別太離譜、最近半年有 commit、API 看起來順手、文件不爛、跟我們的 runtime 相容」。然後你打開搜尋結果，**遇到第一個跨過這條線的，就用它**，去寫下一個 ticket 了。你沒有去證明它是最好的；你只證明了它**夠好**。\n\n這就是 satisficing。它不是你偷懶——它是因為你算過另一筆帳：把幾十個 library 評到底的成本（你的時間、注意力、機會成本），遠遠超過「從一個夠好的跳到那個理論最佳的」所能多省下的東西。在一個搜尋本身有代價的世界裡，**「找到夠好就停」常常就是真正的最佳解。**\n\n這個直覺在你的系統裡到處都是，只是換了名字：\n\n- **timeout 與 retry 上限**：你不會無限等一個慢請求「等到拿到最完美的回應」。你設一個門檻——「200ms 沒回就放棄、retry 三次就降級」。這不是因為更久一定更差，而是因為**繼續等的成本超過繼續等的期望收益**。timeout 就是 satisficing 的時間版：不等最佳答案，等到「夠好或夠久」就動作。\n- **容量規劃**：你不會把每一種可能的流量分布都建模到最後一位小數再決定要開幾台機器。你抓一個「夠安全的 buffer」就拍板。多算的精度，換不回多開兩台機器省下的錢。\n- **incident 診斷**：凌晨三點你不會把所有可能的 root cause 都查到底。你查到一個「夠能解釋現象、而且止得住血」的原因就先止血——把完整的 root cause 留給白天的 postmortem。在那個當下，**「夠好的解釋＋有效的止血」勝過「完美的解釋＋多流十分鐘的血」。**\n- **code review**：你不會把每一行都讀到能寫形式化證明的程度。你讀到「夠有信心沒有明顯的坑」就 approve。把每個 PR 都 review 到 100% 確定，整個團隊會卡死。\n\n注意這四件事的共同結構：**你不是在找最大值，你是在設一個「可接受門檻」，然後在搜尋本身有成本的前提下，達標就停。** 賽門給這個動作起了名字——satisficing，這個英文字是他把 satisfy（滿足）和 suffice（足夠）拼起來造的。而它背後那套更大的世界觀，叫有限理性。\n\n你已經有的直覺，這章只是把它擦亮、寫精確：\n\n- 你知道「算到底」本身要花時間與注意力——這就是有限理性的核心，理性受**認知與資訊成本**所「界」。\n- 你天天設門檻而不求最佳（timeout、retry 上限、buffer）——這就是 satisficing。\n- 你隱約覺得「設門檻就停」有點心虛、像是次優——這章要拆掉這個心虛：把搜尋成本算進去，它可能就是最優。\n\n## 隱藏的成本：那座漂亮的橋，過橋費誰付？\n\n回頭看前面十二章。每一個演算法都假設了一件你沒注意到的事——**算這個演算法本身是免費的。**\n\n- 期望效用最大化（ch03）假設你能把**所有**可能結果列出來、對每個都算好 u、加權求和。\n- 貝氏決策（ch05）假設你能把**所有**狀態列出來、對每個都有先驗、把效用矩陣填滿。\n- 資訊的價值（ch07）假設你能把「做檢查 vs 不做」的整棵決策樹倒推到底——但「算這棵樹」本身要不要算進成本？這章會回答：要。\n- 展望理論（ch08–12）甚至假設人腦在每個賭局上都跑了一遍 v(x) 與 w(p) 的計算。\n\n這些假設在紙上沒問題。但賽門看到的是：**真實的決策者——人或機器——沒有無限的時間、無限的注意力、無限的算力去把這些算到底。** 把「全知全能的最佳化者」當成理性的模型，等於假設過橋不要錢。賽門的洞見是：**過橋費是真的，而且常常貴到你不該過完整座橋。**\n\n他用一個很漂亮的比喻：理性的行為像一把剪刀，由兩片刀刃決定——**一片是環境的結構，另一片是決策者的認知能力。** 古典經濟學只盯著環境那一片（「最佳解在哪裡」），假裝另一片無限鋒利。賽門說：你得同時看兩片，因為真正剪下去的形狀，是兩片一起決定的。（這個「剪刀」比喻是賽門常被引用的說法；我把它當作直覺工具，精確的出處表述以延伸閱讀為準。）\n\n這把剪刀換成工程的話：**最佳的閾值在哪裡（環境），跟你有多少時間/算力去逼近它（認知），共同決定你實際該停在哪。** 一個只看環境的人會說「理論最佳 timeout 是 187ms」；一個懂有限理性的人會說「在我能投入的分析量下，設 200ms 已經夠好，再精調的收益不值得我多花的時間」。\n\n賽門因為這套對「組織內決策過程」的研究，1978 年拿了諾貝爾經濟學獎（照 landscape 史實）。值得停一下品味這件事的反骨：**一個人因為證明「人不是、也不該是那個全知的最佳化者」而拿了經濟學的最高榮譽**——在一門幾乎整個建立在「理性人會最佳化」假設上的學科裡。\n\n## 有限理性：理性被什麼「界」住\n\n「有限理性」這個詞容易被誤讀成「打折的理性」「次等的理性」。不是。它的精確意思是：**理性是真的，但它受三道牆所「界」（bounded）。**\n\n```text\n  完全理性（古典經濟學的假設）              有限理性（Simon）\n  ─────────────────────────              ─────────────────────────\n  選項：全部已知、可窮舉                    選項：只看到一部分、且是逐個浮現的\n  後果：每個選項的後果都算得出              後果：算後果本身要花算力，算不完\n  偏好：完整、穩定、一次排好序              偏好：邊做邊形成，常用一個門檻代替排序\n  目標：找全域最大值（maximize）           目標：找第一個夠好的（satisfice）\n\n  共同前提：算這一切是免費的         ←      被推翻的就是這一條\n```\n\n三道牆，每一道你都熟：\n\n1. **選項不是一次給齊的。** 你選 library 時，搜尋結果是一頁一頁滾出來的；候選方案是一個一個冒出來的。你沒有「所有可能選項」的完整清單擺在面前——你有的是一條會逐漸吐出選項的流。這跟期望效用「把所有彩券排好序」的圖像差很遠。\n\n2. **算每個選項的後果要花算力，而算力有限。** 把一個 library 真正評估到底（讀碼、benchmark、估維護成本），每個都要幾小時。評估本身是一個有成本的動作。所以「對所有選項都算出精確效用」不是不想做，是**做不完、也不划算**。\n\n3. **偏好不是預先排好的，是邊做邊長出來的。** 古典理論假設你心裡早有一張把所有結果排好序的完整偏好表。真實情況是：你常常是「看到一個夠好的，才知道自己原來能接受什麼」。所以你用一條**門檻**（aspiration level，抱負水準）代替那張不存在的完整排序表。\n\n把這三道牆放在一起，「最佳化」這個動作就站不住了——不是因為它錯，是因為**執行它的前提（免費的全知）不成立**。於是賽門換了一個動作：satisficing。\n\n## satisficing：設一條門檻，達標就停\n\nsatisficing 的機制簡單到你會懷疑它怎麼配得上一個諾貝爾：\n\n```text\n  1. 設一個 aspiration level（抱負水準）：一條「夠好」的門檻。\n  2. 一個一個檢視浮現的選項。\n  3. 遇到第一個達標（≥ 門檻）的，就選它、停止搜尋。\n  4.（可選）若搜尋很久都沒達標，把門檻往下調一點，再繼續。\n\n  關鍵：它不比較「這個是不是所有選項裡最大的」——它只問「這個夠不夠好」。\n```\n\n跟最佳化（maximizing）的差別，全在第 3 步：\n\n- **最佳化**問：「在**所有**選項裡，哪個最大？」——你必須（至少在原則上）看完全部，才能宣稱找到了最大值。\n- **satisficing** 問：「**這一個**夠不夠好？」——你可以在看完全部之前就停手，因為你不需要證明它最大，只需要證明它過門檻。\n\n這個差別在「搜尋有成本」的世界裡是決定性的。最佳化要你付「看完全部」的代價；satisficing 讓你在「期望要再看多少個才會更好」與「再看下去要付多少成本」之間，自然地停在一個點。\n\n這裡有一個讓我覺得很優雅的轉折，也是這章最該停下來品的一頁——**satisficing 在更高一層看，常常就是最佳化。**\n\n聽起來矛盾，拆開就懂了。把問題從「哪個選項最好」抬高一層，變成「**包含搜尋成本在內，我整體的期望淨收益最大化的策略是什麼**」。在這個元層次（meta-level）上，「看完全部選最大」往往**不是**最優的——因為最後幾個小時的搜尋，省下的收益遠不及它花掉的成本。在元層次上最優的策略，恰恰是「設一條合理的門檻、達標就停」。\n\n換句話說：**satisficing 不是放棄最佳化，它是在『把搜尋成本一起算進去』這個更誠實的問題上做最佳化。** 古典最佳化只在「選項層次」最佳化（假裝搜尋免費）；satisficing 在「元層次」最佳化（承認搜尋有費）。誰更理性？如果搜尋真的有成本——而它總是有——那是後者。\n\n這正是這章碰全書中央張力（規範 vs 描述）的點，而且碰的方式跟 Part III 不同。展望理論是**純描述**（人這樣選，但規範說不該）。satisficing 兩邊都站：它**描述**了人真的怎麼決定（設門檻、夠好就停），同時又是一個**修正後的規範**（在成本有限下，你**該**這樣做）。有限理性不是規範與描述的又一道裂縫——它是把兩者**接起來**的橋：當你把「思考有成本」這個現實寫進規範，規範自己就往描述靠了過去。\n\n## worked example：找 library 的 satisficing vs 最佳化\n\n把直覺變成數字。你要選一個 library，候選會**逐個**浮現（像搜尋結果一頁頁滾）。為了能手算，我們把「品質」量化成一個分數，並做一組簡化假設——這組數字是**示意的教學模型**，不是經驗測量，目的是讓「夠好就停」與「看完全部」的差額看得見。\n\n設定：\n\n- 每個候選 library 的品質分數，獨立地落在 0 到 100 之間、均勻分布（每個整數分數機會均等）。\n- 評估**一個**候選要付**搜尋成本 c = 5 分**（換算成同一把尺：讀碼、benchmark、開會的時間折算成「品質分」）。\n- 你的淨收益 ＝（最後選中的 library 品質分）−（你總共評估了幾個 × 5）。\n- 兩種策略：\n  - **策略 M（最佳化）**：評估**全部 10 個**候選，選分數最高的。\n  - **策略 S（satisficing）**：設 aspiration level ＝ 80 分，從第一個開始看，**遇到第一個 ≥ 80 的就選它、停手**；若 10 個都沒達標，選已看過裡最高的。\n\n先算策略 S 平均要看幾個。單一候選達標（≥80）的機率：分數 0–100 均勻，達標區間是 80–100，約佔 21/101 ≈ 0.208（為手算乾淨，取 p ≈ 0.2）。「看到第一個達標前的次數」是幾何分布，期望次數 ≈ 1/p ＝ 1/0.2 ＝ 5 個（在 10 個上限內，先忽略「都沒達標」的尾巴，後面修正）。\n\n```text\n策略 S（satisficing，門檻 80，搜尋成本 c=5/個）\n─────────────────────────────────────────────\n  期望評估個數 ≈ 1/p = 1/0.2 = 5 個\n  選中者的品質：達標即停，落在 [80,100]，期望 ≈ 90 分\n  期望淨收益 ≈ 90 − (5 個 × 5) = 90 − 25 = 65 分          ← 達標就停\n\n策略 M（最佳化，看完全部 10 個取最大）\n─────────────────────────────────────────────\n  評估個數：固定 10 個\n  10 個 [0,100] 均勻取最大，期望 ≈ 100·10/11 ≈ 91 分      ← 最大值期望公式 n/(n+1)\n  期望淨收益 ≈ 91 − (10 個 × 5) = 91 − 50 = 41 分          ← 看完全部\n\n差額：S 的淨收益 65 > M 的淨收益 41，領先 24 分\n```\n\n自我複核這幾個數：\n\n- 幾何分布期望次數 1/p ＝ 1/0.2 ＝ 5。✅\n- n 個 [0,1] 均勻變數的最大值期望是 n/(n+1)，n=10 給 10/11 ≈ 0.909，乘 100 ≈ 91。✅（這是常用結果，給直覺：看越多個、最大值越逼近上界，但逼近得越來越慢——邊際遞減。）\n- S 的選中品質：均勻分布在 [80,100] 上達標時的條件期望是 (80+100)/2 ＝ 90。✅\n- 淨收益：S ＝ 90 − 25 ＝ 65；M ＝ 91 − 50 ＝ 41。✅\n\n讀這張表的重點不是 65 跟 41 的精確值（它們依賴我隨手設的 c 和門檻），而是**形狀**：\n\n1. **策略 M 的品質確實更高**（91 vs 90）——看完全部，你選中的東西平均**好一點點**。最佳化沒有騙你。\n2. **但它只好了 1 分，卻多付了 25 分的搜尋成本**（多評估 5 個 × 5）。最後幾個小時的搜尋，換來的品質提升微不足道——這就是「最大值期望 n/(n+1)」那條曲線的邊際遞減在咬人：從第 5 個看到第 10 個，最大值幾乎不再上升，但你的成本線性地往上爬。\n3. **把搜尋成本算進去，satisficing 反而淨收益更高。** 這不是因為它找到了更好的 library——它找到的略差一點點。它贏在**沒有為那微不足道的品質提升付出昂貴的搜尋費**。\n\n這就是前面那句「satisficing 在元層次上就是最佳化」的數字版。如果你只比「選中的品質」（選項層次），M 贏（91 > 90）。一旦你比「淨收益」（把搜尋成本算進去的元層次），S 贏（65 > 41）。**哪個才是理性？取決於搜尋到底要不要錢。在真實世界，它要。**\n\n（一個誠實的補充：上面忽略了「10 個都沒達標」的尾巴——機率約 0.8¹⁰ ≈ 0.107，約一成。把它算進去，S 的期望淨收益會再低一些，但結論的方向不變，因為主要的差額來自「省下的搜尋成本」這一大塊。把門檻設太高，這條尾巴會變肥、開始反咬你——這正是下一段「門檻設多高」的問題。）\n\n### 脊椎回扣：satisficing 怎麼重看那個賭注與那次檢查\n\n這是 Part IV 唯一一次明寫接回脊椎，值得寫清楚——而且它的接法跟前面每一章都**不同類**。\n\nch01 那個賭注 L＝（+200, 0.5; −100, 0.5）和那次檢查（盛行率 1%、後驗 16.7%），前面我們用四套工具重算過：\n\n- **期望值**（ch02）：E[L] ＝ 0.5·200 ＋ 0.5·(−100) ＝ +50。\n- **期望效用**（ch03）：u(x)=√(x+100)，EU(L) ＝ 0.5·√300 ＋ 0.5·√0 ＝ 8.66 < u(0)=10 → 拒絕。\n- **貝氏期望效用**（ch05）：檢查後驗 16.7% × 效用矩陣 → 最適行動。\n- **展望理論**（ch08–09）：參考點 0、損失趨避 λ 放大 −100 那一邊 → 拒絕。\n\n每一套都對 L **算出了一個可比的數字或行動**（接 / 拒）。satisficing 不做這件事。它退後一步，問一個**元層次**的問題：\n\n> 面對這個賭注、這次檢查，我**到底要不要把分析一路算到展望理論、算到第二次檢查的 EVSI 這麼細**？\n\n答案不是再算第五個數。答案是一個**定性的門檻判斷**：「算到我對這個決定有可接受的把握，就停手。」對那個賭注，多數人連期望值都沒算就拒絕了——而 satisficing 說，**這未必不理性**：如果「再多算三套理論」省下的東西，比不上「算它們的力氣」，那麼「達到夠好的把握就停」本身就是元層次上的最優。\n\n所以在 ch18 的總對帳表上，satisficing 會被獨立標成「定性／不同類」的一列——它**不對 L 算一個跟 EV/EU/展望同型的數**。它回答的不是「L 值不值得接」，而是「**這個 L 的決定，值不值得我算到底**」。前四套是「**算什麼**」，satisficing 是「**算到哪裡停**」。把它當第五個競爭答案，是這章最常見的誤讀——下一段會專門拆。\n\n## 門檻設多高：aspiration level 不是隨便定的\n\nsatisficing 把「找最大值」的難題，換成了「門檻設多高」的難題。這不是把問題藏起來——而是換成一個**好處理得多**的問題。原因有二。\n\n第一，**門檻有自我調節機制。** 賽門觀察到：如果你設的門檻太高、搜了很久都沒達標，理性的反應是**把門檻往下調**（上面 worked example 第 4 步）。反過來，如果隨手就找到一堆達標的，你會把門檻往上提。aspiration level 不是一個寫死的常數，是一個**跟著搜尋經驗回饋走的動態值**——它會收斂到「以這個環境的選項品質、加上我搜尋的成本，合理該期待的水準」。這跟你調 timeout 的方式一模一樣：發現老是 timeout，你會懷疑門檻設太緊、往上調；發現幾乎不 timeout、但延遲很差，你會把門檻收緊。\n\n第二，**門檻把一個連續最佳化問題，換成一個離散的停止規則。** 「找最大值」要你在整個選項空間上做最佳化（難）。「設一條線、達標就停」只要你判斷「這個過不過線」（易）。你用一個**夠好的停止規則**，換掉了一個**算不完的最佳化**——而這個交換本身，就是有限理性的精神。\n\n值得標清楚嚴謹度：「最優的 aspiration level 到底該設多少」是有完整理論的（這屬於序貫搜尋與最優停止理論，跟 ch07 的資訊價值、ch15 的決策樹同源）。本書只給直覺與機制，不推導最優停止的式子——嚴格版指向延伸閱讀。這裡的重點是**精神**：門檻不是隨便定的，它由「環境的選項品質」與「你的搜尋成本」共同壓出來；你天天在 timeout 與 buffer 上做的，就是這件事。\n\n## 直覺的陷阱\n\n決策正是人類直覺最常跟規範理論打架的地方，有限理性這一章的陷阱特別隱蔽，因為它們聽起來都「很有道理」。\n\n| 陷阱（常見的錯誤直覺） | 它在哪一步把你帶溝裡 | 正確版（守住這個） |\n|---|---|---|\n| **「satisficing ＝ 偷懶／次優，最佳化才是認真」** | 你只在「選項層次」比品質（最佳化選中的確實略好），忘了「搜尋本身要付費」這條成本線 | 把搜尋成本算進去後，「夠好就停」可能就是真正的最佳化（找最大要付的搜尋代價未必值得，T10）。satisficing 不是放棄最佳化，是在更誠實的問題上最佳化 |\n| **「有限理性 ＝ 非理性／人腦不行」** | 你把「界」（bounded）讀成「壞掉」，以為有限理性是在說人有缺陷 | 有限理性是**把成本納入的理性**。它不是「理性的打折版」，是「考慮了思考成本的、更完整的理性」 |\n| **「既然要 satisfice，門檻隨便設就好」** | 你以為 satisficing 是「放棄精算」，於是連門檻都亂定 | 門檻（aspiration level）由環境的選項品質與你的搜尋成本共同壓出來，而且會隨搜尋經驗自我調節。門檻設太高 → 永遠搜不完；太低 → 拿到爛東西就停。它是有結構的，不是隨便 |\n| **「satisficing 是給賭注 L 的第五個答案」** | 你把對帳表上的五列都當成「對 L 的競爭評分」，想知道 satisficing 給 L 打幾分 | satisficing **不對 L 算同型的數**。前四套答「L 值不值得接」，satisficing 答「這個決定值不值得算到底」——它是元層次的、定性的，不是第五個競爭答案 |\n| **「捷思（heuristic）＝偷工減料的爛規則」** | 你看到「不精算、走捷徑」就貼上「不可靠」標籤 | 捷思是有限理性的工具：在**對的環境**裡，一條簡單規則可能又快又準（甚至勝過複雜模型）；在**錯的環境**裡才出錯。它的問題不是「總是錯」，是「用錯場合」——而為何人察覺不到自己用錯場合，那是心理機制，指向《思考的陷阱》談捷思與雙系統 |\n\n最值得你自我察覺的徵兆是這個：**當你發現自己在為一個決定「再多查一點點」而停不下來時**——再多看一個 library、再多跑一輪 benchmark、再多開一次會——問自己一句：「我多花的這份力氣，期望能讓最終選擇好多少？」如果答案是「好一點點」，而你已經有一個達標的選項在手，那麼你正在做策略 M（為 1 分品質付 25 分成本）。停手，選那個夠好的，是更理性的——不是更懶的。\n\n還有一個方向相反但同樣常見的陷阱，要單獨點出：**把 satisficing 當藉口，在不該省的地方省。** satisficing 的前提是「搜尋成本高、且選項品質的上限有限」。但有些決策不是這樣——一個**不可逆、尾部巨大**的決定（資料庫選型會鎖你三年、一次不可回滾的 schema 遷移），它的「再多算一點」的收益**不是**邊際遞減的，而是可能避免一場災難。在這種決策上，門檻要設得很高、搜尋要捨得花——因為這裡的環境結構（不可逆＋重尾）讓「算到底」重新變得划算。有限理性的真義不是「永遠夠好就停」，是「**讓門檻去匹配環境的結構**」：可逆的小決定快速 satisfice，不可逆的大決定慢慢算到底。誤把前者的省事用到後者，是 satisficing 最危險的誤用。\n\n## 紙上推演\n\n全是紙筆推演，不需要跑任何程式。數值請自己手算一遍，別抄答案。\n\n### 推演題\n\n**題 1（★，10 分鐘）：用自己的話分清楚三個詞。**\n不查書，用一段話分別解釋「最佳化（maximizing）」「satisficing」「最優停止（optimal stopping）」的差別，並各舉一個你系統裡的例子。重點：講清楚 satisficing 跟最佳化「比的東西不一樣」這件事。\n\n**題 2（★★，15 分鐘）：序貫選項，算 satisficing 何時停。**\n你在面試候選人，一個一個來，每個你給一個「適任分數」（0–100）。你設 aspiration level ＝ 70：**遇到第一個 ≥ 70 的就發 offer、停止面試**。假設每個候選達標（≥70）的機率 p ＝ 0.3、彼此獨立。\n(a) 平均要面試幾個才會停？\n(b) 「前兩個都不達標、第三個達標（剛好在第 3 個停）」的機率是多少？\n(c) 若把門檻提高到 90（p 降到 0.1），平均要面試幾個？這說明門檻與搜尋量的什麼關係？\n\n**題 3（★★★，20 分鐘）：satisficing vs 最佳化的淨收益對撞。**\n沿用本章 worked example 的設定（候選品質 0–100 均勻、搜尋成本 c ＝ 5 分/個），但比較**兩條門檻**下的 satisficing：門檻 80（p ≈ 0.2）vs 門檻 60（p ≈ 0.4）。各自估「期望評估個數」「選中品質的期望」「期望淨收益」，並說明：為什麼門檻不是「越高越好」？把搜尋成本算進去後，過高的門檻錯在哪？\n\n**題 4（★★，15 分鐘，口頭）：脊椎元層次判斷。**\n向另一個工程師解釋：為什麼在 ch18 的五層對帳表裡，satisficing 不該被放成「對賭注 L 的第五個評分」，而要被獨立標成「定性／不同類」的一列。用一句話講清楚「前四套在答什麼」與「satisficing 在答什麼」的差別。\n\n### 推演解答\n\n**題 1 解答。**\n\n- **最佳化（maximizing）**：在**所有**選項裡找**最大值**。要宣稱成功，原則上得看完全部（或證明剩下的不可能更大）。例：query planner 在所有執行計畫裡選 cost 最低的。\n- **satisficing**：設一條「夠好」的門檻，**遇到第一個達標的就停**，不問它是不是最大。例：選 library 時「跨過 star/維護/API 門檻的第一個就用」。\n- **最優停止（optimal stopping）**：在「繼續搜尋的成本」與「繼續搜尋的期望收益」之間，算出**該在哪個點停**的規則。它是 satisficing 的「嚴格版」——satisficing 用一條經驗門檻近似最優停止點。例：秘書問題、ch15 的決策樹倒推。\n\n關鍵差別：最佳化比的是「選中的**品質**」（選項層次）；satisficing 默默比的是「品質**減去搜尋成本**」（元層次）。兩者在「搜尋免費」時答案相同，在「搜尋有費」時 satisficing 常勝——因為它不為微小的品質提升付昂貴的搜尋費。\n\n**常見錯路**：把 satisficing 講成「隨便挑一個」。不是。它有明確的門檻、明確的停止規則；它只是**不要求證明最大**，不是**不要求達標**。\n\n**題 2 解答。**\n\n達標機率 p ＝ 0.3，「第一個達標前要看幾個」是幾何分布。\n\n```text\n(a) 期望面試個數 = 1/p = 1/0.3 ≈ 3.33 個\n    直覺：每 3.3 個裡平均出現一個達標的。\n\n(b) 「前 2 個不達標、第 3 個達標」：\n    P = (1−p)·(1−p)·p = 0.7 · 0.7 · 0.3 = 0.49 · 0.3 = 0.147 ≈ 14.7%\n    自我複核：幾何分布 P(剛好第 k 個停) = (1−p)^(k−1)·p；k=3 → 0.7²·0.3 = 0.147。✅\n\n(c) 門檻提高到 90，p = 0.1：\n    期望面試個數 = 1/p = 1/0.1 = 10 個\n```\n\n(c) 說明的關係：**門檻越高 → 達標越稀有（p 越小）→ 平均要搜越多個（1/p 越大）。** 門檻 70 平均看 3.3 個，門檻 90 平均看 10 個——多看了三倍。這就是「門檻越高、搜尋成本越貴」的精確版：你為「更高的品質下限」付出的代價，是「期望要多翻幾倍的選項」。最優門檻就卡在「再提高一點門檻換來的品質」與「為此多搜的成本」打平的那點。\n\n**常見錯路**：把 (a) 算成 p ＝ 0.3 所以「30% 機率第一個就停，所以平均 0.3 個」。方向反了——p 越大、越快停、期望個數越**小**（1/p）。p ＝ 0.3 給 3.33 個，不是 0.3 個。\n\n**題 3 解答。**\n\n```text\n門檻 80（p ≈ 0.2）—— 本章 worked example 的數\n  期望評估個數 ≈ 1/0.2 = 5 個\n  選中品質期望 ≈ (80+100)/2 = 90\n  期望淨收益 ≈ 90 − (5 × 5) = 90 − 25 = 65\n\n門檻 60（p ≈ 0.4）\n  期望評估個數 ≈ 1/0.4 = 2.5 個\n  選中品質期望 ≈ (60+100)/2 = 80\n  期望淨收益 ≈ 80 − (2.5 × 5) = 80 − 12.5 = 67.5\n```\n\n把門檻從 80 降到 60，淨收益從 65 升到 67.5——**降低門檻反而淨收益更高**（在這組 c ＝ 5 的數字下）。為什麼？降門檻讓你平均**少搜一半**（5 → 2.5 個），省下的搜尋成本（12.5 分）超過了選中品質的損失（90 → 80，少 10 分）。\n\n這正是「門檻不是越高越好」的核心：**門檻太高的錯，在於它逼你付過高的搜尋成本去換邊際遞減的品質。** 最優門檻在「再升一點門檻多花的搜尋成本」＝「多換到的品質」那點打平。本題裡 c ＝ 5 偏貴，最優門檻就偏低；若 c 很小（搜尋幾乎免費），最優門檻就會往上推、逼近最佳化。**搜尋越貴，該越早滿足。**\n\n**常見錯路**：只比「選中品質」（90 vs 80），結論「門檻 80 比較好」。這就是陷阱一——只在選項層次比，忘了把搜尋成本算進去。一旦算進去（元層次），門檻 60 反而贏。\n\n**題 4 解答。**\n\n一句話版：**前四套（EV、EU、貝氏 EU、展望）都在答同一個問題——「賭注 L 值不值得接」，各給一個可比的數字或行動；satisficing 答的是另一個層次的問題——「這個關於 L 的決定，值不值得我算到展望理論這麼細」，它給的是定性門檻（達到夠好的把握就停），不是對 L 的第五個評分。**\n\n所以對帳表上它必須獨立標為「定性／不同類」：把它擺成第五個競爭答案，等於問「satisficing 給 L 打幾分」——而它根本不打分，它判斷的是「要不要繼續算」。前四套是「**算什麼**」，satisficing 是「**算到哪停**」。一個是選項層次的評分，一個是元層次的停止規則，不同型、不能並排比大小。\n\n**常見錯路**：試圖讓 satisficing 也對 L 吐一個數（例如「satisficing 說 L 值 +30 分」）。沒有這個數——satisficing 的輸出是一個**停止決定**（夠好了，別再算了），不是一個**對 L 的估值**。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過關。優先答「為什麼」。\n\n1. **為什麼**前面十二章的每個演算法都偷偷假設了一件事？那件事是什麼？賽門推翻的就是它——用一句話說它是什麼。\n2. 「有限理性」的「界」（bounded）到底界住了什麼？說出三道牆（選項、後果、偏好），每道牆給一個你系統裡的例子。\n3. satisficing 跟最佳化「比的東西不一樣」——**為什麼**這個差別在「搜尋免費」時不重要、在「搜尋有費」時是決定性的？\n4. 「satisficing 在元層次上就是最佳化」這句話聽起來矛盾。**為什麼**不矛盾？用「選項層次 vs 元層次」把它講清楚。\n5. aspiration level（門檻）**為什麼**不能設太高、也不能設太低？它由哪兩個東西共同壓出來？它怎麼自我調節？\n6. 在 ch18 的五層對帳表上，satisficing **為什麼**要被標成「定性／不同類」，而不是「對賭注 L 的第五個答案」？前四套答什麼、它答什麼？\n7. 有限理性是規範與描述的「橋」而不是又一道「裂縫」——**為什麼**？（提示：當你把「思考有成本」寫進規範，規範會往哪邊靠？）\n8. satisficing 最危險的誤用是什麼？**為什麼**「不可逆、尾部巨大」的決策不該用「夠好就停」？（提示：那裡的「再多算一點」收益還是邊際遞減的嗎？）\n\n## 延伸閱讀\n\n- **Herbert A. Simon, \"A Behavioral Model of Rational Choice\"（*Quarterly Journal of Economics*, 1955）**——satisficing 與 aspiration level 的原始論文。讀它對「為什麼真實的決策者用門檻而非全域最大化」的論證，是這章一切的源頭。\n- **Herbert A. Simon, *Administrative Behavior*（1947 初版）**——有限理性最早成形的地方，從組織內決策的角度切入；讀前幾章對「行政人」（administrative man）與「經濟人」（economic man）的對比。\n- **諾貝爾官網 Simon 1978 得獎頁與其得獎演說（nobelprize.org）**——landscape 驗證過的史實來源；讀演說裡他怎麼自己描述有限理性與這門學科的緊張關係（一個因為「人不最佳化」而拿經濟學獎的人）。\n- **《馴服隨機》談大數法則與期望值**——本章 worked example 的「期望評估個數 ＝ 1/p」「最大值期望 ＝ n/(n+1)」這類機率結果，機制在那本書；本書只用結果、不重推。\n- **《思考的陷阱》談捷思與雙系統**——本章把捷思當有限理性的工具、點到「用對場合就準、用錯場合才錯」；**為何人察覺不到自己用錯場合**的心理機制（雙系統、捷思怎麼運作）在那本書。本章是橋接偏誤書的接口。\n- **Gerd Gigerenzer 等人關於「快而簡的捷思」（fast-and-frugal heuristics）的研究**——把賽門的有限理性接到「簡單規則在對的環境裡為何能勝過複雜模型」的現代延伸；讀它對「捷思不是次優、是生態理性」的論證（與本書 satisficing 觀點同調，細節未在本書 landscape 逐條查證，視為延伸方向）。\n"}, {"id": "ch14-multi-attribute-decision", "file": "ch14-multi-attribute-decision.md", "group": "Part IV — 有限理性", "title": "ch14 — 多屬性決策：當權衡不只一個維度", "md": "# ch14 — 多屬性決策：當權衡不只一個維度\n\n> **本章解決什麼問題**：前面十三章，那個帶不確定性的決策永遠只有一個維度的報酬——錢、效用、或一個後驗下的最適行動。但你真實做過的選型決策，從來沒有這麼乾淨：選一個資料庫，要同時看成本、延遲、可靠度、生態、鎖定風險。本章把單一效用推廣到多個彼此衝突的屬性——多屬性效用理論（MAUT）與加權加總法的直覺，以及它最危險的那個地方：權重看起來像客觀計算，其實是你先有結論再回填的價值判斷。這是 Part IV「有限理性」的第二站——上一章（ch13）講「要不要把分析算到底」，本章講「當報酬不是一個數而是一張表，怎麼把它壓回一個排序」。\n\n## 從你已知的出發\n\n你做過的最痛的決策，多半不是「要不要 rollback」這種一維的。一維的決策其實好做——你算個期望成本，比大小，完。真正讓你在 design doc 裡卡三天、在 RFC 底下吵二十條 comment 的，是這種：\n\n**選一個資料庫。** Postgres 還是 DynamoDB？自架還是託管？候選有四個，每個在好幾條軸上各有死穴：A 便宜但延遲尾巴難看；B 延遲漂亮但每月帳單嚇人；C 生態最成熟但會把你鎖死在某家雲；D 樣樣中庸但社群小、出事沒人救。\n\n你心裡很清楚這不是一個數能解決的。於是你做了一件幾乎所有資深工程師都做過的事：**開一張表。** 縱軸列候選，橫軸列你在乎的維度——成本、p99 延遲、可靠度、生態、鎖定風險——每一格打個分（1 到 5，或 1 到 10），最後乘上權重加起來，誰總分高選誰。\n\n```text\n       成本   延遲   可靠   生態   鎖定    加權總分\n  A      5     2     3     4     5       ?\n  B      2     5     4     3     4       ?\n  C      3     4     5     5     1       ?\n  D      4     3     3     2     3       ?\n```\n\n這張表有個名字。決策論叫它**加權加總值函數（additive value function）**，v = Σ wⱼ·vⱼ(xⱼ)——把每個屬性的分數 vⱼ 乘上權重 wⱼ 加起來。它正是本章的主角，也是 Keeney 與 Raiffa 1976 年那本《Decisions with Multiple Objectives》整本書在小心翼翼處理的東西。\n\n我要先說一句煞風景的話，整章圍著它轉：**這張表最危險的地方，不是你算錯加法，而是它讓一個價值判斷穿上了計算的外衣。** 你以為你在「算」哪個資料庫好，其實你在用一組你自己也說不清從哪來的權重，把「我比較想選哪個」這件事包裝成「數字告訴我選哪個」。等一下你會看到，同樣合理的兩組權重，能讓結論直接翻轉——而當這發生時，那不是巧合，是個警訊。\n\n## 從一個效用到一張表：問題長什麼樣\n\n先把問題定義清楚。前面所有章節，一個結果 x 對應一個效用 u(x)：賭注贏 200 對應 √300，檢查治療對病人對應 −10。報酬是一個數，效用也是一個數，排序天經地義——數大的排前面。\n\n多屬性問題的麻煩在於：一個選項不再對應一個數，而是對應一個**向量**。資料庫 A 不是「值 7 分」，而是「成本 5、延遲 2、可靠 3、生態 4、鎖定 5」這一串。問題來了——\n\n**兩個向量，誰排前面？**\n\n向量本身沒有天生的全序。如果 A 在每一個維度都不輸 B、且至少一維贏，那叫 A **支配（dominate）** B，這種好事不用算就知道選 A。但真實世界幾乎沒有支配——真實世界長的是這樣：A 便宜，B 快；你想要的兩件事剛好分散在不同選項上。這時候「誰比較好」這個問題**沒有客觀答案**，因為它取決於你願意拿多少延遲去換多少成本。\n\n決策論對這件事的回答是：把向量壓成一個數。最簡單、也最常用的壓法，就是加權加總——\n\n```text\n每個屬性先各自正規化成一個可比的「分數」 vⱼ(xⱼ)\n（例如把成本映射到 0~1：最貴的 = 0，最便宜的 = 1）\n\n再給每個屬性一個權重 wⱼ（通常要求 Σwⱼ = 1）\n\n合成：  v(選項) = w₁·v₁ + w₂·v₂ + … + wₙ·vₙ\n\n最後比 v 的大小，誰高選誰。\n```\n\n這個動作很自然，自然到你從沒懷疑過它。但它偷偷塞進了兩個假設，而這兩個假設正是本章要拆的兩顆地雷：① 每個屬性可以**獨立**評分，一維的好壞跟別維的水準無關（這叫偏好獨立）；② 各維度可以**互相補償**——某維很爛可以被另一維很好補回來（這是加總法的本質）。先記住這兩句，後面每個陷阱都從它們長出來。\n\n### 一個必要的提醒：值函數不是效用函數\n\n這裡要慢一下，因為它正是 Keeney–Raiffa 小心區分、而科普常糊掉的地方。\n\n前面 ch03 講的 u(x) 是**效用函數**，它的形狀（凹）編碼了你在**不確定下**的風險態度——凹代表面對賭局時風險趨避。但本章這張選型表，多半是在**確定**之下做的：你不是在賭「資料庫 A 有 50% 機率很便宜」，你大致知道 A 就是便宜、B 就是快。在確定下比較「強度」用的是**值函數（value function）** vⱼ，它編碼的是「偏好的強弱」而不是「對風險的態度」。\n\n兩者在數學形狀上可能長得像，但問的問題不同：效用函數回答「面對這個賭該不該接」，值函數回答「在這幾個確定的選項裡偏好排序怎麼排、強度差多少」。本章談的多屬性合成，主場是值函數；當某個屬性本身帶不確定（例如「可靠度」其實是個機率分布），才需要把那一維升級回效用函數。本章為了把直覺講清楚，主要停在確定的值函數版——這也是 Keeney–Raiffa 的入門路徑。\n\n## worked example：兩個資料庫，三個屬性，一組權重\n\n把候選縮到兩個、屬性縮到三個，好讓我們能一步步把數字算完、不跳步。\n\n情境：你要在兩個資料庫之間選一個，在乎三件事——**月成本、p99 延遲、可靠度**。原始數據是這樣：\n\n```text\n              月成本(USD)    p99延遲(ms)    可靠度(年故障次數)\n  選項 X         1200           40              2\n  選項 Y         2000           15              1\n\n  X：便宜、但慢、且故障較多\n  Y：貴、但快、且更穩\n```\n\n注意這是個沒有支配的局面：X 在成本贏，Y 在延遲和可靠贏。誰好，取決於你怎麼權衡。開始壓成一個數。\n\n**第一步：正規化。** 三個屬性量綱完全不同（美元、毫秒、次數），不能直接加。先各自映射到 0~1，方向統一成「越大越好」（成本和延遲是越小越好，要反過來）。用最簡單的線性正規化——在這個兩選項的小局裡，每個維度的最好值給 1、最差值給 0：\n\n```text\n  成本（越小越好）：  X=1200 是較便宜 → v=1.00；Y=2000 是較貴 → v=0.00\n  延遲（越小越好）：  Y=15  是較快   → v=1.00；X=40   是較慢 → v=0.00\n  可靠（越小故障越好）：Y=1  是較穩  → v=1.00；X=2    是較不穩 → v=0.00\n\n  正規化後的分數表：\n              成本    延遲    可靠\n       X       1.00    0.00    0.00\n       Y       0.00    1.00    1.00\n```\n\n（這個「最好=1、最差=0」的兩點正規化故意選最簡單的版本，好讓算術透明。真實情況你可能用更細的映射，但那不改變本章要講的脆弱性——脆弱性來自權重，不來自正規化的精細度。）\n\n**第二步：給一組權重。** 假設你問了團隊，大家覺得成本最重要，延遲次之，可靠再次之。你定了一組：\n\n```text\n  w(成本) = 0.5    w(延遲) = 0.3    w(可靠) = 0.2    （Σ = 1.0）\n```\n\n**第三步：加權加總。** 逐項乘起來、加總，手算：\n\n```text\n  v(X) = 0.5·1.00 + 0.3·0.00 + 0.2·0.00\n       = 0.50     + 0        + 0\n       = 0.50\n\n  v(Y) = 0.5·0.00 + 0.3·1.00 + 0.2·1.00\n       = 0        + 0.30      + 0.20\n       = 0.50\n```\n\n複核一下：v(X)=0.5·1=0.50。v(Y)=0.3+0.2=0.50。**打平。** 0.50 對 0.50。\n\n這個剛好打平是我故意挑的數字，因為它把整章的重點逼到台面上：你站在懸崖邊。結論「選哪個」此刻完全懸在權重上，一陣微風就吹過去了。\n\n## 那陣微風：把權重動一點點\n\n現在做一件你在真實 review 裡一定遇過的事——有人說「我覺得成本沒那麼關鍵吧，我們又不是新創，穩定比較重要」。於是權重微調，成本從 0.5 降到 0.45，那 0.05 挪給可靠：\n\n```text\n  新權重： w(成本)=0.45   w(延遲)=0.30   w(可靠)=0.25   （Σ 仍 = 1.0）\n\n  v(X) = 0.45·1.00 + 0.30·0.00 + 0.25·0.00 = 0.45\n  v(Y) = 0.45·0.00 + 0.30·1.00 + 0.25·1.00 = 0.55\n\n  → Y 贏（0.55 > 0.45）\n```\n\n再做一次相反的微調——「不對，我們現在最該省錢」，成本拉到 0.55，從可靠那挪 0.05 過來：\n\n```text\n  新權重： w(成本)=0.55   w(延遲)=0.30   w(可靠)=0.15   （Σ = 1.0）\n\n  v(X) = 0.55·1.00 + 0.30·0.00 + 0.15·0.00 = 0.55\n  v(Y) = 0.55·0.00 + 0.30·1.00 + 0.15·1.00 = 0.45\n\n  → X 贏（0.55 > 0.45）\n```\n\n看清楚發生了什麼。我**沒有改任何一格的評分**——成本、延遲、可靠的原始數據一個字都沒動。我只把成本的權重在 0.45 和 0.55 之間挪了 0.1，結論就從「選 Y」翻成「選 X」。而 0.45、0.5、0.55 這三個權重，**哪一個是對的？** 你說得出來嗎？沒有人說得出來。它們都「很合理」。\n\n這就是加權加總法的脆弱核心，整章我最想讓你記住的一頁：\n\n> **當結論可以被權重的微小、且同樣合理的改動翻轉時，這個決策的真正內容不在那張表裡——在你選權重的那一刻。表只是把你已經做的選擇重新排版成數字。**\n\n工程師對這件事特別沒有抵抗力，因為那張表看起來太像我們平常信任的東西了：有數字、有公式、有總分、能排序。它有計算的**形式**，於是我們把它當計算的**權威**。但形式不等於權威。一個能被微風吹倒的結論，不是穩健的計算，是化了妝的偏好。\n\n## 兩顆地雷拆給你看\n\n前面說加總法偷塞了兩個假設。現在正面拆開。\n\n### 地雷一：偏好獨立常常不成立\n\n加權加總有個沉默的前提叫**偏好獨立（preferential independence）**：你對某一維的偏好排序，不受其他維水準的影響。具體說——「延遲從 40ms 降到 15ms 值多少」這個判斷，應該跟「成本是 1200 還是 2000」無關。只有當所有屬性兩兩之間都滿足這種獨立，加權加總才是合法的合成方式（這是 Keeney–Raiffa 1976 給的條件，嚴格證明本書不展開，指向延伸閱讀）。\n\n問題是真實偏好常常不獨立。舉個你熟的例子：你對「多花錢買更低延遲」的意願，**取決於你現在的流量規模**。在低流量時，延遲從 40ms 降到 15ms 你根本無感，不值得多花一毛；但在你變成高頻交易那種場景，同樣這 25ms 的改善可能值天價。也就是說，「延遲這一維值多少」**跟另一個維度（規模、或成本檔位）糾纏在一起**——這正是偏好獨立被違反。\n\n一旦違反，加權加總就**錯了**——不是「估得不準」，是用錯了模型。正確的合成需要乘法或多線性項（讓屬性之間能交互），那比加總複雜得多。但人們幾乎總是用加總，因為加總簡單、且大多數時候錯得不明顯。本章的誠實版是：**加總是個近似，當你感覺到「這兩維其實會互相影響」時，你的加權表已經在說謊了**，只是它的謊很有禮貌、不會報錯。\n\n### 地雷二：不是所有東西都該被補償\n\n加總法的第二個本質假設是**補償性**：一維很爛，可以被另一維很好補回來。v(Y)=0.55 裡，Y 在成本上拿 0，但靠延遲和可靠補回來，總分照樣贏。\n\n可是有些屬性根本不該被補償。如果「鎖定風險」對你是個 **deal-breaker**——某個方案會讓你三年內無法搬遷、而這對公司是生存問題——那它不該只是表裡權重 0.1 的一格、可以被「便宜又快」高分淹過去。它應該是一道**門檻（hard constraint）**：不過這關，直接出局，連進加權表的資格都沒有。\n\n加權加總會悄悄把 deal-breaker 稀釋成「只是一個分數低的維度」，然後讓其他高分把它補掉，給你一個總分很漂亮、但其實踩了地雷的選項。自我察覺的徵兆：當你看到加權表選出的贏家，心裡卻有個聲音說「可是那個我們真的不能接受」——那個聲音不是不理性，是它在提醒你：你把一個本該是約束的東西，誤放進了可補償的加總裡。**正確的做法是兩段式：先用硬門檻砍掉出局者，再對活下來的選項做加權權衡。**\n\n## 邊際替代率：權衡到底是什麼\n\n退一步看，多屬性決策的核心動作其實只有一個詞：**權衡（trade-off）**。而權衡的精確意義，是**邊際替代率（marginal rate of substitution, MRS）**——你願意拿多少 A 去換一單位 B，且維持同樣滿意。\n\n在加權加總的框架裡，邊際替代率藏在權重比裡。如果成本權重 0.5、延遲權重 0.3，那（在正規化之後的尺度上）你隱含地說：「一單位正規化延遲改善，值 0.3/0.5 = 0.6 單位正規化成本改善」。權重比就是你的換算匯率。\n\n這給了一個比「亂設權重」健康得多的設權重方法：**不要直接問「成本權重該多少」，那個問題沒有錨、人只能憑感覺亂喊。改問「我願意每月多付多少錢、換 p99 延遲降 10ms？」** 後者是個你的工程直覺答得出來的具體問題——比方說「降 10ms 我願意每月多付 200 美元」。把幾組這種具體換算問完，權重就被你的真實偏好反推出來、而不是憑空填上去。Keeney–Raiffa 的整套方法論，骨子裡就是逼你用這種「具體換算」去**測量**你的權衡，而不是讓你對著「成本權重 = ?」的空格瞎填一個好看的數。\n\n換句話說，加權表的危險不在於用權重，而在於**權重的來源**。如果權重是從「我願意拿什麼換什麼」一個個具體換算反推出來的，它承載了真實偏好；如果權重是你盯著一個總分、反覆調到「Postgres 剛好勝出」為止——那你不是在計算，你是在用數字幫一個既定結論背書。後者極其常見，常見到我認為這是整個多屬性決策方法最該被點名的失敗模式。\n\n## 何時加權法夠用，何時該誠實承認這是價值判斷\n\n別矯枉過正。加權加總不是壞東西，它在對的場合很有用：\n\n- **當結論穩健時**——你把權重在所有「合理範圍」裡掃一遍，贏家都不變，那這個決策其實不依賴你權重的細節，加權表幫你確認了「怎麼權衡都選這個」，這是真正的好消息，可以放心。\n- **當它逼出對話時**——表最大的價值往往不是那個總分，而是填表的過程逼團隊把「我們到底在乎什麼、各在乎多少」攤開來吵清楚。爭論「延遲權重該 0.2 還 0.3」，本質是在爭論「我們是什麼樣的團隊、要服務什麼樣的負載」——那是該吵的、有營養的爭論。\n- **當屬性真的大致獨立、且都可補償時**——選辦公室的飲料機這種低風險、屬性互不糾纏的決策，加總法夠用，別過度工程。\n\n但當結論被微風吹倒（地雷在權重）、當屬性彼此糾纏（地雷在偏好獨立）、當有 deal-breaker 被稀釋（地雷在補償性）——這時最理性的動作，弔詭地，是**承認這不是一個計算題，而是一個價值判斷**。把那張表收起來，老實說「在我們現在的處境下，我認為穩定比省錢重要，所以我選 Y，不是因為它總分高，是因為我判斷現在該優先保穩」。這句話比一個 0.55 的總分誠實得多——它把判斷放回該放的地方（人的肩上），而不是藏進一個假裝客觀的數字裡。\n\n這正好碰到全書那道中央張力的一個側面。規範理論說：把所有屬性正確地合成一個值、選最大的——這在無限資源、偏好真的獨立、權重真的可測的理想國裡是對的。描述現實說：人會開一張表、亂設權重、被總分綁架、把 deal-breaker 淹掉。本章的收束跟 ch13 同調——有限理性的智慧，不是把加權表算得更精，而是**知道這張表在哪些情況下會騙你，然後在那些情況下把判斷的責任老實扛回來**。表是工具，不是免責聲明。\n\n## 這一章和脊椎的關係\n\n提醒一句，免得你以為本章離主線遠了。脊椎那個賭注（+200, 0.5; −100, 0.5）和檢查線（盛行率 1%、後驗 16.7%），報酬都是**一維**的——錢、或效用、或一個最適行動。它們乾淨，是因為被設計成乾淨，好讓我們把期望值、效用、貝氏、展望理論一套套工具講透。\n\n但你已經感覺到了：真實的「要不要換資料庫」「要不要遷雲」從來不是一維的。本章是脊椎之外的一塊必要補丁——它說：當報酬從一個數變成一張表，前十三章那套「比大小」就需要先過一道**合成**手續，而這道手續本身藏著可以翻轉結論的自由度。ch18 收官對帳時，脊椎賭注會被五種演算法各算一遍；本章提醒你的是，那五種演算法都預設了報酬是一維的——一旦不是，合成的權重就成了第六個、且最容易被人偷偷動手腳的旋鈕。\n\n## 直覺的陷阱\n\n| 陷阱 | 錯誤直覺帶你下溝的那一步 | 正確版 / 自我察覺 |\n|---|---|---|\n| **把加權評分表當「客觀計算」** | 看到有數字、公式、總分、排序，就把它當成「數字告訴我選哪個」的權威，忘了權重是人填的。 | 權重是**價值判斷**，不是測量值；常被「先有結論再回填」。徵兆：你調權重時眼睛在看總分、調到某個方案勝出才停手——那一刻你在背書、不在計算（守 landscape T11）。 |\n| **以為結論被權重微調翻轉是「巧合」或「精度問題」** | 看到 0.45/0.55 的權重把結論翻掉，想「再調準一點就好」，於是花力氣去「精算」權重。 | 它不是精度問題，是**警訊**——這個決策的真正內容不在表裡、在你選權重那一刻。對權重不敏感才代表結論穩健；敏感代表你其實還沒決定，只是讓表替你假裝決定了。 |\n| **以為所有屬性都可共量、可互相補償** | 把 deal-breaker（如三年無法搬遷的鎖定）當成「只是一個低分維度」，讓它被其他高分淹過去，選出總分漂亮卻踩雷的方案。 | 有些屬性是**硬門檻**不是可補償的維度。徵兆：贏家出爐你卻想「可是那個我們真的不能接受」——那聲音在提醒你把約束誤塞進了加總。正解：先門檻篩、再加權衡（兩段式）。 |\n| **以為偏好獨立理所當然** | 預設「延遲值多少」跟「成本檔位」「流量規模」無關，安心用加總。 | 偏好獨立**常被違反**——某維的價值常跟另一維的水準糾纏。一旦糾纏，加總是用錯模型、不是估不準。徵兆：你感覺「這兩維其實會互相影響」時，加權表已經在禮貌地說謊。 |\n| **直接對「權重該多少」瞎填** | 盯著「成本權重 = ?」的空格憑感覺填一個好看的數，沒有錨。 | 改問**具體換算**：「願意每月多付多少換延遲降 10ms？」——這你答得出來。權重從具體權衡反推、不是憑空填（MRS = 權重比）。 |\n\n## 紙上推演\n\n### 推演題\n\n**題 1（★★，[20 分鐘]）——權重穩健性。**\n三個候選 A、B、C 在三個屬性上的正規化分數（皆已正規化到 0~1，越大越好）如下：\n\n```text\n            屬性1    屬性2    屬性3\n   A         0.9      0.3      0.5\n   B         0.5      0.8      0.4\n   C         0.4      0.5      0.9\n```\n\n(a) 用權重組 W₁ =（0.5, 0.3, 0.2）算三者的加權總分，排出第一名。\n(b) 用權重組 W₂ =（0.3, 0.3, 0.4）重算，排出第一名。\n(c) 結論在兩組權重下是否穩健？你會怎麼向團隊說明這個結果？\n\n**題 2（★★，[15 分鐘]）——抓出被違反的偏好獨立。**\n你在選日誌儲存方案，兩個屬性是「查詢延遲」和「儲存成本」。請說明：在「資料量很小」與「資料量是 PB 級」兩種情境下，你對「願意多花多少成本換更低查詢延遲」的判斷會不會一樣？由此指出加權加總的哪個假設被違反，以及為什麼這代表「不能直接用加總」。\n\n**題 3（★★★，[25 分鐘]）——deal-breaker 與兩段式。**\n四個雲端方案在三屬性（成本、延遲、合規）上正規化分數如下。其中「合規」是硬性要求：分數低於 0.5 代表無法通過你所在產業的法遵稽核，**直接出局**。\n\n```text\n            成本    延遲    合規\n   P        0.9     0.8     0.3\n   Q        0.6     0.7     0.9\n   R        0.8     0.4     0.8\n   S        0.5     0.9     0.6\n```\n\n(a) 若無視門檻，直接用權重（0.4, 0.4, 0.2）算四者加權總分，誰贏？\n(b) 改用兩段式：先砍掉合規 < 0.5 的，再對活下來的用同一組權重排序，誰贏？\n(c) 比較 (a)(b) 的贏家，說明「把 deal-breaker 當成可補償的維度」會犯什麼錯。\n\n### 推演解答\n\n**題 1 解答。**\n\n(a) W₁ =（0.5, 0.3, 0.2），逐個手算：\n\n```text\n  v(A) = 0.5·0.9 + 0.3·0.3 + 0.2·0.5 = 0.45 + 0.09 + 0.10 = 0.64\n  v(B) = 0.5·0.5 + 0.3·0.8 + 0.2·0.4 = 0.25 + 0.24 + 0.08 = 0.57\n  v(C) = 0.5·0.4 + 0.3·0.5 + 0.2·0.9 = 0.20 + 0.15 + 0.18 = 0.53\n\n  排序：A(0.64) > B(0.57) > C(0.53)。第一名 A。\n```\n\n複核：A 的三項 0.45+0.09+0.10，0.45+0.09=0.54，+0.10=0.64 ✓。\n\n(b) W₂ =（0.3, 0.3, 0.4），重算：\n\n```text\n  v(A) = 0.3·0.9 + 0.3·0.3 + 0.4·0.5 = 0.27 + 0.09 + 0.20 = 0.56\n  v(B) = 0.3·0.5 + 0.3·0.8 + 0.4·0.4 = 0.15 + 0.24 + 0.16 = 0.55\n  v(C) = 0.3·0.4 + 0.3·0.5 + 0.4·0.9 = 0.12 + 0.15 + 0.36 = 0.63\n\n  排序：C(0.63) > A(0.56) > B(0.55)。第一名 C。\n```\n\n複核：C 在 (b) 是 0.12+0.15+0.36，0.12+0.15=0.27，+0.36=0.63 ✓。\n\n(c) **不穩健。** 第一名從 A 翻成 C——只因為把屬性 3 的權重從 0.2 提到 0.4（而屬性 3 正是 C 的強項、A 的弱項）。兩組權重都「很合理」，沒有哪組明顯錯。對團隊該說的話不是「數字算出來是 A」或「是 C」，而是：「**這個選擇對『我們有多在乎屬性 3』極度敏感——所以真正要先吵清楚的，是屬性 3 對我們到底多重要，而不是相信任何一個總分。**」常見錯路：看到 (a) 算出 A 就宣布「數據支持選 A」，完全沒做 (b) 的敏感度檢查——這是把化了妝的偏好當成客觀結論的典型現場。\n\n**題 2 解答。**\n\n不一樣。資料量很小時，查詢本來就快，把延遲再壓低幾乎無感、不值得為它多花成本——你對「成本換延遲」的意願很低。資料量到 PB 級時，慢查詢可能讓一個 dashboard 卡到沒人能用，這時你願意為降低延遲付出可觀的成本——意願高得多。\n\n也就是說，**「查詢延遲這一維值多少」取決於另一個維度（資料量規模）的水準**。這正是**偏好獨立（preferential independence）被違反**：你對延遲的偏好強度不獨立於規模。\n\n為什麼這代表不能直接用加總：加權加總 v = w₁·v₁ + w₂·v₂ 的數學形式裡，延遲那一項的貢獻 w₂·v₂ 是**固定**的，不隨其他維度變。但你的真實偏好裡，延遲的價值**會**隨規模變。模型結構和真實偏好的結構對不上——這不是權重沒調準的問題，是加總這個**函數形式**本身裝不下「交互作用」。要正確表達，得用帶交叉項的乘法或多線性合成（本書不展開，指向延伸閱讀）。常見錯路：以為「把延遲權重調大一點」就能修——調權重只能改那固定貢獻的大小，改不了「它該隨規模浮動」這件事。\n\n**題 3 解答。**\n\n(a) 無視門檻，權重（0.4, 0.4, 0.2），逐個算：\n\n```text\n  v(P) = 0.4·0.9 + 0.4·0.8 + 0.2·0.3 = 0.36 + 0.32 + 0.06 = 0.74\n  v(Q) = 0.4·0.6 + 0.4·0.7 + 0.2·0.9 = 0.24 + 0.28 + 0.18 = 0.70\n  v(R) = 0.4·0.8 + 0.4·0.4 + 0.2·0.8 = 0.32 + 0.16 + 0.16 = 0.64\n  v(S) = 0.4·0.5 + 0.4·0.9 + 0.2·0.6 = 0.20 + 0.36 + 0.12 = 0.68\n\n  排序：P(0.74) > Q(0.70) > S(0.68) > R(0.64)。贏家 P。\n```\n\n複核：P = 0.36+0.32+0.06，0.36+0.32=0.68，+0.06=0.74 ✓。\n\n(b) 兩段式。先砍合規 < 0.5 的：P 的合規是 0.3 < 0.5 → **P 出局**。S 的合規是 0.6 ≥ 0.5、R 是 0.8、Q 是 0.9 → 都留下。對活下來的 Q、R、S 用同一組權重排序（分數沿用上面）：\n\n```text\n  存活者：Q(0.70)、S(0.68)、R(0.64)\n  排序：Q(0.70) > S(0.68) > R(0.64)。贏家 Q。\n```\n\n(c) (a) 的贏家是 **P**，(b) 的贏家是 **Q**。差別致命：P 之所以在 (a) 拿第一，靠的是成本 0.9、延遲 0.8 兩個高分，把合規那個只有 0.3 的致命傷**補**了過去——合規只占權重 0.2，被另外兩維的高分淹沒。但合規 0.3 代表 **P 根本過不了法遵稽核、不該是個選項**。加權加總把一個本該「出局」的硬約束，稀釋成了「一個低分維度」，於是選出一個總分最高、卻在現實裡完全不能用的方案。這就是把 deal-breaker 當可補償維度的錯：**可補償性是加總法的內建假設，但硬約束的本質正是「不可被補償」**。正解永遠是兩段式——先用門檻砍出局者，再對合格者加權衡。常見錯路：把合規權重調到很大（例如 0.6）想讓 P 自動落選——這偶爾湊效，但本質仍錯，因為門檻的語意是「過/不過」的二元，不是「很重要的連續維度」；用大權重去模擬硬門檻，換一組數字就會再次穿幫。\n\n## 自我檢核\n\n口頭回答，講不清楚代表還沒懂：\n\n1. 為什麼「兩個選項的屬性向量」沒有天生的排序？把它壓成一個數的動作，偷偷加進了哪兩個假設？\n2. 加權加總表「看起來客觀」的錯覺從哪來？為什麼「形式像計算」不等於「權威是計算」？\n3. 結論被權重的微小、合理改動翻轉——為什麼這是警訊而不是「再算準一點就好」？對權重穩健代表什麼、敏感又代表什麼？\n4. 「偏好獨立」是什麼意思？舉一個你工作裡它被違反的例子，並說明為什麼違反後「加總」是用錯模型、不只是估不準。\n5. deal-breaker 和「一個權重很高的維度」差在哪？為什麼用「調高權重」去模擬硬門檻是錯的？正確的兩段式是哪兩段？\n6. 邊際替代率（MRS）跟權重的關係是什麼？為什麼「問具體換算」比「直接問權重該多少」健康？\n7. 值函數和效用函數（ch03 的 u）差在哪？本章的合成主場為什麼是值函數？\n8. 什麼情況下加權加總法是夠用甚至該用的、什麼情況下最理性的動作反而是「承認這是價值判斷、不是計算」？\n\n## 延伸閱讀\n\n- **Ralph Keeney & Howard Raiffa,《Decisions with Multiple Objectives: Preferences and Value Tradeoffs》(1976, 1993 reprint by Cambridge University Press)**——多屬性效用理論的奠基之作，本章的源頭。想看「偏好獨立／效用獨立」這些條件何時讓加權加總合法、何時必須改用乘法合成，看它的前幾章；它也是「值函數 vs 效用函數」區分的權威出處。屬經典專著、非輕鬆讀物，但你只要讀「為什麼可加性需要獨立性假設」那一段就值回票價。\n- **Wikipedia: \"Multi-attribute utility\" / \"Preferential independence\"**——快速校準術語（additive value function、preferential independence、utility independence、邊際替代率）的入口，再順著參考文獻往原始論文走。本章的歷史歸屬（Keeney–Raiffa 1976）以本書 `_meta/landscape-2026-06.md` 第 12 條為準（建書時經一次帶網路研究流程查證）；本次寫章時即時 web 查證因環境工具不可用未能複跑，術語細節若要引用請以原始專著為最終依據（標 2026-06）。\n- **本書 ch03（效用不是金額）**——本章的值函數是 ch03 那條凹效用 u(x)=√(x+100) 的「確定多維」推廣；要弄清「為什麼風險態度（凹）和偏好強度（值函數）是兩件事」，回頭對讀 ch03 的單維效用。\n- **本書 ch13（有限理性與 satisficing）**——本章的收束（「知道表何時騙你、把判斷扛回來」）和 ch13 的 satisficing 同一個精神：理性不是把模型算到最精，是知道在哪一格該停、哪一格該換成人的判斷。\n- **多屬性效用的可加性與獨立性條件（嚴格證明）**——本書只給直覺與條件、不證明「偏好獨立 ⇒ 可加分解」這個表現定理，嚴格版指向 Keeney–Raiffa 原著與 Peter Fishburn 的效用理論著作（《Utility Theory for Decision Making》, 1970）。\n"}, {"id": "ch15-sequential-decisions-sunk-cost", "file": "ch15-sequential-decisions-sunk-cost.md", "group": "Part IV — 有限理性", "title": "ch15 — 序貫決策：決策樹與沉沒成本", "md": "# ch15 — 序貫決策：決策樹與沉沒成本\n\n> **本章解決什麼問題**：到上一章為止，本書算的幾乎都是「單步」決策——站在一個岔路口，把後驗乘上效用、挑一個最適行動，按下去。但真實決策很少只有一步。你常常是「先做一件事、看結果、再決定下一件事」：先漸進式放量、看指標、再決定全面上線或回滾。本章把單步推到多步——決策樹（decision tree）與它的倒推（backward induction），講清楚「現在的選擇要替未來保留選項」是什麼意思；然後處理一個天天在 code review 裡出現、規範理論卻一刀切的東西：**已經投進去的成本（sunk cost），在往前看的決策裡該被完全忽略。** 這是 Part IV 的最後一章，下一章起轉入收束。\n\n## 從你已知的出發\n\n你做 rollout 的時候，腦子裡跑的就是一棵決策樹，只是沒畫出來。\n\n一個有風險的改動要上線。你不會閉著眼睛全面上線。你會：**先放 1% canary → 觀察一段時間的錯誤率與延遲 → 看到沒問題就放大到 10%、再全面上線；看到不對勁就回滾。** 這一串「做一步、看結果、再決定下一步」就是序貫決策（sequential decision）。它和單步決策的根本差別在於：**你現在這一步的選擇，會改變你下一步能做什麼、以及你下一步知道什麼。**\n\n放 canary 這個動作本身不直接賺錢——它要花你時間、佔注意力、把上線往後推。它的價值全在於：它**先給你一個觀測**，讓你帶著更新過的信念再做第二個決定。這正是 ch07「資訊的價值」的序貫版——先探測、再決定，而探測值不值得，取決於它可能讓你換一個更好的動作。\n\n你也天天在 review 裡看到序貫決策的另一面，而且看到它**出錯**：\n\n```text\n   「這個專案我們已經做三個月了，現在砍掉太可惜。」\n   「都買了一年的 license 了，硬著頭皮也要把它用起來。」\n   「重寫了一半，回頭成本太高，只能繼續往前。」\n```\n\n這三句話有一個共同的結構：**用「已經投進去多少」當作「要不要繼續」的理由。** 規範理論對這件事的態度非常冷酷——已經花掉、且收不回來的錢，在「接下來該怎麼做」這個問題裡，**權重應該是零**。三個月也好、一年 license 也好、重寫一半也好，它們都已經發生、不會因為你接下來的選擇而改變，所以它們**不該**進入「往前看」的計算。你只該問一件事：**從現在這一刻起、忽略過去，繼續 vs 停手哪個的未來期望報酬更高？**\n\n這聽起來簡單到像廢話，但它是本章最反人性的一頁。你的直覺會拼命把沉沒成本拉進來，而且拉得很有道理的樣子。本章後半就是要把這個直覺拆開，看清楚它在哪一步把你帶溝裡。\n\n## 決策樹：把「做一步、看一步」畫成一棵樹\n\n序貫決策的標準工具是決策樹。它只有三種節點，你全都熟：\n\n```text\n   決策節點（你選）        機運節點（自然/不確定選）       葉子（報酬）\n       ┌─┐                      ○                          數字\n       │ │  你主動挑一條分支   ╱│╲   每條分支標機率         葉子上的\n       └─┘                    ╱ │ ╲  （加起來=1）           期望效用\n     方框＝你能控制          圓圈＝你不能控制              一條路走完的報酬\n```\n\n- **決策節點（方框）**：你能控制。從這裡岔出去的每條分支，是你的一個可選行動，你會挑期望效用最高的那條。\n- **機運節點（圓圈）**：你不能控制。從這裡岔出去的每條分支是一個不確定的結果，各帶一個機率（這些機率是你的後驗信念）。你不能挑，只能**取期望**。\n- **葉子**：一條路從頭走到尾的最終報酬（效用）。\n\n對工程師最直白的對應：方框＝你的 `if`／你主動下的指令（ship / rollback / canary）；圓圈＝環境給你的回應、你只能觀測不能決定（這版到底有沒有 bug、canary 會不會報警）。整棵樹就是把「先做哪個動作、會遇到哪些結果、之後再做哪個動作」全攤開。\n\n### 倒推：從葉子往回算\n\n決策樹怎麼解？答案是**倒推（backward induction，又叫 rollback）**——從最右邊的葉子開始，往左一路把樹「收掉」：\n\n```text\n   遇到機運節點（○）：把它的所有分支「取期望」\n       → 用機率加權各分支的值，得到這個圓圈節點的期望效用\n\n   遇到決策節點（□）：把它的所有分支「取最大」\n       → 你會選期望效用最高的那條，這個方框節點的值＝最高的那條\n\n   一路往左收，直到根節點 → 根的值就是整棵樹的期望效用，\n                            收的過程中標下來的「每個方框該選哪條」就是最適策略\n```\n\n注意這兩個動作的**不對稱**，這是整個方法的靈魂、也是最常被搞錯的地方（見下面〈直覺的陷阱〉）：**機運節點取期望（你不能挑，只能平均），決策節點取最大（你能挑，挑最好的）。** 把機運節點也「取最大」——也就是「假設運氣總會站在我這邊」——是序貫決策最常見的災難。\n\n為什麼要從後往前？因為「現在該怎麼選」取決於「之後會怎麼走」。你沒法先決定第一步、再決定第二步——第一步的好壞要看它把你帶到的處境裡、第二步能做多好。所以必須先把「未來每個處境下我會怎麼做、能拿多少」算清楚，再回頭評價現在的選擇。這跟你寫遞迴是同一個腦回路：要算 `solve(n)`，先把 `solve(n+1)` 的結果備妥。倒推就是決策樹上的動態規劃；完整的動態規劃／Bellman 方程本書不展開（只到倒推直覺），數學機器指向決策分析教科書（見延伸閱讀）。\n\n## Worked example：先 canary、還是直接全面上線？\n\n把脊椎的精神搬到一個 rollout 上，用一棵兩階段決策樹算到底。數字是我自己設計、自己算過的，你可以跟著複核。\n\n**處境**。一個有風險的改動要上線。世界有兩個你看不見的狀態：\n\n```text\n   θ = good（這版沒 bug）   先驗 P(good) = 0.9\n   θ = bad （這版有 bug） 先驗 P(bad)  = 0.1\n```\n\n報酬以效用點數計（負數＝損失，數字示意、單位無所謂，只看相對大小）：\n\n```text\n   直接全面上線（ship）：  good → 0（平安上線）\n                           bad  → −100（全面上線事故、半夜被 page、回滾＋善後）\n   回滾/不上（roll）：  −25（無論 good/bad；延後上線、白做一場的固定代價）\n```\n\n**第一個問題：不做任何觀測，該 ship 還是 roll？** 這是個單步決策，照 ch05 的做法算：\n\n```text\n   EU(ship) = P(good)·0 + P(bad)·(−100)\n            = 0.9·0 + 0.1·(−100) = −10\n\n   EU(roll) = −25\n\n   −10 > −25 ⇒ 沒有額外資訊時，理性選擇是【直接 ship】，期望效用 −10。\n```\n\n直覺上對：bad 只有一成機率，雖然爆起來很痛（−100），但攤平後（−10）還是比白白回滾（−25）划算。**這就是「盲射」的基準線。**\n\n**現在引入 canary（探測）。** 你可以先對 1% 流量放量，它給你一個不完美的訊號 s ∈ {報警, 沒事}：\n\n```text\n   P(報警 | bad)  = 0.9   （真有 bug，小流量觀察多半會抓到）\n   P(報警 | good) = 0.1   （沒 bug 也可能誤報，偽陽）\n```\n\ncanary 不免費，先記它的成本是 c（後面討論 c 多大才值得）。放完 canary、看到訊號後，你**再決定**ship 還是 roll。這就是第二階段——序貫的精髓在這裡：**第二步的決定，建立在第一步買到的觀測上。**\n\n先把 canary 兩種訊號各自的機率與後驗算出來（這是 ch05 的貝氏更新，機制指向《馴服隨機》ch05）：\n\n```text\n   P(報警) = P(報警|bad)·P(bad) + P(報警|good)·P(good)\n           = 0.9·0.1 + 0.1·0.9 = 0.09 + 0.09 = 0.18\n   P(沒事) = 1 − 0.18 = 0.82\n\n   後驗 P(bad | 報警) = P(報警|bad)·P(bad) / P(報警)\n                      = 0.09 / 0.18 = 0.50\n   後驗 P(bad | 沒事) = P(沒事|bad)·P(bad) / P(沒事)\n                      = (0.1·0.1) / 0.82 = 0.01 / 0.82 ≈ 0.0122\n```\n\n自然頻率交叉驗算（想像 1000 次這樣的上線）：\n\n```text\n   1000 次上線 ─┬─ 100 次真有 bug ─┬─ 90 次 canary 報警\n                │                  └─ 10 次 canary 沒抓到（漏報）\n                └─ 900 次沒 bug  ──┬─ 90 次 canary 誤報（偽陽）\n                                   └─ 810 次 canary 沒事\n\n   報警 = 90（真）+ 90（誤）= 180 次 → 其中真有 bug 90 次 → 90/180 = 50.0%  ✓\n   沒事 = 10（漏）+ 810       = 820 次 → 其中真有 bug 10 次 → 10/820 ≈ 1.22% ✓\n```\n\n兩法一致。canary 報警時「真有 bug」的機率從先驗的 10% 跳到 50%；canary 沒事時則掉到約 1.2%。這就是 canary 替你買到的東西——**把模糊的 10% 信念，分裂成「報警的高風險堆」與「沒事的低風險堆」。**\n\n現在畫樹、倒推。先在每個第二階段的決策節點上算 ship vs roll：\n\n```text\n   【canary 報警，後驗 P(bad)=0.50】\n       EU(ship) = 0.50·0 + 0.50·(−100) = −50\n       EU(roll) = −25\n       −25 > −50 ⇒ 報警就【回滾】，這個方框的值 = −25\n\n   【canary 沒事，後驗 P(bad)=0.0122】\n       EU(ship) = 0.9878·0 + 0.0122·(−100) = −1.22\n       EU(roll) = −25\n       −1.22 > −25 ⇒ 沒事就【全面上線】，這個方框的值 = −1.22\n```\n\n決策節點取最大——這兩個方框分別收成 −25 和 −1.22。再往左碰到 canary 的機運節點（圓圈），取期望：\n\n```text\n   做了 canary 後（先不計 canary 成本 c）的期望效用\n     = P(報警)·(報警那格的最佳值) + P(沒事)·(沒事那格的最佳值)\n     = 0.18·(−25) + 0.82·(−1.22)\n     = −4.5 + (−1.0) = −5.5\n```\n\n整棵樹收完，長這樣：\n\n```text\n                         ┌─ ship ──○─ good 0.9878 → 0\n            ┌─ 沒事 0.82 ─□        └─ bad  0.0122 → −100   EU(ship)=−1.22  ◄選\n            │  P(bad)=.012└─ roll ──────────────── −25\n   做canary─○ (−c)\n   □        └─ 報警 0.18 ─□─ ship ──○ ... EU(ship)=−50\n   │           P(bad)=.50 │         └─ roll ─────── −25   ◄選\n   │                      └─ roll ─────────────────────── −25\n   │\n   └─ 不做canary，直接 ─□─ ship ──○─ good 0.9 → 0\n                         │         └─ bad 0.1 → −100   EU(ship)=−10  ◄選\n                         └─ roll ──────────────────────── −25\n\n   做 canary 分支期望（未計成本）= −5.5\n   不做 canary（直接 ship）       = −10\n```\n\n**最後一步：canary 值不值它的成本 c？** 把「做 canary」與「不做、直接 ship」比：\n\n```text\n   做 canary 的淨期望效用 = −5.5 − c\n   不做（直接 ship）       = −10\n\n   做 canary 划算  ⟺  −5.5 − c > −10  ⟺  c < 4.5\n```\n\n也就是說，**這次 canary 帶來的資訊價值恰好是 4.5 個效用點**（這正是 ch07 的 EVSI——樣本資訊期望價值：有觀測時的最佳期望效用 −5.5，減去無觀測時的最佳期望效用 −10，差額 4.5）。代幾個成本看：\n\n```text\n   c = 3  → 做 canary 淨 −8.5  >  直接 ship −10  ⇒ 該做 canary\n   c = 5  → 做 canary 淨 −10.5 <  直接 ship −10  ⇒ 別做，直接 ship\n```\n\n讀到這裡停十秒，因為這是序貫決策最漂亮的地方：**canary 的價值不是「它讓我更安心」，是一個能算出來的數字（4.5）——而且這個數字精確等於「它能讓我換一個更好動作」的期望收益。** 當 canary 太貴（c≥4.5），即使它技術上完全有效、報警準確率很高，理性的選擇仍是不做、直接賭那一成。資訊有效 ≠ 資訊值得買，這條 ch07 的洞見在序貫樹上又出現一次。\n\n## 序貫決策的真正禮物：保留選項\n\n上面那棵樹還藏著一個比「算出 4.5」更深的東西。回頭看：**直接 ship 的時候，你把一整條未來路徑鎖死了**——按下全面上線，要是踩到那一成的 bad，你就得吃滿 −100。但**先 canary**，等於你**先不做承諾、先買一個觀測、把「之後要不要全面上線」這個選擇權保留到資訊更多的時候再行使**。\n\n這就是選項價值（option value）：**保留「之後再決定」的彈性，本身就有價值**，即使你最後可能根本沒用到那個彈性。在上面的例子裡，82% 的情況 canary 沒事、你照樣全面上線，看起來 canary「白做了」；但它值錢的理由全在那 18% 報警、讓你及時回滾的情況——你買的是「壞情況發生時能轉向」的權利。\n\n工程師對這個直覺其實熟到不行，只是平常不叫它 option value：\n\n```text\n   可回滾的部署  >  不可回滾的部署     ── 即使你大多數時候不會回滾\n   feature flag  >  寫死的 if          ── 保留「之後關掉」的權利\n   藍綠部署、影子流量、漸進放量          ── 全都是花成本買「之後能轉向」\n   不把資料庫 migration 寫成不可逆       ── 保留「回到上一個 schema」的選項\n```\n\n每一條都是在付出當下的成本（多一套環境、多一段 flag 邏輯、多一步），去買「未來在更壞或更明朗的情境下還能改主意」的權利。這也接回 ch04 的模糊與不確定：當你連機率都估不準（Knightian uncertainty），保留彈性比押注一個你不信的數字更穩——選項價值在「不確定越大」時越值錢。當對手會針對你的選擇反應時，「保留選項」與「故意鎖死選項以示承諾」之間還有更深的張力，那已經溢出單人決策、屬於賽局的地盤（見《賽局》談承諾與可信威脅）。\n\n## 沉沒成本：規範理論最冷酷的一刀\n\n現在來處理本章開頭那三句 review 裡的話。先把規範立場講到不能再清楚，再看人為什麼總是違反它。\n\n**沉沒成本（sunk cost）＝已經付出、且無論你接下來怎麼選都收不回來的成本。** 規範理論的判決只有一句：\n\n> 在「往前看」的決策裡，沉沒成本的權重是零。你只該比較**從現在起、各個選項的未來增量成本與報酬**；過去花了多少，與此無關。\n\n為什麼？因為決策的定義就是「在可選的未來裡挑一個」。沉沒成本對**每一個**未來選項都一樣大（它已經發生、不隨你的選擇改變），所以它在選項之間**不造成差別**——而決策只關心差別。一個對所有選項都加同一個常數的項，不會改變哪個選項最大。它在數學上就是可以從 argmax 裡約掉的常數。\n\n用一個乾淨的數字看清楚。一個內部專案，**已經投了 80 點**（人月、成本，隨你）。現在面臨「繼續 vs 砍掉」：\n\n```text\n   繼續：還要再投 40 點，有 50% 機率成功（成功值 50、失敗值 0）\n       往前看的期望效用 = 0.5·50 + 0.5·0 − 40 = 25 − 40 = −15\n   砍掉：往前看的期望效用 = 0   （不再投入、也不再產出）\n\n   −15 < 0  ⇒  規範上該【砍掉】。\n```\n\n注意這個算式裡**完全沒有那 80 點**。它不出現，因為它已經沉了——繼續也好、砍掉也好，那 80 點都回不來，它對「繼續 vs 砍掉」這個比較毫無作用。規範理論說：忘掉它，往前看，−15 < 0，砍。\n\n但人腦會這樣算：\n\n```text\n   「我們已經投了 80，現在砍掉等於這 80 全部打水漂。\n     再投 40、有一半機會做成、把 80 救回來——拼一把吧。」\n```\n\n這就是沉沒成本謬誤（sunk cost fallacy）。它的錯誤**不在算術**——它算得出「再投 40 有一半機會」——錯在**把一個不該進入比較的項（已沉的 80）偷偷塞進了「繼續」的理由**，彷彿繼續能「挽回」那 80。但繼續挽回不了任何東西：那 80 已經不存在於你的可選未來裡，無論你選哪邊它都一樣。把「不想浪費已花的 80」當作「繼續」的論據，是在用一個常數去偏袒一個選項——這就是被帶溝裡的那一步。\n\n這個謬誤有個著名的別名叫**協和號效應（Concorde effect / Concorde fallacy）**——典故是英法合造的協和號超音速客機，明知商業上注定虧損，兩國政府仍以「已經投入巨資、現在停就全白費」為由續砸。這個詞一般歸給 Richard Dawkins 與 Jane Brockmann／Tamsin Carlisle 在 1970 年代研究動物行為時引入，用來描述動物（與人）依「已投入」而非「未來收益」做投資決定的傾向（此歸屬為常見轉述，2026-06 我無法即時連網覆核確切出處與年份，請當軼事看待、不作為硬事實引用）。名字來自哪不重要，結構是普世的：**用過去的投入替未來的決定背書。**\n\n要把沉沒成本誠實地擺進決策樹，正確做法是：**把它畫成根節點之前、所有分支共有的一格**，看清楚它對任何一個分支都一樣大、因此在分支之間互相抵銷、不影響倒推的結果：\n\n```text\n              ┌── 繼續 ──○─ 成功 0.5 → +50\n   −80 ───────┤          └─ 失敗 0.5 →   0     （這條再 −40）\n   (已沉，    └── 砍掉 ─────────────────  0\n    共有)        ▲\n                 │ −80 在「繼續」與「砍掉」上一樣大\n                 ▼ 它落在分叉【之前】，倒推時對「該選哪條」毫無作用\n                   → 正確的比較只看分叉【之後】：−15 vs 0 → 砍\n```\n\n一旦把它畫在分叉之前，你就會直接看到：它不在任何一條分支的**差額**裡。會被沉沒成本綁架的人，腦中其實是把那 −80 錯誤地只掛在「砍掉」那條（彷彿砍掉才「賠掉」80、繼續就「沒賠」），製造出一個假的不對稱。畫對了樹，假不對稱就消失了。\n\n我認為這是本章最值得帶走的一句：**規範理論不是叫你「別在乎已經花的努力」——它是指出，已經花的努力在「接下來怎麼做最好」這個問題上，數學上就是個約得掉的常數。** 在乎它（捨不得、可惜）是人之常情，是描述性事實；但讓它**改變你往前看的選擇**，是規範性的錯誤。這正是全書那道裂縫又一次現身：人實際怎麼算（把沉沒成本算進去）vs 該怎麼算（約掉它）。\n\n## 直覺的陷阱\n\n| 陷阱 | 錯誤直覺帶你下溝的那一步 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **沉沒成本謬誤（協和號效應）** | 「已經投了這麼多，現在停就全白費了，再拼一把把它救回來。」把已沉的成本當成「繼續」的理由。 | 已沉成本對每個未來選項都一樣大，是 argmax 裡約得掉的常數（landscape T12）。**自我察覺**：問自己「假如這個專案是別人昨天剛丟到我桌上、我沒投入過任何東西，我現在會啟動它嗎？」答案若是「不會」，你就是被沉沒成本綁架了。 |\n| **倒推時把機運節點當決策節點** | 算未來那一步時，假設「運氣會站我這邊」「到時候我總有辦法」，等於把圓圈節點也「取最大」。 | 機運節點**取期望**（你不能挑、只能平均），決策節點才**取最大**。把不確定的未來當成「最好情況」會系統性高估每一條前瞻路徑的價值，讓你做出過度樂觀的承諾。**自我察覺**：你的計畫是否依賴「到那時候應該就……」這種對運氣的隱性假設？ |\n| **把「保留選項」當浪費** | 「canary 八成沒事，純粹拖時間」「feature flag 大多數時候不會關，多此一舉」。 | 選項價值是「壞情況發生時能轉向」的期望收益；它的價值來自你**沒用到**的那些分支裡的最壞情況被你避開了。**自我察覺**：你是否用「結果沒出事」回頭論證「當初不該留退路」（後見之明把選項價值抹掉）？ |\n| **可惜 ≠ 該繼續** | 把「捨不得、可惜」這種真實的情緒，當成繼續的**論據**。 | 可惜是描述性事實（人會痛），不是規範依據。痛歸痛，往前看的算式裡不該有它。**自我察覺**：你給出的理由裡，有沒有「不然就浪費了」這個句式？它是沉沒成本的指紋。 |\n\n## 紙上推演\n\n### 題 1（★★★，**[25 分鐘]**）兩階段決策樹倒推\n\n換一組數字，自己把上面的 worked example 重走一遍。處境：上線一個改動，先驗 P(bad)=0.2、P(good)=0.8。報酬：直接 ship → good 0、bad −80；回滾 → −20（不分狀態）。可先做一個整合測試（integration probe），訊號 s∈{報警, 沒事}，P(報警|bad)=0.75、P(報警|good)=0.2。\n\n(a) 不做 probe，該 ship 還是 roll？期望效用多少？\n(b) 算 P(報警)、P(沒事) 與兩個後驗 P(bad|報警)、P(bad|沒事)。\n(c) 對每個訊號算出第二階段該 ship 還是 roll。\n(d) 倒推算「做 probe（先不計成本）」的期望效用，並求 probe 的資訊價值（EVSI）：probe 成本最多到多少還值得做？\n\n### 推演解答\n\n**(a) 不做 probe：**\n\n```text\n   EU(ship) = 0.8·0 + 0.2·(−80) = −16\n   EU(roll) = −20\n   −16 > −20 ⇒ 直接 ship，基準期望效用 = −16。\n```\n\n**(b) 訊號機率與後驗：**\n\n```text\n   P(報警) = 0.75·0.2 + 0.2·0.8 = 0.15 + 0.16 = 0.31\n   P(沒事) = 0.69\n   P(bad|報警) = 0.15 / 0.31 ≈ 0.4839\n   P(bad|沒事) = (0.25·0.2) / 0.69 = 0.05 / 0.69 ≈ 0.0725\n```\n\n（自然頻率複核，1000 次：bad 200 → 報警 150、漏 50；good 800 → 誤報 160、沒事 640。報警 310 中 150 真 bad → 0.484 ✓；沒事 690 中 50 真 bad → 0.0725 ✓。）\n\n**(c) 第二階段：**\n\n```text\n   報警（P(bad)=0.484）：EU(ship)=0.484·(−80)=−38.7；EU(roll)=−20 → 回滾（−20）\n   沒事（P(bad)=0.0725）：EU(ship)=0.0725·(−80)=−5.8； EU(roll)=−20 → 全面上線（−5.8）\n```\n\n**(d) 倒推與 EVSI：**\n\n```text\n   做 probe（未計成本）= 0.31·(−20) + 0.69·(−5.8)\n                       = −6.2 + (−4.0) = −10.2\n   EVSI = (有 probe 的最佳) − (無 probe 的最佳) = −10.2 − (−16) = 5.8\n   ⇒ probe 成本 < 5.8 才值得做。\n```\n\n**常見錯路**：(1) 把 (a) 的基準誤當成 roll（−20）而非 ship（−16），算出的 EVSI 會偏大——基準必須取「無資訊時的**最適**行動」，這裡是 ship。(2) 第二階段在「報警」格直接 ship（沒跟 roll 比），漏掉了 probe 的全部價值正來自「報警時改去 roll」。\n\n### 題 2（★★，**[15 分鐘]**）把沉沒成本約掉\n\n一個重構做了一半，**已投入 60 點**（不可回收）。現在「完成它」還要再投 50 點，完成後預期帶來 70 點的長期收益（確定，無不確定性）；「砍掉、回到舊架構」則不再投入、收益 0。\n\n(a) 規範上該完成還是砍掉？算式裡那 60 點該放哪？\n(b) 一位同事說「都做一半了，再撐一下把 60 賺回來」。指出他算式裡多了什麼。\n\n### 推演解答\n\n**(a)**\n\n```text\n   完成的往前看期望效用 = 70 − 50 = +20\n   砍掉的往前看期望效用 = 0\n   +20 > 0 ⇒ 該【完成】。已投入的 60 點【不進入算式】，因為它對「完成」與「砍掉」一樣大、約得掉。\n```\n\n注意這題的結論是「該完成」——這很重要：忽略沉沒成本**不等於**「半途的東西都該砍」。它只是說「用未來增量算」。這裡未來增量為正（70−50=+20），所以完成；題 1（前一節 worked example 的 80/40 版）未來增量為負（−15），所以砍。**同樣是忽略沉沒成本，結論可能是繼續、也可能是停手——取決於往前看的增量，不取決於過去投了多少。**\n\n**(b)** 他把「賺回那 60」當成完成的理由。但完成的真實收益是未來的 70、代價是未來的 50，淨 +20，與「賺回 60」無關——那 60 回不來，完成也好砍掉也好它都是沉的。他在算式裡多塞了一個「挽回 60」的虛項；剛好這題該完成，所以他**結論對、理由錯**——這種「對的結論配錯的理由」最危險，因為下次未來增量是負的時候，同一套錯理由會讓他繼續燒錢。\n\n### 題 3（★★，**[15 分鐘]**）選項價值的口頭題\n\n不用算，用自己的話回答：\n\n(a) 一個「可一鍵回滾」的部署，比「不可回滾」的部署多值多少？這個「多值的部分」在什麼情況下才被你真正用到？\n(b) 為什麼「這次 canary 沒事、所以當初不該浪費時間做 canary」是後見之明的謬誤？\n\n### 推演解答\n\n**(a)** 多值的部分＝選項價值＝「壞情況發生時能轉向」的期望收益。它只在**壞情況真的發生**的那些分支裡被行使（那 18% 報警、或上線後出事要回滾的情況）。在好情況分支裡它確實「沒被用到」——但這不代表它沒價值，正如保險在沒出險的年份「沒用到」不代表保險沒價值。你買的是事前的期望保障，不是事後保證每次都用得上。\n\n**(b)** 因為決策的價值要用**事前的期望**評斷，不能用**事後的單一結果**回頭評斷。canary 的價值是 over 所有可能訊號的加權（報警時讓你避開事故、沒事時讓你放心全面上線）；某一次「剛好沒事」只是落在 82% 的那條分支上，不能反推「當初的期望價值是零」。用單次結果否定事前決策，正是把機運節點當成「我早該知道」——典型的後見之明偏誤（其心理機制見《思考的陷阱》談後見之明）。\n\n## 自我檢核\n\n口頭回答，講不清楚就是還沒懂：\n\n1. 決策樹的三種節點各是什麼？倒推時機運節點和決策節點的處理為什麼**不一樣**（一個取期望、一個取最大）？把這個不對稱講給另一個工程師聽。\n2. 為什麼非得「從葉子往回算」、不能「從根往前算」？這跟你寫遞迴的哪個直覺是同一件事？\n3. 用自己的話說：canary 的資訊價值（4.5）精確等於什麼？為什麼 canary「技術上有效」不保證「值得做」？（接回 ch07）\n4. 沉沒成本為什麼在規範上是「argmax 裡約得掉的常數」？用「對每個未來選項都一樣大」這句話解釋。\n5. 「忽略沉沒成本」是不是等於「半途的專案都該砍」？用題 2 與 worked example 兩個結論相反的例子說明差別。\n6. 選項價值是什麼？為什麼「結果沒出事、所以當初不該留退路」是錯的推理？\n7. 沉沒成本謬誤的錯誤**不在算術**——那它錯在哪一步？「假如這是別人昨天剛丟給我的、我會不會啟動它」這個自我檢測為什麼有效？\n8. 序貫決策在什麼時候會「溢出」單人決策、變成賽局？（提示：機運節點變成了什麼？）\n\n## 延伸閱讀\n\n- **Howard Raiffa,《Decision Analysis: Introductory Lectures on Choices under Uncertainty》(1968)**——決策樹與倒推（rollback）的經典入門；想看「先探測再決定」如何系統化成樹，讀它的決策樹章節。Raiffa 也是 ch07 EVSI 的共同奠基者（Raiffa–Schlaifer 1961）。\n- **Hal Arkes & Catherine Blumer, \"The Psychology of Sunk Cost\",《Organizational Behavior and Human Decision Processes》35 (1985): 124–140**——沉沒成本謬誤的代表性實驗論文（劇院季票、滑雪票那些經典情境就出自這裡）；想看「人確實會被沉沒成本綁架」的乾淨證據，讀它的實驗設計（2026-06，期刊與年份為常見引用，連網覆核從略）。\n- **Stanford Encyclopedia of Philosophy,「Decision Theory」**（https://plato.stanford.edu/entries/decision-theory/）——序貫決策、動態一致性、與本書其他主題的關係的權威概覽；想把單步決策接到多步的哲學脈絡，讀它的 sequential / dynamic choice 段。\n- 沉沒成本與協和號效應的**心理機制**（為何明知不該卻做不到、與損失趨避如何交織）見《思考的陷阱》談沉沒成本與承諾升級；本章只給規範判決（該約掉）與決策樹畫法。\n- 當你的序貫選擇面對的是**會反應的對手**（會針對你的回滾策略調整攻擊、或需要「故意鎖死選項」來建立可信承諾）時，單人決策樹不夠了，見《賽局》談重複賽局、承諾與可信威脅——這是 ch16 要正式交棒的邊界。\n"}, {"id": "ch16-when-the-opponent-reacts", "file": "ch16-when-the-opponent-reacts.md", "group": "Part V — 收束", "title": "ch16 — 對手會反應時：交棒給賽局", "md": "# ch16 — 對手會反應時：交棒給賽局\n\n> **本章解決什麼問題**：前面十五章，我們把「單人在不確定下該怎麼選」這件事算到了底——期望值、期望效用、貝氏、資訊的價值、展望理論、有限理性。但這套機器藏著一個從沒被點破的前提：**那個讓你不確定的東西，不會「針對」你。** 硬幣不在乎你押哪面、盛行率不會因為你做了檢查就改變、機運節點不會偷看你的決策樹。本章是 Part V 收束的第一槍，要劃清這本書的邊界上限：當你面對的不是冷漠的自然、而是一個**會對你的選擇反應**的理性主體，單人決策理論就不夠用了——期望值的「對手」變成了會策略性回應的人。這塊地是《賽局》的，本章只負責立起界碑、把鑰匙交過去。\n\n```text\n全書地圖：理性許下一套漂亮的演算法（你該怎麼選），現實在簡單的賭局前把它一條條掀翻（人怎麼選）\n\n  Part I  理性的地基 .............. 從「該怎麼選」的最小公設出發\n     ch01 一個賭注與一次檢查（脊椎登場）\n     ch02 期望值與它的陷阱（聖彼得堡）\n     ch03 期望效用：為何效用不是金額（vNM 公理、凹＝風險趨避）\n     ch04 風險不是不確定（Knight、Ellsberg 模糊趨避）\n        |\n        v\n  Part II  信念與證據 ............. 把「不確定」變成可更新的數\n     ch05 貝氏決策：信念 × 效用 → 行動（檢查線登場）\n     ch06 先驗從哪來：信念可以有數學\n     ch07 資訊的價值：要不要再驗一次\n        |\n        v\n  Part III  描述的裂縫 ........... 人實際怎麼選：展望理論\n     ch08 參考點：你算的是變化不是狀態\n     ch09 損失趨避與機率權重\n     ch10 框架效應：同一個決策兩種問法\n     ch11 Allais 悖論：獨立公理斷在哪\n     ch12 描述還是規範：展望理論到底證明了什麼\n        |\n        v\n  Part IV  有限理性 ............. 把最佳化放回成本有限的腦\n     ch13 有限理性與 satisficing（Simon）\n     ch14 多屬性決策：當權衡不只一個維度\n     ch15 序貫決策：決策樹與沉沒成本\n        |\n        v\n  Part V  收束 ................. 五種演算法，同一個決策                ◄ 你在這裡\n     ch16 對手會反應時：交棒給賽局\n     ch17 理性是什麼：規範與描述的和解\n     ch18 同一個決策，五種演算法重看（收官）\n```\n\n走到這裡，那座從 ch01 搭起來的橋已經到頭了。Part I 到 Part IV，我們建了一整套「單人在不確定下該怎麼選」的機器；Part V 不再加新機制，而是退三步看這台機器：它的**邊界**在哪（本章）、它跟「理性」這個大字的關係（ch17）、把脊椎決策用五種演算法總對帳一次（ch18）。\n\n我認為本章是這本書最該講清楚「我不講什麼」的一章。決策理論最危險的失敗，不是算錯一個期望值，而是把一個根本不該用單人期望值解的問題，硬塞進單人期望值的框架裡——因為對面那個「不確定」，其實是個會看你出牌、然後改出牌的人。\n\n## 從你已知的出發\n\n先講一個你大概設過幾十次的東西：一個閾值。\n\n**版本一：流量尖峰的自動擴容。** 你給服務設一條 autoscaling 規則——CPU 超過 70% 就加機器。你怎麼定 70% 這個數？你心裡其實在做一個期望成本最小化：閾值定太低，平常養一堆閒置機器，浪費錢；定太高，遇到尖峰時擴得太慢，使用者吃到延遲、甚至超時。你拿歷史流量分布當「自然」，算「在這個分布下，哪個閾值的期望成本最小」。這是一個**漂亮的單人決策問題**——而且 Part I 到 Part IV 整套機器都適用。流量尖峰是雙十一、是某篇文章上了熱門、是一個 cron job 撞在一起。它們**不在乎你的閾值定在哪**。你把閾值從 70% 調到 75%，明天的尖峰不會因此變大一點來「對付」你。自然是冷漠的。\n\n**版本二：一條 rate limiter，擋的是濫用者。** 同樣是設一個閾值——每個 IP 每分鐘最多 100 次請求，超過就限流。表面上跟版本一是同一道題：閾值定太鬆，惡意流量打穿你；定太嚴，誤傷正常使用者。你可能會想「那我也拿歷史濫用流量的分布，算一個期望成本最小的閾值」。\n\n**這裡有一個你不能再忽略的差別：對面那個濫用者，會看你的閾值，然後改他的打法。** 你把單一 IP 的上限壓到 100，他換成 IP 池、每個 IP 打 99 次，剛好踩在你線下。你加上「同一 ASN 聚合計數」，他把流量灑到多個雲廠商。你上行為指紋，他開始模仿正常使用者的節奏。**你每動一次閾值，他的「機率分布」就變一次**——而且是朝著最讓你難受的方向變。\n\n停在這裡想一下這個差別有多本質。版本一裡，那個讓你不確定的東西（流量分布）是**固定的、給定的**，你在一個不動的地形上找最低點。版本二裡，地形本身**會對你站的位置反應**——你一站上某個點，最低點就跑到別處去了。前者你可以用期望值掃過所有閾值、挑期望成本最小的那個；後者你掃出來的那個「最優閾值」，會在你部署上線的當天失效，因為對手把它讀走了。\n\n你早就在工程直覺裡分過這兩種東西，只是沒給它們名字。**容量規劃**、**重試與超時**、**快取大小**、**對自然故障的告警閾值**——這些對面是冷漠的自然，是單人決策。**安全防護**、**反濫用**、**反作弊**、**競價/配額面對會套利的使用者**、**威脅建模**——這些對面是一個會反應的人，是賽局。本章要做的，就是把這條你早有的直覺，升級成一條清楚的界線，並說清楚：越過這條線，這本書的工具會以什麼方式失效。\n\n## 一句話的分界：自然不「針對」你，對手會\n\n把整本書的脊椎拿出來最快。脊椎賭注是這樣的：\n\n```text\n脊椎賭注 L =（+200, 0.5; −100, 0.5），單位 NT$\n擲一枚公正硬幣：正面贏 200、反面輸 100。\n期望值 E[L] = 0.5·(+200) + 0.5·(−100) = +50（ch02 算過）\n```\n\n從 ch02 到 ch12，我們對這個賭注做了各種事——算期望值、套凹效用、用展望理論重估。但這一路有一個前提**從來沒被質疑過**：那枚硬幣是**公正**的，而且它**不會看你押哪面**。\n\n現在改一個字。把「公正硬幣」換成「莊家」。\n\n```text\n脊椎賭注的兩個世界\n\n  世界 A（自然／單人決策）\n    對面是一枚公正硬幣。P(正)=0.5 固定，與你的選擇無關。\n    你押正、押反、不押——硬幣的機率都是 0.5。\n    → 你可以用期望值 / 期望效用 / 展望理論算「該不該玩」。\n\n  世界 B（對手／賽局）\n    對面是一個莊家，他「設」賠率、而且看得到你的傾向。\n    你若總押正，他就調整讓正面少賠或少出。\n    P(正) 不再是固定的 0.5，而是「莊家對你的反制」的函數。\n    → 沒有一個固定的機率可以代進期望值；你算出的最優押法，\n      會被莊家讀走、然後反制掉。\n```\n\n差別只有一行：**世界 A 的機率是給定的常數，世界 B 的機率是對手對你策略的回應。** 這一行，就是這本書的邊界。\n\n我把它濃縮成一句你可以記一輩子的話：**自然不會「針對」你，對手會。**\n\n- 自然（natural uncertainty）：硬幣、流量尖峰、盛行率、硬碟故障率、地震。它有機率分布，這個分布**不隨你的決策改變**。你的整套單人決策機器（期望值 → 效用 → 貝氏 → 資訊價值）就是為這種對手設計的。\n- 對手（strategic opponent）：莊家、攻擊者、套利者、競價對手、談判桌另一邊的人。他有自己的目標，而且**會觀察你的策略、再選對他最有利的回應**。你的「機率分布」對他來說不是固定的——它是你選了什麼之後，他**最佳化**出來的反應。\n\n這就是為什麼 ch04 講「不確定」時，我特別把 Knight 的「風險 vs 不確定」跟「對手」分開講。Knight 的不確定是**機率測不出來**（新依賴沒有歷史故障數據）——但它仍然是一個「不針對你」的自然，只是你不知道它的分布。對手是另一個維度的東西：**就算機率測得出來，只要它會對你反應，你代進去的那個機率下一秒就過期了。** 模糊（ambiguity）是「我不知道分布」；賽局是「分布會看我出牌」。兩件不同的事。\n\n## 為什麼期望值對「會反應的對手」會系統性失靈\n\n這一節值得你停五分鐘，因為它是本章的核心洞見，而且它是**質變不是量變**。\n\n單人決策的整套邏輯，骨架是這一步（ch05 給過）：\n\n```text\n單人決策的核心動作（對自然）\n   a* = argmax_a  Σ_θ  P(θ) · u(a, θ)\n        └─────────────┬──────────────┘\n         在「狀態 θ 的固定機率分布 P(θ)」下，\n         挑出期望效用最高的行動 a*\n```\n\n這一步能成立，**完全靠 P(θ) 是個跟 a 無關的常數**。你掃過所有行動 a，每個 a 配上同一張機率表 P(θ)，算期望效用，挑最高的。整個過程像在一張固定的地形圖上找最高點。\n\n現在把自然換成對手。對手不是一個「狀態 θ」，他是一個**也在做 argmax 的人**。他的行動會構成你的「狀態」，而他選哪個行動，取決於**他預期你會選什麼**。於是那張機率表 P(θ) 變成了 P(θ | a)——對手的「分布」是你行動的函數。式子崩了：\n\n```text\n對手不是固定的 P(θ)，而是一個也在 argmax 的人\n\n   你想算：   a* = argmax_a  Σ_θ  P(θ | a) · u(a, θ)\n                                   └──┬──┘\n                              對手的分布依賴你的 a\n\n   但對手同時在算：\n              θ* = argmax_θ  (對手自己的效用 u_對手(a, θ))\n                              而他的 a 是「他猜你會選的」\n\n   → 你要算 a 得先知道 P(θ|a)，\n     但對手要決定 θ 得先猜你的 a，\n     你猜他、他猜你、你猜他猜你……無窮回退。\n```\n\n看到那個無窮回退了嗎？**這不是一個更難算的期望值，這是一個結構不同的問題。** 單人決策是「在固定地形上找最高點」，這是個最佳化問題，有現成答案。賽局是「我站的點會改變地形、而地形也在改變我該站的點」——它不是最佳化，它要找一個**互相一致的不動點**：一組策略，使得「在對方這樣選的前提下，我這樣選是最優的；而在我這樣選的前提下，對方那樣選也是最優的」。沒有人想單方面改變。這個不動點就是**納許均衡（Nash equilibrium）**。\n\n我特別強調「不動點」這三個字，因為這正是質變所在。單人決策的解是 argmax 的輸出（一個最佳化的答案）；賽局的解是一個**互相最佳化的固定點**（一個方程組的自洽解）。把賽局問題硬用單人期望值解，等於把一個求不動點的問題，當成一個求極值的問題——你會得到一個「假設對手不動」的最優解，然後對手一動，它就錯了。\n\n均衡概念怎麼求、混合策略長什麼樣、不動點為什麼一定存在（Nash 用 Brouwer/Kakutani 不動點定理證的），這些是《賽局》的主體，本章不展開（見《賽局》談納許均衡與混合策略）。本章只要你帶走一件事：**當對面會反應，你要找的不是「最優行動」，是「互相最優的不動點」——而期望值機器只會給你前者。**\n\n### 混合策略其實是「對隨機對手的單人決策」\n\n有一個地方賽局跟本書的工具會短暫握手，值得點一下，因為它能幫你看清楚邊界。\n\n賽局裡常出現**混合策略（mixed strategy）**——你不固定出某一招，而是**按某個機率分布隨機出招**（猜拳不固定出石頭，而是各 1/3）。為什麼要隨機？因為一旦你的出招可預測，會反應的對手就能反制你；隨機化是讓對手「無法針對」的手段。\n\n這裡的連結是：**一旦對手的混合策略「定下來了」（比方均衡裡他就是各 1/3），那麼從你的角度，他就退化成了一個「固定機率分布的自然」**——你面對的變回一個單人決策，用本書的期望值就能算「對他這個固定隨機分布，我的最優回應是什麼」。\n\n```text\n賽局與單人決策的接縫\n\n  完整賽局：你和對手都在選策略，互相反應 → 求納許均衡（不動點）\n\n  但「固定住對手的混合策略」這一刀切下去：\n    對手 = 一個給定機率分布的隨機產生器（不再對你反應）\n    → 你這一邊變回單人決策：a* = argmax_a Σ P(對手出招)·u(a,·)\n    → 這時 ch02–ch07 的整套期望值機器又能用了\n\n  關鍵：均衡之所以是均衡，正是因為\n    「在對方那個分布下，你的最優回應 也 讓對方那個分布成為最優」\n    ——兩個單人決策互相咬合的不動點。\n```\n\n換句話說，納許均衡可以看成**兩個單人決策問題互相咬合**：在均衡點上，每一邊都在「對方策略固定」的假設下做自己的單人最佳化，而且這個假設恰好自洽。本書教你的是「咬合的那半邊」；《賽局》教你的是「怎麼讓兩半邊咬合、不動點存不存在、怎麼找」。這就是「決策↔賽局是同一枚硬幣的兩面」的精確意思——不是兩個無關的領域，是同一個最佳化動作，差在「對方會不會也在做同一件事」。\n\n## 越界三件事：承諾、訊號、謝林點\n\n單人決策的世界裡，有些動作根本沒有意義；它們只在「有另一個會推理的對手在看」時才存在。我各用一句話帶過，讓你認得它們是「越界訊號」——一旦你的問題裡冒出這些東西，你已經在賽局裡了，該交棒。深入都指向《賽局》。\n\n**承諾（commitment）。** 在單人決策裡，「綁住自己未來的手腳」永遠是壞事——選項越多越好（這正是 ch15 的選項價值，option value）。但在賽局裡，**故意減少自己的選項可以是優勢**：把退路燒掉，讓對手相信你「不得不」強硬，於是對手讓步。經典畫面是把橋燒了讓自己的軍隊無法撤退——對單人決策這是自殘，對賽局這是讓威脅可信。工程版：公開承諾一個 deprecation 日期（綁死自己，逼下游遷移）、不可逆的 API 棄用。**「自縛手腳反而更好」這個念頭一旦合理，你就出界了。**\n\n**訊號（signaling）。** 當對手不知道你的「型」（你是強是弱、你的成本是高是低），你可以用一個**對你來說便宜、對假裝者來說昂貴**的動作來可信地傳遞資訊。單人決策裡你不會「為了讓某個觀察者相信什麼」而行動——自然不會被你說服。賽局裡這是核心：你採取一個只有「真材實料的你」才付得起的動作，讓對手據此更新對你的信念。工程版：開源你的核心、跑一個誰都看得到的長期 SLA 紀錄——這些是對「會評估你的對手/客戶」發的可信訊號。\n\n**謝林點（focal point / Schelling point）。** 當兩邊**想協調但不能溝通**，某些選項會因為「顯著、自然、雙方都猜得到對方會猜」而被同時選中——不是因為它更優，是因為它**突出**。經典例子：兩個人要在一座沒約地點的城市碰面，很多人會不約而同去最有名的地標或正午的車站大廳——不是那裡最好，是那裡「大家都會想到大家都會想到那裡」。這個概念出自湯瑪斯·謝林（Thomas Schelling）1960 年的《The Strategy of Conflict》（謝林 2005 年與 Robert Aumann 共獲諾貝爾經濟學獎；此處為背景，細節以《賽局》為準）。單人決策裡「顯著性」毫無意義——自然不會跟你協調。工程版：大家不約而同把預設埠號設成某個「整數」、HTTP 200 當「成功」的共識、版本號從 1.0.0 起跳——這些協調的錨點都是謝林點。**「我們需要一個雙方都猜得到對方會選的點」這個需求一出現，你在賽局裡。**\n\n把這三個放一起看，它們有一個共同特徵：**都假設對面有一個會推理、會更新信念、會跟你互動的腦。** 自然沒有腦。所以這三件事在純單人決策裡全都不存在。它們是最好的「越界探測器」。\n\n## worked example：同一個「設一個閾值」問題的兩個版本\n\n這是本章的核心 worked example。同一句話——「設一個閾值」——對「自然」和「對手」是兩道結構不同的題。我把兩邊都一步步算給你看，重點是讓你**親眼看到單人期望值在版本二會給出一個錯誤的、會被對手讀走的答案**。\n\n設定：你要為一個 API 端點設一條「單一來源每分鐘最多 N 次請求」的限流線。超過就擋。簡化成只有兩個候選閾值供比較：**寬鬆 N=100** 與 **嚴格 N=20**。代價有兩種：擋到正常使用者（誤殺，每次成本 c_誤 = 1）、放過該擋的壞流量（漏網，每次成本 c_漏 = 5，漏網比誤殺貴，因為它直接傷到系統）。\n\n### 版本一：對手是「自然」（流量尖峰／無意識爆量）\n\n這裡「壞流量」是無意識的——某個寫壞的 client 在迴圈裡狂打、一次行銷活動帶來的尖峰。它**不會因為你設了哪個閾值而改變打法**。假設歷史數據給了固定的分布：\n\n```text\n版本一：對自然，固定分布（與你的閾值無關）\n\n  每分鐘流量裡：\n    正常使用者：通常 ≤ 20 次/分；只有 5% 的正常使用者會短暫衝到 20–100 次\n    無意識爆量：固定就是「狂打到 200 次/分」，不管你閾值設多少\n\n  閾值 N=100（寬鬆）：\n    誤殺正常使用者 ≈ 0（正常人很少破百）        → 誤殺成本 ≈ 0·c_誤 = 0\n    放過 100 次爆量（200 裡擋掉 100、放過 100） → 漏網成本 = 100·c_漏 = 100·5 = 500\n    期望成本 ≈ 0 + 500 = 500\n\n  閾值 N=20（嚴格）：\n    誤殺 5% 衝到 20–100 的正常人，設這群每分鐘有 40 人次被誤殺\n                                                → 誤殺成本 = 40·c_誤 = 40·1 = 40\n    放過爆量 (200 裡擋掉 180、放過 20)          → 漏網成本 = 20·c_漏 = 20·5 = 100\n    期望成本 ≈ 40 + 100 = 140\n\n  → N=20 期望成本 140 < N=100 的 500，選 N=20。✓\n```\n\n這個答案是**對的、而且穩定的**。為什麼穩定？因為那個爆量的 client 不會看你選了 N=20 然後改成「每分鐘剛好打 20 次」來鑽你——它是個無腦迴圈，明天還是狂打 200。你算出的 N=20 明天照樣最優。這就是單人決策的好處：**地形不動，最高點就一直在那。**\n\n### 版本二：對手是「攻擊者」（會讀你的閾值、再反制）\n\n同一條限流線，但壞流量的來源換成一個**會適應**的濫用者。他的目標是「在不被擋的前提下，盡量多打」。關鍵：**他會把請求量壓到剛好踩在你閾值線下。**\n\n```text\n版本二：對攻擊者，分布是「你閾值的函數」（他會反制）\n\n  你設 N，攻擊者就把每來源的請求量壓到 N（剛好不被擋）、\n  再用足夠多的來源把總量補回去（IP 池／多 ASN／多雲廠商）。\n  → 不管你 N 設多少，他「每來源打 N 次、不被擋」永遠成立。\n\n  你掃單人期望值，會掃出什麼？\n    你會以為：N 越小，每個來源能打的越少，漏網越少 → 把 N 壓到很小最好。\n    例如你照版本一的邏輯選 N=20，算出「漏網被壓到 20/來源」、期望成本看起來很低。\n\n  但這是「假設攻擊者不動」算出來的——他動了：\n    你把 N 壓到 20，他就用 10 倍的來源、每個打 19 次 → 總漏網量反而 不變甚至更大，\n    而你把 N 壓到 20 同時 誤殺了一大票衝到 20–100 的正常使用者（成本 40 那一塊狂漲）。\n    → 你「最優化」出來的 N，淨效果是「自己誤殺、對手照打」。\n\n  正確的問法（賽局）：\n    這不是「在固定分布下挑 N」，而是\n    「我選 N、他選(每來源量, 來源數)來反制、我再選…」的不動點。\n    解不是一個閾值數字，而是一組互相最優的策略\n    （通常要配合『提高他增加來源的成本』——驗證、信譽、行為指紋——\n      把問題從『純閾值』拉回一個他無法零成本反制的維度）。\n    這已經是賽局的地盤（見《賽局》談策略互動與機制設計）。\n```\n\n把兩個版本並排，差別一目了然：\n\n```text\n            版本一（自然）              版本二（對手）\n  分布      固定 P(壞流量)             P(壞流量 | 你的 N)，隨你的選擇而變\n  解的型態  argmax_N 期望成本（極值）   互相最優的不動點（均衡）\n  穩定性    明天照樣最優               你一上線，對手就讀走、反制\n  正確工具  本書（ch02–ch15）          賽局（見《賽局》）\n  用錯的後果 —                         你「最優化」自己誤殺、對手照打\n```\n\n**自我複核**：版本一的兩個期望成本——N=100 是 0 + 100·5 = 500，N=20 是 40·1 + 20·5 = 40 + 100 = 140，140 < 500，選 N=20，算術正確。版本二的重點不在算出一個漂亮的數字，而在**證明「用版本一那套去算版本二會給出一個會被反制的錯誤答案」**——這正是 T13 的核心：把會反應的對手當固定機率，會系統性低估他。注意版本二我**故意沒有**給出一個「正確的最優 N」，因為單靠一個閾值數字本來就不是賽局問題的解；解是一組策略加上「改變賽局結構」（提高對手反制的成本）的機制設計，那是《賽局》的事。\n\n這就是交棒的精確時刻：**當你發現「我算出的最優解，會因為對手讀走它而失效」，你手上的就不再是決策問題，而是賽局問題。** 把鑰匙交過去。\n\n## 邊界不是非黑即白：同一個系統會在兩邊之間漂移\n\n我得誠實補一句，免得你把這條界線用得太硬。現實系統裡，「自然」和「對手」常常是**同一個系統在不同時刻的兩種面貌**，界線會漂移：\n\n- 一個 API 今天的流量 99% 是無意識的正常使用（自然），直到有人發現它能被套利——那一刻，同一個系統從決策問題**變成**賽局問題。你的脊椎裡那個「要不要出現了會套利的對手」的時刻，往往來得很安靜。\n- 反過來，一個被攻擊的系統，當你用機制設計（驗證、配額、信譽）把對手反制的成本拉高到「他不值得反應」之後，他的最優策略**退化成固定**——你又可以暫時用單人期望值近似他了（接回前面「固定住對手的混合策略」那一刀）。\n\n所以更精準的判準不是「這個系統是決策還是賽局」，而是一個你每次設計時都該問的問題：**「我這個選擇，會不會改變對面那個東西的最優反應？」** 會 → 賽局；不會 → 決策。流量尖峰不會因為你的閾值而改變它的最優反應（它沒有最優反應，它無腦）；攻擊者會。這一問，比「分類這個系統」可靠得多，因為它跟著**對手有沒有腦**走，而不是跟著系統的名字走。\n\n```text\n判準（每次設計時自問一次）\n\n  「我這個選擇，會不會改變對面那個東西的『最優反應』？」\n\n     不會  → 對面是自然（沒有最優反應，或反應與你無關）\n            → 單人決策：ch02–ch15 的整套機器適用\n\n     會    → 對面是對手（會讀你的選擇、再反制）\n            → 賽局：求互相最優的不動點，交棒《賽局》\n\n  注意：同一系統會在兩邊漂移。出現「會套利的人」那一刻就越界了。\n```\n\n這也正好把本書的中央張力拉到一個新層面。前面十二章的張力是「規範（該怎麼選）vs 描述（人實際怎麼選）」。本章的張力換了個軸：**單人理性 vs 互動理性**。你可以是個完美的單人決策者——每個期望值都算對——卻在面對一個會反應的對手時系統性地輸，因為你解錯了問題的**種類**。理性不只是「算得對」，還包括「認得出你在哪一種問題裡」。這是 ch17 要接手的線。\n\n## 直覺的陷阱\n\n決策↔賽局的邊界，是工程師最容易踩錯的地方之一，因為單人期望值太好用、用順手了就會想套到所有問題上。守住 landscape 的 T13。\n\n| 陷阱 | 錯誤直覺長什麼樣 | 它在哪一步把你帶溝裡 | 正確版（怎麼自我察覺） |\n|---|---|---|---|\n| **把會反應的對手當固定機率**（具名陷阱，T13） | 「我拿攻擊流量的歷史分布算一個期望成本最小的閾值就好。」 | 你把 P(壞流量) 當成跟你的選擇無關的常數，代進 argmax——但它其實是 P(壞流量 \\| 你的閾值)。你解的是「假設對手不動」的最優，對手一動就失效。 | 對手的分布是你策略的函數。**徵兆**：你算出一個「最優解」，但隱隱覺得「上線當天就會被繞過」——那個直覺是對的，你在用單人工具解賽局。 |\n| **以為賽局只是「更難的決策」** | 「賽局就是對手比較聰明、機率比較難估的決策嘛，多算幾層就好。」 | 你以為差別是量（更難算），其實是質（不同的解概念）。單人決策求極值（argmax），賽局求不動點（均衡）。多算幾層期望值不會收斂到均衡——你猜他、他猜你，無窮回退。 | 均衡是**互相最優的自洽點**，不是「算得更深的 argmax」。**徵兆**：你的推理變成「我猜他猜我猜他……」——這個無窮回退就是你越界的信號，該換工具。 |\n| **以為混合策略「就是個機率分布、跟自然一樣」** | 「對手按某機率出招，那不就跟硬幣一樣？我代期望值就好。」 | 對——但**只在均衡已經定下來、對手的混合策略固定之後**才對。在那之前，那個機率分布本身是賽局解出來的、會隨你而變。你跳過了「均衡怎麼來的」直接用它的結果。 | 固定住的混合策略確實能當「自然」算（那一刀），**但那個分布是賽局給的，不是你能拿歷史數據估的**。徵兆：你想「估」對手的出招機率——自然的機率可以估，理性對手的均衡機率要解。 |\n| **把「承諾／自縛手腳」當成壞事** | 「選項當然越多越好（option value），綁死自己一定虧。」 | 這在單人決策裡完全正確（ch15），但你把它無條件帶進了有對手的世界。對會推理的對手，**可信地減少自己的選項**能改變他的最優反應，反而有利。 | 選項價值是**單人**真理；有對手時，承諾能讓威脅/讓步可信。徵兆：你發現「如果我能讓對方相信我別無選擇，他就會讓步」——這個念頭只在賽局裡成立，你已經出界。 |\n\n最值得記的一句自我察覺：**只要你的推理裡開始出現「他會怎麼想我會怎麼做」這種互相猜測的回退，你就已經不在這本書的地盤了。** 自然不會猜你。一旦對面開始猜你，交棒。\n\n## 紙上推演\n\n全部紙上推演、口頭自答，不需要跑任何東西。\n\n### 推演題\n\n**第 1 題（★★，[15 分鐘]）判斷下列各情境屬「單人決策（對自然）」還是「賽局（對對手）」，並用一句話說出判準。**\n\n1. 你給資料庫連線池設大小，依據是歷史 QPS 分布。\n2. 你給反爬蟲設請求頻率閾值，對面是會調整爬取節奏的競品爬蟲。\n3. 你決定要不要為一次罕見的硬碟批次故障多買備援。\n4. 你在一場 SLA 賠償談判裡決定開價，對面是會還價的客戶。\n5. 你給金絲雀部署設「錯誤率超過 X% 就自動回滾」的閾值，X 依據過往發布的錯誤率分布。\n6. 你設一個促銷折扣碼的使用上限，對面是會用腳本批量套利折扣的羊毛黨。\n\n**第 2 題（★★★，[20 分鐘]）口頭題：解釋「為什麼自然的不確定可以用期望值、會反應的對手不行」。** 要求你不只說結論，而是說清楚「期望值那一步在對手情境裡具體斷在哪」。\n\n**第 3 題（★★，[15 分鐘]）舉一個你系統裡「從決策變成賽局」的時刻**——某個本來對著無意識流量的閾值/規則，在某一刻出現了「會套利的對手」之後，為什麼舊的「最優設定」失效了？你當時是怎麼（或該怎麼）換工具的？\n\n---\n\n### 推演解答\n\n**第 1 題解答。** 判準只有一句：**「我這個選擇，會不會改變對面那個東西的最優反應？」**\n\n```text\n  1. 連線池大小 ← 歷史 QPS 分布          → 單人決策\n     （QPS 不會因為你把池子調大就「針對」你變大；自然。）\n  2. 反爬蟲閾值 ← 會調整節奏的競品爬蟲    → 賽局\n     （爬蟲會讀你的閾值、改節奏踩線；對手有最優反應。）\n  3. 罕見硬碟批次故障的備援              → 單人決策\n     （硬碟不會因為你買了備援就改變故障率；自然，且這是 ch07 資訊/ch15 序貫的料。）\n  4. SLA 賠償談判開價 ← 會還價的客戶      → 賽局\n     （對面會對你的開價反應、還價；談判是賽局原型。）\n  5. 金絲雀自動回滾閾值 ← 過往錯誤率分布  → 單人決策\n     （新版本的 bug 不會「針對」你的回滾閾值；自然。這是 ch15 序貫決策。）\n  6. 折扣碼使用上限 ← 會套利的羊毛黨      → 賽局\n     （羊毛黨會讀上限、用腳本剛好踩線繞過；對手。機制設計題。）\n```\n\n常見錯路：把第 3、5 題誤判成賽局，因為「故障/bug 感覺像在跟我作對」。但故障和 bug **沒有腦、沒有目標、不會讀你的設定再反制**——它們是自然，只是讓你不爽而已。判準看的是「對面有沒有會最佳化的腦」，不是「我有沒有被它害到」。反過來，第 2、4、6 的共同特徵是對面**有一個會看你出牌再出牌的人**。\n\n**第 2 題解答。** 完整版要點：\n\n期望值的核心動作是 `a* = argmax_a Σ_θ P(θ)·u(a,θ)`。這一步能成立，**唯一靠的就是 P(θ) 是一個跟你的行動 a 無關的固定分布**——你才能對每個候選 a 配同一張機率表、比期望效用、挑最高。\n\n對「自然」，這個前提成立：硬幣的 0.5、QPS 的分布、故障率，都不會因為你選了哪個 a 而改變。地形不動，argmax 找得到、而且明天還在。\n\n對「會反應的對手」，這個前提**斷掉**：對手的「分布」是你行動的函數 P(θ|a)——你選 a，他看到，再選對他最有利（對你最不利）的回應。於是：\n\n- 你要算 a 得先知道 P(θ|a)，但 P(θ|a) 取決於對手猜你選什麼 a；\n- 對手要決定回應得先猜你的 a，而你的 a 又取決於你猜他的回應……\n- → 無窮回退，沒有「固定的 P(θ)」可以代進 argmax。\n\n所以斷點是精確的：**期望值假設分布固定，對手讓分布變成你策略的函數，這個假設就垮了。** 解法不再是求極值（argmax），而是求一個互相最優的不動點（納許均衡）——這是質變。\n\n常見錯路：回答「因為對手比較聰明/難預測」。這沒抓到要害——難預測的自然（Knight 不確定、模糊）你還是可以用期望效用框架近似（ch04）。真正的要害不是「難」，是**分布依賴你的選擇**這個結構，它讓 argmax 這一步在數學上失去定義對象。\n\n**第 3 題解答（示範一條典型答案，你的會不同）。** 一個常見的真實版本：\n\n```text\n  從決策變成賽局的時刻：API rate limit 遇上薅羊毛\n\n  起點（決策）：\n    某 API 設了「每 token 每分鐘 60 次」的限流，依據是正常客戶的歷史用量分布。\n    這時對面全是無意識的正常使用——閾值 60 是個漂亮的單人期望成本最小解。\n\n  越界的那一刻（出現會套利的對手）：\n    有人發現這個 API 的回應可以被轉賣/濫用，開始用大量免費帳號、\n    每個帳號剛好打 59 次/分（踩在線下），用帳號數量把總量補上去。\n    → 你的「最優閾值 60」失效了：壓低閾值只會誤殺正常客戶，\n      對手換更多帳號照打。你解的不再是「挑一個閾值」。\n\n  換工具（從單人期望值 → 機制設計）：\n    不再糾結閾值數字，而是改變賽局結構——提高「多開帳號」的成本：\n    手機驗證、付費門檻、帳號信譽分、行為指紋。\n    把問題從「對手能零成本反制的純閾值」拉到「對手反制要付代價」的維度。\n    （這已經是《賽局》談機制設計的地盤。）\n```\n\n常見錯路：在越界之後，繼續「再調一次閾值」——這是把賽局問題當決策問題硬解的典型症狀，你會在「調閾值 → 被繞過 → 再調閾值」的迴圈裡轉圈，因為**你動的維度正是對手能零成本反制的維度**。跳出迴圈的方法是換維度（讓對手的反制變貴），那是機制設計、是賽局。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先問「為什麼」。\n\n1. 用一句話說出單人決策和賽局的分界——**為什麼**「自然不針對你、對手會」就足以分開這兩類問題？\n2. 期望值的核心動作 `argmax_a Σ P(θ)·u(a,θ)` 裡，**哪一個前提**在面對會反應的對手時會斷掉？斷掉之後，解的「型態」從什麼變成什麼？\n3. 「賽局只是更難的決策」錯在哪？「更難」是量變，賽局的差別**為什麼**是質變？（提示：argmax vs 不動點。）\n4. 混合策略什麼時候可以「當成自然的固定機率」用本書的期望值算、什麼時候不行？那個固定的機率分布是**估**出來的還是**解**出來的？\n5. 承諾（故意減少自己的選項）在單人決策裡是壞事（違反 option value），**為什麼**在賽局裡反而可能是優勢？舉一個工程例子。\n6. 你怎麼用一個問題就判斷「這是決策還是賽局」？為什麼這個問題比「給系統分類」可靠？\n7. 為什麼說「同一個系統會在決策和賽局之間漂移」？什麼事件會讓一個決策問題**變成**賽局問題？反過來，什麼做法能讓賽局問題**退化回**決策？\n8. 本章把全書中央張力換了一個軸（從「規範 vs 描述」換到「單人 vs 互動」）——你怎麼用自己的話講清楚：一個每個期望值都算對的人，**為什麼**仍可能在賽局裡系統性地輸？\n\n## 延伸閱讀\n\n- **Thomas Schelling，《The Strategy of Conflict》（1960）**：謝林點、承諾、可信威脅的原典；讀第 2–3 章對「承諾為何是優勢」最有感。謝林 2005 與 Robert Aumann 共獲諾貝爾經濟學獎（背景，2026-06）。\n- **John von Neumann & Oskar Morgenstern，《Theory of Games and Economic Behavior》（1944；期望效用公理化在 1947 二版附錄）**：賽局與單人效用的共同源頭——同一本書同時奠定了你前面學的 vNM 效用（ch03）和賽局。讀它能看見「決策↔賽局是同一枚硬幣兩面」不是比喻，是字面史實。\n- **Stanford Encyclopedia of Philosophy，「Game Theory」條目**（plato.stanford.edu/entries/game-theory/）：納許均衡、不動點、混合策略的嚴謹但可讀的入門；你想知道「均衡為什麼一定存在」時看這條（深入指向《賽局》全書）。\n- **本套姊妹書《賽局：當理性互相碰撞》**：本章交棒的去處——納許均衡的求解、混合策略、重複賽局與承諾、機制設計，全在那裡（見《賽局》談策略互動與機制設計）。本章只負責立界碑、不展開。\n- **回看本書 ch04（風險不是不確定）與 ch15（序貫決策）**：ch04 幫你分清「模糊（分布測不出）」和「賽局（分布會反應）」是兩件不同的事；ch15 的選項價值（option value）正是本章「承諾為何在賽局裡反而有利」的對照組——同一個動作，在單人世界是資產、在賽局世界可能該主動放棄。\n"}, {"id": "ch17-what-is-rationality", "file": "ch17-what-is-rationality.md", "group": "Part V — 收束", "title": "ch17 — 理性是什麼：規範與描述的和解", "md": "# ch17 — 理性是什麼：規範與描述的和解\n\n> **本章解決什麼問題**：全書到這裡，規範的地基（Part I–II：期望效用、貝氏決策、資訊的價值）已經立穩，描述的裂縫（Part III：展望理論）已經攤開，有限理性（Part IV）已經把「最佳化」放回一顆成本有限的腦，ch16 又畫清了「對手會反應時就交棒給賽局」的邊界。剩下一個沒回答的大問題壓在全書頭上：**「理性」這個詞到底指哪個——你「該」怎麼選（規範），還是你「實際」怎麼選（描述）？** 既然人系統性地偏離規範，那規範還算數嗎？人是不是就「不理性」？這章把全書的中央張力做一次哲學收束，給出最終回答；並把「理性三角」——決策、偏誤、科學方法這三本書的分工——講清楚，明寫本書承擔的招牌跨書連結。下一章（ch18）是收官，用脊椎決策把五種演算法對帳一遍。\n\n## 從你已知的出發\n\n你寫過 design doc，也跑過 postmortem。這兩件事，正好對應「理性」的兩種意思，而你早就同時在用、只是沒給它們起名字。\n\n**Design doc 是規範的。** 你在裡面寫「這個服務應該怎麼做容量規劃」「故障時應該按什麼順序降級」「這個權衡應該偏向可用性還是延遲」。你寫的是**該怎麼做**——一套在「如果大家都照著走」的理想前提下，能導出好結果的程序。它不描述任何人實際做了什麼，它規定一個標準。\n\n**Postmortem 是描述的。** 事故發生後你坐下來復盤，誠實記錄**人實際上怎麼做了**：on-call 在凌晨三點看到一片紅，憑印象判斷是 DB（先驗太強），漏看了 deploy 時間軸（基率忽視），在壓力下選了風險更大的緊急回滾而不是穩妥的漸進式回退（損失趨避加框架效應）。postmortem 不罵人——好的 postmortem 假設「換成任何人在那個情境下都可能這樣」，它描述真實的決策過程，包括它怎麼偏離了 design doc 寫的理想。\n\n現在問你一個問題：**design doc 和 postmortem 衝突的時候，是哪一個錯了？**\n\n直覺上你想說「都沒錯」，但講不清楚為什麼。如果 design doc 是對的（人該那樣做），那 postmortem 記錄的偏離不就證明人「沒做對」？如果 postmortem 是對的（人就是會那樣做），那 design doc 寫的理想不就是不切實際的空話？\n\n這正是全書的中央張力，穿上了工程的外衣：**規範（你該怎麼選）與描述（人實際怎麼選）之間那道穩定的裂縫，到底是誰錯了？** 我的答案——也是這章要慢慢說服你的答案——是：**兩個都對，因為它們根本在回答兩個不同的問題。** design doc 在回答「什麼程序能導出好決策」，postmortem 在回答「真實的腦在真實的成本下實際跑了什麼程序」。它們不是同一個問題的兩個答案（那才會有對錯），它們是兩個問題各自的正確答案。一個好的工程團隊不是「讓 postmortem 向 design doc 看齊」，而是**承認兩者之間有一道穩定的、可預測方向的裂縫，然後設計流程去補它**——這就是 runbook、checklist、review、預先承諾存在的全部理由。\n\n這章就是把這個工程直覺，升級成關於「理性」的一個完整立場。\n\n## 理性的兩個意思：程序的，與實質的\n\n先把「理性」這個被用爛的詞拆成兩半。這個拆法不是我發明的，它是 Herbert Simon（賽門）的——就是 ch13 那位有限理性的提出者。Simon 區分了**程序理性（procedural rationality）**與**實質理性（substantive rationality）**（這是他廣為人知的一組對照，常見於他談有限理性的著作；本書取其精神，不糾結確切出處頁碼）。\n\n```text\n   理性的兩種意思（Simon 的區分）\n\n   實質理性（substantive）            程序理性（procedural）\n   ──────────────────────            ──────────────────────\n   問「結果好不好」                   問「過程對不對」\n   ──────────────────────            ──────────────────────\n   一個選擇是理性的，                  一個選擇是理性的，\n   若它「客觀上」達成了目標            若它「用對的方法」做出來——\n   （達到了最好的結果）                即使結果不盡如人意\n\n   隱含假設：                          隱含假設：\n   ・所有選項都看得到                  ・腦／機器的算力有限\n   ・所有後果都算得出                  ・資訊有成本、不齊全\n   ・無限算力、無限時間                ・時間有限\n\n   ⇒ 古典經濟學的「理性人」            ⇒ Simon 有限理性的「理性人」\n     用的是這個意思                      用的是這個意思\n```\n\n這個區分一立起來，很多糾纏不清的爭論就解開了。\n\n**「人不理性」這句話，混淆了這兩個意思。** 當行為經濟學家說「人系統性地違反期望效用」，他說的是人偏離了**實質理性**的某個標準（期望效用最大化，那個假設無限算力的理想）。但這完全不蘊含人**程序上**不理性——一個在資訊與算力都有限的腦袋裡跑得相當不錯的決策程序（用捷思、用 satisficing、用損失趨避當快速警報），在它真實的約束下可能是**程序理性**的，哪怕它的輸出偏離了那個無限算力的理想。\n\n我用一個工程比喻把這件事釘死。**實質理性像是「假設無限記憶體、無限 CPU、零延遲網路」下寫出來的演算法**——理論上最優，O(最好)。**程序理性像是在真實機器上、有記憶體上限、有 GC 暫停、有網路逾時的約束下，能實際跑完並給出夠好答案的演算法。** 你不會因為一個演算法不是「假設無限資源下的理論最優」就說它「寫錯了」——如果它在真實約束下表現良好，它就是好程式。把人腦的決策說成「不理性」，常常就是犯了「拿無限資源的理論最優去羞辱一個在真實約束下跑得不錯的系統」這個錯。\n\n這給了我們和解的第一塊地基：**規範理論（期望效用）是「無限資源下的實質理性理想」；有限理性是「真實成本下的程序理性理想」；展望理論是「真實的腦實際跑了什麼程序」。三者不是互相打架，它們在回答三個不同的問題。** 下一節我把這三層攤開。\n\n## 三層，不是三個對手\n\n把全書出現過的「理性」整理成三層。關鍵在於：它們不是「三個候選答案要選一個對的」，而是**三個不同的問題各有各的答案**。這是和解的核心，請慢一點。\n\n```text\n   三層理性：三個不同的問題，不是三個對手\n\n   ┌─────────────────────────────────────────────────────────────────┐\n   │ 第一層：規範·無限資源                                           │\n   │   問題：在「能看到所有選項、算得出所有後果」的理想下，          │\n   │         該怎麼選？                                              │\n   │   答案：期望效用最大化（vNM 公理逼出的唯一演算法）                │\n   │   身分：理想的標竿。不描述任何真實的腦，是一把尺。              │\n   │   本書出處：Part I–II（ch03 vNM、ch05 貝氏決策、ch07 資訊價值） │\n   ├─────────────────────────────────────────────────────────────────┤\n   │ 第二層：規範·有限資源                                           │\n   │   問題：把「搜尋與計算本身有成本」算進去，該怎麼選？            │\n   │   答案：satisficing／設 aspiration level／夠好就停（修正規範）  │\n   │   身分：把成本納入後的「該怎麼做」——仍是規範，但更務實。        │\n   │   本書出處：Part IV（ch13 有限理性、ch14 多屬性、ch15 序貫）    │\n   ├─────────────────────────────────────────────────────────────────┤\n   │ 第三層：描述·真實的腦                                           │\n   │   問題：人「實際上」怎麼選？                                    │\n   │   答案：展望理論（參考點、損失趨避、機率權重、框架）            │\n   │   身分：描述模型。說人怎麼算，不說人該怎麼算。                  │\n   │   本書出處：Part III（ch08–12）                                 │\n   └─────────────────────────────────────────────────────────────┘\n   └─────────────────────────────────────────────────────────────────┘\n   它們之間的關係（注意都不是「對／錯」）：\n     第一層 → 第二層：把資源成本加進去，理想被「修正」（不是被推翻）\n     第一層 vs 第三層：理想與現實之間有「裂縫」（不是誰錯了）\n     第二層 ←→ 第三層：satisficing 既是修正規範、又貼近真實的腦\n                       （ch13 說它是「規範與描述的橋」就在這）\n```\n\n盯著最後那塊「它們之間的關係」看，因為這裡藏著全書最容易被講錯的一句話。\n\n**第一層和第二層之間，是「修正」不是「推翻」。** 把搜尋成本算進去之後，「找全域最大」不再是無條件的最優——在元層次上（把找答案的代價也算進帳），「夠好就停」可能才是真正的最佳化（ch13 的 T10）。所以第二層沒有否定第一層，它只是給第一層加了一個之前被理想化掉的約束項（成本）。這就像你不會說「考慮了 GC 暫停的演算法分析推翻了演算法理論」——它是在更真實的成本模型下的同一套最佳化思維。\n\n**第一層和第三層之間，是「裂縫」不是「對錯」。** 這是全書反覆敲的那句話，現在給它最精確的版本：**期望效用（第一層）回答「該怎麼選」，展望理論（第三層）回答「人怎麼選」，這是兩個不同的問題，所以它們的答案不同不構成矛盾，正如「地圖該畫成什麼樣」和「人實際怎麼走路」不同不構成矛盾。** 一張正確的地圖不會因為「行人實際上會抄近路、闖紅燈」就變成錯的地圖；行人的真實路徑也不會因為「不符合地圖規劃的路線」就變成錯的走法。它們是兩件事。\n\n這就是和解。它不是「各打五十大板、和稀泥」，它是一個精確的主張：**規範與描述描述的是兩件不同的事，所以一個系統性偏離規範的描述事實，邏輯上不能反駁規範、也不能證明人笨。** 下兩節分別把這兩個「不能」說透。\n\n## 為什麼「人偏離規範」不證明規範錯了\n\n這是全書中央張力的最終回答之一，也是最容易被滑過去的一步邏輯。慢。\n\n有一種很自然的推論，聽起來幾乎像常識：「既然正常、聰明、受過訓練的人都系統性地違反期望效用（Allais、Ellsberg 一路證過來），那這套規範理論一定有問題吧？真實的人都不照它走，它憑什麼說自己是『該怎麼做』的標準？」\n\n這個推論偷渡了一個前提：**「真實的人怎麼做」可以決定「人該怎麼做」。** 把這個前提攤在陽光下，你會發現它很可疑——它等於說「凡是人普遍會犯的錯，就不算錯」。\n\n用一個你熟悉的領域戳破它。**人類普遍、系統性、可預測地不會心算 137 × 256。** 這是一個關於人的穩定描述事實。但它證明「137 × 256 = 35072 這個算術規範錯了」嗎？當然不。它只證明「人腦不是為大數乘法優化的硬體」。算術規範（乘法該怎麼算）和人類描述事實（人實際算不出來）是兩回事；後者再穩定，也撼動不了前者。**「人做不到 X」從來不蘊含「X 不是該做的」**——除非你已經偷偷假設了「該做的＝人能輕鬆做到的」，而那恰恰是要被質疑的前提。\n\n```text\n   「人偏離規範 ⇒ 規範錯」這個推論斷在哪\n\n   前提（描述）：人系統性地違反期望效用       ← 真（Allais/Ellsberg）\n   想推出（規範）：所以期望效用不是好規範      ← 不跟著來\n\n   斷裂處：從「是」（人實際怎樣）跳到「應」（人該怎樣）\n           需要一座橋：「凡人普遍會犯的就不算錯」\n           ——而這座橋一攤開就站不住\n             （反例：人普遍算不出 137×256，\n              不證明這道乘法的正確答案錯了）\n\n   ⇒ 描述事實再穩定，也不能單獨反駁一個規範主張。\n     要反駁規範，得從「規範自己的公理不值得遵守」下手，\n     不能從「人不遵守它」下手。\n```\n\n那規範能不能被反駁？**能，但要從正確的方向。** 你不能因為「人不遵守獨立公理」就說獨立公理是錯的規範；你只能去論證「獨立公理這條公理本身不值得一個理性主體遵守」。這是 Allais 本人和許多後來者真正在做的事——他們不是說「人違反它所以它錯」（那是上面那個壞推論），他們是說「仔細想想，獨立公理作為一條規範要求，在某些情境下未必是我反思後願意被它約束的」。這是一場**規範層次**的辯論（公理該不該要），不是描述事實能裁決的。\n\n這正好回扣 ch11 結尾 Savage 的故事。Savage 自己在 Allais 兩題上選了不一致的答案（描述：他和大家一樣），但他**沒有因此放棄公理**——他反思後仍認為那幾條公理是他願意被約束的，於是把自己的選擇當成需要矯正的偏差改了回去。Savage 的態度精確地示範了上面這條邏輯：**「我違反了它」只是一個描述事實，要不要因此放棄這條規範，取決於我反思後還認不認這條公理，而不取決於我（或大家）有沒有違反它。** 你可以不同意 Savage 的最終選擇（Allais 就不同意），但你必須承認他把「是」和「應」分得很乾淨。這就是和解要求於你的紀律。\n\n## 為什麼「人偏離規範」不證明人笨\n\n另一個方向的誤讀，同樣自然，同樣錯：「好吧，就算規範沒錯，那人系統性違反它，總證明了人挺笨/挺不理性的吧？」\n\n不。這是把第三層（描述）誤當成「一份錯誤清單」。展望理論不是「人類決策 bug 大全」，它是**對一個在真實約束下運作的系統的精確刻畫**，而那個系統往往運作得相當好。把全書的描述發現重新看一遍，每一條「偏離」背後都有一個在真實世界裡站得住腳的理由：\n\n```text\n   每個「偏離」背後，都有一個真實約束下的好理由\n\n   描述發現（偏離規範）        真實約束下，它在解決什麼\n   ────────────────────       ──────────────────────────────\n   損失趨避（失比得重 λ 倍）   生存環境裡，「失去」常常不對稱地致命\n                              （餓死 vs 多吃一頓）——對失更敏感是\n                              便宜又救命的快速警報（ch09）\n   ────────────────────       ──────────────────────────────\n   參考點依賴（算變化不算狀態）狀態的絕對值常常無從感知，但「比上次好/\n                              壞」便宜可得——用變化當訊號是低成本策略\n                              （ch08）\n   ────────────────────       ──────────────────────────────\n   滿意即可（satisficing）     把搜尋成本算進去後，「夠好就停」可能\n                              就是最優；窮舉全選項才是真的不划算\n                              （ch13、T10）\n   ────────────────────       ──────────────────────────────\n   機率權重（高估小機率）       對「極小機率但極嚴重」的事件（捕食者、\n                              災難）保持過度警覺，在生存上的代價不對稱\n                              ——寧可錯防一千（ch09）\n```\n\n這不是說「所以人其實全對」——展望理論的這些機制在**它們演化出來的環境之外**確實會出系統性的錯（在現代金融市場裡損失趨避讓你太早賣掉賺錢的、死抱賠錢的；機率權重讓你同時買樂透又買保險）。重點是更細緻的一句：**這些偏離不是隨機的愚蠢，是有結構、有方向、可預測、且在原生約束下有功能的策略，被搬到了它沒被優化的新環境裡。** 把它叫「人笨」會錯過全部重點——重點恰恰是它**不笨**（有結構、可建模、能預測方向），只是**錯位**（被用在它沒被優化的場合）。\n\n這正是 ch08 的 T8、ch12 的 T7 守的那條線：**參考點依賴、損失趨避不是「人很笨」的指控，是穩定、可預測方向的描述性事實。** 一個能被 v(x)=−λ(−x)^β 這麼乾淨地刻畫、還能預測 Allais 違反往哪個方向發生的系統，配不上「笨」這個字。會說它笨的人，是拿第一層的尺（無限資源理想）去量第三層的系統（真實約束的腦），量出落差就喊「笨」——這恰恰是前面那個「拿無限資源理論最優羞辱真實系統」的錯誤的另一個版本。\n\n所以中央張力的最終回答，完整版是這樣兩句：\n\n> **人系統性偏離規範，既不證明規範錯（因為「是」推不出「應」），也不證明人笨（因為偏離是真實約束下有結構、有功能的策略）。它只證明了一件事：規範與描述是兩套都對的數學，在描述兩件不同的事——一個在說「無限資源下該怎麼選」，一個在說「真實的腦實際怎麼選」。那道裂縫不是 bug，是兩個不同問題各自正確的答案之間，本來就該有的距離。**\n\n我認為這是全書最值得你帶走的一頁。它不只是關於決策理論——它是一種看待「理想」與「現實」落差的成熟姿態：落差不是要消滅的醜聞，是要理解和管理的結構。\n\n## 理性三角：三本書，三個角度，同一個失誤\n\n到這裡，本書自己的故事講完了。但「理性」這個題目比一本書大——本書是「推理六書」家族的一員，它和兩本姊妹書構成一個招牌結構，我把它叫**理性三角**。這一節是這個三角的總述（總綱意義上本書承擔的招牌跨書連結）。\n\n三本書面對的是**同一個決策失誤**，但各站一個角度，回答三個不同的「怎麼」：\n\n```text\n   理性三角：同一個失誤，三個角度\n\n                    本書《在不確定中下注》\n                    ＝規範基準（該怎樣）\n                         ╱  ╲\n                        ╱    ╲\n                       ╱      ╲\n        《思考的陷阱》╱        ╲《如何不騙自己》\n        ＝心理機制   ╱          ╲ ＝制度防線\n        （怎麼錯）  ╱            ╲（怎麼防自欺）\n                  ●──────────────●\n\n   ─────────────────────────────────────────────────\n   角            問的問題              本書關係\n   ─────────────────────────────────────────────────\n   決策（本書）   規範上「該」怎麼算？  我是規範基準，\n                 偏離的數學描述是？     展望理論的數學在我這\n   ─────────────────────────────────────────────────\n   偏誤          心理上「為何」會錯？   我把心理成因\n   《思考的陷阱》 雙系統？捷思怎麼跑？   指向它（ch08/09/12/13）\n                 為何察覺不到？\n   ─────────────────────────────────────────────────\n   科學方法      制度上「怎麼」防自欺？ 我把制度防線\n   《如何不騙自己》同儕審查、預先註冊、  指向它（ch05/06）\n                 可重現——怎麼設計      ＝貝氏確證面互指\n                 流程不靠個人意志力\n   ─────────────────────────────────────────────────\n```\n\n用一個具體失誤把三角串起來——就用全書反覆出現的**基率忽視**（ch05 那個：alert 命中率高、真故障基率低，你收到 alert 時其實多半是偽陽，但你把「有 alert」當成「真有事」）：\n\n```text\n   同一個失誤「基率忽視」，三本書各說一段\n\n   ① 規範上該怎麼算（本書 ch05）：\n      P(真故障|alert) = P(alert|故障)·P(故障)\n                        ───────────────────────────\n                        P(alert|故障)·P(故障) + P(alert|沒事)·P(沒事)\n      ——後驗要把「故障的基率」乘進去，不能只看敏感度。\n        把脊椎檢查的數字搬過來：盛行率 1%、敏感度 99%、偽陽 5%\n        ⇒ 後驗只有 16.7%（ch05）。規範說：別把 99% 當成 16.7%。\n\n   ② 心理上為何會錯（《思考的陷阱》談雙系統與基率）：\n      快思（系統一）抓住生動的「alert 響了！」，\n      基率是個抽象、無聊、不生動的背景數字，被自動忽略。\n      ——這是心理機制，本書不展開，指向它。\n\n   ③ 制度上怎麼防（《如何不騙自己》談制度防線）：\n      不靠個人記得算貝氏——把基率「烤進」流程：\n      alert 旁邊自動顯示「此規則歷史真陽率」，\n      runbook 要求先看基率再行動。\n      ——這是制度設計，本書不展開，指向它。\n```\n\n三段話對應三本書，缺一不可：\n\n- 只有 ① 規範，你知道**該怎麼算**，但不知道**為什麼明知故犯**（凌晨三點你還是把 aler
