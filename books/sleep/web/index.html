重要的反迷思素材」：從一手事實查核文件、到爭議原始論文雙方、再到方法論限制的自我批判。\n\n| 資源 | 關聯迷思 | 出處章節 | 狀態 | 閱讀建議 |\n|------|---------|---------|------|---------|\n| **Guzey（古澤），\"Matthew Walker's 'Why We Sleep' Is Riddled with Scientific and Factual Errors\"（2019）** — https://guzey.com/books/why-we-sleep/ | Walker 的致癌、FFI、8 小時、WHO 流行病等戲劇性數字 | ch01、ch08、ch09、ch15、ch16 | landscape 已驗證 | 本書零信任主題最該讀的文件；讀「Chapter 1」那一節，看他如何把每個宣稱找回原始引用（或發現根本沒有） |\n| **Gelman（蓋爾曼）部落格跟進** — https://statmodeling.stat.columbia.edu/2019/11/18/is-matthew-walkers-why-we-sleep-riddled-with-scientific-and-factual-errors/ | Walker 的 U 形死亡率曲線被寫成單調遞減 | ch08、ch15、ch16 | landscape 已驗證 | 統計學家視角的補充，「U 形被寫成單調遞減」的分析特別值得看 |\n| **Xie 2013（建立方）** + **Miao 2024（反駁方）對讀** | 「睡眠會洗大腦」已是定論 | ch01、ch04、ch16 | landscape 已驗證 | 同一個問題、兩個方法、兩個相反結論——親眼看到什麼叫「科學仍在爭論」 |\n| **The Transmitter，膠淋巴爭議報導** — https://www.thetransmitter.org/glymphatic-system/new-method-reignites-controversy-over-brain-clearance-during-sleep/ | 膠淋巴清除是定論 | ch01、ch04、ch15、ch16 | landscape 已驗證 | 雙方採訪+方法學對比，是理解爭議最快的入口 |\n| **Science news，\"Does sleep really clean the brain? Maybe not\"** — https://www.science.org/content/article/does-sleep-really-clean-brain-maybe-not-new-paper-argues | 膠淋巴清除是定論 | ch04、ch15、ch16 | landscape 已驗證 | 較簡短；把「2024 年反駁為何值得認真看待」說得很生動 |\n| **Frank 2013, \"Why I Am Not SHY\"（PMC）** — https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3583075/ | SHY 是定論 | ch07、ch16 | landscape 已驗證 | SHY 最有名的公開反駁，讀完 SHY 後看這篇，感受科學假說如何被辯駁 |\n| **Roenneberg 等, \"Chronotype and Social Jetlag: A (Self-)Critical Review,\" *Biology*, 2019（PMC）** — https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6784249/ | 社會性時差→健康損害（因果） | ch11 | landscape 已驗證 | 提出社會性時差概念的人本人 15 年後審視自己研究的方法論限制——示範科學家的自我批判 |\n| **Liu et al., *BMC Cancer*, 2018（65 研究、155 萬人統合分析）** — https://bmccancer.biomedcentral.com/articles/10.1186/s12885-018-5025-y | 「睡<7 小時→癌症風險加倍」（Walker 宣稱） | ch08 | landscape 已驗證 | 讀結論和摘要：整體 OR 接近 1 且 CI 橫跨 1，直接反駁 Walker 的戲劇性數字 |\n| **NSF 多相睡眠立場聲明（*Sleep Health*, 2021）** — https://www.sciencedirect.com/science/article/pii/S2352721821000309 | 「多相睡眠能省睡眠時間」 | ch13 | landscape 已驗證 | NSF 明確說明無科學支持且有健康風險 |\n| **van der Lande et al., *SLEEP*, 2024（多相睡眠前瞻研究）** — https://academic.oup.com/sleep/article/47/2/zsad321/7485581 | 多相睡眠可行且安全 | ch13 | landscape 已驗證 | 十人設計、高退出率＋生長激素幾近停止；讀完理解「少數完成者的數字≠普遍可複製」 |\n| **Depner et al., *Current Biology*, 2019（週末補眠）** — https://www.cell.com/current-biology/fulltext/S0960-9822(19)30098-3 | 「週末補眠可逆轉慢性缺睡」 | ch08、ch11、ch13 | landscape 可信（Cell 官網） | 週末補眠未能逆轉胰島素敏感性下降，且睡眠中點劇烈變動再擾亂生理時鐘 |\n| **Cochrane 2023，防藍光眼鏡系統性回顧（Singh 等）** — https://www.cochranelibrary.com/cdsr/doi/10.1002/14651858.CD013244.pub2/full | 「防藍光眼鏡顯著改善睡眠」 | ch15 | landscape 已驗證 | 17 項試驗，GRADE 極低確定性；讀懂「可能無差別」的措辭是科學誠實，不是「沒差就沒差」 |\n\n---\n\n## 路線三：往實踐證據\n\n本路線整理指引、官方聲明、機制循證建議——只放本書已核對真實的條目。\n\n| 資源 | 主題 | 出處章節 | 狀態 | 閱讀建議 |\n|------|------|---------|------|---------|\n| **ACP 2016 CBT-I 臨床指引原文，*Annals of Internal Medicine*** — https://www.acpjournals.org/doi/10.7326/M15-2175 | CBT-I 為慢性失眠一線（強推薦） | ch09、ch12、ch15、ch16 | landscape 已驗證 | 直接看「強推薦」後面的證據等級說明，理解為何優先於藥物；有基礎論文閱讀能力可讀 abstract + recommendation |\n| **ACP 新聞稿（CBT-I 快速摘要）** — https://www.acponline.org/acp-newsroom/acp-recommends-cognitive-behavioral-therapy-as-initial-treatment-for-chronic-insomnia | CBT-I | ch09、ch15 | landscape 已驗證 | 一頁版：「為什麼不先開藥」的理由說清楚 |\n| **Sleep Foundation CBT-I 條目** — https://www.sleepfoundation.org/insomnia/treatment/cognitive-behavioral-therapy-insomnia | CBT-I 技術說明 | ch09 | landscape 可信 | 概覽睡眠限制、刺激控制等各組成技術 |\n| **NSF 睡眠時機共識聲明（2023）** — https://www.thensf.org/sleep-schedules-sleep-timing-guideline/ | 固定起床時間是獨立健康因子 | ch15 | landscape 已驗證（ch15 延伸閱讀） | 說清楚「規律性本身是獨立健康因子」，不只是睡眠時長的附屬 |\n| **系統性回顧，\"Sleep timing, sleep consistency, and health in adults\"（cdnsciencepub）** — https://cdnsciencepub.com/doi/10.1139/apnm-2020-0032 | 固定睡眠時機與健康 | ch15 | landscape 已驗證（ch15 延伸閱讀） | 固定睡眠時機與健康關聯的文獻回顧，標「相關非因果」閱讀 |\n| **UT Austin meta-analysis 新聞稿（溫水澡與睡眠，2019）** — https://news.utexas.edu/2019/07/19/take-a-warm-bath-1-2-hours-before-bedtime-to-get-better-sleep-researchers-find/ | 核心體溫下降助眠機制 | ch15 | landscape 已驗證（ch15 延伸閱讀） | 13 項試驗、縮短入睡 ~10 分鐘；說明末梢散熱→核心體溫下降→入睡的機制鏈 |\n| **\"Melatonin as a Chronobiotic with Sleep-promoting Properties\"（2022）** — https://pubmed.ncbi.nlm.nih.gov/35176989/ | 褪黑激素是計時信號而非安眠藥 | ch03、ch12 | landscape 已驗證 | 把「計時信號」和「安眠藥」清楚分開的回顧；也含 ~7 分鐘效應量的討論 |\n| **Dutheil et al., 短午睡系統性回顧，*IJERPH*, 2021** — https://www.ncbi.nlm.nih.gov/pmc/articles/PMC8507757/ | 午睡（≠多相睡眠）的效益 | ch13 | landscape 已驗證（ch13 延伸閱讀） | 支持 20–30 分鐘午睡效益的系統回顧；讀完可清楚區分「午睡」和「多相睡眠」 |\n| **\"Circadian rhythm in restless legs syndrome,\" *Chronobiology International*, 2023（PMC）** — https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9995399/ | 不寧腿症候群的晝夜節律特徵 | ch10 | landscape 已驗證（ch10 延伸閱讀） | iron/dopamine/adenosine 交互作用機制，支持 Process C 夜間亢進觸發 RLS 的說法 |\n| **NHTSA「Drowsy Driving」** — https://www.nhtsa.gov/risky-driving/drowsy-driving | 疲勞駕駛的官方統計與風險 | ch08 | landscape 可信（聯邦機構） | 看懂「估計 vs 實際回報數字」的巨大差距（疲勞事後難取證） |\n\n---\n\n## 章節－資源快查索引\n\n以下表格讓你從章節直接找到對應的優先延伸資源（只列最重要的 1–2 條；完整清單見上方各路線）。\n\n| 章節 | 章名 | 優先閱讀 |\n|------|------|---------|\n| ch01 | 睡眠不是關機 | Borbély 2022 reappraisal；Guzey 查核文 |\n| ch02 | 一夜的解剖 | Sleep Foundation「Stages of Sleep」；StatPearls「Physiology, Sleep Stages」 |\n| ch03 | 雙歷程模型 | Borbély 2022 reappraisal；Reichert 等 2022（腺苷/咖啡因） |\n| ch04 | 清除與膠淋巴爭議 | Xie 2013 + Miao 2024 對讀；The Transmitter 報導 |\n| ch05 | 記憶鞏固 | Neuron 2023（ASC 綜述）；eLife 2025（spindle–SO coupling meta-analysis） |\n| ch06 | REM 與情緒夢境 | Walker & van der Helm 2009（overnight therapy）；Dreaming in NREM, JNeurosci 2018 |\n| ch07 | 校準與分子時鐘 | Tononi & Cirelli 2020（SHY）；Frank 2013（反駁）；2017 諾獎 advanced information |\n| ch08 | 睡眠剝奪 | Guzey 查核文；Liu 2018 BMC Cancer（統合分析，反 Walker 致癌宣稱） |\n| ch09 | 失眠與 CBT-I | ACP 2016 指引原文；Sleep Foundation CBT-I 條目 |\n| ch10 | 猝睡症與睡眠障礙 | Rauf et al. 2025（NT1 食慾素）；StatPearls「Narcolepsy」 |\n| ch11 | 社會性時差與輪班 | Roenneberg 2019 自我批判回顧；Wittmann 2006（原始奠基論文） |\n| ch12 | 咖啡因、酒精與藥物 | Reichert 2022（腺苷）；Cruz-Sanabria 2024（褪黑激素劑量）；ACP 2016 指引 |\n| ch13 | 天生短睡、午睡、多相 | van der Lande 2024（多相睡眠前瞻）；NSF 多相立場；Depner 2019（週末補眠） |\n| ch14 | 夢與清醒夢 | Walker & van der Helm 2009；\"The neuroscience of lucid dreaming\" ScienceDirect 2024 |\n| ch15 | 睡眠衛生的證據分級 | Cochrane 2023（防藍光）；ACP 2016 指引；Guzey 查核文 |\n| ch16 | 終章 | Borbély 2022；Guzey；The Transmitter；ACP 2016（三條路線一站彙整） |\n\n---\n\n*附錄 C 由 ch01–ch16 各章「延伸閱讀」段彙整，最後更新：2026-06-21。時效性事實以 `_meta/landscape-2026-06.md` 為基準；若有連結失效或事實更新，請依 `_meta/maintenance.md` 的掃描協定同步修正。*\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "睡眠的科學：事實基準（2026-06 查證）", "md": "---\nlast_verified: 2026-06-20\nreview_after_days: 365\nstatus: research-agent-draft\nsource: web research 2026-06-20\nbook_id: sleep\n---\n\n# 睡眠的科學：事實基準（2026-06 查證）\n\n本檔是本書《大腦每晚的維護工作：睡眠的科學》全書「機制、人物、年份、效應量、歸屬、爭議現況」的權威錨點。各章引用任何數字、年份、人名、研究、效應量、機制宣稱時，請對照本檔，**不要憑記憶、不要憑科普二手轉述**。\n\n睡眠科學與純數學書不同：這裡的「事實」很多是**仍在演化、仍有爭議、或被暢銷書嚴重誇大**的。本書脊椎（睡眠＝大腦的維護視窗，做三件事：清除／鞏固／校準；雙歷程模型 Process S × Process C 是排程器）裡，**有一整支腳（清除＝膠淋巴系統）目前正處於公開的學術爭議中**——這正是本書「直覺的陷阱」與「零信任事實觀」最該發光的地方。把爭議寫成爭議，不要替讀者選邊。\n\n## 使用規約\n\n- ✅ = 已確認（≥2 獨立來源，或一個權威原始來源／系統性回顧）。可直接照寫，但機制類仍要用「目前理解是…」的語氣，別寫成永恆定律。\n- ⚠️ = 單一來源、效應量小、樣本有限、或細節我無法百分百確認。看到 ⚠️ 請照本檔給的保守版寫，**附 hedge**，別擴張。\n- ❌ = 通行科普說法**是錯的／被嚴重誇大／已被挑戰**。本檔給出正確版或爭議現況；這些是全書最該守住的點，多半進「## 直覺的陷阱」段。\n- 🔥 = **活躍爭議前沿**（學界尚無共識）。**必須呈現雙方、不可斷言單一答案**，並標時點 `（2026-06）`。本書最重要的 🔥 是膠淋巴清除（§4）。\n- 來源優先序：原始論文／系統性回顧／官方機構（Nobel、ACP、NSF、AASM）> 大學新聞稿／權威科學媒體（Science、Nature news、The Transmitter、Alzforum）> Wikipedia > 一般科普網站 > 部落格（Guzey 的批評是例外：它本身就是一手的事實查核文件，可直接引為「對某宣稱的具名質疑」）。\n- 人名第一次出現給「中譯（原文，生卒若關鍵）」；專有名詞給「中文（English）」。\n\n---\n\n## 〇、全書最高風險事實（撰章前先讀這張表，其餘各節是展開）\n\n| # | 宣稱 | 狀態 | 一句話正確版／hedge |\n|---|------|------|--------------------|\n| 1 | 膠淋巴系統：睡眠時大腦清除廢物**增加** | 🔥 活躍爭議 | 2013 原始研究說增加 ~60%；2024 起多組（含 Imperial College）反指睡眠/麻醉時清除**減少**。寫成「仍在爭論的前沿」，**不可斷言**（§4）。 |\n| 2 | Walker《Why We Sleep》的戲劇性數字 | ❌ 多項有具名事實錯誤指控 | 「睡<6-7h 致癌風險加倍」「致死性家族失眠症＝缺睡而死」「WHO 宣布睡眠流行病」等皆被 Guzey 2019 指為錯誤或無據。**一律不得當定論引用**（§9）。 |\n| 3 | 「每個人都需要 8 小時」 | ❌ 被誤傳 | NSF 建議是**範圍 7-9h**、不是定點 8h；需求因人/年齡而異。別寫「8 小時」為硬標準（§9、§13）。 |\n| 4 | 90 分鐘睡眠週期是固定鐵律 | ⚠️ 平均值、變異大 | 平均 ~90-110 分、人/夜變動大，首個週期常較短。寫「約 90 分」並標「平均、個體與夜間變異大」（§2）。 |\n| 5 | 褪黑激素是安眠藥 | ❌ 被誤傳 | 它是**授時/計時信號（chronobiotic）**，催眠效果微弱（縮短入睡 ~7 分鐘）。別寫成助眠藥（§7）。 |\n| 6 | 致死性家族失眠症證明「人會被缺睡害死」 | ❌ 誇大 | FFI 是**普利昂蛋白神經退化病**，全腦受損，死於神經退化非單純缺睡（§9）。 |\n| 7 | 多相睡眠能「省下睡眠時間」 | ❌ 無科學支持 | 無證據支持益處，且損害認知/內分泌（生長激素幾乎停止分泌）。NSF 不建議（§11）。 |\n\n---\n\n## 一、雙歷程模型（脊椎的排程器）：Borbély 1982\n\n- ✅ **雙歷程模型（two-process model of sleep regulation）由 Alexander Borbély（亞歷山大·博貝利，瑞士蘇黎世）於 1982 年提出**，原始論文：Borbély A.A., \"A two process model of sleep regulation,\" *Human Neurobiology*, 1982, **1, 195–204**。\n- ✅ **Process S（睡眠恆定歷程）**：清醒時指數上升、睡眠時指數下降的「睡眠壓力」；其時程由人類 EEG 慢波活動（slow wave activity, SWA）的頻譜分析導出；入睡時 S 的高度＝先前清醒時間的函數。**「S」取自 Pappenheimer 的「Factor S」**。\n- ✅ **Process C（生理時鐘歷程）**：由生理時鐘振盪器驅動的睡眠傾向晝夜節律，原模型用一條正弦函數表示，相位由長時清醒下的警覺度節律資料導出。\n- ✅ 兩歷程**交互作用**決定睡眠時機與結構（S 與 C 的「差距」驅動睡與醒）。這是本書脊椎裡的「排程器」隱喻來源。\n- ⚠️ **hedge**：這是一個**極具影響力但仍是「模型」**的框架，不是被測出的物理定律。Borbély 本人 2016、2022 都發表了再評估（reappraisal），且 2025 有人提出替代視角（npj Biological Timing and Sleep）。寫作時：模型是真的、影響力是真的，但用「這個模型把睡眠調節拆成兩股力量」這種「模型如此刻畫」的語氣，別寫成「科學已證明大腦裡有兩個鐘」。\n- 來源：Borbély 2022 reappraisal（PMC）https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9540767/ ；原始 1982 模型概述 PDF https://cdn2.hubspot.net/hubfs/6674255/Two-Process-Model-Sleep-Regulation.pdf ；2016 reappraisal https://onlinelibrary.wiley.com/doi/full/10.1111/jsr.13598\n- **工程橋接安全**：Process S 像「累積的待辦/技術債」、Process C 像「排程器的 cron 時窗」——這個類比是 OK 的，但別讓類比偷渡成「機制已完全確立」。\n\n## 二、睡眠階段、週期與 hypnogram\n\n- ✅ 現行分期（**AASM 標準**）：**NREM 分 N1、N2、N3**（N3 即慢波睡眠／深睡，舊分期的 stage 3+4 合併），加 **REM（快速動眼期）**。寫作用 N1/N2/N3/REM，別用舊的「stage 1-4」當主標（可注「舊分期把深睡再分 3、4 期」）。\n- ✅ 一夜約 **4–5 個睡眠週期**；每週期平均 **~90 分鐘（常見區間 90–110 分，有來源寫 90–120）**。\n- ⚠️【高風險，常被當鐵律】**「90 分鐘」是平均值、個體與夜間變異大**：第一個週期常較短（~70–100 分），後段週期較長。坊間「用 90 分鐘倍數定鬧鐘」是把平均值當精確常數，**不可靠**。寫作時：給「約 90 分」並明說「這是平均，會因人、因夜、因年齡變動」。\n- ✅ **hypnogram（睡眠結構圖）形狀**：**前半夜 N3（深睡）佔比高、後半夜 REM 變長**。第一個 REM 期常很短（<10 分），愈到後半夜 REM 期愈長（可達 ~40 分以上）。整夜 NREM 約佔 75–80%。\n- ✅ 這個「前深睡、後 REM」的形狀對應脊椎裡的維護排程：慢波睡眠（前半夜密集）與清除/突觸校準關係密切、REM（後半夜密集）與情緒/某些記憶處理關係密切。**hedge**：別把「N3＝清除、REM＝情緒」寫成一對一的硬對應（功能歸屬仍在研究）。\n- 來源：Sleep Foundation「Stages of Sleep」https://www.sleepfoundation.org/stages-of-sleep ；NREM 細節 https://www.sleepfoundation.org/stages-of-sleep/nrem-sleep\n- ⚠️ 待補：N1/N2/N3/REM 各自的「平均佔比百分比」我建議撰章時若要給數字，現場再查一次原始來源並標範圍（不同來源略有出入），別寫死單一百分比。\n\n## 三、慢波睡眠與記憶鞏固（脊椎第二件事：鞏固）\n\n- ✅ **主流框架是「主動系統鞏固假說（active systems consolidation, ASC）」**：NREM（尤其慢波睡眠）期間，**海馬迴的記憶痕跡「重播（replay）」**，與海馬尖波漣波（sharp-wave ripples）、丘腦睡眠紡錘波（spindles）、皮質慢振盪（slow oscillations）三者時間上協同，把記憶從海馬迴依賴逐步轉成皮質的 schema 記憶。\n- ✅ REM 也參與（傳統上連結情緒記憶處理；但近年證據顯示慢波睡眠也參與情緒記憶強化）——**功能分工沒有乾淨的「NREM 管事實、REM 管情緒」二分**。\n- ⚠️ **hedge**：「睡眠鞏固記憶」整體上證據相當扎實（這是本書可以較有信心講的維護工作），但**具體機制（哪個振盪做什麼、replay 的因果角色）仍是活躍研究**。寫「目前最被接受的圖像是…」，別把 ASC 寫成已蓋棺定論。\n- 來源：Neuron「Sleep—A brain-state serving systems memory consolidation」(2023) https://www.cell.com/neuron/fulltext/S0896-6273(23)00201-5 ；BMB Reports「Systems memory consolidation during sleep」https://www.bmbreports.org/view.html?uid=2168&vmd=Full\n- **工程橋接安全**：replay ≈ 把當日 WAL（write-ahead log）在維護窗重放、整理進長期儲存；spindle/ripple 的時間協同 ≈ 兩個服務要對齊時鐘才能正確 hand-off。這些類比 OK。\n\n## 四、🔥🔥🔥 膠淋巴系統與「睡眠時清除增加」——全書最重要的活躍爭議\n\n**這是本書脊椎「清除」這隻腳，也是全書事實風險最高、最該示範零信任的一節。撰章務必把它寫成「仍在爭論的前沿」，呈現雙方，不可斷言。**\n\n### 建立期（2012–2013）\n- ✅ **「膠淋巴系統（glymphatic system）」一詞與機制由 Iliff（傑佛瑞·伊利夫）、Nedergaard（邁肯·內德加德，羅徹斯特大學）團隊於 2012 年提出**：Iliff et al., *Science Translational Medicine*, 2012——腦脊髓液（CSF）沿穿透動脈周圍的旁血管空間（paravascular space）進入腦實質、與間質液交換、沿旁靜脈路徑排出；依賴星狀膠細胞上的**水通道蛋白 AQP4（aquaporin-4）**（敲除 AQP4 使間質溶質清除下降約 70%）。名稱＝glia（膠細胞）＋lymphatic（淋巴）。\n- ✅ **Xie et al., *Science*, 2013, 342:373–377**（\"Sleep drives metabolite clearance from the adult brain\"，Nedergaard 團隊）：在小鼠觀察到**自然睡眠或麻醉時，腦間質空間擴大約 60%**，CSF–間質液對流交換增加，β-類澱粉蛋白（amyloid-β）清除加快。**這是「睡眠＝大腦清洗」這個流行說法的原始出處**，2014 年獲 AAAS Newcomb Cleveland 獎。\n\n### 🔥 反駁與爭議期（2024 起，截至 2026-06 未有共識）\n- 🔥 **Miao et al., *Nature Neuroscience*, 2024**（\"Brain clearance is reduced during sleep and anesthesia\"，**Nick Franks（尼克·法蘭克斯）團隊，Imperial College London**）：用**直接注入腦組織**的染料追蹤，發現**睡眠與麻醉時清除速率顯著「降低」**——與 2013 結論相反。Franks：「整個領域如此聚焦於『清除是睡眠主因之一』，我們觀察到相反結果時非常意外。」\n- 🔥 **Nedergaard 公開反駁**：指對方技術用法有誤（直接注入腦組織需要更多對照來檢查膠質瘢痕、確認染料劑量真的到達組織）；且其「睡眠組」其實是**5 小時睡眠剝奪後的恢復睡眠**模型、非自然睡眠，她稱此「具誤導性」。Nedergaard 團隊 2024-08 在 bioRxiv 貼出 \"Glymphatic clearance is enhanced during sleep\" 反駁。\n- 🔥 **2024 另有 Cell 論文**（Nedergaard 等）提出**正腎上腺素（norepinephrine）介導的慢血管運動（slow vasomotion）驅動睡眠時膠淋巴清除**的機制——支持「睡眠時增加」一方。\n- 🔥 截至 **2026-06**，雙方分歧的核心是**方法學**（示蹤劑放 CSF vs 直接注入腦組織，得到相反結論），學界普遍認為需要更好的工具（如基因改造小鼠模型）才能裁決。\n\n### 撰章鐵律\n- ❌ **絕對不可**寫「科學已證明睡眠時大腦會清洗自己／沖走毒素」為定論。\n- ✅ 正確寫法：「**膠淋巴系統是一個有力但仍在爭論的假說**。2013 年的開創性研究指出睡眠時清除增加（脊椎『清除』這隻腳的來源），但 2024 年起有研究用不同方法得到相反結果（睡眠時清除反而降低），雙方在方法學上僵持，截至 2026 年中尚無共識。」\n- ✅ 這一節正是本書「零信任事實觀」與「直覺的陷阱」的招牌示範：一個被科普反覆引用、寫進無數文章的「事實」，其實是**正在被重新檢驗的前沿**。可明說：脊椎的「三件維護工作」中，「鞏固」與「校準」證據較穩，**「清除」這隻腳目前最不確定**——這種誠實正是本書的價值。\n- 來源（雙方都給）：Science news「Does sleep really clean the brain? Maybe not」 https://www.science.org/content/article/does-sleep-really-clean-brain-maybe-not-new-paper-argues ；Imperial 新聞稿 https://www.imperial.ac.uk/news/253273/scientists-find-sleep-clear-brain-toxins/ ；The Transmitter「New method reignites controversy」 https://www.thetransmitter.org/glymphatic-system/new-method-reignites-controversy-over-brain-clearance-during-sleep/ ；Nature Neuroscience 原文 https://www.nature.com/articles/s41593-024-01638-y ；Xie 2013 原文 https://www.science.org/doi/abs/10.1126/science.1241224 ；Iliff 2012 原文 https://www.science.org/doi/10.1126/scitranslmed.3003748 ；Cell 2024（NE-vasomotion）https://www.cell.com/cell/fulltext/S0092-8674(24)01343-6\n\n## 五、突觸恆定假說 SHY（脊椎第三件事：校準）\n\n- ✅ **突觸恆定假說（synaptic homeostasis hypothesis, SHY）由 Tononi（朱利歐·托諾尼）與 Cirelli（基婭拉·奇雷利）提出**（Tononi & Cirelli, *Brain Res. Bull.* 2003, 62:143–150，後續 2006、2014、2020 擴充）。核心：**清醒時學習使皮質突觸整體增強（淨增），睡眠（尤其 NREM 慢波）時做整體性的「降縮（downscaling/renormalization）」**，把突觸強度重新正規化，恢復訊噪比與可塑性空間。名言：「**睡眠是大腦為可塑性付出的代價（sleep is the price the brain pays for plasticity）**」。\n- ✅ 這是脊椎「校準」這隻腳的主要理論支柱（把突觸權重重新標準化 ≈ 防止飽和）。\n- ⚠️ **hedge：SHY 不是無爭議的共識**。它與「主動系統鞏固（ASC，§3，主張睡眠選擇性強化某些連結）」表面張力明顯（一個講整體降縮、一個講選擇性強化）；學界有公開反駁（如 \"Why I Am Not SHY: A Reply to Tononi and Cirelli\"）。寫作時把 SHY 與 ASC 都當「互補/競爭中的理論圖像」，別把任一個寫成定論。\n- 來源：Tononi & Cirelli「Sleep and synaptic down-selection」(2020, Eur J Neurosci) https://onlinelibrary.wiley.com/doi/abs/10.1111/ejn.14335 ；反駁 \"Why I Am Not SHY\" https://www.ncbi.nlm.nih.gov/pmc/articles/PMC3583075/\n- **工程橋接安全**：downscaling ≈ 維護窗做的「整體權重正規化／清快取防止無界膨脹／GC 壓掉碎片」；ASC vs SHY 之爭 ≈ 「維護到底是『選擇性壓實熱資料』還是『全表重整』」——這個張力本身就是好教材。\n\n## 六、腺苷與咖啡因（Process S 的分子側、脊椎「清除/壓力」的化學面）\n\n- ✅ **腺苷（adenosine）累積與睡眠需求高度相關**，是促眠物質；清醒時細胞外腺苷累積，透過 **A1 受體（A1R）與 A2A 受體（A2AR）** 促進睡眠。常被當作 Process S（睡眠壓力）的分子對應之一。\n- ✅ **咖啡因（caffeine）是腺苷受體拮抗劑（antagonist）**，對 A1 與 A2A 受體親和力都高；它「擋住」腺苷的促眠信號而非「補充能量」。\n- ✅ 小鼠證據：咖啡因促醒**主要透過阻斷 A2A 受體**（A2A 功能被基因敲除的小鼠，咖啡因無法干擾睡眠）。\n- ⚠️ **hedge**：「腺苷＝睡眠壓力的唯一/完整分子機制」是過度簡化。腺苷是重要但**不是唯一**的睡眠調節物質；Process S 的分子基礎仍是活躍研究。寫「腺苷是睡眠壓力背後最被研究的分子之一」，別寫「睡眠壓力就是腺苷」。\n- 來源：Reichert et al.「Adenosine, caffeine, and sleep–wake regulation」(2022, J Sleep Res) https://onlinelibrary.wiley.com/doi/full/10.1111/jsr.13597\n- **工程橋接安全**：咖啡因是「拮抗劑佔住受體」≈ 一個**競爭性鎖定/把監聽器佔住讓真信號送不進來**；「擋住壓力信號≠清掉壓力」≈ 把告警靜音不等於修了根因（債還在累積，藥效退了會反撲）。\n\n## 七、生理時鐘的分子機制與褪黑激素（Process C 的內部）\n\n### SCN 與分子鐘（2017 諾貝爾獎）\n- ✅ **2017 年諾貝爾生理醫學獎**頒給 **Jeffrey C. Hall（傑佛瑞·霍爾）、Michael Rosbash（麥可·羅斯巴什）、Michael W. Young（麥可·楊）**，表彰「控制晝夜節律的分子機制」之發現。\n- ✅ 他們用**果蠅**研究：1984 年分離／克隆出 **period 基因（per）**；其產物 **PER 蛋白**夜間累積、日間降解、回頭抑制自身基因——這個**轉錄–轉譯負回饋迴圈（transcription-translation feedback loop, TTFL）機制模型由 Hardin, Hall & Rosbash 1990（*Nature*）正式提出**，產生 ~24 小時振盪。**年份鐵律：1984＝分離基因；1990＝提出 TTFL 機制，勿合併成一句。**\n- ⚠️【高風險的物種混淆，**必查**】**果蠅的核心夥伴基因是 timeless（TIM）**；本書若要講**哺乳類**的分子鐘，核心負回饋成員是 **PER（PER1/2/3）與 CRY（cryptochrome, CRY1/2）**，正向臂是 **CLOCK 與 BMAL1**。任務書點名的「PER/CRY」是**哺乳類**版本——別把哺乳類的 CRY 安到果蠅頭上，也別說諾獎得主「發現了 CRY」（他們的關鍵是 per/tim/PER 的果蠅工作；CLOCK 由 Takahashi 1997 在小鼠發現）。寫作建議：講諾獎史用果蠅 per/PER/tim；講人體生理時鐘用 PER/CRY、CLOCK/BMAL1，並把兩個層次分清楚。\n- ✅ 中樞時鐘位於下視丘的**視交叉上核（suprachiasmatic nucleus, SCN）**，由視網膜光信號授時（entrainment）。\n- 來源：NobelPrize.org 2017 summary https://www.nobelprize.org/prizes/medicine/2017/summary/ ；advanced information https://www.nobelprize.org/prizes/medicine/2017/advanced-information/\n\n### 褪黑激素（melatonin）\n- ❌【高風險迷思，**進「直覺的陷阱」**】**褪黑激素不是安眠藥，是「授時/計時信號（chronobiotic）」**——它告訴大腦「現在是夜晚」（黑暗信號），而非「強迫睡著」。它對 SCN 的 MT1/MT2 受體作用以對齊/提前生理時鐘相位。\n- ✅ 其**催眠效果微弱**：一份回顧（19 試驗）顯示褪黑激素僅縮短入睡約 **7 分鐘**、增加總睡眠時間約 **8 分鐘**（對比安慰劑）。\n- ⚠️ 因此褪黑激素**對「相位問題」（時差、睡眠相位延遲）比對「入睡困難」更對症**；劑量與**服用時機**比劑量大小更關鍵（生理劑量 0.3–1 mg 常被認為足夠）。\n- 來源：「Melatonin as a Chronobiotic with Sleep-promoting Properties」(2022) https://pubmed.ncbi.nlm.nih.gov/35176989/ ；Psychiatric Times https://www.psychiatrictimes.com/view/role-melatonin-circadian-rhythm-sleep-wake-cycle\n- **工程橋接安全**：褪黑激素 ≈ **NTP/時間同步信號**（校準時鐘相位），不是 ≈ 強制關機指令。把它當「對時」而非「斷電」是正確直覺。\n\n## 八、天生短睡者基因（傅嫈惠團隊）\n\n- ✅ **傅嫈惠（Ying-Hui Fu，加州大學舊金山分校 UCSF）團隊**發現多個「天生短睡（familial natural short sleep, FNSS）」基因。\n- ✅ **DEC2（BHLHE41）：2009 年**發現的第一個——帶該點突變（DEC2^P384R^）者平均約睡 **6.25 小時**（不是 8 小時）卻無明顯損害；機制與 orexin（食慾素）表現上升有關。\n- ✅ **ADRB1：2019 年**發現的第二個——某家族三代短睡者帶 ADRB1 單點突變，睡得更短（有報導稱接近 4–6 小時）。\n- ⚠️ 截至近年，該團隊累計發現**約 7 個**與天生短睡相關的基因（含 DEC2、ADRB1、NPSR1、GRM1 等）。具體數字與「平均睡幾小時」各家族不同，撰章給數字時標「某家族/某突變」、別一概而論。\n- ❌【重要的反迷思，**進「直覺的陷阱」**】**這些是極罕見的天生突變，不能推論「我也可以訓練自己少睡」**。FNSS 者是基因讓他們真的不需要那麼多睡眠；一般人少睡就是睡眠剝奪。別讓讀者把「有人天生短睡」誤讀成「短睡可習得/無害」。\n- 來源：UCSF「After 10-Year Search, Scientists Find Second 'Short Sleep' Gene」(2019) https://www.ucsf.edu/news/2019/08/415261/archive-after-10-year-search-scientists-find-second-short-sleep-gene ；BrainFacts「The Ones Who Need Little Sleep」(2025) https://www.brainfacts.org/thinking-sensing-and-behaving/sleep/2025/the-ones-who-need-little-sleep-013025\n\n## 九、❌🔥 Matthew Walker《Why We Sleep》的事實錯誤指控（全書最該守住的「不可引用為定論」清單）\n\n**鐵律：Walker 書中的戲劇性數字，本書一律不得當定論引用。若要提，只能提「這是一個被廣泛流傳、但被具名查核者指出有誤的宣稱」並給正確版。**\n\n- ✅ **背景**：Alexey Guzey（阿列克謝·古澤）2019 年發表長文〈Matthew Walker's \"Why We Sleep\" Is Riddled with Scientific and Factual Errors〉，逐條查核（光第一章就花 130 小時），引發學界討論（含哥倫比亞 Andrew Gelman 部落格的跟進）。Walker 後來在自己網站做了部分回應/勘誤，但多數指控未被推翻。\n- ❌ **「routinely 睡 <6–7 小時會摧毀免疫、致癌風險加倍」**：Walker 無引用；一份 2018 年含 65 研究、1,550,524 人、86,201 癌症病例的系統性回顧發現「短睡與長睡皆未與癌症風險增加相關」。**不可引用。**\n- ❌ **「致死性家族失眠症（fatal familial insomnia, FFI）證明缺睡會直接害死人」**：FFI 是**普利昂蛋白（prion）神經退化疾病**，侵犯全腦/全身器官，死於神經退化而非單純缺睡；且患者並非完全不睡、某些藥物有助眠、存活期（約 9–31 月）依基因型差異大。Walker 的描述含多處不實。\n- ❌ **「WHO 宣布工業化國家進入睡眠流行病（sleep loss epidemic）」**：WHO **從未**如此宣布；Walker 引的是一部 National Geographic 紀錄片（片中根本沒提 WHO 或 epidemic）。\n- ❌ **「睡得愈短、命愈短」（單調遞減）**：實際上死亡率與睡眠時長是 **U 形**（過短與過長都升高），最低點約 7 小時。Walker 把 U 形寫成單調下降。\n- ❌ **「三分之二成人沒睡到建議的 8 小時」**：NSF 建議是**範圍 7–9 小時、非定點 8 小時**；Walker 把範圍偷換成 8 小時來造統計。WHO 亦無任何睡眠時長建議。\n- ⚠️ **「夏令時間切換後心臟病發作 +24%」**：源自一個**僅密西根州、四年、約每日 31 例**的小研究（Sandhu et al. 2014），且增幅出現在週一/週二而非切換當天；後續其他地區（如瑞典）效應量小很多（~6.7%），整體證據**不一致、效應量不確定**。要提就標「小樣本、單一地區、效應量有爭議」（§13）。\n- 來源：Guzey 原文 https://guzey.com/books/why-we-sleep/ ；Gelman 部落格跟進 https://statmodeling.stat.columbia.edu/2019/11/18/is-matthew-walkers-why-we-sleep-riddled-with-scientific-and-factual-errors/\n- **本書定位**：Walker 案是「暢銷科普如何把不確定/錯誤寫成斬釘截鐵」的最佳負面教材，正好服務本書的零信任主題。**態度**：不必全盤否定睡眠的重要性（睡眠確實重要），但要把「具體誇大數字」與「睡眠很重要」這個一般結論分開——這正是 Guzey 與 Gelman 的立場。語氣對事不對人、克制。\n\n## 十、食慾素／下視丘分泌素與猝睡症（脊椎的反例：排程器壞掉時）\n\n- ✅ **食慾素（orexin，又名下視丘分泌素 hypocretin）由下視丘外側神經元分泌，是維持清醒的關鍵促醒系統**。\n- ✅ **第一型猝睡症（narcolepsy type 1, NT1，伴猝倒 cataplexy）的主因是下視丘分泌 orexin 的神經元選擇性喪失（>90%）**——是「促醒開關」壞掉，導致清醒/睡眠（尤其 REM）邊界崩塌（白天過度嗜睡、猝倒、睡眠麻痺、入睡幻覺）。\n- ✅【**自體免疫病因：強假說但仍非 100% 鐵證**】NT1 與 **HLA 亞型 DQB1*06:02** 高度相關，普遍**假設**是 T 細胞自體免疫攻擊 orexin 神經元，可能由感染（H1N1 流感、某些疫苗）觸發。寫「強烈的自體免疫假說/廣被接受」而非「已證實的自體免疫病」——精確的自體抗原與致病鏈仍在研究（有研究未找到特異自體抗體）。\n- 來源：「Hypocretin (orexin) biology and the pathophysiology of narcolepsy with cataplexy」(2015) https://pubmed.ncbi.nlm.nih.gov/25728441/ ；Medical News Today「orexin-narcolepsy」 https://www.medicalnewstoday.com/articles/orexin-narcolepsy\n- **工程橋接安全**：orexin 神經元 ≈ 維持「清醒」這個狀態的**看門狗/心跳保活（keep-alive）行程**；它死掉 ≈ 保活行程崩了，系統隨機掉進 REM（狀態機非法轉移）。猝睡症 ≈ **狀態機的不變式被破壞**（該分離的狀態互相滲漏）。\n\n## 十一、❌ 多相睡眠（polyphasic sleep）的科學地位\n\n- ❌【**進「直覺的陷阱」**】**沒有科學證據支持多相睡眠（如 Uberman：一天數次 20 分鐘小睡、總睡 2–4 小時）能減少睡眠需求**；美國 National Sleep Foundation 明確不建議，並指其有顯著身心風險。\n- ✅ 證據：極端多相時程大幅壓縮慢波與 REM 總時數、損害警覺/認知/情緒；一項小型前瞻研究（\"Sustained polyphasic sleep restriction abolishes human growth hormone release\", *SLEEP* 2024，見下方來源）中**多數受試者於數週內因無法耐受而退出、完成者出現生長激素分泌幾近停止**（內分泌損害可能比認知損害更早顯現）。**撰章鐵律：這是「多數人撐不住＋少數完成者內分泌受損」的小樣本研究，勿簡稱「個案研究」而淡化其高退出率，亦勿把單一完成者的數字寫成普遍可複製的精確結論。**\n- ⚠️ **平衡**：「白天小睡（nap）」本身有其價值（與多相睡眠是兩回事）；別把「多相睡眠無效」誤寫成「所有午睡都沒用」。本書談的是「用多相時程取代正常睡眠以省時間」這個宣稱——這個是沒科學支持的。\n- 來源：National Sleep Foundation 共識（ScienceDirect）https://www.sciencedirect.com/science/article/pii/S2352721821000309 ；「Sustained polyphasic sleep restriction abolishes human growth hormone release」(SLEEP, 2024) https://academic.oup.com/sleep/article/47/2/zsad321/7485581\n\n## 十二、青少年睡眠相位延遲與晚型睡眠時鐘\n\n- ✅ **青春期前後，多數青少年出現睡眠–清醒「相位延遲（phase delay）」**：入睡與起床時間往後移，相對童年最多可延後約 2 小時。\n- ✅ 生理機制：青春期使**內源性褪黑激素分泌起始時間延後約 1–3 小時**，加上睡眠驅力累積變慢，使青少年「生理上」難以早睡。\n- ✅ 這與「早開始的上學時間」衝突，造成慢性睡眠不足；美國兒科學會（AAP）等倡議**延後上學時間**。\n- ⚠️ **hedge**：相位延遲是生理現象（不是「青少年懶」），但「延後上學」的政策效益有持續辯論、且社會作息（social time）也參與形塑青少年時鐘（2025 有研究指青少年時鐘對「社會時間」比「日照時間」更敏感）。寫「生理延遲是真的；政策層面仍在權衡」。\n- 來源：AAP「School Start Times for Adolescents」(2014) https://publications.aap.org/pediatrics/article/134/3/642/74175/ ；「The adolescent circadian clock entrains to social time rather than sun time」(2025) https://www.sciencedirect.com/science/article/pii/S0960982225003756\n\n## 十三、社會性時差（social jetlag）與時型（chronotype）\n\n- ✅ **社會性時差（social jetlag）由 Till Roenneberg（提爾·羅內伯格）團隊提出**（並建立 **慕尼黑時型問卷 Munich Chronotype Questionnaire, MCTQ**；奠基論文 Roenneberg, Wirz-Justice & Merrow,〈Life between clocks〉, *J. Biol. Rhythms* **2003**，問卷雛形可追溯至約 2002）。\n- ✅ 定義：**工作日與休息日的「睡眠中點（mid-sleep）」之差**＝ SJL = MSF − MSW（MSF=休息日睡眠中點，MSW=工作日睡眠中點）。直觀＝你的生理時鐘與社會作息長期錯位，像每週都在跨時區。\n- ✅ 晚型（late chronotype）者社會性時差通常最大、工作日睡債最重。\n- ⚠️【**關鍵 hedge，作者本人也提醒過**】**社會性時差的健康關聯多為相關、非因果**；且社會性時差常與「睡得更短、品質更差」綁在一起，難以分離「慢性時鐘錯位本身」貢獻多少（Roenneberg 等 2019 的「自我批判式回顧」即點出此限制）。與晚型最強的相關之一是吸菸（典型的混淆因子警訊）。寫關聯時務必標「相關非因果」。\n- 來源：原始論文 Wittmann/Roenneberg「Social Jetlag: Misalignment of Biological and Social Time」(2006) https://www.tandfonline.com/doi/abs/10.1080/07420520500545979 ；自我批判回顧「Chronotype and Social Jetlag: A (Self-)Critical Review」(2019) https://www.ncbi.nlm.nih.gov/pmc/articles/PMC6784249/\n- **工程橋接安全**：social jetlag ≈ **本地時鐘（生理）與排程器設定的 cron 時區（社會作息）長期不一致**，每週上班像一次小型時區遷移；「相關非因果」≈ 別把共變的指標當成根因。\n\n## 十四、✅ CBT-I 為慢性失眠首選療法\n\n- ✅ **認知行為治療失眠（CBT-I, cognitive behavioral therapy for insomnia）是成人慢性失眠的一線治療**：**美國內科醫師學會（American College of Physicians, ACP）2016 年臨床指引**（*Annals of Internal Medicine*）給「**強推薦**」（證據等級中等），優先於藥物。\n- ✅ CBT-I 含：睡眠限制（sleep restriction）、刺激控制（stimulus control）、認知治療、睡眠衛教等組合；可個別/團體/線上/自助書形式進行。\n- ✅ 理由：相對藥物**傷害更少、效果更持久、避免安眠藥副作用**。CBT-I 無效時才以醫病共決加入藥物。\n- ⚠️ 這是本檔少數可以較有信心寫成「主流共識」的一條（有官方指引背書）；但仍標年份（2016 ACP）並注「指引可能更新，撰章時可再查 AASM 最新版」。\n- 來源：ACP newsroom https://www.acponline.org/acp-newsroom/acp-recommends-cognitive-behavioral-therapy-as-initial-treatment-for-chronic-insomnia ；指引原文 *Annals* https://www.acpjournals.org/doi/10.7326/M15-2175\n- **工程橋接安全**：CBT-I 的睡眠限制/刺激控制 ≈ **重建睡眠的「條件反射綁定」（床=睡，移除床上的清醒活動）＝清掉錯誤的快取關聯**；對比「吃安眠藥」≈ **熱修補/壓症狀** vs CBT-I ≈ **改根因、效果持久**。\n\n---\n\n## 待補/撰章時現查（本檔未深挖、但可能被某章用到）\n\n- ⚠️ 各睡眠階段「平均佔比百分比」（N1/N2/N3/REM 各約幾 %）——不同來源略異，撰章給數字時現查原始來源並標範圍。\n- ⚠️ 「不睡覺最久世界紀錄（Randy Gardner 264 小時，1964）」——常被引用但屬軼事/單一個案，且金氏世界紀錄已停止認證此類嘗試（安全考量）；若要用，標為「著名個案、非受控研究」。\n- ⚠️ 「成人各年齡建議睡眠時長表」——以 NSF / AASM 最新版為準（範圍而非定點），撰章現查。\n- ⚠️ 咖啡因半衰期（常引 ~5–6 小時，個體差異大、受 CYP1A2 基因型影響）——若用標範圍與個體差異。\n- ⚠️ 「夢與 REM 的關係」——夢不只發生在 REM（NREM 也有夢報告），別寫「REM＝做夢期」的硬等號。\n\n---\n\n## 撰章前必讀的高風險事實（濃縮版，對照 §〇 表使用）\n\n1. **膠淋巴清除是 🔥 活躍爭議**（2013 增加 vs 2024 減少，方法學僵持，2026-06 無共識）——脊椎「清除」這隻腳**不可斷言**。（§4）\n2. **Walker 的戲劇性數字一律不引為定論**（致癌加倍／FFI 缺睡而死／WHO 流行病／睡愈短命愈短／8 小時硬標準皆被具名指錯）。（§9）\n3. **褪黑激素是計時信號非安眠藥**（催眠效果僅 ~7 分鐘）。（§7）\n4. **90 分鐘週期是平均、變異大**，別當定鬧鐘的精確常數。（§2）\n5. **果蠅 per/tim/PER（諾獎史）vs 哺乳類 PER/CRY、CLOCK/BMAL1**——別把 CRY 安到果蠅、別說諾獎得主發現 CRY。（§7）\n6. **天生短睡基因（DEC2/ADRB1）是極罕突變**，不可推論「短睡可習得/無害」。（§8）\n7. **多相睡眠無科學支持**（但別波及「正常午睡」）。（§11）\n8. **social jetlag 的健康關聯是相關非因果**（作者本人亦提醒）。（§13）\n9. **SHY（校準）與 ASC（鞏固）是競爭/互補的理論圖像**，都別寫成定論。（§3、§5）\n10. **NT1 的自體免疫是強假說**，寫「廣被接受的假說」而非「已證實」。（§10）\n\n---\n\n## 補充：P1 自我審查 + agy 二意見（2026-06-20，撰章 web 查證後納入）\n\n以下為 P1 self-review 與 agy 二意見指出的「該補的迷思／機制」。撰對應章時 WebSearch 查證後納入並標時點。\n\n- **週末補眠無法逆轉慢性缺睡的代謝危害（Depner et al. 2019, *Current Biology*）→ ch08／ch13**：常見迷思「平日少睡、週末補回來」；研究顯示週末補眠未能逆轉胰島素敏感性下降，且睡眠中點劇烈變動進一步擾亂生理時鐘。脊椎歸位：欠的維護不是補一次就清。\n- **藍光與防藍光眼鏡被誇大（Cochrane 2023 系統性回顧證據薄弱）→ ch15**：迷思「螢幕藍光是睡眠唯一殺手」「防藍光眼鏡顯著改善睡眠」；事實上環境總照度（lux）同樣關鍵，且 2023 Cochrane 回顧指防藍光眼鏡改善睡眠品質的臨床證據極弱。放入 ch15 證據分級「被誇大」格。\n- **核心體溫下降是入睡的生理開關 → ch03／ch15**：入睡需核心體溫下降約 1°C；睡前溫水澡（末梢血管擴張助散熱）、適宜室溫（常引約 18°C／65°F）藉此助眠——補一條「真有機制」的睡眠衛生條目。\n- **膠淋巴爭議的「人類↔齧齒類平移鴻溝」→ ch04**：2013/2024 的清除爭議幾乎全建立在小鼠雙光子成像；人體因倫理無法破壞性活體觀測、多靠間接 MRI，平移有效性存在鴻溝——這是把 §4 爭議寫得更紮實的一筆（強化「仍在前沿、不可斷言」）。\n- **酒精助眠是假象（已在 outline ch12）**：確認本檔 §12（咖啡因/酒精/安眠藥）撰章時涵蓋——抑制前半夜 REM、後半夜反彈、片段化、交感反彈。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "maintenance.md — 大腦每晚的維護工作（id sleep）", "md": "# maintenance.md — 大腦每晚的維護工作（id sleep）\n\n維護本書時的權威基準。改任何基準數字，必須照「一致性基準表」全書同步，並在掃描日誌記一行。事實錨點＝`landscape-2026-06.md`（含末尾「補充」addendum）。\n\n## 一致性基準表（各章不得另創寫法／數字／歸屬）\n\n| 基準 | 鎖定值 | 出現章 |\n|---|---|---|\n| 三件維護工作 | 清除（clearance）／鞏固（consolidation）／校準（calibration）——固定三詞，清除證據最不確定 | 全書脊椎／ch01 |\n| 雙歷程模型 | Borbély 1982 *Human Neurobiology*；Process S（睡眠壓力）× Process C（生理時鐘）；寫「模型」不寫「已測出兩個鐘」 | ch03 定版 |\n| 睡眠分期 | AASM：N1/N2/N3（N3=慢波/深睡）＋REM；NREM 約佔 75–80% | ch02 |\n| 睡眠週期 | 一夜 4–5 個；平均 ~90 分（90–110），第一週期常較短——非定鬧鐘常數 | ch02/ch15 |\n| 🔥 膠淋巴爭議 | Iliff/Nedergaard 2012 提機制（依 AQP4）；Xie 等 *Science* 2013 稱睡眠時間質空間擴大 ~60%、清除增加；**2024 Miao 等 *Nat Neurosci*（Franks 團隊）反指清除減少**；**2026-06 無共識**，絕不可斷言「睡眠洗掉毒素」 | ch04 定版／ch01 預告 |\n| 校準 SHY | Tononi & Cirelli 2003；清醒增強突觸、睡眠降縮；與 ASC 是競爭/互補、都別寫定論 | ch07 |\n| 腺苷/咖啡因 | 腺苷促眠（A1R/A2AR），是 Process S 分子對應**之一非唯一**；咖啡因＝腺苷受體拮抗劑，半衰期 ~5–6 h（CYP1A2） | ch03/ch12 |\n| 分子鐘（諾獎） | 2017 Hall/Rosbash/Young，**果蠅** per/tim；**1984 分離 period 基因；1990 Hardin/Hall/Rosbash 提 TTFL；1994 楊發現 timeless**；哺乳類 PER/CRY＋CLOCK/BMAL1（CLOCK=高橋 1997）；別把 CRY 安到果蠅 | ch07 定版 |\n| 褪黑激素 | 授時/計時信號（chronobiotic）**非安眠藥**；19 試驗：縮短入睡 ~7 分、增加總睡眠 ~8 分 | ch03/ch12 |\n| 天生短睡 FNSS | 傅嫈惠團隊；DEC2 2009、ADRB1 2019；某突變者 ~6.25 h 無明顯損害；**極罕、不可推論可習得** | ch13 |\n\n## 已知脆弱事實清單（最易出錯／最該守住）\n\n- **膠淋巴 2013 vs 2024 僵持、無共識**——標準措辭「有力但仍在爭論的假說」，絕不寫「睡眠洗腦」。\n- **Walker《Why We Sleep》戲劇數字**（致癌加倍、FFI 因缺睡而死、WHO 列致癌、U 形死亡、人人需 8h）一律不引為定論。\n- **諾獎是果蠅 per/tim**；TTFL=Hardin **1990**（非 1984，1984 是分離 period 基因）；MCTQ=2003。\n- **腺苷是 Process S 之一非唯一**；褪黑激素非安眠藥。\n\n## 掃描協定\n\n1. 動基準數字 → 先改 landscape，再全書同步，記日誌。2. ASCII 圖 → `check_diagrams.py book-src`（exit 0）。3. book-src → `lint_book.py book-src`（0 errors）＋重打包。4. 重大修正需 2 獨立來源。\n\n## 掃描日誌\n\n- **2026-06-21 建書（P1–P5）**：起草 ch01–16＋3 附錄（Sonnet 續跑）。P1 agy 修正進 landscape：TTFL=Hardin 1990（與 1984 分離基因分開）、MCTQ=2003、多相睡眠改述為高退出 cohort（非個案）。\n- **2026-06-21 P3**：lint 0 errors；diagrams exit 0（重生成 ch02 hypnogram、ch03 S/C 曲線圖達 CJK=2 對齊）；spine 16/16；glymphatic ~60%、melatonin 7/8 分、90 分週期、FNSS 6.25h 一致；ch07 TTFL 年份（1984 基因/1990 TTFL/1994 TIM）正確、果蠅 per/tim vs 哺乳類 PER/CRY 正確。\n- **2026-06-21 P4**：agy 逐章審 16/16；套用驗證修正（zh-TW 用語如「尸解→大體解剖」、對齊 landscape、膠淋巴過度宣稱收斂為 hedge）。\n- **⚠️ 待網路查證（未改）**：ch09「涵蓋 37 項研究的網絡後設分析…緩解率 41%/28%」agy 指應為 Furukawa 2024「13 項 RCT（823 人）」；ch05 Newbury 睡眠剝奪 meta 年份 2022 vs 2021；ch10 食慾素神經元數「70,000–80,000」vs「50,000–80,000」；ch02「~96 分鐘中位數週期（ScienceDirect 2023）」歸屬。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《大腦每晚的維護工作：睡眠的科學》（id=sleep；最終書名於 outline gate 由作者定案）\n形態：16 章、四個 Part、3 個附錄。欣賞與直覺型科普書（**不是醫療/治療/自助手冊、不是教科書、不是自我追蹤實驗手冊**；純思想實驗與紙上推演，**無 Python、無真實世界自我追蹤實驗**）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；機制、人物、年份、效應量、歸屬、爭議現況以 `landscape-2026-06.md` 為事實錨，撰章時另用 WebSearch/WebFetch 查證 3~8 次並 hedge。\n\n## 全書敘事弧\n\n睡眠不是「關機」，而是大腦每晚排程的一段**維護視窗**。全書用一條脊椎把所有現象歸位：**這是哪一項維護工作（清除／鞏固／校準）？由排程器（雙歷程模型）的哪個歷程（S／C）驅動？**\n\n每晚下線一段時間有多奇怪、為什麼演化沒把它優化掉（ch01 ＋全書地圖）→ 一夜睡眠不是均質黑屏、而是 N1/N2/N3/REM 週期的結構化排程（ch02 逐時追蹤一夜）→ **排程器登場**：睡眠壓力 Process S × 生理時鐘 Process C 兩個獨立信號合成「現在該睡還是該醒」（ch03，全書框架的樞紐）→ **三件維護工作逐一檢視，且誠實標示證據強度**：清除（ch04 膠淋巴系統，**全書最高風險的 🔥 活躍爭議，必呈現雙方不可斷言**）、鞏固（ch05 記憶固化，證據較穩、機制仍研究中）、REM 與作夢（ch06 情緒校準與創造力的假說）、校準（ch07 突觸恆定 SHY 與分子生理時鐘的內部）→ **排程器壞掉與被現代生活破壞時會怎樣**：睡眠剝奪的真實代價（ch08，謹慎 hedge、不引 Walker 戲劇數字）、失眠與 CBT-I（ch09）、看門狗壞掉的猝睡症與其他障礙（ch10）、社會性時差與輪班（ch11）→ **邊界與民俗的證據分級**：咖啡因/酒精/安眠藥對睡眠結構的真實影響（ch12）、短睡者/午睡/多相睡眠的真相（ch13）、夢與睡眠中的意識（ch14）、睡眠衛生的證據分級（ch15）→ 總收官：六條主線口試（ch16）。\n\n零信任暗線（交織不另立章）：一個被無數文章引用的「事實」如何被建立、又如何被翻案或誇大——膠淋巴 2013 建立 / 2024 反駁（ch04）、Walker《Why We Sleep》被 Guzey 2019 逐條查核（散見 ch08/ch13/ch15）、褪黑激素＝安眠藥迷思（ch03/ch12）、90 分鐘鬧鐘迷思（ch02/ch15）、多相睡眠省睡迷思（ch13）、social jetlag 當因果（ch11）。本書的價值有一半來自把這些誠實寫成「仍在爭論／被誇大」，而不是替讀者選邊斷言。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 為什麼要睡            Part II 三件維護工作\nch01 每晚下線的怪事          ch04 清除：膠淋巴爭議 ★\nch02 一夜的結構         →    ch05 鞏固：記憶固化\nch03 兩個歷程＝排程器 ★      ch06 REM 與作夢\n                             ch07 校準：突觸與分子鐘\n                                      │\n                                      ↓\nPart IV 邊界與實踐           Part III 故障與後果\nch12 咖啡因酒精安眠藥        ch08 睡眠剝奪的真實代價\nch13 短睡午睡多相睡眠   ←    ch09 失眠與 CBT-I\nch14 夢與睡眠中的意識        ch10 猝睡症與其他障礙\nch15 睡眠衛生證據分級        ch11 社會性時差與輪班\nch16 總收官：六主線口試\n```\n\n★＝全書兩個樞紐：ch03 兩個歷程（排程器＝全書框架的引擎）、ch04 膠淋巴爭議（脊椎「清除」這隻腳的最高張力、零信任主題的招牌示範）。\n\n## 跨章基準（一致性掃描的依據；各章不得另創寫法、命名、數字）\n\n**脊椎**：睡眠＝大腦每晚的維護視窗，做三件事——**清除**（代謝廢物）、**鞏固**（記憶）、**校準**（突觸與情緒）；**雙歷程模型（Process S × Process C）是這個維護工作的排程器**。每章至少一次把當章現象明確歸位：「這是哪一項維護工作？由排程器的哪個歷程驅動？」即使是反例章（猝睡症＝排程器的促醒看門狗壞掉）也要明說它破壞了脊椎的哪一塊。\n\n| 基準 | 寫法／值／hedge | 出現章 |\n|---|---|---|\n| **三件維護工作命名** | 清除（clearance）／鞏固（consolidation）／校準（calibration，對應 downscaling/renormalization）——全書固定這三個詞，不另創同義詞；明說「清除」這隻腳證據目前最不確定 | 全書脊椎 / ch01 定調 |\n| **雙歷程模型** | 雙歷程模型（two-process model），Borbély（博貝利）1982；Process S＝睡眠恆定/睡眠壓力（清醒指數上升、睡眠指數下降），Process C＝生理時鐘歷程（晝夜節律正弦）；兩者「差距」驅動睡與醒。寫「這個模型把睡眠調節拆成兩股力量」語氣，**不寫「大腦裡有兩個鐘已被測出」** | ch03 定版 / 全書回收 |\n| **睡眠分期** | AASM 標準：NREM 分 N1/N2/N3（N3＝慢波睡眠 SWS/深睡，舊 stage 3+4 合併）＋REM。主標用 N1/N2/N3/REM，可注「舊分期 stage 1–4」。NREM 約佔整夜 75–80% | ch02 定版 |\n| **睡眠週期** | 一夜約 4–5 個週期；每週期平均 ~90 分（常見區間 90–110 分）。**鐵律警示**：90 分是平均值、個體與夜間變異大，第一週期常較短——不可當定鬧鐘精確常數 | ch02 / ch15 回收 |\n| **hypnogram 形狀** | 前半夜 N3（深睡）佔比高、後半夜 REM 變長；第一個 REM <10 分、後半夜可達 ~40 分以上。**hedge**：別把「N3＝清除、REM＝情緒」寫成一對一硬對應 | ch02 定版 |\n| **🔥 膠淋巴爭議（全書最高風險）** | 膠淋巴系統（glymphatic system），Iliff/Nedergaard 2012 提出機制、依賴 AQP4 水通道蛋白；Xie 等 *Science* 2013 稱睡眠/麻醉時腦間質空間擴大 ~60%、清除增加；**2024 起 Miao 等 *Nature Neuroscience*（Franks 團隊，Imperial College）用直接注入法反指清除「減少」**，Nedergaard 公開反駁（指對方方法學有誤、其「睡眠組」實為剝奪後恢復睡眠）。截至 **（2026-06）** 方法學僵持、**無共識**。**絕不可斷言「睡眠會洗掉毒素」**；標準措辭：「有力但仍在爭論的假說」 | ch04 定版 / ch01 預告 / ch15 回收 |\n| **鞏固（ASC）** | 主動系統鞏固假說（active systems consolidation, ASC）：NREM 慢波睡眠期間海馬迴記憶「重播（replay）」，與尖波漣波（sharp-wave ripples）、紡錘波（spindles）、慢振盪（slow oscillations）三振盪時間協同，把記憶從海馬迴轉成皮質 schema。整體證據較穩、具體機制仍活躍研究；寫「目前最被接受的圖像是…」 | ch05 定版 |\n| **校準（SHY）** | 突觸恆定假說（synaptic homeostasis hypothesis, SHY），Tononi（托諾尼）& Cirelli（奇雷利）2003 起；清醒學習使突觸整體增強、睡眠（NREM 慢波）做整體性降縮（downscaling/renormalization）。名言「睡眠是大腦為可塑性付出的代價」。**SHY 與 ASC 是競爭/互補的理論圖像，都別寫成定論** | ch07 定版 / ch05 對照 |\n| **腺苷與咖啡因** | 腺苷（adenosine）清醒累積、促眠，透過 A1R/A2AR 受體，是 Process S 的分子對應之一（**非唯一**，別寫「睡眠壓力就是腺苷」）；咖啡因（caffeine）是腺苷受體拮抗劑，擋住促眠信號而非補充能量，促醒主要靠阻斷 A2AR。咖啡因半衰期常引 ~5–6 h、個體差異大（CYP1A2） | ch03 引入 / ch12 定版 |\n| **分子生理時鐘（諾獎）** | 2017 諾貝爾生理醫學獎：Hall（霍爾）、Rosbash（羅斯巴什）、Young（楊），「控制晝夜節律的分子機制」。**用果蠅**：1984 分離 period 基因（per）、PER 蛋白夜累積日降解、TTFL 負回饋 ~24 h 振盪。**物種鐵律**：果蠅夥伴基因是 timeless（TIM）；哺乳類核心是 PER（PER1/2/3）/CRY（CRY1/2）負向臂＋CLOCK/BMAL1 正向臂（CLOCK 由高橋 Takahashi 1997 在小鼠發現）。**別把 CRY 安到果蠅、別說諾獎得主發現 CRY** | ch07 定版 |\n| **SCN** | 視交叉上核（suprachiasmatic nucleus, SCN），下視丘中樞時鐘，由視網膜光信號授時（entrainment） | ch03 / ch07 |\n| **褪黑激素（迷思）** | 褪黑激素（melatonin）是授時/計時信號（chronobiotic），告訴大腦「現在是夜晚」，**不是安眠藥**；催眠效果微弱——19 試驗回顧：縮短入睡 ~7 分鐘、增加總睡眠 ~8 分鐘。對「相位問題」（時差/相位延遲）比對「入睡困難」更對症；時機比劑量重要（0.3–1 mg 生理劑量常被認為足夠） | ch03 引入 / ch12 定版 |\n| **天生短睡（迷思）** | 傅嫈惠（Ying-Hui Fu，UCSF）團隊；DEC2（BHLHE41）2009、ADRB1 2019，累計約 7 個 FNSS 基因。某突變者平均 ~6.25 h 無明顯損害。**極罕突變，不可推論「短睡可習得/無害」**；給數字標「某家族/某突變」 | ch13 定版 |\n| **多相睡眠（迷思）** | 多相睡眠（polyphasic sleep，如 Uberman 一天數次 20 分小睡）無科學支持能減少睡眠需求，NSF 不建議；個案 5 週後生長激素分泌幾乎停止。**hedge**：別波及「正常午睡（nap）」的價值——兩回事 | ch13 定版 |\n| **social jetlag** | 社會性時差（social jetlag, SJL），Roenneberg（羅內伯格）團隊＋MCTQ；SJL ＝休息日睡眠中點 − 工作日睡眠中點（MSF − MSW）。晚型 SJL 通常最大。**健康關聯是相關非因果（作者本人 2019 自我批判回顧亦提醒；與晚型最強相關之一是吸菸＝混淆因子警訊）** | ch11 定版 |\n| **時型 / 青少年相位延遲** | 時型（chronotype）早型/晚型；青春期多數青少年睡眠相位延遲（phase delay）最多 ~2 h，因內源褪黑激素分泌起始延後 ~1–3 h（生理現象，不是「懶」）；與早上學時間衝突。**hedge**：延後上學的政策效益仍辯論中 | ch11 定版 |\n| **猝睡症（反例）** | 第一型猝睡症（narcolepsy type 1, NT1，伴猝倒 cataplexy）：下視丘 orexin/hypocretin（食慾素/下視丘分泌素）促醒神經元選擇性喪失 >90%，清醒/REM 邊界崩塌。**自體免疫是強假說非鐵證**（與 HLA DQB1*06:02 高度相關，疑感染觸發）；寫「廣被接受的假說」而非「已證實」 | ch10 定版 |\n| **CBT-I（穩固共識）** | 認知行為治療失眠（CBT-I）是成人慢性失眠一線療法；ACP（美國內科醫師學會）2016 臨床指引「強推薦」、優先於藥物。含睡眠限制、刺激控制、認知治療、睡眠衛教。本書少數可較有信心寫成「主流共識」之一，但標年份、注「指引可能更新」 | ch09 定版 |\n| **Walker 負面教材** | Matthew Walker（沃克）《Why We Sleep》多項戲劇數字被 Guzey（古澤）2019 逐條查核、Gelman（蓋爾曼）跟進，指有事實錯誤：致癌加倍（無據，2018 系統回顧 65 研究/155 萬人未見關聯）／FFI＝缺睡而死（實為普利昂蛋白神經退化病）／WHO 宣布睡眠流行病（WHO 從未）／睡愈短命愈短（實為 U 形、最低點 ~7 h）／三分之二沒睡到 8 h（NSF 建議是範圍 7–9 h 非定點 8 h）。**一律不引為定論**；態度對事不對人、把「睡眠很重要」與「具體誇大數字」分開 | ch08 / ch13 / ch15 散見 |\n| **賈德納個案** | Randy Gardner（賈德納）1964 連續 264 小時不睡——著名個案、**非受控研究**，金氏已停止認證；要用標「軼事/單一個案」 | ch08 |\n| **嚴謹度三級標示** | 每個關鍵宣稱歸到一級：穩固共識／主流假說但有爭議／迷思（正解是…）／🔥 活躍爭議前沿（呈現雙方、標 (2026-06)）。可爭議事實一律標時點＋hedge；禁「顯然」「眾所周知」；禁把單一小研究寫成定論、把相關寫成因果 | 全書 |\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向擁有章）：任何醫療/治療/用藥建議（全書非醫療手冊，凡可能被讀成醫療指示者改寫成機制陳述）；完整睡眠生理學名詞表與分期判讀規則（教科書範疇，指向延伸閱讀）；神經元電化學基礎（用到時一兩句帶過）；完整文獻回顧（只講到「足以建立正確直覺並看穿迷思」的深度）；夢的內容解析/精神分析（ch06/ch14 點到象徵性詮釋無實證即止）；測度/統計方法論的系統教學（相關非因果、U 形、效應量在脈絡裡點名即止）；兒童睡眠發展全景（青少年相位延遲在 ch11 一段，餘指延伸閱讀）；各睡眠障礙的臨床診斷/治療細節（ch09/ch10 只講機制與證據強度，不寫怎麼治）。\n\n---\n\n## Part I — 為什麼要睡（ch01–03）\n\n### ch01 — 每晚下線的怪事：睡眠不是關機，是維護視窗\n- **目標**：讀完能說出「睡眠＝大腦每晚排程的維護視窗」這個全書脊椎、為什麼「關機」是錯的隱喻；能說出演化沒把睡眠優化掉本身就是它必有重要功能的線索；能畫出全書地圖與六條驗收主線。\n- **必涵蓋**：睡眠的演化悖論當鉤子——睡眠讓動物數小時失去警覺、無法覓食求偶、對掠食者全暴露，演化卻**保留**它且幾乎無物種真正免除——「一個代價這麼高的東西沒被砍掉，代表它在做不可外包的工作」；**戳破「關機/休息」隱喻**：睡眠時大腦耗能不低、特定階段活躍度甚至接近清醒，它不是斷電而是**切換到另一種工作模式**（這正是「維護視窗」隱喻的精準處——維護窗不是停機，是換一批 job 在跑）；宣告全書脊椎三件維護工作（清除／鞏固／校準）＋排程器（雙歷程模型）並各給一句話預告（清除標「這隻腳最有爭議、ch04 見」）；六條驗收主線開宗明義（finale 章逐條口試）；本書的零信任契約：睡眠科普迷思密度極高，本書一半價值在誠實標示「仍在爭論／被誇大」——先預告膠淋巴翻案與 Walker 案當張力鉤；全書路線圖（基準圖首次出場，◄你在這裡標 Part I）。\n- **不涵蓋**：一夜結構細節（ch02）；雙歷程模型機制（ch03）；三件維護工作各自的證據（ch04–07）；任何「你該睡幾小時」的建議（非醫療手冊）。\n- **橋接**：cron／批次維護窗、計畫性 downtime、off-peak 維護——你的系統從不真正「關機」，維護窗是換一批維護 job（GC、log compaction、索引重建）在跑，對外看似不可用、其實在做白天不能做的工作。睡眠就是大腦的維護窗。\n- **Worked example**：把「維護視窗」隱喻逐項對位走一遍——你的服務維護窗做哪三類事（清碎片/GC、把當日 log 整理進長期儲存/壓實、重新平衡權重避免無界膨脹）↔ 大腦的清除/鞏固/校準，逐格說明這不是泛泛比喻而是功能同構，並標出「唯一不確定的對位是清除（膠淋巴爭議）」。\n- **紙上推演**：(a★[10 分鐘]) 口頭重講脊椎：用「維護視窗」把睡眠講給另一個後端工程師，三件工作各舉一個工程類比。(b★★[15 分鐘]) 找壞論證破綻：「睡眠就是大腦在休息充電，像手機關機省電」——指出兩個錯（耗能不低、不是被動省電而是主動工作模式）。(c★★[15 分鐘]) 設計假想實驗：若睡眠真是「可有可無的休息」，演化上你預期看到什麼（某些動物完全不睡且無損）？實際觀察到什麼？這對「睡眠有不可外包功能」是支持還是反對證據？\n\n### ch02 — 一夜的結構：逐時追蹤一夜，N1/N2/N3/REM 的週期\n- **目標**：能講出一夜不是均質黑屏、而是 N1/N2/N3/REM 結構化循環；能逐週期描述 hypnogram 的「前深睡、後 REM」形狀並解釋為什麼；能說清「90 分鐘」是平均值而非鐵律（破鬧鐘迷思）。\n- **必涵蓋**：睡眠分期（AASM 標準）N1（入睡過渡）/N2（紡錘波、K-複合波，佔比最大）/N3（慢波睡眠/深睡）/REM（快速動眼、肌張力消失、夢密集但非唯一）各一段白話特徵；一夜 4–5 個週期、每週期 ~90 分（標範圍與變異）；**hypnogram 形狀**：前半夜 N3 密集、後半夜 REM 拉長，第一個 REM 很短、愈後愈長；把這個形狀**初步歸位到脊椎**——前半夜慢波密集對應清除/校準的密集期、後半夜 REM 對應情緒/某些記憶處理（但**明說這是時間相關性、非一對一硬對應**，功能歸屬仍在研究，細節留 ch04–07）；**破「90 分鐘鬧鐘」迷思**：90 分是平均、人/夜/年齡變異大、第一週期常較短，拿平均值當精確常數定鬧鐘不可靠。\n- **不涵蓋**：各階段的功能機制（清除 ch04、鞏固 ch05、REM ch06、校準 ch07，本章只描述結構不講功能歸屬細節）；雙歷程模型如何排出這個結構（ch03）；EEG 判讀規則（教科書，指向延伸閱讀）。\n- **橋接**：一夜的 hypnogram ≈ 一段維護窗的**作業時序表**——不同 job 在窗內有固定的編排順序（先跑重 IO 的壓實、後跑輕量的校驗），不是隨機；「90 分週期」≈ 維護任務的**標稱排程間隔**，真實執行時間會隨負載漂移，你不會拿標稱值去卡死下游觸發。\n- **Worked example**：逐週期走完一夜 hypnogram（worked example＝把一夜時序走到底不跳步）：第 1 週期（N1→N2→N3 深、REM 極短<10 分）、第 2–3 週期（N3 漸減、REM 漸長）、第 4–5 週期（幾乎無 N3、REM 可達 ~40 分），逐段標出「此刻深睡多/REM 多」並對應「前深後 REM」的整體形狀；用真實時間軸（如 23:00 入睡到 07:00 起床）標出每個 REM 期的大致位置。\n- **紙上推演**：(a★[10 分鐘]) 把白話「我都在快天亮才做夢」翻成機制：為什麼後半夜 REM 長、夢報告多？(b★★[15 分鐘]) 找破綻：「設鬧鐘在 90 分鐘倍數醒來最不累，因為剛好在週期結束」——指出把平均值當精確常數錯在哪、變異從哪來。(c★★[20 分鐘]) 預測再對答案：若把某人前半夜叫醒幾次只打斷 N3、另一人後半夜叫醒幾次只打斷 REM，你猜兩人各自缺了哪種「維護」、隔天表現差異方向？（揭曉時連到 ch04–06 的功能假說，標明仍在研究）\n\n### ch03 — 兩個歷程：睡眠壓力 × 生理時鐘＝排程器（全書框架的樞紐）\n- **目標**：能講清雙歷程模型把睡眠調節拆成 Process S（睡眠壓力）與 Process C（生理時鐘）兩個獨立信號、它們如何合成「現在該睡還是該醒」的單一排程決策；能用它解釋熬夜後的「第二陣清醒」「時差」等日常現象；理解這是全書的排程器。\n- **必涵蓋**：Borbély 1982 雙歷程模型（標 hedge：極具影響力但仍是「模型」、本人有 reappraisal、2025 有替代視角——用「這個模型如此刻畫」語氣，不寫「大腦裡有兩個鐘已被測出」）；**Process S**：清醒時睡眠壓力指數上升、睡眠時指數下降，源自慢波活動 SWA；其分子側預告腺苷（ch12 展開）；**Process C**：生理時鐘的睡眠傾向晝夜節律（正弦），由 SCN 驅動、光授時、褪黑激素是夜晚信號（**先在此破「褪黑激素＝安眠藥」迷思的一半**：它是 C 的授時信號不是壓 S 的安眠藥，ch12 給數字）；**兩歷程合成**：睡與醒由 S 與 C 的「差距」驅動——這是脊椎排程器的核心圖像；用模型解釋日常：為什麼熬夜到凌晨反而「比較不睏」（C 進入促醒相，蓋過高漲的 S）、為什麼跨時區後身體跟社會時間打架（C 還沒重新授時）；明確把全書脊椎接上：三件維護工作都在這個排程器決定的視窗裡進行，後面每章都會問「由 S 還是 C 驅動」。\n- **不涵蓋**：腺苷/咖啡因分子細節（ch12）；SCN 分子鐘 TTFL（ch07）；褪黑激素效應量數字（ch12）；social jetlag（ch11，這裡只給「C 與社會時間錯位」直覺）。\n- **橋接**：兩個獨立信號合成一個排程決策——Process S ≈ **累積的待辦/技術債/backpressure**（清醒愈久堆愈高），Process C ≈ **排程器的 cron 時窗**（不管佇列多滿，到了時段才開維護窗）；真正觸發維護的是「待辦堆積量 × 時窗」的合成，不是單一信號。熬夜「第二陣清醒」＝佇列爆滿但 cron 時窗還沒到、排程器壓著不跑。\n- **Worked example**：把雙歷程合成走一遍（worked example＝一條排程決策鏈走到底）：給定 S 從早晨低點整天指數上升、C 一條 24 h 正弦，逐時段標「此刻 S 多高、C 在促眠相還是促醒相、合成的睡眠傾向」——解釋為什麼下午會有小低谷（C 的午後凹陷）、為什麼正常就寢時 S 高且 C 轉入促眠、為什麼清晨 S 已被睡眠清掉且 C 轉促醒所以自然醒。用 ASCII 圖畫 S 上升曲線與 C 正弦的合成。\n- **紙上推演**：(a★★[20 分鐘]) 口頭重講脊椎排程器：把「為什麼凌晨四點最難保持清醒、但硬撐到早上又突然有精神」用 S×C 講給工程師。(b★★[15 分鐘]) 把白話翻機制：「我午餐後好睏一定是吃太飽」——用 Process C 的午後凹陷給另一個（部分）解釋，並說明兩者怎麼分辨。(c★★★[25 分鐘]) 設計假想實驗：你要驗證「熬夜後的第二陣清醒是 C 蓋過 S、不是 S 自己下降」，會怎麼設計（提示：強迫去同步 forced desynchrony 的精神）？什麼結果能反駁你的假設？\n\n## Part II — 三件維護工作（ch04–07）\n\n### ch04 — 清除：膠淋巴系統與代謝廢物（全書最高風險的活躍爭議）\n- **目標**：能講出膠淋巴系統的假說機制（CSF→ISF 對流、AQP4）、它如何成為「睡眠＝大腦清洗」流行說法的來源；**能誠實呈現 2013 建立 vs 2024 反駁的雙方證據與方法學分歧，並說出截至 2026-06 無共識**；理解脊椎「清除」這隻腳目前最不確定。\n- **必涵蓋**：脊椎歸位＝這是「清除」這隻維護工作、與深睡（Process S 驅動的慢波）關係最密切；**建立期**：Iliff/Nedergaard 2012 提出膠淋巴系統（glia+lymphatic，CSF 沿旁血管空間進入腦實質、與 ISF 交換、依賴星狀膠細胞 AQP4 水通道蛋白）、Xie 等 *Science* 2013 稱睡眠/麻醉時腦間質空間擴大 ~60%、Aβ 清除加快——「睡眠洗腦」說法的原始出處；**🔥 反駁與爭議期（2024 起）**：Miao 等 *Nature Neuroscience* 2024（Franks 團隊，Imperial）用直接注入法反指清除「減少」、Nedergaard 公開反駁（指對方技術用法有誤、其「睡眠組」實為剝奪後恢復睡眠模型有誤導性）、2024 另有 Cell 論文提正腎上腺素慢血管運動驅動清除支持「增加」一方；**核心分歧是方法學**（示蹤劑放 CSF vs 直接注入腦組織得到相反結論），需更好工具裁決；**撰章鐵律**：絕不寫「科學已證明睡眠會清洗大腦」為定論、用「有力但仍在爭論的假說」、標 (2026-06)；把這節當零信任示範——一個被科普反覆引用的「事實」正在被重新檢驗。\n- **不涵蓋**：阿茲海默症/Aβ 病理的臨床細節（指向延伸閱讀，只用 Aβ 當清除標的物範例）；鞏固/校準（ch05/ch07）；腺苷分子側（ch12）。\n- **橋接**：清除 ≈ **垃圾回收（mark-sweep）/log compaction/清碎片**——維護窗把白天累積的廢物搬走；但這一章的橋接重點是**零信任**：膠淋巴像一個「大家都引用的效能優化傳說」，後來有人用不同的量測方法跑 benchmark，得到相反數字——你該信哪個？答案是「先看兩邊的量測方法哪裡不同」，正是工程師面對矛盾 benchmark 的反射。\n- **Worked example**：把爭議的方法學分歧逐步解讀（worked example＝把兩個研究的矛盾數字逐句拆開）：2013 用「CSF 注入示蹤劑、看它進入腦組織多少」得出睡眠時清除↑~60%；2024 用「直接把染料注入腦組織、看它離開多快」得出睡眠時清除↓——逐步說明這兩種設計測的其實可能不是同一件事、為什麼會給出相反方向、Nedergaard 對「睡眠組＝剝奪後恢復睡眠」的批評為何關鍵；結論停在「方法學僵持、需更好工具」不替讀者裁決。\n- **紙上推演**：(a★★[20 分鐘]) 口頭重講爭議：不看書，把「為什麼膠淋巴清除是爭議不是定論、雙方各拿什麼證據」講給工程師。(b★★★[25 分鐘]) 設計裁決實驗：你要設計一個能讓雙方都服氣的實驗來裁決「睡眠時清除增加還是減少」，會怎麼控制兩種量測法的差異（提示：基因改造模型、同一動物兩法並測）？(c★★[15 分鐘]) 找破綻：拆穿一篇科普標題「研究證實：睡眠是大腦的洗腦時間，缺睡讓毒素堆積致失智」——指出它把哪幾步不確定寫成了確定。\n\n### ch05 — 鞏固：睡眠如何固化白天的學習\n- **目標**：能講出記憶鞏固在睡眠（尤其慢波睡眠）中的主流圖像 ASC——海馬迴 replay 與三振盪協同把記憶轉成皮質 schema；能說清這是脊椎「鞏固」這隻腳、證據較穩但機制仍研究中；能說明它和 ch07 校準（SHY）的表面張力。\n- **必涵蓋**：脊椎歸位＝「鞏固」維護工作，主要在 NREM 慢波睡眠（前半夜密集，Process S 驅動）；**ASC 假說**：白天學習在海馬迴留下不穩定痕跡，睡眠時海馬迴「重播（replay）」這些痕跡，與海馬尖波漣波（ripples）、丘腦紡錘波（spindles）、皮質慢振盪（slow oscillations）**三振盪時間協同**，把記憶逐步從「海馬迴依賴」轉成「皮質 schema」（系統鞏固）；REM 也參與（傳統連結情緒記憶，但慢波也參與情緒記憶強化——**功能分工沒有乾淨的 NREM 管事實/REM 管情緒二分**，ch06 接）；**證據強度誠實標示**：「睡眠鞏固記憶」整體證據相當扎實（本書可較有信心講的一隻腳），但**具體機制（哪個振盪做什麼、replay 的因果角色）仍是活躍研究**，寫「目前最被接受的圖像是…」；預告與 SHY 的張力（一個講選擇性強化、一個講整體降縮，ch07 對照）。\n- **不涵蓋**：突觸恆定 SHY 完整處理（ch07）；REM 與作夢的情緒/創造力假說（ch06）；分子鐘（ch07）；具體記憶測驗的自我實驗（非自我追蹤手冊）。\n- **橋接**：rebild ＝把當日 **WAL（write-ahead log）/event log 在維護窗重放**、整理進長期儲存——replay 就是這個；三振盪的時間協同 ≈ 兩個服務要**對齊時鐘才能正確 hand-off**（ripple、spindle、slow oscillation 必須在毫秒級對上，否則記憶轉移失敗）；「海馬迴依賴→皮質 schema」≈ 熱資料先進快取暫存層、夜間批次落盤到長期儲存並建索引。\n- **Worked example**：把一條鞏固機制鏈走到底（worked example＝因果鏈不跳步）：白天學一組配對 → 海馬迴留下臨時痕跡 → 入睡進入慢波睡眠 → 慢振盪（皮質）為時間框架 → 紡錘波（丘腦）嵌在慢振盪的上相 → 尖波漣波（海馬迴 replay）嵌在紡錘波內 → 三者鎖相完成一次「記憶封包」從海馬迴到皮質的傳輸 → 隔日該記憶更穩固且較不依賴海馬迴；逐步標每一振盪的角色與「對齊」為何關鍵，並標明哪幾步是穩固證據、哪幾步仍是假說。\n- **紙上推演**：(a★★[20 分鐘]) 把白話翻機制：「考前睡一覺比熬夜記得牢」——翻成 replay/三振盪的機制鏈，並指出哪部分有扎實證據、哪部分是外推。(b★[10 分鐘]) 口頭重講脊椎：這是哪項維護工作、由 S 還是 C 驅動、為什麼集中在前半夜？(c★★★[25 分鐘]) 預測再對答案：給「睡前學習 vs 學後馬上剝奪睡眠 vs 正常睡眠」三組記憶保留實驗設計，猜三組相對表現，揭曉並討論「相關 vs 因果」如何被這類設計處理。\n\n### ch06 — REM 與作夢：情緒校準與創造力的假說\n- **目標**：能講出 REM 睡眠的特徵與幾個主流功能假說（情緒記憶處理/情緒調節、創造力/連結遠距概念），且全程標示這些多為**假說非定論**；能破「REM＝做夢期」的硬等號；理解 REM 如何接上脊椎的「校準」（情緒面）。\n- **必涵蓋**：脊椎歸位＝REM 主要服務「校準」的情緒面（後半夜密集）；REM 特徵（快速動眼、皮質活躍近清醒、骨骼肌張力消失/睡眠癱瘓保護、夢密集）；**破「REM＝做夢期」**：NREM 也有夢報告，夢與 REM 不是硬等號（landscape 待補項，撰章查證）；**情緒處理假說**：REM 期間在低正腎上腺素環境下重新處理情緒記憶（「overnight therapy」假說，標 hedge＝有支持也有反對、效應不一致）；**創造力假說**：REM 促進遠距概念連結/問題重構（少數實驗支持，樣本小、標假說）；誠實標示整體＝REM 的功能是睡眠科學裡假說最多、定論最少的區域之一，避免把任一假說寫成已證實；明確接 ch07：情緒校準與突觸校準是「校準」這隻腳的兩個面向。\n- **不涵蓋**：夢的內容解析/精神分析象徵（ch14 點到無實證即止）；清醒夢機制（ch14）；REM 行為障礙等臨床（ch10 一句話）；突觸 SHY 機制（ch07）。\n- **橋接**：REM 情緒處理 ≈ 維護窗裡的**情緒記憶「重新標記/降噪」**——把白天高張力事件的「情緒權重」與「事實內容」分離重存（事件記得、但再想起時情緒強度被調低），像把告警事件歸檔時剝掉當下的 severity 峰值只留紀錄；創造力假說 ≈ 維護窗順手做的**跨表 join/重建關聯索引**，連起白天沒連起的遠距節點。\n- **Worked example**：把「overnight therapy」假說的一條因果鏈與其證據逐步解讀（worked example）：低正腎上腺素的 REM 環境 → 重新活化情緒記憶但不帶當下的壓力化學 → 隔日對同一刺激的情緒反應/杏仁核反應下降 → 推論 REM 把「記憶」與「情緒強度」解耦；逐步標出哪一步有實驗支持、哪一步是外推、反方證據（部分研究未複現）在哪——示範「主流假說但有爭議」該怎麼寫。\n- **紙上推演**：(a★★[15 分鐘]) 找破綻：「做夢是 REM 才有的，所以記不得夢就是沒進 REM」——拆穿兩個錯（NREM 也有夢、夢的回憶取決於醒來時機）。(b★★[20 分鐘]) 設計假想實驗：要驗證「REM 降低隔日情緒反應」，你會怎麼設計對照（選擇性剝奪 REM vs 等量剝奪 NREM）、什麼結果能反駁？(c★[10 分鐘]) 口頭重講脊椎：REM 對應哪項維護工作的哪個面向、由 S 還是 C 驅動（後半夜 REM 長與 C 的關係）？\n\n### ch07 — 校準：突觸恆定（SHY）與分子生理時鐘的內部\n- **目標**：能講出突觸恆定假說 SHY（睡眠降縮突觸權重以恢復可塑性）作為脊椎「校準」的主理論支柱、及它與 ASC 的競爭/互補張力；能講出生理時鐘的分子機制（TTFL 負回饋、2017 諾獎果蠅史 vs 哺乳類 PER/CRY、CLOCK/BMAL1），完成 Process C 的「內部」。\n- **必涵蓋**：脊椎歸位＝「校準」維護工作（突觸面，NREM 慢波密集、Process S 驅動）；**SHY**（Tononi & Cirelli 2003 起）：清醒學習使皮質突觸整體淨增強、睡眠慢波做整體性降縮（downscaling/renormalization）恢復訊噪比與可塑性空間，名言「睡眠是大腦為可塑性付出的代價」；**SHY vs ASC 張力**（標 hedge：兩者表面矛盾——整體降縮 vs 選擇性強化——是競爭/互補理論圖像，有公開反駁如 \"Why I Am Not SHY\"，都別寫成定論）；**Process C 的內部＝分子生理時鐘**：2017 諾獎 Hall/Rosbash/Young，用**果蠅** per/PER/tim、TTFL 負回饋 ~24 h 振盪；**物種鐵律**：果蠅夥伴是 timeless，哺乳類核心是 PER/CRY 負向臂＋CLOCK/BMAL1 正向臂（CLOCK 由高橋 1997 在小鼠發現）——分清兩層、別把 CRY 安到果蠅、別說諾獎得主發現 CRY；SCN 是中樞時鐘、光授時；把校準的兩面（突觸恆定＋情緒 ch06）與排程器的兩歷程（S 驅動慢波校準、C 由分子鐘走時）收攏，Part II 在此把脊椎拼完整。\n- **不涵蓋**：褪黑激素效應量（ch12）；social jetlag/時型（ch11）；猝睡症的 orexin（ch10）；TTFL 的完整生化（給負回饋直覺、明說不展開全部分子）。\n- **橋接**：突觸降縮 ≈ 維護窗的**整體權重正規化/清快取防無界膨脹/GC 壓碎片**——清醒整天「只加不減」會飽和，睡眠做一次全域 renormalize 把訊噪比拉回；SHY vs ASC ≈ 「維護到底是**選擇性壓實熱資料**還是**全表重整**」的工程張力（可能兩者都對、發生在不同尺度）；TTFL ≈ **分子層級的負回饋迴圈**（PER 蛋白濃度上升 → 抑制自身基因 → 濃度下降 → 解除抑制 → 振盪），跟你熟的負回饋控制器同構。\n- **Worked example**：把 TTFL 負回饋走一圈（worked example＝分子負回饋迴圈走到底不跳步）：CLOCK/BMAL1（正向臂）啟動 per/cry 轉錄 → PER/CRY 蛋白白天累積 → 入夜進入細胞核 → 抑制 CLOCK/BMAL1（負回饋）→ per/cry 轉錄下降 → PER/CRY 日間降解 → 抑制解除 → 下一輪啟動 → ~24 h 一圈；用 ASCII 圖畫迴圈，逐步標「此刻在累積還是抑制」，並對照工程師熟的負回饋控制器。\n- **紙上推演**：(a★★[20 分鐘]) 口頭重講脊椎：用 SHY 把「為什麼學一整天後會睏、睡完隔天又學得進」講給工程師（飽和→降縮→恢復可塑性空間）。(b★★[15 分鐘]) 找破綻：「2017 諾獎發現了人體生理時鐘的 PER/CRY 基因」——指出物種混淆錯在哪（諾獎是果蠅 per/tim；哺乳類 PER/CRY、CLOCK/BMAL1 是另一脈）。(c★★★[25 分鐘]) 把 SHY vs ASC 的張力翻成工程取捨：兩個假說各對應哪種維護策略、它們真的矛盾還是可在不同尺度共存？給一個能區分兩者的假想實驗。\n\n## Part III — 故障與後果（ch08–11）\n\n### ch08 — 睡眠剝奪的真實代價：把「重要」和「誇大數字」分開\n- **目標**：能講出睡眠剝奪對認知、情緒、警覺、代謝的真實影響、且全程不誇大不引 Walker 戲劇數字；能說清「睡眠很重要」這個一般結論與「具體誇大數字」必須分開（零信任示範）；能用脊椎解釋剝奪＝維護視窗被砍。\n- **必涵蓋**：脊椎歸位＝剝奪＝排程器被迫跳過維護窗、三件工作都欠帳（Process S 持續累積無法清償）；**真實有證據的代價**：警覺/反應時間下降（精神運動警覺 PVT）、注意力與工作記憶受損、情緒調節變差（杏仁核反應放大、呼應 ch06）、微睡眠（microsleep）與駕駛風險、代謝/葡萄糖耐受短期變化；**誠實標示效應強度與不確定**：急性剝奪效應較穩、慢性「少睡一點」的長期健康因果較難確立（多為觀察性、相關非因果、U 形關係）；**Walker 負面教材集中處理**：致癌加倍（無據，2018 系統回顧 65 研究/155 萬人未見關聯）、FFI＝缺睡而死（實為普利昂神經退化病）、睡愈短命愈短（實為 U 形、最低點 ~7 h）、8 小時硬標準（NSF 是範圍 7–9 h）——逐條給正確版、態度對事不對人；**賈德納 264 小時個案**標「軼事/單一個案、非受控研究」；明確結論：睡眠確實重要（Guzey/Gelman 也同意），但靠誇大數字嚇人是壞科普。\n- **不涵蓋**：失眠機制與治療（ch09）；睡眠障礙（ch10）；剝奪的分子機制（腺苷 ch12）；致死性家族失眠症的完整病理（一句話＝普利昂病、非缺睡致死）。\n- **橋接**：剝奪 ≈ **持續跳過維護窗**——技術債/碎片/未壓實 log 持續累積，短期系統還能跑（你撐得住一晚熬夜）、但 backpressure 不會自己消失，欠的維護遲早要還（補眠時 N3 反彈＝優先補最欠的那種維護）；零信任橋接：面對「缺睡致癌加倍」這種嚇人數字，反射是**要原始量測與樣本**——Walker 給不出，正如沒有 benchmark 數據的效能恐慌不該信。\n- **Worked example**：把一個被誇大的宣稱逐步還原（worked example＝把統計數字逐句拆開）：拿「睡<6-7h 致癌風險加倍」對照 2018 系統性回顧（65 研究、1,550,524 人、86,201 癌症病例，結論短睡長睡皆未與癌症風險增加相關）——逐句說明為什麼一個有引用的大型回顧推翻一個無引用的戲劇宣稱、「加倍」這種相對風險措辭如何嚇人；再拆「睡愈短命愈短」如何把 U 形（最低點 ~7 h）寫成單調遞減。\n- **紙上推演**：(a★★[20 分鐘]) 找破綻：給一段 Walker 風格推論「FFI 患者不睡覺就死了，證明缺睡會直接害死你」——拆穿（FFI 是普利昂全腦神經退化病、患者非完全不睡、死於神經退化）。(b★★[15 分鐘]) 把白話翻機制＋歸位脊椎：「熬夜後脾氣特別差」翻成 ch06 杏仁核/情緒校準欠帳的機制。(c★★★[25 分鐘]) 設計假想實驗：要區分「慢性少睡導致疾病」與「生病的人睡得少」（反向因果），你會怎麼設計、什麼證據能支持因果方向？\n\n### ch09 — 失眠的機制與 CBT-I\n- **目標**：能講出慢性失眠的「過度激發/條件化」機制圖像（床與清醒的錯誤連結）、為什麼 CBT-I 而非安眠藥是一線；能用脊椎把失眠定位成排程器被條件化反應綁架；全程只講機制與證據、不開治療建議。\n- **必涵蓋**：脊椎歸位＝失眠＝排程器（尤其 S 的睡眠驅力）被「過度激發（hyperarousal）」與條件化干擾，該進維護窗時進不去；失眠的機制圖像：生理/認知過度激發、把「床/就寢」條件化成「清醒與焦慮」的線索（古典制約的錯誤連結）、對睡眠的焦慮形成正回饋（愈努力睡愈睡不著）；**CBT-I（穩固共識）**：ACP 2016 強推薦、一線、優先於藥物；含睡眠限制（壓縮在床時間提高睡眠效率）、刺激控制（重建床＝睡的連結）、認知治療、睡眠衛教——**只講這些技術的機制原理（為什麼有效），不寫成給讀者的執行處方**；對比安眠藥＝壓症狀/熱修補（效果短、有依賴與副作用），CBT-I＝改根因/效果持久；**醫療邊界**：明標「失眠請就醫，本書只談機制不提供治療」。\n- **不涵蓋**：安眠藥對睡眠結構的藥理（ch12）；睡眠呼吸中止/猝睡症（ch10）；社會性時差（ch11）；任何劑量/用藥/執行步驟（非醫療手冊）。\n- **橋接**：條件化失眠 ≈ **被污染的快取關聯**——「床」這個 key 被錯誤地映射到「清醒/焦慮」的 value，每次躺床都命中錯誤快取；CBT-I 的刺激控制＝**清掉錯誤快取關聯、重建正確綁定**（床只用於睡，移除床上清醒活動）；睡眠限制＝**提高命中率**（壓縮在床時間使睡眠驅力 S 夠高、效率上升）；安眠藥 ≈ **熱修補/壓告警**（症狀消失但錯誤映射還在）vs CBT-I ≈ **改根因**。\n- **Worked example**：把失眠的正回饋迴圈與 CBT-I 如何打斷它走一遍（worked example＝迴圈機制鏈）：一次睡不好 → 對睡眠焦慮 → 就寢時過度激發 → 更難入睡 → 床被條件化成清醒線索 → 焦慮加深（正回饋）；逐步標出刺激控制（切斷床↔清醒連結）、睡眠限制（拉高 S 蓋過激發）各打斷哪一環，對照「為什麼這比吃藥治本」。\n- **紙上推演**：(a★★[20 分鐘]) 把白話翻機制：「我一躺到床上就清醒、但在沙發上看電視會睡著」——翻成條件化/錯誤快取關聯，並說明刺激控制針對哪一步。(b★[10 分鐘]) 口頭重講脊椎：失眠破壞了排程器的哪部分（S 還是 C）？(c★★[15 分鐘]) 找破綻：「安眠藥讓我睡著了，所以它治好了我的失眠」——指出「壓症狀 ≠ 改根因」與為何指引把 CBT-I 列一線。\n\n### ch10 — 猝睡症與其他睡眠障礙：排程器與狀態機壞掉時\n- **目標**：能講出猝睡症（NT1）＝促醒看門狗（orexin 神經元）壞掉導致清醒/REM 狀態機非法轉移、自體免疫是強假說非鐵證；能用脊椎把幾類障礙定位成「排程器/狀態機的不同故障模式」；只講機制不講治療。\n- **必涵蓋**：脊椎歸位＝這些障礙＝排程器或睡眠狀態機的故障，各自壞在不同地方；**NT1（伴猝倒）**：下視丘 orexin/hypocretin 促醒神經元選擇性喪失 >90%，清醒/REM 邊界崩塌（日間過度嗜睡、猝倒、睡眠麻痺、入睡幻覺＝REM 元素入侵清醒）；**自體免疫＝強假說非鐵證**（與 HLA DQB1*06:02 高度相關、疑 H1N1/某疫苗觸發，但特異自體抗原未定，寫「廣被接受的假說」）；其他障礙各一段機制定位（不展開臨床）：睡眠呼吸中止（apnea，氣道阻塞反覆中斷睡眠＝維護窗被外部頻繁打斷、片段化）、不寧腿（RLS）、異睡症（parasomnia，如夢遊＝NREM 不完全覺醒的狀態混合）、REM 行為障礙一句話（REM 肌張力抑制失效）；統一視角＝睡眠是一組需要乾淨切換的狀態，障礙多是「該分離的狀態互相滲漏」或「該維持的狀態維持不住」。\n- **不涵蓋**：各障礙的診斷/治療（非醫療手冊，只給機制）；失眠（ch09）；輪班/社會性時差（ch11）；orexin 與食慾/成癮的其他角色（一句話）。\n- **橋接**：orexin 神經元 ≈ 維持「清醒」狀態的**看門狗/keep-alive 行程**——它死掉＝保活崩了、系統隨機掉進 REM（**狀態機非法轉移、不變式被破壞**：該分離的清醒與 REM 互相滲漏）；睡眠呼吸中止 ≈ **維護窗被外部中斷反覆打斷**導致片段化、深睡無法累積（job 一直被 kill 重啟，永遠跑不完）；夢遊 ≈ **狀態混合**（一部分系統在 N3、一部分已部分喚醒，處於非法中間態）。\n- **Worked example**：把猝睡症的狀態機故障走一遍（worked example＝故障因果鏈不跳步）：orexin 神經元（促醒看門狗）大量喪失 → 清醒狀態維持力下降（日間過度嗜睡）→ 清醒/REM 邊界失守 → REM 的元素（肌張力消失→猝倒、夢境→入睡幻覺、癱瘓→睡眠麻痺）入侵清醒態 → 表現為四聯症；逐步對照「正常狀態機」與「看門狗壞掉後的非法轉移」，標出自體免疫假說的不確定點。\n- **紙上推演**：(a★★[20 分鐘]) 口頭重講脊椎：把猝睡症四聯症用「促醒看門狗壞掉、狀態機非法轉移」講給工程師，逐症狀對應 REM 哪個元素入侵清醒。(b★★[15 分鐘]) 找破綻：「猝睡症是自體免疫病，已經證實了」——指出「強假說/廣被接受」與「已證實」的差別、缺的是什麼證據。(c★★[15 分鐘]) 把白話翻機制＋歸位：「睡眠呼吸中止的人睡很久還是很累」——翻成「維護窗被反覆打斷、深睡累積不足」的片段化機制。\n\n### ch11 — 社會性時差與輪班：現代生活如何破壞時鐘\n- **目標**：能講出 social jetlag（生理時鐘與社會作息長期錯位）、時型差異、青少年相位延遲的機制；能嚴格區分「相關」與「因果」（作者本人也提醒）；能用脊椎把這定位成排程器的 C 被社會時間長期拉扯。\n- **必涵蓋**：脊椎歸位＝這是 Process C（生理時鐘）與外部社會時間的長期錯位、不是維護工作本身壞掉而是排程被外力扭曲；**social jetlag**（Roenneberg 團隊＋MCTQ）：定義 SJL＝休息日睡眠中點 − 工作日睡眠中點（MSF − MSW），直觀＝每週都在小型跨時區；晚型者 SJL 最大、工作日睡債最重；**關鍵 hedge（全章紀律）**：健康關聯多為**相關非因果**——SJL 常與「睡更短、品質更差」綁在一起難分離，與晚型最強相關之一是吸菸（混淆因子警訊），作者本人 2019 自我批判回顧即點出此限制；**時型（chronotype）**：早型/晚型是生理差異、有遺傳成分，不是紀律問題；**青少年相位延遲**：青春期內源褪黑激素分泌起始延後 ~1–3 h、睡眠驅力累積變慢，使青少年生理上難早睡（不是「懶」），與早上學衝突——延後上學的政策效益仍辯論中（且 2025 有研究指青少年時鐘對社會時間比日照更敏感）；輪班工作＝C 被反覆強迫去同步的極端版。\n- **不涵蓋**：褪黑激素治時差的劑量/時機（ch12 只給機制）；SCN 分子鐘（ch07）；失眠（ch09）；夏令時間心臟病的完整爭議（一句話＝小樣本/單一地區/效應量有爭議，散見 Walker 案 ch15）。\n- **橋接**：social jetlag ≈ **本地時鐘（生理 C）與排程器設定的 cron 時區（社會作息）長期不一致**——每週上班像一次小型時區遷移、排程一直在跟時鐘打架；「相關非因果」≈ **別把共變的監控指標當根因**（SJL 與壞健康共變，但中間夾著「睡更短」這個混淆變數，像兩個指標一起升高不代表其一導致另一）；輪班 ≈ **頻繁切換 cron 時區**讓 C 永遠對不準。\n- **Worked example**：把一個晚型上班族的 social jetlag 算出來並逐步解讀（worked example＝把定義套真實數字）：工作日 01:00 睡、07:00 起（中點 04:00）；休息日 03:00 睡、11:00 起（中點 07:00）；SJL＝07:00 − 04:00＝3 h——逐步說明這 3 h 等於「每週末向西飛 3 時區、週一再飛回來」，再**關鍵地**說明為什麼不能直接由此宣稱「SJL 害你的健康」（混淆：他工作日只睡 6 h，睡眠不足與時鐘錯位糾纏在一起）。\n- **紙上推演**：(a★★[15 分鐘]) 算一個自訂作息的 SJL 並解讀（套定義，不需自我追蹤、用給定假想數字）。(b★★★[25 分鐘]) 找破綻＋設計實驗：拆穿「研究發現 social jetlag 大的人較肥胖，所以調整作息能減肥」的因果跳躍，並設計一個能逼近因果的研究。(c★[10 分鐘]) 口頭重講脊椎：青少年難早睡是排程器哪個歷程的什麼變化、為什麼不是紀律問題？\n\n## Part IV — 邊界與實踐（ch12–16）\n\n### ch12 — 咖啡因、酒精、安眠藥對睡眠結構的真實影響\n- **目標**：能講出咖啡因（擋腺苷）、酒精（助眠假象但破壞後半夜結構）、安眠藥與褪黑激素對睡眠結構的真實機制與效應；能破「褪黑激素＝安眠藥」迷思（給數字）；能用脊椎把這些物質定位成對排程器 S/C 的干預。\n- **必涵蓋**：脊椎歸位＝這些物質各自干預排程器的不同部位（咖啡因壓 S 的信號、褪黑激素動 C 的授時、酒精/安眠藥改睡眠結構）；**咖啡因**：腺苷受體拮抗劑、擋住 S 的促眠信號而非補充能量、促醒主要靠阻斷 A2AR；半衰期 ~5–6 h（個體差異大、CYP1A2）——下午咖啡可能壓到夜間睡眠驅力；**酒精**：助入睡是假象，會抑制前半夜 REM、後半夜反彈、片段化睡眠、加重呼吸中止——「睡得著 ≠ 睡得好」；**安眠藥**：苯二氮平類/Z 藥誘導睡眠但可能改變睡眠結構（如壓 N3）、有耐受/依賴/宿醉效應——只講藥理機制與「結構未必正常化」，**不寫用藥建議**；**褪黑激素（破迷思）**：是授時信號（chronobiotic）不是安眠藥，催眠效果微弱（19 試驗回顧：縮短入睡 ~7 分、增加總睡眠 ~8 分），對相位問題（時差/相位延遲）比對入睡困難更對症、時機比劑量重要；醫療邊界明標。\n- **不涵蓋**：失眠的 CBT-I（ch09）；睡眠呼吸中止（ch10）；劑量/處方/戒斷（非醫療手冊）；咖啡因對運動表現等其他效應（一句話）。\n- **橋接**：咖啡因＝**拮抗劑佔住受體＝把告警靜音**——它佔住腺苷受體讓「該睡了」的信號送不進來，但**債沒清**（S 還在高、腺苷還在累積），藥效退了會反撲（咖啡因崩潰）；酒精＝**讓服務看似可用實則狀態損壞**（入睡快但維護窗品質下降、後半夜反彈）；褪黑激素＝**NTP/時間同步信號**（對時、調 C 的相位），不是斷電指令——把它當安眠藥用錯了工具。\n- **Worked example**：把咖啡因的因果鏈走到底（worked example＝因果鏈不跳步）：下午 3 點喝咖啡 → 咖啡因進入血流、半衰期 ~5–6 h → 競爭性佔據 A2A/A1 腺苷受體 → 累積整天的腺苷（高漲的 S 信號）無法結合受體傳遞促眠 → 主觀「不睏」但 S 的睡眠債並未清償 → 就寢時入睡延遲/深睡減少 → 隔晨腺苷債＋睡眠不足疊加 → 想再用咖啡因壓→循環；逐步標「擋信號 ≠ 清債」，並用半衰期估算「下午 3 點的咖啡到半夜還剩多少」。\n- **紙上推演**：(a★★[20 分鐘]) 把白話翻機制：「我睡前喝紅酒比較好睡」——翻成「助入睡假象 vs 後半夜 REM 反彈/片段化」的結構機制，指出「睡得著 ≠ 睡得好」。(b★★[15 分鐘]) 找破綻：「褪黑激素是天然安眠藥，所以比安眠藥安全有效」——用 ~7 分鐘效應量拆穿「安眠藥」定性錯誤＋「它其實是計時信號」。(c★★[20 分鐘]) 口頭重講脊椎＋估算：用半衰期估「早上 8 點一杯、下午 2 點一杯，睡前體內咖啡因約剩多少」並說明它壓住排程器哪個信號。\n\n### ch13 — 短睡者、午睡與多相睡眠的真相\n- **目標**：能講出天生短睡（FNSS）是極罕基因突變、不可推論「短睡可習得」；能把「正常午睡」與「多相睡眠省睡」嚴格分開（後者無科學支持）；能用脊椎解釋為什麼壓縮睡眠＝砍維護窗、欠的帳要還。\n- **必涵蓋**：脊椎歸位＝睡眠需求＝排程器要求的維護窗長度，多數人壓縮它就是欠維護；**天生短睡（FNSS）**：傅嫈惠團隊，DEC2 2009、ADRB1 2019，累計約 7 個基因，某突變者 ~6.25 h 無明顯損害——**極罕突變、基因讓他們真的不需那麼多睡眠，一般人少睡就是剝奪（ch08）**，不可推論「短睡可訓練/無害」（破迷思）；**正常午睡（nap）**：有其價值（短午睡可提升警覺，呼應 Process C 午後凹陷 ch03），與多相睡眠是兩回事；**多相睡眠（破迷思）**：Uberman 等一天數次 20 分小睡無證據能減少睡眠需求、NSF 不建議、大幅壓縮慢波與 REM、個案 5 週後生長激素分泌幾乎停止、多數人第一個月放棄；**平衡**：別把「多相睡眠無效」誤寫成「所有午睡都沒用」。\n- **不涵蓋**：睡眠剝奪的代價（ch08，這裡引用不重述）；睡眠需求的年齡建議表（ch15/landscape，給範圍）；FNSS 的完整基因清單（給代表基因）；生長激素的內分泌全景（一句話）。\n- **橋接**：FNSS ≈ **極少數實例擁有特化硬體/特調 runtime**，能用更短維護窗完成同樣維護——你不能因為某台機器有特製 GC 就把全 fleet 的維護窗砍半；多相睡眠 ≈ **把一個長維護窗切成多個太短的片段**，每段都來不及完成需要連續時間的重 job（慢波/REM 需要累積，像深度壓實任務被頻繁中斷就永遠跑不完）；正常午睡 ≈ **off-peak 補一次輕量維護**（趁午後 C 凹陷、S 已累積一些），不是取代夜間主維護窗。\n- **Worked example**：把多相睡眠為何損害逐步走一遍（worked example＝用真實個案數字）：Uberman 式總睡 2–4 h、切成 6 段 20 分 → 每段太短無法累積足量慢波睡眠（深睡需要連續時間進入）→ 慢波與 REM 總量大幅壓縮 → 鞏固（ch05）與校準（ch07）維護不足 → 個案研究中 5 週後生長激素分泌幾乎完全停止（內分泌損害比認知更早顯現）→ 多數人撐不過第一個月；逐步對照「為什麼 FNSS 者短睡無損（基因降低了需求）vs 多相者短睡有害（需求沒變、只是被欠）」。\n- **紙上推演**：(a★★[15 分鐘]) 找破綻：「有人天生只睡 4 小時還很健康，證明睡眠需求可以靠習慣訓練縮短」——拆穿「極罕基因突變 ≠ 可習得」、對照 ch08 剝奪。(b★★[20 分鐘]) 設計假想實驗：要驗證「某人是真 FNSS 而非長期剝奪而不自知」，你會怎麼設計（提示：恢復睡眠是否反彈、認知是否真無損）？(c★[10 分鐘]) 口頭重講脊椎：把「多相睡眠省睡」用「砍維護窗、慢波 job 跑不完」講給工程師，並說明午睡為何不在此列。\n\n### ch14 — 夢、清醒夢與睡眠中的意識\n- **目標**：能講出夢的幾個主流科學圖像（夢不只在 REM、夢可能是離線處理/校準的副產品）、清醒夢的機制與證據；能誠實標示夢的功能是假說最多定論最少的區域、避免精神分析式過度詮釋；能把夢接回脊椎（離線維護期間的意識體驗）。\n- **必涵蓋**：脊椎歸位＝夢是維護窗（尤其 REM 校準、但也含 NREM）進行時的意識體驗/副現象，不是一件獨立的維護工作；**夢不只在 REM**（破硬等號，呼應 ch06）：NREM 也有夢報告、性質不同；**夢的功能假說**（全程標假說）：情緒處理/校準的副產品（接 ch06 overnight therapy）、記憶離線重組的伴隨現象（接 ch05 replay）、威脅模擬假說、無特定功能的「附帶現象」說——並陳不選邊；**明確劃界**：夢的「象徵意義解析/精神分析」**無實證支持**，本書點到即止、不展開；**清醒夢（lucid dreaming）**：在 REM 中意識到自己在做夢、部分可控；有客觀證據（受試者用預先約定的眼動信號與外界溝通，前額葉活動較一般 REM 高）——這是「睡眠中意識」最硬的實驗窗口；睡眠中意識的光譜（從無意識深睡到清醒夢）一段。\n- **不涵蓋**：REM 的情緒/創造力假說機制（ch06，這裡引用不重述）；夢的內容詮釋/解夢（明說無實證、不展開）；意識的哲學難題（一句話＋延伸閱讀）；REM 行為障礙臨床（ch10）。\n- **橋接**：夢 ≈ **維護窗執行時不小心被觀測到的中間狀態/debug log**——維護 job（replay、情緒重標記）在跑，意識偶爾「截到」這些離線處理的片段，所以夢常是白天素材的離奇重組（像看到一段被打散重排的 log）；清醒夢 ≈ **在維護模式下還能掛上一個有限的互動 shell**（意識部分上線、能對外發約定信號），證明「睡眠中意識」不是全有全無；「解夢」≈ 把隨機的 debug 中間態當成有意圖的訊息＝過度詮釋。\n- **Worked example**：把清醒夢的客觀驗證實驗逐步解讀（worked example＝把一個真實實驗設計走到底）：受試者學會清醒夢、預先約定「夢中察覺後做特定左右眼動」→ 睡眠實驗室記錄 EEG/EOG 確認其處於 REM → 受試者在 REM 中做出約定眼動 → 實驗者從 EOG 看到信號 → 證明此人「在客觀可驗證的 REM 中保有自我覺察並能執行計畫」；逐步說明為什麼這個設計能繞過「夢是醒後編造」的質疑（信號發生在生理確認的 REM 當下、非事後報告）。\n- **紙上推演**：(a★★[15 分鐘]) 找破綻：「夢一定有隱藏意義，因為大腦不會做無意義的事」——拆穿「離線處理的副產品」與「有意圖的訊息」之別、無實證的解夢為何不科學。(b★★[20 分鐘]) 設計假想實驗：除了眼動信號，你還能怎麼設計實驗驗證「清醒夢者真的有意識且能執行指令」、什麼結果能反駁「他只是醒後編造」？(c★[10 分鐘]) 口頭重講脊椎：夢為什麼不是第四件維護工作、而是維護進行時的意識副現象？\n\n### ch15 — 睡眠衛生的證據分級：有效 vs 民俗\n- **目標**：能把常見睡眠建議按證據等級分類（穩固共識／有些證據／民俗或被誇大）、說出每一條的證據強度；能用本書的嚴謹度三級標示當工具掃描任何睡眠宣稱；能把全書零信任主題在此收攏。\n- **必涵蓋**：脊椎歸位＝睡眠衛生＝怎麼不去妨礙排程器與三件維護工作（移除干擾 S/C 的因素），不是「黑科技提升睡眠」；**證據分級表**（本章核心，用表格）：穩固共識（CBT-I 為慢性失眠一線、ACP 2016；規律作息穩定 C；光照管理對授時有理）／有些證據但別誇大（睡前螢幕藍光、咖啡因時機 ch12、運動與睡眠的雙向關係）／民俗或被誇大（90 分鐘倍數鬧鐘 ch02、褪黑激素＝安眠藥 ch12、多相睡眠省睡 ch13、「人人需要 8 小時」NSF 是範圍 7–9 h、各種助眠保健品）；**回收全書零信任案例**：膠淋巴「洗腦」當定論（ch04）、Walker 戲劇數字（ch08）——示範「同一套嚴謹度標示」怎麼分辨科學與民俗；**睡眠需求是範圍非定點**（NSF 7–9 h、因人因年齡、FNSS 是例外 ch13）；醫療邊界＝有睡眠障礙請就醫，睡眠衛生不是治療。\n- **不涵蓋**：CBT-I 機制（ch09，這裡只放證據等級）；各物質藥理（ch12）；多相/短睡（ch13）；具體個人化作息處方（非醫療手冊）。\n- **橋接**：睡眠衛生 ≈ **不要在維護窗時段塞干擾 job**——別讓咖啡因/光照/不規律作息去打架排程器，而不是去「優化」一個本來會自己跑的維護窗；證據分級 ≈ 你評估一個效能「最佳實踐」時的**分級**（有 benchmark 背書的 vs 道聽塗說的 cargo cult），把民俗從工程實踐裡篩掉；「人人 8 小時」≈ 把一個**範圍配置硬編成單一魔術數字**的反模式。\n- **Worked example**：把褪黑激素的證據逐步分級（worked example＝把一個系統性回顧數字逐句解讀，與 ch12 機制呼應）：拿 19 試驗回顧的「縮短入睡 ~7 分、增加總睡眠 ~8 分」——逐句說明這數字小到什麼程度（~7 分鐘在臨床上幾乎不可感）、為何足以把它從「安眠藥」降級為「對相位問題有用的計時信號」、它該被放進證據分級表的哪一格（對「入睡困難」是民俗/被誇大、對「時差/相位」是有些證據）。\n- **紙上推演**：(a★★[20 分鐘]) 把三條隨手抓的睡眠建議各自歸到三級並說出證據（如「睡前一小時別看手機」「喝洋甘菊茶助眠」「固定起床時間」）。(b★★[15 分鐘]) 找破綻：給一段把多個民俗包裝成「科學睡眠法」的科普段落，逐句標出哪些是穩固、哪些被誇大。(c★★[15 分鐘]) 口頭重講脊椎＋零信任：用「不要妨礙排程器」統一解釋為什麼「規律作息」有理而「90 分鐘鬧鐘」是民俗。\n\n### ch16 — 總收官：大腦每晚的維護工作（六主線口試）\n- **目標**：把全書收進一條能口頭講完的故事線；用六條驗收主線當口試題完成總自我檢核；知道讀完往哪走、哪些是仍在演化的前沿。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**脊椎收束**：睡眠＝大腦每晚的維護視窗，排程器（雙歷程模型 S×C）決定何時進維護、進多久；三件維護工作——清除（🔥 最不確定、膠淋巴仍爭論）、鞏固（證據較穩）、校準（突觸 SHY＋情緒 REM，假說競爭中）——以及故障（剝奪/失眠/猝睡症/社會性時差）如何各自破壞排程器或維護工作的某一塊；**六條主線口試**（逐條出口頭題＋模範答案要點清單）：①一夜結構與週期 ②雙歷程模型如何排程 ③三件維護工作各自的證據強度與爭議 ④睡眠剝奪的真實代價（不誇大）⑤生理時鐘的分子與社會層面 ⑥睡眠衛生的證據分級；**零信任主題收攏**：本書最該記住的不是「睡眠好神奇」，而是「一個被無數文章引用的事實（膠淋巴洗腦/缺睡致癌加倍/褪黑激素安眠藥）其實正在被翻案或被誇大」——學會分辨證據等級比記住結論更重要；**仍在演化的前沿清單**（誠實標哪些 2026-06 還沒定論：膠淋巴清除方向、SHY vs ASC、REM 情緒功能、NT1 自體免疫機制）；下一步地圖（指向附錄 C）。\n- **不涵蓋**：任何新機制/新研究（只回收）；補完所有遺漏的誘惑（明寫刻意留的洞：分子細節、臨床治療、意識哲學——以及為什麼留）。\n- **橋接**：回到 ch01 的你——當時覺得「睡眠就是大腦關機休息」，現在你能把它講成一個有排程器、有三類維護 job、有明確故障模式、且有幾塊還在爭論的系統；成長的具體對照（從「關機」隱喻到「維護視窗」心智模型）。\n- **Worked example**：「大腦每晚的維護工作」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞：維護視窗／排程器 S×C／清除（標爭議）／鞏固／校準／一夜結構／剝奪的真實代價（不誇大）／證據分級）。\n- **紙上推演**：(a★★★[30 分鐘]) 六條主線口試正式作答（口頭、各 3–5 分鐘，對照要點清單自評；第 3 條必須講出膠淋巴爭議的雙方）。(b★★[15 分鐘]) 給「睡眠就是大腦在休息，睡不夠會直接讓你致癌、人人都需要 8 小時」這段話寫一段對事不對人的反駁（200 字內，每個宣稱給正確版）。(c★[10 分鐘]) 口頭重講脊椎一次：把任意一個你關心的睡眠現象（如「換時區後幾天睡不好」）用「哪項維護工作？哪個歷程驅動？」走一遍。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 名詞對照速查表\n全書中英術語總表：中文、English、一句話白話定義、首次出現章。**只收書中實際出現過的詞**（從各章 grep 彙整，不得收書中沒出現的詞）。核心收錄：雙歷程模型/Process S/Process C、N1/N2/N3/REM、hypnogram、慢波睡眠 SWS/SWA、膠淋巴系統/AQP4/CSF/ISF/Aβ、ASC/replay/spindles/ripples/slow oscillations、SHY/downscaling、腺苷/A1R/A2AR、SCN/TTFL/PER/CRY/CLOCK/BMAL1、褪黑激素/chronobiotic/entrainment、orexin/hypocretin/NT1/cataplexy、FNSS/DEC2/ADRB1、多相睡眠、social jetlag/MCTQ/chronotype、CBT-I、FFI。對齊讀者「口頭講得出來」需求，每個詞都要能用一句白話講。\n\n### 附錄 B — 關鍵研究與人物\n人物（中譯/原文/一句話貢獻/相關章）：博貝利（雙歷程 1982）、伊利夫/內德加德（膠淋巴 2012/2013）、法蘭克斯（2024 反駁）、托諾尼/奇雷利（SHY）、霍爾/羅斯巴什/楊（2017 諾獎果蠅鐘）、高橋（CLOCK 1997）、傅嫈惠（FNSS 基因）、羅內伯格（social jetlag/MCTQ）、沃克（《Why We Sleep》負面教材對象）、古澤/蓋爾曼（逐條查核 Walker）、賈德納（264 小時個案）。關鍵研究（年份/一句話結論/狀態標示/相關章）：Xie 2013（清除↑~60%，🔥 後被挑戰）、Miao 2024（清除↓，🔥）、19 試驗褪黑激素回顧（~7 分鐘）、2018 癌症系統回顧（155 萬人、無關聯）、多相睡眠生長激素停止個案。**每條標 landscape 三級狀態**（✅/⚠️/❌/🔥），從實際內容萃取、不新增未在書中出現者。\n\n### 附錄 C — 延伸閱讀地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源，分三條路線：往機制（神經科學睡眠機制：膠淋巴雙方論文、ASC/SHY 回顧、2017 諾獎資料）／往爭議與零信任（Guzey 查核原文、Gelman 部落格、Science/The Transmitter 膠淋巴爭議報導）／往實踐證據（ACP CBT-I 指引、NSF/AASM 睡眠時長與衛生資源、社會性時差自我批判回顧）；給「如果只看三樣」建議。**只收 landscape 或各章已驗證的真實連結**，沒把握標「（未驗證）」，絕不放編造連結。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-sleep-is-maintenance.md、ch02-anatomy-of-a-night.md、ch03-two-process-model.md、ch04-clearance-glymphatic.md、ch05-consolidation-memory.md、ch06-rem-and-dreams.md、ch07-calibration-shy-clock.md、ch08-sleep-deprivation.md、ch09-insomnia-cbti.md、ch10-narcolepsy-disorders.md、ch11-social-jetlag-shiftwork.md、ch12-caffeine-alcohol-drugs.md、ch13-short-sleepers-naps-polyphasic.md、ch14-dreams-lucid-consciousness.md、ch15-sleep-hygiene-evidence.md、ch16-finale.md；\n附錄 appendix-a-glossary.md、appendix-b-key-studies-people.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《大腦每晚的維護工作：睡眠的科學》（id=sleep）。最終書名於 outline gate 由作者定案，撰章時以工作名為準。\n\n> 撰任何一章前的固定動作：先讀 `_meta/landscape-2026-06.md`（事實基準，尤其「§〇 全書最高風險事實」表與末尾「撰章前必讀的高風險事實」濃縮清單），再讀本檔與 `_meta/outline.md`。睡眠科學與純數學書最大的差異：這裡很多「事實」仍在演化、仍有爭議、或被暢銷書嚴重誇大——本書的價值有一半來自把這些誠實地寫成「仍在爭論」，而不是替讀者選邊斷言。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的科普書。目標是讓一個資深後端工程師讀懂**睡眠不是「關機」、而是大腦每晚排程的一段維護視窗**——在這段視窗裡，大腦做三件維護工作（清除代謝廢物／鞏固記憶／校準突觸與情緒），而「雙歷程模型」（睡眠壓力 Process S × 生理時鐘 Process C）是決定何時進維護、進多久的**排程器**。讀完，讀者能用自己的話對另一個工程師講清楚：一夜睡眠的結構長什麼樣、排程器怎麼合成睡與醒的決策、三件維護工作各自的證據有多硬、以及科普世界裡哪些睡眠「常識」其實是被誇大或推翻的。\n- **不是**：\n  - **不是醫療／治療／自助手冊**。本書**不提供任何醫療建議、不開藥、不教戒斷、不教治療失眠、不替任何人調整用藥或睡眠時程**。談 CBT-I、褪黑激素、咖啡因、猝睡症等，一律只談**機制與科學證據**（它是什麼、為什麼這樣運作、證據多強），不寫「你應該怎麼做」。凡是可能被讀成醫療指示的句子，改寫成機制陳述或明確標注「這是臨床指引的內容，個人狀況請就醫，非本書建議」。讀者若有睡眠障礙，本書一句話：去找醫師，不要照科普書治病。\n  - **不是教科書**。不背睡眠分期表、不刷生理學名詞、不做完整文獻回顧；機制只講到「足以建立正確直覺並看穿迷思」的深度，更深的指向延伸閱讀。\n  - **不是自我追蹤實驗手冊**。**不叫讀者寫睡眠日誌、不叫讀者記夢、不叫讀者拿自己做剝奪實驗、不叫讀者按 90 分鐘倍數定鬧鐘**。「動手做」一律是**紙上推演**（見骨架第 5 段）。\n  - **不是暢銷睡眠科普的同類**。本書**刻意不引用** Matthew Walker《Why We Sleep》的戲劇性數字當定論（睡<6-7h 致癌加倍、FFI＝缺睡而死、WHO 宣布睡眠流行病、睡愈短命愈短、人人需要 8 小時——這些都被具名查核者指為錯誤或無據，見 landscape §9）。本書反而把「暢銷科普如何把不確定寫成斬釘截鐵」當成負面教材，服務零信任主題。\n  - 不服務轉職敘事——純興趣。但工程橋接要寫到讓它讀起來像母語，不是把系統術語硬塞。\n\n- 驗收標準（**全書六條主線**，finale 章逐條口試；講不清楚＝沒讀懂）：\n  1. **一夜的睡眠結構與週期**：N1/N2/N3/REM 是什麼、一夜 4–5 個週期怎麼跑、hypnogram 為何「前半夜深睡多、後半夜 REM 長」，以及為什麼「90 分鐘」是平均值而非鐵律。\n  2. **雙歷程模型如何排程睡與醒**：Process S（睡眠壓力，清醒時累積）與 Process C（生理時鐘，晝夜節律）兩個獨立信號，怎麼合成「現在該睡還是該醒」的單一排程決策。\n  3. **三項維護工作各自的證據強度與爭議**：清除（代謝廢物，**膠淋巴系統是全書最高風險、仍在公開爭論的前沿，必須誠實標爭議、不可斷言**）、鞏固（記憶，證據較穩但機制仍在研究）、校準（突觸與情緒，SHY 與 ASC 是競爭／互補的理論圖像，都別寫成定論）。\n  4. **睡眠剝奪的真實代價**：講得出剝奪對認知、情緒、代謝、警覺的真實影響——**不誇大、不引 Walker 的戲劇數字**，把「睡眠很重要」這個一般結論與「具體誇大數字」分開。\n  5. **生理時鐘的分子與社會層面**：從 SCN 與分子鐘（TTFL 負回饋、2017 諾獎的果蠅 per/PER/tim 史 vs 哺乳類 PER/CRY、CLOCK/BMAL1）到社會性時差（social jetlag，相關非因果）與青少年相位延遲。\n  6. **睡眠衛生的證據分級**：哪些有效（如 CBT-I 是慢性失眠一線、有官方指引）、哪些是民俗或被誇大（多相睡眠省睡、褪黑激素＝安眠藥、90 分鐘倍數鬧鐘）——分清證據等級，不把民俗寫成科學。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6+ 年資深後端工程師（TypeScript/Node.js/NestJS、AWS、K8s、分散式系統、效能工程、可觀測性），政大資科所選修過演算法與機器學習、淡江資工學士。**神經科學與心理學從零教**，但可大量橋接到他的系統工程直覺。招牌敘事資產：profiling 驅動讓尖峰 RDS CPU 降 40%。\n\n可直接當橋接錨點的實戰直覺（要用滿、但別喧賓奪主——機制才是主角，類比是扶手）：\n\n| 睡眠概念 | 工程橋接錨點 | 在哪一段用 |\n|----------|--------------|------------|\n| 睡眠＝維護視窗（非關機） | cron／批次維護窗、off-peak 維護、計畫性 downtime | 全書脊椎 |\n| 清除（代謝廢物） | 垃圾回收（mark-sweep）、log compaction、清碎片 | 「清除」章（標爭議） |\n| 鞏固（記憶重播 replay） | replay WAL／event sourcing 重放、把當日 log 重整進長期儲存 | 「鞏固」章 |\n| 校準（突觸 downscaling） | 整體權重正規化、清快取防無界膨脹、壓掉碎片 | 「校準」章 |\n| 雙歷程＝兩信號合成排程決策 | 兩個獨立信號（待辦堆積 × cron 時窗）合成一個排程決策 | Process S × C |\n| 睡眠壓力（腺苷累積） | backpressure、累積的技術債／待辦佇列 | Process S |\n| 咖啡因擋腺苷 | 拮抗劑佔住受體＝把告警靜音（債沒清，藥退反撲） | 腺苷／咖啡因章 |\n| 褪黑激素＝授時信號 | NTP／時間同步信號（對時，非斷電指令） | 生理時鐘章 |\n| 猝睡症＝促醒看門狗壞掉 | keep-alive／看門狗行程崩了，狀態機非法轉移 | 猝睡症章 |\n| social jetlag | 本地時鐘 vs 排程器 cron 時區長期不一致 | 社會性時差章 |\n| CBT-I 睡眠限制／刺激控制 | 重建條件反射綁定＝清掉錯誤快取關聯（改根因 vs 熱修補） | 睡眠衛生章 |\n\n**不需要解釋**（讀者已精通，直接拿來當橋）：快取與失效、垃圾回收與記憶體管理、cron／批次排程與維護窗、佇列與 backpressure、idempotency、最終一致性、event sourcing／WAL／replay、正回饋與負回饋迴圈、狀態機與不變式、profiling 驅動優化、可觀測性與告警靜音、分散式時鐘同步（NTP）、RL 的 TD／prediction-error 與 variable-ratio reinforcement（機器學習選修學過，可在記憶／多巴胺相關處橋接）。\n\n**快速複習即可**（聽過或學過但生鏽）：基礎神經元電化學（動作電位、突觸、神經傳導物質——只在用到時一兩句帶過）；指數衰減／半衰期（腺苷、咖啡因會用，他有數值直覺）；負回饋迴圈在分子層級的具體形式（TTFL）；統計上「相關非因果」「U 形關係」「效應量」「混淆因子」（他懂概念，但要在睡眠脈絡裡明確點名）。\n\n**要從零教**（本書主體，假設讀者一無所知）：睡眠分期（N1/N2/N3/REM）與 hypnogram；雙歷程模型（Process S／C）；膠淋巴系統與腦廢物清除（含其爭議）；記憶鞏固的睡眠機制（ASC、replay、spindle／ripple／slow oscillation 三振盪協同）；突觸恆定假說 SHY；腺苷與睡眠壓力的分子面；SCN 與分子生理時鐘（per/PER/tim、PER/CRY、CLOCK/BMAL1、褪黑激素的真實角色）；睡眠剝奪的生理後果；猝睡症與 orexin；天生短睡基因；多相睡眠的科學地位；社會性時差與時型（chronotype）；青少年睡眠相位延遲；CBT-I。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。**第二人稱「你」**直接對讀者說話。\n- 技術與專有名詞中英並用：第一次出現給「中文（English）」，之後可只用中文。人名給「中譯（原文，生卒若關鍵）」，之後用中譯。\n- **嚴禁簡體中文字／詞**（这/们/个/为/启/说/题/类/变/优/构/识/认/觉/译/选/边/过/还/进/运/层/会/图/测/软/应/实/发/经/时/间/关/见/现/对/标/简/论/节…等，lint 會逐字元掃；shell grep 對同形字會誤報，以 Python 逐字元比對為準）。\n- 台灣用語基準：神經元（不用「神經細胞」當主詞時可注）、突觸、生理時鐘（circadian rhythm 譯「晝夜節律／生理時鐘」，以「生理時鐘」為日常主詞）、清醒／入睡、剝奪（sleep deprivation）、鞏固（consolidation）、清除（clearance）、校準（calibration，本書脊椎用語，對應 downscaling／renormalization）。**避免**把心理學術語寫成中國大陸慣譯（如「信息」用「資訊」、「程序」用「歷程／程序」依脈絡）。\n\n### 中英術語對照表（本書關鍵詞，第一次出現照此給原文）\n\n| 中文 | English | 備註 |\n|------|---------|------|\n| 雙歷程模型 | two-process model | Process S × Process C |\n| 睡眠恆定歷程／睡眠壓力 | Process S / sleep homeostasis | 清醒累積、睡眠消退 |\n| 生理時鐘歷程 | Process C | 晝夜節律驅動 |\n| 慢波睡眠／深睡 | slow-wave sleep (SWS) / N3 | 慢波活動 SWA |\n| 快速動眼期 | REM (rapid eye movement) | 對 NREM |\n| 睡眠結構圖 | hypnogram | |\n| 膠淋巴系統 | glymphatic system | glia + lymphatic；🔥 爭議 |\n| 腦脊髓液／間質液 | CSF / interstitial fluid (ISF) | |\n| 水通道蛋白 | aquaporin-4 (AQP4) | |\n| β-類澱粉蛋白 | amyloid-β (Aβ) | |\n| 主動系統鞏固假說 | active systems consolidation (ASC) | |\n| 海馬迴／尖波漣波 | hippocampus / sharp-wave ripples | |\n| 睡眠紡錘波／慢振盪 | spindles / slow oscillations | 三振盪協同 |\n| 突觸恆定假說 | synaptic homeostasis hypothesis (SHY) | downscaling／renormalization |\n| 腺苷 | adenosine | A1R／A2AR 受體 |\n| 咖啡因（拮抗劑） | caffeine (antagonist) | |\n| 視交叉上核 | suprachiasmatic nucleus (SCN) | 中樞時鐘 |\n| 轉錄-轉譯負回饋迴圈 | transcription-translation feedback loop (TTFL) | |\n| 褪黑激素 | melatonin | chronobiotic 授時信號 |\n| 授時／同步 | entrainment / chronobiotic | |\n| 食慾素／下視丘分泌素 | orexin / hypocretin | |\n| 猝睡症（伴猝倒） | narcolepsy type 1 (NT1) / cataplexy | |\n| 天生短睡 | familial natural short sleep (FNSS) | DEC2／ADRB1 |\n| 多相睡眠 | polyphasic sleep | |\n| 社會性時差 | social jetlag (SJL) | 睡眠中點之差 |\n| 時型 | chronotype | 早型／晚型 |\n| 認知行為治療失眠 | CBT-I | 慢性失眠一線 |\n| 致死性家族失眠症 | fatal familial insomnia (FFI) | 普利昂蛋白病 |\n\n### 人名對照（第一次出現附原文，之後用中譯）\n\n博貝利（Alexander Borbély，雙歷程模型，1982）、伊利夫（Jeffrey Iliff）、內德加德（Maiken Nedergaard，膠淋巴系統）、法蘭克斯（Nick Franks，2024 反駁方）、托諾尼（Giulio Tononi）、奇雷利（Chiara Cirelli，SHY）、霍爾（Jeffrey C. Hall）、羅斯巴什（Michael Rosbash）、楊（Michael W. Young，2017 諾獎）、高橋（Joseph Takahashi，CLOCK）、傅嫈惠（Ying-Hui Fu，天生短睡基因）、羅內伯格（Till Roenneberg，社會性時差／MCTQ）、沃克（Matthew Walker，《Why We Sleep》作者，本書負面教材對象）、古澤（Alexey Guzey，逐條查核 Walker 的人）、蓋爾曼（Andrew Gelman，跟進查核）、賈德納（Randy Gardner，264 小時不睡的著名個案）。\n\n## 每章骨架（必須遵守，標題名稱逐字照抄——Tier-1 一致性掃描 lint_book.py 會 grep 這些標題，順序固定）\n\n1. 章首：`# chNN — 章名：副標`，緊接 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章（Part 邊界見 outline.md）在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part；CJK=2 欄對齊）。讀者偏好**架構圖先行**。\n2. `## 從你已知的出發` — 橋接段：把本章核心錨定在讀者的後端／系統工程實戰直覺上，要**具體**（用上表的橋接錨點，例如「腺苷累積就是一種 backpressure」「replay 就是維護窗重放 WAL」），不要泛泛而談。每章在這裡至少落地一個明確的工程類比。\n3. 核心內容（多個 `##` section，深入機制與直覺）。**歷史敘事服務於機制理解**，不是編年史——講 2017 諾獎、講 2013→2024 的膠淋巴翻案，都是為了讓讀者看懂機制與「事實如何被建立又被挑戰」，不是流水帳。\n4. `## 直覺的陷阱` — **本書招牌段落**（故障視角的科普版）：這個主題**最常被誤解成什麼科普迷思**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實信了民俗）。用表格或條列。睡眠主題的迷思密度極高，這段是全書最有價值的段落之一。必拆的常見錯路範例：「睡眠就是關機／大腦休息」「膠淋巴已證明睡眠會洗掉毒素」「人人需要 8 小時」「90 分鐘倍數定鬧鐘最科學」「褪黑激素是安眠藥」「多相睡眠能省下睡眠時間」「有人天生短睡，所以少睡可訓練」「social jetlag 害健康（當因果）」「REM＝做夢期」「致死性家族失眠症證明缺睡會直接害死你」。\n5. `## 紙上推演` — 動手做的形式，**一律是紙上／思想推演，無 Python、無自我追蹤實驗**。每章 2~4 題，每題標**難度（★~★★★）與預估時間 [NN 分鐘]**。題型只能是這幾類：(a) **預測一個研究的結果再對答案**（給設計，問你猜結果，再揭曉真實數字並討論）；(b) **找出一個壞論證的破綻**（給一段似是而非的科普推論，請拆穿哪一步錯）；(c) **把一個白話宣稱翻成機制**（「睡前喝咖啡睡不著」→ 翻成腺苷／拮抗劑的機制鏈）；(d) **設計一個假想實驗**（要驗證某宣稱，你會怎麼設計對照、什麼結果能反駁它）；(e) **口頭重講一條因果鏈**（把脊椎問題「這是哪一項維護工作？由排程器哪個歷程驅動？」走一遍）。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路、若涉爭議則呈現雙方）。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。對齊「能不能把這個概念講給另一個工程師聽」的深度，**優先出「為什麼」而不是「是什麼」**（例：「為什麼說膠淋巴清除是爭議而不是定論？雙方各拿什麼證據？」）。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。沒把握的標「（未驗證）」；絕不放編造的連結。\n\n## 深度標準\n\n- **每章至少一個 worked example**：本書的 worked example 是「**一條走到底的機制鏈**」或「**一個真實研究的數字逐步解讀**」，不准跳步。範例形態：把一夜 hypnogram 的時序逐週期走一遍（前深睡、後 REM）；把一條因果鏈走到底（咖啡因 → 拮抗 A2A 受體 → 擋住腺苷促眠信號 → 壓力沒清、藥退反撲）；把一個系統性回顧的數字逐步解讀（如褪黑激素 19 試驗回顧：縮短入睡 ~7 分鐘、增加總睡眠 ~8 分鐘——逐句說明這數字小到什麼程度、為何推翻「安眠藥」說法）；把一個分子負回饋迴圈走一圈（PER 蛋白夜間累積 → 抑制自身基因 → 日間降解 → 解除抑制 → ~24 小時振盪）。outline 會為每章指定基準範例。\n- **嚴謹度的誠實三級標示**（這是本書的核心紀律，每個關鍵宣稱都要歸到某一級）：\n  - 「**這是穩固共識**」：有官方指引／多獨立來源／系統性回顧背書（如 CBT-I 是慢性失眠一線、2017 諾獎的分子鐘、腺苷與睡眠需求相關）。可較有信心寫，但機制類仍用「目前理解是…」語氣，別寫成永恆定律。\n  - 「**這是主流假說但有爭議**」：被廣泛接受但非定論（如 ASC、SHY、NT1 自體免疫病因）。寫「目前最被接受的圖像是…」，明說競爭理論存在。\n  - 「**這是迷思，正解是…**」：通行科普說法是錯的／被誇大（如褪黑激素＝安眠藥、人人 8 小時、多相睡眠省睡）。正面拆解，進「直覺的陷阱」。\n  - 「**這是 🔥 活躍爭議前沿**」：學界無共識（**膠淋巴清除是全書最重要的一個**）。**必須呈現雙方、不可斷言單一答案**、標時點 `（2026-06）`。明說脊椎三件維護工作中「清除」這隻腳目前最不確定——這種誠實正是本書的價值。\n- **禁止「顯然」「眾所周知」「不言而喻」**；禁止把單一小研究寫成定論；禁止把相關寫成因果（social jetlag、夏令時間心臟病等一律標「相關非因果／效應量有爭議」）。\n- **脊椎概念每章復現**：每章至少一次明確把當章現象歸位到脊椎——「這是哪一項維護工作（清除／鞏固／校準）？由排程器（雙歷程模型）的哪個歷程（S／C）驅動？」。即使是反例章（猝睡症＝排程器壞掉）也要明確說它對應脊椎的哪個破壞。\n- **每個「驚嘆點」要能被重講**：本書的震撼不是「睡眠好神奇」，而是「機制竟然這樣運作」「一個被無數文章引用的事實竟然正在被翻案」。每章至少一處明確回答「這裡值得停下來想的點在哪」，且寫到讀者能用自己的話轉述，不是堆形容詞。\n- 寧深勿廣，不灌水。每章 **5,000~9,000 中文字**，依主題深度調整（膠淋巴爭議章、雙歷程章、分子鐘章可偏厚）。\n\n## 事實正確性（睡眠科普的零信任紀律）\n\n- 時效性與可爭議事實（年份、人物、研究、效應量、樣本數、歸屬、機制宣稱、版本、價格、硬體狀態）以 `_meta/landscape-2026-06.md` 為**事實基準**；landscape 沒有的、或本章特定細節，**撰章時每章用 WebSearch/WebFetch 查證 3~8 次**並 hedge。**不要憑記憶、不要憑科普二手轉述。**\n- **重大爭議呈現雙方、不替讀者選邊斷言**。最高優先守住的點（細節見 landscape，撰章前必讀濃縮清單）：\n  1. **膠淋巴清除是 🔥 活躍爭議**（2013 稱增加 ~60% vs 2024 起多組反指減少，方法學僵持，2026-06 無共識）——脊椎「清除」這隻腳**不可斷言**，呈現雙方。\n  2. **Walker 的戲劇性數字一律不引為定論**（致癌加倍／FFI 缺睡而死／WHO 流行病／睡愈短命愈短／8 小時硬標準皆被具名指錯）。\n  3. **褪黑激素是計時信號非安眠藥**（催眠效果僅 ~7 分鐘）。\n  4. **90 分鐘週期是平均、變異大**，別當定鬧鐘的精確常數。\n  5. **果蠅 per/tim/PER（諾獎史）vs 哺乳類 PER/CRY、CLOCK/BMAL1**——別把 CRY 安到果蠅、別說諾獎得主發現 CRY（CLOCK 是高橋 1997 在小鼠發現）。\n  6. **天生短睡基因（DEC2/ADRB1）是極罕突變**，不可推論「短睡可習得／無害」。\n  7. **多相睡眠無科學支持**（但別波及「正常午睡」的價值）。\n  8. **social jetlag 的健康關聯是相關非因果**（作者本人 Roenneberg 亦提醒）。\n  9. **SHY（校準）與 ASC（鞏固）是競爭／互補的理論圖像**，都別寫成定論。\n  10. **NT1 的自體免疫是強假說**，寫「廣被接受的假說」而非「已證實」。\n- **時效性事實標時點**：可爭議或正在演化的事實一律標 `（2026-06）`，並用 hedge 語氣（「截至 2026 年中尚無共識」「目前最被接受的圖像是…」）。穩定史實（諾獎年份、原始論文年份）可不標時點，但年份／歸屬仍以 landscape 為準。\n- 查證後有修正：**更新 landscape → 依基準同步所有引用章節 → 在 maintenance.md 掃描日誌記一行**。重大修正（推翻既有基準）需**兩個獨立來源**。\n- 延伸閱讀只放真實存在的連結（landscape 已驗證者優先）；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（全書路線圖、一夜 hypnogram 的時序圖、雙歷程模型的 S 上升／C 正弦合成圖、TTFL 負回饋迴圈、膠淋巴的 CSF→ISF 流向）必須通過 `check_diagrams.py`（CJK=2 欄寬，exit 0 才算過）。**注意**：路線圖的 `│` 因上下無 box 字元被 checker 豁免，路線圖對齊只能靠渲染肉眼檢查；Part 首章共用同一張路線圖、只移 `◄你在這裡`，改章名／章序須各 Part 首章同步（建議由腳本統一生成、別手抄）。\n- 多行機制鏈／推導用 ```text 圍欄區塊，每步右側可加「← 為什麼」短註；禁止把長因果鏈硬塞進行內。表格用於迷思清單、證據分級對照、睡眠分期對照、雙方爭議論點對照。\n- 跨章引用 house style：裸寫「（chNN）」（全書壓倒性，不寫死檔名）。本書系四本**完全獨立、互不引用**，不做跨書引用。\n- 變數下標：分子名等用 Unicode 下標時保持一致（如 A1R／A2AR 用一般字、Aβ 用希臘字母）；數值單位（小時 h、分鐘、毫克 mg）給範圍而非偽精確單點。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點，**不販賣神話、不喊「太神奇了」「太可怕了」**——震撼靠把機制講清楚、把「一個被無數文章引用的事實正在被翻案」的張力擺出來，不靠驚嘆號。允許冷幽默。每個術語出場都有白話直覺與工程類比在旁，但不假裝簡單：該慢的地方明說「這裡值得你停十分鐘」。對「睡眠很重要」這個結論保持尊重（睡眠確實重要），但堅決把它與「具體誇大數字」分開——這正是 Guzey 與 Gelman 的立場，也是本書的立場：對事不對人、克制。膠淋巴爭議、Walker 案、褪黑激素迷思這三處要寫到讓讀者「原來我一直信的是被誇大的版本」，靠的是把證據與反證據擺清楚，不是製造恐慌或崇拜。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="sleep";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">大腦每晚的維護工作<br><span style="font-weight:400;font-size:12px;color:var(--muted)">睡眠的科學</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 大腦每晚的維護工作';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
