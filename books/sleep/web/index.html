非安眠藥 | ch03 |\n| 強迫去同步實驗 | forced desynchrony (FD) | 讓受試者按非 24 小時時程生活，使 Process S 與 Process C 相位脫鉤，從而獨立量測兩個歷程各自的貢獻 | ch03 |\n| 第二陣清醒 | second wind | 熬夜到凌晨深谷後，Process C 轉向促醒相，暫時壓過高 S 帶來的睡意，讓人感覺稍微好一點——但 S 並未清償 | ch03 |\n\n---\n\n## C. 三件維護工作\n\n### C-1 清除（膠淋巴系統）\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 膠淋巴系統 | glymphatic system | 伊利夫與內德加德 2012 年提出：CSF 沿腦血管旁空間進入腦實質、與 ISF 交換、排走代謝廢物的路徑，依賴 AQP4；🔥 2024 年起有研究得到相反結論，截至 2026-06 仍在爭論 | ch04 |\n| 腦脊髓液 | cerebrospinal fluid (CSF) | 包圍大腦和脊髓的透明液體，膠淋巴假說中的主要清除液體，從旁血管空間進入腦實質 | ch04 |\n| 間質液 | interstitial fluid (ISF) | 腦細胞間隙中的液體，代謝廢物先累積於此，再與 CSF 交換後排出 | ch04 |\n| 水通道蛋白 | aquaporin-4 (AQP4) | 星狀膠細胞突足上密集分佈的水分子通道蛋白，基因敲除後間質溶質清除下降約 70%，是膠淋巴機制的關鍵分子 | ch04 |\n| β-類澱粉蛋白 | amyloid-β (Aβ) | 神經元代謝產生的蛋白質，阿茲海默症的關鍵病理堆積物，也是膠淋巴清除研究中最常用的追蹤分子 | ch04 |\n| 旁血管空間 | paravascular space | 穿透腦血管外圍的環狀空隙，是 CSF 進出腦實質的通道，膠淋巴系統的結構基礎 | ch04 |\n| 血腦屏障 | blood-brain barrier | 嚴格限制血液分子進出大腦的屏障，使大腦無法像其他器官一樣靠傳統淋巴管清除廢物 | ch04 |\n| 正腎上腺素慢血管運動 | norepinephrine-mediated slow vasomotion | Nedergaard 團隊 2024 年提出的膠淋巴驅動機制：睡眠時正腎上腺素（NE）週期性下降驅動血管節律性收縮，充當「幫浦」推動 CSF 流動 | ch04 |\n| 星狀膠細胞 | astrocyte | 腦中大型支撐細胞，突足包覆血管外壁並密佈 AQP4，是膠淋巴系統的結構基礎 | ch04 |\n\n### C-2 鞏固（記憶固化）\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 主動系統鞏固假說 | active systems consolidation (ASC) | 慢波睡眠期間，海馬迴把當日記憶痕跡「重播」出來，透過三振盪協同逐步轉移到皮質長期儲存的主流框架 | ch05 |\n| 系統鞏固 | systems consolidation | 記憶從海馬迴依賴逐步轉為皮質分散支撐的過程，是 ASC 的核心描述 | ch05 |\n| 重播 | replay | 慢波睡眠期間，海馬迴重新活化白天的記憶活化模式，類比把 WAL 在維護窗重放一遍 | ch05 |\n| 記憶痕跡 | engram | 學習事件在神經迴路留下的物理痕跡，海馬迴的痕跡脆弱且揮發性高，需要睡眠才能固化 | ch05 |\n| 海馬迴 | hippocampus | 大腦顳葉內側的弧形結構，是記憶的快速編碼與臨時儲存地，在 N3 期透過 replay 把記憶向皮質傳遞 | ch05 |\n| 丘腦 | thalamus | 大腦的訊息轉接站，負責產生睡眠紡錘波，在三振盪協同中扮演橋接皮質與海馬迴的角色 | ch05 |\n| 三振盪協同 | three-oscillation coupling | 慢波睡眠期間，皮質慢振盪（0.5–1 Hz）、丘腦睡眠紡錘波（12–15 Hz）、海馬迴尖波漣波（80–100 Hz）在毫秒級精確對齊，共同完成記憶封包傳輸 | ch05 |\n\n### C-3 校準（突觸恆定）\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 突觸恆定假說 | synaptic homeostasis hypothesis (SHY) | 托諾尼與奇雷利提出：清醒時突觸整體淨增強，睡眠（NREM 慢波）時做整體按比例降縮，恢復訊噪比與可塑性空間 | ch07 |\n| 突觸降縮 | synaptic downscaling / renormalization | SHY 裡睡眠期間把所有突觸強度按比例下調的過程，強突觸保持相對優勢、弱突觸回到基線——是「校準」而非「清空」 | ch07 |\n| Hebbian 突觸增強 | Hebbian plasticity | 「一起活化的細胞接在一起」的突觸增強機制，清醒時學習使皮質突觸整體淨增強，SHY 說這正是需要睡眠校準的原因 | ch07 |\n| AMPA 受體 | AMPA receptor | 突觸後膜上負責傳遞快速興奮信號的麩胺酸受體，SHY 的降縮機制之一是睡眠期間 AMPA 受體內吞（被收回細胞內），縮小突觸強度 | ch07 |\n\n---\n\n## D. 分子生理時鐘\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 視交叉上核 | suprachiasmatic nucleus (SCN) | 下視丘的中樞時鐘，約 20,000 個神經元，接收視網膜光信號授時，維持 ~24 小時振盪，是 Process C 的硬體實體 | ch03 |\n| 轉錄-轉譯負回饋迴圈 | transcription-translation feedback loop (TTFL) | 分子生理時鐘的核心機制：時鐘蛋白在夜間累積、抑制自身基因轉錄、日間降解解除抑制，循環一輪約 24 小時 | ch07 |\n| period 基因（果蠅） | period gene (per) | 1984 年由霍爾與羅斯巴什克隆出的果蠅時鐘基因，其產物 PER 蛋白是 TTFL 的負回饋核心；2017 諾獎工作的核心對象 | ch07 |\n| timeless 基因（果蠅） | timeless gene (tim) | 果蠅分子時鐘的核心夥伴基因，TIM 蛋白與 PER 蛋白在夜間共同累積、合力抑制自身基因，屬果蠅特有（哺乳類無同功同源體） | ch07 |\n| PER 蛋白 | PER protein (PER1/2/3) | 哺乳類分子時鐘的負回饋臂蛋白（哺乳類有三個亞型），與 CRY 共同抑制 CLOCK/BMAL1 驅動的正向轉錄 | ch07 |\n| 隱花色素 | cryptochrome (CRY1/2) | 哺乳類分子時鐘負回饋臂的另一個關鍵蛋白，與 PER 形成抑制複合體；屬哺乳類版本（勿混淆到果蠅的 tim） | ch07 |\n| CLOCK | CLOCK | 哺乳類分子時鐘正向臂的轉錄因子，由高橋（Takahashi）1997 年在小鼠發現，與 BMAL1 形成二聚體啟動時鐘基因轉錄 | ch07 |\n| BMAL1 | BMAL1 | CLOCK 的搭檔轉錄因子，組成分子時鐘正向臂，被 PER/CRY 抑制後形成完整的 TTFL 振盪 | ch07 |\n| 褪黑激素 | melatonin | 松果體在黑暗中分泌的激素，是 SCN 向全身廣播「現在是夜晚」的化學授時信號（chronobiotic）；催眠效果微弱（縮短入睡僅 ~7 分鐘），非安眠藥 | ch03 |\n| 相位延遲 | phase delay | 生理時鐘的入睡與醒來時間向後移動；青春期多數青少年有 1–2 小時的相位延遲，是生理現象而非懶惰 | ch07 |\n\n---\n\n## E. 睡眠壓力的分子面\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 腺苷 | adenosine | 神經元消耗 ATP 後的代謝副產品，清醒時在細胞外累積，透過 A1R 和 A2AR 傳遞促眠信號；Process S 最被研究的分子對應之一（但不是唯一） | ch03 |\n| A1 受體 | A1 receptor (A1R) | 腺苷受體之一，腺苷結合後直接抑制促醒神經元活動 | ch03 |\n| A2A 受體 | A2A receptor (A2AR) | 腺苷受體之一，活化後促進睡眠迴路；咖啡因的主要促醒機制是阻斷此受體 | ch03 |\n| 拮抗劑 | antagonist | 與受體結合但不活化它、只是佔住位置阻止真正配體進來的分子；咖啡因是腺苷受體的拮抗劑 | ch12 |\n\n---\n\n## F. 化學物質與藥物介入\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 咖啡因 | caffeine | 腺苷 A1R 和 A2AR 的競爭性拮抗劑，佔住受體讓「該睡了」的信號送不進來——告警靜音，但腺苷壓力仍持續累積，藥效退後會反撲 | ch03 |\n| 咖啡因半衰期 | caffeine half-life | 血中咖啡因濃度降至一半所需時間，約 5–6 小時（個體差異大，受 CYP1A2 基因型影響） | ch12 |\n| CYP1A2 | CYP1A2 | 肝臟代謝咖啡因的主要酵素，其基因型決定個體咖啡因代謝快慢，是咖啡因半衰期個體差異的主因 | ch12 |\n| 酒精（助眠的假象） | alcohol (illusory sleep aid) | 抑制中樞神經讓人快速入睡，但前半夜抑制 REM、後半夜 REM 反彈、睡眠結構損壞——是「睡得著」但「睡眠維護帳沒清」的典型案例 | ch12 |\n| 正腎上腺素 | norepinephrine (NE) | 促醒相關的神經傳導物質，REM 期間濃度降至接近零（此特性被用來解釋 REM 情緒重處理機制）；也是膠淋巴慢血管運動的驅動分子 | ch06 |\n| 乙醯膽鹼 | acetylcholine (ACh) | REM 期間水平升高的神經傳導物質，與 REM 期的皮質活躍和某些記憶整合功能相關 | ch06 |\n| GABA | GABA (gamma-aminobutyric acid) | 大腦主要抑制性神經傳導物質，腦幹在 REM 期間透過釋放 GABA（和甘胺酸）抑制脊髓運動神經元，實現 REM atonia | ch06 |\n\n---\n\n## G. 食慾素與猝睡症\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 食慾素／下視丘分泌素 | orexin / hypocretin | 下視丘外側約 70,000–80,000 個特化神經元分泌的神經胜肽，功能是穩定清醒狀態、防止 REM 隨機侵入清醒期，是大腦的「清醒看門狗」 | ch10 |\n| 第一型猝睡症 | narcolepsy type 1 (NT1) | 食慾素神經元選擇性喪失 >90%，導致清醒/REM 邊界崩塌：日間過度嗜睡（EDS）、猝倒、入睡幻覺、睡眠麻痺的四聯症；排程器狀態機的不變式被破壞 | ch10 |\n| 日間過度嗜睡 | excessive daytime sleepiness (EDS) | NT1 幾乎所有患者都有的症狀：在進食、交談、駕駛等應激醒著的場合突然不可抗拒地睡著 | ch10 |\n| 猝倒 | cataplexy | NT1 的定義性症狀：強烈情緒（大笑、驚嚇）觸發 REM 的肌張力抑制機制在清醒時誤發，全身或局部肌肉突然癱軟，但意識清醒 | ch10 |\n| 入睡幻覺 | hypnagogic hallucinations | 入睡邊緣 REM 的夢境生成機制提前啟動，讓人清醒地「看到」「聽到」不存在的事物 | ch10 |\n| 睡眠麻痺 | sleep paralysis | 入睡或清醒邊緣，REM atonia 先於或晚於意識恢復，感覺「醒著但動不了」；NT1 患者頻率更高，健康人偶發 | ch10 |\n| HLA-DQB1*06:02 | HLA-DQB1*06:02 | 一個 HLA 亞型，NT1 患者中高度富集，支持「T 細胞自體免疫攻擊食慾素神經元」的強假說（截至 2026-06 仍是假說，非確立機制） | ch10 |\n| 第二型猝睡症 | narcolepsy type 2 (NT2) | 有 EDS 但**無猝倒**的猝睡症，食慾素水平通常正常或輕度降低，病因較不清楚 | ch10 |\n\n---\n\n## H. 睡眠障礙\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 阻塞性睡眠呼吸中止 | obstructive sleep apnea (OSA) | 睡眠時上呼吸道反覆塌陷，觸發短暫覺醒→再入睡的循環，使 N3 和 REM 持續被打斷；問題是「維護視窗存在但 job 跑不完」而非「時間不足」 | ch10 |\n| 不寧腿症候群 | restless legs syndrome (RLS) | 夜間腿部出現難以描述的不舒適衝動，必須移動才能短暫緩解，干擾入睡和維持睡眠 | ch10 |\n| 異睡症 | parasomnias | 睡眠期間的不正常行為或體驗，包含 NREM 異睡症（夢遊、夜驚）和 REM 異睡症（RBD）；共同特點是「該分離的狀態沒有分離」 | ch10 |\n| 夢遊 | sleepwalking / somnambulism | NREM 深睡（N3）期的不完全覺醒：運動皮質部分活化（能走路、叫喊），但前額葉維持近似睡眠的低活動，意識不清晰，非 RBD | ch10 |\n| REM 行為障礙 | REM sleep behavior disorder (RBD) | REM 期 atonia 保護機制失效，患者在 REM 期把夢境動作真實演出（打、踢、叫喊）；孤立性 RBD（iRBD）是 α-突觸核蛋白病的早期生物標誌 | ch10 |\n| α-突觸核蛋白病 | alpha-synucleinopathy | 以 α-突觸核蛋白（Lewy bodies 主要成分）異常沉積為特徵的神經退化病，包含帕金森氏症、路易體失智症；iRBD 是其早期前驅症狀 | ch10 |\n| 慢性失眠 | chronic insomnia disorder | 每週至少三夜、持續三個月以上、有充足睡眠機會仍入睡困難或維持困難、且造成日間功能損害的失眠；成人盛行率約 6–10% | ch09 |\n| 三 P 模型 | 3P model (Spielman) | Spielman 1987 年提出的失眠框架：素因（predisposing）× 誘因（precipitating）× 維持因素（perpetuating），解釋失眠何以在觸發事件消失後仍慢性化 | ch09 |\n| 過度激發 | hyperarousal | 失眠的核心機制之一：自律神經、認知、情緒均維持在高激發狀態，使睡眠誘發系統難以壓過促醒系統 | ch09 |\n| 睡眠效率 | sleep efficiency | 在床上真正睡著的時間佔在床時間的比例，CBT-I 的目標之一是提高此數值至 85% 以上 | ch09 |\n| 睡眠惰性 | sleep inertia | 從深睡（N3）被叫醒後短暫的昏沉感，因皮質功能尚未完全切換到清醒模式所致 | ch02 |\n\n---\n\n## I. CBT-I 與失眠治療\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 認知行為治療失眠 | CBT-I (cognitive behavioral therapy for insomnia) | ACP 2016 臨床指引「強推薦」的成人慢性失眠一線治療，優先於藥物；攻的是失眠的維持因素（錯誤快取關聯），不是只壓症狀 | ch09 |\n| 睡眠限制療法 | sleep restriction therapy | CBT-I 核心技術之一：暫時壓縮在床時間（有時到 5–5.5 小時），讓 S 累積夠高、讓床幾乎等於睡著，重建「床＝睡」的正確條件反射 | ch09 |\n| 刺激控制 | stimulus control | CBT-I 核心技術之一：把床嚴格限定於睡眠用途，移除在床上清醒的活動（滑手機、工作、看電視），清掉「床＝清醒焦慮」的錯誤快取關聯 | ch09 |\n\n---\n\n## J. 社會性時差與時型\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 社會性時差 | social jetlag (SJL) | 休息日與工作日「睡眠中點」的差值（SJL = MSF − MSW），量化生理時鐘偏好與社會作息的錯位程度；與健康的關聯是相關非因果 | ch11 |\n| 時型 | chronotype | 個人的生理時鐘相位偏好，從極早型到極晚型連續分布；由基因、年齡、光照共同決定 | ch11 |\n| 慕尼黑時型問卷 | Munich Chronotype Questionnaire (MCTQ) | 羅內伯格團隊開發的標準化問卷，透過詢問工作日與休息日的睡眠時間計算時型（以 MSF 為指標）與社會性時差 | ch11 |\n| 睡眠中點 | mid-sleep | 某天的入睡時刻與醒來時刻的中間點，MCTQ 用它作為計算時型與社會性時差的核心指標 | ch11 |\n| 輪班工作 | shift work | 社會性時差的極端版本：班表強制 Process C 以外的時段清醒工作，長期造成生理時鐘和社會時間嚴重錯位 | ch11 |\n\n---\n\n## K. 睡眠衛生與科學評估\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 睡眠衛生 | sleep hygiene | 幫助排程器（Process S × C）正常運作的環境與行為條件；目標是「移除干擾」而非「額外增加」維護能力 | ch15 |\n| 藍光 | blue light | 螢幕和 LED 燈主要波長，會延遲褪黑激素分泌；科普常把它列為睡眠殺手，但 Cochrane 2023 系統性回顧指防藍光眼鏡改善睡眠品質的臨床證據極弱 | ch15 |\n| 多相睡眠 | polyphasic sleep | 試圖把夜間一大塊睡眠切碎成多個短睡（如 Uberman）以「省時間」的做法；無科學支持，且 2024 年前瞻研究顯示多數受試者無法耐受、完成者生長激素分泌幾近停止 | ch13 |\n\n---\n\n## L. 特殊睡眠現象\n\n| 中文 | English | 一句話定義（口頭驗收用） | 首次出現 |\n|------|---------|------------------------|---------|\n| 清醒夢 | lucid dreaming | 在客觀確認的 REM 睡眠中保持「我正在做夢」的自我覺察，甚至能執行預先約定的眼動信號，是研究「睡眠中的意識」最硬的實驗工具 | ch14 |\n| 睡眠心智活動 | sleep mentation | 涵蓋 REM 和 NREM 期間所有夢境與類夢境體驗的中性術語，刻意不用「夢」，因為兩者屬性差異極大（REM：70–95% 報告率、生動；NREM：5–50%、偏碎片） | ch14 |\n| 天生短睡 | familial natural short sleep (FNSS) | 傅嫈惠（Fu）團隊發現的極罕見遺傳突變（DEC2、ADRB1 等），攜帶者睡 6 小時左右無損傷——是排程需求本就較短的「特化硬體」，不可推論少睡可習得 | ch13 |\n| DEC2 基因 | DEC2 (BHLHE41) | 2009 年傅嫈惠團隊在 *Science* 發現的第一個 FNSS 基因，點突變（P384R）改變食慾素表現調控，攜帶者平均睡約 6.25 小時無損傷 | ch13 |\n| ADRB1 基因 | ADRB1 | 2019 年傅嫈惠團隊發現的第二個 FNSS 基因（β1 腎上腺素受體），單點突變（A187V）影響睡眠/清醒切換電路，攜帶者睡眠接近 4–6 小時 | ch13 |\n\n---\n\n## M. 被誇大或已被挑戰的宣稱（直覺的陷阱彙整）\n\n| 流行說法 | 狀態 | 正確版（一句話） | 相關章 |\n|---------|------|----------------|--------|\n| 「睡眠就是大腦關機」 | ❌ 根本錯誤 | 睡眠是維護視窗，REM 期皮質活躍接近清醒，N3 期海馬迴在大量 replay | ch01 |\n| 「科學已證明睡眠時大腦會洗掉毒素」 | 🔥 活躍爭議 | 2013 研究說增加；2024 研究說減少；方法學僵持，截至 2026-06 無共識——最高風險宣稱，必須呈現雙方 | ch04 |\n| 「褪黑激素是安眠藥」 | ❌ 錯誤 | 褪黑激素是授時信號（chronobiotic），催眠效果僅縮短入睡約 7 分鐘；真正有效的場合是相位問題（時差、相位延遲） | ch03、ch12 |\n| 「90 分鐘倍數定鬧鐘最科學」 | ⚠️ 把平均當鐵律 | 90 分鐘是平均值，個體與夜間變異大（第一週期常 70–100 分），把平均值硬編進鬧鐘是 off-by-one bug | ch02 |\n| 「人人需要 8 小時睡眠」 | ❌ 錯誤 | NSF 建議是範圍 7–9 小時，不是定點 8 小時；需求因人、年齡而異 | ch08 |\n| 「REM＝做夢期，NREM 不做夢」 | ⚠️ 不精確 | NREM 喚醒也有 33–50% 報告某種心智活動；夢是沿睡眠連續體分布的現象，不是在 REM 才開的開關 | ch06、ch14 |\n| 「致死性家族失眠症（FFI）證明缺睡會直接害死人」 | ❌ 錯誤 | FFI 是普利昂蛋白神經退化病，全腦受損，死於神經退化而非單純缺睡 | ch08 |\n| 「多相睡眠能省下睡眠時間」 | ❌ 無科學支持 | 慢波與 REM 總量大幅壓縮；2024 前瞻研究：多數受試者無法耐受、完成者生長激素幾近停止 | ch13 |\n| 「有天生短睡者，所以少睡可以訓練」 | ❌ 錯誤 | FNSS 是極罕見基因突變，不是習得能力；一般人少睡就是剝奪 | ch13 |\n| 「social jetlag 害健康（因果）」 | ⚠️ 只有相關 | 健康關聯多為相關，難排除「睡得更短、品質更差」作為混淆因子；Roenneberg 本人亦提醒相關非因果 | ch11 |\n| 「Walker《Why We Sleep》的戲劇數字」 | ❌ 多項具名錯誤 | Guzey 2019 逐條查核：致癌加倍、WHO 流行病、睡愈短命愈短、8 小時硬標準等均被指出錯誤或無據 | ch08 |\n\n---\n\n## N. 關鍵人物速查\n\n| 中文譯名 | 原文與背景 | 在本書的角色 | 首次出現 |\n|---------|-----------|------------|---------|\n| 博貝利 | Alexander Borbély（瑞士蘇黎世） | 雙歷程模型（1982）提出者 | ch03 |\n| 伊利夫 | Jeffrey Iliff | 膠淋巴系統（2012）共同提出者 | ch04 |\n| 內德加德 | Maiken Nedergaard（羅徹斯特大學） | 膠淋巴系統（2012–2013）共同提出者，2024 爭議中支持「增加」一方 | ch04 |\n| 法蘭克斯 | Nick Franks（Imperial College London） | 2024 年發表「清除減少」論文，挑戰 2013 膠淋巴結論 | ch04 |\n| 托諾尼 | Giulio Tononi（威斯康辛大學） | 突觸恆定假說 SHY 提出者（2003 起）；名言「睡眠是大腦為可塑性付出的代價」 | ch07 |\n| 奇雷利 | Chiara Cirelli | SHY 共同提出者 | ch07 |\n| 霍爾 | Jeffrey C. Hall | 2017 諾獎得主（與 Rosbash、Young），果蠅 per 基因克隆（1984）與 TTFL 機制（1990）奠基者之一 | ch07 |\n| 羅斯巴什 | Michael Rosbash | 2017 諾獎得主，TTFL 機制（1990）共同提出者 | ch07 |\n| 楊 | Michael W. Young | 2017 諾獎得主，發現果蠅 timeless（tim）基因 | ch07 |\n| 高橋 | Joseph Takahashi | 1997 年在小鼠發現 CLOCK 基因，哺乳類分子時鐘的關鍵發現 | ch07 |\n| 傅嫈惠 | Ying-Hui Fu（UCSF） | 天生短睡基因（DEC2 2009、ADRB1 2019）發現者 | ch13 |\n| 羅內伯格 | Till Roenneberg（慕尼黑 LMU） | 社會性時差（2006）與 MCTQ 問卷提出者 | ch11 |\n| 沃克 | Matthew Walker | 《Why We Sleep》作者；本書的負面教材，其戲劇性數字被 Guzey 具名指錯 | ch08 |\n| 古澤 | Alexey Guzey | 2019 年逐條查核 Walker 書的研究者，是本書「對事不對人、零信任事實觀」的立場來源之一 | ch08 |\n| 蓋爾曼 | Andrew Gelman（哥倫比亞大學） | 跟進 Guzey 查核的統計學者，強調「把相關寫成因果」的科普問題 | ch08 |\n| 克萊特曼 | Nathaniel Kleitman | 1950 年代首次系統記錄 REM 睡眠特徵的睡眠研究先驅，與阿瑟林斯基合作 | ch06 |\n| 阿瑟林斯基 | Eugene Aserinsky | 發現 REM 睡眠眼動與夢報告相關的研究者，打開 REM 研究大門 | ch06 |\n| 賈德納 | Randy Gardner | 1964 年保持 264 小時不睡著的著名個案（非受控研究，僅單一個案） | ch08 |\n\n---\n\n> **驗收提示**：每條可以用「用一句話解釋這個詞，讓另一個工程師聽得懂」來自測。若能順暢把定義講清楚、並點名它在脊椎（清除／鞏固／校準，或排程器 Process S × C）中的位置，即算過關。\n"}, {"id": "appendix-b-key-studies-people", "file": "appendix-b-key-studies-people.md", "group": "附錄", "title": "附錄 B — 關鍵研究與人物速查表", "md": "# 附錄 B — 關鍵研究與人物速查表\n\n> 本附錄從全書各章萃取，供交叉核對用。數字、年份、歸屬以 `_meta/landscape-2026-06.md` 為基準；爭議現況標時點（2026-06）。人物僅列書中實際出現者；研究僅列正文中有明確引述的一手文獻或具名查核文件。讀完某章想確認一個名字或研究歸哪裡，查這裡就對了。\n\n---\n\n## 一、關鍵研究速查\n\n### 說明欄位\n\n- **研究**：作者（年份）＋期刊／來源\n- **核心貢獻或翻案**：一句話說「推翻什麼直覺／留下什麼結論」\n- **狀態**：✅ 穩固共識 ／ ⚠️ 有爭議或侷限 ／ 🔥 活躍前沿爭論 ／ ❌ 已被具名質疑\n- **對應章**：本書哪幾章引用或展開\n\n---\n\n| 研究 | 核心貢獻或翻案 | 狀態 | 對應章 |\n|------|--------------|------|--------|\n| **Borbély（1982）**，\"A two process model of sleep regulation\"，*Human Neurobiology*，1:195–204 | 把睡眠調節拆成 Process S（睡眠壓力）與 Process C（生理時鐘）兩個獨立信號，提出合成排程的數學框架；推翻了「睡眠由單一機制控制」的隱性假設 | ⚠️ 極具影響力的模型，非被測出的物理定律；Borbély 本人 2016／2022 再評估指出未解問題 | ch01、ch03 |\n| **Borbély（2016、2022 reappraisal）**，*Journal of Sleep Research*（2016）、PMC（2022） | 作者自我再評估：分子層次兩歷程難以嚴格分離，REM 在原始模型裡的納入仍粗糙；示範「模型與測量到的機制之間有距離」 | ⚠️ | ch03 |\n| **Iliff & Nedergaard 等（2012）**，*Science Translational Medicine* | 提出膠淋巴系統（glymphatic system）概念：CSF 沿旁血管空間進入腦實質、依賴 AQP4 交換間質液；AQP4 剔除後清除速率下降約 70% | ✅ 機制提出，後續爭議在「睡眠時方向性」而非系統存在本身 | ch01、ch04 |\n| **Xie 等（2013）**，\"Sleep drives metabolite clearance from the adult brain\"，*Science*，342:373–377 | 小鼠自然睡眠／麻醉時腦間質空間擴大約 60%、Aβ 清除加快；是「睡眠洗腦」說法的原始出處，2014 年獲 AAAS Newcomb Cleveland 獎 | 🔥 「清除增加」結論被 Miao 2024 用不同方法直接反駁；方法學爭議截至 2026-06 未解 | ch01、ch02、ch04 |\n| **Miao 等（2024）**，\"Brain clearance is reduced during sleep and anesthesia\"，*Nature Neuroscience* | 用直接注射腦組織的染料追蹤，發現睡眠與麻醉時清除速率**降低**——與 Xie 2013 結論相反；推翻的是「清除增加＝定論」這個假設 | 🔥 Nedergaard 公開反駁（注射法造成膠質瘢痕、「睡眠組」實為剝奪後恢復睡眠）；雙方方法學僵持（2026-06） | ch01、ch04 |\n| **Nedergaard 等（Ding 等，2024–2025）**，\"Norepinephrine-mediated slow vasomotion drives glymphatic clearance during sleep\"，*Cell* | 提出正腎上腺素（norepinephrine）介導的慢血管運動作為睡眠時膠淋巴清除的驅動機制，支持「清除增加」一方 | 🔥 仍是小鼠數據，新機制線索尚待複製（2026-06） | ch04 |\n| **Tononi & Cirelli（2003）**，\"Sleep and synaptic homeostasis: a hypothesis\"，*Brain Res. Bull.*，62:143–150（後續 2006、2014、2020 擴充） | 提出突觸恆定假說（SHY）：清醒時突觸整體淨增強，睡眠（NREM 慢波）時整體降縮（downscaling）以恢復訊噪比；名言「睡眠是大腦為可塑性付出的代價」 | ⚠️ 主流假說但有競爭批評，與 ASC 張力明顯；2024 年回顧指兩者更可能互補而非互斥 | ch01、ch07 |\n| **Tononi & Cirelli（2020）**，\"Sleep and synaptic down-selection\"，*European Journal of Neuroscience* | 把「downscaling」改名「down-selection」，強調選擇性、回應部分批評；SHY 圖像的最新版本 | ⚠️ | ch07 |\n| **Hardin、Hall & Rosbash（1990）**，*Nature* | 在果蠅中正式提出轉錄–轉譯負回饋迴圈（TTFL）機制模型：PER 蛋白夜間累積、抑制自身基因、日間降解、約 24 小時一圈；推翻了「生理時鐘是純神經現象」的舊圖像，確立了分子層級的振盪機制 | ✅ 2017 諾貝爾獎的核心機制（霍爾、羅斯巴什、楊三人共同獲獎） | ch07 |\n| **傅嫈惠（Fu）等（2009）**，*Science*（DEC2 論文） | 在天生短睡家族中找到 DEC2 基因（BHLHE41）點突變（P384R）；突變攜帶者平均睡眠約 6.25 小時且無認知損害；推翻了「天生短睡只是傳說」的假設，確立有基因基礎的真實睡眠需求差異 | ✅ FNSS 第一個基因，極罕見；不可推論「短睡可習得」 | ch01、ch13 |\n| **傅嫈惠（Fu）等（2019）**，UCSF 報告（ADRB1 論文） | 發現 ADRB1 單點突變為第二個天生短睡基因，攜帶者睡眠更短（部分家族接近 4–6 小時） | ✅ 同樣是極罕見突變 | ch13 |\n| **Wittmann & Roenneberg 等（2006）**，\"Social Jetlag: Misalignment of Biological and Social Time\"，*Chronobiology International* | 正式提出社會性時差（social jetlag, SJL）概念並量化：工作日與休息日睡眠中點之差；推翻了「作息不規律只是壞習慣」的道德評判，指向結構性時鐘錯位 | ✅ 概念提出；但健康關聯後來被作者本人提醒「相關非因果」 | ch11 |\n| **Roenneberg 等（2019）**，\"Chronotype and Social Jetlag: A (Self-) Critical Review\"，*Biology* | 提出 SJL 概念的作者自我批判回顧：健康關聯多為相關、吸菸是強混淆因子、大多數研究是橫斷面的——推翻了「SJL 確定害健康」的過度詮釋 | ⚠️ 相關性真實，因果機制截至 2026-06 仍有爭議 | ch11 |\n| **Guzey，Alexey（2019）**，\"Matthew Walker's 'Why We Sleep' Is Riddled with Scientific and Factual Errors\"，guzey.com | 對 Walker《Why We Sleep》的具名逐條查核（光第一章花 130 小時）：指出「致癌風險加倍」無引用、FFI 描述失實、WHO 宣布流行病子虛烏有等多項具體錯誤；示範「零信任事實觀」的查核實踐 | ✅ 查核文件本身是一手文件；Walker 後來在官網做部分回應但多數指控未被推翻 | ch01、ch08、ch09 |\n| **系統性回顧：睡眠時長與癌症（2018）**，BMC Cancer（含 65 研究、1,550,524 人、86,201 癌症病例） | 「短睡與長睡皆未與癌症風險增加相關」；直接反駁 Walker「睡<6–7 小時致癌風險加倍以上」的無引用宣稱 | ✅ 大規模系統性回顧；Walker 的宣稱無對應來源 | ch08 |\n| **Depner 等（2019）**，\"Ad libitum Weekend Recovery Sleep Fails to Prevent Metabolic Dysregulation\"，*Current Biology* | 週末補眠未能逆轉工作週胰島素敏感性下降，且補眠期間睡眠中點大幅位移製造進一步代謝混亂；推翻「週末補眠就能還清睡眠債」的常見迷思 | ⚠️ 有前瞻設計，但樣本規模有限 | ch08、ch11 |\n| **ACP 2016 臨床指引**，\"Management of Chronic Insomnia Disorder in Adults\"，*Annals of Internal Medicine* | CBT-I 獲「強推薦」（strong recommendation）列為成人慢性失眠一線，優先於藥物；推翻了「失眠一定要靠藥物」的預設 | ✅ 官方指引；指引年份 2016，讀者可查 AASM 最新版確認 | ch09、ch12 |\n| **Spielman 等（1987）**，三 P 模型（3P model） | 把失眠機制分為易感因素（predisposing）、誘發因素（precipitating）、持續因素（perpetuating）；推翻了「失眠只是焦慮的副產品」的單因說，提供 CBT-I 的理論基礎 | ✅ 廣泛引用的行為框架，機制細節仍在研究 | ch09 |\n| **系統性回顧：CBT-I 長期療效（2024）**，網絡後設分析（37 項研究） | CBT-I 長期（中位數 24 週）緩解率約 41% vs 藥物 28%；在大多數頭對頭比較中，12 個月追蹤時 CBT-I 顯著優於安眠藥 | ⚠️ 單一後設分析來源，方法學可能有差異 | ch09 |\n| **van der Lande 等（2024）**，\"Sustained polyphasic sleep restriction abolishes human growth hormone release\"，*SLEEP* | 十名志願者嘗試 Uberman 多相睡眠：九人一個月內因無法耐受退出；唯一完成者生長激素分泌下降超過 95%；推翻了「多相睡眠能省睡且無害」的網路宣稱 | ⚠️ 十人的小型前瞻研究，完成者只有一人，方向信號清楚但不宜過度外推 | ch13、ch15 |\n| **Frank（2013）**，\"Why I Am Not SHY: A Reply to Tononi and Cirelli\"，PMC | SHY 最有名的一篇反駁，指出機制定義模糊、術語不一致；從 ASC 張力出發；推翻了「SHY 是無爭議的突觸校準定論」的印象 | ⚠️ 2024 年回顧顯示兩者更可能互補 | ch07 |\n| **Cai 等（2009）**，\"REM, not incubation, improves creativity by priming associative networks\"，*PNAS* | 午睡後進入 REM 的受試者在遠距聯想測驗（RAT）表現更好；初步支持 REM 促進創造力（遠距概念連結）的假說 | ⚠️ 樣本規模偏小；後續複現不一致；效應限於「預先見過的素材」 | ch06 |\n| **van der Helm 等（2011）**，fMRI 研究，*Current Biology*（Walker & van der Helm 2009 Psych. Bull. 框架） | REM 睡眠後杏仁核對情緒刺激的反應降低；支持「隔夜治療」（overnight therapy）假說——REM 把情緒強度與內容解耦 | ⚠️ 效應量不一致，有無法複現的情況；2024 年有研究未能複現（eNeuro 2024） | ch06 |\n| **Bayesian 統合分析（2025）**，*eLife*（SO-SP coupling） | 快紡錘波與慢振盪的耦合強度（SO-SP coupling）能顯著預測隔日記憶保留表現，且在多個子群分析中保持穩健 | ⚠️ 支持三振盪協同假說的人類層面證據，但因果驗證主要仍靠動物（光遺傳學） | ch05 |\n| **系統性回顧：酒精與睡眠（2024）**，*Sleep Medicine Reviews*（27 研究） | 酒精劑量依賴性地抑制前半夜 REM、後半夜產生反彈片段化；推翻「酒精幫助入睡」的常見迷思 | ✅ 系統性回顧，方向一致 | ch12 |\n| **系統性回顧：褪黑激素（多項，代表：Cruz-Sanabria 等 2024，*Journal of Pineal Research*，26 RCT）** | 褪黑激素縮短入睡約 7 分鐘、增加總睡眠約 8 分鐘；高劑量無額外效益且增加隔日昏沉；推翻「褪黑激素是安眠藥」的常見迷思，確立「授時信號（chronobiotic）」定位 | ✅ 系統性回顧 | ch03、ch07、ch12 |\n| **Cochrane 2023 評論**（Singh 等，17 RCT），防藍光眼鏡 | 防藍光眼鏡改善睡眠品質的臨床證據為「很低確定性（very low certainty）」——三項顯示改善、三項無差異；推翻了「防藍光眼鏡顯著改善睡眠」的行銷宣稱 | ⚠️ 「很低確定性」≠「無效」，但不應被翻譯成「有效」（2026-06） | ch15、ch16 |\n| **Charoenthammanon & Gooley（2025）**，*Current Biology*（n=112 青少年） | 青少年的生理時鐘更主要被「社會時間」而非「日照時間」授時；推翻了「青少年晚睡只是光照管理問題」的簡化觀點 | ⚠️ 單一研究，政策效益規模與持久性仍需縱貫研究確認（2026-06） | ch11 |\n| **IARC（2019）**，夜班工作分類為 Group 2A 致癌物 | 夜班工作者（尤其醫護）乳癌風險有系統性流行病學提升；但 Group 2A＝「可能的人類致癌物」（有限人體證據＋充足動物證據），不等於「確定致癌」 | ⚠️ 觀察性研究，混淆因子（飲食、吸菸、社經地位）控制有限（2026-06） | ch11 |\n\n---\n\n## 二、關鍵人物速查\n\n### 說明欄位\n\n- **人物**：中譯（原文，生卒若關鍵）\n- **一句話貢獻**：在本書脈絡的核心貢獻\n- **狀態備注**：書中給的 hedge 或爭議\n- **對應章**\n\n---\n\n| 人物 | 一句話貢獻 | 狀態備注 | 對應章 |\n|------|-----------|---------|--------|\n| **博貝利**（Alexander Borbély，1939–2024）| 1982 年提出雙歷程模型（Process S × Process C），是本書「排程器」脊椎的知識來源；2016／2022 年自我再評估 | 模型是工具而非定律；本人強調分子層次仍有未解之謎 | ch01、ch03 |\n| **伊利夫**（Jeffrey Iliff）| 與內德加德合作，2012 年提出膠淋巴系統（glymphatic system）概念，命名 glia＋lymphatic | 系統存在是有力假說；「清除增加」方向截至 2026-06 仍是爭議 | ch01、ch04 |\n| **內德加德**（Maiken Nedergaard）| 領導膠淋巴研究（2012 機制、2013 睡眠時清除增加），並在 2024 年公開反駁法蘭克斯團隊 | 正反方的同一人：既是建立者，也是活躍論戰的參與者 | ch01、ch04 |\n| **法蘭克斯**（Nick Franks，Imperial College London）| 2024 年領導 Miao 等論文，用直接注射腦組織法得出「睡眠時清除降低」的相反結論，引發活躍方法學論戰 | 方法學爭議未解（2026-06） | ch01、ch04 |\n| **托諾尼**（Giulio Tononi，威斯康辛大學麥迪遜分校）| 2003 年起與奇雷利提出突觸恆定假說（SHY），把睡眠定義為突觸正規化（downscaling）的視窗；名言「睡眠是大腦為可塑性付出的代價」 | SHY 是主流假說，與 ASC 張力明顯但更可能互補（2024 回顧） | ch01、ch07 |\n| **奇雷利**（Chiara Cirelli，威斯康辛大學麥迪遜分校）| 托諾尼的長期合作者，共同建立 SHY；2020 年把「downscaling」改名「down-selection」以強調選擇性 | 同 SHY 條目 | ch07 |\n| **霍爾**（Jeffrey C. Hall，1945–）| 2017 諾貝爾生理醫學獎得主（共三人）；用果蠅分離 *period*（*per*）基因（1984），與 Rosbash 共同在 1990 年提出 TTFL 機制 | 諾獎工作是果蠅；哺乳類 PER/CRY 與 CLOCK/BMAL1 是另一研究脈絡 | ch07 |\n| **羅斯巴什**（Michael Rosbash，1944–）| 2017 諾貝爾生理醫學獎得主；1984 年分離 *per* 基因、1990 年與 Hardin／Hall 提出 TTFL | 同上 | ch07 |\n| **楊**（Michael W. Young，1949–）| 2017 諾貝爾生理醫學獎得主；1994 年發現 *timeless*（*tim*）基因，TIM 與 PER 形成複合體使其進入細胞核，完善了果蠅 TTFL 迴圈 | 同上 | ch07 |\n| **高橋**（Joseph Takahashi）| 1997 年在小鼠中以正向克隆定位法發現 CLOCK 基因，是第一個被找到的哺乳類晝夜節律基因；CLOCK/BMAL1 正向臂的關鍵發現者 | 未與諾獎三人共同獲獎；工作在哺乳類、晚於果蠅研究 | ch07 |\n| **傅嫈惠**（Ying-Hui Fu，加州大學舊金山分校 UCSF）| 發現天生短睡基因：DEC2（2009，*Science*）為第一個，ADRB1（2019）為第二個；截至近年累計約七個 FNSS 相關基因 | 突變極罕見，不可推論「短睡可習得」 | ch01、ch13 |\n| **羅內伯格**（Till Roenneberg，慕尼黑 LMU）| 2006 年提出社會性時差（SJL）概念並建立慕尼黑時型問卷（MCTQ），2019 年自我批判回顧；晝夜節律流行病學的主要推動者 | 自我批判示範：提出者本人說健康關聯是相關非因果 | ch11 |\n| **沃克**（Matthew Walker，加州大學柏克萊分校）| 《Why We Sleep》（2017）作者；在本書是「暢銷科普如何把不確定寫成定論」的負面教材對象；書中「致癌加倍」「FFI 缺睡而死」等數字被 Guzey 2019 具名指為無據或有誤 | 睡眠確實重要（這一點沒有疑問），但具體戲劇數字站不住腳；本書對事不對人 | ch01、ch06（overnight therapy 的系統化提出者，此身份另論）、ch08、ch09 |\n| **古澤**（Alexey Guzey）| 2019 年發表長文逐條查核 Walker《Why We Sleep》（光第一章花 130 小時），引發學界討論；是本書零信任事實觀的查核示範人物 | 查核文件本身就是可引用的一手查核記錄 | ch01、ch04、ch08 |\n| **蓋爾曼**（Andrew Gelman，哥倫比亞大學）| 2019 年在自己部落格跟進古澤的查核，從統計學角度指出 Walker 的問題（如把 U 形睡眠–死亡率關係寫成單調遞減） | 統計批評角度的獨立跟進 | ch01、ch08 |\n| **賈德納**（Randy Gardner，1946–）| 1964 年 1 月以高中生身份保持清醒 264 小時又 25 分鐘，由史丹福 William Dement 現場記錄，是最常被引用的急性睡眠剝奪著名個案 | 這是軼事／單一個案、非受控研究；金氏世界紀錄已停止認證此類嘗試；不能從中外推慢性輕度剝奪的長期健康影響 | ch08 |\n| **西格爾**（Jerome Siegel）| 睡眠演化研究者，指出某些海洋哺乳類（海豚、某些海豹）的 REM 證據薄弱，提醒「所有動物都睡覺」這個強宣稱需保留餘地 | 邊界案例的提醒，不推翻「睡眠剝奪代價跨物種一致」的核心觀察 | ch01 |\n| **斯皮爾曼**（Arthur Spielman，1944–2013）| 1987 年提出三 P 模型（易感／誘發／持續因素），是 CBT-I 的行為理論基礎；推翻了「慢性失眠只有單一觸發原因」的簡化觀點 | 框架廣泛引用，機制細節仍在研究 | ch09 |\n\n---\n\n## 三、速查：本書的「迷思正解」對照（人物與研究的交匯點）\n\n| 常見科普迷思 | 最相關的研究或人物 | 本書正確版 |\n|------------|-------------------|-----------|\n| 「睡眠洗腦已被 Xie 2013 的《Science》論文證實」 | Xie 2013 vs Miao 2024（Franks 團隊） | 這是仍在爭論的前沿假說，雙方方法學僵持（2026-06） |\n| 「Walker 說睡<6-7 小時致癌風險加倍」 | Guzey 2019 查核；2018 系統性回顧（155 萬人） | 無引用支持的宣稱；大規模回顧未見此關聯 |\n| 「FFI 證明缺睡會直接害死人」 | Guzey 2019；landscape §9 | FFI 是普利昂蛋白神經退化病，死於全腦退化非單純缺睡 |\n| 「SHY 和 ASC 互相矛盾、只能一個對」 | Tononi & Cirelli（SHY）vs ASC 主流框架；Frank 2013 | 2024 年回顧指兩者更可能在不同尺度互補並存 |\n| 「2017 諾獎發現了人體生理時鐘的 PER 和 CRY 基因」 | 霍爾、羅斯巴什、楊（果蠅 per/tim）；高橋（CLOCK） | 諾獎核心是果蠅 per/TIM；哺乳類 PER/CRY 與 CLOCK 是另一研究脈絡，CLOCK 是高橋 1997 發現的 |\n| 「褪黑激素是安眠藥」 | Cruz-Sanabria 等 2024；多項系統性回顧 | 褪黑激素是授時信號（chronobiotic），催眠效果約縮短入睡 7 分鐘 |\n| 「多相睡眠省睡且無害」 | van der Lande 等（SLEEP 2024）；NSF 立場 | 十人九人退出；完成者生長激素降超過 95%；無科學支持 |\n| 「週末補眠就能還清睡眠債」 | Depner 等（2019，*Current Biology*） | 補眠未能逆轉代謝損害，且睡眠中點大幅位移進一步擾亂 Process C |\n| 「防藍光眼鏡顯著改善睡眠」 | Cochrane 2023（Singh 等，17 RCT） | 「很低確定性」：三項顯示改善、三項無差異，結論不清楚（2026-06） |\n| 「天生短睡基因說明短睡可習得」 | 傅嫈惠團隊（DEC2 2009、ADRB1 2019） | FNSS 是極罕見的基因突變（真實需求更低），與一般人強行壓縮睡眠是兩回事 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> 本附錄從各章「## 延伸閱讀」段萃取，以 landscape（`_meta/landscape-2026-06.md`）驗證過的來源為優先。標「（未驗證）」者請自行確認連結有效性後再引用。連結未經二次確認的一律不放——沒有把握，就誠實標注。\n>\n> 閱讀路線三條：**路線一「機制」**（想看更深的科學細節）→ **路線二「爭議與零信任」**（想追本書最重要的反迷思素材）→ **路線三「實踐證據」**（想查官方指引與循證建議）。\n\n---\n\n## 如果只看三樣\n\n| 優先序 | 資源 | 一句話理由 |\n|-------|------|-----------|\n| 1 | **Guzey（古澤），\"Matthew Walker's 'Why We Sleep' Is Riddled with Scientific and Factual Errors\"（2019）** — https://guzey.com/books/why-we-sleep/ | 零信任事實觀的最佳示範教材：把暢銷書的每個戲劇性宣稱找回原始引用（或發現根本沒有引用），光第一章就花 130 小時。讀前兩節即可感受「事實查核」真正的規格是什麼。（landscape 已驗證） |\n| 2 | **The Transmitter，\"New method reignites controversy over brain clearance during sleep\"（2024）** — https://www.thetransmitter.org/glymphatic-system/new-method-reignites-controversy-over-brain-clearance-during-sleep/ | 膠淋巴爭議（全書最高風險活躍前沿）的最佳入口：對 2013 建立方與 2024 反駁方都有採訪，把方法學分歧說清楚。讀完再去讀兩篇原始論文。（landscape 已驗證） |\n| 3 | **Borbély 2022 reappraisal（PMC）** — https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9540767/ | 雙歷程模型的發明者本人在 40 年後的再評估，親自說出框架的限制和未解問題。示範「科學家如何誠實地對自己的理論再評估」——這正是本書脊椎「排程器」隱喻的誠實版本。（landscape 已驗證） |\n\n---\n\n## 路線一：往機制\n\n### 1-A 雙歷程模型（脊椎排程器）\n\n| 資源 | 出處章節 | 狀態 | 閱讀建議 |\n|------|---------|------|---------|\n| Borbély A.A., \"A two process model of sleep regulation,\" *Human Neurobiology*, 1982, 1:195–204 | ch01、ch03 | landscape 已驗證（論文真實） | 一手史料，理解「模型」和「測量到的機制」的差距，以及 1982 年語言與現在科普版的差距 |\n| Borbély 2022 reappraisal（PMC）— https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9540767/ | ch01、ch02、ch03、ch07、ch16 | landscape 已驗證 | 讀第 3–5 節：作者自己說框架的限制和未解問題 |\n| Borbély 1982 原始模型概覽（PDF）— https://cdn2.hubspot.net/hubfs/6674255/Two-Process-Model-Sleep-Regulation.pdf | ch03 | landscape 已驗證（含在 landscape §1） | 如果想看原始主張是什麼措辭，從這裡進 |\n| Treatise on an alternative perspective on the two-process model, *npj Biological Timing and Sleep*, 2025 — https://www.nature.com/articles/s44323-025-00038-0 | ch03 | 未驗證（paywall 可能） | 進階用：討論若 REM 能更優雅納入原始框架需要哪些前提調整 |\n| Sleep homeostasis and the circadian clock（PMC，FD 實驗背景）— https://pmc.ncbi.nlm.nih.gov/articles/PMC6584681/ | ch03 | landscape 可信度高（PMC） | 說明「強迫去同步（forced desynchrony）」如何把 Process S 與 C 拆開量化 |\n\n### 1-B 睡眠分期與 hypnogram\n\n| 資源 | 出處章節 | 狀態 | 閱讀建議 |\n|------|---------|------|---------|\n| Sleep Foundation「Stages of Sleep」— https://www.sleepfoundation.org/stages-of-sleep | ch01、ch02、ch09 | landscape 已驗證 | 清楚的 N1/N2/N3/REM 科普，先看 hypnogram 示意圖，對照 ch02 的時序追蹤 |\n| StatPearls「Physiology, Sleep Stages」（NCBI Bookshelf）— https://www.ncbi.nlm.nih.gov/books/NBK526132/ | ch02 | landscape 可信度高（NCBI 機構） | 比科普深一層，有各階段百分比、EEG 波形、臨床意義 |\n| Harvard Division of Sleep Medicine「Natural Patterns of Sleep」— https://healthysleep.med.harvard.edu/healthy/science/what/sleep-patterns-rem-nrem | ch02 | landscape 可信，頁面可用性請自行確認 | hypnogram 結構與 REM/NREM 互動，哈佛睡眠醫學教育資源 |\n\n### 1-C 膠淋巴系統與清除爭議（🔥 全書最高風險活躍前沿）\n\n| 資源 | 出處章節 | 狀態 | 閱讀建議 |\n|------|---------|------|---------|\n| Xie et al., *Science*, 2013, 342:373–377 — https://www.science.org/doi/abs/10.1126/science.1241224 | ch01、ch02、ch04、ch16 | landscape 已驗證 | 「睡眠洗腦」說法的原始出處；讀 Methods 了解 TMA 擴散量測設計——這讓你理解為何換方法會得相反結論。注意：「清除增加」結論截至 2026-06 仍是活躍爭議 |\n| Iliff & Nedergaard, *Science Translational Medicine*, 2012 — https://www.science.org/doi/10.1126/scitranslmed.3003748 | ch04 | landscape 已驗證 | 膠淋巴系統概念的起點，讀它了解「膠淋巴」如何被定義、AQP4 的原始角色 |\n| Miao et al., *Nature Neuroscience*, 2024（含 Author Correction）— https://www.nature.com/articles/s41593-024-01638-y | ch01、ch04、ch16 | landscape 已驗證 | 反駁方論文；讀 Methods 對比 2013 的設計差異，感受方法學如何導致相反結論 |\n| Nedergaard 團隊 bioRxiv 反駁（2024），\"Glymphatic clearance is enhanced during sleep\" — https://www.biorxiv.org/content/10.1101/2024.08.24.609514v1 | ch04 | landscape 已驗證（位在 §4） | 讀完 Miao 後看這篇，拿到另一半的爭論邏輯 |\n| Ding et al., *Cell*, 2024（正腎上腺素驅動慢血管運動機制）— https://www.
