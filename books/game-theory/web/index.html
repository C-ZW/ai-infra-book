個經典模型：\n\n- **Cournot 競爭**：廠商各自選**產量**，市場價格由總產量決定。納許均衡裡，每家產量比「合謀壟斷」多、比「完全競爭」少——又是個 (背叛,背叛) 式的困境：廠商若能合謀減產（合作）大家都賺更多，但每家都有偷偷增產（背叛）的誘惑，於是落在競爭性的均衡。\n- **Bertrand 競爭**：廠商各自選**價格**，消費者全去買便宜的。反直覺的結果是——只要產品同質、邊際成本相同，**兩家就足以把價格壓到成本價**（誰標高一分錢就賣不出去），利潤歸零。這叫 Bertrand 悖論。\n\n兩者我都點到為止（深入指向延伸閱讀的賽局經濟學教材）。要記住的只有一句：**寡占競爭又是脊椎困境的變體**——廠商集體減產/抬價對它們最好（集體最優 (3,3)），但個體偷跑的誘惑（5>3）把它們推回競爭均衡。市場競爭之所以對消費者有利，部分正是因為廠商困在這個它們自己也不想要的囚徒困境裡。這是脊椎張力少見的「困境反而對第三方（消費者）有利」的版本——個體理性 vs 集體（廠商）理性的裂縫，恰好是消費者的福利。\n\n## 電腦科學：無政府狀態的代價（worked example）\n\n現在進本章的硬核——也是離你最近的應用。電腦科學家從 1990 年代末開始，把賽局理論正式搬進演算法，形成**演算法賽局理論（algorithmic game theory）**。其中最漂亮的概念，就是前面預告過的**無政府狀態的代價（price of anarchy, PoA）**。\n\n定義很乾淨：\n\n```text\n                  最糟的納許均衡之下的「社會成本」\n   PoA  =  ────────────────────────────────────────\n                  全知排程器強制協調的「社會最優成本」\n\n   PoA = 1   ：自私沒有代價，均衡剛好就是最優（少見的好事）\n   PoA = 4/3 ：自私讓整體變糟 33%（下面就會算出這個數）\n   PoA 越大  ：自私的代價越高、越需要集中協調\n```\n\n「price of anarchy」這個名字是 Koutsoupias 與 Papadimitriou 於 **1999** 年提出的（他們原本叫它 coordination ratio，後來 Papadimitriou 改的這個更傳神的名字流行起來）；自私路由的緊密界限由 Roughgarden 與 Tardos 等人於 **2002** 年做出來。它把 ch01 那條中央張力——個體理性 vs 集體理性——變成一個**可以測量的數字**。我認為這是本書工具在電腦科學裡最美的一次落地：它沒有否認自私均衡會發生，而是去問「它到底糟多少」。\n\n### Worked example：Pigou 例子，手算 PoA = 4/3\n\n最小、最經典的例子來自經濟學家 Pigou（1920，比賽局理論還老）。場景：一大群司機（總量正規化成 **1**，想成 1 單位的連續流量、或一百萬個小封包）要從 A 走到 B，有兩條路。\n\n```text\n              ┌──────  上路：延遲固定 = 1（不管多少人走）  ──────┐\n        A ────┤                                                 ├──── B\n              └──────  下路：延遲 = x（x = 走下路的流量比例） ──┘\n\n  上路：寬到塞不爆，永遠 1 單位時間。\n  下路：會塞——走的人越多越慢，延遲恰等於它承載的流量比例 x（0≤x≤1）。\n```\n\n**先問社會最優**：一個全知排程器想最小化「所有司機的平均延遲」。設下路流量 x、上路流量 1−x，平均延遲：\n\n```text\n  社會成本 C(x) = (1−x)·1   +   x·x\n                  └上路人數┘   └下路人數×下路延遲┘\n               = 1 − x + x²\n\n  求最小：對 x 微分  d/dx (1 − x + x²) = −1 + 2x = 0  →  x = 1/2\n  （二階 2>0，是極小）\n\n  C(1/2) = 1 − 1/2 + (1/2)²\n         = 1 − 0.5 + 0.25\n         = 0.75   ＝ 3/4   ← 社會最優平均延遲\n```\n\n排程器把一半流量塞下路、一半留上路，平均延遲 **3/4**。自我複核：x=0 全走上路 C=1；x=1 全走下路 C=1；x=1/2 給 0.75，確實是中間最低。✓\n\n**再問自私均衡（納許均衡）**：沒有排程器，每個司機只問「**我**走哪條更快」。關鍵：下路延遲 = x ≤ 1 = 上路延遲，**對任何 x≤1，下路都不比上路慢**。所以每個自私司機都選下路——直到下路也擠滿。均衡在 **x=1**（全員下路）：此時下路延遲 = 1，跟上路打平，沒人有動機換路（換到上路也是 1，不會更快）。這是納許均衡：\n\n```text\n  自私均衡：x=1，全部走下路。\n  每個司機的延遲 = 1（下路滿載）。\n\n  社會成本 C(1) = (1−1)·1 + 1·1 = 0 + 1 = 1   ← 自私均衡平均延遲\n\n  檢查它是均衡：任一司機若改走上路，延遲還是 1（不變），\n  沒有人能「單方面變更快」→ 確實是納許均衡。✓\n```\n\n**算 PoA**：\n\n```text\n            自私均衡成本      C(1)        1\n   PoA  =  ──────────────  =  ─────  =  ──────  =  4/3  ≈ 1.33\n            社會最優成本      C(1/2)     3/4\n```\n\n**結論：自私路由讓整體延遲比最優糟了 4/3（多 33%）。** 而且請注意這個荒謬之處——在自私均衡裡，那條「固定 1 單位」的上路**完全沒人用**，所有人擠在下路把它塞到延遲也變成 1。如果有人肯犧牲自己、改走上路，他自己的延遲不變（還是 1），但會替留在下路的所有人**降低**延遲（下路 x 變小、變快）。沒有自私個體願意做這件對集體有益、對自己無益的事——**這就是 ch01 那條裂縫，被換算成了 4/3 這個數字。**\n\n這對你不是抽象寓言。你的負載平衡若是「每個 client 各自挑延遲最低的 backend」，理論上就可能落在這種 PoA>1 的壞均衡裡——大家擠向「現在看起來最快」的節點，把它打慢，而閒置節點沒人敢用。對策（加權隨機分流、集中式的全域排程、收「壅塞費」改報酬）本質上都是 ch13 的機制設計：**改報酬，讓自私選擇剛好導向社會最優**——把 PoA 從 4/3 拉回 1。\n\n> 嚴謹度誠實標示：PoA = 4/3 是「線性延遲函數、非原子流量」這個乾淨設定下的精確值（Pigou 例，且這個 4/3 也正是線性延遲下 PoA 的最壞情況上界）。換成非線性延遲、離散玩家，數字會變。這是個**有明確前提的定量結果**，不是「自私永遠糟 33%」的萬用常數。\n\n## 日常生活：站起來看球賽、塞車匯流\n\n賽局理論最容易讓人「啊我懂了」的，往往是日常小事。挑兩個。\n\n**體育場站起來看球。** 為了看得更清楚，你站起來——這是個體理性。但你一站，後面的人被擋住，他也得站，一排排傳下去，最後**全場都站著、看到的跟全場都坐著時一模一樣**，只是大家腿更酸。這是純粹的脊椎困境：\n\n```text\n這又是 ch01 的結構（你 vs 「其他所有人」的簡化 2 人版）：\n                    其他人：坐(C)        其他人：站(D)\n    你：坐(C)        (3, 3) 都舒服看      (0, 5) 你被擋、別人爽\n    你：站(D)        (5, 0) 你爽、別人被擋 (1, 1) 都站、都累、視野如初\n\n  「站起來」是優勢策略（別人坐我站看得更好、別人站我不站就被擋）\n  → 全場都站 = (1,1)，明明全場都坐 (3,3) 更舒服。困境。\n```\n\n救援機制你也熟：規範（大家默契坐著）、權威（工作人員喊「請坐下」＝ ch13 的外部執法者改報酬）。\n\n**塞車匯流（zipper merge）。** 兩線併一線，「該乖乖排隊還是衝到最前面插隊」——又是困境：每個人插隊是個體理性，全員都搶插隊則整段路癱瘓。解法（拉鍊式交替匯流的規則、執法）同樣是機制設計。\n\n這些例子的價值不在深刻，在於**它們讓你親手確認脊椎那張矩陣真的無所不在**——從囚犯到國家到球迷，同一個 T>R>P>S 的結構在反覆出現。但也正是這種「到處都看得到」的爽感，藏著本章最後要拆的那個陷阱。\n\n## 誠實一節：賽局理論的邊界在哪\n\n前面六節是慶祝，這節是踩煞車——而我認為這節比前面都重要。\n\n賽局理論強大到危險：它的詞彙（「這是場零和賽局」「他在背叛」「這是納許均衡」）太好用，好用到你會忍不住把它套到一切上。但一個模型套得上不代表它說了什麼。三個必須守住的邊界：\n\n**邊界一：報酬矩陣的數字從哪來？** 這是全章、甚至全書最尖銳的問題。前面所有分析都從「一張給定的報酬矩陣」出發——可是現實裡，**那些數字是你自己填進去的**。軍備競賽矩陣裡，(擴軍,裁軍)=(5,0) 這個「5」憑什麼？古巴飛彈危機裡，「核戰」對甘迺迪的報酬到底是多少？一旦你能自由調報酬，你幾乎能讓任何結局變成「均衡」——於是「這是納許均衡」就從一個預測退化成一個事後的故事。**賽局理論的結論有多硬，取決於那張矩陣有多硬；而現實裡矩陣往往是軟的、是分析者塞進去的。** 這是 ch12 那一章的延伸（人會把公平、面子算進報酬，矩陣外的東西進了矩陣），放大到整個應用層面。\n\n**邊界二：人不是同質的理性玩家。** ch12 已經拆過——真人會為公平拒絕白拿的錢、會有情緒、會算錯、會在乎面子。把所有人當成同一個「完全理性、只認報酬」的玩家，是個方便但常常失真的假設。ESS（ch09）部分繞過了這點（用天擇取代理性），但一搬回人類社會，「玩家都會做最佳反應」這個前提就得打折。\n\n**邊界三：隱喻濫用——「凡事都是賽局」是過度推論。** 這是最常見、最該警覺的坑。賽局理論的詞彙會誘惑你把每個衝突都講成「一場賽局」，但很多情境根本缺乏賽局的要件：玩家是誰不清楚、選項集不明確、報酬無法定義、甚至沒有「策略互動」（一方根本不會對另一方反應）。古巴飛彈危機就是個活例——套得上 chicken 的外殼，但核心機制（校準威脅逼對方轉向）查無實據。**「這是一場賽局」必須是個能被證偽的主張（玩家、策略、報酬都指得出來、能對照現實），不能只是一個讓你顯得聰明的修辭。**\n\n怎麼自我檢查？問三句話：**玩家是誰、能指名嗎？策略集是什麼、有限可列嗎？報酬是什麼、不是我事後硬填的嗎？** 三個都答得乾脆，賽局分析才站得住；任何一個含糊，你手上多半只是個比喻，而比喻不證明任何事。\n\n這節碰中央張力的方式很特別：**賽局理論最大的貢獻，恰恰是誠實地告訴你「個體理性與集體理性會分裂」這件事真實存在、且常常無法靠『大家再聰明一點』解決**（要靠重複、聲譽、演化、機制設計去結構性地救）。但它最大的危險，是讓你以為**只要套上賽局的語言、世界就被解釋了**。守住前者的洞見、警惕後者的傲慢——這是把這套工具用好的關鍵。\n\n## 直覺的陷阱\n\n| 陷阱 | 錯誤直覺 | 哪一步帶你下溝 | 正確版 / 自我察覺 |\n|---|---|---|---|\n| **「凡事都是一場賽局」** | 任何衝突／互動都能、也都該用賽局理論分析 | 看到「有人對立」就直接套納許均衡、零和、背叛這些詞，跳過「玩家是誰、策略集、報酬從哪來」的查核 | 賽局要件齊全（可指名的玩家、可列的策略、非事後硬填的報酬、真有策略互動）才算賽局。問自己三句話：玩家是誰？策略集？報酬從哪來？任一含糊就只是比喻。 |\n| **報酬矩陣是客觀給定的** | 矩陣裡的數字是事實、分析從它出發很硬 | 忘了那些數字是**你填的**；一旦能自由調報酬，幾乎任何結局都能說成「均衡」，預測退化成事後故事 | 結論的硬度＝矩陣的硬度。現實矩陣常是軟的、分析者塞的。先質問報酬從哪來，再信均衡。 |\n| **古巴飛彈危機「就是」一局 chicken** | 賽局理論漂亮地預測／解釋了歷史大事 | 拿模型的外殼（對撞、誰先轉向）去套，忽略核心機制（校準威脅逼對方轉）查無實據、且雙方其實都讓步了（土耳其飛彈） | chicken 是個有啟發但會誤導的簡化、一個被反覆辯論的比喻；不是「理論成功預測歷史」。應用要標前提、別吹成預測。 |\n| **PoA 是個萬用常數 4/3** | 「自私路由永遠糟 33%」 | 把 Pigou 例（線性延遲、非原子流量）的乾淨數字當成普世定律 | 4/3 是**特定前提**下的精確值（也是線性延遲的最壞上界）；換非線性延遲／離散玩家就變。定量結果一定綁前提。 |\n| **性別比 1:1 是「對族群最好」** | 1:1 因為它讓族群繁衍最大化 | 用「物種延續」的集體視角想，而非「基因的個體最佳化」 | 1:1 是頻率依賴的 ESS（稀少性別占便宜直到無差異），偏雌其實對族群總繁殖力更高——又是個體 vs 集體裂縫。且依賴隨機交配假設（Hamilton 的偏雌反例）。 |\n\n具名主陷阱是第一個——**「凡事都是一場賽局」的隱喻濫用**。它最危險，因為它偽裝成洞見：套上賽局語言會讓你顯得看穿了本質，但若玩家、策略、報酬指不出來，你只是換了套詞彙重述了「有人在競爭」這個誰都知道的事實。徵兆是：你能流暢地用賽局術語描述一個情境，卻**算不出任何均衡、也驗證不了報酬**——這時你手上是修辭，不是分析。\n\n## 紙上推演\n\n### 推演題一（★★，**[20 分鐘]**）：把日常情境寫成賽局並找均衡\n\n選「體育場站起來看球」這個情境，簡化成兩個玩家（「你」與「代表其他所有人的對手」），各有「坐」與「站」兩策略。請你：(a) 填出 2×2 報酬矩陣（用脊椎的 5/3/1/0 慣例，越大越好）；(b) 找出優勢策略與唯一純策略納許均衡；(c) 指出集體最優格、說明它為什麼不是均衡；(d) 提一個能把均衡推回集體最優的機制設計手段。\n\n#### 推演解答\n\n(a) 報酬矩陣（「站起來看得更清楚」是好處、「被擋」是壞處、「腿酸」讓全站比全坐差）：\n\n```text\n                    其他人：坐(C)        其他人：站(D)\n    你：坐(C)        (3, 3)              (0, 5)\n    你：站(D)        (5, 0)              (1, 1)\n\n  你坐他坐：都舒服看        = (R,R) = (3,3)  集體最優\n  你坐他站：你被擋、他爽    = (S,T) = (0,5)\n  你站他坐：你爽、他被擋    = (T,S) = (5,0)\n  你站他站：都累、視野如初  = (P,P) = (1,1)\n```\n\n(b) **最佳反應逐欄檢查**：對方坐(C) 時，你站(5)>坐(3) → 站較好；對方站(D) 時，你站(1)>坐(0) → 站較好。**站是嚴格優勢策略**（兩欄都嚴格更好）。對稱地對方也是。兩人都用優勢策略 → **唯一純策略納許均衡 (站,站)=(1,1)**。\n\n(c) 集體最優是 **(坐,坐)=(3,3)**（兩人報酬和 6，最高）。它不是均衡，因為任一方在對方坐著時，單方面改成站可從 3→5 得益（誘惑 T=5>R=3）——所以 (坐,坐) 不穩定，一站就崩。\n\n(d) 機制設計手段：引入**外部執法者改報酬**——工作人員規定「不准站、違者勸離」，等於給「站」加一個懲罰（比如 −4），把 (站,*) 的報酬壓到比坐更差，於是「坐」變成優勢策略、(坐,坐) 成為新均衡。這正是 ch13 救困境的同一招（改報酬把集體最優變成納許均衡）。\n\n**常見錯路**：把這題當零和——它**不是**零和（(坐,坐) 兩人都得 3，雙贏存在；零和不可能雙贏）。會誤判成零和，是因為「我站他被擋」那兩格看起來像此消彼長，但對角線兩格（都坐 vs 都站）證明了存在共同利益可損，所以是非零和的困境（呼應 ch04 T4）。\n\n### 推演題二（★★★，**[25 分鐘]**）：重算一個 Pigou 變體的 price of anarchy\n\n把 worked example 的下路延遲從 x 改成 **x²**（更陡的壅塞：人多時更快惡化），上路仍固定 1。總流量 1。請你：(a) 算社會最優流量分配與平均延遲；(b) 算自私均衡的流量分配與平均延遲；(c) 算 PoA。一步步算、自我複核。\n\n#### 推演解答\n\n設下路流量 x、上路 1−x。下路延遲 = x²，上路延遲 = 1。\n\n(a) **社會最優**：最小化平均延遲\n\n```text\n  C(x) = (1−x)·1 + x·x² = 1 − x + x³\n  d/dx = −1 + 3x²  = 0  →  x² = 1/3  →  x = 1/√3 ≈ 0.5774\n  （二階 6x>0，極小）\n\n  C(x*) = 1 − x* + x*³，其中 x*=1/√3、x*³ = (1/√3)³ = 1/(3√3)\n        = 1 − 1/√3 + 1/(3√3)\n  把 1/√3 = 3/(3√3) 代入統一分母：\n        = 1 − 3/(3√3) + 1/(3√3) = 1 − 2/(3√3)\n  數值：3√3 ≈ 5.196 → 2/5.196 ≈ 0.3849\n        C(x*) ≈ 1 − 0.3849 = 0.6151   ← 社會最優平均延遲\n```\n\n(b) **自私均衡**：每個司機選對自己更快的路。下路延遲 x²，當 x²<1（即 x<1）時下路更快，於是司機湧入下路，直到 x²=1 才打平 → **x=1，全員下路**。\n\n```text\n  自私均衡 x=1：下路延遲 = 1² = 1，與上路打平，無人想換 → 是納許均衡。\n  C(1) = (1−1)·1 + 1·1² = 1   ← 自私均衡平均延遲\n```\n\n(c) **PoA**：\n\n```text\n            C(1)        1\n   PoA  =  ────────  ≈  ──────  ≈  1.626\n            C(x*)       0.6151\n```\n\n**結論**：下路壅塞函數變陡（x→x²）後，PoA 從 4/3≈1.33 升到約 **1.63**——自私的代價更高了。直覺：壅塞越陡，「全擠一條路」浪費越嚴重，集中協調的價值越大。\n\n**自我複核**：x=1 時 C=1；x=0 時 C=1；最低點在 x≈0.577 給 0.615，介於中間且小於兩端 ✓。PoA>1（自私確實比最優差）✓。比線性版的 4/3 大 ✓（更陡的壅塞合理地放大代價）。**常見錯路**：把社會最優誤算成 x=1/2（那是線性版 x 的最優、不是 x² 版的）——換了延遲函數就得重微分，不能套舊答案（正是直覺陷阱表第四列：PoA 綁前提）。\n\n### 推演題三（★★，**[15 分鐘]**）：抓出一個「賽局理論隱喻被濫用」的例子\n\n請構造（或回想）一個你聽過的「把某情境講成一場賽局」的說法，並用本章的三句檢查（玩家是誰？策略集？報酬從哪來？）論證它哪裡過度延伸、其實只是比喻。\n\n#### 推演解答\n\n範例說法：**「找工作就是一場你跟所有其他求職者的零和賽局——你拿到這個 offer，別人就拿不到。」**\n\n三句檢查：\n\n```text\n  玩家是誰？        含糊。「所有其他求職者」不是一個會對你反應的對手——\n                    多數求職者根本不知道你存在、不會因你的選擇調整策略。\n                    缺「策略互動」這個賽局要件。\n\n  策略集是什麼？    模糊。你的「策略」是什麼？投幾份履歷？要不要說謊？\n                    沒有清楚可列的策略集，就無法定義最佳反應、無法找均衡。\n\n  報酬從哪來？      事後硬填。「你拿到別人就拿不到」假設了職缺數固定、\n                    且你跟對方在搶同一個——但勞動市場不是固定大餅\n                    （新職缺一直開、你跟對方多半不在搶同一個位子）。\n                    把它說成零和，是把一個非零和的世界硬塞進零和框架。\n```\n\n**結論**：「找工作是零和賽局」三句檢查全不及格——玩家不真互動、策略集不明、報酬是把非零和硬講成零和。它是個**讓焦慮顯得有理論依據的比喻**，不是賽局分析。正確的態度：求職更接近一個有大量參與者、職缺非固定、資訊不對稱（ch11）的搜尋過程，**不是**兩人零和對抗。**常見錯路**：以為「只要能用賽局詞彙描述，就算是賽局應用」——能描述 ≠ 能分析；分析的門檻是算得出均衡、驗得了報酬。\n\n## 自我檢核\n\n口頭回答，講得出來才算過關（優先答「為什麼」）：\n\n1. price of anarchy 在量化什麼？它跟全書中央張力（個體理性 vs 集體理性）是什麼關係？為什麼說它把那條裂縫「變成一個可測量的數字」？\n2. 在 Pigou 例的自私均衡裡，那條固定延遲 1 的上路完全沒人用——為什麼沒有任何自私司機願意去走它，即使這對集體有益？\n3. 為什麼性別比趨近 1:1 不是「因為它對族群最好」？這跟混合策略均衡「讓對手無差異」的邏輯是同一套嗎？哪裡相同？\n4. 軍備競賽為什麼是囚徒困境（指出誰是玩家、什麼是合作/背叛、優勢策略是什麼）？而古巴飛彈危機為什麼**不該**被簡單講成「一局 chicken」——學界的兩個具體批評是什麼？\n5. 本章說「報酬矩陣的數字從哪來」是全書最尖銳的問題——為什麼？如果報酬可以自由填，「這是納許均衡」這句話會出什麼問題？\n6. 判斷「某情境是不是賽局」的三句檢查是什麼？拿「找工作是零和賽局」套一遍，它在哪一句翻車？\n7. 寡占競爭（Cournot/Bertrand）跟脊椎困境是同構的——廠商困在一個它們自己也不想要的均衡裡，這對消費者反而是好事。為什麼？這是中央張力的哪一種變體？\n8. 賽局理論「最大的貢獻」與「最大的危險」各是什麼？為什麼說守住前者、警惕後者，是把這套工具用好的關鍵？\n\n## 延伸閱讀\n\n- **Tim Roughgarden,《Selfish Routing and the Price of Anarchy》(MIT Press)** — 自私路由與 PoA 的標準專著；想把本章 Pigou 例之外的一般界（線性延遲 PoA 上界 4/3 的證明、非線性情形）看清楚，從這裡入手。演算法賽局理論的入門經典。\n- **Wikipedia「Price of anarchy」與「Pigou's example」** — 快速複習 PoA 定義與 Koutsoupias–Papadimitriou 1999 的來歷、Pigou 例的標準推導，對齊本章 worked example。\n- **Wikipedia「Fisher's principle」** — 費雪 1:1 性別比論證的標準陳述，含 Hamilton 對「局部交配 → 偏雌」的修正；想確認本章「隨機交配假設」hedge 的出處看這條。\n- **Stanford Encyclopedia of Philosophy「Prisoner's Dilemma」** — 把軍備競賽、寡占、共有財都收進「囚徒困境的應用」一節討論，是檢驗「哪些應用站得住、哪些是過度延伸」的好對照（與本章誠實一節同調）。\n- **Avinash Dixit, David McAdams & Susan Skeath,「The Cuban Missile Crisis as a Dynamic Chicken Game」(SSRN)** — 想看「古巴飛彈危機 = chicken」這個比喻被認真辯論（既用它又修正它）的代表作；正是本章「應用要標前提、別吹成預測」的活教材。讀它與批評它的文獻一起看最有收穫。\n- **Noam Nisan et al.（編）,《Algorithmic Game Theory》(Cambridge, 2007)** — 想再深入電腦科學×賽局（PoA、機制設計、拍賣的演算法面）的權威合集；本章只開了一扇窗，這本是整面牆。\n"}, {"id": "ch18-seven-layers", "file": "ch18-seven-layers.md", "group": "Part VI — 賽局無所不在＋收官", "title": "ch18 — 同一張矩陣，現在你懂它七層", "md": "# ch18 — 同一張矩陣，現在你懂它七層\n\n> **本章解決什麼問題**：這是終點。整本書我們只用了一張 2×2 報酬矩陣（ch01 那張，T,R,P,S=5,3,1,0），卻把它翻來覆去看了七次——每翻一次，多懂一層。這一章不引入任何新機制，只做兩件事：把那張矩陣的七層意義並排對帳，然後回答全書真正想問你的那個問題——「即使每個人都理性，協調為什麼還是難題，而我們手上到底有幾把救火的工具」。讀完這章，你要能闔上書，對另一個工程師把整本書講成一條線：困境怎麼來、為什麼救不了、又怎麼一層層被救回來。這是收官的口試，考的是你能不能用自己的話重講全書。\n\n## 從你已知的出發\n\n我猜你做過事故的全程複盤（post-mortem）。一場大事故結束後，你不會只盯著「哪一行程式碼炸了」，你會把它從頭到尾講一遍：觸發點是什麼、為什麼重試把它放大、為什麼斷路器沒及時跳、為什麼上游沒有退避——然後你會在白板上畫一條時間線，把所有片段串成一個**能對別人重講的故事**。一個你能講清楚的事故，才是一個你真正消化了的事故。記不住細節沒關係，記得住那條因果線，下次它換個面孔出現你還是認得出來。\n\n這一章就是整本書的複盤。前面十七章我們各自盯著一個片段——優勢策略、納許均衡、零和、重複、folk theorem、演化 ESS、機制設計——現在要把它們串成一條線。而且有件事很美：這條線**不需要一張新圖**。它就是 ch01 那張矩陣，從頭到尾同一張。我們做的事，跟你複盤事故時把「同一個系統」在不同時間切片來看是一樣的——系統沒變，看它的角度變了七次。\n\n你已經有兩個直覺可以直接借用。第一，**同一個東西在不同情境下行為天差地別**——同一個服務，在低流量、在尖峰、在有快取、在快取剛失效，是完全不同的野獸。報酬矩陣也一樣：同一張 (5,3,1,0)，玩一次、玩無限次、放進演化族群、加上外部懲罰，結局完全不同。系統面我們在那本系統的書裡深究（系統可靠度那條線不在本書），這裡只借「同一物件、多種情境」這個直覺。第二，**會講才算懂**。你帶過新人就知道，能跑通程式不算懂，能把「為什麼這樣設計」講給新人聽才算懂。本章最後一段「紙上推演」就是逼你做這件事：把全書講成一個五分鐘的故事。講不出來，就是還沒真的擁有它。\n\n所以這一章我不教新東西，我幫你把已經學的七層疊整齊，然後遞給你一支麥克風。\n\n## 先把脊椎那張矩陣再放一次\n\n為了讓七層對帳有個共同的錨，我們把全書的脊椎——ch01 登場、之後被重看七次的那張囚徒困境矩陣——原封不動再放一次。數字一字未改（T,R,P,S=5,3,1,0，越大越好）：\n\n```text\n全書脊椎：囚徒困境基準報酬矩陣（數字＝獲益點數，越大越好）\n\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ← R,R     (0, 5)  ← S,T\n    我方：背叛(D)      (5, 0)  ← T,S     (1, 1)  ← P,P\n\n    格內 = (我方報酬, 對方報酬)\n    T = 5 誘惑   R = 3 獎賞   P = 1 懲罰   S = 0 受騙\n    困境核心：   T > R > P > S      （5 > 3 > 1 > 0）\n    重複條件：   2R > T + S        （6 > 5，否則輪流剝削勝過互相合作）\n```\n\n請最後一次盯著它，把那個全書反覆叩問的事實刻牢：**(背叛,背叛)=(1,1) 是兩個理性玩家的落點，但 (合作,合作)=(3,3) 對雙方都更好。** 個體理性把他們推到 (1,1)，集體理性指向 (3,3)，這兩種理性在同一張表裡公然打架。這就是全書的中央張力，也是接下來七層每一層都會碰到的那道裂縫。\n\n下面開始對帳。我按全書的閱讀順序，把這張矩陣被重看的七層一層一層攤開。每一層我只做一件事：說清楚「換了什麼眼光、這張矩陣多透露了什麼、那道裂縫在這一層長什麼樣」。\n\n## 第一層 — 優勢策略：困境誕生（ch01）\n\n最樸素的眼光。我們連「均衡」這個詞都還沒用，只問一個問題：**有沒有一個策略，不管對方怎麼選都比較好？** 有——背叛。對方合作時背叛拿 5 > 3，對方背叛時背叛拿 1 > 0。背叛是**嚴格優勢策略**，所以兩個理性玩家都選它，一起停在 (1,1)。\n\n這一層的驚嘆點，是全書的奠基石：**兩個玩家各自做了無懈可擊的計算，結果一起掉進對雙方都更糟的結局。** 不是有人笨，不是有人壞——恰恰相反，正因為他們夠理性，才精準地一起跳坑。裂縫在這一層第一次裂開：個體理性說背叛，集體理性說合作，個體理性贏了。\n\n## 第二層 — 納許均衡：穩定不等於最好（ch02）\n\n換上更一般的眼光。「優勢策略」只在運氣好（真有一個策略全面壓制）時管用；多數賽局沒有優勢策略，但我們仍想知道「玩家會停在哪」。納許均衡給了答案：**一個策略組合，裡面沒有任何人能單方面改變策略而得益。**\n\n用這把尺重看脊椎矩陣，(背叛,背叛) 是均衡——從 (1,1) 出發，我若單獨改成合作，報酬從 1 掉到 0，更差，所以我不動，對方同理。而 (合作,合作) **不是**均衡——從 (3,3) 出發，我若偷偷背叛，報酬從 3 跳到 5，所以我守不住。\n\n這一層把第一層的「困境」精確化成一句話，也澄清了全書最常見的誤解：**均衡是「穩定」，不是「最優」。** (1,1) 穩定卻雙輸，一點都不矛盾。裂縫在這一層有了名字——那個對雙方都好的 (3,3) 之所以到不了，正是因為它「不是均衡」：它在斜坡上，誰都站不住。\n\n## 第三層 — 零和對照：困境根本不是零和（ch04）\n\n退一步，把脊椎矩陣跟另一類賽局並排，你才看得清它是什麼。最乾淨的對照組是**零和賽局**（剪刀石頭布、配對銅板）——一方贏多少，另一方就輸多少，報酬和恆定，純對抗。零和賽局有 von Neumann 1928 的極小極大定理罩著，乾淨到有唯一的「賽局的值」。\n\n但把脊椎矩陣的四格報酬加起來：(3,3) 和 6、(1,1) 和 2、(0,5) 與 (5,0) 各和 5。**和不固定——囚徒困境不是零和。** 這個對照藏著全書要打掉的最大眾誤解：「賽局理論＝你死我活的零和算計」。錯。零和只是特例，而且是**沒有那道裂縫**的特例——零和裡沒有「集體更好」可言（一方贏＝一方輸，無共同利益可損）。裂縫恰恰是「非零和」才有的東西：唯有當 (3,3) 對雙方同時優於 (1,1)，「個體理性害了集體」這句話才有意義。**囚徒困境之所以是悲劇，正因為它不是零和——大家本來可以一起更好。**\n\n## 第四層 — 重複：給它一個未來（ch07）\n\n到這裡，眼光從「玩一次」變成「玩很多次」，而這改變了一切。同一張矩陣，玩無限多回合（或不知道哪回合結束），背叛就不再無痛了——今天背叛，明天會被報復。把「未來」的份量寫成折扣因子 δ（0≤δ<1，δ 越大＝越看重未來＝「未來的陰影」越長），就能算出合作能不能撐住。\n\n用 grim trigger（一旦對方背叛就永遠背叛）對 grim trigger，合作維持的門檻是：\n\n```text\nδ ≥ (T − R)/(T − P) = (5 − 3)/(5 − 1) = 2/4 = 1/2\n```\n\n只要雙方夠看重未來（δ≥1/2），永遠合作就比「偷背叛一次再被永遠懲罰」划算，(合作,合作) 終於站得住。這是全書第一線生機：**裂縫沒被消滅，而是被未來填上了**——背叛仍誘人，但未來的懲罰把那份誘惑壓了下去。注意這層的限制（ch07 講透）：有限次、且大家都知道最後一回合在哪，會從末端逆向歸納整串崩潰（unraveling）。救援要靠「沒有確定的終點」。\n\n## 第五層 — tit-for-tat 與 folk theorem：合作可能、非必然（ch08）\n\n重複打開了門，這一層走進去看清楚門後有什麼。Axelrod 1980 兩場電腦競賽裡，最簡單的 tit-for-tat（一報還一報，4 行）兩場奪冠——靠的是善良、可激怒、寬容、清晰。它寬容（只懲罰一回合就原諒），所以維持合作的門檻比 grim trigger 高：\n\n```text\ntit-for-tat 對 tit-for-tat： δ ≥ (T − R)/(R − S) = (5 − 3)/(3 − 0) = 2/3\n```\n\n懲罰越輕（只還一手就和好），就越需要看重未來（更大的 δ）才壓得住偷打的誘惑——這就是 2/3 高於 1/2 的原因（兩個門檻算的是不同策略，不是同一題）。\n\n但這一層真正的收穫是兩個「別過頭」的修正，是全書誠實度的試金石。其一：**tit-for-tat 在任何單場一對一裡都贏不了對手（最多平手），卻贏得整場錦標賽**——「最強」是誤傳，它是「最穩健」；後續研究（Press–Dyson 2012 等）顯示沒有萬能策略，結論要框成「強力的存在性示範，不是演化定律」。其二（folk theorem）：δ 夠大時相互合作**可以**是子賽局完美均衡——但**全程互背也仍是均衡**。folk theorem 是「均衡多到爆炸」的定理，它說合作**可能**，沒說合作**必然**。裂縫在這一層的樣子是：未來的陰影**打開了**合作這扇門，但沒人保證大家會走進去。\n\n## 第六層 — 演化 ESS：均衡不需要會算的玩家（ch09）\n\n最反直覺的一層。把同一張矩陣放進一個族群——玩家變成一大群個體，「策略」變成基因/行為型（一部分天生合作、一部分天生背叛），「報酬」變成繁殖的適存度，「最佳化」交給天擇代勞。**沒有任何個體在算報酬。**\n\n用這把尺重看脊椎矩陣：無外力時，背叛者的適存度永遠高於同處境的合作者（背叛是嚴格優勢），所以背叛者比例節節上升，**背叛入侵並佔領族群**——背叛是 ESS（演化穩定策略：普遍後無法被稀少突變入侵）。要翻轉，得加上重複（碰到同一對手多次）、親緣（幫的是帶同樣基因的親戚）、或聲譽（好名聲帶來未來合作）這些把「未來」或「關聯」塞回來的條件。\n\n驚嘆點：**均衡可以完全不需要會算的玩家。** 同一道「個體理性 ⇒ 集體次優」的裂縫，這裡換成了「個體適存度 ⇒ 族群被背叛佔領」，連「理性」都拿掉了，裂縫依然在。這告訴你那道裂縫不是「人性自私」的產物——它是**報酬結構**的產物，連細菌都逃不掉。\n\n## 第七層 — 機制設計：反過來改報酬（ch13）\n\n最後一層，視角整個翻轉。前六層都在問「給定這張矩陣，玩家會停在哪」；機制設計反過來問：**如果我能改這張矩陣，怎麼讓 (合作,合作) 變成均衡？**\n\n最直接的辦法：加一個外部執法者，對背叛課罰。假設背叛一律扣 3 分（罰金），把脊椎矩陣每一個「背叛者拿到的報酬」減 3：\n\n```text\n改造後（背叛者每次被外部扣 3 分）：\n\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 2)   ← 對方背叛 5−3=2\n    我方：背叛(D)      (2, 0)            (−2, −2) ← 雙方背叛 1−3=−2\n\n    現在固定「對方合作」：合作 3 > 背叛 2  → 該合作\n    固定「對方背叛」：    合作 0 > 背叛 −2 → 該合作\n    背叛不再是優勢策略；(合作,合作)=(3,3) 變成納許均衡。\n```\n\n同一張矩陣，動了報酬，結局從「背叛均衡」翻成「合作均衡」。這就是機制設計的核心動作，也是你天天在做的事——API 配額、計費規則、排程優先順序，都是「設計報酬讓使用者的理性行為導向你要的系統行為」。維克里拍賣（ch14）把它做到極致：設計得當的機制讓「誠實出價」（個體理性）剛好導出有效率的配置（集體最優）。\n\n裂縫在這一層被**主動縫合**：我們不再等合作自己長出來，而是反過來改報酬，讓個體理性自己走向集體最優。但別忘了 ch15 的壞消息——不是所有目標都縫得起來：投票有 Arrow 不可能定理罩著，沒有完美的偏好聚合規則。機制設計強大，但不是萬能。\n\n## 七層對帳：同一張矩陣，並排看清\n\n現在把七層並排，這是全書的總帳本。同一張 (5,3,1,0)，七種眼光，七種結局：\n\n```text\n脊椎七層對帳（同一張囚徒困境矩陣，T,R,P,S=5,3,1,0）\n\n層  章    換的眼光           這張矩陣的結局              裂縫長什麼樣\n──  ────  ────────────────   ─────────────────────────  ────────────────────────\n1   ch01  優勢策略           (背叛,背叛)=(1,1)；背叛嚴格  個體理性 ⇒ 集體次優（誕生）\n            （玩一次）         優勢、雙方都選\n2   ch02  納許均衡           (D,D) 是唯一純策略 NE；      穩定≠最優；(3,3) 不是均衡\n            （穩定性）         (C,C) 不是 NE                所以到不了\n3   ch04  零和對照           四格和不固定 ⇒ 非零和        裂縫是「非零和」才有的東西；\n            （對照組）                                     零和裡無集體可損（缺席對照）\n4   ch07  重複＋grim         δ≥1/2 時 (C,C) 可維持        未來的陰影把背叛誘惑壓下去\n            （給它未來）                                   （第一線生機）\n5   ch08  TFT／folk thm      δ≥2/3 維持(TFT)；合作可為均衡 門打開了，但全程互背也是均衡\n            （合作的考古）     但非必然                     ——合作可能、非必然\n6   ch09  演化 ESS           無外力背叛入侵、是 ESS；      個體適存度 ⇒ 族群被背叛佔領\n            （沒有會算的人）   重複/親緣/聲譽才翻轉          ——連理性都不需要，裂縫照在\n7   ch13  機制設計           改報酬（背叛罰3）後           反過來縫合：改報酬讓\n            （反過來設計）     (C,C)=(3,3) 變成 NE          個體理性 ⇒ 集體最優\n```\n\n把這張表從上讀到下，你讀到的就是整本書：困境**誕生**於個體理性（1）、被**正名**為穩定但雙輸的均衡（2）、被**澄清**為非零和的悲劇（3）、被未來**鬆動**（4）、被合作的條件性**框住**（5）、被演化**剝去理性外衣**（6），最後被機制設計**反過來縫合**（7）。同一道裂縫，七種長相，從「誕生」到「縫合」走了一圈。\n\n## 七條驗收主線：你該帶走的七個句子\n\n對帳表是橫的（同一張矩陣的七層）；現在換縱的——把全書七條驗收主線收回來。這七句話，每一句你都該能用自己的話對另一個工程師講清楚。能講，你就讀懂了這本書。\n\n```text\n七條驗收主線（每條都該能口頭重講）\n\n① 裂縫    每個人都最佳化自己，結果集體更糟——不是因為誰笨或自私，\n          是因為報酬結構讓個體理性與集體理性分裂。\n② 均衡    納許均衡＝沒人能單方面改善＝穩定，不是最優；\n          (背叛,背叛) 是均衡卻雙輸，不矛盾。\n③ 混合    純策略均衡不存在時（剪刀石頭布）得隨機化；反直覺核心是\n          「你的機率由對手報酬決定」——讓對手對他的選項無差異。\n④ 零和    零和只是特例（極小極大定理只對兩人零和）；現實最有趣的\n          賽局（囚徒困境、協調）都不是零和——「賽局理論＝零和」是最大誤解。\n⑤ 合作    合作是有條件的成就，不是預設：靠重複、未來陰影、tit-for-tat、\n          folk theorem、聲譽才救得回——而且「可能」不等於「必然」。\n⑥ 演化    均衡不需要會算的玩家——ESS 把最佳化交給天擇，\n          沒有任何個體在算報酬，裂縫依然在。\n⑦ 設計    既然規則決定結局，就反過來設計報酬（機制設計）：拍賣能把\n          說真話設計成優勢策略；但投票有 Arrow 不可能——設計不是萬能。\n```\n\n注意①到⑦其實在偷偷講一個故事：①②③④是「困境有多深」（深到連零和的乾淨都救不了它、連隨機化都繞不開那道裂縫），⑤⑥⑦是「我們有什麼辦法」。前半是壞消息，後半是工具箱。這也帶出全書最該被你記住的一句總結。\n\n## 四把救火的工具：合作不是預設，是成就\n\n如果要我把整本書濃縮成一個畫面，是這個：**囚徒困境的 (1,1) 是預設值，(3,3) 要靠工程才能達到。** 合作不是天上掉下來的常態，它是一個需要被解釋、被製造、被維護的**成就**。好消息是——這本書其實一直在教你達成它的工具。盤點一下，你手上有四把救火的工具，每一把都對應全書的一條線：\n\n```text\n四把把 (1,1) 救回 (3,3) 的工具\n\n工具          機制（為什麼有效）                       章   工程版\n──────────   ────────────────────────────────────   ───  ──────────────────────\n1 重複        給互動一個未來——背叛會被未來懲罰，       ch07  長期 SLA、API 配額信任、\n   （未來陰影） δ 夠大時合作划算（δ≥1/2 起）              ch08  「再犯封更久」、circuit breaker\n2 聲譽        把過去的行為變成可見的訊號——壞名聲      ch08  client 信譽分級、\n   （與訊號）   讓未來合作者避開你（昂貴訊號可信）        ch11  TLS 憑證、開源貢獻紀錄\n3 演化/選擇   讓好策略「比例上升」——重複/親緣/聲譽    ch09  A/B test、漸進放量、\n   （天擇代勞） 把合作者的適存度撐到背叛者之上            自動彈性伸縮裡「好版本勝出」\n4 機制設計    反過來改報酬——加外部懲罰或重設規則，    ch13  API 配額/計費規則設計、\n   （改矩陣）   讓 (合作,合作) 直接變成均衡               ch14  rate limit、拍賣式資源分配\n```\n\n這四把工具有一個共同的祕密：**它們沒有一把是靠「叫大家別自私」運作的。** 重複改變的是報酬的時間結構，聲譽改變的是資訊的可見度，演化改變的是策略的存活率，機制設計直接改報酬——全都是在**改變遊戲本身**，沒有一把在改變玩家的品德。這正是 ch01 那個最重要的教訓的兌現：困境是結構造的，所以解也得從結構下手。你救 retry storm 不是靠拜託每個 client 高尚一點，是靠 backoff、jitter、配額、斷路器——你早就是個賽局工程師，只是現在你知道這四把工具各自在賽局理論的哪條線上。\n\n## 哲學收束：賽局理論到底教了你什麼\n\n收尾前，把最容易被誤讀的事說清楚，因為它決定了你會把這本書記成什麼。\n\n賽局理論**沒有**說「人都是自私的」。這是它最常被栽贓的一句話。它說的是更微妙、也更沉重的東西：**即使每個人都完全理性、即使大家都想合作，協調仍然可能失敗。** 困境不需要壞人——它只需要一個 T>R>P>S 的報酬結構，剩下的由理性自己完成。這比「人性本惡」可怕，因為你沒辦法靠「找更好的人」來修；但這也比「人性本惡」有希望，因為結構是可以改的——而改結構，正是工程師的本行。\n\n所以這本書真正的命題是：**合作不是預設，是需要被解釋與被設計的成就。** 每次你看到人類、公司、服務、甚至細菌維持著合作，那不是理所當然——那背後一定有某種機制（重複、聲譽、演化、或設計）在偷偷撐著。把合作當預設，你會對它的崩潰一臉錯愕；把合作當成就，你會去找撐著它的那根柱子，並在它要倒之前補強。\n\n最後一句謹慎的話，因為它跟全書的誠實度一樣重要：**不要把一切都賽局化。** 賽局理論最大的限制是「報酬矩陣從哪來」——真實情境裡那四個數字往往是你硬塞的，人不只在乎錢（ch12：他們會為公平拒絕白拿的錢）、多重均衡選哪個理論答不出來（ch10：謝林點靠的是矩陣外的顯著性）、隱喻一旦過度延伸就變成「凡事都是賽局」的空話（ch17）。一個好的賽局思考者，跟一個好的工程師一樣，知道自己工具的邊界在哪。\n\n那麼，全書的中央張力，最後收成一句話：\n\n> **每個人都最佳化自己，結果可能讓所有人一起變糟——而我們手上有四把救火的工具（重複、聲譽、演化、機制設計），每一把都靠改變遊戲、而不是改變人。** 個體理性與集體理性的裂縫無法被消滅，但可以被工程。\n\n這就是你帶走的東西。不是一堆均衡的算法，是一副新的眼鏡：下次你看到「每個人都對、結果一起錯」，你會認得出那是哪張矩陣的哪一層，也會知道該伸手去拿哪一把工具。\n\n## 直覺的陷阱\n\n收官章的陷阱不在某個單一概念，而在「把整本書記成了錯誤的一句話」。下面這幾個是讀完全書最容易帶走的錯誤總結，每一個我都標出它**漏掉了哪一層**。\n\n| 錯誤的總結 | 漏掉了哪一層 | 正確版 / 自我察覺 |\n|---|---|---|\n| 「這本書證明了人都是自私的、合作是幻覺」 | 漏掉第四到第七層（救援工具）。 | 全書一半在講合作怎麼救回（重複、聲譽、演化、機制設計）。困境是「合作為什麼會崩」的模型，不是「合作不可能」的證明。徵兆：如果你的總結讓你變犬儒，你只讀了前三層。 |\n| 「賽局理論就是教你怎麼在零和裡算贏對手」 | 漏掉第三層（非零和對照）。 | 零和只是特例、而且是沒有裂縫的特例；現實最有趣的賽局都不是零和。把賽局理論記成「你死我活」是最大誤解。 |\n| 「納許均衡就是賽局的最佳解 / 最該追求的結果」 | 漏掉第二層的精確意義。 | 均衡＝穩定，不是最優。(1,1) 是均衡卻雙輸。追求均衡 ≠ 追求好結果——這正是機制設計存在的理由（把好結果設計成均衡）。 |\n| 「既然 folk theorem 說合作能當均衡，那重複久了就會合作」 | 漏掉第五層的「可能≠必然」。 | folk theorem 說合作**可以**是均衡，全程互背**也**是。重複打開門，沒保證大家走進去。把「可能」讀成「必然」是過度樂觀。 |\n| 「我懂這七層了，所以我能把任何情境分析成賽局」 | 漏掉了「報酬從哪來」的限制（ch17）。 | 最危險的不是不會算，是把不該賽局化的東西硬塞進矩陣。報酬矩陣的四個數字往往是你假設出來的；人不只在乎錢。會收手，跟會分析一樣重要。 |\n\n最致命的是第一個——把全書記成犬儒宣言。如果讀完你對人性更悲觀了，你恰好讀反了：本書後半的整個重量，都在告訴你合作是**可以被工程出來**的。自我察覺的徵兆很簡單：你的一句話總結裡，有沒有「救火工具」的位置？沒有，就回去重讀第四層起。\n\n## 紙上推演\n\n最後一次動手——但這次不是算矩陣，是**講矩陣**。收官章的推演，考的是你能不能把全書講成一條別人聽得懂的線。紙筆即可，不要跑任何程式。\n\n---\n\n**推演題 1 ★★ [20 分鐘]　五分鐘版：對一個工程師講完整本書**\n\n想像一個沒讀過這本書的資深後端工程師坐在你對面。用**五分鐘、不超過七句話的骨幹**，向他講清楚兩件事：(a) 個體理性如何導致集體災難（用一個他熟的工程例子，如 retry storm，不准用「囚徒困境」這個詞偷懶）；(b) 我們有哪四把救火工具、每一把為什麼有效。要求：講完他要能複述出「合作不是預設、是成就」這個結論，以及四把工具至少三把。先寫下你的七句骨幹，再檢查每一句是否扣著「改變遊戲、而非改變人」。\n\n---\n\n**推演題 2 ★★ [20 分鐘]　把脊椎矩陣在四種設定下的結局並排**\n\n不准翻書，憑理解把 ch01 那張脊椎矩陣 (5,3,1,0) 在以下四種設定下的結局填進一張表，每格寫「結局」＋「一句為什麼」：\n\n```text\n設定                          結局（落在哪 / 合作能否維持）   為什麼（一句）\n───────────────────────────  ────────────────────────────  ──────────────\nA 單回合（玩一次）             ?                              ?\nB 無限重複、δ=0.6、grim        ?                              ?\nC 放進演化族群、無外力          ?                              ?\nD 加外部懲罰（背叛罰 3）        ?                              ?\n```\n\n填完對照：A 和 C 的結局「應該很像」——猜猜為什麼（提示：演化是「沒有理性的單回合」的放大版）。\n\n---\n\n**推演題 3 ★★★ [25 分鐘]　找出一個「四把工具全失效」的情境**\n\n四把救火工具（重複、聲譽、演化/選擇、機制設計）不是萬靈丹。請你構造或舉出一個真實情境，**讓這四把工具一把都用不上**，於是合作真的救不回來。要求：逐一說明為什麼每把工具在你這個情境裡失效（例如：為什麼沒有「未來」可用？為什麼聲譽不可見或不可信？為什麼沒有選擇壓力？為什麼沒人有權力改報酬？）。這題沒有標準答案，考的是你對四把工具「適用條件」的理解深度。\n\n---\n\n### 推演解答\n\n**第 1 題解答（骨幹範本，不唯一）。**\n\n一個合格的七句骨幹：\n\n```text\n1. 你看過 retry storm：下游慢了，每個 client 都重試，重試是個體最理性的選擇。\n2. 但所有人都這樣想，疊加的流量把下游打死——每個人都對，結果一起錯。\n3. 關鍵不是誰寫得爛或太貪：是「重試對自己永遠划算」這個報酬結構，逼出集體災難。\n4. 這結構叫囚徒困境，它的壞結局是「預設值」，好結局（大家克制）要靠工程才達得到。\n5. 工具一：給互動一個未來（重複）——再犯就封更久，背叛會被未來懲罰。\n6. 工具二＋三：聲譽（壞 client 配額降級）＋選擇（好策略漸進放量勝出）。\n7. 工具四：改報酬本身（機制設計）——配額/退避/斷路器，讓克制變成最划算的選擇。\n```\n\n**常見錯路**：① 講成「人要互相信任就好」——錯，四把工具沒一把靠品德，全靠改變遊戲；如果你的版本出現「大家應該更有道德」，重講。② 漏掉「可能≠必然」——把工具講成保證，但 folk theorem 提醒你合作只是「可被支撐」，不是自動發生。③ 用「囚徒困境」這個詞偷懶代替解釋——對方沒讀過書，你得用 retry storm 把「個體理性 ⇒ 集體次優」這步**走給他看**，不能甩名詞。\n\n**第 2 題解答。**\n\n```text\n設定                          結局                          為什麼\n───────────────────────────  ────────────────────────────  ──────────────────────────\nA 單回合（玩一次）             (背叛,背叛)=(1,1)             背叛是嚴格優勢策略，無未來\nB 無限重複、δ=0.6、grim        合作可維持                    δ=0.6 ≥ 門檻 1/2，未來夠重\nC 放進演化族群、無外力          背叛入侵、佔領族群            背叛適存度恆高於合作者\nD 加外部懲罰（背叛罰 3）        (合作,合作)=(3,3) 變成 NE     罰後合作 3>2、0>−2，背叛不再優勢\n```\n\nB 的關鍵驗算：grim trigger 門檻 δ≥(T−R)/(T−P)=(5−3)/(5−1)=1/2；δ=0.6≥0.5，所以合作撐得住 ✓（若是 tit-for-tat 則門檻 2/3，δ=0.6**不夠**，這正是兩個門檻別混為一談的地方——若題目沒指定策略容易答錯）。\n\nA 和 C「很像」的原因：**演化就是「沒有理性的單回合」的大規模重播**。單回合裡，個體理性算出背叛；演化族群裡，沒有任何個體在算，但天擇替背叛者「算」了——背叛者繁殖更多、比例上升，效果跟「人人選背叛」一樣，最後族群被背叛佔領。一個靠理性、一個靠選擇，殊途同歸到背叛，這正是第六層那個驚嘆點：**裂縫不需要理性玩家也照樣裂開。** 常見錯路：把 C 答成「混合比例平衡」——那是鷹鴿賽局（C>V）的結局，不是囚徒困境；囚徒困境裡背叛是嚴格優勢，演化下不是混合平衡而是背叛**全面佔領**。\n\n**第 3 題解答（範本，不唯一）。**\n\n一個乾淨的例子：**一次性、匿名、不可監管的污染排放**——某偏遠海域，多艘來自不同國籍、彼此不會再相遇的船隻，是否偷排廢料。逐一檢查四把工具：\n\n- **重複失效**：船隻彼此一次性相遇、各自航線不交叉，沒有「下一回合」可言，未來的陰影為零（δ≈0），grim trigger 之類無從掛載。\n- **聲譽失效**：匿名、跨國、無共同記錄系統，偷排者的「壞名聲」對任何人都不可見、不可信——沒有訊號通道，聲譽機制空轉。\n- **演化/選擇失效**：偷排者短期省成本、不會因此「被淘汰」（沒有把守規矩者的適存度撐到偷排者之上的選擇壓力）；甚至偷排省下的成本讓他更有競爭力。\n- **機制設計失效**：公海無單一主權能改報酬（課罰、設配額），沒有「外部執法者」能把背叛變不划算——這正是 ch16 共有財悲劇與 ch13 機制設計失去著力點的地方。\n\n四把工具全失效，於是合作真的救不回，資源（漁場/海域）走向崩潰。**常見錯路**：舉一個「其實還有未來或還有監管」的例子（如公司內部的搭便車——其實有重複、有聲譽、有主管能改 KPI），那就不算四把全失效。這題的價值在於**反過來照亮四把工具的適用條件**：合作能被救回，靠的就是「有未來、聲譽可見、有選擇壓力、有人能改報酬」這四個條件至少一個成立；四個全不成立的情境（一次性、匿名、無選擇、無主權），正是賽局理論告訴你「這裡的合作崩潰不是道德問題、是結構絕境」的地方。\n\n## 自我檢核\n\n闔上書，口頭回答。這是全書的口試——講得出來才算讀完。優先回答「為什麼」。\n\n1. 把脊椎矩陣的七層按順序講一遍：每一層「換了什麼眼光、結局是什麼」。卡在哪一層，就是你還沒真懂的那層。\n2. 為什麼說「囚徒困境不是零和」是理解整本書的關鍵？如果它是零和，那道「個體 vs 集體」的裂縫還在嗎？為什麼？\n3. 四把救火工具是哪四把？它們有一個共同的祕密——是什麼？（提示：沒有一把靠改變玩家的品德。）\n4. 「合作是成就、不是預設」——這句話到底什麼意思？把它跟「合作不可能」這個犬儒誤讀的差別講清楚。\n5. 為什麼「均衡」不等於「好結果」？這個區分如何直接導出「機制設計」存在的理由？\n6. folk theorem 說「合作可以是均衡」，演化說「無外力時背叛入侵」——這兩件事矛盾嗎？（提示：可能 vs 必然、有沒有外力。）\n7. 第六層（演化 ESS）為什麼是全書最反直覺的一層？「均衡不需要會算的玩家」這件事，對「困境是人性自私造成的」這個說法是致命一擊——為什麼？\n8. 賽局理論最大的限制是什麼？舉一個你會「拒絕把它賽局化」的情境，並說明為什麼硬塞報酬矩陣會誤導你。\n\n## 延伸閱讀\n\n- **Robert Axelrod，《The Evolution of Cooperation》（1984）**。如果讀完全書你只想再讀一本，是這本。它把「合作如何在一群利己者中、沒有中央權威的情況下浮現」這個問題（Axelrod 的原問句）寫成一本好看的書——本章「四把救火工具」裡的重複與聲譽，根源都在這裡。讀第一章與結論章就能拿到精華。\n- **Stanford Encyclopedia of Philosophy，「Prisoner's Dilemma」**（https://plato.stanford.edu/entries/prisoner-dilemma/）。全書脊椎那張矩陣的權威傳記：Flood–Dresher 造結構、Tucker 編囚犯故事（2025 年正好是它的七十五週年），以及七十多年來它在各學科的演變。想把「同一張矩陣被重看七層」的歷史深度補滿，讀這篇。\n- **William Poundstone，《Prisoner's Dilemma》（1992）**。把這張矩陣的冷戰出身寫成科普——RAND、馮紐曼、核戰略。本章談「困境是結構造的、跟人性無關」時，這本提供了最戲劇化的歷史註腳：一群數學家在智庫裡，用同一張矩陣推演要不要按下核按鈕。\n- **本書附錄 C（閱讀地圖）**。讀完全書想再走一遍、或想按興趣選讀，附錄 C 把全書地圖、跨書連結、與延伸閱讀總清單整理成一張表。它是這趟旅程的「回程票」。\n- **跨書：《在不確定中下注》談單人理性那本**。本書從頭到尾假設玩家會「為自己選最佳」，但「一個人在不確定下到底怎麼算最佳、效用為什麼不是金額」是單人決策的地盤。決策與賽局是同一枚硬幣的兩面——讀完賽局這面，去翻另一面，你對「理性玩家」這個假設的理解會再深一層。\n"}, {"id": "appendix-a-notation", "file": "appendix-a-notation.md", "group": "附錄", "title": "附錄 A — 記號與術語速查", "md": "# 附錄 A — 記號與術語速查\n\n> 這是一張**速查表**，不是教學。每個記號、每條公式都假設你已在正文某章遇過它；這裡只負責讓你在忘記「δ 是折扣因子還是別的、p* 指 ESS 比例還是混合機率、T 在這一行是誘惑報酬還是回合數」時，能在十秒內查回來，並標出它**第一次正式登場**的章。要從零理解某個概念，回該章；要核對一個符號的確切意義或一個門檻數字，留在這裡。\n\n閱讀器不渲染 LaTeX，全書一律純文字 Unicode 記號（內文行內就是 (p, 1−p)、E[·]、T>R>P>S 這種寫法）。所以這張表也是純文字的——你看到的形狀就是書裡的形狀。報酬一律「點數越大越好」（不是經典版的「坐牢年數、越小越好」，方向相反，見 ch01）。\n\n---\n\n## 一、全書脊椎一眼定位\n\n全書十八章重看的是**同一張 2×2 報酬矩陣**，先把它釘在這裡，後面所有記號都繞著它轉。\n\n```text\n脊椎：囚徒困境基準矩陣（ch01 登場，被重看七層直到 ch18）\n\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ← R,R     (0, 5)  ← S,T\n    我方：背叛(D)      (5, 0)  ← T,S     (1, 1)  ← P,P\n\n  擺放慣例：列＝我方策略、行＝對方策略；格內 = (我方報酬, 對方報酬)，\n            逗號左邊永遠是列玩家、右邊永遠是行玩家，順序不可調。\n  四個報酬有標準名字（T,R,P,S 是賽局理論通用標號，全書沿用）：\n     T = 5  誘惑(Temptation)   我背叛、對方合作——佔大便宜\n     R = 3  獎賞(Reward)       雙方合作\n     P = 1  懲罰(Punishment)   雙方背叛\n     S = 0  受騙(Sucker)       我合作、對方背叛——當傻瓜\n  困境核心不等式：  T > R > P > S    （5 > 3 > 1 > 0）\n  重複可救條件：    2R > T + S       （6 > 5，互相合作勝過輪流剝削）\n```\n\nT,R,P,S = 5,3,1,0 是**全書基準常數**（脊椎不變數），任何一章重算困境用的都是這四個數。\n\n---\n\n## 二、Unicode 記號表\n\n下表列出全書用到的每個非 ASCII 記號：怎麼唸、在本書指什麼、第一次正式出現在哪章。同一符號在不同章換義的，集中到第三節「同形記號歧義」逐條釐清，這裡先標主用法。\n\n```text\n記號        唸法 / 名稱              在本書的主要意義                              首次章\n─────────────────────────────────────────────────────────────────────────────────\nT,R,P,S     誘惑/獎賞/懲罰/受騙      四個基準報酬名（脊椎＝5,3,1,0）              ch01\n(C, D)      合作 / 背叛             兩個基本策略（cooperate / defect）           ch01\n(a, b)      報酬對                  一格的報酬 = (我方報酬, 對方報酬)            ch01\n(p, 1−p)    一對機率                混合策略：以 p 出第一招、1−p 出第二招        ch05\np, q        機率                    某玩家出某招的機率（混合策略的權重）         ch05\np*          p 星                    平衡比例：ESS 鷹比例 / 混合均衡機率（見§三） ch09\nE[·]        期望值                  按機率加權平均的報酬（如 E[正]、E(鷹)）      ch05\nδ           delta（德爾塔）         折扣因子：下一回合在今天眼裡的權重，0≤δ<1     ch07\nβ           beta（貝塔）            不公平趨避係數（在意自己吃虧的程度），β≥0    ch12\nvᵢ          v 下標 i                競標者 i 的真實估值（私有資訊）              ch14\nbᵢ          b 下標 i                競標者 i 實際出的價（可以 ≠ vᵢ）             ch14\nf           f（罰則）               機制設計外部罰則大小（背叛扣 f 點）          ch13\nv           v（賽局的值）           兩人零和賽局的「值」（max-min=min-max）      ch04\nn, m        n / m                  玩家數 n、選項數 m / 公共財倍數 m（見§三）    ch15/16\n≻           優於                    偏好排序：A ≻ B 讀作「A 優於 B」             ch15\n>  <        大於 / 小於             嚴格比較（報酬、嚴格優勢/劣勢）              ch01\n≥  ≤        大於等於 / 小於等於      門檻與弱優勢比較（如 δ ≥ 1/2、每格 ≥）        ch03\n=  ≠        等於 / 不等於           相等（無差異條件）/ 不等                      ch02\n≈           約等於                  近似值（如 δ ≥ 2/3 ≈ 0.667、PoA ≈ 1.33）     ch08\n→           箭頭 / 導致             「導致」「收斂到」（如 個體理性 → 集體次優）  ch01\n⇒  ⇔        蘊含 / 充要            邏輯推出 / 若且唯若（如 λ>0 ⇔ 混沌的句式）    ch02\nΣ           sigma（求和）           折現級數求和 R+δR+δ²R+…（等比級數）          ch07\n∞           無限大                 無限重複賽局、n→∞、級數上界                 ch07\n∈           屬於                   集合歸屬（如 δ ∈ [0,1)、策略集 {C,D}）       ch05\n√           根號                   平方根（如 1+√6 ≈ 3.4495 在跨書例中）         （罕用）\n×           叉乘 / 倍數            乘號或倍數（公共財池 ×m、200×3 等）           ch14\n·           點乘                   乘號（避免和變數混淆，如 r·xₙ、δ·S）         ch05\n−           減號 / 負              減法或負報酬（如 vᵢ−p、(V−C)/2 = −1）         ch04\n/           分數                   分數線（如 V/C、1/n、(T−R)/(T−P)）           ch07\n½ ⅓ ⅔      二分之一 等            常見均衡機率（配對銅板 ½、剪刀石頭布 ⅓）      ch05\nmax(·,·)    取大函數              取較大者（如 max(a−b,0)、罰則門檻 max(…)）    ch12\nxᵢ x*       下標 / 星             下標＝第 i 個玩家/項；星＝均衡/平衡值          ch09\n```\n\n一個容易看漏的細節：\n\n```text\n• (a, b) 這個括弧對在本書一律是「報酬對」，左我右對、順序鎖死。\n  它不是座標、不是區間——看到逗號分兩個數，先問「列玩家拿哪個」。\n• 上標（如 δ²、2³⁰）是次方；下標（如 vᵢ、bᵢ、xₙ）是「第幾個」。\n  位置不同意義天差地遠：上標數冪次、下標數編號。\n```\n\n---\n\n## 三、同形記號歧義專節（重要）\n\n賽局理論借用的字母不多，於是同一個符號在不同脈絡常指不同東西。下面這幾條是本書（及書架相鄰書）最容易撞名的記號。**查一個數字前先確認你查的是哪個 p*、哪個 T，否則會把對的數字填到錯的格子裡。**\n\n```text\nδ —— 本書：折扣因子（下一回合報酬在今天眼裡的權重，0≤δ<1）。         ch07\n     在「不定次重複」下，δ 同時是「再玩一回合的機率」——這是同一個\n     δ 的兩種讀法，不衝突。δ 接近 1＝有耐心、看重未來；接近 0＝短視。\n     易撞：在《蝴蝶的鐵律》混沌書，δ 是 Feigenbaum 常數 ≈4.6692，\n     和折扣因子毫無關係。看到 δ 先問：這是「折扣/耐心」還是別本書的常數？\n\np* —— 本書有兩個身分，靠章別區分：                                  ch05/ch09\n     ① 混合策略納許均衡裡的機率（ch05）：讓對手無差異的那個 p。\n        配對銅板 p*=½、剪刀石頭布 p*=⅓。\n     ② 演化穩定策略 ESS 的族群比例（ch09）：鷹鴿賽局裡鷹的穩定佔比，\n        p*=V/C。兩者數學同源（都用「無差異原理」解），但 ① 是「一個\n        玩家出某招的機率」、② 是「整個族群裡某型的比例」。\n     看到 p* 先問：這是「一個人隨機的機率」還是「一群人的組成比例」？\n\nV, C —— 本書：鷹鴿賽局的資源價值 V 與打架受傷成本 C。               ch09\n     基準取 V=2、C=4（C>V，自然界常態：受傷比資源貴），ESS 鷹比例\n     p*=V/C=½。注意 p*=V/C 這條公式只在 C>V 時成立；一旦 V≥C，唯一\n     ESS 是全鷹（p*=1）。別把這個 C（成本）和折扣 δ、或別處的「常數」\n     搞混；也別把這個 V（鷹鴿價值）和零和「賽局的值 v」混為一談——\n     V 是大寫鷹鴿價值、v 是小寫賽局的值，兩個不同量。\n\nT —— 本書：絕大多數時候是「誘惑報酬 Temptation」（脊椎 T=5）。       ch01\n     但在重複/演化的論述裡，T 偶爾也被當「時間 / 回合 / 步數」用\n     （如可預測地平線式的 T≈…、錦標賽 200 回合的回合計數）。\n     判別法：放在不等式 T>R>P>S 或報酬算式裡的 T＝誘惑報酬（=5）；\n     放在「第 T 回合 / T 步 / 時間 T」語境裡的 T＝時間/回合。\n     看到 T 先看它鄰居是「報酬」還是「次數」。\n\nn, m —— 玩家數 n、選項數 m，但 m 在 ch16 另有身分：                  ch15/ch16\n     ch15 投票：n＝投票者數、m＝選項數（Arrow 門檻是 m≥3）。\n     ch16 公共財：n＝參與人數，但 m＝「公共池的放大倍數」（投 1 元\n     變 m 元再均分），困境條件是 1<m<n。同一個 m，投票裡數選項、\n     公共財裡是倍數。看到 m 先問：這是「幾個選項」還是「放大幾倍」？\n\nβ —— 本書：不公平趨避係數（ch12 最後通牒/信任賽局）。               ch12\n     β 越大＝越在意「自己吃虧」，回應者拒絕門檻越高。它是寫進效用\n     函數的偏好參數，不是機率、不是折扣。別和 δ（折扣）搞混：δ 管\n     「未來 vs 現在」，β 管「公平 vs 自利」。\n\n≻ —— 本書：偏好排序符號（ch15，A≻B＝此人偏好 A 勝過 B）。           ch15\n     它描述「一個人心裡的排序」，不是報酬比大小的 >。Condorcet 悖論\n     的環 A≻B、B≻C、C≻A 用的就是這個 ≻（社會偏好的循環）。\n```\n\n一句總結：**δ＝折扣因子、p*＝混合機率(ch05)或 ESS 比例(ch09)、V/C＝鷹鴿價值/成本、T＝誘惑報酬(多數)或時間(少數)、m＝選項數(ch15)或倍數(ch16)——同一符號的身分由「它在哪一章、它的鄰居是什麼」共同決定。** 跨到書架上別本書（混沌、機率、線代）要全部重新對表。\n\n---\n\n## 四、脊椎矩陣與關鍵定理條件速查\n\n每條先一句「它在說什麼」，再給形狀與數值，最後標章。這一節是全書「不得互相矛盾」的門檻數字濃縮——改任何一個都要 grep 全書同步（維護鐵律），所以查到的就是定案值。\n\n### 困境本身（ch01–ch02）\n\n```text\n它在說什麼：四個報酬的排序逼出「背叛是優勢策略、雙輸卻穩定」。\n困境不等式：  T > R > P > S    （5 > 3 > 1 > 0）\n重複可救：    2R > T + S       （6 > 5）\n唯一純策略納許均衡：(背叛,背叛)=(1,1)；集體最優 (合作,合作)=(3,3) 不是均衡。\n```\n\n### 納許均衡（ch02）\n\n```text\n它在說什麼：每個玩家的策略都是「對其他人當前策略」的最佳反應——\n            沒有人能「單方面」偏離而得益。穩定，不保證最優。\n判據：       一組策略是納許均衡 ⇔ 對每個玩家，固定別人不動，自己無更好選擇。\n存在定理：   每個有限賽局（允許混合策略）至少有一個納許均衡（Nash 1950/51，\n            靠 Kakutani 不動點）。不保證：唯一 / 純策略 / 對大家好 / 找得到。\n```\n\n### 優勢與劣勢（ch03）\n\n```text\n它在說什麼：嚴格優勢＝不管對方怎麼選都嚴格較好（每格 >）；\n            弱優勢＝每格不差（每格 ≥）且至少一格嚴格較好。\n嚴格優勢：  對手任一選擇，A 報酬 > B（每一格皆 >）。\n弱優勢：    每一格 A ≥ B，且至少一格 A > B。\nIESDS：     反覆消去嚴格劣勢策略，順序無所謂，存活集合唯一。\n```\n\n### 零和與極小極大（ch04）\n\n```text\n它在說什麼：一方所得＝另一方所失（每格報酬和為常數）；兩人零和有單一「值」v。\n極小極大定理（von Neumann 1928）：\n            兩人零和 + 允許混合策略 ⇒ max-min = min-max = v（賽局的值）。\n            永遠成立：max-min ≤ min-max；相等時的格子＝鞍點。\n硬邊界：    只對「兩人零和」成立。三人以上零和、或非零和，一般沒有單一 v。\n```\n\n### 混合策略（ch05）\n\n```text\n它在說什麼：沒有純策略均衡時要隨機化；你的機率由「對手的報酬」決定，\n            目的是讓對手對他的每個選項「無差異」（期望報酬相等）。\n求解關鍵：  令對手各選項期望報酬相等，解出「我方」的機率。\n脊椎特例：  配對銅板均衡 (p,q)=(½,½)；剪刀石頭布各招 ⅓；零和的值 v=0。\n```\n\n### 重複賽局：grim trigger（ch07）\n\n```text\n它在說什麼：未來夠長（δ 夠大）時，「背叛就被永遠報復」能讓合作站住。\n折現級數：  R + δR + δ²R + … = R/(1−δ)\n合作維持：  V_合作 = R/(1−δ) ≥ V_背叛 = T + δP/(1−δ)\n門檻：      δ ≥ (T−R)/(T−P) = (5−3)/(5−1) = 1/2\n```\n\n### tit-for-tat 與無名氏定理（ch08）\n\n```text\n它在說什麼：一報還一報（善良/可激怒/寬容/清晰）只罰一回合，所以門檻更高。\nTFT 門檻：  δ ≥ (T−R)/(R−S) = (5−3)/(3−0) = 2/3   ← 比 grim 的 1/2 高\n            （懲罰越輕、越寬容，越需要看重未來，門檻越高）\nfolk theorem：δ 夠接近 1 時，幾乎任何「可行且個人理性」的報酬（含合作 (3,3)）\n            都能撐成子賽局完美均衡——但「全程互背 (1,1)」也是均衡。\n            給可能性、不給保證。\n```\n\n### 演化穩定策略 ESS（ch09）\n\n```text\n它在說什麼：均衡不需要會算的玩家；天擇代替理性執行「最佳化」。\nESS 兩條件（S＝現任、T＝突變）：\n   條件一：E(S,S) > E(T,S)                              （嚴格較優）\n   條件二：若 E(S,S)=E(T,S)，則需 E(S,T) > E(T,T)       （打平就比反殺）\n   ⇒ ESS = 嚴格納許均衡，或「弱納許 + 對入侵者的反殺優勢」。每個 ESS 都是\n     納許均衡，反之不一定。\n鷹鴿 ESS：  p* = V/C（僅 C>V 時成立）；基準 V=2,C=4 → p*=½。\n脊椎入侵：  全合作族群裡 E(D,C)=5 > E(C,C)=3 ⇒ 合作不是 ESS、背叛是 ESS，\n            族群滾向 (1,1)——困境不需要壞人、甚至不需要人。\n```\n\n### 訊號賽局（ch11）\n\n```text\n它在說什麼：私有型別（H/L）靠「昂貴訊號」分離；高型別取得訊號比較便宜。\n單交叉條件：高型別取得同一訊號的成本 < 低型別的成本。\n分離均衡存在：訊號成本介於「真貨付得起」與「假貨付不起」之間；\n            低型別不冒充 ⇔ 其冒充成本超過冒充收益（教育例：L 成本 c≥6 才不冒充）。\n混同均衡：  成本太低時不同型別做相同選擇、觀察者無法區分，訊號失去區分力。\n```\n\n### 公平偏好（ch12）\n\n```text\n它在說什麼：把公平寫進效用，個體理性與集體理性反而「同向」（裂縫彌合）。\n回應者效用：U_B(接受) = b − β·max(a−b, 0)；U_B(拒絕) = 0\n            （b＝B 拿到、a＝A 拿到、β≥0＝不公平趨避係數）\n拒絕門檻：  β=0.5、總額 100 時 b=25（提議低於 25% 會被拒）；β 越大門檻越高。\n```\n\n### 機制設計與揭示原理（ch13）\n\n```text\n它在說什麼：反過來設計報酬，讓「自利」剛好導向你要的行為（誘因相容）。\n誘因相容：  把「說真話/好行為」設計成均衡。DSIC＝說真話是優勢策略（最強）；\n            貝氏誘因相容＝只在大家都誠實的均衡裡最佳（較弱）。\n揭示原理：  任何複雜機制能達成的結果，都有一個「說真話是最佳」的直接機制能達成。\n            ⇒ 搜尋空間塌縮到「誠實直接機制」；不可能性證明變乾淨。\n脊椎救援：  背叛扣罰則 f；合作變優勢策略的門檻 f ≥ max(T−R, P−S) = T−R = 2\n            （binding 的是 T−R；少於門檻則無效，困境照舊）。\n```\n\n### 拍賣（ch14）\n\n```text\n它在說什麼：第二價格把「贏不贏」和「付多少」解耦，於是照實出價成優勢策略。\n維克里（Vickrey 1961）：最高者得標、付「第二高出價」。\n            出價 bᵢ 只決定贏不贏、不決定付多少（付的是別人的價）。\n            ⇒ 照實出價 bᵢ=vᵢ 是（弱）優勢策略；報酬 uᵢ＝得標時 vᵢ−p、否則 0。\n策略等價：  英式 ≈ 第二價格；荷式 ≈ 第一價格（獨立私有價值下）。\n收益等價：  四種拍賣賣方期望收益相同——但要風險中立+獨立私有價值+對稱+\n            付款只依出價。前提一破（如風險趨避、共同價值）就垮。\n贏家詛咒：  只在「共同價值」發生（得標＝你最高估），私有價值的維克里裡不存在。\n```\n\n### 投票與不可能定理（ch15）\n\n```text\n它在說什麼：把多份個體排序聚合成公平的集體排序——Arrow 證明這做不到。\nCondorcet 悖論：個體偏好都遞移，多數決卻可能循環（A≻B、B≻C、C≻A）。\nArrow 四條件（選項 m≥3 時不可兼得）：\n   ① 無限制定義域  ② 帕累托（全體一致不可推翻）\n   ③ 無關選項獨立性 IIA（A 對 B 的排序不受第三選項影響）\n   ④ 非獨裁\n   ⇒ 要 ①②③ 就必是獨裁；要非獨裁就得犧牲前三之一。\nGibbard–Satterthwaite：選項 m≥3 時，任何非獨裁、每選項可勝的確定性投票規則，\n            都可被謊報操弄——誠實不可能是優勢策略（與拍賣相反）。\n```\n\n### 公共財與共有財（ch16）\n\n```text\n它在說什麼：N 人版囚徒困境；好處歸己、壞處攤給全體，搭便車隨 n 惡化。\n困境條件：  公共池倍數 1 < m < n（投錢對集體有利 m>1、但個人虧本 m<n）。\n個人淨損失：1 − m/n（n→∞ 時趨近 1，搭便車誘惑爆炸）；\n            基準例 n=3, m=2 → 投 1 元拿回 2/3，淨虧 1/3。\n```\n\n---\n\n## 五、各章「招牌數字」一覽\n\n下表把全書最常被引用、最不能填錯的數字收成一張。數學恆真項不會過時；標 ⚠️ 者隨研究/環境演進，以 landscape 為準。\n\n```text\n脊椎報酬          T,R,P,S = 5,3,1,0      困境 T>R>P>S；重複條件 2R>T+S=6>5    ch01\n混合均衡          配對銅板 (½,½)；剪刀石頭布各 ⅓    零和的值 v=0           ch05\ngrim 門檻         δ ≥ (T−R)/(T−P) = 1/2            永遠報復、門檻較低       ch07\nTFT 門檻          δ ≥ (T−R)/(R−S) = 2/3            只罰一回合、門檻較高     ch08\nAxelrod 錦標賽    第一場 14 支、對戰 200 回合       tit-for-tat 兩屆奪冠     ch08\n鷹鴿 ESS          V=2, C=4 → p*=V/C=1/2            僅 C>V 成立             ch09\n鷹鴿（C=3 例）    V=2, C=3 → p*=V/C=2/3            成本越低、鷹比例越高     ch09\n公平拒絕門檻      β=0.5、總額 100 → 拒絕門檻 b=25   β 越大門檻越高          ch12\n機制罰則門檻      f ≥ max(T−R,P−S)=T−R=2           少於門檻則完全無效       ch13\nPoA（Pigou 線性） PoA = C(1)/C(½) = 1/(3/4) = 4/3 ≈ 1.33   自私比最優差 33%  ch17\nArrow / G–S 門檻  選項 m ≥ 3                        三選項以上才出毛病       ch15\n\n時效/史實項（以 landscape 為準）\n  諾貝爾經濟學獎   Nash/Harsanyi/Selten 1994、Vickrey 1996、Arrow 1972、\n                  Hurwicz/Maskin/Myerson 2007（皆「瑞典央行紀念諾貝爾經濟學獎」俗稱）\n  tit-for-tat 穩健性 ⚠️  「穩健 ≠ 萬能」：勝負依對手池與環境；Press–Dyson 2012\n                        證明沒有萬能策略（見 ch08 hedge）\n```\n\n兩個一眼防呆：\n\n```text\n• grim 1/2 與 TFT 2/3 是「不同策略的不同門檻」，不是同一個數——分母不同：\n  grim 用 (T−P)（永遠懲罰）、TFT 用 (R−S)（只罰一回合）。算 δ 門檻前先問\n  「這個策略懲罰多久」。\n• p*=V/C（鷹鴿）只在 C>V 時有效；V≥C 時硬套會算出 ≥1 的無效比例。\n  同理 ESS 的 p* 與 ch05 混合均衡的 p* 是「比例」與「機率」兩件事，別對調。\n```\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 詞彙表", "md": "# 附錄 B — 詞彙表\n\n這本書每個關鍵詞，一句白話定義加上它第一次正式登場的章。定義抓直覺、不照抄正文長段；要看完整的來龍去脈與 worked example，去括號裡標的那一章。中英並列，方便你查原文文獻時對得上號。排序按全書的五條脈絡分組，不按筆畫——相鄰的詞彼此呼應，查一個常會順手看懂旁邊那個。\n\n最容易彼此混淆的幾組，先放一張對照表壓在前面（這幾組分不清，正是「直覺的陷阱」最常出事的地方）：\n\n```text\n最易混淆的成對術語（左右兩欄是兩回事，別當同一件）\n─────────────────────────────────────────────────────────────────\n納許均衡            vs   集體最優\n（沒人想單方面改＝穩定）   （對所有人都最好＝最優）\n囚徒困境的背叛是均衡卻不是最優——納許≠最優是全書第一刀。\n─────────────────────────────────────────────────────────────────\n優勢策略            vs   納許均衡\n（不管對方怎麼選都最好）    （彼此互為最佳反應）\n優勢策略一定構成納許均衡；納許均衡不一定來自優勢策略。\n─────────────────────────────────────────────────────────────────\n混合策略            vs   混同均衡\n（在純策略上放機率分布）    （不同型別選一樣的動作、資訊沒揭示）\n一個是 ch05 的隨機化，一個是 ch11 的訊號賽局結果，只是名字像。\n─────────────────────────────────────────────────────────────────\n分離均衡            vs   混同均衡\n（不同型別做不同選擇、可反推） （不同型別做相同選擇、反推不出）\n訊號賽局的兩種結局，差在「行為有沒有把私有資訊洩出來」。（見 ch11）\n─────────────────────────────────────────────────────────────────\n私有價值            vs   共同價值\n（各人主觀、互不影響）     （同一個客觀未知真值、大家在搶它）\n贏家詛咒只活在共同價值拍賣裡，私有價值不會中詛咒。（見 ch14）\n─────────────────────────────────────────────────────────────────\n極小極大            vs   逆向歸納\n（兩人零和、找安全水準）    （序貫賽局、從最後一步倒推）\n都是「先想最壞／最後」的逆向思考，但用在完全不同的賽局結構。\n─────────────────────────────────────────────────────────────────\n```\n\n## 賽局的基本零件\n\n把一個會互相反應的局面拆成可分析的零件——誰在玩、能選什麼、選了會怎樣。這組詞是全書共用的詞彙地基。\n\n**賽局（game）**：一個有多名玩家、各自有策略、結果由所有人選擇共同決定的互動局面；本書統一用「賽局」不用「博弈」。（ch01）\n\n**玩家（player）**：賽局裡會做選擇、且在意結果的決策主體；可以是人、公司、國家、物種，甚至程式。（ch01）\n\n**策略（strategy）**：玩家在賽局中可採取的完整行動方案；單回合賽局裡就是一個動作，多回合裡是「看到什麼就做什麼」的整套規則。（ch01）\n\n**報酬（payoff）**：某個結果對某個玩家的價值；不是只有錢，是把所有在意的東西折算成的效用數字。（ch01）\n\n**報酬矩陣（payoff matrix）**：把兩個會互相反應的玩家的選擇與結果畫成一張表，每格放（我方報酬, 對方報酬）；全書脊椎就是這樣一張表。（ch01）\n\n**合作與背叛（cooperate / defect）**：囚徒困境裡的兩個純策略選項，泛指「遵守協議」與「違背協議謀私利」這對普遍對立。（ch01）\n\n**囚徒困境（prisoner's dilemma）**：報酬排序 T>R>P>S 的賽局，每人選背叛是優勢策略，雙方卻一起落到比雙方合作更糟的結果。（ch01）\n\n**純策略（pure strategy）**：玩家確定地選某一個動作，不摻隨機（相對於 ch05 的混合策略）。（ch02）\n\n## 均衡與最佳反應\n\n賽局理論的核心問句：給定大家都理性，會停在哪裡？這組詞圍繞「最佳反應」這個齒輪，組裝出納許均衡這個全書最重要的概念。\n\n**最佳反應（best response）**：固定住所有對手的選擇後，能讓自己報酬最大的那個（些）策略——納許均衡的基本齒輪。（ch02）\n\n**納許均衡（Nash equilibrium）**：一組策略，其中每個玩家的策略都是對其他人當前策略的最佳反應，沒人能靠單方面改變自己而獲益。（ch02）\n\n**穩定 vs 最優（stable vs optimal）**：納許均衡只保證「沒人想單方面改」（穩定），不保證「對所有人都最好」（最優）；兩者的裂縫是全書第一刀。（ch02）\n\n**優勢策略（dominant strategy）**：不管對方怎麼選都比你其他策略好的策略，讓你完全不必猜對手；嚴格優勢要求每種情況都嚴格更好，弱優勢允許某些情況平手。（ch01／ch03）\n\n**劣勢策略（dominated strategy）**：存在另一個策略總是不差於它、且某些情況更好，因此理性玩家不該選它。（ch03）\n\n**反覆消去嚴格劣勢策略（iterated elimination of strictly dominated strategies, IESDS）**：逐輪砍掉被嚴格支配的策略，直到砍不動為止，藉此縮小賽局範圍。（ch03）\n\n**可理性化（rationalizable）**：一個策略在某個合理信念下是最佳反應，而那信念只放在對手同樣可理性化的策略上，如此遞迴。（ch03）\n\n**共同知識（common knowledge）**：「我理性、我知道你理性、你知道我知道……」這條無窮鏈；IESDS 第二輪起就靠它撐住。（ch03）\n\n## 零和、混合與隨機化\n\n當賽局沒有純策略的穩定點，理性的出路是「讓對手猜不到」。這組詞處理對抗最尖銳的零和情形，與「故意隨機」這個反直覺的理性。\n\n**零和賽局（zero-sum game）**：每格所有玩家的報酬加起來都等於同一個常數，一方的贏恰好是另一方的輸；是賽局的特例不是常態。（ch04）\n\n**極小極大（minimax / max-min）**：假設對手會把你壓到最慘——先對每個策略找它的最壞情況，再在所有最壞情況裡挑最好的。（ch04）\n\n**安全水準與安全策略（security level / safe strategy）**：一個策略保證你至少能拿到的報酬，以及提供這個保證的策略。（ch04）\n\n**極小極大定理（minimax theorem）**：兩人零和賽局裡，允許混合策略時 max-min = min-max，這個共同數字叫賽局的值 v；只在兩人零和成立。（ch04）\n\n**鞍點（saddle point）**：純策略就能達到賽局值的點（max-min = min-max）；不等時才非得隨機化。（ch04）\n\n**混合策略（mixed strategy）**：在自己的純策略集合上放一個機率分布，按機率隨機選——用「猜不到」換不吃虧。（ch05）\n\n**無差異條件（indifference condition）**：混合均衡的核心——我的混合機率要讓對手在他的選項間無差異，他的機率也讓我無差異，誰都沒有偏離的理由。（ch05）\n\n## 時間、序貫與承諾\n\n把賽局攤開在時間軸上，誰先動、看得到什麼，會徹底改變結局。這組詞處理序貫結構，以及「主動綁住自己」這個反直覺的力量。\n\n**賽局樹／展開式（game tree / extensive form）**：用樹狀圖表示有時間順序的賽局，節點是決策點、分支是可選行動、葉是報酬；本書用「展開式」不用「擴展式」。（ch06）\n\n**序貫賽局（sequential game）**：玩家有先後順序輪流出手，後手能看到前手的選擇（相對於同時出手）。（ch06）\n\n**完全資訊（perfect information）**：每個輪到動的玩家都能看見此前發生過的一切。（ch06）\n\n**逆向歸納（backward induction）**：從賽局樹最後一步倒著往前推，每步讓該玩家選對自己報酬最大的分支。（ch06）\n\n**子賽局完美均衡（subgame-perfect equilibrium, SPE）**：不只整局穩定，還在每一個子賽局（包括走不到的分支）裡都站得住腳的均衡。（ch06）\n\n**可信威脅 vs 空洞威脅（credible / empty threat）**：可信威脅是真要執行時威脅方確實願意執行；空洞威脅一旦真要執行、威脅方自己更慘，因此沒人信。（ch06）\n\n**承諾（commitment）**：主動砍掉自己的某些選項，藉此改變對方的最佳反應、反而改善自己的結果——綁住自己是一種力量。（ch06）\n\n## 重複、聲譽與演化\n\n一次性的背叛困境，被「未來」與「演化」兩把鑰匙撬開。這組詞解釋合作如何不靠善意、而靠重複互動或天擇被支撐起來。\n\n**重複賽局（repeated game）**：同一張賽局矩陣玩很多次，每回合的選擇會影響後面的關係。（ch07）\n\n**階段賽局（stage game）**：被一遍遍重複堆疊的那個基本賽局單位，對應單一回合。（ch07）\n\n**折扣因子（discount factor, δ）**：0 ≤ δ < 1，表示下一回合報酬在今天眼裡值多少，也可解讀成關係再延續一回合的機率。（ch07）\n\n**未來的陰影（shadow of the future）**：δ 夠大時，未來的報酬重到足以壓制當下背叛的誘惑——合作能不能維持，看這道陰影夠不夠長。（ch07）\n\n**grim trigger（冷酷觸發）**：第一回合合作，但對方只要背叛過一次，就永遠背叛、永不原諒的觸發策略。（ch07）\n\n**散開／瓦解（unraveling）**：有限次重複裡，合作從最後一回合開始崩、像拉鍊逆向一路崩回第一回合的推理。（ch07）\n\n**一報還一報／以牙還牙（tit-for-tat）**：第一回合合作，之後每回合照抄對手上一回合的動作——即報即寬恕；強但不是最強。（ch08）\n\n**無名氏定理（folk theorem）**：無限重複且玩家夠有耐心時，幾乎任何「可行且個人理性」的報酬都能被支撐成均衡——合作能成立但不是必然。（ch08）\n\n**演化賽局（evolutionary game theory）**：把賽局搬進族群——玩家變個體、策略變表現型、報酬變適存度、理性比較變天擇，均衡不需要聰明玩家。（ch09）\n\n**演化穩定策略（evolutionarily stable strategy, ESS）**：某種行為比例一旦普及，就擋得住任何初始稀少的突變入侵的均衡；是演化篩出來的、不是算計出來的。（ch09）\n\n**複製者動態（replicator dynamics）**：適存度高於族群平均的型別比例上升、低於平均的下降，描述族群沿演化軌跡滾動的方式。（ch09）\n\n**鷹鴿賽局（hawk–dove game）**：同種動物爭資源的經典演化賽局，鷹拚到底、鴿子虛張聲勢，ESS 是兩者按一定比例混合。（ch09）\n\n## 協調、訊號與不對稱資訊\n\n當均衡太多、或一方握有對方不知道的祕密，難題從「對抗」變成「對焦」與「取信」。這組詞處理協調與資訊不對稱。\n\n**協調賽局（coordination game）**：有多個一樣好、且利益一致的均衡；難的不是均衡爛，是均衡太多、選不出來。（ch10）\n\n**謝林點／焦點（focal point / Schelling point）**：多均衡時人們不約而同收斂到的那個解——靠顯著、自然或文化共識脫穎而出，不是算出來的。（ch10）\n\n**不對稱資訊（asymmetric information）**：一方知道一件與報酬有關、對方不知道的事實（私有資訊或「型別」）。（ch11）\n\n**型別（type）**：私有資訊的內容，例如「高能力」或「低能力」，只有當事人自己知道。（ch11）\n\n**訊號（signaling）**：握有私有資訊的一方，用一個「只有真貨付得起、假貨付不起」的成本來可信地傳遞自己的型別。（ch11）\n\n**昂貴訊號（costly signal）**：要能有效分離型別的訊號，偽造它對假貨必須比對真貨更昂貴——成本本身就是可信度。（ch11）\n\n**分離均衡（separating equilibrium）**：不同型別做出不同的可觀察選擇，觀察者因此能從行為反推型別。（ch11）\n\n**混同均衡（pooling equilibrium）**：不同型別做出相同選擇，觀察者無法從行為區分型別，私有資訊沒被揭示。（ch11）\n\n**逆選擇（adverse selection）**：缺乏訊號機制時，好的一方因無法可信地證明品質而退出市場，最後只剩爛貨。（ch11）\n\n**檸檬市場（market for lemons）**：Akerlof 的二手車模型，演示資訊不對稱如何讓本可雙贏的市場崩潰。（ch11）\n\n## 人類實際怎麼玩\n\n實驗室裡的真人，不照「純自利」的劇本走。這組詞捕捉報酬矩陣外、卻真實影響結局的偏好。\n\n**公平偏好（fairness preference）**：人不只在意自己拿多少，也在意分得公不公平——不公平本身會降低效用。（ch12）\n\n**不公平趨避（inequity aversion）**：對「分配不均」反感的傾向，連自己拿太多也會不舒服；公平偏好的一種形式化。（ch12）\n\n**最後通牒賽局（ultimatum game）**：兩人分一筆錢，提議者出分法、回應者只能接受（按分法拿）或拒絕（雙方都歸零）。（ch12）\n\n**信任賽局（trust game）**：投資者可投一筆錢給對方（途中乘三倍），對方自由決定回送多少——衡量信任與互惠。（ch12）\n\n**互惠（reciprocity）**：以善意回報善意、以惡意回報惡意的傾向，是合作與信任在真人身上能成立的支柱之一。（ch12）\n\n## 機制設計與拍賣\n\n把賽局理論反過來用：不問「給定規則會怎樣」，而問「想要這個結果，該設計什麼規則」。這組詞是「反向賽局論」的工具箱。\n\n**機制設計（mechanism design）**：先有想要的結果，反推出該設計什麼報酬規則，讓理性玩家的自利行為自動導向它——反向賽局論。（ch13）\n\n**揭示原理（revelation principle）**：任何複雜機制能達成的結果，都能用一個「直接、且讓說真話變成最佳策略」的機制達成；本書用「揭示」不用「顯示」。（ch13）\n\n**誘因相容（incentive compatibility）**：把規則設計成「玩家追求自利時，照實揭露私有資訊正好是他的最佳選擇」。（ch13）\n\n**優勢策略誘因相容（dominant-strategy incentive compatible, DSIC）**：不管別人怎麼報，說真話都是你最好的選擇——最強的一種誘因相容。（ch13）\n\n**直接機制（direct mechanism）**：最樸素的機制——玩家直接把私有資訊報給設計者，設計者依申報直接定結果。（ch13）\n\n**拍賣（auction）**：透過競價把資源分配給最珍視它的人的機制。（ch14）\n\n**估值 vs 出價（valuation / bid）**：估值是這件東西在你心中真值多少（私有資訊）；出價是你實際提交的價，兩者可以不相等（那正是策略）。（ch14）\n\n**第一價格拍賣（first-price sealed-bid auction）**：每人密封出價，最高者得標，付自己的出價——所以要刻意壓低出價。（ch14）\n\n**第二價格／維克里拍賣（second-price / Vickrey auction）**：每人密封出價，最高者得標但只付第二高的價；說真話（出價=估值）是優勢策略。（ch14）\n\n**誠實防作弊（strategy-proof）**：機制設計成說真話永遠是優勢策略，沒人有誘因說謊——維克里拍賣的招牌性質。（ch14）\n\n**收益等價定理（revenue equivalence theorem）**：在一組理想條件下，四種基本拍賣給賣方帶來的期望收益完全相同。（ch14）\n\n**私有價值 vs 共同價值（private / common value）**：私有價值是各人主觀、互不影響的估值；共同價值是大家在搶同一個客觀但未知的真值。（ch14）\n\n**贏家詛咒（winner's curse）**：共同價值拍賣裡，「你得標」這件事本身就暗示你的出價高過所有人，最可能高估了真值。（ch14）\n\n## 集體選擇與公共困境\n\n從個人理性放大到「一群人怎麼一起決定、一起分擔」，會撞上幾道結構性的不可能與悲劇。這組詞是全書尺度最大的應用。\n\n**社會福利函式（social welfare function）**：把每個人的偏好排序吃進去，吐出一份集體排序的函式。（ch15）\n\n**Condorcet 悖論（Condorcet paradox）**：每個人的偏好都遞移，多數決聚合出來的集體偏好卻循環（A>B>C>A）。（ch15）\n\n**Arrow 不可能定理（Arrow's impossibility theorem）**：選項三個以上時，沒有任何社會福利函式能同時滿足「無限制定義域、帕累托、無關選項獨立性、非獨裁」四個合理條件。（ch15）\n\n**無關選項獨立性（independence of irrelevant alternatives, IIA）**：集體在 A、B 之間怎麼排，只能取決於每人對 A、B 這一對的相對偏好，跟大家怎麼看 C 無關。（ch15）\n\n**帕累托原則（Pareto principle）**：如果每一個人都偏好 A 勝過 B，那集體排序也必須 A 勝過 B。（ch15）\n\n**非獨裁（non-dictatorship）**：不存在某個投票者，使集體排序永遠等於這個人的偏好。（ch15）\n\n**策略性投票（strategic voting）**：不投自己真正最愛的選項，改投一個「比較可能贏、又比最討厭的好」的妥協選項。（ch15）\n\n**Gibbard–Satterthwaite 定理（Gibbard–Satterthwaite theorem）**：選項三個以上時，任何「非獨裁、每個選項都可能勝出」的投票規則，都能被某人靠謊報偏好操弄。（ch15）\n\n**共有財悲劇（tragedy of the commons）**：每個牧人都理性地多養牛，所有人加起來卻把共有草原啃到崩潰——個體理性的集體災難。（ch16）\n\n**公共財賽局（public goods game）**：n 人各有私錢，選擇投入公共池或自己留著；池子乘以倍數後平分給全部人。（ch16）\n\n**搭便車（free-riding）**：享受公共財帶來的好處、卻不付出貢獻代價的行為。（ch16）\n\n**開放取用（open access）**：資源無主、無規則、向所有人開放且無人管理的狀態——共有財悲劇的溫床。（ch16）\n\n## 無所不在的賽局\n\n最後把整套語言放回現實——路由、軍備、市場競爭，全是同一張矩陣的變形。\n\n**無政府狀態的代價（price of anarchy, PoA）**：自私均衡下的社會成本，比上一個全知排程器能達到的最優成本，這個比值衡量「各自為政」貴了多少。（ch17）\n\n**自私路由（selfish routing）**：每個節點各自選對自己延遲最低的路徑，加起來卻可能讓全域配置次於最優。（ch17）\n\n**Cournot 競爭（Cournot competition）**：廠商各自選產量、市場價格由總產量決定；納許均衡落在合謀壟斷與完全競爭之間。（ch17）\n\n**Bertrand 競爭（Bertrand competition）**：廠商各自選價格、消費者全去買便宜的；兩家同質產品就足以把價格壓到成本價。（ch17）\n\n**Bertrand 悖論（Bertrand paradox）**：寡占市場裡只要有兩家廠商競價，就能把價格壓到邊際成本、利潤歸零。（ch17）\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 閱讀地圖", "md": "# 附錄 C — 閱讀地圖\n\n> **這份附錄做什麼**：把全書攤成一張地圖，再給你幾條依興趣的捷徑、一份指向書架鄰書的跨書連結、以及一份去重後的延伸閱讀總清單。你不必從 ch01 一路爬到 ch18——這裡告訴你：想懂某件事，該走哪幾章；讀完某章想往外走，該翻哪本姊妹書、哪篇原始論文。\n\n## 全書地圖重述\n\n下面這張圖你在每個 Part 首章（ch01／ch04／ch07／ch10／ch13／ch15）都見過一次（「◄ 你在這裡」逐 Part 往下移）。這裡把它完整攤開，當作整本書的索引：\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n這本書的脊椎，是同一張囚徒困境報酬矩陣（T,R,P,S = 5,3,1,0，點數越大越好）。它在每個 Part 換一張臉，被重看七層——ch18 把這七層攤成一張對帳表，那就是全書的終點口試：\n\n```text\n脊椎七層：同一張 (5,3,1,0)，七種眼光，七種結局\n\n  第一層  ch01  優勢策略     背叛嚴格優勢 ⇒ (1,1)；困境誕生\n  第二層  ch02  納許均衡     (D,D) 是唯一純策略 NE；穩定≠最優\n  第三層  ch04  零和對照     四格和不固定 ⇒ 非零和；裂縫是非零和才有的\n  第四層  ch07  重複救援     δ≥1/2（grim）合作可維持；未來鬆動困境\n  第五層  ch08  folk thm     δ≥2/3（TFT）；合作可為均衡、非必然\n  第六層  ch09  演化 ESS     無外力背叛入侵、是 ESS；均衡不需理性玩家\n  第七層  ch13  機制設計     改報酬把 (3,3) 變成均衡；反過來縫合\n```\n\n同一道裂縫，七種長相，從「誕生」（個體理性逼出困境）走到「縫合」（機制設計反過來救它）。整本書其實只在問一句話：**每個人都最佳化自己，為什麼結果可能對所有人都更糟——而我們有哪幾把救火的工具。** 答案是四把：重複、聲譽、演化、機制設計。\n\n## 依興趣的選讀路徑\n\n不想 18 章順著爬？下面四條捷徑各帶你去一個明確的目的地。每條都自成一個故事，讀完那幾章就夠回答標題那個問題。\n\n```text\n路徑 A：只想懂「囚徒困境為什麼讓雙方都輸」\n   ch01 → ch02 → ch04 → ch18\n   先讀懂報酬矩陣、用優勢策略逼出 (1,1) 的雙輸困境（ch01），\n   再把它正名成納許均衡「穩定≠最優」（ch02），\n   接著破除「賽局＝零和」的誤解——困境根本不是零和、雙方本可雙贏（ch04），\n   最後在收官章把同一張矩陣看完整七層（ch18）。最短的「懂困境」路線。\n\n路徑 B：想懂「合作如何在一群利己者裡演化出來」\n   ch07 → ch08 → ch09\n   先給困境一個未來——重複互動讓背叛會被未來懲罰、解出 δ 門檻（ch07），\n   看一報還一報如何贏得 Axelrod 錦標賽、folk theorem 把「合作可為均衡」\n   一般化（ch08），再把策略放進演化族群、看 ESS 如何讓均衡不需要會算的\n   玩家（ch09）。三章看完「合作的考古學」整個 Part。\n\n路徑 C：想懂「拍賣與機制設計」（反過來設計賽局）\n   ch13 → ch14 → ch15\n   先翻轉視角——不是給定賽局求結局，而是設計報酬規則讓理性自動導向好結果\n   （ch13），看維克里第二價格拍賣如何把「說真話」設計成優勢策略（ch14），\n   再到反面——Arrow 不可能定理告訴你有些設計目標根本辦不到、投票沒有\n   完美規則（ch15）。讀完你會懂「能誘導誠實」與「不可能誠實」的分界。\n\n路徑 D：想懂「個體理性如何引爆集體災難」（中央張力一條龍）\n   ch01 → ch07 → ch16 → ch18\n   困境在一張 2×2 矩陣裡誕生（ch01），重複互動給它第一線生機（ch07），\n   把它放大到 n 人——共有財悲劇與搭便車（ch16），最後總對帳：個體理性\n   ⇒ 集體次優的裂縫，與四把救火工具（ch18）。這條沿著全書中央張力走一遍。\n```\n\n四條路徑彼此有重疊（ch01 同時是 A 和 D 的起點、ch18 是 A 和 D 的終點），那是刻意的——它們交會的地方，就是全書反覆叩問的那條中央張力：**個體理性與集體理性如何在同一張矩陣裡分裂。** 讀完任一條想再往深走，順著地圖把缺的 Part 補回來即可。\n\n## 跨書連結整理\n\n本書是「推理六書」之一，書架上有幾本相鄰的姊妹書。本書遇到它們的主場時點到為止、把深度指過去。下面按主題整理「哪一章的哪件事，該往哪本書補」。格式照全書慣例——**主題式帶過、不寫死他書的章號**。\n\n```text\n主題                              本書出現處            指向\n────────────────────────────────  ──────────────────  ──────────────────────\n單人理性、期望效用、              ch01 ch03 ch06       《在不確定中下注》\n效用為什麼不等於金額              ch10 ch12 ch13\n（玩家「替自己選最佳」的內核）     ch14 ch15 ch16\n\n混合策略的期望報酬運算、          ch05 ch09 ch14       《馴服隨機》\n機率分布與期望值、條件期望         ch16\n（族群比例當分布、贏家詛咒）\n\n策略情境下的非理性偏好、          ch12 ch16            《思考的陷阱》\n公平／互惠／憤怒的心理機制\n（為什麼人會拒絕白拿的錢）\n\n向量／序的結構、特徵值            ch15（順帶）         《矩陣是動詞》\n（多份排序聚合、演化動態穩態）\n```\n\n- **單人理性 ↔ 賽局是同一枚硬幣兩面**（三大招牌跨書連結之首）。本書從頭到尾假設玩家會「為自己選最佳」，但「**一個人在不確定下到底怎麼算最佳、效用為什麼不等於金額**」是單人決策的地盤，由《在不確定中下注》擁有；本書只在「另一個理性主體會對你的選擇反應」時才接手。ch01／ch03 在「先把單人理性講清楚」處明寫承襲自它；ch06 序貫賽局的單人選擇、ch10 協調賽局裡「該賭哪個均衡」、ch12 最後通牒賽局的規範基準、ch13 機制設計裡玩家的最佳申報、ch14 拍賣裡「該出多少」與風險趨避（風險趨避正是第一價格收益更高、收益等價失效的原因）、ch15 投票者「謊報是否划算」、ch16 公共財貢獻決策——全都把單人理性那一面指向它。（見《在不確定中下注》談期望效用／單人理性那本。）\n\n- **機率機制**——期望值「怎麼算」、混合策略的期望報酬運算、ESS 族群比例當作機率分布、隨機化、條件期望——由《馴服隨機》擁有。ch05 混合策略算期望報酬、ch09 演化族群比例當分布、ch14 贏家詛咒裡「在我贏的條件下重估真值」的條件期望、ch16 共有財代價的機率性分攤，全把「期望值機制」指過去、只用結果。（見《馴服隨機》ch08 期望值那章——此章號已驗證對齊。）\n\n- **非理性偏好的心理機制**——策略情境下人為什麼會在乎公平、為什麼憤怒、為什麼互惠——由《思考的陷阱》擁有。ch12 最後通牒／信任賽局、ch16 搭便車與公共財貢獻，本書只用它說明「報酬矩陣裡的數字不只有金錢、公平與聲譽也算數」，背後的認知與情緒驅動推理指過去。（見《思考的陷阱》談認知與情緒驅動推理那本。）\n\n- **向量與特徵值**（弱連結）。當 ch15 把多份偏好排序看成資料、聚合的穩定性涉及序與向量結構時，可順帶翻《矩陣是動詞》談序與結構那部分；演化動態（ch09）若深究 replicator 收斂與馬可夫鏈穩態，特徵值的演算法也在那本。本書一律點到為止、不展開。（見《矩陣是動詞》談特徵值那層。）\n\n## 延伸閱讀總清單（去重）\n\n把全書 18 章的 `## 延伸閱讀` 彙整成一份分類總表。同一來源在多章出現的只列一次（標明它服務哪些章），每條一句話講「為什麼值得讀、讀哪一段」。指向本書其他章的內部連結與上面已整理的跨書指引，這裡不重複收。去重後共 **56 條**外部來源。\n\n### 哲學與概念錨點（最該先讀）\n\n- **史丹佛哲學百科〈Prisoner's Dilemma〉**（plato.stanford.edu/entries/prisoner-dilemma/）—— 全書最該先收藏的一篇外部資料，貫穿 ch01／ch02／ch03／ch04／ch07／ch08／ch10／ch17／ch18。它是脊椎那張矩陣的權威傳記：Flood–Dresher 造結構、Tucker 編囚犯故事、「穩定≠最優」「困境為何不是零和」「重複下的 unraveling」「folk theorem 的精確邊界」「tit-for-tat 為何非萬能」全部講得最嚴謹也最誠實。讀哪一段看你在哪一章卡住，章章都有對應節。\n- **史丹佛哲學百科〈Game Theory〉**（plato.stanford.edu/entries/game-theory/）—— 服務 ch03／ch05／ch06／ch11。找「dominance／iterated elimination／rationalizability」（接 ch03 共同知識那坑）、「mixed strategies」（混合策略到底在說玩家做了什麼，ch05 沒空展開的詮釋爭議）、「games of incomplete information／backward induction」（ch06 逆向歸納悖論、ch11 分離/混同均衡的形式定義）幾節。\n- **史丹佛哲學百科〈Evolutionary Game Theory〉**（plato.stanford.edu/entries/game-evolutionary/）—— 服務 ch09。把 ESS、replicator dynamics 與納許均衡的精確關係講得最清楚的免費權威；想搞懂「ESS ⇒ 漸近穩定、反之不一定」那層，讀它的 replicator dynamics 一節。\n- **史丹佛哲學百科〈Arrow's Theorem〉**（plato.stanford.edu/entries/arrows-theorem/）—— 服務 ch13／ch15。四條件的精確陳述與完整證明思路（透過「決定性集合」收縮到獨裁者）；ch13 可先讀它預習「不可能性證明」怎麼跑，ch15 讀它補本章不展開的證明。哲學系寫的，但對工程師意外好讀。\n- **史丹佛哲學百科〈Voting Methods〉**（plato.stanford.edu）—— 服務 ch15。把多數決、Borda、Condorcet、即時排序複選（IRV）攤開比較，每個犧牲哪條 Arrow 條件講得很清楚；想知道「那我到底該用哪個投票規則」時讀它。\n- **史丹佛哲學百科，拍賣與機制設計／〈The Economics of Information〉相關條目**（plato.stanford.edu）—— 服務 ch14。把拍賣放進機制設計與誘因相容的脈絡，適合接著 ch13 讀，直覺優先、少公式。\n\n### 經典科普與通史（敘事版伴讀）\n\n- **William Poundstone《Prisoner's Dilemma: John von Neumann, Game Theory, and the Puzzle of the Bomb》（1992）**—— 服務 ch01／ch18。把囚徒困境的冷戰出身寫成一本好看的科普——RAND、馮紐曼、核戰略與這張矩陣的糾纏。想理解「為什麼一群數學家在 1950 年代的智庫裡會關心兩個囚犯」，這本是經典；ch18 談「困境是結構造的、跟人性無關」時它是最戲劇化的歷史註腳。\n- **Robert Axelrod《The Evolution of Cooperation》（1984）**—— 服務 ch08／ch09／ch18，本 Part 的源頭。讀前四章就夠：錦標賽怎麼辦、tit-for-tat 怎麼贏、四個性質怎麼來。ch09 的讀法是它的後半（把結果重讀成演化模擬）、ch18 的讀法是它的第一章與結論章（「合作如何在一群利己者中、無中央權威下浮現」這個原問句）。文字平易、幾乎不需要數學；若讀完全書只想再讀一本，是這本。\n- **Colin Camerer《Behavioral Game Theory》（2003）**—— 服務 ch12。把「真人怎麼玩賽局」整本講透的標準參考書；想系統性地知道公平、信任、有限理性怎麼修正標準預測，這是入口。\n\n### 奠基原始論文（招牌定理本尊）\n\n- **John Nash〈Non-Cooperative Games〉（*Annals of Mathematics* 54, 1951: 286–295）**—— 服務 ch02。納許均衡的原始論文，定義其實只佔幾頁、出奇地短；讀它感受「一個改寫一門學科的定義可以多麼樸素」。\n- **John von Neumann〈Zur Theorie der Gesellschaftsspiele〉（*Mathematische Annalen* 100, 1928: 295–320）**—— 服務 ch04／ch05。極小極大定理的原始論文（德文）。不必啃原文，但記住落點：**極小極大屬於 1928 這篇、不是 1944 那本《Theory of Games and Economic Behavior》**，且結論**只**對兩人零和成立。歷史背景可配 Privatdozent 的科普文（privatdozent.co/p/john-von-neumanns-minimax-theorem）。\n- **Maynard Smith & Price〈The Logic of Animal Conflict〉（*Nature* 246: 15–18, 1973）**—— 服務 ch09。ESS 的原始論文、鷹鴿賽局的出處；讀前兩頁就能看到「無法被入侵的策略」這個定義怎麼從動物打架的觀察長出來。（landscape 已驗證卷頁歸屬。）\n- **George Akerlof〈The Market for Lemons〉（*QJE* 84(3), 1970: 488–500）**—— 服務 ch11。逆選擇與市場崩潰的原始論文，短而經典；維基條目（en.wikipedia.org/wiki/The_Market_for_Lemons）把好車退場的螺旋講得很清楚，是理解「資訊不對稱如何絞殺市場」的最佳入口。\n- **Güth, Schmittberger & Schwarze〈An Experimental Analysis of Ultimatum Bargaining〉（*J. of Economic Behavior & Organization*, 1982）**—— 服務 ch12。最後通牒賽局的原始論文；想看「近半提議、低提議被拒」第一次被記錄下來的樣子，讀它的結果表。\n- **Berg, Dickhaut & McCabe〈Trust, Reciprocity, and Social History〉（*Games and Economic Behavior*, 1995）**—— 服務 ch12。信任／投資賽局的原始設計；讀它怎麼用「乘三倍＋自由回送」把抽象的「信任」變成可以拿尺量的錢。\n- **Vickrey〈Counterspeculation, Auctions, and Competitive Sealed Tenders〉（*Journal of Finance* 16(1), 1961: 8–37）**—— 服務 ch14。第二價格拍賣的原始論文、本章源頭；讀它對「誠實是優勢策略」與「英式≈第二價格、荷式≈第一價格」策略等價的原始論證（Vickrey 因此貢獻獲 1996 年諾貝爾經濟學獎，嚴格說是瑞典央行紀念獎）。\n- **Myerson〈Optimal Auction Design〉（*Mathematics of Operations Research* 6(1), 1981: 58–73）**—— 服務 ch14。收益等價定理與最適拍賣的奠基論文；數學偏重，但「收益由配置機率決定」這個核心洞見值得一讀（Myerson 因機制設計獲 2007 年諾貝爾經濟學獎）。\n- **Kenneth Arrow《Social Choice and Individual Values》（1951）**—— 服務 ch15。不可能定理的原典，薄薄一本。讀「導論」就值回票價：看一個經濟學家如何把「公平」這個含糊的詞逼成四條能被證偽的數學條件——這個「把直覺逼成精確規格」的動作本身就是本書教你的東西。\n- **Garrett Hardin〈The Tragedy of the Commons〉（*Science* 162, 1968: 1243–1248）**—— 服務 ch16。點燃整個領域的那篇原文，牧場寓言的結構之精準值得一讀；但帶著本章的 hedge——他的「commons」其實是無規則的 open access，「只能私有化或強管」的結論是過度推論。網路上有公開 PDF。\n\n### 進階論文與專題（想看硬核版）\n\n- **Bernheim（1984）／Pearce（1984）可理性化原始論文**—— 服務 ch03。「最佳反應算子的不動點」如何被正式定義成 rationalizability 的源頭；偏技術，當作概念地標即可。\n- **Gilboa, Kalai & Zemel〈On the Order of Eliminating Dominated Strategies〉（1990）**—— 服務 ch03。「嚴格優勢消去順序無所謂、弱優勢順序敏感」這條結論的代表來源；想看嚴格證明（合流性／Newman 引理）往這裡與 Apt 的後續工作找。\n- **Matthew Embrey, Guillaume Fréchette, Sevgi Yuksel〈Cooperation in the Finitely Repeated Prisoner's Dilemma〉**（faculty.econ.ucsb.edu/~sevgi/EmbreyFrechetteYuksel_June2017.pdf）—— 服務 ch07。半世紀「真人玩有限次重複囚徒困境」實驗的整理：真人不從第一局全背叛，但「首次背叛回合」隨經驗前移、趨勢確實朝 unraveling；本章 hedge 的依據。\n- **Press & Dyson〈Iterated Prisoner's Dilemma Contains Strategies That Dominate Any Evolutionary Opponent〉（*PNAS*, 2012）**—— 服務 ch08。「為什麼沒有萬能策略」的硬核版：zero-determinant 策略能單方面操控對手的長期報酬；摘要與引言就足以動搖「tit-for-tat 天下無敵」的迷思。\n- **〈Is Tit-for-Tat the Answer? On the Conclusions Drawn from Axelrod's Tournaments〉（*PLOS One*, 2015）**（journals.plos.org/plosone/article?id=10.1371/journal.pone.0134128）—— 服務 ch08。專門檢視「從 Axelrod 錦標賽到底能不能推出 tit-for-tat 最優」；讀討論一節，學會對「演化必然導向合作」這類大話保持戒心。\n- **Fudenberg & Maskin〈The Folk Theorem in Repeated Games with Discounting or with Incomplete Information〉（*Econometrica*, 1986）**—— 服務 ch08。folk theorem 帶折扣的一般化原典；技術性高，但想看「合作可為子賽局完美均衡」的嚴格條件（含三人以上的全維度條件），這是源頭。\n- **Henrich et al.（2001/2005）跨文化最後通牒賽局研究**（如 *Behavioral and Brain Sciences*〈Economic Man in Cross-Cultural Perspective〉）—— 服務 ch12。十五個小規模社會的對照；讀它你會徹底戒掉「實驗室數字是人類常數」的習慣，Machiguenga 那一段尤其打臉。（跨文化變異 2026-06 仍是活的研究。）\n- **Fehr & Schmidt〈A Theory of Fairness, Competition, and Cooperation〉（*QJE*, 1999）**—— 服務 ch12。本章玩具效用模型（不公平趨避）的嚴格版；想看「把公平寫進效用函數」怎麼被做成可預測多種賽局的模型，讀這篇，它是行為經濟學被引用最多的文獻之一。\n- **Edelman, Ostrovsky & Schwarz〈Internet Advertising and the Generalized Second-Price Auction〉（*American Economic Review*, 2007）**—— 服務 ch14。講清楚 Google 的 GSP 為什麼**不是**真正的維克里、為什麼它在多廣告位時不誘導誠實；把本章「直覺的陷阱」那條講透。\n- **John Ledyard〈Public Goods: A Survey of Experimental Research〉（收於 *Handbook of Experimental Economics*, 1995）**—— 服務 ch16。公共財賽局實驗研究的標準回顧；讀它五條核心發現（一次性比理論預測多貢獻、重複後搭便車增加、溝通與門檻促進合作、MPCR 越高合作越多）——正是 Ostrom 八原則在實驗室裡的量化版。\n\n### 教科書與標準教材（想要嚴格底子）\n\n- **Osborne & Rubinstein《A Course in Game Theory》第 3 章（混合策略均衡）**—— 服務 ch05。混合策略納許均衡的標準教科書處理，無差異條件與存在性都在這；Osborne 另有公開講義 PDF（economics.utoronto.ca/osborne/igt），第 4 章專講 mixed strategy equilibrium，免費、寫得清楚。\n- **任一本賽局理論入門教材的「zero-sum games and the minimax theorem」章**（如 Osborne《An Introduction to Game Theory》相關章）—— 服務 ch04。想看極小極大定理的不動點證明（本書只給直覺、不展開），這是嚴格版的去處；你會看到「max-min ≤ min-max、相等時是鞍點」這個直覺如何被嚴格化。\n- **Maynard Smith《Evolution and the Theory of Games》（1982）**—— 服務 ch09。把 1973 的點子擴成整本書，鷹鴿、性別比、動物溝通的訊號都在裡面；工程師讀法：當它是「把賽局理論當動力系統來用」的教材。\n- **Hurwicz & Reiter《Designing Economic Mechanisms》（2006）**—— 服務 ch13。Hurwicz 親自寫的機制設計教科書，把「資訊分散＋誘因」這個問題正式化的源頭；想看「反向賽局論」這個視角從哪來，讀前幾章導論。\n- **Vijay Krishna《Auction Theory》（Academic Press）**—— 服務 ch14。拍賣理論的標準研究所教材；想看本章「弱優勢策略」與「收益等價定理」的完整形式化證明、以及 Myerson 1981 最適拍賣，從這本入手。\n- **Mancur Olson《The Logic of Collective Action》（1965）**—— 服務 ch16。「為什麼大團體比小團體更難為共同利益行動」的奠基論述，跟本章「困境隨 n 惡化」直接呼應；想從政治經濟學角度看同一件事，讀前兩章。\n- **Elinor Ostrom《Governing the Commons》（1990）**—— 服務 ch16。反駁 Hardin 悲觀論的經典；讀她歸納的「八條設計原則」那章，把每一條讀成「它在拆公共財賽局的哪個困境前提」。這本讓她拿了 2009 年諾貝爾經濟學獎（經濟學獎首位女性得主）。\n- **Tim Roughgarden《Selfish Routing and the Price of Anarchy》（MIT Press）**—— 服務 ch17。自私路由與 PoA 的標準專著；想把本章 Pigou 例之外的一般界（線性延遲 PoA 上界 4/3 的證明、非線性情形）看清楚，從這裡入手。\n- **Noam Nisan et al.（編）《Algorithmic Game Theory》（Cambridge, 2007）**—— 服務 ch17。想再深入電腦科學×賽局（PoA、機制設計、拍賣的演算法面）的權威合集；本章只開了一扇窗，這本是整面牆。\n\n### 講義、訃聞與官方一手（核對史實與數值）\n\n- **NobelPrize.org，1994 經濟學獎 press release**（nobelprize.org/prizes/economic-sciences/1994/press-release/）—— 服務 ch02。Nash／Harsanyi／Selten 的官方頒獎詞，一手確認三人分工（Nash＝均衡、Selten＝子賽局完美、Harsanyi＝不完全資訊），別憑記憶轉述。\n- **NobelPrize.org，2005 經濟學獎頁面**—— 服務 ch10。Schelling 與 Aumann 的得獎理由「透過賽局理論分析增進對衝突與合作的理解」；想確認獎項歸屬與年份讀官方頁。\n- **NobelPrize.org，2007「Mechanism Design Theory」官方頁與 popular／advanced information**（nobelprize.org/prizes/economic-sciences/2007/）—— 服務 ch13。Hurwicz／Maskin／Myerson 三人分工講得最權威；advanced information 那份把誘因相容、揭示原理、最適機制串成一條線，讀 popular information 那份就夠抓直覺。\n- **Roger Myerson〈Perspectives on Mechanism Design in Economic Theory〉（2007 諾貝爾講座，nobelprize.org 上的 myerson_lecture.pdf）**—— 服務 ch13。揭示原理發明人本人講這套理論的來龍去脈；數學可略過，看他怎麼描述「私有資訊」這個核心難題與化約思路，比任何二手講解都清楚。\n- **MIT OCW 6.254 Game Theory, Lecture 5「Existence of a Nash Equilibrium」**（ocw.mit.edu/courses/6-254-game-theory-with-engineering-applications-spring-2010/）—— 服務 ch02。本章略過的存在性證明：最佳反應對應、Kakutani 不動點如何套上去，一步步寫給工程背景的人。\n- **MIT OpenCourseWare 17.810 Game Theory, Lecture 3「Mixed Strategy Nash Equilibrium」**（ocw.mit.edu 公開 PDF）—— 服務 ch05。配對銅板的無差異求解一步步走，可拿來跟本章 worked example 對照驗算。\n- **Game Theory 101（William Spaniel）,「Grim Trigger in the Repeated Prisoner's Dilemma」**（gametheory101.com）—— 服務 ch07。把 V_合作 ≥ V_背叛 解 δ 門檻一步步演給你看，和本章 worked example 同路數。\n\n### 維基／Econlib／其他線上速查\n\n- **Wikipedia〈Grim trigger〉**（en.wikipedia.org/wiki/Grim_trigger）—— 服務 ch07。grim trigger 的定義、它作為子賽局完美均衡的條件、與一報還一報「寬容程度」的對比，短而準，是本章 δ 門檻推導的對照。\n- **Centipede game（Wikipedia）**（en.wikipedia.org/wiki/Centipede_game_(game_theory)）—— 服務 ch06。Rosenthal 1981 提出、McKelvey & Palfrey 1992 首次實驗；想看「理論說秒結束、真人卻合作」的落差，這條最直接。\n- **Selten 連鎖店悖論（chain store paradox）**（econlib.org/library/Enc/bios/Selten.html）—— 服務 ch06。本章市場進入賽局的原型，Selten 用它示範逆向歸納（與它在重複情境下的弔詭，預告 ch07）；Econlib 的 Selten 小傳是好入口。\n- **Michael Spence 與 job market signaling**（econlib.org/library/Enc/bios/Spence.html）—— 服務 ch11。把「教育當訊號、靠成本差分離型別」講得簡潔；想抓「訊號靠成本不靠內容」的直覺看這篇。\n- **Amotz Zahavi 累贅原理（handicap principle）**（nature.com/articles/s41559-017-0254-z）—— 服務 ch11。孔雀尾巴為什麼是「養得起的累贅＝誠實訊號」；Nature 的 Zahavi 訃聞兼回顧是好入口（注意此原理在演化生物學界仍有爭議，2026-06 仍是活的辯論，別當定論）。\n- **Wikipedia〈Condorcet paradox〉**（en.wikipedia.org/wiki/Condorcet_paradox）—— 服務 ch15。孔多塞 1785 原始悖論、循環多數的更多例子與出現機率討論；本章的環只是最小例。\n- **Wikipedia〈Price of Anarchy〉與〈Pigou's Example〉**—— 服務 ch17。快速複習 PoA 定義、Koutsoupias–Papadimitriou 1999 的來歷、Pigou 例的標準推導，對齊本章 worked example。\n- **Wikipedia〈Fisher's principle〉**—— 服務 ch17。費雪 1:1 性別比論證的標準陳述，含 Hamilton 對「局部交配 → 偏雌」的修正；想確認本章「隨機交配假設」hedge 的出處看這條。\n- **Wikipedia〈Focal point (game theory)〉**（en.wikipedia.org/wiki/Focal_point_(game_theory)）—— 服務 ch10。謝林點的快速綜述與紐約實驗（中央車站、中午）的數字來源，含後續行為實驗整理。\n- **Mitchell〈Mitzenmacher, The Power of Two Choices in Randomized Load Balancing〉（1996 博士論文）**（eecs.harvard.edu/~michaelm）—— 服務 ch05。本章開頭「隨機分流」工程直覺的嚴謹版：隨機化為什麼能在分散式負載均衡裡打破壞同步。\n- **Avinash Dixit, David McAdams & Susan Skeath〈The Cuban Missile Crisis as a Dynamic Chicken Game〉（SSRN）**—— 服務 ch17。「古巴飛彈危機＝chicken」這個比喻被認真辯論（既用它又修正它）的代表作；正是本章「應用要標前提、別吹成預測」的活教材，與批評它的文獻一起看最有收穫。\n\n---\n\n讀到這裡，這趟旅程的地圖、捷徑、鄰書與外部資源都在你手上了。回到那張 (5,3,1,0) 的矩陣——它在 ch18 攤成七層；往書架外走，從上面這份清單挑下一步。賽局理論沒說「人都自私」，它說的是：**即使每個人都理性，協調也是難題；合作不是預設，而是需要被解釋、被設計的成就。** 這本書要你帶走的，就是這一句——以及手上那四把救火的工具：重複、聲譽、演化、機制設計。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="game";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">當理性互相碰撞<br><span style="font-weight:400;font-size:12px;color:var(--muted)">賽局理論的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 當理性互相碰撞';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
