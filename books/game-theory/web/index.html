ail 裡釘死「舊 SDK 在 9/30 停止維護、10/1 起呼叫直接回 410」，並把這日期寫進 CI 的硬性檢查。**為什麼更強**：你**主動放棄了「心軟延期」這個選項**——延期的代價（公開打臉、文件全錯、CI 規則要回滾）被你自己拉到很高。於是各團隊不再賭「他應該會延吧」，而是真的排期去遷。承諾的力量來自**不可逆**：能被輕鬆收回的承諾不值錢，公開釘死、難反悔的才算數。\n\n對照空洞版：如果你只在某次會議口頭說「之後會關喔，再看看」，延期對你幾乎無痛，大家正確地預判你會拖，於是沒人動——**威脅不可信，因為執行起來你不痛、收回也不痛。**\n\n生活例（同構）：想戒掉睡前滑手機，把充電器放到客廳、臥室不留任何螢幕——你**實體砍掉了「躺床上隨手拿手機」的選項**，比單純下決心有效得多。這跟 Schelling 把方向盤丟出窗外是同一招：**用放棄能力換取結果。**\n\n**常見錯路**：把「承諾」理解成「下更大的決心／喊更響的口號」。不是。承諾的關鍵不是意志力，是**讓反悔在客觀上變昂貴或不可能**——綁手的是結構，不是決心。\n\n### 第 3 題（口頭題）：可信威脅 vs 空洞威脅，為什麼納許均衡分不出、子賽局完美能（★★★）\n\n口頭回答：這兩種威脅差在哪？為什麼納許均衡會放過空洞威脅，而子賽局完美均衡能抓住它？\n\n### 推演解答\n\n**可信威脅**＝真要執行時，威脅方確實願意執行（執行它是威脅方在那個子賽局的最佳反應）；**空洞威脅**＝威脅方真到那一步會發現執行對自己更慘、於是不會做，所以只是嚇人的空話。\n\n**為什麼納許均衡分不出**：納許均衡只檢查「在均衡**路徑**上，沒有玩家想單方面偏離」。空洞威脅的可怕之處在於——它讓對手退讓，於是那個「會執行懲罰」的分支**根本不會被走到**。沒走到，就沒機會驗證威脅方說話算不算話，於是形式上「沒人想偏離」，納許均衡判它合格。\n\n**為什麼子賽局完美能抓住**：子賽局完美均衡多要求一件事——**在每一個子賽局裡（包括那些「不會走到」的分支），每個玩家的計畫都必須是當下的最佳反應**。它強迫你去檢查「萬一真走到那個分支」，威脅方會不會說話不算話。一檢查，空洞威脅立刻露餡（威脅方在那會選不執行），於是被剔除。一句話：**納許均衡只管均衡路徑上的事，子賽局完美連『沒走到的劇本』都要求合理——空話藏在沒走到的劇本裡，所以只有後者抓得到它。**\n\n## 自我檢核\n\n口頭自答，講得出來才算過關（優先答「為什麼」）：\n\n1. 為什麼有了「先後順序」之後，報酬矩陣就不夠用、得換成賽局樹？樹比矩陣多畫出了什麼資訊？\n2. 逆向歸納為什麼要「從最後一步倒著解」？如果從第一步正著解，會漏掉什麼？\n3. 用市場進入賽局講：在位者「我會打價格戰」這句威脅為什麼不可信？「不可信」精確指的是哪件事？\n4. 子賽局完美均衡比納許均衡「多要求」了什麼？為什麼正是這個「多要求」讓它能剔除空洞威脅？\n5. 承諾為什麼能「越少選項越強」？把 Schelling 丟方向盤、燒橋、deprecation 死線串成同一個道理。\n6. 蜈蚣賽局怎麼把 ch01 那張囚徒困境矩陣的「個體理性 ⇒ 集體次優」搬到時間軸上？它和囚徒困境是同一道裂縫，差別在哪？\n7. 「先動一定有利」哪裡錯了？舉一個後動有利的例子。\n8. 為什麼「逆向歸納說人會 X，但真人都做 Y」不能直接推出「人不理性」？（提示：逆向歸納預設了什麼假設？）\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Game Theory\"（賽局理論條目）** — https://plato.stanford.edu/entries/game-theory/ ——展開式賽局、子賽局完美、逆向歸納與其爭議寫得清楚嚴謹；想看「逆向歸納悖論」的哲學討論看「backward induction」一節。\n- **Thomas Schelling,《The Strategy of Conflict》（衝突的策略，1960）** ——「承諾＝放棄選項換力量」「可信威脅」這套思想的源頭，方向盤、燒橋的比喻都出自這裡；談判與嚇阻章節即使今天讀也犀利。\n- **Reinhard Selten 連鎖店悖論（chain store paradox）** — https://www.econlib.org/library/Enc/bios/Selten.html ——本章市場進入賽局的原型，Selten 用它示範逆向歸納（與它在「重複」情境下的弔詭，預告 ch07）；Econlib 的 Selten 小傳是好入口。\n- **蜈蚣賽局（centipede game）** — https://en.wikipedia.org/wiki/Centipede_game_(game_theory) ——Rosenthal 1981 提出、McKelvey & Palfrey 1992 首次實驗；想看「理論說秒結束、真人卻合作」的落差，這條最直接。\n- 跨書：序貫賽局裡「一個玩家在不確定下該怎麼選」的單人理性基準，承襲自《在不確定中下注》談期望效用與單人理性那章；承諾與聲譽在**重複**情境下如何被養出來，接到本書 ch07。\n"}, {"id": "ch07-repeated-games", "file": "ch07-repeated-games.md", "group": "Part III — 合作的考古學", "title": "ch07 — 重複賽局與未來的陰影：合作的第一線生機", "md": "# ch07 — 重複賽局與未來的陰影：合作的第一線生機\n\n> **本章解決什麼問題**：前六章你建好了整套靜態工具——報酬矩陣、納許均衡、最佳反應、零和與極小極大、混合策略、賽局樹。但全程困在一個壞消息裡：脊椎那張囚徒困境，背叛是嚴格優勢策略，唯一均衡是雙輸的 (背叛,背叛)。Part III 是「合作的考古學」，要回答全書最迫切的問題——**合作能不能從這個困境裡救回來？** 本章給出第一線生機：把同一張矩陣**玩很多次**。當「以後還要再見面」這件事進入計算，背叛的短期甜頭會被未來的懲罰吃掉——這就是「未來的陰影（shadow of the future）」。本章只算最硬派的觸發策略（grim trigger）能撐住合作的條件 δ ≥ 1/2，並拆穿「有限次重複為什麼救不了」的陷阱（unraveling）。一報還一報與 Axelrod 的錦標賽留給 ch08，演化詮釋留給 ch09。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回   ◄ 你在這裡\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n## 從你已知的出發\n\n你早就知道「一次性互動」和「長期關係」是兩種完全不同的生意。\n\n一個只會用你服務一次的匿名 client、和一個綁了三年合約、每天打你 API、還會在你出包時開 ticket 罵人的企業客戶——你對它們的對待方式不一樣，對吧？不是因為你比較喜歡誰，是因為**未來的存在改變了當下的算計**。對匿名 client 你只想榨乾這一筆；對長期客戶你會吞下一些短期虧損，因為「以後還要再見面」這件事，讓現在坑它一把變得不划算。\n\n這個直覺，就是整章的全部。賽局理論要做的，只是把它寫成數字、算出一個精確的門檻。\n\n你系統裡到處是這個結構。先看反例——**沒有未來的互動，合作就崩**：\n\n- **退避演算法的「最後一搏」**。指數退避（exponential backoff）通常溫和：被限流就等久一點再試。但如果一個 client 知道自己「反正馬上要被下線、這是最後幾個請求」，它的理性選擇是**用盡全力狂打**——反正之後沒有「之後」，再被封也無所謂。這就是「最後一回合必背叛」的工程版。\n- **合約到期效應**。供應商在續約談判破裂、確定不續的那一刻，服務品質常常斷崖式下滑：以前會半夜爬起來修的 incident，現在拖到上班再說。不是它突然變壞，是「未來的陰影」消失了——維持聲譽的報酬沒了，背叛的成本也沒了。\n\n再看正例——**有未來，合作就回來**：\n\n- **circuit breaker 的「斷開—恢復—再試」**。被下游打爆，你斷開（懲罰）；過一陣子半開試探（給對方一次回頭的機會）；對方恢復了，你也恢復。這是一種「以牙還牙再寬恕」的節律——它預設了「我們還要長期共處」，所以不把對方一棒打死。（這套節律本身的完整分析留到 ch08 的一報還一報。）\n- **rate limit 的信譽制**。歷史良好的 client 給更高配額、行為不良的封更久——「再犯就封更久」正是「背叛會被未來的我懲罰」的制度化。\n- **API 配額與長期信任**。你願意給長期夥伴 burst 的彈性、容忍它偶爾超量，因為這段關係要走很久；對一次性的陌生流量你寸步不讓。\n\n把這些串起來，本章的論點就是一句話：**囚徒困境的「背叛佔優」只在「這是最後一次互動」時成立。一旦這局要重複下去、而且你夠在乎未來，合作就能變成理性的選擇。** 困境不是合作的死刑，它是「沒有未來時合作會死」的診斷書。接下來我們把這句話算清楚。\n\n## 同一張矩陣，現在要玩很多次\n\n先把脊椎請回來。**這是 ch01 那張矩陣**，全書同一張，數字＝獲益點數、越大越好：\n\n```text\nch01 脊椎囚徒困境（數字＝獲益點數，越大越好）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ← R,R     (0, 5)  ← S,T\n    我方：背叛(D)      (5, 0)  ← T,S     (1, 1)  ← P,P\n\n    T=5(誘惑) > R=3(獎賞) > P=1(懲罰) > S=0(受騙)\n    重複賽局額外條件：2R > T + S → 6 > 5 ✓\n```\n\n前六章我們把它當成「玩一次」的賽局（賽局理論術語叫「**階段賽局（stage game）**」——之後會被當積木重複堆疊的那一局）。結論你已經很熟：背叛是嚴格優勢策略（5>3 且 1>0），唯一納許均衡 (D,D)=(1,1)，雖然 (C,C)=(3,3) 對雙方都更好。這是脊椎的第一層、第二層、第四層（ch01/02/04）。\n\n**本章是脊椎的第三層**（對應全書脊椎七層的 ch07）：把同一張矩陣**重複玩 N 次**。問題只有一個——重複，能不能讓 (C,C) 從「不是均衡」變成「可以維持的均衡」？\n\n先要注意一個容易滑掉的地方：「重複玩」這句話本身藏著一個關鍵分岔——**玩固定已知的次數，還是玩不定／無限次**。這兩者的結局**南轅北轍**，而且分岔點極其反直覺。我們先看為什麼「固定次數」救不了，再看「無限次」怎麼救。\n\n### 那個「2R > T + S」條件在管什麼\n\n順手解決一個你可能盯著 landscape 看過、但沒人解釋過的條件：`2R > T + S`，在我們的數字裡是 `6 > 5`。\n\n它管的是：**「兩人都老實合作」要比「輪流剝削對方」更好。** 想像兩個玩家不老實互助，而是搞「這回合你當好人讓我背叛、下回合換你背叛我當好人」的輪流制。每兩回合，一個人拿到 T+S=5+0=5，平均每回合 2.5。而兩人都合作每回合各拿 R=3，兩回合共 6。\n\n`2R > T + S` 保證了 **6 > 5**——互相合作的總餅，比輪流剝削的總餅大。如果這條不成立（例如 T 和 S 設計成 T+S>2R），那「相互合作」就不是雙方最該追求的目標，輪流剝削反而更肥，整章的合作故事會走樣。所以重複賽局除了困境條件 T>R>P>S，還多要求這一條。我們的脊椎滿足它（6>5），可以安心往下走。\n\n## 有限次重複：為什麼「已知會結束」會毀掉合作\n\n先說壞消息，因為它最反直覺。\n\n直覺會這樣想：玩 100 次囚徒困境，雙方總該培養出默契、學會合作吧？開頭幾局也許互相試探，慢慢就建立信任了——人不是這樣交朋友的嗎？\n\n**錯。如果次數是固定且雙方都知道的（比如剛好 100 回合），理論預測是：從第一回合就全程互相背叛。** 一次合作都不會發生。讓我們用 ch06 學的逆向歸納（backward induction）把它推出來。\n\n考慮玩**恰好 3 回合**，雙方都知道是 3 回合。從**最後一回合**倒著看：\n\n```text\n有限重複的 unraveling（玩恰好 3 回合，雙方都知道）：\n\n  第 3 回合（最後一局）：\n     之後沒有「之後」了 —— 沒有未來可以懲罰你。\n     這一局就是純粹的一次性囚徒困境。\n     → 背叛是嚴格優勢策略 → 雙方背叛。 (D,D)\n\n  第 2 回合：\n     兩個理性玩家都已經算出「第 3 回合鐵定 (D,D)」。\n     所以「我這局合作，換你第 3 局放我一馬」這種交易不存在\n     —— 第 3 局你反正會背叛，跟我這局做什麼無關。\n     第 2 局於是也變回純一次性困境。\n     → 雙方背叛。 (D,D)\n\n  第 1 回合：\n     同理，第 2、3 局都已被釘死是 (D,D)，\n     第 1 局合作換不到任何未來好處。\n     → 雙方背叛。 (D,D)\n\n  結論：從第一局就 (D,D)(D,D)(D,D) ——\n        合作從未發生。整串「散開（unraveling）」。\n```\n\n這個現象叫 **unraveling（散開／瓦解）**：合作從**最後一回合**開始崩，然後像拉鍊一樣一路逆向崩回第一回合。關鍵在那句「**之後沒有之後**」——最後一回合沒有未來可以懲罰背叛，所以它退化成純一次性困境，必然 (D,D)；而一旦最後一局確定無法影響，倒數第二局也失去了「用合作換未來」的籌碼，也崩；如此一路傳染到開頭。\n\n這是「未來的陰影」這個概念的**陰性顯影**：合作完全靠「背叛會被未來懲罰」撐著，而有限次重複裡，**最後一回合永遠沒有未來**，於是這根柱子從末端開始抽掉，整棟塌。嚴謹度標示——這是**工程師的嚴謹**：每一步「因為下一局已被釘死、所以這局換不到未來好處」都能口頭說出理由，不是直覺跳步。它在子賽局完美均衡（ch06）的意義下是唯一解。\n\n> **誠實補一刀（2026-06）**：真人玩固定次數的重複囚徒困境，**並不會**從第一局就全背叛——實驗裡前段常有可觀的合作，只是接近終局時「第一次背叛的回合」會隨經驗越來越早，整體趨勢確實朝 unraveling 的方向走（Embrey、Fréchette、Yuksel 等對半世紀實驗的整理，結論至今仍有爭議）。所以 unraveling 是**理論在「共同知識的完全理性」假設下的乾淨預測**，不是對真人行為的精準描述。這個落差本身很有意思（人為什麼會在「理論說該背叛」時還合作？），但它的心理機制屬於別本書（公平、互惠的偏好見 ch12，認知層面指向《思考的陷阱》）。本章守住理論這一側：**在純理性假設下，已知的終點會殺死合作。**\n\n工程版你其實見過：**合約到期、確定不續約的那一刻，就是「最後一回合」**。維持品質的未來報酬歸零，背叛（擺爛）的成本也歸零，於是服務品質斷崖下滑。員工遞了辭呈、進入 lame-duck 期；供應商被告知這季結束就換掉——「最後一回合效應」無所不在，而且它正是 unraveling 在現實裡只顯露**最末端那一節**的樣子。\n\n## 無限／不定次重複：未來的陰影回來了\n\nunraveling 的命門是「**有一個已知的最後一回合**」。那就把它拿掉。\n\n兩種拿法，**結果一樣**：\n\n1. **真的無限重複**——這局永遠玩下去，沒有終點。\n2. **不定次重複**——每回合結束後，有一個固定機率 δ 會「再玩一回合」、機率 (1−δ) 會「結束」。\n\n第二種更貼近現實，也更好懂：你跟一個 client、一個供應商互動，**從來不知道哪一次是最後一次**。沒有「已知的最後一回合」，逆向歸納就沒有起點可以倒著推——unraveling 的拉鍊頭被剪斷了。合作於是有了活路。\n\n而且第二種解釋讓 δ 這個符號有了血肉。\n\n### δ：未來的陰影有多長\n\n**折扣因子（discount factor）δ**，0 ≤ δ < 1，是「下一回合的報酬，在今天眼裡值多少」的權重。它可以同時裝兩件事：\n\n- **耐心**：你多看重未來。δ 接近 1＝很有耐心、未來幾乎和現在一樣重；δ 接近 0＝極度短視、只看眼前這一局。\n- **關係的延續機率**：在「不定次重複」的解釋下，δ 就是「還會再玩一回合」的機率。δ=0.9 表示這段關係每回合有九成機率延續。\n\n兩種解讀在數學上一模一樣，都讓「未來這一回合」打了 δ 折。所以一筆永遠每回合拿 R 的報酬，今天的總價值是等比級數：\n\n```text\n未來報酬的折現（geometric series，等比級數）：\n\n  R + δR + δ²R + δ³R + ...\n     = R · (1 + δ + δ² + δ³ + ...)\n     = R · 1/(1−δ)          ← 公比 δ<1 的無窮等比和\n     = R/(1−δ)\n\n  直覺檢查：δ→1（極有耐心）時 1/(1−δ)→∞ ——\n            未來無限長，總報酬無限大，合理。\n            δ→0（極短視）時 1/(1−δ)→1 ——\n            只剩眼前這一局，未來不算數，也合理。\n```\n\n「**未來的陰影**」就是 δ：δ 越大，未來的陰影越長、越濃，背叛現在會被未來的損失壓得越重；δ 越小，陰影越短，背叛越誘人。整章的合作條件，就是在問「陰影要多長，才壓得住背叛的誘惑」。\n\n> 期望值與折現級數「怎麼算」屬機率機制，本書只用結果；想擦亮等比級數與期望值的計算，見《馴服隨機》ch08 期望值那章。本章只需要 R/(1−δ) 這個結果。\n\n### grim trigger：最不留情的合作守護者\n\n要讓合作維持，光有 δ 不夠，還要有一個**策略**，把「背叛會被懲罰」這個威脅變成可信的（ch06 教過，空洞威脅沒用）。本章用最硬派、最好算的那一個：\n\n**觸發策略（grim trigger，又叫冷酷觸發）**：\n- 第一回合合作。\n- 只要對方**從未**背叛過，就繼續合作。\n- 對方**一旦**背叛（哪怕只有一次），就**永遠**背叛、再也不回頭。\n\n它的名字「grim（冷酷／無情）」名副其實：沒有寬恕、不給第二次機會，一次背叛換來無期徒刑。這讓它在現實裡很脆（誤觸發一次就再也救不回，ch08 的一報還一報正是來修這個問題），但它有個分析上的好處——**威脅最大、最容易算**。如果連這個最狠的懲罰都需要 δ 很大才壓得住背叛，那其他較溫和的策略只會需要更大的 δ。grim trigger 給我們一個合作維持的**門檻基準**。\n\n注意可信度（ch06 的核心）：grim trigger 對 grim trigger 時，「永遠背叛」這個威脅**可信**嗎？可信。因為當對方已經切換成永遠背叛，你的最佳反應也是永遠背叛——執行懲罰對懲罰方自己也是最佳反應，不是空洞威脅。（嚴格說它是子賽局完美的，本章給直覺、形式驗證指向延伸閱讀。）\n\n## worked example：手算合作維持的 δ 門檻\n\n現在把全章最重要的計算做完。設定：雙方都用 grim trigger，目前處在「一路合作」的軌道上。問：**你有沒有誘因在某一回合偷偷背叛一次？** 如果沒有，合作就穩得住。\n\n比較兩條路的折現總報酬（從「現在這一回合」起算）。用脊椎數字 T=5, R=3, P=1, S=0。\n\n```text\n路線 A：永遠合作（守規矩，跟著 grim trigger 走）\n  每回合都拿 R=3，從現在到永遠：\n     V_合作 = R + δR + δ²R + ...\n            = R/(1−δ)\n            = 3/(1−δ)\n\n路線 B：這一回合偷背叛，然後承擔後果\n  你背叛、對方這回合還在合作（它要下回合才發現）：\n     這一回合你拿 T=5。\n  但對方是 grim trigger，下回合起永遠背叛你，\n  你最理性的回應也只能跟著永遠背叛 → 之後每回合 (D,D) 拿 P=1：\n     V_背叛 = T + δP + δ²P + δ³P + ...\n            = T + δ·P/(1−δ)\n            = 5 + δ·1/(1−δ)\n            = 5 + δ/(1−δ)\n```\n\n注意路線 B 的結構：**先吃一口背叛的甜頭 T=5（比 R=3 多賺 2），代價是從下一回合起，本來每回合的 R=3 全部掉成 P=1（每回合少賺 2），而且是永遠。** 這就是「未來的陰影」具體在算什麼——用一次性的 +2，去換未來每一回合的 −2。划不划算，全看未來（δ）有多重。\n\n**合作維持的條件**：守規矩不比偷背叛差，即 V_合作 ≥ V_背叛。\n\n```text\n求解 δ 門檻（一步都不跳）：\n\n  V_合作 ≥ V_背叛\n  R/(1−δ) ≥ T + δP/(1−δ)\n\n  兩邊乘 (1−δ)（δ<1 所以 1−δ>0，不等號方向不變）：\n     R ≥ T(1−δ) + δP\n     R ≥ T − Tδ + δP\n     R ≥ T − δ(T − P)              ← 把含 δ 的項收在一起\n     δ(T − P) ≥ T − R              ← 移項\n     δ ≥ (T − R)/(T − P)           ← T>P 所以 T−P>0，不等號方向不變\n\n  代入脊椎數字 T=5, R=3, P=1：\n     δ ≥ (5 − 3)/(5 − 1)\n       = 2/4\n       = 1/2\n\n  ★ 合作維持 ⇔ δ ≥ 1/2 ★\n```\n\n**結論一句話**：只要雙方對未來的看重程度 δ ≥ 1/2——也就是「再玩一回合」的機率不低於 50%——相互合作就是一個（子賽局完美）均衡，背叛的短期甜頭被未來的懲罰吃掉了。脊椎那張「合作不是均衡」的矩陣，在 δ 夠大的重複版裡，**(合作,合作) 翻身變成可以維持的均衡**。這就是合作的第一線生機。\n\n**自我複核（兩個視角交叉驗算）**：\n\n*視角一——直接代數字驗 δ=1/2 的臨界*。取 δ=1/2：\n- V_合作 = 3/(1−0.5) = 3/0.5 = **6**。\n- V_背叛 = 5 + 0.5/(1−0.5) = 5 + 0.5/0.5 = 5 + 1 = **6**。\n- 兩者恰好相等 = 6 ✓。δ=1/2 正是「合作和背叛剛好打平」的臨界點，跟公式吻合。\n\n*視角二——一次性誘惑 vs 未來損失的直觀帳*。背叛這一回合多賺 T−R = 5−3 = **2**（一次性）。代價是從下回合起，每回合從 R=3 掉到 P=1，每回合損失 R−P = 3−1 = **2**，這串損失的現值是 δ·(R−P)/(1−δ) = δ·2/(1−δ)。合作划算 ⇔ 未來損失現值 ≥ 一次性誘惑：\n```text\n   δ·(R−P)/(1−δ) ≥ T−R\n   δ·2/(1−δ) ≥ 2\n   δ/(1−δ) ≥ 1\n   δ ≥ 1−δ\n   2δ ≥ 1\n   δ ≥ 1/2   ✓ 與視角一相同\n```\n兩條路都得 δ ≥ 1/2，門檻穩了。\n\n> **這層要記住的分工（重要，別跟 ch08 搞混）**：δ ≥ 1/2 = (T−R)/(T−P) 是 **grim trigger** 的門檻——因為它的懲罰是「**永遠**互背」，最重，所以較小的 δ 就壓得住背叛。下一章 ch08 的一報還一報（tit-for-tat）懲罰只有「**還手一回合就原諒**」，輕得多，於是需要**更大**的 δ ≥ 2/3 = (T−R)/(R−S) 才壓得住偷打的誘惑。**門檻因「懲罰多久」而異，不是同一題算兩次。** 本章只負責 grim 的 1/2。\n\n### 個體理性 vs 集體理性：這一章碰到的那條裂縫\n\n全書中央張力——**每個人都最佳化自己，結果集體更糟**——在這一章出現了一個**裂縫被縫合的時刻**，但縫得很有條件，值得看清楚。\n\n在 ch01 的單回合困境裡，個體理性（背叛佔優）和集體理性（一起合作更好）徹底分裂：兩個聰明人各自最佳化，一起掉進 (1,1)。本章的 δ ≥ 1/2 條件，是**第一次讓這條裂縫有機會閉合**——當未來的陰影夠長，「對個體理性的我最划算的事」剛好變成「合作」，於是個體理性與集體理性**指向同一個動作**。不是因為玩家變無私了（報酬矩陣一個數字沒改、每個玩家還是純粹自利），而是因為**重複互動把『集體的好』偷渡進了『個體的長期帳本』**——背叛別人＝背叛未來的自己。\n\n但別過度樂觀（這正是下一章 folk theorem 要 hedge 的）：δ ≥ 1/2 只說明合作**可以**維持，沒說它**一定**會發生。在同一個重複賽局裡，**「雙方永遠互背」也仍然是一個均衡**——兩人都用 grim trigger 是均衡，兩人都「always defect」也是均衡。裂縫沒有被消滅，只是**多開了一條合作的逃生通道**；要不要走、走不走得到，還得靠別的東西（協調、聲譽、演化——後面幾章的事）。本章的成就是：**證明了那條通道存在。** 在 ch01 那張矩陣上，這是第一次。\n\n## 直覺的陷阱\n\n重複賽局是「合作能不能救回來」的轉捩點，也正因如此，它周圍的錯誤直覺最密集。守住下面這幾條正確版。\n\n| # | 錯誤直覺（很多人這樣想） | 哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| 1 | 「玩很多次，雙方自然會學會合作。」 | 把「次數多」當成救星——但救合作的是「**沒有已知終點**」，不是次數多。 | 重複**100 次**（已知）一樣全程背叛（unraveling）；救合作的是「不知道哪次是最後一次」。是**終點的不確定**、不是**次數**。 |\n| 2 | 「δ 是『我有多自私』。」 | 把 δ 讀反，以為 δ 大＝貪婪。 | δ 是「**未來在你眼裡的權重**」：δ **大**＝看重未來、**更容易**合作；δ 小＝短視、更容易背叛。δ 大是有耐心，不是貪。 |\n| 3 | 「重複之後，背叛就不再是均衡了。」 | 以為合作把背叛擠掉了。 | 重複是**多開**了一條合作的均衡通道，**沒有關掉**背叛通道——「永遠互背」仍是均衡（這是 ch08 folk theorem 的核心 hedge）。重複讓合作**可能**，不保證**必然**。 |\n| 4 | 「grim trigger 是最好的合作策略。」 | 把「最容易分析」當成「最實用」。 | grim 太脆——一次誤觸（網路抖動害你漏看一個合作訊號）就永遠互背、再也回不來。它只是給門檻基準的分析工具；實用的寬容策略（一報還一報）見 ch08。 |\n| 5 | 「δ ≥ 1/2 是所有重複囚徒困境的合作門檻。」 | 把某個策略的門檻當成普世常數。 | 1/2 只是 **grim trigger** 對這張**特定矩陣**的門檻＝(T−R)/(T−P)。換策略（TFT 是 2/3）、換報酬數字，門檻都變。它是一個**算出來的、隨設定變動**的值。 |\n\n**怎麼自我察覺你掉進去了**：如果你發現自己在說「玩久了就會合作」卻說不清「為什麼有限次反而不會」，你大概是踩到陷阱 1；如果你覺得「重複賽局證明了合作會贏」，你踩到陷阱 3（重複只證明合作**能**贏，沒證明它**會**贏）。能不能把 unraveling 的逆向歸納口頭講一遍、能不能說出「δ 大是看重未來不是貪婪」，是你真懂了沒的試金石。\n\n## 紙上推演\n\n全程純紙筆，不要寫程式。報酬一律用脊椎 T=5, R=3, P=1, S=0。\n\n### 第 1 題：δ=0.4 與 δ=0.6，合作撐得住嗎（★★，**[20 分鐘]**）\n\n雙方都用 grim trigger，目前在合作軌道上。分別判斷 δ=0.4 和 δ=0.6 時，相互合作能否維持。直接代數字算 V_合作 與 V_背叛，不要只套門檻——算完再用門檻 δ ≥ 1/2 對答案。\n\n### 推演解答\n\n用 V_合作 = R/(1−δ) = 3/(1−δ)、V_背叛 = T + δP/(1−δ) = 5 + δ/(1−δ)。\n\n```text\nδ = 0.4（短視，未來陰影短）：\n   V_合作 = 3/(1−0.4) = 3/0.6 = 5\n   V_背叛 = 5 + 0.4/(1−0.4) = 5 + 0.4/0.6 = 5 + 0.6667 ≈ 5.667\n   比較：V_合作 = 5  <  V_背叛 ≈ 5.667\n   → 背叛更划算！合作 ✗ 撐不住。\n   門檻檢查：δ=0.4 < 1/2 ✓ 與結論一致（低於門檻，合作崩）。\n\nδ = 0.6（較有耐心，未來陰影較長）：\n   V_合作 = 3/(1−0.6) = 3/0.4 = 7.5\n   V_背叛 = 5 + 0.6/(1−0.6) = 5 + 0.6/0.4 = 5 + 1.5 = 6.5\n   比較：V_合作 = 7.5  >  V_背叛 = 6.5\n   → 合作更划算！合作 ✓ 撐得住。\n   門檻檢查：δ=0.6 ≥ 1/2 ✓ 與結論一致（高於門檻，合作穩）。\n```\n\n**結論**：δ=0.4 合作崩、δ=0.6 合作穩，分水嶺就在 δ=1/2。直觀讀法：δ 從 0.4 升到 0.6，背叛那一口 T=5 的甜頭沒變，但未來「每回合少賺 2」的損失被放大（因為未來變重了），終於壓過甜頭。**常見錯路**：(1) 把 V_背叛 的懲罰算成「只背叛當下那一回合 P 一次」——錯，grim trigger 是**永遠**懲罰，後面每一回合都是 P，要用 δP/(1−δ) 的無窮級數。(2) 算 V_合作 時忘了現在這回合也算進去（級數從 δ⁰=1 起算，第一項是 R 不是 δR）。\n\n### 第 2 題：為什麼「已知會結束的關係」更難合作（★★，**[15 分鐘]**）\n\n不用算式，用文字把 unraveling 講清楚：玩**恰好 4 回合**、雙方都知道是 4 回合的囚徒困境，理論預測每一回合各是什麼？逆向歸納怎麼一步步推出來？並指出整個論證**最關鍵**的那一句話。\n\n### 推演解答\n\n理論預測：**四回合全是 (D,D)**，合作一次都不發生。逆向歸納：\n\n```text\n  第 4 回合（最後）：沒有未來可懲罰背叛 → 純一次性困境 → (D,D)。\n  第 3 回合：雙方已算出第 4 局鐵定 (D,D)，本局合作換不到未來好處\n            → 退化成一次性困境 → (D,D)。\n  第 2 回合：第 3、4 局已釘死 (D,D)，本局合作也換不到未來 → (D,D)。\n  第 1 回合：第 2/3/4 局全釘死，本局合作毫無未來回報 → (D,D)。\n  → (D,D)(D,D)(D,D)(D,D)，合作從未發生。\n```\n\n**最關鍵的一句話**：「**最後一回合沒有未來可以懲罰背叛**」。整串 unraveling 全靠這句話啟動——它讓最後一局必崩，而最後一局一崩，就抽掉了倒數第二局「用合作換未來」的籌碼，於是像拉鍊一樣一路逆向崩到第一局。**常見錯路**：(1) 以為「開頭幾局先合作建立信任、接近結束才背叛」是理論預測——不是，純理性下連第一局都不合作（信任無處可建，因為它換不到任何未來）。(2) 把這個預測當成真人行為——真人會在前段合作（見本章 2026-06 那段 hedge），但那是因為真人不是純理性自利機器，屬別本書的地盤。\n\n### 第 3 題（口頭題）：用「未來的陰影」解釋小村莊 vs 大都市（★★，**[15 分鐘]**）\n\n口頭回答：為什麼小村莊比大都市更容易維持互助與誠信？用「未來的陰影」「重複互動」「δ」的語言講，不要只說「小村莊人比較善良」。再連回一個你系統裡的對應現象。\n\n### 推演解答\n\n**核心**：小村莊裡你**幾乎一定會再見到同一個人**——買菜的、鄰居、修車的，明天後天明年都還是他們。每一次互動的 δ（再相遇的機率／未來的權重）**非常高**，未來的陰影又長又濃。於是「現在坑你一把」的短期甜頭，會被「以後天天碰面、聲譽掃地、再也沒人跟我往來」的長期損失輕鬆壓過——合作／誠信是**個體理性**的選擇，不需要誰特別善良。大都市裡你常跟**這輩子只會見一次的陌生人**互動，δ 趨近 0、未來陰影趨近於無，每次互動都更像一次性囚徒困境，背叛的成本低，所以失信、冷漠更常見。差別不在道德品質，**在 δ**——在「以後還會不會再見面」。\n\n**連回系統**：這正是你 rate limit 信譽制與 API 配額的邏輯。對長期綁約、天天打你 API、會再來無數次的企業 client（高 δ），你給它彈性、容忍偶爾超量，它也珍惜配額不亂搞——雙方都在高 δ 的未來陰影下合作。對一次性的匿名流量（δ≈0），你寸步不讓、它也沒理由克制——低 δ 把互動打回一次性困境。**「把匿名流量加上身分與歷史記錄」＝人為拉高 δ**，是你把大都市改造成小村莊、把困境拉回合作的工程手段。**常見錯路**：把它歸因於「小地方人情味」這種說不清的東西——人情味是**結果**（高 δ 養出來的合作習慣），不是**原因**；原因是再相遇的機率。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關（優先答「為什麼」）：\n\n1. 重複賽局救合作，救的到底是「次數多」還是「沒有已知終點」？為什麼玩 100 次（已知）跟玩不定次，結局南轅北轍？\n2. unraveling 是什麼？為什麼合作會從**最後一回合**開始崩、而不是從第一回合？那句啟動整串崩塌的關鍵話是什麼？\n3. δ 在直覺上是什麼？為什麼說「δ 大＝看重未來＝更容易合作」、而不是「δ 大＝更貪婪」？δ 的「不定次重複」解釋（再玩一回合的機率）為什麼比「耐心」更貼近現實？\n4. 把 grim trigger 對 grim trigger 的 δ 門檻推導口頭走一遍：V_合作 和 V_背叛 各長什麼樣、為什麼背叛那一路是「先吃一口 T、之後永遠 P」？解出來為什麼是 (T−R)/(T−P)？\n5. 為什麼 grim trigger 的「永遠背叛」是**可信**威脅、不是 ch06 說的空洞威脅？\n6. δ ≥ 1/2 讓合作成為均衡——但這是不是說「重複之後一定會合作」？「永遠互背」在重複賽局裡還是不是均衡？（這題答對，ch08 的 folk theorem 你已經懂一半。）\n7. 為什麼 grim trigger 的門檻是 1/2、而（劇透 ch08）一報還一報是 2/3？「懲罰多久」怎麼決定門檻高低？\n8. 這一章在「個體理性 vs 集體理性」那條裂縫上做了什麼？它把裂縫**消滅**了，還是只是**多開一條通道**？玩家有變得比較無私嗎？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Prisoner's Dilemma\"（囚徒困境條目）** — https://plato.stanford.edu/entries/prisoner-dilemma/ ——「Iterated PD」與「The Finitely Iterated Case」兩節把 unraveling 的逆向歸納寫得乾淨嚴謹，是本章有限次崩塌論證的權威出處；想看哲學上對「悖論」的爭論也在這。\n- **Wikipedia, \"Grim trigger\"（冷酷觸發）** — https://en.wikipedia.org/wiki/Grim_trigger ——grim trigger 的定義、它作為子賽局完美均衡的條件、與一報還一報「寬容程度」的對比，短而準；本章 δ 門檻推導的對照。\n- **Game Theory 101, \"Grim Trigger in the Repeated Prisoner's Dilemma\"** — https://gametheory101.com/courses/game-theory-101/grim-trigger-in-the-repeated-prisoners-dilemma/ ——William Spaniel 把 V_合作 ≥ V_背叛 解 δ 門檻一步步演給你看，和本章 worked example 同路數，想看別人怎麼擺同一道推導很合適。\n- **Matthew Embrey, Guillaume Fréchette, Sevgi Yuksel, \"Cooperation in the Finitely Repeated Prisoner's Dilemma\"** — https://faculty.econ.ucsb.edu/~sevgi/EmbreyFrechetteYuksel_June2017.pdf ——對半世紀「真人玩有限次重複囚徒困境」實驗的整理：真人不從第一局全背叛，但「首次背叛回合」隨經驗前移，趨勢確實朝 unraveling；本章 2026-06 那段 hedge 的依據，理論與行為落差的好材料。\n- 跨書：折現級數 R/(1−δ) 與期望值的計算機制，見《馴服隨機》ch08 期望值那章；本章只用結果。一報還一報、Axelrod 錦標賽、與 folk theorem 把「合作可為均衡」一般化，接到 ch08；把同一張矩陣放進演化族群、看背叛者如何入侵合作者，接到 ch09。\n"}, {"id": "ch08-tit-for-tat-folk-theorem", "file": "ch08-tit-for-tat-folk-theorem.md", "group": "Part III — 合作的考古學", "title": "ch08 — 一報還一報與無名氏定理：合作如何贏得錦標賽", "md": "# ch08 — 一報還一報與無名氏定理：合作如何贏得錦標賽\n\n> **本章解決什麼問題**：上一章（見 ch07）我們證明了「重複」能讓合作有機可乘——只要未來的陰影夠長，背叛就會被未來懲罰。但那一章只示範了一把最冷酷的工具：grim trigger（一次背叛、永世互背）。本章要回答兩個更大的問題：在所有可能的策略裡，到底哪一種最好用？以及——重複賽局的合作，是「必然會發生」還是只是「有可能發生」？前者的答案是一段傳奇：1980 年一場電腦錦標賽裡，一個只有四行的程式打敗了所有精心設計的對手，而它的名字叫「一報還一報」。後者的答案是一個冷靜的定理：無名氏定理（folk theorem）說，合作可以是均衡——但全程互相背叛也是。這是 Part III「合作的考古學」的高潮：合作不是預設，是一個有條件的成就。\n\n## 從你已知的出發\n\n你寫過 circuit breaker。我幾乎可以確定。\n\n它的邏輯是這樣的：對下游服務 B 設一個熔斷器，平常放行；一旦 B 連續吐錯（超過閾值），就「跳脫」——斷開、停止打它一段時間；冷卻過後進「半開」狀態，放一個探測請求過去，成功就恢復、失敗就再跳。\n\n現在我請你退一步，用賽局的眼睛重看這個你寫過無數次的東西。circuit breaker 的行為策略，幾乎逐條對應上本章主角「一報還一報（tit-for-tat）」的四個性質：\n\n- **它不會無緣無故先翻臉**——平常一律放行，只有在 B 真的開始失敗時才動手。（這叫「善良」：絕不率先背叛。）\n- **它一旦被打爆就立刻反應**——不是記恨地累積，而是當下就跳脫斷開。（這叫「可激怒」：被背叛立刻還手。）\n- **它不會記仇到死**——冷卻後就給 B 一個半開探測的機會，B 表現好就馬上恢復全面上線。（這叫「寬容」：對手回頭，就既往不咎。）\n- **它的規則簡單到對方一眼能懂**——「你連續錯就斷你、你恢復我就放你」，沒有藏著掖著的複雜判斷。（這叫「清晰」：對手容易預測你會怎麼回應。）\n\n善良、可激怒、寬容、清晰。這四個詞不是我硬湊的——它們正是 Robert Axelrod（艾瑟羅）在 1980 年總結 tit-for-tat 為什麼勝出時用的四個字。你在寫 circuit breaker 時靠工程直覺摸到的東西，賽局理論在四十多年前就用一場錦標賽證明了它的威力。\n\n再看一個你更熟的對照：exponential backoff。重試時退避、退避時間指數成長——這也是「可激怒」（系統忙就退一步、不硬擠）。但純 backoff 缺了「寬容」的明確結構：它沒有「對方一好轉就立刻全面上線恢復」的乾脆，而是慢慢爬回來。本章會讓你看到，「懲罰多久才原諒」這個你在調 backoff 參數時憑感覺拿捏的東西，其實藏著一條精確的數學門檻——而且它和上一章 grim trigger 的門檻**不一樣**。這是本章一個容易被混為一談、值得你停下來算清楚的地方。\n\n## Axelrod 的錦標賽：一個荒謬的實驗，一個不荒謬的結果\n\n1980 年，密西根大學的政治學家 Robert Axelrod 做了一件在當時相當古怪的事：他辦了一場**電腦程式打架的錦標賽**。\n\n規則很簡單。每個參賽者交一支程式，程式要做的事只有一件——在重複囚徒困境裡，每一回合決定「合作還是背叛」。Axelrod 把所有程式兩兩配對、做**循環賽（round-robin）**：每一對互相對戰 **200 回合**，每回合按我們的脊椎矩陣算分。最後加總每支程式在所有對戰裡拿到的總積分，分數最高者勝。\n\n先停下來認一下這張矩陣——**這就是 ch01 那張矩陣**，全書同一張，被我們重看到第五層：\n\n```text\n脊椎囚徒困境（這是 ch01 那張矩陣，數字＝獲益點數、越大越好）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ← R,R     (0, 5)  ← S,T\n    我方：背叛(D)      (5, 0)  ← T,S     (1, 1)  ← P,P\n\n    T > R > P > S      （5 > 3 > 1 > 0）   困境核心\n    2R > T + S         （6 > 5）           重複下「互相合作」優於「輪流剝削」\n```\n\nch01 我們在這張矩陣上看到「個體理性導致集體次優」；ch07 我們把它玩很多次、發現未來能救合作。現在 Axelrod 要問的是一個更實證的問題：**如果讓一群聰明人各自寫程式來玩它，誰會贏？**\n\n第一場有 **14 支程式**參賽，提交者都是有研究紀錄的賽局學者——他們可不是隨便寫寫。裡面有試圖偵測對手規律來反制的、有複雜的條件機率模型、有一開始試探性背叛幾下看對方軟不軟的。各種精心設計。\n\n冠軍是其中**最短的一支**：只有四行 FORTRAN，由數學家兼心理學家 Anatol Rapoport（拉波波特，也來自密西根）提交。它叫 **tit-for-tat（一報還一報，也譯以牙還牙）**，規則簡單到一句話講完：\n\n> **第一回合合作；之後每一回合，照抄對手上一回合的動作。**\n\n對方上次合作，我這次就合作；對方上次背叛，我這次就背叛。沒了。\n\nAxelrod 不太相信這個結果不是僥倖，於是辦了**第二場**——這次公開了第一場的所有結果與分析，邀請更多人來「破解」tit-for-tat，參賽者更多、設計得更針對。結果呢？**tit-for-tat 又贏了。**兩場錦標賽、兩次奪冠，靠的是同一支四行程式。\n\n1984 年 Axelrod 把這套結果寫成《The Evolution of Cooperation》（合作的演化），這本書後來被引用了數萬次，幾乎是「重複囚徒困境＝合作如何湧現」這個敘事的源頭。\n\n我認為這是整本書裡最該讓一個工程師會心一笑的一頁：**面對一群人用盡心機設計的複雜策略，贏家是那個簡單到近乎傻氣、而且從不耍詐的傢伙。**這不是雞湯，下一節我們會看到它背後有冷硬的機制。\n\n## tit-for-tat 為什麼贏：四個性質\n\nAxelrod 複盤兩場錦標賽，把 tit-for-tat（以及其他表現好的策略）的成功，歸納成四個性質。我把它們和你 circuit breaker 的直覺對齊著講：\n\n| 性質 | tit-for-tat 怎麼做 | 為什麼有用 | 工程對照 |\n|---|---|---|---|\n| **善良（nice）** | 絕不率先背叛，第一回合先伸手 | 和其他善良策略相遇時，雙方一路 (C,C)、各拿 R=3，積分穩穩往上堆 | circuit breaker 平常一律放行 |\n| **可激怒（retaliatory）** | 對方一背叛，下一回合立刻還手 | 讓「占它便宜」無利可圖——你 D 一次，下一回合就被 D 回來 | 連續失敗就跳脫 |\n| **寬容（forgiving）** | 對方回頭合作，立刻既往不咎、不追究 | 避免和「會犯錯／偶爾試探」的對手陷入無止境的互相報復 | 半開探測成功就恢復全面上線 |\n| **清晰（clear）** | 規則簡單、對手一眼看懂你會怎麼回應 | 對手能算出「占便宜會被罰、合作會被回報」，於是選擇合作 | 熔斷規則簡單可預測 |\n\n這四個性質裡，**「善良」與「可激怒」的組合**是核心引擎。善良讓你能和其他善良者建立 (C,C) 的長期高分流；可激怒讓你不被剝削者吃乾抹淨。光善良不可激怒（像「always cooperate」）會被背叛者生吞；光可激怒不善良（一開始就 D）會把本來能合作的對手推開、雙方掉進 (1,1) 的泥沼。\n\n但這裡有一個**極度反直覺、必須單獨拎出來講**的點，它是本章的招牌驚嘆，也是 landscape 標為 T5 的「常被誤傳」項——\n\n## 反直覺核心：最強的策略，一場單挑都贏不了\n\n請你把「贏得錦標賽」和「打贏對手」這兩件事，在腦子裡分開。\n\n你會自然地以為：tit-for-tat 既然贏了整場錦標賽，那它一定在很多場一對一裡擊敗了對手。**錯。事實正好相反：tit-for-tat 在任何一場一對一對戰裡，從來不可能贏過它的對手——最好的情況也只是打平。**\n\n為什麼？因為 tit-for-tat **從不率先背叛**（善良），而且它的報復**只還一次**（照抄上一回合）。這意味著：\n\n- 它永遠不會比對手多背叛——它的每一次背叛，都是在「複製」對手先前的背叛。\n- 所以在任何一對一裡，它頂多和對手背叛了一樣多次，永遠不會更多。\n\n而在囚徒困境裡，**你想在分數上「贏過」對手，唯一的辦法是你背叛它的次數比它背叛你的多**（每多一次「我 D 你 C」，我比你多賺 T−S=5 分的領先）。tit-for-tat 既然永遠不會比對手多背叛一次，它就**永遠不可能在分數上領先對手**。最多打平（雙方一路合作，3 對 3）。\n\n那它到底怎麼贏得錦標賽的？答案：**它不靠擊敗任何單一對手，它靠的是『跟所有人相處時自己的總積分高』。**\n\n```text\n兩種「贏」的對照（關鍵：錦標賽算的是「你自己的總分」，不是「你贏了幾場單挑」）\n\n  always-defect（總是背叛）：\n    打 tit-for-tat → 第一回合占便宜，之後一路 (1,1) 互背，分數很低\n    打另一個 always-defect → 全程 (1,1)，分數爛到底\n    它「擊敗」了很多對手（單挑分數常領先），但自己每場都只拿一點點\n\n  tit-for-tat（一報還一報）：\n    打另一個善良者 → 一路 (3,3)，自己每場都拿滿 R=3 × 200 ≈ 600 分\n    打 always-defect → 只在第一回合吃一次虧，之後就跟著互背、止血\n    它從沒「擊敗」任何人，但自己的總積分高到沒人比得上\n```\n\n這就是那句你該能對另一個工程師原話轉述的話：**「always-defect 贏了很多場單挑，卻輸了整場錦標賽；tit-for-tat 一場單挑都沒贏，卻贏了整場錦標賽。」**\n\n關鍵在於評分標準是「你和所有人相處下來自己賺了多少」，不是「你把多少人踩在腳下」。背叛者擅長的是「相對領先」——讓對手比自己更慘；但囚徒困境是非零和的（見 ch04），讓對手變慘並不會讓你變好。tit-for-tat 放棄了「贏過對手」，換來「和對手一起把餅做大」，而錦標賽獎勵的恰恰是後者。\n\n中央張力在這裡又冒出來了，而且換了張臉：**個體理性（在每一場單挑裡想領先對手）會把你推向背叛；但集體地看，真正讓你總分高的，是放下「領先」、去和能合作的人一起拿 (3,3)。**always-defect 是「個體理性贏單挑、集體輸錦標賽」的活標本。\n\n## hedge：tit-for-tat 不是萬能，是穩健\n\n寫到這裡我必須踩煞車，因為「tit-for-tat 最強」正是這個故事最容易被講過頭的地方。\n\nAxelrod 的結果是一個**強力的存在性示範**——它證明了「一個善良、可激怒、寬容、清晰的策略，能在一個由各式對手組成的環境裡勝出」。但它**不是**一條「演化必然導向 tit-for-tat」或「tit-for-tat 在任何環境都最優」的定律。\n\n理由有二，都要誠實標明：\n\n1. **勝負依賴對手池與環境。**tit-for-tat 贏的是「Axelrod 那兩場、那批對手、那個 200 回合、那組報酬數字」的錦標賽。換一批對手、換報酬矩陣、加進雜訊（訊號有機率被誤讀），結論會變。事實上在「按贏多少場單挑」這個不同的評分標準下，always-defect 之類的策略反而領先，而 tit-for-tat 一場都贏不了（這正是上一節那個反直覺點的另一面）。\n\n2. **後續研究證明沒有萬能策略。**Press 與 Dyson 在 2012 年提出了 zero-determinant（零行列式）策略，能在一對一裡單方面操控對手的長期報酬比例；加上大量演化模擬，學界的共識是：**沒有任何單一策略在所有環境下都最優**——穩健性是相對於環境的，不是絕對的王座。\n\n所以正確的講法是：**tit-for-tat 是「穩健」的，不是「最強」的。**它教給我們的不是「照抄這個策略就能贏」，而是更深的一課——**「善良、會還手、肯原諒、夠透明」這組性質，在一個多方反覆互動的世界裡，比耍小聰明更能讓你長期過得好。**這個結論比「tit-for-tat 天下無敵」謙虛得多，也耐用得多。\n\n## worked example：讓 tit-for-tat 對上兩個極端，逐回合算分\n\n光說不算不算數。我們手動讓 tit-for-tat 對上兩個極端對手——「always cooperate」和「always defect」——各跑 5 回合，逐回合記分，看它怎麼做到「不佔大便宜、也不吃大虧」。報酬照脊椎矩陣（我方視角：對 C 得 3、被佔 S=0；我 D 對方 C 得 T=5；雙 D 得 P=1）。\n\n**對局一：tit-for-tat（TFT）vs always-cooperate（AllC）**\n\nTFT 第一回合合作；之後照抄對手上一回合。AllC 永遠合作。\n\n```text\n回合   TFT 出   AllC 出   (TFT報酬, AllC報酬)   TFT累計   AllC累計\n  1      C        C          (3, 3)               3         3\n  2      C        C          (3, 3)               6         6\n  3      C        C          (3, 3)               9         9\n  4      C        C          (3, 3)              12        12\n  5      C        C          (3, 3)              15        15\n                                            ── 平手 15 : 15 ──\n```\n\n注意：TFT 大可以在這裡每回合背叛、把 AllC 生吞活剝（每回合賺 T=5），但它**不會**——因為它善良、從不率先背叛。它選擇和 AllC 一起拿 (3,3)。結果是「平手」——它沒佔對方便宜。這正是上面那個反直覺點的現場：TFT 明明有機會領先，卻放棄了。\n\n**對局二：tit-for-tat（TFT）vs always-defect（AllD）**\n\nTFT 第一回合合作；之後照抄。AllD 永遠背叛。\n\n```text\n回合   TFT 出   AllD 出   (TFT報酬, AllD報酬)   TFT累計   AllD累計\n  1      C        D          (0, 5)               0         5    ← TFT 吃了一次虧 (S=0)\n  2      D        D          (1, 1)               1         6    ← 之後止血、跟著互背\n  3      D        D          (1, 1)               2         7\n  4      D        D          (1, 1)               3         8\n  5      D        D          (1, 1)               4         9\n                                            ── AllD 領先 9 : 4 ──\n```\n\n看出 tit-for-tat 的兩面了嗎：\n\n- 它**吃了一次虧**——第一回合先伸手，被 AllD 占了一次便宜（拿 0）。代價是固定的、只有一次。\n- 它**立刻止血**——從第二回合起跟著互背，之後每回合只差一點（雙方都拿 1），不會被持續榨乾。\n\n在這場單挑裡，TFT 確實「輸」給了 AllD（4 比 9）——印證了「TFT 一場單挑都贏不了」。但請看整體：在一個**兩種對手都有**的錦標賽裡，TFT 對 AllC（拿 15）和對其他善良者（一路拿 3×回合數）累積的高分，遠遠淹沒它對 AllD 那點固定的小虧；而 AllD 雖然每場單挑都不輸，但它和善良者相遇時把對方逼成互背、自己也只能拿 1，總分爛得可憐。\n\n**自我複核**：對局二第 1 回合 TFT 出 C（首回合定義）、AllD 出 D → (S, T) = (0, 5) ✓；第 2 回合 TFT 照抄 AllD 上一回合的 D → 出 D，雙 D → (P, P) = (1, 1) ✓；之後穩定互背。累計 0+1+1+1+1=4、5+1+1+1+1=9 ✓。\n\n## tit-for-tat 維持合作的 δ 門檻：為什麼是 2/3，而 ch07 是 1/2\n\n現在進入本章最該讓你停下來算清楚、也最容易和上一章搞混的地方。\n\nch07 我們算過 grim trigger 對 grim trigger 維持合作的折扣因子門檻：δ ≥ (T−R)/(T−P) = (5−3)/(5−1) = **1/2**。本章我們要算的是**不同策略的不同門檻**：tit-for-tat 對 tit-for-tat。答案會是 **2/3**，而且**比 1/2 高**——這不是矛盾，原因深刻，值得你親手推一遍。\n\n先講清楚要算什麼。雙方都用 tit-for-tat，正常情況下會一路 (C,C) 合作下去。問題是：有沒有人想**偷偷背叛一下再回頭**？我們檢查**最誘人的那種偏離：偷背叛一次、再回頭修補關係**，看它划不划算。\n\n**合作路徑**（雙方一路合作，從現在起每回合拿 R）的折現總報酬：\n\n```text\n  V_合作 = R + δR + δ²R + ... = R / (1 − δ)\n```\n\n**偏離路徑**：我在某一回合偷偷背叛一次（對方此刻還在合作），然後回頭。對手是 tit-for-tat，會怎麼反應？逐回合追蹤我的報酬：\n\n```text\n  本回合：我 D，對方還在 C（它照抄我「上一回合」的 C）→ 我拿 T = 5   ← 偷打一次的甜頭\n  下回合：對方照抄我剛才的 D → 它出 D；我已回頭出 C → 我拿 S = 0    ← 被報復一次（我吃 sucker）\n  再之後：對方照抄我上回合的 C → 它回 C；我也 C → 從此每回合拿 R     ← 雙方重修舊好\n```\n\n關鍵在中間那一步：tit-for-tat **只懲罰一回合**（它寬容），所以我的偏離代價是「賺一次 T、賠一次 S，然後關係修復」。折現總報酬：\n\n```text\n  V_偏離 = T + δ·S + δ²·R + δ³·R + ...\n         = T + δ·S + δ²·R/(1 − δ)\n```\n\n**偏離不划算（合作能維持）的條件**：V_合作 ≥ V_偏離\n\n```text\n  R/(1−δ)  ≥  T + δS + δ²·R/(1−δ)\n\n  把含 R/(1−δ) 的項移到一邊：\n  R/(1−δ) − δ²·R/(1−δ)  ≥  T + δS\n  R·(1 − δ²)/(1−δ)      ≥  T + δS\n  R·(1 + δ)             ≥  T + δS        ← 用了 (1−δ²)=(1−δ)(1+δ)\n  R + δR               ≥  T + δS\n  δR − δS              ≥  T − R\n  δ·(R − S)            ≥  T − R\n  δ  ≥  (T − R)/(R − S)                  ← 門檻\n\n  代入脊椎數字 T,R,P,S = 5,3,1,0：\n  δ  ≥  (5 − 3)/(3 − 0)  =  2/3  ≈ 0.667\n```\n\n**所以：tit-for-tat 對 tit-for-tat 維持合作，需要 δ ≥ 2/3。**\n\n**為什麼這個門檻比 ch07 grim trigger 的 1/2 高？**這是本章一定要你想通的點，原因是**「懲罰多久」不同**：\n\n- **grim trigger** 一旦被背叛就**永遠**互背（永世掉進 P=1 的地獄）。偷打一次的代價是「未來永遠拿 P 而不是 R」——代價巨大且無窮延續。代價這麼重，所以**不太看重未來**（δ 只要 ≥1/2）也壓得住偷打的誘惑。\n- **tit-for-tat** 只懲罰**一回合**就原諒。偷打一次的代價只是「下一回合吃一次 S、然後就和好」——代價輕得多、而且很快結束。代價這麼輕，就**必須更看重未來**（δ 要 ≥2/3）才壓得住偷打的誘惑。\n\n一句話記住：**懲罰越輕、越寬容，就越需要你在乎未來，合作才撐得住。**寬容是美德（避免和會犯錯的對手無止境互殺），但寬容有代價——它把維持合作所需的「耐心門檻」抬高了。這是 tit-for-tat 的善良與寬容換來的、必須誠實標出的帳單。\n\n> 嚴謹度標示：上面是「工程師的嚴謹」——每一步你都能口頭說出理由。但要誠實標一個技術細節：我們檢查的是「偷背叛一次、再回頭修補」這一條最自然的偏離划不划算，得到 δ≥2/3 才壓得住它。嚴格地說，**雙方都用 tit-for-tat 是一個納許均衡（沒人想單方面偏離），但它不是子賽局完美均衡**——因為一旦真的有人背叛、兩個 TFT 互相照抄，會掉進 (D,C),(C,D),(D,C)… 無限交替的尷尬路徑，那條路徑上的「懲罰」未必可信。完整的子賽局完美分析更細緻（要改用像 grim trigger 那種「可信懲罰」的策略，或修正版的 TFT），本書不展開，指向延伸閱讀。\n\n## 無名氏定理：合作「可以」是均衡，不是「必然」會合作\n\n我們已經算出：δ 夠大時，「雙方都用 tit-for-tat、一路合作」是一個能自我維持的均衡。**無名氏定理（folk theorem）**把這件事一般化成一句更大、也更需要小心理解的話。\n\n它叫「folk theorem（無名氏／民間定理）」是因為——landscape 的考據——**它在正式發表之前，就已經在賽局學界口耳相傳、流傳到作者不可考**，像民間傳說一樣。後來有正式版本：Friedman 1971 用觸發策略支撐合作、Fudenberg 與 Maskin 1986 給出帶折扣的一般化版本。\n\n定理的直覺版（本書只給直覺與條件、不給證明，嚴格論證指向延伸閱讀）：\n\n> **在一個無限重複（或不定次數重複）的賽局裡，只要玩家夠有耐心（折扣因子 δ 夠接近 1），幾乎任何「可行且個人理性」的報酬——包括相互合作的 (3,3)——都能被支撐為一個（子賽局完美）均衡，靠的是可信的獎賞與懲罰。**\n\n「可行」＝這個報酬組合在賽局裡真的拿得到；「個人理性」＝至少不比「我擺爛、對方也擺爛」更糟（在囚徒困境裡就是不低於互背的 1）。\n\n聽起來像好消息：合作能當均衡了！但這裡藏著本章第二個、也是最容易讓人過度樂觀的陷阱，landscape 標為 T6——\n\n**folk theorem 說合作「可以」是均衡，它同時也說「全程互相背叛」也是均衡，以及兩者之間幾乎所有結果都是均衡。**\n\n換句話說，folk theorem 不是「重複就會合作」的保證，它是一個**「均衡多到爆炸」的定理**。它打開了合作的**可能性**，但它**沒有**告訴你：在這麼多均衡裡，現實會挑中哪一個。\n\n```text\nfolk theorem 的真實內容（δ 夠大時，下面這些「全都是」均衡）：\n\n  ┌─ 雙方一路合作 (3,3) ...................... 是均衡 ✓（好消息）\n  │  雙方輪流剝削、平均某個中間值 ............ 是均衡 ✓\n  │  雙方大致合作、偶爾互罰 .................. 是均衡 ✓\n  └─ 雙方全程互相背叛 (1,1) .................. 也是均衡 ✓（壞消息）\n\n  folk theorem 保證的是「這一整片都站得住」，\n  不是「會收斂到最上面那個」。挑哪一個？理論不說。\n```\n\n「現實為什麼常常挑中合作那一個」這個問題，folk theorem 答不出來——它要靠**額外的故事**：謝林點的顯著性（見 ch10，某個均衡因為更「自然」而被共同選中）、演化的篩選（見 ch09，哪種行為比例擋得住入侵）、聲譽與承諾（見 ch11，建立「我是會報復的人」的名聲）。\n\n這把中央張力推到一個更精細的位置：**重複與耐心，把「合作」從『不可能』升級成『可能』——但沒有升級成『必然』。**個體理性在重複下不再強迫你背叛（合作能當均衡了），可是它也沒強迫你合作（互背仍是均衡）。合作從一個被優勢策略碾碎的奢望，變成一個**需要被選中、被協調、被設計**的成就。這正是 Part III 標題「合作的考古學」的含義：合作不是地基裡本來就有的，是要一層層挖出來、扶起來的。\n\n## 直覺的陷阱\n\n本章兩個概念——tit-for-tat 與 folk theorem——各自對應一個經典誤解，都在 landscape 的「常被誤傳」清單上。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版 / 自我察覺 |\n|---|---|---|---|\n| **T5：tit-for-tat 是「最強」策略** | 「它贏了錦標賽，所以它能打贏對手、是最優策略，照抄就無敵」 | 把「贏得錦標賽（自己總分高）」誤當成「擊敗對手（讓對手更慘）」；又把「在那批對手裡穩健」誤當成「在所有環境都最優」 | tit-for-tat **一場單挑都贏不了**（最多平手），靠的是總積分；而且**穩健 ≠ 萬能**，勝負依賴對手池與環境（Press–Dyson 2012 證明沒有萬能策略）。**自我察覺**：當你想說「照抄 tit-for-tat 就贏」時，問自己「在什麼對手池、什麼評分標準下？」——答不出來就是把存在性示範當成了定律。 |\n| **T6：folk theorem 保證重複就會合作** | 「無限重複＋有耐心 ⇒ 合作會發生，重複賽局把困境解決了」 | 把「合作**可以**是均衡」偷換成「合作**一定會**發生」；忽略了「全程互背也是均衡」 | folk theorem 是**「均衡多到爆炸」**的定理：合作是均衡之一，**互背也是均衡**。它給可能性、不給保證；「現實為什麼選到合作」要靠謝林點／演化／聲譽額外解釋。**自我察覺**：當你想說「重複所以會合作」時，反問「那為什麼互背不也是均衡？」——folk theorem 的答案是「互背確實也是」。 |\n| **δ 門檻：grim 和 TFT 是同一個數** | 「重複賽局維持合作的門檻就是 1/2，記住這個數就好」 | 把 ch07 grim trigger 的 δ≥1/2 直接套到 tit-for-tat 上 | 門檻**因策略而異**：grim trigger 永遠懲罰 → δ≥(T−R)/(T−P)=**1/2**；tit-for-tat 只罰一回合 → δ≥(T−R)/(R−S)=**2/3**。**懲罰越輕越寬容，門檻越高。自我察覺**：算 δ 門檻前先問「這個策略懲罰多久？」——懲罰時長決定分母。 |\n\n## 紙上推演\n\n純紙上推演，動手算、不要跑程式。報酬一律照脊椎矩陣 T,R,P,S=5,3,1,0。\n\n### 推演題一（★★，20 分鐘）：tit-for-tat 對 grim trigger，逐回合對戰\n\n讓 tit-for-tat（TFT）對上 grim trigger（GRIM：先合作，一旦對方背叛過就永遠背叛）。**假設沒有任何雜訊、沒有人犯錯**，跑 6 回合，逐回合記下雙方出手與報酬、算總分。然後回答：在「沒有人先背叛」的世界裡，這兩個策略相遇會發生什麼？這說明了什麼？\n\n### 推演題二（★★★，20 分鐘）：「最強卻贏不了」為什麼不矛盾\n\n用自己的話、配一個具體的三方錦標賽（參賽者：TFT、AllC、AllD，兩兩對戰各 5 回合，算每個策略的**總積分**），論證為什麼「tit-for-tat 一場單挑都贏不了、卻可能拿到最高總積分」不是邏輯矛盾。算出三個策略各自的總分排名。\n\n### 推演題三（★★，15 分鐘）：折扣因子在門檻兩側\n\ntit-for-tat 對 tit-for-tat 維持合作需要 δ ≥ 2/3。分別取 δ=0.6 與 δ=0.8，用本章的 V_合作 與 V_偏離 公式，算出「一路合作」與「偷打一次再回頭」兩條路徑的折現總報酬，判斷各自情況下「偷打」划不划算。\n\n### 推演題四（★，口頭，10 分鐘）\n\n向一個說「重複賽局已經證明合作會自然發生，所以分散式系統裡只要長期互動，節點就會自動學會配合」的同事解釋：folk theorem 真正說了什麼、為什麼「合作會發生」是過度推論。\n\n### 推演解答\n\n**題一解答。**TFT 首回合 C；GRIM 首回合 C；之後 GRIM 只要對方沒背叛過就持續 C，TFT 照抄對方上一回合。\n\n```text\n回合   TFT 出   GRIM 出   (TFT, GRIM)   TFT累計   GRIM累計\n  1      C        C         (3, 3)         3         3\n  2      C        C         (3, 3)         6         6\n  3      C        C         (3, 3)         9         9\n  4      C        C         (3, 3)        12        12\n  5      C        C         (3, 3)        15        15\n  6      C        C         (3, 3)        18        18\n                                      ── 平手 18 : 18 ──\n```\n\n**會發生什麼**：兩個善良策略（都從不率先背叛）相遇，沒有任何一方先動手，於是 GRIM 的「扳機」永遠不會被扣下、TFT 永遠在照抄對方的 C——雙方一路 (C,C)、平分高分。**這說明了什麼**：grim trigger 的「永世報復」聽起來凶殘，但它和 tit-for-tat 一樣**善良**——在沒人先犯規的世界裡，兩者表現完全一樣（都拿滿 R）。兩者的差別**只在「對方背叛之後」才顯現**：GRIM 永不原諒、TFT 罰一次就和好。這也呼應了本章的 δ 門檻差異——差別藏在「懲罰階段」，而不是「合作階段」。**常見錯路**：以為 grim trigger 比 tit-for-tat「更愛背叛」所以分數更低——錯，在無雜訊、無人先背叛的對局裡兩者一模一樣；GRIM 的代價是在**有雜訊（誤觸發）**時才會暴露（一次誤判就萬劫不復），這是它不如 TFT 寬容的地方。\n\n**題二解答。**三方循環賽，兩兩各 5 回合。先逐對算出每個策略在每場拿的分（用本章 worked example 的結果＋對稱計算）：\n\n```text\n  TFT vs AllC：一路 (C,C)，5 回合 → TFT 拿 3×5 = 15\n  TFT vs AllD：第1回合 (0,5)、之後 4 回合 (1,1) → TFT 拿 0+1+1+1+1 = 4\n  AllC vs AllD：AllC 永遠 C、AllD 永遠 D → 5 回合都 (0,5) → AllC 拿 0\n  AllC vs TFT：對稱於上，AllC 拿 3×5 = 15\n  AllD vs TFT：AllD 第1回合 (5,0)、之後 4 回合 (1,1) → AllD 拿 5+1+1+1+1 = 9\n  AllD vs AllC：AllD 永遠 D 對 AllC 永遠 C → 5 回合都 (5,0) → AllD 拿 5×5 = 25\n\n  各策略總積分（加總它在兩場的得分）：\n    TFT  = 15 (對AllC) + 4  (對AllD) = 19\n    AllC = 15 (對TFT)  + 0  (對AllD) = 15\n    AllD = 9  (對TFT)  + 25 (對AllC) = 34\n```\n\n咦——在這個**只有三方、且有一個 AllC 任人宰割**的小錦標賽裡，**AllD 總分最高（34）**！這不打臉本章嗎？不。這恰恰是 landscape T5 的 hedge 活生生的演示：**tit-for-tat 的勝出依賴對手池組成。**當對手池裡充滿「會還手」的善良策略時，AllD 到處撞牆（互背只拿 1），TFT 靠彼此合作堆高分而勝出；但當對手池裡有大量「任人宰割」的 AllC 時，AllD 靠剝削它們大賺、就可能反超。**Axelrod 的錦標賽裡善良策略夠多，所以 TFT 贏；換個對手池結論就變。**\n\n至於「TFT 一場單挑都贏不了卻不矛盾」：在這三場裡，TFT 對 AllC 是 15:15（平手，沒贏）、對 AllD 是 4:9（輸）——**它確實一場單挑都沒贏**。它的 19 分總分全靠「自己每場都過得不差」（對善良者拿滿、對背叛者止血），而不是靠「擊敗誰」。**邏輯上不矛盾的關鍵**：總積分是「自己賺多少」的加總，與「贏幾場單挑（讓對手更慘）」是兩個獨立的量；非零和賽局裡讓對手變慘並不會讓自己變好。**常見錯路**：算 AllD vs AllC 時忘了 AllD 視角拿的是 T=5（很多人慣性寫成被佔的 0）——AllD 是占便宜的那方，逐回合拿 5。\n\n**題三解答。**公式：V_合作 = R/(1−δ)；V_偏離 = T + δS + δ²·R/(1−δ)。代 R=3, T=5, S=0：\n\n```text\n  δ = 0.6（門檻 2/3≈0.667 之下，預期「偷打」划算）：\n    V_合作 = 3/(1−0.6) = 3/0.4 = 7.5\n    V_偏離 = 5 + 0.6·0 + 0.6²·3/(1−0.6)\n           = 5 + 0 + 0.36·7.5\n           = 5 + 2.7 = 7.7\n    比較：V_偏離 7.7 > V_合作 7.5 → 偷打划算（多賺 0.2）→ 合作撐不住 ✓（δ<2/3）\n\n  δ = 0.8（門檻之上，預期「偷打」不划算）：\n    V_合作 = 3/(1−0.8) = 3/0.2 = 15\n    V_偏離 = 5 + 0.8·0 + 0.8²·3/(1−0.8)\n           = 5 + 0 + 0.64·15\n           = 5 + 9.6 = 14.6\n    比較：V_偏離 14.6 < V_合作 15 → 偷打不划算（少賺 0.4）→ 合作維持 ✓（δ>2/3）\n```\n\n**結論**：門檻 2/3 把兩個 δ 漂亮地分到兩側——δ=0.6 時偷打划算（合作崩）、δ=0.8 時偷打虧本（合作穩）。**自我複核**：在 δ 恰好 =2/3 時兩條路徑應相等：V_合作=3/(1/3)=9；V_偏離=5+0+(4/9)·9=5+4=9 ✓，分界點對上了。**常見錯路**：算 V_偏離 時漏掉「下一回合吃 S=0」那項（這裡 S=0 剛好不影響數值，但結構上不能漏——若 S≠0 會出錯）；或把 δ² 寫成 δ（偏離路徑的合作恢復是從**第三**回合起，所以折現是 δ²）。\n\n**題四解答（口頭要點）。**folk theorem 真正說的是：玩家夠有耐心時，相互合作**可以**被支撐為一個均衡——但它**同時**說全程互相背叛、以及兩者之間幾乎所有結果**也都是**均衡。所以「重複 ⇒ 會合作」是過度推論：重複只是讓合作**有資格**成為穩定結果（從不可能變可能），沒有保證系統**會選中**這個結果（互背仍然穩定）。分散式節點長期互動不會「自動學會配合」——它們同樣可能卡在「大家都搶、誰都不讓」的壞均衡（這正是 retry storm 的數學長相）。要讓系統落到合作那一個均衡，得靠額外設計：明確的協調點（謝林點）、聲譽機制、或乾脆改報酬規則（機制設計，見 ch13）。**常見錯路**：把 folk theorem 講成「賽局理論證明了合作會勝出」——它證明的是合作**站得住**，不是合作**會發生**。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. tit-for-tat 在 Axelrod 兩場錦標賽裡都奪冠，但它在任何一場一對一裡都贏不了對手——這兩件事為什麼不矛盾？「贏得錦標賽」和「擊敗對手」差在哪？\n2. tit-for-tat 的四個性質是哪四個？把每一個對應到你寫過的 circuit breaker 的一個具體行為上。\n3. 為什麼「善良＋可激怒」是核心引擎？只善良不可激怒（always cooperate）、只可激怒不善良（一開始就背叛），各會出什麼問題？\n4. tit-for-tat 對 tit-for-tat 維持合作需要 δ≥2/3，而 ch07 grim trigger 只要 δ≥1/2——為什麼 tit-for-tat 的門檻**更高**？提示：兩者「懲罰多久」差在哪？\n5. folk theorem 說「合作可以是均衡」，為什麼這**不**等於「重複就會合作」？它同時還說了哪個讓人掃興的事實？\n6. 「tit-for-tat 是最強策略、照抄就無敵」——這句話錯在哪兩個地方？（一個關於「贏的定義」，一個關於「環境依賴」。）\n7. folk theorem 既然不告訴我們會選中哪個均衡，那「現實為什麼常常合作」這個問題，要靠後面哪幾章的什麼概念來補？\n8. 用中央張力（個體理性 vs 集體理性）重講本章：重複與耐心把合作從「不可能」升級成「可能」，但為什麼沒有升級成「必然」？\n\n## 延伸閱讀\n\n- **Robert Axelrod,《The Evolution of Cooperation》(1984)**——本章的源頭。讀前四章就夠：錦標賽怎麼辦、tit-for-tat 怎麼贏、四個性質怎麼來。這是「重複囚徒困境＝合作如何湧現」這個敘事最原汁原味的版本，文字平易、幾乎不需要數學。\n- **Stanford Encyclopedia of Philosophy,「Prisoner's Dilemma」**（https://plato.stanford.edu/entries/prisoner-dilemma/）——讀「Iterated PD」與「The Folk Theorem」兩節，把 Axelrod 結論與 folk theorem 的精確邊界講得最清楚、也最誠實（包括 tit-for-tat 為何非萬能的後續討論）。\n- **Press & Dyson,「Iterated Prisoner's Dilemma contains strategies that dominate any evolutionary opponent」, PNAS (2012)**——若你想知道「為什麼沒有萬能策略」的硬核版：zero-determinant 策略能單方面操控對手的長期報酬。數學偏重，但摘要與引言就足以動搖「tit-for-tat 天下無敵」的迷思。\n- **「Is Tit-for-Tat the Answer? On the Conclusions Drawn from Axelrod's Tournaments」, PLOS One (2015)**（https://journals.plos.org/plosone/article?id=10.1371%2Fjournal.pone.0134128）——專門檢視「從 Axelrod 錦標賽到底能不能推出 tit-for-tat 最優」的論文，是本章 hedge（穩健≠萬能）最直接的依據；讀它的討論一節，學會對「演化必然導向合作」這類大話保持戒心。\n- **Fudenberg & Maskin,「The Folk Theorem in Repeated Games with Discounting or with Incomplete Information」, Econometrica (1986)**——folk theorem 帶折扣的一般化原典。技術性高，但若你想看「合作可為子賽局完美均衡」這句話的嚴格條件（含三人以上的全維度條件），這是源頭。\n"}, {"id": "ch09-evolutionary-ess", "file": "ch09-evolutionary-ess.md", "group": "Part III — 合作的考古學", "title": "ch09 — 演化賽局與 ESS：均衡不需要會算的玩家", "md": "# ch09 — 演化賽局與 ESS：均衡不需要會算的玩家\n\n> **本章解決什麼問題**：到 ch08 為止，「均衡」一直暗藏一個前提——有個會算報酬、會推理對手、會挑最佳反應的理性玩家坐在那裡。本章把這個前提整個抽掉，問一個瘋狂的問題：**如果沒有人在算，均衡還會出現嗎？** 答案是會，而且這正是 Part III「合作的考古學」最後一塊拼圖：演化穩定策略（ESS）告訴你，天擇可以代替理性去執行「最佳化」，讓族群自己滾到一個沒有突變能入侵的穩定點。它接在 ch07（重複賽局）與 ch08（一報還一報與無名氏定理）之後，把那兩章「合作要靠未來陰影撐住」的故事換成「合作要靠繁殖差異篩出來」的版本；同時它是脊椎七層的第六層——把 ch01 那張囚徒困境矩陣放進一整個族群，看背叛者怎麼把合作者吃乾抹淨。\n\n## 從你已知的出發\n\n你跑過漸進放量（canary rollout）。新版本上線，先給 1% 流量，盯著它的錯誤率、P99 延遲、轉換率。表現好，比例往上調到 5%、20%、100%；表現差，回滾，比例歸零。整個過程裡，**沒有任何一個版本「決定」要勝出**——是你的放量規則根據指標，自動把表現好的版本比例往上推。版本本身不會算、不會推理、不會挑最佳反應；它只是「碰巧」在這個流量、這個負載下跑得好，於是被你的機制保留、擴大。\n\n把「你盯著指標手動調比例」換成「指標差就自動縮、好就自動放」，你就得到了一個沒有設計者在場的選擇過程。這就是本章的核心轉換：**「最佳化」不一定要由一個會算的腦袋來做，它可以由一個「表現好就被放大、表現差就被淘汰」的迴圈來做。** 天擇就是這個迴圈，跑在生物族群上、跑了幾億年。\n\n你其實對這個直覺非常熟，只是沒這樣命名：\n\n- **A/B test**：兩個版本同場競爭，轉換率高的那個「比例上升」，最後吃掉全部流量。沒有版本在策略性思考，是環境（使用者點擊）在篩。\n- **自動彈性伸縮（autoscaling）**：負載高就多開 pod、低就回收。沒有 pod 在「決定」要不要存在，是負載這個外部壓力在決定族群大小。\n- **GC 與快取淘汰**：LRU 不「思考」哪個 entry 該死，它只執行一條「最久沒用的先淘汰」的規則。被淘汰的 entry 沒做錯什麼，它只是在當前的存取模式下「適存度低」。\n\n這些系統的共通點是：**有個明確的選擇壓力（指標、負載、存取頻率），表現好的東西比例上升、表現差的下降，而被選的東西本身完全不需要理解這場競爭。** 演化賽局就是把賽局理論搬進這個框架。本章要回答兩個問題：（一）當「玩家」變成「一整個族群裡某種行為的比例」、「報酬」變成「繁殖成功率」，納許均衡這個概念會變成什麼？（二）那個新概念——演化穩定策略——憑什麼比納許均衡更挑剔，挑剔在哪？\n\n先預告本章最反直覺的一刀，因為你的直覺正要騙你：**你會忍不住覺得「動物會打架但很少打死對方，是因為牠們『懂得』節制」。錯。沒有任何動物懂任何東西。那個節制是一個比例，是天擇在「愛打架的基因」和「愛退讓的基因」之間滾出來的平衡點——一個均衡，而場上沒有任何一個玩家在算報酬。**\n\n## 四個翻譯：把賽局搬進族群\n\n賽局理論原本的語言是「理性玩家挑策略最大化報酬」。演化生物學要用它，得先把每個詞翻譯過去。這張對照表是本章的地基，值得你停下來逐行對：\n\n```text\n古典賽局理論              演化賽局理論\n─────────────────────    ─────────────────────────────────\n玩家（player）       →   族群裡的一個個體（不會算、不會選）\n策略（strategy）     →   表現型／行為型（基因決定，天生帶著）\n報酬（payoff）       →   適存度（fitness）＝繁殖成功的多寡\n「挑最佳反應」       →   天擇：適存度高的型，下一代比例上升\n納許均衡             →   演化穩定策略（ESS）：擋得住突變入侵的比例\n混合策略 (p, 1−p)    →   兩種詮釋：① 族群裡 p 比例是型 A、(1−p) 是型 B\n                         ②每個個體有 p 機率表現成 A（多型 vs 個體混合）\n```\n\n最關鍵、也最容易被忽略的是中間那條：**「挑最佳反應」被「天擇」取代了。** 古典賽局裡，是玩家自己在腦中比較「我選 A 還是 B 報酬高」然後選高的那個。演化賽局裡，沒有人在比較——是「碰巧帶著高適存度行為型的個體，留下更多後代，於是這個行為型在下一代的族群裡佔比更高」。**比較與最佳化沒有消失，它從「個體腦中的計算」搬到了「世代之間的統計」。** 這是整章的樞紐，後面所有驚嘆都從這裡長出來。\n\n順帶釐清一個你大概會卡的點：演化賽局裡的「報酬」不是金錢、不是效用、不是快樂，是**適存度**——平均而言留下多少能存活到繁殖的後代。一隻鳥多搶到一份食物，意義是「多撐過一個冬天、多下一窩蛋」，不是「多賺一塊錢」。所以這裡的「玩家在乎報酬」要重新理解成「報酬高的型，被天擇自動放大」——在乎的不是玩家，是這個篩選迴圈。\n\n（混合策略的「族群比例」這層，本質上是把一個機率分布鋪在整個族群上；要深究機率分布本身的運算，見《馴服隨機》談機率分布與期望值那幾章，本書只用結果。）\n\n## ESS：擋得住入侵的比例\n\n納許均衡問的是：「哪個策略組合下，沒有人想**單方面**偏離？」演化賽局問一個表面像、骨子裡更嚴的問題：「哪種行為比例，普遍存在之後，**擋得住一小撮突變入侵**？」這就是演化穩定策略（evolutionarily stable strategy, ESS），由梅納德・史密斯（John Maynard Smith）與普萊斯（George Price）在 1973 年那篇《動物衝突的邏輯》（Nature 246:15–18）提出。\n\n精確意義先講白話：**一個策略 S 是 ESS，意思是「整個族群都在玩 S 的時候，任何初始稀少的突變策略 T 都無法靠天擇壯大起來」。** S 是個演化的終點——滾到這裡就賴著不走了，因為任何想入侵的新花樣都會被篩掉。\n\n把這個白話拆成可檢查的條件（這是「工程師的嚴謹」：每一步你都能口頭說出理由）。設 E(X, Y) 表示「玩 X 的個體，碰上玩 Y 的個體時拿到的適存度」。一個策略 S 要當 ESS，得滿足以下兩條之一成立（梅納德・史密斯的標準條件，見延伸閱讀）：\n\n```text\nESS 的兩個條件（S 是現任、T 是任何想入侵的突變）：\n\n  條件一（嚴格較優）：  E(S, S) > E(T, S)\n     ← S 對 S 的表現，嚴格好過 T 對 S。突變一冒頭就吃虧，當場被篩掉。\n\n  條件二（打平就比後手）：若 E(S, S) = E(T, S)，\n                          則需 E(S, T) > E(T, T)\n     ← 突變對現任打平、暫時混進來了；但只要現任「對突變」比\n       「突變對突變」更強，等突變變多一點點，現任就反殺回去。\n```\n\n注意條件一長得跟「嚴格納許均衡」一模一樣（S 是對 S 自己的嚴格最佳反應）。**ESS 比納許均衡多的，是條件二那層保險。** 納許均衡只要求「沒人想單方面偏離」，它管不住「一票人同時偏離成同一個新策略、而且這個新策略碰到原策略時打平」這種情況——打平的突變在納許的框架下不會被擋，但在演化裡，只要它變多一點點、開始彼此相遇，現任能不能反殺它，就決定了族群會不會被入侵。**ESS = 嚴格納許均衡，或者「弱納許均衡 + 對入侵者的反殺優勢」。** 這層額外的挑剔，正是「演化動態的穩定」比「靜態的無人想偏離」多出來的東西。\n\n這裡得誠實標一句嚴謹度：上面是 ESS 的**定義條件**，不是「ESS 等價於某個動態穩定點」的證明。ESS 與 replicator dynamics（下一節）的漸近穩定點之間的精確關係（ESS ⇒ 漸近穩定，反之不一定）是有定理的，本書給直覺、不展開，指向延伸閱讀。\n\n## 鷹鴿賽局：為什麼動物不把對手往死裡打\n\nESS 的招牌例子是鷹鴿賽局（Hawk–Dove），梅納德・史密斯用它回答一個老生物學謎題：同種動物爭資源時，明明都有爪有牙，為什麼大多是虛張聲勢、很少打到一方重傷？「為了物種好」是錯的答案（天擇不為物種著想，只為基因的繁殖差異著想）。正確答案是一個 ESS。\n\n設定：兩個個體爭一份價值 V 的資源。每個個體天生是「鷹」（Hawk，遇敵就拚到底）或「鴿」（Dove，擺姿態，對方真打就退）。打架受傷的成本是 C。報酬（適存度增益）矩陣如下，**這是 landscape 二的鷹鴿基準，本書取 V=2、C=4（C>V，自然界常態：受傷比資源貴）**：\n\n```text\n鷹鴿賽局（行＝對手；報酬＝我方期望適存度增益）。V=2、C=4：\n                對手：鷹(H)          對手：鴿(D)\n    我方：鷹(H)   (V−C)/2 = −1        V = 2\n    我方：鴿(D)   0                   V/2 = 1\n\n逐格白話：\n  鷹遇鷹：拚到底，一半機率拿 V、一半機率受傷付 C，\n          平均 (V−C)/2 = (2−4)/2 = −1（兩敗俱傷，期望是淨虧）\n  鷹遇鴿：鴿讓步，鷹白拿整份資源 V = 2\n  鴿遇鷹：鴿退，啥都沒拿、也沒受傷，得 0\n  鴿遇鴿：擺姿態後平分，各 V/2 = 1\n```\n\n先看純策略：有沒有「全鷹」或「全鴿」的 ESS？\n\n- **全鴿能被入侵嗎？** 能。一個鷹突變混進全鴿族群，它每場都碰到鴿、每場白拿 V=2，遠高於鴿遇鴿的 1。鷹的適存度爆高，比例暴漲。**全鴿不是 ESS**——太好欺負，鷹一定來。\n- **全鷹能被入侵嗎？** 能。全鷹族群裡每場都是鷹遇鷹，平均 −1（互相砍到虧）。一個鴿突變混進來，它遇鷹就退、拿 0——0 雖然不多，但**比 −1 好**。鴿的相對適存度更高，比例上升。**全鷹也不是 ESS**——太愛拚，鴿子撿便宜。\n\n兩個純策略都會被入侵。所以 ESS 一定是個**混合**：族群裡鷹和鴿以某個比例共存，共存到誰也入侵不了誰。這個比例是多少？\n\n## Worked example：手算鷹鴿 ESS 比例\n\n求那個「誰也入侵不了誰」的比例 p*（族群中鷹的比例）。用的工具和 ch05 解混合策略一模一樣——**無差異原理**：在穩定比例下，當鷹和當鴿的期望適存度必須相等。直覺：如果當鷹明顯划算，鷹比例就會繼續漲、不穩定；要穩定，兩種型的「日子過得一樣好」，誰也沒有比例上漲的壓力。\n\n設族群中鷹佔比例 p、鴿佔 (1−p)。一個個體隨機碰到對手，有 p 機率碰到鷹、(1−p) 機率碰到鴿。\n\n```text\n一隻「鷹」在這個族群裡的期望適存度：\n  E(鷹) = p · (鷹遇鷹) + (1−p) · (鷹遇鴿)\n        = p · (−1)      + (1−p) · 2\n        = −p + 2 − 2p\n        = 2 − 3p                          … (1)\n\n一隻「鴿」在這個族群裡的期望適存度：\n  E(鴿) = p · (鴿遇鷹) + (1−p) · (鴿遇鴿)\n        = p · 0         + (1−p) · 1\n        = 1 − p                           … (2)\n\n無差異：令 E(鷹) = E(鴿)\n  2 − 3p = 1 − p\n  2 − 1  = 3p − p          ← 把 p 移到一邊、常數移到另一邊\n  1      = 2p\n  p*     = 1/2                            ← ESS 鷹比例\n```\n\n得到 **p\\* = 1/2**：穩定族群是一半鷹、一半鴿。對照公式 p* = V/C = 2/4 = 1/2，吻合。（這個公式只在 **C>V** 時成立——受傷比資源貴，本書設定 V=2、C=4 正是這種常態。一旦 V≥C，打架穩賺、鷹變成嚴格優勢策略，唯一 ESS 是全鷹 p\\*=1；硬套 V/C 會算出 ≥1 的無效比例。）\n\n**第二視角交叉驗算（最佳反應 / 偏離回拉）**，這是混合策略最容易算錯的地方，務必雙視角各驗一次：假設族群暫時偏到鷹比例 p = 0.6（鷹偏多）。代回 (1)(2)：\n\n```text\np = 0.6 時：\n  E(鷹) = 2 − 3(0.6) = 2 − 1.8 = 0.2\n  E(鴿) = 1 − 0.6 = 0.4\n  → E(鴿) > E(鷹)：鷹太多時當鴿划算 → 鴿比例上升 → 鷹比例被拉回 ↓\n\np = 0.4 時（鷹偏少）：\n  E(鷹) = 2 − 3(0.4) = 2 − 1.2 = 0.8\n  E(鴿) = 1 − 0.4 = 0.6\n  → E(鷹) > E(鴿)：鷹太少時當鷹划算 → 鷹比例上升 → 拉回 ↑\n```\n\n兩邊都把比例往 0.5 拉——p\\* = 1/2 是個**會自我修復**的穩定點，這正是 ESS 抗入侵的意思：任何偏離（包括突變帶來的小偏離）都會被天擇推回去。驗算通過。\n\n這裡有一個 ch05 沒給你的新詮釋，停十秒想清楚：p* = 1/2 可以是「族群裡一半個體是純鷹、一半是純鴿」（**族群多型**，polymorphism），也可以是「每個個體都有一半機率表現成鷹、一半成鴿」（**個體混合**）。賽局理論的數學分不出這兩者——它只給比例。生物學上兩種都存在。這就是「混合策略 = 族群比例」這層詮釋的全部威力：ch05 那個抽象的 (1/2, 1/2)，在這裡有了血肉。\n\n## replicator dynamics：往坡上爬的不是腦，是繁殖\n\n上面我們直接「猜」了穩定比例再驗算。但族群是怎麼**滾**到那裡的？這就是 replicator dynamics（複製者動態）要講的事。完整方程本書不推（指向延伸閱讀，也指向《矩陣是動詞》談特徵值與穩定性那層），但它的直覺一句話就能抓住，而且你已經在 A/B test 裡用過：\n\n> **適存度高於族群平均的型，比例上升；低於平均的，比例下降；上升或下降的「成長率」（相對速度），正比於它高出（或低於）平均多少。**（精確點說，比例變化的絕對速度還要乘上該型當前的佔比——佔比趨近 0 的型，就算相對成長率很高，絕對增量也很小。完整方程見延伸閱讀。）\n\n這就是達爾文式選擇寫成微分方程。注意它的精妙：一個型不需要「絕對好」，只需要**比當前族群平均好**。這跟你調漸進放量的邏輯完全同構——新版本不需要完美，只要比現在線上的平均表現好，它的流量比例就會被往上推。\n\n把這個直覺套回鷹鴿。在 p=0.6（鷹偏多）時，我們算過鴿的適存度 0.4 高於鷹的 0.2，也高於族群平均（介於兩者之間）；於是鴿比例上升、鷹比例下降，往 0.5 走。在 p=0.4 時反過來。**replicator dynamics 讓族群像球滾進碗底一樣，自己滾到 ESS。** 而碗底的位置（p\\*=1/2），完全由報酬矩陣決定——沒有任何一隻鳥知道這個比例、沒有任何一隻鳥在「維持」它。\n\n這一節是「演化動態軌跡」這種「視覺本身就是論點」的內容，將來會配一張 replicator 相圖（鷹鴿族群比例沿時間滾向 p\\*=1/2 的軌跡）。在圖補上前，上面的數值表已經完整呈現了「偏離被拉回」的動態。\n\n## 把脊椎放進族群：背叛者入侵合作者\n\n現在做本章對脊椎的那一刀——**這是 ch01 那張囚徒困境矩陣**，但這次不是兩個會算的玩家對坐，而是一整個族群裡「合作者」和「背叛者」兩種行為型在繁殖競爭。脊椎被重看到第六層。\n\n```text\n脊椎囚徒困境（ch01 那張矩陣，數字＝獲益點數＝這裡的適存度增益）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)\n    T,R,P,S = 5,3,1,0；背叛＝嚴格優勢策略\n```\n\n問：合作（C）是 ESS 嗎？用條件一檢查。一個全合作族群（大家相遇都拿 R=3），冒出一個背叛突變 T：\n\n```text\n背叛突變在全合作族群裡：每場都碰到合作者，拿 T = 5\n現任合作者碰到合作者：拿 R = 3\n  → E(D, C) = 5  >  E(C, C) = 3\n```\n\n背叛突變的適存度（5）狠狠輾過現任合作者（3）。**E(D,C) > E(C,C)，連 ESS 條件一都過不了——合作不是 ESS，背叛者一冒頭就以更高的繁殖率擴張，把合作者吃掉。** 反過來，背叛（D）是 ESS 嗎？全背叛族群大家拿 P=1，一個合作突變進來碰到背叛者拿 S=0 < 1，立刻被篩掉。**背叛是 ESS。** 族群會滾向全背叛——那個 (1,1) 的雙輸結局。\n\n停在這裡感受一下這一刀的重量。在 ch01，(背叛,背叛) 之所以發生，故事是「兩個聰明人各自算報酬、發現背叛是優勢策略」。**現在這個故事裡沒有聰明人、沒有算報酬、沒有人理解什麼是優勢策略——背叛照樣勝出。** 個體理性 vs 集體理性的裂縫（全書中央張力）在這裡換了一張臉：**不需要任何「個體理性」，光靠天擇的繁殖篩選，就足以把族群推進那個對所有成員都更糟的 (1,1)。** 集體最優 (3,3) 依然非均衡，依然救不回來——而這次連「自私」都不能怪，因為沒有任何主體在自私，只有比例在動。這是我認為整章最冷的一頁：**困境不需要壞人，甚至不需要人。**\n\n那合作在演化裡就沒救了嗎？有，但要靠額外結構——和 ch07/ch08 救合作的工具同源，只是換成演化語言：\n\n- **重複（未來陰影的演化版）**：如果個體會反覆相遇，「以牙還牙」這種行為型（ch08 的 tit-for-tat）可以抵抗背叛入侵——背叛者第一次占便宜，之後被報復，長期適存度未必高。Axelrod 1984《合作的演化》正是把錦標賽結果重讀成演化模擬。\n- **親緣選擇（kin selection）**：對親屬合作 = 幫自己的基因傳下去。漢彌爾頓法則（Hamilton's rule，rb > c：親緣度 × 受益 > 代價時利他演化得出來）一句帶過，數學指向延伸閱讀。\n- **聲譽與空間結構**：合作者群聚（只跟鄰居互動）時，合作者彼此相遇拿 R、被背叛者占便宜的機會變少，合作就有立足之地。\n\n把這些對回 ch08：**ch08 用「δ 夠大、未來陰影夠長」讓會算的玩家選擇合作；ch09 用「重複/親緣/結構改變了繁殖篩選」讓不會算的族群演化出合作。** 同一件事——救合作——一個靠理性、一個靠選擇壓力。這正是本章存在的理由：它證明合作（和困境）都不是「理性」的專利。\n\n## 直覺的陷阱\n\n演化賽局是擬人化的重災區——它的詞彙（「策略」「最佳化」「想要」）全都借自會思考的玩家，一不小心就把「思考」也借進去了。守住下面這幾條正確版：\n\n| 錯誤直覺 | 哪一步把你帶溝裡 | 正確版（自我察覺的徵兆） |\n|---|---|---|\n| **ESS 需要動物「理性地選混合策略」** | 看到「策略」「最佳化」「均衡」就腦補一個會算的主體 | ESS 裡沒有任何個體在算報酬（landscape T9）。「策略」是基因決定的行為型、「最佳化」由天擇代勞、「均衡」是擋得住突變的比例。**徵兆：你開始說「鳥決定當鷹」——鳥沒決定任何事，是帶鷹基因的鳥碰巧多留了後代。** |\n| **ESS 就是納許均衡換個名字** | 看到「條件一長得像納許」就以為完全等價 | ESS 比納許嚴格：它多了條件二（對打平的入侵者要能反殺）。**每個 ESS 都是納許均衡，但有些納許均衡不是 ESS**（弱均衡可能被中性突變慢慢侵蝕）。徵兆：你說不出「條件二在防什麼」。 |\n| **動物不把對手打死是「為了物種好」** | 把天擇想成有全局目標的設計師 | 天擇沒有「為物種好」這個目標，只有基因的繁殖差異。鷹鴿節制是 p\\*=1/2 這個 ESS 的副產品，不是誰的善意。徵兆：你開始用「為了……好」解釋演化結果。 |\n| **演化一定滾向「最好」的結果** | 把「適存度高的比例上升」誤讀成「族群會找到集體最優」 | 演化只滾向 ESS，而 ESS 可以爛透——脊椎困境演化出全背叛 (1,1)，集體最優 (3,3) 沒救。**選擇壓力放大的是「相對適存度高」，不是「集體好」**（中央張力的演化版）。徵兆：你預期演化會通往合作/和諧。 |\n| **混合 ESS 表示「每隻動物都半鷹半鴿」** | 把族群層級的比例硬塞回個體 | p\\*=1/2 可以是「一半個體純鷹、一半純鴿」（族群多型），也可以是「每個體 50% 機率當鷹」（個體混合）——數學分不出，兩者都存在。徵兆：你斷言只能是其中一種。 |\n\n最值得反覆自我察覺的是第一條。整套演化賽局的詞彙都在偷渡「意圖」。你每次讀到「策略想要最大化適存度」，要在心裡翻譯成「帶這個行為型的個體碰巧留下較多後代」。能穩定做這個翻譯，你就真的懂了「均衡不需要會算的玩家」這個驚嘆點——而且能講給另一個工程師聽：**這就像 LRU 快取，它不『想要』留住熱門資料，它只是執行淘汰規則，結果熱門資料『碰巧』留下來了。沒有意圖，只有篩選。**\n\n## 紙上推演\n\n### 推演題一（★★，**[20 分鐘]**）換個成本，重算鷹鴿 ESS\n\n把鷹鴿賽局的成本從 C=4 改成 **C=3**（價值仍 V=2，仍 C>V）。重畫報酬矩陣，用無差異法手算新的 ESS 鷹比例 p\\*，並用「偏離回拉」交叉驗算一次。對照公式 p\\*=V/C 檢查。\n\n### 推演題二（★★，**[20 分鐘]**）把脊椎困境放進族群\n\n用 ch01 脊椎矩陣（T,R,P,S=5,3,1,0），把報酬讀成適存度。一個 99% 合作者、1% 背叛者的族群，這一代過後，背叛者的比例會上升還是下降？用「背叛者的平均適存度 vs 合作者的平均適存度」論證，並說清為什麼這代表「合作不是 ESS」。\n\n### 推演題三（★★★，**[15 分鐘]**）口頭題：均衡不需要會算的玩家\n\n不准用「策略」「最佳化」這兩個詞，向一個只懂後端、沒學過賽局的同事解釋：鷹鴿賽局的 ESS（一半鷹一半鴿）是怎麼在「沒有任何動物在算」的情況下出現並維持的。要求他聽完能複述「為什麼這是個均衡卻沒有玩家」。\n\n### 推演解答\n\n**題一解答。** V=2、C=3，矩陣：\n\n```text\n                對手：鷹(H)          對手：鴿(D)\n    我方：鷹(H)   (V−C)/2 = −0.5      V = 2\n    我方：鴿(D)   0                   V/2 = 1\n\n設鷹比例 p：\n  E(鷹) = p·(−0.5) + (1−p)·2 = −0.5p + 2 − 2p = 2 − 2.5p\n  E(鴿) = p·0 + (1−p)·1 = 1 − p\n無差異：2 − 2.5p = 1 − p\n        2 − 1 = 2.5p − p\n        1 = 1.5p\n        p* = 2/3\n對照公式 p* = V/C = 2/3 ✓\n\n交叉驗算（取 p = 0.8 > 2/3，鷹偏多）：\n  E(鷹) = 2 − 2.5(0.8) = 2 − 2 = 0\n  E(鴿) = 1 − 0.8 = 0.2  → 鴿較優 → 鷹比例下降，往 2/3 拉回 ✓\n```\n\n**ESS 鷹比例 = 2/3。** 常見錯路：(一) 把 (V−C)/2 算成 (2−3)/2 = −1（少除以 2，或把 V−C 看成 −2）——正確是 −0.5。(二) 用錯無差異對象，去令「鷹遇鷹 = 鴿遇鴿」而不是「E(鷹)=E(鴿)」——無差異是針對**兩種型在整個族群裡的期望適存度**，不是某兩格。(三) 忘了交叉驗算，把不穩定的解當 ESS。注意成本越低（C 從 4 降到 3），鷹比例越高（1/2 → 2/3）——打架越不痛，愛拚的型越吃香，直覺吻合。\n\n**題二解答。** 族群 99% C、1% D。一個個體碰到的對手有 0.99 機率是 C、0.01 是 D。\n\n```text\n合作者的期望適存度：\n  E(C) = 0.99·(C遇C=R=3) + 0.01·(C遇D=S=0)\n       = 0.99·3 + 0.01·0 = 2.97\n\n背叛者的期望適存度：\n  E(D) = 0.99·(D遇C=T=5) + 0.01·(D遇D=P=1)\n       = 0.99·5 + 0.01·1 = 4.95 + 0.01 = 4.96\n```\n\nE(D) = 4.96 遠高於 E(C) = 2.97，也高於族群平均（≈2.99）。**背叛者比例會上升**——它的相對適存度高，下一代佔比擴大。這正是「合作不是 ESS」的演化版本：在全（近全）合作族群裡，背叛突變 E(D,C)=5 > E(C,C)=3，連 ESS 條件一都過不了，背叛者必然入侵。常見錯路：(一) 以為 1% 太少、影響不到——比例多寡不改變「哪種型適存度高」這個方向，方向決定誰擴張。(二) 把「集體最優是 (3,3)」當成「演化會往那裡走」——演化放大的是相對適存度高的型（背叛），不是集體好的結局，這就是中央張力的演化臉。\n\n**題三解答（示範講法）。** 「想像一個系統裡有兩種自動化規則在跑：一種叫『硬碰硬』，搶資源時絕不讓步；一種叫『軟退讓』，碰到搶就讓。每種規則控制的節點，跑得好（搶到資源、沒被搞壞）就會被複製出更多同款節點，跑得差就慢慢被回收——就像表現好的服務版本流量被放大、差的被回滾，沒有節點在『決定』什麼，是放量機制在篩。現在關鍵來了：如果全場都是『硬碰硬』，它們互相搶會兩敗俱傷、平均很虧，這時混進來幾個『軟退讓』反而活得好（至少不受傷），於是軟退讓被放大；可是一旦軟退讓變多、場上好欺負，『硬碰硬』又開始白吃白拿、被放大回來。兩股力量一推一拉，最後卡在一半一半——多一點硬就有利於軟、多一點軟就有利於硬，誰也擠不掉誰。這個『一半一半』就是均衡：它穩定（任何偏離都被拉回），但場上沒有任何節點知道這個比例、沒有任何節點在維持它，是篩選迴圈自己滾到這裡的。」要點：用篩選機制（放量/回收）替掉「思考」，講出「兩種型互為對方多寡的剋星」的拉鋸，並點明「穩定但無玩家」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 演化賽局把古典賽局的四個詞（玩家、策略、報酬、最佳化）各翻譯成什麼？其中**哪一個翻譯**是「不需要理性玩家」這個驚嘆點的真正樞紐？為什麼？\n2. ESS 的兩個條件分別在防什麼？為什麼「嚴格納許均衡」只對應到條件一、條件二是 ESS 比納許多出來的保險？舉一個「是納許均衡但不是 ESS」會發生的情境（中性突變）。\n3. 鷹鴿賽局裡，為什麼「全鷹」和「全鴿」都不是 ESS？分別會被誰入侵、為什麼？混合 ESS 的 p\\*=V/C 背後的無差異直覺是什麼？\n4. 為什麼「動物很少把同類打死」用「為了物種好」解釋是錯的？正確的演化解釋（ESS 的副產品）怎麼講？\n5. 把脊椎困境放進族群，為什麼背叛是 ESS、合作不是？這跟 ch01「背叛是優勢策略」是同一件事還是不同的事？個體理性 vs 集體理性的裂縫，在「沒有理性玩家」的版本裡長什麼樣？\n6. replicator dynamics 的一句話直覺是什麼？它跟你調漸進放量（canary）的邏輯哪裡同構？一個型要「上升」，需要絕對好還是只要比族群平均好？\n7. 混合 ESS 的兩種詮釋（族群多型 vs 個體混合）差在哪？為什麼賽局理論的數學分不出它們？\n8. ch08 用什麼救合作、ch09 用什麼救合作？兩者「救」的機制差在哪、又為什麼可說是同源？\n\n## 延伸閱讀\n\n- **Maynard Smith & Price, \"The Logic of Animal Conflict\", Nature 246:15–18 (1973)** — ESS 的原始論文，鷹鴿賽局的出處。讀前兩頁就能看到「無法被入侵的策略」這個定義怎麼從動物打架的觀察長出來。（Nature 原文頁，landscape 已驗證歸屬與卷頁。）\n- **Stanford Encyclopedia of Philosophy, \"Evolutionary Game Theory\"**（plato.stanford.edu/entries/game-evolutionary/）— 把 ESS、replicator dynamics、與納許均衡的精確關係講得最清楚的免費權威來源。想搞懂「ESS ⇒ 漸近穩定、反之不一定」那層，讀它的 replicator dynamics 一節。（2026-06 查證可用。）\n- **Maynard Smith, 《Evolution and the Theory of Games》(1982)** — 把 1973 的點子擴成整本書，鷹鴿、性別比、動物溝通的訊號都在裡面。工程師讀法：當它是「把賽局理論當動力系統來用」的教材。\n- **Axelrod, 《The Evolution of Cooperation》(1984)** — ch08 已引；這裡的讀法是它的後半，把錦標賽結果重讀成「合作行為型在族群裡能不能站住」的演化模擬，正好銜接本章「重複救合作的演化版」。（landscape 已驗證；tit-for-tat 結論需 hedge，見 ch08。）\n- 機率分布與期望值的運算機制（族群比例作為分布、期望適存度怎麼算）：見《馴服隨機》談機率分布與期望值那幾章。穩定性與特徵值（replicator 動態為什麼收斂）：見《矩陣是動詞》談特徵值那層。本章只用結果、不重推。\n"}, {"id": "ch10-coordination-schelling", "file": "ch10-coordination-schelling.md", "group": "Part IV — 協調與資訊", "title": "ch10 — 協調賽局與謝林點：選哪個不重要，選不一致才致命", "md": "# ch10 — 協調賽局與謝林點：選哪個不重要，選不一致才致命\n\n> **本章解決什麼問題**：前面九章都假設「均衡是稀缺品」——困境裡只有一個壞均衡 (背叛,背叛)、零和裡只有一個值、鷹鴿裡只有一個 ESS 比例。進 Part IV，第一件要顛覆的事是：**很多賽局的均衡多到爆炸，而且每一個都一樣好**。這時玩家的難題不再是「該選哪個策略才不吃虧」，而是「我們怎麼一起賭到同一個均衡上」。選哪個其實不重要，選不一致才致命——這就是協調賽局（coordination game），是你 leader election 腦裂、共識協定談不攏的數學骨架。本章還會誠實交代賽局理論一個它自己解不掉的缺口：純報酬矩陣選不出均衡，得靠**謝林點（focal point）**這種矩陣外的東西。下一章（ch11）接著問：如果玩家之間資訊不對稱、有人知道得比別人多，協調又會怎麼變形。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊   ◄ 你在這裡\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n## 從你已知的出發\n\n你一定踩過**腦裂（split-brain）**。\n\n一個五節點的叢集，原本有一個 leader 在發號施令、其他四個是 follower。某天網路抖動，把叢集切成兩半：三個節點在這邊、兩個節點在那邊。兩邊各自看不到對方，於是各自開了一輪選舉，各自選出一個 leader，各自開始接受寫入。等網路恢復，你面對的是兩份互相矛盾的資料、兩個都覺得自己是合法 leader 的節點，以及一份要花你整個週末去對帳的損毀紀錄。\n\n現在我問你一個問題：**這場災難裡，「誰當 leader」這件事重要嗎？**\n\n答案是——一點都不重要。節點 A 當 leader、節點 B 當 leader、節點 C 當 leader，對系統的正確性來說完全等價，三個都能把活幹得一樣好。叢集根本不在乎是誰坐上那個位子。它**唯一**在乎的，是所有節點**對「是同一個」這件事達成共識**。腦裂不是因為選錯了人，是因為**沒選成同一個人**。\n\n這就是協調賽局的全部精神，而且你天天在跟它打交道：\n\n- **leader election**：選誰當 leader 不重要，選不一致就腦裂。Raft、ZooKeeper 之類的協定，本質上整套機器都是在解一個協調賽局——而且為了避免「兩個都剛好賭自己當 leader」的對稱僵局，它們刻意引入隨機化選舉超時（randomized election timeout），讓某個節點先醒來、打破對稱。這跟 ch05 的 backoff+jitter 是同一招：用隨機化把對稱的協調僵局敲碎。\n- **分散式共識**：Paxos／Raft 要全體 follower 收斂到同一個值。哪個值被選上，多數情況下系統不在乎；它在乎的是大家收斂到「同一個」。\n- **標準與協定的採用**：為什麼整個業界用同一套 HTTP 狀態碼、同一個 timestamp 格式、REST 還是 gRPC 的某個慣例？很多時候不是因為那個選項「最優」，是因為它**顯著**——大家都猜「別人也會猜大家都用它」，於是它就成了大家都用的那個。QWERTY 鍵盤一點都不最優，但你現在打字用的就是它。\n- **schema 版本協調**：上下游服務要同時切到 v2，誰先切誰後切不重要，**切的時間點不一致**才會在中間那段時間炸出一堆反序列化失敗。\n\n注意這些例子有一個共同的、跟囚徒困境**截然不同**的味道。囚徒困境裡，雙方的利益是**對立**的（我背叛你能多撈）。協調賽局裡，雙方的利益是**一致**的——大家都想協調成功，沒有人想腦裂。但「利益一致」居然**不保證**結果好。這就是本章要逼出來的那一刀：**個體理性可以不夠用，不是因為大家想互相傷害，而是因為大家想合作卻賭錯了方向。**\n\n## 純協調賽局：兩個均衡，一樣好，但你得選對同一個\n\n先看最乾淨的版本。兩個服務 A 和 B 要約好用同一個序列化格式，選 JSON 或選 Protobuf。對它們來說，**選哪個都行，只要選一樣**。選一樣，雙方都能正常通訊，各拿報酬 1；選不一樣，誰都解析不了對方，各拿 0。\n\n```text\n純協調賽局（格內 = (我方報酬, 對方報酬)；越大越好）：\n\n                   對方：JSON       對方：Protobuf\n    我方：JSON       (1, 1)  ← 對上了  (0, 0)  ← 雞同鴨講\n    我方：Protobuf   (0, 0)  ← 雞同鴨講 (1, 1)  ← 對上了\n```\n\n用 ch02 那套**最佳反應分析**掃一遍：\n\n- 如果對方出 JSON，我出 JSON 拿 1、出 Protobuf 拿 0 → 我的最佳反應是 JSON。\n- 如果對方出 Protobuf，我出 JSON 拿 0、出 Protobuf 拿 1 → 我的最佳反應是 Protobuf。\n\n兩條對角線 (JSON, JSON) 和 (Protobuf, Protobuf) 都是雙方互為最佳反應——**兩個純策略納許均衡**。而且它們**一樣好**，都給 (1,1)。沒有任何一個在報酬上比另一個優。\n\n這就是協調賽局跟囚徒困境的結構差異，值得你停下來盯一眼：\n\n- 囚徒困境（ch01 那張 5/3/1/0）：唯一純策略 NE 是 (背叛,背叛)，而且它**雙輸**——均衡存在但很糟。\n- 純協調賽局：有**兩個**純策略 NE，而且它們都**很好**——問題不在均衡糟，問題在均衡**太多、沒有一個天生勝出**。\n\n純報酬矩陣到此就**沉默**了。它能告訴你「(JSON, JSON) 和 (Protobuf, Protobuf) 都是均衡」，但它**打死不肯告訴你該選哪一個**。這不是我們算得不夠仔細，是矩陣裡的資訊本來就不足以決定。對稱的賽局有對稱的均衡，數學沒有偏好。\n\n那玩家真的坐進這個賽局，會怎樣？兩種失敗：\n\n1. **賭錯方向**：A 賭大家會用 JSON、B 賭大家會用 Protobuf，結果落到 (JSON, Protobuf)，雙方各拿 0。**兩個都理性、都想協調，卻一起落空。** 這就是腦裂的數學形狀。\n2. **不敢動**：A 想「萬一我選 JSON 但 B 選了 Protobuf 怎麼辦」，於是僵在那不敢先承諾；B 也這麼想。兩邊都等對方先動，誰也不動。\n\n你看出來了嗎——**這跟脊椎那張囚徒困境是同源的**。困境是「每個人都最佳化、結果集體更糟」；協調失敗是「每個人都最佳化、結果集體錯位」。兩者都是同一條裂縫的不同臉孔：**個體理性不保證集體達成它本來想要的東西**。差別只在，困境裡集體理性要的是「別一起跳坑」，協調裡集體理性要的是「往同一個方向跳」。困境裡個體的誘惑是背叛（私利對立）；協調裡沒有對立的私利，純粹是「我猜不到你會猜什麼」這個資訊缺口，就足以讓兩個一心想合作的玩家撞牆。\n\n> **這裡反直覺在哪，請你能轉述**：你以為「大家利益一致」就萬事大吉——畢竟沒人想害誰。但協調賽局告訴你，**利益一致是不夠的**。只要存在多個一樣好的均衡，而玩家又不能事先溝通，理性本身就選不出來。合作失敗的原因不是「有人壞」，而是「沒有共同的猜測焦點」。腦裂不是因為哪個節點居心不良，是因為它們缺一個「大家都知道大家都會選它」的點。\n\n## 那個混合均衡：協調賽局裡最該被警告的東西\n\n純協調賽局除了兩個純策略 NE，還有第三個均衡——一個**混合策略納許均衡**，而它正是「協調的恐怖之處」最赤裸的數學表達。\n\n用 ch05 的**無差異原則**來找。設對方出 JSON 的機率是 q。我要混合，前提是我對 JSON 和 Protobuf 無差異：\n\n```text\n我出 JSON   的期望報酬 = 1·q + 0·(1−q) = q\n我出 Protobuf 的期望報酬 = 0·q + 1·(1−q) = 1−q\n\n令兩者相等（無差異）：   q = 1 − q   →   q = 1/2          ← 對方各 1/2\n\n對稱地，我也是各 1/2。所以混合 NE = 雙方都「丟硬幣決定」。\n```\n\n現在算這個混合均衡的**期望報酬**，這才是重點。我各 1/2、對方各 1/2，四格等機率各 1/4：\n\n```text\n落點機率與報酬：\n   (JSON, JSON)         1/4 → 我拿 1\n   (JSON, Protobuf)     1/4 → 我拿 0\n   (Protobuf, JSON)     1/4 → 我拿 0\n   (Protobuf, Protobuf) 1/4 → 我拿 1\n\n我的期望報酬 = 1/4·1 + 1/4·0 + 1/4·0 + 1/4·1 = 1/2\n```\n\n停在這個數字上。在兩個純策略均衡裡，你穩穩拿 **1**。在這個混合均衡裡，你只拿 **1/2**——因為有一半的時間你們在雞同鴨講。**這是一個雙方都在隨機亂猜的均衡，沒有人能單方面改善（只要對方在亂猜，你出什麼都一樣是 1/2），所以它是個如假包換的納許均衡——而且它是最差的那個。**\n\n這個混合均衡就是腦裂的穩態描述：兩個節點都不知道對方會選誰，於是各自「賭」，一半時間賭一致、一半時間賭岔開。系統卡在一個「大家都在猜、誰也猜不準」的均衡裡，而它的期望表現比任何一個「大家都選同一個」都差。\n\n這給了你一個冷酷的洞見：**協調賽局裡，真正的敵人不是某個壞均衡，而是『沒有人帶頭收斂』這件事本身。** 只要還停在「各自猜」的狀態，理性玩家就可能永遠停在那個 1/2 的爛均衡裡，因為沒有任何一方有單方面跳出去的誘因——你先跳到 JSON，對方還在亂猜，你照樣只有一半機率對上。要逃出去，需要某種矩陣**外**的東西把大家的猜測**對齊**。那個東西，就是謝林點。\n\n## 性別戰：協調，但摻了一點私心\n\n純協調賽局有點太乾淨了——兩個均衡完全等價，現實裡很少這麼好心。更常見的是：大家**都想協調成功**（沒人要腦裂），但**對「協調到哪個」各有偏好**。協調與衝突摻在一起。這就是賽局理論裡有個老掉牙名字的經典——**性別戰（battle of the sexes）**。\n\n故事的傳統版本：一對伴侶想一起出門（分開過夜誰都不開心），但一個偏好看歌劇、一個偏好看球賽。一起去歌劇，兩人都還行、但偏好歌劇的那個更爽；一起去球賽，反過來；各去各的，兩人都最慘。我把它換成你熟的場景：兩個團隊都同意「我們得統一用同一套監控堆疊」（分裂成兩套誰都受不了），但 A 團隊已經熟 Prometheus、B 團隊已經押注在另一套上。**統一比分裂好，但統一到自己熟的那套更好。**\n\n```text\n性別戰（格內 = (我方報酬, 對方報酬)；越大越好）：\n我方偏好 Opera（歌劇）、對方偏好 Football（球賽）。\n\n                   對方：Opera      對方：Football\n    我方：Opera      (2, 1)  ← 都來我場 (0, 0)  ← 各去各的\n    我方：Football   (0, 0)  ← 各去各的 (1, 2)  ← 都來他場\n```\n\n讀一下這張表的味道，它跟純協調差在哪：對角線（協調成功）仍是兩個均衡，但這次它們**不等價**了——(Opera, Opera) 我拿 2 你拿 1，(Football, Football) 我拿 1 你拿 2。**我偏好前者、你偏好後者。** 協調是共同利益，但「協調到哪」是利益衝突。這比純協調更貼近真實談判：沒人想談崩，但每個人都想談到對自己更有利的那個版本。\n\n這張矩陣有**三**個納許均衡，下一節的 worked example 會把它們一個一個算出來。先記住它教你的事：當協調摻進了私心，玩家不只要解決「怎麼選同一個」，還要面對「憑什麼是你那個、不是我那個」的拉鋸——而誰都不肯先讓步時，那個雙方亂猜的混合均衡（最差的結果）就在門口等著。\n\n## Worked example：把性別戰的三個納許均衡全找出來\n\n我要把這張矩陣的均衡**全部**手算出來，包括那個最容易被漏掉、也最該被警告的混合均衡。每一步都不跳，最後用兩個視角交叉複核。\n\n```text\n性別戰矩陣（重抄一遍，方便對照）：\n                   對方：Opera      對方：Football\n    我方：Opera      (2, 1)           (0, 0)\n    我方：Football   (0, 0)           (1, 2)\n```\n\n**第一步：用最佳反應找純策略 NE。** 逐欄看「對方固定時，我該怎麼回」，再逐列看「我固定時，對方該怎麼回」。\n\n```text\n我的最佳反應（對方固定）：\n  對方 Opera   → 我 Opera 拿 2、Football 拿 0 → 我選 Opera ✓\n  對方 Football→ 我 Opera 拿 0、Football 拿 1 → 我選 Football ✓\n\n對方的最佳反應（我固定）：對方是行玩家、報酬是每格第二個數\n  我 Opera     → 對方 Opera 拿 1、Football 拿 0 → 對方選 Opera ✓\n  我 Football  → 對方 Opera 拿 0、Football 拿 2 → 對方選 Football ✓\n\n雙方互為最佳反應的格子（兩個 ✓ 重疊）：\n  (Opera, Opera)        ← 純策略 NE 1\n  (Football, Football)  ← 純策略 NE 2\n```\n\n兩個純策略 NE。在 (Opera, Opera) 我拿 2、你拿 1；在 (Football, Football) 我拿 1、你拿 2。**對稱地不公平——每個人都偏好「協調到自己場」的那個均衡。**\n\n**第二步：用無差異原則找混合 NE。** 設**對方**出 Opera 的機率為 q（出 Football 為 1−q）。我願意混合的唯一條件，是我對 Opera 和 Football **無差異**（否則我會純出報酬高的那個，根本不混）：\n\n```text\n我出 Opera    的期望報酬 = 2·q + 0·(1−q) = 2q\n我出 Football 的期望報酬 = 0·q + 1·(1−q) = 1 − q\n\n令兩者相等：   2q = 1 − q\n              3q = 1\n              q  = 1/3        ← 對方出 Opera 的機率 = 1/3、Football = 2/3\n```\n\n注意這個反直覺點（ch05 已經敲過一次，這裡再敲）：**我的混合機率，是由「讓對方無差異」決定的；對方的混合機率，是由「讓我無差異」決定的。** 所以要解我的機率，得從對方的報酬下手。設**我**出 Opera 的機率為 p，讓**對方**對他的兩個選項無差異（對方是行玩家，看每格第二個數）：\n\n```text\n對方出 Opera    的期望報酬 = 1·p + 0·(1−p) = p\n對方出 Football 的期望報酬 = 0·p + 2·(1−p) = 2(1−p)\n\n令兩者相等：   p = 2(1−p)\n              p = 2 − 2p\n              3p = 2\n              p  = 2/3        ← 我出 Opera 的機率 = 2/3、Football = 1/3\n```\n\n**第三個 NE 是：我（偏好歌劇）以 2/3 機率出 Opera、對方（偏好球賽）以 2/3 機率出 Football。** 各自更常選自己偏好的那個，但都留了 1/3 的機率讓步。\n\n**第三步：算這個混合均衡的期望報酬，看它有多爛。** 我出 Opera 機率 p=2/3、對方出 Opera 機率 q=1/3。四格的機率：\n\n```text\n落點機率（我的 Opera 機率 2/3、對方的 Opera 機率 1/3）：\n  (Opera,    Opera)    = 2/3 · 1/3 = 2/9 → 我拿 2\n  (Opera,    Football) = 2/3 · 2/3 = 4/9 → 我拿 0\n  (Football, Opera)    = 1/3 · 1/3 = 1/9 → 我拿 0\n  (Football, Football) = 1/3 · 2/3 = 2/9 → 我拿 1\n\n機率自我複核：2/9 + 4/9 + 1/9 + 2/9 = 9/9 = 1 ✓\n\n我的期望報酬 = 2/9·2 + 4/9·0 + 1/9·0 + 2/9·1\n            = 4/9 + 0 + 0 + 2/9\n            = 6/9 = 2/3\n```\n\n**用第二步的無差異視角交叉複核**：既然我出 Opera 和出 Football 在均衡裡無差異，我的期望報酬應該等於「我出 Opera 的期望」=2q=2·(1/3)=2/3。✓ 兩個視角對上了。\n\n把三個均衡並排，這張表就是本章的縮影：\n\n```text\n性別戰的三個納許均衡（我的期望報酬）：\n  (Opera, Opera)       純策略 → 我拿 2   （我的最愛）\n  (Football, Football) 純策略 → 我拿 1   （你的最愛、我能接受）\n  混合 (2/3, 1/3) 對 (1/3, 2/3) → 我拿 2/3 ← 最差！比任何協調成功都糟\n```\n\n**這就是整章最該被你帶走的數字。** 那個「公平」的混合均衡——雙方都不肯把方向盤完全交給對方、各自賭一把——給出的期望報酬 **2/3**，比兩個純策略均衡的 **2** 和 **1** 都低。換句話說：當雙方僵在「誰都不先讓」的對稱賭局裡，他們會落到一個**比任一方讓步都更糟**的結果。在分散式系統裡，這就是「兩個節點都不肯放棄競選 leader、反覆瓜分選票、誰也選不上」的活脫脫寫照。協調賽局最深的教訓不是「該選哪個」，是**「拖著不收斂，比收斂到你不喜歡的那個還糟」**。\n\n## 謝林點：賽局理論解不掉、人類卻天天在解的那一步\n\n矩陣到此沉默了。它告訴你有多個一樣好（或差不多好）的均衡，但選不出來。可現實裡，人類**經常**協調成功——而且是在**完全不能溝通**的情況下。怎麼辦到的？\n\n1960 年，Thomas Schelling（謝林）在《The Strategy of Conflict》（衝突的策略）裡做了一個現在傳遍每本賽局教科書的實驗。他問一群人一個問題（這裡照他原書的精神重述）：\n\n> 你明天必須在紐約市跟一個陌生人碰面，但你們**事先無法以任何方式聯絡**——沒約時間、沒約地點。你會去哪裡、幾點？\n\n純報酬矩陣的角度看，這是個無解的賽局：紐約有無數個地點、二十四小時無數個時刻，每一個「雙方都到同一處」都是一個一樣好的納許均衡，多到天文數字。理論說玩家應該迷失在這片均衡的汪洋裡。\n\n但謝林發現，他那個「不科學的樣本」（他自己這麼形容）裡的人，答案驚人地集中：壓倒性多數選了**中午 12 點**，而多數人選了**中央車站（Grand Central）的大鐘／詢問處**。這些人從沒商量過，卻不約而同往同一個點收斂。\n\n關鍵在於：**中央車站的大鐘並不會給你更高的報酬。** 在酒吧碰面、在圖書館碰面、在帝國大廈碰面，只要兩人都去了，報酬完全一樣。報酬矩陣裡，這些點全部等價。中央車站之所以勝出，純粹是因為它**顯著（salient）**——它在文化、傳統、脈絡裡是「紐約的碰面點」，於是它成了一個大家都猜「別人也會猜這裡」的點。中午也一樣：它不是報酬最高的時刻，它只是**自然**——一天的正中央、一個不偏不倚的整點。\n\n謝林把這種解叫做**焦點／謝林點（focal point／Schelling point）**：協調賽局有多個均衡時，人們會收斂到某個因「顯著、自然、文化共識」而從一堆等價選項裡脫穎而出的解。它運作的機制是一層套一層的猜測——**「我猜你會猜大家都選它，所以我也選它，於是它真的成了大家選的那個。」** 顯著性把分散的猜測**對齊**到同一個點，這正是上一節那個 1/2、2/3 爛混合均衡所缺的東西。\n\n這裡有一句話我要請你務必聽清楚，因為它是本章最容易被講反的地方——**謝林點不是賽局理論「算」出來的，它是賽局理論「算不出來」的證據。**\n\n謝林本人從沒宣稱理論能預測人會在大鐘下碰面。恰恰相反：他指出**人們確實會**收斂到焦點，**然後攤開手承認——這件事純報酬矩陣解釋不了**。焦點來自心理顯著性、文化共識、共同脈絡，這些東西**不在矩陣裡**。賽局理論可以告訴你「有 N 個均衡」，但「人會選哪一個」要靠矩陣外的資訊。這是賽局理論一個誠實的、它自己都承認的**局限**，不是它的勝利。把謝林點吹成「賽局理論能預測人類協調行為」，正好把這個故事的寓意講反了。\n\n謝林與 Robert Aumann（奧曼）因為在賽局理論對衝突與合作的貢獻，共同獲得 2005 年諾貝爾經濟學獎（嚴格說是瑞典央行紀念諾貝爾經濟學獎，由瑞典央行 1968 年設立，不在諾貝爾本人 1895 年遺囑的五個獎裡——本書沿用俗稱，這裡註明一次）。\n\n回到你的系統。為什麼整個業界協調到同一套協定慣例、同一個 timestamp 格式、同一個 HTTP 狀態碼語意？大多時候靠的不是「誰最優」的論證，而是顯著性：某個慣例先被一個有影響力的專案／RFC 採用、被反覆引用、進了所有人的「預設猜測」，於是它成了那個「大家都猜別人也會用」的焦點。QWERTY、RFC 3339 的時間格式、語意化版本號（SemVer）——它們的統治力，相當程度來自焦點效應而非最優性。你設計協定時若想讓它被廣泛採用，與其證明它最優，不如讓它**顯著**：對齊既有慣例、給一個無歧義的「明顯該這麼做」的預設。Leader election 協定則反過來——它沒有現成的文化焦點可借，所以乾脆用隨機化超時**人工製造**一個不對稱，讓某個節點先醒來、把自己變成那個焦點。\n\n## 直覺的陷阱\n\n協調賽局是「利益一致卻仍可能失敗」最反直覺的領域，而謝林點是全書最容易被講反方向的概念。下面三個陷阱按「最常掉進去」排序。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| **謝林點是「算」出來的** | 「賽局理論能預測人會在大鐘下碰面，真厲害」 | 把「Schelling 觀察到人會收斂」誤讀成「理論推導出收斂點」。一旦你以為焦點能從報酬算出來，你就會去矩陣裡找它——而它根本不在矩陣裡 | 焦點來自**心理顯著性／文化／脈絡**，是矩陣**外**的東西。謝林點是賽局理論的**局限**（純報酬選不出均衡），不是它的勝利。理論只說「有多個均衡」，「選哪個」要靠矩陣外資訊 |\n| **「利益一致就不會失敗」** | 「協調賽局裡大家都想成功、沒人想害誰，所以一定協調得成」 | 忽略了「多個一樣好的均衡＋不能溝通＝可能各自賭錯」。你以為失敗一定源於有人壞，於是看到協調失敗就去抓「內鬼」 | 利益一致**不夠**。只要均衡不唯一、又不能事先對齊猜測，理性玩家就可能一起賭錯（腦裂）。失敗源於**缺共同焦點**，不是有人居心不良 |\n| **把混合均衡當「公平的好結果」** | 「雙方各退一步、各賭一半，聽起來最公平最理性」 | 只看到「對稱、公平」，沒去算它的期望報酬。對稱不等於好 | 性別戰的混合均衡期望報酬 **2/3**，比兩個純均衡（2 和 1）**都差**。它是「誰都不肯先讓」的僵局，是最該逃離的均衡，不是最該追求的妥協 |\n| **把協調賽局當成囚徒困境** | 「都是兩個玩家、都會失敗，應該差不多」 | 用困境的直覺（防著對方占你便宜）去處理協調問題，於是猛加懲罰、猛防背叛——但協調賽局根本沒有「背叛能多撈」這回事 | 困境是**利益對立**（背叛佔優、唯一均衡雙輸）；協調是**利益一致**（多個均衡都好、難在選同一個）。困境要破壞背叛誘因，協調要**對齊猜測**——藥方完全不同 |\n\n**怎麼自我察覺你掉進去了**：如果你在協調問題（leader election、標準採用、schema 切換）上猛加「懲罰機制」防著誰背叛，你多半是把它誤當囚徒困境了——協調賽局沒有背叛者，只有賭錯方向的人，藥方是製造一個顯著的焦點（或人工的不對稱），不是加大棒。如果你聽到「賽局理論預測人會碰面在大鐘下」覺得很順耳，停一下：理論**沒有**預測，是 Schelling 觀察到、然後承認理論解釋不了。\n\n## 紙上推演\n\n全程紙筆手算。先自己做，再看解答。\n\n### 推演題 1：數出純協調賽局的所有純策略納許均衡（★★，[15 分鐘]）\n\n三個微服務 A、B、C 要協調到**同一個** API 版本，可選 v1／v2／v3。為簡化，先看**兩個**服務的版本，報酬規則：兩個選同一版 → 各拿 1；選不同版 → 各拿 0。寫出 3×3 報酬矩陣，找出所有純策略納許均衡，數一數有幾個。然後回答：報酬矩陣能不能告訴你該選哪一版？\n\n### 推演題 2：判斷一個「協調 vs 困境」的情境（★★，[15 分鐘]）\n\n把下面這個情境翻成 2×2 賽局，判斷它是「協調賽局」還是「囚徒困境」，並說出你的系統該用哪一類藥方（製造焦點／對齊猜測，還是破壞背叛誘因）：\n\n> 兩個團隊共用一條 CI 管線。每個團隊可以選「把大型測試拆成小批次跑」或「整包一次塞進去跑」。如果兩邊都拆小批次，管線順暢，各拿 3；如果兩邊都整包塞，互相排擠資源、都慢，各拿 1；如果一邊拆、一邊整包塞，整包那邊插隊先跑爽到（拿 5），拆的那邊被餓著（拿 0）。\n\n### 推演題 3：解一個非對稱協調賽局的混合均衡（★★★，[25 分鐘]）\n\n把性別戰的報酬改一下：我（偏好 Opera）協調到 Opera 拿 **3**、協調到 Football 拿 1；對方（偏好 Football）協調到 Football 拿 3、協調到 Opera 拿 1；各去各的雙方拿 0。\n\n```text\n                   對方：Opera      對方：Football\n    我方：Opera      (3, 1)           (0, 0)\n    我方：Football   (0, 0)           (1, 3)\n```\n\n找出全部三個納許均衡（兩個純、一個混合），並算出混合均衡裡我的期望報酬。它仍然比兩個純均衡都差嗎？\n\n### 推演解答\n\n**題 1 解答。**\n\n```text\n三服務先簡化為兩服務的純協調矩陣（格內 = (我, 對方)）：\n                對方 v1     對方 v2     對方 v3\n    我方 v1    (1, 1)      (0, 0)      (0, 0)\n    我方 v2    (0, 0)      (1, 1)      (0, 0)\n    我方 v3    (0, 0)      (0, 0)      (1, 1)\n```\n\n最佳反應：對方出 v1，我出 v1 拿 1、其餘拿 0 → 我跟 v1；對方出 v2 我跟 v2；v3 同理。所以**對角線三格 (v1,v1)、(v2,v2)、(v3,v3) 全是純策略納許均衡**——共 **3 個**，而且三個一樣好（都給 (1,1)）。\n\n報酬矩陣**不能**告訴你選哪一版——三個均衡完全對稱，數學沒有偏好。要選出來得靠謝林點：例如「v3 是最新版」「文件預設範例用 v2」「老大在群組裡說過用 v1」這類**矩陣外**的顯著性。\n\n**常見錯路**：以為「v3 最新所以是均衡裡最好的」——錯，在這個純協調報酬下三個均衡報酬相同，「最新」是矩陣外的顯著性、不是報酬優勢。把「我覺得 v3 比較好」偷渡進這個矩陣，就是把焦點誤當成報酬。（推廣到三服務同時協調，純策略 NE 一樣是「三方全選同一版」那幾個，共 3 個，道理不變。）\n\n**題 2 解答。**\n\n```text\n                對方：拆小批次   對方：整包塞\n    我方：拆小批次   (3, 3)        (0, 5)\n    我方：整包塞     (5, 0)        (1, 1)\n```\n\n報酬結構：T=5（我整包、對方拆，我插隊）> R=3（都拆）> P=1（都整包）> S=0（我拆、對方整包，我被餓）。這是 **T>R>P>S＝5>3>1>0——它就是脊椎那張囚徒困境**（ch01 那張矩陣）！「整包塞」是嚴格優勢策略（5>3 且 1>0），唯一 NE 是 (整包,整包)=(1,1)，但 (拆,拆)=(3,3) 對雙方更好。\n\n所以這是**囚徒困境，不是協調賽局**。藥方是**破壞背叛（整包塞）的誘因**——例如重複賽局＋聲譽（ch07）、或機制設計加個「整包塞要排到隊尾」的外部懲罰（ch13），而不是「製造焦點」。\n\n**常見錯路**：看到「兩團隊要協調 CI 用法」就反射認定是協調賽局。判別關鍵在報酬結構：**有沒有「我偏離、對方守規矩，我反而多撈」的格子（T>R）？** 有，就是困境（利益對立）；沒有、偏離只會讓自己更差，才是協調（利益一致）。題目裡「整包那邊插隊拿 5」就是 T>R 的鐵證——這是困境披了協調的皮。\n\n**題 3 解答。**\n\n純策略 NE：最佳反應掃描跟性別戰完全同構——對角線 (Opera,Opera) 與 (Football,Football) 互為最佳反應，**兩個純策略 NE**。在 (Opera,Opera) 我拿 3、對方拿 1；(Football,Football) 我拿 1、對方拿 3。\n\n混合 NE，用無差異原則。設對方出 Opera 機率 q，讓**我**無差異：\n\n```text\n我出 Opera    = 3q + 0·(1−q) = 3q\n我出 Football = 0·q + 1·(1−q) = 1 − q\n令相等：  3q = 1 − q  →  4q = 1  →  q = 1/4   ← 對方出 Opera 1/4、Football 3/4\n```\n\n設我出 Opera 機率 p，讓**對方**無差異（對方看第二個數，協調到 Opera 拿 1、到 Football 拿 3）：\n\n```text\n對方出 Opera    = 1·p + 0·(1−p) = p\n對方出 Football = 0·p + 3·(1−p) = 3(1−p)\n令相等：  p = 3(1−p)  →  p = 3 − 3p  →  4p = 3  →  p = 3/4   ← 我出 Opera 3/4\n```\n\n我的期望報酬（用無差異捷徑最快：我出 Opera 的期望 = 3q = 3·1/4 = 3/4）：\n\n```text\n交叉複核（四格展開，我出 Opera 機率 3/4、對方出 Opera 機率 1/4）：\n  (Opera,    Opera)    = 3/4·1/4 = 3/16 → 我拿 3\n  (Opera,    Football) = 3/4·3/4 = 9/16 → 我拿 0\n  (Football, Opera)    = 1/4·1/4 = 1/16 → 我拿 0\n  (Football, Football) = 1/4·3/4 = 3/16 → 我拿 1\n  機率和 = 3/16+9/16+1/16+3/16 = 16/16 = 1 ✓\n  期望 = 3/16·3 + 3/16·1 = 9/16 + 3/16 = 12/16 = 3/4 ✓ 與捷徑一致\n```\n\n**混合均衡我拿 3/4，仍然比兩個純均衡（3 和 1）都差。** 結論穩固：協調賽局裡，「對稱地各賭一半」幾乎總是最爛的那個均衡——不論偏好強度怎麼調，僵著不收斂都比收斂到任一方都糟。\n\n**常見錯路**：把 p 算成「讓我自己無差異」的那條方程的解。記住 ch05 的鐵律——**我的機率 p 由「讓對方無差異」決定**，不是讓我自己無差異。算反了會得到 p=1/4，數字剛好對稱地錯，很難一眼看出，必須用四格展開交叉複核才抓得到。\n\n## 自我檢核\n\n口頭自答，講得出來才算過。\n\n1. 協調賽局跟囚徒困境，結構上最根本的差別是什麼？（提示：利益對立 vs 利益一致；唯一壞均衡 vs 多個好均衡。）為什麼這個差別決定了藥方完全不同？\n2. 純報酬矩陣為什麼**選不出**多個均衡裡的哪一個？這跟「我們算得不夠仔細」是不是同一回事？\n3. 謝林點是不是賽局理論「算」出來的？如果不是，那它從哪來、為什麼說它是賽局理論的**局限**而不是勝利？（這題答錯就是 T8 陷阱。）\n4. 性別戰那個混合均衡，期望報酬比兩個純均衡都**低**——這為什麼反直覺？「對稱／公平」為什麼不等於「好」？\n5. 為什麼「大家利益一致、都想協調成功」**不保證**協調成功？舉一個你系統裡的具體例子（leader election 腦裂／schema 切換時機不一致）。\n6. leader election 協定用「隨機化選舉超時」打破對稱——這跟 ch05 的 backoff+jitter、跟「製造一個謝林點」分別是什麼關係？\n7. 協調失敗跟脊椎那張囚徒困境的「個體理性 ⇒ 集體更糟」，怎麼說它們是**同一條裂縫**的兩張臉？（提示：一個是集體更糟、一個是集體錯位，但都是個體理性不保證集體達成所願。）\n\n## 延伸閱讀\n\n- **Thomas Schelling,《The Strategy of Conflict》(1960)** — 謝林點的原始出處，紐約碰面實驗就在裡頭。讀「focal point」那幾頁就夠，看他如何一邊展示人類會協調、一邊坦承理論解釋不了。賽局理論最誠實的一本書之一。\n- **史丹佛哲學百科：Prisoner's Dilemma 條目**（plato.stanford.edu/entries/prisoner-dilemma/）— 雖以困境為主，但把「協調 vs 困境」的結構差異講得很清楚，可對照本章第一節。（landscape 已驗證連結。）\n- **維基百科：Focal point (game theory)**（en.wikipedia.org/wiki/Focal_point_(game_theory)）— 謝林點的快速綜述與紐約實驗的數字（中央車站、中午）來源，含後續行為實驗的整理。查證焦點實驗細節時讀這條。（landscape 已驗證連結。）\n- **NobelPrize.org，2005 年經濟學獎頁面** — Schelling 與 Aumann 的得獎理由「透過賽局理論分析增進對衝突與合作的理解」，附背景介紹。想確認獎項歸屬與年份讀官方頁。\n- 跨書：協調賽局裡「每個玩家在不確定下該怎麼賭哪個均衡」的**單人理性**那一面，深入處見《在不確定中下注》談不確定下決策那章——本章只用「對手也在猜」的互動面，單人怎麼賭留給它。混合均衡期望報酬的機率運算，機制見《馴服隨機》ch08 期望值。\n"}, {"id": "ch11-signaling-asymmetric-info", "file": "ch11-signaling-asymmetric-info.md", "group": "Part IV — 協調與資訊", "title": "ch11 — 訊號、承諾與不對稱資訊：當你知道的比對手多", "md": "# ch11 — 訊號、承諾與不對稱資訊：當你知道的比對手多\n\n> **本章解決什麼問題**：前面所有賽局都偷偷假設了一件事——雙方對賽局的「規則與報酬」知道得一樣多，只是不知道對方這一步會出什麼。但現實裡更常見的不對稱是：**我知道一件你不知道的事**——我知道自己這批貨好不好、我知道自己這個工程師強不強、我知道自己這個 client 會不會濫用 API。資訊不對稱會把賽局徹底改寫，甚至讓好東西被趕出市場、交易整個崩掉。本章要回答：當你知道的比對手多，你怎麼**可信地**把這件事告訴他（明明你有動機說謊）？答案出奇地優雅——**靠一個假裝的人付不起的成本**。這是 Part IV「協調與資訊」的第二章，接在 ch10 協調賽局（大家資訊對稱、只是選不到同一個均衡）之後，把「資訊」這條軸從「對稱但多均衡」推進到「不對稱、有人握著私有資訊」。\n\n## 從你已知的出發\n\n你每天都在處理「我不知道對面那個 client 是好人還是壞人」的問題。\n\n想想 rate limiting 的信譽分級。一個新接上來的 client，你對它一無所知——它可能是個老實的整合方，也可能是個準備拿你 API 去刷量的濫用者。問題是：**它自己知道**它是哪種，你不知道。如果你問它「你會濫用嗎？」，它當然回答「不會」——光憑嘴說的承諾不值錢，因為說謊零成本。那你怎麼分辨？你的做法很可能是：**讓它先用一段時間、累積一段乾淨的歷史紀錄，再逐步放寬配額。** 注意這招的精髓——你不是相信它的「宣稱」，你是相信它的「**行為留下的、難以偽造的痕跡**」。一個真的要刷量的濫用者，撐不過那段「低配額、被嚴密監控」的觀察期（它要的就是馬上大量打），所以它要嘛現形、要嘛根本懶得熬。**熬得過觀察期這件事本身，就是一個訊號**——而且是個假裝者付不起成本的訊號。\n\n再看 TLS。憑證（certificate）這套東西本質上在解同一個問題：「我怎麼相信對面真的是 `bank.com`，而不是個冒名的中間人？」答案不是 `bank.com` 對你喊「相信我我是真的」（誰都能喊），而是它出示一張**由你已經信任的 CA 簽發、且簽章在數學上難以偽造**的憑證。偽造這張憑證的成本（破解簽章）高到冒名者付不起——所以「能出示有效憑證」這個動作，可信地把「我真的是 `bank.com`」這個私有事實傳遞給了你。**訊號的可信，不來自訊號的內容，來自偽造它的成本。**\n\n還有 SLA。你對外承諾「99.95% 可用度、違約退費」，這不只是行銷話術——它是一個**承諾訊號**。一個自己心裡有數、系統其實爛得隨時會掛的供應商，**不敢**簽這種帶罰則的 SLA（簽了就是等著賠錢）；敢簽、而且把罰則寫得很硬的，反而透露了「我對自己的穩定度有把握」。罰則越重，這個訊號越可信——因為它對「其實做不到的人」越昂貴。\n\n把這三件事串起來，你已經摸到本章的核心了：**當一方握有對方不知道的私有資訊，光靠嘴說沒用（說謊免費），可信的傳遞要靠「一個只有真貨付得起、假貨付不起的成本」。** 賽局理論管這叫**訊號（signaling）**與**昂貴訊號（costly signal）**。本章就來把它講透——以及它的陰暗面：當沒有這種訊號機制時，市場會怎麼崩。\n\n## 先定位：不對稱資訊把賽局改寫成什麼\n\n前面十章的賽局，玩家之間的「不確定」都是**策略性的**：我不知道你**這一步會出什麼**，但我和你對「這是什麼賽局、報酬矩陣長怎樣」的認知是一致的。剪刀石頭布、囚徒困境都這樣——你不知道對方出剪刀還是石頭，但你們都清楚規則。\n\n不對稱資訊（asymmetric information）是另一種東西：**我知道一個與報酬有關、但你不知道的事實。** 這個事實在賽局理論裡叫**型別（type）**——我的「型別」可能是「高能力工程師」或「低能力工程師」、「好貨」或「爛貨」、「守規矩的 client」或「濫用者」。我知道自己的型別，你只知道一個機率分布（市場上大概幾成是好貨）。\n\n這類賽局怎麼處理？John Harsanyi（哈薩尼）在 1960 年代給了一套漂亮的框架，叫**貝氏賽局（Bayesian game）**：把「自然（Nature）」當成一個虛擬玩家，由它先擲骰子決定每個人的型別，每個人看到自己的型別、但只對別人的型別持有信念（belief，一個機率分布），然後大家在「對別人型別只有機率信念」的前提下各自最佳化。Harsanyi 因為這套不完全資訊賽局的貢獻，與 Nash、Selten 共獲 1994 年諾貝爾經濟學獎（嚴格說是瑞典央行紀念諾貝爾的經濟學獎，1969 起頒，並非諾貝爾遺囑裡的五個獎；俗稱沿用）。\n\n貝氏賽局的形式化（怎麼用信念更新、怎麼定義貝氏納許均衡）本書不展開，指向延伸閱讀——它需要的機率與信念更新機制，是《馴服隨機》的地盤。本章只取一個**直覺**：**一旦有人握著別人不知道的私有資訊，賽局的勝負就不只看「我怎麼出招」，還看「我能不能、以及該不該，讓對方相信我的型別」。** 接下來兩節，就是這枚硬幣的兩面——好的一面（昂貴訊號怎麼可信地揭示型別）與壞的一面（沒有訊號時市場怎麼崩）。\n\n## 昂貴訊號：為什麼「難偽造」才可信\n\n先講最反直覺、也最優雅的一招：**訊號賽局（signaling game）**。\n\n設定一個你一眼就懂的場景。勞動市場上有兩種工程師：**高能力（H）** 和**低能力（L）**。差別是真實的——H 上工後產出價值高，L 產出價值低。麻煩在於：**面試時雇主看不出來誰是 H、誰是 L**（型別是求職者的私有資訊），而**每個求職者都有動機宣稱自己是 H**（H 的薪水高）。所以「我是高能力」這句話，從 L 嘴裡說出來和從 H 嘴裡說出來一模一樣，零成本、零資訊量。雇主不能信。\n\nMichael Spence（史賓賽）1973 年的洞見（他因「不對稱資訊市場分析」與 Akerlof、Stiglitz 共獲 2001 年諾貝爾經濟學獎）是這樣的：求職者可以做一件**有成本**的事——去取得一張**文憑（教育訊號）**。關鍵假設不是「教育讓你變強」（Spence 的模型裡甚至假設教育對生產力毫無幫助，純粹是個訊號），而是：\n\n> **取得同一張文憑，高能力者付出的成本，比低能力者低。**\n\n為什麼？因為對 H 來說念書相對輕鬆（少熬幾個夜、少重修幾門），對 L 來說同一張文憑要付出地獄般的代價。這個「**高型別取得訊號比較便宜**」的性質（經濟學叫單交叉條件 single-crossing），正是整個機制的引擎。它讓一件事成為可能：**設計一個成本水準，剛好讓 H 願意付、L 不願意付。** 於是「有沒有那張文憑」就乾淨地把兩種型別分開了——這叫**分離均衡（separating equilibrium）**。\n\n注意這跟「文憑證明你學到了東西」完全是兩回事。Spence 的點是更深的：**就算文憑屁用沒有、純粹是燒錢燒時間，只要『燒這筆錢對假貨更痛』，它就能可信地傳遞型別。** 訊號的價值來自它的成本結構，不來自它的內容。這跟孔雀的尾巴是同一個道理——生物學家 Amotz Zahavi（札哈維）1975 年提出的**累贅原理（handicap principle）**：孔雀拖著那條又重又顯眼、招天敵的尾巴，正因為「養得起這個累贅」本身證明了它身體夠強壯（虛弱的孔雀根本撐不起這條尾巴就先死了）。尾巴的可信，來自它的昂貴。（這個原理本身在演化生物學界仍有爭議——有人主張「成本」不是唯一機制、honest signal 也可由其他 trade-off 維持，2026-06 仍是活的辯論；但「昂貴使訊號難偽造」這個賽局直覺，是本章要的東西。）\n\n## Worked example：教育訊號賽局，何時存在分離均衡\n\n把上面的故事算成具體數字。這是「工程師的嚴謹」級——每一步你都能口頭說出理由。\n\n設定（數字＝獲益點數，越大越好）：\n\n```text\n教育訊號賽局的設定\n\n  型別         上工產出   雇主據訊號給的薪水\n  ─────        ────────   ──────────────────\n  高能力 H      10         看到「有文憑」→ 給 10\n  低能力 L       4         看到「沒文憑」→ 給 4\n\n  取得一張文憑的成本（關鍵：高型別比較便宜）：\n  ─────────────────────────────────────────\n  H 取得文憑成本 = 2\n  L 取得文憑成本 = 7\n\n  求職者的淨報酬 = 拿到的薪水 − 取得訊號的成本\n```\n\n我們來檢查一個「**候選**的分離均衡」：**雇主的規則是「看到文憑就當你是 H、給 10；沒文憑就當你是 L、給 4」；而 H 去拿文憑、L 不拿。** 要它成為均衡，必須沒有任何一方想偏離。逐一驗算：\n\n```text\n第一步：H 該不該拿文憑？（雇主規則固定）\n    拿文憑   → 薪水 10 − 成本 2 = 淨 8\n    不拿文憑 → 被當成 L、薪水 4 − 成本 0 = 淨 4\n    8 > 4   ⇒ H 願意拿文憑。✓\n\n第二步：L 該不該（冒充去）拿文憑？\n    拿文憑   → 薪水 10 − 成本 7 = 淨 3\n    不拿文憑 → 薪水 4 − 成本 0 = 淨 4\n    4 > 3   ⇒ L 不願意拿文憑（冒充划不來）。✓\n\n第三步：雇主的信念在均衡路徑上自洽嗎？\n    均衡裡只有 H 拿文憑、只有 L 不拿，\n    所以「看到文憑 ⇒ 是 H」「看到沒文憑 ⇒ 是 L」這個推論\n    與雙方實際行為一致 → 雇主按真實型別付薪、不虧。✓\n```\n\n三步都站得住，所以這是一個**分離均衡**：兩種型別做出**不同**選擇，雇主因此能從「有沒有文憑」**反推**型別。文憑這裡完全是個燒錢的訊號（假設它對產出毫無貢獻），但它有效，因為**燒這筆錢對 L 太痛（7）、對 H 還行（2）**——成本差把兩種型別篩開了。\n\n**為什麼成本差是引擎？做個反事實。** 假設 L 取得文憑的成本不是 7、而是只要 1。重算第二步：\n\n```text\n若 L 取得文憑成本只要 1：\n    L 拿文憑   → 10 − 1 = 9\n    L 不拿文憑 → 4 − 0  = 4\n    9 > 4   ⇒ L 也搶著去拿文憑！\n```\n\n這下 L 會冒充，兩種型別都拿文憑，雇主看到文憑也分不出誰是誰——分離均衡崩了，退化成**混同均衡（pooling equilibrium）**：大家做一樣的事，訊號失去區分力。**結論很硬：訊號要能分離型別，它的成本必須高到「假貨付不起」——對 H 可負擔、對 L 不可負擔。成本差不夠大，訊號就廢了。** 這就是「有效的訊號必須對假裝者昂貴」的精確意思。\n\n**自我複核（交叉驗算）。** 換個角度驗一次「沒有人想偏離」：分離均衡裡 H 淨得 8、L 淨得 4。H 若偏離去裝 L（不拿文憑）只得 4 < 8，不幹；L 若偏離去裝 H（拿文憑）只得 3 < 4，不幹；雇主若偏離（例如看到文憑卻只給 4）會付不出市場薪資、招不到 H，也不幹。三方都釘在原地。穩。（嚴格的訊號賽局還要指定「雇主看到**偏離路徑**上的意外行為時持什麼信念」，這是精煉均衡概念的細活，本書點到、指向延伸閱讀。）\n\n## 陰暗面：沒有訊號時，市場會崩——檸檬市場\n\n訊號是救援工具。要體會它救的是什麼，得先看「沒有它會發生什麼」——這是本章碰到全書中央張力（**個體理性 vs 集體理性**）最痛的一刀。\n\nGeorge Akerlof（艾克羅夫）1970 年的論文〈The Market for Lemons〉（檸檬市場，《Quarterly Journal of Economics》84:3, 488–500；lemon 在美式俚語指「爛車」）講了一個讓他拿下 2001 年諾貝爾經濟學獎的故事。場景：二手車市場。**賣家知道**自己的車是好車（peach）還是爛車（lemon），**買家不知道**——買家只知道市場上好車爛車各占一半。\n\n跟著個體理性走一遍，看集體怎麼崩：\n\n```text\n檸檬市場的崩盤連鎖（每一步都是個體理性）\n\n  假設：好車買家肯出到 24、爛車只值 10；好車主自己心裡的底價是 20\n        （好車對買家比對賣家更值錢 → 本來有 4 元的雙贏空間可分）。\n        買家知道好爛各半，但分不出單一輛是哪種。\n\n  ① 買家理性出價：分不出好壞，只願付「期望值」\n       願付 ≈ ½·24 + ½·10 = 17\n\n  ② 好車賣家理性退出：我的底價 20，你只肯付 17\n       → 賣 17 是虧的 → 好車主把車收回不賣\n\n  ③ 市場上只剩爛車：好車退出後，買家若還在\n       面對的全是值 10 的爛車\n\n  ④ 買家更新信念、再砍價：既然剩下的多半是爛車，\n       願付往 10 滑\n\n  ⑤ 連「沒那麼爛」的車主也退出 …… 螺旋向下\n\n  終局：好東西被一路趕出市場，可能只剩最爛的、甚至整個市場乾掉。\n       這叫「逆選擇（adverse selection）」。\n```\n\n看清楚這道裂縫——**它和 ch01 那張囚徒困境矩陣是同一道。** 回憶脊椎：T,R,P,S = 5,3,1,0，背叛是嚴格優勢策略，雙方各自最佳化 → (背叛,背叛)=(1,1)，明明 (合作,合作)=(3,3) 對雙方都更好。檸檬市場裡，沒有任何一方做錯：買家依資訊理性砍價、好車主依價格理性退場、買家再依新資訊更新——**每一步都是無懈可擊的個體理性**。可是合起來，結果是**集體災難**：好車買賣本來雙方都能受益（好車主底價 20、買家肯出 24，成交在 22 → 賣方賺 2、買方也賺 2，是個 (3,3) 等級的雙贏），現在這筆交易**根本發生不了**。個體理性把一個本可雙贏的市場，逼成了沒人受益的廢墟。**這正是脊椎張力換了張臉：每個人都最佳化自己，集體卻一起變糟——只是這次的引擎不是「背叛的誘惑」，而是「資訊不對稱」。**\n\n而訊號與承諾，就是把市場從這個壞均衡裡拉回來的救火工具——和重複（ch07）、機制設計（ch13）並列。賣家提供**保固（warranty）**（一個只有好車主敢給、爛車主給不起的承諾訊號——爛車一定觸發賠付）、第三方**驗車報告**（難偽造的訊號）、**品牌聲譽**（重複賽局裡養出來的、砸一次招牌就毀的資產）——這些都是在「燒一筆假貨付不起的成本」，好讓好車主能可信地說「我這台是真的好」，把交易救回來。**沒有訊號機制，個體理性絞殺集體；有了訊號，個體願意付一筆讓集體重新運轉的代價。** 你的 rate limit 信譽分級、TLS 憑證、帶罰則的 SLA——全是工程版的「保固與驗車」，都在解 Akerlof 的同一個病。\n\n## 承諾與聲譽：把「我是什麼樣的人」變成訊號\n\n訊號不只能傳遞「我是高能力」這類**天生型別**，也能傳遞「我會怎麼行動」這類**行為傾向**——靠的是**承諾（commitment）**與**聲譽（reputation）**。\n\nch06 講過承諾的弔詭：**主動砍掉自己的選項反而更強**（在位者簽下「進場就一定打」的合約，把空洞威脅變可信）。把它放進不對稱資訊的框架，承諾其實就是一種訊號——它向對手揭示了你不可直接觀察的私有資訊：「**我是哪種人**」。\n\n舉個跟你系統有關的：你想讓下游相信「**我這個服務是會報復濫用的**」（我會斷你、會封你、會降級你），好嚇阻濫用。但這跟 H/L 是同一個問題——嘴上說「我會報復」零成本，誰都能說。可信的辦法是**建立聲譽**：在重複互動裡，真的對前幾個濫用者執行了懲罰，留下「這傢伙說到做到」的紀錄。這個紀錄是個訊號，而且難偽造——**因為執行懲罰當下對你自己也有成本**（斷掉一個 client 你少賺它的錢、處理它的申訴），一個「其實心軟、不會真報復」的服務捨不得付這個成本，所以「真的付過這個成本」這件事，可信地把「我是會報復的型別」傳遞了出去。聲譽，就是重複賽局裡用一筆筆「執行成本」攢出來的訊號資產。\n\n這裡也再碰一次中央張力，但碰的是**建設性**的那面：聲譽讓個體願意在單回合**吃虧**（執行懲罰、拒掉一筆爛生意）去換長期的集體秩序（一個沒人敢濫用、大家能合作的環境）。個體理性與集體理性在這裡不是分裂、而是被「未來的陰影＋可被觀察的紀錄」縫合了一截——這也是為什麼 ch12 接著要問：當報酬矩陣裡的數字不只有錢、把聲譽與公平算進去，人實際上會怎麼玩。\n\n## 直覺的陷阱\n\n不對稱資訊與訊號最容易把人帶溝裡的，是搞混「訊號可信的真正來源」。挑兩個具名陷阱講透。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步騙你 | 怎麼自我察覺（正確版） |\n|---|---|---|---|\n| **訊號靠內容可信** | 「他說得這麼斬釘截鐵／文憑這麼漂亮，應該是真的」 | 你看的是訊號**說了什麼**，沒看**偽造它要花多少**。內容是免費的，誰都能複製 | 問一句：**「一個假貨，能不能輕鬆發出一模一樣的訊號？」** 能，這訊號就沒區分力（混同）。可信訊號的特徵是**對假貨昂貴、對真貨可負擔**——盯成本差，別盯內容 |\n| **昂貴訊號＝有用的訊號** | 「文憑能證明你學到本事、所以雇主才看文憑」 | 你以為訊號的價值來自它的**實質功能** | Spence 的反直覺正在這：訊號**就算實質屁用沒有**（教育不增產出），只要「燒它對假貨更痛」就能分離型別。訊號的價值來自**成本結構**、不來自實質效用。徵兆：當你發現一個訊號「明明沒什麼實際用處、大家卻搶著弄」，別急著罵浪費——它可能正在當分離器 |\n\n第三個更隱蔽、值得單獨點出：**「資訊不對稱＝有人故意騙、是道德問題」。** 不對。檸檬市場的崩盤裡，**沒有任何人說謊**——好車主只是理性地不肯賤賣、買家只是理性地不敢出高價。逆選擇是**結構**造成的集體失靈，不是壞人造成的。把它當道德問題（「都怪奸商」）會讓你開錯藥（喊「請大家誠實」沒用）；當成結構問題，你才會去設計**訊號與機制**（保固、驗車、憑證、聲譽分級）這帖對的藥——這也正是 ch13 機制設計要接手的。徵兆：當你發現「明明每個人都沒做錯，市場卻爛掉了」，先別找壞人，先找那個藏在資訊不對稱裡的結構性壞均衡。\n\n## 紙上推演\n\n### 第 1 題：為什麼有效訊號必須對假裝者昂貴（★★，20 分鐘）\n\n用本章的 H/L 教育訊號賽局：H 取得文憑成本 2、L 取得文憑成本 c；雇主規則仍是「有文憑給 10、沒文憑給 4」，產出/薪水數字同正文。\n\n(a) 求出「L 不願意冒充去拿文憑」所需的 c 下限。\n(b) 用一句話把這個門檻翻成本章的核心命題。\n(c) 舉一個工程上的「對假裝者昂貴」訊號，並指出它的成本差落在哪裡。\n\n### 推演解答\n\n**(a)** L 拿文憑得 10 − c、不拿得 4。L **不**冒充 ⇔ 不拿比拿好：\n\n```text\n    4 ≥ 10 − c\n    c ≥ 6           ← L 取得文憑成本至少 6，冒充才划不來\n```\n\n（正文用 c=7，落在 6 以上，所以 L 不冒充；若 c<6，L 會搶著冒充、分離崩成混同。）同時別忘了另一邊：H 要願意拿文憑，需 10 − 2 = 8 ≥ 4 ✓（H 成本 2 遠低於門檻，沒問題）。所以分離均衡存在的條件是 **H 的成本夠低（願意發訊號）且 L 的成本夠高（c ≥ 6，不願冒充）**——兩種型別的成本必須被「6」這條線分在兩邊。\n\n**(b)** 一句話：**訊號能分離型別，若且唯若它的成本介於「真貨付得起」與「假貨付不起」之間**——成本差太小，假貨就會冒充，訊號失效。\n\n**(c)** 工程例：帶罰則的 SLA。對一個系統真的穩的供應商，簽「99.95% 否則退費」幾乎無痛（它本來就達得到）；對一個系統爛的供應商，這條款是定時炸彈（遲早賠到脫褲）。成本差落在**「達不到時的賠付」**上——只有真穩的敢簽硬罰則。**常見錯路**：以為「SLA 數字漂亮＝服務好」。不，關鍵是**罰則硬不硬**：沒有罰則的 99.999% 是免費的嘴炮（混同訊號），帶硬罰則的 99.95% 才是分離訊號。\n\n### 第 2 題：分離均衡 vs 混同均衡（★★，20 分鐘）\n\n(a) 用自己的話說清楚分離均衡與混同均衡的差別，各舉一個生活/工程例。\n(b) 在本章教育訊號賽局裡，把 L 的文憑成本從 7 改成 1，論證均衡從分離塌成混同，並說明此時文憑這個訊號發生了什麼事。\n\n### 推演解答\n\n**(a)** **分離均衡**＝不同型別做出**不同**的可觀察選擇，於是觀察者能從行為**反推**型別（資訊被揭示）。例：只有真打算長期合作的供應商才簽帶硬罰則的長約——簽不簽長約把兩種供應商分開了。**混同均衡**＝不同型別做出**相同**選擇，觀察者**無法**從行為區分型別（資訊沒被揭示）。例：所有 client 接上來都喊「我不會濫用」——這句話人人都說，零區分力。\n\n**(b)** L 成本改成 1 後重算 L 的選擇：\n\n```text\n    L 拿文憑   → 10 − 1 = 9\n    L 不拿文憑 → 4  − 0 = 4\n    9 > 4   ⇒ L 也去拿文憑\n    （H 當然還是拿：10 − 2 = 8 > 4）\n```\n\n兩種型別**都**拿文憑，雇主看到文憑無法分辨是 H 還是 L——**塌成混同均衡**。此時文憑這個訊號**喪失了區分力**：它不再傳遞任何型別資訊，純粹變成兩種人都得燒的一筆共同成本（甚至可能讓雇主乾脆放棄看文憑、退回「按市場平均產出給薪」）。**這就是訊號失效的精確機制——當假貨也付得起，訊號就不再是訊號。常見錯路**：以為「只要訊號夠貴就有用」。不，是**成本差**有用，不是絕對成本——L 成本從 7 降到 1，文憑「絕對成本」對 H 沒變（還是 2），但 H 與 L 的**差距**消失了，訊號就廢了。\n\n### 第 3 題（口頭題）：用檸檬市場解釋為什麼缺乏訊號機制會讓市場崩潰（★★★）\n\n口頭回答：把 Akerlof 的檸檬市場講給另一個工程師聽——為什麼「沒有人說謊」也能讓整個好東西的市場垮掉？這跟囚徒困境是同一道裂縫嗎？訊號怎麼救？\n\n### 推演解答\n\n**崩盤機制**：賣家知道車好壞、買家不知道（資訊不對稱）。買家分不出單一輛，只能按「期望品質」出價（好車肯出 24、爛車值 10，各半 → 出 17）。但這個價對好車主是虧的（他的底價 20）→ 好車主理性退場 → 市場只剩爛車 → 買家發現後再砍價 → 連次好的也退 → 螺旋向下，好東西被逆選擇趕光。**關鍵：每一步都是無懈可擊的個體理性，沒有人說謊、沒有人做錯，可是合起來是集體災難**——本可雙贏的好車交易根本發生不了。\n\n**和囚徒困境同源嗎？是。** 都是「**每個人都最佳化自己 → 集體一起變糟**」這道脊椎裂縫（ch01 那張矩陣的中央張力）。差別只在引擎：囚徒困境的引擎是「背叛的誘惑」（T>R），檸檬市場的引擎是「資訊不對稱下的逆選擇」。結構同形：個體理性絞殺了一個對所有人都更好的結果。\n\n**訊號怎麼救**：引入一個**只有好車主付得起、爛車主付不起**的成本——保固（爛車一定觸發賠付，爛車主給不起）、第三方驗車（難偽造）、品牌聲譽（重複賽局攢出來、砸招牌就毀）。有了它，好車主能可信地把「我這台真的好」傳出去，買家敢出高價，雙贏交易重新發生。**沒有訊號，個體理性絞殺集體；有了訊號，個體付一筆讓集體重新運轉的代價。常見錯路**：把問題講成「都怪賣爛車的奸商」——不，崩盤不需要任何奸商，它是結構性的；對症的藥是訊號與機制，不是道德勸說。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關（優先答「為什麼」）：\n\n1. 「不對稱資訊」和前面幾章那種「我不知道你這步出什麼」的不確定，差在哪？「型別（type）」是什麼意思？\n2. 為什麼一個可信的訊號「靠的是內容難偽造、不是內容本身」？用「假貨能不能輕鬆複製這個訊號」這把尺講一遍。\n3. Spence 的教育訊號裡，為什麼「文憑就算對生產力毫無幫助也能有效」？這個反直覺點怎麼用「成本差」解釋？\n4. 分離均衡和混同均衡差在哪？什麼條件下分離會塌成混同？（提示：假貨的成本跨過哪條線。）\n5. 檸檬市場為什麼「沒有人說謊也能崩」？這道裂縫和 ch01 囚徒困境的中央張力是同一道嗎、差在哪？\n6. 為什麼「資訊不對稱是道德問題、怪奸商就好」是錯的開藥方？對的藥是什麼？\n7. 聲譽為什麼是一種訊號、而且難偽造？「執行懲罰對自己也有成本」這件事，為什麼反而讓聲譽可信？\n8. 把 TLS 憑證、帶罰則的 SLA、rate limit 信譽分級這三個工程例，用「昂貴訊號」這個概念串成同一個道理——你串得出來嗎？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Game Theory\"（賽局理論條目）** — https://plato.stanford.edu/entries/game-theory/ ——不完全資訊賽局、貝氏賽局、訊號賽局與精煉均衡（perfect Bayesian equilibrium）寫得嚴謹；想看分離/混同均衡的形式定義看「games of incomplete information」一節。\n- **George Akerlof,〈The Market for Lemons〉（檸檬市場，1970）** — https://en.wikipedia.org/wiki/The_Market_for_Lemons ——逆選擇與市場崩潰的原始論文，短而經典（QJE 84:3, 488–500）；維基條目把好車退場的螺旋講得很清楚，是理解「資訊不對稱如何絞殺市場」的最佳入口。\n- **Michael Spence 與 job market signaling** — https://www.econlib.org/library/Enc/bios/Spence.html ——Econlib 的 Spence 小傳把「教育當訊號、靠成本差分離型別」這套講得簡潔；想抓「訊號靠成本不靠內容」的直覺看這篇。\n- **Amotz Zahavi 累贅原理（handicap principle）** — https://www.nature.com/articles/s41559-017-0254-z ——孔雀尾巴為什麼是「養得起的累贅＝誠實訊號」；Nature 的 Zahavi 訃聞兼回顧是好入口（注意：此原理在演化生物學界仍有爭議，2026-06 仍是活的辯論，別當定論）。\n- 跨書：「一個玩家在不確定下、只持有對方型別的機率信念時該怎麼選」的單人理性與信念更新基準，承襲自《在不確定中下注》談期望效用與貝氏更新那條線；把「報酬矩陣裡的數字不只有錢、聲譽與公平也算數」往下推，接到本書 ch12。\n"}, {"id": "ch12-fairness-trust", "file": "ch12-fairness-trust.md", "group": "Part IV — 協調與資訊", "title": "ch12 — 人類實際怎麼玩：公平、信任與報酬矩陣外的東西", "md": "# ch12 — 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n\n> **本章解決什麼問題**：前面十一章我們都在一個假設底下推演——玩家是「完全理性、只關心自己報酬最大化」的算計機器。這個假設讓數學很漂亮，但它對真人成立嗎？本章把賽局理論的預測拖到實驗室裡，跟真人的行為對照。你會看到一件值得停下來想的事：在最後通牒賽局（ultimatum game）裡，真人會**拒絕白拿的錢**，只因為對方分得太多。這不是因為人笨、也不是因為人不理性——而是因為**報酬矩陣裡的數字，從來就不只有金錢**。本章是 Part IV 的收尾，也是全書中央張力一個罕見的反向案例：當「公平」被寫進個體的效用函數，個體理性與集體理性在這裡不再分裂，反而部分彌合。規範分析（一個人面對不確定該怎麼選的數學）指向《在不確定中下注》，公平偏好的心理機制指向《思考的陷阱》；本章只負責鬆動一個假設——「報酬＝金錢」。\n\n## 從你已知的出發\n\n你設計過計費方案。也許是 API 的分級配額，也許是一個 SaaS 的定價階梯，也許只是內部一個資源排程器的優先順序規則。你在設計的時候，腦子裡跑的模型多半是這樣的：**使用者是理性的報酬最大化機器**——只要這個方案對他的總成本/總效益是正的，他就會用；只要某個 tier 的價格低於他願意付的上限，他就會升級。你的試算表裡，每個格子都是錢。\n\n然後你上線了，發現真人不是這樣玩的。\n\n我看過這種事不只一次。某個方案在純算術上對使用者明明是划算的——換算下來他每個月還省了錢——但他就是不用，甚至跑去用一個貴一點的競品。你做用戶訪談，得到的回答不是「你太貴」，而是某種版本的：「**我覺得這個收費方式不公平。**」也許是因為你對超量部分收的 overage 費率高得像懲罰；也許是因為老用戶發現新用戶拿到更好的價格；也許是因為你某次悄悄調整了免費額度，被當成背叛。在你的試算表裡，這些都不該影響決策——他的錢包數字明明是正的。但他寧可付出真金白銀的代價，也要拒絕一個「他覺得不公平」的方案。\n\n如果你只把使用者建模成「錢包數字最大化」，你會**系統性地預測錯**他們的行為。而且錯的方向很固定：你會高估他們對「對我有利但不公平」的方案的接受度，低估「覺得被佔便宜」這件事的破壞力。這不是邊角案例——這是行為賽局理論（behavioral game theory）過去四十年最穩固的發現之一：**真人會為了公平，付出可量化的代價。**\n\n這一章就是要把這個你在生產環境裡撞過的牆，接到一套精確的語言上。我們會看到，這件事**不需要**用「人是非理性的」來解釋。更準確、也更有用的講法是：人的報酬矩陣裡，除了金錢，還有別的東西——而一旦你把那個東西算進去，他們的行為又變回理性的了。順帶一提，這跟你天天面對的另一件事——**信任**——是同一回事：為什麼有的 client 你願意給更高的配額、有的你寸步不讓？那不是錢算出來的，是一段互動歷史算出來的。本章後半會把信任也拆開。\n\n## 最後通牒賽局：白拿的錢，為什麼有人不要\n\n先把這一章的主角請上台。**最後通牒賽局（ultimatum game）**由 Werner Güth、Rolf Schmittberger、Bernd Schwarze 三人在 **1982 年**首次做成實驗（照 landscape），規則簡單到一句話講完：\n\n```text\n最後通牒賽局（ultimatum game）的規則\n\n  有一筆錢，比方說 100 元，要在兩個陌生人之間分。\n  \n  玩家 A（提議者 proposer）：提出一個分法，「我拿 x、你拿 100−x」。\n  玩家 B（回應者 responder）：看到這個提議後，二選一——\n      接受(accept) → 就照這個分法拿錢，賽局結束。\n      拒絕(reject) → 兩個人都拿 0，賽局結束。\n  \n  只玩一次。雙方互不相識、之後也不會再見（無重複、無聲譽）。\n```\n\n這是一個序貫賽局（見 ch06），所以我們可以用賽局樹來看，也可以用逆向歸納來「解」它。先解出「完全理性自利」的標準預測——這一步很重要，因為它就是等下要被真人打臉的那個預測。\n\n### 標準理論怎麼說：給最小正數，必接受\n\n用 ch06 的逆向歸納，從樹的底部往上倒推。先看回應者 B 的決策節點：\n\n```text\n逆向歸納：標準理論（雙方都只關心自己拿到的錢，越多越好）\n\n  情境：A 提議「A 拿 99、B 拿 1」。輪到 B 決定。\n  \n  B 的兩個選項，比較他自己拿到的錢：\n      接受 → B 拿 1 元\n      拒絕 → B 拿 0 元\n  \n  1 > 0，所以理性的 B 會「接受」。← B 對「任何正數」都該接受\n\n  既然 A 預見「B 會接受任何正數」，A 往回推自己的最佳提議：\n      給 B 越少、A 自己留越多。\n      給 B 「1 元」（最小正數）→ A 拿 99，B 接受。\n  \n  標準理論的均衡：A 提議 (99, 1)，B 接受。\n  ← 這是這個賽局唯一的「子賽局完美均衡」（見 ch06）\n```\n\n讓我把這個結論講白：**在「兩個玩家都只關心自己的錢」的假設下，理性的回應者應該接受任何正的提議**——因為拿 1 元也比拿 0 元好。理性的提議者預見到這點，於是會把對方壓到只給 1 元（或最小貨幣單位），自己獨吞剩下的。這就是冷冰冰的子賽局完美均衡：(99, 1)，B 接受。\n\n這個預測有個很乾淨的邏輯：拒絕是**自我傷害**。B 拒絕的那一刻，他不是在懲罰 A——他是在同時懲罰 A 和**他自己**，因為兩人都歸零。一個只關心自己錢包的 B，沒有任何理由這麼做。\n\n### 真人怎麼玩：近半的提議，與「我不爽就同歸於盡」\n\n現在把這個賽局發給真人玩。Güth 等人 1982 年做的、以及之後成百上千次的複現，得到的結果穩定到可以當教科書常數（驗證值照 landscape）：\n\n```text\n最後通牒賽局：標準預測 vs 真人行為\n\n                    標準理論預測          真人實際行為（典型）\n                    ----------------      --------------------\n  提議者給對方       最小正數（≈1%）       常落在 40%~50%\n  回應者拒絕門檻     從不拒絕（任何正）     低於 20%~30% 常被拒\n\n  兩個預測都錯，而且錯得很大、很穩定：\n    1. 提議者並沒有把對方壓到 1 元，而是主動給了近一半。\n    2. 回應者真的會拒絕，寧可兩人都拿 0，也不接受「太小」的一份。\n```\n\n第二行是這一章的震撼點，請你停十秒。一個人面前放著「白拿 20 元」和「一毛不拿」兩個選項，而他選了「一毛不拿」。從錢包的角度，這是純粹的損失——他主動燒掉了 20 元，只為了讓對方也拿不到那 80 元。標準理論說沒有理性的人會這麼做。但真人會，而且穩定地會，跨幾百個實驗、不同金額、不同國家都會。\n\n這裡有一個常見的逃生口，我要先把它堵掉：「也許是因為 20 元太少，他懶得在意？」實驗者試過把金額放大——在某些研究裡放大到相當於受試者好幾個月的薪水——拒絕「不公平的大餅」的行為依然存在。錢變多了，「不公平」的刺痛也跟著等比放大。這不是「金額小到無所謂」能解釋的。\n\n那要怎麼解釋？最廉價、也最容易讓你停止思考的答案是：「**人就是不理性嘛。**」我認為這是這一章最該被打掉的一句話——它聽起來像個解釋，其實什麼都沒解釋。它沒告訴你拒絕門檻為什麼穩定落在 20%~30%、沒告訴你提議者為什麼**預見**到這件事而主動給近半、更沒告訴你你該怎麼設計你的計費方案。把「不理性」當答案，等於放棄建模。\n\n## 把公平算進報酬：理性 ≠ 自利\n\n更好的解釋——也是本書唯一要你接受的那一步——是這樣的：**回應者拒絕低提議，是完全理性的；只是他最大化的東西，不只有錢。**\n\n回想 ch01 那張脊椎矩陣，我們花了很大力氣強調「報酬（payoff）越大越好」。但我們從來沒說報酬**只能**是錢。報酬是**效用（utility）**——一個玩家對某個結局的總體偏好程度（效用為什麼不等於金額、效用怎麼來，是《在不確定中下注》談單人理性那本的地盤，本書只借結論）。如果一個人對「我拿 20、對方拿 80」這個結局的真實感受，除了「+20 元的爽」之外，還包含「被當盤子佔便宜的不爽」，那他的效用就不是 +20，而是 +20 再扣掉那份不爽。當不爽夠大，淨效用變成負的，**拒絕（拿 0）反而是效用較高的選項**。\n\n讓我們把這個直覺寫成一個 worked example，補一個具體的「公平項」進回應者的效用函數，然後重新解這個賽局。這是本章的核心計算，我會一步步算、不跳步。\n\n### worked example：把「不公平的不爽」加進效用，重解均衡\n\n我們用一個刻意簡化的公平模型（這是行為經濟學 Fehr–Schmidt 1999「不公平趨避 inequity aversion」模型的玩具版；嚴格模型指向延伸閱讀）。設總額 100 元，A 提議「A 拿 a、B 拿 b」（a + b = 100）。回應者 B 的效用不只是 b，而是：\n\n```text\n回應者 B 的效用模型（加進「劣勢方的不爽」）\n\n  U_B(接受) = b − β · max(a − b, 0)\n              └─錢─┘   └────── 不公平懲罰項 ──────┘\n\n    b         = B 實際拿到的錢\n    a − b     = 「對方比我多拿」的差距（只在 B 吃虧時為正）\n    β         = B 對「自己吃虧的不公平」有多在意（β ≥ 0，這裡取 β = 0.5）\n    max(·,0)  = 只有當 B 拿得比 A 少時才有這份不爽；B 拿得多時不罰自己\n\n  U_B(拒絕) = 0    ← 兩人都拿 0，沒有錢、也沒有不公平差距（0 − 0）\n\n  決策規則：U_B(接受) ≥ U_B(拒絕) = 0 時，B 才接受。\n```\n\n現在用這個模型，逐一檢查幾個提議，看 B 會不會接受。取 β = 0.5：\n\n```text\n逐一代入：B 在 β=0.5 下，接受哪些提議？（總額 100）\n\n  提議 (A拿, B拿) = (99, 1)：\n     差距 a−b = 99 − 1 = 98\n     U_B
