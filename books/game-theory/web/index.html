<style>

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "當理性互相碰撞", "md": "# 當理性互相碰撞\n\n### 賽局理論的直覺與驚嘆\n\n> 當每個人都完全理性、各自最佳化自己的選擇，結果卻可能讓所有人一起變糟——而「理性」本身在多人互動裡，會分裂成「個體理性」與「集體理性」兩種互相打架的東西。\n>\n> 這本書想讓你親身感受這一刀——並且能用自己的話，對另一個工程師講清楚：**囚徒困境的 (背叛, 背叛) 為什麼是穩定的均衡卻是雙輸，而合作要靠什麼條件才救得回來。**\n\n---\n\n這是一本寫給資深後端工程師的賽局理論「欣賞」書。純興趣、和工作無關、純紙上推演——它不教你證明納許存在定理、不要你跑任何程式、不發 lab 作業。它只想帶你看懂一件反直覺的事：**「大家都聰明」不保證「大家都好」，合作不是預設值，而是一個需要被解釋、甚至被設計出來的奇蹟。**\n\n你已經在工作裡碰過賽局的影子，只是沒這樣叫它：retry storm 裡每個 client 重試都是個體理性、整體把服務打垮卻是集體災難（這就是工程版的囚徒困境）；leader election 選誰當 leader 不重要、選不一致才腦裂（協調賽局）；circuit breaker 被打爆就斷、恢復了再試、不記仇（某種以牙還牙）；backoff+jitter 用隨機去同步打破壞均衡（混合策略）；你設計過的 API 配額、計費方案、排程優先級，全都是「設計報酬讓使用者的理性行為導向你要的系統行為」（機制設計）。這本書把這些直覺接上一個更大的故事。\n\n## 這本書怎麼讀\n\n- **純紙上推演**：每章的「紙上推演」是手填報酬矩陣、找均衡、解混合策略、口頭自答的思辨題，不是要你開終端機。所有數值示範一律手算、攤在你眼前的 ` ```text ` 表裡。\n- **直覺與精確意義優先**：每個概念先回答「它在問什麼問題」（納許均衡在問「哪個策略組合下沒人想單方面變」、混合策略在問「怎麼讓對手猜不到又不吃虧」），再給形狀。定理給直覺、給條件、給結論，嚴格證明指向延伸閱讀。\n- **講得出來才算過**：每章末的「自我檢核」是口頭題——對齊「能不能把這個概念講給另一個工程師聽」的深度。優先問「為什麼」而不是「是什麼」。講得出來，才算真的懂了。\n- **故障視角是賣點**：賽局理論正是「聰明人集體犯傻」最反直覺的領域。每章的「直覺的陷阱」段，專門守住那些被講爛了的庸俗版（「賽局理論就是你死我活的零和」、「以牙還牙是最強策略」、「囚徒困境證明合作不可能」），還你正確版。\n\n## 一條脊椎貫穿全書\n\n整本書反覆回到**同一張 2×2 囚徒困境報酬矩陣**（數字＝獲益點數、越大越好）：\n\n```text\n                  對方：合作(C)    對方：背叛(D)\n   我方：合作(C)     (3, 3)          (0, 5)\n   我方：背叛(D)     (5, 0)          (1, 1)\n   T>R>P>S＝5>3>1>0；2R>T+S＝6>5\n```\n\n每深入一個 Part，你就重新認識這張矩陣一次：ch01 它讓困境誕生；ch02 它示範均衡為何不等於最優；ch04 它對照出零和只是特例；ch07 重複玩它、未來的陰影救回合作；ch09 把它丟進演化族群；ch13 反過來改它的報酬把困境救出來；ch18 一次對帳這七層意義。中央那條反覆叩問的張力始終不變：**每個人都最佳化自己，結果集體更糟——個體理性與集體理性，如何在同一張矩陣裡分裂。**\n\n## 全書地圖\n\n```text\nPart I   困境與均衡 ........... 一張矩陣，與「聰明人集體犯傻」的核心（ch01–03）\nPart II  純策略不夠用 ......... 零和、極小極大、隨機化（ch04–06）\nPart III 合作的考古學 ......... 為什麼合作會崩、又如何救回（ch07–09）\nPart IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊（ch10–12）\nPart V   反過來設計賽局 ....... 機制設計：讓理性導向好結果（ch13–14）\nPart VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳（ch15–18）\n\n附錄 A 記號與術語速查　附錄 B 詞彙表　附錄 C 閱讀地圖\n```\n\n## 書架上的鄰居\n\n這本書只用自己的欣賞聲音講「為何反直覺、合作為何是奇蹟」；需要更深的運算時，它會把你指向書架上相鄰的書，而不是重講一遍：\n\n- 一個人在不確定下該怎麼選、期望效用、效用不只是金額 →《在不確定中下注》（本書只在「對手會反應你的選擇」時才接手）\n- 期望值怎麼算、混合策略的期望報酬運算、族群比例作為機率分布 →《馴服隨機》\n- 策略情境下非理性的心理機制、公平偏好從哪來 →《思考的陷阱》\n- 混合策略幾何、演化動態的特徵值與穩態 →《矩陣是動詞》\n\n## 給誰讀\n\n唯一讀者：一位 6 年以上的資深後端工程師。你不需要任何賽局理論背景——你需要的直覺，retry storm、背壓、leader election、限流、spot 競價、backoff+jitter 早就教會你了。本書把這些工程經驗當成錨點，從「對手也會算」起步，一路帶你看到「合作可以被設計出來」。\n\n準備好了，就從 **ch01 — 囚徒困境登場：每個人都對，結果一起錯** 開始。你的直覺正準備在接下來每一章騙你一次——這正是值得你停下來、慢慢讀的地方。\n"}, {"id": "ch01-prisoners-dilemma", "file": "ch01-prisoners-dilemma.md", "group": "Part I — 困境與均衡", "title": "ch01 — 囚徒困境登場：每個人都對，結果一起錯", "md": "# ch01 — 囚徒困境登場：每個人都對，結果一起錯\n\n> **本章解決什麼問題**：這是全書的起點，也是全書脊椎那張 2×2 報酬矩陣第一次登場。我要在這一章讓你親手讀懂一件反直覺的事——兩個玩家都完全理性、各自選對自己最有利的那一步，結果卻一起掉進對雙方都更糟的結局。本章只動用「優勢策略」這一個最樸素的工具就把困境逼出來；它的精確語言（納許均衡）留給 ch02、救援的辦法（重複、合作）留給 Part III。讀完你要能對另一個工程師講清楚：困境不是因為有人笨或太自私，而是「個體理性」與「集體理性」在這張矩陣裡天生分裂。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心   ◄ 你在這裡\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n這本書要帶你看的，是這張地圖最上面那條主線：當每個人都聰明，為什麼大家不一定都好。它在 ch01 這張矩陣裡誕生，到 ch18 你會用七種不同的眼光重看同一張矩陣。我們從困境本身開始。\n\n## 從你已知的出發\n\n你維護過會雪崩的系統。我猜你看過這樣的事故報告：某個下游服務變慢了幾百毫秒，上游的每個 client 都按照「正確」的設定開始重試（retry）。每一次重試，從那個 client 的角度看都完全合理——「請求失敗了，重試是標準做法，重試能提高我這次調用成功的機率」。但所有 client 同時這樣想，重試的流量疊加到原本就吃緊的下游上，把它徹底打死。本來只是慢一點，現在是全掛。事後你在 retro 上說了一句大家都點頭的話：**每個人的重試都沒錯，但合起來是一場災難。**\n\n這就是工程版的囚徒困境，而且它幾乎是逐字對應的。把「重試」叫做「背叛（defect）」、「克制不重試、給下游喘息空間」叫做「合作（cooperate）」，你會發現：\n\n- 對單一 client 而言，不管別人怎麼做，**重試（背叛）總是對自己更有利**——如果別人都克制，我重試能搶到資源；如果別人都在打，我不重試只會自己先餓死。\n- 但所有人都選了那個「對自己更有利」的選項，結果是 (大家都重試) → 服務崩潰 → 所有人都失敗，比 (大家都克制) 更糟。\n\n你已經在生產環境裡親身體驗過這個結構。thundering herd（驚群）、cache stampede（快取雪崩、所有人在快取失效那一刻同時打 DB）、retry storm（重試風暴）——這些都不是「某個服務寫得爛」造成的，它們是**一群各自最佳化的理性參與者，疊加出的集體災難**。你下意識的修法也很賽局：exponential backoff＋jitter（指數退避＋隨機抖動）其實是在**打破對稱、把大家從那個壞均衡裡踢出來**（這個視角 ch05 混合策略會再回來），circuit breaker（斷路器）的「被打爆就先斷開、恢復了再試」其實是一種**以牙還牙再寬恕**（ch08 會說這正是 tit-for-tat 的骨架）。\n\n換句話說：你的工程直覺裡早就裝著賽局理論，只是沒人幫你把它的名字告訴你。這本書要做的，就是把這些你已經會的東西，接到一套精確的語言上。\n\n還有一件事要先講清楚，因為它決定了這本書的邊界。在你讀過的決策直覺裡，有一大塊是「一個人在不確定下該怎麼選」——期望值、效用、要不要冒這個險。那是單人決策的地盤（深入處見《在不確定中下注》談單人理性那本）。本書從那裡**起步**，但立刻拐個彎：我們關心的不是「我一個人面對隨機的世界該怎麼算」，而是「**對面那個傢伙也在算，而且他算的時候會把我會怎麼算也算進去**」。一旦對手會反應你的選擇，世界就從「你 vs 機率」變成「你 vs 另一個會算計的心智」。賽局理論就是從這一刻接手的。\n\n## 報酬矩陣：把「互相影響」畫成一張表\n\n要談兩個會互相反應的玩家，我們需要一個能同時容納雙方選擇與雙方結果的表示法。這個表示法就是**報酬矩陣（payoff matrix）**。\n\n你會讀 2×2 表格——這是你的母語，本書不教你怎麼讀格子（線性代數那套你早就熟了）。這裡教的只是**賽局理論的擺放慣例**，把它當成「擦亮一個你早就有的直覺」，而不是背新規則：\n\n- **列（row）＝我方的策略選項**。\n- **行（column）＝對方的策略選項**。\n- **每一格裡放一對數字 (我方報酬, 對方報酬)**——逗號左邊永遠是「列玩家」（我方）拿到的，右邊永遠是「行玩家」（對方）拿到的。\n- **數字越大越好**。本書全程用「獲益點數、越大越好」，不用經典版的「坐牢年數」（那個是越小越好，方向相反，等下「直覺的陷阱」會專門講為什麼這個方向選擇很要命）。\n\n現在來看全書的脊椎——這張矩陣會在後面被重看七次，每次多懂一層，所以請你在這裡花點時間把它刻進腦子。兩個玩家各有兩個選擇：合作（C，cooperate）或背叛（D，defect）。\n\n```text\nch01 脊椎：囚徒困境基準報酬矩陣（數字＝獲益點數，越大越好）\n\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)\n\n    格內 = (我方報酬, 對方報酬)\n    四個報酬有標準名字：\n      T = 5  誘惑(Temptation) 我背叛、對方還在合作——佔了大便宜\n      R = 3  獎賞(Reward)     雙方都合作——還不錯\n      P = 1  懲罰(Punishment) 雙方都背叛——都沒好下場\n      S = 0  受騙(Sucker)     我合作、對方背叛——當了傻瓜\n    困境核心不等式： T > R > P > S   （5 > 3 > 1 > 0）\n```\n\nT、R、P、S 是賽局理論的標準標號（Temptation／Reward／Punishment／Sucker），全書沿用。請特別記住那條不等式 **T > R > P > S**，它就是「困境之所以是困境」的全部數學內容——稍後你會看到，正是這四個數字的排序，把兩個理性玩家逼進死角。\n\n讀一遍每一格，確認你抓到了：\n\n- 左上 (3, 3)：兩人都合作，各拿 3（R, R）。對雙方都不錯。\n- 右上 (0, 5)：我合作、對方背叛。我拿 0（當了傻瓜 S），對方拿 5（吃到誘惑 T）。\n- 左下 (5, 0)：我背叛、對方合作。對調過來，我拿 5、對方拿 0。\n- 右下 (1, 1)：兩人都背叛，各拿 1（P, P）。難看，但比當傻瓜的 0 好。\n\n注意矩陣是對稱的：你和對方面對的是同一個結構，沒有誰天生佔便宜。困境是結構造出來的，不是哪一方比較壞。\n\n## 優勢策略：背叛是怎麼變成唯一理性選擇的\n\n現在輪到本章唯一的核心工具：**優勢策略（dominant strategy）**。\n\n定義很短：如果一個策略**不管對方怎麼選，都比你的其他策略好**，它就是你的優勢策略。優勢策略的迷人之處在於——它讓決策變得不需要猜對手。你甚至不必知道對方會做什麼，因為無論對方做什麼，你的最佳回應都一樣。\n\n判斷有沒有優勢策略，靠的是一個你在 ch03 會反覆用到的工具的雛形：**最佳反應（best response）**——「假設對方已經選定了某一行，我在自己的兩列裡選哪個報酬最大？」我們一行一行檢查（固定對方的每一個選擇）。\n\n**先固定「對方合作」（看矩陣左邊那一行）：**\n\n```text\n                     對方：合作(C)\n    我方：合作(C)      (3, 3)     ← 我合作拿 R = 3\n    我方：背叛(D)      (5, 0)     ← 我背叛拿 T = 5\n\n    比 5 和 3：背叛(5) > 合作(3)。  → 對方合作時，我該背叛。\n```\n\n**再固定「對方背叛」（看矩陣右邊那一行）：**\n\n```text\n                                  對方：背叛(D)\n    我方：合作(C)      ...          (0, 5)   ← 我合作拿 S = 0\n    我方：背叛(D)      ...          (1, 1)   ← 我背叛拿 P = 1\n\n    比 1 和 0：背叛(1) > 合作(0)。  → 對方背叛時，我也該背叛。\n```\n\n兩種情況下答案都一樣：**背叛贏。** 對方合作時，背叛（5）勝過合作（3）；對方背叛時，背叛（1）勝過合作（0）。也就是說，**不管對方做什麼，我背叛都比我合作好**——這正是「優勢策略」的定義。而且這裡是**嚴格**優勢（strictly dominant，5 嚴格大於 3、1 嚴格大於 0，沒有平手），所以一個理性玩家**沒有任何理由**選合作。\n\n現在把這套推理套到對方身上。矩陣是對稱的，對方做一模一樣的分析，得到一模一樣的結論：背叛也是**他**的嚴格優勢策略。於是：\n\n```text\n我的推理：    不管對方怎麼選，我背叛比較好  → 我選 D\n對方的推理：  不管我怎麼選，他背叛比較好    → 對方選 D\n兩人都用優勢策略 → 結局落在 (背叛, 背叛) = (1, 1)\n```\n\n兩個完全理性的玩家，各自做了無懈可擊的計算，結果一起停在右下角 **(1, 1)**。\n\n## 困境在哪：個體理性與集體理性的第一道裂縫\n\n把鏡頭拉遠一格，看看他們落在哪裡——以及他們**錯過了**什麼。\n\n```text\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ★         (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)  ●\n\n    ●  = 兩個理性玩家實際落點 (背叛,背叛) = (1, 1)\n    ★  = 對雙方都更好的結果   (合作,合作) = (3, 3)\n    兩人都拿 1，明明都可以拿 3。\n```\n\n這就是困境，而且我認為這是整本書最值得你停下來盯著看的一頁。**(合作, 合作) = (3, 3) 對兩個人都嚴格更好——每人 3 分對上每人 1 分。它就擺在那裡，雙方都看得見、都想要。但它不會發生。** 為什麼？因為從 (合作, 合作) 出發，任何一方都有偷跑的誘惑：只要我偷偷改成背叛，我的報酬從 3 跳到 5（吃到誘惑 T），對方變成傻瓜掉到 0。我知道這個誘惑，對方也知道我知道、也知道他自己有同樣的誘惑——於是 (合作, 合作) 像放在斜坡上的球，誰都站不住，最後一起滾到 (1, 1)。\n\n請務必抓住這件事的精確含意，因為它是全書反覆叩問的那條張力：\n\n> **每一個玩家都最佳化了自己的選擇（各自選了優勢策略），但這些個體最佳化加總起來，把集體推到一個對所有人都更糟的結果。** 個體理性（individual rationality）說「背叛」，集體理性（collective rationality）說「合作」，這兩種理性在同一張矩陣裡公然打架——而個體理性贏了，集體因此輸了。\n\n我要強調一句，因為它是全書最重要、也最常被誤解的一點：**這不是因為玩家笨，也不是因為他們太自私。** 恰恰相反，正是因為他們夠聰明、夠理性，才精準地推導出「背叛」並一起跳進坑裡。一群更笨、更不會算的玩家，搞不好誤打誤撞合作了反而過得更好。困境是**理性自己造成的**，這比「壞人作惡」可怕得多——你沒辦法靠「找個更聰明、更有道德的玩家」來修它，因為問題出在結構，不在玩家。\n\n回到你的 retry storm：那些 client 不是寫壞了，它們的重試邏輯個個正確。系統雪崩，正是因為每個 client 都正確地推導出「重試對我最有利」。你沒辦法靠「叫每個 client 寫得更聰明」來解決——更聰明的 client 只會更堅決地重試。要救它，你得改變遊戲本身（加 backoff、加 jitter、加 circuit breaker、改配額規則）。**改變遊戲的規則去逼出更好的集體結果**，正是這本書 Part V「機制設計」要講的事；而 ch13 會把這張同一張矩陣拿出來，示範「如果你能改報酬，怎麼讓 (合作, 合作) 站得住」。先記住這個伏筆。\n\n## 它從哪裡來：RAND、兩名數學家、和一個被編出來的故事\n\n這個結構不是哲學家在扶手椅上空想出來的，它有一段相當具體、相當冷戰的出身（史實以本書事實基準表為準，我另查了原始資料對齊細節，2026-06）。\n\n1950 年初，在加州聖塔莫尼卡的 **RAND 公司（蘭德公司）**——一間替美國空軍做戰略研究的智庫——兩位研究員 **Merrill Flood（佛勒德）** 與 **Melvin Dresher（德雷舍）** 在賽局理論的研究中構造出了這個報酬結構，並真的找人做了實驗：他們請了同事（經濟學家 Armen Alchian 與數學家 John Williams）連續玩了一百回合，想看看人會不會合作。RAND 之所以對這類賽局有興趣，背景是核子戰略——「要不要先發制人、要不要單方面裁軍」這種兩強對峙，骨子裡就是一場巨大的囚徒困境（這條線 ch17 會謹慎地再碰一次）。\n\n但**「囚徒困境」這個名字、和那個家喻戶曉的「兩名嫌犯被分開偵訊、各自決定要不要招供」的故事**，不是 Flood 或 Dresher 取的。是數學家 **Albert W. Tucker（塔克）** 編的。1950 年他要對史丹佛大學心理系的聽眾講賽局理論，覺得 Flood–Dresher 那個抽象的報酬矩陣不好懂，就現編了一個直覺的故事框架：兩個共犯被隔離偵訊，檢察官對每個人說「你招、他不招，你放走、他重判；你們都招，各判中等；都不招，各判輕罪」——於是「招供」就是背叛、「不招」就是合作，每個人理性算下來都該招，結果兩個本來可以一起輕判的人，一起重判。這個故事好懂到它徹底蓋過了原本的數學，七十多年來「prisoner's dilemma」這個名字傳遍生物學、經濟學、政治學（2025 年正好是它的七十五週年）。\n\n有個小巧合值得一提：Tucker 同時也是 **John Nash（納許）** 的博士論文指導教授——而 Nash 即將給這整套賽局理論一個更一般、更精確的均衡概念，那正是 ch02 的主角。命名困境的人，指導了把困境放進通用理論的人。\n\n歷史細節先到這裡。我把它放進來不是為了編年，而是要你記住一件事：這個困境的「囚犯」外衣只是一件教學用的戲服，**底下那個 T > R > P > S 的報酬結構才是本體**。下次你看到 retry storm，別被「沒有囚犯啊」騙了——只要報酬排序對上，困境就在那裡。\n\n## 直覺的陷阱\n\n囚徒困境是「聰明人集體犯傻」最赤裸的標本，也因此周圍堆滿了錯誤直覺。下面這幾個是本章最常把人帶溝裡的，每一個我都標出**錯在哪一步**和**怎麼自我察覺**。\n\n| 陷阱（錯誤直覺） | 錯在哪一步 | 正確版 / 自我察覺 |\n|---|---|---|\n| 「他們合不來，是因為某人笨或太自私」 | 把困境歸因到玩家品質。其實兩人**越理性、越會算**，越精準地一起跳進 (1,1)。 | 困境是**結構**造的，不是玩家造的。徵兆：如果你覺得「換個更聰明的玩家就好了」，你就誤解了——更聰明只會更堅決地背叛。 |\n| 「囚徒困境證明合作不可能 / 自私必勝」 | 把**單回合、無未來、無外力**的特例當成普世結論。 | 「背叛佔優」只在**這一局、沒有下一局、沒有外部懲罰**時成立。一旦重複（ch07）、能承諾、有聲譽或外部懲罰，合作就能救回。困境是「合作為什麼會崩」的模型，不是「合作不可能」的證明。 |\n| 「報酬數字越小越好（坐牢年數嘛）」 | 用經典的「年數」版（0/1/5/10 年，越小越好），方向跟「優勢策略＝選報酬大的」相反。一不小心就把優勢策略找反，整個結論顛倒。 | 本書全程**點數、越大越好**（T>R>P>S＝5>3>1>0）。徵兆：如果你算出「合作是優勢策略」，幾乎一定是把方向搞反了，回頭檢查你比的是「大」還是「小」。 |\n| 「(背叛,背叛) 既然是雙方都選的，那它應該是個好結果吧」 | 把「兩個理性玩家會停在這裡」誤讀成「這裡最好」。 | 穩定 ≠ 最優。(1,1) 穩定（誰都不想單方面改），卻是雙輸。這條張力 ch02 會用「納許均衡」精確化——先記住：**穩定的均衡可以是雙輸的**。 |\n| 「只要兩人講好、握個手約定合作，就解決了」 | 以為一紙口頭承諾能改變報酬。 | 在單回合困境裡，承諾**不可信**：就算約好合作，到了下手那一刻，背叛仍然讓我的報酬從 3 跳到 5，我沒有理由守約、對方也知道。要讓承諾有牙齒，得靠重複（ch07）或真正改變報酬的機制（ch13）。空口約定不改矩陣。 |\n\n最容易致命的是第三個——報酬方向。它不是概念問題而是**計算問題**，最會在你自以為懂了之後反咬一口。寫推演題時，先把「我用的是點數還是年數、越大好還是越小好」這句話寫在紙角，再開始比大小。\n\n## 紙上推演\n\n動手把困境逼出來一次，你才真的擁有它。以下三題，建議照順序做，紙筆即可、不要跑任何程式。\n\n---\n\n**推演題 1 ★ [10 分鐘]　把「降價戰」填成囚徒困境**\n\n兩家外送平台 A、B 在同一個城市搶市，各自決定要不要降價搶單。情境設定（已換算成「每月獲益點數、越大越好」）：\n\n- 兩家都**維持原價**：市場穩定，各賺 3。\n- 兩家都**降價**：搶單但毛利被打薄，各賺 1。\n- 一家降價、另一家維持原價：降價那家搶走大量訂單賺 5，維持原價那家流失客戶只賺 0。\n\n請你：(a) 把它填成一張 2×2 報酬矩陣（把「維持原價」當合作 C、「降價」當背叛 D，格內寫 (A報酬, B報酬)）；(b) 找出 A 的優勢策略；(c) 說出兩家理性下會停在哪一格、那是不是對雙方都最好的結果。\n\n---\n\n**推演題 2 ★★ [15 分鐘]　把你系統裡的雪崩寫成 2×2**\n\n挑一個你親身遇過的「各自最佳化卻整體變糟」情境——retry storm、cache stampede、或多服務搶共用連線池都行。把它寫成一張 2×2 報酬矩陣：\n\n- 定義兩個玩家是誰（例如兩個會互相影響的 client，或「我這個服務」vs「其他所有服務的集合」）。\n- 定義「合作」與「背叛」各是什麼具體行為（例如合作＝克制重試/退讓、背叛＝積極重試/搶資源）。\n- 給四格填上**滿足 T > R > P > S 的相對報酬**（不必是真實數字，排序對就行）。\n\n然後檢查：背叛是不是優勢策略？(背叛,背叛) 是不是比 (合作,合作) 對大家更糟？如果你的情境**不**滿足 T>R>P>S，那它可能根本不是囚徒困境——想想它缺了哪個條件。\n\n---\n\n**推演題 3 ★ [10 分鐘]　口頭反駁一個常見誤解**\n\n有人對你說：「囚徒困境啊，就是告訴我們人不該太自私嘛——他們要是不那麼自私就會合作了。」請你用兩三句話，不靠任何公式，向他解釋**為什麼這個說法抓錯了重點**。要求：講出「自私/不自私」不是關鍵，關鍵是什麼。\n\n---\n\n### 推演解答\n\n**第 1 題解答。**\n\n(a) 矩陣（維持原價＝C，降價＝D）：\n\n```text\n                     B：維持原價(C)     B：降價(D)\n    A：維持原價(C)     (3, 3)           (0, 5)\n    A：降價(D)         (5, 0)           (1, 1)\n```\n\n這正是 ch01 那張脊椎矩陣，數字一字不差（T,R,P,S = 5,3,1,0）。降價＝背叛、維持原價＝合作。\n\n(b) A 的優勢策略是**降價（D）**。逐行檢查：B 維持原價時，A 降價拿 5 > 維持原價拿 3；B 降價時，A 降價拿 1 > 維持原價拿 0。不管 B 怎麼選，A 降價都比較好 → 降價是 A 的（嚴格）優勢策略。對稱地，降價也是 B 的優勢策略。\n\n(c) 兩家理性下都降價，落在 **(降價, 降價) = (1, 1)**。這**不是**對雙方最好的——(維持原價, 維持原價) = (3, 3) 對兩家都更好（3 > 1）。常見錯路：有人會說「A 應該維持原價賭 B 也維持」，但只要 A 維持原價，B 就有誘惑偷偷降價把 A 打到 0；A 知道這點，於是不敢維持。這就是困境。\n\n**第 2 題解答（檢核要點，沒有唯一答案）。**\n\n一個乾淨的寫法，以「兩個會互打的 client」為例，合作＝克制重試、背叛＝積極重試：\n\n```text\n                     對方：克制(C)      對方：狂重試(D)\n    我方：克制(C)      (3, 3)           (0, 5)\n    我方：狂重試(D)    (5, 0)           (1, 1)\n\n    R=3 都克制：下游健康，大家請求都成功\n    T=5 我重試、對方克制：我搶到下游的喘息容量，成功\n    S=0 我克制、對方狂打：我把容量讓出去結果還是被對方擠掉，失敗\n    P=1 都狂重試：下游被打死，大家都失敗（但 1>0：至少我也在搶，沒當純傻瓜）\n```\n\n驗算：狂重試是優勢策略（5>3 且 1>0），(1,1) 比 (3,3) 對集體更糟 ✓ 這就是工程版囚徒困境。**自我檢核的關鍵**：P > S 這個排序常被填錯——你得確認「都背叛(1)」比「我合作對方背叛(0)」對我更好，因為當純傻瓜（把容量讓出去自己還是失敗）通常是最差的。如果你的情境裡「克制反而最安全（S 最高）」，那它就不是囚徒困境（可能更像協調賽局或膽小鬼賽局，後面 ch10、ch09 會碰）。常見錯路：把它寫成零和（一方贏一方輸）——但雪崩裡 (3,3) 對雙方同時較好、(1,1) 對雙方同時較差，根本不是零和（ch04 會把這個誤解徹底打掉）。\n\n**第 3 題解答（口頭範本）。**\n\n「抓錯重點了。問題不是他們自私——恰恰相反，是因為他們**夠理性**才一起背叛的。你算一遍就知道：不管對方怎麼做，背叛對自己都更划算，所以一個完全理性的人**必然**選背叛，跟他自不自私、有沒有良心無關。真正的麻煩是這張表的結構：兩個人各自選了對自己最好的，加起來卻對大家都更糟。你想靠『叫大家別那麼自私』來修是修不好的——要救它得改變遊戲本身（讓他們有下一次互動、或讓背叛真的會被罰），不是改變人的品德。」常見錯路：只說「因為有囚徒困境啊」——這是同義反覆，沒解釋為什麼自私不是關鍵；一定要點出「理性 ⇒ 必然背叛」這一步。\n\n## 自我檢核\n\n闔上書，口頭回答下面這些。講得出來才算過關——優先回答「為什麼」。\n\n1. 報酬矩陣的擺放慣例是什麼？格子裡 (a, b) 的 a 和 b 各是誰的報酬、為什麼順序不能搞混？\n2. 什麼叫「優勢策略」？為什麼有優勢策略時，你**不需要猜對手**就能決定怎麼選？\n3. 在脊椎矩陣裡，**為什麼**背叛是嚴格優勢策略？把兩行的比較（5>3、1>0）親口講一遍。\n4. (合作, 合作) = (3, 3) 明明對雙方都更好，為什麼兩個理性玩家到不了那裡？從那一格出發，誰、有什麼誘惑偷跑？\n5. 「困境不是因為玩家笨或太自私」——這句話到底什麼意思？如果玩家更聰明，結果會更好還是更糟？為什麼？\n6. T > R > P > S 這條不等式，每一個 > 各自在保證什麼？如果把 P 和 S 對調（讓 S > P），困境還在嗎？\n7. 為什麼在單回合困境裡，「兩人口頭約好合作」救不了？什麼東西必須改變，承諾才有效？\n8. 用你自己系統裡的一個例子（retry storm 或別的）說明「個體理性導致集體次優」——對方是另一個工程師，你怎麼讓他三句話內聽懂？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Prisoner's Dilemma」**（https://plato.stanford.edu/entries/prisoner-dilemma/）。本章史實的權威來源，把 Flood–Dresher 的實驗與 Tucker 的命名講得很清楚；想確認「誰造結構、誰取名」的分工，讀開頭的歷史段落就夠。學術但好讀。\n- **William Poundstone，《Prisoner's Dilemma: John von Neumann, Game Theory, and the Puzzle of the Bomb》（1992）**。把囚徒困境的冷戰出身寫成一本好看的科普——RAND、馮紐曼、核戰略與這張矩陣的糾纏。想理解「為什麼一群數學家在 1950 年代的智庫裡會關心兩個囚犯」，這本是經典。\n- **本書 ch02（納許均衡）**。本章用「優勢策略」逼出困境，但困境的精確語言是納許均衡——「沒有人能單方面改善」。下一章會告訴你為什麼 (背叛,背叛) 是均衡卻雙輸、(合作,合作) 為什麼**不是**均衡。讀完 ch02，你對 (1,1) 的理解會升一級。\n- **本書 ch07（重複賽局）與 ch13（機制設計）**。如果你讀完本章心裡冒出「那困境到底能不能救」——能。ch07 講「給它一個未來」（重複互動讓背叛會被報復），ch13 講「改它的報酬」（外部懲罰把 (合作,合作) 變成均衡）。這兩章是本章那句「合作是需要被解釋、被設計的成就」的兌現。\n- **跨書：《在不確定中下注》談單人理性那本**。本章假設玩家會「為自己選最佳」，但「一個人在不確定下到底怎麼算最佳、效用為什麼不等於金額」是單人決策的地盤。想把賽局裡的「理性玩家」這個假設挖深，去那本書補單人理性的底。決策與賽局是同一枚硬幣的兩面。\n"}, {"id": "ch02-nash-equilibrium", "file": "ch02-nash-equilibrium.md", "group": "Part I — 困境與均衡", "title": "ch02 — 納許均衡：穩定不等於最好", "md": "# ch02 — 納許均衡：穩定不等於最好\n\n> **本章解決什麼問題**：ch01 用「優勢策略」把你帶進囚徒困境——背叛不管對方怎麼選都比較好，於是兩個理性玩家一起掉進 (1,1)。但優勢策略只是個方便的特例：多數賽局裡沒有哪個選項「不管對方怎麼做都最好」，你需要一把更通用的尺。這把尺就是納許均衡（Nash equilibrium）。本章把它講透——它定義的是「穩定」，不是「最優」，而這兩件事在多人互動裡會徹底分家。這是全書最核心的一章；ch03 之後的所有工具（最佳反應消去、混合策略、重複賽局、機制設計）都站在這個定義上。\n\n## 從你已知的出發\n\n你維運過卡在壞狀態裡出不來的系統。\n\n想像一個微服務叢集在重試風暴（retry storm）裡。下游被打爆、回應變慢，每個上游 client 都在重試——因為對**單一 client** 而言，重試是理性的：別人都在搶連線池，我不重試就只有我拿不到回應，我先餓死。於是沒有任何一個 client 願意第一個停手。整個系統卡在一個誰都不滿意、卻誰都不敢單方面離開的狀態。\n\n請你停在「誰都不敢單方面離開」這句話上十秒鐘。這不是「大家都笨」，恰恰相反——這是每個節點都正確地算過自己的最佳選擇之後的結果。「我單方面停止重試」這個動作，對我自己是嚴格變差的（別人照搶，我直接出局）。所以這個爛狀態是**穩定**的：沒有人能靠**自己一個人**改變行為而獲益。\n\n這就是納許均衡的全部直覺。納許均衡不是「最好的狀態」，而是「沒有人能單方面改善的狀態」。重試風暴裡的全體重試是一個納許均衡；它糟透了，但它穩定。要跳出去，你得讓**大家同時**改變（協調退避、加 jitter 去同步、circuit breaker 強制斷開）——而「需要大家同時動、靠任何人自己動沒用」正是均衡的指紋。\n\n你其實天天在跟納許均衡打交道，只是沒給它名字：\n\n- **leader election 沒收斂時的對峙**：每個節點都在等別人先承認自己是 follower，沒人肯先退，腦裂（split-brain）僵住。\n- **所有人都在輪詢一個過載的 API**：單方面降低自己的輪詢頻率＝自己的資料更新最慢，沒人想當那個人。\n- **快取全部同時失效後的 cache stampede**：每個請求都去打 DB 是「對我這條請求最快」的選擇，整體把 DB 壓垮。\n\n這一章要做的，是把這個你已經有的工程直覺，磨成一個能用在任何賽局上的精確工具——並且讓你看清楚一件最反直覺的事：**穩定的均衡，可以是對所有人都糟的結局，而這一點也不矛盾。**\n\n## 優勢策略太奢侈了，我們需要一把更通用的尺\n\n先說清楚 ch01 給你的工具有什麼限制。\n\nch01 靠的是**優勢策略（dominant strategy）**：背叛這個選項，不管對方選 C 還是 D，我的報酬都比合作高（5>3 而且 1>0）。當你有優勢策略，決策簡單到不像賽局——你根本不用管對方在想什麼，閉著眼睛選優勢策略就對了。囚徒困境之所以乾淨，正因為它雙方都有優勢策略，一步解完。\n\n問題是：**絕大多數有趣的賽局裡，沒有人有優勢策略。** 你的最佳選擇會隨對方的選擇而變。\n\n舉個你熟的例子。兩個服務要協調用同一個序列化格式，選 JSON 或選 Protobuf 都行，只要**選一樣的**就能通訊；選不一樣就互不相容、雙輸。這裡「我該選 JSON 還是 Protobuf」完全取決於對方選什麼——對方選 JSON 我就該選 JSON，對方選 Protobuf 我就該選 Protobuf。沒有任何一個選項是「不管對方怎樣都最好」的。優勢策略這把尺在這裡量不出東西。\n\n所以我們需要一個**不依賴優勢策略也能用**的均衡概念。它要能回答這個更一般的問題：\n\n> 在一個策略組合裡，如果每個玩家都「假設別人不動」，他自己還想不想動？如果所有人都不想動——這個組合就站得住。\n\n這就是納許均衡。1950 年，二十一歲的約翰・納許（John Nash）在普林斯頓的博士論文裡把這個想法寫成定義（指導教授正是 ch01 替囚徒困境命名的塔克（Albert Tucker），這個巧合很賽局理論）。同年他以一篇短文在《PNAS》公告了存在性結果，完整版 1951 年刊在《Annals of Mathematics》。這一個定義後來幾乎重寫了經濟學，也讓他在 1994 年與哈薩尼（John Harsanyi）、澤爾騰（Reinhard Selten）共獲諾貝爾經濟學獎——「非合作賽局均衡理論的開創性分析」。\n\n（一個誠實的小註：「諾貝爾經濟學獎」嚴格說是「瑞典央行紀念諾貝爾經濟學獎」，由瑞典央行 1968 年設立、1969 起頒，不在諾貝爾 1895 遺囑的五個獎之列。全書沿用俗稱，這裡註明一次。）\n\n## 納許均衡：沒有人想單方面偏離\n\n先給精確意義，再給形狀。\n\n**納許均衡在問的問題是**：哪個策略組合，在「其他人都維持不動」的前提下，沒有任何一個玩家能靠改變自己的策略而拿到更高報酬？\n\n把它拆成一句工程師能複誦的話：\n\n> **一個策略組合是納許均衡，若且唯若——每個玩家的策略，都是「對其他玩家當前策略」的最佳反應。**\n\n「最佳反應（best response）」是這裡唯一的零件：固定住所有對手的選擇，我能拿到最高報酬的那個選擇，就是我對這個局面的最佳反應。納許均衡就是「所有人的選擇互相都是對方的最佳反應」——一個自我一致（self-consistent）的不動點，誰都沒有單方面改進的空間。\n\n注意這個定義裡藏著的兩個關鍵限制，它們是後面所有「陷阱」的根源：\n\n1. **「單方面」是核心。** 均衡只擋得住「一個人自己偷偷改」的偏離。它完全不保證「大家一起改」不會更好——事實上囚徒困境裡，大家一起從 (D,D) 改成 (C,C) 就是雙贏，但這需要兩個人**同時**動，不在「單方面」的射程內。均衡對「協同偏離」一無所知。\n2. **均衡只談穩定，不談好壞。** 定義裡沒有任何一個字提到「報酬要高」「對大家要好」「要 Pareto 最優」。它只說「沒人想自己動」。一個爛到家的結局，只要沒人能靠自己脫身，它就是均衡。\n\n第二點是本章——也是整本書——最該被你帶走的一句話：**納許均衡是穩定（stable），不是最優（optimal）。** 把這兩個詞當成同義詞，是賽局理論最常見的誤解，沒有之一。\n\n## Worked example：在脊椎矩陣上找出所有純策略納許均衡\n\n來把定義套到 ch01 那張矩陣上，用「最佳反應分析」一格一格地查。這是全書最值得你親手算一遍的推導。\n\n這是 ch01 那張矩陣（全書脊椎，T,R,P,S=5,3,1,0，數字＝獲益點數、越大越好；報酬寫成 (我方, 對方)，列＝我方策略、行＝對方策略）：\n\n```text\n本章脊椎：囚徒困境基準矩陣（這是 ch01 那張矩陣）\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)\n\n    T>R>P>S ＝ 5>3>1>0\n```\n\n**找納許均衡的機械程序：** 對每一個玩家、固定對方的選擇，圈出他的最佳反應；最後「兩個玩家的最佳反應同時被滿足」的那些格，就是純策略納許均衡。\n\n**第一步——我方（列玩家）的最佳反應，固定對方的行：**\n\n```text\n對方選 C（看左欄，比較我方兩列的「我方報酬」＝每格第一個數）：\n    我方選 C → 我得 3\n    我方選 D → 我得 5      ← 5 > 3，我的最佳反應是 D ✔\n\n對方選 D（看右欄，比較我方兩列的「我方報酬」）：\n    我方選 C → 我得 0\n    我方選 D → 我得 1      ← 1 > 0，我的最佳反應是 D ✔\n```\n\n我方的最佳反應**恆為 D**（這正是 ch01 說的「D 是嚴格優勢策略」——優勢策略只是「最佳反應永遠是同一個」的特例）。\n\n**第二步——對方（行玩家）的最佳反應，固定我方的列。** 這張矩陣對稱，所以對方的演算法鏡像對稱（比較每格第二個數＝對方報酬）：\n\n```text\n我方選 C（看上列，比較對方兩行的「對方報酬」）：\n    對方選 C → 對方得 3\n    對方選 D → 對方得 5    ← 5 > 3，對方的最佳反應是 D ✔\n\n我方選 D（看下列，比較對方兩行的「對方報酬」）：\n    對方選 C → 對方得 0\n    對方選 D → 對方得 1    ← 1 > 0，對方的最佳反應是 D ✔\n```\n\n對方的最佳反應也**恆為 D**。\n\n**第三步——找交集。** 把兩邊的最佳反應標到矩陣上（`*` 標我方的最佳反應、`#` 標對方的最佳反應）：\n\n```text\n標記最佳反應（* ＝我方最佳反應，# ＝對方最佳反應）：\n                     對方：C            對方：D\n    我方：C          (3, 3)            (0, 5#)\n    我方：D          (5*, 0)           (1*, 1#)   ← 兩個記號同時出現！\n\n  唯一同時被 * 和 # 命中的格 ＝ (D, D) ＝ (1, 1)\n  ⇒ 唯一的純策略納許均衡是 (背叛, 背叛)\n```\n\n只有右下角同時帶 `*` 和 `#`——也就是說，在 (D,D) 這個組合裡，我方在玩最佳反應、對方也在玩最佳反應。**(D,D)=(1,1) 是唯一的純策略納許均衡。**\n\n**第四步——反過來驗算，確認其他三格都不是。** 這一步是工程師的嚴謹：每個「不是均衡」都要能指出「誰會想偏離、偏到哪、賺多少」。\n\n```text\n逐格做「單方面偏離」測試（誰能靠自己改一手而得益？）：\n\n (C,C)=(3,3)：我方單方面改成 D → 我的報酬 3 → 5（變好！）\n              ⇒ 我想偏離，(C,C) 不是均衡。\n              （它是雙方最好的結局，卻擋不住背叛的誘惑——這就是困境）\n\n (C,D)=(0,5)：我方單方面改成 D → 我的報酬 0 → 1（變好！）\n              ⇒ 我想偏離，不是均衡。\n\n (D,C)=(5,0)：對方單方面改成 D → 對方報酬 0 → 1（變好！）\n              ⇒ 對方想偏離，不是均衡。\n\n (D,D)=(1,1)：我方單方面改成 C → 我的報酬 1 → 0（變差）\n              對方單方面改成 C → 對方報酬 1 → 0（變差）\n              ⇒ 沒有人想偏離。穩定。✔ 這是納許均衡。\n```\n\n兩種視角——「最佳反應交集」（第一到三步）與「單方面偏離測試」（第四步）——指向同一格 (D,D)，互相印證。這個交叉驗算的習慣請你保留：找均衡時用最佳反應快速圈，驗均衡時用偏離測試逐格確認。\n\n**停下來看清楚這裡發生了什麼。** 唯一穩定的結局 (1,1)，對雙方都比 (3,3) 差。納許均衡這把尺老老實實地告訴你：這個雙輸的結局，沒有人能靠自己脫身。它是**穩定的雙輸**。均衡 ≠ 最優，這張矩陣就是鐵證。這也正是 ch01 中央張力的 ch02 版本——個體理性（各自玩最佳反應）把集體鎖死在次優均衡裡，而「均衡」這個詞本身完全沒有「對大家好」的意思。\n\n## 優勢策略均衡一定是納許均衡，反之不然\n\n上面那個 worked example 順手揭露了優勢策略和納許均衡的關係，值得單獨點明，因為它釐清「為什麼我們需要納許均衡這個更大的概念」。\n\n**優勢策略均衡是納許均衡的特例。** 如果每個玩家都有優勢策略（最佳反應**恆為同一個**、與對方無關），那這組優勢策略當然互為最佳反應——它根本連「看對方」都不用看就已經是最佳反應了。所以「優勢策略均衡」自動是「納許均衡」。囚徒困境的 (D,D) 正是這種雙重身分。\n\n**但反過來不成立。** 納許均衡只要求「對方當前選擇下我最佳」，不要求「對方任何選擇下我都最佳」。回到那個 JSON / Protobuf 協調的例子：\n\n```text\n協調賽局（選同一個才通；選一樣得 1，選不一樣得 0）：\n                     對方：JSON         對方：Protobuf\n    我方：JSON       (1, 1)            (0, 0)\n    我方：Protobuf   (0, 0)            (1, 1)\n\n最佳反應分析：\n  對方選 JSON     → 我方最佳反應 JSON（1>0）\n  對方選 Protobuf → 我方最佳反應 Protobuf（1>0）   ← 我的最佳反應「會變」！\n\n⇒ 我沒有優勢策略（最佳反應依對方而定）\n⇒ 但 (JSON,JSON) 和 (Protobuf,Protobuf) 兩個都是純策略納許均衡\n   （在任一個裡，沒人想單方面換成不相容的格式）\n```\n\n這個賽局沒有任何玩家有優勢策略，卻有**兩個**純策略納許均衡。優勢策略那把尺在這裡完全失效，納許均衡卻照樣量得出來。這就是為什麼納許均衡是更通用的工具——它涵蓋了「最佳選擇隨對方而變」的所有情況，而那是現實裡的常態。\n\n順帶看見了一個新東西：**均衡可以不只一個。** 這張協調矩陣有兩個。當有多個均衡時，「沒人想單方面偏離」就管不到「大家會收斂到哪一個」——選 JSON 還是 Protobuf 的兩個均衡同樣穩定，賽局理論本身選不出來。這個「多重均衡的選擇問題」我們留到 Part IV 的協調賽局與謝林點（見 ch10）展開，這裡只先讓你看見它存在。\n\n## 納許存在定理：每個有限賽局裡都至少有一個均衡\n\n你可能已經在問一個焦慮工程師該問的問題：**會不會有些賽局根本沒有納許均衡？** 如果這個工具有時候「查無此物」，那它就沒那麼通用了。\n\n剪刀石頭布就是個警訊。你出剪刀，對方最佳反應是石頭；對方出石頭，你最佳反應是布；你出布，對方最佳反應是剪刀……繞一圈回來，**沒有任何一個純策略組合是穩定的**——不管停在哪一格，總有一方想偏離。剪刀石頭布沒有**純策略**納許均衡。\n\n納許 1950/1951 的存在定理就是來回答這個焦慮的：\n\n> **納許存在定理（直覺版，嚴格證明本書不展開）**：每一個**有限賽局**（有限個玩家、每人有限個策略），只要允許**混合策略**（在自己的選項上放一個機率分布、隨機地選），就**至少存在一個**納許均衡。\n\n關鍵在「混合策略」這四個字。剪刀石頭布沒有純策略均衡，但有一個混合策略均衡：各以 1/3 機率出剪刀、石頭、布。當對手是真隨機 1/3 時，你出任何一手的期望報酬都一樣（無從利用），你也沒有偏離的理由——這就是均衡。**存在性是靠『允許隨機化』買來的。**\n\n證明本身用的是 Kakutani 不動點定理（角谷不動點定理，1941 年從 Brouwer 不動點推廣而來）：把「每個人對別人策略的最佳反應」看成一個從策略空間到自身的**對應（correspondence）**——之所以是「對應」而非「函數」，是因為對同一個對手局面，最佳反應可能不只一個（多個策略並列最佳），這正是必須用 Kakutani（容許多值對應）而非 Brouwer（只處理單值函數）的關鍵。這個對應在混合策略構成的緊緻凸集上滿足 Kakutani 的條件，於是必有不動點——而不動點恰恰就是「每個人都在對別人玩最佳反應」的那個點，也就是納許均衡。**這只是直覺，不是證明**；嚴格論證（為什麼最佳反應對應有閉圖、值域凸非空）指向延伸閱讀，本書不展開。\n\n對你有用的，是把這個定理的「保證」和「不保證」分清楚——這是工程師讀定理該有的紀律：\n\n```text\n納許存在定理保證什麼、不保證什麼：\n  ✔ 保證：有限賽局（含混合策略）至少有一個納許均衡——「查得到」\n  ✘ 不保證：均衡唯一（協調賽局有兩個以上、見 ch10）\n  ✘ 不保證：均衡是純策略（剪刀石頭布只有混合均衡、見 ch05）\n  ✘ 不保證：均衡對大家好（囚徒困境的均衡是雙輸）\n  ✘ 不保證：玩家找得到 / 收斂到它（這是計算與動態問題，定理不管）\n```\n\n混合策略均衡怎麼算、那個「讓對手無差異」的反直覺技巧，是 ch05 的主角，這裡只用它的結論：**存在性靠混合策略撐住，所以「沒有均衡」這件事在有限賽局裡不會發生。** 你手上這把尺，永遠量得到東西。\n\n## 直覺的陷阱\n\n納許均衡是整本書最容易「自以為懂了其實沒懂」的概念，因為「均衡」這個詞在日常語感裡偷渡了太多它其實不保證的東西。下面四個陷阱，每一個都會在某一步把你帶溝裡。\n\n| 陷阱 | 錯誤直覺 | 在哪一步出錯 | 正確版（怎麼自我察覺） |\n|---|---|---|---|\n| **均衡＝最優** | 「均衡是賽局的最佳解、是大家會滿意的結果」 | 把「沒人想單方面動」偷換成「對大家最好」 | 均衡只保證穩定、不保證好壞。囚徒困境 (1,1) 是均衡卻雙輸。**徵兆**：你說「均衡」時心裡浮現的是「皆大歡喜」——停，那是 Pareto 最優，不是納許均衡 |\n| **均衡＝沒人能變更好** | 「在均衡裡，誰都無法得到更高報酬」 | 漏掉「單方面」三個字 | 只保證「**一個人自己**改不會更好」。大家**一起**改可以更好（PD 從 (D,D) 一起變 (C,C) 雙贏），均衡管不到協同偏離。**徵兆**：你忘了問「誰跟誰一起動」 |\n| **均衡唯一** | 「算出一個納許均衡就解完了」 | 假設均衡像方程式的根一樣唯一 | 賽局可以有多個純策略均衡（協調賽局）、甚至連續多個。**徵兆**：你只圈了一格就收工，沒檢查其他格 |\n| **沒有均衡** | 「剪刀石頭布沒有穩定解，所以賽局理論在這裡無解」 | 只在純策略裡找 | 純策略可能無均衡，但允許混合策略後存在定理保證至少有一個。**徵兆**：你找不到純策略均衡就下結論「無解」，忘了隨機化 |\n\n最致命、也最該反覆自問的是第一個：**穩定不等於最好。** 一個焦慮的工程師其實天生對它有免疫力——你看過太多「穩定的爛狀態」：卡在重試風暴裡的叢集、誰都不肯先退的 leader election、技術債堆到沒人敢動的服務。這些都穩定（沒人能靠自己脫身），也都糟糕。把「納許均衡」翻譯成「系統卡住的穩態」，而不是「系統的最佳解」，你就抓住它了。\n\n## 紙上推演\n\n全程純紙筆。報酬矩陣手畫、最佳反應手圈、偏離測試逐格寫下「誰賺多少」。每題先自己做完再看解答。\n\n### 第 1 題（★★，**[15 分鐘]**）找出協調賽局的所有純策略納許均衡\n\n兩個服務要決定送訊息走哪條 queue，可選 Kafka 或 RabbitMQ。只要兩邊走同一條就能通訊（各得 2），走不同條就互不相通（各得 0）。但兩邊都偏好 Kafka——若都走 Kafka，各得 3 而非 2。報酬矩陣如下（(我方, 對方)）：\n\n```text\n                     對方：Kafka        對方：RabbitMQ\n    我方：Kafka       (3, 3)            (0, 0)\n    我方：RabbitMQ    (0, 0)            (2, 2)\n```\n\n請用最佳反應分析找出**所有**純策略納許均衡，並對每一個非均衡格指出「誰想偏離、偏到哪、報酬怎麼變」。\n\n### 第 2 題（★★，**[15 分鐘]**）證明「優勢策略均衡一定是納許均衡，反之不然」\n\n不靠記憶，用納許均衡的定義（每個玩家的策略是對其他玩家當前策略的最佳反應）論證：\n\n(a) 若每個玩家都有嚴格優勢策略，這組優勢策略構成的組合必然是納許均衡。\n(b) 舉一個有納許均衡、但沒有任何玩家有優勢策略的賽局，說明反向不成立。\n\n### 第 3 題（★，**[10 分鐘]**）口頭題：均衡為什麼不等於最好的結果\n\n向一個沒學過賽局理論的工程師同事，用囚徒困境的脊椎矩陣（這是 ch01 那張）口頭解釋：為什麼 (背叛,背叛)=(1,1) 明明對雙方都比 (合作,合作)=(3,3) 差，卻是「均衡」、而 (3,3) 不是。你的解釋裡必須出現「單方面」這個詞，並說清楚它為什麼是關鍵。\n\n---\n\n### 推演解答\n\n**第 1 題解答。**\n\n最佳反應分析（這張矩陣對稱，算一邊即可鏡像）：\n\n```text\n我方的最佳反應（固定對方的行，比較每格第一個數）：\n  對方選 Kafka     → 我方 Kafka 得 3、RabbitMQ 得 0 → 最佳反應 Kafka\n  對方選 RabbitMQ  → 我方 Kafka 得 0、RabbitMQ 得 2 → 最佳反應 RabbitMQ\n（對方對稱，同理）\n\n標記交集：\n                     對方：Kafka        對方：RabbitMQ\n    我方：Kafka      (3*, 3#)          (0, 0)\n    我方：RabbitMQ   (0, 0)            (2*, 2#)\n\n⇒ (Kafka, Kafka)=(3,3) 和 (RabbitMQ, RabbitMQ)=(2,2) 都是純策略納許均衡。\n```\n\n兩個都是均衡。對非均衡格做偏離測試：\n\n- **(Kafka, RabbitMQ)=(0,0)**：我方單方面改成 RabbitMQ → 0→2（變好），想偏離 → 不是均衡。\n- **(RabbitMQ, Kafka)=(0,0)**：對方單方面改成 RabbitMQ → 0→2（變好），想偏離 → 不是均衡。\n\n**關鍵觀察**：這個賽局有**兩個**純策略納許均衡，而且其中一個 (2,2) 對雙方都比另一個 (3,3) 差——但 (2,2) 照樣是穩定均衡！在 (RabbitMQ,RabbitMQ) 裡，任何一方單方面改走 Kafka 都會從 2 掉到 0（對方還在 RabbitMQ、不相容），所以誰也不敢先動。這是「協調失敗」的縮影：明明大家都偏好 Kafka，卻可能集體卡在較差的 RabbitMQ 均衡裡，因為沒人能單獨脫身。**怎麼讓大家收斂到比較好的那個均衡**，純報酬矩陣答不出來，要靠謝林點（見 ch10）。\n\n**常見錯路**：(1) 只圈到 (3,3) 就收工，漏掉 (2,2)——納許均衡不保證唯一，逐格都要查。(2) 以為「(2,2) 比 (3,3) 差所以不是均衡」——這正是「均衡＝最優」的陷阱；好壞與穩定無關。\n\n**第 2 題解答。**\n\n**(a)** 設玩家 i 有嚴格優勢策略 sᵢ*，意思是：**不管其他玩家選什麼**，sᵢ* 給 i 的報酬都嚴格高於 i 的其他任何策略。特別地，當其他玩家正在玩他們各自的優勢策略時，sᵢ* 仍然是 i 的最佳反應（因為它對「任何」對手組合都是最佳的，自然也對「這一個」組合最佳）。這對每個玩家都成立，所以「每個人的優勢策略」這個組合裡，**每個人的策略都是對其他人當前策略的最佳反應**——這恰好就是納許均衡的定義。故優勢策略均衡必為納許均衡。（囚徒困境的 (D,D) 即此例。）\n\n**(b)** 反向不成立。取第 1 題的 Kafka/RabbitMQ 協調賽局：沒有任何玩家有優勢策略（我的最佳反應隨對方而變——對方走 Kafka 我該走 Kafka，對方走 RabbitMQ 我該走 RabbitMQ），卻有兩個純策略納許均衡。所以「是納許均衡」推不出「有優勢策略」。\n\n**常見錯路**：把 (a) 寫成「優勢策略報酬最高所以是均衡」——「報酬最高」不是均衡的定義，「互為最佳反應」才是；要扣著定義走。另外注意 (a) 用的是**嚴格**優勢策略；弱優勢策略的版本有微妙差異（弱優勢均衡仍是納許均衡，但「嚴格高於」要放寬成「不低於」），這留待 ch03 細談。\n\n**第 3 題解答（口頭版範本）。**\n\n「你看這張表。(合作,合作) 兩個人各拿 3，比 (背叛,背叛) 各拿 1 好得多。那為什麼穩定的是雙輸的那個？\n\n關鍵在『單方面』這三個字。納許均衡問的不是『哪個結果對大家最好』，而是『站在某個結果上，**有沒有人能靠自己一個人改變選擇而賺到更多**』。\n\n從 (合作,合作) 出發：只要我**自己偷偷**改成背叛，對方還傻傻合作，我就從 3 跳到 5——我有動機背叛。所以 (合作,合作) 站不住，它不是均衡。\n\n從 (背叛,背叛) 出發：我**自己**改成合作？對方還在背叛，我就從 1 掉到 0，更慘。對方同理。誰自己動誰吃虧，所以沒人動。它穩定，它是均衡——儘管它對我們倆都糟。\n\n所以『均衡』不是『最好』，是『沒人能自己脫身』。我們倆**一起**改成合作明明雙贏，但那需要我們**同時**動、還得互相信任對方不趁機背刺——而均衡這個概念只管『一個人自己動』，管不到『兩個人一起動』。這就是為什麼合作在這裡這麼難。」\n\n**自我檢核**：你的解釋有沒有出現「單方面 / 自己一個人」？有沒有說清「一起動可以更好、但均衡不管協同偏離」？如果你只說了「因為背叛比較好」而沒點出「單方面」，你其實只重複了 ch01 的優勢策略，沒講到 ch02 的均衡。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 用一句話說出納許均衡的定義，且這句話裡必須包含「最佳反應」或「單方面」——為什麼這個詞是不可省的？\n2. 為什麼 (背叛,背叛) 是均衡而 (合作,合作) 不是？把「單方面偏離」的報酬變化具體說出來（從哪個數到哪個數）。\n3. 「納許均衡是穩定不是最優」——舉一個你維運過的系統壞穩態（重試風暴、卡死的 leader election、技術債），說明它為什麼是個納許均衡。\n4. 優勢策略均衡和納許均衡是什麼關係？為什麼「優勢策略均衡 ⇒ 納許均衡」成立、反過來不成立？\n5. 剪刀石頭布沒有純策略納許均衡——這跟「納許存在定理保證至少有一個均衡」矛盾嗎？定理靠什麼東西化解這個張力？\n6. 納許存在定理「不保證」哪四件事？（唯一性、純策略、對大家好、玩家找得到——你能各舉一例嗎？）\n7. 協調賽局有兩個納許均衡時，賽局理論能告訴你大家會收斂到哪一個嗎？為什麼不能？\n8. 把「穩定不等於最好」這句話，翻成你會對另一個工程師講的一句工程白話。\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Prisoner's Dilemma\"**（https://plato.stanford.edu/entries/prisoner-dilemma/）——讀「Nash equilibrium」與「Pareto」對照那幾段，把「穩定 ≠ 最優」講得比本章更哲學、也更嚴謹；囚徒困境來歷（Flood–Dresher、Tucker）也在這裡核實。\n- **NobelPrize.org, Economic Sciences 1994 press release**（https://www.nobelprize.org/prizes/economic-sciences/1994/press-release/）——Nash/Harsanyi/Selten 的官方頒獎詞，一手確認「非合作賽局均衡理論」的措辭與三人分工（Nash＝均衡、Selten＝子賽局完美、Harsanyi＝不完全資訊），別憑記憶轉述。\n- **MIT OCW 6.254 Game Theory, Lecture 5 \"Existence of a Nash equilibrium\"**（https://ocw.mit.edu/courses/6-254-game-theory-with-engineering-applications-spring-2010/）——若你想看本章略過的存在性證明：最佳反應對應、Kakutani 不動點如何套上去，一步步寫給工程背景的人，正是「直覺版」之外的那層嚴謹。\n- **John Nash, \"Non-Cooperative Games\", Annals of Mathematics 54 (1951): 286–295**——原始論文本身。納許均衡的定義其實只佔幾頁、出奇地短；讀它感受一下「一個改寫一門學科的定義可以多麼樸素」。\n- 單人理性那一面——「一個玩家在不確定下到底該怎麼算最佳選擇」——是姊妹書《在不確定中下注：決策與理性》的地盤（談期望效用、效用不是金額那部分）；本章的「最佳反應」預設了玩家會替自己最佳化，那個最佳化的內核在那本書裡。\n"}, {"id": "ch03-best-response", "file": "ch03-best-response.md", "group": "Part I — 困境與均衡", "title": "ch03 — 最佳反應：優勢、劣勢與逐步淘汰", "md": "# ch03 — 最佳反應：優勢、劣勢與逐步淘汰\n\n> **本章解決什麼問題**：ch01 用「優勢策略」一刀解開了囚徒困境，ch02 用「沒人能單方面改善」定義了納許均衡。但這兩個概念背後其實是同一個更基本的動作——**最佳反應（best response）**：給定對方在做什麼，我這一邊的最好回應是哪個。這一章把這個動作講透，並把它變成一套**找均衡的日常工具**：嚴格 vs 弱的優勢／劣勢、反覆消去劣勢策略（IESDS）。囚徒困境一步就解完是因為它太乾淨；真實賽局往往要剝好幾層。學完這章，你手上就有了 Part I 的完整工具箱，接著 Part II 才能處理「連優勢策略都不存在」的局面（零和、混合策略）。\n\n## 從你已知的出發\n\n你每天都在做最佳反應，只是沒這麼叫它。\n\n想想負載平衡器（load balancer）的選後端邏輯。給定「目前各後端的健康狀態與排隊長度」，你選那個對當下情況回應最好的後端——這就是一次最佳反應。再想剪枝（pruning）：你在優先順序排程器或 feature flag 的決策樹裡，常常會遇到一個選項「不管外在條件怎麼變，它都不會比另一個選項好」。這時你會怎麼做？你直接把它砍掉，連評估都懶得評估。砍掉的那一刻，你做的就是賽局理論的核心操作之一——**消去一個被嚴格支配（strictly dominated）的選項**。\n\n賽局理論把這兩個動作正式化了，而且加了一層你可能沒意識到的遞迴。砍掉一個劣勢選項之後，賽局縮小了；在縮小後的賽局裡，**原本不算劣勢的選項可能變成劣勢**——因為對手某些選項已經被你判定「他絕不會選」，於是你的某些選項失去了存在理由。你再砍一輪。這個「砍一輪、賽局縮小、再砍一輪」的迴圈，就是**反覆消去嚴格劣勢策略（iterated elimination of strictly dominated strategies, IESDS）**。它是遞迴剪枝，而剪枝是你的母語。\n\n但這裡藏著一個微妙的東西，後端工程師對它特別敏感：**我砍掉對手的某個選項，靠的是「我相信對手是理性的、所以他絕不會選那個」。而我下一輪的砍法，又靠「對手相信我相信他理性」。** 這是一條共同知識（common knowledge）的鏈，鏈一旦斷掉、推理就垮掉。這跟分散式系統裡「我以為你以為我已經 commit 了」的拜占庭式推理是同一種味道——本章最後會回到這條鏈，因為它正是 IESDS 最容易把人帶溝裡的地方。\n\n先把這套工具一塊一塊裝好。\n\n## 最佳反應：所有均衡概念的原子\n\n我們先把 ch02 用過、但沒拆開講的東西拆開。\n\n**最佳反應的定義（直覺版）**：在一個賽局裡，固定其他所有玩家的策略，你的**最佳反應**就是在這個前提下能讓你自己報酬最大的那個（些）策略。注意三件事：\n\n1. 最佳反應是**對著一個具體前提**算的——「如果對方出 C，我的最佳反應是 D」「如果對方出 D，我的最佳反應還是 D」。前提變了，最佳反應可能就變。\n2. 最佳反應**可能不只一個**。如果兩個策略給你一樣高的報酬，它們**都是**最佳反應。這個「並列」在後面（混合策略、ch05）會變成關鍵。\n3. 納許均衡就是用它定義的：**一個策略組合是納許均衡，若且唯若每個玩家的策略都是對其他人策略的最佳反應**（ch02）。均衡＝「大家互相是對方的最佳反應」的不動點。\n\n所以最佳反應是原子，優勢策略、納許均衡、IESDS 全都由它組裝出來。我們現在來組。\n\n回到 ch01 那張矩陣——全書的脊椎，囚徒困境的基準報酬，數字是獲益點數、越大越好：\n\n```text\nch01 那張矩陣（數字＝獲益點數，越大越好；格內＝(我方, 對方)）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)\n    T>R>P>S＝5>3>1>0\n```\n\n用最佳反應的語言逐欄掃一遍我方（列玩家）的決策：\n\n```text\n最佳反應分析（只看我方＝列玩家的報酬，逐欄問「我該選哪列」）：\n\n  若對方出 C（看左欄）：我出 C 得 3，我出 D 得 5。  5>3 → 最佳反應＝D\n  若對方出 D（看右欄）：我出 C 得 0，我出 D 得 1。  1>0 → 最佳反應＝D\n\n  → 不管對方出什麼，我的最佳反應永遠是 D。\n```\n\n這裡的「報酬最大」是把每個玩家當成一個單人最佳化者——「給定外在條件，這一邊怎麼選對自己最好」。那套單人理性的基準（一個人面對固定環境如何算最佳選擇、效用為什麼不等於金額）是《在不確定中下注》談單人理性那條線的地盤，本書承襲它的結論、不重推；本書真正接手的，是**從「對手也會算、而且會反應我的選擇」開始**的那一步。\n\n當一個策略**在對手的每一種選擇下都是（嚴格）最佳反應**，我們就說它是一個**嚴格優勢策略（strictly dominant strategy）**。背叛 D 對我方就是嚴格優勢策略；對稱地，對對方也是。雙方各自選自己的嚴格優勢策略，落在 (D,D)=(1,1)，而 (C,C)=(3,3) 對雙方都更好——這就是 ch01 講的困境，也是全書中央張力的第一次登場：**每個人都做最佳反應，結果集體更糟。** 這條張力本章還會再碰一次（見下面 IESDS 那段對共同知識的討論）。\n\n囚徒困境之所以「一步就解完」，正是因為它太乾淨：一個策略就壓死另一個，不需要遞迴。真實賽局沒這麼好命。\n\n## 優勢與劣勢：四種，差一個等號\n\n「優勢」這個詞，是從兩個方向講同一件事，加上「嚴格 / 弱」的區分，一共四種說法，初學最容易在這裡混。我們把它釘死。\n\n固定看**我方**的某個策略 A 和另一個策略 B：\n\n```text\n四種支配關係（比的是「我方策略 A 對上 B」，逐一對著對手的每個選擇比我方報酬）：\n\n  A 嚴格優勢於 B（A strictly dominates B）\n     ＝ 對手不論怎麼選，A 的報酬都「嚴格大於」B。   每一格都 >  。  → B 可放心砍\n  A 弱優勢於 B（A weakly dominates B）\n     ＝ A 的報酬「永遠不小於」B，且「至少有一種對手選擇下嚴格大於」。\n        每一格都 ≥，至少一格 > 。              → B 砍得有風險（見下）\n  B 被嚴格支配（strictly dominated）＝ 存在某個 A 嚴格優勢於 B。\n  B 被弱支配（weakly dominated）     ＝ 存在某個 A 弱優勢於 B。\n```\n\n「優勢策略」是更強的全域版：A 是**嚴格優勢策略**，指 A 嚴格優勢於我方**所有**其他策略（不只壓某一個 B，是壓全部）。囚徒困境的 D 就是這種。\n\n關鍵差別只在一個等號：嚴格要求**每一格都嚴格大於**（>），弱只要求**每一格不小於**（≥）、外加至少一格嚴格大於。聽起來只差臨界情況，但它在 IESDS 裡會引爆一個大問題，我們留到「直覺的陷阱」拆。\n\n**為什麼可以砍掉被嚴格支配的策略？** 因為一個理性玩家**永遠不會選一個被嚴格支配的策略**——不管他相信對手在做什麼，總有另一個策略嚴格更好。注意這句話的前提只有「他自己理性」，還沒用到任何關於對手的假設。這是嚴格支配最乾淨的地方：消去它，只需要「玩家不選自己明確更差的東西」，毫無爭議。弱支配就沒這麼乾淨——後面會看到，被弱支配的策略在某些對手選擇下其實**一樣好**，砍掉它等於賭「那種臨界情況不會發生」。\n\n## 反覆消去：剝洋蔥\n\n現在來組裝主菜。IESDS 的演算法只有一句話：\n\n> 找出任何一個被嚴格支配的策略（不論是我方還是對方的），把它劃掉；賽局縮小後，重複，直到沒有任何策略被嚴格支配為止。\n\n關鍵在那個「縮小後」。砍掉對手的一個策略，等於我從此假設「對手絕不會選它」；在這個新假設下，**我原本看似不錯的某個策略可能突然變成劣勢**，因為它存在的唯一理由就是用來對付那個剛被砍掉的對手選項。剝掉一層，露出下一層。\n\n我們用一個具體的 3×3 賽局走完整套流程。這是 worked example，每一步都不跳。\n\n設定：列玩家（我方）有三個策略 U / M / D，行玩家（對方）有三個策略 L / C / R。格內是 (我方報酬, 對方報酬)：\n\n```text\n3×3 起始賽局（格內＝(我方, 對方)）：\n\n               對方 L      對方 C      對方 R\n    我方 U     (8, 5)      (7, 2)      (6, 6)\n    我方 M     (5, 6)      (8, 4)      (3, 1)\n    我方 D     (3, 9)      (9, 6)      (2, 8)\n```\n\n**第 1 輪——先找對方（行玩家）的劣勢。** 行玩家只看每格的第二個數字（對方報酬）。把 C 欄和 R 欄逐列比：\n\n```text\n比對方策略 C vs R（逐列看「對方報酬」第二個數字）：\n\n  我方 U 這列：C 給對方 2，R 給對方 6。   6 > 2\n  我方 M 這列：C 給對方 4，R 給對方 1。   1 < 4   ← 注意！這列 C 反而比較好\n```\n\n等一下——在 M 這列，C 給對方 4、R 只給 1，C 反而好。所以 **R 並不嚴格支配 C**。我算錯了嗎？沒有。我故意讓你看到：支配關係必須**每一格都同方向**，只要有一格反向就不成立。重新找對的那一對：\n\n```text\n比對方策略 C vs R 的正確結論：兩者互有勝負，誰都不支配誰。\n換比 C vs L？  U列 C=2 vs L=5(2<5)、M列 C=4 vs L=6(4<6)、D列 C=6 vs L=9(6<9)\n   → 每一格 L 都 > C → L 嚴格優勢於 C → 對方的 C 被嚴格支配！\n```\n\n對方的 **C 欄被 L 嚴格支配**（對方在任何情況下都不會選 C，因為 L 在每一列都給他更高報酬）。劃掉 C 欄：\n\n```text\n第 1 輪後（對方 C 欄已消去）：\n\n               對方 L      對方 R\n    我方 U     (8, 5)      (6, 6)\n    我方 M     (5, 6)      (3, 1)\n    我方 D     (3, 9)      (2, 8)\n```\n\n**第 2 輪——賽局縮小了，重新找。** 現在只剩 L、R 兩欄。看我方（列玩家）的報酬第一個數字，把 U / M / D 三列互比：\n\n```text\n比我方策略（只看左邊第一個數字，跨剩下的 L、R 兩欄）：\n\n  U vs M：  L 欄 8 vs 5 (8>5)、R 欄 6 vs 3 (6>3)  → 每格 U 都 > M → U 嚴格優勢於 M\n  U vs D：  L 欄 8 vs 3 (8>3)、R 欄 6 vs 2 (6>2)  → 每格 U 都 > D → U 嚴格優勢於 D\n```\n\n我方的 **M 和 D 兩列都被 U 嚴格支配**（消去 C 欄之前還不成立——你可以回去檢查：原本 C 欄裡 D 給我方 9、比 U 的 7 高，所以那時 U 並不支配 D。是「砍掉 C」這個動作讓 D 失去了存在理由）。這正是反覆消去的精髓：**第一輪砍對方的選項，第二輪我方才露出新的劣勢。** 劃掉 M、D 兩列：\n\n```text\n第 2 輪後（我方只剩 U）：\n\n               對方 L      對方 R\n    我方 U     (8, 5)      (6, 6)\n```\n\n**第 3 輪——只剩 U 這一列，對方再做一次最佳反應。** 對方在 U 列裡看自己的報酬：L 給他 5，R 給他 6。6>5，所以對方的 **L 被 R 嚴格支配**（在僅剩的這列裡）。劃掉 L 欄：\n\n```text\n第 3 輪後（收斂）：\n\n               對方 R\n    我方 U     (6, 6)\n```\n\n剩一格：**(U, R) = (6, 6)**。沒有任何策略還能被消去，演算法停止。\n\n**自我複核（兩個視角交叉驗算）。** IESDS 有個鐵律：它**永遠不會消去任何納許均衡**（被嚴格支配的策略絕不可能是均衡的一部分，因為均衡要求每個人都在做最佳反應，而劣勢策略從不是最佳反應）。所以如果 (U,R) 是唯一存活的格，它**必須**就是這個賽局的納許均衡。我們獨立驗一次：在 (U,R)，我方換成 M 得 3、換成 D 得 2，都不如 6——我方在做最佳反應；對方換成 L 得 5、換成 C 得 2，都不如 6——對方也在做最佳反應。雙方互為最佳反應 → (U,R) 確實是納許均衡。兩條路（IESDS 收斂、最佳反應檢查）指向同一格，算對了。\n\n當 IESDS 收斂到唯一一格，這個賽局叫**可由優勢求解（dominance-solvable）**。囚徒困境是它的極簡特例——一輪就完。\n\n## 順序無所謂（對嚴格劣勢而言）\n\n剛剛我先砍對方的 C，再砍我方的 M、D，最後砍對方的 L。換個順序行不行？比如先看我方有沒有劣勢、再看對方？\n\n對**嚴格**支配，答案是漂亮的一句話：**順序無所謂，最終存活的策略集合唯一。** 不論你以什麼次序消去、一次砍一個還是一次砍一批，收斂到的結果完全相同。\n\n**為什麼？（直覺版，嚴格證明本書不展開）** 直覺是：一個策略被嚴格支配這個性質很「穩」——如果 B 現在被某個 A 嚴格支配，那麼就算你先去砍別的策略、把賽局縮小，B **依然**被 A 嚴格支配（A 沒被砍掉的話），或者 A 被砍掉但 A 自己又被更好的 A′ 嚴格支配、於是 B 也被 A′ 嚴格支配。嚴格不等式不會因為「拿掉一些對手選項」而翻轉，所以「該死的策略遲早會死、誰先死無所謂」。形式化是把它變成一個抽象消去系統，用 Newman 引理證明這種「合流性（confluence）」——這是 Gilboa–Kalai–Zemel（1990）與後續工作（如 Apt）的結果，嚴格證明指向延伸閱讀。\n\n這條「順序無所謂」是嚴格支配的招牌福利，工程上很受用：你不用煩惱剪枝次序、結果保證一致。但請把這句話的「嚴格」兩字記牢——**換成弱支配，它就垮了**，這是下一段「直覺的陷阱」的主角。\n\n## 可理性化：把鏈推到底\n\nIESDS 還有個更深的孿生概念，值得一句帶過，因為它把「最佳反應」推到極致。\n\n**可理性化（rationalizable）策略**：一個策略是可理性化的，如果它是「對某個合理信念的最佳反應」，而那個信念又只放在「對手的可理性化策略」上，如此遞迴下去。換句話說：留下所有「在某種對對手的合理猜測下，會成為你最佳反應」的策略，反覆剔除那些**永遠當不成最佳反應**的策略，直到穩定。\n\n這概念由 Bernheim（1984）與 Pearce（1984）各自獨立提出，建立在「最佳反應算子」的不動點上。它和 IESDS 的關係很緊（在兩人賽局、不考慮相關信念時，兩者剔除掉的東西一致）。對本書，你只要記住一句直覺：**可理性化＝「在『大家都理性、且這件事是共同知識』的前提下，到底還有哪些策略站得住腳」。** 它把 IESDS 背後那條共同知識鏈攤開來當定義——而那條鏈，正是下一段要拆的陷阱。嚴格展開指向延伸閱讀。\n\n## 直覺的陷阱\n\n最佳反應與消去這套工具看起來很機械、很安全，但它有兩個著名的坑，工程師尤其容易踩第一個（因為你習慣「能剪就剪」），又容易低估第二個（因為你習慣相信協定的對手是理性的）。\n\n| 陷阱 | 錯誤直覺長怎樣 | 哪一步把你帶溝裡 | 怎麼自我察覺 |\n|---|---|---|---|\n| **弱支配也能隨便反覆消去** | 「嚴格能反覆消去且順序無所謂，弱支配差一個等號、應該也差不多吧」 | 你把「≥」當「>」用，反覆消去弱劣勢策略，得到一個你以為唯一的答案 | 你算出一個「乾淨」的解，但換個消去順序卻得到**不同**的存活集合——如果你沒換順序驗算，根本不會發現 |\n| **以為消去不需要假設對手** | 「砍劣勢策略是純機械操作，跟對手是不是理性無關」 | 第一輪砍**自己**的嚴格劣勢只需要「我理性」；但第二輪起，你砍的依據是「對手絕不選他的劣勢策略」——這偷偷假設了「對手理性、且我知道、且他知道我知道……」 | 問自己：我這一步的消去，依賴對手有多聰明？如果對手會做蠢事，我的剪枝就崩了 |\n\n**第一個坑，弱支配的順序敏感性，值得你停五分鐘。** 看這個 2×2（列玩家 T / B，行玩家 L / R）：\n\n```text\n弱支配的陷阱賽局（格內＝(我方, 對方)）：\n\n            對方 L      對方 R\n    我方 T   (1, 1)      (0, 0)\n    我方 B   (1, 1)      (2, 1)\n```\n\n先檢查嚴格支配：我方 T vs B，L 欄 1=1（平手、不是嚴格大於），所以**沒有任何嚴格支配**，嚴格 IESDS 一步都動不了。但**弱**支配到處都是，而且消去順序會給出不同答案：\n\n```text\n路徑 A：先消我方的 T。\n  T vs B：L 欄 1=1（≥）、R 欄 0<2（嚴格 <）→ B 弱優勢於 T → 消去 T。\n  剩 B 列：對方 L 得 1、R 得 1（平手）→ 兩格都是均衡。\n  存活：(B,L)=(1,1) 與 (B,R)=(2,1)。  ← 保住了報酬 2 的那格\n\n路徑 B：先消對方的 R。\n  對方 L vs R：T 列對方 1 vs 0(1>0)、B 列對方 1=1(≥) → L 弱優勢於 R → 消去 R。\n  剩 L 欄：我方 T 得 1、B 得 1（平手）→ 兩格都是均衡。\n  存活：(T,L)=(1,1) 與 (B,L)=(1,1)。  ← 報酬 2 的那格被砍掉了\n```\n\n同一個賽局，先砍 T 還是先砍 R，**存活的結果不一樣**：路徑 A 留住了讓我方拿到 2 的 (B,R)，路徑 B 把它消掉了。這不是算錯，這是弱支配的本質——被弱支配的策略在某些對手選擇下**其實一樣好**（那個等號），砍掉它等於賭那種臨界情況不發生，而不同的賭注順序會留下不同的世界。**嚴格支配沒有這個病，因為它沒有等號可賭。** 這就是為什麼本書（和大多數教材）把反覆消去的乾淨結果**只**留給嚴格支配，弱支配的反覆消去要極其小心、結果與順序綁定。深入指向延伸閱讀。\n\n**第二個坑連回中央張力。** IESDS 第二輪起依賴的那條共同知識鏈——「我理性、我知道你理性、你知道我知道你理性……」——是個**理想化假設**。現實裡這條鏈是有限長的，而且很脆。你用三層遞迴消去推出「對手一定會選 X」，但如果對手只想了兩層、或者根本在做蠢事，你的精緻剪枝就把你帶進溝裡。這跟囚徒困境的中央張力是同源的另一張臉：在困境裡，「每個人都理性」導致集體更糟；在這裡，「每個人都理性、且這是共同知識」是一個**強到現實常常不滿足**的前提，而我們的求解工具偷偷靠它吃飯。理性不是免費的，共同理性更貴。寫程式時你不會假設遠端服務永遠正確回應——同理，做策略推理時別假設對手永遠把遞迴推到和你一樣深。\n\n## 紙上推演\n\n純紙筆，不要打開任何 REPL。報酬矩陣手畫、逐格比、自己交叉驗算。\n\n### 第 1 題（★★，20 分鐘）：對一個 3×3 做完整 IESDS\n\n列玩家（我方）a / b / c，行玩家（對方）X / Y / Z，格內 (我方, 對方)：\n\n```text\n                對方 X      對方 Y      對方 Z\n    我方 a      (8, 5)      (7, 2)      (6, 3)\n    我方 b      (5, 6)      (4, 1)      (9, 4)\n    我方 c      (6, 0)      (2, 1)      (3, 8)\n```\n\n反覆消去嚴格劣勢策略，找出存活的格。每一輪寫清楚：你消的是誰、被誰嚴格支配、逐格不等式。最後驗證存活格是不是納許均衡。\n\n### 第 2 題（★★，15 分鐘）：一個等號，天差地別\n\n自己造一個 2×2 賽局，要求：\n\n(a) 在**嚴格**支配下，IESDS 一步都動不了（沒有任何策略被嚴格支配）；\n(b) 在**弱**支配下，先消某一個策略 vs 先消另一個策略，會得到**不同**的存活集合。\n\n造完後用一句話解釋：為什麼「差一個等號」會讓結論從「順序無所謂」變成「順序決定一切」。\n\n### 第 3 題（★★，口頭，15 分鐘）：那條鏈有多長\n\n向一個沒學過賽局理論的同事解釋：在 IESDS 裡，**第一輪消去**和**第二輪消去**所依賴的假設有什麼本質不同？為什麼「反覆消去」這個動作偷偷假設了「對手理性、而且我知道他理性、而且他知道我知道……」這條共同知識鏈？並舉一個工程情境，說明當對手（另一個服務／另一個團隊）**不**滿足這條鏈時，你的「精緻剪枝」會怎麼出錯。\n\n### 推演解答\n\n**第 1 題解答。**\n\n第 1 輪（找對方的嚴格劣勢，只看每格第二個數字）：\n\n```text\n對方 Y vs X：a列 2 vs 5、b列 1 vs 6、c列 1 vs 0 → c列 1>0，Y 在這列反而好，X 不支配 Y。\n對方 Y vs Z：a列 2 vs 3、b列 1 vs 4、c列 1 vs 8 → 每格 Z 都 > Y → Y 被 Z 嚴格支配？\n   等等，再核一次：2<3、1<4、1<8，三格都是 Y < Z → 對！Y 被 Z 嚴格支配。\n   但先別急——同時檢查還有沒有更早該砍的。檢查我方列：\n我方 c vs a：X 6 vs 8、Y 2 vs 7、Z 3 vs 6 → 每格 a 都 > c → c 被 a 嚴格支配。\n```\n\n這裡你會發現**有多個策略同時可砍**（對方 Y、我方 c 都被嚴格支配）。因為嚴格支配順序無所謂，先砍哪個都行、結果一樣。照「列／行交錯」的乾淨順序走，先砍我方 c：\n\n```text\n消去我方 c 後：\n                對方 X      對方 Y      對方 Z\n    我方 a      (8, 5)      (7, 2)      (6, 3)\n    我方 b      (5, 6)      (4, 1)      (9, 4)\n```\n\n第 2 輪（剩 a、b 兩列，找對方劣勢）：\n\n```text\n對方 Z vs X：a列 3 vs 5、b列 4 vs 6 → 兩格 X 都 > Z → Z 被 X 嚴格支配 → 消去 Z。\n（也可檢查 Y vs X：a列 2<5、b列 1<6 → Y 也被 X 支配；多個可砍、結果不變。先砍 Z。）\n\n消去 Z 後：\n                對方 X      對方 Y\n    我方 a      (8, 5)      (7, 2)\n    我方 b      (5, 6)      (4, 1)\n```\n\n第 3 輪（剩 X、Y 兩欄，找我方劣勢）：\n\n```text\n我方 b vs a：X 5 vs 8、Y 4 vs 7 → 每格 a 都 > b → b 被 a 嚴格支配 → 消去 b。\n\n剩：\n                對方 X      對方 Y\n    我方 a      (8, 5)      (7, 2)\n```\n\n第 4 輪（只剩 a 列，對方做最佳反應）：\n\n```text\n對方在 a 列：X 給他 5、Y 給他 2 → 5>2 → Y 被 X 嚴格支配 → 消去 Y。\n\n收斂：(a, X) = (8, 5)。\n```\n\n驗證是不是納許均衡：在 (a,X)，我方換 b 得 5、換 c 得 6，都 <8，我方在做最佳反應；對方換 Y 得 2、換 Z 得 3，都 <5，對方在做最佳反應。互為最佳反應 → (a,X)=(8,5) 是唯一純策略納許均衡。IESDS 收斂到它、且 IESDS 不消去均衡，兩邊吻合，算對了。\n\n**常見錯路**：(1) 把支配關係只比「一格」就下結論——支配要求**每一格同方向**，漏一格反向就不成立（第 1 輪那個 Y vs X 的陷阱就是測這個）。(2) 比錯玩家的數字——找對方劣勢時只看第二個數字、找我方劣勢時只看第一個數字，別混。(3) 沒在縮小後的賽局重找——b 在原始 3×3 裡並沒被 a 嚴格支配（去查 Z 欄：b 給我方 9>a 的 6），是消掉 Z 之後 b 才變劣勢；忘了「縮小後重找」就會卡住。\n\n**第 2 題解答。** 一個可用的造法（與正文陷阱同構，你也可以自造別的）：\n\n```text\n            對方 L      對方 R\n    我方 T   (1, 1)      (0, 0)\n    我方 B   (1, 1)      (2, 1)\n```\n\n(a) 嚴格支配檢查：我方 T vs B 在 L 欄 1=1（不嚴格），對方 L vs R 在 B 列 1=1（不嚴格）→ 沒有任何嚴格支配，嚴格 IESDS 動不了。✓\n\n(b) 弱支配下：先消我方 T（B 弱優勢於 T：L 欄 1≥1、R 欄 2>0）→ 存活 {(B,L)=(1,1), (B,R)=(2,1)}；改成先消對方 R（L 弱優勢於 R：T 列 1>0、B 列 1≥1）→ 存活 {(T,L)=(1,1), (B,L)=(1,1)}。兩條路存活集合不同：前者保住了 (B,R)、後者保住了 (T,L)。✓\n\n一句解釋：嚴格支配的「>」保證被砍的策略**真的更差**、砍它無爭議、誰先砍都遲早砍；弱支配的「≥」裡藏著「某些情況下其實一樣好」的等號，砍掉它是賭那種臨界情況不發生，而不同順序賭掉的是不同的格，於是結果與順序綁死。\n\n**常見錯路**：以為「只要造得出弱支配就會順序敏感」——不一定，得刻意讓兩個方向的弱支配「咬」到不同的格才會分岔；上面這個賽局之所以分岔，是因為 (B,R) 的報酬 2 只在「先留 B 再留 R」時才活得下來。\n\n**第 3 題解答（口頭，要點）。** 第一輪消去我方自己的嚴格劣勢策略，**只需要「我自己理性」**——不管對手是天才還是亂數產生器，我都不該選一個對我永遠更差的東西。但第二輪起，當我消去的依據變成「對手絕不會選他的劣勢策略、所以我那個專門對付它的策略沒用了」，我就**用上了「對手也理性」**；到第三輪，我消去的依據是「對手知道我不會選某策略、所以他那個策略也沒用了」，這用上了「對手知道我理性」；再一輪用上「我知道對手知道我理性」……每多剝一層，就多依賴共同知識鏈的一層。工程情境：你設計一個退讓協定，假設「對手服務偵測到衝突會退讓、因為退讓對它最佳」，於是你的服務選擇不退讓（你做了第二層消去）。但如果對方服務是個 bug 滿天飛的舊版本、或被錯誤設定成「永不退讓」，你那條「它一定會退讓」的推理就斷了，兩邊都不退、活鎖（livelock）。鏈越長越脆——這就是為什麼穩健的協定設計不靠「假設對手把遞迴推到和我一樣深」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 用一句話說清「最佳反應」「嚴格優勢策略」「納許均衡」三者的關係——為什麼說最佳反應是另外兩個的原子？\n2. 為什麼消去「我方自己的嚴格劣勢策略」只需要「我理性」，而消去「對手的劣勢策略」就開始需要假設對手理性？這個分界在第幾輪出現？\n3. 嚴格支配的反覆消去「順序無所謂」，弱支配的卻「順序決定一切」——差別的根源是哪個符號？用一句白話講出那個符號藏了什麼。\n4. 囚徒困境為什麼「一步就解完」，而本章的 3×3 要剝四層？兩者在 IESDS 的意義下有什麼不同？\n5. IESDS 收斂到唯一一格時，為什麼那格**保證**是納許均衡？（提示：劣勢策略和最佳反應的關係。）\n6. 「可理性化」想用最佳反應這把尺量出什麼？它和 IESDS 為什麼是孿生的？\n7. 如果你的對手其實不那麼理性（只想一層、或會犯錯），你做的「三層反覆消去」會怎麼出錯？這跟囚徒困境的中央張力是同一回事的哪一面？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Prisoner's Dilemma\"**（https://plato.stanford.edu/entries/prisoner-dilemma/）：權威且免費。讀其中關於「優勢策略」與「為什麼背叛在單回合下不可逃脫」的段落，把本章的最佳反應分析放回囚徒困境的脈絡。\n- **Stanford Encyclopedia of Philosophy, \"Game Theory\"**：找「dominance」「iterated elimination」與「rationalizability」三段——對「為什麼反覆消去依賴共同知識」有比本章更深的哲學討論，正好接本章「直覺的陷阱」第二坑。\n- **Bernheim (1984) / Pearce (1984) 的可理性化原始論文**：若你想看「最佳反應算子的不動點」如何被正式定義成可理性化，這兩篇是源頭（內容偏技術，當作概念地標，知道它從哪來即可）。\n- **Gilboa, Kalai & Zemel（1990）「On the order of eliminating dominated strategies」**：本章「嚴格順序無所謂、弱順序敏感」那條結論的代表性來源之一；想看嚴格證明（合流性 / Newman 引理）往這裡與 Apt 的後續工作找。\n- **下一站 ch04（零和與極小極大）**：本章假設了「總有最佳反應、總能消到剩東西」；ch04 要面對連嚴格優勢策略都不存在的局面（剪刀石頭布——任何固定出法都被克制），那時消去工具會卡住，逼出 Part II 的混合策略。\n"}, {"id": "ch04-zero-sum-minimax", "file": "ch04-zero-sum-minimax.md", "group": "Part II — 純策略不夠用", "title": "ch04 — 零和與極小極大：當你的贏就是我的輸", "md": "# ch04 — 零和與極小極大：當你的贏就是我的輸\n\n> **本章解決什麼問題**：前三章你建好了報酬矩陣、納許均衡、最佳反應這套工具，全程用的是脊椎那張囚徒困境。現在進 Part II，要先處理一個特例——**零和賽局**：一方的贏剛好是另一方的輸，純對抗、沒有共同利益。零和賽局有賽局理論最乾淨、最早被證明的結果（極小極大定理，von Neumann 1928），值得單獨認識一次。但本章真正的任務是順手拆掉一個大眾最深的誤解：**「賽局理論＝零和算計」是錯的**——你脊椎那張囚徒困境根本不是零和，現實裡最有趣的賽局全都不是。零和只是特例，它乾淨，但它窄。下一章（ch05）接著講零和裡那個「值」到底怎麼靠混合策略達成。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化   ◄ 你在這裡\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n## 從你已知的出發\n\n你的系統裡有兩種互動，你大概沒特別區分過，但它們的本質天差地別。\n\n**第一種：純對抗。** 你寫過 rate limiter 去擋一個惡意爬蟲。爬蟲想多抓幾頁、你想少給幾頁，**它每多抓到一頁，就是你多漏出去的一頁**——你們之間沒有任何「雙贏」的可能性，它的收穫精確等於你的損失。安全攻防也是這個味道：滲透方找到一個沒堵的洞、就是防禦方漏掉的一個洞；WAF 規則攔下一個 payload、攻擊方就少一條路。在這種互動裡，你會本能地用一種思路：**「假設對手會挑我最痛的那一招來打，那我該怎麼站位，才能讓『最痛』沒那麼痛？」** 你不去賭對手會手下留情，你直接假設它往你最弱的地方捅，然後選一個讓「最弱處」最不弱的防線。\n\n這個本能，就是**極小極大（minimax）**。你已經在用了，只是沒人告訴你它有名字、而且有一個 1928 年就被證明的乾淨定理撐著它。\n\n**第二種：表面像對抗、其實不是。** 你跟另一個團隊吵共用資料庫連線池的配額——感覺像零和（它多拿幾條、你就少幾條）。但只要你退一步：**如果你們一起把慢查詢修掉、一起上連線複用，池子的有效容量會變大，兩邊都能多拿。** 這就不是零和了——存在一個「雙方都更好」的方向。容量規劃、SLA 協商、跨團隊的優先順序排程，幾乎全都是這一種。你以為在搶一塊固定的餅，其實餅的大小是你們共同行為的函數。\n\n**本章的一刀，就劈在這兩種互動的分界線上。** 純對抗（零和）有極小極大這個漂亮答案，安全到可以閉著眼睛用。但如果你把「假設對手要把我往死裡整」這套零和思維，無腦套到第二種互動上，你會親手把一個本來能雙贏的局，玩成雙輸——因為你根本沒去找那個「雙方都更好」的方向，你的整個世界觀裡沒有它。\n\n而你脊椎那張囚徒困境（ch01 那張 5/3/1/0），恰恰是第二種。這是本章最重要的對照：**它長得像對抗（背叛我就贏你），但它不是零和**。搞清楚這個區別，你才不會把賽局理論誤讀成一本教你怎麼算計別人的犬儒手冊。\n\n## 零和是什麼：報酬加起來是個常數\n\n先把定義講精確。一個賽局是**零和（zero-sum）**的，意思是：**在每一格結局裡，所有玩家的報酬加起來都等於零**（或更一般地，加起來等於同一個常數，那叫常數和，本質一樣，平移一下就變零和）。\n\n零和的精髓不是「加起來等於零」這個算術，而是它的**後果**：既然總和固定，那麼**我的報酬上升，你的報酬必然等量下降**。沒有任何一格是「兩人一起變好」或「兩人一起變糟」。蛋糕大小是死的，你們只是在分它。我多一塊，你就少一塊。這就是「你的贏就是我的輸」的精確意思。\n\n來看最乾淨的例子，**配對銅板（matching pennies）**。兩人同時亮出硬幣的正或反。規則：**配對者（兩枚相同）贏一塊、另一人輸一塊**。\n\n```text\n配對銅板（報酬寫 (我方, 對方)，我方當配對者）：\n\n                  對方：正(H)        對方：反(T)\n    我方：正(H)     (+1, −1)         (−1, +1)\n    我方：反(T)     (−1, +1)         (+1, −1)\n\n    檢查零和：每一格兩個數字加起來 = 0 ✓\n    （+1−1=0，−1+1=0，−1+1=0，+1−1=0）\n```\n\n每一格都是 (+1, −1) 或 (−1, +1)，加起來永遠是 0。我贏一塊正好是你輸一塊，純對抗、零共同利益。剪刀石頭布也是同一個家族（贏家 +1、輸家 −1、平手 0，三格三格加起來都是 0）。這兩個賽局有一個共同特徵：**找不到純策略納許均衡**——不管你打算固定出什麼，對手只要知道了就能克制你（你固定出正，對手出正贏你；你固定出反，對手出反贏你）。怎麼辦？你得**隨機化**，讓對手猜不到。但「隨機化的機率怎麼算」是 ch05 的事，本章先停在「為什麼純策略不夠用、純對抗該用什麼思路站位」這一層。\n\n> **誠實標示嚴謹度**：本章對「零和」「常數和」的處理是**工程師的嚴謹**——每一步你都能口頭說出理由（加總固定 ⇒ 此消彼長）。對極小極大定理本身（下面那節），本書只給**直覺版**：不動點論證的證明指向延伸閱讀，這裡只說它保證了什麼、條件是什麼。\n\n## 極小極大：假設對手要把你往死裡整\n\n純對抗裡，你該怎麼選？\n\n直覺上你想「賭對手會犯錯」，但對一個理性對手，這個賭注沒有依據。極小極大思維反過來：**別賭對手仁慈，假設對手會精準地把你壓到最慘，然後你去選那個「最慘也最不慘」的策略。**\n\n把它拆成兩個動作，順序很重要：\n\n1. **對你的每一個策略，先想「如果我選它，對手會怎麼整我？」** ——對手會挑能把你壓到最低的那一格。所以每個策略，先標出它的**最壞情況報酬**（這一列的最小值）。這個數字叫這個策略的**安全水準（security level）**：選了它，不管對手多壞，你至少拿得到這麼多。\n2. **在所有策略的「最壞情況」裡，挑那個最壞情況最好的。** ——也就是 max（各策略的 min）。這叫 **max-min**：在「每行先取最小」之後「再取最大」。對應的策略叫你的**安全策略（safe strategy）**或極小極大策略。\n\n對手對你也做同一件事（站在他的角度，他要 max 自己的 min，等價於把你壓到 min 的 max，即 **min-max**）。\n\n這裡就是 von Neumann 1928 那記重拳。**極小極大定理（minimax theorem）**說：\n\n> 在**兩人零和**賽局裡，允許混合策略（隨機化）時，**max-min = min-max**。這個共同的數字叫做**賽局的值（value of the game）v**。\n\n用白話講：**你能保證自己至少拿到 v，而對手能保證把你壓到至多 v——兩個數字剛好相等。** 於是這個賽局有一個唯一的、雙方都認帳的「值」。你不需要猜對手心理、不需要任何運氣，照著安全策略走，你的期望報酬就是 v，一分不多一分不少。對抗到了極致，反而誕生出一個確定的數字。我認為這是賽局理論最早、也最漂亮的「乾淨」——**純粹的衝突，竟然有一個客觀的解。**\n\n幾個必須守住的精確邊界（這些正是下面「直覺的陷阱」的伏筆）：\n\n- **定理只對「兩人零和」成立。**（這是 von Neumann 1928 證明時就劃定的數學硬邊界，不是哪一年的學界風向。）三人以上的零和、或任何非零和賽局，**一般沒有單一的「值」**——你得退回去用更一般、但更弱的納許均衡（ch02）。連三人零和都不保證有單一值。\n- **「混合策略下」這四個字不能省。** 配對銅板沒有純策略均衡，max-min=min-max=0 這個值只有在允許隨機化（各 1/2）時才成立。怎麼算到 1/2，ch05 講。\n- **在零和賽局裡，安全策略恰好就是納許均衡。** 這是零和的特殊恩典：max-min 策略對、min-max 策略對、納許均衡、鞍點（saddle point），在兩人零和裡是同一回事，而且賽局的值唯一。離開零和，這幾個概念就分家了——安全策略（防最壞）和最佳反應（賭對手怎麼走）會給出不同答案。\n\n## Worked example：一個有鞍點的零和賽局，手算它的值\n\n配對銅板沒有純策略解（要等 ch05 隨機化）。為了把**極小極大的思路本身**走一遍、又不偷跑到混合策略，我挑一個**有純策略鞍點**的零和賽局——這種賽局不用隨機化，光用極小極大的「先取最壞、再取最好」就能直接讀出值。\n\n情境：你是防禦方（列玩家），對手是攻擊方（行玩家）。報酬是**對手能造成的損害的負值**（對你越好＝數字越大；這是零和，所以對手拿到的是你的相反數）。你有兩種佈防 D1/D2，對手有三種攻法 A1/A2/A3。矩陣只寫**你（列玩家）的報酬**，對手的報酬是它的負值（零和，省略不寫）：\n\n```text\n零和賽局（只寫列玩家報酬；對手報酬 = 負值）：\n\n                A1      A2      A3     │ 列最小（這列的最壞情況）\n    D1          +4      +2      +6     │   +2   ← 選 D1 至少拿 +2\n    D2          +5      +3      +1     │   +1   ← 選 D2 至少拿 +1\n    ─────────────────────────────────┼──────\n    行最大       +5      +3      +6     │\n   （對手用這  ↑這欄對手能逼到的「我方最大」，對手要選最小那個）\n    招逼出的\n    我方上限）\n```\n\n**列玩家（你）走 max-min：**\n\n- 選 D1：最壞情況是 min(+4, +2, +6) = **+2**（對手會挑 A2 整你）。\n- 選 D2：最壞情況是 min(+5, +3, +1) = **+1**（對手會挑 A3 整你）。\n- 在 {+2, +1} 裡挑最大：**max = +2**，所以你的安全策略是 **D1**，安全水準 +2。\n\n**行玩家（對手）走 min-max：** 對手要把「你能拿到的」壓到最低，所以對手先看每一欄你能逼出的最大值，再選最小的那欄。\n\n- A1：列最大 max(+4, +5) = +5（你會選 D2）。\n- A2：列最大 max(+2, +3) = +3（你會選 D2）。\n- A3：列最大 max(+6, +1) = +6（你會選 D1）。\n- 在 {+5, +3, +6} 裡挑最小：**min = +3**，對手的安全策略是 **A2**。\n\n等一下——你算出 max-min = +2，對手算出 min-max = +3，**兩個數字不相等**？定理不是說它們應該相等嗎？\n\n這正是要慢下來十分鐘的地方，因為你的直覺正要把你帶溝裡。先看：永遠有 **max-min ≤ min-max**（你能保證的下限，不會超過對手能壓你的上限——你保證 +2、對手能把你壓到至多 +3，中間 +2 到 +3 這段是「資訊優勢」的灰色地帶）。當這兩個數**剛好相等**時，那一格就叫**鞍點（saddle point）**，賽局有一個乾淨的純策略值。當它們**不等**（像這裡 +2 < +3），代表**純策略不夠用**——誰先暴露策略誰吃虧，雙方都得隨機化，真正的值 v 會落在 +2 與 +3 之間，靠混合策略達成。極小極大定理保證的「max-min = min-max = v」**是在允許混合策略之後**才成立的；純策略只是它的特例。\n\n把矩陣改一個數字，就能造出鞍點。把 A3 的 D1 報酬從 +6 改成 +2：\n\n```text\n有鞍點的版本（D1 的 A3 報酬 +6 → +2）：\n\n                A1      A2      A3     │ 列最小\n    D1          +4      +2      +2     │   +2   ← max-min 在這裡\n    D2          +5      +3      +1     │   +1\n    ─────────────────────────────────┼──────\n    行最大       +5      +3      +2     │\n                                ↑min-max 在這裡 = +2\n```\n\n- max-min：D1 給 min(+4,+2,+2)=+2、D2 給 min(+5,+3,+1)=+1，取 max = **+2**。\n- min-max：A1→+5、A2→+3、A3→max(+2,+1)=+2，取 min = **+2**。\n- **max-min = min-max = +2** ✓ 鞍點在 (D1, A3)，格值 +2。\n\n**自我複核**：在 (D1, A3) 這一格，值是 +2。檢查它是不是鞍點——它要同時是**它那列的最小**（這樣對手沒辦法把你壓得更低：D1 列是 +4,+2,+2，+2 是最小 ✓）**且它那行的最大**（這樣你沒辦法靠換策略拿更多：A3 行是 +2,+1，+2 是最大 ✓）。兩個條件都滿足，所以誰都不想單方面偏離——這就是納許均衡的定義，在零和裡和鞍點重合了。賽局的值 v = +2：你照 D1 走，保證至少 +2；對手照 A3 走，保證把你壓到至多 +2；兩邊一拍即合。**個體理性（各自防最壞）在這裡剛好導出穩定均衡，沒有裂縫**——因為零和裡根本沒有「集體」可言（一方的好就是另一方的壞，不存在「對雙方都更好」的方向可以被個體理性犧牲掉）。記住這句話，下一節要用它來對照囚徒困境。\n\n## 為什麼囚徒困境不是零和：脊椎的新一層\n\n現在把脊椎請回來。**這是 ch01 那張囚徒困境**（5/3/1/0，點數越大越好）：\n\n```text\nch01 的脊椎囚徒困境（報酬寫 (我方, 對方)）：\n\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)\n\n    T>R>P>S = 5>3>1>0\n```\n\n它看起來很像對抗：我背叛你合作，我拿 5、你拿 0，我贏你輸。第一直覺會說「這不就是零和嗎，我占你便宜」。\n\n**做那個零和檢查——把每一格兩個數字加起來：**\n\n```text\n逐格加總（檢驗是否零和）：\n\n                     對方：C            對方：D\n    我方：C           3+3 = 6           0+5 = 5\n    我方：D           5+0 = 5           1+1 = 2\n\n    四格總和：6, 5, 5, 2 —— 不是常數！差距高達 6−2 = 4\n```\n\n四格加起來分別是 **6、5、5、2**，差很多。**不是零和，連常數和都不是。** 這一個算術，推翻了「我背叛＝純占你便宜」的整個世界觀。看那兩個極端格：\n\n- **(合作, 合作) = (3,3)，總和 6**：這是「蛋糕最大」的一格。兩人一起好。\n- **(背叛, 背叛) = (1,1)，總和 2**：這是「蛋糕最小」的一格。兩人一起爛。\n\n零和賽局裡**不存在**「兩人一起好」或「兩人一起爛」的格子（每格加總都一樣，蛋糕大小是死的）。囚徒困境**有**這種格子——而且差距是賽局的全部重點：**蛋糕的大小，是雙方共同選擇的函數。** 你們的合作把蛋糕做大到 6，互相背叛把蛋糕砸爛到 2。這裡有共同利益（一起到 (3,3)）、也有衝突（各自想獨吞 5）——衝突與合作**同時並存**，這正是零和賽局裡絕對不會有的東西。\n\n於是中央張力以一個新面貌回到你面前：**正因為囚徒困境不是零和，「集體更糟」這件事才有意義。** 零和裡沒有「集體」——一方的贏精確抵銷另一方的輸，總和恆定，談不上「大家一起變糟」（總和根本不會變）。只有在非零和、蛋糕大小會變的賽局裡，「每個人都最佳化自己（都選背叛、5>3 且 1>0），結果把蛋糕從 6 砸到 2、集體一起跌進最爛那格」這個悲劇才可能發生。**個體理性 vs 集體理性的裂縫，是非零和賽局的專利。** 零和賽局乾淨、有唯一的值、極小極大一錘定音——代價是它太窄，窄到容不下這本書要講的整個故事。\n\n這也是為什麼「賽局理論＝零和算計」是大眾最深的誤解。von Neumann 1928 的零和理論太漂亮、太早出名，讓「賽局理論」在大眾心裡定型成「你死我活的數學」。但真相是反過來的：**零和是特例，非零和才是常態，而本書接下來十四章——合作、重複、聲譽、演化、機制設計——全都活在非零和的世界裡。** 零和裡無事可救（沒有集體可救），只有非零和裡才有「合作這個奇蹟值不值得、救不救得回」的問題。\n\n## 直覺的陷阱\n\n零和這一章，最容易在三個地方把你帶溝裡。\n\n| 陷阱 | 錯誤直覺長怎樣 | 在哪一步出錯 | 怎麼自我察覺 |\n|---|---|---|---|\n| **T4：以為「賽局理論＝零和」** | 「賽局理論不就是教你怎麼在你死我活裡算贏對手嗎」 | 把 von Neumann 1928 最早最有名的零和結果，當成整個領域的定義；沒注意到囚徒困境、協調賽局根本不是零和 | 拿任何一個你覺得「在競爭」的局，做加總檢查：每格兩人報酬加起來是不是同一個數？只要不是，就有共同利益空間，不是零和——大部分真實互動都在這裡 |\n| **以為極小極大定理到處能用** | 「max-min = min-max 是賽局理論的基本定理，哪個賽局都成立」 | 忘了定理的硬邊界：**只對兩人零和**。非零和（囚徒困境）、三人以上零和，一般沒有單一的「值」，得退回納許均衡 | 問自己：這賽局是不是恰好兩人、而且零和（加總固定）？兩個條件缺一個，「賽局的值」這個詞就沒定義，別硬找 |\n| **把零和心態套到非零和的局** | 「對手多拿一定是我少拿，所以我要不計代價壓制它」 | 在一個明明有雙贏方向的局（容量協商、跨團隊排程）裡，用極小極大的「假設對手要害我」站位，結果完全不去找那個能把蛋糕做大的合作點 | 你發現自己在「防著對方」卻從沒問過「有沒有一起變好的選項」——這就是徵兆。先做加總檢查，是非零和就先找雙贏格 |\n\n最毒的是第三個，因為它在工程裡天天發生。零和心態本身沒錯——對付惡意爬蟲、防 SQL injection，就該假設對手要把你往死裡整，極小極大是對的工具。錯的是**用錯場合**：把它套到跨團隊協商、容量規劃這種非零和的局，你會把一個能 (3,3) 的局，親手玩成 (1,1)。**辨別的唯一動作就是那個加總檢查**：每格兩人報酬加起來是不是同一個常數？是 → 零和，放心用極小極大；否 → 非零和，先去找蛋糕能不能做大。\n\n還有一個關於極小極大定理的精確守則，順手記住：**定理保證的相等（max-min = min-max = v）是在允許混合策略之後才成立**。純策略下，max-min ≤ min-max，可能嚴格小於（像本章 worked example 第一版那樣 +2 < +3）。別把「純策略 max-min」算出來就當成賽局的值——只有出現鞍點（兩者相等）時，純策略才達得到值；否則真正的值要靠隨機化，那是 ch05。\n\n## 紙上推演\n\n### 推演題一（★，**[15 分鐘]**）：這是不是零和？找安全策略\n\n下面三個 2×2 矩陣，報酬寫 (列玩家, 行玩家)。對每一個：(a) 判斷是不是零和（或常數和）；(b) 若是零和，用極小極大找出列玩家的安全策略與賽局的值（這三題都恰好有純策略鞍點）。\n\n```text\n矩陣 G1：                    矩陣 G2：                    矩陣 G3：\n          L      R                     L      R                     L      R\n   U   (+3,−3) (−2,+2)        U   (3, 3) (0, 5)         U   (+6,−6) (+2,−2)\n   D   (+1,−1) (+4,−4)        D   (5, 0) (1, 1)         D   (+5,−5) (+3,−3)\n```\n\n### 推演解答\n\n**G1**：(a) 逐格加總 = 0, 0, 0, 0，**是零和** ✓。(b) 列玩家報酬矩陣 [[+3,−2],[+1,+4]]。列最小：U→min(+3,−2)=−2；D→min(+1,+4)=+1。max-min = max(−2,+1) = **+1，安全策略 D**。行最大（行玩家要壓低列玩家）：L→max(+3,+1)=+3；R→max(−2,+4)=+4。min-max = min(+3,+4)=+3。咦，+1 ≠ +3？再檢查一次——**這題純策略下 max-min(+1) < min-max(+3)，沒有純策略鞍點**，真正的值要靠混合策略（落在 +1 與 +3 之間）。**常見錯路**：題目說「都有鞍點」，但你該相信自己的計算而不是題幹——G1 是故意埋的反例，提醒你「算完一定回頭檢查 max-min 是否真的等於 min-max」。（本題教訓：純策略 max-min 不必然是賽局的值；不等就代表要隨機化，ch05。）\n\n**G2**：(a) 逐格加總 = 6, 5, 5, 2，**不是零和**（這是脊椎囚徒困境！）。(b) 不適用——非零和沒有單一「賽局的值」，極小極大定理不管用，要用納許均衡（(D,D)，見 ch02）。**常見錯路**：看到 (5,0)/(0,5) 覺得「有人贏有人輸、應該是零和」——做加總檢查就破功了，6≠5≠2。\n\n**G3**：(a) 逐格加總 = 0, 0, 0, 0，**是零和** ✓。(b) 列玩家報酬 [[+6,+2],[+5,+3]]。列最小：U→min(+6,+2)=+2；D→min(+5,+3)=+3。max-min = max(+2,+3) = **+3，安全策略 D**。行最大：L→max(+6,+5)=+6；R→max(+2,+3)=+3。min-max = min(+6,+3) = **+3**。max-min = min-max = **+3 ✓ 有鞍點**，在 (D, R)，**賽局的值 v = +3**。複核：(D,R)=+3 是 D 列的最小（min(+5,+3)=+3 ✓）也是 R 行的最大（max(+2,+3)=+3 ✓），鞍點確認。\n\n### 推演題二（★★，**[20 分鐘]**）：囚徒困境到底差在哪\n\n不准只回答「因為加總不固定」。請完整論證：(a) 用脊椎囚徒困境（5/3/1/0）逐格加總，明確指出它和零和差在哪裡；(b) 說清楚「為什麼這個差別讓『集體更糟』變成有意義的概念，而零和裡這概念根本不存在」；(c) 給一個一句話的判準，讓另一個工程師能當場分辨手上的賽局是不是零和。\n\n### 推演解答\n\n(a) 加總 = 6（CC）、5（CD）、5（DC）、2（DD）。零和要求每格加總都相等（且為 0 或同一常數）；這裡 6、5、5、2 全不一樣，差距 6−2=4。具體差在：零和不可能同時存在「兩人一起好（CC=6，蛋糕最大）」和「兩人一起爛（DD=2，蛋糕最小）」這兩種格子，囚徒困境兩種都有。\n\n(b) 零和裡，因為總和恆定，「集體報酬」永遠是同一個數——不管玩家怎麼選，蛋糕大小不變，所以「集體更糟」這句話沒有意義（沒有可變的集體量可言，一方好就是另一方壞，互相抵銷）。囚徒困境裡，集體報酬（兩人加總）會隨選擇從 6 變到 2——蛋糕大小是雙方行為的函數。於是「每個人都選對自己最好的（背叛），卻把集體蛋糕從 6 砸到 2」這個悲劇才可能發生、才需要被解釋。**個體理性與集體理性的裂縫，是非零和的專利。**\n\n(c) 一句話判準：**「把每一格裡所有人的報酬加起來——如果四格都得到同一個數，是零和（純對抗，用極小極大）；只要有任何兩格加起來不一樣，就不是零和，存在共同利益空間，別用零和心態。」** **常見錯路**：用「有沒有人輸」當判準（囚徒困境裡 (5,0) 確實有人「輸」）——那是錯的，零和的判準是**加總是否固定**，不是「是否有輸家」。\n\n### 推演題三（★，**[10 分鐘]**）：反駁「賽局理論就是你死我活的零和算計」\n\n口頭題：你朋友說「賽局理論不就是教人怎麼在零和競爭裡算贏對手、把別人當對手算計的犬儒學問嗎？」請用三句話以內反駁，必須點到「零和只是特例」。\n\n### 推演解答\n\n參考講法：「剛好相反。零和（你贏＝我輸）是賽局理論裡**最簡單的特例**，1928 年就被 von Neumann 用極小極大定理解乾淨了。賽局理論花了之後八十年在研究的，是**非零和**的局——像囚徒困境，兩人明明可以一起好、卻因為各自理性而一起爛——它問的核心問題其實是『**合作怎麼可能、怎麼維持**』，而不是『怎麼算贏對手』。把它講成零和算計，等於把整門學問窄化成它最不有趣的那一角。」**自我檢核點**：你有沒有講出「零和是特例、非零和才是主場」這個翻轉？沒有的話，你還停在大眾誤解裡。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **零和的精確定義是什麼？** 它的關鍵後果（此消彼長）是怎麼從「加總固定」推出來的？\n2. **極小極大思維的兩個動作**（先取列最壞、再取最好）順序為什麼不能反？「安全水準」和「安全策略」分別指什麼？\n3. **極小極大定理說了什麼、在什麼條件下成立？** 「兩人」「零和」「混合策略」這三個條件各拿掉一個，會壞在哪？（提示：囚徒困境破壞零和、三人零和破壞兩人、純策略破壞「混合策略下相等」。）\n4. **鞍點是什麼？** 為什麼「max-min = min-max」時純策略就夠、不等時就得隨機化？本章 worked example 那個 +2 vs +3 的版本，問題出在哪？\n5. **為什麼囚徒困境不是零和？** 不要只說「加總不固定」——說清楚這個差別怎麼讓「集體更糟」變成有意義的概念。\n6. **零和裡為什麼沒有「個體理性 vs 集體理性的裂縫」？** 這條裂縫是哪一類賽局的專利？\n7. **「賽局理論＝零和」為什麼是錯的、而且是大眾最深的誤解？** 為什麼這個誤解這麼頑固（跟 1928 那段歷史有關）？\n8. **什麼時候該用零和心態、什麼時候不該？** 給一個你系統裡「該用」和一個「不該用」的例子，並說出那個一句話的加總判準。\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Prisoner's Dilemma\"**（https://plato.stanford.edu/entries/prisoner-dilemma/）——把囚徒困境為什麼**不是**零和、以及它和純對抗的差別講得很清楚。讀「the structure of the game」那段，正好補強本章「脊椎不是零和」這層。\n- **John von Neumann, \"Zur Theorie der Gesellschaftsspiele,\" Mathematische Annalen 100 (1928): 295–320**——極小極大定理的原始論文（德文）。不必啃原文，但記住這個落點：**極小極大屬於 1928 這篇論文，不是 1944 那本《Theory of Games and Economic Behavior》**（那本書另有貢獻，見 ch05/ch13）。歷史背景可讀 Privatdozent 的科普文（https://www.privatdozent.co/p/john-von-neumanns-minimax-theorem）。\n- **任何一本賽局理論入門教材的「zero-sum games and the minimax theorem」章節**（如 Osborne《An Introduction to Game Theory》相關章）——若你想看極小極大定理的不動點證明（本書只給直覺、不展開），這是嚴格版的去處。讀它你會看到本章「max-min ≤ min-max、相等時是鞍點」這個直覺如何被嚴格化。\n- **下一章 ch05**——零和裡那個「值 v」到底怎麼靠混合策略達成（配對銅板各 1/2、剪刀石頭布各 1/3），以及那個最反直覺的點：**你的隨機機率是由對手的報酬決定的，不是你自己的**。本章故意把「怎麼算」留到那裡。\n"}, {"id": "ch05-mixed-strategies", "file": "ch05-mixed-strategies.md", "group": "Part II — 純策略不夠用", "title": "ch05 — 混合策略：讓對手猜不到，也讓對手無差異", "md": "# ch05 — 混合策略：讓對手猜不到，也讓對手無差異\n\n> **本章解決什麼問題**：前四章的均衡都長在「純策略」上——每個玩家挑定一個動作不動。但有一整類賽局（剪刀石頭布、配對銅板）根本沒有純策略納許均衡：任何固定出法都會被克制。這時你得隨機化。本章講透混合策略，並交出本書最反直覺的一刀：**你的隨機機率不是為了讓自己舒服，而是為了讓對手對他的每個選項都「無差異」。** 它接在 ch04（零和與極小極大）之後——極小極大定理早就告訴你零和賽局有個「值」靠混合策略達成，本章就是把那個「怎麼算」補上；它也替 ch09（演化）鋪路：到時同一套機率會被重讀成「族群裡有多少比例在做這件事」。\n\n## 從你已知的出發\n\n你早就在用混合策略了，只是沒這樣叫它。\n\n想一個你寫過的 load balancer。最笨的版本是 round-robin：請求 1 給 A、請求 2 給 B、請求 3 給 C，輪流。乾淨、可預測——但**可預測本身就是漏洞**。如果有個壞 client 想把某台後端打爆，它只要數一數自己是第幾個請求，就能算出「下一個繁重請求會落在哪台」，然後把昂貴查詢全塞到那一拍。確定性的策略，被對手讀懂了，就被利用。\n\n所以你做了什麼？你把分流隨機化。請求進來，擲個（偽）骰子決定去哪台。現在沒有人——包括攻擊者——能預測下一個請求落點。你用「隨機」買到了「不可預測」。這就是混合策略的第一層直覺：**當對手會針對你的選擇做反應，固定的選擇就是把底牌攤開；隨機化是把牌蓋回去。**\n\n再想 exponential backoff 加 jitter。一堆 client 同時撞到 503，如果它們全都「等 1 秒再重試」，那它們會像合唱團一樣整齊地在第 1 秒末再撞一次——thundering herd 的同步重試，把剛喘口氣的服務再打死。jitter 做的事，是給每個 client 的等待時間灑上隨機抖動：有人等 0.8 秒、有人 1.3 秒。**隨機化打破了對稱，把所有人從同一個壞時刻錯開。** 這也是混合策略——只是這裡的「對手」不是惡意攻擊者，而是「跟你一模一樣、會做出一模一樣決定的其他 client」。\n\n還有一個你天天用的隨機化神器：`Math.random()` 背後的 PRNG、或一致性雜湊裡的 hash。你信任它們是因為它們「假裝得夠像隨機」——夠到對手讀不出規律。剪刀石頭布的最佳玩法，本質上就是要你變成一台好的 PRNG。\n\n本章要做的，是把這些你憑直覺在用的東西，講到你能回答兩個問題：（一）為什麼有些賽局**非隨機化不可**，不是「隨機化比較好」而是「不隨機化就一定輸」？（二）如果要隨機，**該用什麼機率**——是憑感覺 50/50，還是有個精確答案？第二個問題的答案會嚇到你：答案由你**對手**的報酬決定，不是你的。\n\n## 為什麼有些賽局逼你隨機：純策略均衡的缺席\n\n先回到熟悉的脊椎。ch01 那張囚徒困境矩陣——T,R,P,S=5,3,1,0：\n\n```text\n脊椎囚徒困境（ch01 那張矩陣，數字＝獲益點數，越大越好）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 5)\n    我方：背叛(D)      (5, 0)            (1, 1)  ← 唯一純策略 NE\n```\n\n囚徒困境有一個又乾淨又穩定的純策略納許均衡：(背叛, 背叛)。你不需要隨機化，背叛是嚴格優勢策略，閉著眼睛選它就對了。**囚徒困境不需要混合策略**——記住這點，本章結尾會回來找它算帳。\n\n現在換一個賽局：剪刀石頭布。它沒有報酬矩陣上的「困境」，它有的是另一種麻煩。\n\n```text\n剪刀石頭布（對稱零和；報酬＝我方得分，贏+1／平0／輸−1）：\n                  對方：石頭    對方：剪刀    對方：布\n    我方：石頭      ( 0)         (+1)         (−1)\n    我方：剪刀      (−1)         ( 0)         (+1)\n    我方：布        (+1)         (−1)         ( 0)\n```\n\n（這是零和，所以我只標我方得分；對方得分恆為負的這個數，加起來是 0。）\n\n問一個 ch02 的老問題：有沒有純策略納許均衡？納許均衡的定義是「沒有人能單方面改善」。我們來找找看。\n\n- 假設均衡是（我出石頭，對方出石頭）。對方能單方面改善嗎？能——對方改出布，從 0 變成贏（對方得 +1）。所以這不是均衡。\n- 假設是（我石頭，對方布，對方贏）。那**我**能改善——我改出剪刀，反過來贏對方。不是均衡。\n\n你會發現一個規律：**不管落在哪一格，永遠有一個人想跑。** 石頭被布克、布被剪刀克、剪刀被石頭克——這是一個首尾相接的「追逐圈」，沒有任何一格能讓兩個人同時停下來。這就是「沒有純策略納許均衡」的精確意思：**任何確定的出法，都存在一個確定的剋星，所以任何純策略組合都不穩定。**\n\n這不是剪刀石頭布的怪癖，是一整類賽局的特徵。配對銅板（matching pennies）也一樣：\n\n```text\n配對銅板（零和；配對者贏。報酬＝(我方, 對方)）：\n                  對方：正面(H)      對方：反面(T)\n    我方：正面(H)   (+1, −1)          (−1, +1)\n    我方：反面(T)   (−1, +1)          (+1, −1)\n    （我是「配對者」：兩枚一樣我贏；對方是「不配對者」：兩枚不同他贏）\n```\n\n逐格檢查：（我正,他正）我贏——他想改成反面逃走；（我正,他反）他贏——我想改成反面追上去；（我反,他反）我贏——他想跑……又是一個首尾相接的圈。**沒有任何一格是均衡。**\n\n到這裡，ch02 那個讓你安心的承諾——「納許證明了每個有限賽局都至少有一個均衡」——好像被打臉了？沒有。回去看 landscape 裡 Nash 1951 的精確措辭：每個有限賽局**在混合策略下**至少有一個納許均衡。剪刀石頭布和配對銅板的均衡確實存在，只是它不長在任何一個純策略上——它長在**機率分布**上。混合策略不是「進階技巧」，它是讓納許存在定理為真的那塊拼圖。\n\n> **嚴謹度標示**：「任何確定出法都有剋星 → 沒有純策略 NE」是工程師的嚴謹（每一步你都能口頭說出理由，剛剛我們逐格走完了）。但「所以一定存在混合策略 NE」是直覺版——它靠的是 Nash 的存在性證明（1950 年 PNAS 短文用 Kakutani 不動點定理、1951 年 Annals 論文改用更基本的 Brouwer 不動點定理），本書只給結論、不展開那個拓撲論證（指向延伸閱讀）。\n\n## 混合策略是什麼：在動作上放一個機率分布\n\n純策略：「我出石頭。」混合策略：「我用 1/3 機率出石頭、1/3 出剪刀、1/3 出布。」\n\n形式上，混合策略就是在你的純策略集合上放一個機率分布。配對銅板裡，我的混合策略是一對數 (p, 1−p)：以機率 p 出正面、1−p 出反面。剪刀石頭布裡是一組三個數 (p₁, p₂, p₃)，加起來等於 1。\n\n對你這個後端工程師來說，這沒什麼神秘的——這就是你 load balancer 的權重配置。「70% 流量到 A、30% 到 B」就是一個混合策略 (0.7, 0.3)。純策略是它的退化特例：「100% 到 A」＝ (1, 0)。\n\n混合策略賽局裡，你的報酬不再是一個確定的數，而是一個**期望值**——對所有可能結果按機率加權平均。這套「期望值怎麼算」的機制是《馴服隨機》的地盤（見《馴服隨機》ch08 期望值那章），本章只用結果：如果我出正面的期望報酬是 a、出反面是 b，而我以機率 p 出正面，那我的整體期望報酬就是 p·a + (1−p)·b。一條直線，斜率由 a−b 決定。記住這條直線的樣子，它是下一節整個論證的引擎。\n\n## 最反直覺的一刀：你的機率，由對手的報酬決定\n\n現在來到本章的心臟。我認為這是整本書最容易讓人「以為懂了其實沒懂」的一頁，值得你停十分鐘。\n\n先講一個錯誤直覺，因為它太自然了，幾乎每個人第一次都這樣想：「我要選一個機率，**讓我自己的期望報酬最大**。」\n\n聽起來天經地義。但在配對銅板裡試一下就會撞牆。假設對手固定以機率 q 出正面。那我出正面的期望報酬是多少？我出正面時，對手出正面（機率 q）我贏 +1、對手出反面（機率 1−q）我輸 −1，所以：\n\n```text\n我出正面的期望報酬  E[正] = q·(+1) + (1−q)·(−1) = 2q − 1\n我出反面的期望報酬  E[反] = q·(−1) + (1−q)·(+1) = 1 − 2q\n```\n\n現在「最大化我自己」會給出什麼？比較 E[正] 和 E[反]：\n\n- 若 q > 1/2（對手偏愛正面），則 2q−1 > 1−2q，**我該 100% 出正面**（去配對他）。\n- 若 q < 1/2，則反過來，**我該 100% 出反面**。\n- 只有剛好 q = 1/2 時，E[正] = E[反] = 0，我出什麼都一樣。\n\n看到問題了嗎？「最大化我自己」幾乎永遠把我推向一個**純策略**（要嘛全正、要嘛全反）。如果我真的這樣做、被對手看穿了，對手立刻改出能剋我的那面，我就輸定了。「最大化自己」這條路，**走不到混合均衡**。它只會在 q 剛好等於 1/2 的刀刃上才允許我隨機——而那個 1/2 是**對手**的機率，不是我的。\n\n這就翻到了正確的那一面。在混合策略納許均衡裡，你問的不是「什麼機率讓我最爽」，而是：\n\n> **我該用什麼機率，才能讓對手對他的每個選項都無差異（indifferent）？**\n\n為什麼是「無差異」？這裡有一條鐵鏈，一環扣一環，你要能自己背出來：\n\n1. 假設均衡裡對手真的在混合——他有時出正、有時出反，兩個都用到。\n2. 一個理性玩家**只會混合他覺得一樣好的選項**。如果出正面的期望報酬比出反面高哪怕一點點，他就該 100% 出正面，不會浪費機率在反面上。\n3. 所以「對手願意混合」這件事本身，就**強迫**了「對他而言，出正和出反的期望報酬必須相等」。\n4. 而對手的期望報酬，是由**我的**機率決定的。\n5. 所以：**我必須調整我的機率，把對手的兩個選項拉到一樣好。** 不是因為我想對他好，是因為只有這樣，他才願意待在那個讓我也安全的混合裡。\n\n換句話說，**均衡是一種互相鎖死**：我選的機率讓他無差異，他選的機率讓我無差異。誰都沒有單方面變好的動機（這正是 ch02 納許均衡的定義），因為任何單方面的偏移都不會改善期望報酬——對方早就把你調到「怎麼選都一樣」了。\n\n這個「我的機率服務於對手的無差異」之所以反直覺，是因為它違反了我們對「策略」的日常理解。日常裡，策略是「我想要什麼、我怎麼拿到」。但在混合均衡裡，策略變成「我怎麼讓你拿不到資訊優勢」——我的隨機是一道牆，牆的高度（機率）剛好砌到讓你站在牆的哪一邊都看不到更多。\n\n## Worked example：配對銅板，從頭算到尾\n\n光講會滑掉，動手算一次才會釘進腦子。我們求配對銅板的混合納許均衡，**而且用兩個視角交叉驗算**（混合策略最容易算錯，本書規矩是每題都驗兩遍）。\n\n**設定**：我是配對者，設我出正面的機率為 p（出反面 1−p）。對手是不配對者，設他出正面的機率為 q（出反面 1−q）。\n\n**視角一：我選 p，讓「對手」無差異。**\n\n對手的報酬：他是不配對者，兩枚不同他贏 +1、相同他輸 −1。先寫他出正面 vs 出反面的期望報酬（對方的報酬，隨我的 p 變化）：\n\n```text\n對手出正面的期望報酬：\n    我出正(p)兩枚相同→對手輸−1；我出反(1−p)兩枚不同→對手贏+1\n    E_對[正] = p·(−1) + (1−p)·(+1) = 1 − 2p\n\n對手出反面的期望報酬：\n    我出正(p)兩枚不同→對手贏+1；我出反(1−p)兩枚相同→對手輸−1\n    E_對[反] = p·(+1) + (1−p)·(−1) = 2p − 1\n\n讓對手無差異（這是求解的關鍵步驟）：\n    E_對[正] = E_對[反]\n    1 − 2p   = 2p − 1\n    2        = 4p\n    p        = 1/2          ← 我出正面的機率\n```\n\n所以我該以 p = 1/2 出正面。注意這一步：我解出 1/2，是透過**令對手的兩個期望報酬相等**，整條方程式裡裝的全是對手的報酬。我的機率 p 是被「對手的無差異」這個條件逼出來的。\n\n**視角二（驗算）：對手選 q，讓「我」無差異。**\n\n由對稱性，把上一節算過的我方期望報酬拿來：\n\n```text\n我出正面的期望報酬  E_我[正] = 2q − 1\n我出反面的期望報酬  E_我[反] = 1 − 2q\n\n讓我無差異：\n    2q − 1 = 1 − 2q\n    4q     = 2\n    q      = 1/2          ← 對手出正面的機率\n```\n\n兩個視角對上了：(p, q) = (1/2, 1/2)。**這就是配對銅板的唯一納許均衡——雙方各以 1/2 出正面。**\n\n**自我複核**：在 p = q = 1/2 時，每個人的期望報酬是多少？把 q=1/2 代回 E_我[正] = 2(1/2)−1 = 0，E_我[反] = 1−2(1/2) = 0。雙方期望報酬都是 0——這正是 ch04 說的「零和賽局的值 v = 0」，混合策略把它實現了。極小極大定理（von Neumann 1928）保證了這個值存在，本章把「靠什麼策略達成」算了出來。✓\n\n順手做一個「破壞性檢驗」：如果我手抖、出正面的機率變成 p = 0.6（偏離均衡）會怎樣？代進對手的報酬：E_對[正] = 1−2(0.6) = −0.2，E_對[反] = 2(0.6)−1 = +0.2。對手不再無差異了——出反面對他嚴格更好。理性的對手立刻 100% 出反面，於是我被精準利用，期望報酬掉到負的。**這就是「偏離均衡會被懲罰」的具體長相**：你一旦不再讓對手無差異，你就交出了一條可被利用的縫。\n\n## Worked example 二：剪刀石頭布，為什麼是 1/3\n\n同一把鑰匙開三道鎖。剪刀石頭布對稱，我們設對手以機率 (r, s, p) 分別出石頭、剪刀、布（r+s+p=1），用「讓我無差異」求解——也就是讓我出石頭、出剪刀、出布的期望報酬三者相等。\n\n```text\n我出「石頭」的期望報酬：\n    對石頭(r)平0、對剪刀(s)贏+1、對布(p)輸−1\n    E[石] = r·0 + s·(+1) + p·(−1) = s − p\n\n我出「剪刀」的期望報酬：\n    對石頭(r)輸−1、對剪刀(s)平0、對布(p)贏+1\n    E[剪] = r·(−1) + s·0 + p·(+1) = p − r\n\n我出「布」的期望報酬：\n    對石頭(r)贏+1、對剪刀(s)輸−1、對布(p)平0\n    E[布] = r·(+1) + s·(−1) + p·0 = r − s\n\n讓三者相等（無差異）：\n    E[石] = E[剪]：  s − p = p − r   ……(i)\n    E[剪] = E[布]：  p − r = r − s   ……(ii)\n\n由 (i)：  s − p = p − r  →  r + s = 2p\n由 (ii)： p − r = r − s  →  s + p = 2r\n兩式相減：(r+s) − (s+p) = 2p − 2r  →  r − p = 2p − 2r  →  3r = 3p  →  r = p\n代回 r + s = 2p 且 r = p：  p + s = 2p  →  s = p\n所以 r = s = p，再配 r + s + p = 1 →  r = s = p = 1/3\n```\n\n**對手各以 1/3 出三招。** 由對稱，我也是各 1/3。這就是剪刀石頭布的唯一納許均衡。\n\n**自我複核**：在 1/3 均衡下，我任一招的期望報酬？用 E[石] = s − p = 1/3 − 1/3 = 0。三招都是 0、彼此相等——無差異條件滿足，零和的值 = 0。✓ 直覺上也對：完全均勻隨機時，你贏、平、輸各 1/3 機率，平均下來不賺不賠。\n\n注意這裡藏著一個常被誤會的點，下一節會展開：1/3 不是「因為有三招、所以平均分」這種對稱直覺自動成立的——它是**解無差異方程解出來的**。如果這個賽局不對稱（比如出石頭贏的時候多賺一倍分），1/3 就會破掉，正確比例還是得靠無差異方程算。對稱賽局剛好讓答案落在均勻分布上，是巧合不是定律。\n\n## 直覺的陷阱\n\n混合策略是本書數值最容易出錯、概念最容易自欺的一章。這裡列四個具名陷阱——前兩個會讓你**算錯**，後兩個會讓你**以為懂了其實沒懂**。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版 / 自我察覺 |\n|---|---|---|---|\n| **T-混1：自己最大化** | 「我選機率是為了最大化我自己的期望報酬」 | 一最大化自己，目標函數是條直線（p·a+(1−p)·b），極值永遠在端點 → 把你推回純策略，走不到混合均衡 | 你的機率是為了讓**對手**無差異。徵兆：如果你的算式裡裝的是「我的報酬」而不是「對手的報酬」，你算錯了視角 |\n| **T-混2：對稱＝均勻** | 「剪刀石頭布三招對稱，所以一定各 1/3，不用算」 | 把「對稱賽局的解恰好均勻」當成「所有混合均衡都均勻」。一旦報酬不對稱（贏石頭多賺分），均勻就錯，但你不會發現 | 1/3 是**無差異方程的解**、不是對稱的免費贈品。永遠列方程驗一次 |\n| **T-混3：混合＝沒在用策略** | 「隨機亂出＝放棄思考、擺爛」 | 把「混合」誤讀成「無策略」。其實混合策略的**機率值是被精算到小數點**的，亂出（比如 50/30/20）會立刻被對手利用 | 混合是「精確到讓對手無差異」的隨機，不是「隨便」的隨機。亂出 ≠ 均衡混合 |\n| **T-混4：讀心術更強** | 「真正的高手靠讀對手心理、預測他下一手，不靠機率」 | 把零和對抗誤當成資訊戰可贏。在均衡裡，對手一旦也在 1/3 混合，他下一手**沒有任何規律可讀**——你的「讀心」讀的是雜訊 | 對均衡對手，最佳回應就是 1/3，讀心沒有正期望值。讀心只在對手**偏離均衡**（有規律）時才有用——那是在打剝削、不是在打均衡 |\n\nT-混1 是萬惡之源，特別講一句：**混合策略均衡裡，沒有「哪個機率讓我賺更多」這種可調的旋鈕**。嚴格說，均衡裡的混合策略仍是一個最佳反應（仍在最大化期望報酬，這沒有牴觸 ch02 的納許均衡定義）——只是這個最大值落在一片「平台」上：對手把你調到無差異後，你 support 裡每個選項都並列最高，出正出反都一樣好，沒有**單一**的「更好」可追求。所以「我要挑機率讓自己更賺」這個工程直覺在這裡轉不動——不是因為你放棄最佳化，而是因為對手早把報酬面壓成了水平，你能做的只是維持一面讓對手也無利可圖的牆。這跟「有個唯一最佳點可逼近」的最佳化直覺正好相牴觸，所以特別容易絆倒。\n\nT-混4 對你尤其誘惑，因為它在工程裡半對：對付一個**有 bug 的、可預測的**對手（壞掉的 retry 邏輯、固定週期的爬蟲），讀規律去剝削它，完全正確、且高報酬。但那是因為它偏離了均衡、露了規律。對一個真正隨機到 1/3 的對手，你的剝削期望值是 0。**「猜不到」和「無差異」是同一件事的兩面**：當你的機率讓對手無差異，對手就沒有動機偏向任何一邊，於是他的行為也變得對你不可預測——猜不到，是無差異的副產品。\n\n## 回扣中央張力：這一章，裂縫剛好缺席\n\n本書每一章都要碰一次那條中央張力——個體理性 vs 集體理性的裂縫。但這一章很特別：**它是靠「裂縫缺席」來反襯裂縫的。**\n\n剪刀石頭布和配對銅板是純零和。零和的意思是：一方的報酬恰好是另一方的負數，兩人報酬永遠加總為 0（或某個常數）。這代表什麼？代表**沒有「集體」可言**。沒有一個「對雙方都更好」的格子、也沒有一個「對雙方都更糟」的格子可以一起掉進去——一方贏的每一分，正好是另一方輸的那一分。「集體更糟」這句話在這裡根本沒有意義，因為損益永遠互相抵消、總和是死的。\n\n所以在零和賽局裡，**個體理性與集體理性不會分裂**——不是它們神奇地和解了，而是這裡壓根沒有「集體理性」這個東西可以跟個體理性打架。混合策略在這裡乾乾淨淨：每個人各自最佳化（讓對手無差異），就到均衡，沒有「明明可以更好卻一起變糟」的遺憾。\n\n對照之下脊椎困境的裂縫有多刺眼，就更清楚了。回頭看本章開頭那張囚徒困境：它**不是**零和（(3,3) 對雙方都好過 (1,1)，雙方可以同時較好——這正是 ch04 破除「賽局＝零和」誤解時強調的），所以它**有**集體可言，於是才有「每個人最佳化卻一起變糟」的悲劇。零和沒有這個悲劇，因為它沒有共同利益可以被個體理性糟蹋掉。\n\n把這句話記牢，因為 ch09 會把它整個翻過來：到時我們把混合策略的機率搬回**非零和**的脊椎困境，重讀成「族群裡有多少比例在合作 vs 背叛」。一旦離開零和、回到有集體利益的世界，那條裂縫立刻回來——背叛者會在族群裡擴張，把大家一起拖進低報酬，正如個體理性把困境拖向 (1,1)。**所以本章的乾淨，是零和獨享的特權；它的缺席，正是脊椎張力存在條件的反證。**\n\n## 紙上推演\n\n全程紙筆手算，不要去跑任何程式。每題先自己做，再看解答。\n\n### 推演題一（★★，20 分鐘）：求一個非零和賽局的混合均衡\n\n下面這個 2×2 賽局沒有純策略納許均衡（先自己驗一下為什麼），用「讓對手無差異」求它的混合納許均衡。這不是零和，所以兩邊報酬要分開看。\n\n```text\n報酬＝(列玩家, 行玩家)：\n                  行：左(L)         行：右(R)\n    列：上(U)      (2, 1)            (0, 0)\n    列：下(D)      (0, 0)            (1, 2)\n```\n\n設列玩家以機率 p 出上（U）、行玩家以機率 q 出左（L）。求 (p, q)。\n\n### 推演解答一\n\n**先確認無純策略 NE**：用最佳反應檢查四格。(U,L)：行玩家想留 L 嗎？行在 U 這列，L 給 1、R 給 0，留 L ✓；列玩家想留 U 嗎？列在 L 這行，U 給 2、D 給 0，留 U ✓——欸這格雙方都不想動，它**是**純策略 NE。同理 (D,R)：列在 R 行，D 給 1、U 給 0，留 D ✓；行在 D 列，R 給 2、L 給 0，留 R ✓——也是純策略 NE。\n\n（修正自己：題目說「沒有純策略 NE」是個陷阱前提，真相是這個賽局**有兩個**純策略 NE，(U,L) 和 (D,R)。這是「性別戰」型的協調賽局，ch10 會專講。但它**還有第三個**混合均衡，我們要的是它。常見錯路就是看到「協調賽局」以為只有純策略 NE 就收工——多重均衡的協調賽局通常還藏一個混合 NE。）\n\n**求混合 NE——讓對手無差異**：\n\n```text\n讓「行玩家」對 L 與 R 無差異（用行玩家的報酬，隨列的 p 變化）：\n    行出 L 的期望報酬：列出U(p)給1、列出D(1−p)給0 → E_行[L] = p·1 + (1−p)·0 = p\n    行出 R 的期望報酬：列出U(p)給0、列出D(1−p)給2 → E_行[R] = p·0 + (1−p)·2 = 2 − 2p\n    無差異： p = 2 − 2p  →  3p = 2  →  p = 2/3      ← 列出 U 的機率\n\n讓「列玩家」對 U 與 D 無差異（用列玩家的報酬，隨行的 q 變化）：\n    列出 U 的期望報酬：行出L(q)給2、行出R(1−q)給0 → E_列[U] = q·2 + (1−q)·0 = 2q\n    列出 D 的期望報酬：行出L(q)給0、行出R(1−q)給1 → E_列[D] = q·0 + (1−q)·1 = 1 − q\n    無差異： 2q = 1 − q  →  3q = 1  →  q = 1/3      ← 行出 L 的機率\n```\n\n**混合 NE：列以 (2/3, 1/3) 出 (U, D)、行以 (1/3, 2/3) 出 (L, R)。**\n\n**自我複核兼驚嘆點**：注意 p 是用**行玩家**的報酬算的、q 是用**列玩家**的報酬算的——再一次，你的機率由對手的報酬決定。還有一個反直覺處：列玩家比較想協調在 (U,L)（他在那拿 2），但在混合均衡裡他出 U 的機率是 2/3——不是因為他偏愛 U，而是這個 2/3 剛好讓**行玩家**無差異。常見錯路：用自己的報酬算自己的機率（T-混1），會算成 p 由列的報酬決定，得到錯誤的數。\n\n### 推演題二（★★★，15 分鐘）：講清楚「我的機率由對手報酬決定」\n\n不用算，用文字。向一個只懂純策略的工程師同事解釋：在混合均衡裡，為什麼我選的隨機機率是由**對手的**報酬表決定的，而不是我自己的？請用一條「如果不這樣會怎樣」的反證鏈，而不是只覆述結論。\n\n### 推演解答二\n\n一條可以這樣走的鏈（你的版本只要邏輯等價就算過）：\n\n1. **均衡要求對手願意混合。** 在配對銅板這種賽局，如果對手不混合、固定出某一面，我就能 100% 出克他的那面、穩贏——所以對手不混合不可能是均衡。均衡裡對手必須在混合。\n2. **理性的人只混合他覺得一樣好的選項。** 如果對手出正面的期望報酬比出反面高哪怕 0.01，他就該全押正面，不會分機率給反面。所以「對手願意同時用正反兩面」⟺「對他而言正反兩面期望報酬相等」。\n3. **對手的期望報酬，是用我的機率算出來的**（他出正/出反賺多少，取決於我多常出正/出反）。\n4. 把 2 和 3 接起來：要讓對手願意混合（＝對他無差異），我**必須**把我的機率調到「讓對手的兩個選項期望報酬相等」。這條方程式裡裝的全是對手的報酬，解出來的卻是我的機率。\n5. **反證收尾**：如果我不這樣、而是去最大化我自己的期望報酬，那（如本章算過）我會被推向某個純策略，露出規律，對手立刻改出剋星把我利用——我反而沒守住均衡。所以「最大化自己」在這裡是條死路，「讓對手無差異」才是。\n\n**常見錯路**：只說「因為這是納許均衡的定義」——這是循環論證，沒解釋為什麼定義會逼出「無差異」。要點是第 2 步「理性的人只混合一樣好的選項」，那是把納許均衡翻譯成無差異條件的橋。\n\n### 推演題三（★★，15 分鐘）：最佳猜拳策略，與「讀心」的迷思\n\n你的同事說：「猜拳哪需要算 1/3，高手靠讀對手心理、預判他下一手就贏了。」請回答兩件事：（一）對一個真的在 1/3 均勻混合的對手，「讀心」的期望報酬是多少？（二）那「讀心」到底什麼時候有用？這跟「打均衡」和「打剝削」的差別是什麼？\n\n### 推演解答三\n\n**（一）** 對一個各 1/3 出招的對手，你出任何一招（甚至你自己也亂出）的期望報酬都是 0——本章算過 E[石]=E[剪]=E[布]=0。所以對均衡對手，「讀心」不可能有正期望值，因為**他的下一手沒有任何規律可讀**，你讀到的全是雜訊。你頂多打平。最佳策略就是自己也 1/3，確保**你自己**不露規律被反剝削。\n\n**（二）** 讀心只在對手**偏離均衡、有規律**時才有用：真人會有偏好（很多人開局愛出石頭）、輸了之後傾向換招、有週期性習慣。這些都是可被偵測、可被剝削的規律。針對這種對手去算他的傾向、出剋星——這叫**打剝削（exploitation）**，期望值為正。但它有代價：你一旦為了剝削而偏離 1/3，你自己也露出了規律，可能被更高明的對手反剝削。\n\n**關鍵區分**：打均衡（play the equilibrium）＝出 1/3，保證不被剝削、不賺不賠、無敵但無趣；打剝削＝偵測對手規律去佔便宜，能贏但自己也露餡。「高手靠讀心」對的是後者、錯在以為它對均衡對手也成立。**常見錯路**：把「真人不是完美隨機所以讀心有用」過度推廣成「所以 1/3 是書呆子策略」——不，1/3 是地板（floor，保證不輸），剝削是地板之上的選配，不是替代品。\n\n## 自我檢核\n\n口頭回答，講得出來才算過。優先答「為什麼」。\n\n1. 為什麼剪刀石頭布沒有純策略納許均衡？用「追逐圈」一句話講清楚，不要只說「因為要隨機」。\n2. 在混合納許均衡裡，我選機率的目標是什麼？（如果你脫口而出「最大化我自己的報酬」，回去重讀「最反直覺的一刀」那節——這是本章頭號陷阱。）\n3. 為什麼「對手願意混合」會強迫「對他而言所有選項期望報酬相等」？這條橋（理性的人只混合一樣好的選項）你能自己搭出來嗎？\n4. 配對銅板的均衡是各 1/2、剪刀石頭布是各 1/3——這兩個漂亮數字是「對稱所以平均分」自動成立的，還是解無差異方程解出來的？舉一個會讓 1/3 破掉的改動。\n5. 「混合策略＝放棄思考、隨便亂出」錯在哪？均衡混合和亂出（比如猜拳 50/30/20）差在哪？\n6. 為什麼這一章（純零和）裡，「個體理性 vs 集體理性」的裂縫是缺席的？ch09 把這套機率搬回非零和的脊椎困境後，裂縫為什麼又回來？\n7. 偏離均衡機率（比如配對銅板出 0.6 而非 0.5）具體會發生什麼？為什麼說「不再讓對手無差異，就交出了一條可被利用的縫」？\n\n## 延伸閱讀\n\n- **Osborne & Rubinstein,《A Course in Game Theory》第 3 章（混合策略均衡）** — 混合策略納許均衡的標準教科書處理，無差異條件與存在性都在這。想看本章「直覺版」背後的嚴格版讀這章。Osborne 另有公開講義 PDF（economics.utoronto.ca/osborne/igt），第 4 章專講 mixed strategy equilibrium，免費、寫得清楚。\n- **Stanford Encyclopedia of Philosophy,「Game Theory」條目（mixed strategies 一節）** — plato.stanford.edu/entries/game-theory/ ；用哲學的精確度討論「混合策略到底在說玩家做了什麼」（真的擲骰子？還是只是別人對你的信念？），補本章沒空展開的詮釋爭議。\n- **MIT OpenCourseWare 17.810 Game Theory, Lecture 3「Mixed Strategy Nash Equilibrium」（公開 PDF）** — ocw.mit.edu 上的免費講義，配對銅板的無差異求解一步步走，可拿來跟本章 worked example 對照驗算。\n- **von Neumann 1928,「Zur Theorie der Gesellschaftsspiele」（Math. Annalen 100:295）** — 極小極大定理原始論文（德文）。讀不讀得動是一回事，知道「兩人零和的值靠混合策略達成」這個結論的源頭在這、且**只**對兩人零和成立（見 ch04），是賽局理論的歷史座標。\n- **Michael Mitzenmacher,「The Power of Two Choices in Randomized Load Balancing」（1996 博士論文）** — 本章開頭那個「隨機分流」工程直覺的嚴謹版：隨機化（甚至只隨機選兩個再挑輕的）為什麼能在分散式負載均衡裡打破壞同步。eecs.harvard.edu/~michaelm 有全文，給想把混合策略接回系統實務的你。\n"}, {"id": "ch06-game-tree", "file": "ch06-game-tree.md", "group": "Part II — 純策略不夠用", "title": "ch06 — 賽局樹：序貫、承諾與可信威脅", "md": "# ch06 — 賽局樹：序貫、承諾與可信威脅\n\n> **本章解決什麼問題**：前五章的賽局都是「同時出手」——雙方蒙著眼睛各自下注，用矩陣表示就夠了。但現實裡大多數互動有先後：誰先動、誰看著誰反應。一旦有了時間軸，矩陣就不夠用了，我們得換一種武器——賽局樹（game tree）。本章要回答三個被「同時賽局」藏起來的問題：先動是優勢還是劣勢？一個威脅在什麼條件下是「可信」的、什麼時候只是空話？以及一個最反直覺的招式——**主動綁住自己的手，反而讓你更強**。這是 Part II 的收尾（把純策略不夠用的故事補完），也是後面 Part III「重複賽局」的地基（重複就是序貫的特例）。\n\n## 從你已知的出發\n\n你寫過的系統裡，「順序」幾乎決定一切。\n\n想想 TLS 握手。它不是雙方同時把一堆參數丟出來碰運氣，而是嚴格的序貫：client 先送 `ClientHello`（我支援這些 cipher），server 看到之後才回 `ServerHello`（那我們就用這個）。每一步都建立在「我看到了你上一步做什麼」之上。如果你硬把它畫成一張同時出手的報酬矩陣，你會丟掉這個賽局**最重要的資訊**——誰看著誰反應。兩階段提交（2PC）也是：coordinator 先問「能 commit 嗎」，每個 participant 投票，coordinator 再根據投票結果決定廣播 commit 還是 abort。順序錯了，整個協定就垮了。\n\n再想一個更有「賽局味」的例子：circuit breaker。你的服務 A 對下游 B 設了熔斷器，邏輯是「B 你要是再給我吐 500，我就斷開連線，半開狀態探測通過才放你回來」。這句話本質上是一個**威脅**：「你再失敗，我就懲罰你（斷你）。」問題來了——這個威脅**可信**嗎？如果斷開 B 會讓 A 自己也直接掛掉（B 是 A 的關鍵依賴、沒有降級路徑），那這個威脅其實是空的：真到了那一步，A 為了自保根本不敢斷。B（如果它會算）就會看穿這點，繼續擺爛。反過來，如果 A 有 fallback、斷開 B 對自己幾乎無痛，那這個威脅就是**真的**——B 最好乖一點。\n\n「同樣一句威脅，可不可信取決於『真執行起來，威脅方自己會不會更慘』」——這就是本章的核心，賽局理論管它叫**可信威脅（credible threat）vs 空洞威脅（empty threat）**。納許均衡分不出這兩者，但我們接下來要造的工具——子賽局完美均衡——可以。\n\n還有一個你天天在用、卻可能沒意識到它是「賽局招式」的東西：**deprecation 公告**。你要逼大家從舊 API 遷到新 API，最有效的一招不是好言相勸，而是**公開宣布「舊 API 在 X 月 Y 日關閉」並且把日期釘死、寫進文件、發 email**。為什麼公開、為什麼釘死日期？因為這是在**燒掉自己的退路**——一旦公開承諾，你就很難再偷偷延期（延期的信譽成本太高了），於是大家知道「他這次是來真的」，遷移才會真的發生。你把「我可能會心軟延期」這個選項**主動砍掉**，反而讓你更強。這正是本章最反直覺的一頁：**承諾的價值來自放棄選擇。**\n\n## 從矩陣到樹：當賽局有了時間軸\n\n前面幾章的報酬矩陣有個隱藏假設：雙方**同時**選策略，誰都不知道對方選了什麼。剪刀石頭布是這樣，囚徒困境的標準版也是這樣（兩名囚犯被分開偵訊、同時決定招不招）。這類賽局叫**同時賽局（simultaneous game）**，用矩陣（賽局理論術語叫「標準式 normal form」，也譯策略式）表示剛剛好。\n\n但很多賽局是**序貫的（sequential）**：一方先動，另一方看到之後再動。這時候矩陣會丟掉關鍵資訊，我們要改用**展開式（extensive form）**，也就是**賽局樹**。\n\n賽局樹的三個零件，你看一眼就懂：\n\n```text\n賽局樹的解剖（讀法：從上往下、從根到葉）\n\n              [ 玩家1 ]            ← 決策節點（換誰出手）\n              /        \\\n         選 A /          \\ 選 B    ← 分支（一個可選的行動）\n            /              \\\n       [ 玩家2 ]         [ 玩家2 ]  ← 又一層決策節點\n        /    \\            /    \\\n       L      R          L      R\n      / \\    / \\        / \\    / \\\n   (報酬葉) ...                      ← 葉節點：(玩家1報酬, 玩家2報酬)\n\n  節點 = 「輪到誰決定」\n  分支 = 「他可以做什麼」\n  葉   = 「走到這條路徑，雙方各拿多少」\n```\n\n矩陣的每一格，現在變成樹的一片葉子（一條從根到底的完整路徑）。差別在於：樹**明確畫出了順序**——玩家 2 在自己的節點上，是**已經看到玩家 1 選了什麼**才動的。這個「看得到歷史」正是同時賽局沒有、序貫賽局才有的東西，也是「可信威脅」這整套概念能存在的前提。\n\n> 小提醒：如果序貫賽局裡後手**看不到**前手做了什麼（資訊隱藏），我們會用「資訊集（information set）」把後手分不清的節點圈起來——那其實就退化回同時賽局了。本章先處理**完全資訊（perfect information）**的序貫賽局：每一步，輪到的人都看得見之前發生的全部。資訊不對稱的序貫賽局（訊號賽局）留到 ch11。\n\n## 逆向歸納：從結局倒著想\n\n序貫賽局怎麼解？答案是一個你其實已經會的思路，只是賽局理論給它取了名字：**逆向歸納（backward induction）**。\n\n直覺一句話：**要知道現在該怎麼選，先想清楚『如果走到最後，理性的人會怎麼收尾』，然後一路倒推回來。** 你下棋算殘局、你做技術決策時問「假設三個月後這個方案真的上線了，那時候我會後悔嗎」，用的都是這個。\n\n機制是這樣（這是「工程師的嚴謹」級——每一步你都能口頭說出理由）：\n\n1. 找到樹**最底層**的決策節點（最後一個出手的人）。\n2. 在那個節點，輪到的玩家會選讓**他自己**報酬最大的分支。把不會被選的分支砍掉，這個節點就「塌縮」成一個確定的報酬。\n3. 往上一層。現在上一層的玩家做選擇時，**已經知道**下面的人會怎麼收尾（因為你剛算完了），所以他也能挑對自己最好的。\n4. 一路倒推到根。沿途留下的那條路徑，就是這個賽局的解。\n\n逆向歸納解出來的東西，有個正式名字叫**子賽局完美均衡（subgame-perfect equilibrium, SPE）**，這個精煉概念由 Reinhard Selten（澤爾騰）在 1965 年提出，他也因此與 Nash、Harsanyi 共獲 1994 年諾貝爾經濟學獎（「諾貝爾經濟學獎」嚴格說是瑞典央行紀念諾貝爾的經濟學獎，1969 起頒，並非諾貝爾遺囑裡的五個獎之一——但俗稱沿用）。SPE 的精神是：**一個均衡不只要在整局看起來穩，還要在『每一個子賽局』裡都站得住腳**——包括那些「實際上不會走到」的分支。為什麼這個要求這麼重要？因為它正是揪出「空洞威脅」的照妖鏡。我們用一個 worked example 把它算清楚。\n\n## Worked example：市場進入賽局——一個算出來的「空話」\n\n場景（這是 Selten 連鎖店悖論的單回合精簡版；連鎖店悖論出自 Selten 1978，而子賽局完美這個工具則是他 1965 年那篇就奠下的）：一家**新進者（Entrant）**考慮要不要進入某個市場，那裡已經有一個**在位者（Incumbent）**。賽局兩步走：\n\n- 第一步：新進者選 **進入（In）** 或 **不進入（Out）**。\n- 第二步：**如果**新進者進入了，在位者選 **打價格戰（Fight）** 或 **容忍共享市場（Accommodate）**。\n\n報酬設定（數字＝獲益點數，越大越好；(新進者, 在位者)）：\n\n```text\n市場進入賽局（賽局樹）\n\n                    [ 新進者 ]\n                   /          \\\n            In    /            \\   Out\n                 /              \\\n          [ 在位者 ]          (0, 10)   ← 新進者不進場，在位者獨佔大餅\n            /      \\\n     Fight /        \\ Accommodate\n          /          \\\n      (-1, 1)       (2, 5)\n   兩敗俱傷       共享市場\n   打價格戰       在位者讓一點、\n   雙方都流血      但比打仗好\n\n  報酬讀法：(新進者報酬, 在位者報酬)\n```\n\n先用逆向歸納解，再看一個很多人會掉進去的陷阱。\n\n**第一步：解最底層（在位者的節點）。**\n\n只有在「新進者已經進場」時，在位者才需要動。比較他的兩個選項：\n\n```text\n在位者面對「已經進場的新進者」，他自己的報酬：\n    Fight（打）       → 在位者得 1\n    Accommodate（容忍）→ 在位者得 5\n\n    5 > 1  ⇒ 理性的在位者選 Accommodate（容忍）\n```\n\n關鍵：**真到了那一步，打價格戰對在位者自己也是虧的**（1 < 5——打仗他也流血）。所以「我會打到底」這句話，**執行起來在位者自己更慘**。把 Fight 這條分支砍掉，在位者的節點塌縮成報酬 **(2, 5)**。\n\n**第二步：往上一層（新進者的節點）。**\n\n新進者現在知道：「如果我進場，理性的在位者會容忍，我拿 2。如果我不進場，我拿 0。」\n\n```text\n新進者的比較（已知在位者會容忍）：\n    In  → 走到 (2, 5)，新進者得 2\n    Out → (0, 10)，    新進者得 0\n\n    2 > 0  ⇒ 新進者選 In（進入）\n```\n\n**子賽局完美均衡＝（新進者：進入；在位者：容忍），結局 (2, 5)。**\n\n**自我複核（交叉驗算）。** 倒著走一遍：在位者節點 5>1 選容忍 ✓；新進者預期拿 2，2>0 選進入 ✓；路徑 In→Accommodate→(2,5)，沒有任何一方在自己出手的那一步能改善（新進者改 Out 從 2 掉到 0；在位者改 Fight 從 5 掉到 1）。穩。\n\n**現在看陷阱在哪。** 在位者其實**很想**威脅新進者：「你敢進來，我就打到你死（Fight），我們一起變 (-1, 1)，你別進來！」如果新進者**信了**這個威脅，他會算「進場會被打到 -1，不如 Out 拿 0」，於是乖乖不進場，結局 (0, 10)——在位者獨佔大餅。\n\n這個威脅**有用嗎**？逆向歸納說：**沒用，因為它不可信。** 真等新進者進來了，在位者站在自己的節點上，面對「打 → 我得 1」vs「容忍 → 我得 5」，他**不會**真的打——打仗傷的是他自己。新進者只要會算，就知道這個威脅是**空話（empty threat）**，照樣進場。\n\n這就是子賽局完美均衡比納許均衡強的地方。事實上，「在位者威脅打、新進者因此不進場」**這個策略組合在納許均衡的意義下是成立的**——給定新進者選 Out，在位者「我會打」的宣言沒被執行（因為沒人進場），所以新進者沒有單方面改善的動機（進場會被「打」），形式上沒人想偏離。**納許均衡分不出這個威脅是真是假**，因為它只檢查「均衡路徑上」沒人想偏離，不檢查那些「沒走到的分支」上玩家會不會說話不算話。子賽局完美均衡多要求一件事：**在每一個子賽局裡（包括「新進者已進場」這個實際上不會走到的子賽局），玩家的計畫都得是當下最佳反應**——一檢查，在位者的「打」立刻露餡（他到那會選容忍）。所以 (Out, 威脅打) 是納許均衡、卻**不是**子賽局完美均衡，被剔除了。\n\n**這就是「可信威脅 vs 空洞威脅」的精確定義**：一個威脅可信，若且唯若「真要執行時，威脅方確實會願意執行它」——也就是執行威脅在那個子賽局裡是威脅方的最佳反應。納許均衡放過空話，子賽局完美均衡抓住它。\n\n## 承諾：主動砍掉自己的選項，反而更強\n\n上面的故事裡，在位者輸在哪？輸在他**有選擇**。正因為真到了那一步他**可以**選容忍，他「我會打」的威脅才是空的。\n\n那如果在位者能**讓自己沒得選**呢？\n\n假設在位者進場前先做一件事：簽一份對外公開的合約——「只要有人進入我的市場，我**自動**啟動價格戰，違約賠 100」。現在重畫賽局：在位者的「容忍」選項報酬被那 100 的違約金壓垮了，他真的只剩「打」這條路。新進者一看，「進場 → 一定被打 → -1 < 0」，於是**不進場**，結局回到 (0, 10)。\n\n在位者透過**綁住自己的手**，把原本的空洞威脅變成了可信威脅，結果獨佔市場。**他放棄了一個選項（容忍），反而過得更好。**\n\n這就是**承諾（commitment）**的弔詭，也是 Thomas Schelling（謝林）在《The Strategy of Conflict》（衝突的策略，1960）裡反覆敲打的洞見：**在策略互動裡，「選項更少」可以是「力量更大」。** 他最有名的比喻是膽小鬼賽局（chicken）——兩台車對撞，誰先轉向誰輸。Schelling 說，最強的玩法是**當著對手的面，把方向盤拆下來丟出窗外**：現在你**無法**轉向了，對手看到你已經沒有退路，只好他先轉。你用「放棄轉向的能力」買到了勝利。\n\n歷史與生活裡到處是這招：將軍**燒掉自己身後的橋**讓士兵無法撤退（背水一戰）；國家把核反擊設計成**自動觸發**而非「總統再決定一次」（讓報復不依賴臨場的勇氣）。共同點都是：**把「我可能會軟」這個選項實體地砍掉，讓威脅變得不可逆，於是可信。**\n\n回到你的系統。前面說的 deprecation 公告就是工程版的「丟掉方向盤」：\n\n```text\n威脅可信度，取決於「執行起來威脅方自己慘不慘」\n\n  空洞威脅                         可信威脅（靠承諾鞏固）\n  ─────────────                    ──────────────────────\n  「舊 API 之後會關，               「舊 API 在 6/30 關閉」——\n   再看看吧」                        公開、釘死日期、寫進文件\n   ↓                                ↓\n  延期對你幾乎無痛                  延期的信譽成本被你自己拉到很高\n   ↓                                （改口＝公開打臉、文件全錯）\n  大家賭你會延 → 沒人遷移            ↓\n                                   大家知道你軟不了 → 真的去遷移\n\n  circuit breaker 也一樣：\n  「我會斷你」可信 ⇔ 斷開對 A 自己幾乎無痛（有 fallback／降級路徑）\n  如果斷開 B 會讓 A 一起掛 → 威脅是空的，B 看穿就繼續擺爛\n```\n\n設計可信威脅，工程上就是**讓「執行懲罰」對你自己足夠便宜**（給自己留 fallback、把承諾公開到難反悔）。這跟你在做容量規劃、SLA 協商時的直覺是同一回事：嘴上說的籌碼不值錢，能被驗證、不可逆的承諾才算數。\n\n## 把脊椎張力搬上時間軸：蜈蚣賽局\n\n到這裡你可能覺得，序貫賽局好像跟全書脊椎（那張囚徒困境矩陣）沒什麼關係。其實關係深得很——逆向歸納能造出**個體理性導致集體次優**的最純粹版本，叫**蜈蚣賽局（centipede game）**（Rosenthal，1981）。\n\n先回憶**ch01 那張矩陣**：T,R,P,S = 5,3,1,0，背叛是嚴格優勢策略，雙方各自最佳化 → (背叛,背叛)=(1,1)，明明 (合作,合作)=(3,3) 對雙方都更好。中央張力：**每個人都最佳化自己，結果集體更糟。** 在同時賽局裡，這個裂縫一次爆發。蜈蚣賽局把同一道裂縫**攤平在時間軸上**，讓你看著它一格一格地裂開。\n\n規則：桌上有一筆會長大的錢。兩個玩家輪流決定「**拿（Take）**」還是「**讓（Pass）**」。只要有人選拿，賽局立刻結束、按當下分錢；只要兩人都讓，桌上的錢就翻倍、輪到下一個人。**錢越往後越多，但每一步輪到的人，「現在就拿」永遠比「讓給對方、然後被對方拿走」多一點點。**\n\n這個賽局有個招牌弔詭，數學細節指向延伸閱讀，這裡給一組**倒推方向絕對乾淨、你能逐步驗算**的報酬（四步版，桌上的餅越往後越大；報酬 (玩家1, 玩家2)）：\n\n```text\n蜈蚣賽局（四步版；每個節點輪到的人選 Take 結束 或 Pass 交棒）\n\n  玩家1      玩家2      玩家1      玩家2\n   ●─Pass──→ ●─Pass──→ ●─Pass──→ ●─Pass──→ (6, 9)  ← 都讓到底\n   │         │         │         │\n  Take      Take      Take      Take\n   │         │         │         │\n   ▼         ▼         ▼         ▼\n (4, 1)    (3, 6)    (8, 5)    (7, 10)\n\n  設計性質（每一步，輪到的人「現在 Take」嚴格優於「Pass 後被對方 Take」）：\n    玩家1 第1步 Take 得 4 > 若 Pass、玩家2 第2步 Take 時自己只得 3\n    玩家2 第2步 Take 得 6 > 若 Pass、玩家1 第3步 Take 時自己只得 5\n    玩家1 第3步 Take 得 8 > 若 Pass、玩家2 第4步 Take 時自己只得 7\n  桌上的餅越往後越大（每停一步的總和：第1步 5、第2步 9、第3步 13、\n  都讓到底 15、第4步 17）——越晚停，餅越大。關鍵的悲劇在於：逆向歸納\n  會讓玩家1 在「餅最小」的第1步就 Take（總和 5、結局 (4,1)），而只要\n  願意往後讓，(6,9) 對雙方都嚴格更好（6>4、9>1）。\n```\n\n逆向歸納從**最後一個節點**倒著解，注意這組數字讓每一步的結論都無懈可擊：\n\n```text\n逆向歸納（從右往左，每步都驗一次）：\n  第4步（玩家2）： Take 得 10  vs  Pass 到底得 9   → 10>9，玩家2 選 Take。\n  第3步（玩家1）： Take 得 8   vs  Pass（玩家2 接著 Take，自己拿 7） → 8>7，選 Take。\n  第2步（玩家2）： Take 得 6   vs  Pass（玩家1 接著 Take，自己拿 5） → 6>5，選 Take。\n  第1步（玩家1）： Take 得 4   vs  Pass（玩家2 接著 Take，自己拿 3） → 4>3，選 Take。\n\n  結果：玩家1 在第一個節點就 Take，賽局秒結束、結局 (4,1)。\n        明明一路 Pass 到底 (6,9) 對兩人都好得多。\n```\n\n**看出來了嗎？這跟 ch01 那張矩陣是同一道裂縫。** 囚徒困境裡，兩個理性玩家各自選優勢策略 → (1,1)，集體最優 (3,3) 達不到。蜈蚣賽局裡，每一步的理性選擇（現在 Take 比 Pass 後被對方 Take 好）像骨牌一樣連鎖，把雙方早早趕下車——逆向歸納讓玩家1 在「餅最小」的第一步就 Take (4,1)，而只要願意往後讓，雙方都能爬到對彼此都更好的局面（如 (6,9) 對 (4,1) 是雙贏）。**個體理性，一步一步、無懈可擊地，把集體推向次優。** 差別只是：囚徒困境一槍斃命，蜈蚣賽局凌遲——你能眼睜睜看著逆向歸納的每一刀。\n\n有意思的是（這是個誠實的 hedge）：真人玩蜈蚣賽局，**幾乎都不會第一步就拿**——McKelvey 與 Palfrey 1992 年發表於 Econometrica 的實驗顯示，人類會合作著往後讓好幾步，行為「嚴重偏離」子賽局完美均衡的預測。這跟人類玩囚徒困境其實會合作（ch12 細談）是同一種「真人沒那麼冷血」的現象。逆向歸納是**理性的鐵律**，但它預測的是「完全理性、且共同知道彼此完全理性」的玩家——這個假設本身就值得懷疑（這也是蜈蚣賽局被當成「逆向歸納悖論」的原因）。\n\n而本書一路在講的**救火工具**，這裡又冒頭了：承諾。如果玩家 1 能在開局前**可信地承諾**「我會一路 Pass 到至少第三步」，並且讓對方相信，雙方就有機會爬到更高的報酬。**承諾、重複（ch07）、機制設計（ch13）——這些都是『個體主動綁住自己、去逼出集體較好結果』的同一類工具，本章把它搬到了時間軸上。**\n\n## 直覺的陷阱\n\n序貫賽局最容易把人帶溝裡的，是「威脅」與「先動」這兩件事。挑兩個具名陷阱講透。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步騙你 | 怎麼自我察覺（正確版） |\n|---|---|---|---|\n| **空洞威脅當真** | 「對方放話說會報復，所以我得退讓」 | 你只看到威脅被**說出口**，沒檢查「真要執行時，威脅方自己會不會更慘」 | 倒著想：站在威脅方的最後一個節點上，執行威脅 vs 不執行，哪個對他自己報酬高？如果不執行更高，這威脅就是空話——納許均衡看不穿、逆向歸納能 |\n| **先動一定有利（先動者優勢迷思）** | 「序貫賽局裡先出手的人佔便宜」 | 你把「先動 = 主導」當成普遍法則 | 看賽局結構：先動有利**只在**「先承諾能改變後手的最佳反應」時成立。很多賽局是**後動有利**（後手看到前手底牌再出招，如討價還價的還價方、剪刀石頭布若有人先亮手）。先動是優勢還是劣勢，取決於「資訊」與「承諾」哪個更值錢——沒有通則 |\n\n第三個更隱蔽、值得單獨點出的：**「逆向歸納＝賽局理論的鐵律，所以人就會這樣玩」。** 不對。逆向歸納告訴你「完全理性、且彼此共同知道對方完全理性」的玩家會怎麼玩；它是一個**規範性**的解（理性應該如何），不是**描述性**的預測（人實際如何）。蜈蚣賽局就是最大的反例——理論說秒結束，真人合作好幾步。把逆向歸納的結論直接當成「人類行為預測」，是濫用（ch12 會把這條線劃清楚）。徵兆：當你發現「理論說 A，但所有真人都做 B」，別急著說人不理性，先問「是不是『完全理性的共同知識』這個假設本來就不成立」。\n\n## 紙上推演\n\n### 第 1 題：解一棵小賽局樹（★★，20 分鐘）\n\n兩家公司，**挑戰者**先決定要不要發動價格戰搶市占，**龍頭**再回應。報酬 (挑戰者, 龍頭)：\n\n```text\n                  [ 挑戰者 ]\n                 /          \\\n        發動戰  /            \\  不發動\n               /              \\\n         [ 龍頭 ]            (0, 6)\n          /     \\\n   反擊  /       \\  退讓\n        /         \\\n    (-2, 0)      (3, 2)\n```\n\n用逆向歸納求子賽局完美均衡。挑戰者會發動價格戰嗎？龍頭「我會反擊到底」的威脅可信嗎？\n\n### 推演解答\n\n**底層（龍頭）**：龍頭只在「挑戰者已發動」時動。反擊得 0，退讓得 2，**2 > 0 → 龍頭選退讓**，節點塌縮成 (3, 2)。\n\n**上層（挑戰者）**：已知龍頭會退讓，發動 → 得 3；不發動 → 得 0。**3 > 0 → 挑戰者發動。**\n\n**子賽局完美均衡 =（挑戰者：發動；龍頭：退讓），結局 (3, 2)。**\n\n「龍頭會反擊到底」**不可信**——真打起來龍頭自己從 2 掉到 0，他不會做。挑戰者看穿這點，照樣發動。**常見錯路**：看到龍頭嘴上能威脅反擊（把挑戰者壓到 -2），就以為挑戰者會怕而不發動。這正是「空洞威脅當真」——你沒檢查龍頭執行威脅時自己更慘。注意：(不發動, 反擊) 其實是個納許均衡（挑戰者不發動，龍頭的「反擊」沒被執行也就沒露餡），但它**不是**子賽局完美均衡，被逆向歸納剔除。\n\n### 第 2 題：一個「公開承諾反而讓你更強」的工程／生活例子（★★，15 分鐘）\n\n舉一個你工作或生活裡「主動砍掉自己的選項、結果反而過得更好」的例子，並用本章語言解釋為什麼。\n\n### 推演解答\n\n工程例（deprecation 死線）：你要逼內部團隊從舊的計費 SDK 遷到新版。**做法**：在 RFC 與全公司 em
