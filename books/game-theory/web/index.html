(接受) = 1 − 0.5×98 = 1 − 49 = −48\n     −48 < 0 → 拒絕。  ← 標準理論說「該接受」，但加了公平項後 B 拒絕\n\n  提議 (80, 20)：\n     差距 = 80 − 20 = 60\n     U_B(接受) = 20 − 0.5×60 = 20 − 30 = −10\n     −10 < 0 → 拒絕。  ← 白拿 20 元，他還是拒絕\n\n  提議 (70, 30)：\n     差距 = 70 − 30 = 40\n     U_B(接受) = 30 − 0.5×40 = 30 − 20 = +10\n     +10 > 0 → 接受。\n\n  找「臨界提議」：U_B(接受) = 0 的那一點。\n     設 B 拿 b、A 拿 100−b，差距 = (100−b) − b = 100 − 2b\n     令  b − 0.5×(100 − 2b) = 0\n         b − 50 + b = 0\n         2b = 50\n         b = 25\n     → B 的拒絕門檻 ≈ 25%。給 B 少於 25 元，他拒絕；25 元以上，接受。\n```\n\n看那個結果：**25%**。我們隨手取了 β = 0.5，就湊出了一個落在真人實測「20%~30% 拒絕門檻」正中央的數字。這不是巧合在於數字本身（β 是我挑的），而是巧合在於**這個結構天生會產出一個「正的拒絕門檻」**——只要回應者的效用裡有一個正的不公平懲罰項，他就會理性地拒絕足夠低的提議。換句話說，「拒絕白拿的錢」不是理性的反例，而是**在一個更完整的報酬定義下，理性的必然結論**。\n\n現在把提議者也補完，整個均衡就閉合了。A 如果**知道** B 的拒絕門檻是 25%，他用逆向歸納（ch06）會怎麼出？\n\n```text\n提議者 A 的逆向歸納（已知 B 在 b < 25 時會拒絕）\n\n  A 想最大化自己拿到的 a = 100 − b，但前提是 B 得接受（否則 A 拿 0）。\n  \n    給 b = 1   → B 拒絕 → A 拿 0      ✗ 貪心反而歸零\n    給 b = 25  → B 剛好接受 → A 拿 75  ✓ 在「會被接受」的前提下 A 拿最多\n    給 b = 40  → B 接受 → A 拿 60      ✗ 給多了、A 少賺\n\n  純自利的 A 的最佳提議：給 b = 25（壓在門檻上），自己拿 75。\n```\n\n於是模型預測 A 給 25%、B 接受。真人實測 A 常給 40%~50%，比這還慷慨一些——那是因為真人提議者往往**也**有公平偏好（不只是怕被拒，自己也覺得太貪心不舒服），或者對 B 的門檻沒把握、寧可給多一點買保險。但關鍵的定性結論已經到手：**一旦把公平寫進報酬，「給近半、拒絕低提議」從『不理性的異常』變成『理性的均衡』。** 我們沒有放棄理性，我們只是修對了報酬矩陣。\n\n### 自我複核：兩個視角交叉驗算\n\n讓我用兩個角度檢查上面的門檻沒算錯。\n\n```text\n複核一（直接代門檻值 b=25）：\n   差距 = (100−25) − 25 = 75 − 25 = 50\n   U_B(接受) = 25 − 0.5×50 = 25 − 25 = 0  ✓ 恰好臨界，與「拒絕門檻=25%」一致\n\n複核二（極端情形 sanity check）：\n   若 β = 0（完全不在意公平）：門檻 b 滿足 b − 0 = 0 → b = 0\n   → 退化回標準理論：接受任何正提議。 ✓ β=0 時模型必須還原成「純自利」，它做到了\n\n複核三（單調性 sanity check）：\n   β 越大（越在意公平）→ 100−2b 的係數越大 → 解出的門檻 b 越高。\n   β=0.5 → 25%；若 β=1 → b − 1×(100−2b)=0 → 3b=100 → b≈33%。\n   → 越在意公平、拒絕門檻越高，方向合理。 ✓\n```\n\n三個複核都對：臨界點吻合、β=0 退化回標準理論、β 越大門檻越高。這個模型是「直覺版」——它把一個複雜的人類情緒壓成一條線性懲罰，真實的公平感絕不只這麼簡單（Fehr–Schmidt 原模型還有「自己佔便宜也不舒服」的另一項，嚴格版指向延伸閱讀）。但它足以說清楚那個驚嘆點：**拒絕白拿的錢，是理性的——前提是你承認報酬不只有錢。**\n\n## 信任賽局：把「相信對方會還」量化\n\n公平不是報酬矩陣外唯一的東西。另一個你天天在系統裡處理、卻很少叫它名字的東西，是**信任（trust）**。賽局理論有一個專門的實驗來量它——**信任賽局（trust game）**，也叫投資賽局（investment game），由 Berg、Dickhaut、McCabe 三人在 **1995 年**設計。\n\n```text\n信任賽局 / 投資賽局（Berg–Dickhaut–McCabe 1995）\n\n  玩家 A（投資者）與玩家 B 一開始「各」拿到一筆本金，比方說各 10 元。\n  \n  第一步：A 決定把自己本金的多少（0~10 元）「投資」給 B。\n          這筆錢在路上會「乘三倍」——A 投 x，B 收到 3x（B 本來那 10 元不動）。\n  \n  第二步：B 收到 3x 後，從手上（本金 10 + 收到 3x）決定「回送」多少給 A（0 ~ 都行）。\n          B 回送多少完全由 B 自己決定，沒有任何強制。\n  \n  只玩一次、互不相識、無重複、無聲譽、無合約。\n```\n\n這個賽局的精妙在於它把「信任」拆成了兩半，而且兩半都可以用錢量出來：\n\n- **A 投出去的錢，就是 A 對 B 的信任量。** 投越多，代表 A 越相信 B 會回報。投 0 代表完全不信。\n- **B 回送的錢，就是 B 對信任的回報（reciprocity，互惠）。** B 大可以全部吞掉。\n\n先解標準理論的預測，又是一次逆向歸納：\n\n```text\n逆向歸納：標準理論（雙方純自利）\n\n  最後一步先看 B：B 手上有 3x，回送任何一塊錢都是純損失。\n     純自利的 B → 回送 0。  ← B 把 3x 全吞了\n\n  A 預見「B 會吞光」，往回推：\n     A 投出的任何 x，回收都是 0，等於白白損失 x。\n     純自利的 A → 投 0。  ← 一毛都不投\n\n  標準理論均衡：A 投 0、B 沒機會回送。雙方各留 10 元本金，合作完全沒發生。\n```\n\n注意這個結局有多慘：A 投 0、B 收 0，兩人各留著一開始的 10 元，**社會總財富完全沒有增長**（總和維持 20 元）。可是這個賽局藏著一個巨大的合作紅利——那筆「乘三倍」。如果 A 敢投全部 10 元，B 收到 30 元（加上本來的 10，手上 40），只要 B 願意回送 15 元，**兩個人都比一開始更有錢**（A 從 10 變 15、B 從 10 變 25，總和從 20 漲到 40）。標準理論的悲劇在於：這個對雙方都好的結局，**靠純自利達不到**，因為它要求 B 在最後一步「明明可以吞光、卻選擇回報」。\n\n這結構你應該覺得眼熟——它就是脊椎困境（ch01）換了件衣服。**個體理性（B 吞光、A 不投）導致集體次優（合作紅利蒸發）**，正是全書中央張力。而真人怎麼玩？Berg 等人的原始實驗裡，A 平均投出超過一半的本金，B 也確實回送了相當的金額——三十二組裡有三十組違背了純自利預測。**真人會信任，也會回報信任**，即使在一次性、匿名、無任何強制的情境下。\n\n這跟你的工程直覺是接得上的。你給一個有良好歷史的 client 更高的配額，不是因為合約逼你，而是因為你「信任」它不會濫用——你在投資一段關係。而當它真的守規矩，你更願意放寬。當它某次突然爆量、像在佔便宜，你的信任會瞬間縮回去。這整套動態，就是信任賽局在重複版本裡的樣子（重複如何把合作救回來，是 ch07/ch08 的主場；本章只標出「信任」這個量在一次性賽局裡就已經違背純自利預測了）。\n\n## 中央張力的反向案例：當集體理性被寫進個人效用\n\n到這裡，值得把這一章放回全書的脊椎來看，因為它在中央張力上做了一件前面所有章都沒做的事。\n\n全書到目前為止，「個體理性 vs 集體理性」一直是一道**裂縫**：每個人最佳化自己（個體理性），結果集體更糟。囚徒困境裡背叛佔優、共享資源被各自耗盡、信任賽局裡 B 吞光——個體的算盤和集體的好處朝相反方向拉。我們找到的救火工具（重複、聲譽、機制設計）都是**從外部**把集體理性塞回來：用未來懲罰、用名聲、用改寫的規則，逼個體的算盤指向集體好的方向。\n\n公平偏好是一個**不一樣**的故事，我認為這是它在全書裡最值得玩味的位置。在最後通牒賽局和信任賽局裡，集體理性不是被外力塞回來的——它被**內化進了個體的效用函數**。真人之所以拒絕「不公平但正報酬」，正是因為他把「公平、互惠」這些原本屬於集體層面的價值，算進了自己的個人偏好。一旦「報酬」不只有錢、集體的好被寫進個體最佳化的目標，**個體理性與集體理性就在這裡部分彌合，而不是分裂**。B 拒絕低提議是個體理性的（最大化他含公平項的效用），同時也維護了一種集體規範（不公平的提議不該得逞）。兩者在這裡指向同一邊。\n\n```text\n中央張力：脊椎困境 vs 本章的反向案例\n\n  脊椎困境（ch01）：       公平偏好（ch12）：\n    個體理性 ──┐             個體理性 ──┐\n               ↓ 分裂                   ↓ 彌合\n    集體理性 ──┘             集體理性 ──┘\n    （各自最佳化 → 集體更糟）  （集體價值被寫進個體效用 → 兩者同向）\n\n  差別在「集體的好」放在哪裡：\n    困境裡它在報酬矩陣「之外」，要靠外力（重複/聲譽/機制）拉回來。\n    公平裡它被搬進報酬矩陣「之內」，個體最佳化時就自動顧到它。\n```\n\n這給了「合作如何可能」一個全書其他地方沒給的答案。前面的答案都是條件式的——合作要靠未來夠長（ch07）、要靠 δ 夠大（ch08）、要靠設計對的機制（ch13）。公平偏好提供的答案是：**如果合作的價值能被內化進個體的偏好，合作就不必只靠外力**。一個真心在意公平與互惠的群體，不需要每筆交易都靠合約和懲罰撐著。這既是好消息（人類確實演化出了這種內化，ch09 的演化視角能談為什麼），也是一個誠實的提醒——它**不是普世常數**，下一節就講。\n\n## 一個誠實的但書：公平不是普世常數\n\n我必須在這裡 hedge 一個容易被過度推論的點，否則這一章會變成廉價的「人性本善」宣言。\n\n「真人會為公平付代價」是穩固的；但「拒絕門檻是 20%~30%、提議者給近半」**不是寫死的人類常數**。跨文化實驗顯示，這些數字會隨社會結構大幅變動。最有名的是 Henrich 等人在多個小規模社會做的研究：祕魯亞馬遜的 Machiguenga（馬奇根加）族受試者，平均只提議給對方約 26%，而且回應者幾乎接受任何低於 20% 的提議——他們事後解釋是「我幹嘛拒絕白來的錢」。同一個賽局，在 UCLA 學生身上提議者平均給 48%、沒人提議低於 20%。**同樣的報酬矩陣，不同文化玩出不同的均衡。**\n\n這告訴我們兩件事，都很重要：\n\n1. 那個「公平項」係數 β——一個人對不公平有多在意——**是文化與社會結構塑造的，不是物理常數**。一個高度仰賴匿名市場交易與互惠合作的社會，會養出較高的 β；一個交易多在親屬間、不太跟陌生人做一次性買賣的社會，β 較低。報酬矩陣外的東西，本身是被環境寫進去的。\n2. 對你的工程實踐而言：**你不能假設你的使用者的「公平感」跟你的一樣。** 你覺得天經地義的計費規則，在另一個市場、另一個用戶群裡可能被讀成羞辱。公平是真的、但它的校準值因人因地而異——這正是為什麼這一章叫「人類實際怎麼玩」，而不是「人類普世這樣玩」。\n\n到此這一章的定位就清楚了：它不是要你把「公平」當成新的鐵律去算，而是要你**鬆動一個假設**——「報酬等於金錢」。真人的報酬矩陣裡裝著公平、互惠、信任、被尊重；這些東西可以被量化（用一個效用項）、可以被預測（在同一文化內相當穩定）、也會被你設計的規則觸發或激怒。賽局理論沒有因此失效——恰恰相反，它告訴你**該往報酬矩陣裡多放幾欄**。\n\n## 直覺的陷阱\n\n這一章專治一個流傳極廣的誤解，外加幾個它的近親。\n\n| # | 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| 1 | 「人會拒絕白拿的錢 ⇒ 人是不理性的」 | 把「理性」偷偷等同於「只關心錢」。一旦回應者效用裡有公平項，拒絕低提議就是**最大化效用**的理性選擇——不理性的是你的報酬定義，不是那個人 | 理性 ≠ 自利。拒絕「不公平但正報酬」是**理性地最大化一個含公平項的效用**。錯的是「報酬＝金錢」這個假設，不是人 |\n| 2 | 「公平偏好證明賽局理論不適用於真人」 | 把「標準理論的某個假設錯了」誤讀成「整套工具錯了」。其實只要把效用修對，納許均衡、逆向歸納這些工具照樣運轉 | 賽局理論沒被推翻，被修的是**輸入**（報酬要含公平/互惠），不是**方法**。修對報酬後行為又變回均衡 |\n| 3 | 「人性本善，所以合作是預設」 | 把「真人有公平偏好」過度推成「合作不需要條件」。但公平偏好的強度有文化變異、也擋不住大群體的搭便車 | 公平偏好讓合作**更容易**，不是**保證**。它是「報酬矩陣外的一欄」，不是廢除困境的萬靈丹（共有財悲劇見 ch16 仍會發生） |\n| 4 | 「拒絕門檻 20–30% 是人類常數」 | 把幾個西方大學樣本當全人類。Machiguenga 的 26% 提議、近乎全接受，直接反例 | 公平**偏好的存在**穩固，**校準值（β、門檻）有文化變異**（Henrich 跨文化研究）。別把實驗室數字當物理常數（跨文化變異，2026-06 仍是研究中的活問題） |\n| 5 | 「提議者給近半是出於善良」 | 把策略性的計算當成道德。提議者給多，很大一部分是**怕被拒**（逆向歸納預見 B 的門檻）的理性反應，不必然是利他 | 給近半混合了兩個動機：自己的公平偏好 + 對「B 會拒絕低提議」的理性預期。後者是純策略，不需要善良 |\n\n自我察覺的徵兆：如果你發現自己在用「他就是不理性」來解釋某個使用者行為，那通常是個訊號——你的報酬模型漏了一欄。停下來問：**這個人除了錢，還在最大化什麼？**（被尊重？公平？掌控感？不被當盤子？）把那一欄補進去，他的行為十之八九會變回理性的。「不理性」是建模偷懶的藉口，不是答案。\n\n## 紙上推演\n\n### 推演題一（★★，20 分鐘）：把「拒絕」翻譯成「公平值多少錢」\n\n某人在最後通牒賽局（總額 100 元）中，**拒絕了「對方拿 90、他拿 10」的提議**，但**接受了「對方拿 75、他拿 25」的提議**。用本章的效用模型 U_B(接受) = b − β·max(a−b, 0)，反推這個人的公平係數 β 落在什麼範圍。換句話說：他心裡「被佔便宜的不爽」每一塊錢差距值多少？\n\n提示：拒絕 (90,10) 代表在 b=10 時 U_B(接受) < 0；接受 (75,25) 代表在 b=25 時 U_B(接受) ≥ 0。兩個不等式夾出 β。\n\n### 推演解答\n\n```text\n列兩個不等式（差距 a−b = (100−b) − b = 100 − 2b）：\n\n  拒絕 (90,10)：b=10，差距 = 100 − 20 = 80\n     U_B = 10 − β·80 < 0\n     → β > 10/80 = 0.125\n\n  接受 (75,25)：b=25，差距 = 100 − 50 = 50\n     U_B = 25 − β·50 ≥ 0\n     → β ≤ 25/50 = 0.5\n\n  夾出：0.125 < β ≤ 0.5\n```\n\n**解讀**：這個人的公平係數在 0.125 到 0.5 之間。白話講——「對方每比我多拿 1 元，我的痛苦折算成 0.125 到 0.5 元之間」。他不是無限在意公平（β 不到 1，否則連 (75,25) 都會拒），也不是完全不在意（β > 0.125，否則 10 元他就收了）。**這就是把一個道德情緒（被佔便宜的憤怒）翻譯成一個可量化的報酬欄位**——這正是本章要你帶走的能力。\n\n常見錯路：① 忘記差距是 a−b 而誤用 a（對方拿的絕對值），算出的門檻會錯。② 把「接受」的不等式寫成嚴格 < 0，邊界搞反——接受是 U_B ≥ 0。③ 只用一個提議就想定出 β 的單一值；單筆交易只能給出一邊的界，要**兩筆**（一拒一接）才能夾出區間。\n\n### 推演題二（★★，15 分鐘）：信任賽局裡，純自利為什麼讓合作蒸發\n\n信任賽局：A 與 B 各有本金 10 元，A 投資額乘三倍給 B，B 自行決定回送多少。假設雙方都純自利（只關心自己最後拿到的錢、無重複、無聲譽）。\n\n(a) 用逆向歸納證明：純自利下唯一的結局是「A 投 0」。\n(b) 指出這個結局蒸發掉了多少「合作紅利」——也就是，若 A 投全部、B 回送一半，雙方各拿多少，比起 (a) 的結局好多少。\n\n### 推演解答\n\n```text\n(a) 逆向歸納（從最後一步倒推）：\n    最後一步是 B：B 手上有「本金 10 + 收到 3x」，回送任何金額都是純損失（他自己少拿）。\n       純自利 B → 回送 0。  對任何 x 都成立。\n    A 預見「不管投多少，回收都是 0」：\n       A 投 x → 自己剩 (10 − x)，回收 0 → 最終 (10 − x)。\n       要最大化 (10 − x) → 投 x = 0。\n    唯一均衡：A 投 0、B 無動作。雙方各留本金（A:10, B:10），合作零發生。\n\n(b) 合作紅利的蒸發：\n    若 A 投全部 10 → B 收到 3×10 = 30（加上本金 10，手上 40）。\n       B 回送 15 → A 最終拿 0 + 15 = 15、B 最終拿 40 − 15 = 25。\n       合計 40。\n    對比 (a) 的純自利結局：A 拿 10、B 拿 10，合計 20。\n    蒸發掉的合作紅利 = 40 − 20 = 20 元（那筆「乘三倍」放大出來、卻沒人敢碰的錢）。\n    A 個人：15 vs 10，多賺 5；B 個人：25 vs 10，多賺 15；總體：40 vs 20，多出 20。\n```\n\n**解讀**：這就是脊椎困境換衣服——個體理性（B 吞光所以 A 不投）導致集體次優（20 元合作紅利消失）。真人之所以投得出去、也回送，靠的正是「報酬矩陣外的東西」：信任與互惠被算進了效用。\n\n常見錯路：① 以為 B「應該」回送以維持名聲——本題明設**無重複無聲譽**，純自利 B 在最後一步沒有任何理由回送，名聲動機要等 ch07/ch08 重複版才登場。② 把合作紅利算成 40（合作結局的財富總額）而非「相對純自利結局（20）多出的 20」；紅利是**淨增量**，不是總額。\n\n### 推演題三（★★★，20 分鐘）：口頭題——「人會拒絕白拿的錢」為什麼不代表人不理性\n\n不准用紙筆。對著一個只聽過「賽局理論假設人都自私理性」的工程師同事，用 90 秒講清楚三件事：①最後通牒賽局裡標準理論預測什麼、真人做了什麼；②為什麼「拒絕白拿的錢」可以是**理性**的；③這跟「人是不理性的」這個廉價答案差在哪、為什麼後者其實沒解釋任何東西。\n\n### 推演解答\n\n一個合格的口頭回答應該長這樣（自己講完對照）：\n\n> 「標準理論說：給你 1 元也比 0 元好，所以你該接受任何正提議，提議者於是把你壓到 1 元。但真人面對『對方拿 90、你拿 10』，會直接拒絕，寧可兩人都歸零。看起來像是『人不理性、放著錢不拿』——但這個解釋是假的。真正發生的是：他最大化的不只是錢包，還包括『不被當盤子佔便宜』這份感受。一旦你把那份不爽算進他的報酬，拒絕 10 元就是**理性**的——他用 10 元換掉了那份羞辱，淨值對他是划算的。所以理性沒被推翻，被推翻的是『報酬等於金錢』這個假設。而『人不理性』之所以是廉價答案，是因為它什麼都預測不了——它說不出拒絕門檻為什麼穩定落在 20–30%、提議者為什麼**預見**到而主動給近半。把公平算進報酬，這些全都能算出來、能設計。」\n\n**判分點**：有沒有把「理性」和「自利」明確拆開（②的核心）；有沒有指出錯的是報酬定義而非方法；有沒有講出「不理性」是建模偷懶（③，不能只說它錯、要說它為什麼沒解釋力——預測不出門檻數字）。漏掉第③點是最常見的不及格——很多人能講前兩點，卻把「人不理性」當成一個合法的競爭解釋，沒看穿它根本不是解釋。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 最後通牒賽局的標準理論預測是什麼？為什麼逆向歸納會推出「提議者只給最小正數」？\n2. 真人拒絕「不公平但正報酬」的提議——為什麼這**不**等於「人是不理性的」？「理性」和「自利」差在哪？\n3. 在本章的效用模型 U_B = b − β·max(a−b,0) 裡，β 代表什麼？把 β 調到 0，模型會退化成什麼？這個退化為什麼是模型「正確」的證據？\n4. 信任賽局裡，純自利的標準理論為什麼預測「A 一毛都不投」？這個結局蒸發掉了什麼？它和脊椎囚徒困境的中央張力是同一回事嗎，怎麼說？\n5. 為什麼說公平偏好是全書中央張力的「反向案例」？「集體理性被寫進個體效用」跟前面章節（重複、機制設計）把集體理性塞回來的方式，差在哪？\n6. Machiguenga 的跨文化結果告訴我們公平偏好的哪個部分是穩固的、哪個部分有變異？為什麼這對你設計跨市場的計費方案是個警告？\n7. 為什麼提議者「給近半」不能簡單歸因於善良？裡面混了哪個純策略性的動機？\n8. 如果你發現自己在用「使用者就是不理性」解釋某個行為，本章建議你改問什麼問題？\n\n## 延伸閱讀\n\n- **Güth, Schmittberger & Schwarze (1982), \"An experimental analysis of ultimatum bargaining\"**（*Journal of Economic Behavior & Organization*）——最後通牒賽局的原始論文。想看「近半提議、低提議被拒」這個結果第一次被記錄下來的樣子，讀它的結果表。\n- **Berg, Dickhaut & McCabe (1995), \"Trust, Reciprocity, and Social History\"**（*Games and Economic Behavior*）——信任/投資賽局的原始設計。讀它怎麼用「乘三倍 + 自由回送」把抽象的「信任」變成可以拿尺量的錢。\n- **Henrich et al. (2001/2005), 跨文化最後通牒賽局研究**（如 *Behavioral and Brain Sciences* 的 \"Economic man in cross-cultural perspective\"）——十五個小規模社會的對照。讀它你會徹底戒掉「實驗室數字是人類常數」的習慣；Machiguenga 那一段尤其打臉。\n- **Fehr & Schmidt (1999), \"A Theory of Fairness, Competition, and Cooperation\"**（*Quarterly Journal of Economics*）——本章玩具效用模型的嚴格版（不公平趨避）。想看「把公平寫進效用函數」怎麼被正式做成可預測多種賽局的模型，讀這篇；它是行為經濟學被引用最多的文獻之一。\n- **Colin Camerer, *Behavioral Game Theory*（2003）**——把「真人怎麼玩賽局」整本講透的標準參考書。當你想知道公平、信任、有限理性怎麼系統性地修正標準預測，這是入口。\n- 跨書：一個人面對不確定該怎麼選的**規範基準**（效用為什麼不等於金額、期望效用怎麼來），見《在不確定中下注》談單人理性與期望效用那本；公平偏好背後的**心理機制**（為什麼憤怒、為什麼互惠），見《思考的陷阱》談認知與情緒驅動推理那本。本章只負責把「報酬＝金錢」這個假設鬆開，不深入這兩塊。\n"}, {"id": "ch13-mechanism-design", "file": "ch13-mechanism-design.md", "group": "Part V — 反過來設計賽局", "title": "ch13 — 機制設計總論：如果你能改報酬矩陣", "md": "# ch13 — 機制設計總論：如果你能改報酬矩陣\n\n> **本章解決什麼問題**：前面十二章，你都站在「玩家」的位子上——賽局擺在那裡，你想辦法在裡面活得好一點。困境裡你算出背叛是優勢策略、零和裡你算出該怎麼混合、重複賽局裡你算出 δ 要多大合作才撐得住。但你始終是**被規則統治的人**。進 Part V，視角整個翻過來：如果你不是玩家，而是**訂規則的人**呢？如果報酬矩陣不是天上掉下來的、而是**你寫的**呢？這就是機制設計（mechanism design）——前面是「給定賽局，求結局」，這裡是「給定你要的結局，反過來設計賽局，讓一群只顧自己的理性玩家，自動把你要的結果生出來」。它是賽局理論的工程化，也是你身為後端工程師其實**天天在做、只是沒這樣稱呼它**的事。本章是 Part V 的總論；下一章（ch14）拿拍賣當招牌成功案例，ch15 拿投票當對照的壞消息。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果   ◄ 你在這裡\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n## 從你已知的出發\n\n我先給你一個你已經做過、而且做過很多次的事，然後告訴你它有個學名。\n\n你設計過 rate limit。不是「拒絕超量請求」那種笨版本，是聰明版本：你想讓每個 client **誠實申報**自己接下來大概要用多少配額，好讓你提前配置容量、不要被突發流量打爆。問題是——client 沒有理由跟你說實話。你問他「你需要多少」，純自利的他會回答「越多越好」，因為多要不用付代價、預留著總比不夠好。於是每個人都超額申報，你的容量規劃變成一堆灌水數字，毫無參考價值。\n\n這裡有個你很熟的結構：**對方握有你不知道的私有資訊（他真正的用量），而他沒有動機跟你說實話。** 你不能靠「拜託大家誠實一點」解決——那是道德訴求，不是工程。你能做的，是**改設計**：把 rate limit 規則改成「申報多少、就保證多少，但你保留的配額即使沒用到也照算錢／照佔你的信用額度」。突然之間，超額申報變成有代價的事——你多報的部分要嘛花錢、要嘛吃掉你下次的優先順序。現在，對一個純自利的 client 來說，**照實申報變成最划算的選擇**。你沒有改變任何人的本性，你改變的是**報酬**。誠實從一種美德，變成一種自利。\n\n這就是機制設計，而你剛剛做的事有個名字叫**誘因相容（incentive compatibility）**——把規則設計成「玩家追求自己的利益時，剛好就吐出你要的真話／你要的行為」。再看一眼你日常的工具箱，全是這個東西：\n\n- **API 配額與計費方案**：你定的價格階梯、超量計費、保留容量折扣，全都是在塑造「使用者理性使用時會呈現的行為模式」。階梯訂得好，使用者自己會把流量削平、把尖峰錯開——不是因為你求他們，是因為那樣對他們最省錢。\n- **排程器的優先順序規則**：你給 job 標優先順序，但提交 job 的人總想把自己標成「最高優先」。一個好的排程機制（例如按「願意等多久」或「願意付多少」排序，而不是按「自己宣稱多急」）會讓**虛報優先順序不划算**——你說你急，那你就先被收走資源／先被計費。\n- **spot instance 競價**：雲端把閒置容量拿出來拍賣，你出價、價高者得。為什麼這套能運作？因為它被設計成「你照自己真實的願付價格出價，大致就是最佳策略」（ch14 會看到第二價格拍賣怎麼把這件事做到滴水不漏）。\n- **circuit breaker 與信譽分級**：建立過良好歷史的 client 拿更高配額、行為不良的被降級——這是把「長期好好表現」設計成對 client 自己有利的事（ch11 的訊號、ch07 的重複，在這裡被你拿去當設計工具）。\n\n注意這一整章跟前面所有章節的**方向相反**。前十二章你是棋子，賽局理論教你怎麼在既定的棋盤上下得不吃虧。從這一章起，你是**做棋盤的人**。賽局理論最實用、也最接近你本行的一面，是它可以反過來用：既然「規則決定結局」是前面反覆證明的鐵律，那只要你能動規則，你就能動結局。機制設計學界自己給這件事取的別名就很直白——**反向賽局論（reverse game theory）**：別人是先有賽局、求均衡，你是先有你要的均衡、反推出該長什麼樣的賽局（這別名正抓住了它「從終局出發、往回倒推規則」的方向，這正是 Hurwicz 開創此領域時的思路）。\n\n## 機制設計在問的那個問題\n\n先把問題講精確，不要急著看技巧。\n\n前面十二章，賽局是**給定的**：報酬矩陣、玩家、策略集，全是題目的一部分，你的工作是求解。機制設計把這件事整個倒過來——**結局是給定的（你想要什麼），賽局是未知的（你要去設計它）**。設計者（你）能動的是「規則」：誰在什麼時候能做什麼、做了之後各自拿到什麼報酬。玩家依然完全理性、依然只顧自己——這個假設**一點都不放鬆**，反而是機制設計的前提。你不能假設玩家會配合、會誠實、會為大局著想；你必須假設他們會鑽任何漏洞、會在任何縫隙裡最佳化自己。然後在這個「人人都想佔你便宜」的最悲觀前提下，把規則設計到**連這樣的人都只能乖乖吐出你要的結果**。\n\n這是焦慮工程師會喜歡的世界觀：**你設計的不是 happy path，你設計的是「即使每個人都是攻擊者，系統依然產出正確結果」。** 機制設計就是把「敵意輸入」這個假設貫徹到底——每個玩家都是潛在的對抗者，每個申報都可能是謊報，而一個好的機制要在這種前提下依然正確。\n\n機制設計的核心難題有個名字，叫**私有資訊（private information）**。問題的全部源頭都在這裡：\n\n> 玩家知道一些你不知道、而且你問不出來的事——他真正的估值、他真正的成本、他真正的急迫程度、他真正的用量。而他沒有動機跟你說實話。\n\n把這句話讀三遍，因為機制設計的所有技巧都是在繞它。如果你能直接讀到每個人的真實估值，根本不需要機制設計——你直接照最優方案分配就好。麻煩在於那個數字鎖在別人腦袋裡，你唯一的管道是「問他」，而「問他」必然觸發賽局：他會盤算「我報什麼數字對我最有利」，而不是「真話是什麼」。\n\n所以機制設計的目標，可以濃縮成一句：\n\n> **設計一套規則，使得每個玩家在純粹追求自利時，照實揭露私有資訊（或做出你要的行為）剛好是他的最佳策略。**\n\n這就是**誘因相容（incentive compatibility）**。它不是「鼓勵誠實」，是把誠實**做成均衡**——做成那個「沒人想單方面偏離」的穩定點（ch02 的納許均衡，現在被你拿來當設計目標）。注意誘因相容有強弱之分，這是個值得分清的精確點：\n\n- **優勢策略誘因相容（dominant-strategy incentive compatible, DSIC）**：不管別人怎麼報，說真話都是你最好的選擇。這是最強的版本——你完全不用猜別人在幹嘛（ch14 的維克里拍賣就是這一級，誠實出價是優勢策略）。\n- **貝氏誘因相容（Bayesian incentive compatible）**：說真話只在「大家都說真話」這個均衡裡是你的最佳反應——比較弱，依賴別人也照辦。\n\n「優勢策略」這個詞你在 ch01 就見過——背叛在囚徒困境裡是優勢策略，不管對方怎麼選都比較好。機制設計把這個概念**反過來當武器**：困境裡「背叛是優勢策略」害死大家，那我能不能設計一個賽局，讓「我要的好行為」變成優勢策略？這正是 Part V 的整個志向。\n\n這個領域的奠基要追到 **Leonid Hurwicz（赫維茲）**——他在 1972 年提出「誘因相容」這個關鍵概念，把「資訊分散在各人手上、各人又只顧自己」這件事正式化成一個可以工程化的問題。後來 **Eric Maskin（馬斯金）**（實作理論／哪些目標根本實現不了）與 **Roger Myerson（梅爾森）**（揭示原理、最適機制）把它發展成完整理論。三人共獲 **2007 年諾貝爾經濟學獎**，得獎理由官方寫的是「奠定機制設計理論的基礎（for having laid the foundations of mechanism design theory）」。Hurwicz 受獎時 90 歲，是史上最年長的經濟學獎得主。\n\n> 嚴謹度註記：本書沿用「諾貝爾經濟學獎」這個俗稱，但它嚴格說不是諾貝爾 1895 遺囑設立的五個獎之一，而是「瑞典央行紀念阿爾弗雷德・諾貝爾經濟學獎（Sveriges Riksbank Prize in Economic Sciences in Memory of Alfred Nobel）」，由瑞典央行 1968 年設立、1969 年起頒。後面提到的拍賣（Vickrey 1996）、投票（Arrow 1972）諸獎也都是同一個獎。\n\n## 揭示原理：為什麼你不必窮舉所有規則\n\n機制設計第一眼看起來是個無望的問題：規則的空間是**無限大**的。你可以設計密封投標、可以公開喊價、可以多輪、可以加各種彎彎繞繞的條款、可以讓玩家報一個數字也可以報一整套策略……你要怎麼在這個無限大的設計空間裡，找到能達成目標的那個機制？甚至，你怎麼知道某個目標是不是**根本辦不到**？\n\n這裡有一個讓整個領域變得可操作的關鍵結果，叫**揭示原理（revelation principle）**。它的最早形式由 **Allan Gibbard 在 1973 年**在優勢策略的脈絡下奠基，後來由 **Myerson（1979 年前後）**推廣到一般的貝氏均衡、做成今天通用的完整版本（同時期 Dasgupta–Hammond–Maskin、Holmström 等人也獨立得到相近結果）。它的內容簡單到第一次聽會以為自己漏聽了什麼：\n\n> **任何複雜機制能達成的結果，都能用一個「直接、且讓說真話變成最佳策略」的機制達成。**\n\n拆開來說。所謂**直接機制（direct mechanism）**，就是最樸素那種：每個玩家直接把自己的私有資訊（型別、估值）報給你，你根據這些申報直接決定結果。沒有多輪、沒有喊價、沒有花招。揭示原理說：不管你原本想用多複雜、多巧妙的機制，**都存在一個與它結果完全相同的直接機制，而且在這個直接機制裡，每個玩家照實申報就是他的最佳選擇**。\n\n為什麼這是真的？直覺版（嚴格證明本書不展開，指向延伸閱讀）是這樣的——\n\n想像你有一個複雜機制 M，在它的均衡裡，每個玩家都在心裡盤算「以我的真實型別，我該採取什麼策略」，然後執行那個策略。注意：**那個「從真實型別到最佳策略」的盤算，是玩家自己在做的。** 現在你做一件事：把這個盤算**收編進機制本身**。你蓋一個新機制 M′，規則是「請玩家直接報真實型別，然後**我替他做那個原本他自己會做的盤算**，再餵進原機制 M」。\n\n關鍵在於：既然在 M 裡，玩家以真實型別做那套盤算是他的最佳反應，那麼在 M′ 裡，**他沒有理由謊報型別**——因為謊報型別，等於要我替他算一套「不是他最佳反應」的策略，結果只會更差。於是「照實報」在 M′ 裡自動變成最佳策略。你把玩家原本要自己做的策略性算計，**內建進機制的設計裡**了。\n\n這對你這個工程師有兩個非常實際的含義，這也是為什麼揭示原理被稱為「讓機制設計變簡單」的那個定理：\n\n1. **搜尋空間瞬間塌縮。** 你不必在「所有可能的機制」這個無限大空間裡大海撈針。你只要在「直接、誠實」這個小很多的子集裡找——因為揭示原理保證，能達成的目標一定能在這個子集裡達成。這跟你寫程式時把「任意實作」化約成「一個 canonical form」是同一種思維：先證明不失一般性，再只處理標準形。\n2. **不可能性證明變得乾淨。** 如果你想證明「某個目標**根本辦不到**」，你只要證「沒有任何誠實的直接機制能達成它」就夠了——不必擔心「會不會有某個我沒想到的巧妙機制能繞過去」。揭示原理把那扇後門焊死了。ch15 的 Arrow 不可能定理、Gibbard–Satterthwaite 定理，那種「**任何**機制都辦不到」的鐵壁結論，背後靠的就是這個。\n\n> 一句話複述（驗收你懂沒懂）：揭示原理說「想知道什麼結果可以被一群自利的人實現，你只要問『有沒有一種規則，讓他們照實說就是最好』——不用去想那些拐彎抹角的複雜機制，因為複雜機制能做到的，誠實直接機制都能做到」。\n\n我得誠實標一個邊界：揭示原理這麼乾淨，是有代價的——它告訴你「存在一個誠實直接機制」，但**沒告訴你那個機制好不好用、誠實的程度有多強**（是優勢策略誠實還是只是貝氏誠實）、也不保證它在現實裡好部署（直接機制要玩家一次報出完整型別，現實中喊價式拍賣有時反而更好操作）。它是一個**化約工具**，不是萬靈丹。把它當「分析時的標準形」用，別當「實作時的最佳方案」用。\n\n## 改報酬矩陣：機制設計怎麼救出脊椎困境\n\n現在我們把機制設計這把工具，對準全書脊椎那張矩陣——**這是 ch01 那張囚徒困境**，T,R,P,S = 5,3,1,0，被你重看到第七層了。\n\n前六層你都是在「困境裡面」想辦法：ch01 你認出背叛是優勢策略、(背叛,背叛)=(1,1) 是個雙輸的穩定點；ch02 你確認它是唯一納許均衡而 (合作,合作)=(3,3) 不是；ch07 你讓它重複很多次、用未來的陰影把合作撐起來；ch09 你把它丟進族群、看背叛者入侵。這六層有個共同點：**矩陣本身你沒動過**。你是玩家，矩陣是天條。\n\n這一層不一樣。**這一層你是訂規則的人。如果你能動矩陣，你會怎麼動，才能把那個害死大家的 (背叛,背叛) 拆掉、把 (合作,合作) 變成穩定的均衡？**\n\n先看原矩陣，提醒自己困境長什麼樣：\n\n```text\n脊椎囚徒困境（ch01 那張，數字＝獲益點數，越大越好）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)  ← R,R     (0, 5)  ← S,T\n    我方：背叛(D)      (5, 0)  ← T,S     (1, 1)  ← P,P\n\n  T > R > P > S        （5 > 3 > 1 > 0）\n  背叛是嚴格優勢策略：對方選 C 時 5>3、對方選 D 時 1>0，背叛永遠較好\n  唯一純策略納許均衡：(背叛,背叛)=(1,1)\n  集體最優 (合作,合作)=(3,3) 不是均衡\n```\n\n困境的病根是那條不等式 **T > R**：背叛去佔一個合作者的便宜（拿 5）比互相合作（拿 3）更甜。只要這條成立，背叛就佔優、合作就守不住。\n\n機制設計的招數，直白到近乎粗暴：**既然問題出在報酬，那就改報酬。** 具體地，我引進一個**外部執法者**——可能是法律、是平台、是你這個系統管理員——規則只有一條：**只要你背叛，就罰你 3 點。** 注意這是個外部強加的懲罰，不是玩家之間的恩怨（那是 ch07 重複賽局的招），是設計者從矩陣外面伸手進來改報酬。\n\n### Worked example：加一個 −3 的罰則，看 (合作,合作) 怎麼變成均衡\n\n我們逐格重算。原報酬照舊，但**任何選背叛的玩家，他自己那一格的報酬要再扣 3**（罰的是「背叛這個行為」，所以是針對個別玩家的，不是針對整格）。\n\n```text\n步驟一：標出原報酬與「誰背叛了、要扣誰 3 點」\n\n  格子        原報酬(我,對)   我背叛?  對背叛?   罰則調整\n  (C,C)       (3, 3)          否       否        (−0, −0)\n  (C,D)       (0, 5)          否       是        (−0, −3)\n  (D,C)       (5, 0)          是       否        (−3, −0)\n  (D,D)       (1, 1)          是       是        (−3, −3)\n\n步驟二：把罰則加進去，得到新矩陣\n\n  (C,C):  (3−0, 3−0) = (3,  3)\n  (C,D):  (0−0, 5−3) = (0,  2)\n  (D,C):  (5−3, 0−0) = (2,  0)\n  (D,D):  (1−3, 1−3) = (−2, −2)\n```\n\n新的報酬矩陣長這樣：\n\n```text\n機制設計後（背叛罰 −3）：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3,  3)           (0,  2)\n    我方：背叛(D)      (2,  0)           (−2, −2)\n```\n\n現在做 ch02 的最佳反應分析，逐欄檢查——關鍵是看**我方（列玩家）**在對方每個選擇下，該選 C 還是 D：\n\n```text\n若對方選 C（看左欄我方那個數字）：\n    我選 C → 3\n    我選 D → 2\n    3 > 2 → 我該選 C   ← 困境逆轉！原本這裡是 5>3 該背叛\n\n若對方選 D（看右欄我方那個數字）：\n    我選 C → 0\n    我選 D → −2\n    0 > −2 → 我該選 C  ← 這裡也該合作了\n\n結論：不管對方選什麼，我方的最佳反應都是 C。\n      合作現在是（嚴格）優勢策略！\n      賽局對稱，對方同理。\n      唯一純策略納許均衡 = (合作, 合作) = (3, 3)。\n```\n\n驗算一次 (合作,合作) 確實是納許均衡（用 ch02 的定義「沒人能單方面改善」交叉檢查）：在 (C,C)，我拿 3；我若單方面改成背叛，落到 (D,C)，我拿 2。**2 < 3，偏離反而更差，所以我不會偏離。** 對方同理。沒有人能單方面改善 → (合作,合作) 是穩定的納許均衡。困境被救出來了。\n\n**這一格 worked example 就是這整個 Part 的縮影**：你沒有改變任何玩家的理性、沒有訴諸他們的良心、沒有靠未來的陰影或聲譽。你只是**動了報酬**，於是同一群純自利的理性玩家，自動走向了集體最優。個體理性與集體理性原本在這張矩陣上裂成兩半（ch01 的中央張力），現在被你用一條罰則重新縫合——**這就是機制設計的全部魔力：不改人，改規則。**\n\n### 罰則要多重才夠？順手算一下門檻\n\n別停在「我選了 −3 剛好有用」。一個會問「邊界在哪」的工程師，會接著問：**罰則最少要多重，(合作,合作) 才會變均衡？**\n\n設罰則為 f（背叛者扣 f 點）。要讓合作成為優勢策略，得在**對方的每個選擇下**都檢查「我方合作不輸背叛」——優勢策略的定義是「不管對方怎麼選都最好」，所以兩欄都要驗，不能只看一欄。\n\n```text\n情況一（對方合作 C）：原本我合作拿 R=3、我背叛拿 T=5；加罰則後背叛變 T−f=5−f。\n  要求： R ≥ T − f\n  代入： 3 ≥ 5 − f\n  解：   f ≥ T − R = 2\n\n情況二（對方背叛 D）：原本我合作拿 S=0、我背叛拿 P=1；加罰則後背叛變 P−f=1−f。\n  要求： S ≥ P − f\n  代入： 0 ≥ 1 − f\n  解：   f ≥ P − S = 1\n\n兩個條件取嚴者（max）：f ≥ max(T−R, P−S) = max(2, 1) = 2。\n  → binding（綁住門檻）的是「對方合作」那欄，f ≥ 2；\n    「對方背叛」那欄只要 f ≥ 1，較鬆，自動滿足。\n\n所以罰則只要 ≥ 2 就足夠把合作變成（至少弱）優勢策略。\nf = 2 時 (C,C) 與 (D,C) 對我方都給 3，剛好打平（弱優勢）；\nf = 3（我們上面用的）給嚴格優勢，留了一點安全邊際。\n```\n\n這個門檻 f ≥ T−R = 2 很有工程味道：**它正好等於「背叛佔便宜的那塊甜頭」T−R。** 之所以是 T−R 而不是 P−S，是因為兩條約束裡前者較緊——背叛者最想佔的是「對方乖乖合作」那一格的便宜，罰則只要把這塊甜頭吃掉，困境的病根 T>R 就被翻成 T−f ≤ R，合作就站得住，較鬆的另一欄（對方背叛時）自動一起解決。多罰沒壞處（更穩），但**少於這個量，機制就失效、困境照樣存在**——這是焦慮工程師該記住的：機制設計裡「差不多有罰」不等於「夠罰」，門檻是個硬數字，少一分都不行，設計時得把它算出來而不是拍腦袋。\n\n順帶一提，這也照亮了 ch07 重複賽局在做什麼：那裡的「未來的陰影」其實是**內生的罰則**——背叛會被未來的報復懲罰，δ 夠大時那個未來懲罰的現值就超過 T−R 這塊甜頭，於是合作維持。ch07 是讓玩家自己當執法者（用未來懲罰），ch13 是設計者從外部當執法者（用罰則）。**同一條病根 T>R，兩種補法：一個靠時間，一個靠規則。**\n\n## 直覺的陷阱\n\n機制設計是個「聽起來像萬能、其實處處是坑」的領域。下面三個陷阱，每一個都會在某一步把你帶溝裡。\n\n| 陷阱 | 錯誤直覺 | 哪一步出錯 | 正確版 |\n|---|---|---|---|\n| **「設計機制＝把懲罰加大就好」** | 困境是因為合作沒誘因，那我把背叛罰到死、合作獎到爆，問題不就解決了？ | 你以為機制設計是「調大獎懲旋鈕」。真正的難題不是罰多少，而是**你根本不知道誰背叛了、誰的估值是多少**——私有資訊才是核心。罰則只在「背叛可被觀測」時有用；現實中你常常觀測不到真相，這才是要設計揭示機制的原因。 | 機制設計的主戰場是**資訊**不是**力度**。難的是「怎麼讓玩家自己把你看不到的真相吐出來」，不是「罰得夠不夠重」。脊椎那個 −3 罰則之所以簡單，正因為我們假設了「背叛可被觀測」——拿掉這個假設，問題立刻變難。 |\n| **「揭示原理說誠實機制最好」** | Myerson 證了任何機制都能用誠實直接機制取代，那誠實直接機制不就是最優解、其他都別用了？ | 你把「不失一般性的化約工具」誤讀成「實作建議」。揭示原理只說誠實直接機制能**達成相同結果**，沒說它好部署、沒說誠實的強度（DSIC vs 貝氏）、沒說現實裡它比喊價式機制好用。 | 揭示原理是**分析用的標準形**，不是**實作用的最佳方案**。它讓你證明「什麼做得到、什麼做不到」，但真要部署時，一個策略上等價的喊價式拍賣（ch14 的英式拍賣）可能比要人一次報完整估值的直接機制更實際。 |\n| **「機制設計萬能，總有規則能達標」** | 既然規則決定結局，那只要我夠聰明，總能設計出達成任何目標的機制吧？ | 你假設設計空間無上限。但有些目標被**數學定理**證明根本不可能——不是你不夠聰明，是宇宙不允許。 | 機制設計有**硬天花板**。ch15 的 Arrow 不可能定理就是：沒有任何投票規則能同時滿足一組看似最低限度的合理條件。揭示原理恰恰是用來**乾淨地證明這類不可能性**的——它幫你把「會不會有我沒想到的巧妙機制」這個後門焊死，於是「誠實直接機制都辦不到 ⇒ 任何機制都辦不到」。好消息（拍賣）與壞消息（投票）是同一套理論的兩面。 |\n\n額外一個容易滑掉的點：**機制設計沒有取消「個體理性」這個前提，它是建立在這個前提上的。** 初學者常以為「設計機制＝讓大家為集體著想」，這是徹底反了。機制設計從頭到尾假設每個人都只顧自己、都會說謊、都會鑽漏洞——然後在這個最壞假設下，把規則設計到「連這種人都只能產出好結果」。你要的不是改變人性，而是**讓自私剛好指向你要的方向**。怎麼自我察覺你掉進這個陷阱？如果你的機制需要「假設玩家會自律／會誠實／會顧全大局」才能運作，那它就不是機制設計，是許願。\n\n## 紙上推演\n\n### 題目一（★★，20 分鐘）：脊椎困境，換一個罰則大小\n\n接續本章 worked example。外部執法者這次只罰背叛者 **f = 1 點**（不是 3 點）。\n\n(a) 重畫四格的報酬矩陣。\n(b) 用最佳反應分析判斷 (合作,合作) 是不是納許均衡。\n(c) (背叛,背叛) 還是不是納許均衡？\n(d) 用本章算過的門檻 f ≥ T−R 解釋你看到的結果。\n\n### 推演解答\n\n(a) 罰則 f=1，背叛者那格自己扣 1：\n\n```text\n  (C,C): (3−0, 3−0) = (3, 3)\n  (C,D): (0−0, 5−1) = (0, 4)\n  (D,C): (5−1, 0−0) = (4, 0)\n  (D,D): (1−1, 1−1) = (0, 0)\n\n  罰則後矩陣：\n                     對方：合作(C)      對方：背叛(D)\n    我方：合作(C)      (3, 3)            (0, 4)\n    我方：背叛(D)      (4, 0)            (0, 0)\n```\n\n(b) 最佳反應（看我方數字）：\n\n```text\n  對方選 C：我選 C 得 3、選 D 得 4 → 4>3 → 我該背叛\n  對方選 D：我選 C 得 0、選 D 得 0 → 平手\n```\n\n對方選 C 時我仍想背叛（4>3），所以 (合作,合作) **不是**納許均衡——在 (C,C) 我單方面改背叛能從 3 升到 4，會偏離。\n\n(c) 檢查 (背叛,背叛)=(0,0)：對方選 D 時，我選 C 得 0、選 D 得 0，平手（弱），我沒有嚴格的偏離動機。再看對方選 C 時我選 D 得 4 > 選 C 得 3——背叛仍是（弱）優勢策略，(D,D) 仍是納許均衡（雖然現在只是弱的）。困境**沒被救出來**。\n\n(d) 門檻是 f ≥ T−R = 5−3 = 2。我們只罰了 f=1 < 2，**罰則沒吃掉背叛的全部甜頭**（背叛還剩 T−f=4 > R=3 的誘惑），所以合作站不住。這正是「差不多有罰 ≠ 夠罰」——機制設計的門檻是硬數字，f=1 看起來像在做事，實際上完全沒解決問題。常見錯路：以為「只要加了罰則困境就會緩解」，其實低於門檻的罰則對均衡**毫無作用**，背叛照樣優勢。\n\n### 題目二（★★★,25 分鐘）：設計一個讓「誠實申報用量」變優勢策略的計費規則\n\n回到本章開頭的 rate limit 場景。一個 client 真實用量是 q（只有他自己知道），他要向你**申報**一個數字 r，你照 r 配置容量。你想設計計費規則，讓「申報 r = 真實 q」對任何 client 都是最划算的（誘因相容）。\n\n考慮這個樸素規則，找出它為什麼**不**誘因相容，再修好它：\n\n> 樸素規則：client 申報 r，你保證他能用到 r 的容量，他只為**實際用掉**的量付錢（每單位 1 元）。\n\n(a) 在樸素規則下，一個理性 client 會把 r 報成多少？為什麼這不誘因相容？\n(b) 改一條規則，把「申報但沒用到的容量」也算進成本，讓誠實變成最佳。寫出你的規則，並論證為什麼此時 r=q 最划算。\n\n### 推演解答\n\n(a) 樸素規則下，client **只為實際用量付錢、申報量不要錢**。那麼申報越大越好沒有任何代價——多報能換到更多保證容量（萬一突發用得上），又不用為沒用到的部分付費。理性 client 會把 r 報到上限（「越多越好」）。於是你的申報數字全是灌水，容量規劃失去意義。**不誘因相容的根源：謊報（高報）沒有代價。** 這正是本章說的核心病——私有資訊（真實 q）藏在 client 那邊，而規則沒給他說真話的理由。\n\n(b) 修法的關鍵直覺：**讓「保留但沒用到的容量」也有代價**，這樣高報就不再免費。一個可行規則：\n\n```text\n  修正規則（保留費 + 使用費）：\n    client 申報 r，你保證配置 r 的容量。\n    收費 = 1 × (實際用量) + c × (保留但沒用到的量 = max(r − 實際用量, 0))\n    其中 0 < c ≤ 1 是「閒置保留」的單價。\n\n  為什麼 r = q 最划算（以最典型情況：實際用量 = 真實需求 q 為例）：\n    - 高報 r > q：你保證了 r 卻只用 q，要為閒置的 (r−q) 付 c 元/單位\n                  → 比照實報 q 多花 c·(r−q) > 0，純虧。\n    - 低報 r < q：你只保證到 r，需求 q 卻超過保證額\n                  → 超過 r 的部分沒被保證、可能被限流／被拒，\n                    要嘛服務受損、要嘛被收懲罰性 overage 費（設 > 1 元/單位）。\n                  → 低報換來的是「被打回去」的風險，也不划算。\n    - 照實 r = q：保證額剛好覆蓋需求，沒有閒置保留費、也不觸發 overage。\n                  → 兩邊偏離都更差 ⇒ r = q 是最佳申報。誠實成為（弱）優勢策略。\n```\n\n論證骨架就是本章的脊椎手法：**把謊報的兩個方向都接上代價**（高報→閒置保留費、低報→overage 風險），於是真話夾在中間成為最佳。常見錯路：(1) 只罰高報、不管低報——那 client 會改成低報賭一把；(2) 把閒置費 c 設成 0——等於沒改，回到樸素規則；(3) 以為「鼓勵誠實的提示文字」有用——機制設計不靠勸說，靠報酬結構。注意這跟 ch14 維克里拍賣是同一個精神（把偏離的兩個方向都設計成有代價，真話被夾在中間），你會在下一章看到它被做到滴水不漏的優勢策略版本。\n\n### 題目三（★，10 分鐘）：用一句話解釋誘因相容\n\n不准用「誘因相容」「incentive compatible」這兩個詞本身，向一個沒讀過這章的工程師解釋「誘因相容」是什麼。然後舉一個你**寫過的程式／設計過的系統**裡，誘因相容（或它的失敗）的例子。\n\n### 推演解答\n\n參考答案（你的話可以不同，但必須抓到「自利剛好導向你要的行為」這個核）：「誘因相容＝你把規則設計成——使用者**只顧自己佔便宜時，順手就把你要的事做了**。他不是為你做，是為自己做，但因為規則設計得好，兩件事剛好重合。」\n\n工程例（誠實版）：第二價格的 spot 競價——你照自己真實願付價出價就是最佳策略，不用猜對手。失敗版（更有教育意義）：早期的「自己宣稱優先順序」排程器——每個人都把自己的 job 標成「最高優先」，因為宣稱高優先沒代價，結果優先順序欄位變成全是 P0、完全失去區分力。這就是**不**誘因相容：規則沒給「誠實標優先順序」任何好處，於是沒人誠實。修法（接題目二的精神）：讓「宣稱高優先」帶代價（先被計費／先被收走配額），高優先就會只留給真急的人。\n\n### 題目四（★★，15 分鐘）：揭示原理為什麼讓事情變簡單\n\n(a) 用自己的話陳述揭示原理。\n(b) 它對「想證明某個目標**做不到**」的人，提供了什麼便利？\n\n### 推演解答\n\n(a) 參考：「任何複雜機制能達成的結果，都有一個『讓玩家照實申報就是最佳策略』的直接機制能達成同樣的結果。」核心直覺：玩家原本要自己做的「從真實型別算出最佳策略」那套盤算，可以被**收編進機制本身**——讓玩家報真話、機制替他做那套盤算，於是謊報沒有好處，誠實成為最佳。\n\n(b) 它把搜尋空間從「所有可能的機制（無限大）」塌縮到「誠實直接機制（小很多）」。對證明不可能性的人特別好用：要證「沒有任何機制能達成目標 X」，你**不必**擔心「會不會有某個我沒想到的巧妙機制繞過去」——只要證「沒有任何誠實直接機制能達成 X」就夠了，揭示原理保證沒有後門。ch15 的 Arrow 不可能定理、Gibbard–Satterthwaite 定理，那種「任何機制都辦不到」的鐵壁，靠的就是這個化約。常見錯路：把揭示原理當成「實作建議」（誤以為它說誠實直接機制最好用）——它只是分析用的標準形，不保證好部署、不保證誠實的強度。\n\n## 自我檢核\n\n口頭自答，講得出來才算過。優先答「為什麼」。\n\n1. 機制設計跟前十二章的視角，**方向**差在哪？為什麼說它是「反向賽局論」？\n2. 機制設計的核心難題是「私有資訊」而不是「懲罰力度」——為什麼？如果你能直接讀到每個人的真實估值，還需要機制設計嗎？\n3. 用脊椎那張矩陣講：一個外部罰則怎麼把 (合作,合作) 從「不是均衡」變成「是均衡」？罰則最少要多重、為什麼那個門檻剛好是 T−R？\n4. 誘因相容是什麼？它跟 ch01 的「優勢策略」、ch02 的「納許均衡」各有什麼關係（提示：你是把哪個概念當設計目標）？\n5. 揭示原理在說什麼？「玩家原本自己做的盤算被收編進機制」這句話，你能用自己的話展開嗎？\n6. 為什麼揭示原理對「證明某事做不到」特別有用？它焊死了哪個後門？\n7. ch07 重複賽局的「未來的陰影」和 ch13 的「外部罰則」，補的是同一條病根 T>R 嗎？它們的執法者各是誰？\n8. 「設計機制＝把懲罰加大」這個直覺錯在哪？機制設計真正的主戰場是力度還是資訊？\n\n## 延伸閱讀\n\n- **NobelPrize.org，2007 年經濟學獎「Mechanism Design Theory」官方頁與 popular/advanced information**（nobelprize.org/prizes/economic-sciences/2007/）——Hurwicz／Maskin／Myerson 三人的貢獻分工講得最權威；advanced information 那份 PDF 把誘因相容、揭示原理、最適機制串成一條線，是本章史實的一級來源。讀 popular information 那份就夠抓直覺。\n- **Stanford Encyclopedia of Philosophy，「Arrow's Theorem」條目**（plato.stanford.edu/entries/arrows-theorem/）——雖然是 ch15 的主角，但它示範了「不可能性證明」怎麼跑，正好讓你預習揭示原理在壞消息那一面的威力；想先嚐機制設計的天花板可讀導論段。\n- **Roger Myerson, “Perspectives on Mechanism Design in Economic Theory”（2007 諾貝爾講座，nobelprize.org 上的 myerson_lecture.pdf）**——揭示原理發明人本人講這套理論的來龍去脈與動機；數學可略過，看他怎麼描述「私有資訊」這個核心難題與化約思路，比任何二手講解都清楚。\n- **Hurwicz & Reiter,《Designing Economic Mechanisms》（2006）**——Hurwicz 親自寫的機制設計教科書，把「資訊分散＋誘因」這個問題正式化的源頭；想看「反向賽局論」這個視角從哪來、要嚴謹版的可讀前幾章導論。\n- 跨書：機制設計裡「玩家在不確定下怎麼算自己的最佳申報」的**單人理性與效用**基準，見《在不確定中下注》談期望效用／單人理性那章——本書只用「玩家會最佳化自己的報酬」這個結果，效用怎麼定義、為什麼不是金額，那本寫透。\n"}, {"id": "ch14-auctions", "file": "ch14-auctions.md", "group": "Part V — 反過來設計賽局", "title": "ch14 — 拍賣：把說真話設計成優勢策略", "md": "# ch14 — 拍賣：把說真話設計成優勢策略\n\n> **本章解決什麼問題**：ch13 把視角翻過來了——不再「給定賽局求結局」，而是「給定想要的結局，設計報酬規則讓理性玩家自動導向它」。但 ch13 是總論，講的是誘因相容與揭示原理這些抽象框架。這一章要給你機制設計**最漂亮、最具體、也最反直覺**的一個成功案例：拍賣。問題很尖銳——你要把一個東西賣給最珍視它的人，可是每個人的估值都藏在自己腦袋裡，而且每個人都有動機謊報（壓低出價想撿便宜）。聽起來無解。但維克里（Vickrey）在 1961 年證明了一件事：只要把規則設計對，**「照實說出你的真實估值」會變成每個人的優勢策略**——不是道德勸說，是純粹的自利算計使然。這是 Part V「反過來設計賽局」的招牌個案，也是全書中央張力的建設性反面。下一章 ch15（投票與 Arrow）會給你這枚硬幣的另一面：壞消息——有些機制設計的目標根本不可能達成。\n\n## 從你已知的出發\n\n你其實已經設計過拍賣了，只是沒這麼叫它。\n\n想想 spot instance。雲端供應商把閒置的運算容量拿出來競價，你出一個價，價高者得，市場價浮動到超過你的出價就把你的機器收回去。這就是一個拍賣——只是你大概從沒停下來問過一個關鍵問題：**我該出多少？** 出你心裡覺得它值的真實價格？還是策略性地壓低、賭市場清算價更低？這個「該不該照實出價」的糾結，正是本章的核心。它的答案，**完全取決於規則怎麼定**。\n\n再想廣告競價。每次有人載入一個有廣告位的頁面，背後就跑了一場毫秒級的拍賣——好幾個廣告主同時出價搶這個曝光。Google 的 AdWords 最早在 2000 年 10 月上線（當時按千次曝光計費），真正把第二價格式競價搬進來的是 2002 年 2 月推出的改版 AdWords Select（引入按點擊計費與廣義第二價格機制）。這裡有個你可能沒注意的細節：早期的廣告競價用的是「第一價格」（出多少付多少），結果廣告主整天在那邊互相試探、反覆微調出價——「我出 1.00，喔對手出 1.01，那我出 1.02……」——出價系統抖個不停，誰都不敢照實出，因為照實出就是當冤大頭。後來業界轉向「第二價格」式的機制，就是想止住這種抖動。**為什麼第二價格能讓競價者安定下來、不用再猜對手？** 這正是本章要講透的事。\n\n還有更貼近你日常的：你設計過資源配額的競爭機制嗎？多個 team 搶同一批 CI runner、搶共用 GPU 配額、搶資料庫連線池——你想把資源分給「最需要它的人」，但每個 team 都會宣稱自己最需要（謊報零成本）。你要怎麼設計申報規則，讓「老實說出你真正的需求」變成對每個 team 自己最划算的選擇？這就是機制設計版的拍賣：**你不是在分配資源，你是在設計一套讓人不想說謊的規則。**\n\n把這幾件事串起來，本章的主軸就清楚了：拍賣是「資源該落到誰手上」這個分配問題的賽局解。而它最驚人的成就，是維克里第二價格機制——**它讓「說真話」從一個道德要求，變成一個冷冰冰的優勢策略**。我認為這是整本書裡「機制設計能有多漂亮」最好的一頁，值得你慢慢讀。\n\n## 先把問題定義清楚：拍賣到底在解什麼\n\n拍賣不是「把東西賣貴」的技術。它要解的，是一個資訊問題。\n\n設想你手上有一台稀缺的機器要分配，三個團隊都想要。你想把它給「最珍視它的那個團隊」——因為資源落到估值最高的人手上，整體效率最高（這台機器在誰手上能產生最大價值，就給誰）。麻煩在哪？**估值是私有資訊。** 每個團隊心裡都有一個數字（這台機器對我值多少），但這個數字寫在他們腦袋裡，你看不到，而且你一問，每個人都有動機謊報——想撿便宜的會壓低、怕搶不到的會虛報。\n\n所以拍賣真正的設計目標有兩層：\n\n- **效率（efficiency）**：東西要落到真正估值最高的人手上。\n- **誘因（incentive）**：規則要讓參與者**願意**透露足以達成效率配置的資訊——理想情況是讓他們連謊都懶得撒。\n\n這兩層一旦達成，分配問題就解了。本章的高潮——維克里拍賣——同時做到了這兩件事，而且做法乾淨到讓人吃驚。\n\n在動手之前先約定一個記號（沿用全書「點數越大越好」的慣例）：\n\n```text\n拍賣的基本記號\n\n  vᵢ  = 競標者 i 的真實估值（這東西對我值多少，私有資訊）\n  bᵢ  = 競標者 i 實際出的價（策略選擇，可以 ≠ vᵢ）\n  得標者付的價 = p\n\n  競標者 i 的報酬（淨效用）：\n     得標時：  uᵢ = vᵢ − p     ← 我得到的價值，減掉我付的錢\n     沒得標時：uᵢ = 0          ← 沒拿到、沒付錢\n\n  關鍵：vᵢ 是真的，bᵢ 是你決定的。\n        拍賣的設計問題＝「規則怎麼定，能讓理性的 i 選 bᵢ = vᵢ」\n```\n\n注意 uᵢ = vᵢ − p 這條：得標不見得是好事——如果你付的價 p 超過了你的真實估值 vᵢ，你的報酬是負的，你買貴了、虧了。這個「得標也可能虧」的陷阱，是後面所有論證的關鍵。\n\n## 四種拍賣的場景速覽\n\n拍賣有四種最基本的型式。先快速認識它們的「長相」，因為後面會看到一個驚人的配對。\n\n```text\n四種基本拍賣型式\n\n  ① 英式（English，增價公開喊價）\n     價格從低往上喊，喊到沒人再加價為止。\n     最後一個喊的人得標，付他喊出的價。\n     例：傳統藝術品拍賣會、eBay。\n\n  ② 荷式（Dutch，降價公開喊價）\n     價格從高往下降，第一個喊「我要」的人得標，付當下的價。\n     例：荷蘭鬱金香拍賣鐘、生鮮競標。\n\n  ③ 第一價格密封投標（first-price sealed-bid）\n     每人偷偷寫一個價、密封提交；出價最高者得標，付他自己寫的價。\n     例：政府工程招標。\n\n  ④ 第二價格密封投標（second-price / 維克里）\n     每人偷偷寫一個價、密封提交；出價最高者得標，但只付「第二高」的那個價。\n     例：本章主角；廣告競價的理論原型。\n```\n\n第④種看起來最怪——得標了卻不用付自己出的價，而是付別人出的第二高價？這聽起來像供應商在做慈善。其實不是。這個「付第二高價」的設計，正是讓誠實變成優勢策略的引擎。我們現在就把它拆開。\n\n## 核心：維克里拍賣為什麼讓「說真話」變優勢策略\n\n這是本章最重要的論證。我把它標成「工程師的嚴謹」級——不是教科書的形式化證明，但每一步你都能口頭說出理由，而且這個論證是**完整的**（窮盡了所有偏離方向）。\n\n先把規則再講一次，精確版：\n\n> **維克里拍賣（Vickrey 1961）**：所有人密封出價 bᵢ。出價最高者得標。得標者付的價，是**所有出價中第二高**的那個（也就是「最高的對手出價」）。\n\n關鍵洞察一句話先給你：**在維克里拍賣裡，你的出價 bᵢ 只決定「你贏不贏」，完全不決定「你贏了要付多少」。** 你付的價是由別人的出價定的，跟你自己出多少無關。一旦你看懂這條,剩下的就是把它推到底。\n\n現在固定一件事:不管別人出多少,把所有對手裡最高的那個出價叫做 **m**(這是你能不能贏的門檻、也是你贏了要付的價)。你出 bᵢ,你要在「真實估值 vᵢ」之上,決定要照實出(bᵢ = vᵢ)、出高(bᵢ > vᵢ)、還是出低(bᵢ < vᵢ)。我們逐一檢查,證明「照實出 vᵢ」永遠不會比另外兩種差。\n\n**先看基準:照實出 bᵢ = vᵢ 會發生什麼。**\n\n```text\n照實出價 bᵢ = vᵢ，對手最高價是 m：\n\n  情況 A：vᵢ > m  → 你贏，付 m，報酬 = vᵢ − m > 0  （賺）\n  情況 B：vᵢ < m  → 你輸，報酬 = 0                （不賺不賠，但本來贏了也會虧）\n  情況 C：vᵢ = m  → 邊界，平手規則決定，報酬 0     （兩種結果報酬都是 0）\n\n  白話：照實出價，你「該贏的時候贏、且贏得有利潤；\n        該放手的時候放手」。\n```\n\n接著證明:**任何偏離都不會讓你更好**。分兩個方向。\n\n**方向一：出高於估值(bᵢ > vᵢ)。** 你想藉抬高出價多搶一些。但記住——你出多少不影響你付多少(付的永遠是 m)。所以抬高出價唯一可能改變的,是「你從輸變成贏」的那些情況,也就是 m 落在你的真實估值和虛報出價之間的時候(vᵢ < m < bᵢ)。\n\n```text\n出高 bᵢ > vᵢ，逐情況比對基準：\n\n  m < vᵢ          ：本來就贏、付 m，出高也一樣贏、付 m。無變化。\n  m > bᵢ          ：本來就輸、出高還是輸（沒抬過 m）。無變化。\n  vᵢ < m < bᵢ     ：★關鍵★ 抬高讓你「多贏了這一檔」——\n                    但你付 m，而 m > vᵢ，\n                    報酬 = vᵢ − m < 0。你買貴了、虧了！\n\n  結論：出高於估值，要嘛沒差，要嘛害你贏下一場「贏了反而虧」的拍賣。\n        嚴格不會更好，且可能更糟。\n```\n\n這就是「得標也可能虧」陷阱的精確現身:抬價多搶到的,全是那些「對手出價已經超過你真實估值」的場次——贏了就是冤大頭。\n\n**方向二:出低於估值(bᵢ < vᵢ)。** 你想壓低出價、賭撿便宜。但同樣——你壓低出價不會讓你付得更少(付的還是 m,跟你出多少無關)。壓低唯一改變的,是「你從贏變成輸」的那些情況,也就是 m 落在你的虛報出價和真實估值之間時(bᵢ < m < vᵢ)。\n\n```text\n出低 bᵢ < vᵢ，逐情況比對基準：\n\n  m < bᵢ          ：本來就贏、付 m，壓低也一樣贏、付 m。無變化\n                    （壓低沒讓你少付！付的是 m 不是你的出價）。\n  m > vᵢ          ：本來就輸、壓低還是輸。無變化。\n  bᵢ < m < vᵢ     ：★關鍵★ 壓低讓你「丟掉這一檔」——\n                    但這一檔本來照實出會贏、且報酬 = vᵢ − m > 0（賺的！）。\n                    壓低後你變成 0。你白白放走了一個有利潤的勝利。\n\n  結論：出低於估值，要嘛沒差，要嘛害你放走一場「贏了會賺」的拍賣。\n        嚴格不會更好，且可能更糟。\n```\n\n兩個方向合起來:**不管對手出多少(不管 m 是多少),照實出價 bᵢ = vᵢ 都不會比偏離差,而且在某些 m 值下嚴格更好。** 這正是「(弱)優勢策略」的定義——一個策略,不管別人怎麼做,它都至少跟其他選擇一樣好。所以:\n\n> **在維克里拍賣裡,照實說出你的真實估值,是(弱)優勢策略。**\n\n停下來體會一下這有多漂亮。優勢策略意味著:**你根本不用去猜對手出多少、不用算對手有幾個、不用做任何賽局推理。** 你只要問自己一個問題——「這東西對我到底值多少?」——然後照實寫上去。對手是聰明還是愚蠢、是一個還是一百個,都不影響你的最佳出價。維克里把一個原本需要勾心鬥角的策略賽局,塌縮成了一道單人算術題。這就是 ch13 講的「誘因相容」最純粹的樣子:**規則設計得讓說真話變成自利的選擇,於是私有資訊自己浮出水面。**\n\n(嚴謹度誠實:這裡標「弱」優勢,是因為在邊界 bᵢ = m 那種測度為零的巧合上,偏離和照實打平、不嚴格更差;只要對手出價有一點點不確定性,照實就是嚴格最優。完整的形式化證明本書不展開,指向延伸閱讀的 Krishna《Auction Theory》。)\n\n## Worked example:三人維克里拍賣,逐人驗算照實最划算\n\n把上面的論證灌進具體數字。三個競標者,真實估值如下(點數越大越好):\n\n```text\n三人維克里拍賣，真實估值：\n  競標者 A：vₐ = 10\n  競標者 B：v_b = 7\n  競標者 C：v_c = 5\n\n  規則：密封出價，最高者得標，付第二高的出價。\n```\n\n**先看「大家都照實出價」的結果**(b = v):\n\n```text\n全照實：A 出 10、B 出 7、C 出 5\n  → 最高是 A（10），A 得標\n  → A 付「第二高出價」＝ 7\n  → A 的報酬 = vₐ − p = 10 − 7 = 3   （賺 3）\n  → B、C 報酬 = 0\n\n  效率檢查：機器落到估值最高的 A 手上 ✓（有效率配置）\n```\n\n現在逐一檢查每個人能不能靠偏離撈到更多。\n\n**A 能不能偷笑著出更高、想多賺?** A 照實出 10、付 7、賺 3。如果 A 改出 12,他還是得標,付的還是第二高價 7(B 沒變),報酬還是 10 − 7 = 3。**一毛沒多賺**——因為付的價由別人定,A 抬價只是徒勞。\n\n**A 能不能壓低出價想少付?** A 改出 8(仍高於 B 的 7),還是得標、還是付 7、還是賺 3。**一毛沒少付**。那 A 壓得更狠、出 6 呢?這下出價低於 B 的 7,A 變成輸家,報酬掉到 0——他為了「想少付」反而把一場穩賺 3 的勝利丟了。**壓低只有壞處。**\n\n**B 能不能靠虛報搶贏 A?** B 真實估值 7,要贏過 A 得出超過 10,比如出 11。B 出 11 確實得標了——但他要付第二高價,也就是 A 的出價 10。B 的報酬 = v_b − p = 7 − 10 = **−3**。B 花了讓自己虧 3 的代價搶到一台對他只值 7 的機器,**買貴了**。這正是前一節「出高於估值 ⇒ 贏了反而虧」的活生生案例。B 照實出 7、乖乖當輸家(報酬 0),反而比虛報搶贏(報酬 −3)好。\n\n```text\n驗算小結（每人偏離 vs 照實）：\n  A 出高 → 報酬不變（3）     A 出低到搶輸 → 報酬 0（變差）\n  B 虛報搶贏 → 報酬 −3（虧）  B 照實 → 報酬 0（較好）\n  C 同理，估值最低，怎麼虛報搶贏都得付 ≥ 7 > 5，必虧\n\n  ⇒ 三人的最佳選擇都是「照實出價」。\n     得標者 A 付 7，配置有效率。✓\n```\n\n**自我複核**:得標者付的是 7,不是 A 自己出的 10——這是第二價格的精髓。注意得標者付的價恰好等於「把這台機器從第二珍視者(B,估值 7)手上拿走的機會成本」。維克里機制讓得標者付的,正是他奪走資源對社會造成的代價。這不是巧合,是這套機制能誘導誠實的深層理由(後面延伸閱讀的 VCG 機制把這個洞見一般化到多物品)。\n\n## 為什麼第二價格能做到、第一價格做不到\n\n對比一下第一價格密封投標(出多少付多少),你會更清楚維克里漂亮在哪。\n\n在第一價格拍賣裡,照實出價是**愚蠢**的。如果 A 照實出 10、得標、付 10,他報酬 = 10 − 10 = 0,白忙一場。A 的最佳策略是**壓低出價(bid shading)**:出一個剛好高過對手、但低於自己估值的價,把差額留成利潤。比如 A 猜對手最高大概出 7,他就出 7.5,得標、付 7.5、賺 2.5。\n\n但這裡就是第一價格的麻煩:**A 該壓多低,取決於他猜對手出多少。** 對手強就少壓一點(出 8),對手弱就多壓一點(出 6)。於是 A 必須去推測對手的估值、對手的人數、對手會怎麼壓價……這變回了一個需要互相猜測的策略賽局。沒有優勢策略,只有「視對手而定的最佳反應」(這正是 ch03 的工具箱要上場的地方)。\n\n```text\n兩種拍賣的策略本質對比：\n\n  第一價格：付的 = 自己的出價\n            → 出價同時決定「贏不贏」和「付多少」\n            → 兩個目標糾纏：壓低能少付，但壓太低會輸\n            → 最佳出價依賴「猜對手」→ 沒有優勢策略\n\n  第二價格：付的 = 第二高出價（與自己出價無關）\n            → 出價只決定「贏不贏」，不決定「付多少」\n            → 兩個目標解耦 → 照實出價變優勢策略\n            → 不用猜對手 → 賽局塌縮成單人算術\n```\n\n維克里的天才,就在於用「付第二高價」這一刀,把「贏不贏」和「付多少」這兩件原本糾纏的事**解耦**了。一解耦,壓價的動機就消失了——既然壓價不會讓你少付(付的是別人的價),你壓價只會徒增「贏了會賺的場次卻輸掉」的風險。誠實於是浮現為優勢策略。\n\n## 驚人的配對:四種拍賣其實兩兩等價\n\n現在給你本章第二個驚嘆點。前面說有四種拍賣型式,看起來各不相同。但賽局理論揭示了一個漂亮的對應——它們其實**兩兩策略等價**:\n\n```text\n策略等價配對（Vickrey 1961 指出）：\n\n  英式（增價公開）  ≈  第二價格密封\n  荷式（降價公開）  ≈  第一價格密封\n```\n\n（先聲明一個前提:下面這兩條等價,都站在「獨立私有價值」上。共同價值下,英式拍賣的公開退場會洩漏資訊、讓人邊喊邊更新估值,英式就**不再**等價於第二價格密封了——這也是贏家詛咒那節的世界。)\n\n**英式 ≈ 第二價格** 怎麼來的?英式拍賣價格從低往上喊,你的最佳策略是「一直留在場上,直到價格超過你的真實估值才退出」。最後會發生什麼?第二珍視的人會在「價格升到他的估值」那一刻退出,而最珍視的人在那個價位多喊一口就得標——所以得標者實質付的,正是**第二高的估值**。這跟第二價格密封投標的結果一模一樣!兩者的最佳策略都是「照實」(英式照實退場時機=照實出價)。\n\n**荷式 ≈ 第一價格** 呢?荷式拍賣價格從高往下降,你要決定「降到多少時喊我要」。你喊的那個價就是你付的價,而且你喊之前看不到別人會在哪喊——這跟第一價格密封投標(寫一個價、看不到別人、得標就付自己寫的價)資訊結構完全相同。兩者都需要壓價、都需要猜對手。\n\n這個配對的意義是:拍賣型式的「公開喊價 vs 密封投標」這個表面差異,沒有你想的重要;真正決定策略本質的,是「**得標者付的是自己的價、還是別人的價**」。這條軸,才把四種拍賣切成「需要勾心鬥角(第一價格族)」與「誠實是優勢策略(第二價格族)」兩半。\n\n```text\n四種拍賣對照總表\n\n  型式          得標者付      最佳策略         需要猜對手？\n  ──────        ──────        ────────         ──────────\n  英式          ~第二高估值   照實留到估值      否\n  第二價格密封  第二高出價    照實出價(優勢)    否\n  ──────────────────────────────────────────────────────\n  荷式          自己喊的價    壓價、依對手      是\n  第一價格密封  自己的出價    壓價、依對手      是\n```\n\n那既然第二價格族能誘導誠實、又不用猜對手,為什麼現實裡第一價格拍賣還這麼常見?這帶出一個你一定會問的問題:**哪種拍賣讓賣方賺最多?**\n\n## 收益等價:乍看驚人,細看有前提\n\n直覺會說「第一價格讓得標者付自己的高價,賣方一定賺比較多吧?」錯。\n\n**收益等價定理(revenue equivalence theorem)** 說:在一組理想條件下,上面四種拍賣給**賣方帶來的期望收益完全相同**。直覺是這樣:第一價格裡得標者付的雖然是「自己的高價」,但他會壓價,壓掉的部分剛好抵掉;第二價格裡得標者照實出但只付第二高價。兩股力量在期望值上抵消,殊途同歸。\n\n但這個定理是焦慮工程師最該警惕的那種定理——**它的漂亮全靠一串隱藏前提**,前提一破,結論就垮。這些前提包括(Myerson 1981 的標竿模型):\n\n```text\n收益等價定理的隱藏前提（任何一條破，結論就不成立）：\n\n  ① 競標者風險中立（不怕輸、不為保險多付）\n  ② 獨立私有價值（每人估值獨立、且是「私有價值」而非共同價值）\n  ③ 競標者對稱（估值來自同一個機率分布）\n  ④ 付款只依賴出價（沒有保留價、進場費等花樣）\n\n  破壞範例：\n  - 競標者風險趨避 → 第一價格收益反而較高\n    （怕輸的人會少壓一點價、出更高，賣方賺更多）\n  - 共同價值（大家在競標同一個「客觀但未知」的值）\n    → 贏家詛咒登場（下一節）\n```\n\n我把這個定理放這裡,不是要你背它——是要你記住一件事:**「四種拍賣都一樣」是一個帶著精緻前提的數學結論,不是現實守則。** 現實裡賣方選第一價格往往正是因為前提不滿足(競標者風險趨避、賣方想避免維克里的某些操作風險)。下次有人跟你說「反正拍賣怎麼設計收益都一樣」,你要能反問他:風險中立成立嗎?是私有價值還是共同價值?(2026-06:這仍是拍賣理論教科書的標準結論與標準警語。)\n\n## 贏家詛咒:當大家在搶同一個未知的真值\n\n前面所有論證都偷偷假設了「私有價值」——這東西對你值多少,純粹是你的事(你喜歡這幅畫,跟別人喜不喜歡無關)。但很多拍賣不是這樣。\n\n想像油田開採權拍賣。地底下到底有多少油,是一個**客觀但沒人確知**的數字——對所有競標者都一樣(這叫**共同價值 common value**)。每家公司各自估了一個值,有的高估、有的低估,平均下來大致對。問題來了:誰會得標?**出價最高的那家。** 而出價最高,往往意味著他是**估得最樂觀(最可能高估)** 的那家。\n\n```text\n贏家詛咒（winner's curse）的邏輯：\n\n  真值 = 100（沒人知道）\n  五家估值：80, 95, 100, 110, 130（平均約 103，還算準）\n  假設大家天真地照自己的估值出價（沒先打折）\n\n  → 出最高（130）的那家得標\n  → 第一價格下他付 130；就算是第二價格（付第二高 110），\n    110 仍 > 真值 100——付款規則換哪種都改不了「贏家高估」\n  → 他拿到只值 100 的東西卻付得更多\n  → 「贏」這個事實本身，就是「你比所有人都高估」的壞消息\n\n  詛咒：在共同價值拍賣中，得標恰恰篩選出最樂觀（最易高估）的人。\n        贏，本身就是一個你出價過高的訊號（與付第一價或第二價無關）。\n```\n\n這就是**贏家詛咒**:在共同價值拍賣裡,「我贏了」這件事本身攜帶了壞消息——它告訴你,你的出價高過了在場所有人,也就最可能高過了真值。理性的競標者必須**預先**為這件事打折:不是出你估的值,而是出「在我贏的條件下,這東西的期望真值」——那個值更低,因為「我贏」這個條件本身就偏向高估。\n\n注意贏家詛咒**不違背**前面維克里的結論——維克里講的是私有價值(你的估值就是你的事,沒有「未知真值」可高估),那裡照實出價是優勢策略、沒有詛咒。贏家詛咒專屬於共同價值。兩者別搞混:**私有價值看維克里(誠實最優),共同價值要防贏家詛咒(預先打折)。** 這也是焦慮工程師該內化的一條:任何競價系統,先問清楚「大家在搶的是各自主觀的值,還是同一個客觀但未知的值」——答案決定了你該照實出還是該打折出。\n\n## 回到中央張力:拍賣是脊椎困境的建設性反面\n\n該把這一章接回全書脊椎了。\n\nch01 那張囚徒困境矩陣(T,R,P,S=5,3,1,0)講的是一個壞消息:**個體理性 ⇒ 集體次優**。兩個玩家各自選優勢策略「背叛」,雙雙落到 (1,1),明明 (3,3) 對大家都更好——每個人最佳化自己,結果集體更糟。那是裂縫朝著壞的方向裂開。\n\n維克里拍賣是同一條張力,但裂縫朝**好的**方向。看清楚這個對稱:\n\n```text\n同一條張力的兩端：\n\n  脊椎囚徒困境（ch01）：\n     規則給定 → 個體理性（各自背叛）→ 集體次優（1,1 而非 3,3）\n     個體最佳化 把大家拖下水。\n\n  維克里拍賣（ch14）：\n     規則「設計過」→ 個體理性（各自照實出價）→ 集體最優\n     （東西落到最珍視者手上 = 有效率配置）\n     個體最佳化 剛好導出集體最好。\n\n  差別不在玩家——兩邊的玩家都一樣理性、一樣自利。\n  差別在規則。報酬矩陣是給定的還是設計的，決定了\n  個體理性把集體帶向地獄還是天堂。\n```\n\n這就是 ch13「反過來設計賽局」的全部精神,在拍賣這個案例上達到了最乾淨的展現。囚徒困境裡,個體理性與集體理性分裂、互相打架;維克里拍賣裡,**機制設計者把報酬規則調整到讓兩者重合**——當每個人照實出價(個體理性)恰好導出有效率的配置(集體最優),裂縫就被縫合了。\n\n我認為這是本書最有希望的一頁。前面九章脊椎,反覆告訴你「聰明人會集體犯傻」「合作不是預設」。維克里在這裡給出一個建設性的反命題:**只要你握有設計規則的權力,你可以把個體的自利,變成集體福祉的引擎。** 不是靠勸人為善,是靠把報酬結構設計對。這也正是你身為後端工程師天天在做的事——設計配額、計費、競價規則,讓使用者追求自己利益的同時,系統往你要的方向走。下一章 ch15 會給這份樂觀澆一盆冷水(投票的 Arrow 不可能定理:有些目標,再聰明的機制設計也達不到),但這一刀——「說真話能被設計成優勢策略」——是真的,而且優雅。\n\n## 直覺的陷阱\n\n拍賣是機制設計裡直覺最容易出錯的地方,因為「第二價格付別人的價」這個設定本身就反常識。守住下面這幾條正確版。\n\n| # | 錯誤直覺 | 哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| 1 | 「第二價格拍賣裡,我應該出比真實估值高一點,才搶得到」 | 以為抬價能增加贏面又不付代價 | 抬價多搶到的全是「對手出價已超過你估值」的場次——贏了就虧(報酬 vᵢ−m<0)。出高於估值嚴格不會更好,可能更糟。照實才是優勢策略 |\n| 2 | 「照實出價是因為誠實是美德/被道德約束」 | 把機制成就誤讀成道德勸說 | 誠實在維克里拍賣裡是**自利**的結果,不是道德。機制設計的全部魔力就在於「不靠人品,靠規則把說真話變成最划算的選項」 |\n| 3 | 「第一價格拍賣也該照實出價」 | 把第二價格的結論搬到第一價格 | 第一價格付的是**自己的出價**,照實出價報酬=0(白忙)。第一價格必須壓價,而壓多少要猜對手——沒有優勢策略。誠實最優只屬於第二價格族 |\n| 4 | 「Google 廣告競價是第二價格,所以照實出價最優」 | 把維克里結論套到 GSP | Google 的 GSP(廣義第二價格)**不是**真正的維克里,它在多廣告位時**不誘導誠實**——競標者可能壓價去搶更便宜的低位。真正誠實的多物品一般化是 VCG,不是 GSP |\n| 5 | 「拍賣怎麼設計,賣方收益都一樣(收益等價)」 | 把帶前提的定理當無條件守則 | 收益等價要求風險中立+獨立私有價值+對稱+付款只依出價。風險趨避時第一價格收益更高;共同價值時有贏家詛咒。前提一破,等價就垮 |\n| 6 | 「贏家詛咒是因為競標者不理性、衝動」 | 把結構性現象歸因於心理 | 贏家詛咒是**共同價值**的結構後果——得標篩選出最樂觀者。即使人人理性,沒預先為「贏=我最高估」打折就會中招。它是純私有價值拍賣(維克里)裡**不存在**的 |\n\n最值得單獨拎出來的是 #2。整章的驚嘆點全壓在這:**維克里沒有讓人變誠實,他讓誠實變得划算。** 如果你讀完只記得一句話,記這句——好的機制設計不改變人性,它改變報酬,讓人性的自利自動吐出設計者要的真相。\n\n## 紙上推演\n\n全部純紙筆,數字手算。算完用「偏離 vs 照實」兩個視角交叉複核。\n\n### 推演題一(★,15 分鐘):維克里拍賣基本驗算\n\n四個競標者估值分別是 v=12, 9, 6, 4,用維克里拍賣(第二價格密封)。\n(a) 大家都照實出價,誰得標?付多少?得標者報酬?\n(b) 估值 9 的那位,能不能靠「出 13」搶贏估值 12 的那位、並從中獲利?算出他這樣做的報酬。\n(c) 估值 12 的那位,能不能靠「出 20」多賺?算他出 20 時付多少、報酬多少,跟照實出 12 比較。\n\n### 推演解答(題一)\n\n(a) 出價 12 最高,**估值 12 者得標**,付第二高出價 **9**,報酬 = 12 − 9 = **3**。其餘三人報酬 0。配置有效率(東西到估值最高者手上)。\n\n(b) 估值 9 者出 13,確實壓過 12 成為最高,**得標**,但付第二高出價——也就是那位照實出 12 的人——**付 12**。報酬 = v − p = 9 − 12 = **−3**。他花了讓自己虧 3 的代價,搶到一個對他只值 9 的東西。**買貴了。** 照實出 9 當輸家(報酬 0)反而比搶贏(−3)好。這就是「出高於估值 ⇒ 贏了反而虧」的活例。\n\n(c) 估值 12 者出 20,他本來就是最高,出 20 還是最高、還是得標。付的是第二高出價(9,沒變),報酬 = 12 − 9 = **3**,跟照實一模一樣。**抬價一毛沒多賺**——因為付的價由別人定,跟自己出多少無關。\n\n**常見錯路**:在 (c) 誤以為「出 20 得標就要付 20」。第二價格付的是**第二高出價**,不是自己的出價;只要你維持最高,出 13 還是出 20 還是出 12,付的都是同一個第二高價。出價只決定贏不贏,不決定付多少。\n\n### 推演題二(★★,20 分鐘):換成第一價格,為什麼要壓價\n\n同樣四人(估值 12, 9, 6, 4),現在改用**第一價格密封投標**(出多少付多少,最高者得標)。\n(a) 如果估值 12 者照實出 12,得標,他的報酬是多少?說明為什麼這樣很蠢。\n(b) 假設估值 12 者「相信對手最高會出在 9 附近」,他出 9.5 得標,報酬多少?\n(c) 用一句話說清楚:為什麼第一價格沒有「照實出價」這個優勢策略,而要看對手?\n\n### 推演解答(題二)\n\n(a) 照實出 12、得標、**付 12**,報酬 = 12 − 12 = **0**。白忙一場——拿到了東西但一毛利潤都沒留下。在第一價格裡照實出價等於把全部消費者剩餘讓給賣方,所以很蠢。\n\n(b) 出 9.5、得標(高過對手最高的 9)、付 9.5,報酬 = 12 − 9.5 = **2.5**。他靠壓價把 2.5 留成了利潤。\n\n(c) **因為第一價格裡「付多少」等於「出多少」,所以壓價能直接少付——但壓太低會輸,壓多少剛好取決於對手最高會出多少。** 對手的出價是你不知道的私有資訊,於是你的最佳出價依賴對對手的猜測,沒有「不管對手怎樣都最優」的單一答案——也就沒有優勢策略,只有 ch03 那種「視對手而定的最佳反應」。對照維克里:付的是別人的價,壓價不省錢,於是照實升格為優勢策略。\n\n**常見錯路**:以為第一價格也能找到「照實是優勢策略」。不行——付的就是你出的價,照實=零利潤,理性玩家必壓價,而壓價必看對手。第一價格與第二價格的策略本質,差在「付自己的價還是付別人的價」這一刀。\n\n### 推演題三(★★★,25 分鐘):設計一個誘導誠實的內部資源分配\n\n你要在公司內把一批稀缺 GPU 配額分給三個 team。每個 team 對配額有一個真實價值(對它的專案值多少),只有它自己知道,而且都有動機虛報以多搶。你想設計一套「申報規則」,讓**照實申報自己的真實需求,成為每個 team 的優勢策略**,且配額落到真正最需要的 team。\n(a) 直接套維克里:你會怎麼定規則?(誰得標、付什麼「價」?)注意內部沒有真錢,你得想一個等價的「成本」。\n(b) 說明為什麼這個規則下,team 虛報高/虛報低都不划算。\n(c) 焦慮工程師加分題:這個機制有什麼前提可能在現實裡破掉、讓誠實不再是優勢策略?舉至少一個。\n\n### 推演解答(題三)\n\n(a) **維克里式內部分配**:讓每個 team 密封申報「這批配額對我的價值」(換算成某種可比的點數,例如「願意放棄多少其他資源額度來換」)。**申報最高者拿到配額,但它要付出的成本=第二高的申報值**——用它的其他資源預算(下季配額、信用點數)扣抵。關鍵是「付的成本由別人的申報定,不由自己的申報定」,這樣才複製維克里的解耦。\n\n(b) **虛報高**:多搶到的全是「別人申報已超過我真實價值」的場次——拿到配額但付出的成本(第二高申報)超過它對我的價值,淨虧。**虛報低**:可能把「本來照實會贏、且贏了划算」的配額讓掉,自己變 0。兩個方向都不划算,照實申報是優勢策略——和本章維克里論證同構。\n\n(c) **可能破掉的前提**(舉一即可):\n- **沒有真錢/成本不可信**:如果「付出的成本」其實扣不到、或事後能凹回來(罰則不執行),維克里的代價就是空的,team 會放心虛報。機制的牙齒在於成本真的會被收。\n- **重複賽局與聲譽外溢**:這不是一次性拍賣,team 之間下季還要再搶。team 可能為了「壓低自己在主管心中的需求,以免以後配額被砍」而**故意低報**——跨期誘因污染了單期的誠實。\n- **共謀(collusion)**:三個 team 私下串通輪流低報、輪流得標,瓦解競價。維克里對單一理性個體誘導誠實,但擋不住合謀。\n- **共同價值成分**:如果「這批 GPU 到底值多少」有客觀未知成分(例如它能不能撐住某個未定的大專案),贏家詛咒就會混進來,照實申報不再純粹。\n\n**常見錯路**:設計成「申報最高者付自己的申報值」——那是第一價格,會誘導所有 team 壓低申報、互相猜測,誠實崩潰。維克里的命脈是「付第二高、付別人的價」。\n\n## 自我檢核\n\n口頭自答,講得出來才算過。優先答「為什麼」。\n\n1. 用一句話講清楚:維克里拍賣為什麼能讓照實出價變優勢策略?(提示:你的出價決定什麼、不決定什麼?)\n2. 在第二價格拍賣裡,「出高於真實估值」具體會在哪種情況害你虧錢?把那個情況的報酬算式說出來。\n3. 為什麼同樣的「照實出價」在第一價格拍賣裡是愚蠢的?第一價格與第二價格的策略本質差在哪一刀?\n4. 英式拍賣為什麼策略上等價於第二價格密封投標?得標者實質付的是什麼?\n5. 收益等價定理說四種拍賣賣方收益相同——它靠哪些前提?舉一個前提破掉、結論就不成立的例子。\n6. 贏家詛咒是什麼?為什麼它只發生在共同價值拍賣、而純私有價值的維克里拍賣裡不存在?\n7. 把這一章接回 ch01 那張囚徒困境矩陣:維克里拍賣和囚徒困境是「同一條張力的兩端」——這句話什麼意思?差別在玩家還是在規則?\n8. 為什麼說「維克里沒有讓人變誠實,他讓誠實變划算」是這一章的核心?機制設計改變的是人性還是報酬?\n\n## 延伸閱讀\n\n- **Vickrey, W. (1961), \"Counterspeculation, Auctions, and Competitive Sealed Tenders,\" _Journal of Finance_ 16(1):8–37**——第二價格拍賣的原始論文,本章的源頭。讀它對「誠實是優勢策略」與「英式≈第二價格、荷式≈第一價格」策略等價的原始論證(維克里也因此貢獻獲 1996 年諾貝爾經濟學獎,嚴格說是瑞典央行紀念諾貝爾的經濟學獎)。\n- **Stanford Encyclopedia of Philosophy,「The Economics of Information」/ 拍賣與機制設計條目(plato.stanford.edu)**——把拍賣放進機制設計與誘因相容的脈絡,適合接著 ch13 讀,直覺優先、少公式。\n- **Vijay Krishna,《Auction Theory》(Academic Press)**——拍賣理論的標準研究所教材。想看本章「弱優勢策略」與「收益等價定理」的完整形式化證明、以及 Myerson 1981 最適拍賣設計,從這本入手。前幾章涵蓋本章全部直覺的嚴格版。\n- **Roger Myerson (1981), \"Optimal Auction Design,\" _Mathematics of Operations Research_ 6(1):58–73**——收益等價定理與最適拍賣的奠基論文(Myerson 因機制設計貢獻獲 2007 年諾貝爾經濟學獎)。數學偏重,但「收益由配置機率決定」這個核心洞見值得一讀。\n- **Edelman, Ostrovsky & Schwarz (2007), \"Internet Advertising and the Generalized Second-Price Auction,\" _American Economic Review_**——若你對廣告競價好奇,這篇講清楚 Google 的 GSP 為什麼**不是**真正的維克里、為什麼它在多廣告位時不誘導誠實。把本章「直覺的陷阱 #4」講透。\n- **跨書**:拍賣裡「一個競標者在不確定下該出多少、估值換算成效用」屬單人理性選擇——深入處見《在不確定中下注》談期望效用與風險趨避那部分(風險趨避正是收益等價失效、第一價格收益更高的原因);贏家詛咒裡「在我贏的條件下重估期望真值」用到的條件期望機制,見《馴服隨機》談期望值與條件機率的相關章。\n"}, {"id": "ch15-voting-arrow", "file": "ch15-voting-arrow.md", "group": "Part VI — 賽局無所不在＋收官", "title": "ch15 — 投票與 Arrow 不可能定理：好消息與壞消息", "md": "# ch15 — 投票與 Arrow 不可能定理：好消息與壞消息\n\n> **本章解決什麼問題**：上一個 Part（ch13–ch14）帶來一個好消息——既然規則決定結局，就反過來設計報酬，讓理性自動導向好結果；維克里拍賣把「說真話」設計成了優勢策略，誘因相容是可以辦到的。進 Part VI，我要先給你機制設計的**另一面**：把好幾個人的偏好聚合成一個集體決定（投票），結果發現某些誘因相容的目標**根本不可能**達成。拍賣是「設計得當就能誘導誠實」的招牌成功，投票則撞上 Arrow 不可能定理這道天花板：沒有任何投票規則能同時滿足一小撮「看起來都很合理」的公平條件。這一章是全書「壞消息」最集中的一頁——但壞消息本身是個深刻的好消息：它告訴你「完美的集體選擇」不是工程沒做好，是數學上不存在。下一章（ch16）把同樣的張力放大到 n 人共有財，看個體理性如何在規模上爆炸。\n\n```text\n全書地圖：當每個人都理性，為什麼結果可能對所有人都糟——又如何救回來\n\n  Part I  困境與均衡 ............. 一張矩陣，與「聰明人集體犯傻」的核心\n     ch01 囚徒困境登場\n     ch02 納許均衡\n     ch03 最佳反應：優勢、劣勢與逐步淘汰\n        |\n        v\n  Part II  純策略不夠用 .......... 零和、極小極大、隨機化\n     ch04 零和與極小極大\n     ch05 混合策略：讓對手猜不到\n     ch06 賽局樹：序貫、承諾與可信威脅\n        |\n        v\n  Part III  合作的考古學 ......... 為什麼合作會崩、又如何救回\n     ch07 重複賽局與未來的陰影\n     ch08 一報還一報與無名氏定理\n     ch09 演化賽局與 ESS（均衡不需要會算的玩家）\n        |\n        v\n  Part IV  協調與資訊 ........... 多均衡、顯著性、不對稱資訊\n     ch10 協調賽局與謝林點\n     ch11 訊號、承諾與不對稱資訊\n     ch12 人類實際怎麼玩：公平、信任與報酬矩陣外的東西\n        |\n        v\n  Part V  反過來設計賽局 ........ 機制設計：讓理性導向好結果\n     ch13 機制設計總論\n     ch14 拍賣：把說真話設計成優勢策略\n        |\n        v\n  Part VI  賽局無所不在＋收官 ... 投票、共有財、應用、總對帳   ◄ 你在這裡\n     ch15 投票與 Arrow 不可能定理\n     ch16 公共財與共有財的悲劇\n     ch17 賽局無所不在：應用全景\n     ch18 同一張矩陣，現在你懂它七層\n```\n\n## 從你已知的出發\n\n你寫過一個「偏好聚合」的函式，只是你大概沒這樣叫它。\n\n想想你做過的任何一次**團隊技術選用投票**：要不要從 REST 換成 gRPC？資料庫選 PostgreSQL、MySQL 還是 DynamoDB？六個工程師各有一張心裡的排序，你要把這六張排序壓成一個團隊決定。你拿了張白板，每人投一票給最愛的那個，數一數，最高票出線。三十秒搞定。\n\n或者想想你 backlog 的 **feature 優先順序排序**。產品、後端、前端、SRE 各有一份「該先做什麼」的順序，你的工作是把這四份順序合併成一份大家照著做的 roadmap。你寫過一個小腳本，把每個人對每個 feature 打的分加起來、由高到低排，輸出一份「客觀的」優先順序列表。\n\n這兩件事，數學上是同一個東西：**一個把多份個體排序（rankings）吃進去、吐出一份集體排序（或集體選擇）的函式。** 社會選擇理論（social choice theory）管它叫**社會福利函式（social welfare function）**——名字很學術，但它的型別簽章你一眼就懂：\n\n```text\naggregate(preferences: Ranking[]): Ranking\n```\n\n而你身為一個寫過無數聚合函式的後端工程師，對「聚合」這件事是有強烈直覺的：`sum`、`avg`、`max`、`majority` 都很乾淨、很可靠、沒什麼好擔心的。把一堆數字聚成一個數字，能出什麼大錯？\n\n這一章就是要告訴你：**這個 `aggregate` 函式，是你寫過最危險的聚合函式之一**，危險到 Kenneth Arrow（阿羅）在 1951 年用一條定理證明了——**它的「正確版本」根本不存在**。不是你還沒找到好的演算法，是任何演算法都會在某個你列得出來的合理性質上爆掉。這跟你熟的那些聚合不一樣：`sum` 不會背叛你，但 `aggregate(rankings)` 會，而且是**數學上保證**會。\n\n你可能已經在分散式系統裡撞過它的近親了：\n\n- **Raft／Paxos 的多數決**：節點對「下一個 log entry 是什麼」投票，靠 quorum 收斂。但這裡其實偷偷迴避了 Arrow 的麻煩——共識協定要協調的是「**選同一個值**」（協調賽局，見 ch10），值本身好壞同質、選項之間沒有「每個節點各有一套完整偏好排序」的衝突。Arrow 處理的是更難的問題：節點們對選項**有實質且互相矛盾的偏好排序**時，怎麼聚合。\n- **策略性投票**：你一定看過有人在團隊投票時**不投他真正最愛的那個**，而是「投一個比較可能贏、又比我最討厭的好」的妥協選項——怕自己那一票浪費掉。這就是策略性投票（strategic voting），它跟上一章拍賣的誠實出價形成尖銳對比：第二價格拍賣裡說真話是優勢策略，投票裡說真話卻常常害你自己。\n- **「客觀」排序的循環**：你那個把每人分數加總的腳本，有沒有出現過詭異的結果——換一個無關的爛 feature 進候選清單，前兩名的排序居然顛倒了？那不是你腳本有 bug，那是 Arrow 定理裡「無關選項獨立性」被違反的活樣本。\n\n中央張力在這裡換了一張臉。囚徒困境裡，個體理性導致集體**更糟**（見 ch01 那張矩陣）。投票裡，個體理性（策略性投票、誠實偏好的衝突）導致集體偏好**根本沒有一個融貫的形狀**——集體甚至湊不出一個「理性」的排序。個體都理性，集體卻可能連遞移性（transitivity）都保不住。這是裂縫的一個新版本：不是集體結果差，是集體**意志**本身不存在。\n\n## 投票作為集體選擇機制：先把問題說清楚\n\n機制設計（見 ch13）的視角是：給定一個目標結局，設計規則讓理性玩家自動導向它。拍賣的目標是「把東西配給最珍視它的人」，維克里機制漂亮地辦到了。投票的目標看起來更卑微——**只是把大家的偏好公平地聚合成一個集體決定**——卻是個出乎意料地難纏的機制。\n\n先把舞台擺好。有 n 個投票者（voter），每人對 m 個選項（alternative）有一份**完整的偏好排序**：A 比 B 好、B 比 C 好之類。一個**投票規則（voting rule）**就是一個函式，把這 n 份個體排序吃進去，吐出一份集體排序（或至少一個集體贏家）。\n\n我們對這個函式有期待。我們希望它「公平」「合理」。問題是——當你試著把「公平合理」拆成幾條精確的數學要求，再去找一個同時滿足全部的函式時，你會發現自己在找一個不存在的東西。\n\n但在 Arrow 那記重拳之前，先看一個更早、更具體的警訊。它本身就夠讓人不安了。\n\n## Condorcet 悖論：多數決會自己咬自己的尾巴\n\n最自然的投票直覺是**多數決（majority rule）**：A 和 B 兩兩對決，誰得到的票多誰勝。這套規則乾淨、民主、無可指摘。法國數學家 Marquis de Condorcet（孔多塞）在 **1785 年**發現了它一個要命的毛病。\n\n設想三個投票者，對三個選項 A、B、C，各有一份**完全正常、完全理性、完全遞移**的偏好排序：\n\n```text\nCondorcet 悖論：三人三選項（≻ 讀作「優於」）\n\n  投票者 1：  A ≻ B ≻ C      （最愛 A、其次 B、最討厭 C）\n  投票者 2：  B ≻ C ≻ A      （最愛 B、其次 C、最討厭 A）\n  投票者 3：  C ≻ A ≻ B      （最愛 C、其次 A、最討厭 B）\n\n  每個人的排序都遞移、都沒毛病：1 喜歡 A>B>C、不會冒出 C>A。\n```\n\n注意這三份排序很美——它們是把 A、B、C 三個選項**循環旋轉**一格得到的（1 是 ABC、2 是 BCA、3 是 CAB）。每個選項當第一名一次、第二名一次、第三名一次，公平到不能再公平。現在我們用多數決，把三個選項**兩兩對決**：\n\n```text\n兩兩多數決（每對問「幾個人覺得左邊優於右邊」）：\n\n  A vs B：誰覺得 A≻B？  投票者 1（A≻B≻C ✓）、投票者 3（C≻A≻B ✓）→ 2 票\n          誰覺得 B≻A？  投票者 2（B≻C≻A ✓）            → 1 票\n          ⇒ A 以 2:1 擊敗 B            ← 社會偏好 A ≻ B\n\n  B vs C：誰覺得 B≻C？  投票者 1（A≻B≻C ✓）、投票者 2（B≻C≻A ✓）→ 2 票\n          誰覺得 C≻B？  投票者 3（C≻A≻B ✓）            → 1 票\n          ⇒ B 以 2:1 擊敗 C            ← 社會偏好 B ≻ C\n\n  C vs A：誰覺得 C≻A？  投票者 2（B≻C≻A ✓）、投票者 3（C≻A≻B ✓）→ 2 票\n          誰覺得 A≻C？  投票者 1（A≻B≻C ✓）            → 1 票\n          ⇒ C 以 2:1 擊敗 A            ← 社會偏好 C ≻ A\n```\n\n把這三條社會偏好排成一行，你就看見那個讓孔多塞失眠的東西：\n\n```text\n  社會偏好：  A ≻ B   且   B ≻ C   且   C ≻ A\n                └──────────────────────────┘\n                        A ≻ B ≻ C ≻ A ???\n\n  多數決說：社會偏好 A 勝過 B、B 勝過 C——那社會應該偏好 A 勝過 C 吧？\n  不。多數決同時說社會偏好 C 勝過 A。一個環。沒有第一名。\n```\n\n**這就是 Condorcet 悖論：每個人的偏好都遞移，多數決聚合出來的集體偏好卻是循環的——A 贏 B、B 贏 C、C 卻贏 A。** 沒有哪個選項是「孔多塞贏家」（能打贏所有對手的選項）。你問「社會最想要哪個」，答案是一個首尾相咬的環。\n\n讓我用工程師的方式講為什麼這該嚇到你。你心裡那個 `aggregate` 函式，預設輸出是一個**全序（total order）**——一份可以拿來排序、可以取最大值的列表。`sum` 永遠給你一個良序的總和，`max` 永遠選得出贏家。但偏好聚合不保證：**三個遞移的輸入，聚合出一個不遞移的輸出。** 這在你寫過的任何數值聚合裡都不會發生——把三個遞移的全序加起來，怎麼會冒出一個環？因為「多數決」不是在加數字，它是在對**每一對**選項分別開一場投票，而這些獨立的對決之間**沒有任何東西保證它們彼此融貫**。\n\n它的工程版你見過：你那個「把每人分數加總再排序」的腳本之所以看起來沒事，只是因為**加總（Borda 式計數）剛好繞開了循環**——它強行給每個選項一個總分，總分當然能排序。但代價是它違反了 Arrow 後面要講的另一條性質（無關選項獨立性），所以才會出現「加一個爛 feature 進清單、前兩名顛倒」的鬼打牆。**你沒有逃掉這個問題，你只是把它從『循環』這個症狀換成了『排序不穩定』那個症狀。** Arrow 定理接下來會告訴你：你換到哪個症狀都行，但你逃不掉**全部**症狀。\n\n中央張力在這裡：三個投票者各自的偏好都完美理性、完美遞移（個體理性無懈可擊），聚合出的集體偏好卻連「理性」最起碼的要求——遞移性——都達不到。**個體的理性沒有加總成集體的理性。** 跟囚徒困境同源，但更深一層：困境裡集體結果差，這裡集體連一個融貫的「想要什麼」都形成不了。\n\n## 策略性投票：為什麼誠實在投票裡不是優勢策略\n\nCondorcet 悖論講的是規則本身的毛病。現在加進玩家的算計——這才是賽局理論真正接手的地方。\n\n回想 ch14 拍賣的好消息：第二價格（維克里）拍賣裡，**照實出你的真實估值是（弱）優勢策略**——不管別人怎麼出，照實出永遠不會更差。誠實被設計成了理性。投票呢？我們來看誠實在投票裡會不會也是優勢策略。\n\n用最常見的**單純多數決（plurality，每人投一票給最愛的，最高票勝）**。三個選項 A、B、C，七個投票者，偏好如下：\n\n```text\n單純多數決下的策略性投票（7 名投票者）：\n\n  3 人：  A ≻ B ≻ C      （死忠 A 派）\n  2 人：  C ≻ B ≻ A      （死忠 C 派）\n  2 人：  B ≻ C ≻ A      （B 派，但第二喜歡 C、最討厭 A）\n\n  如果人人誠實投最愛的那一個：\n     A 得 3 票、C 得 2 票、B 得 2 票  →  A 勝。\n```\n\n現在站在最後那 2 個 **B 派**的角度想。他們最愛 B，但 B 只拿 2 票、贏不了。誠實投 B 的結果是——他們最討厭的 A 上位（A 拿 3 票勝出）。對 B 派來說這是最糟結局。\n\n於是他們動腦筋：「B 反正贏不了，我這兩票投 B 等於浪費。但 C 是我的第二選擇、而且我最討厭 A。如果我們兩個改投 C，C 就有 2+2=4 票，超過 A 的 3 票，C 勝。」\n\n```text\n  B 派改投策略票（投第二喜歡的 C，而非最愛的 B）：\n     A 得 3 票、C 得 2+2=4 票、B 得 0 票  →  C 勝。\n\n  對 B 派而言：誠實投 B → A 勝（最糟）\n              策略投 C → C 勝（次佳，遠勝最糟）\n  ⇒ 說謊（不投最愛）讓 B 派得到更好的結果。誠實在這裡是劣勢策略。\n```\n\n**這就是策略性投票，也是投票和拍賣最尖銳的分水嶺。** 在維克里拍賣裡，偏離真實估值只會害你自己；在多數決裡，**偏離你的真實偏好常常救你自己**。誠實在拍賣是優勢策略，在投票卻是劣勢策略。同樣是機制設計，一個能把誠實設計成理性，一個不能——這個落差正是本章「好消息／壞消息」標題的來歷。\n\n而這不是多數決特有的瑕疵。**Gibbard–Satterthwaite 定理**（Allan Gibbard 1973、Mark Satterthwaite 1975 各自獨立證明）把它一般化成一句殘酷的話：\n\n> 只要選項有三個以上，任何「非獨裁、且每個選項都可能勝出」的確定性投票規則，**都可以被某個投票者透過謊報偏好操弄**——也就是說，沒有任何（非平凡的）投票規則能做到「對所有人、所有情境，誠實都是優勢策略」。\n\n把它跟維克里拍賣並排，落差刺眼：拍賣能設計出 strategy-proof（誠實防作弊）的機制，投票在三選項以上**證明做不到**。你想設計一個「沒人有動機謊報偏好」的投票系統？Gibbard–Satterthwaite 說：除非你讓某一個人獨裁、或者把選項砍到剩兩個，否則辦不到。\n\n（順帶一提，三個選項是門檻不是巧合。**只有兩個選項時，單純多數決其實非常乖**——它誠實防作弊、對稱、滿足一堆好性質。麻煩全是從第三個選項開始的。所以「要不要 merge 這個 PR」的二選一投票很安全，「三個架構方案選一個」就開始長出策略空間。）\n\n## Arrow 不可能定理：壞消息的數學形狀\n\nCondorcet 是「多數決」這條特定規則的毛病，Gibbard–Satterthwaite 是「誠實不可能是優勢策略」。Arrow 1951 的不可能定理（出自他的博士論文《Social Choice and Individual Values》）比這兩者都更釜底抽薪：它**不針對任何特定規則**，而是先寫下四條「任何公平的聚合規則都該滿足」的性質，然後證明——**沒有任何規則能同時滿足這四條**（在選項三個以上時）。\n\n先把四條件講清楚。我盡量用你能對映到 code review 的語言講，因為每一條單獨看都像一條你會在 PR 裡要求的、毫無爭議的不變量（invariant）。\n\n```text\nArrow 的四個條件（社會福利函式吃 n 份排序、吐 1 份集體排序）：\n\n ① 無限制定義域（Unrestricted Domain）\n    任何「每人各自遞移」的偏好組合，函式都得能處理、給出輸出。\n    ── 工程版：不能對輸入挑食。任何合法的偏好排序組合都是合法 input，\n       不准說「這種排序我不收」。\n\n ② 帕累托（Pareto / 一致同意）\n    如果『每一個人』都偏好 A 勝過 B，那集體排序也必須 A 勝過 B。\n    ── 工程版：全體一致的偏好不准被推翻。沒人能否決全民共識。\n\n ③ 無關選項獨立性（Independence of Irrelevant Alternatives, IIA）\n    集體在 A 與 B 之間怎麼排，只能取決於每個人對 A、B 這「一對」的相對偏好；\n    跟大家怎麼看 C（或任何第三選項）無關。\n    ── 工程版：A 與 B 的相對名次，不准因為清單裡多了/少了一個無關的 C 而翻轉。\n\n ④ 非獨裁（Non-Dictatorship）\n    不存在某一個投票者，使得「集體排序永遠等於這個人的排序」、其他人形同空氣。\n    ── 工程版：沒有 root 帳號。不准有人說了算、其他票全是裝飾。\n```\n\n每一條你都會同意。「不挑食」「尊重全民共識」「無關選項不該影響」「別搞獨裁」——這四句拿到任何一場關於「怎樣的投票才公平」的辯論裡，都是底線中的底線，沒有一條過分。\n\n**Arrow 定理（1951）：當選項有三個以上時，沒有任何社會福利函式能同時滿足這四個條件。**\n\n換句話說，任何你設計的投票規則，只要它能吃任意偏好（①）、尊重全民共識（②）、不被無關選項干擾（③），那它**一定是獨裁**（違反④）——集體排序永遠等於某個固定那個人的排序。反過來，只要你堅持非獨裁，就**必然**得在前三條裡犧牲掉至少一條。\n\n這不是「目前找不到」，是 Arrow 用一個構造性的證明關死了所有門：**這樣的函式在邏輯上不存在。** 嚴謹度誠實標示：本書給的是直覺與條件，完整證明（透過「決定性集合」一路收縮到單一獨裁者的論證）不展開，指向延伸閱讀的 SEP 條目。我能誠實給你的是它**為什麼**該震撼你的工程直覺——\n\n你寫 `aggregate` 函式時，腦中那份「規格」其實就是這四條的某種模糊版本：別挑輸入、尊重共識、別被雜訊干擾、別讓某個人說了算。你會自然假設「這規格雖然嚴格，但總有個實作能滿足吧，頂多難寫一點」。Arrow 說：**這份規格不是難實作，是無法實作。** 它跟「寫一個永不出錯的去重複函式」不一樣——去重複只是工程難題；偏好聚合是邏輯上的**矛盾規格**，就像要你寫一個「對所有輸入都停機、且能判定任意程式是否停機」的函式。不存在不是因為你不夠強，是因為這個型別簽章本身自相矛盾。\n\n回到 Condorcet 那個悖論，現在你看得更深了：多數決犧牲的是哪一條？它**保住**了②帕累托、④非獨裁、①無限制定義域——代價是輸出可能根本不是個全序（連遞移都保不住，更別說滿足③）。而你那個「分數加總」腳本保住了「輸出是全序」，犧牲的是③ IIA——所以才會「加一個爛 feature 進清單、前兩名顛倒」。**每個規則都在 Arrow 的四條裡選一條來破，沒有例外。你只能選擇你願意承受哪一個症狀。**\n\n中央張力在這裡走到全書的一個極點。前面的困境是「個體理性 ⇒ 集體更糟」，至少集體還有個明確的「更糟結果」可指。Arrow 說的是：當每個個體的偏好都完美理性，把它們聚合成一個「同樣理性、又公平」的集體意志這件事，**本身就不存在**。不是聚合得不好，是「公平地聚合」這個目標在數學上是空集合。個體理性與集體理性的裂縫，在這裡裂成了一道不可能跨越的鴻溝。\n\n## 好消息與壞消息：為什麼拍賣行、投票不行\n\n把這一章的標題收攏。你現在手上有兩個機制設計的案例，結論恰好相反：\n\n```text\n                  拍賣（ch14，好消息）        投票（ch15，壞消息）\n  目標            把東西配給最珍視者          把偏好公平聚合成集體決定\n  誠實是…         （弱）優勢策略 ✓            常是劣勢策略 ✗（策略性投票）\n  誠實能防作弊？   能（維克里第二價格）        三選項以上不能（Gibbard–Satterthwaite）\n  完美機制存在？   存在                        不存在（Arrow 四條件不可兼得）\n```\n\n差在哪？一個工程師會問的、最該問的問題。我給一個直覺版的答案（嚴格的機制設計理論在延伸閱讀）：\n\n**拍賣聚合的是「一維、可比較、可用錢結算」的訊息——每個人的估值是一個數字，機制只要把東西給數字最大的人、再用第二價格切斷他謊報的誘因就行。** 維克里的巧妙在於「你付的價跟你的出價脫鉤」（你付第二高價、不是你自己出的價），於是謊報出價動不了你要付的錢、只會害你得標機會，照實出最划算。訊息是一維的、可貨幣化的，所以有辦法設計出「誠實最划算」的結算規則。\n\n**投票聚合的是「多維、不可共度、無法用單一尺度結算」的偏好排序。** 「我覺得 PostgreSQL 比 MySQL 好多少」沒有一個跟錢一樣的共同單位可以結算（這正是為什麼投票用排序、不用估值——你信得過大家誠實報出「我願意為 PostgreSQL 多付三萬」嗎？）。Arrow 的 IIA 條件本質上就是在要求「A 對 B 的集體判斷不准偷渡第三方資訊」，而一旦你只能用序數（ordinal）排序、不能用基數（cardinal）強度，可用的資訊就窮到撐不起一個融貫的聚合——Condorcet 的環就是這個貧乏的症狀。\n\n所以「好消息／壞消息」不是運氣，是結構：**當偏好能被壓進一個可結算的共同尺度（錢），機制設計能漂亮收工；當偏好是多維、不可共度的排序，Arrow 證明完美聚合不存在。** 這對你設計系統有一個非常實際的教訓：每次你想「投票表決」一件事，先問——**這些偏好能不能換算成一個共同的、可信的數字尺度？** 能（譬如真的有預算、有可量化的 SLA 影響），就用拍賣式／計分式機制，把它變成可結算的問題；不能（譬如純口味、純架構審美），就老實承認你在玩一個 Arrow 保證沒有完美解的賽局，於是**把力氣花在『選一個大家能接受的不完美規則並講清楚它犧牲了哪一條』，而不是幻想能找到完美規則**。後者是在找一個不存在的函式。\n\nArrow 因為這條定理（以及一般均衡理論的貢獻）在 **1972 年**獲頒諾貝爾經濟學獎（與 John Hicks 共得；嚴格說是瑞典央行紀念諾貝爾經濟學獎，由瑞典央行 1968 年設立，不在諾貝爾本人 1895 年遺囑的五個獎裡——本書沿用俗稱，全書已註明此區別）。他證明定理時年僅三十出頭，這條定理至今是社會選擇理論的奠基石。\n\n## 直覺的陷阱\n\n投票是「人人都有民主直覺、卻幾乎人人把 Arrow 講錯」的重災區。下面三個陷阱按「最常掉進去」排序。\n\n| 陷阱 | 錯誤直覺 | 哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| **「Arrow 證明民主沒用／投票是騙局」** | 既然沒有完美投票規則，那投票本身就是假的、毫無意義。 | 把「沒有滿足**全部**理想性質的規則」誤讀成「沒有**任何**有用的規則」。 | Arrow 證明的是「不可能同時滿足那四條」，**不是**「所有規則都一樣爛」。不同規則犧牲不同條件，在不同情境各有優劣；它是「沒有完美解、要懂取捨」的定理，不是「投票無用」的虛無主義宣言。把它當犬儒藉口是最常見的誤用。 |\n| **「無關選項獨立性聽起來無關緊要」** | IIA 是四條件裡最技術、最不重要的一條，可以隨便犧牲。 | 沒意識到 IIA 正是擋住「加一個爛選項就翻轉前兩名」這種荒謬的那條；犧牲它＝你的排序會被無關候選人操弄（spoiler effect，攪局者效應）。 | IIA 是四條裡最常被**實際違反**、後果也最有感的一條。現實選舉裡「第三方候選人分票害得本來會贏的人輸掉」就是 IIA 被破的代價。它一點都不無關緊要——它是「無關選項不該干擾」這個你天天靠它的不變量。 |\n| **「Condorcet 循環是罕見的病態案例，現實不會碰到」** | 那種首尾相咬的偏好太刻意了，真實投票哪會這麼巧。 | 把「需要特殊構造」誤當成「機率趨近於零」。其實只要選項夠多、偏好夠分歧，循環出現的機率不低，而且**你看不到它**——多數投票規則會直接吐一個贏家、把底下的循環藏起來。 | 循環在三方以上的真實偏好分布裡並不罕見（選項越多、越可能）。更危險的是它**沉默**：你的聚合函式照樣回一個「贏家」，但那個贏家可能在兩兩對決裡輸給另一個選項。你不知道，不代表它沒發生——這正是該讓你睡不著的那種失敗模式。 |\n\n自我察覺的徵兆：如果你發現自己在用 Arrow 定理**證明某個結論**（「所以民主是假的」「所以投票都該廢掉」），你十之八九講錯了——Arrow 是個**不可能**定理，它關掉的是「完美聚合」這個選項，它不替任何具體政治結論背書。它該讓你更謙卑（承認取捨無可避免），不是更犬儒。\n\n## 紙上推演\n\n全程紙筆，不要碰鍵盤。每題先自己算，再對解答；解答裡的「常見錯路」是重點。\n\n### 第 1 題（★★，[20 分鐘]）構造一個「策略性投票害死誠實」的情境\n\n**題目**：設計一組投票者偏好，使得在**單純多數決**（每人一票投最愛的，最高票勝）下，某一群投票者**誠實投票會得到他們最糟的結果，而謊報（投第二喜歡的）能得到較好的結果**。寫出：(a) 各群的偏好排序與人數；(b) 全體誠實時誰勝；(c) 哪一群該如何策略投票、改投後誰勝；(d) 用一句話說明這跟維克里拍賣的對比。\n\n**這題在練**：把「誠實在投票裡不是優勢策略」從一句話變成你親手擺出來的反例。\n\n### 第 2 題（★★，[15 分鐘]）用自己的話陳述 Arrow 四條件\n\n**題目**：不准翻回前面。憑記憶寫出 Arrow 不可能定理的四個條件，每條配一句「它在要求什麼」的白話，再配一個你工作裡的對映（code review 的不變量／API 設計原則皆可）。寫完再回去對照，看你漏了哪條、把哪條講弱了。\n\n**這題在練**：你能不能把四條件講給另一個工程師聽——這是 ch15 的口試門檻。特別注意你是不是把③ IIA 講漏或講弱了（最常被遺忘的一條）。\n\n### 第 3 題（★★，[20 分鐘]）找出「分數加總」腳本違反了哪一條\n\n**題目**：用 **Borda 計分法**（m 個選項，第一名給 m−1 分、第二名 m−2 分……最後一名 0 分，加總後最高分勝）。考慮以下兩種情境，三個投票者：\n\n```text\n情境甲（候選只有 A、B）：\n  投票者 1：A ≻ B\n  投票者 2：A ≻ B\n  投票者 3：B ≻ A\n\n情境乙（同樣三人，但清單多塞一個爛選項 C，沒人真的想要 C）：\n  投票者 1：A ≻ B ≻ C\n  投票者 2：A ≻ C ≻ B      ← 注意這人覺得 C 比 B 好\n  投票者 3：B ≻ C ≻ A\n```\n\n算出兩種情境下 Borda 計分的 A、B 名次。**A 和 B 的相對排名有沒有因為加了無關的 C 而改變？** 若有，這違反了 Arrow 的哪一個條件？\n\n**這題在練**：親手看見 IIA 被違反——加一個沒人要的選項，居然動了真正候選人之間的勝負。\n\n### 第 4 題（★★★，[20 分鐘]）口頭題：拍賣行、投票不行，差在哪\n\n**題目**：向一個只懂第二價格拍賣、不懂投票的工程師解釋：為什麼維克里拍賣能把「誠實」設計成優勢策略，投票卻撞上 Arrow 不可能與策略性投票。不准只說「投票比較難」，要說出**結構性的差別**（提示：聚合的訊息是什麼形狀、能不能用一個共同尺度結算）。三分鐘版。\n\n**這題在練**：本章「好消息／壞消息」的核心——機制設計什麼時候行、什麼時候撞牆。\n\n### 推演解答\n\n**第 1 題解答**：一組乾淨的反例（與正文同構，但你該能獨立擺出來）：\n\n```text\n  3 人：  A ≻ B ≻ C\n  2 人：  C ≻ B ≻ A\n  2 人：  B ≻ C ≻ A      ← 這群是關鍵\n\n(b) 全體誠實：A 得 3、C 得 2、B 得 2 → A 勝。\n(c) 最後那 2 個 B 派，最討厭 A。誠實投 B → B 輸、A 勝（B 派的最糟）。\n    他們改投第二喜歡的 C：C 得 2+2=4 > A 的 3 → C 勝。\n    對 B 派：C 勝（次佳）遠勝 A 勝（最糟）。⇒ 謊報得利，誠實是劣勢。\n(d) 維克里拍賣：偏離真實估值只會害自己（誠實＝優勢策略）。\n    多數決投票：偏離真實偏好常救自己（誠實＝劣勢策略）。同是機制設計、結論相反。\n```\n\n**常見錯路**：(1) 把人數湊成「誠實時 B 派最愛的就會贏」——那就沒有說謊的動機了，反例失效；關鍵是讓 B 派的最愛**註定贏不了**、且他們有個「比最糟好」的妥協選項可投。(2) 忘了檢查改投後**真的會翻盤**（C 的票數要真的超過 A），只憑感覺說「他們應該策略投票」。(3) 把它講成「B 派背叛了民主」——不，他們完全理性，正是**規則**逼出了不誠實，這才是 Gibbard–Satterthwaite 的點。\n\n**第 2 題解答**：四條件（對照正文檢查你的版本）：\n\n```text\n ① 無限制定義域：任何「人人各自遞移」的偏好組合都得能處理，不准挑輸入。\n ② 帕累托：全體一致偏好 A≻B，集體就必須 A≻B。（尊重全民共識）\n ③ 無關選項獨立性 IIA：集體對 A、B 的排序只看大家對這一對的偏好，\n                       與大家怎麼看第三選項 C 無關。（無關選項不准干擾）\n ④ 非獨裁：不存在一個人，集體排序永遠等於他、其他票形同空氣。\n 結論：選項 ≥3 時，①②③④ 不可兼得。要 ①②③ 就必是獨裁；要非獨裁就得犧牲前三之一。\n```\n\n**常見錯路**：(1) 把 ③ IIA 漏掉或講成「選項要互相獨立」——它不是講選項間的統計獨立，是講「**集體對某一對的判斷不准被第三者影響**」。(2) 把②帕累托講成「多數決」——帕累托只要求**全體一致**（unanimity）時尊重，不是多數時；這弱很多。(3) 把④非獨裁誤記成「人人平等／一人一票」——Arrow 沒要求對稱，只要求「不存在一個說了算的獨裁者」，門檻比平等低，所以更難迴避。\n\n**第 3 題解答**：算 Borda 分（兩選項時第一名 1 分、第二名 0 分；三選項時 2/1/0）。\n\n```text\n情境甲（兩選項，1分/0分）：\n  A：投票者1給1 + 投票者2給1 + 投票者3給0 = 2 分\n  B：投票者1給0 + 投票者2給0 + 投票者3給1 = 1 分\n  ⇒ A(2) ≻ B(1)。社會排序 A 在 B 前面。\n\n情境乙（三選項，2分/1分/0分）：\n  A：1給A=2、2給A=2、3給A=0          → 2+2+0 = 4 分\n  B：1給B=1、2給B=0、3給B=2          → 1+0+2 = 3 分\n  C：1給C=0、2給C=1、3給C=1          → 0+1+1 = 2 分\n  ⇒ A(4) ≻ B(3) ≻ C(2)。\n```\n\n這個情境裡 A 仍排在 B 前面，**相對名次沒翻**——但這只是因為我選的數字不夠刁。換一組三人偏好就能讓「加進 C」真的動到 A、B 的相對結果：\n\n```text\n情境甲'（兩選項，1分/0分）：\n  投票者 1：A ≻ B\n  投票者 2：A ≻ B\n  投票者 3：B ≻ A\n  ⇒ A=2、B=1 → A ≻ B（A 嚴格贏 B）\n\n情境乙'（同樣三人，塞進沒人真想要的 C）：\n  投票者 1：A ≻ B ≻ C\n  投票者 2：A ≻ B ≻ C\n  投票者 3：B ≻ C ≻ A      ← 只有這人把 C 排在 A 前面\n  A：2+2+0 = 4 分\n  B：1+1+2 = 4 分\n  C：0+0+1 = 1 分\n  ⇒ A=4、B=4 → A、B 變成平手（A 的領先被抹平了）\n```\n\n加一個沒人要的 C，就把「A 嚴格贏 B」變成了「A、B 平手」——**A、B 的相對結果確實被一個無關選項改動了**。誠實標一個邊界：在**三名**投票者下，Borda 法最多只能把 A、B 從嚴格勝負攪成平手（或反過來），要把「A ≻ B」**嚴格翻轉成 B ≻ A** 得要更多投票者（最少五人就辦得到）——但這不影響結論，**動到了就是動到了**：IIA 要求「A 對 B 的集體排序只看大家對這一對的偏好」，而 Borda 法的得分依賴每個選項跟『所有其他選項』的相對位置，所以塞進無關的 C 會改變大家給 A、B 的分數差，足以攪動 A、B 的相對結果。這正是違反 ③ 無關選項獨立性（IIA）。Borda 法買到了「輸出永遠是全序、永遠選得出贏家」（繞開 Condorcet 循環），代價就是賣掉了 IIA。\n\n**常見錯路**：(1) 算成「A、B 名次永遠不變」就下結論「Borda 沒問題」——你只是沒挑到會動的數字；要證明 Borda 違反 IIA，得找到**一組**「加了 C 之後 A、B 相對結果就改變」的偏好（存在性，一個反例就夠），不是檢查「我手上這組沒動」。注意這個改變不必是嚴格的勝負對調——把「A 嚴格贏 B」攪成「A、B 平手」一樣是 IIA 被破（無關的 C 動到了 A 對 B 的集體判斷）；三名投票者下只攪得出平手，要嚴格對調需要更多人。(2) 把違反的條件答成「帕累托」——帕累托在這裡沒被破（沒有全體一致的偏好被推翻）；被破的是 IIA。(3) 忘了 Borda 是序數計分、卻偷偷塞進「強度」直覺（「我超級喜歡 A」給更多分）——標準 Borda 只看名次、不看強度。\n\n**第 4 題解答（口頭，講出來才算過）**：結構性差別有三層，缺一不可：\n\n```text\n  1. 訊息維度：拍賣的偏好是『一維的估值』（一個數字）；\n     投票的偏好是『多維的排序』（A>B>C 整串），無法壓成一個數字。\n  2. 共同尺度：拍賣有錢這個可結算的共同單位，「給最高者、收第二價」\n     就能切斷謊報誘因；投票（序數排序）沒有共同尺度可結算。\n  3. 後果：有共同尺度 → 設計得出誠實=優勢策略（維克里）；\n     沒有 → Arrow 證明連『公平聚合』都不存在、Gibbard–Satterthwaite\n     證明誠實不可能是優勢策略。\n  一句話：能換算成可信的錢，機制設計就能漂亮收工；只能比序、不能結算，\n          就撞上 Arrow 的天花板。\n```\n\n**常見錯路**：只說「投票比較複雜／選項比較多」——那是現象不是原因；兩選項投票其實很乖（多數決誠實又防作弊），麻煩是從「多維排序＋無共同尺度」來的，不是從「複雜」來的。\n\n## 自我檢核\n\n口頭自答，講得出來才算過。優先回答「為什麼」。\n\n1. **為什麼**三個各自遞移的個體偏好，多數決聚合出來會循環（A≻B≻C≻A）？這個循環說明集體少了什麼性質？\n2. 維克里拍賣裡誠實是優勢策略，多數決投票裡誠實常是劣勢策略——**為什麼**同是機制設計會差這麼多？（一句話版的結構性答案）\n3. 用自己的話講 Arrow 四條件。哪一條最常被講漏或講弱？為什麼 ③ IIA 比它聽起來重要得多？\n4. **為什麼**「Arrow 證明了民主沒用」是誤讀？Arrow 真正關掉的是哪個選項、沒關掉哪個？\n5. Gibbard–Satterthwaite 定理跟 Arrow 定理在講不同的事，但結論的味道一樣。它們各自說的是什麼？為什麼門檻都是「三個選項以上」？\n6. 你那個「把每人分數加總再排序」的腳本繞開了 Condorcet 循環——它是用**犧牲哪一條 Arrow 條件**換來的？這在實務上會表現成什麼症狀？\n7. 這一章的中央張力（個體理性 vs 集體理性）跟 ch01 囚徒困境的版本有什麼**不同**？（提示：困境裡集體結果差；這裡集體的什麼東西不存在？）\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Arrow's Theorem」**（https://plato.stanford.edu/entries/arrows-theorem/）——四條件的精確陳述與完整證明思路（透過「決定性集合」收縮到獨裁者），本章不展開的那部分在這裡。哲學系寫的，但對工程師意外好讀，先讀條件陳述那一節。\n- **Stanford Encyclopedia of Philosophy，「Voting Methods」**——把單純多數決、Borda、Condorcet 方法、即時排序複選（IRV）等規則攤開比較，每個犧牲哪條 Arrow 條件講得很清楚；想知道「那我到底該用哪個投票規則」時讀這篇。\n- **維基百科「Condorcet paradox」**（https://en.wikipedia.org/wiki/Condorcet_paradox）——孔多塞 1785 原始悖論、循環多數的更多例子與出現機率的討論；本章的環只是最小例。\n- **Kenneth Arrow,《Social Choice and Individual Values》(1951)**——不可能定理的原典，薄薄一本。不必啃完證明，讀他的「導論」就值回票價：你會看到一個經濟學家如何把「公平」這個含糊的詞，逼成四條能被證偽的數學條件——這個「把直覺逼成精確規格」的動作本身，就是這本書教你的東西。\n- **跨書**：投票者「謊報偏好對自己是否划算」這種單人在不確定下的理性計算，深入處（期望效用、效用不是金額）指向《在不確定中下注：決策與理性》談單人理性那部分；本章只用到「對手會反應你的選擇」這一面。把多份排序看成資料、聚合的穩定性涉及向量與序的結構時，可順帶翻《矩陣是動詞：線性代數》談序與結構那部分（點到即止，本章不展開）。\n"}, {"id": "ch16-public-goods", "file": "ch16-public-goods.md", "group": "Part VI — 賽局無所不在＋收官", "title": "ch16 — 公共財與共有財的悲劇：多人囚徒困境", "md": "# ch16 — 公共財與共有財的悲劇：多人囚徒困境\n\n> **本章解決什麼問題**：前面十五章，脊椎那張囚徒困境矩陣一直是「兩個人」的故事。但你系統裡那些「各自最佳化卻整體崩潰」的災難——retry storm、共用連線池被搶光、cache stampede——從來不是兩個玩家，是幾百個 client、幾十個服務同時在做同一件理性的蠢事。本章把脊椎困境從 2 人放大到 n 人：共有財悲劇（tragedy of the commons）與公共財賽局（public goods game）。你會看到一件比兩人困境更冷的事——**人數越多，困境不是被稀釋，而是被放大**：每個人對結果的影響越小，搭便車（free-riding）越誘人，集體崩潰越難擋。本章是 Part VI 的核心個案，把全書中央張力推到規模上的極限；它也呼應 ch13（機制設計能改報酬矩陣救困境）與 ch07/ch08（重複與聲譽能救合作）。最後我們看 Ostrom 怎麼用真實世界的證據，反駁「共有財必然崩潰」這個太悲觀的結論。\n\n## 從你已知的出發\n\n你一定處理過「共用資源被搶光」這類事故。最乾淨的版本是**共用資料庫連線池**：一個 pool 開了 100 條連線，前面掛著十幾個服務。平常相安無事。某天流量一尖峰，每個服務都覺得「我多開幾條連線、把我的 P99 壓下來」是理性的——對它自己的 SLA 來說，這確實是最佳選擇。於是十幾個服務同時這麼想、同時這麼做，連線池在幾秒內被抽乾，後面所有人的請求一起排隊、一起 timeout。**每個服務都做了對自己最划算的事，結果是所有人一起雪崩。**\n\n這你眼熟——它就是脊椎囚徒困境（ch01 那張 5/3/1/0 的矩陣）。但有一件事，兩人版的困境沒教你：**這裡不是兩個玩家，是十幾個。** 而人數一多，事情的味道變了。\n\n在兩人困境裡，你背叛的後果至少有一半落在你自己頭上（對方也會背叛、你掉進 (1,1)）。但在連線池這種多人場景裡，你多抽十條連線的壞處——池子更快耗盡——被攤平到所有十幾個服務身上，你自己只承擔其中一小份；而多抽十條連線的好處（你的 P99 變好）卻**全部歸你**。好處集中、壞處分散。這個不對稱，正是多人困境比兩人困境更惡毒的地方，也是本章要講透的東西。\n\n你還會在別的地方撞到同一個結構：\n\n- **cache stampede**：熱 key 過期的瞬間，每個 client 都覺得「我自己向後端重算一次」是理性的，結果幾千個 client 同時打到後端、把它壓垮。沒有人有動機「替大家先扛著、讓別人搭便車用我算好的結果」。\n- **CI runner 排隊**：共用的 runner 池，每個人都想「我這個 job 重要、先插隊跑」。runner 是有限的共有財，各自搶占的結果是大家一起等更久。\n- **on-call 與開源維護**：值班輪到的苦差事、開源專案沒人想接的 issue——這是反過來的「公共財」：維護是大家都受益的公共品，但**沒人想出力**，因為別人出力你也能白用。free-riding（搭便車）在這裡有個更熟悉的名字：「反正會有別人修」。\n\n這一章就是要把這些你在生產環境裡反覆撞到的牆，接到一個精確的名字上——**多人囚徒困境**——並回答兩個問題：為什麼人越多越難合作？以及，既然如此，現實世界（和你的團隊）到底是怎麼把有些共有財救回來、沒有每次都崩的？\n\n## 共有財悲劇：每個牧人都對，草原一起死\n\n先請出這一章的歷史主角。1968 年 12 月，生態學家 Garrett Hardin（哈丁）在《Science》期刊發表了一篇後來被引爆數萬次的文章，叫〈The Tragedy of the Commons〉（共有財的悲劇）。他用一個牧場的寓言講清楚了一件事，而那件事，本質上就是把脊椎困境放大到很多人。\n\n```text\n共有財悲劇：Hardin 1968 的牧場寓言\n\n  一片公有草原（the commons），向所有牧人開放。\n  每個牧人都可以在上面多放一頭牛。\n\n  你（一個理性的牧人）盤算「我要不要多養一頭牛」：\n      好處：多一頭牛的全部收益 → 100% 歸你。            （+1 單位）\n      壞處：草原多承受一頭牛的啃食、加速退化\n            → 但這個壞處由「所有牧人」共同承擔，\n              你只攤到其中一小份（1/n）。              （−1/n 單位）\n\n  只要 n ≥ 2，+1 > 1/n，多養一頭牛永遠對你划算（人越多，1/n 越小、越划算）。\n  → 每個理性牧人的結論都一樣：多養。\n  → 每個人都多養 → 草原被啃到崩潰 → 所有人的牛都餓死。\n```\n\n請你盯著那個不對稱看十秒，因為它是整章的引擎：**多養一頭牛的好處全歸你，壞處攤給大家。** 在 Hardin 的話裡，每個牧人「被鎖進一套讓他不斷增加牛群的系統——在一個有限的世界裡」。每一步都是局部理性的，每個牧人都沒做錯任何計算；但這些局部理性加起來，是把所有人賴以為生的草原一起毀掉。\n\n這跟脊椎困境是同一條裂縫，只是換了規模。ch01 那張矩陣裡，「個體理性 ⇒ 集體次優」發生在兩個人之間；共有財悲劇裡，它發生在一大群人之間，而且——這是關鍵——**人越多，裂縫越寬**。兩人困境裡背叛的代價你還承擔一半；n 人共有財裡，你過度使用的代價只攤到 1/n，n 越大、這份代價越接近零，過度使用就越是壓倒性的優勢策略。\n\n我要在這裡先 hedge 一件事，免得這個寓言被你當成鐵律。Hardin 的框架後來被嚴厲批評過，批評不是說「悲劇不存在」，而是說他**搞錯了「commons」這個詞**。他寓言裡那片「向所有人開放、無人管理」的草原，學術上叫 **open access（開放取用）**——真正無主、無規則的資源；而歷史上的 commons（共有地）其實往往**有**一套社群規則（誰能放幾頭牛、誰來監督）。Hardin 拿一個無規則的極端，去暗示所有共有資源都注定崩潰，再推出「只有私有化或政府強管才能救」的結論——這一步是過度推論。本章後半要請出的 Ostrom，畢生的研究就是在打這個結論。但**作為一個賽局結構**，Hardin 的寓言是精準的：在無規則、無重複、無懲罰的純粹版本裡，過度使用確實是優勢策略，崩潰確實是均衡。我們先把這個純粹版本算清楚，再談怎麼救。\n\n## 公共財賽局：把悲劇縮進一張可以手算的表\n\n牧場寓言很有畫面，但「一頭牛攤多少草」不好量化。賽局理論把同一個結構提煉成一個乾淨、可以手算的實驗室版本——**公共財賽局（public goods game）**。它是把脊椎囚徒困境推廣到 n 人最標準的方式，我們花點力氣把它算到底。\n\n```text\n公共財賽局（n 人版）的規則\n\n  n 個玩家，每人手上有一筆私有的錢（這裡每人 1 元）。\n  \n  每人同時、私下決定：把這 1 元「投入公共池」還是「自己留著」。\n  \n  公共池裡的總額會被「乘上一個倍數 m」（1 < m < n），\n  然後「平分給所有 n 個人」——不管你有沒有投。\n  \n  關鍵設計：m > 1（投進去的錢會放大，所以全投對集體有利）\n            m < n（你投的 1 元，自己只分回 m/n < 1，所以投錢個人虧）\n  \n  「自己留著」= 搭便車（free-riding）：享受別人投入的放大紅利，自己不出。\n```\n\n那個 `1 < m < n` 的雙重條件，是整個困境的數學核心，值得拆開講。`m > 1` 保證這是個**值得做的合作**：每投進去 1 元，社會總共多出 m 元，全投是集體最優。`m < n` 保證**個人不想投**：你投的 1 元被平分後，自己只拿回 m/n，而 m/n < 1，所以對你個人是淨虧。兩個條件一夾，就生出了困境：**對集體最好的事（全投），對每個個人都是賠本生意。** 這正是脊椎困境「(合作,合作) 集體最優、卻非均衡」在 n 人版的化身。\n\n### worked example：3 人公共財賽局，逐一論證搭便車是優勢策略\n\n把 n=3、m=2 代進去，這是本章的核心計算，我一步步算、不跳步。每人有 1 元，投進去的總額乘 2、三人平分。先確認這組數字滿足困境條件：`1 < 2 < 3` ✓——倍數 2 大於 1（全投有賺）、小於人數 3（個人投錢虧本）。\n\n我用「最佳反應」的視角：**固定別人的選擇，問我自己投或不投哪個划算。** 賽局理論找優勢策略的標準動作，就是檢查「不管別人怎麼做，我這一步該怎麼選」。\n\n```text\n3 人公共財賽局：m=2，每人 1 元，池子×2 後三人平分\n記號：我最後拿到的錢 = (自己留下的) + (從公共池分回的 1/3)\n\n先算「我投 1 元」對我自己的淨影響：\n  我那 1 元進池 → 乘 2 變 2 元 → 三人平分，我分回 2/3 元。\n  我花了 1 元、分回 2/3 元 → 我個人淨虧 1/3 元。\n  ← 注意：另外 2/3 + 2/3 = 4/3 元跑去便宜了另外兩個人！\n\n所以不論「另外兩人」投了幾個，我多投那 1 元，對「我自己」永遠是 −1/3。\n這就足以判定：不投（搭便車）是嚴格優勢策略。但我們把四種情況攤開驗：\n\n  情況（用「另外兩人投了幾人」分類）：\n  \n  ┌──────────────┬────────────────┬────────────────┬──────────────┐\n  │ 另外兩人     │ 我「不投」拿到 │ 我「投」拿到   │ 投 vs 不投   │\n  │ 投入人數     │ (留1 + 分回)   │ (留0 + 分回)   │              │\n  ├──────────────┼────────────────┼────────────────┼──────────────┤\n  │ 0 人投       │ 1 + 0   = 1    │ 0 + 2/3 = 2/3  │ 不投多賺 1/3 │\n  │ 1 人投       │ 1 + 2/3 = 5/3  │ 0 + 4/3 = 4/3  │ 不投多賺 1/3 │\n  │ 2 人投       │ 1 + 4/3 = 7/3  │ 0 + 6/3 = 2    │ 不投多賺 1/3 │\n  └──────────────┴────────────────┴────────────────┴──────────────┘\n\n  每一列，「不投」都比「投」多賺正好 1/3 元。\n  → 不管另外兩人怎麼選，不投永遠較好 → 不投是嚴格優勢策略。\n```\n\n三個人各自做完上面這張表，得到的結論一模一樣：不投。於是唯一的純策略納許均衡是**三人全都搭便車、公共池是空的、每人最後拿回 1 元**。這是 (背叛, 背叛, 背叛)——脊椎困境 (D,D) 的三人版。\n\n現在看集體最優，也就是大家都不該錯過的那個結局：\n\n```text\n對照「全投」vs「全不投」的集體結果：\n\n  全投（三人都投 1 元）：\n     池子 = 3 元 → 乘 2 = 6 元 → 三人各分 2 元。\n     每人最終：0（留）+ 2（分回）= 2 元。  ← 每人 2 元！\n\n  全不投（納許均衡）：\n     池子 = 0 → 每人最終：1（留）+ 0 = 1 元。  ← 每人 1 元\n\n  全投每人 2 元 > 全不投每人 1 元。\n  集體最優（全投）對每個人都嚴格更好，卻不是均衡。\n```\n\n把這兩塊拼起來，那個驚嘆點就無法迴避了：**全投讓每個人都拿 2 元，全不投讓每個人都只拿 1 元；明明全投對每一個人都更好，但每一個人的優勢策略卻都是不投。** 三個完全理性、各自最佳化的玩家，會穩穩地走進那個對三人都較差的結局——而且沒有人算錯。這跟 ch01 兩個囚犯掉進 (1,1) 是同一件事，只是現在有三個囚犯，而且你馬上會看到，囚犯越多越糟。\n\n### 自我複核：用「社會總額」交叉驗算一次\n\n我用第二個角度檢查上面沒算錯——算每種結局的**社會總財富**（三人加總），看它是否隨投入人數單調上升。\n\n```text\n複核（社會總額 = 三人最終拿到的錢相加）：\n\n  投入人數 k → 池子 = k 元 → ×2 = 2k 元 → 三人分回共 2k 元\n              留下的人共留 (3−k) 元\n  社會總額 = (3−k) + 2k = 3 + k\n\n  k=0（全不投）：總額 = 3   （每人 1）\n  k=1：          總額 = 4\n  k=2：          總額 = 5\n  k=3（全投）：  總額 = 6   （每人 2）\n\n  社會總額隨投入人數 k 單調上升（每多一人投，社會多賺 m−1 = 1 元）✓\n  → 集體最優確實是「全投」（總額 6 最大）。\n  \n  但對「投錢的那個人自己」：他投 1 元、分回 2/3，個人虧 1/3——\n  社會多賺的 1 元，加上我自己投的這 1 元，共 2 元被三人分掉；\n  我只拿回 2/3，另外兩人共白拿了 4/3（每人 2/3）。\n  個人帳與集體帳方向相反，這就是困境。 ✓\n```\n\n兩個視角對上了：最佳反應視角說「每個人不投多賺 1/3」，社會總額視角說「每多一人投、集體多賺 1 元」。同一個 1 元的去向——你投進去社會多 1 元（m−1=1），但這 1 元被三人分掉、你只拿回 2/3、淨虧 1/3——同時解釋了「為什麼集體想要你投」和「為什麼你自己不想投」。困境的本質，就是這兩本帳對不起來。\n\n## 人越多越糟：困境如何隨 n 惡化\n\n現在來回答本章開頭那個比兩人困境更冷的問題：**人數變多，困境是被稀釋還是被放大？** 直覺上你可能會想「人多力量大、總有人會合作吧」，但賽局結構說的恰恰相反。\n\n關鍵在兩個隨 n 變動的量。固定那個放大倍數背後的「社會效率」不變（每投 1 元，社會多賺一個固定比例），但讓人數 n 變大，看搭便車的誘惑怎麼變。用一個稍微一般化的設定：每人投 1 元、池子乘 m、平分給 n 人，且維持 `m < n`（困境條件）。\n\n```text\n搭便車誘惑隨 n 變化（每人投 1 元、池子×m、n 人平分）：\n\n  你投 1 元，自己分回 m/n。\n  你個人的淨損失（搭便車相對於投入的好處）= 1 − m/n。\n\n  把放大效率固定成「每人投入讓社會的每人份額增加一個比例」，\n  看 n 變大時你個人的損失 1 − m/n：\n\n  ── 數值感受（取 m 固定 = 2）──\n     n=2： 1 − 2/2 = 0      ← m=n，剛好不算困境（投不投平手）\n     n=3： 1 − 2/3 = 1/3    （本章 worked example）\n     n=10：1 − 2/10 = 4/5\n     n=100：1 − 2/100 = 0.98\n\n  n 越大 → m/n 越小 → 你投錢分回的越少 → 搭便車的個人好處越大。\n  你過度使用/不貢獻的「壞處」被攤到 n 個人身上，自己只擔 1/n →\n  n→∞ 時你幾乎完全不承擔自己造成的損害。困境隨 n 單調惡化。\n```\n\n這就是 Hardin 牧場寓言裡「壞處攤給大家」那個不對稱的數學形狀：**你行為的代價被 1/n 稀釋，但好處全歸你。** n 越大，這個稀釋越徹底，搭便車越是壓倒性的選擇。兩人困境（n=2）其實是這條光譜上最溫和的一端——你還承擔自己背叛代價的一半；到了 n=100 的共用連線池，你多抽連線的代價只攤到你頭上 1/100，剩下 99/100 全潑給別人。\n\n這帶出一個對你工程直覺很有用的推論，也是「直覺的陷阱」會再碰的一點：**為什麼大型開源專案、大公司的共用資源、全球性的環境問題特別難治理？** 不是因為參與的人比較壞，而是因為 n 特別大——每個人對結果的邊際影響小到趨近於零，搭便車的理性誘惑大到趨近於壓倒性。小團隊的共用資源（n=5 的小組共用測試環境）往往能靠自覺維持，同樣的資源放大到 n=500 的全公司就治理不動了——這個差別，光看 n 就能預測一半。\n\n順帶把這條接回另一條全書線索：這也解釋了**為什麼「重複與聲譽」（ch07/ch08）在大群體裡效力會減弱**。兩人重複賽局裡，tit-for-tat 能直接懲罰背叛你的那一個人；但在 n=100 的共有財裡，你連「是誰在過度使用」都未必看得出來，更別說精準報復——監督與懲罰的成本隨 n 暴漲，這正是 Ostrom 的治理方案要解決的第一個問題。\n\n## 救援：Ostrom 與「悲劇並非必然」\n\n如果這一章到此為止，它會是一篇犬儒宣言：人越多越自私、共有財注定崩潰、只能靠私有化或老大哥強管。Hardin 1968 的結論差不多就是這樣。但這個結論是**錯的**——不是數學錯，是它漏看了現實世界一直在做的事。把這個漏洞補起來、並因此拿到 2009 年諾貝爾經濟學獎（嚴格說是瑞典央行紀念諾貝爾經濟學獎，見 ch13 的註明）的，是 Elinor Ostrom（歐斯壯）——**經濟學獎史上第一位女性得主**。\n\nOstrom 沒有坐在黑板前推翻 Hardin。她做的是去**數**——花了數十年，跑遍全世界蒐集真實的共有資源案例：瑞士阿爾卑斯山的牧場、日本的共有林、菲律賓的灌溉系統、緬因州的龍蝦漁場。她發現一件 Hardin 的寓言完全沒預料到的事：**有大量社群，靠自己長出的規則，幾百年來成功管理共有資源，既沒有私有化、也沒有政府強管，就是沒崩潰。** 她把這些成功案例的共通點，提煉成八條「設計原則」（design principles），寫進 1990 年的《Governing the Commons》（治理共有財）。\n\n我不打算把八條原則全背一遍——對你來說，把它們讀成「賽局結構上各自在修什麼」更有用。它們其實是把前面幾章的救火工具，落地成可操作的社群制度：\n\n```text\nOstrom 八原則 → 對應的賽局救火機制（挑幾條給工程直覺）\n\n  ① 清楚的邊界（誰是這個共有財的成員、外人排除）\n       → 把無限大的 n 圈成有限、已知的 n。\n          「open access（誰都能用）」變成「有名單的 commons」，\n          搭便車者跑不掉、可被辨識。（直接砍掉 n→∞ 的惡化）\n\n  ④ 監督（monitoring，有人在看誰用了多少）\n       → 解決大 n 的「看不出是誰在過度使用」問題。\n          沒有監督，懲罰無從談起。\n\n  ⑤ 分級懲罰（graduated sanctions，初犯輕罰、累犯加重）\n       → 這就是 tit-for-tat 的精神（ch08）：可激怒但寬容。\n          不是一犯就逐出（太狠、嚇跑人），而是逐步加碼。\n\n  ③ 集體選擇（規則由使用者自己參與制定）\n       → 規則是內生的，所以大家有遵守的動機（不是外人強加）。\n\n  ⑥–⑧ 衝突解決機制、上級認可、巢狀治理\n       → 把大群體拆成「巢狀」的小群體（小 n 容易合作），\n          再層層疊起來——用結構規避大 n 的詛咒。\n```\n\n看出這在做什麼了嗎？Ostrom 的每一條原則，本質上都是在**把純粹版公共財賽局的某個「困境前提」拆掉**。純粹版假設：n 無限大且匿名（① 邊界把它變有限、可辨識）、單回合無未來（④⑤ 監督加懲罰把它變成有未來陰影的重複賽局，ch07）、無法溝通與協調（③ 集體選擇引入溝通）、無法分群（⑥–⑧ 巢狀化把大 n 拆成多個小 n）。**換句話說，現實世界救共有財的辦法，正是賽局理論早就指出的那幾把救火工具——重複、聲譽、可信的懲罰、機制設計——只是 Ostrom 證明了它們不必由中央政府從上而下安裝，社群能自己長出來。**\n\n這跟你的團隊實踐是直接對得上的。你的 CI runner、共用測試環境、on-call 輪值——這些共有財之所以沒每天崩，靠的往往不是某個老大下的死命令，而是團隊自己長出的規範：「跑大 job 前先在頻道喊一聲」（① 邊界＋③ 集體規則）、「誰把環境搞壞了大家看得到」（④ 監督）、「連續佔用的人會被白眼、再犯會被請去喝咖啡」（⑤ 分級懲罰）。一個健康的工程團隊治理共有財的方式，幾乎是 Ostrom 八原則的逐條翻版——而它之所以在你的五人小組有效、放大到五百人公司就失靈，回頭看就是 n 變大、邊界與監督跟不上。\n\n我要誠實標一下嚴謹度：Ostrom 的八原則是**從成功案例歸納出的經驗規律**（直覺版），不是一條能保證「照做必不崩潰」的定理。她自己也強調，沒有萬靈藥，制度要適應當地脈絡。但她做到了一件決定性的事：**把「共有財必然崩潰」從一條鐵律，降級成一個只在特定前提下成立的特例。** 悲劇是可能的、不是必然的——這跟 folk theorem 的口吻一模一樣（ch08）：合作可以是均衡，但要靠對的條件撐著。\n\n## 中央張力：規模上的爆炸\n\n把這一章放回全書脊椎來收一下。前面碰中央張力時，「個體理性 vs 集體理性」的裂縫一直在兩個人之間（脊椎困境）或一小群人之間（協調賽局 ch10、信任賽局 ch12）。本章做的，是把同一條裂縫**沿著 n 軸拉到極限**，然後給它一個量化的形狀。\n\n```text\n中央張力的規模爆炸：同一條裂縫，沿 n 軸放大\n\n  兩人困境（ch01）        n 人共有財（ch16）\n    個體理性 ──┐            個體理性 ──┐\n               ↓ 分裂                  ↓ 分裂得更開\n    集體理性 ──┘            集體理性 ──┘\n  \n  你背叛的代價            你過度使用的代價\n  自己承擔 1/2            自己只承擔 1/n（n→∞ 趨近 0）\n  \n  好處集中、壞處分散：n 越大，壞處被攤得越薄，\n  搭便車越是壓倒性的優勢策略 → 裂縫隨 n 單調變寬。\n```\n\n這是這一章最值得你帶走的一句話：**個體理性與集體理性的裂縫，不是固定寬度的——它隨著「多少人共用、每個人的影響多小」而張開。** 兩人困境是這條裂縫最窄的一端；全球氣候、全公司共用配額、全網路的壅塞控制，是它最寬的一端。理解了這個，你就懂了為什麼有些合作問題（小組共用測試機）幾乎不用治理就自己解決，有些（跨團隊搶共用資源）怎麼喊都喊不動——差的不是人品，是 n。\n\n而救援的方向，全書到這裡已經湊齊了：要嘛把 n 變小、變有界（Ostrom 的邊界、巢狀化）；要嘛裝上未來的陰影（重複、聲譽，ch07/ch08）；要嘛直接改報酬矩陣（機制設計加懲罰，ch13）；要嘛指望人把集體理性內化進效用（公平偏好，ch12）。四把救火工具，本章用一個它們全都派得上用場的場景，把它們收攏成一張圖。\n\n## 直覺的陷阱\n\nn 人困境特別容易養出幾個似是而非的直覺，挑最常見的拆給你看。\n\n| # | 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|---|\n| 1 | 「人多力量大，總會有人合作把共有財撐住」 | 把「人多」想成合作的助力。其實 n 越大，每個人的影響越小、搭便車的個人誘惑越大——困境隨 n **惡化**不是緩解 | 你過度使用的代價攤到 1/n，n 越大攤得越薄。大群體比小群體**更**難自發合作，光看 n 就能預測一半 |\n| 2 | 「共有財必然崩潰，只能靠私有化或政府強管」（Hardin 的結論） | 把一個「無規則、無重複、匿名」的極端純粹版（open access），當成所有共有資源的命運 | Ostrom 用幾百年的真實案例反駁：社群能自己長出規則（邊界、監督、分級懲罰），不靠私有化或中央強管也能避免悲劇。悲劇可能、非必然 |\n| 3 | 「搭便車的人就是自私、缺德」 | 把結構問題歸因到人品。在純粹版裡，不投是**嚴格優勢策略**——理性、不缺德的人也會搭便車，因為投錢個人就是虧 | 搭便車是報酬結構逼出來的理性反應，不是道德缺陷。罵人沒用，要改的是結構（邊界/監督/懲罰/重複）——這正是 Ostrom 的路 |\n| 4 | 「這是共有財悲劇」可以套在任何資源耗盡上 | 把「共有財悲劇」當成萬用標籤亂貼。它有**精確結構**：好處集中個人、壞處分散全體、`1<m<n` | 先驗證結構再貼標籤：是不是真的「我用的好處全歸我、代價攤給大家」？有沒有重複/監督/懲罰已經在運作（那它可能根本不在純粹版裡）？ |\n| 5 | 「公共財賽局和共有財悲劇是兩回事」 | 被「貢獻 vs 過度取用」的表面差異騙了 | 兩者是同一枚硬幣：公共財是「該貢獻卻搭便車」（不投），共有財是「該節制卻過度取用」（多放牛）。數學同構——好處集中、壞處分散、優勢策略導致集體崩潰 |\n\n**自我察覺的徵兆**：如果你發現自己在用「大家自覺一點就好了」來「解決」一個共有財問題，那通常是個訊號——你在跟報酬結構對抗，而結構會贏。一個搭便車是優勢策略的局，光靠喊話和訴諸自覺撐不住（n 越大越撐不住）。停下來問：**我能不能把邊界圈出來（誰在用）、把使用變得可見（監督）、給重複互動裝上未來的陰影（再犯有後果）？** 只要你發現自己想靠「人應該更無私」來解困境，多半是漏看了「結構才是優勢策略的來源」這件事。\n\n## 紙上推演\n\n### 推演題一（★★，20 分鐘）：把 2 人困境推廣到 n 人，看困境如何隨 n 惡化\n\n脊椎囚徒困境是兩人的。本題請你把它推廣到 n 人公共財賽局，並量化「人越多越糟」。\n\n設定：n 個玩家，每人有 1 元，可選擇投入公共池或留著；池子裡的總額乘 m=2 後平分給全部 n 人（維持 `m < n`，即 n ≥ 3）。\n\n(a) 寫出「我投 1 元」對我自己的淨損益（用 n 表示），證明只要 n > 2，不投就是嚴格優勢策略。\n(b) 算 n=3、n=10、n=100 三種情況下，「搭便車相對於投入」對我個人多賺多少，說明困境如何隨 n 惡化。\n(c) 一句話說明：n=2 時這個賽局發生什麼特殊情況？\n\n### 推演解答\n\n```text\n(a) 我投 1 元的淨損益（m=2、n 人平分）：\n       我那 1 元 → ×2 = 2 元 → n 人平分，我分回 2/n。\n       我花 1 元、分回 2/n → 個人淨損益 = 2/n − 1。\n       n > 2 時，2/n < 1 → 2/n − 1 < 0 → 投錢個人淨虧。\n       \n    這個淨虧「不論別人投幾個」都成立（別人的投入分回的部分，\n    我投或不投都照拿，不影響我這 1 元的邊際帳）。\n    → 不投嚴格優於投，與別人選擇無關 → 不投是嚴格優勢策略。 ✓\n\n(b) 搭便車相對投入，我個人多賺 = 1 − 2/n：\n       n=3：  1 − 2/3  = 1/3   ≈ 0.33\n       n=10： 1 − 2/10 = 4/5   = 0.80\n       n=100：1 − 2/100        = 0.98\n    \n    n 越大 → 分回的 2/n 越小 → 投錢虧得越多 → 搭便車誘惑越大。\n    白話：你過度使用的代價攤到 n 個人頭上、自己只擔 1/n，\n    n 越大越接近「自己完全不承擔」→ 困境單調惡化。 ✓\n\n(c) n=2 時：2/n = 2/2 = 1 → 投錢淨損益 = 1−1 = 0。\n    投與不投打平、m=n 不再滿足「m<n」的困境條件 →\n    退化成「投不投無所謂」的邊界情形（嚴格說已不是困境）。\n    但注意：退化的是「m=2 這個選擇」，不是「兩人公共財」本身——\n    只要把倍數壓到 m<2（例如 m=1.5，仍滿足 1<m<n=2），\n    n=2 就重新是真困境（投 1 元分回 0.75、個人淨虧 0.25）。\n    換句話說，本題固定 m=2 才讓 n=2 剛好踩在邊界上；\n    n≥3 時 m=2 一定是真困境，n=2 則要 m<2 才是。 ✓\n```\n\n**解讀**：這題把「人越多越糟」從一句口號變成一條公式 `1 − m/n`：搭便車的個人好處隨 n 上升、趨近 1（趨近「投錢純粹是送錢給別人」）。這就是 Hardin 牧場「壞處攤給大家」的數學形狀。\n\n**常見錯路**：① 把「我分回的」算成 2（池子全額）而非 2/n（平分後我那份）——忘了平分。② (c) 算出 n=2 打平就以為「兩人不會有困境」——錯，是這個**對稱公共財參數化**在 n=2 退化；真正的兩人囚徒困境（5/3/1/0）用的是不同報酬、背叛仍嚴格優勢。兩者別混為一談。③ 以為「不投虧 2/n−1」要看別人投幾個——不會，別人投入分回的部分你照拿、與你這 1 元的邊際決定無關。\n\n### 推演題二（★★，20 分鐘）：你系統裡的共有財悲劇，與一個 Ostrom 式治理\n\n不准用記憶背定義，要用本章的結構自己組裝。\n\n(a) 從你的工程經驗裡挑一個**真正符合共有財結構**的場景（提示：好處集中在用的人身上、代價分散給所有人、且 `1<m<n` 式的「對集體值得、對個人不划算」）。明確指出：誰是玩家、什麼是共有財、什麼是「過度使用/搭便車」、好處與代價分別落在誰頭上。\n(b) 套用 Ostrom 至少**三條**原則，設計一個能緩解它的治理方案。每條原則要對應到它拆掉了純粹版的哪個「困境前提」。\n(c) 說明為什麼「叫大家自覺一點」在這個場景裡撐不住（用 n 與優勢策略講）。\n\n### 推演解答\n\n這題沒有唯一答案，給一個合格範本（以共用資料庫連線池為例）對照：\n\n```text\n(a) 結構辨識：共用 DB 連線池（pool 100 條，前面 12 個服務）\n      玩家：12 個服務（每個各自最佳化自己的 SLA）。\n      共有財：100 條連線（有限、共用）。\n      搭便車/過度使用：尖峰時多抽連線壓自己的 P99。\n      好處集中：我多抽連線 → 我的 P99 變好（全歸我）。\n      代價分散：池子更快被抽乾 → 所有 12 個服務一起排隊\n                （代價攤給大家，我只擔 1/12）。\n      → 好處集中、代價分散、個體理性 ⇒ 集體雪崩。是共有財悲劇。 ✓\n\n(b) Ostrom 式治理（三條原則，各拆一個困境前提）：\n      ① 清楚邊界 → 給每個服務分配連線配額（max connections per\n         service）。把「open access 隨便抽」變成「有名單、有上限」。\n         拆掉的前提：匿名、無界的過度使用。\n      ④ 監督 → 連線池用量 dashboard，誰抽了多少全隊可見。\n         拆掉的前提：「看不出是誰在過度使用」。\n      ⑤ 分級懲罰 → 超配額先告警、持續超標自動限流(throttle)、\n         再犯則熔斷該服務的低優先請求。初犯輕、累犯重。\n         拆掉的前提：背叛無後果（裝上未來的陰影，呼應 ch07/ch08）。\n\n(c) 為什麼「叫大家自覺」撐不住：\n      尖峰時，對「每一個服務自己」而言，多抽連線壓 P99 永遠是\n      最佳反應（好處全歸自己、代價只擔 1/12）——不投/不節制是\n      優勢策略。n=12 已經夠大到讓「自覺」對抗不了優勢策略；\n      光靠喊話，第一個破戒的服務就會把規範帶崩（它 P99 變好、\n      沒受懲罰，其他服務理性跟進）。要改的是結構（配額+監督+\n      限流），不是訴諸無私。 ✓\n```\n\n**解讀**：這題的重點是「先驗證結構、再開治理藥方」。注意 (b) 的每條原則都不是憑感覺加的——它精準對應純粹版的一個困境前提（無界、不可見、無後果），把那個前提拆掉，困境就被削弱一分。\n\n**常見錯路**：① 挑了一個其實**不符合**共有財結構的場景（比如「大家都不寫測試」——這比較像公共財貢獻問題，其實也算，但若舉「兩個服務搶一個鎖」就只是兩人賽局、n 太小不算規模困境）。② 治理方案全靠「教育大家、提高意識」——這正是陷阱 #3、#5，與優勢策略對抗。③ 套 Ostrom 原則卻說不出每條拆掉哪個前提，變成貼標籤。\n\n### 推演題三（★★，15 分鐘）：口頭題——為什麼「每個人都理性使用」反而耗盡共享資源\n\n不准用紙筆。對一個會說「資源是大家的，理性的人應該會省著用吧」的同事，用 90 秒講清楚三件事：①為什麼在純粹版共有財裡，「過度使用」反而是每個理性個人的優勢策略；②這跟「人自私缺德」有沒有關係；③人越多，這件事為什麼越嚴重。\n\n### 推演解答\n\n合格的口頭回答長這樣（自己講完對照）：\n\n> 「關鍵是好處和代價落在不同人頭上。你多用一單位共享資源——多抽一條連線、多放一頭牛——好處**全歸你自己**，但代價（資源更快耗盡）是**全體一起攤**，你只擔其中 1/n。所以對你個人算這筆帳，多用永遠划算，不管別人怎麼做——這就是優勢策略，理性的人都會這麼選。注意這跟自私缺德沒關係：一個完全理性、不缺德的人，做這道算術也會得出『多用』，因為節制是賠本生意——他省下的資源主要便宜了別人。所以罵人沒用，要改的是結構。而人越多越糟：n 越大，你造成的代價被攤得越薄、自己擔的越接近零，多用的誘惑就越壓倒性——這就是為什麼小組共用測試機靠自覺還撐得住，全公司共用配額怎麼喊都喊不動。差的不是人品，是 n。」\n\n**給分點**：有沒有講出「好處集中、代價分散 1/n」這個機制（①的核心）；有沒有明確把它跟「自私缺德」切開、指出理性不缺德的人也會這麼做（②）；有沒有講出 n 越大裂縫越寬、並舉出規模差異的例子（③）。只會說「大家自私所以資源耗盡」的，沒及格——那把結構問題誤讀成人品問題，正是本章要打掉的陷阱。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 共有財悲劇和脊椎囚徒困境（ch01）是同一條中央張力嗎？它把「個體理性 ⇒ 集體次優」從幾人放大到幾人？放大時哪個量在變？\n2. 在 3 人公共財賽局（m=2、每人 1 元）裡，為什麼「不投」是嚴格優勢策略？用「我投 1 元、自己只分回 2/3」這筆邊際帳講給自己聽。\n3. 為什麼全投（每人 2 元）對每個人都比全不投（每人 1 元）好，卻不是納許均衡？這跟 (合作,合作) 在 ch01 的處境一樣嗎？\n4. 「人越多，共有財困境越嚴重」——這個惡化的數學形狀是什麼（用 1 − m/n 講）？為什麼大群體比小群體更難自發合作？\n5. Hardin 1968 的結論（共有財必然崩潰、只能私有化或政府強管）漏看了什麼？Ostrom 用什麼證據反駁它？她憑這拿了哪一年的什麼獎、有何特別之處？\n6. Ostrom 八原則裡的「邊界」「監督」「分級懲罰」，各自拆掉了純粹版公共財賽局的哪一個困境前提？這跟前面章節（重複、聲譽、機制設計）的救火工具是同一套東西嗎？\n7. 為什麼說「搭便車的人自私缺德」這個歸因是錯的、而且有害？正確的歸因會讓你採取什麼不同的行動？\n8. 公共財賽局（該貢獻卻不投）和共有財悲劇（該節制卻過度取用）為什麼說是「同一枚硬幣」？它們共用哪個報酬結構？\n\n## 延伸閱讀\n\n- **Garrett Hardin (1968), \"The Tragedy of the Commons\"**（*Science*, 162: 1243–1248）——點燃整個領域的那篇原文。讀它的牧場寓言段落感受結構之精準，但讀的時候帶著本章的 hedge：他的「commons」其實是無規則的 open access，他「只能私有化或強管」的結論是過度推論。網路上有公開 PDF。\n- **Elinor Ostrom (1990), *Governing the Commons: The Evolution of Institutions for Collective Action***——反駁 Hardin 悲觀論的經典。不必整本啃，讀她歸納的「八條設計原則」那章，把每一條讀成「它在拆公共財賽局的哪個困境前提」。這本讓她拿了 2009 年諾貝爾經濟學獎（經濟學獎首位女性得主）。\n- **John Ledyard (1995), \"Public Goods: A Survey of Experimental Research\"**（收於 *Handbook of Experimental Economics*）——公共財賽局實驗研究的標準回顧。讀它五條核心發現（一次性比理論預測更多貢獻、重複後搭便車增加、溝通促進合作、門檻促進合作、MPCR 越高合作越多）——這些正是 Ostrom 八原則在實驗室裡的數量化版。\n- **Mancur Olson (1965), *The Logic of Collective Action***——「為什麼大團體比小團體更難為共同利益行動」的奠基論述，跟本章「困境隨 n 惡化」直接呼應。想從政治經濟學角度看同一件事，讀它的前兩章。\n- 跨書：n 人共有財裡「過度使用的代價如何被機率性地分攤、社會總額怎麼算期望」的機率機制，見《馴服隨機》ch08 期望值那章；公共財貢獻決策中「一個人面對不確定該貢獻多少」的單人理性面，見《在不確定中下注》談期望效用那本。本章只負責把困境放大到 n 人、並指出救援方向，不深入這兩塊。\n"}, {"id": "ch17-applications", "file": "ch17-applications.md", "group": "Part VI — 賽局無所不在＋收官", "title": "ch17 — 賽局無所不在：應用全景", "md": "# ch17 — 賽局無所不在：應用全景\n\n> **本章解決什麼問題**：你已經把工具箱配齊了——優勢策略、納許均衡、零和、混合策略、重複賽局、ESS、機制設計。現在問題反過來：這套東西到底能解釋多少真實世界？本章是收官（ch18）前的全景巡禮——帶你看賽局理論在演化生物、經濟、政治軍事、電腦科學、日常生活裡的落點，挑出幾個既反直覺又站得住腳的應用講透。但這章還有一個更重要、也更誠實的任務：**標出哪裡是嚴謹的應用、哪裡是被濫用的隱喻**。賽局理論是這套推理書裡最容易被「過度套用」的一個——「凡事都是一場賽局」是一句聽起來很聰明、實際上常常什麼都沒說的話。本章在 Part VI，接在 ch16 共有財悲劇（多人困境）之後，把脊椎張力（個體理性 vs 集體理性）攤開到整個世界，同時替它畫一條邊界：理論能走到哪、走過頭會掉進什麼坑。\n\n## 從你已知的出發\n\n你其實一直活在賽局的應用裡，只是沒人替你貼標籤。\n\n想一個你天天碰、卻可能沒當成賽局看的東西：**自私路由（selfish routing）**。BGP 的選路、負載平衡器把流量往哪導、甚至每個微服務自己決定要走哪個 upstream——每一個節點都在做一件局部最佳化的事：**選對自己延遲最低的那條路**。聽起來很合理，對吧？每個 client 都挑最快的路，整體應該也最快才對。\n\n但你大概也親眼見過反例。某條鏈路明明還有餘量，所有人卻一窩蜂擠去另一條「看起來更快」的路，把它打到塞爆——而那條被冷落的路，如果分一半流量過去，整體延遲反而更低。**每個人都選最佳路徑，加起來卻不是最佳的全域配置。** 這不是 bug，這是賽局。電腦科學家給這個現象取了個很精準的名字——**無政府狀態的代價（price of anarchy）**：自私的均衡比起「有個全知排程器強制協調」的社會最優，差了多少。本章的 worked example 就要把這個比值算出來，你會看到它是個乾淨的數字。\n\n再想 spot instance 競價、廣告競價——你在 ch14 已經知道那是拍賣（auction），是機制設計的招牌成功案例。想 Raft / Paxos 的多數決——那是 ch15 的投票與 Arrow。想共用連線池被各服務搶光——那是 ch16 的共有財悲劇。**這些不是「像」賽局，它們就是賽局，而且是被嚴謹分析過、有定理撐著的那種。**\n\n所以本章分兩半。前半：帶你巡一圈賽局理論真正站得住腳的應用版圖，每個領域挑一兩個最反直覺的點講透（演化生物的性別比、政治的軍備競賽、電腦科學的 price of anarchy）。後半，也是我認為更重要的一半：**誠實地畫出邊界**——報酬矩陣的數字到底從哪來？人真的是同質的理性玩家嗎？什麼時候「這是一場賽局」是洞見、什麼時候它只是個唬人的比喻？你身為工程師，對「漂亮的模型套在不漂亮的現實上」這件事應該已經有職業性的警覺——這章就是把那份警覺用在賽局理論自己身上。\n\n## 演化生物學：為什麼性別比幾乎總是 1:1\n\n先講一個我認為是全書最漂亮的賽局應用——而且它的「玩家」連腦子都沒有，呼應 ch09 那個驚嘆點（均衡不需要會算的玩家）。\n\n問題很基本：自然界絕大多數有性生殖的物種，雄性與雌性的比例都接近 **1:1**。為什麼？這乍看不該如此。從「物種延續」的角度想，雌性才是生育瓶頸——一隻雄性可以讓很多雌性受孕，所以「為了讓族群繁衍最大化」，生一堆雌性、少數幾隻雄性才對啊。很多人第一直覺都這樣。**這個直覺錯了，而且錯得很有教育意義。**\n\nRonald Fisher（費雪）1930 年在《The Genetical Theory of Natural Selection》裡給出的論證（後人稱**費雪原理**，Fisher's principle），核心是一個賽局式的**頻率依賴選擇（frequency-dependent selection）**。關鍵不在「對族群好」，而在「對你的基因好」——天擇不在乎族群繁榮，只在乎誰留下更多**孫代**。\n\n論證是這樣（直覺版，嚴格的族群遺傳學模型指向延伸閱讀）：\n\n```text\n假設某一代雄性比雌性少（族群偏雌）。\n\n  每隻雄性平均能交配的對象比每隻雌性多\n  → 平均一隻雄性貢獻的後代數 > 平均一隻雌性\n  → 「現在多生兒子」的父母，每個兒子預期的孫代數更高\n  → 帶有「偏向生兒子」傾向的基因，在族群裡比例上升\n  → 兒子變多 → 雄性稀缺的優勢消失\n  → 一直推到 1:1 才停（兩邊預期孫代數相等、誰也不占便宜）\n\n反過來偏雄也對稱地被拉回 1:1。\n1:1 是唯一「沒有哪一邊還占著稀缺紅利」的穩定點。\n```\n\n看出來了嗎？這**就是混合策略均衡的邏輯**（ch05）：稀少的那一性帶來更高報酬，於是被選擇放大，直到兩邊**無差異**——「生兒子的預期孫代數 = 生女兒的預期孫代數」。1:1 不是因為它對族群最好（它其實不是！偏雌對族群總繁殖力更高），而是因為它是**唯一沒人能靠偏離占便宜的比例**。這正是 ch09 的 ESS——一個無法被「偏向生某一性」的突變入侵的穩定比例。\n\n這裡藏著本章第一次碰到脊椎張力：**個體理性（基因層次的「最佳化」）導向 1:1，但 1:1 對集體（族群繁殖力）並非最優——偏雌才是。** 跟囚徒困境同一個裂縫：每個「玩家」（基因）各自最佳化，加總出來的集體結果次優。只是這裡沒有任何個體在算——天擇代算了（ch09 的 T9）。\n\n> 嚴謹度誠實標示：費雪原理是直覺版的賽局論證，它**有前提**——假設族群內隨機交配、雙親對兒女投資成本相當。Hamilton（漢彌爾頓）後來指出，若交配發生在小的局部群體內（不是全族群隨機配對），最優會偏雌（local mate competition）。所以「性別比總是 1:1」要 hedge 成「**隨機交配假設下**趨近 1:1」——真實生物有不少受控的偏離。這正是本章後半要強調的：應用得標清楚前提。\n\n合作的演化（互惠利他、親緣選擇）也是同一套工具的延伸，ch08（tit-for-tat）、ch09（ESS）已經鋪過，這裡不重講。\n\n## 政治與軍事：軍備競賽是囚徒困境，但古巴飛彈危機要小心講\n\n把脊椎那張矩陣（ch01 那張 T,R,P,S=5,3,1,0）貼到兩個敵對國家身上，你會得到賽局理論最有名、也最危險的一個應用。\n\n**軍備競賽（arms race）就是囚徒困境。** 兩國各有「裁軍（合作）」與「擴軍（背叛）」兩選項：\n\n```text\n這是 ch01 那張矩陣，玩家換成兩個敵對國家：\n                      對方：裁軍(C)        對方：擴軍(D)\n    我方：裁軍(C)       (3, 3)             (0, 5)\n    我方：擴軍(D)       (5, 0)             (1, 1)\n\n  ← 對方裁軍我擴軍：我取得軍事優勢(5)、對方挨打(0)＝T,S\n  ← 雙方都擴軍：燒掉大筆軍費、安全沒提升＝(1,1)＝P,P\n  ← 雙方都裁軍：省下軍費、相對安全不變＝(3,3)＝R,R（集體最優）\n```\n\n逐欄看最佳反應：對方裁軍時，我擴軍(5)>裁軍(3)；對方擴軍時，我擴軍(1)>裁軍(0)。**擴軍是嚴格優勢策略**——不管對方怎麼做，擴軍對我都更好。於是兩國都擴軍，落到 (1,1)：兩邊都燒了天文數字的軍費、安全感卻沒比 (3,3) 高半分。這是脊椎張力的冷戰版：**兩個都理性的國家，各自最佳化國防，一起掉進對雙方都更糟的軍備堆裡。**\n\n而它怎麼救？跟 ch07/ch08 一模一樣——軍備競賽是**重複賽局**（國家年復一年互動、未來的陰影很長），所以軍備控制條約（可驗證、可懲罰違約）本質上是在搭建一個 grim trigger / tit-for-tat 式的執行機制，把 (裁軍,裁軍) 撐成可維持的均衡。賽局理論在這裡是真有解釋力的。\n\n**接下來這段，我要刻意踩煞車。** 古巴飛彈危機（1962）經常被當成**膽小鬼賽局（chicken）**的教科書案例——兩個玩家對撞、誰先轉向誰丟臉、都不轉就同歸於盡（核戰）。Schelling 本人確實用「比拼冒險（competition in risk-taking）」的框架描述過它。這個比喻有它的洞見：**承諾與可信威脅（ch06）**確實是危機的核心——封鎖、公開最後通牒，都是在「把方向盤丟出窗外」式地展示決心。\n\n但你身為一個對「漂亮模型套現實」有職業警覺的工程師，應該聞到味道了。學界（歷史學家與賽局理論家都有）對「古巴飛彈危機 = 一局 chicken」的批評相當實在：\n\n- **沒有乾淨的證據**顯示甘迺迪（Kennedy）或赫魯雪夫（Khrushchev）真的在「校準威脅、逼對方轉向」這個 chicken 的核心機制上行動——真實決策遠比 2×2 矩陣混亂。\n- **這局根本沒有「一方轉向、一方贏」的乾淨結局**：美國其實也讓步了（私下同意撤掉部署在土耳其的飛彈、承諾不入侵古巴）。雙方都退了一步，這不是 chicken 的標準解。\n- 有學者主張它的**偏好結構根本不是 chicken**，換個賽局更貼，但即使換了，標準賽局理論也解釋不了實際的選擇。\n\n所以本章的態度是：**軍備競賽 = 囚徒困境，這個結構對應紮實，敢寫。古巴飛彈危機 = 一局 chicken，這是個有啟發但會誤導的簡化，要當「一個被反覆辯論的比喻」來講、不能當「賽局理論成功預測了歷史」來吹。** 這個分寸，正是本章後半「限制」一節的預演。\n\n## 經濟學：寡占競爭一句帶，拍賣已詳\n\n經濟學是賽局理論的老家，但本書大半的經濟應用已經在前面消化掉了——**拍賣（ch14）**是機制設計的招牌、**投票與 Arrow（ch15）**是社會選擇、**公共財與共有財（ch16）**是 n 人困境。這裡只補一塊前面沒碰的：**寡占競爭（oligopoly）**。\n\n幾家廠商共佔一個市場、彼此的決策互相影響——這是賽局理論最早的應用之一（早到 Cournot 1838，比 von Neumann 還早一個世紀，只是當時沒有「納許均衡」這個詞）。兩
