、Milner、Ebbinghaus、McGaugh、Price、LePort、Johnson、Karpicke。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源，分三條路線（往機制與神經科學／往應用與學習科學的穩固部分／往爭議與法律倫理），給「如果只看三樣」建議。**只收 landscape 或各章已驗證的連結**，沒把握的標「（未驗證）」。候選：Loftus《Eyewitness Testimony》與其 TED；Schacter《The Seven Sins of Memory》；原始論文（Scoville & Milner 1957、Nader et al. 2000、Roediger & McDermott 1995、Loftus & Pickrell 1995、Neisser & Harsch 1992、Hirst 2015）；method of loci 的 Dresler 2017 與 2025 meta；記憶戰爭的平衡回顧（Psychiatric Times／Frontiers／National Geographic，雙方並陳）。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-not-a-videotape.md、ch02-encoding-storage-retrieval.md、ch03-forgetting-is-a-feature.md、ch04-reconstruction-bartlett.md、ch05-misinformation-effect.md、ch06-lost-in-the-mall.md、ch07-drm-false-memory.md、ch08-hippocampus-consolidation.md、ch09-reconsolidation.md、ch10-flashbulb-memory.md、ch11-emotion-amygdala.md、ch12-eyewitness-courtroom.md、ch13-source-monitoring.md、ch14-hsam-memory-palace.md、ch15-remembering-better.md、ch16-finale.md；\n附錄 appendix-a-notation.md、appendix-b-key-studies.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《大腦怎麼編造過去：記憶作為重建的科學》（id=mem）。最終書名於 outline gate 由作者定案，撰章時以工作名為準。\n\n脊椎一句話：**記憶不是錄影回放，而是每次提取都重新「建構」**——因此可被污染、植入、扭曲，而且鮮明度與正確度脫鉤。脊椎把「錄影帶」隱喻換成「每次 read 都會觸發一次 write」。全書反覆問同一個問題：**「這段記憶是被讀出來的，還是被重新建構（並可能在這次回憶中被改寫）的？」**\n\n---\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的書。目標是讓一位資深後端工程師親身**看懂記憶的運作機制**——記憶不是硬碟上一個檔案被原封讀回，而是一條**每次都要重新跑一遍的重建管線**；讀完能用自己的話對另一個工程師講清楚：為什麼一段「鮮明到不可能錯」的記憶可以是錯的、假記憶怎麼被植入、提取為什麼會反過來改寫記憶本身。讀完有「原來我對自己過去的記憶，有一大半是這次回憶當下現編的」這種冷靜的震撼。\n- **不是**：\n  - **不是教科書**——不背腦區表、不刷神經解剖名詞、不出選擇題。神經機制（海馬迴、杏仁核、再鞏固分子鏈）只在「它解釋了哪個記憶現象」時才出場，不為了完整而完整。\n  - **不是自助手冊／記憶力課程**——不教你怎麼考高分、不賣記憶宮殿速成法。間隔效應、測試效應、記憶宮殿會講（它們是少數**真穩**的結論，見 §深度標準），但講的是**機制為什麼有效**，不是「七天練成過目不忘」。\n  - **不是醫療／治療／戒斷指南**——**本書明確不提供任何醫療、心理治療、創傷處理、用藥（含 propranolol/普萘洛爾）、戒斷或自我診斷建議。** 凡涉及 PTSD、創傷記憶、再鞏固療法、恢復記憶等臨床主題，本書只談**機制與科學證據的現況與爭議**，並在相關章節明文標注「這是科學討論，不是臨床指引；任何個人狀況請找合格專業人員」。談 propranolol 一定連著講「臨床療效未定論」（見 landscape §五），絕不寫成「這樣做可以抹除壞記憶」。\n  - **不是自我追蹤實驗書**——**沒有 Python、沒有真實世界的自我實驗**。不要叫讀者寫睡眠日誌、記憶日記、自測遺忘曲線。「動手做」一律是**紙上推演**（見骨架第 5 段）。\n- **與其他三本興趣書完全獨立、互不引用**。記憶與系統工程的血緣（提取即重寫＝read-repair、event sourcing 重建狀態、cache 失效、最終一致性下的 source-of-truth 漂移）是本書最划算的橋，要用滿但不喧賓奪主——橋接是為了讓機制讀起來像母語，不是把記憶硬塞進分散式系統的框架裡。\n\n### 全書六條驗收主線（finale 章逐條口試）\n\n撰章時每一章都要想「我在替哪一條主線存證」。finale 章會逐條口試，講不出來＝沒過：\n\n1. **編碼／儲存／提取三關卡**，以及**「提取即重寫」為何成立**——記憶經過編碼（encoding）、儲存（storage）、提取（retrieval）三道關卡，每一關都可能引入扭曲；提取不是唯讀，提取本身會把記憶帶回不穩定狀態並可能改寫它（脊椎「每次 read 觸發一次 write」的核心）。\n2. **schema（基模）與誤導訊息效應（misinformation effect）如何污染記憶**——大腦用既有基模補空白、事後的措辭與提問會回灌進「原始」記憶（Bartlett、Loftus & Palmer）。\n3. **假記憶可被植入的證據與限度**——完整的自傳式假事件可以被植入（lost-in-the-mall、DRM），但「可植入」不等於「一切記憶皆假」；證據強在哪、外推的爭議在哪，都要交代。\n4. **系統鞏固（systems consolidation）與再鞏固（reconsolidation）的神經機制**——記憶如何從海馬迴依賴轉為皮質依賴；提取如何打開再鞏固的改寫窗口；動物現象穩、人體強療法不穩的分界。\n5. **鮮明 ≠ 正確（閃光燈記憶的背叛）**——主觀生動度與自信，跟客觀準確度是脫鉤的（Neisser & Harsch、Hirst 9/11）。\n6. **記憶可錯性在法庭與日常的後果與防禦**——目擊證詞、恢復記憶、記憶戰爭；個人與制度層面能做什麼、不能做什麼。\n\n---\n\n## 讀者是誰\n\n唯一讀者：Chewei（陳哲偉），6+ 年資深後端工程師（TypeScript/Node.js/NestJS、AWS、K8s、分散式系統、效能工程、可觀測性），政大資科所選修過演算法與機器學習、淡江資工學士。招牌敘事資產：profiling 驅動讓尖峰 RDS CPU 降 40%。**神經科學/心理學從零教**，但可大量橋接到他的系統工程直覺。\n\n| 不需要解釋（已精通，可直接當橋接錨點） | 快速複習即可（聽過但生鏽） | 要從零教（本書主體） |\n|---|---|---|\n| cache 失效與讀取時重算（read-through、TTL、eviction） | RL 的 TD/prediction-error、variable-ratio reinforcement（在《機器學習》選修碰過、生鏽） | 編碼／儲存／提取三關卡與「提取即重寫」 |\n| event sourcing vs snapshot（用事件重播重建狀態，而非存快照） | dopamine（多巴胺）作為訊號的概念（聽過「獎勵」說法，但不知道是預測誤差） | schema（基模）、同化／削平／銳化、Bartlett 重建論 |\n| read-repair / 讀取時順手改寫、最終一致性、source-of-truth 漂移 | 海馬迴／杏仁核這些名字（聽過，不知道分工） | 誤導訊息效應、假記憶植入、DRM、來源監控 |\n| lossy 壓縮編碼、寫入放大（write amplification） | 睡眠分期（聽過 REM/深睡，不知道與記憶鞏固的關係） | 系統鞏固與再鞏固的神經機制、睡眠在鞏固中的角色 |\n| idempotency、冪等、retry、backpressure、正回饋迴圈 | 統計效應量、樣本數、複製危機（做過 A/B 但沒讀過記憶領域的方法學戰） | 閃光燈記憶、鮮明≠正確、自信與準確的脫鉤 |\n| profiling 驅動優化、量測→診斷→優化的方法論 | — | HM 案例、失憶症、記憶的多重可分離系統 |\n| 分散式追蹤／audit log／provenance（記憶恰恰**沒有** provenance，是好橋） | — | 法庭中的記憶、目擊證詞、記憶戰爭、倫理爭議 |\n\n**橋接錨點清單（要用滿但不喧賓奪主，每章「從你已知的出發」優先從這裡取）**：\n- **快取失效與讀取時重算** → 提取時重建、記憶不是讀檔是重算。\n- **event sourcing vs snapshot** → 大腦用「事件重播」重建一段經歷，而非存一張快照；重播時用當前的 schema 補洞，所以會漂移。\n- **read-repair / 讀取時順手改寫** → 再鞏固：提取（read）順手把記憶改寫（write）回去。\n- **最終一致性與 source-of-truth 漂移** → 反覆回憶讓「記得的版本」逐漸偏離「真正發生的」，且自己無法察覺。\n- **lossy 壓縮編碼** → 編碼階段就丟資訊、保留要旨（gist）丟細節，提取時用要旨重建細節（所以細節常是現編的）。\n- **寫入放大** → 一次提取觸發的改寫，比「只是讀一下」造成的副作用大得多。\n\n注意邊界：橋接是**直覺的腳手架**，不是**證明**。分散式系統的類比能幫讀者「感覺對了」，但記憶的真相由神經科學與心理學實證決定——當類比與實證衝突時，**以實證為準並明說類比在哪裡破掉**（例：再鞏固不是每次提取都觸發，有 boundary conditions，不像 read-repair 那麼機械）。\n\n---\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。第二人稱「你」直接對讀者說話。\n- **嚴禁簡體中文字／簡體詞**（这/们/个/为/启/说/题/类/变/优/构/识/认/觉/译/选/边/过/还/进/运/层/会/图/测/软/应/实/发/经/时/间/关/见/现/对/标/简/论/节…等，lint_book.py 會逐字元掃；shell grep 對同形字會誤報，以 Python lint 為準）。\n- **技術與專有名詞**：第一次出現給「中文（English）」，之後可只用中文。**人名**給「中譯（原文，生卒年若關鍵）」，之後用中譯。實驗名／典範名保留通行英文（DRM、lost-in-the-mall、flashbulb、War of the Ghosts）。\n- 台灣用語基準：記憶（不用「記憶體」於心理脈絡）、提取（retrieval，不用「檢索」當主詞，首次可註）、鞏固（consolidation）、再鞏固（reconsolidation）、基模（schema）、海馬迴（hippocampus，台灣慣用「海馬迴」非「海馬體」）、杏仁核（amygdala）。\n\n### 關鍵術語對照表（首次出現用「中文（English）」）\n\n| 中文 | English | 備註 |\n|---|---|---|\n| 編碼／儲存／提取 | encoding / storage / retrieval | 三關卡，主線 1 |\n| 重建（性）記憶 | reconstructive / constructive memory | 脊椎本體 |\n| 基模 | schema | Bartlett，主線 2 |\n| 同化／削平／銳化 | assimilation / leveling / sharpening | Bartlett 的扭曲型態 |\n| 連續再生／重複再生 | serial reproduction / repeated reproduction | Bartlett 兩種方法，**勿混用** |\n| 誤導訊息效應 | misinformation effect | Loftus，主線 2 |\n| 假記憶 | false memory | 主線 3 |\n| 關鍵誘餌詞 | critical lure | DRM 中未出現卻被誤記的詞 |\n| 來源監控／來源歸因錯誤 | source monitoring / source misattribution | Johnson 1993，假記憶的統一解釋 |\n| 隱記症（無意識抄襲） | cryptomnesia | 來源監控失敗的一種 |\n| 既視感 | déjà vu | 機制多假說、未定論 |\n| 鞏固（系統鞏固） | (systems) consolidation | 主線 4 |\n| 再鞏固 | reconsolidation | 主線 4、脊椎分子支柱、最大爭議 |\n| 不穩定（可塑）狀態 | labile state | 提取後記憶回到的狀態 |\n| 邊界條件 | boundary conditions | 再鞏固不總觸發的條件 |\n| 順行性／逆行性失憶 | anterograde / retrograde amnesia | HM 案例 |\n| 陳述／程序記憶 | declarative / procedural memory | HM 的關鍵分離 |\n| 閃光燈記憶 | flashbulb memory | 主線 5 |\n| 遺忘曲線 | forgetting curve | Ebbinghaus |\n| 節省法 | method of savings | Ebbinghaus 的測量法 |\n| 無意義音節 | nonsense syllables | Ebbinghaus 的材料 |\n| 超憶症／高度超群自傳式記憶 | hyperthymesia / HSAM | landscape §九，脊椎實驗化身 |\n| 記憶宮殿／位置記憶法 | memory palace / method of loci | 善用重建機制、非反例 |\n| 間隔效應／測試效應（提取練習） | spacing effect / testing effect (retrieval practice) | 少數穩固正面結論 |\n| 要旨／逐字 | gist / verbatim | 編碼丟細節保要旨 |\n| 需求特徵 | demand characteristics | Bartlett 方法學爭議 |\n| 預先註冊複製 | pre-registered replication | lost-in-the-mall 2023 複製 |\n\n### 關鍵人名對照表（首次出現用「中譯（原文，生卒年若關鍵）」）\n\n| 中譯 | 原文 | 關聯 |\n|---|---|---|\n| 巴特利特 | Frederic Bartlett, 1886–1969 | 重建論、War of the Ghosts、schema |\n| 蘿芙托斯 | Elizabeth Loftus, 1944– | 誤導訊息、lost-in-the-mall、記憶戰爭 |\n| 帕爾默 | John Palmer | Loftus & Palmer 1974 |\n| 皮克瑞爾 | Jacqueline Pickrell | lost-in-the-mall 1995 |\n| 羅迪格 | Henry \"Roddy\" Roediger III | DRM、測試效應 |\n| 麥克德莫特 | Kathleen McDermott | DRM |\n| 迪斯 | James Deese | DRM 的 D（1959） |\n| 納德 | Karim Nader | 再鞏固 2000 |\n| 勒杜 | Joseph LeDoux, 1949– | 再鞏固、恐懼記憶 |\n| 沙菲 | Glenn Schafe | 再鞏固 2000 |\n| 布魯內 | Alain Brunet | propranolol 人體研究 2008 |\n| 奈瑟 | Ulric Neisser, 1928–2012 | 閃光燈記憶、生態效度 |\n| 哈許 | Nicole Harsch | 挑戰者號研究 1992 |\n| 赫斯特 | William Hirst | 9/11 十年追蹤 |\n| 費爾普斯 | Elizabeth Phelps | 9/11 團隊、情緒與記憶 |\n| 莫萊森 | Henry Molaison（HM）, 1926–2008 | 失憶症里程碑案例 |\n| 史科維爾 | William Scoville | HM 的外科醫師 |\n| 米爾納 | Brenda Milner, 1918– | HM 研究、1957 論文 |\n| 艾賓浩斯 | Hermann Ebbinghaus, 1850–1909 | 遺忘曲線 1885 |\n| 麥高夫 | James McGaugh, 1931– | 超憶症首例 2006 |\n| 普萊斯 | Jill Price（案例「AJ」） | 第一個超憶症案例 |\n| 勒波特 | Aurora LePort | HSAM 命名研究 2012 |\n| 強生 | Marcia Johnson | 來源監控框架 1993 |\n| 卡皮克 | Jeffrey Karpicke | 測試效應 |\n\n（撰章時若用到表外人物，比照同格式並回填 landscape；不確定生卒年就不硬填。）\n\n---\n\n## 每章骨架（必須遵守，標題名稱逐字照抄——Tier-1 lint_book.py 會 grep 這些標題，順序固定）\n\n1. **章首**：`# chNN — 章名：副標`，緊接 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的位置、為什麼存在、跟前後章的關係，3–5 行）`\n   每個 Part 的第一章在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，CJK=2 欄對齊；照抄並把「◄你在這裡」標到本 Part），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心錨定在讀者的後端／系統工程實戰直覺上，要**具體**（指名 cache 失效、event sourcing、read-repair、最終一致性、lossy 壓縮、寫入放大、idempotency、profiling、TD/prediction-error 中哪一個，並說清楚對應到哪），不要泛泛而談。\n3. **核心 section（多個 `##`）** — 深入機制與直覺。歷史敘事服務於機制理解（為什麼這個研究在當時是突破、它解決了哪個謎），不是編年史。每個概念先給「它在解什麼問題」，禁止無動機的定義。\n4. `## 直覺的陷阱` — **本書招牌段落**：這個主題最常被誤解成什麼**科普迷思／錯誤直覺**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實沒懂）。用**表格或條列**。記憶這個主題迷思密度極高（記憶像錄影、情緒讓記憶更準、超憶症＝完美記憶、催眠能挖出真記憶、自信高就準、重複就記得牢…），這段是全書最有價值的段落之一。每條迷思要標明**正解是什麼**，並對齊 landscape 的 ❌/🔶 彈藥。\n5. `## 紙上推演` — **動手做（純紙上推演，無 Python、無自我追蹤實驗）**。每章 2~4 題思想實驗／推演，每題標**難度（★~★★★）**與**預估時間（如 [15 分鐘]）**。題型：**預測一個研究的結果再對答案**、**找出一個壞論證的破綻**、**把一句白話宣稱翻成機制**、**設計一個假想實驗**、**口頭重講一條因果鏈**。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路、研究實際數字）。\n6. `## 自我檢核` — 5~8 題，**口頭自答**：講得出來才算過關。對齊「能不能講給另一個工程師聽」的深度，**優先出「為什麼」而非「是什麼」**。\n7. `## 延伸閱讀` — **真實連結**（以 landscape 驗證過的為優先），每條一句話說明值得讀什麼、讀哪一段。沒把握的連結標「（未驗證）」。\n\n---\n\n## 深度標準\n\n- **每章至少一個 worked example**：本書系的 worked example 是「**一條走到底的機制鏈**」或「**一個真實研究的數字逐步解讀**」，不准跳步。具體形式至少要是以下之一：\n  - 把一個統合分析（meta-analysis）／實驗的**百分比逐步解讀**（例：Loftus & Palmer 碎玻璃實驗 smashed 32% vs hit 14% vs 控制 12%，一個動詞造成的差幅怎麼算、代表什麼）。\n  - 走一條 **dopamine（多巴胺）預測誤差訊號**的變化（TD error 怎麼從「獎勵來了」轉成「線索預告獎勵」，橋接讀者的 RL 直覺）。\n  - 走一夜 **hypnogram（睡眠分期圖）的時序**與哪一段對應哪種記憶鞏固。\n  - 走一次**誤導訊息實驗的數字**（樣本、操弄、誤報率）。\n  - 走一條**再鞏固的分子／時序鏈**（提取 → labile → 蛋白質合成窗口 → 重新穩定，以及干擾窗口在哪）。\n  - example 帶的數字一律對照 landscape，**不四捨五入成圓整數**（lost-in-the-mall 是 n=24／約 25%，不是「一半」；Neisser/Harsch 是 106→44 人／約 2.5 年）。\n- **嚴謹度誠實標示**：每個論斷明確標示自己屬於哪一級——\n  - 「**這是穩固共識**」（重建論本身、測試效應、間隔效應、HM 的分離、再鞏固這個動物**現象**）；\n  - 「**這是主流假說但有爭議／邊界未定**」（系統鞏固的標準模型 vs 多重痕跡理論、睡眠鞏固的具體機制）；\n  - 「**這是迷思，正解是…**」（記憶像錄影、情緒讓記憶更準、HSAM＝完美記憶、催眠挖真記憶）；\n  - 「**這是 unsettled debate，雙方並陳**」（再鞏固的**人體臨床療效**、壓抑／恢復記憶的記憶戰爭、déjà vu 的機制）。**重大爭議必須呈現雙方、不替讀者選邊斷言**（landscape 的 🔶/🔶🔶 條目）。\n- **禁「顯然」「眾所周知」「易證」**；禁止把單一小樣本研究（Bartlett 1932、Ebbinghaus n=1）寫得比它更穩——這類研究要同時寫出**它的方法學限制**與**後續更嚴格的複製**（Gauld & Stephenson 1967、Murre & Dros 2015），這正是本書「重建 vs 儲存」對照的好素材。\n- **脊椎每章復現**：每章至少一處明確把當章內容接回脊椎——「這段記憶是被讀出來的，還是被重新建構（並可能在這次回憶中被改寫）的？」或其工程版「這裡是 read，還是 read 觸發了 write？」。脊椎要能被讀者用自己的話轉述，不是口號。\n- **時效性／可爭議事實標時點**：版本、數字、效應量、年份、歸屬、樣本數一律當作可能過時或被誤傳，標 `（2026-06）` 並 hedge（「約」「據報」「常被引為」「目前學界傾向」）。\n- 字數：每章 **5,000~9,000 中文字**，依主題深度調整（地基章、爭議章可偏厚）。寧深勿廣，不灌水。\n\n---\n\n## 事實正確性（零信任）\n\n神經科學／心理學科普充斥被過度簡化、被推翻、或仍有爭議的「事實」。本書的事實紀律：\n\n- **以 `_meta/landscape-2026-06.md` 為事實基準**：撰章時引用任何實驗、數字、年份、歸屬、引文，先對照 landscape，**不要憑記憶或憑「教科書都這樣寫」**。landscape 的 ✅/⚠️/❌/🔶 標記就是寫法指令：✅ 照寫（但精確值不四捨五入）、⚠️ 寫保守版並 hedge、❌ 是「直覺的陷阱」段的彈藥（給正解）、🔶 雙方並陳不選邊。\n- **每章 3–8 次 web 查證**：landscape 未涵蓋的當章特定細節（具體數字、引文、近年複製、現況）自行用 WebSearch/WebFetch 查證；查到對 landscape 的修正時，**先更新 landscape → 同步引用章 → 在 maintenance 掃描日誌記一行**；重大修正（推翻既有基準）需**兩個獨立來源**。\n- **守住的高風險事實**（landscape 末節「待守住的高風險事實」逐條，撰章前必對照）：\n  1. lost-in-the-mall：原始 **n=24、約 25%（6 人）**；2023 預先註冊複製 **n=123、約 35%**；別寫成圓整數或「一半」；倫理外推有爭議，雙方並陳。\n  2. 再鞏固的藥：Nader 2000 用 **anisomycin（茴香黴素，大鼠）不是 propranolol**；propranolol 是後來人體研究（Brunet 2008），**臨床效果至今有爭議**（2022 有否定的 meta-analysis）。動物現象穩、人體強療法不穩，雙方並陳。\n  3. 閃光燈記憶：情緒**不**讓記憶更準；Neisser/Harsch（106→44 人、約 2.5 年）與 Hirst 9/11 都證**自信與準確脫鉤**。\n  4. HSAM 不是完美記憶：只在自傳式領域超群、死記不優；**HSAM 者照樣會被植入假記憶**（脊椎的實驗化身）；Jill Price 學業普通。\n  5. Bartlett：核心洞見成立，但 **1932 原始實驗方法鬆散**、扭曲取決於指示語；serial ≠ repeated reproduction。\n  6. HM：手術年齡寫 **27 歲**；非「完全沒有新記憶」——程序記憶保留是關鍵分離。\n  7. 記憶宮殿／間隔／測試效應**是真有效的**，別為戲劇性寫成迷思。\n  8. 記憶戰爭是 **unsettled debate**，雙方並陳不選邊。\n  9. 「重建」**別過度延伸成「記憶全不可信」**——多數日常記憶大致準確，重建論說的是「可被污染、鮮明≠正確」。\n- **引文與歸屬**：名人名言、研究歸屬、年份不得憑記憶引用；對照 landscape，landscape 沒有的查到原始來源。\n\n---\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- **圖**：ASCII diagram（全書路線圖、編碼/儲存/提取三關卡流程、再鞏固時序窗、睡眠分期 hypnogram、誤導訊息實驗的組別對照、記憶多重系統的分層），必須通過 `check_diagrams.py`（CJK=2 欄寬）。**注意**：路線圖的 `│` 因上下無 box 字元被 checker 豁免——路線圖對齊只能靠**渲染肉眼檢查**，且應由統一腳本生成、別手抄多份（見 maintenance）。\n- 表格用於：直覺的陷阱清單、術語／人名對照、實驗數字對照、嚴謹度分級、爭議雙方並陳。\n- **跨章引用 house style：裸寫「（chNN）」**（與書系一致）。**四本書互不引用**，不要寫「見《某書》」。\n- 多行的機制鏈／時序推導放在 ```text 圍欄區塊裡，每步右側可加「← 為什麼」短註，禁止硬塞進行內。\n\n---\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整本書最該起雞皮疙瘩的一頁」）。**不販賣神話、不喊「太神奇了」「大腦好神奇」**——記憶科學的震撼來自把機制講清楚（一個動詞改寫了你「看到」的東西；你越自信反而越可能錯；超憶症的人也會被植入假記憶），而不是堆形容詞。允許冷幽默。\n\n每個機制出場都有白話直覺在旁邊；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘」。涉及創傷、法庭、記憶戰爭等敏感主題時，語氣**克制、不獵奇**：承認對受害者的關切與對冤案的關切**兩者都正當**，承認科學的不確定，**不替讀者做臨床或道德裁決**。本書的可信度建立在「敢說『這我們還不知道』」，而不是把每件事都講得斬釘截鐵。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="mem";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">大腦怎麼編造過去<br><span style="font-weight:400;font-size:12px;color:var(--muted)">記憶作為重建的科學</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 大腦怎麼編造過去';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
