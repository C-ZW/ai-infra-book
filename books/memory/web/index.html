者的期待而改變回答——Loftus 誤導訊息研究需排除這個解釋 | ch05 |\n| 恢復記憶 | recovered memory | 創傷記憶多年後在治療中被「找回」的說法；記憶戰爭的核心爭議，目前是 unsettled debate | ch06 |\n| 壓抑 | repression | Freud 式的主動把創傷推出意識的機制；「壓抑作為特殊記憶機制是否存在」本身有爭議，部分研究者用「尋常遺忘」解釋 | ch12 |\n\n---\n\n## A6　神經機制術語\n\n| 中文 | English | 白話定義（口頭驗收用） | 首次出現章 |\n|---|---|---|---|\n| 海馬迴 | hippocampus | 內側顳葉的關鍵腦區；新陳述記憶的形成必需它（HM 案例）；也負責空間導航，是情節記憶的系統鞏固起點 | ch08 |\n| 杏仁核 | amygdala | 調節記憶鞏固強度的腦區，而非「情緒記憶的硬碟」；情緒事件時釋放壓力荷爾蒙，強化海馬迴的鞏固 | ch11 |\n| 記憶調節假說 | memory modulation hypothesis | McGaugh 等人提出：杏仁核的角色是調節其他腦區的鞏固強度，不是直接儲存記憶 | ch11 |\n| 模式分離 | pattern separation | 海馬迴把相似的輸入編碼成不同的表徵，避免混淆（類似資料庫不同 primary key） | ch08 |\n| 模式補全 | pattern completion | 海馬迴用部分線索補全完整記憶（類似根據 partial key 查到整筆記錄） | ch08 |\n| 海馬迴索引理論 | hippocampal indexing theory | Teyler & DiScenna 提出：海馬迴不存記憶本身，而是存一張指向皮質各分片的索引；鞏固後皮質直連、索引可退場（但多重痕跡理論說情節記憶的索引可能永久保留） | ch08 |\n| 茴香黴素 | anisomycin | 蛋白質合成抑制劑；Nader et al. 2000 大鼠再鞏固實驗使用的藥物（注入杏仁核），可破壞再鞏固——不是 propranolol | ch09 |\n| 順行性失憶 | anterograde amnesia | 無法形成新的陳述記憶；HM 手術後的主要症狀 | ch08 |\n| 逆行性失憶 | retrograde amnesia | 手術前數年的記憶受損；HM 的次要症狀，童年記憶相對保留 | ch08 |\n| 解離 | dissociation | 一種記憶壞了、另一種好好的；HM 的程序記憶保留而陳述記憶全毀，這個解離證明記憶是多個可分離系統 | ch08 |\n| 鏡像描繪 | mirror drawing | 米爾納（Milner）設計的任務：看著鏡子裡的星形描邊；HM 每次都更好卻從不記得練過，是程序記憶保留的鐵證 | ch08 |\n| 消退 | extinction | 反覆暴露制約線索但不給強化，恐懼反應逐漸消失；不等於再鞏固（消退是「學了新的抑制」而非覆寫原恐懼） | ch09 |\n| 自發恢復 | spontaneous recovery | 消退後過一段時間，恐懼反應再度出現；說明原始記憶並未消失，消退只是暫時壓制 | ch09 |\n| 去抑制 | renewal | 換了情境後消退的反應重新出現；進一步說明消退是情境特定的，原始恐懼還在 | ch09 |\n| 武器聚焦效應 | weapon focus effect | 目擊者注意力被武器吸引，導致對武器的記憶增強但對周邊（如犯罪者臉孔）的記憶更差；Fawcett 2013 meta-analysis 確認但指出現實外推有限 | ch11 |\n| 倒 U 形曲線 | inverted-U curve | 情緒強度對記憶的影響呈倒 U：適度情緒增強編碼，過度壓力（皮質醇過高）反而損害提取 | ch11 |\n\n---\n\n## A7　Bartlett 的重建扭曲型態\n\n| 中文 | English | 白話定義（口頭驗收用） | 首次出現章 |\n|---|---|---|---|\n| 同化 | assimilation | 把陌生細節改寫成符合自己文化基模的版本（《鬼魂的戰爭》裡獨木舟變成船）；write 的一種 | ch04 |\n| 削平 | leveling | 刪去難以理解或跟基模不符的細節，讓故事更流暢簡潔 | ch04 |\n| 銳化 | sharpening | 放大並保留那些讓故事「更合理」的特定細節，讓它更突出 | ch04 |\n| 連續再生 | serial reproduction | Bartlett 的一種方法：一人傳一人（像傳話遊戲），研究錯誤如何在社會傳播中累積 | ch04 |\n| 重複再生 | repeated reproduction | Bartlett 的另一種方法：同一人在不同時間點多次回憶同一故事；War of the Ghosts 用的是這種 | ch04 |\n\n---\n\n## A8　閃光燈記憶與情緒記憶術語\n\n| 中文 | English | 白話定義（口頭驗收用） | 首次出現章 |\n|---|---|---|---|\n| 一致性 | consistency | 閃光燈記憶研究的量測指標：現在的說法與過去記錄的說法相符程度；Hirst 9/11 追蹤發現自信高但一致性快速下降 | ch10 |\n| 主觀生動度 | vividness | 記憶感覺清晰、有畫面的程度；與客觀準確度脫鉤——感覺很生動並不代表更準確 | ch10 |\n| 校準 | calibration | 信心與準確率的對應關係；「說 90% 確定的案例，實際有幾成是對的」——閃光燈記憶的自信校準很差 | ch10 |\n\n---\n\n## A9　法庭與應用術語\n\n| 中文 | English | 白話定義（口頭驗收用） | 首次出現章 |\n|---|---|---|---|\n| 目擊者誤認 | eyewitness misidentification | 目擊者在指認時錯認無辜者為犯罪者；美國清白專案統計約 69% 的冤案涉及此問題 | ch12 |\n| 跨種族辨識劣勢 | other-race effect | 辨認與自己種族不同的臉孔時，準確率顯著下降的穩固現象 | ch12 |\n| 盲化主持 | double-blind lineup | 主持指認的警察也不知道哪個是嫌疑人；防止無意識提示污染目擊者的前置程序 | ch12 |\n| 暗樁 | confederate | 實驗中假扮成另一個受試者（或目擊者）的實驗同謀；Wells & Bradfield 1998 用暗樁對目擊者說「答對了」以研究事後確認對自信的影響 | ch12 |\n| 記憶戰爭 | Memory Wars | 1980–90 年代「壓抑／恢復記憶」vs「假記憶可被植入」之間的學術與法庭論戰；目前仍是 unsettled debate | ch12 |\n| 來源監控框架 | source monitoring framework | Johnson, Hashtroudi & Lindsay 1993 提出：記憶不附帶來源標籤，來源是事後根據記憶的特徵（知覺細節、時空脈絡、認知運作痕跡）推斷的，因此可能推錯 | ch13 |\n\n---\n\n## A10　記憶技術與穩固正面結論\n\n| 中文 | English | 白話定義（口頭驗收用） | 首次出現章 |\n|---|---|---|---|\n| 間隔效應 | spacing effect | 分散練習勝過集中練習（臨時抱佛腳）；Ebbinghaus 已觀察到，是複製度最高的記憶研究發現之一 | ch15 |\n| 測試效應（提取練習） | testing effect / retrieval practice | 主動提取（考自己）比重讀更能鞏固長期記憶；因為每次提取就是一次重建練習，鍛鍊的是重建路徑本身 | ch15 |\n| 記憶宮殿（位置記憶法） | memory palace / method of loci | 把要記的東西轉換成生動影像，掛在熟悉空間路線的各個位置；之所以有效，是因為它順著大腦「重建」的特性而非抵抗它 | ch14 |\n| 流暢度錯覺 | fluency illusion | 重複閱讀感覺很順暢，誤以為自己已經記住了；但流暢感是「路徑熟悉」而非「記憶穩固」的副產品 | ch14 |\n| 合意的困難 | desirable difficulties | Bjork 提出：學習時製造一些提取困難（間隔、測試）反而有助於長期保留；困難感本身是鍛鍊的證明，不是失敗的信號 | ch15 |\n| 提取強度／儲存強度 | retrieval strength / storage strength | Bjork 的區分：臨時抱佛腳提高提取強度（短期可及），但沒有提高儲存強度（長期保留）；間隔＋測試兩者都提高 | ch15 |\n| 超憶症（高度超群自傳式記憶） | hyperthymesia / HSAM (Highly Superior Autobiographical Memory) | 能對個人生命中每一天做近乎完整回憶的極罕見現象；只在自傳式領域超群，一樣會產生 DRM 假記憶——脊椎的實驗化身 | ch14 |\n\n---\n\n## A11　關鍵人名速查\n\n| 中文譯名 | 原文姓名 | 關鍵貢獻（一句話） |\n|---|---|---|\n| 巴特利特 | Frederic Bartlett, 1886–1969 | 重建論先驅，War of the Ghosts 實驗，提出基模（schema）概念 |\n| 艾賓浩斯 | Hermann Ebbinghaus, 1850–1909 | 遺忘曲線、節省法、無意義音節，記憶量化研究的開創者 |\n| 蘿芙托斯 | Elizabeth Loftus, 1944– | 誤導訊息效應、lost-in-the-mall 假記憶植入、記憶戰爭的核心研究者 |\n| 帕爾默 | John Palmer | Loftus & Palmer 1974 車禍動詞實驗的共同作者 |\n| 皮克瑞爾 | Jacqueline Pickrell | Loftus & Pickrell 1995 lost-in-the-mall 實驗的共同作者 |\n| 羅迪格 | Henry \"Roddy\" Roediger III | DRM 典範（1995）、測試效應現代引爆點、記憶從眾 |\n| 麥克德莫特 | Kathleen McDermott | DRM 典範（1995）的共同作者 |\n| 迪斯 | James Deese | DRM 的 D，1959 年最早觀察到語意誘餌假記憶現象 |\n| 納德 | Karim Nader | 再鞏固 2000 年大鼠實驗（anisomycin 注射杏仁核）的第一作者 |\n| 勒杜 | Joseph LeDoux, 1949– | 再鞏固 2000 年論文的通訊作者；恐懼記憶與杏仁核研究 |\n| 沙菲 | Glenn Schafe | 再鞏固 2000 年論文的共同作者 |\n| 布魯內 | Alain Brunet | 首篇 propranolol 搭配創傷提取的人體研究（2008） |\n| 奈瑟 | Ulric Neisser, 1928–2012 | 閃光燈記憶、生態效度，挑戰者號研究（1992）首席研究者 |\n| 哈許 | Nicole Harsch | Neisser & Harsch 1992 挑戰者號研究的共同作者 |\n| 赫斯特 | William Hirst | 9/11 十年跨校追蹤研究（2011/2015）首席研究者 |\n| 費爾普斯 | Elizabeth Phelps | 9/11 研究共同負責人；情緒與記憶研究 |\n| 莫萊森 | Henry Molaison (HM), 1926–2008 | 失憶症里程碑案例；生前以代號 HM 聞名，死後 2009 年姓名公開 |\n| 史科維爾 | William Scoville | 1953 年替 HM 進行雙側內側顳葉切除手術的外科醫師 |\n| 米爾納 | Brenda Milner, 1918– | Scoville & Milner 1957 里程碑論文；鏡像描繪實驗設計者 |\n| 麥高夫 | James McGaugh, 1931– | 記憶調節假說；超憶症（HSAM）首例「AJ」的命名研究者（2006） |\n| 普萊斯 | Jill Price（案例「AJ」） | 第一個公開的超憶症案例；學業成績普通，說明 HSAM 不等於全面記憶超群 |\n| 勒波特 | Aurora LePort | LePort et al. 2012，正式命名 HSAM 並進行較大樣本行為神經解剖研究 |\n| 強生 | Marcia Johnson | 來源監控框架（Johnson, Hashtroudi & Lindsay 1993） |\n| 卡皮克 | Jeffrey Karpicke | 測試效應現代引爆點論文（Roediger & Karpicke 2006）的共同作者 |\n| 布雷納德 | Charles Brainerd | 模糊痕跡理論（Fuzzy-Trace Theory）的共同提出者 |\n| 蕾娜 | Valerie Reyna | 模糊痕跡理論的共同提出者；與布雷納德合作 |\n| 德雷斯勒 | Martin Dresler | 記憶宮殿訓練 Neuron 2017 論文第一作者；證明記憶冠軍的腦連結模式可訓練達成 |\n| 圖爾文 | Endel Tulving | 編碼特定性原則（Tulving & Thomson 1973）；情節記憶/語意記憶概念的發展者 |\n| 帕提希斯 | Lawrence Patihis | Patihis et al. 2013（PNAS）：HSAM 者一樣產生 DRM 假記憶的關鍵論文第一作者 |\n| 麥克洛斯基 | Michael McCloskey | McCloskey & Zaragoza 1985：挑戰 Loftus 覆寫假說，提出「共存＋來源混淆」的替代解釋 |\n| 薩拉戈薩 | Maria Zaragoza | McCloskey & Zaragoza 1985 的共同作者 |\n| 加里 | Maryanne Garry | 想像膨脹效應（Garry et al. 1996）的第一作者 |\n| 韋爾斯 | Gary Wells | 盲化指認程序研究；Wells & Bradfield 1998 事後確認效應 |\n| 布萊德菲爾德 | Amy Bradfield | Wells & Bradfield 1998 的共同作者 |\n| 威克斯泰德 | John Wixted | Wixted & Wells 2017：乾淨初次指認條件下信心有一定校準，被污染後才完全失準 |\n\n---\n\n> **口頭驗收自測提示**：合上書，隨機挑五個術語，嘗試對一個（假想的）工程師朋友三句話解釋——不用背定義，要能說出「它在解什麼問題」與「為什麼記憶研究需要這個概念」。說不出「為什麼」就代表還沒過關。\n"}, {"id": "appendix-b-key-studies", "file": "appendix-b-key-studies.md", "group": "附錄", "title": "附錄 B — 關鍵研究與人物速查表", "md": "# 附錄 B — 關鍵研究與人物速查表\n\n> 本附錄從 ch01–ch16 實際內容萃取，供快速查閱。數字、年份、歸屬以 `_meta/landscape-2026-06.md` 為基準（標注 2026-06）。研究欄位格式：「作者（年）期刊／出處 — 推翻什麼直覺 / 留下什麼結論 — 對應章」。\n\n---\n\n## 一、關鍵研究速查\n\n### 按主題分組\n\n---\n\n#### 1-1　記憶是重建的（基礎框架）\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Simons & Chabris (2011)**「What People Believe about How Memory Works」n=1,838 全美電訪，16 位記憶專家 | *PLOS ONE* | **直覺**：大眾普遍認為「記憶像攝影機」。**結論**：63% 受訪者同意「記憶像攝影機」，但 16 位記憶專家 **0 人同意**——大眾預設與專家共識落差極大 | ch01 |\n| **Bartlett (1932)**《Remembering》——War of the Ghosts 連續再生 ＋ 重複再生實驗 | 劍橋大學出版社 | **直覺**：記憶只是衰減，不會主動扭曲。**結論**：受試者反覆回憶陌生故事後，細節被文化基模（schema）同化、削平、銳化，記憶是**重建**而非還原 | ch04 |\n| **Gauld & Stephenson (1967)**「Some experiments relating to Bartlett's theory of remembering」| *British Journal of Psychology* | **直覺**：Bartlett 的結果是鐵證。**結論**：明確要求「只說確定的、不要猜」後扭曲大幅縮小——重建錯誤量**取決於指示語**，Bartlett 原始設計把「真正的重建」與「禮貌填空」混在一起 | ch04 |\n| **Tulving & Thomson (1973)**「Encoding specificity and retrieval processes」| *Psychological Review* | **直覺**：遺忘就是資料消失了。**結論**：提取線索若未在編碼時在場，資料**可得（available）但不可取（accessible）**——「忘了」不等於「不存在了」 | ch02 |\n\n---\n\n#### 1-2　遺忘曲線\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Ebbinghaus (1885)**《Über das Gedächtnis》——無意義音節自我實驗，節省法，n=1 | 書（英譯 *Memory: A Contribution to Experimental Psychology*） | **直覺**：記憶量隨時間線性衰減。**結論**：遺忘曲線**先快後慢**（保留量隨延遲急遽下降後趨緩）；方法 n=1，但曲線形狀可複製 | ch03 |\n| **Murre & Dros (2015)**「Replication and Analysis of Ebbinghaus' Forgetting Curve」| *PLOS ONE*（開放取用） | **直覺**：n=1 的老結果不可信。**結論**：單名受試者花約 70 小時重做（6 個延遲點），曲線形狀成功複製；另發現 **24 小時處有一個小上揚**，可能與睡眠鞏固有關 | ch03 |\n\n---\n\n#### 1-3　誤導訊息效應\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Loftus & Palmer (1974)**「Reconstruction of Automobile Destruction」——兩個獨立實驗 | *Journal of Verbal Learning and Verbal Behavior* | **直覺**：問一個問題只是「詢問」不會改寫記憶。**結論**：實驗一（n=45）：動詞「smashed」使速度估計高於「contacted」（約 41 mph vs 約 32 mph）；實驗二（n=150，3組各50人）：一週後 smashed 組 **32%** 誤報看到碎玻璃（影片無碎玻璃），hit 組 **14%**，控制組 **12%**——**一個動詞改寫了「看到」的內容** | ch05 |\n| **McCloskey & Zaragoza (1985)**「Misleading postevent information and memory for events」| *Journal of Experimental Psychology: General* | **直覺**：誤導訊息直接「覆寫」原始記憶（Loftus 早期詮釋）。**結論**：改良測試設計（排除反應偏誤）顯示誤導訊息對「辨認原始物件」幾乎無損——污染可能是**來源混淆**而非字面覆寫；爭論至 2026 年仍未定論 | ch05, ch13 |\n\n---\n\n#### 1-4　假記憶植入\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Loftus & Pickrell (1995)**「The Formation of False Memories」 | *Psychiatric Annals* | **直覺**：只能污染細節，完整假事件不可能被植入。**結論**：原始 n=24，**約 25%（6 人）**「記起」從未發生的童年商場走失事件；樣本小是真實弱點 | ch06 |\n| **Murphy, Loftus et al. (2023)**「Lost in the mall」預先註冊複製 | *Memory* | **直覺**：lost-in-the-mall 是孤證小樣本。**結論**：n=123（原始約五倍），**約 35%** 形成假記憶——效應複製成功、植入率甚至略高；精確比率取決於「假記憶」定義，仍在精修 | ch06 |\n| **Garry, Manning, Loftus & Sherman (1996)**「Imagination inflation」 | *Psychonomic Bulletin & Review*, 3, 208–214 | **直覺**：只是「想像一下」不會讓人誤以為真發生過。**結論**：**僅僅想像一個未發生的事件**，就顯著提高對其曾發生的自信；被想像過的事件升幅明顯大於回歸均值可解釋的幅度 | ch06 |\n\n---\n\n#### 1-5　DRM 假記憶典範\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Deese (1959)**「On the prediction of occurrence of particular verbal intrusions in immediate recall」| *Journal of Experimental Psychology* | **直覺**（當時）：假記憶需要外部暗示。**結論**：語意相關詞表中，未出現的關鍵詞會被「記起」——但這個發現沉寂三十年才被重新發掘 | ch07 |\n| **Roediger & McDermott (1995)**「Creating False Memories: Remembering Words Not Presented in Lists」——DRM 典範；24 串 × 15 詞 | *JEP: Learning, Memory, and Cognition* | **直覺**：沒有人在外部誤導我，我就不會有假記憶。**結論**：自由回憶誤記率約 **40–55%**（依清單而異），再認誤判率可達 **80% 以上**，且受試者對假記憶極度自信（「記得」判斷高達約 72%）——**假記憶不需要外部誤導，光靠語意激活就能產生** | ch07 |\n| **Brainerd et al. (2011)**「Developmental Reversals in False Memory」——55 個 DRM 實驗統合 | *Current Directions in Psychological Science* | **直覺**：成長讓人更能抵抗假記憶。**結論**：成人假記憶率**反而高於兒童**（發展逆轉），55 個 DRM 實驗中 53 個複製——因為成人語意基模更發達，要旨激活更強，假記憶更容易被「要旨滋生」 | ch07 |\n\n---\n\n#### 1-6　海馬迴與系統鞏固\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Scoville & Milner (1957)**「Loss of recent memory after bilateral hippocampal lesions」 | *J. Neurology, Neurosurgery & Psychiatry*, 20(1), 11–21 | **直覺**：記憶是單一整體系統。**結論**：HM（亨利·莫萊森，手術年齡 27 歲）切除雙側內側顳葉後，**嚴重順行性失憶**（新陳述記憶形不成），但**程序記憶保留**（鏡像描繪一次比一次好卻不記得練過）——記憶至少有兩個可分離的系統，**海馬迴是新陳述記憶形成的必要節點** | ch08 |\n| **Annese et al. (2014)**「Postmortem examination of patient H.M.'s brain based on histological sectioning and digital 3D reconstruction」| *Nature Communications* | **直覺**：HM 的切除範圍就是 Scoville 當年描述的。**結論**：3D 重建（2,401 切片）顯示實際切除與原始描述有出入：**後側海馬迴有約 2 立方公分殘留**，內嗅皮質大部分被移除——教科書推論的解剖地基比想像中鬆 | ch08 |\n| **Nadel & Moscovitch：多重痕跡理論（multiple trace theory）**（提出於 1997 年後系列論文，此為理論框架而非單篇） | 系列論文 | **直覺**（標準鞏固模型）：系統鞏固完成後，長期記憶完全脫離海馬迴。**結論**（爭議中）：生動情節記憶可能**永遠需要海馬迴**參與提取，每次重新提取都留下新痕跡；神經影像偏向此說，神經心理數據未定論（🔶 unsettled） | ch08 |\n\n---\n\n#### 1-7　再鞏固（reconsolidation）\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Nader, Schafe & LeDoux (2000)**「Fear memories require protein synthesis in the amygdala for reconsolidation after retrieval」 | *Nature* | **直覺**：記憶一旦鞏固就永久穩定。**結論**：大鼠杏仁核恐懼記憶被**提取後**，注射蛋白質合成抑制劑 **anisomycin（茴香黴素，非 propranolol）** 可破壞再鞏固使記憶消失；**不提取就注藥則記憶完好**——「提取打開了改寫窗口」 | ch09 |\n| **Brunet et al. (2008)**（propranolol 搭配提取的 PTSD 人體研究線） | 期刊論文系列（起始 *Journal of Psychiatric Research*） | **直覺**：動物再鞏固機制可直接翻譯成人體療法。**結論**（🔶 爭議）：部分試驗報告 propranolol 搭配提取可緩解 PTSD；**2022 年否定 meta-analysis 結論：propranolol 相對 placebo 無顯著效果**；連機制是「再鞏固破壞」還是「消退增強」都未定論——**動物現象穩、人體強療法不穩** | ch09 |\n\n---\n\n#### 1-8　閃光燈記憶與鮮明 ≠ 正確\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Brown & Kulik (1977)**「Flashbulb memories」——提出 flashbulb memory 概念 | *Cognition* | **提出假說**：重大情緒事件觸發「特殊高保真刻錄機制」，閃光燈記憶又鮮明又準。（此假說為後續研究所挑戰） | ch10 |\n| **Neisser & Harsch (1992)**「Phantom flashbulbs: False recollections of hearing the news about Challenger」——n=106，約 32 個月後 44 人重測 | 收於 *Affect and Accuracy in Recall*, Cambridge | **直覺**：重大事件當下的「閃光燈記憶」因情緒而格外準確。**結論**：事發次日 106 人問卷、約 2.5–3 年後 44 人重答，記憶嚴重失真——**高度自信但低準確**；自信與準確**脫鉤** | ch10 |\n| **Hirst, Phelps et al. (2015)**「A Ten-Year Follow-Up of a Study of Memory for the Attack of September 11, 2001」——7 城市逾 3,000 人，十年追蹤 | *JEP: General* | **直覺**：重大切身事件（舉國創傷）應讓閃光燈記憶特別準。**結論**：一致性第一年快速下降（第一年後約 63% 一致），之後趨緩（約 4.5%/年）；**自信十年維持高檔**；情緒強度**不預測**一致性——Neisser 結論在數千人尺度重演 | ch10 |\n\n---\n\n#### 1-9　情緒、壓力與杏仁核\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Cahill & McGaugh (1994)**「β-Adrenergic activation and memory for emotional events」| *Nature* | **直覺**：情緒讓整體記憶更準，是泛泛的「更專心」。**結論**：propranolol（β-腎上腺素阻斷劑）**選擇性損害情緒版本的記憶、完全不影響中性版本**——情緒記憶優勢有**特定的可阻斷生化路徑**（β-腎上腺素 → 杏仁核 → 海馬迴鞏固上調） | ch11 |\n| **McGaugh, Cahill & Roozendaal（PNAS 1996 及系列論文）**——大鼠杏仁核毀損阻斷荷爾蒙記憶增強 | *PNAS* 等 | **直覺**：杏仁核儲存恐懼／情緒記憶。**結論**：杏仁核**不是儲存體**，而是**調節其他腦區（主要是海馬迴）鞏固強度**的樞紐（記憶調節假說）；毀損杏仁核或其輸出路徑，荷爾蒙就增強不了記憶 | ch11 |\n\n---\n\n#### 1-10　來源監控\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Johnson, Hashtroudi & Lindsay (1993)**「Source monitoring」| *Psychological Bulletin* | **直覺**：記憶自帶「來源標籤」（親眼看 / 聽說 / 想像）。**結論**：記憶**不附帶 provenance**，來源是每次提取時根據記憶特徵（生動度、認知運作痕跡）**現推**出來的 metadata，因此可以推錯（**來源監控框架**，統一解釋 DRM、誤導訊息、想像膨脹等假記憶現象） | ch13 |\n\n---\n\n#### 1-11　目擊證詞與記憶社會傳染\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Innocence Project 累積資料**（涵蓋 1989–2020 DNA 平反案，約 375 人，2026-06） | Innocence Project 公開資料 | **直覺**：確鑿的目擊指認是強有力的法庭證據。**結論**：在以 DNA 證據推翻的冤案中，**約 69%** 涉及目擊者誤認——**目擊誤認是這批冤案中最常見的單一貢獻因素** | ch12 |\n| **Roediger, Meade & Bergman (2001)**「Social contagion of memory」——暗樁實驗 | *Psychonomic Bulletin & Review* | **直覺**：兩名目擊者說法一致代表互相佐證、更可信。**結論**：真受試者與暗樁共同回憶後，暗樁報出的**不存在物品**被真受試者「記得」的比率顯著提高——記憶錯誤可在共同回憶中**社會傳染**（memory conformity）；「一致」可能只是同步了一份被污染的版本 | ch12 |\n\n---\n\n#### 1-12　HSAM 超憶症\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Parker, Cahill & McGaugh (2006)**「A Case of Unusual Autobiographical Remembering」——第一個 HSAM 案例「AJ」（吉兒·普萊斯）| *Neurocase* | **直覺**（當時）：這種記憶能力是傳說，不是真實存在的。**結論**：確認第一個超憶症案例（hyperthymesia）——AJ 能精確回憶生命中任意一天，經日記交叉驗證 | ch14 |\n| **LePort et al. (2012)**「Behavioral and neuroanatomical investigation of Highly Superior Autobiographical Memory (HSAM)」 | *Neurobiology of Learning and Memory* | **直覺**：HSAM 者是「萬能記憶超人」。**結論**：HSAM 者在死記（rote）及標準實驗室任務上**不優於常人**；超群能力嚴格侷限在自傳式日期事件這一狹窄領域；正式命名 **HSAM** | ch14 |\n| **Patihis, Frenda, LePort, McGaugh, Loftus et al. (2013)**「False memories in highly superior autobiographical memory individuals」| *PNAS* | **直覺**：記憶能力頂尖的人可以抵抗假記憶植入。**結論**：HSAM 者在 DRM 任務的誤記率**與對照組相當**；在誤導訊息任務上整體不低於對照組，部分測量甚至更高——**連記憶的「上限人類」都照樣被植入假記憶**，重建是記憶系統的本質，不是個人缺陷 | ch14 |\n\n---\n\n#### 1-13　記憶宮殿與間隔 / 測試效應\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Dresler et al. (2017)**「Mnemonic training reshapes brain networks to support superior memory」——n=51，6 週位置記憶法訓練 | *Neuron* | **直覺**：記憶宮殿是天才才用得了的先天才能。**結論**：普通人六週訓練（40 場 × 30 分鐘）後記憶廣度從平均回憶 26 詞提升到 62 詞，腦功能連結模式向世界頂尖記憶運動員靠攏，且四個月後**不繼續訓練仍持續**——位置記憶法**可訓練、效果持久** | ch14, ch15 |\n| **Roediger & Karpicke (2006)**「Test-Enhanced Learning: Taking Memory Tests Improves Long-Term Retention」 | *Psychological Science* | **直覺**：重讀材料比「考自己」更能學好，因為流暢。**結論**：一週後延遲測驗，「讀一次再測三次（STTT）」大幅優於「重讀四次（SSSS）」；即時測驗 SSSS 最好（熱快取效應），但延遲測驗**提取練習勝出**——測試效應（testing effect）穩固成立 | ch15 |\n| **Rowland (2014)**「The effect of testing versus restudy on retention」——159 項研究 meta-analysis | *Psychological Bulletin* | **直覺**：測試效應只是小樣本偶然現象。**結論**：g=0.50，81% 的比較提取練習勝過重讀；初次提取**成功率 >75% 時效應更強** | ch15 |\n\n---\n\n#### 1-14　模糊痕跡理論（補充理論框架）\n\n| 研究 | 期刊／出處 | 推翻什麼直覺 / 留下什麼結論 | 對應章 |\n|---|---|---|---|\n| **Brainerd & Reyna（Fuzzy-Trace Theory，1990 年代起系列論文）** | *Psychological Review* 等 | **直覺**：記憶是單一表徵，逐字細節和意義一起存。**結論**：記憶同時編碼**逐字痕跡（verbatim）**與**要旨痕跡（gist）**；逐字衰減比要旨快，「提取時用要旨重建逐字」是假記憶的機制基礎；要旨滋生的假記憶（如 DRM 誘餌）比真記憶**更耐久**（發展逆轉） | ch02, ch07 |\n\n---\n\n## 二、關鍵人物速查\n\n| 中譯（原文，生卒年） | 一句話貢獻 | 對應章 |\n|---|---|---|\n| **艾賓浩斯（Hermann Ebbinghaus, 1850–1909）** | 以自身為唯一受試者發明無意義音節與節省法，1885 年量化出人類歷史第一條遺忘曲線（先快後慢），把記憶從哲學帶進實驗科學 | ch03 |\n| **巴特利特（Frederic Bartlett, 1886–1969）** | 1932 年提出記憶的重建論（reconstructive memory）與基模（schema）概念；War of the Ghosts 示範大腦用文化基模補洞造成扭曲，核心洞見成立但原始實驗方法鬆散 | ch04 |\n| **高爾德（Alan Gauld）＋史蒂芬森（G. M. Stephenson）** | 1967 年概念性複製巴特利特實驗，發現只要「明確要求準確」扭曲就大幅縮小，証明巴特利特原始設計混入了「禮貌填空」而非純記憶重建 | ch04 |\n| **蘿芙托斯（Elizabeth Loftus, 1944–）** | 誤導訊息效應（Loftus & Palmer 1974）、lost-in-the-mall 假記憶植入（Loftus & Pickrell 1995）、記憶戰爭核心人物；確立「事後措辭與暗示可污染及植入記憶」的實驗基礎 | ch05, ch06, ch12, ch14 |\n| **帕爾默（John Palmer）** | Loftus & Palmer 1974 共同作者，碎玻璃實驗（smashed 32% vs hit 14%）共同設計者 | ch05 |\n| **皮克瑞爾（Jacqueline Pickrell）** | Loftus & Pickrell 1995 共同作者，lost-in-the-mall 原始研究（n=24，約 25% 植入）執行者 | ch06 |\n| **加里（Maryanne Garry）** | Garry, Manning, Loftus & Sherman 1996 想像膨脹實驗共同作者；2001 年回應回歸均值批評，証明想像膨脹升幅超過統計偽像 | ch06 |\n| **麥克洛斯基（Michael McCloskey）** | 1985 年改良誤導訊息測試設計，提出「no-impairment（無損害）」立場，挑戰 Loftus 的「覆寫」詮釋；爭論至今未定論 | ch05, ch13 |\n| **迪斯（James Deese, 生卒不詳）** | 1959 年首次觀察到語意聯想詞表產生的未出現詞誤記現象（DRM 的 D），成果沉寂三十年後被 Roediger & McDermott 復活 | ch07 |\n| **羅迪格（Henry \"Roddy\" Roediger III）** | DRM 典範（Roediger & McDermott 1995）共同創立者；測試效應現代引爆點（Roediger & Karpicke 2006）共同作者；記憶社會傳染（Roediger, Meade & Bergman 2001）的核心貢獻者 | ch07, ch12, ch15 |\n| **麥克德莫特（Kathleen McDermott）** | Roediger & McDermott 1995 DRM 典範共同作者 | ch07 |\n| **布雷納德（Charles Brainerd）＋蕾娜（Valerie Reyna）** | 模糊痕跡理論（Fuzzy-Trace Theory）提出者，解釋逐字 vs 要旨雙重編碼、假記憶更耐久（發展逆轉）的機制 | ch02, ch07 |\n| **莫萊森（Henry Molaison, HM, 1926–2008）** | 因癲癇手術（1953 年，27 歲，史科維爾施術）切除雙側內側顳葉後嚴重順行性失憶，但程序記憶保留（鏡像描繪進步卻不記得練過）；是「記憶多重可分離系統」與「海馬迴必要性」最關鍵的單一案例，身份 2009 年才公開 | ch08 |\n| **史科維爾（William Scoville）** | 1953 年為 HM 施行雙側內側顳葉切除術；Scoville & Milner 1957 共同作者 | ch08 |\n| **米爾納（Brenda Milner, 1918–）** | Scoville & Milner 1957 共同作者；為 HM 設計行為測試，從鏡像描繪發現程序記憶保留，第一次分離「陳述 vs 程序記憶」 | ch08 |\n| **圖爾文（Endel Tulving, 生卒年略）** | 編碼特定性原則（encoding specificity principle，Tulving & Thomson 1973）提出者；確立「提取線索須在編碼時在場才有效」——「忘了」不等於資料不見，可能只是線索不對 | ch02 |\n| **納德（Karim Nader）** | Nader, Schafe & LeDoux 2000 共同第一作者，用大鼠杏仁核恐懼記憶加 anisomycin 實驗把再鞏固從邊緣假說變成主流現象 | ch09 |\n| **沙菲（Glenn Schafe）** | Nader, Schafe & LeDoux 2000 共同作者 | ch09 |\n| **勒杜（Joseph LeDoux, 1949–）** | Nader, Schafe & LeDoux 2000 共同通訊作者；恐懼記憶與杏仁核研究的核心實驗室負責人 | ch09 |\n| **布魯內（Alain Brunet）** | 2008 年起用 propranolol 搭配創傷記憶提取進行人體 PTSD 再鞏固療法研究；結果至今有爭議（2022 否定 meta-analysis） | ch09 |\n| **奈瑟（Ulric Neisser, 1928–2012）** | 提倡記憶研究的「生態效度」；Neisser & Harsch 1992 挑戰者號研究以「原始問卷 vs 2.5 年後重測」的 ground truth 對比，第一次嚴格証明閃光燈記憶**自信與準確脫鉤** | ch10 |\n| **哈許（Nicole Harsch）** | Neisser & Harsch 1992 共同作者 | ch10 |\n| **赫斯特（William Hirst）** | 9/11 十年追蹤研究（Hirst, Phelps et al. 2015）牽頭者；7 城市逾 3,000 人規模複製並強化 Neisser 的「鮮明 ≠ 準確」結論 | ch10, ch11 |\n| **費爾普斯（Elizabeth Phelps）** | Hirst & Phelps 9/11 研究共同核心作者；情緒與記憶研究者 | ch10, ch11 |\n| **麥高夫（James McGaugh, 1931–）** | 記憶調節假說（memory modulation hypothesis）核心建立者；数十年大鼠研究確認杏仁核是情緒鞏固的調節樞紐而非儲存體；2006 年與 Parker、Cahill 報告第一個 HSAM 案例「AJ」（吉兒·普萊斯） | ch11, ch14 |\n| **卡希爾（Larry Cahill）** | Cahill & McGaugh 1994（*Nature*）共同作者；首次以 propranolol 實驗証明情緒記憶優勢有可阻斷的生化路徑；Parker, Cahill & McGaugh 2006 第一個 HSAM 案例報告共同作者 | ch11, ch14 |\n| **強生（Marcia Johnson）** | Johnson, Hashtroudi & Lindsay 1993 來源監控框架（source monitoring framework）提出者；確立「記憶無 provenance、來源是現推的 metadata」這一統一解釋 | ch13 |\n| **普萊斯（Jill Price，案例代號「AJ」）** | 第一個被正式報告的 HSAM 案例（McGaugh 等人 2006 年報告，生前代號 AJ）；死記能力並不優於常人、學業成績普通，示範 HSAM 嚴格侷限於自傳式領域 | ch14 |\n| **勒波特（Aurora LePort）** | LePort et al. 2012 正式命名 HSAM 的行為神經解剖研究第一作者；Patihis et al. 2013 HSAM 假記憶研究共同作者 | ch14 |\n| **帕提希斯（Lawrence Patihis）** | Patihis et al. 2013 PNAS 第一作者；設計 DRM ＋ 誤導訊息測試，証明 HSAM 者照樣被植入假記憶——脊椎「重建是本質」的實驗化身 | ch14 |\n| **卡皮克（Jeffrey Karpicke）** | Roediger & Karpicke 2006 共同作者；測試效應（retrieval practice）現代研究核心人物 | ch15 |\n| **德雷斯勒（Martin Dresler）** | Dresler et al. 2017 Neuron 第一作者，以 RCT 設計証明六週位置記憶法訓練可大幅提升普通人記憶廣度且效果持久 | ch14, ch15 |\n| **羅蘭（Rowland）** | Rowland 2014 Psychological Bulletin meta-analysis（159 研究），量化測試效應 g=0.50、81% 研究提取練習勝出，並指出「初次提取成功率 >75% 效應更強」 | ch15 |\n| **賽門斯（Daniel Simons）＋查布里斯（Christopher Chabris）** | Simons & Chabris 2011 全美調查（n=1,838），記錄「大眾 63% 認為記憶像攝影機、記憶專家 0/16 同意」的巨大落差 | ch01 |\n| **穆雷（Jacobus Murre）＋德羅斯（Joeri Dros）** | Murre & Dros 2015 PLOS ONE，以單名受試者（約 70 小時）複製艾賓浩斯遺忘曲線；發現 24 小時小上揚可能與睡眠鞏固有關 | ch03 |\n\n---\n\n## 三、快速對照：脊椎六條主線與關鍵研究\n\n| 主線 | 核心研究 | 對應章 |\n|---|---|---|\n| **1. 提取即重寫（「read 觸發 write」）** | Nader, Schafe & LeDoux 2000（再鞏固）；Neisser & Harsch 1992（閃光燈每次回憶都改寫） | ch09, ch10 |\n| **2. Schema 與誤導訊息污染** | Bartlett 1932；Loftus & Palmer 1974；McCloskey & Zaragoza 1985 | ch04, ch05 |\n| **3. 假記憶可被植入的證據與限度** | Loftus & Pickrell 1995；Murphy et al. 2023；Garry et al. 1996；Roediger & McDermott 1995 DRM | ch06, ch07 |\n| **4. 系統鞏固 ＋ 再鞏固的神經機制** | Scoville & Milner 1957（HM）；Nader et al. 2000；Brunet et al. 2008（🔶 爭議） | ch08, ch09 |\n| **5. 鮮明 ≠ 正確（閃光燈記憶的背叛）** | Neisser & Harsch 1992；Hirst, Phelps et al. 2015；Cahill & McGaugh 1994 | ch10, ch11 |\n| **6. 記憶可錯性在法庭與日常的後果與防禦** | Innocence Project 累積資料（約 69%）；Roediger 2001 記憶社會傳染；記憶戰爭（🔶 unsettled） | ch12, ch13 |\n\n---\n\n> **使用提醒**：數字精確值（如 n=24、n=150、32%、14%、約 25%、約 35%、106 人 → 44 人）一律以本附錄列出的版本為準，不得四捨五入成圓整數。標注 🔶 者為 unsettled debate，複述時須雙方並陳。標注 ⚠️ 者建議用「約」「據報」等 hedge。\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> **本附錄的用途**：彙整全書 16 章「延伸閱讀」段落已列出的資源，加上 landscape-2026-06.md 驗證過的補充，組織成三條主線路線圖，方便你決定讀完書之後往哪裡走。\n>\n> 收錄標準：landscape 或各章已驗證的連結直接列出；沒把握的標「（未驗證）」，絕不放編造連結。\n\n---\n\n## 三條路線的選擇指南\n\n| 你接下來想做什麼 | 走哪條路線 |\n|---|---|\n| 想把機制弄清楚、看神經科學原典 | **路線 A：機制與神經科學** |\n| 想把記憶可錯性連到真實世界後果 | **路線 B：應用、法律與倫理** |\n| 想把好的記憶策略做起來 | **路線 C：學習科學與策略** |\n\n---\n\n## 路線 A：機制與神經科學\n\n依閱讀難度排序（入門 → 進階）。\n\n### A1 — 最佳入門科普書\n\n**Daniel Schacter（丹尼爾·沙克特），*The Seven Sins of Memory*（《記憶七罪》）**（2001）\n\n重建論最好讀的科普入門，把記憶的七種系統性出錯方式整理成一個框架——本書後面的污染、誤導、來源混淆都對應到他的「罪」。從第一章「短暫性（transience）」和「錯認（misattribution）」讀起，正好接回本書的遺忘 vs 重建之分。第三章「Misattribution」對來源監控有出色的科普敘述，含隱記症（cryptomnesia）案例。（landscape 列為附錄 C 候選）\n\n### A2 — 原典精選（按主題）\n\n| 主題 | 論文 | 值得讀什麼 | 連結 / 備註 |\n|---|---|---|---|\n| 基模與重建論 | Bartlett（1932）*Remembering* | 不必通讀，看《鬼魂的戰爭》原文與他對「重建」「schema」的論述——你會發現他比多數二手轉述都更謹慎 | 多處可免費取得（Classics in the History of Psychology）（未驗證版本） |\n| Bartlett 方法學修正 | Gauld & Stephenson（1967）*British Journal of Psychology* | 用一個指示語的操弄讓扭曲大幅縮水，是「結論對、但原始實驗證據弱」的活教材 | 期刊庫可查 |\n| 誤導訊息效應 | Loftus & Palmer（1974）*Journal of Verbal Learning and Verbal Behavior* | 直接讀原文，看兩個實驗設計與那張動詞→mph 表，比任何二手轉述都準；特別看作者自己對「重建」的措辭有多謹慎 | https://resource.download.wjec.co.uk/vtc/2020-21/el20-21_25-4a/wjec/loftus_and_palmer.pdf |\n| DRM 假記憶 | Roediger & McDermott（1995）*JEP: LMC* | 讀方法與結果兩節就夠；感受「沒有外部誤導，光靠語意聯想大腦就腦補了一個沒出現的詞」 | http://psychnet.wustl.edu/memory/wp-content/uploads/2018/04/Roediger-McDermott-1995_JEPLMC.pdf |\n| HM 與海馬迴 | Scoville & Milner（1957）*J. Neurol. Neurosurg. Psychiatry* | 從一個病人的損傷，第一次把海馬迴與新記憶的形成綁在一起；注意 n=1 的謹慎措辭 | https://www.cns.nyu.edu/~wendy/class/2006sp/reading1/Scoville_Milner1957.pdf |\n| HM 腦的死後重建 | Annese et al.（2014）*Nature Communications* | 半世紀的解剖描述被修正；是「連經典案例都要被更精密方法重檢」的方法學課 | https://www.nature.com/articles/ncomms4122 |\n| 再鞏固 | Nader, Schafe & LeDoux（2000）*Nature* | 讀 2×2 設計與約 6 小時時間窗；感受原文比任何科普都克制，從不說「我們能抹除記憶」 | https://www.nature.com/articles/35021052 |\n| 再鞏固（前傳） | Misanin, Miller & Lewis（1968）*Science* | 被埋了三十年的先驅；看「提取＋干擾毀掉已鞏固記憶」這個對照設計 | https://www.science.org/doi/10.1126/science.160.3827.554 |\n| 閃光燈記憶 | Neisser & Harsch（1992），收於 *Affect and Accuracy in Recall* | 看「宗教課 vs 宿舍電視」的逐字案例與七題比對表；特別注意如何把「自信」和「準確」當兩個變數分開報告 | https://www.cns.nyu.edu/~wendy/class/2006sp/reading1/ |\n| 閃光燈記憶（大型長期） | Hirst et al.（2015）*JEP: General* | 讀「一致性第一年快降後趨緩」「自信十年穩定」「情緒強度不預測一致性」三個結論的原始數據 | https://www.memlab.psychol.cam.ac.uk/pubs/Hirst2015%20JEPG.pdf |\n| 來源監控框架 | Johnson, Hashtroudi & Lindsay（1993）*Psychological Bulletin* | 框架如何把記憶多種錯誤收進同一解釋架構；讀摘要與引言部分 | https://pubmed.ncbi.nlm.nih.gov/8346328/ |\n| HSAM 命名研究 | LePort et al.（2012）*Neurobiology of Learning and Memory* | HSAM 命名論文；含行為測試與神經解剖比較的完整數據 | https://www.sciencedirect.com/science/article/abs/pii/S1074742712000706 |\n| HSAM 也會假記憶 | Patihis et al.（2013）*PNAS* | 本書脊椎最強單一證據：連「記得每一天」的人也照樣被植入假記憶；讀結果與討論兩節就夠 | https://www.pnas.org/doi/10.1073/pnas.1314373110 |\n| 情緒與杏仁核 | Cahill & McGaugh（1994）*Nature* | 用 propranolol 選擇性消掉情緒記憶優勢，是「情緒記憶有專屬生化路徑」最乾淨的人體證據 | https://www.nature.com/articles/371702a0 |\n\n### A3 — 機制爭議（進階）\n\n再鞏固臨床療效是全書最大的 unsettled debate，以下兩篇代表相反結論，一起讀能親眼看到爭議長什麼樣：\n\n- **「無效」方**：Updated and rectified meta-analysis shows no effect of propranolol versus placebo on traumatic memory reconsolidation disruption（2022）  \n  PMC: https://pmc.ncbi.nlm.nih.gov/articles/PMC9640173/ ；PubMed: https://pubmed.ncbi.nlm.nih.gov/36130812/\n\n- **「有效」方**：Pigeon, Lonergan, Rotondo, Pitman & Brunet（2022），*Journal of Psychiatry and Neuroscience*  \n  https://cdnsciencepub.com/doi/full/10.1503/jpn.210057\n\n- **機制辨析**：「Revisiting propranolol and PTSD: Memory erasure or extinction enhancement?」（把「破壞再鞏固 vs 增強消退」難分的問題講透）  \n  PMC: https://pmc.ncbi.nlm.nih.gov/articles/PMC4818733/\n\n「邊界條件」（prediction error 才觸發再鞏固）：「The fate of memory: Reconsolidation and the case of Prediction Error」（2016）  \nPubMed: https://pubmed.ncbi.nlm.nih.gov/27287939/\n\n### A4 — 免費開放教材\n\n- **Noba Project「Memory (Encoding, Storage, Retrieval)」**（nobaproject.com）——免費大學級教材，三關卡講得最乾淨的入門之一；讀「編碼特定性」與「可得 vs 可取」兩段。\n- **Andrade & Walker, *Cognitive Psychology*（LibreTexts）「Reconstruction of Memories」**  \n  https://socialsci.libretexts.org/Bookshelves/Psychology/Cognitive_Psychology/Cognitive_Psychology_(Andrade_and_Walker)/05%3A_Working_Memory/5.07%3A_Reconstruction_of_Memories\n\n---\n\n## 路線 B：應用、法律與倫理\n\n### B1 — 目擊證詞與誤判\n\n| 資源 | 值得讀什麼 |\n|---|---|\n| **Innocence Project「Eyewitness Misidentification」**  https://innocenceproject.org/eyewitness-misidentification/ | 把機制結論轉換成有人名有年份的真實案子；數字每年更新，看最新版；同時拆解誤認的指認程序類型與跨種族比例 |\n| **Wells & Bradfield（1998）*Journal of Applied Psychology*** | 確認回饋效應原始論文；設計乾淨——正確答案不在照片裡，所有指認都是錯的，卻仍被回饋抬高信心 |\n| **Wixted & Wells（2017）*Psychological Science in the Public Interest*** | 「初次乾淨信心有校準、出庭信心失準」的精修版，含「pristine conditions」五條建議 |\n\n### B2 — 記憶戰爭（unsettled debate，雙方並陳）\n\n以下兩篇立場不完全一致，一起讀才能感受爭議仍在進行中。**不要把任何一篇當作「科學定論」讀。**\n\n- Psychiatric Times「Ground Lost: The False Memory/Recovered Memory Therapy Debate」  \n  https://www.psychiatrictimes.com/view/ground-lost-false-memoryrecovered-memory-therapy-debate\n\n- Frontiers in Psychology（2023）「Recovered memories of trauma…」  \n  https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2023.1268757/full\n\n- National Geographic「And the Memory Wars Wage On」  \n  https://www.nationalgeographic.com/science/article/and-the-memory-wars-wage-on （landscape §十三驗證，標時效性）\n\n### B3 — 植入假記憶的邊界\n\n- **Murphy et al.（2023）lost-in-the-mall 預先註冊複製**，*Memory* 31(6)  \n  PubMed: https://pubmed.ncbi.nlm.nih.gov/37017540/  \n  （n=123，約 35%；告訴你為什麼「2023 年後說 lost-in-the-mall 是孤證」已不成立）\n\n- **Andrews（2024）*Applied Cognitive Psychology*「Lost in the Mall? Interrogating Judgements of False Memory」**  \n  https://onlinelibrary.wiley.com/doi/10.1002/acp.70012\n\n- **Wade（2025）「Still Lost in the Mall—False Memories Happen and That's What Matters」**  \n  https://wrap.warwick.ac.uk/id/eprint/189197/  \n  （Andrews 與 Wade 的往返——判準之辯，讀它你會明白為什麼「確切比率仍在精修」是誠實的講法）\n\n### B4 — 科普影片\n\n**Elizabeth Loftus（蘿芙托斯）TED Talk「How reliable is your memory?」**  \n蘿芙托斯本人講植入研究與法庭應用，20 分鐘濃縮，含她對「記憶可塑 vs 不是一切都假」如何拿捏的立場。看完再讀 ch05/ch06 會更有感。（landscape 列為附錄 C 候選；連結搜 TED.com「Elizabeth Loftus」即可，未驗證精確 URL）\n\n### B5 — 大眾信念調查\n\n**Simons & Chabris（2011）「What People Believe about How Memory Works」*PLOS ONE***  \nhttps://journals.plos.org/plosone/article?id=10.1371/journal.pone.0022757  \n「63% 的人認為記憶像攝影機、而 16 位專家 0 人同意」的調查原始論文；看「大眾預設 vs 專家共識」的落差有多大。開放取用。\n\n---\n\n## 路線 C：學習科學與策略\n\n### C1 — 測試效應（retrieval practice）\n\n| 資源 | 值得讀什麼 |\n|---|---|\n| **Roediger & Karpicke（2006）*Psychological Science***（現代引爆點） | 看「重讀三次 vs 測試一次」在延遲測驗上的差距圖；設計清楚、易讀 |\n| **Rowland（2014）*Psychological Bulletin*，140(6)** | 159 個研究的 meta，g=0.50 的整體效應量與調節變數（初次提取成功率 >75% 效應更強）；有數字支撐時查閱。（landscape §十二驗證） |\n| **Roediger & Karpicke 研究概覽（PMC）** | https://pmc.ncbi.nlm.nih.gov/articles/PMC3983480/ |\n\n### C2 — 間隔效應（spacing effect）\n\n**Bowen et al.（2024）「Single-paper meta-analyses of the effects of spaced retrieval practice in nine introductory STEM courses」*International Journal of STEM Education***  \nhttps://link.springer.com/article/10.1186/s40594-024-00468-5  \n對教室落地效果的誠實評估：效應存在但比實驗室小、依設計而異；讀「半杯水 vs 半杯水」的討論方式。（landscape §十二驗證，2026-06）\n\n### C3 — 記憶宮殿（method of loci）\n\n| 資源 | 值得讀什麼 |\n|---|---|\n| **Dresler et al.（2017）*Neuron*，93(5)** | 六週訓練讓普通人記憶廣度從 26 詞到 62 詞；重點是訓練效應圖與「腦連結模式向記憶運動員靠攏」。ResearchGate 摘要：https://www.researchgate.net/publication/389335559 |\n| **Ondřej et al.（2025）*British Journal of Psychology*** | 最新系統性回顧與 meta-analysis（d≈0.88，BF=161.94）；同時誠實標出研究偏誤風險。PubMed ID: 40457944；連結：https://bpspsychub.onlinelibrary.wiley.com/doi/full/10.1111/bjop.12799 （landscape §十驗證，2026-06） |\n\n### C4 — 合意困難（desirable difficulties）\n\n**Bjork & Bjork（2011）「Making Things Hard on Yourself, But in a Good Way」**  \nBjork Lab 網站可取得（bjorklab.psych.ucla.edu）（未驗證精確 URL）。解釋為什麼讓學習困難的操作反而讓保留更好；是間隔效應與測試效應背後的統一框架。\n\n### C5 — HSAM 的另一面（策略視角）\n\n**2025 年 *Neuropsychology Review* HSAM 系統性回顧**  \nhttps://pmc.ncbi.nlm.nih.gov/articles/PMC11965258/  \n整理了 20 項 HSAM 實驗研究，含量化描述（98% 準確率、1.8 秒提取延遲）；搭配路線 A 的 Patihis et al. 2013 一起讀——「超群的只是自傳式窄域，且同樣會被植入假記憶」是反直覺但很穩的結論。\n\n### C6 — 遺忘曲線的複製\n\n**Murre & Dros（2015）*PLOS ONE***  \nhttps://journals.plos.org/plosone/article?id=10.1371/journal.pone.0120644  \n一條 1885 年的 n=1 結果如何在 130 年後被一個人花 70 小時重做出來；讀曲線圖與「24 小時小上揚」那段，是 Ebbinghaus 方法勇氣的最好紀念。（landscape §八驗證）\n\n---\n\n## 如果只選三樣\n\n> 時間只夠讀三個東西，就讀這三個——它們加起來能讓你用自己的話把全書脊椎講給另一個工程師聽。\n\n1. **Patihis et al.（2013）*PNAS*「False memories in highly superior autobiographical memory individuals」**  \n   https://www.pnas.org/doi/10.1073/pnas.1314373110  \n   全書脊椎最強的單一實驗：連「記得每一天」的人，在 DRM 和誤導訊息測驗裡都照樣被植入假記憶。脊椎那句話的實驗化身——「這段記憶是被讀出來的，還是被重建（並在這次回憶中被改寫）的？」就算你是天花板等級的記憶者，答案一樣是：重建的。\n\n2. **Innocence Project「Eyewitness Misidentification」**  \n   https://innocenceproject.org/eyewitness-misidentification/  \n   把所有機制後果轉換成有人名、有年份、有庭審記錄的真實案子。最有效的解藥——對付「記憶重建是理論問題」這個舒適感。數字每年更新，下次去記得重讀。\n\n3. **Neisser & Harsch（1992）挑戰者號原始研究** 或 **Hirst et al.（2015）9/11 十年追蹤**（選一篇）  \n   前者：https://www.cns.nyu.edu/~wendy/class/2006sp/reading1/  \n   後者：https://www.memlab.psychol.cam.ac.uk/pubs/Hirst2015%20JEPG.pdf  \n   直接看「自信分數 vs 準確分數」的脫鉤數據。把「情緒讓記憶更準」這個迷思根除最直接的材料。兩篇都讀更好；只選一篇的話，如果你喜歡小樣本精細設計讀 Neisser，如果你喜歡大規模長期追蹤讀 Hirst。\n\n---\n\n## 各章延伸閱讀快速索引\n\n| 章節 | 核心主題 | 本附錄對應段落 |\n|---|---|---|\n| ch01 — 記憶不是錄影帶 | 脊椎、大眾信念 | A4（Noba）、B4（Loftus TED）、B5（Simons & Chabris 2011） |\n| ch02 — 編碼／儲存／提取三關卡 | 三關卡、gist/verbatim | A4（LibreTexts）、A2（Bartlett revisited） |\n| ch03 — 遺忘是特性 | 遺忘曲線、干擾 | C6（Murre & Dros 2015） |\n| ch04 — 基模與重建（Bartlett） | 重建論、schema | A1（Schacter）、A2（Bartlett、Gauld & Stephenson） |\n| ch05 — 誤導訊息效應 | Loftus & Palmer 1974 | A2（原文 PDF）、A3（覆寫 vs 共存） |\n| ch06 — 走失在商場 | lost-in-the-mall、植入 | B3（Murphy 2023、Andrews 2024、Wade 2025） |\n| ch07 — DRM 假記憶 | 語意假記憶、Fuzzy-Trace | A2（Roediger & McDermott 1995） |\n| ch08 — 海馬迴與鞏固 | HM、系統鞏固 | A2（Scoville & Milner 1957、Annese 2014） |\n| ch09 — 再鞏固 | 再鞏固、propranolol 爭議 | A2（Nader 2000）、A3（兩份 meta 爭議） |\n| ch10 — 閃光燈記憶 | 鮮明≠正確 | A2（Neisser & Harsch 1992、Hirst 2015）、如果只選三樣第 3 項 |\n| ch11 — 情緒與杏仁核 | 記憶調節假說 | A2（Cahill & McGaugh 1994） |\n| ch12 — 目擊者與法庭 | 目擊誤認、污染鏈 | B1（Innocence Project、Wells & Bradfield、Wixted & Wells）、如果只選三樣第 2 項 |\n| ch13 — 來源監控 | 來源歸因、隱記症、既視感 | A2（Johnson et al. 1993）、A1（Schacter 第三章） |\n| ch14 — HSAM 與記憶宮殿 | HSAM、記憶術 | A2（Patihis 2013、LePort 2012）、C3（Dresler 2017、Ondřej 2025）、如果只選三樣第 1 項 |\n| ch15 — 記得更好 | 測試效應、間隔效應 | C1（Roediger & Karpicke、Rowland）、C2（Bowen 2024）、C4（Bjork） |\n| ch16 — 終章 | 全書脊椎 | 如果只選三樣（三項全部） |\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "記憶作為重建：事實基準（2026-06 查證）", "md": "---\nlast_verified: 2026-06-20\nreview_after_days: 365\nstatus: research-agent-draft\nsource: web research 2026-06-20\nbook_id: mem\n---\n\n# 記憶作為重建：事實基準（2026-06 查證）\n\n本檔是本書《大腦怎麼編造過去：記憶作為重建的科學》全書「實驗細節、人物、年份、樣本數、效應數字、歸屬、引文、近年複製研究與爭議現況」的權威錨點。記憶科學是**活的、仍在爭論的領域**——很多被科普寫成「定論」的事其實是 1970–90 年代的單一研究、樣本數小、或近年複製結果不一。本檔的職責是把這些「軟事實」釘住：人是誰、事在哪一年、樣本多大、數字是多少、目前學界吵到哪。撰章時引用任何實驗、數字、年份、歸屬、引文，請對照本檔，不要憑記憶或憑「教科書都這樣寫」。\n\n使用規約：\n- ✅ = 已確認（≥2 獨立來源，或原始論文／權威回顧）。可直接照寫，但**樣本數與效應量仍要照本檔給的精確值**，不要四捨五入成圓整數。\n- ⚠️ = 單一來源、來源細節不一致、或我無法百分百確認的細節。看到 ⚠️ 請照本檔給的「保守版」寫，並 hedge（「約」「據報」「常被引為」）。\n- ❌ = 通行科普說法**是錯的、被誇大、或嚴重簡化**。本檔給出正確版；這些是全書「直覺的陷阱」段最該守住的彈藥。\n- 🔶 = **有爭議、學界未有共識**。**必須呈現雙方、不替讀者選邊斷言**（這是本書系契約）。\n- 來源優先序：原始論文／權威系統性回顧／meta-analysis > 大學課程頁面／PubMed/PMC > Wikipedia/SimplyPsychology > 一般科普部落格。SimplyPsychology 與 IB 教學頁適合校對「課本版說法」但本身常是簡化版，**數字以原始論文為準**。\n- 人名第一次出現給「中譯（原文，生卒年若關鍵）」；實驗名保留通行英文（DRM、lost-in-the-mall、flashbulb）。\n\n---\n\n## 〇、全書脊椎的事實地位：「記憶不是錄影回放，而是重建」\n\n- ✅ **這是當代記憶科學的主流共識，不是少數派觀點。** 從 Bartlett（1932）的重建論、到 Loftus 的誤導訊息研究、到 Nader 的再鞏固，匯流成「每次提取都可能改寫」的圖像。教科書與當代回顧普遍接受「記憶是建構性的（reconstructive / constructive），不是被動讀取的儲存」。\n- ✅ 脊椎隱喻「每次 read 都觸發一次 write」在機制上對應 **再鞏固（reconsolidation）**（見 §五）：提取使記憶回到不穩定（labile）狀態，需重新穩定，期間可被修改。這是把「重建」從心理學現象連到分子機制的橋——但要注意**再鞏固的臨床應用仍有爭議**（§五），脊椎的「現象層」穩固、「分子層強應用」要 hedge。\n- 🔶 **但「重建」不等於「記憶全不可信／一切都是編造」**——這是過度延伸。多數日常記憶大致準確；重建論說的是記憶**可被污染、且鮮明度與正確度脫鉤**，不是「記憶毫無價值」。寫脊椎時務必同時守住這條防線（見 §九「記憶戰爭」與「直覺的陷阱」彈藥）。\n- 來源：Andrade & Walker「Reconstruction of Memories」（Cognitive Psychology 教科書）https://socialsci.libretexts.org/Bookshelves/Psychology/Cognitive_Psychology/Cognitive_Psychology_(Andrade_and_Walker)/05%3A_Working_Memory/5.07%3A_Reconstruction_of_Memories ；teaching-memory-beliefs 回顧 https://www.tandfonline.com/doi/full/10.1080/09658211.2021.1874994\n\n---\n\n## 一、Bartlett（1932）《Remembering》與 War of the Ghosts、基模（schema）\n\n- ✅ **Frederic Bartlett（巴特利特，1886–1969）1932 年《Remembering: A Study in Experimental and Social Psychology》**。他讓（多為英國劍橋的）受試者反覆回憶一則陌生的美洲原住民民間故事 **\"The War of the Ghosts\"**，發現回憶隨時間扭曲——把陌生細節同化（assimilation）、削平（leveling）、銳化（sharpening）成符合受試者**文化基模（schema，基模）**的版本。「schema」一詞他借自神經學家 Henry Head。\n- ✅ 方法名稱：**serial reproduction（連續再生）**（一人傳一人，像傳話遊戲）與 **repeated reproduction（重複再生）**（同一人多次回憶）。War of the Ghosts 的經典示範主要用 repeated reproduction。**別把兩者混為一談。**\n- ❌🔶 **方法學爭議（本書必須誠實呈現）**：Bartlett 的研究在現代標準下**方法鬆散**——缺乏標準化指示，受試者可能只是在「講個故事」而非「盡力準確回憶」，部分扭曲可能來自猜測或需求特徵（demand characteristics），而非真正的記憶重建。**Gauld & Stephenson（1967）**的概念性複製發現：**只有當受試者沒有被明確要求「力求準確」時**，重複回憶才會累積那麼多錯誤；一旦要求準確，扭曲大幅減少。\n  - hedge 寫法：「Bartlett 的核心洞見——記憶是受基模驅動的重建——被後續研究廣泛支持，但他**1932 年那批具體實驗本身**方法不夠嚴謹，扭曲程度部分取決於指示語。所以我們相信『記憶是重建的』，靠的是後來更嚴格的證據（Loftus、DRM 等），不是只靠 War of the Ghosts 這一個古典示範。」\n- 來源：McGraw Hill「Reconstructive Memory & Schema Theory」https://www.mheducation.ca/blog/series-classic-learning-science-reconstructive-memory-schema-theory/ ；Bartlett revisited（serial vs repeated reproduction 直接比較）https://www.sciencedirect.com/science/article/abs/pii/S2211368114000485\n\n---\n\n## 二、Loftus & Palmer（1974）車禍動詞實驗\n\n通行科普常把「兩個實驗」混成一個，且常把樣本數寫錯。精確版：\n\n- ✅ **Elizabeth Loftus（蘿芙托斯，1944–）與 John Palmer，1974 年〈Reconstruction of Automobile Destruction〉**，*Journal of Verbal Learning and Verbal Behavior*。**兩個獨立實驗。**\n- ✅ **實驗一（速度估計）：45 名學生**。看車禍影片後問「車子 ___ 時速大約多少」，動詞操弄影響速度估計（mph）：\n  - **smashed（猛撞）≈ 40.8、collided（相撞）≈ 39.3、bumped（碰撞）≈ 38.1、hit（撞到）≈ 34.0、contacted（接觸）≈ 31.8**。\n  - ⚠️ 各條 mph 數字在不同二手來源略有 ±0.5 出入；上列是常見引用值，撰章建議寫「約 41 mph vs 約 32 mph」這種**對比幅度**而非死咬小數，最穩。\n- ✅ **實驗二（碎玻璃，broken glass）：150 名學生，分三組各 50 人**（smashed / hit / 無提問的控制組）。一週後問「你有沒有看到碎玻璃？」（影片中**並無**碎玻璃）。\n  - **smashed 組：16/50 = 32% 誤報看到碎玻璃；hit 組：7/50 = 14%；控制組：6/50 = 12%。** ✅ 這組數字（32% vs 14%）相對穩固，是課本標準引用。\n- ✅ 詮釋：一個動詞改寫了「看到」的內容——這是誤導訊息效應（misinformation effect）的早期經典，也是「提問本身會改寫記憶」的乾淨示範。\n- ⚠️ **別過度宣稱**：這是實驗室、影片、學生樣本；它證明「措辭能扭曲記憶報告」，不證明「所有目擊證詞都不可信」。\n- 來源：SimplyPsychology「Loftus and Palmer 1974」https://www.simplypsychology.org/loftus-palmer.html ；WJEC 原文 PDF https://resource.download.wjec.co.uk/vtc/2020-21/el20-21_25-4a/wjec/loftus_and_palmer.pdf\n\n---\n\n## 三、❌【本書高風險數字】Loftus & Pickrell（1995）lost-in-the-mall\n\n科普最常把樣本數與植入率寫成圓整數，且常忽略近年複製拉高了數字。精確版：\n\n- ✅ **Loftus & Jacqueline Pickrell（1995）〈The Formation of False Memories〉**（*Psychiatric Annals*）。手法：用受試者家人提供的真實童年事件，混入**一個假事件**——五歲左右在購物中心走失、哭泣、被一位年長女士幫助、最後與家人團聚——讓受試者「回憶」。\n- ✅ **原始樣本：24 人（University of Washington）。植入率：約 25%（24 人中 6 人）**「記得」這個從未發生的事件（程度不一，有些細節豐富、有些模糊）。\n  - **❌ 常見誤寫**：把樣本寫成「幾十人」「一群人」、把植入率寫成「四分之一到三分之一」「約 30%」甚至「一半」。**正確：n = 24，約 25%（6 人）。** 樣本數小是這個經典研究的真實弱點，本書應誠實點出，而不是把它寫得比它更穩。\n- ✅🔶 **近年複製（必須一起寫，否則會給人「只有一個小研究」的錯印象）**：\n  - **Murphy, Loftus 等人（2023）預先註冊複製**（*Memory*）：**n = 123（原研究的約五倍）**，**約 35% 形成假記憶**（高於原研究的 25%）。即「植入率不但複製成功，還更高」。\n  - 2024–2025 仍有方法學辯論（Andrews, Wade 等）討論「怎麼算才叫『假記憶』vs『只是接受暗示』」、判準是否過寬。**核心效應（可植入完整自傳式假事件）被廣泛接受；精確比率與判準仍在精修。**\n  - hedge 寫法：「原始研究 n=24、約四分之一的人形成假記憶；2023 年五倍樣本的預先註冊複製把這個效應複製出來、比率甚至略高（約三分之一）。所以這不是『一個小研究的孤證』，但**確切比率取決於你怎麼定義「假記憶」**，這點學界仍在辯。」\n- 🔶 **倫理與詮釋爭議**：lost-in-the-mall 被廣泛用於法庭作證（質疑「恢復記憶」療法），批評者認為把實驗室的溫和假事件外推到「童年性虐待記憶可被植入」是過度外推。**呈現雙方**：支持方說機制相同（暗示＋想像＋重複回憶可造假記憶）；批評方說創傷記憶與「商場走失」性質不同、外推有風險。不要替讀者裁決。\n- 來源：原始複製（PubMed）https://pubmed.ncbi.nlm.nih.gov/37017540/ ；「Lost in the Mall? Interrogating Judgements of False Memory」（Andrews 2024）https://onlinelibrary.wiley.com/doi/10.1002/acp.70012 ；「Still Lost in the Mall—False Memories Happen and That's What Matters」（Wade 2025）https://wrap.warwick.ac.uk/id/eprint/189197/\n\n---\n\n## 四、Roediger & McDermott（1995）DRM 典範\n\n- ✅ **Henry \"Roddy\" Roediger III（羅迪格）與 Kathleen McDermott，1995 年**〈Creating False Memories: Remembering Words Not Presented in Lists〉（*JEP: LMC*）。建基於 **James Deese（1959）**的早期發現，故全名 **DRM（Deese–Roediger–McDermott）典範**。\n- ✅ 手法：給受試者看一串語意相關的詞（如 bed, rest, awake, tired, dream, wake, snooze, blanket, doze, …），這些詞全指向一個**未出現的關鍵誘餌詞（critical lure）**「sleep」。受試者常「記得」看過 sleep。\n- ✅ **數字（守住）**：Roediger & McDermott 1995 用 **24 串、每串 15 詞**。對 sleep 這類典型誘餌，**自由回憶的誤記率約 40–55%**（隨清單而異），**再認（recognition）誤判率可達 80% 以上**，且受試者對假記憶的「確定感」很高、甚至報告「記得當時聽到的細節」（remember 判斷）。\n  - ⚠️ 不同二手來源給「60% 以上」或「約 40%」——因為**依清單、依實驗（free recall vs recognition）而不同**。撰章建議寫「對某些清單，超過半數受試者會誤記關鍵詞，再認誤判更高（八成以上）」並注明「依清單而異」，不要咬死單一百分比。\n- ✅ 為什麼重要：它證明假記憶**不需要外部誤導訊息**——光靠語意聯想，大腦自己就會「腦補」一個沒出現的詞，而且主觀上和真記憶一樣鮮明。直接打擊「鮮明＝正確」的直覺。\n- 來源：原始論文 PDF（WUSTL）http://psychnet.wustl.edu/memory/wp-content/uploads/2018/04/Roediger-McDermott-1995_JEPLMC.pdf ；Wikipedia「Deese–Roediger–McDermott paradigm」https://en.wikipedia.org/wiki/Deese%E2%80%93Roediger%E2%80%93McDermott_paradigm\n\n---\n\n## 五、🔶【全書最重要的爭議】Nader, Schafe & LeDoux（2000）再鞏固（reconsolidation）\n\n這條同時是脊椎的分子支柱、也是本書最該守住雙方的爭議。**必查重點：原始藥物是 anisomycin（茴香黴素）不是 propranolol（普萘洛爾）；propranolol 是後來的人體研究，且臨床效果有爭議。**\n\n- ✅ **Karim Nader、Glenn Schafe、Joseph LeDoux（勒杜，1949–），2000 年 *Nature***〈Fear memories require protein synthesis in the amygdala for reconsolidation after retrieval〉。\n- ✅ 物種與藥物：**大鼠（rat）聽覺恐懼制約**；把**蛋白質合成抑制劑 anisomycin（茴香黴素）**注入杏仁核（lateral/basal amygdala, LBA）。\n- ✅ 核心發現：一個**已鞏固**的恐懼記憶，被**提取（retrieval/reactivation）**後會回到**不穩定（labile）狀態**；此時注入 anisomycin 會**破壞再鞏固**——記憶「消失」。若不提取就注藥，記憶不受影響。這就是「提取打開了改寫的窗口」——脊椎「read 觸發 write」的分子版。\n- ❌ **常見誤傳一**：把 2000 年那篇的藥物寫成 propranolol。**錯，是 anisomycin。** propranolol（一種 β-腎上腺素阻斷劑）是**後來**用於人體研究的藥（見下），因為 anisomycin 對人有毒、不能用於人。\n- ✅ **propranolol 的人體線**：**Brunet 等人（2008）**開始用 propranolol 搭配創傷記憶提取，試圖削弱 PTSD 的生理反應（reconsolidation therapy）。\n- 🔶🔶 **臨床效果的爭議現況（2026-06，必須雙方並陳，不可斷言）**：\n  - **「有效」方**：部分試驗與某些 meta-analysis（如 Pigeon/Brunet 線、2022 *J. Psychiatry Neuroscience* 的一份分析）報告 propranolol 搭配提取能減輕臨床樣本的 PTSD 症狀與線索誘發反應。\n  - **「無效」方**：另有多項陰性研究與**2022 年一份「更新並校正」的 meta-analysis 明確結論「propranolol 對創傷記憶再鞏固破壞相對 placebo 並無效果」**。也有人主張：就算有效，機制可能是**消退（extinction）增強**而非真正的「再鞏固破壞」——兩者實驗上難分。\n  - hedge 寫法：「再鞏固這個**現象**（提取使記憶可塑、可被干擾）在動物研究中被數百個研究複製，相當穩固。但把它變成**人體臨床療法**（用 propranolol 抹除/削弱創傷記憶）**效果至今未有定論**：有正面試驗、也有設計嚴謹的陰性試驗與否定的 meta-analysis；連『到底是破壞了再鞏固、還是只是促進了消退』都還在辯。寫的時候：動物現象穩、人體強療法不穩。」\n- ✅ **邊界條件（boundary conditions）**：再鞏固不是每次提取都會發生——記憶太舊、太強、提取方式不對（如只是被動再暴露而非「預測誤差」式提取）就可能不進入不穩定狀態。這也是複製不一致的部分原因。可橋接讀者的「cache invalidation 條件」「並非每次 read 都觸發 write，只有命中特定條件才會」。\n- 來源：原始論文（Nature）https://www.nature.com/articles/35021052 ／PubMed https://pubmed.ncbi.nlm.nih.gov/10963596/ ；「Updated and rectified meta-analysis shows no effect of propranolol」（2022）https://pubmed.ncbi.nlm.nih.gov/36130812/ ；「Revisiting propranolol and PTSD: Memory erasure or extinction enhancement?」https://pmc.ncbi.nlm.nih.gov/articles/PMC4818733/ ；「Impairing memory reconsolidation with propranolol… a meta-analysis」https://pubmed.ncbi.nlm.nih.gov/35361699/\n\n---\n\n## 六、Flashbulb 記憶：Neisser & Harsch（1992）挑戰者號 ＋ Hirst et al. 9/11\n\n「閃光燈記憶」是科普重災區——常被寫成「情緒讓記憶更準」，實證恰恰相反。\n\n### 6a. Neisser & Harsch（1992）挑戰者號（Challenger）\n\n- ✅ **Ulric Neisser（奈瑟，1928–2012）與 Nicole Harsch，1992**。**挑戰者號太空梭爆炸（1986-01-28）次日**，給 **106 名 Emory 大學心理學導論學生**發問卷（24 小時內）。**約 32 個月（2 年半至近 3 年）後**，**44 名**原受試者再答一次。\n- ✅ 結果：記憶**嚴重失真**——回憶與原始記錄常矛盾（許多人「記錯」自己當時在哪、在做什麼）。常被引的數字：**最後一次回憶中約 40% 的人有明顯扭曲**；以「事實點」計，原 220 個事實點中後來約 150 個完全或部分錯誤。\n  - ⚠️ 「平均準確分數」的具體量表（0–7 分制等）不同來源略有差異；穩固的點是「**高度自信但低準確**」這個**脫鉤**，撰章主打這個。\n- ✅ 關鍵洞見（脊椎核心彈藥）：**自信與準確脫鉤**——受試者對錯誤記憶仍**極度自信**。Neisser 的結論：閃光燈記憶不是更準，只是**主觀上感覺更準（perceived accuracy）**。鮮明 ≠ 正確。\n- 來源：原文 PDF https://www.cns.nyu.edu/~wendy/class/2006sp/reading1/ （Neisser & Harsch 收於 *Affect and Accuracy in Recall*, 1992）；teaching 摘要 https://thinkib.net/psychology/page/24256/neisser-harsch-1992\n\n### 6b. Hirst et al. 9/11 長期追蹤\n\n- ✅ **William Hirst、Elizabeth Phelps 等大型團隊**，9/11 後啟動，**初測樣本約 3,000+ 人**（全美多城市）。⚠️ 不同論文報告的人數不一（初測逾 3,000；十年追蹤留存者數百），撰章寫「數千人的大規模、跨城市、長達十年的追蹤」最穩。\n- ✅ **十年追蹤（2015，*JEP: General*）**核心發現：**一致性（consistency）在第一年內快速下降，之後趨於平緩；但自信心十年間維持高檔**——再次印證「快速遺忘＋持續高自信」的脫鉤。十年後，情緒強度等因素**並不**預測閃光燈記憶的一致性。\n- ✅ 與 Neisser 一致、且樣本大得多：**閃光燈記憶並不享有特殊的準確性豁免**，它特殊的是「被回憶的頻率」與「主觀生動度／自信」。\n- 來源：十年追蹤 PDF（Cambridge memlab）https://www.memlab.psychol.cam.ac.uk/pubs/Hirst2015%20JEPG.pdf ；PubMed「Flashbulb Memories」https://pubmed.ncbi.nlm.nih.gov/26997762/\n\n---\n\n## 七、HM = Henry Molaison（Scoville & Milner 1957）\n\n- ✅ **Henry Gustav Molaison（莫萊森，1926-02-26 – 2008-12-02）**，生前以代號 **HM** 聞名，**死後 2009 年姓名才公開**。為治療嚴重癲癇，**1953 年（27 歲）**由外科醫師 **William Scoville（史科維爾）**施行**雙側內側顳葉切除（bilateral medial temporal lobe resection）**，移除包含**海馬迴（hippocampus）**、大部分杏仁核與內嗅皮質的組織。\n  - ⚠️ **手術年齡**：來源多寫「27 歲」（1926 生、1953 手術）；個別來源寫 29 歲（可能按其他算法）。**建議寫「27 歲」**，最一致。\n  - ⚠️ 「移除深度約 8 cm」是常見引用，但**現代用 HM 死後腦切片 3D 重建（Annese et al. 2014, *Nature Communications*）發現實際切除範圍與 Scoville 當年所述有出入**：**內嗅皮質（entorhinal cortex）其實近乎完全切除**，反而是**後側海馬迴（posterior hippocampus）有較多殘留**（另發現一處未記載的眶額損傷）。寫「8 公分」可，但須注明「後續影像重建有修正，且殘留的是後側海馬迴、非內嗅皮質」。\n- ✅ **Scoville & Brenda Milner（米爾納，1918–），1957 年**〈Loss of recent memory after bilateral hippocampal lesions〉（*J. Neurol. Neurosurg. Psychiatry*）——把**海馬迴與新記憶的形成**綁定的里程碑。\n- ✅ HM 的關鍵分離（dissociation，本書重要彈藥）：\n  - **嚴重順行性失憶（anterograde amnesia）**：無法形成新的**外顯／陳述記憶（declarative memory）**（新事實、新事件）。\n  - 但**程序記憶（procedural memory）保留**——他能學會新運動技能（如鏡像描繪 mirror drawing），**且一次比一次好，卻完全不記得自己練過**。這是「記憶不是單一系統」的鐵證，直接支持本書「記憶是多個可分離系統」的架構。\n  - 部分**逆行性失憶（retrograde amnesia）**：手術前數年的記憶受損，更早的童年記憶相對保留。\n- ⚠️ **別誇大**：常見錯誤是說 HM「完全沒有任何新記憶」。更準：他保留工作記憶（短時間內可記住）、程序學習、部分知覺學習；缺的是**把新的外顯記憶轉成長期儲存**。\n- 來源：Scoville & Milner 1957 PDF https://www.cns.nyu.edu/~wendy/class/2006sp/reading1/Scoville_Milner1957.pdf ；Wikipedia「Henry Molaison」https://en.wikipedia.org/wiki/Henry_Molaison ；Lancet 訃聞 https://www.thelancet.com/journals/lancet/article/PIIS0140673609601598/fulltext\n\n---\n\n## 八、Ebbinghaus（1885）遺忘曲線\n\n- ✅ **Hermann Ebbinghaus（艾賓浩斯，1850–1909），1885 年《Über das Gedächtnis》（英譯 *Memory: A Contribution to Experimental Psychology*）**。發明**無意義音節（nonsense syllables，子音-母音-子音如 DAX, BUP, ZOL）**，**以自己為唯一受試者**，用**節省法（method of savings）**測「重學省下多少時間」當作保留量。得到先快後慢的**遺忘曲線**。\n- ⚠️ **方法的真實限制（誠實寫）**：**單一受試者（就他本人）**、無意義材料、無統計檢定。這是英雄式的開創工作，但以現代標準是 n=1。\n- ✅ **複製（必須一起寫，這正是本書「重建 vs 儲存」的好對照）**：**Murre & Dros（2015，PLOS ONE）**用一名受試者花約 70 小時重做，**成功複製**了曲線形狀（在 20 分鐘、1 小時、9 小時、1 天、2 天、31 天等延遲重學），並指出曲線**在 24 小時處可能有一個小上揚**（可能與睡眠有關）。即「遺忘曲線是真的、可複製的」。\n- ✅ 概念橋接：Ebbinghaus 量的是**保留量隨時間衰減**（像 TTL / cache eviction）；但本書要強調——衰減（遺忘）只是故事一半，另一半是**主動扭曲與重建**（Bartlett/Loftus），兩者不同。遺忘是「資料不見了」，重建錯誤是「資料被改寫了」。\n- 來源：Murre & Dros（2015）PLOS ONE https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0120644 ／PMC https://www.ncbi.nlm.nih.gov/pmc/articles/PMC4492928/\n\n---\n\n## 九、🔶 HSAM 超憶症（LePort et al. 2012；Jill Price / 「AJ」2006）\n\n「擁有完美記憶」是科普最愛的迷思之一，而真實研究恰恰反過來支持本書脊椎。\n\n- ✅ **2006 年 James McGaugh（麥高夫，1931–）團隊**（Parker, Cahill & McGaugh）報告第一個案例**「AJ」**，後公開為 **Jill Price（吉兒·普萊斯）**。當時術語為 **hyperthymesia（超憶症）**。\n- ✅ **LePort et al.（2012，*Neurobiology of Learning and Memory*）**做了較大樣本的行為與神經解剖研究，把現象正式命名為 **HSAM（Highly Superior Autobiographical Memory，高度超群自傳式記憶）**。\n- ❌ **「完美記憶／過目不忘」是嚴重誤傳**：\n  - HSAM **只**在**自傳式（個人經歷的日期/那天發生什麼）**這一狹窄領域超群；對**死記材料（rote）**（電話號碼、課文、購物清單、乘法表）**並不優於常人，甚至有些人更差**。\n  - **Jill Price 本人在傳統記憶測驗上表現平平、學業成績普通**——她的能力是強迫式、不請自來的自傳回放，伴隨困擾，而非「萬能記憶超能力」。\n- ✅🔶 **本書最關鍵的彈藥（守住）**：**Patihis 等人（2013，*PNAS*，〈False memories in highly superior autobiographical memory individuals〉；LePort、Loftus、McGaugh 為共同作者）發現 HSAM 者一樣會產生假記憶**——在 DRM 詞表會誤記關鍵誘餌詞，在誤導訊息（misinformation）典範中對細節的**假記憶率與對照組相當、部分測量甚至更高（並未因記憶超群而免疫）**。即：**就算你「記得每一天」，你的記憶照樣是重建的、照樣會被植入。** 這幾乎是脊椎的實驗化身，撰章務必用。**歸屬鐵律：定義／命名 HSAM＝LePort et al. 2012；假記憶易感性的實驗＝Patihis et al. 2013（PNAS），兩者勿混。**\n- 來源：LePort et al. 2012 https://www.researchgate.net/publication/225085673 ／系統性回顧（2025）https://pmc.ncbi.nlm.nih.gov/articles/PMC11965258/ ；Jill Price https://en.wikipedia.org/wiki/Jill_Price\n\n---\n\n## 十、Method of loci / 記憶宮殿（memory palace）\n\n- ✅ **方法**：把要記的項目掛在一條熟悉空間路線（宮殿/街道）上的各個地點（loci），回憶時「走一遍」路線把東西「看」回來。西方最古老有系統記載的記憶術（傳統溯及古希臘羅馬，Simonides 傳說）。\n- ✅ **是真有效的，且這不與本書矛盾**：**Dresler et al.（2017，*Neuron*）**——6 週 method of loci 訓練讓一般人的記憶表現大幅、持久提升，腦功能連結模式向**世界級記憶運動員（memory athletes）**靠攏。**2025 年 *British Journal of Psychology* 的系統性回顧與 meta-analysis** 報告即時序列回憶有大效應量、貝氏分析「非常強的證據」支持其有效。\n- ✅ 與脊椎的關係（重要、別寫成打臉）：記憶宮殿之所以有效，正因為它**順著大腦「記憶是建構的、空間/生動意象特別好記」的特性**——它是「善用重建機制」，不是「證明記憶是錄影」。記憶冠軍**編碼**強，但他們的記憶**一樣是重建的、一樣會錯**（呼應 §九 HSAM 與記憶運動員都會有假記憶）。\n- ⚠️ 別把記憶冠軍說成「天生神腦」——Dresler 的重點正是**可訓練**、結構性差異主要來自策略而非先天解剖異常。\n- 來源：Dresler et al. 2017（Neuron）摘要 https://www.researchgate.net/publication/389335559 ；method of loci meta-analysis（2025, BJP）https://bpspsychub.onlinelibrary.wiley.com/doi/full/10.1111/bjop.12799 ／PubMed https://pubmed.ncbi.nlm.nih.gov/40457944/\n\n---\n\n## 十一、來源監控（source monitoring）、déjà vu、cryptomnesia\n\n- ✅ **來源監控框架（source monitoring framework）：Marcia Johnson（強生）等人，1993**（Johnson, Hashtroudi & Lindsay，*Psychological Bulletin*）。核心：**記憶不附帶「來源標籤」**——大腦不會在記憶上貼「這是親眼看到 / 這是聽說的 / 這是想像的 / 這是夢」。來源是**事後根據記憶的特徵（生動度、知覺細節、認知運作痕跡）推斷出來的**，因此可能**歸錯來源（source misattribution）**。這是「假記憶與真記憶用同一套機制產生」的統一解釋——直接支撐脊椎。\n  - 工程橋接金句：記憶沒有 provenance / 沒有 audit log，「這條記憶哪來的」是每次提取時**現推（reconstructed metadata）**，所以會推錯。\n- ✅ **cryptomnesia（隱記症／無意識抄襲，cryptomnesia）**：把曾接觸過的舊念頭誤認為自己的**原創**——來源監控失敗的一種（「記得內容、忘了它來自別人」）。是「無意識剽竊」的機制解釋。\n- ✅🔶 **déjà vu（既視感）**：把當下**新**經驗誤判為「曾經歷過」的熟悉感——一般視為**熟悉感（familiarity）與回想（recollection）解離**或來源/時序歸因錯誤的一種。**機制仍有多種競爭假說（顳葉小放電說、雙路徑說、格式塔熟悉說等），未有單一定論**——寫時用「一種被廣泛討論的解釋是…」而非斷言。\n- 來源：Johnson et al. 1993「Source Monitoring」https://pubmed.ncbi.nlm.nih.gov/8346328/ ；Wikipedia「Misattribution of memory」https://en.wikipedia.org/wiki/Misattribution_of_memory\n\n---\n\n## 十二、間隔效應（spacing effect）與測試效應（testing effect）—— 罕見的「穩固區」\n\n本書大部分是「迷思拆解」，但這兩個是**真的穩、真的可用**，可當「記憶科學不是只會潑冷水，它也有可靠的正面結論」的平衡點。\n\n- ✅ **測試效應（testing effect / retrieval practice，提取練習）**：**主動提取（考自己）比重讀更能鞏固長期記憶**。**Roediger & Karpicke（2006）**是引爆現代研究的代表作。被稱為**人類記憶研究中最穩健的現象之一**，跨材料、跨情境廣泛複製。\n  - ✅ Rowland（2014）meta-analysis：效應穩健，且**初次提取成功率越高（>75%）效應越強**。\n- ✅ **間隔效應（spacing effect）**：**分散練習（spaced）勝過集中練習（massed，臨時抱佛腳）**。同樣是教育心理學中複製度最高的發現之一（可追溯到 Ebbinghaus 本人已觀察到）。\n  - ⚠️ 真實世界教室的效應量比實驗室小、且依執行細節（2024 STEM 課程的單篇 meta-analysis「半杯水」討論）；寫「實驗室極穩、教室落地有折扣但方向一致」最誠實。\n- ✅ 與脊椎的連結：正因記憶是**重建**的，每次「提取」就是一次重建練習——提取練習之所以有效，是因為它**鍛鍊的是重建/通路本身**，不是「重新讀檔」。這把正面技巧也收進脊椎，不是例外。\n- 來源：Roediger & Karpicke / retrieval practice 概覽 https://pmc.ncbi.nlm.nih.gov/articles/PMC3983480/ ；spacing 單篇 meta（2024 STEM）https://link.springer.com/article/10.1186/s40594-024-00468-5\n\n---\n\n## 十三、🔶🔶 記憶戰爭（Memory Wars）：壓抑/恢復記憶 vs 假記憶\n\n這是本書**政治與倫理最敏感**的一段，**必須雙方並陳、不選邊**。\n\n- ✅ **背景**：1980s–90s 一場激烈論戰。一方（部分臨床治療師、創傷倡議者）主張**創傷記憶可被壓抑（repressed）、多年後可在治療中準確恢復（recovered）**；另一方（多為實驗心理學家，Loftus 為代表）強調**記憶的可塑性與暗示風險**，警告治療性暗示可能**製造**假的虐待記憶。lost-in-the-mall（§三）是後者的關鍵彈藥。\n- 🔶 **2026 現況（誠實）**：學界**並未**收斂成單一答案。多數研究者同意——\n  - 暗示、想像、重複詢問**可以**製造詳盡而自信的假記憶（這點實證很強）；\n  - **但**「恢復的記憶可能為假」**不等於**「所有恢復記憶都是假的」——確有真實創傷事後才被想起的情況。\n  - 「壓抑（repression）作為一種特殊的、主動把創傷推出意識的機制」本身是否存在，**至今有爭議**；部分研究者改用「尋常遺忘＋線索觸發的非自願回憶」來解釋，不需要「壓抑」這個特殊機制。\n- 寫作戒律：**呈現雙方、標明這是 unsettled debate**，不要寫成「科學已證明壓抑記憶是假的」或「恢復記憶都是真的」。語氣克制，承認對受害者的真實傷害關切與對冤案的關切**兩者都正當**。\n- 來源：「Ground Lost: The False Memory/Recovered Memory Therapy Debate」https://www.psychiatrictimes.com/view/ground-lost-false-memoryrecovered-memory-therapy-debate ；Frontiers「Recovered memories of trauma…」https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2023.1268757/full ；National Geographic「And the Memory Wars Wage On」https://www.nationalgeographic.com/science/article/and-the-memory-wars-wage-on\n\n---\n\n## 待守住的高風險事實（最易被科普寫錯，撰章前對照本檔）\n\n1. **lost-in-the-mall 數字（§三）**：原始 **n=24、約 25%（6 人）**；2023 預先註冊複製 **n=123、約 35%**。別寫成圓整數或「一半」。倫理外推有爭議，雙方並陳。\n2. **再鞏固的藥（§五）**：Nader 2000 用的是 **anisomycin（大鼠）**，**不是 propranolol**；propranolol 是後來的人體研究（Brunet 2008），**臨床效果至今有爭議**（2022 有否定的 meta-analysis）。動物現象穩、人體強療法不穩。\n3. **閃光燈記憶（§六）**：情緒**不**讓記憶更準；Neisser/Harsch 與 Hirst 都證**自信與準確脫鉤**（高自信、低一致）。Neisser/Harsch：**106→44 人、約 32 個月（2.5–3 年）**。\n4. **HSAM 不是完美記憶（§九）**：只在自傳式領域超群、死記不優；**且 HSAM 者照樣會被植入假記憶（DRM/誤導訊息）**——脊椎的實驗化身。Jill Price 學業普通。\n5. **Bartlett（§一）**：核心洞見（基模驅動重建）成立，但 **1932 原始實驗方法鬆散**，扭曲程度取決於指示語（Gauld & Stephenson 1967）；serial ≠ repeated reproduction。\n6. **HM（§七）**：手術年齡寫 **27 歲**；非「完全沒有新記憶」——**程序記憶保留**（鏡像描繪一次比一次好卻不記得練過）是關鍵分離。死後切片對切除範圍有修正。\n7. **記憶宮殿/間隔/測試效應（§十、§十二）是真有效的**——別為了戲劇性把它們寫成迷思；它們是「善用重建機制」，與脊椎一致。\n8. **記憶戰爭（§十三）是 unsettled debate**：暗示能造假記憶（強證據）≠ 所有恢復記憶都假；「壓抑」機制是否存在有爭議。雙方並陳，不選邊。\n9. **「重建」別過度延伸成「記憶全不可信」（§〇）**：多數日常記憶大致準確；重建論說的是「可被污染、鮮明≠正確」。\n10. **數字鐵律**：Loftus & Palmer 速度實驗 **n=45**、碎玻璃實驗 **n=150（3×50）、smashed 32% vs hit 14%**；DRM **24 串×15 詞**，誤記率「依清單而異」別咬死單一百分比。\n\n---\n\n## 補充：P1 自我審查 + agy 二意見（2026-06-20，撰章 web 查證後納入）\n\n以下為 P1 self-review 與 agy 二意見指出的「該補的關鍵研究」。撰對應章時 WebSearch 查證後納入並標時點。\n\n- **模糊痕跡理論（Fuzzy-Trace Theory，Brainerd & Reyna）→ ch02／ch07**：記憶雙重編碼為「逐字痕跡（verbatim）＋要旨痕跡（gist）」；要旨痕跡解釋為何時間愈久、基於要旨的假記憶（DRM 誘餌）反而比真記憶更穩固。ch02 已用 gist/verbatim 概念，這裡補上它的理論名稱與歸屬。\n- **想像膨脹（Imagination Inflation，Garry et al. 1996）→ ch06**：僅「想像」一個未發生事件就顯著提高對其曾發生的自信——是 lost-in-the-mall 植入機制的核心一步（ch06 worked example 的「反覆想像→編碼→來源誤標」即此），補上歸屬。\n- **記憶的社會傳染（Social Contagion / memory conformity，Roediger et al. 2001）→ ch12**：共同回憶時會把他人報告的錯誤併入自己的記憶——補足 ch12「其他證人／提問者如何污染」的人際機制。\n- **McCloskey & Zaragoza（1985）覆寫 vs 共存之辯 → ch05／ch13（脊椎相關，重要）**：對 Loftus「誤導訊息覆寫原記憶」的經典挑戰——改良測試設計顯示原痕跡可能**仍共存**，只是來源監控失敗／反應偏誤使其未被提取。直接關係脊椎「read 觸發 write」究竟是「覆寫」還是「共存＋來源混淆」——ch05 提出、ch13（來源監控）誠實處理，**不把脊椎寫死成「覆寫」**。\n- **DRM 的發展逆轉（Developmental Reversal）→ ch07**：成人假記憶率反而高於兒童（成人語意基模更發達）——反直覺、強力說明 schema 主導重建。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "maintenance.md — 大腦怎麼編造過去（id mem）", "md": "# maintenance.md — 大腦怎麼編造過去（id mem）\n\n維護本書時的權威基準。改任何基準數字，必須照「一致性基準表」全書同步，並在掃描日誌記一行。事實錨點＝`landscape-2026-06.md`（含末尾「補充」addendum）。\n\n## 一致性基準表（各章不得另創寫法／數字／歸屬）\n\n| 基準 | 鎖定值 | 出現章 |\n|---|---|---|\n| 脊椎隱喻 | 「每次提取都重新建構」＝「每次 read 觸發一次 write」；現象層穩固、分子層（再鞏固臨床）要 hedge | 全書／ch01 立／ch09 兌現 |\n| 重建的防線 | 重建說的是「可被污染、鮮明≠正確」，**不是「記憶全不可信」**；多數日常記憶大致準確 | ch01 立／ch12,ch16 重申 |\n| Loftus & Palmer 1974 | 實驗一 n=45（動詞→速度估計，約 41 smashed vs 約 32 contacted）；實驗二 n=150（3×50），碎玻璃誤報 **smashed 32%／hit 14%／控制 12%** | ch05 定版 |\n| lost-in-the-mall | Loftus & Pickrell 1995：原始 **n=24、約 25%（6 人）**；2023 預註冊複製 Murphy & Loftus **n=123、約 35%** | ch06 定版 |\n| DRM | Roediger & McDermott 1995（建基 Deese 1959）；24 串×15 詞；誤記率依測法而異（自由回憶約 40–55%，再認可達 80%+），不咬死單一值 | ch07 定版 |\n| HM | Henry Molaison（1926–2008）；**1953 年、27 歲**由 Scoville 施雙側內側顳葉切除；內嗅皮質近全切、後側海馬迴有殘留（Annese 2014）；程序記憶保留 | ch08 定版 |\n| 再鞏固 | Nader, Schafe & LeDoux 2000 *Nature*；大鼠聽覺恐懼＋**anisomycin（茴香黴素，不是 propranolol）**注入杏仁核；propranolol 是後來人體線（Brunet 2008），臨床療效未定論 | ch09 定版 |\n| 閃光燈記憶 | Neisser & Harsch 1992 挑戰者號：**106→44 人、約 32 個月（2 年半至近 3 年）**；自信與準確脫鉤 | ch10 定版 |\n| HSAM | McGaugh 團隊 2006 首例 AJ＝Jill Price；**LePort 2012 命名 HSAM**；HSAM 仍被植入假記憶＝Patihis et al. **2013 PNAS** | ch14 定版 |\n| 術語 | **活化（activation，非「激活」）**；活化—監控架構（activation–monitoring framework） | 全書 |\n\n## 已知脆弱事實清單（最易出錯／最該守住）\n\n- **Neisser–Harsch 間隔＝約 32 個月**（不是「兩年半／2.5 年」當主要數字；2.5 年只能作括號範圍）。2026-06-21 已全書統一。\n- **Nader 2000 用 anisomycin**，不是 propranolol（propranolol 是後來的人體線）。\n- **HSAM 假記憶＝Patihis 2013**，命名是 **LePort 2012**——兩者別混。\n- **HM 內嗅皮質近全切、後側海馬迴殘留**（別寫反）。\n- **James McGaugh 仍在世（生於 1931-12-17）**——2026-06-21 查證（Wikipedia）；agy 曾誤稱其 2023 逝世，已駁回。\n- 重建≠記憶全不可信（守住防線）。\n\n## 掃描協定\n\n1. 動基準數字 → 先改 landscape，再照上表全書同步，記掃描日誌。\n2. 動 ASCII 圖 → `check_diagrams.py book-src`（exit 0）。3. 動 book-src → `lint_book.py book-src`（0 errors）＋重打包。4. 重大修正需 2 獨立來源。\n\n## 掃描日誌\n\n- **2026-06-21 建書（P1–P5）**：起草 ch01–16＋3 附錄。P1 agy 修正進 landscape：HM 內嗅皮質方向、HSAM=Patihis 2013（非 LePort 2012）、Neisser 間隔 32 個月（原誤 2.5 年）。\n- **2026-06-21 P3**：lint 0 errors；diagrams exit 0；spine 16/16；mall 24/25%・123/35%、Loftus&Palmer 45/150/32/14/12、HM 1953/27 一致。修 Neisser 間隔跨章漂移（ch01「兩年半」×8、ch10「2.5 年」×4 → 約 32 個月）。\n- **2026-06-21 P4**：agy 逐章審 16/16；套用驗證修正（最大宗：激活→活化、激活—監控帳→活化—監控架構）。McGaugh 卒年 agy 誤判（實仍在世 1931–），駁回。\n- **⚠️ 待網路查證（未改）**：ch13 Garry 1996 想像膨脹第二次評估時點；ch14 Dresler 2017 控制組基準回憶（章寫約 40 詞、agy 主張約 26 詞）；ch15 Rowland 2014 初次提取成功率方向（landscape 鎖「>75% 效應更強」，agy 提反向「提取努力假說」——單一來源不推翻，待查）；ch06 Garry 招募 46 vs 完成 38；ch16 Dresler ResearchGate 連結真偽。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《大腦怎麼編造過去：記憶作為重建的科學》（id=mem；最終書名於 gate 定案）\n形態：16 章、四個 Part、3 個附錄。欣賞與直覺書（不背腦區表、不刷選擇題、不賣記憶課程；**純紙上推演，無 Python、無自我追蹤實驗**）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；實驗、數字、年份、歸屬、引文以 `landscape-2026-06.md` 為事實錨，**不憑記憶、不憑「教科書都這樣寫」**。\n\n## 全書敘事弧\n\n脊椎一句話：**記憶不是錄影回放，而是每次提取都重新「建構」**——因此可被污染、植入、扭曲，鮮明度與正確度脫鉤。把「錄影帶」隱喻換成「**每次 read 都會觸發一次 write**」。全書反覆問同一個問題：**「這段記憶是被讀出來的，還是被重新建構（並可能在這次回憶中被改寫）的？」**\n\n弧線：先打碎「記憶＝錄影帶」這個預設，把記憶拆成編碼／儲存／提取三關卡、點明提取不是唯讀（Part I 回放的幻覺）→ 證明記憶是**重建**的、而且可被外部措辭污染、甚至整段植入（Part II 重建與污染：Bartlett→Loftus→lost-in-the-mall→DRM，從「扭曲」一路升級到「無中生有」）→ 把心理現象接到神經機制：記憶住在哪、怎麼從海馬迴搬到皮質、提取為什麼會打開改寫窗口、情緒為什麼讓記憶更鮮明卻不更準（Part III 系統與機制：HM→再鞏固→閃光燈→杏仁核）→ 把可錯性帶進法庭與日常，並收束成「怎麼與一個會編造的記憶系統共處、甚至善用它」（Part IV 邊界與應用：證詞→來源混淆→記憶高手→記得更牢→finale 六主線口試）。\n\n歷史暗線（交織不另立章）：Ebbinghaus（1885，n=1 遺忘曲線）→ Bartlett（1932，War of the Ghosts 與 schema）→ Scoville & Milner（1957，HM）→ Loftus & Palmer（1974，車禍動詞）→ Roediger & McDermott（1995，DRM）／Loftus & Pickrell（1995，lost-in-the-mall）→ Neisser & Harsch（1992，挑戰者號）→ Nader, Schafe & LeDoux（2000，再鞏固）→ Brunet（2008，propranolol 人體線）→ LePort（2012，HSAM）→ Hirst（2015，9/11 十年追蹤）→ Murphy & Loftus（2023，預先註冊複製）。歷史服務於機制理解，不是編年史。\n\n## 全書 ASCII 路線圖（基準圖；每個 Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 回放的幻覺          Part II 重建與污染         Part III 系統與機制\nch01 你的記憶不是錄影帶    ch04 重建：Bartlett       ch08 海馬迴與系統鞏固 HM\nch02 編碼/儲存/提取    →   ch05 誤導訊息 Loftus ★ →  ch09 再鞏固：read 觸發 write ★\nch03 遺忘是功能            ch06 植入：商場走失       ch10 閃光燈記憶的背叛\n                          ch07 DRM：記得沒出現的詞   ch11 情緒、壓力與杏仁核\n                                                          │\n                                                          ↓\n                          Part IV 邊界與應用\n                          ch12 目擊證詞與冤案\n                          ch13 來源混淆與既視感\n                          ch14 記憶高手與超憶症\n                          ch15 怎麼記得更牢\n                          ch16 finale：六主線口試\n```\n\n★＝全書兩個高潮：ch05 誤導訊息效應（一個動詞改寫了你「看到」的東西——污染的乾淨示範）、ch09 再鞏固（提取打開改寫窗口——脊椎「read 觸發 write」的分子兌現）。\n\n## 跨章基準（一致性掃描的依據；各章不得另創寫法、數字、命名與歸屬）\n\n**脊椎物件**：一條**每次都要重跑的重建管線**「編碼 → 儲存 →（提取＝讀出＋順手改寫）」，與工程鏡像「read 觸發 write」。每章至少一處明確回問脊椎：「這裡是 read，還是 read 觸發了 write？」\n\n| 基準 | 寫法／值（鎖定，全書一致） | 出現章 |\n|---|---|---|\n| **脊椎隱喻** | 「記憶不是錄影回放，而是每次提取都重新建構」＝「每次 read 觸發一次 write」；**現象層穩固、分子層強應用要 hedge**（再鞏固臨床未定論） | 全書 / 定調 ch01 / 兌現 ch09 |\n| **三關卡** | 編碼（encoding）／儲存（storage）／提取（retrieval）；提取**不是唯讀**，會把記憶帶回不穩定狀態 | ch02 定版 / 全書回收 |\n| **「重建」的防線** | 重建論說的是「可被污染、鮮明≠正確」，**不是「記憶全不可信／一切都是編造」**；多數日常記憶大致準確（landscape §〇/§十三）——每次寫脊椎都要同時守這條 | ch01 立 / ch12,ch16 重申 |\n| **Bartlett** | 巴特利特（Frederic Bartlett, 1886–1969）1932《Remembering》；War of the Ghosts；schema（基模，借自 Henry Head）；同化／削平／銳化；**serial reproduction（連續再生）≠ repeated reproduction（重複再生），勿混用**；1932 方法鬆散、扭曲取決於指示語（Gauld & Stephenson 1967） | ch04 定版 |\n| **Loftus & Palmer 1974** | 兩個獨立實驗。實驗一速度估計 **n=45**，動詞→mph 寫「約 41（smashed）vs 約 32（contacted）」的對比幅度、不死咬小數；實驗二碎玻璃 **n=150（3×50）**，**smashed 32%（16/50）vs hit 14%（7/50）vs 控制 12%（6/50）** 誤報看到碎玻璃（影片中無碎玻璃） | ch05 定版 |\n| **lost-in-the-mall** | Loftus & Pickrell（皮克瑞爾，Jacqueline Pickrell）1995：原始 **n=24、約 25%（6 人）**；2023 預先註冊複製（Murphy & Loftus）**n=123、約 35%**。**別寫圓整數或「一半」**；倫理外推有爭議，雙方並陳 | ch06 定版 |\n| **DRM** | Deese–Roediger–McDermott；羅迪格（Roediger）& 麥克德莫特（McDermott）1995，建基 Deese 1959；**24 串×15 詞**；經典示範清單詞指向未出現的關鍵誘餌詞（critical lure）；誤記率**「依清單、依 free recall vs recognition 而異」**（自由回憶約 40–55%，再認可達 80%+），**不咬死單一百分比** | ch07 定版 |\n| **HM** | 莫萊森（Henry Molaison, 1926–2008），代號 HM、死後 2009 才公開姓名；**1953 年、27 歲**由史科維爾（Scoville）施雙側內側顳葉切除；Scoville & 米爾納（Milner）1957；**順行性失憶嚴重但程序記憶保留**（鏡像描繪一次比一次好卻不記得練過）＝多重可分離系統的鐵證；「**非完全沒有新記憶**」；死後切片對切除範圍有修正 | ch08 定版 |\n| **再鞏固** | Nader、Schafe、勒杜（LeDoux, 1949–）2000 *Nature*；**大鼠聽覺恐懼制約＋anisomycin（茴香黴素，不是 propranolol！）注入杏仁核**；提取→labile（不穩定）→蛋白質合成窗口→重新穩定；**邊界條件**（非每次提取都觸發）；propranolol 是後來人體線（Brunet 2008），**臨床療效未定論**（2022 否定 meta-analysis），動物現象穩、人體強療法不穩，雙方並陳 | ch09 定版 / ch11,ch12 回收 |\n| **閃光燈記憶** | 奈瑟（Neisser, 1928–2012）& 哈許（Harsch）1992 挑戰者號：**106→44 人、約 2.5 年**，**高自信、低準確的脫鉤**；Hirst & 費爾普斯（Phelps）9/11：**數千人、十年追蹤**，一致性第一年內快降後平緩、自信維持高檔。**情緒不讓記憶更準**——只讓主觀感覺更準 | ch10 定版 |\n| **Ebbinghaus** | 艾賓浩斯（Ebbinghaus, 1850–1909）1885；**無意義音節、n=1（他本人）、節省法**；遺忘曲線先快後慢；Murre & Dros 2015 成功複製（24 小時處可能小上揚） | ch03 定版 |\n| **HSAM** | McGaugh（麥高夫）團隊 2006 首例「AJ」＝Jill Price（普萊斯，學業普通）；LePort（勒波特）2012 命名 HSAM；**只在自傳式領域超群、死記不優**；**HSAM 者照樣被植入假記憶（DRM／誤導訊息）＝脊椎的實驗化身** | ch14 定版（ch01 預告） |\n| **記憶宮殿／間隔／測試效應** | method of loci 真有效（Dresler 2017、2025 meta）；測試效應（提取練習，Roediger & Karpicke 2006）與間隔效應是**少數穩固正面結論**；它們是「**善用重建機制**」，**不是迷思、不寫成反例** | ch15 定版 |\n| **來源監控** | 強生（Johnson）等 1993 source monitoring framework：**記憶不附帶「來源標籤」**，來源是事後依特徵推斷⇒可歸錯（source misattribution）；統一解釋假／真記憶同機制；工程橋「記憶沒有 provenance／audit log」；隱記症（cryptomnesia）、既視感（déjà vu，機制多假說未定論） | ch13 定版 |\n| **記憶戰爭** | unsettled debate：暗示能造假記憶（強證據）≠ 所有恢復記憶都假；「壓抑（repression）」機制是否存在有爭議。**雙方並陳、不選邊、語氣克制** | ch12,ch16 |\n| **嚴謹度分級記號** | ✅ 穩固共識／🔶 主流假說有爭議／❌ 迷思（給正解）／🔶🔶 unsettled 雙方並陳——與 landscape 同一套，全書一致 | 全書 |\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向擁有章；四本書互不引用）：\n- **任何醫療／治療／創傷處理／用藥（含 propranolol）／戒斷／自我診斷建議**——本書只談機制與證據現況；涉臨床主題明文標「這是科學討論，不是臨床指引」（ch09/ch11/ch12 各一句）。\n- **睡眠鞏固的具體機制**（分期—記憶類型對應、慢波/REM 分工）——全書只一句帶過、不展開機制（ch15 點到即止、明說「機制不展開」）。\n- 神經解剖名詞表、突觸/LTP 分子細節——只在解釋某現象時出場，不為完整而完整（ch08/ch09 取所需）。\n- 工作記憶（working memory）的容量模型與中央執行系統——非本書主題，ch02 一句話與長期記憶分界即止。\n- 動物模型的完整神經迴路、光遺傳學 engram 標記技術——ch09 取「提取打開窗口」一個結論，技術不展開。\n- 統計方法學戰（複製危機全景、效應量計算法）——只在 lost-in-the-mall（ch06）與閃光燈（ch10）就事論事，不開方法學專章。\n- 失智症／阿茲海默症的臨床與病理——非本書主題（與 HM 的失憶症分離，ch08 一句話劃清）。\n- 學習科學的完整教學設計（間隔排程演算法、SRS 軟體）——ch15 取「機制為什麼有效」，不教工具、不開課程。\n\n---\n\n## Part I — 回放的幻覺（ch01–03）\n\n### ch01 — 你的記憶不是錄影帶：把「重播」這個預設拆掉\n- **目標**：讀完能說出「記憶像錄影帶」這個直覺**錯在哪、會在哪一步把你帶溝裡**；能用自己的話講脊椎「每次 read 觸發一次 write」；能畫出全書地圖、知道六條驗收主線。\n- **必涵蓋**：開場直擊預設——多數人（包括工程師）默認記憶是「把當時錄下的畫面原封讀回」，這個隱喻決定了你怎麼信任自己的過去；用一個你「鮮明到不可能錯」卻被證實記錯的日常例子（或挑戰者號的預告）撬開縫；**脊椎宣告**：記憶不是讀檔、是每次提取都重跑的**重建管線**，提取本身會改寫記憶（「read 觸發 write」首次出場、定調，但同時立**防線**——「重建」不等於「全不可信」，多數日常記憶大致準確，landscape §〇/§十三）；本書是什麼／不是什麼的三句界線（不是教科書、不是記憶課程、**不是醫療指引**）；全書路線圖（基準圖首次出場）＋六條驗收主線開宗明義；預告全書最反直覺的三顆子彈（一個動詞改寫你看到的＝ch05、超憶症的人也會被植入假記憶＝ch14、你越自信反而越可能錯＝ch10）。\n- **不涵蓋**：三關卡的正式拆解（ch02）；任何單一研究的數字（後續各章）；神經機制（Part III）。\n- **橋接**：**event sourcing vs snapshot**——你以為大腦存的是 snapshot（一張快照原樣讀回），真相是它存事件、每次回憶用**當前的 schema 重播**重建狀態，重播時補洞、所以會漂移；對比你信任 audit log 的 provenance——記憶恰恰**沒有** provenance（ch13 展開）。\n- **Worked example**：拿一個讀者能驗證的「記憶被改寫」現象走一條鏈——以挑戰者號（ch10 詳述、此處只用骨架）為例：事發次日寫下的紀錄 vs 2.5 年後「鮮明」的回憶矛盾，**而本人對錯的版本極度自信**；逐步點出：這不是「忘了」（資料不見），是「記得一個現編的版本」（資料被改寫）——遺忘與重建錯誤是兩回事（伏筆 ch03）。\n- **紙上推演**：把「記憶像錄影帶」這句話翻成它**隱含的三個機制假設**（一次寫入不可變、讀取不改寫、鮮明＝高保真），逐一標出哪個最先垮；口頭題：把脊椎「每次 read 觸發一次 write」講給一個只聽過「記憶會變淡」的工程師，讓他看出「變淡」和「被改寫」的差別。\n\n### ch02 — 編碼、儲存、提取：三道關卡，每一關都會出錯\n- **目標**：能把記憶拆成編碼／儲存／提取三關卡、說出每一關各自怎麼引入扭曲；能講清楚「提取為什麼不是唯讀」這個全書最關鍵的轉折。\n- **必涵蓋**：**三關卡定版**（encoding／storage／retrieval，主線 1）——編碼：經驗進來時就**有損壓縮**，保留要旨（gist）丟細節；儲存：痕跡會衰減、會被其他記憶干擾；提取：把要旨**重新展開**成一段「完整」回憶，**細節常是這次現編的**；點明三關卡各對應一類錯誤（編碼沒進去≠儲存掉了≠提取拼錯，常被混為一談）；**提取不是唯讀**——這是把脊椎從隱喻變成可檢驗主張的關鍵章：提取會把記憶帶回不穩定狀態（再鞏固的伏筆，ch09 兌現分子機制）；工作記憶與長期記憶一句話分界（不展開）；要旨／逐字（gist/verbatim）對照——為什麼你記得「他很生氣的大意」卻記不得「他說的逐字」、且會用大意現編逐字。\n- **不涵蓋**：再鞏固的分子鏈（ch09）；schema 如何補洞的正式理論（ch04）；遺忘曲線（ch03）。\n- **橋接**：**lossy 壓縮編碼**——編碼階段像 JPEG，丟掉高頻細節保留輪廓；提取時用輪廓**重建**細節（所以細節是解碼器現編的，不是原圖）；**讀取時重算 vs 讀取存檔**——記憶提取像 read-through cache miss 後的重算，不是讀一個 immutable blob。\n- **Worked example**：走一條完整的三關卡鏈：一段「同事昨天在會議上的發言」——編碼時你只存了 gist（他反對方案 B、語氣不耐）＋少數鉤子；一天後提取，大腦用 gist＋你對他的 schema（「他一向龜毛」）**重建**出逐字句子與表情——逐步標出哪幾個細節是儲存的、哪幾個是提取當下生成的，以及為什麼你主觀上分不出來（伏筆來源監控 ch13）。\n- **紙上推演**：給「我清楚記得那天他穿藍襯衫」這句話設計一個假想實驗，分辨這個細節是**編碼進去的**還是**提取時補的**（提示：操弄事後接觸到的資訊）；把一次「想不起來但話到嘴邊（tip-of-the-tongue）」現象歸到三關卡的哪一關並說明；口頭題：為什麼說「提取不是唯讀」是這整本書的轉軸？\n\n### ch03 — 遺忘是功能不是 bug：Ebbinghaus 與干擾\n- **目標**：能說出遺忘不是記憶系統的故障、而是設計；能區分「遺忘（資料衰減/取不到）」與「重建錯誤（資料被改寫）」兩種不同的失真；能誠實評價 Ebbinghaus 這個 n=1 的開創研究。\n- **必涵蓋**：**Ebbinghaus 定版**（艾賓浩斯 1885，無意義音節、n=1、節省法、遺忘曲線先快後慢，landscape §八）——同時誠實寫**方法限制**（單一受試者、無統計）與**後續複製**（Murre & Dros 2015 成功複製，24 小時處小上揚）——這正是本書「重建 vs 儲存」對照的第一個示範：遺忘曲線量的是**保留量隨時間衰減**；干擾理論——順向干擾（proactive）／逆向干擾（retroactive），遺忘多半不是痕跡消失而是**取不到／被別的記憶蓋過**；**遺忘為什麼是功能**：不遺忘＝資訊過載＋無法歸納（呼應 ch14 超憶症的困擾預告）；關鍵切分（全書要反覆用）：**遺忘是「資料不見了」，重建錯誤是「資料被改寫了」**——兩者機制不同、後果不同，科普常混為一談。\n- **不涵蓋**：間隔效應的應用（ch15，這裡只說 Ebbinghaus 本人已觀察到分散優於集中）；重建污染（Part II）；HSAM 的困擾（ch14）。\n- **橋接**：**TTL / cache eviction**——遺忘曲線像快取項目的 TTL 衰減；**干擾**像 cache key 碰撞／LRU 把舊項目擠掉；但要點明：本書真正反直覺的不是 eviction（資料不見），是**read-repair 把資料改寫**（重建錯誤）——這章先把「衰減」這條相對好懂的線講清楚，好讓後面「改寫」那條線的衝擊更大。\n- **Worked example**：逐步解讀 Ebbinghaus 的遺忘曲線數字（節省法：20 分鐘後保留約 58%、1 小時約 44%、1 天約 34%、約一個月約 21% 的量級——標「量級、依版本」並 hedge，對照 Murre & Dros 複製值），說明「節省法測的是重學省下的時間」而不是「直接回憶率」，以及為什麼這個測法巧妙；點出 n=1 的限制與複製如何補救。\n- **紙上推演**：給定「我背過的單字現在想不起來」，用「編碼失敗／儲存衰減／提取失敗／被干擾」四種假設各設計一個能區分的假想測試；找出壞論證的破綻：「遺忘曲線證明記憶會隨時間自動變淡，所以舊記憶一定比新記憶模糊」（提示：閃光燈與重建——舊記憶可以又鮮明又錯，ch10 伏筆）；口頭題：為什麼「會遺忘」對一個記憶系統是優點而非缺陷？\n\n---\n\n## Part II — 重建與污染（ch04–07）\n\n### ch04 — 記憶是重建：Bartlett、schema 與你腦補的空白\n- **目標**：能完整講出「記憶是受 schema 驅動的重建」這個全書本體論；能說出 Bartlett 1932 的洞見**為什麼成立、但它那批實驗本身為什麼不夠嚴謹**；能誠實處理「核心對、原始證據弱」這種科學狀態。\n- **必涵蓋**：**Bartlett 定版**（巴特利特 1932《Remembering》，War of the Ghosts，landscape §一，主線 2）——讓受試者反覆回憶一則陌生的美洲原住民故事，回憶隨時間被**同化／削平／銳化**成符合受試者文化 schema 的版本；schema（基模）是什麼——大腦對「一類情境通常長怎樣」的模板，用來**補空白**（提取時沒有的細節用 schema 生成）；**serial reproduction（連續再生）vs repeated reproduction（重複再生）**明確區分、勿混用；**誠實呈現方法學爭議**（❌🔶）：1932 實驗指示語鬆散，部分扭曲可能來自需求特徵（demand characteristics）或「講故事」而非真重建；**Gauld & Stephenson 1967**：要求「力求準確」時扭曲大幅減少——所以我們信「記憶是重建」靠的是後來更嚴格的證據（Loftus、DRM），不只靠 War of the Ghosts；脊椎接點：schema 補洞＝event sourcing 重播時用當前狀態填缺失事件。\n- **不涵蓋**：誤導訊息效應的實驗證據（ch05，本章是「自發重建」，ch05 是「外部污染」）；假記憶植入（ch06）；來源監控的統一框架（ch13）。\n- **橋接**：**event sourcing 用當前 schema 重播**——重建一段經歷不是讀快照，是重播事件、缺的事件用「這類情境通常如何」的預設補上；**schema＝預設值／模板**——像反序列化遇到缺欄位時填 default，你之後分不出哪些欄位是真資料、哪些是 default 填的。\n- **Worked example**：走一遍 War of the Ghosts 的扭曲型態——拿故事裡一個對英國受試者陌生的元素（如「獵海豹」「靈魂出竅」），逐次再生中如何被同化成熟悉概念、無關細節被削平、符合預期的被銳化；對照 Gauld & Stephenson：同一材料在「力求準確」指示下扭曲量怎麼掉下來——**逐步說明這證明了什麼、又限制了什麼**（重建是真的，但量取決於你被怎麼要求回憶）。\n- **紙上推演**：把「目擊者把陌生場景記成熟悉版本」翻成 schema 機制的一步步因果鏈；找出壞論證的破綻：「Bartlett 證明了所有記憶都是編造的」（提示：方法學限制＋防線——重建≠全假）；口頭題：「核心洞見成立但原始實驗弱」這種科學狀態，你身為工程師怎麼看待它的可信度（對比一個「demo 漂亮但壓測沒做」的功能）？\n\n### ch05 — 誤導訊息效應：一個動詞改寫你「看到」的東西（全書高潮之一）\n- **目標**：能完整重講 Loftus & Palmer 1974、講到另一個工程師能自己複述實驗設計與數字；能說出「事後的措辭／提問會回灌進『原始』記憶」為什麼是污染而非單純說謊；知道它的外推邊界在哪。\n- **必涵蓋**：把張力上滿（ch04 是大腦自發補洞，這章是**外部資訊主動寫入**）；**Loftus & Palmer 定版**（蘿芙托斯 1944–、帕爾默，1974〈Reconstruction of Automobile Destruction〉，landscape §二，主線 2）——兩個獨立實驗：實驗一速度估計（n=45，smashed/collided/bumped/hit/contacted 五動詞→速度估計遞減，寫「約 41 vs 約 32 mph」對比幅度）；**實驗二碎玻璃（n=150，3×50）**——一週後問「有沒有看到碎玻璃？」（影片中無），**smashed 32% vs hit 14% vs 控制 12% 誤報**；詮釋：一個動詞不是改變了「報告」、是改寫了「記得看到的內容」——誤導訊息效應（misinformation effect）的早期經典、「提問本身改寫記憶」的乾淨示範；**誠實標外推邊界**（⚠️）：實驗室、影片、學生樣本——證明「措辭能扭曲記憶報告」，**不證明「所有目擊證詞都不可信」**（ch12 接力）；脊椎兌現：提問（read）順手把答案改寫（write）回記憶。\n- **不涵蓋**：完整假事件植入（ch06，這裡是「細節污染」不是「無中生有整個事件」）；法庭應用（ch12）；來源監控解釋（ch13）。\n- **橋接**：**read 觸發 write 的最乾淨案例**——一次查詢（提問）夾帶了一個值（誤導動詞），這個值被寫回了 source of truth；**最終一致性下的 source-of-truth 漂移**——事後的措辭像一個遲到的寫入，悄悄改了「原始」記錄，而你的系統沒有版本戳能分辨。\n- **Worked example**：碎玻璃實驗數字逐步解讀——三組各 50 人、誤報率 16/50=32% vs 7/50=14% vs 6/50=12%；算出「一個動詞造成的差幅」（smashed 比控制高 20 個百分點、比 hit 高 18 個百分點），逐步說明這差幅代表什麼（不是 32% 的人說謊，是動詞改寫了記憶內容）、以及為什麼控制組也有 12%（重建本來就會出錯，動詞只是放大）。\n- **紙上推演**：設計一個假想實驗，把「誤導訊息」與「單純的事後猜測」分開（怎麼證明被改的是記憶、不只是回答策略）；把新聞報導「目擊者言之鑿鑿描述了根本不存在的細節」翻成誤導訊息效應的機制鏈；口頭題【全書重要口試】：不看書，把 Loftus & Palmer 兩個實驗與碎玻璃數字講給工程師聽，講到他能複述。\n\n### ch06 — 植入沒發生的童年：lost-in-the-mall 與假記憶的限度\n- **目標**：能講出「整段自傳式假事件可以被植入」的證據、精確數字與近年複製；能同時守住「可植入 ≠ 一切記憶皆假」的防線；能就外推到創傷記憶的倫理爭議**呈現雙方、不選邊**。\n- **必涵蓋**：從 ch05 的「細節污染」升級到 ch06 的「整個事件無中生有」；**lost-in-the-mall 定版**（Loftus & Pickrell 1995，landscape §三，主線 3）——用家人提供的真實童年事件混入一個假事件（五歲在商場走失被年長女士幫助），讓受試者「回憶」；**精確數字（高風險）**：原始 **n=24、約 25%（6 人）形成假記憶**，程度不一；**2023 預先註冊複製（Murphy & Loftus）n=123、約 35%**——**不是孤證**，效應複製成功且比率略高；**確切比率取決於「假記憶」怎麼定義**（2024–25 仍有判準辯論），核心效應（可植入完整自傳式假事件）被廣泛接受；**防線**：可植入≠所有記憶都假，多數日常記憶大致準確；**🔶 倫理／外推爭議雙方並陳**——支持方：機制相同（暗示＋想像＋重複回憶造假記憶），lost-in-the-mall 用於質疑「恢復記憶」療法；批評方：創傷記憶與「商場走失」性質不同、外推有風險；**不替讀者裁決**（記憶戰爭的前哨，ch12 接力）。\n- **不涵蓋**：記憶戰爭的完整政治史與恢復記憶療法（ch12）；DRM 的「無外部誤導」版假記憶（ch07）；source monitoring（ch13）。\n- **橋接**：**寫入放大**——一次「請你回憶商場走失」的提取嘗試，觸發的改寫遠大於「讀一下」：想像＋家人背書＋重複回憶，把一個從未寫入的事件**寫進**了記憶；**冪等性破壞**——理想的 read 應該冪等（讀幾次都一樣），但這裡每次「回憶」都疊加一次寫入，最終生出一個不存在的記錄。\n- **Worked example**：走一遍植入的因果鏈（為什麼這招會成功）——①權威來源（家人）背書降低懷疑→②要求反覆想像細節→③想像生成的影像被編碼進記憶→④來源監控失敗（ch13 伏筆）把「想像的」誤標成「記得的」→⑤每次回憶再強化；對照原始 25%（6/24）與複製 35%（n=123），逐步說明「為什麼複製率更高反而讓結論更穩、而非更鬆」。\n- **紙上推演**：找出壞論證的破綻：「lost-in-the-mall 證明了任何童年記憶都可能是假的」（提示：植入需要特定條件＋防線）；針對「實驗室假事件能外推到創傷記憶嗎」寫出**支持與反對各一段**、且不下結論；口頭題：n=24、6 人——這個樣本數小是不是讓結論站不住？用 2023 複製回答。\n\n### ch07 — DRM：你會記得一個從沒出現的詞\n- **目標**：能講出 DRM 典範證明了「假記憶不需要外部誤導訊息、大腦自己就會腦補」；能說出它為什麼直接打擊「鮮明＝正確」的直覺；能誠實處理「誤記率依清單而異」的數字不確定性。\n- **必涵蓋**：**DRM 定版**（Deese–Roediger–McDermott；羅迪格 & 麥克德莫特 1995，建基 Deese 1959，landscape §四，主線 3）——給一串語意相關的詞（bed, rest, awake, tired, dream…）全指向一個**未出現的關鍵誘餌詞（critical lure）**「sleep」，受試者常「記得」看過 sleep；**數字（守住）**：24 串×15 詞；誤記率**依清單、依 free recall（約 40–55%）vs recognition（可達 80%+）而異**，**不咬死單一百分比**，且受試者對假記憶**確定感極高**、甚至報告「記得當時的細節」（remember 判斷）；為什麼重要——假記憶**內生**：光靠語意聯想，大腦自動激活相關概念、把激活誤認為「看過」（擴散激活＋來源監控失敗，ch13 伏筆）；**鮮明≠正確**第一次正面命中（ch10 閃光燈接力放大）；脊椎接點：提取時的「重建」會把「腦中被激活的」與「真正輸入的」混在一起。\n- **不涵蓋**：來源監控的正式框架（ch13）；閃光燈記憶的鮮明≠正確（ch10）；神經機制（Part III）。\n- **橋接**：**cache 把相關項目一起預取（prefetch）**——看 bed/rest/tired 時，大腦像預取相關 key，把 sleep 也載入了；提取時分不出「sleep 是輸入的還是我預取進來的」；**讀放大／推測執行的副作用**——推測載入的東西污染了你以為的「實際讀到的」。\n- **Worked example**：走一遍一個 DRM 清單的激活鏈——列出 sleep 清單的 15 個詞、標出每個都與 sleep 語意相鄰、說明「sleep 被間接激活到比某些真實出現的詞還強」，因此再認時對 sleep 的「看過」信心可超過對清單中段真實詞的信心；用「依清單而異」誠實標數字範圍（不寫單一百分比），並對照「remember vs know」判斷說明假記憶帶主觀細節。\n- **紙上推演**：自己設計一個 6 詞的 DRM 風格清單、預測哪個是會被誤記的 critical lure 並說明理由；把「我明明記得他說過 X」翻成「X 可能是被語意激活、而非真聽到」的機制鏈；口頭題：DRM 和 ch05 誤導訊息效應都造出假記憶，差在哪一個關鍵點（外部寫入 vs 內生激活）？\n\n---\n\n## Part III — 系統與機制（ch08–11）\n\n### ch08 — 海馬迴與系統鞏固：HM 教我們記憶住在哪\n- **目標**：能講出 HM 案例為什麼是記憶科學的里程碑；能說出「記憶不是單一系統」的鐵證（陳述 vs 程序記憶分離）；能解釋系統鞏固（記憶從海馬迴依賴轉為皮質依賴）以及它仍有的爭議。\n- **必涵蓋**：**HM 定版**（莫萊森 1926–2008，1953 年 27 歲、史科維爾施雙側內側顳葉切除，Scoville & 米爾納 1957，landscape §七，主線 4）——**順行性失憶（anterograde）嚴重但程序記憶（procedural）保留**：鏡像描繪一次比一次好卻不記得練過＝**陳述記憶 vs 程序記憶可分離**＝「記憶是多個系統」的鐵證；**別誇大**：HM 非「完全沒有新記憶」（保留工作記憶、程序學習、部分知覺學習），缺的是把新**外顯記憶**轉成長期儲存；部分逆行性失憶（手術前數年受損、更早童年相對保留）→ 引出**系統鞏固（systems consolidation）**：海馬迴像新記憶的暫存／索引，隨時間把記憶「搬」到皮質長期儲存，搬完後海馬迴依賴下降（解釋為什麼逆行性失憶有時間梯度）；**🔶 標準鞏固模型 vs 多重痕跡理論（multiple trace theory）的爭議**（標準模型：舊記憶終究獨立於海馬迴；多重痕跡：生動的自傳記憶可能永遠需要海馬迴）——主流假說有爭議，不選邊。\n- **不涵蓋**：再鞏固（ch09，這裡是「鞏固＝第一次穩定」，ch09 是「提取後重新可塑」）；情緒對鞏固的調節（ch11）；睡眠在鞏固中的角色（ch15 一句話、不展開）；失智症病理（不涵蓋）。\n- **橋接**：**寫入暫存 → 背景搬到冷儲存**——海馬迴像 write buffer／WAL（先快速寫入），系統鞏固像背景把資料 flush 到耐久層（皮質）；HM 切掉的是 write buffer，所以**舊資料還在（皮質）、但新資料寫不進長期層**；**索引 vs 資料**——一種模型認為海馬迴存的是「指回皮質各處的索引」，搬遷＝索引逐漸不需要（接多重痕跡爭議）。\n- **Worked example**：走一遍 HM 的鏡像描繪實驗——連續幾天練習鏡中描繪星形，**錯誤率一天比一天低（程序記憶在進步）**，但每天他都堅稱**從沒做過這個任務（陳述記憶無法形成）**；逐步說明這個「能力提升但無相關記憶」的解離為什麼直接證明兩個記憶系統可分離、且分別依賴不同腦區。\n- **紙上推演**：把「記憶從海馬迴搬到皮質」翻成一條 WAL→冷儲存的機制鏈，並指出 HM 的損傷打斷了哪一步；針對「系統鞏固標準模型 vs 多重痕跡理論」用逆行性失憶的時間梯度設計一個能區分兩者的假想測試；口頭題：為什麼 HM「能學會新技能卻不記得學過」這件事，比「他什麼都記不住」更有科學價值？\n\n### ch09 — 再鞏固：每次回憶都讓記憶重新可塑（全書高潮之一）\n- **目標**：能講出再鞏固這個**現象**（提取使已鞏固的記憶回到不穩定狀態、需重新穩定、期間可被改寫）；能精確說出原始實驗（大鼠＋anisomycin，**不是 propranolol**）；能就「人體強療法」的臨床爭議**雙方並陳**；這是脊椎「read 觸發 write」的分子兌現。\n- **必涵蓋**：把脊椎收到分子層——ch02 說「提取不是唯讀」，這章給機制；**再鞏固定版**（Nader、Schafe、勒杜 2000 *Nature*，landscape §五，主線 4）——大鼠聽覺恐懼制約，**已鞏固的恐懼記憶被提取後回到不穩定（labile）狀態，此時注入蛋白質合成抑制劑 anisomycin（茴香黴素）到杏仁核會破壞再鞏固、記憶「消失」；不提取就注藥則記憶不受影響**＝提取打開了改寫窗口＝「read 觸發 write」的分子版；**❌ 守住誤傳**：2000 年那篇用的是 anisomycin 不是 propranolol（propranolol 對人有毒性考量、是後來人體線）；**邊界條件（boundary conditions）**：再鞏固不是每次提取都觸發——記憶太舊／太強／提取方式不對（被動再暴露 vs 預測誤差式提取）就可能不進入不穩定狀態（橋接 cache invalidation 條件）；**🔶🔶 人體臨床爭議雙方並陳**：propranolol 人體線（Brunet 2008）——「有效」方（部分試驗、某些 meta）vs「無效」方（2022 否定 meta-analysis、且「破壞再鞏固 vs 增強消退」難分）；**動物現象穩、人體強療法不穩**；**明文標「這是科學討論不是臨床指引」**。\n- **不涵蓋**：系統鞏固（ch08，已鞏固才談再鞏固）；情緒對記憶的調節（ch11）；任何治療／用藥建議（不涵蓋，只談機制與證據現況）。\n- **橋接**：**read-repair / 讀取時順手改寫**——提取（read）順手把記憶改寫（write）回去，這是再鞏固的精確工程鏡像；但**類比在哪裡破掉要明說**：read-repair 是每次讀都觸發、機械且可靠，再鞏固**有邊界條件、不是每次提取都觸發**（並非每次 read 都觸發 write，只有命中特定條件才會）——以實證為準、類比是腳手架。\n- **Worked example**：走一條再鞏固的分子／時序鏈——提取（reactivation）→ 記憶進入 labile state → 開啟蛋白質合成依賴的重新穩定窗口（數小時）→ 若窗口內注入 anisomycin（阻斷蛋白質合成）則無法重新穩定、記憶受損；**對照組（不提取就注藥）記憶完好**——逐步標出「干擾窗口」在時間軸的哪一段、為什麼「先提取」是必要條件；接著誠實轉到人體：把同一邏輯搬到 propranolol＋創傷提取，**為什麼結果遠不如動物乾淨**（雙方並陳）。\n- **紙上推演**：把「每次認真回憶一段往事，都可能在這次回憶中悄悄改寫它」翻成再鞏固的機制鏈、並標出邊界條件讓它不至於變成「記憶每讀必壞」；找出壞論證的破綻：「再鞏固證明我們可以用藥抹除壞記憶」（提示：動物 vs 人體、現象 vs 療法、2022 否定 meta）；口頭題【脊椎核心口試】：用再鞏固解釋「read 觸發 write」，並說出這個類比在哪一點對不上（邊界條件）。\n\n### ch10 — 閃光燈記憶的背叛：鮮明卻錯誤\n- **目標**：能講出「閃光燈記憶」為什麼是迷思重災區；能說出**自信與準確脫鉤**這個全書最重要的彈藥之一；能用 Neisser/Harsch 與 Hirst 的精確數字證明「情緒不讓記憶更準」。\n- **必涵蓋**：閃光燈記憶（flashbulb memory）是什麼——對重大情緒事件「當下我在哪、在做什麼」的高度生動、高度自信的記憶；通行迷思：情緒讓這類記憶**更準**（像閃光燈定格）；**實證恰恰相反（❌）**：**Neisser & Harsch 1992 挑戰者號定版**（奈瑟 1928–2012、哈許，landscape §六）——事發次日 106 人問卷、約 2.5 年後 44 人重答，**記憶嚴重失真**（許多人記錯自己當時在哪在做什麼），而**對錯誤版本極度自信**＝**自信與準確脫鉤**；**Hirst 9/11 十年追蹤**（赫斯特、費爾普斯，數千人）——一致性第一年內快降後平緩、**自信十年維持高檔**，情緒強度**不**預測一致性；結論：閃光燈記憶並不享有準確性豁免，它特殊的是**被回憶的頻率與主觀生動度**，不是保真度；脊椎兌現：生動度是「重建得很流暢」的副產物，不是「讀到了高保真原檔」。\n- **不涵蓋**：杏仁核如何標記情緒記憶的機制（ch11，這裡是行為層「鮮明≠準」，ch11 給神經調節機制）；目擊證詞的自信問題（ch12）；來源監控（ch13）。\n- **橋接**：**高 confidence 分數 ≠ 高正確率**——像一個模型對錯誤預測給出 0.99 信心；你不能用「我超確定」當作正確性的代理指標（calibration 問題）；**被頻繁訪問的熱 key 不代表它的值是對的**——回憶頻率高（熱）讓記憶**感覺**可靠，但頻繁提取反而是反覆再鞏固（ch09）、反覆改寫的機會。\n- **Worked example**：走 Neisser/Harsch 的數字——106→44 人、約 2.5 年；常引「最後一次回憶約 40% 的人有明顯扭曲」「以事實點計約 150/220 完全或部分錯誤」（標 ⚠️、寫量級）；**重點 worked 在「脫鉤」**：把「準確度」與「自信度」當兩個變數，畫出「高自信×低準確」這一格被大量受試者填滿，逐步說明這證明了「主觀生動／自信不是準確的證據」。\n- **紙上推演**：設計一個假想實驗，分辨「閃光燈記憶其實更準」與「只是被回憶更多次因而感覺更準」；把「我永遠忘不了那天的每個細節」翻成「為什麼這份自信反而是危險訊號」的機制鏈（接 ch09 再鞏固）；口頭題：自信與準確脫鉤——這對「目擊者言之鑿鑿」在法庭上意味著什麼（ch12 伏筆）？\n\n### ch11 — 情緒、壓力與杏仁核：為什麼有些記憶燒得特別深\n- **目標**：能講出情緒**確實**會增強記憶的某些面向（被記住的機率、生動度）、但**不**等於提高準確度；能說出杏仁核如何調節鞏固；能處理「情緒記憶又強又可能錯」這個看似矛盾其實一致的圖像。\n- **必涵蓋**：先解一個表面矛盾——ch10 說情緒不讓記憶更準，但你的經驗是情緒事件**確實**記得特別牢，兩者怎麼並存？答案：情緒影響的是**「記住與否／中心細節的生動度」**，不是**「整體保真度」**；**杏仁核（amygdala）的調節角色**——情緒（透過壓力荷爾蒙與杏仁核）調節海馬迴的鞏固，讓情緒事件的**中心要旨**編碼得更強，但**周邊細節反而更差**（武器聚焦效應 weapon focus 一句話、指向 ch12）；壓力的雙刃——適度壓力增強鞏固、過度壓力（與提取時的壓力）損害提取；**情緒記憶的「強」與「錯」並存**：中心生動＋周邊現編＋高自信＝閃光燈記憶的神經底層（回收 ch10）；**明文標臨床邊界**：涉及創傷記憶只談機制、不談治療（再鞏固療法指向 ch09 的爭議，不重開）。\n- **不涵蓋**：再鞏固的分子鏈（ch09，這裡是「情緒對第一次鞏固的調節」）；PTSD 臨床處理（不涵蓋）；閃光燈的行為數據（ch10）。\n- **橋接**：**優先級驅動的資源分配**——情緒像給某些事件打上高 priority flag，讓它們搶到更多鞏固資源（中心細節寫得更牢），代價是周邊細節被降級；**取樣偏差**——「情緒事件記得牢」也有取樣偏差：你反覆回憶它（反覆再鞏固 ch09），不代表它編碼時更準。\n- **Worked example**：走一條情緒調節鞏固的機制鏈——情緒喚起 → 壓力荷爾蒙（如腎上腺素／皮質醇）釋放 → 杏仁核活化 → 增強海馬迴對**中心要旨**的鞏固，同時窄化注意（周邊細節編碼變差）→ 結果：高生動度的中心＋稀疏甚至現編的周邊；用「武器聚焦」當具體例（目擊者死盯著兇器、記不清臉，標「實驗室效應、現實外推有限」並 hedge），逐步說明為什麼「又鮮明又錯」不矛盾。\n- **紙上推演**：把「我對那場車禍記得一清二楚」拆成「中心要旨（可能較準）」與「周邊細節（可能現編）」並各標可信度；設計一個假想實驗分辨「情緒增強的是編碼還是反覆提取」；口頭題：情緒讓記憶「更強」和「更準」是不是同一件事？用杏仁核調節中心 vs 周邊回答。\n\n---\n\n## Part IV — 邊界與應用（ch12–16）\n\n### ch12 — 目擊證詞與冤案：記憶在法庭上\n- **目標**：能把前面所有機制（誤導訊息、自信≠準確、源頭問題）收斂成「為什麼目擊證詞如此危險」；能就「記憶戰爭／恢復記憶」**雙方並陳、不選邊、語氣克制**；能說出制度與個人層面能做與不能做什麼。\n- **必涵蓋**：把全書彈藥裝進法庭——誤導訊息（ch05：警方提問、媒體、其他證人的措辭會污染記憶）＋自信≠準確（ch10：陪審團最信「言之鑿鑿」的證人，而自信不是準確的證據）＋指認程序如何無意間植入（lineup 暗示、確認回饋抬高事後自信）；冤案的真實規模一句話（標「據報、量級」並 hedge：DNA 平反案中目擊誤認是最常見的單一因素之一，landscape 未鎖死數字則 WebSearch 查證後標時點）；**🔶🔶 記憶戰爭（Memory Wars）定版**（landscape §十三）——1980s–90s 壓抑／恢復記憶 vs 假記憶論戰；**2026 現況誠實**：暗示／想像／重複詢問**可以**製造詳盡自信的假記憶（強證據）＝**不等於**「所有恢復記憶都是假的」（確有真實創傷事後才被想起）；「壓抑（repression）」作為特殊機制是否存在**有爭議**；**寫作戒律**：雙方並陳、不寫「科學已證明壓抑記憶是假」也不寫「恢復記憶都是真」，承認對受害者與對冤案的關切**兩者都正當**，**不替讀者做臨床或道德裁決**；制度防禦（盲化指認、錄影問訊、即時記錄信心、專家證詞）vs 個人層面（對自己「言之鑿鑿」的記憶保持工程師式的謙卑）。\n- **不涵蓋**：恢復記憶療法的臨床細節（不涵蓋，只談證據現況）；具體個案的法律分析；來源監控的機制（ch13，本章用其結論、ch13 給框架）。\n- **橋接**：**沒有 audit log 的系統不能當證據**——記憶沒有 provenance、沒有不可變時間戳，把它當「可信日誌」用在高風險決策（定罪）上，就像拿一個會被讀寫污染、無版本控制的快取當 source of truth；**防禦＝把易污染的 read 流程加固**（盲化＝去掉誘導輸入、即時記錄＝在污染前快照）。\n- **Worked example**：走一條真實的污染鏈（以目擊指認流程為骨架）——目擊→初次（低信心）指認→辦案人員無意的確認回饋（「對，就是他」）→事後信心被抬高→出庭時「百分之百確定」；逐步標出每一步是哪個機制（誤導、再鞏固抬升自信、來源混淆），對照「自信在指認當下很低、出庭時很高」這個被記錄到的真實型態，說明為什麼「法庭上的高自信」恰恰最不該被信任。\n- **紙上推演**：針對「一個證人非常自信，所以他的證詞很可靠」寫出反駁（援引 ch10 脫鉤＋本章污染鏈）；就「恢復的童年創傷記憶」寫出支持其可能為真與可能為假**各一段**、且不下結論；口頭題：如果你要設計一套「盡量不污染目擊記憶」的問訊流程，你會加哪三個防護（對照你怎麼防一個易被污染的 read 路徑）？\n\n### ch13 — 來源混淆、既視感與無意識抄襲：記憶哪來的，是現推的\n- **目標**：能講出來源監控框架（記憶不附帶來源標籤、來源是事後推斷）為什麼是假記憶的**統一解釋**；能用它解釋既視感、隱記症等一票現象；能把「記憶沒有 provenance」這個工程橋用到底。\n- **必涵蓋**：**來源監控定版**（強生 Johnson 等 1993，landscape §十一）——**記憶不附帶「來源標籤」**（大腦不會在記憶上貼「親眼看到／聽說的／想像的／夢到的」），來源是**事後依記憶特徵（生動度、知覺細節、認知運作痕跡）推斷出來的**，因此可**歸錯來源（source misattribution）**；這是把前面所有假記憶（DRM 內生、誤導植入、想像膨脹）統一起來的框架——真假記憶用**同一套機制**產生、只差來源歸因對不對；**隱記症（cryptomnesia，無意識抄襲）**：把舊接觸的念頭誤認為自己原創＝來源監控失敗的一種（記得內容、忘了來自別人）；**🔶 既視感（déjà vu）**：把當下新經驗誤判為「曾經歷過」＝熟悉感（familiarity）與回想（recollection）解離／來源時序歸因錯誤；**機制多競爭假說、未定論**（顳葉小放電說、雙路徑說、格式塔熟悉說），寫「一種被廣泛討論的解釋是…」不斷言；脊椎接點：「這段記憶哪來的」每次提取都**現推**，所以會推錯——記憶沒有 provenance。\n- **不涵蓋**：DRM／誤導的原始實驗（ch05/ch07，本章用其結論給統一解釋）；法庭應用（ch12）；HSAM 的來源問題（ch14 一句話接力）。\n- **橋接**：**記憶沒有 provenance／audit log**（金句）——分散式系統靠 trace id／來源欄位知道「這條資料哪來的」，記憶**沒有這個欄位**，「來源」是每次提取時根據資料長相**現推的 metadata**，所以會推錯；**reconstructed metadata**——既視感＝熟悉度這個 metadata 被算成 true、但「何時何地」這個欄位是空的、推不出來。\n- **Worked example**：走一條來源混淆造出假記憶的鏈——你想像過一個場景（編碼了生動影像）→ 一段時間後提取，影像很生動 → 大腦用「生動＝多半是真經歷」這條啟發式推斷來源 → 把想像誤標成「真的發生過」；對照 DRM（ch07）：sleep 被內生激活也是生動的，同一條來源啟發式把它誤判成「看過」——**逐步說明一個框架如何同時解釋兩種看似不同的假記憶**。\n- **紙上推演**：把「我以為這個點子是我想到的，後來發現是看過的」歸因到來源監控的哪一步、是哪種 misattribution；給既視感的「顳葉放電說」與「雙路徑熟悉說」各寫一句、並說明為什麼目前不能斷言哪個對；口頭題：「記憶沒有 provenance」——把這句話講給工程師，並說出它如何一口氣解釋 DRM、誤導植入、既視感、無意識抄襲。\n\n### ch14 — 記憶高手與超憶症：記憶宮殿與 HSAM\n- **目標**：能講出「過目不忘／完美記憶」是迷思、HSAM 的真實樣貌；能說出**HSAM 者照樣被植入假記憶**＝脊椎的實驗化身；能講清楚記憶宮殿為什麼有效、且它是「善用重建機制」而非反例。\n- **必涵蓋**：**HSAM 定版**（McGaugh 麥高夫團隊 2006 首例「AJ」＝Jill Price 普萊斯；LePort 勒波特 2012 命名 HSAM，landscape §九）——**❌「完美記憶／過目不忘」是嚴重誤傳**：HSAM 只在**自傳式（那天發生什麼）**這一狹窄領域超群，對**死記材料（rote）並不優於常人、甚至有些更差**；Jill Price 傳統記憶測驗平平、學業普通、能力是強迫式不請自來的回放（伴隨困擾，回收 ch03「遺忘是功能」）；**🔶 全書最關鍵彈藥（脊椎實驗化身）**：LePort 等發現 **HSAM 者一樣產生假記憶**——DRM 誤記關鍵誘餌詞、誤導訊息測驗中假記憶**甚至高於對照組**——即「就算你記得每一天，你的記憶照樣是重建的、照樣會被植入」；**記憶宮殿（method of loci）定版**（landscape §十）——**真有效**（Dresler 2017 *Neuron*：6 週訓練向記憶運動員靠攏；2025 BJP meta 大效應量），但有效**正因為**它順著「記憶是建構的、空間／生動意象特別好記」的特性＝**善用重建機制**，記憶冠軍編碼強、但記憶**一樣是重建的、一樣會錯**；**別把記憶冠軍說成天生神腦**（可訓練、差異主要來自策略）。\n- **不涵蓋**：記得更牢的可操作技巧（ch15）；HSAM 的神經解剖細節；來源監控（ch13，本章用其結論說 HSAM 也會源頭錯）。\n- **橋接**：**強 indexing ≠ 不可變存儲**——HSAM 像有超強的自傳事件**索引**（能 O(1) 跳到任一天），但被索引的**資料本身仍是重建的、可被污染**——索引強不代表存儲是 immutable；**記憶宮殿＝刻意設計編碼的 locality**——把要記的掛在熟悉空間路線上＝給資料設計好的 access pattern／locality，順著系統特性優化（呼應你的 profiling 驅動優化直覺）。\n- **Worked example**：走一遍「HSAM 者被植入假記憶」的研究邏輯——HSAM 受試者在 DRM 清單上照樣誤記 critical lure、在誤導訊息典範中對幻燈片細節的假記憶率**不低於甚至高於**對照組；逐步說明這為什麼是脊椎最強的單一證據（記憶準確度的「上限人類」都逃不過重建污染⇒重建是記憶的本質、不是缺陷個案）；對照記憶宮殿：冠軍把數字串編成空間漫遊，**編碼**強到驚人、但若被誤導訊息污染照樣會錯。\n- **紙上推演**：找出壞論證的破綻：「既然有人能記得每一天，可見人腦本來就能完美記錄、只是大多數人沒開發」（提示：HSAM 自傳式≠死記、且照樣被植入）；把記憶宮殿的有效性翻成「為什麼它順著重建機制而非對抗它」的機制鏈；口頭題：HSAM 者也會被植入假記憶——這句話為什麼是整本書脊椎的最強證據？\n\n### ch15 — 怎麼記得更牢：間隔、提取，與一句話的睡眠\n- **目標**：能講出測試效應與間隔效應為什麼是**真穩固**的正面結論、且**機制與脊椎一致**（提取練習鍛鍊的是重建通路本身）；能誠實標出「實驗室極穩、教室落地有折扣」；能把睡眠鞏固一句話帶過、不展開機制。\n- **必涵蓋**：先擺正基調——本書大半在拆迷思，這章是**少數「真的穩、真的可用」**的區域，避免讀者誤以為「記憶科學只會潑冷水」；**測試效應（testing effect／retrieval practice，提取練習）定版**（landscape §十二）——**主動提取（考自己）比重讀更能鞏固長期記憶**，Roediger & Karpicke 2006 引爆，被稱人類記憶研究**最穩健的現象之一**，Rowland 2014 meta：初次提取成功率高（>75%）效應更強；**間隔效應（spacing effect）**——分散練習勝過集中（臨時抱佛腳），複製度最高的發現之一（Ebbinghaus 本人已觀察，回收 ch03）；**⚠️ 誠實標**：教室真實效應量比實驗室小、依執行細節（寫「實驗室極穩、教室落地有折扣但方向一致」）；**與脊椎的連結（關鍵）**：正因記憶是**重建**，每次提取就是一次重建練習——提取練習有效是因為它**鍛鍊重建／通路本身**，不是「重新讀檔」——把正面技巧也收進脊椎、不是例外；**睡眠：只一句話**——「睡眠對鞏固很重要、且可能與遺忘曲線 24 小時小上揚有關，但**機制本書不展開**（分期—記憶對應仍是研究中的細節）」，明說「不展開」。\n- **不涵蓋**：睡眠分期—記憶鞏固的機制（**全書只此一句、不展開**，landscape 全域不涵蓋）；SRS 軟體／排程演算法（不涵蓋）；記憶宮殿（ch14）；任何「七天速成」式承諾。\n- **橋接**：**提取練習＝故意觸發 read 來強化路徑**——不是讀檔，是每次重建都讓重建通路更穩（像反覆走熱路徑讓它被優化／JIT 編譯）；**間隔＝避免在 cache 還熱時重複命中**（剛讀完就重讀＝命中熱 cache、沒鍛鍊到重算路徑；間隔後再提取＝強迫重算，效果更好）；呼應你的 profiling 直覺——**量測哪條路徑慢、針對性鍛鍊**。\n- **Worked example**：走一遍測試效應的代表性數字——重讀組 vs 提取練習組，初期重讀組「感覺更熟」（流暢度錯覺），但延遲測驗（一週後）提取練習組保留率顯著更高（標 landscape／查證的量級，hedge）；逐步說明「為什麼學習當下的『感覺記得』（流暢度）是個誤導指標」（呼應 ch10 自信≠準確），以及 Rowland「初次提取成功率>75% 效應更強」怎麼指導實作。\n- **紙上推演**：把「臨時抱佛腳隔天就忘、但分散背三次記很久」翻成「集中＝命中熱 cache 沒鍛鍊重算／間隔＝強迫重算」的機制鏈；找出壞論證的破綻：「重讀課本三遍比考自己一遍更扎實，因為看得更熟」（提示：流暢度錯覺 vs 延遲保留）；口頭題：提取練習有效，為什麼說它「順著脊椎」而不是脊椎的例外？\n\n### ch16 — finale：大腦怎麼編造過去——六主線口試\n- **目標**：把全書收成一條能口頭講完的故事線；用六條驗收主線當口試題完成總自我檢核；守住「重建≠全不可信」的最終防線；知道讀完往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**脊椎收束**——記憶不是錄影回放：三關卡（ch02）每關都會出錯 → 大腦用 schema 自發重建（ch04）→ 外部措辭污染（ch05）→ 整段事件可被植入（ch06）→ 連內生語意激活都造假記憶（ch07）→ 海馬迴／系統鞏固告訴我們記憶住在哪、是多系統（ch08）→ 提取打開再鞏固窗口、「read 觸發 write」兌現（ch09）→ 鮮明卻錯、自信與準確脫鉤（ch10/ch11）→ 法庭與日常的後果（ch12/ch13）→ 連記憶上限的人都逃不過（ch14）→ 但同一套重建機制也能被善用（ch15）；**「同一句話」收線**：每次回憶都在問「這是 read，還是 read 觸發了 write？」；**六主線口試**（逐條出口頭題＋每題「模範答案要點清單」，檢核表式不是逐字稿）——對齊 style-guide 的六條驗收主線；**最終防線重申**：重建論說的是「可被污染、鮮明≠正確」，**不是「記憶全不可信」**——一個冷靜的結論，不是虛無主義；**與記憶科學的當代態度**：敢說「這我們還不知道」（再鞏固臨床、記憶戰爭、déjà vu）正是它可信的來源；下一步地圖（對應附錄 C）：往機制走（神經科學）、往應用走（學習科學的穩固部分）、往爭議走（記憶與法律／倫理）。\n- **不涵蓋**：任何新概念／新研究；「補完所有遺漏」的誘惑（明寫刻意留下的洞：睡眠鞏固機制、engram 標記技術、發展性失憶、跨文化記憶——以及為什麼留）。\n- **橋接**：回到 ch01 的你——當時默認記憶像錄影帶，現在你能說出哪一關會污染、為什麼自信反而危險、連 HSAM 都會被植入；用「你現在怎麼看待自己一段『鮮明』的童年記憶」做成長對照（冷靜的震撼：有一大半可能是這次回憶當下現編的）。\n- **Worked example**：「大腦怎麼編造過去」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞：三關卡／提取即重寫／schema／誤導訊息／植入／DRM／海馬迴鞏固／再鞏固／自信≠準確／來源監控／HSAM 也會錯／重建≠全不可信）。\n- **紙上推演**：六條主線口試題正式作答（口頭、各 3–5 分鐘，對照要點清單自評）；給「記憶就是大腦如實錄下的過去」這句話寫一段反駁（200 字內、含一個具體研究數字）；給「既然記憶都是編造的，那一切回憶都不可信」寫一段**反向反駁**（守防線、200 字內）；一年後重讀清單：哪三章值得重讀、各自觸發條件（遇到什麼場景）。\n\n---\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 名詞與讀法速查表\n全書術語總表：中文／English／怎麼唸出來（口頭驗收用：reconsolidation 唸「re-con-solidation」、hippocampus 唸「海馬迴」、amygdala 唸「a-MIG-da-la」、schema 唸「基模」、DRM 唸字母、critical lure…）／白話一句話意義／首次出現章。從各章實際用過的術語 grep 彙整，**不收書中沒出現的術語**。與 style-guide 的術語對照表交叉核對、不得衝突。\n\n### 附錄 B — 關鍵研究與人物\n研究／人物表：原文／中譯／年份／樣本數／核心結論一句話／嚴謹度記號（✅/⚠️/❌/🔶）／首次出現章——全部從 landscape 與各章實際內容萃取、數字鎖 landscape（lost-in-the-mall n=24→123、Loftus & Palmer n=45／150、Neisser/Harsch 106→44、HM 1953/27 歲、DRM 24×15…）。人物含 Bartlett、Loftus、Pickrell、Roediger、McDermott、Deese、Nader、LeDoux、Schafe、Brunet、Neisser、Harsch、Hirst、Phelps、Molaison、Scoville
