erback/9780691182858/the-calculus-gallery ）——以原典級證明走一遍從 Newton 到 Lebesgue 的畫廊。Bressoud《Calculus Reordered: A History of the Big Ideas》（Princeton UP，2019；https://press.princeton.edu/books/hardcover/9780691181318/calculus-reordered ）——以累積、變化比、級數、容差四大主軸重排微積分史。\n- **判定**：確認。\n\n### 34. Paul's Online Math Notes\n- https://tutorial.math.lamar.edu/ （Lamar University，Paul Dawkins；2026-06 仍在線）——Algebra 到 Calculus I–III、微分方程的免費筆記。\n- **判定**：確認。\n\n### 35. Needham《Visual Complex Analysis》25 週年版\n- 25th Anniversary Edition，Oxford University Press，2023-02 出版，720 頁，新增 Roger Penrose 序與全部 501 張圖的完整說明文字；精裝 ISBN 9780192868916、平裝 9780192868923（https://global.oup.com/academic/product/visual-complex-analysis-9780192868923 ）。\n- **判定**：確認。\n\n---\n\n## F. 基準數值複核（本檔自行複核，2026-06-12，Python 3 雙精度）\n\n### 36. (1+1/n)ⁿ 逼近 e\n- n=12：2.613035…（≈ 2.6130 ✓）；n=365：2.714567…（≈ 2.7146 ✓）；e = 2.718281828…（≈ 2.71828 ✓）。\n- **判定**：確認（本檔自行複核）。\n\n### 37. Euler 法 dy/dt = y, y(0)=1, 算到 t=1\n- 步長 0.1：(1.1)^10 = 2.5937424601（≈ 2.5937 ✓）；步長 0.01：(1.01)^100 = 2.704813829…（≈ 2.7048 ✓）。\n- **判定**：確認（本檔自行複核）。\n\n### 38. 三個基準常數\n- 交錯調和級數 1 − 1/2 + 1/3 − … = ln 2 = 0.693147…（≈ 0.6931 ✓）；Basel 和 π²/6 = 1.644934…（≈ 1.6449 ✓）；芝諾配置（阿基里斯 10 m/s、烏龜 1 m/s、讓先 100 m）追上點 = 100·10/(10−1) = 1000/9 = 111.111… m（≈ 111.11 m ✓）。\n- **判定**：確認（本檔自行複核）。\n\n### 39. 方波傅立葉級數與 Gibbs 現象\n- 方波（±1）的傅立葉級數 = (4/π)(sin x + sin 3x/3 + sin 5x/5 + …) ✓。Gibbs overshoot：部分和峰值 → (2/π)·Si(π) = 1.178979…，超出量 0.178979…，**相對於整個跳躍幅度（2）為 8.949 %**——「約 9 %（精確值 8.95 %）」成立。**引用時注意分母**：若誤以半跳躍（1）為分母會變成 17.9 %，坊間兩種寫法混用，本書一律以「跳躍幅度的 8.95 %」表述。\n- **判定**：確認（本檔自行複核：Simpson 法算 Si(π) = 1.851937）。\n\n### 40. ∫₀¹ x² dx 與黎曼和\n- 精確值 1/3 ✓；n=4 左黎曼和 = (0²+0.25²+0.5²+0.75²)/4 = 0.21875 ✓；右黎曼和 = (0.25²+0.5²+0.75²+1²)/4 = 0.46875 ✓。\n- **判定**：確認（本檔自行複核）。\n\n---\n\n## 傳說與軼事註記（引用時必須標明性質）\n\n- **牛頓的蘋果**：⚠️ 傳說等級的軼事。有十八世紀文獻（如 Stukeley 回憶錄轉述牛頓晚年自述）支持「見蘋果落下而思重力」，但「蘋果砸到頭」是後世渲染；本次掃描未逐一查證細節，書中引用一律寫「傳說」。\n- **阿基米德「Eureka」裸奔、「別弄壞我的圓」**：⚠️ 傳說，出自後世（Vitruvius、Plutarch 等）轉述，不可當史實引用。\n- **Grandi 的上帝創世論證**（見第 15 條）：**非傳說**，有原典文獻，可直接引用。\n- **Ramanujan 瘋人院妙語**（見第 24 條）：**非傳說**，但出自第二封信。\n\n## 本次掃描摘要（2026-06-12）\n- 全部 40 條皆已查證或自行複核；無條目停留在「⚠️ 未能確認」（僅傳說註記中兩條軼事性質本身標 ⚠️）。\n- 對常見說法的修正：Madhava π 採 11 位非 13 位（第 7 條）；阿基米德是有限和＋雙重歸謬非直接無窮求和（第 3 條）；−1/12 名句在第二封信（第 24 條）；「Barrow＝牛頓的老師」為簡化（第 11 條）；Gibbs 9 % 的分母是整個跳躍（第 39 條）；∫ 與 d 的手稿與印行年份要分開講（第 10 條）。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書《馴服無限：微積分的直覺與驚嘆》的跨章一致性基準、脆弱事實清單、掃描協定與日誌。改任何基準數字，必須照表全書同步。歷史與時效性事實以 `landscape-2026-06.md` 為錨；數學內容不依賴 landscape 但必須自我複核。\n\n## 一、跨章基準數值表（改任何一個必須照表全書同步）\n\n| 基準 | 值 | 出現章 |\n|---|---|---|\n| **脊椎「同一題三算」** | ∫₀¹ x² dx ＝ 1/3：阿基米德幾何級數（4/3 弓形版）→ 黎曼和硬算 → FTC 一行解 | ch02 / ch07 / ch08 / ch16 |\n| 黎曼和數值 | 左和 n=4 ＝ 0.21875、右和 n=4 ＝ 0.46875；右和通式 1/3 + 1/(2n) + 1/(6n²) → 1/3 | ch07 / ch16 |\n| 切點割線表 | f(x)=x² 在 x=3：h=1→7、h=0.1→6.1、h=0.01→6.01、極限 6；一般化 f′(x)=2x；((3+h)²−9)/h = 6+h | ch04 |\n| 芝諾配置 | 阿基里斯 10 m/s、烏龜 1 m/s、讓 100 m；追上點 1000/9 ≈ 111.11 m；追上時間 100/9 ≈ 11.11 s | ch01 / ch03 / ch16 |\n| 幾何級數 | Σ(n=0→∞) rⁿ = 1/(1−r)（\\|r\\|<1）；1/2 + 1/4 + 1/8 + … = 1；backoff 1+0.5+… = 2 s | ch01 / ch03 |\n| 0.999… = 1 | ＝ Σ(n=1→∞) 9/10ⁿ；三論證（10x−x／幾何級數／ε 挑戰賽）；N = ⌈log₁₀(1/ε)⌉+1（邊界取整誠實處理） | ch03 |\n| e 複利表 | (1+1/n)ⁿ：n=1→2、n=12→2.6130、n=365→2.7146、極限 e ≈ 2.71828 | ch05 / ch09 |\n| 梯度下降 | f(x)=x²、η=0.1、x₀=3，xₙ₊₁=0.8xₙ：3 → 2.4 → 1.92 → 1.536 → 1.2288 → 0.98304；η=1.1 發散 | ch06 / ch15 |\n| 圍籬問題 | 周長 40、A(x)=x(20−x)、A′=20−2x=0 → x=10、面積 100（正方形） | ch06 |\n| Euler 法 | dy/dt=y, y(0)=1, t=1：步長 0.1 → (1.1)¹⁰ ≈ 2.5937、步長 0.01 → (1.01)¹⁰⁰ ≈ 2.7048、精確 e ≈ 2.71828 | ch10 |\n| sin 泰勒 | sin x = x − x³/6 + x⁵/120；sin(0.5) 部分和 → 0.479166→0.479427，真值 0.4794255 | ch09 |\n| 調和級數 | Σ1/n 發散（Oresme 分組：1/3+1/4>1/2…）；部分和 ≈ ln n | ch09 / ch12 |\n| Basel | Σ1/n² = π²/6 ≈ 1.6449 | ch09 |\n| Euler 公式 | e^{iθ} = cosθ + i·sinθ；θ=π → e^{iπ}+1=0（明標形式操作） | ch09 |\n| 方波傅立葉 | (4/π)(sin x + sin3x/3 + sin5x/5 + …)；x=π/2 部分和 (4/π)(1−1/3+1/5)=52/(15π)≈**1.10347**（**非 1.0383**，2026-06-12 修正） | ch11 |\n| Gibbs 現象 | 過衝峰值 (2/π)·Si(π) ≈ 1.1789；過衝 ≈ **8.95%**（分母＝整個跳躍幅度 2；半跳躍慣例會變 17.9%，書中明標慣例）；Si(π)=1.8519 | ch11 |\n| Grandi | 1−1+1−1+…：部分和擺盪 1,0,1,0，**無極限**（不是 1/2；Cesàro 和才是 1/2） | ch12 |\n| 交錯調和 | 1−1/2+1/3−… = ln 2 ≈ 0.6931；重排可達任意值（黎曼重排定理） | ch12 |\n| −1/12 | 1+2+3+… **發散**；ζ(−1)=−1/12 是解析延拓賦值；Ramanujan「瘋人院」句出**第二封信 1913-02-27** | ch12 |\n| Weierstrass | W(x)=Σ aⁿcos(bⁿπx)；原始條件 0<a<1、b 正奇數、ab>1+3π/2（最小 b=7）；Hardy 1916 放寬 ab≥1；手算用 a=1/2,b=3（誠實標示違反原始條件，僅供堆疊直覺） | ch13 |\n| 常態 68% | 標準常態 φ(x)=e^(−x²/2)/√(2π)；σ 區間 4 條中點黎曼和 ≈ 0.68781 vs 精確 0.68269（68.27%） | ch15 |\n| backprop 記帳 | f(x)=(3x+1)²，鏈式 df/dx=2(3x+1)·3=18x+6；x=1 → 24 | ch15 |\n| 數字精度 | π≈3.14159、e≈2.71828、ln2≈0.6931、√2≈1.41421 | 全書 |\n\n## 二、脆弱事實清單（最可能寫錯／需特別守住的；歷史細節以 landscape 為準）\n\n這些是「坊間常見講法需要修正」或「容易記錯」的點，landscape-2026-06 已逐條查證：\n\n1. **阿基米德《拋物線求積》**：是**有限和恆等式＋雙重歸謬**，不是「直接加總無窮級數」（當年沒有極限）。措辭不可寫成「阿基米德對無窮級數求和」。（ch02）\n2. **Madhava/Kerala**：π 精度採 **11 位小數**（MacTutor；坊間「13 位」不採用）；成果全經 Jyesthadeva／Nilakantha 等後世文本轉述，Madhava 親著已佚。（ch09）\n3. **Ramanujan「瘋人院」句**：出**第二封信（1913-02-27）**，不是第一封（1913-01-16）。（ch12）\n4. **Barrow 與牛頓**：「牛頓的老師」是通俗簡化；精確為劍橋首任 Lucasian 教授前任／提攜者。FTC 先驅排序：Gregory 1668 先發表、Barrow 約 1670 更一般。（ch08）\n5. **萊布尼茲記號日期**：∫ 手稿 1675-10-29、∫…dx 1675-11-11；d 記號印行 1684《Nova Methodus》、∫ 印行遲至 1686。（ch04）\n6. **Gibbs 8.95%**：分母是**整個跳躍幅度**；以半跳躍計＝17.9%。兩種慣例坊間混用，書中明標用前者。（ch11）\n7. **Berkeley 名句**：「ghosts of departed quantities」定位《The Analyst》§XXXV。（ch04）\n8. **Weierstrass 函數**：1872 柏林科學院發表、du Bois-Reymond 1875 印行（Crelle 79）；條件見基準表。（ch13）\n9. **Fourier 史線**：1807 備忘錄→Lagrange 反對→1822 專書→Dirichlet 1829→Cantor 1870–72 唯一性問題催生集合論。（ch11/ch14）\n10. **牛頓蘋果、阿基米德 Eureka**：傳說，引用須標「傳說」。（ch01 不用蘋果；ch02 不用 Eureka）\n11. **Kahan summation（1965, CACM）**：已查證但章內未加 hedge；屬已驗證事實，無須改，惟列此備查。（ch12）\n12. **碳-14 半衰期 5730±40 年**：ch10 有 inline hedge。（ch10）\n13. **海王星**：Le Verrier/Adams 預測、Galle 1846-09-23 當晚在預測位置約 1° 內尋獲。（ch10）\n\n## 三、結構與寫作鐵則（新增內容不得違反）\n\n- 章節骨架七段固定，標題照抄（一致性掃描會 grep）：章首 blockquote 111.11 m | ch01 |\n| 幾何級數 | Σ(n=0→∞) rⁿ = 1/(1−r)（|r|<1）；1/2 + 1/4 + 1/8 + … = 1 | ch01（直覺）／ch03（正式） |\n| 0.999… | 0.999… = Σ(n=1→∞) 9/10ⁿ = 1 | ch03 |\n| e 基準 | (1+1/n)ⁿ：n=1→2、n=12→2.6130、n=365→2.7146、極限 e ≈ 2.71828 | ch05 |\n| 梯度下降基準 | f(x)=x²、學習率 η=0.1、起點 x₀=3：xₙ₊₁ = xₙ − η·2xₙ = 0.8xₙ，5 步迭代表 | ch06 |\n| 調和級數 | Σ 1/n 發散（Oresme 分組論證）；部分和 ≈ ln n | ch09 首次、ch12 深掘 |\n| Basel | Σ 1/n² = π²/6 ≈ 1.6449 | ch09 |\n| Euler 法基準 | dy/dt = y、y(0)=1、t=1：步長 0.1 → (1.1)¹⁰ ≈ 2.5937、步長 0.01 → ≈ 2.7048、精確值 e ≈ 2.71828 | ch10 |\n| 方波傅立葉 | 方波 = (4/π)(sin x + sin 3x/3 + sin 5x/5 + …)；Gibbs overshoot ≈ 9%（精確值照 landscape） | ch11 |\n| Grandi | 1 − 1 + 1 − 1 + …：部分和擺盪 1, 0, 1, 0…，無極限（不是 1/2） | ch12 |\n| 交錯調和 | 1 − 1/2 + 1/3 − … = ln 2 ≈ 0.6931；重排可收斂到任意值（Riemann 重排定理） | ch12 |\n| Weierstrass 函數 | W(x) = Σ aⁿ cos(bⁿπx)；原始條件 0<a<1、ab > 1+3π/2（現代放寬版照 landscape） | ch13 |\n| 數字精度 | π ≈ 3.14159、e ≈ 2.71828、ln 2 ≈ 0.6931；全書不得互相矛盾 | — |\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀）：積分技巧大全（部分分式、三角代換…）、ε-δ 解題操練、多變數微積分系統教學（梯度只在 ch06/ch15 直覺帶過）、測度論與 Lebesgue 積分（ch14 一句話）、複變函數論（e^{iθ} 只到直覺）、實分析完整課程、任何考題形式的操練。\n\n---\n\n## Part I — 恐懼與第一次圍捕（ch01–03）\n\n### ch01 — 芝諾的箭：人類為什麼怕無限\n- **目標**：讀完能說出微積分到底在「馴服」什麼（無限、連續、瞬間），以及為什麼這個問題卡了人類兩千年；能畫出全書地圖。\n- **必涵蓋**：三個芝諾悖論（二分、阿基里斯、飛矢——轉述形式照 landscape）；它們不是腦筋急轉彎而是真問題：「無限多步」「無限可分」「瞬間」三個概念當年都沒有定義；希臘人對 actual infinity 的迴避；偷看答案：1/2+1/4+… = 1（幾何級數直覺版，基準表），「無限多項加起來是有限值」這句話的奇怪之處——精確化留給 ch03；本書路線圖（基準圖首次出場）＋六條驗收目標開宗明義。\n- **不涵蓋**：極限的正式定義（ch03）；級數收斂理論（ch09/ch12）；飛矢悖論的完整解（ch04 瞬間速度才解）。\n- **橋接**：exponential backoff——重試間隔 1s, 0.5s, 0.25s…「無限多次重試」總共只花 2s，你早就用過收斂的幾何級數；遞迴的終止條件直覺 vs「無限步但有限總量」。\n- **Worked example**：芝諾配置（基準表）手算：阿基里斯跑到烏龜起點時烏龜又前進多少——前 5 段的距離表與部分和，看見部分和逼近 1000/9 ≈ 111.11 m；再用國中代數（相對速度）一行解出同一答案——「兩個答案一致，所以悖論錯在哪？」懸念收尾。\n- **紙上推演**：用 backoff 總時間算一個幾何級數；把「飛矢不動」的論證寫成三段論並指出哪一句偷渡了未定義概念；對「無限多步不可能完成」給出你此刻最好的反駁（ch03 會回收評分）。\n\n### ch02 — 窮盡法：阿基米德的絕技\n- **目標**：能重講阿基米德如何用「內外夾擠」在沒有極限概念的情況下算出精確面積；能說出窮盡法偉大在哪、又為什麼不是微積分。\n- **必涵蓋**：Eudoxus 窮盡法的思想（歸屬照 landscape）；阿基米德夾 π：內接／外切多邊形 6→12→24→…→96 邊，223/71 < π < 22/7（數據照 landscape）；《拋物線求積》：弓形面積 = 內接三角形的 4/3，靠 1 + 1/4 + 1/16 + … 的幾何論證（同一題三算之第一算——明寫「這就是 ∫₀¹x²dx 的近親，ch07 黎曼和、ch08 FTC 會再回來」）；《方法》與 Palimpsest 的故事（照 landscape）：阿基米德私下用「準積分」思維發現、再用窮盡法嚴格證明——發現的邏輯 vs 證明的邏輯；**為什麼之後卡了 1800 年**：每題都是手工藝、沒有通法；缺座標幾何（Descartes）與代數記號這兩塊積木。\n- **不涵蓋**：黎曼和的正式定義（ch07）；極限語言（ch03）；17 世紀前奏細節（Kepler/Cavalieri 一句話帶過即可）。\n- **橋接**：負載測試找容量上限——你從上下兩側夾出系統容量（能扛住的 QPS 下界、壓垮的 QPS 上界），夾到誤差夠小為止；二分搜尋的「上下界收緊」就是窮盡法的演算法靈魂。\n- **Worked example**：拋物線弓形 4/3 論證的前三層手算：第一層三角形面積記 1，第二層補 1/4，第三層補 1/16，部分和表 1 → 1.25 → 1.3125 → … → 4/3；π 夾擠做 6→12 邊形的一步遞推（不用做到 96 邊，講清楚機器怎麼轉）。\n- **紙上推演**：續算弓形第四層並驗證部分和；解釋「為什麼內接多邊形永遠是下界」給一個不服氣的人聽；窮盡法為什麼需要「反證法收尾」而不能直接說「取極限」——指出缺的概念。\n\n### ch03 — 極限：逼近的語言\n- **目標**：能說出極限的精確意義（「要多近有多近」的挑戰賽結構）；能用它解掉芝諾與 0.999…；理解這是全書三核心動作的第一個、也是另外兩個的地基。\n- **必涵蓋**：數列極限的直覺→精確化：ε 挑戰賽（你出多小的誤差 ε，我都給得出 N，之後全在 ε 內）——故事版講透，符號版點到（正式 ε-δ 在 ch14）；lim(n→∞) 1/n = 0 的挑戰賽完整走一遍；幾何級數正式收斂（基準表）；**0.999… = 1**：三種論證（10x−x 代數版、幾何級數版、ε 挑戰賽版）＋誠實指出代數版的循環依賴（它假設了 0.999… 是個良定義的數、且可以逐項運算）；回收 ch01：芝諾的「無限多步」在極限語言下不再神祕——部分和數列收斂，悖論的「不可能完成」混淆了「項數無限」與「總量無限」；「極限是逼近的目的地，不是過程的最後一步」——沒有「最後一項」。\n- **不涵蓋**：函數極限與連續的正式定義（ch04 用到多少講多少、ch14 正式）；級數收斂判別法（ch09）；實數完備性（ch14）。\n- **橋接**：浮點比較 `abs(a-b) < eps`——你每天在寫 ε；監控收斂（deploy 後錯誤率「穩定到」基線）；SLA 的容差思維：保證的是「誤差界」不是「精確值」。\n- **Worked example**：0.999… = 1 的三種論證並排，逐一標出每種論證「假設了什麼」；ε 挑戰賽版完整對局記錄（ε=0.001 → N=4，一般 ε → N = ⌈log₁₀(1/ε)⌉）。\n- **紙上推演**：對 lim 1/2ⁿ = 0 打一場挑戰賽（給定 ε=1/1000 找 N、再寫一般式）；找出「0.999… 比 1 小一點點」直覺的確切錯處（「小的那一點點」是多少？）；回收 ch01 推演：用極限語言重寫你當時對芝諾的反駁，對比評分。\n\n## Part II — 微分：抓住瞬間（ch04–06）\n\n### ch04 — 瞬間速度：把 0/0 變合法\n- **目標**：能講清楚「瞬間變化率」這個詞為什麼本來是自相矛盾的、極限怎麼救了它；會從割線斜率表親手逼出導數；解掉飛矢悖論。\n- **必涵蓋**：瞬間速度的悖論：速度 = 距離/時間，但「瞬間」的距離和時間都是 0，0/0 無意義；割線→切線：f(x)=x² 在 x=3 的割線斜率表（基準表），h 縮小、斜率逼近 6——**導數 = 差商的極限**，不是「0/0 的值」；定義 f′(x) = lim(h→0) (f(x+h)−f(x))/h，對 x² 一般化得 2x；兩套記號（f′ 與 dy/dx）與兩個發明人（Newton 流數 vs Leibniz 微分，故事照 landscape；優先權之爭一段——兩人獨立發明、皇家學會調查的內幕當歷史教訓）；Berkeley「ghosts of departed quantities」之譏（照 landscape）——當年的批評是對的，嚴格回應留給 ch14；飛矢悖論收尾：瞬間速度不是「瞬間裡的運動」而是極限，芝諾第三箭解掉。\n- **不涵蓋**：微分規則系統（ch05）；最佳化（ch06）；ε-δ 正式定義（ch14）；無窮小的嚴格平反（ch14 Robinson）。\n- **橋接**：你做 profiling 時早就微分過——QPS 是「請求數 counter 對時間的變化率」、Prometheus 的 rate() 就是在算差商；取樣窗口縮小 = h→0 的工程版（以及為什麼窗口太小雜訊爆炸——數值微分的真實困境，預告 ch15）。\n- **Worked example**：x=3 割線斜率表（基準表）完整手算（h=1, 0.1, 0.01 三行展開算式）；再用代數展開 ((3+h)²−9)/h = 6+h，看見「h 約掉之後極限顯然是 6」——數值逼近與代數約簡兩條路收斂到同一答案。\n- **紙上推演**：對 f(x)=x³ 在 x=2 做同樣的割線表＋代數展開；把「飛矢不動」講給一個只懂國中數學的人並讓他服氣（口頭題）；找出「導數就是 dy 除以 dx 兩個小量相除」這句話的問題在哪。\n- **Python 小實驗**：割線斜率收斂表（h 從 1 縮到 1e-12），親眼看見 h 太小時浮點誤差反而讓結果變爛——數學極限與浮點現實的衝突（ch15 回收）。\n\n### ch05 — 導數的代數：規則為什麼長那樣\n- **目標**：能不背公式地「重新發明」乘法規則與連鎖規則的直覺；能講出 e 為什麼是「自然」的底；理解「局部線性」是微分的世界觀。\n- **必涵蓋**：**局部線性**：放大任何光滑曲線到夠近，它就是直線——導數就是那條直線的斜率（怪獸函數會打破這個直覺，ch13 伏筆）；和規則一句話；**乘法規則的矩形圖**：(fg)′ = f′g + fg′ 來自面積增量 = 兩條邊條 + 一個可忽略小角（小角為什麼可忽略——這正是極限在背後工作）；**連鎖規則 = 比率相乘**：複合函數是縮放器串接，dz/dx = dz/dy · dy/dx，萊布尼茲記號讓它「看起來像分數約分」——好用但要誠實說這不是除法（ch04 伏筆回收）；指數函數：增長率正比於自身 → 哪個底數讓比例剛好是 1？(1+1/n)ⁿ 複利表（基準表）逼出 e；e^x 是自己的導數——「宇宙最自戀的函數」；ln 一段（e 的反面）；多項式、sin/cos 導數結果列表（sin′=cos 給幾何直覺草圖，不硬證）。\n- **不涵蓋**：最佳化應用（ch06）；泰勒級數（ch09）；積分規則（ch07/ch08）；極限的嚴格運算定律（ch14 一句話）。\n- **橋接**：複利＝指數增長你懂（cache 雪崩的連鎖放大、重試風暴的指數失控）；連鎖規則 ≈ 多層轉換的比率層疊（貨幣換匯鏈、單位換算鏈）；「局部線性」≈ 你做容量規劃時在小區間內用線性外插。\n- **Worked example**：乘法規則矩形圖完整推導（邊長 f(x)、g(x)，增量 Δf、Δg，面積增量拆三塊、逐塊命名、小角除以 h 後趨於 0）；複利表 n=1, 12, 365, ∞（基準表數字）。\n- **紙上推演**：用矩形圖推 (x·x)′ 並對照 ch04 的 2x；用連鎖規則拆 (x²+1)³ 的導數並口頭說出每層比率；解釋「為什麼用 2 當底數的指數函數導數會多出一個討厭的常數」。\n\n### ch06 — 最佳化：斜率為零的地方\n- **目標**：能講出「極值處導數為零」為什麼成立、什麼時候失效；能手跑一遍梯度下降並說出它和費馬原理的血緣關係。\n- **必涵蓋**：Fermat 的觀察：山頂的切線是平的——極值點 f′=0（內點、可微前提）；為什麼「斜率為零」只是嫌疑犯名單（鞍點、邊界、不可微點都會漏／誤報——直覺的陷阱主場）；二階資訊：凹凸與 f″ 判別（直覺版）；經典問題完整解一題：固定周長圍最大面積（答案是正方形——對稱性的暗示）；**梯度下降**：沒有公式解時「往坡下走」，f(x)=x² 的迭代表（基準表）；學習率太大會震盪、太小會龜速——工程上你調過的超參數其實是步長；多維一瞥：梯度是「最陡方向」（直覺，不展開偏導系統）；現代視角一段：ML 訓練 = 在億維空間裡用連鎖規則算梯度＋往坡下走（backprop 深度在 ch15）。\n- **不涵蓋**：偏導數與多變數理論（全域不涵蓋）；凸最佳化理論；Lagrange 乘數（一句話＋延伸閱讀）；backprop 機制細節（ch15）。\n- **橋接**：梯度下降你概念上知道（ML）——這章補上它的數學身世；autoscaling 調參、k6 壓測找最佳並發數的 hill climbing 直覺；「調到不能再好」的工程語感 = 一階條件。\n- **Worked example**：圍籬問題：周長 P=40 圍長方形，A(x) = x(20−x)，A′ = 20−2x = 0 → x=10 正方形、面積 100——逐步含驗證端點；梯度下降迭代表（基準表）：x₀=3 → 2.4 → 1.92 → 1.536 → 1.2288 → 0.98304，每步算 f(x) 看它下降。\n- **紙上推演**：對 f(x)=x³ 在 x=0 解釋為什麼 f′=0 但不是極值；把學習率改成 η=1.1 重跑迭代表看發散；用一階條件解「兩數和為 20、乘積最大」並對照圍籬問題本質相同。\n\n## Part III — 積分與中心寶石（ch07–08）\n\n### ch07 — 積分：無限細分再加總\n- **目標**：能講清楚積分「在做什麼」（切薄、近似、加總、取極限）；會手算黎曼和並看它收斂；認出工程裡無處不在的積分。\n- **必涵蓋**：問題：曲線下面積為什麼難（直邊形會的招數全失效）；**黎曼和**：切 n 條、每條用矩形近似、加總、n→∞——∫₀¹ x² dx 的左和右和手算（基準表 n=4），夾擠結構與 ch02 窮盡法一脈相承（**同一題三算之第二算**，明確對帳阿基米德）；∫ 記號的解剖（Leibniz 的拉長 S、dx 的角色——「無限細的寬度」是有用的思考法、嚴格意義 ch14 提）；積分作為「累積」的一般化：面積只是特例，距離 = ∫速度、總量 = ∫速率——**積分是反著看的微分的前奏**（不點破，留給 ch08）；數值積分一段：梯形法為什麼比矩形快收斂（直覺）——你用過的「數值方法」其實在做黎曼和。\n- **不涵蓋**：FTC（ch08，本章刻意讓讀者體會「硬算好累」）；積分技巧（全域不涵蓋）；廣義積分（ch12 一句話）；Lebesgue（ch14 一句話）。\n- **橋接**：AWS 計費的 GB-hours／vCPU-seconds 就是積分；CloudWatch 的 Sum 統計量、「總請求數 = ∫QPS dt」；你看 Grafana 曲線下面積估流量的直覺這章給它名字。\n- **Worked example**：∫₀¹ x² dx 黎曼和：n=4 左和 0.21875、右和 0.46875 完整展開算式；n=10、n=100 收斂表（自算複核）；用 Σk² 公式算一般 n 的右和 (1/n³)·n(n+1)(2n+1)/6 → 取極限得 1/3——數值與代數兩條路再次會師。\n- **紙上推演**：對 ∫₀¹ x dx 手算 n=4 黎曼和並對照三角形面積 1/2；解釋為什麼左和永遠 ≤ 右和（對遞增函數）、這給了你什麼「夾擠」保證；把「本月帳單」用積分語言寫出來（單價隨時間變的雲端資源）。\n- **Python 小實驗**：黎曼和收斂實驗（n = 4, 10, 100, 10⁴, 10⁶），觀察誤差大約以 1/n 縮小；換梯形法看誤差以 1/n² 縮小——「同樣的計算預算，好方法多換好幾位數精度」。\n\n### ch08 — 微積分基本定理：面積＝斜率反過來（全書高潮）\n- **目標**：能對另一個工程師講清楚：為什麼「曲線下面積」和「切線斜率」這兩件看起來毫無關係的事，是同一件事的正反面——並且講出證明的直覺核心，不只是背出結論。\n- **必涵蓋**：鋪陳張力：微分（ch04–06）與積分（ch07）至此是兩個獨立故事——先讓讀者明確感受「這兩件事憑什麼有關係？」；**累積函數** A(x) = ∫₀ˣ f(t) dt 的引入（把面積變成函數——關鍵的視角轉換）；**FTC 直覺證明**：A(x+h) − A(x) ≈ f(x)·h（一條細條的面積 ≈ 高×寬），除以 h 取極限 → A′(x) = f(x)——「累積量的變化率 = 當下的高度」，一步一步走、配 ASCII 細條圖；兩個方向的陳述（微分積分互逆；∫[a,b] f = F(b) − F(a)）；**同一題三算之第三算**：∫₀¹ x² dx——找反導數 x³/3、代端點、一行得 1/3，與 ch02 兩千年前的苦工、ch07 上一章的極限硬算並排成表——「這就是為什麼 FTC 是技術革命」；歷史：Barrow 的幾何版、Newton/Leibniz 各自看見全貌並把它變成演算法（照 landscape）——天才不在算出某個面積，在看出「所有面積問題都是反微分問題」；Prometheus 橋接收尾：counter / rate() / increase() 的三位一體就是 FTC 活在你的監控系統裡。\n- **不涵蓋**：FTC 的嚴格證明前提（連續性的角色——ch14 一句話回收）；反導數技巧目錄（全域不涵蓋）；廣義積分。\n- **橋接**：**counter 與 rate 互為反操作**：counter 是累積函數 A(t)，rate() 是 A′，increase(window) 是 ∫——你天天在用 FTC 而不自知；這章把全書最重要的橋走滿。\n- **Worked example**：FTC 直覺證明全程（A(x+h)−A(x) 的細條、上下界夾擠 min·h ≤ 細條 ≤ max·h、除 h、取極限）；「同一題三算」總對帳表（阿基米德幾何級數 vs 黎曼和極限 vs F(1)−F(0)，三欄並排：方法、工作量、適用範圍）。\n- **紙上推演**：用 FTC 秒算 ∫₀¹ x dx 與 ∫₀² x³ dx，並對照 ch07 的苦工版；對「為什麼 A′(x) = f(x) 需要 f 連續」給一個破壞例的直覺（跳躍點上累積函數的角）；口頭題【全書最重要的一題】：不看書，把 FTC 的直覺證明講給一個工程師聽，自我錄音或寫逐字稿。\n\n## Part IV — 語言長大：從切線到預測世界（ch09–11）\n\n### ch09 — 無限級數：函數的另一種長相\n- **目標**：能講出「把函數寫成無限多項多項式」這個想法為什麼瘋狂又為什麼可行；能用泰勒前幾項手算 sin 並對照真值；對 e^{iπ} + 1 = 0 的「來路」有自己的話。\n- **必涵蓋**：動機：多項式是唯一「真的會算」的函數（加減乘）——sin、e^x 計算機怎麼算？把函數展開：泰勒級數的直覺（在一點上對齊位置、斜率、彎度、彎度的變化…每多一項多抄一階導數）；e^x、sin、cos 的級數（推導 e^x 的，sin/cos 給結構與檢查）；收斂半徑直覺一段（不是所有函數都乖——伏筆 ch12/ch13）；調和級數發散（Oresme 分組論證，基準表）——「項趨於 0 不保證級數收斂」第一次正面撞牆；Basel 問題：Σ1/n² = π²/6（Euler 的大膽解法當故事講、明說當年不嚴格、結果是對的——18 世紀風格的縮影）；**Euler 公式**：把 iθ 代進 e^x 級數、實虛部各自整理出 cos 與 sin——e^{iθ} = cosθ + i·sinθ，θ=π 得 e^{iπ} + 1 = 0；誠實標示：這裡是「形式操作」，複數冪的嚴格定義本書不展開——但正是這個操作讓「指數」與「旋轉」接上線（ch11 傅立葉的地基）。\n- **不涵蓋**：收斂判別法目錄（比值、根值…全域不涵蓋精神：不刷題）；重排與條件收斂（ch12）；複變理論（全域不涵蓋）；傅立葉級數（ch11）。\n- **橋接**：libm 的 sin 實作真的用多項式近似（範圍縮減＋多項式，2026-06 照 landscape hedge）；泰勒一階 = 你的線性外插；「展開到第幾項夠用」= 精度預算的工程決策。\n- **Worked example**：用 sin x = x − x³/6 + x⁵/120 算 sin(0.5)：逐項部分和表對照真值 0.47943，看誤差每項掉幾個數量級；Oresme 分組論證完整寫一遍（1/3+1/4 > 1/2、1/5+…+1/8 > 1/2…）。\n- **紙上推演**：用 e^x 級數算 e⁰·⁵ 到三項並估誤差方向；把 iθ 代入 e^x 級數親手整理出實虛部（全書最划算的 20 分鐘）；解釋「項趨於零卻發散」給一個直覺主義者聽（調和級數）。\n- **Python 小實驗**：泰勒部分和逼近 sin 的收斂可視化（或純數值表）：x=0.5 與 x=3 對比——離展開點越遠需要越多項，收斂半徑的體感。\n\n### ch10 — 微分方程：會變的世界的文法\n- **目標**：能講出「定律寫的是變化率、不是軌跡」這個世界觀轉換為什麼是革命；能手跑 Euler 法；能說出「能寫下≠能解出」與數值方法的位置。\n- **必涵蓋**：視角轉換：自然定律幾乎都長成「狀態的變化率是狀態的函數」——dy/dt = f(y, t)；最簡單的一支：dy/dt = ky（人口、冷卻、放射衰變、複利——同一個方程的四張面孔），解 = Ce^{kt}（用 ch05 的「e^x 是自己的導數」反推，不教解法目錄）；F = ma 是微分方程——牛頓的真正成就：寫下定律＋發明解它的數學；彈簧振子 x″ = −x 的解是 sin/cos——**三角函數從圓裡跳出來、活在所有振動裡**（ch11 地基）；**預測世界的極限與勝利**：海王星——Le Verrier 用攝動計算「筆尖上發現行星」（照 landscape）；Poincaré 三體：能寫下、證明了解不出公式解——混沌的起點（一句話，不展開）；**Euler 法**：不會解就一步步走——dy/dt = y 的迭代表（基準表），步長減小→收斂到 e；「你寫過的 simulation tick loop 就是 Euler 法」。\n- **不涵蓋**：解法技巧目錄（分離變數一招帶過、其餘不教）；二階方程理論；偏微分方程（ch11 熱方程一句話）；混沌理論展開；數值方法的穩定性理論（一句話＋延伸閱讀）。\n- **橋接**：遊戲伺服器／物理引擎的 tick 迴圈 = Euler 法（position += velocity * dt）；容量預測模型（增長率假設→外插）；指數衰減 = cache TTL、訊號平滑（EMA 其實是個微分方程的離散化）。\n- **Worked example**：Euler 法基準表完整手算（步長 0.1 的前 4 步逐步展開 + 第 10 步結果 2.5937；步長 0.01 結果 2.7048；對照 e）；dy/dt = ky 從「增長率正比存量」走到 Ce^{kt} 的反推全程。\n- **紙上推演**：把「咖啡冷卻」翻成微分方程（牛頓冷卻定律的形式自己立出來）；用 Euler 法手算 dy/dt = −y 三步、解釋為什麼步長太大會「跳過頭」甚至震盪；指出「EMA 平滑」對應哪個微分方程（提示：dy/dt = k(x − y)）。\n- **Python 小實驗**：Euler 法步長收斂實驗（h = 0.1, 0.01, 0.001 對 e 的誤差表）；加碼彈簧振子用 naive Euler 跑長時間看能量漂移（數值方法的真實陷阱、一句話帶過 symplectic 的存在）。\n\n### ch11 — 傅立葉：把任何訊號拆成圓\n- **目標**：能講出「任意波形 = 純頻率的疊加」這個主張為什麼驚人、大致為什麼可行（正交性的直覺）；能說出這個主張當年怎麼引爆嚴格化危機（Part V 的引橋）。\n- **必涵蓋**：Fourier 的場景：熱方程（一句話：溫度分布的演化也是微分方程）；他的瘋狂主張：**任何**週期函數都能寫成 sin/cos 的無限和——Lagrange 們為什麼不信（不連續的方波怎麼可能用最光滑的 sin 疊出來？）；方波級數（基準表）：前 1、3、5 項的部分和 ASCII 圖——親眼看疊加逼近方波；**正交性直覺**：sin(mx) 與 sin(nx) 的「內積」為零 ≈ 不同頻率互不干擾，所以係數可以「各自結帳」（積分在這裡當「探測器」用——ch07 的積分變成工具）；Gibbs 現象：跳躍點旁 ≈9% 的過衝怎麼壓都壓不掉（數值照 landscape）——第一個「無限疊加的詭異行為」實例；歷史：1807 備忘錄被拒、1822 出版（照 landscape）；**收斂問題引爆嚴格化**：「什麼叫『等於』那個無限和？」這個問題催生了 Dirichlet 條件、Riemann 積分、甚至 Cantor 集合論（史線照 landscape）——Part V 的門口；現代一段：FFT 讓這變成每天跑在你手機裡的演算法（JPEG、音訊、頻譜分析——點到為止）。\n- **不涵蓋**：傅立葉變換的連續版理論；FFT 演算法（一句話＋延伸閱讀）；熱方程求解過程；Dirichlet 條件的陳述細節（ch12/ch14 不展開、延伸閱讀）。\n- **橋接**：你看過的頻譜圖（監控的週期性流量、音訊 EQ）；「把訊號拆成頻率」= 把 log 拆成日週期＋週週期＋趨勢的直覺；JPEG 壓縮丟高頻 = 傅立葉係數的工程應用。\n- **Worked example**：方波級數前三項部分和：x = π/2 處手算 (4/π)(1 − 1/3 + 1/5) = 52/(15π) ≈ 1.10347 對照方波值 1（2026-06-12 修正：原誤植 1.0383，ch11 撰寫時雙路複核定案）；ASCII 疊加圖（1 項、3 項、5 項三張小圖）；正交性檢查一例：∫[0,2π] sin x · sin 2x dx = 0 的對稱性論證（圖解，不硬積）。\n- **紙上推演**：解釋「為什麼不同頻率的係數可以各自算」給一個工程師（用『探測器』比喻走完）；從部分和圖預測「項數加倍後 Gibbs 過衝會變矮嗎」並說理由（不會——寬度變窄、高度不變）；把「監控曲線有日週期」翻成傅立葉語言。\n- **Python 小實驗**：方波部分和疊加（N = 1, 5, 50 項）數值表或圖，親手量 Gibbs 過衝高度——它不隨 N 消失。\n\n## Part V — 直覺崩壞與重建（ch12–14）\n\n### ch12 — 發散的詐騙：無限不守交換律\n- **目標**：能講出「無限和不是和」——哪些有限世界的定律（交換律、結合律）在無限世界會失效；能重講 Riemann 重排定理的操作直覺；對 −1/12 有正確且能轉述的理解。\n- **必涵蓋**：Grandi 級數 1−1+1−1+…（基準表）：三種「加括號」得三種答案——**加括號（結合律）在發散級數上不合法**；歷史：Grandi 的神學詮釋、Euler 的大膽（照 landscape）——18 世紀「形式操作」的勝利與翻車並陳（Basel 對了、發散級數操作要小心——同一個 Euler）；條件收斂 vs 絕對收斂：交錯調和級數 = ln 2（基準表），**Riemann 重排定理**：條件收斂級數重排後可以收斂到任何指定值——操作直覺完整走（正項堆到超標、負項拉回、反覆）；「無限和」的真正定義回收 ch03：部分和的極限——一切詭異都來自「我們以為它是加法、其實它是極限」；**−1/12 正確版**：1+2+3+… 發散、句點；ζ(−1) = −1/12 是解析延拓賦予的另一種值、Ramanujan 信件的脈絡（照 landscape）——「網路梗的正確打開方式」；廣義積分一句話（同樣的「極限偽裝成運算」結構）。\n- **不涵蓋**：收斂判別法目錄；解析延拓機制（一句話＋延伸閱讀）；ζ 函數理論；Cesàro 求和等替代求和法（一句話：「換一種求和定義」是嚴肅數學，不是作弊）。\n- **橋接**：**浮點加法不滿足結合律**——大量小數求和時順序改變結果（你被坑過的 sum 精度問題、Kahan summation 的存在理由）：有限精度世界早就教過你「加法順序有關係」，無限世界只是更兇；分散式 aggregation 的順序敏感性。\n- **Worked example**：交錯調和級數重排示範：目標 1.2——正項加到 > 1.2、補一個負項、再加正項…手算前 8 步的部分和表，展示「想到哪就到哪」的機械流程；Grandi 三種加括號的三個「答案」並排。\n- **紙上推演**：解釋「為什麼絕對收斂就可以隨便重排」的直覺（正負兩堆各自有限）；給「1+2+3+… = −1/12」的短影片寫一段 200 字的更正留言（口頭題的書面版）；找出一個論證的破綻：「S = 1−1+1−… ⇒ S = 1−S ⇒ S = 1/2」哪一步犯規。\n\n### ch13 — 怪獸函數：連續但處處尖刺\n- **目標**：能講出「連續」與「可微」的真正差距（直覺以為差不多、實際差一個宇宙）；能轉述 Weierstrass 函數的構造思路與它為什麼處處不可微；知道怪獸其實住在現實裡（布朗運動）。\n- **必涵蓋**：直覺裡「連續的曲線總可以畫切線，最多壞在幾個尖點」——19 世紀數學家也這麼信；**Weierstrass 函數**（基準表）：無限疊加越來越快的小抖動——每一層都連續、和也連續，但抖動密到任何尺度放大都不平滑——**局部線性（ch05 的世界觀）徹底失效**；構造直覺：a 控制振幅衰減（保連續）、b 控制頻率增長（毀光滑），ab 的拉鋸（條件照 landscape）；當年的衝擊：Hermite「可悲的瘟疫」式反應（引文照 landscape 查證，查無實據就不用）；連續 ≠ 可微的譜系：|x|（一個尖點）→ 鋸齒疊加 → 處處尖點；**自然界的怪獸**：布朗運動路徑幾乎處處不可微（照 landscape）——怪獸不是病態想像、是塵埃與股價的日常；「病態反例」的方法論價值：反例劃出定理的真實邊界——數學的故障測試工程。\n- **不涵蓋**：Weierstrass 不可微的完整證明（給構造直覺與「為什麼差商不收斂」的方向感，明寫本書不證）；分形理論（Hausdorff 維度一句話＋延伸閱讀）；隨機過程理論（布朗運動只取「處處毛刺」事實）。\n- **橋接**：監控曲線的「放大還是毛的」體感——P99 曲線、股價、網路延遲怎麼 zoom 都不平滑（自相似的工程日常）；fuzz testing 的哲學：病態輸入劃出系統真正的邊界，Weierstrass 函數就是數學史上最著名的 fuzz case。\n- **Worked example**：用 a=1/2、b=3 手算 W(x) 前三層在幾個點的值並畫 ASCII 疊加圖（一層：平滑波；二層：起毛；三層：更毛）；差商不收斂的方向感：在一個點上算前三層的差商序列，看它不安定下來。\n- **紙上推演**：解釋「連續但不可微」用 |x| 在 0 點走一遍定義（左右差商不等）；回答「為什麼『無限疊加保住連續、毀掉可微』不矛盾」；對「自然界曲線放大就平滑了」舉一個反例並說明測量尺度的角色。\n- **Python 小實驗**：Weierstrass 部分和（3 層 vs 10 層 vs 30 層）在一小段區間的數值表或圖，連續 zoom 三次看「怎麼放大都毛」。\n\n### ch14 — 嚴格化：ε-δ、實數的補完與無窮小的平反\n- **目標**：能講出 19 世紀嚴格化在修什麼漏洞、ε-δ 的量詞遊戲到底在說什麼（並覺得它聰明而非折磨）；能說出實數完備性為什麼是極限的地基；知道無窮小最終被 Robinson 平反的歷史反轉。\n- **必涵蓋**：賬單到期：Berkeley 之譏（ch04）、傅立葉收斂之亂（ch11）、發散詐騙（ch12）、怪獸（ch13）——「直覺破產了，需要不依賴直覺的定義」；**ε-δ 正式版**：lim(x→a) f(x) = L ⟺ ∀ε>0 ∃δ>0 ∀x (0<|x−a|<δ ⇒ |f(x)−L|<ε)——當作 ch03 挑戰賽的法典化：對手出 ε、你給 δ、量詞順序就是攻防順序（讀過書架上 TLA+ 書的話 ∀∃ 攻防你已演練過——引用不依賴）；完整示範一題：lim(x→3) x² = 9（δ = min(1, ε/7) 的選擇過程誠實展示「怎麼找到的」）；連續的定義一句話接上；**實數完備性**：√2 在有理數裡是個「洞」——Dedekind cut 把直線補滿（照 landscape）；為什麼完備性是地基：沒有它，「夾擠到的那個點」可能不存在（ch02 窮盡法、ch03 極限、ch07 黎曼和全靠它兜底）；嚴格化的譜系一段：Cauchy 開工、Weierstrass 定稿、Dedekind/Cantor 補地基（人物與年份照 landscape）；**歷史反轉**：Robinson 非標準分析（1960s，照 landscape）——無窮小可以嚴格化，Leibniz 的直覺平反；但 ε-δ 已是通用語——「兩套地基撐同一棟樓」；Lebesgue 一句話（積分的下一次重建，延伸閱讀）。\n- **不涵蓋**：ε-δ 解題操練（全域不涵蓋——只做示範題與結構理解）；Dedekind cut 的運算定義細節；非標準分析的模型論機制（superstructure、ultrafilter 不展開）；Cauchy 序列建構法（一句話：另一條補洞路線）。\n- **橋接**：把口語需求寫成可驗收的 spec——「夠快」⇒「∀ 請求的 99%，延遲 < 200ms」：ε-δ 就是把「越來越近」寫成可驗收條款的 spec 工程；對抗式驗收（QA 出任意 ε、你的 δ 策略必須全接）。\n- **Worked example**：lim(x→3) x² = 9 的 ε-δ 證明全程：從 |x²−9| = |x−3||x+3| 出發、先用 δ≤1 控制 |x+3|<7、再取 δ = min(1, ε/7)——含「找 δ 的草稿」與「正式證明」兩欄並排（誠實展示數學家的工作順序：先倒著找、再正著寫）。\n- **紙上推演**：對 lim(x→2) 3x = 6 打一場正式 ε-δ（δ = ε/3）；用完備性解釋「為什麼有理數世界裡黎曼和可能夾不到東西」；口頭題：把「ε-δ 是挑戰賽的法典化」講給一個被大一微積分傷害過的朋友聽。\n\n## Part VI — 回到今天（ch15–16）\n\n### ch15 — 工程母語：微積分在你技術棧的藏身處\n- **目標**：能在自己的日常工具裡指認出微積分（不是類比、是字面意義的同一件事）；能講出梯度下降／backprop、PID、機率分布與本書概念的對應；把「橋接」從輔助線變成正文。\n- **必涵蓋**：總盤點開場：全書橋接回收成一張對照表（rate()/increase() = FTC、backoff 總時間 = 幾何級數、tick loop = Euler 法、頻譜 = 傅立葉、毛刺曲線 = 怪獸、浮點 sum 順序 = 條件收斂）；**梯度下降與 backprop**：損失函數是億維地形、backprop = 連鎖規則的系統化記帳（ch05 的比率層疊一路乘回去）——「現代 AI 的引擎室裡是 ch05 與 ch06」（機制講到 chain rule 層、不進矩陣微積分）；**PID 控制器**：P/I/D 字面上就是比例、積分、微分（照 landscape）——誤差的現值、累積、變化率三路修正，K8s HPA／恆溫器／巡航定速；**機率即面積**：常態曲線下面積 = 機率、P99 = CDF 的反查、68-95-99.7 法則——「你的延遲百分位數每天都在積分」；**數值現實**：浮點世界裡微積分的理想假設會漏水——數值微分的步長困境（ch04 實驗回收、√ε 量級照 landscape）、數值積分與 ODE 步長的精度/成本權衡——「離散機器上模擬連續數學」是一門誠實的工藝；收尾：微積分作為「會變的量」的通用介面——你不是要去用它、你已經在裡面。\n- **不涵蓋**：矩陣微積分與張量求導（一句話＋延伸閱讀）；控制理論展開（PID 只講三項直覺）；測度論機率（面積直覺即止）；任何新數學概念（本章只回收，不開新坑）。\n- **橋接**：本章整章就是橋——不另設橋接段落的更深版本：每節都從讀者的真實工具（Prometheus、HPA、k6、訓練曲線）出發反向走回數學。\n- **Worked example**：backprop 迷你記帳：兩層複合 f(x) = (3x+1)²，用連鎖規則手算 df/dx 並畫「比率沿鏈傳播」的 ASCII 圖；常態分布 68% 的黎曼和粗算（σ 區間切 4 條近似、對照精確值 68.27%——展示「機率真的是在算面積」）。\n- **紙上推演**：把你維運過的一個真實指標（自選）分別指認出它的導數、積分各是哪個現成查詢；解釋 PID 的 I 項為什麼能消除穩態誤差（提示：累積函數對常數誤差的反應）；D 項為什麼對雜訊敏感（ch04 取樣窗口問題回收）。\n\n### ch16 — 總收官：人類如何馴服無限\n- **目標**：把全書收進一條能口頭講完的故事線；用六條驗收目標當口試題完成總自我檢核；知道讀完之後往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖、現在每格都走過了）；**馴服的本質**：人類沒有「理解」無限的形上學本質——而是把它**操作化**了（極限：無限步驟收斂成一個可驗收條款；微分：無限小化為差商極限；積分：無限細分化為部分和極限；級數：無限和重定義為部分和極限）——「不回答『無限是什麼』、只回答『無限怎麼用而不出錯』」，這是工程師最能共鳴的勝利方式；三核心動作的最終一句話版本各自定稿；歷史弧線收束：恐懼（芝諾）→ 個案手藝（阿基米德）→ 大膽通法（Newton/Leibniz）→ 危機（Berkeley/傅立葉/怪獸）→ 重建（ε-δ）→ 平反（Robinson）——「先衝再補票」是數學史的真實工作方式，跟你想的教科書順序相反；**口試總驗收**：六條驗收目標各出一題口頭題＋每題的「模範答案要點清單」（不是逐字稿——是檢核表：你講的版本必須命中哪些要點）；下一步地圖：往嚴格走（實分析）、往應用走（微分方程／ML 數學）、往欣賞走（數學史與科普）——對應附錄 C 的路線。\n- **不涵蓋**：任何新概念；任何新證明；「補完所有遺漏」的誘惑（明寫：本書刻意留下的洞清單——多變數、複變、測度——以及為什麼留）。\n- **橋接**：回到 ch01 的你：當時對芝諾的反駁 vs 現在的你會怎麼講——成長的具體對照。\n- **Worked example**：「馴服無限」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞）。\n- **紙上推演**：六條口試題正式作答（口頭、各 3–5 分鐘，對照要點清單自評）；給「微積分就是一堆積分技巧」這句話寫一段反駁（200 字內）；一年後重讀清單：哪三章值得重讀、各自的觸發條件（遇到什麼工作場景）。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 記號與讀法速查表\n全書記號總表：寫法、怎麼唸出來（口頭講解用——本書驗收靠口述，每個記號都要能唸）、白話意義、首次出現章。從各章實際用過的記號 grep 彙整，不得收錄書中沒出現的記號。\n\n### 附錄 B — 術語表\nEN–ZH–一句話定義–首次出現章。同樣從實際內容萃取。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源（影片、書、課程），分三條路線（往嚴格／往應用／往欣賞），給出「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-zenos-arrow.md、ch02-method-of-exhaustion.md、ch03-limits.md、ch04-instantaneous-rate.md、ch05-derivative-rules-and-e.md、ch06-optimization.md、ch07-integration.md、ch08-fundamental-theorem.md、ch09-infinite-series.md、ch10-differential-equations.md、ch11-fourier.md、ch12-divergent-series.md、ch13-monster-functions.md、ch14-rigor.md、ch15-mother-tongue.md、ch16-taming-infinity.md；\n附錄 appendix-a-notation.md、appendix-b-glossary.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《馴服無限：微積分的直覺與驚嘆》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的書。目標是讓讀者親身感受人類如何馴服無限——看懂微積分不是一堆積分技巧，而是描述「變化」與「連續」的語言；讀完有「人類竟然想得出這個」的震撼，**而且能用自己的話對另一個工程師講清楚震撼在哪**。\n- **不是**：\n  - 不是考試解題訓練——不刷積分技巧、不背公式表、不出計算操練題。\n  - 不是嚴格分析學教科書——ε-δ 只在它能帶來「啊哈」時當故事講（ch03 故事版、ch14 正式版），不是折磨。\n  - 不是轉職用書——純興趣，不服務 AI Infra 敘事；但工程橋接要讓它讀起來像母語，不是教科書的外語。\n- 驗收標準（全書的六條主線，ch16 總收官）：①微積分在馴服什麼；②三核心動作（極限／微分／積分）各自在做什麼；③FTC 為什麼是「面積＝斜率反過來」；④工程橋接；⑤直覺在哪裡崩壞；⑥它怎麼長成描述會變世界的語言。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js）。可直接當橋接錨點的經歷與直覺：\n\n- profiling 與效能工程（RDS CPU 尖峰降 40% 的量測→診斷→優化敘事）；CloudWatch／Prometheus 式指標思維（counter、rate、sum、P99）\n- 高併發系統（500K+ 使用者、10K+ CCU）、佇列、重試與 exponential backoff、rate limiting\n- 數值直覺：負載測試找容量上限（二分逼近）、浮點比較寫過 `abs(a-b) < eps`\n- ML 概念層：知道梯度下降是「往坡下走」，沒推過數學\n\n**不需要解釋**（讀者已精通）：函數的概念、代數操作、座標平面、二分搜尋、hash、佇列、重試、監控指標的工程意義。\n\n**快速複習即可**（大學看過但生鏽）：三角函數、指數對數、Σ 記號、基礎數列。用「你大學看過，現在把它擦亮」的節奏帶，不當文組讀者教。\n\n**要從零教**（本書主體）：極限的精確意義、微分與積分的「在做什麼」、FTC、級數收斂與發散、微分方程的世界觀、傅立葉的直覺、嚴格化的歷史與動機。\n\n**跨書資源**：讀者書架上有《把系統寫成定理：TLA+ 與形式化方法》（量詞 ∀∃、否定推移、「工程師的嚴謹」證明觀）。ch14 的 ε-δ 量詞遊戲**可以引用該書**（「如果你讀過書架上的 TLA+ 書，∀ε∃δ 的對抗結構你已經見過」），但**不得依賴**——本書自身要把量詞講到能懂。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。數學名詞中英並用：第一次出現給「中文（English）」，之後可只用中文——極限（limit）、導數（derivative）、積分（integral）、級數（series）、收斂（converge）／發散（diverge）、連續（continuous）、可微（differentiable）。\n- 人名用通行中譯＋原文：牛頓（Newton）、萊布尼茲（Leibniz）、歐拉（Euler）、柯西（Cauchy）、魏爾斯特拉斯（Weierstrass）、黎曼（Riemann）、傅立葉（Fourier）、阿基米德（Archimedes）、芝諾（Zeno）。第一次出現附原文，之後用中譯。\n- 台灣用語基準：函數／函式（數學脈絡用「函數」）、微分方程（不是微分方程式也可，擇一全書一致：用「微分方程」）、最佳化／優化皆可。禁止簡體中文詞彙（信息、默認、內存、代碼、對象、質量、導數的「求導」改用「微分」或「取導數」…）。\n- 第二人稱「你」直接對讀者說話。\n\n## 數學記號規範（全書一致，附錄 A 是速查表；閱讀器不渲染 LaTeX，一律純文字）\n\n- **內文行內**用 Unicode：f′(x)（prime 用 ′）、ε δ Δ π ∞ √ ≈ ≠ ≤ ≥ → Σ ∫。\n- 極限寫 `lim(x→a) f(x)`、`lim(n→∞) aₙ`。\n- 求和寫 `Σ(n=1→∞) 1/n²`；積分上下限用 Unicode 上下標數字：`∫₀¹ x² dx`；非數字界限寫 `∫[a,b] f(x) dx`。\n- 導數記號雙軌並用且**明說兩套記號的歷史**（牛頓 ẋ 一筆帶過即可；全書工作記號用萊布尼茲 dy/dx 與拉格朗日 f′(x)，何時用哪套在 ch04 講清楚）。\n- **多行推導**放在 ```text 圍欄區塊裡，等號對齊、每步右側可加「← 為什麼」短註。禁止把長推導硬塞進行內。\n- 數字基準：π ≈ 3.14159、e ≈ 2.71828、ln 2 ≈ 0.6931（全書統一到五位有效數字以內，按各章需要截短，不得互相矛盾）。\n- 函數圖形用 ASCII 圖（必須通過 check_diagrams.py 的 CJK=2 欄寬檢查）。曲線圖用 `*` 描點、座標軸用 `─ │ └`；不追求精確比例，追求形狀直覺。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章（ch01、ch04、ch07、ch09、ch12、ch15）在 blockquote 後放全書 ASCII 路線圖（基準圖在 outline.md，照抄並把「◄你在這裡」標到本章），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的工程實戰上，要具體（CloudWatch rate、exponential backoff 的總時間、負載測試二分逼近、浮點 eps 比較），不要泛泛而談。\n3. 核心內容（多個 `##` section，深入直覺與機制）。歷史敘事與數學內容交織，但**歷史服務於數學直覺**，不是編年史。\n4. `## 直覺的陷阱` — 本書招牌段落（故障視角的數學版）：這個概念**最常被誤解成什麼**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實沒懂）。用表格或條列。\n5. `## 紙上推演` — 動手做的形式（2026-06-12 訪談定案：紙筆推演為主）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：手算逼近表、手推論證、找出錯誤論證的破綻、把白話翻成數學語言、口頭重講一個證明。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。\n   指定章節（ch04、ch07、ch09、ch10、ch11、ch13——見 outline）額外加 `### Python 小實驗`：本機可跑、純標準函式庫優先（matplotlib 可選用、要標明）、每段程式 ≤ 30 行、附預期輸出。程式碼與註解一律英文。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。問題對齊「能不能把這個概念講給另一個工程師聽」的深度，優先出「為什麼」而不是「是什麼」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體數字、一步一步算的完整過程（逼近表、部分和表、迭代表），不准跳步。outline 已為每章指定基準範例。\n- **嚴謹度的誠實標示**：每個論證明確標示自己是哪一級——「直覺版（嚴格版見 ch14／本書不證）」或「工程師的嚴謹：每步能口頭說出理由」。禁止「顯然」「易證」；禁止把直覺論證偽裝成證明。0.999…=1 這類題目要正面處理常見錯誤論證的循環依賴問題。\n- **數值自我複核**：所有數值表格（逼近表、部分和、迭代）寫章時必須自己重算一遍（心算／筆算／必要時口頭逐步驗證），不得抄自記憶。跨章基準數值以 outline 基準表與 landscape 的「基準數值複核」節為準。\n- **歷史事實照 landscape**：年份、歸屬、引文、軼事一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 3~8 次 web 查證）並 hedge；傳說要標明是傳說（牛頓的蘋果）。禁止憑記憶引用「名人名言」。\n- **每個「驚嘆點」要能被重講**：本書的核心商品是震撼感。每章至少一處明確回答「這裡了不起在哪」——而且要寫到讀者能用自己的話轉述，不是堆形容詞。\n- 每個概念給「它在解什麼問題」：極限解什麼、FTC 解什麼、嚴格化解什麼。禁止無動機的定義。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、人物、書籍版本、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 數學內容（定義、定理、計算）不依賴 landscape，但必須自我複核；常被誤傳的數學事實（−1/12、0.999…、Gibbs 現象百分比、Weierstrass 函數條件）以 landscape 查證版為準。\n- 時效性事實標時點：`（2026-06）`。延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（函數圖形、面積分割、全書地圖），必須通過 `check_diagrams.py` 檢查（CJK=2 欄寬）。\n- 多行數學推導用 ```text 區塊；Python 實驗用 ```python 區塊。表格用於逼近表、對照表、陷阱清單。\n- 跨章引用格式：`（見 ch07）`，不要寫死檔名路徑。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整本書最美的一步」）。不行銷、不喊口號、不堆「太神奇了」式空洞感嘆——震撼要用內容本身造成，形容詞是結果不是手段。允許冷幽默。數學不裝高深：每個符號出場都有白話直覺在旁邊；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘」。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="calc";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">馴服無限<br><span style="font-weight:400;font-size:12px;color:var(--muted)">微積分的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 馴服無限';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
