                    **\n−1.75┤                                                       **\n     └─────────────────────────────────────────────────────────\n     x=0                                                     x=1\n```\n\n每加一層：鼓包數量乘 3、新鼓包高度減半。腦中把這個動作重複到無限——任何一小段裡都塞著無限代、越來越細的鼓包。這就是「怎麼放大都毛」的施工現場。\n\n## 差商為什麼拒絕安定\n\n構造看完了，現在補方向感：差商到底怎麼個不收斂法？挑最舒服的點 x = 0 開刀，因為每一層在 0 點都是 cos(0) = 1：\n\n```text\nW(0) = 1 + 1/2 + 1/4 + … = 2                       ← 振幅帳，幾何級數\n\n取 h = 3⁻ᵐ（剛好是第 m 層的半個週期），奇數 b 的魔法上場：\n  第 n ≥ m 層的角度 = 3ⁿπ·3⁻ᵐ = 3ⁿ⁻ᵐ·π = 奇數 × π → cos = −1（精確值！）\n  整條尾巴塌縮成幾何級數：Σ(n=m→∞) (1/2)ⁿ·(−1) = −2¹⁻ᵐ\n\nm = 1（h = 1/3）：\n  W(1/3) = cos(π/3) + 尾巴(n≥1) = 0.5 − 1 = −0.5\n  差商 Q₁ = (−0.5 − 2)/(1/3) = −7.5\n\nm = 2（h = 1/9）：\n  W(1/9) = cos(π/9) + (1/2)cos(π/3) + 尾巴(n≥2)\n         = 0.93969 + 0.25 − 0.5 = 0.68969\n  差商 Q₂ = (0.68969 − 2) × 9 = −11.793\n```\n\nm = 3 起只多用 cos(π/27) ≈ 0.99324 一個新值（m = 4 同法，計算器代勞），整列排開：\n\n| m | h = 3⁻ᵐ | W(h) | 差商 Qₘ = (W(h) − 2)/h | 與前一項的比值 |\n|---|---|---|---|---|\n| 0 | 1 | −2 | −4 | — |\n| 1 | 1/3 | −0.5 | −7.5 | 1.875 |\n| 2 | 1/9 | 0.68969 | −11.793 | 1.572 |\n| 3 | 1/27 | 1.33808 | −17.872 | 1.515 |\n| 4 | 1/81 | 1.66829 | −26.868 | 1.503 |\n\n差商不是在某個值附近徘徊拿不定主意——它**單調暴衝**，而且比值一路貼向 1.5，正是 ab。劇本完全照雙帳本走：h 每縮小到原來的 1/3，下一層的斜率預算（×3 的頻率、×1/2 的振幅）接管現場，差商就再漲約 ab = 1.5 倍。每縮一級，醒一層，漲一輪，永不安定。\n\n這裡可以挺直腰桿說一句重話：在 x = 0 這一點，我們**真的證死了**不可微——頭段每一項 cos θ − 1 ≤ 0 只會把差商往下推，所以 Qₘ ≤ −4·(1.5)ᵐ → −∞，差商沿這串 h 發散，極限不存在，沒有任何含糊。定理的怪獸之處在於「**每一個** x 都這樣」——壞點不是住在特殊位置，而是住滿整條數線——那需要真功夫（控制所有 x、所有靠近方式），本書不證。但你已經拿到了證明的靈魂：奇數 b 讓尾巴在關鍵點上集體同向（全是 −1，不互相抵銷），ab > 1 讓新層的斜率永遠蓋過舊層的總和。\n\n## 大自然先養了怪獸\n\n到目前為止，你可以把怪獸歸檔成「數學家的對抗性樣本」。十九世紀很多人正是這麼安慰自己的：真實世界的曲線才不會這樣。然後顯微鏡說話了。\n\n十九世紀初，植物學家布朗（Robert Brown）在顯微鏡下看到懸浮在水裡的微粒永不停歇地亂抖——後來以他為名的布朗運動（Brownian motion）。1905 年愛因斯坦（Einstein）給出解釋：微粒被無數看不見的水分子隨機撞擊。實驗物理學家佩蘭（Jean Perrin）接著用量測把分子的存在釘死，並在 1913 年的《Les Atomes》裡寫下一段堪稱本章註腳的觀察（2026-06 查證）：在軌跡的任何一點上，連近似的切線都定不出來——「數學家想像出來的那些沒有導數的連續函數，被當成單純的數學珍玩是不對的；大自然對它們的暗示，不亞於對可微函數的暗示。」一位實驗物理學家，隔著四十年對魏爾斯特拉斯遙遙舉杯。\n\n數學這邊由維納（Norbert Wiener）接棒，把布朗運動做成嚴格的隨機模型（Wiener process）。模型裡有一條正牌定理：**樣本路徑以機率 1 處處連續、處處不可微**（首證是 Paley–Wiener–Zygmund 1933；隨機過程理論本書不開門，只取這一個事實）。措辭要小心一次：處處不可微的是**數學模型的路徑**——物理微粒在分子尺度以下另有物理，模型在那裡退場。但在模型適用的好幾個數量級裡，「放大永遠毛」就是塵埃的日常。股價的標準隨機走勢模型繼承同一個性質——你看盤軟體裡那條怎麼縮放都是鋸齒的曲線，跟 1872 年柏林科學院黑板上的那條，是同一族。怪獸不是病態想像，是你每天盯著看的現實。\n\n## 病態反例：數學的 fuzz testing\n\n最後談方法論，因為這隻怪獸真正的遺產不是嚇人，是**測繪**。\n\n把定理想成 API 合約：假設是輸入驗證，結論是行為保證。1872 年之前，分析學的很多「定理」是在腦中樣本全是乖函數的情況下寫的合約——輸入驗證形同虛設，因為沒人送過惡意輸入。魏爾斯特拉斯做的事，用你的行話說就是 fuzz testing：精心構造一個病態輸入，打進「連續 ⇒ 頂多幾個壞點不可微」這條隱性假設，看它當場崩潰。W(x) 是數學史上最著名的 fuzz case——而且跟好的 fuzz case 一樣，它的價值不在搞破壞，在**精確標出合約真正的邊界**：「連續」這個前提，買得到積分（ch07 的黎曼和靠它）、買得到中間值，但買不到哪怕一丁點的「方向」。要可微，就得明碼寫可微。\n\n此後數學家的工作習慣被永久改變：每條定理的每個假設都要付錢，每個「顯然」都要過安檢——因為反例獵人就在外面巡邏。反例與定理從此成對出貨：定理畫出安全區，反例證明牆外真的有狼，兩者合起來才是完整的地圖。這場由怪獸（加上 ch11 的收斂之亂、ch12 的發散詐騙）逼出來的全面重建，就是 ch14 的主題。順帶一句收尾：這隻怪獸毛到連「維度」都不再是整數——本章手算的 a = 1/2、b = 3 版本，圖形的 Hausdorff 維度約 1.37，介於曲線與平面之間，而這個值遲至 2018 年才被嚴格證明（Shen，延伸閱讀），分形理論的門就開在這裡，本書到門口為止。\n\n## 直覺的陷阱\n\n| 錯誤直覺 | 它會把你帶去哪裡 | 自我察覺徵兆 |\n|---|---|---|\n| 「連續曲線頂多壞在幾個點」 | 跟十九世紀的教科書一起陣亡——「畫得出來」不等於「摸得出方向」 | 你用「手畫曲線」想像「連續函數」——手只畫得出乖函數，樣本偏差正在餵養你 |\n| 「連續跟可微差不多，都是『不跳』」 | 把 0 階性質（位置別跳）與 1 階性質（方向要安定）混記一本帳 | 你說不出「振幅帳 Σaⁿ 收斂、斜率帳 Σ(ab)ⁿ 發散」這兩本帳各自管什麼 |\n| 「光滑函數無限疊加還是光滑」 | 跟拉格朗日否決方波同一個坑（見 ch11）——有限世界的定理進無限世界要重新簽證 | 你在某個部分和裡找「開始變毛的那一層」——每個部分和都無限光滑，毛只住在極限裡 |\n| 「放大夠多倍總會變直」 | 局部線性當萬靈丹，碰上自相似結構就翻車 | 你沒注意到 W(x) = cos(πx) + a·W(bx)——每個尺度裡都有一隻完整的怪獸 |\n| 「抖得夠快就會不可微」 | 條件記成「b 很大」，漏掉拉鋸的另一頭 | 你講不出同一構造在 ab < 1 時是光滑的——勝負手是乘積 ab，不是 b 單獨 |\n| 「怪獸是數學家的惡趣味，自然界沒有」 | 把布朗運動、股價、P99 曲線的鋸齒當成「還沒放大夠」 | 你以為再提高取樣率，監控曲線就會平滑下來 |\n\n自我檢測法：任何一格要翻回正文才講得出「為什麼錯」，該節就還沒讀完。\n\n## 紙上推演\n\n**題 1 [10 分鐘] ★** — 不看書，用 ch04 的差商定義把「|x| 在 0 點連續但不可微」完整走一遍：左右差商各算一次、說明極限為什麼不存在、再說明連續性為什麼沒事。最後加答一題：怪獸在一點上的「壞」與 |x| 在 0 點的「壞」，差在哪裡？\n\n**題 2 [15 分鐘] ★★** — 回答本章的核心質疑：「無限疊加既然保得住連續，憑什麼毀得掉可微——這不矛盾嗎？」要求講出兩本帳各自的級數、各自管什麼性質，並用 ab 這顆旋鈕說明同一構造什麼時候乖、什麼時候是怪獸。\n\n**題 3 [10 分鐘] ★★** — 有人說：「自然界的曲線放大到最後都會平滑，數學怪獸只是紙上談兵。」舉一個反例，並誠實說明「測量尺度」在這個論證裡扮演什麼角色——哪一段尺度裡怪獸是對的模型、到哪裡模型該退場。\n\n### 推演解答\n\n**題 1**　右邊：h > 0 時差商 = (|h| − 0)/h = h/h = +1，每一步都恰好是 +1。左邊：h < 0 時差商 = |h|/h = −h/h = −1。差商的極限要求不論從哪邊、沿哪串 h 靠近都收斂到同一個值；現在右派全體說 +1、左派全體說 −1，極限不存在，0 點不可微。連續性：x → 0 時 |x| → 0 = |0|，位置沒有跳，連續成立——「位置」與「方向」是兩回事，這正是題 2 的開場。加答：|x| 的壞是「左右各有安定的斜率，但不相等」（一個尖角）；怪獸的壞更深一層——以 x = 0 為例，差商序列 −4, −7.5, −11.8, −17.9, …，根本沒有任何一邊安定下來，是發散，不是分裂。常見錯路：把「不可微」一律想成尖角——尖角只是不可微的最溫和款。\n\n**題 2**　不矛盾，因為兩個性質結的是兩本帳。連續性只需要**振幅帳**收斂：Σ aⁿ = 1/(1−a)，幾何級數，a < 1 就收斂——部分和連續、尾巴被一條對所有 x 同時成立的誤差帶罩死，極限連續（工程師的嚴謹版；正式定理見 ch14 提及的一致收斂，本書不證）。可微性要的是**斜率帳**安定：第 n 層最陡斜率 (ab)ⁿπ，ab > 1 時這本帳發散——h 每縮小 1/b，下一層帶著更大的斜率預算進場，差商每輪再漲約 ab 倍，永不安定。旋鈕：ab < 1 時斜率帳也是收斂的幾何級數，同一個無限疊加就是光滑函數；ab ≥ 1（哈代的門檻）怪獸出閘。一句話版本：**連續花的是振幅的錢，可微花的是斜率的錢；a 縮振幅、b 漲斜率，預算表可以一本盈餘一本破產。**\n\n**題 3**　反例現成：布朗運動的軌跡——顯微鏡下的塵埃微粒，放大好幾個數量級，軌跡始終是毛的；數學模型（Wiener process）裡這是定理：路徑以機率 1 處處不可微。股價曲線同款。測量尺度的角色：「自然界的曲線」其實永遠是「某段尺度範圍內的測量結果」，所以「平滑」或「毛」都必須附帶適用尺度——塵埃軌跡在光學可及的尺度範圍內怎麼放大都毛（怪獸是對的模型），但鑽到分子碰撞的尺度以下，連「軌跡」這個概念都得重新定義，模型退場。正確的結論不是「自然界沒有怪獸」也不是「自然界就是怪獸」，而是：**在一大段尺度裡，不可微的怪獸是某些自然現象最好的模型——而「可微」反而是需要特別理由的例外**。佩蘭在 1913 年就是這麼說的。\n\n### Python 小實驗\n\n換台機器疊一隻條件更兇的：a = 1/2、b = 7（哈代條件 ab = 3.5 ≥ 1；原始條件一樣不滿足，誠實如前）。看兩件事：部分和的**數值**收斂得多快（振幅帳），以及 zoom 三次之後「表觀斜率」怎麼爆炸（斜率帳）。\n\n```python\n# Weierstrass partial sums: W_N(x) = sum over n < N of a^n * cos(b^n * pi * x).\n# a = 1/2, b = 7: ab = 3.5 >= 1 satisfies Hardy's 1916 condition\n# (not Weierstrass's original ab > 1 + 3*pi/2 -- see chapter text).\n# Note: layers n >= 19 lose cos() phase accuracy in float64, but their\n# total amplitude is < 4e-6, invisible at 5 decimals.\nimport math\n\nA, B = 0.5, 7.0\n\ndef w(x, layers):\n    return sum(A ** n * math.cos(B ** n * math.pi * x) for n in range(layers))\n\nprint(\"x         W_3       W_10      W_30\")\nfor i in range(7):\n    x = i / 12\n    print(f\"{x:.4f} {w(x, 3):9.5f} {w(x, 10):9.5f} {w(x, 30):9.5f}\")\n\nprint(\"\\nzoom into x0 = 0.5 (30 layers): apparent slope = range / width\")\nfor k in range(4):\n    width = 0.1 / 10 ** k\n    vals = [w(0.5 - width / 2 + width * i / 400, 30) for i in range(401)]\n    rng = max(vals) - min(vals)\n    print(f\"width {width:>7g}: range {rng:8.5f}   range/width {rng / width:7.1f}\")\n```\n\n預期輸出（CPython 3，寫章時實際執行）：\n\n```text\nx         W_3       W_10      W_30\n0.0000   1.75000   1.99805   2.00000\n0.0833   1.07800   1.11427   1.11536\n0.1667   0.64952   0.57679   0.57735\n0.2500   1.23744   1.41283   1.41421\n0.3333   0.87500   0.99902   1.00000\n0.4167  -0.15944  -0.29857  -0.29886\n0.5000   0.00000  -0.00000  -0.00000\n\nzoom into x0 = 0.5 (30 layers): apparent slope = range / width\nwidth     0.1: range  1.30365   range/width    13.0\nwidth    0.01: range  0.70218   range/width    70.2\nwidth   0.001: range  0.20777   range/width   207.8\nwidth  0.0001: range  0.09978   range/width   997.8\n```\n\n讀法。上表是振幅帳的勝利：W₁₀ 與 W₃₀ 處處只差不到 0.002（尾巴 Σ(n≥10) (1/2)ⁿ ≈ 0.00195 罩死），函數的**值**穩如磐石——還附三個可以手驗的錨點：x = 0 時每層都是 cos 0 = 1，W = 2 整；x = 1/3 時 7ⁿ ≡ 1 (mod 6)，每層都讀到 cos(π/3) = 1/2，W = 1 整；x = 1/4 時每層都讀到 ±π/4 的 cos = √2/2，W = √2 ≈ 1.41421。表格全部命中。下表是斜率帳的災難：如果 W 在 0.5 可微，「窗內最大落差 ÷ 窗寬」應該隨放大收斂到 |W′(0.5)|；實際上窗寬每縮 10 倍，落差只縮到一半多一點，表觀斜率 13 → 70 → 208 → 998 一路暴漲（平均每放大十倍漲約 4.4 倍），毛刺在每個尺度等你。想加碼，把 0.5 換成任何一點、再多 zoom 兩級（記得同步加密取樣點，否則網格會漏掉比網格更細的毛——數值實驗自己也有解析度陷阱，ch11 的老叮嚀）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 「連續」與「可微」各自在管什麼？為什麼日常直覺覺得它們差不多，實際差多遠？\n2. 不看書寫出 W(x) 的構造，並說出 a、b 各自的角色與「兩本帳」各自的級數。\n3. 魏爾斯特拉斯的原始條件是什麼？哈代 1916 年放寬成什麼？本章手算的 a = 1/2、b = 3 靠哪一條背書？\n4. 在 x = 0，差商序列 −4, −7.5, −11.8, … 是怎麼算出來的？奇數 b 在哪一步幫了忙？比值為什麼貼向 ab？\n5. W(x) = cos(πx) + a·W(bx) 這條式子怎麼驗算？它跟「怎麼放大都毛」是什麼關係？\n6. 「布朗運動路徑處處不可微」這句話裡，哪部分是定理、哪部分要小心措辭？\n7. 把「病態反例是數學的 fuzz testing」展開講兩分鐘：怪獸到底測出了哪條合約的哪個漏洞？\n\n## 延伸閱讀\n\n- Wikipedia,〈Weierstrass function〉：https://en.wikipedia.org/wiki/Weierstrass_function ——條件、歷史與圖形的對帳處；開頭的動畫 zoom 圖就是本章「怎麼放大都毛」的動態版（2026-06 連結查證）。\n- G. H. Hardy,〈Weierstrass's non-differentiable function〉（Trans. AMS, 1916）：https://www.ams.org/journals/tran/1916-017-03/S0002-9947-1916-1501044-1/S0002-9947-1916-1501044-1.pdf ——放寬條件 ab ≥ 1 的原始論文，前兩頁的歷史回顧與條件陳述就值回票價（2026-06 連結查證）。\n- Quanta Magazine,〈The Jagged, Monstrous Function That Broke Calculus〉（2025-01）：https://www.quantamagazine.org/the-jagged-monstrous-function-that-broke-calculus-20250123/ ——怪獸史的科普敘事版，適合讀完本章躺著複習（2026-06 連結查證）。\n- Johan Thim,《Continuous Nowhere Differentiable Functions》（Luleå 碩士論文, 2003）：https://ltu.diva-portal.org/smash/get/diva2:1022983/FULLTEXT01 ——怪獸圖鑑：Bolzano、Takagi、van der Waerden……每隻都附完整證明，「鋸齒疊加」路線在這裡看（2026-06 連結查證）。\n- Mörters & Peres,《Brownian Motion》：https://www.mi.uni-koeln.de/~moerters/book/book.pdf ——定理 1.27 就是「路徑以機率 1 處處不可微」，想看正牌證明讀第一章即可（landscape 驗證連結）。\n- Weixiao Shen,〈Hausdorff dimension of the graphs of the classical Weierstrass functions〉：https://arxiv.org/abs/1505.03986 ——本章末那句「維度約 1.37」的出處，只讀引言就能看懂結果的意義（2026-06 連結查證）。\n"}, {"id": "ch14-rigor", "file": "ch14-rigor.md", "group": "Part V — 直覺崩壞與重建", "title": "ch14 — 嚴格化：ε-δ、實數的補完與無窮小的平反", "md": "# ch14 — 嚴格化：ε-δ、實數的補完與無窮小的平反\n\n> **本章解決什麼問題**：ch04 的 Berkeley 之譏、ch11 的收斂之亂、ch12 的發散詐騙、ch13 的怪獸——四張傳票同時到期，「靠直覺擔保」的微積分正式破產。本章是重建工程：把 ch03 的 ε 挑戰賽法典化成 ε-δ 定義、給「連續」一個一句話的精確身分、用戴德金切割把數線上的洞補滿；最後講一個漂亮的歷史反轉——被驅逐的無窮小，二十世紀被羅賓遜平反。讀完這章，ch01 芝諾開出的三張帳單（無限多步、瞬間、無限可分）全部結清。\n\n## 從你已知的出發\n\nPM 說：「這個 API 要夠快。」這句話沒辦法驗收——誰來測、測哪些請求、多快算夠？你被這種需求坑過，所以你會把它改寫成條款：「任一個 5 分鐘觀測窗內，99% 的請求延遲 < 200 ms。」這句話可以驗收，而且驗收方式是**對抗式**的：QA 任挑一個觀測窗來刁你，你的系統都得守住。把形容詞換成帶量詞的不等式——這是你做過很多次的 spec 工程。\n\n「越來越近」就是數學裡的「夠快」：一個禁不起驗收的形容詞。ch02 的雙重歸謬、ch04 的「h 趨近 0」、ch07 的「切到無限細」，全靠它撐著；乖例子上沒事，ch11 到 ch13 的事故證明它撐不住。本章要做的，就是替「越來越近」簽 SLA。而且你已經看過草約了——ch03 的 ε 挑戰賽。那時是故事版：對手出誤差容忍 ε，你回門檻 N，之後每一項都得進帶。本章把它寫成正式條文，再把條文沒寫到的最後一個漏洞——「逼近的目的地可能根本不存在」——用實數的完備性堵上。\n\n## 賬單到期：四張傳票\n\n先把債務清單攤開，看清楚要修的是什麼。\n\n**傳票一（ch04）**：1734 年 Berkeley 指出，牛頓的增量「既不是零又是零」——消逝之量的鬼魂（見 ch04）。微積分算出的答案全對，邏輯地基是空的。一百多年沒有人能正面回應。\n\n**傳票二（ch11）**：傅立葉宣稱任何週期函數都是 sin 的無限和，但「等於那個無限和」是什麼意思，沒有人說得清；逐項積分這種對有限和天經地義的操作，搬到無限和上無人背書（見 ch11）。\n\n**傳票三（ch12）**：無限和不是加法是極限——忘記這件事的人，被重排定理示範了「同一堆數想加成多少就加成多少」（見 ch12）。\n\n**傳票四（ch13）**：「連續的曲線總可以畫切線」這個兩千年的圖像信仰，被魏爾斯特拉斯一條處處連續、處處不可微的三角級數拆掉（見 ch13）。\n\n四張傳票，同一個病根：**當時所有的定義都長在圖像上**。「接近」是腦中的一段動畫，「連續」是一筆畫不離紙，「和」是把東西堆起來。圖像當直覺極好——本書前十三章都在用——但圖像當定義，遇到怪獸時每個人看到的東西不一樣，吵架沒有裁判。需要的是另一種定義：不引用任何圖、不依賴任何人的想像力、能被最不友善的對手逐字檢驗。十九世紀數學家交卷的答案，就是把 ch03 那場遊戲寫成法律。\n\n## ε-δ：把挑戰賽寫成法典\n\n正式條文一行（極限的 ε-δ 定義（epsilon-delta definition））：\n\n```text\nlim(x→a) f(x) = L  ⟺  ∀ε>0 ∃δ>0 ∀x (0 < |x−a| < δ ⇒ |f(x)−L| < ε)\n```\n\n大一的你看到這行符號大概只想翻頁。先別翻——逐字翻譯之後，它就是 ch03 挑戰賽的對局規則，一個字都沒有多：\n\n```text\n∀ε>0           對手出招：任挑一個誤差容忍 ε，越小越刁鑽\n∃δ>0           你回招：交出一個窗寬 δ——可以依 ε 量身訂做\n∀x(0<|x−a|<δ   裁判驗收：凡是進了你的窗的 x（a 本人除外）\n  ⇒|f(x)−L|<ε) 它的函數值就必須進對手的帶。漏一個 x 就輸\n```\n\n**量詞的順序就是出招的順序。**∀ε 寫在 ∃δ 前面，意思是對手先出、你後回，所以你的 δ 可以依 ε 訂做——這正是你能贏的原因。把順序對調成 ∃δ ∀ε，字面只差一個位置，意思卻是「你先押死一個 δ，之後任何 ε 都得接」——一個強到幾乎沒有函數能滿足的宣稱（紙上推演第 2 題會讓你親手算出它到底在說什麼）。如果你讀過書架上那本 TLA+ 書，∀∃ 的攻防結構你已經演練過；沒讀過也無妨，ch03 的挑戰賽就是完整的訓練。數列版 lim(n→∞) aₙ = L 同款，只是「窗寬 δ」換成「門檻 N」。\n\n三個細節值得停下來看，每一個都是精密的工程決策。\n\n**第一，0 < |x−a| 那個 0。**它把 x = a 本人踢出驗收範圍：極限從頭到尾不過問 f(a) 是多少，甚至不要求 f(a) 有定義。這一個小於號，就是 ch04 整章的合法性來源——差商 (f(x+h)−f(x))/h 在 h = 0 處根本沒定義，沒關係，定義從來不看那一點（見 ch04）。\n\n**第二，條文裡沒有任何東西在動。**「趨近」「越來越」「消逝中」這些動詞全部蒸發了，剩下的只有靜態的不等式：給定的 ε、存在的 δ、對每個 x 成立的蘊涵。芝諾拿來開刀的「運動」、Berkeley 譏笑的「消逝中的量」，在條文裡連藏身處都沒有——沒有量正在變小，自然沒有鬼魂。第一張傳票，結清。\n\n**第三，條文比直覺更會說話。**ch11 留下一句「逐點收斂成立、一致貼合不成立」，當時只能用 Gibbs 耳朵比劃（見 ch11）；現在可以一字不差寫下來——「每個 x 各自有自己的 N」是 ∀x ∃N，「一張 N 全場通用」是 ∃N ∀x，差別只在 ∃N 站在 ∀x 的前面還是後面。直覺裡糊成一團的兩種「收斂」，在量詞語言裡是兩個肉眼可辨的句子。順帶一提，ch05 賒的帳——極限的和、積、商運算定律——在這套語言下全部成為可逐條證明的定理（本書不證，見延伸閱讀的 Spivak）。\n\n我認為這是整本書最被低估的聰明：一行式子裡裝著一座無限大的測試矩陣——每個 ε 一列——但每一張測試單都是有限檢查。大一時它折磨你，不是因為它難，是因為沒有人告訴你這是一場對局的轉播逐字稿；你拿到的是法典，沒拿到立法理由書。\n\n## 完整示範：lim(x→3) x² = 9\n\n來打一場函數版的正式比賽。先畫好球場：\n\n```text\n      y\n      │                           *    f(x) = x²\n      │                        *\n  9+ε ┤┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄*┄┄┄┄┄┄┄┄┄  ← 帶的上緣（ε 是對手出的）\n      │                  *\n    9 ┤···············*···············  ← L = 9\n      │            *\n  9−ε ┤┄┄┄┄┄┄┄┄┄*┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄┄  ← 帶的下緣\n      │      *\n      │   *\n      └──────────┴────┴────┴──────────  x\n                3−δ   3   3+δ\n                 └─────────┘\n                 你回的 δ 窗\n```\n\n對手畫一條水平帶（9 ± ε），你要回一個豎直窗（3 ± δ），使曲線在窗內的部分整段住在帶裡——曲線穿出帶的位置，必須在窗外。ε 越小、帶越扁，你的窗就得越窄。\n\n現在誠實一次。大學課本只印「正式證明」那一欄，乾淨得像第一次就寫對；數學家真正的工作現場是另一欄——**倒著走**：從想要的結論出發，反推需要什麼。兩欄並排：\n\n```text\n┌─ 草稿：倒著找 δ（不外流） ───────────┬─ 正式證明：正著寫（出版品） ───┐\n│ 目標　把 |x²−9| 壓到 ε 以下          │ 1. 給定任意 ε > 0。            │\n│ 拆解　|x²−9| = |x−3|·|x+3|           │ 2. 取 δ = min(1, ε/7) > 0。    │\n│ 盤點　|x−3| 歸我管（它 < δ）；       │ 3. 設 0 < |x−3| < δ。          │\n│ 　　　|x+3| 是路人，得先銬住         │ 4. 因 δ ≤ 1：|x−3| < 1，       │\n│ 押注一　要求 δ ≤ 1，於是             │    故 2 < x < 4，|x+3| < 7。   │\n│ 　　　|x−3| < 1 ⇒ 2 < x < 4          │ 5. 因 δ ≤ ε/7：                │\n│ 　　　⇒ |x+3| < 7                    │    |x²−9| = |x−3|·|x+3|        │\n│ 代回　|x²−9| < 7·|x−3| < 7δ          │           < δ·7 ≤ (ε/7)·7      │\n│ 押注二　要求 δ ≤ ε/7，               │           = ε。（證畢）        │\n│ 　　　使 7δ ≤ ε——到手                │                                │\n│ 合併　δ = min(1, ε/7)                │ （對手任出 ε，皆已接住。）     │\n└──────────────────────────────────────┴────────────────────────────────┘\n```\n\n左欄的劇情：誤差 |x²−9| 拆開後是兩個因子的乘積，|x−3| 是你直接控制的量，|x+3| 卻跟著 x 跑——它是個**變動的放大倍率**（在 x = 3 附近大約是 6）。對付變動倍率的招數，是先把窗釘死在一個範圍內：押 δ ≤ 1，倍率就被銬在 7 以下；剩下的事只是除法。min(1, ε/7) 的兩個成分各管一件事：1 銬路人，ε/7 壓誤差。\n\n實彈試射一發：對手出 ε = 0.7，你回 δ = min(1, 0.1) = 0.1。抽查 x = 3.05：|x²−9| = |9.3025−9| = 0.3025 < 0.7 ✓；逼到窗邊 x → 3.1：誤差 → 9.61−9 = 0.61，仍 < 0.7 ✓——還留有餘裕，因為那裡的實際倍率只有 6.1，我們用 7 當保守上界。\n\n幾件事要說破。第一，**δ 不唯一，醜不扣分**：押 δ ≤ 2 會得到倍率上界 8、答案 δ = min(2, ε/8)，照樣全贏；比的是能不能接住，不是誰的 δ 最大最優雅。第二，**倒著找、正著寫，不是作弊也不是滅證**。草稿欄是探案，證明欄是呈堂證供——證明的職責不是重演發現過程，是讓每一行都能被逐行查驗。你也不會把 debug 時的二十次亂試寫進 commit message。大一的創傷多半來自把出版品當原稿讀：你以為別人一眼就看出 min(1, ε/7)，其實人人都是倒著爬回來的。第三，這場勝利跟 ch03 的終局同款——一條公式接管對手的所有出招，無限場驗收一次清空。\n\n## 連續：搭一句話的便車\n\n極限定義好了，連續（continuous）就是搭便車的一句話：\n\n```text\nf 在 a 點連續  ⟺  lim(x→a) f(x) = f(a)\n```\n\n展開就是 ∀ε>0 ∃δ>0 ∀x (|x−a|<δ ⇒ |f(x)−f(a)|<ε)——跟極限的條文幾乎同一張，差別有二：目的地 L 換成 f(a) 本人，以及不再需要「0 <」（x = a 自己代入，誤差是 0，永遠達標）。這一句話裡藏著三項驗收：f(a) 要存在、極限要存在、兩者要相等。ch08 那個跳躍函數敗在第三項：左右極限各自存在卻不會合（見 ch08）。「一筆畫不離紙」的圖像退役，換上可以逐點開庭的條款——而 ch06 的極值定理、ch08 的 FTC 第 5 步，這些「連續就保證……」的承諾書，全都要等下一節把地基灌好才能兌現。\n\n## 實數的補完：數線上的洞\n\n最後一個漏洞最深。挑戰賽驗收的是「逼近 L」，但誰保證那個 L **存在**？\n\n在有理數（rational numbers）的世界裡做個實驗。定義 xₙ ＝「小數點後 n 位、平方仍小於 2 的最大小數」：1, 1.4, 1.41, 1.414, 1.4142, …（複核：1.41² = 1.9881 < 2 < 2.0164 = 1.42²）。這個數列每一項都是有理數、遞增、有上界 1.5、相鄰項差距不超過 10⁻ⁿ——以一切直覺標準它都在「收斂」。但它的目的地是 √2，而 √2 不是有理數（紙上推演第 3 題給完整論證）。**夾擠程序執行得完美無缺，夾住的位置卻是一個洞。**\n\n注意這有多陰險：ℚ 是稠密（dense）的——任兩個有理數之間還有無限多個有理數——畫在紙上密不透風，看起來就是一條完整的線。**稠密不等於完備**；你畫的那條「數線」自帶連續性，是一張預載了結論的圖。這正是「圖像不能當定義」最深的一個案例：洞用眼睛看不到，只有像上面那樣的數列才探測得到。\n\n1872 年，戴德金（Richard Dedekind）給出了補洞的辦法——據他自述，想法成形於 1858 年 11 月 24 日，在蘇黎世教微積分、自覺講不清楚「連續」的那段日子，擱了十四年才出版。做法叫切割（Dedekind cut）：拿一把刀把全部有理數劈成左右兩堆，左堆每個都小於右堆每個。有的刀口正落在某個有理數上；有的刀口落空——例如「左堆＝負數與平方小於 2 的正數，右堆＝其餘」這一刀，左堆沒有最大值、右堆沒有最小值，刀口處什麼都沒有。**落空的刀口就是洞。**戴德金的動作是：把每一刀本身宣告為一個數——實數（real number）就是有理數的切割全體。原本的有理數對應砍中的刀，無理數就是那些落空的刀。用洞的形狀替洞發身分證，荒謬又天才；而這套定義只用到有理數和集合，一張圖都沒引用。\n\n補完之後得到的性質叫**完備性（completeness）**：對實數怎麼切，刀口都落在一個數上；等價的常用形態是「遞增且有上界的數列必收斂」（ch09 賒的那一筆）。另一條補洞路線一句話存檔：把實數定義成有理數柯西序列（Cauchy sequence）的等價類——梅雷（Méray）1869 年首發、康托爾 1872 年的版本流傳最廣——殊途同歸。\n\n完備性為什麼是地基？因為**全書每一次「取極限」都假設了目的地存在**：ch02 雙重歸謬夾出的那個面積、ch03 幾何級數部分和的歸宿、ch07 上和與下和會合的那一點、ch06「連續函數在閉區間上必有最大值」的那個最大值（見 ch02、ch03、ch07、ch06）——沒有完備性，這些全是對著可能不存在的地址寄包裹。順手還能把 ch03 用過的阿基米德性質正式入帳：若自然數全體在 ℝ 中有上界，完備性給出最小上界 s，但 s−1 之上必有某個自然數 n，於是 n+1 > s，矛盾——所以不存在「小於一切 1/n 的正數」，實數裡藏不了無窮小。\n\n把人物與年份排好隊，就是嚴格化的譜系：波爾查諾（Bolzano）1817 年已有嚴格定義但幾乎無人讀到；柯西 1821 年《Cours d'analyse》把分析學重建在極限之上，證明裡已是 ε 式論證，定義本身卻還用「無窮小增量」的語言寫——觀念奠基在柯西；今天課本上的符號版定稿於魏爾斯特拉斯——1861 年柏林講義起，由他的學派系統化；地基則是 1872 年灌的漿：戴德金的切割、康托爾的柯西序列，同一年，魏爾斯特拉斯還在這一年的 7 月向柏林科學院展示了怪獸函數（見 ch13）——驗收新地基的壓力測試與地基本身同年交付。注意工程順序：大樓十七世紀就蓋了（牛頓、萊布尼茲），樑柱 1821 到 1861 年補強，地基 1872 年才灌——**數學史是從屋頂往下蓋的**，跟教科書的呈現順序正好相反（ch16 會回收這條線）。\n\n## 歷史反轉：無窮小的平反\n\n故事到這裡，標準版的結局是：無窮小被驅逐出境，ε-δ 一統江湖。真實的結局多一個轉折，而且漂亮得多。\n\n1960 年，邏輯學家羅賓遜（Abraham Robinson）在普林斯頓的研討會上提出非標準分析（non-standard analysis），1966 年出版同名專著：在嚴格的模型論基礎上造出超實數（hyperreal numbers）ℝ*——一個真的含有無窮小的數系，裡面有大於 0 卻小於一切 1/n 的數，加減乘除樣樣合法。在 ℝ* 裡，導數可以名正言順地定義成「兩個無窮小相除再取最近的標準數」，萊布尼茲的 dy/dx 直覺整套平反——遲到了快三百年（見 ch04、ch07 兩度埋的伏筆）。Berkeley 的傳票於是被結清了**兩次**：第一次是魏爾斯特拉斯把無窮小驅逐出境（鬼魂不存在），第二次是羅賓遜發給它合法證件（鬼魂領到身分證）。1734 年那聲譏笑，兩個答案都對得起它。\n\n但平反有附帶條件。其一，ℝ* 的無窮小帶著嚴格的使用規則——轉移原理（transfer principle）：用標準語言寫的敘述，在 ℝ 為真若且唯若在 ℝ* 為真。這保證了兩邊證出的標準定理一模一樣——**兩套地基撐同一棟樓**，選哪套是工程偏好，不是對錯。其二，天下沒有白吃的地基：ℝ* 為了容納無窮小，放棄了完備性本身（無窮小全體有上界、卻沒有最小上界——若有，它的一半或兩倍立刻製造矛盾）。其三，造出 ℝ* 的模型論機器（超濾子、超結構）相當重，本書不開箱——知道機器存在、且通過驗收即可。也別把平反讀成追溯特赦：歐拉們十八世紀的形式操作是真的在沒有安全帶的情況下飛（見 ch12），羅賓遜的無窮小繫著安全帶；結果論的「反正最後都能嚴格化」不是跳步的授權。\n\n那為什麼今天的課本還是 ε-δ？因為它不需要任何新機器——量詞和不等式，每個審稿人都讀得懂；它已是分析學的通用語。用無窮小教大一微積分可不可行？可行——Keisler 真的寫了一本，免費放在網路上（延伸閱讀）——但生態系沒有翻盤的理由。地基的選擇，最終是社群的工程決策；這句話你在技術選型會議上應該聽過。\n\n最後一句話把視野拉開：地基翻新沒有完結篇。1902 年，勒貝格（Henri Lebesgue）的博士論文《Intégrale, longueur, aire》把積分整個重蓋了一次——黎曼積分對付不了的病態函數（ch13 那種等級），在勒貝格積分下服服貼貼——那是下一場重建的故事，本書送你到門口（延伸閱讀）。嚴格化不是數學家的潔癖，是事故之後補的回歸測試套件；而 ε-δ 這份 spec 寫得夠好，好到連對手陣營被平反之後，它仍然是大家開會用的語言。\n\n## 直覺的陷阱\n\n| 錯誤直覺 | 它把你帶去哪 | 自我察覺的徵兆 |\n|---|---|---|\n| 「ε-δ 是用來求極限的」 | 拿定義硬算 L 算不出來，挫折感爆表 | 你想用條文「解出」L——其實 L 要先用別的方法猜到（數值表、代數約簡），定義只負責驗收 |\n| 「δ 要找到最好的那個」 | 卡在「我的 δ 是不是最大」，永遠寫不完證明 | 你在比較 min(1, ε/7) 和 min(2, ε/8) 誰「對」——都對，能接住就贏 |\n| 「量詞順序無所謂」 | ∃δ ∀ε 與 ∀ε ∃δ 當同一句話讀，整個定義垮掉 | 你寫出一個不依賴 ε 的 δ 還覺得理所當然；說不出「對手先出招」是哪個量詞 |\n| 「稠密就是沒有洞」 | 以為 ℚ 密不透風所以夾擠必有歸宿 | 你說不出 ℚ 缺哪條性質、也說不出「遞增有上界」在 ℚ 裡哪裡會失敗 |\n| 「完備性看圖就知道，不用講」 | 把要證的東西畫進圖裡當前提 | 你的論證出現「從圖上看，它總會夾到一點」 |\n| 「嚴格化是數學家的潔癖」 | 把 ε-δ 課當無意義的折磨，整個 Part V 白上 | 你講不出任何一件「不嚴格真的出過事」的事故——ch11 到 ch13 就是事故報告 |\n| 「無窮小平反＝當年怎麼用都沒錯」 | 拿羅賓遜替自己的跳步辯護 | 你說「反正最後都嚴格化了」——平反的是概念，不是當年的論證 |\n\n## 紙上推演\n\n**第 1 題 [10 分鐘] ★　對 lim(x→2) 3x = 6 打一場正式 ε-δ**\n先寫草稿欄（倒著找 δ），再寫證明欄（正著走）。然後回答：這題為什麼不需要 min？\n\n**第 2 題 [15 分鐘] ★★　量詞對調之後，條文在說什麼？**\n把定義改成 ∃δ>0 ∀ε>0 ∀x (0<|x−a|<δ ⇒ |f(x)−L|<ε)。推出：什麼樣的 f 能通過這個顛倒版驗收？f(x) = x² 在 a = 3 過得了嗎？\n\n**第 3 題 [15 分鐘] ★★　有理數世界裡，夾擠夾到空氣**\n沿用正文的 xₙ：1, 1.4, 1.41, 1.414, …（n 位小數、平方 < 2 的最大者）。(a) 證明 xₙ² 與 2 的差距小於 4·10⁻ⁿ；(b) 由此推出：若 xₙ 在 ℚ 中有極限 L，則 L² = 2；(c) 證明沒有有理數的平方是 2，結案。最後用一句話把這件事接回黎曼和。\n\n**第 4 題 [10 分鐘] ★★　口頭題：講給被大一微積分傷害過的朋友聽**\n不看書，把「ε-δ 是挑戰賽的法典化」講到對方願意再給它一次機會。講完對照解答的要點清單自評。\n\n### 推演解答\n\n**第 1 題**：草稿——目標 |3x−6| < ε；拆解 |3x−6| = 3|x−2|；|x−2| 歸我管，要 3δ ≤ ε，押 δ = ε/3，沒有路人需要銬。證明——給定任意 ε > 0，取 δ = ε/3 > 0；設 0 < |x−2| < δ，則 |3x−6| = 3|x−2| < 3·(ε/3) = ε。（證畢）試射一發：ε = 0.3 → δ = 0.1，x = 2.09 時 |3x−6| = 0.27 < 0.3 ✓。\n不需要 min 的原因：x² 那題的誤差因子 |x+3| 是隨 x 變動的放大倍率，得先用 δ ≤ 1 銬住；3x 的「倍率」恆等於 3，天生就被銬好了。一般規律：直線的 δ 一步到位，彎的東西才需要先控制倍率——而「彎的東西局部看起來像直線」正是 ch05 的世界觀，所以 ε-δ 證明裡的 min 戲法，本質上是在「先把局部圈出來」。\n\n**第 2 題**：固定窗內任一個 x（x ≠ a）。顛倒版要求 |f(x)−L| < ε 對**每一個** ε > 0 成立——一個非負的數小於一切正數，只能是 0，所以 f(x) = L。結論：顛倒版驗收的是「f 在 a 附近（除了 a 本人）恆等於 L」——不是「逼近」，是「釘死」。f(x) = x² 在 a = 3 過不了：任何窗內都有 x ≠ 3 使 x² ≠ 9。所以 ∀ε ∃δ 和 ∃δ ∀ε 之間隔著「所有會動的函數」——量詞順序不是文法潔癖，是定義的全部內容。\n\n**第 3 題**：(a) 由 xₙ 的定義，xₙ² < 2 ≤ (xₙ + 10⁻ⁿ)²（再加一格就超標）。於是 2 − xₙ² ≤ (xₙ+10⁻ⁿ)² − xₙ² = 2xₙ·10⁻ⁿ + 10⁻²ⁿ < 3·10⁻ⁿ + 10⁻ⁿ = 4·10⁻ⁿ（用了 xₙ < 1.5 與 10⁻²ⁿ ≤ 10⁻ⁿ）。抽查 n = 2：2 − 1.9881 = 0.0119 < 0.04 ✓。(b) 若 xₙ → L，極限運算定律給 xₙ² → L²；但 (a) 說 xₙ² → 2，極限唯一，故 L² = 2。(c) 設 L = p/q 為最簡分數且 p² = 2q²：左邊 p² 是偶數 ⇒ p 偶，寫 p = 2k 得 4k² = 2q² ⇒ q² = 2k² ⇒ q 也偶——與最簡矛盾。所以 ℚ 裡沒有這個 L：數列乖乖夾擠，卻夾到空氣。\n接回黎曼和：黎曼和的機器正是兩條單調數列（上和、下和）互相夾擠（見 ch07），機器本身不保證夾住的位置是個「存在的數」——保證書是完備性簽的。同一句話的另一個版本：π 的十進位截斷 3.1, 3.14, 3.141, … 全是有理數、夾擠得漂漂亮亮，但 π 不是有理數（蘭伯特（Lambert）在 1760 年代用連分數證明，本書不證）——在只有 ℚ 的宇宙裡，ch02 阿基米德夾了一輩子的那個目標根本不存在。\n\n**第 4 題**：要點清單（你的版本必須命中至少前四點）：①先講遊戲再給符號——對手出誤差 ε、你回窗寬 δ、窗內全進帶就贏；②量詞順序＝出招順序，∀ε 在前所以 δ 可以依 ε 訂做；③定義只驗收、不搜尋——L 是先猜出來再驗收的，拿定義求 L 注定挫折；④課本只印「正著寫」的出版品，沒印「倒著找」的草稿——你當年覺得自己笨，其實是被滅了證的工作流程騙了；⑤一行條文＝無限張驗收單，但每張都是有限檢查——這是人類對「無限」最成功的一次工程化收編。加分項：現場用 lim(x→2) 3x = 6 打一局示範。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. ∀ε ∃δ 的順序為什麼是「對手先出招」？對調成 ∃δ ∀ε 之後，條文驗收的變成什麼？\n2. δ = min(1, ε/7) 裡，1 和 ε/7 各自在做什麼工？為什麼直線的證明不需要 min？\n3. 「倒著找 δ、正著寫證明」為什麼不是作弊？對照你自己 debug 與 commit 的關係講一遍。\n4. 連續的一句話定義是什麼？它跟極限定義差在哪兩個地方？那一句話裡藏著哪三項驗收？\n5. 稠密與完備差在哪？用 xₙ = 1, 1.4, 1.41, … 把「ℚ 看起來沒洞、其實有洞」講清楚。\n6. 為什麼說 ch02 的雙重歸謬、ch03 的級數、ch07 的黎曼和全都「偷偷靠完備性兜底」？沒有完備性會壞在哪一步？\n7. 戴德金的切割是怎麼「用洞的形狀替洞發身分證」的？\n8. 羅賓遜平反了什麼、沒平反什麼？「兩套地基撐同一棟樓」的精確意思（轉移原理）是什麼？\n\n## 延伸閱讀\n\n- Spivak,《Calculus》第 4 版（Publish or Perish, 2008）——「對嚴格性的初次正面相遇」的標竿教科書；讀極限與連續那幾章，看 ε-δ 在行家手裡可以多優雅。\n- William Dunham,《The Calculus Gallery: Masterpieces from Newton to Lebesgue》（Princeton UP）——本章的譜系（柯西、魏爾斯特拉斯、康托爾到勒貝格）每人一間展廳，用原典級證明走完嚴格化全程。\n- Dedekind,《Essays on the Theory of Numbers》（Beman 英譯，Project Gutenberg 第 21016 號電子書，免費）：https://www.gutenberg.org/ebooks/21016 ——第一篇就是 1872 年的切割原典，不到三十頁，數學史上少見的「原作比教科書好讀」（2026-06 驗證連結）。\n- H. Jerome Keisler,《Elementary Calculus: An Infinitesimal Approach》：https://people.math.wisc.edu/~hkeisler/calc.html ——用羅賓遜的無窮小從頭教一遍大一微積分的完整教科書，CC 授權免費線上版（2026-06 驗證連結）；翻第 2 章，看 dy/dx 當真正的除法用是什麼感覺。\n- Judith Grabiner,〈Who Gave You the Epsilon? Cauchy and the Origins of Rigorous Calculus〉：https://www.jstor.org/stable/2975545 ——ch03 引過、本章正主：「觀念奠基在柯西、符號定稿在魏爾斯特拉斯」這條主線的史學依據。\n"}, {"id": "ch15-mother-tongue", "file": "ch15-mother-tongue.md", "group": "Part VI — 回到今天", "title": "ch15 — 工程母語：微積分在你技術棧的藏身處", "md": "# ch15 — 工程母語：微積分在你技術棧的藏身處\n\n> **本章解決什麼問題**：前十四章，每章開頭都有一座「從你已知的出發」的橋——數學是正文，工程是引橋。本章把方向整個倒過來：從你天天在摸的工具（Prometheus、K8s HPA、訓練曲線、延遲分布）出發，反向走回數學，並把話說死：這些對應不是教學比喻，是字面意義的同一件事。本章沒有任何新數學，所有零件 ch01–ch14 都發過了，這裡只做總裝與驗收；Part VI 由此開場，ch16 做最後的口試。\n\n```\nPart I 恐懼與圍捕           Part II 微分         Part III 中心寶石\nch01 芝諾的箭               ch04 瞬間速度        ch07 積分：累積\nch02 窮盡法      →          ch05 導數的代數  →   ch08 基本定理 ★\nch03 極限                   ch06 最佳化               │\n                                                      ↓\nPart VI 回到今天 ◄你在這裡  Part V 崩壞與重建    Part IV 語言長大\nch15 工程母語    ←          ch12 發散的詐騙  ←   ch09 無限級數\nch16 總收官                 ch13 怪獸函數        ch10 微分方程\n                            ch14 嚴格化          ch11 傅立葉\n```\n\n## 從你已知的出發\n\n這一節在前十四章是引橋。這一章，整章都是這一節。\n\n先把已經走過的橋收成一張總表——左欄是你的工具，右欄是它的數學本名。注意措辭：沒有一列是「就像」，每一列都是「就是」：\n\n| 你的工具 | 數學本體 | 在哪一章對過帳 |\n|---|---|---|\n| counter、`rate()`、`increase()` 三位一體 | 累積函數與微積分基本定理（FTC） | ch08 |\n| 間隔逐次砍半的重試，總等待鎖死在 2 秒 | 幾何級數收斂 | ch01、ch03 |\n| 遊戲伺服器的 tick 迴圈 `pos += v·dt` | Euler 法解微分方程 | ch10 |\n| 頻譜圖、EQ、監控曲線的日週期 | 傅立葉級數 | ch11 |\n| P99 曲線怎麼放大都毛 | 連續但處處不可微的怪獸函數 | ch13 |\n| 浮點大批求和，換個順序換個答案 | 條件收斂與重排定理 | ch12 |\n\n散裝的還有：負載測試的上下界夾擠＝窮盡法（ch02）、`abs(a−b) < eps`＝極限的容差語言（ch03）、autoscaling 步距調參＝學習率（ch06）。這些橋都走過了，本章不重走。本章要補的是三個還沒正式拆過的房間——訓練迴圈、控制迴圈、延遲分布——然後對「理想數學 vs 浮點現實」做一次總結帳。\n\n## 引擎室：梯度下降與反向傳播\n\n你盯著訓練曲線（loss 對 step 的折線）往下掉的時候，看的其實是 ch06 那張迭代表的億維版本：每個 step，系統算一次坡度、往坡下挪一步、記下新的 loss。ch06 的玩具版你手算過——f(x) = x²、學習率 η = 0.1、從 x₀ = 3 出發，每步乘 0.8，五步走到 0.98304，f 每步乖乖乘 0.64。真實的損失函數不是一條曲線，是一片地形：上億個參數是座標、loss 是海拔，訓練就是在起霧的山坡上摸著局部坡度往下走（ch06 的多維一瞥）。\n\n只剩一個問題：億維的坡度——梯度——憑什麼算得起？答案是 ch05 的連鎖規則，外加一套聰明的記帳順序。這套記帳法叫**反向傳播**（backpropagation）。\n\n神經網路是一條很長的複合函數管線：輸入進去，一層一層加工，最後吐出 loss。ch05 講過複合函數的全部祕密——**比率層疊**：每一級加工在工作點附近都是一個縮放器，總倍率＝各級倍率相乘，dz/dx = dz/dy · dy/dx。反向傳播做的事一句話講完：**從輸出端開始，把各級倍率一路往回乘，沿途記帳**。看迷你版，兩級管線 f(x) = (3x+1)²，拆成 u = 3x+1、f = u²，在 x = 1 算 df/dx：\n\n```text\n前向傳遞（先把每一級的值算出來，x = 1）：\n  u = 3·1 + 1 = 4\n  f = u²    = 16\n\n反向傳遞（從輸出端把比率往回乘）：\n  df/df = 1                          ← 起點：f 對自己，倍率 1\n  df/du = 1 × 2u = 1 × 8 = 8         ← 過「平方」級：這一級的倍率是 2u\n  df/dx = 8 × 3       = 24           ← 過「×3 再 +1」級：這一級的倍率是 3\n```\n\n比率沿著鏈傳播的樣子：\n\n```\n前向（值往右流）  ：x = 1 ──[×3 再 +1]──► u = 4 ──[平方]──► f = 16\n反向（比率往左乘）：24 = 8×3 ◄──[倍率 3]── 8 = 1×2u ◄──[倍率 2u = 8]── 1\n```\n\n用 ch04 的第二條路驗算：f(x) = (3x+1)² = 9x² + 6x + 1，直接微分得 f′(x) = 18x + 6，代 x = 1 得 24 ✓。兩條路會合——反向傳播不是新的真理，是把「先合成再微分」換成「先微分再相乘」的那條 ch05 便道，加上固定從輸出端走回來的紀律。\n\n真實網路跟這個玩具的差別只有兩個。第一是規模：x 不是一個數，是上億個參數；每級「倍率」不是一個數，是一整箱偏導數——把倍率推廣到矩陣的那門手藝叫矩陣微積分，本書不進門，延伸閱讀有地圖。第二是方向是精打細算過的：從輸出端往回乘，每個中間量的比率只需要算一次、供下游所有參數共用，整箱億維梯度的成本跟前向跑一遍同一個量級——倒著記帳不是品味，是演算法上的勝負手（本書講到直覺為止）。\n\n最後把歷史的帳記對（ch06 排過，這裡收口）：「往坡下走」是柯西（Cauchy）1847 年的方法；反向傳播在數學上就是連鎖規則的反向應用，1986 年 Rumelhart–Hinton–Williams 的 Nature 論文使它**普及**——普及，不是發明，反向模式的自動微分更早就有人做出來。所以這句話可以放心說死：**現代 AI 的引擎室裡是 ch05 與 ch06**。費馬的平頂、柯西的下坡、萊布尼茲的比率層疊——沒有新魔法，只是三百年的舊觀察換上了 GPU。\n\n## 控制迴圈：PID——誤差的三種時態\n\n恆溫器怎麼把室溫釘在 22 度？巡航定速怎麼把車速釘在 100？K8s 的 HPA 怎麼把 CPU 使用率釘在 60%？同一個問題形狀：有個你控制得了的輸出（加熱功率、油門、副本數），有個你想釘住的量測值，中間隔著一個會亂動的世界。\n\n定義誤差 e(t) ＝ 目標值 − 量測值。工業界統治級的答案叫 **PID 控制器**（PID controller），輸出只有一行：\n\n```text\nu(t) = Kp·e(t) + Ki·∫₀ᵗ e(s) ds + Kd·e′(t)\n       現在的誤差    過去的累積        未來的趨勢\n```\n\nP、I、D 三個字母不是神祕縮寫：字面上就是比例（proportional）、積分（integral）、微分（derivative）——ch07 與 ch04 的名字直接焊在型號上。三項是誤差的三種時態：\n\n- **P 看現在**：誤差多大就用多大力修——差 3 度開大火，差 0.5 度開小火。簡單有效，但有個結構性缺陷：只靠 P，多半留下一個永遠修不掉的固定偏差（穩態誤差，steady-state error）。為什麼，推演第 2 題用紙筆推給你看。\n- **I 看過去**：把開機以來的誤差整段積起來。只要誤差持續偏同一邊，這筆帳就持續長大、輸出持續加碼，直到誤差被壓回 0 為止；而且歸零之後，「維持輸出所需的力道」被積分整筆記在帳上——它就是 ch08 的累積函數。消滅穩態誤差的是它；代價是它有慣性，會衝過頭。\n- **D 看未來**：誤差的變化率。誤差正在快速縮小？先收力，免得過衝——D 是煞車。代價：微分會放大高頻雜訊（ch04 取樣窗口問題的原班人馬），推演第 3 題算給你看。\n\n你技術棧裡最有名的「恆溫器」是 K8s 的 HPA，它的演算法真的只有一行（2026-06 查證 Kubernetes 官方文件）：\n\n```text\ndesiredReplicas = ⌈currentReplicas × (currentMetric / desiredMetric)⌉\n```\n\n誠實拆帳：這是一顆**純 P 控制器**——只看現值比例，沒有 I 項、沒有 D 項；比值落在 1.0 的 ±0.1 容差內就不動作（你認得這個結構：ε 容差，ch03）。所以 HPA 教科書級地展示了 P 控制的脾氣：步距太猛，副本數就在高低水位之間 flapping——ch06 說過，這就是學習率太大的震盪，同一條數學；它靠縮容穩定窗口這類機制壓震盪，而不是靠 D 項（2026-06 查證，細節以官方文件為準）。控制理論是一整門學科，本書到此為止——但 P、I、D 三個字母你從此不會再看錯：那是微積分的三個核心動作，焊在每一台恆溫器、每一台無人機、每一支 3D 印表機的噴頭裡。\n\n## 機率即面積：你的 P99 每天都在積分\n\n「P99 延遲 230 ms」的正式語意是：隨機抽一個請求，延遲不超過 230 ms 的機率是 0.99。要讓這句話有意義，你需要一個分布——而連續分布的語言，是面積。\n\n連續隨機變數的規矩：給一條機率密度函數（probability density function, pdf），曲線本身不是機率，**曲線下的面積才是**——落在 [a, b] 的機率＝密度曲線在 [a, b] 上的積分，整條曲線下的總面積恰好是 1。最有名的密度是標準常態分布（standard normal distribution）的鐘形曲線：\n\nφ(x) = e^(−x²/2)/√(2π)\n\n（分母那個 √(2π) 唯一的工作是讓總面積恰好等於 1；這個歸一化常數本身是個著名的積分結果，本書不推。）\n\n接著是本節真正的橋。把面積從左端一路累積過來，定義「值 ≤ x 的機率」，這叫累積分布函數（cumulative distribution function, CDF）。看清楚它的構造：**CDF 就是 ch08 的累積函數 A(x)，一字不改**。於是 FTC 自動上工：密度是 CDF 的導數、CDF 是密度的積分——機率論的 pdf／CDF，跟你監控系統的 rate／counter 是同一對搭檔，連互逆關係都是同一條定理。\n\n那 P99 是什麼？是 **CDF 的反查**：找出讓 CDF 達到 0.99 的那個位置。你的監控系統每天在做的事：histogram 把延遲樣本裝進桶（bucket）——這就是把密度曲線切成粗矩形（ch07 的切片）；`histogram_quantile(0.99, …)` 在桶邊界之間做線性內插、反查出 P99（2026-06 查證 Prometheus 文件）——在一條粗糙版的 CDF 上倒著讀。所以這句話是字面意義的：**你的延遲百分位數每天都在積分**——先把樣本積成 CDF，再反查它。順帶領一個監控冷知識的數學解釋：兩個儀表板的 P99 對不上，多半是桶切法與窗口不同——兩條粗糙 CDF 各自內插出各自的答案，誰都沒「錯」，它們本來就都是估計。\n\n常態分布還附贈一組你背過的數字：**68-95-99.7 法則**——距平均 ±1σ、±2σ、±3σ 的面積分別約 68.27%、95.45%、99.73%。第一個數字哪來的？它就是 ∫[−1,1] φ(x) dx。麻煩在於 φ 的反導數可以證明不是初等函數（ch08 提過 e^(−x²) 那一族）——FTC 的快取在這裡 miss，乖乖退回 ch07 的黎曼和。本章第二個 worked example：四條矩形，徒手摸這個 68%。\n\n```\n φ(x)\n0.4 ┤         * * *\n    │        ┌──┬──┐\n0.3 ┤     ┌──┤  │  ├──┐\n    │     │  │  │  │  │\n0.2 ┤   * │  │  │  │  │ *\n    │  *  │  │  │  │  │  *\n0.1 ┤ *   │  │  │  │  │   *\n    │*    │  │  │  │  │    *\n    └─────┴──┴──┴──┴──┴─────── x\n         −1     0     1\n```\n\n```text\n切法：[−1, 1] 切 4 條，每條寬 0.5，矩形高度取中點的 φ 值（中點法）：\n\n  φ(0.25) = e^(−0.25²/2)/√(2π) = e^(−0.03125)/2.50663\n          = 0.96923/2.50663 = 0.38667     ← 內側兩條（中點 ±0.25）\n  φ(0.75) = e^(−0.75²/2)/√(2π) = e^(−0.28125)/2.50663\n          = 0.75484/2.50663 = 0.30114     ← 外側兩條（中點 ±0.75）\n\n面積 ≈ 0.5 × (0.30114 + 0.38667 + 0.38667 + 0.30114)\n     = 0.5 × 1.37562\n     = 0.68781\n```\n\n精確值是 0.68269——統計課那個 68.27% 的出處。四條矩形、實際只算兩個 φ 值，誤差 0.0051，不到一個百分點。想更進一步，推演第 4 題用梯形法重算一次，結尾有一個漂亮的會師等你。「機率是面積」不是修辭：你剛剛用 ch07 的方法、ch02 的精神，徒手算出了教科書要你背的那個數。\n\n## 數值現實：在離散機器上模擬連續數學\n\nch04 結尾欠你一筆帳，現在結。那個 Python 實驗：算 f(x) = x² 在 x = 3 的割線斜率，h 從 1 一路縮到 10⁻¹²。數學說誤差該一路縮小（斜率恰是 6 + h，誤差就是 h）；機器給你看的是——誤差先乖乖跟著 h 掉，在 h ≈ 10⁻⁸ 觸底（約 3.6×10⁻⁸），然後反轉惡化，h = 10⁻¹² 時暴漲回 5.3×10⁻⁴，比 h = 10⁻⁴ 的時候還爛。\n\nch04 給了定性原因（災難性消去），這裡補定量的：兩股誤差在拔河。\n\n```text\n總誤差 ≈ 截斷誤差 ＋ 捨入誤差\n          ～h 階      ～ε/h 階\n\n截斷誤差：數學自己的鍋——割線不是切線，差商比真導數多出 ～h 階的尾巴。\n捨入誤差：機器的鍋——f(x+h) 與 f(x) 是兩個幾乎相等的數，相減時有效位數\n          被吃掉，殘渣再除以 h、被放大 1/h 倍。ε 是機器精度，\n          雙精度 ε ≈ 2.2×10⁻¹⁶。\n```\n\nh 大，截斷誤差吃掉你；h 小，捨入誤差吃掉你。兩股力量平衡的位置在 **√ε 量級**——雙精度下約 10⁻⁸（對 e(h) = h/2 + 2ε/h 求最小值即得；推導見延伸閱讀）。回頭看 ch04 那張表：觸底恰好在 10⁻⁸。那不是 bug，是這條公式的肖像。聰明一點的公式買得到更多：中央差分 (f(x+h) − f(x−h))/2h 的截斷誤差是 h² 階——兩側對稱，h 階的尾巴自己抵銷——最適步長變成 **ε^(1/3) 量級**（約 6×10⁻⁶），觸底時的誤差也更小。換公式，比硬調步長值錢。\n\n積分與微分方程那一側，同一齣戲換個劇本。ch07 的實驗：矩形法誤差 ～1/n、梯形法 ～1/n²——同樣的計算預算，好公式多換好幾位精度。ch10 的 Euler 法：誤差 ～h（步長 0.1 算 e 差約 0.12，步長 0.01 差約 0.013），步長砍十倍、誤差砍十倍、成本漲十倍；而且步數一多，捨入開始累積，長時間模擬還會悄悄漏帳（彈簧振子的能量漂移）。每個數值方法都活在同一個三角裡：**精度、成本、穩定性——挑兩個**。\n\n把視角拉高。微積分的定義全部蓋在「h 要多小有多小、n 要多大有多大」上（ch03 的挑戰賽）；浮點世界裡 h 有地板、n 有預算，理想假設必然漏水。但這不是「數學沒用」——恰恰相反：是數學告訴你地板在哪裡（√ε、ε^(1/3)）、誤差以什麼速率縮小（1/n vs 1/n²）、什麼時候該換公式。**在離散機器上模擬連續數學，是一門誠實的工藝**：它從不假裝誤差不存在，只承諾把誤差控制在你指定的容差內。你該認得這個句型——它就是 ε 的句型（ch03），整本書的起點。\n\n## 你已經在裡面了\n\n收尾不喊口號，盤點事實。本章每一個系統的核心迴圈裡，焊的都是同一組零件：\n\n- 會變的量，問「變多快」——導數（ch04）：`rate()`、D 項、梯度。\n- 會變的量，問「累積了多少」——積分（ch07）：`increase()`、I 項、CDF。\n- 兩個問題互為反操作——FTC（ch08）：counter／rate、pdf／CDF。\n- 用「怎麼變」推「會變成怎樣」——微分方程（ch10）：tick 迴圈、容量外插。\n- 把變化拆成頻率——傅立葉（ch11）：頻譜、季節性分解。\n- 對無限的每一次操作都驗收誤差——極限與級數（ch03、ch09、ch12）：eps 比較、浮點求和、步長地板。\n\n微積分是「會變的量」的通用介面：只要一個量隨另一個量變，這套語言就接管描述權——而你的職業生涯整天在跟會變的量打交道。所以這本書從第一章講到現在的那句話，最後一次、用最強的形式說：你不是「將來有一天會用到」微積分，**你已經在裡面了**。差別只在：以前你是這門語言的母語使用者——說得流利、不識文法；十四章讀完，你識字了。ch16 做最後一件事：把整個故事，用你自己的話，完整講一遍。\n\n## 直覺的陷阱\n\n| 錯誤直覺 | 它把你帶去哪條溝 | 自我察覺的徵兆 |\n|---|---|---|\n| 「backprop 是深度學習發明的新數學」 | 把引擎室神祕化，論文裡的梯度符號變成黑魔法；其實機制是 ch05 的連鎖規則，1986 年普及的是記帳法與規模，不是數學 | 你說不出 backprop 跟連鎖規則的差別在哪（答案：數學上沒有差別，差別在記帳方向與規模） |\n| 「HPA 之類的 autoscaler 就是 PID」 | 對純 P 控制器期待 I 項的本事（自動消除穩態偏差），等不到；或誤把 0.1 容差當成某種 I 項 | 你解釋 flapping 時，提不出「步距 vs 震盪」這條 ch06 的舊帳 |\n| 「P99 是一個被量出來、存好的數」 | 兩個儀表板對不上時開始懷疑資料遺失；其實 P99 是在估計出來的 CDF 上做反查，桶切法不同、答案就不同 | 你說不出 histogram bucket 跟黎曼和切片的關係 |\n| 「步長／窗口越小越精準」 | 數值微分撞上 √ε 地板後越調越爛；`rate()` 窗口縮到雜訊淹沒訊號 | 你 debug 數值問題時唯一的招是「把步長再調小」 |\n| 「微積分活在連續理想國，工程是離散的，所以一切只是類比」 | 把全書的橋全部降級成修辭；事實上 FTC 此刻就在你的監控棧裡逐字執行 | 你描述本章任一對應時，用「就像」而不敢用「就是」 |\n\n## 紙上推演\n\n**題 1 [15 分鐘] ★** — 挑一個你真實維運過的指標（QPS、佇列深度、記憶體用量、錯誤數……自選），用本章的語言指認：(a) 它本身是速率型還是累積型？(b) 它的導數是哪個現成查詢？(c) 它的積分是哪個現成查詢？(d) 對每個答案做單位對帳（每秒？個？個×秒？）。\n\n**題 2 [20 分鐘] ★★** — 巡航定速上坡，維持等速需要固定油門 u*。(a) 純 P 控制 u = Kp·e 之下，車速穩定後誤差 e 是多少？為什麼不可能是 0？(b) 加上 I 項：u = Kp·e + Ki·A(t)，A(t) = ∫₀ᵗ e(s) ds。假設系統穩定在某個常數誤差 eₛ ≠ 0，用 A(t) 的行為推出矛盾。(c) 誤差歸零之後，維持油門的力道由誰出？用 ch08 的累積函數語言回答。\n\n**題 3 [15 分鐘] ★★** — 量測值疊上高頻雜訊 n(t) = δ·sin(ωt)，δ 很小、ω 很大。(a) 它對 P 項的污染多大？(b) 對 D 項呢——手算 n′(t) 的振幅？(c) 換成離散差商 (e(t) − e(t−h))/h，雜訊最壞貢獻多大？把結論接回 ch04：這跟 `rate()` 窗口縮小曲線變毛、跟割線實驗 h 觸底反彈，是不是同一件事？\n\n**題 4 [20 分鐘] ★★** — 把 68% 再算一次，這次用梯形法：節點 0、±0.5、±1，密度值 φ(0) = 0.39894、φ(0.5) = 0.35207、φ(1) = 0.24197。(a) 算出梯形和。(b) 跟正文的中點法 0.68781、精確值 0.68269 並排：誰高估、誰低估、為什麼？提示：φ 在 [−1, 1] 上是凹的——而它的反曲點恰好就在 ±1。(c) 加碼：算 (2×中點 ＋ 梯形)/3，看看你撞見了什麼。\n\n### 推演解答\n\n**題 1**（以 `http_requests_total` 示範，你的指標照樣造句）　(a) 累積型（counter）：只增不減，數學身分是累積函數 A(t)（ch08）。(b) 導數＝`rate(http_requests_total[5m])`，單位「個/秒」——差商的工程近似（ch04）。(c) counter 本身就已經是積分；現成的區間版是 `increase(...[1h])`，單位「個」——FTC 第二張臉，端點相減＝整段累積。若你挑的是速率型（gauge，如 CPU 使用率）：導數得自己造（`deriv()` 或差商），積分是 `avg_over_time × 窗長` 這類「面積」查詢。(d) 單位對帳是防呆關鍵：微分除以秒、積分乘上秒，量綱對不上就是指認錯了。常見錯路：把 gauge 餵給 `rate()`——對非單調的量取「reset 補償過的變化率」，語意整個跑掉。\n\n**題 2**　(a) 穩定 ⇒ 油門是常數 Kp·eₛ；維持等速 ⇒ 這個常數必須恰好等於 u*。所以 eₛ = u*/Kp ≠ 0：**P 控制器要靠殘留誤差才擠得出持續輸出**——誤差一歸零、輸出就歸零、車就減速，誤差又被拉回來。調大 Kp 只能把 eₛ 壓小，壓不到 0；而 Kp 太大就是 ch06 的學習率過大，換來震盪。(b) 設誤差穩定在 eₛ ≠ 0，則 A(t) = ∫₀ᵗ e ≈ eₛ·t 線性長大、沒有上界——ch08 說過，累積函數對常數輸入的反應就是一條直線——於是 u = Kp·eₛ + Ki·eₛ·t 也無上界，油門踩穿地板，與「系統穩定」矛盾。穩定狀態只剩一種可能：eₛ = 0。**常數誤差騙得過比例，騙不過積分**：你欠的每一秒它都記著。(c) A′ = e（FTC 第一張臉）：誤差歸零＝累積函數停止變動，但它**停在累積出來的高度上**——上坡需要的力道 u*/Ki 被 A 整筆記在帳上，由 I 項持續出力。P 看不見的歷史，I 用面積記住了。（帳外一筆：這份記憶也有病——目標突然大改時，積分會先把舊帳放完才回頭，這叫積分飽和，工程上要另外治，本書不展開。）\n\n**題 3**　(a) P 項看到的污染振幅就是 δ——小，無害。(b) n′(t) = δω·cos(ωt)，振幅 δω：**微分把雜訊放大 ω 倍**。δ = 0.01、ω = 1000，污染變成 10，訊號可能整個被淹掉；頻率越高放大越兇，而雜訊偏偏住在高頻。(c) 離散版：雜訊對分子的最壞貢獻是 2δ（兩端各抖一次、方向相反），除以 h 得 2δ/h——窗口越小，放大倍率越大。三件事是同一條數學：D 項怕雜訊、`rate()` 窗口縮小曲線變毛（ch04 開頭）、割線實驗 h 太小誤差反彈（ch04 實驗、本章 √ε）——全是「差商的分母在放大分子裡的污染」。解法也同源：低通濾波、拉大窗口、換更穩的差分公式——全是用「反應變鈍」換「輸出變穩」。\n\n**題 4**　(a) 梯形法，兩端點各算半權重：\n\n```text\nT = 0.5 × (φ(−1)/2 + φ(−0.5) + φ(0) + φ(0.5) + φ(1)/2)\n  = 0.5 × (0.12099 + 0.35207 + 0.39894 + 0.35207 + 0.12099)\n  = 0.5 × 1.34506\n  = 0.67253\n```\n\n(b) 並排：中點法 0.68781 高估（＋0.0051），梯形法 0.67253 低估（−0.0102），精確值 0.68269 被夾在中間。方向不是巧合：φ 在 (−1, 1) 內是凹的（彎口朝下）——凹弧上，中點矩形的頂在中點處切住曲線、兩側多吃進面積，所以高估；梯形的弦掛在曲線下方，所以低估。而 ±1 恰好是 φ 的反曲點——鐘形曲線由凹轉凸的位置就在 ±1σ：σ 不是隨便畫的刻度，是曲線自己的幾何關節（也是這題切在 [−1, 1] 特別乾淨的原因）。(c) (2×0.68781 + 0.67253)/3 = 2.04815/3 = 0.68272，跟精確值 0.68269 只差約 3×10⁻⁵——你剛剛重新發明了辛普森法（Simpson's rule）：把高估方與低估方按 2:1 調和，凹凸造成的主誤差項恰好對消，四條切片換到五位準確。ch07 的承諾「好方法多換好幾位精度」，這次是你親手兌現的。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. backprop 在數學上「就是」什麼？哪一章發過這個零件？「1986 年發明了 backprop」這句話錯在哪個字？\n2. u(t) = Kp·e + Ki·∫e + Kd·e′ 三項各自的時態是什麼？哪一項是 ch04、哪一項是 ch07 與 ch08？\n3. 為什麼純 P 控制幾乎注定留下穩態誤差？I 項消滅它的機制，用「累積函數對常數輸入的反應」一句話講完。\n4. K8s HPA 是 PID 裡的哪一塊？它的 0.1 容差跟本書哪一章的哪個概念同款？\n5. 「你的 P99 每天都在積分」是字面還是修辭？把 pdf、CDF、反查、histogram bucket 四個詞串成一句話。\n6. 常態分布的 68% 是哪一個積分？為什麼這一題 FTC 的快取會 miss、你只能回到黎曼和？\n7. 數值微分的最適步長為什麼不是越小越好？√ε 是哪兩股誤差拔河出來的平衡點？中央差分憑什麼把地板再往下挖？\n8. 「微積分是理想世界的數學，跟離散的工程只是類比」——用本章任兩個例子把這句話打掉。\n\n## 延伸閱讀\n\n- 3Blue1Brown,〈Backpropagation calculus〉：https://www.3blue1brown.com/lessons/backpropagation-calculus/ ——（2026-06 查證在線）把本章的迷你記帳擴到真實網路：比率沿鏈往回乘的動畫版，看完你會發現整支影片就是連鎖規則。\n- Parr & Howard,〈The Matrix Calculus You Need For Deep Learning〉：https://explained.ai/matrix-calculus/ ——（2026-06 查證在線）本章一句話帶過的矩陣微積分，完整地圖在這裡；它假設的起點恰好是你現在的程度（單變數連鎖規則）。\n- Rumelhart, Hinton & Williams,〈Learning representations by back-propagating errors〉（Nature 323, 1986）：https://www.nature.com/articles/323533a0 ——使 backprop 普及的原始論文，數學核心就是連鎖規則。\n- Kubernetes 官方文件〈Horizontal Pod Autoscaling〉：https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/ ——（2026-06 查證）那行 ceil 公式與 0.1 容差的出處，讀 Algorithm details 一節即可。\n- APMonitor,〈Proportional Integral Derivative (PID)〉：https://apmonitor.com/pdc/index.php/Main/ProportionalIntegralDerivative ——P、I、D 三項各自脾氣的教學頁；想親手調 Kp、Ki、Kd，從這裡開始。\n- Prometheus 官方文件〈Histograms and summaries〉：https://prometheus.io/docs/practices/histograms/ ——（2026-06 查證）histogram_quantile 的內插語意與誤差來源；讀完你對「兩個儀表板的 P99 對不上」就免疫了。\n- Wikipedia,〈Numerical differentiation〉：https://en.wikipedia.org/wiki/Numerical_differentiation ——√ε 與 ε^(1/3) 步長公式的標準推導，本章「數值現實」一節的正式版。\n"}, {"id": "ch16-taming-infinity", "file": "ch16-taming-infinity.md", "group": "Part VI — 回到今天", "title": "ch16 — 總收官：人類如何馴服無限", "md": "# ch16 — 總收官：人類如何馴服無限\n\n> **本章解決什麼問題**：十五章下來，零件全部發完——三個核心動作、一條基本定理、三次語言的長大、一場崩壞與重建、一張「就是、不是就像」的工程對照表。本章不教任何新概念、不證任何新定理；它是全書的結案報告與口試現場：把整個故事收進一條十分鐘講得完的線、用 ch01 開宗明義的六條驗收目標做總驗收，然後告訴你走出這本書之後，三條路各通向哪裡。\n\n## 從你已知的出發\n\n你寫過 postmortem。事故結束後，時間線、根因、修復、學到什麼，一份文件收尾。你也做過交接，而且知道一個殘酷的事實：判斷自己懂不懂一個系統，最便宜也最準的測試，是把它講給接手的人聽——講到對方敢值班為止。文件可以抄，口頭講不能：講到一半卡住的地方，就是你其實沒懂的地方。\n\nch01 第一頁就把這本書的驗收標準定成同一條：講得出來＝懂；講不清楚＝還沒懂。十五章以來每章結尾的「自我檢核」都是分期付款，本章是尾款——一場完整的口試，加一份由你自己簽名的結案報告。\n\n開始之前，去把一張紙找出來：ch01 紙上推演第 3 題，你寫下的「對『無限多步不可能完成』此刻最好的反駁」——150 字以內、標了日期的那張。ch03 結尾評過它一次分；本章結尾是終審。\n\n## 地圖收回：每一格都走過了\n\n```\nPart I 恐懼與圍捕 ✓           Part II 微分 ✓       Part III 中心寶石 ✓\nch01 芝諾的箭                 ch04 瞬間速度        ch07 積分：累積\nch02 窮盡法               →   ch05 導數的代數  →   ch08 基本定理 ★\nch03 極限                     ch06 最佳化               │\n                                                        ↓\nPart VI 回到今天 ✓            Part V 崩壞與重建 ✓  Part IV 語言長大 ✓\nch15 工程母語             ←   ch12 發散的詐騙  ←   ch09 無限級數\nch16 總收官 ◄你在這裡         ch13 怪獸函數        ch10 微分方程\n                              ch14 嚴格化          ch11 傅立葉\n```\n\n「◄你在這裡」這個標記，在六個 Part 的門口各出現過一次；上面是第七次，也是最後一次。下一次你需要地圖的時候，目的地會在地圖之外。\n\n九宮格快轉一遍，每個 Part 只留你親手算過的東西當證據。Part I：芝諾射出三支箭——無限多步、無限可分、瞬間，三個人人在用、無人定義的詞；你用兩種方法都算出 1000/9 公尺，卻指不出他哪一句犯規（ch01）。阿基米德用內外夾擠加雙重歸謬拿下弓形的 4/3，精確、漂亮、每題手工（ch02）。極限的 ε 挑戰賽把「要多近有多近」變成可驗收條款，0.999… = 1 結案（ch03）。Part II：割線斜率表從兩側夾向 6，導數＝差商的極限，飛矢落地（ch04）；乘法規則的矩形圖、連鎖規則的縮放器，複利表裡撞見 e（ch05）；費馬的平頂加柯西的下坡，梯度下降每步乘 0.8（ch06）。Part III：黎曼和左 0.21875、右 0.46875，鉗口收向 1/3（ch07）；細條七步證明，「累積量的變化率＝當下的高度」，同一題三算在一行 F(1) − F(0) 收官（ch08）。Part IV：sin 在你的機器裡就是一條多項式（ch09）；定律寫的是變化率、不是軌跡，海王星在筆尖上現身（ch10）；任何訊號拆成圓，Gibbs 那 8.95% 的過衝怎麼壓都壓不掉（ch11）。Part V：條件收斂的級數，想加到哪就加到哪（ch12）；振幅帳收斂、斜率帳發散，連續與可微之間隔一個宇宙（ch13）；挑戰賽法典化成 ε-δ、戴德金切割補洞、羅賓遜替無窮小平反（ch14）。Part VI：總對照表上沒有一列是「就像」，每一列都是「就是」（ch15）。然後是本章。\n\n## 馴服的本質：操作化，不是理解\n\n請注意這本書從頭到尾沒有回答的一個問題：**無限到底是什麼？**\n\n不是忘了答，是不需要答。人類馴服無限的方式，不是看穿它的形上學本質——兩千四百年來沒有人辦到，今天也沒有——而是把它**操作化**了：每一個帶著「無限」的概念，都被翻譯成一個**每一局都有限**的驗收程序。全書的四次翻譯排在一起看：\n\n```text\n無限過程的歸宿　→　極限：對手任出 ε，你交出門檻 N，第 N 項起全部進帶（ch03）\n無限小的變化率　→　微分：差商在窗口縮小時的極限——0/0 被繞開，不是被賦值（ch04）\n無限細分再加總　→　積分：有限矩形和在 n→∞ 時的極限（ch07）\n無限多項的和　　→　級數：「和」這個詞被重新定義為部分和的極限（ch03、ch12）\n```\n\n四行同一個格式：左邊是一個沒有定義的詞，右邊是一個只做有限檢查的程序。ε 是有限的、N 是有限的、每張驗收單上的不等式是有限的——無限只活在「對手可以一直出招」這件事裡，而你的回應公式一次接管所有出招（ch03 的終局）。\n\n所以書名要讀準確：馴服，不是理解。**不回答「無限是什麼」、只回答「無限怎麼用而不出錯」**——這是工程師最熟悉的勝利方式：不解決哲學問題，交付可驗收的介面。芝諾問「無限多步怎麼可能走完」，極限不回答，它把「走完」換成時刻與位置（ch03）；飛矢悖論問「瞬間裡有沒有運動」，導數不回答，它把「瞬間速度」定義成鄰居們的極限（ch04）。問題沒有被解答——問題被**換掉**了，換成一個答得出來、而且答案撐得起整座現代科學的問題。\n\n三核心動作的最終定稿，一人一句：\n\n```text\n極限：極限是逼近的目的地，不是過程的最後一步——\n　　　宣稱 lim aₙ = L，意思是對手任出 ε > 0，你都交得出門檻 N，\n　　　使第 N 項之後每一項與 L 的距離都小於 ε。\n微分：導數是差商的極限——\n　　　「此刻變多快」＝越縮越小的窗口上的平均變化率所逼近的那個數；\n　　　它不住在單一瞬間裡，住在瞬間與鄰居的關係裡。\n積分：積分是部分和的極限——\n　　　「累積了多少」＝切細、近似、加總，再讓切片數趨於無窮；\n　　　面積只是它的一張臉，本體是累積。\n```\n\n注意三句的後半都踩著同一個動詞：取極限。微分與積分各自是一種極限——這正是 ch03 那句「語言只發明一次，之後到處收租」的總帳本，也是 FTC 之所以可能的前提：兩台蓋在同一塊地基上的機器，才有機會被證明互為反面（ch08）。\n\n## 歷史弧線收束：先衝再補票\n\n把全書的歷史暗線拉直，六站：\n\n```text\n恐懼　　　西元前五世紀　芝諾：無限多步、無限可分、瞬間——三個詞都沒有定義（ch01）\n個案手藝　西元前三世紀　阿基米德：窮盡法夾擠＋雙重歸謬，精確答案照拿，\n　　　　　　　　　　　　但每題手工重做，之後卡了一千八百年（ch02）\n大膽通法　十七世紀　　　牛頓、萊布尼茲：FTC 讓所有面積問題＝反查微分表；\n　　　　　　　　　　　　大樓蓋起來了，地基是空的（ch08）\n危機　　　1734–1872　　 Berkeley 的鬼魂（ch04）、傅立葉的「等於」（ch11）、\n　　　　　　　　　　　　發散的詐騙（ch12）、怪獸函數（ch13）——四張傳票\n重建　　　1821–1872　　 柯西開工、魏爾斯特拉斯定稿 ε-δ、\n　　　　　　　　　　　　戴德金與康托爾灌完備性地基（ch14）\n平反　　　1960 年代　　 羅賓遜非標準分析：無窮小領到身分證，\n　　　　　　　　　　　　兩套地基撐同一棟樓（ch14）\n```\n\nch14 那句話值得放大成全書的結語之一：**數學史是從屋頂往下蓋的**。大樓十七世紀就蓋了，樑柱 1821 到 1861 年補強，地基 1872 年才灌漿——而且灌漿的同一年，魏爾斯特拉斯自己放出怪獸函數做壓力測試。教科書的順序——先 ε-δ、再極限、再微分積分——是邏輯順序，不是發生順序；真實的工作方式是**先衝再補票**：阿基米德私下用槓桿秤先「發現」、再用窮盡法補嚴格證明（《方法》的自白，ch02）；牛頓與萊布尼茲先讓引擎跑起來，給不出無窮小的定義；歐拉先飛再說——Basel 一役名垂青史、發散級數一役翻車，同一種膽量（ch09、ch12）。帳單一張一張寄到，十九世紀整代人埋單。\n\n這跟你見過的每個成功系統的演化史同構：先有能跑的原型，才知道地基要扛什麼載重；回歸測試套件是事故之後補的（ch14 對嚴格化的定位，一字不差）。但 ch14 的警告也要原樣帶走：結果論不是跳步的授權——歐拉是在沒有安全帶的情況下飛，他只是技術好到沒摔死。「反正最後都能嚴格化」不是你省略論證的理由，正如「反正之後會重構」不是不寫測試的理由。\n\n## 口試總驗收：六題\n\n規則：閉書、口頭、每題 3 到 5 分鐘；講給真人最好，沒有就錄音。每題附「模範答案要點清單」——它不是逐字稿，是檢核表：你的版本可以換例子、換順序、用自己的比喻，但清單上的點必須命中。正式作答排在紙上推演第 1 題；先把題目和清單讀一遍，知道驗收長什麼樣。\n\n**第一題（驗收目標①：微積分在馴服什麼）**\n「微積分到底在馴服什麼？為什麼說人類從來沒有『理解』無限？」\n\n要點清單：\n\n- 點名三個當年沒有定義的詞：無限多步、無限可分、瞬間——芝諾三支箭各踩一個（ch01）\n- 馴服＝操作化：每個無限概念都被翻譯成「有限東西的極限」，驗收程序每一局都有限（ch03）\n- 至少完整講出兩個翻譯案例（極限／微分／積分／級數任挑兩個：左邊的未定義詞、右邊的有限程序）\n- 收尾命中那句話：不回答「無限是什麼」、只回答「無限怎麼用而不出錯」\n- 加分：給一個「問題不是被解答、是被換掉」的實例（「走完」換成時刻與位置）\n\n**第二題（驗收目標②：三核心動作）**\n「極限、微分、積分各自在做什麼？各用一句話定稿，並說出它們共用的地基。」\n\n要點清單：\n\n- 極限：對手出 ε、你回門檻、之後全部進帶；目的地不是最後一步——沒有「最後一項」\n- 微分：差商的極限——瞬間速度不住在單一快照裡，住在快照與鄰居的關係裡\n- 積分：切、近似、加總、取極限——本體是累積，面積只是一張臉\n- 共用地基：三個動作都是極限；微分與積分的定義裡各藏著一場 ch03 的挑戰賽\n- 各自解掉的原始問題各一句：芝諾的無限多步／飛矢的瞬間／曲線下的面積\n\n**第三題（驗收目標③：FTC）**\n「為什麼『曲線下面積』和『切線斜率』是同一件事的正反面？把證明的直覺核心講出來。」——你在 ch08 考過一次（【全書最重要的一題】），這是複試。\n\n要點清單（沿用 ch08 推演第 3 題的六點）：\n\n- 視角升級：把面積變成函數 A(x)，x 是滑桿\n- 細條：A(x+h) − A(x) 是一條寬 h 的細條\n- 三明治：m·h ≤ 細條 ≤ M·h\n- 同除以 h，差商被 m 與 M 夾住\n- 取極限並點名連續性：因為 f 連續，m 與 M 同被擠向 f(x)——A′(x) = f(x)\n- 收尾：累積量的變化率＝當下的高度；反導數彼此只差常數 ⇒ 端點相減；再說出這為什麼是技術革命——同一題三算：兩千年的手工藝 → 半頁極限苦工 → 一行（ch02、ch07、ch08 的對帳表）\n\n**第四題（驗收目標④：工程橋接）**\n「舉三個『不是類比、是字面上同一件事』的對應，其中至少一個講到機制層。」\n\n要點清單：\n\n- 三個對應（ch15 總表任挑：counter／rate()／increase() ＝ FTC、backoff 總等待 ＝ 幾何級數、tick 迴圈 ＝ Euler 法、P99 ＝ CDF 反查、頻譜 ＝ 傅立葉、浮點求和順序 ＝ 條件收斂……）\n- 每個對應說得出「就是」而非「就像」的理由：哪條數學定義正在那個系統裡逐字執行\n- 至少一個下到機制層（例：increase ＝ rate × 窗口秒數 ＝ counter 端點相減 ＝ FTC 第二張臉；或 tick 迴圈逐字就是 y += h·f）\n- 至少做一次單位對帳（個/秒 × 秒 ＝ 個；GB × 小時 ＝ GB-hours）\n- 加分：講出反方向的教訓——理想數學在浮點機器上會漏水（數值微分的 √ε 步長地板，ch04、ch15）\n\n**第五題（驗收目標⑤：直覺崩壞）**\n「人類的直覺在哪幾個地方崩壞？每處給一個具體反例，並說出共同病根。」\n\n要點清單：\n\n- 「項趨於 0 ⇒ 收斂」陣亡：調和級數——Oresme 分組，每包至少 1/2（ch09）\n- 「無限和繼承加法定律」陣亡：Grandi 加括號得三個答案；條件收斂重排到任何指定值（黎曼的三步機器）（ch12）\n- 「連續 ⇒ 可微，頂多幾個壞點」陣亡：魏爾斯特拉斯怪獸——振幅帳收斂、斜率帳發散，兩本帳（ch13）\n- 「逐點收斂＝整條貼合」陣亡：Gibbs 過衝佔跳躍幅度約 8.95%，項數加倍只變窄、不變矮（ch11）\n- 共同病根：拿有限世界的詞與圖像當定義；修復方式：圖像換成可逐字檢驗的條款（ε-δ），地基補完備性（ch14）\n\n**第六題（驗收目標⑥：長成語言）**\n「這套語言怎麼從希臘人的恐懼，長成描述會變世界的通用介面？」\n\n要點清單：\n\n- 引擎完成（FTC）之後的三次長大：級數給函數第二種長相（sin 在 libm 裡就是多項式）、微分方程把定律寫成變化率（軌跡是解出來的）、傅立葉把任意訊號拆成頻率（ch09–ch11）\n- 一個「預測世界」的實證：海王星——筆尖上發現行星，距預測位置約 1°（ch10）\n- 「會變的量」的通用介面：只要一個量隨另一個量變，這套語言就接管描述權（ch15）\n- 誠實的另一面：野蠻生長出了事（Part V），地基後補——先衝再補票\n- 落點在今天：你的監控棧、訓練迴圈、控制迴圈此刻就在執行它——「你已經在裡面了」\n\n## 十分鐘口述版：講稿骨架\n\n全書的 worked example 只剩這一個：把「人類如何馴服無限」講成一個十分鐘的故事。十段，每段一分鐘；中欄是這一分鐘的任務，右欄是**必須出現**的關鍵詞——關鍵詞全到場，這一段就及格。\n\n| 段 | 這一分鐘講什麼 | 必含關鍵詞 |\n|---|---|---|\n| 1 | 敵人登場：芝諾用三支箭證明三個人人在用的詞沒有定義 | 芝諾、無限多步、瞬間、沒有定義 |\n| 2 | 第一次圍捕：不碰無限照樣拿到精確值，但每題手工、不能量產 | 窮盡法、夾擠、雙重歸謬、手工藝 |\n| 3 | 語言的發明：把「無限的東西」翻譯成「有限東西的極限」 | 極限、ε、部分和、驗收 |\n| 4 | 第一個殺手應用：抓住瞬間——0/0 被繞開，飛矢落地 | 差商、瞬間速度、0/0、切線 |\n| 5 | 另一半動作：無限細分再加總——本體是累積 | 黎曼和、切近似加總取極限、累積 |\n| 6 | 高潮：兩個獨立的極限互為反面——一行解掉兩千年 | 累積函數、細條、FTC、反導數、同一題三算 |\n| 7 | 語言長大：函數變多項式、定律寫成變化率、訊號拆成頻率 | 泰勒、微分方程、海王星、傅立葉 |\n| 8 | 出事了：無限和不是加法、連續不保證可微 | 重排、條件收斂、怪獸、兩本帳 |\n| 9 | 重建：挑戰賽法典化、數線補洞——從屋頂往下蓋 | ε-δ、量詞順序、完備性、補票 |\n| 10 | 收尾：無窮小平反；馴服＝操作化；語言此刻就在你的系統裡 | 羅賓遜、操作化、工程母語、你已經在裡面 |\n\n練法三輪：第一輪攤開這張表照講，卡住就看關鍵詞；第二輪只看右欄；第三輪全閉，計時十分鐘。紀律只有一條：每段一分鐘，超時砍細節、不砍骨架。骨架是十段的因果鏈——沒有定義 → 繞開 → 定義 → 兩個應用 → 會師 → 長大 → 出事 → 重建 → 平反——年份、表格、數字忘了都不致命，因果鏈斷了才致命。\n\n## 下一步：三條路，與刻意留下的洞\n\n附錄 C 有完整的延伸閱讀地圖（含「如果只看三樣」），這裡只立路標：\n\n- **往嚴格走（實分析）**：本書所有標著「直覺版」「工程師的嚴謹」「本書不證」的地方，都是這條路上的待領包裹。起點是 Spivak《Calculus》第 4 版——對嚴格性的初次正面相遇；想走原典路線，Dunham《The Calculus Gallery》一間一間展廳看過去。你會重新證明本書講過的每一件事，這次不打欠條。\n- **往應用走（微分方程與 ML 數學）**：ch10 是一扇門，正課是 MIT OCW 18.03；ch15 的億維梯度再往前一步是矩陣微積分（Parr & Howard 那份地圖，假設的起點恰好是你現在的程度）。這條路把三個動作從欣賞品變成生產工具。\n- **往欣賞走（數學史與科普）**：Strogatz《無限的力量》現在重讀會是另一本書——你從讀者變成了同行；Bressoud《Calculus Reordered》用另一組主軸重排同一段歷史；3Blue1Brown 全系列重看一遍，這次你看得出每一集在哪裡省略了什麼。\n\n然後是洞。這本書**刻意**沒有講的三塊，名單與理由都攤開，免得你把它們記成欠款：\n\n- **多變數微積分**：梯度只在 ch06 與 ch15 直覺帶過。留它的理由：多變數是同樣三個動作的升維——偏導數仍是差商的極限、重積分仍是部分和的極限——觀念上沒有新的馴服動作，技術上卻要一整本書。本書的故事在單變數就是完整的。\n- **複變函數論**：e^{iθ} 只走到直覺（ch09），解析延拓只在 ζ(−1) 的門口看了一眼（ch12），收斂半徑的牆也只朝 ±i 指了一下（ch09）。留它的理由：複數世界有自己的主角——剛性、解析性——值得一本自己的書，硬塞進來只會兩頭不像。\n- **測度論與 Lebesgue 積分**：ch14 把你送到門口。留它的理由：那是**下一場**重建——黎曼積分這一代的故事，誕生於傅立葉的危機（ch11）、終結於怪獸劃出的邊界（ch13），本書講完了；重建 2.0 屬於實分析。\n\n（積分技巧目錄不在洞的名單上——它不是洞，是過濾器：本書用十六章證明了不會三角代換也能看懂整門微積分。）\n\n最後一句防呆：把洞當待辦清單刷，是把「讀完」誤當目標。這本書的目標從第一頁就只有一個——把「人類如何馴服無限」講到你能轉述。洞補不補，看你走哪條路、被哪個問題咬到，不是看焦慮。\n\n## 鏡子：ch01 的你，現在的你\n\n把那張紙拿出來——標了日期的那 150 字。\n\nch03 給過它三個檢核點：有沒有分開「項數」與「總量」；有沒有給「無限和」一個定義（標準答案五個字：部分和的極限）；有沒有處理「沒有最後一步」（追上由時刻定義，不需要最後一步）。當時全中的人，前三章只是替他把自己已經發明的東西命名；多數人——包括兩千年來最聰明的那批——中一到兩項。\n\n現在是終審，但考的不是同一張卷子。當年那題只問芝諾；現在你應該能接著往下講：第三支箭怎麼落地——瞬間速度是差商的極限，「靜止」與「運動」在單一快照裡同樣無意義（ch04）；「夾到的那個點憑什麼存在」是誰兜底——完備性，在只有有理數的宇宙裡，阿基米德夾了一輩子的那個目標根本不存在（ch14）；以及這套語言此刻就跑在你的監控棧裡——counter、rate()、increase() 三位一體（ch08、ch15）。\n\n成長的度量在這裡很具體：同一個問題，你的語言換了一整套。當年你大概只能說「現實裡追得上」——用結論頂撞論證，芝諾不會服氣；現在你能指著一個兩千四百年的論證說：你從「項數無限 ⇒ 總量無限」這一步開始犯規，而且「總量」的定義我可以攤開給你驗收。芝諾的箭沒有變鈍，是你長出了接箭的手。\n\n書到這裡讀完了。語言不會讀完——ch15 說你已經在裡面了；現在補上後半句：你在裡面，而且識字了。接下來每一次盯著 rate() 曲線、每一次調學習率、每一次把「要夠快」改寫成可驗收的條款，都是這本書的續篇——作者換成你。\n\n## 直覺的陷阱\n\n| 錯誤直覺 | 它把你帶去哪 | 自我察覺的徵兆 |\n|---|---|---|\n| 「讀完了＝懂了」 | 把翻過最後一頁當成驗收；本書的驗收從頭到尾只有一種——口頭講清楚 | 你跳過了口試六題，或打算「之後有空再講」 |\n| 「微積分＝一堆積分技巧」 | 把語言誤認成它的打字練習；本書一條技巧都沒教，照樣走完全程 | 聽到「微積分」你第一個想到的還是部分分式 |\n| 「教科書順序＝歷史順序」 | 以為數學是從定義長出定理；真實順序是先衝再補票、從屋頂往下蓋 | 你以為 ε-δ 比微積分早——它晚了快兩百年 |\n| 「馴服了＝理解了無限」 | 把操作化腦補成形上學解答，對外宣稱「數學已經搞懂無限是什麼」 | 你講不出「不回答是什麼、只回答怎麼用而不出錯」這個區分 |\n| 「洞都補完才算讀完」 | 補完主義：把刻意的範圍決策當欠款清單，用焦慮代替路線 | 你列了一串「接下來要學」，卻說不出每一項對應哪條路、哪個觸發 |\n| 「現在記得＝一年後記得」 | 遺忘是預設值；沒有觸發條件的知識會安靜蒸發 | 你還沒寫重讀清單（紙上推演第 3 題） |\n\n## 紙上推演\n\n**題 1 [35 分鐘] ★★★　口試正式作答**\n六題（見「口試總驗收」），閉書、口頭、每題 3 到 5 分鐘，講給真人或錄音。講完逐題對照要點清單打勾自評。這是全書的期末考，也是唯一一場。\n\n**題 2 [10 分鐘] ★★　反駁一句話**\n「微積分就是一堆積分技巧。」——寫一段 200 字以內的反駁。要求：不堆形容詞，至少給出一個本書的具體證據。\n\n**題 3 [10 分鐘] ★　一年後的重讀清單**\n挑三章，各寫一行觸發條件——「遇到什麼工作場景，就回來重讀這一章」。觸發條件要具體到事發當下認得出來，然後把清單放進你真的會再打開的筆記系統。\n\n### 推演解答\n\n**題 1**　口試的解答就是六份要點清單本身；這裡給計分與補考規則。\n\n- 逐題對照清單打勾。過關線：第一題與第三題**全中**——一題是書名、一題是書的高潮，缺一點就是還沒懂；其餘四題各中四分之三以上。\n- 常見死法一：**背誦腔**。你在重播本書的句子，不是重構論證。測試法：任挑一個要點，換一個本書沒用過的例子講——換不動，就是背的。\n- 常見死法二：**只講「是什麼」**。每個要點背後都有一個「為什麼」（為什麼是對手先出 ε、為什麼連續性在第 5 步上工、為什麼條件收斂任人宰割）；講不出為什麼的點不算命中。\n- 常見死法三：**橋接講成「就像」**。第四題的及格線是「就是」——說得出哪條定義在哪個系統裡逐字執行；說不出，那一格就只是修辭。\n- 補考規則：哪題沒過，回對應章重讀（題一→ch01、ch03；題二→ch03、ch04、ch07；題三→ch08；題四→ch08、ch15；題五→ch09、ch11–ch13；題六→ch09–ch11、ch15），**隔天**再考——當場重考測的是短期記憶，不是理解。\n\n**題 2**　模範版（自評對照三點：給出「沒教技巧也走完全程」的證據 ✓、把技巧放回正確位置 ✓、說出本體是什麼 ✓）：\n\n「這本書從頭到尾沒教任何一條積分技巧，卻把微積分講完了——這是最直接的反駁。技巧是『反查微分表』的查表術，服務的是 FTC 那一行端點相減；真正的革命是 FTC 本身：看出所有累積問題都是反微分問題。微積分的本體是三個動作——極限把無限過程變成可驗收的條款、微分抓住瞬間、積分累積變化——合起來，是人類描述『會變的量』的語言。把微積分等同於積分技巧，等於把一門語言等同於它的打字練習。」\n\n常見錯路：反駁寫成「微積分很美、很深刻」——形容詞堆疊沒有證據力；證據要具體（本書的存在本身、同一題三算的對帳表、FTC 與技巧的主從關係，任一個都行）。\n\n**題 3**　沒有標準答案。我的版本，供對照：\n\n- **ch08（FTC）**——觸發：要對新人解釋 counter／rate()／increase() 的設計，或發現自己把它們當黑盒用的那一天。重讀「一條細條：七步證明」與「同一題三算：總對帳」。\n- **ch12（發散的詐騙）**——觸發：被浮點求和順序、分散式 aggregation 的非決定性、或任何「同一批資料兩次算出不同總和」咬到的那一週。重讀「病灶不在無限，在『加法』這個錯覺」。\n- **ch14（嚴格化）**——觸發：接到「要夠快」「要穩」這種不可驗收的需求、要動筆寫 SLO 或 spec 的時候。重讀 ε-δ 的兩欄證明與「倒著找、正著寫」。\n\n替換建議：常跟數值程式打交道，把 ch12 換成 ch15 的「數值現實」一節；發現自己又把「越來越近」當定義用，插隊重讀 ch03。執行細節一條：觸發條件要寫在搜尋得到的地方——重讀清單最常見的死法，是躺在一個你永遠不會再打開的檔案裡。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。本章的特例：口試六題已經是總驗收，這裡只查收尾的零件：\n\n1. 六條驗收目標本身，你能不看書背出來嗎？（ch01 第一頁立的那六件事。）\n2. 「操作化」與「理解」差在哪？四個翻譯案例各自把哪個未定義的詞，翻成了哪個有限程序？\n3. 三核心動作的最終一句話版本——用你自己的話，等價地說一遍。\n4. 歷史弧線六站，每站一個人名、一個時代、一句貢獻。「先衝再補票」與「從屋頂往下蓋」各對應哪段史實？\n5. 本書刻意留下哪三個洞？各自的理由是什麼——為什麼留下它們不算偷工減料？\n6. ch01 的你和現在的你，差的具體是什麼？用芝諾那題的三個檢核點，加上你現在能多講的三件事回答。\n7. 十分鐘口述版——現在、計時、開始。（這一題沒有要點清單，因為它本身就是要點清單。）\n\n## 延伸閱讀\n\n- 附錄 C——全書延伸閱讀總地圖：三條路線（往嚴格／往應用／往欣賞）的完整資源清單與「如果只看三樣」。本章不重列各章資源，地圖在那裡。\n- Steven Strogatz,《無限的力量》（黃駿譯，旗標，2020；原書 Infinite Powers, 2019）——讀完本書再讀它：同一個故事的科普敘事版，這次你會以同行而非讀者的身分讀——哪裡他講得更好、哪裡你知道他省略了什麼，都看得見。\n- David Bressoud,《Calculus Reordered: A History of the Big Ideas》：https://press.princeton.edu/books/hardcover/9780691181318/calculus-reordered ——用累積、變化比、級數、容差四條主軸重排微積分史；讀完你會明白，本書的章節順序也只是諸多可能中的一種。\n- 3Blue1Brown,《Essence of Calculus》：https://www.3blue1brown.com/lessons/essence-of-calculus/ ——現在回頭重看整個系列：你已經能看出每一集在哪裡停住、省略了哪個證明——「看得出省略」就是這本書交付給你的能力。\n"}, {"id": "appendix-a-notation", "file": "appendix-a-notation.md", "group": "附錄", "title": "附錄 A — 記號與讀法速查表", "md": "# 附錄 A — 記號與讀法速查表\n\n> 這本書的驗收標準是「能不能不看書、口頭講給另一個工程師聽」。所以每個記號除了意思，更要緊的是**怎麼把它唸出來**——一個你唸不出口的符號，等於你還沒真的擁有它。下面每一列的第二欄就是給你出聲練習用的：照著唸，唸到順。記號一律 Unicode 純文字，全書不依賴 LaTeX 渲染。首次出現章以實際內文為準。\n\n## 極限與逼近\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `lim(n→∞) aₙ = L` | 「當 n 趨近無限大，a n 的極限是 L」 | 數列愈跑愈靠近 L，要多近有多近 | ch01 |\n| `lim(x→a) f(x) = L` | 「當 x 趨近 a，f x 的極限是 L」 | 函數在 a 附近的逼近目的地（不是 a 點的值） | ch04 |\n| `lim(h→0)` | 「當 h 趨近零」 | 差距縮到無限小時的那個目的地 | ch04 |\n| `→` | 「趨近」 | 逼近某值，但不必等於它 | ch01 |\n| `∞` | 「無限大」 | 沒有上界；是一個方向、不是一個數 | ch01 |\n| `≈` | 「約等於」 | 在容許誤差內相等 | ch01 |\n| `ε`（epsilon） | 「epsilon」 | 對手指定的誤差上限，要多小有多小 | ch03 |\n| `δ`（delta） | 「delta」 | 你回應的輸入容許範圍 | ch14 |\n| `⌈x⌉` | 「x 的天花板」「不小於 x 的最小整數」 | 無條件進位取整（ε 挑戰賽算 N 用） | ch03 |\n\n## 微分\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `f′(x)` | 「f prime x」「f 在 x 的導數」 | 瞬間變化率＝切線斜率（拉格朗日記號） | ch04 |\n| `dy/dx` | 「d y d x」「y 對 x 的導數」 | 同一個導數的萊布尼茲記號；像分數但**不是**除法 | ch04 |\n| `Δ`（delta，大寫） | 「delta x」「x 的變化量」 | 一段有限的差（Δx、Δy） | ch04 |\n| `(f(x+h)−f(x))/h` | 「f x 加 h 減 f x，整個除以 h」 | 差商：割線斜率，取 h→0 極限就成導數 | ch04 |\n| `f″(x)`、`x″` | 「f double prime」「x double dot／二階導數」 | 導數的導數（凹凸、加速度） | ch10 |\n| `∂`（偏微分） | 「partial」「偏 d」 | 多變數時只對一個變數取導數（本書僅直覺帶過） | ch06 |\n\n## 積分\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `∫` | 「積分」（拉長的 S，源自 sum） | 把無限多細條累積起來 | ch02 |\n| `∫₀¹ x² dx` | 「x 平方，從 0 積到 1，d x」 | x² 曲線在 [0,1] 下的面積（＝1/3，全書脊椎題） | ch07 |\n| `∫[a,b] f(x) dx` | 「f x 從 a 積到 b」 | f 在區間 [a,b] 的累積量 | ch07 |\n| `dx` | 「d x」 | 無限細的寬度（思考用的好圖像，嚴格意義見 ch14） | ch07 |\n| `A(x) = ∫₀ˣ f(t) dt` | 「A x 等於 f t 從 0 積到 x」 | 累積函數：把面積變成 x 的函數（FTC 的關鍵視角） | ch08 |\n| `F(b) − F(a)` | 「大 F b 減大 F a」 | 反導數代兩端點之差＝定積分（FTC 第二式） | ch08 |\n\n## 級數\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `Σ(n=1→∞) aₙ` | 「sigma，n 從 1 到無限大，a n」 | 無限和，定義成部分和的極限 | ch01 |\n| `Sₙ` | 「S n」「第 n 個部分和」 | 前 n 項加起來 | ch01 |\n| `aₙ` | 「a n」「第 n 項」 | 數列／級數的通項 | ch02 |\n| `n!` | 「n 階乘」 | n×(n−1)×…×1（泰勒係數的分母） | ch09 |\n| `e^{iθ}` | 「e 的 i theta 次方」 | 指數接上旋轉：＝cosθ + i·sinθ（形式操作） | ch09 |\n| `ζ(s)`（zeta） | 「zeta s」 | 黎曼 zeta 函數（−1/12 的正確來路） | ch12 |\n| `W(x)` | 「大 W x」 | 魏爾斯特拉斯怪獸函數：處處連續、處處不可微 | ch13 |\n\n## 邏輯與量詞（嚴格化用）\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `∀` | 「對所有」「for all」 | 全稱量詞（∀ε>0：對每一個正的 ε） | ch03 |\n| `∃` | 「存在」「there exists」 | 存在量詞（∃δ>0：找得到一個正的 δ） | ch03 |\n| `⇒` | 「則」「推得」 | 蘊涵：若前件成立，後件成立 | ch03 |\n| `⟺` | 「若且唯若」「等價於」 | 雙向蘊涵，兩邊同真同假 | ch14 |\n| `0<\\|x−a\\|<δ ⇒ \\|f(x)−L\\|<ε` | 「x 落在 a 的 delta 鄰域內，就保證 f x 落在 L 的 epsilon 帶內」 | ε-δ 的攻防主句（量詞順序＝攻防順序） | ch14 |\n\n## 常數、集合與其他\n\n| 寫法 | 怎麼唸（出聲練習用） | 白話意義 | 首次出現章 |\n|---|---|---|---|\n| `√x` | 「根號 x」「x 的平方根」 | 平方根（√2 是有理數裡的洞，見 ch14） | ch02 |\n| `\\|x\\|` | 「x 的絕對值」 | 去掉正負號；\\|x\\| 在 0 點是「一個尖角」的原型 | ch05 |\n| `e` | 「e」「歐拉數」 | ≈2.71828，唯一讓自己等於自己導數的底 | ch05 |\n| `π` | 「pi」 | ≈3.14159 | ch01 |\n| `ℝ` | 「實數集」「R」 | 全體實數（補完所有洞後的數線） | ch14 |\n| `φ(x)`（phi） | 「phi x」 | 標準常態分布的機率密度函數 | ch15 |\n| `≠ ≤ ≥` | 「不等於／小於等於／大於等於」 | 基本不等關係 | ch03 |\n\n## 全書記號慣例（與各章一致）\n\n- **行內**用 Unicode 純文字：`f′(x)`、`lim(x→a)`、`Σ(n=1→∞)`、`∫₀¹ x² dx`、`∫[a,b] f(x) dx`。閱讀器不渲染 LaTeX，所有公式都讀得出、複製得走。\n- **多行推導**一律放進 ` ```text ` 圍欄區塊，等號對齊、右側可加「← 為什麼」短註，不硬塞行內。\n- **導數雙軌記號並用**：拉格朗日 `f′(x)` 與萊布尼茲 `dy/dx`；牛頓的 `ẋ` 只在 ch05 一句帶過，全書工作記號不用。\n- 函數圖形用 ASCII 描點（`*` 點、`─ │ └` 軸），追求形狀直覺而非精確比例；所有圖通過 CJK=2 欄寬對齊檢查。\n- 數字精度全書統一：π ≈ 3.14159、e ≈ 2.71828、ln 2 ≈ 0.6931，各章按需截短但不互相矛盾。\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 術語表", "md": "# 附錄 B — 術語表\n\n> 全書出現過的技術名詞，EN–ZH 對照＋一句話定義。定義用的是**這本書的講法**（直覺優先），不是教科書的標準措辭——你要的是能複述的版本，不是能背誦的版本。依英文字母排序；「首次出現章」以實際內文為準。跨章概念的完整討論回該章看。\n\n| English | 中文 | 一句話定義（本書講法） | 首次出現章 |\n|---|---|---|---|\n| absolute convergence | 絕對收斂 | 取絕對值後仍收斂；這種級數才能隨便重排不出事 | ch12 |\n| accumulation function | 累積函數 | A(x)＝從 0 積到 x 的面積，把「面積」變成 x 的函數——FTC 的關鍵視角轉換 | ch08 |\n| actual infinity | 實際無限 | 把無限當成一個已完成的整體（希臘人迴避的東西） | ch01 |\n| alternating harmonic series | 交錯調和級數 | 1 − 1/2 + 1/3 − …＝ln 2；條件收斂的招牌例子 | ch12 |\n| alternating series | 交錯級數 | 正負號交替出現的級數 | ch09 |\n| analytic continuation | 解析延拓 | 把函數延伸到原本發散的地方、賦予新值（ζ(−1)=−1/12 的來路） | ch12 |\n| Archimedean property | 阿基米德性質 | 沒有「無限小但非零」的實數；任何正數乘夠多次都能超過另一個 | ch03 |\n| associativity | 結合律 | 加法可隨意加括號——在發散級數上**失效** | ch12 |\n| Brownian motion | 布朗運動 | 塵埃、股價的隨機路徑；幾乎處處連續卻處處不可微（自然界的怪獸） | ch13 |\n| catastrophic cancellation | 災難性消去 | 兩個相近浮點數相減，有效位數崩光——數值微分 h 太小就栽在這 | ch04 |\n| chain rule | 連鎖規則 | 複合函數的導數＝各層變化率相乘；backprop 的數學核心 | ch05 |\n| completeness | 完備性 | 實數沒有洞；「夾擠到的那個點」一定真的存在——極限與積分的地基 | ch14 |\n| commutativity | 交換律 | 加法可調換順序——無限與浮點世界裡都要小心 | ch12 |\n| conditional convergence | 條件收斂 | 收斂但取絕對值後發散；重排可改變和（黎曼重排定理） | ch12 |\n| continuous | 連續 | 沒有跳躍、可以一筆畫完；用極限定義（不必可微） | ch03 |\n| converge | 收斂 | 部分和（或數列）有極限、停得下來 | ch01 |\n| cumulative distribution function (CDF) | 累積分布函數 | 機率密度的累積——本身就是一個積分；P99 是它的反查 | ch15 |\n| Dedekind cut | 戴德金切割 | 用有理數的一刀切法定義無理數，把數線上的洞補滿 | ch14 |\n| derivative | 導數 | 瞬間變化率＝差商的極限＝切線斜率 | ch04 |\n| difference quotient | 差商 | (f(x+h)−f(x))/h，割線斜率；取 h→0 極限成導數 | ch04 |\n| differential equation | 微分方程 | 用變化率描述系統的方程式——「定律寫的是變化率、不是軌跡」 | ch10 |\n| diverge | 發散 | 沒有極限；和往無限跑或來回擺盪 | ch01 |\n| epsilon-delta definition | ε-δ 定義 | 把「逼近」寫成可驗收條款的法典：對手出 ε、你給 δ | ch14 |\n| Euler's method | 歐拉法 | 解不出方程就沿斜率一步步走（你的 tick loop 就是它） | ch10 |\n| exponential backoff | 指數退避 | 重試間隔指數遞減；總時間是收斂的幾何級數（工程橋接） | ch01 |\n| factorial | 階乘 | n!＝n×(n−1)×…×1；泰勒係數的分母 | ch09 |\n| formal manipulation | 形式操作 | 先照規則算、嚴格性事後補票——十八世紀的招牌風格 | ch09 |\n| Fourier series | 傅立葉級數 | 把任何週期訊號拆成 sin/cos 的無限疊加 | ch11 |\n| Fast Fourier Transform (FFT) | 快速傅立葉變換 | 讓傅立葉拆解快到能跑在手機裡的演算法（JPEG、音訊） | ch11 |\n| Fundamental Theorem of Calculus (FTC) | 微積分基本定理 | 面積與斜率互為反操作——微分與積分是同一件事的正反面（全書高潮） | ch08 |\n| geometric series | 幾何級數 | 公比固定的級數；\\|r\\|<1 時收斂到 1/(1−r) | ch01 |\n| Gibbs phenomenon | 吉布斯現象 | 傅立葉逼近在跳躍點旁約 9% 的過衝，項數再多也壓不掉 | ch11 |\n| gradient descent | 梯度下降 | 沒有公式解時「往坡下走」找極小；步長＝你調過的學習率 | ch06 |\n| harmonic series | 調和級數 | Σ1/n；項趨於 0 卻發散的第一面牆（Oresme 分組論證） | ch09 |\n| hyperreal numbers | 超實數 | 把無窮小嚴格化的數系（羅賓遜非標準分析） | ch14 |\n| improper integral | 廣義積分 | 積分界限或被積函數無界時，用極限定義——又一個「極限偽裝成運算」 | ch12 |\n| indeterminate form | 未定式 | 像 0/0 這種本身無意義、要靠極限才有答案的式子 | ch04 |\n| inner product | 內積 | 兩函數「相乘再積分」的相似度；不同頻率內積為零＝正交 | ch11 |\n| integral | 積分 | 切薄、近似、加總、取極限；累積量，面積只是一張臉 | ch07 |\n| limit | 極限 | 逼近的目的地，不是過程的最後一步（沒有最後一項） | ch01 |\n| local linearity | 局部線性 | 光滑曲線放大到夠近就是直線——微分的世界觀（怪獸函數打破它） | ch05 |\n| method of exhaustion | 窮盡法 | 內外夾擠＋反證法算精確值；阿基米德的絕技，但沒有通法 | ch02 |\n| natural logarithm | 自然對數 | ln，以 e 為底；e^x 的反面 | ch05 |\n| non-standard analysis | 非標準分析 | 羅賓遜 1960 年代讓無窮小嚴格復活，平反萊布尼茲的直覺 | ch14 |\n| orthogonality | 正交 | 不同頻率「互不干擾」，所以傅立葉係數可以各自結帳 | ch11 |\n| partial sum | 部分和 | 級數前 n 項之和；它的極限才是級數的「和」 | ch01 |\n| potential infinity | 潛在無限 | 把無限當成「永遠可以再加一步」的過程（亞里斯多德的迴避法） | ch01 |\n| power series | 冪級數 | 以 x 的次方為項的無限級數（泰勒級數是一種） | ch09 |\n| probability density function (pdf) | 機率密度函數 | 曲線下面積＝機率；機率其實是在算積分 | ch15 |\n| radius of convergence | 收斂半徑 | 冪級數能收斂的範圍；超出去就失效（離展開點愈遠愈吃緊） | ch09 |\n| range reduction | 範圍縮減 | 先把角度折回小區間再用多項式算 sin（libm 的真實做法） | ch09 |\n| rational numbers | 有理數 | 可寫成分數的數；稠密卻有洞（√2 不在其中） | ch14 |\n| real number | 實數 | 補完所有洞、完備的數線；ℝ | ch14 |\n| reductio ad absurdum | 反證法 | 假設相反、推出矛盾；窮盡法收尾的關鍵（因為當年沒有「取極限」） | ch02 |\n| Riemann rearrangement theorem | 黎曼重排定理 | 條件收斂級數重排後可收斂到任意指定值——無限不守交換律 | ch12 |\n| Riemann sum | 黎曼和 | 切 n 條矩形近似面積，n→∞ 取極限；積分的硬算定義 | ch07 |\n| secant line | 割線 | 穿過曲線兩點的直線；兩點靠攏的極限是切線 | ch04 |\n| separation of variables | 分離變數 | 把同類變數搬到等號同側再積分的解法（本書僅示範一次） | ch10 |\n| sequence | 數列 | 一串有順序的數 a₁, a₂, …；可談它的極限 | ch03 |\n| series | 級數 | 數列各項相加；和定義成部分和的極限 | ch03 |\n| slope field | 方向場 | 在平面每點畫上該處斜率的小箭頭，畫出解的「流向」 | ch10 |\n| square wave | 方波 | 在 +1 與 −1 間跳變的不連續波；傅立葉的試金石 | ch11 |\n| standard normal distribution | 標準常態分布 | 鐘形曲線；曲線下面積＝機率，68-95-99.7 法則 | ch15 |\n| tangent line | 切線 | 曲線在一點「貼著走」的直線；斜率＝導數 | ch04 |\n| Taylor series | 泰勒級數 | 把函數展開成無限多項多項式，每多一項多抄一階導數 | ch09 |\n| telescoping | 對消／伸縮 | 級數相鄰項相消、只剩頭尾（算部分和的招式） | ch09 |\n| transfer principle | 轉移原理 | 非標準分析裡，實數的性質可平移到超實數的橋 | ch14 |\n| trapezoidal rule | 梯形法 | 用梯形而非矩形近似積分，誤差以 1/n² 縮小（比矩形快一階） | ch07 |\n| Weierstrass function | 魏爾斯特拉斯函數 | W(x)＝Σ aⁿcos(bⁿπx)；處處連續、處處不可微的怪獸 | ch13 |\n| well-defined | 良定義 | 一個寫法真的指到一個確定對象（0.999… 的代數論證偷偷假設了它） | ch03 |\n| Wiener process | 維納過程 | 布朗運動的嚴格數學模型；路徑以機率 1 處處不可微 | ch13 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> 全書十六章的延伸閱讀，在這裡彙整成一張地圖：先給「如果只看三樣」，再分三條路線——往嚴格走、往應用走、往欣賞走——對應 ch16 的下一步地圖。只收 `_meta/landscape-2026-06.md` 或各章延伸閱讀已查證過的資源（連結現況以 2026-06 為基準），不收未驗證的新東西。各章原始清單的完整去處，見文末索引表。\n\n## 如果只看三樣\n\n1. **Steven Strogatz《無限的力量》**（Infinite Powers，黃駿譯，旗標，2020）——與本書同一個敵人（無限）、同一種打法（直覺優先），讀完本書再讀它，你會以同行而非讀者的身分驗收他的敘事，是成本最低的全書總複習（見 ch01–ch16，幾乎每章點名）。\n2. **3Blue1Brown《Essence of Calculus》**：https://www.3blue1brown.com/lessons/essence-of-calculus/ （YouTube 播放清單：https://www.youtube.com/playlist?list=PLZHQObOWTQDMsr9K-rj53DwVRMYO3t5Yr ）——把你剛建好的直覺全部變成會動的圖，而且現在的你看得出每一集在哪裡停住、省略了哪個證明——「看得出省略」正是本書交付的能力（見 ch16 的收官建議）。\n3. **William Dunham《The Calculus Gallery: Masterpieces from Newton to Lebesgue》**（Princeton UP）：https://press.princeton.edu/books/paperback/9780691182858/the-calculus-gallery ——工程師的下一步不是刷題、是看原典級證明怎麼蓋起來；難度恰好比本書高一階，從 Newton 一路走到 Lebesgue，是三條路線中「往嚴格走」最自然的第一步（見 ch08、ch09、ch11、ch14）。\n\n## 往嚴格走（實分析方向）\n\n本書刻意停在直覺與結構理解；想把每個「本書不證」補上，走這條。\n\n- **Spivak《Calculus》第 4 版**（Publish or Perish，2008）——證明導向微積分的標竿、「對嚴格性的初次正面相遇」；先讀極限與連續那幾章，看 ε-δ 在行家手裡可以多優雅（見 ch14）。\n- **Apostol《Calculus》兩卷**（Wiley，2nd ed. 1967/1969）——理論與技巧並重、「先積分後微分」的 Caltech 傳統教本；想照歷史的真實順序（累積先於變化率）系統重學，選它（見 ch07–ch08 的順序對帳）。\n- **Judith Grabiner〈Who Gave You the Epsilon? Cauchy and the Origins of Rigorous Calculus〉**：https://www.jstor.org/stable/2975545 ——「觀念奠基在柯西、符號定稿在魏爾斯特拉斯」這條主線的史學依據，嚴格化故事的單篇最佳入口（見 ch03、ch14）。\n- **Dedekind《Essays on the Theory of Numbers》**（Beman 英譯，Project Gutenberg 第 21016 號，免費）：https://www.gutenberg.org/ebooks/21016 ——第一篇就是 1872 年切割原典，不到三十頁，數學史上少見的「原作比教科書好讀」（見 ch14）。\n- **H. Jerome Keisler《Elementary Calculus: An Infinitesimal Approach》**（CC 授權免費線上版）：https://people.math.wisc.edu/~hkeisler/calc.html ——用 Robinson 的無窮小從頭教一遍大一微積分；翻第 2 章，看 dy/dx 當真正的除法用是什麼感覺（見 ch14）。\n- **G. H. Hardy〈Weierstrass's non-differentiable function〉**（Trans. AMS, 1916）：https://www.ams.org/journals/tran/1916-017-03/S0002-9947-1916-1501044-1/S0002-9947-1916-1501044-1.pdf ——放寬怪獸條件至 ab ≥ 1 的原始論文，前兩頁的歷史回顧與條件陳述就值回票價（見 ch13）。\n- **Johan Thim《Continuous Nowhere Differentiable Functions》**（Luleå 碩士論文, 2003）：https://ltu.diva-portal.org/smash/get/diva2:1022983/FULLTEXT01 ——怪獸圖鑑：Bolzano、Takagi、van der Waerden……每隻都附完整證明（見 ch13）。\n- **Mörters & Peres《Brownian Motion》**：https://www.mi.uni-koeln.de/~moerters/book/book.pdf ——定理 1.27 就是「路徑以機率 1 處處不可微」的正牌證明，讀第一章即可（見 ch13）。\n- **Needham《Visual Complex Analysis》25 週年版**（OUP，2023）：https://global.oup.com/academic/product/visual-complex-analysis-9780192868923 ——本書刻意留下的複變之洞（e^{iθ} 只到形式操作）的補完方向：501 張圖把複變講成幾何，嚴格但極度視覺，與本書氣質相容（見 ch09）。\n\n## 往應用走（微分方程與 ML 數學方向）\n\n想把「會欣賞」升級成「會操作」——正課、微分方程、ML 數學與數值工藝，走這條。\n\n- **MIT OCW 18.01 Single Variable Calculus**：https://ocw.mit.edu/courses/18-01-single-variable-calculus-fall-2006/ （較新版本：https://ocw.mit.edu/courses/18-01-calculus-i-single-variable-calculus-fall-2020/ ）——標準正課版的單變數微積分（含 2007 年 Jerison 錄影）；本書刻意不教的解題技巧與更多例題在這裡補（見 ch04、ch06、ch07）。\n- **MIT OCW 18.03 Differential Equations**（Spring 2010）：https://ocw.mit.edu/courses/18-03-differential-equations-spring-2010/ ——正式學微分方程解法與理論的標準課；先看前幾講的方向場與一階方程，可直接接上 ch10（見 ch10）。\n- **Paul's Online Math Notes**：https://tutorial.math.lamar.edu/ ——Algebra 到 Calculus I–III、微分方程的免費筆記，查技巧用的工具書；Lagrange 乘數那頁（https://tutorial.math.lamar.edu/classes/calciii/lagrangemultipliers.aspx ）是 ch06 一句話帶過的約束最佳化路標（見 ch06）。\n- **3Blue1Brown〈Gradient descent〉與〈Backpropagation calculus〉**：https://www.3blue1brown.com/lessons/gradient-descent 、https://www.3blue1brown.com/lessons/backpropagation-calculus/ ——從 ch06 的一維坡走進億維地形，再看連鎖規則怎麼變成 backprop 的記帳系統（見 ch06、ch15）。\n- **Parr & Howard〈The Matrix Calculus You Need For Deep Learning〉**：https://explained.ai/matrix-calculus/ ——ch15 一句話帶過的矩陣微積分完整地圖；它假設的起點恰好是你現在的程度（單變數連鎖規則）（見 ch15）。\n- **Rumelhart, Hinton & Williams〈Learning representations by back-propagating errors〉**（Nature 323, 1986）：https://www.nature.com/articles/323533a0 ——使 backprop 普及的原始論文，數學核心就是連鎖規則（見 ch15）。\n- **Gaffer On Games〈Integration Basics〉**：https://gafferongames.com/post/integration_basics/ ——遊戲物理視角的 Euler／semi-implicit Euler／RK4 比較，把「tick loop 就是 Euler 法」與能量漂移寫成工程實戰指南（見 ch10）。\n- **APMonitor〈Proportional Integral Derivative (PID)〉**：https://apmonitor.com/pdc/index.php/Main/ProportionalIntegralDerivative ——P、I、D 三項各自脾氣的教學頁，想親手調 Kp、Ki、Kd 從這裡開始（見 ch15）。\n- **fdlibm 的 k_sin.c 原始碼**：https://www.netlib.org/fdlibm/k_sin.c ——三十行程式加註解，親眼看 sin 的多項式實作與誤差界，「泰勒級數真的跑在你機器裡」的鐵證（見 ch09）。\n\n## 往欣賞走（數學史與科普方向）\n\n想把這趟旅程的故事線讀厚——人物、原典與翻案，走這條。\n\n- **Steven Strogatz《無限的力量》**（旗標，2020）——已列「如果只看三樣」第一位；阿基米德、導數誕生、FTC、微分方程到傅立葉，每段都有對應章節的敘事版（見 ch01–ch16）。\n- **David Bressoud《Calculus Reordered: A History of the Big Ideas》**（Princeton UP，2019）：https://press.princeton.edu/books/hardcover/9780691181318/calculus-reordered ——以累積、變化比、級數、容差四大主軸重排微積分史；讀完你會明白，本書的章節順序也只是諸多可能中的一種（見 ch11、ch16）。\n- **Archimedes Palimpsest 官方網站**：https://www.archimedespalimpsest.org/ ——《方法》重寫本從祈禱書到多光譜成像的全程紀錄，先讀 History 頁，看人類怎麼差點弄丟它（見 ch02）。\n- **SEP 與 IEP 的〈Zeno's Paradoxes〉**：https://plato.stanford.edu/entries/paradox-zeno/ 、https://iep.utm.edu/zenos-paradoxes/ ——悖論標準轉述與現代解的完整地圖；IEP 較口語，其「The Standard Solution」一節就是本書 ch03–ch04 走的路（見 ch01）。\n- **亞里斯多德《物理學》卷六英譯**（MIT Classics）：https://classics.mit.edu/Aristotle/physics.6.vi.html ——三支箭的原始轉述都在 Part 9，一頁讀完，親眼看一次原文（見 ch01）。\n- **MacTutor 數學史檔案**——本書人物與概念身世的史料依據，每篇都短：Eudoxus 傳記（https://mathshistory.st-andrews.ac.uk/Biographies/Eudoxus/ ）、《方法》選段譯文（https://mathshistory.st-andrews.ac.uk/Extras/Archimedes_The_Method/ ）、Madhava 傳記（https://mathshistory.st-andrews.ac.uk/Biographies/Madhava/ ）、〈The number e〉（https://mathshistory.st-andrews.ac.uk/HistTopics/e/ ）（見 ch02、ch05、ch09）。\n- **Euler 原典兩處**：Euleriana 的 Basel 史料與證明綜覽（https://scholarlycommons.pacific.edu/cgi/viewcontent.cgi?article=1032&context=euleriana ）、Euler Archive 的 E247《De seriebus divergentibus》（https://scholarlycommons.pacific.edu/euler-works/247/ ）——看十八世紀最強的腦袋怎麼大膽形式操作、又怎麼自建護欄（見 ch09、ch12）。\n- **Stephen Wolfram〈Who Was Ramanujan?〉**：https://writings.stephenwolfram.com/2016/04/who-was-ramanujan/ ——兩封信的前後脈絡與手稿影像；「瘋人院」那句話的原始出處（第二封信，1913-02-27）（見 ch12）。\n- **Quanta Magazine〈The Jagged, Monstrous Function That Broke Calculus〉**（2025-01）：https://www.quantamagazine.org/the-jagged-monstrous-function-that-broke-calculus-20250123/ ——怪獸史的科普敘事版，讀完 ch13 躺著複習用（見 ch13）。\n\n## 各章延伸閱讀索引\n\n各章清單的一行濃縮版；完整評注回各章末尾看。\n\n| 章 | 該章延伸閱讀的去處 |\n|---|---|\n| ch01 | SEP／IEP 芝諾條目；亞里斯多德《物理學》卷六（MIT Classics）；《無限的力量》；3B1B 系列 |\n| ch02 | Palimpsest 官網；Wikipedia〈Quadrature of the Parabola〉〈Measurement of a Circle〉；Holy Cross 阿基米德講義（https://mathcs.holycross.edu/~little/Archimedes.pdf ）；MacTutor Eudoxus 與《方法》選段；《無限的力量》 |\n| ch03 | 3B1B 系列；Wikipedia〈0.999…〉（https://en.wikipedia.org/wiki/0.999... ）；《無限的力量》；Grabiner ε 史源 |\n| ch04 | 3B1B〈The paradox of the derivative〉（https://www.3blue1brown.com/lessons/derivatives ）；MAA《The Analyst》珍藏頁（https://old.maa.org/press/periodicals/convergence/mathematical-treasure-george-berkeleys-the-analyst ）；《Commercium Epistolicum》條目（https://www.historyofinformation.com/detail.php?id=1726 ）；《無限的力量》；MIT OCW 18.01 |\n| ch05 | 3B1B 系列；MacTutor〈The number e〉；《無限的力量》；Wikipedia〈e (mathematical constant)〉（https://en.wikipedia.org/wiki/E_(mathematical_constant) ） |\n| ch06 | 3B1B〈Gradient descent〉與系列；MIT OCW 18.01；Paul's Notes 的 Lagrange 乘數頁；《無限的力量》；Wikipedia〈Gradient descent〉（https://en.wikipedia.org/wiki/Gradient_descent ） |\n| ch07 | 3B1B〈Integration〉（https://www.3blue1brown.com/lessons/integration ）；Wikipedia〈Riemann integral〉〈Integral symbol〉；MacTutor「integral」詞源（https://mathshistory.st-andrews.ac.uk/Miller/mathword/i/ ）；MIT OCW 18.01；《無限的力量》 |\n| ch08 | 3B1B〈Integration〉；Nauenberg 論 Barrow 與 Leibniz（https://arxiv.org/abs/1111.6145 ）；MAA 牛頓 FTC 原證（https://old.maa.org/press/periodicals/convergence/teaching-the-fundamental-theorem-of-calculus-a-historical-reflection-newtons-proof-of-the-ftc ）；Britannica〈Discovery of the theorem〉；Prometheus query functions 文件（https://prometheus.io/docs/prometheus/latest/querying/functions/ ）；《無限的力量》；《The Calculus Gallery》 |\n| ch09 | 3B1B〈Taylor series〉（https://www.3blue1brown.com/lessons/taylor-series ）；Euleriana Basel 綜覽；fdlibm k_sin.c；《The Calculus Gallery》；MacTutor Madhava |\n| ch10 | 3B1B〈Differential equations〉（https://www.3blue1brown.com/lessons/differential-equations ）；MIT OCW 18.03；Wikipedia〈Discovery of Neptune〉（https://en.wikipedia.org/wiki/Discovery_of_Neptune ）；Gaffer On Games；《無限的力量》 |\n| ch11 | 3B1B〈Fourier series〉（https://www.3blue1brown.com/lessons/fourier-series ）；Wikipedia〈Gibbs phenomenon〉（https://en.wikipedia.org/wiki/Gibbs_phenomenon ）；《The Calculus Gallery》；《Calculus Reordered》；《無限的力量》 |\n| ch12 | Wikipedia〈History of Grandi's series〉〈Riemann series theorem〉〈1 + 2 + 3 + 4 + ⋯〉〈Kahan summation algorithm〉；Euler Archive E247；Wolfram〈Who Was Ramanujan?〉 |\n| ch13 | Wikipedia〈Weierstrass function〉（https://en.wikipedia.org/wiki/Weierstrass_function ）；Hardy 1916（AMS PDF）；Quanta 怪獸專文；Thim 怪獸圖鑑；Mörters & Peres《Brownian Motion》；Shen 論 Hausdorff 維度（https://arxiv.org/abs/1505.03986 ） |\n| ch14 | Spivak《Calculus》；《The Calculus Gallery》；Dedekind 原典（Gutenberg 21016）；Keisler 無窮小教本；Grabiner ε 史源 |\n| ch15 | 3B1B〈Backpropagation calculus〉；Parr & Howard 矩陣微積分；Rumelhart–Hinton–Williams 1986；Kubernetes HPA 文件（https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/ ）；APMonitor PID；Prometheus histograms 文件（https://prometheus.io/docs/practices/histograms/ ）；Wikipedia〈Numerical differentiation〉（https://en.wikipedia.org/wiki/Numerical_differentiation ） |\n| ch16 | 本附錄三條路線；《無限的力量》；《Calculus Reordered》；3B1B 系列重看 |\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "landscape-2026-06：本書時效性與歷史事實的唯一基準", "md": "# landscape-2026-06：本書時效性與歷史事實的唯一基準\n\n- **用途**：本書（微積分思想史）所有「脆弱事實」——歷史年份、出處、原句、數值、外部資源連結——的唯一基準檔。\n- **基準日期**：2026-06（全部條目於 2026-06-12 以網路查證或本檔自行複核）。\n- **使用規則**：各章引用本檔列出的事實時，**以本檔表述為準**，不得引用記憶中的「常見說法」；若常見說法與本檔的「部分修正」衝突，一律採本檔版本。標注 ⚠️ 的條目未能完全確認，章節引用時必須帶保留語氣或註明「傳說」。重大修正（推翻本檔既有表述）需兩個獨立來源，並在 maintenance 掃描日誌記一行。\n\n---\n\n## A. 古代與前奏\n\n### 1. 芝諾悖論的出處\n- **事實**：芝諾（Zeno of Elea，西元前五世紀）原著不存。四個運動悖論（二分、阿基里斯與烏龜、飛矢不動、運動場）皆經亞里斯多德《物理學》（Physics）第六卷轉述而流傳，部分輔以 Simplicius 的注釋。飛矢不動的標準轉述位置是 Physics 239b30：「若凡占據與自身相等空間者皆靜止，而運動中之物在任一瞬間皆如此，則飛矢不動。」亞里斯多德並指出二分與阿基里斯本質上是同一論證（阿基里斯即追趕版的二分）。\n- **來源**：https://plato.stanford.edu/entries/paradox-zeno/ ；https://iep.utm.edu/zenos-paradoxes/\n- **判定**：確認。\n\n### 2. Eudoxus 與窮盡法\n- **事實**：窮盡法（method of exhaustion）歸於 Eudoxus of Cnidus（約西元前 408–355）。歸屬依據是阿基米德本人：他在《論球與圓柱》（On the Sphere and Cylinder）序文中把相關定理的證明（角錐、圓錐體積）歸功於 Eudoxus。更早的雛形想法來自 Antiphon，Eudoxus 將其變成嚴格方法；約一百年後由阿基米德發揮到極致。\n- **來源**：https://mathshistory.st-andrews.ac.uk/Biographies/Eudoxus/ ；https://en.wikipedia.org/wiki/Method_of_exhaustion\n- **判定**：確認。\n\n### 3. 阿基米德《拋物線求積》：弓形面積 = 內接三角形的 4/3\n- **事實**：《拋物線求積》（Quadrature of the Parabola）證明拋物線弓形面積是同底同高內接三角形的 4/3。論證核心：逐層內接三角形，每一層新增面積是前一層的 1/4，亦即依賴幾何級數 1 + 1/4 + 1/16 + … = 4/3。**細緻化（引用時注意）**：阿基米德並未「加總無窮級數」——他在命題 23 證明的是**有限和**恆等式（前 n 項加上一個尾項修正等於 4/3），再於命題 24 用窮盡法的雙重歸謬（面積既不能大於也不能小於 4/3）完成證明。書中可說「實質上等於求出該幾何級數的和」，但不要說他「直接求了無窮和」。\n- **來源**：https://en.wikipedia.org/wiki/Quadrature_of_the_Parabola ；https://mathcs.holycross.edu/~little/Archimedes.pdf\n- **判定**：確認（附細緻化：有限和＋雙重歸謬，非直接無窮求和）。\n\n### 4. 阿基米德以 96 邊形夾擠 π\n- **事實**：《圓的度量》（Measurement of a Circle）中，阿基米德從正六邊形出發，逐次倍增至內接與外切正 96 邊形，證得 3 + 10/71 < π < 3 + 1/7，即 223/71 < π < 22/7（約 3.1408 < π < 3.1429）。\n- **來源**：https://itech.fgcu.edu/faculty/clindsey/mhf4404/archimedes/archimedes.html ；https://www.pbs.org/wgbh/nova/physics/approximating-pi.html\n- **判定**：確認。\n\n### 5. 《方法》與 Archimedes Palimpsest\n- **事實**：丹麥學者 Johan Ludvig Heiberg 於 1906 年在君士坦丁堡（伊斯坦堡）的 Metochion 圖書館檢視一部祈禱書重寫本（palimpsest），發現底層是七篇阿基米德著作，包括《方法》（The Method）的唯一傳世希臘文本、Stomachion 與希臘文《論浮體》。該手抄本 1998 年 10 月 28 日在紐約 Christie's 拍賣，由匿名美國藏家購得，1999 年 1 月寄存於巴爾的摩 Walters Art Museum 進行修復、多光譜成像與學術研究。2008 年 10 月 29 日（拍賣十週年）全部影像與轉錄以 Creative Commons 授權公開。現行官方網站：**https://www.archimedespalimpsest.org/**（2026-06 仍在線，歷史頁 https://www.archimedespalimpsest.org/about/history/index.php ）。\n- **來源**：https://www.archimedespalimpsest.org/about/history/index.php ；https://en.wikipedia.org/wiki/Archimedes_Palimpsest ；https://thewalters.org/news/lost-and-found-the-secrets-of-archimedes/\n- **判定**：確認。\n\n### 6. 調和級數發散的最早證明：Nicole Oresme\n- **事實**：最早證明歸於十四世紀法國學者 Nicole Oresme（約 1350 年），方法是分組（1/3+1/4 ≥ 1/2、1/5+…+1/8 ≥ 1/2，依此類推），是 Cauchy 凝聚判別法的先聲。此結果其後湮沒，十七世紀由 Pietro Mengoli 與 Jacob Bernoulli 等人重新證明。\n- **來源**：https://en.wikipedia.org/wiki/Harmonic_series_(mathematics) ；https://www.math.utah.edu/history/oresme.html\n- **判定**：確認。\n\n### 7. Kerala 學派／Madhava：早於歐洲約兩百年\n- **事實**：Madhava of Sangamagrama（MacTutor 作 1350–1425，另說約 1340–1425）創立 Kerala 學派。歸於他（或其學派）的成果：π/4 = 1 − 1/3 + 1/5 − …（今稱 Madhava–Leibniz 級數，並附修正項加速收斂）、sin 與 cos 的冪級數展開，並算得 π 準確至 **11 位小數**（3.14159265359）。這些成果早於歐洲（Gregory、Newton、Leibniz）兩百年以上。**保留態度（學界主流）**：Madhava 本人的數學著作已佚失，成果經由後世 Kerala 學者轉述——最清楚的是 Jyesthadeva 的《Yukti-Bhasa》（約 1550）與 Nilakantha 的著作；曾被當作 Madhava 親著的《Mahajyanayana prakara》現多被認定為十六世紀後學之作。目前沒有 Kerala 成果傳入歐洲的證據，主流觀點視之為**獨立的先驅成就**，而非歐洲微積分的來源。**常見錯誤**：坊間常寫「π 準確至 13 位」，MacTutor 與多數學術來源為 11 位，本書採 11 位。\n- **來源**：https://mathshistory.st-andrews.ac.uk/Biographies/Madhava/ ；https://www.britannica.com/science/Indian-mathematics/The-school-of-Madhava-in-Kerala ；https://en.wikipedia.org/wiki/Madhava_of_Sangamagrama\n- **判定**：部分修正：π 採 11 位小數（非 13）；歸屬須註明「經後世學派文本轉述」。\n\n### 8. 「微積分」中文譯名：李善蘭與偉烈亞力《代微積拾級》\n- **事實**：1859 年，李善蘭（1811–1882）與英國傳教士偉烈亞力（Alexander Wylie）合譯美國 Elias Loomis 的《Elements of Analytical Geometry and of the Differential and Integral Calculus》（1850），中譯名《代微積拾級》，由上海墨海書館刊行——東亞第一本微積分教科書。書名意指「代（數幾何）、微（分）、積（分），拾級而上」。「微分」「積分」二詞即出自此譯本，李善蘭並創譯代數、常數、變數、函數、係數、級數、切線、法線、漸近線等沿用至今的術語。\n- **來源**：https://highscope.ch.ntu.edu.tw/wordpress/?p=25200 ；https://zh.wikipedia.org/zh-tw/%E6%9D%8E%E5%96%84%E5%85%B0\n- **判定**：確認。\n\n---\n\n## B. 牛頓、萊布尼茲與優先權之爭\n\n### 9. 牛頓的瘟疫年與《Principia》\n- **事實**：1665–66 年倫敦大瘟疫期間劍橋關閉，牛頓回到 Woolsthorpe 老家，在這段「奇蹟年」（anni mirabiles）發展出流數法（method of fluxions）的核心想法（1666 年 10 月寫成私人短論，即 October 1666 tract），同期完成光學實驗與重力思考的起點。系統性論文《De Methodis Serierum et Fluxionum》完成於 1671 年，但生前未出版（英譯本《Method of Fluxions》遲至 1736 年身後刊行）。《Philosophiæ Naturalis Principia Mathematica》出版於 1687 年。\n- **來源**：https://en.wikipedia.org/wiki/Method_of_Fluxions ；https://en.wikipedia.org/wiki/Early_life_of_Isaac_Newton\n- **判定**：確認（注意：流數法 1665–66 發展、1671 成稿、1736 才出版的時間差是優先權之爭的火種）。\n\n### 10. 萊布尼茲的記號與第一篇論文\n- **事實**：萊布尼茲於 **1675 年 10 月 29 日**的手稿《Analyseos tetragonisticae pars secunda》首次使用積分號 ∫（取自拉丁文 summa 的長 s）；同年 **11 月 11 日**的手稿首次寫出 ∫ 與 dx 連用的形式。第一篇公開發表的微分學論文是 1684 年刊於《Acta Eruditorum》的〈Nova Methodus pro Maximis et Minimis〉（d 記號首次印行）；∫ 記號首次印行則在 1686 年的〈De Geometria Recondita〉。\n- **來源**：https://en.wikipedia.org/wiki/Leibniz%27s_notation ；https://en.wikipedia.org/wiki/Integral_symbol ；https://mathshistory.st-andrews.ac.uk/Miller/mathsym/calculus/\n- **判定**：確認（補充印行年份：d 記號 1684、∫ 記號 1686 才見於出版品）。\n\n### 11. FTC 的先驅：Gregory 與 Barrow\n- **事實**：微積分基本定理（FTC）的幾何版先驅有二：**James Gregory**（1638–1675）在 1668 年《Geometriae pars universalis》發表第一個**公開出版**的初步幾何形式；**Isaac Barrow**（1630–1677）約 1670 年在《Lectiones Geometricae》給出更一般的幾何版證明。兩者皆以幾何語言包裝，掩蓋了計算上的威力；把 FTC 變成演算工具並建立完整體系的是牛頓與萊布尼茲。學界標準說法即「Gregory 先發表、Barrow 更一般、牛頓與萊布尼茲完成」。**細緻化**：常稱 Barrow 是「牛頓的老師」——精確說法是 Barrow 是劍橋首任 Lucasian 教授、牛頓的前任與提攜者；正式的師生授業關係證據薄弱，書中宜用「前輩／提攜者」。\n- **來源**：https://en.wikipedia.org/wiki/Fundamental_theorem_of_calculus ；https://www.britannica.com/science/analysis-mathematics/Discovery-of-the-theorem ；https://arxiv.org/pdf/1111.6145\n- **判定**：確認（附細緻化：「Barrow＝牛頓的老師」是通俗簡化）。\n\n### 12. 優先權之爭與 Commercium Epistolicum\n- **事實**：萊布尼茲向皇家學會申訴後，時任會長的牛頓親自挑選一個全由己方支持者組成的委員會（無任何歐陸數學家），1712 年作成調查報告，年底以《Commercium Epistolicum》刊行，結論指萊布尼茲剽竊——而**報告實質上由牛頓本人起草與主導**，萊布尼茲從未獲答辯機會。牛頓其後又匿名在《Philosophical Transactions》發表吹捧該報告的書評（〈An Account of the Commercium Epistolicum〉，1715）。此為科學史上著名的裁判兼球員案例。\n- **來源**：https://www.historyofinformation.com/detail.php?id=1726 ；https://www.newtonproject.ox.ac.uk/view/texts/normalized/NATP00352 ；https://www.maths.tcd.ie/pub/HistMath/People/Newton/CommerciumAccount/\n- **判定**：確認。\n\n### 13. Berkeley《The Analyst》與「ghosts of departed quantities」\n- **事實**：George Berkeley《The Analyst; or, a Discourse Addressed to an Infidel Mathematician》出版於 1734 年。名句出自**第 XXXV 節**，原文：「And what are these Fluxions? The Velocities of evanescent Increments? And what are these same evanescent Increments? They are neither finite Quantities nor Quantities infinitely small, nor yet nothing. May we not call them the Ghosts of departed Quantities?」——矛頭針對牛頓流數法中「消逝增量」（evanescent increments）的邏輯地位。此書刺激了後續使分析嚴格化的努力（Maclaurin 等）。\n- **來源**：https://en.wikipedia.org/wiki/The_Analyst ；https://old.maa.org/press/periodicals/convergence/mathematical-treasure-george-berkeleys-the-analyst\n- **判定**：確認（引用原句以本檔為準，出處標 §XXXV）。\n\n---\n\n## C. 十八～十九世紀：擴張與嚴格化\n\n### 14. Euler：Basel 問題與 Euler 公式\n- **事實**：Euler 解出 Basel 問題（Σ1/n² = π²/6）於 1734 年，1735 年 12 月 5 日在聖彼得堡科學院宣讀；論文〈De summis serierum reciprocarum〉（編號 E41）刊於院刊《Commentarii》第 7 卷（卷標 1734/35，實際印行 1740）——引用時寫「1734/1735」最穩。Euler 公式 e^{iθ} = cos θ + i sin θ 的系統性表述出自《Introductio in analysin infinitorum》（1748，兩卷）。**細緻化**：等價的對數形式更早見於 Roger Cotes（1714），Euler 的貢獻是指數形式與系統運用。\n- **來源**：https://en.wikipedia.org/wiki/Basel_problem ；https://scholarlycommons.pacific.edu/cgi/viewcontent.cgi?article=1032&context=euleriana ；https://www.ams.org/journals/bull/2007-44-04/S0273-0979-07-01183-4/S0273-0979-07-01183-4.pdf\n- **判定**：確認。\n\n### 15. Grandi 級數與「上帝創世」\n- **事實**：義大利數學家暨修士 Guido Grandi（1671–1742）在 1703 年《Quadratura circoli et hyperbolae》提出 1 − 1 + 1 − 1 + …：不同加括號方式可得 0 或 1，他以此論證「從無中創造（creatio ex nihilo）完全可信」——這是有文獻的真實論述，非後人杜撰。Grandi 本人認為該級數「真值」是 1/2。\n- **來源**：https://en.wikipedia.org/wiki/Grandi%27s_series ；https://en.wikipedia.org/wiki/History_of_Grandi%27s_series\n- **判定**：確認。\n\n### 16. Fourier → Dirichlet → Cantor 的史線\n- **事實**：Fourier 於 **1807 年 12 月 21 日**向法蘭西科學院（Institut de France）提交熱傳導備忘錄《Mémoire sur la propagation de la chaleur dans les corps solides》；Laplace、Monge 等人傾向刊行，但 **Lagrange 反對**（主因是三角級數的處理方式），論文未獲出版。1811 年科學院以熱傳導為題懸賞，Fourier 修訂稿得獎但被批不夠嚴格。1822 年（Lagrange 已歿）出版《Théorie analytique de la chaleur》。**Dirichlet 1829** 年在 Crelle 期刊（Journal für die reine und angewandte Mathematik 第 4 卷，頁 157–169）發表〈Sur la convergence des séries trigonométriques…〉，給出第一個嚴格的傅立葉級數收斂定理。其後 Heine 向 Cantor 提出三角級數表示的唯一性問題（Dirichlet、Riemann 等人未能解決），Cantor 於 1870 年證出唯一性、1870–72 年系列論文中為處理例外點集而引入點集概念——**「傅立葉級數的收斂與唯一性問題催生嚴格分析、並直接引出 Cantor 集合論」是有據可查的標準史線**。\n- **來源**：https://en.wikipedia.org/wiki/Joseph_Fourier ；https://www.scirp.org/reference/referencespapers?referenceid=2329205 ；https://mathshistory.st-andrews.ac.uk/Biographies/Cantor/ ；https://www.pma.caltech.edu/documents/5627/uniqueness.pdf\n- **判定**：確認。\n\n### 17. Cauchy《Cours d'analyse》與 ε-δ\n- **事實**：Cauchy《Cours d'analyse》（1821）以極限概念定義連續與收斂，把分析建立在極限之上；其證明中已出現 ε 型論證（Grabiner 的考據）。但**定義本身**是用「無窮小增量產生無窮小變化」的語言寫的，不是現代符號化的 ε-δ；今天教科書形式的 ε-δ 定義標準歸於 **Weierstrass**（1861 年柏林講義起）及其學派的系統化。更早 Bolzano（1817）已有嚴格定義但流傳極少。學界對「Cauchy 到底多現代」有持續辯論（Grabiner vs. Borovik–Katz 等），本書採折衷標準說法：**觀念奠基在 Cauchy，符號化與系統化在 Weierstrass 學派**。\n- **來源**：http://amsi.org.au/ESA_Senior_Years/SeniorTopic3/3a/3a_4history_4.html ；https://arxiv.org/pdf/1108.2885 ；https://arxiv.org/pdf/1502.06942\n- **判定**：確認（claim 原表述即為學界折衷說法，可直接使用）。\n\n### 18. Weierstrass 怪獸函數\n- **事實**：f(x) = Σ aⁿ cos(bⁿπx)。Weierstrass 於 **1872 年 7 月 18 日**在柏林的皇家普魯士科學院宣讀；本人當時未出版，**首次印行是 du Bois-Reymond 1875 年**刊於 Crelle 期刊第 79 卷（頁 21–37）的論文〈Versuch einer Classification der willkürlichen Functionen reeller Argumente…〉。原始條件：0 < a < 1、b 為正奇數、ab > 1 + 3π/2（滿足條件的最小 b 是 7）。**Hardy 1916**（Trans. AMS 17，〈Weierstrass's non-differentiable function〉）放寬為 0 < a < 1、ab ≥ 1，且 **b 不必是奇數或整數**。\n- **來源**：https://en.wikipedia.org/wiki/Weierstrass_function ；https://www.ams.org/journals/tran/1916-017-03/S0002-9947-1916-1501044-1/S0002-9947-1916-1501044-1.pdf ；https://mathshistory.st-andrews.ac.uk/Biographies/Du_Bois-Reymond/\n- **判定**：確認（全部條件數字照本檔）。\n\n### 19. Riemann 重排定理的出處\n- **事實**：條件收斂級數可重排至任意實數值（或發散）的定理，出自 Riemann 的教授資格論文（Habilitationsschrift）《Ueber die Darstellbarkeit einer Function durch eine trigonometrische Reihe》（**1854** 年提交哥廷根大學）；Riemann 1866 年病逝，論文由 Dedekind 安排於 **1867** 年身後出版。\n- **來源**：https://en.wikipedia.org/wiki/Riemann_series_theorem ；https://www.sciencedirect.com/science/article/abs/pii/B9780444508713501194\n- **判定**：確認。\n\n### 20. Dedekind cuts\n- **事實**：Dedekind《Stetigkeit und irrationale Zahlen》（連續性與無理數）出版於 **1872** 年，以「切割」（cut）從有理數構造實數，給出實數完備性（連續性）的算術化基礎。核心想法 Dedekind 自記成形於 1858 年 11 月 24 日（在蘇黎世教微積分時），擱置十四年後才出版。\n- **來源**：https://www.britannica.com/biography/Richard-Dedekind ；https://www.sciencedirect.com/science/article/pii/B9780444508713501248\n- **判定**：確認。\n\n### 21. 海王星：用微積分算出來的行星\n- **事實**：Le Verrier 以天王星軌道攝動反推未知行星，1846 年 8 月 31 日向法蘭西科學院提交預測位置，並去信柏林天文台的 Johann Galle；**1846 年 9 月 23 日當晚**，Galle 與 d'Arrest 在**距 Le Verrier 預測位置約 1° 之內**找到海王星，前後不到一小時。英國的 Adams 獨立做過類似計算，但其解多次變動，發現位置距其預測約 12°；現代科學史（尤其 1998 年皇家格林威治天文台檔案重見天日後）已下修 Adams 的「共同預測者」地位。「人類第一次用紙筆（攝動計算＝微積分）找到一顆行星」的敘事成立，精確度即「約 1°」。\n- **來源**：https://en.wikipedia.org/wiki/Discovery_of_Neptune ；https://www.aps.org/apsnews/2020/08/neptunes-existence-confirmed ；https://www.nasa.gov/history/175-years-ago-astronomers-discover-neptune-the-eighth-planet/\n- **判定**：確認（Adams 部分採保留表述）。\n\n### 22. Poincaré 與三體問題\n- **事實**：為瑞典國王 Oscar II 六十大壽（1889 年 1 月）設立的懸賞，Poincaré 以《Sur le problème des trois corps et les équations de la dynamique》獲獎。論文付印時，編輯 Phragmén 的提問讓 Poincaré 發現一個深層錯誤（誤以為不變曲線擬閉合、實則橫截相交），他自費回收重印——花費超過 2500 克朗的獎金。修正後約 270 頁的論文 **1890 年 12 月**刊於《Acta Mathematica》第 13 卷，其中對同宿交錯（homoclinic tangle）的描述是**動力系統混沌行為的第一次數學刻畫**。「微分方程寫得下、卻解不出（無一般封閉解，且對初值敏感）」的標準敘事由此而來。\n- **來源**：https://en.wikipedia.org/wiki/Poincar%C3%A9_and_the_Three-Body_Problem ；https://www.actamathematica.org/library/prize-competition/ ；https://www.mittag-leffler.se/about-us/history/prize-competition/\n- **判定**：確認。\n\n---\n\n## D. 二十世紀與現代\n\n### 23. Robinson 非標準分析\n- **事實**：Abraham Robinson 於 **1960** 年（普林斯頓研討會）提出非標準分析，1961 年發表同名論文，**1966** 年出版專著《Non-standard Analysis》——在超實數體系 ℝ* 上把無窮小建為嚴格的數學物件，距 Weierstrass 學派「驅逐」無窮小約一個世紀，常被稱為無窮小的嚴格平反。\n- **來源**：https://en.wikipedia.org/wiki/Nonstandard_analysis ；https://www.encyclopedia.com/science/encyclopedias-almanacs-transcripts-and-maps/resurrection-infinitesimals-abraham-robinson-and-nonstandard-analysis\n- **判定**：確認。\n\n### 24. 1 + 2 + 3 + … 「=」 −1/12 的正確脈絡\n- **事實**：級數 1+2+3+… 的部分和趨於無窮，**它發散，沒有傳統意義的和**。−1/12 是另一種「求和」意義下指派的值：ζ(s) 的解析延拓給出 ζ(−1) = −1/12，zeta 正規化與 Ramanujan 求和也指派同值（物理上用於弦論等）。**史實修正（常被講錯）**：「1+2+3+⋯ = −1/12 under my theory… you will at once point out to me the lunatic asylum as my goal」這段話出自 Ramanujan 給 Hardy 的**第二封信（1913 年 2 月 27 日）**，不是著名的第一封信（1913 年 1 月 16 日）；第一封信列出的是可詮釋為 ζ(−1)、ζ(−3) 的結果。書中引用須寫「=」是加引號的、並指明是解析延拓／正規化意義。\n- **來源**：https://en.wikipedia.org/wiki/1_%2B_2_%2B_3_%2B_4_%2B_%E2%8B%AF ；https://writings.stephenwolfram.com/2016/04/who-was-ramanujan/\n- **判定**：部分修正：名句出自第二封信（1913-02-27），非第一封。\n\n### 25. 布朗運動路徑幾乎處處不可微\n- **事實**：Wiener process（布朗運動的數學模型）的樣本路徑以機率 1 處處連續但**處處不可微**——首證為 Paley–Wiener–Zygmund 1933 年〈Notes on random functions〉（Math. Z. 37, 647–668）；現代教科書（Mörters–Peres《Brownian Motion》定理 1.27 等）皆收錄。亦即「自然界（的標準數學模型）真的長出怪獸函數」成立——注意措辭：不可微的是**數學模型的路徑**，物理布朗粒子在極小尺度另有物理。\n- **來源**：https://www.mi.uni-koeln.de/~moerters/book/book.pdf ；https://galton.uchicago.edu/~lalley/Courses/313/BrownianMotionCurrent.pdf\n- **判定**：確認。\n\n### 26. PID 控制器\n- **事實**：PID = proportional（比例，回應當下誤差）、integral（積分，累計過去誤差以消除穩態偏差）、derivative（微分，以誤差變化率預測未來、抑制震盪）。\n- **來源**：https://www.crystalinstruments.com/blog/2020/8/23/pid-control-theory ；https://apmonitor.com/pdc/index.php/Main/ProportionalIntegralDerivative\n- **判定**：確認。\n\n### 27. 梯度下降與反向傳播\n- **事實**：梯度下降（最速下降法）歸於 **Cauchy 1847** 年短文〈Méthode générale pour la résolution des systèmes d'équations simultanées〉（Comptes Rendus）。反向傳播在數學上就是多層複合函數的 chain rule 反向應用；**Rumelhart–Hinton–Williams 1986** 年 Nature 論文〈Learning representations by back-propagating errors〉（323: 533–536）**使之普及**——「普及」措辭正確且必要，因為反向模式自動微分更早已有（Linnainmaa 1970、Werbos 1974）。\n- **來源**：https://en.wikipedia.org/wiki/Gradient_descent ；https://www.nature.com/articles/323533a0\n- **判定**：確認（保留「普及」而非「發明」的措辭）。\n\n### 28. 數值微分的步長困境\n- **事實**：浮點運算下，前向差分 (f(x+h)−f(x))/h 的總誤差 ≈ 截斷誤差 O(h) ＋ 捨入誤差 O(ε/h)（ε 為 machine epsilon，雙精度 ≈ 2.2×10⁻¹⁶）；h 太小時相近數相減發生災難性消去。最小化 h/2·M + 2ε/h 得最適 h ~ **√ε 量級**（雙精度 ≈ 10⁻⁸）。中央差分截斷誤差 O(h²)，最適 h ~ **ε^{1/3} 量級**（≈ 6×10⁻⁶）。此為標準數值分析結論。**本檔自行複核**：對 e(h) = h/2 + 2ε/h 求導置零得 h* = 2√ε ✓；對 e(h) = ε/h + h²/6 得 h* = (3ε)^{1/3} ✓。\n- **來源**：https://en.wikipedia.org/wiki/Numerical_differentiation ；https://docs.sciml.ai/FiniteDiff/dev/epsilons/\n- **判定**：確認（含本檔自行複核）。\n\n---\n\n## E. 延伸閱讀資源（2026-06 連結現況）\n\n### 29. 3Blue1Brown《Essence of Calculus》\n- 官網系列頁：https://www.3blue1brown.com/lessons/essence-of-calculus/ （存在）；YouTube 播放清單：https://www.youtube.com/playlist?list=PLZHQObOWTQDMsr9K-rj53DwVRMYO3t5Yr （存在）。視覺直觀、以「讓你覺得自己能發明微積分」為目標。\n- **判定**：確認。\n\n### 30. MIT OCW 18.01 Single Variable Calculus\n- 現行課程頁（含 2007 年 Jerison 錄影的經典版）：https://ocw.mit.edu/courses/18-01-single-variable-calculus-fall-2006/ ；較新版本：https://ocw.mit.edu/courses/18-01-calculus-i-single-variable-calculus-fall-2020/ 。\n- **判定**：確認。\n\n### 31. Steven Strogatz《Infinite Powers》（2019）\n- 原書：Houghton Mifflin Harcourt，2019-04-02。**有繁體中文譯本**：《無限的力量：這個世界表面上看似混亂且不講理，但其最深處卻是合乎邏輯，並且確實遵守著一條條的數學定律》，黃駿譯，旗標出版，2020-09，ISBN 9789863126348。\n- 來源：https://www.books.com.tw/products/0010867735 ；https://www.tenlong.com.tw/products/9789863126348\n- **判定**：確認（繁中譯名《無限的力量》）。\n\n### 32. Spivak《Calculus》第 4 版；Apostol《Calculus》\n- Spivak《Calculus》4th ed.（Publish or Perish，2008，ISBN 9780914098911；官方頁 https://mathpop.com/products/calculus-4th-edition ）——**定位**：證明導向微積分的標竿，「對嚴格性的初次正面相遇」。Apostol《Calculus》兩卷（Wiley，2nd ed. 1967/1969；https://en.wikipedia.org/wiki/Calculus_(Apostol_books) ）——**定位**：理論與技巧並重、先積分後微分的 Caltech 傳統教本。\n- **判定**：確認。\n\n### 33. Dunham《The Calculus Gallery》；Bressoud《Calculus Reordered》\n- Dunham《The Calculus Gallery: Masterpieces from Newton to Lebesgue》（Princeton UP；平裝頁 https://press.princeton.edu/books/pap
