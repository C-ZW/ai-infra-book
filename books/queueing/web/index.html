與 Chapman–Kolmogorov\n\n把所有 P(i→j) 排成矩陣 P，第 i 列是「從 i 出發、下一步去哪」的分布，所以每列加總為 1。如果 μₙ 是時刻 n 的分布（橫向量），那 μₙ₊₁ = μₙP——機率向量擺左邊，因為矩陣的「列」才是條件分布。\n\nn 步轉移機率記 P^(n)(i→j) = P(Xₙ = j | X₀ = i)。它滿足 **Chapman–Kolmogorov 方程**（完整推導）：\n\n```text\nP^(m+n)(i→j)\n  = Σₖ P(Xₘ = k | X₀ = i) · P(Xₘ₊ₙ = j | Xₘ = k, X₀ = i)   ← 全機率定理：以第 m 步的位置分案\n  = Σₖ P(Xₘ = k | X₀ = i) · P(Xₘ₊ₙ = j | Xₘ = k)            ← Markov 性質：給定 Xₘ，X₀ 是廢話\n  = Σₖ P^(m)(i→k) · P^(n)(k→j)                              ← 時間齊次：只看步數差\n```\n\n這正是矩陣乘法的定義，所以 P^(n) 就是矩陣冪 Pⁿ。先說清楚：這個事實在本章只當**記帳工具**——我們不會去算任何矩陣的冪，更不會碰特徵值。C-K 的實戰價值是那句口訣：「算多步轉移，就對中繼點分案」，這招在 ch07 推 CTMC、ch11 玩時間反轉時會一再出現。\n\n實務上 P 從哪來？兩條路。一條是**從機制寫下來**：跳閘門檻、探測成功率這些你設定或量測得到的量，直接化成轉移機率——下一節的 worked example 走這條。另一條是**從 log 數出來**：把軌跡切成一步步，P(i→j) 用「觀測到 i→j 的次數 ÷ 離開 i 的總次數」估。第二條路有個安靜的坑：樣本少的狀態（一個月才進兩次的 open）估出來的那一列噪音極大，而 π 偏偏對稀有狀態的轉移機率很敏感——這是工程裡「模型看起來科學、數字其實是擲筊」的常見來源。\n\n## 狀態分類：chain 的病理學\n\n不是每個 chain 都有「唯一且可信的長期比例」。病有三種，每種都有工程長相。\n\n先要兩個詞：j 從 i **可達**，若存在 n 使 P^(n)(i→j) > 0；i、j **互通**，若彼此可達。互通把狀態空間切成幾個等價類。整條 chain 只有一個類，叫**不可約（irreducible）**——任兩狀態互相走得到。\n\n| 病態 | 一句話定義 | 工程長相 | 它弄壞什麼 |\n|---|---|---|---|\n| 可約（reducible） | 存在回不去的狀態或吸收類 | 部署狀態機裡 bricked 的終態；毒訊息進了 DLQ 不再回流；洩漏掉的 worker 只能重啟 | 平穩分布不唯一，長期行為依起點而異；「算出一個 π」可能只是其中一個 |\n| 週期（periodic） | 回到自己只可能在某個 d > 1 的倍數步 | 兩個服務嚴格輪替互呼叫；ping-pong 同步協定 | 分布 P(Xₙ = j) 永遠振盪不收斂（但時間平均仍然收斂，見下文） |\n| 暫態（transient） | 離開後以機率 1 不再回來 | 有限空間：暖機／初始化狀態，過了就不回頭；無限空間：過載佇列的長度一路向右漂 | 長期佔比為 0；無限狀態時可能連平穩分布都不存在 |\n\n正式定義：狀態 i 的週期是 {n : P^(n)(i→i) > 0} 的最大公因數 d；d = 1 叫**非週期（aperiodic）**。有 self-loop（P(i→i) > 0）的狀態自動非週期，這是工程模型裡週期病罕見的原因——但「罕見」不等於「不會」，紙上推演第 4 題就是一個。狀態 i 是**常返（recurrent）**，若從 i 出發以機率 1 回到 i；否則**暫態（transient）**。有限不可約 chain 的所有狀態都常返——跑不掉、又到處去得了，遲早回來（這句是工程師的嚴謹：有限狀態下總有狀態被造訪無限多次，不可約性再把這個性質傳染給全部狀態）。\n\n無限狀態空間多一層陰影：常返還分「平均回返時間有限」（正常返）與「會回來、但平均要等無限久」（零常返）。直覺版、本書不證：佇列在 ρ = 1 的臨界點上得的正是零常返這種病——必定會再排空，但平均排空時間無限（見 ch08）。本章接下來一律假設**有限**狀態空間，無限的留給 ch07 用 ergodicity 條件處理。\n\n## 平穩分布：解 π = πP 只需要代入消去\n\n分布 π 是**平穩分布（stationary distribution）**，若\n\n```text\nπ = πP，   Σⱼ πⱼ = 1，   πⱼ ≥ 0\n```\n\n逐分量讀：π_j = Σᵢ πᵢ·P(i→j)，每個狀態「流進來的機率」恰好補滿「此刻在這裡的機率」。π 有三種讀法，條件一個比一個強，後面兩節逐一兌現：\n\n1. **不動點**：X₀ ~ π 則永遠 Xₙ ~ π——系統「開機就在穩態」。這是定義，無條件。\n2. **極限分布**：不管從哪起步，P(Xₙ = j) → π_j。需要不可約＋非週期。\n3. **時間比例**：一條軌跡待在 j 的時間佔比 → π_j。需要不可約（不需非週期）。\n\n先安撫一件事，因為它擋住太多人：**解 π = πP 不需要任何矩陣代數，更不需要特徵值。**它就是 |S| 條一次方程（其中必有一條是多餘的——每列加總為 1 保證了這點）加上正規化條件 Σπ = 1。操作三步：挑好解的方程做代入消去、把每個 πⱼ 表成某一個變數的倍數、最後用 Σπ = 1 定刻度。你國高中就會了，生鏽的只是膽量。\n\n### Worked example：circuit breaker 的長期斷路比例\n\n把開場那個 breaker 變成具體模型。取 tick = 1 秒，三個狀態 C（closed）、O（open）、H（half-open）：\n\n- C：下游每秒有 5% 的機率讓失敗計數衝過門檻而跳閘（先把計數器粗化成一個機率，這筆帳「陷阱與防禦」第 1 條會回頭算）。\n- O：冷卻計時器幾何化——每秒 50% 機率到期進 H，平均冷卻 2 秒（真實系統是固定時長，這是近似，同樣記在陷阱第 1 條）。\n- H：送一個探測請求，60% 成功回 C，40% 失敗退回 O；一個 tick 內見分曉。\n\n```text\n              0.05\n   ┌─────┐ ─────────► ┌─────┐\n   │  C  │            │  O  │ ◄────┐\n   └─────┘            └─────┘      │\n      ▲                  │         │\n      │ 0.6              │ 0.5     │ 0.4\n      │                  ▼         │\n      │               ┌─────┐      │\n      └────────────── │  H  │ ─────┘\n                      └─────┘\n\n   (self-loop: C→C 0.95, O→O 0.5)\n```\n\n| 從＼到 | C | O | H |\n|---|---|---|---|\n| C | 0.95 | 0.05 | 0 |\n| O | 0 | 0.50 | 0.50 |\n| H | 0.60 | 0.40 | 0 |\n\n寫平穩方程（逐欄讀「流入」）：\n\n```text\nπ_C = 0.95·π_C + 0.60·π_H        … (1)\nπ_O = 0.05·π_C + 0.50·π_O + 0.40·π_H   … (2)\nπ_H = 0.50·π_O                   … (3)\n```\n\n代入消去，全程不准跳步：\n\n```text\n(1) ⇒ 0.05·π_C = 0.60·π_H  ⇒  π_C = 12·π_H\n(3) ⇒ π_O = 2·π_H\n正規化：π_C + π_O + π_H = 12·π_H + 2·π_H + π_H = 15·π_H = 1\n⇒ π_H = 1/15 ≈ 0.0667，π_O = 2/15 ≈ 0.133，π_C = 12/15 = 0.800\n```\n\n(2) 是被丟掉的「多餘」方程，正好拿來當第一道複核。**自我複核**——把 π 代回三條方程：\n\n```text\n(1)：0.95·(12/15) + 0.60·(1/15) = (11.4 + 0.6)/15 = 12/15 = π_C ✓\n(2)：0.05·(12/15) + 0.50·(2/15) + 0.40·(1/15) = (0.6 + 1 + 0.4)/15 = 2/15 = π_O ✓\n(3)：0.50·(2/15) = 1/15 = π_H ✓\n```\n\n**解讀**：長期而言這個 breaker 有 π_O ≈ 13.3% 的時間處於斷路、6.67% 在試探、80.0% 正常放行。順手再榨一個數字：穩態下跳閘的頻率是 π_C·0.05 = 0.0400 次/秒——平均每 25 秒跳閘一次。另一個有體感的讀法：時間佔比 = 訪問頻率 × 每次平均停留。幾何停留的平均是 1/(1−P(留在原地))：C 每次待 20 tick、O 待 2 tick、H 待 1 tick——C 佔比高是因為待得久，不是因為去得頻繁。\n\n**調一個參數**：把冷卻平均從 2 秒拉到 5 秒（O→O 改 0.8、O→H 改 0.2），其他不動。方程 (1) 沒變所以 π_C = 12·π_H 照舊；新 (3) 是 π_H = 0.2·π_O，即 π_O = 5·π_H；正規化 18·π_H = 1：\n\n```text\nπ = (12/18, 5/18, 1/18) ≈ (0.667, 0.278, 0.0556)\n複核 (2)：0.05·(12/18) + 0.80·(5/18) + 0.40·(1/18) = (0.6 + 4 + 0.4)/18 = 5/18 ✓\n```\n\n斷路比例從 13.3% 跳到 27.8%（×2.08），正常放行從 80.0% 掉到 66.7%。機制很清楚：每次進 O 待 2.5 倍久，而進 O 的頻率只略降（流入 O 的速率從 0.0667/tick 變 0.0556/tick；乘上平均停留 2 與 5，恰好回得出 0.133 與 0.278——又一道複核）。這是好是壞，數學不替你決定：如果下游真的病著（探測只有六成成功），多待在 O 正是 breaker 的本職——少放請求過去煩它；如果失敗只是瞬時抖動，這 27.8% 就是你白白吃掉的可用性。模型只負責把代價算清楚。\n\n## 存在、唯一、收斂：什麼時候可以信 π\n\n剛才那組數字值多少信任？答案是這條定理（**工程師的嚴謹：精確敘述＋直覺，完整證明指路延伸閱讀**）：\n\n> **定理**：有限、不可約的 Markov chain 存在唯一平穩分布 π，且每個 πⱼ > 0。若再加上非週期，則對任何起點 i、任何狀態 j，P(Xₙ = j | X₀ = i) → πⱼ，而且收斂速度是幾何的（誤差以某個 rⁿ、r < 1 衰減）。\n\n三個條件各買一樣東西：**有限**買存在（機率跑不掉）、**不可約**買唯一（只有一個迴路系統，沒有「看你出生在哪」的歧義）、**非週期**買收斂（分布不再振盪）。breaker chain 三項全過：互通（C→O→H→C 一圈）、C 有 self-loop 所以非週期，於是那個 13.3% 既唯一、又是任何起點的極限。\n\n收斂為什麼成立？**耦合（coupling）直覺**（直覺版，本書不證）：開兩條獨立的 chain，一條從你指定的起點出發，一條直接從 π 出發（所以它每一步的分布都恰好是 π）。兩條各走各的，直到第一次落在同一個狀態——稱那一刻為 τ。從 τ 起讓兩條黏在一起走同一條路；黏合不改變任何一條的邊際分布，因為每一步依然照 P 轉移。於是 Xₙ 的分布與 π 的差距至多是 P(τ > n)：兩條還沒相遇，才有機會不同。剩下的工作是證明有限＋不可約＋非週期保證 P(τ > n) → 0，而非週期性正是在這一步出力——想像週期 2 的 ping-pong，兩條 chain 若起步異相，一條在偶數位、一條在奇數位，永遠擦肩而過。被我掃進地毯下的是「兩條獨立 chain 構成的乘積 chain 仍不可約」這個非平凡引理，完整版見 Levin–Peres–Wilmer 第 4–5 章。\n\n順帶一句：線性代數路線（Perron–Frobenius 定理）也能到同一個地方，但本書一次都不會用到它。\n\n## Balance equations：把 π 讀成機率流量守恆\n\nπ = πP 還有第三種身分，是全書接下來最常用的那種。從第 j 條方程出發（完整推導）：\n\n```text\nπ_j = Σᵢ πᵢ·P(i→j)                                ← π = πP 的第 j 條\nπ_j · Σₖ P(j→k) = Σᵢ πᵢ·P(i→j)                    ← 左邊乘 Σₖ P(j→k) = 1（每列加總為 1）\nπ_j · Σ_{k≠j} P(j→k) = Σ_{i≠j} πᵢ·P(i→j)          ← 兩邊同減 π_j·P(j→j)\n└── 流出 j 的機率流 ──┘  └── 流入 j 的機率流 ──┘\n```\n\n把 πᵢ·P(i→j) 想成穩態下「單位時間從 i 流向 j 的機率流量」，這條式子說：**穩態 = 每個狀態的流入等於流出**。這不是比喻，是 π = πP 的逐字翻譯。\n\n守恆不只逐狀態成立，**對任何切割（cut）都成立**：取狀態集合 A，把每個 j ∈ A 的收支平衡加總，A 內部互流的項在兩邊同時出現、互相抵銷，剩下跨界的：\n\n```text\nΣ_{j∈A} Σ_{k∉A} π_j·P(j→k)  =  Σ_{i∉A} Σ_{j∈A} πᵢ·P(i→j)\n└──── A 流出去的總流量 ────┘   └──── 流進 A 的總流量 ────┘\n```\n\n拿 breaker 驗收。切 {C} 對 {O, H}：跨界只有 C→O（流出）與 H→C（流入）：\n\n```text\n            π_C·0.05 = 0.0400\n          ─────────────────────►\n   ┌───────┐                     ┌──────────┐\n   │  {C}  │                     │  {O, H}  │\n   └───────┘                     └──────────┘\n          ◄─────────────────────\n            π_H·0.60 = 0.0400   ✓\n```\n\n一條 cut 直接給出 π_C = 12·π_H——跟代入消去得到的第一條等式一模一樣，但這次它有物理意義：跳閘的頻率必須等於修復的頻率，否則機率會在某一側堆積，就不是穩態。這個讀法在 ch07 會變成主力武器：生滅過程的狀態排成一條線，在 n 與 n+1 之間下一刀，每刀恰好給一條方程，πₙ 的通解就這樣一路切出來（見 ch07）。\n\n## Ergodic 定理：時間平均＝期望\n\n還欠一個兌現：監控面板上「breaker 處於 open 的時間佔比」是**一條軌跡的時間平均**，憑什麼等於 π_O 這個**跨平行宇宙的機率**？\n\n> **遍歷定理（ergodic theorem）**（工程師的嚴謹：敘述）：有限、不可約的 Markov chain，對任何函數 f 與任何起點，(1/N)·Σₙ₌₁..N f(Xₙ) → Σⱼ πⱼ·f(j) 以機率 1 成立。取 f 為「在狀態 j」的 indicator，就得到：待在 j 的時間佔比 → πⱼ。\n\n注意條件裡**沒有非週期**：ping-pong chain 的分布永遠振盪，但時間平均乖乖收斂到 (1/2, 1/2)。「分布收斂」與「時間平均收斂」是兩件事，後者便宜得多。\n\n直覺版（本書不證，循環論證的嚴格版見 Harchol-Balter 第 9 章）：每次回到狀態 j，Markov 性質讓 chain 在機率意義上「重新開始」——歷史被吃掉了，從 j 再出發的未來與上一次從 j 出發的未來同分布且獨立。整條軌跡於是被切成一段段獨立同分布的「循環」，對循環用大數法則，時間平均就釘在期望上。\n\n這條定理是兩張執照。**監控的執照**：你看一週的 open 佔比來估 π_O，合法——前提是這一週裡 P 沒變（陷阱第 5 條）。**模擬的執照**：跑一條夠長的軌跡、取時間平均，就能估任何 Σπⱼf(j)，不必跑一萬條平行軌跡（見 ch19）——但「夠長是多長」「誤差條怎麼畫」是 ch19 整章的主題，這裡先別樂觀。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與察覺 |\n|---|---|---|\n| 畫得出狀態圖 ≠ Markov chain | 轉移由計數器或固定計時器驅動（連續 5 次失敗、冷卻固定 30 秒）時，停留時間不是幾何分布。幾何近似平均對了、分布形狀錯了：固定 30 秒冷卻絕不會出現 1 秒就回來的樣本，幾何模型卻說有 ≈3% 機率（tick=1s、平均 30）——依賴停留分布的結論（如逾時內恢復的機率）會整段作廢 | 把計數器與計時器折進狀態：closed₀…closed₄、open 剩 k tick。狀態空間變大，但 Markov 性質是擴狀態換來的，不是狀態圖送的 |\n| 可約 chain 硬解 π | 有吸收類時平穩分布不唯一，你解出的「π」只是其中一個；模擬結果依起點漂移 | 先檢查互通性。發現吸收態，先問「這是 bug 還是 feature」：是終態就改問吸收機率與吸收時間（不同的方程組），不是就修模型 |\n| 週期 chain 等分布收斂 | P(Xₙ = j) 永遠振盪；照固定相位取樣的指標會 alias 出鬼影 | 時間平均仍收斂到 π，照用；要分布收斂就加一點 self-loop（lazy 化），π 不變（推演第 4 題） |\n| 拿 π 回答 transient 問題 | π 是長期比例，對「多久第一次斷路」「事故後多久回穩」一個字都沒說——那是首達時間（hitting time）與 mixing time 的領域 | 認清問題型態：長期比例找 π；首達時間另解一組線性方程（延伸閱讀 Norris、LPW），別硬掰 |\n| 時間齊次是個假設 | 真實流量有日夜週期，P(i→j) 在一天內變來變去；用全天資料估一個 P 解出的 π 是「不存在的平均日」 | 分時段估 P、分段平穩；尖峰另建模。徵兆：不同時窗估出的 P 差很多（ch05 非齊次 Poisson 的同款病） |\n\n## 紙上推演\n\n**1. [15 分鐘 ★★] 服務健康鏈。**某服務每分鐘觀測一次，狀態 {H 健康, D 降級, R 重啟中}，轉移矩陣：H→H 0.9、H→D 0.1；D→H 0.3、D→D 0.5、D→R 0.2；R→H 1.0。求平穩分布，並把解代回全部方程複核。長期有多少比例時間不健康？\n\n**2. [15 分鐘 ★★] 用 cut 解一條一維鏈。**worker 積壓量分四級 {0, 1, 2, 3}。每 tick：升一級機率 0.3（第 3 級不升）、降一級機率 0.5（第 0 級不降）、否則原地不動。用「相鄰兩級之間下一刀」的 cut 方程解 π，不要用代入消去硬碰整組方程。解完說一句：你看到了什麼結構？\n\n**3. [10 分鐘 ★★] 誰沒有唯一平穩分布？**三條 chain：(a) 本章的 breaker chain；(b) 三狀態 {S, A, F}，S→A 0.7、S→F 0.3、A→A 1、F→F 1；(c) 兩狀態 ping-pong，A→B 機率 1、B→A 機率 1。哪一條沒有唯一平穩分布？為什麼？另外兩條各有什麼毛病或沒毛病？\n\n**4. [10 分鐘 ★★★] 週期性陷阱。**對 (c) 的 ping-pong：從 A 出發，寫出 P(Xₙ = A) 的數列；它收斂嗎？時間平均收斂嗎？這跟收斂定理矛盾嗎？最後：把兩個狀態各加 0.1 的 self-loop（其餘機率等比例縮成 0.9），驗證 π 不變，並說明為什麼「lazy 化」永遠不動 π。\n\n### 推演解答\n\n**1.** 平穩方程（逐欄流入）：\n\n```text\nπ_H = 0.9·π_H + 0.3·π_D + 1.0·π_R   … (1)\nπ_D = 0.1·π_H + 0.5·π_D             … (2)\nπ_R = 0.2·π_D                       … (3)\n(2) ⇒ 0.5·π_D = 0.1·π_H ⇒ π_D = 0.2·π_H\n(3) ⇒ π_R = 0.2·(0.2·π_H) = 0.04·π_H\n正規化：π_H·(1 + 0.2 + 0.04) = 1 ⇒ π_H = 25/31 ≈ 0.806\nπ_D = 5/31 ≈ 0.161，π_R = 1/31 ≈ 0.0323\n```\n\n複核 (1)：0.9·(25/31) + 0.3·(5/31) + 1/31 = (22.5 + 1.5 + 1)/31 = 25/31 ✓；(2)：0.1·25/31 + 0.5·5/31 = 5/31 ✓；(3)：0.2·5/31 = 1/31 ✓。不健康比例 π_D + π_R = 6/31 ≈ 19.4%。常見錯路：把轉移矩陣「逐列」當方程抄（那是 P 的定義，不是 πP 的分量）；平穩方程要逐**欄**收集流入。\n\n**2.** 在第 i 級與第 i+1 級之間下刀，跨界只有「升」與「降」兩種流：\n\n```text\n0.3·πᵢ = 0.5·πᵢ₊₁   ⇒   πᵢ₊₁ = 0.6·πᵢ（i = 0, 1, 2）\n正規化：π₀·(1 + 0.6 + 0.36 + 0.216) = 2.176·π₀ = 1\n⇒ π = (125/272, 75/272, 45/272, 27/272) ≈ (0.460, 0.276, 0.165, 0.0993)\n```\n\n抽查第 1 級的完整收支當複核：流出 = π₁·(0.3+0.5) = 0.8·(75/272) = 60/272；流入 = π₀·0.3 + π₂·0.5 = 37.5/272 + 22.5/272 = 60/272 ✓。看到的結構：一維鏈上每刀一條方程、解成**幾何遞推** πᵢ₊₁ = (升率/降率)·πᵢ——這就是 ch07 生滅過程通解的全部骨架，ch08 的 πₙ = (1−ρ)ρⁿ 是它的直系後代。\n\n**3.** 沒有唯一平穩分布的是 **(b)**：A 與 F 是兩個吸收類，chain 可約。任何 (0, p, 1−p)（0 ≤ p ≤ 1）都滿足 π = πP——平穩分布有無限多個，「長期行為」取決於被哪個吸收類吃掉，正確的問題是吸收機率（此例從 S 出發 0.7 進 A）而不是 π。(a) 不可約＋非週期，唯一 π 且分布收斂，滿分。(c) 是陷阱選項：它**有**唯一平穩分布 π = (1/2, 1/2)——不可約就夠保唯一——它的毛病是週期 2 導致分布不收斂，那是第 4 題的事。把「沒有唯一 π」和「分布不收斂」混為一談，是本章最常見的概念事故。\n\n**4.** 從 A 出發：P(Xₙ = A) = 1, 0, 1, 0, …（n 偶為 1、奇為 0），不收斂。時間平均：前 N 步在 A 的比例是 ⌈N/2⌉/N → 1/2 = π_A，收斂。與定理不矛盾：分布收斂那條的前提含**非週期**，ping-pong 的週期是 2，前提不成立、定理沒有承諾。lazy 化驗證：新矩陣 A→A 0.1、A→B 0.9（B 對稱），檢查 π = (1/2, 1/2)：0.5·0.1 + 0.5·0.9 = 0.5 ✓。一般論證：lazy 化把 P 換成 (I + P)/2 一類的混合，而 π 同時滿足 π = πI 與 π = πP，所以也滿足任何兩者的加權平均——self-loop 破壞週期、卻動不了 π。代價是收斂變慢一倍量級：用模擬的眼光看，這是用時間換對齊。\n\n## 自我檢核\n\n口頭回答，講不清楚就回去重讀對應小節：\n\n1. 「狀態吃掉歷史」在說什麼？為什麼說 Markov 性質是你「選」出來的、不是系統天生的？舉一個必須擴狀態的工程例子。\n2. π = πP 的三種讀法（不動點／極限分布／時間比例）各需要什麼條件？哪兩條定理把後兩種讀法兌現？\n3. 為什麼解 π 不需要特徵值？實際操作的三步是什麼？多餘的那條方程拿來做什麼最划算？\n4. 用機率流量的語言重講 cut 守恆是怎麼從 π = πP 推出來的，以及它為什麼會是 ch07 生滅過程的引擎。\n5. 週期 chain 的分布收斂嗎？時間平均收斂嗎？為什麼這兩件事可以分家？\n6. 耦合論證的骨架是什麼？有限、不可約、非週期三個條件各在哪一步出力？\n7. 監控面板上「breaker open 時間佔比」這個指標偷用了哪條定理？什麼情況下這個指標會騙你（至少兩種）？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013) 第 8–9 章——第 8 章 DTMC 與本章同一條路線，第 9 章 Ergodicity Theory 把本章指路的存在性、收斂與遍歷定理證明補全；無免費 PDF，書頁有試讀與 errata：https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Levin, Peres & Wilmer,《Markov Chains and Mixing Times》第二版（AMS）——耦合論證的完整版在第 4–5 章；想知道「收斂要多久」（mixing time），這是標準參考。作者頁提供全書免費 PDF（2026-06 驗證）：https://pages.uoregon.edu/dlevin/MARKOV/mcmt2e.pdf\n- J. R. Norris,《Markov Chains》(Cambridge)——第 1 章離散時間理論乾淨俐落，狀態分類、首達時間方程、收斂與遍歷定理一章打完；作者頁有部分章節免費預覽（2026-06 驗證）：https://www.statslab.cam.ac.uk/~james/Markov/\n- Martin Fowler, \"CircuitBreaker\"（2014-03-06）——breaker 模式的通行工程描述（模式本身由 Nygard《Release It!》普及）；對照它與本章模型，你會看到工程描述裡的計數器與固定計時器正是陷阱第 1 條：https://martinfowler.com/bliki/CircuitBreaker.html\n- MIT OCW 6.262《Discrete Stochastic Processes》（Gallager, Spring 2011）——finite-state Markov chains 的講座與習題解答齊全，想要比本章更嚴格一階的免費材料就是它：https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n- Brian Hayes, \"First Links in the Markov Chain\"（American Scientist）——Markov 1906 年為什麼發明這個東西（跟 Pushkin 的詩有關）的科普長文，當甜點：https://www.americanscientist.org/article/first-links-in-the-markov-chain\n"}, {"id": "ch07-ctmc-birth-death", "file": "ch07-ctmc-birth-death.md", "group": "Part III — 生滅與經典模型", "title": "ch07 — CTMC 與生滅過程：把引擎接上時間", "md": "# ch07 — CTMC 與生滅過程：把引擎接上時間\n\n> **本章解決什麼問題**：ch06 的引擎活在離散的 tick 裡，但真實系統的事件不照節拍器走——到達與完成發生在連續時間，用「速率」刻畫。本章把 ch04 的競賽引理（跳哪裡、停多久）與 ch06 的流量守恆（怎麼解 π）焊成一台機器：連續時間 Markov chain（CTMC）。然後專攻它最重要的一維特例——生滅過程：用「相鄰切一刀」推出通解 πₙ = π₀·Π(λᵢ/μᵢ₊₁)，並回答 ch01 留下的賒帳：什麼條件下穩態存在、什麼條件下佇列必然跑向無限。ch08 的 M/M/1 是這台機器的第一個客戶。\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke   ◄ 你在這裡\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步\n```\n\n## 從你已知的出發\n\n打開你的監控面板，看那條 active connections 曲線：3,200 條 WebSocket 連線不是一次到位的，它是一條每次只動 ±1 的鋸齒——有人連上（+1）、有人斷線（−1）。autoscaling 也一樣：instance 數量 scale-up 一台、scale-down 一台，永遠在一條整數軸上左右移動。這類「狀態排成一直線、每步只能去隔壁」的系統，本章給它名字：生滅過程（birth-death process）。生＝+1、滅＝−1，如此而已。\n\n但先得處理一個更基本的尷尬。ch06 的 Markov chain 按 tick 走，而你的系統沒有 tick——訊息不會「每 100 ms 整點檢查一次要不要到達」，它想來就來。ch06 那種「升一級機率 0.3」的講法，放到連續時間會變成「多小的時間窗算一步？」這種沒有好答案的問題。出路你其實已經拿在手上：ch04 的指數碼錶。把狀態機的每條箭頭從「機率」換成「速率」——每條出邊掛一顆獨立的指數碼錶，先響的那顆決定跳去哪。ch04 結尾說競賽引理是「CTMC 的引擎」，本章就是交車的日子：rate diagram（速率圖）不過是你畫了十年的狀態轉移圖，把箭頭上的標籤從機率換成每秒幾次。\n\n值得先把投資報酬講清楚：接下來五章的所有模型——M/M/1（ch08）、M/M/c 與 Erlang 公式（ch09）、有限容量的 M/M/1/K（ch10）——**全部是同一張生滅圖換參數**。M/M/1 是 λₙ、μₙ 全為常數；M/M/c 是 μₙ = min(n, c)·μ；M/M/1/K 是把鏈鋸短。本章推一次通解，後面五章每章只需要代入自己的 λₙ、μₙ 然後算級數。學一次、用五章，這是全書槓桿最高的一筆推導。\n\n本章的路線：先組裝 CTMC 並把 ch06 的 balance equations 升級到連續時間；再切到生滅過程，證明「相鄰 cut 流量守恆」在一維結構下與 global balance 等價；用它推出全體生滅過程的通解；最後回答存在性——正規化級數收斂與否，就是你的系統有沒有穩態的分界線。\n\n## CTMC：狀態機掛上指數碼錶\n\n**定義（建構式）**：一個連續時間 Markov chain 由狀態空間 S 與一組速率 q(i→j) ≥ 0（i ≠ j）組成。過程進入狀態 i 時，每條出邊 j 各啟動一顆**獨立**的指數碼錶 ~ Exp(q(i→j))，先響者勝：過程跳到勝者指向的狀態，一切重新開始。\n\nch04 的三條競賽引理立刻把這個定義拆成可計算的零件。記 qᵢ = Σⱼ q(i→j) 為狀態 i 的總出速率：\n\n```text\n停留時間：min 引理 ⇒ 在 i 停留 ~ Exp(qᵢ)，平均 1/qᵢ\n跳去哪裡：勝者引理 ⇒ P(跳到 j) = q(i→j)/qᵢ\n獨立性  ：跳去哪裡與停了多久互相獨立\n        ⇒ CTMC = 一條「只記路徑」的離散鏈（jump chain）＋每站各自獨立的指數停留\n```\n\n第三條是整個結構成立的支點：沒有它，「停得久」會洩漏「接下來去哪」的資訊，狀態就不再吃掉歷史。而停留時間非指數不可，不是品味問題——Markov 性質要求「已經停了多久」不影響未來，這正是無記憶性，而 ch04 證過指數是連續分布中唯一的無記憶分布。反過來說，任何時間齊次、「給定現在、過去無資訊」的連續時間跳躍過程，停留時間必為指數、跳轉必由速率決定（工程師的嚴謹：敘述；完整證明見延伸閱讀 Norris 第 2 章）。\n\n速率的單位是「每單位時間幾次」，不是機率。q(i→j) = 3/s 的白話：待在 i 的期間，往 j 的這顆碼錶平均每 1/3 秒響一次；在一小段 δ 內它響的機率是 q(i→j)·δ + o(δ)（ch05 的 o(h) 語言）。速率可以大於 1，機率不行——這個單位差是陷阱表第 1 條的主角。\n\n拿一個具體的小機器練讀圖。一台推播 worker 有三個狀態：idle（等工作）、busy（處理中）、crashed（掛了等重啟）。到達速率 8/s、服務速率 10/s、處理中可能當掉（速率 0.02/s，數字灌水過好讓 π 看得見）、重啟速率 0.5/s：\n\n```text\n        ┌─────────── 10 (done) ───────────┐\n        ▼                                 │\n     (idle) ────── 8 (arrival) ──────► (busy)\n        ▲                                 │\n        │                                 │ 0.02 (crash)\n        │                                 ▼\n        └──── 0.5 (restart) ───────── (crashed)\n```\n\n競賽讀法：busy 有兩條出邊，停留 ~ Exp(10 + 0.02)、平均約 99.8 ms；每次離開時 P(完成) = 10/10.02、P(當掉) = 0.02/10.02 ≈ 0.002；而且「這單做得特別久」完全不增加當掉的嫌疑（引理三）。注意「出邊速率可以相加」的前提就是競賽引理的前提：各邊獨立、各自指數——這是建模假設，不是天上掉下來的。\n\n順手把記帳工具備好：把速率排成**生成矩陣（generator/Q matrix）**——非對角元 Q[i][j] = q(i→j)、對角元 Q[i][i] = −qᵢ，每列加總為 0（對照 DTMC 的 P 每列加總為 1）。它在本書只有一個用途：下一節的 balance equations 用矩陣寫就是 πQ = 0。瞬時分布的演化由 Kolmogorov 微分方程 dP(t)/dt = P(t)Q 描述，本書不解它（穩態邊界一節會交代為什麼敢不解）。\n\n## Global balance：流量守恆升級到連續時間\n\nCTMC 的平穩分布 π 跟 ch06 同一個靈魂：πⱼ 是長期下來待在狀態 j 的**時間佔比**。它滿足的方程，用 ch06 練好的「機率流量守恆」直接寫——把 πᵢ·q(i→j) 讀成穩態下從 i 流向 j 的機率流量：\n\n```text\nglobal balance：對每個狀態 j，\n    πⱼ·qⱼ = Σ_{i≠j} πᵢ·q(i→j)        （流出 j 的總流量 = 流入 j 的總流量）\n加上正規化 Σⱼ πⱼ = 1\n```\n\n為什麼是這組方程（工程師的嚴謹：每步能口頭說出理由）：取一段長度 T 的觀察窗。從 j 跳到 k 的次數 ≈（窗內待在 j 的總時間）× q(j→k) ≈ T·πⱼ·q(j→k)——前一個 ≈ 是遍歷定理把時間平均換成 πⱼ（ch06 發的執照），後一個是「待在 j 的每一秒，往 k 的碼錶以速率 q(j→k) 響」。而任何一條軌跡上，「進入 j 的次數」與「離開 j 的次數」最多差 1——每次離開前必先進入。兩邊除以 T、讓 T → ∞，差 1 被攤平，就得到流入＝流出。比 ch06 還乾淨：連續時間沒有 self-loop、沒有 P(j→j) 要扣。\n\nch06 的 cut 守恆原封不動地升級：把任何狀態集合 A 的逐狀態收支加總，內部互流對銷，得「流出 A 的總流量 = 流入 A 的總流量」。這把刀下一節要連砍無限刀。\n\n連續時間還白送一份禮：**沒有週期性問題**。DTMC 的 ping-pong 鏈分布永遠振盪（ch06 陷阱），但 CTMC 的停留時間是連續隨機變數，不可能鎖相——不可約且正常返的 CTMC，從任何起點，時刻 t 的分布都收斂到 π（敘述；證明見 Norris 第 3 章）。\n\n解 global balance 的手感跟 ch06 一樣是國中代數。拿 worker 三狀態機驗收（完整計算）：\n\n```text\ncrashed 收支：0.02·π_B = 0.5·π_C          ⇒ π_C = 0.04·π_B\nidle 收支   ：8·π_I = 10·π_B + 0.5·π_C    ⇒ 8·π_I = 10.02·π_B\n                                          ⇒ π_B = 0.798·π_I\n正規化      ：π_I·(1 + 0.798 + 0.0319) = 1\n⇒ π_I = 0.546、π_B = 0.436、π_C = 0.0174\n```\n\n長期約 1.74% 的時間掛著等重啟。複核 busy 的收支（解的時候沒用過這條，最佳的免費檢查）：流入 = 8·0.546 = 4.37，流出 = 10.02·0.436 = 4.37 ✓。\n\n一個馬上會咬人的區別先押在這裡：π 是**時間**佔比，不是**訪問次數**佔比。jump chain 只記「跳過哪些站」，它的平穩分布跟 π 差一個停留時間的加權（1/qᵢ）。模擬 CTMC 時數「到過幾次」估 π，會把停留短的狀態灌水——陷阱表第 2 條有數字。\n\n## 生滅過程：一維世界的 local balance\n\n**定義**：狀態空間 {0, 1, 2, …}，只允許 ±1 的轉移——狀態 n 的出生速率 λₙ（n → n+1）、死亡速率 μₙ（n → n−1，n ≥ 1）。這是本章主視覺，之後五章的所有模型都是往這張圖填不同的 λₙ、μₙ：\n\n```text\n        λ₀          λ₁          λ₂          λ₃\n     ──────►     ──────►     ──────►     ──────►\n  (0)        (1)         (2)         (3)         …\n     ◄──────     ◄──────     ◄──────     ◄──────\n        μ₁          μ₂          μ₃          μ₄\n```\n\n佇列翻譯：n＝系統內人數，出生＝到達、死亡＝完成。CTMC 建構在每個狀態 n ≥ 1 給兩顆碼錶賽跑：Exp(λₙ) 的到達 vs Exp(μₙ) 的完成；停留 ~ Exp(λₙ + μₙ)，下一步往右的機率 λₙ/(λₙ+μₙ)。本章假設所有 λₙ > 0、μₙ > 0（不可約：哪裡都到得了）。速率掛下標不是排場，是建模的全部自由度：到達會看臉色（rate limiting 把高積壓時的 λₙ 壓低）、服務會隨人數變（多開 worker 讓 μₙ 變大、資源競爭讓它變小），全都收在這兩串數字裡。\n\n在 n 與 n+1 之間下一刀。這一刀只切過**兩條邊**——λₙ 往右、μₙ₊₁ 往左，cut 守恆直接給：\n\n```text\nlocal balance：πₙ·λₙ = πₙ₊₁·μₙ₊₁        （每對相鄰狀態，右流 = 左流）\n```\n\n這叫 local balance（逐邊平衡），比 global balance（逐狀態平衡）強得多——它說的不只是每個狀態收支平衡，而是**每一條邊上的兩個方向各自抵銷**。一般的 chain 沒有這種好事，但一維結構免費奉送。兩個方向都值得親手走一遍。\n\n**local ⇒ global**：狀態 n 的 global balance 恰好是左右兩條 cut 方程相加——(λₙ+μₙ)πₙ = λₙ₋₁πₙ₋₁ + μₙ₊₁πₙ₊₁ 的右邊第一項配 cut(n−1, n)、第二項配 cut(n, n+1)。一行完成。\n\n**global ⇒ local**（完整推導，這個方向才是稀有的）：記 Fₙ ≡ πₙλₙ − πₙ₊₁μₙ₊₁ 為 cut(n, n+1) 的淨流量（往右減往左）：\n\n```text\n狀態 0 的 global balance：π₀λ₀ = π₁μ₁            即 F₀ = 0   ← 0 只有一個鄰居\n狀態 n ≥ 1 的 global balance：\n    (λₙ + μₙ)·πₙ = λₙ₋₁·πₙ₋₁ + μₙ₊₁·πₙ₊₁\n移項分組：\n    πₙλₙ − πₙ₊₁μₙ₊₁ = πₙ₋₁λₙ₋₁ − πₙμₙ           即 Fₙ = Fₙ₋₁\n歸納：Fₙ = Fₙ₋₁ = … = F₀ = 0                     ∎\n```\n\n直覺只有一句：cut(n, n+1) 是狀態 ≤ n 與狀態 ≥ n+1 之間**唯一的橋**，淨流量要嘛沿著鏈一路恆定、要嘛是零；而最左端是牆（狀態 0 沒有左鄰），把恆定值釘死在零。一維結構就是這樣把 global 壓成 local 的。\n\n對照組看清楚這份禮有多特殊。三個狀態排成單向圈：0 → 1 → 2 → 0，速率全為 1：\n\n```text\n (0) ──1──► (1) ──1──► (2)\n  ▲                     │\n  └─────────1───────────┘\n```\n\n對稱性給 π = (1/3, 1/3, 1/3)，global balance 逐狀態驗證成立（每站流入 1/3、流出 1/3）。但邊 0→1 上：右流 π₀·1 = 1/3，回流 π₁·q(1→0) = 0——local balance 死透了。機率在圈上**循環**，淨流量不為零；穩態不等於沒有流動，只等於水位不變。什麼樣的 chain 才享有逐邊平衡，是 ch11 可逆性的主題（見 ch11），這裡只需要記住：在生滅過程裡它是定理，在別處它是要證明的奢侈品。\n\n## 通解：πₙ = π₀·Π(λᵢ/μᵢ₊₁)\n\nlocal balance 是一階遞推，整條鏈像拉鍊一樣解開（完整推導）：\n\n```text\ncut(n, n+1)：πₙ₊₁ = (λₙ/μₙ₊₁)·πₙ\n逐層展開：\nπ₁ = (λ₀/μ₁)·π₀\nπ₂ = (λ₁/μ₂)·π₁ = (λ₁λ₀)/(μ₂μ₁)·π₀\n…\nπₙ = π₀·Π_{i=0}^{n−1} (λᵢ/μᵢ₊₁)        ← 通解：n 條 cut，一刀一個因子\n正規化：\n1 = Σₙ πₙ = π₀·S，  S ≡ Σ_{n=0}^{∞} Π_{i=0}^{n−1} (λᵢ/μᵢ₊₁)   （n=0 項＝空乘積＝1）\n⇒ π₀ = 1/S\n```\n\n讀法：πₙ 是一串「上行速率除以下一級下行速率」的連乘——每爬一級，付一個 λᵢ/μᵢ₊₁ 的係數。係數 < 1 的階梯越爬越難，係數 > 1 的階梯越爬越順。ch06 紙上推演第 2 題那條「幾何遞推」就是這個結構的離散預演；ch08 的 M/M/1 是它最出名的特例（全部係數相同），這裡不展開（見 ch08）。\n\n**適用條件**，一個都不能少：①生滅結構（只有 ±1 轉移）——少了它沒有「唯一的橋」，local balance 不成立；②所有速率為正（不可約）；③穩態存在——這就是下一節，因為 S 可能是 ∞。\n\n## Ergodicity：級數收斂，穩態才存在\n\n> **定理（生滅過程的 ergodicity；工程師的嚴謹：敘述＋直覺，完整證明指路延伸閱讀）**：設生滅過程不可約（λₙ > 0、μₙ₊₁ > 0 對所有 n ≥ 0）且非爆炸（見下）。若 S < ∞，則平穩分布存在、唯一、由通解給出，且從任何起點，時刻 t 的分布與時間平均都收斂到 π（正常返／ergodic）。若 S = ∞，平穩分布**不存在**。\n\nS = ∞ 的物理意義值得正面盯著看。它不是「系統很滿」——是**任何有限狀態的長期時間佔比都是零**。想把通解正規化，每個 πₙ 都會被除成 0：機率一路向右逃逸，對任何固定的 n，P(N(t) = n) → 0。佇列要嘛一去不回頭地長大（transient，λ 系統性壓過 μ 時的行為），要嘛在臨界點上反覆回到 0 卻平均要等無限久（ch06 預告過的零常返，λ 與 μ 勢均力敵的病）。區分這兩種病需要第二條級數（Karlin–McGregor 判準，本書不展開，見延伸閱讀）；對工程師，第一條就夠用——**S 收斂與否，就是你的系統有沒有穩態的審判**，ch01 賒的「穩定性邊界」這裡兌現一半，另一半（M/M/1 的 ρ < 1）下一章開庭。\n\n最快的體感：速率全為常數 λ、μ 時，S = Σ(λ/μ)ⁿ 是幾何級數（ch03 的老朋友），λ < μ 收斂、λ ≥ μ 發散——「服務追不上到達就沒有穩態」第一次從經驗變成定理。但通解的威力在於 λₙ、μₙ 可以隨 n 變，而級數判準照樣裁決，worked example 與紙上推演會給出三種命運迥異的設計。\n\n兩筆技術誠實帳。**爆炸（explosion）**：若 λₙ 隨 n 長得太兇（例如 λₙ = 2ⁿ，純出生時總耗時期望 Σ1/λₙ = 2 < ∞），過程可以在有限時間內跳無限多次、衝出所有狀態——「非爆炸」是定理的前提之一。判準與證明見 Norris 第 2 章；本書出現的模型 λₙ 不是有界就是遞減，安全。**transient 行為**：本章與本書的所有答案都是 t → ∞ 的穩態；「尖峰過後多久排空」「多久第一次衝到容量上限」是 Kolmogorov 微分方程、首達時間與 fluid 近似的領域（uniformization 是把 CTMC 化回離散鏈做數值解的標準工具，一句話帶過）——本書主攻穩態，動態世界的地圖在 ch21（見 ch21）。這個取捨對工程不算太委屈：SLA、容量規劃、staffing 問的都是長期分布，穩態正面回答；但事故復原時間、尖峰的暫態高峰是 transient 問題，本書的公式對它們**保持沉默**，硬套會把「平衡後的世界」誤當「過渡中的世界」——知道工具的邊界在哪，跟會用工具一樣重要。\n\n## Worked example：admission control 的生滅模型\n\n把通解開上路。場景：單一推播 worker，μ = 10/s（E[S] = 100 ms）、尖峰 λ = 8/s（基準數字）。上游 API 做機率式 load shedding：系統內已有 n 件工作時，新到達只以機率 1/(n+1) 被收下，其餘直接拒絕。被收下的到達流是 Poisson 流的 thinning（ch05），所以這是生滅過程：\n\n```text\nλₙ = λ/(n+1) = 8/(n+1)、μₙ = μ = 10：\n\n        8           4          8/3           2\n     ──────►     ──────►     ──────►     ──────►\n  (0)        (1)         (2)         (3)         …\n     ◄──────     ◄──────     ◄──────     ◄──────\n       10          10          10          10\n```\n\n套通解，記 a = λ/μ = 0.8（offered load，記號表的老面孔）：\n\n```text\nΠ_{i=0}^{n−1} λᵢ/μᵢ₊₁ = Π_{i=0}^{n−1} λ/((i+1)·μ) = aⁿ/n!     ← 分母收集出 n!\nS = Σ_{n≥0} aⁿ/n! = e^a                                       ← 指數級數，永遠收斂\nπ₀ = e^(−a)，  πₙ = e^(−a)·aⁿ/n!                               ← Poisson(a) 分布！\n```\n\nn! 把幾何級數馴化成指數級數——admission control 把佇列長度的分布從幾何尾（ch08）壓成階乘衰減的 Poisson 尾。代 a = 0.8（e^(−0.8) ≈ 0.449，自算複核：e^0.8 ≈ 2.2255）：\n\n| n | πₙ | 累積 |\n|---|---|---|\n| 0 | 0.449 | 0.449 |\n| 1 | 0.359 | 0.809 |\n| 2 | 0.144 | 0.953 |\n| 3 | 0.0383 | 0.991 |\n| 4 | 0.00767 | 0.999 |\n| 5 | 0.00123 | 1.000 |\n\nP(N ≥ 3) = 1 − 0.953 = 0.0474；同樣 λ、μ 但不擋人的 M/M/1 給 πₙ = 0.2·0.8ⁿ（ch08 推導），P(N ≥ 3) = 0.8³ = 0.512——差 10.8 倍。平均更乾脆：E[N] = Σ n·e^(−a)aⁿ/n! = a·Σ e^(−a)aⁿ⁻¹/(n−1)! = a = 0.8，對照 M/M/1 的 E[N] = 4（ch03 已算過）。\n\n但帳要記兩本。算**吞吐**——而且故意用兩種算法，互相當審計：\n\n```text\n進帳（被接受的到達率）：\nλ_eff = Σₙ πₙ·λₙ = Σₙ e^(−a)·(aⁿ/n!)·λ/(n+1)\n      = (λ/a)·e^(−a)·Σₙ a^(n+1)/(n+1)!        ← (aⁿ/n!)/(n+1) = a^(n+1)/(a·(n+1)!)\n      = μ·e^(−a)·(e^a − 1) = μ·(1 − e^(−a))    ← λ/a = μ；級數差一個 n=0 項\n出帳（完成離開率）：\n      Σ_{n≥1} πₙ·μ = μ·(1 − π₀) = μ·(1 − e^(−a))   ✓ 兩本帳相等\n```\n\n兩條路必須相等不是巧合——穩態下進出系統的流量守恆，正是 cut(0, 1) 以上整段的總收支。數值：λ_eff = 10·(1 − 0.449) = 5.51/s，而上游開價 8/s——**31.2% 的工作被擋在門外**。被接受的工作倒是過得很爽：Little's Law（ch02，對被接受的流用 λ_eff）給 E[T] = E[N]/λ_eff = 0.8/5.51 = 0.145 s，對照 M/M/1 的 0.5 s。\n\n**自我複核：把解代回 balance equations**（寫完平穩分布必做的儀式）。先數值抽查：\n\n```text\ncut(0, 1)：λ₀π₀ = 8·0.449 = 3.59；μ₁π₁ = 10·0.359 = 3.59          ✓\n狀態 1 的 global balance：\n  流出 = (λ₁ + μ)·π₁ = (4 + 10)·0.359 = 5.03\n  流入 = λ₀π₀ + μπ₂ = 3.59 + 1.44 = 5.03                          ✓\n```\n\n再代數總驗（n ≥ 1 全體狀態一次過，用 λ = μa）：\n\n```text\n流出：(λ/(n+1) + μ)·aⁿ/n!\n流入：(λ/n)·aⁿ⁻¹/(n−1)! + μ·aⁿ⁺¹/(n+1)!\n逐項配對：\n  (λ/n)·aⁿ⁻¹/(n−1)! = λ·aⁿ⁻¹/n! = μ·aⁿ/n!        ← 配中流出第二項（cut(n−1, n)）\n  μ·aⁿ⁺¹/(n+1)! = (μa)·aⁿ/((n+1)·n!) = (λ/(n+1))·aⁿ/n!  ← 配中流出第一項（cut(n, n+1)）✓\n```\n\n配對不是隨便配的：兩組恰好就是左右兩條 local balance——global 拆成 local 的那個結構，在代數裡原樣現形。\n\n最後一個值得正面寫出來的事實：S = e^a **對任何 a 都收斂**。把 λ 拉到 20/s（a = 2，徹底過載），系統照樣 ergodic：E[N] = 2、λ_eff = μ(1 − e^(−2)) = 8.65/s、丟掉 56.8%。admission control 買到的是**無條件的穩定性**，帳單從延遲那欄整頁搬到 goodput 那欄——這就是 ch10「丟棄／等待」三角的開場白（見 ch10）。誠實聲明：1/(n+1) 這個接受機率（文獻通稱 discouraged arrivals）狠得不像話——n = 1 就擋掉一半；真實系統多半用硬閾值（佇列滿了才拒收），那是 M/M/1/K 的世界，ch10 處理。本例的價值在於它把「λₙ 隨 n 遞減 ⇒ 分布尾巴被壓扁、穩定性無條件化」這條因果鏈用閉式解攤開給你看。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與察覺 |\n|---|---|---|\n| 把機率標上 rate diagram | 「跳轉機率 0.5」放上速率圖，單位整個錯——速率可以是 3/s、可以大於 1，乘上 πₙ 才是流量；機率乘 πₙ 是無意義的數 | 每個標籤過單位檢查：1/時間才能上圖。要機率？P(下一步往右) = λₙ/(λₙ+μₙ)，從速率算出來 |\n| 數訪問次數估 π | jump chain 的訪問佔比 ≠ 時間佔比。兩狀態 A⇄B、q(A→B)=1、q(B→A)=100：跳轉嚴格輪流、訪問各 50%，但時間 π_A = (1/1)/(1/1+1/100) ≈ 0.990——差 49 個百分點 | 模擬與 log 分析一律按停留時間加權；口訣「π 是碼錶量出來的，不是計數器」 |\n| 非指數停留硬當 CTMC | 固定 30 s 的重啟倒數、固定 cooldown，停留時間不是指數；速率圖給的 π 平均對、依賴停留分布的結論全錯（ch06 陷阱 1 的連續版） | 擴狀態（把倒數拆成多段）或用相位逼近（phase-type，ch21 地圖一句話）；先問每條邊「你真的是一顆指數碼錶嗎」 |\n| 通解寫完不驗級數 | πₙ = π₀·Π(…) 形式上永遠寫得出來；S = ∞ 時硬正規化得到的「π」是垃圾——穩態根本不存在，模擬會看到佇列單調竄高、與「解」毫無關係 | 寫完通解先判 S 收斂再談其他；徵兆：模擬越跑平均越大、不收斂（ch19 的 warmup 救不了不存在的穩態） |\n| 把 local balance 帶出一維 | 「穩態＝每條邊平衡」在一般 chain 是錯的：單向三圈 π 均勻、global 全過，但每條邊淨流 1/3——機率在循環 | local balance 是結構的贈品：一維（本章）或可逆（ch11）才有；用之前先指出你的「唯一的橋」在哪 |\n\n## 紙上推演\n\n**1. [15 分鐘 ★★] 用 cut 解一條有限生滅鏈。**worker 的積壓分四級 {0, 1, 2, 3}（3 = 飽和）。上行速率 λ₀ = λ₁ = λ₂ = 6/s；下行速率 μ₁ = 4、μ₂ = 8、μ₃ = 8/s（積壓變高時你開了 turbo）。(a) 用相鄰 cut 解出 π。(b) 長期有多少比例的時間處於飽和？(c) 用一條你解題時沒用過的方程複核。\n\n**2. [15 分鐘 ★★] 三個生滅過程，判 ergodicity。**對每一個寫出 S 的通項、判收斂、並用一句話說出物理意義：(a) λₙ = 12、μₙ = 10（固定超載）；(b) λₙ = 8、μₙ = 10n（每件工作一到就有自己的 worker）；(c) λₙ = 2、μₙ = 10/n（工作越積、服務越慢——thrashing／GC 壓力的卡通版）。\n\n**3. [10 分鐘 ★★] 口頭重講：local balance 為什麼在生滅過程成立。**不看書，從 global balance 出發講到 Fₙ = 0，要講出「唯一的橋」與「左端是牆」各扮演什麼角色，並用單向三圈說明少了一維結構會發生什麼。\n\n### 推演解答\n\n**1.** (a) 三條 cut：6π₀ = 4π₁ ⇒ π₁ = 1.5π₀；6π₁ = 8π₂ ⇒ π₂ = 0.75π₁ = 1.125π₀；6π₂ = 8π₃ ⇒ π₃ = 0.84375π₀。正規化：π₀(1 + 1.5 + 1.125 + 0.84375) = 1 ⇒ π₀ = 32/143 ≈ 0.224，π₁ = 48/143 ≈ 0.336，π₂ = 36/143 ≈ 0.252，π₃ = 27/143 ≈ 0.189。(b) π₃ ≈ 18.9%。(c) 抽狀態 2 的 global balance（解題只用過 cut）：流出 = (6+8)·0.252 = 3.52；流入 = 6·0.336 + 8·0.189 = 2.01 + 1.51 = 3.52 ✓。常見錯路：把四條 global balance 全列出來硬解四元聯立——能解，但你會錯過「一維結構把它壓成三條一階遞推」這個本章的整個重點。\n\n**2.** (a) 通項 (12/10)ⁿ = 1.2ⁿ，幾何發散 ⇒ 非 ergodic。物理：到達系統性壓過服務，佇列以平均 λ−μ = 2/s 的斜率跑向無限（transient）。(b) 通項 Π 8/(10(i+1)) = 0.8ⁿ/n!，S = e^0.8 < ∞ ⇒ ergodic——而且把 8 換成任何 λ 都收斂：服務容量跟著佇列線性長，永遠追得上（這是 ch09 的 M/M/∞，先偷看一眼）。(c) 通項 Π 2(i+1)/10 = n!/5ⁿ，階乘輾壓幾何 ⇒ 發散 ⇒ 非 ergodic，**儘管 λ = 2 遠小於 μ₁ = 10**。物理：係數 λ/μₙ₊₁ = (n+1)/5 在 n = 4 跨過 1——積壓一旦衝過 4，每多一件事服務就更慢、漂移轉向外側，回不來了。服務隨擁塞劣化的系統沒有「夠小的 λ」這回事，這是 ch20 retry storm 與 metastable failure 的第一張底片。\n\n**3.** 骨架：①狀態 0 只有一個鄰居，global balance 本身就是 cut(0,1)——左端是牆，釘下 F₀ = 0；②狀態 n 的 global balance 移項後恰是 Fₙ = Fₙ₋₁——淨流量沿鏈恆定；③歸納得全部 Fₙ = 0。「唯一的橋」：cut(n, n+1) 是左右兩半之間僅有的通道，所以「狀態集合 {0..n} 的總收支」直接落在這兩條邊上。單向三圈裡每條 cut 都被兩條以上的邊跨越（去程與回程走不同的路），守恆只約束「總和」、約束不到單邊——淨流量繞圈跑，local balance 無從成立。講不出③的人通常卡在把 F₀ = 0 當成假設——它不是，它是狀態 0 的 global balance 本身。\n\n## 自我檢核\n\n1. CTMC 的停留時間為什麼非指數不可？這件事跟 ch04 的哪條定理是同一件事？\n2. q(i→j) = 3/s 的白話是什麼？它跟「跳轉機率」差在哪、為什麼可以大於 1？\n3. global balance 的「流入＝流出」是從哪兩個觀察拼出來的？（提示：遍歷定理＋進出次數最多差 1）\n4. local balance 與 global balance 各說什麼？為什麼生滅過程兩者等價，而單向三圈只有 global 成立？\n5. 通解 πₙ = π₀·Π(λᵢ/μᵢ₊₁) 的三個適用條件是什麼？哪一個最常被忘掉？\n6. S = ∞ 時，「平穩分布不存在」的物理意義是什麼？它跟「系統很滿」差在哪？\n7. 模擬一條 CTMC，用「各狀態被訪問的次數比例」估 π，錯在哪？怎麼修？\n8. admission control 例子裡，為什麼任何 λ 都 ergodic？穩定性的代價記在哪本帳上？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013) 第 12 章 \"Transition to Continuous-Time Markov Chains\"——本章的教科書對應章，DTMC 到 CTMC 的過渡講得最體貼；第 9 章 Ergodicity Theory 把存在性與收斂的證明補全。書頁：https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Adan & Resing,《Queueing Systems》講義（TU Eindhoven），§4.2——用四種方法解同一條鏈（直接法、遞推、生成函數、global balance），其中遞推法就是本章的 cut 路線，免費 PDF 適合對照驗收：https://www.win.tue.nl/~iadan/queueing.pdf\n- J. R. Norris,《Markov Chains》(Cambridge) 第 2–3 章——CTMC 的嚴格版：Q matrix、jump chain 與停留時間、爆炸判準、收斂定理，本章所有「指路」的正主；作者頁有部分章節免費材料：https://www.statslab.cam.ac.uk/~james/Markov/\n- Kleinrock,《Queueing Systems, Vol. 1: Theory》(Wiley, 1975) 第 3 章 \"Birth-Death Queueing Systems in Equilibrium\"——生滅過程當整章主角的經典處理，把各種 λₙ、μₙ 的設計一字排開（章名經查證；無官方免費 PDF）：https://www.wiley.com/en-us/Queueing+Systems,+Volume+I-p-9780471491101\n- MIT OCW 6.262《Discrete Stochastic Processes》（Gallager, Spring 2011）——countable-state Markov chains 與 Markov processes 的單元有完整錄影與習題解答，想看零常返與 ergodicity 更嚴格一階的免費材料就是它：https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n- Wikipedia \"Birth–death process\"——本章不展開的第二條級數（Karlin–McGregor 的 recurrence/transience 判準）在 \"Recurrence and transience\" 一節有精簡陳述，當速查表用：https://en.wikipedia.org/wiki/Birth%E2%80%93death_process\n"}, {"id": "ch08-mm1", "file": "ch08-mm1.md", "group": "Part III — 生滅與經典模型", "title": "ch08 — M/M/1：第一個完整的佇列", "md": "# ch08 — M/M/1：第一個完整的佇列\n\n> **本章解決什麼問題**：零件到齊了——ch04 的指數原子、ch05 的 Poisson 到達、ch07 的生滅引擎。本章把它們組裝成第一個能完整解出來的佇列模型 M/M/1，並一次兌現前面各章開出的支票：ch01 的使用率階梯與「P99 ≈ 4.6× 平均」從體感變成定理、ch03 的級數微分正式上工、「80% 警戒線」開庭初審。途中你會拿到一個全書反覆偷用的隱形定理（PASTA）、Kendall 記號的正式戶籍資料，以及「穩態」這個詞的精確意義。ch09 之後的每一個模型，都是本章的變奏。\n\n## 從你已知的出發\n\nch01 的開場是你熟悉的場景：推播管線在尖峰時段延遲飆升，worker 明明追得上總量（λ = 8 則/s < μ = 10 則/s），佇列卻照樣積壓。當時我給了你一張使用率階梯表和一條「P99 ≈ 4.6× 平均」的規則，但全部是賒帳——「ch08 推導兌現」。今天是兌現日。\n\n先盤點你手上已經有什麼。ch05 證明了大量獨立使用者匯流出來的到達近似 Poisson(8)，而且你知道怎麼檢驗這個假設；ch04 給了無記憶性與競賽引理；ch07 把兩者組裝成生滅過程，推出了通解 πₙ = π₀·Π(λᵢ/μᵢ₊₁) 和 ergodicity 判準。本章不需要任何新零件——M/M/1 是生滅過程最簡單的特例，把 λₙ ≡ λ、μₙ ≡ μ 代進去，整個模型就解完了。剩下的工作是把解讀懂：每個數字對應你監控面板上的哪個指標、每個假設對應你架構圖上的哪個元件、每個結論在什麼條件下會反咬你。\n\n具體一點。本章結束時，下面這些問題全部有可推導的答案，而不是經驗值：\n\n- RDS CPU 的 80% 警戒線——80 這個數字是定理還是迷信（審判 #1 立案開庭）？\n- k6 壓測曲線那支 hockey stick，為什麼長那個形狀、彎點為什麼在那裡？\n- 「平均 0.5 s」的系統，P99 是多少？這兩個數字的關係什麼時候是常數、什麼時候脫鉤（審判 #3 的第一手證據）？\n- 流量從 ρ = 0.8 漲到 0.9（只多 12.5%），哪些指標翻倍、哪些翻得更兇？\n\n另外有一件方法論的事值得先說破：πₙ 是「時間平均」——系統處於狀態 n 的時間比例。但你的使用者不住在時間軸上，他們在某個瞬間**到達**，看到的是那一瞬間的佇列。「到達者看到的」與「時間平均」憑什麼是同一件事？這個被整個行業日用而不知的等號，是本章後半的主角 PASTA。\n\n## 先報戶口：Kendall 記號與 M/M/1 的完整假設\n\nch01 你已經把 Kendall 記號當地名用過，現在補辦正式戶籍。Kendall 1953 年引入的原始格式是三欄 **A/S/c**：到達過程／服務時間分布／伺服器數。後人擴充出更多欄位，通行的完整版是 **A/S/c/K/N/D**——K 系統容量上限、N 呼叫母體大小、D 服務紀律（discipline）。這個擴充常稱 Kendall–Lee 記號，通行說法歸給 A.M. Lee 1966 年的教科書（2026-06 查證於二手來源，原書未直查）。後三欄省略時的**預設值**是整套記號的隱形條款：\n\n> K = ∞（不丟棄）、N = ∞（到達率不因在場人數改變）、D = FCFS（先到先服務）。\n\n所以「M/M/1」這三個字元展開來是一份完整的合約。逐條攤開，並標注每條在你系統裡對應什麼、哪一章處理它破掉的情形：\n\n| # | 假設 | 精確內容 | 工程對應與破口 |\n|---|---|---|---|\n| 1 | 到達 M | Poisson(λ)：增量獨立、平穩、不同時到（ch05 三定義） | 大量獨立使用者匯流≈成立；retry／批次／cron 流破它（ch05 防禦流程） |\n| 2 | 服務 M | i.i.d. Exp(μ)，且與到達過程獨立 | **最常破的一條**：服務時間沒有極限定理護航（ch05 尾段），C²ₛ ≠ 1 見 ch12、重尾見 ch15 |\n| 3 | c = 1 | 單一伺服器 | 單 worker、單連線池槽位；多台見 ch09 |\n| 4 | K = ∞ | 佇列無上限、永不丟棄 | 現實的 buffer 都有限；有限容量見 ch10 |\n| 5 | N = ∞ | 開放系統：到達率與在場人數無關 | 固定 VU 的壓測是封閉系統，先天違反（見 ch17） |\n| 6 | FCFS | 先到先服務 | 平均量不挑這條（ch13 守恆律），**但回應時間的分布挑**——本章後面就會用到 |\n| 7 | ρ = λ/μ < 1 | 穩定性 | 這不是建模假設，是穩態存在的條件——本章倒數第二節專門講它 |\n\n這張表是本章的合約書。接下來每個結果出場，我都會說它用了表中哪幾條；「陷阱與防禦」再從反方向逐條驗收。\n\n## 平穩分布：把 ch07 的通解代進去\n\nM/M/1 的 rate diagram 是生滅過程最樸素的長相——出生率與死亡率都是常數：\n\n```\n        lam         lam         lam         lam\n     ────────►   ────────►   ────────►   ────────►\n  (0)         (1)         (2)         (3)   . . .\n     ◄────────   ◄────────   ◄────────   ◄────────\n        mu          mu          mu          mu\n```\n\nch07 已經對一般的 λₙ、μₙ 推過通解，這裡不重推，直接代入 λₙ ≡ λ、μₙ ≡ μ（**嚴謹度：完整推導**——代入是合法的推導步驟，前提是你能口頭重講 ch07 的通解怎麼來的；紙上推演第 1 題會逼你做這件事）：\n\n```text\nπₙ = π₀ · Π(i=0..n−1) λᵢ/μᵢ₊₁ = π₀ · (λ/μ)ⁿ = π₀·ρⁿ     ← ch07 通解，連乘全是同一個因子\n正規化：Σₙ πₙ = π₀ · Σₙ ρⁿ = π₀/(1−ρ) = 1                ← 幾何級數（ch03），需要 ρ < 1\n⇒ π₀ = 1−ρ，  πₙ = (1−ρ)ρⁿ\n```\n\n兩行就解完了，但每一行都值得停一下。\n\n**第一行**是 ch07 local balance 的化身：在狀態 n 與 n+1 之間下一刀（ch06 的 cut 讀法），往右的機率流 πₙ·λ 必須等於往左的 πₙ₊₁·μ，所以 πₙ₊₁ = ρ·πₙ——每往上爬一階，機率打一次 ρ 折。**第二行**是 ch03 那條幾何級數，而它的收斂條件 ρ < 1 在這裡不是技術細節：ρ ≥ 1 時級數發散、π₀ 只能是 0、不存在可正規化的平穩分布——「佇列穩不穩定」與「一條級數收不收斂」是同一個問題（ch07 的 ergodicity 判準在最簡單情形的現身）。\n\n**適用條件**：假設表 #1–#5、#7。注意**不含 FCFS**：只要伺服器不偷懶（系統非空就以總速率 μ 出活）、且不依工作大小挑單，N(t) 的生滅結構就不變——πₙ 對 FCFS／LCFS／隨機挑單都一樣（ch13 細講）。\n\n把基準數字代進來（λ = 8、μ = 10、ρ = 0.8）：πₙ = 0.2·0.8ⁿ。讀這個分布的三個姿勢：\n\n- **它是幾何分布**，嚴格遞減：最有可能的單一狀態居然是「系統全空」（π₀ = 0.2）。一個忙到 80% 使用率的系統，最常見的瞬間長相是空的——但這不是好消息，因為……\n- **尾巴是 ρⁿ**。對任何 n：P(N ≥ n) = Σ(k≥n) (1−ρ)ρᵏ = ρⁿ（**完整推導**：提出 ρⁿ 後又是同一條幾何級數）。代數字：P(N ≥ 10) = 0.8¹⁰ ≈ 0.107——每十個瞬間就有一個積壓上雙位數；P(N ≥ 20) = 0.8²⁰ ≈ 0.0115。分布的頭睡在 0，尾巴卻拖得很長，平均值是被尾巴抬起來的。\n- **π₀ = 1−ρ 是一次免費對帳**：系統非空的時間比例 = 1−π₀ = ρ，正是 ch02 的 Utilization Law（E[N_服務中] = ρ）。機率模型與操作分析在這裡咬合，咬不合就是哪裡算錯了。\n\n## 四個平均量與一座階梯\n\n### E[N]：ch03 的微分技巧上工\n\n```text\nE[N] = Σₙ n·(1−ρ)ρⁿ\n     = (1−ρ) · Σₙ n·ρⁿ\n     = (1−ρ) · ρ/(1−ρ)²        ← ch03 微分技巧：Σ n·ρⁿ = ρ/(1−ρ)²\n     = ρ/(1−ρ)\n```\n\n代 ρ = 0.8：**E[N] = 0.8/0.2 = 4**。其實你在 ch03 的紙上推演就算過這題——當時是練手感，現在它有了身分：尖峰時段的推播管線，系統內平均掛著 4 則訊息。\n\n### Little 三連推：E[T]、E[T_Q]、E[N_Q]\n\n有了 E[N]，剩下三個量全靠 Little's Law（ch02）與「回應時間 = 等待 + 服務」這條會計恆等式，不需要再碰任何機率：\n\n```text\nE[T]   = E[N]/λ = ρ/(λ(1−ρ)) = 1/(μ−λ) = E[S]/(1−ρ)    ← Little；三種寫法同一件事\nE[T_Q] = E[T] − E[S] = ρ/(μ−λ)                            ← 扣掉自己的服務\nE[N_Q] = λ·E[T_Q] = ρ²/(1−ρ)                              ← Little 框在「只有佇列」的邊界上\n```\n\n基準數字與自我複核一次做完：\n\n| 量 | 公式 | ρ = 0.8 的值 | 對帳 |\n|---|---|---|---|\n| E[N] | ρ/(1−ρ) | 4 | ch03 推演重現 ✓ |\n| E[T] | 1/(μ−λ) | 1/2 = **0.5 s** | λ·E[T] = 8×0.5 = 4 = E[N] ✓ |\n| E[T_Q] | ρ/(μ−λ) | 0.8/2 = **0.4 s** | 0.4 + 0.1 = 0.5 = E[T] ✓ |\n| E[N_Q] | ρ²/(1−ρ) | 0.64/0.2 = **3.2** | E[N] − E[N_Q] = 0.8 = ρ = E[N_服務中]（ch02）✓ |\n\n**適用條件**：與 πₙ 相同（#1–#5、#7，不挑 discipline——但見下節，分布就挑了）。\n\n### 帳本二：不解 πₙ 的捷徑（這裡偷用了一個定理）\n\n同一組平均量有一條完全不碰平穩分布的路（**工程師的嚴謹**）：一個到達者眼前平均有 E[N] 個工作，每個——包括做到一半的那個——平均還要耗 1/μ（無記憶性，ch04：殘餘服務時間仍是 Exp(μ)），再加上自己的服務：\n\n```text\nE[T] = E[N]·E[S] + E[S]      ← 「到達者看到的平均人數 = E[N]」：這一步是 PASTA，下下節開庭\nE[N] = λ·E[T]                ← Little\n⇒ E[T] = ρ·E[T] + E[S]  ⇒  E[T] = E[S]/(1−ρ)\n```\n\n兩條方程、兩個未知數，解完。注意這條路用了三樣東西：PASTA（先賒著）、無記憶性、**FCFS**（你恰好要等完眼前那些人、不多不少——換成插隊制這行就錯了）。兩本帳算出同一個 E[T]，是本章第二次對帳成功。\n\n### 使用率階梯：ch01 的賒帳清償\n\nE[T] = E[S]/(1−ρ) 就是 ch01 那張階梯表的出處。代 E[S] = 100 ms：\n\n| ρ | 1−ρ | E[T] = E[S]/(1−ρ) |\n|---|---|---|\n| 0.50 | 0.50 | 0.2 s |\n| 0.80 | 0.20 | 0.5 s |\n| 0.90 | 0.10 | 1.0 s |\n| 0.95 | 0.05 | 2.0 s |\n| 0.99 | 0.01 | 10 s |\n\nch01 教你的讀法「剩餘容量每砍半，延遲翻倍」現在升格為定理：E[T] 反比於 1−ρ，hockey stick 的形狀不是壓測工具的渲染效果，是 1/(1−ρ) 的圖形。階梯的適用條件就是 M/M/1 的合約書全文——這張表搬到別的模型會錯多少，ch01 的陷阱表已經預告，ch09／ch12／ch14 逐一結帳。\n\n## 回應時間的完整分布：T ~ Exp(μ−λ)\n\n平均值只是分布的第一個矩，而你的 SLA 訂在分位數上。M/M/1 慷慨到給出整條分布：\n\n> **定理**：穩態 M/M/1 在 **FCFS** 下，回應時間 T ~ Exp(μ−λ)：P(T > t) = e^(−(μ−λ)t)。\n> **適用條件**：合約書全文＋FCFS。平均量不挑 discipline，這條分布挑——換成 PS 或 LCFS，E[T] 不變、分布整個變形（ch13）。\n\n**證明 sketch（工程師的嚴謹；每步標出引用的零件）**。到達者看到系統裡有 k 個工作的機率是 πₖ（**PASTA**，下節正式開庭）；看到 k 個，在 FCFS 下它的 T 是 k+1 段服務之和——前面 k 個各一段、自己一段，其中做到一半那個的殘餘仍是完整的 Exp(μ)（無記憶性，ch04），且各段獨立。k+1 段 i.i.d. Exp(μ) 之和是 Erlang(k+1, μ) 分布，密度 μ(μt)ᵏe^(−μt)/k!（ch05 你見過它的 k = 2 版本——round-robin 那段；一般版由卷積歸納，本書引用不重推）。把 k 用 πₖ 混起來：\n\n```text\nf_T(t) = Σ(k≥0) (1−ρ)ρᵏ · μ(μt)ᵏ e^(−μt)/k!\n       = (1−ρ)μ·e^(−μt) · Σ(k≥0) (ρμt)ᵏ/k!     ← ρᵏ 與 (μt)ᵏ 併成 (ρμt)ᵏ\n       = (1−ρ)μ·e^(−μt) · e^(ρμt)               ← 指數級數原地收回\n       = (μ−λ)·e^(−(μ−λ)t)                       ← (1−ρ)μ = μ−λ\n```\n\n幾何權重把無窮多條 Erlang 密度疊成一條乾淨的指數——這是排隊理論最漂亮的計算之一，值得親手抄一遍。直覺版的旁註：「幾何個指數之和還是指數」也可以用 ch05 的分流定理看——服務完成流是速率 μ 的事件流，每個完成以機率 1−ρ「輪到你出場」，分流後的第一個事件自然是 Exp((1−ρ)μ)。\n\n順帶送兩件事。其一，**等待時間** T_Q 的分布同一招可得：P(T_Q = 0) = π₀ = 1−ρ（到達看到全空，又是 PASTA），P(T_Q > t) = ρ·e^(−(μ−λ)t)——一個在 0 有質點的混合分布；ρ = 0.8 時**八成的請求都要排隊**。其二，一個反直覺的推論：T 的整條分布只透過 **μ−λ**（剩餘容量）出現。λ = 8、μ = 10 與 λ = 98、μ = 100 的回應時間分布**一模一樣**（都是 Exp(2)），儘管後者 ρ = 0.98、系統內平均掛著 49 個工作。回應時間看剩餘容量、佇列長度看使用率，兩者由 Little 黏在一起，並不矛盾——但「ρ 高 = 慢」這句直覺在比較不同規模的系統時會騙你（M/M/1 專屬的巧合，別帶去別的模型）。\n\n### 分位數：4.6× 規則的出生證明\n\n指數分布的 tail 是一條直線（半對數紙上），分位數隨手解：\n\n```text\nP(T > t_p) = e^(−(μ−λ)t_p) = 1−p   ⇒   t_p = ln(1/(1−p)) / (μ−λ)\np = 0.99：t₉₉ = ln 100/(μ−λ)\n```\n\n基準：t₉₉ = 4.6052/2 ≈ **2.30 s**。而 E[T] = 1/(μ−λ)，所以 t₉₉/E[T] = ln 100 ≈ 4.6052——**M/M/1 + FCFS 的 P99 永遠約是平均的 4.6 倍**，與負載無關（ρ 變了，兩者等比例變）。ch01 賒的第二筆帳清了。同場加映：中位數 t₅₀ = ln 2/(μ−λ) ≈ 0.347 s，遠低於平均 0.5 s——指數分布的平均被尾巴拉著走，「一半的使用者體感比平均快得多」與「1% 的使用者等 4.6 倍平均」是同一條分布的兩端。每多要一個 9（P99 → P99.9 → …），代價是再加 ln 10 ≈ 2.3026 倍的 E[T]：t₉₉.₉ = ln 1000/2 ≈ 3.45 s。輕尾世界裡，nines 是線性計價的；重尾世界這個價目表會被撕掉（ch15）。\n\n這條規則的死法預告（審判 #3 的證物清單）：它依賴指數服務那條瘦尾巴與 FCFS。服務時間重尾時 P99 與平均徹底脫鉤（ch15）；discipline 換掉時分布變形（ch13）；到達叢發時整條分布右移（ch14）。「P99 ≈ 4.6× 平均」是合約內的定理、合約外的謠言。\n\n## PASTA：到達看到的就是時間平均\n\n本章已經兩次寫下「到達者看到 k 個的機率是 πₖ」。現在開庭審它。\n\nπₙ 的身分是**時間平均**：系統處於狀態 n 的時間比例（ch06 的遍歷定理＋ch07 的 ergodic CTMC 給的執照）。但「到達者看到什麼」是在**特定瞬間**取樣——到達的那些瞬間。兩者憑什麼相等？\n\n> **PASTA**（Poisson Arrivals See Time Averages；Wolff 1982，縮寫直接取自論文標題）：若到達流是 Poisson，且滿足 **lack of anticipation**（系統的現在不洩漏到達流的未來：未來的到達增量與系統當前狀態獨立），則到達者抵達瞬間（**不含自己**）看到系統處於狀態 n 的長期比例，等於時間平均 πₙ。\n\n### 為什麼這不是廢話：一個反例\n\n把到達換成等距（D 流），等號立刻碎掉。間隔 1 s 的確定性到達、固定 0.5 s 的確定性服務（D/D/1，ch01 的老朋友）：\n\n```\ntime:     0     0.5    1     1.5    2     2.5    3\n          |      |     |      |     |      |     |\narrive:   A            A            A            A\nserver:   [=====]      [=====]      [=====]      [==\nN(t):     |--1--|--0--||--1--|--0--||--1--|--0--|\n```\n\n時間平均：系統一半時間有 1 個工作、一半時間全空——時間視角的「分布」是 (1/2, 1/2)。但**每一個到達者看到的都是空系統**：到達視角的「分布」是 (1, 0)。兩個視角給出完全不同的答案，誰都沒算錯——它們本來就是不同的問題。等距到達「挑時間」：它們永遠在伺服器剛好排空之後抵達，取樣到的全是系統最空的瞬間。任何有節律的到達流都在用自己的節律與系統的節律共舞，看到的是被共舞扭曲過的世界。\n\n### 證明思路（直覺版＋指路）\n\nPoisson 為什麼免疫？因為它**沒有節律可以共舞**。用 Bayes 把問題攤開（h → 0）：\n\n```text\nP(狀態 n | (t, t+h] 有到達)\n= P((t,t+h] 有到達 | 狀態 n) · P(狀態 n) / P((t,t+h] 有到達)\n= (λh + o(h)) · πₙ / (λh + o(h))     ← 關鍵步：條件在「狀態 n」上，到達機率仍是 λh + o(h)\n→ πₙ\n```\n\n關鍵步成立的理由：時刻 t 的系統狀態是「過去的到達與服務」的函數，而 Poisson 的獨立增量＋lack of anticipation 保證未來那一小段 (t, t+h] 的到達與整個過去獨立——所以也與狀態獨立。到達「不挑時間」，取樣就無偏。回頭看 D/D/1 反例斷在哪裡：P(下一瞬有到達 | 伺服器忙) = 0——確定性到達的未來被現在完全洩漏，關鍵步的條件機率根本不等於無條件機率。把這個直覺做成嚴格證明（對軌跡層級的時間平均、用 martingale 處理收斂）是 Wolff 1982 的貢獻，**本書不證**，見延伸閱讀。\n\n### 本章在哪裡偷用了它（自首清單）\n\n- **帳本二**的第一行：「到達者眼前平均有 E[N] 個」——到達者看到的期望 = 時間平均的期望，PASTA。\n- **T ~ Exp(μ−λ)** 證明的第一步：「到達者看到 k 個的機率是 πₖ」。\n- 「**八成的請求要排隊**」：P(T_Q > 0) = 1−π₀ = ρ 把時間平均 π₀ 讀成了到達者的命運——PASTA。\n\n同樣重要的是**哪裡沒用它**：πₙ 本身、E[N]、以及經由 Little 的 E[T]／E[T_Q]／E[N_Q] 全程不需要 PASTA——Little 是樣本路徑恆等式（ch02），對 D 流照樣成立。所以就算到達不是 Poisson，階梯表的「形狀」邏輯還在，死掉的是「到達者體感 = 時間平均」這層翻譯。\n\n### 工程旁注：取樣的金科玉律\n\nPASTA 給監控一條實用紀律：想無偏估計「使用者看到的系統」，用 Poisson 時間點取樣（間隔抽 Exp 的主動探針），而不是固定週期的 cron 探針——後者會跟系統的週期負載共舞出 alias。反過來，固定 VU 的壓測器是封閉迴路：上一個回應沒回來就不發下一個，到達時刻與系統狀態**強相關**，lack of anticipation 死透——它量到的「到達者視角」既不是 πₙ 也不是線上使用者的體感（ch17、ch19 接手）。\n\n## 穩態的精確意義，以及 ρ ≥ 1 的世界\n\n本章所有結果前面都掛著「穩態」。把這個詞攤開，它包含三件可分辨的事（ch06／ch07 的定理在 M/M/1 的落地）：\n\n1. **極限分布**：不管從幾個工作起步，P(N(t) = n) → πₙ。\n2. **時間平均**：單一軌跡待在狀態 n 的時間比例 → πₙ（遍歷定理——你的監控與 ch19 的模擬靠這條吃飯）。\n3. **平穩性**：若 N(0) 就按 π 抽樣，則之後每一刻都是 π。\n\n三件事都在說分布，**沒有一件在說軌跡會安靜下來**。穩態的 M/M/1 永遠在抖：π 自己就說了 P(N ≥ 10) ≈ 0.107——穩態「內含」風暴，風暴是分布的一部分而不是對穩態的偏離。看到佇列瞬間衝高就宣布「系統異常」，是把穩態誤解成靜止；該問的是衝高的**頻率**是否超出 π 的預算。\n\n另一個誠實聲明：收斂（第 1 件事）需要時間，而且 ρ 越貼近 1 越慢——量級大約隨 1/(μ(1−ρ)²) 成長（**量級論證，本書不證**，精確常數略去：ρ = 0.8 時是秒級，ρ = 0.99 時是千秒級）。所以「尖峰窗內局部平穩」（ch05）這個立足點在 ρ = 0.8 很穩——幾秒就收斂、尖峰窗有兩小時；但對一個 ρ = 0.99 的系統，穩態公式描述的狀態可能比你的尖峰窗還長壽——公式沒錯，是「穩態」根本來不及發生。\n\n### ρ ≥ 1：兩種不同的死法\n\n把 ch07 的 ergodicity 判準代進來：正規化級數 Σρⁿ 收斂 ⇔ ρ < 1。等號與大於號是兩種病（生滅判準的分類，**引用不證**；ch06 預告過的「零常返」在此兌現）：\n\n| 區間 | 診斷 | 症狀 |\n|---|---|---|\n| ρ < 1 | 正常返（positive recurrent） | 唯一平穩分布，本章全部結果成立 |\n| ρ = 1 | **零常返**（null recurrent） | 必定一再排空（機率 1），但平均排空時間無限；無平穩分布，佇列像對稱隨機漫步一樣以 √t 量級遊蕩——「容量剛好打平」不是完美調校，是病 |\n| ρ > 1 | 暫態（transient） | N(t)/t → λ−μ：佇列以每秒 λ−μ 個的速度線性長大，永不回頭 |\n\nρ > 1 的算術冷酷而簡單：λ = 12、μ = 10 的系統每秒淨積壓 2 則，一小時 7,200 則。**過載不是「變慢」，是發散**——不存在「過載下的穩態延遲」這種東西，任何有限的延遲數字都只是你量測時刻的快照，下一刻更糟。出口只有三個：降 λ（限流、丟棄——ch10 把這件事定理化）、升 μ／加 c（ch09）、或眼睜睜看 backlog 吃掉記憶體。\n\n最後一個防呆：公式自己不會報警。把 ρ = 1.2 代進 ρ/(1−ρ)，它面不改色地吐出 −6——幾何級數在收斂半徑外的胡言亂語（ch03 的陷阱表早有預告）。**負數的 E[N] 不是 bug，是你違約的回執。**\n\n## 開庭：0.8 → 0.9 對照表（worked example 總整理）\n\n把本章全部結果裝進一個情境：推播尖峰從 λ = 8 漲到 λ = 9（流量 +12.5%），μ = 10 不動。每一格都用前面的公式獨立重算：\n\n| 指標 | 公式 | ρ = 0.8 | ρ = 0.9 | 變化 |\n|---|---|---|---|---|\n| π₀（全空比例） | 1−ρ | 0.2 | 0.1 | 砍半 |\n| E[N] | ρ/(1−ρ) | 4 | 9 | ×2.25 |\n| E[N_Q] | ρ²/(1−ρ) | 3.2 | 8.1 | ×2.53 |\n| E[T] | 1/(μ−λ) | 0.5 s | 1.0 s | ×2 |\n| E[T_Q] | ρ/(μ−λ) | 0.4 s | 0.9 s | ×2.25 |\n| t₉₉ | ln 100/(μ−λ) | 2.30 s | 4.61 s | ×2 |\n| P(N ≥ 20) | ρ²⁰ | 0.0115 | 0.122 | ×10.5 |\n\n讀法比數字重要：\n\n- **翻倍不是巧合，是定理**。μ−λ 從 2 砍到 1，而 T 的整條分布是 Exp(μ−λ)——所以不只平均翻倍，**每一個分位數都翻倍**（t₉₉ 從 2.30 到 4.61）。「流量多一成、延遲翻一倍」這句話精確的版本是：剩餘容量砍半，回應時間分布等比例放大兩倍。\n- 越往尾巴越慘烈：平均 ×2，佇列 ×2.5，「積壓破 20」的機率 ×10.5。**監控告警如果訂在佇列深度上，它對 ρ 的變化比平均延遲敏感一個數量級**——這是把告警訂在 backlog 而不是平均 latency 上的數學理由。\n- **審判 #1 初審意見**：「80%」本身無罪也無功——E[N] = 4、t₉₉ = 2.30 s 可不可接受是 SLA 的事，數學管不著。數學管的是：在 ρ = 0.8 這個位置，你距離「一切翻倍」只有 12.5% 的流量成長，而流量預測的誤差常常不只 12.5%。警戒線的正確讀法不是「80 以下安全」，而是「你的反應速度追不追得上 1/(1−ρ) 的爬升速度」。全案發回 ch09（池化會移動懸崖）與 ch14（變異數會移動懸崖，方向相反）繼續審理。\n\n## 陷阱與防禦\n\nM/M/1 的合約書逐條驗收：哪條假設、怎麼破、騙你多少、怎麼自我察覺。\n\n| 假設／用法 | 它怎麼騙你（會錯多少） | 自我察覺 |\n|---|---|---|\n| 到達 Poisson（C²ₐ = 1） | 叢發到達 C²ₐ = 2 時，本章 E[T_Q] = 0.4 s 低估成真值 0.6 s 的 2/3（Kingman 修正因子 (C²ₐ+C²ₛ)/2，見 ch14） | ch05 的三關檢驗：間隔直方圖＋多窗長 dispersion＋架構圖找 retry／批次／cron |\n| 服務 Exp(μ)（C²ₛ = 1） | 服務固定（M/D/1）時真實等待是本章的一半（0.2 s vs 0.4 s，ch12）——高估；服務重尾時低估到不知幾倍（ch15） | 量服務時間直方圖、算 C²ₛ；服務時間沒有極限定理護航，**永遠要量** |\n| FCFS（分布結果專用） | 4.6× 規則與 t₉₉ 公式在 PS／LCFS／優先權下變形；平均量不變、tail 大變（ch13） | 先回答「我的伺服器到底是什麼 discipline」——Node.js 的事件迴圈不是 FCFS（ch13） |\n| 穩態 | 把公式用在剛起波的尖峰、事故後排 backlog 的窗口：那是暫態，公式對它零承諾；ρ 貼近 1 時連「收斂到穩態」都來不及發生 | 窗口要遠長於收斂時間（ρ = 0.8 時秒級）；窗內 λ 要近似常數（ch05 局部平穩） |\n| ρ < 1 | ρ ≥ 1 時公式輸出負數或無限大；更陰險的是量測端：過載時你量到的吞吐 X 被 μ 封頂，ρ̂ = X/μ 永遠 ≈ 1、看不出 1.2 | E[N] 算出負數＝違約回執；判斷過載看 **backlog 的斜率**（λ−μ），不看吞吐 |\n| 「到達者體感 = 時間平均」 | 到達非 Poisson 時這層翻譯死掉：等距到達的 D/D/1 裡時間平均說「半數時間有人」、到達者全程看到空系統 | 用 PASTA 前先過 ch05 的 Poisson 檢驗；封閉迴路壓測器量到的「體感」兩邊都不是 |\n| 開放系統（N = ∞） | 固定 VU 壓測是封閉系統：天生自我節流、永遠測不出 ρ ≥ 1 的發散（ch17） | 分清楚你的負載產生器是開放還是封閉；要測過載行為，用開放速率產生器 |\n\n防禦總則一句話：**M/M/1 不是「預設模型」，是一張要逐條核對的合約**——核對成本很低（量 λ、量 E[S]、檢驗兩個 C²、看一眼 discipline），比拿錯模型做容量決策便宜太多。\n\n## 紙上推演\n\n**第 1 題 [15 分鐘 ★★] 推導重講＋兩本帳。**闔上書。(a) 從生滅 cut 出發推出 πₙ = (1−ρ)ρⁿ，明確指出 ρ < 1 用在哪一步、用來做什麼。(b) 用兩條不同的路算 E[N]：級數微分（ch03 路線）與 tail 求和（E[N] = Σ(n≥1) P(N ≥ n)，ch03 的 tail 公式）。兩本帳要對齊。\n\n**第 2 題 [10 分鐘 ★] 積壓深度的機率。**手算 P(N ≥ 20) 在 ρ = 0.8 與 ρ = 0.9 各是多少（提示：平方鏈 0.8² → 0.8⁴ → 0.8⁵ → 0.8¹⁰ → 0.8²⁰ 手算友善）。接著回答：這個數字能不能直接當「buffer 設 20 的溢出率」用？為什麼？\n\n**第 3 題 [10 分鐘 ★★] 流量翻倍、機器也翻倍。**尖峰要從 λ = 8 漲到 λ = 16，你有兩個方案：(a) 把單一 worker 升級成兩倍速（μ = 20）；(b) 再開一台一樣的 worker（各 μ = 10），流量用 message_id 雜湊對半分。兩個方案的 ρ 都是 0.8。分別算 E[T] 與 t₉₉，解釋差異的來源。（第三個方案「兩台共用一條佇列」是 ch09 的主角，先留個位子。）\n\n**第 4 題 [10 分鐘 ★★] PASTA 判官。**三種量測，各自合法估計了什麼？(i) 線上每個請求在自己到達瞬間記下眼前佇列深度（線上到達已通過 ch05 檢驗、近似 Poisson）；(ii) k6 固定 50 個 VU 的壓測，每個請求同樣記下到達瞬間的佇列深度；(iii) cron 每 10 秒對佇列深度取樣一次。哪些能估 πₙ？哪些能估「到達者需要等待的比例」？\n\n### 推演解答\n\n**解 1**：(a) 在 n 與 n+1 之間下刀：穩態下跨刀兩向機率流相等，πₙλ = πₙ₊₁μ ⇒ πₙ₊₁ = ρπₙ ⇒ πₙ = π₀ρⁿ。到這裡**還不需要** ρ < 1。正規化 Σπₙ = π₀·Σρⁿ = 1 才需要：幾何級數收斂（ρ < 1）時 π₀ = 1−ρ；ρ ≥ 1 時級數發散、π₀ 被迫為 0，平穩分布不存在——ρ < 1 的用途是讓「機率總和為 1」有解，它就是穩定條件本身。(b) 帳本一：E[N] = (1−ρ)Σnρⁿ = (1−ρ)·ρ/(1−ρ)² = ρ/(1−ρ)。帳本二：P(N ≥ n) = ρⁿ，故 E[N] = Σ(n≥1) ρⁿ = ρ/(1−ρ)。對齊 ✓。常見錯路：tail 求和從 n = 0 起跑（多算一個 1）——ch03 的 tail 公式是 Σ(n≥1) P(N ≥ n)。\n\n**解 2**：0.8² = 0.64 → 0.8⁴ = 0.4096 → 0.8⁵ = 0.328 → 0.8¹⁰ ≈ 0.107 → 0.8²⁰ ≈ **0.0115**；0.9² = 0.81 → 0.9⁴ ≈ 0.656 → 0.9⁵ ≈ 0.590 → 0.9¹⁰ ≈ 0.349 → 0.9²⁰ ≈ **0.122**。負載 +12.5%，深積壓機率 ×10.5。第二問：**不能直接當溢出率**。P(N ≥ 20) 是「無限 buffer 系統」站在 20 以上的時間比例；真把 buffer 截在 20，到達會被拒收、系統的動態整個改變（拒收降低了有效 λ，反而把分布往下壓），正確的模型是 M/M/1/K，blocking 機率另有公式（ch10）。ρⁿ 是個堪用的**量級**估計，不是精確答案——而且 ρ 越高兩者差越多。\n\n**解 3**：(a) 單台快機：E[T] = 1/(μ−λ) = 1/(20−16) = **0.25 s**，t₉₉ = 4.6052/4 ≈ **1.15 s**——雖然 ρ 沒變，延遲砍半。(b) 對半分流：每台是獨立的 M/M/1（λ = 8、μ = 10，分流定理 ch05 保證子流仍是 Poisson），E[T] = **0.5 s**、t₉₉ ≈ **2.30 s**——跟現在一模一樣，一毫秒都沒改善。差異來源：回應時間只看剩餘容量 μ−λ，方案 (a) 的剩餘容量是 4 則/s、方案 (b) 每台還是 2 則/s。同樣的 ρ，**規模大的系統天生佔便宜**——這就是規模經濟的佇列論雛形，也是「加機器就好」（審判 #2）案情複雜的原因：怎麼加，差很多。共用佇列方案落在兩者之間的哪裡，ch09 揭曉。\n\n**解 4**：(i) 到達近似 Poisson ⇒ PASTA 適用：請求自記的佇列深度直方圖**同時**估計 πₙ 與到達者視角（兩者相等正是 PASTA 的內容），「需等待比例」= 看到非空的比例 → ρ。(ii) 封閉迴路：到達時刻與系統狀態強相關，lack of anticipation 不成立——它量到的分布既不是 πₙ 也不是開放流量下的到達者視角，只能描述「這個壓測腳本自己的世界」（ch17 會給它正確的數學身分）。(iii) cron 取樣估的是**時間平均** πₙ（遍歷定理，與 PASTA 無關；前提是取樣週期與系統負載沒有共同節律、且窗口夠長）——但它**不是**到達者視角；恰好線上到達是 Poisson 時，兩者數值相等（PASTA 搭的橋），到達一旦不是 Poisson，(iii) 與真實體感就分道揚鑣。\n\n### Python 小實驗\n\n本書的**事件驅動模擬（DES）骨架**在此首次登場——之後 ch12／ch15／ch19 的模擬都是這個骨架換零件。只用標準函式庫；統計方法學（warmup、信賴區間、batch means）**刻意全部不做**，那是 ch19 的整章主題——今天先讓骨架跑起來、跟理論對上號。\n\nDES 的世界觀只有兩樣東西：**事件清單**（一個以時間排序的 heap，存「未來會發生什麼」）與**模擬時鐘**（不勻速流動，直接跳到下一個事件的時刻）。M/M/1 只有兩種事件：到達、離開。迴圈每一輪做三件事：從 heap 取出最早的事件 → 把時鐘撥到那一刻（途中 N 不變，順手把 N×經過時間累加進面積，這就是 E[N] 的時間平均）→ 處理事件：到達就排程下一個到達（heap 裡永遠恰好掛著一個未來到達）、伺服器閒著就立刻開工，否則進佇列；離開就記下這個工作的回應時間、從佇列拉下一個開工。\n\n```python\nimport heapq\nimport random\nimport statistics\n\nrandom.seed(42)\n\nLAM, MU = 8.0, 10.0   # arrival rate, service rate (jobs/s)\nN_JOBS = 200_000      # finished jobs before we stop\n\nevents = [(random.expovariate(LAM), 0, 0)]  # (time, kind, seq); kind: 0=arrival, 1=departure\nqueue = []            # arrival times of waiting jobs, FCFS order\nserving = None        # arrival time of the job now in service\nclock = area = 0.0    # simulation clock; integral of N(t) dt\nn_sys = seq = 0       # jobs in system; arrival sequence number\nsojourns = []         # response time T of each finished job\n\nwhile len(sojourns) < N_JOBS:\n    t, kind, _ = heapq.heappop(events)   # next event in time order\n    area += n_sys * (t - clock)          # N(t) was constant on [clock, t)\n    clock = t\n    if kind == 0:                        # --- arrival ---\n        seq += 1\n        heapq.heappush(events, (clock + random.expovariate(LAM), 0, seq))\n        if serving is None:              # server idle: service starts now\n            serving = clock\n            heapq.heappush(events, (clock + random.expovariate(MU), 1, seq))\n        else:\n            queue.append(clock)          # busy: join the FCFS queue\n        n_sys += 1\n    else:                                # --- departure ---\n        sojourns.append(clock - serving)\n        n_sys -= 1\n        serving = queue.pop(0) if queue else None\n        if serving is not None:          # pull next job, schedule its departure\n            heapq.heappush(events, (clock + random.expovariate(MU), 1, seq))\n\nsojourns.sort()\nprint(f\"E[N] (time average) = {area / clock:.3f}\")\nprint(f\"E[T] (mean)         = {statistics.mean(sojourns):.4f}\")\nprint(f\"P99 of T            = {sojourns[int(0.99 * N_JOBS)]:.3f}\")\n```\n\n理論值：E[N] = 4、E[T] = 0.5 s、P99 = t₉₉ ≈ 2.303 s。20 萬個工作（約 25,000 模擬秒）下，模擬值應落在 E[N] = 4 ± 0.3、E[T] = 0.5 ± 0.02、P99 = 2.30 ± 0.10——區間給得比你直覺的寬，因為相鄰工作的回應時間**高度相關**（同一段忙期裡的工作共享同一場塞車），有效樣本數遠小於 20 萬。兩個誠實聲明：①從空系統起跑會讓估計略偏低（暖機污染）；②上面的落點區間是經驗保守值，不是信賴區間——這兩件事怎麼正確處理，正是 ch19 的主題。\n\n想拷打它：把 LAM 改成 10.5（ρ = 1.05），看 E[N] 的「時間平均」隨模擬越長越大、永不收斂——暫態沒有穩態可言，模擬器比公式誠實，它直接演給你看。再試 LAM = 10.0（ρ = 1）：遊蕩得更曖昧，這就是零常返的體感。\n\n## 自我檢核\n\n1. M/M/1 這三個字元展開是哪七條合約？逐條講出你現在的系統最像哪裡、最不像哪裡。\n2. 闔上書，從 cut 推 πₙ = (1−ρ)ρⁿ。ρ < 1 在推導的哪一步登場、它跟「穩定」是什麼關係？\n3. E[T] 只看 μ−λ、E[N] 只看 ρ——兩句話為什麼同時成立而不矛盾？λ = 98、μ = 100 的系統跟基準系統哪些指標相同、哪些差很遠？\n4. 「P99 ≈ 4.6× 平均」的完整適用條件是什麼？三個會殺死它的假設破口各在哪一章結帳？\n5. PASTA 的精確敘述（含 lack of anticipation）是什麼？用 D/D/1 反例講清楚「到達者視角 ≠ 時間平均」可以差多遠。本章哪三步偷用了 PASTA、哪些結果完全不需要它？\n6. 「穩態」的三層意思是什麼？為什麼「穩態的系統佇列還是會衝高」不是矛盾？\n7. ρ = 1 與 ρ = 1.2 是兩種不同的病——病名各是什麼、症狀差在哪？過載時為什麼從吞吐量測不出 ρ > 1？\n8. 0.8 → 0.9 的對照表裡，為什麼 E[T] 與 t₉₉ 恰好都 ×2、E[N_Q] 卻 ×2.53？哪個告警指標對負載變化最敏感？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(2013) Ch.13 \"M/M/1 and PASTA\"（pp. 236–245）——本章的教科書對應章，PASTA 一節的習題值得做；書頁與試讀：https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Adan & Resing 的 M/M/1 講義（免費 PDF，5 頁：https://iadan.win.tue.nl/blockq/h3.pdf ，2026-06 驗證）——本章 T ~ Exp(μ−λ) 的 Erlang 混合推導與「mean value approach」（帳本二）都能在這裡找到最精簡的版本；完整講義見 https://www.win.tue.nl/~iadan/queueing.pdf\n- R.W. Wolff, \"Poisson Arrivals See Time Averages\", *Operations Research* 30(2): 223–231, 1982：https://pubsonline.informs.org/doi/abs/10.1287/opre.30.2.223 ——PASTA 的出生地；讀引言與定理敘述就值回票價，lack of anticipation 的精確形式在這裡。\n- D.G. Kendall, \"Stochastic Processes Occurring in the Theory of Queues and their Analysis by the Method of the Imbedded Markov Chain\", *Annals of Mathematical Statistics* 24(3): 338–354, 1953：https://projecteuclid.org/euclid.aoms/1177728975 ——A/S/c 記號的出處論文；標題裡的 imbedded Markov chain 是 ch12 的伏筆。\n- Kendall's notation（Wikipedia）：https://en.wikipedia.org/wiki/Kendall%27s_notation ——擴充欄位（/K/N/D，Kendall–Lee）與各欄慣例的速查；二手來源，歸屬細節以原始文獻為準。\n"}, {"id": "ch09-mmc-erlang", "file": "ch09-mmc-erlang.md", "group": "Part III — 生滅與經典模型", "title": "ch09 — M/M/c 與 Erlang 公式：池化的威力", "md": "# ch09 — M/M/c 與 Erlang 公式：池化的威力\n\n> **本章解決什麼問題**：ch08 的 M/M/1 只有一台機器，但你的世界裡 worker 永遠是一群。本章把 ch07 的生滅引擎裝上 c 台伺服器：推出 M/M/c 的平穩分布與 Erlang-C（等待機率）、用手算友善的遞迴拿下 Erlang-B（損失機率），並順著 Erlang 在哥本哈根機房遇到的原始問題，引入「沒位子就走」的損失系統。然後結兩樁懸案：共用佇列為什麼贏過獨立佇列、一台快機什麼時候贏過多台慢機；最後用 √a 緩衝把「pool 該開幾台」從經驗值升級成定理。位子有限但還能排幾個的中間地帶，ch10 接手。\n\n## 從你已知的出發\n\n你天天在做本章的決策，只是用的是儀表板而不是公式。SQS 的 consumer 要開幾個？autoscaling 的目標值要釘在哪？3,200 條 WebSocket 並發連線背後該配幾台推播 worker？你的做法大概是：抓歷史尖峰、乘個安全係數、上線盯 backlog，不夠再加。能動，但每一步都是經驗值——這章把它換成能推導、能質疑的東西。\n\n更重要的是一個你可能沒意識到自己做過的架構決策。「一條 SQS、四個 consumer 搶著領」與「按 user id hash 到四條 queue、各配一個 consumer」，在架構圖上只差一個分流器。本章會給這個差別標上精確的價格：同樣四台機器、同樣的總流量，hash 分流的平均延遲是共用佇列的 2.9 倍（0.5 s 對 0.175 s）。順序保證與 affinity 從來不是免費的，只是帳單以前沒寄到你手上。\n\n第三條線接 ch04 與 ch08。ch04 結尾算過「兩台 worker 全忙、你排第一」：你的等待是兩路殘餘指數的競賽、Exp(2μ)，當時就預告這個結構是本章的骨架。ch08 最後埋的陷阱題——流量翻倍、機器也翻倍，延遲會怎樣——也在本章結案，而答案會讓「使用率不要超過 80%」這條經驗法則的適用範圍開始動搖。\n\n## 把生滅引擎裝上 c 台機器：M/M/c\n\n模型設定：Poisson(λ) 到達、每台機器的服務時間獨立同分布 Exp(μ)、c 台同質機器共用**一條**佇列，誰空誰拿。狀態取「系統內人數 n」（含服務中），它構成生滅過程（ch07），只要把死亡率寫對：\n\n- n ≤ c 時，n 台機器各自忙著一個工作，下一次完工是 n 路獨立 Exp(μ) 的競賽——競賽引理（ch04）：min ~ Exp(nμ)。\n- n ≥ c 時，只有 c 台在做事，排隊的人不貢獻離開率，死亡率卡在 cμ。\n\n合起來：μₙ = min(n, c)·μ，λₙ ≡ λ。rate diagram：\n\n```text\n      λ          λ          λ          λ          λ          λ\n   ───────►  ───────►  ───────►  ───────►  ───────►  ───────►\n 0          1          2          ⋯        c         c+1        ⋯\n   ◄───────  ◄───────  ◄───────  ◄───────  ◄───────  ◄───────\n      μ         2μ         3μ         cμ         cμ         cμ\n```\n\n代入 ch07 的生滅通解 πₙ = π₀·Π(λᵢ/μᵢ₊₁)（i 從 0 到 n−1），分兩段（完整推導）：\n\n```text\nn ≤ c：分母 = μ·2μ·…·nμ = n!·μⁿ\n       πₙ = π₀ · (λ/μ)ⁿ/n! = π₀ · aⁿ/n!          ← a = λ/μ，offered load\nn ≥ c：超過 c 之後每一步都除以 cμ\n       πₙ = π_c · ρⁿ⁻ᶜ = π₀ · (aᶜ/c!) · ρⁿ⁻ᶜ      ← ρ = λ/(cμ) = a/c\n```\n\n正規化（幾何級數收斂要求 ρ < 1，這就是 ergodicity 條件，ch07）：\n\n```text\n1/π₀ = Σ aⁿ/n!（n = 0 到 c−1） + (aᶜ/c!)·1/(1−ρ)\n```\n\n這個分布是個混血兒：c 以下是 Poisson 形的權重（待會 M/M/∞ 會解釋為什麼）、c 以上是公比 ρ 的幾何尾（M/M/1 的形狀，ch08）：\n\n```text\n πₙ\n  │     *  *\n  │   *      *\n  │ *          *               ← n ≤ c：Poisson 形（像 M/M/∞）\n  │              *\n  │               *  *         ← n > c：幾何尾，每步乘 ρ（像 M/M/1）\n  │                     *  *\n  │                           *   *\n  └──────────────┴────────────────────►  n\n  0              c\n```\n\n兩個符號的分工值得停一秒。**a = λ/μ 是工作量**：由 Little's Law 套在「服務中」這一段（ch02 的 E[N_服務中] = ρ 的多機版），平均忙碌台數 = λ·E[S] = a——所以 a 的單位叫 erlang，讀作「平均需要幾台機器的活」。**ρ = a/c 是使用率**：每台機器平均忙碌的時間比例。穩態條件 ρ < 1 就是 c > a：開的機器要多過工作量，剩下的問題只是「多多少」——本章最後一節的主題。\n\n適用條件記在這裡，後面每個公式都繼承：Poisson 到達、指數服務、c 台同質、共用單一佇列、穩態 ρ < 1。其中 πₙ 對「排隊的人誰先上」不敏感（只要不偷看工作長度、不讓機器空等），但等待時間的**分布**推導用 FCFS。\n\n順帶回答一個 ch06 訓練過的問題：憑什麼狀態只記人數 n 就夠？兩個 M 各自無記憶——到達端不必記「離上次到達多久」、服務端不必記「每台已經做了多久」，所以 n 一個數字就裝下了未來需要的一切；連「忙的是哪幾台」都不用記，因為機器同質。這個狀態選擇在服務不是指數時整個崩潰（人數不再吃得下歷史），那是 ch12 的開場白。\n\n## Erlang-C：你會不會等、等多久\n\n到達的你需要排隊，當且僅當抵達瞬間 N ≥ c。到達者眼中的分布等於時間平均——這是 PASTA（ch08），Poisson 到達才有的特權：\n\n```text\nP(等待) = P(N ≥ c) = Σ πₙ（n ≥ c） = π_c·(1 + ρ + ρ² + …) = π_c/(1−ρ)\n```\n\n代入 π_c，得到本章第一個招牌公式 **Erlang-C**（延遲機率）：\n\n```text\n                  aᶜ/c! · 1/(1−ρ)\nC(c, a) = ─────────────────────────────────────── ，Σ 取 n = 0 到 c−1\n           Σ aⁿ/n!  +  aᶜ/c! · 1/(1−ρ)\n```\n\n先做兩個極限的體檢（自我複核的習慣）：c = 1 時分母只剩 1 + ρ/(1−ρ)，整式收成 C = ρ——正是 M/M/1 的 P(N ≥ 1) = ρ，舊結果是新公式的特例 ✓；反過來固定 a、讓 c → a⁺（機器剛好夠用），1/(1−ρ) 那一項炸大、C → 1，人人都得等 ✓。公式在兩端都接上了直覺，中間的值才值得信。\n\n光知道會不會等不夠，要知道等多久。以下是全章最值得抄一遍的推導（完整推導），它把 ch03–ch08 的工具各用一次：\n\n**第一步**：已知要等（N ≥ c），眼前佇列長度的條件分布。πₙ 在 n ≥ c 段是幾何的，條件化之後還是幾何：P(排在你前面有 j 人 | 等待) = (1−ρ)ρʲ。\n\n**第二步**：等待期間 c 台全忙（你還在等 ⇒ 你前面有人 ⇒ 沒有機器閒著），完工流是 c 路 Exp(μ) 的競賽，無記憶性讓它成為速率 cμ 的 Poisson 流（ch04 + ch05）。前面有 j 人時，你要等 **j+1 次完工**才輪到你開始服務。\n\n**第三步**：把幾何混合的 Erlang 和算出來。關鍵一招是 ch05 的計數對偶——「第 j+1 次完工晚於 t」等價於「t 內完工次數 ≤ j」：\n\n```text\nP(T_Q > t | 等待)\n  = Σⱼ (1−ρ)ρʲ · P(t 內完工 ≤ j 次)                ← j 從 0 到 ∞\n  = Σₖ P(t 內完工 k 次) · Σⱼ≥ₖ (1−ρ)ρʲ             ← 交換求和順序\n  = Σₖ e^(−cμt)·(cμt)ᵏ/k! · ρᵏ                      ← 內層幾何和 = ρᵏ\n  = e^(−cμt) · e^(cμρt)\n  = e^(−cμ(1−ρ)t) = e^(−(cμ−λ)t)\n```\n\n條件等待是乾淨的指數：T_Q |等待 ~ Exp(cμ−λ)，跟 M/M/1 的 T ~ Exp(μ−λ) 同一個家族，只是速率換成「總完工率減總到達率」。於是全套指標出列：\n\n```text\nE[T_Q] = C(c,a) · 1/(cμ−λ)                ← 等的機率 × 等的人平均等多久\nP(T_Q > t) = C(c,a) · e^(−(cμ−λ)t)        ← 等待的 tail，FCFS\nE[T]   = E[T_Q] + 1/μ\nE[N_Q] = λ·E[T_Q] = C(c,a)·ρ/(1−ρ)        ← Little 套佇列\nE[N]   = E[N_Q] + a                        ← Little 套服務段\n```\n\n每一步的工具來歷：PASTA 換掉「到達者視角」、幾何級數（ch03）收尾、競賽引理（ch04）給 cμ、計數對偶（ch05）拆 Erlang 和、Little（ch02）把時間與人數互換。這條推導鏈是紙上推演第 3 題的考題。\n\n## 哥本哈根的機房：損失系統與 Erlang-B\n\n1908 年，A.K. Erlang 以科學協作者的身分加入哥本哈根電話公司，主持新成立的物理技術實驗室，領到的題目是把機率論用在「電話呼叫的等待問題」上。具體的工程問題長這樣：兩個交換局之間拉 c 條中繼線，銅線昂貴，開太多浪費、開太少接不通——而當 c 條全忙時，新呼叫聽到忙音、直接消失。**沒位子就走、不排隊**：這類系統叫**損失系統（loss system）**，跟前面「無限排隊」正好是光譜的兩端（位子有限但能排幾個的中間地帶，連同丟棄與逾時的權衡，見 ch10）。\n\nErlang 1909 年先證明隨機呼叫流服從 Poisson 分布並部分解決延遲問題；1917 年給出損失公式與等待時間公式——就是本章的 Erlang-B 與 Erlang-C——很快被各國電話公司採用，包括英國郵政總局。1946 年，國際標準機構把話務量單位命名為 erlang 以紀念他（a 的單位就是這麼來的）。誠實註記：說「Erlang 發明排隊理論」並不精確——他解的是電話工程的具體問題；排隊理論作為一般化學科，是 1950 年代 Kendall（1953 記號）、Lindley（1952）等人建制起來的。\n\n損失系統的模型是 **M/M/c/c**（Kendall 記號第四欄：系統容量也是 c）：生滅鏈砍在 c——λₙ = λ（n < c）、滿了到達率歸零；μₙ = nμ。通解同前段，只是正規化變有限和：\n\n```text\nπₙ = (aⁿ/n!) / Σ aᵏ/k!（k = 0 到 c），  n = 0, 1, …, c\n```\n\n注意**沒有穩態條件**：a 再大都穩定，損失系統永遠活著，代價付在丟掉的呼叫上。被擋掉的呼叫比例 = 到達者看到全滿的機率 = π_c（又是 PASTA；它在 blocking 場景的精確用法 ch10 細談）。這就是 **Erlang-B**（損失機率）：\n\n```text\nB(c, a) = (aᶜ/c!) / Σ aᵏ/k!（k = 0 到 c）\n```\n\n直接算要疊階乘，c 一大，aᶜ 與 c! 在計算上雙雙爆掉（兩者相除才有限）。手算與程式都該用遞迴。令 I(c) = 1/B(c, a)，從定義出發（完整推導）：\n\n```text\n1/B(c,a) = Σ aᵏ/k! · c!/aᶜ（k = 0 到 c）\n         = 1 + (c/a) · Σ aᵏ/k! · (c−1)!/aᶜ⁻¹（k = 0 到 c−1）   ← 拆出 k = c 項，餘項提出 c/a\n         = 1 + (c/a) · 1/B(c−1, a)\n```\n\n也就是 **I(0) = 1、I(c) = 1 + (c/a)·I(c−1)**：每多一台機器，一乘一加。\n\n### Worked example：a = 3.2 的手算全程 → Erlang-C → E[T_Q]\n\n基準場景：尖峰 λ = 32 則/s、單 worker μ = 10 則/s，所以 a = 3.2 erlang——平均要 3.2 台機器的活，至少開 4 台才穩。先把 c/a 備好：1/3.2 = 0.3125、2/3.2 = 0.625、3/3.2 = 0.9375、4/3.2 = 1.25。遞迴跑四步：\n\n```text\nI(0) = 1\nI(1) = 1 + 0.3125·1      = 1.3125    → B(1) = 0.762\nI(2) = 1 + 0.625·1.3125  = 1.8203    → B(2) = 0.549\nI(3) = 1 + 0.9375·1.8203 = 2.7065    → B(3) = 0.369\nI(4) = 1 + 1.25·2.7065   = 4.3832    → B(4) = 0.228\n```\n\n讀法：如果推播 worker 是損失系統（滿了就丟），1 台會丟掉 76.2% 的訊息、4 台還是丟 22.8%——損失系統對容量非常飢渴，這個數字 ch10 會再回來鞭。\n\n但我們的 worker 會排隊，要的是 Erlang-C。兩個公式分母只差一項，代數整理可得轉換式（完整推導）：\n\n```text\n記 S = Σ aᵏ/k!（k = 0 到 c）、x = aᶜ/c!，則 B = x/S，而\nC = (x/(1−ρ)) / (S − x + x/(1−ρ))      ← C 的分母 = S 把第 c 項換成放大版\n  = x / ((S−x)(1−ρ) + x)               ← 上下同乘 (1−ρ)\n  = B / ((1−B)(1−ρ) + B)               ← 上下同除 S\n  = B / (1 − ρ(1−B))\n```\n\n代入 ρ = 0.8、B(4, 3.2) = 0.228145：\n\n```text\nC(4, 3.2) = 0.228145 / (1 − 0.8·0.771855)\n          = 0.228145 / 0.382516\n          = 0.596\n```\n\n到達的訊息有 59.6% 要排隊。等多久？cμ − λ = 40 − 32 = 8/s：\n\n```text\nE[T_Q] = 0.596/8 = 74.6 ms\nE[T]   = 74.6 ms + 100 ms = 175 ms\n```\n\n自我複核走另一條路：E[N_Q] = C·ρ/(1−ρ) = 0.596·4 = 2.39，E[N] = 2.39 + 3.2 = 5.59，Little 給 E[T] = 5.59/32 = 175 ms ✓。再給兩個 tail 視角：等的人平均等 1/8 s = 125 ms；P(T_Q > 0.5 s) = 0.596·e⁻⁴ ≈ 1.09%——平均看起來無害，但門檻一畫，百分之一的訊息等超過半秒，SLA 要不要收這個由你決定，數學只負責把它算出來。\n\n最後一句話的預告：Erlang-B 還有個本章不展開的超能力——它對服務時間分布**不敏感（insensitive）**，M/G/c/c 的損失機率只透過 E[S] 依賴服務分布，直方圖長什麼樣都行（為什麼，見 ch13 的 insensitivity 與 ch18 的 BCMP）。Erlang-C **沒有**這個性質。這個不對稱是陷阱表的常客。\n\n## M/M/∞：人人自帶一台機器\n\n把 c 推到無限大：μₙ = nμ 對所有 n 成立、永遠不用排隊。通解的正規化變成 Σ aⁿ/n! = eᵃ（指數級數，ch03 的老朋友），於是：\n\n```text\nπₙ = e⁻ᵃ · aⁿ/n!     ——  N ~ Poisson(a)\n```\n\n系統內人數是不折不扣的 Poisson 分布：E[N] = a、Var(N) = a、T_Q ≡ 0、E[T] = E[S]，任何 λ 都穩定。這解釋了 M/M/c 分布前半段的 Poisson 形——c 還沒用完之前，系統的行為跟機器無限多沒有兩樣；也解釋了 M/M/c/c 的平穩分布為什麼是「截斷的 Poisson」。\n\n它模什麼？所有「沒有資源競爭、即到即服務」的階段：3,200 條 WebSocket 並發連線（人數 = 連線數、「服務」= 連線存續時間，E[N] = λ·E[存續] 直接給你容量帳）、ch17 封閉網路裡的 think time 站。而且 M/G/∞ 同樣給 Poisson(a)——insensitivity 家族的另一員。\n\n但 M/M/∞ 在本章真正的任務是當一把尺：**如果機器無限多，忙碌台數的平均是 a、標準差是 √a**。記住這個 √a，最後一節靠它吃飯。\n\n## 池化三連比：獨立佇列、共用佇列、一台快機\n\n先結 ch08 的懸案。流量翻倍、機器也翻倍（λ = 16、c = 2、μ = 10）：ρ 還是 0.8，但 E[T] 從 0.5 s 降到 0.278 s（C(2, 1.6) = 0.711，E[T_Q] = 0.711/4 = 178 ms）。**同樣的使用率，池子越大延遲越低。**這不是巧合，是本節與下一節的主旋律。\n\n現在上主菜。同樣的總流量 λ = 32 則/s、同樣的總容量 40 則/s，三種架構：\n\n- **(a) hash 分流四條獨立佇列**：4 × M/M/1，各 λ = 8、μ = 10——ch08 基準原樣。這裡有一步常被略過的嚴謹：憑什麼每條子流還是 Poisson？因為 hash 對到達流做的是機率分流，thinning 定理（ch05）保證每條子流是獨立的 Poisson(8)——「各是 M/M/1」不是近似，是定理。\n- **(b) 共用佇列**：M/M/4，本章 worked example。\n- **(c) 一台四倍快機**：M/M/1，λ = 32、μ = 40（E[S] = 25 ms）。\n\n| 指標 | (a) 4 × M/M/1 | (b) M/M/4 共用佇列 | (c) 快機 M/M/1 |\n|---|---|---|---|\n| ρ | 0.8 | 0.8 | 0.8 |\n| E[S] | 100 ms | 100 ms | 25 ms |\n| P(等待) | 0.8 | 0.596 | 0.8 |\n| E[T_Q] | 400 ms | 74.6 ms | 100 ms |\n| E[T] | **500 ms** | **175 ms** | **125 ms** |\n| E[N]（全系統） | 16 | 5.59 | 4 |\n\n（(a)、(c) 的 P(等待) = P(N ≥ 1) = ρ，PASTA；(c) 的 E[T_Q] = ρ/(μ−λ) = 0.8/8，ch08。）\n\n**(a) → (b)：池化的威力。**硬體一樣、使用率一樣，只改了拓撲，E[T] 砍 2.9 倍、E[T_Q] 砍 5.4 倍。浪費在哪被消滅了？獨立佇列容許「2 號機前排著五個人、3 號機在發呆」這種荒謬同時發生：(a) 中任一台機器閒著的機率是 0.2，平均有 0.8 台機器閒置，同時平均 12.8 人在排隊。共用佇列把「有人等且有機器閒」這個事件**邏輯上**消滅——不是調參調掉的，是結構上不可能。這正是「一條 SQS 多個 consumer」（天生共用佇列）與「按 user hash 拆四條 queue」（獨立佇列）的差價。真實的 load balancer（輪詢、隨機）落在兩者之間；join-the-shortest-queue 已非常接近 (b)，而「隨機問兩台、選短的」這手便宜魔法留給 ch21。\n\n**(b) vs (c)：快機的勝負帳。**快機總回應贏（125 對 175 ms），但拆開看：E[T] = E[T_Q] + E[S]，快機是 100 + 25，M/M/4 是 74.6 + 100。**等待是 M/M/4 短**——四台一起清佇列，59.6% 的人要等對上 80%；快機贏在服務本身快四倍，把省下的 75 ms 服務時間拿去抵銷多付的 25 ms 等待還有剩。在 M/M 世界裡這是通則：同 ρ 之下單台快機的 E[T] = 1/(cμ−λ)，永遠 ≤ M/M/c 的 C/(cμ−λ) + 1/μ。低負載時贏最多（沒人排隊，比的就是 E[S]，差距 c 倍）；ρ → 1 時兩者都被 1/(cμ−λ) 主宰，差距相對消失——ρ = 0.95 時是 0.5 s 對 0.546 s，只剩 9%。\n\n**裁決：一台快機 vs 多台慢機。**指數服務、看平均、機器不壞：快機贏。但現實有三張扣分卡：\n\n1. **故障域**。快機一掛是 100% 容量蒸發；pool 掛一台剩 75%——雖然在 a = 3.2 之下剩三台意謂 ρ > 1、得靠丟棄硬撐（ch10），但「降級」與「全黑」是兩種人生。還有部署：pool 能 rolling restart，單機只能停機或加倍買藍綠。\n2. **搶占與變異數**。FCFS 快機上一個 30 秒的巨型工作會 head-of-line 堵死後面所有人；pool 裡它只佔走 1/c 的容量，短工作從旁邊流走。指數服務把這個風險定價得很溫和，重尾的現實（ch15）會狠狠放大它。反過來說，若快機能搶占（PS／time-slicing），優勢又被它搶回去——這場恩怨 ch13 開庭。\n3. **採購現實**。四倍快的機器常常不存在、或貴得超線性；scale-out 是唯一能一直走下去的路。\n\n一句話版本：**平均延遲投快機，工程現實投 pool；而只要你用了 pool，請務必共用佇列。**\n\n## √a 緩衝：square-root staffing 與 QED\n\n工作量 a 已知，c 該開幾台？兩個直覺答案都錯：c = a 是 ρ = 1，爆炸（ch08）；c = a/0.8——「使用率不要超過 80%」的線性思維——對小 pool 浪費感受不深，對大 pool 是燒錢。正確的縮放是：\n\n```text\nc ≈ a + β·√a        （β 是你選的服務品質旋鈕，常在 1 上下）\n```\n\n為什麼是 √a？直覺版推導（本書不證，嚴格版指路）：用 M/M/∞ 那把尺——機器無限多時，忙碌台數 ~ Poisson(a)，平均 a、標準差 √a，a 大時近似常態。需求的自然波動是 **√a 級**，不是 a 的固定比例；開 a + β√a 台，就是把波動的 β 個標準差擋在「全忙」之外。緩衝該按波動定價，而波動長得比工作量慢——這就是規模經濟的數學來源。\n\n用精確的 Erlang-C 驗證這個直覺（β = 1，c = a + √a，全部重算）：\n\n| a | c = a + √a | ρ = a/c | P(等待)（Erlang-C） |\n|---|---|---|---|\n| 4 | 6 | 0.667 | 0.285 |\n| 25 | 30 | 0.833 | 0.250 |\n| 100 | 110 | 0.909 | 0.237 |\n| 400 | 420 | 0.952 | 0.230 |\n| 10,000 | 10,100 | 0.990 | 0.225 |\n\n等待機率釘在四分之一附近不動，使用率卻一路爬到 99%。這個現象的正式版本是 **QED regime**（Quality- and Efficiency-Driven）：Halfin & Whitt（1981）證明，當 c 與 λ 一起放大、保持 (1−ρ)√c → β（等價於 c ≈ a + β√a），P(等待) 收斂到一個只依賴 β、嚴格介於 0 與 1 之間的極限——上表的 0.285 → 0.225 正在逼近 β = 1 的極限（約 0.22）。品質與效率，√a 讓你兩個都拿。\n\n歸屬的誠實註記（容易被誤傳）：√ 法則本身是電話工程的老經驗，可上溯至 Erlang 的年代；Halfin–Whitt 1981 給的是 many-server 極限**定理**；把「該開 a + β√a 台」當最佳化問題嚴格證成的是 Borst–Mandelbaum–Reiman 2004。β 怎麼選沒有通用值——它是「機器的錢」對「等待的痛」的匯率，等待越貴 β 越大。\n\n對「80% 警戒線」的判決於是有了細則：它隱含的對手是小 pool。c = 4 時 ρ = 0.8 已經給你 59.6% 的等待機率，警戒有理；c = 10,100 時 ρ = 0.99 仍然體面。**使用率上限不是常數，是 pool 大小的函數**——pool 越小，每一分使用率越貴。完整結案在 ch20。\n\n最後把適用條件釘上：Poisson 到達（尖峰時段內近似平穩——非平穩的 λ(t) 用 busy hour 流量餵 a，這是電話工程百年的老紀律）、同質機器、指數服務給出表中的精確值（一般服務下 QED 的結構仍在，數值修正的方向見 ch14）。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與自我察覺 |\n|---|---|---|\n| 有 c 台機器 ≠ M/M/c | 公式假設單一共用佇列、誰空誰拿；hash 分流其實是 c 個獨立 M/M/1，同樣硬體 E[T] 差 2.9 倍。拿 175 ms 的模型去規劃 500 ms 的架構，容量帳全錯 | 先看路由：consumer 主動領（拉式）≈ 共用佇列；hash／sticky 推式 ≈ 獨立佇列；輪詢落在中間 |\n| 把 ρ 餵進 Erlang 公式 | 遞迴吃的是 a = λ/μ（erlang 數），不是 ρ = a/c；餵 0.8 算出來的是「0.8 erlang 小系統」的答案，c 越大錯得越離譜 | a 可以遠大於 1、ρ 必須小於 1——發現餵進公式的數字永遠小於 1，先停下來查單位 |\n| Erlang-C 假設沒人放棄 | 真實呼叫者會掛斷、請求會 timeout：高負載下放棄是天然洩壓閥，Erlang-C 系統性高估壅塞，照它 staffing 會超編 | 監控裡有 abandonment／timeout 而模型裡沒有，模型就錯了一邊；M/M/c+M（Erlang-A）見 ch10 |\n| 服務分布不是指數 | Erlang-C 對服務分布**敏感**：等待大致按 (1+C²ₛ)/2 縮放（ch12/ch14），C²ₛ = 10 時低估 5.5 倍；Erlang-B 反而 insensitive——兩條最容易記反 | 口訣：**loss 看均值就夠，delay 要看變異數**。動手前先量 C²ₛ（ch03） |\n| B 與 C 拿錯場景 | 系統會排隊卻用 Erlang-B（低估壅塞——被「擋掉」的人其實在排隊堆積）；滿了就丟卻用 Erlang-C（在 a ≥ c 時根本算不出來，公式要求 ρ < 1，而損失系統偏偏常開在 a > c） | 先問一句：「滿了之後，工作去哪？」消失 → B；等待 → C；等一陣子放棄 → 都不對，ch10 |\n| 「c 台同質」是假設 | 混 instance 世代、noisy neighbor、冷啟動中的 worker，讓有效 μ 參差：名目 c 台 ≠ 有效 c 台，公式給樂觀值 | 看 per-worker 吞吐直方圖；差異大時用保守的有效容量重算，或交給模擬（ch19） |\n| 拿全日平均 λ 算 staffing | λ(t) 非平穩（ch05）：用平均流量算出的 c，在尖峰時段必塌 | 用最忙時段（busy hour）的 λ 當 a 的輸入；尖峰差異大就分時段 staffing |\n\n## 紙上推演\n\n**第 1 題 [15 分鐘 ★★]**：λ = 2、μ = 1（a = 2）。用遞迴手算 B(1, 2)、B(2, 2)、B(3, 2)，轉成 Erlang-C C(3, 2)，再算 E[T_Q]。對照：同容量單台快機（μ = 3）的 E[T_Q] 是多少？哪邊等得短？\n\n**第 2 題 [10 分鐘 ★★]**：承 worked example（a = 3.2），SLA 要求 P(等待) < 0.2，至少要開幾台？把遞迴從 I(4) 繼續往下算。\n\n**第 3 題 [15 分鐘 ★★★]**：闔上書，重講「M/M/c 條件等待 ~ Exp(cμ−λ)」的完整推導。要求指出：幾何分布從哪來、cμ 憑什麼在整段等待期間都成立、j+1 的 +1 是什麼、交換求和那一步在做什麼。\n\n**第 4 題 [10 分鐘 ★★]**：「拆 pool 一定變差嗎？」用本章結果先給 M/M 世界的答案，再找出這個「一定」綁定的假設——什麼樣的工作組成會讓「拆出一個專用 pool」反而合理？（提示：ch13 的排程基準裡有 90% 短工作、10% 長工作。）\n\n### 推演解答\n\n**第 1 題**：c/a 依次 = 0.5、1、1.5。遞迴：\n\n```text\nI(0) = 1\nI(1) = 1 + 0.5·1   = 1.5     → B(1) = 2/3 ≈ 0.667\nI(2) = 1 + 1·1.5   = 2.5     → B(2) = 0.400\nI(3) = 1 + 1.5·2.5 = 4.75    → B(3) = 4/19 ≈ 0.211\n```\n\n轉 Erlang-C（ρ = 2/3）：C = B/(1 − ρ(1−B)) = (4/19)/(1 − (2/3)(15/19)) = (4/19)/(9/19) = **4/9 ≈ 0.444**。E[T_Q] = C/(cμ−λ) = (4/9)/(3−2) = 0.444（單位是平均服務時間 1/μ）。快機 M/M/1（μ = 3、λ = 2）：E[T_Q] = ρ/(μ−λ) = (2/3)/1 = 0.667——**等待還是 pool 短**（0.444 對 0.667），與三連比的結論一致；快機贏的是 E[S] 那一段。常見錯路：把 ρ = 2/3 餵進遞迴（陷阱表第 2 條），或忘了 E[T_Q] 的分母是 cμ−λ 而不是 μ−λ。\n\n**第 2 題**：繼續遞迴（c/a：5/3.2 = 1.5625、6/3.2 = 1.875）：\n\n```text\nI(5) = 1 + 1.5625·4.3832 = 7.849    → B(5) = 0.127\nI(6) = 1 + 1.875·7.849   = 15.72    → B(6) = 0.0636\n```\n\nC(5, 3.2)：ρ = 0.64，C = 0.127/(1 − 0.64·0.873) = 0.127/0.442 = **0.289** > 0.2，不夠。\nC(6, 3.2)：ρ = 0.533，C = 0.0636/(1 − 0.533·0.936) = 0.0636/0.501 = **0.127** < 0.2，達標。答案：**6 台**。順帶看邊際收益：c = 5 時 E[T_Q] = 0.289/18 = 16.0 ms、c = 6 時 = 0.127/28 = 4.54 ms——從 4 台的 74.6 ms 起，每加一台等待砍好幾倍，但 P(等待) < 0.2 這個門檻本身是 SLA 的選擇，不是數學的命令。\n\n**第 3 題**：推導鏈四個零件。①幾何分布：πₙ 在 n ≥ c 段是公比 ρ 的幾何（生滅通解的直接後果），條件在「N ≥ c」上仍是幾何——P(前面 j 人 | 等待) = (1−ρ)ρʲ；到達者看得到這個分布，靠 PASTA。②cμ 全程成立：你還在等 ⇒ 你前面有人 ⇒ c 台全忙；無記憶性讓「全忙時的完工流」是速率 cμ 的 Poisson 流，與歷史無關（競賽引理）。③+1：第 j+1 次完工才輪到你**開始服務**——前面 j 人各離開一次、再加一台空出來給你；少算這個 +1 是最常見的錯。④交換求和：把「幾何個 Erlang 相加」翻成「對 Poisson 計數條件化」（第 j+1 次完工晚於 t ⟺ t 內完工 ≤ j 次），內層收成幾何和 ρᵏ，外層收成 e 的指數級數——兩個 ch03 的級數各用一次，指數分布就掉出來了。\n\n**第 4 題**：M/M 世界（工作同質、同 μ）：拆 pool 一定變差——三連比 (a) 對 (b)，同硬體 E[T] 差 2.9 倍，因為拆開後「有人等且有機器閒」變得可能。但「一定」綁在**工作同質**上。若服務高變異（90% 短、10% 長），共用 pool 裡幾個長工作可能同時佔滿全部 c 台，短工作集體陪葬（ch12 的 inspection paradox 會量化這件事）；拆出「短工作專用 pool」等於用拓撲實作一個窮人版的優先權排程——犧牲池化效率，買回變異數隔離。誰划算取決於 C²ₛ 與負載：同質工作永遠共用；重尾混合工作，最好的解是「共用＋會看長度的排程」（ch13 的 SRPT 戰場），排程動不了手才用拆 pool 硬隔（ch15 結案）。\n\n## 自我檢核\n\n1. μₙ = min(n, c)·μ 拆開是哪兩個事實？各靠 ch04 的哪個引理撐著？\n2. Erlang-C 推導裡 PASTA 用在哪一步？如果到達是等距的（D/M/c），P(N ≥ c) 還等於到達者的等待機率嗎？\n3. 重講「條件等待 ~ Exp(cμ−λ)」：幾何從哪來、cμ 憑什麼全程成立、交換求和那步在做什麼？\n4. Erlang-B 的遞迴式長什麼樣？從直接公式推一遍，並說出它在數值上贏過直接公式的理由。\n5. 池化為什麼贏：哪一類事件在共用佇列裡被結構性消滅了？三連比裡快機贏了哪個指標、輸了哪個？\n6. 為什麼 staffing 緩衝是 √a 級、不是 a 的固定比例？這對「80% 警戒線」的適用範圍說了什麼？\n7. Erlang-B 與 Erlang-C 哪個對服務分布不敏感？記反的人在 C²ₛ = 10 的系統上，做 loss 規劃與 delay 規劃各會犯什麼錯？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013)，Ch. 14 \"Server Farms: M/M/k and M/M/k/k\" 與 Ch. 15 \"Capacity Provisioning for Server Farms\"——本章的教科書對應；Ch. 15 把 square-root staffing 講得比本章直覺版完整一層。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Adan & Resing,《Queueing Systems》講義（TU Eindhoven），Ch. 5 \"M/M/c queue\" 與 §11.2–11.3（M/G/c/c 與 B(c, ρ) 的穩定遞迴）——免費 PDF；§11 正是「Erlang-B insensitive」的教材級出處，等待分布的推導也可拿來對答案。https://www.win.tue.nl/~iadan/queueing.pdf\n- Marc Brooker, \"Surprising Economics of Load-Balanced Systems\"（2020-08-06）——用 Erlang-C 講「大 pool 可以跑很熱」的工程部落格，本章三連比與 √a 表的實戰版。https://brooker.co.za/blog/2020/08/06/erlang.html\n- Halfin & Whitt, \"Heavy-Traffic Limits for Queues with Many Exponential Servers\", *Operations Research* 29(3), 1981——QED 極限定理原文；想看 β 與極限等待機率的精確函數關係從這裡進。https://ideas.repec.org/a/inm/oropre/v29y1981i3p567-588.html\n- Borst, Mandelbaum & Reiman, \"Dimensioning Large Call Centers\", *Operations Research* 52(1), 2004——把「β 怎麼選」寫成成本最佳化並嚴格證成 √ 法則的論文。https://ideas.repec.org/a/inm/oropre/v52y2004i1p17-34.html\n- MacTutor Mathematics Archive, \"Agner Krarup Erlang\"——1908 年入職哥本哈根電話公司到 1917 年公式的史料底本。https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/\n"}, {"id": "ch10-finite-capacity", "file": "ch10-finite-capacity.md", "group": "Part III — 生滅與經典模型", "title": "ch10 — 有限容量與不耐煩：backpressure 的定理", "md": "# ch10 — 有限容量與不耐煩：backpressure 的定理\n\n> **本章解決什麼問題**：ch08 的 M/M/1 有一個沒人會買單的假設——佇列無限長。真實系統處處是牆：bounded channel、connection pool 上限、會逾時放棄的客戶端、rate limiter。本章把牆蓋進模型：M/M/1/K 讓 ρ > 1 第一次合法、blocking 機率與 goodput 把 load shedding 變成可以算的定理、Erlang-A 給 timeout 一個數學身分、token bucket 與 leaky bucket 拿到佇列論戶口。ch09 給你更多伺服器、本章給你更少容量，合起來才是完整的設計空間；有限母體一段是 ch17 封閉網路的種子，整形壓低 C²ₐ 是 ch14 的伏筆。\n\n## 從你已知的出發\n\n你架過的每一道防線，其實都是這一章：Node.js stream 的 highWaterMark 是一面牆，寫入超過水位就回 false 叫上游收手；nginx 的 `max_conns` 是一面牆，超出的連線直接失敗（或進一條有限的等待佇列，逾時回 502）；你給 SQS consumer 設的 prefetch 上限是牆；回 429 的 rate limiter 是牆；客戶端的 timeout 加 DLQ，是「等不下去的人」的制度化。\n\n但我猜你心裡有一條沒驗證過的道德律：**丟請求＝失敗＝可恥**。每次設計 load shedding 都像在認輸。本章要用推導翻案：在持續過載下，「不丟」這個選項根本不存在——無限 buffer 只是把丟棄改名叫遲到。本章的 worked example 會給你看一個 λ = 12、μ = 10 的過載系統（offered load 超出容量 20%），靠著丟掉 19.3% 的到達，給倖存者 0.693 秒的回應時間與接近滿載的吞吐——**過載系統靠丟棄活著，而且活得有模有樣**。「buffer 開大一點就好」這句機房黑話，本章開庭、給出判決（ch20 的審判總表會結案）。\n\n還有一條 ch08 留下的尾巴。ch08 說 ρ ≥ 1 沒有穩態、佇列發散——可是你的系統過載時並沒有消失在數學的虛空裡，它在丟東西、在逾時、在自我節流。不是定理錯了，是模型少了牆。把牆蓋回去，ρ > 1 就從「禁區」變成「日常」，而且算得乾乾淨淨。\n\n## M/M/1/K：把牆蓋進模型裡\n\n模型設定：到達 Poisson(λ)、服務 Exp(μ)、單一伺服器、FCFS，系統**最多容納 K 個**（含服務中那一個）。滿了之後的到達**直接消失**——不排別處、不重試（重試是 feedback，另一隻怪物，見 ch16 與 ch20）。Kendall 記號 A/S/c/K 的第四格（ch08）終於派上用場。狀態取 n＝系統內人數，生滅率：\n\n```text\nλₙ = λ（n = 0, …, K−1）、λ_K = 0（牆）\nμₙ = μ（n = 1, …, K）\n```\n\n```text\n            λ                λ                    λ\n      ┌─────┐ ─────► ┌─────┐ ─ ... ─► ┌─────┐\n      │  0  │        │  1  │          │  K  │ ──X 滿了：到達被丟（rate λ·π_K）\n      └─────┘ ◄───── └─────┘ ◄─ ... ─ └─────┘\n            μ                μ                    μ\n```\n\n這是 ch07 生滅機器的標準客戶。在 n 與 n+1 之間下一刀（local balance）：\n\n```text\nλ·πₙ = μ·πₙ₊₁   ⇒   πₙ₊₁ = ρ·πₙ，其中 ρ = λ/μ\n⇒ πₙ = ρⁿ·π₀（n = 0, …, K）\n```\n\n到這一步跟 ch08 一字不差——牆只改了一件事：**正規化從無窮級數變成有限和**（完整推導，ρ ≠ 1）：\n\n```text\n1 = π₀·(1 + ρ + ρ² + … + ρ^K) = π₀·(1−ρ^{K+1})/(1−ρ)   ← ch03 的有限幾何和\n⇒ π₀ = (1−ρ)/(1−ρ^{K+1})\n⇒ πₙ = (1−ρ)·ρⁿ/(1−ρ^{K+1})，n = 0, …, K\n```\n\nρ = 1 時分子分母同歸於零，回頭看原式：πₙ = π₀ 對所有 n，正規化給 **πₙ = 1/(K+1)**——均勻分布。\n\n三件值得停下來看的事：\n\n**第一，ρ > 1 合法了。**ch08 需要 Σρⁿ 收斂，所以 ρ < 1 是生死線；這裡的和永遠是 K+1 項，無條件有限。更深一層：有限、不可約的 CTMC 必有唯一平穩分布（ch06／ch07 的存在唯一定理在有限狀態空間無條件成立）——**穩定性的全部工作都由牆承擔了**。連 ρ = 1 都從 ch08 的零常返病態（見 ch08）變成最無聊的均勻分布。\n\n**第二，幾何形狀會翻轉。**ρ < 1 時 πₙ 遞減、機率堆在 0 那端（跟 M/M/1 同款）；ρ = 1 時均勻；ρ > 1 時 πₙ **遞增**、機率堆在牆邊——過載系統大部分時間幾乎是滿的，偶爾才透一口氣。同一條公式，三種人生。\n\n**第三，ρ 的語義裂開了。**在 M/M/1，ρ = λ/μ 同時是「公式參數」與「伺服器忙的時間比例」（使用率），兩個身分重合（ch08）。在 M/M/1/K 它們分家：ρ 只剩公式參數，**真正的使用率是 1−π₀**，永遠小於 1——連 λ = 12 的過載系統，伺服器也只忙 96.9% 的時間（數字見 worked example）。說「這個系統 ρ = 1.2」不再表示「忙 120% 的時間」，只表示「offered load 超出容量 20%」。\n\n## blocking、λ_eff 與 goodput：PASTA 的正確用法\n\n**π_K 有兩個身分**，而它們相等需要一條定理。身分一（時間平均）：系統處於滿狀態的長期時間比例。身分二（到達者視角）：一個到達被擋在門外的長期比例。這兩件事在一般系統**不相等**——ch08 的反例還熱著：等距到達的系統，每個到達都看到空系統，但系統忙的時間比例可以很高。\n\n把它們黏起來的是 **PASTA**（Wolff 1982，敘述與證明思路見 ch08）：到達是 Poisson、且到達不偷看系統狀態（lack of anticipation），則到達者看到的狀態分布＝時間平均分布。M/M/1/K 兩個條件都滿足，所以：\n\n```text\nP(到達被擋) = π_K（精確，不是近似）\n```\n\n先掛出本章的 PASTA 陣亡名單，後文各自驗屍：**有限母體**（到達率隨狀態變，lack of anticipation 直接死）、**整形後的流**（不再 Poisson）。PASTA 是定理不是反射動作。\n\n**有效到達率**：被擋的客人永遠離開，真正進入系統的速率是\n\n```text\nλ_eff = λ·(1 − π_K)\n```\n\n進得來的都會被服務完（系統有限、FCFS、沒有人能卡到永遠），所以穩態吞吐 throughput = λ_eff。複核這件事有一條漂亮的恆等式——穩態下流入必等於流出：\n\n```text\nλ·(1 − π_K) = μ·(1 − π₀)\n左邊：門口放行的速率；右邊：伺服器有人可服務的時間比例 × 服務率\n代數驗證：兩邊同除 μ ⇒ ρ − ρ^{K+1}·π₀ = 1 − π₀ ⇔ π₀·(1 − ρ^{K+1}) = 1 − ρ ✓（π₀ 的定義）\n```\n\nworked example 會再用數字驗它兩次。\n\n**Little's Law 要用 λ_eff。**E[T] = E[N]/λ_eff，不是 E[N]/λ。理由是 ch02 的邊界紀律：被擋的客人從未進入系統，不貢獻 E[N]、也沒有「逗留時間」可言；分子算的是牆內的人，分母就必須是穿牆而入的流量。用錯 λ 會低估 E[T]，過載時錯得不小（陷阱表有數字）。\n\n**goodput**：被服務完成**且結果仍有人要**的速率。throughput 是供給側的帳，goodput 是需求側的帳。當 E[T] 超過客戶端的 timeout，每一件完工都沒人收貨——throughput 不動、goodput 歸零，伺服器全力以赴地做白工。這個區分在下一節變成數字。\n\n## Worked example：K = 10 的兩個世界（λ = 8 與 λ = 12）\n\n基準：K = 10、μ = 10。兩個到達情境：λ = 8（正常，ρ = 0.8）與 λ = 12（過載，ρ = 1.2）。全程手算、逐項複核；先把要用的冪次用平方法疊出來：\n\n```text\nρ = 0.8：0.8² = 0.64、0.8⁴ = 0.4096、0.8⁸ = 0.16777\n         0.8¹⁰ = 0.8⁸·0.8² = 0.16777·0.64 = 0.10737\n         0.8¹¹ = 0.10737·0.8 = 0.085899\nρ = 1.2：1.2² = 1.44、1.2⁴ = 2.0736、1.2⁸ = 4.29982\n         1.2¹⁰ = 4.29982·1.44 = 6.19174\n         1.2¹¹ = 6.19174·1.2 = 7.43008\n```\n\n**正常情境 ρ = 0.8**：\n\n```text\nπ₀  = (1−0.8)/(1−0.8¹¹) = 0.2/0.91410 = 0.21879\nπ_K = π₀·0.8¹⁰ = 0.21879·0.10737 = 0.023493        ← 損失 2.35%\nλ_eff = 8·(1−0.023493) = 7.8121/s\n複核（流量守恆）：μ·(1−π₀) = 10·0.78121 = 7.8121 ✓\n```\n\nE[N] 的封閉式：對有限幾何和做 ch03 的微分技巧（Σnρⁿ = ρ·d/dρ Σρⁿ），整理後得\n\n```text\nE[N] = ρ/(1−ρ) − (K+1)·ρ^{K+1}/(1−ρ^{K+1})\n```\n\n第一項是老朋友 M/M/1 的 E[N]，第二項是牆的折扣。代入：\n\n```text\nE[N] = 4 − 11·0.085899/0.91410 = 4 − 0.94489/0.91410 = 4 − 1.0337 = 2.9663\n複核（直接加總）：Σ n·0.8ⁿ（n=1..10）= 13.5575，×π₀ = 13.5575·0.21879 = 2.9663 ✓\nE[T] = E[N]/λ_eff = 2.9663/7.8121 = 0.380 s，E[T_Q] = 0.380 − 0.100 = 0.280 s\n```\n\n**過載情境 ρ = 1.2**：\n\n```text\nπ₀  = (1−1.2)/(1−1.2¹¹) = (−0.2)/(−6.43008) = 0.031104\nπ_K = 0.031104·6.19174 = 0.19259                    ← 損失 19.3%\nλ_eff = 12·(1−0.19259) = 9.6890/s\n複核（流量守恆）：μ·(1−π₀) = 10·0.96890 = 9.6890 ✓\nE[N] = 1.2/(−0.2) − 11·7.43008/(1−7.43008) = −6 + 81.731/6.43008 = −6 + 12.711 = 6.711\n複核（直接加總）：Σ n·1.2ⁿ（n=1..10）= 215.75，×π₀ = 215.75·0.031104 = 6.711 ✓\nE[T] = 6.711/9.6890 = 0.693 s，E[T_Q] = 0.593 s\n```\n\n順手加贈中間點 λ = 10（ρ = 1，均勻分布，全部口算）：πₙ = 1/11、π_K = 0.0909、λ_eff = 9.09/s、E[N] = 5、E[T] = 5/9.09 = 0.550 s。整理成一張表：\n\n| 量 | λ = 8（ρ = 0.8） | λ = 10（ρ = 1） | λ = 12（ρ = 1.2） |\n|---|---|---|---|\n| π₀ | 0.219 | 0.0909 | 0.0311 |\n| π_K（blocking） | 0.0235 | 0.0909 | 0.193 |\n| λ_eff＝throughput | 7.81/s | 9.09/s | 9.69/s |\n| 真實使用率 1−π₀ | 0.781 | 0.909 | 0.969 |\n| E[N] | 2.97 | 5.00 | 6.71 |\n| E[T] | 0.380 s | 0.550 s | 0.693 s |\n| 丟棄速率 λ·π_K | 0.188/s | 0.909/s | 2.31/s |\n| M/M/1 對照 E[T] | 0.500 s | 不存在（零常返） | 不存在（發散） |\n\n讀表的三個重點：\n\n1. **正常情境下牆幾乎免費還倒貼**：丟 2.35%（每分鐘約 11 則），換到 E[T] 從 M/M/1 的 0.500 s 降到 0.380 s——牆剁掉了佇列長度的尾巴，倖存者反而更快。損失可不可接受是 SLA 的事，但「有限 buffer 讓平均延遲變好」是定理。\n2. **過載情境下系統活著、而且體面**：λ = 12 的 M/M/1 佇列以 λ−μ = 2/s 線性成長、延遲隨時間無限上升；M/M/1/K 丟掉 19.3%，給倖存者 0.693 s 與 9.69/s 的吞吐（容量 μ = 10 的 97%）。**過載下沒有「不丟」的選項，只有「在哪裡丟、誰付等待成本」的選項。**\n3. ρ 從 0.8 → 1.2，E[T] 只從 0.380 s → 0.693 s——不到兩倍。ch08 那條 hockey stick 在這裡被牆壓平了：**延遲的爆炸被轉換成損失的成長**（2.35% → 19.3%）。爆炸守恆，只是換了出口。\n\n## throughput–latency–loss：你只能選邊\n\n```text\n          throughput\n              ^\n             / \\\n            /   \\\n           /     \\\n      latency --- loss\n```\n\nK 是這個三角形的旋鈕。ρ < 1 時三角形是鬆的：K 開大，loss → 0、latency → M/M/1 的值，幾乎可以全拿——這就是輕載下沒人感覺到三角存在的原因。ρ > 1 時三角形繃緊，而且有一條地板定理（完整推導，兩行）：\n\n```text\nπ_K = (ρ−1)·ρ^K/(ρ^{K+1}−1) = (1−1/ρ)·1/(1−ρ^{−(K+1)})   ← 上下同除 ρ^{K+1}\nK→∞：ρ^{−(K+1)} → 0  ⇒  π_K → 1 − 1/ρ\n```\n\nλ = 12 時地板是 1 − 1/1.2 = 1/6 ≈ 16.7%。**再大的 buffer 都丟不少於 16.7%**——因為伺服器每秒最多消化 10 則，多出來的 2 則/s 必須從某個出口離開，這是流量守恆，不是工程不夠努力。對照同一條極限：λ_eff → λ/ρ = μ、E[T] → ∞。所以 K 在過載下只決定一件事：**在註定丟掉至少 1/6 的前提下，你願意為了那一點點損失改善付出多少延遲**。K = 10 → K = 100 的具體帳在紙上推演第 2 題：loss 19.3% → 16.7%，E[T] 0.693 s → 9.50 s——損失改善 2.6 個百分點，延遲變 13.7 倍。網路工程界給「buffer 大到延遲失控」起過一個名字：bufferbloat。\n\n再疊上 goodput 就更難看：若客戶端 timeout 是 2 秒，K = 100 的過載系統 throughput 高達 10/s，goodput 卻趨近 0——每件工作完工時客戶早走了。**這就是 load shedding 的定理版**：過載時要在門口丟、趁早丟，把延遲留給活著的請求，把伺服器的每一秒花在會被收貨的工作上。丟棄不是放棄服務品質，是保衛 goodput。\n\n## M/M/c/K：家族全圖\n\n把 ch09 的多伺服器和本章的牆組起來：μₙ = min(n, c)·μ、到達在 K 截斷。πₙ 照 ch07 通解是分段幾何（n ≤ c 是階乘段、c < n ≤ K 是幾何段），推導機器完全一樣，本書不展開數值。值得帶走的是光譜的兩端：**K = c 就是 M/M/c/c（Erlang-B，見 ch09）**——完全不排隊的損失系統；**K = ∞ 就是 M/M/c（Erlang-C）**——完全不損失的等待系統。中間的 M/M/c/K 是「等待室有限」的呼叫中心、連線池、附帶佇列上限的 worker pool：現實幾乎都住在中間。一句話預告：佇列**網路**裡的 blocking（下游滿了堵住上游）會打破 ch16 的乘積形式，那是 ch18 的戰場。\n\n## 不耐煩的數學：balking、reneging 與 timeout 的身分\n\n牆是系統設的；不耐煩是客人自帶的。兩種經典行為（命名出處：Haight 1957、1959）：\n\n**Balking（望之卻步）**：到達者看到 n 個人在系統，以機率 bₙ 決定加入。建模上就是狀態相依的出生率 λₙ = λ·bₙ——ch07 的生滅機器直接吃，連新定理都不用。M/M/1/K 其實是極端 balking：n < K 必進、n = K 必走。\n\n**Reneging（等到一半放棄）**：進來排了，但每人有自己的耐心時鐘，走到先放棄。耐心取 Exp(θ) 時得到 **M/M/1+M**：佇列裡 n−1 個等待者的放棄時鐘與服務完成賽跑（ch04 競賽引理），死亡率變成\n\n```text\nμₙ = μ + (n−1)·θ（n ≥ 1）\n```\n\n多伺服器版 M/M/c+M 在 call center 文獻通稱 **Erlang-A**（A＝Abandonment；定錨論文 Garnett–Mandelbaum–Reiman 2002）。本書只取敘述層級的三個結論，但每條給理由：\n\n1. **對任何 λ 都穩定。**死亡率隨 n 線性成長，ch07 的正規化級數通項像 λⁿ/(μ·(μ+θ)·(μ+2θ)…)，分母是階乘級成長——階乘壓死指數，級數必收斂。**不耐煩是天然的 backpressure**：系統不需要任何人設計牆，客人自己會走。\n2. **過載下的損失地板與 blocking 同款**（直覺版，流體論證）：穩態時放棄率必須吸收超載量 λ−μ，所以 P(放棄) ≈ (λ−μ)/λ = 1 − 1/ρ——跟上一節 buffer 開到無限大的 blocking 地板一模一樣。流體帳上，「門口丟」和「等到放棄」丟得一樣多；差別在**成本落點**：blocking 讓被丟的人立刻知道、零等待；reneging 讓被丟的人先白等一段，甚至已佔用部分服務——無效服務推高實際負載，goodput 更難看。早拒絕優於晚放棄，這是可以推導的偏好，不是品味。\n3. **timeout 的數學身分**：客戶端 timeout 就是 reneging，只是耐心是固定值（C² = 0）而不是指數。Erlang-A 選指數耐心純粹是為了讓生滅機器可解；換成固定耐心，數值會變，但「永遠穩定」「過載地板 1 − 1/ρ」的定性結論不變（敘述層級，本書不證）。倒有一道數學救不了的工程裂縫：**客戶端放棄了、伺服器不知道**，繼續替鬼魂服務——timeout 之後通常還跟著重試，這對組合是 retry storm 的前奏（見 ch20）。\n\n## 有限母體：M/M/1//N——會自我節流的世界\n\n到目前為止 λ 都是天上掉下來的常數。換個世界：**修理工模型（repairman model）**——N 台機器，運轉中的每台以率 λ_u 故障，故障送到唯一的修理工（Exp(μ)）前排隊。狀態 n＝待修台數，出生率\n\n```text\nλₙ = (N − n)·λ_u   ← 在場的人越多，外面能來的人越少\n```\n\n仍是生滅過程，πₙ 由 ch07 通解直接給出（πₙ = π₀·N!/(N−n)!·(λ_u/μ)ⁿ），數值本書不展開。要帶走的是兩個結構性後果：\n\n**第一，永不爆炸。**狀態空間有限、到達率自我遞減，哪怕 N·λ_u 遠大於 μ，系統頂多全員待修，不存在發散。封閉世界天生溫柔。\n\n**第二，PASTA 死亡。**最小反例 N = 1：唯一一台機器送修時，**永遠**看到空的修理站（它是世上唯一的客人），但修理站忙的時間比例明明大於零——到達者視角與時間平均徹底脫鉤。死因：到達率依賴狀態（機器在站內時，到達率是 0），「到達不偷看系統」的假設粉碎。一般版的正確答案是：封閉系統的到達者看到的是**少了自己的世界**（N−1 個同伴構成的系統的穩態）——這句話的精確版叫 arrival theorem，是 ch17 封閉網路與 MVA 的引擎，這裡只埋種子、不展開。\n\n工程化身你天天在用：DB connection pool、固定數量的 worker、k6 固定 VU 的壓測。它們都是有限母體——**自我節流，所以永遠看不到開放世界的爆炸**。你的壓測為什麼總比生產樂觀？一半的答案在這裡（另一半見 ch19 的 coordinated omission；全論見 ch17）。\n\n## rate limiting 的佇列論身分：token bucket 與 leaky bucket\n\nM/M/1/K 的牆管**庫存**（系統內人數上限）；rate limiter 的牆管**流量**（進入速率上限）。兩種經典機制，佇列論身分完全不同：\n\n**Token bucket**：桶容量 B 枚 token、以速率 r 補充；到達拿到 token 才放行，桶空則丟棄（policing）或標記。判定性質：任何長度 τ 的時間窗，放行量 ≤ B + r·τ。它是**容忍叢發的 admission control**：≤ B 的叢發原樣穿過——**間隔一動不動**——只有長期平均被壓到 ≤ r。對下游的意義：保證長期 ρ ≤ r/μ（U 槓桿），但到達流的形狀幾乎沒整：C²ₐ 基本原封不動。小數字：r = 8/s、B = 20，一團 30 則的瞬間叢發 → 20 則整團放行、10 則丟棄。下游還是會被那 20 則砸一下。\n\n**Leaky bucket（佇列形態，整形器／shaper）**：進來先排進整形佇列，以固定間隔 1/r 放出。忙期內下游看到的到達間隔是常數——**C²ₐ → 0**（V 槓桿）。歷史出處：leaky bucket 由 Turner 1986 提出；token bucket 與「當計量器用的 leaky bucket」是彼此的鏡像，與「當佇列用的 leaky bucket」（整形器）是兩回事——這兩種身分常被混為一談，引用時小心。\n\n整形值多少錢？借用一次 ch14 的 Kingman／VUT 近似先算帳（推導與適用條件全在 ch14；它對 M/M/1 恰好還原精確值，所以這個對照是公平的）。下游 μ = 10、λ = 8、C²ₛ = 1：\n\n```text\nPoisson 輸入（C²ₐ = 1）：E[T_Q] = 0.4 s              ← M/M/1 精確值（ch08 基準）\n完美整形後（C²ₐ ≈ 0）：E[T_Q] ≈ (ρ/(1−ρ))·((C²ₐ+C²ₛ)/2)·E[S]\n                              = 4·(1/2)·0.1 = 0.2 s   ← Kingman 近似（ch14）\n```\n\n同樣的 λ、同樣的 μ，下游等待**砍半**——你一行容量都沒加。但誠實記帳：整形是變異數的搬運工，不是焚化爐。那團 30 則的叢發在整形器裡排隊，最後一則要等 29/8 ≈ 3.6 s 才放出去——等待從下游搬到了整形器。划不划算取決於兩處等待的單價：在整形器裡等是一條 in-memory 佇列，在下游等可能佔著 DB 連線或一個 worker。**「在哪裡等」是設計變數**——這是本章三角形的第四個隱藏角。\n\n一句話收束：token bucket 動「量」不動「形」（押 U 槓桿、保叢發）；leaky bucket 動「形」順便動量（押 V 槓桿）。ch14 的 VUT 世界觀會把這兩根槓桿放上同一張天平。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與察覺 |\n|---|---|---|\n| 拿無限 buffer 公式算有牆的系統 | E[S]/(1−ρ) 在 ρ→1 爆炸，但你的系統有牆：實際延遲飽和、損失登場，公式與現實分道揚鑣。反向也騙：只報 M/M/1/K 漂亮的 E[T] 不報 π_K，容量規劃樂觀到危險 | 監控裡出現 429/503/drop 計數的那一刻，無限 buffer 公式出局；報 E[T] 必須同時報 loss——它們是同一個三角形的兩個角 |\n| Little's Law 用 λ 不用 λ_eff | λ = 12 時 E[N]/λ = 6.71/12 = 0.559 s，比真值 0.693 s 低估 19%；越過載騙得越凶 | 進 Little 的 λ 是「真的進了系統」的流量；先畫邊界、再對齊分子分母（ch02 的紀律） |\n| 把 throughput 當 goodput | 過載大 buffer 系統 throughput ≈ μ 滿載漂亮，但 E[T] 一旦超過客戶端 timeout，每件完工都沒人收貨 | E[T] 與客戶端 timeout 放同一張面板；goodput 才是要守的 SLA 指標 |\n| PASTA 當反射動作用 | 整形後的流（近等距）、有限母體（N=1 的機器永遠看到空站）、balking 放行後的流，到達者看到的都≠時間平均 | 用之前問兩題：到達是 Poisson 嗎？到達率會不會看狀態？兩題都過才准用（ch08） |\n| 「加大 buffer」當免費修復 | ρ > 1 時損失地板 1−1/ρ 不動如山；K = 10→100 只把 loss 從 19.3% 降到 16.7%，E[T] 卻變 13.7 倍——把丟棄改名叫遲到 | 先分辨暫態尖峰還是持續過載：尖峰用 buffer 吸收合法；持續過載只有降 λ（shed／limit）或加 μ 兩條路，buffer 不在選單上 |\n| 對 reneging 視而不見的伺服器 | 客戶端早已放棄，伺服器照單全做：無效服務膨脹實際負載，讓過載更過載 | 請求帶 deadline、出隊先查「還來得及嗎」；這是 ch20 retry storm 的第一道防線 |\n\n## 紙上推演\n\n**1. [20 分鐘 ★★] 把 M/M/1/K 重推一遍。**從生滅過程的 local balance 出發推出 πₙ 與 π₀（含 ρ = 1 的特例），然後驗收一個邊界情形：K = 1 時的 π₁ 應該等於什麼？把它跟 ch09 的 Erlang-B（c = 1、a = ρ）對一次帳，並代 λ = 8、μ = 10 算出數值。\n\n**2. [25 分鐘 ★★★] 加大 buffer 能救過載嗎？**λ = 12、μ = 10。(a) 先推 K→∞ 時 π_K 的極限。(b) 對 K = 100 估算 π_K、λ_eff、E[N]、E[T]（提示：ρ > 1 時把狀態從牆往回數，令 m = K−n，看 π_{K−m} 像什麼分布）。(c) 與 K = 10 的結果並列，寫出「加大 buffer」的判決書。\n\n**3. [15 分鐘 ★★] reneging 對 tail 的定性分析。**在 M/M/1+M 裡，考慮「實際被服務完成的客人」的等待時間分布。不用算，給三條定性論證：它的 tail 為什麼比同負載 FCFS M/M/1 短？哪一類客人被系統性地從「完成者」名單中剔除？這對「以完成請求量測到的 P99」這個監控指標意味著什麼偏差？\n\n### 推演解答\n\n**1.** 相鄰 cut 給 λπₙ = μπₙ₊₁，所以 πₙ = ρⁿπ₀。正規化：ρ ≠ 1 時 π₀ = (1−ρ)/(1−ρ^{K+1})；ρ = 1 時每項相等，πₙ = 1/(K+1)。K = 1 特例：\n\n```text\nπ₀ = (1−ρ)/(1−ρ²) = 1/(1+ρ)，π₁ = ρ/(1+ρ)\n```\n\n這正是 Erlang-B 在 c = 1 的值：B(1, a) = a/(1+a)（ch09 遞迴的第一步），合理——K = c = 1 的 M/M/1/1 就是單線損失系統。代 λ = 8、μ = 10：π₁ = 0.8/1.8 = 0.444。沒有等待室時，44.4% 的到達被丟；對照 K = 10 的 2.35%——等待室的功用是把損失換成等待，這正是三角形的 latency–loss 邊。常見錯路：忘了 ρ = 1 要回到原式重新正規化，直接代公式得 0/0。\n\n**2.** (a) 上下同除 ρ^{K+1}：π_K = (1−1/ρ)/(1−ρ^{−(K+1)}) → **1 − 1/ρ**（ρ > 1）。λ = 12 時地板 1/6 ≈ 0.167。(b) ρ > 1 時 πₙ ∝ ρⁿ 集中在牆邊。令 m = K−n：π_{K−m} ∝ ρ^{−m}——離牆的距離近似幾何分布（比率 1/ρ），E[K−N] ≈ Σm·ρ^{−m}/Σρ^{−m} = 1/(ρ−1) = 5。所以：\n\n```text\nπ_K ≈ 1/6 = 0.167（修正項 ρ^{−101} 小到可忽略）\nλ_eff ≈ 12·(5/6) = 10.0 = μ（伺服器近乎永不空轉：π₀ ≈ 0.2/ρ¹⁰¹ ≈ 0）\nE[N] ≈ K − 1/(ρ−1) = 100 − 5 = 95.0\nE[T] = E[N]/λ_eff ≈ 95.0/10.0 = 9.50 s\n```\n\n封閉式複核：E[N] = ρ/(1−ρ) − 101·ρ¹⁰¹/(1−ρ¹⁰¹) ≈ −6 + 101 = 95 ✓。(c) 判決書：K 10→100，loss 19.3% → 16.7%（改善 2.6 個百分點，地板 16.7% 永遠到不了底下），E[T] 0.693 → 9.50 s（13.7 倍）。若客戶端 timeout 在個位數秒以內，goodput 反而從「還行」變成「近零」。**加大 buffer 不能救過載；它把丟棄變成遲到，而遲到在 timeout 面前是更貴的丟棄。**\n\n**3.** 三條定性論證（敘述層級）：（i）等待最久的客人正是耐心時鐘最可能先響的客人——「等很久才完成」這種樣本被放棄事件**選擇性移除**，完成者的等待分布右尾被系統性修剪；（ii）放棄讓死亡率隨 n 線性成長，佇列長度分布的尾巴比幾何衰減更快（分母出現階乘級），長佇列狀態本身就罕見，長等待的供給源頭被掐住；（iii）固定耐心（真實 timeout）更極端：完成者的等待被硬截在 timeout 附近之下。對監控的含義：**「以完成請求量測的 P99」在過載時會系統性偏樂觀**——最痛苦的那批使用者根本沒留下完成樣本，他們留下的是放棄與重試。量測 goodput 之外，還得量放棄率，否則面板會在系統最痛時最好看。這與 ch19 的 coordinated omission 是表親。\n\n## 自我檢核\n\n口頭回答，講不清楚就回去重讀對應小節：\n\n1. M/M/1/K 為什麼允許 ρ > 1？ch08 裡擋住 ρ ≥ 1 的數學條件是什麼、在這裡為什麼自動成立？\n2. π_K 的兩個身分是什麼？哪條定理把它們黏起來、需要哪兩個條件？本章哪兩個場景黏不起來、各是哪個條件死掉？\n3. 為什麼 Little's Law 在這裡必須用 λ_eff？邊界畫在哪裡、誰被畫到界外？\n4. 過載系統把 K 開大，loss、latency、throughput 各往哪走、極限各是什麼？為什麼損失有地板？\n5. blocking 與 reneging 在流體帳上丟掉同樣的比例（1 − 1/ρ），那它們的差別到底在哪？為什麼「早拒絕優於晚放棄」是可推導的而不是品味？\n6. timeout 的數學身分是什麼？Erlang-A 的指數耐心與真實 timeout 差在哪、哪些結論對這個差異穩健（敘述層級）？\n7. 有限母體系統為什麼天生不會爆炸？N = 1 的修理工反例怎麼殺死 PASTA？這對固定 VU 的壓測意味著什麼？\n8. token bucket 與 leaky bucket 各動了到達流的哪個參數？哪一個是 ch14 VUT 公式裡 V 槓桿的伏筆、為什麼？\n\n## 延伸閱讀\n\n- Shortle, Thompson, Gross & Harris,《Fundamentals of Queueing Theory》5th ed.（Wiley, 2018）——本章全部模型（M/M/1/K、M/M/c/K、有限母體、balking／reneging）的標準教科書處理，公式表齊全，適合當速查：https://www.wiley.com/en-us/Fundamentals+of+Queueing+Theory,+5th+Edition-p-9781118943526\n- Garnett, Mandelbaum & Reiman, \"Designing a Call Center with Impatient Customers\"，*M&SOM* 4(3): 208–227, 2002——Erlang-A（M/M/c+M）的定錨論文，讀引言與模型節即可拿到本章敘述層級結論的出處：https://pubsonline.informs.org/doi/10.1287/msom.4.3.208.7753\n- Haight, \"Queueing with Balking\"，*Biometrika* 44(3-4): 360–369, 1957；\"Queueing with Reneging\"，*Metrika* 2: 186–197, 1959——兩種不耐煩行為的命名出處，歷史趣味大於實用：https://academic.oup.com/biomet/article-abstract/44/3-4/360/238518\n- Marc Brooker, \"Fixing retries with token buckets and circuit breakers\"（2022-02-28）——token bucket 用在 retry 預算上的工程實作，本章 admission control 視角的直接延伸，ch20 會再回來：https://brooker.co.za/blog/2022/02/28/retries.html\n- Wikipedia, \"Leaky bucket\"——少數值得推薦的條目：把 Turner 1986（\"New Directions in Communications (or Which Way to the Information Age?)\"，*IEEE Communications Magazine* 24(10): 8–15）的出處與「計量器 vs 佇列」兩種身分的混淆史整理得很清楚：https://en.wikipedia.org/wiki/Leaky_bucket\n- nginx 官方文件 ngx_http_upstream_module——`max_conns` 與 `queue` 指令就是 M/M/c/K 的現成工程化身（佇列滿或逾時回 502），對著本章符號讀一遍會有既視感：https://nginx.org/en/docs/http/ngx_http_upstream_module.html\n"}, {"id": "ch11-reversibility-burke", "file": "ch11-reversibility-burke.md", "group": "Part III — 生滅與經典模型", "title": "ch11 — 可逆性與 Burke 定理：網路的鑰匙", "md": "# ch11 — 可逆性與 Burke 定理：網路的鑰匙\n\n> **本章解決什麼問題**：ch08–ch10 把單站佇列拆解得夠徹底了，但你的系統從來不是一站——API 後面接 worker，worker 後面接下一個 worker。要把單站理論升級成網路理論（ch16–18），得先回答一個問題：**佇列的輸出長什麼樣？**本章用一個出乎意料的工具——把時間倒著放——回答它：M/M 佇列的穩態輸出仍是 Poisson（Burke 定理），而且系統對自己吐過什麼毫無記憶。這把鑰匙立刻打開串聯佇列的乘積形式；它打不開的那扇門（feedback），正是 ch16 驚奇的伏筆。\n\n## 從你已知的出發\n\n你做容量規劃時有一個默契的習慣：一段一段算。API 服務一筆帳、SQS 後面的 c
