onsumer 一筆帳、下游的結算 worker 再一筆帳，每段各自套用「λ 進來、μ 服務」的單站模型。這個習慣藏著一個從沒被檢查過的假設：**每一段的輸入都長得像 Poisson**。第一段沒問題——大量獨立使用者的匯流，ch05 的 Palm–Khintchine 直覺給了執照。但第二段呢？它的輸入不是使用者，是**上一段的輸出**：一條被佇列搓揉過、被服務時間整形過的機器流。沒有任何「大量獨立來源」的論證罩著它。如果上游輸出不是 Poisson，你對下游套的每一條 M/M/1 公式都是在沙地上蓋房子。\n\n第二條線索來自監控直覺。值班時你看著 completions/sec 面板，過去一分鐘 push worker 吞吐暴增，你心想：「剛吐出一串 job，佇列現在應該比較空了。」這個推論聽起來無懈可擊——東西出去了，裡面當然變少。本章會證明一個讓人坐立難安的定理：對穩態的 M/M 佇列，**這個推論的資訊量恰好是零**。離開歷史對「現在裡面有多少」一個字都不透露。\n\n這兩條線索由同一個定理收束：Burke 定理。而證明它的工具——時間反轉——本身就值回票價：把監控錄影倒著放，問「我分不分得出來」，這個看起來像哲學謎語的問題，會變成你解平穩分布的實用技巧。\n\n## 時間反轉：把監控錄影倒著放\n\n從 ch07 的 CTMC 出發：狀態空間上的過程 X(t)，轉移速率 q(i→j)，假設 ergodic、平穩分布 π 存在，而且**系統已經跑在穩態**（X(0) ~ π）。現在把一段長度 τ 的錄影倒著放，定義反轉過程 X′(t) = X(τ−t)。\n\n第一個問題：倒放還是 Markov 嗎？是。Markov 性質有一個時間對稱的講法：**給定現在，過去與未來條件獨立**（ch06 的「狀態吃掉歷史」換句話說）。這句話裡「過去」與「未來」的地位完全對等——你把時間軸翻面，它一字不改（工程師的嚴謹：這個對稱講法與 ch06 定義的等價性，完整版見 Kelly 第 1 章）。\n\n第二個問題：倒放的速率是多少？算給你看（完整推導）：\n\n```text\nP(X(t−h) = j | X(t) = i)\n  = P(X(t−h) = j, X(t) = i) / P(X(t) = i)        ← 條件機率定義\n  = πⱼ·(q(j→i)·h + o(h)) / πᵢ                    ← 穩態：P(X(t−h)=j) = πⱼ；小區間轉移（ch07）\n⇒ 反轉鏈的速率  q′(i→j) = πⱼ·q(j→i) / πᵢ\n```\n\n注意穩態假設在哪裡出力：P(X(t−h) = j) = πⱼ 對所有 t 成立，反轉速率才不隨時間變。如果系統還在暖機（transient），倒放的「速率」會隨時刻漂移，整套機器報廢——這個細節在陷阱與防禦會回來咬人。\n\n兩個立即的健康檢查。第一，反轉鏈從 i 流出的總速率沒變：\n\n```text\nΣ_{j≠i} q′(i→j) = (1/πᵢ)·Σ_{j≠i} πⱼ·q(j→i)       ← 代定義\n                = (流入 i 的總機率流)/πᵢ\n                = (流出 i 的總機率流)/πᵢ           ← global balance（ch07）\n                = Σ_{j≠i} q(i→j)\n```\n\n所以倒放影片裡每個狀態的停留時間分布跟正放一模一樣。第二，π 也是反轉鏈的平穩分布：由定義 πᵢ·q′(i→j) = πⱼ·q(j→i)，對 i 加總就得到反轉鏈在 j 的 global balance。倒放的世界跟正放共享同一套長期比例——這很合理：把影片倒著放，各狀態的螢幕時間佔比當然不變。\n\n## 可逆性與 detailed balance\n\n有了反轉鏈，可逆性的定義就一句話：\n\n> **定義**：穩態過程 X 是**可逆的（reversible）**，若對任何 τ 與任何時點組 t₁, …, tₖ，(X(t₁), …, X(tₖ)) 與 (X(τ−t₁), …, X(τ−tₖ)) 同分布。\n\n白話：你拿到一段穩態系統的監控錄影，但沒人告訴你它是正放還是倒放——可逆，就是**統計上無法分辨**。等價地說：反轉鏈的速率跟原鏈一模一樣，q′ = q。把這個條件跟上面的速率公式擺在一起，就得到全章的樞紐定理：\n\n> **定理（可逆 ⇔ detailed balance）**：穩態 CTMC 可逆，若且唯若存在機率分布 π 使得對所有狀態對 i ≠ j：πᵢ·q(i→j) = πⱼ·q(j→i)。此時 π 就是平穩分布。\n\n這組方程叫 **detailed balance**：不只每個狀態收支平衡（global balance），而是**每一條邊上**、兩個方向的機率流逐對相等。證明兩個方向都短（工程師的嚴謹：在有限維分布的層級；測度層級的版本見 Kelly 第 1 章）：\n\n```text\n（⇒）可逆 ⇒ q′(i→j) = q(i→j)，代入 q′ 的公式：\n     πⱼ·q(j→i)/πᵢ = q(i→j)  ⇒  πᵢ·q(i→j) = πⱼ·q(j→i)    ← detailed balance 逐字\n\n（⇐）先證 π 平穩：對固定 i，把 detailed balance 對所有 j ≠ i 加總：\n     Σ_{j≠i} πᵢ·q(i→j) = Σ_{j≠i} πⱼ·q(j→i)\n     └── 流出 i 的總流 ──┘   └── 流入 i 的總流 ──┘          ← 正是 global balance\n     再代回反轉速率：q′(i→j) = πⱼ·q(j→i)/πᵢ = q(i→j)\n     速率相同、起始分布同為 π ⇒ 兩條鏈同法則 ⇒ 可逆。∎\n```\n\n注意這裡白送了一份大禮：**只要你找得到滿足 detailed balance 的 π，它自動就是平穩分布**——因為 detailed balance 逐條加總就是 global balance。這份大禮的實用價值在於 detailed balance 方程便宜得多：每條只有兩項、牽涉兩個未知數；global balance 每條方程牽涉一個狀態的所有鄰居。於是有了這套「先猜再驗」的標準操作：\n\n1. 在轉移圖上挑一個參考狀態，先設它的 π 值為 1（正規化最後再說）。\n2. 沿著邊用 πⱼ = πᵢ·q(i→j)/q(j→i) 一路傳播，把每個狀態表成參考狀態的倍數。\n3. 圖上有迴圈時，繞一圈回到起點必須得到同一個值。對不上＝這條鏈不可逆，detailed balance 無解，乖乖回去解 global balance（π 仍然存在，只是沒這條捷徑）。\n4. 對得上：正規化，然後把解代回**每一條** detailed balance 複核。成功的同時你免費得到兩件事：π 是平穩分布、這條鏈可逆。\n\n第 3 步其實是一條獨立的判準在操作上的長相——**Kolmogorov 迴圈判準**：穩態鏈可逆，若且唯若沿任何迴圈，順著走的速率乘積等於逆著走的速率乘積（敘述層級，不需先知道 π；證明見 Kelly 第 1 章）。它把可逆性變成純粹看速率的幾何性質：**可逆 ⇔ 轉移圖上沒有淨環流**。一條只朝單方向轉的圈（紙上推演第 2 題）有環流，倒放立刻露餡；而沒有迴圈的圖——比如一條線——想有環流也沒地方放。這句話直接預告了下一節。\n\n## 生滅過程皆可逆\n\n生滅過程（ch07）的轉移圖就是一條線：\n\n```text\n        λ₀         λ₁         λ₂\n     ─────►     ─────►     ─────►\n (0)        (1)        (2)        (3) ⋯\n     ◄─────     ◄─────     ◄─────\n        μ₁         μ₂         μ₃\n```\n\n> **定理**：任何 ergodic 的生滅過程，跑在穩態時都是可逆的。\n\n證明（完整推導，建立在 ch07 已證的結果上）：\n\n```text\n生滅鏈的轉移只發生在相鄰狀態之間：q(n→n+1) = λₙ、q(n→n−1) = μₙ，其餘速率為 0。\nch07 用相鄰 cut 推出的 local balance：\n    πₙ·λₙ = πₙ₊₁·μₙ₊₁        （對所有 n）\n逐對檢查 detailed balance：\n    相鄰對 (n, n+1)：πₙ·q(n→n+1) = πₙ₊₁·q(n+1→n)   ← 就是上面那條 local balance\n    非相鄰對 (i, j)：兩邊速率皆 0，0 = 0             ← 自動成立\n所有狀態對都過 ⇒ detailed balance 成立 ⇒ 可逆。∎\n```\n\n用 Kolmogorov 判準看更快：一條線沒有迴圈，環流無處可藏。所以這不是巧合，是一維結構的必然——ch07 說「生滅鏈的 local balance 與 global balance 一致」，本章把同一件事換了個名字：**生滅鏈天生滿足 detailed balance**。\n\n立刻入袋的系（corollary）：穩態的 M/M/1、M/M/c、M/M/∞、M/M/1/K 全部可逆。停下來體會一下這句話有多怪：一個 M/M/1 佇列的佇列長度錄影，倒著放，統計上依然是一個合法的 M/M/1 佇列長度錄影。你的直覺大概在抗議——「正放是到達把它堆高、服務把它消掉，倒放哪有這回事」。抗議無效，但這份抗議值錢：下一節整段都在兌現它。\n\n## Burke 定理：穩態輸出是 Poisson，而且系統失憶\n\n> **Burke 定理**（Burke 1956；適用於 M/M/1、M/M/c、M/M/∞，λ < cμ，系統跑在穩態）：\n> 1. 離開過程是速率 λ 的 Poisson 過程。\n> 2. 任一時刻 t 的系統狀態 N(t)，與 t 之前的全部離開歷史獨立。\n\nBurke 1956 的原始證明走輸出間隔的直接分析；隔年 Reich 1957 給出第二個證明，也就是今天通行的時間反轉路線——許多人（包括我）認為它是排隊理論裡最漂亮的論證之一。以下就走這條路（工程師的嚴謹：每一步能口頭說出理由；完整證明見 Burke 1956 與 Harchol-Balter 第 16 章）。\n\n先把 M/M/1 的樣本路徑畫出來。N(t) 是一條樓梯：↑跳＝到達、↓跳＝離開：\n\n```text\nN(t)\n 2 │        ┌────┐     ┌──┐\n 1 │   ┌────┘    └─────┘  └────┐\n 0 │───┘                       └─────\n   └──────────────────────────────────► t\n       a    a    d     a  d    d\n\na = 到達（↑跳）   d = 離開（↓跳）\n```\n\n把這段錄影倒著放。時間軸左右翻轉之後，每個跳躍的方向也翻轉，於是有這本對照字典：\n\n| 正放影片裡的事件 | 倒放影片裡看到的 |\n|---|---|\n| 到達（↑跳）發生在時刻 t | 離開（↓跳）發生在時刻 τ−t |\n| 離開（↓跳）發生在時刻 t | **到達（↑跳）發生在時刻 τ−t** |\n\n證明只有四步：\n\n1. **穩態 M/M/1 可逆**（上一節）：倒放的錄影在統計上就是一個 M/M/1——到達率 λ、服務率 μ，一模一樣。\n2. **字典翻譯**：正放影片的離開時刻們，恰好是倒放影片的到達時刻們（時間座標翻轉而已）。\n3. **倒放影片的到達是 Poisson(λ)**：因為倒放影片是一個如假包換的 M/M/1，而 M/M/1 的到達過程依定義是 Poisson(λ)。\n4. **Poisson 倒放仍是 Poisson**：Poisson 過程由「平穩獨立增量＋區間計數 Poisson 分布」刻畫（ch05），每一項都不在乎時間箭頭朝哪邊——區間裡有幾個點，正著數倒著數一樣多。\n\n所以：正放影片的離開過程是 Poisson(λ)。第 1 句證完。\n\n第 2 句靠同一本字典再翻一次。在任何 M/M/1 裡（倒放那個也是），**未來的到達與現在的狀態獨立**：N′(s) 由「s 之前的到達」與「s 之前的服務進度」拼出來，而 Poisson 的獨立增量保證 s 之後的到達跟這一切無關——到達流不偷看系統（這正是 ch08 PASTA 背後那個 lack of anticipation 假設）。現在翻譯：倒放影片裡「s 之後的到達」＝正放影片裡「t = τ−s 之前的離開」；倒放影片裡「s 時刻的狀態」＝正放影片裡「t 時刻的狀態」（N′(s) = N(τ−s) = N(t)）。於是：**N(t) 與 t 之前的離開歷史獨立**。∎\n\n整個證明裡 μ 只出現在「λ < μ 所以穩態存在」這一處。這值得瞪著看一會兒：輸出的速率是 λ 不奇怪——穩態下進多少就得出多少，這是守恆（ch02）；奇怪的是**形狀**：間隔獨立、同為 Exp(λ)，服務率 μ 在輸出的統計面貌裡完全隱形。μ = 10.1 的勉強系統和 μ = 1000 的閒散系統，穩態輸出流在統計上無法區分。\n\n### 反直覺正面對決：剛吐出一串 job，不代表現在比較空\n\n第 2 句才是真正讓人睡不著的。回到值班場景：過去一分鐘離開了一大串 job——佇列現在比較空嗎？定理說：**你的條件機率一動也不動**，P(N(t) = n | 任何離開歷史) = πₙ。\n\n直覺為什麼錯？因為有兩股推論在拔河，而你只聽見其中一股：\n\n- 「離開很多 ⇒ 東西出去了 ⇒ 裡面應該變少」——往**空**的方向推。\n- 「離開很多 ⇒ 伺服器這段時間幾乎沒停 ⇒ 裡面本來就堆得高」——往**滿**的方向推。\n\nBurke 定理說這兩股在 M/M 穩態下**恰好抵銷**，精確到一個 bit 都不剩。「恰好」不是修辭，可以動手算。先要一塊墊腳石（工程師的嚴謹）：M/M/1 裡「離開瞬間留下 n 個」的機率就是 πₙ——因為 N 一次只動 ±1，在 n 與 n+1 之間畫一條線，上穿與下穿的次數最多差 1，長期頻率相等；於是「離開後一瞬留下 n」的分布等於「到達前一瞬看到 n」的分布，而後者由 PASTA（ch08）等於 πₙ。現在用本章基準的站 1（λ = 6、μ = 10、ρ = 0.6）算「下一次離開要等多久」：\n\n```text\n剛有一個 job 離開。留下的狀態 ~ π：\n  忙（留下 ≥ 1 個）：機率 1 − π₀ = ρ = 0.6   → 下個間隔 ~ Exp(10)\n  空（留下 0 個）  ：機率 0.4               → 先等到達 Exp(6)，再服務 Exp(10)\n\n間隔密度：\n  Exp(6)+Exp(10) 的卷積 = (6·10/(10−6))·(e^(−6t) − e^(−10t)) = 15·(e^(−6t) − e^(−10t))\n  f(t) = 0.6·10·e^(−10t) + 0.4·15·(e^(−6t) − e^(−10t))\n       = 6·e^(−10t) + 6·e^(−6t) − 6·e^(−10t)\n       = 6·e^(−6t)                                ← 恰好是 Exp(λ=6)，μ 的痕跡全數抵銷\n```\n\n「忙的時候快（Exp(10)）」與「空的時候慢（先等到達）」兩種情境，以 ρ 為權重混出來的不多不少正是 Exp(λ)。誠實標示：這個計算只驗證了**邊際**間隔是指數——要構成 Poisson 過程還需要間隔彼此獨立，那一半便宜的算術買不到，正是時間反轉論證的價值所在。\n\n最後把定理的不對稱性說破，免得你把它記成比實際更神的樣子。N(t) 與**過去的**離開獨立，但與**未來的**離開當然相關——現在堆了 20 個，接下來的離開肯定比較密。奇怪嗎？對照輸入端就不奇怪了：未來的到達與 N(t) 獨立（到達不偷看系統），但過去的到達正是堆出 N(t) 的材料。時間反轉把輸入端的不對稱原封不動搬到輸出端，方向對調。Poisson 過程本身對稱，**「誰決定誰」的因果結構不對稱**——定理漂亮就漂亮在它把這件事翻譯得分毫不差。\n\n## 串聯佇列：乘積形式初登場\n\n鑰匙到手，開第一扇門。本章基準的串聯系統（tandem queue）：\n\n```text\n Poisson(λ=6) ──► [ 站1：M/M/1，μ₁=10 ] ──► [ 站2：M/M/1，μ₂=8 ] ──► 離開系統\n\n                 中間那條內部流：站1 的輸出＝站2 的輸入（Burke：仍是 Poisson(6)）\n```\n\n工程對應：站 1 是 API 處理、站 2 是推播 worker，事件流一站接一站。穩定性先檢查：λ = 6 同時小於 μ₁ = 10 與 μ₂ = 8，兩站都撐得住。\n\nBurke 第 1 句說：站 1 的穩態輸出是 Poisson(6)，而它正是站 2 的輸入；站 2 的服務時間 Exp(8) 與這條輸入流獨立——所以**站 2 自己就是一個正牌 M/M/1(λ=6, μ=8)**，ch08 的全套公式直接適用。這已經把「對每段各自容量規劃」的合法性買下一半。另一半——兩站的狀態彼此什麼關係——靠第 2 句（工程師的嚴謹）：N₂(t) 由「站 2 在 t 之前的到達流」與「站 2 自己的服務時間」拼出來；前者就是站 1 在 t 之前的離開流，由 Burke 第 2 句與 N₁(t) 獨立；後者跟整個站 1 無關。兩塊材料都與 N₁(t) 獨立，成品 N₂(t) 也就與 N₁(t) 獨立。聯合分布於是**逐點乘開**：\n\n```text\n站1：ρ₁ = 6/10 = 0.6     π₁(n₁) = 0.4·(0.6)^n₁        （ch08 的 (1−ρ)ρⁿ）\n站2：ρ₂ = 6/8  = 0.75    π₂(n₂) = 0.25·(0.75)^n₂\n\nπ(n₁, n₂) = π₁(n₁)·π₂(n₂) = 0.1·(0.6)^n₁·(0.75)^n₂     ← 例：兩站全空 π(0,0) = 0.1\n\nE[N₁] = ρ₁/(1−ρ₁) = 0.6/0.4   = 1.5\nE[N₂] = ρ₂/(1−ρ₂) = 0.75/0.25 = 3\nE[N]  = E[N₁] + E[N₂] = 4.5                     ← 期望值線性（ch03），這步不需要獨立性\nE[T]  = E[N]/λ = 4.5/6 = 0.75 s                 ← Little's Law 套整條管線\n\n複核（另一條路，逐站算回應時間再相加）：\nE[T₁] = 1/(μ₁−λ) = 1/4 = 0.25 s                 ← ch08：M/M/1 的 T ~ Exp(μ−λ)\nE[T₂] = 1/(μ₂−λ) = 1/2 = 0.50 s\nE[T]  = 0.25 + 0.50 = 0.75 s ✓\n```\n\n讀這張帳單的方式：μ₂ = 8 才是瓶頸——它離 λ 只剩 2/s 的餘裕，一站就貢獻了 4.5 個在席數裡的 3 個、0.75 秒裡的 0.5 秒。想改善整條管線先動誰，數字已經把話說完（紙上推演第 4 題會逼你算另一個選項）。\n\n再多收一筆紅利（敘述＋計算；獨立性本身本書不證）。Reich 在同一篇 1957 論文裡證明：同一個 job 在兩站的逗留時間 T₁、T₂ **互相獨立**。配上 ch08 的 T ~ Exp(μ−λ)，總逗留 T = T₁ + T₂ 是獨立的 Exp(4) 與 Exp(2) 之和，尾巴可以閉式寫出：\n\n```text\nP(T > t) = (4·e^(−2t) − 2·e^(−4t))/(4−2) = 2·e^(−2t) − e^(−4t)\nt₉₉：令 2·e^(−2t) ≈ 0.01（另一項到時只剩 ~2.5×10⁻⁵，可棄）\n     t₉₉ ≈ ln(200)/2 = (ln 2 + ln 100)/2 = (0.6931 + 4.6052)/2 ≈ 2.65 s\n```\n\nP99 ≈ 2.65 s ≈ 3.5 倍平均（0.75 s）——比單站 M/M/1 的 4.6 倍（ch08）緊一些：兩段獨立的延遲相加，極端值互相稀釋了一點。\n\n最後一個誠實聲明，它是 ch16 的預告片：這裡的獨立是**同一時刻快照**的獨立——固定 t，N₁(t) 與 N₂(t) 獨立。**過程**可不獨立：站 1 此刻的長龍預告著站 2 待會兒的長龍（burst 會順流而下），N₁(t) 與 N₂(t+s) 相關得很。乘積形式是穩態快照的性質，不是時間軌跡的性質——這句話在 ch16 會以更驚人的形式回來。\n\n## Burke 的極限：feedback 殺死內部流的 Poisson\n\n串聯能贏，是因為流只往前。現在加一條現實中無所不在的邊：失敗重試。完成的 job 以機率 p 回到佇列尾端重排（Bernoulli feedback，這裡取瞬時回流的理想化）：\n\n```text\n               ┌───────────── p ────────────┐\n               ▼                            │\n Poisson(λ) ──► + ──► [ server μ ] ─────────┴──► 真正離開（機率 1−p）\n\n 「+」＝合流點：外部新工作與回鍋工作在這裡匯入同一條佇列\n```\n\n問：伺服器實際看到的輸入流（外部流＋回饋流的合流）還是 Poisson 嗎？**不是。**這不是近似誤差，是定性死亡——Burke 本人 1976 年算出這條合流的邊際到達間隔是兩個指數的混合、不是指數，Poisson 就此出局（Burke 1976, IEEE Trans. Comm. 24: 575–576）。\n\n直覺上死因很清楚：回饋流**偷看系統**。回鍋的到達緊跟在服務完成之後發生，跟佇列自己的狀態強烈相關——整套 Poisson 機器賴以運轉的 lack of anticipation（ch08）被正面擊穿。體感版：取 λ 很小、μ 很大、p 接近 1——外部工作難得來一個，一來就在伺服器裡連環回鍋，輸入端看到的是「長久死寂，然後一陣機關槍」。間隔高度叢發（C²ₐ > 1）、前後相關，跟 Poisson 的均勻無記憶相去十萬八千里。可逆性論證在哪一步斷掉？回饋讓「到達」不再是外生的 Poisson 流，字典第 3 步「倒放影片是如假包換的 M/M/1」直接報廢。\n\n有趣的是有一條流活了下來。瞬時回流下 N(t) 仍是生滅過程——外部到達使 n→n+1（速率 λ），服務完成以機率 1−p 使 n→n−1（速率 μ(1−p)），回鍋不改變 n。生滅 ⇒ 可逆 ⇒ 對這條鏈重跑四步論證：它的↓跳——**真正離開系統的流**——仍是 Poisson(λ)（工程師的嚴謹；穩定性條件相應變成 λ < μ(1−p)）。所以精確的講法是：**feedback 殺死內部流的 Poisson 性，但放過對外輸出**。這個格局在 ch16 的 Jackson 網路裡原樣放大：網路內部的流普遍不是 Poisson，對外離開的流仍是。\n\n於是 ch16 的驚奇已經可以預告了：基準範例裡 node2 以 p = 0.2 把失敗送回 node1，內部流統統不是 Poisson——但 Jackson 定理會說，穩態快照的乘積形式**仍然成立**，每站「彷彿」獨立 M/M/1。Poisson 死了，乘積形式卻活著；化解這個悖論的概念工具（什麼條件下輸入輸出都是 Poisson 且與狀態獨立）叫 **quasi-reversibility**，本書不展開，指路 Kelly《Reversibility and Stochastic Networks》。\n\n工程翻譯一句：你的管線只要有 retry、有 DLQ 重投、有任何「失敗繞回上游」的邊，內部每段流量就不再有 Poisson 執照——對單站套 M/M/1 之前，先看一眼輸入是從哪裡來的。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與察覺 |\n|---|---|---|\n| 把 Burke 用在暫態 | 定理只保**穩態**。清積壓時站 1 以滿速 μ₁ = 10/s 往下游灌，而站 2 只吃得下 8/s——用「下游輸入 = λ = 6」做的容量帳當場作廢，backlog 沿管線下移 | 排空事件（部署重啟、尖峰剛過、佇列 drain）期間，下游容量帳要用上游的 **μ** 不是 λ。徵兆：上游 backlog 下降的同時下游延遲飆升 |\n| 把 Burke 用在 M/G/1 | 定理需要指數服務。一般服務時間下輸出不是 Poisson：M/D/1 輸出比 Poisson 平滑（下游比 M/M 預測的好過），重尾服務輸出叢發（下游慘過預測）——方向感，敘述層級 | 服務時間 C²ₛ 偏離 1 越遠越別信。下游要量化時用 C² 參數傳播的分解近似（見 ch18） |\n| 把第 2 句讀成「狀態與輸出整體獨立」 | 獨立的是 N(t) 與**過去的**離開；與未來的離開當然相關（堆 20 個時接下來離開必然較密） | 記住不對稱性的來源：輸入端「未來到達 ⊥ 現在」經反轉變成輸出端「過去離開 ⊥ 現在」。方向弄反，推論全錯 |\n| 對「剛吐出一串」做反應 | 穩態下離開歷史對現在狀態的資訊量為零；據此調度（如把流量切過去）等於擲硬幣 | 要知道現在多滿，去量 N(t) 本身（佇列深度指標），不要從吞吐反推 |\n| 有 feedback 還按 Poisson 算每段 | retry／DLQ 重投讓內部流叢發（C²ₐ > 1）且與佇列狀態相關，M/M/1 公式系統性低估等待（ch14 的 Kingman 會把 C²ₐ 的帳算給你看） | 畫出流量圖，凡是有迴邊的，內部流一律當非 Poisson 處理；流量帳先解（ch16 traffic equations），等待帳再說 |\n| 把快照獨立當過程獨立 | 乘積形式只管固定時刻的聯合分布；burst 沿管線傳播，跨站延遲在時間上高度相關——「兩站同時壞」的機率不是 π 相乘能回答的 | 涉及時間相關的問題（同一 burst 連環打擊、跨站 SLA 的同時違約）改用模擬（ch19） |\n\n## 紙上推演\n\n**1. [10 分鐘 ★] 猜驗法熱身。**兩台 worker 共用一條佇列（M/M/2）：λ = 6/s，每台 μ = 4/s。(a) 先說明為什麼可以直接用 detailed balance 解 π 而不必碰 global balance；(b) 用猜驗法解出 πₙ 與 π₀，並算 P(全空) 與 P(必須等待)。\n\n**2. [15 分鐘 ★★] 單向圓環：可逆性的反例。**三狀態 A→B→C→A，速率皆為 1，反方向速率皆為 0。(a) 求平穩分布並驗證 global balance；(b) 驗證 detailed balance 失敗、Kolmogorov 迴圈判準失敗；(c) 寫出反轉鏈的速率，說明「倒放影片」長什麼樣；(d) 用猜驗法硬做會在哪一步翻車？\n\n**3. [15 分鐘 ★★★] 口頭重講 Burke。**閉卷，把時間反轉證明完整講一遍，依序回答：(a) 為什麼穩態 M/M/1 可逆？(b) 倒放之後，原本的離開變成什麼？(c) 為什麼倒放影片的到達是 Poisson(λ)？(d) 第 2 句（狀態與離開歷史獨立）是從倒放世界的哪一條性質翻譯來的？(e) 「穩態」這個假設在證明的哪幾步出力？拿掉會壞在哪？\n\n**4. [15 分鐘 ★★] 直覺誤用＋升級決策。**(a) 值班同事說：「push worker 過去一分鐘吞吐暴增，佇列現在一定比較空，可以把灰度流量切過來了。」指出這句話在穩態下錯在哪；再指出在**非**穩態（清積壓）下它錯得更兇的原因。(b) 串聯基準（λ=6、μ₁=10、μ₂=8）只有一筆升級預算：把 μ₁ 提到 12，或把 μ₂ 提到 10。各算新的 E[T]，說出該選哪個、贏多少。\n\n### 推演解答\n\n**1.** (a) M/M/2 是生滅過程（μₙ = min(n,2)·μ，見 ch09），本章已證生滅過程的平穩解滿足 detailed balance——所以 detailed balance 解出來的就是 π，合法。先檢查穩定：λ = 6 < 2·4 = 8，ρ = 0.75。(b) 沿著線傳播：\n\n```text\n0↔1：π₁·4 = π₀·6  ⇒ π₁ = 1.5·π₀\nn↔n+1（n≥1）：πₙ₊₁·8 = πₙ·6 ⇒ πₙ₊₁ = 0.75·πₙ\n⇒ πₙ = 1.5·(0.75)^(n−1)·π₀（n ≥ 1）\n正規化：π₀·[1 + 1.5·(1/(1−0.75))] = π₀·(1 + 6) = 7·π₀ = 1 ⇒ π₀ = 1/7 ≈ 0.143\nP(必須等待) = P(N ≥ 2) = 1.5·π₀·(0.75 + 0.75² + ⋯) = 1.5·3·π₀ = 4.5/7 ≈ 0.643\n```\n\n複核：用 ch09 的 Erlang-C 結構驗 π₀——a = λ/μ = 1.5，[1 + 1.5 + (1.5²/2)/(1−0.75)] = 1 + 1.5 + 4.5 = 7 ✓。常見錯路：n ≥ 1 之後死亡速率忘了從 4 換成 8。\n\n**2.** (a) 對稱性猜 π = (1/3, 1/3, 1/3)；驗 global balance：每個狀態流入 = 1/3·1 = 流出 ✓。(b) detailed balance 在邊 A–B 上要求 π_A·1 = π_B·0，即 1/3 = 0，失敗。Kolmogorov：順走 A→B→C→A 乘積 = 1，逆走乘積 = 0，不等，失敗。(c) q′(i→j) = πⱼ·q(j→i)/πᵢ = q(j→i)：反轉鏈是同樣的圓環**反方向轉**（A→C→B→A，速率 1）。倒放影片看得出旋轉方向反了——可逆性的失敗就是「轉移圖上有淨環流」這件事的精確化。(d) 猜驗法第 2 步就翻車：沿 A→B 傳播要解 π_B = π_A·q(A→B)/q(B→A) = π_A·(1/0)，除以零——方程無解，這正是「不可逆」在操作上的訊號。注意教訓：π 好端端存在（global balance 解得出來），死的只是捷徑。\n\n**3.** 參考答案骨架：(a) M/M/1 是生滅過程，穩態生滅過程滿足 detailed balance（ch07 的相鄰 cut 方程逐字就是），故可逆。(b) 時間軸翻轉使↓跳變↑跳：原離開時刻成為倒放影片的到達時刻。(c) 可逆 ⇒ 倒放影片與正放同法則，是一個 M/M/1，其到達依定義為 Poisson(λ)；再加一句「Poisson 倒放仍是 Poisson」（平穩獨立增量不認時間方向）。(d) 從「M/M/1 的未來到達與現在狀態獨立」（lack of anticipation）翻譯：倒放的未來到達＝正放的過去離開、倒放的現在狀態＝正放的現在狀態。(e) 穩態出力兩次：反轉速率公式推導裡 P(X(t−h)=j) = πⱼ 要求每一時刻的邊際都是 π（否則 q′ 隨時間變，倒放不是時齊 CTMC）；可逆性的定義本身是穩態過程的性質——從空系統起跑的 M/M/1 倒放後是一條「先知道結局」的怪過程，整個論證不成立。這也是為什麼清積壓期間的輸出不是 Poisson(λ)。\n\n**4.** (a) 穩態下：Burke 第 2 句說 N(t) 與過去離開獨立——「吞吐暴增」對佇列現況的資訊量是零，這個決策等於沒看資料。非穩態下更糟：吞吐能持續壓在 μ ≈ 滿速，恰恰代表伺服器沒停過、backlog 還在——同一個觀察的正確讀法跟同事的結論**方向相反**。要嘛量佇列深度，要嘛別動。(b) 算帳：\n\n```text\n基準：E[T] = 1/(10−6) + 1/(8−6) = 0.25 + 0.50 = 0.75 s\n升級 μ₁→12：E[T] = 1/(12−6) + 1/(8−6) = 0.167 + 0.50 ≈ 0.667 s   （省 0.083 s）\n升級 μ₂→10：E[T] = 1/(10−6) + 1/(10−6) = 0.25 + 0.25 = 0.50 s    （省 0.25 s）\n```\n\n選 μ₂：同樣的預算，瓶頸站的收益是非瓶頸站的 3 倍。這是 ch02 bottleneck 分析的機率版重演——錢永遠先花在離 λ 最近的那個 μ 上。\n\n## 自我檢核\n\n口頭回答，講不清楚就回去重讀對應小節：\n\n1. 反轉鏈的速率公式 q′(i→j) = πⱼ·q(j→i)/πᵢ 是怎麼推出來的？「穩態」假設在推導的哪一步出力？\n2. 可逆 ⇔ detailed balance，兩個方向各怎麼證？為什麼「找到滿足 detailed balance 的 π」就自動證明了 π 是平穩分布？\n3. 猜驗法的四個步驟是什麼？它在什麼徵兆下宣告失敗，失敗時你損失了什麼、沒損失什麼？\n4. 為什麼所有生滅過程（跑在穩態）都可逆？用 cut 的語言講一遍，再用 Kolmogorov 迴圈判準的語言講一遍。\n5. Burke 定理的兩句話各是什麼？時間反轉證明的四步裡，哪一步用了可逆性、哪一步用了 Poisson 的時間對稱性？\n6. 「剛吐出一串 job 不代表現在比較空」——兩股相反的直覺是什麼、為什麼恰好抵銷？邊際間隔算出 Exp(λ) 之後，離「輸出是 Poisson 過程」還差哪一塊？\n7. 串聯乘積形式的獨立性論證怎麼走？它是快照的獨立還是過程的獨立？差別會在哪類工程問題上現形？\n8. feedback 為什麼殺死內部流的 Poisson 性？哪一條流倖存、為什麼？你自己的系統裡有哪些邊是「迴邊」？\n\n## 延伸閱讀\n\n- P.J. Burke, \"The Output of a Queuing System\"，*Operations Research* 4(6): 699–704（1956）——輸出定理的原始論文，走輸出間隔的直接分析；對照本章的反轉路線讀，會更佩服 Reich：https://pubsonline.informs.org/doi/10.1287/opre.4.6.699\n- E. Reich, \"Waiting Times When Queues are in Tandem\"，*Annals of Mathematical Statistics* 28(3): 768–773（1957）——Burke 定理的第二個證明（可逆性路線的源頭），串聯兩站等待時間的獨立性也出自這裡：https://projecteuclid.org/euclid.aoms/1177706889\n- F.P. Kelly,《Reversibility and Stochastic Networks》（Wiley 1979；Cambridge 2011 重印）——可逆性的聖經：第 1 章是本章定理們的嚴格版（含 Kolmogorov 判準），後續章節把 quasi-reversibility 與網路理論一路鋪到底。作者官方頁面提供免費全文（DjVu 格式，2026-06 驗證）：https://www.statslab.cam.ac.uk/~fpk1/rsn.html\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013) 第 16 章 \"Time-Reversibility and Burke's Theorem\"——§16.2 反轉鏈、§16.3–16.4 兩條證明路線、§16.5 串聯應用，與本章同一條路但習題更多；書頁：https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- P.J. Burke, \"Proof of a Conjecture on the Interarrival-Time Distribution in an M/M/1 Queue with Feedback\"，*IEEE Transactions on Communications* 24: 575–576（1976）——feedback 合流不是 Poisson 的定論（邊際間隔是兩個指數的混合），兩頁讀完：https://ieeexplore.ieee.org/document/1093335/\n- MIT OCW 6.262《Discrete Stochastic Processes》（Gallager, Spring 2011）——countable-state Markov process 的講座把可逆性與 Burke 定理放在更嚴格的地基上，含完整錄影與習題解答：https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n"}, {"id": "ch12-mg1", "file": "ch12-mg1.md", "group": "Part IV — 超越指數", "title": "ch12 — M/G/1 與 Pollaczek–Khinchine：變異數的帳單", "md": "# ch12 — M/G/1 與 Pollaczek–Khinchine：變異數的帳單\n\n> **本章解決什麼問題**：Part III 的所有結果都蓋在「服務時間是指數分布」上，而 ch04 已經承認：真實服務時間常常不是。本章拆掉這根柱子——到達仍是 Poisson、服務換成任意分布——然後把 ch03 埋下的主角 C²ₛ 接上電：Pollaczek–Khinchine 公式會告訴你，等待時間正比於 (1 + C²ₛ)/2。同一個平均、同一個使用率，帳單可以差 11 倍。這章同時兌現兩張舊支票：ch03 的「C² 之後會對你的系統開帳單」、ch04 的「一般分布的殘餘壽命是另一個世界」。它是 Part IV 的開門章：ch13 在它上面討論出工順序、ch14 把它一般化成 Kingman、ch15 把它推到爆炸。\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾   ◄ 你在這裡\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步\n```\n\n## 從你已知的出發\n\n你值過那種班：一支月底報表 query 跑了 30 秒，整條 API 的延遲跟著飆。事後檢討時大家盯著那支 query 罵，但儀表板上有件事沒人解釋得了——**平均**服務時間幾乎沒動。一萬個請求裡混進幾支慢的，平均被稀釋得無影無蹤，可是 P99 已經翻了好幾倍。你的 SQS 結算 pipeline 也有同款劇情：批次有大有小，平均處理時間穩穩的 100 ms，等待卻在尖峰時段莫名其妙地堆。\n\nch03 已經給了這個現象一個名字：C²ₛ，服務時間的變異係數平方。那裡你算過 90% 短工作（50 ms）混 10% 長工作（550 ms）的 C²ₛ = 2.25，也從一張截斷的監控直方圖估出某服務的 C²ₛ ≈ 3.73。ch04 的陷阱表則開出了預告帳單：把 C²ₛ = 10 的現實硬套指數模型，等待會低估 5.5 倍。本章就是結帳的地方——你會親手推出那條公式，知道它每一項從哪裡來、什麼條件下成立、什麼時候會反過來騙你。\n\n## M/G/1：佇列長度為什麼不再是完整狀態\n\n記號先對齊（Kendall 記號的正式定義見 ch08）：M/G/1 ＝ Poisson(λ) 到達、服務時間 S 是任意分布的 i.i.d. 隨機變數（General）、單一伺服器、預設 FCFS、無限緩衝、ρ = λE[S] < 1。\n\nM/M/1 能用一條生滅鏈解掉，靠的是 ch04 那句話：指數分布下「已經做了多久」對未來毫無資訊量，所以**一個整數**（系統內人數 N）就是完整狀態。現在服務換成一般分布，這句話反過來咬人：一支已經跑了 25 秒的報表 query，剩餘時間的分布跟剛開跑時完全不同。要描述系統，你得記 (N, a)——a 是服務中工作已進行的時間，一個連續量。狀態空間從可數變成連續，Part III 的生滅引擎熄火。ch04 證過指數是唯一無記憶的連續分布，所以這不是技術困難，是本質的：**只要服務不是指數，佇列長度就不夠當狀態**。\n\n出路有兩條。第一條是 Kendall 1953 的 embedded chain：只在「工作離開的瞬間」觀察系統——那一刻 a 恰好歸零，N 在這些瞬間構成一條離散時間 Markov chain（他論文標題裡的 imbedded Markov chain 就是這個），可以解、但要對付一整套無窮維的方程。第二條是本書要走的 mean-value 路線：放棄解分布，只追平均——材料只需要 Little's Law（ch02）、PASTA（ch08），加上一個新角色：**殘餘服務時間**。代價是誠實的：這條路只給你平均值，等待的完整分布要靠 transform 方法（本章末節有它的存在聲明）。\n\n## 殘餘服務時間：你總是撞上長工作\n\n問題：你在一個隨機時刻抵達，伺服器正忙著某支工作，它還要多久才完？ch04 給過指數的答案——殘餘分布跟全新的一樣，期望仍是完整的 E[S]。當時也立了牌：一般分布是另一個世界。現在進這個世界。\n\n直覺先行。隨機時刻抵達的你，不是在「工單清單」上均勻抽一支工作，而是在**時間軸**上均勻抽一個點——一支 2 秒的工作在時間軸上占的長度是 20 ms 工作的 100 倍，你撞上它的機率也大 100 倍。這叫 inspection paradox（檢視悖論）：**你撞上的工作，是被長度加權抽樣過的**，平均比 E[S] 長。ch04 推演裡那個公車站的第二層陷阱（「隨機抵達的人傾向落在偏長的間隔裡」）就是它。\n\n把直覺變成數字，用一張圖。定義 r(t)：時刻 t 服務中工作的殘餘服務時間，伺服器閒置時 r(t) = 0。每支工作開始服務時，r 跳到它的長度 Sᵢ，然後以斜率 −1 滑回 0：\n\n```\n r(t)  服務中工作的殘餘服務時間（閒置時 r = 0）\n ▲\n │\\\n │ \\\n │  \\\n │   \\        |\\\n │    \\       | \\        |\\\n │     \\      |  \\       | \\\n └──────┴─────┴───┴──────┴──┴─────▶ t\n     S₁ 完成   S₂ 完成    S₃ 完成\n   面積 S₁²/2  面積 S₂²/2  面積 S₃²/2\n```\n\nr(t) 的長期時間平均，就是把鋸齒下的面積除以總時間。每支工作貢獻一個底為 Sᵢ、高為 Sᵢ 的直角三角形，面積 Sᵢ²/2。設 [0, T] 內完成了 M(T) 支工作：\n\n```text\n(1/T)∫₀ᵀ r(t) dt = (1/T) · Σᵢ Sᵢ²/2              ← 面積＝三角形相加（邊界那塊未完成的，T→∞ 後可忽略）\n                 = (M(T)/T) · (Σᵢ Sᵢ²/2)/M(T)     ← 乘除一個 M(T)\n                 → λ · E[S²]/2                     ← 穩態下完成率＝到達率（ρ<1）；樣本平均→期望值（大數法則）\n```\n\n嚴謹度標示：**工程師的嚴謹**——每一步都能口頭說出理由，但「邊界項可忽略」與「極限交換」沒有嚴格證（它們需要 E[S²] < ∞；這個條件 ch15 會正面炸掉）。教科書用 renewal-reward 語言把這個論證寫嚴格，見延伸閱讀。\n\n所以**時間平均的殘餘服務時間是 E[r̄] = λE[S²]/2**（含閒置時段的 0）。只看忙的時段，就是把面積除以忙的總時間 ΣSᵢ：\n\n```text\nE[r | 忙] = (Σᵢ Sᵢ²/2)/(Σᵢ Sᵢ) → E[S²]/(2E[S]) = E[S]·(1 + C²ₛ)/2\n```\n\n最後一步用了 E[S²] = Var(S) + E[S]² = E[S]²(1 + C²ₛ)——ch03 的定義直接代入。這條公式值得拆開讀：E[S²]/(2E[S]) = (E[S²]/E[S]) × (1/2)。第一個因子 E[S²]/E[S] 是**你撞上的那支工作的平均長度**（長度加權後的平均），第二個因子 1/2 是「平均撞在中點」。兩個偏差，一個把工作變長、一個砍半，乘起來才是殘餘。\n\n對帳三連發，均值全部釘在 E[S] = 100 ms：\n\n- **確定性**：E[S²] = E[S]²，殘餘 = E[S]/2 = 50 ms。「做到一半」的直覺**只在這裡**成立。\n- **指數**：E[S²] = 2E[S]²，殘餘 = E[S] = 100 ms——ch04 的「殘餘＝全新」被一般公式收編為特例。\n- **二點混合（90% × 50 ms ＋ 10% × 550 ms，ch13 的排程基準）**：E[S²] = 0.9·2,500 + 0.1·302,500 = 32,500 ms²，殘餘 = 32,500/200 = **162.5 ms**——比一支全新工作的平均還長。\n\n第三個例子值得多看一眼，它就是 inspection paradox 的數值現場。長工作只占工單的 10%，但占時間軸的比例是 0.1×550/100 = **55%**——你超過一半的機率撞上它。你撞上的工作平均長 E[S²]/E[S] = 325 ms，是真平均的 3.25 倍。交叉驗算（全機率定理，ch03）：0.55 × (550/2) + 0.45 × (50/2) = 151.25 + 11.25 = 162.5 ms ✓，兩條路同帳。監控上「平均服務時間 100 ms」沒有說謊，但對隨機抵達的你而言，世界由長工作主宰。\n\n## Pollaczek–Khinchine：把帳單算出來\n\n歷史一句：Pollaczek 1930 用複變分析先得到這個結果，Khinchine 1932 用機率語言重新推導，兩人沒有合作，公式因此掛雙名（拼法 Khinchin、Khintchine 亦通行）。我們走的 mean-value 路線比兩位原版都輕——因為 Little 和 PASTA 都是後來才有的工具。\n\n標記一位乘客（tagged customer）：穩態下隨機抵達的你。FCFS 之下，你的等待由兩塊組成——服務中那支工作的殘餘，加上佇列裡排在你前面每一位的**完整**服務：\n\n```text\nE[T_Q] = E[r 你所見] + E[N_Q 你所見] · E[S]   ← FCFS：先等殘餘，再等前面每位做完\n       = λE[S²]/2   + E[N_Q] · E[S]           ← PASTA（ch08）：Poisson 到達看到的＝時間平均\n       = λE[S²]/2   + λE[T_Q] · E[S]          ← Little 用在佇列上（ch02）：E[N_Q] = λE[T_Q]\n       = λE[S²]/2   + ρ · E[T_Q]              ← ρ = λE[S]\n\n⇒ E[T_Q](1 − ρ) = λE[S²]/2\n\n⇒ E[T_Q] = λE[S²]/(2(1−ρ))                    ← Pollaczek–Khinchine 平均等待公式\n```\n\n第一行有個容易滑過去的細節，值得停下來：為什麼佇列中每位貢獻的是**不偏的** E[S]，而服務中那位要用被長度加權的殘餘？因為佇列裡的工作**還沒開始跑**——它們的長度還沒在時間軸上占據任何位置，對你而言就是一批新鮮的 i.i.d. 抽樣；而且 FCFS 不看長度出工，佇列長度與這些工作的長度互相獨立，所以期望可以直接相乘（這步的獨立性我們口頭論證、不嚴格證）。只有服務中那一位被時間軸偏置污染。把這兩種身分搞混，正是本章推演第 4 題那個錯誤論證的死法。\n\n代入 E[S²] = E[S]²(1 + C²ₛ)，得到本書接下來三章都會反覆引用的形狀：\n\n```text\nE[T_Q] = ρ/(1−ρ) · E[S] · (1 + C²ₛ)/2\n          ───┬──    ─┬──    ───┬─────\n          使用率     時間      變異性\n          槓桿       尺度      槓桿\n```\n\n三個因子各管一件事。ρ/(1−ρ) 是 ch08 的 hockey stick，原封不動地活了下來——放掉指數假設，爆炸的形狀不變。E[S] 定尺度。新角色是 (1 + C²ₛ)/2：**變異數本身就是延遲的來源，C² 是它的計價單位**。ch14 的 Kingman 近似會把到達端的 C²ₐ 也接進來、變成 (C²ₐ + C²ₛ)/2，而 P-K 正是它在 Poisson 到達（C²ₐ = 1）時的精確特例。\n\n兩個立即的健全性檢查。C²ₛ = 1（指數服務）：E[T_Q] = ρE[S]/(1−ρ)，基準數字下 = 0.4 s，與 ch08 的 M/M/1 完全吻合 ✓。C²ₛ = 0（確定性服務）：因子變成 1/2——**M/D/1 的等待恰好是同參數 M/M/1 的一半**。這句金句的精確內容是：把服務時間標準化到完全一致，你能拿回的等待改善就是這一半，不多不少；剩下那一半來自 Poisson 到達的隨機性，不關服務的事。\n\n### 適用條件：哪一步用掉了什麼\n\n這張表是本章的靈魂——P-K 不是「M/G/1 的公式」，是「這五個條件的公式」：\n\n| 條件 | 在推導的哪一步被用掉 | 破掉時找誰 |\n|---|---|---|\n| Poisson 到達 | PASTA 那步：「你所見＝時間平均」 | ch14（Kingman，C²ₐ 旋鈕） |\n| FCFS（見下方放寬） | 分解式「殘餘＋前面每位的完整服務」 | ch13（排程） |\n| 服務 i.i.d.、與到達獨立、不看長度出工 | 佇列中每位貢獻不偏的 E[S] | ch13 |\n| ρ < 1、穩態長期平均 | 完成率＝到達率；Little | ch10（過載靠丟棄）、ch20（動態） |\n| E[S²] < ∞ | 面積論證的三角形加總 | ch15（重尾） |\n\nFCFS 那條要說精確，因為它常被講錯。推導本身用了 FCFS，但結論的**平均值**適用範圍更寬：在「非搶占、work-conserving、不看工作長度」的出工紀律家族裡——FCFS、非搶占 LCFS、隨機抽人——伺服器忙閒的時間軸完全相同（誰先誰後不影響「現在有沒有人在做事」），系統內人數過程 N(t) 的統計規律因此一樣，於是 E[N_Q] 一樣，Little 一除，E[T_Q] 一樣。**平均等待是這個家族的紀律不變量；等待的分布不是**——LCFS 的等待變異數遠大於 FCFS，倒霉的人可以等非常久。一旦紀律看長度（SJF、SRPT）、會搶占（PS）、或分優先級，連平均都變——那是 ch13 的主場，那裡的守恆律會把「總量不變、分配可選」講到底。\n\n### Worked example：基準三連比——同一個平均，三張帳單\n\n推播管線基準：λ = 8/s、E[S] = 100 ms、ρ = 0.8，全程不動。只動服務時間的形狀，C²ₛ ∈ {0, 1, 10}。\n\nC²ₛ = 10 的那檔需要一個具體分布。用二點分布：保留短工作 50 ms，設長工作長度 L、占比 q，解兩條帳：\n\n```text\nE[S]  = (1−q)·50 + q·L  = 100        ← 均值釘住\nE[S²] = (1−q)·2,500 + q·L² = 110,000  ← 110,000 = E[S]²(1+C²ₛ) = 10,000 × 11\n\n⇒ q = 1/41 ≈ 0.0244、L = 2,100 ms\n驗算：E[S]  = (40×50 + 2,100)/41 = 4,100/41 = 100 ✓\n      E[S²] = (40×2,500 + 2,100²)/41 = 4,510,000/41 = 110,000 ✓\n      C²ₛ  = (110,000 − 10,000)/10,000 = 10 ✓\n```\n\nch03 末尾為了示範「C²ₛ = 10 做得到」推過同一組參數；本章把它升格為**基準分布**：50 ms（機率 40/41）／2,100 ms（機率 1/41）。翻成人話：**2.4% 的請求各拖 2.1 秒**，C²ₛ 就是 10——你的系統裡幾乎一定有這種請求。\n\n三檔全算（E[T_Q] = λE[S²]/(2(1−ρ)) = 8·E[S²]/0.4 = 20·E[S²]，E[S²] 用秒²）：\n\n| C²ₛ | 分布 | E[S²] | E[r│忙] | E[T_Q] | E[T] | E[N_Q] | E[N] |\n|---|---|---|---|---|---|---|---|\n| 0 | 確定性 100 ms | 0.01 s² | 50 ms | **0.2 s** | 0.3 s | 1.6 | 2.4 |\n| 1 | 指數，均值 100 ms | 0.02 s² | 100 ms | **0.4 s** | 0.5 s | 3.2 | 4.0 |\n| 10 | 二點 50 ms／2,100 ms | 0.11 s² | 550 ms | **2.2 s** | 2.3 s | 17.6 | 18.4 |\n\n（E[T] = E[T_Q] + E[S]；E[N_Q] = λE[T_Q]、E[N] = E[N_Q] + ρ，都是 Little，ch02。）\n\n把這張表貼在心裡：三條管線的平均服務時間都是 100 ms、使用率都是 0.8、QPS 都一樣——**監控大盤上它們長得一模一樣**——等待差 11 倍，佇列裡平均囤的工作從 1.6 個變成 17.6 個。「一支報表 query 拖垮整條 API」的肇事機制現在有名字了：它不是吃掉了多少容量（ρ 沒變），是它把 E[S²] 撐爆了。\n\n## Transform 方法與 busy period：地圖上的兩個鄰居\n\n**等待的分布在哪裡？** mean-value 路線只給平均。完整分布有路可走：把分布打包成 Laplace–Stieltjes transform（LST）S̃(s) = E[e^(−sS)]，則 FCFS 的 M/G/1 等待時間的 LST 有封閉形式：\n\n```text\nW̃(s) = (1−ρ)s / (s − λ(1 − S̃(s)))     ← P-K transform 公式（本書不推導）\n```\n\n從它可以擠出所有矩（等待的變異數、偏度），數值反演可得整條分布與 tail。注意：**這條公式對紀律敏感，FCFS 是必要的**——上一節說的「平均是紀律不變量」到分布層級就失效了。本書不走這條路；想看完整處理，延伸閱讀的 Adan & Resing 與 Kleinrock 都有。直覺版（本書不證）：它存在這件事本身就值錢——意思是 M/G/1 的等待分布原則上完全可知，不必模擬。\n\n**Busy period（忙碌期）**：從一支工作抵達空系統開始、到系統再次清空為止的時段。它是伺服器視角的自然單位——「這波要多久才消化完」。系統在閒（idle）與忙（busy）之間交替：閒期是「等下一個 Poisson 到達」，無記憶（ch04），E[閒] = 1/λ；長期忙的時間比例是 ρ（ch02 的 Utilization Law）。自我一致地解：\n\n```text\nρ = E[B]/(E[B] + 1/λ)   ← 忙的比例＝忙期長度占循環的比例（工程師的嚴謹：長期平均的比值）\n⇒ E[B] = E[S]/(1−ρ) = 1/(μ−λ)\n```\n\n基準數字：E[B] = 0.1/0.2 = **0.5 s**，每個忙碌期平均消化 1/(1−ρ) = 5 支工作——而且**三種分布都一樣**。平均忙碌期對 C²ₛ 完全盲目，這乍看跟整章的主旋律打架。沒有打架：帳單藏在分布裡。直覺版（本書不證）：一支長度 x 的工作開頭的忙碌期，它服務期間平均招來 λx 支新工作，每支又各自展開一段平均 E[B] 的「子忙碌期」，自我一致地解出 E[B | 開頭是 x] = x/(1−ρ)。基準的那支 2,100 ms 長工作一進門，期望就是一段 2.1/0.2 = **10.5 秒**不間斷的忙碌——你的 30 秒報表 query 按同款公式是 150 秒。平均忙碌期不動，但忙碌期的變異數隨 C²ₛ 爆漲：絕大多數忙碌期短促（一支 50 ms 工作、沒人跟上，0.25 s 就收工），偶爾一段超長——P99 的等待全部囤積在那些超長忙碌期裡。忙碌期的完整分布同樣有 transform 刻畫（Kendall functional equation：φ(s) = S̃(s + λ − λφ(s))，存在聲明，本書不解）。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 只量平均服務時間就建模 | C²ₛ 在平均裡不可見：把 C²ₛ = 10 的現實當指數（C²ₛ=1）算，預測 0.4 s、實際 2.2 s，低估 5.5 倍；當確定性算低估 11 倍 | 量 E[S²] 或完整直方圖；用 ch03 的直方圖估法時記得結果是**下界** |\n| 到達不是 Poisson 卻套 P-K | P-K 沒有 C²ₐ 旋鈕——它硬寫死 C²ₐ = 1。上游是批次/retry 叢發（C²ₐ > 1）時低估；上游被 rate limiter 整形過（C²ₐ < 1，ch10）時高估 | 先量到達間隔的 C²ₐ；離 1 遠就換 ch14 的 Kingman |\n| 出工紀律不在「非搶占＋不看長度」家族 | 系統裡藏著優先級、搶占、或 worker 偷看工作大小，P-K 連平均都不再成立 | 確認消費端真正的出工順序；有 class 之分就用 ch13 的 priority 公式 |\n| 重尾服務 | Pareto α ≤ 2 時 E[S²] = ∞，P-K 回答「∞」——這不是公式壞掉，是真警報；更陰的是有限樣本估出的 E[S²] 永遠偏低且不收斂，你以為 C²ₛ = 12，其實沒有上限 | 看見直方圖右尾掛著就提高警覺；ch15 整章處理 |\n| 拿穩態公式套尖峰動態 | P-K 是長期平均：尖峰剛起或 ρ ≥ 1 的時段裡它沒有定義的意義 | 確認量測窗口處在近似穩態；過載與動態見 ch10/ch20 |\n\n自我察覺的徵兆：**ρ 沒動、平均服務時間沒動，等待卻在爬**——這個組合在 M/M/1 的世界裡無法解釋，在 P-K 的世界裡只有一個嫌犯：C²ₛ 漂移了。新上線的慢 endpoint、變大的批次、開始超時重試的下游，都會在平均裡隱身、在 E[S²] 裡現形。把 E[S²]（或 P99 服務時間）放上儀表板，比再多加三條平均值曲線都有用。\n\n## 紙上推演\n\n**推演 1 [15 分鐘] ★★ — P-K 推導重講**\n闔上書，從「標記一位乘客」開始把 E[T_Q] = λE[S²]/(2(1−ρ)) 推到底。要求：說出推導用掉的四個材料（分解式、PASTA、面積論證、Little），並指出——如果出工紀律換成 SJF，哪一步先斷？如果到達換成 cron 等距觸發，哪一步先斷？\n\n**推演 2 [10 分鐘] ★ — E[S²] 計算兩題**\n基準管線 λ = 8/s、ρ = 0.8 不變，算 E[T_Q]：\n(a) 服務時間均勻分布在 [50, 150] ms；\n(b) 服務時間是 ch13 的排程基準混合：90% × 50 ms ＋ 10% × 550 ms。\n\n**推演 3 [10 分鐘] ★★ — 均值不變、變異數砍半**\n維持 E[S] = 100 ms、ρ = 0.8，把 Var(S) 砍半。等待改善幾 %？分別對 C²ₛ = 10、1、0.1 的起點回答，並用一句話總結「壓變異數」這根槓桿什麼時候值得拉。\n\n**推演 4 [15 分鐘] ★★★ — 找出錯誤論證的破綻**\n審這段話：「佇列裡平均有 E[N_Q] 個人，每人平均要 E[S]；服務中那位平均也要 E[S]，但平均已經做到一半，所以再等 E[S]/2。故 E[T_Q] = E[N_Q]·E[S] + ρ·E[S]/2。」把這個式子解到底，看看它「推導」出了什麼公式；指出錯在哪一步、錯的本質是什麼假設。\n\n### 推演解答\n\n**推演 1。** 主鏈：\n\n```text\nE[T_Q] = E[r 所見] + E[N_Q 所見]·E[S]   ← 材料一：FCFS 分解（殘餘＋前面每位的完整服務）\n所見 → 時間平均                          ← 材料二：PASTA（Poisson 到達）\nE[r̄] = λE[S²]/2                         ← 材料三：鋸齒面積論證（需 E[S²] < ∞、穩態完成率 = λ）\nE[N_Q] = λE[T_Q]                         ← 材料四：Little 用在佇列\n⇒ E[T_Q] = λE[S²]/2 + ρE[T_Q] ⇒ E[T_Q] = λE[S²]/(2(1−ρ))\n```\n\n換 SJF：材料一先斷——排在你前面的不再是「先到的人」，後到的短工作會插隊，分解式整個重寫；同時「佇列長度與工作長度獨立」也死了（SJF 出工順序就是看長度）。換 cron 等距到達：材料二先斷——等距到達者看到的不是時間平均（ch08 用等距到達當過 PASTA 的反例），而且面積論證裡「完成率 = λ」雖然還活著，E[r 所見] ≠ E[r̄] 已足以讓答案錯掉。常見錯路：以為 cron 到達會讓面積論證本身失效——不會，r(t) 的時間平均照樣是 λE[S²]/2，死的是「你看到的＝時間平均」這座橋。\n\n**推演 2。** (a) Uniform[50, 150]：Var = (150−50)²/12 = 833.3 ms²，E[S²] = 10,000 + 833.3 = 10,833 ms²，C²ₛ = 0.0833。E[T_Q] = 0.2 × (1 + 0.0833) = **0.217 s**——離 M/D/1 的 0.2 s 不遠，±50% 的均勻抖動只貴 8%。(b) 混合：E[S²] = 32,500 ms²（本章算過），C²ₛ = 2.25，E[T_Q] = 0.2 × 3.25 = **0.65 s**。這個數字記住——ch13 會拿同一條管線問：不動硬體、只動出工順序，能把 0.65 s 壓到多少。\n\n**推演 3。** E[T_Q] ∝ 1 + C²ₛ，Var 砍半 ⇒ C²ₛ 砍半，改善比例 = (C²ₛ/2)/(1 + C²ₛ)。C²ₛ = 10：5/11 ≈ **45.5%**（2.2 s → 1.2 s）；C²ₛ = 1：**25%**（0.4 s → 0.3 s）；C²ₛ = 0.1：**4.5%**（幾乎白忙）。總結：變異數槓桿的收益跟你的叢發程度成正比——系統越亂，整治越值錢；已經接近確定性的系統，這根槓桿沒肉，去拉 ρ 槓桿（兩根槓桿的正式比價是 ch14 的 worked example）。\n\n**推演 4。** 把錯式解到底：E[T_Q] = λE[T_Q]·E[S] + ρE[S]/2 ⇒ E[T_Q](1−ρ) = ρE[S]/2 ⇒ E[T_Q] = ρE[S]/(2(1−ρ))——它「推導」出了 **M/D/1 的公式**（基準下 0.2 s）。錯在「平均已經做到一半，所以再等 E[S]/2」：這句對服務中那位用了**不偏的**平均長度、再砍半，完全忽略 inspection paradox——你撞上的工作平均長 E[S²]/E[S]，不是 E[S]。「做到一半」的直覺恰好等價於假設服務是確定性的（本章對帳三連發的第一條），所以這個論證在 D 的世界裡碰巧全對，在指數世界低估 2 倍，在 C²ₛ = 10 的世界低估 11 倍。錯誤論證最危險的形態就是這種：有一個世界讓它碰巧正確。\n\n### Python 小實驗\n\n事件驅動模擬，骨架沿用 ch08 的 DES（event list ＋ 模擬時鐘），只把服務時間換成三種分布；只用標準函式庫。把前 20,000 筆等待丟掉，是為了沖掉「從空系統起跑」的偏差——這手法的正式名字與紀律見 ch19。\n\n```python\nimport heapq\nimport random\n\nrandom.seed(42)\nLAM, N_JOBS, WARMUP = 8.0, 200_000, 20_000\n\ndef svc_d():  # deterministic: C2s = 0\n    return 0.1\ndef svc_m():  # exponential: C2s = 1\n    return random.expovariate(10.0)\ndef svc_b():  # two-point: 50 ms w.p. 40/41, 2100 ms w.p. 1/41 -> C2s = 10\n    return 0.05 if random.random() < 40 / 41 else 2.1\n\ndef mg1_mean_wait(svc):\n    \"\"\"Event-driven M/G/1 FCFS; reuses the ch08 DES skeleton.\"\"\"\n    events = [(random.expovariate(LAM), \"arr\")]  # (time, kind) min-heap\n    queue, waits, busy, done = [], [], False, 0\n    while done < N_JOBS:\n        t, kind = heapq.heappop(events)\n        if kind == \"arr\":\n            heapq.heappush(events, (t + random.expovariate(LAM), \"arr\"))\n            if busy:\n                queue.append(t)\n            else:\n                busy = True\n                waits.append(0.0)\n                heapq.heappush(events, (t + svc(), \"dep\"))\n        else:\n            done += 1\n            if queue:\n                waits.append(t - queue.pop(0))\n                heapq.heappush(events, (t + svc(), \"dep\"))\n            else:\n                busy = False\n    tail = waits[WARMUP:]  # drop start-up bias from the empty start (ch19)\n    return sum(tail) / len(tail)\n\nfor name, svc in [(\"D (C2s=0)\", svc_d), (\"M (C2s=1)\", svc_m), (\"2pt (C2s=10)\", svc_b)]:\n    print(f\"{name:13s} mean wait = {mg1_mean_wait(svc):.3f} s\")\n```\n\n理論值 0.2／0.4／2.2 s。每檔 200,000 支工作下的合理落點：D 應落在 0.200 ± 0.005、M 應落在 0.40 ± 0.03、二點分布應落在 2.2 ± 0.35（seed 42 的實跑：0.200、0.409、2.079）。注意第三檔的誤差帶寬了一個量級——**C²ₛ 越大，模擬收斂越慢**：等待全囤在偶發的超長忙碌期裡，樣本之間又高度相關，2.2 秒的帳單要跑很久才量得準。換幾顆種子（把 42 改成 0–9）你會看到第三檔在 1.9 到 2.4 之間晃、前兩檔紋風不動。這不是 bug，是 ch15（重尾讓它更糟）與 ch19（怎麼系統化地處理）的預告片。\n\n## 自我檢核\n\n口頭自答，講不清楚＝還沒懂：\n\n1. 為什麼「系統內人數」在 M/M/1 是完整狀態、在 M/G/1 不夠？分水嶺是哪個分布性質、誰證過它的唯一性？\n2. 你隨機時刻抵達，撞上的工作為什麼平均比 E[S] 長？把兩個偏差來源分開講，並說出各自貢獻哪個因子（×E[S²]/(E[S]·E[S]) 的長度加權、×1/2 的中點）。\n3. 重講鋸齒面積論證：E[r̄] = λE[S²]/2 的三步各用了什麼理由？哪一步需要 E[S²] < ∞、破掉時公式怎麼回答你？\n4. P-K 的五個適用條件各在推導的哪一步被用掉？哪一個在你現職的系統最常破、破的方向是高估還是低估？\n5. 「平均等待與出工順序無關」的精確版本是什麼？哪些紀律在家族裡、哪些不在？為什麼平均是不變量而分布不是？\n6. 「M/D/1 是 M/M/1 的一半」——砍半的是 E[T_Q] 還是 E[T]？基準數字下 E[T] 的比值是多少？\n7. 平均忙碌期 E[S]/(1−ρ) 對 C²ₛ 盲目，那 C²ₛ = 10 的痛藏在哪裡？用「一支 2,100 ms 工作開頭的忙碌期平均多長」回答。\n8. 監控大盤只給你 QPS、平均延遲、平均服務時間——要用 P-K 你還缺哪個數？怎麼量、量出來的值該往哪個方向打折？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013)，Ch. 23 \"The M/G/1 Queue and the Inspection Paradox\"——本章的教科書對應章；用 renewal-reward 框架把本章的面積論證寫嚴格，想補嚴格版就讀它。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Adan & Resing,《Queueing Systems》講義（TU Eindhoven，免費 PDF）——M/G/1 一章把 mean-value 路線與 transform 路線並排講，殘餘服務時間的處理跟本章同路；推完本章拿它對答案。https://www.win.tue.nl/~iadan/queueing.pdf\n- Wikipedia \"Pollaczek–Khinchine formula\"——平均式與 transform 式的對照、Pollaczek 1930／Khinchine 1932 的歸屬簡史，本章的 W̃(s) 寫法出自這裡。https://en.wikipedia.org/wiki/Pollaczek%E2%80%93Khinchine_formula\n- Wikipedia \"M/G/1 queue\"——embedded chain 的轉移結構長什麼樣、busy period 的 Kendall functional equation，當本章兩個「存在聲明」的下一步入口。https://en.wikipedia.org/wiki/M/G/1_queue\n- Pollaczek 1930, \"Über eine Aufgabe der Wahrscheinlichkeitstheorie\", *Mathematische Zeitschrift* 32——歷史原典（德文、複變方法），看一眼就會感激 mean-value 路線的存在。https://link.springer.com/article/10.1007/BF01194620\n"}, {"id": "ch13-scheduling", "file": "ch13-scheduling.md", "group": "Part IV — 超越指數", "title": "ch13 — 排程：誰先服務的代價與正義", "md": "# ch13 — 排程：誰先服務的代價與正義\n\n> **本章解決什麼問題**：ch12 推完 P-K 之後留了一個缺口：整套結果蓋在 FCFS 上，而「誰先服務」是你手上最便宜的旋鈕——不加機器、不改業務邏輯，只換出工順序。本章先證明排程動不了什麼（工作量守恆、Kleinrock 守恆律），再算清楚它能動什麼：同一台伺服器、同一批工作，總體平均回應時間可以從 0.245 s 排到 1.17 s，差 4.8 倍。SRPT 的最優性、PS 的 insensitivity、「餓死長工作」的真相都在這裡結案；ch14 接著把到達端的變異數接進來，ch15 再讓重尾世界檢驗本章每個結論。\n\n## 從你已知的出發\n\n你做過的排程決策比你以為的多。SQS consumer 照到達順序逐條處理，是 FCFS；把報表類慢請求踢到獨立 worker pool，是用拓撲實作優先權（ch09 推演第 4 題埋過這顆種子）；K8s 給線上服務配高 PriorityClass、讓 batch pod 被驅逐讓位，是搶占；而你每天寫的 Node.js 服務，單執行緒上幾百個請求的 callback 交錯推進——那是哪種紀律？ch08 留過一句話：Node 的事件迴圈不是 FCFS。本章會給它正確的名字，也會誠實地說它哪裡不配這個名字。\n\nch12 結尾留了一道具體的題：排程基準——90% 短工作（50 ms）、10% 長工作（550 ms）、λ = 8/s、ρ = 0.8——FCFS 之下平均等待 0.65 s。不動硬體、只動出工順序，能壓到多少？這章把答案算到底，順便分清楚哪些帳是守恆的（你以為賺到的其實是轉嫁給別人），哪些是真的賺。\n\n## 工作量守恆：排程改不了的那條線\n\n定義 V(t)：時刻 t 系統內所有工作的剩餘服務需求總和，叫**未完成工作量（unfinished work／workload）**。它的動態簡單到殘忍：\n\n```\n V(t)  未完成工作量：到達瞬間跳升該工作的 Sᵢ、非空時以斜率 −1 消化\n ▲\n │  |\\  |\\\n │  | \\ | \\\n │  |  \\|  \\\n │  |   |   \\        |\\\n │  |   |    \\       | \\\n └──┴───┴────────────┴────▶ t\n    a₁  a₂    ↑空閒   a₃  ↑空閒\n```\n\n```text\n到達時刻 aᵢ：V 跳升 Sᵢ      ← 跳的時刻與高度由到達過程與工作尺寸決定，與排程無關\nV > 0 時：  dV/dt = −1     ← work-conserving：伺服器全速消化——消化「誰」不影響總量\nV = 0 時：  dV/dt = 0\n```\n\n兩條規則裡都沒有「順序」這個字。所以在**每一條 sample path 上**，V(t) 對所有 work-conserving 紀律逐點相同——FCFS、LCFS、優先權、PS、SRPT，全部畫出同一條鋸齒。嚴謹度：**工程師的嚴謹**，每步理由都能口頭講出來；它甚至不需要 Poisson，任何到達過程都成立。但條件要抄下來，每一條都會在工程現實裡被打破：**單一伺服器全速工作（非空不偷懶）、搶占不損失已完成的工作（preempt-resume 而非 restart）、不丟棄工作、切換無成本**。\n\nV 的平均值我們其實已經算過：FCFS 下，到達者的等待恰好等於到達瞬間的 V（伺服器會先消化完這座山才輪到你），PASTA（ch08）說「你看到的＝時間平均」，所以 E[V] = FCFS 的 E[T_Q] = W₀/(1−ρ)，其中 **W₀ ≔ λE[S²]/2** 就是 ch12 鋸齒面積論證的時間平均殘餘服務時間（這個值需要 M/G/1）。基準數字：W₀ = 8×0.0325/2 = 0.13 s，E[V] = 0.13/0.2 = 0.65 s。\n\n這就是本章的第一定理，也是一切排程討論的地基：**排程不創造容量，V(t) 這座山一克都不會變小；排程能動的，只有這座山怎麼攤到每顆人頭上。**\n\n## 不看長度的家族：平均全相同、tail 大不同\n\n第一個攤法家族：**非搶占、且完全不看工作長度**的紀律——FCFS、非搶占 LCFS（最後到的先做）、RANDOM（隨機抽人）。現在把 ch12 那句「平均等待是這家族的紀律不變量」正面證完。\n\n對任何非搶占紀律，V 可以拆成兩塊：服務中那位的殘餘，加上佇列中每位的**完整**尺寸（非搶占：排隊者還沒開始跑）：\n\n```text\nE[V] = W₀ + E[Σ 佇列中工作的尺寸]\n     = W₀ + E[N_Q]·E[S]        ← 不看長度 ⇒ 佇列長度與尺寸獨立（工程師的嚴謹，同 ch12 那步）\n     = W₀ + λE[T_Q]·E[S]       ← Little 用在佇列上（ch02）\n     = W₀ + ρ·E[T_Q]\n\n又 E[V] = W₀/(1−ρ)             ← 上一節：V 對全家族不變\n\n⇒ E[T_Q] = W₀/(1−ρ)            ← 跟 FCFS 一字不差\n```\n\n多數人第一次聽都不信的就是 LCFS 那檔：**最後到的先服務，平均等待居然跟先到先服務一模一樣**。直覺修復法：LCFS 下有人被瘋狂插隊，但插隊者少等的每一秒，恰好就是被插者多等的那一秒——V 的面積總量固定；而「誰被抽中倒霉」與工作長度無關，所以攤到每顆人頭的期望值不動。注意這個論證用掉三個條件：非搶占（拆 V 那步）、不看長度（獨立性那步）、work-conserving（E[V] 不變那步）。缺一即破——下兩節就是專門去破它的。\n\n平均相同，分布天差地遠。FCFS 的等待頂多是「眼前這座山」；LCFS 的倒霉鬼會被困在一整段忙碌期裡——ch12 算過，一支 2,100 ms 工作開頭的忙碌期平均 10.5 秒，LCFS 下早到的人就在裡面看著後到者一個個先走。精確可引的版本是：**在這個家族裡，FCFS 的等待時間變異數最小**（Kingman 1962，兩頁短文，完整證明見延伸閱讀）；LCFS 在家族裡是另一個極端。所以「換個出工順序救 P99」在這個家族裡是反向操作：平均不動、tail 只會更鬆。**想動平均，必須看長度；想動 tail 而不看長度，FCFS 已經是最優解。**\n\n## Kleinrock 守恆律：等待的總帳與匯率\n\n把工作分成 k 類：第 i 類到達率 λᵢ（總 Poisson 流按類分流，ch05 的 thinning 保證各類仍是獨立 Poisson）、尺寸 i.i.d.、ρᵢ = λᵢE[Sᵢ]。紀律可以看**類別**（包括「類別恰好等於長度」），但維持非搶占、類內不看長度、work-conserving。逐類重複上面的拆帳：\n\n```text\nE[V] = W₀ + Σᵢ E[N_Q,i]·E[Sᵢ]      ← 非搶占：排隊者帶完整尺寸；類內不看長度給獨立性\n     = W₀ + Σᵢ λᵢE[T_Q,i]·E[Sᵢ]    ← Little 逐類用（ch02）\n     = W₀ + Σᵢ ρᵢE[T_Q,i]\n\n⇒ Σᵢ ρᵢ·E[T_Q,i] = ρ·W₀/(1−ρ)      ← Kleinrock 守恆律（M/G/1、非搶占、work-conserving、穩態）\n```\n\n這條恆等式是 Kleinrock 1965 年在 Naval Research Logistics Quarterly 上證的（涵蓋的紀律家族比這裡寫的還寬），它值得貼在牆上的原因是右邊**不含任何紀律資訊**：基準數字下永遠等於 0.8×0.13/0.2 = **0.52 s**。你怎麼排，這本總帳一毛不差。\n\n關鍵在幣別。守恆的是 **ρ 加權**的等待，不是人頭加權：人頭平均 = Σ(λᵢ/λ)E[T_Q,i]，權重是 λᵢ；總帳權重是 ρᵢ = λᵢE[Sᵢ]，差一個 E[Sᵢ]。所以人頭平均完全可以動——**把等待搬到「每顆人頭攜帶較多工作量」的類別身上，總帳不變、人頭帳下降**。短工作優先就是這個套利：每單位 ρ 裡塞了更多顆人頭。守恆律同時也是審計工具：任何「大家都變快」的排程宣傳，拿 0.52 s 一驗便知有沒有人在帳外付錢。\n\n## 看長度出工：非搶占優先權、SJF 與 VIP 的帳單\n\n把套利做成公式。兩類，類 1 優先（非搶占：服務中的工作做完才換人），類內 FCFS。標記一位類 1 到達者，材料全是 ch12 那套——分解、PASTA、Little：\n\n```text\nE[T_Q,1] = W₀ + E[N_Q,1]·E[S₁]          ← 等：服務中者的殘餘（含類 2 的！非搶占趕不走）＋ 前面同類\n         = W₀ + ρ₁E[T_Q,1]              ← PASTA ＋ Little\n⇒ E[T_Q,1] = W₀/(1−ρ₁)\n\n類 2 到達者多等兩塊：到達時已排隊的兩類，加上自己等待期間新來插隊的類 1：\nE[T_Q,2] = W₀ + ρ₁E[T_Q,1] + ρ₂E[T_Q,2] + λ₁E[T_Q,2]·E[S₁]\n⇒ E[T_Q,2](1−ρ₁−ρ₂) = W₀ + ρ₁·W₀/(1−ρ₁) = W₀/(1−ρ₁)\n⇒ E[T_Q,2] = W₀/((1−ρ₁)(1−ρ₁−ρ₂))\n```\n\n一般 k 類（σᵢ ≔ ρ₁+…+ρᵢ）：**E[T_Q,i] = W₀/((1−σᵢ₋₁)(1−σᵢ))**。兩個分母各管一個機制：(1−σᵢ₋₁) 是「等待期間不斷插隊的高優先新客」，(1−σᵢ) 是「到達時已經排在前面的人」。適用條件：各類 Poisson、非搶占、類內不看長度、work-conserving、ρ < 1。SJF（Shortest Job First：到達時已知尺寸、每次挑最短的做）就是「類別＝尺寸」的極限：類切到連續時公式變成 E[T_Q(x)] = W₀/(1−ρ(x))²，ρ(x) 是尺寸 ≤ x 的工作貢獻的負載（敘述層級，推導同上但要極限手續）。\n\n### Worked example：同一條管線的五張帳單\n\n排程基準，全程不動：λ = 8/s、E[S] = 100 ms、ρ = 0.8。兩點分布下「短類優先」與 SJF 是同一個紀律（類內尺寸全同，按尺寸排＝按類排）：\n\n```text\n類 1（短）：λ₁ = 0.9×8 = 7.2/s、E[S₁] = 0.05 s、E[S₁²] = 0.0025 s²、ρ₁ = 0.36\n類 2（長）：λ₂ = 0.8/s、       E[S₂] = 0.55 s、E[S₂²] = 0.3025 s²、ρ₂ = 0.44\nW₀ = (λ₁E[S₁²] + λ₂E[S₂²])/2 = (0.018 + 0.242)/2 = 0.13 s   ← 與 λE[S²]/2 = 8×0.0325/2 同帳 ✓\n\nFCFS：    E[T_Q] = W₀/(1−ρ) = 0.13/0.2 = 0.65 s（ch12 推演 2b ✓）\n短優先：  E[T_Q,1] = 0.13/0.64 = 0.203 s\n          E[T_Q,2] = 0.13/(0.64×0.2) = 1.02 s\n長優先：  E[T_Q,2] = 0.13/0.56 = 0.232 s\n          E[T_Q,1] = 0.13/(0.56×0.2) = 1.16 s\n搶占短優先（公式見下節）：\n          E[T_Q,1] = λ₁E[S₁²]/(2(1−ρ₁)) = 0.009/0.64 = 0.0141 s\n          E[T_2]   = 0.55/0.64 + 1.02 = 1.88 s ⇒ E[T_Q,2] = 1.33 s\nPS（見後）：E[T(x)] = x/(1−ρ) = 5x ⇒ E[T_Q,1] = 0.2 s、E[T_Q,2] = 2.2 s\n```\n\n| 紀律 | E[T_Q] 短 | E[T_Q] 長 | E[T_Q] 總體 | E[T] 總體 | Σρᵢ·E[T_Q,i] |\n|---|---|---|---|---|---|\n| FCFS | 0.65 s | 0.65 s | 0.65 s | 0.75 s | 0.52 ✓ |\n| 短優先（非搶占）＝SJF | 0.203 s | 1.02 s | 0.284 s | 0.384 s | 0.36×0.203+0.44×1.02 = 0.52 ✓ |\n| 長優先（非搶占） | 1.16 s | 0.232 s | 1.07 s | 1.17 s | 0.36×1.16+0.44×0.232 = 0.52 ✓ |\n| 短優先（搶占） | 0.0141 s | 1.33 s | 0.145 s | 0.245 s | 0.588 ✗（不在守恆家族） |\n| PS | 0.20 s | 2.20 s | 0.40 s | 0.50 s | 1.04 ✗（不在守恆家族） |\n\n（總體 E[T_Q] = 0.9×短 + 0.1×長；E[T] = E[T_Q] + 0.1。）三張非搶占帳單的 ρ 加權全部對上 0.52——守恆律自我複核通過；兩張搶占帳單對不上，**這不是算錯，是它們不在守恆律的家族裡**（搶占把「排隊者帶完整尺寸」那步拆帳弄假了）。\n\n讀這張表的三個重點。第一，ch12 的支票兌現：不動硬體，0.65 → 0.284 s（非搶占看長度），再到 0.145 s（搶占）——等待砍 78%。第二，**長工作沒有付出對等的慘痛**：短優先下長類等待 0.65 → 1.02 s，多付 56%，換來短類少付 69%、總體少付 56%——因為長類每顆人頭背 0.55 s 的工作量，匯率划算。第三，長優先那列是「VIP 通道」的帳單：把優先權給大客戶的批次匯出（重工作），總體平均幾乎翻倍（0.65 → 1.07 s），而守恆律提醒你這不是浪費、是轉嫁——0.52 一毛不差，全部由短請求用高匯率付掉。**VIP 通道在佇列論裡的精確代價：你讓 ρ 大的類插隊，就是讓 ρ 小的類付帳。** 順帶一句更一般的裁決：若第 i 類每秒等待的成本是 cᵢ，非搶占 M/G/1 下最小化平均等待成本的順序是按 cᵢμᵢ 遞減出工（**cμ rule**；μᵢ = 1/E[Sᵢ]）——SJF 是「人人成本相同」的特例，而「VIP = 成本高」只有在 cᵢ 真的高到蓋過 μᵢ 劣勢時才成立。\n\n## 搶占與 SRPT：最優性的內容與代價\n\n非搶占有一塊鐵地板：W₀。短工作再優先，撞上正在服務的 550 ms 工作也只能等——卡車已經上橋。搶占（preempt-resume）拆掉這塊地板。兩類搶占優先權的結果（**敘述層級**，推導見 Harchol-Balter；用「高優先類根本看不見低優先類」自洽檢核）：\n\n```text\nE[T_1] = E[S₁] + λ₁E[S₁²]/(2(1−ρ₁))      ← 就是純類 1 的 M/G/1 P-K：類 2 完全隱形\nE[T_2] = E[S₂]/(1−ρ₁) + W₀/((1−ρ₁)(1−ρ))  ← 服務本身也被拉長（不斷被插斷）＋等待\n```\n\n條件：preempt-resume 不損失工作、切換零成本——兩條在現實都要打折。\n\n把「看長度」與「搶占」推到極限就是 **SRPT（Shortest Remaining Processing Time）**：任何時刻都服務剩餘量最小的工作，新到的更短就立刻搶占。它的最優性是排隊理論最乾淨的定理之一：\n\n**定理（敘述）**：單一伺服器、允許搶占、剩餘尺寸已知，則對**任意**到達時刻與尺寸序列（不需要 Poisson、不需要任何分布假設），SRPT 使每個時刻的系統內工作數 N(t) 逐 sample path 最小。\n\n交換論證 sketch（**工程師的嚴謹**）：設某排程在某時刻服務剩餘量較大的 j，而較小的 k 也在系統內。把之後分給 j、k 的服務時段重新洗牌——先湊滿 k 的剩餘量、剩下給 j：兩者中先完成者的完成時刻不會變晚（k 較小），後完成者不變（總時段不變），其他工作毫無感覺。所以每個時刻的完成數不減、N(t) 不增；對每個違規時刻重複交換即得。完整證明是 Schrage 1968——體裁是 Letter to the Editor，三頁多一點（出處見 landscape／延伸閱讀）。N 最優之後，Little 接手：λ 是外生的，E[N] 最小 ⇒ E[T] = E[N]/λ 最小——**SRPT 是總體平均回應時間的最優紀律**。基準表的 0.245 s 因此是 SRPT 的上界（它不輸搶占短優先；精確值要積 Schrage–Miller 1966 的 per-size 公式，本書不算）。\n\n接著處理那句反射式質疑：「SRPT 餓死長工作。」在 M/G/1、ρ < 1 的穩態下，這大半是迷思，而且有定理背書（以下全部「敘述＋條件」，證明見 Bansal & Harchol-Balter 2001，比較基準是 PS——下一節的「公平」標竿）：\n\n- **ρ ≤ 1/2 時全員受益**：任何（連續、矩有限的）尺寸分布，每一種尺寸的 E[T(x)] 在 SRPT 下都 ≤ PS。\n- **任何 ρ < 1**：只要尺寸 ≤ x 的工作貢獻的負載 ρ(x) ≤ 1/2，尺寸 x 就受益。重尾型負載（最大 1% 的工作背走過半負載，ch15 的世界）下這代表**至少 99% 的工作在任何負載下都偏好 SRPT**；指數分布下也有 81%。\n- **最壞情況有上界**：任何尺寸、任何 ρ < 1，E[T(x)] 頂多是 PS 的 ρ/(2(1−ρ))+1 倍——ρ = 0.8 時 ≤ 3 倍、0.9 時 ≤ 5.5 倍。直覺：長工作反正要待很久，墊底的時段多半是系統本來就忙的時段；而且它一旦開跑，剩餘量遞減、優先權單調上升。\n- **誠實的另一面**：尺寸有上界的分布、ρ → 1 時，**最大**那支工作在 SRPT 下確實比 PS 慘（同論文有反向定理）；過載 ρ > 1 時更直接——SRPT 讓 ρ(x) < 1 的工作仍有有限回應時間（PS 給所有人 ∞），代價是最大的工作真的永遠出不來。**穩態下餓死是迷思，過載下餓死是設計**：犧牲最大工作保全其他人，要明知故犯，不要不知不覺。\n\nSRPT 的真正門檻是操作性的：要能搶占、要知道剩餘尺寸。尺寸未知時有不需尺寸的近親（FB/LAS：服務「已獲服務量最少」者），本書不展開，指路 Harchol-Balter。\n\n## PS：理想化的 time-sharing 與 insensitivity\n\n**PS（Processor Sharing）**：n 個工作在系統裡，每個以 1/n 的速率同時前進——把 round-robin 的時間片推到無限薄的理想化。它是搶占的、看不看長度都無所謂（人人均分）。M/G/1-PS 的核心結果（**敘述＋指路**：RR 取極限的原始分析是 Sakata–Noguchi–Oizumi 1971；教科書處理見 Harchol-Balter）：\n\n```text\nE[T(x)] = x/(1−ρ)          ← 尺寸 x 的工作，期望回應時間正比於自身尺寸\n⇒ E[T] = E[S]/(1−ρ)        ← 對 x 取期望\n```\n\n第二行就是 **insensitivity（不敏感性）**：E[T] 只透過 E[S] 依賴服務分布——C²ₛ 從公式裡消失了。對照 P-K 的 (1+C²ₛ)/2 因子：FCFS 對變異數開帳單，PS 直接把帳單撕掉。基準管線不管 C²ₛ 是 0、1、2.25 還是 10，PS 的 E[T] 都是 0.1/0.2 = 0.5 s——ch12 那張差 11 倍的三連比表被壓成一個數，而且恰好是 ch08 的 M/M/1 數字（指數服務 C²ₛ = 1 時 FCFS 與 PS 平均同值，不是巧合，是 insensitivity 把所有分布都釘在這個值）。這個性質屬於一個小家族（PS、LCFS-PR、M/M/∞ 型的 IS——ch09 預告過 Erlang-B 的 insensitive 也是這家的），條件與邊界 ch18 用 BCMP 定理收攏。注意它只保**平均**：PS 的等待分布、tail 仍然依賴完整分布。\n\nPS 與 FCFS 的平均對決有精確判據：兩者等待之比是 (1+C²ₛ)/2，所以 **C²ₛ > 1 時 PS 贏、< 1 時 FCFS 贏**、指數打平。基準的 C²ₛ = 2.25：PS 等待 0.4 s < FCFS 0.65 s。\n\nPS 真正的招牌是公平的精確化。定義 **slowdown ≔ T/S**（回應時間除以自身服務時間——「我多揹了幾倍」）。PS 下 E[T(x)]/x = 1/(1−ρ) 對所有 x 相同：**人人期望 slowdown 都是 5**（ρ = 0.8）。對照基準表算 FCFS：短工作 0.70/0.05 = 14 倍、長工作 1.20/0.55 = 2.2 倍——**「先來後到」聽起來公平，在 slowdown 尺度上它是對短工作最殘忍的紀律**：50 ms 的活揹 14 倍，550 ms 的活只揹 2.2 倍。但 PS 也不是聖人：看絕對值，它把長類拖到 2.75 s——比 FCFS 的 1.2 s 兇得多（守恆家族外，ρ 加權帳單 1.04 是五張帳單裡最貴的）。PS 的公平是**比例**公平，買單的是長工作的絕對延遲。公平性理論還有更多刻度，本書停在 slowdown 這一格。\n\n## 工程化身：event loop、OS 與被驅逐的 pod\n\n**Node.js 單執行緒事件迴圈 ≈ PS 的工程化身**——這個 ≈ 值得拆開。像的地方：同時掛著幾百個 in-flight 請求，每個請求被 await 切成小段 CPU 片，事件迴圈輪流推進；拉遠看人人同時緩慢前進，正是 PS 的圖像。而且請求的大半「服務時間」是等下游 IO，那段不佔 CPU（性格上更像 ch09 的 M/M/∞，不佔這台單伺服器）——真正在被排程的是 CPU 片。不像的地方有三條。①**run-to-completion**：一個 callback 開始跑就沒有任何東西能打斷它，「搶占」只發生在你自己寫的 await 邊界——PS 假設時間片無限薄，Node 的時間片厚度＝你最長的同步片段。一段 200 ms 的同步 JSON.parse 期間全機請求凍結：那一刻你不是 PS，是「非搶占、不看長度」家族，W₀ = λE[S²]/2 原封不動回來咬你，而且 E[S²] 是**同步片段**的二階矩。②輪轉不均勻：microtask（promise continuation）佇列會抽乾才放手，timers 與 IO callback 分屬不同 phase 批次處理（官方文件明寫每個 phase「執行佇列中的 callback 直到耗盡」）——比 round-robin 偏心得多。③沒有份額保證：PS 給每人 1/n 是定義，event loop 給誰多少看誰的 callback 密。工程結論一句話：**把 await 切細＝把量子變薄＝向 PS 逼近；event loop lag 這個指標量的就是你離 PS 有多遠。** OS 的 time-sharing 排程器（Linux 的 CFS 家族）同理：加權 PS 的工程近似，量子粒度與切換成本是它離理想化的距離。\n\n**K8s PriorityClass** 是優先權＋搶占，但搶占的實作是**驅逐**：被趕走的 pod 不從斷點續跑，已做的工作蒸發。這是 preempt-restart，不是 preempt-resume——直接違反 work conservation，本章所有公式共同的地基。被驅逐重跑＝系統憑空多出工作量，「總帳固定」死亡，所以高負載下優先權搶占可能讓總吞吐下降：不是 bug，是兩種搶占語意的數學差別。LLM serving 的 continuous batching 排程（誰進下一個 iteration）是本章工具的直接應用場——一句話帶過，見 ch20 與書架上的《從後端到 AI Infra》。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 在不看長度家族裡換紀律救延遲 | FCFS→LCFS/RANDOM：平均不動（守恆）、變異數與 tail 只會更鬆（FCFS 已是家族內變異數最小，Kingman 1962） | 想動平均：看長度或搶占；動不了就去 ch14 降 C²；tail 想緊：留在 FCFS |\n| 拿 P-K／M/M/1 套有隱藏優先權的系統 | worker 偷挑小訊息先做時，實際總體等待 0.284 s、P-K 卻說 0.65 s——高估 2.3 倍；長優先方向則嚴重低估 | 確認消費端真實出工順序；分類量 λᵢ、E[Sᵢ]、E[Sᵢ²]，套本章公式並用 0.52 對總帳 |\n| 把搶占當免費 | preempt-resume 是模型假設；現實有 context switch、cache 失溫，K8s 驅逐更是 restart——工作量蒸發、守恆地基塌掉，吞吐不升反降 | 量「搶占稅」：λ 不變下 ρ 是否爬升；重跑率放上儀表板 |\n| SRPT 的尺寸哪裡來 | 尺寸估錯時長工作被誤插到前面，優勢縮水甚至反噬；多數系統根本拿不到剩餘尺寸 | 拿不到尺寸就用不需尺寸的紀律（PS／FB 一族）；或粗分兩三級就能吃到大半好處（推演 2） |\n| 「餓死長工作」當教條（或當迷思） | 兩個方向都錯：穩態 M/G/1 下重尾負載 99% 工作更好、最壞 ≤3×（ρ=0.8）；但 ρ→1 的最大工作與過載情境，餓死是真的 | 先看 ρ 與尺寸分布再表態；過載下用 SRPT＝明知犧牲最大者，配 admission control（ch10）兜底 |\n| 在 Node 裡自認 PS | 一段厚同步片段讓全機瞬間退化成非搶占家族，P99 走樣而平均看似正常 | 監控 event loop lag；CPU 重活切片或丟 worker thread |\n\n自我察覺的徵兆：**平均沒動、tail 動了**——家族內換了紀律（或 LCFS 式行為混進來，例如重試把舊請求推到隊尾）；**某類請求的延遲與全站 ρ 脫鉤**——系統裡藏著你不知道的優先權，按類拆開量 E[T_Q,i]、拿 ρ 加權總帳對 0.52 的同款公式，一驗便知。\n\n## 紙上推演\n\n**推演 1 [15 分鐘] ★★ — 守恆律驗證**\n另一條管線：λ = 10/s，80% × 50 ms、20% × 200 ms。(a) 算 ρ、W₀、FCFS 等待；(b) 短優先非搶占的兩類等待；(c) 驗證兩種紀律的 Σρᵢ E[T_Q,i] 都等於 ρW₀/(1−ρ)；(d) 兩種紀律的人頭平均各多少？這組混合 C²ₛ < 1（算出來），SJF 還有肉嗎——這對「排程收益 vs C²ₛ」說了什麼？\n\n**推演 2 [15 分鐘] ★★ — 優先權公式應用：C²ₛ = 10 的管線**\nch12 基準分布：50 ms（機率 40/41）、2,100 ms（機率 1/41）、λ = 8/s，FCFS 等待 2.2 s。給短工作非搶占優先權：算兩類等待、人頭平均、守恆驗證。然後解釋：短類等待仍是自身服務時間的 14 倍——瓶頸在公式哪一項？換搶占後短類等待多少？\n\n**推演 3 [20 分鐘] ★★★ — 決策分析：長工作專用 pool vs SRPT（ch09 第 4 題結案）**\n4 台 worker、排程基準混合流量放大四倍（λ = 32/s）。方案 A：拆 1 台做長工作專用、3 台短工作專用；方案 B：4 台共用佇列＋短優先（或 SRPT）。不要求算 M/M/c 優先權（本書不教多伺服器排程公式），要求：列出至少四個決策判準，每個判準說明它把你推向哪一案，最後給出「什麼情境選 A、什麼情境選 B」的裁決。\n\n### 推演解答\n\n**推演 1。** (a) E[S] = 0.8×50+0.2×200 = 80 ms，ρ = 10×0.08 = 0.8；E[S²] = 0.8×2,500+0.2×40,000 = 10,000 ms² = 0.01 s²；W₀ = 10×0.01/2 = 0.05 s；FCFS E[T_Q] = 0.05/0.2 = **0.25 s**。(b) ρ₁ = 8×0.05 = 0.4、ρ₂ = 2×0.2 = 0.4；E[T_Q,1] = 0.05/0.6 = **0.0833 s**、E[T_Q,2] = 0.05/(0.6×0.2) = **0.417 s**。(c) 目標 ρW₀/(1−ρ) = 0.8×0.05/0.2 = 0.2：FCFS 0.8×0.25 = 0.2 ✓；短優先 0.4×0.0833+0.4×0.417 = 0.0333+0.167 = 0.2 ✓。(d) FCFS 人頭 0.25 s；短優先 0.8×0.0833+0.2×0.417 = **0.15 s**，降 40%。C²ₛ = (10,000−6,400)/6,400 = 0.5625 < 1：這裡 PS 會輸 FCFS（PS 等待 = ρE[S]/(1−ρ) = 0.32 s > 0.25 s），SJF 卻照贏 40%。教訓：**C²ₛ > 1 是「PS 贏 FCFS」的門檻，不是「看長度有沒有用」的門檻**——只要長度可分級，優先權在任何 C²ₛ > 0 下都有肉；真正沒肉的只有 C²ₛ = 0 的同質工作（沒有「短」可優先）。\n\n**推演 2。** λ₁ = 8×40/41 = 7.80/s、ρ₁ = 0.390；λ₂ = 8/41 = 0.195/s、ρ₂ = 0.410；W₀ = 8×0.11/2 = 0.44 s。E[T_Q,1] = 0.44/0.610 = **0.722 s**；E[T_Q,2] = 0.722/0.2 = **3.61 s**；人頭 = (40×0.722+3.61)/41 = **0.792 s**——2.2 → 0.792，省 64%。守恆：0.390×0.722+0.410×3.61 = 0.282+1.48 = 1.76 = 0.8×0.44/0.2 ✓。短類 0.722 s 的來源拆 W₀：λ₂E[S₂²]/2 = 0.195×4.41/2 = 0.430 s——98% 是「正在服務的 2,100 ms 工作的殘餘」，非搶占優先權對它無能為力（卡車已上橋）。搶占後短類只看同類殘餘：E[T_Q,1] = λ₁E[S₁²]/(2(1−ρ₁)) = 0.00976/0.610 = **0.0160 s**——再省 45 倍。C²ₛ 越極端，搶占相對於「只給優先權」的價值越大；ch15 把這件事推到重尾的極限。\n\n**推演 3。** 判準框架：①**長度可知性**——B 需要到達時知道（或可靠估計）長短；拿不到就只剩 A：用 routing 代替排程是「窮人版 SJF」，分類錯誤率就是它的稅。②**搶占可行性**——工作能不能安全中斷（冪等？checkpoint？）；不能搶占時，A 的硬隔離買到搶占的部分效果：長工作再長也只堵自己 pool，不會把 W₀ 塞進短工作的帳（ch12 的殘餘機制）。③**池化稅 vs 變異數隔離**——ch09 三連比：拆 pool 讓「有人等且有機器閒」變可能，A 付池化稅；B 在穩態贏（守恆律＋優先權公式：總帳同、人頭帳更好），但兩類共享同一個 ρ，長類流量飆升會吃掉短類的 headroom。④**過載行為**——B 配 SRPT 在 ρ > 1 時餓死最長工作（本章定理的誠實面）；A 的長 pool 自己塞死、短 pool 無感，故障域清晰、好解釋好運維。裁決：穩態平均效能選 B；最壞情況隔離與運維清晰度選 A；常見折衷是共用＋優先權、外加每類 admission control（ch10 的 K）兜底。重點不是背答案，是每個取捨現在都有名字和公式。\n\n## 自我檢核\n\n口頭自答，講不清楚＝還沒懂：\n\n1. work conservation 守恆的精確內容是什麼（哪個量、哪種意義、對哪些紀律）？哪三種工程現實會打破它？\n2. 重講「FCFS／LCFS／RANDOM 平均等待全相同」：哪一步用了非搶占、哪一步用了不看長度、哪一步用了 V 不變？這個相等需要 Poisson 到達嗎？哪個「值」才需要？\n3. Kleinrock 守恆律的幣別為什麼是 ρᵢ 不是 λᵢ？短優先為什麼能在總帳不變下壓低人頭平均？\n4. 非搶占優先權公式的兩個分母因子各對應什麼機制？W₀ 為什麼包含低優先類的殘餘？\n5. SRPT 最優性的精確主張：哪個量、哪種意義（逐 sample path 還是期望）、需要哪些操作條件？Little 在哪一步把 N 的最優翻成 E[T] 的最優？\n6. 「SRPT 餓死長工作」何時是迷思（給負載與分布條件、最壞倍數）、何時是事實？\n7. PS 的 insensitivity 說了什麼、沒說什麼？你的 Node 服務在什麼條件下有資格引用 E[T] = E[S]/(1−ρ)，什麼徵兆代表資格被取消了？\n8. FCFS 在哪個尺度上「最公平」、在哪個尺度上「最殘忍」？用基準數字（14 倍 vs 2.2 倍）講一遍 slowdown 的觀點。\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013)，Part VII \"Smart Scheduling\"（Ch. 28–33）——本章每個「敘述層級」結果的完整推導都在這卷，含 FB/LAS 等不需尺寸的紀律；排程是她的主場，讀起來有火氣。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Kleinrock 1965, \"A Conservation Law for a Wide Class of Queueing Disciplines\", *Naval Research Logistics Quarterly* 12(2): 181–192——守恆律原典，UCLA 有開放 PDF；看他定義的紀律家族比本章寬在哪。https://www.lk.cs.ucla.edu/data/files/Kleinrock/A%20Conservation%20Law%20for%20a%20Wide%20Class%20of%20Queueing%20Disciplines.pdf\n- Kingman 1962, \"The Effect of Queue Discipline on Waiting Time Variance\", *Math. Proc. Cambridge Philos. Soc.* 58(1): 163–164——「FCFS 變異數最小」的兩頁原典，數學短文的典範。https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/effect-of-queue-discipline-on-waiting-time-variance/D48362807F5674D679592E8BBA13C63C\n- Schrage 1968, \"Letter to the Editor—A Proof of the Optimality of the Shortest Remaining Processing Time Discipline\", *Operations Research* 16(3): 687–690——SRPT 最優性完整證明；搭配 Schrage & Miller 1966（*Operations Research* 14(4): 670–684）的 per-size 公式。https://pubsonline.informs.org/doi/10.1287/opre.16.3.687\n- Bansal & Harchol-Balter 2001, \"Analysis of SRPT Scheduling: Investigating Unfairness\", SIGMETRICS 2001——「餓死長工作」的逐條量化（本章引用的定理全在這），讀第 5 節就值回票價。https://www.cs.cmu.edu/~harchol/Papers/Sigmetrics01.pdf\n- Sakata, Noguchi & Oizumi 1971, \"An Analysis of the M/G/1 Queue Under Round-Robin Scheduling\", *Operations Research* 19(2): 371–385——PS 作為 RR 極限的原始分析、insensitivity 的出處之一。https://pubsonline.informs.org/doi/10.1287/opre.19.2.371\n- Node.js 官方文件 \"The Node.js Event Loop, Timers, and process.nextTick()\"——拿本章的 PS 眼鏡重讀 phases 與「執行到耗盡」的語意，會看到不一樣的東西。https://nodejs.org/en/learn/asynchronous-work/event-loop-timers-and-nexttick\n"}, {"id": "ch14-gg1-kingman", "file": "ch14-gg1-kingman.md", "group": "Part IV — 超越指數", "title": "ch14 — G/G/1 與 Kingman：工程師的萬用近似", "md": "# ch14 — G/G/1 與 Kingman：工程師的萬用近似\n\n> **本章解決什麼問題**：ch12 放掉了指數服務、ch13 放掉了 FCFS 的出工順序，本章放掉最後一根柱子——Poisson 到達。代價立刻攤牌：G/G/1 沒有封閉解，這是全書第一次正面承認「公式到頭了」。但你會拿到兩樣替代品：**Lindley recursion**，一條精確到可以直接餵 production trace 的遞迴（它就是 ch19 模擬的核心迴圈）；以及 **Kingman 近似**——讀成 VUT 公式之後，它是全書的工程總綱：等待 ≈ 變異性 × 使用率 × 時間。ch10 借走的整形帳單在這裡還本付息，ch15 會炸掉它的重尾邊界，ch18 拿它當網路分解的磚塊。\n\n## 從你已知的出發\n\n做容量規劃時你真正擁有的是什麼？不是「到達是 Poisson、服務是指數」的證書，而是監控系統裡的四個數字：QPS、平均服務時間、到達間隔的抖動、服務時間的抖動。Part III 的公式全都要求前兩個假設，而你的系統兩個都不滿足：推播管線的到達流是使用者行為、整點 cron 批次、下游 retry 的匯流——ch05 的 Palm–Khintchine 直覺只擔保「大量獨立稀疏來源」那部分像 Poisson，cron 與 retry 是少數、肥大、彼此相關的來源，它們把到達間隔的變異推離指數。本章基準就用這個設定：量測得 **C²ₐ = 2**——比 Poisson 叢發，但還沒病態。\n\n手上還有兩張舊借據。ch10 的整形段落借用了一條「ch14 的公式」算出 0.4 s → 0.2 s；ch12 推演 3 留了話：「兩根槓桿的正式比價是 ch14 的 worked example」。本章全部結清。最後一個錨點是你做過的壓測：k6 固定速率打出來的延遲總是比 production 好看，差距還不小。這不是工具的 bug——固定間隔把 C²ₐ 做成了 0，你壓測的是另一個系統。本章會算出你低估了幾倍。\n\n## G/G/1：公式到此為止\n\n記號對齊：G/G/1 ＝ 到達間隔 Aₙ 是 i.i.d. 任意分布（第一個 G，General；E[A] = 1/λ）、服務時間 Sₙ 是 i.i.d. 任意分布、與到達獨立（第二個 G）、單一伺服器、FCFS、無限緩衝、ρ = λE[S] < 1。\n\n為什麼沒有封閉解？要描述某時刻的系統，你得記三件事：佇列長度、服務中工作已進行多久、距上一次到達多久。兩個連續時鐘，而且兩個都不再無記憶——ch12 殺掉了服務端的時鐘，現在到達端的也死了。Part III 的生滅引擎雙缸熄火；PASTA 也陣亡（到達不是 Poisson）。倖存者名單很短但很硬：Little's Law（ch02 說它與分布、排程、結構全部無關——現在你知道那個「無關」多值錢）、Utilization Law（ρ = λE[S]）、work conservation（ch13）。\n\n還有更深一層的「沒有」。G/G/1 的 E[T_Q] 不是由兩個分布的少數幾階矩決定的——**整個分布形狀都進場**：兩組前兩階矩完全相同、形狀不同的分布，會給出不同的等待。所以「沒有封閉解」不是還沒找到，而是答案本質上是一個吃整條分布的泛函。Lindley 1952 把問題化成一條積分方程；一般解法要動用 Wiener–Hopf 分解，只在特殊結構（M/G/1、GI/M/1 等）落回公式——存在聲明，本書不展開。\n\n本章策略雙軌：一條**精確的遞迴**（不給公式、給演算法），一條**漸近的近似**（給公式、附誤差說明書）。\n\n## Lindley recursion：沒有公式，但有一條精確的迴圈\n\n設第 n 位乘客在 tₙ 到達、等了 Wₙ、服務 Sₙ；Aₙ₊₁ 是第 n 與 n+1 位之間的到達間隔。完整推導，只有兩個 case：\n\n```text\n第 n 位：tₙ 到達、等 Wₙ、服務 Sₙ ⇒ 離開時刻 Dₙ = tₙ + Wₙ + Sₙ\n第 n+1 位：tₙ₊₁ = tₙ + Aₙ₊₁ 到達\n\n若 tₙ₊₁ < Dₙ：前一位還沒清完 ⇒ Wₙ₊₁ = Dₙ − tₙ₊₁ = Wₙ + Sₙ − Aₙ₊₁\n若 tₙ₊₁ ≥ Dₙ：到達時伺服器已空 ⇒ Wₙ₊₁ = 0\n\n合併：Wₙ₊₁ = max(0, Wₙ + Sₙ − Aₙ₊₁)      ← Lindley recursion（Lindley 1952）\n```\n\n用掉的假設只有四個：單一伺服器、FCFS、work-conserving（有工作就不偷懶）、緩衝無限。清單上**沒有任何分布假設**——這是一條逐樣本路徑成立的恆等式，對任何序列 {Sₙ}、{Aₙ} 都對，包括從你 production log 撈出來的那條。手追一遍（單位 ms）：\n\n| n | 到達 tₙ | Sₙ | Wₙ 的計算 | Wₙ |\n|---|---|---|---|---|\n| 1 | 0 | 100 | 空系統 | 0 |\n| 2 | 80 | 120 | max(0, 0+100−80) | 20 |\n| 3 | 230 | 80 | max(0, 20+120−150) = max(0, −10) | 0 |\n| 4 | 290 | 200 | max(0, 0+80−60) | 20 |\n| 5 | 390 | 60 | max(0, 20+200−100) | 120 |\n\n看 job 3：Wₙ + Sₙ − Aₙ₊₁ = −10 ms，被 max(0,·) 沒收。那 10 ms 是伺服器的閒置——存不起來、之後也補不回來。這個不對稱就是 ch01「λ < μ 還是會排隊」的代數形態：**盈餘（提早完工）被歸零，赤字（遲到）全額遞延**。等待是一具棘輪，只有撞到 0 才重置；佇列系統所有的非線性都藏在這個 max 裡。\n\n它的工程價值被嚴重低估：把 access log 的到達時刻與服務時間餵進去，三行程式重放歷史；然後改劇本問反事實問題——服務快 10% 等待掉多少？到達整形之後尖峰還在嗎？不需要任何模型假設，**trace 本身就是模型**。ch19 會把這條遞迴正式任命為 G/G/1 模擬的核心迴圈，並補上方法學（warmup、信賴區間——那裡才是讓模擬說真話的主場）。多伺服器的對應遞迴要追每台機器的剩餘工作向量，本書不展開——ch19 直接用事件驅動模擬。\n\n理論面的收尾：ρ < 1 時 Wₙ 的分布收斂到唯一的平穩分布（Lindley 1952，本書不證）；求這個平穩分布＝解 Lindley 積分方程，於是繞回上一節的死路。精確路線到此為止，接下來換近似。\n\n## ρ → 1：等待為什麼變成指數\n\n定義 Uₙ = Sₙ − Aₙ₊₁，遞迴變成 Wₙ₊₁ = max(0, Wₙ + Uₙ)：**等待是一個被反射在 0 的隨機漫步**，步伐 Uₙ 的均值與變異數是\n\n```text\nE[U] = E[S] − E[A] = −(1−ρ)/λ < 0        ← 負漂移：長期往 0 走\nVar(U) = σ²ₛ + σ²ₐ                        ← S 與 A 獨立，變異數相加\n```\n\n```\n Wₙ（第 n 個 job 的等待；反射在 0 的隨機漫步）\n ▲\n │                 *\n │              * * *\n │     *       *     *\n │    * *   * *       *           * *\n │   *   * *           *         *   *\n │  *     *             *   *   *     *\n └─*─────────────────────*─*─*─────────▶ n\n   撞到 0 ＝ 伺服器閒置、漫步重新出發；\n   ρ→1 時漂移趨近 0，兩次觸底之間的「長征」越來越長\n```\n\n直覺版論證（本書不證，嚴格版見延伸閱讀）：ρ 接近 1 時漂移 −(1−ρ)/λ 微弱，漫步很少回到 0——等待在「長征」裡累積，每段長征是**幾百幾千步 Uₙ 的總和**。很多 i.i.d. 隨機變數的和，中央極限定理出手：和的行為只由 E[U] 與 Var(U) 決定，分布的第三階矩以上、形狀細節，全部被加總洗掉。這就是 heavy traffic 的核心訊息——**飽和邊緣，世界只剩前兩階矩**。負漂移漫步反射在 0 的平穩分布是指數形（把它想成 ch08 的 M/M/1 在連續極限的影子），均值為 Var(U)/(2|E[U]|)：\n\n```text\nE[T_Q] ≈ Var(U)/(2|E[U]|) = λ(σ²ₐ + σ²ₛ)/(2(1−ρ))     ← ρ→1 的極限形\n```\n\n嚴格版的歸屬（依 landscape 查證）：Kingman 1961 的三頁短文 \"The Single Server Queue in Heavy Traffic\"（PCPS）首次給出，1962 年 JRSS-B 的長文 \"On Queues in Heavy Traffic\" 一般化——常被混引成一篇，其實是兩篇。順帶的禮物：既然 ρ→1 時等待趨向指數分布，ch08 的「P99 ≈ 4.6 × 平均」經驗式在 G/G/1 的飽和區近似還魂——條件是 ρ 夠高、尾巴夠輕（ch15 會沒收後者）。\n\n低 ρ 時這套論證從第一句就斷：漫步常常觸底，等待由一兩步內的事件決定（你撞上誰的殘餘），沒有「長征」讓 CLT 洗掉形狀——記住這個斷點，誤差帳要用。\n\n## Kingman 上界：一頁紙的推導\n\nheavy traffic 給的是極限，不是保證。同樣的式子其實對**所有** ρ < 1 都是上界——這是 Kingman 1962 年在 Biometrika 的第三篇論文（\"Some inequalities for the queue GI/G/1\"；1961–62 他連發三槍）。推導值得你抄一遍，全程只有一個不等號。\n\n把遞迴寫成無截斷的形式：Wₙ₊₁ = Wₙ + Uₙ + Yₙ，其中 Yₙ = max(0, −(Wₙ+Uₙ)) 是這一步被沒收的閒置。關鍵恆等式：Yₙ > 0 時 Wₙ + Uₙ = −Yₙ，所以 (Wₙ+Uₙ)·Yₙ = −Yₙ²（Yₙ = 0 時兩邊都是 0）。平方展開：\n\n```text\nWₙ₊₁² = (Wₙ+Uₙ)² + 2(Wₙ+Uₙ)Yₙ + Yₙ² = (Wₙ+Uₙ)² − Yₙ²\n\n穩態下取期望，E[Wₙ₊₁²] = E[Wₙ²] = E[W²]：\nE[W²] = E[W²] + 2E[W]E[U] + E[U²] − E[Y²]   ← Wₙ 與 Uₙ 獨立（W 只由更早的 U 決定）\n⇒ E[W] = (E[U²] − E[Y²]) / (2|E[U]|)         ← E[U] < 0，移項\n\n一次方的期望平衡：0 = E[U] + E[Y] ⇒ E[Y] = |E[U]|（恆等式，不是不等式）\n全程唯一的不等號：E[Y²] ≥ (E[Y])² = E[U]²    ← 變異數非負，丟掉的是 Var(Y)\n⇒ E[W] ≤ (E[U²] − E[U]²)/(2|E[U]|) = Var(U)/(2|E[U]|) = λ(σ²ₐ + σ²ₛ)/(2(1−ρ))\n```\n\n嚴謹度：**工程師的嚴謹**——每步能口頭交代；「穩態二階矩存在且相等」當作前提（需要 ρ < 1 與兩個分布的二階矩有限），不另證。鬆緊的物理：丟掉的 Var(Y) 是**閒置塊的變異數**。ρ 低時閒置常見、大小不一，丟得多——M/M/1、ρ = 0.8 代入：上界 8×(1/64 + 0.01)/0.4 ≈ 0.513 s，精確值 0.4 s，偏高 28%。ρ → 1 時閒置幾乎絕跡、Var(Y) → 0，上界貼住真值——與上一節的極限同形，不是巧合。\n\n基準數字（C²ₐ = 2、C²ₛ = 1）：σ²ₐ = C²ₐ/λ² = 2/64 = 0.03125 s²、σ²ₛ = C²ₛE[S]² = 0.01 s²，上界 = 8 × 0.04125/0.4 = **0.825 s**。這是模型假設內「保證不超過」的數字；接下來把它磨成更準的估計。\n\n## VUT：把上界校準成全書總綱\n\n從上界到通行的 Kingman 近似只有一步：**把到達端的變異數打 ρ² 折**，σ²ₐ → ρ²σ²ₐ。誠實聲明：這一步不是推導，是**校準**——折扣的大小恰好讓 C²ₐ = 1 時公式落在 P-K 上（M/G/1 精確），而 ρ → 1 時折扣消失、與 heavy-traffic 極限相容。一條在「已知精確解的特例」與「已知極限」之間內插的公式，這就是 Kingman 近似的真實身分：\n\n```text\nE[T_Q] ≈ λ(ρ²σ²ₐ + σ²ₛ)/(2(1−ρ))\n       = λE[S]²(C²ₐ + C²ₛ)/(2(1−ρ))      ← ρ²σ²ₐ = ρ²C²ₐ/λ² = C²ₐE[S]²；σ²ₛ = C²ₛE[S]²\n       = ρ/(1−ρ) · (C²ₐ + C²ₛ)/2 · E[S]  ← λE[S] = ρ\n```\n\n換個順序讀，就是它通行世界的名字——**VUT 公式**（製造業文獻的命名，Hopp & Spearman 的《Factory Physics》把它叫 the VUT equation，當經文掛在工廠牆上）：\n\n```text\nE[T_Q] ≈ (C²ₐ + C²ₛ)/2 · ρ/(1−ρ) · E[S]\n          ──────┬──────   ───┬───   ─┬──\n           V 變異性       U 使用率   T 時間\n```\n\n**等待 ＝ 變異性 × 使用率 × 時間尺度**。三個因子各自獨立成章：V 是 ch03 埋的主角 C² 的最終形態——到達與服務的變異**各付各的帳、等權平分**；U 是 ch08 的 hockey stick，原樣存活；T 定尺度。全書的工程訊息濃縮成一行：想縮短等待，三根槓桿——降變異、降使用率、縮服務時間——別無其他。\n\n適用條件先講在前面（這章本身就是在講「近似的誠實」）：①到達間隔 i.i.d.（renewal）——C²ₐ 只描述邊際分布，間隔序列的**時間相關性不在模型裡**；②服務 i.i.d.、與到達獨立、不看長度出工（FCFS；平均值同 ch12 的紀律家族）；③ρ < 1、穩態；④二階矩有限（C² 要存在，重尾見 ch15）；⑤除下面兩個特例外，**它沒有精確的時候**。\n\n兩個健全性檢查，也是你敢把它帶上線的理由：\n\n- **C²ₐ = C²ₛ = 1**（M/M/1）：E[T_Q] ≈ 4 × 1 × 0.1 = **0.4 s**——ch08 基準的精確值，分毫不差（M/M/1 是 M/G/1 的特例，下一條的特例）。\n- **C²ₐ = 1、C²ₛ 任意**（M/G/1）：化回 ρ/(1−ρ) · E[S] · (1+C²ₛ)/2——**正是 P-K，精確**（ch12）。ch12 的 0.2／0.4／2.2 s 三連比全部被 VUT 收編。\n\n被兩個精確結果與一個極限定理三點釘住的內插——這比「經驗公式」高一個信任等級，但仍然是近似。\n\n### Worked example：基準 0.6 s 全算\n\n```text\n量測：λ = 8/s、E[S] = 100 ms（μ = 10/s）⇒ ρ = 0.8\n      C²ₐ = 2（cron 批次＋retry 匯流，比 Poisson 叢發）\n      C²ₛ = 1（服務抖動與指數同級）\n\nV = (C²ₐ + C²ₛ)/2 = (2+1)/2 = 1.5\nU = ρ/(1−ρ) = 0.8/0.2 = 4\nT = E[S] = 0.1 s\n\nE[T_Q] ≈ 1.5 × 4 × 0.1 = 0.6 s            E[T] = 0.6 + 0.1 = 0.7 s\nE[N_Q] = λE[T_Q] = 4.8                     ← Little（ch02）\nE[N] = E[N_Q] + ρ = 5.6                    ← E[N_服務中] = ρ（ch02）\n上界對照：E[T_Q] ≤ 0.825 s（上一節）\n```\n\n同 λ 同 μ 的 M/M/1 是 0.4 s：到達端的叢發（C²ₐ 從 1 到 2）讓等待多 50%，而 QPS 與平均服務時間的儀表板上**什麼都看不到**。想要 tail：借 heavy-traffic 的指數形狀，t₉₉ ≈ ln 100 × 0.6 ≈ 2.76 s——直覺版估計，ρ = 0.8 算「夠飽和」的邊緣，當量級用、別簽進 SLA。\n\n### Worked example：同樣的錢——C² 砍半 vs ρ 降 0.05\n\nch12 推演 3 的承諾。基準 0.6 s，兩種花錢方式：\n\n| 選項 | 動作 | 新參數 | E[T_Q] | 改善 |\n|---|---|---|---|---|\n| V 槓桿 | 上游 cron 拆成 pacing：C²ₐ 2→0.5 | V = 0.75 | 4×0.75×0.1 = 0.3 s | **−50%** |\n| U 槓桿（加容量） | μ 加 6.7%：10→10.7 | ρ = 0.75、T = 93.8 ms | 3×1.5×0.0938 = 0.422 s | −30% |\n| U 槓桿（切流量） | λ 8→7.5 | U = 3 | 3×1.5×0.1 = 0.45 s | −25% |\n\nρ = 0.8 這一格，V 槓桿明顯贏。但兩根槓桿的**收益結構**不同，這才是重點：\n\n- V 砍半在**任何** ρ 都恰好砍半等待——乘法結構，收益固定。\n- U 槓桿的收益是 hockey stick 的局部斜率：ρ 0.8→0.75 只值 25%；ρ 0.95→0.90 是 19→9，值 **−52.6%**。交叉點約在 ρ ≈ 0.94：懸崖邊先降 ρ，沒有別的話好說。\n- V 槓桿有**地板**：C² ≥ 0，而且服務若維持指數，V ≥ (0+1)/2 = 0.5——砍半的次數有限。U 槓桿沒有地板，但每一步都是容量帳單。\n\n工程裁決：正常營運區（ρ ≤ 0.9）的變異性整治常常接近免費午餐——整形、pacing、去抖動、拆批次都是軟體活（ch10 的 leaky bucket 正是 V 槓桿的化身、token bucket 是 U 槓桿的守門員）；飽和區（ρ > 0.94）一切讓位給降 ρ。ch20 的容量規劃 walkthrough 會把這張天平用在真實量測上。\n\n## 準確度的誠實帳\n\n一條近似的價值，取決於你知不知道它什麼時候錯、往哪邊錯。三個薄弱帶：\n\n**低 ρ**：heavy-traffic 的「長征」邏輯失效，等待由單次撞擊決定，分布形狀重新 matter——相對誤差變大（絕對值倒是小，U 因子壓著）。方向：**C²ₐ < 1 時偏高**。數字：ρ = 0.8、等距到達＋指數服務（C²ₐ = 0、C²ₛ = 1），Kingman 給 0.2 s，精確值（GI/M/1 理論可解，本書不推導）≈ 0.169 s——偏高 18%，ρ 越低偏越多。所以 ch10 按 Kingman 記的整形帳單 0.4 → 0.2 s，精確帳其實更漂亮（≈ 0.17 s）：近似在這個方向上是保守的。要更準：Krämer–Langenbach-Belz（1976）的修正因子就是為 C²ₐ < 1 區設計的（指路，本書不推）。\n\n**重尾**：Pareto α ≤ 2 時變異數無限，C² 根本不存在，公式無定義；更陰的是有限樣本估出的 C²ₛ 永遠是個「看起來合理」的有限數，而且隨樣本變大一路上漂——你以為在用兩階矩近似，其實在用雜訊。方向：**嚴重低估**。徵兆與後果 ch15 整章處理。\n\n**相關到達**：C²ₐ 量的是到達間隔的**邊際**變異，抓不到間隔序列的自相關——on/off 叢發、整點齊發、retry 連環，都能在 C²ₐ 不大的偽裝下讓等待爆掉，Kingman **低估、可差到數量級**。要把相關性建進模型，關鍵字是 MMPP（Markov-modulated Poisson process）與 Whitt 的 QNA（1983）；要誠實，直接 Lindley 重放 trace——本章推演 1(b) 會讓你親手看到：同樣的邊際分布、不同的順序、四倍的等待。\n\n最後一層誠實：就算一切 i.i.d.、輕尾、ρ 中等，兩組前兩階矩相同、形狀不同的分布也會給出不同等待——VUT 對它們一視同仁，誤差幾十 % 是常態、量級通常可信。正確定位：**羅盤與比較器**（兩個設計哪個好、先拉哪根槓桿、數量級多少），不是**精算器**。要承諾數字，去 ch19。\n\n## G/G/c：Allen–Cunneen 式擴展\n\n多伺服器版本沒有新理論，只有同一招校準的再利用：拿 M/M/c 的精確等待（ch09 的 Erlang-C）當底，乘上同一個變異性因子——通行名稱掛在 Allen 與 Cunneen 名下（教科書與工具圈慣稱；原始出處難考，未驗證到第一手文獻）：\n\n```text\nE[T_Q] ≈ ErlangC(c, a)/(cμ − λ) · (C²ₐ + C²ₛ)/2\n         ────────┬──────────────   ──────┬──────\n          M/M/c 的精確等待（ch09）     同一個 V 因子\n```\n\n健全性檢查照舊：c = 1 時 ErlangC = ρ，底數變 ρE[S]/(1−ρ)，還原 Kingman；C²ₐ = C²ₛ = 1 還原 M/M/c 精確值。基準小算：ch09 的 c = 4、λ = 32/s、μ = 10/s，E[T_Q]^M/M/4 ≈ 74.6 ms；接上本章的 C²ₐ = 2、C²ₛ = 1，× 1.5 ≈ **112 ms**，E[T] ≈ 212 ms。\n\n地位要誠實標：它比 c = 1 的 Kingman 更沒有理論地位——連 heavy-traffic 那層保證都更弱（多機極限是另一套理論，ch09 提過的 Halfin–Whitt 一帶而過、本書不展開），c = 1 的三個薄弱帶原樣繼承且更糟。用法不變：羅盤，不是精算器。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 拿 VUT 簽 SLA | 兩個特例之外它永遠有誤差，幾十 % 是常態；分布形狀與相關性都不在模型裡 | 用它比較設計、選槓桿、估量級；要承諾數字用模擬（ch19）或上界 |\n| 固定速率壓測餵假 C²ₐ | 固定間隔 ⇒ C²ₐ ≈ 0：壓測量到 0.2 s 的系統，真流量（C²ₐ = 2）下是 0.6 s——低估 3 倍 | 壓測重放真實 trace；至少按量測到的 C²ₐ 生成到達流 |\n| C²ₐ 漏掉時間相關 | cron／retry／on-off 流可以 C²ₐ ≈ 1 但等待爆掉，低估可達數量級 | 按 1 秒與 1 分鐘兩種桶分別算到達數的變異對均值比：Poisson 兩者皆 ≈ 1；隨桶變大而上升 ⇒ 相關性在場，改 trace 重放或 MMPP |\n| 重尾下的 C² 是雜訊 | α ≤ 2 時 C² 無定義；樣本估計值隨樣本量一路漂，永遠偏低 | 畫 running C² 曲線，不收斂就停用兩矩近似（ch15） |\n| 低 ρ 區硬讀近似值 | 相對誤差大；C²ₐ < 1 時偏高約 20% 起跳 | 低 ρ 時等待本來就小，別摳近似的小數點；要準用 KLB 修正或模擬 |\n| ρ ≥ 1 或非穩態 | U 因子變負或發散，公式無意義；尖峰動態它也不管 | 先驗 ρ < 1、量測窗近穩態；過載見 ch10、動態見 ch20 |\n\n自我察覺最值錢的一條是第三行：**C²ₐ 對統計視窗的依賴**。i.i.d. 的世界裡，到達數的變異對均值比不隨桶的大小變；它隨桶變大而上升，就是時間相關性的指紋——這時 VUT 給的數字是樂觀的下限，別當預測用。\n\n## 紙上推演\n\n**推演 1 [15 分鐘] ★ — Lindley 手追 6 個 job**\n等距到達、間隔 100 ms（固定速率壓測的世界）：Aₙ₊₁ ≡ 100。\n(a) S = [150, 150, 50, 50, 50, 50] ms：手追 W₁…W₆，算總等待。\n(b) 同一袋服務時間換個順序：S = [50, 50, 50, 50, 150, 150]，重追。兩袋的 E[S] 與 C²ₛ 完全相同，總等待差多少？這對「C² 抓不到什麼」說了什麼？\n\n**推演 2 [15 分鐘] ★★ — Kingman 應用兩題**\n(a) 影音轉檔服務量測：λ = 5/s、E[S] = 150 ms、C²ₐ = 4（上傳高度叢發）、C²ₛ = 3（檔案大小混雜）。估 E[T_Q]、E[T]、E[N_Q]；三根槓桿（C²ₐ→1、C²ₛ→1、λ 砍到 ρ = 0.7）各值多少，先拉哪根？\n(b) 三個場景判斷 VUT 可不可用、不可用為什麼：①ρ = 0.3、C²ₐ = 1.2、C²ₛ = 0.8 的內部 RPC；②服務時間 Pareto α = 1.8 的物件儲存；③量測 C²ₐ = 1.1、但到達全擠在整點前後 2 秒的報表服務。\n\n**推演 3 [10 分鐘] ★★ — 固定間隔壓測低估多少**\nproduction 量測：C²ₐ = 2、C²ₛ = 1、ρ = 0.8、E[S] = 100 ms。壓測平台以完全固定的間隔發請求（C²ₐ = 0），同 λ 同 μ。用 VUT 算兩個世界的 E[T_Q] 與低估倍數；再答：壓測改用 Poisson 發生器（C²ₐ = 1），低估剩多少？\n\n**推演 4 [15 分鐘] ★★★ — 上界推導重講**\n闔上書，重推 E[T_Q] ≤ λ(σ²ₐ + σ²ₛ)/(2(1−ρ))。要求：說出 Yₙ 的物理意義；指出全程唯一的不等號、丟掉的量；解釋為什麼 ρ → 1 時上界變緊、ρ 低時變鬆。\n\n### 推演解答\n\n**推演 1。** (a) 逐步：W₁ = 0；W₂ = max(0, 0+150−100) = 50；W₃ = max(0, 50+150−100) = 100；W₄ = max(0, 100+50−100) = 50；W₅ = max(0, 50+50−100) = 0；W₆ = max(0, 0+50−100) = 0。總等待 **200 ms**。兩支長工作開路，賒的帳由後面三位分期償還。\n(b) W = [0, 0, 0, 0, 0, 50]，總等待 **50 ms**——同一袋工作、同樣的到達，順序一換差 4 倍。長工作在前，賒帳給所有後繼者；長工作在後，只賒給最後一位，而前面短工作墊出的空檔被 max(0,·) 沒收也無妨——本來就沒人在等。教訓：E[S] 與 C²ₛ 是**邊際**統計量，對順序（序列相關）全盲；Kingman 對 (a)(b) 給出同一個答案。這就是「相關性誤差」的最小可重現案例，也是壓測要整段重放 trace、不要打亂順序重抽樣的理由。\n\n**推演 2。** (a) ρ = 5×0.15 = 0.75 ⇒ U = 3；V = (4+3)/2 = 3.5；T = 0.15 s。E[T_Q] ≈ 3×3.5×0.15 = **1.58 s**、E[T] ≈ 1.73 s、E[N_Q] = 5×1.575 = 7.88。槓桿：C²ₐ→1 ⇒ V = 2 ⇒ 0.9 s（−43%）；C²ₛ→1 ⇒ V = 2.5 ⇒ 1.13 s（−29%）；λ→4.67（ρ = 0.7）⇒ U = 2.33 ⇒ 1.23 s（−22%）。先拉 C²ₐ：最大的單一數字，而且上傳叢發常有軟體解（pacing、前置佇列）；砍流量最貴又最沒效。附註：這些百分比是 VUT 內部的比較——近似誤差對三個選項大致同方向，所以**排序**比**數值**可信。\n(b) ①可用但讀對身分：U = 0.43、V = 1.0，E[T_Q] ≈ 0.43·E[S]——絕對值小、相對誤差可能幾十 %，當量級估計。②不可用：α = 1.8 ⇒ Var(S) = ∞ ⇒ C²ₛ 不存在，樣本算出的值是會漂的雜訊；換 ch15 的工具。③形式上可用、實際上會騙人：C²ₐ = 1.1 看似無辜，但「整點前後 2 秒」是極端時間相關，邊際分布與真實機制脫鉤——Kingman 嚴重低估；老實做法是按整點叢發用 Lindley 手算或模擬。\n\n**推演 3。** 真實：0.6 s（worked example）。固定間隔：V = (0+1)/2 = 0.5 ⇒ 4×0.5×0.1 = **0.2 s**，低估 **3 倍**。Poisson 發生器：V = 1 ⇒ 0.4 s，仍低估 1.5 倍——把到達「修好」成 Poisson 只還了一半的債，剩下的藏在 C²ₐ = 2 與 1 的差距裡。補一刀：固定間隔世界的精確值其實比 0.2 還低（≈ 0.17 s，GI/M/1 理論，本書不推導），對照 production 的真實差距比 3 倍更難看。寫進壓測 checklist：**到達流的形狀是測試設計的一部分，不是工具的預設值**。\n\n**推演 4。** 主鏈：Yₙ = max(0, −(Wₙ+Uₙ)) 是這一步被沒收的閒置；恆等式 (Wₙ+Uₙ)Yₙ = −Yₙ² 讓平方展開塌掉；穩態二階矩相等消去 E[W²]；一次方平衡 E[Y] = |E[U]| 是恆等式；唯一的不等號是 E[Y²] ≥ (E[Y])²，丟掉 Var(Y)——閒置塊的變異數。ρ → 1：閒置幾乎絕跡、Var(Y) → 0，上界貼住真值（與 heavy-traffic 極限同形）；ρ 低：閒置常見且大小參差，Var(Y) 肥大——M/M/1、ρ = 0.8 的對照：上界 0.513 s vs 精確 0.4 s（+28%）。常見錯路：把 E[Y] = |E[U]| 那步當成不等號——它是期望平衡的恆等式；整個推導的不等號只有一個。\n\n## 自我檢核\n\n口頭自答，講不清楚＝還沒懂：\n\n1. G/G/1 為什麼沒有封閉解？狀態裡多出哪兩個時鐘、各殺死 Part III 的哪件工具？「沒有封閉解」與「沒有精確演算法」是同一句話嗎（Lindley 怎麼回答）？\n2. 重講 Lindley recursion 的推導：max(0,·) 沒收的是什麼？為什麼它是逐樣本路徑的恆等式、清單上的四個假設是哪四個？\n3. ρ → 1 時等待為什麼趨向指數？「只剩前兩階矩」靠哪個極限定理洗掉高階資訊？這套論證在低 ρ 哪一句先斷？\n4. 上界推導全程唯一的不等號在哪？丟掉的量的物理意義是什麼、什麼時候丟得多？\n5. VUT 的 ρ² 折扣是推導還是校準？它被哪三個點釘住？這對你信任它的方式有什麼含義？\n6. C²ₐ = 2 在你的系統可能從哪來？固定速率壓測把它做假成多少、等待因此低估幾倍（基準數字）？\n7. V 槓桿與 U 槓桿的收益結構差在哪？什麼時候 V 是近乎免費的午餐、什麼時候必須先降 ρ？\n8. 三個薄弱帶（低 ρ、重尾、相關到達）各往哪個方向錯？各自的自我察覺徵兆是什麼？\n\n## 延伸閱讀\n\n- Kingman 1961, \"The Single Server Queue in Heavy Traffic\", *Math. Proc. Cambridge Philos. Soc.* 57(4): 902–904——heavy-traffic 近似的原典，三頁短文，看一個不等式怎麼打開一個領域。https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/single-server-queue-in-heavy-traffic/81C55BC00A68FE6D5385638AA0B0AF37\n- Kingman 1962, \"Some inequalities for the queue GI/G/1\", *Biometrika* 49(3/4): 315–324——本章上界的出處；推完推演 4 拿它對答案。https://academic.oup.com/biomet/article-abstract/49/3-4/315/223450\n- Lindley 1952, \"The Theory of Queues with a Single Server\", *Math. Proc. Cambridge Philos. Soc.* 48(2): 277–289——recursion 與積分方程的出處，G/G/1 理論的起點。https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/theory-of-queues-with-a-single-server/53E80E039A02BCCC909E5C1D3BBC1AD1\n- Whitt 1983, \"The Queueing Network Analyzer\", *Bell System Technical Journal* 62(9): 2779–2815——把 C²ₐ／C²ₛ 兩矩近似工程化成整套網路工具的代表作；想知道 C² 怎麼在多站之間傳播（ch18 預告）讀它。免費 PDF：http://www.columbia.edu/~ww2040/QNA_1983.pdf\n- Krämer & Langenbach-Belz 1976, \"Approximate Formulae for the Delay in the Queueing System GI/G/1\"（ITC 8, Melbourne, pp. 235.1–235.8）——C²ₐ < 1 區的標準修正因子，本章 D/M/1 偏高 18% 的解藥。https://www.semanticscholar.org/paper/Approximate-Formulae-for-the-Delay-in-the-Queueing-Kraemer-Langenbach-belz/311428c1ef0588162f2321d25452952001c1b3b1\n- Bertsekas & Gallager,《Data Networks》2nd ed., Ch. 3——G/G/1 上界與應用的免費嚴謹版（MIT 官方逐章下載），想看比本章更完整的不等式家族讀它。https://web.mit.edu/dimitrib/www/datanets.html\n- AllAboutLean, \"The Kingman Formula – Variation, Utilization, and Lead Time\"——製造業視角的 VUT 讀法（《Factory Physics》把這條式子叫 VUT equation），看另一個行業把同一條公式當管理哲學。https://www.allaboutlean.com/kingman-formula/\n"}, {"id": "ch15-heavy-tails", "file": "ch15-heavy-tails.md", "group": "Part IV — 超越指數", "title": "ch15 — 重尾：平均值會說謊", "md": "# ch15 — 重尾：平均值會說謊\n\n> **本章解決什麼問題**：ch12 把變異數的帳單寫成 (1 + C²ₛ)/2，ch14 的 Kingman 把全世界壓縮成兩個矩——這套世界觀有一個沒印在發票上的前提：**E[S²] 存在**。本章讓它不存在。Pareto 分布會依序粉碎三個輕尾直覺（樣本平均可信、撞上的工作頂多長幾倍、總和由多數決定），然後回頭清算舊帳：P-K 爆炸、FCFS 等待重尾化、ch08 的「P99 ≈ 4.6× 平均」死亡。唯一的好消息來自 ch13：出工順序在重尾下從優化變成生死。這是 Part IV 的終點，也是 ch19（重尾讓模擬更難誠實）與 ch20（tail 工程）的地基。\n\n## 從你已知的出發\n\nch12 的 C²ₛ = 10 基準長這樣：2.4% 的請求各拖 2.1 秒。當時這已經夠嚇人——等待 2.2 秒、套指數模型低估 5.5 倍。但誰告訴你 2,100 ms 是頂？你值班時看過的真實分布沒有劇本：一支沒走索引的 query 可以跑 30 秒，也可以連環鎖表把整座 DB 拖死；一次 full GC 可以停 200 ms，也可以停 40 秒。每次你把「最長的那筆」記進事故報告，下一季就有更長的刷新它。\n\n這正是你立 P99.9 預算時的挫折感的來源：P50 穩如磐石、P99 偶爾抖、P99.9 每季搬家、P99.99 根本像亂數。還有一個你可能沒抓到嫌犯的現象：Prometheus histogram 的最後一個 bucket 是 `+Inf`——你的監控系統在設計上就承認，它看不到尾巴的形狀。\n\nch12 的陷阱表開過一張傳票：「有限樣本估出的 E[S²] 永遠偏低且不收斂，你以為 C²ₛ = 12，其實沒有上限」；那章 Python 實驗的尾聲也預告過：換幾顆 seed，C²ₛ = 10 那檔在 1.9 到 2.4 之間晃。本章是正片：當服務時間是**重尾（heavy-tailed）**分布，「平均」這個你最信任的數字，會以三種不同的方式對你說謊。\n\n## Pareto：把尾巴畫成直線\n\n本書的重尾代表是 **Pareto 分布**：\n\n```text\nP(S > t) = (k/t)^α ，  t ≥ k\n```\n\n兩個參數兩種讀法：k 是最小值（所有工作至少 k 長——純 Pareto 有地板，這是它的模型代價，後面誠實處理）；α 是**尾巴變薄的速度**。對照指數的 P(S > t) = e^(−t/E[S])：指數每往右走固定一段，尾巴就砍一個固定比例；Pareto 每往右走固定**倍數**，尾巴才砍一個固定比例——它是尺度無關（scale-free）的。在雙對數座標上，這個差別是一眼可見的：\n\n```\n log P(S > t)\n ▲\n │*●\n │ *  ●\n │  *    ●\n │   *      ●\n │    *        ●\n │     *          ●          ← Pareto：直線到底，斜率 −α\n │      *            ●\n │       *              ●\n │        *\n │         *                 ← 指數：越掉越快，右半邊一文不值\n │          *\n └─────────────────────────▶ log t\n```\n\n（兩條曲線同均值 100 ms；中段——約 50 ms 到 0.35 s 之間——指數的尾巴反而比較高，0.35 s 之後 Pareto 一路在上、差距越拉越開。）log-log 圖上的直線就是重尾的指紋——這也是本章給你的第一個防禦工具：把你系統的服務時間 tail 畫上 log-log 看一眼。\n\n### α 與矩的存在性\n\n**完整推導**。對 P(S > t) 微分取負號得密度 f(t) = αk^α·t^(−α−1)，t ≥ k。算 m 階矩：\n\n```text\nE[S^m] = ∫ₖ^∞ t^m · αk^α t^(−α−1) dt = αk^α ∫ₖ^∞ t^(m−α−1) dt\n\nm < α：積分收斂到 k^(m−α)/(α−m)，故 E[S^m] = α k^m/(α−m)    ← 有限\nm ≥ α：被積函數掉得不比 1/t 快，積分發散，E[S^m] = ∞        ← 含 m = α 本身\n```\n\n一條積分判生死：**α 以下的矩存在，α 以上（含 α）的矩通通是 ∞**。對照表：\n\n| α 落點 | E[S] | Var(S) | 對佇列的意義 | 實測例子（下節） |\n|---|---|---|---|---|\n| α ≤ 1 | ∞ | ∞ | 任何 λ > 0 都撐不出穩態 | UNIX 行程壽命 α ≈ 1（恰在邊界） |\n| 1 < α ≤ 2 | 有限 | **∞** | 穩定，但 P-K 回答 ∞ | 本章基準 α = 1.5；網頁檔案 α ≈ 1.1 |\n| α > 2 | 有限 | 有限 | P-K 有限；更高階矩另議（推演 1） | 較少見於量測文獻 |\n\nch03 的 C² 尺到這裡正式爆表：1 < α ≤ 2 時 C²ₛ = ∞——不是「很大」，是這個量不存在。\n\n### 基準校準：α = 1.5、E[S] = 100 ms\n\n套上面的公式，m = 1：\n\n```text\nE[S] = αk/(α−1) = 1.5k/0.5 = 3k = 100 ms   ⇒   k = 100/3 ≈ 33.3 ms\n```\n\n全章基準：**Pareto(α = 1.5, k = 33.3 ms)**，均值 100 ms、變異數無限。順手算兩個體感數字：中位數 k·2^(1/α) = k·2^(2/3) ≈ 52.9 ms；P(S ≤ 100 ms) = 1 − (1/3)^1.5 ≈ **80.8%** 的工作比平均短（指數是 63.2%）。重尾分布的大多數成員無辜得很——帳全記在極少數巨工作頭上。\n\n### Worked example：P(S > 1 s) 的對帳單\n\n同均值 100 ms，Pareto 對指數：\n\n```text\nPareto：P(S > 1 s) = (0.0333/1)^1.5 = (1/30)^1.5 = 1/(30√30) ≈ 1/164 ≈ 0.00609\n指數  ：P(S > 1 s) = e^(−10) ≈ 4.54 × 10⁻⁵\n倍數  ：0.00609 / 0.0000454 ≈ 134\n```\n\n| t | Pareto(1.5) | 同均值指數 | 倍數 |\n|---|---|---|---|\n| 1 s | 0.00609（每 164 件一件） | 4.54×10⁻⁵ | 134× |\n| 10 s | 1.92×10⁻⁴（每 5,196 件一件） | 3.72×10⁻⁴⁴ | 5.2×10³⁹ |\n\n翻成推播管線的語言（λ = 8/s，一天 691,200 件）：超過 10 秒的工作，指數說「宇宙壽命之內別等了」（期望每 10³⁵ 年一件），Pareto 說「**每天 133 件**」。同一個平均值，兩個世界。\n\n## 三記衝擊\n\n### 衝擊一：樣本平均不收斂——至少不在你的值班時間內\n\n先把話說誠實：α = 1.5 時 E[S] 存在，大數法則**成立**，樣本平均終究會收斂到 100 ms。問題是速度，以及路徑的長相：\n\n```text\n輕尾（變異數有限）：樣本平均的典型誤差 ~ σ/√n                ← CLT\nPareto，1 < α < 2 ：典型誤差 ~ n^(1/α − 1)                    ← 廣義 CLT／穩定分布（敘述層級，本書不證）\nα = 1.5           ：n^(−1/3) ——誤差砍 10 倍，樣本得乘 1,000\nα ≤ 1             ：樣本平均 → ∞，「估均值」這件事本身無意義\n```\n\n更糟的是路徑的形狀。80.8% 的樣本低於均值，均值是被頂端那一小撮扛起來的——所以**有限視窗裡的樣本平均幾乎總是偏低**（系統性樂觀），直到一頭大象進場把它炸飛。\n\n**Worked example：10 筆樣本的漂移表。** 監控視窗抓到 10 筆服務時間（手工設計以便手算，但每筆都不離譜——P(S > 2,400 ms) ≈ 1/611，λ = 8 之下這種工作每 76 秒來一支）：\n\n| i | 樣本 Sᵢ (ms) | 累積平均 (ms) |\n|---|---|---|\n| 1 | 45 | 45.0 |\n| 2 | 38 | 41.5 |\n| 3 | 120 | 67.7 |\n| 4 | 60 | 65.8 |\n| 5 | 51 | 62.8 |\n| 6 | 95 | 68.2 |\n| 7 | **2,400** | **401.3** |\n| 8 | 70 | 359.9 |\n| 9 | 42 | 324.6 |\n| 10 | 110 | 303.1 |\n\n真均值 100 ms。前 6 筆給你 68.2（低估 32%——典型視窗就長這樣）；第 7 筆一來平均直接 ×5.9；到第 10 筆還掛在 303（高估 2 倍）。**兩個方向都在說謊**：沒撞到大象時它讓你裁掉太多容量，撞到時它讓你在事故會議上解釋不了「平均怎麼會跳」。任一個 10 筆視窗含這種巨值的機率只有 1.6%——所以你的儀表板絕大多數時間展示的是那個偏低的版本。\n\n### 衝擊二：inspection paradox 走到極端——你撞上的工作沒有平均長度\n\nch12 推過：隨機時刻抵達，撞上的工作是被長度加權抽樣的，平均長 E[S²]/E[S]。在 C²ₛ = 2.25 的混合分布那是 3.25 倍——令人不快但有限。基準 Pareto 下 E[S²] = ∞，所以**你撞上的那支工作，期望長度是無限大**。這句話需要量化才有用。**完整推導**長度加權後的 tail：\n\n```text\nP(撞上的工作 > t) = ∫ₜ^∞ x f(x) dx / E[S]                ← 長度加權（ch12 的時間軸抽點）\n                  = [αk^α t^(1−α)/(α−1)] ÷ [αk/(α−1)]\n                  = (k/t)^(α−1)                            ← 尾指數從 α 降為 α−1\n```\n\n長度加權把尾巴**加重整整一階**：α = 1.5 的工作，撞上的版本尾指數只剩 0.5（連均值都沒有）。代基準數字：\n\n- P(撞上的工作 > 1 s) = (1/30)^0.5 ≈ **18.3%**，是隨機抽一件的 134 倍那欄的 30 倍（一般地，放大倍數 = t/k，無上界）。\n- P(撞上的工作 > 10 s) = (1/300)^0.5 ≈ **5.8%**——平均 100 ms 的系統，你抵達時有 5.8% 的機率正卡在一支 10 秒以上的怪物後面。\n\nch04 的 hazard 視角在此兌現成最反直覺的一條：Pareto 是 DFR——E[S | S > t] = αt/(α−1) = 3t（同一條積分，一行就出來），所以**一支已經跑了 10 秒的工作，期望還要再跑 20 秒**。跑越久、剩越久。「平均服務 100 ms」與「你每次都排在大象後面、而且大象越老越長命」毫不矛盾——前者是工單清單的平均，後者是時間軸的平均。\n\n### 衝擊三：最大的一個吃掉總和\n\n頂端比例 p 的工作吃掉多少總工作量？注意這跟衝擊二是**同一條積分**——「load 占比」就是長度加權分布的 tail，在 p 分位處取值：\n\n```text\n頂端 p 吃掉的 load = (k/t_p)^(α−1)，其中 (k/t_p)^α = p   ⇒   占比 = p^((α−1)/α)\n\nα = 1.5：p = 1% → 0.01^(1/3) ≈ 21.5%\nα = 1.1：p = 1% → 0.01^(1/11) ≈ 65.8%\nα → 1  ：占比 → 100%——全部工作量集中在一小撮\n對照同均值指數：頂端 1% 只占約 5.6%\n```\n\n這就是文獻說的「大象與老鼠」。它還有一個極限形式，**單一巨跳原理**（principle of a single big jump；subexponential 分布類的刻畫，直覺版，本書不證）：n 固定、x → ∞ 時，\n\n```text\nP(S₁ + … + Sₙ > x) ~ n · P(S₁ > x) ~ P(max Sᵢ > x)\n```\n\n總和要爆，最便宜的路徑是讓**一個人**爆，而不是大家一起偏大。工程讀法：重尾系統的事故報告裡，「一支 query 連環撞死 DB」是常態劇本、「一千支 query 各慢一點」是罕見劇本——這件事可以拿你的 incident review 驗證，本章 Python 小實驗也會量給你看（爆掉的批次裡 84% 由單一巨值主導）。\n\n## 真實世界的證據（2026-06 視角）\n\n以下不是憑記憶嚇你，是量測文獻（出處全在延伸閱讀）：\n\n- **UNIX 行程 CPU 壽命**：Harchol-Balter 1990 年代中量測數百萬支 UNIX 行程（壽命 > 1 秒者），尾巴漂亮地貼合 P(壽命 > t) ≈ 1/t——**α ≈ 1，恰好踩在「均值存在」的邊界上**（Harchol-Balter & Downey 1997）。這個量測直接推翻了當時「行程壽命近似指數」的主流假設。\n- **網頁檔案大小**：Crovella 與 Bestavros（及 Barford）1996–1998 在波士頓大學量測網站檔案，得 Pareto **α ≈ 1.1**；被請求／被傳輸的檔案也類似（Crovella & Bestavros 1997）。這是「Web 流量自相似」現象的根源之一。\n- **IP flow 大小**：頂端 1% 的 flow 約占全部 bytes 的 **50%**——「大象 flow」一詞的出處場景；對照指數分布頂端 1% 只占約 5%（Harchol-Balter 2024 教科書第 10 章的整理）。\n- **雲端工作負載（2010 年代末）**：同書引述的近年資料中心量測：每工作記憶體用量貼合 Pareto **α ≈ 0.72**、C² ≈ 43,000，頂端 1% 的工作占 99% 的記憶體用量——比 1990 年代**更重**，不是更輕。\n\n兩句對沖。第一，α 的點估計依資料集、年代、量測法而異，而且估 α 本身在統計上就難（tail 樣本天生稀少，正是衝擊一的處境）——別背小數點，要背的是「這些量一再落在 α ≤ 2、甚至 α ≈ 1 的區間」這個結構性事實。第二，你的系統不在文獻裡：把自己的服務時間畫上 log-log，比引用任何論文都有效。另外注意這些證據全在**服務**那一側——到達端的疊加有 ch05 的 Palm–Khintchine 撐腰，服務時間沒有任何極限定理護航（ch08 陷阱表那句話的完整版）。\n\n## M/G/1 撞上重尾：帳單變成無限大\n\n把基準 Pareto 接上 ch12 的 P-K：λ = 8/s、E[S] = 100 ms、ρ = 0.8，\n\n```text\nE[T_Q] = λE[S²]/(2(1−ρ)) = ∞        ← E[S²] = ∞（α = 1.5 ≤ 2）\n```\n\nch12 說過：這不是公式壞掉，是真警報。但「∞」的精確意義值得拆開（工程師的嚴謹）：\n\n- ρ = 0.8 < 1，系統**仍然穩定**：N 有正常的平穩分布、佇列一定會清空、平均忙碌期照舊是 E[S]/(1−ρ) = 0.5 s（ch12 算過它只吃 E[S]——這條在重尾下倖存）。\n- 但等待時間的平穩分布**均值發散**：W 是一個正常的隨機變數（P(W < ∞) = 1），只是它的期望不存在。操作上的長相就是衝擊一：量測窗越長，「平均等待」越大，永不安定。Little 順手給出 E[N] = λE[T] = ∞——平均佇列長度也無限。**「穩定」與「平均有限」是兩件事**，重尾把它們拆開了。\n\n尾巴層級的結果（敘述層級；Cohen 1973、Pakes 1975，指路延伸閱讀）：M/G/1 + FCFS、服務尾指數 α 時，\n\n```text\nP(W > x) ~ ρ/(1−ρ) · P(S_e > x)，x → ∞，其中 S_e 的尾指數是 α − 1\n```\n\n等待的尾巴比服務**重一階**——和衝擊二同一個機制：你的等待由「撞上的殘餘」主導，而殘餘是長度加權的親戚。基準下：服務 α = 1.5（均值存在），FCFS 等待尾指數 0.5（連均值都沒有）。排隊不只繼承重尾，還把它加重。\n\n### Bounded Pareto：誠實面對上界\n\n「現實的服務時間有上界——timeout 會砍、檔案大小有限、宇宙有年齡——所以無限變異數是數學家的恐嚇。」這個反駁值得正面回答。把 Pareto 截斷在上界 p（**Bounded Pareto(k, p, α)**，密度 f(t) = αk^α t^(−α−1)/(1 − (k/p)^α)，k ≤ t ≤ p），固定 k = 33.3 ms、α = 1.5，把上界從 10 秒推到 1,000 秒（全部數值獨立重算複核）：\n\n| 上界 p | E[S] | ρ = λE[S] | E[S²] | P-K E[T_Q] |\n|---|---|---|---|---|\n| 10 s | 94.2 ms | 0.754 | 0.0544 s² | **0.885 s** |\n| 100 s | 98.2 ms | 0.785 | 0.179 s² | **3.34 s** |\n| 1,000 s | 99.4 ms | 0.795 | 0.574 s² | **11.2 s** |\n| ∞ | 100 ms | 0.800 | ∞ | ∞ |\n\n（k 固定時均值隨 p 微動，ρ 跟著動；把 k 重新校準釘回 100 ms，結論不變。）讀法有三層。第一，**均值幾乎不動、帳單狂奔**：上界吃掉的均值不到 6%，但 E[S²] 是整個故事——α < 2 時 E[S²] ~ p^(2−α)，基準 α = 1.5 就是 **E[T_Q] ∝ √p**。第二，「有上界」在數學上把 ∞ 變有限，在工程上只是把答案的主導權交給上界：**你的 timeout 設定就是你的 E[S²]**。把 timeout 從 100 秒放寬到 1,000 秒，平均等待 ×3.4——對照同均值 M/M/1 的 0.4 s，p = 1,000 s 時你付的是 28 倍。第三，反過來讀就是救贖的第一根槓桿：壓低 p（timeout、admission control，見 ch10/ch20）是少數能直接砍 E[S²] 的手段。「上界很大的 Bounded Pareto」在所有實務尺度上的行為就像無界——這就是本書用無界 Pareto 當基準的理由：它是「上界大到你不敢依賴」的誠實極限。\n\n## 排程的救贖：換出工順序，不換硬體\n\n同一台機器、同一批 Pareto(1.5) 工作、同一個 ρ = 0.8，只換出工紀律：\n\n```text\nFCFS：E[T] = E[T_Q] + E[S] = ∞\nPS  ：E[T] = E[S]/(1−ρ) = 0.1/0.2 = 0.5 s     ← insensitivity（ch13）：只要 E[S] 有限就成立\n```\n\nch12 的世界裡排程是「±幾倍」的優化；重尾把它升格成**有限與無限的差別**。PS 的免疫力來自 ch13 講過的 insensitivity：它的平均回應只看 E[S]，E[S²] 根本不進場——變異數無限也傷不到它。尾巴層級同樣翻盤（敘述層級，指路）：PS 的回應時間尾指數與服務**同階**，P(T > x) ~ P(S > (1−ρ)x)（Zwart & Boxma 2000）——深尾處 PS 等於把每個分位數放大 1/(1−ρ) = 5 倍、但不加重階數；而 FCFS 是把階數從 1.5 砍到 0.5。SRPT 更進一步：平均回應在任何分布下最優（Schrage 1968，見 ch13），重尾下它對 FCFS 的優勢是無限大（有限 vs 無限）。\n\n「偏袒短工作會餓死大象」的恐懼，在重尾下恰好**最沒有道理**：衝擊三說大象就是一半以上的 load，全部短工作加起來只是零頭——讓短的先走，大象幾乎感覺不到（這是 Harchol-Balter 團隊改造 Web server 排程時的核心論證，ch13 的「SRPT 餓死論」審判在重尾下結案得更乾脆）。再加上 DFR：老工作條件上越來越長命，搶占式紀律「把老的晾著、先服務新的」這一手，賭贏的機率比輕尾世界高得多。條件誠實標示：以上尾巴敘述都是 M/G/1、regularly varying 服務下的漸近結果；PS 的 0.5 s 是**平均**，公平性與 slowdown 的帳要回 ch13 算。\n\n## P99 的新價目表：4.6× 規則之死\n\nch08 的規則先講精確：M/M/1 + FCFS 之下 T ~ Exp(μ−λ)，所以每個分位數都是平均的固定倍數，t₉₉ = ln 100 × E[T] ≈ 4.6× 平均；每多一個 9 加 ln 10 ≈ 2.30 個平均——**加法計價**。ch08 也預告過這張價目表會被本章撕掉。撕法如下。**完整推導** Pareto 分位數：\n\n```text\n(k/t_q)^α = 1 − q   ⇒   t_q = k(1−q)^(−1/α)\n```\n\n同均值 100 ms 對照（指數 t_q = −E[S]·ln(1−q)）：\n\n| 分位數 | 指數 | Pareto(1.5) | Pareto/指數 | Pareto 是均值的幾倍 |\n|---|---|---|---|---|\n| P50 | 69.3 ms | 52.9 ms | 0.76× | 0.53× |\n| P99 | 461 ms | 718 ms | 1.56× | 7.18× |\n| P99.9 | 691 ms | 3.33 s | 4.83× | 33.3× |\n| P99.99 | 921 ms | 15.5 s | 16.8× | 155× |\n\n注意 P50 那行：重尾分布的**中位數反而更低**——它讓大多數人更快、極少數人慘烈，價目表是從兩頭撕的。計價規則的對比：\n\n```text\n指數  ：每多一個 9，加 2.30 個均值（加法）\nPareto：每多一個 9，乘 10^(1/α)；α = 1.5 → ×4.64（乘法）；α = 1.1 → ×8.11\n```\n\n撞名警告：ch08 的 4.6 是 ln 100（P99 對平均的固定倍數），本章的 4.64 是 10^(2/3)（每個 9 的乘數）——數值巧合，身分完全不同，搞混會推出災難性的外推。\n\n以上還只是服務時間 S 自己的分位數。回應時間 T 更慘：FCFS 下 E[T] = ∞，「P99 ≈ 幾倍平均」連分母都沒有；等待尾指數 0.5 意味著深尾處每多一個 9 分位數漸近要 ×10² = 100（敘述層級）。PS 把尾指數救回 1.5，但「分位數／平均」依然每個 9 都在長，沒有任何常數倍規則倖存。你立 P99.9 預算立不住的數學身分就是這個：**輕尾世界 nines 是等差，重尾世界 nines 是等比**。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 用有限樣本估 C²ₛ 然後套 ch12/ch14 公式 | 估計值永遠偏低且隨視窗變長一路爬（ch12 傳票兌現）：你以為 12，下個月 30，真相是 ∞ | 對不同長度的視窗各估一次 C²ₛ——若它隨樣本數成長，你在重尾領土；改看 log-log tail 斜率 |\n| 「實務有上界，用輕尾模型沒關係」 | Bounded Pareto 表：上界 1,000 s 時帳單是同均值 M/M/1 的 28 倍；公式「有限」不等於「可用輕尾近似」 | 把上界放進公式算 E[S²]，不是放進嘴巴；E[T_Q] ∝ p^(2−α) 告訴你答案由 timeout 主宰 |\n| 樣本平均當真相（容量規劃、autoscaling 指標） | 衝擊一：絕大多數視窗系統性偏低，偶爾被單一巨值炸飛；兩個方向都錯 | 平均旁邊永遠擺 P99 與 top-1% 占比；對 α ≤ 1 的量（行程壽命級）根本別報平均 |\n| 拿 4.6× 規則外推重尾分位數 | P99 低估 1.6 倍、P99.9 低估 4.8 倍、P99.99 低估 17 倍——每多一個 9 誤差再乘 ~3 | 分位數只能直接量，不能從平均外推；nines 在重尾下是等比計價 |\n| 模擬「跑三次取平均」 | 三次都沒抽到大象 → 一致地樂觀；抽到一次 → 全場最大值主導結果。換 seed 答案大幅變動 | 那不是 bug，是分布在自我介紹；報告必附 max 與 top-1% 占比；方法學見 ch19 |\n| FCFS 硬扛重尾工作流 | 平均等待無限：一支大象後面排出整條街（衝擊二：抵達時 5.8% 機率卡在 10 s+ 的工作後） | 換紀律（PS/SRPT 類，ch13）或隔離（長工作專用 pool，ch09 的種子）；砍上界（ch10 timeout） |\n\n自我察覺的徵兆只有一組：**直方圖右尾在 log-log 下近似直線；C²ₛ 估計值不安定、隨觀察窗成長；壓測與模擬換 seed 結果大幅變動**。三個徵兆湊齊兩個，本章就是你的現場。\n\n## 紙上推演\n\n**推演 1 [10 分鐘] ★ — 矩存在性法庭**\n對四個服務分布，分別判定 E[S]、Var(S) 是否有限、λ > 0 的 M/G/1 佇列命運如何、P-K 給出什麼：\n(a) Pareto α = 0.9；(b) Pareto α = 1.5（基準）；(c) Pareto α = 2.5；(d) Bounded Pareto(k, p = 10⁶ s, α = 0.9)。\n\n**推演 2 [15 分鐘] ★★ — 重尾 inspection paradox**\n從長度加權定義出發，推一般 Pareto(α, k) 的「撞上的工作」tail 公式；代基準算 P(撞上 > 1 s) 與 P(撞上 > 10 s)，並與無條件機率比較放大倍數；最後用一句話解釋：為什麼放大倍數 t/k 沒有上界，而 ch12 的混合分布只放大 3.25 倍就到頂。\n\n**推演 3 [10 分鐘] ★★ — 拿 4.6× 規則推重尾 P99 會錯多誇張**\n同事量得平均服務時間 100 ms，按指數價目表宣稱：「P99 ≈ 460 ms、P99.9 ≈ 690 ms、P99.99 ≈ 920 ms。」真實分布是基準 Pareto(1.5)。算出三個真值與低估倍數、說明誤差隨 9 的數目怎麼成長；再回答：如果他量的其實是 FCFS 系統的「平均回應時間」，這套外推還剩下什麼？\n\n### 推演解答\n\n**推演 1。**\n(a) α = 0.9 ≤ 1：E[S] = ∞、Var = ∞。ρ = λE[S] = ∞，任何 λ > 0 都沒有穩態——連「一支工作平均做多久」都答不出來。P-K 無從起步（它的每一項都不存在）。UNIX 行程壽命 α ≈ 1 就踩在這條線上（α = 1 時均值同樣發散，對數速度）。\n(b) 基準：E[S] = 100 ms 有限、Var = ∞。λ < 10/s 時穩定（W、N 都有正常的平穩分布），但 P-K 回答 E[T_Q] = ∞——真警報，不是壞掉。\n(c) α = 2.5：均值與變異數都有限。校準 E[S] = 100 ms 給 k = 60 ms、E[S²] = 5k² = 0.018 s²、C²ₛ = (α−1)²/(α(α−2)) − 1 = 0.8。P-K：E[T_Q] = 8×0.018/0.4 = **0.36 s**，一切正常——但 E[S³] = ∞（3 ≥ 2.5），而等待的二階矩牽涉 E[S³]（Takács 矩公式，敘述層級），所以**等待的變異數無限**：平均可信、tail 照樣野。規律：往尾巴每多問一階，就要多付一階服務矩。\n(d) 一切矩有限，P-K「適用」——但 E[S²] ~ p^(2−α) = p^1.1，答案由上界主宰：p 改一個量級，E[T_Q] 跟著翻十幾倍。公式輸出的不是系統的性質，是你 timeout 的性質。常見錯路：把 (d) 的「有限」當成回到了輕尾世界。\n\n**推演 2。** 推導同本章（被長度加權的 tail = ∫ₜ^∞ x f dx / E[S] = (k/t)^(α−1)）。基準：P(撞上 > 1 s) = (1/30)^0.5 ≈ 18.3%，無條件是 0.609%，放大 30 倍；P(撞上 > 10 s) = (1/300)^0.5 ≈ 5.77%，無條件 0.0192%，放大 300 倍——一般地放大倍數 = (k/t)^(−1) = t/k，隨 t 線性成長、無上界。ch12 的二點混合裡「最長的工作」就是 550 ms，長度加權再怎麼偏也偏不出 550 ms 之外，所以倍數有頂；Pareto 沒有「最長的工作」，偏置可以一路偏進深尾。一句話版本：**有界分布的 inspection paradox 是倍數問題，重尾的是階數問題**（尾指數 α → α−1）。\n\n**推演 3。** 真值（t_q = k(1−q)^(−2/3)）：P99 = 33.3×21.5 ≈ **718 ms**（低估 1.56 倍）、P99.9 = 33.3×100 ≈ **3.33 s**（低估 4.83 倍）、P99.99 = 33.3×464 ≈ **15.5 s**（低估 16.8 倍）。結構：指數價目表每個 9 加 230 ms，Pareto 每個 9 乘 4.64，所以誤差倍數本身每個 9 再乘 3 到 3.5，無上界。第二問：FCFS + 重尾下 E[T] = ∞——他量到的「平均回應」只是當前視窗的漂移值（衝擊一），明天就不一樣；拿一個不收斂的數字乘 4.6，連錯都錯得不穩定。正確動作：直接量分位數，並換掉 FCFS（ch13）。\n\n### Python 小實驗\n\n兩個實驗，標準函式庫、seed 42。先把醜話講在前面：**重尾模擬天生收斂得爛——而這正是本章要你親手量到的東西**。下面的「預期輸出」因此分成兩層：指數對照組給正常的落點區間；重尾組給的是「不收斂的形狀」，固定 seed 42 的輸出是確定的，但換 seed 後的落點區間寬得誠實。\n\n**實驗一：running mean 對照**——指數 vs 基準 Pareto(1.5) vs 真實世界檔位 Pareto(1.1)，三者都校準到均值 100 ms（k = E[S](α−1)/α）。\n\n```python\nimport random\n\nCHECKPOINTS = [100, 1_000, 10_000, 100_000, 1_000_000]\nCHECK_SET = set(CHECKPOINTS)\n\ndef running_means(draw):\n    total, out = 0.0, []\n    for n in range(1, CHECKPOINTS[-1] + 1):\n        total += draw()\n        if n in CHECK_SET:\n            out.append(total / n)\n    return out\n\n# all calibrated to E[S] = 0.1 s; Pareto scale k = E[S]*(alpha-1)/alpha\ngens = [\n    (\"exp\",        random.Random(42), lambda r: r.expovariate(10.0)),\n    (\"Pareto 1.5\", random.Random(42), lambda r: (1 / 30) * r.paretovariate(1.5)),\n    (\"Pareto 1.1\", random.Random(42), lambda r: (1 / 110) * r.paretovariate(1.1)),\n]\ncols = [running_means(lambda r=r, d=d: d(r)) for _, r, d in gens]\nprint(f\"{'n':>9} \" + \"\".join(f\"{name:>12}\" for name, _, _ in gens))\nfor i, n in enumerate(CHECKPOINTS):\n    print(f\"{n:>9} \" + \"\".join(f\"{c[i]:>12.4f}\" for c in cols))\n```\n\n理論均值三欄都是 0.100。預期輸出：指數欄 n ≥ 10⁴ 後應落在 0.100 ± 0.005；Pareto 1.5 欄路徑亂跳後勉強進場（seed 42 實跑：0.108 → 0.124 → 0.097 → 0.100 → 0.100——注意 n 從 100 加到 1,000 時**更多資料反而更錯**，一頭大象在那段進場）；Pareto 1.1 欄是主秀：seed 42 在 10⁶ 樣本後讀 **0.077**，低估 23%，而換 12 顆 seed 的落點散在 0.066–0.111、其中 10 顆低於 0.08——**系統性樂觀，加資料也救不回來**（誤差衰減 n^(−0.09)，每砍一半要 2,000 倍樣本）。不收斂本身就是本實驗的輸出。\n\n**實驗二：大象吃掉總和**——頂端 1% 的 load 占比，與「爆掉的批次該怪誰」。\n\n```python\nimport random\n\nK15 = 1 / 30                       # Pareto(1.5) scale: E[S] = 0.1 s\nN = 100_000\n\ndef concentration(draw, label):\n    xs = sorted(draw() for _ in range(N))\n    total, top1 = sum(xs), sum(xs[-N // 100:])\n    print(f\"{label}: top-1% share = {top1/total:.1%}, \"\n          f\"max = {xs[-1]:.1f} s = {xs[-1]/total:.2%} of sum\")\n\ndef blame(draw, label):\n    blown = single = 0\n    for _ in range(20_000):\n        b = [draw() for _ in range(10)]\n        if sum(b) > 2.0:               # batch sum blew past 2x its mean (1.0 s)\n            blown += 1\n            single += max(b) > 0.5 * sum(b)\n    print(f\"{label}: blown batches = {blown}/20000, \"\n          f\"single big jump share = {single/blown:.1%}\")\n\nfor fn in (concentration, blame):\n    random.seed(42)\n    fn(lambda: random.expovariate(10.0), \"exp       \")\n    random.seed(42)\n    fn(lambda: K15 * random.paretovariate(1.5), \"Pareto 1.5\")\n```\n\n理論值：top-1% 占比指數 5.6%、Pareto 21.5%（本章推過的 p^((α−1)/α)）。預期輸出：指數應落在 5.6% ± 0.3%、Pareto 在 19%–23%；單一最大值那欄不要期待收斂——seed 42 抽到一支 **199.7 秒**的工作（10 萬件裡的一件，獨吞總工作量的 2%），換 seed 後 max 在 22 到 200 秒之間亂跳，這正是「E[S²] 沒得估」的肉身。歸因實驗（seed 42）：爆掉的批次指數 117 個、Pareto 915 個——重尾爆 8 倍頻繁；其中由單一巨值主導（max > 半個總和）的比例，指數 **2.6%** vs Pareto **83.7%**。單一巨跳原理，量出來了。\n\n## 自我檢核\n\n口頭自答，講不清楚＝還沒懂：\n\n1. 口頭重講 E[S^m] 的存在性積分：α 在哪一步決定生死？為什麼 m = α 恰好也發散？\n2. α = 1.5 時大數法則成立嗎？那「樣本平均不收斂」這句話的誠實版本是什麼——什麼以什麼速度收斂、什麼讓你在有限視窗裡看不到它？\n3. 撞上的工作的尾指數為什麼恰好是 α − 1？它跟「頂端 1% 吃掉 21.5% 的 load」為什麼是同一條積分？\n4. 單一巨跳原理的精確敘述是什麼（哪個量固定、哪個量取極限）？它建議你怎麼讀 incident review？\n5. ρ < 1 與 E[T_Q] = ∞ 怎麼同時成立？「穩定」精確保證了哪些事、沒保證哪些事？\n6. 同一批 Pareto(1.5) 工作，FCFS 與 PS 的平均回應各是多少？PS 的免疫力來自哪個性質、唯一需要的條件是什麼？\n7. Bounded Pareto 的上界 p 放大 100 倍（α = 1.5），FCFS 平均等待變幾倍？為什麼「實務有上界」不是護身符，而是把方向盤交給 timeout？\n8. 輕尾與重尾的「每多一個 9」各怎麼計價？ch08 的 4.6 與本章的 4.64 各是什麼身分，為什麼說撞名純屬巧合？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Introduction to Probability for Computing》(Cambridge, 2024)，Ch. 10 \"Heavy Tails: The Distributions of Computing\"——本章證據段的第一手敘述：UNIX 量測的故事、網頁檔案 α ≈ 1.1、雲端 α ≈ 0.72，外加 Bounded Pareto 習題。全書 PDF 免費。https://www.cs.cmu.edu/~harchol/Probability/chapters/chpt10.pdf\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013)——重尾
