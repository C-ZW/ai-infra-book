*（Harchol-Balter；奇數年秋季開課，1999 至今，最近一次 Fall 2025）。主題涵蓋 operational laws、Markov chains、Poisson process、queueing、simulation——與本書章節結構高度對應。\n  入口：https://www.cs.cmu.edu/~harchol/ ；課綱 PDF：https://www.cs.cmu.edu/~harchol/Perfclass/webpage.pdf （2026-06 驗證 HTTP 200）\n\n## 經典論文（年份、出處、歸屬複核）\n\n逐章引用時照此表，不要憑記憶寫年份。\n\n- **A.K. Erlang**：生卒 **1878-01-01（Lønborg, Denmark）– 1929-02-03（Copenhagen）**。\n  1909 \"The Theory of Probabilities and Telephone Conversations\"，*Nyt Tidsskrift for Matematik B*, Vol. 20, pp. 33–39——證明隨機電話呼叫服從 Poisson 分布、部分解決延遲問題。\n  1917 \"Solution of Some Problems in the Theory of Probabilities of Significance in Automatic Telephone Exchanges\"，*Elektroteknikeren*, Vol. 13——loss formula（Erlang B）與等待時間（Erlang C）出處。\n  來源：https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/ 、https://plus.maths.org/content/agner-krarup-erlang-1878-1929\n- **D.G. Kendall 1953** \"Stochastic Processes Occurring in the Theory of Queues and their Analysis by the Method of the Imbedded Markov Chain\"，*Annals of Mathematical Statistics* 24(3): 338–354。A/S/c 記號（Kendall notation）的起源論文。\n  https://projecteuclid.org/euclid.aoms/1177728975\n- **J.D.C. Little 1961** \"A Proof for the Queuing Formula: L = λW\"，*Operations Research* 9(3): 383–387。\n  https://pubsonline.informs.org/doi/10.1287/opre.9.3.383\n  **S. Stidham 1974** \"Technical Note—A Last Word on L = λW\"，*Operations Research* 22(2): 417–421（僅假設極限平均存在且有限的嚴格證明）。\n  https://pubsonline.informs.org/doi/epdf/10.1287/opre.22.2.417\n- **D.V. Lindley 1952** \"The Theory of Queues with a Single Server\"，*Mathematical Proceedings of the Cambridge Philosophical Society* 48(2): 277–289。Lindley recursion（W_{n+1} = max(0, W_n + S_n − A_n)）出處。\n  https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/theory-of-queues-with-a-single-server/53E80E039A02BCCC909E5C1D3BBC1AD1\n- **J.F.C. Kingman**——兩篇都存在、常被混引：\n  **1961** \"The Single Server Queue in Heavy Traffic\"，*Math. Proc. Cambridge Philos. Soc.* 57(4): 902–904（DOI 10.1017/s0305004100036094）；\n  **1962** \"On Queues in Heavy Traffic\"，*J. Royal Statistical Society Series B* 24(2): 383–392。\n  G/G/1 等待時間近似（Kingman approximation）章引 1961，並可注 1962 為一般化。\n  https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/single-server-queue-in-heavy-traffic/81C55BC00A68FE6D5385638AA0B0AF37 、https://academic.oup.com/jrsssb/article/24/2/383/7035157\n- **P.J. Burke 1956** \"The Output of a Queuing System\"，*Operations Research* 4(6): 699–704。Burke's theorem（M/M/c 穩態輸出仍為 Poisson）。\n  https://pubsonline.informs.org/doi/10.1287/opre.4.6.699\n- **J.R. Jackson**：**1957** \"Networks of Waiting Lines\"，*Operations Research* 5(4): 518–521（open network product form）；**1963** \"Jobshop-Like Queueing Systems\"，*Management Science* 10(1): 131–142（state-dependent rates 推廣）。\n  https://ideas.repec.org/a/inm/oropre/v5y1957i4p518-521.html 、https://pubsonline.informs.org/doi/abs/10.1287/mnsc.10.1.131\n- **W.J. Gordon & G.F. Newell 1967** \"Closed Queuing Systems with Exponential Servers\"，*Operations Research* 15(2): 254–265。封閉網路 product form。\n  https://ideas.repec.org/a/inm/oropre/v15y1967i2p254-265.html\n- **F. Pollaczek 1930** \"Über eine Aufgabe der Wahrscheinlichkeitstheorie\"，*Mathematische Zeitschrift* 32: 64–100 與 729–750（兩部分）。\n  https://link.springer.com/article/10.1007/BF01194620\n  **A.Ya. Khinchine 1932** \"Mathematical Theory of a Stationary Queue\"，*Matematicheskii Sbornik* 39(4): 73–84 ⚠️（卷期頁碼來自 Wikipedia 引用鏈，未直查俄文原刊）。英文拼法：Pollaczek（固定）；Khinchine 亦作 Khinchin／Khintchine，公式名通行 **Pollaczek–Khinchine formula**。\n  https://en.wikipedia.org/wiki/Pollaczek%E2%80%93Khinchine_formula\n- **R.W. Wolff 1982** \"Poisson Arrivals See Time Averages\"，*Operations Research* 30(2): 223–231。PASTA 縮寫即出自此文標題；核心假設是 lack of anticipation。\n  https://pubsonline.informs.org/doi/abs/10.1287/opre.30.2.223\n- **L. Schrage 1968** \"Letter to the Editor—A Proof of the Optimality of a/blog/2021/05/24/metastable.html\n  - \"Fixing retries with token buckets and circuit breakers\"（2022-02-28）——retry 放大係數與 token-bucket 限流，retry storm 章引。\n    https://brooker.co.za/blog/2022/02/28/retries.html\n  - \"Surprising Economics of Load-Balanced Systems\"（2020-08-06）——M/M/c vs 多個 M/M/1 的池化效益，正好配 Erlang C 章。\n    https://brooker.co.za/blog/2020/08/06/erlang.html\n- **Gil Tene, \"How NOT to Measure Latency\"**（Strange Loop 2015 場次為通行版本）。coordinated omission 的出處談話；標題與頻道經 YouTube oEmbed 驗證。\n  https://www.youtube.com/watch?v=lJ8ydIuPFeU\n- **Orca**：Gyeong-In Yu, Joo Seong Jeong, Geon-Woo Kim, Soojeong Kim, Byung-Gon Chun, \"Orca: A Distributed Serving System for Transformer-Based Generative Models\"，**OSDI 2022**（5 位作者自 USENIX metadata 核對）。continuous batching（論文用語 iteration-level scheduling）出處。\n  https://www.usenix.org/system/files/osdi22-yu.pdf\n- **vLLM**：Woosuk Kwon, Zhuohan Li 等, \"Efficient Memory Management for Large Language Model Serving with PagedAttention\"，**SOSP 2023**。arXiv：https://arxiv.org/abs/2309.06180\n- 2025–2026 現狀（一句話即可，本書只當配菜；深入內容歸 AI Infra 主書）：continuous batching＋PagedAttention 已是 LLM serving 排程的業界基線，vLLM 持續活躍維護（最新 release **v0.22.1，2026-06-05**，GitHub Releases API 驗證，2026-06）。\n  https://github.com/vllm-project/vllm/releases\n\n## 工具現狀（2026-06）\n\n- **simpy 4.1.2**（PyPI，2026-05-24 釋出；Development Status 5 - Production/Stable，支援 Python 3.8–3.14）。\"Event discrete, process based simulation for Python.\"\n  https://pypi.org/project/simpy/ （PyPI JSON API 驗證，2026-06）\n- **ciw 3.2.7**（PyPI，2025-12-05 釋出）。\"A discrete event simulation library for open queueing networks.\"\n  https://pypi.org/project/ciw/ （PyPI JSON API 驗證，2026-06）\n- 本書實驗以標準庫為主（`random`、`statistics`、`heapq`），numpy/matplotlib 可選；simpy/ciw 只在延伸閱讀提及，不寫教學。\n\n## 常被誤傳的事實\n\n- **「Erlang 發明排隊理論」**——精確說法：Erlang 1909 證明隨機電話呼叫服從 Poisson 分布並部分解決延遲問題，1917 給出 loss／waiting 公式；「排隊理論」作為一般化學科是 1950 年代由 Kendall（1953 記號與 imbedded Markov chain）、Lindley（1952）等人建制化的。\n  https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/\n- **Little's Law 在 1961 之前是 folk theorem**——L = λW 在 Little 證明前已被廣泛當作常識使用，但缺一般性證明；Little 本人在 50 週年回顧（Little, \"Little's Law as Viewed on Its 50th Anniversary\"，*Operations Research* 59(3): 536–549, 2011）詳述這段歷史。\n  https://people.cs.umass.edu/~emery/classes/cmpsci691st/readings/OS/Littles-Law-50-Years-Later.pdf\n- **PASTA 命名由來**——縮寫直接來自 Wolff 1982 論文標題 \"Poisson Arrivals See Time Averages\"；性質本身在更早文獻已被個案使用，Wolff 給出一般證明（lack of anticipation 假設）。\n  https://pubsonline.informs.org/doi/abs/10.1287/opre.30.2.223\n- **Square-root staffing 歸屬**——不能整包歸給 Halfin–Whitt。正確分層：經驗法則（rule of thumb）久已存在於電話工程實務，常被上溯到 Erlang 1924 年的工作 ⚠️（「1924」這個年份未在本次查證來源中直接確認，引用時寫「可上溯至 Erlang」即可）；**Halfin & Whitt 1981** 給出 many-server 極限定理（QED regime）；**Borst, Mandelbaum & Reiman, \"Dimensioning Large Call Centers\"（*Operations Research* 52(1): 17–34, 2004）**給出該法則的嚴格漸近證成。\n  https://ideas.repec.org/a/inm/oropre/v52y2004i1p17-34.html\n- **P-K 公式兩人各自貢獻**——Pollaczek 1930 以複變／分析方法先得到結果（Math. Z. 32）；Khinchine 1932 以機率論語言重新推導，公式因此掛雙名。兩人沒有合作。拼字：Pollaczek–Khinchine（Khinchin、Khintchine 亦通行）。\n  https://en.wikipedia.org/wiki/Pollaczek%E2%80%93Khinchine_formula\n- **Kingman 公式的年份**——常被籠統寫成「Kingman 1962」或「1960s」；單伺服器 heavy-traffic 短文是 **1961**（PCPS 57(4): 902–904），**1962** 是 JRSS-B 的一般化長文。見上方經典論文節。\n- **Gordon–Newell 不是「Jackson 的封閉版小改」**——封閉網路的 normalization constant 讓計算本質變難（後續才有 Buzen 的卷積法與 Reiser–Lavenberg 1980 的 MVA），寫作時不要把 1967→1980 之間的計算難題一筆帶過。\n- **Schrage 1968 的 SRPT 最佳性**是「任意到達序列下最小化系統內工作數」的 sample-path 結果，發表體裁是 Letter to the Editor；「SRPT 會餓死大工作」在 M/G/1 下並不成立於想像的程度（公平性討論見 Harchol-Balter 2013 教科書），排程章需區分這兩層。\n\n## 掃描日誌\n\n- 2026-06-12 初版（建書 P1）\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "Maintenance — 維護手冊（內部文件）", "md": "# Maintenance — 維護手冊（內部文件）\n\n本書事實基準時點 **2026-06**。歷史歸屬與時效性事實以 `_meta/landscape-2026-06.md` 為錨；改任何跨章基準必須照下表全書同步，並在本檔掃描日誌記一行。重大修正（推翻既有基準）需兩個獨立來源。\n\n## 跨章一致性基準表\n\n改動下列任何數字／命名，必須 grep 全書同步所有引用章：\n\n| 基準 | 值 | 出現章 |\n| 判」清單 | 8 條編號，ch20 總結表逐條宣判（3 條附條件成立：#1/#2/#6；5 條推翻：#3/#4/#5/#7/#8） | ch01 立、ch20 結 |\n| 數字常數 | e≈2.71828、ln2≈0.6931、ln100≈4.6052；數值預設 3 位有效數字 | 全書 |\n\n## 脆弱事實清單（最容易過期／出錯的點）\n\n1. **歷史歸屬（landscape §2）**：Kingman 有**兩篇**（1961 PCPS 短註、1962 JRSS-B 一般化＋1962 Biometrika 變異數）；Schrage 1968 是 Letter to the Editor；BCMP 是 JACM 22(2):248–260 四作者；Pollaczek 1930／Khinchine 1932 兩人各自貢獻。引歸屬前一律對 landscape，禁憑記憶。\n2. **landscape 兩個 ⚠️ 未驗證項**：(a) Khinchine 1932 的 Matematicheskii Sbornik 卷期頁（僅 Wikipedia 引用鏈）；(b) square-root staffing 的「Erlang 1924」年份（來源只說「long-existing rule of thumb」）。全書措辭已避開硬斷言（ch09/ch14 寫「可上溯至 Erlang」不帶年份）——掃描時確認沒有章節把這兩項寫成硬事實。\n3. **教科書版次陷阱**：Harchol-Balter 2013 主教科書**無免費 PDF**（她明言 Kindle 版會弄亂數學）；她 2024《Introduction to Probability for Computing》才是免費全書。《Fundamentals of Queueing Theory》第 5 版作者序改為 Shortle/Thompson/Gross/Harris——舊習慣寫「Gross & Harris」對現行版是錯的。\n4. **強時效連結（2026-06）**：simpy 4.1.2（2026-05）、ciw 3.2.7（2025-12）、vLLM v0.22.1（2026-06）——版本號別寫死精確日期，掃描時更新。continuous batching＋PagedAttention 已是 LLM serving 業界基線（ch20 點綴，深度指 aiib）。\n5. **個人頁／課程頁易腐**：Adan–Resing（TU/e 個人 subdomain，canonical URL 會 301 轉 iadan.win.tue.nl）、CMU ~harchol 的免費 PDF、Kelly《Reversibility and Stochastic Networks》作者頁（全書統一用 `~fpk1/rsn.html`，**勿**用 `~frank/BOOKS/kelly_book.html`——兩者皆 200 但已選定前者）。下次掃描開頁抽查；考慮在仍可解析時 vendored 一份本機備份。\n6. **章驗證但不在 landscape 的連結**：附錄 D 有約 40 條連結是寫章 agent 自行查證、未進 landscape（已標「章驗證」）。掃描時優先 HTTP 抽查這批（尤其 Flatto–Hahn 1984 無 URL、Sevcik–Mitrani ACM 對 bot 回 403）。\n7. **4.6× 與 4.64× 的撞名**：ch08 的「P99≈4.6×平均」（ln100 截尾）與 ch15 的重尾每多一個 9 分位 ×4.64（10^(2/3)）數字相近但意義不同——ch15 已自行點明是巧合撞名，**非錯誤**，勿「順手統一」。\n8. **附錄 A/C 的「首次出現章」**用「正式定義章」而非「字面首次提及」（前向引用如 πₙ ch03 預告/ch08 定義、inspection paradox ch04 指數特例/ch12 一般版、Kendall ch01 提及/ch08 定義）——兩附錄卷末有編表說明。改動符號或術語使用後需抽查重驗。\n\n## 結構提醒\n\n- 章節骨架六標題（從你已知的出發／陷阱與防禦／紙上推演＋推演解答／自我檢核／延伸閱讀）是一致性掃描的 grep 對象，改標題格式前先想清楚。\n- 全書路線圖在 Part 首章 ch01、ch03、ch07、ch12、ch16、ch19 共 6 張（ch21 收尾再放一張全走過版）——改章名要同步七處。\n- Python 小實驗章＝ch05、ch08、ch12、ch15、ch17、ch19、ch20；規範：標準函式庫優先、`random.seed(42)`、每段 ≤40 行、預期輸出寫成「理論值 X、模擬值落在區間」而非假裝精確。\n- 內文數學符號一律 Unicode；程式碼與註解一律英文。\n- 簡體詞 lint 注意「效」「系」「准」等兩岸同形字會誤報；用 Python 逐字元比對、不要用 shell grep 的 byte-matching（`對象` 在 TW 可指「目標」但本書禁用，改 `主角`/`物件`）。\n- **圖的渲染對齊與來源對齊是兩個故障域**：`check_diagrams.py` 只驗源碼的欄數學（CJK=2 模型）；渲染端由 build_reader 的 `wrapCJK` span 機制保證（勿改回 @font-face size-adjust——WebKit 對 local() 忽略它，Safari 會塌、Chrome 看起來正常）。改動閱讀器或圖之後：headless Chrome 截一張中文多的框圖＋使用者瀏覽器目視各驗一次。\n\n## 掃描協定（「掃描書的時效性」＝執行本節）\n\n1. 重驗 landscape 的 ⚠️ 條目（Khinchine 1932 卷期、square-root staffing 年份）——維持 hedge，勿硬斷言。\n2. 工具版本掃一輪（simpy、ciw、vLLM／continuous batching 業界狀態），依「脆弱事實」第 4 條措辭更新。\n3. 開頁抽查易腐連結（Adan–Resing、CMU ~harchol、Kelly 作者頁）＋附錄 D 的「章驗證」批次 HTTP 抽查。\n4. 有修正 → 更新 landscape ＋依基準表同步引用章 ＋ 本檔日誌記一行；動到 ASCII 圖跑 `check_diagrams.py`；重打包（見書級 CLAUDE.md）。\n\n## 掃描日誌\n\n- **2026-06-12**：成書 P0–P1。P0 校準（goals 快速確認不變、語言＝繁中、定位＝數學嚴謹為主、規模＝21 章）；landscape 由研究 agent 建立（約 30 次查證，每個免費 PDF／課程連結實際 fetch 確認）；style-guide／outline 定稿；大綱經 agy（Gemini 3.1 Pro High）結構＋數學審查（MATH PASS，結構 4 項建議全採納：ch08 先introduce DES 骨架、ch10 加 rate limiting、ch18 升 fork-join 為主角段、ch06 安撫線代焦慮、ch13 接 Node.js event loop、ch12 不用 renewal 術語），使用者於大綱關卡核准。\n- **2026-06-19**：P2 完成 21 章＋4 附錄（章節 fan-out 分三批；ch19–21 因 session 限額隔日重跑）。P3 一致性：骨架 21/21、Python 章 7/7、簡體 lint 修 1 處（ch20 對象→主角）、check_diagrams exit 0（38 圖）、跨章基準數字交叉核對一致、Kelly 連結統一（ch16 → fpk1）、章首標題與 outline 對齊、跨章引用全在範圍。P4a：agy（Gemini 3.5 Flash High）逐章 math-only 審查（含附錄 A/B）22 PASS＋1 真 FAIL（ch20 batching：438 ms 標成「第一件」應為「平均每件」，第一件實為 875 ms），已修正並改寫為兼列平均與最大值；重跑確認 PASS，零誣告（延續既有 agy 分工記錄）。\n- **2026-06-19（P4b）**：獨立第二意見（Claude general-purpose＋網路）：結構審 A1 依賴完整／A3 敘事回收全兌現（ch01 審判 8 條→ch20 總結表、ch11 Burke→ch16、ch02 bounds→ch17、ch04 競賽引理→ch07）／A4 無 scope 違規／A5 骨架 21/21 皆 PASS；唯一硬不一致 A6＝QNA 首次出現章（附錄 B 標 ch18＝定義處、附錄 C 標 ch14＝首次點名）已統一為 ch18。事實抽查 17 項全 CONFIRMED（Little/Burke/Kingman 三篇/Schrage Letter/Reiser–Lavenberg/BCMP 四作者/Jackson/Wolff PASTA/Pollaczek 1930/Tail at Scale/metastable HotOS+OSDI/po2c Mitzenmacher+Vvedenskaya/simpy 4.1.2/ciw 3.2.7），零 WRONG；兩個 landscape ⚠️（Khinchine 1932 卷期、Erlang 1924 年份）確認書中皆已正確 hedge（ch12 只給年份語言、ch09 寫「可上溯至 Erlang 的年代」不帶年份）。P5：reader（id=queue）建妥、books.json 登記、bookshelf 重建（16 書）、headless Chrome 渲染抽查（ch07/ch16 路線圖、ch06 框圖、ch16 網路 feedback 框）框線對齊無塌陷。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《等待的數學：排隊理論》\n形態：21 章、六個 Part、4 個附錄。數學嚴謹為主的興趣書；紙上推演為主＋指定章節 Python 小實驗。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；歷史歸屬與時效性事實以 `landscape-2026-06.md` 為錨。\n\n## 全書敘事弧\n\n從「你知道 80% 使用率是警戒線，但說不出為什麼」出發 → 不用機率就能算的鐵律（Little's Law、bottleneck bounds）先給一批工具 → 要解釋「為什麼會排隊」就需要機率，把生鏽的磨利（C² 登場）→ 指數分布與 Poisson 過程是這個世界的原子 → Markov chain 給出「系統＝狀態＋轉移」的引擎 → 生滅過程把引擎接上佇列，M/M/1 誕生、hockey stick 定理化 → 多伺服器與池化的威力（Erlang 公式）→ 有限容量把 backpressure 定理化 → 可逆性與 Burke 定理打開網路之門 → 放掉指數假設：變異數的帳單（P-K）、排程的選擇與守恆、Kingman 的萬用近似、重尾把平均值的信用徹底毀掉 → 網路層級：Jackson 的驚奇、封閉系統與 MVA、product form 的邊界 → 公式到頭了，模擬接手——但模擬會騙人，方法學是門手藝 → 帶著全部工具回機房，重審 retry storm、autoscaling、batching → 地圖與下一步。\n\n前一章的問題是後一章的動機：直覺失效（ch01）→ 不靠機率能走多遠（ch02）→ 機率工具（ch03–05）→ 狀態的數學（ch06–07）→ 第一個完整模型（ch08）→ 更多伺服器、更少容量（ch09–10）→ 為網路鋪路（ch11）→ 指數假設不真實怎麼辦（ch12–15）→ 多站系統（ch16–18）→ 公式失效怎麼辦（ch19）→ 回到系統（ch20–21）。\n\n## 全書路線圖（基準圖；Part 首章照抄並標「◄ 你在這裡」）\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步\n```\n\n## 跨章基準（一致性掃描的依據；各章不得另創數字與命名）\n\n**貫穿範例「推播管線」**（源自讀者真實經歷：WebSocket 通知系統、~10M 訊息/月）：API 收到事件 → 推播 worker 發送。\n\n| 元素 | 基準 | 首次出現 |\n|---|---|---|\n| 單 worker 基準 | E[S] = 100 ms（μ = 10 則/s）、尖峰 λ = 8 則/s、ρ = 0.8 | ch01（體感）/ch08（推導） |\n| M/M/1 基準結果 | πₙ = 0.2·0.8ⁿ；E[N] = 4、E[T] = 0.5 s、E[N_Q] = 3.2、E[T_Q] = 0.4 s；T ~ Exp(μ−λ = 2)、t₉₉ = ln 100/2 ≈ 2.30 s（P99 ≈ 4.6× 平均） | ch08 |\n| 使用率階梯 | E[T] = E[S]/(1−ρ)：ρ=0.5→0.2 s、0.8→0.5 s、0.9→1.0 s、0.95→2.0 s、0.99→10 s | ch01（曲線）/ch08（推導） |\n| M/M/c 基準 | c = 4、λ = 32/s、μ = 10/s、a = 3.2、ρ = 0.8；Erlang-C ≈ 0.596、E[T_Q] ≈ 74.6 ms、E[T] ≈ 175 ms（**初算參考**，寫章必須獨立重算複核） | ch09 |\n| 池化三連比 | 同總流量 λ = 32：4 台獨立 M/M/1（各 λ=8）E[T] = 0.5 s vs 共用佇列 M/M/4 ≈ 0.175 s vs 單台快機（μ=40）M/M/1 = 0.125 s（**初算參考**） | ch09 |\n| 有限容量基準 | M/M/1/K：K = 10；兩組到達 λ = 8（正常）與 λ = 12（過載）、μ = 10 | ch10 |\n| 串聯基準 | tandem 兩站：λ = 6、μ₁ = 10、μ₂ = 8 | ch11 |\n| M/G/1 基準 | λ = 8/s、E[S] = 100 ms、ρ = 0.8；C²ₛ ∈ {0, 1, 10} → E[T_Q] = 0.2(1+C²ₛ) s：D→0.2 s、M→0.4 s、C²ₛ=10→2.2 s | ch12 |\n| 排程基準 | 兩類工作：短（90%、E[S]=50 ms）、長（10%、E[S]=550 ms）——混合 E[S] = 100 ms、λ = 8、ρ = 0.8 不變 | ch13 |\n| Kingman 基準 | M/G/1 基準加 C²ₐ = 2、C²ₛ = 1：E[T_Q] ≈ 4·0.1·(2+1)/2 = 0.6 s | ch14 |\n| 重尾基準 | Pareto α = 1.5、E[S] 校準到 100 ms（變異數無限）；需要上界時用 Bounded Pareto，上界由寫章 agent 設定並複核 | ch15 |\n| Jackson 基準 | 外部 λ₀ = 6/s → node1（API，μ₁=10）→ node2（推播，μ₂=8）→ 離開；node2 以 p = 0.2 把失敗送回 node1 重試。解：λ₁ = λ₂ = 7.5、ρ₁ = 0.75、ρ₂ = 0.9375、E[N] = 3+15 = 18、E[T] = 18/6 = 3.0 s。對照組 p = 0.3 → λ₁ = 8.571…、ρ₂ > 1 不穩定 | ch16 |\n| 封閉網路基準 | 2 站互動式：E[S₁] = 100 ms、E[S₂] = 200 ms、think time Z = 1 s、N = 1…5 的 MVA 全表（值由寫章 agent 推導複核） | ch02（bounds）/ch17（MVA） |\n| 模擬 ground truth | M/M/1 基準（E[N] = 4、E[T] = 0.5 s）作為 ch19 全部方法學示範的校準標的 | ch19 |\n| 數字常數 | e ≈ 2.71828、ln 2 ≈ 0.6931、ln 100 ≈ 4.6052；數值預設 3 位有效數字 | 全書 |\n\n**記號**：依 style-guide「數學記號規範」（E[T]/E[N] 系統，不用 L/W）。\n\n**Python 小實驗章**：ch05、ch08、ch12、ch15、ch17、ch19、ch20（其餘章不放程式）。\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀）：matrix-analytic 方法（PH 分布、QBD）、fluid/diffusion 極限的嚴格理論、mean-field 深論（power-of-two-choices 在 ch21 給半頁敘述）、排隊控制與 MDP、strategic queueing（賽局）、network calculus、模擬工具 API 教學、LLM serving 機制細節（指向書架上的《從後端到 AI Infra》）。\n\n---\n\n## Part I — 地圖與定律（ch01–02）\n\n### ch01 — 排隊無所不在：直覺失效的地方\n- **目標**：說出「ρ 接近 1 時延遲爆炸不是 bug 是數學」；畫出全書地圖；建立「隨機性本身是延遲來源」的問題意識。\n- **必涵蓋**：開場場景：推播管線尖峰延遲飆升（基準數字體感版，不推導）；確定性世界 vs 隨機世界——λ<μ 為什麼還會排隊（D/D/1 不排隊的對照）；使用率階梯表（先給數字，ch08 推導兌現）；P99 vs 平均的預告；排隊理論能回答／不能回答的問題清單；Kendall 記號一瞥（地圖語言，正式定義 ch08）；全書路線圖（基準圖首次出場）；**「經驗法則的審判」清單**——全書要定理化或推翻的工程黑話（80% 警戒線、「加機器就好」、「P99 看 tail 就夠」、「retry 是免費的保險」……ch20 結案）。\n- **不涵蓋**：任何推導；機率定義（ch03）。\n- **橋接**：RDS CPU 80% 警戒線、k6 壓測曲線的形狀、SQS backlog 的尖峰記憶。\n- **Worked example**：D/D/1 vs 叢發到達的手排時間線——同樣 λ=8、μ=10：等距到達零等待；把其中 4 個 job 擠成一團，手算每個 job 的等待時間，看等待從哪裡生出來。\n- **紙上推演**：手排另一條叢發時間線；給三個系統判斷排隊理論的哪一塊管它；「為什麼 ρ<1 還會排隊」口頭重講。\n\n### ch02 — 操作分析：不用機率的鐵律\n- **目標**：能用 operational laws 從可量測量推出不可直接量測量；能做 bottleneck 分析給出吞吐上界與拐點；理解 Little's Law 的威力與精確適用條件。\n- **必涵蓋**：operational analysis 世界觀（一切從可量測量出發、無分布假設）；Utilization Law；**Little's Law**：直覺論證（面積雙算圖）＋工程師嚴謹版證明（有限觀察窗）＋嚴格版指路（Stidham 1974，本書不證）＋適用條件（穩定、長期平均、與分布／排程／網路結構無關——這個「無關」是它可怕的地方）；E[N] = λE[T] 應用三連發（整個系統、只看佇列、只看伺服器——E[N_服務中] = ρ 的妙用）；Response Time Law（互動式系統、think time Z）；Forced Flow Law、visit ratio、service demand Dᵢ；bottleneck 分析與 asymptotic bounds（X ≤ 1/D_max、E[T] ≥ ΣDᵢ、拐點 N* = (ΣDᵢ+Z)/D_max）；與教科書 L/W 記號的一次性對照。\n- **不涵蓋**：機率模型（ch03 起）；MVA（ch17，bounds 是它的伏筆）。\n- **橋接**：「concurrent ≈ RPS × latency」這條他在容量規劃用過的公式就是 Little；k6 的 VU 是封閉系統（一句話，ch17 兌現）。\n- **Worked example**：推播管線量測數據（觀察窗 60 s、完成 480 則、busy 48 s……）推出全套指標；封閉基準配置（D₁=0.1 s、D₂=0.2 s、Z=1 s）算 X ≤ 5/s 與 N* = 6.5 的 bounds 全程。\n- **紙上推演**：從殘缺監控數據算出缺的指標；「升級哪台收益最大」bottleneck 決策題；找出一個 Little's Law 誤用（非穩態窗口、邊界不一致）。\n\n## Part II — 機率地基（ch03–06）\n\n### ch03 — 機率工具箱：把生鏽的磨利\n- **目標**：把機率磨利到能跟上全書推導；建立 C²（變異係數平方）這個全書主角；幾何級數成為肌肉記憶。\n- **必涵蓋**：機率空間與事件（快速）；條件機率、全機率定理（佇列推導的主力工具）；隨機變數、CDF/pdf/pmf、tail P(X>t)；期望值、LOTUS、indicator 技巧、期望值線性（不需獨立——強調）；變異數；**C² = Var/E² 正式定義**與直覺刻度（C²=0 確定性、C²=1 指數、C²>1 叢發）；常用分布速覽（Bernoulli、geometric、binomial、uniform；Pareto 留 ch15）；幾何級數 Σρⁿ = 1/(1−ρ) 與微分技巧 Σnρⁿ（推 E[N] 的引擎）；E[X] = ∫₀^∞ P(X>t) dt（tail 積分求期望，全書常用）；Markov 與 Chebyshev 不等式（tail 的第一課：平均值對 P99 承諾多少）。\n- **不涵蓋**：指數分布深論（ch04）；CLT（一句話，ch19 的 CI 回收）；測度論。\n- **橋接**：P99 就是 tail 的 quantile；「平均 100 ms」對 SLA 承諾了什麼——用 Markov 不等式算給看（很少）。\n- **Worked example**：geometric 期望兩路算法（tail 積分 vs 級數微分）對帳；C² 計算三連發（確定性／指數／二點叢發分布）。\n- **紙上推演**：條件期望分解；indicator 求期望；給一張（虛構）監控直方圖估 C²ₛ 並判斷「比指數更叢發嗎」。\n\n### ch04 — 指數分布：排隊世界的原子\n- **目標**：把無記憶性從「定義」變成「化簡推導的武器」；競賽引理熟練到反射。\n- **必涵蓋**：指數分布基本量（E[S]=1/μ、C²=1）；**無記憶性**：定義、證明、為什麼是連續分布中唯一（工程師嚴謹版）；殘餘壽命在指數下＝原分布（inspection paradox 預告，一般版 ch12）；hazard rate 視角（IFR/DFR、「等越久越快來」是哪種分布的性質）；**競賽引理**：min(X₁,…,Xₖ) ~ Exp(Σλᵢ)、P(Xᵢ 最先) = λᵢ/Σλⱼ、且勝者身分與競賽時長獨立（最反直覺的一條，CTMC 的引擎，完整證明）；指數假設的誠實檢討：到達間隔常像（ch05 解釋為什麼）、服務時間常不像（ch12/15 處理）。\n- **不涵蓋**：Poisson 過程（ch05）；一般分布殘餘壽命（ch12）。\n- **橋接**：timeout 該不該因「已經等很久」而調整——無記憶性的回答；exponential backoff 與指數分布無關（命名玩笑一句話釐清）。\n- **Worked example**：兩台 worker 都在忙（各 μ=10），你排第一：E[到你開始服務] = 1/20、E[你的總逗留] 完整推；並列「直覺會怎麼算錯」。\n- **紙上推演**：無記憶性證明重講；競賽引理應用 2 題；「等越久越容易來」論證找破綻。\n\n### ch05 — Poisson 過程：到達的標準模型【Python 實驗章】\n- **目標**：三個等價定義能互推（敘述層級）；疊加／分流／條件均勻性熟練；知道為什麼大量獨立稀疏來源疊加趨向 Poisson、什麼時候不是。\n- **必涵蓋**：計數過程；Poisson 過程三定義（指數間隔、獨立平穩增量＋Poisson 分布、微小區間 o(h) 刻畫）與等價性（證一個方向，其餘指路）；疊加（superposition）與分流（thinning）含證明 sketch；條件均勻性（given N(t)=n，到達時刻分布如均勻順序統計量）；Palm–Khintchine 直覺：為什麼大量獨立用戶的匯流近似 Poisson、什麼時候破（行為相關、重試迴圈、批次上游）；非齊次 Poisson（λ(t)、尖峰時段）一段。\n- **不涵蓋**：PASTA（ch08）；renewal theory 全論。\n- **橋接**：~10M 訊息/月的到達流長什麼樣；thinning＝按機率路由到 shard；superposition＝多個上游匯流。\n- **Worked example**：λ=8/s：P(某 1 秒 ≥ 12 則) 手算（pmf 累加）；p=0.3 分流到 iOS 推播的子流參數與獨立性聲明。\n- **Python 小實驗**：`random.expovariate` 疊出 Poisson 過程，驗證 N(1) 的均值≈變異數≈λ；兩條獨立流疊加後間隔的 C² ≈ 1。\n- **紙上推演**：定義互推一題；條件均勻性應用；判斷三條真實到達流（人發訊息、cron 觸發、retry 流）哪些近似 Poisson、為什麼。\n\n### ch06 — Markov chain：狀態吃掉歷史\n- **目標**：能對小 chain 手解平穩分布；說清楚平穩分布存在唯一收斂的條件與直覺；建立 balance equation＝流量守恆的讀法。\n- **必涵蓋**：Markov 性質＝「狀態吃掉歷史」（建模的真功夫在選狀態）；轉移矩陣、Chapman–Kolmogorov；狀態分類（不可約、週期、recurrent/transient——每個病態配一個工程例子）；平穩分布 π = πP 與解法（**明寫：實務上就是代入消去解線性方程組＋正規化，不需要矩陣代數或特徵值**——安撫生鏽的讀者）；有限不可約非週期 chain：存在、唯一、收斂（工程師嚴謹：敘述＋耦合直覺，完整證明指路）；balance equations 當「機率流量守恆」讀（cut 的觀念，生滅的伏筆）；ergodic 定理：時間平均＝期望（模擬的理論執照，ch19 回收）。\n- **不涵蓋**：CTMC（ch07）；MCMC；HMM。\n- **橋接**：circuit breaker 三狀態（closed/open/half-open）就是 Markov chain；TLA+ 書手畫過的狀態轉移圖（可引用不依賴）。\n- **Worked example**：circuit breaker 三狀態 chain（給定轉移機率）手解 π，回答「長期有多少比例時間處於斷路」、調參數看 π 怎麼動。\n- **紙上推演**：解平穩分布 2 題；判斷三個 chain 哪個沒有唯一平穩分布、為什麼；週期性陷阱題（振盪不收斂但 π 存在）。\n\n## Part III — 生滅與經典模型（ch07–11）\n\n### ch07 — CTMC 與生滅過程：把引擎接上時間\n- **目標**：能從指數競賽組裝 CTMC；能對任意生滅過程寫 balance equations 並解出 πₙ；掌握 ergodicity 判準。\n- **必涵蓋**：CTMC＝每個狀態停留指數時間＋按競賽引理跳轉（ch04 兌現）；rate diagram 為主、generator/Q 矩陣輕量帶過；global balance；**生滅過程**：定義、local balance＝相鄰 cut 的流量守恆（為什麼生滅鏈 global 與 local 一致——一維結構）；通解 πₙ = π₀·Π(λᵢ/μᵢ₊₁) 完整推導；ergodicity 條件（正規化級數收斂）與發散的物理意義；transient 行為的誠實聲明（本書主攻穩態，動態指 ch21 的 fluid 地圖）。\n- **不涵蓋**：M/M/1 全套（ch08）；可逆性（ch11）；uniformization。\n- **橋接**：rate diagram＝你畫過的狀態機加上速率標籤；autoscaling 的 scale-up/down 就是生與滅。\n- **Worked example**：生滅通解完整推導；套用到 λₙ 隨 n 遞減的小例（admission control 的生滅模型）算 πₙ。\n- **紙上推演**：寫 balance equations 並解 2 題；判斷三個生滅過程哪個 ergodic；「local balance 為什麼在生滅成立」口頭重講。\n\n### ch08 — M/M/1：第一個完整的佇列【Python 實驗章；全書招牌章】\n- **目標**：完整推導 M/M/1 全套結果且能重講每一步；hockey stick 定理化（兌現 ch01）；PASTA 從黑話變成定理。\n- **必涵蓋**：M/M/1＝生滅特例；πₙ = (1−ρ)ρⁿ 推導；E[N]（幾何級數微分，ch03 兌現）；用 Little 推 E[T]、E[T_Q]、E[N_Q]（基準表全套）；**回應時間完整分布** T ~ Exp(μ−λ)（敘述＋證明 sketch）→ t₉₉ = ln 100/(μ−λ)、「M/M/1 的 P99 ≈ 4.6× 平均」；使用率階梯推導（ch01 兌現）；**PASTA**：敘述、為什麼不平凡（給一個到達看到的≠時間平均的反例：等距到達）、證明思路、指出本章哪幾步偷偷用了它；Kendall 記號正式定義；穩態的精確意義、ρ ≥ 1 時發生什麼。\n- **不涵蓋**：多 server（ch09）；非指數服務（ch12）。\n- **橋接**：推播管線基準數字全面兌現；「80% 警戒線」開庭——E[N]=4 可不可接受是 SLA 的事，但 0.8→0.9 延遲翻倍是定理。\n- **Worked example**：基準表全套推導＋數值；ρ = 0.8 → 0.9 前後對照表（E[N]、E[T]、t₉₉）。\n- **Python 小實驗**：事件驅動 M/M/1 模擬（heapq，≤40 行）驗證 E[N]≈4、E[T]≈0.5 s、P99≈2.30 s（給落點區間）。**本書 DES 骨架在此首次登場**（event list＋模擬時鐘的最小實作，講清楚迴圈在做什麼；統計方法學——warmup、CI、batch means——留 ch19）。\n- **紙上推演**：πₙ 推導重講；P(N ≥ 20) 手算；「流量翻倍、機器也翻倍，延遲會怎樣」（為 ch09 池化鋪路的陷阱題）。\n\n### ch09 — M/M/c 與 Erlang 公式：池化的威力\n- **目標**：能推 M/M/c 平穩分布與 Erlang-C；能用 Erlang-B 遞迴手算；說清楚池化為什麼贏、贏多少、極限在哪。\n- **必涵蓋**：M/M/c 生滅建模（μₙ = min(n,c)·μ）；平穩分布、**Erlang-C**（延遲機率）推導、E[T_Q] = ErlangC/(cμ−λ)；損失系統（loss system）概念在此先引入一段（「沒位子就走、不排隊」；完整的有限容量理論見 ch10）；M/M/c/c 與 **Erlang-B**、手算友善的遞迴式、Erlang 在哥本哈根電話交換的歷史（照 landscape）；M/M/∞ 一段；**池化三連比**（基準表：4 台獨立 vs 共用佇列 M/M/4 vs 單台快機——初算參考必須重算）與「一台快機 vs 多台慢機」的裁決（含單台快機輸的場景：故障域、搶占）；square-root staffing／QED regime：√a 緩衝為什麼夠（直覺推導，Halfin–Whitt 指路）；Erlang-B 對服務分布 insensitive 一句話預告（ch13/18 兌現）。\n- **不涵蓋**：非指數服務（ch12）；abandonment（ch10）。\n- **橋接**：worker pool sizing、autoscaling 目標值、3,200 條並發連線該配幾個 worker 的舊問題。\n- **Worked example**：Erlang-B 遞迴手算 B(c=1…4, a=3.2) 全程 → 換算 Erlang-C ≈ 0.596 → E[T_Q] ≈ 74.6 ms；池化三連比完整數值表。\n- **紙上推演**：遞迴算另一組 (c, a)；staffing 題（要 P(wait) < 0.2 至少幾台）；「拆 pool 一定變差嗎」（M/M/c 下對；埋 ch13/ch15 短工作隔離的種子）。\n\n### ch10 — 有限容量與不耐煩：backpressure 的定理\n- **目標**：能推 M/M/1/K 並解讀 blocking probability；理解丟棄／等待／逾時的本質權衡；把 bounded queue、load shedding、timeout 定理化。\n- **必涵蓋**：M/M/1/K 平穩分布（有限幾何和，ρ 可以 > 1！與 ch08 對照）、blocking probability π_K、有效到達率 λ_eff = λ(1−π_K)、goodput；PASTA 在 blocking 的正確用法；throughput–latency–loss 三角（你只能選邊）；M/M/c/K 概觀；不耐煩：balking、reneging、M/M/1+M（Erlang-A）概觀（敘述層級）——timeout 的數學身分；有限母體 M/M/1//N（repairman model）一段：到達率隨在場人數下降改變一切（ch17 封閉系統伏筆）；**rate limiting 的佇列論身分**：token bucket（容忍叢發的 admission control）與 leaky bucket（流量整形＝把下游看到的 C²ₐ 壓低）一段（敘述＋小計算，ch14 的 C²ₐ 槓桿伏筆）。\n- **不涵蓋**：封閉網路全論（ch17）；priority（ch13）；網路中的 blocking（ch18 一句話）。\n- **橋接**：SQS visibility timeout 與 DLQ、bounded channel、nginx `max_conns`、load shedding 的數學身分；「buffer 開大一點」的審判。\n- **Worked example**：K=10：λ=8（正常）與 λ=12（過載）兩組手算 π_K、λ_eff、E[T]——過載系統靠丟棄活著、而且活得有模有樣。\n- **紙上推演**：推 M/M/1/K 平穩分布；「加大 buffer 能救過載嗎」計算題（不能——只是把延遲變長、丟棄變晚）；reneging 對 tail 的定性分析。\n\n### ch11 — 可逆性與 Burke 定理：網路的鑰匙\n- **目標**：理解時間反轉與可逆性；能重講 Burke 定理的證明思路與它反直覺的部分；知道這把鑰匙開了哪扇門。\n- **必涵蓋**：時間反轉與反轉鏈；可逆性 ⇔ detailed balance（含怎麼猜 π 再驗證的實用技巧）；生滅過程皆可逆（證明）；**Burke 定理**：M/M/1（與 M/M/c）穩態輸出是 Poisson(λ)、且時刻 t 的狀態與 t 之前的輸出歷史獨立——這句的反直覺正面處理（「剛吐出一串 job 不代表現在比較空」）；串聯佇列：聯合分布乘積形式（基準：λ=6、μ₁=10、μ₂=8）；Burke 的極限：有 feedback 時內部流不再 Poisson（ch16 的驚奇鋪墊）。\n- **不涵蓋**：Jackson 全論（ch16）；quasi-reversibility（一句話指路）。\n- **橋接**：microservice 鏈「上游輸出＝下游輸入」；「對每段各自容量規劃」什麼時候合法。\n- **Worked example**：tandem 基準手算：兩站各自 M/M/1、聯合 π(n₁,n₂) 乘積、E[N] 與總 E[T]。\n- **紙上推演**：detailed balance 驗證；用反轉鏈引導式論證 Burke；找出「輸出獨立性」的一個直覺誤用。\n\n## Part IV — 超越指數（ch12–15）\n\n### ch12 — M/G/1 與 Pollaczek–Khinchine：變異數的帳單【Python 實驗章】\n- **目標**：能推 P-K 平均等待公式（tagged-customer＋時間平均面積論證路線；**不使用 renewal 理論術語**，殘餘壽命用圖形面積論證講——本書沒教 renewal theory，不得假裝教過）；inspection paradox 內化；「變異數本身是延遲來源」定理化。\n- **必涵蓋**：為什麼 M/G/1 不再是 CTMC（佇列長度不夠當狀態）、embedded chain 一句話、本書走 mean-value 路線；**殘餘服務時間與 inspection paradox**（一般版，ch04 兌現）：E[殘餘] = E[S²]/2E[S]、「你總是撞上長工作」的數學；**P-K 公式完整推導**：E[T_Q] = λE[S²]/(2(1−ρ)) ＝ (ρ/(1−ρ))·E[S]·(1+C²ₛ)/2；基準三連比（C²ₛ = 0/1/10 → 0.2/0.4/2.2 s）；M/D/1 等待是 M/M/1 一半的金句；transform（LST）方法的存在聲明與用途（等待分布、本書不推，指路）；busy period 概念一段。\n- **不涵蓋**：排程（ch13）；G/G/1（ch14）；重尾深論（ch15）。\n- **橋接**：「一支 30 秒的報表 query 拖垮整條 API」的肇事機制現在有名字了；批次大小不齊的 consumer。\n- **Worked example**：基準三連比全推；inspection paradox 數值演示（90% 短／10% 長的混合，撞上的平均 vs 真平均）。\n- **Python 小實驗**：M/G/1 模擬三種服務分布（deterministic／exponential／兩點 C²ₛ=10）驗證 0.2/0.4/2.2 s。\n- **紙上推演**：P-K 推導重講；E[S²] 計算 2 題；「均值不變、變異數砍半，等待改善幾 %」。\n\n### ch13 — 排程：誰先服務的代價與正義\n- **目標**：能比較主要 discipline 的 E[T] 與公平性；理解 work conservation 守恆律（總量不變、分配可選）；說出 SRPT 為什麼最優、代價是什麼。\n- **必涵蓋**：work conservation；**Kleinrock 守恆律**：M/G/1 非搶占且不看工作長度的 discipline（FCFS/LCFS/RANDOM）E[T_Q] 全相同——多數人第一次聽都不信，完整講；但變異數與 tail 大不同（FCFS tail 最緊的那一面）；PS：time-sharing 的理想化、E[T] 只依賴 E[S]（**insensitivity**，敘述＋指路）、slowdown 視角；SJF 與 **SRPT**：改善機制、最優性（敘述＋交換論證 sketch，完整證明指路 Schrage 1968）；「SRPT 餓死長工作？」的真相（在 M/G/1 下長工作通常也沒變差的反直覺結果，敘述層級＋條件）；M/G/1 priority：non-preemptive 公式推導、preemptive 給結果；cμ rule 一句話。\n- **不涵蓋**：多 server 排程深論；公平性理論全論；LLM serving 排程（ch20 點綴）。\n- **橋接**：**Node.js 單執行緒 event loop 下多請求交錯執行 ≈ PS 的工程化身**（誠實討論哪裡像、哪裡不像——run-to-completion 的 tick 粒度）；OS scheduler、「VIP 通道」的代價、K8s PriorityClass。\n- **Worked example**：排程基準（短 90%/50 ms、長 10%/550 ms、λ=8）：FCFS vs 短優先 non-preemptive priority vs SJF 的 E[T] 對照表（各類與總體）。\n- **紙上推演**：守恆律驗證題；priority 公式應用；「長工作開專用 pool vs 用 SRPT」決策分析（ch09 種子兌現）。\n\n### ch14 — G/G/1 與 Kingman：工程師的萬用近似\n- **目標**：能寫 Lindley recursion 並手追；能用 Kingman/VUT 公式做 back-of-envelope 並知道誤差來源；建立「V × U × T」的世界觀。\n- **必涵蓋**：G/G/1 沒有解析解的誠實聲明；**Lindley recursion** W_{n+1} = max(0, W_n + S_n − A_{n+1})（手追、它就是 ch19 模擬的核心迴圈）；heavy-traffic 直覺：ρ→1 時等待趨向指數、只有前兩階矩 matter（為什麼——直覺論證，嚴格版指路）；**Kingman 近似** E[T_Q] ≈ (ρ/(1−ρ))·((C²ₐ+C²ₛ)/2)·E[S]，讀成 **VUT 公式**（Variability × Utilization × Time）——當全書工程總綱；上界版推導（工程師嚴謹）；基準數值（0.6 s）；準確度誠實帳：低 ρ、重尾、相關到達時誤差大（各給方向）；G/G/c 的 Allen–Cunneen 式擴展一段；到達相關性警告：C²ₐ 抓不到叢發的時間相關（一句話指路 MMPP/QNA）。\n- **不涵蓋**：嚴格 heavy-traffic 定理；重尾（ch15）；網路分解（ch18）。\n- **橋接**：容量規劃 back-of-envelope 神器；為什麼壓測要用真實 trace 重放而不是固定速率（C²ₐ 被做假）。\n- **Worked example**：基準 Kingman 0.6 s 全算；「同樣的錢：把 C² 砍半 vs 把 ρ 降 0.05」收益對照（V 槓桿 vs U 槓桿）。\n- **紙上推演**：Lindley 手追 6 個 job；Kingman 應用 2 題；「固定間隔到達的壓測低估等待多少」計算題。\n\n### ch15 — 重尾：平均值會說謊【Python 實驗章】\n- **目標**：理解重尾分布的數學性質如何粉碎輕尾直覺；知道哪些前面的結果在重尾下失效或變形；給 tail latency 工程一個理論地基。\n- **必涵蓋**：Pareto 定義、α 與矩的存在性（α≤2 變異數無限、α≤1 連均值都沒有）；重尾三衝擊：①樣本均值不收斂的體感②inspection paradox 極端化（撞上的工作比平均長很多倍——量化）③「最大的一個吃掉總和」現象；真實世界證據（檔案大小、flow size——照 landscape，不得憑記憶引用）；M/G/1 在重尾下：E[S²] 爆炸 → P-K 爆炸 → FCFS 等待重尾化；排程的救贖：PS/SRPT 在重尾下壓倒性勝出（ch13 回收，敘述層級＋指路）；Bounded Pareto 的誠實（實務都有上界，但上界很大時行為像無界）；P99 與 mean 脫鉤：輕尾「P99≈4.6×平均」（ch08）在重尾下死掉。\n- **不涵蓋**：極值理論；subexponential 嚴格理論；Tail at Scale 工程術（ch20）。\n- **橋接**：「一支 query 連環撞死 DB」；長 GC pause；為什麼 P99.9 預算這麼難立。\n- **Worked example**：Pareto α=1.5、E[S]=100 ms：P(S > 1 s) 對同均值指數的倍數差手算；10 個樣本含一個巨值的 running mean 漂移表。\n- **Python 小實驗**：Pareto vs exponential 的 running mean 收斂對照；同均值下 max/sum 占比演示。\n- **紙上推演**：矩存在性判斷；重尾 inspection paradox 計算；「拿 4.6× 規則推重尾 P99」會錯多誇張。\n\n## Part V — 佇列網路（ch16–18）\n\n### ch16 — Jackson 網路：乘積形式的驚奇\n- **目標**：能解 traffic equations、寫出 product form、算網路級指標；能說出 Jackson 定理哪裡驚奇（feedback 下內部流非 Poisson、定理卻仍成立）。\n- **必涵蓋**：開放網路、routing matrix、外部到達；**traffic equations**（流量守恆，解的存在唯一）；**Jackson 定理**：敘述、π(n₁,…,n_k) = Π πᵢ(nᵢ)、「彷彿各站獨立 M/M/1（參數 λᵢ）」的精確含義；證明路線：2 站案例驗 global balance（工程師嚴謹）、一般形指路；**驚奇正面處理**：有 feedback 時內部流不是 Poisson（Burke 失效，ch11 兌現）但乘積形式仍真——「獨立性是穩態快照的性質，不是過程的性質」；基準範例 retry feedback 全解（基準表）：p=0.2 把 ρ₂ 推到 0.9375、E[T]=3.0 s 的工程寓言；p=0.3 → ρ₂>1 系統爆炸（retry 多 10% 從穩態到不穩）；瓶頸識別與 Little on λ₀。\n- **不涵蓋**：封閉網路（ch17）；BCMP／多 class（ch18）；retry storm 動態（ch20）。\n- **橋接**：microservice 呼叫圖；「每個服務各自看起來健康、整體卻雪崩」的初階機制。\n- **Worked example**：基準 Jackson 全解（traffic equations → ρᵢ → E[Nᵢ] → E[T]=3.0 s）；p_retry 0.2→0.3 重解看爆炸。\n- **紙上推演**：另一組 routing 解 traffic equations；2 站 global balance 驗證乘積形式；「加一台 node2 vs 把 retry 率砍半」決策計算。\n\n### ch17 — 封閉網路與 MVA：固定母體的世界【Python 實驗章】\n- **目標**：理解封閉網路為什麼難（normalization constant）、MVA 怎麼繞開；能手算小型 MVA 表；理解 closed-loop 對壓測量測的含義。\n- **必涵蓋**：封閉網路動機（固定 worker 池、connection pool、壓測 VU）；Gordon–Newell 乘積形式與 normalization constant G 的計算痛點（為什麼不能直接套 Jackson）；**arrival theorem**（封閉版 PASTA：到達者看到的是 N−1 母體的穩態）——MVA 的引擎；**MVA 遞迴**推導與手算（基準配置 N=1…5 全表：E[Tᵢ]、X、E[Nᵢ]）；與 ch02 asymptotic bounds 對帳（漸近線兌現、拐點 N*=6.5 的意義）；closed vs open 行為差異：封閉系統自我節流、永遠不會像開放系統那樣爆炸——所以固定 VU 的壓測天生看不到真實過載（ch19 coordinated omission 的親戚）。\n- **不涵蓋**：多 class MVA（一句話）；BCMP（ch18）；近似 MVA（指路）。\n- **橋接**：k6 VU 模型 vs 開放流量；DB connection pool sizing 的理論性格。\n- **Worked example**：基準封閉配置 MVA 手算全表 N=1…5，對照 ch02 bounds 與拐點。\n- **Python 小實驗**：MVA 遞迴 ~20 行驗證手算表；輸出 X(N) 飽和曲線（文字表格即可）。\n- **紙上推演**：MVA 多推一步到 N=6；「VU 加倍≠流量加倍」解釋題；用 arrival theorem 重講遞迴每一項的來歷。\n\n### ch18 — 網路的邊界：product form 之外\n- **目標**：知道 product form 的精確邊界（BCMP 條件，敘述層級）；知道哪些常見工程特徵會打破它、打破之後的選項光譜。\n- **必涵蓋**：**BCMP 定理概觀**：四種 station 類型、哪些 discipline／服務分布組合保 product form（敘述＋論文指路）；insensitivity 兌現（PS、IS、LCFS-PR 對服務分布不敏感——ch09/ch13 伏筆收攏）；**打破 product form 的工程現實**：priority、有限 buffer／blocking 網路、**fork-join——本章主角段落**（「最常見卻最難」：Promise.all／scatter-gather 的數學身分；精確解只有特例、bounds 與近似指路；E[max] 與 tail 劣化完整展開；緩解手段 hedged/tied requests 指向 ch20）、批次、同步、重試相關性；分解近似思路（每站當獨立 G/G/1、一階二階參數傳播——QNA 概觀）；「公式 → 近似 → 模擬」決策框架（接 ch19）。\n- **不涵蓋**：BCMP 證明；QNA 公式全推；Petri net。\n- **橋接**：fork-join＝他每天寫的 Promise.all；「scatter-gather 的 P99 由最慢分片決定」。\n- **Worked example**：fork-join 扇出 n 路（各 Exp(μ)）：E[max] = H_n/μ 手推（n=2: 1.5/μ），對照單路——扇出的 tail 代價隨 H_n 成長；n=10 時 P99 劣化估算。\n- **紙上推演**：判斷四個網路有沒有 product form；fork-join 劣化估算題；給一個系統選「公式／近似／模擬」並說理由。\n\n## Part VI — 模擬與回到系統（ch19–21）\n\n### ch19 — 模擬方法學：讓蒙地卡羅說真話【Python 實驗章；本章主體即實驗】\n- **目標**：能寫一個誠實的事件驅動模擬（DES）；知道模擬騙人的四大途徑（transient 污染、輸出自相關、種子紀律、稀有事件）與對策；輸出永遠帶區間。\n- **必涵蓋**：DES 機制正式化（ch08 首次登場的 event list＋模擬時鐘骨架，這裡補齊一般化細節）；Lindley recursion 當 G/G/1 模擬捷徑（ch14 兌現）；種子與可重現性紀律；**warmup／transient 污染**（從空系統起跑的偏差、Welch 法概觀）；**輸出自相關**：等待時間序列高度相關 → 樸素 CI 嚴重過窄（本章招牌陷阱，數字演示）→ batch means 與獨立 replications；CI 計算（CLT 在此回收）；稀有事件的代價：估 P99.99 要多少樣本——直接算；**驗證紀律**：先對 M/M/1 ground truth（基準表）校準、再去模擬沒有公式的東西；**coordinated omission**：固定 VU 壓測在系統變慢時自動少送請求 → tail 被系統性低估（Gil Tene；ch17 closed-loop 兌現）；simpy/ciw 存在聲明一句話。\n- **不涵蓋**：工具 API；variance reduction 深論（common random numbers 一段、其餘指路）；平行模擬。\n- **橋接**：他寫過的壓測腳本與「跑三次取平均」的民間統計學開庭。\n- **Worked example**：同一個 M/M/1 模擬的三種處理（不丟 warmup／樸素 CI／batch means）結果對照表——方法學差異 > 隨機誤差。\n- **Python 小實驗**：完整 M/M/1 DES（≤40 行）＋batch means 對 ground truth 收斂；換 Pareto 服務看收斂慢多少（ch15 兌現）。\n- **紙上推演**：「這份模擬報告哪裡不可信」找碴題（內含 3 個方法學錯誤）；P99.99 樣本數計算；batch size 取捨口頭重講。\n\n### ch20 — 把理論帶回機房：retry、autoscaling、batching【Python 實驗章】\n- **目標**：用全書工具重審讀者的真實系統；ch01「經驗法則審判」清單逐條結案；retry storm 與 metastable failure 的佇列論機制說得出來。\n- **必涵蓋**：**容量規劃完整 walkthrough**：推播管線從量測（λ、E[S]、C²ₐ、C²ₛ）→ 模型選擇（決策框架）→ staffing（Erlang-C／square-root）→ SLA 驗證（P99）——全書工具一次串起來；**retry storm 深論**：retry＝feedback（ch16 兌現）＋timeout 把有效服務時間膨脹 → 同一個 λ 存在「健康／崩潰」兩個自洽狀態（**metastable failures**，照 landscape 引用；小模型手算）；防禦的數學身分：exponential backoff（降 feedback 增益）、jitter（去相關、降 C²ₐ）、circuit breaker（強制離開壞平衡，ch06 兌現）、admission control（M/M/1/K，ch10 兌現）；autoscaling 的佇列論：指標選擇（ρ vs E[N] vs E[T_Q]）、滯後與震盪、square-root staffing 重訪（ch09）；**tail latency 工程**：Tail at Scale 的 hedged/tied requests 用 fork-join（ch18）與重尾（ch15）框架解讀（照 landscape 引用）；**batching 權衡**：等湊批 vs 立即發——throughput–latency frontier 小模型；LLM serving continuous batching 一段點綴（深度指向《從後端到 AI Infra》）；「經驗法則的審判」總結表（ch01 清單結案）。\n- **不涵蓋**：LLM serving 機制細節（主書）；K8s HPA 操作；具體雲服務調參。\n- **橋接**：整章素材直接用讀者的系統，無需另設橋接段以外的錨點。\n- **Worked example**：retry 雙穩態小模型手算：給定 timeout 與 retry 規則，解出兩個自洽工作點、算「多大的擾動會從好平衡掉進壞平衡」。\n- **Python 小實驗**：retry feedback 模擬：λ 緩升再緩降，觀察遲滯（上山的路與下山的路不同——metastability 體感）。\n- **紙上推演**：用模板對自己現職系統做一次容量 walkthrough；重建審判表中三條的論證；「backoff 上限怎麼選」計算題。\n\n### ch21 — 地圖與下一步\n- **目標**：全書地圖收官、六條驗收主線兌現；知道沒講的世界長什麼樣、什麼問題會逼你去學；帶走後續路徑。\n- **必涵蓋**：全書路線圖回收（每格標已走過、各 Part 一句話總結）；六條驗收主線逐條口頭自答總測（style-guide「驗收標準」）；**沒講的世界**各一段（定位＋什麼問題逼你去學）：matrix-analytic／PH 分布（「比指數真實、比 G 可解」的中間地帶）、fluid／diffusion 近似（過載動態與尖峰）、mean-field 與 **power-of-two-choices**（值得半頁：隨機派工 vs 問兩台選短的，尾部指數級改善——敘述＋landscape 引用）、排隊控制／MDP、strategic queueing、network calculus（worst-case 路線）；書單與路徑（照 landscape：Harchol-Balter 主推、Adan–Resing 免費、Kleinrock 經典）；「如果只帶走三個公式」：Little、VUT（Kingman/P-K 一家）、Erlang-C；下一步：把 ch20 walkthrough 套到現職系統、列出「下一個要量的數」。\n- **不涵蓋**：新主題展開。\n- **橋接**：回到 ch01 開場的尖峰延遲事故——現在的你會怎麼分析它。\n- **Worked example**：power-of-two-choices 數值對照（random vs po2c 的佇列長度尾部；用 landscape 驗證的數字，否則標敘述層級）。\n- **紙上推演**：六主線口頭自答；給三個虛構問題選工具並說理由；寫自己系統的量測清單。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 記號速查表\n全書記號總表：符號、讀法、定義、首次出現章；與教科書 L/W 記號的對照表。從各章實際用過的記號 grep 彙整，不得收錄書中沒出現的。\n\n### 附錄 B — 公式總表\n本書招牌附錄。每行：模型／定律、公式、**精確適用條件**（哪些假設、哪個最常破）、首次出現章。「適用條件」欄是靈魂——沒有條件的公式表是危險品。只收書中推導過或正式敘述過的公式。\n\n### 附錄 C — 術語表\nEN–ZH–一句話定義–首次出現章。從實際內容萃取。\n\n### 附錄 D — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源，按 Part 組織；給「如果只讀三樣」與「想更嚴格時的下一本」建議。只收 landscape 或各章已驗證的連結。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-why-queueing、ch02-operational-laws、ch03-probability-toolbox、ch04-exponential、ch05-poisson-process、ch06-markov-chains、ch07-ctmc-birth-death、ch08-mm1、ch09-mmc-erlang、ch10-finite-capacity、ch11-reversibility-burke、ch12-mg1、ch13-scheduling、ch14-gg1-kingman、ch15-heavy-tails、ch16-jackson-networks、ch17-closed-networks-mva、ch18-network-limits、ch19-simulation、ch20-back-to-systems、ch21-map-and-next。\n附錄：`appendix-a-notation.md`、`appendix-b-formulas.md`、`appendix-c-glossary.md`、`appendix-d-reading-map.md`。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《等待的數學：排隊理論》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本**數學嚴謹為主**的興趣書。讀者要能親手推導每個主要公式（從 πₙ=(1−ρ)ρⁿ 到 Pollaczek–Khinchine、從 Little's Law 到 Jackson 定理）、口頭重講每個關鍵證明、並對「公式的適用條件」有肌肉記憶。目標是把讀者既有的「queue 理論直覺」升級成**可推導、可質疑、知道邊界**的硬功夫。\n- **不是**：\n  - 不是容量規劃手冊——工程應用是橋接錨點與點綴（每章「從你已知的出發」＋ch20 案例章），不是主軸。\n  - 不是模擬工具教學——Python 小實驗自寫短程式，不教 simpy/ciw 的 API（它們的存在與定位講一句即可）。\n  - 不是研究所隨機過程全課——matrix-analytic、fluid/diffusion limits、MDP 控制只在 ch21 地圖上標位置，不展開。\n  - 不服務 AI Infra 轉職敘事——純興趣定位；LLM serving 只在 ch20 當點綴，深度指向書架上的《從後端到 AI Infra》。\n- 驗收標準（全書主線，ch21 收官）：①為什麼 ρ→1 時一切爆炸、爆炸的形狀是什麼；②隨機性（變異數）本身就是延遲的來源；③平均值與 tail 是兩回事；④每個經典公式「條件不滿足時會怎麼騙你」；⑤網路層級的湧現行為（product form 的驚奇與極限）；⑥模擬什麼時候比公式誠實、怎麼讓模擬誠實。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js）。可直接當橋接錨點的經歷與直覺：\n\n- 高併發系統實戰：500K+ 使用者、10K+ CCU 遊戲後端；WebSocket 通知系統（~3,200 並發連線、~10M 訊息/月）\n- 佇列一線經驗：SQS → idempotent consumers 結算 pipeline、backpressure、rate limiting、retry 與 exponential backoff、DLQ\n- 效能工程：profiling 驅動讓 RDS CPU 尖峰降 40%；k6/Vegeta 負載測試；P99 監控指標思維\n- 容量直覺：「utilization 不要超過 80%」這類經驗法則用過但沒推導過——本書要把這些經驗法則變成定理或推翻它\n\n**不需要解釋**（讀者已精通）：queue/佇列的工程概念本身、cache、load balancer、autoscaling 的機制面、HTTP/REST、worker pool、訊息佇列語意（at-least-once 等）、監控指標的工程意義（P50/P99、QPS）。\n\n**快速複習即可**（大學看過但生鏽，研究所修過演算法與 ML）：機率基礎（樣本空間、條件機率、期望值）、幾何級數、基礎微積分（積分求期望、e 與 ln）。用「你大學看過，現在把它磨利」的節奏，在 ch03 內**自足**重建，不依賴外部材料。\n\n**要從零教**（本書主體）：無記憶性的深層意義、Poisson 過程的等價刻畫、Markov chain 的平穩理論、生滅過程與 balance equations、PASTA、可逆性、transform 方法（最小可用集）、heavy traffic 與 heavy tail、product-form 網路、模擬方法學。\n\n**跨書資源**：書架上有《把系統寫成定理：TLA+ 與形式化方法》（狀態機、∀∃ 量詞、「工程師的嚴謹」證明觀）——**可以引用、不得依賴**（如「Markov chain 的狀態轉移圖你在 TLA+ 書手畫過類似的」）。微積分書《馴服無限》**還在建置中，禁止引用**。LLM serving 細節指向《從後端到 AI Infra》（已完成，可引用章節主題但不重講）。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。數學名詞中英並用：第一次出現給「中文（English）」，之後可只用一種——到達率（arrival rate）、服務率（service rate）、使用率（utilization）、平穩分布（stationary distribution）、無記憶性（memorylessness）、生滅過程（birth-death process）、重尾（heavy-tailed）。專有名詞保留英文：Little's Law、PASTA、Erlang-B/C、Pollaczek–Khinchine（可簡稱 P-K）、Jackson network、MVA、Kingman bound。\n- 人名用原文，不硬翻：Erlang、Little、Kendall、Kingman、Burke、Jackson、Pollaczek、Khinchine、Wolff、Harchol-Balter。\n- 台灣用語基準：佇列（不是队列）、機率（不是概率）、變異數（不是方差）、期望值、迴圈、伺服器、資料、網路。禁止簡體中文詞彙與用法（信息、默認、內存、代碼、對象、質量、概率、方差、隨機變量——用「隨機變數」）。\n- 第二人稱「你」直接對讀者說話。\n\n## 數學記號規範（全書一致，附錄 A 是速查表；閱讀器不渲染 LaTeX，一律純文字）\n\n- **內文行內**用 Unicode：λ μ ρ π σ² Σ ∫ ∞ √ ≈ ≠ ≤ ≥ → ⇒ ∀ ∃ ∈，prime 用 ′。\n- **核心記號表**（全書唯一基準，不得混用教科書的 L/W 系統）：\n  - λ 到達率、μ 單一伺服器服務率、c 伺服器數、ρ = λ/(cμ) 使用率、a = λ/μ offered load\n  - S 服務時間隨機變數（E[S] = 1/μ）、T 回應時間（含服務）、T_Q 等待時間（不含服務）\n  - N 系統內人數、N_Q 佇列中人數；E[N] = λE[T]（Little's Law 的標準形）\n  - πₙ = P(N = n) 平穩機率；C²ₐ、C²ₛ 為到達間隔／服務時間的變異係數平方（SCV）\n  - 與教科書 L/W 記號的對照**只在 ch02 與附錄 A 各給一次**，內文不用 L/W。\n- 下標規則：單一小寫字母下標用 Unicode（πₙ、π₀、C²ₛ、C²ₐ）；大寫或多字母下標用底線（E[T_Q]、E[N_Q]、λ_eff）。\n- Kendall 記號 A/S/c/K 在 ch01 先見面（地圖語言）、ch08 正式定義。\n- **多行推導**放在 ```text 圍欄區塊裡，等號對齊、每步右側可加「← 為什麼」短註。禁止把長推導硬塞進行內。\n- 數字基準：e ≈ 2.71828、ln 2 ≈ 0.6931、ln 100 ≈ 4.6052（全書統一，按需要截短，不得互相矛盾）。機率與時間值預設保留 3 位有效數字（如 0.596、74.6 ms）。\n- 圖：ASCII diagram（狀態轉移圖、佇列示意、hockey stick 曲線、全書地圖），必須通過 `check_diagrams.py` 的 CJK=2 欄寬檢查。曲線用 `*` 描點、座標軸用 `─ │ └`；不追求精確比例，追求形狀直覺。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章（ch01、ch03、ch07、ch12、ch16、ch19）在 blockquote 後放全書 ASCII 路線圖（基準圖在 outline.md，照抄並把「◄ 你在這裡」標到本 Part），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的工程實戰上，要具體（SQS consumer 數量怎麼決定、k6 壓測的 P99 曲線、3,200 條 WebSocket 連線的容量帳、RDS CPU 80% 警戒線），不要泛泛而談。\n3. 核心內容（多個 `##` section）。**推導優先於結論**：先讓讀者看到「為什麼非得是這個形狀」，再給公式；歷史脈絡服務於數學動機（Erlang 在電話交換機房遇到什麼問題），不是編年史。\n4. `## 陷阱與防禦` — 本書招牌段落（故障視角的數學版）：這個公式／模型**的適用條件是什麼**、條件不滿足時**它怎麼騙你**（給出具體會錯多少的例子）、**怎�麼自我察覺**（什麼徵兆代表模型不對）。用表格或條列。\n5. `## 紙上推演` — 每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：手推公式、手算數值表、判斷模型適用性、找出錯誤論證的破綻、口頭重講一個證明。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。\n   指定章節（ch05、ch08、ch12、ch15、ch17、ch19、ch20——見 outline）額外加 `### Python 小實驗`：本機可跑、標準函式庫優先（`random`、`statistics`、`heapq`；numpy/matplotlib 可選用、要標明）、每段程式 ≤ 40 行、**必須固定亂數種子**（`random.seed(42)`）、預期輸出寫成「理論值 X，模擬值應落在 X±誤差」的形式而不是假裝模擬會輸出精確值。程式碼與註解一律英文。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。優先出「為什麼」與「什麼條件下不成立」，不是「是什麼」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體數字、一步一步算的完整過程（基準範例「推播管線」的數字見 outline 跨章基準表），不准跳步。\n- **嚴謹度的誠實標示**：每個論證明確標示自己是哪一級——「完整推導」「工程師的嚴謹：每步能口頭說出理由」「直覺版（本書不證，見延伸閱讀）」。禁止「顯然」「易證」；禁止把直覺論證偽裝成證明。該不證的（PASTA 完整證明、Jackson 定理一般形、SRPT 最適性完整證明、heavy-traffic 極限定理）明寫不證並指路。\n- **每個公式出場必附適用條件**：什麼假設下成立（Poisson 到達？指數服務？穩態？FCFS？）、哪個假設最常在現實中破掉。這是本書與「背公式」的根本差別。\n- **數值自我複核**：所有數值（推導結果、表格、Erlang 公式值）寫章時必須自己重算一遍，不得抄自記憶或外部來源。跨章基準數值以 outline 基準表為準；表中標「初算參考」的值必須獨立重算，算出不同要停下來報告而不是沿用。\n- 每個概念給「它在解什麼問題」：無記憶性解什麼、PASTA 解什麼、可逆性解什麼。禁止無動機的定義。\n- 決策框架：什麼時候 M/M/1 夠用、什麼時候要 G/G/1 近似、什麼時候只能模擬——給判準，不給教條。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、人物歸屬、書籍版本、連結、工具狀態）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 數學內容（定義、定理、推導）不依賴 landscape，但必須自我複核；歸屬與年份（Little 1961、Kingman、P-K 的兩人貢獻、PASTA 1982）以 landscape 查證版為準，禁止憑記憶寫歸屬。\n- 時效性事實標時點：`（2026-06）`。延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 多行數學推導用 ```text 區塊；Python 實驗用 ```python 區塊。表格用於數值對照、適用條件、陷阱清單。\n- 跨章引用格式：`（見 ch07）`，不要寫死檔名路徑。\n- 檔名：`chNN-slug.md`、附錄 `appendix-a-notation.md` 等（見 outline 檔名規範）。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是全書最被低估的定理」）。不行銷、不喊口號。允許冷幽默（排隊理論不缺乾燥幽默的素材）。數學不裝高深：每個符號出場都有白話直覺在旁邊；但也不假裝簡單——該慢的地方明說「這個推導值得你抄一遍」。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="queue";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">等待的數學<br><span style="font-weight:400;font-size:12px;color:var(--muted)">排隊理論</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
  /* figureize: a paragraph that is exactly one image becomes a <figure>,
     its alt text the <figcaption>; every prose image opens the lightbox. */
  content.querySelectorAll('p>img:only-child').forEach(function(img){
    var p=img.parentElement;
    if(p.textContent.trim()!=='')return;
    var fig=document.createElement('figure');
    fig.appendChild(img.cloneNode(true));
    if(img.alt){
      var cap=document.createElement('figcaption');
      cap.textContent=img.alt;
      fig.appendChild(cap);
    }
    p.replaceWith(fig);
  });
  var lb=document.getElementById('lightbox');
  content.querySelectorAll('img').forEach(function(img){
    img.addEventListener('click',function(){
      lb.innerHTML='';
      lb.appendChild(img.cloneNode(true));
      lb.classList.add('show');
    });
  });
  /* math: only present when the book config sets "math": true */
  if(window.renderMathInElement){
    renderMathInElement(content,{
      delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}],
      ignoredTags:['script','noscript','style','textarea','pre','code'],
      throwOnError:false
    });
  }
}
document.getElementById('lightbox').addEventListener('click',function(){this.classList.remove('show');});

/* Math protection: marked eats the backslashes in \( \) (and in \{ \_ etc.
   inside formulas) before KaTeX ever sees them. So when math is enabled,
   math segments ($$...$$ display, \(...\) inline) OUTSIDE fenced code are
   swapped for inert placeholders before marked.parse, then restored
   (HTML-escaped) into the parsed HTML for auto-render to pick up. */
function parseWithMath(md){
  if(!window.renderMathInElement)return marked.parse(md);
  var store=[];
  var parts=md.split(/(```[\s\S]*?```|~~~[\s\S]*?~~~)/);
  for(var i=0;i<parts.length;i++){
    if(/^(```|~~~)/.test(parts[i]))continue;
    parts[i]=parts[i]
      .replace(/\$\$[\s\S]+?\$\$/g,function(m){store.push(m);return 'MATHPROTECT'+(store.length-1)+'X';})
      .replace(/\\\([\s\S]+?\\\)/g,function(m){store.push(m);return 'MATHPROTECT'+(store.length-1)+'X';});
  }
  var html=marked.parse(parts.join(''));
  return html.replace(/MATHPROTECT(\d+)X/g,function(_,n){
    return store[+n].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=parseWithMath(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 等待的數學';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
