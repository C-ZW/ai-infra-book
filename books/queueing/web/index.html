 2022，論文用語 iteration-level scheduling）與隨後 vLLM 的 PagedAttention（SOSP 2023）做的 **continuous batching**，本質是**在每個 token 步重組批次**：誰完成了就讓位、新請求隨時插隊進批，不必等整批。用本書的話，它把「靜態 batch 的 join 牆」換成「逐 step 的動態 admission」——是 ch13 排程與本節 batching 的交叉路口。截至 2026-06，continuous batching + PagedAttention 已是 LLM serving 排程的業界基線（vLLM 仍活躍維護）。**機制細節超出本書範圍**——它是書架上《從後端到 AI Infra》的主場；這裡只標出它在排隊地圖上的座標：batching frontier 與動態排程的合流。\n\n## 經驗法則的審判：總結表（ch01 清單結案）\n\nch01 把八條工程黑話送上法庭、各章審理，現在逐條宣判。判決三種：**成立**（升格定理）、**有條件成立**（附精確適用範圍）、**推翻**。編號與措辭照 ch01。\n\n| # | 工程黑話 | 判決 | 判決理由（承審章） |\n|---|---|---|---|\n| 1 | 「使用率不要超過 80%」 | **有條件成立** | 80 不是定理，是 hockey stick E[T]=E[S]/(1−ρ) 上「曲線開始彎」的一個整數選擇（ch08）。正確的警戒線該隨兩件事浮動：**規模**（√a 法則：大池子可跑到 95%+，小池子 60% 就危險，ch09）與**變異**（VUT：C² 越大，同樣 ρ 等待越長，警戒線要往下調，ch14）。把 80% 當固定常數，對大服務是浪費、對小服務或高變異服務是危險 |\n| 2 | 「慢了就加機器」 | **有條件成立** | 加在瓶頸站才有效（ch02 bottleneck）；共用佇列的池化贏過拆分（M/M/c vs c 個 M/M/1，同硬體差 2.9 倍，ch09）。但**三種情況加機器救不了**：瓶頸在別處（ch02）、服務重尾時要換的是排程不是機器（ch13/ch15）、以及 retry storm 的崩潰態——加機器只是抬高山脊，feedback 還在（ch16/本章）。「加機器」治得了 U 槓桿，治不了 V 槓桿與壞平衡 |\n| 3 | 「平均沒事就沒事；要看尾巴，盯 P99 就夠」 | **有條件成立** | 平均與 tail 在輕尾下有固定關係（M/M/1 的 P99 ≈ 4.6× 平均，ch08），重尾下徹底脫鉤（nines 從等差變等比，ch15）。而「盯 P99 就夠」本身有兩個坑：fork-join 下整體 P99 要每路交出 P99.9（ch18）；固定 VU 壓測的 coordinated omission 會系統性低估 tail（ch19）。P99 要看，但要看對——量測方法本身會騙人 |\n| 4 | 「retry 是免費的保險」 | **推翻** | retry 是 feedback（ch16），把 λ 放大 1/(1−p) 倍；p 隨負載漂移時，同一個 λ 長出健康與崩潰兩個自洽平衡（metastable failure，本章）。它買的是一個會在尖峰時把崩潰餘裕吃光的迴圈。防禦（backoff 降增益、jitter 降 C²ₐ、circuit breaker 強制脫離壞盆地、admission control 截斷回饋）不是選配，是 retry 的法定隨附費用 |\n| 5 | 「buffer 開大一點總沒錯」 | **推翻** | 過載下無限 buffer 只是把丟棄改名叫遲到（ch10）：blocking 地板 1−1/ρ 由流量守恆決定，再大的 buffer 都丟不少於這個量；buffer 越大只是延遲越長、丟棄越晚（bufferbloat），疊上 goodput 更難看——大 buffer 的過載系統 throughput 高、goodput 趨近 0。早丟優於晚丟（ch10） |\n| 6 | 「上下游各自做容量規劃就好」 | **有條件成立** | 合法性分三級（ch18 判決）：tandem 無 feedback 且全指數時精確（Burke 定理，ch11）；一般開放網路是 QNA 式近似，誤差來源明確（ch16/ch18）；fork-join、blocking、retry 相關性之下連近似的形都不對，要換工具。「各自規劃」不是定理，是一個有名字、有適用邊界的近似 |\n| 7 | 「壓測跑三次取平均就穩了」 | **推翻** | 模擬/壓測的輸出高度自相關，樸素 CI 嚴重過窄——方法學差異 > 隨機誤差，跑三次取平均是民間統計學（ch19，需 warmup + batch means + 區間）。更糟的是固定 VU 的封閉壓測天生自我節流（ch17），系統變慢時自動少送請求（coordinated omission，ch19），**看不到真實過載**——你壓的是另一個系統 |\n| 8 | 「已經等這麼久了，應該快輪到了」 | **推翻** | 指數服務無記憶（ch04）：等待的歷史對剩餘等待**透露零**。重尾下更糟，是反向的——等越久，期望剩餘越長（inspection paradox，撞上的工作期望長度可達無限，ch12/ch15）。「快輪到了」這個直覺在最該信它的重尾場景錯得最離譜 |\n\n八條結案。三條有條件成立、五條推翻——這個比例本身是本書的論點：**工程黑話多半有真實的經驗基礎，但經驗法則和定理的差別就是適用條件，而黑話在你最需要它的時候沒帶條件來。** 你現在手上每一條都帶著條件了。\n\n## 陷阱與防禦\n\n本章把整套工具用在真實系統上，最大的陷阱是「把模型的乾淨當成系統的真相」。\n\n| 陷阱 | 它怎麼騙你 | 怎麼自我察覺與防禦 |\n|---|---|---|\n| 把雙穩態模型的數字當預測 | 本章 ρ_good = 0.6、餘裕 +50% 是 mean-field 理想化（忽略漲落、retry 負載設成線性、單輪重試）算出來的——真實系統的山脊位置會隨漲落抖動，甚至在你算出的餘裕內就被一次運氣不好的尖峰推過去 | 模型給的是**骨架與方向**（有兩個平衡、餘裕隨 b 與 g 變薄），不是精確的崩潰點。要數字去模擬（本章 Python 實驗 + ch19 方法學）；餘裕當預算管，告警設在遠低於算出的山脊處 |\n| 以為裝了 backoff 就免疫 retry storm | backoff、jitter、circuit breaker、admission control 各動不同係數；只裝一種（常見：只有 backoff）只動了 b，C²ₐ 與壞盆地的存在性沒變 | 對著四防禦表逐一檢查：我的 b 降了嗎？C²ₐ 去相關了嗎？有沒有強制脫離壞平衡的機制？有沒有門口限流保 goodput？四個旋鈕缺一個，餘裕就有個缺口 |\n| autoscaling 盯 ρ 當早期警報 | ρ 對延遲是 1/(1−ρ) 非線性，等 ρ 報警延遲已在 hockey stick 陡峭段；ρ 是落後指標 | 盯更接近 SLA 的 E[N] 或 E[T_Q]；留 √a 級而非固定百分比的 headroom；迴路裡加阻尼（cooldown、非對稱 scale 速率）防振盪 |\n| 把 batching 紅利當白吃的午餐 | 大 batch 抬 throughput 的同時，攢批等待 (b−1)/(2λ) 線性成長，低負載時尤其痛（沒流量還硬等湊批） | batching 是 latency 換 throughput，匯率是固定開銷 K；用 adaptive batching（湊滿 b 或 timeout 先到先發）在 frontier 上隨負載動態選點 |\n| 拿單站工具分析有 feedback / fork-join 的系統 | 容量 walkthrough 的每一步都假設 λ 外生、無扇出；retry 讓 λ 內生（雙穩態）、fork-join 讓 E[T] 由 max 決定——單站公式直接失效 | walkthrough 第二步的決策框架最後一格就是這個叉路：有 feedback / fork-join / 重尾，公式只給方向，數字靠模擬 |\n\n## 紙上推演\n\n### 題 1：對自己的系統跑一次容量 walkthrough **[25 分鐘] ★★**\n\n挑一個你現在維護或維護過的真實服務（API、worker pool、consumer 都行）。照本章五步走一遍：\n\n(a) 寫下你**真的能量到**的四個數（λ busy hour、E[S]、C²ₐ、C²ₛ）；量不到的標「估」並寫下你怎麼估。\n(b) 用決策框架選模型，講出為什麼（哪個假設成立、哪個最可疑）。\n(c) 算 E[T] 與 E[T_Q]。\n(d) 給一個 SLA（P99 < ? s），判斷現在達不達標，不達標的話該動哪根槓桿（加機器 / 降 C²ₐ / 縮 E[S]）收益最大。\n(e) 寫下「下一個我該量但還沒量的數」。\n\n這題沒有標準答案——它是 ch21 的暖身，也是這本書對你唯一真正的考核。\n\n### 題 2：重建審判表中三條的論證 **[20 分鐘] ★★**\n\n不看總表，對空氣各講 90 秒，重建這三條的判決與理由（講完對照）：\n\n(a) 審判 #1「80% 警戒線」為什麼是「有條件成立」而不是「成立」？兩個讓警戒線該偏離 80 的因素是什麼？\n(b) 審判 #4「retry 是免費的保險」為什麼被推翻？「雙穩態」這三個字要出現在你的講稿裡。\n(c) 審判 #5「buffer 開大一點」為什麼被推翻？「blocking 地板」與「goodput」要出現。\n\n### 題 3：backoff 上限怎麼選 **[15 分鐘] ★★**\n\nexponential backoff 通常設一個上限（cap）：第 n 次重試等 min(base·2ⁿ, cap)。\n\n(a) 從雙穩態模型的角度，backoff 的 cap 在調哪個係數？cap 設太小（接近 base）會怎樣？設太大（比方 5 分鐘）會怎樣？\n(b) 一個服務的依賴平均故障恢復時間是 30 s。從「降 feedback 增益 b」與「故障恢復後多快重新導流」的張力出發，論證 cap 該落在什麼量級，並說出設成 30 ms 與設成 5 min 各自的失敗模式。\n\n### 推演解答\n\n**題 2。** (a) 80 不是定理，是 hockey stick 上一個方便的整數。兩個讓它偏離的因素：**規模**——√a 法則說緩衝按 √a 級開，大池子 ρ 可以跑很熱（a=100 開 120 台 ρ=0.83 仍安全），小池子 60% 就危險；**變異**——VUT 說等待 ∝ (C²ₐ+C²ₛ)/2，高變異系統同樣 ρ 等待長得多，警戒線要往下壓。漏掉任一個都不算懂——常見錯路是只講規模、忘了變異。\n\n(b) retry 是 feedback（站內 λ_eff = λ₀/(1−p)），而 p 隨負載漂移，使 λ_eff 的自洽方程 ρ = g + bρ² 變成二次式——**兩個根 = 兩個自洽平衡（雙穩態）**：一個健康、一個崩潰。一次尖峰把系統推過中間的山脊，就落進崩潰盆地，尖峰過了也回不來（壞平衡在原 λ₀ 下依然存在）。所以 retry 不免費，它買的是一個吃掉崩潰餘裕的回饋迴圈。加分：指出餘裕 = ρ_tip − ρ_good，隨 b、g 變大而變薄。\n\n(c) 過載（ρ > 1）下，流量守恆規定每秒多出來的 λ−μ 件必須從某個出口離開，**blocking 地板 = 1−1/ρ**，再大的 buffer 都丟不少於這個量。大 buffer 不減少丟棄，只把丟棄延後、把延遲拉長（bufferbloat）；疊上 goodput——當 E[T] 超過 client timeout，完工沒人收貨，throughput 高而 **goodput → 0**。所以「開大 buffer」把死刑改成凌遲。常見錯路：以為 buffer 大能「吸收」過載——它吸收的是尖峰（暫態），不是持續過載（穩態）。\n\n**題 3。** (a) cap 設定的是 backoff 能把 feedback gain b 壓到多低的**下限**——重試間隔越長，單位時間回饋的 retry 越少，b 越小、雙穩態的餘裕越厚。cap 太小（≈ base）：backoff 形同虛設，retry 幾乎原速回饋，b 沒降下來，等於沒裝防禦。cap 太大：b 確實壓得很低（好），但代價是依賴恢復後，卡在長 backoff 裡的請求要枯等一整個 cap 才重新嘗試——**可用性恢復被自己的防禦拖慢**。\n\n(b) 張力在於：cap 要夠大才能在故障期間把 b 壓到讓系統留在好盆地（降 feedback），又要夠小才能在故障結束後及時重新導流。依賴恢復要 30 s，cap 設成 **30 ms** 的失敗模式：故障期間 backoff 幾乎沒拉開間隔（30 ms 的重試對 30 s 的故障是密集轟炸），b 沒降，retry storm 風險照舊——cap 比故障時間尺度小太多，等於沒 backoff。設成 **5 min** 的失敗模式：依賴 30 s 就恢復了，但所有請求卡在 5 分鐘的 backoff 裡，恢復後要再等將近 5 分鐘才有像樣的流量回去——你把一次 30 s 的故障放大成 5 分鐘的可用性坑。合理量級：cap 落在依賴恢復時間的同一個數量級上下（這裡 ~30 s 到 1 min），讓 backoff 在故障期間真的拉開間隔（壓 b），又不至於在恢復後拖太久。配 jitter 去相關、配 circuit breaker 在依賴明確掛掉時整段停發（比盲目 backoff 更乾脆地脫離壞盆地）。沒有單一最佳值——cap 是「故障期壓 feedback」對「恢復期快導流」的匯率，跟 ch09 的 β、ch14 的兩根槓桿一樣，是個取捨旋鈕不是常數。\n\n### Python 小實驗：retry feedback 的遲滯\n\n把雙穩態模型動態化：讓外部負載 λ₀ **緩緩升上去、再緩緩降回來**，觀察上山的路與下山的路**不重合**——這就是 metastability 的體感。健康態崩潰的 λ₀（上山）會高於崩潰態恢復的 λ₀（下山），中間那段是遲滯迴圈：同一個 λ₀，系統處在哪個態取決於它**怎麼來的**。\n\n模型沿用 worked example 的 retry 回饋 ρ = g + b·ρ²（b = 0.667），加一點隨機漲落（這就是為什麼要固定種子——漲落決定上山的路具體在哪一點被推過山脊）。標準函式庫即可，≤ 40 行。\n\n```python\nimport random\nrandom.seed(42)\n\nMU = 10.0          # service rate (jobs/s); offered load g = lam0/MU\nB = 0.667          # retry gain: backlog feeds back B*rho^2 extra load\nNOISE = 0.01       # stochastic jitter (this is why the seed matters)\n\ndef relax(rho, lam0):                      # one noisy step toward rho = g + B*rho^2\n    target = lam0 / MU + B * rho * rho\n    rho = 0.5 * rho + 0.5 * target + random.gauss(0, NOISE)\n    return min(1.05, max(0.0, rho))\n\ndef ramp(lams, rho):\n    out = []\n    for lam0 in lams:\n        for _ in range(20):                # settle at each load level\n            rho = relax(rho, lam0)\n        out.append(rho)\n    return out, rho\n\nup = [2.6 + 1.8 * i / 100 for i in range(101)]    # offered lam0: 2.6 -> 4.4 /s\ndown = up[::-1]\nup_rho, rho = ramp(up, rho=0.05)                  # start cold (healthy basin)\ndown_rho, rho = ramp(down, rho)\n\ndef at(s, xs, t):\n    i = min(range(len(s)), key=lambda k: abs(s[k] - t)); return xs[i]\n\nprint(\"lam0   rho_up   rho_down\")\nfor L in [3.0, 3.4, 3.6, 3.8, 4.0]:\n    print(\"%4.1f   %5.3f    %5.3f\" % (L, at(up, up_rho, L), at(down, down_rho, L)))\n```\n\n**預期輸出**（定性形態 + 數值區間，不是精確值——換種子會微移）：\n\n```text\nlam0   rho_up   rho_down\n 3.0   ~0.40    ~0.37      ← 兩路都健康（低負載，唯一平衡）\n 3.4   ~0.51    ~1.05      ← 分岔：上山仍健康，下山還鎖在崩潰態\n 3.6   ~0.59    ~1.05      ← 同一個 lam0，兩個態（遲滯）\n 3.8   ~1.05    ~1.05      ← 上山在此附近被推過山脊、崩潰\n 4.0   ~1.05    ~1.05\n```\n\n要讀出的形態：(1) **上山路在 λ₀ ≈ 3.8 附近崩潰**（接近理論的 saddle-node：4bg = 1 ⇒ g = 0.375 ⇒ λ₀ = 3.75）；(2) **下山路一旦崩潰，要降到 λ₀ ≈ 3.2 以下才恢復**——遠低於它崩潰的 3.8；(3) 中間 λ₀ ∈ (3.2, 3.8) 是**遲滯迴圈**：rho_up 健康（~0.5–0.6）而 rho_down 崩潰（~1.05），同一個負載兩個命運。這就是「為什麼尖峰過了還救不回來」的可執行版本：把 λ₀ 推上去再放回原位，系統不會自己走回家。把 NOISE 調大，上山的崩潰點會更早、更不可預測——預測時運氣的成分被你親手放大了。\n\n誠實標示：這是 mean-field + 漲落的**示意模型**，不是事件驅動的 M/M/1 retry 模擬（那要追每個 job 的 timeout 與重發，是 ch19 的份量）。它忠實重現的是**遲滯這個定性現象**與**它對種子/漲落的敏感**，不是任何精確的崩潰閾值。要精確閾值，照 ch19 的方法學跑真模擬、帶區間。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 容量規劃五步是哪五步？每一步最容易翻車的地方是什麼？（提示：busy hour、模型假設、4.6× 外推、hash 分流、coordinated omission）\n2. 為什麼 retry 會讓同一個 λ 有兩個自洽平衡？「二次式有兩個根」對應到系統的什麼？\n3. metastable failure 的 trigger 與 sustaining effect 差在哪？為什麼「重啟才好、尖峰過了救不回來」是這個區分的直接推論？\n4. 四個 retry 防禦（backoff、jitter、circuit breaker、admission control）各動雙穩態模型的哪個量？只裝一個為什麼不夠？\n5. autoscaling 盯 ρ 為什麼是落後指標？盯 E[T_Q] 的代價是什麼？autoscaling 為什麼會振盪？\n6. hedged 與 tied requests 差在哪？tied requests 為什麼攻擊的是排隊變異而不是服務變異？這跟 ch18 的 quorum 是什麼關係？\n7. batching 在用什麼換什麼？匯率由哪個量決定？低負載時大 batch 的失敗模式是什麼？\n8. 審判表八條，哪三條「有條件成立」、哪五條「推翻」？各挑一條，把它的精確適用條件講出來。\n\n## 延伸閱讀\n\n- Nathan Bronson et al., \"Metastable Failures in Distributed Systems\", *HotOS 2021* — 本章雙穩態的定錨論文；讀它把 trigger／sustaining effect 的區分內化，這是看懂大型故障的關鍵框架。開放 PDF：https://sigops.org/s/conferences/hotos/2021/papers/hotos21-s11-bronson.pdf\n- Lexiang Huang et al., \"Metastable Failures in the Wild\", *OSDI 2022* — 前一篇的實證續集，真實案例譜系與緩解手段；讀案例研究那節，看 retry storm 在不同公司長成什麼樣。開放 PDF：https://www.usenix.org/system/files/osdi22-huang-lexiang.pdf\n- Marc Brooker, \"Metastability and Distributed Systems\"（2021-05-24）— metastable failure 的排隊直覺入門，「stable down」狀態講得最白話；本章雙穩態的部落格版。https://brooker.co.za/blog/2021/05/24/metastable.html\n- Marc Brooker, \"Fixing retries with token buckets and circuit breakers\"（2022-02-28）— 把 retry 放大係數與本章四防禦寫成可實作的工程方案；token bucket 給 retry 設總預算那段直接對應 ch10。https://brooker.co.za/blog/2022/02/28/retries.html\n- Jeffrey Dean & Luiz André Barroso, \"The Tail at Scale\", *CACM* 56(2), 2013 — tail latency 工程的定錨文獻；ch01 預告、ch18 鋪墊、本章兌現——hedged／tied requests 那兩段是必讀，配 ch18 的 fork-join 帳單一起讀。https://research.google/pubs/the-tail-at-scale/\n- Gil Tene, \"How NOT to Measure Latency\"（Strange Loop 2015）— coordinated omission 的出處談話；審判 #3 與 #7 為什麼說「P99 量測本身會騙人」，這場 talk 講得最透。https://www.youtube.com/watch?v=lJ8ydIuPFeU\n- Gyeong-In Yu et al., \"Orca: A Distributed Serving System for Transformer-Based Generative Models\", *OSDI 2022* — continuous batching（論文用語 iteration-level scheduling）的出處；本章只當點綴，機制深度在書架上的《從後端到 AI Infra》。https://www.usenix.org/system/files/osdi22-yu.pdf\n"}, {"id": "ch21-map-and-next", "file": "ch21-map-and-next.md", "group": "Part VI — 模擬與回到系統", "title": "ch21 — 地圖與下一步", "md": "# ch21 — 地圖與下一步\n\n> **本章解決什麼問題**：這是全書的收官章，不引進任何新模型。它的工作有四件：把全書路線圖收回來、每格標上「走過了」；把 style-guide 立下的六條驗收主線拿出來，逐條當口頭測驗問你「現在講得出來嗎」；把這本書**刻意沒講**的世界一塊一塊指出來——不是為了展開，而是讓你知道地圖的邊界在哪、哪種問題會逼你跨出去；最後把你帶回 ch01 開場那條飆升的推播管線延遲曲線，看看走完十九章之後，你會怎麼分析它。\n\n## 從你已知的出發\n\n二十章之前，你手上有的是一批工程黑話：「使用率別超過 80%」「慢了就加機器」「retry 是免費的保險」。它們是你六年資深後端生涯沉澱下來的肌肉記憶，多數時候管用——但你說不出它們**為什麼**管用，也說不出它們**什麼時候**會背叛你。\n\n現在不一樣了。你能推導 πₙ = (1−ρ)ρⁿ，能用面積雙算圖證 Little's Law，能對著 Kingman 的 VUT 公式說出「這個 ρ/(1−ρ) 是使用率的稅、這個 (C²ₐ+C²ₛ)/2 是變異數的稅」。ch20 我們把 ch01 立案的八條黑話逐條結了案。這一章是另一種收尾：不再往系統裡推，而是往外看——你站在一張地圖上，該知道自己走過了哪些格子，也該知道地圖外面還有什麼。\n\n最誠實的收尾不是「你學完了」，而是「你現在有資格判斷自己還缺什麼」。這正是本章想留給你的東西。\n\n## 全書路線圖：每一格都走過了\n\nch01 第一次給你這張圖時，只有 Part I 標著「◄ 你在這裡」。現在全部走完：\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律   ✓ 走過\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain  ✓ 走過\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke  ✓ 走過\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾  ✓ 走過\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界  ✓ 走過\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步  ◄ 你在這裡（最後一格）\n```\n\n每個 Part 一句話，是它在全書敘事弧裡的位置：\n\n- **Part I（地圖與定律）**：先讓你親眼看到隨機性怎麼無中生有出等待（D/D/1 不排隊、叢發一來就排），再給一批**不需要機率**的鐵律（Little's Law、bottleneck bounds）——你能從可量測量推出不可直接量測量，這是全書的地板。\n- **Part II（機率地基）**：把生鏽的機率磨利，主角是 C²（變異係數平方）這把全書都在用的尺；指數分布的無記憶性是這個世界的原子，Poisson 過程是到達的標準模型，Markov chain 給出「系統＝狀態＋轉移」的引擎。\n- **Part III（生滅與經典模型）**：把引擎接上時間（CTMC），生滅過程一接上佇列，M/M/1 就誕生了、hockey stick 被定理化；多伺服器的池化威力（Erlang 公式）、有限容量的 backpressure、可逆性與 Burke 定理為網路開了門。\n- **Part IV（超越指數）**：放掉指數假設，變異數開始收費——P-K 公式（M/G/1）、排程的選擇與守恆律、Kingman 的萬用近似（VUT）、重尾把平均值的信用徹底毀掉。\n- **Part V（佇列網路）**：上到網路層級——Jackson 的乘積形式驚奇（feedback 下內部流非 Poisson，定理卻仍成立）、封閉網路與 MVA、product form 的精確邊界（fork-join 在哪裡撞牆）。\n- **Part VI（模擬與回到系統）**：公式到頭了，模擬接手——但模擬會騙人，方法學是門手藝；然後帶著全部工具回機房重審 retry storm、autoscaling、batching；最後就是這張地圖本身。\n\n「前一章的問題是後一章的動機」這條原則，現在你可以反過來讀：每一格之所以存在，是因為前一格留下了一個它答不了的問題。\n\n## 六條驗收主線：口頭自答總測\n\nstyle-guide 在開篇立下六條主線，說「全書主線，ch21 收官」。現在開庭。每一條，先合上書，對空氣講 60–90 秒，再對照「合格的講稿至少要有」。講得出來才算這本書沒白讀；講不清楚＝那一塊還沒長進肌肉，回對應章重走。\n\n**主線①：為什麼 ρ→1 時一切爆炸、爆炸的形狀是什麼？**\n\n合格講稿要有：M/M/1 的 E[T] = E[S]/(1−ρ)，分母是 1−ρ（剩餘容量），不是 ρ；所以「剩餘容量每砍半，延遲翻倍」——0.8→0.9 流量只多 12.5%，延遲翻倍。形狀是 hockey stick，左半邊平到騙人、右端漸近垂直。爆炸不是踩到開關（沒有魔法閾值），是 1/(1−ρ) 這個函數本身。加分：說得出這個形狀在 G/G/1 下被 Kingman 公式保留（ρ/(1−ρ) 那一項一模一樣），只是前面多乘了變異數因子——所以這是**所有**單伺服器佇列的共同命運，不是 M/M/1 的特例。（ch08、ch14）\n\n**主線②：隨機性（變異數）本身就是延遲的來源。**\n\n合格講稿要有：D/D/1（確定性到達、確定性服務）在 λ<μ 下**零等待**——這是對照組，證明等待的來源不是負載，是變異。把變異數定量化之後，Kingman 的 VUT 公式把帳單拆開：E[T_Q] ≈ (ρ/(1−ρ)) · ((C²ₐ+C²ₛ)/2) · E[S]，中間那項就是變異數的價碼。C²=0 確定性、C²=1 指數、C²>1 叢發。加分：到達的不規則（C²ₐ）和服務的不規則（C²ₛ）各自獨立收費，帳單上有各自的明細；壓測用固定速率會把 C²ₐ 做假、系統性低估等待。（ch01、ch03、ch14）\n\n**主線③：平均值與 tail 是兩回事。**\n\n合格講稿要有：M/M/1 裡「P99 ≈ 4.6× 平均」（t₉₉ = ln 100/(μ−λ)），但這個 4.6× 是指數分布瘦尾巴的專屬結果。重尾之下平均與 tail 徹底脫鉤——Pareto α≤2 變異數無限，4.6× 規則死得很難看。平均正常從不代表尾巴正常。加分：tail 的量測本身會騙人（coordinated omission，ch19）；以及網路層級 fork-join 的 P99 由最慢分片決定（E[max] 隨 H_n 成長，ch18）。（ch08、ch15、ch18、ch19）\n\n**主線④：每個經典公式「條件不滿足時會怎麼騙你」。**\n\n合格講稿要有：能對至少三個公式說出它的適用條件與最常破的那一個。例：M/M/1 假設 Poisson 到達＋指數服務，服務時間幾乎從不是指數（ch12 修正）；P-K 假設 FCFS 與穩態，重尾下 E[S²] 爆炸（ch15）；Jackson 假設無限容量＋機率路由，有限 buffer 或同步就破（ch18）；Little's Law 反而幾乎不會破——它不依賴分布、排程、網路結構，只要穩態與長期平均。加分：說得出「適用條件最常破的那一個」是這本書與背公式的根本差別。（全書「陷阱與防禦」段落）\n\n**主線⑤：網路層級的湧現行為（product form 的驚奇與極限）。**\n\n合格講稿要有：Jackson 定理的乘積形式 π(n₁,…,n_k) = Π πᵢ(nᵢ)——「彷彿各站獨立 M/M/1」，但驚奇在於有 feedback 時內部流**不是** Poisson（Burke 失效），乘積形式卻仍成立——「獨立性是穩態快照的性質，不是過程的性質」。極限：BCMP 給出 product form 的精確邊界，fork-join、priority、有限 buffer、同步都會打破它。加分：retry feedback 把 ρ₂ 推到 0.9375、retry 率多 10% 就從穩態翻到不穩（ch16 基準）。（ch11、ch16、ch18）\n\n**主線⑥：模擬什麼時候比公式誠實、怎麼讓模擬誠實。**\n\n合格講稿要有：公式失效（G/G/c、重尾、fork-join、有限 buffer 網路）時模擬接手；但模擬騙人的四大途徑——transient 污染（從空系統起跑的偏差，要 warmup）、輸出自相關（等待序列高度相關 → 樸素 CI 嚴重過窄 → batch means／獨立 replications）、種子紀律（固定種子才可重現）、稀有事件（估 P99.99 要算樣本數）。誠實的紀律是：先對 M/M/1 ground truth 校準，再去模擬沒有公式的東西；輸出永遠帶區間。加分：coordinated omission——固定 VU 壓測在系統變慢時自動少送請求，tail 被系統性低估。（ch19）\n\n六條都講得出來，這本書的主體就內化了。任何一條卡住，那一章值得你重走一遍——不是重讀，是重新對著空氣講。\n\n## 沒講的世界：地圖的邊界\n\n這本書是「數學嚴謹為主的興趣書」，不是研究所隨機過程全課。下面六塊是 style-guide 明文列為「全域不涵蓋」的疆域。我不展開任何一塊——只給你**定位**（它在地圖的哪裡、補了什麼缺口）和**觸發條件**（什麼問題會逼你去學它）。把它當路標，不是教學。\n\n**Matrix-analytic 方法與 PH 分布——「比指數真實、比 G 可解」的中間地帶。**\n\n你在 ch12 已經嘗到痛點：放掉指數假設（M/G/1），佇列長度就不再是 Markov 狀態，CTMC 引擎失效，只能走 mean-value 路線拿到平均、拿不到完整分布。Phase-type（PH）分布是個聰明的折衷：把一個一般分布近似成「若干個指數階段串並聯」的結構，這樣狀態空間雖然變大，但**仍然是 Markov 的**——於是 M/M/1 那套生滅／CTMC 機器又能用了，只是狀態變成二維（佇列長度 × 當前 phase）。matrix-analytic 方法（Neuts 的 QBD，quasi-birth-death）就是專門解這類二維結構的工具，把 πₙ 寫成矩陣的幾何級數 πₙ = π₀ Rⁿ（注意這個形式跟 M/M/1 的 ρⁿ 多像——R 是矩陣版的 ρ）。**什麼問題逼你去學**：當你的服務時間分布既不是指數、又不肯用 Kingman 那種「只看前兩階矩」的粗近似——你要完整分布、要算 P99.9 而不只是平均，而且分布有明顯的多峰結構（例如 cache 命中 vs miss 的雙峰服務時間）——這時 PH 擬合＋QBD 是「比 Kingman 準、比模擬便宜」的中間地帶。延伸閱讀：Harchol-Balter 教科書 Part VII 有 PH 分布與 matrix-analytic 的入門。\n\n**Fluid 與 diffusion 近似——過載動態與尖峰的形狀。**\n\n整本書主攻**穩態**。ch07 我們就誠實聲明過：transient 行為（過載怎麼升起、退潮要多久）不在射程內。但你的 SQS backlog 尖峰恰恰是個 transient 現象——它堆起來、又消下去，全程系統可能根本沒進過穩態。Fluid 近似把離散的 job 流當成連續的「流體」，用一條微分方程描述佇列長度隨時間的軌跡（ρ>1 時佇列以速率 λ−μ 線性上漲，這就是你 backlog 堆積的速度）；diffusion 近似則在 fluid 軌跡上疊一層布朗運動式的隨機擾動，補回變異數的效果。**什麼問題逼你去學**：當你關心的不是「穩態平均等待多少」而是「這波尖峰會堆多高、多久退潮、autoscaler 該多快反應」——也就是**動態**而非穩態——fluid／diffusion 是正確的語言。heavy-traffic 極限（ch14 那個「ρ→1 時等待趨向指數」的直覺）背後的嚴格理論也住在這裡。延伸閱讀：Harchol-Balter 教科書與 Gallager 的 MIT 6.262（landscape 有連結）有 heavy-traffic 與擴散極限的脈絡。\n\n**Mean-field 與 power-of-two-choices——隨機派工 vs 問兩台選短的。**\n\n這一塊值得多給半頁，因為它是「直覺嚴重低估的結果」，而且離你的工作最近——load balancer 怎麼派工，每天都在發生。\n\n設定：N 台伺服器，每台一條佇列，總到達率 N·λ（λ<1），服務時間指數、平均 1。一個請求進來，怎麼選伺服器？\n\n- **隨機派工（d=1）**：閉著眼睛丟一台。每台各自是獨立的 M/M/1，使用率 ρ=λ。穩態下，「某條佇列長度 ≥ k」的比例是 sₖ = λᵏ——指數衰減。\n- **Power-of-two-choices（d=2，又叫 po2c、JSQ(2)、「問兩台選短的」）**：隨機挑**兩**台，派給其中較短的那條。\n\n直覺會說：問兩台只比問一台多看一眼，能好多少？答案是**指數級地好**。mean-field 分析（N→∞ 時各佇列趨向漸近獨立，用一條微分方程描述「佇列長度 ≥ k 的比例」的演化）給出一個漂亮的不動點：\n\n```text\n隨機（d=1）：  sₖ = λ^k                      ← 單指數衰減\npo2c（d=2）：  sₖ = λ^(2^k − 1)              ← 雙指數衰減（指數的指數）\n一般 d 選短：  sₖ = λ^((d^k − 1)/(d − 1))\n```\n\n注意指數上的差別：random 的指數是 k（線性成長），po2c 的指數是 2ᵏ−1（指數成長）。這就是「雙指數衰減」（doubly exponential）——尾巴塌得快到不可思議。代入 λ=0.9 看數值（worked example 在下面詳算）：佇列長度 ≥5 的比例，random 是 0.590，po2c 是 0.0382——差約 15 倍，而且 k 再大一點差距就爆開。\n\n歸屬（這段我上網查證過，2026-06）：佇列版本由 **Vvedenskaya、Dobrushin、Karpelevich（1996）**與 **Mitzenmacher（博論 1996，期刊版 IEEE TPDS 2001）**獨立給出，用微分方程刻畫不動點、證明雙指數衰減；靜態 balls-into-bins 版本的 lg lg n 結果歸 **Azar、Broder、Karlin、Upfal（STOC 1994）**。一個常被引用的金句：d 從 1 加到 2 是**指數級**改善，但 d 從 2 再往上加（3、4…）只剩**常數倍**改善——所以「兩個就夠了」不是偷懶，是定理。**什麼問題逼你去學**：當你的 load balancer 要在大量後端之間派工、而你想知道「JSQ(2) 到底比 round-robin／random 好多少、值不值得多一次 RTT 去查佇列長度」——這套 mean-field 工具給的是定量答案，不是手感。HAProxy、Nginx 等都有 po2c 模式（landscape 未收錄其文件連結，此處只作定位）。延伸閱讀：Mitzenmacher, \"The Power of Two Choices in Randomized Load Balancing\", IEEE TPDS 12(10), 2001。\n\n**排隊控制與 MDP——不只是分析，是決策。**\n\n到目前為止這本書都在**分析**：給定系統，算它的指標。但很多真實問題是**控制**：每一刻該不該收這個請求（admission control）、該派給哪台（routing）、該不該再開一台機器（dynamic scaling）——而且要在不確定性下最小化某個長期成本。把佇列狀態當 Markov state、把動作當決策、把延遲與成本當 reward，這就是 Markov Decision Process（MDP）。最優策略往往有漂亮的結構（例如 threshold policy：佇列超過某長度才開新機器）。**什麼問題逼你去學**：當你不是在**評估**一個固定策略、而是在**設計**一個動態策略，且想要「可證明最優」而非「調參調到能動」——autoscaling 的最優觸發點、admission control 的最優門檻——MDP／隨機控制是那個世界。ch20 的 cμ rule、SRPT 最優性（ch13）都是這個世界邊緣的特例。\n\n**Strategic queueing——當排隊的人會算計。**\n\n這本書的 job 是被動的：它們到達、排隊、被服務，不會抗議、不會耍心機。但 ch01 就誠實聲明過：如果「隊太長使用者就走」是使用者的**理性決策**，那是賽局論的題目。Strategic queueing（又叫 game-theoretic queueing）研究自利的個體怎麼選擇——要不要加入、選哪條隊、願不願付費插隊——以及這些個體最優的選擇怎麼匯成系統層級的（常常很糟的）均衡（Naor 1969 的經典結果：個體理性的加入門檻比社會最優的門檻**更寬鬆**，也就是大家都太愛排隊了）。**什麼問題逼你去學**：當「到達率」不是外生給定的、而是**取決於系統狀態本身**（隊長→人少來、定價→人改時段）——例如你要設計一個會影響使用者行為的限流或定價機制——你需要的是均衡分析，不是固定 λ 的佇列分析。\n\n**Network calculus——worst-case 而非平均。**\n\n整本書講的是**機率**：平均等待、P99、穩態分布。但有一整類問題問的是**確定性的最壞保證**：「最壞情況下，這個封包絕不會延遲超過 X ms」——這是即時系統、網路 QoS、車載／工控網路的語言，賠率為零的場景。Network calculus 用 (min,+) 代數、arrival curve（到達流的上包絡）與 service curve（伺服器的下保證），推出延遲與 backlog 的**確定性上界**，完全不碰分布。它和這本書是互補的兩種世界觀：排隊理論問「平均會怎樣、尾巴多胖」，network calculus 問「最壞絕不超過多少」。**什麼問題逼你去學**：當你的需求是 hard real-time 保證、SLA 是「絕不」而非「P99.9」——例如 token bucket 整形後下游的確定性延遲界（ch10 的 leaky/token bucket 在這裡有嚴格版）——network calculus 是那把尺。\n\n這六塊不是「進階版的同一件事」，是六個**不同的問題類別**。這本書教你的是其中一類（穩態、機率、被動 job、分析而非控制）的硬功夫。知道邊界在哪，比假裝沒有邊界誠實得多。\n\n## 如果只帶走三個公式\n\n書會還、筆記會丟，但有三個公式值得刻進心算肌肉。它們的共同點：跨模型、條件寬、back-of-envelope 就能用。\n\n**①Little's Law：E[N] = λ·E[T]。**\n\n全書最被低估的定理。它不要任何分布假設、不管排程、不管網路結構——只要系統穩態、長期平均存在。你早就在用它（「concurrent ≈ RPS × latency」就是它），現在你知道它是定理。它的可怕正在於那個「無關」：對任何穩定系統都成立，所以任何違反它的量測數據必有 bug。（ch02）\n\n**②VUT 公式（Kingman / P-K 一家）：E[T_Q] ≈ (ρ/(1−ρ)) · ((C²ₐ+C²ₛ)/2) · E[S]。**\n\n工程總綱。讀成 Variability × Utilization × Time 三個槓桿：使用率的稅 ρ/(1−ρ)、變異數的稅 (C²ₐ+C²ₛ)/2、時間刻度 E[S]。它把全書三條主線壓進一行：ρ→1 爆炸（U 項）、變異數是延遲來源（V 項）、且這是 G/G/1 的**近似**（誠實標示：低 ρ、重尾、相關到達時誤差大）。M/G/1 的 P-K（C²ₐ=1 的精確特例）和 G/G/1 的 Kingman 是同一家。會這一個，容量規劃的 back-of-envelope 就有了。（ch12、ch14）\n\n**③Erlang-C（M/M/c 延遲機率）→ E[T_Q] = ErlangC/(cμ−λ)。**\n\n多伺服器與池化的決策公式。它回答「給定 SLA 要幾台」、「池化贏多少」、「square-root staffing 為什麼夠」。配上 √a 緩衝的直覺（QED regime），你就能算 staffing 而不是拍腦袋。（ch09）\n\n三個一組的覆蓋面：Little 給你**守恆**（不靠假設的地板）、VUT 給你**單站的變異數帳單**、Erlang-C 給你**多站的池化決策**。其餘所有公式，要嘛是這三個的特例，要嘛是它們失效時的修正。\n\n## 橋接：回到 ch01 那條飆升的曲線\n\nch01 開場有三段現場記憶：RDS CPU 的 80% 警戒線、k6 壓測曲線在某個拐點豎直起飛、SQS backlog 在尖峰堆積。當時你「講不出那個點由什麼決定」。現在你會怎麼分析推播管線那條尖峰延遲曲線？走一遍——這就是 ch20 walkthrough 的濃縮版，但重點在**你現在腦子裡有的語言**：\n\n1. **先量四個數，不是兩個。**ch01 的你只會量 λ 和 E[S]（於是只知道 ρ=0.8）。現在你知道光這兩個不夠——你要量 **C²ₐ（到達的變異）**和 **C²ₛ（服務的變異）**。沒有這兩個，你連等待的數量級都估不出來（主線②）。\n\n2. **80% 警戒線不再是迷信。**E[T]=E[S]/(1−ρ) 告訴你 ρ=0.8 時 E[T]=0.5 s（5× 服務時間）；0.8→0.9 延遲翻倍。80% 不是魔法數字，是「hockey stick 開始彎」的人為整數——該不該是 80，取決於你的 SLA 和你的 C²（主線①）。\n\n3. **拐點是 1/(1−ρ) 的形狀，不是 bug。**k6 曲線每次都在「剛剛還好好的」之後豎直——因為剩餘容量 1−ρ 在分母，左半邊平到騙人。這不是某次部署的 regression（主線①）。\n\n4. **SQS backlog 堆積是局部超載＋變異，不是容量不足。**λ<μ 只承諾長期平均追得上；尖峰時段的叢發（C²ₐ 大）讓瞬間需求超過瞬間供給，閒置又不可儲存，於是 backlog 堆起來。穩態公式算尖峰的平均深度，但 backlog 的**堆起—退潮**動態其實是 transient（fluid 近似才是精確語言——你現在知道那塊在地圖外）。\n\n5. **P99 要單獨看，而且要小心量測。**「平均 0.5 s」不代表尾巴沒事；M/M/1 下 P99≈2.3 s（4.6×），但若服務時間重尾（那支偶爾跑很久的 query）4.6× 規則就死了（主線③）。而且固定 VU 的 k6 壓測會因 coordinated omission 系統性低估 tail（ch19）——你量到的 P99 本身可能在騙你。\n\n6. **如果有 retry：先畫 feedback 圖。**429 觸發的 retry 把流量送回到達端，這是 Jackson feedback（ch16）；timeout 膨脹有效服務時間，可能造出「健康／崩潰」兩個自洽工作點（metastable failure，ch20）。ch01 的你會說「retry 是免費的保險」；現在你知道那是審判 #4，判決：有條件成立，條件是 backoff＋jitter＋circuit breaker 把 feedback 增益壓下去。\n\nch01 的你看到的是一條無法解釋的曲線。現在的你看到的是一個有名字、有公式、有適用條件、知道哪裡會騙你的系統。這就是這本書想給你的全部——把「queue 的直覺」升級成「可推導、可質疑、知道邊界」的硬功夫。\n\n## 陷阱與防禦\n\n收官章也有它專屬的陷阱——它們是「學完一本書之後」最容易犯的元錯誤。\n\n| 陷阱 | 它怎麼騙你 | 怎麼自我察覺與防禦 |\n|---|---|---|\n| 把「公式背得出來」當成「懂了」 | 你能寫出 P-K 公式，不代表你說得出它在 FCFS 假設破掉時會怎麼錯。背公式是 ch01 就警告過的反面教材 | 用六條主線的「口頭自答」自測：講得出**為什麼**和**什麼條件下不成立**才算過；只講得出「是什麼」＝還沒懂 |\n| 把這本書的射程當成排隊理論的全部 | 你會的是穩態／機率／被動 job／分析。看到過載動態（fluid）、最壞保證（network calculus）、控制問題（MDP）就硬套穩態公式 | 拿到一個問題先分類：是穩態還是動態？平均還是 worst-case？分析還是控制？分錯類，工具一定錯 |\n| po2c「指數級改善」聽起來像萬靈丹 | 雙指數衰減的前提是 N→∞ 的 mean-field 極限、指數服務、查佇列長度免費。後端少、查詢有成本、服務重尾時，改善會縮水 | 任何漸近結果先問「我的系統離那個極限多遠」；N=4 台的 po2c 不會有 N=10000 的戲劇性 |\n| 「我已經會 VUT 了，不用模擬」 | VUT 是近似，低 ρ／重尾／相關到達下誤差大；fork-join、有限 buffer 網路根本沒有公式 | 公式給數量級、模擬給可信區間。需要 P99.9 或遇到 fork-join／重尾，公式之後必須補模擬（ch19 紀律） |\n\n## 紙上推演\n\n### 題 1：六主線口頭自答總測 **[30 分鐘] ★★**\n\n合上書，把上面六條主線**每一條**對空氣講 60–90 秒，錄音或寫逐字稿。每條至少要碰到：(i) 核心公式或機制、(ii) 一個適用條件、(iii) 一個「條件破了會怎樣」的例子。講完逐條對照本章「合格講稿至少要有」。\n\n### 推演解答\n\n評分標準：六條裡，能完整講出（含適用條件與失效例）的有幾條？\n\n- **5–6 條完整**：這本書的主體內化了。剩下的卡點回對應章重講（不是重讀）。\n- **3–4 條**：地基穩，但某些章還停在「讀過」沒到「會講」。最常卡在主線④（每個公式的適用條件——這是最難的，因為要記的是邊界不是公式）和主線⑤（product form 的驚奇——「獨立性是快照性質不是過程性質」這句很多人講不清）。\n- **0–2 條**：別氣餒，但這代表你是「讀完」不是「學完」。挑你最在意的一條（多半是主線②變異數，因為它最反工程直覺），回那一章把 worked example 自己手算一遍，再來一次。\n\n常見錯路：把主線講成「是什麼」的定義複述（「VUT 就是 V 乘 U 乘 T」）——不及格，因為沒講**為什麼**這三項相乘、也沒講它什麼時候不準。口頭自答的及格線永遠是「為什麼」和「什麼條件下不成立」。\n\n### 題 2：power-of-two-choices 數值對照 **[20 分鐘] ★★**\n\n用本章的不動點公式（mean-field、N→∞、指數服務），λ=0.9：\n\n(a) 算 random（d=1，sₖ=λᵏ）與 po2c（d=2，sₖ=λ^(2ᵏ⁻¹)）在 k=1…6 的「佇列長度 ≥ k 的比例」對照表。\n(b) 對每個 k 算 random/po2c 的倍數比，描述它怎麼隨 k 變化。\n(c) 用一句話解釋「為什麼 d 從 1→2 是指數級改善、2→3 只剩常數倍」這個金句的數值含義。\n\n### 推演解答\n\n(a) 不動點 sₖ：\n\n| k | random sₖ=0.9ᵏ | po2c sₖ=0.9^(2ᵏ⁻¹) | 指數對照 |\n|---|---|---|---|\n| 1 | 0.900 | 0.900（指數 2¹−1=1） | 兩者起點相同 |\n| 2 | 0.810 | 0.729（指數 3） | po2c 開始拉開 |\n| 3 | 0.729 | 0.478（指數 7） | |\n| 4 | 0.656 | 0.206（指數 15） | |\n| 5 | 0.590 | 0.0382（指數 31） | 差約 15 倍 |\n| 6 | 0.531 | 0.00131（指數 63） | 差約 405 倍 |\n\n（這些值我寫章時用 0.9 的對應次方獨立重算過：0.9⁷=0.478、0.9¹⁵=0.206、0.9³¹=0.0382、0.9⁶³=0.00131，與表一致。）這是**敘述／計算層級**的結果：它來自 N→∞ mean-field 不動點，不是有限 N 的精確值；λ=0.9 是我為了讓對比明顯選的，公式本身對任何 λ<1 成立（來源見延伸閱讀的 Mitzenmacher 2001）。\n\n(b) 倍數比 random/po2c：k=1 是 1.0、k=2 是 1.11、k=3 是 1.52、k=4 是 3.19、k=5 是 15.5、k=6 是 405。倍數比本身在**超指數成長**——因為 random 的指數線性走（k）、po2c 的指數指數走（2ᵏ−1），兩者之差 (2ᵏ−1)−k 隨 k 爆開。工程白話：佇列越深，po2c 越罕見到誇張——長佇列幾乎被消滅，這正是 tail latency 大幅改善的來源。\n\n(c) 一般式 sₖ=λ^((dᵏ−1)/(d−1))。指數從 d=1 的 k 跳到 d=2 的 2ᵏ−1，是**函數類別**的躍遷（線性→指數），所以叫指數級改善；從 d=2 到 d=3，指數從 2ᵏ−1 變 (3ᵏ−1)/2，雖然更大，但兩者都已經是「k 的指數」這同一類，只差底數與常數——所以只剩常數倍。躍遷只發生在第一步：看一台 vs 看兩台之間有質變，看兩台 vs 看三台之間只有量變。\n\n常見錯路：把 po2c 的指數寫成 2ᵏ（漏掉 −1），k=1 會得 0.81 而非 0.9，與「d=1 和 d=2 在 k=1 應該相同」矛盾——這是檢查公式對不對的好錨點（k=1 時任何 d 都還沒「選短」生效，sₖ 必須都等於 λ）。\n\n### 題 3：三個虛構問題，選工具並說理由 **[15 分鐘] ★★**\n\n對下面三個問題，判斷該用本書的哪塊工具、或本書**射程之外**的哪塊（六塊未涵蓋之一），說出分類理由：\n\n(a) 「黑五尖峰時，訂單 backlog 會在 20 分鐘內堆到多高、autoscaler 該設多快才不會堆爆？」\n(b) 「這個即時競價系統，最壞情況下單筆出價的端到端延遲**絕對**不能超過 50 ms——這個保證成立嗎？」\n(c) 「我的限流改成動態定價（高峰加價），使用者會改時段，到達率不再固定——新均衡下尖峰真的會被削平嗎？」\n\n### 推演解答\n\n先問三個分類問題：穩態還是動態？平均/tail 還是 worst-case？分析還是控制？到達率外生還是內生？\n\n(a) **動態 + 控制，本書射程外**。關鍵詞是「20 分鐘內堆到多高」（transient 軌跡，不是穩態平均）和「autoscaler 設多快」（控制問題）。穩態公式給不了 backlog 的時間軌跡。正解：**fluid 近似**算堆積軌跡（ρ>1 時佇列以 λ−μ 線性漲）＋ **MDP／控制**設 autoscaler 觸發策略。本書能給的是「尖峰穩態的平均深度」當參考，但「多久堆多高」要 fluid。\n\n(b) **worst-case，本書射程外**。關鍵詞「絕對不能超過」「保證成立嗎」——這是確定性最壞界，不是 P99。排隊理論給的是分布（平均、tail），給不了「絕不超過」。正解：**network calculus**——用 arrival curve（出價流的上包絡）和 service curve 推確定性延遲界。本書若硬算 P99.99 也只能說「超過的機率很小」，不能說「絕不」。\n\n(c) **到達率內生，本書射程外**。關鍵詞「使用者會改時段，到達率不再固定」——λ 取決於系統狀態（定價），這是賽局。固定 λ 的佇列分析會給錯答案，因為它假設 λ 外生。正解：**strategic queueing／賽局均衡**分析——使用者的時段選擇匯成均衡，再看均衡下的尖峰。本書的佇列公式是均衡**算出來之後**才用得上的下游工具。\n\n教訓：三題都「看起來像排隊問題」，但三題都在本書射程外——分別因為動態、worst-case、內生到達。分類分對了，才知道要不要跨出這本書。這就是本章「知道邊界在哪」的實戰價值。\n\n### 題 4：寫你自己系統的量測清單 **[20 分鐘] ★★**\n\n挑一個你現職維護的真實系統（不是推播管線那個範例）。套 ch20 的 walkthrough 模板，列出「下一個要量的數」——也就是你**現在沒在量、但分析它需要**的數。每個數寫：量什麼、怎麼量、缺了它哪個分析做不了。\n\n### 推演解答\n\n沒有標準答案（系統是你的），但合格的清單至少要有這幾類，且每項都對得上一個分析缺口：\n\n- **C²ₐ（到達的變異係數平方）**：怎麼量——蒐集到達時間戳，算間隔的變異數/均值²。缺了它：Kingman/VUT 的 V 項算不了，你只能假設 Poisson（C²ₐ=1），但上游若有批次/cron/retry，C²ₐ 可能 ≫1，你會嚴重低估等待。\n- **C²ₛ（服務時間的變異係數平方）＋服務時間分布形狀**：怎麼量——蒐集每筆處理耗時，算 C²ₛ，並畫直方圖看是否重尾（有沒有少數巨值）。缺了它：分不清該用 M/M/1 還是 M/G/1，更分不清平均與 tail 會不會脫鉤（重尾與否決定 4.6× 規則能不能用）。\n- **真實的 ρ（用 busy fraction 量，不是用 λ/μ 推）**：怎麼量——伺服器忙碌時間佔總時間的比例。缺了它：你以為的 ρ 可能和實際的 busy fraction 對不上（多核、非同步、批次都會讓兩者背離），整條 hockey stick 的橫軸刻度就錯了。\n- **有沒有 feedback／retry，放大係數多少**：怎麼量——比較進入流量與重試流量。缺了它：Jackson 的有效 λ 算錯，可能正坐在 metastable 懸崖邊而不自知。\n- **tail 的誠實量測（避開 coordinated omission）**：怎麼量——用開放式負載產生器（固定發送速率，不等回應），或在分析時做 CO 校正。缺了它：你儀表板上的 P99 可能系統性偏低，越過載偏得越多。\n\n評分：每一項都該能回答「缺了它，哪個具體分析做不了」。寫得出這個因果的，才是真的把工具內化了——你不是在湊清單，是在用分析需求反推量測需求。這正是這本書最終想教你的思考方式：**先想要回答什麼問題，再決定量什麼數**。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 六條驗收主線，你現在能完整講出幾條（含適用條件與失效例）？卡住的那幾條，分別卡在「不記得公式」還是「說不出條件」？這兩種卡點要回不同地方補。\n2. 「如果只帶走三個公式」是哪三個？為什麼是這三個而不是 P-K 或 Jackson？（提示：覆蓋面——守恆、單站變異數帳單、多站池化決策。）\n3. po2c 的「雙指數衰減」雙在哪裡？為什麼 d 從 1→2 是質變、2→3 只是量變？這個結果的適用條件（哪三個）是什麼？\n4. 給你一個問題，你用哪四個分類問題判斷它在不在本書射程內？（穩態/動態、平均/worst-case、分析/控制、到達率外生/內生。）各舉一個本書**射程外**的對應領域。\n5. 回到 ch01 那條飆升的曲線——比起當年的你，現在多了哪四樣分析武器？（至少講出：量 C² 不只量 ρ、1/(1−ρ) 的形狀、P99 與平均脫鉤的判斷、feedback 要先畫圖。）\n6. fluid 近似補了這本書哪個明說過的缺口？（提示：ch07 的那句誠實聲明。）什麼樣的問題（給一個你系統裡的例子）會逼你去學它？\n7. 「我把 VUT 背起來了所以不用模擬了」——這句話哪裡危險？什麼情況下公式之後必須補模擬？\n\n## 延伸閱讀\n\n收官章的延伸閱讀是一張**後續路徑**：先給三本主幹書、再給「想更嚴格時往哪走」。連結以 `_meta/landscape-2026-06.md` 驗證過的為準（2026-06）。\n\n- **Mor Harchol-Balter, *Performance Modeling and Design of Computer Systems: Queueing Theory in Action*, Cambridge University Press, 2013** — 本書全程的主要參考教科書，也是你下一步的主幹。想補本章「沒講的世界」：PH 分布與 matrix-analytic 在 Part VII、heavy-traffic 在後段。無免費 PDF（作者明言別買 Kindle，數學式會壞），但官網有第 1 章試讀與 errata。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- **Ivo Adan & Jacques Resing, *Queueing Systems*（TU Eindhoven 講義，2015-03-26 版）** — 全本免費 PDF，精簡而嚴謹。想把本書某個推導用另一種寫法再看一遍、或要一份隨身可查的免費替代品，這是首選。https://www.win.tue.nl/~iadan/queueing.pdf\n- **Leonard Kleinrock, *Queueing Systems* Vol. 1: Theory（Wiley, 1975）／Vol. 2: Computer Applications（Wiley, 1976）** — 經典兩卷本。Vol. 1 是理論的深水區（transform 方法、嚴格推導），Vol. 2 把它接到電腦/網路應用。當你覺得 Harchol-Balter 的工程化敘述不夠嚴格、想看「原版的嚴謹」時讀它。無官方免費 PDF。https://onlinelibrary.wiley.com/doi/abs/10.1002/net.3230060210\n- **Michael Mitzenmacher, \"The Power of Two Choices in Randomized Load Balancing\", *IEEE Transactions on Parallel and Distributed Systems* 12(10), 2001** — 本章 po2c 半頁敘述的原始出處之一（佇列版的雙指數衰減）；想看不動點微分方程怎麼推、為什麼「兩個就夠」，讀這篇。佇列版的另一獨立來源是 Vvedenskaya–Dobrushin–Karpelevich 1996（*Problems of Information Transmission* 32(1)）。https://cs.colby.edu/courses/F09/cs231-labs/labs/lab07/Mitzenmacher-2Choices-TPDS2001.pdf\n- **Robert Gallager, MIT OCW 6.262 Discrete Stochastic Processes（Spring 2011, Gallager 親授）** — 完整錄影＋講義＋習題解答。想把本書「快速複習即可」的機率與隨機過程地基補成研究所級的嚴格（馬可夫過程、renewal theory、heavy-traffic 的真正理論），這是免費且權威的下一站。https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n"}, {"id": "appendix-a-notation", "file": "appendix-a-notation.md", "group": "附錄", "title": "附錄 A — 記號速查表", "md": "# 附錄 A — 記號速查表\n\n這是一份查閱用的速查表，不是教學章節，所以不套用各章的骨架。表中每個符號都從 ch01–ch21 實際用過的內容萃取，「首次出現章」標的是該符號**正式登場並被定義**的那一章（少數符號在更早章節以「（見 chNN）」的預告形式提過一次，這種前向引用不算正式出場，但會在備註裡點出，免得你翻書時對不上）。全書內文一律用 E[N]/E[T] 這套記號，不用教科書的 L/W；兩者的對照放在本附錄最後一張表，方便你拿本書去對讀任何一本經典教科書時不迷路。下標規則沿用全書：單一小寫字母下標用 Unicode（πₙ、π₀、C²ₛ），大寫或多字母下標用底線（E[T_Q]、λ_eff）。\n\n## 速率與負載\n\n| 符號 | 讀法 | 定義（一句） | 首次出現章 |\n|---|---|---|---|\n| λ | lambda | 到達率（arrival rate）：單位時間平均到達數 | ch01 |\n| μ | mu | 單一伺服器的服務率（service rate）：忙碌時單位時間平均完成數，E[S] = 1/μ | ch01 |\n| ρ | rho | 使用率（utilization）：ρ = λ/(cμ)，伺服器忙碌時間的長期比例；穩定要求 ρ < 1 | ch01 |\n| a | offered load | 提供負載（offered load）：a = λ/μ，與伺服器數無關的「需求量」，ρ = a/c | ch07 |\n| c | — | 伺服器數（平行服務台的個數） | ch09 |\n| Λ | big lambda | 競賽引理裡 k 個獨立指數速率之和 Λ = λ₁ + … + λ_k，min ~ Exp(Λ) | ch04 |\n| λᵢ | lambda-i | 第 i 個來源／第 i 站的到達率（疊加、分流、網路裡用） | ch04 |\n| λ₀ | lambda-zero | 開放網路的外部到達率（進入整個網路的總流量） | ch07 |\n| λ_eff | lambda-eff | 有效到達率：實際被系統接納的速率（有限容量下 λ_eff = λ(1−π_K)） | ch07 |\n| ρᵢ | rho-i | 第 i 站／第 i 台裝置的使用率，ρᵢ = X·Dᵢ（ch02）或 λᵢ/μᵢ（網路） | ch02 |\n\n## 數量：人數 N、時間 T、平穩機率 π\n\n| 符號 | 讀法 | 定義（一句） | 首次出現章 |\n|---|---|---|---|\n| N | — | 系統內人數（隨機變數）：含正在服務與排隊中的全部 | ch03 |\n| N_Q | N-queue | 佇列中人數（隨機變數）：只算等待中、不含服務中，N = N_Q + 服務中個數 | ch02 |\n| S | — | 服務時間（隨機變數）：E[S] = 1/μ | ch03 |\n| T | — | 回應／逗留時間（隨機變數）：到達到離開，含服務，T = T_Q + S | ch03 |\n| T_Q | T-queue | 等待時間（隨機變數）：排隊但尚未開始服務的時間，不含服務 | ch02 |\n| E[N] | — | 系統內平均人數；Little's Law 標準形 E[N] = λE[T] | ch02 |\n| E[N_Q] | — | 佇列中平均人數，E[N_Q] = λE[T_Q] | ch02 |\n| E[T] | — | 平均回應／逗留時間（含服務） | ch01 |\n| E[T_Q] | — | 平均等待時間（不含服務） | ch02 |\n| E[S] | — | 平均服務時間，E[S] = 1/μ | ch01 |\n| E[S²] | — | 服務時間的二階矩；P-K 與殘餘壽命的主角，E[S²] = Var(S) + E[S]² | ch03 |\n| πₙ | pi-n | 平穩機率（stationary probability）：πₙ = P(N = n)，系統長期處於狀態 n 的時間比例 | ch08 |\n| π₀ | pi-zero | 平穩分布裡空系統的機率 P(N = 0)；M/M/1 下 π₀ = 1 − ρ | ch06 |\n| π_K | pi-K | M/M/1/K 的阻塞機率：滿載（N = K）被丟棄的機率，goodput = λ(1−π_K) | ch10 |\n\n## 變異性：C² 與相關量\n\n| 符號 | 讀法 | 定義（一句） | 首次出現章 |\n|---|---|---|---|\n| C² | C-squared | 變異係數平方（squared coefficient of variation, SCV）：C² = Var(X)/E[X]²；刻度：0 確定性、1 指數、>1 叢發 | ch03 |\n| C²ₐ | C-squared-a | 到達間隔的 SCV（arrival），量化「到達的形狀」有多叢發 | ch03 |\n| C²ₛ | C-squared-s | 服務時間的 SCV（service）；P-K 與 Kingman 的變異性槓桿 | ch03 |\n| σ² | sigma-squared | 變異數（variance）：Var(X) = E[X²] − E[X]² | ch03 |\n| σ | sigma | 標準差（standard deviation）：σ = √Var，把單位拉回原刻度 | ch03 |\n| α | alpha | Pareto 分布的尾部指數：α≤2 變異數無限、α≤1 連均值都不存在 | ch15 |\n\n## 結構、網路與其他量\n\n| 符號 | 讀法 | 定義（一句） | 首次出現章 |\n|---|---|---|---|\n| K | — | 系統容量上限（含服務中）：M/M/1/K 滿了就丟，backpressure 的數學 | ch01 |\n| X | — | 吞吐量（throughput）：單位時間完成數；穩態下 X = λ_eff | ch02 |\n| Z | — | 思考時間（think time）：封閉互動系統裡使用者兩次送出之間的停頓 | ch02 |\n| Vᵢ | V-i | 訪問比（visit ratio）：每個 job 一生平均訪問裝置 i 的次數，Vᵢ = Cᵢ/C | ch02 |\n| Dᵢ | D-i | 服務需求（service demand）：一個 job 在裝置 i 消耗的總服務時間，Dᵢ = Vᵢ·E[Sᵢ] | ch02 |\n| N* | N-star | 飽和點／拐點：兩條漸近 bound 的交點 N* = (ΣDᵢ + Z)/D_max | ch02 |\n| P | — | 離散時間 Markov chain 的轉移矩陣，平穩分布 π = πP | ch06 |\n| Q | — | CTMC 的生成元（generator）矩陣，記錄各狀態的轉出速率 | ch07 |\n| G | — | 封閉網路 Gordon–Newell 乘積形式的正規化常數（normalization constant） | ch17 |\n| Wₙ | W-n | Lindley recursion 裡第 n 位的等待時間（Wₙ₊₁ = max(0, Wₙ + Sₙ − Aₙ₊₁)） | ch14 |\n| Aₙ | A-n | 第 n 與第 n+1 位之間的到達間隔（Lindley recursion 用） | ch14 |\n| Hₙ | H-n | 調和數 Hₙ = 1 + 1/2 + … + 1/n；fork-join 扇出 n 路時 E[max] = Hₙ/μ | ch03 |\n| t₉₉ | t-99 | 第 99 百分位回應時間（P99）；M/M/1 下 t₉₉ = ln 100/(μ−λ) ≈ 4.6× 平均 | ch01 |\n| J(τ) | J-tau | **本書自創**：到觀察窗 τ 為止「系統內人數對時間的累積面積」，J(τ) = ∫₀^τ N(t) dt；Little's Law 面積雙算論證的主角 | ch02 |\n\n## 數學運算子與符號\n\n| 符號 | 讀法 | 定義（一句） | 首次出現章 |\n|---|---|---|---|\n| Σ | sigma / sum | 求和；全書最常見於幾何級數 Σρⁿ = 1/(1−ρ) | ch02 |\n| ∫ | integral | 積分；常用於 E[X] = ∫₀^∞ P(X>t) dt（tail 積分求期望） | ch02 |\n| ∞ | infinity | 無限大；積分上限、級數、M/M/∞、重尾的無限變異數 | ch01 |\n| √ | square root | 平方根；標準差 σ = √Var、square-root staffing 的 √a 緩衝 | ch03 |\n| ∈ | belongs to | 屬於：x ∈ A 表示 x 是集合 A 的元素 | ch04 |\n| ∝ | proportional to | 正比於：兩量差一個常數因子 | ch10 |\n| ′ | prime | 撇號：標記變體或反轉鏈的量（如反轉鏈 P′） | ch05 |\n| ∎ | QED | 證明結束標記 | ch04 |\n| ≈ | approximately | 約等於（近似值、back-of-envelope 估計） | ch01 |\n| → | tends to / to | 趨向（ρ → 1）或映射 | ch01 |\n| ⇒ | implies | 推得、所以 | ch01 |\n| ≤ ≥ | ≤ at most / ≥ at least | 小於等於／大於等於（bound、穩定條件） | ch01 |\n| ≠ | not equal | 不等於 | ch03 |\n\n## Kendall 記號 A/S/c/K\n\nKendall 1953 引入的速記，在 ch01 先當地圖語言見面、ch08 正式定義。格式 **A/S/c**，必要時加第四欄 **/K**：\n\n| 欄位 | 意義 | 常見取值 |\n|---|---|---|\n| A | 到達過程（arrival）：到達間隔分布 | M = 指數（Poisson 到達）、D = 確定性、G/GI = 一般分布 |\n| S | 服務時間分布（service） | M = 指數、D = 確定性、G = 一般分布 |\n| c | 伺服器數 | 1、c、∞ |\n| K | 系統容量上限（含服務中），省略即無限 | K（有限）、省略=∞ |\n\n例：M/M/1（指數到達＋指數服務＋單台＋無限容量）、M/M/c、M/M/1/K（有限容量）、M/G/1（一般服務）、G/G/1（兩端都一般）、M/M/c/c（Erlang-B 損失系統）、M/M/∞。\n\n## 與教科書 L/W 記號的對照\n\n本書內文一律用 E[N]/E[T]，因為 N 和 T 是隨機變數、之後要談它們的分布與 tail；L/W 這種「平均值專用名」會讓你誤以為平均就是全部。但你拿本書去對讀 Kleinrock、Harchol-Balter 等經典時會撞上 L/W，這張表幫你即時翻譯（此對照在 ch02 給過一次，這裡再收一次）：\n\n| 本書記號 | 教科書記號 | 讀法 |\n|---|---|---|\n| E[N] | L | 系統內平均 job 數 |\n| E[N_Q] | L_Q（亦寫 Lq） | 佇列中平均 job 數（不含服務中） |\n| E[T] | W | 平均逗留時間（含服務） |\n| E[T_Q] | W_Q（亦寫 Wq） | 平均等待時間（不含服務） |\n\nLittle's Law 在兩套記號下分別寫成 E[N] = λE[T]（本書）與 L = λW（教科書），是同一條定律。\n"}, {"id": "appendix-b-formulas", "file": "appendix-b-formulas.md", "group": "附錄", "title": "附錄 B — 公式總表", "md": "# 附錄 B — 公式總表\n\n這是全書的招牌附錄，但請先讀這段警告再讀表格。**一條沒有適用條件的公式是危險品**——它長得跟正確答案一模一樣，差別只在你不知道它什麼時候在騙你。本書每個公式出場時都附了「什麼假設下成立、哪個假設最常在現實中破掉」，這張表把那些條件收進「精確適用條件」欄，那欄才是本表的靈魂；「公式」欄只是它的標籤。\n\n讀法建議：先看「精確適用條件」確認你的系統符不符合，再抄「公式」。表只收**書中推導過或正式敘述過**的公式（記號依 style-guide：E[N]/E[T] 系統，不用教科書的 L/W；對照表見附錄 A）。同一條公式跨章引用時以首次出現章為準，後續章的兌現在條件欄註明。三位有效數字、數字常數（e ≈ 2.71828、ln 2 ≈ 0.6931、ln 100 ≈ 4.6052）全書統一。\n\n凡是標**近似**的，請當羅盤不當計算機；凡是標**精確**的，也只在條件欄列的假設全成立時精確——條件破一個，精確就退化成「不知道錯多少」。\n\n---\n\n## Part I — 不用機率的鐵律（ch01–02）\n\n這批律只靠「數數字」就成立，不需要任何分布假設——這是它們的威力，也是它們的天花板：它們綁住平均值，但對 tail 一無所知。\n\n| 模型／定律 | 公式 | 精確適用條件（哪些假設、哪個最常破） | 首次出現章 |\n|---|---|---|---|\n| Little's Law | E[N] = λE[T] | 只需兩件事：①**穩定、長期平均存在**（λ 與逗留時間平均收斂、系統不無限堆積）②**邊界一致**（三個量數同一群 job、同一條虛線框）。與分布、相關性、排程、內部結構**全部無關**。**最常破**：非穩態窗口（事故中 backlog 單調上漲，A/C 偏離 1，算出的「平均延遲」沒有指涉物）——算之前先看 A/C。它是守恆律不是效能模型，不告訴你值是多少、tail 多肥。 | ch02 |\n| Little 三邊界恆等式 | E[N_Q] = λE[T_Q]；E[N_服務中] = λE[S] = ρ；E[N] = E[N_Q] + ρ、E[T] = E[T_Q] + E[S] | 同 Little。第三式是 Utilization Law 被 Little 重新發明：使用率＝「平均有多少 job 正在被服務」。c 台時平均忙碌台數 = λE[S]，除以 c 是每台使用率。**最常破**：把 ρ 當成「服務位的 E[T]」之類的時間量——它是比例。 | ch02 |\n| Utilization Law | ρ = X·E[S]（單站 ρᵢ = X·Dᵢ） | 操作分析框架；無分布假設。Dᵢ = Vᵢ·E[Sᵢ] 是每個 job 的固有服務需求（量測性質 Dᵢ = Bᵢ/C）。**最常破**：把當下浮動的使用率當成 Dᵢ——Dᵢ 不隨流量變、才進得了容量試算表。 | ch02 |\n| Response Time Law（封閉系統） | E[T] = N/X − Z | **封閉迴圈**：N 個使用者固定繞圈、think time Z、迴圈內永遠剛好 N 人。它就是 Little 換邊界（完整推導）。**最常破**的不是公式而是誤用情境：固定 VU 的壓測裡 N 被釘死，X 與 E[T] 鎖在蹺蹺板兩端——**這種系統天生不會過載**，跟線上開放流量是兩種動物（見 ch17）。 | ch02 |\n| Forced Flow Law | Xᵢ = Vᵢ·X，其中 Vᵢ = Cᵢ/C | 操作分析；visit ratio Vᵢ 是每個 job 平均訪問裝置 i 的次數。各裝置流量被整體吞吐「強制」鎖定。無分布假設。 | ch02 |\n| Bottleneck bounds（封閉系統） | X ≤ 1/D_max；X ≤ N/(ΣDᵢ + Z)；拐點 N* = (ΣDᵢ + Z)/D_max；E[T] ≥ ΣDᵢ | **工程師的嚴謹**。第一條需 Dᵢ 為常數（不隨負載變）；第二條另需 **job 同一時刻只在一個地方接受服務**（沒有 fork-join 並行——有的話 E[T] ≥ ΣDᵢ 不再成立，見 ch18）。**最常破**：把漸近線當預測——真實曲線在拐點附近是圓角、離 bound 最遠（精確曲線要 MVA，見 ch17）。 | ch02 |\n\n---\n\n## Part II — 機率工具（ch03–06）\n\n這批不是「佇列公式」而是後面全書的引擎與量尺，列出書中當主力工具反覆使用的幾條。\n\n| 工具 | 公式 | 精確適用條件（哪些假設、哪個最常破） | 首次出現章 |\n|---|---|---|---|\n| 變異係數平方（SCV） | C² = Var(X)/E[X]² | 任意非負隨機變數（E[X] > 0）。刻度：C²=0 確定性、C²=1 指數、C²>1 叢發。**最常破**：只量平均不量 C²——它是後面 P-K／Kingman 的主角，平均值看不見它。 | ch03 |\n| 幾何級數與微分技巧 | Σₙ ρⁿ = 1/(1−ρ)、Σₙ n·ρⁿ = ρ/(1−ρ)² | **需要 \\|ρ\\| < 1**（級數收斂）；推 πₙ 正規化與 E[N] 的引擎。**最常破**：ρ ≥ 1 時硬套——級數發散，對應佇列不穩態。 | ch03 |\n| Tail 積分求期望 | E[X] = ∫₀^∞ P(X > t) dt | 非負隨機變數。全書求期望的通用後門。 | ch03 |\n| Markov／Chebyshev 不等式 | P(X ≥ a) ≤ E[X]/a；P(\\|X−μ\\| ≥ kσ) ≤ 1/k² | Markov 需 X ≥ 0；Chebyshev 需變異數有限。**用途**：平均值對 P99 到底承諾了多少（答案：很少）。**最常破**：重尾下變異數無限，Chebyshev 直接失效（見 ch15）。 | ch03 |\n| 指數分布無記憶性 | P(S > t+s \\| S > s) = P(S > t)；連續分布中唯一 | 化簡推導的武器；殘餘壽命＝原分布。**最常破**：服務時間常常不是指數（叢發或重尾），用無記憶性化簡會錯（見 ch12/15）。到達間隔較常像（ch05 解釋為什麼）。 | ch04 |\n| 競賽引理 | min(X₁,…,Xₖ) ~ Exp(Σλᵢ)；P(Xᵢ 最先) = λᵢ/Σλⱼ；勝者身分與競賽時長獨立 | 各 Xᵢ ~ Exp(λᵢ) 且互相獨立。CTMC 的引擎、fork-join E[max] 的零件。**最常破**：非指數或相關時三條全垮。 | ch04 |\n| Poisson 疊加／分流 | 疊加：Σ 獨立 Poisson(λᵢ) ~ Poisson(Σλᵢ)；分流：機率 p 抽出的子流 ~ Poisson(pλ)，且與補流獨立 | 各流獨立 Poisson；分流是獨立硬幣。**最常破**：上游有重試迴圈、批次、行為相關時匯流不再 Poisson（Palm–Khintchine 的邊界，見 ch16 feedback）。 | ch05 |\n| 平穩分布 | π = πP（離散）；解法＝代入消去解線性方程組＋正規化 | 有限、不可約、非週期 chain：存在、唯一、收斂（工程師嚴謹）。**最常破**：週期性（振盪不收斂但 π 仍存在）或可約（多個平穩分布）。 | ch06 |\n\n---\n\n## Part III — 生滅與經典模型（ch07–11）\n\n| 模型／定律 | 公式 | 精確適用條件（哪些假設、哪個最常破） | 首次出現章 |\n|---|---|---|---|\n| 生滅過程通解 | πₙ = π₀·Π_{i=0}^{n−1} (λᵢ/μᵢ₊₁)；π₀ = 1/S，S ≡ Σ_{n=0}^{∞} Π_{i=0}^{n−1} (λᵢ/μᵢ₊₁) | ①生滅結構（只有 ±1 轉移）②所有速率為正（不可約、非爆炸）③**穩態存在需 S < ∞**。**最常破**：通解形式上永遠寫得出來，但 S = ∞ 時硬正規化得到的「π」是垃圾——穩態根本不存在，模擬會看到佇列單調竄高、與「解」毫無關係。寫完通解**必驗級數收斂**。 | ch07 |\n| M/M/1 平穩分布 | πₙ = (1−ρ)ρⁿ，ρ = λ/μ | 假設清單：①到達 Poisson(λ) ②服務 i.i.d. Exp(μ)、與到達獨立 ③c=1 ④K=∞（永不丟棄）⑤N=∞（開放）⑥FCFS ⑦**ρ < 1**。**最常破**：服務 Exp（C²ₛ=1）——服務固定（M/D/1）時真實等待是本表的一半、服務重尾時低估到不知幾倍（見 ch12/15）。服務時間沒有極限定理護航，**永遠要量 C²ₛ**。 | ch08 |\n| M/M/1 平均量 | E[N] = ρ/(1−ρ)；E[T] = 1/(μ−λ) = E[S]/(1−ρ)；E[T_Q] = ρ/(μ−λ)；E[N_Q] = ρ²/(1−ρ) | 同 M/M/1 全套假設。E[T]/E[T_Q] 由 Little 從 E[N]/E[N_Q] 換來。**最常破**：同上，C²ₛ ≠ 1。 | ch08 |\n| M/M/1 回應時間分布 | T ~ Exp(μ−λ)：P(T > t) = e^(−(μ−λ)t) | 額外需 **FCFS**（換成 PS／LCFS 此分布變形——平均 E[T] 仍對，但分布與 tail 不對）。**最常破**：拿這個分布算非 FCFS 系統的 P99。 | ch08 |\n| M/M/1 的 P99 | t₉₉ = ln 100/(μ−λ)；一般 t_p = ln(1/(1−p))/(μ−λ)；「P99 ≈ 4.6× 平均」 | 需回應時間分布成立（M/M/1 + FCFS）。「4.6×」＝ ln 100 ≈ 4.6052。**最常破**：服務非指數時整條規則死掉——重尾下 P99 與平均脫鉤、倍數離譜（見 ch15，且 4.6 與 ch15 的每九倍率 4.64 是撞名，意義完全不同）。 | ch08 |\n| 使用率階梯 | E[T] = E[S]/(1−ρ)：ρ=0.5→0.2 s、0.8→0.5 s、0.9→1.0 s、0.95→2.0 s、0.99→10 s | M/M/1（E[S] = 100 ms 基準）。hockey stick 的數值兌現。**最常破**：有牆的系統（有限 buffer）——延遲會飽和而非爆炸（見 ch10）。 | ch08 |\n| PASTA | 到達者抵達瞬間（不含自己）看到狀態 n 的長期比例 = 時間平均 πₙ | 需 ①**到達是 Poisson** ②**lack of anticipation**（系統現在不洩漏到達流的未來）。**最常破**：到達不是 Poisson——等距／整形後的近等距流、有限母體（在場人數越多到達越少）、balking 放行後的流，到達者看到的都 ≠ 時間平均。用前先問：到達 Poisson 嗎？到達率會不會看狀態？ | ch08 |\n| M/M/c 平穩分布 | n ≤ c：πₙ = π₀·aⁿ/n!；n ≥ c：πₙ = π₀·(aᶜ/c!)·ρⁿ⁻ᶜ（a = λ/μ、ρ = λ/(cμ) = a/c） | 假設同 M/M/1 但 **c 台共用單一佇列**、μₙ = min(n,c)·μ、ρ < 1。**最常破**：「有 c 台機器」≠ M/M/c——hash/sticky 分流其實是 c 個獨立 M/M/1，同硬體 E[T] 差約 2.9 倍。先看路由：拉式（consumer 主動領）≈ 共用佇列；推式 hash ≈ 獨立佇列。 | ch09 |\n| Erlang-C（延遲機率） | C(c, a) = [aᶜ/c!·1/(1−ρ)] / [Σ_{n=0}^{c−1} aⁿ/n! + aᶜ/c!·1/(1−ρ)] | M/M/c（共用佇列、ρ < 1）。**最常破**：對服務分布**敏感**——等待大致按 (1+C²ₛ)/2 縮放，C²ₛ = 10 時低估約 5.5 倍。口訣：**loss 看均值就夠，delay 要看變異數**（與下面 Erlang-B 最容易記反）。 | ch09 |\n| M/M/c 平均等待 | E[T_Q] = C(c, a)·1/(cμ−λ) | 同 Erlang-C。讀法：等的機率 × 等的人平均等多久。基準 c=4、a=3.2：C ≈ 0.596、E[T_Q] ≈ 74.6 ms、E[T] ≈ 175 ms。 | ch09 |\n| Erlang-B（損失機率）遞迴 | I(0)=1、I(c)=1+(c/a)·I(c−1)，B(c,a)=1/I(c)；等價 B(c,a) = (aᶜ/c!)/Σ_{k=0}^{c} aᵏ/k! | M/M/c/c **損失系統**（沒位子就走、不排隊）。對任意 a 都有定義（容量有限）。**關鍵性質**：對服務分布 **insensitive**——只依賴 a = λE[S]，與 C²ₛ 無關（ch18 的 BCMP insensitivity 兌現）。**最常破**：跟 Erlang-C 記反（delay 敏感、loss 不敏感）。 | ch09 |\n| M/M/∞ | πₙ = e⁻ᵃ·aⁿ/n!，即 N ~ Poisson(a) | 無限伺服器、無排隊（T_Q ≡ 0）。對服務分布 insensitive。是 √a staffing 的理論基礎（Var(N) = a）。 | ch09 |\n| 平方根 staffing | c ≈ a + β·√a（β 約在 1 上下） | QED regime：c 與 λ 一起放大、保持 (1−ρ)√c → β 時 P(等待) 收斂到只依賴 β 的極限（β=1 約 0.22）。直覺推導，嚴格版 Halfin–Whitt 指路。**最常破**：非 Poisson 到達或非指數服務、批次到達、重尾——√a 緩衝的論證失效。 | ch09 |\n| M/M/1/K 平穩分布 | πₙ = (1−ρ)·ρⁿ/(1−ρ^{K+1})，n = 0…K（ρ ≠ 1）；ρ = 1 時 πₙ = 1/(K+1) | 有限容量 K（牆）。**ρ 可以 > 1**——這是與 M/M/1 的關鍵差別（牆吸收了不穩定）。**最常破**：拿無限 buffer 公式算有牆的系統，或只報漂亮的 E[T] 不報 π_K。監控出現 429/503/drop 計數那刻，無限 buffer 公式出局。 | ch10 |\n| Blocking 機率與 goodput | P(到達被擋) = π_K（精確）；λ_eff = λ·(1−π_K) | 需 Poisson 到達（用 PASTA：到達看到滿就被擋）。**最常破**：Little's Law 用 λ 不用 λ_eff——λ=12 過載時用 λ 算 E[T] 低估 19%，越過載騙得越凶。進 Little 的 λ 是「真的進了系統」的流量。 | ch10 |\n| 過載 blocking 地板 | K→∞ 時 π_K → 1 − 1/ρ（ρ > 1） | 流量守恆的必然：λ=12、μ=10 時至少 1−1/1.2 ≈ 16.7% 必被丟。**最常破**：以為「buffer 開大一點」能救過載——K→∞ 不消滅損失，只把它換成延遲（bufferbloat）。 | ch10 |\n| 串聯（tandem）乘積形式 | π(n₁, n₂) = π₁(n₁)·π₂(n₂) = (1−ρ₁)ρ₁^{n₁}·(1−ρ₂)ρ₂^{n₂}，ρᵢ = λ/μᵢ | 各站 M/M/1（或 M/M/c/∞）、指數服務、**無 feedback**、穩態、各站 ρᵢ < 1。靠 Burke 定理（下行）。**最常破**：有 feedback 時內部流不再 Poisson，各站當獨立 M/M/1 算會系統性低估（見 ch16）。 | ch11 |\n| Burke 定理 | ①離開過程是速率 λ 的 Poisson 過程 ②任一時刻 t 的狀態 N(t) 與 t 之前的全部離開歷史獨立 | M/M/1、M/M/c、M/M/∞，λ < cμ，**跑在穩態**。**最常破**：用在暫態——清積壓時上游以滿速 μ 往下灌，「下游輸入 = λ」的容量帳當場作廢（排空期間下游容量帳要用上游的 **μ** 不是 λ）。次常破：用在 M/G/1（需指數服務，否則輸出非 Poisson）；把第 2 句讀成「與未來輸出也獨立」（只與過去獨立）。 | ch11 |\n\n---\n\n## Part IV — 超越指數（ch12–15）\n\n放掉指數假設，變異數的帳單登場。這批公式的條件欄特別重要——它們正是「指數世界的公式什麼時候騙你」的答案。\n\n| 模型／定律 | 公式 | 精確適用條件（哪些假設、哪個最常破） | 首次出現章 |\n|---|---|---|---|\n| 殘餘服務時間（inspection paradox） | E[殘餘 \\| 服務中] = E[S²]/(2E[S]) = E[S]·(1+C²ₛ)/2；時間平均殘餘 W₀ = λE[S²]/2 | 服務時間 i.i.d.。「你總是撞上長工作」的數學——被長度加權。**最常破**：誤以為撞上的工作平均長度＝E[S]（其實被 (1+C²ₛ)/2 放大；重尾下放大到極端，見 ch15）。 | ch12 |\n| Pollaczek–Khinchine 平均等待 | E[T_Q] = λE[S²]/(2(1−ρ)) = ρ/(1−ρ)·E[S]·(1+C²ₛ)/2 | M/G/1：①Poisson 到達（PASTA 那步）②服務 i.i.d.、與到達獨立、**不看長度出工**（FCFS 或非搶占同類家族）③ρ < 1、穩態 ④**E[S²] < ∞**。基準三連比 C²ₛ ∈ {0,1,10} → 0.2/0.4/2.2 s；M/D/1 等待是 M/M/1 一半。**最常破**：只量平均服務時間就建模——C²ₛ = 10 的現實當成指數（C²ₛ=1）會低估 5.5 倍。次常破：E[S²] = ∞（重尾，見 ch15）時公式回答「∞」，不是壞掉是真警報。到達非 Poisson 時 P-K 沒有 C²ₐ 旋鈕、會錯（改用 ch14 Kingman）。 | ch12 |\n| Kleinrock 守恆律 | Σᵢ ρᵢ·E[T_Q,i] = ρ·W₀/(1−ρ)，W₀ = λE[S²]/2 | M/G/1、**非搶占、work-conserving、穩態**。右邊**不含任何紀律資訊**（基準下永遠 = 0.52 s）。守恆的是 **ρ 加權**等待，不是人頭加權——所以人頭平均可以動（短工作優先就是這個套利）。**最常破**：以為「換紀律能讓大家都變快」——總帳一毛不差，有人在帳外付錢。搶占會打破 work-conserving 家族的前提。 | ch13 |\n| 非搶占優先權等待 | E[T_Q,i] = W₀/((1−σᵢ₋₁)(1−σᵢ))，σᵢ ≔ ρ₁+…+ρᵢ（兩類：E[T_Q,1]=W₀/(1−ρ₁)、E[T_Q,2]=W₀/((1−ρ₁)(1−ρ₁−ρ₂))） | M/G/1、各類 Poisson、**非搶占**、類內不看長度、work-conserving、ρ < 1。SJF 是「類別＝尺寸」連續極限 E[T_Q(x)] = W₀/(1−ρ(x))²（敘述層級）。**最常破**：系統有隱藏優先權（worker 偷挑短訊息）卻拿 P-K 套——實際 E[T_Q] 與 P-K 可差 2 倍以上。 | ch13 |\n| PS 回應時間與 insensitivity | E[T(x)] = x/(1−ρ)；E[T] = E[S]/(1−ρ) | M/G/1-PS（processor sharing）、work-conserving、ρ < 1。**insensitivity**：E[T] 只依賴 E[S]，C²ₛ 完全 drop out。**最常破**：①只保 N 的分布與**平均** T，不保 T 的**分布／tail**——M/G/1-PS 的 P99 仍依賴 C²ₛ（見 ch15）②insensitivity 屬於 PS/IS/LCFS-PR，**不屬於 FCFS**——你的 worker pool 是 FCFS，C²ₛ=10 時照樣低估 5.5 倍。 | ch13 |\n| cμ rule | 非搶占下按 cᵢμᵢ（成本率 × 服務率）遞減順序服務，最小化平均成本 | M/G/1、非搶占（敘述層級）。SJF 是 cᵢ 一致時的特例。 | ch13 |\n| Lindley recursion | W_{n+1} = max(0, W_n + S_n − A_{n+1}) | **精確、無分布假設**（對任意樣本序列成立）。只需：單伺服器、FCFS、work-conserving、buffer 無限。它就是 ch19 模擬 G/G/1 的核心迴圈。**最常破**：幾乎不破（這是它珍貴的原因）——但它給的是逐一 job 的遞迴，不直接給穩態平均，要靠模擬統計。 | ch14 |\n| Kingman 近似（VUT 公式） | E[T_Q] ≈ ρ/(1−ρ)·(C²ₐ+C²ₛ)/2·E[S]；上界版 E[T_Q] ≤ λ(σ²ₐ+σ²ₛ)/(2(1−ρ)) | G/G/1 的**近似**（V × U × T：變異 × 使用率 × 時間尺度），ρ→1 時漸準。兩個**精確特例**：C²ₐ=C²ₛ=1（M/M/1）、C²ₐ=1 任意 C²ₛ（即 P-K）。需二階矩有限。**最常破**：①固定速率壓測餵假 C²ₐ≈0——量到 0.2 s，真實生產（C²ₐ=2）是 0.6 s、低估 3 倍 ②相關到達——C²ₐ 抓不到時間相關（cron 批次、retry 迴圈），低估可達一個數量級 ③低 ρ（< 0.5）高估約 20% ④重尾（C² 無定義，見 ch15）。 | ch14 |\n| Allen–Cunneen（G/G/c） | E[T_Q] ≈ [ErlangC(c,a)/(cμ−λ)]·(C²ₐ+C²ₛ)/2 | G/G/c 近似——比 c=1 版更弱，c > 1 無 heavy-traffic 保證。當羅盤不當計算機。繼承 Kingman 三個弱區。 | ch14 |\n| Pareto 矩存在性 | P(S > t) = (k/t)^α（t ≥ k）；E[S^m] = αk^m/(α−m) 當 m < α，否則 = ∞ | Pareto 尾。**臨界值**：α ≤ 1 → E[S] = ∞（任何 λ > 0 都不穩定）；1 < α ≤ 2 → E[S] 有限但 **Var = ∞ → C²ₛ 無定義 → P-K = ∞**；α > 2 → 前兩階矩有限。**最常破**：用有限樣本估 C²ₛ 然後套 ch12/14——估計值永遠偏低且隨視窗變長一路爬，你以為 C²ₛ=12 其實無上界。 | ch15 |\n| 重尾下的失效 | M/G/1 FCFS：E[T_Q] = ∞（1<α≤2，ρ<1）；PS：E[T] = E[S]/(1−ρ) 不受影響；P(撞上 > t) = (k/t)^{α−1} | α ≤ 2。系統仍**穩定**（ρ < 1、佇列會清空）但 E[T_Q] 的矩發散——「穩定」≠「平均有限」。救贖：PS/SRPT 在重尾下壓倒性勝出（只需 E[S] < ∞）。**最常破**：拿輕尾「P99 ≈ 4.6× 平均」（ch08）外推重尾分位數——每多一個 9 再乘約 4.64 倍（Pareto α=1.5），錯得離譜。 | ch15 |\n\n---\n\n## Part V — 佇列網路（ch16–18）\n\n| 模型／定律 | 公式 | 精確適用條件（哪些假設、哪個最常破） | 首次出現章 |\n|---|---|---|---|\n| Traffic equations（流量方程） | λᵢ = rᵢ + Σⱼ λⱼ·Pⱼᵢ（i = 1…k），rᵢ 為站 i 的外部到達率、λ₀ = Σᵢ rᵢ | **流量守恆，不是機率敘述**（不需 Poisson／指數）——同 ch02 操作律家族。解的存在唯一需網路**開放**（工作以機率 1 最終離開）。**最常破**：state-dependent routing（如 join-shortest-queue）違反「機率路由」前提；有限 buffer／load shedding 也讓它失效。 | ch16 |\n| Jackson 定理（乘積形式） | π(n₁,…,n_k) = Πᵢ πᵢ(nᵢ)，πᵢ(nᵢ) = (1−ρᵢ)ρᵢ^{nᵢ}，ρᵢ = λᵢ/μᵢ | 開放 Jackson 網路：①外部到達 Poisson ②指數服務 ③機率路由 ④FCFS、buffer 無限 ⑤開放、各站 ρᵢ < 1、穩態。基準 retry 例：p=0.2→ρ₂=0.9375、E[T]=3.0 s；p=0.3→ρ₂>1 爆炸。**驚奇**：有 feedback 時內部流**不是 Poisson**（Burke 失效）但乘積形式仍真——**獨立性是穩態快照的性質，不是過程的性質**。**最常破**：把它讀成「各站輸入是 Poisson」或「各站為過程獨立」——只有同時刻快照獨立；跨站時間相關（同一 burst 連環打擊、兩站同時違約）要模擬。priority／blocking／fork-join／state-dependent routing 直接打破乘積形式。 | ch16 |\n| MVA 遞迴 | E[Tᵢ(N)] = E[Sᵢ]·(1 + E[Nᵢ(N−1)])；X(N) = N/(Z + Σᵢ Vᵢ·E[Tᵢ(N)])；E[Nᵢ(N)] = X(N)·Vᵢ·E[Tᵢ(N)]；起始 E[Nᵢ(0)] = 0 | 封閉、乘積形式（Gordon–Newell）網路，固定母體 N。式(1)靠 arrival theorem + 無記憶性，**需 FCFS + 指數服務**（非指數時退化成近似、無誤差保證）。式(1)不可套在 delay（think）站（它無排隊、E[Tᵢ] = Z 恆成立）。**最常破**：①非指數服務的 FCFS 站 ②Dᵢ 隨 N 變（contention／GC／cache）——飽和曲線變樂觀。直接算 normalization constant G 會狀態爆炸，MVA 正是繞開它的法門。 | ch17 |\n| Arrival theorem | 在 N 客戶的乘積形式封閉網路，到達任一站者（不含自己）看到的狀態分布＝同網路 N−1 客戶的穩態分布 | 乘積形式網路（Gordon–Newell）；是**定理不是恆等式**（需證明）。「你遇不到自己。」與 PASTA 對照：開放+Poisson 看到同系統（PASTA）、封閉看到 N−1 系統（arrival theorem）；N→∞ 兩者握手。**最常破**：priority／blocking／fork-join／FCFS+非指數時失效。 | ch17 |\n| Fork-join 理想 E[max] | E[max] = H_n/μ，H_n = 1 + 1/2 + ⋯ + 1/n（n=2: 1.5/μ；n=10: 2.929/μ） | **工程師的嚴謹**。三個條件：①**無排隊**（n 路立即服務、只有服務時間 matter）②n 路獨立 ③各路 Exp(μ)。**三個都會在現實中破**：有排隊→把 μ 換成 (μ−λ)；共用到達流（相關）→獨立近似偏保守（高估）、但共用下游資源時方向可能反轉；重尾服務→max 被最重那路主宰、H_n 的對數仁慈消失、要靠模擬。 | ch18 |\n| BCMP 乘積形式 | π(n₁,…,n_k) = (1/G(N))·Πᵢ fᵢ(nᵢ)，xᵢ = Vᵢ/μᵢ、G(N) 為正規化常數 | 四種 station 類型：①FCFS（**鎖死指數服務**、同站各類共用 μ）②PS ③IS（infinite-server）④LCFS-PR——後三型服務分布可一般（Cox）。需機率路由、外部 Poisson。**最常破**：priority（跨類）、有限 buffer／blocking、fork-join、批次、retry 相關性——任一出現就打破乘積形式（純損失網路是 blocking 的例外）。 | ch18 |\n| Insensitivity | PS/IS/LCFS-PR 站的佇列長度穩態分布只透過 E[S] 依賴服務分布（改分布形狀、保 E[S]，π 不變） | **只屬於 PS/IS/LCFS-PR，不屬於 FCFS**。兌現 ch09 Erlang-B/M/M/∞、ch13 PS。**最常破**：①只涵蓋 N 的分布與**平均** T（經 Little），**不涵蓋 T 的分布／tail**——M/G/1-PS 的 P99 仍看 C²ₛ ②誤用在 FCFS worker pool（C²ₛ=10 時低估 5.5 倍）。 | ch18 |\n| 分解近似（QNA）C² 傳播 | 合流：λ=Σλⱼ、C²ₐ ≈ 加權混合；分流：λ′=pλ、C²′=p·C²+(1−p)；離開：C²_d ≈ ρ²·C²ₛ+(1−ρ²)·C²ₐ | 每站當獨立 G/G/1、傳兩個數（λ 精確、C² 近似）。分流規則精確（renewal 輸入 + Bernoulli）；合流／離開是近似（無誤差界）。全指數時退回 Jackson。**最常破**：C² 只是一個數（二階矩），抓不到時間相關（ch14）；深 feedback 迴圈讓同一 job 多次造訪而耦合；重尾徹底摧毀二階矩方法（ch15）。 | ch18 |\n\n---\n\n## 決策速查：什麼時候用哪個\n\n這節把各章的決策框架壓成一張流程。核心問句永遠是「我量過 C²ₐ 和 C²ₛ 了嗎」——沒量過，下面任何選擇都是猜。\n\n**先問三件事**：到達是不是 Poisson（C²ₐ ≈ 1）？服務是不是指數（C²ₛ ≈ 1）？系統是開放還封閉？\n\n```text\n            ┌─ 只要平均量的關係、不要分布？\n            │     → Little's Law / 操作律（ch02）。零分布假設，但只給平均、不給 tail。\n            │\n            ├─ 開放、單站、到達 Poisson？\n            │     ├─ 服務也指數（C²ₛ≈1）────────→ M/M/1（ch08）。精確、好算。\n            │     │      多伺服器共用佇列 ──────→ M/M/c / Erlang-C（ch09）。\n            │     │      有牆（有限 buffer）─────→ M/M/1/K（ch10）。要報 loss。\n            │     ├─ 服務非指數、C²ₛ 已量 ──────→ P-K（ch12）。精確（需 E[S²]<∞）。\n            │     └─ 連到達都非 Poisson（C²ₐ≠1）→ Kingman / VUT（ch14）。近似，ρ→1 較準。\n            │\n            ├─ 多站網路、機率路由、無 fork-join/priority/blocking？\n            │     ├─ 開放 ─────→ Jackson（ch16）：各站當 M/M/1，乘積形式。\n            │     └─ 封閉 ─────→ MVA（ch17）：固定母體，遞迴手算。\n            │\n            └─ 以下任一成立 → 公式到頭了，模擬（ch19）：\n                  • 重尾（C² 無定義或矩發散，ch15）\n                  • fork-join / 同步 / 相關 retry（ch18）\n                  • 時間相關到達（C²ₐ 抓不到，ch14）\n                  • 要 tail 分布而非平均（Little/Kingman 只給平均）\n```\n\n**口袋判準**：\n\n- **M/M/1 夠用**，當且僅當：到達近 Poisson、服務近指數（量過 C²ₛ ≈ 1）、單一共用佇列、ρ 不貼近 1、你只要平均與「指數型」P99。多數「先估個數量級」的場合它夠了。\n- **需要 P-K**：服務明顯非指數（你量到 C²ₛ 遠離 1），但到達仍是 Poisson。P-K 在這個條件下是**精確**的，不是近似——別退而求其次用 Kingman。前提：E[S²] 有限（不是重尾）。\n- **需要 Kingman/VUT**：到達也非 Poisson（叢發或被整形）。這是工程現場最常見的情況，也是 back-of-envelope 神器。記住它是**近似**：低 ρ 高估、重尾與相關到達嚴重低估。它的價值在那個 V × U × T 的世界觀——告訴你「砍 C² 還是降 ρ」哪個槓桿划算。\n- **只能模擬**：重尾（矩發散，公式回答 ∞ 或 C² 無定義）、fork-join／同步（Promise.all 的 tail）、時間相關到達（cron 批次、retry 迴圈——C²ₐ 這個單一數字抓不到「什麼時候叢發」）、或你要的是完整 tail 分布而不是平均。模擬會騙人（ch19 的四大陷阱：warmup 污染、輸出自相關、種子紀律、稀有事件），所以模擬前先用 M/M/1 ground truth 校準你的程式、輸出永遠帶區間。\n\n**如果只帶走三個公式**（ch21）：Little（E[N] = λE[T]，萬用驗算器）、VUT（Kingman/P-K 一家，變異數的帳單）、Erlang-C（多伺服器 staffing）。其餘都是這三條在特定條件下的特例或推廣——而每一條的「特定條件」，就在上面那張表的第三欄。\n"}, {"id": "appendix-c-glossary", "file": "appendix-c-glossary.md", "group": "附錄", "title": "附錄 C — 術語表", "md": "# 附錄 C — 術語表\n\n這張表收錄全書正式引入的技術名詞——每一條的「一句話定義」都是**本書的講法**（這本書當初怎麼向你解釋它），不是字典定義。用途是查找：按英文字母 A–Z 排序，忘了某個詞在哪章登場、或它在本書脈絡下到底指什麼時，從這裡回到正文。「首次出現章」指該詞**第一次以具名概念被引入並使用**的章節（不是路線圖標籤、不是延伸閱讀的書目連結）；少數先在前章被點名、後章才正式下定義的詞，會在最後一段說明，以免你查到的章節與記憶對不上。記號系統見附錄 A、公式與其適用條件見附錄 B。\n\n| English term | 中文 | 一句話定義（本書講法） | 首次出現章 |\n|---|---|---|---|\n| admission control | 准入控制 | 系統內已有 n 件工作時就以遞減機率收下新到達，把「λ 隨擁塞下降」寫進生滅過程，換來無條件的穩定性、帳單從延遲搬到 goodput。 | ch07 |\n| arrival theorem | 到達定理 | 封閉網路裡接替 PASTA 的定理：抵達某站的工作看到的狀態分布，恰是「把自己抽走、剩 N−1 個工作」那個系統的穩態——MVA 遞迴的引擎。 | ch17 |\n| balance equation | 平衡方程 | 平穩分布逐狀態的「機率流量守恆」讀法（流入每個狀態＝流出），在生滅這種一維結構上可爆破成逐邊平衡的 local balance。 | ch06 |\n| balking | 望之卻步 | 到達者看到系統內有 n 個工作後才決定要不要加入，建模成狀態相依的到達率 λₙ。 | ch10 |\n| batch means | 批次平均 | 把一條長軌跡切成幾個大批次、每批取平均當近似獨立樣本做信賴區間——對付輸出自相關讓樸素 CI 過窄的解藥。 | ch19 |\n| BCMP theorem | BCMP 定理 | 把乘積形式推到極限的定理：精確劃出哪四種 station 型式與服務分布／紀律組合仍保乘積形式——product form 的邊界座標。 | ch18 |\n| birth-death process | 生滅過程 | 狀態排成一條整數軸、每步只能走到隔壁（生＝+1、滅＝−1）的 CTMC，是 M/M/* 系列模型共用的舞台。 | ch07 |\n| blocking probability | 阻塞機率 | 有限容量系統裡到達者撞上「系統已滿」而被拒的長期比例，由 PASTA 等於穩態 π_K。 | ch10 |\n| bottleneck analysis | 瓶頸分析 | 不解任何機率模型，只靠「使用率≤1」與 Little's Law 就推出吞吐天花板 X≤1/D_max、延遲地板 E[T]≥ΣDᵢ 與排隊拐點 N* 的漸近界法。 | ch02 |\n| Bounded Pareto | 有界 Pareto | 在上界處截斷的 Pareto——承認現實一定有最大值，但只要上界夠大，行為仍像無界重尾。 | ch15 |\n| Burke's theorem | Burke 定理 | M/M/c 穩態的輸出流仍是 Poisson(λ)，且當下狀態與過去的離開歷史獨立——「剛吐出一串 job 不代表現在比較空」，靠時間反轉證明。 | ch11 |\n| busy period | 忙期 | 從一件工作打破空系統、到系統再次清空為止的一整段忙碌時間。 | ch12 |\n| circuit breaker | 斷路器 | closed／open／half-open 三狀態的故障保護器，本書拿它當第一個 Markov chain 範例：你會畫的狀態圖，加上箭頭機率與線性方程組，就能回答「長期斷路時間佔比」。 | ch06 |\n| closed network | 封閉網路 | 工作在固定母體內循環、沒有外部到達的網路（固定 worker 池、connection pool、固定 VU 壓測）——天生自我節流。 | ch17 |\n| competition lemma | 競賽引理 | 多條獨立指數碼錶同時起跑，最先響的時刻仍是指數（速率相加）、哪條先響的機率正比於其速率、且勝者身分與競賽時長獨立——CTMC 的組裝引擎。 | ch04 |\n| continuous batching | 連續批處理 | 每個 token 步重組批次、完成者立即讓位、新請求隨時插隊進批的 LLM serving 排程，是本書排程工具的直接應用場。 | ch20 |\n| coordinated omission | 協同遺漏 | 固定 VU 的封閉迴圈壓測在系統變慢時自動少送請求，於是 tail latency 被系統性地藏起來、量測比生產樂觀。 | ch19 |\n| CTMC | 連續時間馬可夫鏈 | 每進一個狀態就停留指數時間、再按競賽引理跳轉的隨機過程——把 ch04 的指數競賽與 ch06 的流量守恆焊成一台機器。 | ch07 |\n| C² (SCV) | 變異係數平方 | 無因次的標準化變異數 C²=Var/E²，本書的計價單位：C²=0 確定性、C²=1 指數（純隨機基準線）、C²>1 叢發。 | ch03 |\n| decomposition approximation (QNA) | 分解近似 | 把網路每站當成獨立 G/G/1、只在站間傳播流量 λ 與變異性 C²ₐ／C²ₛ、逐站套 Kingman 的工程近似（Whitt 的 QNA 是其代表）。 | ch18 |\n| DES | 事件驅動模擬 | 模擬時鐘直接跳到下一個事件、狀態只在事件處改變的模擬骨架——本書所有模擬都是這個骨架換零件。 | ch08 |\n| detailed balance | 詳細平衡 | 穩態下每一對狀態之間 πᵢq(i→j)=πⱼq(j→i)，逐邊平衡而非只是總平衡；可逆性的等價條件，也是「先猜 π 再驗證」的實用招式。 | ch11 |\n| effective arrival rate (λ_eff) | 有效到達率 | 扣掉被拒收後真正進入系統的流量 λ_eff=λ(1−π_K)，是 goodput 帳的起點。 | ch10 |\n| embedded chain | 嵌入鏈 | 只在工作離開的瞬間觀察系統、那一刻構成的離散時間 Markov chain——Kendall 解 M/G/1 的另一條路（本書改走 mean-value 路線）。 | ch12 |\n| ergodicity | 遍歷性 | 有限不可約非週期鏈的單一軌跡時間平均收斂到 π 期望——把監控量測升格成對穩態的無偏估計，也是模擬的理論執照。 | ch06 |\n| Erlang-A | Erlang-A | 多伺服器又允許客戶等不耐而放棄的模型（M/M/c+M），給 timeout 一個數學身分；放棄是天然洩壓閥，使系統對任何負載都穩定。 | ch10 |\n| Erlang-B | Erlang-B | M/M/c/c 損失系統裡到達者沒位子被擋掉的機率，靠手算友善的遞迴算，且對服務分布不敏感——Erlang 在哥本哈根電話機房的原始公式。 | ch09 |\n| Erlang-C | Erlang-C | M/M/c 系統裡到達者得排隊（沒有空閒伺服器）的機率，是池化與 staffing 計算的核心量。 | ch09 |\n| exponential backoff | 指數退避 | 重試間隔 2ⁿ 倍增的確定性排程——本書先拆掉它與指數「分布」的命名撞車誤會，後在 retry storm 裡當降低 feedback 增益的防禦。 | ch04 |\n| FCFS | 先到先服務 | 完全按到達順序出工的非搶占紀律；在「不看長度」家族裡等待變異最小，但在 slowdown 尺度上對短工作最殘忍。 | ch08 |\n| forced flow law | 強制流量定律 | 各資源的流量被整體吞吐強制鎖定 Xᵢ=Vᵢ·X，把「每站各自的 RPS」綁回系統級吞吐與訪問比。 | ch02 |\n| fork-join | fork-join | 一支工作扇出成 n 份並行、join 點要等全部完成的結構（Promise.all／scatter-gather 的數學身分）；它打破乘積形式，且 tail 由最慢分片決定。 | ch18 |\n| G/G/1 | G/G/1 | 到達間隔與服務時間都是任意分布的單伺服器佇列——全書第一次正面承認「沒有封閉解、公式到頭了」。 | ch14 |\n| goodput | 有用吞吐 | 真正完成且被下游收貨的速率；過載或 timeout 下可能遠小於 throughput，是 admission control 換來穩定性時付出的那一欄帳。 | ch07 |\n| Gordon–Newell theorem | Gordon–Newell 定理 | 封閉網路版的乘積形式定理：乘積形式倖存，但要付 normalization constant G 的買路錢。 | ch17 |\n| hazard rate | 危險率 | 「已撐過 t、下一瞬間結束」的條件速率 h(t)=f(t)/P(X>t)；常數（指數）／遞增 IFR／遞減 DFR 回答「等越久是好消息還是壞消息」。 | ch04 |\n| heavy traffic | 重流量 | ρ→1 的飽和邊緣，等待是一段段長征裡許多小步的累積、由中央極限定理主宰——「飽和邊緣，世界只剩前兩階矩」。 | ch14 |\n| heavy-tailed | 重尾 | 尾巴衰減比指數慢的分布：往右走固定倍數、尾巴才砍固定比例，會以三種方式讓「平均」這個你最信任的數字說謊。 | ch15 |\n| hedged / tied requests | 對沖／綁定請求 | 同一筆請求發給多個副本搶最快回應（對沖：等過某分位才補發；綁定：誰先開工就取消其餘）——拿 fork-join 與重尾框架解讀的 tail 工程手段。 | ch04 |\n| hockey stick | 使用率曲線 | E[T]∝1/(1−ρ) 那條壓測常見的曲棍球曲線：分母是剩餘容量 1−ρ，每砍半延遲翻倍、爆炸是漸近而非踩到開關。 | ch01 |\n| insensitivity | 對服務分布不敏感 | 某些結果（Erlang-B、PS、IS、LCFS-PR）只透過 E[S] 依賴服務分布，直方圖長什麼樣都不影響——一個反覆出現的「為什麼它不在乎變異數」之謎。 | ch09 |\n| inspection paradox | 檢視悖論 | 隨機時刻抵達時總撞上偏長的工作（長工作在時間軸上佔更多位置），使觀察到的工作系統性比 E[S] 長——殘餘服務時間 E[S²]/(2E[S]) 的來源。 | ch12 |\n| Jackson network | Jackson 網路 | 帶 feedback 的開放網路裡，內部流即使不是 Poisson、穩態聯合分布仍逐站相乘、每站彷彿獨立 M/M/1 的驚奇結果。 | ch16 |\n| jitter | 抖動 | 在 backoff 間隔上加的隨機擾動，用來去相關同步重試、壓低到達的 C²ₐ。 | ch04 |\n| Kendall notation | Kendall 記號 | 用 A/S/c/K/… 六欄速記一個佇列模型（到達型式／服務分布／伺服器數／容量／母體／紀律）——全書的模型門牌。 | ch08 |\n| Kingman approximation | Kingman 近似 | G/G/1 等待的萬用上界 E[T_Q]≈(ρ/(1−ρ))·((C²ₐ+C²ₛ)/2)·E[S]，本書的工程總綱。 | ch14 |\n| Kleinrock conservation law | Kleinrock 守恆律 | 在「非搶占、不看長度」的紀律家族裡平均等待全部相同，且 ρ 加權的等待總和是不變量——排程只能重分配等待、不能消滅它。 | ch13 |\n| leaky bucket | 漏桶 | 把叢發到達以固定間隔平穩放出的整形器，效果是把下游看到的 C²ₐ 壓低，代價是流量在整形器排隊。 | ch10 |\n| Lindley recursion | Lindley 遞迴 | 等待時間的精確遞迴 W_{n+1}=max(0, Wₙ+Sₙ−A_{n+1})，可直接餵 production trace，也是 ch19 模擬的核心迴圈。 | ch14 |\n| Little's Law | Little's Law | 平均人數＝到達率×平均停留時間 E[N]=λE[T]；與分布、排程、網路結構全無關——這個「無關」既是它的威力也是它的盲點。 | ch02 |\n| loss system | 損失系統 | 沒位子就走、不排隊的系統（M/M/c/c），Erlang 在電話交換機房的原型問題。 | ch09 |\n| M/G/1 | M/G/1 | Poisson 到達、服務時間任意分布的單伺服器系統；無記憶性一失，佇列長度不再是充分狀態，本書改走 mean-value 路線。 | ch12 |\n| M/M/1 | M/M/1 | Poisson 到達、指數服務、單一伺服器——第一個能完整解出來的佇列，全書後續模型都是它的變奏。 | ch08 |\n| M/M/1/K | M/M/1/K | 容量上限為 K 的單伺服器系統：第一次讓 ρ>1 合法，把 backpressure、load shedding 變成可算的定理。 | ch10 |\n| M/M/c | M/M/c | c 台同質伺服器共用單一佇列的系統，生滅率在 n=c 處轉折，是池化威力與 Erlang 公式的舞台。 | ch09 |\n| M/M/∞ | M/M/∞ | 伺服器多到永不排隊的系統，系統內人數服從 Poisson(a)、永不過載。 | ch09 |\n| Markov chain | 馬可夫鏈 | 「狀態吃掉歷史」的隨機過程：給定現在、過去對未來無額外資訊；建模的真功夫在於把狀態選到足以裝下未來。 | ch06 |\n| mean-field | 平均場 | N→∞ 極限下各佇列趨於漸近獨立、用平均值描述「佇列長度≥k 的比例」演化的近似——power-of-two-choices 的分析框架，也是 retry 雙穩態模型的理想化。 | ch20 |\n| memorylessness | 無記憶性 | 已等過 s 再多等 t 的機率等於剛開始等 t 的機率 P(X>s+t∣X>s)=P(X>t)，連續分布中唯指數獨有——化簡推導的武器。 | ch04 |\n| metastable failure | 準穩定故障 | 同一個外部 λ₀ 下系統存在「健康」與「崩潰」兩個自洽平衡，retry 把有效服務時間膨脹後，一個夠大的擾動就能從好平衡掉進壞平衡。 | ch20 |\n| MVA | 平均值分析 | 不必算 normalization constant G、靠 arrival theorem 加兩次 Little's Law 的遞迴，直接算出封閉網路均值。 | ch17 |\n| normalization constant (G) | 正規化常數 | 封閉網路乘積形式裡讓機率和為 1 的那個常數 G(N)，其計算量正是封閉網路難解、要靠 MVA 繞過的痛點。 | ch17 |\n| offered load | 供給負載 | 無因次的 a=λ/μ，描述工作供給相對服務能力的強度（單伺服器時即 ρ、c 台時 ρ=a/c）。 | ch07 |\n| operational analysis | 操作分析 | 只從可量測的吞吐、忙碌時間、人數出發、不做任何分布假設就成立的恆等式世界觀——每章機率模型的驗算器。 | ch02 |\n| Palm–Khintchine | Palm–Khintchine | 大量互相獨立又個別稀疏的到達流疊加會趨近 Poisson——解釋為什麼真實到達這麼常像 Poisson，以及什麼時候破（相關、重試、批次）。 | ch05 |\n| Pareto distribution | Pareto 分布 | P(S>t)=(k/t)^α 形式的重尾分布，α 決定矩的存在性：α≤2 變異數無限、α≤1 連均值都沒有。 | ch15 |\n| PASTA | PASTA | Poisson 到達看到的狀態分布等於時間平均（Poisson Arrivals See Time Averages）——全書反覆偷用的隱形定理，但「到達看到的≠時間平均」並非顯然。 | ch08 |\n| Poisson process | Poisson 過程 | 描述「到達」的標準隨機過程，有三張等價臉孔（指數間隔／獨立平穩增量＋Poisson 計數／微小區間 o(h) 刻畫），一個拿來模擬、一個算數、一個建模驗證。 | ch05 |\n| Pollaczek–Khinchine formula | Pollaczek–Khinchine 公式 | M/G/1 平均等待 E[T_Q]=λE[S²]/(2(1−ρ))=(ρ/(1−ρ))·E[S]·(1+C²ₛ)/2，把「變異數本身就是延遲來源」定理化。 | ch12 |\n| pooling | 池化 | 多台機器共用一條佇列勝過各自獨立排隊，因為「有人等、卻有機器閒」這種低效狀態在結構上被消滅。 | ch09 |\n| power-of-two-choices | power-of-two-choices | 隨機挑兩台伺服器、派給較短的那條，就能讓佇列長度尾部從幾何級改善成雙指數級——隨機派工的便宜大躍進。 | ch21 |\n| processor sharing (PS) | 處理器共享 | n 個工作同時各以 1/n 速率推進的理想化 time-sharing；平均回應只依賴 E[S]（insensitivity），公平的是比例 slowdown。 | ch13 |\n| product form | 乘積形式 | 網路穩態聯合分布等於各站邊際分布的乘積 π(n₁,…,n_k)=Πᵢπᵢ(nᵢ)——「獨立性是穩態快照的性質，不是過程的性質」。 | ch16 |\n| QED regime | QED 制度 | c≈a+β√a 時等待機率收斂到只依 β 的常數、使用率卻爬到接近 1 的品質效率雙贏區（Halfin–Whitt）。 | ch09 |\n| reneging | 等到一半放棄 | 已排隊的客戶因耐心用盡而退出（timeout 的數學身分），把死亡率改成隨在場人數上升。 | ch10 |\n| residual service time | 殘餘服務時間 | 到達者看到正在服務那件工作的剩餘時間，期望為 E[S²]/(2E[S])=E[S](1+C²ₛ)/2——P-K 公式裡那筆變異數帳的來源。 | ch12 |\n| response time law | 回應時間定律 | 互動式封閉系統的恆等式 E[T]=N/X−Z，把使用者數、吞吐與 think time 綁在一起。 | ch02 |\n| retry storm | retry 風暴 | retry＝feedback、加上 timeout 膨脹有效服務時間，形成自我增強的負載螺旋——metastable failure 的觸發機制。 | ch20 |\n| reversibility | 可逆性 | 穩態 CTMC 倒著放的錄影在統計上與正放無從區分，等價於存在分布滿足 detailed balance——打開網路理論的鑰匙。 | ch11 |\n| routing matrix | 路由矩陣 | 矩陣 P=(Pᵢⱼ)，記「在站 i 完成後以機率 Pᵢⱼ 去站 j」，是把呼叫圖翻成 traffic equations 的輸入。 | ch16 |\n| service demand | 服務需求 | 一個工作在某資源上消耗的總服務時間 Dᵢ=Vᵢ·E[Sᵢ]，量法是「該資源忙碌時間÷系統完成數」——bottleneck 分析的單位。 | ch02 |\n| slowdown | 延遲倍數 | 定義為 T/S（回應時間除以自身服務時間，「我多揹了幾倍」）；PS 下人人相同、FCFS 下短工作揹得最重。 | ch13 |\n| square-root staffing | 平方根法則 | 緩衝開 √a 量級（c≈a+β√a）就夠把等待機率壓在常數的 staffing 法則，把「pool 該開幾台」從經驗值升級成定理。 | ch09 |\n| SRPT | SRPT | 任何時刻優先服務剩餘工作量最小者的搶占排程，最小化每時刻系統內工作數、因而最小化平均回應時間——代價與「餓死長工作」的真相另算。 | ch13 |\n| stationary distribution | 平穩分布 | 滿足 π=πP 的分布，三重身分合一：不動點、極限分布、軌跡上的時間佔比。 | ch06 |\n| superposition | 疊加 | 多條獨立 Poisson 過程合併後仍是 Poisson、速率相加——「多個上游匯流」的保結構運算。 | ch05 |\n| tandem queue | 串聯佇列 | 多個 M/M/1 首尾相接，由 Burke 定理保證中間流仍是 Poisson，使穩態聯合分布呈乘積形式。 | ch11 |\n| thinning | 分流 | 對 Poisson 過程每個到達獨立擲幣決定去向，每條子流仍是 Poisson 且互相獨立——「按機率路由到 shard」的保結構運算。 | ch05 |\n| token bucket | token bucket | 容量 B、補充速率 r 的速率限制器：容忍 B 的叢發、長期把平均速率壓到 ≤r 的 admission control。 | ch10 |\n| traffic equations | 流量方程 | 網路各站的流量守恆方程組 λᵢ=外部到達ᵢ+ΣⱼλⱼPⱼᵢ，先解這套流量帳、等待帳才說得清。 | ch16 |\n| utilization law | 使用率定律 | ρ=X·E[S]，把看似獨立的監控指標（吞吐、平均服務時間、使用率）鎖死在一起。 | ch02 |\n| visit ratio | 訪問比 | 一個工作平均經過某站幾次 Vᵢ，由 routing matrix 從 traffic equations 生出來——service demand 與 bottleneck 分析的因子。 | ch02 |\n| VUT formula | VUT 公式 | 把 Kingman 近似讀成「等待 ≈ 變異性 × 使用率 × 時間」(Variability × Utilization × Time)，當全書的工程世界觀。 | ch14 |\n| warmup / transient | 暖機／初始暫態 | 從空系統起跑的前段量測會系統性偏低，必須丟棄才能估到穩態——模擬騙人的第一條途徑。 | ch19 |\n| work conservation | 工作守恆 | 未完成工作總量的時間軌跡對所有 work-conserving 紀律逐點相同、與出工順序無關——排程「總量不變、分配可選」的地基。 | ch12 |\n\n## 編表說明：先點名、後定義的詞\n\n下列詞在「首次出現章」之前曾被前面章節**點名或埋伏筆**，但本表的章號取它**真正下定義並使用**的章，以免一句話定義與你查到的章節對不上：\n\n- **Kendall notation**：ch01 以 D/D/1 第一次出現並命名，**正式定義在 ch08**（本表取 ch08）。\n- **inspection paradox**：ch04 在殘餘壽命處立牌預告，**一般版的定義與計量在 ch12**。\n- **hedged / tied requests**：ch04 以「hedged read」紙上推演首次登場，**工程化解讀（綁定請求、Tail at Scale）在 ch20**。\n- **exponential backoff／jitter**：ch04 先釐清「指數」的命名撞車，**當防禦手段展開在 ch20**。\n- **insensitivity**：ch09 在 Erlang-B 處首次點名，**完整兌現在 ch13（PS）與 ch18（BCMP）**。\n- **admission control／goodput**：ch07 的生滅 worked example 首次出現，**完整的丟棄三角在 ch10、retry 防禦在 ch20**。\n- **VUT formula**：與 Kingman 近似同章（ch14）；其工程世界觀在 ch20、ch21 收束。\n"}, {"id": "appendix-d-reading-map", "file": "appendix-d-reading-map.md", "group": "附錄", "title": "附錄 D — 延伸閱讀總地圖", "md": "# 附錄 D — 延伸閱讀總地圖\n\n這張地圖把全書二十一章的延伸閱讀彙整成一份，去掉重複（Harchol-Balter、Adan–Resing、MIT 6.262、Marc Brooker 等貫穿多章的資源各只列一次，附上所有用到它的章），按六個 Part 組織。每筆都標明「是什麼＋什麼時候讀＋哪幾章用過」。連結以 `_meta/landscape-2026-06.md` 驗證過的為主；少數只在某章出現、由該章寫作時自行查證的連結，標「（章驗證）」，待一致性掃描複核。標「（2026-06）」者為時效性條目，版本或可用性會隨時間變動。讀完不知從哪下手，先看最後兩節：「如果只讀三樣」與「想更嚴格時的下一本」。\n\n---\n\n## 主幹資源（貫穿全書，先在這裡認識）\n\n這幾筆橫跨多個 Part，是全書的骨幹，先建立印象，後面各 Part 不再重述其定位。\n\n- **Mor Harchol-Balter,《Performance Modeling and Design of Computer Systems: Queueing Theory in Action》(Cambridge, 2013)** — 本書全程的主要參考教科書，電腦系統視角、工程友善、習題有火氣。無免費 PDF（作者明言別買 Kindle，數學式會壞），官網有第 1 章試讀與 errata。幾乎每章都指回它的對應章節。\n  用於 ch01、ch02、ch03、ch04、ch06、ch07、ch08、ch09、ch11、ch12、ch13、ch15、ch16、ch17、ch18、ch19、ch21。\n  https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- **Mor Harchol-Balter,《Introduction to Probability for Computing》(Cambridge, 2024)** — 全書 PDF 免費（2026-06 驗證可下載）。機率地基與重尾章的第一手敘述；想系統性重建機率工具就讀它。\n  用於 ch03、ch04、ch05、ch15（ch15 另指逐章 PDF 的 Ch.10）。\n  https://www.cs.cmu.edu/~harchol/Probability/chapters/HarcholBalterWholeBook.pdf\n- **Ivo Adan & Jacques Resing,《Queueing Systems》講義（TU Eindhoven，2015-03-26 版）** — 全本免費 PDF，最精簡而嚴謹的對照教材；推完本書任一推導拿它對答案的首選。\n  用於 ch01、ch03、ch04、ch05、ch07、ch08、ch09、ch12。\n  https://www.win.tue.nl/~iadan/queueing.pdf\n- **MIT OCW 6.262《Discrete Stochastic Processes》(Gallager, Spring 2011)** — 完整錄影＋開放講義＋習題解答；想把本書「快速複習即可」的機率與隨機過程地基補成研究所級嚴格的免費權威下一站。\n  用於 ch03、ch04、ch05、ch06、ch07、ch11、ch21。\n  https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n- **Marc Brooker 部落格** — 工程師視角的排隊直覺，本書多處的「互動體感版」。三篇：\n  - \"Surprising Economics of Load-Balanced Systems\"（2020-08-06）— 用 Erlang-C 算「池子越大延遲越好」。用於 ch01、ch09、ch19。 https://brooker.co.za/blog/2020/08/06/erlang.html\n  - \"Fixing retries with token buckets and circuit breakers\"（2022-02-28）— token bucket 給 retry 設預算。用於 ch10、ch20。 https://brooker.co.za/blog/2022/02/28/retries.html\n  - \"Metastability and Distributed Systems\"（2021-05-24）— metastable failure 的排隊直覺入門。用於 ch20。 https://brooker.co.za/blog/2021/05/24/metastable.html\n\n---\n\n## Part I — 地圖與定律（ch01–02）\n\n- **MacTutor: Agner Krarup Erlang（1878–1929）傳記** — 1909、1917 兩篇里程碑論文的脈絡：這門數學誕生於真實工程壓力。用於 ch01、ch05、ch09。 https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/\n- **Jeffrey Dean & Luiz André Barroso, \"The Tail at Scale\", *CACM* 56(2), 2013** — 「平均與 tail 是兩回事」的工程定錨文獻；ch01 預告、ch18 鋪墊、ch20 兌現（hedged/tied requests）。用於 ch01、ch18、ch20。 https://research.google/pubs/the-tail-at-scale/\n- **Little, J.D.C. (1961). \"A Proof for the Queuing Formula: L = λW.\" *Operations Research* 9(3): 383–387** — Little's Law 原始證明（平穩假設版）。用於 ch02。 https://pubsonline.informs.org/doi/10.1287/opre.9.3.383\n- **Stidham, S. (1974). \"A Last Word on L = λW.\" *Operations Research* 22(2): 417–421** — 只剩兩個極限假設的最終版；體會「假設可以削到多薄」。用於 ch02。 https://pubsonline.informs.org/doi/epdf/10.1287/opre.22.2.417\n- **Little, J.D.C. (2011). \"Little's Law as Viewed on Its 50th Anniversary.\" *Operations Research* 59(3): 536–549** — folk theorem 的歷史與五十年應用清單，免費 PDF；§2 歷史段最值得讀。用於 ch02。 https://people.cs.umass.edu/~emery/classes/cmpsci691st/readings/OS/Littles-Law-50-Years-Later.pdf\n- **Denning, P.J. & Buzen, J.P. (1978). \"The Operational Analysis of Queueing Network Models.\" *ACM Computing Surveys* 10(3): 225–261** — 操作分析的建制化論文，ch02 世界觀的出處（章驗證）。用於 ch02。 https://dl.acm.org/doi/10.1145/356733.356735\n- **Lazowska, Zahorjan, Graham & Sevcik (1984). *Quantitative System Performance*. Prentice-Hall** — 作者取回版權後全書免費；fundamental laws 與 bounds 兩章是 asymptotic bounds 的標準教科書處理，ch17 的 MVA 也用它（章驗證）。用於 ch02、ch17。 https://homes.cs.washington.edu/~lazowska/qsp/\n\n---\n\n## Part II — 機率地基（ch03–06）\n\n- **Wikipedia \"Memorylessness\"** — 唯一性刻畫與函數方程 S(t+s)=S(t)S(s) 的精簡陳述，複習 ch04 證明骨架用（二手來源，章驗證）。用於 ch04。 https://en.wikipedia.org/wiki/Memorylessness\n- **Wikipedia \"Palm–Khintchine theorem\"** — 「大量獨立稀疏流疊加趨向 Poisson」定理的精確敘述（章驗證）。用於 ch05。 https://en.wikipedia.org/wiki/Palm%E2%80%93Khintchine_theorem\n- **Levin, Peres & Wilmer,《Markov Chains and Mixing Times》2nd ed.（AMS）** — 耦合論證完整版與 mixing time 的標準參考，作者頁全書免費 PDF（2026-06 驗證，章驗證）。用於 ch06。 https://pages.uoregon.edu/dlevin/MARKOV/mcmt2e.pdf\n- **J.R. Norris,《Markov Chains》(Cambridge)** — 離散時間理論乾淨俐落、CTMC 嚴格版（Q matrix、jump chain、爆炸判準），ch06/ch07「指路」的正主；作者頁部分章節免費（2026-06 驗證，章驗證）。用於 ch06、ch07。 https://www.statslab.cam.ac.uk/~james/Markov/\n- **Martin Fowler, \"CircuitBreaker\"（2014-03-06）** — breaker 模式的通行工程描述；對照 ch06 模型看出工程描述裡的陷阱（章驗證）。用於 ch06。 https://martinfowler.com/bliki/CircuitBreaker.html\n- **Brian Hayes, \"First Links in the Markov Chain\"（American Scientist）** — Markov 1906 年為何發明這東西的科普長文，當甜點（章驗證）。用於 ch06。 https://www.americanscientist.org/article/first-links-in-the-markov-chain\n\n---\n\n## Part III — 生滅與經典模型（ch07–11）\n\n- **Kleinrock,《Queueing Systems, Vol. 1: Theory》(Wiley, 1975)** — 第 3 章 \"Birth-Death Queueing Systems in Equilibrium\" 是生滅過程的經典處理；無官方免費 PDF。用於 ch07（亦見 ch21 的兩卷本路徑）。 https://www.wiley.com/en-us/Queueing+Systems,+Volume+I-p-9780471491101\n- **Wikipedia \"Birth–death process\"** — recurrence/transience 判準（ch07 不展開的第二條級數）的速查（章驗證）。用於 ch07。 https://en.wikipedia.org/wiki/Birth%E2%80%93death_process\n- **R.W. Wolff, \"Poisson Arrivals See Time Averages\", *Operations Research* 30(2): 223–231, 1982** — PASTA 的出生地；讀引言與定理敘述拿到 lack of anticipation 的精確形式。用於 ch08。 https://pubsonline.informs.org/doi/abs/10.1287/opre.30.2.223\n- **D.G. Kendall, \"Stochastic Processes Occurring in the Theory of Queues…\", *Annals of Mathematical Statistics* 24(3): 338–354, 1953** — A/S/c 記號（Kendall notation）的出處論文。用於 ch08。 https://projecteuclid.org/euclid.aoms/1177728975\n- **Kendall's notation（Wikipedia）** — 擴充欄位（/K/N/D）與各欄慣例速查（二手來源，章驗證）。用於 ch08。 https://en.wikipedia.org/wiki/Kendall%27s_notation\n- **Adan & Resing 的 M/M/1 講義（5 頁 PDF）** — T~Exp(μ−λ) 的 Erlang 混合推導與 mean-value 路線的最精簡版（2026-06 驗證，章驗證）。用於 ch08。 https://iadan.win.tue.nl/blockq/h3.pdf\n- **Halfin & Whitt, \"Heavy-Traffic Limits for Queues with Many Exponential Servers\", *Operations Research* 29(3), 1981** — QED 極限定理原文；β 與極限等待機率的精確函數關係從這裡進。用於 ch09。 https://ideas.repec.org/a/inm/oropre/v29y1981i3p567-588.html\n- **Borst, Mandelbaum & Reiman, \"Dimensioning Large Call Centers\", *Operations Research* 52(1), 2004** — 把「β 怎麼選」寫成成本最佳化並嚴格證成 √ 法則。用於 ch09。 https://ideas.repec.org/a/inm/oropre/v52y2004i1p17-34.html\n- **Shortle, Thompson, Gross & Harris,《Fundamentals of Queueing Theory》5th ed.（Wiley, 2018）** — ch10 全部模型（M/M/1/K、M/M/c/K、有限母體、balking/reneging）的標準教科書處理，公式表齊全當速查。用於 ch10。 https://www.wiley.com/en-us/Fundamentals+of+Queueing+Theory,+5th+Edition-p-9781118943526\n- **Garnett, Mandelbaum & Reiman, \"Designing a Call Center with Impatient Customers\", *M&SOM* 4(3): 208–227, 2002** — Erlang-A（M/M/c+M）的定錨論文，ch10 不耐煩敘述的出處（章驗證）。用於 ch10。 https://pubsonline.informs.org/doi/10.1287/msom.4.3.208.7753\n- **Haight, \"Queueing with Balking\"（*Biometrika* 44, 1957）／\"Queueing with Reneging\"（*Metrika* 2, 1959）** — 兩種不耐煩行為的命名出處，歷史趣味大於實用（章驗證）。用於 ch10。 https://academic.oup.com/biomet/article-abstract/44/3-4/360/238518\n- **Wikipedia \"Leaky bucket\"** — 把 Turner 1986 的出處與「計量器 vs 佇列」兩種身分的混淆史整理得很清楚（少數值得推薦的條目，章驗證）。用於 ch10。 https://en.wikipedia.org/wiki/Leaky_bucket\n- **nginx 官方文件 ngx_http_upstream_module** — `max_conns` 與 `queue` 指令就是 M/M/c/K 的工程化身（佇列滿或逾時回 502）（2026-06；章驗證）。用於 ch10。 https://nginx.org/en/docs/http/ngx_http_upstream_module.html\n- **P.J. Burke, \"The Output of a Queuing System\", *Operations Research* 4(6): 699–704, 1956** — Burke 定理原始論文（輸出間隔直接分析）。用於 ch11。 https://pubsonline.informs.org/doi/10.1287/opre.4.6.699\n- **E. Reich, \"Waiting Times When Queues are in Tandem\", *Annals of Mathematical Statistics* 28(3): 768–773, 1957** — Burke 定理的可逆性路線源頭，串聯兩站等待獨立性也出自此（章驗證）。用於 ch11。 https://projecteuclid.org/euclid.aoms/1177706889\n- **F.P. Kelly,《Reversibility and Stochastic Networks》（Wiley 1979；Cambridge 2011 重印）** — 可逆性的聖經：第 1 章是 Burke 那批定理的嚴格版（含 Kolmogorov 判準），第 2–3 章鋪到 Jackson 網路與 quasi-reversibility。作者官方頁提供免費全文（2026-06 驗證）。用於 ch11、ch16、ch18。 https://www.statslab.cam.ac.uk/~fpk1/rsn.html\n- **P.J. Burke, \"Proof of a Conjecture on the Interarrival-Time Distribution in an M/M/1 Queue with Feedback\", *IEEE Trans. Communications* 24: 575–576, 1976** — feedback 合流不是 Poisson 的定論（邊際間隔是兩指數混合），兩頁讀完（章驗證）。用於 ch11。 https://ieeexplore.ieee.org/document/1093335/\n\n---\n\n## Part IV — 超越指數（ch12–15）\n\n- **Wikipedia \"Pollaczek–Khinchine formula\"** — 平均式與 transform 式的對照、Pollaczek 1930／Khinchine 1932 歸屬簡史（章驗證）。用於 ch12。 https://en.wikipedia.org/wiki/Pollaczek%E2%80%93Khinchine_formula\n- **Wikipedia \"M/G/1 queue\"** — embedded chain 轉移結構與 busy period 的 Kendall functional equation，ch12 兩個「存在聲明」的下一步入口（章驗證）。用於 ch12。 https://en.wikipedia.org/wiki/M/G/1_queue\n- **Pollaczek 1930, \"Über eine Aufgabe der Wahrscheinlichkeitstheorie\", *Mathematische Zeitschrift* 32** — 歷史原典（德文、複變方法），看一眼會感激 mean-value 路線的存在。用於 ch12。 https://link.springer.com/article/10.1007/BF01194620\n- **Kleinrock 1965, \"A Conservation Law for a Wide Class of Queueing Disciplines\", *Naval Research Logistics Quarterly* 12(2): 181–192** — 守恆律原典，UCLA 開放 PDF（章驗證）。用於 ch13。 https://www.lk.cs.ucla.edu/data/files/Kleinrock/A%20Conservation%20Law%20for%20a%20Wide%20Class%20of%20Queueing%20Disciplines.pdf\n- **Kingman 1962, \"The Effect of Queue Discipline on Waiting Time Variance\", *Math. Proc. Cambridge Philos. Soc.* 58(1): 163–164** — 「FCFS 變異數最小」的兩頁原典（章驗證）。用於 ch13。 https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/effect-of-queue-discipline-on-waiting-time-variance/D48362807F5674D679592E8BBA13C63C\n- **Schrage 1968, \"Letter to the Editor—A Proof of the Optimality of the Shortest Remaining Processing Time Discipline\", *Operations Research* 16(3): 687–690** — SRPT 最優性完整證明（體裁是 Letter to the Editor）。用於 ch13。 https://pubsonline.informs.org/doi/10.1287/opre.16.3.687\n- **Bansal & Harchol-Balter 2001, \"Analysis of SRPT Scheduling: Investigating Unfairness\", SIGMETRICS 2001** — 「餓死長工作」的逐條量化，ch13 引用的定理全在這（章驗證）。用於 ch13。 https://www.cs.cmu.edu/~harchol/Papers/Sigmetrics01.pdf\n- **Sakata, Noguchi & Oizumi 1971, \"An Analysis of the M/G/1 Queue Under Round-Robin Scheduling\", *Operations Research* 19(2): 371–385** — PS 作為 RR 極限的原始分析、insensitivity 出處之一（章驗證）。用於 ch13。 https://pubsonline.informs.org/doi/10.1287/opre.19.2.371\n- **Node.js 官方文件 \"The Node.js Event Loop, Timers, and process.nextTick()\"** — 拿 PS 眼鏡重讀 event loop phases 與「執行到耗盡」語意（2026-06；章驗證）。用於 ch13。 https://nodejs.org/en/learn/asynchronous-work/event-loop-timers-and-nexttick\n- **Kingman 1961, \"The Single Server Queue in Heavy Traffic\", *Math. Proc. Cambridge Philos. Soc.* 57(4): 902–904** — heavy-traffic 近似原典，三頁短文看一個不等式怎麼打開一個領域。用於 ch14。 https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/single-server-queue-in-heavy-traffic/81C55BC00A68FE6D5385638AA0B0AF37\n- **Kingman 1962, \"Some inequalities for the queue GI/G/1\", *Biometrika* 49(3/4): 315–324** — ch14 上界的出處（章驗證）。用於 ch14。 https://academic.oup.com/biomet/article-abstract/49/3-4/315/223450\n- **Lindley 1952, \"The Theory of Queues with a Single Server\", *Math. Proc. Cambridge Philos. Soc.* 48(2): 277–289** — Lindley recursion 與積分方程的出處，G/G/1 理論的起點。用於 ch14。 https://www.cambridge.org/core/journals/mathematical-proceedings-of-the-cambridge-philosophical-society/article/abs/theory-of-queues-with-a-single-server/53E80E039A02BCCC909E5C1D3BBC1AD1\n- **Whitt 1983, \"The Queueing Network Analyzer\", *Bell System Technical Journal* 62(9): 2779–2815** — 把兩矩近似工程化成整套網路工具（QNA）；C² 如何在多站間傳播的代表作，免費 PDF（章驗證）。用於 ch14、ch18。 http://www.columbia.edu/~ww2040/QNA_1983.pdf\n- **Krämer & Langenbach-Belz 1976, \"Approximate Formulae for the Delay in the Queueing System GI/G/1\"（ITC 8）** — C²ₐ<1 區的標準修正因子，ch14 D/M/1 偏高 18% 的解藥（章驗證）。用於 ch14。 https://www.semanticscholar.org/paper/Approximate-Formulae-for-the-Delay-in-the-Queueing-Kraemer-Langenbach-belz/311428c1ef0588162f2321d25452952001c1b3b1\n- **Bertsekas & Gallager,《Data Networks》2nd ed., Ch. 3** — G/G/1 上界與通訊網路 Jackson／Kleinrock 獨立性近似的免費嚴謹版（MIT 官方逐章下載）。用於 ch14、ch16。 https://web.mit.edu/dimitrib/www/datanets.html\n- **AllAboutLean, \"The Kingman Formula – Variation, Utilization, and Lead Time\"** — 製造業視角的 VUT 讀法（《Factory Physics》把它叫 VUT equation）（章驗證）。用於 ch14。 https://www.allaboutlean.com/kingman-formula/\n- **Harchol-Balter《Introduction to Probability for Computing》Ch.10 \"Heavy Tails\"（逐章 PDF）** — ch15 證據段第一手敘述：UNIX 量測、網頁檔案 α≈1.1、雲端 α≈0.72，含 Bounded Pareto 習題（章驗證）。用於 ch15。 https://www.cs.cmu.edu/~harchol/Probability/chapters/chpt10.pdf\n- **Crovella & Bestavros, \"Self-Similarity in World Wide Web Traffic\", *IEEE/ACM ToN* 5(6): 835–846, 1997** — 網頁檔案重尾證據原典，鏡像 PDF（章驗證）。用於 ch15。 https://ant.isi.edu/csci551/images/c/c2/Crovella97a.pdf\n- **Harchol-Balter & Downey, \"Exploiting Process Lifetime Distributions for Dynamic Load Balancing\", *ACM TOCS* 15(3), 1997（SIGMETRICS '96 版免費）** — UNIX 行程壽命 P(>t)≈1/t 的量測與搶占式遷移含義（章驗證）。用於 ch15。 https://www.cs.cmu.edu/~harchol/Papers/Sigmetrics96.pdf\n- **Borst, Boxma & Núñez-Queija, \"Heavy Tails: The Effect of the Service Discipline\", TOOLS 2002 (LNCS 2324)** — FCFS／PS／LCFS 在 regularly varying 服務下尾巴行為的綜述，ch15 兩條敘述層級尾巴結果的嚴格版入口（章驗證）。用於 ch15。 https://link.springer.com/chapter/10.1007/3-540-46029-2_1\n- **Zwart & Boxma, \"Sojourn time asymptotics in the M/G/1 processor sharing queue\", *Queueing Systems* 35: 141–166, 2000** — PS 的 P(T>x)~P(S>(1−ρ)x) 出處（章驗證）。用於 ch15。 https://link.springer.com/article/10.1023/A:1019142010994\n\n---\n\n## Part V — 佇列網路（ch16–18）\n\n- **J.R. Jackson, \"Networks of Waiting Lines\", *Operations Research* 5(4): 518–521, 1957** — 開放網路乘積形式原典，只有四頁（章驗證）。用於 ch16。 https://pubsonline.informs.org/doi/abs/10.1287/opre.5.4.518\n- **J.R. Jackson, \"Jobshop-Like Queueing Systems\", *Management Science* 10(1): 131–142, 1963** — 狀態相依服務速率的推廣（M/M/c 站）。用於 ch16。 https://pubsonline.informs.org/doi/abs/10.1287/mnsc.10.1.131\n- **B. Melamed, \"Characterizations of Poisson traffic streams in Jackson queueing networks\", *Adv. Appl. Prob.* 11(2): 422–438, 1979** — 「迴路上的流必非 Poisson」判準的出處，把 ch16 的驚奇釘成定理（章驗證）。用於 ch16。 https://www.cambridge.org/core/journals/advances-in-applied-probability/article/abs/characterizations-of-poisson-traffic-streams-in-jackson-queueing-networks/090226B97FAA5EC414481C4B41BC53BD\n- **M. Reiser & S.S. Lavenberg, \"Mean-Value Analysis of Closed Multichain Queuing Networks\", *JACM* 27(2): 313–322, 1980** — MVA 的出生地，原文直接是多 class 版；讀第 2 節看三條方程的原始形態。用於 ch17。 https://dl.acm.org/doi/10.1145/322186.322195\n- **W.J. Gordon & G.F. Newell, \"Closed Queuing Systems with Exponential Servers\", *Operations Research* 15(2): 254–265, 1967** — 封閉網路乘積形式的出處；對照 Jackson 1957 看 normalization constant 怎麼出現。用於 ch17。 https://ideas.repec.org/a/inm/oropre/v15y1967i2p254-265.html\n- **J.P. Buzen, \"Computational algorithms for closed queueing networks…\", *CACM* 16(9): 527–531, 1973** — 把 normalization constant G 從不可算變成 O(N·k) 的卷積演算法，MVA 之前的全部可算性（章驗證）。用於 ch17。 https://dl.acm.org/doi/10.1145/362342.362345\n- **K.C. Sevcik & I. Mitrani, \"The Distribution of Queuing Network States at Input and Output Instants\", *JACM* 28(2): 358–371, 1981** — arrival theorem 的完整證明（與 Lavenberg–Reiser 獨立得出）（章驗證）。用於 ch17。 https://dl.acm.org/doi/10.1145/322248.322257\n- **F. Baskett, K.M. Chandy, R.R. Muntz, F.G. Palacios, \"Open, Closed, and Mixed Networks of Queues…\", *JACM* 22(2): 248–260, 1975** — BCMP 原典；定理敘述（§3）含四型站的精確條件。用於 ch18。 https://dl.acm.org/doi/10.1145/321879.321887\n- **L. Flatto & S. Hahn, \"Two Parallel Queues Created by Arrivals with Two Demands I\", *SIAM J. Appl. Math.* 44(5), 1984** — fork-join n=2 精確解的出處；讀引言感受「為什麼只有 n=2」即可（章驗證）。用於 ch18。\n- **R. Nelson & A.N. Tantawi, \"Approximate Analysis of Fork/Join Synchronization in Parallel Queues\", *IEEE Trans. Computers* 37(6), 1988** — 工程上最常用的 fork-join 近似（scaling approximation），n≤32 誤差 5% 內（章驗證）。用於 ch18。 https://research.ibm.com/publications/approximate-analysis-of-forkjoin-synchronization-in-parallel-queues\n- **A. Thomasian, \"Analysis of Fork/Join and Related Queueing Systems\", *ACM Computing Surveys* 47(2), Article 17, 2014** — fork-join 文獻全景 survey，當目錄用（章驗證）。用於 ch18。 https://dl.acm.org/doi/10.1145/2628913\n\n（Kelly《Reversibility and Stochastic Networks》也用於 ch16、ch18，已列於 Part III。Whitt QNA 1983 也用於 ch18，已列於 Part IV。Bertsekas–Gallager《Data Networks》也用於 ch16，已列於 Part IV。Lazowska 等《Quantitative System Performance》也用於 ch17，已列於 Part I。）\n\n---\n\n## Part VI — 模擬與回到系統（ch19–21）\n\n- **Gil Tene, \"How NOT to Measure Latency\"（Strange Loop 2015）** — coordinated omission 的出處談話；現場演示修正 CO 前後 P99.99 差幾個數量級。用於 ch19、ch20。 https://www.youtube.com/watch?v=lJ8ydIuPFeU\n- **P.D. Welch, \"The Statistical Analysis of Simulation Results\"（1983）** — 暖機期偵測 Welch 法的原始出處；找不到原文時 Rossetti 開放教科書有清楚的現代重述（2026-06 驗證，章驗證）。用於 ch19。 https://rossetti.github.io/RossettiArenaBook/statistical-analysis-techniques-for-warmup-detection.html\n- **simpy 官方文件（PyPI）／ciw 官方文件（PyPI）** — 要寫比單站複雜的網路模擬、不想自己管事件 heap 時的成熟 Python 選擇；它們解決「排程事件」、不是「方法學」（2026-06，版本見正文：simpy 4.1.2、ciw 3.2.7）。用於 ch19。 https://pypi.org/project/simpy/ ；https://pypi.org/project/ciw/\n- **Nathan Bronson et al., \"Metastable Failures in Distributed Systems\", *HotOS 2021*** — 雙穩態的定錨論文；把 trigger／sustaining effect 的區分內化。開放 PDF。用於 ch20。 https://sigops.org/s/conferences/hotos/2021/papers/hotos21-s11-bronson.pdf\n- **Lexiang Huang et al., \"Metastable Failures in the Wild\", *OSDI 2022*** — 前一篇的實證續集，真實案例譜系與緩解手段。開放 PDF。用於 ch20。 https://www.usenix.org/system/files/osdi22-huang-lexiang.pdf\n- **Gyeong-In Yu et al., \"Orca: A Distributed Serving System for Transformer-Based Generative Models\", *OSDI 2022*** — continuous batching（論文用語 iteration-level scheduling）的出處；ch20 只當點綴，機制深度在書架上的《從後端到 AI Infra》。用於 ch20。 https://www.usenix.org/system/files/osdi22-yu.pdf\n- **Michael Mitzenmacher, \"The Power of Two Choices in Randomized Load Balancing\", *IEEE TPDS* 12(10), 2001** — ch21 po2c 半頁敘述的原始出處之一（佇列版雙指數衰減）；另一獨立來源是 Vvedenskaya–Dobrushin–Karpelevich 1996（章驗證）。用於 ch21。 https://cs.colby.edu/courses/F09/cs231-labs/labs/lab07/Mitzenmacher-2Choices-TPDS2001.pdf\n- **Leonard Kleinrock,《Queueing Systems》Vol. 1: Theory（Wiley, 1975）／Vol. 2: Computer Applications（Wiley, 1976）** — 經典兩卷本，理論深水區（transform 方法、嚴格推導）＋電腦/網路應用；無官方免費 PDF。用於 ch21（Vol. 1 第 3 章亦見 ch07）。 https://onlinelibrary.wiley.com/doi/abs/10.1002/net.3230060210\n\n（\"The Tail at Scale\" 也用於 ch20，已列於 Part I。Marc Brooker 三篇與 MIT 6.262、Harchol-Balter、Adan–Resing 的後續路徑已列於主幹資源。）\n\n---\n\n## 如果只讀三樣\n\n給這位讀者（資深後端工程師，要嚴謹但要能落地）槓桿最高的三筆：\n\n1. **Harchol-Balter《Performance Modeling and Design of Computer Systems》** — 全書的對應教科書，工程視角、習題有火氣；一本就把 operational laws 到 SRPT 排程到 BCMP 全覆蓋。值得買紙本當案頭書。\n2. **Adan & Resing《Queueing Systems》講義（免費 PDF）** — 最精簡的嚴謹對照；每次推完一個公式拿它對答案，隨身可查、零成本。\n3. **Marc Brooker, \"Surprising Economics of Load-Balanced Systems\"** — 一篇部落格把池化效益用 Erlang-C 算給你看；把書裡的數學直接接回「該配幾個 worker」的工程決策，是理論落地的最短路徑。\n\n## 想更嚴格時的下一本\n\n當你覺得 Harchol-Balter 的工程化敘述不夠嚴格、想看「原版的嚴謹」，順著這條路往上走（依 landscape 的階梯）：\n\n1. **MIT OCW 6.262《Discrete Stochastic Processes》(Gallager)** — 先補地基：Markov 過程、renewal theory、heavy-traffic 的真正理論，免費錄影＋講義＋習題解答，研究所級但自學友善。對應教科書是 Gallager《Stochastic Processes: Theory for Applications》(Cambridge, 2013)。\n2. **Kleinrock《Queueing Systems》Vol. 1: Theory（1975）** — 排隊理論本身的嚴謹原版：transform 方法、嚴格推導；Vol. 2 接到電腦/網路應用。無免費 PDF。\n3. **F.P. Kelly《Reversibility and Stochastic Networks》** — 想把 Burke／Jackson／BCMP 那條網路主線推到底（可逆性、quasi-reversibility、insensitivity 的嚴格地基），作者頁有免費全文。\n4. **Shortle, Thompson, Gross & Harris《Fundamentals of Queueing Theory》5th ed.（2018）** — 想要一本公式表最齊、模型涵蓋最廣的速查型教科書時的補充。\n\n時效提醒（2026-06）：工具版本（simpy 4.1.2、ciw 3.2.7）與官方文件連結（nginx、Node.js、PyPI）會隨時間變動，引用前以當下版本為準；免費 PDF 的可用性（Kelly、Levin–Peres–Wilmer、Lazowska 等作者自架頁面）亦可能變動。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "Landscape 2026-06 — 排隊理論書的事實基準", "md": "# Landscape 2026-06 — 排隊理論書的事實基準\n\n本檔是各章寫作 agent 的事實基準：易變動或常被記錯的事實，每條附來源 URL。\n除標注 ⚠️（未驗證）者外，所有條目於 2026-06-12 經 WebSearch/WebFetch 實際查證\n（免費 PDF 均實際抓取確認標題或 HTTP 200 + Content-Type）。\n\n## 教科書與免費資源\n\n- **Mor Harchol-Balter,《Performance Modeling and Design of Computer Systems: Queueing Theory in Action》**，Cambridge University Press，2013 年 2 月。本書主要參考教科書。**無免費 PDF**（作者明言建議買紙本，Kindle 版會弄壞數學式）；第 1 章免費試讀、errata 在書頁上。\n  來源：https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html （2026-06 驗證）\n- **Mor Harchol-Balter,《Introduction to Probability for Computing》**，Cambridge University Press，2024。**全書 PDF 免費**，已驗證可下載（HTTP 200，8.4 MB，伺服器端 2026-03 更新）：\n  https://www.cs.cmu.edu/~harchol/Probability/chapters/HarcholBalterWholeBook.pdf\n  書頁（含逐章 PDF 與投影片）：http://www.cs.cmu.edu/~harchol/Probability/book.html （2026-06 驗證）\n- **Ivo Adan & Jacques Resing,《Queueing Systems》講義**（TU Eindhoven, Department of Mathematics and Computing Science），版本日期 1995 初版多次修訂、現行 PDF 標注 **2015-03-26**。免費 PDF，已抓取並確認標題與作者：\n  https://www.win.tue.nl/~iadan/queueing.pdf （301 轉向 https://iadan.win.tue.nl/queueing.pdf ，2026-06 驗證）\n- **Leonard Kleinrock,《Queueing Systems》** Vol. 1: Theory（Wiley, 1975，417 頁）；Vol. 2: Computer Applications（Wiley, 1976）。經典兩卷本，無官方免費 PDF。\n  來源：https://onlinelibrary.wiley.com/doi/abs/10.1002/net.3230060210 、https://www.wiley.com/en-us/Queueing+Systems,+Volume+2:+Computer+Applications-p-9780471491118\n- **Shortle, Thompson, Gross, Harris,《Fundamentals of Queueing Theory》第 5 版**，Wiley，2018（ISBN 9781118943526）。注意：第 5 版作者順序是 Shortle/Thompson/Gross/Harris；舊版習慣引作 \"Gross & Harris\"，引用時對齊版次。\n  來源：https://www.wiley.com/en-us/Fundamentals+of+Queueing+Theory,+5th+Edition-p-9781118943526\n- **Bertsekas & Gallager,《Data Networks》第 2 版**（Prentice Hall, 1992）。MIT 官方頁面提供**全書逐章免費下載**（非商業用途；含 Chapter 3 \"Queueing\"——本書 G/G/1、網路相關章可引）＋解答手冊。\n  來源：https://web.mit.edu/dimitrib/www/datanets.html （2026-06 驗證）\n- **Robert Gallager,《Stochastic Processes: Theory for Applications》**，Cambridge University Press，2013（ISBN 9781107039759）。配套課程 **MIT OCW 6.262 Discrete Stochastic Processes（Spring 2011, Gallager 親授）**有完整錄影、講義（開放教科書草稿）、習題解答：\n  https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/ （2026-06 驗證）\n  書籍頁：https://www.cambridge.org/9781107039759\n- **CMU 15-857 Analytical Performance Modeling & Design of Computer Systems*
