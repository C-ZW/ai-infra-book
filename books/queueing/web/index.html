<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "等待的數學", "md": "# 等待的數學\n\n> 排隊理論——寫給一位資深後端工程師的數學之旅。\n\n## 這本書是什麼\n\n你寫了六年的高併發系統，對「queue 滿了會怎樣」「使用率別超過 80%」「P99 比平均慘」有一肚子直覺。這些直覺大多是對的——但你說不出**為什麼**。這本書把那批直覺一條條變成可推導、可質疑、知道邊界的數學：從 πₙ = (1−ρ)ρⁿ 到 Pollaczek–Khinchine、從 Little's Law 到 Jackson 定理，每個公式你都親手推一遍，並且永遠先問「它在什麼條件下會騙我」。\n\n三個設定，開讀前先知道：\n\n- **數學嚴謹為主**。這不是容量規劃手冊。工程應用是橋接的錨點與點綴（每章開場＋ch20 收網），主菜是推導本身：你要能口頭重講每個關鍵證明，講不清楚就還沒懂。\n- **紙上推演＋少量程式**。多數動手是紙和筆：手推公式、手算數值表、手追 Lindley recursion。七章另附 `Python 小實驗`（純標準函式庫、固定種子），讓你親眼看到理論值與模擬值對得上——以及重尾下對不上。\n- **你的系統是貫穿範例**。一條 SQS 風格的推播管線（λ=8、μ=10、ρ=0.8）從 ch01 的體感開始，一路被 M/M/1、Erlang、P-K、Kingman、Jackson 反覆解剖，到 ch20 變成一次完整的容量規劃 walkthrough。\n\n## 怎麼讀\n\n每章固定骨架：開場地圖 → **從你已知的出發**（橋接你的後端經驗）→ 核心推導 → **陷阱與防禦**（這個公式在什麼條件下騙你）→ **紙上推演**（2~4 題，附完整解答與預估時間）→ **自我檢核**（口頭自答）→ 延伸閱讀。\n\n推演題請真的拿紙筆做完再看解答；自我檢核用說的，不是用想的。考核過關制：上一章的檢核講不順，先別開下一章。每個公式記得連它的適用條件一起記——附錄 B 的「公式總表」把全書公式與其適用條件並列，沒有條件的公式表是危險品。\n\n## 路線\n\n- **Part I（ch01–02）**：為什麼 ρ→1 一切爆炸；不用機率就能算的鐵律（Little's Law、bottleneck bounds）。\n- **Part II（ch03–06）**：機率工具箱、指數分布、Poisson 過程、Markov chain——從「大學看過」磨到能用。\n- **Part III（ch07–11）**：生滅過程引擎；M/M/1 全套；M/M/c 與 Erlang 公式；有限容量；可逆性與 Burke 定理。\n- **Part IV（ch12–15）**：放掉指數假設——P-K 與變異數的帳單、排程的代價、Kingman 萬用近似、重尾如何毀掉平均值。\n- **Part V（ch16–18）**：佇列網路——Jackson 的乘積形式驚奇、封閉網路與 MVA、product form 的邊界與 fork-join。\n- **Part VI（ch19–21）**：模擬方法學（讓蒙地卡羅說真話）；把理論帶回機房（retry storm、autoscaling、batching）；全書地圖與下一步。\n\n六條驗收主線（ch21 收官，讀完要能逐條口頭自答）：①為什麼 ρ→1 爆炸、爆炸的形狀；②隨機性（變異數）本身就是延遲來源；③平均值與 tail 是兩回事；④每個公式條件不滿足時怎麼騙你；⑤網路層級的湧現行為；⑥模擬什麼時候比公式誠實。\n\n事實性內容（歷史歸屬、工具版本、業界案例）的查證基準時點是 **2026-06**；維護方式見 `_meta/maintenance.md`。\n"}, {"id": "ch01-why-queueing", "file": "ch01-why-queueing.md", "group": "Part I — 地圖與定律", "title": "ch01 — 排隊無所不在：直覺失效的地方", "md": "# ch01 — 排隊無所不在：直覺失效的地方\n\n> **本章解決什麼問題**：你知道「使用率不要超過 80%」，但說不出為什麼是 80 而不是 70 或 95；你看過壓測曲線在某個負載點突然起飛，但講不出那個點由什麼決定。本章是全書地圖的第一格：不推導任何公式，它的工作是讓你親眼看到直覺在哪裡失效、把「等待從哪裡生出來」變成一個可以動手算的問題、把全書要審理的工程黑話列成案件清單。所有在這裡先亮相的數字，ch08 之前都會被一步不跳地推導出來——本章先讓你欠下這筆好奇心的債。\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律   ◄ 你在這裡\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步\n```\n\n## 從你已知的出發\n\n三段你大概不需要翻監控紀錄就能想起來的現場記憶。\n\n**RDS CPU 的 80% 警戒線。** 你做過 profiling、把 RDS 的 CPU 尖峰壓下 40%。當初為什麼要動手？因為儀表板上那條線逼近 80%，而「80% 是警戒線」是團隊裡不需要解釋的常識。問題是：警戒的到底是什麼？CPU 在 82% 的時候並沒有燒起來，查詢還是一條一條在完成。那條線背後如果有一個數學理由，它應該長什麼樣？\n\n**k6 壓測曲線的形狀。** 你用 k6 和 Vegeta 做過負載測試。每次曲線都長一個樣：負載低的時候延遲平平的，加壓上去也只是緩慢爬升，然後在某個點——每次都讓人覺得「剛剛明明還好好的」——P99 像被點燃一樣豎直起飛。那個拐點不是 bug，不是 GC，不是某次部署引入的 regression。它每次都在，換一套系統還在。\n\n**SQS backlog 的尖峰記憶。** 結算 pipeline 的 SQS 佇列，平常深度貼著零。尖峰時段 backlog 堆起來，過了尖峰自己消化掉。worker 的總處理能力明明高於訊息的平均到達速率——「平均上」永遠追得上——backlog 為什麼還是會堆？\n\n這三件事是同一件事。本書用一個貫穿全書的例子來釘住它：**推播管線**——API 收到事件、推播 worker 負責發送，原型是你維護過的 WebSocket 通知系統（約 10M 則訊息/月；以 30 天計，平均到達率約 3.86 則/s）。基準數字如下，全書到處會用到，值得現在就記住：\n\n| 量 | 值 | 這個數字怎麼來的 |\n|---|---|---|\n| 單一 worker 平均處理時間 | E[S] = 100 ms（服務率 μ = 10 則/s） | 量測得到 |\n| 尖峰到達率 | λ = 8 則/s | 量測得到 |\n| 使用率 | ρ = λ/μ = 0.8 | 算術 |\n| 尖峰平均回應時間 | E[T] = 0.5 s | ch08 推導 |\n| 尖峰 P99 回應時間 | ≈ 2.30 s | ch08 推導 |\n\n注意這組數字裡的反差：worker 有兩成的時間是閒著的，但平均回應時間是處理時間的 5 倍、P99 是 23 倍。沒有任何元件故障，沒有任何資源耗盡。**這不是 bug，是數學**——而且是可以從第一原理推出來的數學。本章先讓你看到「等待是怎麼無中生有的」，推導留給後面的章節。\n\n順帶一句歷史定位：這門數學的起點不是網路服務，是電話。A.K. Erlang 在哥本哈根電話公司工作時，1909 年證明了隨機撥出的電話呼叫服從 Poisson 分布，1917 年給出交換機的損失與等待公式（見 ch09）；「排隊理論」長成一門一般化的學科則是 1950 年代的事，Kendall（1953，記號系統的出處）與 Lindley（1952）等人把它建制化。電話交換機房和你的推播管線，在數學上是同一個房間。\n\n## 確定性的世界不排隊：D/D/1 對照組\n\n要看清楚等待從哪裡來，先看一個**不會排隊**的世界。\n\n設定：1 秒內到達 8 個 job（λ = 8），每個 job 的處理時間**恰好** 100 ms（μ = 10），單一 worker，先到先服務。如果到達是完美等距的——每 125 ms 來一個——時間線是這樣：\n\n| Job | 到達 (ms) | 開始服務 (ms) | 完成 (ms) | 等待 (ms) |\n|---|---|---|---|---|\n| J1 | 0 | 0 | 100 | 0 |\n| J2 | 125 | 125 | 225 | 0 |\n| J3 | 250 | 250 | 350 | 0 |\n| J4 | 375 | 375 | 475 | 0 |\n| J5 | 500 | 500 | 600 | 0 |\n| J6 | 625 | 625 | 725 | 0 |\n| J7 | 750 | 750 | 850 | 0 |\n| J8 | 875 | 875 | 975 | 0 |\n\n每個 job 到達時 worker 都剛好閒著（前一個 job 在 100 ms 內做完，下一個 125 ms 才來），**等待恆等於零**。使用率一樣是 0.8——worker 每 125 ms 裡忙 100 ms——但佇列從不存在。\n\n這種「到達間隔固定、服務時間固定、單一伺服器」的系統，排隊理論的速記寫作 **D/D/1**（D = deterministic；這套記號叫 Kendall 記號，本章稍後給你一張對照表，正式定義在 ch08）。D/D/1 的結論可以一句話講完：只要 λ < μ，永遠沒有人等。如果世界是確定性的，這本書到這裡就可以結束了。\n\n## 等待從哪裡生出來：手排一條叢發時間線\n\n現在只改一件事：**同樣這 8 個 job**，把前 4 個擠成一團、全部在 t = 0 到達，後 4 個維持原時刻。λ 還是 8 則/s，μ 還是 10 則/s，總工作量還是 800 ms，使用率還是 0.8。手排時間線（這是本章的 worked example，值得你拿紙跟著走一遍）：\n\n| Job | 到達 (ms) | 開始服務 (ms) | 完成 (ms) | 等待 (ms) |\n|---|---|---|---|---|\n| J1 | 0 | 0 | 100 | 0 |\n| J2 | 0 | 100 | 200 | 100 |\n| J3 | 0 | 200 | 300 | 200 |\n| J4 | 0 | 300 | 400 | 300 |\n| J5 | 500 | 500 | 600 | 0 |\n| J6 | 625 | 625 | 725 | 0 |\n| J7 | 750 | 750 | 850 | 0 |\n| J8 | 875 | 875 | 975 | 0 |\n\n總等待 0 + 100 + 200 + 300 = 600 ms，平均等待 75 ms，最倒楣的 J4 等了 300 ms——三個完整的服務時間。兩條時間線的 worker 忙碌狀態並排看：\n\n```text\n1 格 = 25 ms；「#」= 服務中、「.」= 閒置\n         0 ms                                    1000 ms\n         |----------------------------------------|\n等距到達  ####.####.####.####.####.####.####.####.\n叢發到達  ################....####.####.####.####.\n```\n\n兩條線的「#」都是 32 格（800 ms 的工作）、「.」都是 8 格（200 ms 閒置）。**忙碌總量一模一樣，等待卻從 0 變成 600 ms。**這個例子裡藏著三個觀察，是全書反覆回收的母題：\n\n**觀察一：等待誕生於局部超載。**那一團 4 個 job 在一瞬間到達，瞬間的「到達速率」遠超過 μ。λ < μ 說的是長期平均追得上，對任何一個 125 ms 的窗口它什麼都沒承諾。\n\n**觀察二：閒置不可儲存。**等距版裡 worker 每輪閒 25 ms，叢發版裡這些閒置集中在 t = 400–500 之間和尾段。但 t = 400 的閒置救不了 t = 0 被擠在佇列裡的 J3、J4——服務能力是「易腐品」，當下沒用掉就永久蒸發。等待不能用之後的空檔退款。\n\n**觀察三：叢發的代價是平方的。**一團 b 個 job 同時抵達一台閒著的 worker，第 i 個（從 0 數起）要等前面 i 個做完，等待 i·E[S]；整團的總等待是 (0+1+⋯+(b−1))·E[S] = b(b−1)/2 · E[S]。這是完整推導——只是算術，但結論有牙齒：**團的大小翻倍，總等待大約翻四倍**。適用條件：服務時間固定為 E[S]、worker 在整團抵達時閒置、排空前沒有其他 job 插進來、先到先服務。本例 b = 4：4·3/2 × 100 ms = 600 ms，和手排的表一致。\n\n注意，到目前為止**沒有任何機率出場**——兩條時間線都是純算術，隨機性還沒登場，等待已經出現了。機率（Part II）要解決的是下一個問題：真實世界的到達不是你手排的，叢發以什麼頻率、什麼大小出現？「隨機到達」本質上就是永不停歇的小叢發。把這件事定量化之後你會得到全書最重要的一條敘事線：**隨機性（變異數）本身就是延遲的來源**——到達的不規則要付費（ch14），服務時間的不規則也要付費（ch12），帳單上會有它們各自的明細。\n\n## 使用率階梯：80% 警戒線下面是懸崖\n\n上面的例子固定了 ρ = 0.8。現在問：等待對 ρ 多敏感？\n\n先把答案的形狀給你。對最簡單的隨機佇列模型 M/M/1（Poisson 到達、指數分布服務時間、單一伺服器、先到先服務、穩態、ρ < 1——每個詞在 ch08 之前都會有精確定義，現在先當「教科書第一個模型」），平均回應時間是：\n\n```text\nE[T] = E[S] / (1 − ρ)\n```\n\n本章不推導它（ch08 用生滅過程一步一步兌現），但你現在就可以用它讀數字。取 E[S] = 100 ms，這就是全書的**使用率階梯**：\n\n| ρ | 剩餘容量 1−ρ | E[T] |\n|---|---|---|\n| 0.50 | 0.50 | 0.2 s |\n| 0.80 | 0.20 | 0.5 s |\n| 0.90 | 0.10 | 1.0 s |\n| 0.95 | 0.05 | 2.0 s |\n| 0.99 | 0.01 | 10 s |\n\n```text\nE[T]   （示意，兩軸皆非等比例）\n10 s  ┤                                        *  ← ρ = 0.99\n      │                                        *\n      │                                       *\n 2 s  ┤                                      *  ← ρ = 0.95\n 1 s  ┤                                    *  ← ρ = 0.90\n0.5 s ┤                                *  ← ρ = 0.80（基準尖峰）\n0.2 s ┤                    *  ← ρ = 0.50\n0.1 s ┤    *   *   *   *  ← 低使用率時 E[T] ≈ E[S]\n      └───────────────────────────────────────────► ρ\n       0                   0.5         0.8     1.0\n```\n\n這就是你在每一次壓測裡看到的那條曲線——hockey stick。讀它的正確姿勢有三條：\n\n第一，**分母是 1−ρ，不是 ρ**。直覺把使用率當線性刻度：「80% 用掉了，還有 20% 餘裕」。但延遲關心的是剩餘容量的倒數：從 0.8 到 0.9，流量只增加 12.5%，剩餘容量卻砍半，平均回應時間從 0.5 s 翻倍到 1.0 s。從 0.95 到 0.99，流量只再多 4.2%，延遲從 2 s 變 10 s。**剩餘容量每砍半，延遲翻倍**——這才是值得放進心算的形式。\n\n第二，低使用率端幾乎免費。ρ → 0 時 E[T] → E[S] = 0.1 s（把 ρ = 0 代入公式即得）；ρ = 0.5 也才 0.2 s。曲線的左半邊平到讓人誤以為它永遠平下去——這正是「上週還好好的，這週多了 15% 流量就炸了」的數學機制。\n\n第三，**爆炸是漸近的，不是踩到開關**。不存在一個「超過就壞掉」的魔法數字；80% 只是人類選了一個落在「曲線開始彎」的整數。它該不該是 80，取決於這條曲線的形狀，而曲線的形狀取決於模型假設——M/M/1 的階梯數字搬到別的系統會錯多少，是「陷阱與防禦」一節的主題，也是 ch09／ch12／ch14 各自要修正的帳。\n\n## 平均值只說了一半：P99 的預告\n\n階梯表給的是平均。你的 SLA 不是用平均訂的。\n\n預告一個 ch08 的結果：在 M/M/1（同樣的適用條件：Poisson 到達、指數服務、單一伺服器、FCFS、穩態）裡，回應時間 T 的完整分布是已知的——指數分布，參數 μ−λ——所以任何百分位都能直接寫出來。P99 是：\n\n```text\nt₉₉ = ln 100 / (μ − λ) ≈ 4.6052 / (μ − λ)\n```\n\n而平均是 E[T] = 1/(μ−λ)，所以 **M/M/1 的 P99 永遠約等於 4.6 倍平均**（ln 100 ≈ 4.6052）。推播管線基準：μ−λ = 2，E[T] = 0.5 s，t₉₉ ≈ 2.30 s。\n\n兩件事值得現在記下。其一，「平均 0.5 s」與「百分之一的使用者等超過 2.3 s」是同一個系統的同一個穩態——平均值正常從來不代表尾巴正常，監控只看平均等於閉一隻眼。其二，4.6× 這個倍數**是 M/M/1 專屬的**：它依賴指數分布那條瘦得很有教養的尾巴。當服務時間是重尾分布（少數 job 大得離譜——你那支偶爾跑 30 秒的報表 query），P99 與平均會徹底脫鉤，4.6× 規則死得很難看，多難看 ch15 會算給你看。平均與 tail 是兩回事，這是全書六條主線之一。\n\n## 地圖的語言：Kendall 記號一瞥\n\n前面已經偷跑了 D/D/1 和 M/M/1。這套速記是 Kendall 1953 年引入的，格式是 **A/S/c**，有時加第四欄 **/K**：\n\n| 欄位 | 意思 | 常見取值 |\n|---|---|---|\n| A | 到達過程 | M = Poisson（無記憶，memoryless）、D = 固定間隔、G = 任意分布 |\n| S | 服務時間分布 | M = 指數、D = 固定、G = 任意 |\n| c | 伺服器數 | 1、c、∞ |\n| K | 系統容量上限 | 省略 = 無限；寫了就是「滿了拒收」 |\n\n你只需要把它當地圖上的地名，正式定義與預設慣例（FCFS 等）在 ch08。本書的主要停靠站：\n\n| 記號 | 白話 | 章 |\n|---|---|---|\n| M/M/1 | 隨機到達、指數服務、一台機器——第一個能完整解出來的模型 | ch08 |\n| M/M/c | c 台機器共用一條佇列——池化與 Erlang 公式 | ch09 |\n| M/M/1/K | 容量有上限、滿了丟棄——backpressure 的數學 | ch10 |\n| M/G/1 | 服務時間任意分布——變異數開始收費 | ch12 |\n| G/G/1 | 到達與服務都任意——沒有精確解，只有 Kingman 的近似 | ch14 |\n\n「G」是個誠實的字母：它承認你對分布一無所知，而理論能告訴你「只知道平均和變異數時，最多還能說什麼」。\n\n## 這門理論能回答什麼、不能回答什麼\n\n買地圖之前先看清楚它涵蓋的疆域。**排隊理論能回答的**（在各模型的假設成立時）：\n\n1. **穩態的平均量**：平均佇列長、平均等待、系統內平均人數——有些模型還給完整分布，連 P99 都能寫成公式（ch08、ch12）。\n2. **穩定性的邊界**：什麼條件下佇列必然無限長大、什麼條件下存在穩態（ch07、ch08），以及 retry 迴圈怎麼把一個本來穩定的系統推過邊界（ch16）。\n3. **配置決策**：給定 SLA 要幾台伺服器（ch09）、buffer 該多大與丟棄率多少（ch10）、一台快機與多台慢機誰贏（ch09）、排程順序怎麼選與代價是什麼（ch13）。\n4. **變異數的價格**：到達或服務的不規則會讓等待多多少——精確到公式（ch12、ch14）。\n5. **網路層級的行為**：多站系統的瓶頸在哪、各站佔用多少、整體回應時間多長（ch16–18）。\n6. **公式失效時的退路**：什麼時候只能模擬、模擬要怎麼做才不騙人（ch19）。\n\n**它不能回答、或天生不直接回答的**：\n\n1. **個案的因果**——「昨天 14:03 那次尖峰的根因是什麼」。理論給的是分布層級的敘述（這種尖峰多常發生、多大），不是單一事件的因果鏈；事後歸因是 trace 和 log 的工作。\n2. **暫態動態的細節**——過載怎麼升起、退潮要多久。本書主攻穩態；過載動態的數學（fluid／diffusion 近似）只在 ch21 的地圖上標位置。\n3. **確定性的 worst-case 保證**——「最壞情況下絕不超過 X ms」屬於 network calculus 的世界，本書一句話帶過（見 ch21）。\n4. **服務時間為什麼長這樣**——cache 命中、GC、資料傾斜是系統知識；理論把 E[S] 與它的變異數當輸入，不解釋它們的成因。\n5. **人的策略行為**——「隊太長使用者就走了」如果是使用者的理性決策，那是 strategic queueing 的題目，本書不展開（見 ch21）。\n\n## 經驗法則的審判：全書的案件清單\n\n你的工程生涯累積了一批「大家都這麼說」的黑話。它們多數有真實的經驗基礎，但經驗法則和定理的差別在於：定理自帶適用條件，黑話沒有——所以黑話會在你最需要它的時候背叛你。本書把它們一條一條送上法庭：**立案在這裡，各章審理，ch20 逐條宣判**。判決只有三種：成立（升格為定理）、有條件成立（附上精確的適用範圍）、推翻。\n\n這份清單是全書的契約，之後各章引用時寫「審判 #N」：\n\n| # | 工程黑話 | 開庭要回答的問題 | 承審章 |\n|---|---|---|---|\n| 1 | 「使用率不要超過 80%」 | 80 是定理還是迷信？什麼時候警戒線該是 60、什麼時候可以是 95？ | ch08 立案、ch09/ch14 修正 |\n| 2 | 「慢了就加機器」 | 加在哪才有效？池化和拆分誰贏？什麼時候加機器救不了你？ | ch09、ch15、ch16 |\n| 3 | 「平均沒事就沒事；要看尾巴，盯 P99 就夠」 | 平均與 tail 什麼時候脫鉤？P99 的量測本身怎麼騙人？ | ch08、ch15、ch19 |\n| 4 | 「retry 是免費的保險」 | retry 把 λ 放大多少？什麼時候把系統推下懸崖、而且鬆手也回不來？ | ch16、ch20 |\n| 5 | 「buffer 開大一點總沒錯」 | 大 buffer 治什麼、不治什麼、什麼時候只是把死刑改成凌遲？ | ch10 |\n| 6 | 「上下游各自做容量規劃就好」 | 「上游的輸出＝下游的輸入」在什麼數學條件下合法？ | ch11、ch16、ch18 |\n| 7 | 「壓測跑三次取平均就穩了」 | 模擬與壓測的輸出統計要怎麼做才誠實？固定 VU 的壓測看得到真實過載嗎？ | ch17、ch19 |\n| 8 | 「已經等這麼久了，應該快輪到了」 | 等待的歷史對剩餘等待透露了什麼——還是什麼都沒透露？ | ch04、ch12 |\n\n全部案件在 ch20 結案重審——到時你手上會有本章還沒給你的全部工具。\n\n## 陷阱與防禦\n\n本章沒教你任何可以推導的東西，但已經給了三個可以**誤用**的數字（階梯表、4.6× 規則、b(b−1)/2）。先把護欄裝上：\n\n| 陷阱 | 它怎麼騙你 | 怎麼自我察覺與防禦 |\n|---|---|---|\n| 把使用率階梯當萬用常數表 | 階梯數字是 M/M/1 專屬。服務時間固定時等待砍半（M/D/1，見 ch12）；同樣 ρ 之下多台伺服器共用佇列等待更低（見 ch09）；重尾服務時間下可以差一個數量級以上（見 ch15） | 引用任何數字前先問「這是哪個模型算的、我的系統哪裡像哪裡不像」；說不出模型名，就只信形狀、不信數字 |\n| 用平均率判定「不會排隊」 | λ < μ 只保證長期追得上，對任何短窗口零承諾——本章手排例 λ = 8 < μ = 10，平均等待 75 ms、最倒楣的 job 等 300 ms | 聽到「容量夠所以不會等」就去找叢發：到達間隔真的接近等距嗎？上游有沒有批次、retry、cron？ |\n| 拿「P99 ≈ 4.6× 平均」走天下 | 它是 M/M/1 的精確結果，靠的是指數分布的瘦尾巴；重尾之下 P99 與平均脫鉤，誤差可以大到一個數量級（ch15 會算給你看） | 規則跟著模型走：講得出假設才准用；講不出來，P99 一律實測 |\n| 把 ρ 讀成線性刻度 | 「還有 20% 餘裕」聽起來像「還能加 20% 的量、代價不變」；實際上 0.8 → 0.9 流量只多 12.5%，平均延遲翻倍 | 心算一律用 1/(1−ρ) 的形式：剩餘容量減半 ⇒ 延遲翻倍 |\n\n## 紙上推演\n\n### 題 1：手排兩團叢發 **[15 分鐘] ★**\n\n同樣 8 個 job、每個服務恰好 100 ms、單一 worker、先到先服務（λ = 8、μ = 10 不變）。這次到達時刻是 0, 0, 0, 0, 500, 500, 500, 500 ms——兩團各 4 個。\n\n(a) 手排完整時間線（每個 job 的開始、完成、等待），算總等待與平均等待，和本章兩條時間線（等距：總等待 0；一團 4 個：總等待 600 ms）比較。\n(b) 如果第二團提早到 t = 300 ms（第一團還沒排空），總等待變多少？為什麼變多？\n\n### 推演解答\n\n(a) 第一團在 t = 400 排空，worker 閒置到 500，第二團抵達時又是一台閒機器：\n\n| Job | 到達 (ms) | 開始 (ms) | 完成 (ms) | 等待 (ms) |\n|---|---|---|---|---|\n| J1–J4 | 0 | 0/100/200/300 | 100/200/300/400 | 0/100/200/300 |\n| J5–J8 | 500 | 500/600/700/800 | 600/700/800/900 | 0/100/200/300 |\n\n總等待 600 + 600 = 1,200 ms，平均 150 ms。三條時間線同樣的 λ 與 μ：等距 0、一團 75 ms、兩團 150 ms 的平均等待——**「到達的形狀」是一個獨立的變數**，而我們還沒有任何語言去量化它（ch03 的 C²ₐ 就是那個語言，ch14 把它寫進帳單）。每團恰好貢獻 b(b−1)/2 · E[S] = 600 ms，因為兩團彼此不重疊：適用條件「整團抵達時 worker 閒置」對兩團都成立。\n\n(b) 第二團在 t = 300 抵達時，J4 還有整整 100 ms 的工作沒做。J5–J8 的每一個都得多扛這 100 ms 的殘留 backlog：等待變成 100/200/300/400，第二團小計 1,000 ms，總等待 1,600 ms（= 1,200 + 4×100，與逐項手排一致；worker 從 0 連續忙到 800）。教訓：**叢發的代價不只平方於團的大小，重疊的叢發還會把殘留等待往後傳**。隨機到達會三不五時送你重疊的叢發——這是 hockey stick 右端那麼陡的原因之一。常見錯路：把 (b) 算成「跟 (a) 一樣，只是提早 200 ms 發生」——錯在忘了檢查「抵達時 worker 是否閒置」這個適用條件。\n\n### 題 2：把階梯反過來用 **[5 分鐘] ★**\n\n沿用 M/M/1 假設與 E[T] = E[S]/(1−ρ)，單一 worker。\n\n(a) worker 不變（E[S] = 100 ms），要求尖峰平均回應 E[T] ≤ 0.25 s，使用率最多能到多少？對應的 λ 上限是多少？\n(b) 尖峰 λ = 8 則/s 不變，要求同樣的 E[T] ≤ 0.25 s，worker 要多快（μ 至少多少、E[S] 至多多少）？\n\n### 推演解答\n\n(a) 0.1/(1−ρ) ≤ 0.25 ⇒ 1−ρ ≥ 0.4 ⇒ **ρ ≤ 0.6**，即 λ ≤ 6 則/s。複核：0.1/0.4 = 0.25 ✓。注意要求「平均回應壓在 2.5 倍服務時間內」就已經把可用容量砍到六成——SLA 越緊，你能用的使用率越低，這是用白紙黑字買 headroom。\n\n(b) 改 μ 的時候 E[S] = 1/μ 跟著變，不能只動分母。把 E[S] = 1/μ、ρ = λ/μ 代入：\n\n```text\nE[T] = (1/μ) / (1 − λ/μ) = 1/(μ − λ)   ← 純代數整理\n```\n\n要 1/(μ−8) ≤ 0.25 ⇒ **μ ≥ 12 則/s**（E[S] ≤ 83.3 ms）。複核：μ = 12 時 ρ = 8/12 ≈ 0.667，E[T] = (1/12)/(1/3) = 0.25 s ✓。常見錯路：拿 (a) 的「ρ ≤ 0.6」直接解 8/μ ≤ 0.6 得 μ ≥ 13.3——錯在沿用了舊的 E[S]；換了 μ，整條階梯的縱軸刻度都變了。順帶看見一個漂亮的事實：M/M/1 的平均回應時間只由「剩餘服務能力 μ−λ」決定（這個形式 ch08 會正式推導）。\n\n### 題 3：三個系統，各歸地圖哪一塊 **[10 分鐘] ★★**\n\n判斷下列系統各該用排隊理論的哪一塊分析，說出推理（提示：對每個系統問三個問題——到達是開放還是封閉？容量有限嗎？有沒有回饋迴圈？）：\n\n(a) SQS 佇列＋8 個 worker consumer；backlog 實務上無上限；訊息來自幾十萬個互相獨立的使用者。\n(b) k6 壓測：200 個 VU，每個 VU 收到回應才送下一個 request。\n(c) API gateway 限制同時在途請求 1,000 個，超過直接回 429；client 收到 429 之後會 retry。\n\n### 推演解答\n\n(a) **開放、容量近似無限、無回饋**：到達者不管系統多滿都照來（幾十萬獨立來源的匯流也是 ch05 解釋「為什麼到達常像 Poisson」的典型場景）。8 個 worker 共用一條佇列 → M/M/c 一族（ch09）；若 job 處理時間的變異大或有重尾，再加上 ch12／ch15 的修正。\n(b) **封閉**：系統裡永遠最多 200 個「在途請求」，回應變慢時 VU 自動變慢——負載會自我節流。這是 ch17 的封閉網路（ch02 的 bounds 先給你粗答案）；它也是「固定 VU 壓測天生看不到真實過載」的原因，ch19 會正式開庭。\n(c) **開放、容量有限（K = 1,000）、有回饋**：滿了拒收是 M/M/c/K 一族（ch10）；但 429 觸發 retry，把被拒的流量送回到達端——這個回饋迴圈是 ch16 的 feedback 與 ch20 retry storm 的主場。三個問題裡「有沒有回饋」最容易漏看，而它恰好是把系統從「可解」推向「會雪崩」的那一個。\n\n### 題 4：口頭重講 **[10 分鐘] ★**\n\n不看書，對空氣講 90 秒：「為什麼 ρ < 1 的系統還會排隊？」講完再對照解答。\n\n### 推演解答\n\n合格的講稿至少要有這兩個成分，缺一個都不算懂：\n\n1. **等待來自局部超載**：λ < μ 是長期平均的承諾，對短窗口無效；只要到達有叢發（而隨機到達就是持續的小叢發），瞬間需求就會超過瞬間供給，超出的部分變成佇列。\n2. **閒置不可儲存**：佇列消化靠的是「之後的空檔」，但空檔不能預存、也不能回溯使用——叢發前 worker 閒掉的每一毫秒都永久蒸發了，所以叢發造成的等待是淨損失，不會被平均率「攤平」。\n\n加分項：指出 D/D/1 是對照組（確定性世界裡 λ < μ ⇒ 零等待），所以等待的來源精確地說是**變異**，不是負載本身。常見錯路：「因為運氣不好」（沒有機制，不及格）；「因為瞬間 λ 超過 μ」（只講了成分 1——如果閒置可以儲存，瞬間超載也不會累積等待）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼 λ < μ 的系統還會排隊？你的答案有沒有同時包含「局部叢發」與「閒置不可儲存」兩個成分？\n2. D/D/1 為什麼完全不排隊？這對「延遲的真正來源是什麼」說了什麼？\n3. 使用率從 0.8 升到 0.9，平均回應時間怎麼變？為什麼用「剩餘容量 1−ρ」當座標比用 ρ 誠實？\n4. 使用率階梯的五個數字是在哪些假設下算出來的？你現在的系統最可能違反其中哪一個？\n5. 「P99 ≈ 4.6× 平均」的適用條件是什麼？什麼樣的服務時間分布會讓它死掉？\n6. Kendall 記號 M/G/1 的三個欄位各說了什麼？「G」承認了什麼樣的無知？\n7. 舉兩個排隊理論不能回答的問題，並分辨：是「本書後面會教」還是「理論天生不管」？\n\n## 延伸閱讀\n\n- Mor Harchol-Balter, *Performance Modeling and Design of Computer Systems: Queueing Theory in Action*, Cambridge University Press, 2013 — 本書的主要參考教科書；官網有第 1 章免費試讀，先讀它感受「電腦系統視角的排隊理論」長什麼樣。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Ivo Adan & Jacques Resing, *Queueing Systems*（TU Eindhoven 講義，2015-03-26 版，全本免費 PDF）— 精簡嚴謹的免費替代品；讀前兩章的引言與基本概念，跟本章互為印證。https://www.win.tue.nl/~iadan/queueing.pdf\n- MacTutor: Agner Krarup Erlang（1878–1929）傳記 — 1909 與 1917 兩篇里程碑論文的脈絡：這門數學誕生於真實的工程壓力，不是書房裡的遊戲。https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/\n- Jeffrey Dean & Luiz André Barroso, \"The Tail at Scale\", *Communications of the ACM* 56(2), 2013 — 「平均與 tail 是兩回事」的工程定錨文獻；本章只預告了 P99，這篇講大規模系統怎麼跟 tail 共處（ch20 回收）。https://research.google/pubs/the-tail-at-scale/\n- Marc Brooker, \"Surprising Economics of Load-Balanced Systems\"（2020-08-06）— 用 Erlang-C 把「同樣 80% 使用率，池子越大延遲越好」算給你看；hockey stick 的互動體感版，也是 ch09 的開胃菜。https://brooker.co.za/blog/2020/08/06/erlang.html\n"}, {"id": "ch02-operational-laws", "file": "ch02-operational-laws.md", "group": "Part I — 地圖與定律", "title": "ch02 — 操作分析：不用機率的鐵律", "md": "# ch02 — 操作分析：不用機率的鐵律\n\n> **本章解決什麼問題**：ch01 解釋了為什麼會排隊，但還沒給你任何能算的東西。本章給第一批武器：operational laws——只靠「數數字」就成立的恆等式，不需要任何分布假設。主角是 Little's Law（E[N] = λE[T]），配角是 Utilization Law、Forced Flow Law 與 Response Time Law；終場用 bottleneck 分析，不解任何模型就算出封閉系統的吞吐天花板與拐點。之後每一章的機率模型（ch03 起）都必須服從這些鐵律——它們既是地基，也是你的驗算器。\n\n## 從你已知的出發\n\n你在容量規劃的試算表裡寫過這條公式：\n\n```text\nconcurrent ≈ RPS × avg latency\n```\n\n要撐 8,000 RPS、平均延遲 250 ms，就需要 8000 × 0.25 = 2,000 個並發槽位——連線、worker、goroutine，隨便什麼。你用它估過 worker pool 大小，也用它反推過「3,200 條 WebSocket 並發連線到底對應多少訊息流量」。\n\n這條公式就是 Little's Law。你一直在用一條 1961 年才被一般性證明的定理，而且——這是本章的重點——你大概沒想過它什麼時候會騙你：觀察窗沒選對會騙你、系統邊界沒劃清會騙你、拿 P95 代替平均會騙你。本章把它從黑話升級成定理：精確的敘述、你能口頭重講的證明、以及適用邊界。\n\n另一件你每天在做的事：k6 開 50 個 VU 壓 API。那是一個**封閉系統**——在途請求數固定、上一個回來才發下一個——它與線上真實流量（開放系統）的行為差異大到值得一整章（見 ch17）。本章先發給你封閉系統的第一批武器：Response Time Law 與 bottleneck bounds，讓你不寫模擬、不解模型，就能畫出壓測曲線的天花板。\n\n## 操作分析：只信量得到的數\n\n排隊理論的多數結果長這樣：「假設到達是 Poisson、服務是指數分布，則……」。操作分析（operational analysis）反其道而行：**只從可量測量出發，不做任何分布假設**。這套世界觀在 1970 年代由 Buzen 與 Denning 建制化（Denning & Buzen 1978 的 tutorial 至今仍是標準入口），動機很工程：機房裡的人量得到吞吐與忙碌時間，但沒有任何辦法「量到」到達過程是不是 Poisson。\n\n選一個觀察窗，長度 τ。對窗內的一個系統（或系統裡的一台裝置），你能直接量到四個數：\n\n| 量測量 | 意義 | 監控對應物 |\n|---|---|---|\n| A(τ) | 窗內到達數 | request counter 差分 |\n| C(τ) | 窗內完成數 | response counter 差分 |\n| B(τ) | 窗內忙碌總時間 | CPU busy time、`1 − idle` 的積分 |\n| J(τ) | 系統內個數對時間的累積面積（單位：則·秒） | in-flight gauge 每秒取樣加總 |\n\n從這四個數定義出所有導出量：吞吐 X = C/τ、使用率 ρ = B/τ、平均服務時間 E[S] = B/C（每個完成的 job 平均消耗多少服務時間）、系統內平均個數 E[N] = J/τ、平均逗留時間 E[T] = J/C。本章的 E[N]、E[T] 都先讀成這種「窗口平均」；ch03 之後它們會升級成機率期望值，兩種讀法在表現良好的系統裡相等（ch06 的 ergodic 定理會發這張執照）。\n\n整套方法只有一個信仰之躍：**把窗口平均當成長期平均**。窗內的恆等式是算術、無可懷疑；「這 60 秒量到的 ρ 代表這個系統的 ρ」才是假設——窗口要夠長、要落在行為平穩的時段。本章所有「定律」都繼承這一個（而且只有這一個）假設。\n\n第一條定律現在是免費的。**Utilization Law**：\n\n```text\nρ = B/τ = (C/τ)·(B/C) = X·E[S]\n```\n\n**嚴謹度：完整推導**——其實只是把一個分數拆成兩個分數，窗內精確成立，沒有任何假設。但讀法很有內容：使用率 = 吞吐 × 平均服務時間。你的服務 X = 8 則/s、每則平均吃 100 ms，那 ρ = 0.8 不是巧合、不是量測、是算術。operational laws 全部長這樣：恆等式本身是算術，「定律」的力量在於它把幾個你以為獨立的監控指標鎖死在一起——其中一個量錯了，另外兩個會供出它。\n\n## Little's Law：一塊面積的兩種切法\n\n### 直覺版：面積雙算\n\nJ(τ) 是一塊面積。關鍵觀察：這塊面積有兩種切法。\n\n三個 job 的迷你例子：job 1 在 t=0 到達、t=3 離開；job 2 在 t=1 到達、t=4 離開；job 3 在 t=2 到達、t=6 離開。先直著切——畫出 N(t)，每個瞬間數人頭：\n\n```text\nN(t)\n 3 │        ┌───┐                  ← 直切：細直條，高度 = 那一瞬間的 N(t)\n 2 │    ┌───┘   └───┐\n 1 │┌───┘           └───────┐\n 0 │┘                       └──\n   └───────────────────────────→ t\n    0   1   2   3   4       6\n```\n\n再橫著切——同一塊面積，每條橫帶是一個 job 從到達到離開的逗留：\n\n```text\n   t →  0   1   2   3   4   5   6\n job 1  ████████████             ← T₁ = 3 s\n job 2      ████████████         ← T₂ = 3 s\n job 3          ████████████████ ← T₃ = 4 s\n```\n\n直切加總：1+2+3+2+2 = 10 則·秒。橫切加總：3+3+4 = 10 則·秒。同一塊面積，當然相等。現在除以不同的東西：\n\n```text\nJ/τ = 10/6 ≈ 1.67   ← 除以窗長：N 的時間平均\nJ/C = 10/3 ≈ 3.33 s ← 除以完成數：每個 job 的平均逗留\nX   = C/τ = 3/6 = 0.5/s\n驗證：1.67 = 0.5 × 3.33 ✓\n```\n\n這就是 Little's Law 的全部直覺：**E[N] = X·E[T] 只是同一塊面積除以兩個不同分母，再用吞吐把它們黏起來**。\n\n### 工程師的嚴謹：有限觀察窗的證明\n\n**嚴謹度：工程師的嚴謹——每一步都能口頭說出理由**。設窗口 [0, τ] 頭尾系統皆空（稍後放寬）。令 1ⱼ(t) 為 indicator：job j 在時刻 t 在系統內時取 1，否則取 0。\n\n```text\nJ(τ) = ∫₀^τ N(t) dt          ← 面積的定義\n     = ∫₀^τ Σⱼ 1ⱼ(t) dt      ← N(t) 本來就是「在場 job」的 indicator 之和\n     = Σⱼ ∫₀^τ 1ⱼ(t) dt      ← 有限和與積分交換：窗內 job 數有限，合法\n     = Σⱼ Tⱼ                 ← 每個 indicator 的積分就是該 job 的逗留時間\n```\n\n兩邊除以 τ，再把右邊乘除 C：\n\n```text\nJ/τ = (C/τ) · (Σⱼ Tⱼ / C)\nE[N] = X · E[T]              ← 窗內精確成立，零機率假設\n```\n\n窗口頭尾不空怎麼辦？跨越邊界的 job 讓 J 與 ΣTⱼ 差了一截「邊角面積」。這截誤差最多是（頭尾在場數 × 它們的窗內逗留），除以 τ 之後，只要**系統不無限堆積**（N(τ)/τ → 0）且窗夠長，邊角項就被攤薄到零。於是取 τ → ∞：若長期平均到達率 λ = lim A(τ)/τ 存在、E[T] 的極限存在，且系統穩定（完成追得上到達，X → λ），就得到正式版：\n\n**E[N] = λE[T]。**\n\n這個推導值得你抄一遍——它是全書最便宜也最耐用的一條定理。\n\n### 嚴格版：Stidham 1974（指路，不證）\n\nL = λW 在 1961 年之前是 folk theorem：所有人都在用，沒有人給過一般性證明。Little 1961 在平穩隨機過程的假設下給出第一個證明；Stidham 1974 把假設削到極薄——論文標題就叫 \"A Last Word on L = λW\"（「最後一句話」，數學家的冷幽默）：\n\n```text\nStidham (1974)：對單一條樣本路徑，只要\n  λ = lim A(t)/t            存在且有限\n  E[T] = lim (T₁+…+Tₙ)/n    存在且有限\n則 E[N] = lim (1/t)∫₀ᵗ N(s)ds 存在，且 E[N] = λE[T]。\n```\n\n注意它要的東西少到什麼程度：不需要平穩性、不需要獨立性、不需要任何分布——甚至不需要隨機。對一條「已經發生的歷史」它也成立。本書不證（證明只有幾頁，延伸閱讀有原文）；Little 本人在 50 週年回顧（2011）裡詳述了這段從黑話到定理的歷史。\n\n### 適用條件：「無關」才是它可怕的地方\n\nLittle's Law 與以下**全部無關**：\n\n- 到達過程的分布與相關性（Poisson 與否、叢發與否）；\n- 服務時間分布（C²ₛ 是 0 還是 100 都一樣——C² 是什麼見 ch03）；\n- 排程（FCFS、LCFS、processor sharing、priority……只要不弄丟 job）；\n- 內部結構（單伺服器、worker pool、整條 microservice 鏈——邊界框起來就算數）。\n\n它**需要**的只有兩件事：\n\n1. **穩定、長期平均存在**：λ 的極限存在有限、逗留時間的平均收斂、系統不無限堆積。過載系統（到達超過容量）不滿足——E[T] 發散，定律以「兩邊都是無限大」的形式空洞地成立，對你毫無用處。\n2. **邊界一致**：E[N]、λ、E[T] 三個量必須用**同一條**系統邊界、數**同一群** job。\n\n「無關性」是雙面刃。正面：它在任何邊界上都能用，是萬用驗算器——三個平均量你量到兩個，第三個免費；三個都量到，互相對帳，對不上就是監控有 bug。反面：**它對分布不敏感，所以它對分布也一無所知**。兩個系統 E[T] 相同、P99 差 20 倍，Little 完全看不出差別。它是守恆律，不是效能模型：它說三個平均值永遠綁在一起，但從不告訴你它們各自是多少、更不告訴你 tail 長什麼樣。「為什麼是這個值」要等機率模型（見 ch08），「tail 多肥」要等 ch12 與 ch15。\n\n### 與教科書記號的對照（全書只說這一次）\n\n教科書傳統用 L 與 W 敘述這條定律。對照表如下，附錄 A 會再收錄一次；本書內文一律用 E[N]/E[T]——因為 N 和 T 是隨機變數，之後要談它們的分布與 tail，L/W 這種「平均值專用名」會讓你誤以為平均就是全部。\n\n| 本書記號 | 教科書記號 | 讀法 |\n|---|---|---|\n| E[N] | L | 系統內平均 job 數 |\n| E[N_Q] | L_Q（亦寫 Lq） | 佇列中平均 job 數（不含服務中） |\n| E[T] | W | 平均逗留時間（含服務） |\n| E[T_Q] | W_Q（亦寫 Wq） | 平均等待時間（不含服務） |\n\nLittle's Law 的教科書寫法 L = λW，即 E[N] = λE[T]。\n\n## E[N] = λE[T] 三連發：邊界框到哪，定律管到哪\n\n定律裡的「系統」是**你自己畫的虛線框**。同一台機器，框三次，得到三條不同的結論：\n\n```text\n   ┌-------------------------------------┐\n   :      [o][o][o]        (( S ))       :\nλ ─→      佇列 N_Q          服務中        ─→ X\n   └-------------------------------------┘\n     邊界 1：全框   邊界 2：只框佇列   邊界 3：只框服務位\n```\n\n1. **框整個系統**：E[N] = λE[T]。\n2. **只框佇列**（服務位不算）：E[N_Q] = λE[T_Q]。等待中的 job 數對等待時間，同一條定律。\n3. **只框服務位**：單伺服器的服務位裡不是 0 個就是 1 個 job，所以「服務位內平均個數」就是「服務位非空的時間比例」，也就是使用率。而 Little 說它等於 λE[S]。所以 **E[N_服務中] = λE[S] = ρ**——Utilization Law 被 Little 重新發明了一次，而且多送你一個讀法：*使用率就是「平均有多少個 job 正在被服務」*。c 台伺服器時同理：平均忙碌台數 = λE[S]，除以 c 就是每台的平均使用率。\n\n三條合起來還白送一個恆等式：E[N] = E[N_Q] + ρ、E[T] = E[T_Q] + E[S]。\n\n順手用它重看一眼你的舊系統：WebSocket 通知系統 ~10M 訊息/月，平均到達率 λ = 10⁷/(30 × 86400) ≈ 3.86 則/s；就算每則端到端處理要 100 ms，E[N] = λE[T] ≈ 0.386——**平均同時在處理的訊息不到一則**。3,200 條並發連線聽起來嚇人，但連線數不是負載，in-flight 才是；那個系統真正的工程難題在尖峰倍率與連線狀態管理，不在平均吞吐。一條定律就把「該擔心什麼」排了序。\n\n### Worked example：從 60 秒的監控數據推出全套指標\n\n推播管線的發送 worker（單一服務位），你抓了一段 60 秒的觀察窗，量到四個原始數字：完成 C = 480 則、忙碌 B = 48 s、in-flight gauge 每秒取樣積分 J = 240 則·秒；窗口頭尾在場數相同、A = C = 480（進出平衡的乾淨窗口）。一步一步推：\n\n| 量 | 怎麼算 | 數值 |\n|---|---|---|\n| 吞吐 X | C/τ = 480/60 | 8.00 則/s |\n| 使用率 ρ | B/τ = 48/60 | 0.800 |\n| 平均服務時間 E[S] | B/C = 48/480 | 0.100 s（μ = 1/E[S] = 10 則/s） |\n| 系統內平均 E[N] | J/τ = 240/60 | 4.00 則 |\n| 平均逗留 E[T] | J/C = 240/480 | 0.500 s |\n| 服務中平均 | = ρ | 0.800 則 |\n| 佇列平均 E[N_Q] | E[N] − ρ = 4 − 0.8 | 3.20 則 |\n| 平均等待 E[T_Q] | E[N_Q]/X = 3.2/8 | 0.400 s |\n\n自我複核（操作分析的紀律就是對帳）：Utilization Law：X·E[S] = 8 × 0.1 = 0.8 = ρ ✓；Little：X·E[T] = 8 × 0.5 = 4 = E[N] ✓；分解：E[T_Q] + E[S] = 0.4 + 0.1 = 0.5 = E[T] ✓。全部咬合。\n\n注意我們得到了什麼、沒得到什麼。得到：平均值的完整一套帳，零機率假設。沒得到：*為什麼* ρ = 0.8 時 E[N] 是 4 而不是 2？P99 是多少？這兩題操作分析天生答不了——ch08 會用 M/M/1（λ = 8、μ = 10）從機率推出一模一樣的這組平均值，外加分布與 P99。模型與量測在平均值上對得起來，是模型及格的最低門檻，不是它正確的證明。\n\n## 封閉系統：Response Time Law\n\n換一種系統：互動式。N 個使用者繞圈圈——想 Z 秒（think time），送出一個請求，等 E[T] 秒拿到回應，再想 Z 秒……。k6 的 VU、固定大小的 connection pool、配額固定的 batch worker，全是這種封閉迴圈。\n\n把 Little 的虛線框畫在**整個迴圈**上：迴圈裡永遠剛好 N 個使用者（這就是「封閉」的意思），每人的一圈平均耗時 Z + E[T]，迴圈的流量是系統吞吐 X：\n\n```text\nN = X · (E[T] + Z)        ← Little 框住整個迴圈\n⇒ E[T] = N/X − Z          ← Response Time Law\n```\n\n**嚴謹度：完整推導**（它就是 Little 換個邊界）。實用價值：壓測時 X 和 N 是你最容易量準的兩個數，E[T] 用這條反推，比相信 client 端統計可靠。數字感受一下：50 個 VU、think time 1 s 的腳本，量到吞吐 41.7/s，那麼 E[T] = 50/41.7 − 1 = 0.199 s——不用看任何 client 端的延遲直方圖就拿到了平均。它同時是一句警告：固定 VU 的壓測裡 N 被釘死，X 與 E[T] 被這條式子鎖在蹺蹺板兩端——這個系統**天生不會過載**，跟線上開放流量是兩種動物（見 ch17）。\n\n## Forced Flow Law 與 service demand：瓶頸的量尺\n\n真實系統不是一台裝置。一個 job 在系統裡會訪問多台裝置、有的還訪問多次：一則推播打一次 API node、查三次 DB。操作分析用兩個概念接住這件事。\n\n**Visit ratio** Vᵢ = Cᵢ/C：窗內裝置 i 完成 Cᵢ 次服務、系統整體完成 C 個 job，所以每個 job 平均訪問裝置 i 共 Vᵢ 次。立刻得到 **Forced Flow Law**：\n\n```text\nXᵢ = Cᵢ/τ = Vᵢ·(C/τ) = Vᵢ·X    ← 各裝置的流量被整體吞吐「強制」鎖定\n```\n\n**Service demand** Dᵢ = Vᵢ·E[Sᵢ]：一個 job 一生在裝置 i 消耗的總服務時間。它有個漂亮的量測性質：Dᵢ = Bᵢ/C——拿裝置忙碌時間除以系統完成數就量到了，**不需要**分別知道 Vᵢ 和 E[Sᵢ]。把 Forced Flow 塞進 Utilization Law：\n\n```text\nρᵢ = Xᵢ·E[Sᵢ] = X·Vᵢ·E[Sᵢ] = X·Dᵢ\n```\n\n每台裝置的使用率 = 系統吞吐 × 該裝置的 service demand。Dᵢ 最大的那台裝置使用率最高、最先撞到 100%——它就是**瓶頸（bottleneck）**。小例子：一則推播查 DB 三次、每次 5 ms，D_DB = 15 ms；ρ_DB = X × 0.015 ≤ 1 直接給出 X ≤ 66.7 則/s——不管 DB 前面排了什麼、其他裝置多快，這個天花板跑不掉。\n\n這給了你一個五分鐘的瓶頸盤點法：同一個觀察窗，抓每台裝置的忙碌時間 Bᵢ 和系統完成數 C，逐台算 Dᵢ = Bᵢ/C，排序——榜首就是瓶頸，而且你順便拿到了它卡死的吞吐上限 1/D_max。注意這跟「看誰的 CPU 最高」不同：使用率會隨當下流量浮動，Dᵢ 是每個 job 的固有成本，流量高低都量得到、也才值得進容量規劃的試算表。\n\n## Bottleneck bounds：不解模型就畫出天花板\n\n現在把工具串起來，處理封閉系統的核心問題：N 個使用者的互動式系統，吞吐 X(N) 和延遲 E[T(N)] 會怎麼走？精確答案要 ch17 的 MVA；但**上下界現在就能畫**，而且實務上常常夠用。\n\n**嚴謹度：工程師的嚴謹**。兩條天花板：\n\n```text\n瓶頸天花板（任何 N 都成立）：\n  ρᵢ = X·Dᵢ ≤ 1  對每台裝置 i    ← 忙碌比例不可能超過 100%\n  ⇒ X ≤ 1/D_max                  ← Dᵢ 最大的那台卡死全場\n\n人數天花板（小 N 時更緊）：\n  E[T] ≥ ΣDᵢ                     ← 零排隊也得把服務需求做完\n  X = N/(E[T] + Z)               ← Response Time Law 改寫\n  ⇒ X ≤ N/(ΣDᵢ + Z)\n\n拐點：兩條天花板的交點\n  N* = (ΣDᵢ + Z)/D_max\n```\n\n第一條的條件：Dᵢ 是常數（service demand 不隨負載變化）。第二條另需：job 同一時刻只在一個地方接受服務（沒有 fork-join 並行——有的話 E[T] ≥ ΣDᵢ 不再成立，見 ch18）。\n\n### Worked example：封閉基準配置的 bounds 全程\n\n基準配置：兩站互動式系統，D₁ = 0.1 s、D₂ = 0.2 s、think time Z = 1 s。代入：\n\n```text\nΣDᵢ = 0.3 s、D_max = 0.2 s\nX(N) ≤ min( N/1.3 , 1/0.2 ) = min( N/1.3 , 5 ) 個/s\nN*   = 1.3/0.2 = 6.5\nE[T(N)] ≥ max( 0.3 , N·0.2 − 1 ) s    ← 第二式由 X ≤ 5 代回 Response Time Law\n```\n\n```text\nX(N)\n  5 │        _________________________   ← 天花板 X = 1/D_max = 5/s\n    │       /:\n    │      / :\n    │     /  :   實際曲線只能活在屋頂下面（精確形狀見 ch17）\n    │    /   :\n    │   /    :  ← 斜坡 X = N/(ΣDᵢ+Z) = N/1.3\n    │  /     :\n    └─────────┴──────────────────────→ N\n    0        N* = 6.5\n```\n\n逐點算出來（3 位有效數字）：\n\n| N | N/1.3 | 1/D_max | X(N) 上界（取小） | E[T(N)] 下界 |\n|---|---|---|---|---|\n| 1 | 0.769 | 5 | 0.769 | 0.300 s |\n| 2 | 1.54 | 5 | 1.54 | 0.300 s |\n| 4 | 3.08 | 5 | 3.08 | 0.300 s |\n| 6 | 4.62 | 5 | 4.62 | 0.300 s |\n| 6.5 = N* | 5.00 | 5 | 5.00 | 0.300 s |\n| 8 | 6.15 | 5 | 5.00 | 0.600 s |\n| 10 | 7.69 | 5 | 5.00 | 1.00 s |\n| 13 | 10.0 | 5 | 5.00 | 1.60 s |\n\n讀法。N ≤ N*：系統空曠，每加一個使用者吞吐近乎線性成長、延遲貼著 0.3 s 的地板。N > N*：瓶頸（node 2）飽和，X 釘死在 5/s，之後每加一個使用者，多出來的時間**全數變成排隊**。N = 13 那格可以口頭重算一遍：13 個使用者每圈都要在 node 2 耗 0.2 s，node 2 每秒最多供 5 圈，一圈至少 13/5 = 2.6 s，扣掉想的 1 s，在系統裡至少 1.6 s——跟表格一致。\n\nN* = 6.5 的讀法：這個配置「養得起」大約 6 個使用者不互相踩；第 7 個起，排隊成為常態。它不是人數所以不必是整數——它是兩條漸近線的交點。三個警告：bounds 是漸近線不是預測，真實曲線在拐點附近是圓角、離 bound 最遠；對應的悲觀下界（所有人擠在瓶頸）本書不展開，見延伸閱讀 Lazowska et al.；想要曲線本身，用 MVA（見 ch17，arrival theorem 是它的引擎，這兩條 bounds 是它的伏筆）。\n\n但注意這件事有多便宜：我們沒有假設任何分布、沒有解任何 chain，只用了「使用率 ≤ 1」和 Little's Law，就拿到了吞吐天花板、延遲地板、和系統開始排隊的人數。這就是操作分析的全部美德——**它給的少，但它要的更少**。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 自我察覺與防禦 |\n|---|---|---|\n| 非穩態窗口 | 事故中 backlog 單調上漲的 10 分鐘窗：A(τ) ≫ C(τ)，邊角面積不可忽略，J/C 算出的「平均延遲」既不是已完成 job 的平均、也不是被堆住 job 的命運——是個沒有指涉物的數字 | 算 Little 前先看 A/C：偏離 1 超過幾個百分點、或窗口頭尾 in-flight 差距大，就換窗（拉長、或避開斜坡段） |\n| 邊界不一致 | 拿「佇列深度」當 E[N]、拿「端到端延遲」當 E[T]，相除得到一個鬼吞吐；或 λ 數的是 client 發出量（含 retry）、T 卻只量成功請求 | 寫下一句話：「系統 = 從哪裡進到哪裡出」；N、λ、T 三個量逐一檢查是否服從同一句話 |\n| 平均 × tail 的類別錯誤 | 「RPS × P99 = 並發 P99」——Little 只連平均；M/M/1 下 P99(T) ≈ 4.6 × E[T]（見 ch08），重尾下倍數更離譜（見 ch15），用平均公式塞 tail 數字，錯的不是數值是類別 | 看到任何「Little + 百分位」的組合直接打回票；tail 要分布，分布要模型或量測 |\n| λ 用錯流 | 有丟棄、retry、dedup 時，「進入系統的流」有好幾種數法，各自給出不同的 E[T] | 在邊界上明確選定一群 job（如「被接受且最終完成」），三個量都只數它們；丟棄流的處理見 ch10、retry 迴圈見 ch16 |\n| 把 Dᵢ 當常數 | bottleneck bounds 假設 service demand 與負載無關；GC、lock contention、cache 失效率會讓 Dᵢ(N) 隨 N 上升——真實 X 連 1/D_max 都摸不到、拐點比 N* 更早 | 徵兆：使用率還沒滿、吞吐已經平掉。對策：分段量 Dᵢ（不同負載各量一次），看它是不是在漂 |\n| 把 bound 當預測 | 「N* = 6.5，所以 6 個使用者以內延遲就是 0.3 s」——bound 附近真實曲線是圓角，N = 6 時排隊已經明顯 | 永遠把 bounds 報成「不可能更好」；要曲線，MVA（見 ch17）或模擬（見 ch19） |\n\n## 紙上推演\n\n**題 1（從殘缺監控補全帳本）[10 分鐘 ★]**\n一個服務節點，5 分鐘窗（τ = 300 s）量到：完成 21,600 個請求、in-flight 取樣平均 18.0 個、使用率 0.720（單服務位）。窗口進出平衡。求 X、E[T]、E[S]、E[N_Q]、E[T_Q]，並做至少兩個交叉驗算。\n\n**題 2（升級哪台收益最大）[15 分鐘 ★★]**\n封閉基準配置（D₁ = 0.1 s、D₂ = 0.2 s、Z = 1 s）、N = 10 個使用者。預算只夠把一台裝置換成兩倍速：方案 A 讓 D₁ → 0.05 s，方案 B 讓 D₂ → 0.1 s。分別算出新的 X(10) 上界與新拐點 N*，下結論：錢該花在哪、買到了什麼、沒買到什麼。\n\n**題 3（抓出 Little 的誤用）[20 分鐘 ★★]**\n事故檢討會上有三段論證，各藏一個本章等級的錯誤，指出來並給正確算法：\n(a) 「事故那 600 秒，backlog 從 0 漲到 90,000 則，完成率平均 150 則/s，in-flight 取樣平均 45,000 則，所以平均延遲 = 45000/150 = 300 s。」\n(b) 「尖峰 300 則/s 進來、SLA 要 P99 < 2 s，所以系統內同時最多 300 × 2 = 600 則，buffer 開 600 就絕對夠。」\n(c) 「dashboard 的佇列深度平均 3.2，client 量到平均延遲 0.5 s，所以吞吐 = 3.2/0.5 = 6.4 則/s；可是 counter 明明顯示 8 則/s——監控壞了。」\n\n### 推演解答\n\n**題 1。**\nX = C/τ = 21600/300 = 72.0/s。E[T] = E[N]/X = 18/72 = 0.250 s。E[S] = ρ/X = 0.72/72 = 0.0100 s（10.0 ms）——這是 Utilization Law 反著用。服務位平均 = ρ = 0.720，所以 E[N_Q] = 18 − 0.72 = 17.3（17.28）。E[T_Q] = E[N_Q]/X = 17.28/72 = 0.240 s。\n驗算一：E[T_Q] + E[S] = 0.240 + 0.010 = 0.250 = E[T] ✓。驗算二：X·E[T] = 72 × 0.25 = 18 = E[N] ✓。常見錯路：把 ρ 當成「服務位的 E[T]」之類的時間量——它是個比例，同時也是「服務位內平均 job 數」，後者才接得上 Little。\n\n**題 2。**\n基準：X(10) ≤ min(10/1.3, 5) = 5.00/s，N* = 6.5。\n方案 A（D₁ → 0.05）：ΣDᵢ = 1.25 s 含 Z…不對，先停下來把帳算清楚——ΣDᵢ = 0.05 + 0.2 = 0.25 s，分母 ΣDᵢ + Z = 1.25 s。D_max 仍是 0.2。X(10) ≤ min(10/1.25, 5) = min(8, 5) = **5.00/s，天花板紋風不動**。N* = 1.25/0.2 = 6.25——拐點還**提早**了（每圈變短，使用者回來得更快，瓶頸更早飽和）。買到的只有輕載時延遲地板 0.3 → 0.25 s。\n方案 B（D₂ → 0.1）：ΣDᵢ = 0.2 s、D_max = 0.1（兩台並列）。X(10) ≤ min(10/1.2, 10) = **8.33/s**，N* = 1.2/0.1 = 12（N = 10 回到拐點以下，系統重新「空曠」）。\n結論：升級非瓶頸近乎把錢丟進水裡；升級瓶頸把天花板從 5 抬到 10、把養得起的人數從 6.5 抬到 12。沒買到的：D₁ = D₂ = 0.1 並列成為新瓶頸，下一輪優化的單台收益砍半——瓶頸分析每做完一輪就要重做。\n\n**題 3。**\n(a) **非穩態窗口**。A(τ) = 90000 + 90000 = 180,000、C(τ) = 90,000，A/C = 2.0，Little 的前提（邊角項可攤薄）粉碎。300 s 這個數字內部一致（45000/150）但沒有指涉物：已完成的 9 萬則多半是事故早期的快件，平均遠小於 300 s；still-in-flight 的 9 萬則命運未卜、多半遠慘於 300 s。正確做法：已完成者直接拿時間戳記算平均；被堆住的 9 萬則另立帳本（它們至少還要 90000/150 = 600 s 才消化得完）。\n(b) **平均 × tail 類別錯誤**。Little 能說的是 E[N] = 300 × E[T]——平均對平均；λ × P99 不是 N 的 P99，也不是任何分布量。佇列長度的 tail 需要 N 的分布（M/M/1 版見 ch08；真要保證不溢出，用有限容量模型算丟棄率，見 ch10）。Buffer 開 600 之後溢不溢出，這段論證一個字都沒回答。\n(c) **邊界不一致**。3.2 框的是「只有佇列」，0.5 s 框的是「整個系統含服務」，相除得到的 6.4 不屬於任何邊界。同邊界配對立刻和解：佇列邊界 3.2/0.4 = 8.00 則/s；系統邊界 4.0/0.5 = 8.00 則/s（這正是本章 worked example 的那組數字）。監控沒壞，是論證壞了。\n\n## 自我檢核\n\n口頭回答，講不清楚就回去重讀：\n\n1. Little's Law 的「無關性」具體指與哪些東西無關？它需要的兩個前提是什麼？少了任何一個會發生什麼事？\n2. 面積雙算證明裡，「直切」和「橫切」各對應哪個物理量？哪一步用到了「窗口頭尾皆空」？放寬之後靠什麼條件救回來？\n3. 為什麼 E[N_服務中] = ρ？把 Little 的虛線框畫在哪裡、單伺服器的哪個特性讓「平均個數」變成「時間比例」？\n4. Stidham 1974 的版本比 Little 1961 強在哪？「對一條已經發生的歷史也成立」這句話為什麼重要？\n5. Response Time Law 裡的 Z 是什麼？為什麼固定 VU 的壓測天生不會過載、而線上開放流量會？\n6. X ≤ 1/D_max 的推導用了哪兩條定律？什麼工程現實會讓 Dᵢ 不是常數，此時這條 bound 還可信嗎（提示：它會變成高估還是低估）？\n7. N* 的公式與直覺意義？N < N* 與 N > N* 各是哪條天花板在管事？\n8. 為什麼「RPS × P99」不是任何東西的 P99？Little 在這裡的精確管轄範圍是什麼？\n\n## 延伸閱讀\n\n- Little, J.D.C. (1961). \"A Proof for the Queuing Formula: L = λW.\" *Operations Research* 9(3): 383–387. https://pubsonline.informs.org/doi/10.1287/opre.9.3.383 ——原始證明（平穩假設版），前兩頁就能看到 1961 年的人怎麼想這個問題。\n- Stidham, S. (1974). \"A Last Word on L = λW.\" *Operations Research* 22(2): 417–421. https://pubsonline.informs.org/doi/epdf/10.1287/opre.22.2.417 ——只剩兩個極限假設的最終版；讀它體會「假設可以削到多薄」。\n- Little, J.D.C. (2011). \"Little's Law as Viewed on Its 50th Anniversary.\" *Operations Research* 59(3): 536–549. 免費 PDF：https://people.cs.umass.edu/~emery/classes/cmpsci691st/readings/OS/Littles-Law-50-Years-Later.pdf ——folk theorem 的歷史、五十年的應用清單；§2 的歷史段最值得讀。\n- Denning, P.J. & Buzen, J.P. (1978). \"The Operational Analysis of Queueing Network Models.\" *ACM Computing Surveys* 10(3): 225–261. https://dl.acm.org/doi/10.1145/356733.356735 ——操作分析的建制化論文，本章的世界觀出處；讀前半的 operational laws 推導與本章對照。\n- Lazowska, Zahorjan, Graham & Sevcik (1984). *Quantitative System Performance*. Prentice-Hall；作者取回版權後全書免費：https://homes.cs.washington.edu/~lazowska/qsp/ ——fundamental laws 與 bounds 兩章是 asymptotic bounds 的標準教科書處理，含本章沒展開的悲觀下界。\n- Harchol-Balter, M. (2013). *Performance Modeling and Design of Computer Systems*. Cambridge University Press. https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html ——第 6–7 章（operational laws 與 modification analysis）：與本章同一條路線、更多練習題；本書主參考教科書。\n"}, {"id": "ch03-probability-toolbox", "file": "ch03-probability-toolbox.md", "group": "Part II — 機率地基", "title": "ch03 — 機率工具箱：把生鏽的磨利", "md": "# ch03 — 機率工具箱：把生鏽的磨利\n\n> **本章解決什麼問題**：ch02 的操作定律刻意不碰機率，也因此只能談平均值——它回答不了「λ < μ 為什麼還會排隊」，更回答不了「P99 從哪裡來」。要往下走，得把隨機性本身量化。本章把你大學看過、如今生鏽的機率工具磨利到足以跟上全書每一條推導，並讓兩個常駐角色登場：幾何級數（之後所有平穩分布的計算引擎）與 C²（變異係數平方）——全書的主角。Part II 接下來的指數（ch04）、Poisson（ch05）、Markov chain（ch06）全部蓋在本章的地基上。\n\n```\n Part I    地圖與定律      ch01–02   直覺為什麼失效、不用機率的鐵律\n     │\n     ▼\n Part II   機率地基        ch03–06   工具箱、指數、Poisson、Markov chain   ◄ 你在這裡\n     │\n     ▼\n Part III  生滅與經典模型  ch07–11   CTMC、M/M/1、Erlang、有限容量、Burke\n     │\n     ▼\n Part IV   超越指數        ch12–15   M/G/1、排程、Kingman、重尾\n     │\n     ▼\n Part V    佇列網路        ch16–18   Jackson、封閉與 MVA、product form 邊界\n     │\n     ▼\n Part VI   模擬與回到系統  ch19–21   模擬方法學、機房應用、地圖與下一步\n```\n\n## 從你已知的出發\n\nk6 報表上那排數字——avg、p90、p95、p99——你看了六年。它們的數學身分只有一個：同一條 empirical CDF 上抽出來的點。P99 是 tail 機率 P(T > t) 掉到 0.01 的那個 t；平均值則是 tail 曲線下的整塊面積（這句話本章會給出精確版本並證明）。你每天都在讀分布，只是儀表板沒逼你把它讀成分布。ch02 的 Little's Law 不問分布就給了你平均值的鐵律——那是免費午餐；從本章起要回答的問題（為什麼排隊、tail 從哪來），沒有分布就無從談起。\n\n再來是值班夜的老朋友：平均 100 ms，P99 卻在燒。平均沒有說謊——它只是幾乎什麼都沒承諾。本章結尾會用 Markov 不等式把「平均 100 ms 對 P99 承諾了什麼」算出來，答案難看到你會記一輩子。\n\n先校準預期：你大學修過機率，研究所的 ML 課也用過，這章不從零教。它只做兩件事——把全書推導用得到的那一小撮工具磨到反射等級；並讓你正式認識 C²，這個之後會在 ch12 與 ch14 對你的系統開帳單的數字。每樣工具都先標好之後在哪裡上工：\n\n| 本章工具 | 之後在哪裡上工 |\n|---|---|\n| 條件機率、全機率、全期望 | ch04 競賽引理、ch07 balance equations、ch12 P-K 推導 |\n| 幾何級數 Σρⁿ 與微分技巧 | ch08 推 πₙ 與 E[N] |\n| tail 積分 E[X] = ∫P(X > t)dt | ch08 回應時間 tail、ch12 殘餘服務時間 |\n| indicator＋期望值線性 | ch08 手算、ch18 fork-join 的 E[max] |\n| C² = Var/E² | ch12 P-K 帳單、ch14 Kingman、ch15 重尾 |\n| Markov／Chebyshev 不等式 | ch15 重尾、ch19 稀有事件要多少樣本 |\n\n## 機率的文法：條件、全機率與全期望\n\n快速過一遍語言本身。一個機率模型有三樣東西：樣本空間 Ω（所有可能結果）、事件（結果的集合）、機率測度 P。P 只需要遵守三條公理：P(A) ≥ 0、P(Ω) = 1、互斥事件的機率可加。這背後有一整套測度論在撐腰，本書一句話跳過：工程上你永遠不會踩到那些病態案例（見延伸閱讀）。\n\n**條件機率**：P(A|B) = P(A∩B)/P(B)，定義要求 P(B) > 0。讀法是「把世界縮小到 B 之內重新正規化」——條件化就是資訊更新：每多知道一件事，就把樣本空間裁一刀、剩下的機率重新正規化。定義移項就是鏈式法則 P(A∩B) = P(A|B)·P(B)，把聯合機率拆成「先發生、再發生」的敘事；它的多事件版本在 ch06 算 Markov chain 的路徑機率時會大量出現。兩個事件**獨立**的定義是 P(A∩B) = P(A)P(B)；注意獨立是一個要被論證的假設，不是預設值——本書每次用它都會明說。\n\n**全機率定理**：若 B₁, …, Bₖ 互斥且窮盡（恰好一個會發生、各 P(Bᵢ) > 0），則\n\n```text\nP(A)  = Σᵢ P(A|Bᵢ)·P(Bᵢ)\nE[X]  = Σᵢ E[X|Bᵢ]·P(Bᵢ)      ← 期望值版本，稱全期望定理\n```\n\n這是佇列推導的主力工具：把一個複雜的量，按「第一步發生了什麼」切開來分頭算。ch07 的 balance equations、ch12 的 P-K 推導，骨架都是它。\n\n你其實已經在用它。推播 worker 的服務時間有兩種路徑：90% 是單純推送（50 ms），10% 要先重建裝置清單（550 ms）。你心算混合平均的那一刻——\n\n```text\nE[S] = E[S|短]·P(短) + E[S|長]·P(長)\n     = 50·0.9 + 550·0.1 = 45 + 55 = 100 ms\n```\n\n——就是全期望定理。這組數字（排程基準，ch13 還會用它）本章稍後會再回來算它的 C²，結果會讓你重新看待這條管線。\n\n## 隨機變數與 tail：P99 的數學身分\n\n隨機變數（random variable）是把每個結果對應到一個數字的函數——服務時間 S、回應時間 T、系統內人數 N 都是。描述一個隨機變數的標準配備：\n\n- **CDF**：F(t) = P(X ≤ t)。\n- **tail**：F̄(t) = P(X > t) = 1 − F(t)。本書大量直接操作 tail，因為延遲問題天生是 tail 問題。\n- 離散型用 **pmf** p(x) = P(X = x)；連續型用 **pdf** f(x)，機率是密度下的面積。\n\nP99 的正式身分：使 P(T ≤ t) ≥ 0.99 的最小 t，也就是 tail 掉到 0.01 的位置——quantile 函數在 0.99 的取值。你的監控系統每分鐘都在對 empirical CDF 做這個查詢。\n\n常用分布速查（每個值我都重算過；C² 這欄現在先存著，下面兩節就會知道它是什麼、為什麼重要）：\n\n| 分布 | 模型化什麼 | E[X] | Var(X) | C² |\n|---|---|---|---|---|\n| Bernoulli(p) | 一次成敗 | p | p(1−p) | (1−p)/p |\n| Binomial(n, p) | n 次獨立成敗中的成功數 | np | np(1−p) | (1−p)/(np) |\n| Geometric(p)，取值 1, 2, … | 第一次成功發生在第幾次 | 1/p | (1−p)/p² | 1−p |\n| Uniform(a, b) | 只知道範圍時的均勻猜測 | (a+b)/2 | (b−a)²/12 | U(0, b) 時為 1/3 |\n| Exponential(μ) | 無記憶的持續時間 | 1/μ | 1/μ² | 1（深論見 ch04） |\n\ngeometric 是「重試直到成功」的分布，它是離散世界的無記憶分布——這句話 ch04 會精確化。重尾的 Pareto 故意不在表上：它會在 ch15 把這張表的世界觀掀掉（見 ch15）。\n\n## 期望值的三件武器：LOTUS、indicator、線性\n\n期望值：離散 E[X] = Σ x·p(x)，連續 E[X] = ∫ x·f(x) dx。定義要求加總／積分絕對收斂——先記下「期望值不是天賦人權」，ch15 會遇到連均值都不存在的分布。三件武器依序登場：\n\n**武器一：LOTUS**。要算 E[g(X)]，不必先求出 g(X) 的分布：E[g(X)] = Σ g(x)·p(x)（連續版同理）。它的全名是 law of the unconscious statistician——因為人人都無意識地在用，沒注意到這其實是一條需要證明的定理。本書把它當工具用，證明屬於進階機率（見延伸閱讀）。最常用的特例：E[X²] = Σ x²·p(x)，等一下變異數全靠它。\n\n**武器二：indicator**。事件 A 的指示變數 1{A}：A 發生取 1、否則取 0。完整推導只有一行：\n\n```text\nE[1{A}] = 1·P(A) + 0·P(Aᶜ) = P(A)      ← 機率被翻譯成期望值\n```\n\n威力在於「個數」類的隨機變數都能拆成 indicator 的和，然後交給武器三。\n\n**武器三：期望值線性**。對任何隨機變數 X、Y 與常數 a、b：\n\n```text\nE[aX + bY] = a·E[X] + b·E[Y]\n```\n\n唯一的條件是各期望值有限。**不需要獨立——一個字都不需要**。這是全書被使用最多次、也最常被低估的事實。對照組：E[XY] = E[X]E[Y] 就**需要**獨立（精確說：不相關）才成立；線性沒有這種附帶條件。\n\n組合技示範：8 個 job 各自獨立、均勻隨機指派到 4 個 shard。平均有幾個 shard 閒著？令 X = 閒置 shard 數 = Σᵢ 1{shard i 沒分到 job}。每個 shard 被單一 job 避開的機率是 3/4，八個 job 獨立，所以 P(shard i 閒置) = (3/4)⁸ ≈ 0.100，於是\n\n```text\nE[X] = 4 × (3/4)⁸ ≈ 0.400 個\n```\n\n注意這 4 個 indicator 彼此**高度相依**（若 3 個 shard 都空，job 全擠在剩下那個），但線性根本不在乎。不用枚舉任何聯合分布，兩行結束——這就是 indicator＋線性的標準殺法，ch18 算 fork-join 的 E[max] 還會再看到它。\n\n## 幾何級數：全書的引擎\n\nch08 會推出 M/M/1 的平穩分布 πₙ = (1−ρ)ρⁿ——一個幾何形狀的分布。從那一刻起，全書的每一次「求和」幾乎都是幾何級數。這一節把它磨到閉著眼睛都會。\n\n**完整推導**（部分和的老把戲，值得你抄一遍）：\n\n```text\nS_N     = 1 + ρ + ρ² + … + ρ^N\nρ·S_N   =     ρ + ρ² + … + ρ^N + ρ^(N+1)\n相減：(1−ρ)·S_N = 1 − ρ^(N+1)\nS_N = (1 − ρ^(N+1)) / (1 − ρ)            ← 對任何 ρ ≠ 1 都成立\n```\n\n當 |ρ| < 1，ρ^(N+1) → 0，所以 **Σ_{n≥0} ρⁿ = 1/(1−ρ)**。條件 |ρ| < 1 不是裝飾品：ρ ≥ 1 時級數發散，而 ch08 會告訴你，「平穩分布的正規化級數收斂」**就是**佇列穩定條件 ρ < 1 的數學身分——條件破掉時公式不會報錯，只會給你一個負數假裝是答案。\n\n**微分技巧**（工程師的嚴謹：冪級數在收斂半徑內可逐項微分，這是實分析的定理，本書引用不證——見延伸閱讀）：\n\n```text\nΣ_{n≥0} ρⁿ = 1/(1−ρ)                    |ρ| < 1\n兩邊對 ρ 微分：\nΣ_{n≥1} n·ρ^(n−1) = 1/(1−ρ)²\n兩邊乘 ρ：\nΣ_{n≥1} n·ρⁿ = ρ/(1−ρ)²\n```\n\n同一個和也能走另一條路對帳（下一節「雙算」思想的預演）：把 n 讀成「n 個 1 的和」、交換求和順序，Σ_{n≥1} n·ρⁿ = Σ_{k≥1} (Σ_{n≥k} ρⁿ) = Σ_{k≥1} ρᵏ/(1−ρ) = ρ/(1−ρ)²。兩條路同答案——這種互相對帳的習慣，是手推公式時最便宜的防錯機制。\n\n預告它的第一份工作：ch08 要算系統內平均人數 E[N] = Σ n·πₙ = Σ n·(1−ρ)ρⁿ = (1−ρ)·ρ/(1−ρ)² = ρ/(1−ρ)。代 ρ = 0.8 得 4——基準表那個「E[N] = 4」就是這三行。你現在已經會推 M/M/1 最重要的結果之一了，只是還不知道 πₙ 為什麼長那樣（ch07–08 的事）。\n\n## 用 tail 算期望：E[X] = ∫ P(X > t) dt\n\n期望值還有第二種算法，不走「值 × 機率」，改走「tail 面積」。它在佇列理論裡常常快得多，而且是 ch12 殘餘服務時間論證的核心。\n\n**離散版（完整推導）**：X 取非負整數。關鍵恆等式：\n\n```text\nX = Σ_{n≥0} 1{X > n}        ← 自我檢查：X = 3 時右邊 = 1{3>0}+1{3>1}+1{3>2} = 3，其餘項全是 0\n兩邊取期望，套線性與 E[1{A}] = P(A)：\nE[X] = Σ_{n≥0} P(X > n)\n```\n\n（誠實標示：對「無窮多項」套線性需要收斂定理撐腰；因為每一項都非負，這裡的交換是合法的——完整論證見延伸閱讀，工程上你可以放心用。）\n\n**連續版（工程師的嚴謹）**：X ≥ 0、有密度 f。\n\n```text\n∫₀^∞ P(X > t) dt = ∫₀^∞ ( ∫_t^∞ f(x) dx ) dt     ← tail 展開成積分\n                 = ∫₀^∞ ( ∫₀^x dt ) f(x) dx       ← 交換順序：積分區域同樣是 {0 ≤ t < x}\n                 = ∫₀^∞ x·f(x) dx = E[X]\n```\n\n交換積分順序的合法性由「被積函數非負」保證（Tonelli 定理，本書不展開）。圖像比代數好記：\n\n```\n P(X > t)\n 1 ┤*\n   │ **\n   │   **\n   │     **          曲線下的整塊面積 ＝ E[X]\n   │       ***\n   │          ****\n   │              *******\n 0 └──────────────────────────────► t\n```\n\n**適用條件**：X ≥ 0。一般的 X 要把正負兩部分拆開分別處理，本書用到的場合（服務時間、等待、人數）全是非負的，條件天然滿足。同一招再推一格，就得到全書會反覆使用的二階矩版本：E[X²] = E[∫₀^X 2t dt] = ∫₀^∞ 2t·P(X > t) dt。\n\n一行熱身：指數分布 tail 是 P(S > t) = e^(−μt)（深論見 ch04），所以 E[S] = ∫₀^∞ e^(−μt) dt = 1/μ。三秒鐘，不用分部積分。\n\n### Worked example：geometric 期望的兩本帳\n\n下游呼叫每次成功機率 p = 0.8，失敗立刻重試、各次獨立。X = 直到成功的嘗試次數 ~ Geometric(0.8)。用兩條完全不同的路算 E[X]，帳要對得起來。\n\n```text\n帳本一：tail 加總\nP(X > n) = 0.2ⁿ                          ← 前 n 次全失敗\nE[X] = Σ_{n≥0} 0.2ⁿ = 1/(1 − 0.2) = 1.25 次\n\n帳本二：定義＋微分技巧\nE[X] = Σ_{n≥1} n·(0.2)^(n−1)·0.8\n     = 0.8 · Σ_{n≥1} n·(0.2)^(n−1)\n     = 0.8 · 1/(1 − 0.2)²                ← 微分技巧的中間產物 Σ n·ρ^(n−1) = 1/(1−ρ)²\n     = 0.8/0.64 = 1.25 次\n```\n\n兩本帳都是 1.25，對齊。順帶驗證了表裡的 E = 1/p。實戰心得：tail 路線通常更短、更不容易抄錯（tail 本身常有現成的乘法結構）；微分路線更通用，遇到 Σ n·ρⁿ 這種「值 × 機率」的形狀時是唯一選擇。兩條都要會，互相對帳是抓錯的最快方式。\n\n## 變異數與 C²：全書主角登場\n\n變異數量化「離平均多遠」：Var(X) = E[(X − E[X])²]。計算永遠用展開形：\n\n```text\nVar(X) = E[X² − 2X·E[X] + (E[X])²]\n       = E[X²] − 2E[X]·E[X] + (E[X])²    ← 線性；E[X] 是常數\n       = E[X²] − (E[X])²\n```\n\n因為平方非負，這條順便送你一個之後常用的事實：E[X²] ≥ (E[X])²，差距就是變異數。常用性質：Var(aX + b) = a²Var(X)（平移不影響散布，縮放平方倍）；標準差 σ = √Var 把單位拉回來。\n\n但 Var 有個工程上的致命傷：它帶單位、帶尺度。「服務時間變異數 22,500 ms²」這句話你無法直接判讀——這算叢發嗎？跟另一條均值不同的管線怎麼比？解法是正規化：\n\n> **C² = Var(X)/(E[X])²**——變異係數平方（squared coefficient of variation, SCV）。定義在 E[X] > 0 的非負隨機變數上；本書用 C²ₛ 記服務時間的、C²ₐ 記到達間隔的。\n\nC² 無因次、且尺度不變：C²(aX) = a²Var(X)/(a·E[X])² = C²(X)。100 ms 等級的服務和 100 s 等級的批次作業可以放在同一把尺上比「形狀」。這把尺的刻度：\n\n```\n C² = 0                  C² = 1                  C² > 1\n───┼────────────────────────┼───────────────────────┼──────────►\n 確定性:每件都一樣久      指數:隨機的基準刻度     叢發:少數巨件主宰\n (D/D/1 的世界,零驚奇)   (ch04 的原子)           (ch12 開帳單、ch15 失控)\n```\n\n把你的系統放上這把尺：cron 觸發的定時任務、固定大小的批次，間隔與耗時都落在 C² ≈ 0 附近；大量獨立使用者自發產生的請求，到達間隔天生接近指數（為什麼會這樣，ch05 會解釋），所以 C²ₐ ≈ 1 是個合理的預設猜測；而 cache hit 與 miss 的混合、偶發的 GC 暫停、月底那支報表 query——任何「平常很快、偶爾很慢」的形狀——都會把 C²ₛ 推過 1。讀法只有一句：C² < 1 比指數規律、C² > 1 比指數叢發，指數是那條「純隨機」的基準線。\n\n為什麼全書的主角是它？預告帳單：ch12 的 P-K 公式說 M/G/1 的等待 E[T_Q] 正比於 (1 + C²ₛ)/2，ch14 的 Kingman 近似把到達也算進來、正比於 (C²ₐ + C²ₛ)/2——**變異性本身就是延遲的來源，而 C² 就是它的計價單位**。在推播基準（λ = 8、E[S] = 100 ms、ρ = 0.8）下，C²ₛ = 0、1、10 對應的等待是 0.2 s、0.4 s、2.2 s（見 ch12）。同一個平均、同一個使用率，帳單差 11 倍。\n\n### Worked example：C² 三連發\n\n三個服務時間分布，均值全部釘在 100 ms，逐一算 C²。\n\n**之一：確定性。** S ≡ 100 ms。E[S²] = 10,000 ms²，Var = 10,000 − 100² = 0，**C² = 0**。零驚奇，ch01 你已看過 D/D/1 在 λ < μ 時完全不排隊。\n\n**之二：指數（μ = 10）。** 用上一節的 2t 公式收割：\n\n```text\nE[S²] = ∫₀^∞ 2t·P(S > t) dt = ∫₀^∞ 2t·e^(−μt) dt = 2/μ²   ← ∫₀^∞ t·e^(−μt) dt = 1/μ²（分部積分一次）\nVar(S) = 2/μ² − (1/μ)² = 1/μ²\nC²     = (1/μ²) / (1/μ)² = 1\n```\n\nμ = 10 時 E[S] = 100 ms、σ = 100 ms。**指數分布的 σ 永遠等於均值、C² 永遠是 1**——這就是它被當成「隨機性的基準刻度」的原因（深論見 ch04）。\n\n**之三：二點叢發。** 本章開頭那條管線：90% 短工作 50 ms、10% 長工作 550 ms，E[S] = 100 ms。\n\n```text\nE[S²] = 0.9·50² + 0.1·550²\n      = 0.9·2,500 + 0.1·302,500\n      = 2,250 + 30,250 = 32,500 ms²\nVar   = 32,500 − 10,000 = 22,500 ms²    →  σ = 150 ms\nC²    = 22,500 / 10,000 = 2.25\n```\n\n| 分布（均值都是 100 ms） | E[S²] | Var | σ | C² |\n|---|---|---|---|---|\n| 確定性 100 ms | 10,000 ms² | 0 | 0 | 0 |\n| 指數 μ = 10 | 20,000 ms² | 10,000 ms² | 100 ms | 1 |\n| 二點 90%×50 ms＋10%×550 ms | 32,500 ms² | 22,500 ms² | 150 ms | 2.25 |\n\n只是 10% 的工作長了 11 倍，C² 就翻過指數、來到 2.25——而監控大盤上這條管線的「平均服務時間」三者一模一樣。\n\n倒推一格更有感：要把 C² 推到 10（ch12 基準的叢發檔位）需要多誇張的分布？保持短工作 50 ms、均值 100 ms，設長工作 L 占比 q，解兩條帳 E[S] = 100、E[S²] = Var + E² = 110,000 ms²，得 q = 1/41 ≈ 0.0244、L = 2,100 ms。驗算：E[S] = (40·50 + 2,100)/41 = 4,100/41 = 100 ✓；E[S²] = (40·2,500 + 4,410,000)/41 = 110,000 ✓。也就是說：**2.4% 的請求各拖 2.1 秒，就足以把 C² 打到 10**。你的系統裡幾乎一定有這種請求——那支月底報表 query、那次 cold start。再往上，ch15 的 Pareto（α = 1.5）變異數乾脆是無限大、C² = ∞，這把尺直接爆表（見 ch15）。\n\n## Markov 與 Chebyshev：平均值對 tail 承諾了什麼\n\n回到值班夜的問題：只知道「平均 100 ms」，數學上對 P99 能說什麼？\n\n**Markov 不等式（完整推導）**。適用條件：X ≥ 0、t > 0、E[X] 有限。\n\n```text\nt·1{X ≥ t} ≤ X                ← 逐情況檢查：X ≥ t 時左邊 = t ≤ X；X < t 時左邊 = 0 ≤ X\n取期望（期望保序、線性）：\nt·P(X ≥ t) ≤ E[X]\n⇒  P(X ≥ t) ≤ E[X]/t\n```\n\n證明就是 indicator 武器的一次出手。注意三件事：X ≥ 0 是必要的（允許負值就能把均值做小而 tail 不變）；t ≤ E[X] 時上界 ≥ 1、毫無內容；它是**上界**，不是估計值。\n\n套用：T ≥ 0、E[T] = 0.1 s。P(T ≥ 1 s) ≤ 0.1，P(T ≥ 10 s) ≤ 0.01。所以「平均 100 ms」對 P99 的全部承諾是：**不超過 10 秒**。更慘的是這個上界是達得到的——分布取 99% 機率 0 ms、1% 機率 10 s，均值恰是 100 ms，P99 恰是 10 s。平均值沒說謊，它只是承諾得就這麼少。\n\n**Chebyshev 不等式（完整推導）**。多知道一個變異數，承諾立刻收緊。適用條件：Var(X) 有限（X 不必非負）、a > 0。\n\n```text\nP(|X − E[X]| ≥ a) = P( (X − E[X])² ≥ a² )      ← 同一個事件，兩邊平方\n                  ≤ E[(X − E[X])²] / a²         ← 對非負的 (X − E[X])² 套 Markov\n                  = Var(X)/a²\n```\n\n套用：若再知道 σ = 100 ms（指數等級的散布、Var = 0.01 s²），取 a = 1 s：P(|T − 0.1| ≥ 1) ≤ 0.01/1² = 0.01，所以 P(T ≥ 1.1 s) ≤ 0.01，P99 ≤ 1.1 s。若進一步知道完整分布是指數（μ = 10），直接解 tail：e^(−10t) = 0.01 給 t₉₉ = ln 100/10 ≈ 0.461 s（ln 100 ≈ 4.6052）——順帶看見 ch08 那句「指數世界 P99 ≈ 4.6× 平均」的出處。\n\n| 你知道什麼 | 工具 | 對 P99 的承諾 |\n|---|---|---|\n| 只有 E[T] = 100 ms | Markov | ≤ 10 s（且存在分布真的這麼糟） |\n| 加上 σ = 100 ms | Chebyshev | ≤ 1.1 s |\n| 完整分布：Exponential(10) | 直接解 tail | = 0.461 s |\n\n每多帶一階資訊，tail 的承諾就縮一個量級。這就是本書堅持把分布——至少把前兩階矩，也就是均值與 C²——隨身帶著的理由；也是 SLA 只寫平均值等於沒寫的數學證據。也別因為「鬆」就小看這兩條不等式：它們對分布**零假設**。當你手上只有監控吐出來的一兩個矩、分布形狀根本不可知時，distribution-free 的上界是唯一誠實的承諾——而 ch15 的重尾世界裡連這份誠實都要打折：變異數無限時，Chebyshev 直接失業（見 ch15）。Chebyshev 是雙邊不等式，單邊有更緊的版本（Cantelli），本書用不到、知道存在即可。至於中央極限定理：大量獨立量的和趨近常態分布——本書只在 ch19 計算模擬的信賴區間時需要它，在那之前一句話帶過（見 ch19）。\n\n## 陷阱與防禦\n\n本章工具的共同危險：用錯時不會報錯，只會安靜地給你一個長得像答案的錯數字。\n\n| 陷阱 | 它怎麼騙你 | 防禦 |\n|---|---|---|\n| 把 Var(X+Y) = Var(X)+Var(Y) 當預設 | 可加性需要**不相關**；retry 與尖峰使流量正相關，實際變異比帳面大。極端例：Y = X 時 Var(2X) = 4Var(X)，帳面只記 2Var(X)，低估一半 | 相加變異數前先回答「這兩個量憑什麼獨立」；答不出來就別加。期望值線性才是無條件的 |\n| E[g(X)] 當成 g(E[X]) | E[1/X] ≠ 1/E[X]：X 各半機率取 1 或 3，1/E[X] = 0.5、E[1/X] = 2/3 ≈ 0.667，差 33% | 一律過 LOTUS；凸函數時 Jensen 不等式告訴你偏哪一邊（E[X²] ≥ (E[X])² 同源） |\n| P(A\\|B) 與 P(B\\|A) 互換 | 「警報響時 90% 真有事故」≠「有事故時 90% 會響」；事故的 base rate 低時兩者天差地遠 | 回到定義 P(A\\|B) = P(A∩B)/P(B)，老老實實把聯合機率寫出來 |\n| 幾何級數忘了 \\|ρ\\| < 1 | ρ ≥ 1 時級數發散，但 1/(1−ρ) 照樣吐出一個（負的）數字給你 | 每次求和先檢查收斂；ch08 會看到這條件正是佇列穩定條件 ρ < 1 |\n| 把 Markov 上界當估計值 | 它是最壞情況保證，常鬆一個量級（指數真值 0.461 s vs 上界 10 s） | 讀成「保證不會更糟」；要「大概多少」就得帶更多矩或完整分布 |\n| 用截斷的監控直方圖估 C² | 最上層 bucket 把長 tail 砍掉，Var 與 C² 被系統性低估——最叢發的部分剛好被藏起來 | 檢查最上層 bucket 的占比；只要不可忽略，就把估出的 C² 當**下界**用 |\n\n## 紙上推演\n\n**推演 1 [5 分鐘] ★ — 級數熱身（ch08 預習）**\n求 Σ_{n≥0} n·(1−ρ)·ρⁿ 的封閉形式，並在 ρ = 0.8 求值。\n\n**推演 2 [10 分鐘] ★★ — 條件期望分解（first-step 思維）**\n下游呼叫每次固定耗時 100 ms、成功機率 0.8，失敗立刻重試、各次獨立。令 T 為直到成功的總耗時。(a) 用全期望定理對「第一次是否成功」分解，列方程解 E[T]；(b) 用「期望次數 × 單次耗時」對帳；(c) 改成失敗那次要等滿 1 s 的 timeout 才重試，重解 E[T]。\n\n**推演 3 [10 分鐘] ★★ — indicator 求期望**\n10 個 job 依序進站，處理時間 iid 且為連續分布（不會平手）。稱第 k 個 job 是「紀錄」，若它比前面所有 job 都長。求紀錄個數的期望值。提示：先用對稱性求 P(第 k 個是紀錄)。\n\n**推演 4 [15 分鐘] ★★ — 從監控直方圖估 C²ₛ**\n某服務的延遲直方圖（虛構）：\n\n| bucket | 占比 |\n|---|---|\n| 0–20 ms | 30% |\n| 20–100 ms | 50% |\n| 100–500 ms | 15% |\n| 500–2,000 ms | 5% |\n\n用各 bucket 的中點當代表值，估 E[S]、E[S²]、C²ₛ。這個服務比指數更叢發嗎？再指出這種估法至少兩個系統性偏差與它們的方向。\n\n### 推演解答\n\n**推演 1。** 提出常數、套微分技巧：Σ n·(1−ρ)ρⁿ = (1−ρ)·ρ/(1−ρ)² = ρ/(1−ρ)。代 ρ = 0.8 得 0.8/0.2 = **4**。這正是 ch08 的 E[N]：當 πₙ = (1−ρ)ρⁿ 時，系統內平均 4 個人。常見錯路：糾結求和從 n = 0 還是 n = 1 開始——n = 0 那項是 0，兩者相同；以及忘記檢查 ρ < 1（推演靠你自覺，生產環境靠 ch10 的 backpressure）。\n\n**推演 2。** (a) 第一次嘗試無論如何花 0.1 s；以 0.8 結束，以 0.2 進入「重新開始」——因為各次獨立，失敗後的未來是一份全新副本，期望仍是 E[T]：\n\n```text\nE[T] = 0.1 + 0.8·0 + 0.2·E[T]\n0.8·E[T] = 0.1   ⇒   E[T] = 0.125 s\n```\n\n(b) 對帳：E[次數] = 1/0.8 = 1.25（本章 worked example），乘 0.1 s 得 0.125 s ✓。\n(c) 成功那次花 0.1 s、失敗那次花 1 s 再重來：\n\n```text\nE[T] = 0.8·0.1 + 0.2·(1 + E[T]) = 0.28 + 0.2·E[T]\n⇒ E[T] = 0.28/0.8 = 0.35 s\n```\n\n討論：timeout 把期望耗時從 125 ms 膨脹到 350 ms——「失敗的嘗試也占用時間」是 ch20 retry storm 機制的第一塊骨牌。(a) 的「未來是全新副本」用了嘗試間獨立；如果下游故障有持續性（失敗預示更多失敗），這個方程就立不出來。這種「對第一步條件化」的招式，ch07 的 balance equations 與 ch12 的 busy period 是它的進階版。\n\n**推演 3。** 前 k 個 job 的處理時間 iid 連續，最大值落在哪個位置是均勻的（對稱性、無平手），所以 P(第 k 個是紀錄) = 1/k。令紀錄數 R = Σₖ 1{第 k 個是紀錄}，線性給\n\n```text\nE[R] = Σ_{k=1..10} 1/k = H₁₀ ≈ 2.93 個\n```\n\nindicator 之間明顯相依（第 3 個是紀錄會改變第 5 個是紀錄的條件機率），但線性照樣輾過去。常見錯路：想直接算 R 的分布——可以做但完全多餘。注意 1/k 論證依賴 iid：若處理時間有趨勢（每小時逐漸變慢），對稱性就破了。調和數 H_n 在 ch18 會以 E[max] = H_n/μ 的身分回鍋。\n\n**推演 4。** 中點代表值：10、60、300、1,250 ms。\n\n```text\nE[S]  = 0.3·10 + 0.5·60 + 0.15·300 + 0.05·1,250\n      = 3 + 30 + 45 + 62.5 = 140.5 ms\nE[S²] = 0.3·100 + 0.5·3,600 + 0.15·90,000 + 0.05·1,562,500\n      = 30 + 1,800 + 13,500 + 78,125 = 93,455 ms²\nVar   = 93,455 − 140.5² = 93,455 − 19,740.25 ≈ 73,715 ms²\nC²ₛ   = 73,715 / 19,740.25 ≈ 3.73\n```\n\nC²ₛ ≈ 3.73 > 1：比指數更叢發——拿去餵 ch12 的 P-K，等待會是同均值指數服務的 (1+3.73)/2 ÷ 1 ≈ 2.4 倍。系統性偏差：①中點假設抹掉 bucket 內部的散布，E[S²] 被低估 → C² 偏低；②最上層 bucket 在 2 s 截斷，更長的 tail 整段消失 → Var 再被低估。兩個偏差同向，所以 3.73 應該讀成**下界**：真實系統至少這麼叢發。（次要誤差：寬 bucket 內若分布偏向低端，中點會高估該格貢獻——方向不定，但通常被前兩項壓過。）\n\n## 自我檢核\n\n口頭講得出來才算過關：\n\n1. 期望值線性為什麼不需要獨立？變異數可加為什麼需要不相關？各舉一個工程場景說明差別。\n2. C² 為什麼要除以 (E[X])²，而不是直接拿變異數比大小？C² = 0、1、>1 各對應什麼樣的世界？\n3. 「平均 100 ms」單獨對 P99 承諾了什麼？多知道 σ 之後承諾變成什麼？口頭重講 Markov 與 Chebyshev 的證明（兩個都只有兩三行）。\n4. E[X] = ∫₀^∞ P(X > t) dt 的適用條件是什麼？用面積圖口頭重講它為什麼成立。\n5. 幾何級數的收斂條件是什麼？它跟「佇列什麼時候有穩態」有什麼關係（預告層級即可）？\n6. LOTUS 在說什麼、省掉了哪個步驟？為什麼 E[X²] ≥ (E[X])²，差值是什麼？\n7. 推演 2 的方程 E[T] = 0.1 + 0.2·E[T] 是怎麼立起來的？「失敗後未來是全新副本」用了什麼假設、什麼情況下會破？\n\n## 延伸閱讀\n\n- Mor Harchol-Balter,《Introduction to Probability for Computing》(Cambridge University Press, 2024)——全書 PDF 免費（2026-06 驗證可下載）。本章的完整版：Ch 3 常見離散分布、Ch 4 期望值與線性、Ch 5 變異數與高階矩、Ch 18 tail bounds（Markov、Chebyshev，以及更強的 Chernoff）。磨完刀想系統性重建機率，就讀這本。\n  https://www.cs.cmu.edu/~harchol/Probability/chapters/HarcholBalterWholeBook.pdf\n- Mor Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge University Press, 2013)——本書主參考教科書，開頭的機率複習與本章高度重合，之後各章會反覆指回它。無免費 PDF（作者建議買紙本），第 1 章可免費試讀（2026-06 驗證）。\n  https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Ivo Adan & Jacques Resing,《Queueing Systems》講義（TU Eindhoven）——免費 PDF（2026-06 驗證），全書最精簡的免費對照教材；現在先收藏，從 ch04 起你會常回來查。\n  https://www.win.tue.nl/~iadan/queueing.pdf\n- MIT OCW 6.262《Discrete Stochastic Processes》(Gallager, Spring 2011)——完整錄影＋開放講義（2026-06 驗證）。想把本章工具放回隨機過程的大架構（含本章跳過的收斂定理與測度論視角），從前三講看起。\n  https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n"}, {"id": "ch04-exponential", "file": "ch04-exponential.md", "group": "Part II — 機率地基", "title": "ch04 — 指數分布：排隊世界的原子", "md": "# ch04 — 指數分布：排隊世界的原子\n\n> **本章解決什麼問題**：ch03 把機率工具磨利了，現在要安裝排隊理論的原子——指數分布。M/M/1 的兩個 M 都是「指數」的縮寫，整個 Part III 的可解性都建立在它身上。本章要把無記憶性從一條定義變成化簡推導的武器、用 hazard rate 回答「等越久是好消息還是壞消息」、並完整證明競賽引理——它是 ch07 組裝 CTMC 的引擎。最後誠實檢討：這顆原子在現實中哪裡成立、哪裡不成立。\n\n## 從你已知的出發\n\n你調過 HTTP client 的 timeout。凌晨兩點，一支平常 100 ms 的 query 已經跑了 2 秒，你盯著它想：「都跑這麼久了，應該快好了吧？」還是「跑這麼久了，八成是卡死了，砍掉重試比較快」？這兩種直覺指向完全相反的操作，而且你兩種都用過。\n\n這個決策有精確的數學名字：hazard rate（風險率）。本章會給你判準——答案取決於服務時間分布的形狀，而指數分布正好是兩種直覺的分水嶺：在指數的世界裡，「已經等了多久」是徹底無用的資訊。這就是無記憶性（memorylessness），它聽起來像缺陷，卻是讓整個 Part III 的模型可以手算的原因。\n\n同一個影子也出現在你做過的容量決策裡：SQS consumer pool 有兩個 worker 都在處理訊息，新訊息進來要等多久才輪得到？你大概心算過「每則平均 100 ms，它們做到一半，所以再等 50 ms 左右」。這個心算對不對、為什麼「碰巧」接近正確答案但推理全錯，本章的 worked example 會把它拆開重算。本章交付三樣武器：無記憶性（含它為什麼是連續世界的獨家）、hazard rate（timeout 直覺的分類學）、競賽引理（多台機器賽跑的完整代數）。\n\n先排除一個命名地雷：你寫過的 exponential backoff，那個「指數」是重試間隔 2ⁿ 倍增的指數成長，是一個確定性排程；本章的「指數」是機率分布。兩者唯一的關係是常被放進同一句話裡。\n\n## 指數分布的基本量\n\n隨機變數 S ~ Exp(μ)（μ > 0 是 rate 參數）的定義（t ≥ 0）：\n\n```text\n密度    f(t)    = μe^(−μt)\nCDF     F(t)    = 1 − e^(−μt)\ntail    P(S>t)  = e^(−μt)        ← 全章主角，比 CDF 好用\n```\n\n用 ch03 的 tail 積分公式 E[X] = ∫₀^∞ P(X>t) dt（適用條件：X ≥ 0）：\n\n```text\nE[S]  = ∫₀^∞ e^(−μt) dt = 1/μ\nE[S²] = ∫₀^∞ 2t·P(S>t) dt = 2∫₀^∞ t·e^(−μt) dt = 2/μ²\nVar(S) = 2/μ² − (1/μ)² = 1/μ²\nC²ₛ   = Var/E² = 1                ← 指數的身分證\n```\n\nC² = 1 就是 ch03 那把刻度尺的原點刻在這裡的原因：指數是「叢發程度」的基準分布。參數 μ 叫 rate 不是裝飾：等一下你會看到 μ·δ 正是「接下來 δ 這一小段時間內完成」的機率（hazard rate 一節兌現），所以「服務率 10 則/s」與「E[S] = 100 ms」是同一句話的兩種讀法。\n\n指數從哪裡來？它是幾何分布的連續極限，這個推導值得走一遍，因為它解釋了無記憶性為什麼會遺傳。把時間切成寬 δ 的小格，每格獨立地以機率 p = μδ「完成」——這是 ch03 的幾何分布。存活超過 t（即前 t/δ 格都沒完成）的機率：\n\n```text\nP(X > t) = (1 − μδ)^(t/δ)  →  e^(−μt)   當 δ → 0\n                                         ← 用 (1 − x/n)ⁿ → e^(−x)\n```\n\n幾何分布無記憶（已丟 n 次沒中，不改變後面的賠率），極限自然把這個性質帶進連續世界。「指數 = 每一瞬間擲一枚極小機率的硬幣」是本章最值得內化的心像，競賽引理的直覺全靠它。\n\n取 μ = 10/s（推播 worker 的基準，E[S] = 100 ms）感受形狀：\n\n- 中位數 = ln 2/μ ≈ 69.3 ms——**一半以上的工作比平均值快**，平均被右尾拉高。\n- P(S > 100 ms) = e^(−1) ≈ 0.368：超過平均的機率約 37%。\n- P99 = ln 100/μ ≈ 461 ms ≈ 4.6 × 平均。任何指數分布的 P99 都是平均的 ln 100 ≈ 4.6 倍——這是 ch08「M/M/1 的 P99 ≈ 4.6× 平均」金句的源頭，也是你日後檢查直方圖「像不像指數」的快篩之一。\n\n## 無記憶性：定義、證明、唯一性\n\n**定義**：非負隨機變數 X 無記憶，若對所有 s, t ≥ 0：\n\n```text\nP(X > s + t | X > s) = P(X > t)\n```\n\n白話：已經活過 s，再活 t 的機率跟剛出生時一樣。過去不留任何資訊。\n\n**指數分布無記憶（完整推導）**：\n\n```text\nP(S > s+t | S > s) = P(S > s+t) / P(S > s)     ← 條件機率定義；{S>s+t} ⊂ {S>s}\n                   = e^(−μ(s+t)) / e^(−μs)\n                   = e^(−μt) = P(S > t)         ∎\n```\n\n兩行。但反方向才是重點：**連續世界裡只有指數分布無記憶**。\n\n**唯一性（工程師的嚴謹：每步能口頭說出理由）**。令 G(t) = P(X > t)，G(0) = 1，G 單調不增、右連續。無記憶性等價於函數方程 G(s+t) = G(s)·G(t)。\n\n先清理退化情形：若某個 t₀ > 0 使 G(t₀) = 0，則 G(t₀/2)² = G(t₀) = 0，反覆對半切，由右連續性逼出 G(0) = 0，矛盾——所以 G 處處為正。若 G(1) = 1，同樣的方程逼出 G(n) = 1 對所有 n，X 不是真正的（有限的）隨機變數。所以 G(1) = c ∈ (0, 1)。然後：\n\n```text\nG(n)   = G(1)ⁿ = cⁿ                    ← 對 n 歸納：G(n) = G(n−1)·G(1)\nG(1/m) = c^(1/m)                       ← 因為 G(1) = G(1/m + … + 1/m) = G(1/m)^m\nG(n/m) = c^(n/m)                       ← 前兩行合起來：所有正有理數被釘住\nG(t)   = c^t（所有實數 t ≥ 0）          ← 無理數 t 用有理數上下夾，靠單調性收口\n       = e^(−μt)，其中 μ = −ln c > 0    ∎\n```\n\n值得停一下的是最後一步：光有函數方程不夠——Cauchy 函數方程在不加任何正則條件時存在病態解。救你的是「G 是 tail 函數所以天生單調」這個免費的禮物。這就是本證明標「工程師的嚴謹」而非「直覺版」的原因：每一步都站得住，只是測度層級的細節我們用單調性一筆繳清。\n\n離散世界的對應角色是幾何分布（ch03 見過）：「還要再丟幾次硬幣」不因已經丟過幾次而改變。幾何是離散世界唯一的無記憶分布，指數是它的連續極限。\n\n**殘餘壽命**。無記憶性的直接改寫：已經進行了 t 的工作，剩餘時間 R = X − t（條件在 X > t 上）滿足 P(R > x | X > t) = P(X > x)——**剩餘時間的分布跟全新的一模一樣**。一台已經服務了 700 ms 的 worker，剩餘服務時間仍然是 Exp(μ)、期望仍然是完整的 1/μ。這對等下的 worked example 是關鍵。一般分布的殘餘壽命是另一個世界——你觀察到的工作會系統性偏長（inspection paradox），那是 ch12 的主角，這裡只立牌預告。\n\n為什麼說無記憶性是**化簡推導的武器**，而不只是一條性質？因為它讓「系統現在長什麼樣」足以預測未來，不必拖著歷史。想描述一個佇列系統的狀態，照理你得記錄：裡面有幾個工作、每個正在服務的工作**已經做了多久**、下一個到達**已經醞釀了多久**。後兩項是連續量，狀態空間瞬間爆炸。但若服務與到達間隔都是指數的，「已經做了多久」對未來毫無資訊量——記了也白記——於是**一個整數（系統內人數）就是完整狀態**。ch06 的口號「狀態吃掉歷史」在佇列世界能成立，全靠指數分布把歷史變得不值得吃。這就是 M/M/1 能用一條生滅鏈解掉、而 M/G/1 需要另起爐灶（ch12）的根本原因。\n\n回答開場的 timeout 問題（指數版）：如果服務時間真的是指數的，「已經等了 2 秒」不該改變你對剩餘時間的任何估計，timeout 也就沒有理由因此調整。但「如果」兩個字很重，往下看。\n\n## Hazard rate：「等越久越快來」是誰的性質\n\n把無記憶性放進更大的座標系。對有密度的非負隨機變數（且 P(X>t) > 0），定義 hazard rate：\n\n```text\nh(t) = f(t) / P(X > t)\n```\n\n讀法：h(t)·δ ≈ P(在 (t, t+δ] 內結束 | 已撐過 t)——「下一瞬間完成」的條件速率。它完全決定分布：對 ln P(X>t) 微分可得 P(X > t) = e^(−∫₀ᵗ h(u)du)。三種形狀，三種世界觀：\n\n```text\n h(t)\n  │*\n  │ *          DFR：hyperexponential、Pareto（見 ch15）\n  │  **             —— 撐越久，完成率越低，「等越久剩越久」\n  │    ***\n  │       *****\n  │·····················  exponential：h(t) = μ，永遠一樣\n  │        _____\n  │    ___/\n  │ __/\n  │/           IFR：uniform、Erlang、固定工作量的 batch job\n  └──────────────────────► t    —— 跑越久離終點越近，「等越久越快來」\n```\n\n- **IFR**（increasing failure rate）：確定性工作是極端例——一支固定要跑 10 分鐘的 batch job，跑到第 9 分鐘時 h 飆高，「快好了」的直覺**合法**。\n- **指數**：h(t) ≡ μ，唯一的常數線。無記憶性的幾何化身。\n- **DFR**（decreasing failure rate）：「跑越久代表剩越久」。混合分布天生往這邊倒，理由是貝氏的：撐得久這件事本身就是「你抽到的是慢工作」的證據（直覺版；混合指數恆為 DFR 的一般證明本書不證，見延伸閱讀）。\n\nDFR 用數字感受一下。取 ch13 將沿用的兩點混合：90% 短工作 Exp(20)（平均 50 ms）、10% 長工作 Exp(1/0.55)（平均 550 ms），整體平均仍是 100 ms。h(0) = 0.9·20 + 0.1·1.82 ≈ 18.2/s；t → ∞ 時 h(t) → 1.82/s——掉了一個數量級。具體地：P(是長工作 | 已跑 1 秒) ≈ 1.000（短工作撐過 1 秒的機率是 e^(−20) ≈ 2×10⁻⁹，可忽略），所以 E[剩餘 | 已跑 1 秒] ≈ 550 ms——是全新工作平均值的 5.5 倍。**「跑很久的 query 砍掉重試」在 DFR 世界是定理級正確的操作**；真實服務時間常常比這更重尾（ch15）。\n\n所以開場那兩種直覺都對，只是各屬於不同的分布形狀，而指數是中間那條分水嶺。判斷你在哪個世界，不需要擬合整條曲線，三個粗篩就夠：看直方圖估 C²（ch03 的方法；C² > 1 強烈暗示 DFR 型混合）、看 median/mean 比值（指數應 ≈ 0.693，重尾會把 mean 拉得遠高於 median）、看 P99/mean（指數應 ≈ 4.6）。更直接的辦法：從既有的 latency log 算「已經跑超過 t 的請求，最後總共跑了多久」的平均，對幾個 t 畫出來——這條「條件剩餘時間」曲線平的是指數、上升的是 DFR、下降的是 IFR。資料你本來就在收，只是從來沒這樣切過。\n\n## 競賽引理：CTMC 的引擎\n\n接下來這組引理是本章的主菜。設 X₁, …, X_k **獨立**、Xᵢ ~ Exp(λᵢ)，想像 k 個碼錶同時起跑，M = min(X₁, …, X_k) 是第一個響的時刻，I 是響的那顆的編號。記 Λ = λ₁ + … + λ_k。\n\n**引理一（最小值）**：M ~ Exp(Λ)。完整推導：\n\n```text\nP(M > t) = P(X₁ > t, …, X_k > t)\n         = Π P(Xᵢ > t)              ← 獨立性，唯一用到的地方\n         = Π e^(−λᵢt) = e^(−Λt)     ∎\n```\n\n指數的 tail 是 e 的指數函數，相乘時 rate 直接相加——「k 個指數碼錶一起跑，等同一個 rate 加總的指數碼錶」。注意這是指數的專利：兩個確定性 100 ms 工作的 min 還是 100 ms，不是 50 ms；min 的封閉性不能帶去別的分布。\n\n**引理二（勝者機率）與引理三（獨立性）**：一個積分同時證完。計算聯合機率 P(I = i, M > t)——第 i 顆在某時刻 s > t 響、且其他所有碼錶在 s 時都還沒響：\n\n```text\nP(I = i, M > t) = ∫_t^∞ λᵢe^(−λᵢs) · Π_{j≠i} e^(−λⱼs) ds   ← 對「i 在 s 響」做全機率積分\n                = ∫_t^∞ λᵢ·e^(−Λs) ds\n                = (λᵢ/Λ)·e^(−Λt)                            ∎\n```\n\n代 t = 0 得 **P(I = i) = λᵢ/Λ**：勝率正比於速率。而且對所有 t：\n\n```text\nP(I = i, M > t) = (λᵢ/Λ)·e^(−Λt) = P(I = i)·P(M > t)\n```\n\n聯合機率處處因式分解——**勝者是誰，與比賽花了多久，互相獨立**。\n\n我認為這是全章最反直覺的一條，值得正面盯著它看。直覺說：比賽拖得久，是不是代表快的那顆「失常」、慢的那顆比較可能贏？不是。就算你已經等了 10 倍於平均的時間，下一瞬間誰先響的賠率**仍然是 λᵢ : λⱼ**。用「每瞬間擲硬幣」的心像重講一次（直覺版，與上面的積分證明互為表裡）：在每一小段 δ 裡，第 i 顆碼錶以機率 λᵢδ 響。已知「這一格有人響」，是第 i 顆的條件機率是 λᵢδ/Λδ = λᵢ/Λ——**δ 和「現在是第幾格」都消掉了**。勝負由一場每瞬間賠率恆定的抽籤決定，而抽籤的賠率跟已經抽了幾次無關；無記憶性保證沒有任何一顆碼錶會「越等越燙」。連續分布也保證 P(同時響) = 0，平手不需要處理。\n\n具體數字養一下反射：λ₁ = 2、λ₂ = 1 的兩顆碼錶，min ~ Exp(3)（平均 1/3）、快錶勝率 2/3。已知這場比賽撐了超過 2 個平均長度才分勝負？勝率**還是 2/3**。已知快錶贏了？比賽時長的分布**還是 Exp(3)**。兩個條件化都拿不到任何東西——這就是引理三的全部內容。\n\n（適用條件再說一次，因為它常被偷渡：**獨立**且**各自指數**。兩者缺一，三條引理全部作廢。）\n\n為什麼說它是引擎：ch07 的 CTMC 整個結構就是這三條引理。系統停在一個狀態，每條出邊是一顆獨立的指數碼錶——引理一說停留時間是 Exp(出邊速率總和)，引理二說跳去哪裡的機率正比於速率，引理三說「跳去哪」與「停多久」可以拆開處理。沒有第三條，「狀態 + 速率」就不足以描述系統，整套生滅過程（ch07）與 M/M/1（ch08）的手算都不存在。\n\n## Worked example：兩台都在忙的 worker pool\n\n基準場景：推播 pool 有兩台 worker，服務時間各自獨立 ~ Exp(μ)、μ = 10/s（平均 100 ms）。你的 job 到達時兩台都在忙，而且你排第一。問：(a) 平均多久輪到你開始？(b) 你的總逗留時間 E[T]？\n\n**先列直覺會怎麼算錯**（兩種都常見）：\n\n- 錯法一：「每台平均做到一半，剩 50 ms，所以我等 50 ms。」結論碰巧接近，推理全錯——指數的殘餘不是「做到一半」，是完整重來的 Exp(10)、平均 100 ms。這個錯法在非指數世界會立刻露餡：若服務是確定性 100 ms、相位隨機，殘餘是 Uniform(0, 100 ms)，兩台的 min 平均是 100/3 ≈ 33.3 ms，不是 50。\n- 錯法二：「殘餘還是 Exp(10)、平均 100 ms，所以我等 100 ms。」前半對，後半忘了你在跟**兩台**賽跑——你只需要其中一台空出來。\n\n**正解，一步一步**：\n\n```text\n t = 0: both workers busy, you are first in queue\n\n worker A ──[residual ~ Exp(10)]──┐\n                                  ├──► W = min ~ Exp(20), E[W] = 1/20 s\n worker B ──[residual ~ Exp(10)]──┘\n\n then your own service: S ~ Exp(10), E[S] = 1/10 s\n```\n\n1. 無記憶性：兩台的**殘餘**服務時間各自仍是 Exp(10)，不管它們已各自做了多久。\n2. 競賽引理一：你的等待 W = min(R_A, R_B) ~ Exp(10+10) = Exp(20)，**E[W] = 1/20 s = 50 ms**。\n3. 引理二與三的順帶禮物：哪台先空出來是 50/50，而且就算你等了 400 ms 才輪到，仍然是 50/50。\n4. 你自己的服務在**單一台** worker 上跑，S ~ Exp(10)、與 W 獨立（你的工作量跟前人何時做完無關）。注意你的服務速率是 10 不是 20——pool 加速的是等待，不是你自己被服務的速度（這就是 ch09 裡 E[T] 永遠 ≥ 1/μ 的地板）。\n\n```text\nE[T] = E[W] + E[S] = 1/20 + 1/10 = 0.15 s = 150 ms\nVar(T) = 1/20² + 1/10² = 0.0025 + 0.01 = 0.0125 s²\nC²_T  = 0.0125 / 0.15² = 0.556 < 1     ← 兩段獨立指數相加，比單一指數更「規律」\n```\n\n順手推廣：c 台 worker 全忙、你排第一，等待是 c 路殘餘 Exp(μ) 的競賽，W ~ Exp(cμ)——pool 越大，「下一個空位」來得越快，但你自己的服務永遠是 Exp(μ)。這個「等待縮短、服務不變」的結構就是 ch09 整章的骨架。\n\n多走一步，把 T 的整個分布拿下（完整推導，全機率切「等待是否已超過 t」）：\n\n```text\nP(T > t) = P(W > t) + ∫₀^t 20e^(−20w)·e^(−10(t−w)) dw\n         = e^(−20t) + 20e^(−10t)·(1 − e^(−10t))/10\n         = 2e^(−10t) − e^(−20t)\n```\n\n自我複核：t = 0 時得 2 − 1 = 1 ✓；對 tail 積分 2/10 − 1/20 = 0.15 = E[T] ✓。數值感受：P(T > 300 ms) = 2e^(−3) − e^(−6) ≈ 0.0971；解 P(T > t) = 0.01 得 t₉₉ ≈ 530 ms ≈ 3.53 × 平均——C² < 1 的分布，tail 比指數的 4.6× 緊，與上面 C²_T = 0.556 互相印證。\n\n## 指數假設的誠實檢討\n\nM/M/1 的兩個 M 是兩個獨立的賭注，勝率很不一樣。\n\n**到達間隔：常常賭得過**。大量互相獨立、個別稀疏的使用者匯流，疊加起來趨近 Poisson 過程，到達間隔自動變成指數——這不是巧合而是極限定理（Palm–Khintchine），ch05 專章處理，這裡只說結論：你的 ~10M 訊息/月推播流，在分鐘級時間窗內把到達間隔當指數，通常是體面的近似。什麼時候破：retry 迴圈（到達和系統狀態相關）、cron 觸發的批次上游、明顯的日夜尖峰（非齊次，ch05）。\n\n**服務時間：常常賭輸**。真實服務時間直方圖很少長得像指數：cache hit/miss 造成雙峰（C²ₛ 遠大於 1 的混合）、固定大小 payload 接近確定性（C²ₛ ≈ 0）、慢 query 與大檔案造成重尾（ch15）。指數服務的真正角色是**分析上的方便**：無記憶性讓「系統內人數」單獨就構成 Markov 狀態（ch07/ch08 兌現）。賭輸的帳單在 ch12 結算：等待時間正比於 (1 + C²ₛ)/2，基準數字下把 C²ₛ = 10 的現實硬套指數模型，預測 0.4 s、實際 2.2 s——低估 5.5 倍。\n\n那為什麼整個 Part III 還是要在指數假設上蓋房子？三個誠實的理由。第一，它是唯一能讓你**手算到底**的世界，而手算過一次完整模型的人，才有資格判斷近似什麼時候可信——M/M/1 是訓練場，不是終點。第二，許多 M/M 結論的**形狀**在一般分布下存活，只是係數變了：等待對 1/(1−ρ) 的爆炸形狀（ch08）原封不動地出現在 P-K（ch12）與 Kingman（ch14）裡，指數世界先讓你看清形狀。第三，有些結論意外地根本不依賴指數——哪些是、哪些不是，正是 ch12 之後的劇情主線。\n\n決策版總結：到達端的指數假設先信後驗（驗法 ch05）；服務端的指數假設**永遠先量 C²ₛ 再說**（量法 ch03 已給）。\n\n## 陷阱與防禦\n\n| 陷阱 | 它怎麼騙你 | 防禦與自我察覺 |\n|---|---|---|\n| 把無記憶性當通則 | 「等多久都一樣」只屬於指數；拿去推論一般等待，timeout/重試決策全錯 | 先看直方圖：C²ₛ ≈ 1、median/mean ≈ 0.693、P99/mean ≈ 4.6 三項快篩都過才像指數 |\n| 「等很久了，應該快到了」 | 只在 IFR 世界合法；DFR/重尾世界正好相反（已跑 1 秒 → 預期再 550 ms 的例子） | 問自己服務時間是固定工作量（IFR）還是混合/重尾（DFR）；不確定就量 |\n| 競賽引理偷渡到相關碼錶 | 兩台 worker 共用同一顆 DB、同 host 搶 CPU、GC 同步暫停——完成時間正相關，min 不再是 Exp(Σλ)，等待被低估 | 引理的適用條件唸三遍：獨立＋指數。共享瓶頸＝相關＝引理作廢 |\n| min 的封閉性帶去非指數 | 「兩台平均 100 ms，所以 min 平均 50 ms」對確定性服務是錯的（min 仍 100 ms）、對 uniform 殘餘也是錯的（33.3 ms） | 1/Σλ 公式只在各路皆指數時成立；其他分布乖乖算 P(min>t) = ΠP(Xᵢ>t) |\n| 服務時間硬套指數 | C²ₛ = 10 的現實 vs 指數模型：等待低估 5.5×（ch12 結帳） | 模型選型前先量 C²ₛ；C²ₛ 離 1 很遠就準備 M/G/1（ch12） |\n| exponential backoff ≠ 指數分布 | 命名撞車導致「backoff 間隔是指數分布」的誤讀；backoff 是確定性倍增排程（加 jitter 才有隨機性） | 看到 exponential 先問：成長的指數，還是分布的指數？ |\n\n## 紙上推演\n\n**第 1 題 [10 分鐘 ★]**：闔上書，重講「無記憶性 + 連續 ⇒ 指數」。要求：寫出函數方程、說明退化情形（G 某處為 0、G(1) = 1）怎麼排除、整數→有理→實數三級跳各用了什麼、單調性在哪一步是救命的。\n\n**第 2 題 [15 分鐘 ★★]**：hedged read：同一筆讀取同時發給三個 replica，回應時間獨立、速率分別 20、10、10（每秒）。(a) 第一個回應的期望時間？(b) 快 replica 勝出的機率？(c) 已知這次等了超過 100 ms 才有第一個回應，它來自快 replica 的機率變成多少？(d) 三個 replica 共用同一顆磁碟時，(a) 的答案會往哪個方向錯？\n\n**第 3 題 [15 分鐘 ★★]**：異質雙 worker：μ₁ = 10、μ₂ = 5，兩台都在忙，你排第一。求 E[等待] 與 E[總逗留]。提示：你最後落在哪台 worker 上不是 50/50，而且這個條件化之所以合法，靠的是引理三。\n\n**第 4 題 [10 分鐘 ★★]**：找破綻：「接駁車間隔是平均 10 分鐘的指數分布。我已經等了 9 分鐘，所以平均再等 1 分鐘就到。」指出論證錯在哪、什麼條件下它會變成對的、再多挖一層——「我隨機抵達車站」這件事本身還藏著什麼陷阱（一句話即可，ch12 兌現）。\n\n### 推演解答\n\n**第 1 題**：核心序列：G(s+t) = G(s)G(t)；若 G(t₀) = 0 則對半切配右連續性逼出 G(0) = 0 矛盾，故 G > 0；若 G(1) = 1 則 X 無限大不是真隨機變數，故 G(1) = c ∈ (0,1)；歸納得 G(n) = cⁿ，m 等分得 G(1/m) = c^(1/m)，組合得有理點 G(n/m) = c^(n/m)；無理點用有理數上下夾、單調性保證夾得攏，得 G(t) = c^t = e^(−μt)。常見錯路：跳過退化情形直接開算（被 ln 0 反咬）；把「實數延拓」當免費——沒有單調性時 Cauchy 方程有病態解，這一步才是整個證明的門檻。\n\n**第 2 題**：(a) min ~ Exp(20+10+10) = Exp(40)，E = 1/40 s = 25 ms。(b) 20/40 = 0.5。(c) **還是 0.5**——引理三：勝者身分與比賽時長獨立，「等得久」不是任何 replica 的證據。直覺反對的原因是把「快 replica 沒先回」誤讀成資訊，但無記憶性下所有人每一瞬間重新出生。(d) 共用磁碟 → 回應時間正相關 → 「至少一個快」的好處縮水，真實 E[min] 比 25 ms **大**；極端完全相關時三路退化成一路。hedging 的收益是用獨立性買的。\n\n**第 3 題**：殘餘各為 Exp(10)、Exp(5)；W = min ~ Exp(15)，E[W] = 1/15 ≈ 66.7 ms。落點機率：快台 10/15 = 2/3、慢台 1/3，且與 W 獨立（引理三，所以可以直接相乘相加不必對 W 條件化）：\n\n```text\nE[T] = 1/15 + (2/3)·(1/10) + (1/3)·(1/5)\n     = 0.0667 + 0.0667 + 0.0667 = 0.200 s\n```\n\n常見錯路：用兩台平均服務時間 (100+200)/2 = 150 ms 當你的 E[S]——錯，你比較可能被快台接走，正確的混合是 (2/3)·100 + (1/3)·200 ≈ 133 ms。三項各等於 1/15 是這組數字的小巧合，不是定理。\n\n**第 4 題**：破綻：指數間隔無記憶，已等 9 分鐘後剩餘等待仍是完整的 Exp(1/10 分鐘)，期望還是 10 分鐘，不是 1 分鐘。論證變對的條件：間隔是**確定性** 10 分鐘（IFR 極端），此時已等 9 分鐘 ⇒ 再等 1 分鐘，精確成立。再挖一層：「隨機抵達」的人傾向落在**偏長的間隔裡**——你撞上的那段間隔平均不是 10 分鐘而更長（inspection paradox，見 ch12）。\n\n## 自我檢核\n\n1. 無記憶性的數學定義是什麼？它的離散版本是哪個分布、為什麼說幾何是指數的離散極限？\n2. 「無記憶 + 連續 ⇒ 指數」的證明裡，單調性救了哪一步？沒有它會發生什麼？\n3. min ~ Exp(Σλᵢ) 的證明是哪兩行？哪一行用了獨立性、為什麼非它不可？\n4. 用 hedged request 的語言，向一個沒學過機率的同事解釋「比賽拖很久，不改變誰會贏的賠率」——並說出這在哪個假設破掉時失效。\n5. h(t) 的定義與讀法？指數、固定工作量 batch job、90/10 混合服務各屬於哪類？對「跑很久的 query 要不要砍」各給什麼建議？\n6. 兩台忙碌 worker 的例子：哪一步用了無記憶性、哪一步用了競賽引理？50 ms 為什麼不是 100 ms、也不是 33 ms？\n7. M/M/1 的兩個 M 各自是什麼假設？哪一個在你的系統比較可能成立、靠什麼機制（ch05 預告）？另一個賭輸時帳單多大（ch12 預告）？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Performance Modeling and Design of Computer Systems》(Cambridge, 2013)，Ch. 11 \"Exponential Distribution and the Poisson Process\"——本章的教科書對應章，memoryless 性質與指數→幾何的關係講得最工程友善。https://www.cs.cmu.edu/~harchol/PerformanceModeling/book.html\n- Harchol-Balter,《Introduction to Probability for Computing》(Cambridge, 2024)——全書 PDF 免費；Ch. 12 以 §12.1 復習指數分布後直接蓋出 Poisson 過程，當 ch05 的預習正好。https://www.cs.cmu.edu/~harchol/Probability/chapters/HarcholBalterWholeBook.pdf\n- Adan & Resing,《Queueing Systems》講義（TU Eindhoven），第 2 章 §2.4——指數分布、無記憶性、min of exponentials 的極簡推導，免費 PDF，適合對照本章驗收自己的推導。https://www.win.tue.nl/~iadan/queueing.pdf\n- MIT OCW 6.262 Discrete Stochastic Processes（Gallager 親授，免費錄影），Lecture 4 \"Poisson (The Perfect Arrival Process)\" 與 Lecture 5——想看指數與 Poisson 的嚴格版處理就從這兩講開始。https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/\n- Wikipedia \"Memorylessness\"——唯一性刻畫與函數方程 S(t+s) = S(t)S(s) 的精簡陳述，複習本章證明骨架用。https://en.wikipedia.org/wiki/Memorylessness\n"}, {"id": "ch05-poisson-process", "file": "ch05-poisson-process.md", "group": "Part II — 機率地基", "title": "ch05 — Poisson 過程：到達的標準模型", "md": "# ch05 — Poisson 過程：到達的標準模型\n\n> **本章解決什麼問題**：ch04 給了你指數分布這顆原子；本章把原子串成鏈，建立描述「到達」的標準隨機過程。你會拿到三個等價定義（一個拿來模擬、一個拿來算數、一個拿來建模與驗證）、兩個保結構的運算（疊加與分流）、一個漂亮的結構定理（條件均勻性），以及「為什麼真實世界的到達流這麼常像 Poisson」的理由（Palm–Khintchine）。ch06–07 的 Markov 引擎與 ch08 起的所有 M/M/* 模型，第一個字母 M 指的就是本章——這一章決定你之後信不信得過那個假設。\n\n## 從你已知的出發\n\n你的 WebSocket 通知系統一個月送 ~10M 則訊息。換算一下：以 30 天計，一個月有 2,592,000 秒，平均到達率約 3.86 則/s；尖峰時段則是基準表的 λ = 8 則/s。監控儀表板上的 QPS 是一條每分鐘平均線，但容量問題全部發生在「平均線底下的隨機抖動」裡：\n\n- 尖峰平均 8 則/s，**某一秒湧進 12 則以上**的機率多大？直覺常猜「很罕見」，本章 worked example 會算出 ≈ 0.112——大約每 9 秒就有一秒。\n- 你把 30% 的訊息路由到 iOS 推播 shard。那條子流長什麼樣？要重新壓測量測嗎？本章的答案：不用，它就是 Poisson(2.4)，而且跟 Android 子流**獨立**——這句話的條件與證明都在本章。\n- 三個上游服務把事件匯進同一條 pipeline。匯流之後的到達流比較平滑、還是比較抖？\n\n按機率路由到 shard，在數學裡叫**分流（thinning）**；多個上游匯流，叫**疊加（superposition）**。你每天在做的兩個工程操作，本章把它們變成定理——並且講清楚定理什麼時候不保佑你（least-loaded 路由、retry 流、批次上游）。\n\n開工前先校準一個常見的視覺直覺：「平均 3.86 則/s」不是「每 0.26 秒準時來一則」。等距是確定性流（D 流）的長相；Poisson 流的長相是**群聚與空檔交錯**——短間隔比你以為的多（指數密度在 0 附近最高，ch04），偶爾又冒出長到讓你懷疑系統掛掉的空檔。盯著 access log 覺得「到達怎麼這麼不均勻」，多半不是異常，是指數間隔的正常臉。\n\n## 計數過程：先把「到達流」變成數學物件\n\n要談「到達」，先固定詞彙。一個**計數過程（counting process）**{N(t), t ≥ 0} 滿足：N(0) = 0；N(t) 取非負整數；t 增加時 N(t) 不減；對 s < t，N(t) − N(s) 是區間 (s, t] 內的到達數。\n\n同一條到達流有三種等價的記法，之後會不停切換視角：\n\n- **計數視角**：N(t)＝到時刻 t 為止累計到達數；\n- **時刻視角**：第 i 個到達發生在時刻 τᵢ（τ₁ < τ₂ < …）；\n- **間隔視角**：相鄰到達的間隔 Gᵢ = τᵢ − τᵢ₋₁（取 τ₀ = 0）。\n\n```\nN(t)\n 4 │                              ******\n 3 │                    **********\n 2 │          **********\n 1 │    ******\n 0 │****\n   └────┴─────┴─────────┴─────────┴────► t\n        t1    t2        t3        t4\n```\n\n三者攜帶的是同一份資料，橋梁是這條對偶關係：**{N(t) ≥ n} 與 {τₙ ≤ t} 是同一個事件**——「到 t 為止至少來了 n 個」就是「第 n 個在 t 之前到」。等一下證等價性會直接用它。\n\n## Poisson 過程的三個等價定義\n\nPoisson 過程是同一個東西的三張面孔。先把三張臉各自看清楚，再談它們為什麼是同一張。\n\n### 定義一：指數間隔（拿來模擬）\n\n> 間隔 G₁, G₂, … 獨立同分布（i.i.d.）、皆為 Exp(λ)，則 N(t) 是速率 λ 的 Poisson 過程。\n\n這是**建構式**的定義：抽一個 Exp(λ) 等多久、到達、再抽一個……Python 小實驗就是照這個定義疊出整條流的。立即推論：E[Gᵢ] = 1/λ、C² = 1（ch03）；每段間隔無記憶（ch04）——盯著流看了 3 秒沒等到，下一個到達的剩餘等待仍是 Exp(λ)。\n\n### 定義二：獨立平穩增量＋Poisson 計數（拿來算數）\n\n> N(0) = 0，且：\n> ① **獨立增量**——不相交區間裡的到達數互相獨立；\n> ② **平穩增量**——N(t+s) − N(s) 的分布只看區間長度 t，不看位置 s；\n> ③ N(t) 服從 Poisson(λt)：P(N(t) = n) = e^(−λt)·(λt)ⁿ/n!。\n\n要算「某段時間來幾個」的機率，用這張臉。兩個馬上要用的事實：**E[N(t)] = λt 且 Var(N(t)) = λt**——均值等於變異數是 Poisson 的指紋（Python 小實驗第一題就驗這個）；以及任何長度 t 的窗口都同分布（平穩性）。\n\n**Worked example：λ = 8 時，某一秒 ≥ 12 則的機率**（完整手算，不跳步）。N(1) ~ Poisson(8)，要算 P(N(1) ≥ 12) = 1 − P(N(1) ≤ 11) = 1 − e⁻⁸·Σₖ₌₀¹¹ 8ᵏ/k!。逐項算 8ᵏ/k!（每項可由前一項乘 8/k 得到，手算友善）：\n\n| k | 8ᵏ/k! | 累計 |\n|---|---|---|\n| 0 | 1.00 | 1.00 |\n| 1 | 8.00 | 9.00 |\n| 2 | 32.00 | 41.00 |\n| 3 | 85.33 | 126.33 |\n| 4 | 170.67 | 297.00 |\n| 5 | 273.07 | 570.07 |\n| 6 | 364.09 | 934.16 |\n| 7 | 416.10 | 1350.26 |\n| 8 | 416.10 | 1766.36 |\n| 9 | 369.87 | 2136.23 |\n| 10 | 295.89 | 2432.12 |\n| 11 | 215.20 | 2647.32 |\n\ne⁻⁸ ≈ 0.000335463，所以 P(N(1) ≤ 11) ≈ 0.000335463 × 2647.32 ≈ 0.888，**P(N(1) ≥ 12) ≈ 0.112**。平均 8 則/s 的流，每 9 秒左右就有一秒湧進 12 則以上——不是罕見事件。順手多算一格：P(N(1) ≥ 11) = 1 − e⁻⁸ × 2432.12 ≈ 0.184。也就是說，若單一 worker 一秒最多消化 10 則（μ = 10，基準表），尖峰時段約 18% 的秒數裡**當秒到達就超過當秒產能**。λ < μ 卻照樣積壓（ch01 的觀察），現在有了第一個定量註腳；積壓的完整代價 ch08 算。\n\n### 定義三：微小區間刻畫（拿來建模與驗證）\n\n> N(0) = 0、增量獨立且平穩，且當 h → 0：\n> P(在 (t, t+h] 恰有 1 個到達) = λh + o(h)；\n> P(在 (t, t+h] 有 ≥ 2 個到達) = o(h)。\n\no(h) 的精確意思：f(h) 屬於 o(h) ⇔ f(h)/h → 0（h → 0）——「比 h 高一階的小量」。這張臉最抽象，卻是**工程上最誠實**的一張，因為它把物理假設攤開給你檢查：\n\n1. 每一瞬間的到達傾向是常數 λ（沒有時段差——之後非齊次版會放掉這條）；\n2. 不會兩個同時到（**orderliness**——批次到達直接違反這條）；\n3. 各區間互不相干（retry 迴圈直接違反這條）。\n\n當你問「我的系統到達是 Poisson 嗎」，問的其實是這三條成不成立。\n\n### 等價性：證一個方向，其餘指路\n\n三個定義互相等價。等價的實用意義是**換臉自由**：推導時挑最好算的臉（定義二）、寫模擬挑可建構的臉（定義一）、審自己系統挑假設攤得最開的臉（定義三）——而你有權在論證的任何一步切換，因為它們是同一個過程。本章完整證最有內容的一段（定義三 ⇒ 定義二的 Poisson 計數），其餘標明路線與出處：\n\n| 方向 | 本章處理 |\n|---|---|\n| 定義三 ⇒ 定義二 | **完整推導**（ODE 路線，下方） |\n| 定義二 ⇒ 定義一 | 第一個間隔完整推；後續間隔的「重啟」論證指路 |\n| 定義一 ⇒ 定義二 | 指路（Erlang 卷積路線，見延伸閱讀 Harchol-Balter Ch.12） |\n\n**定義三 ⇒ N(t) ~ Poisson(λt)**（完整推導；用到的工具只有一階線性 ODE 與積分因子）。記 Pₙ(t) = P(N(t) = n)。先注意由定義三，P(某長度 h 區間 0 個到達) = 1 − λh + o(h)（把「恰 1 個」與「≥ 2 個」扣掉）。\n\n```text\nn = 0：\nP₀(t+h) = P₀(t) · (1 − λh + o(h))          ← (0,t] 與 (t,t+h] 增量獨立；平穩性給後者機率\n(P₀(t+h) − P₀(t)) / h = −λP₀(t) + o(h)/h\n令 h → 0：  P₀′(t) = −λP₀(t)，P₀(0) = 1\n⇒ P₀(t) = e^(−λt)\n\nn ≥ 1：拆 (0,t+h] = (0,t] ∪ (t,t+h]，後段放 0、1、≥2 個到達：\nPₙ(t+h) = Pₙ(t)(1 − λh) + Pₙ₋₁(t)·λh + o(h)   ← ≥2 個的所有情形機率合計 o(h)\n⇒ Pₙ′(t) = −λPₙ(t) + λPₙ₋₁(t)\n兩邊乘積分因子 e^(λt)：\n(e^(λt)·Pₙ(t))′ = λ·e^(λt)·Pₙ₋₁(t)\n歸納假設 Pₙ₋₁(t) = e^(−λt)(λt)^(n−1)/(n−1)!：\n(e^(λt)·Pₙ(t))′ = λ·(λt)^(n−1)/(n−1)!\n積分（Pₙ(0) = 0 定常數為 0）：\ne^(λt)·Pₙ(t) = (λt)ⁿ/n!\n⇒ Pₙ(t) = e^(−λt)·(λt)ⁿ/n!        ∎\n```\n\n誠實標示：把 o(h) 從機率等式帶進極限、以及對 n 做歸納的起點 n = 1，逐步都能口頭說出理由，但「o(h) 對 t 一致」這類分析細節我們接受了——要測度論等級的版本見延伸閱讀的 Gallager。\n\n**定義二 ⇒ 定義一（第一個間隔）**：用對偶關係，P(G₁ > t) = P(N(t) = 0) = e^(−λt)，所以 G₁ ~ Exp(λ)。一行搞定——但只搞定了第一個間隔。要說「G₂ 也是 Exp(λ) 且與 G₁ 獨立」，需要「過程在隨機時刻 τ₁ 重新開始」：獨立增量只保證在**固定**時刻切開兩邊獨立，τ₁ 是隨機的，把固定換成隨機需要一段 strong Markov 風格的論證。這是三角形裡最容易被含糊帶過的一步，本書不證，見 Gallager 講義 §2.2。\n\n## 疊加與分流：到達流的代數\n\nPoisson 過程在兩個最常見的流操作下封閉——這是它成為「標準模型」的第二個理由（第一個理由在 Palm–Khintchine 那節）。\n\n```\nsuperposition (merge two independent streams)\n\n  stream A, rate lamA ──►──┐\n                           ├──►  merged stream, rate lamA+lamB\n  stream B, rate lamB ──►──┘\n\nthinning (independent coin flip per arrival, P(keep) = p)\n\n                           ┌──►  kept stream,    rate p*lam\n  stream, rate lam ──►─────┤\n                           └──►  dropped stream, rate (1-p)*lam\n```\n\n### 疊加（superposition）\n\n> **定理**：N₁、N₂ 是**互相獨立**的 Poisson 過程，速率 λ₁、λ₂，則 N₁ + N₂ 是速率 λ₁ + λ₂ 的 Poisson 過程。前提就一個字：獨立——它也是工程上最會破的那個。\n\n**證明 sketch（工程師的嚴謹）**：對合流驗定義三。增量獨立：各自獨立增量＋兩流互相獨立。恰一個到達：P = λ₁h(1−λ₂h) + λ₂h(1−λ₁h) + o(h) = (λ₁+λ₂)h + o(h)。至少兩個：≤ P(流1 ≥ 2) + P(流2 ≥ 2) + P(兩流各 ≥ 1) = o(h) + o(h) + λ₁λ₂h² = o(h)。三條全過。∎\n\n間隔視角交叉驗證：合流的下一個到達 = min(兩流各自的下一個到達)；兩邊剩餘等待都是指數（無記憶），min(Exp(λ₁), Exp(λ₂)) ~ Exp(λ₁+λ₂)——正是 ch04 的競賽引理。而且競賽引理第二條免費送你：**這個到達來自流 i 的機率是 λᵢ/Σλⱼ**。k 條流歸納即得一般版。\n\n工程讀法：k 條獨立 Poisson 上游匯進同一條 pipeline，下游只需要**一個數字** Σλᵢ 就能完整建模——形狀不變、速率相加，這是「下游容量規劃可以無視上游拓撲」的數學理由。注意這份方便是 Poisson 限定的：兩條各自每 30 秒整點觸發的 cron 流（D 流）疊加，相位對齊時是雙倍批次、相位錯開時是交錯等距，合流長相完全取決於相位——沒有「形狀不變」可言。\n\n### 分流（thinning）\n\n> **定理**：速率 λ 的 Poisson 過程，每個到達**獨立擲幣**（機率 p 進 A 流、1−p 進 B 流；擲幣 i.i.d. 且與過程本身獨立），則 A 是 Poisson(pλ)、B 是 Poisson((1−p)λ)，**而且 A 與 B 互相獨立**。\n\n前半句符合直覺，最後一句不符合：A + B 明明等於總流，兩個子流怎麼可能獨立？先看計算（固定 t 的完整計算）：\n\n```text\nP(N_A(t) = j, N_B(t) = k)\n= P(N(t) = j+k) · C(j+k, j) · p^j (1−p)^k      ← 給定總數，逐筆獨立擲幣\n= e^(−λt) (λt)^(j+k)/(j+k)! · (j+k)!/(j!·k!) · p^j (1−p)^k\n= [e^(−pλt) (pλt)^j / j!] · [e^(−(1−p)λt) ((1−p)λt)^k / k!]\n                                                ← e^(−λt) 拆成兩個指數因子\n```\n\n聯合機率精確分解成「Poisson(pλt) 的 pmf × Poisson((1−p)λt) 的 pmf」——邊際各是 Poisson、且在每個固定 t 互相獨立。把「固定 t」升級成「整條過程獨立」要對多個區間重複同一招，本書不展開（見 Harchol-Balter Ch.12）。直覺修復：知道「iOS 這秒收很多」當然暗示總量大，但 Poisson 總量的不確定性恰好被獨立擲幣**乾淨拆成兩份互不相干的不確定性**——這是 Poisson 專屬的性質，一般到達流分流之後子流仍然相關。\n\n**Worked example：p = 0.3 路由到 iOS shard**。主流 λ = 8 則/s，每則訊息按 message_id 雜湊獨立決定、30% 進 iOS 推播：\n\n- iOS 子流：Poisson(0.3 × 8) = **Poisson(2.4)**，平均間隔 1/2.4 ≈ 0.417 s；\n- Android 子流：Poisson(5.6)；兩條子流獨立——iOS shard 的容量規劃**不需要**看 Android 的瞬時負載；\n- 某一秒 iOS 一則都沒有的機率：e^(−2.4) ≈ 0.0907。\n\n條件檢查（這段比結論重要）：「獨立擲幣、與過程獨立」對 message_id 雜湊近似成立。換成 **round-robin** 就不成立——輪流分配下，子流間隔是兩段 Exp(8) 之和，即 Erlang-2，C² = 0.5：流變得**更平滑**（有時這正是你要的），但它不是 Poisson，拿 M/M/1 公式算那個 shard 會**高估**等待。換成 **least-loaded／JSQ 路由**更糟——路由決策看佇列狀態，「與過程獨立」整個垮掉，子流既不是 Poisson、彼此也不獨立，本節兩個定理一個都用不上。\n\n## 條件均勻性：知道總數之後，Poisson 沒有個性\n\n> **定理（敘述）**：給定 N(t) = n，n 個到達時刻 (τ₁, …, τₙ) 的條件分布，等同於「n 個 i.i.d. Uniform(0, t) 隨機變數排序後」的分布（順序統計量），聯合密度在 0 < u₁ < … < uₙ < t 上恆為 n!/tⁿ。\n\nn = 1 的情形完整推（0 ≤ s ≤ t）：\n\n```text\nP(τ₁ ≤ s | N(t) = 1)\n= P(N(s) = 1, N(t) − N(s) = 0) / P(N(t) = 1)     ← 獨立增量拆分子\n= [λs·e^(−λs)] · [e^(−λ(t−s))] / [λt·e^(−λt)]\n= s / t                                           ← λ 全部約掉\n```\n\ns/t 正是 Uniform(0, t) 的 CDF。一般 n 的版本是同一招加排列計數，本書不重複（見 Gallager 講義 §2.5）。注意推導最後那行的奇觀：**λ 消失了**。λ 決定「來幾個」；一旦告訴你來了幾個，「落在哪裡」就是純然均勻、毫無偏好——Poisson 是給定速率下「最沒有個性」的到達模式：不群聚、不規律、對任何時刻一視同仁。\n\n三個用途：①條件計算瞬間變簡單——尖峰某分鐘來了 30 則，前 10 秒的則數就是 Binomial(30, 10/60)，期望 5 則，跟 λ 無關（紙上推演第 2 題）；②第二種模擬配方——先抽 N(t) ~ Poisson(λt)，再均勻撒點排序，跟定義一的逐間隔法等價；③事故重建的快速估計——已知尖峰那一小時共約 28,800 則（8/s × 3600）、事故窗口是其中的 4 分鐘，則窗口內期望 28,800 × 4/60 = 1,920 則，不需要重撈 log 也不需要 λ：條件均勻性把「按時間比例分配」升格成定理；④它是後面許多經典證明的暗器（「Poisson 到達看到什麼」是 ch08 PASTA 的主題，此處不展開）。\n\n## 為什麼世界這麼常是 Poisson：Palm–Khintchine\n\nErlang 在 1909 年用哥本哈根的電話資料實證呼叫到達服從 Poisson 分布（見 landscape 歸屬）。為什麼大自然要配合？因為 Poisson 不是被假設出來的，是被**聚合製造**出來的。\n\n> **Palm–Khintchine 定理（直覺版，本書不證，見延伸閱讀）**：把 m 條**互相獨立**的（renewal）到達流疊加，若總速率收斂到有限的 λ、且每條流都「一致稀疏」（任何一條在固定窗口內到達的機率隨 m → ∞ 一致地變小），則疊加流趨近速率 λ 的 Poisson 過程。\n\n把它讀成「點過程世界的中央極限定理」：CLT 說大量獨立小貢獻之**和**趨向常態；Palm–Khintchine 說大量獨立稀疏到達流之**疊加**趨向 Poisson。關鍵在於**個別來源不必是 Poisson**——每個使用者的發訊行為可以怪到天上去（睡覺、開會、突然狂發），只要來源夠多、互相獨立、沒有誰獨大。\n\n計數版的迷你推導當錨點（工程師的嚴謹；這只說明單一窗口的計數收斂，完整定理是過程層級的收斂）：固定窗長 t，m 個獨立使用者各自在窗內發訊機率約 λt/m，總數 K ~ Binomial(m, λt/m)：\n\n```text\nP(K = k) = C(m,k) · (λt/m)^k · (1 − λt/m)^(m−k)\nC(m,k)/m^k = m(m−1)…(m−k+1) / (m^k · k!) → 1/k!     ← k 固定、m → ∞\n(1 − λt/m)^(m−k) → e^(−λt)\n⇒ P(K = k) → e^(−λt) (λt)^k / k!\n```\n\n這就是「稀有事件定律」：大量、獨立、個別稀少 ⇒ Poisson 計數。你的 ~10M 訊息/月來自數十萬個彼此不認識的使用者，每人每天幾則——三個條件全中，所以尖峰窗內的到達流近似 Poisson(8) 是有定理護航的，不是偷懶。\n\n**什麼時候破**（三條前提各對應一種工程現實）：\n\n1. **行為相關（獨立性破）**：同一個外部刺激同步喚醒大量來源——球賽進球、行銷推播送達的那一刻、跨日結算。來源不再獨立，到達在事件時刻附近劇烈群聚。徵兆：計數的 Var/Mean（dispersion index）遠大於 1。\n2. **retry 迴圈（獨立性破＋速率看狀態）**：失敗製造重試、重試加重失敗——到達率變成系統狀態的函數。它連「固定速率的點過程」都不是，任何 λ = 常數的模型先天失格（feedback 的代價 ch16 算、retry storm ch20 算）。\n3. **批次上游（稀疏性破）**：某個上游一口氣倒 500 則進來。「沒有誰獨大」直接不成立；粗時間尺度的計數可能還像 Poisson，間隔分布卻重度叢發（C²ₐ ≫ 1）。\n\n順手兌現 ch04 留的問題：為什麼「到達近似 Poisson」常見、「服務時間近似指數」少見？因為到達是大量獨立來源聚合的產物，有極限定理護航；服務時間是單一工作的內在性質，沒有任何定理保證它像指數——實務上它常常重尾（ch12、ch15 處理）。\n\n## 非齊次 Poisson：λ(t) 與尖峰時段\n\n平穩增量說「速率永遠一樣」，日夜節律直接打臉。修法是保留定義三的骨架、讓速率隨時間走：**非齊次 Poisson 過程**以速率函數 λ(t) 定義——P(在 (t, t+h] 恰一個到達) = λ(t)h + o(h)、≥ 2 個仍是 o(h)、**獨立增量保留、平穩增量丟掉**。同樣的 ODE 路線可推出：\n\n> N(t) − N(s) ~ Poisson(∫ₛᵗ λ(u) du)。記 Λ(t) = ∫₀ᵗ λ(u) du（mean function），則 E[N(t)] = Λ(t)。\n\n小算盤：給推播管線一天的輪廓——夜間 8 小時 λ = 1/s、白天 14 小時 λ = 4/s、尖峰 2 小時 λ = 8/s。日總量 = 3600 × (8×1 + 14×4 + 2×8) = 3600 × 80 = 288,000 則/日，月約 8.6M 則——與 ~10M/月的量測同量級，輪廓合理。全日平均速率 λ̄ = 288,000/86,400 ≈ 3.33/s。現在看清楚兩件事：\n\n- 「尖峰 λ = 8」這句基準的精確身分：**在尖峰窗內把 λ(t) 視為局部常數**（locally stationary），齊次理論整套適用於那個窗口。本書後面所有 λ = 8 的計算都站在這個立足點上。\n- 用 λ̄ ≈ 3.33 做容量規劃是用錯模型：μ = 10 的 worker 按平均看 ρ ≈ 0.33 一派輕鬆，尖峰實況是 ρ = 0.8——之後你會知道這兩個 ρ 的延遲差距是好幾倍（ch08 的使用率階梯）。\n\n兩個一句話的延伸：①**時間換刻**——把時鐘換成 Λ(t) 的「操作時間」，非齊次流變回速率 1 的齊次流，檢驗與模擬都靠這招；②模擬 λ(t) 流的標準做法是先生成一條 λ_max 的齊次流、再按 λ(t)/λ_max 擲幣保留——thinning 的再就業。條件均勻性也有非齊次版：給定總數，到達時刻不再均勻，而是按密度正比於 λ(s) 撒點。\n\n## 陷阱與防禦\n\nPoisson 是**可檢驗的假設**，不是預設真理。每條假設、它在工程上怎麼破、騙你多少、怎麼自我察覺：\n\n| 假設 | 工程上怎麼破 | 它怎麼騙你（會錯多少） | 自我察覺 |\n|---|---|---|---|\n| 增量獨立 | retry 迴圈；事件同步喚醒用戶 | 真實 C²ₐ = 2 的流硬套 Poisson（C²ₐ = 1）：等待低估 1/3——Kingman 修正因子 (C²ₐ+C²ₛ)/2 從 1 變 1.5（基準：0.4 s vs 0.6 s，見 ch14） | 多窗長算計數的 Var/Mean；把到達對齊外部事件時間軸看群聚 |\n| 平穩增量 | 日夜節律、行銷活動 | 用全日平均 λ̄ ≈ 3.33 規劃尖峰 λ = 8 的系統：ρ 估 0.33、實況 0.8，延遲差好幾倍 | 分時段估 λ；尖峰窗內用局部常數、跨時段用 λ(t) |\n| orderliness（不同時到達） | 批次上游、gateway 攢一批一起 flush | 粗尺度計數像 Poisson，批內排隊把等待吃掉；M/M/1 嚴重低估 | 看間隔直方圖：有沒有一坨貼著 0 的間隔；算 C²ₐ |\n| thinning 的獨立擲幣 | round-robin、least-loaded/JSQ 路由 | round-robin 子流是 Erlang-2（C² = 0.5），按 Poisson 算會高估等待；JSQ 子流與佇列狀態相關，公式全失格 | 檢查路由規則：看不看狀態？逐筆獨立嗎？ |\n| 「mean ≈ var 所以是 Poisson」 | ——（這是檢驗方法自己的陷阱） | 必要不充分：間隔相關的流也可能在某個窗長碰巧 mean ≈ var | 多個窗長重測 dispersion；加看間隔分布與間隔自相關 |\n\n防禦的最小流程：①畫間隔直方圖、算 C²ₐ（Poisson 應接近 1，P(G > t) 在半對數紙上近似直線）；②至少三個窗長（例如 100 ms、1 s、10 s）各算一次計數的 Var/Mean（Poisson 在每個尺度都應接近 1；叢發流常只在某個尺度露餡）；③讀架構圖——你的流上游有沒有 retry、批次、看狀態的路由。三關都過，才把 M 寫進模型的第一個字母。\n\n## 紙上推演\n\n**第 1 題 [15 分鐘 ★★] 定義互推**：從定義二出發，證明第一個間隔 G₁ ~ Exp(λ)。接著說明：為什麼「G₂ 也是 Exp(λ) 且與 G₁ 獨立」**不是**同一行論證的免費贈品？缺的那塊論證直覺上長什麼樣？\n\n**第 2 題 [10 分鐘 ★★] 條件均勻性應用**：尖峰時段某一分鐘恰好到了 30 則。(a) 前 10 秒落入則數的分布與期望？(b) 30 則全部擠在後 30 秒的機率？(c) λ 有出現在你的答案裡嗎？為什麼？\n\n**第 3 題 [10 分鐘 ★] 三條真實到達流的審判**：A：大量獨立使用者手動發訊息；B：每 30 秒整點觸發的 cron 健康檢查；C：失敗後固定延遲 1 秒重試的 retry 流。哪些近似 Poisson？逐條用三定義或 Palm–Khintchine 的前提說理由。\n\n**第 4 題 [10 分鐘 ★] 疊加與競賽**：iOS 子流 2.4/s 與 Android 子流 5.6/s 匯流。(a) 合流是什麼過程？前提是什麼？(b) 已知此刻來了一則，它是 iOS 的機率？(c) 連續 3 則都是 Android 的機率？\n\n### 推演解答\n\n**解 1**：對偶關係給 P(G₁ > t) = P(N(t) = 0) = e^(−λt)，即 Exp(λ)。G₂ 不是贈品，因為它要求過程「在 τ₁ 重新開始」：獨立增量保證的是**固定**時刻切開兩邊獨立，而 τ₁ 是隨機時刻。直覺修補：τ₁ 之前的歷史決定了 τ₁，而獨立增量讓 τ₁ 之後的增量與那段歷史無關——把這個直覺做嚴謹需要 strong Markov 風格的論證（Gallager §2.2）。常見錯路是一句「無記憶性所以成立」帶過：無記憶性是**單一隨機變數**的性質，「在隨機時刻重啟」是**過程層級**的性質，兩者差一個量級的論證。\n\n**解 2**：(a) 條件均勻性 ⇒ 每則獨立均勻落在 60 秒內，落在前 10 秒的機率 10/60 = 1/6，故則數 ~ Binomial(30, 1/6)，期望 30/6 = 5 則。(b) 每則落在後 30 秒機率 1/2，全部擠進去 = (1/2)³⁰ ≈ 9.31 × 10⁻¹⁰。(c) λ 不在答案裡——這正是條件均勻性的內容：λ 只決定「來幾個」，總數給定後它就出局了。\n\n**解 3**：**A**：近似 Poisson——Palm–Khintchine 三前提（多、獨立、無人獨大）大致成立；例外是行銷推播或重大事件讓行為同步的時刻。**B**：不是——間隔是確定的 30 秒（C²ₐ = 0），且在整點附近的小區間到達機率接近 1 而非 λh，直接違反定義三。值得多想一層：Palm–Khintchine **不要求**個別來源是 Poisson，所以大量「相位隨機」的獨立 cron 疊加起來仍趨近 Poisson；現實的破口是大家都對齊整點——相位相關 = 不獨立 = 前提破。**C**：不是——到達率是系統狀態的函數（失敗越多重試越多），增量不獨立，連固定速率的點過程都不是；它是 ch16/ch20 的 feedback 題材。\n\n**解 4**：(a) 兩條子流獨立（thinning 定理的結論，前提是當初按獨立擲幣拆流），疊加定理 ⇒ 合流是 Poisson(2.4 + 5.6) = Poisson(8)——拆開再合回去，毫髮無傷。(b) 競賽引理：2.4/8 = 0.3。(c) 各到達的來源標籤 i.i.d. ⇒ 0.7³ = 0.343。\n\n### Python 小實驗\n\n只用標準函式庫。實驗一照**定義一**疊出 Poisson 過程，驗證**定義二**的指紋（均值 ≈ 變異數 ≈ λ）——兩個定義在程式裡互相對質。\n\n```python\nimport random\nimport statistics\n\nrandom.seed(42)\n\nLAM = 8.0\nN_RUNS = 2000\n\ndef count_in_unit_interval(lam):\n    \"\"\"Build the process from exponential gaps; count arrivals in (0, 1].\"\"\"\n    t = 0.0\n    n = 0\n    while True:\n        t += random.expovariate(lam)\n        if t > 1.0:\n            return n\n        n += 1\n\ncounts = [count_in_unit_interval(LAM) for _ in range(N_RUNS)]\nm = statistics.mean(counts)\nv = statistics.variance(counts)\nprint(f\"mean of N(1)     = {m:.3f}\")\nprint(f\"variance of N(1) = {v:.3f}\")\nprint(f\"variance / mean  = {v / m:.3f}\")\n```\n\n理論值：E[N(1)] = Var(N(1)) = 8、Var/Mean = 1。2,000 次重複下均值的標準誤約 √(8/2000) ≈ 0.063，模擬均值應落在 8 ± 0.2；樣本變異數波動較大，應落在 8 ± 0.8；Var/Mean 應落在 1 ± 0.1。\n\n實驗二驗證疊加定理：兩條獨立流（3/s 與 5/s）合併後，間隔應是 Exp(8)——平均 0.125 s、C² = 1。\n\n```python\nimport random\nimport statistics\n\nrandom.seed(42)\n\ndef arrival_times(lam, horizon):\n    \"\"\"Arrival epochs of a Poisson process on [0, horizon].\"\"\"\n    times, t = [], 0.0\n    while True:\n        t += random.expovariate(lam)\n        if t > horizon:\n            return times\n        times.append(t)\n\nHORIZON = 2000.0\nmerged = sorted(arrival_times(3.0, HORIZON) + arrival_times(5.0, HORIZON))\ngaps = [b - a for a, b in zip(merged, merged[1:])]\nm = statistics.mean(gaps)\nc2 = statistics.variance(gaps) / m**2\nprint(f\"mean gap = {m:.4f}\")\nprint(f\"C^2      = {c2:.3f}\")\n```\n\n理論值：平均間隔 1/8 = 0.125 s、間隔 C² = 1。約 16,000 個間隔下，平均間隔應落在 0.125 ± 0.003、C² 應落在 1 ± 0.1。\n\n想拷打它：把實驗二其中一條流換成**固定間隔**的 cron 流（`t += 1.0/lam`），再看合流的 C² 掉到哪裡——Poisson 的指紋立刻消失；這正是陷阱表「疊加的前提是每條都隨機且獨立」的體感版。\n\n## 自我檢核\n\n1. 三個定義各拿來做什麼？模擬一條 Poisson 流你用哪個？驗證「我的到達流是不是 Poisson」你用哪個？算「某秒 ≥ 12 則」你用哪個？\n2. mean(N(t)) ≈ var(N(t)) 是 Poisson 的充分條件嗎？說出正確的檢驗組合（至少三招）。\n3. thinning 後兩條子流獨立——這跟「兩條子流加起來就是總流」為什麼不矛盾？成立的前提是什麼？round-robin 與 JSQ 各毀掉哪一塊？\n4. 條件均勻性的精確敘述是什麼？為什麼 λ 從條件分布裡消失？這在說 Poisson 的什麼個性？\n5. Palm–Khintchine 的三個前提是什麼？各舉一個你自己系統裡會破掉的場景。\n6. 非齊次 Poisson 保留哪條性質、丟掉哪條？「尖峰 λ = 8」這句話的精確身分是什麼？\n7. 為什麼「到達近似 Poisson」常見、「服務時間近似指數」少見？\n8. 用定義三的 o(h) 語言說明：批次到達違反哪一條、retry 流違反哪一條？\n\n## 延伸閱讀\n\n- Harchol-Balter,《Introduction to Probability for Computing》Ch.12 \"The Poisson Process\"（全書 PDF 免費：https://www.cs.cmu.edu/~harchol/Probability/chapters/HarcholBalterWholeBook.pdf ）——三定義等價的完整證明，含本章指路的 Erlang 卷積方向，行文最接近本書口味。\n- Gallager, MIT OCW 6.262《Discrete Stochastic Processes》（Spring 2011）：https://ocw.mit.edu/courses/6-262-discrete-stochastic-processes-spring-2011/ ——課程講義第 2 章是 Poisson 過程的嚴格版：隨機時刻重啟（§2.2）、條件均勻性與順序統計量（§2.5）；Lecture 4 標題就叫 \"Poisson (The Perfect Arrival Process)\"。\n- Palm–Khintchine theorem（Wikipedia）：https://en.wikipedia.org/wiki/Palm%E2%80%93Khintchine_theorem ——定理的精確敘述（m 條獨立 renewal 流、總速率有限、一致稀疏）；要嚴格證明沿它引用的 Heyman & Sobel 往下挖。\n- Erlang 小傳（MacTutor）：https://mathshistory.st-andrews.ac.uk/Biographies/Erlang/ ——1909 年電話呼叫服從 Poisson 的實證出處與生平；本章「聚合製造 Poisson」的歷史起點。\n- Adan & Resing,《Queueing Systems》講義（免費 PDF：https://www.win.tue.nl/~iadan/queueing.pdf ）——第 1–2 章用最精簡的篇幅複述 Poisson 性質，適合當本章的速查卡。\n"}, {"id": "ch06-markov-chains", "file": "ch06-markov-chains.md", "group": "Part II — 機率地基", "title": "ch06 — Markov chain：狀態吃掉歷史", "md": "# ch06 — Markov chain：狀態吃掉歷史\n\n> **本章解決什麼問題**：ch04 給了你無記憶性、ch05 給了你到達流，但「系統」還沒登場。本章建立全書的引擎：把系統寫成「狀態＋轉移」，並回答三個問題——什麼樣的模型只看現在就夠（Markov 性質）、長期各狀態佔多少時間（平穩分布）、憑什麼一條軌跡的時間平均能代表整個分布（遍歷定理）。ch07 把這顆引擎接上連續時間與佇列，ch08 用它生出第一個完整模型，ch19 的模擬方法學靠本章發的執照開工。\n\n## 從你已知的出發\n\n你寫過或設定過 circuit breaker：closed 正常放行、連續失敗到門檻就跳到 open 全部擋掉、冷卻時間到了進 half-open 放探測請求，成功回 closed、失敗退回 open。三個狀態、幾條箭頭，這張圖你閉著眼睛都畫得出來——在 TLA+ 那本書裡你手畫過一堆同款的狀態轉移圖。\n\n但有一個問題那張圖答不了：**長期下來，這個 breaker 有多少比例的時間處於斷路？**冷卻時間從 30 秒調成 60 秒，這個比例會怎麼動？狀態圖只告訴你「哪裡可以去」，不告訴你「各地各待多久」。要回答，箭頭上得標機率，然後解一組方程。這就是 Markov chain：你已經會畫的圖，加上你大學看過的線性方程組，合出一個能回答「長期比例」的機器。\n\n另一條線索接 ch04：無記憶性是「時間軸上的失憶」——等了多久不影響還要等多久；Markov 性質是「軌跡上的失憶」——怎麼走到這個狀態，不影響接下來往哪走。同一個哲學，從一個隨機變數升級到一整條過程。而你的監控系統其實天天在做本章的事：面板上「服務處於 degraded 的時間佔比」就是在估某個狀態的長期機率，只是你從來沒問過這個估計什麼時候合法。本章結束時，這個問題有名字（遍歷定理）、有條件（不可約）、也有會翻車的情境（時間齊次假設破掉）。\n\n## Markov 性質：狀態把歷史吃掉\n\n一個離散時間隨機過程 X₀, X₁, X₂, … 取值於狀態空間 S（本章 S 有限）。它是 Markov chain，若對所有 n 與所有狀態：\n\n```text\nP(Xₙ₊₁ = j | Xₙ = i, Xₙ₋₁ = iₙ₋₁, …, X₀ = i₀) = P(Xₙ₊₁ = j | Xₙ = i)\n```\n\n白話：給定現在，過去對未來沒有額外資訊。本書再加一條**時間齊次**假設：這個機率不隨 n 改變，記作 P(i→j)。\n\n我喜歡的讀法是「狀態吃掉歷史」：狀態必須**裝下未來需要知道的一切**。這句話把 Markov 性質從「世界的性質」翻轉成「你的設計責任」——Markov 性質不是某個系統天生有或沒有的，而是**你選的狀態變數夠不夠肥**。\n\n拿 breaker 當例子。如果跳閘規則是「連續 5 次失敗才開路」，那麼光記 {closed, open, half-open} 三個狀態**不是** Markov chain：處在 closed 時，下一步會不會跳閘取決於「目前已連續失敗幾次」——這是歷史，三狀態裝不下它。修法不是放棄，而是**擴狀態**：把 closed 拆成 closed₀、closed₁、…、closed₄（下標＝目前連續失敗數），歷史就被吃進狀態裡，Markov 性質恢復。建模的真功夫全在這一步：選一組「最小但裝得下未來」的狀態。佇列理論裡最重要的一次選擇是「狀態＝系統內人數」——它什麼時候夠、什麼時候不夠，是 ch08 與 ch12 的主旋律。\n\n## 轉移矩陣
