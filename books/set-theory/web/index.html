ctive | 非構造性的 | 一個只證明「東西存在」、卻給不出怎麼造它的論證；AC 是最典型的例子，這正是它最折磨工程師的地方。 | ch12 |\n| Banach–Tarski paradox | 巴拿赫–塔斯基悖論 | 用 AC 可以把一顆實心球分成有限多塊、只靠旋轉平移重組成兩顆一樣大的球；它真正揭露的不是球的事，是「不是每個點集都能有體積」。 | ch13 |\n| non-measurable set | 不可測集 | 一個沒辦法被賦予一致「體積／長度」的點集；巴拿赫–塔斯基那幾塊就是這種東西，倍增的是點的安排、不是體積。 | ch13 |\n| measure theory | 測度論 | 研究怎麼給集合一致地賦予「長度／面積／體積／機率」的理論；它必須把測度限制在 σ-代數上，正是為了躲開不可測集（系統建立指向《馴服隨機》）。 | ch13 |\n| Vitali set | 維塔利集 | 用 AC 從 [0,1] 上「相差有理數」的每個等價類各挑一個代表元造出的集合，可被證明不可測；是巴拿赫–塔斯基的可懂前身。 | ch13 |\n\n## 五、判定的邊界：獨立與不完備\n\n| English | 中文 | 一句話定義（白話、可口頭講） | 首次出現章 |\n|---|---|---|---|\n| continuum hypothesis (CH) | 連續統假設 | 問 `2^ℵ₀ = ℵ₁` 嗎——ℵ₀ 和 𝔠 之間到底有沒有夾著別的無限；康托爾終生想證、希爾伯特列為 20 世紀第一問題。 | ch14 |\n| undefined behavior | 未定義行為 | 工程師的話：規格沒約束到的地方，怎麼填都不算違規；本書用它類比「ZFC 對 CH 兩邊都沒規定」這件事。 | ch15 |\n| independence | 獨立性 | 一個命題 P 獨立於某公理系統，意思是系統既證不出 P、也證不出 ¬P；不是「還沒證出來」，是「被證明了證不出來」，兩個方向都相容。 | ch15 |\n| consistent / consistency | 一致／一致性 | 一個公理系統推不出矛盾（不會同時證出 P 和 ¬P）；不一致的系統會爆炸——能推出任何命題，整套變廢墟。 | ch15 |\n| relative consistency | 相對一致性 | 「如果原系統一致，那麼加上某命題後也一致」這種形式的陳述（Con(ZFC) ⇒ Con(ZFC+P)）；獨立性就是靠兩個方向的相對一致性夾出來的。 | ch15 |\n| constructible universe (L) | 可構成宇宙 | 哥德爾造的最小宇宙，只承認「被明確定義出來」的集合；在 L 裡 CH（甚至 GCH）成立，所以 ZFC 反駁不了 CH。 | ch15 |\n| forcing | 力迫法 | 科恩的技術：從一個模型「外加」新的實數撐大連續統、造出 ¬CH 成立的模型，所以 ZFC 也證不出 CH（本書只給直覺 taste）。 | ch15 |\n| large cardinal axioms | 大基數公理 | 假設存在大到 ZFC 推不出其存在的基數的新公理；多數活躍集合論家指望靠這類新公理替 CH 定真假（本書只 taste 不展開）。 | ch15 |\n| Gödel numbering | 哥德爾編碼 | 把每個公式、每段證明都編成一個自然數，於是「某命題可證」變成一個關於數的算術命題（工程橋：把程式碼當資料、序列化）。 | ch16 |\n| incompleteness theorem | 不完備定理 | 哥德爾 1931：任何夠強、一致、可遞迴公理化的系統，都存在一個為真卻證不出的命題 G（第一定理），且這種系統證不出自己一致（第二定理）。 | ch16 |\n| diagonal lemma | 對角化引理（不動點引理） | 保證任何「只有一個自由變數的算術公式」都能機械地造出一個自我指涉的句子；哥德爾用它讓 G 說出「我不可證」。 | ch16 |\n\n## 六、哲學與計算：無限到底存不存在\n\n| English | 中文 | 一句話定義（白話、可口頭講） | 首次出現章 |\n|---|---|---|---|\n| potential infinity | 潛無限 | 亞里斯多德版的無限：「永遠可以再加一」的可能性，但「全部加完」這個完成狀態不存在。 | ch17 |\n| actual infinity | 實無限 | 康托爾版的無限：一個已經完成、可以整個拿起來當對象的東西（ℵ₀ 就是一個數）；本書前十六章全建立在它上面。 | ch17 |\n| logicism | 邏輯主義 | 弗雷格、羅素那一派：要把整個數學化約到邏輯；被羅素悖論重創。 | ch17 |\n| formalism | 形式主義 | 希爾伯特那一派：別管無限對象真不真實，數學是只要一致就合法的符號遊戲；被哥德爾第二定理重創。 | ch17 |\n| intuitionism／constructivism | 直覺主義／構造主義 | 布勞威爾那一派：只承認能被造出來的對象、拒絕把排中律用在無限上、拒絕非構造的存在證明；跟「只承認可計算的東西」最親，最對工程師胃口。 | ch17 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n這份地圖把全書 19 章末尾散落的「延伸閱讀」，連同 landscape 查證過的資源，收成一張可以照著走的下山路線圖。你站在 ch19 的觀景台上，回頭看那條從牧羊人配對一路走到哥德爾自我指涉的脊椎；往前看，有三條岔路——**往邏輯與可計算走**（對角線家族的後代：停機問題、不完備、型別論）、**往基礎與公理走**（把直覺補成嚴格：公理集合論、AC、CH、forcing、模型論）、**往欣賞與哲學走**（把驚嘆挖到底：數學史、康托爾傳記、無限的哲學、科普影片）。\n\n每條路線下的每一筆都附一句話：**為什麼值得讀、讀哪一段、對應本書哪章**。所有連結只收書中各章或 landscape 已標為查證過的（多數標「2026-06 確認在線」）；連結狀態會隨時間變動，最終以「能不能搜到那個標題」為準。沒附死連結的經典，用「作者＋年份＋標題」記，搜尋即可。\n\n讀法建議：時間有限的話，先跳到本附錄最後的「**如果只看三樣**」——那是跨三條路線各挑一個的最短路徑。三樣看完還想走遠，再回到路線裡挑。\n\n---\n\n## 路線一：往邏輯與可計算走——對角線家族的後代\n\n這條路是本書脊椎的自然延伸。對角論證（ch04）、冪集定理對角集（ch06）、羅素悖論（ch10）、哥德爾不完備（ch16）、停機問題（ch16）是**同一條對角線**的五次化身；走這條路，你會看到它在計算理論裡繼續開枝散葉。對一個工程師來說，這也是最有「字面同一件事」回報的一條（見 ch18）。\n\n- **康托爾 1891 原論文〈Über eine elementare Frage der Mannigfaltigkeitslehre〉（論流形論中的一個初等問題）。** 對角論證的源頭，出乎意料地短。康托爾原本就是對任意「兩個元素的特徵函數族」陳述，比「實數不可數」更一般——等於他自己埋好了冪集定理。入口讀 Wikipedia「Cantor's diagonal argument」條目（2026-06 確認在線）的原文脈絡與英譯導讀即可。對應 ch04（定版那條對角線）、ch06（一般化）。\n\n- **史丹佛哲學百科「Gödel's Incompleteness Theorems」**（plato.stanford.edu/entries/goedel-incompleteness/，2026-06 確認在線）。最權威也最克制的入口，把「G 說自己不可證」這種非正式說法、和精確的對角化引理講清楚，並逐條破除誤讀（真理不可知／數學不一致／凡事不可證／拿去證上帝）。你想確認自己沒把定理講過頭時，回來對這篇。對應 ch16——這是全書最容易翻車的單一主題，先讀它再跟人講。\n\n- **〈Did Turing prove the undecidability of the halting problem?〉**（arXiv:2407.00680，2026-06 確認在線）。專門考據「停機問題」這個名字不在圖靈 1936 原文、是後人（戴維斯 1958）命名的措辭史。你之後跟人講這個故事時，這篇讓你不會把名字繫錯到圖靈頭上。對應 ch16（停機問題＝對角線的計算版）。\n\n- **Charles Petzold,《The Annotated Turing》。** 圖靈 1936 原論文〈On Computable Numbers〉的逐行導讀。想把「對角論證→停機問題→不可計算函數」這條脊椎，從康托爾這側親手走到圖靈那側、看圖靈本人怎麼用對角線造出「可定義但不可計算」的序列，這是最好的一本（2026-06，內容為穩定史料；圖書館／電子書皆易得）。對應 ch16、ch18。\n\n- **Wikipedia,〈Rice's theorem〉**（en.wikipedia.org/wiki/Rice%27s_theorem，2026-06 確認在線）。萊斯定理的精確陳述（非平凡語義性質不可判定）與證明，看它怎麼把任意非平凡語義性質的判定**化約**到停機問題——「沒有萬能靜態分析器」最該讀的一頁。對應 ch18（對角線的工程日常）。\n\n- **Wikipedia,〈Incompressible string〉／Kolmogorov complexity**（en.wikipedia.org/wiki/Incompressible_string，2026-06 確認在線）。不可壓縮字串與「幾乎所有字串不可壓縮」的鴿籠論證，跟本書「程式可數、函數不可數」是同一個鴿籠精神，也是「不存在完美無損壓縮」的數學底。對應 ch18。\n\n- **SEP,「Intuitionistic Type Theory」**（plato.stanford.edu/entries/type-theory-intuitionistic/，2026-06 確認在線）。構造主義在現代的復活地：Curry–Howard 對應、型別論、Coq／Lean／Agda 的哲學地基。想知道「證明即程式」這句話的字面意思，這是橋。對應 ch17、ch18（版本與生態狀態屬時效細節，以「廣為使用、進入主流」概括即可）。\n\n---\n\n## 路線二：往基礎與公理走——把直覺補成嚴格\n\n本書全程紙筆推演、刻意不擺完整證明（CSB 只給骨架、forcing 只給 taste、ℝ 的構造與測度論明寫略過）。如果你讀完癢起來，想看「工程師的直覺」升級成「數學家的嚴謹」長什麼樣，走這條。第一站是兩本經典教科書，再往公理化集合論的爭議與獨立性深處走。\n\n- **Paul Halmos,《Naive Set Theory》（1960）。** 書名叫「Naive」其實講的正是 ZFC，但用最少的形式包袱、把公理當工具一條條引入立刻拿來用。薄、狠、無廢話——「一一對應定義一樣多」「公理＝限制概括」這些本書的種子，這裡有最精簡的數學語言版。本書是它的「直覺與驚嘆」版，兩者對照讀很划算。對應 ch01（cardinality 開頭）、ch11（第 1–11 節對應 ZFC）。\n\n- **Thomas Jech,《The Axiom of Choice》（Dover 重印）。** 想看 AC 的完整技術版（含獨立性證明、各種弱版的層級）。本書不證的細節都在這；當參考書、不必通讀。對應 ch12。\n\n- **史丹佛哲學百科,「Zermelo's Axiomatization of Set Theory」**（plato.stanford.edu/entries/zermelo-set-theory/，2026-06 確認在線）。分離公理 1908 年的原始動機、策梅洛 1904 用 AC 證良序定理引爆爭議的第一手脈絡。對應 ch09（良序定理伏筆）、ch11（分離公理為修羅素而生）、ch12（AC 的歷史現場）。\n\n- **史丹佛哲學百科,「The Axiom of Choice」**（plato.stanford.edu/entries/axiom-choice/，2026-06 確認在線）。AC 最權威的哲學與數學綜述。讀「The Axiom」與「Maximal Principles」把三張臉（選擇函數／良序／佐恩）的等價看得更細；構造性爭議在「The Axiom of Choice and Logic」。對應 ch12。\n\n- **Encyclopedia of Mathematics,〈Schroeder–Bernstein theorem〉**（encyclopediaofmath.org/wiki/Schroeder%E2%80%93Bernstein_theorem，2026-06 確認在線）。CSB 歸屬史的權威整理，看清「康托爾述用 AC／戴德金 1887 未發表／伯恩斯坦 1897／施洛德 1898 有瑕」這個名字掛三人卻帳算不平的定理。完整證明（追蹤軌道、鏈分三型）可配 Wikipedia「Schröder–Bernstein theorem」的「Proof」一節。對應 ch07。\n\n- **史丹佛哲學百科,「The Continuum Hypothesis」**（plato.stanford.edu/entries/continuum-hypothesis/，2026-06 確認在線）。CH 與其獨立性最權威的綜述：哥德爾（L）與科恩（forcing）各證了什麼、以及「靠新公理決定 CH」的現代爭論。對應 ch14（問題的形狀）、ch15（獨立性與現代態度）。\n\n- **Akihiro Kanamori,〈How Gödel Transformed Set Theory〉**（Notices of the AMS, 2006；math.bu.edu/people/aki/12.pdf，2026-06 確認在線）。哥德爾用 L 證 `Con(ZF) ⇒ Con(ZFC+GCH)` 的第一手脈絡。要弄清「相對一致性、不是證 CH 為真」這條高風險線，讀這篇最穩。對應 ch15。\n\n- **Timothy Chow,〈A Beginner's Guide to Forcing〉**（arXiv:0905.2539，2026-06 確認在線）。替「想再多懂一點 forcing、但還不想啃完整技術」的人寫的橋。本書只給 taste，這篇把「為什麼能加新實數又不矛盾」講到你能再深一層，且刻意對非專家友善。對應 ch15。\n\n- **Scott Aaronson,〈The Complete Idiot's Guide to the Independence of the Continuum Hypothesis〉**（scottaaronson.blog/?p=4974，2026-06 確認在線）。一個電腦科學家寫給工程師口味讀者的獨立性導讀，語氣和本書最近。看它怎麼把哥德爾＋科恩串成一個故事。對應 ch15。\n\n- **R. Gardner（ETSU 講義）,〈Nonmeasurable sets and the Banach-Tarski Paradox〉**（faculty.etsu.edu/gardnerr/5210/banach-tarski.pdf，2026-06 確認在線）。把「不可測集 → 維塔利 → 巴拿赫–塔斯基」一條線講得最乾淨的教學講義。本書明說不證的群論（自由群 F₂ 分解）與維塔利論證完整版都在這。對應 ch13。\n\n---\n\n## 路線三：往欣賞與哲學走——把驚嘆挖到底\n\n如果你讀這本書最被打動的不是「我證得出來」，而是「人類竟然想得出這個」，那打動你的是思想史與哲學。這條路把無限放回它誕生的歷史現場與爭論裡，也是本書精神最近的一條。\n\n- **J. W. Dauben,《Georg Cantor: His Mathematics and Philosophy of the Infinite》。** 康托爾的權威傳記。它把康托爾的數學、哲學、與那場被嚴重渲染的精神疾病傳說的真相都考據清楚——本書對康托爾生平的克制寫法（雙相情感障礙是內因、學術壓力是誘因非病因），正是以 Dauben 這一系考據為錨。對應 ch04、ch17、ch19（全書的康托爾敘事）。\n\n- **Hilbert,〈Über das Unendliche〉（論無限，1925 演講／1926 刊出）。** 「沒有人能把我們逐出康托爾為我們創造的樂園」的原始出處，也是形式主義對無限最有力的辯護書。讀它如何把「無限存不存在」這個形上學問題、改寫成「形式系統一致不一致」這個技術問題——這一步是 20 世紀數學哲學的關鍵轉折。（2026-06，依 landscape §20。）對應 ch17、ch19。\n\n- **Galileo,《Two New Sciences》（1638），「第一天」談無限與連續的段落。** 伽利略悖論的原始出處，看他怎麼在「平方數一一對應」和「整體大於部分」之間，選擇了放棄比較——一個人離真相只差一句話卻沒說出口。讀那段對話（Salviati 與 Simplicio）比讀任何轉述都有力。英譯多有公版（如 Dover 版）。對應 ch01。\n\n- **George Gamow,《One Two Three… Infinity》（1947）。** 讓希爾伯特旅館舉世皆知的那本科普書（中譯常作《從一到無窮大》）。第 1 章談無限與可數，文字活潑、是這個比喻的原始普及來源——讀它順便對照本書把歸屬講清楚的版本（希爾伯特 1924 口頭講、伽莫夫筆下普及）。對應 ch02。\n\n- **Hofstadter,《Gödel, Escher, Bach》。** 把哥德爾的自我參照、對角化、quine、遞迴串成一整本書的科普經典。它正是用「自我指涉」這條線把邏輯、藝術、音樂縫起來，跟本書「同一條對角線」的脊椎是親戚。當你想把不完備的震撼往更廣處延伸時讀它（厚，但值得）。對應 ch16。\n\n- **史丹佛哲學百科,「Intuitionism in the Philosophy of Mathematics」**（plato.stanford.edu/entries/intuitionism/，2026-06 確認在線）。直覺主義最權威的當代綜述：布勞威爾為什麼拒絕排中律、選擇序列如何重建連續統、代價在哪。想真正理解「存在＝可構造」這條線，從這裡讀。對應 ch17。\n\n- **Veritasium／Numberphile 的對角論證與無限影片。** YouTube 上多支以視覺方式走對角線（搜「Cantor diagonal argument」即可，2026-06）。優點是把「翻轉對角線」的動畫做得很直觀，適合在你自己重講之前先看一遍別人怎麼講；缺點是幾乎都不處理 0.4999…＝0.5000… 雙重表示的坑，看的時候自己補上本書 ch04 的「只在 {3,7} 裡選」規則。對應 ch04。\n\n- **史丹佛哲學百科,「Russell's Paradox」**（plato.stanford.edu/entries/russell-paradox/，2026-06 確認在線）。羅素悖論最權威的入口。讀「The Paradox」與「Frege」兩節，把本書的兩段論和弗雷格的反應對照一次；它也講了策梅洛的獨立發現。對應 ch06（埋下的對角集 D）、ch10（正面拆開）。\n\n---\n\n## 鄰書銜接點：書架上接著走的一本\n\n本書是書架的一格，旁邊那本《馴服無限》（微積分）接得上——它不是延伸閱讀的「外人」，而是本書刻意留洞、由它補完的鄰居，也是同一種勝利的另一個方向。\n\n- **《馴服無限》全書。** 這本書馴服的是「無限大／多少」，把「一樣多」操作化成一一對應；那本書馴服的是「無限小／逼近」，把無限操作化成極限——**同一招學了兩遍**。具體銜接：康托爾為什麼走進集合論（三角級數唯一性與點集）在它的 ch11／ch14；ℝ 的構造（Dedekind 切割／Cauchy 序列、0.999…＝1）在它的 ch03／ch14，本書 ch03–ch05 用到 ℝ 的性質時一句話帶過、正主在那裡；它處理的分析學 ∞（極限、過程）與本書的 ℵ₀（大小、對象）是兩個無限符號，讀完兩本你會徹底分清。對應 ch01–ch05、ch19。\n\n---\n\n## 如果只看三樣\n\n時間只夠看三樣，就跨三條路線各挑一個——一個把脊椎走到計算的盡頭，一個把直覺釘成嚴格，一個把驚嘆放回歷史：\n\n1. **（路線一）史丹佛哲學百科「Gödel's Incompleteness Theorems」。** 全書高潮二（ch16）最該守住、也最容易講過頭的一篇。讀完它，你對「不完備到底說什麼、不說什麼」的把握，會勝過市面 99% 的轉述——而這正是飯桌上最常被講錯的數學定理。\n\n2. **（路線二）Paul Halmos,《Naive Set Theory》。** 最友善的「升級到嚴格」單冊入口。薄薄一本，把本書十九章的直覺用最精簡的數學語言重講一遍——對照讀，你會看見自己的直覺其實一直站在正確的形式骨架上。\n\n3. **（路線三）J. W. Dauben,《Georg Cantor》。** 如果這本書最打動你的是「人類竟然想得出這個」，這本權威傳記把那個人、那場爭論、那個被渲染的瘋癲傳說的真相都還原給你。讀完它，你會用更克制也更尊重的方式，把康托爾的故事講給下一個人聽。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "集合論與無限：事實基準（2026-06 查證）", "md": "---\nlast_verified: 2026-06-20\nreview_after_days: 365\nstatus: research-agent-draft\nsource: web research 2026-06-20\n---\n\n# 集合論與無限：事實基準（2026-06 查證）\n\n本檔是本書（集合論與無限欣賞書）全書「歷史、人物、歸屬、引文、悖論精確陳述」的權威錨點。集合論的**數學本身是永恆的**（沒有版本、價格、硬體狀態會過期），所以本檔不管數學內容、只管「人是誰、事在哪一年、話怎麼說、結果歸誰」——而這正是科普書最常出錯的地方。各章引用任何日期、人名、引文、歸屬時，請對照本檔，不要憑記憶。\n\n使用規約：\n- ✅ = 已確認（≥2 獨立來源，或一個權威來源如 MacTutor／SEP／原始論文學術研究）。可直接照寫。\n- ⚠️ = 單一來源、來源不一致、或細節我無法百分百確認。看到 ⚠️ 請照本檔給的「保守正確版」寫，別擴張。\n- ❌ = 通行說法**是錯的**或嚴重簡化。本檔給出正確版；這些是全書最該守住的點。\n- 來源優先序：MacTutor（St Andrews 數學史）、Stanford Encyclopedia of Philosophy（SEP, plato.stanford.edu）、原始論文學術研究、大學講義 > Wikipedia/Encyclopedia of Mathematics > 一般百科 > 部落格。\n- 人名、引文保留原文（德／法／英），中文只作注解，不取代原文。\n\n---\n\n## 一、Galileo 的悖論（n ↔ n²，《兩門新科學》1638）\n\n- ✅ Galileo Galilei 在生前最後的科學著作 **《關於兩門新科學的對話》（Discorsi e dimostrazioni matematiche intorno a due nuove scienze，英譯 *Two New Sciences*）1638 年**中提出：每個自然數對應唯一的平方數（n ↔ n²），所以平方數「不比」自然數少；但平方數又顯然只是自然數的一部分，所以「應該」更少。\n- ✅ **Galileo 的結論不是「兩者一樣多」，而是放棄比較**：他斷定「大於、等於、小於」這類序關係只適用於有限量，對無限量無意義。常被引用的措辭：*\"we cannot speak of infinite quantities as being the one greater or less than or equal to another\"*（我們不能說一個無限量大於、小於或等於另一個無限量）。\n- 來源：Wikipedia「Galileo's paradox」https://en.wikipedia.org/wiki/Galileo%27s_paradox ；Wikipedia「Two New Sciences」https://en.wikipedia.org/wiki/Two_New_Sciences\n- **書常寫錯**：說「Galileo 證明了平方數和自然數一樣多」。錯。Galileo 看到了一一對應，但他的結論是「無限量不可比較」——是 Cantor（兩個半世紀後）才把「能一一對應就叫一樣多」當成定義、走出這個悖論。寫作時務必把功勞分清：Galileo 提出悖論並選擇了放棄；Cantor 選擇了重新定義「一樣多」。\n\n## 二、Cantor 的起點：三角級數唯一性（1870–1872）\n\n- ✅ 集合論**確實**長自 Cantor 對三角（Fourier）級數唯一性的研究。1869 年到 Halle 任教時，同事 **Eduard Heine** 力勸他攻「一個函數的三角級數表示是否唯一」這個難題。\n- ✅ Heine 1870 年證了（在均勻收斂假設下、幾乎處處連續函數的）唯一性；Cantor 在 **1870–1872 一系列論文**中把唯一性推廣到「容許無限多例外點」的情形，為此他需要刻畫越來越複雜的「例外點集」——這逼出了他的「導出集（derived set）／第一種點集（point set of the first species）」概念，集合論與點集拓樸由此萌芽。1872 是關鍵年份。\n- 來源：Springer「Uniqueness of trigonometric series and descriptive set theory, 1870–1985」https://link.springer.com/content/pdf/10.1007/BF01886630.pdf ；IAS Resonance「How did Cantor Discover Set Theory and Topology?」https://www.ias.ac.in/article/fulltext/reso/019/11/0977-0999\n- **注意**：別把「集合論起於三角級數」當成花絮一筆帶過——它是真的因果鏈：要談「無限多例外點怎樣才不破壞唯一性」，就得有辦法談點集的結構，這就是集合論的種子。\n\n## 三、❌【全書最重要的一條】1874 ≠ 1891：兩個不同的不可數性證明\n\n- ✅ Cantor **第一個**證明 ℝ 不可數的論文是 **1874 年**的〈Ueber eine Eigenschaft des Inbegriffes aller reellen algebraischen Zahlen〉（論全體實代數數的一個性質）。它用的是**區間套（nested intervals）論證**，**不是**對角線。\n- ✅ 著名的**對角線論證（diagonal argument）是 1891 年**的〈Über eine elementare Frage der Mannigfaltigkeitslehre〉（論流形論中的一個初等問題）。\n- ✅ **兩者是不同的證明**，相隔 17 年。後世講解常把 1891 的對角線「回填」進 1874 的故事，但歷史上 1874 完全沒有對角線。\n- ✅ 附帶：1874 論文還**順手證明了超越數存在**（每個區間裡都有無限多個超越數）——因為代數數可數、實數不可數，差集（超越數）必然不可數。這是非構造性存在證明的早期經典。\n- 來源：Wikipedia「Cantor's first set theory article」https://en.wikipedia.org/wiki/Cantor%27s_first_set_theory_article ；Wikipedia「Cantor's diagonal argument」https://en.wikipedia.org/wiki/Cantor%27s_diagonal_argument\n- **書錯最兇的地方**：99% 的科普把「Cantor 用對角線證明實數不可數」直接繫到 1874。錯。1874 是區間套，1891 才是對角線。要寫對角線就標 1891；要寫 1874 就說區間套（或至少不要綁定年份）。這是本書最該守住的硬事實。\n\n## 四、「Je le vois, mais je ne le crois pas」（我看見了，卻不敢相信）\n\n- ✅ 原文（法文，但信本身是德文寫的）：**\"Je le vois, mais je ne le crois pas\"**（我看見了，但我不相信）。**Cantor 寫給 Richard Dedekind**，**1877 年 6 月 29 日**的信。\n- ✅ 它指的結果是：**ℝ 與 ℝ²（更一般地 ℝ 與 ℝⁿ）之間存在一一對應**——線段上的點可以和正方形（平面）上的點一一對應，「維度」並不阻擋雙射。這顛覆了當時對「維度」的直覺。\n- ⚠️【重要的細微更正，來自 Gouvêa「Was Cantor Surprised?」的學術考據】：通俗版說 Cantor「不敢相信這個結果」。更精確的解讀是——Cantor 那時對結果**相當有把握**（他認為自己動搖了流形幾何的基礎），他那句話表達的更接近「我看到證明成立，卻需要再確認證明沒錯」的心情，而非對結論本身的震驚。寫作時可以用這句名言，但別把它渲染成「Cantor 嚇傻了」；保守寫法是「Cantor 自己也覺得難以置信」。\n- 來源：MacTutor「Quotations by Georg Cantor」https://mathshistory.st-andrews.ac.uk/Biographies/Cantor/quotations/ ；Gouvêa「Was Cantor Surprised?」（American Mathematical Monthly）https://www.researchgate.net/publication/233614897_Was_Cantor_Surprised\n\n## 五、Cantor–Schröder–Bernstein 定理（歸屬很亂，誠實寫）\n\n若 A 單射進 B 且 B 單射進 A，則 A、B 之間有雙射（等勢）。歸屬史很糾結：\n- ✅ **Cantor** 約 1882/83、並在 **1887** 陳述了這個定理，但他的論證**依賴良序原理（等價於 AC）**，沒給不靠 AC 的證明。\n- ✅ **Dedekind 1887 年 7 月 11 日**就寫下了一個**不靠 AC 的證明**，但**未發表**（手稿在他的 Nachlass 中，1932 年才印出）。他其實是第一個給出無 AC 證明的人。\n- ✅ **Felix Bernstein**（當時 19 歲、Cantor 研討班學生）**1897 年**獨立給出證明，由 Cantor 代為傳達到該年的國際數學家大會。\n- ✅ **Ernst Schröder** 1896 年宣布、**1898 年**在 *Mathematische Annalen* 發表一個證明，但**1902 年被 Alwin Korselt 指出有瑕疵**（可修正）。\n- 來源：Encyclopedia of Mathematics「Schroeder–Bernstein theorem」https://encyclopediaofmath.org/wiki/Schroeder%E2%80%93Bernstein_theorem ；Royal Society「The Cantor–Bernstein theorem: how many proofs?」https://royalsocietypublishing.org/rsta/article/377/2140/20180031/115753\n- **誠實的寫法**：定理名掛三個人，但「誰證了什麼」不對稱——Cantor 陳述（靠 AC）、Dedekind 最早給無 AC 證明（但沒發表）、Bernstein 獨立證出並公開、Schröder 的版本一度有錯。別把它寫成乾淨的三人接力。\n\n## 六、Hilbert 旅館（Hilbert's Hotel）\n\n- ✅ 由 **David Hilbert** 提出，出自他 **1924 年 1 月**在哥廷根的一場關於無限的演講（屬「Über das Unendliche」那個時期的思想），**但 Hilbert 本人未發表**這個比喻。\n- ✅ 真正讓它廣為人知的是 **George Gamow 1947 年的科普書《One Two Three... Infinity》**。\n- 來源：Helge Kragh「The True (?) Story of Hilbert's Infinite Hotel」https://arxiv.org/abs/1403.0059 ；Wikipedia「Hilbert's paradox of the Grand Hotel」https://en.wikipedia.org/wiki/Hilbert%27s_paradox_of_the_Grand_Hotel\n- **書常含糊**：把旅館當成 Hilbert「寫」的。更準確：Hilbert 在演講裡口頭講的，Gamow 寫進書裡才流行。\n\n## 七、Russell 悖論與 Frege 的反應\n\n- ✅ **Bertrand Russell 1901 年**（春／晚春）發現悖論：「所有不屬於自己的集合所成的集合」會自相矛盾。\n- ✅ **1902 年 6 月 16 日**寫信告知 **Gottlob Frege**，信正好在 Frege《算術基本定律》（*Grundgesetze der Arithmetik*）第二卷付印之際送達。\n- ✅ Frege 在**第二卷（1903）的後記／附錄（Nachwort / appendix）**中倉促回應，承認他的「基本定律 V（Law V）」出問題。\n- ✅ Frege 的名言（Furth 英譯，最常引用版）：*\"Hardly anything more unwelcome can befall a scientific writer than to have one of the foundations of his edifice shaken after the work is finished.\"*（一個科學著作者所能遭遇最不幸的事，莫過於在工作完成之後、其大廈的一塊基石卻動搖了。）⚠️ 不同英譯措辭略有出入（如 \"A scientist can hardly meet with anything more undesirable than to have the foundations give way just as the work is finished\"），語意一致；建議用 Furth 版並注明是 Grundgesetze 第二卷後記。\n- ✅ **Ernst Zermelo 約 1899–1902 間獨立發現**了同型矛盾（一份 Husserl 1902 年 4 月 16 日的筆記記錄了 Zermelo 的證明），可能比 Russell 稍早，但未發表。\n- 來源：SEP「Russell's Paradox」https://plato.stanford.edu/entries/russell-paradox/ ；Wikiquote「Gottlob Frege」https://en.wikiquote.org/wiki/Gottlob_Frege\n- **書常漏**：Zermelo 的獨立發現（Russell 不是唯一）。也常把 Frege 的引文掛錯卷數——是**第二卷**的後記，不是第一卷。\n\n## 八、Burali-Forti 悖論（1897）與 Cantor 悖論（最大基數）\n\n- ✅ **Burali-Forti 悖論：Cesare Burali-Forti 1897 年**發表（考慮「所有序數的集合」的序數，會比自己大，矛盾）。Burali-Forti 當時並不知道自己撞上了 Cantor 已有的結果。\n- ✅ **Cantor 悖論（最大基數不存在）**：Cantor 約 **1899 年**意識到（學界亦說 1895–1897 間），並在 **1899 年寫給 Dedekind 的信**中以定理形式表述——「所有集合的集合」其冪集基數會更大，故沒有「最大基數」。\n- 來源：Wikipedia「Burali-Forti paradox」https://en.wikipedia.org/wiki/Burali-Forti_paradox ；Wikipedia「Cantor's paradox」https://en.wikipedia.org/wiki/Cantor%27s_paradox\n- **注意**：這兩個「大集合悖論」加上 Russell 悖論，是促成公理化集合論的三記警鐘。Cantor 自己其實**早於** Russell 就察覺了系統的麻煩（1899 致 Dedekind 信），這點書常忽略。\n\n## 九、Zermelo 公理（1908）、Replacement（1922）、ZF/ZFC\n\n- ✅ **Ernst Zermelo 1908 年**發表第一套公理化集合論（Z）。\n- ✅ **Replacement（替換公理）由 Abraham Fraenkel 與 Thoralf Skolem 於 1922 年獨立提出**，補進 Zermelo 系統後成為 **ZF**。\n- ✅ **Foundation（正則公理）由 von Neumann 1925 年**加入。加上選擇公理（AC）即 **ZFC**。命名：Z = Zermelo；ZF = Zermelo–Fraenkel；ZFC = ZF + Choice。\n- 來源：ETH「The Axioms of Set Theory ZFC」https://people.math.ethz.ch/~halorenz/4students/LogikGT/Ch13.pdf ；nLab「ZFC」https://ncatlab.org/nlab/show/ZFC\n- **書常簡化**：把 ZF 全歸給 Zermelo。其實 Replacement 是 Fraenkel/Skolem 1922 補的，Foundation 是 von Neumann 1925 補的。\n\n## 十、選擇公理／良序定理與 Russell 的「鞋與襪」\n\n- ✅ **Zermelo 1904 年**用選擇公理（AC，他首次明確提出此公理，在給 Hilbert 的信中）**證明了良序定理（well-ordering theorem）**：任何集合都能被良序化。\n- ✅ 此證明**引爆爭議**（Borel、Baire、Lebesgue、Poincaré 等都反對「無限多次任意選取」）。爭議反而逼出 Zermelo 1908 的公理化。\n- ✅ **Russell 的「鞋與襪」比喻**出自他 **1919 年《數學哲學導論》（Introduction to Mathematical Philosophy）**：無限多雙**鞋**不需要 AC（規定「每雙選左腳」即可，有明確規則）；無限多雙**襪**則需要 AC（兩隻襪沒有內在區別，給不出選取規則）。Russell 確是來源。\n- 來源：SEP「Zermelo's Axiomatization of Set Theory」https://plato.stanford.edu/entries/zermelo-set-theory/ ；ProofWiki「Russell's Socks and Shoes」https://proofwiki.org/wiki/Axiom_of_Choice/Examples/Russell%27s_Socks_and_Shoes\n- ⚠️ **年份易錯**：鞋襪比喻常被籠統繫到「Russell 某處說過」；精確出處是 **1919** 年那本書。別寫成 1904 或更早。\n\n## 十一、König 事件（1904 海德堡 ICM）\n\n- ✅ **Gyula（德文 Julius）König** 在 **1904 年海德堡國際數學家大會**上宣稱「證明了連續統假設為假」（即連續統不能被良序化）。場面盛大（為聽他演講取消了分組會議），Cantor 本人在場。\n- ✅ 證明**有錯**：König 誤用了 **Felix Bernstein 的一個基數算術等式**，套用在它不成立的情形。**Zermelo 很快發現破綻**；1905 年 Bernstein 發短文修正自己的定理，König 也把結果改成條件式陳述。\n- 來源：MacTutor「1904 ICM Heidelberg」https://mathshistory.st-andrews.ac.uk/ICM/ICM_Heidelberg_1904/ ；ScienceDirect「Zermelo and the Heidelberg Congress 1904」https://www.sciencedirect.com/science/article/pii/S0315086006001236\n- **注意**：König 不是騙子或庸才——他是誠實地錯用了一個（後來才發現有問題的）定理。這次事件是 AC 爭議的關鍵催化劑。名字用「König（Gyula／Julius）」，別和同名的 Dénes König（圖論）搞混。\n\n## 十二、Zorn 引理\n\n- ✅ **Zorn 引理**（每個鏈都有上界的偏序集必有極大元）**等價於 AC、也等價於良序定理**（在 ZF 下三者互推）。\n- ✅ 歷史：**Kazimierz Kuratowski 1922 年**先證了一個接近現代形式的版本；**Max Zorn 1935 年**獨立給出（並用於代數）。名字「Zorn's lemma」其實是 **John Tukey 1940 年**書中用法傳開的——所以叫 Zorn 引理有點「歸屬不公」（Kuratowski 更早）。\n- 來源：Wikipedia「Zorn's lemma」https://en.wikipedia.org/wiki/Zorn%27s_lemma ；Campbell「The Origin of Zorn's Lemma」（Historia Mathematica 1978）https://www.sciencedirect.com/science/article/pii/0315086078901362\n- **書常漏**：Kuratowski 1922 比 Zorn 1935 早 13 年。「Zorn 引理」是後來叫順了的名字。\n\n## 十三、Banach–Tarski 悖論\n\n- ✅ **1924 年由 Stefan Banach 與 Alfred Tarski** 發表。精確陳述：ℝ³ 中一個**實心球**可以分割成**有限多塊**（互不相交的子集），只用**剛體運動（旋轉、平移；等距變換）**重新拼裝，得到**兩個與原球完全相同大小的實心球**。\n- ✅ **最少塊數：Raphael M. Robinson 1947 年**證明 **5 塊就夠、且 5 是最小**（少於 5 塊不可能）。\n- ✅ **依賴選擇公理**：分割出的「塊」是**不可測集（non-measurable sets）**，沒有良定義的體積，所以「體積憑空加倍」不違反測度論——因為中途那些塊根本沒有體積可言。\n- ✅ **Vitali 集**（**Giuseppe Vitali 1905 年**構造）是最基本的不可測集（在區間上用 AC 構造），是 Banach–Tarski 的先聲；Banach 與 Tarski 論文明確引用了 Vitali 1905 的構造。\n- 來源：Wikipedia「Banach–Tarski paradox」https://en.wikipedia.org/wiki/Banach%E2%80%93Tarski_paradox ；ETSU「Nonmeasurable sets and the Banach-Tarski Paradox」https://faculty.etsu.edu/gardnerr/5210/banach-tarski.pdf\n- **❌ 最常見誤解**：以為「能把一顆金球複製成兩顆」是物理現實。**不是**。它是純數學陳述，本質上靠不可測集（無體積的點集合），現實的物質不是「無限可分的點集合」，做不到。寫作時務必點明「這不是物理魔術，是測度論的反直覺」。\n\n## 十四、連續統假設（CH）\n\n- ✅ **Cantor 1878 年提出**：在 ℵ₀ 與 𝔠（= 2^ℵ₀）之間沒有別的基數，即 𝔠 = ℵ₁。Cantor 一生深信它是定理、屢試屢敗。\n- ✅ 它是 **Hilbert 1900 年巴黎國際數學家大會「23 個問題」中的第一題**。\n- 來源：Wikipedia「Continuum hypothesis」 ；Knowino「Continuum hypothesis」https://www.theochem.ru.nl/~pwormer/Knowino/knowino.org/wiki/Continuum_hypothesis.html\n- **注意**：CH 由 Cantor 1878 提出、被 Hilbert 1900 列為**第一**問題（不是隨便某一題）。\n\n## 十五、Gödel 論 CH（一致性，不是真理）\n\n- ✅ **Kurt Gödel** 用**可構成宇宙 L（constructible universe）**證明：**若 ZF 一致，則 ZFC + GCH 也一致**（Con(ZF) ⇒ Con(ZFC+GCH)）。工作於 **1938 年發表、1940 年專著**（基於 1938 講稿）完整給出。\n- ✅ **這是「一致性（相對一致性）」，不是證明 CH 為真**。Gödel 只證了「CH 無法被 ZFC 否證」——不能從 ZFC 推出 ¬CH。他**沒有**證明 CH 成立。\n- 來源：Kanamori「How Gödel Transformed Set Theory」(Notices of the AMS, 2006) http://math.bu.edu/people/aki/12.pdf ；Columbia「The Consistency of the Continuum Hypothesis」 http://www.columbia.edu/~jc4345/Constructability%20Handout.pdf\n- **❌ 致命誤解**：說「Gödel 證明了 CH」。錯。他證的是「CH 與 ZFC 相容（不能被否證）」。配合 Cohen（見下）才有完整的獨立性。\n\n## 十六、Cohen 與 forcing（逼迫法）\n\n- ✅ **Paul Cohen 1963 年**發明 **forcing（逼迫法）**，證明 **Con(ZFC) ⇒ Con(ZFC + ¬CH)**——CH 也不能從 ZFC 被**證明**。\n- ✅ 結合 Gödel（不可否證）＋ Cohen（不可證明）＝ **CH 獨立於 ZFC**（既不能證、也不能否）。\n- ✅ Cohen 因此獲 **1966 年 Fields 獎**。截至 2026 年，這是**唯一一座因數理邏輯／基礎工作頒發的 Fields 獎**。\n- 來源：Wikipedia「Paul Cohen」https://en.wikipedia.org/wiki/Paul_Cohen ；Britannica「Paul Joseph Cohen」https://www.britannica.com/biography/Paul-Joseph-Cohen\n- **❌ 易混**：「獨立」≠「被推翻」。CH 獨立於 ZFC，意思是 ZFC 管不到它（兩種版本的集合論都自洽），**不是**「CH 被證明是假的」。這是與 Gödel 那條並列的高風險點。\n\n## 十七、Gödel 不完備定理（1931）\n\n- ✅ **1931 年**。**第一不完備定理**：任何**一致（consistent）、能遞迴公理化（recursively / effectively axiomatizable）、且強到能表達基本算術**的形式系統 F，都存在一個 F 的語句，**在 F 內既不能證明也不能否證**（F 不完備）。**第二不完備定理**：這樣的 F **不能在自身內部證明自己的一致性**（前提是它真的一致）。\n- ✅ **三個前提缺一不可**：一致、可遞迴公理化、強到含算術。拿掉任何一個結論就不成立（例如：純粹的實閉域理論是完備且可判定的，不受此限）。\n- ❌ **必須避免的常見誤讀**（這是本書最該破除的迷思群）：\n  1. ❌「沒有什麼能被確知／真理不可知」——**錯**。定理只談「形式系統內的可證性」，與一般知識論無關；那個哥德爾語句我們**從系統外**就知道它是真的。\n  2. ❌「數學不一致／不可靠／自相矛盾」——**錯**。定理恰恰預設系統一致；它說的是「一致的系統有它證不到的真語句」，不是「數學會崩」。\n  3. ❌「所有事情都無法證明／凡事皆不可證」——**錯**。絕大多數數學定理照樣可證；不完備只給出**特定**的不可判定語句。\n  4. ❌ 拿來證明「上帝存在／自由意志／AI 不可能」等——**錯**。這是把一條關於形式算術系統的精確定理，越界套到完全不同的領域。\n- 來源：SEP「Gödel's Incompleteness Theorems」https://plato.stanford.edu/entries/goedel-incompleteness/ ；Rotman Institute「What did Gödel show with his first incompleteness theorem?」https://www.rotman.uwo.ca/godel-theorem/\n- **寫作鐵律**：每次提不完備定理，都要連帶把「consistent / recursively axiomatizable / 含算術」三個前提講清楚，並至少破除一個上述誤讀。這是科普最容易翻車的單一主題。\n\n## 十八、Turing 停機問題（1936）\n\n- ✅ **Alan Turing 1936 年**論文〈On Computable Numbers, with an Application to the Entscheidungsproblem〉（發表於 *Proceedings of the London Mathematical Society* vol. 42, 1936；1937 年有勘誤）。用**對角線論證**構造出「可定義但不可計算」的序列，給出 Hilbert–Ackermann 判定問題（Entscheidungsproblem）的**否定**解答。\n- ✅ 它的對角線結構與 **Cantor 對角線、Gödel 自指**是同一家族的招式（自我指涉 + 對角化導出矛盾）。\n- ⚠️ **小心措辭**：「停機問題（halting problem）」這個**名稱本身並未出現在 Turing 1936 原文**裡（一般認為此術語是後來流傳、常歸於 Martin Davis）；Turing 證的是不可計算性／判定問題的否定解，其結構即後世所稱的停機問題。寫「Turing 1936 證明了停機問題不可解」在內容上沒錯，但若要嚴謹，可注明此名為後起。\n- 來源：Wikipedia「Halting problem」 ；arXiv「Did Turing prove the undecidability of the halting problem?」https://arxiv.org/pdf/2407.00680\n- **可串的脊椎**：Cantor（1891 對角線）→ Gödel（1931 自指）→ Turing（1936 對角線）是同一個「對角化」母題的三次化身，是本書極好的敘事主線。\n\n## 十九、Kronecker 的反對，與「逼瘋 Cantor」迷思\n\n- ✅ **「God made the integers, all else is the work of man」**，德文原文：**\"Die ganzen Zahlen hat der liebe Gott gemacht, alles andere ist Menschenwerk.\"** 歸於 **Leopold Kronecker**。\n- ✅ Kronecker **確實強烈反對** Cantor 的集合論（尤其反對「實無限／actual infinity」）；他主張一切數學應化約為對整數的有限步驟操作。他曾是 Cantor 的老師與支持者，後來轉為對手，甚至一度阻撓 Cantor 論文在 Crelle 期刊的發表。\n- ❌ **「Kronecker 逼瘋了 Cantor／害他精神崩潰」是被嚴重渲染的迷思**。學界（**Ivor Grattan-Guinness 1971、Joseph Dauben**）考據指出：Cantor 患的是**雙相情感障礙（bipolar / manic-depressive illness）**，這是內因性疾病；Kronecker 的攻擊、CH 久攻不下這類壓力**可能誘發**發作，但**就算他沒發明集合論、也會有這些發作**。這個「被逼瘋」說法主要源自 **Schoenflies 1927 年的悼念文**，被後世一再轉抄。\n- 來源：MacTutor「Georg Cantor」https://mathshistory.st-andrews.ac.uk/Biographies/Cantor/ ；Richard Zach「Logic and Madness?」https://richardzach.org/2009/09/logic-and-madness/\n- **寫作戒律**：不要浪漫化 Cantor 的精神疾病、不要把它寫成「天才被學術迫害逼瘋」的戲劇。正確版：Cantor 有雙相情感障礙（病因在生理），學術壓力是誘因而非病因。語氣要克制、尊重。\n\n## 二十、Hilbert 的「樂園」（paradise）名言\n\n- ✅ 德文：**\"Aus dem Paradies, das Cantor uns geschaffen, soll uns niemand vertreiben können.\"**（沒有人能把我們逐出 Cantor 為我們創造的樂園。）\n- ✅ 出自 Hilbert〈**Über das Unendliche**〉（論無限）。⚠️ 年份要分清：這是 **1925 年 6 月 4 日**在 Münster 的演講，**論文 1926 年**刊於 *Mathematische Annalen* vol. 95, p. 170。寫「1926」（發表）或「1925」（演講）都對，但別寫成其他年份；若只給一個年份，建議用發表年 **1926** 並注明演講於 1925。\n- 來源：Wikiquote「David Hilbert」https://en.wikiquote.org/wiki/David_Hilbert ；Wikipedia「Cantor's paradise」https://en.wikipedia.org/wiki/Cantor%27s_paradise\n\n## 二十一、三大基礎學派\n\n- ✅ **邏輯主義（Logicism）**：Gottlob Frege（1870 年代奠定現代數理邏輯）主張數學可化約為邏輯。Bertrand Russell 與 Alfred North Whitehead 的 **《Principia Mathematica》（1910–1913，三卷）**是較弱版邏輯主義的代表巨著。\n- ✅ **形式主義（Formalism）**：David Hilbert 的綱領——把古典數學化為一個龐大形式系統，並用有限、具體（finitistic）的手段證明其一致性。（後被 Gödel 第二不完備定理重創。）\n- ✅ **直覺主義／構造主義（Intuitionism / Constructivism）**：L. E. J. Brouwer（1907 年起）主張數學是心智構造、不是邏輯的一部分，**對無限集合拒絕排中律（law of excluded middle）與雙重否定**，只承認可構造的存在證明。1920 年代有著名的 Hilbert–Brouwer 論戰。\n- ✅ **構造主義的現代復興**：透過 **Curry–Howard 對應**（命題即類型、證明即程式），直覺主義型別論成為現代**證明輔助器（proof assistants）**的基礎——**Coq、Lean** 建基於構造演算（Calculus of Constructions），**Agda、Nuprl** 建基於 Martin-Löf 型別論。截至 2026，形式化證明已進入主流數學（Gowers、Scholze、Tao、已故 Voevodsky 等都倡導），Lean 尤其活躍。⚠️「2026 年 Lean/Coq 的精確版本與生態狀態」屬時效性細節，寫作時用「廣為使用、進入主流」這類概括語即可，別寫死版本號。\n- 來源：Encyclopedia.com「Foundations of Mathematics: Hilbert's Formalism vs. Brouwer's Intuitionism」https://www.encyclopedia.com/science/encyclopedias-almanacs-transcripts-and-maps/foundations-mathematics-hilberts-formalism-vs-brouwer-intuitionism ；SEP「Intuitionistic Type Theory」https://plato.stanford.edu/entries/type-theory-intuitionistic/\n\n## 二十二、Cantor 配對函數（pairing function）\n\n- ✅ 標準公式：**π(a, b) = (a + b)(a + b + 1) / 2 + b**，是 **ℕ × ℕ → ℕ 的雙射**（一一對應且滿射），即「兩個自然數可唯一編碼成一個自然數」。直觀上是「沿反對角線 a+b = k 一條一條數」。\n- ✅ Cantor 1878 年即用此映射；Fueter–Pólya 定理證明它（及其對稱版 π(b,a)）是**唯一**的二次配對多項式。\n- 來源：Drexel「The Cantor pairing function」https://www.math.drexel.edu/~tolya/cantorpairing.pdf\n- **注意**：變數順序（最後加 b 還是 a）會影響具體數值但不影響「是雙射」這個性質；照上式（加 b）寫即標準版。\n\n## 二十三、ℵ（aleph）、ℶ（beth）、𝔠、ω 等記號\n\n- ✅ **ℵ（aleph，希伯來字母）由 Cantor 引入**，用來標記良序無限集的基數；**ℵ₀ = 自然數的基數**，ℵ₁ = 最小的不可數基數。aleph 記號定型於 **Cantor 1895 年《Beiträge zur Begründung der transfiniten Mengenlehre》**（Math. Annalen 46）。\n- ✅ **𝔠（小寫 Fraktur c）= 連續統的基數** = 2^ℵ₀。\n- ✅ **ω = 第一個無限序數**（自然數的序型）；ε₀ 是序數算術中 ω^ω^... 的極限（ω = ε₀ 滿足 ω^ε = ε 的最小序數）。\n- ⚠️ **ℶ（beth）記號的歸屬要小心**：通行說「Cantor 引入 beth」**不準確**。**beth 符號（ב）是 Charles Sanders Peirce 在 1900 年 12 月寫給 Cantor 的信中提議的**（Cantor 本人並未為冪集基數另立專用記號）；現代 beth 數記號的標準化更晚。寫作時：aleph 歸 Cantor（✅），beth 別直接歸 Cantor。\n- 來源：ThatsMaths「Aleph, Beth, Continuum」https://thatsmaths.com/2020/11/12/aleph-beth-continuum/ ；Wikiquote/Internet Archive「Contributions to the Founding of the Theory of Transfinite Numbers」https://archive.org/details/contributionstof00cant\n\n## 二十四、Cantor 的晚年與身後平反\n\n- ✅ **生於 1845 年 3 月 3 日（聖彼得堡），卒於 1918 年 1 月 6 日於 Halle 的療養院（精神科診所）。**\n- ✅ 首次有記錄的抑鬱發作在 **1884 年 5 月**；1899 年起多次入療養院。生前其集合論飽受 Kronecker 等人反對。\n- ✅ **身後（及晚年）獲平反**：Hilbert 盛讚其工作為「數學天才最精妙的產物、純粹智性活動的至高成就之一」，並有「樂園」名言（見二十）；1897 年國際數學家大會上 Hurwitz 與 Hadamard 公開推崇其成果；Russell 亦高度評價。\n- 來源：MacTutor「Georg Cantor」https://mathshistory.st-andrews.ac.uk/Biographies/Cantor/\n- **戒律**：寫晚年時克制、不渲染（理由同十九）。死亡日期用 **1918 年 1 月 6 日**、地點 Halle 療養院。\n\n## 二十五、非構造性存在證明的經典例：√2^√2\n\n- ✅ 標準教科書例子：**存在無理數 a、b 使得 a^b 為有理數**。非構造性證明：依排中律，√2^√2 要嘛有理、要嘛無理。若有理，取 a = b = √2；若無理，取 a = √2^√2、b = √2，則 a^b = (√2^√2)^√2 = √2^2 = 2 有理。兩種情形都成立——但**沒告訴你到底是哪一種**，這就是「非構造性」。\n- ✅ **構造性替代版確實存在**：取 **a = √2、b = 2·log₂3**（皆無理），則 √2^(2·log₂3) = 2^(log₂3) = **3**，明確、可構造。（另：由 Gelfond–Schneider 定理可知 √2^√2 其實是無理（超越）數，於是上面「若無理」那支才是真的那支——但這需要更深的定理。）\n- 來源：Wikipedia「Constructive proof / Non-constructive proof」https://en.wikipedia.org/wiki/Constructive_proof ；Andrej Bauer「Constructive gem: irrational to the power of irrational that is rational」https://math.andrej.com/2009/12/28/constructive-gem-irrational-to-the-power-of-irrational-that-is-rational/\n- **要點**：這是「排中律讓你證得出存在、卻給不出例子」的最乾淨示範，正好呼應二十一的直覺主義。寫作時可同時給非構造版（漂亮但不告訴你答案）與構造版（明確給 3），對比最有力。\n\n---\n\n## 待守住的高風險事實（最易被科普寫錯，務必對照本檔）\n\n1. **1874 ≠ 1891**：1874 不可數性證明用**區間套**；**對角線**是 1891。兩個不同的證明，別綁錯年份。（§三）\n2. **Gödel 不完備定理的誤讀群**：不是「真理不可知」、不是「數學不一致」、不是「凡事不可證」；務必連帶講清「一致／可遞迴公理化／含算術」三前提。（§十七）\n3. **「獨立」≠「被推翻」**：CH 獨立於 ZFC（Gödel 不可否證 + Cohen 不可證明），**不是** CH 被證偽。Gödel 證的是一致性、**不是** CH 為真。（§十五、§十六）\n4. **Kronecker「逼瘋 Cantor」是迷思**：Cantor 患雙相情感障礙（內因），學術壓力是誘因非病因（Grattan-Guinness 1971、Dauben）。語氣克制、勿浪漫化。（§十九）\n5. **Banach–Tarski 不是物理魔術**：靠不可測集（無體積的點集合），現實物質做不到；別寫成「能複製金球」。（§十三）\n6. **Galileo 沒說「一樣多」**：他看到一一對應後選擇「無限量不可比較」；是 Cantor 才把雙射當成「等勢」的定義。（§一）\n7. **Cantor–Schröder–Bernstein 歸屬不對稱**：Cantor 陳述（靠 AC）、Dedekind 最早給無 AC 證明但未發表、Bernstein 獨立證出、Schröder 版本一度有錯。別寫成乾淨三人接力。（§五）\n8. **記號與名字的歸屬陷阱**：aleph 歸 Cantor ✅，但 **beth 符號是 Peirce 1900 提議**（別歸 Cantor）；**Zorn 引理 Kuratowski 1922 更早**（名字是 Tukey 1940 叫順的）；König 事件是 **Gyula/Julius König**（勿與圖論的 Dénes König 混）。（§二十三、§十二、§十一）\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書《不只一種無限：集合論與無限的直覺與驚嘆》的跨章一致性基準、脆弱事實清單、掃描協定與日誌。改任何記號約定或承重事實，必須照表全書同步。歷史與歸屬事實以 `landscape-2026-06.md` 為錨；數學內容（定義、定理、證明）不依賴 landscape，但必須自我複核。\n\n## 一、跨章記號與基準（改任何一個必須照表全書同步）\n\n| 基準 | 約定／值 | 出現章 |\n|---|---|---|\n| **脊椎** | 一一對應＝「一樣多」的唯一判準；具體脊椎＝「排成一列＋對角線」這張表 與「ℕ 這把尺」 | 全書 |\n| **同一條對角線（四次出場，記號鐵律）** | ch04 對角論證 s\\*(n)=1−sₙ(n)／ch06 Cantor 定理對角集 **D={x∈A : x∉f(x)}**／ch10 羅素 **R={x : x∉x}**（＝f 取恆等時的 D）／ch16 哥德爾 G ↔ ¬Prov(⌈G⌉)。**這四個集合/序列的寫法全書不得漂移** | ch04/06/10/16 |\n| **ℕ 的約定** | 點名/基數脈絡 ℕ={1,2,3,…}；序數脈絡（ch08 起）von Neumann ω={0,1,2,…}；ch03 配對函數處用 ℕ₀={0,1,2,…}。**三處都明說是同一集合、平移不改 \\|ℕ\\|=ℵ₀**——任何新內容若引入起點必須照此說明 | ch01/ch03/ch08 |\n| **可數定義** | A 可數 ⟺ A↔ℕ 或有限 ⟺ 能排成一列（可列舉）；ℵ₀=\\|ℕ\\| | ch02 |\n| **Cantor 配對函數** | π(a,b)=(a+b)(a+b+1)/2+b；**π(2,3)=18**（已三家複核）；ℕ₀ 起點 | ch03 |\n| **對角論證標準表** | 目標 {0,1}^ℕ；翻轉造 s\\*；十進位版**只在 {5,6} 取值避開 0/9**（堵 0.4999…=0.5000…）；ch04 定版，ch06/ch16 照變形 | ch04 |\n| **𝔠 的串等號（鐵律，全書同一個基數）** | 𝔠 = \\|ℝ\\| = \\|(0,1)\\| = \\|{0,1}^ℕ\\| = \\|𝒫(ℕ)\\| = 2^ℵ₀ | ch04/05/06/07/14 |\n| **連續統怪事** | \\|ℝ\\|=\\|ℝ²\\|（康托爾 1877 給戴德金，\"je le vois, mais je ne le crois pas\"）；維度不增基數、但 𝔠>ℵ₀ | ch05 |\n| **冪集定理** | \\|A\\|<\\|𝒫(A)\\|（Cantor 定理，硬證）；ℵ₀<2^ℵ₀<2^(2^ℵ₀)<…；無「所有集合的集合」（Cantor 悖論，約 1899 給戴德金） | ch06 |\n| **ℵ vs ℶ** | ℵ 數「第幾個基數」、ℶ 數「取幾次冪集」；ℶ₀=ℵ₀、ℶ₁=2^ℵ₀=𝔠；CH ⟺ ℶ₁=ℵ₁。**ℶ(beth) 記號是 C.S. Peirce 1900 提出、非康托爾**（康托爾只提 aleph） | ch06/ch07/ch14 |\n| **CSB 定理** | 兩向單射 ⇒ 等勢。歸屬亂：康托爾述用 AC、戴德金 1887 首個免 AC 證但未刊、Bernstein 1897 給證、Schröder 1898 證明有瑕 | ch07 |\n| **無限基數算術** | 加乘塌縮（ℵ₀+ℵ₀=ℵ₀·ℵ₀=ℵ₀、𝔠+𝔠=𝔠·𝔠=𝔠）、**取冪才跳階**（2^ℵ₀=𝔠>ℵ₀） | ch07 |\n| **序數算術** | ω,ω+1,ω·2,ω²,ω^ω,ε₀；**不可交換 1+ω=ω≠ω+1**；同一 ℵ₀ 對應無窮多可數序數 | ch08 |\n| **CH 寫法（鐵律）** | **CH：2^ℵ₀ = ℵ₁**；ℵ₁=第一個不可數序數 ω₁ 的基數 | ch14/15/19 |\n| **GCH 寫法（鐵律，變數下標用底線）** | **2^ℵ_α = ℵ_{α+1}**（與 ch11 的 V_α/V_{α+1} 變數下標慣例一致；數字下標才用 Unicode ℵ₀/ℵ₁/V₀） | ch14/15 |\n| **獨立性（最易誤解，反覆守）** | 哥德爾 1938–40：Con(ZFC)⇒Con(ZFC+CH)（用 L）；科恩 1963 forcing：Con(ZFC)⇒Con(ZFC+¬CH)；科恩 1966 Fields（至 2026 唯一因數理邏輯）。**獨立＝相對一致性，≠證 CH 為假、≠還沒證出來** | ch15 |\n| **Banach–Tarski** | 1924；**最少 5 塊（Robinson 1947），且 5 是最小**（球面 S² 為 4 塊）；非可測集（Vitali 1905）；非物理魔術 | ch13 |\n| **不完備** | 三前提：一致、可遞迴公理化、夠強表達算術。第一/第二定理。**不說**：真理不可知／數學不一致／凡事不可證。停機問題（圖靈 1936；「halting problem」一詞後人命名） | ch16 |\n\n## 二、脆弱事實清單（最易被科普寫錯，撰修前對照 landscape）\n\n1. **1874 ≠ 1891**：1874 不可數性證明用**套疊區間法**、1891 才是對角論證——兩個不同證明，科普第一大錯。（ch04 已設「歷史校正」節守住）\n2. **康托爾精神疾病**：雙相情感障礙是**內因**，克羅內克的學術壓力是**誘因非病因**；「克羅內克逼瘋康托爾」是迷思（Grattan-Guinness 1971／Dauben）。**全書不浪漫化因果**。（ch04/ch17/ch19）\n3. **獨立性 ≠ 證偽**：哥德爾從未證 CH 為真；獨立是相對一致性。（ch15 三度重申）\n4. **Banach–Tarski 非物理**：是非可測集的測度論假象，不是麵包刀魔術。（ch13）\n5. **弗雷格名言**：精確逐字措辭 landscape 標 ⚠️；ch10 一律用「大意是」、不假裝逐字引用。\n6. **ℶ(beth) 歸屬**：Peirce 1900，非康托爾。（ch06）\n7. **佐恩引理歸屬**：Kuratowski 1922 早於 Zorn 1935，名字 Tukey 1940 才叫開。（ch12）\n8. **König 1904**：Gyula／Julius König（**非圖論的 Dénes König**）；用錯 Bernstein 基數等式、策梅洛當天抓錯；AC 爭議催化劑。（ch12 良序定理一節已述）\n9. **ω/ε₀ 記號歸屬**：landscape 來源較薄，撰章若提誰命名須 hedge；von Neumann 序數編碼（1923）歸屬安全。（ch08）\n10. **空間填充曲線**：Hilbert curve、Morton/Z-order 是 \\|ℝ\\|=\\|ℝ²\\| 的工程近親（ch05）；屬已查證工程橋接。\n\n## 三、結構與寫作鐵則（新增內容不得違反）\n\n- 章節骨架固定、標題照抄（lint_book.py 會 grep）：章首 blockquote →（Part 首章放路線圖）→ `## 從你已知的出發` → 核心 `##` →「`## 直覺的陷阱`」→「`## 紙上推演`」（含「`### 推演解答`」，每題 ★ 難度＋`NN 分鐘`）→「`## 自我檢核`」→「`## 延伸閱讀`」。\n- 失敗模式段一律用「`## 直覺的陷阱`」（lint_book 已收此方言）。\n- **路線圖**：6 個 Part 首章（ch01/04/07/10/14/17）共用同一張全書地圖，只移動 `◄你在這裡` 到本章那一格；地圖含全部 ch01–ch19（Part IV 為 4 列 ch10–13）。改章名/章序必須六處同步（目前由 Python 腳本統一生成，見掃描日誌 2026-06-20）。\n- 數學記號全 Unicode 純文字、不依賴 LaTeX；多行推導/證明骨架進 ```text。**變數下標用底線**（ℵ_α、V_α、V_{α+1}）、**數字下標用 Unicode**（ℵ₀、ℵ₁、V₀）。\n- 定位鐵則：欣賞與直覺，**不刷題、不裝公理化教科書**；只有對角論證、Cantor 定理、CSB（敘述＋骨架）、羅素悖論、Vitali 為「硬證」，其餘明標「本書不證、指向…」。\n- 嚴謹度誠實標示；**禁「顯然」「易證」**（拆解錯誤直覺時引號內的「顯然」不算）。\n- **跨章引用 house style：裸寫「（chNN）」為主**（全書 131:14 壓倒性），「（見 chNN）」亦可；跨書寫「（見《馴服無限》chNN）」。不要寫死檔名路徑。\n- 程式無（純紙筆書，無 Python 段）；設定/註解一律英文；書內容繁體中文台灣用語、禁簡體詞。\n\n## 四、掃描協定\n\n1. **Tier-1 lint**：`python3 ../../../../tools/md-reader/lint_book.py book-src`（exit 0 才算過；目前 0 errors 0 warnings）。\n2. **ASCII 圖**：`python3 ../../../../tools/md-reader/check_diagrams.py book-src`（exit 0；目前 14 圖 0 suspicious）。**注意**：路線圖的 `│` 連接線因上下無 box 字元而被 checker 豁免，故 checker 不約束路線圖對齊——路線圖對齊只能靠**渲染肉眼檢查**（render check）。\n3. **跨章記號**：grep 鐵律寫法確認無矛盾——`2^ℵ₀ = ℵ₁`（CH）、`2^ℵ_α = ℵ_{α+1}`（GCH）、`D={x∈A : x∉f(x)}`、`R={x : x∉x}`、π(2,3)=18、𝔠 串等號。\n4. **Tier-2 跨家族驗證**（動到承重數學/證明時）：`python3 ../../../../tools/md-reader/gate_book.py book-src --verify`（三家族重算 worked example/proof）。\n5. **時效性**：本書幾乎全為穩定史實；延伸閱讀連結每年抽查一次是否失效；版本敏感的工程橋接（Lean/Coq/Agda 狀態、Rice 定理措辭、Morton/Z-order 用法）查證後更新並記日誌。\n\n## 五、掃描日誌\n\n- **2026-06-20**：建書（id `sets`，繁中）。P0–P1 meta 檔＋語言/深度/範圍 gate（書名《不只一種無限》定案）；landscape 28 次 web 查證（守住高風險：1874≠1891、克羅內克迷思、獨立性≠證偽、Banach–Tarski 非物理、Peirce beth、Frege 引文 ⚠️）。P2 章節 fan-out ch01–ch19（Opus 寫，每章 3–8 web 查證＋自我複核）＋3 附錄（從實際內容萃取：附錄 A 57 記號／B 51 術語／C 26 資源）。\n- **2026-06-20 P3 一致性**：Tier-1 lint 0/0（22 檔）、check_diagrams 14 圖 0 suspicious。修正：①GCH 記號 ch15 由 Unicode 下標 `2^ℵₐ` 統一成底線 `2^ℵ_α`（對齊 ch11 V_α 慣例）；②**6 張路線圖全部用 Python 腳本統一成單一 canonical**（含全部 ch10–13，先前 ch14 等版本漏列 ch12、ch01 缺箭頭、marker 標 Part vs 章不一），marker 標各章自身格。確認：CH 寫法全書一致、ℕ 約定三處皆有橋接說明、跨章引用裸寫「（chNN）」為 house style（131:14，未強制改）。\n- **2026-06-20 P4 二審＋裁決**：獨立 Claude 審查者（帶 web）結構＋8 事實＋5 承重數學全查——**事實 8/8 對、數學 5/5 對**（π(2,3)=18、對角翻轉、Cantor 定理、Vitali 測度矛盾、√2 非構造＋構造版=3 皆獨立重算確認）；另確認「科恩唯一數理邏輯 Fields」屬實（避免偽陽）。**修正 2 處**：①ch12 補上 König 1904 海德堡事件正文（outline 與 landscape §11 都點名、原僅在延伸閱讀連結，屬唯一「承諾未兌現 → 最有用也最可疑的選擇公理（ch12）→ 它的帳單 Banach–Tarski（ch13）→ **不能判定的問題**：連續統假設（ch14）→ 哥德爾與科恩證明「無解」（ch15）→ 不完備：對角線回到數學自己身上（ch16）→ **回到爭論與今天**：無限到底存不存在（ch17 無限戰爭）→ 無限活在你的技術棧裡（ch18 對角線＝停機問題）→ 總收官：我們學會了怎麼比較無限（ch19）。\n\n歷史暗線（交織不另立章）：伽利略看見 n↔n² 卻不敢下結論（1638）→ 康托爾從傅立葉級數唯一性問題走進點集（1870s，接《馴服無限》ch11/14）→ 1874 不可數性（套疊區間法）→ 1877「我看見了卻不敢信」→ 1891 對角論證 → 克羅內克的反對 → 1897 Burali-Forti／Cantor 悖論 → 1901 羅素悖論、1902 弗雷格的信 → 1904 策梅洛良序定理＋選擇公理、König 事件 → 1908 策梅洛公理、1922 弗蘭克爾/Skolem 補完 ZFC → 1924 Banach–Tarski → 1931 哥德爾不完備 → 1938–40 哥德爾 L（CH 相對一致）→ 1963 科恩 forcing（¬CH 相對一致）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 一樣多是什麼      Part II 不只一種無限    Part III 把無限做成數\nch01 牧羊人的配對        ch04 對角論證 ★         ch07 基數與夾擠 CSB\nch02 希爾伯特旅館    →   ch05 連續統的怪事   →   ch08 序數：數到無限之後\nch03 有理數也數得完      ch06 冪集定理            ch09 良序與超限歸納\n                                                      │\n                                                      ↓\nPart VI 回到爭論與今天   Part V 不能判定的問題   Part IV 地基的危機\nch17 無限戰爭        ←   ch14 連續統假設     ←   ch10 羅素悖論\nch18 技術棧裡的無限      ch15 獨立性 Gödel/Cohen ch11 ZFC：寫下規則\nch19 總收官             ch16 不完備 ★           ch12 選擇公理\n                                                ch13 Banach–Tarski\n```\n\n★＝全書兩個高潮：ch04 對角論證（第一道裂縫）、ch16 不完備（對角線回到自己身上）。\n\n## 跨章基準（一致性掃描的依據；各章不得另創寫法與命名）\n\n**脊椎**：一一對應（bijection）＝「一樣多」的唯一判準。具體脊椎物件是**「排成一列＋對角線」這張表**與**「ℕ 這把尺」**：反覆問「這個集合能不能跟 ℕ 一一對應？」——能（ℤ、ℚ）累積成「可數 ℵ₀」，直到對角論證證明 ℝ 不能（不可數 𝔠），冪集定理證明無限有無窮多級，最後 CH 問「ℵ₀ 與 𝔠 之間還有沒有別的大小」、獨立性證明這問題無解、不完備證明同一張對角線表困住數學自己。\n\n| 基準 | 寫法／值 | 出現章 |\n|---|---|---|\n| **ℕ 的約定** | 點名/基數脈絡 ℕ = {1,2,3,…}；序數脈絡（ch08 起）von Neumann ω = {0,1,2,…}。**明說兩者同一個集合、\\|ℕ\\|=ℵ₀ 不變**，只是起點標法不同 | ch01 定調 / ch08 切換 |\n| **一一對應記號** | `A ↔ B`＝存在 bijection；證「一樣多」＝給出一個明確的 f 並驗證不重（單射）不漏（滿射） | ch01 |\n| **可數定義** | 集合 A 可數 ⟺ A ↔ ℕ（或 A 有限）⟺ 能排成一列 a₁,a₂,a₃,…（可列舉）；ℵ₀ = \\|ℕ\\| | ch02 |\n| **希爾伯特旅館** | 房號 ℕ；塞 1 人：room n → n+1；塞可數無限人：room n → 2n（空出所有奇數房）；塞「可數多輛各載可數多人」：用 ℕ×ℕ↔ℕ | ch02 |\n| **ℤ↔ℕ** | 0,1,−1,2,−2,…（交錯列舉）；明確公式可給 | ch02 |\n| **ℚ↔ℕ** | 正有理數排成 p/q 格點、走「之字形（對角線蛇行）」、跳過非最簡分數；可數×可數=可數 | ch03 |\n| **配對函數** | Cantor pairing π(a,b)=((a+b)(a+b+1)/2)+b 把 ℕ×ℕ↔ℕ（工程橋：composite key/序列化編碼） | ch03 |\n| **代數數可數** | 整係數多項式可數 → 其根可數；超越數因此「幾乎全部」（不可數）——伏筆 ch04/ch05 | ch03 / ch05 |\n| **對角論證標準表** | 目標：無限二元序列集 {0,1}^ℕ（等價於 𝒫(ℕ)、(0,1) 區間）。把假設的「完整列表」寫成表，取對角線位元、**每位翻轉**造出不在表中的序列 → 矛盾。**全書脊椎視覺，ch04 定版**；十進位版要誠實處理 0.4999…=0.5000… 雙重表示（改位時避開 0/9） | ch04（定版）/ ch06 / ch16 |\n| **𝔠 的寫法** | 𝔠 = \\|ℝ\\| = \\|(0,1)\\| = \\|{0,1}^ℕ\\| = \\|𝒫(ℕ)\\| = 2^ℵ₀；全書同一個基數 | ch04 / ch05 / ch06 / ch07 |\n| **連續統怪事** | \\|(0,1)\\|=\\|ℝ\\|（tan/線性映射）；\\|ℝ\\|=\\|ℝ²\\|（康托爾 1877，位元交錯，je le vois mais je ne le crois pas）；但 𝔠 > ℵ₀ | ch05 |\n| **冪集定理** | 對任意集合 A，\\|A\\| < \\|𝒫(A)\\|（Cantor 定理，對角論證的一般化，本書硬證之一）；ℵ₀ < 2^ℵ₀ < 2^(2^ℵ₀) < … 階梯無頂；「沒有所有集合的集合」 | ch06 |\n| **Beth 階梯** | ℶ₀=ℵ₀、ℶ₁=2^ℵ₀=𝔠、ℶ₂=2^𝔠…；CH 等價於 ℵ₁=ℶ₁ | ch06 / ch07 / ch14 |\n| **CSB 定理** | Cantor–Schröder–Bernstein：\\|A\\|≤\\|B\\| 且 \\|B\\|≤\\|A\\| ⇒ \\|A\\|=\\|B\\|（兩向單射 ⇒ 一一對應）。歸屬亂、照 landscape（Cantor 述用 AC；Dedekind 1887 首個免 AC 證但未刊；Schröder 1898 證明有瑕、Bernstein 1897 在 Cantor 討論班給證）；工程橋：雙向 embedding/模擬證等容量 | ch07 |\n| **基數算術** | ℵ₀+ℵ₀=ℵ₀、ℵ₀·ℵ₀=ℵ₀、ℵ₀^k=ℵ₀；𝔠+𝔠=𝔠、𝔠·𝔠=𝔠、𝔠^ℵ₀=𝔠；2^ℵ₀=𝔠（無限基數「加乘塌縮、取冪才長大」） | ch07 |\n| **序數算術** | ω, ω+1, ω·2, ω², ω^ω, ε₀；**不可交換**：1+ω=ω ≠ ω+1；序型 vs 基數（同一個 ℵ₀ 可有很多序型） | ch08 |\n| **良序/超限歸納** | 良序＝全序且每個非空子集有最小元；超限歸納＝歸納法推到極限序數（基底/後繼/極限三情況）；良序定理（每個集合可良序，等價 AC） | ch09 / ch12 |\n| **羅素悖論** | R = {x : x ∉ x}；問 R ∈ R？ ⇒ 兩邊都矛盾。天真概括公理（任意性質都成集合）是毒；Burali-Forti/Cantor 悖論同源 | ch10 |\n| **ZFC 公理清單** | 外延、配對、聯集、冪集、無限、分離（限制版概括，擋掉羅素）、替換、正則（基礎，擋自含）、選擇；cumulative hierarchy V₀=∅, V_{α+1}=𝒫(V_α), V_λ=∪；公理＝擋掉壞查詢的 schema | ch11 |\n| **選擇公理 AC** | 任意一族非空集合有選擇函數（每個 bin 挑一個，可無規則）；等價：良序定理、佐恩引理；非構造性（存在≠給得出演算法） | ch12 |\n| **Banach–Tarski** | 用 AC 把實心球分成有限塊、剛體運動重組成兩個同樣的球；關鍵＝非可測集（不能給一致體積）；非物理悖論、是 AC＋無限的帳單；landscape 鎖件數與精確陳述 | ch13 |\n| **連續統假設 CH** | CH：2^ℵ₀ = ℵ₁（ℵ₀ 與 𝔠 之間無基數）；康托爾 1878 提出、希爾伯特 1900 第一問題 | ch14 |\n| **獨立性** | 哥德爾 1938–40：Con(ZFC) ⇒ Con(ZFC+CH)（構造宇宙 L）；科恩 1963：Con(ZFC) ⇒ Con(ZFC+¬CH)（forcing）。合起來 CH **獨立**於 ZFC（相對一致性，非「證明 CH 為假」）；forcing 只給直覺 taste | ch15 |\n| **不完備** | 哥德爾第一/第二不完備定理（陳述照 landscape）；對角化/自我參照＝對角論證的回聲；停機問題＝同一招的計算版 | ch16 |\n| **記號精度** | ℵ₀、𝔠、2^ℵ₀、ℵ₁、ω、𝒫(A)、\\|A\\|、↔ 全書一致；引文/年份照 landscape，全書不得互相矛盾 | 全書 |\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向）：ℝ 的構造（Dedekind 切割/Cauchy 序列 → 《馴服無限》ch14）；測度論與 σ-代數的系統建立（→《馴服隨機》）；一階邏輯的形式語法與證明論機制（→ TLA+ 書）；forcing 的完整技術（ch15 只給直覺）；大基數的階層理論（ch06/ch16 各一段 taste，不展開）；範疇論視角；序數/基數的完整算術定理表；模型論（ch15 點到 L 與 forcing model 即止）；任何考題式操練。\n\n---\n\n## Part I — 一樣多是什麼意思（ch01–03）\n\n### ch01 — 牧羊人的配對：把「一樣多」還原成最原始的動作\n- **目標**：讀完能說出「一樣多」的真正定義是一一對應、而不是「數出來再比數字」；能解釋為什麼這個定義在無限世界才是唯一行得通的；能畫出全書地圖。\n- **必涵蓋**：牧羊人用石子對羊（不會數也能知道「一樣多」）——配對先於計數，這是全書的種子；**伽利略悖論**（1638《兩門新科學》照 landscape）：{1,2,3,…} ↔ {1,4,9,…} 明明可以一一對應、但平方數又「明顯比較少」——伽利略的結論是「大小這個詞不能用在無限上」，**康托爾的逆轉**：不是放棄大小，是放棄「整體大於部分」這條只對有限成立的直覺；一一對應的精確定義（不重＝單射、不漏＝滿射，工程版：完美 hash 無碰撞且填滿）；定義「\\|A\\|=\\|B\\| ⟺ A↔B」——大小被**操作化**成「能不能配對」，這正是本書馴服無限的方式（呼應書架上《馴服無限》把無限操作化成極限）；康托爾的出身：研究傅立葉級數的唯一性問題走進「點的集合」（接《馴服無限》ch11/14，一句話）；本書路線圖（基準圖首次出場）＋六條驗收目標開宗明義；脊椎宣告：「ℕ 這把尺」與「排成一列＋對角線」。\n- **不涵蓋**：可數的正式理論（ch02）；對角論證（ch04）；ℝ 的構造（《馴服無限》）。\n- **橋接**：資料庫 join on unique key＝一一對應；完美 hash（無碰撞＝單射、填滿值域＝滿射）；`SELECT COUNT` 用配對而非逐一報數的直覺；「兩個系統一樣大」你其實天天用 key 對 key 在判斷。\n- **Worked example**：明確造一個一一對應：ℕ ↔ 平方數，f(n)=n²，逐項驗證不重（n≠m ⇒ n²≠m²）不漏（每個平方數 k² 都有原像 k）——「部分竟然和整體一樣多」第一次正面命中；再造 ℕ ↔ 偶數 f(n)=2n 當對照。\n- **紙上推演**：造 ℕ ↔ {3,6,9,…} 的一一對應並驗證；用一一對應解釋「飯店無限房間客滿還能再住一人」為什麼不荒謬（ch02 預習）；口頭題：把「一樣多的定義是配對、不是數字」講給一個只懂國中數學的人。\n\n### ch02 — 希爾伯特旅館：可數無限的怪算術\n- **目標**：能講清楚「可數無限 ℵ₀」是什麼、為什麼 ∞+1、∞+∞ 還是 ∞；能親手安排旅館的房間移位；理解「能排成一列＝可數」。\n- **必涵蓋**：希爾伯特旅館（Hilbert's Hotel，希爾伯特 1920s 講課、Gamow 1947 普及，照 landscape）：客滿＋1 人（room n→n+1）、客滿＋可數無限人（room n→2n）、客滿＋可數多輛各載可數多人（ℕ×ℕ 預告 ch03）；**可數的定義**：A↔ℕ 或有限⟺能排成一列 a₁,a₂,…（可列舉）；ℵ₀＝\\|ℕ\\|，第一個無限基數；ℤ↔ℕ（0,1,−1,2,−2,… 交錯列舉，給明確公式）；ℵ₀+1=ℵ₀、ℵ₀+ℵ₀=ℵ₀ 的旅館詮釋——**無限基數的加法塌縮**，與有限算術的決裂；誠實標示：「∞」不是一個數、ℵ₀ 才是（坊間把兩者混用是混亂之源）。\n- **不涵蓋**：ℚ 可數的完整論證（ch03）；不可數（ch04）；序數的 ω+1≠1+ω（ch08——這裡只談基數加法，明說序數另算）。\n- **橋接**：hash table 的 rehash／resize＝給每個元素重新分配位置但不丟不重（旅館移位的工程版）；陣列 reindex；offset 平移；「可列舉」＝你能寫一個 generator 最終 yield 出每個元素。\n- **Worked example**：旅館三幕完整安排：①1 人（移位表 room 1→2,2→3,…，新客進 room 1）；②可數無限人（room n→2n，新客住奇數房，列出對應表）；③ℤ↔ℕ 交錯列舉前 8 項對照表＋公式 f(n)=⌈n/2⌉ 帶正負號。\n- **紙上推演**：安排「客滿旅館來了可數多位新客」並寫出房號公式；解釋為什麼「先進可數多人、再進可數多人」旅館仍住得下；找出錯誤論證的破綻：「旅館客滿，所以再也住不下任何人——這跟有限旅館一樣」哪裡偷換了概念。\n\n### ch03 — 有理數也數得完：可數性的極限在哪\n- **目標**：能講出「ℚ 看起來比 ℕ 密無限倍、卻一樣多」為什麼成立；能手走一次對角蛇行列舉；建立「是不是所有無限都一樣大？」的懸念，為 ch04 鋪張力。\n- **必涵蓋**：直覺衝突：ℚ 在數線上稠密（任兩數間有無限多個），ℕ 稀疏，怎麼可能一樣多？**對角蛇行列舉**：把正有理數排成 p/q 無限格點、沿反對角線之字形走、跳過非最簡分數——每個有理數都會在有限步被點到 ⇒ ℚ⁺ 可數 ⇒ ℚ 可數（再交錯加負數與 0）；一般定理：**可數×可數＝可數**、**可數個可數集的聯集仍可數**（用 ℕ×ℕ↔ℕ）；**Cantor 配對函數** π(a,b)（給公式，工程橋：把 (a,b) 編碼成一個 ID）；**代數數可數**：整係數多項式可數→其根可數（給論證骨架）——埋伏筆：那超越數呢？張力到頂：到目前為止「凡能寫下規則排列的都可數」，似乎所有無限都是 ℵ₀——下一章把這個幻覺打碎。\n- **不涵蓋**：對角論證與不可數（ch04，本章刻意讓讀者以為「一切都可數」）；超越數的存在性證明（ch05 用基數一句話秒殺）。\n- **橋接**：能寫成 generator／能給每個元素編一個遞增整數 ID＝可數；composite key 把 (table, row) 壓成一個鍵＝配對函數；序列化把巢狀結構編成一條位元組串。\n- **Worked example**：對角蛇行列出正有理數前 12 項（畫格點表＋走法箭頭＋跳過 2/2,2/4… 的標記），對照「每個 p/q 在第幾步被點到」；用 Cantor 配對函數算 π(2,3) 與反查，驗證 ℕ×ℕ↔ℕ 不重不漏。\n- **紙上推演**：證明「兩個可數集的聯集可數」（給交錯列舉）；解釋為什麼「ℚ 稠密」不蘊含「ℚ 比 ℕ 多」（稠密是順序性質、多少是基數性質，兩回事）；口頭題：把「ℚ 和 ℕ 一樣多」講給一個覺得「明明 ℚ 密無限倍」的人聽，讓他服氣。\n\n## Part II — 不只一種無限（ch04–06）\n\n### ch04 — 對角論證：第一個數不完的集合（全書高潮之一）\n- **目標**：能完整重講康托爾對角論證、講到讓另一個工程師也能自己重走一遍；能說出「ℝ 不可數」為什麼是人類思想史的地震；知道它和停機問題是同一招（ch16 回收）。\n- **必涵蓋**：把張力講滿（ch03 讓你以為一切可數）；**對角論證**完整版（本書硬證之首）：假設無限二元序列集 {0,1}^ℕ 可數＝可以排成一列、寫成無限長的表，取對角線位元、**每一位翻轉**，造出一個新序列 s*——s* 與第 n 列在第 n 位不同 ⇒ s* 不在表中 ⇒ 矛盾 ⇒ {0,1}^ℕ 不可數（**對角線標準表定版**，ch06/ch16 共用其變形）；換皮成 (0,1) 實數的小數版，**誠實處理** 0.4999…=0.5000… 雙重表示（造新數時每位只在 {3,7} 這種安全集合裡選，避開 0/9）；於是 ℝ 不可數＝存在「比 ℵ₀ 嚴格大」的無限——**不只一種無限**這句話第一次被證明，不是修辭；歷史：1874 第一個不可數性證明用的是**套疊區間法不是對角線**（landscape 守住此分野），1891 才有對角論證、且更一般更短；克羅內克的反對與康托爾的處境（照 landscape，不浪漫化其精神疾病）。\n- **不涵蓋**：𝔠 的算術與 ℝ²（ch05）；冪集一般化（ch06）；停機問題機制（ch16，這裡只說「記住這招」）。\n- **橋接**：對角論證＝**停機問題的同一招**（先點明、ch16 展開）：你想列出「所有能停機判定器」，我就構造一個專門跟對角線作對的輸入；「你無法寫一個 enumerator 列出所有無限位元串／所有實數／所有程式的行為」——不可列舉＝不可數的計算版。\n- **Worked example**：對角論證走整遍：給一張假設的 5 列二元序列表、標出對角線、逐位翻轉造出 s*、逐列驗證 s* 與每一列至少一位不同；小數版造一個不在給定列表中的 (0,1) 實數（用「對角數字若是 5 改 6、否則改 5」避開 0/9 陷阱）。\n- **紙上推演**：對「自然數的所有子集 𝒫(ℕ)」自己跑一次對角論證（提示：子集↔特徵序列，ch06 正式化）；找出「對角線造出的 s* 其實就排在表的第 ∞ 列」這個常見錯誤的破綻（沒有「第 ∞ 列」，列表由 ℕ 索引）；口頭題【全書最重要的口試之一】：不看書，把對角論證講給一個工程師聽，講到他能自己重走。\n\n### ch05 — 連續統的怪事：線、面、空間一樣多\n- **目標**：能講出 𝔠＝\\|ℝ\\| 這個新基數的幾個反直覺事實（線段=整條線、線=平面），並說清楚「為什麼這些都成立、但 𝔠>ℵ₀ 依然成立」；對超越數「幾乎是全部」有自己的話。\n- **必涵蓋**：\\|(0,1)\\|=\\|ℝ\\|（tan 或 x↦x/(1−\\|x\\|) 類的明確一一對應，給一個）——有界線段和整條無界直線一樣多；**\\|ℝ\\|=\\|ℝ²\\|**（康托爾 1877，位元/小數交錯把 (x,y) 編成一個數，誠實標示交錯要避開雙重表示的技術細節）——「線和平面一樣多」，康托爾給戴德金的信「**je le vois, mais je ne le crois pas**（我看見了卻不敢相信）」（照 landscape）；推廣 \\|ℝ\\|=\\|ℝⁿ\\|；對照 ch04：這些一一對應**都不破壞** 𝔠>ℵ₀——維度不增加基數、但可數到不可數是真正的跳躍；**超越數幾乎是全部**：代數數可數（ch03）、ℝ 不可數 ⇒ 超越數不可數 ⇒「隨手丟一個實數幾乎一定是超越數」，但具體證明某個數超越很難（π、e 是後來才證的）——存在性 vs 構造性的鴻溝（伏筆 ch12 選擇公理）；2^ℵ₀=𝔠 點到（ch06/ch07 正式）。\n- **不涵蓋**：冪集定理一般化（ch06）；基數算術系統（ch07）；ℝ 的構造（《馴服無限》ch14，一句話）。\n- **橋接**：**空間填充曲線**（Hilbert curve）是真實 CS：把二維座標編成一維保持鄰近性，用在空間索引／DB locality；Morton/Z-order（位元交錯）就是 \\|ℝ\\|=\\|ℝ²\\| 構造的工程近親；「兩個 float 交錯成一個 key」你可能寫過。\n- **Worked example**：造 (0,1)↔ℝ 的明確一一對應並驗證端點行為；\\|ℝ\\|=\\|ℝ²\\| 的位元交錯示範：給 x=0.a₁a₂…、y=0.b₁b₂…，造 z=0.a₁b₁a₂b₂…，說明它為什麼幾乎是一一對應、以及雙重表示造成的「幾乎」要怎麼補（CSB 救援，指向 ch07）。\n- **紙上推演**：造一個 (−1,1)↔ℝ 的一一對應；解釋「線段比整條線短，怎麼會一樣多」用一一對應回答（長度是測度、多少是基數，兩回事——呼應 ch03 稠密≠多）；口頭題：為什麼「幾乎所有實數都是超越數，但我們認識的數幾乎都是代數數」？\n\n### ch06 — 冪集定理：沒有最大的無限\n- **目標**：能重講 Cantor 定理（\\|A\\|<\\|𝒫(A)\\|）的對角論證、看出它是 ch04 的一般化；能說出「無限有無窮多級、沒有頂」以及「沒有所有集合的集合」；建立通往羅素悖論的橋。\n- **必涵蓋**：子集↔特徵序列（A 的子集 ↔ {0,1}^A 的元素，工程橋：bitmask/feature flag）；**Cantor 定理**（本書硬證之一）：對任意集合 A，不存在 A→𝒫(A) 的滿射——假設 f 滿射，造對角集 D={x∈A : x∉f(x)}，問「D 是誰的像？」⇒ 跟羅素悖論同構的矛盾（明點此同構，ch10 回收）⇒ \\|A\\|<\\|𝒫(A)\\|；於是 ℵ₀ < 2^ℵ₀ < 2^(2^ℵ₀) < …——**無限的階梯永遠往上、沒有最大的無限**；Beth 階梯 ℶ₀<ℶ₁<…；2^ℵ₀=𝔠（𝒫(ℕ)↔{0,1}^ℕ↔ℝ，CSB 補嚴格，指向 ch07）；**沒有「所有集合的集合」**：若 U 是全集，𝒫(U)⊆U 但 \\|𝒫(U)\\|>\\|U\\|，矛盾（Cantor 悖論，1899 給戴德金，照 landscape）——天真地「把所有東西收成一個集合」會爆炸，正是 ch10 的引線。\n- **不涵蓋**：羅素悖論的完整處理與 ZFC 的修補（ch10/ch11）；CH（ch14——這裡只擺出階梯，不問 ℝ 落在哪一階）；序數/基數的形式定義（ch07/ch08）。\n- **橋接**：n 個 feature flag → 2^n 種組態，你在有限世界早就知道冪集指數爆炸；Cantor 說這在無限照樣成立、且永遠拉開差距；「設定的所有可能組合」永遠比「設定項」多一個數量級的無限。\n- **Worked example**：對有限集 {a,b,c} 列出 𝒫 的 8 個元素＋特徵位元（000…111），看見 2³>3；再對「假設 f:{a,b,c}→𝒫 滿射」手造對角集 D 證明造不出滿射（有限版熱身）；然後把同一招搬到無限 A 寫出 Cantor 定理證明。\n- **紙上推演**：對 A=ℕ 寫出 Cantor 定理證明、指出對角集 D 對應 ch04 的哪個翻轉序列；解釋「為什麼沒有所有集合的集合」給一個想寫 `Set<everything>` 的工程師；找出破綻：「2^ℵ₀ 不過就是 ℵ₀ 乘很多次，還是 ℵ₀」錯在哪（加乘塌縮、取冪不塌縮，呼應 ch07）。\n\n## Part III — 把無限做成數（ch07–09）\n\n### ch07 — 基數與夾擠：怎麼證明一樣多而不真的配對\n- **目標**：能用 Cantor–Schröder–Bernstein 定理「兩向單射 ⇒ 一樣多」當實用工具；能跑一遍無限基數算術、說出「加乘塌縮、取冪才長大」的規律。\n- **必涵蓋**：問題：要證 \\|A\\|=\\|B\\| 常常很難直接造一一對應，但造兩個方向的單射各自容易得多；**CSB 定理**（敘述＋證明骨架，歸屬亂、照 landscape：康托爾述用 AC、戴德金 1887 首個免 AC 證但未刊、Bernstein 1897 給證、Schröder 1898 證明有瑕）——本書給「來回搬移／追蹤軌道」的直覺證明骨架，標示完整證明的細節指向延伸閱讀；用 CSB 補完前面欠的嚴格：\\|ℝ\\|=\\|(0,1)\\|=\\|𝒫(ℕ)\\|=2^ℵ₀=𝔠（ch05/ch06 的「幾乎一一對應」在這裡被 CSB 轉成真的相等）；**無限基數算術**：ℵ₀+ℵ₀=ℵ₀、ℵ₀·ℵ₀=ℵ₀（旅館/格點回收）、𝔠+𝔠=𝔠、𝔠·𝔠=𝔠（位元交錯回收）、2^ℵ₀=𝔠、𝔠^ℵ₀=𝔠——規律：**無限基數的加法乘法都塌縮成較大那個，只有取冪能跳上一階**；基數的定義一句話（等勢類的代表，正式定義需序數，指向 ch08）。\n- **不涵蓋**：基數的序數式正式定義（ch08）；CH（ch14）；序數算術（ch08）。\n- **橋接**：**雙向 embedding 證等容量**：證兩個系統等價，常用「A 能模擬 B、B 也能模擬 A」⇒ 等價——CSB 就是這招的集合論版；證兩個資料結構等表達力靠互相編碼；rate limiter 的上下界夾擠（呼應《馴服無限》窮盡法的二分夾擠精神）。\n- **Worked example**：用 CSB 證 \\|(0,1)\\|=\\|[0,1]\\|：造 (0,1)↪[0,1]（恆等）與 [0,1]↪(0,1)（縮放塞進去），CSB 直接給一一對應、免去硬造（硬造要處理端點很煩）——展示工具的威力；算 ℵ₀·ℵ₀=ℵ₀ 用對角列舉、2^ℵ₀=𝔠 用特徵序列。\n- **紙上推演**：用 CSB 證 \\|ℝ\\|=\\|ℝ²\\|（造兩向單射，比 ch05 硬造交錯乾淨）；證 ℵ₀+𝔠=𝔠（兩向單射）；解釋「為什麼無限基數加法塌縮、取冪卻長大」給一個工程師（提示：冪集對角線拉開差距）。\n\n### ch08 — 序數：數到無限之後還能繼續數\n- **目標**：能分清楚基數（多少）與序數（第幾、什麼順序型）；能排出 ω, ω+1, ω·2, ω², ω^ω；能解釋「ω+1≠1+ω」為什麼合理。\n- **必涵蓋**：動機：基數回答「多少」，但「排列的順序型態」是另一種訊息——把 ℕ 排好後在尾巴再放一個元素，基數沒變（還是 ℵ₀）但「順序型」變了；**序數**作為良序集的順序型：0,1,2,…（有限）→ ω（第一個無限序數，所有自然數之後的位置）→ ω+1, ω+2,… → ω·2 → ω² → ω^ω → ε₀（ε₀=ω^ω^…，第一個 ε 不動點，taste）；von Neumann 編碼一句話（每個序數＝前面所有序數的集合，0=∅, 1={0}, ω={0,1,2,…}）並切換 ℕ 起點約定（基準表）；**序數算術不可交換**：1+ω=ω（在前面塞一個不改尾巴）≠ ω+1（在後面接一個，是新的更大序數）——用「排隊」直覺講透；同一個基數 ℵ₀ 對應**無窮多個**可數序數（ω, ω+1, ω², …），基數是序數的「忘掉順序」版。\n- **不涵蓋**：良序定理與超限歸納（ch09）；基數作為起始序數的正式定義（一句話帶過）；序數算術的完整定理；大序數理論（ε₀ 只 taste，連到 Goodstein/不完備的一句話伏筆 ch16）。\n- **橋接**：**超限迭代**：把「重複到無限之後還要繼續」形式化——像優先序/版本號排到 ω 之後還有 ω+1；遊戲回合或排程的「極限階段後重啟下一輪」；序數＝位置（第幾），基數＝個數（多少），你混用過的「size」其實是兩個概念。\n- **Worked example**：把 {0, 1, 1−1/2, 1−1/3, …, 1} ⊂ ℝ 的自然順序辨識為序型 ω+1（前面 ω 個逼近點、最後一個 1 是極限位置），畫數軸標出來；排出 ω·2 的具體模型（兩段 ℕ 接起來：先 0,2,4,… 再 1,3,5,… 的順序版）；對照 ω+1 與 1+ω 的排隊圖。\n- **紙上推演**：把 {1/2, 2/3, 3/4, …, 1, 2} 的順序型寫出來（ω+2）；解釋 1+ω=ω 用排隊直覺；口頭題：基數和序數差在哪？舉一個「基數相同序數不同」的例子。\n\n### ch09 — 良序與超限歸納：把歸納法推到無限之外\n- **目標**：能講出良序集為什麼是「能做歸納法」的關鍵；能把熟悉的數學歸納法升級成超限歸納（含極限步驟）；理解這是定義 ℵ、V 等一切的引擎。\n- **必涵蓋**：**良序**＝全序且每個非空子集有最小元（ℕ 是、ℤ/ℚ/ℝ 不是）；為什麼良序＝可做歸納：沒有「無限下降」⇒ 反例若存在必有最小反例⇒矛盾（最小反例法，工程師熟的「找最小違規」）；**超限歸納**：要證性質 P 對所有序數成立，證①基底 P(0)②後繼 P(α)⇒P(α+1)③**極限**：所有 β<λ 都有 P(β) ⇒ P(λ)——關鍵是多出來的極限步驟（歸納法的「無限累積」版）；**超限遞迴**：同樣三情況可以**定義**東西（不只證明），ℵ 階層、V 階層、序數算術全靠它定義；良序定理（每個集合都能被良序排列）——驚人（ℝ 也能良序？！）但它等價於選擇公理（伏筆 ch12，這裡只擺出來震一下）；引用書架 TLA+ 的 ranking function／liveness 終止論證（不依賴）：你證迴圈會停，用的就是「往一個良序集遞減不能無限下降」。\n- **不涵蓋**：選擇公理本身（ch12，這裡只說良序定理等價 AC）；序數算術細節（ch08）；形式證明論（TLA+ 書）。\n- **橋接**：**結構歸納／良基遞迴**你天天用（對遞迴資料型別歸納）；迴圈終止證明＝往良序集遞減（ranking function／loop variant，TLA+ liveness）；「沒有無限下降鏈」＝你的遞迴有 base case 會停。\n- **Worked example**：用最小反例法證「ℕ 的每個非空子集有最小元⇒數學歸納法成立」（兩者等價的半邊）；超限歸納三步驟模板套一個玩具性質（如「每個序數要嘛 0、要嘛後繼、要嘛極限」）走一遍，明確標出極限步驟在做什麼。\n- **紙上推演**：判斷 {…,−3,−2,−1}（負整數逆序）是不是良序、為什麼；把一個迴圈終止論證（自選或給定）翻成「往 ℕ 遞減」；解釋為什麼超限歸納非要極限步驟不可、少了會漏掉什麼（口頭題）。\n\n## Part IV — 地基的危機（ch10–13）\n\n### ch10 — 羅素悖論：天真集合論的自爆\n- **目標**：能完整重講羅素悖論、講到對方也覺得地基塌了；能說出「天真概括公理」是禍根、它和對角論證/Cantor 定理同源；理解這逼出了公理化。\n- **必涵蓋**：天真集合論的信條——**概括公理**：任何性質 P 都決定一個集合 {x : P(x)}（弗雷格《算術基礎》的地基）；**羅素悖論**（1901，給弗雷格信 1902，照 landscape）：取 P(x)＝「x∉x」，R={x : x∉x}，問 R∈R？——R∈R ⇒ R∉R，R∉R ⇒ R∈R，**兩邊都矛盾**，無處可逃；同構展示：這就是 Cantor 定理對角集 D 的素顏（ch06 回收）、也是對角論證翻轉位元的邏輯版——**同一條對角線，第三次出場**；通俗版：理髮師悖論（只幫不自己刮鬍子的人刮）、Grelling 異義詞悖論——但點明通俗版有出口（理髮師可以不存在）、集合版沒有（R 由概括公理「保證」存在）；弗雷格收到信的反應（《算術基礎》第二卷附記，照 landscape）——一個人的地基在出版前夕崩塌；Burali-Forti（1897）、Cantor 悖論（ch06）同屬「太大的集合」家族；出路預告：不是放棄集合，是**限制**能造哪些集合（ch11）。\n- **不涵蓋**：ZFC 公理逐條（ch11）；類型論等其他解法（一句話＋延伸閱讀）；形式邏輯機制。\n- **橋接**：**無限制的自我參照**＝你最怕的 bug：`R = {x : x ∉ x}` 像一個「列出所有不列出自己的清單」的清單；無 WHERE 又自我 JOIN 的查詢；遞迴定義缺 base case 的爆炸；「把所有東西收進一個容器」`Set<Everything>` 為什麼是地雷。\n- **Worked example**：羅素悖論的兩段論完整攤開（假設 R∈R 推出 R∉R；假設 R∉R 推出 R∈R；兩路都死），對照 Cantor 定理對角集 D={x:x∉f(x)} 並排——指出「f＝恆等」時 D 就是 R；理髮師版並排，標出「集合版沒有出口」的那一格。\n- **紙上推演**：把 Grelling 異義詞悖論寫成兩段論並找出它和羅素的對應；解釋「為什麼理髮師悖論有解、羅素悖論沒解」；口頭題：把羅素悖論講給一個剛寫了 `getAllSetsNotContainingThemselves()` 的工程師聽。\n\n### ch11 — ZFC：把規則寫下來\n- **目標**：能講出公理化在修什麼（不是憑空立規矩，是擋掉羅素那種構造）；能說出 ZFC 幾條關鍵公理各自擋什麼／給什麼；理解「累積階層 V」這個宇宙觀。\n- **必涵蓋**：策略轉變——從「任何性質都成集合」退到「**只能從已有集合、用受限的方式造新集合**」；ZFC 公理當故事逐條講其**動機**（不形式推導）：外延（集合由元素決定）、配對/聯集/冪集（造新集合的基本工具）、無限公理（保證 ℕ 存在，否則無限免談）、**分離公理**（只能在已有集合 A 內 {x∈A : P(x)}——這一刀砍掉羅素：R 不能憑空生，只能在某個 A 裡篩，而「所有集合」不是集合）、替換公理（像替函數，弗蘭克爾/Skolem 1922 補）、正則/基礎公理（禁止 x∈x 與無限下降∈鏈，擋掉自含）、選擇公理（單獨留給 ch12）；**累積階層 V**：V₀=∅、V_{α+1}=𝒫(V_α)、極限取聯集——宇宙是「一層層蓋上去」的（用 ch09 超限遞迴定義），每個集合都在某一層出生，「所有集合的集合」永遠在下一層之外（呼應 ch06）；公理化的代價與收穫一句話（不能再隨手造集合，但矛盾被擋在門外）。\n- **不涵蓋**：每條公理的形式語句與獨立性（延伸閱讀）；選擇公理（ch12）；其他公理系統 NBG/類型論（一句話）；模型論（ch15）。\n- **橋接**：**公理＝擋掉壞輸入的 schema／型別系統／spec**：分離公理像「查詢必須限定在一張既有的表上、不能 SELECT FROM everything」；累積階層像分層建置（dependency level，每層只能用更低層）；引用書架 TLA+：spec 的不變式就是公理——你用約束換掉「什麼都能發生」的混亂（可引用不依賴）。\n- **Worked example**：示範分離公理怎麼擋羅素：嘗試造 R={x : x∉x} 失敗（沒有母集合 A），改成在某個 A 內 R_A={x∈A : x∉x}，證明 R_A∉A（無矛盾、還順手證明「沒有全集」）——一個公理如何精準拆掉悖論；列出 V₀…V₄ 的前幾層具體長相（∅, {∅}, …）。\n- **紙上推演**：用分離公理在 A={1,2,3,4} 內造出「偶數子集」並說明為什麼這安全；解釋正則公理怎麼擋掉 x∈x；口頭題：公理化不是「規定數學該長怎樣」，而是「______」——把這句話補完並講給工程師聽（提示：擋掉已知會爆炸的構造）。\n\n### ch12 — 選擇公理：最有用也最可疑的公理\n- **目標**：能講清楚 AC 在說什麼、為什麼「顯然」卻必須當公理；能說出它的三個面孔（選擇函數／良序定理／佐恩引理）等價；理解構造性 vs 存在性的鴻溝。\n- **必涵蓋**：**選擇公理 AC**：給一族非空集合 {A_i}，存在選擇函數 f 從每個 A_i 挑一個元素——有限族顯然成立（逐一挑），**無限族**才需要當公理（「同時挑無限多個、可能沒有規則可循」）；羅素的襪子比喻（無限雙鞋可以「都挑左腳」不需 AC，無限雙**襪子**沒有區分規則就需要 AC，照 landscape）；**三個等價面孔**：AC ⟺ 良序定理（ch09 那個「ℝ 也能良序」的驚人結論，策梅洛 1904 用 AC 證，照 landscape）⟺ 佐恩引理（每條鏈有上界⇒有極大元，代數裡天天用）；**構造性 vs 存在性**：AC 保證選擇函數**存在**卻不給**怎麼挑**——對一個「要看到演算法才安心」的工程師，這正是最不舒服的地方（呼應 ch05 超越數、伏筆 ch17 直覺主義）；AC 無所不在：每個向量空間都有基底（指向《矩陣是動詞》）、Tychonoff、許多「顯然」的證明偷用了它；König 1904 事件＋AC 爭議的歷史溫度（照 landscape）。\n- **不涵蓋**：Banach–Tarski（ch13）；AC 的獨立性（ch15 一句話：AC 也獨立於 ZF）；佐恩引理在代數的完整應用（延伸閱讀）。\n- **橋接**：**「假設存在一個選擇器但不給實作」**＝AC 的精神，對比你寫 code 必須給出 `pick()` 的實作；從每個 partition/shard 挑代表元——有 key 排序就不需 AC（有規則），沒有自然規則就是 AC 的處境；非構造性存在證明 vs 你要的「給我演算法」。\n- **Worked example**：對比兩個選擇問題：①從每個 {⟨n 的偶數倍⟩} 挑最小元（不需 AC，有規則「取最小」）②從 ℝ 的每個非空子集挑一個元素（需要——ℝ 沒有自然良序，除非 AC 給你一個）；用佐恩引理證「每個向量空間有基底」的論證骨架（鏈＝線性獨立集的遞增、上界＝聯集、極大元＝基底）。\n- **紙上推演**：判斷哪些需要 AC：從可數多個非空 ℕ 子集各挑一個（不需，取最小）／從不可數多個 ℝ 子集各挑一個（需要）；解釋羅素的鞋襪比喻；口頭題：為什麼一個「顯然成立」的敘述需要被列為公理、而不是被證明？\n\n### ch13 — 巴拿赫–塔斯基：選擇公理的帳單\n- **目標**：能講出 Banach–Tarski 在說什麼、它為什麼不違反物理、它揭露的是「非可測集」這個怪物；能把它定位成「AC＋無限的帳單」而非魔術。\n- **必涵蓋**：**Banach–Tarski 悖論**（1924，照 landscape 鎖件數與精確陳述）：可以把實心球分成有限多塊、只用旋轉平移、重組成**兩個**和原來一樣大的實心球——體積憑空翻倍；關鍵不是塊的形狀而是**這些塊沒有體積**（非可測集，non-measurable）：證明用 AC 從不可數多個軌道各挑一個代表元（ch12 回收），挑出來的集合無法被賦予一致的「體積」；為什麼不違反物理／守恆：現實的物質不是無限可分的點集、非可測集不是你能「切」出來的東西——這是**數學物件**的性質不是麵包刀的性質；它真正的訊息：「**不是每個點集都能有體積**」——測度必須限制在 σ-代數上（為什麼機率論要 σ-代數，指向《馴服隨機》）；哲學回擊：有人因此想拒絕 AC，但拒絕 AC 會失去更多有用的東西（ch12 回收）——數學選擇了「留著 AC、接受 Banach–Tarski 當代價」；非可測集存在性也需要 AC（Vitali 集，照 landscape）。\n- **不涵蓋**：證明的群論細節（自由群 F₂ 的悖論分解只給直覺骨架，明說不證）；測度論系統（《馴服隨機》）；AC 的替代（ch17 一句話）。\n- **橋接**：**非可測集＝不能給一致「大小」的集合**：像一種你無法定義守恆量的聚合（sum 不守恆的詭異劃分）；為什麼 `volume(A ∪ B)=volume(A)+volume(B)` 這條你以為理所當然的可加性，在病態集合上會崩——逼出「只在可測集上談體積」（σ-代數＝合法可測的劃分）。\n- **Worked example**：用「Vitali 集」給非可測的最小可懂版：在 [0,1] 上把 x~y⟺x−y∈ℚ 分成等價類、用 AC 各挑一個代表元成 V，證明「若 V 可測則它的可數多個平移版的總測度既不能是 0 也不能是正數」⇒ 矛盾 ⇒ V 非可測（給論證骨架，這是 Banach–Tarski 的可懂前身）；Banach–Tarski 本身只給「自由群分解＝倍增」的一張示意。\n- **紙上推演**：解釋「Banach–Tarski 不違反質量守恆」給一個物理直覺很強的工程師；指出 Vitali 論證裡 AC 用在哪一步、可數可加性用在哪一步；口頭題：Banach–Tarski 真正證明的是關於「球」還是關於「體積這個概念」？\n\n## Part V — 不能判定的問題（ch14–16）\n\n### ch14 — 連續統假設：ℵ₀ 和 𝔠 之間有東西嗎？\n- **目標**：能精確說出 CH 在問什麼（2^ℵ₀=ℵ₁？）；能講出它為什麼是最自然又最折磨人的問題；知道希爾伯特把它列為第一問題的份量。\n- **必涵蓋**：回收階梯（ch06/ch07）：ℵ₀ < 𝔠＝2^ℵ₀，但 ℵ₁ 是 ℵ₀ **之後的下一個基數**（沒有基數夾在中間，由良序/序數保證 ch08/09）——問題是：**𝔠 就是 ℵ₁ 嗎？還是中間還夾著別的無限？**；**CH：2^ℵ₀ = ℵ₁**（連續統是 ℵ₀ 之後緊接的那一級，ℕ 和 ℝ 之間沒有「中等大小」的無限）；康托爾 1878 提出、終生想證（照 landscape，與他的精神健康分開敘述、不浪漫化因果）；**希爾伯特 1900 巴黎第一問題**（照 landscape）——20 世紀數學的頭號懸案；為什麼它「應該」有答案：每個具體你想得到的 ℝ 子集要嘛可數要嘛是 𝔠（Borel 集成立，伏筆「但一般集合呢」）；GCH 一句話（2^ℵₐ=ℵₐ₊₁）；張力收尾：康托爾、希爾伯特都相信能證——下一章的答案會出乎所有人意料。\n- **不涵蓋**：獨立性證明（ch15）；描述集合論（Borel 階層只一句話）；forcing（ch15）。\n- **橋接**：**一個看似一定有 yes/no 答案的問題**：像問「這個 spec 是否決定了某個行為」——你以為規格要嘛允許要嘛禁止，CH 卻是規格**根本沒規定**的那種問題（ch15 揭曉）；「ℵ₀ 和 𝔠 之間」像問兩個已知容量級之間還有沒有中間級。\n- **Worked example**：把「ℵ₁ 是什麼」講清楚：ℵ₁＝第一個不可數序數的基數＝所有可數序數構成的集合的基數（用 ch08/09），證明「ℵ₀ 之後確實有緊接的下一級、中間不可能再插基數」（良序保證）；於是 CH 的問句精確化為 𝔠=ℵ₁ 的等號該不該成立。\n- **紙上推演**：用自己的話把 CH 寫成三種等價問法（2^ℵ₀=ℵ₁／ℝ 的每個無限子集要嘛可數要嘛與 ℝ 等勢／ℵ₀ 與 𝔠 之間無基數）；解釋為什麼「中間沒有基數」需要良序才講得清楚；口頭題：CH 為什麼是「最自然」的問題？\n\n### ch15 — 獨立性：哥德爾與科恩證明這問題沒有答案\n- **目標**：能講出「獨立於 ZFC」是什麼意思（不是還沒證、是證明了證不出來，兩個方向都一致）；能說出哥德爾與科恩各做了什麼；對 forcing 有一個誠實的直覺 taste。\n- **必涵蓋**：什麼叫**獨立**：一個命題 P 獨立於公理系統 ⟺ 系統既證不出 P、也證不出 ¬P（相對一致性：Con(ZFC)⇒Con(ZFC+P) 且 Con(ZFC)⇒Con(ZFC+¬P)）；類比**平行公設**獨立於其他歐氏公理（歐氏/雙曲/橢圓幾何都一致）——CH 之於 ZFC 正是如此（最有力的類比，講透）；**哥德爾 1938–40**：構造宇宙 L（可構成集，「只承認被明確定義出來的集合」的最小宇宙），在 L 裡 CH（甚至 GCH）成立 ⇒ ZFC 不能反駁 CH；**科恩 1963**：**forcing**——從一個模型「外加」新的實數進去、撐大連續統，造出 ¬CH 成立的模型 ⇒ ZFC 不能證明 CH（科恩因此得 1966 Fields 獎——集合論/數理邏輯罕見的 Fields 殊榮，精確措辭照 landscape）；forcing 的**直覺 taste**（不展開技術）：像在模型裡「逼著」加入一個一般性的新對象、小心控制它不製造矛盾——「替數學宇宙加裝外掛而不當機」；結論的份量：「連續統有多大」**不是 ZFC 能決定的**——數學的某些最自然問題，答案取決於你選哪些公理；這不是失敗、是發現了公理系統的真實邊界（接 ch16）；現代態度一句話（多數集合論家認為 CH「有真假」要靠新公理，如大基數/forcing axioms，taste 不展開，照 landscape）。\n- **不涵蓋**：forcing 的技術（偏序、generic filter 只比喻、不形式化）；L 的內模型理論；大基數（一句話 taste）；不完備的證明（ch16）。\n- **橋接**：**獨立＝feature flag 對其餘 spec 既相容開也相容關**：CH 像一個你的規格沒有約束、打開或關閉都不破壞一致性的選項；平行公設＝可換的幾何公理；「規格未定義行為」的數學最高級版本。\n- **Worked example**：把獨立性講成兩個相對一致性陳述並排（哥德爾給一邊、科恩給另一邊），對照平行公設的兩個模型（歐氏 vs 雙曲）逐欄類比——「同一套核心公理＋一個可選命題＝兩個都成立的世界」；用「L 只收可定義集合所以稀疏、CH 容易成立」給一個降低維度的直覺。\n- **紙上推演**：解釋「獨立」和「還沒被證明」差在哪（給一個各自的例子）；用平行公設類比講 CH 的獨立性給一個學過一點幾何的人；口頭題：科恩 forcing「加入新實數」為什麼能讓 𝔠 變大、又不製造矛盾（直覺版即可）。\n\n### ch16 — 不完備：對角線回到數學自己身上（全書高潮之二）\n- **目標**：能講出哥德爾不完備定理在說什麼（與不說什麼）；能看出它、停機問題、對角論證、羅素悖論是**同一條對角線**；理解這是全書脊椎的終點。\n- **必涵蓋**：把脊椎收線——對角論證（ch04 翻轉位元）、Cantor 定理對角集（ch06）、羅素悖論 R（ch10）都是「造一個專門和每一列/每個自己作對的對象」，**哥德爾把這招用到「可證明性」上**；**哥德爾編碼**：把公式與證明編成自然數（Gödel numbering，工程橋：把程式碼當資料／序列化），於是「這個命題可證」變成一個算術命題；**第一不完備定理**：任何夠強（能表達算術）且一致的公理系統，存在一個為真但系統證不出的命題 G（G 自述「我不可證」——對角線自我參照）；**第二不完備定理**：這種系統不能證明自己的一致性；**精確標示它不說什麼**（landscape 守住常見誤解）：不是「有些事永遠不可知」「數學不可靠」「什麼都不能證」——是「**沒有一個固定的公理系統能證出全部算術真理**」；**停機問題＝計算版的同一招**（圖靈 1936，照 landscape）：假設有萬能停機判定器 H，造一個「H 說我停我就不停」的對角程式 ⇒ 矛盾 ⇒ 不可判定——和對角論證逐位作對、和 G 自述不可證，是同一個構造（ch04 的承諾在此兌現）；回扣 ch15：CH 獨立是「某些命題系統不決定」，不完備是「任何系統都漏真理」——兩種邊界，同一個謙卑；連到書架 TLA+（model checking 能查有限狀態、但一般性正確性的極限就住在這裡，可引用不依賴）。\n- **不涵蓋**：哥德爾編碼與證明的技術細節（給「自我參照如何算術化」的直覺，明說不證）；可計算性理論系統（《等待的數學》《從後端到 AI Infra》無關，這裡只取停機問題一例）；證明論。\n- **橋接**：**停機問題你可能聽過、這裡給它的祖譜**：H(p,x) 萬能判定器→對角程式 D(p)=「若 H(p,p) 說停就無限迴圈、否則停」→ D(D) 自相矛盾；Gödel numbering＝把程式當資料（quine、反射、序列化你都碰過）；「沒有萬能的靜態分析器能判定所有程式的所有性質」（Rice 定理一句話）就是不完備的工程日常。\n- **Worked example**：停機問題對角證明完整走一遍（假設 H、造 D、代入 D(D)、兩種情況都矛盾），並排對角論證的「s* 與第 n 列第 n 位不同」與 G 的「我不可證」——三欄對照同一個對角構造；標出每一欄「跟自己作對」的那一步。\n- **紙上推演**：把停機問題證明寫成三段論並指出對角步驟；解釋「為真但不可證」為什麼不矛盾（真∈語意、可證∈語法，兩個層次）；口頭題【全書收線題】：用「同一條對角線」串起對角論證、羅素悖論、不完備、停機問題講給工程師聽。\n\n## Part VI — 回到爭論與今天（ch17–19）\n\n### ch17 — 無限戰爭：actual infinity 到底存不存在\n- **目標**：能講出「實無限 vs 潛無限」的爭論、三大基礎學派（邏輯主義/形式主義/直覺主義）各自立場；能說出為什麼工程師對直覺主義會有天然的親近感；對「我們選擇了哪套地基」有觀點。\n- **必涵蓋**：**潛無限 vs 實無限**：亞里斯多德只承認潛無限（永遠可以再加一，但沒有「完成的無限」）、康托爾堅持實無限（ℵ₀ 是一個完成的對象）——本書前 16 章全建立在實無限上，現在回頭審判它；**克羅內克**的反對（「上帝造了整數、其餘都是人造的」照 landscape）與對康托爾的打壓；三大學派：**邏輯主義**（弗雷格/羅素，數學化約到邏輯，被羅素悖論重創）、**形式主義**（希爾伯特，數學是符號遊戲、只要一致就合法，被哥德爾第二定理重創）、**直覺主義/構造主義**（布勞威爾，只承認能構造的對象、**拒絕排中律**用在無限上、拒絕非構造存在證明）；希爾伯特的宣言「**沒有人能把我們逐出康托爾為我們創造的樂園**」（1926《論無限》，照 landscape）；**工程師為什麼天然親近構造主義**：你要的是演算法不是存在保證（呼應 ch05 超越數、ch12 AC、ch16 可計算）——構造主義數學≈「只承認可計算的東西」，這正是你的世界觀；現代結局：主流數學接受 ZFC＋實無限（康托爾贏了實用），但構造主義在型別論/證明助手（Coq/Lean/Agda）裡復活、且和電腦科學最親（照 landscape，taste 不展開）；本書的誠實立場：我們玩的是 ZFC 這套遊戲、它好用、但它是**選擇**不是天啟。\n- **不涵蓋**：各學派的技術細節與現代證明論；型別論系統（一句話＋延伸閱讀）；數學哲學全景。\n- **橋接**：**構造性存在 vs 純存在**＝你要 `pick()` 的實作 vs 只被告知「存在一個」；排中律在無限上的爭議＝「不是 true 就是 false」對無限對象不一定給得出見證；證明助手（Lean/Coq）用構造邏輯＝把「證明」變成「程式」（Curry–Howard 一句話）。\n- **Worked example**：對「存在無理數 a,b 使 a^b 有理」的經典非構造證明（√2^√2 有理則取它、無理則取 (√2^√2)^√2=2）走一遍，標出「我們證明了存在卻沒說是哪一對」——一個直覺主義者為什麼不滿意這個證明，以及構造版長什麼樣（給出可構造的具體例子如 √2^(2log₂3)）。\n- **紙上推演**：把上面的非構造證明指出「排中律用在哪一步」；解釋潛無限和實無限的差別用希爾伯特旅館（旅館是潛無限的？還是實無限的？）；口頭題：身為工程師，你站康托爾還是布勞威爾這邊？說出能站得住的理由。\n\n### ch18 — 技術棧裡的無限：可數性、對角線與不可判定\n- **目標**：能在自己的日常工具與概念裡指認出集合論（不是類比、是字面同一件事）；把全書橋接收成一張總表；理解可計算性的邊界就是集合論的可數/不可數邊界。\n- **必涵蓋**：總盤點開場：全書橋接回收成一張對照表（一一對應＝無碰撞 hash／可數＝可列舉 generator／配對函數＝composite key 編碼／對角論證＝停機問題／冪集＝bitmask 組態爆炸／AC＝非構造選擇器／非可測集＝不能定義的守恆量／獨立性＝未定義行為／不完備＝沒有萬能靜態分析器）；**可數 vs 不可數的計算意義**：程式是有限字串⇒**程式可數**（ℵ₀），但「ℕ→{0,1} 的函數」不可數（𝔠）⇒**幾乎所有函數都不可計算**（存在但寫不出，呼應 ch05 超越數「幾乎全部」、ch12 非構造）——這是可計算性最深的一句話；**對角線家族在 CS**：停機問題（ch16）、Rice 定理、不可壓縮字串（Kolmogorov，一句話）、型別系統的不可判定片段——全是對角論證的後代；**可數可加性與機率**：為什麼機率要 σ-代數、為什麼可數可加而非任意可加（接 ch13 非可測、《馴服隨機》）；**序列化/編碼**：Gödel numbering＝把結構編成數＝你天天做的 serialize；收尾：你不是要「去用」集合論，可計算性、型別、機率測度的邊界**本來就是**康托爾畫的那條可數/不可數線。\n- **不涵蓋**：可計算性理論系統教學（只取對角線家族）；複雜度理論（一句話）；測度論（《馴服隨機》）；任何新集合論概念（本章只回收）。\n- **橋接**：本章整章就是橋——每節從讀者的真實工具（generator、hash、type checker、機率函式庫、serializer）反向走回集合論。\n- **Worked example**：證明「程式可數但函數不可數⇒存在不可計算函數」：程式＝有限字母表上的有限字串⇒可數（給列舉）、ℕ→{0,1} 不可數（ch04 對角線）⇒ 一一對應不可能⇒幾乎所有函數沒有對應程式；對一個具體的「對角不可計算函數」給構造（用停機問題的對角線定義 f(n)=「第 n 個程式對輸入 n 不停機則 1 否則 0」，論證它不可計算）。\n- **紙上推演**：論證「所有可能的正規表達式可數、但所有語言不可數⇒有語言無法被任何正則/程式描述」；把一個你用過的工具（type checker／序列化／hash）對應到本書一個概念並說明是字面同一件事；口頭題：為什麼「幾乎所有函數都不可計算」卻不影響你寫程式？\n\n### ch19 — 總收官：我們學會了怎麼比較無限\n- **目標**：把全書收進一條能口頭講完的故事線；用六條驗收目標當口試題完成總自我檢核；知道讀完之後往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**「比較無限」的本質**：人類沒有「理解」無限的形上學本質——而是把「**一樣多**」操作化成一一對應，於是無限能被丈量、分級、做算術（呼應書架《馴服無限》把無限操作化成極限——兩本書是同一種勝利的兩個方向：一個馴服「無限小/逼近」、一個馴服「無限大/多少」）；脊椎收束：ℕ 這把尺 → 對角線造出第一個數不完的集合 → 冪集定理證明無限無頂 → 公理擋住悖論 → CH 獨立、不完備收線——**同一條對角線從第一道裂縫一路走到數學的自我極限**；**口試總驗收**：六條驗收目標各出一題口頭題＋每題「模範答案要點清單」（檢核表式，不是逐字稿）；康托爾的結局與平反（生前被打壓、希爾伯特/羅素為他辯護、今日集合論是數學共同地基，照 landscape）——一個「先被當瘋子、後成地基」的思想史樣本；下一步地圖：往邏輯/可計算走（對角線家族）、往基礎走（公理集合論/型別論）、往欣賞走（數學史與哲學）——對應附錄 C。\n- **不涵蓋**：任何新概念/新證明；「補完所有遺漏」的誘惑（明寫刻意留下的洞：描述集合論、大基數、模型論、範疇論基礎——以及為什麼留）。\n- **橋接**：回到 ch01 的你——當時覺得「無限就是無限、哪有大小」，現在你能證明不只一種無限、還能說出哪條對角線困住了數學自己；成長的具體對照。\n- **Worked example**：「怎麼比較無限」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞：配對／可數／對角線／冪集／悖論／公理／獨立／不完備）。\n- **紙上推演**：六條口試題正式作答（口頭、各 3–5 分鐘，對照要點清單自評）；給「無限就是無限，沒有大小之分」這句話寫一段反駁（200 字內）；一年後重讀清單：哪三章值得重讀、各自觸發條件（遇到什麼場景）。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 記號與讀法速查表\n全書記號總表：寫法、怎麼唸出來（口頭講解用——本書驗收靠口述，每個記號都要能唸：ℵ₀ 唸「aleph-null」、𝔠 唸「continuum/c」、ω 唸「omega」、𝒫 唸「power set」、↔ 唸「一一對應於」…）、白話意義、首次出現章。從各章實際用過的記號 grep 彙整，不得收錄書中沒出現的記號。\n\n### 附錄 B — 術語表\nEN–ZH–一句話定義–首次出現章。同樣從實際內容萃取（bijection/countable/uncountable/cardinal/ordinal/power set/well-order/transfinite/axiom of choice/continuum hypothesis/independence/incompleteness…）。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源（影片、書、課程），分三條路線（往邏輯與可計算／往基礎與公理／往欣賞與哲學），給出「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。候選：Hilbert《論無限》、康托爾傳記（Dauben）、Halmos《Naive Set Theory》、Enderton《Elements of Set Theory》、Smullyan 邏輯謎題、Veritasium/Numberphile 對角論證與無限影片（連結照 landscape 驗證）。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-shepherds-pairing.md、ch02-hilberts-hotel.md、ch03-rationals-countable.md、ch04-diagonal-argument.md、ch05-the-continuum.md、ch06-power-set-theorem.md、ch07-cardinals-and-csb.md、ch08-ordinals.md、ch09-transfinite-induction.md、ch10-russells-paradox.md、ch11-zfc.md、ch12-axiom-of-choice.md、ch13-banach-tarski.md、ch14-continuum-hypothesis.md、ch15-independence.md、ch16-incompleteness.md、ch17-infinity-wars.md、ch18-infinity-in-your-stack.md、ch19-finale.md；\n附錄 appendix-a-notation.md、appendix-b-glossary.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《不只一種無限：集合論與無限的直覺與驚嘆》。最終書名於 outline gate 由作者定案，撰章時以工作名為準。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的書。目標是讓讀者親身感受人類如何學會**比較無限**——看懂集合論不是一堆 ∈、∪、∩ 的符號操作，而是「先把『一樣多』講清楚、再用它去丈量無限」這一連串驚心動魄的發現；讀完有「人類竟然想得出這個、而且竟然證得出無限有大小」的震撼，**而且能用自己的話對另一個工程師講清楚震撼在哪**。\n- **不是**：\n  - 不是考試解題訓練——不刷集合代數習題、不背公理表、不出符號操練題。\n  - 不是嚴格公理化教科書——ZFC 公理在 ch11 當「故事」講（為什麼需要這條、它擋掉什麼），不是逐條形式推導；證明只保留「短而致命」的骨架（對角論證、Cantor 定理、CSB、羅素悖論），長證明明說「本書不證、指向何處」。\n  - 不是轉職用書——純興趣，不服務 AI Infra 敘事；但工程橋接要讓它讀起來像母語，不是教科書的外語。集合論與**可計算性**的血緣（對角論證＝停機問題、可數＝可列舉）是本書最划算的橋，要用滿但不喧賓奪主。\n- 驗收標準（全書的六條主線，ch19 總收官逐條口試）：\n  1. 「一樣多」的真正定義是什麼（**一一對應 bijection**），為什麼它比「數出來」更基本、能用在無限上。\n  2. 為什麼無限**不只一種**——可數（ℵ₀）與不可數（𝔠）的分界，對角論證怎麼證的。\n  3. 冪集定理：為什麼**沒有最大的無限**，無限有無窮多級。\n  4. 為什麼天真集合論會自爆（羅素悖論），ZFC 與選擇公理怎麼重建地基、又付出什麼代價（Banach–Tarski）。\n  5. 連續統假設為什麼「**沒有答案**」——獨立性是什麼意思，哥德爾與科恩各證明了什麼。\n  6. 這一切怎麼活在計算裡——對角論證＝停機問題、可數＝可列舉、無限的分級就是可計算性與機率測度的邊界。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js），政大資科所選修過演算法與機器學習、淡江資工學士。可直接當橋接錨點的經歷與直覺：\n\n- 資料結構與演算法直覺：hash（碰撞、rehash、load factor）、generator/iterator、序列化、複合鍵（composite key）、雜湊把 (a,b) 編碼成一個鍵。\n- 分散式與後端：partition/shard 的代表元選取、leader election、idempotency、最終一致性、SQL 查詢（含自我參照與無 WHERE 的災難）。\n- 形式化方法：書架上有兩本 TLA+ 書（量詞 ∀∃、否定推移、不變式、liveness 的 ranking function、spec 即公理）——ch09 超限歸納、ch11 ZFC、ch16 不完備可**引用但不得依賴**。\n- 可計算性的零星概念：可能聽過停機問題與「不可判定」，但沒推過——本書把對角論證一路帶到停機問題，等於替他補上這條線。\n- 數值與機率直覺：書架上有《馴服隨機》（機率即面積、可數可加性）與《馴服無限》（極限、ℝ 的構造、0.999…=1）。\n\n**不需要解釋**（讀者已精通）：函數／映射的概念、單射/滿射的工程版（不重不漏）、集合的基本記號 ∈ ∪ ∩ ⊆、hash、generator、遞迴、歸納法（結構歸納）、二元編碼。\n\n**快速複習即可**（看過但生鏽）：基數/序數差別（多半沒分清楚）、ℝ 與 ℚ 的關係、|x| 與區間記號、極限（指向《馴服無限》）。\n\n**要從零教**（本書主體）：一一對應作為「一樣多」的定義、可數與不可數、對角論證、連續統與冪集定理、基數/序數算術、良序與超限歸納、羅素悖論與 ZFC、選擇公理與 Banach–Tarski、連續統假設與獨立性、哥德爾不完備、無限的哲學爭論。\n\n**跨書邊界（必須指向、不得重教）**：\n- ℝ 從 ℚ 的構造（Dedekind 切割、Cauchy 序列）、ε-δ、0.999…=1 的三種論證 → **《馴服無限》ch03/ch14**。本書用到 ℝ 的完備性時一句話帶過並指向。\n- 可數可加性、σ-代數為何要限制、機率即面積 → **《馴服隨機》**。ch13 非可測集只講「為何不能給每個集合一個體積」，測度論本身指向機率書。\n- 量詞 ∀∃ 的攻防、形式化證明觀、spec 即公理、ranking function → **TLA+ 兩書**。\n- 向量空間都有基底（選擇公理的應用）→ **《矩陣是動詞》**，一句話帶過。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。數學名詞中英並用：第一次出現給「中文（English）」，之後可只用中文——一一對應（bijection）、單射（injection）、滿射（surjection）、可數（countable）、不可數（uncountable）、基數（cardinality／cardinal）、序數（ordinal）、冪集（power set）、良序（well-order）、超限（transfinite）、公理（axiom）、獨立性（independence）、不可判定（undecidable）。\n- 人名用通行中譯＋原文，第一次出現附原文，之後用中譯：康托爾（Cantor）、戴德金（Dedekind）、希爾伯特（Hilbert）、羅素（Russell）、弗雷格（Frege）、策梅洛（Zermelo）、弗蘭克爾（Fraenkel）、哥德爾（Gödel）、科恩（Cohen）、伽利略（Galileo）、克羅內克（Kronecker）、布勞威爾（Brouwer）、佐恩（Zorn）、巴拿赫（Banach）、塔斯基（Tarski）、圖靈（Turing）。\n- 台灣用語基準：函數（不用「函式」於數學脈絡）、集合、映射、一一對應（不用「雙射」當主詞，但首次可註「bijection，亦譯雙射」）、基數/勢（以「基數」為主、首次註「亦稱勢 cardinality」）。**禁止簡體中文詞彙**（这/们/个/软/应/实/发/经/时/间/关/见/现/对/标/题/类/变/简/论/节/边/过/还/进/运/层/会/图/测/觉/译/选/优/构…等，lint 會逐字元掃）。\n- 第二人稱「你」直接對讀者說話。\n\n## 數學記號規範（全書一致，附錄 A 是速查表；閱讀器不渲染 LaTeX，一律純文字）\n\n- **集合與映射**：∈ ∉ ⊆ ⊊ ∪ ∩ ∅ ℕ ℤ ℚ ℝ ℂ；映射 f: A → B；一一對應寫 `A ↔ B`（存在 bijection）或 `f: A → B 為一一對應`。\n- **基數記號**：集合 A 的基數寫 `|A|`；ℵ₀（aleph-null）＝ |ℕ|；𝔠（fraktur c，連續統）＝ |ℝ|；冪集 `𝒫(A)`；`2^|A|` ＝ |𝒫(A)|。比較大小寫 `|A| = |B|`、`|A| < |B|`、`|A| ≤ |B|`。\n- **序數記號**：ω（小寫 omega，第一個無限序數）；ω+1、ω·2、ω²、ω^ω、ε₀；序型寫「order type」。**0 的約定**：序數脈絡（ch08 起）採 von Neumann 慣例 ω = {0,1,2,…}，明說與前面「點名用 1,2,3」是同一個 ℕ、|ℕ|=ℵ₀ 不變（見基準表「ℕ 的約定」）。\n- **對角論證的標準排版**：把「一列東西」寫成一張表（第 n 列 = 第 n 個被列舉的對象，逐位列出），對角線元素標出來、再「每一位都改掉」造出新對象——用 ```text 區塊畫表，對角線用註記指出。這是全書脊椎視覺，ch04/ch06/ch16 共用同一張表的變形。\n- **連續統假設**寫 `CH：2^ℵ₀ = ℵ₁`（即 𝔠 = ℵ₁，ℵ₀ 與 𝔠 之間沒有別的基數）；GCH 寫 `2^ℵₐ = ℵₐ₊₁`。\n- **多行推導／證明骨架**放在 ```text 圍欄區塊裡，每步右側可加「← 為什麼」短註。禁止把長推導硬塞進行內。\n- 不依賴 Unicode 罕見字渲染失敗時的備援：ℵ 若顯示有疑慮，行內可寫 `aleph-0`，但正文統一用 ℵ₀（閱讀器 Apple 平台字型可顯示，已驗證 calc/prob 書使用 ∫ Σ 等同級字元無虞）。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描 lint_book.py 會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章（ch01、ch04、ch07、ch10、ch14、ch17）在 blockquote 後放全書 ASCII 路線圖（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的工程實戰上，要具體（hash 一一對應、generator 可列舉、composite key 編碼、partition 代表元、SQL 自我參照、TLA+ spec/ranking function、停機問題），不要泛泛而談。\n3. 核心內容（多個 `##` section，深入直覺與機制）。歷史敘事與數學內容交織，但**歷史服務於數學直覺**，不是編年史。\n4. `## 直覺的陷阱` — 本書招牌段落（故障視角的數學版）：這個概念**最常被誤解成什麼**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實沒懂）。用表格或條列。例：「無限＋1 還是無限，所以所有無限一樣大」「對角線造出的數早就在列表裡」「可數可加就是有限可加的無限版」「選擇公理顯然成立，何必當公理」「獨立＝我們還沒證出來」——這些都是必須正面拆解的常見錯路。\n5. `## 紙上推演` — 動手做的形式（紙筆推演為主）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：手造一個一一對應、手跑一次對角論證、找出一個錯誤論證的破綻、把白話翻成集合語言、口頭重講一個證明。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。**本書純紙筆，無 Python 小實驗段**（集合論的驚嘆在論證不在數值；少數可選的「想像實驗」併入推演題即可）。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。問題對齊「能不能把這個概念講給另一個工程師聽」的深度，優先出「為什麼」而不是「是什麼」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體東西、一步一步走的完整過程（一個明確的一一對應的構造、一張對角線表的逐位構造、一次基數算術、一次序數比較、一次悖論的三段論拆解），不准跳步。outline 已為每章指定基準範例。\n- **嚴謹度的誠實標示**：每個論證明確標示自己是哪一級——「直覺版」「工程師的嚴謹：每步能口頭說出理由」「完整證明（本書唯一硬證的少數定理之一）」或「本書不證，指向 …」。**禁止「顯然」「易證」**；禁止把直覺論證偽裝成證明。對角論證、Cantor 定理、CSB（敘述＋骨架）、羅素悖論這幾個「短而致命」的證明要**完整到讀者能自己重講**。\n- **概念自我複核**：所有「構造」（一一對應、列舉、對角線、序數算式）寫章時必須自己走一遍驗證（這個對應真的不重不漏嗎？這個列舉真的每個元素都會被點到嗎？對角線真的跟每一列都不同嗎？），不得抄自記憶。跨章基準（ℵ₀、𝔠、CH 的寫法、ℕ 約定、對角線標準排版）以 outline 基準表為準。\n- **歷史事實照 landscape**：年份、歸屬、引文、軼事一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 3~8 次 web 查證）並 hedge；傳說要標明是傳說。**特別守住**：1874 不可數性證明（套疊區間法）≠ 1891 對角論證——兩者是不同證明，常被混為一談；康托爾「我看見了卻不敢信」是 1877 給戴德金的信、講 |ℝ|=|ℝ²|；希爾伯特「沒有人能把我們逐出康托爾為我們創造的樂園」是 1926。禁止憑記憶引用「名人名言」。\n- **每個「驚嘆點」要能被重講**：本書的核心商品是震撼感。每章至少一處明確回答「這裡了不起在哪」——而且要寫到讀者能用自己的話轉述，不是堆形容詞。\n- 每個概念給「它在解什麼問題」：一一對應解什麼、對角論證解什麼、公理化解什麼、獨立性證明解什麼。禁止無動機的定義。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整（地基章 ch10/ch11/ch15 可偏厚）。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、人物、引文、書籍版本、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 數學內容（定義、定理、證明）不依賴 landscape，但必須自我複核；常被誤傳的點（1874 vs 1891、CSB 的歸屬與證明者、AC 與 well-ordering/Zorn 等價、CH 獨立性是「相對一致性」而非「證明了 CH 為假」、哥德爾不完備的精確陳述）以 landscape 查證版為準。\n- 時效性事實標時點：`（2026-06）`（本書幾乎全為穩定史實，時點標記主要用於延伸閱讀連結與少數現代計算橋接）。延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（全書地圖、對角線表、ℵ 階梯、序數的「數軸」、希爾伯特旅館的房號移位、cumulative hierarchy 的分層），必須通過 `check_diagrams.py` 檢查（CJK=2 欄寬）。對角線表是全書最重要的圖，ch04 定版、後續章照抄變形。\n- 多行數學推導/證明骨架用 ```text 區塊。表格用於基數對照、可數/不可數清單、陷阱清單、序數算術對照。\n- 跨章引用格式：`（見 ch07）`，不要寫死檔名路徑。跨書引用寫`（見《馴服無限》ch14）`。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整本書最美的一步」「對角論證是我見過最划算的一頁紙」）。不行銷、不喊口號、不堆「太神奇了」式空洞感嘆——震撼要用內容本身造成，形容詞是結果不是手段。允許冷幽默。數學不裝高深：每個符號出場都有白話直覺在旁邊；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘，因為等一下整本書都靠它」。對角論證、羅素悖論、獨立性這三處要寫到讓讀者起雞皮疙瘩，但靠的是把邏輯走清楚，不是驚嘆號。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="sets";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">不只一種無限<br><span style="font-weight:400;font-size:12px;color:var(--muted)">集合論與無限的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 不只一種無限';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
