0\n```\n\n又是 z = 2.0（這不是巧合——這個硬幣的標準差剛好是 5，跟例一的延遲一樣，所以「離平均 10」在兩個問題裡都是「2 個標準差」）。查上尾：\n\n```text\nP(X ≥ 60) ≈ P(Z ≥ 2.0) ≈ 0.0228 ≈ 2.3%\n```\n\n常態近似說：**一枚公正硬幣擲 100 次，出現 60 個以上正面，機率大約 2.3%。** 罕見，但遠不到不可能——大約每 44 次「100 擲實驗」就會碰到一次。\n\n**埋伏筆（給 ch18）。** 這裡有一個誠實的細節我必須講，因為它正是三章後假設檢定的引子。常態近似給的 2.3% 是**近似值**，因為我們拿一條連續的鐘形去蓋一個離散的二項（正面數只能是整數，沒有 59.7 個正面這種東西）。如果你不嫌麻煩，硬算精確的二項機率：\n\n```text\n精確 P(X ≥ 60) = Σ(k=60→100) C(100,k)·(1/2)¹⁰⁰ ≈ 0.0284   ← 約 2.84%\n```\n\n精確值 2.84%，常態近似 2.28%，差了半個百分點——近似低估了一點。（如果你做「連續性校正」，把邊界從 60 挪到 59.5 再標準化，z = 1.9，上尾約 2.87%，幾乎完美命中精確的 2.84%——這是個讓近似更準的小技巧，細節留延伸閱讀。）\n\n為什麼這半個百分點以後會要命？因為 ch18 要拿這個硬幣問一個尖銳的問題：「**觀察到 60/100 正面，這枚硬幣還算公正嗎？**」到時候會算「雙尾」機率——偏離 50 達到 10 以上（≥60 或 ≤40）的機率。常態近似給雙尾 ≈ 0.046，精確二項給 ≈ 0.057（這兩個數字現在先記著，basis 表裡有）。**一個在 0.05 門檻下面、一個在上面**——同一份證據，換個算法就跨過了「顯著」這條線。那一章你會親眼看到「p < 0.05」這條神聖門檻有多武斷。這一章的 2.84% vs 2.28%，就是那場戲的第一個音符。**記住這個半百分點的縫隙，ch18 見。**\n\n## 直覺的陷阱\n\n常態分布太好用、太漂亮，以至於它最大的危險就是**你會把它套到不該套的地方**。這一節的陷阱比別章更工程，因為你天天踩。\n\n| 陷阱 | 錯誤直覺 | 會在哪一步把你帶溝裡 | 怎麼自我察覺 |\n|---|---|---|---|\n| **「常態無所不在，所以我的資料也是常態」** | CLT 說鐘形普適，那我手上這堆數應該也是鐘形吧 | 你把延遲、收入、檔案大小硬當常態，用 3σ 框「正常範圍」——但這些是**長尾**的，右尾比常態胖太多，你會把一堆本該出現的大值誤判成「異常」，告警炸成雪花 | 看分布圖。如果右邊拖一條長尾、平均被少數巨值拉得遠離中位數，它就不是常態。常態的平均≈中位數，且尾巴塌得飛快 |\n| **「±2σ 就是 95%」** | 兩個標準差嘛，95%，整數好記 | 你聲稱「95% 信賴」卻用了 2.0，實際給了自己 95.45%；報出去的不確定性比你以為的鬆 | 凡是講「恰好 95%」就該用 **1.96**，不是 2。看到誰用 2.0 當 95% 臨界值，心裡警鈴要響 |\n| **「機率 0 就是不可能 / 密度高就是機率高」** | 密度那麼高，那一點的機率一定大 | 把密度當機率讀。連續分布**單點機率永遠是 0**，密度只是「機率的濃度」，機率永遠是一段**面積**不是一個高度。密度甚至可以大於 1 | 提醒自己：問的永遠是區間（落在 [a,b]）不是單點（等於某值）。要機率就去積一段面積 |\n| **「3σ 之外＝一定是異常」** | 千分之三耶，這麼罕見，肯定出事了 | 在長尾指標上，3σ 之外**本來就會頻繁出現**（胖尾巴的常態），你把正常的尾端波動當成事故，疲於奔命；反過來在常態指標上又可能漏掉真正該關心的 4σ、5σ | 先確認指標的分布長相。常態指標上 3σ 才是好告警線；長尾指標要改用百分位數（P99、P99.9）而不是 sigma |\n\n最該記住的一句，也是這一章和 ch12、ch14 共同的告誡：\n\n> **常態的尾巴塌得是平方指數級的快，這是它的祝福也是它的詛咒。** 祝福是「離平均遠＝幾乎不可能」這條乾淨規則；詛咒是你一旦把它套到尾巴更胖的真實世界（延遲、收入、市場、流量尖峰），就會系統性地、災難性地**低估極端事件**。常態不是萬物的形狀，它是「很多獨立小擾動相加」的形狀。你的資料符不符合那個前提，是你套常態之前該先問自己的第一個問題。\n\n## 紙上推演\n\n純紙筆，不准開計算機之外的東西。每題先自己算，再對解答。\n\n### 推演題一：±2σ 到底是不是 95% **[10 分鐘]** ★\n\n用 68-95-99.7 法則估「落在 ±2σ 之外」的比例，然後回答：為什麼大家做信賴區間用的是 1.96 而不是 2？把這兩個數字對應的「框進來的面積」各寫出來，說清楚差別。\n\n#### 推演解答\n\n±2σ 之內是 **95.45%**，所以**之外**是 100% − 95.45% = **4.55%**（兩條尾巴各 2.27%）。\n\n而 95% 信賴區間要的是「恰好框進 95%、之外恰好 5%（每尾 2.5%）」。±2σ 框進來的是 95.45%，**多框了 0.45%**——尾巴只剩 4.55% 而不是 5%。要讓尾巴恰好是 5%（每尾 2.5%、累積到 97.5%），對應的臨界值是 **1.96**，不是 2.0。\n\n所以：\n- **1.96σ** → 框進 95.00%（誠實的 95%）\n- **2.00σ** → 框進 95.45%（多給了自己 0.45% 的把握）\n\n用 2.0 當 95% 臨界值，等於偷偷把信賴水準調高到 95.45% 卻仍宣稱 95%——名實不符。**1.96 才是「恰好 95%」的那把尺。** 常見錯路：以為「反正差不多」。在工程上 0.45% 可能無所謂，但在「這個藥有沒有效」「這個改動是不是真的提升」這種要下結論的場合，門檻的精確性就是誠實的底線。\n\n### 推演題二：把一個工程指標標準化，判斷它多異常 **[15 分鐘]** ★★\n\n你的 API 平常每分鐘錯誤數近似常態，平均 8 個、標準差 2 個。某分鐘你看到 **14 個**錯誤。\n\n(a) 算它的 z 分數。(b) 用 68-95-99.7 估「正常情況下出現這麼多或更多錯誤」的機率。(c) 如果你的告警線設在 3σ，這次會不會觸發？(d) 一句話說明：如果錯誤數其實是長尾的（不是常態），你上面的判斷會怎麼偏。\n\n#### 推演解答\n\n**(a) 標準化：**\n\n```text\nz = (14 − 8) / 2 = 6 / 2 = 3.0\n```\n\n14 個錯誤在「平均 + 3 個標準差」的位置。\n\n**(b) 上尾機率。** ±3σ 之內是 99.73%，之外是 0.27%，平分到兩尾，**上尾 ≈ 0.135%**（約千分之一點三五）。所以在常態假設下，「正常波動跑出 14 個以上錯誤」大約千分之一的機率——相當罕見。\n\n**(c) 會觸發。** z = 3.0 剛好踩在 3σ 告警線上（≥ 3σ），觸發。這正是 3σ 告警的設計意圖：千分之三量級的罕見事件值得看一眼。\n\n**(d) 長尾的偏。** 如果錯誤數其實是長尾的（比方說錯誤常常一陣一陣地爆，相關性故障讓它們不獨立、尾巴變胖），那「正常情況下跑到 14」的真實機率會**比 0.135% 高得多**——常態的瘦尾巴低估了胖尾巴世界的極端值。結果是：你以為抓到了一個千分之一的真異常，其實它在長尾世界裡沒那麼稀奇，可能只是尾端的正常抽動。**3σ 在長尾指標上會製造假警報**，這時候該換成看 P99.9 之類的百分位數門檻，而不是 sigma。\n\n### 推演題三：口頭重講「機率即面積」 **[15 分鐘]** ★★★\n\n闔上書，對著想像中的另一個工程師（或對空氣），用你自己的話講清楚三件事，每件 1–2 分鐘：(1) 為什麼連續分布裡「單點機率是 0」但事件還是會發生；(2) 「你查 P99」跟「反查 CDF」是同一件事——怎麼同法；(3) 標準化（z 分數）在做什麼、為什麼它能讓你比較兩個量綱不同的指標。講完對照下面的要點。\n\n#### 推演解答\n\n**(1) 單點機率為 0。** 連續軸上有無窮多個點，要是每個點都給正機率，加起來會爆破 1，所以唯一自洽的安排是每個單點機率 0。但機率 0 不等於不可能——機率永遠是一段**面積**（區間），不是一個點的高度。類比：浮點數你從不寫 `x == 0.3`，你寫 `abs(x − 0.3) < eps`，因為你關心的是「落在一個小區間」不是「剛好等於」。（要點：無窮多點 → 單點必為 0 → 機率是面積不是高度 → 浮點類比。）\n\n**(2) P99 = 反查 CDF。** CDF 是一條從 0 爬到 1 的累積曲線，F(x) = 「比 x 小的機率」。查 P99 就是反過來用它：給定累積到 0.99，找出對應的門檻值 x。「正著用」是給 x 問機率，「反著用」是給機率問 x——P99 是後者。你在 Grafana 點 p99，背後就是這個反查。（要點：CDF 是累積面積曲線 → P99 是給比例反查門檻 → 跟 normalCDF 反函數同一個動作。）\n\n**(3) 標準化。** z =(x − μ)/σ，先減平均（對齊中心到 0）、再除標準差（把「一個標準差」當成新單位）。算出來的 z 是「離平均幾個標準差」，量綱被洗掉了。所以 CPU 的 z=2 和延遲的 z=2 可以直接比——它們各自離自己的平常都是 2 個身位，異常程度相同，儘管一個是 %、一個是 ms。（要點：減 μ 對齊、除 σ 換單位 → z 是純粹的「幾個身位」→ 洗掉量綱所以能跨指標比較。）\n\n如果這三段你都能不看書、不打結地講出來，這一章就過了。講不清楚的那一段，就是你還沒真懂的地方，回去重讀對應小節。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 標準化公式 z =(x − μ)/σ 的「減 μ」和「除 σ」各在做什麼？為什麼做完這兩步，所有常態就變成同一條 N(0,1)？\n2. 「機率即面積」這句話的完整意思是什麼？為什麼連續分布的單點機率必然是 0，而這跟「那個值不會發生」不矛盾？\n3. 你查 P99 延遲時，數學上在反查哪一條曲線？「給 x 問機率」和「給機率問 x」差在哪？\n4. 68-95-99.7 的精確值是哪三個數字？為什麼 ±2σ 是 95.45% 而不是 95%？「恰好 95%」對應的臨界值是多少，那個數字怎麼來的？\n5. 高斯函數 e^(−z²/2) 的尾巴衰減為什麼「特別快」？這個「快」跟長尾分布的尾巴比，差在哪？這個差別為什麼讓 3-sigma 告警在延遲指標上會失靈？\n6. 「兩個獨立常態相加還是常態」這個性質，跟 ch14 中央極限定理是什麼關係？常態在「加法宇宙」裡扮演什麼角色？\n7. 脊椎硬幣擲 100 次，正面數近似哪個常態？你怎麼用一格 68-95-99.7 就答出「落在 45 到 55 之間」的機率？\n8. 為什麼用常態近似算「100 擲 ≥60 正面」會跟精確二項差半個百分點？這個半百分點的縫隙在 ch18 會引出什麼問題？\n\n## 延伸閱讀\n\n- **《馴服無限》ch15「機率即面積」**（你的書架）——本章一路把「機率＝曲線下面積」當工具用，卻沒推導積分，也沒講高斯積分 ∫e^(−x²)dx=√π 為什麼會冒出 π。那一章把這件事用微積分講透（平方、二維積分、極座標換元——π 從圓那裡進來）。如果你想看「π 怎麼跑進機率」的完整魔術，去讀它。本章和它是同一個面積，兩種講法。\n- **《馴服無限》ch13「怪獸函數」**（你的書架）——跟本章無直接關係，但 ch22 布朗運動會把常態的增量推到連續極限，變成「處處連續處處不可微」的病態路徑，那裡會回頭接這一章。先存個書籤。\n- **3Blue1Brown,「Why π is in the normal distribution」/「But what is the Central Limit Theorem?」**（YouTube，2026-06，已查證）——視覺化講高斯積分裡的 π 從哪來、以及鐘形如何從加總中浮現。本章「π 為什麼在這裡」那段的動畫版，看完你對極座標那一步的驚嘆會更立體。\n- Wikipedia,「68–95–99.7 rule」/「1.96」/「97.5th percentile point」（2026-06，照 landscape）——查證本章三格精確值（68.27/95.45/99.73）和 1.96 = Φ⁻¹(0.975) 的精確值 1.959964（費雪 1925 表格給的就是這個）。讀「1.96」那條的歷史段，看這個數字怎麼變成全統計學的口頭禪。\n- Keith Conrad,「The Gaussian Integral」（kconrad.math.uconn.edu，2026-06，已查證）——一份只有幾頁、把 ∫e^(−x²/2)dx=√(2π) 用好幾種方法算給你看的講義。如果《馴服無限》ch15 還餵不飽你對「為什麼是 √(2π)」的好奇，這份是下一站。數學系大二程度，但寫得乾淨。\n- 預告 **ch16–ch18（抽樣、信賴區間、假設檢定）**——本章給你的 1.96、標準誤、標準化、查尾端，下面三章全部要用。民調 ±3% 是 1.96 × 標準誤、信賴區間是估計 ± 1.96σ、p 值是查尾端面積。帶著這一章的工具進 Part V，你會發現統計推論的「計算」部分，骨架全在這一章——剩下的是「這些數字到底在保證什麼、又在哪裡騙人」的哲學戰。\n"}, {"id": "ch16-sampling", "file": "ch16-sampling.md", "group": "Part V — 統計推論", "title": "ch16 — 抽樣的大膽：從 1000 人推斷兩億人", "md": "# ch16 — 抽樣的大膽：從 1000 人推斷兩億人\n\n> **本章解決什麼問題**：前面四章（ch13–15）把全書高潮交給你了——大數法則告訴你樣本平均會收斂到真值，中央極限定理告訴你它怎麼抖、抖成鐘形。但那些定理有個前提：你**已經知道**真實的機率、真實的母體長什麼樣，然後問「樣本會怎樣」。現實裡你站在反方向：你**不知道**真值，手上只有一把樣本，你得反過來從樣本猜母體。這就是統計推論（statistical inference），是 Part V 的入口，也是這本書從「機率」轉進「統計」的那道門。這一章只解決一件事，但它大到值得開一個 Part：你憑什麼敢只看一小撮、就對你沒看過的整體下結論？答案藏在一個你天天在用、卻可能沒想過它有多神奇的動作——隨機抽樣。\n\n```\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理         ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽 ◄你在這裡  ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n## 從你已知的出發\n\n你其實一輩子沒「看過全部」過。\n\n你估一支 API 的錯誤率，不是把這個月的幾億筆 log 一行行讀完。你開 sampling，每 100 筆抽 1 筆，或乾脆只看過去一小時。你算出 0.3%，就拿這 0.3% 當「整體的錯誤率」在報、設 alert 閾值、跟 PM 解釋。你篤定到根本不覺得這是個大膽的舉動。\n\n容量規劃也是。你不可能真的把雙十一全量打給線上系統試試看——那叫事故不叫壓測。你開壓測環境灌一段**有限**的合成流量，看 P99 在哪裡崩，就敢簽「這套系統撐得住 X QPS」。拿一個親眼看過的小場景，推斷一個沒看過、賭不起的大場景。\n\n金絲雀部署更直接。新版本先放 1% 流量進去——而且最好是**隨機**挑的 1%，不是「先給內部員工」也不是「先給某區域」。看那 1% 有沒有變糟，沒事再放大到 100%。你等於是說：這隨機的 1% 怎麼樣，全量大概就會怎麼樣。\n\n這三件事——抽樣監控、壓測、金絲雀——背後是同一個信念，而這就是這一章的全部：**你可以只看一小部分，就對沒看過的整體下一個有誠實誤差界的結論，前提是那一小部分是隨機抽的。** 統計學把這個動作正式化、把「誤差界」算出來，並告訴你它什麼時候會整碗端走騙你。\n\n這一章我們把這件你天天做的事翻過來看它的內臟。三個問題：母體跟樣本到底什麼關係、為什麼「隨機」才是魔法來源（而不是「樣本要長得像母體」）、還有全章最反直覺的一句話——**你問 1000 個人估全美國，跟問 1000 個人估你家社區，誤差幾乎一樣大。** 人口是兩億還是兩萬，幾乎不影響你需要的樣本數。第一次聽到的人沒有不皺眉的，我們會把它算到你心服口服。\n\n## 母體與樣本：你想知道的，和你看得到的\n\n先把四個詞釘死，因為接下來整個 Part V 都在這四個詞之間繞。\n\n**母體（population）**：你真正想知道的那個整體。全美國的選民、這個月所有的 API 請求、線上系統能承受的全部負載情境。它通常大到你看不完，有時候根本是個抽象的「所有可能發生的請求」——理論上無窮多。\n\n**樣本（sample）**：你實際拿到手、看得見的那一小撮。1000 個受訪者、抽出來的那 10000 筆 log、壓測打進去的那幾百萬個請求。\n\n**參數（parameter）**：母體的某個你想知道的數字。全美國支持某候選人的**真實**比例 p、這個月**真實**的整體錯誤率。參數是**固定的常數**——它就是那個值，只是你不知道。這點之後會反覆咬你，先記著：真值不是隨機的，它只是未知。\n\n**統計量（statistic）**：你從樣本算出來、用來猜參數的數字。樣本裡的支持比例 p̂（讀作 p-hat，全書統一這個寫法）、樣本裡算出的錯誤率。統計量是你**看得到**的，但它是**隨機的**——換一批樣本就換一個值。\n\n```text\n母體（你想知道，看不完）          樣本（你看得到，一小撮）\n   參數 p（固定常數，未知）  ──抽樣──►  統計量 p̂（隨機，算得出）\n   「真實支持率到底是多少」        「這 1000 人裡支持的比例」\n                          ◄──推斷──\n                          （拿 p̂ 反猜 p，這是 ch17 的事）\n```\n\n整個統計推論就是這張圖右下那條虛線箭頭：**拿你看得到的 p̂，反過來猜你看不到的 p。** ch13–15 走的是上面那條實線箭頭（已知 p，問 p̂ 會怎樣）；從這一章起我們全程逆流而上。\n\n這裡有個容易滑過去、卻是整章樞紐的觀念，我要單獨拉出來講：**p̂ 是一個隨機變數。**\n\n你算出來的「這 1000 人裡 52% 支持」，那個 52% 不是天上掉下來的鐵板一塊。它取決於你**剛好**抽到哪 1000 個人——換一組 1000 人，你會算出 51%、53%、或 49.5%。p̂ 每次都不一樣，它在跳。一個每次呼叫回傳不同值、但有固定行為剖面的東西——這不就是 ch07 講的隨機變數嗎？對，p̂ 就是一個隨機變數。\n\n於是一個關鍵問題冒出來：p̂ 這個隨機變數，它的分布長什麼樣？它平均會落在哪、會抖多大？這個分布有個專門的名字，是整個統計推論的引擎。\n\n## 抽樣分布：統計量自己也是一個隨機變數\n\n**抽樣分布（sampling distribution）**：一個統計量（比如 p̂）在「重複抽樣」之下的機率分布。\n\n這個概念第一次碰到會有點暈，因為它套了一層。我把它拆成一個想像實驗，用脊椎硬幣來做——**對，就是 ch01 那枚公正硬幣**，真實正面機率 p = 0.5，我們現在假裝不知道，要靠抽樣去估它。\n\n想像你這樣做：\n\n```text\n第 1 把：擲 100 次硬幣，數正面 → 比如 53 個正面，p̂₁ = 0.53\n第 2 把：再擲 100 次，重新數      → 比如 48 個正面，p̂₂ = 0.48\n第 3 把：再擲 100 次              → 比如 51 個正面，p̂₃ = 0.51\n   ⋮      （每一把都是一個全新的 n=100 樣本）\n第 k 把：⋯\n```\n\n每一把給你一個 p̂。把這成千上萬個 p̂ 全部畫成一張直方圖——**這張直方圖就是 p̂ 的抽樣分布。** 它不是某一次的結果，是「如果你重複抽很多很多次，p̂ 會怎麼散開」的全貌。（純想像實驗，不寫程式碼；本書全程紙筆推演，你心裡擲一萬把就好。）\n\n那這張圖長什麼樣？這就是前面四章的伏筆要回收的地方，而且回收得非常乾淨：\n\n**第一，它的中心在哪？** 在 p = 0.5。因為每一把的 p̂ 期望值就是真實的 p（樣本比例平均而言不偏不倚地對準真值，這叫不偏估計，unbiased，ch17 細講）。這是大數法則在背後撐著（見 ch13）：樣本比例會往真實機率收斂。\n\n**第二，它抖多大？** 這就是 ch09 那條 √n 法則（見 ch09）在回收。一次擲硬幣是伯努利隨機變數，變異數 p(1−p) = 0.5×0.5 = 0.25。n 個獨立的平均，標準差會被 √n 稀釋：\n\n```text\np̂ 的標準差 = √( p(1−p) / n )\n           = √( 0.25 / 100 )\n           = √0.0025\n           = 0.05               ← 這個數有個專名：標準誤\n```\n\n這個 0.05 太重要了，它有專屬名稱：**標準誤（standard error, SE）**。它就是「統計量這個隨機變數的標準差」——注意它跟一般標準差不是兩種東西，它**就是**標準差，只是特指「某個統計量在重複抽樣下的標準差」。標準誤是整個 Part V 的主角數字。\n\n**第三，它是什麼形狀？** 鐘形。常態。這是中央極限定理在回收（見 ch14）：p̂ 本質上是 100 個 0/1 結果的平均，「大量獨立隨機量的平均」永遠趨向常態，不管原本那些 0/1 長得多不像鐘形。所以：\n\n```text\np̂ ~ N( 0.5 , 0.05² )      ← 中心 0.5、標準誤 0.05 的常態\n   = N( 0.5 , 0.0025 )\n```\n\n把這個分布畫出來，配上 ch15 的 68-95-99.7 法則（見 ch15），你立刻知道一把 100 次的硬幣抽樣會散成什麼樣：\n\n```text\n              p̂ 的抽樣分布  N(0.5, 0.05²)\n                       ▒▒▒\n                     ▒▒▒▒▒▒▒\n                   ▒▒▒▒▒▒▒▒▒▒▒\n                 ░░▒▒▒▒▒▒▒▒▒▒▒░░\n              ░░░░░▒▒▒▒▒▒▒▒▒▒▒░░░░░\n          ────┴────┴────┴────┴────┴────┴────┴──► p̂\n            0.40 0.45 0.50 0.55 0.60\n              │    │    │    │    │\n             −2SE −1SE  p  +1SE +2SE\n\n  ±1 標準誤（0.45 ~ 0.55）：約 68.27% 的樣本落在這\n  ±2 標準誤（0.40 ~ 0.60）：約 95.45% 的樣本落在這\n```\n\n讀一遍這張圖你就懂了一件很實際的事：用 100 次硬幣去估「正面機率」，你大約有 95% 的把握，算出來的 p̂ 落在真值 ±0.10 之內（0.40 到 0.60）——單把 100 次的估計，誤差可能高達 ±10 個百分點。想更準？√n 法則告訴你怎麼換：n 變大、標準誤縮小，但縮得很慢——這是下一節那個反直覺結論的引擎。\n\n先把這一節的驚嘆點講白：**統計量自己是個隨機變數，而它的分布——落在哪、抖多大、什麼形狀——完全被 ch13–15 那三條定理鎖死了。** 大數法則管中心、√n 管寬度、中央極限管形狀。你不是在黑暗裡瞎猜「我的樣本準不準」，你**精確地知道**自己會錯多少、以什麼形狀錯。這就是統計推論敢這麼大膽的底氣——不是賭運氣好，是它把自己會犯的錯算得清清楚楚。\n\n## 為什麼樣本大小比母體大小重要得多\n\n現在進這一章最反直覺的一頁，我認為這是整個 Part V 最容易讓工程師當場「蛤？」出聲的地方。\n\n問題是這樣的：一份全國民調問 1000 個人，宣稱誤差 ±3%，而美國有大約 2 億選民。直覺上你會想——才問 1000 個就要代表 2 億人？那是二十萬分之一，太囂張了吧。如果母體只有 200 萬（某個城市），問 1000 個是千分之一，**比例上多抽了一百倍**，那準度應該高很多吧？\n\n不對。誤差幾乎一模一樣。我們來算。\n\n抽樣比例 p̂ 的標準誤是：\n\n```text\nSE = √( p(1−p) / n )\n```\n\n你盯著這條公式看——**裡面有母體大小 N 嗎？沒有。** 只有 n（樣本大小）和 p（比例）。母體有多大，根本沒進到這條式子裡。\n\n民調 ±3% 是怎麼來的（這是全書基準，ch17 完整推）：取 p = 0.5（最保守，這時 p(1−p)=0.25 最大），n = 1000，95% 信賴用 1.96 個標準誤：\n\n```text\nSE      = √( 0.25 / 1000 ) = √0.00025 = 0.015811…\n半寬   = 1.96 × 0.015811   = 0.030990…  ≈ ±3.1%\n```\n\n這個 ±3.1% 就是你在新聞上看到的「±3%」。它只跟 n=1000 有關。全美國 2 億人也好、某城市 200 萬人也好，這條式子算出來都是 ±3.1%。\n\n「可是直覺上比例不一樣啊！」——直覺要的那個「母體大小有差」，其實是有的，它叫**有限母體校正（finite population correction, FPC）**，但它小到幾乎看不見。完整的標準誤是：\n\n```text\nSE = √( p(1−p) / n ) × √( (N − n) / (N − 1) )\n                        └──── 這就是有限母體校正項 ────┘\n```\n\n那個校正項是個小於 1 的數，它會把標準誤稍微壓小一點（樣本佔母體越大、壓越多）。我們把三種母體大小代進去看：\n\n```text\nN = 2 億（2×10⁸），n=1000：\n   校正項 = √( (2×10⁸ − 1000) / (2×10⁸ − 1) ) = 0.999998\n   半寬  = 3.099% × 0.999998 ≈ 3.099%      ← 幾乎沒動\n\nN = 200 萬（2×10⁶），n=1000：\n   校正項 = √( (2×10⁶ − 1000) / (2×10⁶ − 1) ) = 0.999750\n   半寬  = 3.099% × 0.999750 ≈ 3.098%      ← 還是幾乎沒動\n\nN = 1 萬，n=1000（樣本佔了母體 10%！）：\n   校正項 = √( (10⁴ − 1000) / (10⁴ − 1) ) = 0.94873\n   半寬  = 3.099% × 0.94873 ≈ 2.940%       ← 這才看得出差別\n```\n\n看懂這張表你就懂了整件事。母體從 2 億掉到 200 萬——縮了 100 倍——校正項從 0.999998 變 0.999750，第四位小數才動；直覺以為的「母體小一百倍應該準很多」，一點感覺都沒有。只有當樣本**佔了母體相當大一塊**（這裡 1000 佔 1 萬的 10%），校正項才真的咬下去（0.949），讓誤差小一點點。\n\n> **直覺糾正**：抽樣的準度幾乎只看你**舀了多少水**（樣本大小 n），不看**那鍋湯有多大**（母體大小 N）。除非那一瓢佔了整鍋湯的可觀比例（粗略超過 5%），否則母體大小可以當不存在。\n\n為什麼？煮一大鍋湯要嚐鹹淡，你會**先攪勻**再舀一湯匙嚐——那一湯匙準不準，取決於湯匙多大和有沒有攪勻，跟那鍋湯是一公升還是一噸毫無關係。攪勻，就是隨機抽樣。\n\n這就是統計學最大膽也最美的一件事，現在你能用自己的話講給另一個工程師聽了：**你不需要看完母體，甚至不需要看母體的一個固定比例。1000 個隨機樣本估兩億人，跟估兩萬人，一樣準。** 規模不是問題，攪勻才是問題。這也是抽樣監控划算的原因：流量翻 10 倍，你不用把抽樣量也翻 10 倍——只要絕對抽樣筆數 n 夠大，誤差就夠小（前提一樣是隨機抽，別只抽某台機器、某時段）。\n\n## 隨機的魔法：代表性不靠「長得像」，靠「隨機」\n\n上一節那鍋湯，全部關鍵字在「攪勻」。現在我要把這件事的份量講到位，因為它是整章——甚至整個統計推論——的命脈，而且它違反幾乎所有人的第一直覺。\n\n你問一個沒學過統計的聰明人：「怎麼讓 1000 人代表兩億人？」他十之八九會說：「要挑得有代表性啊。照母體的男女比、年齡比、城鄉比去湊 1000 個人，讓樣本的組成**長得像**母體。」\n\n這個直覺——「代表性 = 樣本長得像母體」——聽起來無懈可擊，但它其實是錯的，至少是危險的。真正讓樣本能代表母體的，**不是它長得像母體，而是它是隨機抽出來的。**\n\n差別在哪？「照比例湊」這個動作，只能照你**想得到、量得到**的那幾個維度去湊——性別、年齡、地區。但母體在無數個你**沒想到、甚至沒法量**的維度上也有結構：政治冷感程度、生活作息、會不會接陌生來電、對某議題的隱性態度⋯⋯你照三個維度湊得再像，剩下那無窮多個維度你完全沒控制。而其中某一個，很可能正好跟你要估的東西高度相關，於是你的「代表性樣本」在那個維度上系統性偏掉，你還渾然不覺——因為你根本沒在看那個維度。\n\n隨機抽樣的魔法就在這裡：**它不挑任何維度，所以它在「每一個」維度上——包括你沒想到的、量不到的全部維度——都自動趨於平衡。** 你不需要知道母體有哪些隱藏結構，隨機化替你一次擺平所有結構。這就是 ch10 那條線的高潮回收（見 ch10）：隨機化斬斷選擇偏誤、斬斷 confounder。你刻意挑選，就是用你的偏好（或無知）給樣本注入結構；你隨機抽，就是拒絕注入任何結構，讓母體的真實結構**按它本來的比例**自己流進樣本。\n\n這也正是 A/B test 為什麼非得隨機分組不可（A/B 與因果的完整故事見 ch19）。你把使用者**隨機**丟進 A 組 B 組，不是因為隨機聽起來比較公平——是因為隨機化讓兩組在**所有**你想得到和想不到的維度上都自動相等（年齡、裝置、網速、心情⋯⋯全部），於是兩組之間**唯一**系統性的差別，就只剩你刻意施加的那個改動。差別只剩一個，因果就可推斷了。你花錢買隨機分組，買到的其實是「因果可推斷」這個極其昂貴的東西——confounder 被隨機化一次清空。\n\n> **這裡了不起在哪**（請你能轉述）：你以為要讓小樣本代表大母體，得很費力地把樣本「設計得像」母體。恰恰相反——你越動手設計，越容易把自己的偏見偷渡進去。真正的代表性來自**放手**：擲骰子決定抽誰、親手放棄所有控制權，反而換來在無窮多個維度上的自動平衡。把控制權交給隨機，是你能對一個不了解其全貌的母體做的最聰明的一件事。\n\n聽起來太好了，好到該起疑。沒錯，代價是：你**真的**得做到隨機，而「真的隨機」比你想的難非常多。下一節兩個真實故事，是這一章的故障視角，也是史上最貴的兩堂統計課。\n\n## 兩場經典翻車：抽樣偏誤怎麼把人活活騙死\n\n### 1936 年：問了兩百四十萬人，還是錯得一塌糊塗\n\n1936 年美國總統大選，羅斯福（Roosevelt）對上共和黨的蘭登（Landon）。當時最權威的民調來自《文學文摘》（*Literary Digest*）——這本雜誌過去幾屆都猜對，信譽卓著。\n\n這次他們玩很大：寄出**大約一千萬份**問卷，回收了**大約兩百四十萬份**。兩百四十萬！這在當時是史上最大規模的民調之一。樣本大成這樣，還能錯到哪去？\n\n他們的預測：蘭登 57%、羅斯福 43%，蘭登大勝。\n\n實際結果：羅斯福 62%、蘭登 38%。羅斯福不是贏，是輾壓——拿下 48 州裡的 46 州。《文學文摘》的預測偏了將近 19 個百分點，是大型民調史上最離譜的一次。這份雜誌的信譽碎了一地，沒幾年就停刊了。（事實照 landscape 與 2026-06 web 查證。）\n\n兩百四十萬份樣本怎麼會錯得這麼慘？這就是上一節那句話的血淋淋反證：**樣本大小救不了你，如果你的抽樣根本不是隨機的。** 《文學文摘》的問卷名單從哪來？汽車登記資料和電話簿。1936 年是經濟大蕭條的尾巴，那個年代**買得起車、裝得起電話的人**，是社會裡相對有錢的一群——而有錢人那年明顯更偏向共和黨的蘭登。\n\n他們的樣本框（sampling frame，你能接觸到的那群人）從根上就偏了。窮人——大蕭條裡更可能投給推新政的羅斯福的那一大群人——根本不在名單上，再大的樣本也抽不到他們。雪上加霜的是**無回應偏誤（non-response bias）**：寄出一千萬、只回兩百四十萬，那願意花力氣填問卷寄回去的兩成多人，本身又是另一層自我篩選，跟沉默的多數系統性不同。\n\n偏誤（bias）和變異（variance）是兩種完全不同的錯，這是工程師最該帶走的一句話。把樣本變大，只能壓低**變異**（√n 法則，樣本越大估計越穩）；它對**偏誤**一點辦法都沒有。偏誤是「你的瞄準鏡裝歪了」——打一槍偏、打一萬槍還是全部往同一邊偏，而且因為彈著點很集中，你會更**自信**地相信那個錯誤的中心。《文學文摘》就是拿著兩百四十萬發子彈，極其精準、極其自信地打在了錯誤的靶心上。\n\n對照組很諷刺：那一年有個叫蓋洛普（George Gallup）的廣告人，只用**大約五萬份**規矩的隨機樣本就猜中羅斯福贏；更秀的是，他事先用一個**只有三千人**、但從《文學文摘》自己名單裡抽出來的樣本，準確預言了《文學文摘》會錯、錯向哪邊。三千個瞄得準的，海電兩百四十萬個瞄歪的。現代民調業就此誕生。（2026-06 web 查證。）\n\n這故事翻成你的語言：**抽樣監控如果只抽某一台機器、某一個時段、某一類請求，那你抽再多筆都是在精確地測量一個偏掉的子集。** dashboard 會給你一個漂亮、穩定、誤差很小的數字，而它系統性地不等於真相。樣本量大只會讓你更篤定地相信一個錯的值——這是監控最陰險的一種謊言，因為它穿著「資料量很大、很可信」的外衣。\n\n### 二戰：你只看得到飛回來的飛機\n\n第二個故事更精巧，它揭露的偏誤連「擴大樣本」都救不了，因為偏誤藏在「你能看到什麼」這件事本身。\n\n二戰期間美軍想幫轟炸機加裝甲。裝甲很重，不能整架包起來，得挑要害補。軍方統計了從歐洲戰場**飛回來**的轟炸機，發現彈孔集中在機翼和機身，引擎和駕駛艙相對乾淨。結論呼之欲出：**彈孔最多的地方最危險，加裝甲在機翼和機身。**\n\n統計研究小組（Statistical Research Group, SRG）的數學家亞伯拉罕·瓦德（Abraham Wald）說：不對，**裝甲要加在沒有彈孔的地方——引擎和駕駛艙。**（事實照 landscape §七與 2026-06 web 查證歸屬 Wald／SRG。）\n\n為什麼？因為你統計的全是**飛回來**的飛機。一架飛機引擎或駕駛艙中彈，它就**飛不回來了**，根本不在你的資料裡。你看到引擎乾淨，不是因為引擎不容易中彈，而是因為**引擎中彈的飛機都墜毀了、不在你的樣本裡**。那些機翼滿是彈孔卻還飛得回來的飛機，恰恰證明了機翼中彈不致命。你樣本裡每一架，都是「中了這些彈還能活著回來」的倖存者；它們身上的彈孔，標示的不是「哪裡危險」，而是「哪裡中彈也沒關係」。\n\n這就是**倖存者偏誤（survivorship bias）**：你的樣本被「能不能活到被你看到」這個條件偷偷過濾過了，而那個過濾條件正好跟你要研究的東西高度相關。墜毀的飛機——你最該分析的那批——從定義上就不會出現在你的資料集裡。它們是沉默的、看不見的、被結構性刪除的母體。\n\n這個偏誤最毒的地方在於：**擴大樣本完全沒用。** 你再多統計一千架飛回來的飛機，每一架還是飛回來的，資料還是只有倖存者。問題不在樣本太小，在你的樣本框跟想要的母體之間被「倖存」這條件切了一刀，而你看不到那一刀。\n\n工程師版的倖存者偏誤，你每天都泡在裡面：**你只有「沒當機的機器」的指標**（OOM 之後直接消失的容器，死前那幾秒可能根本沒上報，你看著一片綠說系統健康，但最該看的是已經不在面板上的死者）；**你只有「重試成功」的請求的延遲**（徹底放棄、被 retry 邏輯吃掉的請求延遲是無限大，沒進統計，你的 P99 是「成功者俱樂部」的 P99）；**你只訪談還在用產品的客戶**（想知道為什麼流失，卻只問得到沒流失的人——你在問飛回來的飛機為什麼會被擊落）。三個情境的共同結構：被「能不能活到被你看到」過濾過，而那個過濾條件正好跟你想研究的東西相關。\n\n每次看一份資料下結論之前，瓦德的問題值得你刺自己一下：**這份資料裡，誰因為「沒活到能被我看到」而被悄悄刪掉了？** 沉默的那一群——墜毀的飛機、OOM 的容器、放棄的請求、流失的客戶——往往才是答案所在。\n\n## 直覺的陷阱\n\n抽樣這一章的直覺陷阱特別密，因為它同時踩中「大數的迷信」和「看不見的偏誤」兩種人類盲區。整理成表：\n\n| 你的直覺以為 | 實際上 | 在哪一步把你帶溝裡 |\n|---|---|---|\n| 樣本越大越準，大到一定程度就一定可信 | 樣本大只壓**變異**不壓**偏誤**。抽樣方法歪了，再大的樣本只是更精準地測量一個錯的值 | 一看到「兩百四十萬份」就放下戒心，不去追問這些樣本**怎麼來的** |\n| 要代表母體，得把樣本「設計得像」母體 | 代表性靠**隨機**不靠「長得像」。刻意設計只能控制你想得到的維度，反而偷渡你的偏見 | 在你沒想到、量不到的那個維度上系統性偏掉，而你因為沒看那維度，永遠不會發現 |\n| 母體越大，需要的樣本越大 | 準度幾乎只看樣本大小 n，不看母體大小 N（除非樣本佔母體 >5%）。1000 人估兩億跟估兩萬一樣準 | 在「才問 1000 人怎麼代表兩億」這裡卡住、不信任正確的民調，或反過來覺得「母體小所以隨便問問就夠」 |\n| 我手上的資料就是事實的全貌 | 你的資料被「能不能活到被你看到」過濾過（倖存者偏誤）。最該看的那群從定義上不在資料裡 | 看著飛回來的飛機補機翼、看著一片綠的 dashboard 說系統健康 |\n| 願意回應的人 ≈ 隨機的人 | 願意填問卷／回訪談／留下來的人本身是自我篩選的一群（無回應偏誤） | 把「回收的兩成」當成「全體」，沉默的八成跟他們系統性不同 |\n\n具名陷阱兩個，都來自上面的故事，務必能口頭重講：**倖存者偏誤（survivorship bias）**——只分析活下來的，把沉默的死者結構性刪除（瓦德的飛機）；**抽樣框偏誤／無回應偏誤**——你接觸得到的那群、和願意回應的那群，系統性地不等於母體（《文學文摘》的車主與電話用戶）。\n\n怎麼自我察覺你已經中招了？幾個徵兆：\n\n- 你開始用「樣本這麼大，不可能有問題」當論證——這句話幾乎總是偏誤的遮羞布。樣本大小從來不是抽樣品質的保證。\n- 你說得出你的樣本**算出什麼**，卻說不清楚它**怎麼抽來的**、**漏掉了誰**。如果你沒法回答「誰不在我的資料裡」，你就還沒資格下結論。\n- 你的估計值穩定得可疑——每次重抽都給你幾乎一樣的數。穩定（低變異）會偽裝成正確（低偏誤），但它們是兩回事。瞄歪的槍打出來也是一個很集中的彈著點。\n- 你的樣本是「方便抽到的」——這台機器剛好有 log、這群使用者剛好在你的內測名單、這些客戶剛好還在。「方便樣本（convenience sample）」是偏誤的溫床，因為「方便」這個條件本身常常跟你要研究的東西相關。\n\n## 紙上推演\n\n### 推演題 1 ——「攪勻就好」要算給人聽 **[10 分鐘]** ★\n\n一個工程師同事不信你：「你抽樣監控每 100 筆 log 抽 1 筆，估出錯誤率 0.3%。可是我們流量從每天 1 億筆漲到 10 億筆了，你的抽樣量也才跟著翻 10 倍，**佔整體的比例還是一樣小**，這估計憑什麼可信？」\n\n請你用一句話＋一條公式，向他解釋為什麼「佔整體的比例」根本不是重點。提示：寫出標準誤公式，指出裡面有沒有「總流量 N」。\n\n#### 推演解答\n\n標準誤公式：\n\n```text\nSE = √( p(1−p) / n )\n```\n\n裡面只有 p（錯誤率）和 n（你**實際抽到的絕對筆數**），**沒有總流量 N**。所以決定你準度的，是你抽到的絕對筆數 n，不是它佔總量的比例。\n\n流量從 1 億漲到 10 億，只要你的絕對抽樣筆數 n 夠大（比如維持在幾十萬筆），錯誤率估計的標準誤就一樣小——跟總流量是 1 億還是 10 億、跟你佔的比例是百萬分之一還是千萬分之一，**完全無關**（嚴格講有個有限母體校正項，但 n 相對 N 這麼小的時候它等於 1，可以無視）。\n\n一句話版本：**「準不準看我舀了多少水（n），不看那鍋湯有多大（N）。只要攪勻了，一湯匙嚐一公升跟嚐一噸一樣準。」** 唯一要守住的不是比例，是「隨機抽」這件事——別只抽某台機器、某個時段、某類請求，否則 n 再大也是精準地測一個偏掉的子集。\n\n### 推演題 2 ——倖存者偏誤的工程版獵捕 **[15 分鐘]** ★★\n\n下面三個情境，各有一個倖存者偏誤。請對每個指出：(a) 你想知道的母體是什麼；(b) 你實際看到的樣本被什麼條件過濾了；(c) 被結構性刪掉、但其實最該看的是誰。\n\n1. 你統計線上所有機器的記憶體使用曲線，發現平均很健康，於是把記憶體 quota 調低。\n2. 你看 API 的延遲分布，P99 是 800ms，覺得還行，照這個簽 SLA。\n3. 你做使用者訪談問「為什麼喜歡我們的 App」，受訪者一面倒地滿意，於是你判斷產品方向正確。\n\n#### 推演解答\n\n1. (a) 母體＝**所有**機器的記憶體行為，包括撐不住的。(b) 樣本被「**還活著、還在上報指標**」過濾——OOM 之後瞬間死掉的容器，它爆掉前那一下的曲線可能根本沒上報。(c) 最該看的是**那些已經 OOM 消失的機器**：它們才告訴你 quota 的真正下限在哪。看著倖存者的平均調低 quota，等於看著飛回來的飛機補機翼——你會讓更多機器墜毀。\n\n2. (a) 母體＝**所有**請求的真實延遲，包括失敗的。(b) 樣本通常只含**成功回應**的請求；逾時、被 retry 吃掉、被 circuit breaker 擋掉的，它們的「延遲」是無限大或根本沒進統計。(c) 最該看的是**那些徹底失敗的請求**——它們的「延遲」是 ∞。你的 P99=800ms 是「成功者俱樂部」的 P99，真實的使用者體驗尾巴比這慘得多。\n\n3. (a) 母體＝**所有**接觸過產品的人，含已流失的。(b) 樣本被「**還在用、所以還訪談得到**」過濾——流失的人早走了，不會出現在你的受訪名單。(c) 最該看的是**流失的使用者**：他們才知道產品哪裡讓人受不了。問還在用的人為什麼喜歡，就是在問飛回來的飛機為什麼會被擊落——你問錯了一整群人。\n\n共同模式：每個情境裡，「能不能活到被你看到」這個過濾條件，都跟你想研究的東西（穩定性、延遲、流失原因）高度相關。這正是倖存者偏誤致命的結構。\n\n### 推演題 3 ——抽樣分布的散布 **[15 分鐘]** ★★\n\n脊椎硬幣（**對，就是 ch01 那枚公正硬幣**），真實 p=0.5，你不知道，要靠抽樣估。\n\n(a) 你打算擲 n=400 次當一個樣本。寫出 p̂ 這個統計量的抽樣分布（中心、標準誤、形狀）。\n\n(b) 用 68-95-99.7 法則，講出「大約 95% 的情況下，你這一把 400 次算出來的 p̂ 會落在哪個區間」。\n\n(c) 跟正文 n=100 的情形（標準誤 0.05）比，n 翻成 4 倍，標準誤縮成幾分之幾？這驗證了哪條法則？\n\n#### 推演解答\n\n(a) 三件事各歸各的定理管：\n\n```text\n中心   ：E[p̂] = p = 0.5            ← 不偏（大數法則撐著，見 ch13）\n標準誤 ：SE = √( p(1−p)/n )\n           = √( 0.25 / 400 )\n           = √0.000625\n           = 0.025                ← √n 法則，見 ch09\n形狀   ：常態                       ← 中央極限定理，見 ch14\n所以   ：p̂ ~ N( 0.5 , 0.025² )\n```\n\n(b) ±2 個標準誤涵蓋約 95.45%（嚴格說 95% 對應 ±1.96 個標準誤，這裡用 ±2 的 95.45% 法則估）：\n\n```text\n0.5 ± 2 × 0.025 = 0.5 ± 0.05 = [0.45 , 0.55]\n```\n\n所以大約 95% 的情況下，你這一把 400 次算出來的 p̂ 會落在 0.45 到 0.55 之間（±5 個百分點）。\n\n(c) n 從 100 變 400（4 倍），標準誤從 0.05 變 0.025——**縮成一半**。\n\n```text\n原 SE = √(0.25/100)  = 0.05\n新 SE = √(0.25/400)  = 0.025      ← 剛好一半\n```\n\n這驗證了 √n 法則（見 ch09）：標準誤跟 √n 成反比。樣本翻 4 倍（√4 = 2），誤差只砍一半。要再砍一半（到 0.0125），得再翻 4 倍到 n=1600。**精度跟樣本量的平方根走，不是線性走——這就是為什麼把民調誤差從 ±3% 壓到 ±1.5% 要花四倍的錢**（ch17 完整展開這筆帳）。\n\n### 推演題 4 ——口頭題：只問 1000 人怎麼代表兩億人 **[10 分鐘]** ★★\n\n不准用任何公式，向一個堅信「才問 1000 人根本不可能代表兩億人」的朋友，講清楚為什麼可以。你的解釋必須回答他兩個質疑：「比例上那麼小怎麼可能準」和「萬一剛好抽到一群怪人怎麼辦」。\n\n#### 推演解答\n\n要點清單（能用自己的話把這幾點串成一段話就算過關）：\n\n- **「準不準看舀多少、不看湯多大」**：用煮湯比喻。一鍋湯攪勻了，舀一湯匙嚐鹹淡，準度只看湯匙多大，跟那鍋湯一公升還是一噸無關。1000 人就是那一湯匙——它的絕對大小（1000）決定準度，母體是兩億還是兩萬幾乎不影響。比例小得嚇人（二十萬分之一）在數學上根本不進公式。\n\n- **「攪勻 = 隨機抽」**：關鍵不是樣本「長得像」母體，是**隨機**抽。隨機化讓樣本在所有維度上——包括你想不到的——自動平衡，等於替你把那鍋湯攪勻。刻意去湊「代表性」反而會偷渡你的偏見。\n\n- **回答「抽到一群怪人」**：會啊，**有可能**剛好抽歪——這正是為什麼民調要報「±3%」的誤差界。那個 ±3% 就是在誠實告訴你「抽歪到這個程度的事偶爾會發生」。統計不是保證每次都對，是**精確地量化它會錯多少、多常錯**。1000 人時，抽到嚴重不具代表性的怪樣本的機率，小到可以用那個誤差界框住。\n\n- **反面警告（加分）**：但這一切的大前提是「**真的**隨機抽」。1936 年《文學文摘》問了兩百四十萬人還是錯了 19%，就因為名單（車主、電話用戶）從根上偏了。**所以該擔心的不是「樣本太小」，是「抽樣方法歪了」**——後者連兩百四十萬份都救不回來。\n\n如果朋友還揪著「比例好小」不放，把上面有限母體校正那張表攤給他：母體從兩億縮到兩百萬，誤差界第四位小數才動。眼見為憑。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 母體、樣本、參數、統計量，四個詞各是什麼？哪些是固定常數、哪些是隨機的？（**為什麼** p̂ 是隨機變數而 p 不是？）\n2. 「抽樣分布」是什麼東西的分布？它的中心、寬度、形狀分別被前面哪三章的哪三條定理鎖死？\n3. 標準誤（standard error）跟一般的標準差是不同的東西嗎？它具體在量什麼？\n4. 為什麼民調 ±3% 跟母體是兩億還是兩百萬幾乎無關？公式裡有沒有母體大小？什麼時候母體大小才真的有影響？\n5. 「樣本要長得像母體才有代表性」——這句話錯在哪？真正帶來代表性的是什麼？為什麼隨機反而比刻意設計好？\n6. 《文學文摘》問了兩百四十萬人還慘敗，推翻了哪個直覺？偏誤（bias）和變異（variance）為什麼是兩種不同的錯，擴大樣本能解決哪一種、不能解決哪一種？\n7. 用瓦德的飛機講一遍倖存者偏誤，再舉一個你自己系統裡的版本。為什麼這種偏誤「擴大樣本」也救不了？\n8. A/B test 為什麼非得隨機分組？你花錢買隨機分組，到底買到了什麼？（提示：跟 ch10 的 confounder 有關。）\n\n## 延伸閱讀\n\n- **Jordan Ellenberg,《How Not to Be Wrong》**（中譯《數學教你不犯錯》）——瓦德飛機彈孔那一章是全書開場，把倖存者偏誤講得比任何教科書都生動，讀第一章就值回票價。（2026-06 web 查證歸屬，Ellenberg 引述 Wald／SRG。）\n- **維基百科「Literary Digest」與「The Literary Digest poll of 1936」條目**——把這場史上最貴的抽樣翻車的數字（一千萬寄出、兩百四十萬回收、蘭登 57 vs 羅斯福 43 的預測對上 62 vs 38 的實際）查清楚，順帶看蓋洛普如何用五萬人海電兩百四十萬人。\n- **David Spiegelhalter,《The Art of Statistics》**（中譯《統計，讓數字說話》）——作者是把「資料怎麼來的比資料多大更重要」講得最清楚的當代統計學家之一；讀他談 sampling frame 那段。\n- **Darrell Huff,《How to Lie with Statistics》**——1954 年的老書、薄薄一本，但「偏誤的樣本」那一章到今天一個字都不過時，每個看 dashboard 的人都該讀。把它當「統計版的反模式手冊」。\n- **本書 ch17（估計與信賴區間）**——這一章把 p̂ 的抽樣分布建好了，下一章接著問：那我該怎麼**用**這個分布、誠實地說出「我估的值錯在多少之內」？民調 ±3% 的完整來歷在那裡，而且會拆穿一個全世界都在犯的信賴區間誤讀。\n"}, {"id": "ch17-confidence-intervals", "file": "ch17-confidence-intervals.md", "group": "Part V — 統計推論", "title": "ch17 — 估計與信賴區間：誠實地說「我不確定多少」", "md": "# ch17 — 估計與信賴區間：誠實地說「我不確定多少」\n\n> **本章解決什麼問題**：上一章（見 ch16）說了統計推論最大膽的事——只問 1000 人就敢推斷兩億人。但「敢推斷」之後馬上要面對一個誠實問題：你猜的這個數字，到底準不準？差多少？這章把「不確定」本身量化成一個可驗收的區間，就是信賴區間（confidence interval）。它是統計學送給工程師最實用的禮物，也藏著全書最招牌的一個誤讀——連 Milton Friedman 這種等級的人都當場踩進去過。下一章（見 ch18）的假設檢定，其實是同一套機器的另一個按法。\n\n## 從你已知的出發\n\n你報過無數次效能數字。「這個 API P50 延遲 50ms」「壓測跑出來吞吐量大概 8000 RPS」「這次最佳化把 RDS CPU 尖峰降了大約 40%」。\n\n注意你每次講這種數字時，喉嚨裡都會卡一下，然後補一句修飾語。「**大概** 8000」「**降了大約** 40%」。那個「大概」「大約」是哪來的？\n\n是因為你心裡清楚：你不是量了全宇宙所有請求，你只是跑了一段壓測、抽了一段時間的樣本。你報的 50ms 是**樣本**算出來的，真正的母體（這支 API 在所有可能負載下的真實延遲分布）你永遠看不到全貌。你的 50ms 是個猜測——一個有根據的猜測，但是猜測。\n\n成熟的工程師會做一件事：他不只報那個點，他會給一個範圍。「平均延遲 50ms，誤差大概 ±3ms。」這句話比光講 50ms 誠實得多，因為它同時回答了兩件事：我猜是 50，而且我知道我能猜得多準。\n\n恭喜，你已經在報信賴區間了。你只是沒人教你它叫這個名字，也沒人告訴你那個「±3ms」背後其實有一套精確到反直覺的數學在撐。\n\n這章要做的就是把你工程直覺裡那個「±」變成嚴格的東西：它怎麼算出來、為什麼是這個寬度、增加樣本能把它縮多少（劇透：跟你「多跑幾次測試降噪」用的是同一條 √n 定律），以及最重要的——**這個區間到底在向你保證什麼**。最後這點，我認為是整本統計裡最多人講錯、而且講錯了還理直氣壯的一頁。\n\n## 點估計：先給一個數，再承認它會晃\n\n統計推論分兩步。第一步叫**點估計（point estimation）**：用樣本算出一個單一數字，當作對母體參數的猜測。\n\n兩個你會反覆用到的點估計：\n\n- **樣本平均（sample mean）** x̄ = (x₁ + x₂ + … + xₙ) / n，拿來估母體平均 μ。\n- **樣本比例（sample proportion）** p̂ = (樣本裡符合條件的個數) / n，拿來估母體比例 p。\n\n`p̂` 唸作「p-hat」，那個帽子 ^ 是統計學的慣例：戴帽子的是「估計出來的」，沒帽子的是「真實但你看不到的」。p 是真相，p̂ 是你的猜測。這個區分整章都很重要，後面那個招牌誤讀就是栽在「把帽子戴錯頭上」。\n\n點估計本身有個誠實的麻煩：**它幾乎一定不等於真值**。\n\n你從母體隨機抽 1000 人問支持率，算出 p̂ = 0.52。換一組 1000 人，可能算出 0.49。再換一組，0.51。p̂ 自己就是個隨機變數（random variable）——你每抽一次樣本，它就跳一個值。這正是上一章（見 ch16）抽樣分布（sampling distribution）的核心：統計量本身在抖。\n\n所以光報一個點估計是不夠誠實的。50ms 這個數字看起來斬釘截鐵，但它底下是會晃的。問題是——晃多大？\n\n### 標準誤：點估計自己的標準差\n\n「晃多大」這件事，有名字，叫**標準誤（standard error，SE）**。\n\n標準誤就是「你的點估計這個隨機變數的標準差」。聽起來繞口，拆開就清楚了：\n\n- 母體裡單一個體有它的標準差 σ（個體之間差多少）。\n- 但你報的不是個體，是 n 個的平均。平均比個體穩——穩多少？這就回收 ch09 那條 √n 法則了。\n\n```text\nSE(x̄)  = σ / √n          ← 樣本平均的標準誤\nSE(p̂)  = √( p(1−p) / n )  ← 樣本比例的標準誤\n```\n\n第一條直接是 ch09 的結論：n 個獨立同分布的東西取平均，平均的標準差是個體標準差的 1/√n。平均比個體穩 √n 倍——這不是新東西，是大數法則（見 ch13）和中央極限（見 ch14）一路鋪下來的同一根骨頭。\n\n第二條是比例的版本。比例其實是「0/1 指示變數的平均」——支持就記 1、不支持記 0，p̂ 就是這串 0 跟 1 的樣本平均。而一個機率為 p 的伯努利變數，變異數（variance）是 p(1−p)（這你 ch09 算過硬幣的 1/4，就是 p=1/2 時的 p(1−p)）。套進 σ/√n 就得到上面那條。\n\n停一下，看一眼 p(1−p) 這個東西。它在 p=0.5 時最大（等於 0.25），往兩邊都變小。意思是：**民調最難估的，剛好是五五波的議題**。如果某議題支持率是 99%，你很容易估準（變異數小）；如果是真正的拉鋸戰 50/50，你的估計反而最不穩。這有點反直覺但完全合理——勢均力敵的東西，本來就最難分出勝負。後面算民調 ±3% 時，我們就用 p=0.5 這個「最壞情況」，因為新聞要報一個對所有議題都成立的保守誤差界。\n\n## 信賴區間：把「我有多準」變成一段範圍\n\n有了點估計（中心）和標準誤（晃動幅度），信賴區間的構造就幾乎是它自己長出來的。\n\n中央極限定理（見 ch14）告訴你：當 n 夠大，你的點估計 p̂ 的抽樣分布近似常態（normal），中心在真值 p，標準差是 SE。而常態分布你 ch15 很熟了——它 95% 的質量落在中心 ±1.96 個標準差以內（**注意是 1.96 不是 2**，±2σ 其實是 95.45%，95% 對應的精確值是 1.96σ，這個全書一致）。\n\n所以一個 95% 信賴區間長這樣：\n\n```text\n信賴區間 = 點估計 ± 1.96 × 標準誤\n         = p̂ ± 1.96 × √( p̂(1−p̂) / n )\n```\n\n那個 1.96 是「95% 信賴水準」的臨界值。換信賴水準就換數字：\n\n```text\n信賴水準    臨界值\n  90%        1.645\n  95%        1.96     ← 最常用，民調與論文的預設\n  99%        2.576\n```\n\n水準越高，臨界值越大，區間越寬。這是個誠實的取捨：你要越有把握蓋住真值，就得張開越大的網。要 99% 把握，網就得撐到 ±2.576 個標準誤。**沒有又窄又保險的午餐**——想兼得，唯一的路是增加 n（把標準誤本身縮小），這就是下一節的 √n。\n\n注意一個容易混的地方：那個 ±1.96·SE 的整段寬度，正式叫**誤差界（margin of error）**，新聞講的「±3%」就是它。它是「半寬」，從中心到邊緣的距離。\n\n### Worked example：民調 ±3% 的完整來歷（基準）\n\n這是全書基準範例，每一步都手算給你看，不跳。\n\n**設定**：全國民調，隨機抽 n = 1000 人，問某個五五波議題，假設真實支持率 p ≈ 0.5（最壞情況，給最大誤差界）。求 95% 信賴區間的半寬（誤差界）。\n\n第一步，算標準誤裡面的變異數部分 p(1−p)：\n\n```text\np(1−p) = 0.5 × (1 − 0.5)\n       = 0.5 × 0.5\n       = 0.25                  ← 五五波，變異數最大\n```\n\n第二步，除以 n：\n\n```text\np(1−p) / n = 0.25 / 1000\n           = 0.00025\n```\n\n第三步，開根號得標準誤：\n\n```text\nSE = √0.00025\n   = 0.0158113...             ← 約 0.0158\n```\n\n這個 0.0158 怎麼來的，心算驗一下：0.0158² = 0.00024964 ≈ 0.00025，對得上。（或者：√0.25 = 0.5，√1000 ≈ 31.62，0.5 / 31.62 ≈ 0.01581，兩條路同一個數。）\n\n第四步，乘上 1.96 得誤差界：\n\n```text\n誤差界 = 1.96 × 0.0158113\n       = 0.030990...\n       ≈ 0.0310\n       ≈ ±3.1%\n```\n\n**交叉驗算**（這種數字必須複核）：用另一條路。1.96 × 0.0158 ——拆成 2 × 0.0158 = 0.0316，再減掉 0.04 × 0.0158 ≈ 0.00063，得 0.0316 − 0.00063 ≈ 0.03097。對得上 0.0310。\n\n所以這支民調的 95% 信賴區間是 **52% ± 3.1%**，也就是大約 **[49%, 55%]**（如果 p̂ 抽出來是 0.52）。新聞標題說的「誤差 ±3%」，這 1000 個人、這 1.96、這 √(0.25/1000)，就是它全部的來歷。沒有黑魔法。\n\n這裡藏著上一章那個震撼的數字版：**這個 ±3.1% 跟全國有兩億人還是兩百萬人，一點關係都沒有**。公式裡只有 n（樣本數），沒有 N（母體數）。母體只要「夠大到抽樣可視為獨立」，它有多大就無關了。誤差只跟你問了幾個人有關。這是真的，而且每次想到還是會愣一下。\n\n### √n：誤差砍半的代價是樣本變四倍\n\n現在你想把民調做精細點，誤差從 ±3.1% 壓到 ±1.55%（砍半）。要多少樣本？\n\n直覺可能會說「樣本加倍吧」。錯。看公式：\n\n```text\n誤差界 = 1.96 × √( p(1−p) / n )\n```\n\nn 在根號**底下**。誤差跟 1/√n 成正比，不是跟 1/n。要把誤差砍半，得讓 √n 變兩倍，也就是 **n 變四倍**。\n\n驗算一下，把 n 從 1000 提到 4000：\n\n```text\nSE(4000) = √( 0.25 / 4000 )\n         = √0.0000625\n         = 0.0079057...        ← 約 0.0079\n\n誤差界   = 1.96 × 0.0079057\n         = 0.015495...\n         ≈ ±1.55%              ← 剛好砍半\n```\n\n對得上。1000 → 4000（四倍樣本）換來誤差 ±3.1% → ±1.55%（砍半）。\n\n這條 √n 你其實天天在用，只是沒掛這名字。「這個 benchmark 噪音太大，多跑幾次取平均把誤差壓下來」——你壓的就是這個標準誤。跑 4 次平均，噪音降一半；想再降一半，得跑 16 次；再一半，64 次。**降噪的邊際成本是平方往上爬的**。\n\n這也順手解釋了一個你可能困惑過的現象：為什麼民調公司不乾脆問十萬人、把誤差弄到 ±0.3%？因為從 ±3% 到 ±0.3%（降到十分之一），樣本要變一百倍——從 1000 變成 10 萬，成本爆炸，而換來的精度對「誰會贏」這種問題根本是過度精確。√n 讓「再準一點」變得越來越貴，所以大家停在「夠用就好」的 ±3%。工程上你也是這樣停的：壓測跑到誤差夠小能下決策就收手，不會為了第五位有效數字無限跑下去。\n\n### Worked example：脊椎硬幣 60/100 的信賴區間（埋 ch18 伏筆）\n\n回到全書脊椎——**這是 ch01 那枚硬幣**。\n\n你拿一枚硬幣，懷疑它不公正。擲 100 次，出現 60 次正面。p̂ = 0.60。這枚硬幣真正的正面機率 p 是多少？給個 95% 信賴區間。\n\n用觀察到的 p̂ = 0.60 算標準誤（這裡 p 未知，標準誤就用 p̂ 代入——這叫 Wald 區間，大樣本下夠用）：\n\n```text\nSE = √( p̂(1−p̂) / n )\n   = √( 0.60 × 0.40 / 100 )\n   = √( 0.24 / 100 )\n   = √0.0024\n   = 0.04899...              ← 約 0.049\n```\n\n驗一下：0.049² = 0.002401 ≈ 0.0024，對。\n\n誤差界：\n\n```text\n1.96 × 0.049 = 0.09604 ≈ 0.096   ← 約 ±9.6%\n```\n\n所以 95% 信賴區間是：\n\n```text\n0.60 ± 0.096  =  [0.504, 0.696]\n```\n\n讀這個區間：你對這枚硬幣真實正面機率的估計範圍是大約 **[50.4%, 69.6%]**。\n\n現在看那個下界——**0.504，剛剛好擦過 0.5**。一枚公正硬幣的 p 是 0.5，而 0.5 幾乎、但沒有完全落在你的 95% 信賴區間裡（差那麼一點點，0.5 < 0.504）。\n\n這個「差一點點」不是巧合，它就是下一章（見 ch18）假設檢定的伏筆。「0.5 在不在 95% 信賴區間裡」這個問題，跟「在 0.05 顯著水準下能不能拒絕『硬幣公正』」這個問題，是同一枚硬幣的同一件事換句話說。60/100 這個資料剛好卡在邊界附近——公正與不公正的天平上，它落在一個讓你不太敢下結論的位置。ch18 會把這個「卡在邊界」算到小數點後面，你會看到它怎麼隨著不同算法在 0.05 兩側微微搖晃。先記住這個 [0.504, 0.696]，下一章我們回來算帳。\n\n## 信賴區間到底在說什麼（全書招牌誤讀，停十分鐘）\n\n好，前面都是熱身。現在這一節是整章、可能是整本書最重要的一頁。**你的直覺正準備騙你，而且騙得理直氣壯。**\n\n你算出了一個 95% 信賴區間 [49%, 55%]。請你用一句話說它是什麼意思。\n\n幾乎每個人——包括念過統計的人、包括用了一輩子信賴區間的科學家——脫口而出的是這句：\n\n> 「真值有 95% 的機率落在 [49%, 55%] 這個區間裡。」\n\n**這句話是錯的。** 不是有點不精確，是根本性地錯。而且它錯的方式，恰恰暴露了整套頻率派（frequentist）統計最反直覺、最了不起的設計。\n\n錯在哪？錯在一個字：**機率是給隨機的東西用的，但這句話裡沒有隨機的東西了。**\n\n拆給你看。這句話講的是「真值落在 [49%, 55%] 裡的機率」。但是：\n\n1. **真值不是隨機的**。那個真正的支持率 p，是一個固定的、未知的常數。它就是某個確切的數字（比如說 0.518），只是你不知道而已。它不會今天 0.51、明天 0.53 地跳——它一直是那個值。它不是隨機變數，它沒有機率分布。\n\n2. **區間 [49%, 55%] 也不再隨機了**。一旦你抽完樣、算完，這兩個端點就是兩個死掉的數字，釘在那裡。\n\n所以「真值落在這個區間裡」這件事，**要嘛是真（真值確實在裡面），要嘛是假（不在）**。它不是機率 95%，它是機率 1 或機率 0——只是你不知道是哪個。就像「第 7 億位數的圓周率是不是 3」——答案是確定的，你只是還沒查。你不會說「圓周率第 7 億位是 3 的機率是 10%」，那個數字要嘛是 3 要嘛不是。\n\n那 95% 是什麼意思？它**不是**在描述「這一條」區間。它在描述**製造區間的這套程序**：\n\n> **正確版**：「如果我用同一套方法，重複抽樣、重複造區間，做非常多次，那麼長期下來，我造出的這些區間裡會有 95% 蓋住真值。」\n\n95% 是**程序的長期命中率**，不是「這一條」的機率。隨機的是「抽樣這個動作」和「因此產生的區間」，不是真值。每次抽樣，區間都跳到不同位置（因為樣本不同），而那個固定不動的真值，被這些跳來跳去的區間蓋住的比例，長期是 95%。\n\n我知道這個區別聽起來像在玩文字遊戲。它不是。我再換個畫面講一次，因為這頁值得你真的停下來。\n\n### 用「拋圈圈」重講一次\n\n想像一個固定的木樁釘在地上（這是**真值**，不動）。你閉著眼睛朝它拋圈圈，每個圈圈落在不同位置（這是每次抽樣造出的**區間**，會晃）。\n\n「95% 信賴」的意思是：**你這個拋圈圈的手藝，長期有 95% 的圈圈會套中木樁。**\n\n現在你拋出了一個圈圈，它已經落地了，停在那裡。問：「這個圈圈套中木樁的機率是多少？」\n\n答案不是 95%。答案是——它要嘛套中了，要嘛沒套中。圈圈和木樁都不動了，沒有任何隨機的東西，去問「機率」是沒意義的。95% 是在描述你的**手藝**（程序），不是描述**這一拋**的結果。\n\n```text\n木樁固定 (真值 p)，圈圈會晃 (每次抽樣的區間)：\n木樁 (真值) 永遠固定在下面這條虛線標出的位置、不動\n\n  拋 1   [····●····]      套中  ✓\n  拋 2      [····●····]   套中  ✓\n  拋 3  [···●···]         套中  ✓\n  拋 4           [··●··]  沒中  ✗   ← 這次運氣差，圈圈飄了\n  拋 5    [····●····]     套中  ✓\n  ......................................\n            真值在這 (固定不動的木樁)\n\n長期看：95% 的圈圈會套中木樁(=程序的命中率)\n但「拋 4 套中的機率」這問法本身就壞掉了——它要嘛中要嘛沒中\n```\n\n你算出來的那一條 [49%, 55%]，就是「拋 4」或「拋 1」其中之一——但你**不知道是哪一個**，因為你看不到木樁在哪。你唯一知道的是：產出它的那隻手，長期命中率 95%。所以你選擇相信這一條也中了——但這是「信任程序」，不是「這一條有 95% 機率」。\n\n### 這不是學究的吹毛求疵——Friedman 當場踩進去\n\n這個誤讀有正式名字，叫**基本信賴謬誤（fundamental confidence fallacy）**，而且它跟信賴區間這個概念一樣老。\n\n**奈曼（Jerzy Neyman）1937 年**正式定義了信賴區間（confidence interval）。就在他發表這套理論的場合——一場在美國農業部的演講——台下一位年輕經濟學家舉手提問，問的正是「那是不是表示真值有 95% 機率落在這區間裡？」奈曼當場糾正他：不，真值不是隨機變數，它是個未知的常數（2026-06，多源確認此軼事，細節依 landscape）。\n\n那位被糾正的年輕人，叫 **Milton Friedman**——後來拿諾貝爾經濟學獎的那位。\n\n我講這段不是要嘲笑誰。剛好相反：如果連 Friedman 這種等級的腦袋，第一次碰到都會直覺地踩進去，那這個誤讀就絕對不是「你不夠聰明」的問題。它是人類直覺對「機率」這個詞的預設用法跟頻率派的精確定義之間，一道結構性的裂縫。奈曼設計這套程序時，是**刻意**把隨機性放在「抽樣」上、把參數釘成常數的——這個選擇讓整套理論邏輯乾淨，代價就是它說出來的保證，永遠不是你直覺想聽的那句。\n\n> **這裡了不起在哪**（能轉述給另一個工程師的版本）：頻率派做了一件很硬的事——它**拒絕**對「這一條具體的區間」說任何機率的話，因為一旦資料定了，這條區間是死的，沒有機率可言。它只願意對「程序」做保證。這很反人性（你就想知道「我手上這條到底準不準」啊），但它換來的是**不需要任何主觀先驗、純靠抽樣的隨機性就能給出鐵一般的長期保證**。你只要老老實實照程序做，長期 95% 命中，這個數字不靠任何人的信念、不靠任何先驗假設。這是它的紀律，也是它的驕傲。\n\n### 給讀過 TLA+ 那本書的你：這是量詞順序\n\n如果你讀過書架上《把系統寫成定理》（TLA+ 那本），這裡的精確意義你其實見過，只是換了衣服。\n\n兩句話的差別，本質是**量詞順序**的差別：\n\n- **錯誤讀法**：「給定這條算出來的區間，真值在裡面的機率 95%。」這是想對「∃ 出來的那一條具體區間」談機率。\n- **正確讀法**：「對所有可能的真值（∀ p），這套程序產生的隨機區間蓋住它的機率是 95%。」機率是綁在「程序／抽樣」這個 ∀ 上的，不是綁在「這一條」上的。\n\n如果你被 TLA+ 的 ∀∃ 攻防虐過，這個「保證是綁在哪個量詞上」的敏感度你已經有了。沒讀過也完全不影響——拋圈圈那張圖就夠了。\n\n### 那「真值有 95% 機率在內」這句話，有沒有對的時候？\n\n有。但你得換一套世界觀——換成**貝氏（Bayesian）**。\n\n貝氏統計有個對應的東西，叫**可信區間（credible interval）**。貝氏的世界觀（回收 ch06）裡，未知參數**本身**就被當成隨機變數來對待——它有一個機率分布（後驗分布，posterior），描述「在看完資料後，你對這個參數的信念」。在這套框架下，你**真的可以**說：「給定我看到的資料，真值有 95% 機率落在這個可信區間裡。」那句被頻率派打叉的話，在貝氏這裡是合法的。\n\n聽起來貝氏完勝？它給了你直覺想要的那句話。但天下沒有白吃的午餐——**代價是你得先掏出一個先驗（prior）**。可信區間要算，前提是你得先說「在看資料之前，你對這個參數的信念分布長什麼樣」。換不同先驗，算出來的可信區間就不同。頻率派的信賴區間不需要先驗（這是它的賣點），代價是它說不出那句直覺的話；貝氏的可信區間能說那句話，代價是它得先承諾一個先驗。\n\n```text\n                 信賴區間 (頻率派)       可信區間 (貝氏)\n真值是什麼        固定的未知常數          有分布的隨機變數\n隨機的是          抽樣/區間               你的信念(後驗)\n95% 在說          程序的長期命中率        這一條的信念機率\n「真值95%機率在內」 ✗ 錯                  ✓ 對\n需要先驗嗎         不需要                 需要(這是代價)\n```\n\n兩個都對，只是回答的是不同問題、站在不同世界觀上。本書到這裡只點到為止——貝氏統計的完整方法（MCMC、共軛先驗那些）不在這本書的範圍，留給延伸閱讀。你只要記住：當有人理直氣壯說「真值有 95% 機率在這個信賴區間裡」，他要嘛講錯了，要嘛他其實在講一個貝氏可信區間卻沒發現自己偷換了世界觀（還偷偷塞了個先驗）。\n\n## 一句話：那 t 分布是什麼\n\n前面所有計算都偷偷用了一個假設：**樣本夠大**，所以中央極限定理生效、抽樣分布近似常態、可以用 1.96。\n\n那樣本很小怎麼辦？比如你只跑了 8 次壓測。這時常態近似不夠好，而且還有個麻煩：標準誤公式裡的母體標準差 σ 你不知道，得用樣本自己估，這個「估出來的標準差」在小樣本下自己也很不穩，會讓區間比常態算的更寬一點才誠實。\n\n解這個問題的分布叫 **t 分布（t-distribution）**，形狀像常態但尾巴更胖（反映「小樣本下我對自己的標準差估計也沒把握」這份額外的不確定）。它的故事很合這本書的調性：1908 年，一個在都柏林 Guinness 釀酒廠搞品管的人叫 **William Gosset**，天天面對小樣本（一批大麥、幾桶酒，常常只有十來個數據點），大樣本理論對他沒用。他推導出了這個小樣本的分布。但 Guinness 禁止員工具名發表（怕洩漏自家用統計做品管的商業機密），所以他用筆名「**Student**」投稿——這就是為什麼直到今天，全世界教科書上那個分布還叫「Student's t」，一個釀酒廠員工的化名（2026-06，多源確認；細節依 landscape）。\n\n本書對 t 分布只點到這裡。樣本一大（幾十以上），t 分布就趨近常態，1.96 又回來了，你前面學的全部適用。完整的 t 分布理論不在這本書的範圍。你只要知道：**小樣本時區間要更寬，而把「更寬多少」算對的那個分布，是個釀酒廠員工用化名發表的**。機率統計史就是這麼多賭徒、釀酒員和被反例打臉的數學家。\n\n## 直覺的陷阱\n\n信賴區間是人類直覺崩壞的重災區。把這些釘在牆上：\n\n| 你以為 | 其實 | 怎麼自我察覺 |\n|---|---|---|\n| 真值有 95% 機率落在這條區間裡 | 真值是常數、區間已固定，這一條要嘛中要嘛沒中。95% 是**程序**的長期命中率，不是這一條的機率 | 一聽到自己對「**這一條**算出來的區間」講「機率」，警報就該響——資料定了之後沒有隨機的東西可言 |\n| 95% 信賴＝有 95% 的資料點落在區間內 | 完全是兩回事。信賴區間講的是**參數（如平均）**在哪，不是個別資料點散布的範圍。資料散布範圍叫預測區間，是另一種東西，通常寬得多 | 你發現自己把「平均的不確定」和「個體的離散」混為一談時 |\n| ±2σ 就是 95% | 95% 對應的是 **±1.96σ**；±2σ 其實是 95.45%。差一點點但別寫錯 | 看到有人寫「2 個標準差 = 95%」，那是四捨五入後的口語，精確值是 1.96 |\n| 兩個信賴區間有重疊＝兩組沒有顯著差異 | 不一定。區間重疊不能直接推論差異不顯著，要看的是「差值」的信賴區間，不是兩條各自的區間重不重疊 | 你想用「目測兩條 bar 的誤差線有沒有碰到」下結論時 |\n| 增加樣本能讓區間想多窄有多窄、線性地窄 | 誤差跟 1/√n，不是 1/n。砍半要四倍樣本，再砍半要十六倍——越往後越貴 | 你以為「樣本加倍誤差就減半」時 |\n| 信賴區間保證涵蓋了真值 | 它只保證**長期 95% 的區間**涵蓋。你手上這條，有 5% 的機會（指程序層面）根本沒蓋到真值，你還渾然不知 | 你把「95% 信賴」當成「幾乎確定」時——5% 不是 0，二十條裡有一條會落空 |\n\n最後補一個常被忽略的致命前提：**這一切的前提是隨機抽樣**。如果你的樣本本身有偏（見 ch16 的 1936 Literary Digest 翻車），那信賴區間算得再漂亮都是垃圾——它只量「抽樣的隨機波動」這一種誤差，完全不量「你抽錯人」這種系統性偏誤。一個算到小數點後三位的窄區間，如果樣本是歪的，它只是「精確地錯」。誤差界小，不代表答案對。\n\n## 紙上推演\n\n### 推演題 1 — 四種讀法，只有一條對 **[15 分鐘] ★★**\n\n某民調報告：候選人 A 的支持率 95% 信賴區間是 [47%, 53%]。下面四種讀法，哪一條對？另外三條各錯在哪？\n\n1. 「A 的真實支持率有 95% 的機率落在 47% 到 53% 之間。」\n2. 「如果用同樣方法重複很多次民調，約 95% 的民調算出的區間會蓋住 A 的真實支持率。」\n3. 「95% 的受訪者支持率落在 47% 到 53% 之間。」\n4. 「A 的真實支持率有 95% 的機率正好是 50%（區間中點）。」\n\n口頭講出每條的判決與理由。\n\n#### 推演解答\n\n**只有第 2 條對。** 它正確地把 95% 綁在「程序／重複抽樣」上，講的是區間的長期命中率，不是某一條的機率。\n\n第 1 條——**全章的招牌錯誤**。真實支持率是固定的未知常數，不是隨機變數；[47%, 53%] 這條已經算出來、固定了。所以「真值在這條裡」這件事要嘛真要嘛假（機率 1 或 0），談「95% 機率」沒意義。隨機的是抽樣這個動作，不是真值。要能合法講這句話，你得換成貝氏可信區間，而且得先掏一個先驗出來。\n\n第 3 條——**把參數的不確定和資料的散布搞混了**。信賴區間講的是「A 的支持率（一個母體比例）」這個參數在哪，根本不是在描述受訪者怎麼散布。受訪者每個人不是「支持 47%」這種連續值，他要嘛支持要嘛不支持。這條根本是雞同鴨講。\n\n第 4 條——**把中點當成真值的最可能單點還加上機率**。50% 只是這次的點估計，它幾乎一定不等於真值；而且對「真值正好等於某個單點」談 95% 機率，同樣犯了把常數當隨機變數的錯（連續量取到任一單點的機率還是 0，雙重錯誤）。\n\n**常見錯路**：很多人會覺得第 1 和第 2 「不就一樣意思換句話說嗎」。不一樣。差別正是「機率綁在真值上（錯）還是綁在程序上（對）」。這個區別細到像在鑽牛角尖，但它是整套頻率派統計的地基——地基歪了，後面 ch18 的 p 值你會跟著一起誤讀。\n\n### 推演題 2 — 把誤差砍半要多少樣本 **[10 分鐘] ★★**\n\n某民調 n = 1000、誤差界 ±3.1%。老闆說：「我要誤差降到 ±1%。」需要多少樣本？先別急著算，先用 √n 直覺估，再驗算。\n\n#### 推演解答\n\n**直覺估**：誤差跟 1/√n。從 ±3.1% 到 ±1%，誤差要縮到約 1/3.1 ≈ 0.323 倍。誤差縮到 k 倍，n 要變 1/k² 倍。所以 n 要變約 (3.1)² ≈ 9.6 倍——大約 9600 人。\n\n**驗算**：要的誤差界 0.01 = 1.96 × √(0.25/n)。\n\n```text\n0.01 / 1.96 = √(0.25 / n)\n0.005102    = √(0.25 / n)\n0.005102²   = 0.25 / n\n0.00002603  = 0.25 / n\nn           = 0.25 / 0.00002603\n            ≈ 9604\n```\n\n約 **9604 人**。跟直覺估的 9600 對得上。\n\n**討論**：從 1000 到 9604——將近十倍的樣本，只換來誤差從 ±3.1% 到 ±1%。這就是 √n 的殘酷：精度的邊際成本平方往上爬。也是為什麼「再準一點」在實務上經常不值得——多花十倍的錢問十倍的人，得到的「更確定」對大多數決策根本沒差。你壓測時也是同一個取捨：跑到誤差夠小能拍板就停，不會為了第五位有效數字無限燒機器。\n\n### 推演題 3 — 脊椎硬幣再擲一輪 **[15 分鐘] ★★★**\n\n**這是 ch01 那枚硬幣**。前面我們擲 100 次得 60 正，95% 信賴區間是 [0.504, 0.696]，下界擦過 0.5。\n\n現在假設你不死心，又擲了 900 次，這 1000 次裡總共 600 次正面（比例還是 60%）。重算 95% 信賴區間。比例一樣是 60%，但結論的「力道」變了嗎？\n\n#### 推演解答\n\np̂ 還是 0.60，但 n 從 100 變 1000。標準誤：\n\n```text\nSE = √( 0.60 × 0.40 / 1000 )\n   = √( 0.24 / 1000 )\n   = √0.00024\n   = 0.015492...           ← 約 0.0155\n```\n\n誤差界：\n\n```text\n1.96 × 0.0155 = 0.03037 ≈ 0.030   ← ±3.0%\n```\n\n信賴區間：\n\n```text\n0.60 ± 0.030 = [0.570, 0.630]\n```\n\n**對照**：\n\n```text\n            p̂      區間                  0.5 在區間內？\n60/100     0.60   [0.504, 0.696]        勉強擦邊在外(0.5 < 0.504)\n600/1000   0.60   [0.570, 0.630]        0.5 遠在區間外(差了 7 個百分點)\n```\n\n**同樣 60% 的比例，結論的力道天差地別。** 100 次那組，0.5 幾乎擦著下界——你很難理直氣壯說「這硬幣不公正」，因為公正（0.5）就在門檻邊上晃。但 1000 次這組，0.5 被甩出區間整整 7 個百分點之外，區間窄到 [0.570, 0.630]，公正硬幣的世界（p=0.5）離這個區間遠得很。同樣的偏離比例，n 大十倍，你的把握強得多。\n\n**埋的伏筆**：「0.5 在不在 95% 信賴區間裡」這個問題，下一章（見 ch18）會用假設檢定（hypothesis testing）的語言重講一遍——「在 0.05 顯著水準下能不能拒絕『硬幣公正』」。60/100 那組剛好卡在 0.05 的兩側微微搖晃（換個算法就跨過門檻），而 600/1000 那組會給出一個小到不行的 p 值。**比例不變、樣本變大，顯著性被放大**——這是 ch18 最重要的一課，而你現在已經從信賴區間這一側先看到它的影子了。同一枚硬幣，又懂了一層。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 標準誤是什麼的標準差？它跟「母體個體的標準差」差在哪？為什麼差了一個 √n？\n2. 民調 ±3% 那個 3% 是怎麼算出來的？為什麼算的時候用 p=0.5？為什麼它跟全國有兩億人無關？\n3. 「真值有 95% 機率落在這個信賴區間裡」這句話錯在哪？用「拋圈圈套木樁」講給一個堅信這句話的同事聽，他要怎樣才會點頭？\n4. 95% 到底是在描述什麼東西的什麼性質？（提示：不是「這一條」，是某個更大的東西。）\n5. 把誤差砍半要付出什麼代價？為什麼是這個代價而不是「樣本加倍」？這跟你「多跑幾次 benchmark 降噪」是同一條定律嗎？\n6. 貝氏的可信區間為什麼**可以**合法地說「真值有 95% 機率在內」？它付出的代價是什麼？\n7. 一個算到 ±0.5% 的超窄信賴區間，有沒有可能整個是錯的？什麼情況下會這樣？（提示：區間只量哪一種誤差、不量哪一種？）\n8. 60/100 和 600/1000 同樣是 60% 正面，為什麼後者讓你對「硬幣不公正」有把握得多？\n\n## 延伸閱讀\n\n- **奈曼信賴區間誤讀**：Hoekstra et al.「Robust misinterpretation of confidence intervals」（2014, Psychonomic Bulletin & Review）——實測學生**與研究者**都系統性誤讀信賴區間的經典研究，看你不孤單。配 PMC 上「Continued misinterpretation of confidence intervals」（landscape 引的那篇）一起讀，把「為什麼這麼難改正」講透。\n- **Neyman 1937 原始定義**：Wikipedia「Neyman construction」條目——想看信賴區間怎麼從「對所有真值都成立的程序」這個量詞結構長出來的，這條把建構講得最乾淨；也有 Friedman 軼事的脈絡。\n- **Gosset 的故事**：The Conversation「The genius at Guinness and his statistical legacy」——釀酒廠、化名 Student、小樣本問題的來龍去脈，讀它配一杯黑啤最對味。\n- **可信區間 vs 信賴區間**：Wikipedia「Credible interval」——想把貝氏那一側（「真值 95% 機率在內」為什麼在貝氏合法、代價是先驗）補完，從這條入門，再跳延伸的貝氏方法。\n- **回到本書**：信賴區間是 ch16 抽樣大膽的「誠實度量」，是 ch18 假設檢定的另一面（同一套機器、不同按法）。讀完 ch18 再回來看本章脊椎硬幣那個 [0.504, 0.696]，你會發現它跟 p≈0.05 是同一件事。\n"}, {"id": "ch18-hypothesis-testing", "file": "ch18-hypothesis-testing.md", "group": "Part V — 統計推論", "title": "ch18 — 假設檢定與 p 值：證據強到什麼程度才算數", "md": "# ch18 — 假設檢定與 p 值：證據強到什麼程度才算數\n\n> **本章解決什麼問題**：ch17 教你誠實地說「我估的值大概在這個範圍」。這章往前一步問一個更尖銳的問題——當你手上有一組看起來「不太對勁」的資料（某枚硬幣好像偏了、某個 A/B 版本好像比較好），證據要強到什麼程度，你才有資格說「這不是雜訊，是真的」？假設檢定（hypothesis testing）就是統計學給這個問題的答案，而 p 值就是它的核心儀表。本章也會告訴你：這套儀表全世界天天在用，也天天被讀錯——p 值幾乎是整個統計學最常被誤解的一個數字。下一章（ch19）會接著示範，當人類的誘因撞上這台美麗的機器，它如何系統性地生產假發現。\n\n## 從你已知的出發\n\n你早就在做假設檢定了，只是沒給它取名字。\n\n想一個場景：你上了一個新版本，A/B test 跑了一週，新版的轉換率是 12.3%，舊版是 11.8%。產品經理跑來問你：「這 0.5% 是真的提升，還是雜訊？」\n\n你心裡那套思考流程，幾乎一字不差就是假設檢定：\n\n- 你會先假設「其實兩版一樣，沒有差別」——這就是**虛無假設（null hypothesis）**。\n- 然後你問：「如果兩版真的一樣，那我這週剛好量到 0.5% 差距的機會有多大？」——這就是 **p 值**在問的事。\n- 如果這個機會小到很離譜（比如萬分之一），你會說：「好吧，『兩版一樣』這個前提大概站不住，我相信新版真的比較好。」——這就是**拒絕虛無假設**。\n- 如果這個機會其實不小（比如三成），你會聳聳肩說：「這差距完全可能是運氣，再多跑幾天吧。」——這就是**無法拒絕虛無假設**。\n\n你看 dashboard 也是同一回事。一個尖峰跳出來，你的第一個反應不是「天啊出事了」，而是「這是異常，還是正常波動的範圍內？」——你腦中默默有一條「正常該長什麼樣」的基準線，然後判斷眼前這根尖峰離基準線「離譜」到什麼程度。離譜到一個你願意半夜爬起來查的程度，你才動。這條基準線就是虛無假設，這個「離譜程度」就是 p 值的精神。\n\n問題在於——而這也是本章真正要講的——**這套思考方式有一個你幾乎一定踩過的坑**。當 PM 問「這 0.5% 是真的嗎」，他真正想知道的是「新版比較好的機率有多高」。但 p 值**回答的不是這個問題**。p 值回答的是一個方向相反、長得很像、但意思天差地別的問題。這個錯位，是統計學史上最昂貴的誤會之一。我們慢慢拆。\n\n這枚要被檢定的硬幣，就是 ch01 那枚硬幣。它一路從古典機率 1/2、期望值、二項分布、大數法則走到這裡。現在我們要對它做一件以前沒做過的事：**質問它公不公正**。\n\n## 反證法的機率版：先假設清白，再看資料多離譜\n\n假設檢定的骨架，是一個你在數學課上見過的老朋友——**反證法**。\n\n反證法怎麼證「√2 是無理數」？你先假設它**是**有理數，然後一路推導，推到一個矛盾（既是偶數又是奇數之類），於是回頭說：剛才那個假設錯了，√2 不是有理數。\n\n假設檢定是反證法的機率版本，差別在於它推不出「邏輯矛盾」，只能推出「機率上的尷尬」。流程是這樣：\n\n```text\n1. 立一個你想推翻的假設            → 虛無假設 H₀（例：這枚硬幣公正）\n2. 暫時假裝 H₀ 是真的\n3. 在「H₀ 為真」的世界裡，問：\n   我實際觀察到的這組資料（或更極端的），\n   出現的機率有多大？                → 這個機率就是 p 值\n4. 如果這機率小到很尷尬             → 拒絕 H₀（資料跟 H₀ 不相容）\n   如果這機率不算小                 → 無法拒絕 H₀（資料跟 H₀ 還算合得來）\n```\n\n第 4 步跟邏輯反證法有個關鍵的不同，這個不同你要刻在心裡：**機率版的反證法永遠不會給你確定性**。邏輯反證法推出矛盾，你 100% 確定原假設錯了。機率版只能說「在 H₀ 的世界裡，這麼極端的資料很罕見」——罕見不等於不可能。罕見的事天天在發生（畢竟每天都有人中樂透）。所以你拒絕 H₀ 的時候，永遠帶著一個你願意承擔的「萬一冤枉了它」的風險。這個風險後面會正式登場，叫型一錯誤。\n\n這裡先講清楚兩個對手：\n\n- **虛無假設 H₀（null hypothesis）**：通常是「沒有效果」「沒有差別」「一切照舊」的那個無聊版本。硬幣公正、新藥無效、兩版 A/B 一樣。它叫「虛無」就是這個意思——它代表「沒事發生」。它也是被告，預設清白。\n- **對立假設 H₁（alternative hypothesis）**：「有效果」「有差別」的那個有趣版本。硬幣偏了、新藥有效、新版更好。它是你心裡其實想證明的東西，但你**不直接證明它**，你透過推翻 H₀ 來間接支持它。\n\n為什麼要繞這一圈，不直接證明「硬幣偏了」？因為「偏了」太模糊——偏多少？偏向哪邊？沒法算機率。而「公正」是一個**精確的數學陳述**（P(正)=0.5），精確到你可以在它的假設下算出每種結果的機率。你需要一個立場明確的靶子才打得中。H₀ 就是那個靶子。這是一種很工程師的智慧：你沒法證明「系統沒 bug」，但你可以假設「這段邏輯是對的」，然後找一個反例打爆它。找不到反例不代表沒 bug，但找到了就一翻兩瞪眼。假設檢定就是在找統計版的反例。\n\n## p 值的精確定義：它在量什麼，以及它絕對不是什麼\n\n現在進入本章最重要、也最容易被讀錯的一頁。請你在這裡停五分鐘，因為你的直覺正要騙你。\n\n**p 值的精確定義**：\n\n```text\np 值 = P(觀察到「至少這麼極端」的資料 | H₀ 為真)\n```\n\n把它逐字唸出來（本書驗收靠口述，這句你要能背）：「假設虛無假設是真的，在那個世界裡，純粹靠隨機，跑出跟我手上這組一樣極端、或更極端的資料的機率。」\n\n注意這個定義裡的每一個零件：\n\n- **條件在 H₀ 上**：那條直線 `|` 後面是 `H₀ 為真`。整個機率是在「假裝 H₀ 成立」的前提下算的。\n- **「至少這麼極端」**：不是「剛好這組資料」的機率（那通常趨近於 0，沒意義），而是「這組資料**或更誇張的**」全部加起來。為什麼是「或更誇張的」？因為你在問「資料離 H₀ 預測的中心有多遠」，越遠越是 H₀ 的反證，所以你要把「跟我一樣遠或更遠」的所有情況都算進來。\n- **它是一個關於資料的機率，不是關於假設的機率**：這是整個誤會的根源。\n\n現在講 p 值**不是**什麼。Landscape 裡 ASA（美國統計學會）2016 年那份著名聲明，核心就是在糾正這些誤讀。我把最致命的五個列出來——這五個你只要記住一句反例就能自我察覺：\n\n```text\n誤讀                                    為什麼錯                                    一句反例\n─────────────────────────────────────────────────────────────────────────────────\n① p 值 = P(H₀ 為真)                     方向反了。p 值是 P(資料|H₀)，          P(下雨|地濕) ≠ P(地濕|下雨)。\n   「H₀ 為真的機率只有 5%」              不是 P(H₀|資料)。要把後者算出來          灑水車也會讓地濕。\n                                        得用貝氏，還得有先驗。\n② p 值 = 「結果純屬偶然的機率」          這句偷渡了 P(偶然)。p 值已經          你不能用一個假設 H₀ 為真\n   「這結果有 95% 不是偶然」             假設了偶然（H₀），它算的是              算出的數，回頭去說 H₀\n                                        「在偶然之下資料多罕見」                 本身有多可能。\n③ 1−p = 「對立假設為真的機率」          同①的變體。p 跟 H₁ 的機率              p=0.04 不代表「H₁ 有 96%\n   「p=0.04，所以有 96% 是真效果」       沒有這種算術關係。                       為真」。完全沒這回事。\n④ p 值 = 「重做一次會再顯著的機率」       p 值不預測複現率。複現率              小 p 值跟「下次也會小」\n                                        牽涉效果大小與檢定力，是另一回事。       是兩件事（見 ch19 複現危機）。\n⑤ p > 0.05 = 「H₀ 被證明為真」          沒拒絕 ≠ 證明清白。可能只是            法庭判「無罪」是「證據不足」，\n   「不顯著，所以兩版一樣」              你樣本太小、檢定力不夠，沒抓到。         不是「證明他沒做」。\n```\n\n第①個是核心中的核心，值得單獨講。它就是 ch05 那個**檢察官謬誤**（prosecutor's fallacy）換了件衣服。檢察官說：「如果他是清白的，這個 DNA 吻合的機率只有百萬分之一，所以他清白的機率只有百萬分之一。」——他把 `P(證據|清白)` 偷換成 `P(清白|證據)`。p 值的誤讀①是一模一樣的偷換：把 `P(資料|H₀)` 講成 `P(H₀|資料)`。\n\n為什麼這兩個天差地別？回想 ch05：要從 `P(資料|H₀)` 翻到 `P(H₀|資料)`，你需要貝氏定理，而貝氏定理需要一個**先驗**——H₀ 在你看資料之前有多可能為真。p 值裡完全沒有這個先驗。它根本沒辦法告訴你 H₀ 的機率，因為它從頭到尾都站在「H₀ 為真」的假設裡面算東西。一個假設 H₀ 為真而算出來的數，邏輯上不可能反過來評斷 H₀ 自己有多可能為真——這是循環。\n\n我認為這是整本書裡「人類集體誤解一個數學物件」最嚴重的一個案例。p 值是個老實的數字，它只說「在 H₀ 的世界裡資料有多罕見」，僅此而已。是人類硬要它回答「H₀ 到底對不對」這個它答不了的問題。\n\n## 顯著水準 α、兩種錯誤、與檢定力\n\n到目前為止 p 值只是一個「資料有多罕見」的連續刻度。但實務上你終究要做決定：拒絕還是不拒絕？這需要一條線。這條線叫**顯著水準（significance level）α**。\n\nα 是你**事先**畫好的門檻。慣例上 α=0.05。規則很簡單：p < α 就拒絕 H₀，否則不拒絕。\n\n但這條線不是天上掉下來的，它對應的是一個你願意承擔的風險。這就帶出 Neyman 跟 Pearson 1933 年那套框架（照 landscape）的核心貢獻——他們指出，你做這種二元決定時，會犯**兩種方向相反的錯**：\n\n```text\n                        真實世界（你不知道，這是上帝視角）\n      ┌─────────────┬─────────────────┬─────────────────┐\n      │             │  H₀ 其實為真    │  H₀ 其實為假    │\n      │             │  （硬幣真公正） │  （硬幣真偏了） │\n┌─────┼─────────────┼─────────────────┼─────────────────┤\n你的  │ 拒絕 H₀     │  型一錯誤 ✗     │  正確 ✓         │\n決定  │ （說它偏了）│  （冤枉好幣）   │  （抓到了）     │\n      │             │  機率 = α       │  機率 = 檢定力  │\n├─────┼─────────────┼─────────────────┼─────────────────┤\n      │ 不拒絕 H₀   │  正確 ✓         │  型二錯誤 ✗     │\n      │ （說沒證據）│                 │  （放走壞幣）   │\n      │             │                 │  機率 = β       │\n└─────┴─────────────┴─────────────────┴─────────────────┘\n```\n\n- **型一錯誤（Type I error）**：H₀ 其實是真的，你卻拒絕了它。冤枉一枚清白的硬幣。它的機率就是 α——你設 α=0.05，意思是「我願意接受長期下來每 20 次冤枉清白硬幣 1 次的風險」。**α 是你自己選的容錯率，不是算出來的。**\n- **型二錯誤（Type II error）**：H₀ 其實是假的，你卻沒拒絕。放走了一枚真的偏了的硬幣。它的機率叫 β。\n- **檢定力（power）= 1−β**：當 H₀ 真的是錯的時候，你成功抓到的機率。一個檢定力高的檢定，是一隻嗅覺靈敏的狗——真有偏差時牠叫得出來。\n\n這兩種錯有個你做系統設計時超熟悉的張力：**它們互相拉扯**。你把 α 壓得很低（很不願意冤枉好幣，門檻設得超嚴），代價是你也更容易放走壞幣（β 變大、檢定力下降）。這完全就是你在調告警閾值時的兩難——閾值設太敏感，半夜被假警報吵醒（型一）；設太鈍，真出事時沒人叫你（型二）。沒有兩全其美，只有「你比較怕哪一種錯」。Neyman–Pearson 的洞見就是把這個取捨**正式量化**：固定一個你能接受的 α，然後去找在這個約束下檢定力最大的檢定。\n\n這裡藏著本章一個容易滑過去的深刻點：**β 沒辦法只靠 H₀ 算出來**。要算「放走壞幣的機率」，你得先說「壞幣到底有多壞」（偏到 0.55 還是 0.7？）。離 0.5 越遠的偏差越好抓，檢定力越高。所以檢定力永遠是「對某個特定大小的真實效果」而言的。這也是為什麼「沒拒絕 H₀」幾乎從來不能當成「H₀ 為真」——你可能只是拿著一隻感冒鼻塞的狗去聞一個很淡的味道（樣本太小、效果太微，檢定力低），牠沒叫不代表沒味道。\n\n## 兩個吵架的爸爸：Fisher 對上 Neyman–Pearson\n\n你現在學的這套東西，其實是一場沒打完的架的停火協議。它有兩個爸爸，理念並不相容，而你課本上學到的是被硬湊在一起的混血版。這段是 landscape 特別交代的史實，值得講清楚，因為它解釋了為什麼這套東西用起來總有點精神分裂。\n\n**爸爸一號：Fisher（費雪）**。他是 p 值跟「顯著性」的推手（《Statistical Methods for Research Workers》1925、《The Design of Experiments》1935，照 landscape）。Fisher 的哲學是：p 值是一個**連續的證據強度刻度**。p=0.001 比 p=0.04 是強得多的證據。你不是在做機械式的「過/沒過」決定，你是在「衡量這份資料對 H₀ 的不利程度」，然後用你的科學判斷來解讀。對 Fisher 來說，根本沒有 H₁、沒有 β、沒有檢定力這套東西——他只關心 H₀ 跟手上的資料合不合得來。著名的「女士品茶」實驗（landscape 有，虛無假設下全猜對機率 1/70）就是 Fisher 的招牌示範。\n\n**爸爸二號：Neyman 跟 Pearson（奈曼與皮爾森）**。他們覺得 Fisher 那套太含糊——「用判斷解讀」是什麼意思？他們要的是一套能在**長期**保證錯誤率的**決策程序**。於是有了 H₁、α、β、檢定力、「拒絕/不拒絕」。對他們來說，p 值具體是多少不重要，重要的是它有沒有跨過你**事先**定的 α 線；你不是在「衡量證據」，你是在「做一個長期下來型一錯誤率不超過 α 的決定」。p=0.001 跟 p=0.04 對他們沒差別——都是「< 0.05，拒絕」，僅此而已。\n\n兩人吵得很兇，吵了一輩子，沒和解。然後發生了一件有點荒謬的事：**統計教科書把兩套縫在了一起**，變成今天大家學的「虛無假設顯著性檢定」（NHST）。它借了 Fisher 的 p 值跟「顯著」這個詞，又借了 Neyman–Pearson 的 α、型一型二錯誤——但這兩套的哲學其實打架。於是你得到一個自我矛盾的怪物：\n\n- 一邊（Fisher 的影子）鼓勵你把 p 值當連續證據看、報告精確的 p 值；\n- 另一邊（Neyman–Pearson 的影子）又要你拿它去跟 0.05 比、做二元的「顯著/不顯著」宣判。\n\n這就是為什麼這套東西用起來總覺得哪裡怪怪的——它確實怪，它是一場停火協議的產物，不是一個人想清楚的設計。你不是笨，你只是繼承了兩個爸爸沒談攏的家務事。\n\n## p < 0.05：一個約定，不是天律\n\n承上，那條把世界切成「顯著」與「不顯著」的 0.05 線，到底神聖嗎？\n\n不神聖。它是一個約定，而且連提出它的人都沒當它是鐵律。\n\nFisher 1925 年確實寫過：P=0.05（也就是 1/20）對應到常態分布的 1.96 個標準差，約等於 2，「**取這個點當判斷顯著與否的方便界限是方便的**」（照 landscape，我查證過原文用詞）。關鍵字是「方便（convenient）」。在那個沒有電腦、查表全靠手的年代，1.96≈2 個標準差是個好記好查的圓整數，如此而已。\n\n更關鍵的是，Fisher 本人**明說這條線是可以動的**。他寫過（landscape 記載）：如果 1/20 的勝算不夠你放心，「我們可以改畫在 1/50（2%）或 1/100（1%）」。換句話說，**0.05 在 Fisher 眼裡是慣例與起點，不是真假二分的天律**。把「p<0.05 就是真、p>0.05 就是假」當成 Fisher 訂的鐵規矩，是個徹底的誤解。⚠️ 這點 landscape 特別標記，因為它是最常被講錯的統計史實之一。\n\n我覺得這件事的荒謬之處在於：人類拿了一個發明者明說「隨便、方便而已、你高興可以改」的數字，把它供成了一條決定論文能不能發表、新藥能不能上市、職涯能不能升等的神聖門檻。0.049 是「發現」，0.051 是「沒東西」——彷彿宇宙在 0.05 這個點有個物理斷層。沒有。它就是一個四捨五入到約等於 2 個標準差的方便數字。下一章你會看到，這條武斷的線如何直接餵養了整場複現危機。\n\n## Worked example：脊椎硬幣——卡在 0.05 兩側的那枚幣\n\n現在把上面所有零件組裝起來，對 ch01 那枚硬幣做一次完整的檢定。**這是基準題，全書一致。** 全程紙筆手算，我會逐步交叉驗算。\n\n**場景**：你懷疑一枚硬幣偏了。你擲了 100 次，出現 **60 次正面**。這枚硬幣公正嗎？\n\n### 第一步：立假設\n\n```text\nH₀（虛無）：硬幣公正，P(正) = 0.5    ← 被告，預設清白\nH₁（對立）：硬幣不公正，P(正) ≠ 0.5  ← 雙尾，因為「偏了」可能偏向任一邊\n```\n\n注意 H₁ 是「≠」不是「>」。我們事先沒理由認定它偏向正面，所以「偏向反面」（比如 40 正）也算反證。這叫**雙尾檢定（two-tailed test）**——稍後算 p 值時，兩邊的極端都要算進去。\n\n### 第二步：在 H₀ 的世界裡，這組資料該長什麼樣？\n\n假裝 H₀ 為真。那麼正面數 X ~ Binomial(100, 0.5)。這個分布的期望與標準差（直接回收 ch09、ch11 的基準）：\n\n```text\n期望  E[X] = n·p       = 100 × 0.5        = 50\n變異  Var  = n·p·(1−p) = 100 × 0.5 × 0.5  = 25\n標準差 σ   = √25                          = 5\n```\n\n所以如果硬幣公正，正面數「應該」在 50 附近，典型抖動幅度約 ±5。我們觀察到 60，比中心高了 10，也就是 **2 個標準差**。直覺上：有點遠，但遠到該定罪嗎？這正是 p 值要量的。\n\n### 第三步：算 p 值——方法 A，常態近似\n\nCLT（ch14）告訴我們，n=100 夠大，Binomial(100, 0.5) 已經很接近常態。我們把觀察值標準化成 z 分數（ch15 的工具）：\n\n```text\nz = (觀察值 − 期望) / σ = (60 − 50) / 5 = 10 / 5 = 2.0\n```\n\nz=2.0。現在問：在標準常態下，跑出「離中心 2 個標準差或更遠」的機率多大？這是雙尾，所以兩邊都要：\n\n```text\n單尾  P(Z ≥ 2.0) = 1 − 0.97725 = 0.02275     ← 查標準常態表，2σ 右尾\n雙尾  p = 2 × 0.02275 = 0.0455 ≈ 0.046\n```\n\n交叉驗算一下這個 0.02275 是否可信：68-95-99.7 法則（ch15 基準）說 ±2σ 內約 95.45%，所以雙尾外側共 4.55%，單邊 2.275%。✓ 完全對得上。\n\n**常態近似給的 p ≈ 0.046**。它小於 0.05。照慣例，**拒絕 H₀**，宣判這枚硬幣偏了。\n\n### 第四步：算 p 值——方法 B，精確二項\n\n但 CLT 是個近似。Binomial 是離散的（X 只能是整數），常態是連續的，這個近似在邊界附近會有點誤差。我們直接算精確的二項機率，看會不會不一樣。雙尾的精確 p 值是：\n\n```text\np = P(|X − 50| ≥ 10) = P(X ≥ 60) + P(X ≤ 40)\n```\n\n由對稱性（p=0.5 的二項對 50 完全對稱），兩尾相等：\n\n```text\np = 2 × P(X ≥ 60) = 2 × Σ(k=60→100) C(100,k) × (0.5)¹⁰⁰\n```\n\n這個和要把 C(100,60)、C(100,61)、…、C(100,100) 全部除以 2¹⁰⁰ 加起來——41 項，純手算會算到天荒地老，不是本書要你做的事。但它的值可以查累積二項表，也是一個有名的數：\n\n```text\nP(X ≥ 60) ≈ 0.02844\n雙尾  p = 2 × 0.02844 ≈ 0.0569 ≈ 0.057\n```\n\n**精確二項給的 p ≈ 0.057**。它**大於 0.05**。照同一個慣例，**無法拒絕 H₀**，宣判證據不足。\n\n### 第五步：盯著這兩個數字看\n\n```text\n┌──────────────────┬─────────┬───────────────┐\n│ 算法             │  p 值   │  對 α=0.05    │\n├──────────────────┼─────────┼───────────────┤\n│ 常態近似（方法A）│  0.046  │  < 0.05 拒絕  │  ← 「硬幣偏了！」\n│ 精確二項（方法B）│  0.057  │  > 0.05 不拒絕│  ← 「證據不足」\n└──────────────────┴─────────┴───────────────┘\n```\n\n**同一枚硬幣、同一組資料（60/100）、同一個門檻（0.05），只是換了個算 p 值的方法，結論就從「有罪」翻成「無罪」。**\n\n請你在這裡停下來。這不是哪個方法算錯了——兩個都對，常態近似本來就只是近似（如果你做連續性校正，z=(59.5−50)/5=1.90，雙尾 p≈0.057，就跟精確值幾乎吻合了，這也順便證明精確值才是對的）。問題在於 0.046 跟 0.057 這兩個數字，在「證據強度」這個真實的尺度上，**幾乎一模一樣**。它們講的是同一件事：「如果硬幣公正，跑出這麼極端的資料機率大約 5%-6%。」一個理性的人看這兩個數字，反應應該完全相同。\n\n但 0.05 這條線硬生生從它們中間切過去，把兩個實質相同的證據，判成了相反的結論。這就是 0.05 武斷性最赤裸的展示——**它把一個連續的證據刻度，砍成了一個非黑即白的宣判，而砍的位置剛好落在你的資料上時，整件事的荒謬就暴露了**。0.046 跟 0.057 之間沒有任何質變，只有 0.05 這個約定假裝那裡有。\n\n這就是我要你從這枚硬幣帶走的震撼：**統計顯著性不是資料的性質，有一部分是門檻的性質**。你以為自己在報告「硬幣偏了」這個客觀事實，其實你報告的是「資料的極端程度 vs 一條人訂的線」的相對位置。線挪一點，事實就變了——這聽起來像在說事實會變，正是它讓人不安的地方。\n\n## 統計顯著 ≠ 實際重要：樣本量如何放大顯著性\n\n上面那枚硬幣還埋了第二個陷阱，跟第一個方向相反但同樣致命。我們把樣本量放大來看。\n\n**對照場景**：另一枚硬幣，你擲了 **1000 次，出現 600 次正面**。比例一樣是 60%。它的 p 值跟 60/100 比，差多少？\n\n重算一遍。H₀ 下，X ~ Binomial(1000, 0.5)：\n\n```text\n期望  E[X] = 1000 × 0.5        = 500\n變異  Var  = 1000 × 0.5 × 0.5  = 250\n標準差 σ   = √250              ≈ 15.811\n```\n\n觀察值 600，標準化：\n\n```text\nz = (600 − 500) / 15.811 = 100 / 15.811 ≈ 6.32\n```\n\nz≈6.32。對照剛才 60/100 的 z=2.0——**同樣是 60% 的正面比例，z 分數從 2.0 暴衝到 6.32**。雙尾 p 值呢？\n\n```text\nP(Z ≥ 6.32) ≈ 1.3 × 10⁻¹⁰\n雙尾  p ≈ 2.6 × 10⁻¹⁰   ← 約百億分之 2.6\n```\n\n從 0.057（卡在門檻邊緣，無法定罪）變成 0.00000000026（極度顯著，鐵證如山）。**比例完全沒變，只是樣本從 100 變成 1000，p 值就垮了十個數量級。**\n\n為什麼？因為 z 分數裡的 √n 在作怪（回收 ch09 的 √n 法則、ch16 的標準誤）。同樣 60% 的比例，偏離 0.5 的「幅度」一樣是 0.1，但這個幅度要除以標準誤 σ/√n——n 越大，標準誤越小，同樣的幅度就顯得越「多個標準差」。樣本量是顯著性的放大器。\n\n這推到極端，會得到一個你務必內化的結論：**只要樣本夠大，任何微不足道的差異都能變得「統計顯著」**。\n\n想像一枚硬幣其實偏了一點點，P(正)=0.5001——這偏差小到完全沒有實際意義，你絕對不會在乎。但只要我擲夠多次（幾億次），這個 0.0001 的偏差除以一個極小的標準誤，z 分數照樣能爆表，p 值照樣能小到嚇人，照樣「拒絕 H₀」、照樣「統計顯著」。\n\n這就是**統計顯著（statistically significant）≠ 實際重要（practically significant）**。p 值小，只告訴你「這個差異很可能不是零」；它**完全沒告訴你**這個差異「有多大」、「值不值得你在乎」。回到開頭那個 A/B test：\n\n- 「p<0.001，新版顯著提升轉換率」——聽起來該上線了吧？\n- 但如果提升只有 0.03%（因為你樣本量是兩千萬，連 0.03% 都能壓出極小的 p 值），那這個「顯著」的提升，乘上你的流量，可能一年多賺不到一杯咖啡的錢，卻要你維護一條新的程式碼路徑。\n\n**p 漂亮不代表值得上線。** p 值管「是不是雜訊」，效果大小（effect size）管「值不值得」。一個只看 p 值就拍板上線的決策，跟一個只看 CPU 使用率 100% 就無腦擴容、卻不看那是不是一個跑完就結束的批次任務的工程師，犯的是同一種錯：盯著一個儀表，忘了它到底在量什麼。\n\n所以你手上其實有兩個方向相反的陷阱，它們是同一枚硬幣的兩面：\n\n```text\n樣本太小  →  真有效果也可能 p>0.05（檢定力不足，放走壞幣，型二錯誤）\n樣本太大  →  屁大的效果也能 p<0.05（顯著但沒意義，被雜訊牽著走）\n```\n\n健康的判斷永遠是兩件事一起看：**p 值說「這像不像真的」，效果大小說「就算是真的，我該在乎嗎」。** 缺一個，你都會做出蠢決定。\n\n## 直覺的陷阱\n\n機率是人類直覺最常崩壞的地方，而 p 值是這個崩壞地帶的正中央。把這張表貼在你下次看 A/B 報告的螢幕旁邊。\n\n```text\n陷阱                          錯誤直覺把你帶去哪              怎麼自我察覺（什麼徵兆代表你沒懂）\n──────────────────────────────────────────────────────────────────────────────────────\n檢察官謬誤 / 誤讀①            「p=0.03，所以 H₀ 為真的         你開口說出「⋯⋯為真的機率」「⋯⋯\n（p 值的方向倒反）            機率只有 3%」。把 P(資料|H₀)     是偶然的機率」這種句子。p 值後面\n                             講成 P(H₀|資料)。               永遠接「資料」，不接「假設」。\n                                                            想講假設的機率？那要貝氏跟先驗。\n\n把 0.05 當物理常數            「0.049 是發現，0.051 沒東西」。 你對 0.049 跟 0.051 的反應天差地別，\n                             以為門檻那裡有真實的斷層。       卻對 0.04 跟 0.06 沒感覺——那條線\n                                                            在你腦中比資料還真實，就是中毒了。\n\n統計顯著 = 實際重要           看到「p<0.001 顯著」就準備       你報告/聽報告時只講 p 值，從不問\n（忘了問效果多大）            上線/寫進結論，不問效果量。      「提升幾 %？」「差多少？」。樣本\n                                                            很大時尤其危險。\n\n沒拒絕 = 證明 H₀ 為真         「p=0.3 不顯著，所以兩版一樣 /   你把「沒抓到」當「沒有」。先問\n（誤讀⑤）                    這藥沒效 / 沒有差別」。          檢定力夠不夠、樣本夠不夠大。鼻塞\n                                                            的狗沒叫，不代表沒味道。\n\np-hacking 的前奏              算出 0.06 不甘心，多收一點資料   你在「看到 p 值之後」才決定要不要\n（多看、多試、見獵心喜停止）   /換個算法/換個子群，湊到 0.04。  繼續收資料、換分析法。α=0.05 的\n                                                            保證在你這樣做的瞬間就失效了。\n                                                            （完整的崩壞機制見 ch19）\n```\n\n最後一個陷阱是通往 ch19 的橋。我們的脊椎硬幣已經親口示範過它的種子了：60/100 用兩種算法得到 0.046 跟 0.057。如果你是個「希望硬幣偏了」的研究者，你會報哪一個？人在面對 0.05 這條線時，會不自覺地往對自己有利的那邊偏——選方法、選樣本停在哪、選要不要再多擲 100 次。每一個選擇單獨看都「合理」，加起來就是 p-hacking。一台中立的機器，配上有立場的操作者，系統性地生產假發現——這就是下一章的主題。\n\n## 紙上推演\n\n### 推演題 1 **[15 分鐘]** ★★\n\n把下面這句話拿去問五個工程師，至少四個會講出某種版本的錯誤讀法：「**這個 A/B test 的 p 值是 0.03。**」請你寫出針對這個 p=0.03 的**五種常見錯誤讀法**，並各自改成正確的一句話。\n\n#### 推演解答\n\n```text\n錯誤讀法                                正確的更正\n────────────────────────────────────────────────────────────────────────\n①「H₀（兩版一樣）為真的機率是 3%。」     p=0.03 是「假設兩版一樣，純靠運氣跑出\n                                       這麼大或更大差距的機率是 3%」。它是\n                                       P(資料|H₀)，不是 P(H₀|資料)。後者要貝氏。\n\n②「這結果有 97% 不是偶然 / 有 97%       p 值不給你「是不是偶然」的機率——它整個\n   是真效果。」                         就建立在「假設它是偶然（H₀）」之上。1−p\n                                       不是「真效果的機率」，這算術關係不存在。\n\n③「重做一次，有 97% 機率還會顯著。」     p 值不預測複現率。複現機率取決於真實\n                                       效果大小與檢定力，是另一個量。p=0.03 的\n                                       研究複現率可能遠低於 97%（見 ch19）。\n\n④「這個提升很重要 / 值得上線。」         p 值只說「像不像真的」，不說「有多大」。\n                                       要看效果大小（提升幾 %）。大樣本下 0.03\n                                       甚至 0.001 都可能對應到沒意義的微小差異。\n\n⑤「如果 p 是 0.07，就證明兩版一樣。」    沒跨過門檻 ≠ 證明 H₀。可能只是樣本太小、\n                                       檢定力不足，沒抓到真實存在的差異。「沒拒絕」\n                                       是「證據不足」，不是「無罪確定」。\n```\n\n**為什麼這樣想**：①是檢察官謬誤（方向倒反），是萬惡之源，先抓它。②③④⑤分別對應 ASA 五大誤讀。共通的自我察覺法：每次你想用 p 值講一句關於「假設對不對」或「效果重不重要」的話，停一下——p 值只認得「在 H₀ 下，資料有多罕見」這一件事，越界的話它都不負責。\n\n### 推演題 2 **[10 分鐘]** ★★\n\n用你自己的話，跟一個工程師解釋：「**為什麼樣本夠大的時候，幾乎什麼差異都會變得統計顯著？**」不准用公式，但要講到 √n 的直覺。然後回答：這對你做 A/B test 的實務有什麼警告？\n\n#### 推演解答\n\n**白話版**：p 值在問「我量到的差距，跟『純雜訊該有的抖動』比起來，算大嗎？」。關鍵是「雜訊該有的抖動」會隨樣本變大而**縮小**——量越多次，平均越穩，雜訊被稀釋（這就是 ch09、ch16 的標準誤 σ/√n，n 在分母）。所以同樣一個固定大小的真實差距，當你樣本量拉大，雜訊的抖動越縮越小，那個差距相對於雜訊就顯得越來越「巨大」，z 分數越衝越高，p 值越壓越低。極端來說，就算真實差距小到 0.0001，只要 n 大到讓雜訊抖動比 0.0001 還小，它照樣會「顯著」。\n\n**對 A/B test 的警告**：在你那種 500K+ 使用者、流量巨大的系統裡，你**幾乎一定**能把任何版本差異壓到「統計顯著」。所以「p<0.05」在大流量下基本上是免費的，它不該是你上線的判準。真正該問的是**效果大小**：提升幾個百分點？乘上流量是多少實質收益？這個收益值不值得多維護一條程式碼路徑、多一份複雜度？把決策建在效果大小上，p 值只用來排除「這連雜訊都不如」的爛提案。\n\n**常見錯路**：以為「顯著」就是「重要」，於是大公司常上線一堆統計顯著但實際毫無感覺的改動，累積成一個沒人敢動的複雜怪物。\n\n### 推演題 3 **[15 分鐘]** ★★★\n\n回到脊椎硬幣。**60/100** 與 **600/1000**，比例同樣是 60%，但 p 值天差地別（≈0.057 vs ≈2.6×10⁻¹⁰），結論強度完全不同。請你**手算驗證** 600/1000 的 z 分數，並用「證據累積」的直覺解釋：為什麼比例一樣，後者卻是壓倒性的證據？最後反過來想：這是否意味著「樣本越大越好，永遠該追求 600/1000」？\n\n#### 推演解答\n\n**手算 z 分數**（H₀: p=0.5）：\n\n```text\nn = 1000:\n  期望  = 1000 × 0.5 = 500\n  變異  = 1000 × 0.5 × 0.5 = 250\n  σ     = √250 ≈ 15.81\n  z     = (600 − 500) / 15.81 = 100 / 15.81 ≈ 6.32\n\n對照 n = 100:\n  z = (60 − 50) / 5 = 2.0\n```\n\nz 從 2.0 跳到 6.32。6.32 個標準差在常態下是天文等級的罕見（雙尾 p≈2.6×10⁻¹⁰）。\n\n**證據累積的直覺**：60/100 時，硬幣「多出來」的 10 個正面，跟公正硬幣的自然抖動（σ=5，±5～±10 很常見）比起來，只是「有點多」——完全可能是運氣。但 600/1000 時，硬幣多出來的 100 個正面，相對於它的自然抖動（σ≈15.8）是 6 倍標準差——一枚真正公正的硬幣要靠運氣跑到這麼偏，比你連續中好幾次樂透還難。同樣 60% 的「比例」，背後撐著的「證據量」差了一個數量級：n=1000 是把同一個訊號重複量了十倍，雜訊被 √n 稀釋，訊號就從雜訊裡浮了出來。**比例是訊號的方向，樣本量決定訊號從雜訊裡浮出來多少。**\n\n**反過來想——該不該永遠追求大樣本？** 不該無腦追求。大樣本對「偵測真實偏差」是好的（檢定力高），但它也是雙面刃，正是上一節的陷阱：n 大到某個程度，連一枚 P(正)=0.5001 的、實際上你根本不在乎的硬幣，都會被你判成「顯著偏了」。所以大樣本不是「越大越好」，而是「大到夠偵測你**在乎**的最小效果就好」。擲一億次去抓 0.5001 的偏差，技術上做得到，但你抓到的是一個沒人該在乎的事實。**樣本量該配著「你在乎多大的效果」來定，不是越大越對。** 這也預告了 ch19：當研究者可以一直加樣本直到 p<0.05，這個「自由度」就成了製造假發現的工具。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 用一句話精確說出 p 值的定義，並指出它**不是** P(H₀ 為真)。為什麼這兩者是 ch05 檢察官謬誤的同一個錯？（要講到 P(資料|H₀) 跟 P(H₀|資料) 的方向，以及為什麼從前者翻到後者需要貝氏與先驗。）\n2. 假設檢定為什麼要繞「先假設 H₀ 清白、再看資料多離譜」這一圈，而不直接證明「有效果」？（要講到「公正」是精確的數學陳述、「偏了」不是。）\n3. 型一錯誤跟型二錯誤分別是什麼？為什麼把 α 壓低會讓型二錯誤變大？這跟你調告警閾值的兩難是不是同一件事？\n4. 為什麼「p>0.05，不顯著」**不能**讓你下結論說「H₀ 為真 / 兩版一樣 / 這藥沒效」？（鼻塞的狗。）\n5. Fisher 跟 Neyman–Pearson 對 p 值的看法差在哪？為什麼說今天的 NHST 是一個「自我矛盾的混血」？\n6. 0.05 這條線神聖嗎？Fisher 本人怎麼看它？（要能講出他說過可以改 1/50、1/100。）\n7. 脊椎硬幣 60/100 的兩個 p 值（0.046 與 0.057）為什麼會落在 0.05 兩側，這示範了什麼關於統計顯著性的深刻事實？\n8. 「統計顯著」跟「實際重要」差在哪？為什麼樣本越大，這個區別越要命？（要講到 √n 與效果大小。）\n\n## 延伸閱讀\n\n- **ASA 2016 對 p 值的聲明**（Wasserstein & Lazar, *The American Statistician* 70(2):129–133）。本章五大誤讀的權威出處。讀那六條原則本身，特別是第 2 條（p 值不是「假設為真的機率」也不是「結果純屬偶然的機率」）跟第 5 條（p 值不衡量效果大小）——這是統計學界正式承認「我們這個招牌數字一直被讀錯」的歷史文件。\n- **「Before p < 0.05 to Beyond p < 0.05」**（*The American Statistician* 2018, tandfonline）。把 0.05 的身世講清楚的史學文章——Fisher 怎麼提出它、怎麼明說它只是方便、後人怎麼把它供成神主牌。讀它你會徹底治好「0.05 是物理常數」這個病。\n- **Frontiers「Fisher, Neyman-Pearson or NHST?」**（2015, frontiersin.org）。專門拆解兩個爸爸的哲學差異、以及教科書如何把它們縫成一個怪物的教學文章。讀「三套邏輯的對照表」那一節，你會懂為什麼這套東西用起來總覺得精神分裂。\n- **回到 ch05**：把這章的「p 值 ≠ P(H₀|資料)」跟 ch05 的檢察官謬誤並排重讀，你會發現它們是同一個數學錯誤穿了兩件衣服。能同時講清楚這兩個，你對「條件機率方向」的掌握就到位了。\n- **預告 ch19**：本章給了你一台誠實的機器和它武斷的門檻。下一章把操作者的誘因放進去——p-hacking、發表偏誤、複現危機（Open Science Collaboration 2015 那個 36% 的複現率，照 landscape）。這章的 60/100 兩種算法是那場崩壞的縮影：當「選哪個 p 值」對你有利時，人性會怎麼選。\n"}, {"id": "ch19-statistics-breaks", "file": "ch19-statistics-breaks.md", "group": "Part V — 統計推論", "title": "ch19 — 統計的崩壞：美麗的機器如何騙人", "md": "# ch19 — 統計的崩壞：美麗的機器如何騙人\n\n> **本章解決什麼問題**：前面三章（ch16–18）把統計推論這台機器交到你手上——抽樣、信賴區間、假設檢定，每個零件都誠實、漂亮、能在數學上嚴格保證。這章要回答一個讓人不安的問題：**這麼老實的一台機器，為什麼天天產出一堆事後被證明是假的「發現」？** 答案不在數學裡，在使用者身上。當人類的誘因（想發論文、想證明自己對、想讓 dashboard 上的相關「有意義」）撞上這台中立的機器，它會被系統性地操弄成謊言製造機——而且操弄它的人，每一步單獨看都覺得自己很正當。本章是全書「故障視角」的總收束：我們會拆穿 p-hacking 與複現危機（這台機器如何被人騙），再用辛普森悖論與回歸均值兩大陷阱收尾（這台機器如何騙你自己）。讀完你會看穿——機率統計是真理機器，也是謊言機器，差別只在誠實。\n\n## 從你已知的出發\n\n你早就在 dashboard 上被統計騙過，只是當時你以為自己「找到了」什麼。\n\n想一個你一定幹過的場景。某天系統 P99 爆了一根尖峰，老闆要你查根因。你打開 Grafana，那裡有大概四十個 panel：CPU、記憶體、GC、連線池、快取命中率、各下游 API 延遲、佇列長度⋯⋯你一個個比對時間軸，找「哪條線跟 P99 一起動」。看到第十五張時眼睛一亮——「找到了！這個下游服務的延遲跟我的 P99 完美同步！」截圖、貼進事故報告、寫上「根因：下游 X 服務劣化」。\n\n問題是：**你看了四十張圖。** 就算這四十條線跟你的 P99 全都毫無關係、全是各自獨立的隨機抖動，光憑運氣你也幾乎一定能挑出一兩條「看起來同步」的。你不是在「發現」相關，你是在「四十次抽獎裡領一個獎」。這就是 p-hacking 的工程版——**看夠多圖，總有一張顯著**。你以為在做根因分析，其實做的事跟一個把一百個變數全跑迴歸、只報告那個 p<0.05 的研究者一模一樣。\n\n再想一個。你做了一次效能優化，挑了「最近狀況很差」的時段當 before，上線後比對延遲果然降了 30%，寫進季度報告。但你會去動它，正是因為那段時間它異常地差。一個本來就在自然抖動的系統，當它「異常地差」時，你下一次去量**它本來就會回到正常**，不管你動沒動它。你可能什麼都沒修好，只是剛好踩在它要反彈的時間點上。這叫**回歸均值（regression to the mean）**，是本章第二個主角，也是事故報告裡最常見的幽靈——「我們做了 X 然後就好轉了」這句話，有一大半的時候 X 是無辜的。\n\n這兩個故事，一個是「主動去騙機器」（多看幾張圖湊出顯著），一個是「被機器騙」（極端值天生會回擺，你誤以為是功勞）。它們是本章的兩條主線。把它們黏在一起的，是 ch18 那枚卡在 0.05 兩側的硬幣留下的伏筆：當「選哪個答案」對你有利時，人性會怎麼選。我們現在就把操作者的誘因放進那台機器，看它怎麼壞掉。\n\n## 研究者自由度：一台中立的機器，配上有立場的手\n\n先講清楚立場，免得你誤會：**p-hacking 不是造假。** 造假是偽造數據、是詐欺，不在本章討論範圍。p-hacking 比造假陰險得多——它**完全用真實的數據、完全用正確的統計方法**，每一步都「合理」，但整套流程加起來，系統性地把假的包裝成真的。它可怕，正因為做它的人通常真心相信自己很誠實。\n\n這件事有個精準的名字，來自 Simmons、Nelson 與 Simonsohn 2011 年的《False-Positive Psychology》（照 landscape）。他們普及了**研究者自由度（researcher degrees of freedom）**一詞：從「我有一個假設」到「我報告一個結果」之間，研究者要做**一大堆小決定**，每一個事先都沒有唯一正確答案：\n\n```text\n研究者一路上要做的小決定（每一個都「看起來合理」）\n─────────────────────────────────────────────────\n· 要收集多少受試者？收到什麼時候停？\n· 哪些受試者算「離群值」，該不該剔除？\n· 用哪個指標當結果？（反應時間？正確率？兩者都試？）\n· 要不要控制性別、年齡、慣用手⋯⋯哪些控制變數放進模型？\n· 分組怎麼分？要不要看某個子群（只看女性？只看週末？）？\n· 哪些條件比較？A vs B？還是 A vs C？\n```\n\n每個分岔單獨看都站得住腳，問題是它們相乘——如果你在每個路口都「事後」往對自己假設有利的那條路走，就走出了一條**專門通往 p<0.05 的路徑**。Simmons 等人用模擬證明這有多嚴重：在這些自由度的組合下，他們能把名目應該是 5% 的型一錯誤率（ch18 的 α），最壞推高到**約 60%**（照 landscape）。一個「p<0.05」的發現，在充分行使研究者自由度下，有超過一半的機會根本是假的。\n\n關鍵是把 ch18 接起來。p<0.05 的保證——「長期只有 5% 機會冤枉清白的 H₀」——有個**前提**：你必須**事先**定好整個分析流程，然後**做一次**。p-hacking 破壞的就是這個前提。幾種最常見的破壞，每一種你都能在自己的工程習慣裡找到對應：\n\n### 一、多重比較：丟夠多骰子，總有一顆開出 6\n\n最乾淨的一種。假設你同時檢定 20 個彼此獨立、而且**全部都是假的**假設。每個檢定在 α=0.05 下有 5% 機會誤報「顯著」。「20 個裡至少有一個誤報」的機率是多少？這正是 ch03 的「至少一次」，用餘事件算（回收 ch03）：\n\n```text\nP(至少一個假陽性) = 1 − P(20 個全都沒誤報)\n                  = 1 − (1 − 0.05)²⁰\n                  = 1 − 0.95²⁰\n                  = 1 − 0.3585\n                  ≈ 0.64\n```\n\n交叉驗算 0.95²⁰：0.95⁴≈0.8145，平方得 0.95⁸≈0.6634，再平方 0.95¹⁶≈0.4401，乘 0.95⁴≈0.8145 得 ≈0.3585。✓\n\n**64%。** 你檢定 20 個全是假的東西，有將近三分之二的機會會「發現」至少一個「顯著」結果。它是純粹的雜訊，但會通過 p<0.05、被寫進報告、被當成「發現」。\n\n這就是 dashboard 故事的數學。看 40 條線那機率更高——`1 − 0.95⁴⁰ ≈ 0.87`，有 87% 的機會至少撈到一張「顯著同步」的純雜訊。你以為在做根因分析，其實在保證自己一定會找到一個假根因。**這也是為什麼 SRE 老手會說「先有假設再看圖，不要看著圖編故事」——他講的是工程直覺，底層是這條 1−0.95ⁿ 的數學。**\n\n### 二、選擇性報告：抽屜裡的陰性結果\n\n承上。誠實的人做了 20 個檢定會報告 20 個，包括那 19 個不顯著的。但人性會把那一個顯著的拿出來發表，剩下 19 個悄悄放進抽屜。讀者只看到那一個閃亮的「p<0.05」，不知道它是 20 次嘗試裡撈出來的。\n\n放大到整個科學界，這叫**發表偏誤（publication bias）**，也叫**抽屜效應（file-drawer problem）**。期刊愛登「有發現」的（顯著、新奇），不愛登「沒發現」的。於是同一個其實沒效果的現象，可能有 20 個實驗室各做一次，19 個不顯著默默進抽屜，1 個靠運氣撞到 p<0.05 發表了——文獻上只留下那一篇「證實有效」的，整個領域的集體記憶被倖存者偏誤（回收 ch16）扭曲成反面。\n\n這跟你的系統監控有個刺眼的對應：**你只看得到沒當機的機器的指標。** 已經掛掉、不再回報 metric 的節點從 dashboard 上消失了，你對「健康狀態」的印象由倖存者組成——跟科學文獻只由「撞到顯著的倖存研究」組成，是同一個結構性盲區。\n\n### 三、見獵心喜的停止：邊看邊決定何時收手\n\n這個最陰，因為它感覺最無辜。你在跑 A/B test，每天看一次結果。第三天，p 值剛好掉到 0.048——「顯著了！停！上線！」你關掉實驗，宣布勝利。\n\n問題在**你是看著 p 值決定何時停的**。回想 ch18：p<0.05 的保證是針對「固定樣本量、做一次檢定」成立的。但 p 值會隨樣本累積而**隨機漫步**（這個詞 ch20 會正式講）——就算兩版一模一樣，p 值也會上下抖動，**遲早某一天偶然抖到 0.05 以下**。給自己「哪天跌破 0.05 就停」的權力，等於在等那個必然會來的隨機低點。你不是在檢定效果，是在守株待兔，等雜訊自己跳進陷阱。\n\n這叫**選擇性停止（optional stopping）**，是 ch18 結尾那個陷阱（「算出 0.06 不甘心，多收一點資料」）的正式版。它把 α=0.05 的保證徹底架空——有研究估計，每天偷看、跌破就停，實際假陽性率可從 5% 飆到 20% 以上。對你的實務這是鐵律：**A/B test 的樣本量要事先算好、跑滿才看結論；邊跑邊偷看、看到漂亮就喊停，等於自願關掉統計給你的所有保護。**\n\n把這三種放在一起，p-hacking 的本質就清楚了：**它不需要任何一步作弊**，只需要在每個無辜的小決定上都「碰巧」往對你有利的方向走。一台中立的機器配上一隻有立場的手，就足以系統性生產謊言。最可怕的是——做這件事的人，因為每一步都真實、都合理，會一輩子相信自己很誠實。\n\n## 複現危機：為什麼大多數發表的發現是假的\n\n把上面這些機制乘上整個科學界的規模、再乘上「不發表就滅亡」的職涯壓力，你會得到一場災難。它有名字，叫**複現危機（replication crisis）**，引爆點是 Ioannidis 2005 年那篇標題聳動到像在釣魚、但內容嚴肅到改變了整個元科學的論文：**《Why Most Published Research Findings Are False》**（為什麼大多數發表的研究發現是假的，照 landscape）。\n\nIoannidis 的論證，本質上是一道你已經會算的貝氏題（回收 ch05）——它根本就是 ch05 的疾病篩檢題換了套衣服。回想那個震撼：準確度 99% 的檢驗用在盛行率只有 0.1% 的疾病上，陽性者真正得病的機率竟然只有約 2%，因為**基率太低、偽陽性的絕對數量壓過真陽性**。把這個結構搬到科學研究上，一字不差：\n\n```text\n篩檢題                          研究題\n────────────────────────────────────────────────────\n「這個人有病嗎」               「這個假設是真的嗎」\n盛行率（有病的基率很低）    →   真假設的基率（大多數新奇假設其實是假的）\n敏感度（檢驗抓得到病）      →   檢定力 power（真效果抓得到，ch18）\n偽陽率（沒病卻驗出陽性）    →   α=0.05（假效果卻過了顯著門檻）\n驗出陽性                    →   p<0.05，「發現了！」\nP(真的有病 | 陽性)          →   P(假設真為真 | p<0.05)\n```\n\n關鍵洞見在「基率」這一行。**大多數被研究者拿來檢定的新奇假設，本來就是假的**——你丟出一百個大膽猜想，本來就只有少數是真的。假設一個領域裡被檢定的假設只有 10% 為真，檢定力（power）只有 50%（真效果只有一半抓得到，小樣本研究裡很常見）。用 ch05 的自然頻率法算「一個 p<0.05 的發現真為真的機率」：\n\n```text\n想像 1000 個被檢定的假設：\n  · 真的假設：100 個（基率 10%）\n      → 檢定力 50%，抓到 50 個 → 50 個「真的顯著」\n  · 假的假設：900 個\n      → α=5% 誤報，誤判 45 個「顯著」 → 45 個「假的顯著」\n\n  所有報出「顯著」的：50 + 45 = 95 個\n  其中真的為真：50 個\n\n  P(真為真 | 顯著) = 50 / 95 ≈ 0.53\n```\n\n交叉驗算：真陽性 100×0.5=50，偽陽性 900×0.05=45，總陽性 95，真陽性比例 50/95=0.526。✓\n\n**只有 53% 的「顯著發現」是真的。** 注意這還是在零 p-hacking 的乾淨情況下算的——光是「大多數假設本來就假」（低基率）加「檢定力不夠」（敏感度不足），就足以讓發表的東西**將近一半是假的**。\n\n把 p-hacking 加回去，研究者自由度會把那 5% 偽陽率（α）偷偷推高到 Simmons 說的 60%、同時誇大真效果：45/900 那條偽陽性線暴增，真陽性卻沒怎麼漲。Ioannidis 論文裡那串「讓發現更可能為假」的條件，每一條你現在都能用這道貝氏題解讀：\n\n```text\n讓「發表的發現更可能是假的」的因素        對應到貝氏題的哪一格\n──────────────────────────────────────────────────────────\n樣本小                              →   檢定力低（敏感度差，真陽性少）\n效應小                              →   檢定力低（同上）\n檢定的關係多、預選的少              →   檢定的假設基率低（更多假的進來篩）\n設計/定義/分析的彈性大              →   研究者自由度（α 被推高，偽陽性暴增）\n利益與偏見大                        →   選擇性報告（抽屜效應）\n競逐同一熱題的團隊多                →   多重比較的放大版（總有一隊撞到顯著）\n```\n\n這就是 Ioannidis 那個聳動標題的完整機制。它不是說科學家造假，而是說——**統計機器的數學沒錯，但它運作的生態系（低基率假設、不足檢定力、發表偏誤、研究者自由度）系統性地偏向生產假陽性**。機器誠實，環境有毒。\n\n這個悲觀預測在現實裡真的發生了嗎？有人實際去量過。**Open Science Collaboration 2015**（照 landscape）做了件以前沒人敢做的事：找來一大群研究者，老老實實**重做 100 篇**已發表的心理學經典研究，看幾篇能複現。結果是統計史上最讓人清醒的兩個數字：\n\n```text\n┌──────────────────────────────────┬─────────┐\n│ 原始 100 篇研究中達顯著（p<.05） │   97%   │  ← 發表時個個漂亮\n│ 重做後仍達顯著                   │  ~36%   │  ← 三分之二蒸發了\n└──────────────────────────────────┴─────────┘\n  而且：複現出來的效應量，平均只有原研究的一半。\n```\n\n97% 變 36%。原本「個個顯著」的文獻認真重做一遍，**三分之二消失了**；複現成功的那些效果也只剩一半——正是上一段「真陽性被誇大」那條線被現實驗證。這個 36%（約三分之一）的複現率，是你這輩子看任何「研究顯示⋯⋯」新聞時都該放在心裡的基準數字。\n\n我認為這是整本書最該讓你脊背發涼的一頁。不是科學壞了——恰恰相反，**科學是唯一一個會花三年、找一百個人、認真去查自己錯在哪的領域**，這份誠實本身就了不起。脊背發涼的是：那 97% 的研究者沒有一個覺得自己在做壞事，用真實數據、正確方法、過了同儕審查、登上頂級期刊——然後三分之二是假的。**這不是壞人騙好機器的故事，是好人在有毒誘因下被一台中立機器系統性誤導的故事。** 而你在 dashboard 上撈相關時，就是這場危機的一人縮影版。\n\n### ASA 的官方投降書：2016 年那六條\n\n事情鬧到連統計學界自己都受不了了。2016 年，美國統計學會（ASA）做了件史無前例的事：**正式發聲明，官方承認自己這個招牌數字（p 值）一直被全世界讀錯、用錯**（Wasserstein & Lazar，照 landscape）。一個專業學會跳出來說「拜託大家別再這樣用我們的東西」，學術史上極為罕見。六條原則裡跟本章最相關的幾條，翻成白話：\n\n```text\nASA 2016 六原則（白話版，挑最痛的講）\n─────────────────────────────────────────────────\n② p 值不是「假設為真的機率」，也不是「結果純屬隨機的機率」。\n   ← 就是 ch18 的誤讀①②，連官方都要特別澄清，可見錯得多普遍。\n③ 科學/商業/政策結論，不該只看 p 值有沒有過某個門檻。\n   ← 對 0.05 這條線的官方判決：別把它當神主牌。\n④ 正確的推論需要完整報告與透明。\n   ← 這一條，直接就是在打 p-hacking 與選擇性報告的臉。\n   ← 翻成工程語言：你要報告你看了 40 張圖，不能只報告那撈到的一張。\n⑤ p 值不衡量效應大小，也不衡量結果的重要性。\n   ← 回收 ch18：統計顯著 ≠ 實際重要。\n```\n\n第④條是本章的精神所在。p-hacking 能騙人，靠的全是**不透明**——不講你做了多少次檢定、不講那 19 個失敗的、不講你是看著 p 值才決定停手的。一旦要求完全透明（事先註冊分析計畫、報告所有嘗試），這台機器立刻變回誠實的。**所以崩壞的根因從來不在數學，在隱瞞——同一台機器，透明用是真理機器，藏著用是謊言機器，差別只在誠實。**\n\n接下來兩節換個方向。前面講「人主動騙機器」；接下來這兩個陷阱——辛普森悖論與回歸均值——是「機器忠實地給你正確的數字，而那個正確的數字騙了你」。它們比 p-hacking 更深，因為連最誠實的人都會掉進去。\n\n## 辛普森悖論：每一組都是 A 贏，合起來卻是 B 贏\n\n這是本章——也許是整本書——最違反算術直覺的一頁。直覺告訴你一件天經地義的事：**如果一個療法對大結石病人比較好、對小結石病人也比較好，那它整體一定比較好。** 每一組都贏，合起來怎麼可能輸？這聽起來像邏輯、不像統計。\n\n它是錯的，而且不是「偶爾錯」，是「真實世界天天發生」。它叫**辛普森悖論（Simpson's paradox）**——由 Colin Blyth 在 1972 年定名，源頭可追到 Edward Simpson 1951、甚至 Udny Yule 1903（照 landscape）。用兩個 landscape 基準案例來打爆你的直覺。\n\n### 基準案例一：柏克萊 1973 招生\n\n1973 年，加州大學柏克萊分校被指控研究所招生歧視女性。理由很硬：**整體男性錄取率 44%，女性只有 35%**。差了 9 個百分點，看起來鐵證如山。\n\n但 Bickel、Hammel 與 O'Connell 三人 1975 年發表在《Science》的分析（照 landscape），做了一件簡單的事：**把資料按「申請哪個系」拆開看**。結果驚人——在大多數系裡，**女性的錄取率反而比男性高，或至少不低**。整體看歧視女性，分系看偏向女性。同一筆資料，兩個相反的結論，都是對的。\n\n⚠️ 注意這個方向（landscape 特別標記，最容易寫反）：**整體 → 似乎不利女性；分系 → 反而對女性有利。**\n\n怎麼可能？根因是一個你在 ch04、ch10 已經埋過種子的東西——**混淆變數（confounder）**。這裡的 confounder 是「申請了哪個系」。真相是：**女性大量申請了競爭激烈、錄取率本來就低的系**（人文社科那種僧多粥少的），男性則集中申請錄取率高的系（某些理工科）。於是女性整體被自己的「選系偏好」拖低了平均，但這跟「系裡有沒有歧視她們」完全是兩回事。\n\n### Worked example：兩系版的柏克萊，手算翻轉\n\n我給你一組乾淨的兩系數字，**全程手算、交叉驗算翻轉真的會發生**——這是把柏克萊濃縮成最小可推演的版本。設一所學校只有兩個系：A 系（好進）、B 系（難進），各有 100 個男生、100 個女生申請：\n\n```text\n            ┌──────────────── A 系（好進）────────────────┐\n            │  申請    錄取    錄取率                       │\n   男生     │   80      60     60/80  = 75%                 │\n   女生     │   20      16     16/20  = 80%   ← 女生較高    │\n            └──────────────────────────────────────────────┘\n            ┌──────────────── B 系（難進）────────────────┐\n            │  申請    錄取    錄取率                       │\n   男生     │   20       6      6/20  = 30%                 │\n   女生     │   80      28     28/80  = 35%   ← 女生較高    │\n            └──────────────────────────────────────────────┘\n```\n\n先看分系：**A 系女生 80% > 男生 75%；B 系女生 35% > 男生 30%。兩個系，女生錄取率都比男生高。** 數字乾淨，沒有任何爭議。\n\n現在把它們合起來，算整體錄取率（這是 confounder 翻轉的關鍵步驟，慢慢算）：\n\n```text\n男生整體：\n   申請 = 80 + 20 = 100\n   錄取 = 60 +  6 =  66\n   錄取率 = 66 / 100 = 66%\n\n女生整體：\n   申請 = 20 + 80 = 100\n   錄取 = 16 + 28 =  44\n   錄取率 = 44 / 100 = 44%\n```\n\n交叉驗算：男生錄取 60+6=66 ✓，女生錄取 16+28=44 ✓，兩邊申請都是 100 ✓。\n\n```text\n┌────────┬──────────┬──────────┬──────────────┐\n│        │  A 系    │  B 系    │   整體       │\n├────────┼──────────┼──────────┼──────────────┤\n│ 男生   │  75%     │  30%     │   66%        │\n│ 女生   │  80% ↑   │  35% ↑   │   44% ↓      │\n└────────┴──────────┴──────────┴──────────────┘\n   每一系：女生 >  男生\n   合 起 來：女生 << 男生（44% vs 66%，差 22 個百分點！）\n```\n\n**盯著這張表看一分鐘。** 每一個系，女生錄取率都比男生高。合起來，女生卻比男生低了 22 個百分點。沒有一個數字算錯，沒有任何詭計。這就是辛普森悖論，赤裸裸地擺在你眼前。\n\n### 它為什麼會翻轉？看穿那個 confounder\n\n機制看穿了之後甚至有點好笑。問題出在**男女申請的「系的組成」完全不同**：男生 80 人擠在好進的 A 系、只有 20 人去難進的 B 系；女生剛好相反，80 人擠在難進的 B 系。整體錄取率是兩系錄取率的**加權平均**，權重就是各系的申請人數：\n\n```text\n男生整體 = (80/100)×75% + (20/100)×30% = 60% + 6%  = 66%   ← 權重壓在 75% 那邊\n女生整體 = (20/100)×80% + (80/100)×35% = 16% + 28% = 44%   ← 權重壓在 35% 那邊\n```\n\n女生那個漂亮的 80% 只有 0.2 的權重，35% 卻扛了 0.8 的權重，男生剛好相反。**「申請哪個系」這個 confounder 同時影響了「性別比例」和「各系錄取率」，在背後操縱了權重——合併時這個權重差異壓過了組內的真實差異，把結論整個翻過來。**\n\n這直接回收 ch04 和 ch10 的核心教訓，現在它們長出了牙齒：\n\n- **ch04：條件獨立 ≠ 邊際獨立。** 給定系別時，性別對錄取率是一個樣子（女生略優）；把系別邊際掉（合併），變成另一個樣子（女生大劣）。條件下成立的關係，邊際下可以反向——辛普森悖論就是這句話最戲劇化的演示。\n- **ch10：相關 ≠ 因果。** 「女性」與「低錄取率」有很強的相關（整體數字），但它**不是**「因為是女性所以被刷掉」的因果，而是 confounder（選系）製造的虛假關聯。看到整體相關就喊歧視，跟看到冰淇淋銷量和溺水數一起漲就喊「冰淇淋導致溺水」（ch10 的 confounder 是氣溫），是同一個錯。\n\n### 基準案例二：腎結石治療，與「合併才對」的反例\n\n辛普森悖論最險惡的地方，是它沒有一個「永遠正確」的看法。柏克萊那例**分系才對**（合併被 confounder 污染）；但有時**合併才對**。你不能機械式地說「永遠看分組」——得理解 confounder 在因果上扮演什麼角色。腎結石這個 landscape 基準案例，再示範一次「該看分組」的那一面。\n\nCharig 等人 1986 年的真實數據（照 landscape），比較兩種腎結石療法：開放手術（A）和經皮取石（B，較新、較不侵入）。\n\n```text\n                 開放手術 A        經皮取石 B\n─────────────────────────────────────────────────\n小結石            93% (好)          87%\n大結石            73% (好)          69%\n─────────────────────────────────────────────────\n合 併             78%               83% (好)  ← 翻了！\n```\n\n每一種結石大小，**開放手術 A 都贏**（93%>87%，73%>69%）；但合併起來，**經皮取石 B 反而贏**（83%>78%）。又翻了。\n\nconfounder 是「結石大小」。真相是：**醫生把難治的大結石多分給了開放手術 A**（重症用老牌穩當的療法），好治的小結石多給新療法 B。於是 A 扛了一堆重症（拉低整體成功率），B 享受一堆輕症（抬高整體成功率）。合併數字偏袒 B，純粹因為 B 接的病人本來就比較好治。這裡 confounder（結石大小）是**因果上的真實原因**——它真的影響預後，所以**分組才對**：你該信「在同樣結石大小下 A 比較好」。只看 83%>78% 就選 B 的醫生，會把重症推向比較差的療法。\n\n把兩案擺一起，辛普森悖論真正的教訓就出來了——它不是「永遠該拆組」這種膚淺口訣。它的教訓是：**光看數字，你永遠不知道該信合併還是該信分組；決定權不在統計，在你對「誰因果地影響了誰」的理解。** 統計給你兩個都正確卻相反的答案，然後把選哪個的責任丟回給你的因果判斷——它老實告訴你「我算的都對，但哪個有意義要靠你懂這個世界怎麼運作」。\n\n## 回歸均值：極端值天生會回擺，這台假效果製造機\n\n第二個「機器沒錯、你被騙」的陷阱比辛普森更狡猾，因為它連個壞數字都沒有——它純粹利用「極端值天生會回擺」，讓你把運氣的消退誤認成功勞。它叫**回歸均值（regression to the mean）**，是 Galton 在 1880 年代研究遺傳時發現的（照 landscape，他原詞是「向平庸回歸 regression towards mediocrity」）。\n\n核心機制一句話：**任何同時受「真實能力」和「運氣」影響的量，當你挑出它的極端值（特別高或特別低），下一次再量，它幾乎一定會往平均靠回去——不是因為任何介入，純粹因為當初那個極端值裡，有一部分是運氣，而運氣不會重複。**\n\n### Worked example：一組「考差的人」複測，平均自己回升\n\n一個乾淨到可以手算的例子，**證明在零介入下極端組會自己回擺**。設想一個班 10 個學生，**真實實力一模一樣都是 60 分**，但每次考試分數 = 真實實力 + 隨機的「臨場運氣」（睡得好不好、有沒有剛好複習到）。運氣平均是 0，單次會上下波動。第一次考試 10 人的運氣（總和為 0，公正）：\n\n```text\n學生         A    B    C    D    E    F    G    H    I    J\n運氣       −15  −10   −8   −5   −2   +2   +5   +8  +10  +15\n分數(=60+運氣) 45   50   52   55   58   62   65   68   70   75\n```\n\n第一次平均 = 60（運氣抵消了）。✓\n\n現在，你是老師，你決定「補救教學」——把**考最差的 5 個人**（A、B、C、D、E，分數 45、50、52、55、58）抓來補課。注意這 5 個人是怎麼被挑中的：他們不是實力差（實力都是 60），他們是**這次運氣特別背**（運氣 −15 到 −2，全是負的）。這個「挑極端」的動作，是整個陷阱的關鍵。\n\n```text\n補救組第一次平均 = (45+50+52+55+58) / 5 = 260 / 5 = 52\n```\n\n補課一週後，複測。**這裡是重點：補課完全沒有用，他們的真實實力還是 60，運氣重新洗牌。** 第二次的運氣是全新的一組（一樣平均約 0）：\n\n```text\n補救組第二次運氣   −5   +3   −2   +6   −2\n補救組第二次分數    55   63   58   66   58\n補救組第二次平均 = (55+63+58+66+58)/5 = 300/5 = 60\n```\n\n交叉驗算：55+63=118，+58=176，+66=242，+58=300，÷5=60。✓\n\n```text\n┌──────────────┬──────────┬──────────┬──────────┐\n│  補救組      │ 第一次   │ 第二次   │  變化    │\n├──────────────┼──────────┼──────────┼──────────┤\n│  平均分      │   52     │   60     │  +8 ↑    │\n└──────────────┴──────────┴──────────┴──────────┘\n   補課的真實效果 = 0（實力沒變）\n   觀察到的「進步」= +8（純粹是運氣回歸）\n```\n\n**補課毫無作用，但補救組平均「進步」了 8 分。** 你會興高采烈宣布「補救教學有效！」——但這 8 分是純粹的數學幽靈。當初他們被挑中正是因為運氣背（平均拖低 8 分），複測時運氣回到正常那 8 分自然就回來了，跟補不補課無關。對稱地，若當初挑的是**考最好的 5 個人**（平均 68）去獎勵，他們也會「退步」回 60——獎勵看似有害，其實是極端高分裡的好運氣消退了。\n\n### 為什麼這是「假效果製造機」\n\n現在你看穿了機制，回去看 landscape 給的那些經典案例，每一個都瞬間透明：\n\n```text\n現象                        被誤以為的因果        真相（回歸均值）\n──────────────────────────────────────────────────────────────────\n運動畫報封面魔咒            「上封面會帶來厄運」    上封面前是異常巔峰（含好運），\n（SI cover jinx）                                  之後自然回落到常態水準\n二年級退步                  「新秀第二年壓力大」    新秀季是異常爆發（含好運），\n（sophomore slump）                                次年回歸真實水準\n二診效應                    「第二次看診惡化了」    第一次求診正逢症狀最嚴重的\n                                                   極端點，之後自然緩解\n「處罰有效、獎勵沒用」      「罵人比誇人管用」      表現差後本就會回升（誤記為\n                                                   處罰之功）；表現好後本就會\n                                                   回落（誤記為獎勵之過）\n```\n\n最後一個——「**處罰有效、獎勵沒用**」——是回歸均值最深刻、也最有破壞性的應用。這故事來自 Kahneman（康納曼）：他跟以色列空軍的飛行教官講「獎勵比處罰有效」，一個資深教官反駁：「不對。我誇做得好的學員，他下次通常更差；我痛罵搞砸的學員，他下次通常更好。所以**處罰才有效，獎勵反而有害**。」\n\n這個教官觀察到的現象是**真的**——誇完變差、罵完變好，他沒看錯。錯的是因果解讀。異常好的飛行（含好運）你誇他，下一次自然回歸常態（看似變差）；異常差的飛行（含壞運）你罵他，下一次自然回歸常態（看似變好）。**獎勵和處罰都沒效果——你只是剛好在極端值之後介入，把回歸均值記成了功勞。** Kahneman 由此得到一個冷到骨子裡的結論：因為人傾向在別人做好時獎勵、做差時處罰，而表現本來就會回歸均值，所以「**我們在統計上注定因為獎勵別人而受罰、因為處罰別人而受獎**」。\n\n把這條鞭子抽回你自己身上，就是本章開頭那個事故報告的幽靈：\n\n- 服務 P99 某天異常飆高（極端壞運），你緊急做了優化 X，隔天降回正常——**你以為 X 有效，但它本來就會降回來**。你正是那個飛行教官。\n- 金絲雀「看起來變好」——可能因為你挑了個狀況特別差的時段當基準，新版在一個本來就要回升的時間點上線，**功勞白撿**。\n- 任何「我們做了 X 然後好轉」的敘事，只要 X 是在「指標異常糟」之後才做的，你就**必須**懷疑回歸均值。排除它唯一的辦法是 ch16 的**隨機對照**：留一組不做 X 的對照組，兩組都會回歸均值，真效果 =「實驗組變化 − 對照組變化」。沒有對照組，你永遠分不清「X 有效」和「運氣回歸」。\n\n這就是回歸均值「假效果製造機」之名的由來：它**保證**會在每一個「挑極端值後介入」的場景裡，憑空生出一個看起來很真實的假效果——不需要 p-hacking、不需要造假，只要你習慣在事情最糟時出手（而人類正是這樣的生物），就會一輩子相信一堆無效的介入有效。\n\n## 直覺的陷阱\n\n這是全書故障視角的總帳。前面每一章的陷阱，到這裡匯流成一句話：**統計給你的數字可能全對，而你的結論可能全錯——錯在你（或別人）對那些數字的解讀。** 把這張表貼在你下次看任何「資料證明⋯⋯」的東西旁邊。\n\n```text\n陷阱                        錯誤直覺把你帶去哪            怎麼自我察覺（什麼徵兆代表你沒懂）\n──────────────────────────────────────────────────────────────────────────────────────\np-hacking                   「我看了 40 張圖，找到那張    你在「看到結果之後」才決定要比較\n（多重比較 / 看夠多總有一張）  同步的，所以找到根因了」。   什麼、剔除什麼、何時停。你報告那\n                                                          撈到的一張，卻不提另外 39 張。\n                                                          自問：我做了幾次比較？全報了嗎？\n\n選擇性報告 / 抽屜效應        「文獻都說 X 有效」。只看到    你只看活著的機器的 metric、只看\n                            倖存的顯著研究，看不到抽屜裡    發表的顯著研究。問 72=945 / 1000 = 94.5%   ← 合併 B 贏！\n```\n\n交叉驗算：輕症 A 99%>B 97%、重症 A 75%>B 72%，兩組 A 都贏；合併 A 77.4% < B 94.5%，B 贏。翻轉成立。\n\n**confounder 與權重**：confounder 是「病情輕重」。醫院 A 是頂尖醫院，接了大量**重症**（900 重症），重症本來存活率就低，所以 A 的權重壓在 75% 那組（合併 = 0.1×99% + 0.9×75% = 77.4%）；醫院 B 是社區醫院多收**輕症**，權重壓在 97% 那組（0.9×97% + 0.1×72% = 94.5%）。A 漂亮的 99%/75% 因大量接重症被權重拖垮。看合併（B 贏）就選 B 去看重病是會死人的——這裡 confounder（病情）是真實因果原因，**該看分組**，A 在同樣病情下都更強。**常見錯路**：以為「拆組就破解辛普森」，忘了腎結石那一面——有時合併才對。永遠先問「confounder 在因果上是什麼角色」，再決定信哪個。\n\n### 推演題 2 **[15 分鐘]** ★★\n\n你的團隊 retro 上，有人說：「**上次那個 P99 大爆炸，我們緊急加了快取層之後就好轉了，所以加快取是對的。**」用回歸均值的角度，解釋為什麼這句話的因果推論**可能是假的**，並設計一個能真正驗證「加快取有效」的方法。\n\n#### 推演解答\n\n**為什麼可能是假的**：注意觸發時機——你們是因為「P99 大爆炸」（異常極端的壞值）才緊急動手的。但 P99 是「真實負載 + 隨機抖動（撞上的慢查詢、GC、網路毛刺）」的混合，一個**異常**高峰裡有一大塊是運氣特別背的成分，而運氣不會持續——**就算什麼都不做，P99 也極可能自己回落到常態**。你恰好在最糟的時刻介入，於是回歸均值的自然回落被記成了快取的功勞。你就是那個飛行教官。\n\n**怎麼真正驗證**（回收 ch16 隨機對照的精神）：\n\n```text\n1. 不要只比「介入前 vs 介入後」——那無法分離回歸均值。\n2. 設對照組：把流量隨機分兩半，一半走有快取的新路徑（實驗組），\n   一半走原本沒快取的舊路徑（對照組），同時間並行。\n3. 兩組都會經歷同樣的「爆炸後回歸均值」（同樣的負載、同樣的運氣回落）。\n4. 真效果 = 實驗組的改善 − 對照組的改善。\n   對照組自己回落多少，那部分就是回歸均值，要從帳上扣掉。\n5. 若扣掉對照組的回落後，實驗組還顯著更好，快取才真的有功。\n```\n\n**核心**：沒有同時並行的對照組，「做了 X 然後好轉」永遠分不清是 X 還是回歸均值；對照組的作用就是吸收掉「兩組都會經歷的」回歸均值與環境變化，把真效果獨立出來。**常見錯路**：用「介入前一週」當對照——不行，那一週正是異常糟的那段（你就是因為它糟才介入的），拿它當基準會嚴重高估效果。對照必須是**同時間**的。\n\n### 推演題 3 **[15 分鐘]** ★★\n\n回想一個**你自己曾經相信過的「資料證明了 X」**——可以是工作上（某個 metric 的相關、某次優化的「效果」、某個 A/B 結論），也可以是生活上（某個健康建議、某條新聞「研究顯示⋯⋯」）。用本章的工具，**逐項排查**它可能其實是哪一種崩壞：p-hacking？選擇性報告？辛普森悖論（confounder）？回歸均值？口頭講出你的排查過程。\n\n#### 推演解答\n\n這題沒有標準答案，重點是你能不能把本章的工具當成一張**排查清單（checklist）**跑一遍。示範一個常見案例，你照這結構套自己的。案例：「我發現 dashboard 上**錯誤率和某個下游服務的延遲高度相關**，所以下游是根因。」\n\n```text\n排查清單                          套到這個案例\n────────────────────────────────────────────────────────────\n□ p-hacking / 多重比較？          我掃了幾條線才挑中這條？掃了二三十個\n                                  panel 才看到「同步」→ 很可能是 1−0.95ⁿ\n                                  撈出來的雜訊。高度可疑。\n\n□ 選擇性報告？                    有沒有忽略它們各走各的那幾天、只截了\n                                  同步那一段？→ 要看全程，不是挑段。\n\n□ 辛普森 / confounder？           有沒有第三個東西同時推高兩者？「整體\n                                  流量尖峰」會同時拉高錯誤率與下游延遲，\n                                  那相關是流量製造的、下游延遲是無辜的\n                                  （ch10 的 CPU/延遲/流量三角）→ 很可能。\n\n□ 回歸均值？                      （較不適用；但若據此「修了下游就好轉」，\n                                  要問：錯誤率是不是本來就要回落？）\n```\n\n跑完清單，結論大概是：「下游延遲 → 錯誤率」很可能根本不是因果——多重比較讓這個相關本身就可疑，就算相關為真也更像是「流量尖峰」這個 confounder 同時推高了兩者。要驗真因，得控制流量或做受控實驗。\n\n**為什麼這樣想**：本章所有崩壞的共同解藥，是把「我發現了 X」改成「我**排查過** X 不是這六種幻覺之一」。能對自己信過的結論跑這張清單、誠實承認「我撈圖編了故事」，你就內化了故障視角——這正是全書要交到你手上的東西。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。這幾題是全書故障視角的總驗收。\n\n1. 用一句話解釋「研究者自由度」，並說明為什麼 p-hacking「每一步都合理、卻系統性產出假發現」。它怎麼讓 ch18 的 α=0.05 保證失效？（要講到「保證的前提是事先定好流程、做一次」。）\n2. 你檢定 20 個其實全是假的假設，「至少撈到一個顯著」的機率是多少？手算給我聽。這跟你在 dashboard 上掃 40 張圖找相關，是不是同一件事？\n3. 為什麼 Ioannidis 說「大多數發表的發現是假的」？用 ch05 的篩檢/貝氏結構講——哪個量對應盛行率、哪個對應敏感度、哪個對應偽陽率？為什麼「低基率 + 低檢定力」就足以讓發現一半是假的？\n4. Open Science Collaboration 2015 那兩個數字（原始 97% 顯著 → 複現 36%）為什麼讓人脊背發涼？這跟「科學家在造假」是不是同一回事？\n5. 辛普森悖論：為什麼「每一組 A 都贏，合起來可能 B 贏」在數學上完全可能、不是算錯？用「加權平均 + confounder 操縱權重」講給我聽。\n6. 辛普森悖論最深的教訓**不是**「永遠看分組」。為什麼？柏克萊（該看分組）和腎結石（也該看分組）跟一個「該看合併」的情境，差別在哪？（要講到 confounder 的因果角色才是決定權所在。）\n7. 回歸均值為什麼是「假效果製造機」？用「考差的人複測會回升」或「飛行教官誇獎/痛罵」的例子，講清楚為什麼極端值天生會回擺，以及人怎麼把它誤記成介入的功勞。\n8. 全書故障視角的句點：為什麼說「機率統計是真理機器也是謊言機器，差別只在誠實」？崩壞的根因在數學還是在人？解藥是什麼？\n\n## 延伸閱讀\n\n- **Ioannidis 2005「Why Most Published Research Findings Are False」**（*PLoS Medicine* 2(8):e124，照 landscape）。本章複現危機的奠基文獻，元科學的起點。它的核心論證就是你已經會算的那道貝氏篩檢題——讀「讓發現更可能為假的條件清單」那一節，對照本章把每一條翻成「貝氏題的哪一格」，你會發現整篇論文其實是 ch05 的延伸。\n- **Open Science Collaboration 2015「Estimating the Reproducibility of Psychological Science」**（*Science*，照 landscape）。那個 97%→36% 數字的原始出處。不必讀完，讀摘要和那張「原始效應量 vs 複現效應量」的散點圖就夠震撼——你會親眼看到一整個領域的「發現」蒸發掉三分之二。\n- **Simmons, Nelson & Simonsohn 2011「False-Positive Psychology」**（*Psychological Science* 22(11)，照 landscape）。「研究者自由度」一詞的出處，也是把 5% 假陽性推到 60% 的那篇模擬。它末尾給研究者的「六條揭露要求」很值得讀——那就是把本章「崩壞的根因在隱瞞」翻成可操作的解藥（完全透明）。\n- **ASA 2016 對 p 值的聲明**（Wasserstein & Lazar, *The American Statistician* 70(2)，照 landscape）。一個專業學會的官方投降書。和 ch18 一起讀——ch18 教你 p 值是什麼，這份聲明是學界正式承認「連我們都受不了大家怎麼用它了」。第④條（完全透明）是本章的精神所在。\n- **回到 ch04、ch05、ch10、ch16**：辛普森是 ch04「條件獨立≠邊際獨立」長出的牙；Ioannidis 是 ch05 篩檢貝氏的放大版；confounder 是 ch10 的高潮；回歸均值的解藥（隨機對照）是 ch16 的隨機化。本章是這四章的收割——能把它們串成一條「故障視角」的線講完，你對全書下半場的掌握就到位了。\n- **預告 ch20**：本章提過 p 值會「隨機漫步」——正是下一章的主題。把資料累積想成硬幣的一步 ±1，p 值的抖動就是一條隨機漫步路徑，而「等它偶然跌破 0.05」的選擇性停止，本質上是 ch20 賭徒破產的近親：給隨機過程足夠多時間，它遲早會碰到任何你設的線。\n"}, {"id": "ch20-random-walk", "file": "ch20-random-walk.md", "group": "Part VI — 隨機過程與收官", "title": "ch20 — 隨機漫步與賭徒破產：時間軸上的隨機", "md": "# ch20 — 隨機漫步與賭徒破產：時間軸上的隨機\n\n> **本章解決什麼問題**：歡迎來到 Part VI，全書的最後一個 Part。前面十九章你看的隨機大多是「靜態」的——擲一次硬幣、抽一把樣本、算一個分布。但真實系統裡的隨機是**沿著時間軸長出來**的：佇列長度一秒一秒地漲跌、重試的退避時間一輪一輪地累積、股價一刻一刻地飄。這一章把脊椎硬幣做最後一次升級——把每一擲從「0 或 1」變成「+1 或 −1」，然後把它們**沿時間累加**起來，你就得到了一維隨機漫步（random walk）。接著我們會撞上兩個漂亮到不像話的反直覺：對稱漫步**保證會回到原點（機率 1）**，可是你**永遠等不到**它（期望回返時間是無限的）——「會回家，但別等它」；還有賭徒破產（gambler's ruin），它會告訴你為什麼「翻本加倍下注法」在數學上必敗、為什麼「攤平加碼」是同一個必敗結構穿了金融的西裝。這一章是 ch22 布朗運動的離散前身：你在這裡看懂的鋸齒，縮小步長取極限就是花粉的抖動與股價的曲線。\n\n```text\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理         ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步 ◄你在這裡  ch16 抽樣的大膽   ←   ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n「你在這裡」走進了最後一個 Part。前五個 Part 我們把隨機**橫切**著看——一個事件、一個變數、一次推論。Part VI 把它**縱切**：同一個隨機源，讓它沿時間跑下去，看它畫出什麼軌跡。這一章是隨機漫步，下一章 ch21 是馬可夫鏈（無記憶的旅程），ch22 是布朗運動（把漫步的步長縮到無限小），ch23 收官。\n\n## 從你已知的出發\n\n你天天在跟「沿時間累積的隨機」打交道，只是沒把它叫做隨機漫步。\n\n最貼的例子是 **exponential backoff + jitter**。一個請求失敗了，你不會立刻重試（會打出重試風暴），你退避一段時間再來；失敗就把退避時間加倍，而且加上一個隨機抖動避免所有 client 同步。把「這一輪退避時間」想成一條沿著重試次數走的軌跡——它在跳、有隨機成分、會累積。你早就直覺地知道：這條軌跡**沒有記憶**，第五次重試的退避不會因為前四次失敗就「比較容易成功」。系統不欠你一個成功。記住這句話，本章後半的賭徒謬誤就是它的數學版。\n\n再看**佇列長度**。一個 work queue，每秒有任務進來、有 worker 消化。進出速率大致打平的時候，佇列長度不是穩穩停在某個值——它在一條看不見的中線附近**隨機漂移**，這秒進得多漲一格、下秒消化得快跌一格。你盯著 dashboard 上那條鋸齒線，心裡其實在問一個隨機漫步的問題：「它會不會剛好一路漲、漲到爆掉？」會的，只是機率多大、要等多久——這正是這一章要算的東西。\n\n還有一個更貼錢包的：**攤平加碼**。某個投資跌了，有人說「再買一點拉低均價，反彈就回本了」;跌更多，「再加碼，這樣反彈一點點就解套」。這套操作有個古老的賭桌名字叫「翻本加倍法」，它在數學上有一個極乾淨的結論：**在資金有限的前提下，它必敗。** 不是「風險高」，是結構性的必敗。本章的賭徒破產會把這件事證給你看。\n\n這三件事——退避軌跡、佇列漂移、攤平加碼——共享同一個骨架：**一個隨機量沿時間一步一步累加，你關心的不是「下一步」，而是「這條軌跡長期會跑去哪、會不會撞到某條線」。** 這就是隨機漫步。我們先把脊椎硬幣升級成它。\n\n## 把硬幣變成一條軌跡：一維隨機漫步\n\n**對，就是 ch01 那枚公正硬幣。** 我們已經認識它七次了——古典 1/2、期望 1/2、變異數 1/4、二項、比例收斂、常態近似、檢定公正性。現在做第八次升級，而且是最戲劇性的一次：**把每一擲變成走一步。**\n\n規則極簡單：\n\n```text\n擲到正面 → 往右走一步,位置 +1\n擲到反面 → 往左走一步,位置 −1\n```\n\n從原點 0 出發，擲一次硬幣決定往哪走一步，再擲再走。設第 i 擲的步伐是 Sᵢ:正面 Sᵢ=+1、反面 Sᵢ=−1，各 1/2。那麼 n 步之後你的**位置**就是：\n\n```text\nXₙ = S₁ + S₂ + … + Sₙ      ← 把前 n 步全部加起來\n```\n\n注意這個「加起來」。ch09 到 ch15 我們一直在加 iid 隨機變數——加總的變異數、加總的鐘形。隨機漫步就是**同一個加總，只是這次我們不丟掉中間過程，而是把每一個部分和 Xₙ 都記下來、沿時間畫出來**。它不再是一個數字，是一條軌跡。\n\n畫個樣子給你看。擲出「正反正正反反正反」這八步，每步在數線上 ±1，把位置一格一格描出來（● 是你當下的位置，愈靠右愈往未來）:\n\n```text\n步數     0    1    2    3    4    5    6    7    8\n擲出          正   反   正   正   反   反   正   反\n位置     0   +1    0   +1   +2   +1    0   +1    0\n\n +2                          ●\n +1           ●        ●          ●          ●\n  0    ●            ●                   ●          ●\n −1\n```\n\n每一步只往上或往下一格，把這些 ● 連起來就是一條上上下下的鋸齒。換一組硬幣結果，你得到完全不同的另一條鋸齒。隨機漫步研究的不是某一條，是**所有可能軌跡的統計行為**。\n\n先把幾件能立刻算出來、且都是回收前面章節的事釘死：\n\n**第一，任何一步的期望位移是 0。** E[Sᵢ] = (+1)(1/2) + (−1)(1/2) = 0。所以 n 步之後位置的期望 E[Xₙ] = 0。**漫步「平均而言」哪都不去**，永遠以原點為中心——它沒有漂移（drift）。這是「公正」的數學意思。\n\n**第二，它散開的速度是 √n。** 每一步的變異數 Var(Sᵢ) = E[Sᵢ²] − 0² = 1(因為 (+1)²=(−1)²=1)。步與步獨立，變異數相加（ch09 的招牌），所以 Var(Xₙ) = n，標準差 SD(Xₙ) = √n。\n\n停在這裡看一眼，因為這個 √n 是全書的老朋友又來了。ch09 講過「和的標準差長 √n、平均的標準差縮 √n」;ch13 講過硬幣「正面減反面」的
