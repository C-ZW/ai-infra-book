[X³] = (−8−1+0+1+8)/5 = 0` ✓。兩法一致。\n\n(b) 左半邊（X 從 −2 到 0）X 升 Y 降，貢獻負的乘積；右半邊（X 從 0 到 2）X 升 Y 升，貢獻正的乘積。拋物線對稱，左右兩邊的貢獻**大小相等、符號相反，完美抵銷**，所以 Cov = 0。但 Y 明明完全由 X 決定（給 X 就鎖死 Y）——關係強到極致，ρ 卻看不見，因為 ρ 只認直線、不認拋物線。\n\n(c) 範例（你的答案會不同，重點是抓到「強關係但 ρ≈0」）：**執行緒池大小 vs 吞吐量**，倒 U 形——池太小，併發不足、吞吐低；池太大，context switch 和鎖競爭把吞吐拖垮；中間有個甜蜜點吞吐最高。如果你拿一堆不同池大小的測量算一個 ρ，很可能拿到接近 0 的數（左半邊正相關、右半邊負相關抵銷），然後得出「池大小跟吞吐量無關，隨便設」——災難。事實上它們關係強到你的容量規劃全靠它。正確做法：畫散佈圖看出倒 U、找甜蜜點，而不是信那個瞎了的 ρ。\n\n### 推演題 4：把「相關即因果」的結論拆成四條岔路 **[15 分鐘]** ★★\n\n口頭＋紙筆題。下面每個情境都有人從「相關」跳到了「因果」。對每一個，判斷它最可能是四條岔路（真因果 / 反向因果 / 共同原因 / 純屬巧合）的哪一種，並說怎麼驗證：\n\n(i) 「我們發現用了新 SDK 的客戶端，崩潰率比較高，所以新 SDK 害的。」\n(ii) 「冰淇淋賣得多的月份，溺水也多，所以該禁冰淇淋。」\n(iii) 「重啟次數多的服務，不健康事件也多，所以別重啟。」\n(iv) 「我們網站流量上升的那幾週，剛好某遠方國家的咖啡進口量也上升，市場有連動。」\n\n#### 推演解答\n\n沒有絕對標準答案（真相要靠資料和機制判斷），但合理的拆法：\n\n(i) **可能是真因果，但要小心共同原因**。新 SDK 真的可能有 bug（X→Y）。但也可能是 confounder：願意嘗鮮裝新 SDK 的，往往是用 beta 通道、跑舊機型、或網路差的高風險使用者——是「使用者類型」這個 Z 同時推高了「裝新 SDK」和「崩潰率」。驗證：**做隨機實驗**——隨機把一部分使用者推新 SDK（而不是讓他們自選），比較崩潰率。隨機化斬斷「使用者類型」這個 confounder。\n\n(ii) **共同原因（confounder = 氣溫/夏天）**。冰淇淋和溺水都被夏天頂高，彼此無因果。驗證：固定季節（只看七月內各週），相關會消失。禁冰淇淋救不了任何人。\n\n(iii) **反向因果**。是服務先不健康、你才去重啟它（不健康 → 重啟），不是重啟害它不健康。驗證：看時間順序——不健康事件是在重啟**之前**還是之後發生？十之八九在之前。\n\n(iv) **純屬巧合（虛假相關）**。流量和遠方咖啡進口量沒有任何可信機制，這是在海量時間序列裡撈到的同步（緬因離婚率 vs 人造奶油那一類）。驗證：問「有機制嗎？」——沒有；換個時間窗或換個國家，相關大概就垮了。別動手。\n\n四題的共同解藥：**看到相關，先別接受箭頭。** 跑一遍「真因果？反向？confounder？巧合？」這張清單，再決定要不要、以及怎麼做實驗。能隨機化就隨機化——那是把相關升級成因果的唯一硬通貨。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先答「為什麼」。\n\n1. 共變異數定義裡那個「兩個偏差相乘」`(X−μ_X)(Y−μ_Y)`，為什麼能抓到「同向／反向」？把「負負得正」那個機制講給人聽，不准只念公式。\n2. 共變異數已經告訴你正相關還是負相關了，為什麼還要除以 `σ_X·σ_Y` 變成 ρ？ρ 比 Cov 多了哪兩個好處？（提示：尺度、可比較）\n3. 「ρ = 0 所以這兩個指標沒關係」——這句話錯在哪？用 `Y=X²` 或一個你自己的 U 形例子講清楚 ρ「瞎」在哪裡。\n4. 「獨立」和「不相關」差在哪？為什麼「獨立 ⟹ 不相關」但「不相關 ⇏ 獨立」？哪個是更強的條件，為什麼？\n5. `Var(X+Y) = Var(X) + Var(Y) + 2Cov(X,Y)` 裡那個 `2Cov` 項，在工程上什麼時候會讓「合併兩個服務」的總波動**變大**、什麼時候**變小**？這跟 ch09 的 √n 法則前提有什麼關係？\n6. 「相關不是因果」背後有四條岔路，講得出是哪四條嗎？為什麼一個 ρ 永遠分不出是哪一條？（提示：ρ 對稱、因果有方向）\n7. 為什麼 A/B 隨機化能把「相關」升級成「因果」，而盯 dashboard 不能？那枚隨機的硬幣到底斬斷了什麼？\n8. 你的系統裡「CPU 高和延遲高相關」——為什麼降 CPU 可能救不了延遲？這是四條岔路的哪一條，confounder 是誰？\n\n## 延伸閱讀\n\n- **Tyler Vigen，《Spurious Correlations》（網站 tylervigen.com 與同名書，2026-06 查證）**。本章「虛假相關」段的活教材。直接去看那些 ρ>0.99 卻荒謬絕倫的配對（緬因州離婚率 vs 人造奶油、各種離奇同步曲線）——看完你對「相關係數高」這件事會永久免疫，再也不會把高 ρ 當因果證據。當笑話讀，但記住那個寒意：你的 dashboard 上也有這種對子。\n- **Francis Galton，〈Co-relations and their Measurement, Chiefly from Anthropometric Data〉，Proc. Royal Society 45 (1888)（2026-06 查證）**。相關係數的出生證明，相當短、可讀。看 Galton 怎麼從親子身高的散佈點，第一次把「有關係」壓成一個數，以及他為什麼堅持寫「co-relation」。歷史現場感十足——一個概念誕生的那一刻。\n- **任何一本扎實機率入門的「共變異與相關」章**（如 Blitzstein & Hwang《Introduction to Probability》，網路有免費講義與課程影片）。如果你想把 `Cov`、ρ、`Var(X+Y)` 的代數練到反射、看 `|ρ|≤1` 的柯西–施瓦茲證明，看它的推導與例題。但記得本書立場：你要的是「為什麼 ρ 只抓線性、為什麼相關不是因果」的直覺，不是刷題。\n- **Judea Pearl & Dana Mackenzie，《The Book of Why》（中譯《因果革命》）**。如果本章「相關 ≠ 因果」讓你癢起來、想知道怎麼**正式地**從資料推因果（而不只是隨機實驗），這本是現代因果推論的科普入口——confounder、do-演算、因果圖。本書刻意只到「三條岔路＋隨機化直覺」為止（多變量與因果框架是全域不涵蓋的洞），想往下走就讀它。\n- **本書內部銜接**：「不相關 ⇏ 獨立」是 ch04「假獨立」陷阱的近親（獨立是 ρ=0 且更強）；隨機化斬斷 confounder 的完整威力見 ch16（抽樣的大膽）；confounder 製造「分組翻盤」的極致是 ch19 辛普森悖論；相關係數的孿生兄弟「回歸均值」（同樣源自 Galton、同樣用符號 r）也在 ch19——你會看到本章埋的這條線怎麼開花。\n"}, {"id": "ch11-discrete-distributions", "file": "ch11-discrete-distributions.md", "group": "Part III — 隨機變數", "title": "ch11 — 分布動物園（上）：離散家族", "md": "# ch11 — 分布動物園（上）：離散家族\n\n> **本章解決什麼問題**：前面四章（ch07–10）你學會把隨機結果變成數字（隨機變數）、算它的長期平均（期望）、算它的抖動大小（變異數）、算兩個變數怎麼一起動（共變異）。但這些都是「對任意分布都成立」的通用工具。現在要做的事相反：認識幾個**具名的、反覆出現的**分布——它們不是隨便長出來的，而是某種固定情境的指紋。本章只收離散家族（結果是可數的、一顆一顆的）：伯努利、二項、幾何、卜瓦松。重點不是背公式，是看出它們其實是同一條血脈，而且最後那隻卜瓦松，會給你本章的驚嘆點——一大堆看起來毫不相干的「稀有計數」，竟然都長同一個形狀。連續家族（指數、常態、長尾）留給 ch12。\n\n## 從你已知的出發\n\n你其實已經跟這幾隻動物打過很多年交道，只是沒人幫你貼上學名。\n\n你寫過重試邏輯。一次外部 API 呼叫，要嘛成功要嘛失敗——這是**伯努利（Bernoulli）**，一次成敗。你設了 `maxRetries: 100`，那這 100 次裡會成功幾次？這個「成功數」服從**二項（binomial）**分布。你關心的其實常常不是「成功幾次」，而是「第幾次才終於成功」——backoff 重試到第三次才通，那個「要等到第幾次」服從**幾何（geometric）**分布。\n\n然後是最有意思的那隻。你盯著 Grafana 上「每分鐘 5xx 錯誤數」「每秒進來幾個請求」這種計數型 metric。它們有個共同點：在任何一個極短的瞬間，發生一次的機率都很低，但時間軸夠長、機會夠多，總量就積出來了。這種「大量機會、每次都罕見、加起來的計數」，幾乎一定可以用**卜瓦松（Poisson）**分布來近似。你設告警閾值時，心裡其實在問「正常情況下這個計數會飆到多少」——那條你憑經驗抓的上界，背後就是卜瓦松。\n\n我先把本章的地圖攤開，因為這四隻動物不是平行並列的四個東西，它們是一條有方向的血脈：\n\n```text\n       伯努利              二項                幾何\n     單次成敗      n 次獨立、數成功數    第一次成功要等幾次\n    （1 個位元）  ──────────────►   （換個問法：問「等多久」）\n         │              │                    │\n         │              │ n→∞、p→0           │ 離散版「無記憶性」\n         │              │ np=λ 固定          │ 預告 ch12 指數\n         │              ▼                    ▼\n         │           卜瓦松              （見 ch12 連續家族）\n         │       稀有事件的普適形狀\n         └──── 全都是「一連串獨立成敗」的不同問法 ───┘\n```\n\n伯努利是原子——一個位元、一次成敗。二項是「把 n 個位元加起來數有幾個 1」。幾何是「同一串位元，問第一個 1 出現在哪」。卜瓦松是二項在某個極限下的影子。看懂這條血脈，你就不用把它們當四個獨立公式背，而是當同一個故事的四種問法。\n\n## 伯努利：一個位元的分布\n\n最小的非平凡隨機變數，就是只有兩個值的那種。一次擲幣（正／反）、一次 API 呼叫（成功／失敗）、一封信是不是垃圾信（是／否）。把其中一個結果叫「成功」、編號 1，另一個叫「失敗」、編號 0，成功機率是 p。這就是**伯努利分布**，記成 X ~ Bernoulli(p)。它的 PMF（probability mass function，機率質量函數）短到一行：\n\n```text\nP(X = 1) = p          ← 成功\nP(X = 0) = 1 − p      ← 失敗\n```\n\n就這樣。它窮到只有一個參數 p，但別小看它——它是整個離散家族的原子，後面三隻都是拿它疊出來的。\n\nch08 跟 ch09 其實已經把它的期望跟變異算過了，這裡複習一下、順便看出一個漂亮的小事實。期望值是「值乘以機率的加總」：\n\n```text\nE[X] = 1·p + 0·(1−p) = p          ← 期望就是成功機率本身\n```\n\n這很合理：如果成功記 1、失敗記 0，那長期平均下來就是成功的比例，也就是 p。變異數呢，用 ch09 的 Var(X) = E[X²] − (E[X])²。因為 X 只取 0 跟 1，X² 跟 X 一模一樣（0²=0、1²=1），所以 E[X²] = E[X] = p，於是：\n\n```text\nVar(X) = E[X²] − (E[X])² = p − p² = p(1−p)\n```\n\n`p(1−p)` 這個東西你盯著看一下，它在 p=1/2 的時候最大（等於 1/4），往兩端 p→0 或 p→1 的時候趨近 0。這完全符合直覺：一個幾乎一定成功（p≈1）或幾乎一定失敗（p≈0）的事件，幾乎沒有不確定性，變異數當然小；最不確定、最難猜的，是 50/50 那一刻。\n\n**這是 ch01 那枚硬幣**：一枚公正硬幣的單擲，就是 Bernoulli(1/2)。E[X]=1/2、Var(X)=1/4、SD=1/2——這幾個數你在 ch08、ch09 已經見過，現在它們有了學名。脊椎硬幣的第一層，是一隻伯努利。\n\n## 二項：把 n 個位元加起來\n\n現在把那枚硬幣擲 10 次，問「出現幾次正面」。或者把那支 API 重試 100 次，問「成功幾次」。把同一個伯努利試驗**獨立重複 n 次**，數其中「成功」的總數，這個總數就服從**二項分布**，記成 X ~ Binomial(n, p)。\n\n關鍵字是「獨立」跟「相同」——每次試驗成功機率都是同一個 p，而且彼此不影響。你的重試如果每次都是對同一個獨立服務、條件相同，那這個假設大致成立；但如果失敗是因為服務掛了（那接下來幾次也會跟著掛），那就**不獨立**了，二項分布會騙你。記住這個前提，它正是工程裡最常被偷偷違反的地方（ch04 講過的相關性故障，換個場景又回來了）。\n\n二項分布的 PMF 是這樣的，我們不要先丟公式，先用「想得出來」的方式把它推出來：\n\n要在 n 次裡剛好成功 k 次，得回答兩個問題。第一，**哪幾次成功**？n 次裡挑 k 次當成功的位置，有 C(n,k) 種挑法（n 取 k，組合數，ch03 複習過）。第二，**某一種特定的成敗序列**機率是多少？比方說「成、成、…、成（k 個）、敗、敗、…、敗（n−k 個）」，因為獨立，機率就是各次相乘：pᵏ·(1−p)ⁿ⁻ᵏ。而每一種有 k 個成功的序列，機率都一樣（不管成功擺哪幾個位置，總是 k 個 p 乘 n−k 個 (1−p)）。所以把「位置的種數」乘上「每種的機率」：\n\n```text\n                k       n−k\nP(X = k) = C(n,k) · p · (1−p)        k = 0, 1, 2, ..., n\n```\n\n三個因子，你要能一個一個指著唸出它在幹嘛：C(n,k) 是「成功擺在哪幾次」的種數，pᵏ 是「那 k 次都成功」，(1−p)ⁿ⁻ᵏ 是「其餘 n−k 次都失敗」。沒有任何一項是憑空冒出來的。\n\n期望跟變異不用重推——二項就是 n 個獨立伯努利相加，而 ch08 的期望線性性說「和的期望＝期望的和」（連不獨立都成立，這裡更是獨立），ch09 的「獨立和變異數相加」也直接套用。每個伯努利期望 p、變異 p(1−p)，加 n 個：\n\n```text\nE[X]   = n·p             ← n 次、每次平均貢獻 p 個成功\nVar(X) = n·p(1−p)        ← 獨立，所以變異數直接相加\n```\n\n**這是 ch01 那枚硬幣**：n 擲公正硬幣的正面數 ~ Binomial(n, 1/2)，E=n/2、Var=n/4、SD=√n/2。脊椎硬幣的第三層。這個 √n/2 之後在 ch13、ch14 會變成全書最反直覺的一頁的主角，先記著它。\n\n### Worked example：脊椎硬幣 Binomial(10, 1/2) 的完整 PMF 與直方圖\n\n把硬幣擲 10 次，正面數從 0 到 10，每個的機率是 C(10,k)·(1/2)¹⁰ = C(10,k)/1024。分母都是 2¹⁰ = 1024（每次 2 種結果、10 次、獨立，總共 1024 種等可能序列），分子就是組合數。我手算列一遍 C(10,k)，你可以拿巴斯卡三角形對：1, 10, 45, 120, 210, 252, 210, 120, 45, 10, 1。加起來剛好 1024（交叉驗算：1+10+45+120+210+252+210+120+45+10+1 = 1024 ✓，這就是 Σ C(10,k) = 2¹⁰）。\n\n```text\n k   C(10,k)   P(X=k)=C(10,k)/1024   ≈\n─────────────────────────────────────────\n 0       1         1/1024            0.0010\n 1      10        10/1024            0.0098\n 2      45        45/1024            0.0439\n 3     120       120/1024            0.1172\n 4     210       210/1024            0.2051\n 5     252       252/1024            0.2461   ← 最高，正中央\n 6     210       210/1024            0.2051\n 7     120       120/1024            0.1172\n 8      45        45/1024            0.0439\n 9      10        10/1024            0.0098\n10       1         1/1024            0.0010\n─────────────────────────────────────────\n 合計  1024        1024/1024         1.0000   ← 機率總和為 1 ✓\n```\n\n把機率畫成橫條（每個 █ 約代表 0.005），你會看到一件值得停下來的事：\n\n```text\n k=0 │                                            0.0010\n k=1 │██                                          0.0098\n k=2 │████████                                    0.0439\n k=3 │███████████████████████                     0.1172\n k=4 │████████████████████████████████████████    0.2051\n k=5 │█████████████████████████████████████████████████ 0.2461\n k=6 │████████████████████████████████████████    0.2051\n k=7 │███████████████████████                     0.1172\n k=8 │████████████████████████████████            0.0439\n k=9 │██                                          0.0098\nk=10 │                                            0.0010\n     └──────────────────────────────────────────────────\n```\n\n等等，k=8 那行畫太長了——我故意留這個錯給你抓：k=8 的機率是 0.0439，跟 k=2 一樣，應該跟 k=2 等長。對稱性是這張圖的鐵律，因為公正硬幣 p=1/2，「正面 k 次」跟「反面 k 次（也就是正面 10−k 次）」機率必然相等。正確的圖左右完全對稱，中間 k=5 最高，往兩邊一階一階矮下去。\n\n這個形狀——**對稱、中間鼓、兩邊薄**——就是鐘形的雛形。現在只有 11 根柱子、還很粗糙，但你已經能看出端倪了。把 n 從 10 推到 100、1000，柱子愈來愈密、輪廓愈來愈滑，它會收斂到一條精確的鐘形曲線。**這正是 ch14 中央極限定理的劇透**，而且不是隨便哪條鐘形——歷史上第一個中央極限定理，就是棣美弗（de Moivre）1733 年在算這個二項分布的常態近似（照 landscape，ch14 細講）。脊椎硬幣從一隻伯努利，疊成二項，正在悄悄長成常態。你現在看到的這張對稱直方圖，是那條故事線的第一幀。\n\n## 幾何：不問「成功幾次」，問「等到第幾次」\n\n二項問的是「n 次裡成功幾次」。幾何問一個方向相反的問題：**一直試下去，第一次成功出現在第幾次？**\n\n這在工程裡其實更貼近你的直覺。你的 backoff 重試不會傻傻跑滿 100 次——一成功就停了。你真正關心的是「平均重試到第幾次會通」。或者你在等一個罕見事件第一次發生：抽獎抽到第幾次中、壓測打到第幾個請求才觸發那個 race condition。這個「第一次成功的等待次數」服從**幾何分布**。\n\n設每次成功機率 p、各次獨立。要「第 k 次才第一次成功」，意思是前 k−1 次全都失敗、第 k 次成功。因為獨立，直接相乘：\n\n```text\nP(X = k) = (1−p)^(k−1) · p        k = 1, 2, 3, ...\n            └ 前 k−1 次全敗 ┘  └ 第 k 次成功\n```\n\n注意 k 可以是 1、2、3……一直到無窮——理論上你可能一直失敗、永遠等不到（雖然機率愈來愈小）。期望值（第一次成功平均要等幾次）是 **E[X] = 1/p**，這個我們待會在紙上推演用脊椎硬幣手算驗證它等於 2。直覺上也合理：成功機率 1/10 的事，平均要試 10 次才中第一次。\n\n### 離散版的無記憶性：硬幣不記得你等了多久\n\n幾何分布藏著本章第二個值得驚嘆的東西，而它正是賭徒謬誤（ch13 會專門處理）的數學根源。\n\n假設你已經失敗了 10 次，還沒成功。問：「我已經等了 10 次了，接下來是不是該成功了？該輪到我了吧？」\n\n數學的回答冷酷得很美：**不。你前面等了多久，完全不影響未來。** 用條件機率寫出來——「已經失敗 m 次的前提下，還要再等超過 n 次」的機率，等於「從頭開始還要等超過 n 次」的機率：\n\n```text\nP(X > m + n | X > m) = P(X > n)\n```\n\n我們手推一下為什麼。先算「至少要等超過 k 次」是多少——那等於「前 k 次全部失敗」，也就是 P(X > k) = (1−p)ᵏ。代進條件機率的定義（ch04：限縮到條件再標準化）：\n\n```text\n                       P(X > m+n)     (1−p)^(m+n)\nP(X > m+n | X > m) = ─────────────── = ───────────── = (1−p)^n = P(X > n)\n                        P(X > m)        (1−p)^m\n```\n\n那個 (1−p)^m 上下消掉了——**你過去累積的失敗，從分子分母一起被約掉，對未來毫無影響。** 這就是無記憶性（memorylessness）。每一次擲幣都是嶄新的、跟前面無關的一次，硬幣沒有記憶體、不存帳、不欠你一個正面。\n\n這裡有個值得寫進書的硬事實：**幾何分布是唯一具有無記憶性的離散分布**（2026-06，已查證）。沒有別的離散分布能做到這件事。它在連續世界有個雙胞胎——指數分布，那是唯一無記憶的連續分布，是「等待時間」的版本（公車已經等了十分鐘也不會比較快來）。**ch12 會專門講指數的無記憶性之美**，這裡先讓你看到它的離散原型。一旦你內化了「每次都是全新的、過去被約分掉了」，你就永遠不會再相信「連輸五把該贏了」這種話——那種「該平衡了」的直覺，正是把無記憶的東西想成有記憶。\n\n## 卜瓦松：稀有事件的普適形狀（本章的驚嘆點）\n\n現在來看本章真正了不起的那隻。前面三隻都還算「你想得到」，卜瓦松不一樣——它會讓你停下來想「為什麼這麼多不相干的東西，竟然長一模一樣」。\n\n先講它從哪來。卜瓦松不是憑空定義的，它是**二項分布在一個極限下的影子**。設想一個情境：機會非常多（n 很大），但每次機會發生的機率非常小（p 很小），而你只在乎「平均發生幾次」這個量，把它固定下來叫 λ（lambda），也就是 λ = n·p 保持不變。\n\n這個情境到處都是。一天有 86400 秒（n 大），每一秒進來一個特定使用者請求的機率很小（p 小），但「平均每天幾個」是個穩定的數（λ）。一個城市有幾百萬人（n 大），每個人今天出某種罕見車禍的機率極小（p 小），但「平均每天幾起」很穩定。普魯士某個軍團有一堆士兵跟一堆馬（n 大），任一個士兵今年被馬踢死的機率微乎其微（p 小），但「平均每年踢死幾個」是個固定的數。\n\n當 n→∞、p→0、而 np=λ 固定時，二項分布 Binomial(n, p) 收斂到一個只剩單一參數 λ 的分布，這就是**卜瓦松分布**：\n\n```text\n         e^(−λ) · λ^k\nP(X = k) = ─────────────        k = 0, 1, 2, 3, ...\n              k!\n```\n\n那個 e（≈2.71828）從哪冒出來的？這正是卜瓦松最迷人的地方——它是極限過程裡 (1−p)ⁿ 這一項在 n→∞ 時自然趨近 e^(−λ) 的結果（你大學在《馴服無限》看過 lim(1+x/n)ⁿ → eˣ，現在它在機率裡現身了）。我們不硬推這個極限（嚴格證明指向延伸閱讀），但下一節的 worked example 會用具體數字讓你**親眼看到**二項一步步逼近卜瓦松，逼到幾乎重合。\n\n卜瓦松有個漂亮到不像話的性質：**它的期望跟變異數是同一個數，都等於 λ**。\n\n```text\nE[X] = λ          Var(X) = λ\n```\n\n這你可以從二項極限看出來：二項的 E=np=λ；二項的 Var=np(1−p)，但 p→0 時 (1−p)→1，所以 Var→np=λ。期望跟變異數黏在一起，這是卜瓦松的指紋。實務上這給你一個一眼判斷的工具：如果你的計數型 metric 大致是卜瓦松的，那它的標準差就該是 √λ。平均每分鐘 100 個錯誤，標準差就約 √100=10，所以看到 130 個（偏離 3 個標準差）就值得緊張，看到 110 個（1 個標準差內）是正常呼吸。SRE 的告警閾值，骨子裡常常就是這個 √λ。\n\n### 為什麼這隻動物美：一堆不相干的計數，長同一個形狀\n\n這才是驚嘆點，我要把它講到你能轉述。\n\n卜瓦松的了不起，不在公式漂亮，而在它的**普適性（universality）**。剛剛那串例子——使用者請求、車禍、馬踢死人——它們之間沒有任何物理上的共通點。請求是封包，車禍是金屬撞擊，馬踢是生物學意外。它們唯一的共通結構是抽象的：**大量獨立的機會、每個機會本身極罕見、你只數總量。** 而光憑這個抽象結構，不管底層是什麼鬼東西，計數的分布**就一定長成卜瓦松那個形狀**，由單一個 λ 完全決定。\n\n換句話說，卜瓦松不在乎你數的是什麼。它只在乎「稀有」跟「大量機會」這兩個條件。一旦滿足，細節全被抹掉，只剩 λ 存活。這跟 ch14 的中央極限定理是同一種震撼的離散版——個別事件完全不可測（哪個士兵、哪一天被踢死，沒人能預言），但總體的分布精確可測，而且**這個形狀對所有滿足條件的稀有計數都一樣**。人類竟然找得到一個橫跨封包、車禍、馬蹄的共同數學形狀，這件事本身就值得你坐下來想三分鐘。\n\n歷史上把這件事釘死的，是兩個人。卜瓦松（Siméon Denis Poisson）本人在 **1837 年**的《關於刑事與民事審判機率的研究》裡，第一次寫下這個分布（他當時在算陪審團判決，照 landscape）。但真正讓它名留教科書的，是 60 年後的波特基維茨（Ladislaus Bortkiewicz）——他 **1898 年**寫了一本書叫《小數法則》（Das Gesetz der kleinen Zahlen），裡面分析了一份現在已經成為經典的資料：**普魯士軍隊裡被馬踢死的士兵人數**（照 landscape）。\n\n這份資料美在哪？他收集了好幾個騎兵軍團、橫跨 20 年的紀錄，每個「軍團—年」是一筆觀測，總共 200 筆，記錄那一年那個軍團有幾個人被馬踢死。把這 200 筆按「死亡人數 0、1、2、3、4」分類數一數，跟卜瓦松（λ = 122/200 = 0.61，也就是平均每軍團每年踢死 0.61 人）預測的次數並排——我用 λ=0.61 親手把卜瓦松的預期次數算出來（e^(−0.61)·0.61^k/k! 再乘 200），對照他的觀測：\n\n```text\n 死亡數 k   觀測次數   卜瓦松預期（λ=0.61, ×200）\n──────────────────────────────────────────────\n   0          109          108.7\n   1           65           66.3\n   2           22           20.2\n   3            3            4.1\n   4            1            0.6\n──────────────────────────────────────────────\n   合計        200          約 200\n```\n\n你盯著這兩欄看。109 對 108.7。65 對 66.3。22 對 20.2。一個用最抽象的公式（e、階乘、一個叫 λ 的數）算出來的東西，竟然精準命中了真實普魯士士兵被馬踢死的歷史紀錄。馬踢死人這種事，個別來看完全是命運的玩笑——沒人能說哪個倒楣鬼哪一天會被哪匹馬踢中。但把它當成「大量機會、每次罕見」的計數來看，它服從一條鐵律，鐵到你能用一個希臘字母預測一百多年前的死亡分布。這就是「人類竟想得出這個」的那種震撼，而且它不是比喻、是一張你能對帳的真實數字表。\n\n工程橋接：你的「每分鐘 5xx 錯誤數」「每秒到達請求數」用卜瓦松近似，背後是同一回事——大量極短瞬間（機會多）、每瞬間出事機率低（罕見）、你數總量。**Poisson 過程的時間軸推導**（把這個計數放到連續時間上、到達間隔、排隊長度）以及它在排隊系統的運算應用，**那是另一本書的主場**——（見《佇列論》ch05）。本書到此為止：我們只欣賞「為何稀有計數都長這個形狀」這件事本身的美，運算深度交給隔壁書架那本。\n\n### Worked example：親眼看二項收斂到卜瓦松\n\n光說「二項在極限會變卜瓦松」太抽象，我們用基準數字讓你親眼看到它逼近的過程。\n\n設 n = 1000、p = 0.001。這正是「機會多、每次罕見」：一千次試驗、每次成功機率千分之一。所以 λ = np = 1000 × 0.001 = 1。我們來並排算二項 Binomial(1000, 0.001) 跟卜瓦松（λ=1）對 k=0、1、2 的機率。\n\n先算二項那邊。P(X=0)：一千次全失敗，就是 (1−0.001)¹⁰⁰⁰ = 0.999¹⁰⁰⁰。這個數你心算不出來，但可以估：ln(0.999¹⁰⁰⁰) = 1000·ln(0.999) ≈ 1000·(−0.0010005) ≈ −1.0005，所以 ≈ e^(−1.0005) ≈ 0.3677。（這裡偷用了 ln(1−x)≈−x，正是「p 很小」讓近似成立的地方。）\n\n卜瓦松那邊更直接。P(X=0) = e^(−1)·1⁰/0! = e^(−1)。這個常數值得你背起來，全書反覆出現：**e^(−1) ≈ 0.3679**。我交叉驗算一下這個值：e ≈ 2.71828，1/2.71828 = 0.36788，四捨五入 0.3679 ✓。\n\n把幾個並排：\n\n```text\n   k     二項 Binomial(1000, 0.001)    卜瓦松（λ=1）      差距\n────────────────────────────────────────────────────────────────\n   0           0.3677                   e^(−1)  = 0.3679    0.0002\n   1           0.3681                   e^(−1)  = 0.3679    0.0002\n   2           0.1840                   e^(−1)/2 = 0.1839   0.0001\n────────────────────────────────────────────────────────────────\n```\n\n兩邊幾乎重合，差距在小數第四位。注意一個漂亮的巧合：λ=1 的卜瓦松，P(0) 跟 P(1) **完全相等**，都是 e^(−1)。從公式看就懂——P(k=1) = e^(−1)·1¹/1! = e^(−1)，跟 P(k=0) = e^(−1)·1⁰/0! = e^(−1) 一模一樣（因為 λ¹/1! = 1¹/1 = 1 = 1⁰/0!）。然後 P(2) = e^(−1)·1²/2! = e^(−1)/2，恰好是一半。\n\n這就是極限的力量：一個有兩個參數（n、p）、要算組合數跟次方的笨重二項分布，在 n 大 p 小的世界裡，塌縮成一個只有單一參數 λ、只用 e 跟階乘的輕巧卜瓦松。你算 Binomial(1000, 0.001) 要面對 C(1000, k) 這種噁心的組合數；換成卜瓦松 λ=1，一支手機計算機就解決了。卜瓦松不只是漂亮，它還是個**能用的近似工具**——稀有事件的計數，別硬算二項，直接套 λ=np 的卜瓦松。\n\n## 直覺的陷阱\n\n機率是人類直覺最常崩壞的領域，離散分布這幾隻動物各自埋了一個讓你掉坑的地方。逐個拆。\n\n| 你以為 | 其實 | 怎麼自我察覺 |\n|---|---|---|\n| 「連續失敗很多次了，下次該成功了吧」 | 幾何分布**無記憶**：前面失敗 m 次被條件機率約分掉，未來跟從頭開始一模一樣。硬幣不欠你正面。 | 你心裡冒出「該輪到我了」「平衡一下」這種念頭時——那是賭徒謬誤的前身，你正把無記憶的東西想成有記憶。 |\n| 「二項分布反正就是 n 次成敗，套公式就好」 | 公式的前提是**獨立且同機率**。失敗常常相關（服務掛了、後面跟著掛），這時二項會嚴重低估「全失敗」的機率。 | 你的「成功數」實際抖動比 np(1−p) 預測的大很多——那是獨立假設破了的徵兆（ch04 相關性故障的回音）。 |\n| 「卜瓦松的 λ 是期望，跟變異數沒關係」 | 卜瓦松的**期望和變異數是同一個數 λ**。如果你的計數資料變異數遠大於平均，它就**不是**卜瓦松（這叫過度離散，over-dispersion），硬套會低估尾端風險。 | 算一下你計數 metric 的「樣本變異數 / 樣本平均」。卜瓦松該≈1。若遠大於 1（如突發流量、群聚故障），別用卜瓦松定告警。 |\n| 「平均每天 0.61 人被馬踢死？那不可能，人是整數」 | 卜瓦松的 λ 是**長期平均**，不必是可能值（ch08 的回音：期望不是最可能值，也不必是可能值）。某一年踢死 0 人、某一年 2 人，平均出來 0.61。 | 你聽到「平均 1.8 個小孩」「平均 0.61 死亡」覺得荒謬時——你混淆了「平均」跟「某一次的實際值」。 |\n| 「二項跟卜瓦松是兩種不同的東西」 | 卜瓦松**就是**二項在 n→∞、p→0、np=λ 的極限。它們是同一條血脈，不是兩隻無關的動物。 | 你把它們當成兩張要分別背的公式表——那代表你還沒看到那條「大量機會、每次罕見」的橋。 |\n\n最值得標出來的是第一個——**賭徒謬誤的種子就埋在這裡**。無記憶性是這整章最反直覺、也最重要的一塊。人類的腦子演化來偵測模式、預期「平衡」，所以「連輸該贏了」感覺天經地義。但獨立事件沒有帳本、沒有記憶體、不存「欠你幾次」這種狀態。ch13 會把這個謬誤連同它的正解（大數法則是「稀釋」不是「修正」）完整攤開，這裡你先把無記憶性的代數骨架（那個被約掉的 (1−p)^m）刻進去。\n\n## 紙上推演\n\n純紙筆，零程式碼。每題先自己動手，再看推演解答。\n\n### 推演題 1 **[10 分鐘]** ★\n\n用幾何分布算「一枚公正硬幣，第一次出現正面平均要擲幾次」，並驗證它等於 2。**這是 ch01 那枚硬幣**。\n\n#### 推演解答\n\n公正硬幣每擲出正面（記為「成功」）的機率 p = 1/2。第一次成功的等待次數 X ~ Geometric(1/2)，期望值公式是 E[X] = 1/p = 1/(1/2) = 2。\n\n但我不要你只套公式，我要你看到 2 是怎麼長出來的。期望值是「值乘以機率加總」：\n\n```text\nE[X] = 1·P(X=1) + 2·P(X=2) + 3·P(X=3) + ...\n     = 1·(1/2) + 2·(1/4) + 3·(1/8) + 4·(1/16) + ...\n```\n\nP(X=k) = (1/2)^(k−1)·(1/2) = (1/2)^k，所以是 1·(1/2) + 2·(1/4) + 3·(1/8) + …。把前幾項加起來感受它往哪收斂：0.5 + 0.5 + 0.375 + 0.25 + 0.15625 + … = 0.5 + 0.5 + 0.375 + 0.25 + … 累加是 0.5、1.0、1.375、1.625、1.781…一路往 2 爬。這個級數 Σ k·(1/2)^k 的和正好是 2（標準的算術—幾何級數，《馴服無限》有；這裡接受結果）。\n\n**交叉驗算（直覺法）**：第一擲就有 1/2 機率成功——一半的時候你一次就中。沒中（另一半）的話，因為無記憶性，你等於「重新開始等」，但已經花掉了一擲。寫成方程式：E = 1 + (1/2)·0 + (1/2)·E（第一擲必花，1/2 機率結束、1/2 機率回到原點重等）。解：E = 1 + E/2 → E/2 = 1 → E = 2 ✓。兩種方法都給 2。\n\n直覺檢核：成功機率 1/2 的事，平均試 2 次中第一次，合理。成功機率 1/10 的事，平均試 10 次——1/p 的意義就是「機率的倒數＝平均等待次數」。\n\n### 推演題 2 **[10 分鐘]** ★★\n\n說明卜瓦松的 λ 同時是期望值也是變異數，並手算驗證一個具體例子（λ=2）的期望。\n\n#### 推演解答\n\n先講為什麼期望和變異數都是 λ。最乾淨的看法是走二項極限這條路：卜瓦松是 Binomial(n, p) 在 n→∞、p→0、np=λ 的極限。\n\n- 二項的期望 = np = λ。極限不改變它，所以卜瓦松 E[X] = λ。\n- 二項的變異數 = np(1−p)。當 p→0 時，(1−p)→1，所以 np(1−p) → np = λ。所以卜瓦松 Var(X) = λ。\n\n期望和變異數在極限裡黏成同一個數，這就是卜瓦松的指紋。\n\n手算驗證期望（λ=2）：E[X] = Σ k·P(X=k) = Σ k·e^(−2)·2^k/k!。k=0 那項是 0（被 k 乘掉），從 k=1 起：\n\n```text\nE[X] = e^(−2)·[ 1·(2¹/1!) + 2·(2²/2!) + 3·(2³/3!) + 4·(2⁴/4!) + ... ]\n     = e^(−2)·[ 1·2 + 2·2 + 3·(8/6) + 4·(16/24) + ... ]\n     = e^(−2)·[ 2 + 4 + 4 + 2.667 + ... ]\n```\n\n把括號裡的級數加起來會收斂到 2·e²（這是 λ·e^λ 的標準結果），所以 E[X] = e^(−2)·2·e² = 2 = λ ✓。\n\n**自然頻率交叉驗算**：想像每分鐘平均 2 個錯誤，連續觀察一萬分鐘，總共約看到 20000 個錯誤，平均每分鐘 20000/10000 = 2。期望就是長期平均，當然是 λ。\n\n### 推演題 3 **[10 分鐘]** ★★\n\n你的系統每天平均出現 3 次 5xx 錯誤。用卜瓦松寫出「某天剛好 0 次」的機率，並解讀這個數。\n\n#### 推演解答\n\n「每天平均 3 次」就是 λ = 3。每天的錯誤數 X ~ Poisson(3)。「某天剛好 0 次」是 P(X=0)：\n\n```text\n           e^(−3)·3⁰     e^(−3)·1\nP(X = 0) = ─────────── = ────────── = e^(−3)\n              0!            1\n```\n\n（記住 0! = 1、3⁰ = 1，所以乾淨地剩下 e^(−3)。）\n\n算 e^(−3) 的值：e³ = e·e·e ≈ 2.71828³ ≈ 20.09，所以 e^(−3) = 1/20.09 ≈ 0.0498，約 **5%**。\n\n**交叉驗算**：e^(−3) = e^(−1)·e^(−1)·e^(−1) ≈ 0.3679³。0.3679² ≈ 0.1354，再乘 0.3679 ≈ 0.0498 ✓。兩條路都給約 0.0498。\n\n**解讀**：平均每天 3 次錯誤的系統，大約每 20 天才會碰到一個「完全乾淨、零錯誤」的日子（1/0.0498 ≈ 20）。這很反直覺——「平均才 3 次、應該常常有零錯誤的好日子吧？」不，零錯誤的日子只有 5%。順帶看尾端：你也可以問「某天爆到 8 次以上」的機率，那會小得多，但**不是零**——偶爾的尖峰是卜瓦松的正常呼吸，不是異常。這正是設告警閾值的關鍵直覺：別把 λ 偶爾的正常上揚當成事故。標準差是 √3 ≈ 1.73，所以 3±1.73 大致是日常範圍，飆到 8（偏離約 3 個標準差）才真的罕見。\n\n### 推演題 4 **[15 分鐘]** ★★★\n\n口頭題（對另一個工程師講）：解釋為什麼「每分鐘錯誤數」「每秒請求數」「被馬踢死的士兵數」這三件毫不相干的事，會服從同一個分布。不准寫公式，只能用「大量機會、每次罕見」這條線講。講完再自我檢核：你有沒有把「為什麼是同一個形狀」講清楚，而不只是說「它們都是卜瓦松」。\n\n#### 推演解答\n\n要點清單（你的口述要命中這幾個，不必逐字）：\n\n1. **先拆出共同的抽象結構**：這三件事表面毫無關係（封包、車禍金屬、馬蹄生物學），但抽掉表面，骨架一樣——有「大量獨立的機會」（一分鐘有無數個極短瞬間、一個軍團有一堆士兵跟馬天天相處），每個機會「本身極罕見」（某一瞬間剛好出錯、某個士兵某天剛好被踢死，機率微乎其微），而你「只數總量」（這一分鐘共幾次、這一年共幾個）。\n\n2. **點出關鍵跳躍**：一旦只剩這個抽象骨架，**底層是什麼就不重要了**。數學只看見「大量機會 × 每次罕見」，看不見封包跟馬蹄的差別。所以它們的計數**必然**長成同一個形狀，而且這個形狀只由一個數 λ（平均發生幾次）決定——細節全被抹掉。\n\n3. **這才是驚嘆點**：不是「它們碰巧都叫卜瓦松」，而是「人類找到了一個橫跨封包、車禍、馬蹄的共同數學形狀」。個別事件完全不可測（沒人能說哪個士兵哪天被踢），但總體分布精確到能對帳一百多年前的真實死亡紀錄。可測的總體從不可測的個體裡浮現——這是 ch14 那個更大震撼的離散預告。\n\n4. **誠實標出邊界**（加分）：條件是「獨立」跟「稀有」。如果事件會群聚（一個錯誤引發一串連鎖故障），獨立就破了，計數會比卜瓦松更分散，這時硬套卜瓦松會低估尾端。知道工具什麼時候失效，比知道它什麼時候有效更重要。\n\n常見錯路：只說「它們都是稀有事件所以都是卜瓦松」——這是把結論當解釋。聽的人會問「那為什麼稀有事件就長同一個形狀」，你得能回到第 2 點的「底層被抹掉、只剩 λ」才算真的講清楚。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 為什麼伯努利的變異數 p(1−p) 在 p=1/2 時最大、在兩端趨近 0？用「不確定性」的直覺講，不要只說「拋物線頂點在 1/2」。\n2. 二項分布 PMF 的三個因子 C(n,k)、pᵏ、(1−p)ⁿ⁻ᵏ，各自在數什麼？哪一個因子是「成功擺在哪幾次」？\n3. 二項分布暗藏哪個前提，使它在你的重試邏輯裡可能失效？（提示：失敗常常不獨立。）\n4. 幾何分布的無記憶性，那個「被約掉」的 (1−p)^m 在說什麼故事？這跟賭徒謬誤是什麼關係？\n5. 卜瓦松是哪個分布在什麼極限下的影子？把 n、p、λ 三者的關係講出來。\n6. 為什麼卜瓦松「期望＝變異數＝λ」這件事，能讓你一眼判斷一筆計數資料是不是卜瓦松？\n7. 卜瓦松的「美」到底在哪？為什麼一句「它們都是稀有事件」不算把美講清楚？（要能講到「底層被抹掉、只剩 λ」。）\n8. 脊椎硬幣 Binomial(10, 1/2) 的直方圖為什麼一定左右對稱？它正在預告後面哪一章的什麼東西？\n\n## 延伸閱讀\n\n- **《佇列論》ch05（書架鄰書）**：本章只欣賞「卜瓦松為何是稀有計數的普適形狀」，但如果你想看它在**時間軸上展開**（Poisson 過程、到達間隔、排隊長度、Little's law 那一整套運算），那是隔壁那本書的主場。本章的卜瓦松是它的靜態快照，那本是動態影片。讀它的到達過程那幾節。\n- **《馴服無限》ch13（書架鄰書）**：卜瓦松公式裡那個 e^(−λ) 的來歷——lim(1+x/n)ⁿ → eˣ——以及為什麼 e 會在「大量機會、每次罕見」的極限裡自然冒出來。想搞懂二項為何收斂到帶 e 的卜瓦松，回去把那個極限擦亮一次。\n- **Bortkiewicz《Das Gesetz der kleinen Zahlen》（1898）的馬踢資料**：本章 worked example 那張表的原始出處。網路上「Prussian horse-kick data」是統計教學的經典資料集（如 R 的 `pscl::prussian`），值得自己拉下來、親手對一次觀測與卜瓦松預期——親眼看抽象公式命中真實死亡紀錄，比讀十遍定義都震撼（2026-06，資料集真實存在）。\n- **本書 ch12（連續家族）**：幾何分布的無記憶性，在連續世界有個更美的雙胞胎——指數分布（公車不會因為你等久了就比較快來）。本章給你離散原型，ch12 給你連續版的完整欣賞，並警告你長尾世界裡「平均」如何失去意義。\n- **本書 ch14（中央極限定理）**：你在 Binomial(10, 1/2) 直方圖裡看到的那個對稱鐘形雛形，在 ch14 會長成完整的常態曲線，而且你會知道為什麼幾乎所有「加總／平均」出來的東西都是鐘形。本章是那場全書最大驚嘆的第一幀。\n"}, {"id": "ch12-continuous-distributions", "file": "ch12-continuous-distributions.md", "group": "Part III — 隨機變數", "title": "ch12 — 分布動物園（下）：連續家族與長尾的警告", "md": "# ch12 — 分布動物園（下）：連續家族與長尾的警告\n\n> **本章解決什麼問題**：ch11 帶你逛了離散家族——一次次數得出來的成敗計數。但你工作裡最常盯的那些數字其實是連續的：請求延遲、到達間隔、檔案大小，它們落在一條實數軸上、沒有「下一格」。這一章逛連續家族的三個主角：均勻分布（最大無知的連續版）、指數分布（等待時間，而且它有一個全書最反直覺的性質——無記憶性），還有跟你的儀表板每天打照面的常態分布（這裡先認個臉，「為什麼它無所不在」這個大哉問要留到 ch14 的中央極限定理才揭曉）。然後，本章最重要的一件事：帶你走進**長尾**的世界——一個「平均」會對你說謊、ch08 教你的期望值會失靈的世界。這是 Part III 分布動物園的下半場，也是你接下來進兩大定理（ch13、ch14）之前最後一塊拼圖：因為大數法則有個前提，而長尾正是那個前提崩掉的地方。\n\n## 從你已知的出發\n\n你打開 dashboard，看那條延遲曲線。你不會去問「下一個請求剛好是 47.3ms 的機率是多少」——這個問題的答案其實是 0，等下會講為什麼，而且這個 0 不是 bug。你會問的是「超過 200ms 的請求佔多少」「P99 是多少」。你問的全是區間、全是尾巴，從來不是單點。這就是連續隨機變數的世界：個別的點不重要，重要的是它怎麼分布在一條軸上。\n\n你對連續分布其實已經有一整套身體直覺，只是沒人幫你命名過。我先把三個你早就在用的東西攤開：\n\n第一，**到達間隔**。你做過 rate limiting、做過流量整形，你心裡有個模型：請求是「隨機」打進來的，兩個請求之間隔多久不固定。如果你假設請求「彼此獨立、以某個平均速率隨機到達」——這正是指數分布在描述的東西。等下你會看到它藏著一個會讓你停下來十分鐘的性質。\n\n第二，**retry backoff 的 jitter**。你在重試延遲上灑一個 `random() * window` 的隨機抖動，為的是打散重試風暴、別讓所有 client 同一秒一起回來。那個 `random()`——在 `[0, window)` 之間每個值都等可能——就是均勻分布。你天天在 new 它。\n\n第三，**尾端延遲**。你早就知道一件讓很多人吃過虧的事：服務延遲不是對稱的。P50 漂亮得很，50ms；P99 卻可能是 800ms。平均值夾在中間、誰都不代表。這條「中間還行、尾巴恐怖」的曲線，就是本章後半段那個長尾世界的入口。而「用平均延遲簽 SLA 會被尾巴打臉」這件事，我們會把它的數學骨架挖出來給你看。\n\n連續分布要先處理一個離散世界沒有的怪事，我們從那裡開始。\n\n## 密度不是機率：單點機率為 0，但事件還是會發生\n\nch07 已經點過這件事，這裡我們把它釘死，因為它是連續世界的入場券。\n\n離散隨機變數（像 ch11 的硬幣正面數）你可以一格一格指派機率：P(X=0)、P(X=1)…加起來等於 1。連續隨機變數做不到。請求延遲可以是 47ms、47.3ms、47.314159…ms，軸上有無窮多個點，密密麻麻。如果你想給「剛好等於 47.3ms」這個單點一個正機率，哪怕只給一丁點，無窮多個點加起來就會爆破 1。所以唯一自洽的安排是：**每個單點的機率是 0。**\n\n聽起來像悖論——機率 0 不是「不可能」嗎？但「延遲剛好是某個值」明明會發生啊。這裡要把兩個被你日常語言黏在一起的詞拆開：\n\n> **機率 0 ≠ 不可能。** 在連續世界，「會發生」跟「機率為正」不是同一件事。\n\n工程師最快聽懂的類比是浮點數。你早就學會**永遠不要寫 `if (x == 0.3)`**，要寫 `if (abs(x - 0.3) < eps)`。為什麼？因為「剛好相等」在浮點世界是個你不該指望的事件；你真正關心的、也真正可量的，是「落在一個小區間裡」。連續機率一模一樣：你不問「等於 47.3」，你問「落在 [47, 48) 裡」。後者才有正機率。\n\n所以連續分布不用「機率質量」（每點一塊）來描述，改用**機率密度（probability density）**。密度函數 f(x) 不是機率，它是「機率的濃度」——每單位長度有多少機率。要拿到真正的機率，你得把密度在一段區間上**積起來**（積分就是「把一條曲線下的面積加總」，∫ 你大學看過，這裡只當工具用）：\n\n```text\nP(a ≤ X ≤ b) = ∫[a,b] f(x) dx      ← 密度下、a 到 b 之間的面積\nP(X = 某一點)  = ∫[c,c] f(x) dx = 0  ← 寬度為 0 的區間，面積是 0\n```\n\n機率＝面積。這句話貫穿後面好幾章（ch14、ch15 會把它玩到極致，常態曲線下面積的微積分深入推導留給書架上的《馴服無限》ch15）。你現在只要記住一個翻譯：**密度的「高」告訴你哪裡更可能，但機率永遠是一段面積，不是一個高度。** 密度可以大於 1（它是濃度不是機率，沒有上限），但任何區間的面積不會超過 1。\n\n有了這個入場券，逛動物園。\n\n## 均勻分布：最大無知的連續版\n\n均勻分布（uniform distribution）是連續家族裡最樸素的一隻。在區間 [a, b] 上，密度是一條水平線——每個值一樣可能，沒有偏好。\n\n```text\n密度 f(x)\n  │\n1/(b−a) ├───────────────┐\n  │     │               │\n  │     │               │\n──┼─────┴───────────────┴──────► x\n  0     a               b\n```\n\n那條水平線的高度是 1/(b−a)，不是隨便定的——因為整塊面積（一個寬 b−a、高 1/(b−a) 的矩形）必須等於 1。寬乘高 = (b−a) × 1/(b−a) = 1。✓ 機率守恆，自動滿足。\n\n它「在量化什麼」？跟 ch02 古典機率的「等可能」是同一個哲學，只是搬到連續軸上：**當你對一個落在某範圍內的量一無所知、沒有任何理由偏好某個值勝過另一個，你就攤平它。** 這是無差別原則（principle of indifference）的連續版。你的 `random()`（標準函式庫那個回傳 `[0, 1)` 的）就是 Uniform(0, 1)，它是其他所有隨機數的原料：要生指數分布、常態分布、任何分布，底層都是先 new 一個均勻隨機數再去變形。\n\n工程錨點你已經有了——retry 的 jitter。AWS 那篇講 exponential backoff 的經典文章建議你別用裸 backoff，要灑 jitter，而 full jitter 就是把下次等待時間設成 `random() * cap`，一個均勻隨機。為什麼非得均勻？因為你對「哪個重試時刻比較好」毫無資訊、也不想有偏好——你要的就是把客戶端攤平到整個時間窗，誰都別跟誰擠。最大無知，正是這裡最理性的選擇。\n\n均勻分布還有個值得記的小事：它跟 ch02 的 Bertrand 悖論是親戚。「隨機」攤在連續空間上，必須講清楚「對哪個變數均勻」——對弦的端點均勻、對中點均勻、對半徑均勻，會給出三個不同的「均勻」、三個不同的答案。連續的等可能不是天上掉下來的，它依賴你怎麼參數化。這個坑 ch02 挖過，這裡只是提醒你它沒被填平。\n\n均勻分布是熱身。下一隻才是這半章的明星。\n\n## 指數分布與無記憶性：已經等了十分鐘的公車，不會比較快來\n\n指數分布（exponential distribution）描述的是**等待時間**：一個「以固定平均速率隨機發生」的事件，距離它下一次發生還要等多久。它有一個參數 λ（讀作 lambda），叫**速率（rate）**——每單位時間平均發生幾次。等待時間的平均值是 1/λ：速率越快，等得越短，合理。\n\n它的密度是一條從高處往右快速衰減的曲線：\n\n```text\n密度 f(x) = λ·e^(−λx)\n  │\n λ├╲\n  │ ╲\n  │  ╲___\n  │      ╲────___\n──┼───────────────────────► x（等待時間）\n  0\n```\n\n對工程師真正好用的不是密度，是**尾巴機率**（survival function）——「等超過時間 x 還沒發生」的機率。它長這樣，乾淨到值得背：\n\n```text\nP(X > x) = e^(−λx)      ← 「等了 x 還沒等到」的機率\n```\n\n直覺檢查一下：x=0 時，e⁰=1，「等超過 0 秒」當然必然成立；x→∞ 時，e^(−λx)→0，「永遠等不到」機率趨近 0。形狀對。這個 e^(−λx) 你其實見過——ch11 的卜瓦松分布裡那個 e⁻¹。它們不是巧合，是同一個過程的一體兩面：如果「每段時間發生幾次」服從卜瓦松，那麼「兩次之間隔多久」就服從指數。這個橋——卜瓦松過程、到達間隔、然後怎麼拿它去算排隊、算等待——是《佇列論》的主場，運算深度（見《佇列論》ch04、ch05）就好，本書不重推。本書要講的是它的**美**。\n\n美在哪？盯著那條尾巴機率，做一個小代數，你會撞見一件冒犯直覺的事。\n\n### 無記憶性：算給你看\n\n問一個問題。你在公車站等公車，假設公車到達間隔服從指數分布。你已經等了 s 分鐘，公車還沒來。問：**接下來還要再等超過 t 分鐘的機率**，跟一個剛到站、什麼都沒等的人「要等超過 t 分鐘」的機率，哪個大？\n\n直覺尖叫：當然是已經等了 10 分鐘的人比較虧、也比較該輪到他了吧？等越久不是該越快來嗎？\n\n算算看。「已經等了 s、還要再等超過 t」這是個條件機率：在「已經等超過 s」的條件下，問「等超過 s+t」。用 ch04 的條件機率定義：\n\n```text\nP(X > s+t | X > s) = P(X > s+t 且 X > s) / P(X > s)\n```\n\n注意「X > s+t」本身就蘊含「X > s」（等超過 11 分鐘的人，當然也等超過了 10 分鐘），所以分子的交集就是 P(X > s+t)。代入指數的尾巴公式：\n\n```text\n                      P(X > s+t)        e^(−λ(s+t))\nP(X > s+t | X > s) = ───────────── = ────────────────\n                       P(X > s)           e^(−λs)\n```\n\n指數律的乘法在這裡幫你一個大忙：e^(−λ(s+t)) = e^(−λs) · e^(−λt)。把 e^(−λs) 約掉：\n\n```text\n       e^(−λs) · e^(−λt)\n   = ──────────────────── = e^(−λt) = P(X > t)\n            e^(−λs)\n```\n\n得到：\n\n```text\nP(X > s+t | X > s) = P(X > t)\n```\n\n讀出來：**「已經等了 s、接下來還要等超過 t」的機率，等於「從零開始要等超過 t」的機率。** 你等過的那 10 分鐘，完全沒有讓公車變得比較快來。系統把你忘了。這就叫**無記憶性（memorylessness）**。\n\n我認為這是整章最該讓你停下來的一頁。停十分鐘，因為你的直覺正在騙你，而且騙得很有道理——只是錯了。\n\n### 為什麼這麼反直覺，又為什麼是對的\n\n你的直覺哪裡出錯？它偷偷把指數分布想成「人類等公車的真實經驗」——時刻表、班距、越接近發車越可能來。但指數分布描述的是一個**沒有時刻表、純隨機**的到達：每一個瞬間，事件發生的「傾向」都一模一樣，跟過去發生過什麼、等了多久，毫無關係。在這種世界裡，「等了 10 分鐘」不是「進度條走了一半」，它什麼進度都沒累積——因為根本沒有進度條。下一刻會不會來，只看下一刻自己，不看歷史。\n\n放射性原子是最乾淨的真實例子。一個還沒衰變的原子，它「再撐 t 秒不衰變」的機率，跟一個剛產生的原子一模一樣。原子不會「老」。它沒有記憶。指數分布就是這種「不會老」的數學。\n\n這裡有個漂亮的事實值得你轉述給另一個工程師：**指數分布是唯一的連續無記憶分布。** 不是「之一」，是唯一。任何一個連續的、正值的、滿足 P(X>s+t | X>s) = P(X>t) 的分布，數學上被逼著只能是指數。證明的骨架不難懂：無記憶性那條方程式等價於 g(s+t) = g(s)·g(t)（其中 g 是尾巴函數），而連續函數裡唯一滿足「相加變相乘」的就是指數函數 e 的某次方——這跟對數律「相乘變相加」是同一件事的鏡像。所以「無記憶」這個性質，幾乎是用一句話就把指數分布從所有連續分布裡單獨揪了出來。一個直覺性質，唯一決定了一整個分布的形狀，這種「性質反推形狀」的乾淨，是機率裡少見的奢侈品。\n\n順帶把 ch11 接回來：離散世界也有一個唯一的無記憶分布，就是 ch11 的幾何分布——「擲到第幾次才第一次成功」。連續硬幣每一次都是新的開始，所以指數無記憶；離散硬幣每一擲也是新的開始，所以幾何無記憶。指數是幾何在連續時間的極限版。同一個「系統不記得你」的精神，一個跑在格子上，一個跑在實數軸上。\n\n### 這個性質坑過你嗎？\n\n坑過，而且你大概沒意識到。如果你假設到達間隔是指數的（很多排隊模型、很多模擬器的預設就是這樣），那你等於假設了「不管系統現在已經閒置/忙碌多久，下一個請求來不來的傾向都一樣」。這在「請求彼此獨立、沒有同步來源」時是很好的近似。但現實裡請求常常**不是**獨立的——cron job 整點齊發、重試風暴、快取同時過期，這些都會製造「成群結隊」的到達，把無記憶性打破。你拿指數模型去估那種流量的尾端，會低估擁塞。記住：無記憶是個漂亮的假設，不是物理定律；用它之前先問「我的到達真的沒有記憶嗎」。\n\n## 常態分布：先認個臉，為什麼留到 ch14\n\n連續家族的第三位主角，你早就認得它的長相——那條對稱的鐘形曲線，中間胖、兩邊瘦：\n\n```text\n密度\n  │           .─''─.\n  │         .'      '.\n  │        /          \\\n  │      .'            '.\n  │   _.'                '._\n──┴──────────┼──────────────► x\n            μ\n```\n\n常態分布（normal distribution，台灣統計用語，不是「正態」）有兩個參數，講出來你就懂：μ（mu，平均值）決定鐘形的中心在哪、σ（sigma，標準差，ch09 那個「不確定的大小」）決定它有多胖。μ 平移、σ 縮放，就這兩個旋鈕。寫成 X ~ N(μ, σ²)。\n\n這裡我**故意不講**它的密度公式（那個帶 e^(−x²/2) 的東西），也**故意不講**它為什麼無所不在。因為「為什麼鐘形會出現在身高、測量誤差、考試成績、你把一萬個請求延遲平均起來的結果裡」——這個問題的答案是整本書最大的驚嘆點之一，它叫中央極限定理，它值得一整章（ch14），現在先講會破壞那個高潮。\n\n但我得先在這裡幫你**埋一個對比**，因為它正是本章後半段的引爆點：\n\n常態分布有一條**極瘦的尾巴**。它的密度在兩邊以 e^(−x²/2) 的速度往下掉——那個 x² 在指數上，意思是離中心越遠，機率不是變小，是**塌陷**。離平均 3 個標準差以外的事件，機率只剩 0.27%（ch15 會給你精確的 68-95-99.7）；離 5 個標準差以外，機率小到工程上你可以當它不存在。常態世界裡，極端值幾乎不發生。你的直覺——「離平均很遠的怪數據是異常、很罕見」——在常態世界裡是對的。SRE 的 3-sigma 告警就建立在這個信任上。\n\n記住這個信任。因為本章最後要帶你去一個地方，那裡這個信任會徹底崩掉。\n\n## 長尾與冪律：平均失去意義的世界\n\n現在進本章的暗面，也是它最重要的貢獻：有一整類分布，常態的那套直覺在裡面**全錯**。\n\n### 一個首富走進酒吧\n\n有個統計學界講爛了的笑話，但它精準到值得再講一次。一間小酒吧裡坐了十個普通上班族，年收入都在台幣百來萬上下。這時世界首富走了進來、坐下。\n\n現在這間酒吧裡所有人的**平均**年收入，瞬間變成幾百億。「這間酒吧的客人平均年收入幾百億」——這句話統計上完全正確，而且荒謬到毫無意義。沒有任何一個原本的客人變有錢，但「平均」這個字被一個人徹底綁架了。經濟學家 Krugman 很愛用這個例子講收入不平等（2026-06，已查證：「比爾·蓋茲走進酒吧」是這類教學的經典版本）。\n\n對比一下：如果走進來的是一個「比平均高三個標準差」的人——在常態世界裡那已經是萬中選一的高個子了——他對平均的影響微乎其微。常態世界裡沒有人能一個人改寫平均，因為極端值被那條 e^(−x²/2) 的尾巴掐死了，根本不會出現大到那種程度的個體。\n\n收入不是常態的。收入是**長尾**的。\n\n### 冪律：尾巴衰減得太慢\n\n長尾分布（長尾、heavy tail、肥尾 fat tail，幾個詞指向同一族現象）的數學核心是**冪律（power law）**。常態的尾巴用 e^(−x²) 塌陷；冪律的尾巴只用 x 的某個負次方往下走：\n\n```text\nP(X > x) ≈ x^(−α)      ← 冪律尾巴，α 是尾巴指數\n```\n\n差別有多大？指數/常態的尾巴是「指數級」變薄，冪律是「多項式級」變薄。多項式比指數慢得多得多。意思是：在冪律世界裡，超大的值不是不可能，而是**罕見但遠比你以為的常見**。一個比典型值大 100 倍的個體，在常態世界裡機率是天文數字分之一；在冪律世界裡，它只是「比較少見」而已，你遲早會撞到。\n\n這族分布最有名的招牌叫 **80/20**：少數佔多數。20% 的人擁有 80% 的財富、20% 的客戶貢獻 80% 的營收、20% 的程式碼藏了 80% 的 bug。這裡有個常被講錯、landscape 特別標注的史實，我幫你校正：\n\n> 義大利經濟學家 **Vilfredo Pareto** 在 1890 年代觀察到「約 20% 的人擁有約 80% 的土地」，這個**冪律觀察**歸他。但「**80/20 原則**」「**Pareto principle**」這個**名稱**，是品管顧問 **Joseph Juran 在 1940 年代**取的、並把它推廣到管理與品管領域——**不是 Pareto 自己取的**（2026-06，已查證）。Juran 還造了「vital few, trivial many（關鍵的少數、瑣碎的多數）」這個說法。所以下次有人說「這是 Pareto 提出的 80/20 法則」，你可以淡定補一句：觀察是 Pareto 的，這個名字是 Juran 五十年後貼上去的。\n\n這個分布在你的系統裡到處都是，而且你早就靠它吃飯。**快取**就是冪律的直接受益者：少數熱點 key 佔了絕大多數請求，所以你只要把那 20%（甚至更少）的熱 key 留在記憶體，就能命中 80%＋的流量——這就是為什麼 cache 那麼小卻那麼有效。如果 key 的存取是均勻分布的（每個 key 一樣熱），快取幾乎沒用；正是因為存取冪律得厲害，快取才成立。檔案大小、城市人口、網站連入連結數、字詞出現頻率（Zipf 定律），全是冪律。你住在一個冪律的世界裡。\n\n### 期望存在，但樣本平均不穩——給 ch13 的警告\n\n現在來講本章最該讓你帶走的那句話，它直接連到下一章的大數法則。\n\n先說清楚：本章的長尾**還沒到「期望值是無限大」那種極端**（冪律指數夠小的時候，連 ch08 的期望值都會發散到無限，那是更深的水，這裡點到、嚴格條件留延伸閱讀）。本章要警告的是一個更陰險、更日常的版本——**就算理論上的期望值好端端地存在，你手上那個「樣本平均」也可能完全不可信。**\n\n差別在哪？ch13 的大數法則會告訴你「樣本平均會收斂到真實期望」，聽起來樣本平均是安全的。但大數法則收斂的**速度**，在長尾下慢到讓它在實務上失效。因為樣本平均隨時可能被你下一個抽到的巨值整個掀翻——首富隨時可能走進你的樣本。常態世界裡你抽 30 個樣本，平均就穩了；冪律世界裡你抽 30 萬個，平均還在跳，因為第 300,001 個可能比前面所有人加起來還大。\n\n> **驚嘆點，請務必能轉述**：在長尾世界，「平均」不是一個穩定的、能代表群體的數，它是一個**被最大那筆觀測值牽著走的**數。你算出來的平均，主要在告訴你「目前為止抽到的最大值有多大」，而不是「典型情況長怎樣」。這就是為什麼講收入要用**中位數**不用平均、為什麼講延遲要看**百分位數**不看平均。中位數（首富走進酒吧，它紋風不動）對極端值免疫；平均沒有。\n\n下面用兩組小資料把這件事算給你看——這是本章的 worked example。\n\n## Worked example：兩個手算，一個無記憶、一個長尾\n\n### 例一：指數無記憶性，數字驗證\n\n取 λ = 0.5（平均等待 1/λ = 2 個時間單位）。用尾巴公式 P(X > x) = e^(−λx)，需要的指數值（標準值，背一下方便）：\n\n```text\ne^(−1)   ≈ 0.3679\ne^(−0.5) ≈ 0.6065\ne^(−1.5) ≈ 0.2231\n```\n\n**先算 P(X > 2)**——「從零開始，等超過 2 個單位」：\n\n```text\nP(X > 2) = e^(−0.5 × 2) = e^(−1) ≈ 0.3679\n```\n\n**再算 P(X > 3 | X > 1)**——「已經等了 1 個單位，還要再等超過 2 個單位（總共超過 3）」：\n\n```text\nP(X > 3 | X > 1) = P(X > 3) / P(X > 1)\n                 = e^(−0.5×3) / e^(−0.5×1)\n                 = e^(−1.5) / e^(−0.5)\n                 = 0.2231 / 0.6065\n                 ≈ 0.3679\n```\n\n**0.3679 = 0.3679。一模一樣。** 「已經等了 1 個單位、再等超過 2」跟「從零等超過 2」機率完全相等。你等過的那 1 個單位，蒸發了，系統不認帳。交叉驗算的方法二：直接用無記憶公式 P(X>3|X>1) = P(X>3−1) = P(X>2) = e^(−1) ≈ 0.3679，秒得同一答案。兩條路會合，無記憶性數字確認。✓\n\n### 例二：長尾下，拿掉最大那筆，平均崩給你看\n\n造一組 80/20 的小資料——五個「客戶營收」，刻意做成長尾（少數佔多數）：\n\n```text\n長尾資料：  2,  3,  4,  5,  186\n```\n\n（前四筆是普通客戶，第五筆是個鯨魚客戶——你的系統裡一定有這種人。）\n\n```text\n總和 = 2 + 3 + 4 + 5 + 186 = 200\n平均 = 200 / 5 = 40\n```\n\n平均是 40。但**五個客戶裡有四個的營收低於 40**，「平均」根本不代表任何一個典型客戶。中位數呢？排序後中間那筆是 4——這才像話。平均（40）和中位數（4）差了十倍，這個巨大裂縫本身就是「你在看一條長尾」的警報。\n\n現在做關鍵實驗：**拿掉最大那筆（186）**，重算：\n\n```text\n剩下：       2, 3, 4, 5\n總和 = 14，   平均 = 14 / 4 = 3.5\n```\n\n平均從 **40 暴跌到 3.5**——掉了超過 91%。**一筆資料的有無，把整個平均砍掉九成。** 這就是「樣本平均不穩」的具體長相：你的平均幾乎完全是那一筆巨值撐起來的，它一走，平均就垮。\n\n對照組——同樣五個數，但讓它「常態一點」（對稱、無極端值）：\n\n```text\n常態風資料： 38, 39, 40, 41, 42\n總和 = 200，  平均 = 40\n```\n\n平均也是 40，跟長尾組故意湊成一樣。現在同樣**拿掉最大那筆（42）**：\n\n```text\n剩下：       38, 39, 40, 41\n總和 = 158，  平均 = 158 / 4 = 39.5\n```\n\n平均從 40 變成 39.5——**只動了 1.25%**。幾乎沒感覺。\n\n把兩組並排，結論一目了然：\n\n```text\n                     拿掉最大值前   拿掉最大值後   平均變動\n─────────────────────────────────────────────────────────────\n長尾   2,3,4,5,186        40            3.5         −91%  ← 平均被單筆綁架\n常態   38,39,40,41,42     40            39.5        −1.25% ← 平均很穩\n─────────────────────────────────────────────────────────────\n```\n\n同樣是「平均」，同樣的五個數量、同樣的起始平均 40，只因為一組是長尾、一組是常態，「拿掉一筆」的後果天差地別。**這裡了不起在哪、也是你要能轉述的**：在常態世界，平均是一個可信賴的群體代表，極端值動不了它（ch13 大數法則在這種世界跑得飛快）；在長尾世界，平均是一個建在沙上的數，最大那筆觀測值想讓它垮就讓它垮。同一個「算平均」的動作，在兩個世界裡一個是磐石、一個是流沙。你的延遲、你的營收、你的檔案大小，住在哪個世界，決定了「平均」這個字能不能信。\n\n## 直覺的陷阱\n\n連續分布跟長尾這一塊，是工程師被自己的直覺帶溝裡的重災區。整理成表，每一條都附「你會在哪一步出錯」和「怎麼自我察覺」。\n\n```text\n陷阱                    錯誤直覺                    哪一步翻車 / 怎麼自我察覺\n──────────────────────────────────────────────────────────────────────────\n機率 0 = 不可能         「機率 0 的事不會發生」      把連續單點機率 0 當成「不可能」\n                                                    → 徵兆：你想問「剛好等於 x 的\n                                                    機率」。改問區間就解開了。\n──────────────────────────────────────────────────────────────────────────\n密度 = 機率             「f(x) 大於 1 不合法」       密度是濃度不是機率，可以 >1\n                                                    → 徵兆：你拿密度值當機率講。\n                                                    機率永遠是面積（積分），不是高度。\n──────────────────────────────────────────────────────────────────────────\n等久了就快輪到了         「等了 10 分鐘的公車該      把無記憶過程想成有進度條\n（賭徒謬誤的             來了」                      → 徵兆：你覺得「已經等很久」\n 等待時間版）                                       是有利資訊。指數分布裡它不是。\n──────────────────────────────────────────────────────────────────────────\n用平均代表長尾           「平均延遲 50ms，所以       長尾下平均被尾巴綁架\n                        體驗大概 50ms」             → 徵兆：平均和中位數差很多。\n                                                    差越多、平均越不可信，改看 P99。\n──────────────────────────────────────────────────────────────────────────\n以為極端值很罕見         「離平均很遠＝異常＝         在冪律世界，超大值是「罕見但\n（常態直覺亂入           幾乎不會發生」              會撞到」，不是「幾乎不可能」\n 長尾世界）                                         → 徵兆：你用 3-sigma 想長尾數據。\n                                                    冪律沒有那種瘦尾巴。\n──────────────────────────────────────────────────────────────────────────\n```\n\n點名兩個具名陷阱。第一個是**賭徒謬誤的連續版**——ch13 會正式處理離散版（硬幣連開五次正面、第六次該開反面了）。等公車那個「等久了該來了」是同一個謬誤穿了連續的外衣：你以為過去累積的等待會「欠你一班車」，但無記憶過程根本不記帳。獨立、無記憶的系統不欠你任何東西。\n\n第二個更貴：**用平均延遲簽 SLA**。你跟客戶承諾「平均回應時間 100ms」，聽起來很安全。但如果你的延遲是重尾的（幾乎所有真實服務延遲都是），平均 100ms 可能意味著 P50 只有 40ms、但 P99 是 2 秒——而那 1% 被打到 2 秒的請求，往往就是你最重要的那批（重試疊加、大 payload、冷啟動）。**平均延遲是個會替尾巴打掩護的指標。** 這就是為什麼成熟的 SLA 寫的是「P99 < 300ms」不是「平均 < 100ms」。你早就用百分位數而不是平均在報延遲了——現在你知道那不只是慣例，那是因為延遲住在長尾世界，平均在那裡是個騙子。\n\n## 紙上推演\n\n### 推演題一：把無記憶講成人話 **[15 分鐘]** ★★\n\n「已經等了十分鐘的公車不會比較快來」這句話為什麼反直覺、又為什麼（在指數假設下）是對的？請用你自己的話講清楚兩件事：(a) 人的直覺為什麼會覺得「等越久該越快來」；(b) 指數分布的世界裡，是什麼東西「不存在」，導致這個直覺失效。不准用公式，講給一個沒學過機率的朋友聽。\n\n#### 推演解答\n\n(a) 人的直覺把等待想成「進度條」或「排隊」——時間在累積某種「該輪到我」的額度，等越久、額度越滿、越接近兌現。這在有時刻表的真實公車、在先到先服務的排隊裡是對的，所以直覺很頑固。\n\n(b) 指數分布的世界裡，**「進度」這個東西根本不存在**。事件在每一個瞬間發生的傾向都一模一樣，跟過去等了多久完全脫鉤——系統沒有一個「記得你等了多久」的計數器。你等的那十分鐘沒有被存在任何地方、沒有累積成任何優勢，所以它當然不會讓下一刻更可能來。把它講成一句話：**指數分布描述的是「沒有記憶、沒有排隊、純隨機冒出來」的事件；既然系統不記得你來過，它就不可能因為你等久了而對你好一點。** 放射性原子不會老、不會「快衰變了」，是同一件事。\n\n關鍵自我檢查：如果你發現自己在說「那它總得平衡一下吧」，你就掉回賭徒謬誤了——無記憶的意思就是「永遠不平衡，因為它根本不記帳」。\n\n### 推演題二：「平均延遲 50ms」可能在說哪些謊 **[20 分鐘]** ★★\n\n你的監控說「我們系統平均延遲 50ms」。請寫出**三個**情境，在每個情境裡這句話雖然數字正確、卻嚴重誤導使用者體驗。每個情境要講清楚：尾巴長什麼樣、誰被傷到、你該改看哪個指標。\n\n#### 推演解答\n\n三個情境（能講出兩個就算過關，三個是滿分）：\n\n**情境一：雙峰。** 90% 的請求走快取、5ms 命中；10% 的請求 miss、打到後端、450ms。平均 = 0.9×5 + 0.1×450 = 4.5 + 45 = 49.5ms ≈ 50ms。漂亮的 50ms 底下，根本沒有任何一個請求「大約 50ms」——你的使用者要嘛爽快（5ms）、要嘛痛苦（450ms），沒有中間。被傷到的是那 10% miss 的人。該看：P90/P99，或乾脆看延遲的**直方圖**（一眼看出雙峰）。\n\n**情境二：重尾。** P50=30ms、P90=60ms，但 P99=1.5 秒（GC 暫停、鎖競爭、冷連線）。少數巨值把平均往上拉到 50ms。被傷到的是那 1%——而那 1% 常常是發了最多請求的重度使用者，所以**以人計算**受害面遠大於 1%。該看：P99、P99.9，和**最大值**。\n\n**情境三：平均被偶發尖峰污染但時間上集中。** 平日 P99 都很好，但每天備份視窗那半小時延遲全面飆到秒級。把一整天平均起來還是 50ms，因為壞的只有 30 分鐘。被傷到的是剛好在那半小時來的人。該看：延遲對**時間**的分布（時序圖），不是把時間抹平的單一平均。\n\n共同教訓：平均是個會把尾巴、把雙峰、把時間結構全部抹平的指標。任何一個「平均看起來沒事」的系統，都值得你追問一句「那 P99 呢、那直方圖呢」。\n\n### 推演題三：把「20% 的 key 佔 80% 流量」翻成冪律語言 **[15 分鐘]** ★★\n\n你的 cache team 說「20% 的 key 佔了 80% 的請求流量」。(a) 這句話在描述哪一族分布？用本章的詞彙講。(b) 解釋這個分布形狀如何決定你的快取命中率——並說明如果存取改成均勻分布，快取會發生什麼事。\n\n#### 推演解答\n\n(a) 這是**冪律 / 長尾**分布（80/20 是它的招牌比例，名稱 Pareto principle 由 Juran 取，觀察由 Pareto 提出）。它在說 key 的「熱度」極度不均：少數熱 key 被狂打、絕大多數冷 key 幾乎沒人碰。「20% 的 key → 80% 流量」正是「少數佔多數」的長尾特徵。\n\n(b) 快取命中率直接吃這個形狀的紅利。因為流量集中在少數熱 key 上，你**只要把那 20% 的熱 key 留在快取**（甚至更少，因為熱度本身在那 20% 裡可能又是 80/20），就能攔下 80%＋的請求——這就是為什麼一個容量遠小於 key 總數的 LRU 快取卻能有很高命中率：它自然會把熱 key 留住、把冷 key 淘汰。\n\n對照：如果存取是**均勻分布**（每個 key 一樣熱、沒有熱點），那麼一個只裝得下 20% key 的快取，期望命中率就只有約 20%——因為下一個請求落在「快取裡那 20%」的機率就是 20%，沒有任何集中度可以利用。**快取之所以有效，本質上是在賭存取分布是長尾的；存取越長尾，同樣大小的快取越值錢。** 反過來，如果你的命中率莫名其妙地低，一個該懷疑的方向是：你的存取模式是不是比你以為的更均勻（例如被某種掃描、某種無熱點的隨機 key 打散了）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 連續隨機變數「單點機率為 0」跟「這個值不會出現」為什麼不是同一件事？用浮點數比較的類比講一次。\n2. 密度可以大於 1 嗎？如果可以，那它跟「機率不超過 1」怎麼不矛盾？（提示：濃度 vs 面積。）\n3. 無記憶性用一句話是什麼意思？為什麼「已經等了很久」在指數分布裡不是有利資訊？\n4. 為什麼說「指數分布是唯一的連續無記憶分布」——這個「唯一」憑什麼？（講出「相加變相乘只有指數函數能做到」的骨架即可。）\n5. 常態分布的尾巴和冪律的尾巴，差別在哪？為什麼這個差別讓「離平均很遠＝異常」這條直覺在長尾世界失效？\n6. 首富走進酒吧，為什麼平均年收入會爆炸、中位數卻紋風不動？這對你看延遲指標有什麼直接啟示？\n7. 「我們平均延遲 50ms」這句話，至少講一個它在說謊的方式。\n8. 為什麼快取在「存取是長尾」時特別有效、在「存取是均勻」時幾乎沒用？\n\n## 延伸閱讀\n\n- **《佇列論》ch04、ch05**（你的書架）——指數分布與卜瓦松過程怎麼接到到達間隔、怎麼拿去算排隊長度與等待時間。本章只講了指數的「美」（無記憶性），運算與排隊網路的深度在那裡。讀那兩章的「到達間隔 = 指數」一節，會把本章和卜瓦松（ch11）縫起來。\n- **《馴服無限》ch15**（你的書架）——「機率即面積」的微積分版。本章一直在用「機率＝密度下的面積」當工具卻沒推導積分；那一章把這件事講透，也是 ch14、ch15 常態曲線下面積的數學底。\n- Nassim Nicholas Taleb, *The Black Swan*（2007）——肥尾與「黑天鵝」（位於肥尾深處、高衝擊、事後才被合理化的極端事件）的科普經典（2026-06，照 landscape）。讀它對「為什麼用常態思維看長尾世界會毀滅性地低估風險」的論證；批判性地讀，它觀點強烈。\n- Wikipedia, *Pareto principle* / *Fat-tailed distribution*——查證 80/20 的歸屬（Pareto 觀察、Juran 命名）與肥尾的定義。本章的史實校正即出自此（2026-06，已查證）。讀「History」段確認 Juran 1940s 命名那一段。\n- 預告 **ch13（大數法則）**——本章反覆說的「樣本平均在長尾下不穩」，下一章會給你它的正面版：大數法則保證樣本平均會收斂，但**前提是期望值存在、且收斂速度吃尾巴的胖瘦**。長尾正是這個前提開始吱嘎作響的地方。帶著本章的兩組小資料（長尾 vs 常態，拿掉最大值的反應）去讀 ch13，你會更懂它在保證什麼、不保證什麼。\n"}, {"id": "ch13-law-of-large-numbers", "file": "ch13-law-of-large-numbers.md", "group": "Part IV — 兩大定理（秩序從混沌浮現）", "title": "ch13 — 大數法則：頻率為何收斂到機率", "md": "# ch13 — 大數法則：頻率為何收斂到機率\n\n> **本章解決什麼問題**：歡迎來到 Part IV，全書的高潮。前面十二章你學會了把隨機變成數字、把信念變成更新法則、認得了一整個分布動物園。但有一個從 ch02 就欠你的承諾一直沒兌現：那時我說「機率＝長期頻率」是三種詮釋之一，卻只能拿它當「直覺上應該對」的東西用——擲很多次、正面比例會靠近 1/2，憑什麼？這一章就是那張支票的兌現日。大數法則（law of large numbers, LLN）是第一個告訴你「秩序如何從混沌浮現」的定理：個別擲幣完全不可測，但只要擲得夠多，**平均**會被一隻看不見的手按回它的期望值。我們會用一條只靠變異數的不等式（車比雪夫不等式）把這件事證個八九分，然後——這是本章、甚至我認為是全書最重要的一頁——徹底拆穿賭徒謬誤：大數法則保證的是比例被「稀釋」回去，**不是**偏差被「修正」回來。這兩件事聽起來一樣，差之毫釐、謬以千里。下一章 ch14 會接著問「在收斂的那個點附近，它怎麼抖」，答案永遠是鐘形；但要先有這一章把「去哪」釘死，才談得上「怎麼抖」。\n\n```text\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理         ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽   ←   ch13 大數法則 ◄你在這裡\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n「你在這裡」終於走進 Part IV——全書的高潮，秩序從混沌浮現的兩章。這一章說平均「去哪」，下一章說它「怎麼抖」，第三章把抖出來的那個鐘形看透。\n\n## 從你已知的出發\n\n你對大數法則的信任，深到你根本沒意識到它是個需要被證明的東西。\n\n回想你怎麼判斷一支 API 的可靠度。你不會跑一次請求、成功了就宣布「這支 API 100% 可用」，也不會失敗一次就宣布它壞了。你會看一段時間的監控——一萬次請求裡 23 次失敗，你說「錯誤率大約 0.23%」。然後你做了一個你從沒質疑過的跳躍：你把這個**樣本的錯誤率**，當成這支 API**真實的、長期的**錯誤率來用，拿去算 SLA、拿去設告警閾值。\n\n停在這裡。你憑什麼相信「我量到的 0.23% 會接近那個看不見的真值」？\n\n你憑的就是大數法則。你心裡有個信念：樣本夠大，量到的頻率就會穩定下來、靠近真實機率。這個信念你用在每一個地方——\n\n- **A/B test 要跑夠久**。你不會看一百個 user 就拍板說 B 版轉換率比 A 版高。你知道樣本太小、數字會亂跳，要等到累積夠多樣本，兩邊的轉換率才「穩」下來、差異才可信。你在等的，就是樣本平均收斂。\n- **抽樣監控**。你不記錄每一筆請求的延遲，你抽 1% 算 P50/P99，然後相信這個抽樣的分位數會接近全量的真實分位數。你賭的是「樣本夠大、抽樣統計量會收斂到母體真值」。\n- **負載測試找容量上限**。你跑幾輪壓測、取平均吞吐量，當成這台機器的「真實容量」。一輪可能受 GC、受鄰居噪音干擾，但多跑幾輪平均起來，雜訊會被抹掉。\n\n這三件事的數學骨架是同一條：**樣本平均會收斂到期望值。** 這就是大數法則。你的職業生涯有一大半建立在它上面，只是你從沒把它寫成定理。\n\n但這裡有個陷阱，會讓人賠錢、會讓人在 on-call 時做錯判斷。同樣這條「長期會穩定」的直覺，換個場景就反過來咬你：「**最近故障特別多，照理說接下來該平靜一陣子了吧？**」——這句聽起來像「跑久了會穩定」的延伸，其實是大數法則的**冒牌貨**，叫賭徒謬誤，它偷渡了一個大數法則從來沒給過的承諾。本章後半段會把這兩者一刀切開，那一頁我會請你停下來十分鐘。\n\n先把「樣本平均會收斂」這件事，從信念變成定理。\n\n## 弱大數法則：到底在保證什麼\n\n先把話講精確，因為這個定理最容易被人記成一個它沒說的版本。\n\n設你有一串**獨立同分布（independent and identically distributed, iid）**的隨機變數 X₁, X₂, X₃, …——白話就是「同一個實驗一直重複、每次互不影響」。脊椎硬幣就是最乾淨的例子：每一擲是一個伯努利隨機變數，正面記 1、反面記 0，每擲獨立、分布都一樣。設每個 Xᵢ 的期望值是 μ（對公正硬幣，μ = 1/2，這是 ch08 算過的）。\n\n定義**樣本平均**：\n\n```text\n        X₁ + X₂ + … + Xₙ\nX̄ₙ  =  ──────────────────      ← 前 n 次的平均\n                n\n```\n\n對硬幣來說，X̄ₙ 就是「前 n 擲的正面比例」（因為正面記 1、反面記 0，加起來就是正面數，除以 n 就是比例）。\n\n**弱大數法則（weak law of large numbers, WLLN）** 說的是：\n\n> 對任意你指定的小誤差 ε（不管多小），當 n 變大，「樣本平均離期望值超過 ε」這件事的機率會趨近 0。寫成式子：\n>\n> ```text\n> lim(n→∞) P( |X̄ₙ − μ| ≥ ε ) = 0\n> ```\n\n讀出來：**你愛多嚴格就多嚴格地畫一個誤差帶（μ ± ε），擲得夠多，樣本平均落在帶子外面的機率就被壓到要多小有多小。**\n\n這裡有兩個字要你特別盯著看，因為它們是後面拆穿賭徒謬誤的關鍵。\n\n第一個字是**機率**。弱大數法則沒有保證「樣本平均一定會落在帶子裡」。它保證的是「落在帶子外的**機率**趨近 0」。永遠有一絲可能你超級衰、擲了一百萬次還是偏離得很遠——只是那個機率小到可以忽略。它是個機率陳述，不是鐵口直斷。\n\n第二個字是**平均**（或者說**比例**）。收斂的是 X̄ₙ，是除過 n 的那個東西，不是正面的**個數**、不是「正面減反面」的差。這個區別微妙到 99% 的人會滑過去，而它正是整個賭徒謬誤的命門。先把它記在心裡，後面算給你看。\n\n歷史上第一個證明這件事的是雅各布·伯努利（Jacob Bernoulli），收在他 1713 年出版的《推測術》（Ars Conjectandi）裡——這本書他本人已於 1705 年過世，由侄子整理付印，出版時人都走了八年（照 landscape；2026-06 已查證）。這是機率論史上第一個極限定理，被視為整門學科的奠基石。伯努利本人對這個定理看得極重（坊間流傳他稱之為「黃金定理」，但 landscape 提醒這個命名可能是後人把拉丁文 autem 誤讀成 aureum 的訛傳，我們就保守地說「他自認分量極重的核心結果」）。他要回答的正是一個你天天在問的問題：**從有限次觀察，能不能可靠地估出那個看不見的真實比例？** 他證明了：能，只要你觀察得夠多。\n\n伯努利的證明很硬。我們不走他的路，走一條一個半世紀後才出現、但簡單到優雅得驚人的捷徑——車比雪夫的那條不等式。\n\n## 車比雪夫不等式：只靠變異數，就把「離期望遠」壓下去\n\n這一節是本章的數學心臟。它要回答一個看起來不可能簡單回答的問題：\n\n> 我只知道一個隨機變數的期望值 μ 和變異數 σ²（連它長什麼分布都不知道），能不能對「它離期望值很遠」這件事的機率，給一個保證上界？\n\n直覺會說：不知道分布怎麼可能保證？分布可以長得很怪啊。但答案是能，而且那個保證乾淨到你會懷疑是不是哪裡偷吃步。這就是**車比雪夫不等式（Chebyshev's inequality）**：\n\n```text\n                    1\nP( |X − μ| ≥ kσ ) ≤ ───      ← 離期望超過 k 個標準差的機率，上界是 1/k²\n                    k²\n```\n\n讀出來：**任何**有期望、有有限變異數的隨機變數，它離期望值超過 k 個標準差的機率，不會超過 1/k²。不管它是硬幣、是骰子、是延遲、是收入、是什麼妖魔鬼怪分布，這個上界一律成立。\n\n代幾個 k 進去感受一下：\n\n```text\nk = 2  →  P(|X − μ| ≥ 2σ) ≤ 1/4  = 25%     ← 離 2 個標準差以外，頂多 25%\nk = 3  →  P(|X − μ| ≥ 3σ) ≤ 1/9  ≈ 11.1%\nk = 5  →  P(|X − μ| ≥ 5σ) ≤ 1/25 = 4%\n```\n\n這個界很鬆——對常態分布，離 2σ 以外的真實機率只有 4.55%（ch15 的 95.45% 法則），車比雪夫卻只敢保證「頂多 25%」。但**鬆不是缺點，是賣點**：它鬆是因為它對**所有**分布都成立，它買的是普適性。一個你完全不認識的分布，也能對它下這個保證。這種「幾乎什麼都不知道、卻能保證點什麼」的力量你其實很熟——就像你不知道某服務內部怎麼實作，但能對它的 P99 給一個契約上界。車比雪夫不等式是機率世界的 SLA。\n\n### 為什麼成立：一個你能口頭講出來的論證\n\n我不會給你測度論的嚴格證明，但我會給你一個**每一步都能口頭說出理由**的版本，這在本書的嚴謹度標準裡叫「工程師的嚴謹」。\n\n核心觀念只有一句話：**變異數是「偏差平方的平均」，所以遠處的偏差因為被平方，會在變異數裡佔掉一大塊預算；而變異數的總預算是固定的（就是 σ²），於是遠處不可能擠進太多機率。**\n\n把它拆細。回憶 ch09 變異數的定義：\n\n```text\nσ² = Var(X) = E[ (X − μ)² ]      ← 偏差平方的期望（平均）\n```\n\n這是一個「平均」，它把每個可能值的「偏差平方」按機率加權加起來。現在做一個關鍵的觀察：假設有一坨機率躲在「離 μ 至少 kσ」的遠方。對這坨機率裡的每一個值，它的「偏差平方」(X−μ)² 至少是 (kσ)² = k²σ²。\n\n那麼光是這坨遠方的機率，貢獻給變異數的量，至少是：\n\n```text\n（遠方那坨的機率） × k²σ²   ≤   整個變異數 σ²\n                                  ↑\n              因為變異數是所有偏差平方的加權總和，\n              遠方這坨只是其中一部分，不可能超過全部\n```\n\n把不等式整理一下，兩邊除以 k²σ²：\n\n```text\nP(|X − μ| ≥ kσ)  ≤  σ² / (k²σ²)  =  1/k²\n```\n\n得證。整個論證的靈魂就一句白話：**遠處的偏差被平方放大，吃掉的變異數預算太貴，所以遠處塞不下太多機率。** 變異數是一筆固定的預算，遠方的機率想多待一點，就得付 k² 倍的平方稅，付不起，所以只能稀稀落落。\n\n這就是為什麼我說它優雅得驚人。你只給它兩個數字（μ 和 σ），它連分布長相都不問，就能反手給你一個對所有遠方偏差的鐵保證。一個半世紀的數學家用各種精巧手法逼近大數法則，最後發現引擎可以這麼簡單。\n\n關於它的歸屬，landscape 特別交代了一個常被寫錯的點，我照正確版講：這條不等式**不是車比雪夫一個人的**。是 Bienaymé 在 1853 年先陳述了它（沒給證明），車比雪夫（Chebyshev）在 1867 年給出更一般的證明（2026-06 已查證，兩個來源確認）。所以更公平的名字是 **Bienaymé–Chebyshev 不等式**。當年 Liouville 編期刊時，還特意把 Bienaymé 的文章排在車比雪夫前面刊出。別只寫「Chebyshev 1867」——那會抹掉先陳述它的人。順帶一提，車比雪夫的學生馬可夫（就是 ch21 那個馬可夫）後來又給了一個證明。\n\n### 用它一槍打穿弱大數法則\n\n現在來看這條不等式怎麼直接生出大數法則——這是它最漂亮的應用，而且只要一個你 ch09 學過的事實當燃料。\n\n回憶 ch09 的 **√n 法則**：n 個 iid 的隨機變數，每個變異數 σ²，它們的**平均** X̄ₙ 的變異數是 σ²/n（因為獨立時變異數相加，n 個 σ² 加起來是 nσ²，再除以 n² 就是 σ²/n）。換句話說：\n\n```text\nE[X̄ₙ]   = μ           ← 樣本平均的期望，就是真值（它瞄得準）\nVar(X̄ₙ) = σ²/n        ← 樣本平均的變異數，隨 n 變小（它越來越穩）\n```\n\n這兩行就是全部的關鍵。樣本平均**瞄得準**（期望就是 μ），而且**隨 n 越來越穩**（變異數 σ²/n 在縮小）。現在把車比雪夫不等式直接套在 X̄ₙ 身上——把車比雪夫裡的「X」換成「X̄ₙ」、「σ²」換成「σ²/n」、把「kσ」那個距離直接寫成你指定的誤差 ε：\n\n```text\n                      Var(X̄ₙ)      σ²/n        σ²\nP( |X̄ₙ − μ| ≥ ε )  ≤  ─────────  =  ──────  =  ──────\n                        ε²            ε²         n·ε²\n```\n\n盯著最右邊那個 σ²/(n·ε²)。ε 是你固定選的（不管多小都行），σ² 是個固定常數，分母裡有個 n。**當 n → ∞，這整個東西 → 0。**\n\n```text\nP( |X̄ₙ − μ| ≥ ε )  ≤  σ²/(n·ε²)  ──n→∞──►  0\n```\n\n弱大數法則，證完了。\n\n停下來體會一下剛剛發生了什麼。我們沒對分布做任何假設（只要有限變異數），只用了兩件事：樣本平均瞄得準（期望是 μ）、隨 n 變穩（變異數是 σ²/n）。然後車比雪夫不等式把「變穩」翻譯成「跑到誤差帶外的機率被壓到 0」。**「混沌如何生出秩序」這個從 ch01 就懸著的大哉問，核心機制就藏在那個 σ²/n 的 n 裡——你每多擲一次，就替平均多買一分穩定，買到無窮多次，平均就被釘死在 μ 上了。**\n\n這是本書第一個「秩序從混沌浮現」的完整論證，每一步你都能口頭講給另一個工程師聽。我認為這是整本書最划算的一頁——三行代數，換一個定理。\n\n## 弱與強：依機率 vs 幾乎必然（直覺帶過）\n\n剛剛證的叫「弱」大數法則，那一定有個「強」的。它們差在哪？這個差別很微妙，但值得你知道有這回事，免得哪天看到「強大數法則」一臉茫然。\n\n弱版說的是：對每一個固定的 n，「此刻的樣本平均落在誤差帶外」的機率很小，而且隨 n 趨於 0。這叫**依機率收斂（convergence in probability）**。它管的是「某一個時間點的快照」——在第 n 擲這個時刻，偏離的機率多大。\n\n強版（**強大數法則，strong law of large numbers, SLLN**）說的更狠：樣本平均這條**序列本身**，幾乎必然會收斂到 μ。這叫**幾乎必然收斂（almost sure convergence）**。它管的不是某個時間點的快照，而是**整條軌跡的命運**——它保證的是：你擲下去這條無窮的序列，它的樣本平均「從某一刻之後就再也不會大幅偏離」，而且這件事發生的機率是 1。\n\n用工程的比喻抓這個差別：\n\n```text\n弱（依機率）：     對任意固定時刻 t，「此刻在誤差帶外」的機率 → 0\n                   （像在問：第 t 秒這個快照，超標的機率多大？）\n\n強（幾乎必然）：   整條時間序列「最終穩定下來、不再超標」的機率 = 1\n                   （像在問：這條曲線會不會收斂？答：100% 會。）\n```\n\n差別在於：弱版允許「偶爾有一擲突然彈出去」零星發生（只要機率趨於 0），不保證軌跡會「永遠安定」；強版直接保證軌跡會安定。強版更強，蘊含弱版。\n\n本書**不證強版**（它需要的工具超出我們的範圍，嚴格證明見延伸閱讀的測度論教材）。記住一句話就夠：**弱版說「每個時刻偏離的機率趨於 0」，強版說「整條軌跡幾乎必然會穩定」；日常你信的「擲久了一定會穩」技術上靠的是強版，但弱版已夠你建立所有工程直覺。** 兩者都指向同一結論：擲得夠多，樣本平均會回到期望值。\n\n好。地基打好了。現在來拆全書最危險的一個誤解——而且它正是用上面這個定理偽裝出來的。\n\n## 直覺的陷阱\n\n機率是人類直覺最常崩壞的領域，而賭徒謬誤是這片廢墟裡最大的一塊。我認為這是整本書最反直覺、也最值得你停下來十分鐘的一頁。讀慢一點，因為你的直覺正準備騙你，而且它會用剛剛那個定理當幌子。\n\n### 賭徒謬誤：硬幣連開五次正面，第六次呢？\n\n場景。**這就是 ch01 那枚公正硬幣**，你已經很熟它了：P(正) = 1/2。現在你連續擲了五次，全是正面。正正正正正。\n\n問：第六次，正面的機率是多少？\n\n很多人——而且是很聰明的人——心裡會冒出一個聲音：「都連五個正面了，反面該來了吧？反面的機率應該大一點。」這個聲音就是**賭徒謬誤（gambler's fallacy）**。\n\n正解是：**第六次，正面機率還是 1/2，反面也是 1/2。一絲一毫都沒變。**\n\n為什麼？因為硬幣**沒有記憶**。這是 ch04 的獨立性，現在以最赤裸的形式回來找你。每一擲都是一個獨立事件，硬幣不知道、也不在乎前五次發生了什麼。它沒有一個「欠了五個反面」的帳本，沒有一個「該平衡一下了」的內建衝動。前五次正面這個資訊，對第六次的機率**完全沒有作用**，因為獨立的定義就是「條件機率等於無條件機率」——P(第六次正 | 前五次全正) = P(第六次正) = 1/2。\n\n這個謬誤有個著名的真實案例，貴到值得記住。1913 年 8 月 18 日，蒙地卡羅賭場的一張輪盤桌，球**連續開出 26 次黑色**（2026-06 已查證）。從大概第十幾次開始，賭客瘋狂往紅色下注——他們堅信「黑這麼多次了，紅鐵定要來補了」。結果黑一直開、一直開，賭客一輪輪加碼想等紅來「修正」，輸掉了數百萬法郎。每一次他們都在重犯同一個錯：以為輪盤記得前面開過什麼、以為它欠他們一個紅。輪盤什麼都不欠。每一轉都是嶄新的、跟過去毫無瓜葛的 18/37 紅、18/37 黑、1/37 綠。\n\n### 那大數法則不是說會「平衡回來」嗎？——不，它說的是稀釋\n\n這裡是全章的命門，請你務必跟上，因為賭徒謬誤的狡猾之處，就在於它盜用了大數法則的名義。\n\n賭徒的心理是這樣運作的：「大數法則說正面比例長期會回到 50%。我現在正面太多了，那大數法則總得想辦法把它拉回來吧？所以接下來反面該變多，來補償。」\n\n這個推理**錯在哪**？它把大數法則理解成一個**會主動修正偏差的力量**——好像宇宙有個校正機制，看到你正面太多，就調高反面的機率來補。**沒有這種東西。** 硬幣的機率永遠是 1/2，雷打不動，大數法則沒有、也不可能去動每一次擲幣的機率（那會違反獨立性）。\n\n那大數法則到底怎麼把比例拉回 50% 的？答案是兩個字，請刻進腦子裡：**稀釋（dilution），不是修正（correction）。**\n\n差別是這樣的。假設你前 5 擲拿了 5 個正面、0 個反面，比例是 100%，偏離 50% 偏得離譜。大數法則**不會**讓接下來的反面變多去「還債」。它做的事情是：讓你再擲一千次、一萬次，這一千次、一萬次裡正反各半（因為機率始終是 1/2），於是最前面那 5 個多出來的正面，被淹沒在後面這一大池子大致各半的結果裡，它對**比例**的影響被稀釋到趨近於 0。\n\n打個你熟的比方。一桶水，一開始倒了 5 克鹽進去（這 5 克鹽就是那 5 個「多餘」的正面）。怎麼讓它的含鹽濃度降下來？賭徒謬誤的想法是「把鹽撈出來」（修正——讓未來反面多到把正面抵銷掉）。但大數法則的做法是**一直加清水**（稀釋——讓未來大量各半的擲幣不斷加進來）。那 5 克鹽從頭到尾都在桶裡、一克沒少，但加了一萬公升水之後，濃度趨近於 0。**偏差沒有被消除，它被淹沒了。**\n\n這就是為什麼「比例收斂回 0.5」和「硬幣沒有記憶」可以同時成立、毫不矛盾。前者講的是分母 n 變超大之後，固定的那點偏差被攤薄；後者講的是分子的每一項永遠獨立、永遠 50/50。大數法則作用在分母上（靠 n 變大稀釋），不作用在分子上（不去碰每一擲的機率）。賭徒謬誤的全部錯誤，就是以為它作用在分子上。\n\n### 致命一擊：「正面減反面」的絕對差，期望其實在變大\n\n如果上面還沒讓你脊背發涼，這一段會。它是同一組數據的另一種讀法，而且它跟比例收斂**同時為真**——這是本書最重要的一次「同一組數據兩種讀法」對帳。\n\n我們追蹤兩個量。一個是**正面比例**（正面數 / n），大數法則說它收斂到 0.5。另一個是**正面數減反面數的絕對差** |正面 − 反面|，這量的是「偏離完美 50/50 的絕對距離」。\n\n賭徒的直覺會猜：既然比例收斂到 0.5，那「正面減反面」應該也越來越接近 0 吧？**錯得徹底。** 真相是：\n\n> 隨著 n 變大，「正面比例」收斂到 0.5，但「正面減反面」的典型絕對差**反而越來越大，大約以 √n 的速度成長**。\n\n兩個量往**相反方向**跑。比例收斂、差距發散。同一組擲幣，同時發生。\n\n怎麼來的？ch11 算過，n 擲硬幣的正面數服從 Binomial(n, 1/2)，它的標準差是 √n / 2（ch09、ch11 的基準）。而「正面 − 反面」= 正面數 − (n − 正面數) = 2×正面數 − n，它是正面數的兩倍再平移，所以它的標準差是正面數標準差的兩倍：2 × (√n/2) = √n。所以「正面減反面」的典型波動量級就是 **√n**——n 越大，這個絕對差的典型大小**越大**，不是越小。\n\n```text\nn        正面比例會靠近      |正面−反面| 典型量級 ~√n\n──────────────────────────────────────────────────\n100      0.5（±0.05 左右）   ~10\n10,000   0.5（±0.005 左右）  ~100\n1,000,000 0.5（±0.0005）     ~1000\n```\n\n看懂這張表，你就懂了整個謬誤。**比例的偏差在縮小（因為分母 n 衝得比分子的偏差快），但絕對的偏差在擴大（√n 是會長大的）。** 賭徒謬誤的人腦補了一個「絕對差會被拉回 0」的世界，但真實世界裡絕對差是發散的——硬幣連開五次正面之後，那「多出來的 5 個正面」不但不會被未來的反面補掉，從絕對數量看，未來典型的不平衡量還會比 5 更大。比例之所以還能收斂，純粹是因為分母漲得更快，把它稀釋掉了。\n\n我把這句話單獨拎出來，因為它是本章你最該能轉述的一句：\n\n> **驚嘆點，請務必能轉述**：大數法則保證的是**比例**回到 0.5，靠的是「分母 n 暴漲、把偏差稀釋掉」，**不是**「偏差被反向修正、被補回來」。事實上「正面減反面」的絕對差期望是隨 n 變**大**的（約 √n）。所以「連開五個正面、反面該來補了」這句話，把稀釋誤認成修正，把一個發散的量誤認成會回零的量——它在兩個層次上同時錯了。獨立事件沒有記憶，系統不欠你任何東西。\n\n### 賭徒謬誤的清單與自我察覺\n\n把這片廢墟整理成一張你能隨身帶的表：\n\n```text\n陷阱                      錯誤直覺                  哪一步翻車 / 怎麼自我察覺\n──────────────────────────────────────────────────────────────────────────\n賭徒謬誤                  「連五個正面，反面        把獨立事件想成有記憶、會還債\n（最大宗）                該來補了」                → 徵兆：你在說「該…了」「輪到…」\n                                                    「欠一個…」。獨立事件沒有「該」。\n──────────────────────────────────────────────────────────────────────────\n稀釋誤認成修正            「大數法則會把偏差        以為 LLN 主動調高某一邊的機率\n                          拉回來」                  → 徵兆：你以為 LLN 作用在「下一擲」\n                                                    上。它作用在「分母 n」上，不碰機率。\n──────────────────────────────────────────────────────────────────────────\n比例收斂 = 差距收斂        「既然比例回 0.5，        把「比例回 0.5」當成「差距回 0」\n                          正反個數差也回 0」        → 徵兆：你覺得 |正−反| 會變小。\n                                                    它其實 ~√n 在變大。\n──────────────────────────────────────────────────────────────────────────\n小樣本當大樣本            「跑了 20 個 user，        小 n 的 X̄ₙ 變異數 σ²/n 還很大\n（「小數法則」）          B 版明顯比較好」          → 徵兆：你拿很少的樣本下強結論。\n                                                    n 小，平均還在亂跳，別信。\n──────────────────────────────────────────────────────────────────────────\n熱手「謬誤」當定論        「連續命中是錯覺，        熱手到底存不存在，2018 已翻案\n（見下）                  鐵定是隨機」              → 徵兆：你斬釘截鐵說熱手是假的。\n                                                    別。它沒定讞，見下一段。\n──────────────────────────────────────────────────────────────────────────\n```\n\n第一條和最後一條值得各補一句。\n\n**「小數法則」**是賭徒謬誤的雙胞胎兄弟，工程版尤其常見：你拿太小的樣本（20 個 user、跑三輪壓測、看十分鐘監控）就下結論，等於假設「小樣本也該長得像母體」。大數法則只保證**大** n 收斂，小 n 的樣本平均變異數 σ²/n 還很大、還在劇烈亂跳。A/B test 為什麼要算「需要多少樣本才有檢定力」（這是 ch18 的事），根子就在這——你得擲夠多，σ²/n 才小到讓你能信那個差異。「跑了一下子，B 看起來比較好」是統計學裡最貴的一句話。\n\n**熱手謬誤（hot-hand fallacy）** 是 landscape 特別用 ⚠️ 標起來、要我們別寫錯的。1985 年 Gilovich、Vallone、Tversky 的經典研究主張：籃球員「手感發燙、連續命中」是錯覺，人類只是在隨機資料裡看見不存在的型態，**結論是「熱手是謬誤」**——這被當定論講了三十多年。但 2018 年 Miller 與 Sanjurjo 在《Econometrica》指出（2026-06 已查證），1985 年的分析藏了一個**系統性選擇偏差**：在有限序列裡，「連續命中之後再投中」這個經驗頻率，**即使在純隨機（獨立）假設下也會系統性偏低**。去掉這個偏差校正後，**1985 年「熱手是假的」結論被推翻，反而冒出支持「連續命中」確實存在的顯著證據。** 所以正確的當代理解是：**熱手可能是真的，至少 1985 年的否證站不住腳。** 別把「熱手是謬誤」當鐵案——很多教科書（甚至作者本人）還停在 1985 年的版本。這給你一個美麗的對照：**賭徒謬誤是真的謬誤**（獨立事件確實沒記憶），但**「熱手是謬誤」這句話本身可能才是謬誤**（運動員的投籃可能根本不獨立）。差別全在「事件到底獨不獨立」。\n\n## 紙上推演\n\n純紙筆，數字手算。三題，做完你對大數法則的理解會從「聽過」變成「能講」。\n\n### 推演題 1 — 用車比雪夫估「比例偏離 0.5 超過 ε」的上界 **[15 分鐘]** ★★\n\n**這就是 ch01 那枚硬幣。** 擲 n = 1000 次。用車比雪夫不等式，估「正面比例偏離 0.5 超過 0.05」的機率上界——也就是 P(|X̄ₙ − 0.5| ≥ 0.05) 的上界。需要的料：單擲的變異數 σ² = 1/4（ch09 基準）。一步步算，最後說一句這個界鬆不鬆、為什麼還是有用。\n\n#### 推演解答\n\n用上面推導好的形式 P(|X̄ₙ − μ| ≥ ε) ≤ σ²/(n·ε²)，把數字代進去。μ = 0.5、σ² = 1/4、n = 1000、ε = 0.05：\n\n```text\n                            σ²            1/4              0.25\nP(|X̄ₙ − 0.5| ≥ 0.05)  ≤  ────────  =  ────────────  =  ──────────\n                          n · ε²        1000 × 0.05²      1000 × 0.0025\n\n                                          0.25\n                                     =  ────────  =  0.1\n                                          2.5\n```\n\n上界是 **0.1，也就是 10%**。讀出來：擲 1000 次公正硬幣，正面比例偏離 0.5 超過 0.05（也就是落到 0.45 以下或 0.55 以上）的機率，**頂多 10%**。\n\n交叉驗算（換個方式確認沒算錯）：分母 n·ε² = 1000 × (0.05)² = 1000 × 0.0025 = 2.5；分子 σ² = 0.25；0.25 / 2.5 = 0.1。✓ 兩次都是 0.1。\n\n這個界**很鬆**。如果你拿 ch14、ch15 的常態近似去算真實機率，會發現它遠小於 10%（正面數的標準差是 √1000/2 ≈ 15.8，偏離 50 達 0.05×1000 = 50 個，相當於 50/15.8 ≈ 3.16 個標準差，常態下這機率約 0.16%）。車比雪夫的 10% 比真實的 0.16% 大了六十幾倍。但它鬆得有道理——它沒用到「硬幣的正面數近似常態」這個額外知識，它只用了變異數，所以它對**任何**有限變異數的分布都成立。它給你的是一個**保證下限的安心**：就算你對分布一無所知，你也能拍胸脯說「偏離這麼多的機率不會超過 10%」。在工程上這種「最壞情況的保證」常常比「精確值」更值錢。\n\n### 推演題 2 — 賭徒謬誤錯在哪？指出它偷渡了什麼 **[15 分鐘]** ★★\n\n一個人說：「這枚公正硬幣連開了五次正面。根據大數法則，比例長期要回到 50%，所以第六次反面的機率比正面高。」請精確指出這段推理的破綻：(a) 第六次反面機率到底多少、為什麼；(b) 他把大數法則的「稀釋」誤解成了什麼；(c) 他若改追蹤「正面減反面」的絕對差，會發現什麼跟他的直覺相反的事。\n\n#### 推演解答\n\n**(a) 第六次反面機率就是 1/2，正面也是 1/2，沒有變。** 因為每一擲獨立，硬幣沒有記憶——前五次的結果對第六次的機率毫無作用。獨立的定義就是「條件機率＝無條件機率」：P(第六次反 | 前五次全正) = P(第六次反) = 1/2。他假設了硬幣「記得」前面開過正面、並會「想辦法補反面」，這個記憶不存在。\n\n**(b) 他把「稀釋」誤解成了「修正」。** 大數法則讓比例回到 0.5，靠的是「再擲一大堆、各半的結果把前面那 5 個多餘正面**淹沒/稀釋**掉」（分母 n 暴漲），**不是**「未來反面變多、把正面**抵銷/修正**掉」（調高反面的機率）。他以為大數法則會去動「下一擲」的機率——但大數法則作用在分母 n 上，從不碰每一擲的機率（碰了就違反獨立性了）。那 5 個多餘的正面從頭到尾都在，只是被稀釋到對比例沒影響。鹽沒被撈出去，是水加多了。\n\n**(c) 他會發現絕對差不但不回 0，反而變大。** 「正面 − 反面」的典型絕對差約 √n，隨 n 增長而**擴大**（n=100 時 ~10、n=10⁴ 時 ~100）。他的直覺以為「比例回 0.5」意味著「正反個數會拉平」，但真相是比例收斂、絕對差發散，兩個量往相反方向跑。所以連他「該補回來」的那個量——絕對差——本身都不是會回零的東西。他在兩個層次上同時錯了：機率不會變（分子），絕對差會變大（不會回零）。\n\n常見錯路：有人會退一步說「好啦機率沒變，但長期『大概』會平衡吧」。要小心這個「大概」——它對**比例**成立（比例會穩到 0.5），對**絕對差**不成立（絕對差發散）。把這兩個分清楚，才算真懂。\n\n### 推演題 3 — 口頭題：向喊「該開大了」的人講清楚 LLN 真正保證什麼 **[15 分鐘]** ★★★\n\n賭場裡，輪盤連開好幾把小，旁邊有人扯著嗓子喊「憋這麼久了，該開大了，快壓大！」請你用不超過兩分鐘、不寫一條公式，把大數法則**真正**保證的東西講給他聽，並讓他明白他喊的那句話錯在哪。講完請自評：你有沒有不小心也用到「平衡」「補回來」這類會把對方帶溝裡的詞。\n\n#### 推演解答\n\n一個能過關的口頭版本（你用自己的話講，抓住骨架就好）：\n\n「輪盤沒有記憶。它不知道剛剛開了幾把小，也不在乎——下一把開大開小的機率，跟第一把一模一樣，跟前面那串小**完全無關**。你說『憋久了該開大』，等於假設輪盤心裡有個帳本、欠了你幾個大、會想辦法還——它沒有這個帳本。\n\n那大數法則不是說長期大小會各半嗎？是。但它兌現這個承諾的方式，不是『讓接下來的大變多來補』，而是『再轉超級多把、各半的結果把前面這串小**淹沒**掉』。前面這串小一把都不會被抵銷，它們會一直在那；只是你轉了上萬把之後，它們佔的比例被攤薄到看不見。**是稀釋，不是補償。**\n\n而且更顛覆的是：如果你去數『大的次數減小的次數』那個絕對差，它隨著轉的把數**越來越大**，不是越來越小。所以連你想等的那個『拉平』都不會發生。獨立的東西沒有『該不該』，輪盤不欠你。你壓大壓小，期望值都一樣是賠的——這才是賭場真正穩賺的地方。」\n\n**自評重點**：回頭檢查你有沒有講出「補回來」「平衡一下」「該輪到」這種詞。只要冒出來，你就在用對方的錯誤框架，反而強化了他的謬誤。正確的講法核心永遠是兩個詞——**獨立（沒記憶）** 和 **稀釋（不是修正）**。把這兩個講清楚，這題就過了。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關，講不清楚就是還沒懂：\n\n1. 弱大數法則精確在保證什麼？請特別講清楚「收斂的是**比例/平均**、而且收斂的是**機率**」——這兩個字眼為什麼非盯緊不可？\n2. 車比雪夫不等式憑什麼能在「不知道分布長相」的情況下給出機率上界？用「變異數是固定預算、遠處偏差被平方放大、所以塞不下太多機率」這個骨架講一遍。\n3. 車比雪夫不等式怎麼一步生出大數法則？關鍵是哪個量隨 n 變小、為什麼（提示：σ²/n）？\n4. 賭徒謬誤錯在哪？「稀釋」和「修正」差在哪裡——大數法則是哪一個、為什麼這個區別是整個謬誤的命門？\n5. 為什麼「正面比例收斂到 0.5」和「正面減反面的絕對差約 √n 在變大」可以**同時**為真、毫不矛盾？\n6. 弱大數法則和強大數法則的差別，用「某時刻的快照」vs「整條軌跡的命運」講一遍（依機率 vs 幾乎必然）。\n7. 「熱手是謬誤」這句話現在還能不能照講？2018 年發生了什麼、它跟賭徒謬誤的關鍵差別在哪（提示：事件獨不獨立）？\n8. 回到 ch02：當時說「機率＝長期頻率」只是三種詮釋之一、還欠一個正當化。這一章怎麼把那張支票兌現了？\n\n## 延伸閱讀\n\n- **回看 ch02、ch09**（本書）——ch02 的頻率詮釋當時只能當「應該對」的直覺用，這一章給了它定理當地基，讀那一節「三張臉」現在會有完全不同的踏實感；ch09 的 √n 法則和 σ²/n 標準誤是本章車比雪夫證明的唯一燃料，沒吃透那個先回去補。\n- **預告 ch14（中央極限定理）**（本書）——大數法則說樣本平均「去哪」（收斂到 μ），ch14 接著回答「在 μ 附近**怎麼抖**」，答案永遠是鐘形。本章的車比雪夫給的是「鬆」的尾巴界，ch14 會給你「緊」的精確形狀。帶著本章那張「比例收斂、差距 √n 發散」的表去讀 ch14，你會看到那個 √n 正是常態標準誤的來源。\n- **預告 ch20（隨機漫步）**（本書）——把「正面減反面」這個 √n 量級的東西畫成一條隨時間走的軌跡，就是隨機漫步。本章說它的典型大小約 √n，ch20 會說它「必定回到原點、但期望回返時間無限」——同一個量的時間軸版本，更反直覺。\n- Grinstead & Snell, *Introduction to Probability*, 第 8 章「Law of Large Numbers」（免費 PDF，2026-06 照 landscape 之 Statistics LibreTexts 鏡像）——用車比雪夫證弱大數法則的標準教材版，跟本章同一條路但更形式化；想看「工程師的嚴謹」升級成「數學家的嚴謹」長什麼樣，讀這一章。強大數法則的證明也在進階教材裡，本書略過的那塊在這裡補。\n- Miller & Sanjurjo (2018), *Surprised by the Hot Hand Fallacy? A Truth in the Law of Small Numbers*, Econometrica（2026-06 已查證）——熱手 2018 翻案的原始論文。讀它的核心論證「在有限序列裡，連續命中後再命中的經驗頻率即使在獨立假設下也系統性偏低」——這個選擇偏差本身就是一個獨立的驚嘆點，而且它直接打臉了三十年的「定論」。\n- 蒙地卡羅 1913 輪盤連開 26 次黑的軼事（Wikipedia「Gambler's fallacy」，2026-06 已查證）——史上最貴的賭徒謬誤現場教學。讀它順便看看「連 26 次黑」的機率有多小（約六千六百萬分之一）——但這不代表第 27 把紅的機率有任何改變，這正是謬誤的核心。\n"}, {"id": "ch14-central-limit-theorem", "file": "ch14-central-limit-theorem.md", "group": "Part IV — 兩大定理（秩序從混沌浮現）", "title": "ch14 — 中央極限定理：鐘形為何無所不在", "md": "# ch14 — 中央極限定理：鐘形為何無所不在\n\n> **本章解決什麼問題**：ch13 的大數法則告訴你，擲很多次硬幣，正面**比例**會收斂到一個點（0.5）。但它只回答了「平均跑去哪」，沒回答「在那個點附近，它到底怎麼抖」。這一章補上那個缺口，而且答案大到離譜：不管你一開始那個隨機量長什麼樣——均勻的、歪斜的、雙峰的、亂七八糟的——只要你把一大堆獨立的這種量**加起來或平均起來**，結果幾乎**永遠**長成同一個形狀：鐘形（常態分布）。這就是中央極限定理（central limit theorem, CLT），是 Part IV「秩序從混沌浮現」的最高潮，也是我認為整本書最該讓你說出「人類竟然想得出這個」的一頁。它還順手解釋了一件你一直沒問的事：為什麼身高、測量誤差、你儀表板上一堆「平均過的」指標，全都是鐘形。鐘形本身（怎麼讀、怎麼查、面積怎麼算）留到 ch15；這一章只回答一個問題——**它為什麼無所不在**。\n\n## 從你已知的出發\n\n你其實一直在依賴 CLT，只是沒人告訴你那叫 CLT。\n\n你做負載測試，跑同一條 endpoint 一萬次，量延遲。單一次請求的延遲分布很醜——P50 很漂亮、P99 拖一條長尾、偶爾一根毛刺。它一點都不像鐘形。但你不會盯著單一次看，你會去看「**平均延遲**」這個數字，而且你心裡有個篤定的直覺：跑得越多次，那個平均值越穩、越可信。你甚至會說「再多跑幾輪，把雜訊平掉」。\n\n「把雜訊平掉」——這四個字就是 CLT。你在賭的是：很多次量測的平均，會緊緊地圍著真值抖動，而且那個抖動有個漂亮、可預測的形狀。CLT 告訴你那個形狀是鐘形，而且抖動的寬度是 σ/√n（ch09 那條標準誤，等一下會整條回收）。你做 A/B test，問「這個 +1.2% 的轉換率提升是真的還是雜訊」，背後的檢定力分析、信賴區間，全部建在「樣本平均近似常態」這個地基上。你跑蒙地卡羅去估一個算不出來的積分（比方某個容量規劃的尾端機率），你估出來的那個數字會收斂、而且收斂的誤差服從常態——這也是 CLT。\n\n換句話說：你早就相信「個別事件很亂，但平均很乖」。CLT 是這個信念的精確版本。它不只說「平均會乖」（那是 ch13 的大數法則），它還告訴你**乖成什麼形狀**——而且那個形狀，跟你原本那堆很亂的個別事件長相**完全無關**。這是本章的震撼點，先擺在這裡，我們慢慢逼近它。\n\n## 大數法則只說了一半\n\n先把 ch13 的結論擺回桌上，因為 CLT 是它的續集。\n\n大數法則說：n 個獨立同分布（iid）的隨機量 X₁, X₂, …, Xₙ，每個的平均是 μ，那它們的樣本平均\n\n```text\nX̄ₙ = (X₁ + X₂ + ⋯ + Xₙ) / n\n```\n\n會在 n→∞ 時收斂到 μ。脊椎硬幣的版本你已經很熟了：擲 n 次，正面比例 → 0.5。\n\n但 ch13 我們也算過另一件事，那件事才是反直覺的：雖然**比例**收斂到 0.5，「正面數減反面數」的絕對差卻不收斂——它的典型量級反而隨 √n 變大（n=10⁴ 時大約 ±100）。同一組數據，兩種讀法：除以 n 看，收斂；不除以 n 看，發散。\n\n現在停在這裡，問一個 ch13 故意沒回答的問題：**X̄ₙ 收斂到 μ，沒錯，但對於一個有限的 n，X̄ₙ 不會剛好等於 μ，它會在 μ 附近抖。那個抖動，長什麼形狀？**\n\n這不是吹毛求疵。你做 A/B test 永遠是有限樣本。你量延遲永遠跑有限次。你估出來的 X̄ₙ 永遠帶著誤差。那個誤差的分布形狀，決定了你能不能說「我有 95% 把握真值在這個區間裡」。大數法則保證誤差**會縮小**，但完全沒說誤差**長什麼樣**。\n\nCLT 就是來回答這個的。而它的答案普適到讓人發毛。\n\n## CLT 的陳述：抖動永遠是鐘形\n\n把那個誤差放大來看。X̄ₙ 跟 μ 的差距，量級是 σ/√n（ch09 的標準誤）。要看清形狀，我們得把它「放大到標準尺寸」——除以它自己的標準差，這個動作叫**標準化（standardize）**。定義：\n\n```text\n       X̄ₙ − μ          (X₁+⋯+Xₙ) − nμ\nZₙ = ──────────  =  ────────────────────\n        σ/√n                σ√n\n```\n\n左邊那條是「樣本平均離真值有幾個標準誤」，右邊那條是同一件事換成「和」的寫法（分子是和減掉它的期望 nμ，分母是和的標準差 √n·σ）。兩條是同一個 Zₙ，你愛用哪個視角都行。\n\n**中央極限定理**說：只要 X₁, …, Xₙ 是 iid、而且**變異數 σ² 有限**（這個前提先記著，等一下它會出大事），那麼當 n→∞，\n\n```text\nZₙ  →  N(0, 1)        ← 標準常態分布\n```\n\n不管 Xᵢ 原本是什麼分布。\n\n把這句話翻成不那麼嚇人的版本，有三種等價說法，挑你順眼的記：\n\n```text\n和    (X₁+⋯+Xₙ)  ≈  N(nμ,  nσ²)        ← 期望 nμ、變異 nσ²\n平均       X̄ₙ      ≈  N(μ,   σ²/n)       ← 期望 μ、變異縮 n 倍\n標準化      Zₙ      ≈  N(0,   1)          ← 搬到同一把尺\n```\n\n中間那行你要盯久一點：**X̄ₙ ≈ N(μ, σ²/n)**。它一句話講完了三件事：\n\n1. 樣本平均的中心是 μ（這是大數法則，沒新意）。\n2. 樣本平均的變異數是 σ²/n，所以標準差是 σ/√n（這是 ch09 的標準誤，整條回收了）。\n3. **而且它的形狀是常態**——這是全新的、ch13 給不出來的資訊。\n\n第 3 點是 CLT 真正的肉。前兩點只告訴你「中心在哪、抖多大」，第 3 點告訴你「抖成什麼樣」，而那個樣子是固定的、是鐘形、是普適的。\n\n我得很誠實地標一下嚴謹度：**這條定理本書不證**。嚴格證明要用特徵函數（characteristic function，本質是分布的傅立葉轉換），Lyapunov 1901 用特徵函數、Lindeberg 1920–22 用另一條卷積路線各自給出現代證明（指向延伸閱讀）。我不會假裝幾行就能推給你看——那是騙你。但「為什麼會是這樣」的**直覺**，我可以給，而且那個直覺本身就夠震撼了。\n\n## 為什麼普適：細節被抹平，只剩二階資訊\n\n這一節是本章的心臟。我不證 CLT，但我要讓你「看見」它為什麼非鐘形不可。\n\n想像你把很多個獨立的小隨機量加起來。每一個 Xᵢ 都帶著自己完整的個性：它可能歪向左、可能有兩個峰、可能在某幾個值特別愛出現。這些個性，在「分布」這個層次上，是一堆很細的資訊。\n\n關鍵的洞見是：**當你把它們加起來，這些細節會互相抹掉，只有最粗的兩個資訊活得下來——每個量的平均，和每個量的變異數。**\n\n為什麼？粗略地講（這是直覺版，不是證明）：一個分布的完整資訊可以拆成一層一層的「動差（moment）」——一階是平均（中心在哪），二階是變異數（散多開），三階是偏度（歪不歪），四階是峰度（尾巴肥不肥），更高階是更細的形狀。當你把 n 個獨立的量加起來再標準化，每往上一階，那一層的貢獻就被 √n 的某個次方壓得更扁。一階被中心化吃掉（減 nμ），二階被標準化定住（除以 √n·σ，剛好把變異數釘成 1），而**三階以上每一層都隨 n 變大而趨近 0**——偏度、峰度、所有歪七扭八的細節，全部被稀釋掉了。\n\n最後活下來的，是一個平均 0、變異數 1、其他細節全平掉的分布。而「平均 0、變異數 1、最大亂度、沒有任何多餘結構」的那個分布，數學上**唯一**就是標準常態 N(0,1)。鐘形不是某種巧合的形狀，它是「把細節全抹掉之後剩下的那個東西」。\n\n我換一個你更有體感的講法。把每個獨立小擾動想成一張很有個性的臉。一張臉很好認。但你把一萬張隨機的臉**疊在一起平均**（像那種「平均臉」的合成照），個別的痣、疤、歪鼻子全部互相抵銷，最後浮現出來的是一張光滑、對稱、沒有特徵的「臉的形狀」。CLT 說的就是這件事：**加總是一台抹除細節的機器，而它抹完之後永遠剩下同一張臉，那張臉叫鐘形。**\n\n這就是為什麼普適。它不在乎你原本的分布長相，因為它要做的第一件事就是把那個長相抹掉。你餵它均勻分布，它抹掉；你餵它歪斜分布，它抹掉；你餵它雙峰怪物，它也抹掉。出來的永遠是鐘形。\n\n> 這裡值得你停十分鐘。CLT 的震撼不在「很多東西是鐘形」這個觀察——那是 19 世紀就有人注意到的。震撼在於它**解釋了為什麼**：鐘形之所以無所不在，正是因為自然界、量測、你的系統裡，太多東西本質上是「一大堆獨立小因素相加」，而相加這個動作會強制收斂到鐘形，完全不管那些小因素自己是什麼德性。普適性不是因為大家剛好都像，而是因為「加起來」這台機器把不像的全部碾成一樣。\n\n## 骰子實驗：親眼看鐘形浮現\n\n直覺講完了，現在拿骰子來把它做出來。我們不寫程式（這本書不寫），我們手算、手畫。看著鐘形從一個平平的均勻分布裡，一顆骰子一顆骰子地長出來。\n\n### 一顆骰子：完全沒有鐘形\n\n一顆公正骰子，點數 1 到 6，每個機率都是 1/6。這是均勻分布——平的，平到不能再平。完全沒有任何「中間比較高」的意思。\n\n```text\n 1 │████████      1/6 ≈ 0.167\n 2 │████████      1/6\n 3 │████████      1/6\n 4 │████████      1/6\n 5 │████████      1/6\n 6 │████████      1/6\n   └──────────\n```\n\n記住這個形狀：方方正正的一塊。我們要從這塊磚頭，變出鐘形。順手記一下這顆骰子的兩個數（ch08、ch09 算過）：平均 μ = (1+2+3+4+5+6)/6 = 3.5，變異數 σ² = 35/12 ≈ 2.917。\n\n### 兩顆骰子：三角形冒出來了\n\n兩顆骰子的點數**和**，從 2 到 12。樣本空間有 6×6 = 36 種等可能結果。我手數每個和有幾種湊法（這是 ch07 算過的「點數和」隨機變數）：\n\n```text\n和    湊法                                          種數   機率\n──────────────────────────────────────────────────────────────\n 2    (1,1)                                          1     1/36\n 3    (1,2)(2,1)                                      2     2/36\n 4    (1,3)(2,2)(3,1)                                 3     3/36\n 5    (1,4)(2,3)(3,2)(4,1)                            4     4/36\n 6    (1,5)(2,4)(3,3)(4,2)(5,1)                       5     5/36\n 7    (1,6)(2,5)(3,4)(4,3)(5,2)(6,1)                  6     6/36   ← 最高\n 8    (2,6)(3,5)(4,4)(5,3)(6,2)                       5     5/36\n 9    (3,6)(4,5)(5,4)(6,3)                            4     4/36\n10    (4,6)(5,5)(6,4)                                 3     3/36\n11    (5,6)(6,5)                                      2     2/36\n12    (6,6)                                           1     1/36\n──────────────────────────────────────────────────────────────\n                                                  合計 36   36/36 ✓\n```\n\n交叉驗算：1+2+3+4+5+6+5+4+3+2+1 = 36 ✓。畫成直方圖：\n\n```text\n 2 │██                  1/36\n 3 │████                2/36\n 4 │██████              3/36\n 5 │████████            4/36\n 6 │██████████          5/36\n 7 │████████████        6/36   ← 正中央，最高\n 8 │██████████          5/36\n 9 │████████            4/36\n10 │██████              3/36\n11 │████                2/36\n12 │██                  1/36\n   └────────────────────\n```\n\n兩顆就出現了一座三角形山。為什麼 7 最高？因為湊出 7 的方法最多（六種），湊出 2 或 12 的方法最少（各一種，只能是雙 1 或雙 6）。這正是上一節「抹平」直覺的最小可見版本：極端值要靠**全部一起極端**（兩顆都 1、兩顆都 6）才湊得出來，機率小；中間值有**很多種互相補償的湊法**（大的配小的），機率大。**加總天然偏好中間**——這就是鐘形的種子。把它連到 CLT：你才加了兩個均勻分布，平坦的磚頭就塌成了三角形。\n\n### 五顆骰子：三角形的肩膀變圓了\n\n五顆骰子的和從 5 到 30，要手數每個和的湊法就太累了（6⁵ = 7776 種），我不騙你說我心算得出每一格。但形狀我可以負責任地描述，而且它一定是這樣（這是 CLT 在保證的）：\n\n- 中心在 5 × 3.5 = 17.5，最高峰落在 17 和 18 之間。\n- 三角形那兩條筆直的斜邊，**開始彎了**——變成往兩邊滑下去的曲線，肩膀變圓、腰身變窄。\n- 兩端（和=5 或 30，要五顆全 1 或全 6）的機率小到幾乎貼地（各 1/7776）。\n\n```text\n（示意，看趨勢不看精確比例）\n        ▁▃▅▇█▇▅▃▁\n      ▁▃█████████▃▁\n   ▁▂▅███████████████▅▂▁\n  └────────────┬────────────\n   5      …    17.5    …    30\n```\n\n三角形的直邊，被「加總抹平」磨成了曲線。它已經很像鐘形了。\n\n### 三十顆骰子：肉眼分不出跟鐘形的差別\n\n三十顆。和從 30 到 180，中心在 30 × 3.5 = 105。這時候畫出來的東西，跟一條真正的常態曲線疊在一起，**肉眼幾乎分不出來**。\n\n```text\n（三十顆，已經是教科書等級的鐘形）\n              ▁▂▄▆███▆▄▂▁\n          ▁▂▄████████████▄▂▁\n      ▁▂▄▆██████████████████▆▄▂▁\n   ▁▂▄██████████████████████████▄▂▁\n  └──────────────────┬──────────────────\n   30        …       105       …       180\n```\n\n從一顆骰子那塊**完全平坦**的磚頭，到三十顆這條**標準鐘形**——中間什麼魔法都沒有，只是一直加、一直加。每加一顆，三角的稜角就被磨圓一點，到三十顆，稜角全沒了，只剩光滑的鐘。\n\n這就是 CLT 的可視化證據。而且這裡有個你該抓住的細節：**骰子的原始分布是均勻的（平的），但加總之後變鐘形**。鐘形不是「藏在骰子裡」的——一顆骰子身上找不到任何鐘形的影子。鐘形是「加總這個動作生出來的」。你換成任何別的東西來加（只要變異數有限），都會跑出同一條鐘。\n\n## 歷史巧合：史上第一個 CLT，就是這枚硬幣\n\n現在來收一個全書最漂亮的伏筆。\n\nCLT 是 ch14，硬幣是 ch01 就登場的脊椎。你大概以為它們是兩條獨立的線，到這章才剛好碰面。不是的——**歷史上第一個被寫下來的中央極限定理，本身就是在算硬幣。**這不是我為了敘事硬湊的巧合，是真的史實。\n\n1733 年 11 月 12 日，棣美弗（Abraham de Moivre）私下在朋友圈傳閱一份七頁的拉丁文小冊，標題長得要命：《Approximatio ad Summam Terminorum Binomii (a+b)ⁿ in Seriem expansi》——「二項式 (a+b)ⁿ 展開後各項之和的近似」（2026-06，多源確認）。翻成白話：他在算二項分布的機率和。再翻白話：**他在算「擲 n 次硬幣，正面數落在某個範圍內的機率」。**這份小冊後來收進 1738 年《The Doctrine of Chances》第二版（照 landscape）。\n\n他遇到的麻煩很實際。要算「100 次擲幣，正面數介於 45 到 55 之間」的精確機率，得把 C(100,45)/2¹⁰⁰ 一路加到 C(100,55)/2¹⁰⁰，那是十一個天文數字的組合數相加。在沒有計算機的 18 世紀，這是地獄。棣美弗想找一條近似的捷徑——一條**連續曲線**，讓他直接算曲線下的面積、不用一項一項加。\n\n他靠著好友史特林（James Stirling）的階乘近似公式（就是 Stirling 公式），推出了那條曲線。而那條曲線裡冒出了一個怪常數：他寫說史特林告訴他，那個歸一化常數是「半徑為 1 的圓周長的平方根」——也就是 √(2π)（2026-06，多源確認）。**這是常態分布第一次在人類歷史上被寫下來**，而它出生的場合，是一個賭徒在算擲硬幣。\n\n把這件事用脊椎硬幣的語言講清楚，就是 CLT 的硬幣版（這叫 de Moivre–Laplace 定理，照 landscape）：\n\n```text\nn 擲公正硬幣，正面數 X ~ Binomial(n, 1/2)\n   E[X]   = n/2\n   Var(X) = n/4          ← ch11 算過：n·p(1−p) = n·(1/2)(1/2)\n   SD(X)  = √n / 2\n\n標準化：    X − n/2\n        Z = ───────  →  N(0, 1)      當 n → ∞\n            √n / 2\n```\n\n**這是 ch01 那枚硬幣。**ch11 你把它寫成二項分布，看到 Binomial(10,1/2) 的直方圖已經有鐘形的雛形。現在你知道那個雛形是怎麼回事了：二項分布就是 n 個獨立伯努利（每擲就是一個 ±硬幣）相加，而 CLT 說「加很多個獨立的東西 → 常態」，硬幣只是其中最簡單的一種東西。脊椎硬幣的第幾層？這是它的第五層讀法（ch23 會總對帳）：**標準化之後的硬幣和，趨向常態，而這是人類算出的第一個 CLT。**\n\n有件事我要替棣美弗講公道話，也順便標一下嚴謹度。當時他**沒意識到**自己證的是一條普世定理。他眼中那只是「二項分布的一個方便近似」——一個算硬幣的計算技巧。他不知道這個鐘形會在均勻骰子、在身高、在量測誤差裡一遍遍出現。把它推廣到一般分布（不只是硬幣）的，是八十年後的拉普拉斯（Laplace）1812 年的《機率的分析理論》（照 landscape）。而真正用現代嚴謹工具（特徵函數）把它釘死成今天這條普適定理的，要等到 1901 年的 Lyapunov 跟 1920 年代的 Lindeberg（2026-06，多源確認）。**從一份算硬幣的七頁小冊，到一條宇宙級的普適定理，人類走了快兩百年。**這也是為什麼它叫「中央」極限定理——它站在整個機率論的正中央。\n\n## 為什麼身高、誤差、平均都是鐘形\n\n有了「加總會抹平成鐘形」這把鑰匙，一堆你習以為常、從沒問過為什麼的事情突然全解開了。\n\n**為什麼身高是鐘形？**因為一個人的身高不是由單一基因決定的，是**幾百個基因，加上營養、睡眠、童年健康、荷爾蒙……一大堆獨立的小因素相加**的結果。每個因素只貢獻一點點正負偏移。一大堆獨立小擾動相加——這正是 CLT 的設定。所以身高是鐘形。體重、血壓、鞋碼，同理。\n\n**為什麼量測誤差是鐘形？**你用尺量一個東西，誤差來自哪裡？尺的熱脹冷縮一點、你的手抖一點、視角偏一點、讀數估一點、桌子震一點……**一大堆獨立的小誤差源相加**。所以總誤差是鐘形——這就是為什麼高斯（Gauss）當年研究天文觀測誤差時，會自然地用上常態分布，常態又叫「高斯分布」「誤差曲線」就是這麼來的。歷史上的「基本誤差假說」（誤差是大量微小獨立誤差之和）說的正是這件事。\n\n**為什麼你儀表板上那些「平均過」的指標是鐘形？**因為平均就是「加起來除以 n」。你把一萬次請求的延遲平均起來——不管單次延遲多醜多歪多長尾（**前提：尾巴別太誇張，下一節會講**），那個平均值會服從常態，中心是真實平均延遲、寬度是 σ/√n。所以你才能對「平均延遲」這個數字做信賴區間、做假設檢定。它乖，是因為它是個平均，而平均被 CLT 馴服了。\n\n注意這裡的分工，它很重要、也很容易講混：**單一次的延遲不是鐘形**（它是醜的、長尾的）。**很多次延遲的平均才是鐘形**。CLT 從來沒說「原始資料是鐘形」，它說的是「原始資料的**和或平均**是鐘形」。混淆這兩個，是用錯 CLT 最常見的方式，下面「直覺的陷阱」會專門講。\n\n## CLT 會失效：當尾巴太肥\n\n我一直在那個前提上打星號：**變異數 σ² 必須有限**。現在來看當它不成立時，CLT 會怎麼當機。這直接回收 ch12 的長尾警告。\n\nch12 講過冪律（power law）和肥尾分布——首富走進酒吧、收入分布、檔案大小，那種「平均會說謊」的世界。有些重尾分布尾巴肥到一個程度，連**變異數都是無限大**（積分 ∫x²f(x)dx 發散）。最有名的例子是柯西分布（Cauchy distribution），它甚至連平均都沒有；還有冪律指數 α ≤ 2 的帕雷托（Pareto）分布（2026-06，多源確認）。\n\n對這些分布，CLT **不適用**。你把一堆柯西分布的樣本平均起來，那個平均**不會**收斂成又窄又乖的鐘形。事實上柯西分布有個惡名昭彰的性質：n 個柯西的平均，分布跟**單一個**柯西一模一樣——你平均了一百萬次，得到的東西跟只取一個樣本一樣亂。「多取樣本就能降噪」這個你深信不疑的工程信念，在這裡**完全失效**。樣本平均永遠不會穩下來，不管 n 多大（2026-06，多源確認）。\n\n那加起來會變成什麼？不會是常態，會收斂到所謂的**穩定分布（stable distribution）**——常態只是穩定分布家族裡「變異數有限」那個特例（α=2）。其他成員都是重尾的、沒有有限變異數的（這叫廣義中央極限定理，generalized CLT，本書只點到，指向延伸）。\n\n把這件事翻成你的工程語言，因為它真的會咬你：\n\n```text\n你以為（天真用 CLT）：\n  平均很多次量測 → 誤差 ~ σ/√n → 多跑幾次就準\n你忽略的前提：\n  這只在「變異數有限」時成立\n尾巴太肥時（重尾延遲、雪崩式重試、相關性故障）：\n  σ 可能爆大甚至無限，σ/√n 那條公式失去意義\n  「再多跑幾次把雜訊平掉」是一張空頭支票\n```\n\n具體一點：如果你的延遲分布有極端肥的尾巴（偶爾一個請求卡 30 秒，那種拖累整批的離群值），你的「樣本平均延遲」可能**永遠被某一個還沒出現的超級離群值主宰**。你跑了一萬次覺得平均穩了，第一萬零一次來個 GC 暫停 60 秒，平均就跳了。這不是你樣本不夠多，這是**這個分布的尾巴讓 CLT 的承諾不成立**。\n\n所以 CLT 不是無條件的魔法。它是一份合約，合約上印著小字：**變異數要有限**。大部分自然的、加性的、不太極端的東西都滿足這條，所以 CLT 看起來無所不在。但你做系統的人天天跟肥尾打交道（P99、雪崩、相關性故障），你比一般人更該記得這行小字。哪一天你的「平均」怎麼樣都穩不下來，第一個該懷疑的就是：尾巴是不是肥到讓 CLT 失效了。\n\n## 直覺的陷阱\n\nCLT 是被誤用得最兇的定理之一，因為它的結論太好用，好用到大家忘了它在說什麼、不在說什麼。下面這幾個坑，每一個我都看過工程師（包括我自己）掉進去。\n\n| 誤解 | 它會在哪一步把你帶溝裡 | 正確版 |\n|---|---|---|\n| 「CLT 說原始資料會變成鐘形」 | 你拿一批延遲畫直方圖，發現它長尾、不是鐘形，於是慌了以為哪裡錯了；或反過來，你假設原始延遲是常態去做 3-sigma 告警，結果尾巴一堆「不該出現」的事件天天出現 | CLT 講的是**和／平均**的分布，不是原始資料。原始延遲可以醜得很，它的**平均**才趨向常態 |\n| 「n 夠大就一定能用 CLT」 | 你的分布是重尾／無限變異（柯西、α≤2 冪律），你以為加大 n 就會收斂成鐘形，結果平均怎麼都不穩 | CLT 的前提是**變異數有限**。尾巴太肥時，加大 n 救不了你，極限是穩定分布不是常態 |\n| 「CLT 跟大數法則是同一件事」 | 你把「平均會收斂」（LLN）跟「誤差是鐘形」（CLT）混為一談，結果講不清楚信賴區間為什麼長那樣 | LLN 說平均**跑去哪**（收斂到 μ）；CLT 說平均**怎麼抖**（誤差 ~ N(0, σ²/n)）。前者管中心，後者管形狀 |\n| 「樣本平均是鐘形，所以樣本本身可以當常態處理」 | 你對長尾資料硬套常態的尾端機率（68-95-99.7），嚴重低估極端事件——這是金融風控爆過的雷 | 鐘形的是估計量（平均、比例），不是個體。個體的尾端風險要看個體真實分布，常態會騙你它的尾巴很瘦 |\n| 「n=30 是 CLT 生效的神奇門檻」 | 你背了個「n>30 就能用常態」的口訣，套在一個極度歪斜的分布上，30 個樣本根本還沒收斂 | 沒有萬用門檻。原分布越接近對稱，n 很小就夠（骰子兩三顆就有樣子）；越歪斜、尾巴越肥，需要的 n 越大。「30」只是某些教科書的粗略慣例，不是定理 |\n\n**怎麼自我察覺你其實沒懂？**有一個徵兆很準：如果你沒辦法一口氣講清楚「**什麼東西**趨向常態」——是原始資料、還是它的和、還是它的平均、還是標準化後的它——那你其實還在霧裡。CLT 全部的精髓就在這個「什麼東西」上。它**不是**「萬物皆鐘形」，它是「**獨立同分布、有限變異的隨機量，它們的標準化和**，趨向鐘形」。每個修飾語都是合約條款，少一條，合約就可能不成立。能把這串修飾語準確唸出來，你才算真的懂 CLT，而不是只會用它。\n\n## 紙上推演\n\n拿紙筆。這幾題不算數字算到死，重點是把 CLT 的「什麼東西趨向常態」這件事，從口訣變成你能講給人聽的東西。\n\n### 推演題一：兩顆骰子的三角形與「抹平」直覺 **[15 分鐘]** ★★\n\n不查表，回答：（a）兩顆骰子和為 7 的機率為什麼比和為 2 高，用「湊法數」講；（b）把這個「中間湊法多、極端湊法少」的現象，連到 CLT 的「加總抹平細節」直覺，用你自己的話講清楚為什麼**加總天然偏好中間**；（c）一顆骰子是平的（均勻），兩顆就出現三角形——這告訴你鐘形是「藏在骰子裡」還是「加總生出來的」？\n\n#### 推演解答\n\n（a）和為 7 有六種湊法 (1,6)(2,5)(3,4)(4,3)(5,2)(6,1)，機率 6/36 = 1/6；和為 2 只有一種 (1,1)，機率 1/36。差了六倍，純粹是因為湊法數差六倍。\n\n（b）極端的和（2 或 12）需要**兩顆骰子同時走極端**——兩顆都最小或都最大，這種「協同極端」很難，只有一種湊法。中間的和（7）可以用**很多種互相補償的方式**達成：一大配一小、一中配一中，東邊多一點西邊就少一點，補償的組合很多。加總的本質就是「各分量的偏差互相抵銷」，抵銷得越乾淨（落在中間）的方式越多，所以機率往中間堆。這正是「抹平」：個別的偏移在加總時互相吃掉，留下中間鼓起來的鐘形。\n\n（c）加總生出來的。一顆骰子身上找不到任何鐘形的影子（它是完全平的均勻分布）。鐘形是「把兩個（或更多）獨立均勻量相加」這個**動作**製造出來的。這是 CLT 最反直覺的點：你不需要原料像鐘形，加總這台機器自己會生出鐘形。\n\n### 推演題二：什麼東西趨向常態？把合約條款唸出來 **[15 分鐘]** ★★★\n\n不准看上面的表。用一句話精確說出 CLT 主張「**什麼東西**趨向常態」，而且要把所有前提（合約條款）都唸進去。然後針對下面三個說法，各判斷對錯並說明：（a)「我量了一千次延遲，所以這一千個延遲值是常態分布的」；（b)「柯西分布的樣本數開到一百萬，它的樣本平均就會是漂亮的鐘形」；（c)「CLT 就是大數法則的另一種說法」。\n\n#### 推演解答\n\n精確版：**一組獨立同分布（iid）、且變異數有限的隨機量，把它們加起來（或平均）再標準化，當數量 n→∞ 時，這個標準化後的量趨向標準常態 N(0,1)。**條款有四個：獨立、同分布、變異數有限、講的是「和／平均的標準化」而非原始量。\n\n（a）**錯**。CLT 講的是這一千個值的**平均**趨向常態，不是這一千個值本身。原始延遲可以是長尾、不對稱、完全不像鐘形。混淆「原始資料」與「它的平均」是頭號錯誤。\n\n（b）**錯**。柯西分布**變異數無限**（連平均都沒有），違反「變異數有限」這條。它的樣本平均跟單一個樣本一樣亂，n 開到無限也不收斂成鐘形（極限是柯西本身，屬穩定分布家族但不是常態）。加大 n 救不了違反前提的情況。\n\n（c）**錯**。大數法則說平均**收斂到 μ**（管中心跑去哪）；CLT 說平均**在 μ 附近怎麼抖**（管形狀，是 N(μ, σ²/n)）。LLN 給不出形狀，CLT 才給。兩者是接力，不是同一棒。\n\n### 推演題三：脊椎硬幣 n=100，「正面數介於 45 與 55」 **[20 分鐘]** ★★\n\n擲 100 次公正硬幣。（a）寫出正面數 X 的精確分布，以及它的期望、變異數、標準差；（b）用 CLT 的常態近似，把「45 ≤ X ≤ 55」翻成「離中心幾個標準差」，並用 68-95-99.7 法則估出近似機率；（c）說一句話：這個近似為什麼合理（它在用哪條定理）。精確查表留給 ch15，這裡只要會把問題化成「幾個 σ」。\n\n#### 推演解答\n\n（a）X ~ Binomial(100, 1/2)。期望 E[X] = np = 100 × 1/2 = **50**；變異數 Var(X) = np(1−p) = 100 × 1/2 × 1/2 = **25**；標準差 SD = √25 = **5**。\n\n（b）CLT 近似：X ≈ N(50, 25)，也就是中心 50、標準差 5 的鐘形。把區間端點換算成「幾個 σ」：\n\n```text\n下界 45：  z = (45 − 50) / 5 = −1.0      ← 中心左邊 1 個 σ\n上界 55：  z = (55 − 50) / 5 = +1.0      ← 中心右邊 1 個 σ\n```\n\n「45 ≤ X ≤ 55」剛好是「中心 ±1 個標準差」。由 68-95-99.7 法則，±1σ 內的機率約 **68%**（精確值 68.27%，照 landscape）。所以擲 100 次，正面數落在 45 到 55 之間的機率大約 68%。\n\n（一個誠實的小註腳：因為 X 是離散的整數、常態是連續的，嚴格算要做「連續性校正」——把區間端點挪到 44.5 與 55.5，z 變成 ±1.1，機率約 73%。這個細節跟精確查表都留 ch15。這裡的重點是學會把「45 到 55」一眼看成「±1σ」。）\n\n（c）合理是因為它在用 CLT（具體是 de Moivre–Laplace 定理，史上第一個 CLT）：100 次擲幣的正面數，是 100 個獨立伯努利相加，加很多個獨立的量 → 趨向常態，所以可以用 N(50,25) 這條鐘形來近似那一串組合數的和。棣美弗 1733 年想避開的「把十一個天文數字組合數相加」的地獄，就是用這條近似躲掉的。\n\n## 自我檢核\n\n口頭自答。講得出來才算過，講不清楚就是還沒懂。\n\n1. CLT 跟大數法則分別回答了「樣本平均」的哪一個問題？（提示：一個管「跑去哪」，一個管「怎麼抖」。）為什麼說 CLT 是 LLN 的續集？\n2. CLT 主張「什麼東西」趨向常態？把四個合約條款（iid、變異數有限、和／平均、標準化）一口氣唸出來。\n3. 用骰子從一顆到三十顆，向人解釋「鐘形是加總生出來的，不是藏在原料裡的」。為什麼極端的和那麼罕見、中間的和那麼常見？\n4. 為什麼身高、量測誤差是鐘形，但**單一次**請求延遲不是？CLT 在這裡的分工是什麼？\n5. 史上第一個 CLT 是誰、哪一年、在算什麼？為什麼說「這就是 ch01 那枚硬幣」？棣美弗當年知道自己證的是一條普世定理嗎？\n6. CLT 什麼時候會失效？舉一個變異數無限的分布，說明「多取樣本就能降噪」為什麼在它身上是空頭支票。這跟你工作裡的肥尾延遲有什麼關係？\n7. 「我跑了一萬次，所以這一萬個延遲值服從常態」——這句話錯在哪？錯得有多常見？\n8.（連回 ch09）CLT 裡那條 σ/√n 是什麼？它跟你「要把誤差砍半得跑四倍次數」的工程經驗是同一回事嗎？\n\n## 延伸閱讀\n\n- **3Blue1Brown,「But what is the Central Limit Theorem?」（YouTube，2023）**——如果這一章你只追一個東西，追這支。它用動畫把「不同原始分布加起來都收斂到同一條鐘」做給你看，跟本章骰子實驗是同一個直覺的動態版，看完「抹平」這件事會徹底刻進腦子（2026-06，建議搜尋頻道確認連結）。\n- **John D. Cook,「How the central limit theorem began」（johndcook.com，2010）**——一篇短文，講棣美弗 1733 怎麼從算硬幣意外撞出常態分布。本章歷史段的主要依據之一，想看一手脈絡讀這篇。\n- **John D. Cook,「The generalized central limit theorem」（johndcook.com，2009）**——當變異數無限、CLT 失效時會發生什麼：和收斂到穩定分布而非常態。想把「CLT 的失效處」這節再往下挖一層的人讀這篇。\n- **Hans Fischer,《A History of the Central Limit Theorem: From Classical to Modern Probability Theory》（Springer，2011）**——從棣美弗到 Lyapunov、Lindeberg 的完整學術史。想知道「為什麼從一份七頁小冊到嚴格定理走了快兩百年」的人，這是權威來源（偏學術，當參考不當入門）。\n- **《馴服無限》微積分（書架鄰書）ch15「機率即面積」**——鐘形怎麼讀、曲線下面積怎麼算、為什麼是 e^(−x²/2)，本章刻意沒展開的「常態本身」，下一章 ch15 接手、運算深度指向那本。\n- **本書 ch15「常態之美與機率即面積」**——緊接著的下一章。本章把「為什麼是鐘形」講完了，ch15 教你「鐘形怎麼用」：標準化、z 分數、68-95-99.7、查尾端機率。推演題三留的那個「精確查表」就在那裡兌現。\n"}, {"id": "ch15-normal-distribution", "file": "ch15-normal-distribution.md", "group": "Part IV — 兩大定理（秩序從混沌浮現）", "title": "ch15 — 常態之美與機率即面積", "md": "# ch15 — 常態之美與機率即面積\n\n> **本章解決什麼問題**：ch14 給了你一個宇宙級的結論——大量獨立隨機量的「和／平均」總是趨向同一條鐘形曲線，跟原料長相無關。但那一章只回答了「為什麼是鐘形」，沒回答「鐘形到底怎麼用」。這一章把那條曲線從一個哲學奇蹟，變成一把你能拿起來量東西的尺。你會學到常態分布的工作語言：標準化（把任何常態搬到同一把尺上）、z 分數、68-95-99.7 法則、還有那個在每篇論文裡陰魂不散的數字 **1.96**。更重要的是，這一章把一句話釘進你的骨頭裡——**機率就是面積**：連續分布的機率是曲線下的積分，你查 P99 其實就是在反查一條累積曲線。這是 Part IV「秩序從混沌浮現」的收尾（ch13 大數法則、ch14 中央極限、ch15 常態之美），收完它，你就帶著一把校準好的尺，走進 Part V 的統計推論。\n\n## 從你已知的出發\n\n你其實已經會用常態分布了，只是沒人告訴你那叫常態分布。\n\n你看 dashboard 看了六年。某條延遲曲線，平時穩穩貼在某個值附近，偶爾跳一下。你心裡有一條看不見的「正常範圍」——在這條範圍裡的波動你連眉毛都不抬，超出去你才開始緊張。你判斷「這個尖峰算不算異常」用的不是絕對值，是**它離平常有多遠、遠到幾個身位**。這個「幾個身位」就是標準差，而你用「離中心幾個標準差」來判斷異常，就是這一章要給你語言的那套直覺。\n\n更具體一點，三個你天天在做、其實全是這一章的東西：\n\n第一，**P99**。你查一條延遲曲線的 P99，意思是「99% 的請求比這個值快、只有 1% 比它慢」。你有沒有想過你到底在查什麼？你在反查一條**累積曲線**：給定一個比例（99%），找出對應的門檻值。這條曲線在數學上叫 CDF（累積分布函數），而「機率＝累積曲線上的一段」這件事，正是本章的主梁。等下你會看到，P99 跟「標準常態的 99 百分位點」是同一個動作，只是換了把尺。\n\n第二，**3-sigma 告警**。SRE 圈子裡有個土法煉鋼的告警規則：算出指標的平均和標準差，超過平均 ± 3 個標準差就告警。為什麼是 3？因為在常態假設下，落在 ±3σ 之外的機率只有 0.27%——大約千分之三，罕見到值得你半夜被叫起來。這個「3σ ≈ 千分之三」不是某人拍腦袋定的，是這一章 68-95-99.7 法則的最後一格。（先劇透一個陷阱：你的延遲指標往往**不是**常態的，是長尾的，所以這條規則會在尾巴上騙你——ch12 已經警告過，這一章我們把它講透。）\n\n第三，**標準化（standardize）**。你比較兩個量綱完全不同的指標——比方說「這台機器的 CPU 比平常高了多少」跟「這台機器的延遲比平常高了多少」——你沒辦法直接比 70%（CPU）跟 200ms（延遲），單位都不一樣。但你可以各自問「它離自己的平常有幾個標準差」，這樣兩個數字就站到同一把尺上了。這個動作叫標準化，算出來的東西叫 **z 分數**，是這一章第一個、也是最有用的工具。\n\n所以這一章不是教你新東西，是幫你已經會的東西裝上把手、刻上刻度。我們從那把尺開始。\n\n## 標準化：把所有常態搬到同一把尺\n\n常態分布有兩個參數：平均 μ（鐘的中心在哪）和標準差 σ（鐘有多胖）。寫成 X ~ N(μ, σ²)。麻煩在於，每個常態都長得不一樣——延遲是 N(50, 5²)、身高是 N(170, 7²)、考試分數是 N(60, 12²)，胖瘦位置全不同。如果每遇到一個常態就得重新算一遍它的面積，那這把尺一點都不通用。\n\n高斯（Gauss）和後人留給我們最划算的一招，是發現**所有常態其實是同一條曲線**，只是被平移和縮放過。你只要會讀一條曲線——**標準常態 N(0, 1)**，中心在 0、標準差是 1——就能讀所有常態。怎麼搬過去？一個減法加一個除法：\n\n```text\nz = (x − μ) / σ      ← 把任何常態搬到 N(0,1) 的標準化公式\n```\n\n拆開看，這兩步你其實天天在做：\n\n```text\nx − μ        ← 先平移：「離中心多遠」，把鐘的中心對齊到 0\n(x − μ) / σ  ← 再縮放：「以一個標準差為單位，遠了幾個身位」\n```\n\n減 μ 是「以平均為原點重新計算位置」；除 σ 是「換單位，把標準差當成新的『1』」。算完得到的 z，意思非常乾淨：**這個值在自己的分布裡，離平均有幾個標準差**。z = 2 就是「高出平均兩個標準差」，z = −1.5 就是「低於平均一個半標準差」。單位被洗掉了，剩下純粹的「幾個身位」。\n\n這就是你比較 CPU 跟延遲時做的事。CPU 平常 50% ± 10%，現在 70%，那 z =(70−50)/10= 2.0。延遲平常 50ms ± 5ms，現在 60ms，那 z =(60−50)/5= 2.0。兩個都是「z = 2.0」——你現在可以說「這兩個指標異常的程度一樣」，儘管一個是百分比、一個是毫秒。**標準化就是把不同量綱的東西放到同一把尺上比較**，這是它了不起的地方，也是統計學裡到處都在用的動作（z-score、t-statistic、效果量，骨子裡都是這個減法加除法）。\n\n到這裡你可能會問：搬過去之後呢？我手上有個 z = 2.0，然後咧？然後你就能查出「比它更極端的機率有多少」——而那個查的動作，是這一章真正的高潮。\n\n## 機率即面積：你查 P99 就是在反查累積曲線\n\n先把一句話釘死，這句話貫穿 Part III 到 Part V：\n\n> **連續分布的機率，是密度曲線下的面積。**\n\nch12 已經鋪過這件事（密度不是機率、單點機率為 0、機率要靠積分把一段面積加起來）。這一章把它用到底。標準常態的密度函數長這樣：\n\n```text\n       φ(z) = (1/√(2π)) · e^(−z²/2)\n```\n\n別被嚇到，這條公式現在你只要會「讀」它的形狀，不用會推它（推導為什麼是這個樣子，等下單獨講一段，而且只給直覺）。重點是：**這條曲線下的面積，就是機率**。你想知道「z 落在某區間的機率」，就是去量那一段曲線下面的面積：\n\n```text\nP(a ≤ Z ≤ b) = ∫[a,b] φ(z) dz      ← a 到 b 之間、曲線下的面積\n```\n\n整條曲線下面的總面積是 1（機率守恆，跟 ch12 的均勻分布矩形面積=1 是同一個道理，只是這次曲線是彎的）。而那個 1/√(2π) 的係數，就是為了把面積調成剛好 1 而存在的——它是「歸一化常數」，把一條原本面積是 √(2π) 的曲線壓成面積 1。（為什麼是 √(2π) 而不是別的數，牽涉一個叫高斯積分的漂亮結果 ∫e^(−x²)dx = √π，π 怎麼會跑進來這裡我留一段給你看驚嘆，但**完整微積分推導指向《馴服無限》ch15「機率即面積」**，這本書不重講積分本身。）\n\n現在把它接回你的工作。你查 P99 延遲，在做什麼？你在問：「面積累積到 99% 的那個門檻值在哪？」這就是反查**累積分布函數（CDF）**：\n\n```text\nF(x) = P(X ≤ x) = ∫[−∞, x] f(t) dt    ← 從負無窮積到 x，左邊累積的面積\n```\n\nCDF 是一條從 0 爬到 1 的累積曲線。**P99 就是反查這條曲線：給定 0.99，找出對應的 x。** 你每次在 Grafana 點開 p99，背後就是這個動作（雖然你的延遲不是常態的，是用實測樣本的經驗分布算的，但「反查累積曲線」這個邏輯一模一樣）。\n\n我認為這是本章第一個值得你停下來的點。**機率這個抽象到不行的東西，被翻譯成了一件你能用尺量的事——面積。** 「某件事多可能發生」變成「某塊區域有多大」。一旦機率變成面積，所有微積分的工具（積分、求面積、反查累積值）瞬間全部可用。這不是比喻，是字面上的相等。人類花了一百多年才把「機運」這個玄學詞，磨成一塊可以拿圓規和積分去量的幾何圖形。\n\n問題是：常態的這個積分**算不出封閉解**。∫e^(−z²/2)dz 沒有初等函數形式的答案（這是真的，不是我們懶得算）。所以歷史上大家怎麼辦?——查表。把標準常態的 CDF 預先算好，印成一張表，全世界共用。你現在用程式一行 `normalCDF(z)` 解決，但在沒有電腦的年代，那張 z 表是統計學家的聖經。下一節我們就來讀這張表最重要的三格。\n\n## 68-95-99.7 法則：三格刻度，背起來終身受用\n\n標準常態這張表，你不用背整張，只要背三格。這三格就是 SRE 圈子裡 sigma 告警的數學底，也是你判斷「幾個標準差算異常」的內建刻度：\n\n```text\n範圍        曲線下面積（落在內）   精確值       尾巴（落在外）\n±1σ         約 68%                68.27%       約 32%（兩尾各 16%）\n±2σ         約 95%                95.45%       約 4.6%（兩尾各 2.3%）\n±3σ         約 99.7%             99.73%       約 0.3%（兩尾各 0.13%）\n```\n\n這三個數字（**68.27% / 95.45% / 99.73%**，照 landscape 的精確值）的意思是：一個常態隨機變數，有 68.27% 的機率落在「平均 ± 1 個標準差」裡，95.45% 落在 ±2σ 裡，99.73% 落在 ±3σ 裡。畫成圖：\n\n```text\n  φ(z) 標準常態密度（█ 的高度 = 機率密度，越高越可能）\n\n                  ███\n                ███████              ← 中間最厚（最可能）\n              ███████████\n            ███████████████\n          ███████████████████\n       ░░██████████████████████░░    ← 尾巴薄但永遠不碰到 0\n   ░░░░░░░██████████████████████░░░░░░░\n  ───┴────┴────┴────┴────┴────┴────┴───► z\n    −3σ  −2σ  −1σ   0   +1σ  +2σ  +3σ\n\n  落在 ±1σ 內：68.27%   ←─ 中間這段\n  落在 ±2σ 內：95.45%   ←─ 再外推一圈\n  落在 ±3σ 內：99.73%   ←─ 幾乎全部，尾巴只剩 0.27%\n```\n\n讀法很白話：**離中心越遠，那一段面積（機率）掉得越快**。從 ±1σ 到 ±2σ，多框進來的面積讓「落在外面」的機率從 32% 掉到 4.6%；再到 ±3σ，掉到 0.3%。這就是為什麼 3σ 是個好告警線——千分之三，夠罕見，但又不是罕見到永遠不觸發。如果你把告警線拉到 ±4σ（約十萬分之六），那你大概一年也收不到一次告警，異常都從你眼皮底下溜過去了。sigma 告警的本質，是你在「漏報」和「狼來了」之間，用這張表的刻度選一個平衡點。\n\n這裡埋一個全書最常被寫錯的陷阱，先講清楚（landscape 把它列為作者最容易出錯的點之一）：\n\n> **±2σ 不是 95%，是 95.45%。「恰好 95%」對應的是 ±1.96σ，不是 ±2σ。**\n\n很多人把 95% 跟 2 個標準差畫等號，這是個方便的近似，但不精確。±2σ 框進來的是 95.45%，差了快半個百分點。那「恰好 95%」要框到哪？答案是 **±1.96σ**。這就帶出了那個你在每篇論文、每個信賴區間裡都會撞見的數字。\n\n## 1.96 的來歷：那個陰魂不散的數字\n\n打開任何一篇做統計的論文，「±1.96」這個數字遲早會跳出來。它不是某個物理常數，也不是誰的生日——它純粹是這張 z 表上一個特定刻度的座標。它的來歷乾淨到你會笑：\n\n我們想要一個區間，讓常態隨機變數**有 95% 的機率落在裡面**。對稱地框——中間留 95%、兩邊各留 2.5%（5% 的尾巴平分到兩側）。那這個區間的邊界在哪？就是去問 z 表：「累積到 97.5%（也就是 95% + 左邊那條尾巴的 2.5%）的那個 z 是多少?」答案是 **1.959964…**，四捨五入成 **1.96**。\n\n```text\n        ┌──────── 95% ────────┐\n        │                     │\n   2.5% │                     │ 2.5%      ← 兩尾各留 2.5%\n ───────┼─────────────────────┼───────► z\n     −1.96         0        +1.96\n        └─ 95% 落在 ±1.96σ 之內 ─┘\n```\n\n所以 1.96 是「95% 雙尾」的臨界值。為什麼大家用 1.96 而不是更整齊的 2.0？因為 2.0 對應的是 95.45%，**多框進來了 0.45%**——如果你聲稱「95% 信賴」卻用 2.0，你其實偷偷給了自己 95.45% 的把握，名實不符。1.96 才是誠實的 95%。\n\n順帶一個史實彩蛋（已查證，2026-06）：費雪（Fisher）在他 1925 年那本影響整個 20 世紀的《Statistical Methods for Research Workers》裡，表格給的就是更精確的 **1.959964**。後來大家圖方便取 1.96，少數人甚至圖更方便取 2。但這個「2」的習慣有點危險——它正是「±2σ ≈ 95%」這個誤解的源頭。下次你看到有人用 2.0 當 95% 臨界值，你心裡可以默默幫他補一句「其實是 1.96 啦」。\n\n到這你已經有了讀常態的全套工具：標準化把任何常態搬到 N(0,1)、機率即面積讓你能查機率、68-95-99.7 給你三格速記刻度、1.96 給你 95% 的精確邊界。剩下兩個「美」的問題，我想帶你看一眼但不折磨你：這條曲線**為什麼長這樣**，以及它有一個近乎傲慢的**自我複製**性質。\n\n## 鐘形為什麼長這樣：一瞥，不硬推\n\n高斯函數的核心是 e^(−z²/2)。我們不推導它（推導要動到微積分和最大概似，指向延伸閱讀），但光是**讀**這個式子的結構，就能看懂鐘形的三個特徵，而且看懂之後你會覺得這個形狀幾乎是被逼出來的：\n\n**第一，為什麼中間最高、左右對稱。** 指數上是 −z²/2，注意那個平方。z 和 −z 平方後一樣（2² = (−2)² = 4），所以曲線在 0 的左右是鏡像——**對稱來自平方**。而 z = 0 時，指數是 0，e⁰ = 1，這是函數的最大值；z 一往兩邊跑，−z²/2 越來越負，e 的負次方越來越小。所以中間鼓、兩邊塌，是平方加上負號的必然結果。\n\n**第二，尾巴趨零有多快——快到驚人。** 這是常態最關鍵、也最容易被忽略的性質。尾巴衰減的是 e^(−z²/2)，注意指數裡是 **z 的平方**，不是 z 本身。這意味著尾巴掉得是**平方級的指數快**，遠比一般的指數衰減還凶：\n\n```text\nz = 1   →  e^(−0.5)   ≈ 0.607\nz = 2   →  e^(−2)     ≈ 0.135      ← 才走兩步，掉到剩兩成\nz = 3   →  e^(−4.5)   ≈ 0.011      ← 三步，剩百分之一\nz = 4   →  e^(−8)     ≈ 0.00034    ← 四步，剩萬分之三\nz = 5   →  e^(−12.5)  ≈ 3.7e−6     ← 五步，百萬分之四\n```\n\n每往外走一步，因為是平方，下降的力道越來越猛。這就是為什麼常態的尾巴「實質上」很快就沒了——5 個標準差之外的事，機率小到工程上可以當不存在。**這個「尾巴塌得飛快」正是常態跟長尾分布最關鍵的分界線。** ch12 警告過你：你的延遲是長尾的，它的尾巴衰減慢得多（冪律是多項式級的慢，不是平方指數級的快）。所以在常態世界，「5σ 之外＝幾乎不可能」是對的；但在長尾世界，你硬套這條規則，會被那條胖尾巴上一個本來就該來的極端值打到鼻青臉腫。**金融海嘯裡那些「百萬年一遇」卻三年來一次的事件，根因就是有人拿常態的瘦尾巴去描述一個胖尾巴的世界。** 這是 3-sigma 告警在重尾指標上會失靈的數學原因，記住它。\n\n**第三，π 為什麼會在這裡。** 這是我覺得整條公式最魔幻的地方。φ(z) 前面那個 1/√(2π)——圓周率 π，那個量圓的東西——怎麼會跑進一個跟圓八竿子打不著的機率公式裡？答案藏在一個漂亮到值得單獨講的結果：高斯積分。要把這條鐘形曲線的總面積調成 1，你得先算出它原本的面積，而那個積分\n\n```text\n∫[−∞,∞] e^(−x²) dx = √π        ← π 從這裡冒出來\n```\n\n竟然等於 √π。π 在這裡出現的原因，是算這個積分最漂亮的方法要**把它平方、變成一個二維積分、然後換成極座標**——一換極座標，圓就進來了，π 就跟著進來了。**一個一維的、毫無圓味的積分，要繞到二維的圓上才算得出來，於是 π 留在了答案裡。** 我第一次看到這個推導的時候盯著它看了很久。一個關於「測量誤差怎麼分布」的函數，骨子裡藏著圓周率——這是那種會讓你覺得「數學底層是不是真的有某種統一性」的時刻。**完整推導（平方、二維積分、極座標換元）指向《馴服無限》**，本書點到這個驚嘆為止，不重講積分。\n\n## 自我複製：常態相加還是常態\n\n常態還有一個近乎傲慢的性質，一句話講完，但這句話分量很重：\n\n> **兩個獨立的常態相加，結果還是常態。** 平均相加，變異數相加。\n\n如果 X ~ N(μ₁, σ₁²)、Y ~ N(μ₂, σ₂²) 且兩者獨立，那麼 X + Y ~ N(μ₁+μ₂, σ₁²+σ₂²)。形狀不變，只是中心和胖瘦按規則合併（這叫常態的**穩定性**，stability property，已查證 2026-06）。注意「變異數相加」這條，正是 ch09 那個「獨立和的變異數相加、但標準差不相加」的老朋友又回來了——常態只是把它演到了極致：不只變異數聽話相加，連分布的**形狀**都原封不動。\n\n這個性質為什麼了不起？因為它跟 ch14 的中央極限定理是一體兩面的。CLT 說「很多東西加起來會**趨向**常態」；而常態自己說「我加我自己，**直接就是**常態，連趨向都不用」。常態是這個「加法宇宙」裡的不動點——所有東西加總後都往它流，而它自己加自己原地不動。在所有分布裡，能做到「相加後形狀不變」的家族極少（它叫穩定分布族），常態是其中最乖、最常見的那個。你工程上把很多獨立的常態雜訊疊加（多個量測誤差累積），結果還是個漂亮的常態，不會變成什麼奇形怪狀——這個「疊加後仍可控」的性質，是常態之所以好用的隱形功臣。\n\n好，工具齊了、美也看過了。現在回收脊椎硬幣，把這一章變成你手上能算的東西。\n\n## 脊椎硬幣回收：用常態近似查「100 擲落在某區間」\n\n**這是 ch01 那枚公正硬幣。** 我們一路升級它：ch02 它是古典 1/2、ch08–09 它有 E=1/2、Var=1/4、ch11 n 擲變成 Binomial(n, 1/2)、ch14 它標準化後趨向常態（而且這正是史上第一個中央極限定理，棣美弗 de Moivre 1733 年算的就是它）。現在 ch15，我們用常態這把尺去量它。\n\n擲 100 次公正硬幣，正面數 X 服從 Binomial(100, 1/2)。由 ch08–09 的基準：\n\n```text\nμ = E[X]   = n·p     = 100 × 0.5  = 50      ← 平均出 50 個正面\nσ² = Var(X) = n·p(1−p) = 100 × 0.25 = 25      ← 變異數 25\nσ  = √25 = 5                                  ← 標準差 5 個正面\n```\n\n所以 X 近似 N(50, 5²) ——一個中心在 50、標準差 5 的鐘形。現在問一個你算離散二項要加總一堆組合數、但用常態近似只要查一格表的問題：**100 擲裡，正面數落在 45 到 55 之間的機率是多少？**\n\n45 到 55 是「50 ± 5」，也就是「平均 ± 1 個標準差」。標準化兩個邊界：\n\n```text\n下界 z = (45 − 50) / 5 = −1.0\n上界 z = (55 − 50) / 5 = +1.0\n```\n\n問題變成「標準常態落在 −1 到 +1 之間的機率」——這正是 68-95-99.7 法則的第一格：\n\n```text\nP(45 ≤ X ≤ 55) ≈ P(−1 ≤ Z ≤ 1) ≈ 68.27%\n```\n\n不用加總十一個組合數，直接讀表第一格，**約 68%**。這就是常態近似的省力之處：把一個離散的、要硬算的二項問題，搬到連續的常態尺上，查一格表就完事。棣美弗 1733 年發明這招的時候沒有電腦，硬算 Binomial(100, 1/2) 的中間段是會要人命的工程，常態近似是他的救命稻草。\n\n## Worked example：標準化、查尾端，與一個埋給 ch18 的伏筆\n\n帶兩個完整的手算，一個是純工程指標、一個是脊椎硬幣，最後埋一個伏筆給三章後的假設檢定。\n\n### 例一：延遲超過 60ms 的比例\n\n你的服務延遲近似常態，平均 50ms、標準差 5ms，寫成 N(50, 5²)。問：**超過 60ms 的請求佔多少比例？**（也就是 P(X > 60)。）\n\n**第一步，標準化。** 把 60ms 搬到標準常態尺上：\n\n```text\nz = (x − μ) / σ = (60 − 50) / 5 = 2.0\n```\n\n60ms 在「平均 + 2 個標準差」的位置。\n\n**第二步，查尾端面積。** 我們要的是「比 z = 2.0 更極端（更大）」那條尾巴的面積，也就是上尾機率 P(Z > 2.0)。查 z 表（或用 68-95-99.7 反推）：\n\n```text\nP(Z > 2.0) ≈ 0.0228   ≈ 2.3%      ← 標準常態 z=2 的上尾面積\n```\n\n所以**大約 2.3% 的請求會超過 60ms**。\n\n**交叉驗算（用 68-95-99.7 反推）。** 我不想只是抄表上的 0.0228，用法則自己估一遍：±2σ 之內是 95.45%，所以**外面**是 4.55%，平均分到兩條尾巴，**一條尾巴是 4.55% / 2 ≈ 2.27%**。跟查表的 0.0228（2.28%）對得上（微小差異是 95.45% 的四捨五入造成）。✓ 兩種方法同一個答案，這個 2.3% 站得住。\n\n工程上的意義：如果你的 SLA 是「P95 ≤ 60ms」（95% 的請求要在 60ms 內），那這個服務剛好踩線——只有 2.3% 超過，95% 線在 60ms 內，過關。但注意這整套推論吃了一個假設：**延遲是常態的**。真實延遲常是長尾的，右尾比常態胖得多，那條 2.3% 會被嚴重低估。**用常態算延遲尾巴是工程上的常見陷阱，下一節專門拆它。**\n\n### 例二：脊椎硬幣，100 擲「≥ 60 正面」的機率\n\n**還是 ch01 那枚硬幣。** X ~ Binomial(100, 1/2)，已知近似 N(50, 5²)。問：**擲 100 次，出現 60 個或更多正面的機率？**（P(X ≥ 60)。）\n\n**標準化 60：**\n\n```text\nz = (60 − 50) / 5 = 2.
