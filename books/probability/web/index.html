<style>

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "馴服隨機：機率與統計的直覺與驚嘆", "md": "# 馴服隨機：機率與統計的直覺與驚嘆\n\n> 一本寫給工程師、純為了欣賞而讀的機率統計書。不是考試解題訓練，不是測度論教科書，也不是統計工具手冊——是想讓你親身感受：人類怎麼在最不可預測的東西裡，找到鐵一般的秩序。\n\n## 這本書在做什麼\n\n機率統計最迷人的地方，是它把一件聽起來矛盾的事變成了真的：**單一事件完全不可測，總體卻精確可測。** 一枚硬幣下一次是正是反，沒人說得準；但擲一萬次，正面比例會以驚人的精度逼近一半。這本書就是在追這件事——以及它一路長出來的所有驚嘆與陷阱。\n\n讀完，你應該能用自己的話對另一個工程師講清楚這六件事：\n\n1. 機率到底在量化什麼（無知？長期頻率？信念？三種詮釋撐著同一個數）。\n2. 秩序怎麼從混沌浮現（大數法則的精確意義——不是「偏差被修正」，是「被稀釋」）。\n3. 中央極限定理為什麼讓鐘形無所不在。\n4. 貝氏：證據怎麼一步步改變信念。\n5. 統計推論的大膽（從一千人推斷兩億人）與它的崩壞（p 值、複現危機）。\n6. 人類對隨機的直覺，在哪裡、為什麼系統性地崩壞。\n\n## 怎麼讀\n\n- **架構圖先行**：每個 Part 的第一章都有全書地圖，先看清自己在哪，再鑽細節。\n- **跟著同一枚硬幣走**：全書有一條脊椎——一枚公正硬幣，每個 Part 重新認識它一次（古典機率 → 期望與變異 → 二項 → 大數法則 → 中央極限 → 假設檢定 → 隨機漫步）。看著它越長越深，是這本書最划算的讀法。\n- **動手做是紙筆推演**：每章末的「紙上推演」用紙筆算、用嘴巴講。**講得出來才算懂**；講不清楚，就是還沒懂，別急著翻下一章。沒有任何程式作業。\n- **「直覺的陷阱」是招牌**：機率是人類直覺最常出錯的領域，每章都有一節專門拆解「這裡你的直覺正要騙你」。\n\n## 書架上的鄰居\n\n這本書會在需要時指向書架上的另外兩本，但本書自足、不必跨書也讀得懂：\n\n- **《馴服無限：微積分的直覺與驚嘆》**——「機率即面積」「處處連續卻處處不可微的怪獸」在那裡有微積分的視角。\n- **《把系統寫成定理：TLA+ 與形式化方法》**——信賴區間與 p 值背後的 ∀∃ 量詞攻防，你在那本書見過。\n\n那麼，從第一章開始：人類為什麼怕隨機，又為什麼最後算得動它。\n"}, {"id": "ch01-why-randomness", "file": "ch01-why-randomness.md", "group": "Part I — 機運的語言", "title": "ch01 — 隨機為何可怕又可算：賭桌上的一封信", "md": "# ch01 — 隨機為何可怕又可算：賭桌上的一封信\n\n> **本章解決什麼問題**：這是全書的起點。我們先回答一個你可能從沒認真問過的問題——機率（probability）這門學問到底在「馴服」什麼？答案是：個體完全不可預測、但總體卻有鐵一般規律的那種東西。本章帶你看人類為何花了兩千年才把賭博變成數學（賭徒早就在賭，數學語言卻遲到了），看 1654 年賭桌上的一封信如何點燃這整門學科，並用一個中斷的賭局（分賭注問題）讓你親手摸到那個核心洞見：不問「下一次擲出什麼」，改問「長期會怎樣」。後面四章（ch02–04）會把機率的三種詮釋、公理、條件機率一一補上；本章只負責讓你站對位置、認得全書地圖、認得那枚會貫穿到最後一章的硬幣。\n\n```text\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算 ◄你在這裡 ch05 貝氏定理       ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽   ←   ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n這張圖你會在每個 Part 的開頭再看到一次，「你在這裡」會往前移。整本書要交給你六樣東西，現在先列出來，讀完每一章你都可以回頭打勾：① 機率到底在量化什麼；② 秩序如何從混沌浮現（大數法則的精確意義）；③ 中央極限為何讓鐘形無所不在；④ 貝氏：證據如何更新信念；⑤ 統計推論的大膽與它的崩壞；⑥ 人類的隨機直覺在哪裡、為什麼系統性崩壞。本章先碰第一條的邊。\n\n## 從你已知的出發\n\n你其實早就相信機率的核心信念了，只是沒人這樣跟你講過。\n\n回想你怎麼設計 retry。某個下游服務偶爾回 503，你加上 exponential backoff。然後某個半夜你被叫起來，發現一萬個 client 在同一秒收到 503、同一秒退避、同一秒重試——retry storm 把剛要復原的服務又打趴了。你的修法不是「讓重試更準時」，恰恰相反：你加了 **jitter**，在退避時間上灑一把隨機。你刻意讓每個 client 的下一次重試時間「不可預測」，因為你知道——只要每個個體獨立亂跳，整體的重試流量就會被攤平成一條平滑的曲線。\n\n停在這裡想十秒。你做了一件很哲學的事：你用「單一請求何時重試」的不可預測，去買「整體重試流量」的可預測。\n\n這個信念貫穿你整個職業生涯：\n\n- **load balancer 隨機分流**：你不知道下一個請求會打到哪台機器，但你很確定，跑久了每台機器的負載會均勻。\n- **rate limiter 取樣**：你不記錄每一筆請求，你抽樣 1%，然後乘以 100 去估全貌——你賭的是「單筆抽不抽中是隨機的，但總量的估計會收斂」。\n- **P99 延遲**：你從來不問「下一個請求要花幾毫秒」（沒人答得出來），你問「一百個請求裡最慢那個大概多慢」。你早就放棄預測個體、改去刻畫總體的分布。\n\n這就是機率在做的事，一字不差。**個體不可測，總體可規劃。** 工程師的你天天靠這個信念吃飯，只是沒把它寫成定理。這本書要做的，就是把你這個藏在肌肉記憶裡的信念，變成一套你能精確講出來、能算、能知道它何時會騙你的語言。\n\n而這套語言，比你以為的晚誕生太多了。\n\n## 隨機曾經是神的領域，不是數學的\n\n先講一件你可能沒意識到的怪事：人類丟骰子丟了幾千年，賭錢賭了幾千年，但「用數學算機率」這件事，要到十七世紀才真正開始。\n\n這不是因為古人笨。古希臘人會做幾何證明、會算天體運行、會處理你現在覺得很難的東西。羅馬士兵口袋裡裝著羊的距骨（astragalus，一種四面不對稱的小骨頭），閒下來就拿來賭。問題不在能力，在於——**他們根本不覺得隨機是可以算的東西**。\n\n擲骰子在古代不是娛樂的隨機，是占卜。這有個正式名稱叫 cleromancy（擲骰占卜），用骰子或抽籤的結果來探問神意。希臘人把骰子占卜連到赫密士（Hermes）與雅典娜，骰盤就擺在神像前面（2026-06，已查證）。骰子落地那一刻，落出來的不是「一個隨機數」，是**神的回答**。\n\n你體會一下這個世界觀的封閉性：如果每一次擲骰都是神在說話，那問「下一次擲出六的機率是多少」就跟問「神下一句話的機率」一樣荒謬——那是天意，天意怎麼會有機率？這個觀念之下，宿命論（determinism）把門關得更死：宇宙是神造的完美機器，每件事都有它注定的原因，你眼中的「隨機」只是你看不夠清楚而已。在這種框架裡，機率沒有立足之地——不是算不出來，是這個問題本身被認為不該問。\n\n歷史學家 Ian Hacking 那本《The Emergence of Probability》就在追這件事：為什麼一個夠好的機率學家明明能在賭桌上大殺四方，這門學問卻晚到十七世紀才在歐洲一口氣冒出來（2026-06，已查證）。沒有單一原因，是好幾股力量同時鬆動了那扇門——商業需要算保險與年金的風險、人口的生死統計開始被記錄、賭桌上的數學被認真對待、宿命論的世界觀開始裂縫。\n\n第一個真正動手的人，其實比那封著名的信還早一個世紀。義大利的卡爾達諾（Gerolamo Cardano）——醫生、賭徒、麻煩人物——寫了一本《Liber de ludo aleae》（賭博遊戲之書），大約寫於 1564 年，但直到他死後、1663 年才出版（照 landscape，已查證）。他是第一個把隨機事件當成受數學律支配、把勝算定義成「有利結果／不利結果之比」的人。他甚至算對了「兩次擲骰至少出現一個 1」的機率是 11/36（2026-06，已查證）。但這本書躺在抽屜裡近一百年沒人看到，所以機率論的正式生日，得算在另一個地方——一張賭桌，和一封信。\n\n## 賭桌上的一封信：一個沒打完的賭局\n\n1654 年的夏天，巴黎。一位叫德梅雷（Chevalier de Méré）的貴族賭徒，拿了個問題去煩數學家帕斯卡（Blaise Pascal）。帕斯卡覺得有意思，寫信去問在土魯斯的費馬（Pierre de Fermat）。接下來幾個禮拜，兩人來回通信，這串信公認是機率論正式史的開端（照 landscape，已查證）。注意這個出身：機率論不是從哲學或神學裡長出來的，是兩個聰明人為了搞懂賭錢怎麼分而吵出來的。很對工程師的胃口——一個真實的、會痛的問題逼出一套理論。\n\n問題叫**分賭注問題**（problem of points），長這樣：\n\n> 兩個人玩一個公平賭局，每一局兩人贏的機會一樣（就想成擲公正硬幣，正面 A 得一分、反面 B 得一分）。兩人各押一樣的賭金，講好誰先拿到約定的分數，整個賭注全拿走。結果賭到一半，被迫中斷，沒人達標。**這時賭注該怎麼分才公平？**\n\n把它換成你熟的場景：A 和 B 各押 100 塊，賭注共 200 塊在桌上。約定先贏 3 局者全拿。打到一半被迫喊停，此刻 **A 還差 1 局就贏、B 還差 2 局才贏**。莊家跑來問你：這 200 塊怎麼分？\n\n你直覺會冒出幾個答案。**對半分？** A 跟 B 各拿 100。聽起來公平，但你心裡有點不對——A 都已經領先到只差一局了，憑什麼跟還差兩局的 B 平分？這明顯虧待了 A。**那按目前比數分？** 比如 A 已贏 2 局、B 已贏 1 局，就 2:1 分，A 拿 133、B 拿 67。這個答案在當時還真的有人主張，但它也錯了——它只看「已經發生的過去」，沒看「還沒打完的未來」。賭注是給未來的勝負分的，不是給過去的比數發獎金的。\n\n這裡就是整門學問的轉折點，慢慢讀：**過去已經結束、不可改變，它對「該怎麼分」其實沒有發言權；真正決定該怎麼分的，是那場沒打完的未來——而未來雖然不確定，卻是可以攤開來算的。** 帕斯卡和費馬同時看穿了這件事，然後各走各的路，殊途同歸。\n\n## 費馬的路：把未來全部擺出來數\n\n費馬的做法很暴力，也很對工程師的胃口：**把所有可能的未來枚舉出來，數一數。**\n\n關鍵的一步聰明在這裡。賭局還沒分出勝負，最多再打幾局？A 差 1 局、B 差 2 局。最壞情況——B 連贏兩局才翻盤——所以**頂多再打 2 局**就一定分得出勝負。費馬說：那我們就假裝這 2 局一定會打完（就算 A 第一局就贏了、賭局其實會提早結束也沒關係，我們照樣把第二局擲完，這不影響誰最終獲勝，但能讓每種結局「等可能」，方便數）。\n\n再打 2 局，每局 A 或 B 贏，所以一共 2 × 2 = 4 種等可能的未來。把它們全列出來（A 表示這局 A 贏，B 表示 B 贏）：\n\n```text\n這 2 局的結果   →  最終誰贏？               →  A 贏嗎？\n───────────────────────────────────────────────────────\n A A           →  A 第 1 局就達標（差 1 局）  →  A 贏 ✓\n A B           →  A 第 1 局就達標            →  A 贏 ✓\n B A           →  A 在第 2 局達標            →  A 贏 ✓\n B B           →  B 連贏 2 局、B 達標         →  B 贏 ✗\n───────────────────────────────────────────────────────\n                  A 贏：4 種裡的 3 種        B 贏：4 種裡的 1 種\n```\n\n數出來了：4 種等可能的未來裡，A 贏 3 種、B 贏 1 種。所以公平的分法是——\n\n```text\nA 應得 = 3/4 × 200 = 150 塊\nB 應得 = 1/4 × 200 =  50 塊\n```\n\n注意那兩列 `A A` 和 `A B`：A 在第一局就已經贏了，第二局根本不會真的打。但費馬堅持把它們當成兩種不同的未來分開數。這一步常常讓人想抗議「這兩個結果其實是同一回事啊」——但這正是初學者最容易踩的坑，我們留到「直覺的陷阱」那節專門拆。先記住結論：**A 拿 3/4，B 拿 1/4。**\n\n## 帕斯卡的路：往回遞迴，算「在這個局面值多少」\n\n帕斯卡覺得枚舉太累了——這題只要再打 2 局還好，要是 A 差 3 局、B 差 5 局，你得列 2⁷ = 128 種未來，手會抽筋。他想要一個能「往回算」的方法。\n\n帕斯卡的招式，今天我們叫**反向遞迴**（backward induction），思路是這樣：與其往前展開所有未來，不如倒過來想——**「在某個局面，這個賭注對 A 而言值多少？」** 然後從「快要結束的局面」往回推到「現在的局面」。\n\n我們從現在這個局面出發：A 差 1 局、B 差 2 局，賭金 200。帕斯卡問：下一局會怎樣？兩種可能，各 1/2：\n\n```text\n現在局面：A 差 1、B 差 2，賭注 200\n│\n├─ 機率 1/2：A 贏這一局 → A 達標！A 拿走全部 200\n│\n└─ 機率 1/2：B 贏這一局 → 變成「A 差 1、B 差 1」的新局面\n                          這是個對稱局面：兩人都差 1 局，\n                          下一局誰贏誰全拿，公平來說各值 200 的一半 = 100\n```\n\n關鍵的遞迴在最後那行：當局面變成「兩人都差 1 局」，它是完全對稱的——下一局是公正硬幣，A 贏的機會跟 B 一樣，所以這個局面對 A 而言就值 200 的一半，100 塊。帕斯卡不需要再往下展開，他用「對稱所以對半」直接把這個子局面的值算掉了。\n\n現在把兩條路用機率加權平均（這個「加權平均未來價值」的動作，正是後來被命名為**期望值**（expected value）的東西——本章先只用直覺，正式定義留到 ch08）：\n\n```text\nA 在現在局面的應得\n  = 1/2 × (A 贏這局，拿 200)        ← 機率 1/2，A 直接達標\n  + 1/2 × (B 贏這局，後續局面值 100)  ← 機率 1/2，退到對稱子局面\n  = 1/2 × 200 + 1/2 × 100\n  = 100 + 50\n  = 150\n```\n\n**A 應得 150，B 應得 50。** 跟費馬一模一樣。\n\n兩條路在這裡會合，這件事本身就值得你停下來欣賞。費馬把所有未來攤平了數（適合小問題、直覺清楚），帕斯卡把未來摺起來遞迴（適合大問題、算得快），一個橫著走一個豎著走，落在同一個 150。這不是巧合——它是第一個信號，告訴你「公平分賭注」這件事有一個**唯一的、客觀的答案**，不管你用什麼方法逼近它。隨機不是一團任人解釋的迷霧；它底下有結構，而且這個結構是可以被不同的路徑驗證的。對寫過程式的你來說，這就像同一個函式用遞迴和迭代兩種寫法跑出同一個結果——你會更相信這個結果是對的。\n\n順帶一提，這場通信真正的歷史成就，不是算出 150 這個數字，而是**逼出了「期望值」這個概念**（照 landscape）。三年後，荷蘭的惠更斯（Christiaan Huygens）在巴黎聽說了帕斯卡的工作，回去鑽研，1657 年出版《De ratiociniis in ludo aleae》（論賭博中的推理）——**史上第一本印行的機率論專著**，而且一直到十八世紀都是這個主題唯一的書（照 landscape，已查證）。惠更斯整本書的地基不是「機率」，而是「期望」：如果贏 a 和贏 b 的機會比是 p:q，那這個機會的價值就是 (pa+qb)/(p+q)（已查證）。你把這條式子套回帕斯卡那題（p=q=1、a=200、b=100），會發現它就是 (200+100)/2 = 150。同一個 150，第三次出現。\n\n## 核心洞見：不問「下一次」，問「長期」\n\n退一步看你剛剛做了什麼。莊家問「這 200 塊怎麼分」，你沒有去預測「下一局誰會贏」——那是不可能的，那一局就跟擲硬幣一樣不可測。你做的是另一件事：你把所有可能的未來攤開，算出「如果這個局面重來無數次，A 平均能拿走多少」，然後照那個平均去分。\n\n這就是整門機率論的引擎，也是它之所以「可算」的全部祕密：\n\n> **隨機之所以可怕，是因為你想預測下一次；隨機之所以可算，是因為你不該預測下一次。**\n\n古代人卡住，正是卡在這裡。他們盯著「這一次擲骰神會說什麼」，那當然算不出來——單次結果不可測，這點古人沒看錯。帕斯卡和費馬的突破，是把問題從「下一次是什麼」整個換成「長期會怎樣」。一旦你問對問題，那團迷霧立刻凝結成可以加減乘除的東西。\n\n而你——身為工程師——對這個換問題的動作，熟到不能再熟。\n\n- 你不問「這個請求會不會逾時」，你問「逾時率是多少」。\n- 你不問「這台機器今天會不會掛」，你問「這個機型的年故障率」。\n- 你不問「下一個請求多慢」，你問「P99 是多少」。\n\n你每天都在做帕斯卡和費馬 1654 年做的那件事：放棄預測個體，轉而刻畫總體。差別只在於，你是被工程現實逼著這樣想的，而他們是第一次有人發現「原來可以這樣想」。這本書接下來要做的，就是把這個「總體可算」的信念，一層一層挖到底——挖到大數法則（為什麼總體真的會收斂，ch13）、挖到中央極限（為什麼總體幾乎總是長成鐘形，ch14）、挖到統計推論（怎麼只看一小撮樣本就反推整個母體，ch16 之後）。\n\n## 認識這枚硬幣（牠會跟你到最後一章）\n\n整本書有一個貫穿到底的主角，現在請牠出場：**一枚公正硬幣，P(正面) = 1/2。**\n\n本章對牠只說這一句——正面機率二分之一。為什麼是 1/2、這個 1/2 到底是什麼意思（是「對稱所以一半一半」？是「丟很多次大約一半正面」？還是「我相信它是公正的程度」？），這三種讀法留給 ch02 慢慢拆。本章你只要記住：這枚硬幣是全書的量尺。\n\n牠之所以是完美的主角，正因為牠把本章的兩面攤得最乾淨。**個體那一面**：下一次是正是反，沒有人、沒有公式、沒有神能告訴你——這就是隨機可怕的那一面，跟古人盯著骰子問神意是同一個困境。**總體那一面**：丟一萬次，正面大約五千次，而且你越丟越多，「正面比例」越貼近 0.5——這就是隨機可算的那一面。同一枚硬幣，同時是不可測的個體和可規劃的總體。整本書就是不斷回到牠身上，每深入一個 Part 就更懂牠一層：ch08 算牠的期望值、ch09 算牠的變異、ch11 把牠丟 n 次變成二項分布、ch13 看牠的比例如何收斂、ch14 看牠的和如何長成鐘形（而且巧的是，1733 年史上第一個中央極限定理算的就是硬幣——但那是 ch14 的事了）、ch17 拿牠來做假設檢定、ch20 把牠每一擲變成 ±1 走出隨機漫步。到 ch23，我們會攤開一張「同一枚硬幣，你現在懂牠七層」的對帳表。\n\n現在，牠只是一枚正面機率 1/2 的硬幣。記住牠。\n\n## 直覺的陷阱\n\n機率是人類直覺最常崩壞的領域，所以本書每一章都會有這一節，專門拆「這個概念最容易被誤解成什麼、錯誤直覺會在哪一步把你帶進溝裡」。這節是全書最重要的賣點之一——因為你會發現，你的直覺不是偶爾出錯，是**系統性地、可預測地**出錯。\n\n本章最經典的陷阱，就藏在費馬那張枚舉表裡。\n\n| 錯誤直覺 | 它錯在哪 | 自我察覺的徵兆 |\n|---|---|---|\n| 「賭局中斷就對半分最公平」 | 對半分忽略了**領先的人未來更可能贏**。A 只差 1 局、B 差 2 局，A 的勝面明顯大，硬要平分是懲罰領先者。公平要看「未來的勝率」不是「現在誰沒贏」。 | 你發現自己用「看起來中立」當公平標準，卻沒去算誰未來贏面大。 |\n| 「按目前比數分（2:1）」 | 這只獎勵**已經發生的過去**，但賭注是給未來分勝負的。已贏的局數只透過「還差幾局」影響未來，不該直接拿來分錢。 | 你在用歷史比分算錢，卻沒問「從現在開始還會怎樣」。 |\n| 「`A A` 和 `A B` 是同一個結果，因為 A 第一局贏了賭局就結束，第二局不存在」 | 這是**最隱蔽**的一個。為了讓四種結果「等可能」、能直接數，費馬刻意把第二局也擲完。如果你把它們併成一個結果，你會得到三個結果（`A贏`、`A贏`、`B連兩局`合併成「A 提早贏 / BA / BB」），但這三個**不等可能**——你不能對不等可能的結果直接數比例。 | 你在數機率時，把「機會不一樣大」的幾種情況當成「一樣大」在數。 |\n\n第三個陷阱值得你多停一下，因為它是機率計算最常見的死法。**只有對「等可能」的結果才能靠數數量算機率。** 費馬那張表的全部技巧，就在於他湊出了四個等可能的格子。要是你偷懶把它壓成「A 提早贏 / B 先輸再贏 / B 連贏兩局」三種，乍看更精簡，但這三種的機會分別是 1/2、1/4、1/4——不一樣大，數出來的 1/3 就是錯的。把賭局「假裝打滿」的那一步，不是多此一舉，是為了買到「等可能」這個能讓你數數量的前提。\n\n這個陷阱有個現代版你應該很有感：**分散式系統裡的不等可能路徑**。你在估「兩個服務呼叫至少一個失敗」的機率時，要是把「第一個就失敗（後面不再呼叫）」「第一個成功第二個失敗」「兩個都成功」當成等可能的三種情況各 1/3 來算，你會錯得離譜——它們的機率取決於各自的失敗率，根本不等。費馬 1654 年踩過的這個坑，你在 dashboard 前面其實也站在它邊上。\n\n（順帶提醒一個跟本章主角硬幣有關、但要到 ch13 才正式拆的著名謬誤：硬幣連開五次正面，第六次「該開反面了吧」——這是**賭徒謬誤**（gambler's fallacy）。它跟本章的分賭注問題剛好是一體兩面：分賭注問題對「未來」算得很對，賭徒謬誤則對「未來」想得很錯，誤以為過去的結果會逼未來來「補償」。獨立的隨機事件沒有記憶，系統不欠你一個反面。完整的拆解、以及它跟大數法則的精確關係，是 ch13 的重頭戲。）\n\n## 紙上推演\n\n本書全程純紙筆——沒有程式碼，沒有跑模擬。需要「想像擲一萬次」時就用想的。每一題都自己動筆算過再看解答；機率最容易在心裡覺得「應該是這樣」然後算錯。\n\n### 推演題 1：把「公平分注」翻成你熟的語言 **[10 分鐘] ★**\n\n不要急著套公式。請你用自己的話，寫一句話定義「公平分賭注」應該滿足什麼條件——標準是「另一個工程師聽完就懂、而且能照著算」。然後說明：為什麼「對半分」和「按目前比數分」都不滿足你這句定義？\n\n#### 推演解答\n\n一句話定義大概會長這樣：**每個人應得的賭注，等於賭注總額乘以他「從現在這個局面開始、最終獲勝的機率」。**\n\n用工程語言講就是：賭注的分法應該正比於各人的**最終獲勝機率**，而這個機率只看「從中斷點往後的未來」，跟「過去怎麼打到這裡」無關（過去只透過「還差幾局」這個狀態影響未來）。這其實就是一個 backward induction：你站在當前狀態，問「從這裡往下走，我有多少比例的未來會贏」。\n\n- **「對半分」為何不滿足**：它隱含假設兩人最終獲勝機率都是 1/2。但 A 差 1 局、B 差 2 局，A 的勝率是 3/4 不是 1/2，對半分等於沒把領先算進去。\n- **「按目前比數分」為何不滿足**：它用「已贏局數的比例」當分配比例，但已贏局數只是過去的狀態。真正決定錢怎麼分的是未來勝率，已贏局數只透過「還差幾局」這個變數間接影響它——直接拿比數分錢，是把間接變數當成了結果。\n\n關鍵自我檢查：你的定義有沒有「最終獲勝機率」這個詞？沒有的話，你大概還停在「看起來公平」而不是「可計算的公平」。\n\n### 推演題 2：換個配置重算——A 需 1 勝、B 需 3 勝 **[20 分鐘] ★★**\n\n把基準題改成 **A 還差 1 局、B 還差 3 局**，賭注一樣 200 塊。請用費馬的枚舉法**和**帕斯卡的遞迴法各算一次，確認兩條路給同一個答案。\n\n#### 推演解答\n\n**先想清楚要打幾局。** A 差 1、B 差 3，最壞情況 B 連贏 3 局，所以頂多再打 3 局就一定分出勝負。費馬法把這 3 局假裝打滿，共 2³ = 8 種等可能未來。\n\n**費馬枚舉法。** 列出 3 局的所有結果，問每種裡 A 有沒有達標（A 只要在這 3 局裡贏到**至少 1 局**就達標，因為他只差 1 局）：\n\n```text\n3 局結果   A 有贏到至少 1 局嗎？   →  A 達標？\n──────────────────────────────────────────\n A A A          有                  ✓\n A A B          有                  ✓\n A B A          有                  ✓\n A B B          有                  ✓\n B A A          有                  ✓\n B A B          有                  ✓\n B B A          有                  ✓\n B B B          沒有（B 連贏 3 局）   ✗\n──────────────────────────────────────────\n     A 達標：8 種裡的 7 種     B 達標：唯一那種 B B B\n```\n\nA 唯一輸的方式，是 B 把這 3 局**全部**贏走（機率上唯一那種）。所以：\n\n```text\nA 應得 = 7/8 × 200 = 175 塊\nB 應得 = 1/8 × 200 =  25 塊\n```\n\n**自然頻率交叉驗算（第二種算法）：** A 只差 1 局，他唯一會輸的劇本是「接下來這幾局 B 全贏、A 一局都沒贏到」。每一局 B 贏的機率 1/2，連贏 3 局是 1/2 × 1/2 × 1/2 = 1/8。所以 B 贏的機率 1/8、A 贏的機率 1 − 1/8 = 7/8。跟枚舉法一致。（這個「算餘事件——A 輸 = B 連贏到底」的捷徑，比列 8 行表快得多，也是 ch03 會正式介紹的「至少一次用餘事件算」的雛形。）\n\n**帕斯卡遞迴法。** 從現在局面（A 差 1、B 差 3）往前看一局：\n\n```text\n現在：A 差 1、B 差 3\n│\n├─ 1/2：A 贏這局 → A 達標，A 拿 200\n│\n└─ 1/2：B 贏這局 → 新局面「A 差 1、B 差 2」\n                   （這正是本章基準題！我們已經算過 A 在此局面應得 150）\n\nA 應得 = 1/2 × 200 + 1/2 × 150 = 100 + 75 = 175 ✓\n```\n\n漂亮的地方在這裡：帕斯卡的遞迴自動「重用」了基準題的答案——「A 差 1、B 差 2」這個子局面值 150，我們上面早就算過了，直接拿來用。這就是 backward induction 省力的地方，跟你用記憶化（memoization）避免重算子問題是同一個直覺。三種方法（枚舉、餘事件、遞迴）三個一致的 175，你可以很放心了。\n\n### 推演題 3：講給一個只信宿命的人聽 **[15 分鐘] ★★**\n\n口頭題（請真的講出來，或寫成一段給人看的話）。設想一個人堅持「擲骰子是天意，每次擲什麼是注定的，所以根本不能算機率」。請你用三到五句話說服他「擲骰子可以算」——而且不准否認他「單次結果不可測」這件事（因為那其實是對的）。\n\n#### 推演解答\n\n關鍵在於**不要跟他爭「單次能不能預測」**——你會輸，因為單次確實不可測，他沒說錯。你要做的是**換掉問題**。一個能講清楚的版本：\n\n> 「你說得對，下一次擲出幾點，我確實算不出來，沒人算得出來——這點我同意你。但我問的根本不是下一次。我問的是：如果你把這顆骰子擲一萬次，六點會出現幾次？這個我算得出來，大約六分之一，一千六百多次，而且你擲越多次，這個比例就越穩、越貼近六分之一。單獨一次是天意沒關係，一萬次的『總體』有它自己的鐵律，這個鐵律跟天意無關，是骰子六個面的對稱決定的。我不預測神的下一句話，我只刻畫祂講一萬句之後的統計分布——而那個分布，神改不了。」\n\n要點清單（自評用）：① 有沒有承認「單次不可測」？（不承認就會跟對方卡死）② 有沒有把問題從「下一次」換成「長期／總體」？（這是整個論證的樞紐）③ 有沒有指出「總體的規律來自結構（對稱），不是來自預測個體」？三點都有，你就抓到本章的核心了。這也正是帕斯卡和費馬對人類做的事——他們沒有學會預測骰子，他們學會了不去預測骰子。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 用一句話說：機率這門學問在「馴服」什麼？（提示：個體的什麼性質？總體的什麼性質？）\n2. 為什麼人類丟了幾千年骰子，卻到十七世紀才開始算機率？至少講出一個「世界觀層面」的障礙。\n3. 分賭注問題裡，「對半分」和「按目前比數分」**各自**錯在哪？兩個錯法錯的方向一不一樣？\n4. 費馬為什麼堅持把已經分出勝負的賭局「假裝打滿」？如果不這樣做、把結果合併，會出什麼錯？（提示：等可能。）\n5. 帕斯卡的遞迴法在最後一步「兩人都差 1 局所以對半」用了什麼假設？這跟你寫程式時的 memoization 像在哪？\n6. 「不問下一次是什麼、問長期會怎樣」——把這句話對應到一個你真實做過的工程決策（retry jitter？P99？取樣估計？任選一個講清楚）。\n7. 這枚公正硬幣，本章只說了 P(正)=1/2。你能不能已經感覺到，這個 1/2 可能有不只一種意思？（不用答對，只要意識到 ch02 要拆的是什麼。）\n\n## 延伸閱讀\n\n- **APS News, “July 1654: Pascal's Letters to Fermat on the Problem of Points”**（aps.org，已查證）。一頁讀完那串通信的來龍去脈，最值得看的是它點明「兩人真正的成就是引入期望值」——對應本章三次出現的 150。\n- **Wikipedia, “Problem of points”**（已查證）。想看 A 差 a 局、B 差 b 局的一般公式（最多打 a+b−1 局、用組合數數 A 的獲勝方式）就讀這條；本章推演題 2 算的就是它的一個特例。\n- **Ian Hacking,《The Emergence of Probability》**（Cambridge，已查證）。本章「機率為何晚到」那整節的源頭。想深究「為什麼一個能在賭桌大殺四方的機率學家，卻晚了兩千年才出現」就讀它——這是哲學味最重、但也最能改變你世界觀的一本。\n- **Christiaan Huygens,《De ratiociniis in ludo aleae》(1657)**（Dartmouth 有英譯本 PDF，已查證）。史上第一本機率專著。不必啃完，翻一下它如何用「期望（value of a chance）」而非「機率」當地基——你會發現現代教科書的順序（先機率後期望）跟歷史是反的。\n- 跨章接續：機率那個 1/2 的三種讀法（對稱／長期頻率／信念）見 ch02；「至少一次用餘事件算」的正式版（含生日問題）見 ch03；本章只用直覺帶過的「期望值」正式定義見 ch08；賭徒謬誤與大數法則的完整對帳見 ch13。\n"}, {"id": "ch02-three-faces", "file": "ch02-three-faces.md", "group": "Part I — 機運的語言", "title": "ch02 — 機率的三張臉：古典、頻率、主觀", "md": "# ch02 — 機率的三張臉：古典、頻率、主觀\n\n> **本章解決什麼問題**：上一章我們同意「隨機可以算」，但還沒問一個更尷尬的問題——當你寫下「P(正面)=1/2」，這個 1/2 到底在說什麼？是「兩面對稱所以一半一半」，還是「擲一萬次大約一半是正面」，還是「我相信它公正的程度」？這三句話聽起來都對，卻是三種完全不同的世界觀。本章告訴你它們是同一個數的三張臉，而把它們縫在一起的，是 1933 年一套只有三條的公理。這章是全書的地基：往後談貝氏（ch05–06）你用的是第三張臉，談大數法則（ch13）是第二張臉的正當化，談統計推論（Part V）背後是第二張臉跟第三張臉的世紀分裂。\n\n```\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理         ch07 隨機變數\nch02 機率的三張臉 ◄你在這裡  ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽   ←   ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n## 從你已知的出發\n\n你的系統裡有一個數字，叫「P=0.1%」。它出現在兩個地方，你天天看，但它們其實不是同一種東西。\n\n第一個地方：監控面板上那支 API 的歷史錯誤率，「過去 30 天 0.1% 的請求回了 5xx」。這個 0.1% 是你**數出來的**——拿失敗數除以總請求數，跑得越久這個數字越穩。它描述的是一個重複了幾百萬次的過程的長期行為。\n\n第二個地方：你正準備按下部署按鈕，心裡冒出一句「這次上線大概有千分之一的機率會出事」。這個 0.1% 你**沒辦法數**——這次部署只會發生一次，它要嘛出事要嘛不出事，沒有「長期相對頻率」可言。這個數字描述的是**你對一件單一事件的信心**：你掃過 diff、看過測試、想過 rollback，綜合起來你願意賭一千次裡只錯一次。\n\n同一個寫法 `P=0.1%`，兩種意思。一個是「這個世界客觀上多常發生」，一個是「我主觀上多相信它會發生」。神奇的是——這就是本章的第一個驚嘆點——這兩種意思，加上第三種（純靠對稱數出來的「應該是」），共用**同一套運算規則**。你算它們的時候用的加法、乘法、餘事件完全一樣，算完誰也不會穿幫。\n\n如果你是後端工程師，這個結構你太熟了：這是一個 **interface 配三個 implementation**。`Probability` 這個 interface 只規定「回傳 0 到 1 之間的數、整個樣本空間等於 1、互斥事件可以相加」——滿足這三條，怎麼實作隨你。古典詮釋用對稱性實作，頻率詮釋用長期計數實作，主觀詮釋用個人信念實作。三個都通過同一組單元測試，所以你寫的機率定理對三個都成立。本章就是要把這個 interface（公理）跟三個 implementation（詮釋）講清楚——而它們之間的縫，藏著機率史上一些最漂亮也最危險的東西。\n\n## 先把詞講定：樣本空間、事件、機率是什麼\n\n在分三張臉之前，得先有一張共用的桌子。機率的語言只有三個基本零件，全書都靠它們。\n\n**樣本空間（sample space）**，記作 Ω，是「一次隨機實驗所有可能結果的集合」。擲一枚硬幣，Ω = {正, 反}。擲一顆骰子，Ω = {1, 2, 3, 4, 5, 6}。擲兩顆骰子看點數對，Ω 有 36 個元素。樣本空間就是你列出來的「所有可能發生的事」——而且這個列法本身**就是一個決定**，等一下你會看到，整章的麻煩幾乎都出在「Ω 到底該怎麼列」。\n\n**事件（event）**，是樣本空間的一個子集，是你關心的某一群結果。擲一顆骰子「出現偶數」這個事件就是 {2, 4, 6}。「出現大於 4」是 {5, 6}。事件就是「Ω 裡你圈起來的一塊」。空集合 ∅（什麼都沒發生）和整個 Ω（一定會發生的事）也是事件，分別是不可能事件與必然事件。\n\n**機率（probability）**，是一個函數 P，把每個事件對應到一個 0 到 1 之間的數——`P: 事件 → [0,1]`。它量的是「這個事件發生的可能性大小」。P(整個 Ω) = 1（一定會有某個結果發生），P(∅) = 0（不可能發生的事機率為零）。\n\n注意這個型別簽章：機率不是給「結果」打分，是給「**事件**」（結果的集合）打分。這個區別現在看像挑語病，但它正是 ch07 隨機變數整套機制的起點——機率是定義在「子集」上的量，不是定義在「點」上的量。記住這句話，連續分布裡「單點機率為 0、但事件照樣發生」的反直覺（ch12）就有了出處。\n\n桌子擺好了。現在問題來了：`P({正})` 到底等於多少、憑什麼等於那個值？三張臉，三個憑什麼。\n\n## 第一張臉：古典——靠對稱把可能性數出來\n\n最老、最直覺、也是賭桌上長出來的那張臉。古典詮釋（classical interpretation）說：如果一個實驗有 N 個**等可能**的基本結果，而你關心的事件 A 包含其中 k 個，那麼\n\n```text\nP(A) = k / N = 有利結果數 / 所有結果數\n```\n\n擲一枚硬幣，兩個結果等可能，正面佔一個，所以 P(正) = 1/2。擲一顆骰子，六個結果等可能，偶數佔三個，P(偶數) = 3/6 = 1/2。整套機率論最早就是這樣數出來的——Pascal 跟 Fermat 1654 年在算分賭注問題（ch01）時，本質上就是在窮舉等可能的未來、數比例。\n\n這張臉的美在於它**完全不需要做實驗**。你不用真的擲一萬次硬幣，光憑「兩面對稱、沒有理由偏袒任一面」就能斷言 1/2。機率在這裡是一種**先驗的、靠純推理得到的東西**，乾淨、確定、一翻兩瞪眼。對工程師來說，這像是「靠系統的對稱結構推出行為，不用實測」——例如你知道一個 consistent hashing 環是均勻的，不用打流量就能說每個節點分到大約 1/N。\n\n但你大概已經聞到味道了。整個古典詮釋壓在一個詞上：**等可能**。憑什麼六個面等可能？憑什麼兩面等可能？\n\n答案是：憑「我找不到理由說它們不等可能」。這就是**無差別原則（principle of indifference）**——如果你沒有任何理由相信某個結果比另一個更容易發生，就把它們當成等可能。這個名字是凱因斯（Keynes）1921 年取的；更老的講法叫「不充分理由原則（principle of insufficient reason）」，經拉普拉斯（Laplace）發揚，源頭可追到雅各布·伯努利（Jacob Bernoulli）的《推測術》（2026-06，名稱沿革已查證）。\n\n聽起來無懈可擊，對吧？沒理由偏袒，就一視同仁，這不是最公道的嗎。\n\n問題是：**「等可能」是一個假設，不是一條定理。** 它不是從天上掉下來的真理，是你硬塞進去的前提。骰子等可能，是因為它做得夠對稱、夠均勻——這是一個關於**物理世界**的經驗主張，不是邏輯必然。一顆灌了鉛的骰子，六個面照樣是六個「結果」，但 P 早就不是 1/6 了。古典詮釋對這種骰子束手無策，因為它根本沒有「不對稱」的處理方式——它只會數面。\n\n更糟的是，當結果**多到無窮**的時候，「等可能」這個詞會直接崩給你看。這是本章最該停下來看的一頁。\n\n## 無差別原則的甜蜜陷阱：Bertrand 悖論\n\n1889 年，法國數學家貝特朗（Joseph Bertrand）在他的《機率演算》裡丟出一個問題，把無差別原則的底褲扒了下來（照 landscape，1889）。問題長這樣：\n\n> 在一個圓裡面，畫一條**隨機的**弦。這條弦比圓內接正三角形的邊還長的機率是多少？\n\n聽起來很無辜。內接正三角形是固定的，弦是隨機的，我們要算 P(弦 > 三角形邊長)。用無差別原則，所有弦「等可能」，數一數比例就好。\n\n問題是——「隨機畫一條弦」這句話，根本沒講清楚你**怎麼隨機**。而不同的隨機方式，給出不同的答案。貝特朗給了三種都「同樣合理」的隨機化，各得一個數：\n\n```text\n隨機化方法              做法                          P(弦 > 邊長)\n─────────────────────────────────────────────────────────────\n隨機端點法    在圓周上隨機選兩點、連成弦              1/3\n隨機半徑點法  隨機選一條半徑、在半徑上隨機選點、       1/2\n              過該點作垂直於半徑的弦\n隨機中點法    在圓內隨機選一點當弦的中點              1/4\n─────────────────────────────────────────────────────────────\n```\n\n三個答案：1/3、1/2、1/4。三種做法每一種都「沒有理由偏袒任何一條弦」，每一種都老老實實在用無差別原則，卻給出三個不一樣的機率（三個數字照 landscape 與本章查證，均確認）。\n\n這不是有人算錯。三個都算對了。錯的是**問題本身**——「隨機選一條弦」這句話有歧義，因為「弦的集合」是無窮的，而在無窮集合上，「均勻」「等可能」這些詞**沒有唯一的意思**。你說「均勻地在端點上選」跟「均勻地在中點上選」，這是兩種不同的均勻，會給不同的分布。無差別原則偷偷假設了「等可能」是個明確概念，但在無窮樣本空間上它根本不明確。\n\n我認為這是本章最值得你停十分鐘的地方，因為你的直覺正要騙你。直覺說「沒理由偏袒 = 答案唯一」，這在有限、對稱的世界（硬幣、骰子）是對的——六個面就是六個面，數得清楚。但一旦結果是連續的、無窮的，「沒理由偏袒」這句話自己就有好幾種詮釋，沒講清楚是哪一種之前，問題根本沒有答案。\n\n對工程師我這樣翻譯：**「隨機」這個詞，跟「快取」一樣，不指定策略就是沒定義。** 你跟同事說「隨機選一台機器」，他會立刻反問「怎麼隨機？均勻隨機？加權？一致性雜湊？」——因為他知道「隨機」不是一個操作，是一族操作。Bertrand 悖論就是有人在數學裡漏寫了 random 的實作策略，然後驚訝於三個人跑出三個結果。連續樣本空間上「機率到底怎麼定義才嚴謹」這個坑，最後是靠測度論填的，那是 ch22 門口才會一句話帶到的東西。這裡你只需要帶走一句：**等可能是奢侈品，不是免費的。**\n\n## 第二張臉：頻率——機率是長期數出來的\n\n如果古典詮釋的毛病是「等可能憑空假設」，那很自然的下一步是：別假設了，去**數**。\n\n頻率詮釋（frequentist interpretation）說：一個事件的機率，是「把這個實驗重複非常多次時，該事件發生的相對頻率所趨近的那個值」。\n\n```text\nP(A) = lim(n→∞) (A 在前 n 次實驗中發生的次數 / n)\n```\n\n擲硬幣 P(正) = 1/2，不是因為對稱，而是因為**你擲得夠多，正面比例會趨近 0.5**。這張臉是經驗的、後驗的、踏實的——機率變成一個關於真實世界長期行為的客觀事實，跟你信不信無關。一顆灌鉛骰子？沒問題，擲一萬次數一數，P(六點) = 0.27 就 0.27，頻率詮釋一點都不在乎你有沒有「對稱的理由」。\n\n這正是你監控面板上「歷史錯誤率 0.1%」的詮釋。它不是靠對稱推出來的（API 哪來的對稱），是靠累計計數除出來的。你的 counter、rate、P99——這些工程量背後的機率觀全是頻率派的。SRE 的世界基本上是頻率派的世界：我們相信「跑得夠久，量出來的比率就是真相」。\n\n頻率詮釋看起來最科學、最沒爭議，但它有兩個你必須誠實面對的軟肋。\n\n**第一個軟肋：那個 `lim(n→∞)` 是個承諾，不是觀察。** 你永遠擲不到無窮次。你憑什麼相信「擲越多，比例越穩」？這個「相對頻率會收斂」的信念，本身需要被證明——而它正是**大數法則（law of large numbers）**要保證的東西。換句話說，頻率詮釋的地基不在頻率詮釋自己手上，它要等到 ch13 雅各布·伯努利 1713 年的大數法則才被正當化。在那之前，「擲越多越準」只是一個美麗的、被觀察支持的、但還沒被證明的信仰。本書刻意把它擺在這裡先欠著，到 ch13 還你。\n\n**第二個軟肋，而且更致命：對「只發生一次」的事件，頻率詮釋直接失語。** 「這次部署會出事的機率」——這次部署只有一次，沒有「重複很多次的長期頻率」可言。「2026 年人類會不會發生某件特定大事的機率」——歷史不會重播一萬次讓你數。「這位被告有罪的機率」——這個人要嘛有罪要嘛沒有，不是一個可重複的實驗。對所有這些單一、不可重複的事件，頻率詮釋會聳聳肩說「這個問題沒有意義」。\n\n但你心裡明明有一個數。你按部署按鈕前真的會掂量「這次大概多大機率出事」。那個數是真實的、有用的、會影響你決策的。它只是不屬於頻率這張臉。它屬於第三張。\n\n## 第三張臉：主觀——機率是信念的強度\n\n主觀詮釋（subjective interpretation），也叫貝氏詮釋（Bayesian interpretation），把機率定義成一個**心智狀態**：P(A) 是「**你**對 A 會發生的相信程度（degree of belief）」，是你願意為「A 發生」下注的賠率。\n\n這聽起來危險地不科學——機率怎麼能是「我覺得」？這不就退化成隨便講講了嗎？\n\n不是。這張臉的厲害之處在於：**主觀不等於隨便。** 你的信念可以是主觀的，但它必須是**自洽的**——你對各個事件的信心，不能互相矛盾到讓人能穩賺你的錢。這就是著名的 **Dutch book 論證**（ch06 會正式帶）：如果你的信念違反機率規則（比方你同時相信 P(A)=0.6 又相信 P(非 A)=0.6，加起來 1.2），那麼一個聰明的對手可以設計一組賭注，讓你**無論結果如何都輸錢**。要避免被這樣穩定套利，你的信念就**必須**滿足機率公理。換句話說：理性的信念，自動長成機率的形狀。這就是主觀詮釋的數學正當性——不是「機率碰巧能描述信念」，是「自洽的信念別無選擇，只能是機率」。\n\n這張臉是你「部署會出事的機率 0.1%」的家，也是貝氏世界觀（Part II）的整個基礎——先驗（prior）是看資料前的信念，後驗（posterior）是看了資料後更新的信念，機率在這裡是會被證據推動的、活的數值。你做 incident 診斷時的「我懷疑七成是 DB 問題」、feature flag 灰度放量時的「這版本應該安全」——全是主觀機率在運作。\n\n而且——這是第二個驚嘆點——**同一個 1/2，三張臉可以同時讀。** 來看脊椎硬幣。\n\n## 脊椎硬幣：同一個 P(正)=1/2 的三種讀法\n\n全書有一枚貫穿的公正硬幣（這是 ch01 登場、ch23 總對帳的那一枚）。現在我們第一次把它放到顯微鏡下：`P(正) = 1/2` 這六個字符，三張臉各讀一遍，每一遍意思都不同，但數值一模一樣。\n\n```text\n古典讀法：硬幣兩面、對稱、沒有理由偏袒任一面，\n          所以正面佔等可能結果的一半 → P(正) = 1/2。\n          （純推理，一次都不用擲）\n\n頻率讀法：把這枚硬幣擲非常多次，正面出現的相對頻率\n          會趨近 0.5 → P(正) = 1/2。\n          （經驗事實，靠大數法則保證，ch13 才嚴格）\n\n主觀讀法：我對「下一擲是正面」的相信程度是一半一半，\n          我願意以 1:1 的賠率下注 → P(正) = 1/2。\n          （我的信念，自洽即合法）\n```\n\n三句話，三種世界觀：一個是「世界的對稱結構」，一個是「世界的長期行為」，一個是「我腦中的信心」。它們對這枚公正硬幣**恰好給出同一個數**——這正是公正硬幣這麼適合當教學起點的原因：它是三張臉難得**完全重合**的甜蜜點。\n\n但別被這個甜蜜點騙了。它們之所以重合，是因為硬幣同時滿足三邊的條件：它對稱（古典開心）、它可以重複擲（頻率開心）、我對它沒有偏見（主觀開心）。一旦事件失去其中一個性質，三張臉就分道揚鑣——灌鉛骰子沒有對稱（古典死），一次性部署不能重複（頻率死），它們各自只剩下能活的那張臉。三張臉不是同一個東西的三種說法，是**三個適用範圍不同的工具**，恰好在公正硬幣這裡交會。\n\n那麼問題來了：如果三張臉是三種不同的東西，憑什麼我們敢用**同一套**加法、乘法、餘事件去算它們，還不出錯？\n\n## 把三張臉縫在一起的那三條：Kolmogorov 公理\n\n答案是 1933 年。在那之前，機率論已經被用了快三百年——賭桌、保險、天文觀測誤差、統計力學——但它一直沒有一個乾淨的地基。「機率到底是什麼」這個問題，各派吵成一團，古典派數對稱、頻率派數次數、主觀派講信念，誰也說服不了誰。機率像一棟蓋了三百年、住滿了人、但沒有打地基的房子。\n\n俄國數學家柯莫哥洛夫（Andrei Kolmogorov）做了一件釜底抽薪的事。他在 1933 年的《機率論基礎》（Grundbegriffe der Wahrscheinlichkeitsrechnung）裡說：別吵了。我不告訴你機率「是」什麼，我只告訴你它必須「滿足」什麼。機率，**就是任何滿足底下這幾條規則的東西**（照 landscape，1933，已查證）：\n\n```text\n公理一（非負性）：     對任何事件 A，  P(A) ≥ 0\n                       機率不能是負的。\n\n公理二（規範性）：     P(Ω) = 1\n                       整個樣本空間的機率是 1\n                       （某個結果一定會發生）。\n\n公理三（可加性）：     若 A、B 互斥（不會同時發生），\n                       則 P(A ∪ B) = P(A) + P(B)\n                       互斥事件的「或」，機率直接相加。\n                       （嚴格版要求可數無窮個互斥事件也能加，\n                        這條叫可數可加性，是測度論的入口，\n                        本書到 ch22 才一句話帶它的動機。）\n```\n\n就這樣。三條（嚴格說第三條的可數無窮版讓它常被算成「四公理」，但精神是三件事）。從這三條，機率論其餘**所有**定理都能推出來——P(∅)=0、P(Aᶜ)=1−P(A)（餘事件，ch03）、容斥原理、貝氏定理（ch05）、大數法則（ch13）、中央極限（ch14），全部。Euclid 用五條公設撐起整個幾何，Kolmogorov 用這三條撐起整個機率。\n\n這就是本章最大的驚嘆點，而且我認為它了不起的地方常被講漏。一般人說「Kolmogorov 把機率公理化了」，好像只是把房子的地基補上、讓數學家睡得安穩。但真正的魔法是這個：**這三條公理同時是三張臉的最大公因數。**\n\n- 古典詮釋（k/N 數對稱）滿足這三條嗎？滿足。次數非負（公理一）、全部結果加起來是 N/N=1（公理二）、互斥事件的有利結果數直接相加（公理三）。✓\n- 頻率詮釋（長期相對頻率）滿足嗎？滿足。頻率非負、總頻率是 1、互斥事件的次數相加。✓\n- 主觀詮釋（自洽信念）滿足嗎？滿足——而且這正是 Dutch book 論證的結論：**自洽的信念被迫滿足這三條**，否則會被套利。✓\n\n所以三張臉不是三個對手，是同一套公理的三個**模型**（model，在邏輯學意義上）。它們對「機率是什麼」的回答天差地別，但對「機率該怎麼算」的回答**完全一致**——因為三個都得服從這三條。這就是為什麼你可以用同一個加法、同一個乘法去算「歷史錯誤率」和「部署會出事的信心」而不會穿幫：它們是同一個 interface 的不同 implementation，而你寫的所有機率定理都是針對 interface 寫的。\n\n```text\n      ┌───────────────────────────────────┐\n      │     Kolmogorov 三公理（1933）      │\n      │       = 機率的 interface           │\n      │    非負 ／ 全空間為 1 ／ 可加        │\n      └─────────────────┬─────────────────┘\n                        │  實作這個 interface 的三種方式\n      ┌─────────────────┼─────────────────┐\n      │                 │                 │\n   古典詮釋          頻率詮釋          主觀詮釋\n  （數對稱）        （數次數）        （自洽信念）\n   k ／ N         lim 相對頻率      下注的賠率\n```\n\n公理化把「機率是什麼」（哲學問題，三派各執一詞）跟「機率怎麼算」（數學問題，三派完全同意）**乾淨地切開了**。這是工程師最該欣賞的一步棋：定義好 interface，實作之間的宗教戰爭就不再阻礙你寫共用程式碼。Kolmogorov 沒有解決三派的哲學分歧——那場分歧到今天還在（頻率派 vs 貝氏派的世紀分裂，ch06 當故事講）——他只是讓它**不再影響運算**。你愛信哪張臉是你的自由；只要數字滿足那三條，算出來的結果就跟另外兩派一字不差。\n\n## 直覺的陷阱\n\n機率三張臉這個主題，最容易在幾個地方把你帶溝裡。這裡的每一條都不是冷知識，是會讓你（或讓新聞、讓法庭、讓論文）真的做出錯誤推論的陷阱。\n\n| 陷阱 | 錯誤直覺 | 哪一步出錯 | 自我察覺的徵兆 |\n|---|---|---|---|\n| **把「等可能」當定理** | 「沒理由偏袒，所以一定等可能、答案唯一」 | 把一個關於物理世界的**經驗假設**（這骰子真的對稱嗎）當成邏輯必然；在無窮樣本空間上更直接崩潰（Bertrand） | 你說「顯然等可能」卻說不出「憑什麼」；或你在連續/無窮情境用「隨機」卻沒指定怎麼隨機 |\n| **混用三張臉而不自覺** | 對一個**只發生一次**的事件講「長期頻率」，或對一個可重複過程硬塞「我覺得」 | 沒先問「這個機率是哪張臉」就開始算，結果詮釋跟事件性質對不上 | 你被問「這個 0.1% 是歷史數據還是你的判斷」時答不出來 |\n| **以為公理化選了邊** | 「Kolmogorov 證明了頻率派/貝氏派才對」 | 公理化**對三派中立**，它只規定運算、不裁決詮釋；它讓分歧不影響計算，不是消滅分歧 | 你以為「數學家已經決定機率是頻率（或信念）了」——沒有，那場仗還在打 |\n| **無窮裡的均勻幻覺** | 「在無限大的集合上均勻隨機選，意思很清楚」 | 無窮集合上「均勻」沒有唯一定義，換個參數化就換個分布（Bertrand 的三個答案） | 你算出一個「應該唯一」的機率，但換個自然的算法得到不同數，而兩邊都對 |\n\n最值得你內化的一條是第二條：**任何時候看到一個機率，先問它是哪張臉。** 這個習慣會讓你在讀新聞（「明天 70% 降雨」是頻率還是主觀？）、讀論文（這個 p 值背後是哪種機率觀？ch18）、讀法庭證詞（「兇手是他的機率」——這是檢察官謬誤的溫床，ch05）時，自動慢下來。機率最常騙人的地方，不是算錯，是**算對了但詮釋錯了**。\n\n## 紙上推演\n\n### 題目一：脊椎硬幣的三句話 **[10 分鐘] ★**\n\n對「這枚硬幣 P(正)=1/2」這個陳述，**不准看前面**，自己各寫一句話，分別用古典、頻率、主觀三張臉解讀。寫完後，再加一個難一點的：說出在什麼情況下，這三句話會**不再給同一個數**，各舉一個例子。\n\n#### 推演解答\n\n三句話（你的用字不必跟我一樣，但意思要到位）：\n\n- **古典**：硬幣有正反兩面、對稱、沒有理由偏袒任何一面，正面是兩個等可能結果中的一個，所以 P(正)=1/2。重點詞：對稱、等可能、不用實驗。\n- **頻率**：把這枚硬幣擲非常多次，正面出現的相對頻率會趨近 0.5，這個極限值就是 P(正)=1/2。重點詞：重複、長期、相對頻率、極限。\n- **主觀**：我對「下一擲是正面」的相信程度是一半一半，願意以 1:1 賠率對賭，所以 P(正)=1/2。重點詞：信念、賠率、自洽。\n\n什麼時候三句話**分家**：\n\n- **古典死掉**：拿一顆灌了鉛的骰子（或一枚做歪的硬幣）。它還是有六個面/兩個面，但沒有對稱，古典詮釋給不出有意義的數（它只會死板地說 1/6 或 1/2，而那是錯的）。頻率（擲一萬次數）跟主觀（你對它的判斷）還活著。\n- **頻率死掉**：「下一個登月任務成功的機率」。這個任務只發生一次，沒有「重複很多次的長期頻率」，頻率詮釋失語。但古典（如果你硬要對稱論證，通常不適用）跟主觀（工程師對它的信心）還能講話——這種一次性事件其實只有主觀那張臉真正能用。\n- **主觀理論上總能講**，但別人不一定同意你的數——主觀機率允許不同的人對同一事件有不同的（各自自洽的）信念，這正是它被頻率派批評的點，也是貝氏更新（ch06）的起點。\n\n帶走的一句話：三張臉在公正硬幣這裡重合，是因為硬幣同時對稱、可重複、無偏見。失去任何一個條件，就只剩下能活的那張臉。\n\n### 題目二：抓出 Bertrand 偷渡的那一步 **[15 分鐘] ★★**\n\n有人跟你說：「圓裡隨機畫一條弦，它比內接正三角形邊長的機率，用無差別原則一算就是唯一答案。」但我們知道貝特朗給了 1/3、1/2、1/4 三個答案。請用自己的話，精確指出無差別原則在**哪一步**偷渡了一個未定義的東西——不要只說「結果不唯一」，要說出**為什麼**會不唯一。\n\n#### 推演解答\n\n破綻在「**隨機畫一條弦**」這句話本身——它假裝「隨機」是一個明確的操作，但其實沒有指定**用什麼東西當均勻分布的對象**。\n\n關鍵在於：一條弦可以用好幾種不同的東西來「參數化」（描述）——\n\n- 用它的**兩個端點**在圓周上的位置來描述；\n- 用它的**中點**在圓內的位置來描述；\n- 用「一條半徑＋弦在半徑上的位置」來描述。\n\n無差別原則說「等可能」，但等可能是**對誰**等可能？對端點均勻，不等於對中點均勻，也不等於對半徑點均勻——因為這三種參數之間的對應**不是線性的**，一邊均勻換算到另一邊就變不均勻了。於是「均勻地隨機選一條弦」在你還沒講「均勻在哪個參數上」之前，**根本沒有定義**。三種選法各自誠實地用了無差別原則，但用在三個不同的參數空間，所以給三個答案。\n\n偷渡發生的那一步精確地說：**從「我沒理由偏袒任何一條弦」跳到「所以弦是均勻分布的」這一跳。** 這一跳在有限樣本空間（六個面）是安全的，因為「結果」只有一種數法；但在連續/無窮樣本空間，「結果」可以用無窮多種互不相容的方式參數化，「均勻」這個詞於是失去唯一意義。無差別原則沒有錯，是它被用到了一個它管不住的地方。\n\n工程師版的破綻陳述：`random()` 這個函式必須先綁定一個分布才有意義。`uniform over endpoints` 跟 `uniform over midpoints` 是兩個不同的 `random()` 實作，回傳不同的弦分布。Bertrand 的三個人各自呼叫了不同的實作，然後驚訝結果不一樣——但問題不在數學，在於原始需求「隨機畫一條弦」漏寫了規格。\n\n### 題目三：把你工作中的「機率」歸到三張臉 **[10 分鐘] ★★**\n\n挑三個你工作中真的用過「機率/比率/可能性」的場景，把每一個歸類到古典、頻率、主觀其中一張臉，並說出你怎麼判斷。如果有場景三張臉都沾一點，把它拆開。\n\n#### 推演解答\n\n這題沒有標準答案，重點是**判斷的方法**。判斷準則很簡單，照這三問走：\n\n```text\n問題一：這個數是靠「結構對稱」推出來的？  → 古典\n問題二：這個數是靠「重複很多次數出來」的？ → 頻率\n問題三：這個數是「對單一事件的判斷信心」？  → 主觀\n```\n\n幾個典型場景示範（你的清單會不同）：\n\n- **「過去 30 天 API 錯誤率 0.1%」**：靠累計計數除出來、可重複觀察 → **頻率**。乾淨俐落。\n- **「這次部署大概千分之一會出事」**：一次性事件、不能重複、是你綜合判斷的信心 → **主觀**。注意它跟上面那個 0.1% 數字可能一樣，但完全是另一張臉。\n- **「consistent hashing 環下每個節點分到約 1/N 的 key」**：靠雜湊函式的均勻性（結構對稱）推出來、不用打流量 → **古典**（嚴格說是「假設雜湊均勻」的古典論證；一旦你去實測命中分布，就切換成頻率派在驗證這個假設）。\n- **負載測試找出的「P99 延遲」**：靠重複打很多請求、數出第 99 百分位 → **頻率**。\n- **「這台機器接下來一小時內掛掉的機率」**：如果你用的是這型機器的歷史故障率，那是頻率；如果是你看著它現在的詭異指標下的直覺判斷，那是主觀。**同一句話，看你的數字哪裡來，臉就不同。**\n\n最有價值的領悟是最後這條：**同一個機率陳述，臉由「數字的來源」決定，不由「事件的措辭」決定。** 養成看到機率先追問「這個數字哪來的」的習慣，你就自動分得清三張臉——而這正是 ch05 不掉進檢察官謬誤、ch18 不誤讀 p 值的底層免疫力。\n\n## Worked example：兩個小孩問題——答案藏在你沒講清楚的樣本空間裡\n\n這是本章的招牌題，因為它把「機率的答案取決於你怎麼界定樣本空間」這件事，逼到你臉上。題目來自馬丁·加德納（Martin Gardner）1959 年 10 月《科學人》的數學遊戲專欄（照 landscape，已查證；加德納本人後來承認此題有歧義）。題目：\n\n> 某人有兩個小孩。**已知至少有一個是男孩。** 兩個都是男孩的機率是多少？\n\n直覺有兩種，吵得不可開交。一派說 1/2（「另一個不是男就是女，一半一半啊」），一派說 1/3。誰對？\n\n**兩派都對——取決於你怎麼得知「至少有一個男孩」這件事。** 機率的答案不在題目的字面裡，在你**沒講清楚的那個樣本空間**裡。我們把兩種界定並排攤開。\n\n**界定 A：從「至少有一個男孩的兩孩家庭」裡隨機抽一家。**\n\n先列出兩個小孩（依出生順序）的完整樣本空間。每個小孩男(B)女(G)各半、兩胎獨立，四種等可能：\n\n```text\n完整樣本空間 Ω（老大, 老二）：\n  (B, B)   (B, G)   (G, B)   (G, G)     各佔 1/4\n```\n\n「至少有一個男孩」這個條件，把 (G, G) 排除掉。剩下的樣本空間：\n\n```text\n條件後的樣本空間：\n  (B, B)   (B, G)   (G, B)     ← 三種，仍各等可能\n  ───────\n  「兩個都是男孩」= (B, B) 只佔其中 1 種\n\n  P(兩個都男 | 至少一個男) = 1 / 3\n```\n\n答案 **1/3**。為什麼不是 1/2？因為「至少一個男孩」這個資訊**砍掉了 (G,G)、但留下了 (B,G) 和 (G,B) 兩種混合**——而混合的情況比「兩個都男」多一倍。你的「一半一半」直覺暗中假設了兩個小孩有「被指定的那個」和「另一個」之分，但這個條件沒有指定是哪個小孩是男孩，所以 (B,G) 和 (G,B) 都還在檯面上。\n\n**界定 B：隨機挑這家的一個小孩來看，發現他是男孩。**\n\n這次的隨機程序不一樣。你不是「篩選家庭」，你是「在一個兩孩家庭裡隨機選一個小孩、發現是男的」。把這個程序攤開，等可能的「(家庭組成, 你看到的小孩)」是這些：\n\n```text\n家庭      隨機看到的小孩    這個分支發生機率\n─────────────────────────────────────────\n(B, B)    看到 B（必然）         1/4\n(B, G)    看到 B                 1/4 × 1/2 = 1/8\n(B, G)    看到 G                 1/4 × 1/2 = 1/8\n(G, B)    看到 B                 1/4 × 1/2 = 1/8\n(G, B)    看到 G                 1/4 × 1/2 = 1/8\n(G, G)    看到 G（必然）         1/4\n```\n\n現在條件是「你看到的那個是男孩」，把所有「看到 G」的分支劃掉，剩下：\n\n```text\n家庭      看到 B 的分支機率      這家是不是「兩個都男」\n─────────────────────────────────────────────────\n(B, B)         1/4 = 2/8           是\n(B, G)         1/8                 否\n(G, B)         1/8                 否\n─────────────────────────────────────────────────\n看到男孩的總機率 = 2/8 + 1/8 + 1/8 = 4/8 = 1/2\n\nP(兩個都男 | 看到的是男) = (2/8) / (4/8) = 2/4 = 1/2\n```\n\n答案 **1/2**。\n\n兩個答案並排：\n\n```text\n界定                              樣本空間怎麼縮             答案\n──────────────────────────────────────────────────────────────\nA：篩「至少有一個男孩」的家庭     {BB, BG, GB}，BB 佔 1/3    1/3\nB：隨機看一個小孩、剛好是男孩     BB 的權重加倍（兩次都看得到）1/2\n──────────────────────────────────────────────────────────────\n```\n\n差別到底在哪？在 **(B,B) 這個家庭被「發現有男孩」的方式不一樣**。界定 A 只問「這家有沒有男孩」，(B,B) 跟 (B,G)、(G,B) 一樣是「有」，一視同仁、權重一樣。界定 B 是「隨機抽一個小孩來看」，(B,B) 這家**怎麼抽都會抽到男孩**（機率 1），而 (B,G)、(G,B) 這家只有一半機率抽到男孩——於是 (B,B) 在「看到男孩」的條件下被加倍計重，把答案從 1/3 推回 1/2。\n\n這就是本題的全部教訓，也是整章的縮影：**機率的答案不是寫在事件裡，是寫在「你怎麼界定樣本空間、怎麼得知資訊」裡。** 題目說「已知至少有一個男孩」這句話，本身沒有指定**你是怎麼知道的**——是篩家庭知道的，還是抽小孩看到的？沒講。沒講，答案就不唯一。這跟 Bertrand 悖論是**同一種病**：「隨機」「已知」這些詞，不指定背後的程序，問題就沒有定義良好。\n\n我認為這題了不起的地方，可以這樣對另一個工程師轉述：**這不是腦筋急轉彎，是在演示「規格不完整的需求沒有唯一正解」。** 你接過太多「就把資料隨機分一下」這種需求，每次都得反問「隨機怎麼隨機」——因為你知道答案藏在沒講清楚的程序裡。兩個小孩問題只是把這件事放大到讓兩派人吵起來。誰都沒算錯，錯的是題目假裝自己講清楚了。\n\n（這題會在 ch04 條件機率、ch05 貝氏定理回來——到時你會看到，把「怎麼得知資訊」算進去，正是條件機率與貝氏更新在做的事。）\n\n## 自我檢核\n\n口頭回答，講得出來才算過關。優先答「為什麼」。\n\n1. 同一個「P(正)=1/2」的三張臉各是什麼意思？用一句話分別講古典、頻率、主觀，並說出它們**為什麼在公正硬幣這裡剛好相等**。\n2. 「等可能」是假設還是定理？你怎麼向一個說「沒理由偏袒所以一定等可能」的人，用 Bertrand 悖論證明他在無窮的情況下會翻車？\n3. Kolmogorov 三公理是哪三條？為什麼說「公理化把『機率是什麼』跟『機率怎麼算』切開了」——這個切開為什麼對三派的和平共處至關重要？\n4. 為什麼頻率詮釋對「這次部署會出事」這種一次性事件失語？哪張臉才是它的家？\n5. 主觀機率「主觀但不隨便」，那個「不隨便」是什麼東西在約束它？（提示：被穩賺套利）\n6. 兩個小孩問題裡，1/3 跟 1/2 的差別到底出在哪一步？為什麼說這跟 Bertrand 悖論「是同一種病」？\n7. 為什麼「看到一個機率，先問它是哪張臉」是一個值得養成的工程習慣？它幫你擋掉後面哪些章的陷阱？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy,「Interpretations of Probability」**（plato.stanford.edu，2026-06 可查）——三張臉（其實哲學上分得更細：古典、頻率、傾向、邏輯、主觀）最權威也最易讀的整理。想把本章的「三張臉」升級成「五張臉」、看哲學家怎麼吵，讀這篇的 frequentist 與 subjectivist 兩節。\n- **Stanford Encyclopedia of Philosophy,「The Principle of Indifference」相關條目與 J. Norton 的 paradox 講義**（sites.pitt.edu/~jdnorton，2026-06 可查）——無差別原則為什麼又甜又毒、Bertrand 之外還有哪些它翻車的例子。讀完你對「等可能是奢侈品」會有更深的體感。\n- **Wikipedia,「Bertrand paradox (probability)」**（2026-06 可查）——三種隨機化的圖解清楚，附動畫直覺。看它的三張圖，比任何文字都快讓你明白「均勻在哪個參數上」是怎麼回事。\n- **Wikipedia,「Boy or girl paradox」**（2026-06 可查）——兩個小孩問題的完整歷史與各種變體（包括「至少一個男孩、且生在星期二」這種更邪門的版本）。讀「Information about the child」那節，看資訊的取得方式如何改變答案。\n- **柯莫哥洛夫《機率論基礎》（Grundbegriffe，1933）的導讀**——原書是德文且偏測度論，不必硬啃；找 Shafer & Vovk「The origins and legacy of Kolmogorov's Grundbegriffe」（arxiv.org/abs/1802.06071，2026-06 可查）這篇導讀，看公理化當年到底解決了什麼焦慮。本書 ch22 會在測度論門口跟它再會一次。\n- 三張臉的「頻率派 vs 貝氏派世紀分裂」會在 **ch06** 當故事講；無差別原則在貝氏裡變成「無資訊先驗」的難題，也在 ch06 回來。本章只是把舞台搭好。\n"}, {"id": "ch03-combining-events", "file": "ch03-combining-events.md", "group": "Part I — 機運的語言", "title": "ch03 — 把事件組合起來：加法、餘事件、容斥", "md": "# ch03 — 把事件組合起來：加法、餘事件、容斥\n\n> **本章解決什麼問題**：ch02 給了你機率的三張臉與三條公理，但那是「單一事件」的層級。真實世界的問題幾乎都是組合的——「至少一台機器當機」「至少一個請求逾時」「兩人撞生日」，這些都不是單一事件，而是好幾個事件用「且」「或」「非」黏起來的複合體。本章教你把這些黏法算對，而且只用公理推得出來、不需要任何新假設。它也是 ch04（條件與獨立）的暖身：這裡你會第一次認真用到乘法，但**刻意先假設獨立、把獨立的微妙留給下一章**。本書最有名的反直覺案例之一——生日問題——在這裡完整破解。\n\n## 從你已知的出發\n\n你天天在算組合事件，只是沒把它寫成機率。\n\n「這個 batch job 跑 200 個 task，每個失敗率 0.5%，整批至少掛一個的機率多少？」你直覺知道答案不是 0.5%，是高得多——但具體多高、為什麼，你大概沒算過。「兩個 AZ 的備援都掛掉」是交集；「至少一個健康檢查失敗」是聯集；「這次重試全部沒成功」是一連串失敗的乘法。這些黏法你每天在腦袋裡毛估，本章把它變成你能在白板上推給同事看的東西。\n\n有一個體感你早就有了：**規模一大，罕見事件就變成常態**。單一請求逾時的機率小到可以忽略，但你一秒打十萬個請求，「這一秒內至少有一個逾時」幾乎是必然——這就是為什麼你的 dashboard 上 P99.9 永遠有東西在閃。尾端不是壞運氣，是算術。一個事件單次機率再小，只要你重複夠多次，「至少發生一次」就會悄悄爬過 50%、然後逼近 1。這章會給你一個公式，讓你能算出「重複幾次之後，這件罕見的事就由稀客變成常客」——而那個次數，通常比你猜的小得驚人。\n\n還有一個反過來的體感：你以為兩個獨立備援「同時掛掉」的機率是兩個小機率相乘、小到不用擔心——這個乘法本章會教你算，但**它對不對，取決於那個「獨立」是真的還是你一廂情願**。本章先用「真獨立」把乘法練熟，下一章再來拆穿「假獨立」如何讓真實 outage 鑽你空子。\n\n先校準一下：這章用到的組合計數（C(n,k)，n 取 k）你大學看過。本章只把它當成一個你已經認得的記號快速擦亮，**不開排列組合課**——那會把這本書變成考試解題訓練，那不是我們要的（細節真要補，見延伸閱讀）。\n\n## 三個黏法：交集、聯集、餘事件\n\n機率裡的事件就是樣本空間 Ω 的子集合，所以「組合事件」本質上就是集合運算。三個黏法，對應三個你早就會的邏輯詞：\n\n- **交集（intersection）** A∩B —— 「A 且 B」，兩件事都發生。\n- **聯集（union）** A∪B —— 「A 或 B」，至少一件發生（注意：機率裡的「或」是包含性的，A 發生、B 發生、兩個都發生，全算）。\n- **餘事件（complement）** Aᶜ —— 「非 A」，A 沒發生。\n\n餘事件最便宜，先講它，因為它是本章的主力武器。從公理 P(Ω)=1，而 A 與 Aᶜ 互斥、合起來就是整個 Ω，所以：\n\n```text\nP(Aᶜ) = 1 − P(A)      ← 一條線，但它是本章最常用的一招\n```\n\n這條看起來幼稚到不值得寫下來，但它是整章的引擎。原因很簡單：**很多問題的反面比正面好算太多**。「至少一個」攤開來算是一場惡夢（恰好一個、恰好兩個、恰好三個……全部加起來），但它的反面只有一種情形——「一個都沒有」。後面你會看到，生日問題和「至少一次逾時」都是被這條一行公式撬開的。\n\n## 加法：互斥與不互斥，差在一個重疊\n\n聯集 P(A∪B) 怎麼算？這裡是大家第一個踩的坑。\n\n如果 A 和 B **互斥（mutually exclusive）**——不可能同時發生，A∩B=∅——那聯集就是單純相加：\n\n```text\nP(A∪B) = P(A) + P(B)      ← 只在互斥時成立\n```\n\n這正是 ch02 那條公理（互斥事件機率可加）。例：擲一顆骰子，「點數是 3」和「點數是 5」互斥，P(3 或 5)=1/6+1/6=2/6。乾淨俐落。\n\n但大多數時候 A 和 B **不互斥**——它們有重疊。這時候你不能直接加，因為重疊的部分被你數了兩次。正確的式子是**容斥原理（inclusion-exclusion principle）**：\n\n```text\nP(A∪B) = P(A) + P(B) − P(A∩B)      ← 把重疊的部分扣回來一次\n```\n\n直覺是純粹的數數。想像你把 A 區域裡所有結果的機率加一遍、再把 B 區域加一遍——落在重疊 A∩B 裡的結果就被你加了兩次，所以要扣掉一次。多扣？不會，重疊只被多算了一次，所以只扣一次剛好。互斥只是 P(A∩B)=0 的特例，這兩條其實是同一條。\n\n```text\n        ┌───────────────┐\n        │   A           │\n        │       ┌───────┼───────┐\n        │       │ A∩B   │       │\n        │       │ (加了 │       │\n        └───────┼  兩次)│   B   │\n                │       │       │\n                └───────┴───────┘\n   P(A∪B) = P(A) + P(B) − P(A∩B)\n            ↑      ↑      ↑\n          整塊A  整塊B  扣掉被算兩次的中間\n```\n\n工程例子：一個請求可能「逾時」（A，機率 0.03）或「回 5xx」（B，機率 0.02），而有些逾時的請求最後也被記成 5xx（重疊，A∩B，機率 0.01）。「這個請求出事（逾時或 5xx）」的機率是 0.03+0.02−0.01=0.04，不是 0.05。你要是忘了扣那 0.01，就會系統性高估錯誤率——把同一批壞請求算了兩遍。\n\n三個以上事件時容斥會長出更多項（加單個、扣兩兩重疊、補三個一起的重疊……正負交錯），但本書不展開那個一般式——你需要它的時候，會發現用餘事件繞過去通常更省力，下一節就是。\n\n> **小史**：容斥這招通常歸給棣美弗（de Moivre），出現在他 1718 年的《The Doctrine of Chances》（史上第一本機率教科書）裡，他用它處理「巧合」類問題（兩副牌洗開有沒有同位置同張的經典題）。不過嚴格的一般公式更晚——達席爾瓦（Da Silva）1854、西爾維斯特（Sylvester）1883 才正式寫下，所以它有時被叫「Da Silva–Sylvester 公式」（2026-06 查證）。\n\n## 「至少一個」幾乎都從反面算\n\n現在把餘事件和乘法湊起來，解決工程裡最常出現的一類問題：**至少一個**。\n\n直接算「至少一個 X 發生」是個陷阱，因為「至少一個」藏著一堆情形（恰好一個、恰好兩個、……）。但它的反面只有一種：**一個都沒發生**。所以：\n\n```text\nP(至少一個發生) = 1 − P(全都沒發生)\n```\n\n而「全都沒發生」如果各事件**獨立**，就是一串「沒發生」的機率連乘。先把「獨立」這個詞記在心上——本章一律假設它成立，**它何時成立、何時是你的一廂情願，是 ch04 的主題**。在那個假設下：\n\n設有 n 個事件，每個發生機率都是 p，彼此獨立。每個「不發生」的機率是 (1−p)，n 個都不發生就是 (1−p)ⁿ，於是：\n\n```text\nP(至少一個發生) = 1 − (1−p)ⁿ\n```\n\n這條公式短，但它解釋了你整個職業生涯的尾端焦慮。先看一個你問過的問題：100 台機器，每台**當天**故障率 0.1%（p=0.001），整個機房「當天至少一台故障」的機率？\n\n```text\nP(至少一台壞) = 1 − (1 − 0.001)¹⁰⁰\n             = 1 − 0.999¹⁰⁰\n             ≈ 1 − 0.9048\n             ≈ 0.0952 ≈ 9.5%\n```\n\n（0.999¹⁰⁰ 怎麼來的：ln(0.999)≈−0.0010005，乘以 100 得 −0.10005，取 exp 約 0.9048。下一節有更白話的近似法。）\n\n單台 0.1% 你大概覺得「很穩」，但一百台擺在一起，「今天有一台出事」接近一成——一個月三十天，幾乎天天都有東西要你看。你的直覺低估它，是因為你盯著「單台 0.1%」這個小數字，卻沒在腦袋裡做那個乘冪。**罕見 × 規模 = 日常**，這就是 SRE 的數學宿命。\n\n### Worked example：p=0.01 重複 n 次，何時越過一半\n\n把上面那條公式當成一台「罕見事件變常客」的計算機。基準設定：某事件單次機率 p=0.01（百分之一，夠罕見了），獨立重複 n 次，問「至少發生一次」的機率 1−0.99ⁿ 在哪裡越過 0.5。算三個關鍵點：\n\n```text\nn        0.99ⁿ        1 − 0.99ⁿ      = P(至少一次)\n────────────────────────────────────────────────\n10       0.9044       0.0956          ≈ 9.6%\n69       0.4999       0.5001          ≈ 50.0%  ← 剛好過半！\n100      0.3660       0.6340          ≈ 63.4%\n```\n\n逐項驗算（用 ln(0.99)≈−0.0100503，再取 exp）：\n\n```text\nn=10:   −0.0100503 × 10  = −0.100503  → exp = 0.9044  → 1−0.9044 = 0.0956\nn=69:   −0.0100503 × 69  = −0.693472  → exp = 0.4999  → 1−0.4999 = 0.5001\nn=100:  −0.0100503 × 100 = −1.005034  → exp = 0.3660  → 1−0.3660 = 0.6340\n```\n\n看 n=69 那一行：一件單次只有 1% 機率的事，你只要重複 **69 次**，「它至少發生一次」就過半了。不是 50 次（那是把 1% 線性外推成 50% 的天真直覺，0.01×50=0.5），也不是 100 次（那會超過一半不少）。69 這個數字本身不重要，重要的是它比你猜的小——線性直覺（「1% 乘以次數」）在這裡會騙你，因為機率不會線性疊加，它是 1 減去一串連乘。\n\n有個好用的速算：當 p 很小、n 不太大時，1−(1−p)ⁿ ≈ np（這是上式的一階近似，p² 以上的項小到可丟）。n=10 時 np=0.10，跟精確的 0.0956 很接近；但 n 越大近似越糟（n=100 時 np=1.0，但機率不可能是 1，精確值是 0.634）——因為近似忽略了「同一件事發生兩次以上」被重複算的修正。np 是上界，真值總在它下面。**這個 np 近似下一章還會以另一個面貌回來**（卜瓦松的 λ，見 ch10），先記著這個 √ 一樣會反覆出現的老朋友。\n\n## 連續失敗的乘法：每次小機率，多次就不小\n\n「至少一個」的反面是「全都失敗」，而「全都失敗」就是把失敗連乘。這個乘法本身也值得單獨看一眼，因為它解釋了兩個你熟悉的現象。\n\n**現象一：多層快取全部 miss。** 三層快取，命中率分別 90%、80%、70%，一個請求「三層全部 miss、最後打到 DB」的機率是各層 miss 連乘：0.10×0.20×0.30=0.006，0.6%。每一層都不怎麼可靠（最差那層三成 miss），但疊三層之後，「全部漏掉」只剩 0.6%。乘法對你有利——這正是分層快取的意義，**用多個平庸的東西串出一個可靠的東西**。\n\n**現象二：n 台各 p 故障，全部存活。** 反過來，n 台機器各自獨立故障率 p，「全部都活著」是 (1−p)ⁿ。注意這跟「至少一台壞」是同一枚硬幣的兩面：\n\n```text\nP(全活) = (1−p)ⁿ\nP(至少一台壞) = 1 − (1−p)ⁿ\n兩者相加 = 1      ← 餘事件，必然\n```\n\n乘法對你有利還是有害，取決於你站哪邊：你要「全部成功」（如冗餘投票要多數存活），乘法幫你把可靠性疊高；你怕「至少一個失敗」（如關鍵路徑上每一環都不能斷），乘法把風險疊高。同一個 (1−p)ⁿ，是祝福也是詛咒。\n\n**但這整套乘法的地基是「獨立」。** 我必須在這裡踩一次剎車：上面每一個連乘都偷偷假設了各事件互不影響。三層快取若共用同一個被打爆的後端、n 台機器若插在同一條跳電的電源上，那「全部 miss」「全部存活」就不是連乘了——共享的故障源讓它們手牽手一起倒。這一章的乘法是在「真獨立」的理想國裡練的；ch04 會帶你出國，看看現實世界的相關性故障如何讓 (1−p)ⁿ 這個漂亮公式整個崩掉。**先學會理想版，才知道現實版差在哪。**\n\n## 生日問題：23 個人就過半，到底為什麼\n\n現在來破解本書最有名的反直覺案例。題目：一個房間裡 n 個人，「至少有兩人同一天生日」的機率多少？要多少人才會過半？\n\n幾乎每個人第一次聽到都會猜一個大數字——183（365 的一半，感覺「要填滿一半的日子」）、甚至更多。**正確答案是 23。** 23 個人，至少兩人撞生日的機率就過半（≈50.73%）。這個落差大到它有個專門的名字叫「生日悖論」，雖然它一點都不悖論，只是你的直覺把問題問錯了。\n\n直覺錯在哪，先講清楚，因為這是整題的關鍵：你心裡默默問的是「**要多少人才會有人跟『我』同一天生日**」——拿你一個人去比所有人。那確實要很多人（每個人只有 1/365 機會撞到你）。但題目問的是「**任意兩人**撞生日」——不是你對全體，是**所有人兩兩互比**。23 個人能湊出的配對數是 C(23,2)=23×22/2=**253 對**，每一對都是一次撞生日的機會。253 次機會，每次成功率約 1/365——這樣一想，過半就不奇怪了。你的直覺低估，是因為它把「253 對」誤聽成「22 個人對我」。\n\n這個「253 對」是第一種視角，給你正確的數量級直覺。但它不是精確算法（這 253 對彼此不獨立，不能簡單把機率相乘），所以我們用第二種視角——**餘事件連乘**——來算出精確值。\n\n### Worked example：餘事件連乘手算 P(無碰撞)\n\n照本章主旋律：「至少兩人同生日」難算，算它的反面「所有人生日**都不同**」。假設一年 365 天、每天等可能、忽略閏日（這些假設讓題目乾淨，現實裡生日分布不均反而會讓碰撞**更**容易，所以 23 是個保守的門檻）。\n\n讓 n 個人**一個一個走進房間**，每進來一個就要求他的生日跟前面所有人都不撞：\n\n```text\n第 1 人：隨便哪天都行                  → 365/365 = 1\n第 2 人：要避開第 1 人的 1 天          → 364/365\n第 3 人：要避開前 2 人的 2 天          → 363/365\n第 4 人：要避開前 3 人的 3 天          → 362/365\n  ⋮\n第 23 人：要避開前 22 人的 22 天        → 343/365\n```\n\n所以 23 人「全部生日不同」的機率，是這 23 個分數的連乘：\n\n```text\nP(無碰撞) = 365/365 · 364/365 · 363/365 · … · 343/365\n```\n\n分子是從 365 往下連乘 23 個數（365×364×…×343），分母是 365²³。一項一項乘起來、看它怎麼往下掉（每一項都比 1 小一點，乘越多掉越多）：\n\n```text\n人數 n    新乘進的因子      累積 P(無碰撞)     P(至少一撞)=1−上一欄\n──────────────────────────────────────────────────────────────\n 1        365/365 = 1.0000    1.0000             0.0000\n 2        364/365 = 0.99726   0.99726            0.00274\n 3        363/365 = 0.99452   0.99180            0.00820\n 5        361/365            ≈ 0.97286            0.02714\n10        356/365            ≈ 0.88305            0.11695\n20        346/365            ≈ 0.58856            0.41144\n22        344/365            ≈ 0.52430            0.47570\n23        343/365 = 0.93973   0.49270            0.50730   ◄ 過半就在這！\n```\n\n第 23 個人走進來，把累積機率從 0.5243 乘上 343/365≈0.9397，壓到 **0.4927**——這就是 landscape 給的基準值。它一旦掉到 0.5 以下，它的餘事件「至少一撞」就爬過 0.5，變成 **0.5073**。22 人時還是 0.4757（沒過半），23 人時 0.5073（過半），分水嶺就卡在這裡。\n\n兩種視角現在對上了：**配對數 C(23,2)=253** 告訴你「為什麼這麼少人就夠」（253 次機會，不是 22 次）；**餘事件連乘** 給你精確的 0.4927／0.5073。一個給直覺、一個給數字，這正是本書要的「能算、也能講」。\n\n交叉驗算一下這個 0.4927 合不合理。有個漂亮的近似：每一對不撞的機率是 364/365，253 對若「近似獨立」，全不撞約 (364/365)²⁵³。或者用更滑順的指數近似——每對撞生日機率約 1/365，253 對「至少一撞」用 1−(1−1/365)²⁵³ ≈ 1−exp(−253/365)=1−exp(−0.6932)≈1−0.4999=0.5001。近似值 0.5001 跟精確的 0.5073 同一個區，差在那些「不獨立」的零頭——足以確認我們沒算錯數量級。（精確值比近似略高一點點，本來就該如此。）\n\n順帶把這題接回工程：這不是冷知識。雜湊碰撞、UUID 重複、分散式系統裡「兩個節點剛好選到同一個 ID」——全是生日問題。一個 n 位元的雜湊，你不需要產生 2ⁿ 個值才會碰撞，大約 2^(n/2) 個就有一半機率撞上（這就是密碼學裡的「生日攻擊」）。下次有人說「ID 空間有幾十億，不可能撞」，你心裡要響起 253 那個聲音：撞的不是「我對全體」，是「所有人兩兩」。\n\n## 直覺的陷阱\n\n組合事件是機率直覺崩壞的第一個高發區，因為「且／或／非」這三個日常詞，在機率裡的數值行為跟你的語感對不上。\n\n| 錯誤直覺 | 它在哪一步把你帶溝裡 | 怎麼自我察覺 |\n|---|---|---|\n| 「A 或 B」直接把機率相加 | 忘了扣重疊 P(A∩B)，系統性高估聯集；極端時加出超過 1 的「機率」 | 算出來 >1，或你能想到「A 和 B 同時發生」的情境卻沒扣它 |\n| 「至少一次」用 p×n 線性估 | 機率不會線性疊加；p×n 是上界，n 大就爆破 1 | 你的估計 >1（如 0.01×200=2），或你沒寫成 1−(1−p)ⁿ |\n| 把小機率事件「重複很多次」當成還是很罕見 | 忽略了 1−(1−p)ⁿ 隨 n 爬升的事實；尾端被低估 | 你說「這麼小不可能發生」卻沒問「重複幾次」 |\n| 生日問題：拿「我對全體」想，猜要 183 人 | 把「任意兩人撞」誤聽成「有人撞我」，漏掉 C(n,2) 那一大堆配對 | 你的答案接近 365/2，而沒算過配對數 |\n| 連乘 (1−p)ⁿ 算「全部存活」卻沒檢查獨立 | 共享故障源讓事件相依，連乘嚴重低估「一起掛」 | 你用了乘法，卻說不出「為什麼這幾件事互不影響」（ch04 正解） |\n\n最值得停十分鐘的是**生日問題那一格**，因為它示範了一個更通用的教訓：**你的直覺常常在偷偷簡化問題**。你以為你在回答「房間裡有人撞生日嗎」，其實你回答的是「有人撞**我**嗎」——這是兩個不同的問題，差了一個 C(n,2)。每次一個機率結果讓你覺得「不可能吧」，先別懷疑數學，先回去檢查：我是不是在心裡把問題換成了一個比較好想、但不一樣的問題？這個自我察覺的習慣，是這本書想送你的東西裡最值錢的一個。\n\n還有一個微妙處（這裡先點，ch04 深講）：「互斥」和「獨立」是**完全不同、甚至相反**的兩件事，但中文語感容易把它們混成「沒關係」。互斥是「兩件事不能同時發生」——這恰恰是一種強烈的相依（知道 A 發生，就確定 B 沒發生）。獨立是「一件發生與否，不改變另一件的機率」。互斥的兩個正機率事件**一定不獨立**（這個你會在 ch04 的紙上推演親手證一遍）。本章你已經用過兩者：加法用互斥，連乘用獨立——別讓它們在你腦中黏成一團。\n\n## 紙上推演\n\n### 推演題一 [15 分鐘] ★★\n\n200 個 task 的 batch job，每個 task 獨立失敗率 0.5%（p=0.005）。手算「整批至少掛一個」的機率。然後解釋：為什麼一個只有 0.5% 失敗率的 task，整批卻這麼容易出事？再用 np 近似估一次，比較兩個答案。\n\n#### 推演解答\n\n從反面算。「整批至少掛一個」的餘事件是「200 個全部成功」：\n\n```text\nP(全成功) = (1 − 0.005)²⁰⁰ = 0.995²⁰⁰\n```\n\n算 0.995²⁰⁰：ln(0.995)≈−0.0050125，乘以 200 得 −1.00251，取 exp≈0.3669。所以：\n\n```text\nP(至少掛一個) = 1 − 0.3669 ≈ 0.6331 ≈ 63.3%\n```\n\n**六成三**。一個失敗率只有 0.5% 的 task，跑 200 個，整批出事的機率超過六成——比丟硬幣還容易。為什麼直覺低估？因為你盯著「0.5% 好小」，卻沒做那個 200 次方。0.5% 的反面是 99.5% 成功，但 99.5% 連乘 200 次，每次都磨掉一點點，乘到後來只剩 37%——剩下的 63% 全是「至少一個壞了」。\n\nnp 近似：np=0.005×200=1.0。這給出「≈100%」的荒謬上界（機率不可能是 1），正好示範 np 近似在 np 接近或超過 1 時完全失效——它只在 np 遠小於 1 時堪用。精確值 63.3% 才是真的。**這題的工程教訓**：任何「對每個元素獨立施加小風險、再大量重複」的流程（批次寫入、大規模重試、fan-out 呼叫），你都要用 1−(1−p)ⁿ 來想整體，而不是看單元素的 p 就放心。\n\n### 推演題二 [10 分鐘] ★★\n\n用餘事件解「擲 4 次骰子，至少出現一個 6」。然後對照一個常被誤算的版本——有人會說「每次中 6 的機率 1/6，擲 4 次就是 4×1/6=4/6≈0.67」——指出這個算法錯在哪。\n\n#### 推演解答\n\n正解，從反面算。每擲一次「**沒**擲到 6」的機率是 5/6，四次獨立全沒中是 (5/6)⁴：\n\n```text\n(5/6)⁴ = 5⁴/6⁴ = 625/1296 ≈ 0.4823\nP(至少一個 6) = 1 − 625/1296 = 671/1296 ≈ 0.5177\n```\n\n約 **51.8%**，略過半。\n\n那個「4×1/6=0.67」的算法錯在哪？它在偷偷用**加法**算一個**非互斥**的聯集。「第一擲是 6」「第二擲是 6」……這四個事件**不互斥**——你完全可能兩擲都是 6。直接相加等於把「多次都中 6」的情形重複計算了好幾遍，所以高估（0.67 > 真值 0.518）。要用加法就得套完整容斥（加單個、扣兩兩重疊、補三個、扣四個一起），那會算到天荒地老；用餘事件一行解決。這就是為什麼本章一直唸「至少一個，先想反面」——正面要嘛要容斥的全套、要嘛要錯誤的天真加法，反面只有「一個都沒中」一種情形。\n\n（歷史彩蛋：「擲 4 次至少一個 6」正是機率史的起點之一。17 世紀的賭徒德梅雷靠賭這個賺錢——51.8% 過半，長期穩賺。他後來把賭局換成「擲兩顆骰子 24 次至少出現一次雙 6」以為一樣賺，結果那個只有約 49.1%、長期穩賠，百思不解，去問了帕斯卡（Pascal）——這個困惑間接點燃了帕斯卡與費馬（Fermat）1654 年的通信，也就是 ch01 那封信。你剛算的這題，差點改寫了數學史。）\n\n### 推演題三 [10 分鐘] ★\n\n口頭題：你朋友賭生日問題要 183 個人才會過半（「365 的一半嘛」）。不准寫公式，用一句話的核心洞見＋一個比喻，講到他點頭。\n\n#### 推演解答\n\n模範答案要點（你要能用自己的話講出這兩點，不是背稿）：\n\n1. **核心洞見**：「你問錯問題了。你心裡在算『要多少人才有人跟你同一天生日』——拿你一個去比所有人，那當然要很多人。但題目問的是『**任意兩個人**撞』，是大家**兩兩互比**。23 個人能配出 253 對，每一對都是一次撞的機會。253 次機會，過半就不奇怪了。」\n\n2. **比喻**（擇一）：「就像房間裡握手——23 個人不是 22 次握手，是每兩人都握一次，253 次握手。撞生日跟握手一樣，算的是『對』不是『人』。」或者更工程的版本：「你 ID 空間有幾十億就以為不會撞？撞的不是某個新 ID 對上你指定的那個，是**所有已發的 ID 兩兩之間**——這就是為什麼雜湊只要 2^(n/2) 個值就有一半機率碰撞，不用 2ⁿ。」\n\n常見錯路：很多人會想用連乘的公式去說服朋友，但對方眼神會死掉。這題的重點是**先修好他的直覺**（253 對 vs 22 人對我），數字（0.4927）反而是次要的。能把「他問錯問題」這件事一句話講清楚，才算過關。\n\n## 自我檢核\n\n口頭自答，講得出來才算懂：\n\n1. 為什麼「至少一個」幾乎都從反面（1 減去全沒發生）算？正面直接算難在哪？\n2. 容斥原理 P(A∪B)=P(A)+P(B)−P(A∩B) 裡那個「減去」在修正什麼？為什麼是「減一次」不是兩次？\n3. 「互斥」和「獨立」差在哪？為什麼互斥的兩個正機率事件反而**不**獨立？（直覺講清楚即可，嚴格證明留 ch04）\n4. 生日問題裡，C(23,2)=253 這個數字在直覺上扮演什麼角色？為什麼它能解釋「為何這麼少人就過半」？\n5. 1−(1−p)ⁿ 這條公式，為什麼能解釋「規模一大、罕見事件變常態」？np 近似什麼時候堪用、什麼時候會騙你？\n6. 「三層快取全部 miss 的機率是各層 miss 連乘」——這個連乘偷偷假設了什麼？如果假設不成立會怎樣？（這題故意逼你預習 ch04）\n7. 為什麼「擲 4 次骰子至少一個 6」不能用 4×(1/6) 算？那個加法錯在哪？\n\n## 延伸閱讀\n\n- **棣美弗《The Doctrine of Chances》（1718，史上第一本機率教科書）** —— 容斥處理「巧合」的原始出處。Internet Archive 有掃描本（archive.org/details/doctrineofchance00moiv）；不必通讀，翻翻他怎麼用「inclusion and exclusion」解兩副牌的同位問題，會發現你這章學的招三百年沒變（2026-06，掃描本可得）。\n- **Wikipedia「Birthday problem」** —— 生日問題的完整變體目錄（含逼近公式、生日攻擊、不均勻分布的修正）。讀「Square approximation」一節，看 √ 怎麼又出現在「要多少人才有半數機率撞」的估計裡——為 ch09 的 √n 法則埋線（數值與本書 0.5073 一致，2026-06 查證）。\n- **Wikipedia「Inclusion–exclusion principle」** —— 想看三個以上事件的一般容斥公式（正負交錯那串）就讀這裡；讀「Applications → The problem of derangements」一節，那個「錯排」問題會在 ch08 用期望線性性以一行解掉，先看它用容斥硬解有多累，之後的對比會更震撼。\n- **Grant Sanderson（3Blue1Brown）關於機率的視覺化系列** —— 若你想看生日問題與「至少一次」的動畫直覺，他的 YouTube 頻道有同類題材的幾何呈現；當作本章的影像版補充（YouTube，2026-06，頻道持續更新）。\n"}, {"id": "ch04-conditional-independence", "file": "ch04-conditional-independence.md", "group": "Part I — 機運的語言", "title": "ch04 — 條件與獨立：最容易誤判的兩件事", "md": "# ch04 — 條件與獨立：最容易誤判的兩件事\n\n> **本章解決什麼問題**：機率讓人類直覺翻車最慘的兩個地方，全在這一章——「在已知 B 的條件下看 A」到底改變了什麼（條件機率），以及「A 跟 B 互不影響」這句話的精確意思（獨立）。它接在 ch03「把事件組合起來」之後：上一章你學會把事件用交集、聯集、餘事件拼起來；這一章開始問「一個事件發生了，會不會改變另一個的機率」。它也是整個 Part II 貝氏的引信——本章只把 `P(A|B)` 和 `P(B|A)` 是兩回事這件事擺上檯面，真正的逆轉（貝氏定理）留給 ch05。順便埋兩顆雷：條件獨立 ≠ 邊際獨立（ch19 辛普森悖論會引爆），以及全機率公式（ch05 的分母就是它）。\n\n## 從你已知的出發\n\n你每天都在算條件機率，只是沒這樣叫它。\n\n你開一個查詢：\n\n```text\nSELECT failure_rate FROM requests WHERE status = 'timeout';\n```\n\n這個 `WHERE` 子句做的事，跟條件機率做的事，一模一樣。它先把整個世界（所有請求）縮到一個子集裡（已經逾時的請求），然後在這個縮小的世界裡重新看故障率。你不是在問「請求逾時又故障的機率」，你是在問「**在已經逾時的前提下**，故障率多少」。分母換了——從「全部請求」換成「逾時的請求」。\n\n這就是條件機率的全部。`P(故障 | 逾時)` 就是一句帶 WHERE 的查詢。\n\n而獨立呢？獨立是另一件事，而且是你已經被它咬過的那件事。\n\n你做高可用設計時都信一條教條：把備援放到不同的可用區（availability zone, AZ），這樣一個掛了還有另一個。背後的算盤是——兩個 AZ 各自的故障是**獨立**的，所以「兩個同時掛」的機率是兩個小機率相乘，小到可以忽略。99% × 99%，同時掛的機率 0.0001，可用度衝到 99.99%，四個九，漂亮。\n\n然後某天它們真的同時掛了。事後檢討才發現，這兩個「獨立」的 AZ 共用同一條光纖、同一個控制平面、同一套 DNS、甚至同一個區域的電力。它們從來就不獨立。你以為自己在乘兩個小機率，其實你乘了一個小機率乘以「1」——因為一個掛的時候，另一個幾乎**必然**跟著掛。\n\n這一章就是要把這兩件你天天在用、卻最容易誤判的事講清楚：條件機率到底改了什麼，獨立到底是什麼意思，以及為什麼「假獨立」是真實 outage 最常見的根因之一。我認為這一章的下半段，是整本書裡跟你工作扣得最緊的一頁。\n\n## 條件機率：把世界縮到 B 裡再看 A\n\n正式定義很短：\n\n```text\nP(A|B) = P(A∩B) / P(B)          ← 前提 P(B) > 0\n         ─────────\n唸法：「在 B 發生的條件下，A 的機率」\n```\n\n別急著背。先看它在幹嘛。\n\n原本的樣本空間（sample space）是「所有可能發生的事」，總機率 1。現在我告訴你「B 確定發生了」。這句話把你的世界砍掉了一大塊——所有 B 沒發生的可能性，全部不算數了。你的新世界只剩下 B 這一塊。\n\n但這個新世界的總機率得是 1 才能繼續當機率用，而 B 原本的機率只有 `P(B)`（小於 1）。所以你得把它**重新標準化**：把 B 裡面的每一塊機率，全部除以 `P(B)`，撐大回總和為 1。\n\n`A∩B`（A 跟 B 同時發生）這一塊，在新世界裡的占比，就是 `P(A∩B) / P(B)`。這就是 `P(A|B)`。\n\n```text\n原本的世界                    縮到 B 之後的世界\n┌──────────────────┐\n│        A         │              ┌──────────┐\n│    ┌─────┐       │   已知 B     │   A∩B    │  ← 這塊撐大成\n│    │ A∩B│   B    │   ────────►  │  (其餘    │     新世界的全部\n│    └─────┘       │   把世界      │   被砍掉) │     占比 = \n│                  │   縮到 B      └──────────┘     P(A∩B)/P(B)\n└──────────────────┘              總機率重新算成 1\n```\n\n注意一件事：`P(A|B)` 跟 `A` 在原世界裡多大**沒有直接關係**，它只關心「在 B 裡面，A 占多少」。A 可能在整個世界裡很小，但只要它幾乎全擠在 B 裡，`P(A|B)` 就可以很大。這正是後面所有反直覺的源頭。\n\n### 一個會錯的小例子：擲兩顆骰子\n\n擲兩顆公正骰子。已知「點數和是 7」，問「其中至少一顆是 3」的機率。\n\n別用感覺。把世界縮到「和為 7」。和為 7 的等可能結果有 6 種：\n\n```text\n和=7 的世界（6 種等可能）：\n(1,6) (2,5) (3,4) (4,3) (5,2) (6,1)\n            ───── ─────\n            含 3 的有這 2 種\n```\n\n`P(至少一顆是 3 | 和=7) = 2/6 = 1/3`。\n\n你的世界從 36 種縮到 6 種，然後在這 6 種裡數含 3 的。如果不縮世界、用整個 36 種去想，你會算錯——因為「和=7」這個條件已經把很多含 3 的組合（像 (3,3)、(3,5)）排除掉了。條件機率的威力跟陷阱，都在「縮世界」這一步。\n\n## 乘法法則與機率樹：把條件機率倒過來用\n\n把定義的等號兩邊乘以 `P(B)`，馬上得到**乘法法則（multiplication rule）**：\n\n```text\nP(A∩B) = P(B) · P(A|B)\n       = P(A) · P(B|A)      ← 換個順序拆，結果一樣\n```\n\n這條公式的用處是：當你知道「先發生 B 的機率」和「B 之後 A 的機率」，就能拼出「兩件都發生」的機率。一步一步走流程的事情，全靠它。\n\n而且這兩種拆法相等（`P(B)·P(A|B) = P(A)·P(B|A)`）這件小事，等號一搬，就是 ch05 的貝氏定理。先記著這個伏筆。\n\n機率樹（probability tree）就是乘法法則的畫法。每往下走一層、走一條邊，就乘上那條邊的條件機率；走到底的那一片葉子，機率就是沿路所有邊相乘。\n\n舉個你熟的：一個兩階段流程，先過驗證再寫入。驗證成功率 90%，**而且在驗證成功的前提下**，寫入成功率 95%。\n\n```text\n                  ┌── 驗證成功 (0.9) ──┬── 寫入成功 (0.95) → 0.9×0.95 = 0.855\n   開始 ──────────┤                    └── 寫入失敗 (0.05) → 0.9×0.05 = 0.045\n                  └── 驗證失敗 (0.1) ─────────────────────→ 0.1        = 0.100\n                                                            ───────────────────\n                                                            合計         = 1.000\n```\n\n「整個流程成功」= 0.855。注意第二層那個 0.95 是**條件機率** `P(寫入成功 | 驗證成功)`——它預設了驗證已經過。如果你天真地把它當成「寫入本身的成功率，跟驗證無關」，就是在偷偷假設兩階段獨立。多數時候這假設沒問題，但有時候不是：如果驗證和寫入都依賴同一個下游服務，那個服務一抖，兩階段會一起爛——這時候 `P(寫入成功 | 驗證成功)` 跟 `P(寫入成功)` 根本不是同一個數。哪裡藏了獨立假設，等下會專門挖。\n\n## 獨立：被誤解最深的一個詞\n\n工程師講「獨立」通常意思是「沒因果關係、互不影響、八竿子打不著」。這是日常語感，但機率的獨立是個**精確的數值條件**，跟你的因果直覺常常對不上。\n\n正式定義：\n\n```text\nA 與 B 獨立  ⟺  P(A∩B) = P(A) · P(B)\n```\n\n就這樣。兩件事同時發生的機率，等於各自機率相乘——那它們就叫獨立。沒有「因果」「影響」這些字眼，它純粹是一條乘法等式成不成立。\n\n這個定義有個更好懂的等價說法。把它代回條件機率：\n\n```text\n若 P(A∩B) = P(A)·P(B)，則\n\nP(A|B) = P(A∩B)/P(B) = P(A)·P(B)/P(B) = P(A)\n         ────────────────────────────────────\n獨立 ⟺ P(A|B) = P(A)：知道 B 發生了，完全不改變你對 A 的判斷\n```\n\n**這才是獨立的靈魂**：B 這個資訊，對 A 的機率毫無作用。你本來覺得 A 有多少機率，知道了 B，還是那麼多。資訊量為零。\n\n反過來，只要 `P(A|B) ≠ P(A)`——知道 B 之後你對 A 的判斷變了，哪怕只變一點點——它們就**不獨立**。獨立是個很嚴格的條件，不是「差不多沒關係」，是「分毫不差地沒影響」。現實世界裡真正獨立的事件其實很少；獨立通常是個**假設**，是你為了能把機率相乘而下的方便假設。它什麼時候站得住、什麼時候會背叛你，是這一章的重點。\n\n## 獨立和互斥是相反的東西\n\n這是本章第一個會把你帶溝裡的地方，值得停下來想清楚，因為它違反幾乎所有人的第一直覺。\n\n很多人把「獨立」和「互斥（mutually exclusive）」當成近義詞——感覺都是「兩件事沒關係、分開的」。**錯得離譜。它們不但不一樣，方向還是相反的。**\n\n先回憶互斥：A 和 B 互斥，意思是它們**不可能同時發生**，`P(A∩B) = 0`。擲一顆骰子，「出 3」和「出 5」互斥——出了 3 就不可能同時出 5。\n\n現在問：互斥的兩件事獨立嗎？用定義檢查。假設 A、B 各自機率都大於 0（都有可能發生），而且互斥。\n\n```text\n互斥：           P(A∩B) = 0\n若獨立應該：     P(A∩B) = P(A)·P(B)\n兩者要同時成立： 0 = P(A)·P(B)\n但 P(A)>0 且 P(B)>0  ⟹  P(A)·P(B) > 0  ≠ 0      ← 矛盾！\n所以互斥（且各自機率為正）的兩事件，一定不獨立。\n```\n\n用條件機率的語感更直白：如果 A、B 互斥，那麼**一旦 B 發生，A 就絕對不可能發生**了——`P(A|B) = 0`。知道 B 發生這件事，把 A 的機率從原本的正數一口氣砍到 0。這資訊量大到爆表，這哪叫沒關係？這叫**高度相依**。\n\n```text\n              知道 B 發生後，A 的機率怎麼變\n互斥：    P(A) > 0  ──知道 B──►  P(A|B) = 0     資訊量最大、極度相依\n獨立：    P(A)      ──知道 B──►  P(A|B) = P(A)   資訊量為零、毫不相干\n```\n\n所以互斥是相依的一個**極端**，不是獨立的同義詞。一句話記住它：**互斥是「你死我活」，獨立是「井水不犯河水」**。你死我活的兩個人，關係能不緊密嗎？\n\n這一條會在「紙上推演」裡讓你親手證一遍。它看起來像數學潔癖，但它其實是在訓練你一個習慣：別憑「感覺沒關係」就把機率相乘，去檢查那條乘法等式到底成不成立。\n\n## 獨立假設為什麼這麼脆：共享的潛在原因\n\n現在進到這一章跟你工作扣最緊、也最值錢的部分。\n\n獨立是個假設。假設會背叛你。它背叛你的最常見方式，叫做**共享的潛在原因（confounder）**——兩件事看起來各走各的，其實背後被同一隻手牽著。\n\n回到開頭那兩個 AZ 的備援。你的算盤是：\n\n```text\n備援 A 可用度 99%   →  故障率 P(A 掛) = 0.01\n備援 B 可用度 99%   →  故障率 P(B 掛) = 0.01\n假設獨立：\nP(兩個同時掛) = P(A 掛)·P(B 掛) = 0.01 × 0.01 = 0.0001\n整體可用度 = 1 − 0.0001 = 0.9999 = 99.99%   ← 四個九\n```\n\n四個九，老闆很高興，SLA 寫得很漂亮。問題是那個乘法——`P(A∩B) = P(A)·P(B)`——只有在 A、B 獨立時才成立。而它們不獨立。\n\n它們不獨立，是因為背後有個你沒算進去的共享原因：**機房電力**。假設這個區域整片停電的機率是每年 1%，而一旦停電，A 和 B **兩個都必掛**（它們吃同一條電）。這個「停電」就是 confounder——一個同時牽動 A 和 B 的潛在原因。\n\n現在重算。設停電事件為 P，`P(停電) = 0.01`，而且 `P(A 掛 | 停電) = 1`、`P(B 掛 | 停電) = 1`。除了停電，A、B 各自還有自己的獨立小毛病（硬碟、bug 之類），故障率還是各 0.01。用全機率的想法把「兩個同時掛」拆成兩種情況：\n\n```text\nP(兩個同時掛) \n  = P(停電) · P(兩掛|停電)  +  P(沒停電) · P(兩掛|沒停電)\n  = 0.01    · 1            +  0.99      · (0.01 × 0.01)\n  = 0.01                   +  0.99 × 0.0001\n  = 0.01                   +  0.000099\n  = 0.010099\n                                           ← 沒停電時才回到「獨立相乘」那一項，\n                                             但它被 0.01 這個共享項完全淹沒\n```\n\n整體可用度 = 1 − 0.010099 = 0.989901 ≈ **98.99%**，大概就是 **99%，兩個九**。\n\n看清楚發生了什麼：\n\n```text\n            P(兩個同時掛)      可用度        幾個九\n獨立假設：   0.0001           99.99%        四個九\n共享電力：   0.010099         ≈ 98.99%      兩個九（約 99%）\n            ────────────────────────────────────────────\n            差了約 101 倍       你以為的「多兩個九」是幻覺\n```\n\n**你以為自己買了四個九，實際只有兩個九。** 加一個備援，可用度幾乎沒進步——因為決定命運的不是各自的小毛病，是那個你忘了算的共享原因。獨立假設在這裡值「兩個九」，而那兩個九是假的。\n\n這不是我編的數學潔癖。Google 在 2010 年一篇研究自家分散式儲存可用度的論文（Ford 等人，OSDI 2010）發現：**如果不把節點故障的相關性算進去，你對可用度的估計通常會高估至少兩個數量級**（約 100 倍，2026-06 查證）。一百倍。你算出來的「五個九」可能其實是「三個九」。他們的結論寫得很重——故障之間的相關性，對「不可用」的貢獻，遠遠蓋過其他所有因素。換句話說：**在真實系統裡，殺死你的幾乎都是相關性故障，不是獨立故障。**\n\n而這正是 2025 年 10 月 20 日那場 AWS us-east-1 大當機的劇本（2026-06 查證）。很多公司明明把服務做了多 AZ 備援，照樣全趴——因為那些「獨立」的 AZ 共用了 us-east-1 的控制平面、DNS 與 IAM 這些全域服務。底層一個監控網路負載平衡器健康狀態的子系統出事，順著 DNS 與 DynamoDB 端點擴散，多 AZ 的設計擋不住一個跨 AZ 的共享依賴。可用區做的事是「吸收區域內的實體故障」，它從來就不負責擋「邏輯上的共享依賴」。你以為你有兩個獨立的籃子，其實兩個籃子掛在同一根釘子上。\n\n### 用條件機率把這件事說死\n\n獨立失效這件事，用 `P(A|B)` 講最精準。在共享電力的模型裡，問一句：「已知 B 掛了，A 也掛的機率是多少？」\n\n```text\nP(B 掛) = P(停電) + P(沒停電)·P(B 自己掛) = 0.01 + 0.99×0.01 = 0.0199\nP(A∩B 都掛) = 0.010099                （上面算過）\n\nP(A 掛 | B 掛) = P(A∩B) / P(B) = 0.010099 / 0.0199 ≈ 0.507\n                ────────────────────────────────────────\n對照 P(A 掛) = 0.0199。\n知道 B 掛了之後，A 也掛的機率從 2% 跳到 51%——暴增約 25 倍。\n```\n\n如果它們真的獨立，這兩個數字會相等（`P(A|B) = P(A)`）。它們差了 25 倍，這就是「不獨立」的數值鐵證。`P(A|B) ≠ P(A)`，獨立假設當場破產。B 掛掉這件事，帶著「八成是停電」的資訊，而停電會把 A 一起拖下水——這就是 confounder 怎麼把兩件「看起來獨立」的事偷偷綁在一起。\n\n## 條件獨立 ≠ 邊際獨立（一顆留給 ch19 的雷）\n\n還有一種更陰險的，這裡先埋雷、不引爆。\n\n「獨立」其實有兩種，而它們可以**互相矛盾**：\n\n- **邊際獨立（marginal independence）**：不看任何條件，A 和 B 整體上獨立。`P(A∩B) = P(A)·P(B)`。\n- **條件獨立（conditional independence）**：在已知第三件事 C 的條件下，A 和 B 獨立。`P(A∩B|C) = P(A|C)·P(B|C)`。\n\n直覺會告訴你這兩個應該差不多——獨立就獨立嘛，加不加條件能差多少？**它們可以完全相反。** 兩件事可以「整體看獨立、但分組看相依」，也可以「整體看相依、但一旦固定某個 confounder 就變獨立」。\n\n上面那個 AZ 的例子其實就是後者的影子：A 和 B 在「不知道有沒有停電」時看起來高度相依（一個掛另一個常跟著掛）；但**一旦你固定了「沒停電」這個條件**，剩下的就只是各自的硬碟 bug，這時候 A、B 就獨立了（`0.01×0.01` 那一項）。是 confounder「停電」在製造相依；把它固定住，相依就消失。\n\n當「整體」和「分組」給出方向相反的結論，那就是**辛普森悖論（Simpson's paradox）**——機率裡最讓人頭皮發麻的反轉。整本書我認為最違反直覺的一頁就在 ch19，那裡會用柏克萊研究所招生的真實資料，讓你看著同一份數據在合併時說「歧視女性」、分系後每一系都說「沒有」。那個悖論的引擎，就是這裡的「條件獨立 ≠ 邊際獨立」。現在你只要記住：**「A 和 B 獨立嗎」這個問題，沒有先講清楚「在什麼條件下」就無法回答。** 加一個條件，答案可能整個翻過來。\n\n## 全機率公式：給 ch05 鋪的最後一塊磚\n\n前面算「兩個同時掛」時，我偷偷用了一個招式：把一個事件按「停電 / 沒停電」拆成兩塊分開算，再加起來。那個招式有名字，叫**全機率公式（law of total probability）**，是 ch05 貝氏定理分母的真身。\n\n它的想法很單純。如果你有一組互斥又窮盡的情況 `B₁, B₂, ..., Bₙ`（彼此不重疊、合起來蓋住整個世界——像「停電」和「沒停電」），那麼任何事件 A 的機率，都可以「分情況討論」再加總：\n\n```text\nP(A) = P(A|B₁)·P(B₁) + P(A|B₂)·P(B₂) + ... + P(A|Bₙ)·P(Bₙ)\n       ─────────────────────────────────────────────────────\n唸法：A 的總機率 = 在每種情況下 A 的機率，按該情況發生的機率加權平均\n```\n\n工程白話：**先把世界切成不重疊的幾塊，在每塊裡算 A 的機率，再按每塊的大小加權加起來。** 你算「整體錯誤率」時，如果把流量分成「來自快取 / 來自 DB」兩條路徑分別算錯誤率再加權，你用的就是全機率公式。\n\n```text\n                    ┌── B₁ 停電  (0.01) ── A|B₁ (1.00) ──► 0.01 × 1.00 = 0.0100\n   兩個同時掛 A ────┤\n                    └── B₂ 沒停電(0.99) ── A|B₂ (0.0001)─► 0.99 × 0.0001= 0.000099\n                                                          ──────────────────────\n                                                          P(A) 合計     = 0.010099\n```\n\n這就是剛剛那個 0.010099 的來歷，畫成樹而已。\n\n為什麼這是貝氏的鋪墊？因為貝氏要算的是「**倒過來**」的問題——已知 A 發生了（兩個都掛了），回頭問「是停電造成的機率多大」`P(停電 | 兩掛)`。要算這個分數，分母正是 `P(A)` = `P(兩掛)`，而它就用全機率公式湊出來。`P(A|B)` 和 `P(B|A)` 是兩個天差地別的數字，把前者翻成後者的那把鑰匙，下一章登場。本章到此為止，只負責讓你深信一件事：**`P(A|B)` 和 `P(B|A)` 真的不一樣，別把它們搞混。**\n\n差多少？舉個直覺例子收尾：`P(會講中文 | 是台灣人)` 很高（接近 1），但 `P(是台灣人 | 會講中文)` 沒那麼高（會講中文的人裡，很多不是台灣人）。同一對事件，兩個方向的條件機率可以差十萬八千里。誰當條件、誰被問，順序一換，答案就變。ch05 整章在處理這個翻轉，這裡先讓它扎進你腦子。\n\n## 直覺的陷阱\n\n| 你以為 | 實際上 | 怎麼自我察覺 |\n|---|---|---|\n| 「獨立」和「互斥」差不多，都是沒關係 | **相反**。互斥是 `P(A∩B)=0`，是高度相依（你死我活）；獨立是 `P(A∩B)=P(A)P(B)`，井水不犯河水 | 你脫口說「它們互斥所以獨立」「不會同時發生所以無關」——停。互斥的事知道一個就否決另一個，資訊量最大 |\n| 把備援放不同機器／AZ 就獨立了，故障率直接相乘 | 只要共享任一隱藏資源（電力、光纖、控制平面、DNS、同一支 library、同一次部署），就**不**獨立，相乘嚴重低估同掛機率 | 問自己：「這兩個東西會不會因為**同一個原因**一起壞？」想得出任何一個共享原因，乘法就不能用 |\n| `P(A\\|B)` 跟 `P(B\\|A)` 差不多 | 可以差幾個數量級（會中文 vs 是台灣人）。方向反了，分母就換了 | 你把「檢驗準確率」當成「陽性代表得病的機率」——這是 ch05 檢察官謬誤的種子，先學會聞到味道 |\n| 算出 `P(A∩B)` 就直接用 `P(A)·P(B)` | 那是**獨立才能用**的捷徑，不是定義。`P(A∩B)=P(A)·P(B\\|A)` 才是永遠成立的 | 你寫下乘法時有沒有先問「這兩個獨立嗎」？沒問就是預設了獨立，預設了就會被 confounder 咬 |\n| 「A 跟 B 獨立」是個有絕對答案的問題 | 要看**在什麼條件下**。可以邊際相依、條件獨立，反之亦然（辛普森的引擎） | 有人問「這兩個指標獨立嗎」你能不假思索回答——小心，你大概忽略了某個沒被固定住的 confounder |\n\n招牌謬誤點名：把「互不影響」當成「互斥」、或反過來。這是條件與獨立這一章最經典的翻車，連考卷上都年年有人栽。下次你想說「這兩件事獨立」之前，先做一個動作：在腦子裡問「知道其中一件發生了，我對另一件的判斷會不會改變？」——只要會改變，哪怕一點點，它們就不獨立。這個自問，比背公式有用一百倍。\n\n## 紙上推演\n\n> 全程紙筆，不寫程式。每題先自己推，再看解答。算機率最容易手滑，每個數值請至少用兩種方式對一次。\n\n### 推演題 1：機率樹找出藏起來的獨立假設 **[15 分鐘]** ★★\n\n一個請求要先過「身分驗證」再「寫入資料庫」才算成功。給你：驗證成功率 `P(驗證)=0.8`；在驗證成功的前提下，寫入成功率 `P(寫入|驗證)=0.9`。\n\n(a) 畫出機率樹，算「整個請求成功」的機率。\n(b) 老闆說「驗證 80% × 寫入 90% = 72%，所以成功率 72%」——他這樣算，**偷偷假設了什麼**？這個假設什麼情況下會破？\n(c) 如果驗證和寫入其實都打同一個下游服務，那個服務有 5% 機率整個掛掉（掛了則兩步都失敗），這個 72% 是高估還是低估？定性說明即可。\n\n#### 推演解答\n\n(a) 樹長這樣：\n\n```text\n                  ┌── 驗證成功 (0.8) ─┬── 寫入成功 (0.9) → 0.8×0.9 = 0.72  ✓成功\n   開始 ──────────┤                   └── 寫入失敗 (0.1) → 0.8×0.1 = 0.08\n                  └── 驗證失敗 (0.2) ──────────────────► 0.2        = 0.20\n                                                         ──────────────────\n                                                         合計        = 1.00\n```\n\n「整個請求成功」只有一條路（兩步都成功）：`P(成功) = P(驗證)·P(寫入|驗證) = 0.8 × 0.9 = 0.72`。\n\n對一下：失敗的機率 = 0.08 + 0.20 = 0.28，1 − 0.28 = 0.72，相符。\n\n(b) 老闆的算式 `0.8 × 0.9` **數字上剛好對**——但只是因為題目給的本來就是條件機率 `P(寫入|驗證)=0.9`。他腦中想的卻是「寫入本身的成功率 90%，跟驗證沒關係」，也就是把 0.9 當成了**邊際**機率 `P(寫入)`，並假設兩步**獨立**。乘法法則 `P(A∩B)=P(A)·P(B|A)` 永遠成立，但 `P(A∩B)=P(A)·P(B)` 只有獨立才成立。這裡碰巧不出錯，是因為我們給的就是條件機率；換個情境，把邊際當條件用，就會錯。重點：**他的乘法藏了「獨立」這個沒講出口的假設。**\n\n(c) **高估**。共享的下游服務就是 confounder。一旦它掛（5% 機率），兩步同時失敗，這是「一起壞」的相關性故障，原本的樹完全沒算進去。真實成功率會比 72% 低，因為多了一條「兩步因共享依賴一起爛」的失敗路徑。獨立模型看不見這條路，於是太樂觀——跟兩個 AZ 共享電力是同一個病。\n\n### 推演題 2：證明「互斥 ⟹ 不獨立」 **[10 分鐘]** ★★\n\n證明：若兩事件 A、B 互斥，且 `P(A)>0`、`P(B)>0`，則 A、B 一定**不**獨立。然後用一句白話講清楚為什麼這在直覺上也應該成立。\n\n#### 推演解答\n\n形式證明（每一步都能口頭講出理由）：\n\n```text\n前提：A、B 互斥        ⟹  A∩B = ∅      ⟹  P(A∩B) = 0\n前提：P(A) > 0，P(B) > 0 ⟹  P(A)·P(B) > 0           （兩個正數相乘為正）\n\n獨立的定義要求：P(A∩B) = P(A)·P(B)\n代入即要求：    0      = P(A)·P(B)\n但右邊 > 0，左邊 = 0，矛盾。\n∴ 等式不成立 ⟹ A、B 不獨立。                            ∎\n```\n\n白話：A、B 互斥，代表**一旦 B 發生，A 就絕對不可能發生**，`P(A|B)=0`。本來 A 有正的機率，知道 B 之後直接歸零——這是天大的資訊，B 對 A 的影響大到把它一票否決。獨立的意思是「知道 B 對 A 毫無影響」（`P(A|B)=P(A)`），跟「一票否決」完全相反。所以互斥的兩件事不但不獨立，還是**相依的極端**。記法：互斥＝你死我活，獨立＝井水不犯河水；前者怎麼可能是後者。\n\n附帶一個常見反問：「那 `P(A)=0` 的話呢？」如果允許機率為 0 的事件，數學上 `P(A∩B)=0=P(A)·P(B)` 會成立，它就「技術上獨立」了——但那是退化情形（一件根本不會發生的事跟誰都「獨立」），沒有實際意義。所以條件要寫明「各自機率為正」。\n\n### 推演題 3：「獨立假設值多少個九」重算 **[20 分鐘]** ★★★\n\n兩個備援各 99% 可用（各自故障率 0.01）。\n\n(a) 假設兩者**獨立**，算整體可用度（要求兩個都掛才算整體掛）。\n(b) 現在引入共享電力：停電機率 `P(停電)=0.01`，停電則兩者必掛；除停電外，兩者各自還有 0.01 的獨立故障。用全機率公式算 `P(兩個都掛)` 與整體可用度。\n(c) 算 `P(A 掛 | B 掛)`，用它說明 (b) 裡 A、B 為何不獨立、以及這個數字怎麼當「不獨立」的鐵證。\n\n#### 推演解答\n\n(a) 獨立情形：\n\n```text\nP(兩個都掛) = P(A 掛)·P(B 掛) = 0.01 × 0.01 = 0.0001\n整體可用度  = 1 − 0.0001 = 0.9999 = 99.99%          ← 四個九\n```\n\n(b) 共享電力，把「兩個都掛」按停電與否拆開（全機率公式）：\n\n```text\nP(兩掛) = P(停電)·P(兩掛|停電) + P(沒停電)·P(兩掛|沒停電)\n        = 0.01  · 1          + 0.99    · (0.01 × 0.01)\n        = 0.01              + 0.99 × 0.0001\n        = 0.01              + 0.000099\n        = 0.010099\n整體可用度 = 1 − 0.010099 = 0.989901 ≈ 98.99%        ← 約兩個九\n```\n\n交叉驗算：共享項 0.01 把獨立項 0.000099 整個淹掉（差兩個數量級），所以可用度從四個九掉到約 99%。`0.010099 / 0.0001 ≈ 101`，相關性讓「兩掛」機率漲了約 101 倍——跟 Google 那篇論文「不算相關性會高估可用度約兩個數量級」完全同一個量級的故事。\n\n(c) 條件機率當鐵證：\n\n```text\nP(B 掛) = P(停電) + P(沒停電)·P(B 自己掛) = 0.01 + 0.99×0.01 = 0.0199\nP(A 掛 | B 掛) = P(A∩B) / P(B) = 0.010099 / 0.0199 ≈ 0.507\n\n對照 P(A 掛) = 0.0199。\n```\n\n`P(A|B) ≈ 0.507` 遠大於 `P(A) ≈ 0.0199`（差約 25 倍）。獨立的定義要求這兩者相等，這裡天差地別，所以 A、B **不獨立**。直覺：B 掛了，多半是因為停電（`0.01/0.0199 ≈ 50%` 的機率 B 的掛是停電造成的），而停電會把 A 一起拖死，所以「B 掛」這個消息大幅推高了「A 也掛」的機率。**獨立假設在這裡值「四個九 → 兩個九」整整兩個九，而那兩個九全是假的。**\n\n### 推演題 4：把你維運過的「假獨立」翻成機率語言 **[15 分鐘]** ★★\n\n口頭＋紙筆題。回想一個你實際碰過、或合理想像得到的「以為獨立、其實共享故障源」的情境（例：兩個微服務跑在不同 pod 但同一個節點；主從資料庫在不同機器但同一個機櫃電源；多區部署但共用同一個 CDN／DNS）。\n\n(a) 寫出你原本「假設獨立」時會怎麼相乘估同掛機率。\n(b) 指出那個被你忽略的 confounder 是什麼。\n(c) 用一句話估計這個假獨立大概讓你**低估了幾個數量級**的同掛風險，並說你怎麼自我察覺。\n\n#### 推演解答\n\n沒有標準答案，重點是你能把工程體感翻成機率語言。一個範例：\n\n(a) 兩個微服務各自月故障率 1%，假設獨立 → `P(同月都掛) = 0.01² = 0.0001`，估「兩個一起掛」幾乎不可能。\n\n(b) confounder：它們其實跑在同一個 K8s 節點上。節點本身（或其底層 VM、或那台機器的網卡）有 0.5% 的月故障率，節點一掛兩個 pod 一起死。\n\n(c) 真實同掛機率 ≈ `0.005 + 0.99×0.0001 ≈ 0.005099`，跟你估的 0.0001 差了約 **50 倍**（一個半數量級）。自我察覺的觸發點：每次你準備把兩個可用度「相乘」之前，逼自己回答一句「**它們會不會因為同一個原因一起壞**」——只要答案不是斬釘截鐵的「不會」，那個乘法就有鬼，你低估的數量級大致就等於那個共享原因的故障率比獨立相乘項大多少。把「不同機器」當成「獨立」，是這一行最貴的免費假設。\n\n## 自我檢核\n\n口頭自答，講得清楚才算過。優先答「為什麼」。\n\n1. 條件機率 `P(A|B) = P(A∩B)/P(B)` 那個分母為什麼是 `P(B)` 不是別的？用「把世界縮到 B、再重新標準化」講給人聽，不准只念公式。\n2. 獨立的兩個等價定義（`P(A∩B)=P(A)P(B)` 和 `P(A|B)=P(A)`）為什麼是同一件事？哪一個更能講出「獨立的靈魂」，為什麼？\n3. 為什麼「互斥」和「獨立」是相反的，不是近義詞？用「你死我活 vs 井水不犯河水」這組對比，並能說出「互斥且各自機率為正 ⟹ 不獨立」這條的證明骨架。\n4. 兩個各 99% 可用的備援，獨立時是四個九、共享電力時掉到兩個九——這兩個九的落差，數學上是哪一項在作怪？用全機率公式那個拆解講出「共享項淹掉獨立項」。\n5. `P(A|B)` 和 `P(B|A)` 為什麼可以差幾個數量級？舉一個你自己的例子（不准用書上的「會中文 vs 是台灣人」），並說這個混淆會在 ch05 變成什麼謬誤。\n6. 「這兩個指標獨立嗎？」這個問題為什麼不夠完整、沒辦法直接回答？「邊際獨立」和「條件獨立」的差別，跟 ch19 辛普森悖論有什麼關係？\n7. 下次你準備把兩個可用度相乘之前，你會先問自己哪一句話？為什麼這一句自問比記住任何公式都重要？\n\n## 延伸閱讀\n\n- **Daniel Ford 等，《Availability in Globally Distributed Storage Systems》，USENIX OSDI 2010**（2026-06 查證）。本章「相關性故障」的實證後台。直接看它對「相關性故障如何主宰不可用度」「不算相關性會高估可用度約兩個數量級」的量化——你會發現本章的玩具數字在真實 Google 規模下只會更狠。讀摘要與談 correlated failure 的那幾節即可。\n- **AWS 官方事後報告與媒體分析：2025-10-20 us-east-1 大當機**（2026-06 查證；如 AWS service health 報告、The Register 的控制平面分析）。看「多 AZ 為什麼擋不住」這條線：可用區只吸收區域內實體故障，擋不住跨 AZ 的共享控制平面／DNS／IAM 依賴——本章「假獨立」最新鮮的真實案例。\n- **Gerd Gigerenzer，《Calculated Risks》（中譯《如何不被數字騙》一類）**。把條件機率與「`P(A|B)` ≠ `P(B|A)`」的混淆講成日常決策災難（醫檢、法庭），用自然頻率法拆解——是 ch05 的最佳熱身，本章先讀也行。\n- **任何一本扎實機率入門的「條件機率與獨立」章**（如 Blitzstein & Hwang《Introduction to Probability》前幾章，網路有免費講義與課程影片）。如果你想把本章的乘法法則、全機率公式練到反射，看它的例題；但記得本書的立場——你要的是「為什麼」的直覺，不是刷題。\n- **本書內部銜接**：`P(A|B)` 翻成 `P(B|A)` 的那把鑰匙（貝氏定理）見 ch05；「邊際獨立 vs 條件獨立」會在 ch19 辛普森悖論引爆；相關（correlation）作為「相依的連續強度版」見 ch10——獨立是「`ρ=0` 且更強」的條件，那裡會講清楚「不相關 ⇏ 獨立」這個本章獨立概念的近親陷阱。\n"}, {"id": "ch05-bayes-theorem", "file": "ch05-bayes-theorem.md", "group": "Part II — 貝氏：證據改變信念", "title": "ch05 — 貝氏定理：把條件機率反過來", "md": "# ch05 — 貝氏定理：把條件機率反過來\n\n> **本章解決什麼問題**：ch04 教你算 P(A|B)，但偷偷埋了一個地雷——P(A|B) 跟 P(B|A) 是兩個完全不同的數，混淆它們會死人（字面意義上，本章會給你一個被冤獄的案例）。你手上常有的是 P(資料|假設)：「這支告警在真故障時會響的機率」「這個篩檢在真有病時會驗出的機率」。但你真正想知道的是反過來的那個：「響了，真的有故障嗎？」「驗出陽性，真的有病嗎？」貝氏定理就是把後者翻成前者的那條換算公式。這是 Part II 的第一章，也是條件機率的高潮——ch06 會把它升級成一整套世界觀。\n\n```\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理 ◄你在這裡  ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽   ←   ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n## 從你已知的出發\n\n凌晨三點，PagerDuty 把你挖起來。某條告警規則響了。你閉著眼睛在心裡問的那句話，其實就是這一整章：「這真的是事故，還是又一次偽陽性？」\n\n你會這樣問，是因為你心裡同時握著兩個數，而且你隱約知道它們不一樣。\n\n第一個數是這條告警的**命中率**：當系統真的出事時，它響的機率有多高。這是你設規則時調出來的——閾值壓低一點、命中率就高一點，真出事幾乎一定會抓到。假設它很漂亮，99%。用機率語言寫：P(響 | 真故障) = 0.99。\n\n第二個數才是你真正想知道的，而且方向是反的：**現在它響了，背後真的有事的機率**。P(真故障 | 響)。\n\n這兩個數的差距，就是 alert fatigue 的數學根源。值班久了你早就用身體學會了這件事——大部分告警響起來，你的直覺反應不是「慘了」，而是「八成又是雜訊」。你不是不負責任，你是不自覺地在做一個正確的機率計算：因為**真故障本身很罕見**。一個健康的服務，一天裡絕大多數時間都好好的。當一個會在「健康」時也偶爾誤觸的規則，去偵測一個本來就很少發生的事件，那麼它響的時候，背景裡那一大片「其實沒事但被誤觸」的情況，會把真故障的訊號淹掉。\n\n命中率很高，但「響了真有事」的機率可以低得驚人——這兩件事可以同時成立，而且通常就是同時成立。本章要做的，是把這個你身體已經懂、但講不清楚的東西，變成一條你能在白板上寫給另一個工程師看的公式。\n\n順帶一提，你的收件匣裡那個垃圾郵件過濾器，骨子裡就是這一章。它看到一封信裡有「viagra」「免費」「點此領獎」，算的不是「垃圾信裡出現這些字的機率」（那是它從訓練資料量到的、反方向的數），而是「出現這些字的信是垃圾的機率」。它每天幫你把方向轉過來幾百次，靠的就是接下來這條公式。Bayesian email filtering 大概從 1996 年就開始用了，Sahami 等人 1998 年發表第一篇用 naive Bayes 做垃圾信分類的學術論文，Paul Graham 2002 年那篇〈A Plan for Spam〉讓它在工程圈紅起來（2026-06，已查證）。你天天在用貝氏，只是沒人逼你把它寫出來。\n\n## 兩個方向的條件機率，不是同一個數\n\n先把這章的核心病症說死，因為它太容易被當成廢話略過：**P(A|B) 跟 P(B|A) 沒有任何理由相等。**\n\nch04 給過你定義，P(A|B) = P(A∩B)/P(B)，讀法是「把世界縮小到 B 裡，再看 A 佔多少」。關鍵在那個分母。P(A|B) 是拿 A∩B 去除以 P(B)；P(B|A) 是拿同一個 A∩B 去除以 P(A)。分子一樣，分母不一樣。除非 P(A) 剛好等於 P(B)，否則這兩個數就是不一樣，而且可以差到天上地下。\n\n舉個你一眼就會同意的例子。令 A =「這個人是 Linux kernel 核心維護者」，B =「這個人會寫 C」。\n\n- P(B|A)：核心維護者裡會寫 C 的比例 ≈ 1。幾乎是全部。\n- P(A|B)：會寫 C 的人裡是 kernel 核心維護者的比例 ≈ 0.0000…幾。地球上會寫 C 的人幾百萬，核心維護者就那幾百個。\n\n同一對事件，一個方向接近 1，另一個方向接近 0。你不會把這兩句話搞混，因為它們的意思差太遠了。但只要把場景換成你不熟的領域——醫學檢驗、法庭證據、告警——人類的直覺就會瞬間把這兩個方向接在一起，當成同一個數。這個錯誤有名字，待會的「直覺的陷阱」會專門處理它。\n\n貝氏定理的全部工作，就是給你一條把這兩個方向接起來的精確匯率。它不是讓兩者相等——而是告訴你，要從 P(B|A) 換到 P(A|B)，你還缺哪些料、那些料怎麼進公式。\n\n## 從乘法法則推出貝氏定理（兩步，每步你都能口頭講出理由）\n\n這不是要你背的公式。它從 ch04 的乘法法則直接掉出來，兩行而已，我們手推一次，之後你就再也不用記它。\n\nch04 講過，交集機率 P(A∩B) 可以從兩個方向拆——「先 B 再 A」或「先 A 再 B」——而且兩種拆法算的是同一塊面積，所以相等：\n\n```text\nP(A∩B) = P(A|B)·P(B)        ← 先看 B 發生（機率 P(B)），再看在 B 裡 A 也發生\nP(A∩B) = P(B|A)·P(A)        ← 先看 A 發生（機率 P(A)），再看在 A 裡 B 也發生\n```\n\n同一個東西的兩種寫法，當然相等。把右邊兩條接起來：\n\n```text\nP(A|B)·P(B) = P(B|A)·P(A)\n```\n\n只剩一步：兩邊同除 P(B)，把你想要的 P(A|B) 單獨留在左邊。\n\n```text\n            P(B|A)·P(A)\nP(A|B) =  ───────────────\n               P(B)\n```\n\n這就是貝氏定理。沒有了。它不是一條新定律，它只是「交集機率兩種拆法相等」這件事，移項一下。Thomas Bayes 牧師那篇遺稿 1763 年 12 月 23 日在皇家學會被宣讀（他 1761 年就過世了，是好友 Richard Price 整理增補後送出去的），但要說清楚一件容易被吹過頭的事：**Bayes 本人並沒有證出我們今天寫的這條公式**。他解的是一個更迂迴的逆機率問題、還用了均勻先驗；今天教科書上這條乾淨的一般形式，主要是 Laplace 1774 年獨立做出來、並推廣的（2026-06，照 landscape）。所以有些人半開玩笑說這應該叫「Laplace 定理」。歷史歸功常常是這樣的——名字貼在第一個被記住的人身上，不一定是做最多的人。\n\n現在換上這章真正要用的記號。把 A 換成 H（假設，hypothesis）、B 換成 D（資料／證據，data）：\n\n```text\n            P(D|H)·P(H)\nP(H|D) =  ───────────────\n               P(D)\n```\n\n四個角色，每個都有自己的職稱，你要能一個一個唸出來：\n\n- **P(H)** ＝ 先驗（prior）：看到資料**之前**，你認為這假設成立的機率。在告警的例子裡，就是「真故障本身有多罕見」。\n- **P(D|H)** ＝ 概似（likelihood）：假設成立的話，你會看到這筆資料的機率。「真故障時告警會響的機率」。這通常是你手上有的那個數。\n- **P(H|D)** ＝ 後驗（posterior）：看到資料**之後**，你對假設的更新後信念。「響了，真有故障的機率」。這是你想要的答案。\n- **P(D)** ＝ 證據（evidence）：這筆資料整體上會出現的機率，不分假設成不成立。它是分母、是正規化常數，等下你會看到它其實是用 ch04 的全機率公式算出來的。\n\n一句話記住整條公式在幹嘛：**先驗被概似乘一下、再除以證據，就更新成後驗。** 資料進來，信念被推著走。這就是貝氏的全部精神，ch06 會把它變成世界觀。\n\n## 分母從哪來：證據就是全機率公式\n\n公式裡最容易卡住的是分母 P(D)。資料「整體出現的機率」聽起來很玄，但它一點都不玄，它就是 ch04 結尾那條全機率公式（law of total probability）。\n\nD 會發生，無非兩條路：要嘛 H 成立而你看到 D，要嘛 H 不成立（寫成 Hᶜ）你還是看到 D。這兩條路互斥又窮盡，把機率加起來就是 D 的總機率：\n\n```text\nP(D) = P(D|H)·P(H) + P(D|Hᶜ)·P(Hᶜ)\n        └── 真的有 ──┘   └── 假警報 ──┘\n```\n\n於是貝氏定理可以寫成完全展開的版本，分母攤平：\n\n```text\n                    P(D|H)·P(H)\nP(H|D) = ──────────────────────────────────────\n          P(D|H)·P(H) + P(D|Hᶜ)·P(Hᶜ)\n```\n\n這個展開版才是你實際拿來算的形式，因為它把每個你需要的數都攤在檯面上。看著它你就懂後驗在算什麼了：分子是「真的有事、而且被偵測到」這條路的機率；分母是「所有會看到這個證據的路」的總和——真陽性那條，加上偽陽性那條。後驗就是**真陽性佔全部陽性的比例**。\n\n而偽陽性那條 P(D|Hᶜ)·P(Hᶜ) 之所以常常大得嚇人，是因為它後面乘的 P(Hᶜ) 通常接近 1——壞事很罕見，所以「沒事」才是常態。哪怕單次誤觸機率很小，乘上一個巨大的「沒事」母數，總量就壓過了真陽性。這就是 alert fatigue 的代數骨架，你盯著它看十秒。\n\n## Worked example：篩檢陽性，你真的有病嗎\n\n這是全書最該被你記住的一頁，因為它的答案會冒犯你的直覺，而且冒犯得有道理。\n\n設定（全書基準，後面章節還會回收）：\n\n- 有一種病，**盛行率 0.1%**。也就是隨機抓一個人，他得這病的先驗機率 P(病) = 0.001。\n- 有一個篩檢，**敏感度 99%**：真有病的人，99% 會驗出陽性。P(陽|病) = 0.99。\n- 這篩檢的**偽陽性率 5%**：其實沒病的人，有 5% 會被誤判成陽性。P(陽|沒病) = 0.05。\n\n你去做了篩檢，結果是陽性。問：你真的有病的機率 P(病|陽) 是多少？\n\n幾乎每個人——包括很多醫生，這不是嘴砲，後面有數據——第一直覺會說「敏感度都 99% 了，那大概 95% 以上吧？」。我們算算看。\n\n### 方法一：硬套貝氏公式\n\n把全機率公式版本的分母攤開，數字代進去：\n\n```text\n              P(陽|病)·P(病)\nP(病|陽) = ───────────────────────────────────────\n            P(陽|病)·P(病) + P(陽|沒病)·P(沒病)\n\n              0.99 × 0.001\n        = ─────────────────────────────\n            0.99 × 0.001 + 0.05 × 0.999\n```\n\n一步一步算，別跳：\n\n```text\n分子       = 0.99 × 0.001  = 0.00099       ← 真陽性那條路\n偽陽性項   = 0.05 × 0.999  = 0.04995       ← 假警報那條路\n分母       = 0.00099 + 0.04995 = 0.05094   ← 所有陽性\n\nP(病|陽)  = 0.00099 / 0.05094 ≈ 0.0194 = 1.94%\n```\n\n**1.94%。** 不是 95%、不是 50%、不是 19%。驗出陽性的人裡，真正有病的不到五十分之一。\n\n第一次看到這個數，沒有人不愣的。一個準確度 99% 的檢驗，給你一個陽性結果，而你有病的機率還不到 2%？這不是檢驗爛——這是基率（base rate）在說話。我們換個算法把它說清楚，順便交叉驗算。\n\n### 方法二：自然頻率法，直覺就回來了\n\n這是 Gigerenzer 和 Hoffrage 1995 年那篇研究的招牌手法（照 landscape）：別講機率，講人頭。把同一題改成「想像 10 萬個人」，不要小數、不要百分比，只數人。\n\n想像隨機抓 10 萬人來做篩檢：\n\n```text\n              10 萬人\n             /        \\\n        有病 100      沒病 99,900       ← 盛行率 0.1%：10 萬人裡 100 個有病\n         /    \\         /      \\\n    陽性 99  陰性 1  陽性 4995  陰性 94,905\n    (99%)           (5% 偽陽)\n```\n\n- 100 個有病的人，99% 驗出陽性 → **99 人真陽性**。\n- 99,900 個沒病的人，5% 被誤判 → **4,995 人偽陽性**。\n- 全部陽性的人 ＝ 99 + 4,995 ＝ **5,094 人**。\n- 這 5,094 個收到陽性報告的人裡，真有病的只有 99 個。\n\n```text\nP(病|陽) = 99 / 5094 ≈ 0.0194 = 1.94%\n```\n\n兩種方法同一個答案，**1.94% 複核通過**。\n\n但重點不只是答案對。重點是——你發現了嗎——用人頭講的時候，那個「怎麼可能只有 2%」的迷惑感消失了。99 個真陽性對上 4,995 個偽陽性，誰多誰少一目了然。99,900 這個巨大的健康人母數，就算只有 5% 被誤觸，掃出來的偽陽性（4,995）也輕鬆輾壓那 99 個真陽性。基率的威力，在人頭版裡是用眼睛看見的，不需要任何代數。\n\n我把兩種算法並排成一張表，你會更有感——同一題、同一組數字、同一個答案，只是表述方式換了：\n\n```text\n              機率／百分比版              自然頻率版（每 10 萬人）\n─────────────────────────────────────────────────────────────\n先驗          P(病) = 0.001              100 人有病\n敏感度        P(陽|病) = 0.99            其中 99 人驗出陽性\n偽陽性        P(陽|沒病) = 0.05          99,900 健康人中 4,995 人誤陽\n─────────────────────────────────────────────────────────────\n後驗          0.00099 / 0.05094          99 / (99 + 4,995)\n              ≈ 1.94%                     = 99 / 5,094 ≈ 1.94%\n─────────────────────────────────────────────────────────────\n讀完的感覺    「怎麼可能？」              「喔，4,995 把 99 淹了」\n```\n\n**這裡了不起在哪**——而且請你務必能轉述給另一個工程師：同一道題、同樣的數學、同樣的答案，只因為換了表述方式（機率 vs 人頭），人類解對的比例就天差地別。Gigerenzer 那篇研究量過：一般人用機率格式時，只有約 16% 算得出貝氏答案；換成自然頻率，跳到 46%。更狠的是 1998 年那篇後續研究——他們找了平均 14 年資歷的醫生來做，用機率呈現時，**醫生答對的只有大約 10%**（2026-06，已查證）。不是病人，是醫生。這不是在罵誰笨。這是在說：人類的貝氏推理能力，是被「資訊長什麼樣子」鎖住的。換個容器，同樣一顆腦袋就突然會了。我認為這是整本書關於人類認知最值得停下來想的一頁——我們的直覺不是壞掉，是被格式綁架了，而你只要學會換格式，就能把它解開。\n\n## 基率忽視：問題出在基率，不在準確度\n\n回頭盯著那個 1.94%，問一個工程師會問的問題：**瓶頸在哪？要把後驗拉上去，我該調哪個旋鈕？**\n\n直覺說：檢驗不夠準，去把敏感度提上去。我們來試。把敏感度從 99% 拉到 99.9%——幾乎完美，真有病的人千分之 999 都抓得到。重算：\n\n```text\n真陽性  = 0.999 × 0.001 = 0.000999\n偽陽性  = 0.05  × 0.999 = 0.04995      （沒動，因為偽陽性率沒變）\n後驗    = 0.000999 / (0.000999 + 0.04995) ≈ 0.0196 = 1.96%\n```\n\n從 1.94% 動到 1.96%。**幾乎沒動。** 你把敏感度逼到接近物理極限，後驗紋風不動。為什麼？因為分母被那個 4,995 的偽陽性項主導著，而偽陽性項根本不看敏感度——它是「健康人母數 × 偽陽性率」，跟你的檢驗抓不抓得到病人毫無關係。\n\n真正的瓶頸是**基率**。盛行率 0.1% 意味著你還沒做任何檢驗之前，這個人有病的機率就只有千分之一。檢驗能做的，是把這個信念往上推一點點——從 0.1% 推到 1.94%，其實已經推了快二十倍了，這檢驗沒那麼爛。但要從千分之一的起點推到「八九不離十」，單靠一次檢驗的證據量根本不夠。\n\n這個系統性錯誤有名字：**基率忽視（base-rate neglect）**。人在做這種反向推理時，注意力會被那個鮮明的、好懂的數字（99% 敏感度！）抓走，而把那個灰撲撲的背景數字（盛行率才 0.1%）整個忘掉。但在貝氏公式裡，先驗 P(H) 跟概似 P(D|H) 是相乘的、地位平等——你不能只看一個。忽略基率，等於把公式裡的 P(H) 偷偷換成 1，當作「先驗無所謂、檢驗說了算」。它從來不是這樣。\n\n這對你的工程直覺其實是個好消息：當「響了真有事」的後驗低得離譜，你第一個該懷疑的不是「告警規則命中率不夠高」，而是「我在偵測的這件事，基率是不是太低了」。低基率事件本來就難偵測，這是數學事實，不是你 regex 寫得爛。要嘛接受高偽陽性、要嘛靠**多重獨立證據**連續更新（一次檢驗不夠，那就再驗一次、再加一個不相關的指標）——而「拿後驗當下一次的先驗、再乘一次概似」這個連續更新的循環，正是 ch06 的主題。\n\n## 直覺的陷阱\n\n這章的招牌謬誤，是把兩個方向的條件機率對接成同一個——而它在法庭上是會送人進監獄的。\n\n### 檢察官謬誤（prosecutor's fallacy）\n\n場景：刑案現場採到一份 DNA，比對到被告。專家作證：「這份 DNA 來自隨機某人、卻剛好吻合的機率，是百萬分之一。」檢察官站起來對陪審團說：「所以，被告無辜的機率只有百萬分之一。」\n\n聽起來天衣無縫。它錯得很深。\n\n專家給的是 P(吻合 | 無辜)——「一個無辜的人剛好 DNA 吻合的機率」≈ 百萬分之一。檢察官講的是 P(無辜 | 吻合)——「DNA 吻合的情況下，這人無辜的機率」。他把兩個方向的條件機率**直接劃上等號**，這個動作有個更技術的名字叫「對調條件（transposed conditional）」。這正是本章開頭那個 kernel 維護者的錯誤，只是換上了會毀掉一個人人生的場景。\n\n為什麼這兩個數可以差到離譜？因為缺了先驗。假設這案子的嫌疑範圍是一座一千萬人的城市。那麼除了被告，城裡還有大約 10,000,000 ÷ 1,000,000 ＝ **10 個無辜的人**，DNA 也會剛好吻合。所以「DNA 吻合」的人總共有 11 個（10 個無辜 + 1 個真兇，如果真兇在城裡）。光憑 DNA 吻合，被告是真兇的機率不是百萬分之 999,999，而是大約 1/11 ≈ 9%。從「幾乎鐵定有罪」變成「十一個吻合者之一」，差距就是被偷偷扔掉的那個先驗（嫌疑母體有多大）。\n\n這不是課本上的假想題。英國的 Sally Clark 案就是血淋淋的真實版：她的兩個嬰兒相繼猝死，檢方專家作證「同一個家庭兩個嬰兒都自然猝死的機率是七千三百萬分之一」，她 1999 年被判謀殺定罪。那個數字本身的算法就有問題（假設了兩次死亡獨立），但更致命的是，「兩次自然猝死的機率極小」被當成了「她無辜的機率極小」——又是一次對調條件，把 P(證據|無辜) 講成了 P(無辜|證據)，而且同樣忘了去比較另一邊：「兩個嬰兒都被謀殺」這個對立假設，機率難道就比較大嗎？她後來被平反，但已經坐了三年冤獄（2026-06，已查證）。\n\n| 你以為在算的 | 其實算的是 | 缺了什麼 |\n|---|---|---|\n| P(無辜 \\| 證據)：他無辜的機率 | P(證據 \\| 無辜)：無辜者剛好吻合的機率 | 先驗——嫌疑母體多大、別的假設多不可能 |\n| P(病 \\| 陽性)：陽性者有病的機率 | P(陽性 \\| 病)：病人會驗出陽性的機率 | 基率——盛行率多低 |\n| P(真故障 \\| 告警)：響了真有事 | P(告警 \\| 真故障)：有事時會響 | 基率——真故障本來多罕見 |\n\n三行其實是同一個錯誤穿了三件衣服。\n\n### 怎麼自我察覺你正在犯這個錯\n\n- **你只報了一個方向的數，就下了反方向的結論。** 一聽到「準確率 99%」「吻合機率百萬分之一」就準備拍板，而你完全沒問「那另一邊呢」——沒事的人有多少、別的解釋有多可能。徵兆：你算式裡只出現一個條件機率，分母卻被你當成 1。\n- **你把先驗（基率）整個漏了。** 講得出敏感度、講得出命中率，卻答不出「這件事本身多常發生」。在貝氏公式裡先驗跟概似是相乘的——漏掉它等於偷偷把它設成了極端值。\n- **你沒問「有多少人會看到同樣的證據卻是無辜／健康／沒事的」。** 這就是分母裡那條偽陽性路。問不出這個數，你的後驗就是空的。\n\n自我急救：**把它翻成人頭。** 一旦你開始懷疑自己對調了條件，立刻把題目改寫成「想像 10 萬個（人 / 請求 / 嫌疑人）」，把真陽性那群和偽陽性那群分別數出來，再看真陽性佔全部陽性的比例。自然頻率法不只是教學技巧，它是你發現自己腦袋打結時的逃生口。\n\n## 紙上推演\n\n### 推演 1：把準確度開到頂，看後驗動不動 **[15 分鐘]** ★★\n\n沿用篩檢基準（盛行率 0.1%、偽陽性率 5%），但把敏感度從 99% 一路提到 **99.9%**，重算 P(病|陽)。然後用一句話回答：為什麼把檢驗做得幾乎完美，後驗幾乎沒變？真正卡住後驗的是哪個數？\n\n#### 推演解答\n\n代進展開版貝氏公式，只有敏感度那項換成 0.999：\n\n```text\n真陽性  = 0.999 × 0.001 = 0.000999\n偽陽性  = 0.05  × 0.999 = 0.04995       ← 跟敏感度無關，沒動\n後驗    = 0.000999 / (0.000999 + 0.04995)\n        = 0.000999 / 0.050949 ≈ 0.0196 = 1.96%\n```\n\n從 1.94% 爬到 1.96%。提升微乎其微。\n\n道理是這樣：後驗 = 真陽性 / (真陽性 + 偽陽性)。敏感度只能撥動真陽性那一項，而真陽性本來就被盛行率 0.1% 壓得很小（最多就是那 100 個病人全抓到，0.001 量級）。偽陽性那一項是「健康人母數 0.999 × 偽陽性率 0.05 ≈ 0.05」，比真陽性大了一個數量級，而且完全不理會敏感度。分母被偽陽性主導，所以你怎麼磨敏感度都搖不動它。\n\n真正卡住後驗的是**基率（盛行率）**。要讓後驗有感提升，你得做的是壓低偽陽性率（讓那 4,995 變小），或者拉高先驗——例如不要對全人口亂篩，只篩「已經有症狀、本來就高風險」的子群，這群人的盛行率高得多，先驗一上去，同一個檢驗的後驗就漂亮了。這就是為什麼「全民普篩一個罕見病」在數學上往往是個壞主意：基率太低，偽陽性會把你淹死。常見錯路：以為「檢驗越準後驗越高」是線性的——不是，先驗封了頂。\n\n### 推演 2：用自然頻率重述一個告警偽陽性 **[15 分鐘]** ★★\n\n你的監控對某服務設了一條告警。設定：這服務真出事的基率是**每 1000 個偵測週期裡有 1 次**（千分之一）；告警的命中率（真出事時會響）是 **95%**；偽陽性率（沒事時誤響）是 **3%**。當你被一條告警挖起來，「這次真的有事」的機率是多少？先用人頭算，再說一句話給待命的同事聽。\n\n#### 推演解答\n\n想像 1000 個偵測週期：\n\n```text\n                1000 週期\n               /          \\\n        真出事 1        沒事 999          ← 基率千分之一\n          │               │\n        響 ~1           誤響 ~30          ← 0.95×1≈1；0.03×999≈30\n        (95%)           (3% 偽陽)\n```\n\n- 真出事：1 個週期，95% 會響 → 約 **1 次真告警**（0.95，四捨五入算 1）。\n- 沒事：999 個週期，3% 誤響 → 約 **30 次偽告警**（0.03 × 999 ≈ 29.97）。\n- 你收到的告警總共約 1 + 30 = 31 次，其中真有事的只有約 1 次。\n\n```text\nP(真有事 | 告警) ≈ 1 / 31 ≈ 3.2%\n```\n\n（想更精確：0.95×0.001 / (0.95×0.001 + 0.03×0.999) = 0.00095 / 0.03092 ≈ 0.0307 ≈ 3.1%，跟人頭版一致。）\n\n講給同事的一句話：「這條告警響 31 次大概只有 1 次是真的——不是規則爛，是它在抓的事本來就千中無一，3% 的誤響乘上那 999 個正常週期就把訊號淹了。先看其他指標確認，別一響就 all-hands。」這就是 alert fatigue 的數學，也是為什麼降偽陽性率（把 3% 壓到 0.3%）通常比拉高命中率更能救你的睡眠。\n\n### 推演 3：拆穿一句檢察官的話 **[10 分鐘]** ★★\n\n法庭上專家作證：「凶手在現場留下的某種罕見血型，全國只有萬分之一的人有。被告剛好是這個血型。」檢察官總結：「所以被告不是凶手的機率只有萬分之一。」指出這句話混淆了哪兩個條件機率，並用一個簡單估算說明為什麼這個結論可能離譜。\n\n#### 推演解答\n\n專家提供的數是 P(此血型 | 隨機某人) ＝ P(證據 | 無辜者) ≈ 1/10,000：一個跟案子無關的路人，剛好是這血型的機率。\n\n檢察官講的是 P(無辜 | 此血型) ＝「有這血型的情況下，被告無辜的機率」。他把這個數說成了 1/10,000，等於直接把 P(證據|無辜) 當成 P(無辜|證據)——**對調條件**，檢察官謬誤的標準款。\n\n為什麼結論離譜：估算一下有多少無辜者也符合。假設嫌疑範圍是一座 200 萬人的城市。萬分之一的盛行率，意味著城裡有 2,000,000 / 10,000 ＝ **200 個人**是這個血型。被告只是這 200 人之一。光憑血型，他是凶手的機率頂多 1/200 ≈ 0.5%，而不是檢方暗示的「99.99% 有罪」。血型證據把嫌疑人從 200 萬縮到 200 人，有用——但它遠遠不足以單獨定罪。被偷走的那個關鍵數，就是先驗（嫌疑母體有多大）。常見錯路：直接接受「萬分之一」很小所以「幾乎一定有罪」——沒去數另一邊有多少無辜者也符合，分母只算了一半。\n\n## 自我檢核\n\n口頭回答，講得清楚才算過。優先講「為什麼」。\n\n1. P(資料|假設) 和 P(假設|資料) 為什麼是兩個不同的數？舉一個兩者差到天上地下的例子（不准用書裡的）。\n2. 把貝氏定理從乘法法則手推一遍——不准看公式，邊推邊說每一步為什麼成立。\n3. 貝氏公式的分母 P(D) 是什麼？它跟全機率公式什麼關係？為什麼它常常被偽陽性那一項主導？\n4. 篩檢題後驗只有 1.94%，這個違反直覺的數，到底是「檢驗太爛」造成的，還是別的東西？把敏感度開到 99.9% 為什麼救不了它？\n5. 自然頻率法（講人頭）為什麼比講機率好懂？這件事本身在告訴我們人類認知的什麼？\n6. 什麼是檢察官謬誤？它混淆了哪兩個條件機率、漏掉了哪個關鍵的數？用 Sally Clark 或 DNA 的例子講一遍。\n7. 當「告警響了真有事」的機率低得離譜，你第一個該懷疑的是命中率不夠高，還是別的？為什麼？\n\n## 延伸閱讀\n\n- Gigerenzer, *Calculated Risks*（中譯《數字盲》一類）——自然頻率法的科普總綱，醫檢與法庭的貝氏誤判案例集，本章的篩檢震撼就出自這條線。先看講乳癌篩檢那章（2026-06，未驗證具體中譯版本）。\n- Gigerenzer & Hoffrage (1995), \"How to Improve Bayesian Reasoning Without Instruction: Frequency Formats\", *Psychological Review* 102(4):684–704——自然頻率法的原始論文，想看 16%→46% 那組數字的出處就讀它（照 landscape）。\n- Wikipedia, \"Prosecutor's fallacy\"——檢察官謬誤的標準條目，含 Sally Clark 與 People v. Collins 案例，看「transposed conditional」一節（2026-06，已查證）。\n- Stanford Encyclopedia of Philosophy, \"Bayes' Theorem\"——想搞清楚「Bayes 到底證了什麼、Laplace 又補了什麼」的權威來源，讀歷史歸屬那段（照 landscape）。\n- 3Blue1Brown, \"Bayes theorem, the geometry of changing beliefs\"（YouTube）——把貝氏更新畫成面積比例的影片，跟本章「後驗＝真陽性佔全部陽性的比例」是同一個直覺的視覺版（2026-06，未驗證連結）。\n- 下一章 ch06：把這條公式從「算一次」升級成「一筆一筆證據連續更新」的世界觀，並正式用貝氏解蒙提霍爾——你會看到後驗怎麼變成下一次的先驗。\n"}, {"id": "ch06-bayesian-worldview", "file": "ch06-bayesian-worldview.md", "group": "Part II — 貝氏：證據改變信念", "title": "ch06 — 貝氏作為世界觀：信念可以有數學", "md": "# ch06 — 貝氏作為世界觀：信念可以有數學\n\n> **本章解決什麼問題**：ch05 教你貝氏定理這個工具——怎麼把 P(資料|假設) 翻成 P(假設|資料)。這章把工具升級成世界觀：證據不是算一次就結束，而是一筆一筆進來、信念一次一次被拉動，這次的後驗就是下次的先驗。我們會處理貝氏派最被攻擊也最有力的地方（先驗從哪來），看主觀機率為什麼不是亂講（Dutch book 論證），把頻率派 vs 貝氏派的世紀分裂當故事講完（不選邊，但這條線會一路通到 Part V 統計推論的血統），最後用貝氏正式宰掉蒙提霍爾——你會看到答案完全取決於主持人的規則，而不是門。\n\n## 從你已知的出發\n\n你做 incident 診斷的時候，整個流程其實就是貝氏，只是你沒這樣叫它。\n\n半夜被 call 起來，p99 延遲飆高。你腦子裡第一反應不是一張白紙——你有**先驗**：「這種症狀，十次有七次是 DB 在搞鬼。」這個 0.7 不是你查表查來的，是六年踩坑踩出來的信念。然後你去翻 log（看**證據**），發現慢查詢突然暴增——這個觀察在「真的是 DB」的世界裡很常見、在「其實是網路」的世界裡很罕見，於是它把你的懷疑往 DB 那邊**拉**。你還沒下結論，但你對 DB 的信念從 0.7 升到了 0.9。接著你看連線池，發現也滿了——又一筆證據，再拉一次。\n\n注意這個過程的形狀：你**從來沒有確定**，你只是讓每一筆證據去調整一個介於 0 和 1 之間的信念數字。而且關鍵在這——**上一輪的結論變成下一輪的起點**。看完 log 之後那個「0.9 懷疑 DB」，就是你去看連線池時的先驗。證據一筆筆進來，信念一次次更新，後驗變成下一次的先驗。這就是本章的全部。\n\n你還有別的地方天天在做這件事：\n\n- **Feature flag 灰度放量**。你不會一次開到 100%。先放 1%，看一批資料（錯誤率、延遲），更新你對「這版安全嗎」的信念；沒事就放 5%、25%、50%。每一批流量都是一筆證據，每一次放量都是一次貝氏更新。你在用資料把「這版會炸嗎」的後驗一步步推向「應該不會」。\n- **金絲雀部署**就是這件事的連續版——序貫地拿小流量餵證據、序貫地更新信念，一旦後驗轉向「這版有問題」就 rollback。這在統計上有個正經名字叫**序貫分析（sequential analysis）**，但你早就在做了。\n\nch05 給你的是「算一次」的快照。這章要給你的是「一直算下去」的影片——信念怎麼在證據流裡演化。這是工程師最熟的東西：一個會被輸入持續更新的狀態機。\n\n## 更新的機制：後驗變成下一次的先驗\n\n先把 ch05 的貝氏定理擺出來，這章從這裡長出去：\n\n```text\nP(H|D) = P(D|H)·P(H) / P(D)\n  │        │       │      │\n後驗     概似    先驗   證據（標準化常數）\nP(假設   P(資料  P(假設  P(看到這筆\n |資料)   |假設)  本身)   資料的總機率)\n```\n\nch05 把它當一個公式：丟進去先驗、概似，吐出後驗，結束。這章要你看見一件 ch05 故意沒講的事——**這個公式可以接成一條鏈**。\n\n假設證據是一筆一筆來的：先看到 D₁，再看到 D₂。你大可以等兩筆都到齊，用一個聯合概似 P(D₁,D₂|H) 一次算完。但貝氏更漂亮的地方是，你可以**分兩步**，而且結果一模一樣：\n\n```text\n第一步：D₁ 進來\n  先驗 P(H)  ──D₁──▶  後驗 P(H|D₁)\n\n第二步：D₂ 進來，把上一步的後驗當這一步的先驗\n  先驗 P(H|D₁)  ──D₂──▶  後驗 P(H|D₁,D₂)\n       ↑\n   注意：這個「先驗」就是上一步的「後驗」\n```\n\n只要 D₁ 和 D₂ 在給定 H 之下條件獨立（看 log 跟看連線池，在「真的是 DB」的前提下，這個假設通常夠用），分兩步算跟一次算到底完全等價。這不是巧合，這是貝氏定理的代數性質。\n\n這件事為什麼了不起，值得你停下來想三十秒：**它讓「學習」變成一個可以無限累積的過程，而且不用回頭重算**。你不需要保留所有歷史資料、不需要每來一筆證據就把全部重跑一遍。你只要記住「目前的信念」（後驗），新證據來了就更新一次，更新完的就是新的「目前信念」。\n\n這對你來說應該超有既視感——這就是**串流處理 vs 批次處理**。批次是「等資料齊了一次算」，串流是「來一筆更新一次狀態、狀態就是你需要記住的全部」。貝氏更新天生是串流的。你的金絲雀部署之所以能一批一批放、不用每次把所有歷史流量重播，背後就是這個性質在撐。\n\n### 一個小數字感受一下「被拉動」\n\n來個最小的例子，建立手感。一枚硬幣，你懷疑它可能不公正。為了好算，假設只有兩種可能（這是刻意簡化，真實情況是連續的，但先建立直覺）：\n\n- H_fair：公正，P(正)=0.5\n- H_bias：作弊，P(正)=0.9\n\n你一開始沒理由偏向哪邊，先驗各半：P(H_fair)=0.5、P(H_bias)=0.5。\n\n現在你擲一次，出**正面**。更新：\n\n```text\n                  概似 P(正|H)   先驗 P(H)   概似×先驗\n  H_fair            0.5           0.5         0.25\n  H_bias            0.9           0.5         0.45\n                                              ────\n                              證據 P(正) =     0.70\n\n後驗 P(H_fair|正) = 0.25 / 0.70 ≈ 0.357\n後驗 P(H_bias|正) = 0.45 / 0.70 ≈ 0.643\n```\n\n一次正面，就把「作弊」的信念從 0.5 拉到 0.643。合理——作弊的硬幣比較容易出正面，看到正面當然該更懷疑它作弊。\n\n現在第二擲，又是**正面**。關鍵動作來了：**把上一步的後驗當這一步的先驗**。\n\n```text\n                  概似 P(正|H)   先驗 P(H)    概似×先驗\n                                （=上輪後驗）\n  H_fair            0.5          0.357        0.1785\n  H_bias            0.9          0.643        0.5787\n                                              ──────\n                              證據 P(正) =     0.7572\n\n後驗 P(H_fair|正正) ≈ 0.1785 / 0.7572 ≈ 0.236\n後驗 P(H_bias|正正) ≈ 0.5787 / 0.7572 ≈ 0.764\n```\n\n兩次正面，作弊的信念爬到 0.764。\n\n**交叉驗算**（這很重要，貝氏題超容易算錯，我每個數字都自己重跑一遍）：直接用聯合概似一次算，跳過中間步驟。連兩次正面，P(正正|H_fair)=0.25、P(正正|H_bias)=0.81，先驗各 0.5：\n\n```text\n  H_fair: 0.25 × 0.5 = 0.125\n  H_bias: 0.81 × 0.5 = 0.405\n  證據 = 0.125 + 0.405 = 0.530\n  P(H_bias|正正) = 0.405 / 0.530 ≈ 0.764  ✓\n```\n\n一次算到底跟分兩步算，後驗都是 0.764。完全吻合。這就是「後驗變先驗」的鏈式更新跟「批次一次算」等價的活生生證據。\n\n你看到「信念被資料拉動」是什麼意思了：它不是跳到 0 或 1，它是一個**連續滑動**的數字，證據越多、滑得越遠。再擲幾次全是正面，你對作弊的信念會逼近 1 但永遠不到 1——貝氏不給你確定，它給你**越來越強的傾向**。這跟你的工程直覺完全合拍：你從不說「D
