 Why》（中譯《因果革命》）**——本書「相關 ≠ 因果」只到「三條岔路＋隨機化直覺」為止（多變量與因果框架是全域不涵蓋的洞）。想正式地從資料推因果——confounder、do-演算、因果圖——這本是現代因果推論的科普入口（接 ch10、ch19）。\n\n- **複現危機的一手文獻（往應用者必讀的「反面教材」，全部照 landscape）**：\n  - **Ioannidis (2005),「Why Most Published Research Findings Are False」, _PLoS Medicine_ 2(8):e124**——元科學的奠基文獻，核心論證就是你已經會算的貝氏篩檢題（接 ch05、ch19）。\n  - **Simmons, Nelson & Simonsohn (2011),「False-Positive Psychology」, _Psychological Science_ 22(11):1359–1366**——「研究者自由度／p-hacking」一詞的出處，把名目 5% 假陽性推到最壞約 60% 的那篇模擬；末尾「六條揭露要求」就是解藥（接 ch18、ch19）。\n  - **Open Science Collaboration (2015),「Estimating the Reproducibility of Psychological Science」, _Science_**——原研究 97% 顯著、複現僅約 36% 的那張散點圖（接 ch18、ch19）。\n  - **Wasserstein & Lazar (2016),「ASA Statement on p-Values」, _The American Statistician_ 70(2):129–133**——學界正式承認「招牌數字一直被讀錯」的歷史文件，讀第 2、5 條（接 ch18、ch19）。\n  - **「Before p<0.05 to Beyond p<0.05」（_The American Statistician_ 2018, tandfonline，已查證）**——把 0.05 的身世講清楚，治好「0.05 是物理常數」這個病（接 ch18）。\n\n- **信賴區間的誤讀（用之前先治病）**：**Hoekstra et al. (2014),「Robust misinterpretation of confidence intervals」, _Psychonomic Bulletin & Review_**——實測學生與研究者都系統性誤讀 CI 的經典研究。配 PMC「Continued misinterpretation of confidence intervals」（landscape 引）一起讀，把「為什麼這麼難改正」講透（接 ch17）。\n\n---\n\n## 路線三：往欣賞——把驚嘆挖到底\n\n如果你只想再被拍一次大腿，看人類直覺如何在隨機面前崩壞、看一個概念誕生的歷史現場，走這條。這也是本書精神最近的一條路。\n\n- **3Blue1Brown（Grant Sanderson），機率與統計系列（YouTube）**（2026-06，頻道持續更新，建議搜尋頻道確認連結）——跟本書同一種「先給直覺、再給數學」的精神，動態版。尤其「**But what is the Central Limit Theorem?**」（2023）把 ch14 的「抹平」直覺做給你看；「**Bayes theorem, the geometry of changing beliefs**」把 ch05 的「後驗＝真陽性佔全部陽性的比例」畫成面積；「**Why π is in the normal distribution**」接 ch15。免費、看完刻進腦子。\n\n- **Daniel Kahneman,《快思慢想》（Thinking, Fast and Slow, 2011）**（2026-06，繁中譯本通行）——把本書「直覺的陷阱」整條線往認知科學深挖。Kahneman 與 Tversky 一輩子研究的就是人腦為什麼在機率前系統性崩壞（代表性捷思、基率忽視都出自他們，接 ch05、ch19）。讀完你會更看得起本書故障視角背後的科學。\n\n- **Sharon Bertsch McGrayne,《The Theory That Would Not Die》（中譯《統計，改變了世界》系出此脈）**（2026-06，書目未逐一驗證）——講貝氏定理兩百年浮沉，從遺稿、二戰破密碼到現代復興，可讀性極高。想把「頻率派 vs 貝氏派世紀分裂」當故事讀完，從這本進（接 ch06）。\n\n- **Jordan Ellenberg,《How Not to Be Wrong》（中譯《數學教你不犯錯》）**（2026-06，已查證歸屬，Ellenberg 引述 Wald／SRG）——瓦德飛機彈孔（倖存者偏誤）那一章是全書開場，比任何教科書都生動，讀第一章就值回票價（接 ch16）。\n\n- **Darrell Huff,《How to Lie with Statistics》（1954）**——薄薄一本老書，「偏誤的樣本」那一章到今天一個字都不過時。當「統計版的反模式手冊」讀，每個看 dashboard 的人都該翻（接 ch16、ch19）。\n\n- **Tyler Vigen,《Spurious Correlations》（網站 tylervigen.com 與同名書，2026-06，已查證）**——那些 ρ>0.99 卻荒謬絕倫的配對（緬因州離婚率 vs 人造奶油）。當笑話讀，看完你對「相關係數高」會永久免疫（接 ch10）。\n\n- **悖論與謬誤的權威條目（精確陳述很重要，全部照 landscape）**：\n  - **Steve Selvin (1975) 的原始信＋vos Savant (1990-09-09, _Parade_) 專欄論戰**——蒙提霍爾「換可使勝率加倍」引來約一萬封來信（含許多博士）說她錯，但她對。看一群受訓過的人集體翻車的震撼（接 ch06）。\n  - **Stanford Encyclopedia of Philosophy,「The St. Petersburg Paradox」**（plato.stanford.edu，已查證）——讀「Bernoulli's solution」一節，確認它是效用問題、不是算錯（接 ch08）。\n  - **Miller & Sanjurjo (2018),「Surprised by the Hot Hand Fallacy?」, _Econometrica_**（已查證）——熱手 2018 翻案：去掉選擇偏差後，三十年「熱手是謬誤」的定論被推翻。這個轉折本身就是獨立的驚嘆點（接 ch13）。\n  - **Wikipedia,「Bertrand paradox (probability)」/「Boy or girl paradox」/「Birthday problem」/「Gambler's ruin」**（2026-06，可查）——三種隨機弦各得一答、兩孩問題的歧義、生日問題的逼近公式、賭徒破產與翻本法的必敗結構。圖解清楚，比文字快（接 ch02、ch03、ch20）。\n\n- **科學史單篇佳作**：\n  - **John D. Cook,「How the central limit theorem began」（johndcook.com, 2010，已查證）**——棣美弗 1733 怎麼從算硬幣意外撞出常態（接 ch14）。\n  - **Brian Hayes,「First Links in the Markov Chain」, _American Scientist_ (2013)**（已查證）——馬可夫鬥嘴故事寫得像偵探小說，讀「the war on free will」與奧涅金兩節（接 ch21）。\n  - **Brin & Page (1998),「The Anatomy of a Large-Scale Hypertextual Web Search Engine」**（照 landscape）——PageRank 原始論文，讀第 2.1 節隨機衝浪者與穩態（接 ch21）。\n\n---\n\n## 如果只看三樣\n\n時間有限就看這三樣，分別補你最該補的一塊：\n\n1. **Blitzstein & Hwang,《Introduction to Probability》（免費，probabilitybook.net ＋哈佛 Stat 110 影片）**——一本同時打通「往嚴格」與「往應用」：把本書全程的直覺升級成帶推導與習題的能算版，風格還活潑不死板。只挑一本教科書，就是它。\n\n2. **3Blue1Brown「But what is the Central Limit Theorem?」（YouTube，2023）**——一支影片補滿「往欣賞」：把全書最大驚嘆（ch14 的「不管原分布長相、加總都收斂到同一條鐘」）做成動畫。免費、20 分鐘、看完那個直覺再也忘不掉。\n\n3. **Wasserstein & Lazar (2016),「ASA Statement on p-Values」（_The American Statistician_ 70(2)）**——一份六頁的官方文件補滿「故障視角」：一個專業學會正式承認招牌數字被全世界讀錯。把 ch18、ch19 的故障視角從「本書作者的提醒」升級成「整個學界的共識」。\n\n---\n\n## 鄰書銜接點：書架上接著走的三本\n\n本書是書架的一格，旁邊三本書接得上——它們不是延伸閱讀的「外人」，而是本書刻意留洞、由它們補完的鄰居。各標出「從本書哪一章接過去最順」。\n\n### 《馴服無限》（微積分）——補完「機率即面積」與「怪獸函數」\n\n本書全程把「機率＝曲線下面積」「機率＝密度的積分」當工具用，卻沒推導積分本身——那是微積分的主場。\n\n- **從 ch15（常態之美與機率即面積）接過去最順**。本書用「機率即面積」查尾端、反查 CDF，但沒講高斯積分 ∫e^(−x²)dx=√π 為什麼會冒出 π。《馴服無限》把積分、曲線下面積、二維積分換極座標讓 π 從圓那裡進來這整套講透（積分基礎在它的 ch07「積分」與 ch08「微積分基本定理：面積＝斜率反過來」；「機率即面積」是它收尾把工具接回機率的脈絡，章號以該書當前版本為準）。ch12、ch14 用到面積時也都指向這裡。\n- **ch22（布朗運動）接它的 ch13「怪獸函數：連續但處處尖刺」**——這條銜接最該先讀。魏爾斯特拉斯手刻的「處處連續、處處不可微」函數，正是布朗路徑病態的「確定性雙胞胎」：那本書手工打造的反例，本書用隨機性自動量產，是同一頭怪獸的兩張臉。\n\n### 《佇列論》——補完 Poisson 過程、指數分布、Markov/CTMC 的運算\n\n本書把 Poisson 分布、指數分布、馬可夫鏈當「靜態快照」欣賞，刻意不在時間軸上展開運算；那一整套到達過程與排隊計算，是《佇列論》的主場。\n\n- **從 ch11（離散分布，卜瓦松）與 ch12（連續分布，指數）接過去最順**。本書的卜瓦松是稀有計數的靜態形狀、指數是無記憶的等待時間；《佇列論》ch04（指數分布：排隊世界的原子）、ch05（Poisson 過程：到達的標準模型）把它們接到到達間隔、佇列長度、Little's law 那一整套運算——靜態快照變成動態影片。\n- **ch21（馬可夫鏈）接它的 ch06（Markov chain）、ch07（CTMC 與生滅過程），更進階的排隊網路在它的 ch16（Jackson networks）**。本書只給穩態的直覺；要動手算系統的吞吐與延遲、把馬可夫鏈當運算工具，去那裡。\n\n### 《把系統寫成定理》（TLA+ 與形式化方法）——∀∃ 量詞與「我有多確定」的對抗結構\n\n這條銜接最隱微也最迷人：信賴區間與 p 值的正確意義，骨子裡是一個**量詞結構**，跟 TLA+ 的 ∀∃ 是同一種思考。\n\n- **從 ch17（估計與信賴區間）接過去最順**。「95% 信賴區間」的正確意義是頻率派的量詞陳述：**對所有真值**，用這套程序反覆抽樣，**存在 95% 的比例**會涵蓋真值（Neyman 1937，照 landscape）——它說的是「**製造區間這個程序**的長期涵蓋率」，不是「**這一條**區間」的機率。這個「∀真值・程序保證涵蓋率」的結構，跟 TLA+ 用 ∀∃ 量詞刻畫「所有執行路徑都滿足某性質」是同構的對抗式思考：你不是斷言某個個案，而是斷言一個程序對所有情況的保證。ch18 的 p 值（「假設 H₀，看資料有多極端」的反證法結構）同理——兩者都是「先固定一個全稱假設，再量化證據」，與形式化方法「先寫不變量、再驗所有狀態」是同一種腦袋。讀完本書 ch17、ch18，再去《把系統寫成定理》看 ∀∃ 怎麼把「正確性」變成可驗證的斷言，你會對「精確地說『我有多確定』」這件事有立體的體感。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "機率與統計史實基準表（landscape-2026-06）", "md": "---\nlast_verified: 2026-06-13\nreview_after_days: 180\nstatus: research-agent-draft\nsource: web research 2026-06-13\n---\n\n# 機率與統計史實基準表（landscape-2026-06）\n\n本檔是《馴服隨機》全書「歷史、人物、歸屬、引文、悖論精確陳述」的權威錨點。各章數學自證；本檔管日期、人名、歸屬、引言、著名結果與悖論的「標準陳述」。\n\n使用規約：\n- 凡引用日期／歸屬，作者請對照本檔，不要憑記憶。\n- ⚠️ 標記 = 來源不一致、常被誤傳、或我無法從可靠來源百分百確認的細節。看到 ⚠️ 請特別小心，照本檔給的「正確版」寫。\n- 來源優先序：Stanford Encyclopedia of Philosophy、MacTutor、大學頁面、原始論文紀錄、Encyclopedia of Mathematics > 一般百科 > 部落格。\n- 數值基準（生日問題、民調誤差、貝氏篩檢、68-95-99.7）均為本研究 agent 以 Python 自算，標「自算」者可直接抄。\n\n---\n\n## 一、機率的誕生（賭桌，16–17 世紀）\n\n### Cardano《Liber de ludo aleae》（賭博遊戲之書）\n- **寫作約 1564，1663 年身後出版**（Cardano 1576 年過世）。被視為機率數學最早的起點之一，比 Pascal–Fermat 通信早一個多世紀。\n- Cardano 是第一個把隨機事件當成受數學律支配、並把機率視為 0 到 1 之間的值、以「有利結果／不利結果之比」定義勝算的人。\n- 來源：Timeline of probability and statistics（Wikipedia）https://en.wikipedia.org/wiki/Timeline_of_probability_and_statistics ；Chalkdust「Roots: Gerolamo Cardano」https://chalkdustmagazine.com/biographies/roots-gerolamo-cardano/ ；Dover 英譯本書目（Gould 譯）。\n- ⚠️ 「1564」是學界常引的寫作年，但 Cardano 一生多次增補手稿，確切年份有彈性；出版年 1663 較無爭議。\n\n### Pascal–Fermat 通信 1654，「分賭注問題（problem of points）」\n- **1654 年夏**，Blaise Pascal 與 Pierre de Fermat 數週往返通信，公認為機率論正式史的開端。核心是「分賭注問題」：賭局中途中止，賭金該如何公平分配。\n- 兩人以不同方法（Fermat 用窮舉所有可能結果；Pascal 用更高效的遞迴計算）得到一致解。**真正的成就是引入「期望值（expectation）」概念。**\n- 來源：APS News「July 1654: Pascal's Letters to Fermat on the Problem of Points」https://www.aps.org/apsnews/2009/07/pascal-letters-fermat-points ；Wikipedia「Problem of points」https://en.wikipedia.org/wiki/Problem_of_points\n\n### Huygens《De ratiociniis in ludo aleae》（論賭博中的推理）\n- **1657 年以拉丁文出版，是第一本印行的機率論專著**（first printed treatise on probability），直到 18 世紀前是該主題唯一的書。\n- Huygens 1656 年在巴黎聽聞 Pascal 的工作後投入研究。書中以「期望（一隨機量的期望值）」而非「過程的機率」為基本概念：若 a、b 的機率比為 p:q，「機會的價值」為 (pa+qb)/(p+q)。\n- 來源：Wiley「Huygens and De Ratiociniis in Ludo Aleae, 1657」https://onlinelibrary.wiley.com/doi/10.1002/0471725161.ch6 ；Dartmouth 英譯本 https://math.dartmouth.edu/~doyle/docs/huygens/huygens.pdf ；Internet Archive https://archive.org/details/DeRatiociniisInLudoAleae\n\n---\n\n## 二、古典時期與兩大定理的起源（18–19 世紀）\n\n### Jacob（Jakob）Bernoulli《Ars Conjectandi》（推測術）\n- **1713 年出版**，作者已於 **1705 年過世**，由其侄 Nicolaus I Bernoulli 整理付印（出版時距其過世 8 年）。\n- 含機率論第一個極限定理：**弱大數法則（weak law of large numbers）**，被視為該學科的奠基之作。\n- 來源：Wikipedia「Ars Conjectandi」https://en.wikipedia.org/wiki/Ars_Conjectandi ；Wiley/ISR「Tercentenary of Ars Conjectandi (1713)」https://onlinelibrary.wiley.com/doi/10.1111/insr.12050\n\n#### ⚠️「黃金定理（golden theorem / theorema aureum）」的命名爭議\n- 通說：Bernoulli 自稱大數法則為其「黃金定理」，後由 **Poisson** 改稱「Bernoulli 的大數法則（law of large numbers）」。\n- **但有學界主張這是訛傳**：Karl Pearson 可能把拉丁文 \"**autem**\"（然而）誤讀為 \"**aureum**\"（黃金），因此「黃金定理」之名未必是 Bernoulli 本意。寫作時建議用「Bernoulli 自認分量極重的核心定理」這類較保守敘述，或明白標注此命名有爭議。\n- 來源：「Stop calling Bernoulli's law of large numbers his 'Golden Theorem' (Please?)」https://www.researchgate.net/publication/384021500 ；thatsmaths「Bernoulli's Golden Theorem and the Law of Large Numbers」https://thatsmaths.com/2021/12/16/bernoullis-golden-theorem-and-the-law-of-large-numbers/\n\n### de Moivre《The Doctrine of Chances》— 二項分布的常態近似（史上第一個中央極限定理）\n- **1733 年**，de Moivre 在一份未公開印行的小冊《Approximatio ad summam terminorum binomii (a+b)^n in seriem expansi》中，首次給出二項分布的**常態近似**；英文版收入 **1738 年《The Doctrine of Chances》第 2 版**。\n- 這字面上就是「擲硬幣」的中央極限定理：n 次伯努利試驗中成功比例標準化後，隨 n→∞ 趨近標準常態。**這是 CLT 的最早實例**（Bernoulli 情形稱 de Moivre–Laplace 定理）。\n- de Moivre 起初聚焦對稱情形 p=1/2、大 n，避開不對稱二項的複雜性。\n- 精確日期常見作 **1733 年 11 月 12 日**（私印小冊）；常態密度中的歸一常數 **√(2π)** 是 Stirling 補上的（de Moivre 原本只得到一個未定常數）。（2026-06，ch14 撰寫時經獨立 web 審查確認：York 大學 histstat、John D. Cook）\n- **1733 日期與「二項→常態近似」性質，兩來源確認。**\n- 來源：Wikipedia「De Moivre–Laplace theorem」https://en.wikipedia.org/wiki/De_Moivre%E2%80%93Laplace_theorem ；John D. Cook「How the central limit theorem began」https://www.johndcook.com/blog/2010/01/05/how-the-central-limit-theorem-began/\n\n### Daniel Bernoulli — 聖彼得堡悖論（1738）與期望效用\n- **1738 年**發表《Specimen Theoriae Novae de Mensura Sortis》（風險度量新理論闡述）於《Commentarii Academiae Scientiarum Imperialis Petropolitanae》第 5 卷，pp. 175–192。\n- 論文 19 節，三主題：效用概念（1–9）、對數效用（10–16）、聖彼得堡悖論（17–19）。Daniel 拒絕「以期望值決策」，主張同一風險不同人評價不同 → **期望效用（expected utility）**。\n- 問題本身由其堂兄 Nicolaus I Bernoulli 提出（1713 年致 Montmort 的信）。\n- ⚠️ 重點：聖彼得堡悖論**不是數學算錯**——期望值確實發散到無窮；悖論在於「沒人願付無限賭注」，解法是效用（邊際效用遞減），屬決策／效用層面，不是機率計算的錯。\n- 來源：Stanford Encyclopedia of Philosophy「The St. Petersburg Paradox」https://plato.stanford.edu/entries/paradox-stpetersburg/ ；Springer「On Specimen Theoriae Novae…」https://link.springer.com/article/10.1007/s10203-024-00471-z\n\n### Laplace《Théorie analytique des probabilités》（機率的分析理論）\n- **1812 年**出版，給出**第一個一般形式的中央極限定理**（de Moivre 結果被 Laplace 約 1776–1812 推廣到更廣的分布）。\n- **1774 年**論文《Mémoire sur la probabilité des causes par les événemens》（論由事件推因之機率）：18 世紀後期最具影響力的統計論文之一，是**逆機率（inverse probability）**最早被廣讀的呈現，獨立於 Bayes 發展並推廣了貝氏方法；現代「貝氏定理」的廣為人知，主要靠 Laplace。\n- 來源：Britannica「Analytic Theory of Probability」https://www.britannica.com/topic/Analytic-Theory-of-Probability ；Stigler「Laplace's 1774 Memoir on Inverse Probability」https://projecteuclid.org/journals/statistical-science/volume-1/issue-3/Laplaces-1774-Memoir-on-Inverse-Probability/10.1214/ss/1177013620.full\n\n### Chebyshev / Bienaymé 不等式（弱大數法則的引擎）\n- **Bienaymé 1853 年先陳述（無證明），Chebyshev 1867 年給出更一般的證明。**故正名為 **Bienaymé–Chebyshev 不等式**。Liouville 安排 Bienaymé 的文章緊接在 Chebyshev 之前刊出。\n- 不等式給「有限變異數的隨機變數偏離其均值超過某常數」的機率上界（≤ 變異數/常數²），**正是用來證明弱大數法則的工具**。\n- 來源：Wikipedia「Chebyshev's inequality」https://en.wikipedia.org/wiki/Chebyshev%27s_inequality ；Encyclopedia of Mathematics「Chebyshev inequality」https://encyclopediaofmath.org/wiki/Chebyshev_inequality_in_probability_theory ；Wikipedia「Irénée-Jules Bienaymé」https://en.wikipedia.org/wiki/Ir%C3%A9n%C3%A9e-Jules_Bienaym%C3%A9\n- ⚠️ 注意 1867 是「Chebyshev 證明年」，常被籠統寫成「Chebyshev 不等式 1867」；公平起見應提 Bienaymé 1853 在先。\n\n---\n\n## 三、貝氏（Bayes）\n\n### Thomas Bayes 的論文（身後出版，由 Richard Price 代為發表）\n- 全名《An Essay towards solving a Problem in the Doctrine of Chances》，Bayes 已於 **1761 年過世**；論文由其友 **Richard Price** 增補後，於 Royal Society《Philosophical Transactions》宣讀／刊出。\n- ⚠️ **日期有 1763 / 1764 之爭**：刊載於標注 **1763** 年的卷（Royal Society DOI 10.1098/rstl.1763.0053），實際印行流通常記為 **1764**。寫作時建議寫「1763 年（卷次標 1763、1764 年印行）」並擇一主述、註明另一。\n- 來源：Wikipedia「An Essay Towards Solving a Problem in the Doctrine of Chances」https://en.wikipedia.org/wiki/An_Essay_Towards_Solving_a_Problem_in_the_Doctrine_of_Chances ；Royal Society 原文 https://royalsocietypublishing.org/rstl/article/doi/10.1098/rstl.1763.0053/119736/\n\n#### ⚠️ Bayes 究竟證明了什麼 vs 現代「貝氏定理」——常見過度宣稱\n- **過度宣稱**：「Bayes 證明了我們今天寫的那條貝氏定理 P(A|B)=P(B|A)P(A)/P(B)。」**不準確。**\n- **正確版**：Bayes 的命題 3、4、5 之預備結果**蘊含**今名「貝氏定理」者，但他**並未強調或聚焦這個結果**。他真正要解的是更廣的推論問題：「已知某未知事件成功與失敗的次數，求其單次成功機率落在任兩個指定值之間的機會」——即一個**逆機率（inverse probability）**問題，並用了均勻先驗。現代教科書的「貝氏定理」形式與一般化，主要是 **Laplace** 的功勞。\n- 來源：同上 Wikipedia 條目；Stanford Encyclopedia「Bayes' Theorem」https://plato.stanford.edu/entries/bayes-theorem/\n\n### 頻率派 vs 貝氏派（簡史）\n- 18 世紀末逆機率（Bayes/Laplace）一度主流；20 世紀初 Fisher、Neyman、Pearson 建立頻率派（p 值、信賴區間、假設檢定）並批判先驗的主觀性，貝氏一度退居；20 世紀後期隨計算力與 MCMC 復興。本書若觸及只需點到（細節見各章）。\n\n### Gigerenzer：自然頻率（natural frequencies）改善貝氏推理\n- **Gigerenzer & Hoffrage (1995)**：把統計資訊改用「自然頻率格式」（如「1000 人中…」）呈現，受試者的貝氏推理表現遠優於用百分比/機率呈現時。兩個解釋：(1) 自然頻率讓後驗計算更簡單；(2) 演化上人腦更擅長從頻率而非機率推論。\n- 重要修正：「人類天生是糟糕的貝氏推理者」這個舊主張只在資訊用機率呈現時成立。\n- 來源：Gigerenzer & Hoffrage 1995, Psychological Review 102(4):684–704（引用紀錄與後續）https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2015.01473/full ；APA「Teaching Bayesian Reasoning in Less Than Two Hours」https://www.apa.org/pubs/journals/releases/xge-1303380.pdf\n\n---\n\n## 四、常態分布、回歸、相關（19 世紀）\n\n### Gauss（1809）vs Legendre（1805）— 最小平方法的優先權之爭\n- **Legendre 1805 年率先發表**最小平方法（附於彗星軌道專著的附錄）。**Gauss 1809 年於《Theoria motus corporum coelestium》正式發表**，並聲稱自 **1795 年**起就在用，且把最小平方與常態分布（誤差分布）連結。\n- Legendre 對 Gauss 的優先權主張不滿，1820 年公開反駁。**這是數學史上最著名的優先權之爭之一（僅次於牛頓 vs Leibniz 的微積分之爭）。**\n- 來源：Actuaries Institute「Gauss, Least Squares, and the Missing Planet」https://www.actuaries.asn.au/research-analysis/gauss-least-squares-and-the-missing-planet ；Stigler「The method of Gauss in 1799」https://projecteuclid.org/journals/statistical-science/volume-13/issue-2/The-method-of-Gauss-in-1799/10.1214/ss/1028905931.pdf\n- ⚠️ 正確寫法：**發表優先權屬 Legendre（1805）**；Gauss 把它與常態誤差律結合、並聲稱更早私下使用，但「私下使用」無發表佐證。別寫成「Gauss 發明最小平方法」。\n\n### Quetelet —「平均人（l'homme moyen / average man）」\n- **1835 年**《Sur l'homme et le développement de ses facultés》（社會物理學）提出 **homme moyen（平均人）** 概念：人類某性狀的測量值按常態分布聚集於該中心值。\n- Quetelet 自己也說平均人是「虛構（être fictif）」。並把「社會物理學（social physics）」用於對人口資料的量化研究（犯罪率、結婚率等）。\n- 來源：Britannica「Adolphe Quetelet」https://www.britannica.com/biography/Adolphe-Quetelet ；Oxford Academic 章節 https://academic.oup.com/book/38774/chapter/337582254\n\n### Galton — 回歸均值、相關係數的共同奠基\n- **Hereditary Genius 1869**；**「Regression towards mediocrity in hereditary stature」1886**（首條回歸線，斜率 < 1，子代向均值回歸）；**Natural Inheritance 1889**（總結其回歸與相關工作）。早期豌豆實驗約 1875。\n- Galton 發明相關係數的雛形，稱「index of correlation」，**用字母 r（取自 reversion／regression）**。其數學嚴謹化由 **Karl Pearson**（1857–1936）完成，故今稱 **Pearson's r**。\n- 來源：MacTutor「Galton」https://mathshistory.st-andrews.ac.uk/Biographies/Galton/ ；Stanton, JSE「Galton, Pearson, and the Peas」https://jse.amstat.org/v9n3/stanton.html ；Gorroochurn「On Galton's Change from Reversion to Regression」http://www.columbia.edu/~pg2113/index_files/Gorroochurn-On%20Galton's%20Change.pdf\n- ⚠️ 原詞是 **「regression towards mediocrity（向平庸回歸）」**，今多作「regression toward the mean（向均值回歸）」。引用 Galton 原文時用 mediocrity。題目給的「1869–1889」是其相關/回歸工作的跨度區間，**單篇回歸論文是 1886**。\n\n### 68–95–99.7 規則的精確值（自算，erf 計算）\n| 範圍 | 精確值 | 2 位小數 |\n|---|---|---|\n| ±1σ | 68.2689% | **68.27%** |\n| ±2σ | 95.4500% | **95.45%** |\n| ±3σ | 99.7300% | **99.73%** |\n- 自算（Python `math.erf(k/√2)`）。常被四捨五入成 68/95/99.7，但精確值如上。\n- 參考：Wikipedia「68–95–99.7 rule」https://en.wikipedia.org/wiki/68%E2%80%9395%E2%80%9399.7_rule\n- ⚠️ 別寫成「±2σ 恰 95%」；**95% 對應的是 ±1.96σ**，±2σ 是 95.45%。\n\n---\n\n## 五、統計推論的建立（20 世紀）\n\n### Gosset「Student」t 分布（1908，Guinness 釀酒廠）\n- **William Sealy Gosset 1908 年以筆名「Student」在《Biometrika》第 6 卷 pp. 1–25 發表《The Probable Error of a Mean》**。\n- 背景：Gosset 在都柏林 Guinness 釀酒廠處理小樣本（常 ≤10）品管問題；Guinness 禁員工具名發表（怕洩漏其科學方法），故用筆名。1906/07 曾赴 Karl Pearson 實驗室一年。\n- 來源：Wikipedia「Student's t-test」https://en.wikipedia.org/wiki/Student%27s_t-test ；Zabell「On Student's 1908 Article」https://personal.morris.umn.edu/~jongmink/Stat2611/s1.pdf ；原文 York 鏡像 https://www.york.ac.uk/depts/maths/histstat/student.pdf\n- ⚠️ 卷期：**Biometrika 6, 1–25**（已用多源確認；坊間偶見誤植「vol 4」或「pp. 1–24」，以 6/1–25 為準）。\n\n### Kolmogorov 公理（1933）\n- **Andrei Kolmogorov 1933 年《Grundbegriffe der Wahrscheinlichkeitsrechnung》（機率論基礎）**，以集合論與測度論（建基於 Borel、Lebesgue）給出機率論的公理化基礎，把機率函數歸結為三條（含可數可加性可算四條）簡單公設，如同 Euclid 之於幾何。\n- 來源：arXiv「The origins and legacy of Kolmogorov's Grundbegriffe」https://arxiv.org/pdf/1802.06071 ；Internet Archive 原書 https://archive.org/details/kolmogoroff-1933-grundbegriffe-der-wahrscheinlichkeitsrechnung\n\n### Fisher — p 值、顯著性、虛無假設、女士品茶\n- **《Statistical Methods for Research Workers》1925**；**《The Design of Experiments》1935**。後者引入隨機化、重複、區組，並以「**女士品茶（lady tasting tea）**」說明虛無假設。\n- 女士品茶：8 杯（4 先奶後茶、4 先茶後奶），受試者挑出某法所製的 4 杯。用 **Fisher 精確檢定**，虛無假設下全 8 杯都對的機率為 **1/70**。\n- 來源：Wikipedia「The Design of Experiments」https://en.wikipedia.org/wiki/The_Design_of_Experiments ；「Lady tasting tea」https://en.wikipedia.org/wiki/Lady_tasting_tea ；「Statistical Methods for Research Workers」https://en.wikipedia.org/wiki/Statistical_Methods_for_Research_Workers\n\n#### ⚠️ p<0.05 不是 Fisher 的硬性界線\n- Fisher 1925 確實寫過「P=0.05（1/20）對應 1.96≈2，取此為判斷顯著與否的方便界限」。\n- **但他明白表示這是方便、可調的**：「若 1/20 odds 不夠高，我們可改畫在 1/50（2%）或 1/100（1%）。」他把 0.05 當**慣例與起點，不是不可逾越的硬規則**。把「p<0.05 = 真/假」二分當成 Fisher 的鐵律是誤解。\n- 來源：Tandfonline「Before p<0.05 to Beyond p<0.05」https://www.tandfonline.com/doi/full/10.1080/00031305.2018.1537891 ；UW News「Documents that Changed the World: Fisher defines statistical significance, 1925」https://www.washington.edu/news/2016/12/21/\n\n### Neyman–Pearson 假設檢定框架；Neyman 信賴區間（1937）\n- **Neyman & Pearson 1928、1933** 建立檢定框架：把虛無與對立假設不對稱處理，引入 **Type I（型一，棄真）/ Type II（型二，存偽）誤差** 與**檢定力（power）**。「最佳檢定」= 在控制 Type I ≤ α 下最小化 Type II。\n- 來源：Frontiers「Fisher, Neyman-Pearson or NHST?」https://www.frontiersin.org/journals/psychology/articles/10.3389/fpsyg.2015.00223/full\n\n#### ⚠️ 信賴區間（confidence interval）的精確頻率派意義 —— 全書最常被講錯的點\n- **Neyman 1937** 定義：一個「信賴係數 X%」的程序，指在**反覆抽樣**下，所產生的區間有 X% 會涵蓋真值（對所有真值都成立）。\n- **錯誤陳述（務必避免）**：「這個算出來的 95% 信賴區間，有 95% 機率包含真值。」**錯。**真值是未知**常數**不是隨機變數；某條已算出的特定區間，**要嘛涵蓋（機率 1）要嘛沒涵蓋（機率 0）**。95% 是指**製造區間這個程序**的長期涵蓋率，不是「這一條」的機率。\n- Neyman 本人 1937 在美國農業部演講時即糾正 Milton Friedman 的誤解：「真均值不是隨機變數，是未知常數。」\n- 來源：PMC「Continued misinterpretation of confidence intervals」https://pmc.ncbi.nlm.nih.gov/articles/PMC4742490/ ；Wikipedia「Neyman construction」https://en.wikipedia.org/wiki/Neyman_construction\n\n---\n\n## 六、複現危機與 p 值之亂（當代）\n\n### Ioannidis 2005「Why Most Published Research Findings Are False」\n- **John Ioannidis，2005 年 8 月，PLoS Medicine 2(8):e124。** 論證：多數已發表（醫學）研究結果無法複現。研究較不可能為真的條件：樣本小、效應小、檢定的關係多而預選少、設計/定義/分析彈性大、利益偏見大、競逐顯著性的團隊多。被視為「元科學（metascience）」的奠基文獻。\n- 來源：PLOS Medicine 原文 https://journals.plos.org/plosmedicine/article?id=10.1371/journal.pmed.0020124 ；Wikipedia https://en.wikipedia.org/wiki/Why_Most_Published_Research_Findings_Are_False\n\n### Simmons, Nelson, Simonsohn 2011「False-Positive Psychology」\n- **Psychological Science 22(11):1359–1366。** 全名《False-Positive Psychology: Undisclosed Flexibility in Data Collection and Analysis Allows Presenting Anything as Significant》。示範「未揭露的研究者彈性（即 **p-hacking**）」可把名目 5% 的型一誤差率推高到最壞約 60%。**普及了「研究者自由度（researcher degrees of freedom）」一詞。**\n- 來源：SAGE 原文 https://journals.sagepub.com/doi/10.1177/0956797611417632\n\n### Open Science Collaboration 2015（Science）心理學可複現性\n- **2015 年《Science》「Estimating the reproducibility of psychological science」。** 複現 100 篇研究：原研究 97% 有顯著結果（p<.05），**但複現僅 36% 達顯著**；複現的效應量約為原研究的一半。\n- **頭條複現率 ≈ 36%（約 1/3）。**\n- 來源：Science 原文 https://www.science.org/doi/10.1126/science.aac4716 ；OSF 專案 https://osf.io/ezcuj/overview\n\n### ASA 2016 對 p 值的聲明（Wasserstein & Lazar）\n- **The American Statistician 70(2):129–133（2016）。** 六原則中關鍵警告：\n  1. p 值衡量資料與某指定模型的「不相容程度」；\n  2. **p 值不是「假設為真的機率」，也不是「結果純屬隨機的機率」**；\n  3. 科學/商業/政策結論**不應只看 p 值是否過某門檻**；\n  4. 正確推論需完整報告與透明（避免選擇性報告）；\n  5. p 值/顯著性不衡量效應大小或結果重要性；\n  6. 單一 p 值對證據強度的衡量有限。\n- 來源：Tandfonline 原文 https://www.tandfonline.com/doi/full/10.1080/00031305.2016.1154108 ；Berkeley PDF https://www.stat.berkeley.edu/~aldous/Real_World/ASA_statement.pdf\n\n---\n\n## 七、著名悖論與謬誤（精確陳述很重要）\n\n### Monty Hall 問題\n- **起源：Steve Selvin 1975 年致《The American Statistician》的信**（首次提出並解答，用 \"Let's Make a Deal\" 主持人 Monty Hall 命名）。\n- **Marilyn vos Savant：1990 年 9 月（Parade「Ask Marilyn」專欄，1990-09-09）** 給出「該換」「換可使勝率加倍」的答案，引發約 1 萬封來信（含許多博士）指她錯——但她是對的。\n- **標準假設下：換 → 2/3 勝；不換 → 1/3 勝。**\n- **⚠️ 換能贏 2/3 的「標準假設」（缺一不可）：**\n  1. 主持人**一定**會開一扇（玩家沒選的）門；\n  2. 主持人**一定**開出**羊**門，絕不開車門；\n  3. 主持人**知道**門後是什麼（非隨機開）；\n  4. 當玩家一開始就選中車、主持人面對兩扇羊門時，**隨機等機率**選一扇開。\n- 若主持人行為不符（例如他只在你選中車時才邀你換、或隨機開可能開到車），2/3 結論**不成立**。Monty Hall **取決於主持人行為假設**，這點務必寫清楚。\n- 來源：Wikipedia「Monty Hall problem」https://en.wikipedia.org/wiki/Monty_Hall_problem （標準假設依 Krauss & Wang 2003）\n\n### Simpson 悖論（Simpson's paradox）\n- **命名**：Colin Blyth 1972 年定名「Simpson's paradox」，源自 **Edward Simpson 1951** 的技術論文；更早 **Udny Yule 1903**（與 Pearson 1899）已述類似效應。\n- **UC Berkeley 1973 研究所招生**（Bickel, Hammel & O'Connell, **Science 187(4175), 1975, pp. 398–404**）：**合計**數據看似**對女性不利**（男性錄取率較高）；但**按系拆分後反轉**為「對女性有小幅但統計顯著的有利偏向」。原因：女性較多申請競爭激烈、錄取率低的系。\n  - ⚠️ **效應方向**：總體 → 似偏向男性；分系 → 偏向女性。別寫反。\n- **腎結石治療**（Charig et al. 1986）：合計看 **經皮腎造瘻取石（PCNL）83% > 開放手術 78%**；但按結石大小拆分後，**開放手術在大、小結石都較佳**（<2cm：93% vs 83%；≥2cm：73% vs 69%）——混淆變數是結石大小（重症多用開放手術）。\n- 來源：Wikipedia「Simpson's paradox」https://en.wikipedia.org/wiki/Simpson%27s_paradox ；Charig 1986 / PMC 案例 https://www.ncbi.nlm.nih.gov/pmc/articles/PMC9960320/\n\n### 生日問題（birthday problem）\n- **23 人 → 至少兩人同生日的機率 ≈ 0.5073（50.73%）。** 自算（忽略閏日、假設均勻）：\n  - **P(無碰撞, 23 人) = 0.4927（4 位小數）**\n  - **P(有碰撞, 23 人) = 0.5073（4 位小數）**\n- 直覺低估的原因：23 人有 C(23,2)=253 對可比較，不是只比一個人對全體。\n- 來源：Wikipedia「Birthday problem」https://en.wikipedia.org/wiki/Birthday_problem （數值為自算）\n\n### Bertrand 悖論（1889，隨機弦）\n- **Joseph Bertrand 1889《Calcul des probabilités》** 提出：圓內內接正三角形，問「隨機弦」長於三角形邊的機率。三種「同樣合理」的隨機化各得不同答案：\n  - 隨機端點法 → **1/3**；隨機半徑點法 → **1/2**；隨機中點法 → **1/4**。\n- 寓意：在無窮樣本空間上**無差別原則（principle of indifference）若不指定隨機化機制，會給出不唯一的機率**。\n- 來源：Wikipedia「Bertrand paradox (probability)」https://en.wikipedia.org/wiki/Bertrand_paradox_(probability)\n\n### 男孩女孩／兩孩悖論（Martin Gardner 1959）\n- **Martin Gardner，1959 年 10 月《Scientific American》Mathematical Games**，題為「The Two Children Problem」。\n- Gardner 初給答案 **1/2 與 1/3**；**後來承認第二題有歧義**：「至少一個是男孩，兩個都是男孩的機率」可為 **1/3 或 1/2**，取決於「你如何得知有一個男孩」的隨機程序。\n  - 從「至少有一男孩的兩孩家庭」隨機取一家 → 1/3；從某家隨機選一孩、得知其為男孩 → 1/2。\n- 寓意：**未指定隨機化程序 → 機率不唯一。** 寫作時務必標明此題的歧義。\n- 來源：Wikipedia「Boy or girl paradox」https://en.wikipedia.org/wiki/Boy_or_girl_paradox\n\n### 合取謬誤 / Linda 問題（Tversky & Kahneman 1983）\n- **Tversky & Kahneman 1983，Psychological Review 90:293–315。** Linda（31 歲、直言、關心歧視與社會正義、參加反核）→ 約 **85%** 受試者認為「Linda 是銀行出納員**且**女權主義者」比「Linda 是銀行出納員」更可能。\n- 這違反**合取規則 P(A∩B) ≤ P(A)**（A∩B 是 A 的子集）。肇因於**代表性捷思（representativeness heuristic）**：「女權銀行員」更「像」描述。相關概念：**基本比率忽略（base-rate neglect）**。\n- 來源：Wikipedia「Conjunction fallacy」https://en.wikipedia.org/wiki/Conjunction_fallacy\n\n### 賭徒謬誤（gambler's fallacy）vs 賭徒破產（gambler's ruin）\n- **兩者不同，別混。**\n  - **賭徒謬誤**：誤以為獨立事件會「自我修正」（連開紅後黑「該來了」）——是**認知謬誤**。\n  - **賭徒破產問題**：兩玩家各持本金、重複對賭至一方歸零，求各自破產/獲勝機率——是**正經機率問題**，源出 Pascal–Fermat（最早見 1656 年 Pascal 致 Fermat 信），由 **Huygens 1657《De ratiociniis…》** 發表（其書末第 5 題即此）。\n- 來源：Wikipedia「Gambler's ruin」https://en.wikipedia.org/wiki/Gambler%27s_ruin ；Song & Song「A Note on the History of the Gambler's Ruin Problem」https://koreascience.or.kr/article/JAKO201311637859390.page\n\n### 熱手謬誤（hot-hand fallacy）——⚠️ 2018 年的反轉，全書必須捕捉\n- **原始：Gilovich, Vallone & Tversky 1985**（Cognitive Psychology）——主張籃球「熱手」是錯覺，人類在隨機資料中看見不存在的型態，**結論「熱手是謬誤」**。\n- **反轉：Miller & Sanjurjo 2018**（Econometrica）——指出 1985 分析有**系統性選擇偏差（selection bias）**：在有限序列中，「連中後再投中」的經驗頻率**即使在獨立假設下也會系統性偏低**。**去偏後，1985 的經典結論被推翻，反而出現「連續命中」的顯著證據——熱手可能是真的。**\n- ⚠️ **這個轉折必須寫進書**。很多來源（含 Gilovich 本人）仍把 1985 的「熱手是謬誤」當定論在講；正確的當代理解是：**因選擇偏差校正，熱手效應可能真實存在**（至少 1985 的否證不成立）。\n- 來源：Miller & Sanjurjo「Surprised by the Hot Hand Fallacy? A Truth in the Law of Small Numbers」https://marketing.wharton.upenn.edu/wp-content/uploads/2018/11/Paper-Joshua-Miller.pdf ；Wikipedia「Hot hand」https://en.wikipedia.org/wiki/Hot_hand\n\n### Sports Illustrated 封面魔咒 / 二年級退步（sophomore slump）——回歸均值的範例\n- 「**SI 封面魔咒**」：登上封面者隨後表現變差。真因是**回歸均值**——登封面前往往是**異常出色（含好運成分）**的表現，之後自然回落到常態水準，並非被詛咒。\n- 「**二年級／菜鳥後退步（sophomore slump）**」同理：新秀爆發季含超量好運，次年回歸平均。\n- 來源：Wikipedia「Sports Illustrated cover jinx」https://en.wikipedia.org/wiki/Sports_Illustrated_cover_jinx ；「Regression fallacy」https://en.wikipedia.org/wiki/Regression_fallacy\n\n---\n\n## 八、分布與過程\n\n### Poisson 分布\n- **Siméon Denis Poisson 1837《Recherches sur la probabilité des jugements en matière criminelle et en matière civile》**（論刑事與民事審判機率）中首次發表，用於陪審團判決。\n- **「稀有事件定律（law of rare events / small numbers）」**：60 年後由 **Ladislaus Bortkiewicz 1898《Das Gesetz der kleinen Zahlen》** 發揚——研究 **普魯士軍隊 14 個軍團、20 年間共 122 名被馬踢死** 的士兵，示範低頻事件在大母體中服從 Poisson 分布（即使各別機率不同）。此為經典教學資料集。\n- 來源：Springer「Poisson Distribution and Its Application」https://link.springer.com/rwe/10.1007/978-3-642-04898-2_448 ；Poisson 原著 Gallica https://gallica.bnf.fr/ark:/12148/bpt6k110193z\n\n### 冪律 / Pareto 原則（80/20）；肥尾；Taleb《黑天鵝》\n- **Vilfredo Pareto**：觀察到義大利約 **20% 的人擁有 80% 的土地/所得**（冪律分布，即 Pareto 分布）。\n  - ⚠️ **日期與「80/20」命名的細節易錯**：Pareto 的所得分布觀察見於《Cours d'économie politique》（**1896–1897**），有些來源把該冪律記為 **1906/1909**（《Manuale》）。而 **「80/20 原則」「Pareto principle」這個名稱與商管化，是 Joseph M. Juran 在 1940 年代命名／推廣的**（以 Pareto 之名），**不是 Pareto 本人取的**。寫作時：把「冪律觀察」歸 Pareto（1890s），把「80/20 原則」一詞歸 Juran（1940s）。\n- **肥尾（fat tails）/「黑天鵝」**：Nassim Nicholas Taleb《**The Black Swan**》**2007** 把高衝擊、難預測、事後被合理化的稀有事件帶入主流；黑天鵝即位於肥尾深處的極端事件。\n- 來源：Wikipedia「Pareto principle」https://en.wikipedia.org/wiki/Pareto_principle ；Juran Institute https://www.juran.com/blog/a-guide-to-the-pareto-principle-80-20-rule-pareto-analysis/\n\n### Markov 鏈\n- **Andrey Markov 1906** 起研究「相依變數的鏈」，奠定新分支。**1913 年**分析 **Pushkin《Eugene Onegin（葉甫蓋尼·奧涅金）》前 20,000 個字母的母音/子音序列**，把每字母分母音/子音，示範相依事件鏈可嚴格建模（下一字母類別僅依賴前一或前兩字母）。1913-01-23 於聖彼得堡帝國科學院報告。\n- ⚠️ 常見混淆：**理論工作始於 1906**；**Onegin 母音/子音實證分析是 1913**。別把兩者都寫成 1906 或都寫成 1913。\n- 來源：Wikipedia「Andrey Markov」https://en.wikipedia.org/wiki/Andrey_Markov ；American Scientist「First Links in the Markov Chain」https://www.americanscientist.org/article/first-links-in-the-markov-chain\n\n### PageRank 作為 Markov 鏈\n- **Brin & Page 1998《The Anatomy of a Large-Scale Hypertextual Web Search Engine》**（WWW7 / Computer Networks）。PageRank = 「**隨機漫遊者（random surfer）**」模型：以機率隨連結點擊、以機率 (1−d) 隨機跳到任一頁（d=阻尼因子）；某頁被造訪的穩態機率即其 PageRank——本質是有限狀態 **Markov 鏈** 的平穩分布。\n- 來源：原論文 http://infolab.stanford.edu/pub/papers/google.pdf ；ETHW Milestone https://ethw.org/Milestones:PageRank_and_the_Birth_of_Google,_1996-1998\n\n### 布朗運動（Brownian motion）\n- **Robert Brown 1827** 顯微鏡下觀察花粉顆粒（Clarkia pulchella）在水中的隨機抖動。\n- **Louis Bachelier 1900** 博士論文《Théorie de la spéculation》（投機理論，Poincaré 指導）——**更早**就以布朗運動建模金融價格，但長期被忽視至 1950 年代。\n- **Einstein 1905** 獨立提出理論解釋（用以估 Avogadro 數與分子大小）。\n- **Norbert Wiener 1923** 給出嚴格數學處理（**Wiener 過程**），證明存在連續路徑版本。\n- ⚠️ **布朗路徑「幾乎必然連續但處處不可微（almost surely continuous but nowhere differentiable）」確認**：以機率 1，路徑處處不可微（Paley–Wiener–Zygmund 1931 首證；Dvoretzky–Erdős–Kakutani 1961 現代論證）。也因此須用隨機微積分（Itô）。\n- 來源：Wikipedia「Brownian motion」https://en.wikipedia.org/wiki/Brownian_motion ；U Chicago Lalley 講義 https://galton.uchicago.edu/~lalley/Courses/313/BrownianMotionCurrent.pdf\n\n### Buffon 投針（Buffon's needle，估 π）\n- **Georges-Louis Leclerc, Comte de Buffon**：**1733 年提出，1777 年發表解答**。把針投到等距平行線地板上，針跨線的機率與 π 直接相關，可用作蒙地卡羅估 π。\n- 趣聞：**Lazzerini 1901** 投 3,400+ 次估得 π≈3.1415929（頭 6 位正確）——但此結果常被疑為「對答案調參」的可疑案例。\n- 來源：Wikipedia「Buffon's needle problem」https://en.wikipedia.org/wiki/Buffon's_needle_problem\n\n---\n\n## 九、數值基準複核（給作者抄用；標「自算」者可直接用）\n\n| 項目 | 結果 | 出處 |\n|---|---|---|\n| 生日問題：P(無碰撞, 23 人) | **0.4927**（4dp） | 自算（Python，均勻、忽略閏日） |\n| 生日問題：P(有碰撞, 23 人) | **0.5073**（4dp） | 自算 |\n| 民調誤差界：1.96 × √(0.25/1000) | **0.0310 ≈ ±3.1%**（√(0.25/1000)=0.015811…） | 自算 |\n| 疾病篩檢貝氏：盛行率 0.1%、敏感度 99%、偽陽性率 5% → 後驗 P(病\\|陽性) | **≈ 0.0194 ≈ 1.94%**（真陽性 0.00099 / 全陽性 0.05094） | 自算 |\n| de Moivre 二項→常態 | 一句話：n 次伯努利試驗的標準化成功數，隨 n→∞ 收斂到標準常態（史上第一個 CLT，字面上就是擲硬幣）。 | 見 §二 |\n\n- ⚠️ 疾病篩檢數字是「反直覺教學金句」：篩檢陽性者**真正得病只約 2%**（因盛行率極低、偽陽性主導），務必照此寫，別誤寫成 99%。\n- ⚠️ 民調 ±3.1% 是「p=0.5、n=1000、95% 信賴」的最大誤差界；新聞常說「±3%」即此。\n\n---\n\n## 十、常被誤傳的事實（重點清單——作者最可能寫錯的）\n\n1. **熱手反轉**：別停在 Gilovich-Vallone-Tversky 1985 的「熱手是謬誤」。Miller & Sanjurjo 2018 校正選擇偏差後**推翻**該否證，**熱手可能是真的**。（§七）\n2. **信賴區間誤解**：95% CI **不是**「真值有 95% 機率落在這條區間」。真值是常數；某條區間要嘛涵蓋要嘛不涵蓋；95% 是**程序**的長期涵蓋率。（§五）\n3. **「Bayes 證明了我們現在寫的貝氏定理」——過度宣稱**。Bayes 解的是逆機率問題、用均勻先驗；現代形式與一般化主要是 Laplace。（§三）\n4. **Gauss vs Legendre 最小平方法優先權**：**發表優先權屬 Legendre（1805）**；Gauss（1809）把它與常態誤差律結合並聲稱更早私用（無發表佐證）。別寫「Gauss 發明最小平方法」。（§四）\n5. **p<0.05 不是 Fisher 的硬性鐵律**：Fisher 自己說可改 1/50、1/100，是方便慣例不是真假二分線。（§五）\n6. **Monty Hall 取決於主持人行為假設**：2/3 只在「主持人一定開、一定開羊門、知情、面對兩羊門時隨機」下成立。（§七）\n7. **聖彼得堡悖論是效用問題不是數學錯**：期望值確實發散；解在邊際效用遞減。（§二）\n8. **大數法則不是「偏差會被修正」**：LLN 講的是**平均值/比例**收斂（稀釋效應），**不是**讓 |正面−反面| 歸零。事實上 **|正面−反面| 的期望絕對差隨 n 增長，約 ∝ √n**；認為「該來平衡了」正是賭徒謬誤。（§二、§七）\n9. **Simpson 悖論方向別寫反**：Berkeley 1973 總體似偏向男性、分系後偏向女性；腎結石總體 PCNL 較佳、分大小後開放手術較佳。（§七）\n10. **Pareto vs Juran**：冪律觀察歸 Pareto（1890s）；「80/20 原則」一詞與商管化是 Juran（1940s）命名。（§八）\n11. **±2σ ≠ 95%**：±2σ = 95.45%；95% 對應 **±1.96σ**。（§四）\n12. **Bayes 論文日期 1763/1764、Bienaymé–Chebyshev 1853/1867、Markov 1906/1913**：均有「兩個年份」陷阱，見各節 ⚠️。\n\n---\n\n## 附：尚未 100% 釘死、建議引用前再查的細節\n- Cardano《Liber de ludo aleae》寫作年「1564」（手稿多次增補，數字有彈性）。\n- Bayes 論文 1763 vs 1764（卷次標年 vs 實際印行年）。\n- Pareto 冪律的精確年份（1896–97 Cours vs 1906/09 Manuale）。\n- 「golden theorem / theorema aureum」是否為 Bernoulli 本意（Pearson 誤讀 autem→aureum 之說）。\n- Lazzerini 1901 投針 π 值的真實性（疑似事後配參數）。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書《馴服隨機：機率與統計的直覺與驚嘆》的維護基準。改任何 `book-src/` 內容前先讀本檔與 `style-guide.md`、`outline.md`；史實以 `landscape-2026-06.md` 為錨。\n\n## 一、跨章基準數值表（改任何一個必須照表全書同步）\n\n權威來源是 `outline.md` 的「跨章基準」表；下表為高頻複核用的濃縮版，每個數字若修正，務必 grep 全書引用章一起改，並在掃描日誌記一行。\n\n| 基準 | 值 | 出現章 |\n|---|---|---|\n| 脊椎硬幣（公正） | P(正)=1/2、E=1/2、Var=1/4、SD=1/2；n 擲 Binomial(n,1/2)、E=n/2、Var=n/4、SD=√n/2 | ch01/02/08/09/11/13/14/17/18/20/23 |\n| 分賭注問題 | A 還需 1 勝、B 還需 2 勝 → A 得 3/4、B 得 1/4 | ch01 |\n| 生日問題 | 23 人 P(碰撞)=0.5073、P(無碰撞)=0.4927、C(23,2)=253 | ch03 |\n| 「至少一次」 | p=0.01 做 n 次=1−0.99ⁿ；n≈69 越過 0.5 | ch03 |\n| 相關性故障 | 兩備援各 99%、獨立同掛 0.0001/可用 99.99%；共享電源（停電 1%）→ P(兩掛)≈0.0101/可用≈98.99% | ch04 |\n| 醫檢貝氏 | 盛行率 0.1%、敏感度 99%、偽陽 5% → P(病\\|陽)≈1.94%；自然頻率 10 萬人 99/5094 | ch05 |\n| 蒙提霍爾 | 標準假設下換門 2/3、不換 1/3 | ch06 |\n| linearity 信封 | n 封信隨機回，命中期望=1（與 n 無關） | ch08 |\n| 聖彼得堡 | 期望無限；效用問題、非數學錯誤 | ch08 |\n| √n 法則 | n 個 iid 相加 SD=√n·σ、平均標準誤 σ/√n | ch09 |\n| 二項→卜瓦松 | n=1000、p=0.001、λ=1：二項 P(0)≈0.3677、卜瓦松 e⁻¹≈0.3679 | ch10/ch11 |\n| 馬踢資料 | Bortkiewicz：200 軍團-年、λ=0.61、觀測 109/65/22/3/1 對卜瓦松 108.7/66.3/20.2/4.1/0.6 | ch11 |\n| 車比雪夫 | P(\\|X−μ\\|≥kσ)≤1/k²，k=2→25% | ch13 |\n| 大數法則硬幣 | 比例→0.5；\\|正−反\\| 典型量級 ~√n（n=10⁴ 約 ±100） | ch13 |\n| 中央極限骰子 | 兩顆 P(和=7)=6/36；一顆均勻→兩顆三角→五顆→三十顆趨鐘形 | ch14 |\n| 68-95-99.7 | 68.27%/95.45%/99.73%；95% 雙尾臨界值 1.96 | ch14/ch15/ch16 |\n| 民調 ±3% | n=1000、p̂=0.5：1.96·√(0.25/1000)=0.0310 | ch16/ch17 |\n| 硬幣檢定 60/100 | 常態近似 z=2.0、雙尾 p≈0.046；精確二項雙尾≈0.0569（卡 0.05 兩側）；600/1000 → p≈2.6×10⁻¹⁰ | ch18 |\n| 辛普森柏克萊 | 1973 招生（Bickel 1975）：整體女性低、分系後相反 | ch19 |\n| 辛普森腎結石 | Charig 1986：開放手術小 93%/大 73%/合併 78%；PCNL 小 87%/大 69%/合併 83%（方向：各組 A 贏、合併 B 贏） | ch19 |\n| 複現危機 | OSC 2015：原 97% 顯著 → 複現 36% | ch19 |\n| 賭徒破產 | 公正賭局破產機率 (N−i)/N；1% 莊家優勢例 → 破產機率≈0.88 | ch20 |\n| 對稱漫步 | 一維/二維常返、三維暫態（醉漢回家、醉鳥迷路） | ch20 |\n| 天氣鏈 | P=[[0.8,0.2],[0.4,0.6]]、穩態 π=(2/3,1/3)**（自訂教學值，無外部出處）** | ch21 |\n| 布朗尺度 | Δx ∝ √Δt；t 時刻位置 ~N(0,t) | ch22 |\n| 數字精度 | π≈3.14159、e≈2.71828、e⁻¹≈0.3679、1.96 | 全書 |\n\n## 二、脆弱事實清單（最可能寫錯／需特別守住的）\n\n- **六個「兩年份陷阱」**（改任一處務必全書同步，別讓單章漂移）：Bayes 論文 **1763**（卷期標 1763、印行/分發 1764）｜Bienaymé–Chebyshev **1853**（Bienaymé 無證明）vs **1867**（Chebyshev 證明）——別只寫「Chebyshev 1867」｜Markov **1906**（理論）vs **1913**（奧涅金母音子音分析）——ch21 已分清｜最小平方優先權 Legendre **1805** vs Gauss **1809**｜冪律觀察 Pareto **1890s** vs 「80/20」名稱 Juran **1940s**｜de Moivre **1733**（私印小冊，精確日 11/12）vs **1738**（《Doctrine》第 2 版），√(2π) 由 Stirling 補上。\n- **熱手謬誤已翻案**：Miller–Sanjurjo **2018**（Econometrica）發現 Gilovich–Vallone–Tversky 1985 分析有選擇偏誤，去偏後「熱手是錯覺」結論被推翻——**別當已定讞**（ch13）。\n- **信賴區間的正確意義**：95% CI = 程序的長期涵蓋率，**不是**「真值有 95% 機率落在此區間」；真值是未知常數。Neyman 1937 當場糾正 Friedman（ch17）。\n- **p 值定義與五大誤讀**：p = P(資料至少這麼極端 \\| H₀ 真)，**不是** P(H₀ 真)、不是「出於偶然的機率」；p<0.05 是 Fisher 自承可移動的約定、非天律（ch18）。\n- **聖彼得堡是效用問題**、**LLN 是稀釋不是修正**（且 \\|正−反\\| 反而 ~√n 變大）——這兩個最常被講錯的直覺已寫成正確版，勿改回俗見。\n- **柏克萊整體女性錄取率**：書中用 **35%**（常引圓整版，與 landscape 自洽）；原論文精確值為 **30.4%**（557/1835）。屬已知選擇、非錯誤；若日後要對到原論文，ch19 與 landscape 須同步註明。\n- **同形記號歧義**（附錄 A 有專節）：π＝圓周率(ch14) vs 穩態向量(ch21)；α＝冪律指數(ch12) vs 顯著水準(ch18)；p＝母體比例/單次機率 vs p 值。跨章新增內容若引入這些符號，先回查附錄 A 歧義表。\n\n## 三、結構與寫作鐵則（新增內容不得違反）\n\n- **純紙筆推演、零程式碼**：不得新增任何可執行程式（含 Python）；Monte Carlo 只能用文字「想像擲一萬次」描述、數值表一律手算示範。\n- **脊椎硬幣**：涉及脊椎章的修改要維持七層對帳一致（見 ch23 對帳表與基準表）。\n- **跨書邊界**：Poisson 過程/指數/CTMC 的運算指向《佇列論》、常態即面積/怪獸函數指向《馴服無限》，本書只用自己的欣賞聲音講「為何美」、不重推公式。\n- **章節骨架**：每章必含 `## 從你已知的出發`／`## 直覺的陷阱`／`## 紙上推演`（`### 推演題 N` 接 `#### 推演解答`）／`## 自我檢核`／`## 延伸閱讀`，及章首 blockquote「本章解決什麼問題」；Part 首章（ch01/05/07/13/16/20）含全書路線圖。\n- **語言**：繁體中文台灣用語、零簡體、零大陸詞（機率/變異數/母體/常態/信賴區間/卜瓦松/隨機變數）；**禁標準「均值」**（用平均或期望值依脈絡）；自然口語、不要翻譯腔（作者明確要求「中文要符合使用習慣」）。CJK 語境標點用全形，數學式/程式/英文/小數保留半形。\n\n## 四、掃描協定\n\n1. **結構**：grep 各章六骨架標題齊全；`#### 推演解答` 全書一致（非 `###`）。\n2. **語言**：Python 逐字元掃簡體（shell grep 對同形字會誤報）；掃半形標點被 CJK 夾住的洩漏 `[CJK][,;?!:][CJK]`；掃標準「均值」（排除「平均值/回歸均值」）。\n3. **數值一致性**：對第一節基準表逐項 grep 引用章、確認無互相矛盾。\n4. **圖**：`python3 ../../../tools/md-reader/check_diagrams.py book-src`（CJK=2 欄；exit 0 才算過；目前 ch04/07/10/12 有少量 schematic 圖的「unconnected vertical」軟性警告，非失敗，打包後以閱讀器實際渲染為準）。\n5. **史實**：時效/史實宣稱對 landscape；landscape 沒有的自行查證並 hedge；重大更正需兩個獨立來源。**數學審查建議用 agy（math-only、不碰史實）**；**帶網路的全書事實審查用較貴模型**（分工見記憶 agy-per-chapter-math-review）。\n6. 打包：`build_reader.py web/book.config.json` → `build_shelf.py`；產生物（web/index.html、專案根 bookshelf.html）不要手改。\n\n## 五、掃描日誌\n\n- **2026-06-13（建書）**：Opus 4.8 從零建置，23 章＋3 附錄。fan-out 4 批章節 agent＋3 附錄 agent，各章 3–8 次 web 查證、史實對 landscape。\n  - P3 一致性：骨架 23/23 齊；簡體字 0；標準「均值」修為 平均/期望值/真值（ch14×8、ch17×1、ch23×1，保留回歸均值/平均值）；`### 推演解答`→`#### 推演解答`（ch04/09/10 各 4 處）統一；CJK 語境半形標點轉全形（ch02/13/20/22 共 17 字）；check_diagrams exit 0。\n  - P4 二審：**agy（Gemini 3.5 Flash High，math-only）逐項重算 15 個 worked example → 0 FAIL**；**帶網路 Claude 審查 11 項史實 → 0 必修**（de Moivre 1733、熱手 2018 翻案、CI 意義/Neyman 1937、柏克萊 1973 方向、腎結石 Charig 1986 數字、OSC 2015 36%、Markov 1906/1913、Bachelier 1900、Fisher p<0.05、Pareto/Juran 已確認；獨立重算 1.94% 與 60/100 雙尾 p 吻合）；脊椎硬幣七層一致、跨書指向正確。\n  - 採納 P4 建議：landscape de Moivre 條目補「1733-11-12＋Stirling √(2π)」並標來源；柏克萊 35%/30.4% 記為已知選擇（見第二節）。\n  - 待辦/已知：ch19 約 10,500 字（略超 9,000 上限，故障視角總收束章，內容密度高、可接受）；ch21 天氣鏈轉移機率為自訂教學值（已標）。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《馴服隨機：機率與統計的直覺與驚嘆》\n形態：23 章、六個 Part、3 個附錄。欣賞與直覺書（不刷題、不裝高深；**全書純紙筆推演，不放任何程式碼**）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；歷史與時效性事實以 `landscape-2026-06.md` 為錨。\n全書脊椎：**同一枚公正硬幣**，每個 Part 越懂越深（脊椎細節見 style-guide）。\n\n## 全書敘事弧\n\n賭桌上的一封信點燃機率（ch01）→ 機率到底在量化什麼：三種詮釋與公理（ch02）→ 把事件組合起來（ch03）→ 條件與獨立：最容易誤判的兩件事（ch04）→ 條件機率的高潮：貝氏逆轉（ch05）、貝氏作為世界觀（ch06）→ 把隨機變成數字：隨機變數（ch07）、期望（ch08）、變異（ch09）、兩個變數的共舞與「相關≠因果」（ch10）、分布動物園離散（ch11）連續（ch12）→ **全書高潮：秩序從混沌浮現**——大數法則（ch13）、中央極限（ch14）、常態之美與機率即面積（ch15）→ 統計的大膽：從樣本推斷母體（ch16）、估計與信賴區間（ch17）、假設檢定與 p 值（ch18）、美麗機器如何騙人（ch19）→ 隨機過程一瞥：隨機漫步與賭徒破產（ch20）、馬可夫鏈（ch21）、布朗運動（ch22）→ 總收官：人類如何馴服隨機（ch23）。\n\n歷史暗線（交織不另立章，全照 landscape）：賭桌（Pascal/Fermat 1654）→ 第一本書（Huygens 1657）→ 第一個大數法則（Jacob Bernoulli 1713）→ 第一個中央極限（de Moivre 1733，就是硬幣）→ 貝氏遺稿（1763）與 Laplace → 高斯與常態 → Quetelet 的「平均人」→ Galton 迴歸與相關 → Gosset/Fisher/Neyman-Pearson 建立統計推論 → Kolmogorov 公理化（1933）→ 當代複現危機與 p 值之亂。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 機運的語言        Part II 貝氏          Part III 隨機變數\nch01 隨機為何可算        ch05 貝氏定理         ch07 隨機變數\nch02 機率的三張臉    →   ch06 貝氏世界觀   →   ch08 期望值\nch03 組合事件                                  ch09 變異數\nch04 條件與獨立                                ch10 共變異與相關\n                                               ch11 分布動物園（離散）\n                                               ch12 分布動物園（連續）\n                                                     │\n                                                     ↓\nPart VI 隨機過程＋收官   Part V 統計推論       Part IV 兩大定理\nch20 隨機漫步       ←    ch16 抽樣的大膽   ←   ch13 大數法則 ★\nch21 馬可夫鏈            ch17 估計與信賴區間   ch14 中央極限 ★\nch22 布朗運動            ch18 假設檢定與 p 值  ch15 常態之美\nch23 總收官             ch19 統計的崩壞        ★＝秩序從混沌浮現\n```\n\n## 跨章基準（一致性掃描的依據；各章不得另創數字與命名）\n\n**貫穿範例「同一枚硬幣」**——一枚公正硬幣是全書脊椎（七層讀法見 style-guide）。\n\n| 元素 | 基準 | 首次出現 |\n|---|---|---|\n| 同一枚硬幣 | 古典 1/2（ch02）→ E=1/2、Var=1/4、SD=1/2（ch08–09）→ Binomial(n,1/2)（ch11）→ 比例收斂 0.5＋\\|正−反\\|~√n（ch13）→ 標準化和→常態，de Moivre 1733（ch14）→ 檢定 60/100（ch17–18）→ ±1 隨機漫步（ch20）→ 七層總對帳（ch23） | ch01 |\n| 分賭注問題 | 兩人公正對賭、先到目標局數者全拿；A 還需 1 勝、B 還需 2 勝 → A 應得 3/4、B 得 1/4（用「再打 2 局」的樣本空間枚舉；Pascal–Fermat 解照 landscape） | ch01 |\n| 生日問題 | 23 人 → P(至少兩人同生日) ≈ 0.5073（P(無碰撞)=0.4927）；用餘事件連乘 | ch03 |\n| 「至少一次」 | 單次機率 p=0.01 的事件做 n 次，至少一次 = 1−0.99ⁿ；n≈69 時越過 0.5 | ch03 |\n| 相關性故障 | 兩備援各 99% 可用、若獨立 → 同時壞機率 0.01²=0.0001、可用 99.99%；共享電源（相關）時退回接近 99% | ch04 |\n| 疾病篩檢基率 | 盛行率 0.1%、敏感度 99%、偽陽率 5% → P(病\\|陽性) ≈ 1.94%（自然頻率版：10 萬人中 100 病、99 驗出、4995 偽陽，99/5094≈1.94%） | ch05 |\n| 蒙提霍爾 | 標準假設下（主持人必開山羊門、知道門後、有選擇時隨機）換門勝率 2/3；不換 1/3（假設照 landscape） | ch06 |\n| linearity 招牌 | n 封信隨機塞入 n 個信封，命中（信對人）期望數 = n·(1/n) = 1，與 n 無關、不需算錯排數 | ch08 |\n| 聖彼得堡 | 賭局期望報酬無限（Σ 2ⁿ·(1/2ⁿ)=∞），但理性的人只願付有限——效用問題不是數學錯誤（照 landscape） | ch08 |\n| √n 法則 | n 個 iid 相加：和的 SD = √n·σ；平均的標準誤 = σ/√n（變異數相加、標準差不相加） | ch09 |\n| 二項→卜瓦松 | n=1000、p=0.001、λ=np=1：P(0)=e⁻¹≈0.3679、P(1)≈0.3679、P(2)≈0.1839（卜瓦松形狀 = 稀有事件的普適極限） | ch10／ch11 |\n| 大數法則硬幣表 | 正面比例 n=10,100,1000,10⁴ → 收斂到 0.5；同一組擲幣「正面−反面」的期望絕對差 ~√n（n=10⁴ 約 ±100）——比例收斂、差距發散，同一數據兩讀法 | ch13 |\n| 車比雪夫不等式 | P(\\|X−μ\\| ≥ kσ) ≤ 1/k²（k=2 → ≤25%）——弱大數法則的引擎，只靠變異數 | ch13 |\n| 中央極限骰子 | 一顆骰（均勻）、兩顆（三角，和=7 機率最高 6/36）、五顆、三十顆 → 趨於鐘形；不管原分布長相 | ch14 |\n| 68-95-99.7 | 標準常態：±1σ 68.27%、±2σ 95.45%、±3σ 99.73%；95% 雙尾臨界值 1.96（照 landscape） | ch15 |\n| 民調 ±3% | n=1000、p≈0.5、95% 信賴區間半寬 = 1.96·√(0.25/1000) = 0.0310 ≈ ±3.1%——「為何全國民調只問 1000 人」 | ch16／ch17 |\n| 硬幣檢定 | n=100 出現 60 正：常態近似 z=(60−50)/5=2.0、雙尾 p≈0.046；精確二項雙尾 P(\\|X−50\\|≥10)≈0.057——剛好卡在 0.05 兩側，示範門檻的武斷 | ch18 |\n| 辛普森悖論 | 柏克萊 1973 研究所招生（Bickel 1975；整體看似歧視女性、分系後相反）、腎結石治療 A/B（Charig 1986）——合併翻轉結論（方向照 landscape） | ch19 |\n| 回歸均值 | 運動畫報封面魔咒、二年級低潮、迴歸到平均的「假效果」製造機 | ch19 |\n| 賭徒破產 | 公正賭局、本金 i、目標 N：破產機率 = (N−i)/N；有莊家優勢時破產近乎必然（指數壓垮）——「翻本策略必敗」 | ch20 |\n| 對稱隨機漫步 | 一維對稱漫步：常返（必回原點，機率 1）但期望回返時間無限；二維常返、三維暫態（「醉漢找得到家、醉鳥找不到」，照 landscape） | ch20 |\n| 馬可夫天氣鏈 | 2 狀態（晴/雨）轉移矩陣，手算穩態分布；「忘記起點」收斂到穩態 | ch21 |\n| 數字精度 | π≈3.14159、e≈2.71828、e⁻¹≈0.3679、1.96、68.27/95.45/99.73%；全書不得互相矛盾 | — |\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀或鄰書）：測度論機率（σ-algebra、Lebesgue 測度——ch22 一句話）、排列組合計算大全與其操練、統計軟體操作（R／SciPy／SPSS how-to）、多變量統計與完整迴歸分析方法（相關只到 ρ 與「相關≠因果」直覺、線性迴歸只在 ch19 回歸均值脈絡點到）、隨機過程完整理論（鞅只一句話、Markov 只到穩態直覺、布朗運動只取「處處毛刺」與一句金融）、貝氏統計完整方法（MCMC、共軛先驗只一句＋延伸）、資訊理論與熵（不開章、一句＋延伸）、Poisson 過程／指數分布／CTMC 的排隊運算（指向《佇列論》）、常態曲線下面積的微積分推導（指向《馴服無限》）、任何考題形式操練。\n\n---\n\n## Part I — 機運的語言：機率在量化什麼（ch01–04）\n\n### ch01 — 隨機為何可怕又可算：賭桌上的一封信\n- **目標**：讀完能說出機率這門學問在「馴服」什麼（不可預測的個體、卻有規律的總體），為什麼它晚到（人類兩千年沒把賭博變成數學），並畫得出全書地圖、認得脊椎硬幣。\n- **必涵蓋**：人類對隨機的恐懼與宿命解讀（擲骰問神意）；為何機率這麼晚才誕生（賭徒實務早有、數學語言沒跟上——Cardano 私稿到 Pascal–Fermat 1654 通信，照 landscape）；**分賭注問題**（problem of points，基準配置）當開場懸案：對賭中斷，賭注怎麼分才公平？Pascal 與 Fermat 兩條路（枚舉未來 vs 遞迴期望）殊途同歸；Huygens 1657 第一本書（照 landscape）；隨機「可算」的核心洞見——不問「下一次是什麼」，問「長期會怎樣」；本書路線圖（基準圖首次出場）＋六條驗收目標開宗明義；脊椎硬幣登場（先只說 P(正)=1/2，三種讀法留 ch02）。\n- **不涵蓋**：機率公理（ch02）；條件機率（ch04）；期望值的正式定義（ch08，本章用「公平分注」直覺帶出）。\n- **橋接**：你天天把隨機性當工具——retry 加 jitter 避免重試風暴同步、load balancer 隨機分流、rate limiter 取樣；你早就相信「單一請求不可測、整體流量可規劃」——這正是機率的核心信念。\n- **Worked example**：分賭注問題（基準配置 A 需 1 勝、B 需 2 勝）——枚舉「再打 2 局」的四種等可能結果，數出 A 贏的比例 3/4；對照「直接賭注對半分」為何不公平。兩種思路（Fermat 枚舉 vs Pascal 遞迴）並排得同一答案。\n- **紙上推演**：把「公平分注」翻成你熟的語言（依各人「最終獲勝機率」按比例分）；對 A 需 1 勝、B 需 3 勝重算一次；口頭題：向一個只信宿命的人解釋「為什麼擲骰子可以算」。\n\n### ch02 — 機率的三張臉：古典、頻率、主觀\n- **目標**：能說出同一個「機率 = 1/2」可以有三種完全不同的意思（對稱、長期頻率、信念強度），且它們共用同一套公理；理解「等可能」是假設不是定理。\n- **必涵蓋**：樣本空間、事件、機率作為「事件→[0,1] 的量」；三種詮釋——古典（對稱數數）、頻率（長期相對頻率，預告 ch13 大數法則才讓它嚴格）、主觀／貝氏（信念，預告 ch05–06）；**Kolmogorov 三公理**（1933，照 landscape）：非負、全空間為 1、互斥可加——「機率就是滿足這三條的東西」，三種詮釋都是它的模型；無差別原則（principle of indifference）的甜蜜與陷阱——Bertrand 悖論一瞥（「隨機弦」三種等可能給三個答案，照 landscape），等可能不是天上掉下來的。\n- **不涵蓋**：條件機率（ch04）；連續樣本空間的測度問題（ch22 一句話）；大數法則對頻率詮釋的正當化（ch13）。\n- **橋接**：同一個「P=0.1%」在你的系統裡有兩種意思——「這支 API 的歷史錯誤率」（頻率）vs「這次部署會出事的可能性」（主觀單一事件）；公理化 ≈ interface，三種詮釋 ≈ 三種 implementation。\n- **Worked example**：兩個小孩問題（boy-girl，照 landscape 的歧義版）——「至少一個男孩，兩個都是男孩的機率？」答案 1/3 還是 1/2 取決於樣本空間怎麼界定，把兩種界定的樣本空間並排列舉，看見「答案藏在你沒講清楚的假設裡」。\n- **紙上推演**：對「這枚硬幣 P(正)=1/2」分別寫出古典、頻率、主觀三種讀法各一句；指出無差別原則在「Bertrand 隨機弦」哪一步偷渡了未定義的「隨機」；把一個你工作中的「機率」歸類成三張臉的哪一張。\n\n### ch03 — 把事件組合起來：加法、餘事件、容斥\n- **目標**：能熟練用餘事件與容斥處理「至少一個」「至少一次」類問題，並親身體會生日問題為何反直覺。\n- **必涵蓋**：交集、聯集、餘事件；互斥 vs 非互斥的加法（容斥原理 P(A∪B)=P(A)+P(B)−P(A∩B)）；**「至少一個」幾乎都用餘事件算**（1 − P(全都沒發生)）；連續失敗的乘法直覺（每次小機率、多次就不小）；**生日問題**（基準）完整破解——為什麼 23 人就過半（配對數 C(23,2)=253 的視角＋連乘的視角）；組合計數只快速複習（C(n,k) 的意義），不開排列組合課。\n- **不涵蓋**：條件機率（ch04）；排列組合大全（全域不涵蓋）；卜瓦松近似（ch10）。\n- **橋接**：「至少一個請求逾時」「至少一台機器當機」你天天在算——n 台各 p 故障率，全活著是 (1−p)ⁿ；分散式系統規模一大，罕見事件變常態（尾端必然性）；快取多層「全部 miss」是乘法。\n- **Worked example**：生日問題（基準）連乘手算 P(無碰撞)=365/365·364/365·…·343/365 ≈ 0.4927，列前幾項與關鍵節點（23 人）；「至少一次」基準：p=0.01 做 n 次，1−0.99ⁿ，算 n=10、69、100 三點，看見越過 0.5 的位置。\n- **紙上推演**：100 台機器各 0.1% 日故障率，當天「至少一台故障」機率手算並解釋為何直覺低估；用餘事件解「擲 4 次骰子至少一個 6」（對照常被誤算的成對版）；把生日問題的「為什麼這麼少人就夠」講給一個賭它要 183 人的朋友聽。\n\n### ch04 — 條件機率與獨立：最容易誤判的兩件事\n- **目標**：能精確說出條件機率在做什麼（限縮樣本空間後重新標準化）、獨立的真正定義（P(A|B)=P(A)，不是「無關」或「互斥」），並認得獨立性誤判如何在工程裡釀災。\n- **必涵蓋**：條件機率 P(A|B)=P(A∩B)/P(B)——「把世界縮到 B 裡再看 A」；乘法法則與機率樹；**獨立的正式定義** P(A∩B)=P(A)P(B)，以及它跟「互斥」是相反的東西（互斥的兩事件高度相依）；條件獨立 ≠ 邊際獨立（預告辛普森悖論 ch19）；為何獨立假設這麼脆——共享潛在原因（confounder）讓「看起來獨立」的事其實相依；全機率公式（law of total probability）當 ch05 貝氏的鋪墊。\n- **不涵蓋**：貝氏定理（ch05，本章只鋪 P(A|B) 與 P(B|A) 不同）；相關係數（ch10）；辛普森悖論完整案例（ch19）。\n- **橋接**：條件機率 ≈ 帶 WHERE 的查詢（在「已逾時」的子集裡看故障率）；**獨立假設的相關性故障**——你以為兩個 AZ 的備援獨立，其實共享同一條光纖／同一個控制平面，「同時掛掉」機率被你低估了好幾個數量級（這是真實 outage 的常見根因）。\n- **Worked example**：相關性故障基準——兩備援各 99% 可用，若真獨立則同掛機率 0.0001、可用度 99.99%；但若共享電源（給定停電則兩者必掛、停電機率 1%），重算同掛機率，看可用度崩回約 99%——「獨立假設值多少個 9」。\n- **紙上推演**：用機率樹算「兩階段流程都成功」並標出哪裡假設了獨立；舉一個你維運過的系統中「假獨立」的例子並估計它如何低估風險；證明「互斥且各自機率為正的兩事件一定不獨立」。\n\n## Part II — 貝氏：證據如何改變信念（ch05–06）\n\n### ch05 — 貝氏定理：把條件機率反過來\n- **目標**：能講清楚 P(H|D) 與 P(D|H) 為什麼天差地別、貝氏定理如何把後者翻成前者，並用基率破解醫檢偽陽性的經典震撼。\n- **必涵蓋**：問題：你有 P(資料|假設)（檢驗多準），想要 P(假設|資料)（陽性代表多可能有病）——兩者混淆＝**檢察官謬誤**（prosecutor's fallacy，照 landscape）；貝氏定理 P(H|D)=P(D|H)·P(H)/P(D) 的推導（從 ch04 乘法法則兩寫法相等）；先驗、概似、後驗、證據（分母 = 全機率公式）的角色；**基率忽視**（base-rate neglect）——醫檢基準的完整破解；**自然頻率法**（Gigerenzer，照 landscape）：把機率換成「每 10 萬人」直覺就回來了——同一題兩種表述、難度天差地別，本身就是一個關於人類認知的驚嘆點。\n- **不涵蓋**：貝氏更新的反覆機制與世界觀（ch06）；蒙提霍爾（ch06）；貝氏統計方法（全域不涵蓋）。\n- **橋接**：告警系統的偽陽性——你的 alert 命中率（P(alert|真故障)）很高，但真故障基率很低，於是「收到 alert 時真的有事」的機率可能低得驚人，這就是 alert fatigue 的數學；垃圾郵件過濾本來就是貝氏。\n- **Worked example**：疾病篩檢基率（基準）——盛行率 0.1%、敏感度 99%、偽陽 5%，貝氏公式算 P(病|陽性)≈1.94%；再用自然頻率法（10 萬人）重算同一答案；2×2 表並排兩種算法。\n- **紙上推演**：把上題敏感度提到 99.9% 重算，看後驗幾乎沒變——「為什麼問題出在基率不在準確度」；用自然頻率法重述一個告警偽陽性情境；找出「他無罪機率只有百萬分之一」這句檢察官說法的破綻（混淆了哪兩個條件機率）。\n\n### ch06 — 貝氏作為世界觀：信念可以有數學\n- **目標**：能講出貝氏更新的循環（後驗變成下一次先驗）、主觀機率為何能合理、頻率派與貝氏派為何分裂，並用貝氏正式解蒙提霍爾。\n- **必涵蓋**：更新的機制——證據逐筆進來，先驗→後驗→新先驗，信念像被資料拉動的數值；先驗從哪來（這是貝氏派被攻擊的點，也是它的力量）；主觀機率的合理性一瞥——Dutch book 論證（不自洽的信念可被穩賺套利，照 landscape 點到）；**頻率派 vs 貝氏派的世紀分裂**當故事講、不選邊（兩種「機率是什麼」的世界觀，預告 Part V 統計推論的頻率派血統）；**蒙提霍爾問題**（基準）：直覺說 1/2、正解 2/3——用貝氏把主持人「必開山羊門」這個關鍵資訊算進去（標準假設照 landscape，明寫假設改變答案）；三門→100 門的直覺放大。\n- **不涵蓋**：貝氏統計推論方法（全域不涵蓋）；決策論（一句話）；頻率派方法細節（Part V）。\n- **橋接**：你做 incident 診斷就是貝氏——先驗（這種症狀通常是 DB）、看 log（概似）、更新懷疑對象；feature flag 的灰度放量＝用逐批資料更新「這版本安全嗎」的後驗；金絲雀部署是序貫貝氏。\n- **Worked example**：蒙提霍爾（基準）貝氏全解——先驗各門 1/3，主持人開門的概似，後驗算出「換」=2/3；ASCII 三門樹；100 門版的直覺對照表。\n- **紙上推演**：把蒙提霍爾的主持人改成「隨機開一門、剛好是山羊」重算，看答案變回 1/2——「資訊來自主持人的規則不是門」；用貝氏更新手算「連續兩次擲出正面後，你對這枚硬幣公正性的信念」（給一個先驗）；口頭題：向一個堅持「就剩兩門所以一半一半」的人講清楚錯在哪。\n\n## Part III — 隨機變數：與不確定共舞的代數（ch07–12）\n\n### ch07 — 隨機變數：把隨機結果變成數字\n- **目標**：能說出隨機變數是什麼（把結果映到數字的函數）、離散與連續的差別、PMF/PDF/CDF 各自在描述什麼。\n- **必涵蓋**：從「事件」到「數字」——隨機變數 X 是樣本空間→ℝ 的函數（擲兩骰的「點數和」就是一個 RV）；離散（PMF，機率質量）vs 連續（PDF，機率密度——**單點機率為 0** 的反直覺，密度不是機率）；CDF F(x)=P(X≤x) 是統一語言（離散連續都有）；分布是「這個隨機數字的完整行為剖面」；脊椎硬幣：單擲是伯努利 RV。\n- **不涵蓋**：期望變異（ch08–09）；具名分布（ch11–12）；多變數聯合分布（ch10 點到）。\n- **橋接**：隨機變數 ≈ 一個每次呼叫回傳不同值的 function（像 `random()` 但有指定行為剖面）；分布 ≈ 這個 function 的「行為規格」；CDF ≈ 你查 P99 時在反查的那條累積曲線。\n- **Worked example**：擲兩顆骰子的「點數和」RV——列出 PMF（2 到 12，機率 1/36…6/36…1/36）的完整表與 ASCII 直方圖（三角形），再畫對應 CDF 階梯——同一個隨機變數兩種畫像。\n- **紙上推演**：把脊椎硬幣的「單擲」「三擲正面數」各寫成 RV 並列 PMF；解釋「連續分布單點機率為 0 但事件仍會發生」為什麼不矛盾（密度 vs 機率）；把一個工程量（如「請求延遲」）描述成隨機變數並說它離散還連續。\n\n### ch08 — 期望值：長期平均，不是最可能值\n- **目標**：能講出期望值的精確意義（長期平均／機率加權重心，不是「最可能發生的值」），並見識期望線性性的魔法（即使不獨立也成立）。\n- **必涵蓋**：E[X]=Σ x·P(x) 的重心直覺；**期望不是最可能值、也不一定是可能值**（一胎平均 1.8 個小孩）；**期望線性性**（linearity of expectation）E[X+Y]=E[X]+E[Y] **不需要獨立**——本書最划算的工具；用它做招牌震撼（信封配對期望命中=1，不需錯排數）；**聖彼得堡悖論**（基準）：期望無限卻沒人願付多——期望值不是萬能的決策準則，引出效用（Daniel Bernoulli，照 landscape）；脊椎硬幣：E[單擲]=1/2、E[n 擲正面數]=n/2。\n- **不涵蓋**：變異數（ch09）；條件期望的深入（一句話）；效用理論展開（一句＋延伸）。\n- **橋接**：期望值 ≈ 你的「平均延遲／平均成本」，但**平均會騙人**（長尾下平均被少數巨值拉走，預告 ch12）；linearity ≈ 你估「總耗時 = 各階段平均耗時相加」時偷偷用過、即使各階段相關也成立。\n- **Worked example**：信封配對（基準）——n 封信隨機回，定義指示變數 Xᵢ（第 i 封回對=1），E[命中]=Σ E[Xᵢ]=n·(1/n)=1，與 n 無關；對照若硬算錯排數有多痛——linearity 的招牌。\n- **紙上推演**：用 linearity 算「擲 n 次骰子點數和的期望」（不用聯合分布）；算聖彼得堡賭局期望並解釋你為何只願付 $10；指出「期望壽命 80 歲所以我大概 80 歲死」這句話混淆了什麼。\n\n### ch09 — 變異數與標準差：不確定的大小\n- **目標**：能說出變異數量的是什麼（離散程度／與均值平方偏差的期望）、為何用平方而非絕對值、以及獨立和的變異數相加這條關鍵性質。\n- **必涵蓋**：Var(X)=E[(X−μ)²]、SD=√Var；為何平方（可加性、數學乖巧）而非絕對值（直覺但難算）；標準差才是「跟資料同單位的離散尺度」；**獨立和的變異數相加** Var(X+Y)=Var(X)+Var(Y)（獨立時）——但標準差不相加（√ 的非線性）；由此得 **√n 法則**（基準）：n 個 iid 相加 SD 長 √n、平均的標準誤 σ/√n——「平均比個體穩 √n 倍」，直接預告大數法則與中央極限；脊椎硬幣：Var(單擲)=1/4、SD=1/2、n 擲正面數 Var=n/4。\n- **不涵蓋**：共變異（ch10，本章只做獨立情形）；大數法則／中央極限（ch13–14，本章只埋 √n）；高階動差。\n- **橋接**：你天天量變異——P99−P50 的差、jitter、延遲的抖動就是在描述變異數／尾端；「平均沒變但 P99 爆了」＝均值不動、變異數爆了；A/B test 要更多樣本才看得出小差異＝標準誤 σ/√n 在作怪。\n- **Worked example**：√n 法則（基準）——脊椎硬幣 n 擲正面數，Var=n/4、SD=√n/2；算 n=100（SD=5）、n=10⁴（SD=50），但「比例」的 SD=1/(2√n) 反而縮小——同一現象「和變寬、平均變窄」的數字對照（為 ch13 鋪雙讀法）。\n- **紙上推演**：手算一顆公正骰子的變異數（E[X²]−μ²）；解釋「為什麼把樣本數從 100 增到 400 只把誤差減半」（√n）；用「變異數相加但標準差不相加」反駁「兩個各 ±3 的誤差合起來是 ±6」。\n\n### ch10 — 共變異與相關：兩個變數的共舞，相關 ≠ 因果\n- **目標**：能說出共變異與相關係數在量什麼（兩個隨機變數一起變動的方向與強度）、ρ 的範圍與意義，並把「相關不是因果」從口號變成能解剖的東西。\n- **必涵蓋**：Cov(X,Y)=E[(X−μ_X)(Y−μ_Y)]、相關係數 ρ=Cov/(σ_Xσ_Y)∈[−1,1]；ρ 只抓**線性**關聯（強非線性關係 ρ 可為 0——重要陷阱）；獨立 ⟹ 不相關，但**不相關 ⇏ 獨立**（給反例）；Var(X+Y)=Var(X)+Var(Y)+2Cov(X,Y) 補完 ch09；**相關≠因果**的三條岔路——巧合（虛假相關，spurious）、共同原因（confounder）、反向因果；Galton 與 Pearson 如何把「相關」變成數字（照 landscape）；預告辛普森悖論（ch19）與回歸均值（ch19）都是這條線的高潮。\n- **不涵蓋**：線性迴歸方法（全域不涵蓋；ch19 回歸均值脈絡點到）；偏相關、因果推論（do-演算）框架（一句＋延伸）；多變量（不涵蓋）。\n- **橋接**：你看 metric 之間的相關（CPU 與延遲一起升）就在算 ρ，但「誰造成誰、還是都被流量造成」是 confounder 問題；虛假相關（兩條無關曲線剛好同漲）在 dashboard 上天天騙人；A/B 與因果——隨機化為何能斬斷 confounder（鋪 ch16 隨機抽樣的神奇）。\n- **Worked example**：給一張小資料（5 個點）手算 Cov 與 ρ；再給一個 ρ=0 但明顯相依的例子（如 Y=X²、X 對稱）說明「不相關不代表獨立」；一個 confounder 故事（冰淇淋銷量與溺水數，共同原因＝氣溫）拆成三變數關係圖。\n- **紙上推演**：手算兩個指示變數的共變異並判斷正負相關；對「穿大鞋的人識字率高」找出 confounder；解釋「為什麼 ρ=0 不能下結論說兩者無關」並舉你工作中一個非線性關聯的例子。\n\n### ch11 — 分布動物園（上）：離散家族\n- **目標**：能認得離散分布的幾個主角各自在描述什麼情境、彼此如何關聯，並親身體會卜瓦松作為「稀有事件普適極限」的美。\n- **必涵蓋**：伯努利（單次成敗）→ 二項（n 次獨立、成功數，PMF C(n,k)pᵏ(1−p)ⁿ⁻ᵏ，脊椎硬幣 n 擲）→ 幾何（第一次成功要等幾次，**離散版無記憶性**，預告 ch12 指數）；**卜瓦松**（Poisson）作為二項在 n→∞、p→0、np=λ 固定下的極限——稀有事件的普適形狀（基準：λ=1）；卜瓦松的「為何美」由本書自己講（很多看似無關的稀有計數都長同一個形狀——Bortkiewicz 普魯士馬踢死人數的經典資料，照 landscape）；**運算與排隊應用（到達過程、Poisson 過程）指向《佇列論》ch05**，本書不重推。\n- **不涵蓋**：Poisson 過程的時間軸推導與排隊（見《佇列論》）；負二項、超幾何（一句帶過）；連續分布（ch12）。\n- **橋接**：你的系統裡「每分鐘錯誤數」「每秒到達請求數」常用卜瓦松近似；二項＝「100 次重試成功幾次」；幾何＝「重試到第幾次才成功」。\n- **Worked example**：二項→卜瓦松極限（基準）——n=1000、p=0.001，算二項 P(0)、P(1) 與卜瓦松 λ=1 的 e⁻¹≈0.3679 並排，看兩者幾乎相等；脊椎硬幣 Binomial(10,1/2) 的 PMF 表＋ASCII 直方圖（對稱鐘形雛形，預告 ch14）。\n- **紙上推演**：用幾何分布算「公正硬幣第一次出現正面的期望次數」並驗證=2；說明卜瓦松的 λ 同時是期望也是變異數（手算驗一個）；把「每天平均 3 次 5xx」用卜瓦松寫出「某天 0 次」的機率。\n\n### ch12 — 分布動物園（下）：連續家族與長尾的警告\n- **目標**：能認得連續分布的主角、體會指數分布無記憶性之美，並警覺長尾世界裡「平均」如何失去意義。\n- **必涵蓋**：均勻分布（最大無知的連續版）；**指數分布**——等待時間，**無記憶性之美**由本書自己講（「已經等了 10 分鐘的公車不會比較快來」、P(X>s+t|X>s)=P(X>t)，唯一的連續無記憶分布）；**CTMC／排隊運算指向《佇列論》ch04**；常態分布先打照面（鐘形、μ 與 σ 兩參數，**為何無所不在留給 ch14 CLT 解答**）；**長尾／冪律**（power law，照 landscape：Pareto 80/20、肥尾）——平均數失去意義的世界（首富走進酒吧、收入分布、檔案大小），「期望存在但樣本平均不穩」的直覺警告（與 ch13 大數法則的前提呼應）。\n- **不涵蓋**：指數／CTMC 的排隊應用（見《佇列論》）；常態為何普適（ch14）；重尾的嚴格條件與穩定分布（一句＋延伸）；極值理論（一句＋延伸）。\n- **橋接**：服務延遲常是重尾（P50 很好、P99 很糟），**用平均延遲做 SLA 會被尾巴打臉**；指數分布＝你假設的「無記憶」到達間隔；冪律＝少數熱點 key 佔多數流量（cache 設計直覺）。\n- **Worked example**：指數分布無記憶性手算驗證（給 λ，算 P(X>2)、P(X>3|X>1) 相等）；長尾示範——一個 80/20 的小資料，算「拿掉最大那筆後平均如何劇變」，對照常態資料拿掉極值幾乎不變——「平均在長尾下不穩」。\n- **紙上推演**：解釋「公車無記憶」為何反直覺又為何成立；對「我們系統平均延遲 50ms」這句話寫出三個它可能在說謊的情境（尾巴）；把「20% 的 key 佔 80% 流量」翻成冪律語言並說它如何影響快取命中率。\n\n## Part IV — 兩大定理：秩序從混沌浮現（ch13–15，全書高潮）\n\n### ch13 — 大數法則：頻率為何收斂到機率\n- **目標**：能講出大數法則的**精確**意義（樣本平均→期望，且這正當化了 ch02 的頻率詮釋），並徹底拆穿賭徒謬誤——LLN 是「稀釋」不是「修正」。\n- **必涵蓋**：弱大數法則的陳述與**車比雪夫不等式**（基準）給的直覺證明（只靠變異數就把「樣本平均離期望遠」的機率壓下去——優雅得驚人）；弱 vs 強 LLN 的差別（依機率 vs 幾乎必然，直覺帶過、不證強版）；**賭徒謬誤的正解**（基準雙讀法）——硬幣連出五次正面，第六次仍 1/2；LLN 不保證「反面會來補」，它保證的是**比例**被後續大量擲幣稀釋回 0.5，而「正面減反面」的絕對差期望其實 ~√n 在變大；同一組數據兩種讀法的完整對帳——本書最重要的反直覺一頁；熱手謬誤一句話（**2018 Miller–Sanjurjo 反轉**照 landscape——別把它當已定讞）；回收 ch02 頻率詮釋：現在它有了定理當地基。\n- **不涵蓋**：強 LLN 的證明；中央極限（ch14，LLN 說平均去哪、CLT 說怎麼抖）；測度論收斂模式（一句＋延伸）。\n- **橋接**：你信「樣本夠大就能估真實錯誤率」就是信 LLN；A/B test 要跑夠久＝等樣本平均穩定；但**「最近故障多、接下來該平靜了」是賭徒謬誤**——獨立事件沒有記憶，系統不欠你。\n- **Worked example**：脊椎硬幣（基準）——擲 n=10,100,1000,10⁴ 次，列「正面比例」收斂到 0.5 的表，同時列「正面−反面」的典型量級 ~±√n（n=10⁴ 約 ±100）——比例收斂、差距發散並排；車比雪夫對「1000 擲偏離 0.5 超過 0.05」給一個上界估計。\n- **紙上推演**：用車比雪夫估「n 擲硬幣比例偏離 0.5 超過 ε 的機率上界」；解釋賭徒謬誤錯在哪（指出它偷偷假設了什麼記憶）；口頭題：向賭場裡喊「該開大了」的人講清楚 LLN 真正保證什麼。\n\n### ch14 — 中央極限定理：鐘形為何無所不在（全書最大驚嘆）\n- **目標**：能對另一個工程師講清楚 CLT 的主張（大量獨立隨機量的「和／平均」總是趨向常態，**與原分布長相無關**）為什麼是宇宙級的普適性，並知道它正是脊椎硬幣的歷史起點。\n- **必涵蓋**：鋪陳：LLN 說平均收斂到一個點，但「在那點附近怎麼抖」？答案永遠是鐘形；**CLT 陳述**：n 個 iid（均值 μ、變異 σ²）的和標準化後 →N(0,1)，平均 ~N(μ, σ²/n)（√n 標準誤回收 ch09）；**為什麼普適**的直覺（不證）——很多獨立小擾動相加，細節被抹平、只剩二階資訊（均值與變異）存活；**骰子實驗**（基準）：一顆（均勻平台）、兩顆（三角）、五顆、三十顆，手繪 ASCII 直方圖看鐘形浮現；**歷史巧合與脊椎回收**：史上第一個 CLT 就是 de Moivre 1733 在算硬幣（二項的常態近似，照 landscape）——脊椎硬幣 Binomial(n,1/2) 標準化→常態；為何身高、測量誤差、平均都是鐘形（很多加性因素）；CLT 的前提與它失效的地方（重尾／無限變異——回收 ch12 長尾，CLT 不保證適用）。\n- **不涵蓋**：CLT 的證明（特徵函數，明寫不證、指向延伸）；常態曲線下面積的微積分（ch15／《馴服無限》）；穩定分布與廣義 CLT（一句＋延伸）。\n- **橋接**：你把很多獨立請求的延遲「加總／平均」時結果趨於常態（即使單一延遲是重尾——前提要小心）；蒙地卡羅估計、A/B test 的檢定力都建在 CLT 上；為什麼「平均很多次量測」能降噪＝CLT＋√n。\n- **Worked example**：骰子和分布（基準）——手算一顆、兩顆的完整 PMF 與直方圖，描述五顆、三十顆的形狀逼近鐘形；脊椎硬幣 n=100 擲正面數 ~N(50,25) 的常態近似，算「介於 45 與 55」的近似機率（接 ch15 查表）。\n- **紙上推演**：用兩顆骰子的三角分布解釋「為什麼和=7 最常見」並連到 CLT 的「抹平」直覺；說明 CLT 在重尾（如冪律收入）為何可能失效；口頭題：向人解釋「為什麼幾乎所有自然量測都是鐘形」而不講一句公式。\n\n### ch15 — 常態之美與機率即面積\n- **目標**：能讀寫常態分布的語言（標準化、z 分數、68-95-99.7、查尾端機率），並把「機率 = 曲線下面積」這件事接上微積分。\n- **必涵蓋**：標準常態 N(0,1) 與標準化 z=(x−μ)/σ（把任何常態搬到同一把尺）；**68-95-99.7 法則**（基準精確值照 landscape）與 1.96 的來歷（95% 雙尾）；**機率即面積**——連續分布的機率是 PDF 下的積分，P99＝反查 CDF（積分當工具用，**深入推導指向《馴服無限》ch15「機率即面積」**）；高斯函數 e^(−x²/2) 為何長那樣（鐘形、尾巴多快趨零）只給直覺一瞥、不硬推；常態的「自我複製」美（獨立常態相加還是常態）一句話；脊椎硬幣回收：用常態近似查「100 擲落在某區間」的機率。\n- **不涵蓋**：高斯積分 ∫e^(−x²)dx=√π 的推導（指向《馴服無限》）；多維常態（一句＋延伸）；其他鐘形（t、卡方）留 Part V 用到再點。\n- **橋接**：你查 P99 延遲就是在反查 CDF；「幾個標準差之外」是你判斷異常的工程語感（SRE 的 3-sigma 告警）；常態化分數（standardize）＝你把不同量綱指標放到同一把尺比較。\n- **Worked example**：標準化與查表——把「平均 50ms、SD 5ms 的延遲」問「超過 60ms 的比例」化成 z=2.0、查尾端≈2.3%；脊椎硬幣 N(50,25) 算「≥60 正面」的常態近似（z=2.0）並對照 ch18 會用的精確值（埋伏筆）。\n- **紙上推演**：用 68-95-99.7 估「±2σ 外」的比例並對照精確 95.45%；解釋「為什麼 1.96 而不是 2」；把一個工程指標標準化成 z 分數並判斷它多異常。\n\n## Part V — 統計推論：從樣本推斷未見之事（ch16–19）\n\n### ch16 — 抽樣的大膽：從 1000 人推斷兩億人\n- **目標**：能講出統計推論的核心膽識（不看全部就知道全部）、母體與樣本與抽樣分布的關係，以及隨機抽樣為何是這一切的魔法來源。\n- **必涵蓋**：母體（population）vs 樣本（sample）、參數 vs 統計量；**抽樣分布**——統計量本身是隨機變數，它的分布由 CLT 掌管（√n 標準誤回收）；**隨機抽樣的神奇**：代表性不靠「樣本長得像母體」，靠**隨機**（隨機化斬斷選擇偏誤與 confounder——回收 ch10、預告 A/B 因果）；抽樣偏誤的經典翻車（1936 Literary Digest 民調慘敗、二戰倖存者偏誤的彈孔故事——照 landscape 查證歸屬）；為何「樣本大小」比「母體大小」重要得多（±3% 跟全國或全市無關，只跟 n 有關——反直覺震撼）。\n- **不涵蓋**：估計與信賴區間的計算（ch17）；假設檢定（ch18）；複雜抽樣設計（分層、叢集，一句＋延伸）。\n- **橋接**：你用抽樣 log（sampling）估整體錯誤率、用壓測的有限樣本推斷容量；金絲雀部署＝拿一小撮隨機流量推斷全量會怎樣；A/B test 的隨機分組就是在買「因果可推斷」。\n- **Worked example**：抽樣分布示範——脊椎硬幣，從「真實 p=0.5」重複抽 n=100 的樣本比例 p̂，說明 p̂ 的分布 ~N(0.5, 0.25/100)、SD=0.05；「為什麼 n=1000 的全國民調誤差跟人口 2 億還是 200 萬無關」用標準誤公式說清。\n- **紙上推演**：解釋「隨機抽樣為何勝過刻意挑代表性樣本」；指出倖存者偏誤在一個工程情境（只看到沒當機的機器的指標）；口頭題：向人解釋「只問 1000 人怎麼可能代表兩億人」。\n\n### ch17 — 估計與信賴區間：誠實地說「我不確定多少」\n- **目標**：能算並正確解讀信賴區間，特別是能講出它**真正**在保證什麼（而不是那個人人都犯的誤讀）。\n- **必涵蓋**：點估計（樣本平均、樣本比例 p̂）與其標準誤；**信賴區間**的構造（估計 ± 1.96·標準誤）；民調 ±3%（基準）的完整來歷；**信賴區間到底在說什麼**——頻率派的精確且反直覺的意義：「用這方法做很多次，95% 的區間會蓋住真值」，**不是**「真值有 95% 機率落在這個區間」（真值不是隨機的——這是統計最常見的誤讀，照 landscape）；可呼應書架 TLA+ 的 ∀∃ 量詞結構（不依賴）；樣本數與精度的 √n 權衡（要把誤差砍半要四倍樣本）。\n- **不涵蓋**：t 分布的完整理論（Gosset 一句話、小樣本用到時點到）；貝氏可信區間 credible interval（一句對比：那個才是「真值有 95% 機率在內」、但前提不同）；各種估計量的最優性理論。\n- **橋接**：你報「平均延遲 50ms ± 3ms」時就在給信賴區間；SLA 的誤差界＝把不確定量化成可驗收的區間；「再多跑幾次測試把誤差縮小」＝你在用 √n。\n- **Worked example**：民調 ±3%（基準）——n=1000、p̂=0.5，半寬 1.96·√(0.25/1000)=0.031，完整手算；改 n=4000 看誤差砍半（√n）；脊椎硬幣 60/100 的 p 信賴區間（埋 ch18 檢定伏筆）。\n- **紙上推演**：把「95% 信賴區間 [47%,53%]」的四種常見讀法列出、只留正確那條並說其餘錯在哪；解釋「要把民調誤差從 ±3% 降到 ±1.5% 要多少樣本」；口頭題：信賴區間的正確意義講給一個以為「真值有 95% 機率在內」的人聽。\n\n### ch18 — 假設檢定與 p 值：證據強到什麼程度才算數\n- **目標**：能講出假設檢定的邏輯（反證法的機率版）、p 值的精確定義與它**不是**什麼，並看穿「統計顯著」的脆弱。\n- **必涵蓋**：虛無假設 H₀ vs 對立假設；檢定的反證法結構——假設 H₀ 為真，看資料有多「離譜」；**p 值的精確定義**：P(觀察到至少這麼極端的資料 | H₀ 為真)——**不是** P(H₀ 為真)、不是「結果出於偶然的機率」（照 landscape 的五大誤讀）；顯著水準 α、型一/型二錯誤（Neyman–Pearson，照 landscape）、檢定力；Fisher 與 Neyman–Pearson 兩套哲學的混血與張力（照 landscape）；**p<0.05 是約定不是天律**（Fisher 本人沒當硬線，照 landscape）；統計顯著 ≠ 實際重要（大樣本能讓微小無意義差異「顯著」）。\n- **不涵蓋**：各種具體檢定的公式目錄（t/卡方/ANOVA——用到時點到、不做菜單）；多重比較校正細節（ch19 點到）；效果量與檢定力分析完整方法（一句＋延伸）。\n- **橋接**：A/B test 的「這個提升是真的還是雜訊」就是假設檢定；你看 dashboard 的尖峰問「這是異常還是正常波動」也是；**統計顯著 ≠ 值得上線**（p 漂亮但效果 0.1% 不值得）。\n- **Worked example**：脊椎硬幣檢定（基準）——H₀：公正，觀察 60/100 正面；常態近似 z=2.0、雙尾 p≈0.046；精確二項雙尾≈0.057——**剛好卡在 0.05 兩側**，示範「同一證據、換個算法就跨過門檻」的武斷；對照若 600/1000（同比例）p 極小——樣本量如何放大顯著性。\n- **紙上推演**：把「p=0.03」的五種錯誤讀法列出並各自更正；解釋「為什麼大樣本下幾乎什麼都會顯著」；對 60/100 與 600/1000 同為 60% 但結論強度天差地別給出理由。\n\n### ch19 — 統計的崩壞：美麗的機器如何騙人\n- **目標**：能講出同一套統計數學在人類誘因下如何系統性產出假發現（p-hacking、複現危機），並用辛普森悖論與回歸均值兩大陷阱收束全書的故障視角。\n- **必涵蓋**：**研究者自由度與 p-hacking**（Simmons et al. 2011，照 landscape）——多重比較、選擇性報告、見獵心喜的停止；發表偏誤（抽屜裡的陰性結果）；**複現危機**（Open Science Collaboration 2015 的複現率、Ioannidis 2005，照 landscape）——「為什麼大多數發表的發現是假的」的機制；ASA 2016 對 p 值的警告（照 landscape）；**辛普森悖論**（基準）——柏克萊招生、腎結石治療，合併資料翻轉結論，根因是 confounder（回收 ch04 條件獨立 ≠ 邊際獨立、ch10 相關≠因果）；**回歸均值**（基準）——運動畫報魔咒、二診效應、「處罰有效獎勵沒用」的錯覺，極端值天生會回擺，是假效果的製造機；故障視角總收束：機率統計是真理機器也是謊言機器，差別在誠實。\n- **不涵蓋**：因果推論完整框架（一句＋延伸：這是斬斷 confounder 的正解）；統計改革方案細節（預註冊、貝氏因子——一句＋延伸）；後設分析方法。\n- **橋接**：你在 dashboard 上「找到」的相關大多是 p-hacking 的工程版（看夠多圖總有一張顯著）；金絲雀「看起來變好」可能是回歸均值（剛好挑了狀況差的時段比）；事故後「我們做了 X 就好轉了」常是回歸均值不是 X。\n- **Worked example**：辛普森悖論（基準）——給柏克萊式 2 系招生小資料（整體女性錄取率低、分系後每系都不低於男性），手算兩種彙總看翻轉，畫出 confounder（女性多申請競爭激烈的系）；回歸均值小示範——一組「考差的人」複測平均回升，即使無任何介入。\n- **紙上推演**：自己捏一組會出現辛普森悖論的數字；解釋「為什麼嚴厲批評後表現變好」常是回歸均值而非批評有效；找出一個你信過的「資料證明 X」其實可能是 p-hacking 或 confounder 的案例。\n\n## Part VI — 隨機過程一瞥與收官（ch20–23）\n\n### ch20 — 隨機漫步與賭徒破產：時間軸上的隨機\n- **目標**：能講出隨機漫步的核心反直覺（對稱漫步必回原點卻期望時間無限）、賭徒破產為何讓「翻本策略」必敗，並把脊椎硬幣升級成時間過程。\n- **必涵蓋**：把脊椎硬幣每擲變 ±1，累積成一維**隨機漫步**；對稱漫步的常返性（recurrence，必回原點機率 1）但期望回返時間無限——「會回家但別等它」；維度的魔法一句話（一維二維常返、三維暫態，「醉漢回得了家、醉鳥回不了」，照 landscape）；**賭徒破產**（基準）——公正賭局破產機率 (N−i)/N、有莊家優勢時近乎必然破產；**鞅（martingale）一瞥**：公平賭局的期望不變，「加倍下注翻本法」為何在有限資金下必敗（照 landscape，不展開鞅理論）；隨機漫步 ≈ 布朗運動的離散前身（接 ch22）。\n- **不涵蓋**：鞅完整理論（一句＋延伸）；首達時間分布細節；連續版（ch22）。\n- **橋接**：retry/backoff 的隨機抖動是隨機漫步直覺；庫存／佇列長度的隨機波動；「攤平加碼」攝資策略＝賭徒翻本法的金融版（同樣的必敗結構）。\n- **Worked example**：賭徒破產（基準）——本金 $i、目標 $N、公正賭局，破產機率 (N−i)/N 手算幾個配置；加入 1% 莊家優勢看破產機率如何逼近 1；對稱漫步前幾步的位置分布（接 ch14 二項）。\n- **紙上推演**：用 (N−i)/N 算「$100 想翻到 $200、公正賭局」的破產機率並解讀；解釋「加倍翻本法」在無限資金下穩賺、有限資金下必爆的矛盾；口頭題：向想「攤平加碼」的朋友講賭徒破產。\n\n### ch21 — 馬可夫鏈：無記憶的旅程與穩態之美\n- **目標**：能講出馬可夫性質（未來只看現在、不看過去）、轉移矩陣與穩態分布的直覺，並體會「系統忘記起點」的收斂之美。\n- **必涵蓋**：馬可夫性質——下一步只依賴當前狀態；轉移矩陣；**穩態分布**（stationary distribution）的直覺——長期下各狀態的時間佔比，「忘記從哪開始」；收斂條件直覺（不可約＋非週期，照 landscape 點到、不證）；Markov 本人的故事（1906、用《尤金·奧涅金》母音子音序列示範，照 landscape）；**PageRank 作為網頁圖上的馬可夫鏈**一瞥（隨機衝浪者的穩態＝重要度，照 landscape）；穩態的「為何美」由本書自己講，**CTMC／生滅過程／排隊網路的運算指向《佇列論》ch06–07、ch16**。\n- **不涵蓋**：CTMC、生滅過程、排隊網路（見《佇列論》）；遍歷定理證明；隱馬可夫模型 HMM（一句＋延伸）；MCMC（一句：貝氏計算的引擎，回收 ch06）。\n- **橋接**：你的系統狀態機（健康／降級／當機）配上轉移機率就是馬可夫鏈；快取的 LRU 狀態、連線池狀態轉移；「系統最終分布與初始狀態無關」＝你重啟後它收斂到同一個穩態行為。\n- **Worked example**：天氣鏈（基準）——2 狀態（晴/雨）轉移矩陣，解 πP=π 手算穩態分布；驗證從不同初始分布迭代幾步都收斂到同一穩態（ASCII 迭代表）。\n- **紙上推演**：手算一個 3 狀態鏈的穩態（或驗證給定向量是穩態）；解釋「馬可夫性質」為何是強假設、舉一個它不成立的真實系統；把一個工程狀態機畫成馬可夫鏈並標轉移機率。\n\n### ch22 — 布朗運動：花粉的抖動與股價是同一個數學\n- **目標**：能講出布朗運動如何從隨機漫步取極限而來、它「處處連續處處不可微」為何把 Part III 的直覺推到極致，並認得它在自然與金融的同一身世。\n- **必涵蓋**：從對稱隨機漫步（ch20）縮小步長與時距取極限 → 布朗運動／維納過程；歷史三線（照 landscape）——Brown 1827 花粉觀察、Bachelier 1900 用它模型股價（早愛因斯坦五年）、Einstein 1905 物理解釋、Wiener 嚴格化；**處處連續、處處不可微**——把 ch20 的「鋸齒」推到連續極限，**直接連到《馴服無限》ch13 怪獸函數**（同一種病態、機率版）；獨立增量與常態增量（CLT 的指紋，回收 ch14）；自相似／碎形一句話；金融隨機性一句話（不展開、不教 Black–Scholes）；測度論機率的門口一句話（嚴格定義連續隨機需要測度——全書唯一一次點到 σ-algebra 的動機，指向延伸）。\n- **不涵蓋**：隨機微積分／伊藤引理／Black–Scholes（一句＋延伸）；測度論建構（一句）；嚴格的維納測度。\n- **橋接**：你看夠細的監控曲線（延遲、股價、網路抖動）怎麼放大都是毛的——布朗運動就是這種「處處毛刺」的數學原型（回收《馴服無限》怪獸函數的工程體感）；蒙地卡羅模擬路徑。\n- **Worked example**：從隨機漫步到布朗運動的尺度論證——步長 Δx、時距 Δt，要讓極限有意義必須 Δx ~ √Δt（√ 又出現了，回收 √n 與擴散）；用 ch20 的二項位置分布說明「t 時刻位置 ~N(0, t)」。\n- **紙上推演**：解釋「為什麼布朗運動處處連續卻處處不可微」用隨機漫步的鋸齒直覺；說明 Δx ~ √Δt 這個 √ 跟 ch09 的 √n 是同一回事；口頭題：向人講「花粉、股價、網路延遲為何是同一個數學」。\n\n### ch23 — 總收官：人類如何馴服隨機\n- **目標**：把全書收進一條能口頭講完的故事線；用六條驗收目標當口試題完成總自我檢核；知道讀完之後往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**馴服的本質**——人類沒有消除不確定，而是學會**精確地與它共處**：機率把「無知」變成可運算的數、大數法則與中央極限讓「不可測的個體」長出「可測的總體」、貝氏讓「信念」有了更新法則、統計讓「看不見的母體」可被有誠實誤差界地推斷——「不回答『會發生什麼』，只回答『長期會怎樣、我有多確定、會錯多少』」，這是工程師最能共鳴的勝利方式；**脊椎硬幣七層總對帳表**（古典 1/2 → E/Var → 二項 → LLN 比例收斂＋√n 差距 → CLT/de Moivre → 檢定公正性 → 隨機漫步）；六條驗收目標各出一題口頭題＋「模範答案要點清單」（檢核表式，不是逐字稿）；故障視角總帳——人類直覺在隨機面前崩壞的清單（賭徒謬誤、基率忽視、檢察官謬誤、信賴區間誤讀、辛普森、回歸均值）與「怎麼自我察覺」；下一步地圖（往嚴格走測度論機率／往應用走統計與 ML／往欣賞走機率史與悖論——對應附錄 C）；明寫本書刻意留的洞（測度論、完整迴歸、隨機微積分、資訊理論）與為何留。\n- **不涵蓋**：任何新概念、新證明；「補完所有遺漏」的誘惑。\n- **橋接**：回到 ch01 的你——當時對某個悖論（蒙提霍爾／生日／賭徒謬誤）的直覺 vs 現在會怎麼講，成長的具體對照。\n- **Worked example**：「馴服隨機」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞）；脊椎硬幣七層對帳表完整列出。\n- **紙上推演**：六條口試題正式作答（口頭、各 3–5 分鐘，對照要點清單自評）；給「機率統計就是一堆公式與查表」這句話寫一段反駁（200 字內）；一年後重讀清單：哪三章值得重讀、各自的觸發條件（遇到什麼工作場景）。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 記號與讀法速查表\n全書記號總表：寫法、怎麼唸出來（口頭講解用——本書驗收靠口述，每個記號都要能唸）、白話意義、首次出現章。從各章實際用過的記號 grep 彙整，不得收錄書中沒出現的記號。\n\n### 附錄 B — 術語表\nEN–ZH–一句話定義–首次出現章。涵蓋三種詮釋、條件機率、貝氏、隨機變數、期望／變異／共變異、各分布、LLN/CLT、母體／樣本、信賴區間、p 值、辛普森／回歸均值、馬可夫／布朗。從實際內容萃取。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源（書、課程、影片、經典論文），分三條路線（往嚴格／往應用／往欣賞），給出「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。標出書架鄰書（《馴服無限》《佇列論》《把系統寫成定理》）的銜接點。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-why-randomness.md、ch02-three-faces.md、ch03-combining-events.md、ch04-conditional-independence.md、ch05-bayes-theorem.md、ch06-bayesian-worldview.md、ch07-random-variables.md、ch08-expectation.md、ch09-variance.md、ch10-covariance-correlation.md、ch11-discrete-distributions.md、ch12-continuous-distributions.md、ch13-law-of-large-numbers.md、ch14-central-limit-theorem.md、ch15-normal-distribution.md、ch16-sampling.md、ch17-confidence-intervals.md、ch18-hypothesis-testing.md、ch19-statistics-breaks.md、ch20-random-walk.md、ch21-markov-chains.md、ch22-brownian-motion.md、ch23-taming-randomness.md；\n附錄 appendix-a-notation.md、appendix-b-glossary.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《馴服隨機：機率與統計的直覺與驚嘆》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的書。目標是讓讀者親身感受人類如何在最不可預測的東西（隨機）裡找到鐵一般的秩序——看懂機率統計不是一堆公式與查表，而是「精確地與不確定共處」的語言；讀完有「人類竟然想得出這個」的震撼，**而且能用自己的話對另一個工程師講清楚震撼在哪**。\n- **不是**：\n  - 不是考試解題訓練——不刷組合計算、不背分布公式表、不出計算操練題。\n  - 不是測度論機率教科書——σ-algebra、測度只在 ch22 收官時一句話帶過動機，不折磨讀者。\n  - 不是統計工具教學——不教 R/SciPy、不教「怎麼跑 t 檢定」。p 值、信賴區間當作**欣賞與誠實理解**的對象（它在說什麼、它在哪裡崩壞），不是 how-to。\n  - 不是轉職用書——純興趣，不服務 AI Infra 敘事；但工程橋接要讓它讀起來像母語，不是教科書的外語。\n- **驗收標準（全書的六條主線，ch23 總收官口試）**：\n  ① 機率到底在量化什麼（無知／長期頻率／信念——三種詮釋撐同一個數）；\n  ② 秩序如何從混沌浮現（大數法則的**精確**意義：不是「偏差被修正」而是「被稀釋」）；\n  ③ 中央極限為何讓鐘形無所不在（加總／平均的普適性）；\n  ④ 貝氏：證據如何更新信念（先驗→後驗的機制與世界觀）；\n  ⑤ 統計推論的大膽（從樣本推斷母體）與它的崩壞（p 值、複現危機）；\n  ⑥ 人類對隨機的直覺在哪裡、為什麼系統性崩壞（招牌故障視角）。\n\n## 全書脊椎：同一枚硬幣（對應微積分那本的「同一題三算」）\n\n一枚公正硬幣是全書的貫穿範例，每深入一個 Part 就重新認識它一次。各章在用到時**必須明寫「這是 ch01 那枚硬幣」**，並在 ch23 總對帳：\n\n- ch02 古典：P(正)=1/2，由對稱性；同一個 1/2 的頻率版與主觀版讀法。\n- ch08 期望：單擲 E[X]=1/2（伯努利）。\n- ch09 變異：Var=1/4、標準差=1/2。\n- ch11 二項：n 擲 ~ Binomial(n, 1/2)，E=n/2、Var=n/4、SD=√n/2。\n- ch13 大數法則：正面**比例**→1/2 的收斂表；但「正面減反面」的絕對差反而 ~√n 變大（同一組數據兩種讀法——本書最重要的反直覺對帳）。\n- ch14 中央極限：標準化後的硬幣和 → 常態。**歷史巧合**：de Moivre 1733 史上第一個 CLT 就是在算硬幣（照 landscape 查證）。\n- ch17–18 統計：這枚硬幣公正嗎？對 60/100 正面做信賴區間與假設檢定。\n- ch20 隨機漫步：把每擲 ±1，得到醉漢走路與賭徒破產。\n- ch23 收官：「同一枚硬幣，現在你懂它七層」總對帳表。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js）。可直接當橋接錨點的經歷與直覺：\n\n- profiling 與效能工程（RDS CPU 尖峰降 40% 的量測→診斷→優化敘事）；CloudWatch／Prometheus 式指標思維（counter、rate、P50/P95/P99 百分位數）。\n- 高併發系統（500K+ 使用者、10K+ CCU）、佇列、重試與 exponential backoff＋jitter、rate limiting、隨機負載分配。\n- 數值直覺：負載測試找容量上限、浮點比較 `abs(a-b) < eps`、抽樣監控、A/B test 的概念層。\n- 分散式直覺：冪等、最終一致性、相關性故障（「獨立」備援共享故障源）、尾端延遲。\n- ML 概念層：知道梯度下降是「往坡下走」、知道有「機率分布」這回事，沒推過數學。\n\n**不需要解釋**（讀者已精通）：函數、代數操作、集合的基本概念、百分位數的工程意義、Σ 記號、基礎排列組合的存在（C(n,k) 是什麼可快速複習、不從零教）、log/exp。\n\n**快速複習即可**（大學看過但生鏽）：排列組合公式、Σ／∫ 記號、基礎數列與極限（深入處指向書架上《馴服無限》）。用「你大學看過，現在把它擦亮」的節奏帶，不當文組讀者教。\n\n**要從零教**（本書主體）：機率三種詮釋、條件機率與獨立的真正意義、貝氏世界觀、隨機變數／期望／變異的「在做什麼」、分布為何長那樣、大數法則與中央極限的精確意義、統計推論「從樣本推斷母體」的邏輯與其崩壞、隨機過程的世界觀。\n\n## 跨書邊界（重要——書架上已有相鄰的書）\n\n讀者書架上有兩本相鄰的書，本書定位是**用自己的欣賞聲音講，運算／應用深度指向它們**（2026-06-13 訪談定案）：\n\n- **《佇列論》**（books/queueing）已把 Poisson 過程、指數分布、Markov chain 當「工具」寫過。本書遇到這些主題時：**「為何美」由本書自己講**（如指數分布的無記憶性之美、Poisson 作為稀有事件極限的普適形狀、Markov 鏈「忘記起點」的穩態之美），**運算／排隊／網路應用深度**用「（見《佇列論》chNN）」帶過，不重寫公式推導。涉及章節：ch10（Poisson）、ch12（指數）、ch21（Markov）。\n- **《馴服無限》微積分**（books/calculus）已寫過「機率即面積／常態曲線下面積」（其 ch15）與「怪獸函數／處處連續處處不可微」（其 ch13）。本書 ch14（常態即面積）、ch22（布朗運動）以「（見《馴服無限》chNN）」連結，不重講微積分本身；積分當工具用、需要時點到。\n- **《把系統寫成定理》TLA+**（books/tlaplus）寫過量詞 ∀∃ 攻防。ch17 信賴區間／ch18 p 值的「頻率派保證」其 ∀∃ 結構**可以一句話呼應**（「讀過書架上 TLA+ 書的話，這個量詞順序你見過」），但**不得依賴**。\n\n跨書引用格式：`（見《佇列論》ch06）`、`（見《馴服無限》ch15）`。不要寫死檔名路徑。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。數學名詞中英並用：第一次出現給「中文（English）」，之後可只用中文——機率（probability）、樣本空間（sample space）、事件（event）、條件機率（conditional probability）、獨立（independence）、隨機變數（random variable）、期望值（expectation／expected value）、變異數（variance）、標準差（standard deviation）、共變異數（covariance）、相關（correlation）、分布（distribution）、大數法則（law of large numbers, LLN）、中央極限定理（central limit theorem, CLT）、先驗（prior）／後驗（posterior）／概似（likelihood）、母體（population）／樣本（sample）、估計（estimation）、信賴區間（confidence interval）、假設檢定（hypothesis testing）、虛無假設（null hypothesis）、顯著（significant）。\n- 台灣統計用語基準（**全書一致、禁簡體與中國大陸用語**）：機率（不是「概率」）、變異數（不是「方差」）、標準差、期望值、母體（不是「總體」）、樣本、隨機變數（不是「隨機變量」）、常態分布（不是「正態分布」）、卜瓦松／帕松（Poisson，全書擇一：用「卜瓦松」）、信賴區間（不是「置信區間」）、顯著性（不是「顯著性」同形但避免「置信」）、相關係數、迴歸（regression，統計脈絡用「迴歸」）。禁止簡體詞彙（概率、方差、正态、总体、置信、随机变量、均值改用「平均」或「期望值」依脈絡…）。\n- 人名用通行中譯＋原文，第一次出現附原文、之後用中譯或原文擇一一致：帕斯卡（Pascal）、費馬（Fermat）、惠更斯（Huygens）、雅各布·伯努利（Jacob Bernoulli）、丹尼爾·伯努利（Daniel Bernoulli）、棣美弗（de Moivre）、貝氏／貝葉斯（Bayes，全書用「貝氏」）、拉普拉斯（Laplace）、高斯（Gauss）、高爾頓（Galton）、皮爾森（Pearson）、費雪（Fisher）、奈曼（Neyman）、柯莫哥洛夫（Kolmogorov）、馬可夫（Markov）、卜瓦松（Poisson）、車比雪夫（Chebyshev）、布朗（Brown）、愛因斯坦（Einstein）、維納（Wiener）、康納曼（Kahneman）、特沃斯基（Tversky）。\n- 第二人稱「你」直接對讀者說話。\n\n## 數學記號規範（全書一致，附錄 A 是速查表；閱讀器不渲染 LaTeX，一律純文字 Unicode）\n\n- **內文行內**用 Unicode：P(A)、P(A|B)、P(A∩B)、P(A∪B)、E[X]、Var(X)、σ、σ²、μ、ρ（相關係數）、Σ、∫、√、≈、≠、≤、≥、→、∞、~（服從，如 X ~ N(μ,σ²)）、∅、Aᶜ（餘事件）、x̄（樣本平均，用組合字元或寫「x̄」）、p̂（估計量，寫「p̂」或「p-hat」擇一一致——全書用「p̂」）。\n- 條件機率寫 `P(A|B)`；貝氏定理寫 `P(H|D) = P(D|H)·P(H) / P(D)`。\n- 期望寫 `E[X]`、變異寫 `Var(X)`、標準差 `SD(X)` 或 σ。常態寫 `N(μ, σ²)`。\n- 求和寫 `Σ(i=1→n) xᵢ`；組合數寫 `C(n,k)`（不用 LaTeX \\binom，必要時加註「n 取 k」）。\n- 極限沿用微積分那本：`lim(n→∞)`。需要積分時 `∫[a,b] f(x) dx`、`∫₀^∞`（指數分布尾巴）。\n- **多行推導／貝氏表格／收斂表**放在 ```text 圍欄區塊裡，等號或欄位對齊、每步右側可加「← 為什麼」短註。禁止把長推導硬塞進行內。\n- 數字基準：π ≈ 3.14159、e ≈ 2.71828；標準常態 68–95–99.7 的精確值 68.27%／95.45%／99.73%（照 landscape）；1.96 是 95% 雙尾臨界值。全書數字統一、不得互相矛盾（基準表見 outline）。\n- 分布圖、收斂圖、樹狀圖用 ASCII 圖（必須通過 check_diagrams.py 的 CJK=2 欄寬檢查）。直方圖用 `█ ▓ ░` 或 `*` 描高度、座標軸用 `─ │ └`；不追求精確比例，追求形狀直覺（看見二項變鐘形、看見比例收斂）。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章（ch01、ch05、ch07、ch13、ch16、ch20）在 blockquote 後放全書 ASCII 路線圖（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的工程實戰上，要具體（retry jitter、相關性故障、P99 尾端、A/B test、抽樣監控、隨機負載分配），不要泛泛而談。\n3. 核心內容（多個 `##` section，深入直覺與機制）。歷史敘事與數學內容交織，但**歷史服務於數學直覺**，不是編年史。\n4. `## 直覺的陷阱` — 本書招牌段落（故障視角的機率版，全書最重要的賣點之一，因為機率正是人類直覺最常崩壞的領域）：這個概念**最常被誤解成什麼**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實沒懂）。用表格或條列。每章至少一個具名謬誤／悖論（賭徒謬誤、基率忽視、檢察官謬誤、辛普森悖論、信賴區間誤讀…）。\n5. `## 紙上推演` — 動手做的形式（**全書純紙筆推演，不放任何程式碼**，2026-06-13 訪談定案）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：手算機率／期望／貝氏更新表、手推論證、找出錯誤論證的破綻、把白話翻成機率語言、用自然頻率法重算一個貝氏題、口頭重講一個悖論的解。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。**Monte Carlo 的直覺可以用文字描述「想像擲一萬次」**，但不寫可執行程式碼；數值表一律手算示範。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。問題對齊「能不能把這個概念講給另一個工程師聽」的深度，優先出「為什麼」而不是「是什麼」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體數字、一步一步算的完整過程（機率樹、貝氏更新表、收斂表、分布直方圖、信賴區間計算），不准跳步。outline 已為每章指定基準範例。\n- **機率的「精確意義」優先於公式**：每個概念先回答「它在量化什麼問題」（機率在量化無知還是頻率？期望值是長期平均不是最可能值？信賴區間到底在保證什麼？），再給算法。禁止無動機的定義。\n- **誠實標示嚴謹度**：每個論證明確標示自己是哪一級——「直覺版（嚴格證明本書不展開，指向延伸閱讀）」或「工程師的嚴謹：每步能口頭說出理由」。禁止「顯然」「易證」；禁止把直覺論證偽裝成證明。對 LLN／CLT 給直覺與條件、不給測度論證明。\n- **數值自我複核**：所有數值（機率、期望、貝氏後驗、收斂表、信賴區間、p 值）寫章時必須自己重算一遍（心算／筆算／必要時口頭逐步驗證），不得抄自記憶。跨章基準數值以 outline 基準表與 landscape 的「數值基準複核」節為準。機率題尤其容易算錯——每個 worked example 至少用兩種方法或自然頻率法交叉驗算一次。\n- **歷史事實照 landscape**：年份、歸屬、引文、軼事、悖論的精確陳述一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 3~8 次 web 查證）並 hedge；傳說要標明是傳說。**特別注意 landscape 標 ⚠️ 的「常被誤傳」項目**（如熱手謬誤 2018 反轉、信賴區間誤讀、p<0.05 不是費雪的硬規則、蒙提霍爾依賴主持人行為假設）——這些正是「直覺的陷阱」段的好素材，務必用正確版。禁止憑記憶引用「名人名言」。\n- **每個「驚嘆點」要能被重講**：本書的核心商品是震撼感。每章至少一處明確回答「這裡了不起在哪」——而且要寫到讀者能用自己的話轉述，不是堆形容詞。（範例：個體完全不可測但總體精確可測；鐘形的普適性不講原分布長相；信念可以有數學；你只問 1000 人就能知道兩億人。）\n- **故障視角是賣點**：機率是人類直覺最常崩壞的領域，「直覺的陷阱」段要寫到位、要用 landscape 查證過的正確版。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、人物、論文、複現危機數據、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 數學內容（定義、定理、計算）不依賴 landscape，但必須自我複核；常被誤傳的機率事實（熱手謬誤的 2018 反轉、信賴區間的正確意義、p 值的正確定義、−聖彼得堡是效用問題不是數學錯誤、LLN 是稀釋不是修正）以 landscape 查證版為準。\n- 時效性事實標時點：`（2026-06）`。延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（分布直方圖、收斂圖、機率樹、貝氏 2×2 表、全書地圖），必須通過 `check_diagrams.py` 檢查（CJK=2 欄寬）。\n- 多行數學推導、貝氏表、收斂表用 ```text 區塊。表格用於陷阱清單、對照表、自然頻率表。\n- 跨章引用格式：`（見 ch07）`；跨書 `（見《佇列論》ch06）`。不要寫死檔名路徑。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整本書最反直覺的一頁」）。不行銷、不喊口號、不堆「太神奇了」式空洞感嘆——震撼要用內容本身造成，形容詞是結果不是手段。允許冷幽默（機率史充滿賭徒、釀酒廠統計員與被反例打臉的數學家）。數學不裝高深：每個符號出場都有白話直覺在旁邊；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘，因為你的直覺正要騙你」。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="prob";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">馴服隨機<br><span style="font-weight:400;font-size:12px;color:var(--muted)">機率與統計的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 馴服隨機';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
