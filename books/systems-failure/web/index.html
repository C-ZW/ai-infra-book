工 override 優先」的規則時，為什麼一定要配自動到期 TTL？不配會變成哪一章的災難？\n\n## 延伸閱讀\n\n- **BFU, *Investigation Report AX001-1-2/02*（2004-05）** — 本案一手調查報告。讀它如何**拒絕**把主因歸到機組，而是並列「Skyguide 系統性缺失」與「TCAS-vs-ATC 優先權模糊」兩條主因，並提出 19 項建議。SKYbrary 條目：https://skybrary.aero/bookshelf/bfu-investigation-report-ax001-1-202-uberlingen-mid-air ；報告全文 PDF（Glasgow 鏡像）：https://www.dcs.gla.ac.uk/~johnson/Eurocontrol/Ueberlingen/Ueberlingen_Final_Report.PDF\n- **SKYbrary：T154 / B752, en-route, Überlingen Germany, 2002** — 航空安全社群對本案的精煉解剖，含 TCAS RA 協調與遵循的標準說明，適合快速建立「為什麼 RA 必須被一致遵循」的直覺。https://skybrary.aero/accidents-and-incidents/t154-b752-en-route-uberlingen-germany-2002\n- **ICAO 對 TCAS/ACAS 程序的修訂（2003-11 起，RA 優先於 ATC）** — 看一條「明確優先權規則」如何從一場災難中被淬煉出來、並成為全球標準；這是本章設計教訓的真實落地。可由 ICAO Annex 與 PANS-OPS 中關於 ACAS RA 的條文查證。\n- **事件概觀（背景參考）**：https://en.wikipedia.org/wiki/2002_%C3%9Cberlingen_mid-air_collision — 適合補時間軸與各方後續（含 Skyguide 的法律責任、人性餘波）；硬事實仍以 BFU 報告為準。\n"}, {"id": "ch07-gimli-glider", "file": "ch07-gimli-glider.md", "group": "Part III — 一個數字，一場崩塌", "title": "ch07 — 金姆利滑翔機：把公斤當成磅，在四萬一千呎沒了油", "md": "# ch07 — 金姆利滑翔機：把公斤當成磅，在四萬一千呎沒了油\n\n> **本章解剖什麼**：一個單位換算錯誤（用了磅的密度因子 1.77，而不是公斤的 0.803），疊加一個正好失效的油量錶，讓一架噴射客機在巡航中燒光燃料。這是 Part III「一個數字一場崩塌」的開場——前一個 Part 講「安全系統反成兇手」，這個 Part 講更冷的東西：**一個寫錯單位的數字、一個飽和的感測器、一段低估的模型，就足夠崩塌**。主打 F9（介面與假設的縫）、F8（潛伏條件 vs 觸發）、F3（起司孔洞對齊）。但這一章還有第二張臉：它**沒有變成墳場**——設計餘裕（飛機能滑翔、RAT 自動展開）加上人的技藝（機長是滑翔機飛行員），讓它「安全地壞」。這條正面線預告 ch22 韌性工程；ch08 Schiaparelli 則是同一個「壞數字」沒有餘裕兜底的反例。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機 ◄你在這裡\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n你寫過這種 bug，我幾乎可以確定。某個值在系統裡流動——一筆金額、一個時間長度、一個資料量——它本身只是個 `number`，沒人記得它的單位。某個服務以為它是毫秒，另一個服務以為它是秒；某個 API 回的是 KiB，下游當成 bytes 在算。兩邊的程式碼**各自都對**：寫毫秒的那段邏輯沒錯，寫秒的那段也沒錯。錯的是它們之間那條沒人守的縫——**對「單位」的假設不一致**。\n\n這就是為什麼你會用帶單位的型別（branded type、`Duration`、`Bytes`）把裸 `number` 包起來，讓 `addSeconds(ms)` 在編譯期就紅起來。這也是為什麼你在 CI 上掛了那條規則：未文件化的 API 變更會讓 build 失敗——因為你知道，**契約的縫是無聲的**，它不會在執行時拋例外，它會安安靜靜算出一個「看起來很合理」的錯誤答案，然後一路流到生產環境。\n\n現在再加一層。你之所以敢讓一個 magic number 在系統裡跑，往往是因為**有一道自動校驗在背後兜底**：dashboard 上有個 gauge 即時顯示真實值，跟你算出來的對不上就會跳警報。那道 gauge 是你的安全網。\n\n那麼,焦慮工程師的問題來了：**當那道自動校驗剛好壞了、你被迫退回手算的那一天，會發生什麼事？**\n\n1983 年 7 月 23 日，一架嶄新的波音 767 給了你答案。它的油量錶（一個自動 gauge）那天故障了，地勤退回到「人工量油＋手算換算」。而那個手算，用錯了密度的單位——把該用的公斤密度，算成了磅。於是這架飛機在四萬一千呎的高空，引擎一具接一具熄火。**沒有人死**——這一章後半會告訴你為什麼。但前半，我們先看那條縫怎麼裂開的。\n\n## 冷開場：四萬一千呎，引擎一具一具安靜下來\n\n加拿大時間晚上八點剛過，安大略上空。Air Canada 143 航班，一架編號 C-GAUN 的波音 767-200，巡航在 FL410——四萬一千呎，比一般客機的巡航高度還高。機長 Bob Pearson 與副駕 Maurice Quintal 在駕駛艙裡，後面坐著 61 位乘客。航線是蒙特婁飛艾德蒙頓。\n\n駕駛艙先響起的，是一個沒人想在巡航時聽到的警告音——左側引擎的燃油壓力低。Pearson 和 Quintal 的第一反應很合理：大概是燃油泵的問題。他們開始翻檢查表。\n\n然後右側引擎也報了同樣的警告。\n\n接著——更糟——左引擎的聲音變了，然後**沉默**。它熄火了。幾分鐘後，右引擎也停了。\n\n這時駕駛艙裡發生了一件對飛行員來說極度不對勁的事：**安靜**。767 是雙引擎飛機，兩具都停了，意味著全部主動力消失。但同時，儀表板大半暗下去了——因為飛機的主電力來自引擎驅動的發電機。Pearson 面前剩下的，是幾個靠備援供電的基本儀表。\n\n更要命的是 767 這代飛機高度依賴**液壓**來操縱舵面。沒有引擎，液壓泵也停了。理論上，這架飛機應該已經變成一塊不聽話的鐵。\n\n但它沒有完全失控。機腹下方,一個叫做 **RAT（Ram Air Turbine，衝壓空氣渦輪）** 的小風車，在主動力喪失的瞬間**自動**彈了出來，靠飛機前進時的氣流轉動，提供了**有限的**液壓與基本飛控（[Wikipedia: Gimli Glider](https://en.wikipedia.org/wiki/Gimli_Glider)）。這是設計者埋的一道安全網——後面我們會回來談它，因為它正是這場災難「沒變成墳場」的硬體原因之一。\n\n此刻 Pearson 手上是一架五十多噸、沒有動力、只剩最低限度操縱能力、正在從四萬一千呎往下掉的噴射客機。他要解的第一個問題不是「怎麼救」，而是更冷的那個：**為什麼會沒油？**\n\n## 裝填：兩道孔洞，在加油那一刻就對齊了\n\n要懂這場災難，得先懂它**早在飛機離地前就裝填好了**。觸發（雙引擎熄火）只是最後一根稻草；真正的炸藥，是地面上兩件各自無害的小事恰好疊在一起。\n\n### 孔洞一：油量錶（FQIS）那天是壞的\n\n767 的油量不是靠人盯著看的。它有一套叫 **FQIS（Fuel Quantity Indicator System，燃油量指示系統）** 的電腦，讀油箱裡感測器的訊號，換算成重量，顯示在駕駛艙的油量錶上。這是**自動的 gauge**——你的 dashboard 上那個即時顯示真實值的數字。\n\nFQIS 設計成**雙通道**冗餘。但這裡有個關鍵的、反直覺的設計性質：**只要一個通道壞了，整套 FQIS 就罷工，油量錶直接變空白**（多源一致，見 [Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。冗餘本來是要讓你「壞一個還能撐」，這裡卻是「壞一個就全倒」——這不是備援，這是把兩個通道串在一起的**偽冗餘**。\n\n事情是這樣演的。在更早的一站（艾德蒙頓），一位技師發現油量錶空白，動手排查，發現**把第二通道停掉、只跑第一通道**，油量錶反而能正常顯示。他於是把那個通道的 circuit breaker（斷路器）拉開、貼上標籤標記「不可用」，油量錶恢復了。維修紀錄上寫著一行：`SERVICE CHK – FOUND FUEL QTY IND BLANK – FUEL QTY #2 C/B PULLED & TAGGED`（[failurology / Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。飛機可以**依 MEL（Minimum Equipment List，最低裝備需求清單）放行**——規則允許在一個通道不可用、且改以人工量油的條件下繼續飛。\n\n問題出在蒙特婁。另一位維修人員想進一步查這個故障，**把第二通道重新接回去**試試。結果他還沒來得及再把它停掉，就被叫去做別的事（去量油）——留下一個致命的狀態：那個 circuit breaker **標籤還貼著（看起來像「已拉開」）、實際上卻已經被接回**。於是 FQIS 又恢復成「雙通道都在跑」的故障態——**整套油量錶再次變成空白**（[Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。\n\n停在這裡，用焦慮工程師的眼睛看一眼：這就是**組態漂移（configuration drift）**。一個 feature flag，被一個人關掉、貼上「已關閉」的標籤，又被另一個人偷偷打開，但標籤沒改。下一個來看的人，**相信標籤，而不是相信實際狀態**。你在 ch16 三哩島會看到這個形狀的極端版——一盞燈顯示「我送出了關閉指令」，而不是「閥門真的關了」。這裡是它的前傳。\n\n無論如何，結果是：這架飛機在油量錶全空白的狀態下，準備載客起飛。油量的唯一來源，只剩下**人工**。\n\n### 孔洞二：人工量油，用錯了密度的單位\n\n沒有油量錶，地勤改用一種古老可靠的方法：**浮油尺（dripstick / drip）**。從機翼下方的量油管讀出油箱裡的**油位**，查表換算成**體積（公升）**。這一步沒問題——他們量出油箱裡已經有約 7,682 公升的燃油。\n\n接下來才是縫裂開的地方。飛行計畫要求的不是「公升」，是**重量（公斤）**——飛機關心的是載重和能量，不是體積。所以要把「公升」乘上一個**密度因子**換成「公斤」。\n\n正確的因子是約 **0.803 kg/L**（每公升噴射燃油約 0.803 公斤）。\n\n他們用的是 **1.77**。\n\n1.77 是什麼？是同一種燃油的密度，但單位是 **lb/L（磅／公升）**。這個數字本身**完全正確**——只是它的單位是磅，不是公斤。而這正是 F9 的教科書定義：**一個各自都對的數字，跨過一條沒人守的單位縫，就變成災難**。\n\n為什麼會錯用磅？因為這架 767 是 Air Canada **第一架全面採用公制單位的飛機**。在它之前，整個機隊、所有人的肌肉記憶、所有的換算表，都是英制——磅。1.77 lb/L 是他們用了一輩子的數字。突然來一架要用 kg/L 的飛機，那條換算習慣沒跟著換過來。\n\n我們把那一刀算清楚（數字依 [Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider) 與 landscape，⚠️ 不同來源體積數字略有出入，此處取其一說明機制）：\n\n- 他們大致是把當下油箱體積乘上 1.77，得到「以為是公斤、其實是磅」的重量讀數。把缺多少油也用同一個錯因子算。\n- 算下來，他們以為飛機上有**約 22,300 公斤**燃油——剛好是飛這趟航程所需要的量。\n- 實際上，那 22,300 是**磅**。22,300 磅 ≈ **10,100 公斤**。\n- 也就是：他們以為加滿了，**實際只裝了需求的約 45%**——不到一半（landscape；[CBC](https://www.cbc.ca/news/canada/manitoba/gimli-glider-35-years-1.4756985)）。\n\n這裡有一個最容易被忽略、也最該讓你脊背發涼的細節——**交叉確認失效了**。Pearson 和 Quintal 不是沒覆核。他們確實算了、也對了帳。問題是：**他們兩個人用的是同一個錯誤的因子**。\n\n> 「兩個人都算過」**不等於**「校驗是獨立的」。當兩道校驗共用同一個錯誤前提，它們不會互相抵銷，只會**互相確認**——給你一種「我們很謹慎」的虛假安全感。\n\n這是你做 code review 時最該怕的東西。兩個人 review 同一段用了錯誤常數的程式碼，都點了 approve——不是因為他們不細心，是因為他們**共用了同一份錯誤的心智模型**。獨立性，不是「人數」給的，是「來源不同」給的。\n\n到這裡，瑞士起司的孔洞全部就位：FQIS 失效（潛伏）→ 退回人工（放大了出錯機會）→ 用錯密度單位（縫）→ 交叉確認共用同一錯誤（最後一道防線也破）。只差飛機飛到一半，把那不存在的另一半油「燒到見底」。\n\n## 觸發與連鎖：當「以為夠」遇上「其實只有一半」\n\n飛機起飛，一切正常。油量錶是空白的，但飛行計畫上的數字「對得起來」，沒人覺得有問題——這正是 F9 最陰險的地方：**它在執行時不報錯**。引擎照常燒油，飛機照常爬升、巡航。系統運行在一個「看起來健康」的狀態，而真實的油量正以兩倍於預期的速度逼近零。\n\n巡航途中，駕駛艙裡的燃油壓力警告響起。然後是第二個。然後左引擎熄火，右引擎熄火。從「一切正常」到「雙發停車」，中間沒有緩衝、沒有時間餘裕——這就是 **F1 緊耦合**的味道：那個算錯的數字，沒有任何一層緩衝把它擋下來，一路直通到「油箱見底」這個物理終點。\n\n而此刻，這場災難開始展露它的**第二張臉**。\n\n## 餘波：它本來可以是墳場，但它不是\n\n接下來發生的事，是這一整本書裡少數讓人想站起來鼓掌的段落。但請注意——**它能成功，靠的不是奇蹟，是設計餘裕＋人的技藝**。這正是 ch22 韌性工程的主題：韌性不是「不會壞」，是「**安全地壞**」。\n\n**第一層餘裕：飛機本身能滑翔。** 一架沒有動力的 767 不是石頭，它是一架（很爛的）滑翔機。767 在最佳狀態下的滑翔比（glide ratio）約 20:1——每下降 1 單位高度，能往前飛 20 單位。沒了動力、構型不理想，Pearson 實際飛出來的滑翔比大約 **12:1**（[Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。但「12:1」也意味著：從四萬一千呎，他**有距離可以飛、有時間可以想**。設計者沒有承諾「引擎永遠不會停」，他們承諾的是「就算停了，飛機還能滑」——這是**留了餘裕**。\n\n**第二層餘裕：RAT 自動展開。** 前面說過的那個小風車，在主動力喪失的剎那自動跳出來，靠氣流發電、撐住最低限度的液壓與飛控。它給的能力很有限——但「有限」遠遠好過「零」。這是**優雅降級的硬體版**：主系統垮了，自動退到一個**功能更少、但還能操縱**的退化模式，而不是直接變磚。你的多層 cache library 在做的，正是同一件事——in-memory 掛了退到 S3，S3 掛了退到 local，每一層都比「整個服務 500」好。RAT 就是飛機的「退到下一層 cache」。\n\n**第三層、也是決定性的一層：人。** 副駕 Quintal 算出他們飛不到原定的溫尼伯機場。他想起一個地方——**金姆利（Gimli）**，曼尼托巴省一座**已除役**的前加拿大皇家空軍基地。他知道這個地方，因為他**當年曾在那裡服役受訓**（[Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。這不是運氣，這是**正確的人剛好帶著正確的領域知識在現場**。\n\n而機長 Pearson 帶著另一項罕見資產：他是個**經驗豐富的滑翔機飛行員**。滑翔機沒有引擎，靠的全是能量管理——這正是此刻最需要的技能。當飛機高度太高、會衝過跑道時，Pearson 用了一個**民航客機幾乎不會用、但滑翔機飛行員的本能**動作：**forward slip（前向側滑）**——把方向舵踩向一邊、副翼壓向另一邊，讓飛機「斜著」飛，用機身去擋風、大幅增加阻力，**陡降而不增速**（[Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。一般客機飛行員的訓練裡幾乎沒有這個動作；但對滑翔機飛行員來說，這是吃飯的傢伙。\n\n他們以約 220 節速度下滑，無動力滑翔了**約 17 分鐘**。滑翔的距離各來源說法不一（約 100 至 180 多公里都有），**保守地說，超過 150 公里**（landscape ⚠️：滑降距離各源約 100–183 km）。\n\n最後的麻煩：金姆利那條除役跑道當天**正在辦賽車活動**——跑道周邊滿是賽車、露營車和人。而飛機沒有液壓推下並鎖定前起落架，前輪沒鎖好。Pearson 把飛機放下，後輪先觸地，前輪一接地就**塌陷、縮回輪艙**，機鼻砸向地面、刮著跑道滑行——這個「故障」反而幫了忙：機鼻刮地產生的摩擦力，幫飛機更快停了下來，在衝進人群前停住（[Wikipedia](https://en.wikipedia.org/wiki/Gimli_Glider)）。\n\n**機上 61 名乘客、8 名機組，無人死亡。** 幾位乘客在從後門逃生滑梯撤離時受了輕傷（因為機鼻著地、機尾翹高，滑梯不夠長）。地面上沒有人受傷。\n\n加拿大政府委任 Justice George Lockhart 主持調查委員會（Board of Inquiry, 1985）。它的結論值得你抄下來貼在牆上：責任**不在單一機組或地勤的過失**，而在 Air Canada 的**「企業與設備層面的缺失」（corporate and equipment deficiencies）**——並建議全面從英制轉向 SI 公制。換句話說：官方調查**拒絕**「都是加油員算錯」這個簡單答案，它問的是更難的那個問題——**是什麼系統條件，讓這幾個人在那一刻幾乎不可能算對？**\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**潛伏條件（早就裝填好的炸藥）**：\n\n- FQIS 雙通道的「壞一個就全倒」設計，加上蒙特婁那次「標籤說已拉開、實際已接回」的組態漂移——油量錶在起飛前就是空白的（F8）。\n- 機隊剛從英制改公制，1.77 lb/L 是所有人用了一輩子的肌肉記憶，0.803 kg/L 是個沒人習慣的新數字——**換算的縫，在制度層面早就存在**（F9 的土壤）。\n- 加油重量計算**沒有帶單位的系統性防呆**，整個流程依賴人腦記得「這架要用公斤」。\n\n**觸發（最後一根稻草）**：那趟加油，用 1.77 取代了 0.803。一個各自都對、合起來致命的數字，被乘了進去。\n\n### 起司的孔洞\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| FQIS 油量錶（自動 gauge） | 即時顯示真實油量、與計算對帳 | 雙通道「壞一個全倒」＋組態漂移（標籤騙人）→ 全空白，自動校驗整個消失 |\n| MEL 放行規則 | 油量錶不可用時，靠人工量油補上 | 規則本身沒錯，但它把「最後一道防線」押在「人工手算」這條更脆弱的線上（F8 帶病放行） |\n| 密度換算 | 把公升正確換成公斤 | 用了 lb/L（1.77）而非 kg/L（0.803）——單位的縫（F9）|\n| 機組與地勤的交叉確認 | 一個人算錯，另一個人抓出來 | 兩邊**共用同一個錯誤因子**，校驗不獨立——「都算過」≠「獨立驗證」（F3 最後一個孔洞）|\n\n任何**一層**沒破，這趟都不會沒油：油量錶正常 → 一眼看穿；用對 0.803 → 油就夠；交叉確認真的獨立（換個人、換個方法重算）→ 抓得到。**這就是為什麼「找出那個算錯的人」是錯的問法**——你要找的是「為什麼這四層全破了」。\n\n### 對應模式\n\n- **F9（介面與假設的縫）**——主角。1.77 vs 0.803，兩個各自正確的數字，對「單位」的假設不一致。與 ch08（飽和值被當真高度）、ch03（凱悅走道的吊桿改動）同屬「假設的縫」家族；下一章 ch08 是同一個 F9，但**沒有餘裕兜底**，於是直接墜毀。\n- **F8（潛伏條件 vs 觸發）**——FQIS 故障與「帶病放行」是早就裝填好的潛伏條件，加油那一刀只是觸發。\n- **F3（起司孔洞對齊）**——四層防禦各有破洞，平時錯開，那天恰好連成一線；尤其「交叉確認共用同一錯誤」這個孔洞，最值得記。\n- **F1（緊耦合）**——算錯的數字沒有任何緩衝，直通「油箱見底」。\n- **正面：graceful degradation（預告 ch22）**——RAT 自動展開、飛機能滑翔、人有滑翔技藝，是這場災難「安全地壞」的三道餘裕。\n\n### 一句話形狀\n\n**這場災難的形狀是：一個寫錯單位的 magic number，在唯一能抓它的自動校驗（油量錶）剛好失效、且人工複核又共用同一錯誤的那一天，沒被任何一層擋下來；而它沒有變成墳場，純粹是因為系統留了滑翔的餘裕、且現場剛好有一個會用這份餘裕的人。**\n\n## 換成你的系統\n\n你已經在防 F9 了。你用 branded type 把 `Seconds` 和 `Milliseconds` 分開，你在 CI 上掛 OpenAPI 同步檢查，你寫 contract test 確保上下游對欄位的假設一致。這些都是在補「單位／契約的縫」。很好。\n\n但金姆利真正要扎你的，是更深一層的兩個假設：\n\n**假設一：「反正有 dashboard 那個 gauge 會抓到對不上的值。」** 你之所以敢讓一個算出來的數字流到下游，常常是因為背後有道自動校驗在兜底——metric、alarm、reconciliation job。問題是：**那道校驗自己掛了的那天呢？** 金姆利的油量錶就是那道 gauge，它那天是空白的。你的對帳 job 如果默默失敗了（沒跑、跑了但 swallow 了 exception、alarm 因為某次「太吵」被人調成 warning），你會不會也在毫不知情的狀況下，退回到「相信計算結果」這條更脆弱的線？**問自己：我的自動校驗，失敗時是吵的（fail loud）還是安靜的（fail silent）？它自己掛了，誰會知道？**\n\n**假設二：「我們有兩個人 review 過／兩套系統對帳過，所以是獨立的。」** 不一定。如果兩個 reviewer 看的是同一段用了錯誤常數的程式碼、共用同一份文件裡的同一個錯誤定義；如果你的「雙寫對帳」兩邊都從同一個算錯單位的上游取數——那你有的是**兩份相同的錯誤**，不是兩道獨立的防線。FQIS 的「雙通道」也是這個教訓的硬體版：兩個通道串在一起，壞一個就全倒，那不叫冗餘。**問自己：我以為的兩道防線，是不是同一份 bug 的兩個副本？**（這個「冗餘其實是同一份 bug」的陷阱，ch22 會正面講。）\n\n而金姆利還給你一個**正面**的自問，這在這本書裡很罕見——大部分章節只教你怕。但這一章告訴你：**怕之外，要蓋餘裕。**\n\n> 你的系統，**輸光的時候**，是直接 500、整個倒下；還是像那架 767 一樣，退到一個「功能變少、但還能操縱」的退化模式，撐到你（或 oncall）把它降落？\n\n你的多層 cache library 已經是這個答案的一半——它會「退到下一層」而不是「整個爆掉」。金姆利告訴你另一半：光有降級路徑還不夠，**還得有人練過怎麼在降級模式下開飛機**。Pearson 的滑翔技藝、Quintal 對那座除役機場的記憶，不是出事那天臨時長出來的。**你的團隊，在自動化全部放棄、被迫手動接管的那一刻，有沒有那份「肌肉記憶」？** 你多久沒演練過「假設 dashboard 全黑、自動 failover 失效，純手動把服務救回來」這件事了？（這個「自動化把練習機會拿走、出事時人接不住」的反面，正是 ch05 法航 447 的主題——那一場，沒有 Pearson。）\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★★\n\n把「磅當公斤」這個 F9，對應到你自己遇過或怕過的**單位／型別假設事故**。挑一個：毫秒 vs 秒、bytes vs KiB、UTC vs 本地時間、含稅 vs 未稅金額。具體寫出：(a) 哪兩段「各自都對」的程式碼／服務，對這個單位的假設不一致；(b) 為什麼它**不會在執行時報錯**，而是算出一個「看起來合理」的錯值；(c) 你會在哪一層加什麼防呆（branded type？contract test？schema 上標注單位？），讓這個縫在**編譯期或部署前**就紅起來，而不是等生產環境見底。\n\n#### 推演解答\n\n關鍵是辨認出 F9 的指紋：**沒有 stack trace、沒有 5xx，只有一個合理的錯誤答案**。這正是它比 NullPointerException 危險的地方——後者會吵，前者沉默。好的答案會點出：裸 `number` 是元兇，因為它把單位資訊丟在型別系統之外、只活在「大家心照不宣」的約定裡。防呆的精神是**把單位從「人腦記憶」搬進「型別系統」或「契約檢查」**——讓機器替你守那條縫，因為人腦在換新機隊、趕進度、半夜值班時，記不住。金姆利的 Lockhart 委員會建議「全面改公制」，本質就是「**消滅那條縫本身**」（讓全系統只剩一種單位），這比「叫大家小心」強得多——對應到你的世界：與其在 code review 時提醒「記得這裡是毫秒」，不如讓 `Milliseconds` 型別讓 `addSeconds(ms)` 根本編不過。\n\n### 推演題2 [20 分鐘] ★★★\n\n**反事實推演（雙岔）。** 分別推演兩條岔路，並比較：\n\n(a) **如果 FQIS 油量錶正常**（自動 gauge 沒壞），這趟還會沒油嗎？\n(b) **如果換算用了帶單位的型別／流程**（不可能把 lb/L 餵進需要 kg/L 的欄位），但油量錶仍然故障，這趟還會沒油嗎？\n\n#### 推演解答\n\n(a) **幾乎不會。** 油量錶若正常，起飛前或巡航中，駕駛艙顯示的真實油量會與計算值嚴重不符（差一倍），任何一個人瞄一眼都會發現「不對，油怎麼這麼少」。自動校驗一旦在線，這個錯誤**幾分鐘內就會被抓到**。這說明 F8 的潛伏條件（gauge 失效）才是讓 F9 得以致命的前提——**單獨的單位錯誤，通常會被自動校驗擋下；是「校驗剛好也壞了」讓它穿透**。\n\n(b) **也不會。** 如果換算流程從根本上不允許「拿磅的密度去算公斤」——例如量油表直接以 kg/L 標注、或計算工具強制單位——那麼即使油量錶全黑、純靠人工，算出來的也是對的。油就夠，引擎不會停。\n\n**比較的價值**：兩條岔路各自獨立地能救命，這正是 F3 的反面證明——**多層防禦的意義就在於「任何一層完好就沒事」**。災難需要它們**同時**破洞。所以「根因是哪一個」是個假問題：油量錶失效和單位錯誤，**單獨任何一個都不足以釀災**，是它們對齊了才致命。\n\n### 推演題3 [15 分鐘] ★★\n\n**對帳你自己的「交叉確認共用同一錯誤」。** Pearson 和 Quintal 兩人都覆核了計算，卻同錯——因為共用同一個因子。在你的工程實踐裡，找出一處**「看起來有兩道防線、實際是同一份錯誤的兩個副本」**。提示方向：兩個 reviewer 看同一段程式碼／同一份規格；雙寫對帳兩邊取自同一個上游；主備節點跑完全相同的二進位（common-mode failure）；兩個 region 部署同一份有 bug 的設定。寫出：這個「假冗餘」在什麼觸發下會兩邊同時失效？\n\n#### 推演解答\n\n核心洞察：**獨立性來自「來源不同」，不來自「數量不同」。** 兩份相同的東西不提供冗餘，只提供「同時失效」。常見的真實版本：(1) 主備資料庫跑同一版有 bug 的 query——主庫被打掛，備庫接手後被同樣的 query 同樣打掛（你會在 ch13 雲端連鎖反覆看到這個形狀）；(2) 兩個 region 推同一份壞設定，「多區域部署」聽起來很安全，但同步推送讓它們**同時**倒（ch10 Cloudflare、ch13 CrowdStrike 都是這個）；(3) code review 兩人都漏掉同一個錯誤常數，因為他們共用了同一份過時的文件。對抗手段：讓校驗**來源異質**——換個人、換個方法、換個資料來源重算；備援用**不同實作**（而非同一份二進位的副本）；推送**分批／canary**而非全域同步。FQIS「雙通道串在一起、壞一個全倒」就是教科書級的反例——那不是冗餘，那是把兩個點綁成一個更大的單點。\n\n### 推演題4 [25 分鐘] ★★★\n\n**設計題（正面，預告 ch22）。** 金姆利之所以沒變成墳場，靠三道餘裕：飛機能滑翔（設計留了能量餘裕）、RAT 自動展開（優雅降級到退化模式）、人有滑翔技藝（手動接管的肌肉記憶）。挑一個你正在維運的系統，逐一對照這三道：(a) 它有沒有「滑翔餘裕」——主路徑全斷時，有沒有一條功能更少但還能服務的退化路徑？(b) 它的「RAT」是什麼——主動力喪失時，**自動**接管的最低限度機制（fallback、降級的唯讀模式、本地快取）是什麼？(c) 它的「Pearson」在哪——當自動化全部放棄、需要人手動接管時，你的團隊練過嗎？多久沒演練？\n\n#### 推演解答\n\n這題沒有單一正確答案，重點是**逼自己分清這三道是不同的東西、且常常只有前兩道**。最常見的盲點是 (c)：團隊蓋了漂亮的降級路徑（多層 cache、唯讀模式），但**從沒在「假設 dashboard 全黑」的前提下演練過手動接管**——於是真出事那天，降級路徑是有的，但沒人記得怎麼開那架「滑翔機」。這正是 ch05 法航 447 的悲劇（自動化把練習拿走了），也是 ch22 韌性工程的核心主張之一：**graceful degradation 是一半，chaos drill／手動接管演練是另一半**。好的答案會老實承認「我們的 (a)(b) 有，但 (c) 從沒認真演練」——這個誠實，比假裝三道都齊全有價值。順帶一提：(a) 的「滑翔餘裕」對應到你的容量規劃裡留的 headroom——而 ch09 Sleipner A 會告訴你，當那個餘裕被一個沒人細看的模型誤差悄悄吃掉 47% 時會怎樣。\n\n## 自我檢核\n\n1. 為什麼說這場災難**不是**「加油員算錯油」這麼簡單？Lockhart 委員會把主責歸給什麼，為什麼？\n2. FQIS 的「雙通道」設計，為什麼是個**偽冗餘**？它「壞一個就全倒」這個性質，對應到你系統裡哪種「假冗餘」？\n3. 1.77 和 0.803 各是什麼？這個錯誤為什麼是 F9（介面／假設的縫）而不是「單純算術錯」？它為什麼**不會在執行時報錯**？\n4. Pearson 和 Quintal 都覆核了計算，為什麼交叉確認還是失效了？「兩個人都算過」和「兩道獨立驗證」差在哪？\n5. 如果油量錶（自動 gauge）那天是正常的，這趟還會沒油嗎？這說明 F8 的潛伏條件和 F9 的觸發是什麼關係？\n6. 列出至少三道防線——說明**每一道單獨完好**都足以阻止這場災難。這如何反駁「單一根因」？\n7. 這場災難「沒變成墳場」靠哪三道餘裕？哪一道是設計給的、哪一道是人給的？你的系統缺哪一道？\n8. RAT 為什麼是「優雅降級的硬體版」？它和你的多層 cache library「退到下一層」是同一個形狀嗎？\n\n## 延伸閱讀\n\n採 Lockhart 探究式（先看一手調查，再讀技術復盤，最後自己追那個「為什麼校驗不獨立」的問題）：\n\n- **Board of Inquiry（Justice George Lockhart 主持，1985）的調查結論**——這場事件的官方一手判斷。值得讀的不是技術細節，而是它**如何拒絕「歸咎個人」、把主責指向企業與設備層面缺失**，並建議全面改用 SI 公制——一份三十多年前就示範了 just culture（ch02）的報告。\n- **[Wikipedia: Gimli Glider](https://en.wikipedia.org/wiki/Gimli_Glider)**——事件最完整的單頁概覽，含 FQIS 雙通道機制、circuit breaker 組態漂移的細節、1.77 vs 0.803 的計算、滑翔比、forward slip、金姆利賽車場的著陸。讀它時把焦點放在「**那個被叫走、來不及把通道停掉的維修人員**」——那是組態漂移最具體的一個畫面。\n- **[CBC: metric mix-up led to Gimli Glider emergency](https://www.cbc.ca/news/canada/manitoba/gimli-glider-35-years-1.4756985)**——加拿大公共廣播的回顧，把「剛改公制的機隊」這個**制度性的縫**講得清楚，適合對照你自己團隊「剛遷移到新系統、舊習慣還沒改」的那段危險期。\n- 對照閱讀：把本章與 **ch05 法航 447**（自動化把練習拿走、出事沒有 Pearson）、**ch22 阿波羅 11**（過載時優雅退化的正面教材）並讀——三章合起來就是「graceful degradation」這個概念從硬體（RAT）、到人（airmanship）、到軟體（優先權排程）的完整光譜。\n"}, {"id": "ch08-schiaparelli", "file": "ch08-schiaparelli.md", "group": "Part III — 一個數字，一場崩塌", "title": "ch08 — Schiaparelli 火星著陸器：一個飽和的感測器，讓電腦以為自己已落地", "md": "# ch08 — Schiaparelli 火星著陸器：一個飽和的感測器，讓電腦以為自己已落地\n\n> **本章解剖什麼**：一個慣性量測單元（IMU）在降落傘張開後被短暫推到「飽和」——量到的旋轉率超過它能表示的上限。導航軟體沒有質疑這個值，把它當真積分下去，最後算出一個物理上不可能的數字：**負高度**。著陸器據此「以為自己已經落地」，在三公里多的高空把降落傘丟掉、推進器只點了幾秒就關掉、切進地面模式——然後自由落體墜毀。這場災難主打 F9（介面/表示範圍的縫）、F8（潛伏條件 vs 觸發）、F1（緊耦合：一個壞數字直通推進器關閉）、F10（過度信任單一估計）、F11（該攔的合理性檢查從未存在）。它和前一章金姆利滑翔機（見 ch07）是同一個家族——一個數字錯了一場崩塌——但這次沒有滑翔餘裕、沒有人在迴路裡，只有七分鐘的自動程序和一行從未被寫下的 sanity check。它也預告了 ch16 三哩島：當儀表顯示的世界與真實世界脫節，後面每一個「合理」的決策都是錯的。\n\n## 從你已知的出發\n\n你寫過多層 cache library，全團隊在用。它最漂亮的地方不是命中率，是 graceful degradation——in-memory 掛了退到 S3，S3 掛了退到 local，每一層失效都被預期、被接住。你蓋它的時候腦子裡跑的就是「下游拿到的東西，會不會是上游某個壞掉的狀態」。\n\n現在換個問法。假設你的某個 consumer 從上游收到一個欄位，照規格它是「剩餘秒數」，應該是個 0 到幾百萬的正整數。你拿它去算下一次重試的時間、去設 TTL、去決定要不要把某筆訂單標記成過期。某天上游因為一次溢位、一次型別轉換、一次時鐘回跳，傳來一個 `-1`，或一個大到不像話的數，或一個 `NaN`。你的 consumer 會怎麼樣？\n\n如果你誠實，答案多半是「看情況」。有些路徑你 clamp 了，有些你 assert 了，有些——尤其是那些「這個值不可能是負的吧」的路徑——你直接拿來用了。因為它「不可能是負的」。規格說它是正整數，上游是你同事寫的，跑了兩年沒出過事。**應該沒事吧。**\n\nSchiaparelli 就是這句話的太空版。一個著陸器，在離火星表面三公里多的地方，它的導航電腦堅定地相信自己已經在地面以下了——因為一個感測器到達了它能表示的上限，而沒有任何一行程式碼問過一句：「等一下，一秒鐘前我還在三公里高，現在怎麼會在地下？」這個問題沒人問，不是因為它難，是因為**沒人覺得這個值會錯到這種程度**。我們來看它是怎麼一路錯到撞地的。\n\n## 冷開場：火星時間 2016 年 10 月 19 日，下降中\n\n歐洲太空總署（ESA）的 ExoMars 2016 任務由兩部分組成。一部分是 Trace Gas Orbiter（TGO），一具要進入火星軌道、長期偵測大氣微量氣體的探測器。另一部分是 Schiaparelli——正式名稱 EDM（Entry, Descent and Landing Demonstrator Module，進入-下降-著陸技術示範件）。它的任務目標很坦白：不是做科學，是**證明歐洲能讓一個東西安全降落在火星上**。為下一次真正的火星車著陸鋪路。換句話說，Schiaparelli 本身就是一場排練，一次「我們的 EDL 軟體到底行不行」的實測。\n\n10 月 19 日，Schiaparelli 與 TGO 分離後，以約六公里每秒的速度撞進火星稀薄的大氣。隔熱罩擋下大部分動能，外殼燒得通紅。進入大氣約三分鐘後，在超音速狀態下，降落傘張開了。\n\n這裡要先把一個全世界都記錯的事釘死：**降落傘正常張開了。** 大眾印象裡「火星著陸器墜毀」總會聯想到「傘沒開」。Schiaparelli 不是。它的傘開得好好的。真正殺死它的，是傘開之後那不到一秒鐘裡，一個感測器看到了它沒被設計來看的東西。\n\n## 裝填：潛伏條件早就埋好了\n\n要看懂這場災難，先得知道在那致命的一秒之前，有哪些孔洞已經安靜地對齊在那裡。它們都不是「壞掉」，每一個單獨看都「合理」，這正是 F8（潛伏條件）的特徵——災難早就裝填完畢，只等觸發。\n\n**潛伏條件一：對降落傘下擺盪的建模不足。** 傘張開後，著陸器掛在傘下會擺盪——這是物理常識。問題是地面模擬時，對這個擺盪幅度的估計太樂觀了。ESA 調查委員會（Schiaparelli Anomaly Inquiry Board，SIB，2017 年發布報告）把「對降落傘動態的保守建模不足」列為第一條根因。沒人預料到傘下的旋轉會劇烈到把感測器逼到極限。這是 F9 的一種：模型對現實的假設，和現實本身有一道縫（和 Sleipner A 低估剪力是同一個病，見 ch09）。\n\n**潛伏條件二：IMU 的飽和門檻，以及對飽和資料的處理方式。** IMU（Inertial Measurement Unit，慣性量測單元）量的是著陸器的角速率——它轉得多快。任何感測器都有量測上限：超過某個值，它就回報「我滿了」（saturation，飽和），舉一面旗子說「這個值我已經量不準了」。這不是故障，是合法的、設計內的行為。一支體重計到 150 公斤就停在 150，你站上去 200 公斤它不會顯示 200，會頂在 150——它沒壞，是飽和了。\n\n致命的不是飽和本身。是飽和**之後**，導航軟體拿這個飽和值去做的事。\n\n**潛伏條件三：完全沒有「不可能的高度」的合理性把關。** 整套 GNC（Guidance, Navigation & Control，導引、導航與控制）軟體裡，沒有任何一行程式碼去檢查它算出的高度是否物理上講得通。負高度？接受。一秒內從三公里掉到地下？接受。這就是 F11 最純粹的形式——不是「該叫的警報沒叫」，是**那個警報從來沒被寫進去過**。\n\n這三個孔洞平時錯開、相安無事。地面測試從沒把它們同時逼到位。它們安靜地等著。\n\n## 觸發：飽和的那不到一秒\n\n降落傘充氣達到峰值負載後約 0.2 秒，著陸器經歷了比預期更劇烈的擺盪，俯仰方向的角速率衝過了 IMU 能量測的上限。IMU 老老實實舉起飽和旗：「這個旋轉率我量不準了。」\n\n這就是觸發事件。它本身無害——一個感測器到達上限，舉旗示警，完全是它該做的事。一切的災難都在「軟體看到這面旗之後做了什麼」。\n\n⚠️ 這面飽和旗持續了多久，是這個案子裡少數有出入的細節。多數公開來源（包括 ESA 的調查摘要、SpaceNews 當時的報導標題）說它**持續約一秒**；ESA 的不同文件措辭略有差異，有的說飽和持續時間「比正常運作預期的略長」。本書不釘死一個確切秒數，重點不在那一秒有多長，而在那一秒裡軟體做的事——只要這個值持續夠久被積分進去，後面的連鎖就鎖死了。\n\n## 連鎖：壞數字怎麼一路直通推進器關閉\n\n孔洞開始一個接一個被穿透。這是 F1（緊耦合）的教科書展示——每一步之間沒有緩衝、沒有時間餘裕、沒有任何一層攔住，壞數字直接傳導到下一步。\n\n**第一步，把飽和值當成真值積分。** 飽和期間，GNC 軟體需要角速率來推算著陸器的姿態（它指向哪、轉到哪了）。但 IMU 此刻只給得出「我飽和了」這面旗。軟體的處理方式是：**把角速率當成等於飽和門檻那個值，當成一個固定常數，持續積分下去。** 可是真實世界裡，著陸器正在劇烈擺盪——它的旋轉率一直在變，根本不是一個常數。用一個錯誤的常數去積分一段時間，誤差就累積起來。等飽和旗放下時，GNC 估出來的姿態，和真實姿態差了**大約 165 度**。著陸器以為自己頭朝某個方向，實際上幾乎是倒過來的。\n\n**第二步，錯誤的姿態污染了高度計算。** Schiaparelli 上有一具雷達都卜勒測高儀（Radar Doppler Altimeter，RDA），它量的是沿著雷達波束方向的「斜距」（slant range）——不是垂直高度，是斜著打到地面的距離。要把斜距換算成垂直高度，需要知道著陸器相對地面傾斜了多少角度，然後乘以那個角度的餘弦。這個角度從哪來？從姿態估計來。而姿態估計現在錯了 165 度。\n\n於是 GNC 拿一個離垂直超過 90 度的錯誤角度去投影雷達斜距。**超過 90 度的角，餘弦是負的。** 斜距乘上一個負的餘弦，算出來的高度就是負的。導航電腦於是堅定地相信：Schiaparelli 已經在火星表面**以下好幾公尺**。\n\n**第三步，沒有任何一層攔住這個不可能的值。** 這是整起事件最尖銳的地方，也是 SIB 報告裡最值得每個工程師抄在牆上的一句。船上**沒有對這個高度做任何合理性檢查**。更刺眼的是——軟體其實**正確地偵測到**雷達測高儀和 IMU 之間有矛盾（斜距和姿態對不起來），但它被指示要把這兩個不一致的資訊「混合」使用，而不是停下來質疑。它看到了矛盾，然後把矛盾算進結果裡。\n\n一個物理上不可能的數字——一秒前還在三公里高，現在在地下——就這樣暢通無阻地流到了決策邏輯。\n\n**第四步，決策邏輯照單全收，啟動落地序列。** 高度是觸發模式切換的條件之一。GNC 看到「負高度」，得出唯一合乎它邏輯的結論：**我已經（或即將）著陸了。** 於是它執行本該在落地時做的整套動作：\n\n- 提前釋放降落傘與背殼（backshell）——在還需要傘的時候把傘丟掉了。\n- 減速推進器只點火**約三秒**就關掉——設計上應該燒約 30 秒，把下降速度殺到接近零。\n- 切換到「地面模式」（on-ground mode），啟動本該落地後才做的程序。\n\n可是此刻 Schiaparelli 其實還在**約 3.7 公里**的高空。傘丟了、推進器關了、電腦以為任務完成了。剩下的只有重力。\n\n## 餘波：540 公里每小時\n\n接下來沒有什麼好說的，因為沒有任何東西在減速它了。Schiaparelli 從約 3.7 公里高自由落體，以估計約 **540 公里每小時**（約 150 公尺每秒）撞上火星 Meridiani Planum 平原。NASA 的 Mars Reconnaissance Orbiter 後來從軌道上拍到了那個撞擊坑，和散落的殘骸。\n\n沒有人傷亡——這是一具無人探測器。損失的是這台技術示範件本身，和它本該證明的東西。\n\n要把另一個迷思也釘死：**ExoMars 2016 任務不算失敗。** 它的主要科學目標 TGO 成功進入了火星軌道。Schiaparelli 是排練件，它的墜毀提供了昂貴但真實的 EDL 教訓——而這正是它存在的意義之一，只是沒人想用這種方式學到。\n\nSIB 的調查列出四條主要根因，每一條都對應到本章前面拆開的孔洞：對降落傘動態的保守建模不足；IMU 飽和旗的持續時間不當、GNC 對飽和的處理不當；故障偵測（FDIR）與設計穩健性的取徑不足；以及分包商管理與硬體驗收的疏失。注意這個結構——**沒有一條是「感測器壞了」**，也沒有一條是「某個工程師算錯」。每一條都是系統層級的決策與假設。\n\n而報告裡有一條建議，幾乎是直接為你這種後端工程師寫的。SIB 明確建議：應該實作合理性檢查（sanity checks），**包括一條檢查「高度的量級不可能在一秒內從 3.7 公里變成負值」。** 一行範圍檢查。一行。它本來可以攔下整場災難。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n| | 內容 |\n|---|---|\n| **潛伏條件（早就裝填好）** | (1) 對傘下擺盪的建模太樂觀，沒料到 IMU 會被逼到飽和；(2) GNC 對「飽和的角速率資料」的處理方式是「當成等於門檻值的常數去積分」；(3) 全程沒有任何對「不可能的高度」的合理性把關；(4) 軟體被指示把矛盾的雷達/IMU 資料「混合」而非拒絕。 |\n| **觸發（最後一根稻草）** | 降落傘充氣峰值後約 0.2 秒，比預期劇烈的擺盪把 IMU 角速率推到飽和、舉起飽和旗。本身完全是設計內的合法行為——危險的不是飽和，是飽和之後軟體做的事。 |\n\n關鍵在於：觸發事件本身**無害**。一個感測器到達它的量測天花板、誠實地舉旗示警，這是它該做的。把這個無害的觸發放大成 540 公里每小時撞擊的，是那一整排早就對齊的潛伏孔洞。\n\n### 起司的孔洞：每一層為什麼都沒擋住\n\n```\n壞數字的旅程：從一面飽和旗到一個撞擊坑\n（每一段 ↓ 旁邊是「本該擋住卻沒擋住」的那層起司）\n\n  IMU 飽和（舉旗示警）\n    ↓   孔洞1：GNC 把飽和值當常數積分（沒擋住）\n  姿態估計錯 ~165°\n    ↓   孔洞2：用錯角度投影雷達斜距（沒擋住）\n  餘弦為負 → 算出「負高度」\n    ↓   孔洞3：無任何高度合理性檢查（沒擋住）\n    ↓   孔洞4：偵測到矛盾卻仍混合資料（沒擋住）\n  電腦判定「已著陸」\n    ↓   孔洞5：決策邏輯緊耦合、無緩衝（沒擋住）\n  釋傘／關推進器／切地面模式（人在 3.7 km 高）\n    ↓\n  自由落體 → 約 540 km/h 撞擊\n```\n\n| 防禦層 | 它本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 地面建模與模擬 | 預見傘下擺盪會多劇烈 | 對擺盪幅度估計太樂觀，模擬從未把 IMU 逼到飽和的情境 |\n| IMU 飽和處理 | 飽和時給出穩健、保守的姿態 | 軟體把角速率當成等於門檻的常數去積分，累積出 165° 大誤差 |\n| 高度合理性檢查 | 拒絕「負高度」「一秒內掉 3.7 km」這種物理不可能值 | **這層防禦從來不存在**——船上沒有任何高度 plausibility check |\n| 資料一致性裁決 | 雷達與 IMU 矛盾時停下來質疑 | 軟體偵測到矛盾，卻被指示「混合」不一致的資料而非拒絕 |\n| FDIR（故障偵測與隔離） | 把異常狀態升級成安全模式 | FDIR 取徑與設計穩健性不足，未涵蓋此情境 |\n| 驗證測試 | 在地面就暴露這條故障鏈 | 測試未涵蓋「飽和→積分→負高度」的路徑；分包與驗收管理疏失 |\n\n明確反駁「單一根因」：你可以說根因是「IMU 飽和」，但 IMU 飽和那天**做了它該做的事**。你可以說是「軟體 bug」，但這不是一個拼錯的符號，是一連串各自看似合理的設計決策。真相是這六層防禦**每一層都有自己沒擋住的理由**，平時它們錯開，那天恰好連成一線。任何一層補上——尤其是那條一行的高度範圍檢查——這台著陸器就活了。\n\n### 對應的失敗模式\n\n- **F9（介面與假設的縫）**：核心。多重的「縫」——(a) 模型對擺盪幅度的假設 vs 現實；(b) 雷達量的是「斜距」、軟體要的是「垂直高度」，中間靠一個會出錯的姿態角換算；(c) 飽和值代表的是「超出可表示範圍」，但軟體把它當成一個「可表示的具體數值」來用。表示範圍（representable range）的邊界，正是這場災難的縫。\n- **F8（潛伏條件 vs 觸發）**：建模不足、飽和處理邏輯、缺合理性檢查——三個孔洞早就在那，飽和只是點火。\n- **F1（緊耦合）**：壞數字從感測器到「關掉推進器」之間沒有任何緩衝、沒有人工確認、沒有時間餘裕。一個值錯了，七分鐘的自動序列裡無人能介入。\n- **F10（單一感測器/過度信任單一估計）**：整個高度判斷過度依賴單一條被污染的姿態估計，沒有獨立的交叉驗證去否決它。\n- **F11（監控盲區：該叫的警報沒叫）**：最該存在的那層——「這個高度物理上不可能」的合理性閘門——從未被寫進去。它不是被淹沒，是根本不在。\n\n### 一句話形狀\n\n**這場災難的形狀是：一個感測器誠實地說「我量不準了」，而下游把這句話當成一個具體數字積分下去，算出一個物理上不可能的結果，然後因為沒有任何一行程式碼質疑這個不可能，就拿它去做了一個不可逆的災難性決定。**\n\n## 換成你的系統\n\n你活在一個到處都是「上游傳來的數字」的世界。SQS 訊息裡的欄位、上游服務 response 裡的值、資料庫讀回來的列、外部 API 回的 JSON。你對每一個都默默假設了一個範圍：這個 count 是非負的、這個 timestamp 在合理區間、這個 percentage 在 0 到 100、這個 retry delay 不會是負的也不會大到天荒地老。\n\n問題是，這些假設**多半沒有被寫成程式碼**。它們活在你腦子裡，活在規格文件裡，活在「上游同事不會傳這種值給我吧」的信任裡。Schiaparelli 教你的事很冷：**飽和、溢位、時鐘回跳、型別轉換失誤、上游的 bug——這些都會生出「合法但不可能」的值。** 它在型別上是個合法的數字（負高度也是個 double），但在語義上根本不該存在。而下游的災難，往往就發生在「型別合法」和「語義不可能」之間那道沒人守的縫。\n\n點名一個你「應該沒事吧」的假設。你那個結算 pipeline——K8s CronJob 把訊息丟進 SQS，冪等 consumer 消費。假設某筆訊息裡的「金額」或「數量」欄位，因為上游一次整數溢位或一次單位混淆（見 ch07），變成了一個負數或一個荒謬的大數。你的 consumer 因為是冪等的，會很「可靠」地把這個壞值處理掉——可靠地做錯事。它不會崩、不會報錯，它會安靜地把一個不可能的值寫進結算結果，就像 Schiaparelli 安靜地把負高度寫進「我著陸了」。冪等性保證的是「不重複」，不是「不荒謬」。\n\n可操作的自問，不是「要小心輸入」這種廢話，是這三條具體的：\n\n1. **你的關鍵數值輸入，有哪幾個是「信任上游、未做範圍檢查」就直接拿去驅動不可逆動作的？** 把它們列出來。不可逆動作＝扣款、刪資料、發通知、觸發 failover、關掉某個東西。\n2. **對每一個，問：上游給我一個物理/業務上不可能的值（負數、超大、NaN、超出 enum）時，會發生什麼？** 如果答案是「它會被當真用下去」，你就有一個 Schiaparelli。\n3. **那條 sanity check 該放在哪一層？** 是在 consumer 入口 clamp/reject，還是在 schema 驗證層，還是在型別本身（帶範圍的 branded type）？SIB 建議的那條檢查只有一行——「高度不可能一秒內從 3.7 km 變負」。你系統裡對應的那一行是什麼？「餘額不可能是負的」「TTL 不可能是負的」「進度不可能從 99% 跳回 -5%」——你寫了嗎，還是它只活在你腦子裡？\n\n焦慮工程師的版本：每一個你信任的上游數值，都是一個你還沒寫的合理性檢查。它平時沉默，因為上游平時規矩。它出事的那天，會是上游某個你管不到的角落溢位的那天，而你的程式碼會像 Schiaparelli 一樣，誠實、可靠、毫不質疑地，拿那個不可能的值去做那件不可逆的事。\n\n## 紙上推演\n\n### 推演題1 — 口頭重講這條因果鏈 **[10 分鐘] ★**\n\n不看書，向一個沒聽過這案子的工程師，用兩分鐘講清楚：Schiaparelli 是怎麼從「降落傘正常張開」一路走到「540 公里每小時撞地」的。你的講述必須包含這五個環節，缺一不可：(1) IMU 為什麼飽和、飽和是不是故障；(2) 軟體拿飽和值做了什麼、為什麼會生出 165 度姿態誤差；(3) 錯誤姿態怎麼把雷達斜距換算成負高度；(4) 為什麼沒有任何一層攔下這個負高度；(5) 電腦據此做了哪三件不可逆的事。\n\n#### 推演解答\n\n合格的講述會強調「飽和不是故障、是合法狀態」和「致命的是軟體對飽和的處理」這兩點，並且明確指出第 (4) 步——那層合理性檢查從來不存在——是整條鏈裡最便宜也最關鍵的缺口。如果你的版本是「感測器壞了導致墜毀」，你就漏掉了全部的教訓：感測器沒壞，它做了該做的事。如果你的版本是「降落傘失靈」，你記的是迷思而不是史實。完整鏈條：傘正常開→傘下擺盪超出建模預期→IMU 角速率飽和、舉旗→GNC 把角速率當成等於門檻的常數積分→姿態估計累積出約 165° 誤差→用這個錯角度投影雷達斜距、餘弦為負→算出負高度→無任何合理性檢查、且偵測到矛盾仍混合資料→判定「已著陸」→在 3.7 km 高釋傘、推進器只點約 3 秒、切地面模式→自由落體→約 540 km/h 撞擊。\n\n### 推演題2 — 反事實：補上那一層起司 **[15 分鐘] ★★**\n\nSIB 建議的合理性檢查是：「高度的量級不可能在一秒內從 3.7 公里變成負值。」假設這條檢查在發射前就被寫進 GNC，且它觸發時的行為是「忽略本次高度解算、維持上一個有效高度繼續正常下降序列」。問：這樣 Schiaparelli 就能安全著陸嗎？這條檢查擋住的是哪一個孔洞、沒擋住的又是哪些？再問：如果這條檢查的行為改成「偵測到不可能值就進入安全模式、中止任務」，結果會更好還是更糟？\n\n#### 推演解答\n\n這條檢查擋住的是「孔洞3：無高度合理性把關」。它確實能阻止「在 3.7 km 高判定已著陸」這個致命誤判——光是讓電腦不相信負高度，就足以不觸發提前釋傘，著陸器很可能正常完成下降。所以是的，這一行檢查極可能救回任務，這也是為什麼 SIB 特別點名它。\n\n但要看清它**沒擋住**的孔洞：建模不足（孔洞1）、飽和處理把值當常數積分（孔洞2）、偵測到矛盾仍混合資料（孔洞4）——這些都還在。也就是說，這條檢查是在災難鏈的**下游**補了一道網，攔住了最終的致命動作，但上游那些生產壞數據的機制依然存在。這正是瑞士起司的精神：你不需要補上每一個孔洞，你只需要讓**至少一層**擋住，整條鏈就斷了。一行下游的範圍檢查，性價比遠高於重做整個建模。\n\n至於「中止任務」版本：對一個無人技術示範件，中止可能反而更糟——它的任務就是著陸，安全模式中止等於任務失敗，只是換一種失敗。對「忽略壞值、維持上一有效值繼續」反而更可能達成目標。這個取捨對你也成立：sanity check 觸發時的回退行為（reject and continue with last-good vs. fail-safe abort）要看「繼續」和「中止」哪個的失敗成本低——這正是 graceful degradation 的核心設計判斷（見 ch22）。\n\n### 推演題3 — 對帳你自己的系統 **[20 分鐘] ★★★**\n\n從你維運過的系統裡，找出一個「信任上游數值、未做合理性檢查就拿去驅動不可逆動作」的真實位置。可以是結算 pipeline 的金額/數量欄位、cache 的 TTL、retry 的 backoff delay、HPA 的 metric 讀數、任何「上游給的數字直接觸發某個動作」的地方。對它做完整的 Schiaparelli 對帳：(a) 上游可能怎麼生出一個合法但不可能的值；(b) 你的程式碼現在拿到這個值會做什麼；(c) 那個不可逆動作的 blast radius 有多大；(d) 一行 sanity check 該放哪、觸發時該怎麼回退。\n\n#### 推演解答\n\n這題沒有標準答案，但有合格標準。合格的對帳必須具體到「哪個欄位、哪段程式、哪個動作」——「我應該檢查輸入」不算過關，那是焦慮不是工程。一個夠好的例子長這樣：「結算 consumer 收到 SQS 訊息的 `amount` 欄位，型別是 number，我直接拿去 `balance -= amount`。上游若整數溢位或單位混淆（見 ch07），amount 可能是負數或巨大值。現在的程式碼會照算，把荒謬餘額寫進 DB——blast radius 是整個帳戶餘額被污染、且因為冪等，重放也救不回來。Sanity check 該放在 consumer 入口：`amount` 必須在 [0, MAX_REASONABLE_TX] 內，否則 reject 進 DLQ 並告警，絕不靜默處理。」注意這個回退選的是「reject + 告警」而非「clamp 後繼續」——因為金額是錢，寧可停下來人工查，也不要 clamp 出一個「看起來正常但其實錯」的值。回退策略要配合動作的不可逆性與業務語義來選，這是這題真正在練的判斷。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說「IMU 飽和」不是這場災難的根因，而只是觸發事件？飽和那天，IMU 做的是它該做的事還是不該做的事？\n2. 飽和的角速率值，是怎麼一步步變成「負高度」的？中間經過了哪兩次轉換（積分、雷達斜距投影）？為什麼餘弦會是負的？\n3. SIB 報告裡那條「高度不可能一秒內從 3.7 km 變負」的合理性檢查，如果它存在，會擋住哪一個孔洞？為什麼補這一層就足以斷掉整條鏈，而不需要補上每一層？\n4. 為什麼「降落傘故障」和「感測器壞了」這兩個流行說法都是錯的？正確的說法分別該怎麼講？\n5. 軟體偵測到了雷達與 IMU 的矛盾——這件事為什麼讓災難更刺眼，而不是更安心？「偵測到矛盾卻仍混合資料」對應你系統裡的什麼反模式？\n6. 在你自己的系統裡，「上游傳來一個合法但不可能的值」最可能發生在哪一個欄位、哪一條路徑上？那個值會驅動什麼不可逆動作？\n7. 為什麼「冪等性」保證不了「不荒謬」？一個可靠的 consumer 為什麼反而會「可靠地做錯事」？\n8. 這場災難和金姆利滑翔機（見 ch07）都是「一個數字一場崩塌」，但結局相反。差別在哪——為什麼一個墜毀、一個迫降成功？（提示：餘裕、人在迴路、graceful degradation，見 ch22）\n\n## 延伸閱讀\n\n- **ESA ExoMars 2016 — Schiaparelli Anomaly Inquiry（SIB 報告，2017）**：一手調查報告，把飽和→積分→165° 姿態誤差→負高度→提前釋傘的完整鏈條與四條根因講得清清楚楚，並明確建議補上高度合理性檢查。本章所有技術細節的權威來源。PDF: https://sci.esa.int/documents/33431/35950/1567260317467-ESA_ExoMars_2016_Schiaparelli_Anomaly_Inquiry.pdf\n- **ESA 官方新聞「Schiaparelli landing investigation completed」**：調查完成的官方摘要，適合先讀這篇建立全貌再啃報告。https://www.esa.int/Science_Exploration/Human_and_Robotic_Exploration/Exploration/ExoMars/Schiaparelli_landing_investigation_completed\n- **SpaceNews「ESA: Mars lander crash caused by 1-second inertial measurement error」**：當時的技術報導，標題本身就點出「約一秒」的飽和——對照本章關於飽和持續時間的 hedge，看見公開來源間的措辭差異。https://spacenews.com/esa-mars-lander-crash-caused-by-1-second-inertial-measurement-error/\n"}, {"id": "ch09-sleipner", "file": "ch09-sleipner.md", "group": "Part III — 一個數字，一場崩塌", "title": "ch09 — Sleipner A 平台：一個有限元素模型，沉掉數億美元", "md": "# ch09 — Sleipner A 平台：一個有限元素模型，沉掉數億美元\n\n> **本章解剖什麼**：1991 年，挪威峽灣裡一座剛蓋好、比足球場還大的混凝土海上平台基座，在一場受控的下沉測試中裂開、進水、內爆沉底，碰底的衝擊在地震儀上留下約規模 3.0 的訊號。沒有人死——這是它最幸運也最教育性的地方。真正裝填好這場災難的，不是劣質混凝土，不是偷工減料，而是設計階段一個有限元素分析（FEA）把關鍵接點的剪應力**低估了約 47%**：模型的網格在應力集中處太粗，把不安全的牆算成了安全。本章主打 **F9（介面與假設的縫：模型對現實的假設錯了）、F8（潛伏條件：缺陷在製造時就凝固進混凝土裡）、F2（互動複雜度）、F3（起司孔洞對齊）**。它與 ch07、ch08 是同一個 Part 的三胞胎——都是「一個數字、一場崩塌」：ch07 是錯用的換算係數，ch08 是飽和的感測器，**ch09 是『模型不是現實』的版本**——被驗證通過的，是你對現實的假設，不是現實本身。\n\n## 從你已知的出發\n\n你做容量規劃時，做的事情其實是建一個模型。\n\n你估每個請求吃多少 CPU、每筆查詢鎖住多少行、連線池要開多大、RDS 在多少 QPS 時 CPU 會頂到 80%。然後你跑 k6 或 Vegeta，灌一波你**設計出來的**負載曲線，看 p99 latency 有沒有爆、看 error rate 守不守得住。綠了，你簽字：這個服務撐得住雙十一。\n\n停下來想清楚那一刻你真正驗證了什麼。你驗證的不是「現實撐得住」，是「**在我設想的負載形狀下，我的模型撐得住**」。壓測腳本是你寫的，它打的流量是你想像中的流量。如果真實尖峰的形狀跟你想的差一截——熱點 key 集中度比你估的高、某個 endpoint 的 payload 比你取樣的大、retry 行為在退化時比你模擬的兇——那麼你壓測通過的那條曲線，跟那天打進來的那條曲線，是兩回事。你那次招牌的調校（重排 SQL、拆 transaction 把尖峰 RDS CPU 砍掉 40%），底下也是一個模型：你判斷哪幾條 query 是熱路徑、哪個鎖是瓶頸。那個判斷對，所以 CPU 真的降了。但你怎麼知道下一個瓶頸不在你模型沒細看的角落？\n\nSleipner A 就是這個縫的 1991 年混凝土版，而且代價是一座沉到峽灣底的平台。挪威的工程師用當年最好的有限元素軟體跑了模擬，模擬說牆夠厚、結構安全，他們照著模擬配筋、灌漿、蓋出一座比足球場還大的基座。模擬通過了。然後它在水裡裂開、沉了。讀完這章你會明白：被驗證通過的從來不是現實——是**你的模型對現實的一組假設**。而那組假設裡，可能有一個在沒人細看的角落，被低估了 47%。\n\n## 八月的峽灣，一千噸水\n\n1991 年 8 月 23 日，星期五早上。挪威 Stavanger 外海的 Gandsfjord 峽灣裡，一座龐然大物正緩緩往下沉——這是計畫之內的。〔日期、地點照 landscape〕\n\n那是 Sleipner A 的混凝土重力式基座（concrete gravity base structure，GBS），Condeep 型，由 Norwegian Contractors 為國營石油公司 Statoil（今 Equinor）建造。它的尺度很難在腦中放對比例：基座由 24 個直徑 12 公尺的圓筒形儲格（cell）並排組成，底面積約 16,000 平方公尺——比兩個足球場還大；上面要扛一塊重達約 57,000 噸的甲板，將來運轉時甲板上會有約 200 個人和四萬噸鑽井設備。〔規格照 Arnold/SINTEF 整理〕這種平台不是用錨固定的，它靠**自己的重量**坐在海床上，所以基座本身必須先沉到很深的水裡，跟甲板對接（deck mating）。\n\n那天早上做的，就是對接前的最後一道受控壓載測試：往儲格裡注水，讓基座精確地、緩慢地往下沉到指定深度。這是排練，不是意外——整套流程設計好要這樣做。\n\n然後控制室的儀表開始說一件不該發生的事：鑽井豎井裡，水在灌進來。將近一千噸。\n\n壓載泵立刻全開，想把水抽出去。但灌進來的水量遠遠超過泵的設計排量。基座開始失去浮力，以大約**每分鐘下沉一公尺**的速度往下掉。〔約 1 m/min 照 landscape〕在水深約 65 公尺處，一面儲格的牆已經裂開、大量進水；失去浮力的基座加速下墜，在水壓下內爆（implode），最後砸在約 220 公尺深的海床上。碰底的衝擊大到附近的地震儀記錄到一個約**規模 3.0** 的事件。〔65 m、3.0、220 m 海床照 landscape 與 Arnold〕\n\n當天船上有 22 個人。全部安全撤離，沒有人受傷——因為這是無人化的受控測試，甲板和那將來的 200 個人都還沒上去。〔22 人撤離無傷照 Equinor/Wikipedia〕這是這場災難最關鍵的一個事實：它**在測試階段就爆了**，把一個設計缺陷暴露在最便宜的時刻。如果這座基座撐過了測試、對接了甲板、被拖到油田就位、開始生產，那個藏在牆裡的缺陷會在某個沒人預期的日子，帶著甲板上的人一起塌。它是「相對幸運」的災難——但缺陷本身，從蓋出來那天起就一直在那裡。\n\n## 裝填：一個太粗的網格\n\n要看懂那面牆為什麼會裂，得先看那個缺陷是怎麼**凝固進混凝土裡**的——而它凝固的地方，是一張電腦模型裡太粗的網格。\n\n24 個圓筒儲格並排在一起，圓和圓之間會留下空隙。設計者在這些三個圓筒交會的地方，填進一個三角形的混凝土結構，叫 **tricell（三胞元）**——三座圓格交會處的那塊三角填充，是壓載/浮力系統的一部分。當基座沉到深水，外面的靜水壓（hydrostatic pressure）非常大，這個壓力會在 tricell 的牆上產生很高的**剪應力**（shear stress）。深度越深、壓力越大、剪力越大。這是純物理，可預見，沒有任何意外。\n\n問題出在「算這個剪力有多大」這一步。設計團隊用了當年的工業標準有限元素軟體 **NASTRAN** 來做結構分析。有限元素法的本質，是把一個連續的結構切成許多小塊（元素，elements），在每個小塊裡用簡單的數學近似真實的應力分布，再把它們拼起來。切得越細，近似越準；切得越粗，越省算力，但在應力急遽變化的地方會失真。\n\ntricell 那個三角交會處，正是應力會**急遽集中**的幾何——尖角、轉折、三向受力交會。偏偏 NASTRAN 模型在這裡的網格**太粗**，元素的幾何形狀也不利於捕捉真實的剪力分布。於是模型算出來的 tricell 牆剪應力，比真實值**低了約 47%**。〔47% 照 landscape；部分學界整理寫約 45%，本章依 landscape 取 47%〕\n\n把這個數字放進工程師的處境裡：他們不是亂猜，他們用了正規工具、跑了正規分析、得到一個看起來合理的應力值。他們依著這個值去設計牆的厚度和配筋——應力低，需求就低，牆就可以做薄一點、鋼筋可以少一點。再疊上一個偏不保守的混凝土設計規範，安全裕度被**雙重侵蝕**。最後做出來的牆，對「沉到那個深度時可預見的靜水壓」毫無餘裕。〔機制照 landscape〕\n\n這就是 F8（潛伏條件）最安靜的形態：災難不是測試那天才發生的，它在**澆灌混凝土的那一刻**就已經裝填完成。牆做好的那天，它就已經太薄了；只是要等基座沉到夠深、水壓夠大，剪力才追上那個被低估 47% 的設計極限。從那以後，這座基座一直帶著一個必然會在某個深度破裂的牆，安靜地等著。觸發事件——那場受控下沉——只是把它沉到了那個深度。\n\n## 觸發與連鎖：當剪力追上被低估的牆\n\n下沉測試本身，是這場災難裡最不重要的部分。它沒做錯任何事——它只是忠實地、按計畫地，把基座送到了那個牆撐不住的深度。\n\n機制是緊耦合的（F1 在這裡現形，但不是主角）：水壓隨深度線性上升 → tricell 牆的剪力隨之上升 → 在約 65 公尺深處，真實剪力超過了那面被低估設計的牆所能承受的極限 → 牆裂開 → 大量海水從裂縫灌入儲格 → 浮力崩潰 → 基座加速下沉 → 更深的水壓 → 更多裂解、內爆。一旦第一面牆破，後面就是一條沒有緩衝、沒有時間餘裕的下墜鏈：泵抽水的速度遠追不上灌水的速度，沒有任何一道閘門能在「牆裂」和「沉沒」之間插進來。\n\n這裡有一個細節，是整個案例最有力的一槍。事故之後，調查單位重新做了一次**夠細**的有限元素分析——把網格在 tricell 應力集中處加密，正確地捕捉剪力分布。這個修正後的模型預測：牆會在約 **62 公尺**深處破裂。〔62 m 預測值照 Arnold/SINTEF 整理〕\n\n而真實的破裂，發生在約 **65 公尺**。\n\n差距在三公尺以內。換句話說：當你用對的網格去算，模型精準地預言了現實會在哪裡崩塌。NASTRAN 從來沒有「壞掉」——它是一個正確的工具，忠實地解了交給它的方程。問題從頭到尾在於**人怎麼用它**：網格切得太粗，模型就在那個關鍵角落少看了 47% 的剪力，於是把一面注定會裂的牆，算成了安全。工具沒說謊，是餵給工具的離散化（discretization）撒了個謊，而沒有人去獨立校核那個角落。\n\n## 餘波：被驗證的是模型，不是現實\n\n先把規模講清楚，因為這也是常被記錯的地方。\n\n**Sleipner A 的下沉，零死亡。** 它毀掉的是一整座混凝土基座，不是人命——因為它在無人受控測試中失敗。財務損失常被引述為**約 7 億美元**——但要誠實說：這個數字常見於工程教案與媒體，**未必能追溯到單一權威報告的逐字數字**；不同來源還有以挪威克朗計的不同估值（如保險理賠約 NOK 23 億、損失估約 NOK 18 億等口徑）。所以本章的說法是：**估計損失達數億美元（常見引述約 7 億美元，未必有單一權威出處）**。〔金額 landscape 標 ⚠️；NOK 口徑見 Equinor/Draugen 整理，供參考〕無論確切數字是多少，它是「一個模型誤差」直接量級到的後果——一座足球場大的結構，沉了。\n\n調查由 Statoil 設立小組、委由挪威的 **SINTEF** 擔任技術顧問進行。結論很乾淨：根因是 NASTRAN 有限元素分析對 tricell 牆剪應力的**不準確計算（低估約 47%）**，加上偏不保守的混凝土設計，使牆在靜水壓下破壞。〔SINTEF 結論照 landscape〕Statoil 後來重建了一座修正設計的基座，這次蓋成了，Sleipner A 油田正常投產至今。\n\n但這個案例真正值錢的，是它對「**模型不是現實**」這件事的乾淨示範。它沒有壞掉的材料、沒有怠惰的工人、沒有一個可以怪罪的「笨蛋」。它有的是一群有能力的工程師，用一個正確的工具，跑了一個通過的分析，然後照著那個分析蓋了一座會沉的平台。\n\n這就要破掉這個案例最常見的三個迷思：\n\n- **「是混凝土品質差／施工偷工。」** 錯。混凝土沒問題，施工照圖施作。問題在**設計階段**——牆是按一個被低估的應力需求設計的，所以它「按錯誤的低需求」做得太薄。把牆做厚是對的，但沒人知道要做厚，因為模型說不用。\n- **「平台運轉中倒塌、死了人。」** 錯。是安裝前的受控下沉測試中沉沒，零傷亡。它的價值正在於「測試階段就暴露了設計缺陷」——這是相對幸運的時點。\n- **「就是 NASTRAN（軟體）的 bug。」** 要校正。NASTRAN 本身沒有 bug，它正確地解了被交付的模型。災難來自「**模型網格在應力集中處過粗＋偏不保守規範＋沒有獨立校核**」這組**人使用工具的方式**。這跟「重用了一段沒有重新驗證運行假設的舊程式」是同一種精神的失敗——你信任一個輸出，卻沒去問那個輸出底下的假設在你這個情境下還成不成立。\n\n```\n 設計階段（潛伏 F8）\n ──────────────────\n NASTRAN 網格太粗，在 tricell 應力集中處\n   │\n   ▼\n 剪應力被低估 ~47%\n   │\n   ▼\n 牆設計過薄、配筋不足（缺陷凝固進混凝土）\n   │\n   │   觸發\n   ▼  ──────\n 受控下沉至 ~65 m（真實剪力追上設計極限）\n   │\n   ▼\n tricell 牆裂 → 進水 → 浮力崩潰 → 加速下沉 → 內爆 → 砸海床 → 地震訊號 ~3.0\n\n 〔事後：把網格加密重算，預測破裂在 ~62 m；真實 ~65 m——\n   用對的網格，模型精準預言了現實。錯的從來不是工具，是離散化。〕\n```\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**觸發**是那場受控下沉測試——它把基座沉到了約 65 公尺，讓真實剪力追上設計極限。但這個觸發完全在計畫之內、毫無異常；它只是按表操課地把缺陷送到了它會爆的深度。\n\n**真正裝填好的災難**，是那面**按被低估 47% 的剪力設計、因而太薄、配筋不足的 tricell 牆**。它不是測試那天才變弱的——它從澆灌完成那天起就太薄了，只是平時（在淺水、在乾塢裡）剪力還沒大到揭穿它。潛伏條件在這裡是字面意義上的「凝固進結構裡」：一個模型誤差被混凝土永久記錄下來，等著一個夠深的水壓來兌現。觸發不創造缺陷，它只是把早已存在的缺陷推到臨界點。\n\n### 起司的孔洞：每一層為什麼都沒擋住\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| FEA 模型解析度 | 算準 tricell 的真實剪力 | 網格在應力集中處太粗、元素幾何不利，系統性低估約 47%（本案核心 F9） |\n| 混凝土設計規範 | 提供足夠安全裕度 | 採用偏不保守的規範，與低估的應力相疊加，裕度被雙重侵蝕 |\n| 牆厚與配筋 | 對可預見靜水壓留餘裕 | 按錯誤的低應力設計，牆太薄、剪力配筋不足，毫無餘裕 |\n| 獨立校核 / 局部精細複算 | 抓出全域模型在關鍵接點的失真 | 對 FEA 輸出過度信任，沒有人在 tricell 這個角落用更細的網格獨立重算 |\n| 受控測試本身 | 在投產前暴露缺陷 | 它確實暴露了——但是以「整座沉掉」的方式；它擋住了「載人運轉時才塌」，沒擋住結構全損 |\n\n任何一層擋住——網格夠細、或規範保守一點、或有人對 tricell 做了獨立的精細複算——這座基座都不會沉。最後一層（受控測試）值得單獨記一筆：它是唯一**真的擋住了**的孔洞，但它擋住的是「死人」，不是「沉船」。這正是 F3 的精髓：不是找那個低估剪力的工程師，而是問**為什麼從模型、規範、配筋到校核，每一層都沒能在缺陷凝固成現實之前攔下它**。\n\n### 對應模式\n\n- **F9（介面與假設的縫）**：本案的縫不在兩個子系統之間，而在**模型與現實之間**。FEA 模型對「tricell 牆承受多少剪力」的假設，與現實對齊得差了 47%。被驗證通過的是模型的假設，不是現實本身——這是 F9 最抽象、也最普遍的形態。\n- **F8（潛伏條件 vs 觸發）**：缺陷在澆灌時就凝固進混凝土，潛伏到剪力追上它的那一刻；觸發（下沉測試）只是把它送到臨界深度。\n- **F2（互動複雜度）**：tricell 三向受力交會處的剪力集中，是一個幾何上難以直覺、需要夠細的模型才看得清的非線性效應；粗網格恰好在這個複雜交互處失真。\n- **F3（起司孔洞對齊）**：模型、規範、配筋、校核四層各有破洞，平時看不出來，在那個深度恰好連成一線。\n\n### 一句話形狀\n\n**這場災難的形狀是：當你信任的不是現實、而是一個對現實的模型，那麼模型在哪個角落少看了一截，現實就會在那裡如實地崩給你看。**\n\n## 換成你的系統\n\n把 tricell 換成你壓測腳本沒覆蓋到的那個 endpoint，問題立刻變得很近。\n\n你跑 k6、看著 dashboard 全綠、簽字「能撐雙十一」的那一刻，你驗證的是**你設想的負載形狀下、你建的容量模型成立**。Sleipner 要問你的是：你的模型，有沒有一個被低估 47% 的「tricell」藏在某個沒人細看的角落？\n\n具體一點。**你的壓測流量，是你想像出來的流量。** 你用平均 payload 大小算每請求 CPU，但真實尖峰可能有一批超大 payload；你假設 key 均勻分布來估快取命中率，但真實熱點可能集中在少數幾個 key 上把某一層打爆；你壓測的是穩態，但真實災難發生在退化的瞬間——某個依賴變慢、retry 開始堆積、那條你壓測時從沒打過的路徑突然變成熱路徑。這些都是 tricell：你的模型在那裡網格太粗，把一個會爆的角落算成了安全。\n\n**點名一個「應該沒事吧」**：你那套招牌的多層 cache library（in-memory→S3→local，含 graceful degradation）。它的 degradation 是漂亮的工程——但你怎麼知道你對「退到下一層時的負載」的估計是對的？你壓測過「in-memory 那層整個失效、全部流量瞬間打到 S3 層」的形狀嗎？還是你只壓過穩態下各層的正常分配？如果 S3 那層的容量模型，是按「正常只承接 cache miss 的少量流量」算的，那麼當上層崩、全量湧下來時，你對它承受多少剪力的假設——可能就被低估了 47%。退化路徑往往是壓測腳本最少覆蓋的角落，偏偏它正是出事那天唯一在跑的路徑。那個「應該沒事吧，退化路徑我做了 graceful degradation」的假設，錯的時候會這樣壞：fallback 那層在它從沒被設計承受的負載下自己也垮了，於是 graceful degradation 變成 cascading failure（F7，見 ch10–ch13）。\n\n**可操作的自問**：拿出你最近一次容量規劃或壓測報告，逐項問三個問題——（1）這個數字背後的假設是什麼？（負載形狀、分布、payload、退化行為）（2）這個假設在**最壞情況**下還成立嗎？（尖峰、熱點、退化、retry storm）（3）有沒有一個**獨立的方法**驗證過這個假設，還是我只是信任了同一個模型的輸出？每一個「我跑了模擬所以沒事」但從沒被獨立校核過的假設，都是一個 tricell。Sleipner 的修法很笨但很有效：在你最不確定、應力最集中的那個接點，**把網格加密**——用更接近真實的形狀獨立重算一次。對你而言就是：別只壓你設計的曲線，去壓你**最怕**的那條曲線。\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n不用任何結構工程知識，只用「模型 vs 現實」這一條線，向另一個工程師口頭重講：**為什麼「FEA 分析通過、所以結構安全」這個推論本身是有縫的？** 然後指出，要讓這個合理的推論變成致命錯誤，需要哪一個隱藏的事實。\n\n#### 推演解答\n\n合理性鏈條：工程師用工業標準軟體 NASTRAN，跑了正規的有限元素分析，得到一組應力值，依此設計牆厚與配筋。分析「通過」——意思是模型算出的應力在材料容許範圍內。任何有能力的團隊都會信任這個流程，因為它正是標準作法。\n\n把它變成致命錯誤的隱藏事實只有一個：**模型算出的應力，不等於現實的應力。** FEA 的輸出取決於網格的細緻度；在 tricell 這個應力集中的角落，網格太粗，模型少算了約 47% 的剪力。所以「分析通過」真正的意思是「**在這個離散化下、這組假設下，結構安全**」——而那組假設裡，藏著一個 47% 的低估。\n\n關鍵領悟：「分析通過」驗證的是模型的內部自洽，不是模型對現實的忠實度。要戳破它，你得問一個分析本身不會告訴你的問題：**在我最不確定的那個角落，網格夠細嗎？我的假設跟現實對齊嗎？** 事後用加密網格重算、預測破裂在 62 m（真實 65 m）這件事證明了——工具一直是對的，錯的是餵給它的解析度。這跟壓測一模一樣：壓測綠了，驗證的是「我設計的負載下我的系統撐得住」，不是「現實撐得住」。\n\n### 推演題2 **[20 分鐘]** ★★★（反事實）\n\n反事實演練。下面兩個改動，各**單獨**實施，哪一個更能阻止這場沉沒？說明各自會在哪一步打斷因果鏈，以及它各自的代價與盲點。\n（A）在設計階段，對 tricell 這個應力集中接點**單獨用加密網格做一次獨立精細複算**。\n（B）不動 FEA，但在牆厚與配筋上整體加大安全係數（例如把所有牆做厚 50%）。\n\n#### 推演解答\n\n**(A) 加密網格獨立複算**直接消滅根因 F9：一旦在 tricell 用夠細的網格重算，那 47% 的低估會現形，工程師會發現牆需要更厚、配筋需要更多，缺陷在凝固進混凝土之前就被攔下。這是最乾淨、最對症的修法——事後 SINTEF 正是這樣重算才精準預測了破裂深度。代價：你得**先知道 tricell 是高風險的應力集中處**才會去加密它；如果你不知道哪裡是「最該細看的角落」，你就不知道該把網格加密在哪。盲點：它只修了「這一個」接點；結構裡可能還有別的應力集中處同樣被粗網格低估了。\n\n**(B) 整體加大安全係數**不修根因，但用一層**無差別的餘裕**去吸收未知的模型誤差：就算某處被低估 47%，只要整體裕度夠大，也許還是撐得住。代價很實在：把所有牆做厚、配筋加倍，意味著更多混凝土、更重、更貴、更難施工——而且大部分餘裕花在根本不需要的地方。盲點：如果某個角落的低估**超過**你加的裕度（47% 不小），它照樣會爆；無差別的安全係數對「集中在單點的大幅低估」防護效率很低。\n\n判斷：(A) 更根本，因為它在源頭讓模型對齊現實；(B) 是縱深防禦，在「你不知道哪裡會被低估」時提供一張無差別的安全網。焦慮工程師的答案是**兩個都要**——對你而言就是：對最關鍵的假設做獨立的精細驗證（加密網格＝壓你最怕的曲線），同時對整個系統保留合理的容量餘裕（別把利用率規劃到 95%，留出吸收模型誤差的空間）。但要清醒：餘裕能吸收「均勻的、適度的」低估，吸收不了「集中在某個角落的、巨大的」低估——那種只能靠把那個角落看清楚。\n\n### 推演題3 **[15 分鐘]** ★★（對帳）\n\n把你維運過的一次「模型與現實不符」的事故，對應到 F9（模型對現實的假設錯了）。要求：寫出當時「模型/壓測說什麼」與「現實實際發生什麼」的分岔點，以及那個被低估的假設藏在哪個「tricell」角落（你模型網格最粗的地方）。\n\n#### 推演解答\n\n（因人而異，以下是評判標準與一個範本。）\n\n好的對帳要能明確指出**模型的假設**與**現實的行為**在哪裡分岔，以及那個假設為什麼平時看不出來。範本：容量規劃時假設「快取命中率穩定在 95%」，據此估後端 DB 只需承接 5% 的流量，壓測也照這個比例打，全綠。上線後某次部署清空了快取，命中率瞬間掉到 0%，全量流量打到 DB，DB CPU 爆、連線池耗盡、雪崩。分岔點：「95% 命中率」這個假設，在快取冷啟動的瞬間為假——而壓測從沒打過「快取全冷」這個形狀。那個 tricell，就是「冷啟動/快取失效時的後端負載」這個我模型裡網格最粗的角落。\n\n關鍵是第二問：那個被低估的假設，為什麼藏在那個角落？因為它是**退化路徑**——平時不走，只在出事時走，所以最少被建模、最少被壓測。Sleipner 的 tricell 是「沉到夠深才出現的剪力」，你的 tricell 是「退化時才出現的負載形狀」。兩者都是「平時看不見、出事那天唯一在跑的路徑」。\n\n不及格的對帳：只說「壓測沒抓到所以上線爆了」——那沒有指出**哪個具體假設**錯了、錯在哪個角落。F9 的核心不是「測試不充分」，是「我信任了一個模型，而模型對現實的某個假設，在某個我沒細看的角落，被低估了」。能講出那個具體的假設和那個具體的角落，才算過關。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 「FEA 分析通過」這句話，驗證的到底是什麼？它**沒有**驗證什麼？\n2. tricell 是什麼？為什麼它是應力集中處？為什麼粗網格恰好在這裡失真？\n3. 為什麼這不是「NASTRAN 的 bug」、也不是「混凝土品質差」？把根因用「人怎麼用工具」這句話講清楚。\n4. 事後用加密網格重算、預測破裂在約 62 m（真實約 65 m）——這件事為什麼是整個案例最有力的一槍？它證明了什麼？\n5. 列出至少三層各自獨立的孔洞，並說明任何一層擋住，這座基座就不會沉。為什麼「FEA 低估剪力是主因」是不完整的問法？\n6. 受控測試這一層「擋住」了什麼、又「沒擋住」什麼？為什麼說 Sleipner 是「相對幸運」的災難？\n7. 你的容量規劃/壓測裡，哪個假設最可能與現實偏離？那個「tricell」（你模型網格最粗的角落）在哪？\n8. 為什麼「壓測通過」不等於「現實安全」？用 Sleipner 的話對一個資淺工程師講清楚這個區別。\n\n## 延伸閱讀\n\n- **SINTEF 技術調查（Statoil 委託）** — 一手技術調查的權威來源。結論把根因明確定在「NASTRAN 有限元素分析對 tricell 牆剪應力的不準確計算（低估約 47%）＋偏不保守的混凝土設計」，而非材料或施工。這份調查是「模型誤差如何凝固成結構缺陷」的權威定錨。\n- **Douglas N. Arnold, \"The sinking of the Sleipner A offshore platform\"（明尼蘇達大學數學系教案）** — 一位數值分析學者把這場災難寫成有限元素法的經典反例：為什麼網格的細緻度不是「精度的微調」而是「對不對」的問題。讀它如何用加密網格重現破裂深度（約 62 m 預測 vs 約 65 m 真實），你會對「離散化即假設」有刻骨的理解。https://www-users.cse.umn.edu/~arnold/disasters/sleipner.html\n- **B. Jakobsen, \"The Sleipner accident and its causes\"（*Engineering Failure Analysis*）** — 由參與調查者撰寫的技術回顧，細談 tricell 幾何、剪力分布與配筋錨定不足。適合想看「工程師當年面對的真實約束」的讀者。\n- **Equinor / Norsk industriminne, \"Sleipner A GBS – lost and replaced\"** — 業主方的事件敘事與後續重建，含「22 人安全撤離」與 NOK 計損失口徑，適合校對規模與時序細節。https://equinor.industriminne.no/en/sleipner-a-gbs-lost-and-replaced/\n"}, {"id": "ch10-cloudflare-regex", "file": "ch10-cloudflare-regex.md", "group": "Part IV — 連鎖反應", "title": "ch10 — Cloudflare 的一條 regex：災難性回溯如何在數分鐘內拖垮半個網路", "md": "# ch10 — Cloudflare 的一條 regex：災難性回溯如何在數分鐘內拖垮半個網路\n\n> **本章解剖什麼**：一條被部署到全球的防火牆規則裡，藏著一段會「災難性回溯」（catastrophic backtracking）的正規表達式。它本身連一個 byte 都沒寫錯——它合法、它能編譯、它平時也跑得好好的。但當它遇到夠長、夠刁鑽的輸入，回溯式 regex 引擎為了確認「比不中」而嘗試的回溯路徑會爆炸性成長，把每一顆 CPU 核心吃到 100%。這是 Part IV「連鎖反應」的開場——前三個 Part 看的是機器、自動化、一個壞數字怎麼崩；從這裡開始，主角是**緊耦合**：一處 CPU 病態，沒有任何緩衝，同步傳導到全球每一個節點。主打 **F2**（互動複雜度：regex 引擎的指數級回溯病態）、**F12**（變更即觸發：一次部署）、**F14**（規模放大：一次推全球、無金絲雀）、**F1**（緊耦合：CPU 一滿，正常流量直接 502）。它與 ch18 Morris 蠕蟲（見 ch18）是一對：那邊是程式自我繁殖的非同步級聯，這邊是設定一次同步推全球——同樣是 monoculture，放大機制相反。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex ◄你在這裡\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n先講一件你大概沒寫成 incident、但心裡一直有個底的事。\n\n你維運過吃使用者輸入的服務。某個欄位——一個 email 驗證、一個 URL 正規化、一段 log 解析、一個從 query string 抽欄位的 middleware——背後是一條 regex。它通過了測試，通過了 code review，上線跑了好幾個月，p99 漂亮。你大概沒特別想過它，因為它「很快」——對你餵給它的那些輸入而言。\n\n但你心裡其實知道一件事：regex 在 Node 的 V8（用的是 Irregexp 這種回溯引擎）上，**最壞情況不是你測過的那些輸入**。你可能在某次 profiling、或某篇文章裡，瞄到過「ReDoS」這三個字母，知道有一類 regex 在特定輸入下會從毫秒級炸到秒級、甚至把整個 event loop 卡死。Node 是單執行緒事件迴圈——一條 regex 在熱路徑上跑爆，卡住的不是「這個請求」，是**這個 process 上的每一個請求**。你那套招牌的多層 cache library、那條冪等的 SQS consumer，全都共用同一個被卡死的 event loop。\n\n你大概也做過「規則／設定的全量推送」。一個 feature flag、一條新的 rate-limit 規則、一份更新的 WAF 或 schema 設定——你按下去，它在幾秒內到達所有 ECS task。你信任這個動作，因為「它只是設定，不是程式碼」。\n\n把這兩件事擺在一起：**一條沒設防的 regex，跑在熱路徑上、吃使用者輸入**，加上**一次推全球、沒有 canary、沒有 CPU 護欄的設定部署**。這就是一顆 CPU 炸彈，同時投到每一個節點。\n\n2019 年 7 月 2 日，Cloudflare 把這兩件事同時做到了。差別只在於，它的「每一個節點」是分佈在全球、扛著當時相當一部分網際網路流量的代理網路。一條合法的 regex，27 分鐘內讓全球流量掉了約八成。\n\n焦慮工程師的第一信條是「『應該沒事吧』是訃聞的第一句」。這一章的「應該沒事吧」特別陰險——因為它有兩層：「這條 regex 應該不會慢吧」（它平時真的不慢），加上「設定推全球應該沒事吧」（它平時真的沒事）。兩個各自合理的假設，恰好對齊那一天。\n\n## 冷開場：13:42 UTC，PagerDuty 開始響\n\n2019 年 7 月 2 日，世界協調時間（UTC）13:42。\n\n一名 Cloudflare 工程師透過自動化流程，部署了一筆 WAF（Web Application Firewall，網頁應用程式防火牆）受管規則（Managed Rule）的更新。這是再日常不過的動作——WAF 規則就是這樣維護的，為了應對新出現的攻擊手法，規則庫需要能快速更新。這次更新的目的，是加強對某一類跨站腳本（XSS）攻擊的偵測。\n\n部署完成。沒有編譯錯誤，沒有語法錯誤，所有自動化檢查都過了。\n\n三分鐘後，13:45，PagerDuty 開始響。Cloudflare 的合成監控（synthetic monitoring）裡，一個專門測 WAF 的測試失敗了。緊接著，全球各地的邊緣節點開始回報同一件事：**CPU 衝到接近 100%，而且下不來**。\n\n不是某一個資料中心。是全球。\n\n對外的症狀來得又急又全面：客戶網站開始大量回傳 **502 Bad Gateway**。Cloudflare 的前線伺服器（front-line）還活著、還能接 TCP 連線，但它們把請求往後送給負責 HTTP/HTTPS 處理的程序時，那些程序的 CPU 已經被吃光、回不了話。於是前線只能對使用者吐 502。\n\n全球流量驟降約 **80%**（這是 Cloudflare 自己事後給的數字，照 landscape）。Discord、Shopify、Notion、Glassdoor……以及大量把 Cloudflare 擺在自己網站前面的服務，在同一瞬間一起變得不可達。對當時的網際網路來說，這看起來像半個網路斷了線。\n\n最初幾分鐘，Cloudflare 內部的第一個假設是：**我們是不是被打了？** 一次大規模、針對性的 DDoS 攻擊，能造成的徵狀正是這樣——CPU 飽和、流量被擠掉。這個誤判很自然，後面會看到它其實偷走了寶貴的幾分鐘。\n\n但這不是攻擊。沒有任何外部敵人。把全球 CPU 吃光的，是 Cloudflare 自己三分鐘前部署的那條規則裡，一段合法的正規表達式。\n\n## 裝填：兩道早就被吃掉的邊界\n\n要看懂這顆炸彈為什麼一觸即發，得先看它在 7 月 2 日之前，已經被「裝填」好了哪些潛伏條件。觸發只是最後一根稻草——災難早就準備好了（這是 F8 潛伏條件 vs 觸發，ch02 已定義過）。\n\n**潛伏條件一：底層引擎用回溯式匹配，對指數級回溯不設防。**\n\nCloudflare 當時那一代 WAF 跑在一套 Lua 架構上，正則匹配用的是 PCRE（Perl Compatible Regular Expressions）這類回溯式引擎。這不是 bug，是這類引擎的設計本質——它支援反向引用（backreference）、前後查找（lookahead/lookbehind）這些「真正的正規語言」做不到的功能，代價是放棄了「保證線性時間」這件事。一條結構不良的 regex，配上對的輸入，回溯步數會爆炸。引擎本身對此**沒有任何複雜度上限**。這個性質在它被選用的那一刻就存在了，只是平時沒人去踩。\n\n**潛伏條件二：本來該兜底的 CPU 護欄，幾週前被人移走了。**\n\n這是本案最關鍵、也最容易被略過的一層。在 7 月 2 日之前的「數週前」，Cloudflare 對 WAF 做過一次重構（refactoring）。諷刺的是，那次重構的目的，正是**讓 WAF 用更少的 CPU**。就在那次重構裡，一個本應限制「單一 regex 能用多少 CPU」的保護機制，被**誤刪了**（landscape 與官方 postmortem 一致）。\n\n請停下來體會這個形狀。一個用來防「某條 regex 失控吃 CPU」的安全機制，在一次以「省 CPU」為目標的重構中被移除。它被拿掉的時候,什麼事都沒發生——因為當時沒有失控的 regex。它的價值是「在未來某天有條 regex 失控時，把傷害限制在這條 regex 上」。一個只在罕見情況下才有用的防禦，被移除時的代價是零、是隱形的，直到那個罕見情況真的來了。這正是焦慮工程師最怕的那種改動：**你拿掉了一張只在最壞情況下才會展開的安全網，而最壞情況平時不來，所以沒人會在 review 時喊停。**\n\n到 7 月 2 日早上，這套系統的狀態是：一個對回溯不設防的引擎，加上一個剛剛被拆掉 CPU 護欄的執行環境。炸藥裝好了，引信還沒點。\n\n## 觸發：那段 `.*(?:.*=.*)`\n\n7 月 2 日 13:42 推出的那條新規則，包含這樣一段正規表達式（照 landscape 原文）：\n\n```\n(?:(?:\\\"|'|\\]|\\}|\\\\|\\d|(?:nan|infinity|true|false|null|undefined|\nsymbol|math)|\\`|\\-|\\+)+[)]*;?((?:\\s|-|~|!|{}|\\|\\||\\+)*.*(?:.*=.*)))\n```\n\n整條看起來很嚇人，但致命的不是前面那一長串列舉。致命的是末端那一小片：\n\n```\n.*(?:.*=.*)\n```\n\n把雜訊去掉，它的骨架是 `.*.*=.*`——**三個貪婪的 `.*`，其中兩個彼此重疊地去吃同一段文字**。問題就出在這個「重疊」。\n\n這條規則的工作，是檢查 HTTP 請求的某些欄位裡有沒有可疑內容。也就是說，它直接吃**使用者輸入**，而且跑在每一個經過 Cloudflare 的請求的熱路徑上。對大多數短輸入，它跑得飛快。但只要輸入夠長、又恰好「比不中」（沒有要找的那個結構），回溯引擎就會陷進去。\n\n### 為什麼回溯會炸——給看過自動機的你\n\n你對 regex 與自動機有興趣，這段值得講清楚，因為它正是「災難性回溯」與「一個普通的慢查詢」之間的本質差別。\n\n理論上，一條「乾淨」的正規表達式（沒有反向引用那些東西）對應一個 NFA（非確定有限自動機）。NFA 可以被編譯成 DFA，或用 Thompson 的方法模擬，在 **O(n)**（n 是輸入長度）時間內判定「中或不中」——這是正規語言的美好性質，輸入再長，時間也只是線性成長。如果 Cloudflare 用的是這種引擎（像 Go 的 RE2、Rust 的 regex crate），這一天根本不會發生。\n\n但 PCRE 這類引擎不是這樣跑的。它用的是**回溯式**模擬：遇到 `.*` 這種貪婪量詞，它先讓 `.*` 吃掉它能吃的最多字元，然後試著匹配後面的部分；如果後面匹配失敗，它就**吐回一個字元**，再試一次；再失敗，再吐一個……這個「吐回去重試」的動作，就是 backtracking。\n\n對單一個 `.*` 來說，這頂多是線性的回退。問題出在 `.*.*` 這種**重疊**結構：要在長度 n 的字串裡決定「第一個 `.*` 吃幾個字、第二個 `.*` 吃幾個字」，組合數是 O(n²) 量級；而在這條規則裡，因為末端要找的 `=` 在「比不中」的輸入裡根本不存在，引擎必須把**每一種拆法都試到底、全部失敗**，才能宣告「比不中」。每多一個重疊的貪婪量詞，可能的拆法又多乘一層；當量詞像 `(a+)+`、`(.*)*` 這樣**巢狀**起來時，路徑數會變成真正的指數級 **O(2ⁿ)**——每多一個字元，工作量大致翻倍。\n\nCloudflare 在 postmortem 裡用自己的引擎做了實測，數字很有說服力（照官方 postmortem）：\n\n| 輸入 | 比對所需步數 |\n|---|---|\n| `x=x`（用 `.*.*=.*` 比） | 23 步 |\n| `x=` 後接 20 個 `x` | 555 步 |\n| 同樣 20 個 `x`，但用帶分號的變體 `.*.*=.*;` | 5,353 步 |\n\n注意這個爆法：輸入只長了一點，步數從 23 跳到 555、再跳到 5,353。Cloudflare 那段 `.*(?:.*=.*)` 的重疊結構，在「比不中」的長輸入上正是這種超線性（super-linear）爆炸——嚴格說它更接近多項式量級的爆炸，而非教科書 `(a+)+` 那種純指數，但對一台正在處理真實流量、輸入長度不受控的 CPU 來說，多項式爆炸已經足夠致命（這點我區分清楚、不誇大成指數）。\n\n關鍵是這跟「一個慢查詢」的差別。慢查詢是**對所有輸入都慢一點**——你會在 p99 上看到它、在容量規劃時算進去、它隨負載線性成長。災難性回溯是**對絕大多數輸入飛快、對特定一類輸入瞬間爆炸**：它不在你的 p99 裡，不在你的壓測場景裡（除非你恰好餵了那種輸入），它平時隱形，直到真實流量裡出現一個夠長、結構恰好的字串，把單一請求的 CPU 從微秒拉到把整顆核心吃滿。它不是「比較重的工作」，是「一個輸入引爆的局部無窮迴圈」。\n\n## 連鎖：從一個請求，到全球八成流量消失\n\n現在把潛伏條件和觸發接起來，看孔洞怎麼一個個被穿透。\n\n13:42，新規則經 Cloudflare 的 **Quicksilver** 推送出去。Quicksilver 是 Cloudflare 自家的全球鍵值分發系統，能在**秒級**把設定散佈到全球每一個節點——postmortem 提到它平時每秒分發約 350 筆變更、全球分發的 p99 約 2.29 秒。這是一個了不起的工程成就：它讓 Cloudflare 能在幾秒內對全球同時生效一條防禦規則。\n\n但這次，它幾秒內對全球同時生效的，是一顆 CPU 炸彈。**規則一次推全球，沒有分批、沒有金絲雀（canary）**——WAF 規則為了能快速反應新威脅，被設計成繞過分階段發布。於是這條規則不是先到 1% 節點、跑出異常、被擋下；它是在約兩秒內，同時抵達每一個節點（這是 F14 規模放大／monoculture：同質化＋同步推送，讓單點缺陷一次打中所有人）。\n\n每個節點開始用這條 regex 比對流經它的真實請求。真實流量裡本來就有各種長字串——只要其中一個的結構讓那段 `.*(?:.*=.*)` 陷入回溯，處理它的那個程序的 CPU 就被一個請求吃滿。請求一個接一個來，CPU 釘在 100% 下不來。\n\n這裡是**緊耦合**（F1）登場的地方。CPU 一旦被吃光，沒有任何緩衝、沒有時間餘裕去吸收它：負責 HTTP 處理的程序回不了話 → 前線伺服器等不到回應 → 對使用者吐 502。一個內部的 CPU 病態，沒有經過任何降級層、任何 bulkhead，直接變成外部使用者眼前的錯誤頁。本來該兜底的「單一 regex CPU 上限」護欄——本案最關鍵的那道起司孔洞——幾週前已經被移走了，所以這條失控的 regex 沒有任何上限把它的傷害限制在「這一條規則」上，它直接拖垮了整個 WAF 程序，連帶拖垮了正常流量的處理。\n\n而**監控盲區**也插了一腳：最初幾分鐘，團隊的第一假設是 DDoS 攻擊。徵狀太像了——CPU 飽和、流量被擠。這個合理但錯誤的初始判斷，讓診斷往攻擊方向走了一段，才轉回「是不是我們自己剛推的東西」。在每一秒都是流量的場景裡，這幾分鐘很貴。\n\n## 餘波：14:07 的 kill switch\n\n13:45 PagerDuty 響。團隊排除攻擊、鎖定 WAF 是元凶，大約在 14:00。\n\n止血的手段是一個全域的 **WAF kill switch**（官方稱 global WAF kill switch / global terminate）。14:02，有人提出動用它；14:07，WAF 在全球被關閉。\n\n請注意這個決定的形狀——它正是 ch22 會講的「韌性」核心手段之一（見 ch22）。kill switch 不是「修好那條 regex」，是「先把整個出問題的子系統關掉，讓流量恢復，再從容處理壞掉的東西」。它承認了一件事：在全球 CPU 燒滿、每秒損失大量流量的當下，**最快的恢復不是修復，是切斷**。能安全地關掉 WAF（即使代價是這段時間沒有 WAF 防護），意味著 WAF 與「轉發流量」這兩件事在架構上是可分離的——這是一道刻意保留的逃生口。\n\n14:07 WAF 關閉，14:09 CPU 與流量恢復正常。從觸發到恢復，**27 分鐘**（13:42–14:09 UTC，照 landscape）。隨後團隊移除壞規則、測試，14:52 把 WAF 重新全球啟用。\n\n事後，Cloudflare 的 CTO John Graham-Cumming 在 7 月 12 日發了一篇詳盡到罕見的公開 postmortem，逐項坦承：Quicksilver 跳過了分階段發布、先前的重構誤移除了 CPU 保護、用回溯式引擎跑會吃使用者輸入的 regex。沒有甩鍋給「那個寫 regex 的人」——因為真正的問題從來不是那條 regex，是讓那條 regex 能造成這麼大傷害的整套系統條件。\n\n無人傷亡。這是一場純粹的可用性事故。但它的形狀，值得你記很久。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n- **潛伏條件**（早就裝填好的）：(1) 底層用 PCRE 回溯式引擎，對指數／超線性回溯本質不設防；(2) 幾週前一次「省 CPU」的重構中，限制單一 regex CPU 用量的護欄被誤刪——最後的資源兜底沒了；(3) WAF 規則被設計成經 Quicksilver 一次推全球、無金絲雀；(4) WAF 規則被當「設定／資料」而非「程式碼」對待，沒套用同等的效能測試與灰度發布。\n- **觸發**（最後一根稻草）：7 月 2 日 13:42 部署的一條新 WAF 規則，內含 `.*(?:.*=.*)` 這段重疊貪婪量詞的 regex，對真實流量中的長輸入產生災難性回溯。\n\n把觸發拿掉，潛伏條件還在，等下一條結構不良的 regex；把潛伏條件補上任一道（沒移除 CPU 護欄／用 RE2 類引擎／規則先 canary），同一條 regex 也炸不了全球。**這不是「一條爛 regex」的故事，是四道孔洞恰好對齊的故事。**\n\n### 起司的孔洞\n\n```\n請求進來 ─┬─[防線1: regex 引擎複雜度保證]── 破洞: 用回溯式 PCRE，無上限\n          │\n          ├─[防線2: 單一 regex CPU 護欄]──── 破洞: 幾週前重構中被誤刪 ★本案核心\n          │\n          ├─[防線3: 分批/金絲雀發布]──────── 破洞: Quicksilver 一次推全球，無 canary\n          │\n          ├─[防線4: 規則=程式碼的測試紀律]── 破洞: 當設定看待，無效能/回溯測試\n          │\n          └─[防線5: 緊急切斷 (kill switch)]─ 唯一沒破: 14:07 動用，27 分止血\n                                              ↓\n                                        全球流量恢復\n```\n\n| 防線 | 為什麼沒擋住 |\n|---|---|\n| 引擎本身的複雜度保證 | 選了回溯式 PCRE（為了功能性），它對 catastrophic backtracking 不設防——這是引擎類型的本質取捨，不是 bug |\n| 單一 regex 的 CPU 上限 | **本案核心孔洞**：幾週前以「省 CPU」為目標的重構誤移除了它，拿掉時無害、出事時致命 |\n| 分批／金絲雀發布 | WAF 規則為求快速反應威脅，刻意繞過分階段發布，經 Quicksilver 秒級推全球 |\n| 把規則當程式碼測試 | 規則被視為設定／資料，未跑效能或回溯複雜度檢查，缺陷沒在上線前被攔 |\n| 緊急切斷 | **唯一沒破的一層**：kill switch 存在且可用，是它把 27 分鐘止住、而非 27 小時 |\n\n注意這張表反駁了「單一根因」的衝動：把任何單一一層補起來，這場事故都不會以這個規模發生。能問的問題不是「誰寫了爛 regex」，是「**為什麼這條 regex 能一路穿透到全球每一顆 CPU**」。\n\n### 對應模式\n\n- **F2（互動複雜度）**：regex 引擎的指數／超線性回溯，是「子系統內部有設計者沒充分想到的非線性行為」的純粹範例——同一條規則，對 99.99% 輸入是線性快、對特定一類輸入是爆炸。慢得非線性、非預期，這就是 F2。\n- **F12（變更即觸發）**：災難在 13:42 的一次部署被點燃。「動了它」就是觸發——不是流量變了、不是攻擊來了，是推了一筆設定。\n- **F14（規模放大／monoculture）**：所有節點跑同一套規則、經 Quicksilver 同步生效，同質化＋規模讓單點缺陷一次打中全球。\n- **F1（緊耦合）**：CPU 一滿，沒有緩衝、沒有降級層，直接變成使用者眼前的 502。內部病態零時差傳導成外部故障。\n\n### 一句話形狀\n\n**這場災難的形狀是：一條合法但會災難性回溯的 regex，跑在吃使用者輸入的熱路徑上、剛被拆掉 CPU 護欄、又一次同步推送到全球每個節點——於是一顆 CPU 炸彈在同一瞬間被投到所有節點，緊耦合讓它在 27 分鐘內變成全球八成流量消失。**\n\n順帶把三件常被混為一談的事分清楚（照 landscape，這是本章必須校正的迷思）：\n\n- **2019-07-02（本章）**：WAF regex 災難性回溯 → 全球 CPU 100% → 27 分鐘、流量掉約 80%。根因是 **CPU／regex**。\n- **2020 的 BGP 路由事件**：另一回事，根因在路由設定／網路層，不是 CPU。\n- **2025-11 的設定檔事件**：又是另一回事，根因在某份設定檔。\n\n三者都是 Cloudflare、都是「變更即觸發」家族，但根因不同、機制不同，不要當成同一件事。本章只解剖 2019-07-02 這一場。\n\n## 換成你的系統\n\n你活在這個形狀的正中央。\n\n**先點名一個你「應該沒事吧」的假設**：你那些跑在 Node 服務熱路徑上、吃使用者輸入的 regex 與 parser，**最壞情況是有界的**。\n\n這個假設錯的時候會這樣壞：你的某條 email／URL／user-agent 驗證 regex，或某個解析使用者貼上來的字串的 parser，含一個你沒注意到的重疊或巢狀量詞（`(a+)+`、`.*.*`、`(\\w+\\s?)*` 這類）。它通過了所有測試——因為你的測試輸入都「比得中」、或都很短。某天，一個真實使用者（或一個知道 ReDoS 的攻擊者）送來一個長度幾十、結構恰好「比不中」的字串。處理那個請求的 V8 回溯引擎陷進去，把 event loop 卡住——而 Node 是單執行緒的，卡住的不是這一個請求，是**這個 process 上的所有請求**。你的 health check 開始逾時，HPA 以為這個 task 掛了、把它換掉、把流量導到別的 task——但別的 task 也在跑同一條 regex、也會被同樣的輸入打趴。你親手做的 graceful degradation 多層 cache 在這裡幫不上忙：它降級的是「下游慢／不可用」，不是「我自己的 CPU 被自己的 regex 吃光」。\n\n**第二個假設**：你的規則／設定變更「只是設定，不是程式碼，所以不用 canary」。Cloudflare 的 WAF 規則就是「設定」，但它驅動執行期計算、會吃 CPU。你的 rate-limit 規則、feature flag、動態下發的 schema 或 validation 規則，只要它在執行期被「跑」，它就是程式碼，就該有跟程式碼一樣的灰度發布與資源護欄。\n\n可操作的自問，三個：\n\n1. **我的熱路徑上，有沒有跑在使用者輸入上的 regex／parser？** 把它們列出來。對每一條，問：它有沒有重疊或巢狀量詞？我有沒有對「比不中的長輸入」做過壓測？（工具層面：用 RE2／linear-time 引擎重寫高風險的，或對單條 regex 設執行逾時／輸入長度上限——這正是 Cloudflare 被拆掉的那道護欄。）\n2. **我的規則／設定變更，是不是一次推全部？** 有沒有 canary／分批，讓壞東西先在 1% 流量上現形再被擋下？\n3. **我有沒有 kill switch？** 當某個子系統（WAF、某條規則、某個 feature）開始燒 CPU，我能不能**在不重新部署的前提下，幾秒內把它整個關掉**，讓主流量恢復？Cloudflare 那 27 分鐘能止住，靠的就是這個。\n\n最後一個橋接，回到本章與 ch18 的對照（見 ch18）：Morris 蠕蟲是程式**自我繁殖**的非同步級聯——它一台感染一台，像火苗蔓延。Cloudflare 這場不是自我繁殖，是**同步推送**——一次把同樣的東西放到所有節點，像在每張桌上同時點火。兩者的共通點是 monoculture（同質化讓單一缺陷通殺），但放大機制相反：一個靠時間蔓延，一個靠空間同步。你的世界裡兩種都有——retry storm／cache 踩踏是自我繁殖型（見 ch11 的金融版正回授），而「自動更新一次推全球」是同步型（見 ch13 的 CrowdStrike）。問自己：我的哪個機制是哪一型？它有沒有對應的剎車？\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n口頭（或寫在紙上）向另一個工程師解釋：為什麼「災難性回溯」是一種與「普通慢查詢」**本質不同**的失效？請務必講到：(a) 乾淨的正規式對應 NFA／可線性時間判定，回溯引擎為什麼放棄了這個保證；(b) `.*.*=.*` 這種重疊量詞在「比不中」的長輸入上為什麼步數爆炸；(c) 為什麼這種 regex 不會出現在你的 p99 或壓測裡，卻能在生產環境瞬間吃滿一顆 CPU。\n\n#### 推演解答\n\n(a) 一條沒有反向引用／環視的正規式，理論上對應一個 NFA，可編譯成 DFA 或用 Thompson 模擬，在 O(n) 時間內判定中或不中——輸入再長，時間只線性成長。RE2、Rust regex crate 走這條路。PCRE／PCRE2、V8 Irregexp、Python `re`、Java 預設等走**回溯式**模擬：為了支援反向引用、lookahead/lookbehind 這些超出正規語言的功能，它們放棄了線性時間保證，改用「貪婪吃滿→失敗就吐回一個字元重試」的回溯。功能換來了最壞情況的不確定性。\n\n(b) 對單一 `.*`，回溯是線性的。但 `.*.*` 是**重疊**的兩個貪婪量詞去分配同一段文字，要試「第一個吃幾個、第二個吃幾個」的所有拆法，是 O(n²) 量級；末端要找的 `=` 在「比不中」的輸入裡不存在，所以引擎必須把**每一種拆法都試到失敗**才能宣告比不中。Cloudflare 自己的實測：`x=x` 23 步、20 個 x 變成 555 步、帶分號變體 5,353 步——輸入只長一點，步數爆增。巢狀量詞（`(a+)+`）會更糟，達 O(2ⁿ) 真指數。\n\n(c) p99 與壓測量的是「對你餵的那些輸入」的時間。災難性回溯對絕大多數輸入飛快、只對特定結構＋夠長的「比不中」輸入爆炸。除非你的壓測恰好包含那種對抗性輸入，否則它隱形。慢查詢是對所有輸入都慢一點（會進 p99、隨負載線性成長）；災難性回溯是「一個輸入引爆的局部無窮迴圈」，平時不存在，出現一次就把一顆核心釘死。\n\n### 推演題2 **[20 分鐘]** ★★\n\n反事實：四道潛伏孔洞——(i) 回溯式引擎、(ii) 被誤刪的單一 regex CPU 護欄、(iii) 無金絲雀的全球推送、(iv) 規則未當程式碼測試——如果**只補回其中一道**，這場 27 分鐘全球事故會變成什麼樣子？逐一推演。\n\n#### 推演解答\n\n- **只補回 (ii) CPU 護欄**：那條 regex 仍會災難性回溯，但每條 regex 的 CPU 用量被限住——失控的只是「這條規則」，它被 throttle 或跳過，WAF 其餘部分與正常流量繼續跑。可能有少量誤判或 WAF 部分降級，但**不會全球流量掉 80%**。這就是為什麼 landscape 把它標為「本案核心孔洞」：它是傷害的最後兜底。\n- **只補回 (iii) 金絲雀**：規則先到 1% 節點。那 1% 的 CPU 立刻飆滿、合成監控報警、自動 rollback——壞規則在到達全球前就被擋下。**爆炸半徑從全球縮成 1%。** 代價是新威脅的防禦規則生效慢幾分鐘（這正是 Cloudflare 當初繞過分階段發布的理由，是個真實的取捨）。\n- **只補回 (i) 線性時間引擎（RE2 類）**：這條 regex 根本不會災難性回溯——RE2 對任何輸入都 O(n)。代價是失去反向引用／環視等功能，且這是個大工程遷移。事故直接不發生。\n- **只補回 (iv) 把規則當程式碼測試**：若上線前對規則跑 ReDoS／回溯複雜度檢查（如 `redos`-detector 類工具），這條規則可能在 CI 就被擋下。但這依賴檢查工具夠完整——是機率性的防線，不如前三道那麼確定。\n\n結論：任何**單一**一道補回，都能把「27 分鐘全球」降一個數量級。災難需要四道同時破——這就是瑞士起司。\n\n### 推演題3 **[15 分鐘]** ★★★（對帳）\n\n把你維運過的一次真實 incident，對應到本章的 F 模式。具體做法：找一次「一個內部資源（CPU／記憶體／連線池／event loop）被某種輸入或某次變更打爆，然後沒有緩衝地傳導成外部故障」的事件。逐項問：它的觸發是不是一次變更（F12）？它有沒有同質化＋同步放大（F14）？內部病態到外部故障之間，有沒有任何緩衝／降級層，還是緊耦合直通（F1）？那個爆掉的子系統內部，有沒有設計者沒想到的非線性行為（F2）？\n\n#### 推演解答\n\n（開放題，自答。）一個常見對應：某次部署引入一段 N+1 query 或一個沒有上限的 batch，在特定資料分佈下讓 RDS CPU 飆滿（呼應你那次「尖峰 RDS CPU 降 40%」的反面——這次是讓它衝上去）。對帳：觸發＝部署（F12 ✔）；若該服務所有 task 跑同一份壞碼、HPA 把流量導去的新 task 也一樣會爆（F14 ✔，同質化）；DB CPU 滿→連線池耗盡→上游逾時→使用者看到錯誤，中間若無 circuit breaker／降級就是緊耦合直通（F1）；「特定資料分佈才爆、平時沒事」就是 F2 的非線性。能把一次自己的 incident 講成「哪幾道孔洞對齊」，而不是「都是某個 PR 的錯」，這題就過了。重點不是找到完美對應，是養成用孔洞語言、而非單一根因語言複述事故的習慣。\n\n### 推演題4 **[20 分鐘]** ★★（設計題）\n\n你要保護一個 Node 服務的熱路徑，上面有一條吃使用者輸入的 regex。請設計**三道**防線，並說清楚每一道各擋住本章孔洞清單裡的哪一段、它的代價是什麼。\n\n#### 推演解答\n\n一個合理的三道防線（深度防禦，對應四道孔洞）：\n\n1. **輸入閘門 + regex 逾時／長度上限**（擋孔洞 ii）：對使用者輸入先做長度上限與字元集檢查；對高風險 regex，在能設逾時的執行環境（如 worker thread、或用支援 timeout 的引擎）裡跑，超時即放棄並回 4xx。這直接重建 Cloudflare 被拆掉的那道「單一 regex CPU 護欄」。代價：worker thread 有 IPC 開銷、長度上限可能擋掉極少數合法長輸入。\n2. **換 linear-time 引擎重寫高風險 regex**（擋孔洞 i）：把熱路徑上、結構含重疊／巢狀量詞的 regex 用 RE2（Node 有 `re2` binding）重寫，獲得 O(n) 保證。代價：失去反向引用／環視；遷移與測試工。對「只需匹配、不需那些進階功能」的驗證型 regex，這是最乾淨的解。\n3. **CI 階段的 ReDoS 靜態檢查 + 金絲雀部署**（擋孔洞 iii、iv）：CI 跑 ReDoS detector 攔明顯的災難性結構；規則／設定變更走 canary，先到一小部分流量、看 CPU 指標正常再放大。代價：CI 多一道（可能有偽陽性）、部署變慢。\n\n排序原則：(1) 是最後兜底（一定要有，因為靜態檢查不可能完整）；(2) 性價比最高（從根上消除回溯可能）；(3) 防的是「下一條還沒寫的壞 regex」與「全球同步爆」。三道分別對應「限制傷害／消除成因／攔在上線前」——任一單獨都不夠，疊起來才是瑞士起司的正面用法（見 ch22）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說「這不是一條爛 regex 的故事」？把四道潛伏孔洞講出來，並說明拿掉觸發、災難仍裝填著。\n2. 「災難性回溯」與「一個普通慢查詢」的本質差別是什麼？為什麼後者進得了你的 p99、前者進不了？\n3. 用自動機的語言解釋：為什麼乾淨的正規式能線性時間判定，而 PCRE 這類回溯引擎放棄了這個保證、換到了什麼？\n4. `.*.*=.*` 在「比不中」的長輸入上，回溯步數為什麼爆炸？它跟 `(a+)+` 那種純指數的差別在哪？\n5. 為什麼「幾週前那次重構移除 CPU 護欄」在當下看起來完全無害，卻是本案的核心孔洞？這跟焦慮工程師對「拿掉只在最壞情況才有用的安全網」的警惕有什麼關係？\n6. Quicksilver 一次推全球是個工程成就，也是放大器。為什麼同一個能力既是優點又是 F14？金絲雀在這裡擋住的是哪一段？\n7. kill switch 為什麼能把 27 分鐘止住、而不是修 regex？它預設了系統的什麼性質（WAF 與轉發流量可分離）？這跟 ch22 的「安全地壞」是同一件事嗎？\n8. 把 2019-07-02、2020 BGP、2025 設定檔三件 Cloudflare 事故分清楚：各自的根因家族是什麼？為什麼不能當成同一件事？\n\n## 延伸閱讀\n\n- **Cloudflare 官方 postmortem**：John Graham-Cumming, *Details of the Cloudflare outage on July 2, 2019*（2019-07-12）。<https://blog.cloudflare.com/details-of-the-cloudflare-outage-on-july-2-2019/> — 本章一手來源，罕見地誠實：逐項列出 regex 原文、`x=x` 23 步 / 5,353 步的實測、Quicksilver 跳過分階段發布、CPU 護欄被誤刪。一篇教科書級的 blameless postmortem，值得當範本讀。\n- **RE2 設計動機**：Russ Cox, *Regular Expression Matching Can Be Simple And Fast*。<https://swtch.com/~rsc/regexp/regexp1.html> — 從 Thompson NFA 講到為什麼回溯引擎會指數爆炸、為什麼 RE2 選擇線性時間。看完你會懂 Cloudflare 為什麼「用對引擎就不會出事」。\n- **OWASP ReDoS**：*Regular expression Denial of Service - ReDoS*。<https://owasp.org/www-community/attacks/Regular_expression_Denial_of_Service_-_ReDoS> — 把這場「自己打自己」的事故，連到「攻擊者能不能故意餵這種輸入打你」的安全視角。\n"}, {"id": "ch11-flash-crash", "file": "ch11-flash-crash.md", "group": "Part IV — 連鎖反應", "title": "ch11 — 2010 閃電崩盤：自動代理的正回授，幾分鐘蒸發近兆美元", "md": "# ch11 — 2010 閃電崩盤：自動代理的正回授，幾分鐘蒸發近兆美元\n\n> **本章解剖什麼**：2010 年 5 月 6 日下午，美股在大約十三分鐘內崩跌約 1,000 點（約 9%）、名目市值短暫蒸發約 1 兆美元，然後又在約 36 分鐘內幾乎全數收復。沒有壞掉的硬體、沒有駭客、沒有一行寫錯的程式——只有一群各自「理性」的自動交易代理，在沒有護欄的情況下互相觸發、把一筆大賣單放大成「燙手山芋」式的正回授。這是 ch10 Cloudflare 那條 regex 的金融版：不是一台機器自我放大，是**一整群代理彼此放大**。主打 **F7（級聯／雪崩）、F2（互動複雜度的金融版）、F5（自動化的諷刺）、F1（緊耦合）**。而它最值得讀的地方，是它的「兇手」到今天都還在爭——這件事本身，正好替本書「找單一罪魁是錯的問法」（見 ch02）做了一次活體示範。\n\n## 從你已知的出發\n\n你做過 autoscaling，也踩過 retry storm。\n\n你知道那個形狀：某個下游慢了一點，上游的 client 開始重試；重試讓下游更慢，於是更多請求超時、觸發更多重試；同時 HPA 看到 CPU 飆高，自動拉起更多 pod，新 pod 冷啟動、連線池要重建，又把下游壓得更慢——每一個元件都在「照規則辦事」，每一條規則單獨看都合理，合起來卻是一台自我加速的絞肉機。你最後是怎麼止血的？多半不是「修好下游」，是**先把正回授掐斷**：開 circuit breaker、加 rate limit、給重試加 jitter，讓彼此踩踏的腳停下來。\n\n關鍵的領悟是：retry storm 裡沒有任何一個「壞掉」的元件。每個 client 都在做它被設計來做的事——失敗就重試，這是好的工程。災難來自**一群好元件在缺乏全域協調下，把小擾動正回授放大**。你怕的不是某個 bug，是這群自動代理之間沒有人喊停。\n\n2010 年 5 月 6 日，這個你天天在後端世界裡防的形狀，在全美國的股票市場上演了一次——而且規模是名目上的一兆美元。觸發它的不是壞單，是一筆**合法、善意、為了避險**的大賣單，餵給一個只會盯「占成交量百分比」、不看價格也不看時間的演算法。接住它的，是一群本該「提供流動性」的高頻交易機器人——它們不但沒當緩衝，反而把合約當燙手山芋在彼此之間瘋狂轉手，幾秒鐘就把表面充沛的流動性抽乾。\n\n讀完這章你會發現：你掐斷 retry storm 用的那幾招（熔斷、限速、抖動），正是這個市場在 2010 年**還沒有**、事後才被迫補上的東西。差別只在於，你掐的是 CPU，他們掐的是一兆美元。\n\n## 下午兩點半的市場\n\n2010 年 5 月 6 日，星期四，美東時間（ET）下午兩點半左右。〔時間軸照 landscape 與 CFTC-SEC 報告〕\n\n那天市場本來就不好過。歐洲主權債務危機正燒，希臘的麻煩讓全球風險情緒偏空，當天稍早道瓊已經在下跌、波動度在升高。這不是風平浪靜的一天——這是個**已經有點脆弱**的市場。記住這個背景：正常意外幾乎從不在系統最健康時發生，它挑系統的安全邊界已經被吃掉一截的那天動手。\n\n然後，事情開始加速。約 14:32 起，主要股指期貨開始急跌；接著現貨市場跟著塌。到約 14:45–14:47，道瓊工業指數盤中一度跌掉將近 1,000 點——大約 9%。其中最劇烈的一段，E-mini S&P 500 期貨在約四分鐘內就跌了 3%。〔CFTC-SEC 報告〕\n\n更荒謬的是個股。有些股票的成交價跌到字面上的笑話：埃森哲（Accenture）一度成交在 1 美分，而另一些股票（如蘇富比）一度被推到每股 10 萬美元。〔landscape／CFTC-SEC〕這些不是打錯字，是市場的買賣盤在那一刻**真的不見了**，任何一筆殘餘的市價單都會掃到一個荒謬的價位。\n\n然後，幾乎一樣快，它彈回來了。約 15:08 之前，大盤已經大致收復了那段暴跌；當天收盤道瓊仍跌約 3.2%（約 348 點），但那一兆美元的盤中蒸發，在大約 36 分鐘內幾乎全部回來了。〔CFTC-SEC／多源一致〕\n\n如果你只看那天的收盤線，你看到的是「跌了 3%、不算大事的一天」。真正嚇人的，是那條 K 線中間那道幾乎垂直下去、又幾乎垂直上來的尖刺——一個健康的金融系統，理論上不該能在十幾分鐘內把自己對折再彈回。那道尖刺在問一個問題：**到底是什麼，能在沒有任何外部衝擊的情況下，讓市場在幾分鐘內自己把自己撕開？**\n\n## 裝填：一群沒有護欄的自動代理\n\n要回答這個問題，得先看清這套系統平時怎麼運作——以及哪些安全邊界，早在那天之前就被自動化悄悄吃掉了。\n\n到 2010 年，美股早已不是電影裡那種交易員在場內大吼的景象。絕大多數的下單與成交，是由演算法在毫秒級完成的。這裡面有兩種角色要分清楚，因為本案的整個機制就藏在它們的互動裡。\n\n**第一種，是「執行演算法」**：當一個大機構要買賣一大筆部位，它不會一次砸進市場（那會把價格打歪、自己吃虧），而是交給一個演算法，把大單切成許多小單、在一段時間內慢慢餵進去。這類演算法常見的一種邏輯叫**成交量參與率（volume-participation）**：它盯著「最近這段時間市場的總成交量」，然後以「占其中某個百分比」的速度送單。直覺上很合理——市場活絡時我多送一點，市場冷清時我少送一點，盡量不要驚動價格。\n\n這裡有一個你一眼就會抓到的設計缺陷：這種演算法盯的是**成交量**，不是**價格**，也不是**時間**。它沒有一個「如果價格已經跌成這樣就停下來」的閘門，也沒有一個「至少分散在幾小時內」的下限。在正常的市場裡，這個缺陷無害，因為成交量和價格通常一起動、彼此牽制。但這個前提，正是那天會裂開的東西。\n\n**第二種，是「高頻交易者」（HFT）**：它們不持有部位過夜，靠的是在極短時間內反覆買進賣出、賺取微小價差，每天進出無數次。市場對 HFT 有一個被廣泛接受的說法——**它們提供流動性、讓市場更穩**：因為它們隨時掛著買賣報價，理論上任何人想成交都找得到對手。\n\n這個說法在風平浪靜時大致成立。但它藏著一個沒被付帳的假設：**HFT 提供的流動性，是「它們自願留在場上」時才存在的流動性**。沒有任何規則強迫它們在市場崩塌時繼續當買盤。它們的演算法裡，每一台都有自己的風控——部位到了某個上限、或市場波動超過某個門檻，它就會自動撤單、自動退場。每一台單獨看，這都是**正確、負責任**的風險管理。\n\n於是裝填完成了。市場裡塞滿了自動代理：一邊是只盯成交量、不看價格的執行演算法；另一邊是「平時提供流動性、出事就自動跑路」的 HFT。所有人都相信「流動性很充沛」——只是這份充沛，是一份**會在最需要它的那一刻集體蒸發**的流動性。這就是 landscape 點破的「流動性幻覺」。\n\n```\n  平時（系統健康）                    那一天（孔洞對齊）\n ─────────────────                   ────────────────────\n 執行演算法：照成交量送單     ───►   成交量被自己的賣單灌大\n (不看價格/不看時間)                 → 自己越賣越快(正回授)\n        │                                    │\n HFT：掛買賣報價              ───►   風控觸發 → 集體撤單/退場\n 「提供流動性、市場更穩」             → 流動性幻覺破滅、買盤蒸發\n        │                                    │\n 兩者互動：吸收彼此的單        ───►  互相轉手同一批合約(hot potato)\n                                     → 不吸收部位、只放大跌勢\n```\n\n## 觸發：一筆 41 億美元、不看價格的賣單\n\n那根稻草本身，是一筆**完全合法、甚至很負責任**的交易。\n\n當天，一家基本面交易機構（CFTC-SEC 報告未具名，但被媒體廣泛報導為共同基金 Waddell & Reed）想要對沖它手上既有的一大筆股票部位。對沖的工具，是賣出 75,000 口 E-mini S&P 500 期貨，名目價值約 41 億美元。〔CFTC-SEC〕這是一筆大單，但這種規模的避險賣出本身一點都不離奇——機構天天在做。\n\n問題出在**怎麼賣**。這家機構把這筆賣單交給一個自動執行演算法，而它選的參數是：以「占前一分鐘成交量 9%」的速度送單，**不設價格限制、不設時間限制**。〔CFTC-SEC〕\n\n停下來想想這個 9% 的參數會在什麼情況下出事。在一個健康、深度充足的市場裡，41 億美元的賣單按 9% 參與率餵進去，正常需要五個小時以上才能消化完。但那天，它在大約 20 分鐘內就全部傾洩出去了。〔CFTC-SEC〕\n\n為什麼快了十幾倍？因為演算法盯的是成交量，而它**自己就是成交量的一部分**。當市場開始下跌、HFT 開始彼此瘋狂轉手合約時，總成交量暴增——而這個演算法看到成交量暴增，就忠實地按「9% 的份額」**加快了自己的賣出速度**。它越賣，成交量越大；成交量越大，它賣得越快。\n\n這就是 F1（緊耦合）與 F7（級聯）在源頭咬合的地方：演算法的賣出速度，被它試圖參與的那個成交量直接驅動，中間**沒有任何緩衝、沒有價格煞車、沒有時間下限**。一個本該「溫和地分散賣出」的工具，在波動放大時變成了一個**自我加速的賣出引擎**。它不是壞了——它是精確地、忠實地執行了一個缺了護欄的規則。\n\n## 連鎖：燙手山芋\n\n接下來發生的事，是這場災難的核心，也是它最反直覺的地方。\n\n當賣壓砸下來，那些「提供流動性」的 HFT 一開始確實接了單——它們買進了這些 E-mini 合約。到這裡為止，市場機制看起來還在運作：有人賣，有人買。\n\n但 HFT 的本性是不持有部位。它們買進這批合約後，幾乎立刻就想把它們賣掉。賣給誰？在一個正常市場，賣給願意承接的長期買家。但那天，長期買家正在快速消失。於是 HFT 開始**把合約賣給彼此**——A 買進、轉手賣給 B，B 再轉手賣給 C，C 又賣回 A。\n\nCFTC-SEC 報告用了一個極傳神的詞描述這個現象：**「燙手山芋」（hot potato）效應**。報告的原話是：HFT「開始快速地買進、再把合約轉賣給彼此——產生一種『燙手山芋』式的成交量，同一批部位被快速地來回傳遞」。〔CFTC-SEC〕一個被廣為引用的細節是：在崩跌最劇烈的某段約十幾秒內，HFT 之間互相轉手了上萬口合約，卻幾乎沒有淨吸收任何部位。〔CFTC-SEC；確切口數與秒數依不同引述略有出入，標供參考〕\n\n這就是「流動性幻覺」現形的瞬間。從外面看，成交量爆炸，市場看起來「流動性充沛得很」。但這些成交**沒有任何一筆真正吸收了那筆 41 億的賣壓**：合約只是在一群不想留著它的機器人之間燙手地傳來傳去。真正的流動性——願意承接部位、把它留住的買盤——已經蒸發了。\n\n而那個只盯成交量的執行演算法，正在被這場燙手山芋餵食。HFT 互相轉手製造出來的天量成交，被它讀成「市場好活絡」，於是它**加快了賣出**。賣壓加重 → HFT 風控觸發、更多人撤單退場 → 買盤更薄 → 價格更崩 → 為了脫手大家轉得更快、成交量更大 → 執行演算法賣得更快。正回授的環就此閉合，每轉一圈都更猛。\n\n```\n  ┌─ 大型賣出演算法 ─────────────────────────────┐\n  │ 按 9% 成交量送賣單（不看價格、不看時間）     │\n  └────────────────────┬─────────────────────────┘\n                       │ 賣壓加重，砸向市場\n                       ▼\n  ┌─ HFT 群體 ───────────────────────────────────┐\n  │ 接單買進 → 想脫手 → 互相轉手 hot potato      │\n  │ → 成交量暴增；部分風控觸發、撤單退場         │\n  └────────────────────┬─────────────────────────┘\n                       │ 成交量暴增被讀成「市場活絡」\n                       │ → 執行演算法加快賣出（回到頂端）\n                       ▲\n  ┌──────────────────────────────────────────────┐\n  │ 正回授：每轉一圈，跌得更深、轉得更快         │\n  └──────────────────────────────────────────────┘\n```\n\n這裡要點破 F5（自動化的諷刺）最尖銳的一面。每一台機器，單獨看，都在做**正確**的事。執行演算法在忠實地參與成交量。HFT 在賺它該賺的價差、並在風險超標時負責任地退場。沒有任何一個代理「失職」。災難恰恰來自**每個代理都盡責**——它們各自的「理性」在缺乏全域協調的情況下對齊成了集體的非理性。自動化拿走的，是那個本來會有人喊「等等，這不對勁，全部停下來」的時刻。一群毫秒級的機器之間，沒有人有那個權限、也沒有人有那雙慢下來的眼睛。\n\n然後，跟它崩下去一樣快，它彈了回來。當價格跌到夠荒謬，一些演算法的邏輯判斷「這價格太便宜、該進場了」，買盤重新湧入；那筆 41 億的賣單也終於送完了。流動性回補，價格在幾分鐘內幾乎垂直地彈回。整場戲——從急跌到大致收復——約 36 分鐘。\n\n## 餘波：補上那道沒有的煞車\n\n先把規模講清楚，因為這是這個案例最常被誤記的地方。\n\n**「市場蒸發了一兆美元」是真的，但也是假的。** 真的是：盤中名目市值確實短暫蒸發了約 1 兆美元。假的是它的含意——那不是一兆美元的財富永久消失，而是**價格在約 36 分鐘內塌陷又收復**，多數帳面損失隨即回來了。這個案例的重點從來不是「跌幅多大」，而是**速度與機制**：一個系統能用多快的速度自己把自己撕開。把它記成「一兆美元蒸發不見了」，反而錯失了真正可怕的東西——不是損失的大小，是失控的速度。\n\n那些荒謬價位的成交（1 美分、10 萬美元）後來大多被交易所裁定為「明顯錯誤交易」（clearly erroneous）而取消。但這也暴露了一個尷尬：當時**根本沒有一個統一的煞車**能在價格崩到荒謬之前先把它攔下來。\n\n於是監管機構補上了那道沒有的煞車。閃電崩盤後，SEC 先推出了**單一個股熔斷機制**：個股若在五分鐘內波動超過 10%，就暫停交易五分鐘，給市場一個喘息、讓買賣盤重新聚集的時間窗。〔SEC〕後來這套被更精緻的 **Limit Up-Limit Down（LULD）**取代：為每檔證券設定隨盤動態重算的價格上下帶，成交不得落在帶外——本質上就是給整個市場裝上**價格的 rate limit 與 circuit breaker**。〔SEC，2012 核准、2013 起試行〕另外，Market Access Rule（Rule 15c3-5，本書 ch13 也會碰到）要求券商對所有委託加上下單前的風控閘門。\n\n你看出這份補丁清單的形狀了嗎？它幾乎逐項對應你掐 retry storm 用的工具：熔斷（個股暫停）、限速（價格帶）、下單前護欄（pre-trade risk check）。市場用一場一兆美元的事故，重新發現了你在後端早就知道的事——**一群自動代理之間，必須有人裝煞車**。\n\n### 兇手是誰？這個問題本身就有問題\n\n如果你去查「2010 閃電崩盤是誰造成的」，你大概會撞到一個名字：Navinder Sarao，那個在倫敦郊區 Hounslow 自家臥室裡交易的英國人，綽號「Hounslow 之犬」。媒體很愛這個故事——一個獨行俠用一台筆電搞垮了華爾街。\n\n事實要複雜得多，而這個複雜正是本章最值得你帶走的東西。\n\n時間順序很重要。**2010 年 9 月 30 日的 CFTC-SEC 聯合報告，完全沒有依賴 Sarao 的存在來解釋這場崩盤。** 報告的因果鏈是純結構性的：大型賣出演算法（無價格／時間限制）× HFT 的燙手山芋撤離流動性。它從頭到尾講的是市場結構與自動化互動，沒有一個「壞人」。\n\nSarao 是**五年後**才進入這個故事的：2015 年，美國司法部指控他在 2010 年（以及之後多年）從事 **spoofing**——掛出大量他根本不打算成交的假賣單來壓低價格、製造假象，再撤掉。他 2016 年認罪，2020 年被判處——不是重刑，而是**一年的居家監禁**（檢方甚至建議不必坐牢，理由包括他的高度配合與自閉症診斷）。〔多源一致〕\n\n那他到底有沒有「造成」崩盤？這正是爭議所在。2017 年，一群金融學者（Kirilenko、Kyle、Samadi、Tuzun，發表於《The Journal of Finance》）用 E-mini 的逐筆稽核資料做了詳盡分析，其結論呼應 CFTC-SEC 報告：HFT **沒有引發**崩盤，但透過「搶在別人前面要求即時成交」而**加劇**了它。多位學者更直接指出：這場崩盤**即使沒有 Sarao 在場，也可能照樣發生**。〔Kirilenko et al. 2017；World Finance、CAIA 等對該研究的整理〕沒有人說 spoofing 是對的、不該違法；但「為一個犯罪行為定罪」與「把整場系統性崩盤的責任全壓在他一個人頭上」，是兩件完全不同的事。\n\n這就接回了本書在 ch02 立下的那把尺：**找單一罪魁是錯的問法。** 閃電崩盤是一個近乎完美的標本——它**邀請**你去找一個惡棍（一個流氓基金？一個臥室裡的詐騙犯？），因為人腦渴望一個能恨的因果。但官方報告的結論恰恰相反：沒有惡棍，只有一個**結構**——一群各自合法、各自理性的自動代理，在缺乏全域護欄的市場裡，把一筆普通的避險賣單正回授成了崩盤。Sarao 的 spoofing 或許讓那天的市場更脆弱了一點（這仍有爭議），但他至多是**讓孔洞更容易對齊的其中一層**，不是那個「按下按鈕的人」。\n\n你維運分散式系統時會反覆遇到這個誘惑。Postmortem 的壓力下，總有人想寫「root cause：某某改了那個設定」。閃電崩盤提醒你：當每個元件都在盡責、災難卻還是發生了，**那個元件就不是根因，那個系統的耦合結構才是**。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**觸發**是那筆 75,000 口、約 41 億美元、按 9% 成交量參與率、無價格／時間限制的 E-mini 賣單。但這個觸發本身**完全合法、完全在正常業務範圍內**——機構避險賣出每天都在發生。在一個有煞車、有深度流動性的市場裡，這筆單會被溫和消化，沒人會記得 2010 年 5 月 6 日。\n\n**真正裝填好的災難**，是整個市場結構：(1) 大量自動執行演算法盯成交量而不看價格，可被自己製造的成交量加速；(2) 被當成「流動性提供者」、實則「壓力下會集體跑路」的 HFT；(3) 缺乏任何跨股、跨市場的統一煞車。這三層在那天之前就存在很久了，被「平時運作良好」掩蓋著——這也是一種偏差正常化（見 ch14）：每一個沒出事的交易日，都讓「流動性很充沛」這個假設更深地被當成事實。觸發只是在一個已經偏空、波動升高的脆弱日子，把這些早已裝填好的條件點燃。\n\n### 起司的孔洞：每一層為什麼都沒擋住\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 賣出演算法的內建限制 | 在價格崩跌時放慢或暫停賣出 | 只盯成交量參與率，不看價格、不看時間；被自己製造的量加速（F1/F7 核心） |\n| HFT 提供的流動性 | 在賣壓來時當緩衝、承接部位 | 是「會跑的流動性」：風控一觸發就集體撤單，hot-potato 互相轉手而不吸收（流動性幻覺） |\n| 跨市場統一煞車 | 在價格崩到荒謬前暫停交易 | 當時根本不存在（事後才補上單股熔斷／LULD） |\n| 下單前風控 | 攔下會造成失控的委託 | 當時 Market Access Rule 尚未到位／未普遍落實 |\n| 市場深度與多樣性 | 不同邏輯的參與者彼此抵銷擾動 | 大量代理共用相似的撤離邏輯（波動↑就退場），壓力下行為同質、一起跑（接近 monoculture） |\n\n任何一層擋住——演算法有價格煞車、或 HFT 被要求在壓力下留場、或有一個統一熔斷在 5% 就暫停——這場崩盤都不會走到「幾分鐘對折」。所以「都是那筆大賣單害的」是不完整的問法：那筆單只是觸發，**放大成崩盤的是後面這幾層孔洞同時對齊**。\n\n### 對應模式\n\n- **F7（級聯／雪崩）**：一筆賣單 → HFT 燙手山芋 → 成交量暴增 → 執行演算法加速 → 更多 HFT 撤離 → 價格自由落體。局部賣壓被一層層放大成全市場崩跌——這是本書級聯模式的金融標本。\n- **F2（互動複雜度）**：執行演算法、HFT、期貨與現貨市場之間，有設計者沒預想到的非線性交互（「成交量驅動賣出速度」這條回路，沒人是故意設計成正回授的）。互動複雜度不在任何單一代理裡，它**湧現於代理之間**。\n- **F5（自動化的諷刺）**：每台機器都盡責，沒有人有權限或狀況意識在毫秒級喊停；自動化拿走的正是「慢下來、看全局、踩煞車」的那個人類時刻。\n- **F1（緊耦合）**：從成交量暴增到賣出加速之間沒有緩衝、沒有時間餘裕、沒有獨立的價格閘門；一個訊號直通另一個動作，整個系統在毫秒級緊咬。\n\n### 一句話形狀\n\n**這場災難的形狀是：一群各自理性、各自合法、各自盡責的自動代理，在沒有全域護欄的緊耦合市場裡，把一筆普通的賣單正回授成了一場幾分鐘的崩盤——而你最想找的那個「兇手」根本不存在。**\n\n## 換成你的系統\n\n把那群 HFT 換成你的服務實例，這個形狀立刻變得很近。\n\n你的 autoscaling 與重試邏輯，就是一群自動代理。每個 client 的重試策略、每個 HPA 的擴容規則、每個 consumer 的退避邏輯——單獨看都是好工程。問一個閃電崩盤式的問題：**它們之間，有沒有人裝了煞車，防止彼此正回授？**\n\n具體一點。你那條 K8s CronJob → SQS → 冪等 consumer 的結算 pipeline——它平時優雅地最終一致。但假設下游的某個服務開始變慢。你的 consumer 會重試（這是對的）；重試失敗的訊息回到 queue，下次再被拉出來（這也是對的）；同時如果你綁了基於 queue 深度的 autoscaling，它會拉起更多 consumer（還是對的）。每個元件都在盡責——而它們合起來，可能正在對一個已經喘不過氣的下游發動一場 retry storm，**和那群 HFT 把合約燙手山芋一模一樣的形狀**。\n\n**點名一個「應該沒事吧」**：「我的重試有 exponential backoff，所以不會壓垮下游。」——這個假設在**單一 client** 視角下成立，在**一群 client 同時退避又同時重試**時就裂開了。如果一千個 consumer 在同一時刻收到同一個下游的超時、都退避相同的 2 秒、然後在同一時刻一起重試，你的 backoff 不但沒打散流量，反而**把它們同步成了一道整齊的衝擊波**（thundering herd）。閃電崩盤裡的 HFT 也是這樣：它們各自的風控門檻相似，於是壓力一來，它們**幾乎同時**撤離——同質的「理性」對齊成了集體的踩踏。這正是為什麼 backoff 一定要配 **jitter**：你需要的不只是退避，是**打散同步**。\n\n還有那個「流動性幻覺」。你的 dashboard 上，「健康的 worker 數量」是不是一個會在壓力下說謊的指標？平時你有 50 個 worker，看板很安心。但如果它們的健康全都依賴同一個下游、那個下游一掛它們會一起變不健康——那 50 個 worker 就是那群 HFT：**平時提供的容量，恰好在你最需要它的那一刻集體蒸發**。表面充沛的容量，可能是一份會在壓力下消失的容量。\n\n**可操作的自問**：畫出你系統裡所有「自動會對某個訊號做出反應」的代理（重試、autoscaling、circuit breaker、自動 failover、降級邏輯），然後逐對問——A 的反應，會不會放大 B 反應的那個訊號，形成正回授？如果會，這個環上有沒有一個全域的煞車（一個總量級的 rate limit、一個 kill switch、一個熔斷），能在它轉到第三圈之前掐斷它？你掐 retry storm 那幾招——熔斷、限速、jitter——對應的正是市場事後補上的單股熔斷、LULD、下單前風控。市場花了一兆美元才學會；你最好別等到那麼貴。\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★（對帳）\n\n把「燙手山芋」對應到你親身遇過的一次自動化正回授（retry storm、快取擊穿、autoscaling 震盪、或 consumer 重試風暴皆可）。要求：(1) 指出環上每一個自動代理單獨看「在做正確的事」；(2) 標出哪個訊號被哪個動作放大、形成正回授；(3) 說明你們最後是「修好了那個壞掉的元件」，還是「掐斷了正回授」。\n\n#### 推演解答\n\n（因人而異，以下是評判標準與一個範本。）\n\n好的對帳要能說清楚**沒有壞元件**這件事。範本：某次下游 RDS 變慢 → API 層的 query 超時 → client（前端與內部服務）重試 → 重試讓 RDS 連線數更高、更慢 → 更多超時 → 更多重試；同時 queue 深度上升觸發 autoscaling，新 consumer 冷啟動搶連線，把 RDS 壓得更慢。\n\n逐一檢查「每個元件都對」：client 重試是對的（暫時性錯誤本該重試）；autoscaling 是對的（負載高本該擴容）；RDS 沒壞（它只是慢）。**沒有任何一個元件失職**——這正是閃電崩盤的形狀，也是為什麼這類事故的 postmortem 最難寫「root cause」。\n\n第三問是關鍵：你是怎麼止血的？如果答案是「我們把 RDS 調快了」，那你修的是觸發、不是結構——下次另一個下游變慢，同樣的環會再轉一次。如果答案是「我們加了 circuit breaker / 限制了重試總量 / 給 backoff 加了 jitter / 暫時關掉 autoscaling」，恭喜，你掐的是正回授本身——這正是市場事後補上單股熔斷與 LULD 在做的事。最深刻的對帳會指出：真正的「根因」是**那個沒有人裝煞車的耦合結構**，而不是那個碰巧先慢下來的元件。\n\n### 推演題2 **[20 分鐘]** ★★★（反事實）\n\n反事實演練。下面三個改動，各**單獨**實施。針對閃電崩盤，逐一說明它會在因果鏈的哪一步打斷正回授，以及它各自的代價與盲點：\n(A) 那個賣出演算法加上**價格限制**（價格跌超過某個門檻就暫停送單）。\n(B) 規定 HFT 在市場波動超過門檻時**不得撤單、必須繼續報價**。\n(C) 加一個**跨市場統一熔斷**：任何主要指數在短時間內跌超過某個百分比就全面暫停 N 分鐘。\n\n#### 推演解答\n\n**(A) 演算法價格限制**直接掐在源頭。一旦價格崩到門檻，那個自我加速的賣出引擎就停了——正回授環上「執行演算法加速賣出」這一節被切斷。這是最乾淨的修法。代價：價格限制可能讓避險方無法及時完成對沖（它買保險的目的沒達成），在真正需要快速減倉時反而綁手綁腳。盲點：它只修了**這一個**演算法；市場裡還有無數其他代理，其中任何一個若也缺價格煞車，環還是能轉起來。這對應你的系統：你給**一個** client 加了護欄，但 retry storm 是**所有** client 一起造成的。\n\n**(B) 強制 HFT 留場**直接戳破流動性幻覺：如果 HFT 不能在壓力下跑路，買盤就不會在最需要時蒸發，hot-potato 也失去動力。代價巨大且現實上幾乎不可行——你不能強迫一個私人交易者拿自己的資本去接一把正在墜落的刀；強制留場可能只是把他們的破產提前，或讓他們乾脆退出做市。盲點：它治標於「流動性會跑」，卻沒解決「演算法盯成交量加速」這個源頭。這對應你的系統：強迫所有 worker 在下游掛掉時繼續打它，往往只是讓 worker 也一起死。\n\n**(C) 跨市場統一熔斷**不修任何單一代理的邏輯，而是給整個系統一個**全域的暫停鍵**：價格崩到一定程度，所有人一起停 N 分鐘。它的威力在於**打斷正回授的時間連續性**——機器靠毫秒級的連續互動正回授，而熔斷強行插入一段「什麼都不准動」的時間，讓買賣盤重新聚集、讓人類有時間介入。這正是 SEC 事後選的路（單股熔斷 → LULD）。代價：熔斷本身可能製造恐慌（「快停了，趕快在停之前賣掉」反而加速崩跌，即所謂 magnet effect），且暫停期間想出場的人被鎖住。盲點：門檻設定是門藝術——太鬆擋不住、太緊天天誤觸。\n\n判斷：(A) 最治本但只治一個代理；(C) 最務實，因為它**不需要信任任何單一代理的善意或正確性**，直接在系統層級裝一個 kill switch——這正是焦慮工程師的偏好：當你無法保證每個元件都裝了煞車，就在它們之上裝一個誰都關得掉的總開關。(B) 是反面教材：強迫元件違背自身生存邏輯，通常只會把失效推到別處。\n\n### 推演題3 **[15 分鐘]** ★★（找破綻）\n\n你的同事說：「閃電崩盤就是那個臥室裡的 Sarao 用 spoofing 一個人搞垮市場的。」用本章與 ch02 的工具，指出這個說法在**史實**與**思維方式**上各漏掉了什麼。\n\n#### 推演解答\n\n**史實破綻**：時間順序就站不住。2010 年的 CFTC-SEC 聯合報告（事發當年發布）**完全沒有依賴 Sarao** 來解釋崩盤——它講的是大型賣出演算法 × HFT 撤離流動性的結構機制。Sarao 是 2015 年才被指控 spoofing、2020 年僅判一年居家監禁；而 2017 年的學術研究（Kirilenko 等）結論是這場崩盤**即使沒有他也可能發生**。把一個五年後才登場、貢獻程度至今有爭議的人，說成「一個人搞垮市場」，是用後見之明硬塞一個惡棍進一份本來沒有惡棍的報告。\n\n**思維破綻**（這層更重要）：這個說法犯的是 ch02 點破的**單一根因謬誤**。它滿足的是人腦對「有一個能恨的壞人」的渴望，而不是對機制的理解。即使 Sarao 的 spoofing 真的讓那天的市場脆弱了一點，他至多是**讓孔洞更容易對齊的其中一層**，不是「按下按鈕的人」。真正的問法不是「是誰幹的」，而是「**為什麼這個市場的結構，讓一筆普通賣單能在幾分鐘內被放大成崩盤、而且每一道煞車都不在**」。一個把責任全壓在 Sarao 身上的結論，會讓你學不到任何能防下次的東西——因為它讓你以為「抓到壞人就安全了」，而真正該修的耦合結構原封不動。\n\n加分觀察：這恰恰是這個案例最妙的地方——它**親自示範**了本書的核心主張。連監管機構、檢方、媒體、學界都還在為「兇手是誰」吵，而正確答案是：**這個問題本身就問錯了**。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 那個賣出演算法的「成交量參與率」邏輯，為什麼在波動放大時會**自我加速**？它缺的是哪兩種限制？\n2. 「HFT 提供流動性、讓市場更穩」這句話，在那天哪裡裂開了？用「燙手山芋」與「流動性幻覺」解釋。\n3. 為什麼說這場崩盤裡「沒有任何一個自動代理失職」？這跟你 retry storm 的經驗是同一個形狀嗎，哪裡同？\n4. 列出至少三層各自獨立的孔洞，並說明任何一層擋住，崩盤就不會走到「幾分鐘對折」。為什麼「都是那筆大賣單害的」是不完整的問法？\n5. 2010 年的 CFTC-SEC 報告和 Sarao 的指控，時間順序是什麼？為什麼「Sarao 一個人搞垮市場」在史實上站不住、在思維上也是錯的問法？\n6. 「市場蒸發了一兆美元」哪裡對、哪裡誤導？為什麼這個案例的重點是「速度與機制」而不是「跌幅」？\n7. 你系統裡哪幾個自動代理之間可能形成正回授？這個環上有沒有一個全域煞車（熔斷／限速／kill switch）能在它轉到第三圈前掐斷？\n8. 為什麼 exponential backoff 沒有 jitter 時，反而可能把一群 client 同步成一道衝擊波？這對應閃電崩盤裡的什麼？\n\n## 延伸閱讀\n\n- **U.S. CFTC & SEC,《Findings Regarding the Market Events of May 6, 2010》（2010-09-30）** — 一手聯合調查報告，本章事實的錨。它最值得讀的地方是它**沒做的事**：它從頭到尾用市場結構與自動化互動解釋崩盤，沒有點名任何一個「兇手」——這份報告本身就是「找單一根因是錯的問法」（見 ch02）的範本。「燙手山芋」與「9% 成交量參與率、無價格／時間限制」都出自此處。報告 PDF：https://www.sec.gov/files/marketevents-report.pdf\n- **Andrei Kirilenko, Albert Kyle, Mehrdad Samadi, Tugkan Tuzun,《The Flash Crash: High-Frequency Trading in an Electronic Market》（The Journal of Finance, 2017）** — 用 E-mini 逐筆稽核資料做的學術分析，結論呼應官方報告：HFT 沒有引發崩盤、但透過搶先要求即時成交而加劇它；並支持「即使沒有 Sarao 也可能發生」的判斷。讀它來理解為什麼歸因到單一交易者是過度簡化。SSRN：https://papers.ssrn.com/sol3/papers.cfm?abstract_id=1686004\n- **SEC, Investor Bulletin: Measures to Address Market Volatility（單股熔斷與 Limit Up-Limit Down）** — 事後補上的那道煞車的官方說明：個股 5 分鐘內波動超 10% 暫停、後續的 LULD 動態價格帶。讀它把「市場的 circuit breaker / rate limit」和你後端的熔斷與限速對照起來。https://www.sec.gov/oiea/investor-alerts-bulletins/investor-alerts-circuitbreakersbulletinhtm.html\n"}, {"id": "ch12-texas-grid", "file": "ch12-texas-grid.md", "group": "Part IV — 連鎖反應", "title": "ch12 — 德州電網 2021：早就被警告過的那場寒潮", "md": "# ch12 — 德州電網 2021：早就被警告過的那場寒潮\n\n> **本章解剖什麼**：一場北極寒潮把天然氣井口、集氣設施與發電機組一起凍住，同一時刻供暖需求暴增——供給崩潰與需求飆升在最冷的那幾小時對撞，逼得 ERCOT 實施美國史上最大規模的人為強制減載，連續近三日甩掉約 20,000 MW、約占當時負載的 45%，才避免整張電網不可控地崩成黑暗。這是 Part IV「連鎖反應」第三章——前兩章（Cloudflare 一條 regex、2010 閃電崩盤）的緊耦合都在毫秒到分鐘級展開；這一章的緊耦合一樣致命，但裝填它的潛伏條件早在 **2011 年、甚至 1989 年**就寫好了。主打 **F6**（偏差正常化：早被警告的防寒從未強制）、**F8**（潛伏條件 vs 觸發：寒潮只是扣扳機）、**F10／F14**（孤島電網無法外援、單一栽培式的同時失效）、**F2**（氣電循環依賴）、**F7**（級聯）。它是 ch14 挑戰者「偏差正常化」（見 ch14）的基礎設施版預演，也是 ch13 雲端連鎖「循環依賴」（見 ch13）的實體版——A 要 B、B 要 A。\n\n## 從你已知的出發\n\n先講一件你大概在某次架構評審裡點過頭、但沒真正當回事的事。\n\n你維運微服務。某次你畫服務依賴圖——或者更可能的是，你**沒**畫，只憑記憶在白板上拉了幾條線——然後有人問：「結算服務掛了，誰會跟著掛？」你答得出一兩層。再問：「那如果 Redis 掛了，你的 circuit breaker 會打開，對吧？但 circuit breaker 的狀態存在哪？」沉默。如果它也存在 Redis，那你就有一個循環：保護機制依賴它要保護的東西。這不是假設性的——你已踩過一次它的近親：你發現監控告警的某條鏈路自己也跑在被監控的叢集上，叢集真掛時，告警先啞了。\n\n再講第二件事。你的團隊有一份「已知問題」清單，上面有幾條長年掛著「P3、暫不處理」的東西：某個在重啟時偶爾丟訊息的排程（你後來才把 setTimeout 重寫成 cron job queue 修掉）、某個你心知肚明「總有一天會爆」但「過去三年都沒爆」的 retry 設定。每次 sprint 規劃它都被往下排，因為它「沒出事」。而「沒出事」這三個字每被說一次，就讓它在所有人心裡離「正常」更近一點。\n\n把這兩件事——**循環依賴**與**被正常化的已知問題**——擺在一起，你就握住了 2021 年 2 月德州電網崩潰的兩根主梁。德州的工程師早在 2011 年就被白紙黑字告知「機組要做防寒」，但這件事從未被強制、也沒人盯著追，因為歷次寒潮「都過去了」。同時，德州的電力與天然氣是一對循環依賴：發電要燒天然氣，而天然氣的開採、加壓、處理又要用電——停電讓氣田更難供氣，缺氣又讓更多電廠停機。\n\n焦慮工程師的第一信條是「『應該沒事吧』是訃聞的第一句」。這一章的「應該沒事吧」沒有一個莽撞的瞬間、沒有一個壞人按下一個錯按鈕。它是十年份的「上次也沒事吧」累積出來的——而那十年，恰好沒有一場夠冷、夠久、夠廣的寒潮來收帳。2021 年 2 月，帳單來了。\n\n## 冷開場：2 月 15 日凌晨，頻率開始往下掉\n\n2021 年 2 月，北極渦旋南壓，一場後來被命名為 Winter Storm Uri 的寒潮橫掃美國中南部，把通常溫和的德州按進了零度以下、且**持續數日不回升**的低溫裡。對一張為盛夏冷氣尖峰設計、幾乎沒認真為極寒準備過的電網來說，這是它最不擅長的那種考驗。\n\n2 月 15 日凌晨一兩點，德州人把暖氣開到最大。電熱負荷——許多德州住宅靠電阻式電暖——把需求推到接近冬季從未見過的高點。與此同時，發電端在崩：一座座機組因設備結凍、或因燒的天然氣供不上來，一台接一台跳離電網。供給線在掉，需求線在飆，兩條線在最冷的那個凌晨交錯。\n\n在控制室裡，操作員盯著的是一個數字：**系統頻率**。北美電網跑在 60 赫茲。發電與用電平衡時，頻率穩在 60；用電多過發電，頻率往下掉。頻率不是抽象指標——它是整張電網即時供需的體溫計，而且是**緊耦合**的：所有同步發電機像被一根看不見的軸連在一起轉，一處失衡，全網同時感受到。\n\n那個凌晨，頻率跌破了 59.4 赫茲，並且**停在那裡撐了好幾分鐘**。這是危險線。電網有一套自動保護：頻率若繼續往下掉到某個門檻，發電機為了自保會自動跳脫——而每一台跳脫又讓供需缺口更大、頻率掉得更快，引發下一輪跳脫。這就是電網工程師最怕的場景：一旦滑進去，幾分鐘內整張網會**不可控地連鎖崩塌**，跌進所謂的 black start（完全黑啟動）——整網全黑、所有機組停轉，要從零一台台重新點亮，恐需數日到數週才能恢復。\n\nERCOT 事後說，那個凌晨，系統距離這個深淵只剩約 **4 分 37 秒**（ERCOT 的說法，照 landscape）。操作員手上唯一還來得及拉的杆，是主動、立刻、大規模地把用電端切掉——強制甩負載，把需求硬壓回供給能撐住的水準，讓頻率爬回 60，避免那條不可控的滑坡。\n\n於是他們下令甩載。不是教科書上那種「輪流停十五分鐘就回來」的 rolling blackout——而是把約 20,000 MW、相當於當時全網約 45% 的負載直接切掉，並且**一壓就是近三天**。數百萬戶在零度以下的低溫裡失去暖氣與電力。這不是輕描淡寫的輪流停電，這是一張電網為了不死，砍掉自己近一半的四肢。\n\n## 裝填：兩個被吃掉十年的邊界\n\n要看懂這場崩潰為什麼會發生，得先看它在 2021 年 2 月之前，已經被裝填好了哪些潛伏條件。寒潮是觸發、是最後一根稻草——但災難的炸藥，早在十年前就堆好了（這是 F8 潛伏條件 vs 觸發，ch02 已定義過）。\n\n**潛伏條件一：防寒從未強制——而且這是個被警告過至少兩次的已知問題。**\n\n這是本案的核心孔洞，也是它和 ch14 挑戰者共享的形狀。發電機組與天然氣設施可以做防寒（winterization）——保溫、伴熱、擋風、把易凍的儀控管線包起來。北方那些常年酷寒的電網把這當基本功。德州不是不知道該做，而是**知道、被明確告知，卻從未把它變成強制要求**。\n\n2011 年 2 月，德州遭遇過一場規模較小的寒潮，當時就出現大量機組因結凍跳機、被迫輪流停電。事後 FERC 與 NERC 做過聯合調查，報告白紙黑字寫著：德州的發電機組防寒不足，**建議**強化。更早，1989 年的寒潮也演過類似劇本。但這些建議始終是「建議」——德州的機組防寒不強制、沒有最低標準、沒有罰則、沒人逐廠去查驗收。\n\n為什麼明知該做卻不做？這就是 **F6 偏差正常化**（normalization of deviance，ch14 會把它攤開講透）的純粹形態。每一個獨立的決定，在當下看都「合理」：寒潮在德州罕見，防寒要花錢，而且——關鍵——**過去每一次沒做防寒，都沒釀成大災**。2011 撐過去了，後面幾個冬天也撐過去了。每一次「沒出事」，都被悄悄重新詮釋成「我們不做也沒關係」的證據。安全邊界就這樣被一年年吃掉，沒有任何人按下一個錯誤的按鈕——只是一個系統把一連串僥倖制度化成了「正常」。到 2021 年，「德州的機組不必為極寒做準備」已經是一條沒人質疑的背景假設。\n\n**潛伏條件二：一張刻意半孤立的電網，缺電時幾乎無法外援。**\n\n美國本土大致分成三大同步電網：東部互聯（Eastern Interconnection）、西部互聯（Western Interconnection），以及——德州自己一張，由 ERCOT 管理。德州電網之所以幾乎自成孤島、與東西兩大網只有非常有限的直流聯絡線，有一個歷史與制度上的理由：**只要不跨州大量輸送電力，就能避開聯邦（FERC）的跨州監管。** 這是一個出於監管自主的結構選擇。\n\n平時，這個選擇沒什麼代價。但它的代價是隱形的、只在最壞情況才展開的那種：當德州自己缺電缺到要崩的時候，它**無法從鄰區大量買電補缺口**——聯絡線的容量遠不足以填上 20,000 MW 級的窟窿。北方的電網可以靠互聯互通互相救援；德州把這條救生索，為了監管自主，自願留得很細。這是 **F10**（沒有獨立外援的單點脆弱）疊上 **F14**（同一張孤立網裡的機組同質地、同時地暴露在同一場寒潮下——單一栽培式的同時失效）。\n\n**潛伏條件三：氣電循環依賴——A 要 B，B 要 A。**\n\n這一層最隱蔽，也最該讓你這個畫過（或該畫而沒畫）依賴圖的人坐直身體。\n\n德州的電力高度依賴天然氣發電。寒潮一來，發電要燒更多天然氣。但天然氣不是從地裡冒出來就能燒——它要被開採、加壓、輸送、處理，而這整條供氣鏈的許多環節**靠電力驅動**：電動壓縮機、電動泵、處理廠的控制系統。於是你有一個循環依賴：\n\n```\n   發電廠 ──需要──► 天然氣\n     ▲                │\n     │                │需要\n   需要               ▼\n     └────── 電力 ◄── 氣田/處理廠\n```\n\n平時這個循環轉得好好的，因為兩邊都正常供應，誰也不缺誰。但循環依賴最危險的性質是：**它沒有獨立的起點。** 一旦兩邊同時受壓，它就變成一個互相惡化的死亡螺旋——停電讓氣田的電動設備停擺、供氣減少，供氣減少讓更多燃氣電廠停機，停機讓供電更缺、更多停電……每一圈都把兩邊一起往下拖。沒有人把「氣」和「電」當成**同一個系統**來規劃韌性；它們在組織上、監管上、商業上是兩個分開的世界，各自以為對方會穩定供應。這個假設——「我依賴的那個東西會一直在」——正是循環依賴致命的地方（這個形狀你在 ch13 的雲端連鎖會再看到一次：你的 status page 依賴它要回報故障的那個服務，見 ch13）。\n\n到 2021 年 2 月，德州電網的狀態是：一群沒被強制防寒的機組，掛在一張缺電時無法外援的孤島網上，而它的主力燃料與電力本身綁成一個會互相拖垮的循環。炸藥裝好了，引信還沒點。\n\n## 觸發：當供給崩潰與需求飆升同時發生\n\n2 月中旬，Uri 點了引信。但要精確：寒潮**不是**單獨壓垮了哪一根稻草，它是同時拉動了供需兩端——這正是它致命的原因。\n\n供給端，極端低溫直接動手。FERC／NERC 的聯合報告給了清楚的解剖（照 landscape）：到 2 月 16 日，全網約 **30,500 MW** 的機組停機容量裡，約 **18,000 MW 是天然氣發電**；而這些天然氣機組的停機，約 **72% 源於燃料供應問題**——不是機組本身壞了，是沒氣可燒。再看停機原因的整體分布：結凍問題占非計畫停機的約 **44.2%**，燃料問題約 **31.4%**。天然氣的**產量**在 2 月 17 日一度比常態下降約 **71%**，處理量在 2 月 15 日一度下降約 **82%**——氣田井口凍住、集氣與處理設施失能，循環依賴的那一邊先垮了，把另一邊一起拖下水。\n\n這裡要當場校正一個流行了好幾年的迷思（landscape 明確標出，本章必須點破）：**這不是「風機結冰」的錯。**\n\n事發當時與之後，有一種說法把責任推給再生能源——說是風力發電機結冰停轉害了德州。這不符合官方數據。FERC／NERC 的報告顯示，停機的主力是**天然氣等熱力發電**：2 月 16 日那 18,000 MW 的停機是天然氣，約 72% 因燃料供應。各種能源——燃氣、燃煤、核能、風電——都有機組因結凍或燃料中斷而失能，但把整場災難推給風電，是把一個跨能源、系統性的防寒失敗，簡化成一個方便的代罪羔羊。風電在德州冬季本就只占發電組合的一小部分，停掉的那點容量遠不是缺口主因。真正的主角，是那一大批沒做防寒、又燒著供不上來的天然氣的熱力機組。\n\n需求端，同一場寒潮把供暖負荷推到冬季高點。供給在崩、需求在飆，缺口在最冷的那幾小時開到最大。這就是觸發的全貌：不是一個閥門卡住、不是一行程式碼出錯，而是一個外部極端事件，**同時**踩中了供給與需求，而供給端那批機組之所以這麼脆弱，是因為十年的潛伏條件早就把它們的抗寒能力掏空了。\n\n## 連鎖：4 分 37 秒的餘裕\n\n現在把潛伏條件和觸發接起來，看孔洞怎麼一個個被穿透、頻率怎麼往深淵滑。\n\n機組因結凍與缺氣大量跳脫 → 供給驟減，但暖氣需求同時飆升 → 供需缺口擴大 → 系統頻率從 60 赫茲往下掉。這裡是**緊耦合**（F1／F7）登場的地方：頻率是全網瞬時共享的單一變數，沒有任何緩衝去吸收這個失衡。頻率一掉到接近 59.4 赫茲的危險區並停在那裡,下一道機關就在等著:頻率若繼續跌破某門檻,發電機的自動低頻保護會讓它們**跳脫自保**——而每一台跳脫又擴大缺口、讓頻率掉得更快,觸發下一批跳脫。這是典型的級聯正回授(F7):局部失效觸發連鎖、放大到全域,每一步都讓下一步更糟。\n\n而循環依賴在這時火上加油:停電讓天然氣田與處理廠的電動設備停擺,供氣進一步減少,逼更多燃氣機組停機,再加深缺口。氣和電互相把對方往下拖,沒有獨立的止血點。\n\n孤島電網的孔洞也在此刻張開:換成東部或西部互聯網裡的州,缺電時可從鄰區大量輸入電力撐住頻率。但德州那條為監管自主而留得很細的聯絡線,撐不起 20,000 MW 級的缺口(F10)。外援這道防線,在最需要的時刻不存在。\n\n於是操作員只剩一個選項,而且窗口短得驚人——ERCOT 說距離不可控的全網崩潰只剩約 4 分 37 秒。他們下令大規模強制甩負載:把約 20,000 MW、約 45% 的負載直接切掉,用犧牲數百萬戶的供電,硬把需求壓回供給撐得住的水準,讓頻率爬回 60。這個動作止住了滑坡——避免了那個更壞的結局:整網跌進 black start、全德州陷入恐需數日到數週才能恢復的全黑。\n\n請看清楚這個取捨的形狀。強制甩載**不是**「修好發電」,是「先把出問題的負載切掉,讓系統活著,再慢慢恢復」。它和 ch10 Cloudflare 的 kill switch、ch22 會講的「安全地壞」是同一個家族(見 ch22):在零餘裕、每分鐘都在惡化的當下,最快的存活不是修復,是切斷。代價極其慘重——但備選項(不可控全網崩潰)更慘。這是一張電網選擇了「痛苦地、但可控地壞」,而不是「不可控地死」。\n\n## 餘波:帳單與報告\n\n寒潮在 2 月 19 日前後緩解,氣溫回升,機組陸續恢復,負載逐步接回。但帳單已經開出。\n\n**傷亡(嚴格 hedge,照 landscape)**:停電影響逾 450 萬戶(約 4.5 million customers),部分長達約四天,發生在零度以下的低溫裡。死亡人數**有爭議**,必須給範圍:德州官方與州衛生部門的統計約為 **210 至 246 人**(直接加間接);但多項獨立研究估計,若把間接死亡(失溫、一氧化碳中毒——許多人在停電中用不安全的方式取暖、低溫使既有疾病惡化等)更完整地計入,死亡數可能達約 **700 人**(一說 702)。這個差距本身就值得停下來看:災難的真實規模常常大於官方的直接死亡統計,而「死了 200 多人」這個常見說法很可能低估了它。本書面對死亡保持克制與尊重——這些是在自己家裡、在一個本不該崩潰的系統崩潰時凍死的人,不是統計奇觀。\n\n**經濟損失(估計,⚠️ hedge)**:各方估計約 **800 億至 1,300 億美元**(US$80B–130B)。這是一個範圍、是估計,隨計算方法(直接財產損失、停產、農損、後續維修與補強)而差異很大,不要釘死成單一數字。\n\n**官方調查**:FERC 與 NERC 在 2021 年做了聯合調查,最終報告於 2021 年 11 月發布,含 28 項正式建議,核心直指**發電機組防寒不足**與**氣電協調不足**——也就是本章的潛伏條件一和三。報告沒把責任甩給「天災」或「風電」,而是指向那些可預防的系統性與制度性缺陷。和挑戰者的 Rogers Commission、哥倫比亞的 CAIB 一樣,一份誠實的調查報告的價值,在於它拒絕停在「運氣不好」這個放棄學習的答案上。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n- **潛伏條件**(早就裝填好的):(1) 機組防寒從未強制——2011、1989 兩次寒潮後已被 FERC／NERC 點名建議,卻無強制、無標準、無人追,「歷次沒釀大災」把動機侵蝕掉(F6 偏差正常化,本案核心);(2) 近乎孤島的電網,為避開聯邦監管而與東西兩大互聯網僅有限聯絡,缺電時無法大量外援(F10／F14);(3) 氣電循環依賴——發電靠氣、產氣靠電,無人把兩者當同一系統規劃韌性(F2)。\n- **觸發**(最後一根稻草):Winter Storm Uri 的極端持續低溫,**同時**凍結供給端(氣井、處理設施、機組)並飆升需求端(電熱供暖),在最冷時刻把供需缺口開到最大。\n\n把觸發拿掉,潛伏條件還在,等下一場夠冷夠久的寒潮;把潛伏條件補上任一道(2011 後強制防寒/多建跨區聯絡線/把氣電當單一系統做韌性),同一場 Uri 也不至於逼出 45% 的甩載。**這不是「天有不測風雲」的故事,是三道孔洞被一場可預見的寒潮恰好對齊的故事。**\n\n### 起司的孔洞\n\n```\n寒潮來襲 ─┬─[防線1: 機組防寒 winterization]── 破洞: 從未強制, 2011/1989 已警告 ★核心\n          │\n          ├─[防線2: 跨區輸電外援]──────────── 破洞: 孤島電網, 聯絡線太細無法大量輸入\n          │\n          ├─[防線3: 氣電解耦/獨立燃料]──────── 破洞: 循環依賴, 缺電與缺氣互相拖垮\n          │\n          ├─[防線4: 頻率自動保護]──────────── 破洞: 它救單機, 卻會觸發級聯跳脫(F4 性質)\n          │\n          └─[防線5: 強制甩負載 (kill switch)]─ 唯一擋住: 切 45% 負載, 避免不可控崩潰\n                                                ↓\n                                          電網存活(代價慘重)\n```\n\n| 防線 | 為什麼沒擋住 |\n|---|---|\n| 機組防寒（winterization） | **本案核心孔洞**：2011、1989 已被 FERC/NERC 點名建議，卻從未強制、無最低標準、無人追驗——「歷次沒事」把它正常化掉了（F6） |\n| 跨區輸電外援 | ERCOT 為避開聯邦監管刻意半孤立，聯絡線容量遠不足以填 20,000 MW 級缺口（F10/F14） |\n| 氣電解耦／獨立燃料 | 電與氣是循環依賴：發電靠氣、產氣靠電，缺一邊就互相惡化，無人把兩者當同一系統規劃（F2） |\n| 頻率自動低頻保護 | 它保護單台機組不受損，但在全網缺電時，每台跳脫都擴大缺口、加速下一台跳脫——保護機制本身助長級聯（F4 的一個面向） |\n| 強制甩負載 | **唯一擋住的一層**：主動切掉 45% 負載，是它把「不可控全網崩潰」換成「可控的痛苦停電」 |\n\n這張表反駁「單一根因」的衝動：把任何單一一層補起來，這場災難都不會以這個規模發生。能問的問題不是「哪場寒潮太強」「哪個能源不行」，是「**為什麼一場可預見的寒潮能一路穿透到逼出 45% 的甩載**」。\n\n### 對應模式\n\n- **F6（偏差正常化／漂移）**：本案主角。防寒在 2011、1989 後已被明確建議，卻在「歷次沒釀大災」中被一年年正常化成「不必做」。沒有壞人、沒有莽撞的瞬間，只有一連串「上次也沒事」累積成的制度性盲點。這正是 ch14 挑戰者攤開講透的同一個機制的基礎設施版（見 ch14）。\n- **F8（潛伏條件 vs 觸發）**：災難的炸藥在 2011 年就堆好，Uri 只是點引信。把寒潮當「根因」，就錯過了真正可控的東西。\n- **F10／F14（孤島脆弱／單一栽培式同時失效）**：孤島電網讓外援這道防線不存在（F10）；同一場寒潮同質地、同時地打中一整網沒做防寒的機組（F14）。\n- **F2（互動複雜度／循環依賴）**：氣電互賴是一個設計時沒被當成單一系統看待的循環——A 要 B、B 要 A——在雙邊同時受壓時變成死亡螺旋。\n- **F7（級聯）**：頻率失衡 → 機組自動跳脫 → 缺口擴大 → 更多跳脫的正回授，是把局部失效放大到全域、險些跌進 black start 的級聯引擎。\n\n### 一句話形狀\n\n**這場災難的形狀是：一群在「上次也沒事」中被免除防寒的機組，掛在一張為監管自主而無法外援的孤島電網上，靠著一對會互相拖垮的氣電循環依賴供電——當一場 2011 年就被警告過的寒潮同時凍結供給、飆升需求，緊耦合的頻率在 4 分 37 秒的餘裕裡逼出美國史上最大規模、近三日的強制甩載。**\n\n## 換成你的系統\n\n你活在這個形狀的正中央——只是你的「寒潮」叫尖峰流量、區域故障或一次同時到來的依賴降級。\n\n**先點名一個你「應該沒事吧」的假設**：你那條長年掛著「P3、暫不處理」的已知問題，**因為過去三年沒爆，所以它大概還能再撐**。\n\n這個假設錯的時候會這樣壞：那條你心知肚明的 retry 設定（或連線池上限、或某個沒有 backpressure 的 consumer），在平時的負載分佈下確實沒事——就像德州的機組在溫和的冬天確實沒事。但「沒爆」不是因為它**安全**，是因為觸發它的那組極端條件（一場夠冷夠久的寒潮／一次夠大夠久的尖峰）剛好還沒同時到齊。你把「過去沒事」當成了「未來安全」，而真正的安全要靠那個性質本身成立（重啟不丟訊息、連線池有界且降級、retry 有 backoff 與熔斷），不是靠運氣。而當那組極端條件真的同時到齊時——往往就是供給最緊、你最沒有餘裕處理的那一刻——它不會溫和地壞，它會在最糟的時間點爆。\n\n**第二個假設，給畫過依賴圖的你**：你的保護機制和它要保護的東西，是**獨立**的。德州把這題答錯了——氣是電的燃料，電是氣的動力，兩者綁成循環，於是缺電與缺氣互相惡化。問你自己：你的 circuit breaker 狀態、你的 feature flag、你的降級開關、你的 status page、你的告警鏈路——它們依賴的東西，會不會正是它們要在故障時保護或回報的那個東西？如果你的「故障時的逃生機制」依賴「正在故障的系統」，那它就是德州的氣電循環(見 ch13 的雲端版)。\n\n可操作的自問,三個:\n\n1. **我的「已知問題」清單上,哪幾條是「被正常化的偏差」,而不是「主動分析過、定義了退出條件的可接受風險」?** 對每一條,問:當初接受它時,我們是查過數據、寫下「在 X 條件下我們會重新處理它」,還是只是因為它沒爆就默認了?(分辨這兩者,正是 ch14 的核心功課。)\n2. **我畫過服務依賴圖、找過循環依賴嗎?** 特別是「故障時才會用到的機制」(熔斷狀態、降級路徑、告警、status page)——它們有沒有依賴它們要保護/回報的對象?把這些循環標出來,它們就是你的氣電耦合(見 ch13)。\n3. **當系統開始不可控地往下滑,我有沒有一個『甩負載』的杆可拉?** 一個能在不修復的前提下,主動犧牲一部分(降級非核心功能、shed load、關掉某個吃資源的子系統)以保住核心存活的機制?德州那 45% 的甩載很慘,但它讓電網沒有全黑。你的系統在最壞情況下,是會「痛苦地、可控地壞」,還是「不可控地死」?\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n口頭(或寫在紙上)向另一個工程師解釋:為什麼「這場停電的根因在 2011 年就寫好了」?請務必講到:(a) 2011/1989 的寒潮後 FERC/NERC 做了什麼、結論是什麼;(b)「防寒從未強制」如何透過「歷次沒釀大災」被一步步正常化(F6);(c) 為什麼把 Winter Storm Uri 當成「根因」是錯的問法、它在因果鏈上扮演什麼角色(F8)。\n\n#### 推演解答\n\n(a) 2011 年 2 月德州一場較小的寒潮就造成大量機組結凍跳機、被迫輪流停電;事後 FERC 與 NERC 做了聯合調查,報告明確建議強化機組防寒;1989 年的寒潮也演過類似劇本。
