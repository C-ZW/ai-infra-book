<script id="bookdata" type="application/json">{"chapters": [{"id": "ch01-normal-accidents", "file": "ch01-normal-accidents.md", "group": "Part I — 框架與前傳", "title": "ch01 — 正常意外：為什麼複雜系統注定會崩壞（序章）", "md": "# ch01 — 正常意外：為什麼複雜系統注定會崩壞（序章）\n\n> **本章解剖什麼**：這是序章，給你讀完整本書的那副眼鏡。本書的核心商品不是任何一場災難，而是一套看災難的方法——嚴重事故幾乎從不是單一原因、單一罪魁禍首，而是一群各自無害的小東西恰好對齊的結果。本章先用一個你天天在做的線上 incident 當縮影，示範整本書的讀法，再交給你三件貫穿全書的工具（Perrow 的正常意外、Reason 的瑞士起司、Cook 的〈How Complex Systems Fail〉），最後攤開全書地圖與失敗模式語言 F1–F14。主打 F1–F3 的概覽；後面每一章都是把這副眼鏡戴上去看一場具體災難（從 ch03 的塔科馬海峽橋開始）。\n\n```\nPart I 框架與前傳 ◄你在這裡   Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n你寫過 postmortem。不是那種樣板填空，是真的在事後坐下來，把一條時間線一格一格拼回去的那種。\n\n回想其中一次。對外那欄你可能寫了一句乾淨俐落的話——「根因：某次部署引入的迴歸」。但你自己心裡清楚，那句話是給管理層看的。真正發生的事，寫在下面那長長一串 contributing factors 裡：那個迴歸之所以能上線，是因為 review 的人剛好被另一件事拉走；它之所以能在線上撐了半小時沒被發現，是因為對應的那條 alarm 三個月前因為太吵被人調成了 warning；它之所以從一個服務的 5xx 滾成跨服務的雪崩，是因為上游的 retry 沒有退避、把下游的恢復窗口踩死了；而你之所以花了四十分鐘才定位，是因為那天值班的人不是寫這段 code 的人，runbook 又過期了。\n\n把這五件事拿掉任何一件，那次 incident 都不會發生，或者至少不會那麼痛。沒有任何一件單獨來看是「錯」的——調 alarm 的人有他的理由，那條 alarm 確實每週誤報三次;沒退避的 retry 在九成的場景下是對的;runbook 過期是因為大家都很忙。它們各自無害。災難是它們**恰好同時對齊**那一刻才誕生的。\n\n這就是本書要講的全部。你在你那台 10K+ CCU 的系統上、在那條 K8s CronJob→SQS→冪等消費者的結算 pipeline 上、在那個你帶著全團隊用的多層 cache library 上——已經反覆活過這個形狀了。你只是還沒發現，三十年前的核電廠、四十年前的橋樑、十年前蒸發近兆美元的股市，崩壞的時候是**同一個形狀**。\n\n本書就是這件事的放大版：把你 postmortem 裡那串 contributing factors，跨領域、跨七十年、放大來看。我不教你開飛機、不教你運轉反應爐。我要給你的是一副眼鏡，讓你下次在「應該沒事吧」出口之前，認得出那是哪一號失敗模式正在悄悄裝填。\n\n## 一個你認得的縮影：那個「單因」其實有五層\n\n先不講大災難。先講一個你昨天可能就見過的東西。\n\n凌晨兩點，PagerDuty 響了。某個核心 API 的 p99 latency 開始往上爬，接著 5xx 噴出來，幾分鐘內整個服務對外不可用。值班的人爬起來看 dashboard。\n\n第一個被找到的「原因」很乾淨：**有人在前一天傍晚部署了一個版本，那個版本的某個查詢少了一個 index，慢查詢拖垮了連線池。** 寫進 postmortem，標題欄填「根因：缺少 index 的慢查詢」。回退、加 index、結案。\n\n但如果你真的把那一夜拆開，你會看到不是一個洞，是一整排洞剛好連成一線：\n\n- **那個慢查詢本身**：開發在本地測試時資料量只有幾千筆，查詢毫秒回應，看起來「應該沒事」。生產有幾千萬筆。這個洞叫「測試環境與生產的假設縫」。\n- **CI 沒擋下來**：你們的 CI 會跑單元測試、會強制 OpenAPI 同步，但**沒有**對 SQL 做 explain plan 的把關。這個洞平時無所謂，因為大部分 PR 不碰熱路徑查詢。\n- **連線池的設定**：max connections 設成一個三年前拍板、之後沒人動過的數字。它在正常負載下綽綽有餘，所以「沒人覺得需要重看」。慢查詢一來，連線被佔住不放，池子瞬間見底。\n- **重試把局部變成全域**：上游服務看到下游超時，照預設重試三次。一個請求變三個，把已經見底的連線池踩得更死。這個 retry 在下游只是「偶爾抖一下」的場景下是救命的;在下游「持續性慢」的場景下是催命的。\n- **alarm 沒在該叫的時候叫**：你們其實有一條「DB 連線池使用率」的 alarm，但它的閾值設在 95%，而且兩個月前因為一次容量演練誤報過、被人臨時調高又忘了調回來。等它真的叫，服務已經掛了八分鐘。\n\n五個洞。把任何一個補上——本地用生產量級的資料測、CI 加 explain plan 把關、連線池有合理的上限與快速失敗、retry 有退避與熔斷、alarm 閾值正確——這次 incident 就被擋在某一層，不會穿透到使用者。\n\n「缺少 index 的慢查詢」不是根因。它只是**最後一根稻草**，是那個剛好讓五排洞對齊的觸發事件。真正的問題不在那個查詢，在於**為什麼你有五層防禦，卻每一層都沒擋住**。\n\n記住這個縮影的形狀。本書接下來二十一章，每一章都是這個形狀的放大版——只是把「服務掛了八分鐘」換成「346 條人命」「近兆美元蒸發」「半個網際網路斷線」。機制更致命，但解剖的方法一模一樣。\n\n## 工具一：正常意外——有些系統,出事是統計上遲早的事\n\n1979 年三哩島核電廠那場差點熔毀的事故（見 ch16）之後，一位耶魯的社會學家 Charles Perrow 被找去參與分析。他得出一個讓整個工程界不舒服的結論，寫成了 1984 年的《Normal Accidents: Living with High-Risk Technologies》。\n\nPerrow 的核心主張是：在某一類系統裡，嚴重事故**不是異常，而是系統的正常產物**。不是「會不會」出事，是「何時、以哪種對齊方式」出事。他甚至替這種事故取了名字——**normal accident**（正常意外），或者 **system accident**（系統性意外）。「正常」不是說它常見，而是說它是這個系統的**內建性質**，是設計本身的必然衍生物，不是哪個人犯了錯才有的反常。\n\n哪一類系統？Perrow 給了一張二維的地圖，兩個軸：\n\n- **互動複雜度（interactive complexity）**：子系統之間有多少非線性、非預期、設計者當初根本沒想到的交互。低互動複雜度的系統像生產線——A 接 B 接 C，看得見、想得通。高互動複雜度的系統裡，A 會以你沒料到的方式影響到 F，而且只在某個特定狀態下才會發生，平時看不出來。Perrow 的話：簡單的原理以非線性的方式組合，會長出設計者**無法預見**的新性質。\n- **緊耦合（tight coupling）**：一處失效有沒有緩衝、有沒有時間餘裕。緊耦合的系統裡,一個地方壞了會立刻、直接、沒有喘息地傳導下去;鬆耦合的系統有 buffer、有 slack、有「先停下來想一下」的空間。\n\nPerrow 的判決是：**當一個系統同時落在「高互動複雜度」與「緊耦合」的那一格，正常意外就是不可避免的。** 用他自己的話：「如果互動複雜度與緊耦合這兩個系統特性必然會產生事故，我認為我們有理由稱之為正常意外、或系統性意外。」互動複雜度是**扳機**——它製造出沒人預見的交互;緊耦合是**放大器**——它讓那個交互在你反應過來之前就傳遍全身。\n\n```\n互動複雜度：低 ──────────► 高\n┌────────────┬────────────┐\n│ 水壩       │ 核電廠     │ 緊\n│ 鐵路       │ 化工廠     │ 耦\n│            │ 航太       │ 合  ◄── 正常意外的家\n├────────────┼────────────┤\n│ 製造業     │ 大學       │ 鬆\n│ 郵局       │ 研發機構   │ 耦\n│            │            │ 合\n└────────────┴────────────┘\n（依 Perrow 1984 的分類示意，非原圖精確座標）\n```\n\n現在把你的後端系統放上去。一個服務、一個資料庫、幾條 cron——大概落在偏左偏鬆的位置，出事多半看得懂、修得回來。但你那台 10K+ CCU、跨服務最終一致、有 SQS 佇列與冪等消費者、有自動 scaling 與自動 failover、跑在別人機房上的分散式系統呢？每加一個「自動幫你處理」的機制、每多一條跨服務的依賴、每砍掉一層 buffer 去追延遲，你就把這個系統往**右上角**推一點。\n\nPerrow 的洞見對你意味著什麼：你引以為傲的那些「優化」——更緊的耦合換更低的延遲、更多的自動化換更少的人工——每一筆都在把你的系統搬向正常意外的家。這不是叫你別優化，是叫你**知道自己在往哪走**。\n\n## 工具二：瑞士起司——災難需要孔洞同時對齊\n\nPerrow 告訴你「哪些系統注定會出事」。James Reason 告訴你「出事的時候，事情長什麼樣」。\n\nReason 是英國的心理學家，1990 年的《Human Error》提出了那個後來被航空、醫療、核能全部採用的比喻——**Swiss-cheese model（瑞士起司模型）**。\n\n想像你的系統有好幾層防禦，疊在一起，像一片片直立平行擺著的瑞士起司。每一片都有洞——沒有任何一層防禦是完美的，每一層都有它的弱點與盲區。平時這些洞**錯開**，所以一個危險想穿過去，會被某一層擋住。災難發生，是當**所有層的洞，在某一刻,恰好對齊成一條直線**——Reason 稱之為「事故機會的軌跡（a trajectory of accident opportunity）」,危險一路穿過每一層的洞，直達傷害。\n\n回頭看你那個慢查詢 incident：本地測試是一層起司（洞：資料量不對）、CI 是一層（洞：不檢查 SQL）、連線池設定是一層（洞：上限過時）、retry 策略是一層（洞:沒退避）、alarm 是一層（洞:閾值錯）。五片起司,五個洞,平時錯開,那一夜對齊。一模一樣的圖。\n\nReason 還做了一個對本書至關重要的區分——洞分兩種：\n\n- **active failure（主動失效）**：操作的人在事發當下犯的錯。看得見、好歸咎、最容易被寫進報告當「根因」。\n- **latent condition（潛伏條件）**：早就存在、靜靜躺在系統裡的弱點，可能是幾個月前的一個設定、一個設計決策、一個被砍掉的測試。它可以休眠數年,直到某天有人踩中。\n\n這個區分是焦慮工程師的命門。因為事後最容易看見的是 active failure——「那個值班的人少做了一步」——但真正讓災難成為可能的，幾乎總是那些早就裝填好、沒人注意的 latent condition。把調 alarm 閾值的人揪出來罵一頓，下一次同型事故照樣會來，因為**那五個洞還在**。\n\n本書每一章的 `## 故障解剖` 段落，都會老老實實地把該災難的每一層起司列出來，逐層問：這層為什麼沒擋住？這是本書對「找單一根因」這個壞習慣最直接的反擊。\n\n## 工具三：Cook 的清醒——複雜系統永遠在退化模式下運行\n\n第三件工具不是一本書，是一篇只有幾頁、卻被無數 SRE 印出來貼在牆上的短文：Richard Cook 醫師 1998 年的〈How Complex Systems Fail〉，十八條對複雜系統失效本質的觀察。Cook 是麻醉科醫師兼安全研究者，他講的本來是手術室與病人安全，但每一條都精準命中你的分散式系統。挑幾條對你最致命的：\n\n- **第 3 條:「Catastrophe requires multiple failures – single point failures are not enough.」**（災難需要多重失效——單點失效不足以釀災。）這就是瑞士起司的另一種說法,也是本書反覆敲打的那根釘子。\n- **第 4 條:「Complex systems contain changing mixtures of failures latent within them.」**（複雜系統內部，永遠藏著一組不斷變化的潛伏失效。）你的系統**此刻**就帶著一堆 latent condition 在跑——某個過時的設定、某段沒人敢動的死碼、某條被靜音的 alarm。你不知道是哪些,你只知道一定有。\n- **第 5 條:「Complex systems run in degraded mode.」**（複雜系統永遠運行在退化模式下。）這條最反直覺也最重要。你的系統從來不是「全綠」的——任何時刻都有某個節點不健康、某個 retry 在重試、某個降級在生效。系統能正常服務，**不是因為它沒有故障，而是因為它帶著一堆故障還能跑**。「一切正常」是一種錯覺;真相是「故障的數量目前還沒對齊到致命」。\n- **第 7 條:「Post-accident attribution to a 'root cause' is fundamentally wrong.」**（事後歸因到一個「根因」，從根本上就是錯的。）Cook 說得很硬：因為災難需要多重失效，所以**不存在**一個單一的根因。「根因」是一個**事後建構**——是我們為了讓故事有個結尾、讓焦慮有個著落，回頭挑一個因素叫它「根因」。它滿足心理需求，不反映系統真相。\n- **第 8 條:「Hindsight biases post-accident assessments of human performance.」**（後見之明會扭曲事後對人的評價。）事發後你**已經知道**結果了，於是回頭看當事人，會覺得「這不是很明顯嗎，他怎麼沒看出來」。但在當下，他面對的是資訊不全、訊號淹沒在噪音裡、十幾個同樣合理的可能性。本書有一條鐵律（ch02 會展開）:在嘲笑任何當事人「怎麼這麼蠢」之前,先問——**換成我,在那個時空、那個資訊量下,真的看得出來嗎?**\n\n把這三件工具合起來，你就有了本書的完整讀法：Perrow 告訴你**哪些系統注定會出事**（高互動複雜度 × 緊耦合）;Reason 告訴你**出事時是多層孔洞對齊**，而且要分清潛伏與主動;Cook 告訴你**別找根因，要找「為什麼每一層都沒擋住」**，並且對「都是人為疏失」這個結論永遠保持懷疑。\n\n## 失敗模式語言：本書的貨幣\n\n工具給了你看的方法。但你需要一套**詞彙**，才能把每一場災難拆解、命名、互相對照——才能在讀完車諾比之後，一眼認出你昨天那個 incident 跟它共用了哪幾個零件。\n\n這套詞彙就是本書的招牌：**失敗模式語言 F1–F14**。每一章的 `## 故障解剖` 都會把該災難對應到這些編號;全書累積，到終章（ch23）組裝成一份完整目錄。這是本書的「貨幣」——一種你可以拿來跟另一個工程師交易、彼此秒懂的通用語。先給你全套概覽（完整定義見附錄 B）:\n\n| 編號 | 失敗模式 | 一句話 |\n|---|---|---|\n| F1 | 緊耦合 | 一處失效沒有緩衝、沒有時間餘裕，直接傳導下去 |\n| F2 | 互動複雜度 | 子系統之間有非線性、非預期、設計者沒想到的交互 |\n| F3 | 起司孔洞對齊 | 多層防禦各有破洞，平時錯開，出事那天恰好連成一線 |\n| F4 | 安全系統即危險源 | 用來保護的機制本身造成事故 |\n| F5 | 自動化的諷刺 | 自動化拿走了操作員平時的練習與狀況意識,出事時他接不住 |\n| F6 | 偏差正常化／漂移 | 僥倖一次次被當成「沒事」,安全邊界被慢慢吃掉 |\n| F7 | 級聯／雪崩 | 局部失效觸發連鎖,一路放大到全域 |\n| F8 | 潛伏條件 vs 觸發 | 災難早已裝填好,觸發事件只是最後一根稻草 |\n| F9 | 介面與假設的縫 | 兩個各自正確的子系統,對單位／契約／前提的假設不一致 |\n| F10 | 單一故障點／單一感測器 | 一個點的失效就能拖垮全局,且沒有獨立的交叉驗證 |\n| F11 | 監控盲區 | 該叫的警報沒叫、或被淹沒,操作員看到的世界與真實脫節 |\n| F12 | 變更即觸發 | 部署、設定更新、程式重用、旗標切換——「動了它」就是觸發 |\n| F13 | 生產壓力壓過安全 | 進度／成本／發射窗口壓過了「先停下來查清楚」 |\n| F14 | 規模放大／單一栽培 | 同質化＋規模讓單點失效一次打中所有人 |\n\n前三個 F1–F3 是這套語言的脊椎，剛好對應你剛學到的三件工具:F1 緊耦合與 F2 互動複雜度是 Perrow 的兩個軸;F3 起司孔洞對齊是 Reason 的模型。其餘十一個是這兩個母模式在不同場景下長出的具體面貌。本書接下來的每一章,都會點亮其中幾個。\n\n這套語言的價值在於**可重用**。學會它,你就不再是一場一場孤立地讀災難;你會開始看見模式在跨時代重複——塔科馬海峽橋的 flutter（ch03）跟你壓測時遇過的自激震盪是同一個 F2;車諾比那顆按下去反而引爆的 AZ-5（ch17）跟法航 447 那個推頭才響的失速警告（ch05）共用 F4;CrowdStrike 一次推全球 850 萬台（ch13）跟 Cloudflare 一條 regex 同步部署（ch10）共用 F14。**一場災難就是一組 F 編號的特定組合。** 這就是本書讓你帶走的東西。\n\n## 故障解剖\n\n本章沒有歷史災難可解剖（那從 ch03 開始）。所以這一段,我們把上面那個慢查詢縮影當案例,示範本書每一章 `## 故障解剖` 會怎麼進行——這也是你讀完全書後該有的反射動作。\n\n**潛伏條件 vs 觸發。**\n\n| | 內容 |\n|---|---|\n| **早已裝填的潛伏條件** | 本地測試資料量級不對（縫已存在數月）；CI 不檢查 SQL plan（設計缺口）；連線池上限是三年前的過時數字；retry 無退避策略；alarm 閾值兩個月前被臨時調高沒調回 |\n| **最後那根稻草（觸發）** | 一次引入慢查詢的部署——`F12 變更即觸發`。它本身平凡無奇，致命的是它恰好讓上面五個潛伏條件對齊 |\n\n**起司的孔洞——每一層為什麼沒擋住:**\n\n| 防禦層 | 它的洞 | 為什麼平時沒事 |\n|---|---|---|\n| 本地測試 | 資料量幾千筆 vs 生產幾千萬 | 多數 PR 不碰熱路徑查詢 |\n| CI 把關 | 不對 SQL 做 explain plan | OpenAPI/單元測試擋住了大部分問題,這個缺口很少被踩 |\n| 連線池 | 上限過時、無快速失敗 | 正常負載遠低於上限 |\n| Retry 策略 | 無退避、無熔斷 | 下游「偶爾抖一下」時,重試是救命的 |\n| Alarm | 閾值被調高沒調回 | 平時不誤報就沒人想起它 |\n\n明確反駁「單一根因」:把「慢查詢」叫做根因,等於只盯著最後一片起司上的那個洞，假裝另外四個洞不存在。如果你的修復只是「回退這次部署」,你補的是觸發,不是系統——那五個洞還在，下一個能讓它們對齊的觸發遲早會來（可能是一次流量尖峰、一次依賴升級、一次設定變更）。\n\n**對應模式**：這個縮影命中 `F8`（潛伏條件 vs 觸發——五個洞早就裝填好）、`F3`（起司孔洞對齊——五層全沒擋住）、`F12`（變更即觸發——部署是稻草）、`F1`（緊耦合——連線池見底直接傳導、retry 無 buffer）、`F11`（監控盲區——alarm 該叫沒叫）。五個 F,一場凌晨兩點的小事故。\n\n**一句話總結**:這場災難的形狀是——**一個平凡的變更,恰好讓五層各自無害的潛伏孔洞對齊,在緊耦合下於八分鐘內穿透到使用者,而唯一能示警的監控正好被調瞎了。**\n\n如果你能對你自己的 incident 寫出這樣一段——而不是「根因:某次部署」——你就已經學會了這本書要教的全部。剩下的二十一章,只是把這套手法,在比你的系統更古老、更致命、更被誤解的災難上,一遍遍練到成為本能。\n\n## 換成你的系統\n\n把鏡頭轉回你維運的那套系統。\n\n你那個帶著全團隊用的**多層 cache library**(in-memory → S3 → local，含 graceful degradation)——它其實是本書正面教材的雛形(ch22 會把它放進從阿波羅到今天的韌性譜系)。一層壞了退到下一層，這正是「安全地壞」。但焦慮工程師要問的是另一個問題:**你的「graceful degradation」自己有沒有 latent condition?**\n\n點名一個你「應該沒事吧」的假設:**「快取退化路徑我寫過、上線過,所以它能運作。」**\n\n這個假設錯的時候會怎麼壞?想想 Cook 第 5 條——複雜系統永遠在退化模式下運行。你的 S3 層那條 fallback 路徑,平時根本不會被走到(因為 in-memory 幾乎總是命中)。它是一段**幾乎從不執行的 code**。於是:\n\n- 半年前某次重構改了 S3 client 的初始化,沒人在退化路徑上測過,那條 path 現在其實會 throw——但你不知道,因為它從沒被走到過。這是一個正在你系統裡休眠的 latent condition(F8)。\n- 真正需要它的那一刻,是 in-memory 與 S3 同時出問題的時候——也就是系統已經在壓力下、最不能再出錯的時候。緊耦合(F1)讓這個失效直接傳導,而你以為的「安全網」其實破了個洞。\n- 更糟:如果這條 fallback 在大流量下被同時觸發,所有實例同時湧向 local 或同時 throw,你會得到一個 thundering herd——降級機制本身變成 F7 級聯的源頭。\n\n可操作的自問,不是「要小心」,是這個:**你最後一次真的讓 in-memory 與 S3 同時失效、驗證 fallback 確實走通,是什麼時候?** 如果答案是「上線時測過一次」或「沒有,但邏輯看起來對」——那你的安全網就是一段沒人驗證過的死碼——休眠的程式碼一旦被某次部署或某個旗標喚醒,正是本書反覆出現的 F8 潛伏條件(見 ch19 Heartbleed 潛伏兩年)。退化路徑不演練,等於沒有。\n\n## 紙上推演\n\n### 推演題1 **[20 分鐘]** ★★\n\n翻出你經手過的一次真實 incident（最好是你寫過或讀過 postmortem 的那種）。**用瑞士起司把它重畫**:列出當時存在的每一層防禦(測試、review、CI、監控、限流、熔斷、容量上限、值班流程……),逐層寫下它那天的「洞」是什麼、以及它平時為什麼沒事。然後回答:如果要把這次事故擋下來,哪些洞是「補一個就夠」、哪些是「補了也只是把對齊延後」?最後,把你當初寫的「根因」那一句,跟這張起司圖對照——那句話遺漏了幾層?\n\n#### 推演解答\n\n重點不在你畫得多漂亮，在於你會發現兩件事。\n\n第一:你當初寫的「根因」幾乎一定只對應到最後一片起司上的那個洞(通常是觸發,F12 變更即觸發,或某個 active failure)。其他幾層的洞——那些 latent condition——往往根本沒進到「根因」那一欄,最多被塞在「contributing factors」裡草草帶過。這正是 Cook 第 7 條:根因是事後建構,它讓報告有個乾淨的結尾,但它系統性地隱藏了真正讓災難成為可能的潛伏層。\n\n第二:當你問「補一個夠不夠」,你會分出兩類洞。有些洞補上就真的關掉一整條軌跡(例如「連線池加上快速失敗與合理上限」,直接讓慢查詢無法拖垮整池)。有些洞補了只是把下次對齊延後(例如「這條 alarm 閾值調回去」——但下一條被靜音的 alarm 還在排隊)。後者指向一個更深的問題:你的系統有沒有一個**製造 latent condition 的機制**(例如「alarm 太吵就調高、沒人追蹤、沒人調回」這個流程本身)?能看到這一層,你就從修 bug 升級到修系統了。\n\n### 推演題2 **[15 分鐘]** ★★\n\n拿 Perrow 的二維分類(互動複雜度 × 緊耦合),把你**目前負責的某個系統**放上座標。先誠實定位它現在在哪一格,再做一件事:列出你過去一年對它做的三個「改進」(加了自動 failover?砍了一層 buffer 去降延遲?多接了一個跨服務依賴?),逐一判斷每個改進把這個系統往座標的哪個方向推。\n\n#### 推演解答\n\n幾乎所有以「效能」「自動化」「可用性」為名的改進,都是把系統往**右上角**(高互動複雜度 × 緊耦合)推。\n\n- 加**自動 failover / 自動 scaling**:增加互動複雜度(現在有一個會自己動作的子系統,它跟主系統有你沒完全想清楚的交互——例如 failover 在某個邊界條件下會 flap),通常也增加緊耦合(自動動作沒有人類的「先停下來想一下」那段 buffer)。\n- **砍 buffer 降延遲**(減小佇列、縮短 timeout、拿掉中間 cache):直接增加緊耦合——你正是在拿掉「一處失效時的時間餘裕」。\n- **多接一個跨服務依賴**:增加互動複雜度與緊耦合兩者,尤其如果新依賴造成隱藏的循環依賴(見 ch12 氣電互賴、ch13 AWS status page 依賴 S3)。\n\nPerrow 的判決不是「別做這些」——是要你**知道每一筆改進都在抬高正常意外的機率**。這給你一個務實的判準:當你往右上角推一格,你有沒有**同時**補一道對應的防禦(canary、kill switch、熔斷、退避)?如果你只顧著往右上推、不補防禦,你是在主動為下一場正常意外裝填彈藥。終章(ch23)會把這變成一份可操作的清單。\n\n### 推演題3 **[15 分鐘]** ★★★\n\n用你自己的話,對一個資淺工程師講清楚:**為什麼「找出那個犯錯的人」是錯的問法?** 不能只說「不要怪人,要怪系統」這種口號——要講到他真的懂為什麼這在工程上是必要的、而不只是政治正確。\n\n#### 推演解答\n\n一個夠格的回答至少要踩到三個點。\n\n一、**它在事實上就是錯的**(Cook 第 3、7 條):災難需要多重失效對齊,所以根本不存在一個「那個人」的單一根因。你揪出來的那個人,只是站在最後一片起司前面、最容易看見的那個。把他換掉,其他幾層的洞還在,同型事故照樣回來。\n\n二、**後見之明在騙你**(Cook 第 8 條):你事後覺得「這明明很明顯」,是因為你已經知道結果了。當事人在當下面對的是訊號淹沒在噪音裡、十幾個同樣合理的可能、生產壓力催著他動作。把「人為疏失」當結論,等於用你的後見之明去審判他的當下——這不公平,而且學不到東西。真正該問的是:**是什麼系統條件,讓這個人在那一刻幾乎不可能做對?**\n\n三、**這是最關鍵的工程理由——追究個人會讓你拿不到真相**(ch02 會深入 just culture):一旦你的文化是「出事就找人背鍋」,那麼下一次出事,沒有人會告訴你他到底做了什麼、看到了什麼、為什麼那樣判斷。你會失去事故資料,而事故資料是你預防下一次同型災難的唯一原料。blameless 不是仁慈,是**為了拿到真相而付的代價**。你自己 postmortem 範本裡那個「blameless」標籤,就是這個道理——它在保護的不是當事人的面子,是你下次的 uptime。\n\n## 自我檢核\n\n口頭回答以下問題;講得出來才算過關,優先講「為什麼」而不是背名詞。\n\n1. 用一句話講出 Perrow 的核心主張:在什麼條件下,嚴重事故是「統計上遲早的常態」而非異常?那兩個條件分別在做什麼(誰是扳機、誰是放大器)?\n2. 把瑞士起司模型講給一個沒聽過的人:洞代表什麼?災難在什麼時刻發生?latent condition 與 active failure 的差別為什麼重要?\n3. Cook 說「複雜系統永遠運行在退化模式」。這對「我的 dashboard 現在全綠,所以一切正常」這句話意味著什麼?\n4. 為什麼 Cook 說「事後歸因到一個根因,從根本上就是錯的」?「根因」滿足的是什麼需求、隱藏的是什麼真相?\n5. 後見之明偏誤(hindsight bias)如何讓你誤判事故中的當事人?在嘲笑任何人「怎麼這麼蠢」之前,你該先問哪一個問題?\n6. F1、F2、F3 分別對應到本章的哪件工具(Perrow 的兩個軸、Reason 的模型)?為什麼說它們是失敗模式語言的脊椎?\n7. 拿你那個慢查詢縮影(或你自己的 incident):講出至少三層各自獨立的防禦,以及它們各自為什麼沒擋住。為什麼「回退那次部署」不算真正的修復?\n8. 你過去一年對系統做的某個「改進」,把它往 Perrow 座標的哪個方向推了?你有沒有同時補上對應的防禦?\n\n## 延伸閱讀\n\n- **Charles Perrow,《Normal Accidents: Living with High-Risk Technologies》(1984)**——本書一號主張的源頭。互動複雜度 × 緊耦合的二維分類、以三哩島為原型發展的「正常意外」概念都出自這裡。讀它你會永遠改變對「高風險系統」的直覺:有些事故是設計的必然,不是誰的錯。\n- **James Reason,《Human Error》(1990)**——瑞士起司模型的原典,以及 latent condition / active failure 的區分。航空、醫療、核能的安全文化幾乎都建立在這本書上。讀它學會「別只看最後犯錯的那隻手,要看整排早就破掉的起司」。\n- **Richard I. Cook,〈How Complex Systems Fail〉(1998,十八條)**——幾頁長、終身受用。建議印出來貼在工位上。本章引的第 3、4、5、7、8 條只是開胃,十八條每一條都精準命中分散式系統。線上有多個免費全文版本(搜尋標題即可,如 how.complexsystems.fail)。\n- (預告)本書接下來:ch02 給你一整套讀事故報告的方法(根因迷思、人為疏失的陷阱、just culture、漂移到失效);ch03 證明這些失敗模式早在電腦出現之前,就在橋樑與走道上演過(塔科馬海峽橋的 flutter、凱悅走道倒塌)。\n"}, {"id": "ch02-anatomy-tools", "file": "ch02-anatomy-tools.md", "group": "Part I — 框架與前傳", "title": "ch02 — 解剖一場災難的工具：根因、人為疏失與漂移", "md": "# ch02 — 解剖一場災難的工具：根因、人為疏失與漂移\n\n> **本章解剖什麼**：這不是一場災難，是讀懂所有災難的那套工具。ch01 給了你失敗模式語言（F1–F14）與瑞士起司這副眼鏡；本章教你怎麼戴它——怎麼讀一份事故報告而不被「根因」「人為疏失」這兩個最舒服、也最危險的詞騙過去。主打方法論層的三個模式：F8（潛伏條件 vs 觸發）、F6（偏差正常化／漂移）、F13（生產壓力壓過安全）。它們不專屬於某一場災難，而是後面每一章都會用到的解剖刀。讀完，你下次翻開任何一份 postmortem——包括你自己團隊上週寫的那份——都會先問一個不一樣的問題。\n\n## 從你已知的出發\n\n你寫過、也讀過 postmortem 範本。範本最上面通常有那麼一欄，寫著 **Blameless** 或「無究責」，下面一行小字大意是「我們相信當事人在當下掌握的資訊與工具下，做了他認為合理的決定」。\n\n第一次填這欄的時候，你可能覺得這是公司文化的客套——一種讓寫報告的人不要太難看的禮貌。但你做久了 oncall、寫多了 incident review，慢慢會發現它不是禮貌，是**工程必要**。理由很冷酷：**你只要在報告裡開始指名道姓追究「是誰按錯了」，你就再也拿不到真相了。**\n\n想想那個機制。下一次有人半夜把一個壞 config 推上 production，如果他知道這份報告會變成績效考核裡的一筆、會在 Slack 被點名，他會怎麼寫那份 timeline？他會把「我當時根本沒注意到那個 flag 還活著」輕描淡寫成「執行了既定變更」；他會省略「其實這個告警每天都響，大家早就靜音了」這一句——因為這句話會把火引到整個團隊。於是你的報告裡留下的，是一個**被恐懼修剪過的版本**：乾淨、有一個明確的犯錯者、結論是「加強教育訓練」。\n\n然後呢？同一個形狀的 incident，半年後換一個人，再來一次。\n\n這正是本章要拆穿的東西。你那套多層 cache library 的 graceful degradation——in-memory 掛了退到 S3、S3 掛了退到 local——你設計它的時候，預設的是「每一層都可能壞」，所以你做了**讓它安全地壞**的準備。事故調查也該用同一種心態：別問「哪一層不該壞」，要問「**為什麼每一層都沒擋住**」。本章給你的，就是把這個本能從你的程式碼，搬進你讀任何一份事故報告的眼睛裡。\n\n## 「根因」是複雜系統的迷思\n\n工程師熱愛根因。RCA（root cause analysis）、5 Whys、Ishikawa 魚骨圖——這些工具背後有一個共同的、舒服的假設：**只要一直問「為什麼」，最後會挖到一個根，拔掉它，問題就不會再發生。**\n\n對一顆螺絲鬆了的機器，這是對的。對一個由人、軟體、組織、時程壓力、十年前某人寫的死碼共同組成的複雜系統，這是**錯的問法**。\n\n麻醉科醫師 Richard Cook 在那篇被無數 SRE 奉為聖經的短文〈How Complex Systems Fail〉裡，把這件事講得最直白。他的十八條觀察裡，有四條直接是給「根因迷思」的解藥（以下引述照原文，2026-06 查證）：\n\n- **第 3 條**：「Catastrophe requires multiple failures — single point failures are not enough.」（災難需要多重失效；單點失效不足以釀災。）\n- **第 4 條**：複雜系統裡**永遠潛伏著一組不斷變動的失效**（changing mixtures of failures latent within them）。\n- **第 5 條**：複雜系統**永遠運行在退化模式**（run as broken systems）——它還能動，是因為冗餘夠多、而且**人**在不斷地把它撐住，儘管系統內部佈滿瑕疵。\n- **第 7 條**：「Post-accident attribution to a 'root cause' is fundamentally wrong.」（事後把災難歸到某個「根因」，根本上是錯的。）\n\n把這四條翻成你的語言。你的 production 系統，**此刻**就跑在退化模式：有三個 flaky test 你們長期忽略、有一個 retry 邏輯在某個 edge case 會 storm、有一段 2021 年離職同事寫的 Lambda 沒人敢動。它沒爆，不是因為它健康，是因為這些孔洞此刻還沒對齊、而且你和你的同事每天在用各種臨時手段把它撐住。Cook 的意思是：**這不是異常，這是複雜系統的常態。** 系統「沒事」和「健康」是兩回事。\n\n所以「根因」錯在哪？錯在它假設因果是一條線：A 導致 B，B 導致 C，C 是災難，那 A 就是根因。但複雜系統的失效不是一條線，是**一張同時被穿透的網**——多層各自獨立的防禦，平時錯開，出事那天孔洞恰好連成一線（這就是 ch01 的瑞士起司，Reason）。在這張網裡找「那一個根」，就像問「這場龍捲風的根因是哪一顆空氣分子」。你找得到一個，但它什麼都解釋不了，也什麼都預防不了。\n\nCook 第 7 條後面那句話最致命：選哪個事件當「根因」，**反映的是調查者的偏好與立場，不是事件本身的客觀屬性**。換句話說，「根因」這個詞給你一種「我搞懂了」的踏實感，但那踏實感很多時候是**事後建構出來的幻覺**，而代價是你停止了追問——停在那個讓你最舒服、最不用改變組織的地方。\n\n## 「人為疏失」是調查的終點，不是起點\n\n如果說「根因」是工程師最愛的迷思，那「人為疏失」（human error）就是**組織**最愛的結論。它便宜、迅速、而且令人安心：找到那個按錯鍵的人，貼上「疏失」標籤，結案，加強訓練，下班。\n\n問題是，**「人為疏失」幾乎從來不是一個解釋，它是一個停止解釋的藉口。**\n\nSidney Dekker 在《The Field Guide to Understanding Human Error》裡把這件事拆成兩種對立的安全觀，這組對照值得你背下來：\n\n| | 舊觀點（Old View） | 新觀點（New View） |\n|---|---|---|\n| 人為疏失是 | **原因**（cause） | **症狀**（symptom） |\n| 它指向 | 那個出錯的人（壞蘋果） | 系統更深處的麻煩 |\n| 對策 | 處理掉那個人、加強訓練、寫更多 SOP | 改掉讓人幾乎不可能做對的系統條件 |\n| 調查在哪裡停 | 找到人就**結束** | 找到人才**開始** |\n\n舊觀點說：系統基本是安全的，是不可靠的人把它搞壞了。新觀點說：人為疏失不是麻煩的起點，是**系統內部更深層麻煩的徵兆**——它是一個症狀，告訴你「在這個設計、這個介面、這個時程壓力下，一個正常人會被推著走向這個動作」。\n\n這裡有一個你必須親自過一遍才會信的轉換練習。Dekker 管它叫「**找出替代故事**」（the replacement story）：把「他犯了錯」這句結論，換成「**在他當時的處境下，為什麼這個動作看起來是對的？**」\n\n- 三哩島（見 ch16）的操作員減少了高壓注水——事後看，這是把核電廠推向爐心熔毀的災難性錯誤。但當下：他看到的指示燈說釋壓閥已關（其實卡開了，燈只反映「指令」不反映「閥位」），他看到加壓器水位在上升，而他被訓練成最怕「系統灌水灌滿（go solid）」。**在他被餵養的那個錯誤世界模型裡，關小注水是唯一合理的動作。** 錯的不是他的判斷，是那個讓他建立錯誤模型的介面。\n- 737 MAX（見 ch04）的「外國飛行員技術差才會摔、美國飛行員不會」這種說法——這是舊觀點最惡毒的版本：把系統缺陷甩鍋給死者的能力。但兩份官方報告都指出，MCAS 反覆觸發、每約 5 秒一次、飛行員根本不知道它存在、反應時窗極短——**連模擬器裡的資深飛行員都極難處置**。「技術不足」這個結論的功能，是讓波音的設計與 FAA 的認證流程不必上被告席。\n\n看懂這個機制了嗎？「人為疏失」之所以危險，不是因為它有時不準，而是因為它**有一種把調查停在最方便位置的引力**。一旦你寫下「操作員疏失」，你就不必去問那個讓你頭痛的問題：「是什麼系統條件，讓一個受過訓練、有經驗、想把事情做好的人，在那一刻幾乎不可能做對？」\n\n而那個問題，才是唯一能讓同型事故不再發生的問題。\n\n## 後見之明：你讀報告時戴的那副有色眼鏡\n\n為什麼「人為疏失」這麼有引力？因為你讀報告時，戴著一副摘不下來的眼鏡，叫**後見之明偏誤**（hindsight bias）。\n\nCook 的第 8 條說得斬釘截鐵：「Hindsight bias remains the primary obstacle to accident investigation.」（後見之明偏誤始終是事故調查的首要障礙。）\n\n機制是這樣的。當你讀報告時，你**已經知道結局**。你知道那個閥門卡開了、你知道那塊泡棉撞穿了機翼、你知道那個 flag 喚醒了死碼。於是當你回頭看當事人的決策序列，每一步「不對」都閃著刺眼的紅光——「他怎麼會沒注意到？這麼明顯！」\n\n但對當事人來說，那一刻**不存在「結局」這個資訊**。他面對的是一堆同時湧入、彼此矛盾、大部分無關緊要的訊號（三哩島事故初期上百個警報同時響、印表機落後）；他不知道哪個訊號是關鍵、哪個是雜訊；他在生產壓力下、在睡眠不足下、在「以前這樣做都沒事」的經驗下，做出一個**在當下可得的資訊裡看起來合理**的選擇。\n\n後見之明偏誤就是那道把「當下的迷霧」抹平成「事後的清晰」的後製濾鏡。它讓你**高估**了當事人本該看出問題的容易程度，於是「他應該看出來的」這個判斷，幾乎是自動地滑向「他疏失了」。\n\n這對你有直接的操作意義。下次你 review 一份 postmortem、或者更糟，review 一份**別人**的 incident，當你心裡冒出「這也太明顯了吧、我怎麼可能犯這種錯」的時候——那不是你比較聰明，那是後見之明偏誤正在對你說話。誠實的問法永遠是：「**如果是我，在他當時掌握的那些（不完整的）資訊下，我憑什麼確定我會做得更好？**」（這正是本書風格的底線：不嘲笑當事人「怎麼這麼蠢」，先講清楚他當年面對的真實約束。）\n\n## 漂移到失效：系統不是「砰」一下壞掉的\n\n到目前為止，我們拆的是「事故發生後怎麼讀它」。但有一個更深的問題：**系統是怎麼走到那個爆炸的早晨的？**\n\n直覺答案是「某天出了個大包」。Sidney Dekker 在《Drift into Failure》裡告訴你：不是。系統**漂移**到失效，靠的是一連串**各自微小、在當下都局部合理**的步子。\n\n他用了三個你該記住的詞：\n\n- **遞減主義（decrementalism）**：安全邊界不是被一刀砍掉的，是被一次次小到「感覺很正常」的調整慢慢吃掉的。每一步都太小，小到不值得叫停。\n- **局部理性（local rationality）**：每一個做決定的人，在他自己那一角，都做了**理性**的選擇——省一點時間、省一點成本、跳過一個「反正每次都過」的檢查。問題在於，一群局部理性的小決定，會湊出一個**全局災難性**的結果。\n- **壓力侵蝕（環境壓力）**：稀缺、競爭、削減成本、彼此矛盾的目標（速度 vs 安全），這些壓力持續地、安靜地把昨天還守得住的安全邊界往後推。\n\n這就是 F6（偏差正常化／漂移）與 F13（生產壓力壓過安全）的根。而把「漂移」這個抽象概念釘成一個具體機制的，是社會學家 Diane Vaughan 研究挑戰者號（見 ch14）時提出的**偏差正常化**（normalization of deviance）。\n\nVaughan 的定義（2026-06 查證）大意是：**在沒有可感知的損失或傷害的情況下，偏差的做法逐漸變得可被接受。** 機制是這樣——一個「潛在危險的訊號」（signal of potential danger）出現了；組織把它**合理化、正常化**；下一次同樣的情況又出現，因為「上次沒事」，於是繼續接受；如此反覆，直到某天其他關鍵因素剛好對齊，災難揭露了「我們以為風險在控制中」與「風險其實一直都在」之間的鴻溝。\n\n挑戰者號的 O-ring 就是教科書案例：每一次飛行後檢查發現 O-ring 有侵蝕、有吹漏（blow-by），工程師都「解釋得通」，於是 O-ring 損傷從**危險訊號**被悄悄重新定義成**常態**——甚至被當成「裕度的證明」（看，燒了一點點但沒出事，可見設計有餘裕）。這是僥倖最陰險的地方：**每一次「沒出事」，不是在累積信心，是在偷走你的安全邊界。**\n\n現在你應該感到一陣熟悉的寒意。「這個告警每天都響、每次都沒事，我們上週把它調成 warning 了」——這就是偏差正常化，發生在你的 PagerDuty 上。「這個 deploy 我們手動跳過 canary 已經第五次了，每次都好好的」——這就是遞減主義，發生在你的 CI/CD 上。系統沒有「砰」一下壞掉，它從你第一次說「應該沒事吧」的那天起，就已經在漂移了。\n\n```\n偏差正常化：安全邊界如何被「沒出事」一口口吃掉\n\n安全邊界 ┃████████████████████████████  起點：邊界完整\n         ┃\n         ┃ 第1次僥倖（告警響→沒事→「可接受」）\n安全邊界 ┃███████████████████████░░░░░  邊界被吃掉一口\n         ┃\n         ┃ 第2次、第3次…（每次都「沒事」＝重新定義常態）\n安全邊界 ┃██████████░░░░░░░░░░░░░░░░░░░  邊界所剩無幾\n         ┃\n         ┃ 觸發事件（孔洞終於對齊）\n安全邊界 ┃░░░░░░░░░░░░░░░░░░░░░░░░░░░░░  ← 災難\n         ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━▶ 時間\n\n每一步在當下都「局部理性」；沒有任何一步看起來像在製造災難。\n```\n\n## Just Culture：blameless 不是道德姿態，是工程必要\n\n現在把前面三件事串起來，你會得到一個關於「為什麼 blameless」的、比「公司文化」深得多的答案。\n\n如果（一）根因是迷思、災難需要多層孔洞對齊；（二）「人為疏失」是把調查停在最方便處的引力；（三）後見之明偏誤讓你自動高估當事人本該看穿問題的容易度——那麼，**任何究責個人的調查文化，都會系統性地汙染你的事故資料。**\n\n這就是 Dekker 的 Just Culture 的核心，而它的論證不是倫理的，是資訊的：\n\n**你不能同時懲罰與學習。** 一旦當事人知道誠實會帶來懲罰，他理性的選擇就是不誠實——不是因為他是壞人，是因為在那個賽局裡，沉默與美化是唯一的占優策略。於是你拿到的每一份報告，都是被恐懼過濾過的版本：缺了「其實這個問題我們早就知道」、缺了「那個流程根本沒人遵守」、缺了「我當時根本看不到那個訊號」。你以為你在收集事故資料，其實你在收集**當事人為了自保而編輯過的故事**。\n\n而你需要那些被刪掉的句子。因為那些句子裡，藏著真正的系統孔洞——藏著下一次同型事故的裝填過程。\n\n所以 blameless 不是「我們很善良，所以不怪你」。blameless 是「**我們需要真相多過於需要一個可以怪罪的人；只要我們開始怪人，真相就會躲起來，而沒有真相，同型事故一定會回來。**」這是一筆冷靜的工程權衡：放棄「處罰一個人」帶來的短期心理滿足與虛假的掌控感，換取「拿到完整事故資料」帶來的長期預防能力。\n\n（注意 Just Culture **不等於**「沒有任何問責」。Dekker 的 just culture 仍區分誠實的錯誤與蓄意的魯莽/破壞——前者要學習，後者要問責。本書沿用的「blameless」指的是前者：對在系統約束下盡力做對卻仍出錯的人，不究責。這條界線本身仍有討論空間，本書點到為止。）\n\n## 故障解剖：解剖「解剖」\n\n本書每一章都會在這裡把災難拆成失敗模式語言。但本章沒有單一災難——本章的「災難」，是**一場糟糕的事故調查本身**。所以這一節，我們把這把解剖刀對準調查這件事，看看一份**寫壞的 postmortem** 是怎麼失效的。\n\n**潛伏條件 vs 觸發（F8）。** 一場糟糕調查的潛伏條件，早在事故發生前就裝填好了：一個會懲罰誠實的組織文化、一套只有「根因」一欄的報告範本、一群戴著後見之明眼鏡卻不自知的 reviewer、一種「找到人就結案」的習慣。觸發事件——某次真實的 incident——只是讓這套早已就緒的「失真機制」開始運轉。換句話說，**你的事故調查會不會講真話，在事故發生之前就已經決定了。**\n\n**起司的孔洞：一場壞調查的每一層防禦為什麼都沒擋住。**\n\n| 本應攔截失真的防禦層 | 為什麼沒擋住 |\n|---|---|\n| 「我們只想知道發生了什麼」的初衷 | 被「總得有人負責」的組織引力悄悄改寫成找代罪羔羊 |\n| Timeline（時間線） | 由怕被究責的當事人填寫，被恐懼修剪過——缺了最關鍵的「我當時其實沒看到」 |\n| 「找出根因」這一欄 | 它的存在本身就是孔洞——它逼調查收斂到單一原因，反而把多層失效壓扁成一條線 |\n| Reviewer 的判斷 | 戴著後見之明眼鏡，把「事後看很明顯」誤當成「當下本該看出來」 |\n| Action items（行動項） | 收斂成「加強訓練／加一條 SOP」——處理了那個人，沒碰那個讓人出錯的系統條件 |\n\n每一層都「看起來在運作」，但每一層都有一個對齊的孔洞，讓真相一路漏到最後，留下一份乾淨、有罪人、結論是「加強教育」的報告。然後孔洞原封不動地留在那裡，等下一次對齊。明確地說：**一份「找到了根因、抓到了犯錯者」的報告，往往不是調查成功的證據，而是調查失敗的證據。**\n\n**對應模式：** 本章的方法論主打三個 F——\n\n- **F8（潛伏條件 vs 觸發）**：這是整套解剖刀的脊椎。每讀一份報告，先把事件分成「早就裝填好的潛伏條件」與「最後那根稻草」，你會立刻發現「根因」幾乎總是被誤植在稻草上，而真正該改的在潛伏層。\n- **F6（偏差正常化／漂移）**：教你讀出報告字裡行間的「漂移史」——那些「以前都這樣」「這個問題我們知道很久了」的句子，就是被正常化的偏差留下的指紋。\n- **F13（生產壓力壓過安全）**：教你永遠追問「當時有什麼進度／成本／窗口壓力，讓『先停下來查清楚』變得太貴？」——這條線是多數調查報告最終的落點。\n\n**一句話總結：一場壞調查的形狀是——它在事故發生前就裝填好了失真機制，於是它收集到的不是真相，是當事人為了自保而編輯過的故事；它找到一個根因、結了案，然後把所有孔洞原封不動留給下一次。**\n\n## 換成你的系統\n\n把這套刀法收回你自己的世界。你「應該沒事吧」的假設，藏在這句你大概說過的話裡：「**我們有 blameless postmortem 文化啊。**」\n\n真的嗎？來點名幾個它失效的具體案例：\n\n- **你的 postmortem 範本裡有「root cause」這一欄嗎？** 如果有，它每一次都在溫柔地逼你的調查收斂到單一原因——把一張被穿透的網壓扁成一條線。它本身就是孔洞。考慮把它改成複數：「contributing factors（多個）」，並強制要求列出**至少三層各自獨立的防禦為什麼都沒擋住**。\n- **你的 timeline 是誰寫的？** 如果是闖禍的那個人獨自寫、而你們組織其實會在績效考核裡記這筆——那你拿到的 timeline 已經被恐懼編輯過了。blameless 不是寫在範本頂端那行字，是寫在**當事人相不相信誠實是安全的**這件事上。\n- **你的 action items 長什麼樣？** 數一數上一份 postmortem 的 action items，有幾條是「加強 X 的意識／訓練／提醒大家小心」，有幾條是真的改了系統（加了一道 sanity check、拆了一段死碼、把手動步驟自動化、加了 canary）。前者多、後者少，就是舊觀點在你的流程裡的指紋——它處理了人，沒碰系統。\n\n最危險的那個未處理案例是這個：**你以為你有 blameless 文化，所以你停止檢查它是不是真的 blameless。** 「我們是 blameless 的」這句話本身，就可能變成一個被正常化的偏差——一個讓你不再追問的舒服結論。哥倫比亞號（見 ch15）就是「同一個組織、十七年後、同型災難重演」的鐵證：寫了報告、列了 action items，不等於學到教訓；文化不變，action items 會腐爛，同型事故會回來。\n\n可操作的自問（不要只喊「要小心」）：**翻出你團隊一年前某次 postmortem 的 action items，逐條問——這條真的做完了嗎？如果沒有，是什麼壓力讓它一直排不進 sprint？** 那個壓力，就是 F13，正在你的 backlog 裡安靜地漂移。\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★\n\n把這句話：「**這次 outage 的根因是 OOO 工程師在維護時打錯了一個參數。**」改寫成**三條各自獨立的系統條件**（潛伏條件），使得「換成任何一個正常工程師、在那個處境下，都很可能打錯」。\n\n#### 推演解答\n\n範例改寫（你的版本只要抓到「把個人錯誤翻譯成系統條件」的精神即可）：\n\n1. **沒有防呆上限**：那個維護指令不限制「一次最多能影響多少資源」，一個 typo 就能掃掉遠超預期的範圍——對照 AWS S3 2017（見 ch13）那條移除過多容量的除錯指令。系統允許單一輸入造成不成比例的後果。\n2. **沒有第二人複核 / 沒有 dry-run**：高風險操作靠單一工程師單手執行、即時生效，沒有「先預覽影響範圍再確認」的閘門——對照 ch13 雲端連鎖那些『一次推全球、沒有分批與第二人複核』的部署。\n3. **疲勞 + 生產壓力（F13）**：這個維護被排在深夜窗口、在一個趕著收尾的變更裡進行；組織把「省下一個維護窗口」的價值，排在「讓人在清醒狀態下操作」之上。\n\n關鍵體會：原句把調查停在「人」，三條改寫把調查推向「系統」。前者的 action item 是「提醒大家小心打字」（半年後同型再來）；後者的 action item 是防呆上限、dry-run、第二人複核——**這些才真的拔掉了孔洞**。注意：這三條沒有一條在替當事人「開脫」；它們是在問「下一個人來，怎麼讓他不可能踩同一個坑」。\n\n### 推演題2 [20 分鐘] ★★\n\n**對帳。** 挑一次你親身經歷、有寫 postmortem 的真實 incident。逐條檢查你的 oncall / postmortem 流程，哪些設計**在對抗後見之明偏誤**，哪些**反而在餵養它**。\n\n#### 推演解答\n\n對抗後見之明的設計（如果你有，記一分）：\n\n- **要求記錄「當下掌握的資訊」而非只記「實際發生了什麼」**：好的 timeline 會分兩欄——「此刻系統真實狀態」vs「此刻 oncall 螢幕上看到的狀態」。三哩島的整個悲劇就活在這兩欄的落差裡。\n- **由多人、含不在場者一起 review**：單一作者容易陷入自己的後見之明；外部視角較能問出「你當時憑什麼知道那個是關鍵訊號？」\n- **明文的 blameless 原則 + 當事人不必獨自寫 timeline**：降低恐懼，換取完整資料。\n\n反而在餵養後見之明的設計（如果你有，這是孔洞）：\n\n- **「root cause」單數欄位**：逼你收斂到一個點。\n- **postmortem 連動績效考核**：直接製造恐懼，汙染資料源。\n- **reviewer 用「這也太明顯」當口頭禪**：把後見之明制度化成文化。\n\n如果你發現你的流程兩邊都有——恭喜，這很正常（複雜系統永遠運行在退化模式）。重點不是羞愧，是把「餵養後見之明」那幾條列成你下一個要拔的孔洞。\n\n### 推演題3 [15 分鐘] ★★\n\n**反事實。** 假設你的組織明天起改成「**每次 incident 都要找出一個該負責的人並公開記過**」。請推演：**一年後，你的事故資料會如何系統性地失真？** 列出至少三種具體的失真。\n\n#### 推演解答\n\n1. **Timeline 被美化**：當事人理性地省略所有對自己不利、但對診斷最關鍵的句子（「我其實沒看那個 dashboard」「這個告警我們早就靜音了」）。你失去的，正好是指向系統孔洞的那些線索。\n2. **上報率崩塌**：小事故、near-miss（差一點就出事但沒出事）不再被上報——因為上報就是自首。而 near-miss 是偏差正常化最好的偵測器；失去它，你就失去了在災難前看到孔洞對齊的最後機會。這對應 Cook 第 5 條：複雜系統本來就靠人不斷把它撐住、靠 near-miss 被看見而修補；懲罰會讓這個自我修復機制停擺。\n3. **防禦性歸因外推**：每個人都學會把錯指向「規則沒寫清楚」「上游給的資料就是錯的」「不是我的模組」——把調查導向最不傷害自己的方向，而非最接近真相的方向。Cook 第 7 條說根因的選擇反映調查者立場；當立場變成「保護自己」，根因就會被系統性地放在別人身上。\n\n綜合效果：你會得到一疊「結案率很高、每件都有人負責」的漂亮報告，與一個**孔洞從未被真正看見、因此同型事故穩定復發**的系統。這就是「不能同時懲罰與學習」的具體長相。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關（優先「為什麼」而非「哪一年」）：\n\n1. 為什麼「找出那個犯錯的人」對複雜系統是**錯的問法**？正確的問法是什麼？（提示：Cook 第 3、7 條 + 瑞士起司。）\n2. 用你自己的話講「複雜系統永遠運行在退化模式」是什麼意思，並舉一個你**此刻**的 production 系統正在退化模式運行的具體例子。\n3. Dekker 的舊觀點與新觀點，對「人為疏失」的定位差在哪裡？舊觀點把調查停在哪、新觀點從哪開始？\n4. 什麼是後見之明偏誤？它如何讓「他應該看出來的」幾乎自動滑向「他疏失了」？你 review 別人 incident 時，怎麼自我校正？\n5. 偏差正常化（Vaughan）的機制是什麼？為什麼「每次都沒事」不是在累積信心，而是在偷走安全邊界？舉一個你 PagerDuty 或 CI/CD 上正在發生的例子。\n6. 為什麼說 blameless 不是道德姿態而是工程必要？「不能同時懲罰與學習」這句話的資訊論證是什麼？\n7. 一份「找到了單一根因、抓到了犯錯者、結論是加強訓練」的 postmortem，為什麼可能是調查**失敗**而非成功的證據？\n8. F8（潛伏 vs 觸發）、F6（偏差正常化）、F13（生產壓力）這三把刀，各自幫你在讀報告時看見什麼別人看不見的東西？\n\n## 延伸閱讀\n\n- **Richard I. Cook, 〈How Complex Systems Fail〉**（全文 https://how.complexsystems.fail/ ）——十八條、兩頁、五分鐘讀完，是本章方法論的源頭。第 3、4、5、7、8、15 條尤其是「根因迷思」與「人為疏失迷思」的解藥；建議印出來貼在你寫 postmortem 的地方。\n- **Sidney Dekker, 《The Field Guide to Understanding Human Error》**——「舊觀點 vs 新觀點」「替代故事」「人為疏失是症狀不是原因」的完整論證；後半教你怎麼用高解析度時間線（含「當下掌握的資訊」欄）寫一份不被後見之明汙染的調查。\n- **Sidney Dekker, 《Just Culture: Balancing Safety and Accountability》**——把「blameless 為什麼是工程必要」講透，並誠實處理「那魯莽與破壞怎麼辦」這條最難的界線（本章只點到）。\n- **Sidney Dekker, 《Drift into Failure》**——「遞減主義」「局部理性」「漂移」的出處；告訴你系統如何在一連串各自合理的小步子裡走向災難。讀完你會用不同的眼光看自己 backlog 裡那些「以前都這樣」。\n- **Diane Vaughan, 《The Challenger Launch Decision》**——「偏差正常化」一詞的學術源頭（細節見 ch14）。一本社會學家的厚書，但「危險訊號如何被一次次正常化」這個機制，值得每個寫 SRE 的人懂。\n- **James Reason, 《Human Error》**——瑞士起司模型（ch01 已用）與「潛伏條件 vs 觸發」的理論底座；F3 與 F8 的源頭。\n\n---\n\n*本章為方法論章，無單一災難，所有災難（三哩島、737 MAX、挑戰者、哥倫比亞、AWS S3）均為說明性引用，詳見對應章節。*\n"}, {"id": "ch03-before-the-machine", "file": "ch03-before-the-machine.md", "group": "Part I — 框架與前傳", "title": "ch03 — 機器之前就有的崩壞：塔科馬海峽橋與凱悅走道", "md": "# ch03 — 機器之前就有的崩壞：塔科馬海峽橋與凱悅走道\n\n> **本章解剖什麼**：兩場發生在**電腦出現之前**（或之外）的工程災難，證明本書講的失敗模式不是軟體的特產，而是**複雜系統的內建性質**。塔科馬海峽橋（1940）打 F2——一場被全世界記成「共振」、其實是 aeroelastic flutter（氣動彈性顫振）的**自激正回授**；凱悅麗晶走道（1981，114 死）打 F9＋F12——一個「看起來等價」的連接細節變更，悄悄讓接點受力加倍，加上責任在流程中蒸發。這是 Part I 框架三部曲的收尾：ch01 給了你正常意外與瑞士起司的眼鏡、ch02 教你怎麼讀事故報告，本章把這副眼鏡戴上**鋼鐵與混凝土**，告訴你：你在分散式系統裡怕的東西，物理世界早在七十多年前就演過。\n\n## 從你已知的出發\n\n你壓力測試時遇過這個畫面：系統在某個負載點之前都好好的，過了某條線，**一個微小的擾動不再被吸收，反而被放大**。一個 timeout 觸發一次 retry，retry 增加了負載，負載拉高了延遲，延遲又觸發更多 retry——曲線不是緩緩劣化，是**往上彎、彎成垂直**。你看著 CPU 從 60% 衝到 100%，不是因為來了十倍流量，而是因為系統開始**餵自己**。這就是 retry storm，是 thundering herd，是自激震盪。它的可怕之處不在「外面來了多大的力」，而在「**系統自己的反應，變成了放大自己的來源**」。\n\n塔科馬海峽橋，就是這個形狀的鋼鐵版。你會看到，把它垮掉解釋成「風的頻率剛好等於橋的頻率、發生共振」是**錯的**——那是外力驅動。真正發生的事更接近你的 retry storm：橋自己的運動，從一陣**穩定、不大的風**裡「抽」能量出來餵自己的振盪，越晃越大，直到散架。能量的源頭不是某個匹配頻率的外力，**是橋自己的動作**。\n\n第二個畫面你更熟，因為你每週都在做：**code review**。有人開了一個 PR，標題寫著「重構：把那根共用的東西拆成兩段，邏輯不變」。diff 看起來乾淨、測試綠燈、你掃過一遍，覺得「應該一樣吧」，點了 approve。但那個「不變的邏輯」底下，**負載的路徑悄悄變了**——原本一個地方扛一份的東西，現在要扛兩份。在你的世界裡，這可能是「把一個共用連線池拆成兩個」「把一次 batch 寫入改成兩次串接」「把一個冪等的 handler 拆成兩個各自重試的步驟」。看起來等價，受力結構卻翻倍。\n\n凱悅麗晶飯店的走道，就是這個 PR。一個鋼構廠為了施工方便提的變更——把一根吊桿改成兩段——走了「正式核准流程」、蓋了章，但**沒有人真的重新算過那個接點要扛多少**。一年半後，114 個人在飯店中庭的茶舞會上，隨著兩層走道一起墜落。\n\n這一章要扎你的，就是那句「應該一樣吧」。我們先看塔科馬，因為它教你：**有些放大，是系統的物理性質，不是誰算錯了**。\n\n## 塔科馬：一座從一陣穩定的風裡抽能量餵自己的橋\n\n### 冷開場：1940 年 11 月 7 日，Galloping Gertie 的最後一個早上\n\n華盛頓州，Tacoma Narrows 海峽。一座當時全世界第三長的懸索橋橫跨其上，1940 年 7 月才剛通車。它有個綽號叫 **Galloping Gertie（飛奔的葛蒂）**——因為從施工期間起，只要起風，橋面就會像波浪一樣**上下起伏**，工人在上面作業時暈船，通車後甚至有人特地開車上橋體驗那種起伏。\n\n工程界知道它會晃。但大家把它當成一個要解決的**舒適度問題**，不是一個會殺人的**穩定性問題**——已經在研究加裝阻尼措施。警訊一直都在，只是被歸類錯了：它被當成趣聞，不是前兆。\n\n11 月 7 日早上，風速約 35 到 40 英里（約 56–64 公里）每小時——**不是颶風，是一陣穩定、中等的風**。橋面照例上下起伏。但這天早上某個時刻，振動的**形態變了**：從原本的上下波動（垂直模態），切換成一種**扭轉**——橋面開始沿著中線**像擰毛巾一樣左右翻轉**，一側翹起、另一側壓下，再反過來。\n\n關鍵就在這個切換。一旦進入扭轉模態，振幅**不再穩定、也不再衰減，而是一圈比一圈大**。橋面扭轉的角度越來越誇張，據估計一度達到約 45 度。一段攝影師 Barney Elliott 拍下的影片，成為工程史上最著名的畫面之一——人類**第一次用影像記錄到 flutter 把一座橋扭垮的全過程**。約上午 11 點，中央跨距的橋面結構承受不住，斷裂、墜入海峽。\n\n唯一的罹難者，是一隻被困在橋上一輛車裡、名叫 Tubby 的可卡犬。**零人死亡**。塔科馬的價值從來不在傷亡規模，而在它留下了那段影片，逼著整個學科去回答一個它當時答不出來的問題：**為什麼一陣不大的穩定風，能把一座鋼橋越晃越大、直到扭斷？**\n\n### 裝填：又窄、又柔、又「實心」的橋面\n\n要懂塔科馬，先懂它的橋面長什麼樣，因為**災難早在設計圖上就裝填好了**。\n\n當時的懸索橋設計，主流做法是用**鏤空的桁架（truss）**做橋面的側緣——風可以從格子間穿過去。塔科馬為了**美觀與經濟**，用了一種又窄又淺的設計：兩側是**實心的鈑梁（solid plate girder）**，像兩片立起來的鋼板。風吹過來，**穿不過去**，只能繞過這兩片鋼板。\n\n這就是埋下的炸藥。一個又窄、又柔、側緣又「實心擋風」的橋面，在空氣動力學上**極不穩定**——它不再只是一個被動承受風壓的結構，它開始**像一片機翼一樣，跟氣流「互動」**。風繞過那兩片鋼板時，會在背風側產生紊亂的渦流；而橋面只要稍微動一下，這些渦流的形態與作用力的**相位**就跟著改變。\n\n這裡要對你誠實：1940 年的橋樑工程師，手上**根本沒有分析這件事的理論工具**。他們會算靜態風壓——風從側面推，橋要扛得住——這他們算對了。但「結構的運動會反過來改變氣流、氣流再反過來推結構」這種**動態的、雙向的氣動彈性互動**，當時的橋樑設計規範裡**沒有這一頁**。這不是「設計師算錯了某個數」，是**整個學科還沒長出那個概念**。用 ch02 的話講：這是時代局限造成的潛伏條件，事後諸葛地嘲笑「他們怎麼沒算共振頻率」，恰恰錯過了真相——**當年連這個現象叫什麼都還沒人說得清**。\n\n### 觸發與連鎖：負阻尼，或者說，橋開始餵自己\n\n現在來拆「為什麼越晃越大」這個核心。請忘掉「共振」——這正是 landscape 點名要校正的迷思，下一節我會專門打它。先看真正的機制。\n\n一個正常的結構，被推一下會晃，然後**晃幅越來越小**，慢慢停下來。為什麼會停？因為有**阻尼（damping）**——結構內部的摩擦、材料的耗散，把振動的能量一點一點吃掉。阻尼是**正的**：它從系統裡**拿走**能量。這就是為什麼你撥一下吉他弦，聲音會慢慢消失。\n\n塔科馬那天早上發生的事，是**阻尼變成了負的**。\n\n在那個風速、那個扭轉模態下，風與橋面之間形成了一個**回饋環**：橋面扭轉的動作，改變了周圍氣流的流場與作用力的相位；而這個被改變的氣流，**恰好在「對」的相位上、把更多能量灌回橋面的振盪**——不是抵抗它的運動，而是**順著它的運動推**。於是每一個振盪週期，橋面從穩定的氣流裡**淨賺**一點能量。阻尼的符號翻轉了：系統不再耗散能量，而是**從氣流裡抽取能量**。\n\n這叫 **aeroelastic flutter（氣動彈性顫振）**，是一種**自激（self-excited）、單自由度的負阻尼不穩定**。能量的源頭，是那陣穩定、持續的風；但**觸發並維持這場放大的，是橋自己的運動**。風只是站在那裡，橋自己去把能量「舀」進來。每一圈都比上一圈賺得多，振幅指數成長，直到結構斷裂。\n\n停在這裡，用焦慮工程師的眼睛看一眼。這是不是**和你的 retry storm 一模一樣**？\n\n- 「穩定的中等風」＝你系統平時就有的、不大的背景負載與抖動。它一直都在，不是異常。\n- 「橋面的扭轉動作改變氣流、氣流又推回來」＝你的服務對延遲的反應（重試）增加了負載，負載又拉高了延遲，延遲又觸發更多重試。\n- 「負阻尼」＝你的系統失去了**吸收擾動**的能力，反而開始**放大**它。本來一個慢請求會被超時吃掉、被 backpressure 擋住（正阻尼）；當這些緩衝失效，系統就開始餵自己（負阻尼）。\n- 「振幅指數成長」＝你 dashboard 上那條往上彎成垂直的曲線。\n\n**這就是 F2（互動複雜度）最純粹的形狀**：災難不來自任何單一元件壞掉。風沒壞、鋼沒壞、橋的每一根構件單獨看都好好的。災難來自**元件之間一個沒人設計、沒人預期的雙向互動**——風與結構的耦合。你 review 程式碼時找得出 null pointer，但你**找不出「兩個各自正確的服務，在某個負載點上會開始互相放大」**這種東西，因為它不在任何一段程式碼裡，它在**互動**裡。\n\n### 餘波與迷思校正：它不是共振\n\n調查當下，Federal Works Agency 委請了包括空氣動力學大師 Theodore von Kármán 在內的團隊調查。但真正把這件事釘死、並糾正了**整整幾代物理教科書**的，是 1991 年的一篇論文。\n\n> 你在物理課本上學到的塔科馬，幾乎一定是錯的。\n\n很多基礎物理教科書，把塔科馬當成「**共振（resonance）**」的招牌例子——說風的頻率剛好等於橋的自然頻率，像歌手飆高音震碎酒杯那樣，把橋震垮。K. Yusuf Billah 與 Robert H. Scanlan 在 *American Journal of Physics*（1991）的論文〈Resonance, Tacoma Narrows Bridge Failure, and Undergraduate Physics Textbooks〉裡，**明白駁斥了這個說法**。\n\n差別在哪？這個差別，正是你該帶走的工程直覺：\n\n| | **共振（forced resonance）** | **顫振（self-excited flutter）** |\n|---|---|---|\n| 能量來源 | 一個**外部**的週期性驅動力 | **穩定**的氣流（非週期性） |\n| 觸發條件 | 外力頻率**匹配**結構自然頻率 | 達到臨界風速，無需頻率匹配 |\n| 維持機制 | 外力持續以對的頻率推 | **結構自己的運動**把氣流能量舀進來 |\n| 類比 | 盪鞦韆——有人**按節奏**推你 | retry storm——系統**自己**放大自己 |\n| 把柄 | 「誰在推、頻率對不對」 | 「**正回授環在哪、阻尼怎麼變負的**」 |\n\n把塔科馬講成共振，會讓你去找一個「按節奏推的外力」——而那個外力根本不存在。真相是：**沒有外力按節奏推，是橋自己進入了一個正回授環。** 這個校正之所以重要，不只是學術潔癖。如果你以為災難都來自「某個強大的外力剛好對上頻率」，你會去防外力；但如果你懂得真正的敵人是**系統自身的正回授**，你會去防的是完全不同的東西——你會去找**負阻尼從哪冒出來、什麼讓系統開始餵自己**（呼應 ch10 Cloudflare 與 ch11 閃電崩盤——自我放大的失控，全是這個家族）。\n\n要對你誠實標一個 hedge：Billah & Scanlan「不是單純共振、是 aeroelastic flutter」這個**校正本身是學界共識**，毋庸置疑。但「扭轉顫振的精確流體力學機制」——尤其是渦流脫落（vortex shedding）在其中扮演什麼角色、阻尼究竟怎麼從正翻負——至今**仍有學者在發論文辯論細節**（2026-06，例如後來有研究質疑 Billah-Scanlan 未能完整連結渦流形態與阻尼翻轉）。本書取的是穩固的那一層：**它是自激的正回授不穩定，不是外力驅動的共振**——這一點沒有爭議。\n\n## 凱悅：一個「看起來等價」的變更，讓接點受力翻倍\n\n### 冷開場：1981 年 7 月 17 日傍晚，茶舞會\n\n密蘇里州 Kansas City，Hyatt Regency 飯店。這是一棟氣派的新飯店，核心是一個四層樓高的中庭（atrium）。中庭上方，**懸吊著三條空中走道**——分別在二樓、三樓、四樓的高度橫跨中庭，讓客人可以從一側樓層走到另一側，同時俯瞰底下熱鬧的大廳。這些走道不靠柱子撐，而是用**從天花板垂下來的鋼吊桿（hanger rod）**吊著，看起來輕盈、現代。\n\n7 月 17 日是個星期五的傍晚。飯店在中庭辦「**茶舞會（tea dance）**」——一個有樂隊、有舞池的社交活動。估計約 **2,000 人**在場，中庭大廳擠滿了人，二樓和四樓的走道上也站了不少人，靠著欄杆看樓下跳舞。\n\n晚上七點剛過，**四樓的走道，連同它正下方的二樓走道，一起塌了**。\n\n四樓走道從吊桿上脫落，砸向正下方的二樓走道；兩層走道（每層加上載重重達數十噸）連人一起，墜入下方擠滿人的舞池。\n\n**114 人死亡，216 人受傷。** 這是當時美國史上最致命的結構性崩塌（NBS 調查）。我們不會去寫現場的細節——死者是人，不是奇觀。我們要問的，是工程師該問的那個問題：**一棟才啟用一年多的新飯店，它的走道為什麼會在一個正常的星期五傍晚，毫無預警地脫落？**\n\n答案不在鋼材品質、不在「人太多」、不在偷工減料。答案在一張**修改過的圖**，和一通**沒有人真的去算的核准**。\n\n### 裝填：原始設計——一根吊桿到底\n\n先看**原始設計**，因為要看懂變更為什麼致命，得先看懂它改了什麼。\n\n原始設計裡，每根鋼吊桿是**一根到底、連續貫穿**的。它從天花板的支撐結構垂下來，**先穿過四樓走道**的箱型梁（box beam）、繼續往下、**再穿過二樓走道**的箱型梁，在每一層用螺帽（nut）鎖住。\n\n關鍵在受力。在這個設計裡，**四樓那顆螺帽，只承受四樓走道自己的重量**。二樓走道的重量，是由吊桿**更下方**的那顆螺帽獨立承受的，沿著同一根連續吊桿往上傳到天花板，**不經過四樓那個連接點**。\n\n原始設計（一根吊桿到底）：\n\n```\n   ┬          ← 天花板支撐\n   │\n   │          ← 同一根吊桿連續貫穿\n   │\n ──┼──        ← 4F 走道：螺帽只扛「4F 這一層」\n   │\n   │          ← 同一根繼續往下\n   │\n ──┴──        ← 2F 走道：螺帽扛「2F 這一層」\n```\n\n變更後（一根改兩段、錯開）：\n\n```\n   ┬          ← 天花板支撐\n   │\n   │          ← 上段吊桿\n   │\n ──┼──        ← 4F 走道：螺帽同時扛「4F ＋ 2F」兩層（受力翻倍）\n   │\n   │          ← 下段吊桿：從 4F 走道「重新」往下吊\n   │\n ──┴──        ← 2F 走道：螺帽扛「2F 這一層」\n```\n\n差別只在「下段吊桿從哪裡接」：原始設計裡 2F 的重量沿同一根桿直通天花板、**不經過 4F 接點**；變更後 2F 的重量**先掛到 4F 接點**，再往上傳——於是 4F 那顆螺帽，從扛一層變成扛兩層。\n\n要先說清楚：**原始設計本身就不及格**。連這個「一根到底」的設計，它的連接處強度也只達到當地建築規範要求的**約 60%**。換句話說，這座走道從圖紙階段就**沒有安全裕度**——它是 ch02 講的「漂移」的起點，安全邊界一開始就被吃掉了一塊。但即便只有 60%，在原始設計下，那個接點扛的是「一層」的重量。它撐得住那天的人群。**真正讓它垮的，是接下來那個變更。**\n\n### 觸發：把一根改成兩段\n\n問題出在從「設計圖」到「實際施工」之間的那道縫。\n\n負責製造、安裝這些鋼構件的，是鋼構廠 Havens Steel。他們在準備施工圖（shop drawing）時，碰到一個施工上的麻煩：原始設計要一根**從頭貫穿到底的長吊桿**，意味著要在**這根長桿的全長刻出螺紋**，好讓四樓的螺帽能鎖在中段——這在製造與安裝上既費工又難搞。\n\n於是 Havens 提出一個**看起來無害的變更**：把那一根連續吊桿，改成**兩段、錯開**的。上段：從天花板垂下來，吊住**四樓走道**。下段：從**四樓走道**再垂下來，吊住**二樓走道**。這樣每段都短、只需在兩端刻螺紋，施工輕鬆多了。\n\n這個變更，在製造便利性上完全合理。但它在受力上做了一件致命的事——**請把它當成你 review 過的某個「邏輯不變」的重構**：\n\n在原始設計裡，四樓的連接點扛的是「四樓那一層」。\n在變更後，四樓的連接點變成：**上段吊桿吊著四樓走道（四樓的重量）＋下段吊桿從這裡開始往下吊著二樓走道（二樓的重量）**。二樓走道的全部重量，現在**透過四樓的連接點**往上傳。\n\n**四樓那個接點的受力，大致翻了一倍**——從扛一層，變成扛兩層。\n\n再疊上原本就只有 60% 的不及格起點：受力翻倍，等於把能力**砍到約 30%**。也就是說，變更後的四樓連接點，實際強度只剩規範要求的**約三分之一**。\n\n這就是你最怕的那種 PR。diff 看起來只是「把一個共用的東西拆成兩段，方便維護」，CI 綠燈、形狀看起來等價——但**負載的路徑變了**。原本一個節點扛一份的東西，現在要扛兩份。在鋼構世界，這個「diff」是兩張施工圖；在你的世界，它是「把一個連線池拆成兩個各自重試的步驟」「把一次 atomic 寫入改成兩段串接」。**表面等價，受力翻倍。**\n\n### 連鎖：責任在流程裡蒸發了\n\n但這還不是全部。如果故事只是「鋼構廠擅自改、害死了人」，那它只是個施工糾紛，不會是這本書要講的災難。真正讓 114 人死亡的，是**第二層孔洞**：這個變更**走了正式的核准流程，卻沒有任何人真的重新計算它**。\n\n依專案規範，**任何施工圖都必須經結構工程師核准後才能動工**。負責結構工程的，是 Jack D. Gillum 的事務所（G.C.E.）。施工圖確實**走了核准流程、蓋了結構工程師的章**。流程上，一切「合規」。\n\n但致命的事實是：**核准的時候，沒有人真的坐下來重新計算這個連接點的受力。** 變更被當成一個「施工細節調整」往返核准，工程師事務所蓋了章——卻沒有人問那個唯一重要的問題：「把一根改成兩段，四樓接點現在要扛多少？」\n\n事後 NBS（國家標準局，今 NIST）的調查直指：這個變更使四樓箱型梁連接的載重加倍、遠超其能力，是直接技術原因。而更深層的，是 ch02 講的那種**責任分散**——\n\n- 工程師事務所負責人 Gillum 後來把問題歸因於溝通與監督的斷裂：他底下約有 10 位副工程師，每人同時管六、七個案子，他無法親自盯每一個設計細節。\n- 調查與後續的執照聽證認定：即便鋼構廠沒有特別標注這個箱型梁連接，**作為記錄工程師（engineer of record），Gillum 在法律上仍要對最終的施工圖負責**——包括他事務所沒畫、但他蓋了章的那些。G.C.E. 的工程師**沒有「抽查」這個連接**，過度依賴了鋼構廠。\n\n這裡有一個**仍有爭議、要 hedge 的細節**：許多工程倫理教材提到，鋼構廠與工程師事務所之間有過一通「**口頭核准**」變更的電話。但這通電話**是否真的發生、誰對誰說了什麼，至今仍有爭議**——倫理案例多半是「**為討論而假設**」它存在（⚠️ 各源不一，本書不釘死）。無論那通電話是否存在，NBS 報告的核心結論不變：**致命的不是「誰擅自改」，而是「這個改動經過了核准流程，卻沒有人重新計算」**——責任在一個多層轉手的流程裡**蒸發了**，每個人都以為「別人會檢查」「這只是個施工細節」「蓋了章就代表算過了」。\n\n1984 年 11 月，Gillum、其同事 Duncan 與 G.C.E. 被認定犯有重大過失（gross negligence）與不專業行為，兩人在密蘇里州（後來也在德州）的專業工程師執照被**吊銷**。注意：是吊銷執照，**不是刑事過失定罪**——調查的結論落在「專業責任的失效」，而非「某個壞人故意害人」。這正是 ch02 的「先講清楚當年的真實約束」：在一個工程師同時扛六七個案子的事務所裡，一個被當成「施工細節」的變更滑過核准、沒人重算——**換成你在那個流程裡，蓋章的時候，你會逐根吊桿重算嗎？**\n\n### 餘波：迷思校正——它不是「偷工減料」\n\n凱悅最常被講錯的版本是「**便宜建材／偷工減料害的**」——這個版本要被打破，因為它讓你學到完全錯誤的教訓。校正三個流行說法：\n\n1. **「是偷工減料、用了便宜的爛材料。」** 錯。鋼材、焊接品質都不是主因。主因是**連接細節的受力設計錯誤**——載重路徑被一個變更改變了。這不是「料不好」，是「**算的人沒重算**」。\n2. **「鋼構廠擅自亂改，工程師不知情。」** 要校正。變更**走了正式的施工圖核准流程、工程師蓋了章**。致命的不是「擅自」，是「核准時沒有人實際重算這個連接」——是**責任分散與複核失效**，不是一次偷偷摸摸的修改。\n3. **「就是人太多、超載壓垮的。」** 要校正。當天的載重，仍在一個「**合格的連接**」應該能承受的範圍內。它垮，是因為那個連接被設計成只剩約 30% 的能力——**不是異常超載，是連接本身被砍到不及格**。\n\n把凱悅講成「偷工減料」，你會學到「要用好料、要監工」——但這救不了下一個凱悅。**真正的教訓是 F12（變更即觸發）＋F9（受力假設的縫）＋責任分散**：你要防的不是「壞料」，是「**沒人重算的等價變更**」。\n\n## 故障解剖\n\n兩場災難，相隔四十年、一個是鋼橋一個是混凝土飯店、都跟電腦毫無關係。但把它們拆成失敗模式語言，你會看到**和你維運的分散式系統一模一樣的形狀**。\n\n### 潛伏條件 vs 觸發\n\n| | **潛伏條件（早就裝填好的）** | **觸發（最後一根稻草）** |\n|---|---|---|\n| **塔科馬** | 又窄又柔、實心鈑梁側緣的橋面，氣動上極不穩定；當代學科根本沒有 flutter 的理論工具；通車前的晃動警訊被當趣聞 | 1940-11-07 那陣約 35–40 mph 的**穩定**風，把橋面推進了扭轉顫振模態 |\n| **凱悅** | 原始設計連接點本就只達規範約 60%（零裕度）；連接細節先天脆弱（螺帽承力點正落在 C 槽鋼背對背的焊縫上）；工程師事務所一人扛多案、複核稀薄 | 鋼構廠「一根改兩段」的施工圖變更，讓四樓接點受力翻倍、能力砍到約 30% |\n\n兩案的共同點：**觸發都微不足道**。塔科馬的觸發只是一陣不算大的穩定風；凱悅的觸發只是一個「方便施工」的圖紙變更。真正的炸藥，都在**潛伏條件**裡早就裝填好了。這正是 F8——別盯著那根稻草，去看駱駝背上早就堆好的東西。\n\n### 起司的孔洞\n\n**塔科馬：**\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 設計規範 | 確保橋面結構穩定 | 1940 年的規範只算靜態風壓，**沒有 flutter 這一頁**——時代局限（latent） |\n| 橋面斷面選型 | 選一個氣動穩定的形狀 | 為美觀與經濟，選了又窄又柔、實心擋風的鈑梁——氣動溫床（latent） |\n| 風洞驗證 | 上線前測出氣動不穩定 | 當時根本沒做斷面的氣動穩定性風洞測試（latent） |\n| 通車前的警訊 | 把「會晃」當成危險前兆、停下來查 | 被歸類成「舒適度問題」，當趣聞、甚至當遊樂設施（**警訊被錯誤歸類**，呼應 ch11 的「警報沒人當回事」） |\n\n**凱悅：**\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 原始設計的安全裕度 | 給連接點留足夠餘裕 | 原始設計本就只有規範約 60%，零裕度（latent） |\n| 施工圖核准 | 工程師重算變更對受力的影響 | 走了流程、蓋了章，**但沒有人實際重新計算這個連接**（latent，本案核心） |\n| 責任歸屬 | 有一個明確的人對最終受力負責 | 一人扛多案、過度依賴鋼構廠、責任在多層轉手中分散蒸發 |\n| 連接細節設計 | 連接點本身要夠強韌 | 螺帽承力點落在 C 槽鋼焊縫——最弱處承受集中載重，破壞時螺帽直接拉穿 |\n\n兩張表都在喊同一句話：**沒有單一根因**。塔科馬：規範、選型、風洞、警訊，任何**一層**補上，橋就不垮（用桁架側緣、或做風洞、或把晃動當前兆停下來查）。凱悅：原始裕度、核准重算、責任歸屬、連接設計，任何**一層**補上，走道就不塌（原始設計合格、或核准時真的重算、或有人對受力負責到底）。**找「那個犯錯的人」永遠是錯的問法——要問的是為什麼每一層都沒擋住。**\n\n### 對應模式\n\n- **塔科馬 → F2（互動複雜度）為主**。災難不來自任何單一元件失效，而來自**風與柔性結構之間一個沒人設計、沒人預期的雙向耦合**（負阻尼的正回授）。這是 F2 最純粹的物理示範。它也帶一點 F8（潛伏的氣動不穩定）和「警訊被錯誤歸類」的影子。\n- **凱悅 → F9（介面/假設的縫）＋ F12（變更即觸發）為主**。F12：一個「看起來等價」的變更（一根改兩段）就是觸發。F9：變更悄悄改了「這個接點要扛幾層」這個**受力假設**——原始設計、鋼構廠、核准流程三方對「載重路徑」的假設不再一致。再加上責任分散（呼應 ch02），和 F8（原始設計零裕度的潛伏條件）、F3（多層孔洞對齊）。\n\n### 一句話形狀\n\n**塔科馬的形狀是：一個系統從穩定、不大的環境輸入裡，靠自己的反應抽取能量、餵養自己的振盪，在沒有任何外力「按節奏推」的情況下，把一個微小擾動正回授放大到失控——而當年沒有人有能力預見這種互動，因為它不在任何單一構件裡，它在構件與環境的耦合裡。**\n\n**凱悅的形狀是：一個「看起來等價」的變更，悄悄把一個連接點的受力假設翻了一倍，而本該攔住它的複核，在一個責任多層轉手、人人都以為別人會檢查的流程裡蒸發了——直到那個被砍到只剩三分之一能力的接點，在一個正常的星期五傍晚，扛不住了。**\n\n## 換成你的系統\n\n兩場災難各塞一根刺給你。\n\n**塔科馬的刺：「我的系統不會自激震盪吧？」** 你以為你怕的是「外面來一波十倍流量把我打垮」——那是共振思維，去找「按節奏推的外力」。但塔科馬告訴你：**最致命的放大不需要外力，系統自己就能餵自己。** 你的系統裡，哪裡藏著一個負阻尼的正回授環？最經典的：超時 → 重試 → 增加負載 → 拉高延遲 → 更多超時 → 更多重試。平時這個環是**正阻尼**的（重試被 backpressure、circuit breaker、抖動吃掉）；某個負載點之後緩衝失效，阻尼翻負，系統開始指數放大自己。塔科馬的工程師從沒在風洞裡把風速一路加上去、看它何時進入顫振——他們只算了靜態風壓。**問自己：我的壓測是不是也只算了「靜態風壓」（穩態尖峰），沒去逼出那個動態失穩點？我的重試有 backoff＋jitter、有 circuit breaker 在環裡當阻尼嗎？**（這個自我放大的失控，ch10 Cloudflare 與 ch11 閃電崩盤會給你軟體版的兩個極端示範。）\n\n**凱悅的刺：「這個 PR 應該一樣吧。」** 這是你 review 時最危險的四個字。凱悅的吊桿變更，diff 看起來只是「把一個共用的東西拆成兩段，方便維護」——形狀等價，**受力翻倍**。前面舉過的連線池拆分、batch 改串接、handler 拆步驟，全是這個形狀：表面等價，但某個節點從扛一份變成扛兩份。**問自己：這個「重構/拆分」改變了負載的路徑嗎？**\n\n但凱悅真正要扎的，是更深一層——**責任分散**。你蓋章 approve 的時候，是真的算過受力路徑，還是相信「CI 綠燈就代表算過了」「另一個 reviewer 應該看了」「這只是個重構，邏輯不變」？凱悅的工程師事務所蓋了章，但沒人重算那個接點。當一個變更經手三四個人、每個人都以為別人會檢查那個最關鍵的假設時，那個假設就**沒有人在檢查**——它在流程裡蒸發了，就像 114 條人命底下那個沒人重算的接點。**你的 approve，是「我重算過受力路徑」，還是「圖上看起來合規」？**\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★★\n\n**用 flutter（自激）而非共振（外驅）重講塔科馬。** 不准用「共振」「頻率匹配」「像歌聲震碎酒杯」這些字眼，向一個只聽過「共振版」的同事，重講塔科馬為什麼會垮。你的講述必須答出三件事：(a) 能量的源頭是什麼，它是不是週期性的外力？(b)「負阻尼」是什麼意思，它和正常結構「越晃越小」的差別在哪？(c) 為什麼說「沒有外力按節奏推、橋自己餵自己」？最後，把這個機制對應到一個你熟悉的軟體正回授環。\n\n#### 推演解答\n\n關鍵是把因果方向講對。**共振版的因果**是「外力（風）以某頻率推 → 剛好匹配橋的自然頻率 → 振幅放大」——能量源是外部週期力，敵人是「頻率匹配」。**顫振版的因果**是「橋面動一下 → 改變繞流的相位 → 被改變的氣流順著橋的運動推回去 → 橋從穩定氣流裡淨賺能量 → 振幅放大」——能量源是**穩定的、非週期的**風，敵人是**正回授環＋負阻尼**。(a) 源頭是穩定的風，**不是**週期性外力。(b) 正常結構阻尼為正——每週期淨**耗散**能量，越晃越小；負阻尼是每週期淨**吸收**能量，越晃越大。(c)「自激」的精髓：是橋**自己的運動**改變了氣流、創造了那個把能量推回來的相位；風只是被動的能量池，舀能量的動作是橋做的。軟體對應：retry storm 最標準——延遲觸發重試（橋動）、重試增加負載（改變氣流）、負載拉高延遲（能量推回），系統自己放大自己。好的答案會點出：**防 flutter 不是去擋風（擋外力），是去改橋面斷面或加阻尼（破壞正回授環）**；對應到軟體，不是去擋流量，是加 backoff＋jitter＋circuit breaker（在環裡注入正阻尼）。\n\n### 推演題2 [20 分鐘] ★★★\n\n**找出「凱悅是偷工減料」這個說法漏掉了什麼。** 你的工程師朋友說：「凱悅啊，不就是建商貪便宜、用爛料偷工減料，活該。」請逐點反駁，並說明這個錯誤歸因會讓人學到什麼**錯誤的教訓**、又錯過了什麼**正確的教訓**。\n\n#### 推演解答\n\n逐點反駁：(1)**不是材料問題**——鋼材與焊接品質都不是主因，主因是**連接細節的受力設計錯誤（載重路徑）**。(2)**不是「擅自亂改」**——變更走了正式施工圖核准流程、工程師蓋了章；致命的是**核准時沒有人實際重算這個連接**，是複核失效與責任分散，不是偷偷摸摸。(3)**不是超載**——當天載重仍在合格連接的承受範圍內；垮是因為連接被砍到只剩約 30% 能力。**錯誤教訓**：信「偷工減料版」的人學到的是「要用好料、加強監工」——但這救不了下一個凱悅，因為下一個的料可能很好、監工可能很嚴，照樣會死在一個沒人重算的等價變更上。**正確教訓**：F12＋F9＋責任分散——別只盯「程式碼品質/測試覆蓋率」（好料、嚴監工），要盯**「等價變更有沒有人重算受力」「責任有沒有在流程裡蒸發」**。再連到 ch02：把「都是 Gillum 的疏失」翻譯成系統條件（一人扛六七案、變更被當施工細節、複核稀薄），你會發現，換成你在那個流程裡蓋章，你未必算得出來。\n\n### 推演題3 [20 分鐘] ★★\n\n**對帳你做過的「看似等價、其實改了負載分佈」的變更。** 翻你的 git 歷史或記憶，找出一個你做過或 review 過的、**標榜「重構/邏輯不變/只是拆分」但其實悄悄改了系統受力路徑**的變更（連線池拆分、batch 改串接、handler 拆步驟、cache 層級調整、把一次查詢拆成 N+1……）。寫出：(a) 它表面上「等價」在哪；(b) 負載路徑實際怎麼變了，哪個節點從扛一份變成扛兩份（或更多）；(c) 當時有沒有人真的「重算受力」，還是大家都「應該一樣吧」就 approve 了；(d) 如果它在生產環境出事，會是在什麼觸發下（哪個峰值/哪個失敗模式）暴露出來？\n\n#### 推演解答\n\n這題沒有標準答案，重點是訓練你辨認「凱悅的吊桿」在你 codebase 裡的長相。最常見的真實版本是 **N+1 查詢**——把「一次 join 撈全部」重構成「先撈列表、再逐筆撈詳情」，diff 看起來只是「拆成兩步、好讀」，但 DB 的受力從「一份」變成「N＋1 份」，在列表變長的某個峰值下突然把 DB 打爆（這正是你做過的「重排 SQL、拆 transaction 減鎖競爭」的反向操作——你知道這個形狀有多致命）。好的答案會誠實回答 (c)：多半是「沒人真的重算，看 diff 乾淨就 approve 了」——這就是凱悅的責任分散在你團隊裡的版本。而 (d) 的價值在於：它通常**不會在 PR 當下出事**，而是潛伏到某個峰值才暴露（F8）——就像凱悅的接點，從蓋章到崩塌，潛伏了一年半。\n\n### 推演題4 [15 分鐘] ★★★\n\n**反事實：如果塔科馬的某一層起司沒破洞？** 從塔科馬的四層孔洞裡（設計規範無 flutter 概念、橋面選型氣動不穩、無風洞驗證、警訊被當趣聞）挑**兩層**，分別推演：如果這一層當年補上了，橋還會垮嗎？藉此說明「為什麼塔科馬不是『von Kármán 那群人算錯了』」。\n\n#### 推演解答\n\n挑兩層示範：**(1) 若做了風洞驗證**——把橋面斷面放進風洞、把風速一路加上去，**會看到它在某個臨界風速進入扭轉顫振**，於是上線前就會改斷面或加阻尼，橋不垮。這說明災難**本可被一道「動態壓測」攔下**——對應到你：別只測穩態尖峰，要逼出失穩點。**(2) 若把通車前的晃動當成危險前兆**——「會晃」被正確歸類成穩定性警訊而非舒適度問題，工程界會在垮掉前停下來深查。**為什麼不是「算錯了」**：這四層裡**沒有一層是「von Kármán 算錯了某個數」**——1940 年根本沒有 flutter 理論可算。把它歸因成「天才算錯了」是 ch02 講的事後諸葛：用今天才有的知識審判當年的人。真相是時代局限的潛伏條件＋多層防禦缺位——**換成你在 1940 年，你也算不出一個還沒被發現的現象**。很多災難不是「笨」，是「當時沒人看得見」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 塔科馬**不是**共振——那它是什麼？「共振」和「自激顫振」在「能量從哪來、誰維持振盪」上的根本差別是什麼？為什麼把它講成共振會讓你學到錯誤的防禦方向？\n2. 「負阻尼」是什麼意思？塔科馬的負阻尼正回授環，和你系統裡的 retry storm 是不是同一個形狀？平時是什麼在當「正阻尼」？\n3. 為什麼說塔科馬是 F2（互動複雜度）的純粹示範——災難為什麼**不在任何單一構件裡**？\n4. 凱悅的「一根吊桿改兩段」，為什麼會讓四樓接點受力**翻倍**？這個變更在受力假設上改了什麼（F9）？為什麼它是 F12（變更即觸發）的範例？\n5. 凱悅**不是**「偷工減料」、**不是**「人太多壓垮」、**不是**「鋼構廠擅自亂改」——逐一說明為什麼，以及致命的真正原因是什麼。\n6. 凱悅的責任為什麼說「在流程裡蒸發了」？變更走了核准流程、蓋了章，為什麼還是沒有人擋住它？這跟 ch02 的「責任分散」是同一件事嗎？\n7. 兩場災難，各列出至少兩道**單獨完好就能阻止災難**的防線。這如何反駁「找出那個犯錯的人」是對的問法？\n8. 這兩場災難都發生在電腦出現之前/之外——它們對「正在維運分散式系統的你」意味著什麼？為什麼說這些失敗模式不是軟體的特產？\n\n## 延伸閱讀\n\n採「先看校正、再追機制、最後對帳自己」的順序：\n\n- **K. Yusuf Billah & Robert H. Scanlan, \"Resonance, Tacoma Narrows Bridge Failure, and Undergraduate Physics Textbooks,\" *American Journal of Physics* 59(2), 1991**（[AJP](https://pubs.aip.org/aapt/ajp/article/59/2/118/532864)；摘要見 [vibrationdata](https://www.vibrationdata.com/Tacoma.htm)）——本章最重要的一條：明白駁斥「共振版」、釘正為 aeroelastic flutter。值得讀的不是流體力學，而是它示範了「**全世界（含教科書）一起記錯一件事**」——這正是本書的可信度來源。\n- **Barney Elliott 拍攝的塔科馬崩塌影片**（各大影像檔案館與 Wikipedia 條目內嵌）——人類第一次用影像記錄到 flutter 致橋毀的全程。盯著**振幅一圈比一圈大**那段：那就是負阻尼正回授的肉眼版，是你 dashboard 上那條往上彎的曲線的鋼鐵化身。\n- **NBS（今 NIST）, *Investigation of the Kansas City Hyatt Regency Walkways Collapse*, NBSIR 82-2465, 1982**（[NIST PDF](https://nvlpubs.nist.gov/nistpubs/Legacy/IR/nbsir82-2465.pdf)）——凱悅的一手官方調查；示範了「技術直接因（連接載重加倍）＋組織根因（沒有人重算）要一起寫進結論」。\n- **Hyatt Regency 工程倫理案例**（[Online Ethics Center](https://onlineethics.org/cases/hyatt-regency-walkway-collapse)）——焦點在「記錄工程師的責任邊界」與「那通有爭議的核准電話」，是你 code review 流程裡「大家都以為別人會檢查」的鏡子。注意：教材對那通電話多採「為討論而假設」，史實細節請對照 NBS 報告（⚠️）。\n- 對照閱讀：與 **ch10 Cloudflare regex**、**ch11 閃電崩盤**並讀——塔科馬是「正回授／自激」暗線的物理源頭；再與 **ch02** 並讀，凱悅就是「責任分散」的鋼構案例。\n"}, {"id": "ch04-737-max-mcas", "file": "ch04-737-max-mcas.md", "group": "Part II — 安全系統即兇手", "title": "ch04 — 波音 737 MAX / MCAS：一個感測器，兩架飛機，346 條人命", "md": "# ch04 — 波音 737 MAX / MCAS：一個感測器，兩架飛機，346 條人命\n\n> **本章解剖什麼**：一個沒寫進飛行手冊、預設開啟、靠單一感測器就反覆壓機頭的「自動修正」，如何在五個月內摔掉兩架飛機。這是 Part II「安全系統即兇手」的開場——用來讓 MAX 操縱手感「像舊 737」的自動化，本身成了直接成因。主打 F4（安全系統即危險源）、F10（單一感測器）、F5（自動化的諷刺）、F13（生產壓力）。它替後兩章定調：ch05 法航 447 是自動化把爛攤子丟回給人，ch06 于伯林根是兩個權威互相矛盾——本章是更狠的版本，連「自動化在做什麼」都對操作員隱藏了。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS ◄你在這裡  ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n你寫過自動 failover，對吧。一個 health check 連續 N 次失敗，系統就判定某個節點死了，自動把流量切到備援、或把那個 pod 殺掉重啟。你也設過 HPA：某個 metric 越過閾值，就自動擴縮。這些機制有一個共同特徵——**它們不問你，看到一個訊號就採取激烈動作**。這正是它們有價值的地方：凌晨三點沒人值班，它替你扛。\n\n現在把焦慮工程師的鏡頭打開，問三個問題：\n\n1. 這個自動機制**依賴的那個訊號**，本身會不會錯？health check 打的是某個 endpoint，那個 endpoint 自己掛了、或網路分區了，回給你的「不健康」是真的，還是假的？\n2. 訊號錯的時候，自動機制會把系統推向哪裡？把一個其實活著的節點殺掉、把流量切到一個其實更糟的備援、在尖峰把實例縮到零——它的「修正」會不會比原本的問題更致命？\n3. 半夜被它叫起來的那個人，**知道這個機制存在嗎**？他看著 dashboard 上莫名其妙的流量重導，腦中有沒有「喔這是 autoscaler 在動」這條線索？還是他得從零開始猜？\n\nMCAS 是這三個問題全部答錯的極端版本。它依賴**單一一個**攻角感測器；那個感測器錯的時候，它反覆把機頭往下壓、直到墜海;而坐在駕駛艙裡的兩位飛行員，**根本不知道有這個系統**——因為波音請 FAA 把它從飛行手冊裡拿掉了。346 個人因此死亡。這一章我們把這個你天天在蓋的「看到單一訊號就激烈反應的自動機制」，攤開到它最壞的形狀。\n\n## 冷開場：那台飛機昨天差點摔，但活下來了\n\n2018 年 10 月 28 日，印尼。一架編號 PK-LQP 的波音 737 MAX 8 從峇里島起飛。一抬輪，駕駛艙就開始發瘋：機長那側的桿子劇烈抖動（stick shaker，失速警告），空速指示報警，而飛機的水平安定面開始**自己**往下配平、把機頭壓低。機組沒做錯任何事，飛機卻一次次想往下栽。\n\n那天駕駛艙裡多坐了一個人——一位搭便機（jump seat）的下班飛行員。根據印尼 KNKT 的調查報告，是這位旁觀者認出了症狀，告訴正在搏鬥的機組：這是 **runaway stabilizer trim**（安定面失控配平），把那兩個 cutout 開關切掉、斷掉電動配平的馬達。機組照做，飛機安定下來，剩下的航程靠手動配平飛完，平安降落雅加達。（見 [Qz 報導](https://qz.com/1576597/off-duty-pilot-saved-lion-airs-737-max-the-day-before-its-fatal-flight)）\n\n這是這場災難最該讓你脊背發涼的一個事實：**問題昨天就發作過，而且被擋下來了**。同一架飛機、同一個感測器故障、同一套 MCAS 行為。它沒被當成「這架飛機有致命設計缺陷、立刻停飛」，而是被當成一次「處理掉了」的異常。那個壞掉的攻角感測器，被換成另一個——後來查出來，那是個**校準錯誤**的二手件，裝上去之後左右兩個感測器讀數差了約 20 度（[IEEE Spectrum](https://spectrum.ieee.org/indonesias-safety-committee-releases-preliminary-report-into-lion-air-crash)）。第二天，同一架飛機,換了一組機組，這次駕駛艙裡沒有那位剛好認得症狀的旁觀者。\n\n## 裝填：MCAS 為什麼會存在\n\n要懂這場災難，得先懂一件不浪漫的事：MCAS 的存在，根本不是為了安全，是為了**省錢和趕時間**。\n\n故事從引擎開始。波音 737 是個 1960 年代的設計，機身離地很低。空中巴士的 A320neo 換上了又大又省油的新引擎搶市場，波音必須跟上,於是給 737 換上 LEAP-1B 引擎——但這引擎太大，737 的矮機身塞不下，只能把引擎往前、往上挪。這個位置改變了飛機的氣動特性：在高攻角（機頭仰角大）時，較大、較前置的引擎整流罩會產生額外升力，讓機頭**自己想再往上抬**。\n\n對波音來說，這是個商業問題不是安全問題。如果 MAX 在某些狀態下的操縱手感跟舊款 737 不一樣，FAA 可能要求飛行員接受**模擬機重訓**——而波音賣 MAX 的核心賣點，正是「跟你現有的 737 是同一個型別等級，飛行員不用重訓、航空公司省一大筆」。手感不能變。\n\n於是 MCAS 登場：一段飛控軟體，偵測到高攻角時，自動往「機頭向下」的方向配平水平安定面，把那股多出來的抬頭趨勢抵銷掉，讓桿子的手感「**感覺起來**像舊 737」。\n\n這裡有第一個必須校正的迷思，而且很多人到今天還搞錯——\n\n> **MCAS 不是防失速系統。** 它是一個「操縱手感／縱向穩定」增益功能，目的是讓 MAX 飛起來手感像舊 737，不是傳統的失速保護（stall protection）。它在正常飛行包絡內、飛機根本沒接近失速時，也會因為錯誤輸入而被觸發。把它講成「防失速系統壞了」，會讓你以為「那是緊急保護機制，偶爾出包可以理解」——錯。它是一個為了**商業手感**而加上去的東西，卻被賦予了能把飛機壓到墜毀的權限。\n\n而它的權限，在開發過程中被**悄悄放大了**。早期設計裡，MCAS 每次最多動安定面 0.6 度。但後來工程師發現低速、大攻角的情境下需要更強的修正,於是把上限放寬到**每次 2.5 度**——放大超過四倍。更糟的是：它可以**每約 5 秒重複觸發一次，沒有累積上限**。飛行員每手動拉回一次，只要那個錯誤的攻角讀數還在,MCAS 過幾秒又把機頭壓回去，一次比一次更低。這個放大,沒有被取證文件充分反映出來，FAA 沒有重新嚴格評估它失效時的後果（landscape；[美國眾院報告](https://transportation.house.gov/imo/media/doc/2020.09.15%20FINAL%20737%20MAX%20Report%20for%20Public%20Release.pdf)）。\n\n到這裡，瑞士起司的孔洞已經全部就位，只等一個觸發：\n\n- **單一感測器**：這個能把飛機壓向地面的系統，只讀一個攻角感測器，沒有左右交叉比對。\n- **放大的權限**：0.6 度暗中變 2.5 度、可無限重複。\n- **對飛行員隱藏**：手冊裡沒有它。飛行員看到安定面亂動，腦中沒有「MCAS」這條線索。\n- **第一起之後沒停飛**：Lion Air 摔了之後，波音和 FAA 只發了一份 bulletin 重申既有的 cutout 程序，沒停飛、沒做硬體修正。\n\n## 觸發與連鎖（一）：Lion Air 610，13 分鐘\n\n2018 年 10 月 29 日，就是那架昨天才被救下來的 PK-LQP。Lion Air 610，從雅加達起飛。\n\n一抬輪，昨天的劇本重演：左側攻角感測器（那個校準錯誤的二手件）報出一個比真實值高約 20 度的攻角。MCAS 收到這個「飛機快失速了」的假訊號，開始工作——往下配平，壓機頭。\n\n機組不知道 MCAS 存在。他們感覺到的是：飛機莫名其妙地一直想往下栽。於是他們做了任何飛行員都會做的事——拉桿、用電動配平把機頭拉回來。每拉回一次，MCAS 過幾秒又壓下去。根據黑盒子資料，機組與這個看不見的對手**拉鋸了約 26 次**（[Seattle Times](https://www.seattletimes.com/business/boeing-aerospace/black-box-data-reveals-lion-air-pilots-struggle-against-boeings-737-max-flight-control-system/)）。\n\n關鍵的悲劇在於：他們**對抗了症狀，卻沒切斷源頭**。昨天那位 jump seat 飛行員之所以能救飛機，是因為他從外部認出「這是 runaway stabilizer trim」、想起了那兩個 cutout 開關。今天駕駛艙裡的人,在一個訊號全亂、警報齊鳴的座艙裡，沒能把「安定面亂動」這個現象，連結到「切 cutout 開關」這個動作——因為手冊從沒告訴他們，這背後有一個會反覆壓機頭的自動系統。他們持續用電動配平對抗,而電動配平一鬆手，MCAS 就接管。起飛 13 分鐘後,飛機以高速衝進爪哇海。機上 189 人全數罹難。\n\n## 觸發與連鎖（二）：Ethiopian 302，六分鐘，而且他們做對了\n\n如果你以為「那是因為他們不知道有 MCAS、不知道要切 cutout」，所以「知道的人就沒事」——那 Ethiopian 302 會把這個安慰拆掉。\n\n2019 年 3 月 10 日，Lion Air 之後快五個月。衣索比亞航空 302，從阿迪斯阿貝巴起飛。這一次，全世界都知道 MCAS 了，波音的 bulletin 也發了。機組受過那份 bulletin 的提示。\n\n起飛後，攻角感測器再次故障（這次據信是起飛時感測器受損／葉片脫落），MCAS 又開始壓機頭。但這組機組做了「正確」的事——副機師喊出 \"Stab trim cut-out\"，他們把那兩個 cutout 開關切掉，斷了電動配平,也就斷了 MCAS（[Wikipedia: ET302](https://en.wikipedia.org/wiki/Ethiopian_Airlines_Flight_302)）。教科書動作。應該得救了。\n\n但他們落進了一個 Lion Air 之後沒人警告過的陷阱。切掉電動配平之後，要把已經被 MCAS 壓到嚴重低頭的安定面拉回中立，只剩**手動配平輪**——駕駛艙裡那個用手轉的大輪子。問題是：此時飛機因為前面的混亂已經嚴重超速，右側空速一度顯示約 500 節、遠超最大操作速度。在這種高速下，氣流作用在安定面上的力大到**手動配平輪幾乎轉不動**——靠人的力氣根本搖不回來（[FlightGlobal](https://www.flightglobal.com/safety/ethiopian-crew-struggled-with-manual-trim-at-overspeed/132197.article)）。\n\n於是機組陷入兩難。手動轉不動,飛機還在低頭。約五分鐘時,為了用電動配平的力量把安定面拉回來，機長**重新打開了電動配平開關**——這在當下是合理的：手動已經救不了，電動是唯一還有力氣的工具。但打開電動配平，也就**重新喚醒了 MCAS**。九秒後，MCAS 再次觸發，把機頭往下壓。約 25 秒後，飛機墜毀。機上 157 人全數罹難。\n\n這就是為什麼第三個迷思必須被狠狠校正：\n\n> **「外國飛行員技術差才摔，美國飛行員不會」——錯，而且有害。** 兩份官方最終報告、以及美國國會調查，都把根因指向設計與取證。Ethiopian 302 的機組**確實執行了** trim cutout 這個被宣稱能救命的程序。是這個程序在「高速＋安定面已被壓到極端」的真實情境下**不夠用**——手動輪轉不動，逼得他們重新打開電動配平、放 MCAS 回來。把責任推給「飛行員技術不足」，不只是不公平，更是錯失教訓：問題不在那個人，問題在「**是什麼系統條件，讓任何人在那一刻都幾乎不可能做對**」。\n\n## 餘波\n\n兩起空難，五個月，346 人死亡。全球 737 MAX 機隊於 2019 年 3 月起停飛約 20 個月——這是現代航空史上罕見的全球性停飛。\n\n調查的結論高度一致（landscape）：印尼 KNKT 的 Lion Air 最終報告列出九項 contributing factors,衣索比亞 EAIB 的 ET302 最終報告（2022-12）、以及美國眾議院運輸委員會調查報告（2020-09）與 FAA 的 JATR 報告，全都指向同一個形狀——**這是「有缺陷的飛機設計＋失靈的取證制度」與機組、維修因素疊加的多層失效，不是單純飛行員失誤**。\n\n組織線的那一層孔洞尤其值得後端工程師記住：FAA 透過 ODA（Organization Designation Authorization）制度，把大量取證工作**委由波音自己評估**。也就是說,負責「把關這架飛機安不安全」的，很大程度上是想趕快把飛機賣出去的那家公司自己。這不是貪汙,是制度設計上的利益衝突——你讓被監管者自己當監管者，再加上與 A320neo 競爭的時程與成本壓力，安全就會在每一個「應該沒事吧」的小決定裡，一點一點被讓掉。\n\n## 故障解剖\n\n**潛伏條件 vs 觸發**\n\n災難**早就裝填好了**，裝填的不是那個壞掉的攻角感測器——是這一整組設計與制度決策：一個讀單一感測器、權限被暗中放大到能把飛機壓向地面、且對飛行員完全隱藏的自動系統。那個壞掉的感測器只是**觸發**（trigger）——而且是個遲早會來的觸發。感測器本來就會壞,這是已知的、統計上必然發生的事。把「不會壞的東西」當成「會壞的東西」的唯一依靠,災難就只是時間問題。\n\n**起司的孔洞清單**\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 感測器冗餘 | 單一感測器故障 | MCAS 只讀一個 AoA 感測器、無左右交叉比對；違反「安全攸關功能不可單點失效」原則（F10） |\n| 權限限制 | 自動系統把飛機推向極端 | 授權量由 0.6° 暗中放大到 2.5°、可每約 5 秒重複、無累積上限（F4） |\n| 飛行員的心智模型 | 認不出異常的來源 | MCAS 被刻意從手冊移除，飛行員看到安定面亂動卻無法對症（F5/F11） |\n| 取證把關 | 設計缺陷在認證時被攔下 | FAA 透過 ODA 委由波音自評，喪失獨立把關（組織線，F13） |\n| 第一起後的應變 | 同型事故重演 | Lion Air 後只發 bulletin、未停飛、未硬體修正，五個月後 ET302 重演（F13） |\n| 救命程序本身 | 切 cutout 後能恢復 | 高速下手動配平輪轉不動，cutout 程序在真實情境不足，逼機組重啟電動配平、放 MCAS 回來 |\n\n任何**一層**沒破，這兩架飛機都不會掉。雙感測器交叉比對——MCAS 不會被單一壞讀數騙。權限沒被暗中放大——一次 0.6 度的誤動作飛行員拉得回來。手冊有寫 MCAS——機組第一時間就連結到 cutout。第一起後停飛——ET302 根本不會起飛。這就是為什麼「找那個犯錯的人」是錯的問法（見 ch02）：沒有任何單一一個人、單一一個決定造成這場災難。是**六層各自獨立的防禦同時破洞、恰好對齊**。\n\n**對應模式**\n\n- **F4 安全系統即危險源**：用來「保護操縱手感」的 MCAS，本身是把兩架飛機壓向地面的直接成因。這是 Part II 的核心主張——保護機制成了兇手。\n- **F10 單一感測器／SPOF**：能把飛機壓向地面的功能，依賴單一 AoA 感測器、無交叉驗證。\n- **F5 自動化的諷刺**：自動化拿走了狀況意識——飛行員不知道有個自動系統在跟他搶安定面，也就無法接住它的失效。\n- **F13 生產壓力壓過安全**：「手感要像舊 737 以免重訓」的商業目標,加上與 A320neo 競爭的時程壓力，是 MCAS 存在、被淡化、且被自我取證放行的根源。\n\n**這場災難的形狀是：一個為了商業手感而生、權限被暗中放大、靠單一感測器、且對使用它的人隱藏的自動修正,在那個感測器（必然會）故障的那一刻,反覆把飛機推向地面——而被它對抗的人，腦中沒有它存在的那條線索。**\n\n## 換成你的系統\n\n你的後端世界裡，MCAS 不長那個樣子,但它的**形狀**到處都是：**一個依賴單一訊號、自動採取激烈動作、而且半夜接手的人不一定知道它存在的機制**。\n\n點名一個你「應該沒事吧」的假設：**你的自動 failover / health-check 機制，依賴的那個健康訊號是可信的。**\n\n拆穿它。想想你的 health check。它打某個 endpoint，連續失敗 N 次就判定節點死亡、自動切流量或殺 pod。現在問：那個「失敗」是真的嗎？\n\n- endpoint 自己有 bug，回了 500，但服務其實好好的——你的 failover 把一台健康的機器踢了。\n- 網路分區，health checker 連不到目標，但目標對使用者其實正常——你切到備援，結果備援更糟，或者你製造了 split-brain。\n- 依賴的下游慢，health check 逾時，於是**所有**節點同時被判定不健康——你不是 failover，你是把整個叢集殺光（這就是 MCAS 的「單一壞讀數→全體激烈反應」在分散式系統的版本）。\n\nMCAS 讀單一 AoA 感測器,你的 failover 讀單一 health endpoint。MCAS 的「修正」是壓機頭，你的「修正」是切流量／殺 pod／縮容。當訊號錯了，兩者都會**用全部力氣把系統推向懸崖,而且越推越用力**——MCAS 每 5 秒再壓一次,你的 autoscaler 在錯誤 metric 下每個 scaling interval 再縮一次，retry storm 每一輪再打一次。\n\n更陰險的是「對操作員隱藏」這一層。MCAS 最致命的不是它會壓機頭,是飛行員**不知道有東西在壓機頭**。你的系統有沒有這種「沒人記得它存在、但會自動採取激烈動作」的機制？那個三年前某人加的、藏在某個 sidecar 裡的自動重啟邏輯？那條 alarm 觸發後自動執行的 runbook automation？半夜被叫起來的 on-call,看著流量莫名其妙地重導、實例莫名其妙地歸零,他的 dashboard 上有沒有一行字告訴他「這是 XXX 自動機制在動」?還是他得像 Lion Air 的機組一樣，從零開始猜、跟一個看不見的對手拉鋸?\n\n**可操作的自問**（把它寫進你的 design review checklist）：\n\n1. **這個自動機制依賴幾個獨立訊號？** 如果只有一個,那個訊號錯的時候誰來交叉驗證?（給它第二個 AoA 感測器,並定義「兩者分歧時停用自動動作」——退回安全的「什麼都不做」,而不是「拿一個可能是錯的訊號去激烈行動」。）\n2. **訊號錯誤時,這個機制的動作有沒有上限／熔斷?** 還是它會每個 interval 再來一次、越來越用力,沒有累積煞車?（MCAS 缺的正是這個。）\n3. **它對 on-call 可見嗎?** 它一動,有沒有一條清楚的 event/log/標記,讓接手的人立刻知道「是這個東西在動」,而不必逆向推理?\n4. **關掉它的那個開關(kill switch),在你真正需要的最壞情境下,還按得動嗎?** ——Ethiopian 302 切了 cutout,卻發現高速下手動輪轉不動。你的「手動接管」程序,有沒有在「系統已經被自動機制搞到極端狀態」的真實壓力下演練過?還是它只在風和日麗時測過?\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n把 MCAS 對應到你維運過的「依賴單一健康檢查訊號就採取激烈動作」的自動化。用自己的話,把這場災難的因果鏈講一遍,然後逐項替換成你系統裡的對應物:單一感測器 = ?、暗中放大的權限 = ?、對操作員隱藏 = ?、必然會來的觸發 = ?。講得出完整對應才算過。\n\n#### 推演解答\n\n一個典型對應(你的版本可能不同,重點是結構同構):\n\n- **單一 AoA 感測器** = 你的 auto-failover 只看一個 health endpoint,沒有第二來源交叉驗證。或:autoscaler 只看一個 metric(如單一 CPU 指標),沒有「這個 metric 本身可信嗎」的旁證。\n- **暗中放大的權限(0.6°→2.5°、可重複)** = 那次「為了反應更快」把 scaling 步長從 1 台調到 4 台、把 cooldown 從 5 分鐘縮到 30 秒的 PR。當時看是優化,訊號錯時就是「每 30 秒再砍四台,沒有煞車」。權限的放大往往發生在一個看似無害的調參 commit 裡,沒人重新評估「失效後果」。\n- **對操作員隱藏** = 這個自動邏輯藏在某個 controller / sidecar / Lambda 裡,沒寫進 runbook,on-call 的 dashboard 上看不到它在動。新進的人完全不知道它存在。\n- **必然會來的觸發** = 感測器/endpoint/網路遲早會給出一個錯誤訊號。這不是「會不會」,是「何時」——這正是 F8 潛伏條件 vs 觸發、以及全書的核心(正常意外):在這種系統裡,觸發是統計上遲早的常態。\n\n講這題的價值在於:當你能把一場航空災難一比一映射到自己的 infra,你就真正內化了「失敗模式語言」——同一個形狀,跨領域重演。\n\n### 推演題2 **[10 分鐘]** ★★\n\n**反事實:** 假設 MCAS 改成讀**兩個** AoA 感測器,並且規定「**當兩者讀數分歧超過某閾值時,停用 MCAS 並提示飛行員**」。Lion Air 610 還會掉嗎?順便回答:這個改法在你的 auto-failover 上對應什麼設計?\n\n#### 推演解答\n\n幾乎可以肯定不會掉。Lion Air 的左右兩個攻角感測器在地面滑行時就差了約 20 度——在「雙感測器+分歧即停用」的設計下,MCAS 一開機偵測到 20 度的分歧,就會自己停用、把控制權乾乾淨淨留給飛行員,並亮燈告訴他們「攻角資料不可靠」。沒有反覆壓機頭,沒有拉鋸。事實上,MAX 復飛後的修正之一,正是改成比對兩個 AoA 感測器、分歧時停用 MCAS。\n\n關鍵洞察:**分歧時的正確動作是「退回什麼都不做」,而不是「賭一個」。** 一個讀數可能對、可能錯,你不知道哪個——此時最安全的是停用自動修正、把判斷交還給人,而不是挑一個讀數去激烈行動。\n\n對應到你的 failover:不要讓單一 health checker 的判斷直接觸發切換。用**多個獨立來源**(不同網段、不同探測方式)投票;當它們**分歧**時,預設動作應該是**保守的「先不動、升級告警給人」**,而不是「相信其中一個就自動 failover」。多數 split-brain 災難,根因就是「在訊號分歧時還敢自動採取破壞性動作」。\n\n### 推演題3 **[15 分鐘]** ★★★\n\n**找出迷思的史實破綻:** 有人跟你說「737 MAX 那兩起就是飛行員技術不足,你看那位 jump seat 的飛行員不是輕鬆就救下來了嗎,還有 Ethiopian 那組明明知道 MCAS 卻還是摔了,可見是人的問題」。請指出這個說法漏掉了什麼。\n\n#### 推演解答\n\n這個說法把兩個事實扭曲成相反的結論,正好踩中本書要破的「人為疏失」根因迷思(見 ch02)。逐點拆:\n\n- **「jump seat 飛行員輕鬆救下」漏掉的:** 他能救,不是因為他技術神,是因為他**剛好從旁觀者的視角認出了 runaway trim 的症狀、想起 cutout 程序**。在駕駛艙裡被一堆同時響起的假警報淹沒、又從沒被告知 MCAS 存在的當值機組,沒有這個從容。這恰恰證明了問題在系統(隱藏 MCAS、訊號混亂),不在人——同一群人,有沒有那條線索,結果是生與死。\n- **「Ethiopian 知道 MCAS 卻還是摔」漏掉的(最致命):** 他們**做了**被宣稱能救命的事——切 cutout。是那個程序在「高速+安定面已被壓到極端」的真實情境下**不夠用**(手動輪轉不動),逼他們重開電動配平、放 MCAS 回來。「知道」並不能讓物理消失:在 500 節的氣流壓力下,人的手臂搖不動那個輪子。\n- **共同破綻:** 把「在當下的資訊量、時間、物理約束下幾乎不可能做對」的處境,事後諸葛地說成「他技術不足」。正確的問法不是「他為什麼沒做對」,而是「**是什麼系統條件,讓任何人在那一刻都幾乎不可能做對**」。兩份官方報告與美國國會調查都是這個結論。\n\n### 推演題4 **[20 分鐘]** ★★★\n\n**設計題:** 你負責一個自動 failover 系統。請設計三道防線,讓它在「健康訊號錯誤」時不會像 MCAS 一樣把系統推下懸崖。每道防線寫清楚它擋住哪一層孔洞、以及它的**代價**(因為每道防線都有代價,沒有免費的安全)。\n\n#### 推演解答\n\n對應 MCAS 缺的三層,給三道防線:\n\n1. **多源交叉驗證 + 分歧即保守(對應 F10 單一感測器)。** failover 決策需要 ≥2 個獨立來源(不同探測路徑/網段)達成共識;分歧時不切換,只升級告警。**代價:** 多源探測增加複雜度與成本;「分歧時不動」會讓某些真實故障的 failover 變慢——你用「反應變慢」換「不會被單一壞訊號騙」。這個取捨要明確寫下來,而不是默默選了「快」。\n\n2. **動作上限 + 熔斷(對應 F4 放大的權限)。** 限制單位時間內自動切換/殺 pod/縮容的次數與幅度;超過閾值就**停止自動動作、轉人工**(circuit breaker)。**代價:** 真有大規模故障需要快速大量切換時,熔斷可能擋住合法的激烈動作——所以閾值要基於真實流量校準,且熔斷後要有快速的人工放行通道。這道防線正是 MCAS 缺的「累積煞車」。\n\n3. **可見性 + 可演練的 kill switch(對應 F5/F11 對操作員隱藏)。** 每次自動動作產生一條醒目的 event,on-call dashboard 上有「自動機制正在動作」的明確標記;並提供一個**真的被定期演練過**的手動停用開關。**代價:** 演練要花時間、要排進 on-call 輪值;但 Ethiopian 302 告訴你,沒在最壞情境下演練過的「救命程序」,真到那天可能轉不動那個輪子。chaos drill 不是奢侈品。\n\n加分討論:這三道防線其實就是 ch22 韌性工程的預演——把「安全地壞」拆成多源、熔斷、可見+可演練。每一道都在用某種代價(變慢/複雜/演練成本)換「不會被單點訊號錯誤一路放大成全域災難」。沒有免費的韌性。\n\n## 自我檢核\n\n口頭回答,講得出來才算過關:\n\n1. 為什麼說 MCAS 不是「防失速系統」很重要?如果你以為它是緊急保護機制,你會對「它偶爾出包」抱持什麼錯誤的寬容?\n2. 那個壞掉的攻角感測器,為什麼**不是**這場災難的根因,只是觸發?把感測器故障稱為「根因」會讓你錯過哪一層?\n3. 列出至少三層**各自獨立**的防禦,並說明每一層為什麼沒擋住。如果其中任何一層守住了,結果會怎樣?\n4. 為什麼 Ethiopian 302 的機組「做對了」(切 cutout)卻還是摔了?這對「知道程序就安全」這個假設說了什麼?\n5. 0.6° 暗中放大到 2.5°、且可無限重複——這個「權限放大」在你的系統裡對應什麼?(提示:某個調參 PR。)為什麼這種放大特別危險?\n6. 如果不把 MCAS 從飛行手冊移除(也就是不對操作員隱藏),Lion Air 610 的機組最可能在哪一步就把它擋下來?這對你系統裡「沒人記得它存在的自動機制」意味著什麼?\n7. 「外國飛行員技術差」這個說法,為什麼不只是不公平,而且是**危險的**?(提示:它讓你停止追問系統問題。)\n\n## 延伸閱讀\n\n- **印尼 KNKT/NTSC,Lion Air JT610 最終報告(2019-10)** — 一手調查報告,列出九項 contributing factors,是「多重失效合謀、非單一根因」的範本。讀它的 contributing factors 清單,對照本章的起司孔洞表。<http://knkt.go.id/Repo/Files/Laporan/Penerbangan/2018/2018%20-%20035%20-%20PK-LQP%20Final%20Report.pdf>\n- **美國眾議院運輸委員會,737 MAX 調查最終報告(2020-09)** — 組織線的權威來源,把 ODA 自我取證制度的失靈講透;讀它你會明白「失靈的取證制度」這層孔洞怎麼形成。<https://transportation.house.gov/imo/media/doc/2020.09.15%20FINAL%20737%20MAX%20Report%20for%20Public%20Release.pdf>\n- **FAA,737 MAX Return to Service 摘要** — 監管方視角的復飛條件,看 MCAS 最終被改成什麼樣(雙 AoA 比對、分歧停用)——也就是推演題2 的答案被官方採納。<https://www.faa.gov/sites/faa.gov/files/2022-08/737_RTS_Summary.pdf>\n- **The Seattle Times, \"Pilots struggled against Boeing's 737 MAX control system\"** — 從黑盒子資料還原 Lion Air 機組與 MCAS 拉鋸約 26 次的過程,讓你具體感受「跟看不見的對手搏鬥」是什麼意思。<https://www.seattletimes.com/business/boeing-aerospace/black-box-data-reveals-lion-air-pilots-struggle-against-boeings-737-max-flight-control-system/>\n- **FlightGlobal, \"Ethiopian crew struggled with manual trim at overspeed\"** — 講清楚高速下手動配平輪為何轉不動、機組為何被逼重啟電動配平,是破除「他們知道 MCAS 卻還是摔=技術問題」迷思的關鍵技術細節。<https://www.flightglobal.com/safety/ethiopian-crew-struggled-with-manual-trim-at-overspeed/132197.article>\n"}, {"id": "ch05-air-france-447", "file": "ch05-air-france-447.md", "group": "Part II — 安全系統即兇手", "title": "ch05 — 法航 447：自動駕駛交還控制權的那一刻", "md": "# ch05 — 法航 447：自動駕駛交還控制權的那一刻\n\n> **本章解剖什麼**：這是「安全系統即兇手」這個 Part 的第二案。上一章（見 ch04）的 MCAS 是自動化**主動**把飛機推下去；這一章相反——自動駕駛在最糟的時刻**放手不幹了**，把一架其實還能飛的好飛機，丟回給一群瞬間失去狀況意識的機組。主打 F5（自動化的諷刺）、F9（介面與假設的縫）、F11（監控盲區：該叫的警報叫了、又在最不該停的時候停了）。它跟 ch04 合起來講同一件事：你蓋來保護操作員的自動化，拿走的往往正是他出事時最需要的那一塊。下一章（見 ch06）會把「人與機器各執一詞」推到極端——當塔台與防撞系統下達相反指令。\n\n## 從你已知的出發\n\n你寫過那套全團隊在用的多層 cache library：in-memory 打不到就退 S3，S3 也不行就退 local，每一層壞掉都有下一層接住。這是漂亮的 graceful degradation。但我想問你一個你大概沒寫進文件的問題：**當所有層都退完、最後退到「拋給呼叫端自己處理」的那一刻，呼叫端真的知道該怎麼辦嗎？**\n\n平時不知道也沒關係，因為平時輪不到它。你的 autoscaling 平時自動扛流量尖峰，你的自動 failover 平時自動把流量切到健康的 replica，你根本不用半夜爬起來手動 drain 一個節點。這正是自動化的好處：它讓「手動接管」這件事變成一種**你幾乎從不練習的肌肉**。\n\n然後某天凌晨兩點，自動化遇到一個它沒被設計來處理的輸入——一個 NaN、一個它判定「我也不確定現在是什麼狀況」的訊號——於是它做了設計上最「安全」的事：**它脫手了，把控制權交還給人。** 警報響起。值班的人睡眼惺忪地接過一個他三年沒手動碰過的系統，面對一堆互相矛盾的儀表，腦中第一個閃過的念頭——很可能是錯的。\n\n法航 447 就是這個形狀，放大到最致命的版本。一架 Airbus A330，巡航在三萬五千呎的大西洋上空，深夜，亂流，三具皮托管同時結冰。自動駕駛照設計脫離，把飛機交還給機組。皮托管一分鐘後就解凍了，飛機從頭到尾都還能飛——但那一分鐘的混亂，已經足以讓接手的人把一架好端端的飛機，用四分鐘拉成失速、墜進海裡。228 條人命（216 名乘客＋12 名機組，BEA 最終報告 2012-07-05）。\n\n讀這一章，請把自己放在那個值班的人的位置，而不是事後看 dashboard 的你。\n\n## 冷開場：凌晨兩點十分，大西洋上空\n\n2009 年 6 月 1 日，UTC 凌晨。AF447 從里約飛巴黎，A330-203，註冊 F-GZCP，巡航於 FL350（約 35,000 呎）。機長 Marc Dubois 剛離開駕駛艙去休息——這是長程航班的標準排班——留下兩名副駕：坐右座負責操縱的 Pierre-Cédric Bonin(PF,pilot flying)，和坐左座的 David Robert(PM,pilot monitoring）。飛機正穿越赤道輻合帶（ITCZ)，那一帶夜裡常有發展旺盛的雷雨胞，他們已經繞了一些。\n\n02:10:04 左右，事情開始。\n\n三具皮托管——Thales 型，**業界已知這型在高空冰晶環境會短暫結冰**——同時被冰晶阻塞。皮托管量的是空速；一旦它的進氣口被冰封，量出來的空速就會瞬間掉到不合理的低值。三具一起出錯，飛控電腦失去了一個它賴以運作的關鍵輸入。\n\n接下來這一秒，是這整場災難真正的「裝填完成」時刻：**autopilot 與 autothrust 依設計自動斷開。** 駕駛艙響起 cavalry charge（自駕脫離的警告音），飛控律法從 normal law 降級為 alternate law。\n\n對非飛行員的你，這句話需要翻譯。\n\n## 裝填：被自動化養出來的肌肉萎縮\n\nAirbus 的飛控有個招牌設計叫 **flight envelope protection（飛行包絡保護）**。在 normal law 下，無論飛行員怎麼操作，電腦都不會讓飛機飛出安全包絡——你想拉到失速?電腦不准。你想超速?電腦不准。這是極好的安全網，也意味著：**在 normal law 下開了幾千小時的飛行員，可能從來沒有真正體驗過「把飛機拉到接近失速」是什麼感覺，因為電腦從不讓他靠近那條線。**\n\n問題在於，當空速資料變得不可靠，電腦無法再保證包絡保護的正確性，於是它降級到 **alternate law**——**保護沒了。** 現在飛行員的側杆輸入會被忠實執行，包括足以把飛機拉進失速的輸入。\n\n把這翻成你的語言：這就像一個 framework 平時用 runtime validation 幫你擋掉所有非法狀態轉換，讓你的 application code 從來不需要自己檢查邊界。然後某天，validation layer 偵測到「輸入資料我信不過」，於是它**默默關掉了所有 guard**，把原始的、未經保護的控制權交還給一段從來沒處理過 unguarded 狀態的 code——而那段 code 的作者，壓根不知道 guard 已經關了。\n\n這就是 F5 自動化的諷刺，Bainbridge 在 1983 年就點破：**你越是用自動化接管常規操作，操作員就越少有機會練習；而你留給人類的，恰恰是自動化搞不定的那些罕見、困難、高壓的場景——也就是他最沒準備好的那些。** 自動化不是減輕了人的負擔，它是把人的工作從「常規駕駛」偷換成「在最糟的時刻接管一個退化的系統」，而且還順手抽走了他練習的機會。\n\n另外兩個潛伏條件，這時也已經裝填好：\n\n- **沒有迎角（AoA）的直接顯示。** A330 的駕駛艙不直接顯示攻角（angle of attack)——也就是機翼相對氣流的角度，失速與否的唯一決定性指標。飛行員只能從空速、姿態、爬升率去**推斷**。當空速本身不可靠時，他失去了最直接的線索，而那個最關鍵的數字，儀表板上根本沒有。\n- **側杆不互聯（no sidestick coupling）。** Airbus 的左右兩根側杆機械上不連動。波音的駕駛盤是連動的——副駕拉，機長能在自己手裡感覺到。Airbus 不行：Robert 的側杆不會因為 Bonin 在拉而跟著動。兩人各拉各的，電腦取兩者的代數和，但沒有任何**體感**告訴對方「你旁邊這位正在做什麼」。\n\n這些條件，平時每一個都無害。它們在這個深夜，要對齊了。\n\n## 觸發：那一分鐘的不可靠空速\n\n02:10:05，自駕脫離的瞬間，Bonin 喊「I have the controls!」（我來操縱），然後——拉桿。\n\n這是整場災難的第一根稻草，也是最被誤解的一根。**很多人記得的版本是「皮托管結冰把飛機弄掉了」。這是錯的。** 照 BEA 報告：皮托管結冰只造成**約一分鐘**的空速不一致，期間飛機本身**仍然可以飛**；皮托管在約一分鐘後就解凍、空速讀數恢復正常。真正把飛機弄掉的，是接下來**長達四分鐘**的失速處置失敗。\n\n那 Bonin 為什麼一接手就拉桿爬升?事後看像是不可理喻，但把你放回那個座位：深夜、亂流、儀表突然一堆紅、警報亂響、你剛從 normal law 的舒適區被踹進 alternate law。在那個資訊量下，一個受過「遇到狀況先穩住、別掉高度」訓練的人，本能地想把機頭抬起來爭取一點高度餘裕——這個念頭在當下並非全無道理，只是**在這個特定情境下是致命的**。\n\n飛機從 FL350 開始爬升，衝向約 FL380(38,000 呎）。隨著機頭抬高、空速本就因高空而稀薄，攻角持續增大。\n\n02:10:40 左右，**第一次失速警告響起**——只響了約三秒。Bonin 沒當回事；在他的心智模型裡，儀表既然都不可靠，這個警告大概也是空速亂跳造成的假警報。他繼續拉。\n\n這就是 F11 監控盲區的第一層：**警報叫了，但操作員的心智模型已經把它歸類成噪音。** 你一定熟悉這個——一個半夜狂叫的 alarm，團隊早就學會「那個 alarm 不準，忽略它」，直到某天它叫的是真的。\n\n## 連鎖：那個在最不該停的時候停掉的警報\n\n接下來發生的事，是這整場災難裡最值得每一個工程師刻在腦子裡的一段。它是 F9（介面與假設的縫）與 F11（監控盲區）合謀出的、堪稱教科書級的反直覺陷阱。\n\n飛機在約 38,000 呎附近進入了**完全失速**：攻角一度超過 40 度，機翼徹底失去升力，飛機開始以高達約 10,000–11,000 ft/min(FDR 停止時約 10,912 ft/min）的速率下沉。注意：此時飛機是「機頭朝上、卻在往下掉」——攻角極大、空速極低。對沒受過高空失速訓練的人，這個姿態極度違反直覺：機頭明明是抬著的，怎麼會在掉高度?\n\n而失速警告系統的設計，在這裡狠狠補了一刀。\n\nA330 的失速警告依賴攻角感測器，而**攻角感測器在空速低於約 60 節時會被判定為無效**（低速下動壓不足，感測器讀數不可信，系統便把它當作「無效資料」丟棄）。失速進入深處後，飛機的指示空速掉到了這個門檻以下——於是系統判定「攻角資料無效」，**失速警告停止了。**\n\n現在，把這個邏輯跟飛行員的動作疊在一起看，你會起雞皮疙瘩：\n\n```\n   Bonin 拉桿(錯誤動作)\n        ↓\n   攻角極大、空速極低(<60 kt)\n        ↓\n   攻角資料判定無效 → 失速警告【停止】\n        ↓\n   飛行員感知:「我拉桿,警告就停 → 拉桿是對的?」\n        ↓\n   ───── 某時刻有人試著推頭(正確動作)─────\n        ↓\n   空速回到有效範圍(>60 kt)\n        ↓\n   攻角資料重新有效 → 失速警告【又響起】\n        ↓\n   飛行員感知:「我一推頭,警告就響 → 推頭是錯的?」→ 又拉回去\n        ↓\n   (回到第一步,惡性循環)\n\n   反直覺回饋:錯誤動作 → 警報變安靜;正確動作 → 警報變大聲\n```\n\n讀懂了嗎?**這套警報系統的回饋，把因果關係教反了。** 飛行員每次做出**正確**的改出動作（推頭、降低攻角），空速回到有效範圍，失速警告反而**響起**；每次做出**錯誤**的動作（繼續拉桿），攻角過大、空速掉到無效門檻以下，失速警告反而**停止**。\n\n一個焦慮工程師看到這個會立刻認出來：這是 F9——**子系統各自「正確」，對前提的假設卻不一致，縫就開在交界處。** 失速警告的設計前提是「低速無效資料應該丟棄，以免誤報」——這個前提在正常飛行包絡內完全合理。但在「深度失速、空速掉破 60 節」這個設計者沒認真想過的角落，這個合理前提產出了一個**主動誤導操作員**的訊號。沒有人寫了 bug。每個模組都照規格運作。縫開在「規格與規格之間」。\n\n順帶破除另一個流行迷思：**「失速警告一直響，他們卻不理」——這是反的。** 關鍵不是他們無視了持續的警告；關鍵是警告在最該響的時候停了、在最不該響的時候響，給出「拉桿→安靜、推頭→大叫」的致命回饋。\n\n與此同時，F5 與側杆不互聯也在發酵。某個時刻 Robert 意識到不對，喊「Controls to the left」（換我操縱），按下優先按鈕想接手推頭——但 Bonin 立刻按下自己的優先按鈕搶回控制權，繼續拉。兩人各拉各的，駕駛艙響起「dual input」警告，但因為側杆不連動，**沒有人從手感上知道對方在做相反的事。** 電腦默默把兩個輸入加總，合成出一個整體仍偏拉桿的結果。\n\n02:12 左右，機長 Dubois 回到駕駛艙，問了句「Er, what are you doing?」（呃，你們在幹嘛?）。但他從後方站著，看不到 Bonin 的側杆位置，也無法從滿艙的混亂裡立刻拼出「我們正在深度失速、而且有人一直在拉桿」這個全貌。三個受過良好訓練的飛行員，此刻共享著一個與現實脫節的世界模型——這正是 F11 的本質：**他們看到的世界，和真實的世界，已經分岔了。**\n\n## 餘波\n\n飛機從約 38,000 呎，以接近垂直的姿態、機頭朝上、攻角超過 40 度，一路掉了約三分半鐘。最後階段，Dubois 似乎隱約意識到該推頭，但已經太低、太晚。GPWS（近地警告）反覆喊「PULL UP! PULL UP!」。02:14 左右，飛機以約 107 節的前進空速、約 11,000 ft/min 的下沉率，幾乎水平地拍進大西洋。機上 228 人全數罹難。\n\n殘骸與兩具黑盒子在海底躺了將近兩年才被打撈起來（2011 年 5 月）。BEA 的最終報告 2012 年才出爐。報告的結論值得逐字記住：這場事故源於「**技術因素（皮托管結冰致空速不一致）＋人因（機組在 alternate law 下的不當輸入與未辨識失速）**」的組合，並深入批評了**自動化交接的設計、反直覺的失速警告邏輯、以及機組高空手飛與失速改出訓練的不足**。\n\n換句話說：這不是「兩個笨副駕摔了飛機」。這是一個系統，在最糟的時刻把一架退化的飛機交還給沒準備好的人，然後用一套教反了因果的警報，把他往錯誤的方向推。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**潛伏條件（早就裝填好的）**：\n\n1. Thales 皮托管已知在高空冰晶環境會結冰，改裝在進行中，但 EASA 未列為強制，事故機尚未更換。\n2. 自動化交接的設計：autopilot 在資料一不可靠時就自動斷開，把一架夜間、高空、亂流中的飛機瞬間丟回人手，且駕駛艙**無攻角直接顯示**。\n3. 失速警告的低速無效邏輯——一個在正常包絡內合理、在深度失速時致命的前提假設。\n4. 飛行包絡保護養出的肌肉萎縮：機組長期在 normal law 下飛，缺乏高空手動操縱與不可靠空速/失速改出的充分訓練（F5）。\n5. 側杆不互聯：兩名副駕無法從體感得知對方的輸入。\n\n**觸發（最後那根稻草）**：三具皮托管同時結冰，造成**約一分鐘**的空速不一致——一個本身完全可恢復、飛機仍可飛的暫態。它沒有弄掉飛機；它只是按下了「把控制權交還給人」這個開關，而那一分鐘的混亂，啟動了後面四分鐘的失速處置失敗。\n\n### 起司的孔洞\n\n| 防禦層 | 本應擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 皮托管改裝 | 結冰造成的空速失效 | 已知問題、改裝進行中，但未列強制，該機尚未更換（F8 潛伏） |\n| 自動化交接設計 | 平順把控制權還給人 | 在最糟時刻自動斷開、降級到無保護的 alternate law，且無攻角顯示（F5/F9) |\n| 失速警告 | 告訴機組「你在失速」 | 攻角太高→空速無效→警告**停**；推頭→空速有效→警告**響**。回饋教反了因果（F9/F11) |\n| 機組訓練 | 辨識並改出高空失速 | 缺乏不可靠空速與高空手飛的充分訓練，沒練過 normal law 之外的世界（F5) |\n| CRM/協調（雙人交叉檢查） | 一人錯了另一人攔下 | 側杆不互聯+dual input 不被體感察覺，情境覺察集體崩潰（F11) |\n\n任何**一層**擋住，228 人就還在。皮托管若已換，觸發不會發生；若有攻角顯示，機組能直接看出失速；若失速警告邏輯不在深度失速時靜默，回饋就不會教反；若機組受過高空失速改出訓練，推頭的本能會壓過拉桿；若兩人能感知彼此的輸入，Robert 的正確推頭不會被默默抵銷。**五層，每一層都有洞，那一夜恰好連成一線。** 這就是為什麼「純粹飛行員失誤」是一個不完整、且有害的結論——它把問題收束到兩個已經無法為自己辯護的人身上，然後讓設計與訓練的孔洞全身而退，等著下一次對齊。\n\n### 對應模式\n\n- **F5（自動化的諷刺）** — 主打。飛行包絡保護平時拿走了機組練習邊界操縱的機會；出事時自動化脫手，把一個他最沒準備好的爛攤子在最糟時刻丟回給他。Bainbridge 1983 的預言精確命中。\n- **F9（介面與假設的縫）** — 主打。失速警告的「低速無效資料丟棄」前提，與「深度失速時空速本就極低」的物理現實之間，開了一道致命的縫；沒有任何模組壞掉，縫開在規格之間。\n- **F11（監控盲區）** — 主打。該叫的警報先被當噪音（第一次三秒警告），再在最該響時靜默、最不該響時響起；加上無攻角顯示與側杆不互聯，機組看到的世界與真實世界徹底分岔。\n- **F8（潛伏條件）** — 皮托管已知缺陷未強制改裝，是早就裝填好的雷管。\n- **F3（起司孔洞對齊）** — 五層防禦各有洞，平時錯開，那夜連線。\n\n一句話總結：**這場災難的形狀是——自動化在最糟的時刻把一架其實還能飛的飛機，連同一套教反了因果的警報，交還給一群被它親手養到沒準備好的人。**\n\n## 換成你的系統\n\n你的 autoscaling 與自動 failover，就是法航 447 的自動駕駛。\n\n來點名一個你「應該沒事吧」的假設：**「自動 failover 會處理掉節點故障，所以我們不需要常常演練手動接管。」**\n\n這個假設在 99% 的時間是對的——這正是它危險的地方。自動化每一次默默接住故障，都在做兩件事：一是讓系統更可靠，二是讓你的團隊更不會手動接管。第二件事是隱形的、累積的、沒有任何 alarm 會告訴你的。等到自動化遇到一個它沒被設計來處理的場景而脫手——一個它判定「我也搞不清楚現在是什麼狀況」的退化模式——它會把控制權交還給一個三年沒手動 drain 過節點、不確定 runbook 還準不準、半夜被 call 起來腦子還沒開機的值班工程師。那一刻，你的系統就是 AF447 的駕駛艙。\n\n更糟的是，問問你自己：**當自動化脫手的時候，它有沒有清楚地告訴值班的人「我現在處於降級模式、保護已經關掉、你接手的是一個 unguarded 的系統」?** 還是它只是默默把一個 exception 往上拋，而呼叫端（那個睡眼惺忪的人）以為自己接手的還是平常那個有護欄的系統?AF447 的 alternate law 切換，飛行員未必在那一秒就完全內化「我現在沒有包絡保護了」。你的 graceful degradation，有沒有同樣的問題——退到下一層時，**呼叫端知道自己正在降級模式裡操作嗎，還是它的心智模型停留在「一切正常」?**\n\n還有那個失速警告的教訓，直指你的 observability:**你的告警，在系統最壞的時候，是變得更吵還是更安靜?** 一個常見的反模式：當下游徹底掛掉，健康檢查收不到任何回應，於是監控判定「無資料」並把該指標標成「unknown / 灰色」而不是「critical / 紅色」——於是在系統最該尖叫的時刻，dashboard 反而一片祥和的灰。這就是 AF447 的失速警告：**最嚴重的失效，長得最像沒有失效。** 你的 alarm 規則裡，有沒有「資料缺失」被當成「沒問題」而非「最大的問題」的角落?\n\n一個可操作的自問，寫進你下次 game day 的清單：**選一個平時全自動、真出事要人工接管的流程（自動 failover、自動 rollback、cache 退到最底層），刻意讓自動化「脫手」，然後看你的團隊——不是看 runbook——能不能在沒有護欄的狀態下把它接住。** 上一次演練是什麼時候?如果答案是「沒演練過」或「一年多前」，那塊肌肉已經萎縮了，而你還不知道。\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★\n\n不看書，對另一個工程師口頭重講 AF447 的因果鏈，而且必須在開頭就破除這個流行說法：「皮托管結冰把飛機弄掉了。」你要講清楚：皮托管結冰造成了什麼（時間多長、後果多大）、它**沒有**造成什麼、以及真正把飛機弄掉的是後面哪四分鐘的什麼。\n\n#### 推演解答\n\n皮托管結冰造成的是：約**一分鐘**的空速不一致，以及——關鍵——**autopilot/autothrust 自動斷開、飛控降級為 alternate law（失去包絡保護）**。它**沒有**造成的是：飛機失控、飛機無法飛。皮托管約一分鐘後就解凍、空速恢復正常，飛機全程在氣動上都是可飛的。真正弄掉飛機的是接下來約四分鐘的失速處置失敗：PF 在接手瞬間持續拉桿，把飛機從 FL350 拉升到約 FL380 並進入深度失速（攻角>40°)，以約 10,000–11,000 ft/min 下沉直到撞海。\n\n若你只能講一句，講這句：**觸發是一分鐘的可恢復暫態，災難是四分鐘的失速處置失敗——把它記成「皮托管害的」就學錯了教訓，因為真正的兇手是自動化交接的設計、教反因果的失速警告、和沒練過這個場景的機組。**\n\n### 推演題2 [25 分鐘] ★★★\n\n反事實。失速警告系統的設計是：當空速低於約 60 節判定攻角資料無效、停止警告（以避免低速時誤報）。假設我們**移除這個無效判定**——只要攻角超過失速門檻就持續報警，不管空速多低。這個改動會不會救回 AF447?它會引進什麼新的失敗模式?（這正是 BEA 在報告前撤回了一條相關安全建議所引發的爭議。）\n\n#### 推演解答\n\n**可能有幫助，但遠非萬靈丹，而且會引進新風險——這題的價值在於體會「沒有免費的安全」。**\n\n正面：若警告在深度失速全程持續響、不再因低速而靜默，就消除了「推頭→警告響、拉桿→警告停」那個教反因果的致命回饋。機組至少不會收到「拉桿是對的」這個錯誤強化。\n\n但要冷靜：（1) 第一次三秒警告 Bonin 就當噪音忽略了，說明**持續報警未必能穿透一個已經把警報歸類成假訊號的心智模型**——警報吵不代表被聽進去。（2) 移除無效判定會引進新失敗模式：低速下攻角感測器讀數本就不可信，持續採信它可能在**其他**情境（如地面、極低速、感測器真的壞了）製造**誤報**，而誤報多了又會訓練機組去無視警報——繞回 F11。這正是 BEA 撤回該安全建議引發疑慮的原因：在「漏報致命失速」與「低速誤報訓練出無視」之間，沒有一個乾淨的設計點。\n\n教訓：這是 F9 的本質——你不是在修一個 bug，你是在兩個各自合理的前提（低速資料不可信 vs 失速必須報警）之間移動一道縫；移動它，縫只是換個地方開。對你的系統：當你想用「持續告警」取代「資料缺失時靜默」，先問你會不會因此製造出一堆假警報、最終訓練團隊去忽略它。\n\n### 推演題3 [20 分鐘] ★★\n\n對帳。挑一個你維運過的「平時全自動、真出事要人工接管」的機制（自動 failover、HPA 自動擴縮、cache 多層退化、自動 rollback…)，把它對應到 AF447 的失敗形狀，逐項回答：（a) 自動化在什麼條件下會「脫手」?(b) 脫手時，值班的人收到的訊號**清楚地說明「現在是降級模式、沒護欄了」嗎**，還是只是一個普通 exception?(c) 接手的人上一次演練這個手動流程是多久以前?\n\n#### 推演解答\n\n（此題無標準答案，目的是逼出你自己系統裡的潛伏條件。）一個好的對帳會長這樣：以「自動 failover 到備援 region」為例——(a) 脫手條件：主 region 健康檢查連續失敗 N 次，或自動化偵測到「分裂腦」這類它判定無法自動仲裁的狀態，於是停下來等人決策。（b) 訊號清晰度：這是最常見的洞——告警往往只說「failover triggered」或丟個 stack trace,**沒說「你現在跑在降級拓撲上、跨 region 寫入沒有平時的一致性保證、請手動操作」**。這就是 alternate law 沒被內化的工程版。（c) 演練頻率：如果你誠實的答案是「正式環境從沒演練過，只在文件裡寫過」，那你的機組訓練孔洞跟 AF447 是同一個——而且你比他們幸運的地方只在於你的系統還沒遇到那個觸發。把「補上清晰的降級告警」和「排一次 game day」寫進你的 action items，然後（呼應 ch15）真的去確認它有被落實，別讓它在 backlog 裡腐爛。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 皮托管結冰實際造成了多大、多久的問題?為什麼說「皮托管害死他們」是學錯了教訓?\n2. 什麼是「自動化的諷刺」（F5)?用 AF447 說明：自動化平時拿走了機組的什麼，出事時又把什麼丟回給他們?\n3. 失速警告為什麼在最該響的時候停、最不該響的時候響?這個「教反因果」的回饋，根因在哪兩個各自合理的前提之間（F9)?\n4. 列出至少四層各自獨立的防禦，以及每一層為什麼沒擋住。為什麼「純粹飛行員失誤」是不完整且有害的結論?\n5. normal law 與 alternate law 的差別是什麼?為什麼「降級到無保護模式」本身就是一個危險的交接時刻?\n6. 側杆不互聯與無攻角顯示，各自如何貢獻了機組的「世界模型與現實分岔」（F11)?\n7. 在你自己的系統裡：當自動化脫手、把控制權交還給人，值班的人**知道自己正在降級模式裡操作嗎**?還是他的心智模型停留在「一切正常」?\n8. 你的告警，在系統最壞的時候是變吵還是變安靜?有沒有「資料缺失」被當成「沒問題」而不是「最大的問題」的角落?\n\n## 延伸閱讀\n\n- **BEA 最終報告**（法國航空事故調查局）,*Final Report on the accident on 1st June 2009 to the Airbus A330-203 registered F-GZCP operated by Air France flight AF447*,2012-07-05:https://bea.aero/en/investigation-reports/notified-events/detail/accident-to-the-airbus-a330-203-registered-f-gzcp-and-operated-by-air-france-on-01-06-2009/ — 一手權威。要讀就讀調查報告本身對「自動化交接、警告邏輯、訓練」的批評，而不是二手的「飛行員失誤」標題。\n- Lisanne Bainbridge, \"Ironies of Automation,\" *Automatica*, 1983 — F5 的原典。1983 年就精確預言了 AF447 的形狀：你越自動化常規操作，就越剝奪操作員應付異常的能力與練習。短、深、必讀。\n- William Langewiesche, \"The Human Factor,\" *Vanity Fair*, 2014 — 對 AF447 駕駛艙人因與 Airbus 飛控哲學最好的長篇敘事之一；對「自動化如何重塑（並侵蝕）飛行員技能」寫得克制而透徹。\n- （對照閱讀）本書 ch04 的 737 MAX 與 ch06 的于伯林根相撞——把「自動化主動傷人 / 自動化脫手傷人 / 人與機器各執一詞」三種形狀並排，你會看清「安全系統即兇手」這個 Part 的完整輪廓。\n"}, {"id": "ch06-uberlingen", "file": "ch06-uberlingen.md", "group": "Part II — 安全系統即兇手", "title": "ch06 — 于伯林根空中相撞：當塔台與防撞系統下達相反指令", "md": "# ch06 — 于伯林根空中相撞：當塔台與防撞系統下達相反指令\n\n> **本章解剖什麼**：這是「安全系統即兇手」這個 Part 的收尾案。前兩章的衝突發生在「人 vs 一個自動系統」之間——MCAS 主動把飛機推下去（見 ch04）、自駕在最糟時刻放手交還給人（見 ch05）。這一章把矛盾推到極端：**兩個都「對」的權威，對同一個狀態下達了完全相反的指令**——地面的人類管制員叫一架飛機下降，它機上的自動防撞系統 TCAS 同時叫它爬升。飛行員只能選一個，而當年沒有任何規章告訴他該選哪個。主打 F2（互動複雜度：兩套各自正確的子系統交互出設計者沒想到的結果）、F11（監控降級：該叫的告警被關掉、被淹沒）、F5（自動化的諷刺：人與機器的權威之爭）、F13（生產壓力／人力不足）、F3（起司孔洞對齊）。這場災難最該被校正的迷思是「是俄國機組不守 TCAS 的錯」——本章會說清楚，兩台 TCAS 都完美運作、互補地一升一降，崩掉的是它們外面那一整圈系統。\n\n## 從你已知的出發\n\n你做過 setTimeout 改 cron job queue 的那次重寫——讓排程訊息撐過行程重啟。你之所以動手，是因為你知道一件事：**當兩套機制對「現在該做什麼」有不同看法時，系統需要一個明確的裁決者。** 排程到底以記憶體裡的 timer 為準，還是以佇列裡的訊息為準？你不能讓兩邊各跑各的，否則重啟那一刻就是兩個事實打架。\n\n現在把場景換掉。你維運的某個服務出狀況，你決定手動把一個節點從 load balancer 上摘掉（cordon），讓它停止接流量、你好上去查。你下了 `kubectl cordon`，甚至 drain 了它。然後你轉頭去看 log——三十秒後，那個節點上的 pod 又活蹦亂跳地起來了。\n\n為什麼？因為某個你忘了它存在的東西，跟你想法相反。也許是 HPA 看到整體 CPU 高，硬是把 replica 拉回來；也許是某個 operator 認定「desired state 是這個節點要有 pod」，於是它跟你的手動操作對著幹。你以為你是唯一的權威，但系統裡還有另一個自動的權威，它對「這個節點該不該跑東西」有自己的、跟你相反的結論——而**沒有人明確規定過，你們倆衝突時誰贏。**\n\n這就是于伯林根的形狀，放大到 71 條人命。兩個權威——一個是地面的人類管制員，一個是機上的自動防撞系統——對「這架飛機現在該爬升還是下降」給出了相反的答案。沒有規則說誰優先。飛行員賭錯了那一邊。\n\n讀這一章，請把自己放在那個必須在幾秒內二選一的飛行員座位上，而不是事後在白板上畫優先權規則的你。\n\n## 冷開場：康士坦茲湖上空，午夜前的兩分鐘\n\n2002 年 7 月 1 日，當地時間將近午夜。德國南部康士坦茲湖（Bodensee）上空，FL360（約 36,000 呎）。\n\n兩架飛機，正以近乎垂直交會的航向，朝同一個點接近。\n\n一架是 Bashkirian Airlines（巴什克利安航空）2937 號班機，一架 Tupolev Tu-154M，註冊 RA-85816。機上 69 人，其中 60 名乘客裡有 46 名俄羅斯學童——他們從 Ufa 出發，正前往一趟 UNESCO 安排的暑假行程（71 死、46 名學童為多源一致，BFU 報告）。另一架是 DHL 611 號班機，一架 Boeing 757-23APF 貨機，註冊 A9C-DHL，機上只有兩名機組。\n\n這片空域歸瑞士 Skyguide 的 Zürich 管制區管。當晚負責的，是管制員 Peter Nielsen。\n\n此刻，這兩架飛機的命運取決於一連串「平時各自無害」的條件，它們已經在過去幾個小時裡，一個一個悄悄對齊。\n\n## 裝填：一個人，兩張桌子，半套設備\n\n要看懂這場災難，得先看清楚 Nielsen 那一晚被放進了什麼樣的處境。**他不是失職，他是被放進了一個不可能贏的局。**\n\n第一個潛伏條件：**那一晚他一個人管兩個席位。** Skyguide 的夜間慣例容許單一管制員同時操作兩個工作席（two workstations），另一名值班管制員去休息室休息。這在低流量的深夜「通常沒事」——直到流量不再低、直到兩席同時都有狀況。當晚 Nielsen 同時在處理另一個席位上一架要降落 Friedrichshafen 的飛機，注意力被拆成兩半。**這是 F13：人力被削到剛好夠用，沒有任何餘裕。** 你應該很熟這種「on-call 一個人扛兩個 rotation」的安排——平時沒事，出事那晚剛好兩邊都炸。\n\n第二個潛伏條件：**主雷達系統被降級了。** 當晚 Skyguide 正在做夜間維護（sectorisation 相關作業），主系統被切到 fallback 模式。這帶來兩個致命後果：\n\n- 雷達資料有延遲，Nielsen 螢幕上看到的飛機位置，不是「現在」，而是「剛才」。\n- 更關鍵的——**短期衝突告警（STCA, Short-Term Conflict Alert）這層防護，對他失效了。** STCA 是地面端的自動防撞網：當兩架飛機間距即將不足，它會主動跳出來警告管制員。這正是用來補人眼疏漏的那層起司。但維護作業讓 Nielsen 工作席上的 STCA 視覺告警不可用，而他並不知道這層網已經破了。\n\n第三個潛伏條件：**電話系統不通。** 管制席之間、以及與鄰近管制中心之間的電話，當晚正在維修，打不通。這條後來會要命：德國 Karlsruhe 的管制中心**事實上已經察覺了這場即將發生的衝突，試圖打電話通知 Zürich**——但電話打不進去。一條本可救命的外部交叉檢查通道，被一次例行維護給切斷了，而被孤立的 Nielsen 對此一無所知。\n\n把這三條擺在一起看：**一個被削到只剩一人的監控者，看著延遲的世界，身上原本三層交叉檢查（同事、STCA、外部電話）同時被拿掉了兩層半。** 他不知道。他以為自己看到的是完整的世界。這是 F11 監控盲區最純粹的形式——**操作員看到的世界，與真實世界已經脫節，而他不知道自己脫節了。** 你的 FluentBit 看板上，有沒有一個你以為一直在跑、其實上週某次部署後就靜默掛掉的告警？\n\n而在那兩架飛機上，還有最後一個、也是本案核心的潛伏條件——它不在 Skyguide，在規章本身。\n\n## 裝填：兩個權威，沒有裁決者\n\n兩架飛機上都裝著 TCAS（Traffic Collision Avoidance System，空中防撞系統）。它的原理很乾淨：兩架裝了 TCAS 的飛機會透過 transponder 互相通訊、**協調出互補的解決方案**——一架被告知「爬升（climb）」，另一架就被告知「下降（descend）」，兩者朝相反方向錯開。這個協調是自動的，不需要人介入，也不依賴地面。它是完全獨立於管制員的、最後一道防撞網。\n\n注意這個設計的精妙：TCAS 之所以能避撞，前提是**兩機都遵循自己收到的那一道 RA（Resolution Advisory，解決建議）**。你爬我降，就錯開了；但若有一方不照做、甚至反著做，協調就破功了。TCAS 的整套安全保證，建立在「飛行員會遵循 RA」這個假設上。\n\n於是問題來了，而這是 2002 年那個時代規章裡的一個巨大的、沒人填的洞：\n\n**如果地面的管制員叫你做一件事，而機上的 TCAS 叫你做相反的事——你聽誰的？**\n\n當年的規章對此**並不明確**。沒有一條白紙黑字寫著「TCAS RA 必須優先於 ATC 指令」。更糟的是，不同航空文化對這個模糊地帶有不同的默認傾向——**部分機組（包含俄方的訓練傳統）傾向於以人類管制員的指令為最高權威**，因為幾十年來，管制員就是天空的最終裁決者，TCAS 不過是個新來的輔助小工具。\n\n把這翻成你的語言：你的系統裡有一個人類操作員可以下的手動 `cordon`，和一個自動 operator 維持的 desired state。它們對同一個節點該不該跑 pod 有相反的看法。而你的 runbook、你的 RBAC、你的 operator 邏輯裡——**有沒有任何一個地方，白紙黑字寫明「人工 override 期間，自動 reconcile 必須讓步」？** 如果沒有，那你就跟 2002 年的天空一樣，把「衝突時誰贏」這個最關鍵的決定，留給了出事那一刻、壓力最大的那個人去即興判斷。\n\n潛伏條件至此全部裝填完畢。觸發只需要兩架飛機飛到夠近。\n\n## 觸發：21:34:49，「下降到 FL350」\n\n接近午夜時，兩機已經逼近到危險的接近航向，同在 FL360。Nielsen 因為注意力被另一席拉走、加上雷達資料延遲，**太晚才發現**間距即將不足。\n\n當地時間 21:34:49（UTC 21:34:49），他對 Tu-154 下達指令：**加速下降到 FL350**，並提到有衝突的交通（BFU 報告；SKYbrary）。\n\n從 Nielsen 的視角，這是一個完全合理的避讓指令：把其中一架壓低一千呎，錯開高度。問題在於——他不知道 TCAS 即將（或已經）介入，而他叫 Tu-154 下降的方向，**恰好和 TCAS 即將給 Tu-154 的指令相反。**\n\nTu-154 機組開始遵照管制員的指令，推頭下降。\n\n然後，就在這幾秒之內，兩機的 TCAS 同時開口了：\n\n- Tu-154 的 TCAS 發出 RA：**「climb（爬升）」**\n- DHL 757 的 TCAS 發出 RA：**「descend（下降）」**\n\n兩台 TCAS 完美地協調出了互補解：一升一降。如果兩機都聽 TCAS，它們會乾淨地錯開。**TCAS 沒有任何故障，它做的正是它被設計來做的事。**\n\n但 Tu-154 的駕駛艙裡，此刻出現了那個沒有正解的二選一：**管制員剛叫我下降，TCAS 現在叫我爬升。聽誰的？**\n\n## 連鎖：兩個都選了「對」，於是一起墜下\n\n接下來的幾十秒，是這場災難真正的形狀。\n\n**DHL 機組依 TCAS 下降。** 757 收到「descend」，照做。機組也透過無線電報告了他們正在 TCAS 下降——但這通報告沒能改變另一邊的局面。\n\n**Tu-154 機組依管制員下降。** 面對矛盾，他們選擇了人類管制員——這在他們的訓練與當時的規章模糊下，**並不是一個明確錯誤的選擇**。他們繼續推頭下降，違背了自己 TCAS 的「climb」指令。\n\n於是致命的事情發生了：**兩架飛機都在下降。** 本該一升一降錯開的兩條軌跡，因為其中一架沒聽 TCAS，變成了兩條同時向下、依然對撞的軌跡。TCAS 苦心協調出的錯開方案，被人的選擇抵消掉了一半，結果比沒有 TCAS 還糟——它把兩機推進了同一塊正在下沉的空域。\n\n而 Nielsen，這時還蒙在鼓裡。**他不知道兩機的 TCAS 已經發出了 RA**（地面管制員當年無法得知機上的 RA 內容）。他看著延遲的雷達，**重複了一次對 Tu-154 的下降指令**，並給了關於 DHL 位置的、實際上錯誤的資訊——他以為把 Tu-154 壓下去是在避開衝突，事實上他正把它壓向 DHL。這一刻，三層破掉的起司全部現形：他沒有同事幫他看、STCA 沒在他眼前跳、Karlsruhe 的電話打不進來。他是一個被孤立的、看著錯誤世界的人，在做著他以為正確的事。\n\n地面端唯一還活著的那層告警，也來得太遲、也沒人接到：**21:35:00**，一個聲音式的 STCA 警告在另一個工作席（RE SUED）響起——距離相撞只剩 **32 秒**——當下沒有任何人聽到它（多源一致，含 BFU 周邊紀錄）。\n\n最後兩秒，Tu-154 機組似乎終於意識到不對，開始嘗試遵循 TCAS 拉升——但已經太遲。\n\n**21:35:32**，兩機在約 34,890 呎相撞（多源一致）。DHL 757 的垂直尾翼切入 Tu-154 的機身。71 人全數罹難，無一生還，其中包括那 46 名俄羅斯學童。\n\n## 餘波：把模糊變成規則\n\n這場災難最重要的遺產，不是追究誰的責任，而是**填掉那個沒人填的洞。**\n\n德國 BFU（Bundesstelle für Flugunfalluntersuchung，聯邦航空事故調查局）在 2004 年 5 月發布最終報告（*Investigation Report AX001-1-2/02*）。它**沒有**把主因歸到「俄國機組」。BFU 認定的主因是兩條並列的系統性缺陷：\n\n1. **Skyguide 管制端的多項缺失**——單人兼兩席、設備降級（雷達 fallback、STCA 不可用）、電話失效、太晚察覺衝突。\n2. **TCAS 使用程序的制度模糊**——當年規章未明確規定「RA 與 ATC 衝突時，RA 必須優先」，飛行員面對矛盾指令並無唯一正解。\n\n報告提出 19 項安全建議。而最關鍵的修正在事故之後迅速落地：**ICAO 於 2003 年 11 月修訂規章，明定 TCAS RA 優先於 ATC 指令。** 從此，全世界的飛行員都被明確告知：當塔台和 TCAS 打架，聽 TCAS。那個曾經要人在幾秒內即興判斷的二選一，被一條全域生效的優先權規則消滅了。\n\n這就是本案給工程師最乾淨的一課：**消除「兩個權威衝突」這類災難，靠的不是讓操作員更聰明，而是事先用一條明確、全域、無歧義的優先權規則，把二選一從現場移走。**\n\n還有一段不該被遺漏、也不該被當成奇觀的人性餘波：2004 年 2 月，喪妻失子於這場空難的 Vitaly Kaloyev，闖入 Peter Nielsen 的住處將他刺殺。**這是一樁私刑謀殺，不是任何司法或調查的結論。** Nielsen 是被放進「一人兩席、雷達降級、電話不通」這個不可能處境裡的人；把這場系統性災難的重量壓到一個被組織與設備孤立的個體身上，無論是用刀還是用一句「都是他失職」，都是同一種倒果為因。我們在這裡記下這件事，只為了提醒：**對「人為疏失」的執念，會傷到真實的人。**（這正是 ch02 講 blameless 文化的理由。）\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**早就裝填好的（latent）：**\n\n- Skyguide 容許夜間單人兼兩席——監控餘裕被吃掉。\n- 主雷達置於 fallback、STCA 對 Nielsen 工作席失效——交叉檢查網破了一層而他不知。\n- 管制席間與外部電話正維修——救命的外部告警通道被切斷。\n- 當年規章對「TCAS RA vs ATC 指令」優先權**未定義**——這是本案核心的潛伏洞。\n- 部分機組訓練文化傾向「以管制員為最高權威」，與 TCAS「RA 應被遵循」的設計前提相左。\n\n**最後那根稻草（trigger）：** 兩機飛到危險接近，Nielsen 太晚發現、下達了一個與 TCAS 即將給出的方向相反的下降指令。**觸發本身（一次例行的避讓指令）並不離奇；離奇的是它撞上了一整排早就對齊的洞。**\n\n### 起司的孔洞清單\n\n| 防禦層 | 本該擋住什麼 | 為什麼那晚沒擋住 |\n|---|---|---|\n| 第二名管制員 | 交叉監看、分攤負荷 | 夜間慣例允許其去休息，一人兼兩席 |\n| 主雷達（即時、精確） | 讓管制員及早看到接近 | 維護中切到 fallback，資料延遲 |\n| STCA 地面衝突告警 | 自動提醒管制員間距不足 | 維護使視覺 STCA 對該席失效；唯一響起的聲音 STCA 在別席、無人聽到 |\n| 鄰近中心電話通報 | Karlsruhe 可外部示警 | 電話系統維修中，打不進來 |\n| TCAS（兩機協調 RA） | 自動互補錯開（一升一降） | **沒壞**——它正確運作，但被「人選擇不遵循」抵消 |\n| 規章的優先權規則 | 告訴飛行員衝突時聽誰 | **不存在**——RA vs ATC 優先權當年未定義 |\n\n請看清楚這張表的重點：**沒有任何一個「罪魁禍首」。** 拿掉其中任何一層的破洞——多一名管制員、雷達正常、STCA 有效、電話打得通、或規章早已寫明 RA 優先——這 71 人多半都還活著。災難需要的是**全部對齊**。這正是 F3 起司孔洞對齊，也是本書反覆要破的「單一根因」迷思：問「是誰的錯」是錯的問法；要問的是「**為什麼這麼多層防禦，那一晚剛好全破在同一條線上**」。\n\n### 對應的失敗模式\n\n- **F2 互動複雜度**：兩套各自正確的子系統——人類管制員的避讓邏輯與 TCAS 的協調邏輯——交互出了設計者沒料到的結果（兩機同向下降）。沒有任何一方「錯」，是它們的**交互**製造了災難。\n- **F11 監控盲區**：Nielsen 看到的世界（延遲雷達、無 STCA、無電話）與真實世界脫節，且他不知脫節；該叫的告警被關掉或在無人處響起。\n- **F5 自動化的諷刺／權威之爭**：把 TCAS 這個自動權威疊到人類權威之上，卻沒講清楚誰說了算——自動化不但沒解決問題，還製造了一個全新的、致命的二選一。\n- **F13 生產壓力／人力不足**：用單人兼兩席的排班把監控者削到沒有餘裕。\n- **F3 起司孔洞對齊**：上面那張表就是它本身。\n\n### 這場災難的形狀是\n\n**這場災難的形狀是：兩個各自正確的權威，對同一個狀態給出相反的指令，而沒有任何規則規定衝突時誰優先——於是裁決的重擔落到一個被孤立、被削減、看著延遲世界的人身上，他在幾秒內賭了一邊，賭錯了。**\n\n## 換成你的系統\n\n你最該被點名的「應該沒事吧」是這一句：**「手動操作當然比自動的優先啊，這還用說？」**\n\n不，這從來不是不言自明的。它必須被寫下來、被機器強制執行，否則它就只是你腦中的一廂情願。回到那個 `kubectl cordon` 被自動拉回來的場景——那一刻，你的手（人類權威）和 operator 的 reconcile loop（自動權威）對「這個節點該不該有 pod」給出了相反指令，而 Kubernetes **預設不會替你裁決誰優先**：cordon 只擋新調度，擋不住一個堅持把 replica 拉回來的 controller；你以為的「override」根本沒有 override 到那一層。這就是 RA 與 ATC 沒有優先權規則的後端版本。\n\n它藏在很多地方，列幾個讓你今晚睡不好的：\n\n- **手動 scale 對上 HPA。** 你手動 `kubectl scale` 把 replica 設成 2 想止血，HPA 三十秒後依 metric 把它拉回 10。誰贏？預設是 HPA。你的「手動」是個沒有牙齒的權威。\n- **手動把 instance 移出 target group 對上 ASG 的 desired count。** 你摘掉一台壞掉的 instance，Auto Scaling Group 發現數量少了，又補一台一模一樣（同樣壞）的回來。\n- **你的多層 cache 的手動 invalidate 對上自動回填。** 你手動清掉一個你知道是髒的 key，某個背景 job 立刻用同樣髒的來源把它回填回去。\n- **feature flag 的手動 kill 對上自動部署回滾到舊設定。** 你手動關掉一個出問題的 flag，下一次 config 自動同步又把它打開。\n\n每一個案例的共通結構都和于伯林根一模一樣：**兩個權威、同一個狀態、相反的意圖、未定義的優先權。** 而且——這是 F11 的部分——出事時，你跟 Nielsen 一樣，很可能在看一個延遲的、不完整的世界（你的 dashboard 是十五秒前的快取，你以為 cordon 生效了，其實 controller 已經在反擊）。\n\n可操作的自問，今天就能做：**把你系統裡所有「人可以手動覆寫」的操作列出來，對每一個問兩件事——(1) 有沒有一個自動機制，可能對同一個對象有相反的意圖？(2) 如果有，衝突時誰贏這件事，是寫在程式裡強制執行的，還是只活在我腦子裡？** 凡是第二個答案是「只在我腦子裡」的，你就有一個于伯林根。給它一條明確規則：要嘛讓手動 override 設一個自動機制必須尊重的旗標（像 `cluster-autoscaler.kubernetes.io/scale-down-disabled` 那種真的會讓 controller 閉嘴的註記），要嘛把自動機制設計成「偵測到人工 override 就退讓」。**就像 ICAO 那條 TCAS-over-ATC：模糊不是靠現場聰明消除，是靠事先寫死一條無歧義的優先規則消除。**\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★\n\n口頭（對另一個工程師）把于伯林根的因果鏈講一遍，但有一個硬性要求：**全程不准用「誰的錯」這種句式。** 只准用「哪一層防禦、為什麼那晚沒擋住」。講完後檢查自己——你有沒有不小心滑進「要是俄國機組聽 TCAS 就好了」？\n\n#### 推演解答\n\n正確的講法應該長這樣：那一晚有六層防禦（第二名管制員、即時雷達、STCA、外部電話、TCAS、優先權規則），其中**四層被一次例行維護與一個排班慣例同時打穿**（同事休息、雷達降級、STCA 失效、電話不通），第五層（TCAS）正確運作但被「人選擇不遵循」抵消，第六層（優先權規則）**根本不存在**。觸發只是一次太晚發出的、方向與 TCAS 相反的避讓指令。\n\n如果你滑進了「要是機組聽 TCAS 就好了」——停一下。在 2002 年的規章下，聽管制員**不是明確錯誤**；那個二選一沒有當場可辨識的正解。把災難歸到「機組選錯」，等於假設他們當時握有一條其實要等到事故後 ICAO 才寫出來的規則。這就是 hindsight bias：用事後才存在的知識，去審判事發當下的人（見 ch02）。BFU 自己都拒絕這樣歸因。\n\n### 推演題2 **[20 分鐘]** ★★（反事實）\n\n挑兩層起司，分別做反事實：(a) 如果 STCA 沒被維護關掉、在 Nielsen 眼前正常跳出告警，這 71 人會活嗎？(b) 如果當年 ICAO「TCAS RA 優先於 ATC」的規則已經存在，會活嗎？比較這兩個反事實，哪一個是更「根本」的修補？為什麼事故後優先補的是 (b)？\n\n#### 推演解答\n\n(a) STCA 正常的話，Nielsen 很可能更早幾十秒察覺衝突，有機會下達一個更早、且或許方向正確的避讓——**可能**避免，但不保證：他依然一人兼兩席、依然不知道機上 TCAS 在說什麼，他的避讓指令仍可能與 TCAS 衝突。(a) 補的是「**讓人更早看到問題**」。\n\n(b) 若 RA 優先規則已存在，Tu-154 會無視管制員、遵循 TCAS 爬升，兩機一升一降乾淨錯開——**幾乎確定避免**，而且**不依賴 Nielsen 那一晚的任何狀態**。\n\n(b) 更根本，因為它**移除了「二選一」這個決策本身**，而不是去改善做這個決策的條件。(a) 是「讓操作員在壞處境裡表現得更好」；(b) 是「消滅那個壞處境」。事故後優先補 (b)，正因為它是全域、無歧義、不靠現場運氣的——一條規則同時保護了全世界每一個未來會遇到 RA-vs-ATC 衝突的飛行員。這對應到你系統裡的選擇：與其投資更花俏的 dashboard 讓你「更早看到 cordon 被反擊」（(a) 型），不如直接寫一條讓 controller 在人工 override 時閉嘴的規則（(b) 型）。\n\n### 推演題3 **[25 分鐘]** ★★★（對帳＋設計）\n\n在你維運過的系統裡，找出一處**「人工 override 與自動機制可能對同一對象有相反意圖、且優先權未明確定義」**的地方（cordon vs operator、手動 scale vs HPA、手動 invalidate vs 回填……擇一）。先說清楚：衝突發生時，現在預設是誰贏？這個「誰贏」是寫在哪裡強制的，還是只活在你腦中？然後設計一條 TCAS-over-ATC 式的明確優先規則，並誠實說出它的代價。\n\n#### 推演解答\n\n以「手動 scale vs HPA」為例。現狀：你 `kubectl scale --replicas=2`，HPA 下一個 reconcile 週期就依 CPU metric 把它拉回去——**預設 HPA 贏**，而這條「HPA 贏」沒有任何人決定過，它只是 controller 預設行為的副作用，是一個**沒人填的優先權洞**，跟 2002 年的天空一樣。\n\n一條明確規則可以是：「**人工介入期間，自動 scaling 必須讓步**」——具體實作可以是手動操作時同步把 HPA 暫停（`kubectl autoscale` 移除、或設一個 controller 會檢查的 annotation/維護窗口旗標），override 結束再恢復。\n\n代價（焦慮工程師必須說出口的部分，否則就是只喊「要小心」）：你把一個自動安全網**暫時關掉了**——這本身就是 ch17 車諾比的形狀（為了操作把保護一個個關掉）。所以這條規則必須配一個**自動到期**：override 旗標一定要有 TTL，到期自動恢復自動機制，否則你會製造下一個災難——某人 cordon 完忘了 uncordon、HPA 被永久 pinned，半夜流量尖峰時無法自動擴容。**于伯林根教你「要有明確優先規則」；車諾比提醒你「別把保護關掉就忘了開回來」。** 一條好的優先規則，必須同時回答「衝突時誰贏」和「這個贏什麼時候自動失效」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 為什麼說「兩台 TCAS 都完美運作」？既然都正常，災難從何而來？\n2. 把「是俄國機組不守 TCAS 的錯」這個流行說法拆掉——它漏掉了哪兩個系統性事實？\n3. 那一晚 Nielsen 身上原有的哪幾層交叉檢查被同時拿掉了？他知道嗎？這對應哪個 F 模式？\n4. 為什麼「Tu-154 聽管制員下降」在 2002 年的規章下不是一個明確錯誤的選擇？\n5. ICAO 事後補的那條「TCAS RA 優先於 ATC」，在你的系統裡對應的是哪一類規則？舉一個你系統裡缺這條規則的具體位置。\n6. 為什麼補「明確優先權規則」比補「更好的告警/雷達」更根本？（用推演題2 的 (a) vs (b) 回答。）\n7. 你給自己系統加一條「人
