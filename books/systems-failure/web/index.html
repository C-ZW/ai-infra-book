間 2026-06-13。可分配到各既有主題群：于伯林根/Knight 同屬「自動化反成危害」與「人機/級聯」；Gimli 屬「韌性正面案例（與 Apollo 11 呼應）」兼「一個數字」；Schiaparelli/Sleipner 屬「一個數字，一場崩塌」；Cloudflare/Fastly 屬「級聯/緊耦合」與「內容/設定當程式碼」；Flash Crash 屬「緊耦合金融自動化」（與 Knight 對照）；ERCOT 屬「偏差正常化＋緊耦合基礎設施」。\n\n## 26. 于伯林根空中相撞（Überlingen mid-air collision, 2002-07-01）— TCAS RA 與 ATC 指令相牴觸\n\n- **日期 / 地點**: 2002-07-01，23:35:32 CEST（21:35:32 UTC），德國 Baden-Württemberg 的 Überlingen 上空、康士坦茲湖（Lake Constance / Bodensee）附近，由瑞士 Skyguide 的 Zürich 管制區管制。✔（BFU 報告；Wikipedia）\n- **死傷 / 規模**: 71 人全數罹難、無生還。Bashkirian Airlines Flight 2937（Tupolev Tu-154M，RA-85816）載 69 人（60 名乘客，含 46 名自 Ufa 出發、UNESCO 行程的俄羅斯學童；9 名機組）；DHL Flight 611（Boeing 757-23APF，A9C-DHL）載 2 名機組。✔（71 死、46 名學童為多源一致）\n- **技術根因（精確）**: 兩機在 FL360 同高度、近乎垂直交會航向接近。當晚 Skyguide 因夜間維護把主雷達系統置於 fallback（降級）模式、且管制席間與外部的電話系統正在維修而不可用；另一名管制員在休息，現場僅 Peter Nielsen 一人同時兼顧兩個工作席。Nielsen 太晚才發現兩機間距即將不足，在約 23:34:49 指示 Tu-154 下降（descend）；幾乎同時，Tu-154 的 TCAS 發出 RA 指令「爬升（climb）」、DHL 757 的 TCAS 發出 RA「下降（descend）」。Tu-154 機組面對「管制員叫降、TCAS 叫升」的矛盾，選擇服從管制員、下降——與 TCAS RA 相反；DHL 則依 TCAS 下降。兩機因此同向下降、維持對撞航向，於 23:35:32 相撞。當年 TCAS 程序對「RA 與 ATC 衝突時何者優先」並不明確，俄方訓練/文化亦傾向以 ATC 為準。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 單人管制＋兼兩席（latent + trigger）：Skyguide 容許夜間單一管制員同時操作兩個工作席、另一人休息，喪失交叉監看與工作負荷餘裕。\n  - 主雷達降級、光學/短期衝突警示弱化（latent）：主系統維護中、置於 fallback 模式，使衝突偵測與告警能力下降，Nielsen 太晚察覺間距不足。\n  - 電話系統失效（latent）：席間/與鄰近管制中心的電話正維修不可用，德國 Karlsruhe 端雖試圖示警卻打不通，孤立了 Nielsen。\n  - TCAS RA vs ATC 優先權模糊（latent，本案核心）：當年規章未明確「RA 必須優先於 ATC」，飛行員面對矛盾指令無唯一正解；Tu-154 依管制員、DHL 依 TCAS，兩者「各自合理」卻相加成災。\n  - 文化/訓練分歧（latent）：部分機組（含俄方）訓練偏向以管制員指令為準，與 TCAS 設計前提（RA 應被遵循）相左。\n- **官方調查 / 關鍵結論 + URL**: 德國 BFU（Bundesstelle für Flugunfalluntersuchung），*Investigation Report AX001-1-2/02*（2004-05）。主因：Skyguide 管制端的多項缺失（單人兼席、降級設備、電話失效、太晚察覺衝突）＋ TCAS 使用程序的模糊（RA 與 ATC 衝突時的優先權不明）。提出 19 項安全建議。後續 ICAO 於 2003-11 修訂規章，明定 TCAS RA 優先於 ATC 指令。BFU 報告（SKYbrary 條目）: https://skybrary.aero/bookshelf/bfu-investigation-report-ax001-1-202-uberlingen-mid-air ；報告全文 PDF（Glasgow 鏡像）: https://www.dcs.gla.ac.uk/~johnson/Eurocontrol/Ueberlingen/Ueberlingen_Final_Report.PDF ；事件概觀: https://en.wikipedia.org/wiki/2002_%C3%9Cberlingen_mid-air_collision\n- **常見誤解 / 要校準的迷思**:\n  - 「是俄國機組的錯（不該聽管制員、該聽 TCAS）」：最該校正的迷思。BFU 把主因指向 Skyguide 的系統性缺失（人力、降級設備、電話失效）＋當年 TCAS-vs-ATC 優先權的制度模糊；機組面對矛盾指令並無唯一明確正解。把它講成「俄國飛行員不守 TCAS」是倒果為因。\n  - 「一個管制員打瞌睡/失職害的」：要校準——Nielsen 是被放在「一人兼兩席、雷達降級、電話不通」的不可能處境中，是組織與設備把單點變致命。\n  - 「TCAS 失靈了」：錯。兩機 TCAS 都正確發出互補的 RA（一升一降）；失敗在「人未一致遵循 RA」與「規章沒說 RA 必須優先」。\n  - 「管制員被殺是司法判決」：要校準——2004-02-24 喪妻失子的 Vitaly Kaloyev 私自闖入 Nielsen 住處將其刺殺，是私刑謀殺、非司法結果；這是本案的人性餘波，非調查結論。\n- **信心**: ✔ rock-solid（BFU 一級報告；71 死、46 學童、單人兼席、雷達 fallback、電話失效、TCAS 一升一降、ICAO 2003-11 修訂 RA 優先皆多源一致）。\n\n## 27. 金姆利滑翔機（Gimli Glider, Air Canada Flight 143, 1983-07-23）— 單位換算錯誤＋失動力滑降的韌性\n\n- **日期 / 地點**: 1983-07-23，加拿大 Air Canada Flight 143，Boeing 767-233（C-GAUN），航線 Montreal-Dorval → Ottawa → Edmonton；於約 FL410（41,000 ft）巡航於安大略 Red Lake 上空時雙發失火（fuel exhaustion），無動力滑降至 Manitoba 省 Gimli 的前加拿大皇家空軍基地（RCAF Station Gimli，已改為賽車場）落地。✔（Wikipedia；Lockhart 調查委員會）\n- **死傷 / 規模**: 機上 61 名乘客＋8 名機組，無人死亡、僅輕傷（落地時前起落架未鎖定而塌陷、機鼻觸地，反而增加摩擦助減速）。✔\n- **技術根因（精確）**: 這架公制化的 767 其燃油量指示系統（FQIS, Fuel Quantity Indicator System）故障，地勤改以浮油尺（dripstick）人工量測油量、再換算重量。關鍵錯誤：換算時用了 1.77（單位為 lb/L，磅／升），而這架公制機應使用約 0.803 kg/L（公斤／升）的密度。錯用磅密度，使他們以為加足了所需油量，實際只裝了約一半：以為有約 22,300 kg、其實只有約 10,100 kg（約需求的 45%）。巡航中雙發先後因燃油耗盡熄火。失去主動力後，RAT（Ram Air Turbine，衝壓空氣渦輪）自動展開、提供有限的液壓與基本飛控。機長 Bob Pearson 是經驗豐富的滑翔機飛行員，以約 220 節下滑，並施展滑翔機技巧「forward slip（前向側滑）」大幅增加阻力、陡降而不增速，無動力滑降約 17 分鐘、約 183 km 後成功在 Gimli 跑道落地（當天該基地正辦賽車活動、跑道上有人車）。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 公制換算假設未被防呆（latent）：剛從英制改公制的機隊，人員對 kg/L vs lb/L 的密度因子混淆，無系統性二次校核攔截 1.77 vs 0.803 的錯誤。\n  - FQIS 失效迫使人工量測（latent + trigger）：油量表故障，把「儀表自動讀數」降級為「人工浮油尺＋手算換算」，放大了人為換算出錯的機會。\n  - 帶故障放行（latent）：在 FQIS 不正常的情況下仍放行起飛，依賴人工計算這條較脆弱的防線。\n  - 多人各自確認卻同步犯錯（latent）：機師與地勤的交叉確認因為共用同一個錯誤密度因子而失效——「兩個人都算過」並未提供獨立性。\n- **官方調查 / 關鍵結論 + URL**: 加拿大政府委任 Justice George Lockhart 主持的調查委員會（Board of Inquiry, 1985）。結論把責任指向 Air Canada 的「企業與設備層面缺失（corporate and equipment deficiencies）」，而非單一機組過失；並建議全面從英制轉為 SI 公制單位。事件概觀（含 FQIS、1.77 vs 0.803、RAT、forward slip、滑降距離）: https://en.wikipedia.org/wiki/Gimli_Glider\n- **常見誤解 / 要校準的迷思**:\n  - 「飛行員加錯油，笨」：要校準——這既是「單位/假設錯誤」（用了 lb/L 密度），也是「FQIS 故障迫使人工計算＋帶病放行＋交叉確認共用同一錯誤」的系統失敗；Lockhart 委員會把主責歸於公司與設備，不是釘單一人。\n  - 「兩具引擎故障」：錯。引擎沒壞，是燃油耗盡（fuel exhaustion）導致熄火；油是「以為夠、其實只有一半」。\n  - 「靠運氣降落」：要校準——化險為夷的核心是 Pearson 的滑翔機經驗（forward slip）、副駕對 Gimli 跑道的熟悉，以及 RAT 提供的最低限度液壓；這是「韌性/airmanship」正面案例（可與 Apollo 11 對照），不是純運氣。\n  - 「767 全靠液壓飛、沒電/沒油就完全失控」：要校準——RAT 在失去主動力時自動提供有限液壓與基本操縱，讓深度降級下仍可控；這正是「優雅降級」的硬體版。\n- **信心**: ✔ rock-solid（1.77 lb/L vs 0.803 kg/L、22,300 kg 需求 vs 10,100 kg 實裝、FL410、約 183 km 滑降、RAT、forward slip、零死亡、Lockhart 委員會結論皆有來源一致）。⚠️ 滑降距離各源約 100–183 km、滑降時間約 17 分鐘，書寫時用「約 17 分鐘、超過 150 km」較穩。\n\n## 28. Schiaparelli 火星著陸器（ExoMars EDM, 2016-10-19）— IMU 飽和→負高度→誤判已著陸\n\n- **日期 / 地點**: 2016-10-19，ESA ExoMars 2016 任務的 EDM（Entry, Descent and Landing Demonstrator Module, 名 Schiaparelli）於火星 Meridiani Planum 進行進入-下降-著陸（EDL）時墜毀。✔（ESA Anomaly Inquiry Board 報告）\n- **死傷 / 規模**: 無人傷亡（無人探測器）。著陸器全毀；以約 540 km/h（約 150 m/s）撞擊火表，NASA 的 Mars Reconnaissance Orbiter 影像拍到撞擊坑。ExoMars 2016 的另一部分（Trace Gas Orbiter, TGO）成功入軌、任務主目標達成；Schiaparelli 為技術示範件。✔（無傷亡；撞擊速度見下方校準）\n- **技術根因（精確）**: 降落傘張開後，著陸器經歷比預期更劇烈的擺盪，使 IMU（Inertial Measurement Unit，慣性量測單元）的角速率量測達到飽和（saturation，超出可量測上限），且此飽和持續時間約 1 秒（超出設計預期；各來源約 1 秒，ESA 公開摘要與多數報導採此值）。GNC（Guidance, Navigation & Control）軟體把這段飽和的姿態/角速率資料積分進導航解算，產生了一個錯誤的姿態估計，進而算出一個「負的高度（below ground level）」。系統據此「以為自己已經（或即將）著陸」：於是提前釋放降落傘與背殼（backshell）、僅短暫點燃減速推進器約 3 秒、隨即切換到「地面模式（on-ground mode）」並啟動本應落地後才做的動作——但此時著陸器其實還在約 3.7 km 高空。失去減速後自由墜落、以約 540 km/h 撞地。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 對降落傘動態的建模不足（latent）：對傘下擺盪幅度的電腦模擬不足，未預期 IMU 會被擺盪推到飽和。\n  - IMU 飽和上限設定與後續處理不當（latent，本案核心）：飽和門檻設定使量測在劇烈擺盪下達上限，且 GNC 對「飽和/異常的 IMU 資料」缺乏穩健處理（未做合理性檢查就積分），讓壞資料一路變成負高度。\n  - 缺乏對「不可能的高度」的合理性把關（latent）：軟體未對「負高度」這種物理上不可能的解算結果設防護或拒絕，直接據以觸發釋傘/落地序列。\n  - 故障偵測文化與分包管理不足（latent）：Inquiry Board 指團隊在偵測此類故障的態度不足，且分包商管理有問題，使缺陷未在驗證中被攔下。\n- **官方調查 / 關鍵結論 + URL**: ESA 設立由 Inspector General 主持的外部獨立 Schiaparelli Anomaly Inquiry Board，報告於 2017 年發布。根因鏈：降落傘擺盪→IMU 角速率飽和（持續超出預期）→GNC 積分出錯誤姿態與「負高度」→提前釋傘/釋背殼、推進器僅點火約 3 秒、切到地面模式→在約 3.7 km 高空自由墜落。並列出建模不足、飽和處理不當、故障偵測與分包管理等根因。Inquiry 報告 PDF: https://sci.esa.int/documents/33431/35950/1567260317467-ESA_ExoMars_2016_Schiaparelli_Anomaly_Inquiry.pdf ；ESA 調查完成新聞: https://www.esa.int/Science_Exploration/Human_and_Robotic_Exploration/Exploration/ExoMars/Schiaparelli_landing_investigation_completed\n- **常見誤解 / 要校準的迷思**:\n  - 「降落傘沒打開/降落傘故障」：錯。降落傘正常張開了；致命的是傘下擺盪使 IMU 飽和、軟體誤算高度，反而「太早」把傘丟掉。\n  - 「感測器壞了」：要校準——IMU 沒壞，是「被推到量測上限（飽和）」這個合法但異常的狀態；真正缺陷是軟體對飽和資料的處理（積分成負高度而不質疑）。\n  - 「電腦算出負高度只是一個 bug」：不完整。是「建模不足→飽和→積分壞解→無合理性把關」的鏈條，且這套 GNC 軟體未經足以暴露此情境的測試（與 Ariane 5、MCO 同類：壞輸入＋缺乏防護＋驗證不足）。\n  - 「整個 ExoMars 2016 失敗了」：錯。主目標 TGO 成功入軌；Schiaparelli 是著陸技術示範件，其失敗提供了 EDL 教訓。\n- **信心**: ✔ 技術根因 rock-solid（ESA Inquiry 一級報告；IMU 飽和→負高度→提前釋傘/約 3 秒推進器/約 3.7 km/約 540 km/h 皆有來源）。飽和持續時間採「約 1 秒（超出設計預期）」——ESA 公開摘要與多數報導採此值；書寫時以「飽和持續超出預期時間」表述，不釘死秒數。\n\n## 29. Sleipner A 平台沉沒（1991-08-23）— 有限元素分析低估剪應力\n\n- **日期 / 地點**: 1991-08-23，挪威 Stavanger 附近的 Gandsfjord 峽灣；Condeep 型混凝土重力式基礎結構（concrete gravity base structure），由 Norwegian Contractors 為 Statoil（今 Equinor）建造，正進行 deck mating 前的受控壓載（ballasting）/浮力測試。✔（Wikipedia；SINTEF 調查）\n- **死傷 / 規模**: 無人傷亡（無人受控測試）。整座混凝土基礎結構在下沉測試中於水深約 65 m 處一面 cell 牆破裂、進水後以約每分鐘 1 m 下沉並內爆（implode），碰底時的衝擊產生約 Richter 3.0 規模的地震訊號。財務損失通常引為「約 7 億美元」⚠️（亦見不同 NOK 估值；此數字常見於工程教案，非單一官方報告逐字數字，書寫標「估計約 7 億美元」）。✔（無傷亡、約 65 m、約 1 m/min、規模約 3.0 為多源一致）/ ⚠️（金額）\n- **技術根因（精確）**: 結構中的 tricell（三胞元，三座圓筒儲格交會處的三角形 cell，屬壓載/浮力系統的一部分）牆體在深水靜水壓下承受高剪應力。設計時用 NASTRAN 做的有限元素分析（FEA）對 tricell 牆的剪應力嚴重低估——調查確認壓載室的應力被低估約 47%；加上採用偏不保守的混凝土規範，使部分混凝土牆「太薄、配筋不足」，無法承受下沉到該深度時可預見的靜水壓。於是在約 65 m 深度，tricell 牆先破裂進水，迅速失去浮力而沉沒、內爆。FEA 網格在 tricell 幾何的應力集中處過粗、未捕捉真實剪力分布，是經典的「模型解析度不足→低估關鍵應力」案例。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - FEA 模型在關鍵幾何處過粗（latent，本案核心）：NASTRAN 模型對 tricell 三角交會處的剪應力解析不足，系統性低估約 47%，把不安全的設計算成「安全」。\n  - 偏不保守的混凝土規範（latent）：採用的混凝土設計規範本身偏不保守，與低估的應力相疊加，使安全裕度被雙重侵蝕。\n  - 配筋/牆厚不足、無裕度（latent）：據錯誤的低應力設計，牆做得太薄、剪力配筋不足，對「可預見的靜水壓」毫無餘裕。\n  - 對「分析結果」過度信任、缺乏獨立校核（latent）：對 FEA 輸出未做足夠的獨立驗證或局部精細複算，分析誤差直接變成製造缺陷（與 MCO、Ariane 同類：相信軟體輸出而無端到端把關）。\n- **官方調查 / 關鍵結論 + URL**: 事故後 Statoil 設調查小組、委由挪威 SINTEF 擔任技術顧問調查。結論：根因為 NASTRAN/FEA 對 tricell 牆剪應力的不準確計算（低估約 47%）＋偏不保守的混凝土設計，導致牆體在靜水壓下破壞。事件概觀（含 47%、65 m、規模 3.0、無傷亡、SINTEF）: https://en.wikipedia.org/wiki/Sleipner_A ；技術整理（學界/教案）: https://link.springer.com/chapter/10.1007/978-94-011-1046-4_3\n- **常見誤解 / 要校準的迷思**:\n  - 「混凝土品質差/施工偷工」：錯。問題在設計階段的 FEA 低估剪應力、致牆「按錯誤的低需求」做得太薄；不是施工品質或材料瑕疵。\n  - 「平台在使用中倒塌、死了人」：錯。是在「安裝前的受控下沉測試」中沉沒、且無人傷亡；它是「測試階段就暴露設計缺陷」（相對幸運）。\n  - 「就是軟體（NASTRAN）的 bug」：要校準——NASTRAN 本身沒有 bug；是「模型網格在應力集中處過粗＋偏不保守規範＋無獨立校核」這組工程使用方式的失敗，是「人怎麼用工具」而非工具壞了。\n  - 「47% 是隨便估的」：要校準——47% 是調查對 tricell 牆剪應力低估幅度的確認值，是本案最具代表性的數字。\n- **信心**: ✔ 技術根因 rock-solid（SINTEF 調查；低估約 47%、tricell 剪應力、NASTRAN/FEA、約 65 m、規模 3.0、無傷亡多源一致）。⚠️ 僅財務損失金額（約 7 億美元）為估計、非單一官方逐字數字。\n\n## 30. Cloudflare 大當機（2019-07-02）— WAF 正則式災難性回溯使 CPU 100%\n\n- **日期 / 地點**: 2019-07-02，13:42 UTC 起、14:09 UTC 恢復；全球 Cloudflare 代理網路。✔（Cloudflare 官方 postmortem）\n- **死傷 / 規模**: 無傷亡。全球代理服務中斷約 27 分鐘；中斷期間全球流量驟降約 80%、大量請求回傳 502 錯誤；影響 Discord、Shopify、Notion、Glassdoor 等大量網站。✔（27 分鐘、80% 流量損失皆官方）\n- **技術根因（精確）**: Cloudflare 部署了一條新的 WAF（Web Application Firewall）Managed Rule，其中一段正則表達式含有 catastrophic backtracking（災難性回溯）。問題正則為 `(?:(?:\\\"|'|\\]|\\}|\\\\|\\d|(?:nan|infinity|true|false|null|undefined|symbol|math)|\\`|\\-|\\+)+[)]*;?((?:\\s|-|~|!|{}|\\|\\||\\+)*.*(?:.*=.*)))`，致命片段是末端的 `.*(?:.*=.*)`——當輸入字串較長時，PCRE 引擎為了匹配此巢狀的貪婪 `.*` 會嘗試指數級數量的回溯路徑，CPU 飆到接近 100%。此規則經 Cloudflare 的 Quicksilver（全球秒級分發的鍵值散布系統）一次性推送到全球所有節點，未經分階段/金絲雀發布；且數週前一次 WAF 重構時，本應限制單一正則 CPU 用量的保護被誤移除，使這條失控正則沒有 CPU 上限可兜底。結果全球代理進程 CPU 被吃光、無法處理正常流量。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 正則 CPU 保護被誤刪（latent，本案核心）：數週前 WAF 重構移除了限制正則 CPU 用量的保護，使「失控正則」失去最後的資源兜底——脆弱性在事發前就潛伏。\n  - Lua WAF 用 PCRE、回溯無複雜度保證（latent）：底層正則引擎用回溯式匹配、對指數級回溯無內建防護，本質上對 catastrophic backtracking 不設防。\n  - WAF 規則全球一次性推送、無金絲雀（latent）：Managed Rule 經 Quicksilver 秒級推全球、未分批，缺陷一上線即全球同時爆（與 CrowdStrike 同型）。\n  - 把「規則/設定」當資料而非程式碼（latent）：WAF 規則雖視為設定，實質會驅動執行期計算（正則匹配吃 CPU），卻未套用與程式碼同等的灰度發布與效能測試。\n- **官方調查 / 關鍵結論 + URL**: Cloudflare 官方 postmortem（CTO John Graham-Cumming，2019-07-12）*Details of the Cloudflare outage on July 2, 2019*。結論：一條 WAF 規則的正則 catastrophic backtracking 使全球 CPU 飆滿；以「全域關閉 WAF（global WAF kill switch / global terminate）」於 14:07 UTC 止血、14:09 UTC 恢復。並坦承 Quicksilver 跳過了分階段發布、且先前誤移除了 CPU 保護。官方 postmortem: https://blog.cloudflare.com/details-of-the-cloudflare-outage-on-july-2-2019/\n- **常見誤解 / 要校準的迷思**:\n  - 「Cloudflare 被 DDoS/被駭」：錯。是自家 WAF 規則的正則缺陷造成的自我 CPU 耗盡，無外部攻擊（事發初期一度被懷疑為攻擊）。\n  - 「就是一條爛正則」：要校準——正則是觸發，真正放大的是「CPU 保護被誤移除＋回溯式引擎無複雜度保證＋全球一次性推送無金絲雀」這組防禦缺口。\n  - 「跟 2020 BGP 或 2025 設定檔那次是同一件」：錯。需區分——2019-07-02 是「正則/CPU」事件；Cloudflare 另有 2020 的 BGP 路由事件與 2025-11 的設定檔事件，三者根因不同。\n  - 「永久關掉 WAF 才修好」：要校準——是用「全域 kill switch 暫時關 WAF」止血、移除壞規則後再恢復，非永久關閉。\n- **信心**: ✔ rock-solid（Cloudflare 官方 postmortem 逐項核對；27 分鐘、13:42–14:09 UTC、80% 流量損失、正則原文、Quicksilver 全球推送、CPU 保護被誤刪皆官方）。\n\n## 31. 2010 閃電崩盤（Flash Crash, 2010-05-06）— 大型賣出演算法×HFT 撤離流動性\n\n- **日期 / 地點**: 2010-05-06，美東時間（ET）約 14:32 起急跌、約 14:45–14:47 觸底、約 15:07 前大致回復；美國股市（DJIA／E-mini S&P 500 期貨等）。✔（CFTC-SEC 聯合報告）\n- **死傷 / 規模**: 無傷亡。DJIA 盤中急跌約 998–1,000 點（約 9%）、數分鐘內蒸發約 1 兆美元名目市值，並在約 36 分鐘內大致收復；當日收盤 DJIA 仍跌約 3.2%（約 348 點）。部分個股一度成交於荒謬價位（如 1 美分或 10 萬美元）。✔（約 1,000 點/約 9%/約 1 兆/約 36 分鐘為多源一致）\n- **技術根因（精確）**: CFTC-SEC 聯合報告（2010-09-30）指觸發為一筆大型自動賣出程式：一家基本面交易者（廣泛報導為 Waddell & Reed）為對沖既有股票部位，下單賣出 75,000 口 E-mini S&P 500 期貨、名目約 41 億美元；其演算法採「成交量參與率（volume-participation）」的粗略邏輯——以「占當下成交量某百分比」的速度灌出賣單，但對價格、時間、市場能否吸收皆不設限制。在已然脆弱、波動升高的市場中，這筆賣壓約 20 分鐘內傾洩（正常需數小時）。高頻交易者（HFT）先買進這些合約、隨即彼此快速轉手（被形容為 hot-potato「燙手山芋」效應），未提供真實流動性反而抽走流動性；多家造市商與 HFT 因觸發自身風控而暫停或退出，買盤瞬間枯竭，價格自由落體。隨後流動性回補、價格快速反彈。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 賣出演算法無價格/時間上限（latent，本案核心）：volume-participation 演算法只盯「占成交量百分比」，不看價格、不看時間、不看市場深度，在波動放大時越賣越快、自我加速。\n  - HFT 流動性是「會跑的流動性」（latent）：HFT 在壓力下不是緩衝而是放大器——撤單、互相轉手（hot-potato），把表面充沛的流動性在數秒內抽乾。\n  - 跨市場無協調的暫停機制（latent）：當時缺乏跨股/跨市場的統一熔斷，個股價格可瞬間崩到荒謬價位而無煞車。\n  - 緊耦合＋自動化連鎖（latent）：期貨與現貨、各演算法彼此即時連動，單一大單的衝擊在毫秒級跨市場傳染、無阻尼。\n- **官方調查 / 關鍵結論 + URL**: U.S. CFTC & SEC 聯合報告 *Findings Regarding the Market Events of May 6, 2010*（2010-09-30）。結論：觸發為大型 E-mini 賣出程式（volume-participation、無價格/時間限制），與 HFT 的 hot-potato 互動致流動性瞬間枯竭。後續監管引入單股熔斷、繼而是 Limit Up-Limit Down（LULD）機制。報告 PDF: https://www.sec.gov/files/marketevents-report.pdf ；後續學術/補充分析（CFTC）: https://www.cftc.gov/sites/default/files/idc/groups/public/@economicanalysis/documents/file/oce_flashcrash0314.pdf\n- **常見誤解 / 要校準的迷思**:\n  - 「是 Navinder Sarao 一個人用 spoofing 搞垮市場」：要校準（歸因有爭議）。Sarao 於 2015 年因 spoofing（掛大量假賣單再撤）被起訴、2020 年僅判一年居家監禁；但 2010 年 CFTC-SEC 報告並不依賴 Sarao 的存在來解釋崩盤，學界亦指「政策應依聯合報告、而非把全責歸 Sarao」。書寫時應寫「觸發為大型賣出演算法×HFT 撤離流動性；Sarao 的 spoofing 是否、以及多大程度上助長，仍有爭議」並標 ⚠️。\n  - 「HFT 提供流動性、讓市場更穩」：要校準——當天 HFT 的流動性在壓力下迅速撤離、互相轉手，反而放大崩跌；這是「流動性幻覺」的經典案例。\n  - 「市場真的蒸發了 1 兆」：要校準——是盤中名目市值短暫蒸發約 1 兆、約 36 分鐘內大致收復；非永久損失，重點在「速度與機制」而非最終跌幅。\n  - 「就是 Waddell & Reed 故意砸盤」：錯。那是合法的對沖賣出，問題在演算法設計（無價格/時間限制）與市場結構，非惡意。\n- **信心**: ⚠️ 機制 rock-solid（CFTC-SEC 一級報告；約 1,000 點/9%/1 兆/36 分鐘、E-mini 75,000 口/約 41 億、volume-participation、hot-potato 皆官方）。歸因有爭議：Sarao 的 spoofing 貢獻程度未定論，須以「觸發＝大型賣出演算法×HFT；Sarao 角色有爭議」表述。\n\n## 32. 德州電網大停電（Winter Storm Uri, ERCOT, 2021-02-14~19）— 未做防寒的偏差正常化＋孤島電網\n\n- **日期 / 地點**: 2021-02-14 至 19，北極寒潮 Winter Storm Uri 橫掃德州；ERCOT（Electric Reliability Council of Texas）管理的近乎孤島的德州電網。✔（FERC/NERC 聯合報告）\n- **死傷 / 規模**: 逾 450 萬戶（約 4.5 million customers）停電，部分長達約 4 天；ERCOT 為避免全網不可控崩潰，實施美國史上最大規模的人為強制減載（最嚴重時約 20,000 MW、約占當時負載 45%，持續近三日，並非短暫「rolling」而是長時間維持）。死亡人數有爭議⚠️：德州官方/州衛生部門統計約 210–246 死（直接＋間接），多項研究估計含間接死亡可達約 700（一說 702）；經濟損失估計約 800–1,300 億美元（$80B–$130B）⚠️。ERCOT 事後稱電網一度距離「完全黑啟動（black start，恐需數週才能恢復）」僅約 4 分 37 秒。✔（4.5M 戶、約 20,000 MW、近 4 分 37 秒為報告/ERCOT 數字）/ ⚠️（死亡與損失金額為範圍）\n- **技術根因（精確）**: 極端低溫直接凍結天然氣井口（wellhead）、集氣與處理設施與發電機組；同一寒潮下供暖需求飆升，發電端卻因凍結/燃料供應中斷而大量跳機。FERC/NERC 報告：2/16 約 30,500 MW 停機容量中約 18,000 MW 為天然氣發電，其中約 72% 因燃料供應問題；凍結問題占非計畫停機的約 44.2%、燃料問題約 31.4%。天然氣產量在 2/17 一度較常態下降約 71%、處理量 2/15 一度下降約 82%。電力與天然氣的相互依賴形成循環依賴：發電需要天然氣，而天然氣的開採/加壓/處理又需要電力——停電使氣田更難供氣、缺氣又使更多電廠停機。ERCOT 為防止頻率崩到觸發保護、引發全網不可控的連鎖跳脫（black start），被迫長時間大規模甩負載。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 防寒（winterization）長期未強制（latent，本案核心，偏差正常化）：德州在 2011 年（甚至 1989 年）的寒潮事件後已被點名「需強化防寒」，但機組防寒在德州非強制、無最低標準；「歷次沒釀大災」侵蝕了動機——典型 normalization of deviance。\n  - 近乎孤島的電網、跨區連結有限（latent）：ERCOT 為避免聯邦監管而刻意與東/西兩大互聯網少有連結，缺電時幾乎無法從鄰區大量輸入電力來補缺口。\n  - 氣電相互依賴的循環依賴（latent）：發電靠天然氣、天然氣生產又靠電力，停電與缺氣互相惡化，無人把「氣電耦合」當成單一系統來規劃韌性。\n  - 需求側同步飆升（trigger）：嚴寒使電熱負荷暴增，與供給端崩潰同時發生，供需缺口在最冷時刻最大。\n  - 接近不可控崩潰、餘裕極小（trigger 放大）：系統一度距 black start 僅約 4 分 37 秒，留給操作員的處置窗口極短，只能靠長時間強制甩負載硬撐。\n- **官方調查 / 關鍵結論 + URL**: FERC（Federal Energy Regulatory Commission）與 NERC（North American Electric Reliability Corporation）2021 年聯合調查的最終報告（2021-11 發布），含 28 項正式建議，核心指向發電機組防寒不足與氣電協調不足。FERC 新聞稿（最終報告）: https://www.ferc.gov/news-events/news/final-report-february-2021-freeze-underscores-winterization-recommendations ；事件概觀（含死亡範圍、損失估計）: https://en.wikipedia.org/wiki/2021_Texas_power_crisis\n- **常見誤解 / 要校準的迷思**:\n  - 「是再生能源（風機結冰）害的」：要校準——FERC/NERC 數據顯示停機主力是天然氣等熱力發電（2/16 停機容量約 18,000 MW 為天然氣、約 72% 因燃料供應），凍結與燃料問題遍及各種能源；把責任全推給風電不符報告。\n  - 「只是『輪流停電（rolling blackouts）』、一下就好」：要校準——是持續近三日、最嚴重約 20,000 MW（約 45% 負載）的長時間強制甩負載，目的是避免「完全失控的全網崩潰」；不是輕描淡寫的輪流停電。\n  - 「死了 200 多人」：要校準（爭議）——州官方統計約 210–246，但含間接死亡的研究估計可達約 700；應給範圍並標 ⚠️。\n  - 「天有不測風雲、純屬天災」：要校準——寒潮是觸發，但「2011/1989 已警告卻未強制防寒」是偏差正常化，「孤島電網無法輸入」是結構選擇，「氣電循環依賴」是規劃盲點；這是可預防的系統性失敗。\n- **信心**: ✔ 機制與系統根因 rock-solid（FERC/NERC 一級報告＋ERCOT 數字；4.5M 戶、約 20,000 MW/45%、約 4 分 37 秒、天然氣停機占比、防寒未強制、2011 前例皆有來源）。⚠️ 死亡人數（約 210–246 官方 vs 約 700 研究）與經濟損失（約 $80B–$130B）為範圍/估計，須給區間並標 ⚠️。\n\n## 33. Fastly 大當機（2021-06-08）— 潛伏 bug 被一筆合法客戶設定觸發\n\n- **日期 / 地點**: 2021-06-08，09:47 UTC 起；全球 Fastly CDN（邊緣網路）。✔（Fastly 官方 postmortem）\n- **死傷 / 規模**: 無傷亡。客戶可感知的服務中斷約一小時（多數服務於約 11:00 UTC 前後恢復），但自起始（09:47）到完全緩解（12:35 UTC）約 2 小時 48 分；中斷期間約 85% 的 Fastly 網路回傳錯誤；連帶拖垮 Amazon、Reddit、紐約時報（NYT）、英國政府網站（gov.uk）等大量站點。✔（85%、約一小時客戶影響、Fastly 一分鐘內偵測皆官方）\n- **技術根因（精確）**: 2021-05-12 Fastly 部署了一版軟體，其中引入了一個潛伏（latent/dormant）缺陷——只在「特定客戶設定」遇上「特定情境」時才會被觸發，部署後潛伏數週未顯。2021-06-08 早上，一名客戶推送了一筆「合法有效（valid）」的設定變更，恰好滿足了觸發該潛伏 bug 的特定條件，使缺陷被喚醒：一個 edge 節點崩潰，並透過共享的設定服務擴散，導致全球約 85% 的網路回傳錯誤（多為 503/服務不可用）。Fastly 在約一分鐘內（09:48）偵測到、辨識並隔離原因、停用該設定；在約 49 分鐘內讓 95% 的網路恢復正常；當日 17:25 UTC 開始部署永久修補。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 潛伏 bug 未被測試暴露（latent，本案核心）：5/12 部署引入的缺陷在一般情境下不顯，現有測試/驗證未涵蓋「特定客戶設定×特定情境」這條觸發路徑，使其潛伏數週成為定時炸彈（與 Knight 的休眠死碼同型）。\n  - 合法輸入即可引爆（latent）：觸發者是「合法有效的設定變更」，非惡意/非畸形輸入；系統未對「合法但會引爆潛伏缺陷的組態」設防（呼應「可信來源≠可信內容」）。\n  - 一個 edge 崩潰經共享設定服務擴散（latent）：單節點崩潰沒有被隔離，反而透過共享的設定散布管道擴散到全網——缺乏爆炸半徑隔離（與級聯主題一致）。\n  - Fastly 自承未預期此類失效（latent）：postmortem 坦承「我們應該要能預期到這種失效」，即缺乏對此失效模式的事前想像與防護。\n- **官方調查 / 關鍵結論 + URL**: Fastly 官方事後說明 *Summary of June 8 outage*（Nick Rockwell）。結論：5/12 部署引入潛伏 bug，6/8 一筆合法客戶設定觸發、使約 85% 網路回傳錯誤；一分鐘內偵測、約 49 分鐘內 95% 恢復；後續加上對此類觸發的修補與更嚴格的部署檢測。官方 postmortem: https://www.fastly.com/blog/summary-of-june-8-outage\n- **常見誤解 / 要校準的迷思**:\n  - 「是那位客戶設定錯了/客戶的錯」：錯。客戶推的是「合法有效」的設定；錯在 Fastly 自家 5/12 引入、潛伏數週未被測出的 bug——客戶的合法操作只是「踩到地雷」的腳。\n  - 「Fastly 被攻擊/被駭」：錯。是自家潛伏軟體缺陷被合法設定觸發，無外部攻擊。\n  - 「中斷只有一小時」：要校準——客戶可感知影響約一小時、Fastly 一分鐘內偵測且 49 分鐘內 95% 恢復；但自起始到完全緩解約 2 小時 48 分（09:47→12:35 UTC）。書寫時用「約一小時的全球性嚴重中斷，數十分鐘內大致恢復」較貼合多數讀者印象，並可註明完全緩解的較長時間。\n  - 「一次部署當下就爆」：要校準——bug 在 5/12 就部署進去、潛伏了近一個月，6/8 才被特定設定觸發；危險在「潛伏期」而非部署當下。\n- **信心**: ✔ rock-solid（Fastly 官方 postmortem 逐項核對；5/12 引入潛伏 bug、6/8 合法客戶設定觸發、85% 網路回錯、一分鐘偵測、49 分鐘內 95% 恢復皆官方）。⚠️ 僅「中斷時長」依「客戶影響 vs 完全緩解」口徑不同（約 1 小時 vs 約 2h48m），書寫時說清是哪一個。\n\n---\n\n# I. 第三輪增補（靜默資料損毀，2026-06-13）\n\n## 34. 溫哥華證券交易所指數截斷誤差（Vancouver Stock Exchange Index, 1982–1983）\n\n- **日期 / 地點**: 指數於 1982-01 設立、基值 1000.000；誤差累積至 1983-11-25（週五）收盤後修正。加拿大溫哥華。✔\n- **死傷 / 規模**: 無人傷亡。規模＝指數在約 22 個月內由 1000 默默漂移到 **524.881**，而「真值」應約 **1009.811**——即顯示值僅約真值的一半。1983-11-25 修正後重新開盤跳回 **1098.892**（差額純粹來自修掉這個 bug）。✔（多源一致：in.tum.de/Huckle 整理、B. D. McCullough 分析、當代 Toronto Star 報導）\n- **技術根因（精確）**: 指數每次因成交而重算時，程式以 **truncation（截斷，floor()）** 取代 **rounding（四捨五入，round()）** 取到小數第三位。單次截斷誤差極小（最多約 0.0005），但指數**每天重算數千次**，且每次截斷都是**系統性向下**（floor 永遠往下捨），誤差**單向累積、不會抵消**。約 22 個月下來累積出約 −485 點的偏差。根因是「一行用錯函式」（floor vs round），但本質是**單向偏差在高頻重算下的線性累積**——沒有任何一次計算「錯得明顯」，每一步看起來都對。\n- **防禦的孔洞（Swiss-cheese holes）**:\n  - 監控全綠（latent/F11）：指數每天都產出「合理」的數字，沒有崩潰、報錯或不連續；沒有人盯「它與真值的偏差」這個量，因為沒人想到要盯。\n  - 單向誤差無自我修正（latent/F8）：若用 round()，誤差會上下抵消、長期趨近零；用 floor() 讓誤差**只往一個方向**，是「靜默漂移」的關鍵。\n  - 缺乏對拍／重算驗證（F3）：沒有定期用獨立方法（完整重算、與成分股市值對帳）驗證指數值的機制，使偏差能潛伏近兩年。\n  - 「看起來對」掩蓋「實際錯」（F9/F11）：顯示三位小數的精度給人精確的錯覺，掩蓋了系統性偏差。\n- **官方調查 / 關鍵結論 + URL**: 無政府事故調查（非安全事故）。權威技術整理：Technical University of Munich（Huckle）案例頁 <https://www5.in.tum.de/~huckle/Vancouv.pdf> ；學術分析常引 B. D. McCullough 對數值計算誤差的討論；當代報導見 Toronto Star 1983-11。中心教訓：**單向 round-off 誤差在高頻重算下會線性累積成巨大偏差，而「監控正常」完全看不見它。**\n- **常見誤解 / 要校準的迷思**:\n  - 「就是個四捨五入的小誤差」：錯——關鍵不是「誤差小」，是「**單向＋高頻累積**」。用 round()（雙向）不會漂；用 floor()（單向）才會。\n  - 「市場真的崩了一半」：錯——市值與成分股從沒變，是**指數這個衡量儀器**默默讀錯了。真實世界沒事、儀表錯了，這正是「靜默資料損毀」的本質：壞的是你對世界的量測，不是世界。\n  - 「很快就被發現」：錯——潛伏約 **22 個月**，沒有警報、沒有崩潰，只能靠有人起疑去獨立重算才會發現。\n- **信心**: ✔ rock-solid（1000→524.881→1098.892、floor vs round、約 22 個月、每日數千次重算皆多源一致）。可安全作為「靜默資料損毀／單向誤差累積」主案；後端對照（bit rot / silent data corruption、split-brain 多叢集獨立寫入致狀態分歧、需 checksum/quorum/fencing/對帳）為通用工程知識，章內可自由發揮、不需釘單一來源。\n\n<!-- 第二輪增補：H 段案例 26–33。第三輪增補：I 段案例 34（VSE，靜默資料損毀）。2026-06-13。 -->\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書《正常意外：複雜系統如何崩壞》的跨章一致性基準、脆弱事實清單、結構同步雷區、掃描協定與掃描日誌。**改任何內容前先讀本檔。**\n\n## 一、本書的「貨幣」：失敗模式語言 F1–F14\n\n全書招牌＝一套可重用的失敗模式編號（定義在 `style-guide.md` 基準表）。三處必須永遠同步，改一處要回頭改另兩處：\n1. `style-guide.md` 的 F1–F14 基準表（定義來源）。\n2. `appendix-b-failure-modes.md`（每個 F 的詳目＋本書命中案例清單）。\n3. `ch23` 的全書 F1–F14×案例總表。\n\n各章 `## 故障解剖` 的「對應模式」只能引用 F1–F14、不得自創編號。要新增模式必須先在 style-guide 登記、再同步上述三處。\n\n## 二、案例取材原則（不可違反）\n\n刻意**排除** jserv《軟體失效案例》合集（https://hackmd.io/@sysprog/software-failure）已收的案例，**永不採為主案、也不在內文當範例引用**：Therac-25、Ariane 5、Mars Climate Orbiter、Patriot 飛彈、Pentium FDIV、AT&T 1990、北美大停電 2003、Knight Capital、Toyota 暴衝、Mars Polar Lander、787、Y2K、Ping of Death、英國郵局 Horizon、PayPal、台股熔斷、Flexcoin、PSY 計數溢位。掃描時若發現這些字串出現在 `ch*.md` / `appendix*.md`，視為迴歸錯誤、須清除（共因失效的範例改用挑戰者雙 O-ring（ch14）、單位錯誤改用金姆利（ch07）、級聯改用 Cloudflare/CrowdStrike（ch10/ch13））。\n\n## 三、脆弱事實清單（最常被挑戰、一律 hedge，以 landscape 為準）\n\n| 事實 | 書中寫法（hedge） | 章 |\n|---|---|---|\n| 車諾比死亡數 | 短期確認約 31；長期可歸因估計差異極大（約數千～數萬），給範圍、不釘單一數 | ch17 |\n| 德州電網死亡／損失 | 死亡官方約 210–246 vs 研究約 700（給範圍）；損失約 800–1,300 億美元（估計） | ch12 |\n| Morris 蠕蟲受影響台數 | 估約 6,000 台／約當時連網 10%（period estimate，標估計） | ch18 |\n| Sleipner 損失金額 | 估計達數億美元（常見引述約 7 億，未必有單一權威出處） | ch09 |\n| Schiaparelli IMU 飽和時長 | 「飽和持續超出設計預期時間」，不釘秒數（各來源約 1 秒；推進器點火約 3 秒是另一回事，勿混） | ch08 |\n| 閃電崩盤歸因 | 觸發＝大型賣出演算法×HFT 撤流動性；Sarao 的 spoofing 貢獻有爭議（2010 報告不依賴他） | ch11 |\n| VSE 週五收盤值 | landscape 採 524.881（McCullough 系），另有 524.811 變體；以 landscape 為準、變體於延伸閱讀註明 | ch21 |\n| CrowdStrike 影響台數／損失 | 估約 850 萬台；經濟損失（如約 54 億美元）皆第三方估計、標估計 | ch13 |\n| 737 MAX 權限放大 | 0.6°→2.5°、可每約 5 秒重複、無累積上限（多源一致） | ch04 |\n\n所有死傷／金額／規模類數字一律標估計或給範圍。歷史與時效性事實以 `landscape-2026-06.md` 為事實基準；查到需修正時：更新 landscape →依本表同步引用章→同步 `appendix-a-timeline.md`（**它是數字的第二存放處，最易與章節脫鉤，務必一起改**）→在下方掃描日誌記一行。重大修正（推翻既有基準）需兩個獨立來源。\n\n## 四、結構同步雷區\n\n- **全書 ASCII 路線圖**出現在 **7 個 Part 首章＋outline 基準圖**：`ch01、ch04、ch07、ch10、ch14、ch18、ch22` ＋ `_meta/outline.md`。改路線圖須同步 8 處。\n  - **連接線只能用 `▼ ▲ ◄`（不可用 `↓ ↑ ←`）**——`check_diagrams.py` 只把 `▼▲` 認作垂直連接、把裸 `↓↑` 判為「未連」而 FAIL（2026-06-13 教訓：ch04 一度用裸箭頭 FAIL）。基準圖在 outline.md，每個 Part 首章照抄、只把 `◄你在這裡` 標到該 Part。\n  - Part VI 含 4 章（ch18–21，含 ch21 靜默的錯誤）；Part VII 為 ch22–23。\n- **ch23 全書 F1–F14×案例總表**、**appendix-b**、**style-guide F 表**三者同步（見第一節）。\n- **附錄 A 年表**是各案數字的第二存放處——landscape 數字一改，年表要同步（見第三節）。\n- 章節編號：23 章。ch21＝靜默的錯誤（VSE，2026-06-13 依 agy 第二意見補入；resilience 由 ch21→ch22、finale ch22→ch23 已全書重編號）。日後再插章須做同樣的高到低 token 重編號＋更新所有 `（見 chNN）`、路線圖、附錄。\n\n## 五、渲染與工具慣例\n\n- 動到 ASCII 圖後（從本目錄 `books/systems-failure/` 執行）：\n  `python3 ../../../tools/md-reader/check_diagrams.py book-src`（**傳目錄非單檔**；exit 0 才算過；CJK=2 欄規則）。\n- 動到任何內容：`python3 ../../../tools/md-reader/build_reader.py web/book.config.json` 重打包，再 `python3 ../../../tools/md-reader/build_shelf.py` 更新書架。\n- `web/index.html` 與專案根 `bookshelf.html` 是產生物，**不要手改**。\n- 簡體詞 lint 用逐字元比對（shell grep 對繁簡同形字如 偏/差/線/誤 會誤報）。\n- 內部註記（`⚠️ 待協調者複核`）一律不得留在成書 `ch*.md`／`appendix*.md`（會在閱讀器顯示）；P3 已全數移除，日後新增章節須再掃一次。\n- 程式碼／設定檔／註解一律英文；書內容繁體中文（台灣用語、禁簡體詞、技術名詞留英文）。\n\n## 六、掃描協定\n\n「掃描書的時效性」＝逐案重核 landscape 的硬事實（尤以近年事故為先：CrowdStrike 2024、SolarWinds、Log4Shell、德州電網），更新後依第三節同步鏈處理。結構掃描＝跑 check_diagrams（圖）＋ grep 排除案例（取材原則）＋ grep `待協調者複核`（內部註記殘留）＋ 骨架標題 grep。\n\n## 七、掃描日誌\n\n- **2026-06-13｜建書**：P1–P5 完成。23 章（ch01–ch23）＋3 附錄。landscape 三輪查證（25＋8＋1=34 案，I 段案例 34＝VSE）。check_diagrams exit 0（21 圖）。簡體 0、排除案例 0、待協調者複核 0、骨架 22→23 章齊。agy 結構審＋5 WebSearch 事實抽查（于伯林根 TCAS 優先規則、閃電崩盤 W&R/Sarao、德州 4 分 37 秒、阿波羅 1202、塔科馬 flutter）全過。agy 建議補「靜默資料損毀」→補 ch21（VSE），resilience/finale 重編號為 ch22/ch23。fact baseline 三處仍可硬化：Sleipner $700M、Schiaparelli 飽和秒數、AT&T（已排除，不再使用）。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《正常意外：複雜系統如何崩壞，以及一個工程師該怕什麼》\n形態：23 章、七個 Part、3 個附錄。欣賞與直覺書（不是災難百科、不是教科書、不獵奇；純敘事＋紙上思辨，無可執行 lab）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；硬事實以 `landscape-2026-06.md` 為錨；失敗模式編號（F1–F14）以 style-guide 的基準表為準。\n\n> **案例取材原則（2026-06-13 定案）**：刻意避開 jserv《軟體失效案例》合集（https://hackmd.io/@sysprog/software-failure）已收的案例（Therac-25、Ariane 5、Mars Climate Orbiter、Patriot、Pentium FDIV、AT&T 1990、北美大停電 2003、Knight Capital、Toyota、Mars Polar Lander、787、Y2K、Ping of Death、Horizon、PayPal、台股熔斷、Flexcoin、PSY 計數溢位等），改用同樣精彩、但該合集未收的案例（多帶翻案點）。新名單各案均不在該頁。\n\n## 全書敘事弧\n\n機器與組織都不懂「複雜度」會反噬——這條鴻溝就是災難的引擎。\n**先給工具**：正常意外、瑞士起司、漂移到失效是讀完全書的眼鏡（ch01–02），而且這些模式**早在電腦出現前就在橋樑與走道上演過**（ch03）→ 然後一個 Part 一種失敗形狀：**用來保護的系統反而殺人 / 自動化與人相互矛盾**（737 MAX、法航 447、于伯林根空中相撞；ch04–06）→ **一個數字、一個單位、一次感測器飽和、一次建模誤差就崩塌**（金姆利滑翔機、Schiaparelli 火星著陸器、Sleipner A 平台；ch07–09）→ **緊耦合讓局部失效級聯成全域**（Cloudflare 一個 regex、2010 閃電崩盤、德州電網、雲端連鎖；ch10–13）→ **組織慢慢漂移到失效、把僥倖當常態**（挑戰者、哥倫比亞、三哩島、車諾比；ch14–17）→ **看不見的縫：安全與供應鏈**（Morris 蠕蟲、Heartbleed、SolarWinds/Log4Shell、溫哥華證交所靜默截斷；ch18–21）→ 收官：**怎麼蓋會「安全地壞」的系統**（韌性工程＋阿波羅 11 的反例；ch22）、**正常意外與你**（終章組裝完整失敗模式目錄，把「怕」翻成「怎麼做」；ch23）。\n\n兩條暗線貫穿（不另立章）：\n- **技術線**：一個變數、一個單位、一個飽和的感測器、一條 regex、一段建模假設——微觀的技術細節如何放大成宏觀災難。\n- **組織線**：生產壓力、僥倖正常化、責任分散、權威衝突、調查文化——人與組織的失敗模式，比技術 bug 更致命也更頑固（多數調查報告的結論都落在這條線）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 跨章基準（一致性掃描的依據；各章不得另創數字與歸屬，一律照 landscape）\n\n**核心隱喻「失敗模式語言」**——每章 `## 故障解剖` 把災難對應到 F1–F14（基準表在 style-guide），全書累積成 ch23 的總目錄與附錄 B。\n\n**全書統一命名 / 理論基準**：\n\n| 概念 | 全書統一說法 | 首次定調 |\n|---|---|---|\n| 核心主張 | 「正常意外」：互動複雜度高×緊耦合的系統，嚴重事故是統計上遲早的常態 | ch01（Perrow 1984《Normal Accidents》） |\n| 多重失效 | 「瑞士起司」：災難需要多層防禦的孔洞同時對齊（Reason）；「複雜系統永遠運行在退化模式」（Cook） | ch01 |\n| 漂移 | 「漂移到失效」（Dekker）／「偏差正常化」（normalization of deviance，Vaughan 研究挑戰者提出） | ch02 定義、ch14 主打 |\n| 自動化的諷刺 | irony of automation（Bainbridge 1983）：自動化拿走操作員的練習與狀況意識 | ch05/ch06 |\n| 根因迷思 | 「單一根因」是錯的問法；要問「為什麼每層防禦都沒擋住」（blameless / just culture，Dekker） | ch02 |\n| 韌性 | 不是「不會壞」，是「安全地壞」：graceful degradation、blast radius、bulkhead、回退 | ch22 提出、ch23 收束 |\n\n**關鍵硬事實基準（最終值一律以 landscape-2026-06.md 為準；此處為骨架。第二輪 8 案待 landscape 回填）**：\n- 737 MAX：Lion Air 610（2018-10-29）＋Ethiopian 302（2019-03-10），共 346 死；MCAS 單一 AoA 感測器、權限自 0.6° 暗中放大到 2.5°、可重複觸發、對飛行員隱藏。\n- 法航 447：2009-06-01，228 死；pitot 結冰→空速不一致→自駕脫離、降為 alternate law→機組持續拉桿失速；失速警告反直覺（推頭響、拉桿停）。\n- 于伯林根：2002-07-01，71 死；TCAS（Tu-154 climb／DHL descend）與塔台指令（要 Tu-154 下降）衝突；Skyguide 單一管制員、雷達降級、電話中斷。事後確立 TCAS RA 優先於 ATC。〔待 landscape〕\n- 金姆利滑翔機：1983-07-23，Air Canada 143，0 死；燃料以磅當公斤（錯用換算係數）＋FQIS 油量錶失效靠人工量；雙引擎熄火後無動力滑翔迫降成功。〔待 landscape〕\n- Schiaparelli：2016-10-19；IMU 飽和→姿態估計錯→積分出負高度→誤判已著陸→提早關推進器→自約 3.7 km 墜落（約 540 km/h）。〔待 landscape〕\n- Sleipner A：1991-08-23；有限元素分析低估 tricell 牆剪力（約 47%）→配筋不足→壓潰沉沒；0 死（無人測試）；損失約數億美元（給範圍）。〔待 landscape〕\n- Cloudflare：2019-07-02；WAF 規則含災難性回溯 regex→全球 CPU 100%→代理離線約 27–30 分；全球同步部署；以 kill switch 止血。〔待 landscape〕\n- 2010 閃電崩盤：2010-05-06；道瓊數分鐘跌約 998–1000 點（約 9%）約 36 分內大致回補；觸發為大型自動賣單（E-mini，約 41 億美元，無價格/時間限制）＋HFT 撤流動性；歸因有爭議（W&R 演算法 vs Sarao spoofing，需 hedge）。〔待 landscape〕\n- 德州電網 2021：寒潮 Uri（約 2021-02-14~19）；氣井/電廠結凍離線＋需求暴增→ERCOT 大規模強制卸載數日（險些全網失控）；死亡數有爭議（官方約 210–246 vs 研究約 700，給範圍）；根因含未做防寒（2011/1989 已警告＝偏差正常化）、近乎孤島電網、氣電互賴循環依賴。〔待 landscape〕\n- 雲端連鎖（ch13 對照案）：CrowdStrike 2024-07-19（Falcon 內容更新→Windows 崩潰、估約 850 萬台、非攻擊）；AWS S3 us-east-1 2017（除錯指令打錯參數移除過多容量、控制台本身依賴 S3）；Meta BGP 2021、Fastly 2021-06-08（潛伏 bug＋單一客戶設定觸發→約 85% 網路回錯）。\n- 挑戰者 1986-01-28，7 死；O-ring 低溫失效＋偏差正常化＋發射前夜電話會議。\n- 哥倫比亞 2003-02-01，7 死；發泡材撞擊熱防護＋CAIB 認定組織病灶（與挑戰者同型）。\n- 三哩島 1979-03-28，無立即死亡；PORV 卡開＋指示燈顯示「指令」非「閥位」（Perrow 原型案例）。\n- 車諾比 1986-04-26；安全測試＋停用保護＋正空泡係數與控制棒石墨尖端設計缺陷＋AZ-5 觸發正回授；死亡數多種口徑（嚴格 hedge）；INSAG-7 把歸因由「操作員失誤」翻為「設計缺陷為主」。\n- Morris 蠕蟲 1988-11-02；fingerd 緩衝區溢位＋sendmail debug＋過高再感染率拖垮主機；估數千台（period estimate，hedge）。\n- Heartbleed 2014（CVE-2014-0160）；OpenSSL heartbeat 缺邊界檢查可 over-read 記憶體；關鍵基礎設施長期人力/資金不足。\n- SolarWinds/SUNBURST 2020；建置流程被植入、經簽署的合法更新散佈；下游數千機構。\n- Log4Shell 2021（CVE-2021-44228）；log4j 的 JNDI lookup 使被記錄字串可觸發遠端載入執行；無所不在＝blast radius 巨大。\n- 溫哥華證交所指數（VSE，1982–1983）：指數以 floor() 截斷取代 round()、每日數千次重算、誤差單向累積；22 個月由 1000 默默漂到 524.881（真值約 1009.811），1983-11-25 修正後重開為 1098.892；監控全綠卻一直錯（靜默資料損毀）。\n- 阿波羅 11 1969-07-20；1201/1202 程式告警＝導航電腦執行緒過載，**優先權排程重啟、丟棄低優先工作、保住關鍵任務 → 成功著陸**（正面反例；非當機）。\n\n**全域不涵蓋**（任何章都不展開，最多一句話＋指向延伸閱讀）：\n- 該領域的操作教學（怎麼開飛機、怎麼運轉反應爐、怎麼寫飛控）——本書講「為什麼崩壞」，不教操作。\n- 純政治／陰謀論式歸因——只取調查報告支持的技術與組織因素。\n- 死傷的血腥細節與煽情——死傷當人寫、克制處理。\n- 純財經市場機制（如 HFT 策略細節）——閃電崩盤只取「自動代理正回授與失控」這一面。\n- 純資安攻防技巧（exploit 寫法）——Morris/Heartbleed/供應鏈只取「系統性脆弱與帳單」這一面。\n- AI/ML 模型內部——指向讀者書架上的 AI Infra 書。\n- jserv 合集已收的案例（見頁首取材原則）——一律不採用為主案。\n\n**替補名單（gate 時可換入；均不在 jserv 合集）**：Mariner 1（1962「少一條橫線」翻案）、溫哥華證交所指數截斷誤差、Genesis 探測器（加速度計裝反）、Qantas QF72（ADIRU 突波）、博帕爾（化工，偏 Part V）、Deepwater Horizon（偏 Part V）、Fukushima（偏 Part V/核能）、Slammer 蠕蟲 2003、倫敦救護車派遣系統 1992。\n\n---\n\n## Part I — 框架與前傳（ch01–03）\n\n### ch01 — 正常意外：為什麼複雜系統注定會崩壞（序章）\n- **目標**：讀完能說出本書的讀法——嚴重災難幾乎從不是單一原因，而是多層防禦的孔洞對齊；在「互動複雜度×緊耦合」高的系統裡，意外是內建的常態。能講出三件全書工具：正常意外、瑞士起司、失敗模式語言。能畫出全書地圖。\n- **必涵蓋**：Perrow《Normal Accidents》核心（互動複雜度 × 緊耦合的二維分類）；Reason 瑞士起司模型；Cook〈How Complex Systems Fail〉幾條核心（複雜系統永遠運行在退化模式、災難需多重失效合謀、根因是事後建構）；全書 ASCII 路線圖（基準圖首次出場）＋失敗模式語言 F1–F14 的概覽；用一個讀者熟悉的當代縮影破題（一次看似單因、其實多層孔洞對齊的線上 incident）。\n- **不涵蓋**：任何具體歷史災難的細節（從 ch03 開始）；解剖工具的完整方法（ch02）。\n- **橋接**：你做過 postmortem——你知道「真正的根因」永遠不只一個，最後總是寫成一串 contributing factors。本書就是這件事的跨領域、七十年放大版。\n- **主打模式**：全套概覽（F1–F3 為核心）。\n- **紙上推演**：把你經手過的一次 incident 用「瑞士起司」重畫；用 Perrow 的二維分類把你維運過的系統放上座標；口頭講「為什麼『找出那個犯錯的人』是錯的問法」。\n\n### ch02 — 解剖一場災難的工具：根因、人為疏失與漂移\n- **目標**：能用一套方法讀任何事故報告：分辨潛伏條件 vs 觸發、看穿「人為疏失」這個結論的空洞、理解 blameless / just culture 為什麼是工程必要、認識「漂移到失效」與「偏差正常化」。\n- **必涵蓋**：root cause 的迷思（線性因果鏈不適用於複雜系統）；「人為疏失」作為調查終點的危險（hindsight bias、把系統問題歸到個人）；Dekker 的 just culture 與「新舊兩種安全觀」；normalization of deviance（Vaughan，預告 ch14）；drift into failure；事故報告該怎麼讀。\n- **不涵蓋**：具體災難（舉例點到即可）；韌性工程正面解方（ch22）。\n- **橋接**：你寫過／讀過 postmortem 範本——「blameless」那欄不是客套，是因為一旦追究個人，你就再也拿不到真相，下一次同型事故無法預防。\n- **主打模式**：F6、F8、F13（方法論層）。\n- **紙上推演**：把一句「都是某操作員的疏失」改寫成三條系統條件；對帳你的 oncall/postmortem 流程哪些設計在對抗 hindsight bias；反事實：若無 blameless 文化，事故資料會如何系統性失真。\n\n### ch03 — 機器之前就有的崩壞：塔科馬海峽橋與凱悅走道\n- **目標**：建立「這些失敗模式早在軟體出現前就普遍存在」的縱深。能講清楚兩個被廣泛誤解的經典案例的真實機制。\n- **必涵蓋**：**塔科馬海峽橋（1940）**——破除「共振」迷思：真實機制是 aeroelastic flutter（氣動彈性顫振、負阻尼自激），不是外力共振（Billah & Scanlan 已糾正教科書，照 landscape）；F2 互動複雜度。**凱悅麗晶走道倒塌（1981，堪薩斯城，114 死）**——一個連接細節的設計變更（單根吊桿改兩段）讓接點受力翻倍；F9 介面/假設＋F12 變更即觸發＋責任分散。兩案合講：物理世界早就示範了 flutter（湧現的互動）與「一個小改動放大成災難」。\n- **不涵蓋**：結構工程計算教學；其他橋樑/建築事故（點到）。\n- **橋接**：塔科馬的 flutter＝你壓力測試時遇過的「正回授把小擾動放大到失控」（retry storm、自激震盪）；凱悅的吊桿改動＝一個「看起來等價」的重構 PR 其實改了受力結構——你 review 最怕的「應該一樣吧」。\n- **主打模式**：F2、F9、F12。\n- **紙上推演**：用 flutter（自激）而非共振（外驅）重講塔科馬；找出「凱悅是偷工減料」這說法漏掉了什麼（是設計變更＋溝通斷裂）；對帳你做過哪個「看似等價」的改動其實悄悄改了系統的負載分佈。\n\n## Part II — 安全系統即兇手（ch04–06）\n\n### ch04 — 波音 737 MAX / MCAS：一個感測器，兩架飛機，346 條人命\n- **目標**：能講清楚一個「幫你」的自動系統如何在單一感測器失效時反覆壓機頭、而飛行員不知道它存在；理解認證流程與商業壓力如何讓這個設計過關。\n- **必涵蓋**：MCAS 的由來（LEAP-1B 引擎改變氣動、用軟體修正操縱手感以維持與舊 737 型別共通性——商業動機）；單一 AoA 感測器（F10）無充分冗餘；權限自 0.6° 暗中放大到 2.5°、可每約 5 秒重複觸發、無累積上限；飛行員多不知其存在、訓練不足（F5/F11）；兩起空難共 346 死；FAA 透過 ODA 自我認證的問題（組織線）。\n- **不涵蓋**：航空氣動學細節；波音財報史（只取與安全決策相關）。\n- **橋接**：MCAS＝一個沒寫進文件、預設開啟、靠單一輸入源就採取激烈行動的「自動修正」。你上線過這種「自動幫忙」的機制嗎——自動 failover、自動 scaling——它在輸入訊號錯誤時會不會把系統推下懸崖？\n- **主打模式**：F4、F10、F5、F13。\n- **紙上推演**：把 MCAS 對應到「依賴單一健康檢查訊號就採取激烈動作」的自動化；反事實：若用雙 AoA 並在分歧時停用 MCAS；找出「飛行員技術不足」甩鍋說法的問題。\n\n### ch05 — 法航 447：自動駕駛交還控制權的那一刻\n- **目標**：能講清楚「自動化的諷刺」——pitot 結冰讓空速失效、自駕脫離，把一架好飛機交還給已失去狀況意識的機組，終致失速墜海。\n- **必涵蓋**：2009-06-01、228 死；pitot 結冰→空速不一致→autopilot/autothrust 脫離、降為 alternate law（喪失保護包絡，F9/F11）；機組在高空失速中持續拉桿（狀況意識喪失，F5）；側杆不互聯；失速警告反直覺（推頭響、拉桿停）；BEA 結論。\n- **不涵蓋**：飛行操作教學；空巴 vs 波音飛控哲學全面比較（點到）。\n- **橋接**：法航 447＝「平時自動化幫你扛，等它扛不住、把一個你很久沒手動處理的爛攤子在最糟時刻丟回給你」。你的 autoscaling/自動 failover 真出事、自動化放棄時，團隊還有手動接管的肌肉記憶嗎？\n- **主打模式**：F5、F9、F11。\n- **紙上推演**：口頭講「為什麼自動化程度越高，罕見故障可能更致命」；對帳哪個系統「平時全自動、真出事要人工接管」而那流程多久沒演練；反事實：若有清楚失速告警與一致心智模型。\n\n### ch06 — 于伯林根空中相撞：當塔台與自動防撞系統下達相反指令\n- **目標**：能講清楚兩個「權威」（人類管制員 vs TCAS 自動防撞）下達相反指令時、飛行員該信誰的致命模糊；理解這是互動複雜度＋監控降級＋人因壓力的合謀，不是「某國飛行員的錯」。\n- **必涵蓋**：2002-07-01、Tu-154 與 DHL 757、71 死（含多名兒童）；TCAS RA 要 Tu-154 爬升、DHL 下降；Skyguide 單一管制員同時看兩台、主雷達降級維護中、電話系統不通（F11 監控降級＋F13 人力不足）；管制員晚發現後要 Tu-154 下降、與其 TCAS 爬升相反；俄方機組依訓練/文化聽從人類管制員而下降、DHL 依 TCAS 下降→兩機同時下降相撞（F2 互動複雜度＋F5 自動化 vs 人類權威衝突）；事後 ICAO 確立 **TCAS RA 優先於 ATC**；管制員 Peter Nielsen 兩年後遭喪親父親 Kaloyev 殺害（克制陳述）；BFU 報告。\n- **不涵蓋**：空管系統教學；TCAS 演算法細節（點到）。\n- **橋接**：兩個都「對」的權威給你相反指令——你信哪個？這就是你系統裡「兩個健康檢查/兩套監控對同一狀態給出矛盾結論」時的困境（手動 override vs 自動決策該誰贏、override 的優先順序有沒有明確定義）。\n- **主打模式**：F2、F11、F5、F13、F3。\n- **紙上推演**：口頭講「為什麼『聽人』與『聽機器』都不算錯、卻一起釀災」；對帳你系統裡有沒有「人工 override 與自動機制可能衝突且優先權未定義」之處；設計題：當兩個權威矛盾，怎麼用明確的優先規則消除模糊（如 TCAS-over-ATC）。\n\n## Part III — 一個數字，一場崩塌（ch07–09）\n\n### ch07 — 金姆利滑翔機：把公斤當成磅，在三萬五千呎沒了油\n- **目標**：能講清楚一個單位換算錯誤（磅 vs 公斤）疊加油量錶失效，如何讓一架噴射客機在巡航中燒光燃料；同時看見災難的另一面——好的設計餘裕＋人的技藝讓它「安全地壞」（無動力滑翔迫降成功）。\n- **必涵蓋**：1983-07-23、Air Canada 143、Boeing 767、0 死；FQIS 油量錶故障需人工量油（dripstick）＋加油時用錯密度換算係數（把該用的公斤算成磅，照 landscape 精確化）→實際油量遠少於以為的（F9 單位假設＋F8 油量錶失效的潛伏條件＋F3 多道本可攔截的檢查都沒擋）；雙引擎熄火、RAT 提供有限液壓；機長以滑翔經驗側滑（forward slip）降高、迫降已停用的金姆利舊機場（當時有人在跑道）；對照 ch22：這是「韌性」的一面——餘裕與技藝。\n- **不涵蓋**：飛行操作教學；767 系統細節（點到）。\n- **橋接**：「換算係數用錯」＋「該自動顯示的量錶壞了、改人工估」——這正是你最熟的：一個 magic number 寫錯單位、又少了自動校驗（你用帶單位的型別/contract test 在防這個）。但金姆利也給你正面教材：系統有滑翔餘裕、人有備援技能，才沒有變成墳場。\n- **主打模式**：F9、F8、F3；正面：graceful degradation（預告 ch22）。\n- **紙上推演**：把「磅當公斤」對應到你遇過的單位/型別假設事故；口頭講「為什麼這不是『加油員的錯』而是系統缺了單位的型別與交叉校驗」；反事實：若油量錶正常 or 換算用帶單位型別，這趟還會沒油嗎。\n\n### ch08 — Schiaparelli 火星著陸器：一個飽和的感測器，讓電腦以為自己已落地\n- **目標**：能講清楚一個慣性量測單元（IMU）短暫飽和產生的壞數值，如何被導航電腦積分成「負高度」、讓著陸器在三公里高空誤判已著陸而關掉推進器墜毀；理解「未做合理性檢查的感測器輸入＋緊耦合」如何把一個壞數字直接放大成墜毀。\n- **必涵蓋**：2016-10-19、ExoMars EDM；降落傘階段 IMU 旋轉率超過可量測上限→飽和→姿態估計錯→GNC 積分出**負高度**（F9 表示範圍的縫＋F8）；邏輯據此判定「已著陸」：提早拋傘與背殼、制動推進器只點火約 3 秒（應約 30 秒）、切到地面模式——其實還在約 3.7 km 高→自由落體、約 540 km/h 撞擊（F1 緊耦合：一個壞數字直通推進器關閉、F10 過度信任單一估計）；ESA 調查結論。\n- **不涵蓋**：EDL 工程細節；火星探測史（點到）。\n- **橋接**：一個飽和/溢位的感測值沒被 clamp、沒做 sanity check，就被下游當真直接行動——你一定見過「上游傳來一個不可能的值（負數、超大、NaN），下游照單全收做出災難性決策」。你的輸入有沒有邊界檢查與合理性閘門？\n- **主打模式**：F9、F8、F1、F10、F11。\n- **紙上推演**：口頭講「為什麼『負高度』本該被一行合理性檢查擋下」；對帳你系統裡有沒有「信任上游數值、未 clamp/未驗證」之處（接 ch07 的單位、ch16 的儀表）；設計題：在哪一層加什麼閘門（範圍檢查、飽和標記、多感測器交叉）。\n\n### ch09 — Sleipner A 平台：一個有限元素模型，沉掉數億美元\n- **目標**：能講清楚一個工程模擬（有限元素分析）低估了關鍵接點的剪力，如何讓一座巨型混凝土海上平台在測試中壓潰沉沒；理解「模型不是現實」與「安全係數被吃掉在看不見的地方」。\n- **必涵蓋**：1991-08-23、挪威峽灣下沉測試中崩裂沉沒、地震儀約 3.0、0 死（無人）；根因——NASTRAN 有限元素分析對 tricell（連接浮力艙的三角胞）牆體剪力低估約 47%、配筋不足、在水壓下壓潰（F9 模型 vs 現實的縫＋F8 潛伏設計誤差＋F2）；損失約數億美元（給範圍，照 landscape）；SINTEF/官方調查。\n- **不涵蓋**：結構/有限元素數學教學；離岸工程史（點到）。\n- **橋接**：「模擬/壓測通過了，所以上線一定沒事」——Sleipner 告訴你：被驗證的是**你的模型對現實的假設**，不是現實本身。你的容量規劃、壓測場景、效能模型，有沒有一個被低估 47% 的「tricell」藏在沒人細看的角落（接 ch07 重用假設的精神）？\n- **主打模式**：F9、F8、F2、F3。\n- **紙上推演**：口頭講「為什麼『模擬通過』不等於『現實安全』」；對帳你做過的容量/效能模型哪裡的假設最可能與現實偏離；反事實：若對關鍵接點加大安全係數或用更細網格。\n\n## Part IV — 連鎖反應：當系統互相拖垮（ch10–13）\n\n### ch10 — Cloudflare 的一條 regex：災難性回溯如何在數分鐘內拖垮半個網路\n- **目標**：能講清楚一條含災難性回溯的正規表達式如何讓全球邊緣節點 CPU 衝到 100%、半個網際網路斷線；理解「全球同步部署」如何把一個 CPU 病態放大成全域災難。\n- **必涵蓋**：2019-07-02、WAF 受管規則部署含一條 catastrophic backtracking 的 regex→全球機器 CPU 100%→代理離線約 27–30 分（F2 regex 的指數級回溯病態＋F12 變更即觸發）；該規則一次全球推送、無分批（F14 blast radius）；以全球 kill switch 關掉 WAF 止血；Cloudflare 自家透明 postmortem；與 ch18 Morris、ch11/ch13 的對照（自我放大 vs 同步放大）。\n- **不涵蓋**：regex 引擎實作細節（點到，接讀者對自動機的興趣）；Cloudflare 其他事故（明確區分 2019-07-02 與 2020 BGP、2025 設定檔事故）。\n- **橋接**：一條沒設防的 regex 在熱路徑上、輸入夠刁鑽就吃光 CPU——你一定踩過或怕過 ReDoS。再加上「一次推全球、沒有 canary」就是把 CPU 炸彈同時投到每個節點。你的規則/設定變更有沒有分批與 CPU 護欄？\n- **主打模式**：F2、F12、F14、F1。\n- **紙上推演**：口頭講「為什麼災難性回溯是指數級、與一般慢查詢不同」；對帳你系統裡有沒有跑在熱路徑、吃使用者輸入的 regex/解析；設計題：分批推送＋regex 逾時/複雜度上限各擋住哪一段。\n\n### ch11 — 2010 閃電崩盤：自動代理的正回授，幾分鐘蒸發近兆美元\n- **目標**：能講清楚一批自動交易代理如何在缺乏價格/時間限制與流動性護欄下，把一筆大賣單放大成「燙手山芋」式正回授、讓道瓊數分鐘崩跌再彈回；理解多個自動代理的非預期互動（互動複雜度的金融版）。\n- **必涵蓋**：2010-05-06、道瓊數分鐘跌約 998–1000 點（約 9%）、約 36 分內大致回補；CFTC-SEC 報告：觸發為一筆大型自動賣單（E-mini S&P，約 41 億美元，volume-participation 演算法、無價格/時間限制），與 HFT 互動（先提供後撤回流動性、hot-potato，F7/F2/F5）；歸因爭議（W&R 演算法 vs 後來 Sarao spoofing 指控，2015；嚴格 hedge，照 landscape）；事後催生單一個股熔斷／Limit Up-Limit Down。\n- **不涵蓋**：HFT 策略/市場微結構教學；spoofing 法律細節（點到）。\n- **橋接**：一群各自「理性」的自動代理，在無護欄下互相觸發、把小擾動放大成崩盤——這是你最熟的 retry storm／thundering herd 的金融版（自動 scaling、自動退單、自動重試彼此踩踏）。你的自動化代理之間有沒有熔斷與速率護欄，防止彼此正回授？\n- **主打模式**：F7、F2、F5、F1。\n- **紙上推演**：把「燙手山芋」對應到你遇過的自動化正回授（retry storm/快取踩踏）；口頭講「為什麼歸因到單一交易者過度簡化」；設計題：熔斷（circuit breaker）、速率限制、隨機抖動各打斷哪一段正回授。\n\n### ch12 — 德州電網 2021：早就被警告過的那場寒潮\n- **目標**：能講清楚一場寒潮如何讓發電與天然氣供應同時結凍離線、需求暴增、電網險些全面失控；理解「明知該防寒卻一再不做」＝偏差正常化，以及孤島電網與氣電互賴的緊耦合。\n- **必涵蓋**：寒潮 Uri（約 2021-02-14~19）、ERCOT；氣井/管線/電廠結凍離線＋需求暴增→ERCOT 大規模強制卸載數日以避免全網不可控崩潰（險些數分鐘內失控，F1/F7）；防寒不足是 2011、1989 寒潮後**早被點名的已知問題**卻未強制落實（F6 偏差正常化＋F8 潛伏）；ERCOT 近乎孤島、互聯有限，無法大量外援（F10/F14）；氣電互賴（電廠要氣、氣田要電）＝循環依賴（F2）；死亡數爭議（官方約 210–246 vs 研究約 700，給範圍）；FERC/NERC 報告。\n- **不涵蓋**：電力市場/電網工程教學；德州能源政治（只取與防寒決策相關）。\n- **橋接**：「2011 年就警告過要防寒，但沒強制、也沒人追」——這是基礎設施版的「已知問題、暫時沒爆、大家習慣了」（接 ch14 偏差正常化）。還有循環依賴（A 要 B、B 要 A）：你畫過服務依賴圖、找過循環依賴嗎（接 ch13）？\n- **主打模式**：F6、F8、F10、F14、F2、F7。\n- **紙上推演**：口頭講「為什麼這場停電的根因在 2011 年就寫好了」；對帳你系統裡的循環依賴與「已被正常化、遲早出事」的已知問題；反事實：若 2011 後強制防寒。\n\n### ch13 — 雲端連鎖：當別人的機房就是你的單點故障\n- **目標**：能講清楚現代雲端時代的級聯：一次內容更新（CrowdStrike）、一個打字錯誤的指令（AWS S3）、一次設定推送（Meta BGP／Fastly）如何讓全球同時斷線；理解 blast radius 與單一栽培（monoculture）在雲規模下的放大效應。\n- **必涵蓋**：以 **CrowdStrike 2024-07-19** 為主案（Falcon 內容更新觸發 Windows 核心崩潰、估約 850 萬台、航班醫院銀行同時癱瘓；非攻擊、是更新驗證缺陷＋全球同步推送 F12＋F14）；對照 **AWS S3 us-east-1 2017**（除錯指令打錯參數移除過多容量、控制台本身依賴 S3 而無法顯示狀態，F2 隱藏相依）、**Meta BGP 2021**（設定變更撤回路由、連內部工具/門禁都失效）、**Fastly 2021-06-08**（潛伏 bug＋單一客戶設定觸發→約 85% 網路回錯，F8＋F12）；共通主線：規模化＋同質化＋同步推送＝單點打中所有人；「自動更新」是現代版的變更即觸發。\n- **不涵蓋**：BGP/核心驅動協定細節（點到）；各公司商業面。\n- **橋接**：你完全活在這裡——服務跑在 ECS/Lambda/RDS/S3。CrowdStrike 教你「你信任的安全/監控 agent 本身就是一個全球同步的單點」；S3 那次教你「連你的 status page 都可能依賴你正在掛掉的東西」。你的依賴有沒有隱藏循環？「自動更新」是不是一次推全部？\n- **主打模式**：F14、F12、F2、F7。\n- **紙上推演**：畫出你某服務的依賴圖、找出隱藏循環依賴（status/告警依賴被監控對象）；口頭講「為什麼『全球同步自動更新』把可靠性工具變成單點故障」；設計題：canary/分批推送與依賴解耦能擋住上面哪幾起。\n\n## Part V — 漂移到失效（ch14–17）\n\n### ch14 — 挑戰者號：那通發射前夜的電話會議\n- **目標**：能講清楚一個低溫下會失效的 O-ring 早被工程師知道、卻在「偏差正常化」與發射壓力下被一次次接受，最終升空 73 秒解體；理解組織如何「漂移到失效」。\n- **必涵蓋**：O-ring 與低溫硬化、密封失效機制；**normalization of deviance**（Vaughan：每次僥倖過關都把「侵蝕」重新定義為「可接受」，F6）；發射前夜 Morton Thiokol 工程師反對、管理層施壓翻盤的電話會議（F13）；Rogers Commission 與 Feynman 的橡皮圈冰水演示；組織線是主角。\n- **不涵蓋**：固態火箭推進；NASA 預算史（只取與決策相關）。\n- **橋接**：「這個告警每週都響、每次都沒事，我們就把它調成 warning 了」＝偏差正常化。你系統裡哪個「已知問題、暫時沒爆、大家習慣了」的東西正被慢慢重新定義成「正常」？\n- **主打模式**：F6、F13、F3、F8。\n- **紙上推演**：列出團隊三個「已被正常化的偏差」（長期 flaky test、長期高但沒爆的錯誤率）；口頭講「為什麼工程師知道風險卻沒能阻止發射」（是組織動力非無知）；對帳：怎麼分辨「可接受的風險」與「被正常化的偏差」。\n\n### ch15 — 哥倫比亞號：同一個組織，十七年後又來一次\n- **目標**：能講清楚發泡材撞擊熱防護的物理、以及更重要的——CAIB 認定的「組織病灶與挑戰者同型」，說明漂移到失效是文化的頑固復發。\n- **必涵蓋**：2003-02-01 重返大氣解體、7 死；發泡材脫落撞擊機翼前緣 RCC（技術機制）；任務中本可用衛星拍照評估卻被管理層擱置（F11/F13）；CAIB 報告核心——組織文化、僥倖正常化、溝通結構與挑戰者**驚人相似**（F6 復發）。\n- **不涵蓋**：太空梭工程全貌；NASA 改組細節（點到）。\n- **橋接**：你寫過 postmortem、列了 action items——多少真的落實了？哥倫比亞是「同組織十七年後重演同型災難」的鐵證：文化不變，action items 會腐爛，同型事故會回來。\n- **主打模式**：F6、F13、F3、F11。\n- **紙上推演**：翻你團隊一年前某次 postmortem 的 action items、幾項真落實了；口頭講「為什麼『寫了報告』不等於『學到教訓』」；反事實：若任務中批准衛星拍照。\n\n### ch16 — 三哩島：一盞燈騙了所有人\n- **目標**：能講清楚一個卡開的釋壓閥＋一盞「指令已送出」卻被誤讀成「閥門已關閉」的指示燈，如何讓操作員做出一連串「當下合理、事後看全錯」的反應；理解人機介面如何製造錯誤的世界模型。\n- **必涵蓋**：1979-03-28；PORV 卡在開啟、但指示燈只反映「指令」非「閥位」（F11/F9：儀表顯示意圖不是現實）；操作員據錯誤資訊減少冷卻水（在他們以為的情境下合理）；互動複雜度＋緊耦合（Perrow 用此案發展正常意外理論，F2/F1）；近爐心熔毀、改寫核能監管。\n- **不涵蓋**：反應爐物理；核能政策史（點到）。\n- **橋接**：指示燈顯示「我送了關閉指令」而非「閥門真關了」——observability 最危險的謊言：你監控的是**意圖/期望狀態**還是**實際狀態**？dashboard 顯示「已部署」是真在跑，還是只是「指令已送出」（接 K8s desired vs actual）？\n- **主打模式**：F11、F9、F2、F1。\n- **紙上推演**：找出你系統裡「監控期望狀態而非實際狀態」之處（desired vs actual replica）；口頭講「為什麼操作員每個動作當下都合理」（破除事後諸葛）；設計題：怎麼讓儀表反映現實而非意圖。\n\n### ch17 — 車諾比：把安全系統一個個關掉之後\n- **目標**：能講清楚一場安全測試如何在生產壓力下，操作員逐一停用保護、加上一個對操作員隱瞞的設計缺陷，讓「停堆」按鈕 AZ-5 反而觸發爆炸；理解「潛伏設計缺陷＋停用防禦＋生產壓力」三重對齊。\n- **必涵蓋**：1986-04-26；RBMK 正空泡係數（功率升→更多蒸汽→反應更劇烈的正回授，F2）；控制棒石墨尖端「正向 scram」——插入瞬間先增反應性（操作員不知的設計缺陷，F8/F11）；測試中為完成而停用多項保護、低功率不穩定運行（F13＋F6）；按 AZ-5 反而引爆（F4 極端版）；死亡數多種口徑（嚴格 hedge，照 landscape）；INSAG-7 把歸因由「操作員失誤」翻為「設計缺陷為主」。\n- **不涵蓋**：核物理細節；蘇聯政治史（只取與決策/資訊隱瞞相關）。\n- **橋接**：「為了讓測試/部署順利完成，先把這幾個保護暫時關掉」——你關過 health check、停過 circuit breaker、跳過 CI gate 趕上線嗎？車諾比是「為完成任務逐一拆掉安全網」的終極反例，最後按的還是那顆「緊急停止」鈕。\n- **主打模式**：F4、F13、F6、F8、F11、F2。\n- **紙上推演**：列出你曾為趕進度「暫時關掉」的安全機制、有沒有重新打開；口頭講「為什麼 AZ-5 反而引爆」；對帳：你系統有沒有「最壞情況下行為相反」的保護。\n\n## Part VI — 看不見的縫：安全、供應鏈與靜默損毀（ch18–21）\n\n### ch18 — Morris 蠕蟲：第一次，整個網際網路停了下來\n- **目標**：能講清楚 1988 年第一隻網際網路蠕蟲如何用緩衝區溢位＋debug 後門＋過高的再感染率把當時的網路拖垮；理解「同質化」與「一個沒設防的小功能」如何成為全網災難。\n- **必涵蓋**：1988-11-02；傳播向量（fingerd 的 gets() 緩衝區溢位、sendmail debug、rsh 信任關係，照 landscape）；本意非破壞、但**再感染率設定過高**使主機被重複感染癱瘓（F8 一個參數的災難）；Unix 同質化讓單一漏洞通殺（F14 monoculture）；後果（估數千台、CERT 誕生、首例《電腦詐欺與濫用法》定罪）。\n- **不涵蓋**：exploit 實作教學；資安史全貌（點到）。\n- **橋接**：「我只是想估算網路規模，不會造成傷害」＝經典「應該沒事吧」。一個再感染機率參數設錯，善意程式變 DoS。你寫的背景掃描/健康探測/爬蟲，再跑頻率設錯時會不會把自己系統打趴（監控壓垮被監控對象）？\n- **主打模式**：F14、F8、F4、F7。\n- **紙上推演**：口頭講「為什麼一個再感染率參數是核心」；對帳你有沒有讓監控/重試/掃描頻率不當而自我 DoS 的經驗；反事實：若 Unix 生態更異質。\n\n### ch19 — Heartbleed：兩年沒人發現的一個缺漏邊界檢查\n- **目標**：能講清楚 OpenSSL 一個缺失的長度檢查如何讓攻擊者讀取伺服器記憶體（含金鑰）、潛伏約兩年；理解「全世界都依賴、卻幾乎沒人維護/付錢」的關鍵基礎設施脆弱。\n- **必涵蓋**：2014（CVE-2014-0160）；heartbeat 擴充未驗證請求宣稱長度 vs 實際 payload 長度→over-read 回傳鄰近記憶體（F9 缺邊界檢查／F8 潛伏約兩年）；衝擊面（大量伺服器、需輪換金鑰與憑證）；根因組織面——OpenSSL 當時極少維護者與資金（F14＋資源不足，催生 Core Infrastructure Initiative）。\n- **不涵蓋**：TLS 協定細節；密碼學數學（點到讀者興趣）。\n- **橋接**：你天天用 OpenSSL/TLS——它是你整個服務信任鏈的地基，卻長期靠極少數志工維護。你的關鍵相依裡有哪些是「全世界都在用、其實沒人在顧」的單點？你的 SBOM 知道嗎？\n- **主打模式**：F9、F8、F14、F3。\n- **紙上推演**：口頭講「為什麼一個 missing bounds check 能潛伏兩年」；對帳列出你關鍵相依裡維護最薄弱的三個；反事實：若用記憶體安全語言。\n\n### ch20 — 供應鏈即災難：當你信任的更新本身被下毒\n- **目標**：能講清楚現代最難防的失敗模式——你信任的供應商/套件/建置流程被攻陷，惡意透過「正常更新管道」散佈（SolarWinds），或一個無所不在的元件藏遠端執行漏洞（Log4Shell）；理解「信任傳遞」如何成為 blast radius 最大的縫。\n- **必涵蓋**：**SolarWinds/SUNBURST 2020**（建置流程被植入後門、經簽署的合法更新散佈、下游數千機構含政府，F12 極端版＋F3 信任鏈每層都沒檢出）；**Log4Shell 2021（CVE-2021-44228）**（log4j 的 JNDI lookup 讓被記錄字串觸發遠端載入執行；無所不在＝blast radius 巨大，F14）；共通主線：你的安全邊界延伸到每一個你 import 的東西、每一個自動更新管道（SBOM、簽章、最小權限）。\n- **不涵蓋**：滲透測試技巧；威脅情資細節（點到）。\n- **橋接**：你 `npm install` 的每個套件、CI 拉的每個 base image、自動更新的每個 agent——都是信任鏈的延伸。SolarWinds 是「合法簽署的更新本身有毒」，Log4Shell 是「一個你以為無害的 log 函式能被遠端利用」。你的建置流程與相依，信任邊界畫在哪？\n- **主打模式**：F12、F3、F14、F8。\n- **紙上推演**：畫出你一次部署的信任鏈（從 commit 到上線經過幾個你沒驗證的環節）；口頭講「為什麼『經過簽署的更新』不等於『安全的更新』」；設計題：SBOM、相依鎖定、最小權限各縮小哪段 blast radius。\n\n### ch21 — 靜默的錯誤：當監控全綠，數字卻一直默默地錯\n- **目標**：能講清楚全書唯一「不會觸發任何警報」的失敗形狀——監控全綠、服務正常，但資料在背景默默地錯下去；理解單向誤差在高頻重算下如何線性累積、為何「監控正常」完全看不見它。Part VI 的收尾，也是接 ch22 韌性的轉折（最可怕的失敗連 page 都不會響）。\n- **必涵蓋**：**溫哥華證交所指數（VSE，1982–1983，照 landscape 案例 34）**——floor() 截斷取代 round()、每日數千次重算、誤差單向累積；22 個月由 1000 默默漂到 524.881（真值約 1009.811）、1983-11-25 修正後重開 1098.892；F8（潛伏由「沒人盯偏差」決定、無戲劇性觸發）、F11（監控盲區：監控「有沒有數字」非「數字對不對」）、F9（truncation vs rounding 的縫）。\n- **不涵蓋**：金融指數編製細節；浮點 IEEE 754 內部（點到）。\n- **橋接**：最可怕的失敗不會 page 你。silent data corruption／bit rot、split-brain（兩叢集各自接寫、狀態默默分歧、兩邊都「健康」）、單向漂移的計數器、replication divergence。要點名並拆穿的「應該沒事吧」＝**「監控全綠＝系統正常＝資料正確」**；liveness 監控查「服務在不在」，不查「數字對不對」。解方：對帳（reconciliation）、checksum、端到端不變式、quorum＋fencing。\n- **主打模式**：F8、F11、F9（＋F3）。\n- **紙上推演**：找出你系統裡「監控 liveness 而非 correctness」之處；口頭講「為什麼單向截斷會漂、round() 不會」；對帳：你哪個計數器/聚合值可能在默默單向漂移，你怎麼會發現。\n\n## Part VII — 怎麼安全地壞（ch22–23）\n\n### ch22 — 韌性工程：阿波羅 11 號著陸時，電腦過載了——然後它活了下來\n- **目標**：把全書從「怕」翻成「怎麼蓋」。能講清楚正面反例（阿波羅 11 的 1201/1202 告警）如何示範 graceful degradation；能說出韌性工程的核心手段（安全地壞而非不壞）。\n- **必涵蓋**：**阿波羅 11 1969-07-20 著陸**：導航電腦因雷達資料致執行緒過載、跳出 1201/1202 告警；但其作業系統設計成**優先權排程＋重啟時丟棄低優先工作、保住關鍵任務**，過載不致命、著陸成功（F4 的反面：超載時優雅退化，非當機，照 landscape 校正迷思）；由此引出韌性詞彙：graceful degradation、blast radius 控制、bulkhead、backpressure、circuit breaker、冗餘的「多樣性」（不是複製同一份 bug，對照 ch10 同步推送）、canary/分批、chaos engineering、可回退、kill switch；對照前面各章——每個災難都缺了其中某道；金姆利（ch07）作為「人＋餘裕」的韌性對照。\n- **不涵蓋**：具體框架教學（點到）；SRE 全貌（指向《複雜度守恆》與 AI Infra 書）。\n- **橋接**：你的多層 cache library（in-memory→S3→local＋graceful degradation）本身就是正面教材——一層壞了還能退到下一層。本章把你已在做的事放進阿波羅到今天的譜系，並補上你還沒做的幾道（kill switch、混沌測試、依賴多樣性、canary）。\n- **主打模式**：F1–F14 的「反面解方」對照（每個 F 配一個緩解手段）。\n- **紙上推演**：把你維運的一個系統逐一對照「安全地壞」清單（哪裡全有全無、哪裡缺 kill switch、冗餘是否只是同一份 bug 的副本）；口頭講「為什麼阿波羅過載沒釀災、而 Schiaparelli 的壞數字釀了」（優雅退化＋合理性檢查 vs 緊耦合直通）；設計題：給一個現有系統，加哪三道防線性價比最高。\n\n### ch23 — 正常意外與你：一個工程師該怕什麼，又該怎麼睡得著\n- **目標**：總收官。組裝全書失敗模式語言成完整目錄；把焦慮工程師的本能升級成可操作的判斷力；回答「知道了這些，星期一早上我該做什麼不同的事」。\n- **必涵蓋**：F1–F14 完整目錄與全書各章對應總表（每個模式列出本書哪些案例命中——對應一致性掃描）；四條全書主線驗收（正常意外、瑞士起司、漂移、安全地壞）；把「怕」操作化——事前（依賴圖、blast radius、kill switch、contract test、合理性檢查、廢碼清除）、事中（blameless postmortem、看實際狀態而非意圖、override 優先權）、文化（對抗偏差正常化）；誠實結語：你無法消滅正常意外，只能讓系統安全地壞、讓自己在孔洞對齊前看到它；一句話接回 TLA+ 書（把「防禦」寫成不變式、把「災難」定義成安全性質被違反）與機率書（為什麼「百年一遇」會提早到）。\n- **不涵蓋**：新案例（只回收）；工具推銷。\n- **橋接**：回到開頭那次 postmortem——現在你有一整套詞彙與跨領域對照，能在下一次「應該沒事吧」出口前，指出那是哪一號失敗模式正在裝填。\n- **主打模式**：全套總回收。\n- **紙上推演**：用 F1–F14 對你目前負責的系統做一次「孔洞盤點」；口頭把全書講給一個資淺工程師聽（一場災難＝一個模式）；寫下你星期一要改的三件事。\n\n---\n\n## 附錄\n\n### 附錄 A — 災難年表（時間線總表）\n所有案例依時間排列：年份、案件、領域、死傷/規模、主打 F 模式、所在章。**從各章實際內容與 landscape 編纂，不另立事實。** 物理世界前傳（塔科馬 1940、凱悅 1981）到雲端時代（CrowdStrike 2024）一線排開，凸顯模式的跨時代重複。\n\n### 附錄 B — 失敗模式詞彙表（F1–F14 完整目錄）\n每個 F 模式一頁：定義、出處（Perrow/Reason/Cook/Dekker/Vaughan/Bainbridge）、本書命中它的案例清單、一句「在後端/分散式系統裡它長什麼樣」、對應緩解手段（指向 ch22）。**這是全書「貨幣」的權威定義，與 style-guide 基準表同步。**\n\n### 附錄 C — 經典書單與調查報告地圖\n分兩層：(1) 領域經典（Perrow《Normal Accidents》、Reason《Human Error》、Cook〈How Complex Systems Fail〉、Dekker《Drift into Failure》《Field Guide》、Vaughan《The Challenger Launch Decision》、Leveson《Engineering a Safer World》、Bainbridge〈Ironies of Automation〉）；(2) 本書各案的一手調查報告連結（BFU/BEA/CAIB/Rogers/INSAG/CFTC-SEC/FERC-NERC/ESA/SINTEF/Cloudflare 與 Fastly postmortem/RISKS）。以 landscape 驗證過的連結為準。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《正常意外：複雜系統如何崩壞，以及一個工程師該怕什麼》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的**工程災難解剖書**，從**資深後端工程師的「焦慮工程師」視角**讀。每章一場真實災難當一篇可被複述因果的個案；目標是讓讀者看懂——大型災難**幾乎從不是單一原因、單一罪魁禍首**，而是**一群各自無害的小東西恰好對齊**的結果；複雜系統的失效不是異常，是系統在緊耦合與互動複雜度下的**內建性質**。讀完有「原來我那次 incident 的形狀，三十年前的核電廠早就演過一遍」「原來『應該沒事吧』就是訃聞的第一句」的通透感，**而且能用自己的話對另一個工程師講清楚「這場災難為什麼會發生、它跟我維運的系統是同一個形狀」**。\n- **不是**：\n  - 不是災難百科編年帳——不是「某年某處死了多少人」的條列；事件**服務於「失敗模式」的解剖邏輯**，不是為了湊時間軸（時間軸總表進附錄 A）。\n  - 不是技術教科書——不教你寫核電廠控制軟體、不教你 SS7、不教你飛控律法；本書講的是「**這個系統為什麼會以沒人預見的方式崩壞、防禦在哪裡破洞、帳單長什麼樣**」，機制只講到能支撐這個判斷的深度。\n  - **不是災難獵奇（disaster porn）**——死傷當人寫、不當奇觀；重點永遠是**系統機制**不是血腥細節；不堆煽情形容詞。\n  - **不是事後諸葛的審判**——不嘲笑當事人「怎麼這麼蠢」。一律先講清楚他們當年面對的真實約束（資訊不全、生產壓力、介面假設），讓讀者理解「**換成我在那個時空、那個資訊量下，未必看得出來**」。\n  - 不是轉職用書——純興趣，不服務 AI Infra 敘事；但工程橋接要讓它讀起來像母語，不是外語。\n- **全書貫穿主張（核心商品，終章總收官驗收）**：\n  1. **正常意外（Normal Accidents，Perrow）**：在「互動複雜度高 × 緊耦合」的系統裡，嚴重事故不是異常而是**統計上遲早會發生的常態**——不是「有沒有」，是「何時、以哪種對齊方式」。\n  2. **瑞士起司（Reason）／多重失效的合謀（Cook）**：災難需要**多層防禦的孔洞同時對齊**；任何一層擋住就沒事。所以「找單一根因」是錯的問法——要找的是**為什麼每一層都沒擋住**。\n  3. **安全系統即危險源 ＆ 自動化的諷刺**：用來保護的機制（interlock、MCAS、autopilot、看門狗）本身常常是事故的**直接成因**；自動化拿走的，往往正是操作員在出事時最需要的狀況意識。\n  4. **漂移到失效（Dekker）／偏差正常化（normalization of deviance）**：系統不是某天「砰」一下壞掉，而是**一次次僥倖把異常變成常態**，把安全邊界慢慢吃掉，直到某天孔洞對齊。\n  5. **焦慮工程師的信條**：「應該沒事吧」是訃聞的第一句。韌性不是「不會壞」，是**安全地壞**（graceful degradation、blast radius 控制、bulkhead）——這正是讀者那套多層 cache library 的 graceful degradation 在做的事。終章把這條從「怕」翻成「怎麼蓋」。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js、NestJS）。**第一次用到一個橋接錨點時點名具體場景，不要泛泛說「你的後端經驗」**。可直接當錨點的經歷與直覺：\n\n- 高併發系統（500K+ 使用者、10K+ CCU）、佇列（SQS）、冪等消費者、最終一致性、backpressure、rate limiting、event-driven 結算 pipeline（K8s CronJob→SQS→idempotent consumer，跨服務最終一致）。\n- 微服務 greenfield（AWS ECS、TypeScript/NestJS）；自建輕量 Lambda decorator 框架、**多層 cache library（in-memory→S3→local，含 graceful degradation，全團隊採用）**、CI 強制 OpenAPI 同步（未文件化的 API 變更會讓 build 失敗）。\n- 效能工程：profiling（Clinic.js）、負載測試（k6/Vegeta）、瓶頸診斷（**招牌敘事：尖峰 RDS CPU 降 40%**——重排 SQL、拆 transaction 減鎖競爭）。\n- 資料層：MySQL/PostgreSQL 調校（read replica、partition、isolation、deadlock、index）、Redis Pub/Sub。\n- 維運：K8s 基礎物件（Deployment/Service/HPA/CronJob）、Docker、CI/CD、CloudWatch、**自建 FluentBit+Lua 可觀測性 pipeline**；做過 setTimeout→cron job queue 的重寫（讓排程訊息撐過重啟）。\n- 即時通訊：WebSocket、Socket.io、Redis Pub/Sub、WebRTC（TURN/STUN）。\n\n**不需要解釋**（已精通，直接當錨點）：部署/CI/CD pipeline、feature flag、藍綠/滾動部署、K8s 物件與 HPA、雲服務（ECS/Lambda/RDS/SQS/S3）、SQL 與交易隔離、deadlock、cache 模式、佇列與冪等、backpressure/rate limiting、最終一致性、可觀測性（metric/log/alarm）的工程意義。\n\n**快速複習即可**（聽過、用過，但沒系統想過）：circuit breaker、bulkhead、retry storm、thundering herd、blast radius、單點故障（SPOF）、graceful degradation、postmortem 流程。用「你天天在做，現在把它放進一個七十年跨領域的譜系裡」的節奏帶。\n\n**要從零講來歷**（本書主體）：Perrow 的正常意外理論、Reason 瑞士起司模型、Cook〈How Complex Systems Fail〉、Dekker 的漂移到失效與 just culture、normalization of deviance（Vaughan 的 Challenger 研究）、automation irony（Bainbridge）、以及每一場具體災難的精確技術根因與調查結論。\n\n**跨書資源**：讀者書架上有《把系統寫成定理：TLA+ 與形式化方法》與《馴服隨機：機率與統計》與《複雜度守恆：軟體發展史》。\n- 談「防禦＝不變式、災難＝安全性質被違反」時**可以**一句話接 TLA+ 書（safety/liveness、invariant），但**不得依賴**。\n- 談「尾端風險、罕見事件、為什麼『百年一遇』會在第三年發生」時**可以**接機率書，但概念要自足。\n- 與《複雜度守恆》是**不同門類**：那本是橫掃的思想史（抽象/方法如何演化），**本書是單一災難的傳記式特寫（一場災難如何發生）**。同一主題（如微服務複雜度、抽象洩漏）出現時，**點到並指向那本書，不重複展開**。\n\n## 失敗模式語言（全書的累積產物——相當於本書的「貨幣」）\n\n本書的招牌不是某一場災難，而是**一套可重用的「失敗模式」詞彙**。每章在 `## 故障解剖` 把該災難對應到下列模式編號；全書累積，終章組裝成完整目錄（附錄 B 是詞彙表）。**各章不得自創新編號或改名，要新增模式必須在 outline 登記。** 基準清單：\n\n| 編號 | 失敗模式 | 一句話 |\n|---|---|---|\n| F1 | 緊耦合（tight coupling） | 一處失效沒有緩衝、沒有時間餘裕，直接傳導下去 |\n| F2 | 互動複雜度（interactive complexity） | 子系統之間有非線性、非預期、設計者沒想到的交互 |\n| F3 | 起司孔洞對齊（Swiss-cheese alignment） | 多層防禦各有破洞，平時錯開，出事那天恰好連成一線 |\n| F4 | 安全系統即危險源 | 用來保護的機制（interlock/保護律法/看門狗）本身造成事故 |\n| F5 | 自動化的諷刺（irony of automation） | 自動化拿走了操作員平時的練習與狀況意識，出事時他接不住 |\n| F6 | 偏差正常化／漂移（normalization of deviance / drift） | 僥倖一次次被當成「沒事」，安全邊界被慢慢吃掉 |\n| F7 | 級聯／雪崩（cascading failure） | 局部失效觸發連鎖，一路放大到全域 |\n| F8 | 潛伏條件 vs 觸發（latent conditions vs trigger） | 災難早已裝填好，觸發事件只是最後一根稻草 |\n| F9 | 介面與假設的縫（interface / assumption gap） | 兩個各自正確的子系統，對「單位／契約／前提」的假設不一致 |\n| F10 | 單一故障點／單一感測器（SPOF） | 一個點的失效就能拖垮全局，且沒有獨立的交叉驗證 |\n| F11 | 監控盲區（the alarm that never fired） | 該叫的警報沒叫、或被淹沒，操作員看到的世界與真實脫節 |\n| F12 | 變更即觸發（change as trigger） | 部署、設定更新、程式重用、旗標切換——「動了它」就是觸發 |\n| F13 | 生產壓力壓過安全（production pressure） | 進度／成本／發射窗口壓過了「先停下來查清楚」 |\n| F14 | 規模放大／單一栽培（blast radius / monoculture） | 同質化＋規模讓單點失效一次打中所有人 |\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 案件名：副標`，接著 blockquote：\n   `> **本章解剖什麼**：…（這場災難在全書「失敗模式地圖」的哪裡、主打哪幾個 F 編號模式、跟前後章的對照關係，3–5 行）`\n   每個 Part 的第一章在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章的失敗模式錨定在讀者**具體的**工程實戰上（點名場景：你那次 RDS CPU 降 40% 的 deadlock、SQS 冪等消費者、多層 cache 的 graceful degradation、一次有問題的部署/旗標、FluentBit 看板上沒叫的警報…），讓他在讀別人的災難前先「站在自己的系統上」。要具體，不要泛泛。\n3. 故事主體（多個 `##` section）。建議節奏：**冷開場**（把讀者丟進事發那一刻的場景）→ **裝填**（潛伏條件：這套系統平時怎麼運作、哪些邊界早就被吃掉）→ **觸發**（那根稻草）→ **連鎖**（孔洞怎麼一個個被穿透、失效怎麼傳導）→ **餘波**（傷亡規模、調查、改了什麼）。敘事要好看，但**每個事實照 landscape，不憑記憶**；時序與機制要精確到工程師讀得懂「到底哪個變數、哪一行、哪個假設」。\n4. `## 故障解剖` — **本書招牌段落（每章必有，名稱照抄）**：把這場災難拆成失敗模式語言。必含：\n   - **潛伏條件 vs 觸發**：災難早就裝填好的是什麼，最後那根稻草是什麼。\n   - **起司的孔洞**：列出存在的每一層防禦，以及它各自**為什麼沒擋住**（用條列或表格）。明確反駁「單一根因」。\n   - **對應模式**：本章命中哪幾個 F 編號（引基準表），為什麼。\n   - 一句話總結：「**這場災難的形狀是：＿＿**」。\n5. `## 換成你的系統` — **橋接回去（每章必有，名稱照抄）**：同一個失敗形狀，**藏在讀者自己的後端／分散式世界的哪裡**？點名一個他「應該沒事吧」的假設，並說清楚那個假設錯的時候會怎麼壞（呼應焦慮工程師：命名具體的未處理失敗案例）。給一個可操作的自問或檢查點，不要只喊「要小心」。\n6. `## 紙上推演` — 動手做的形式（純敘事書，無可執行 lab）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：**口頭重講**這場災難的因果鏈、**反事實**（如果某一層起司沒破洞會怎樣／如果沒有那個安全系統會不會反而沒事）、**找出**一個流行說法的史實破綻、**對帳**（把你維運過的某次 incident 對應到本書某個 F 模式）、**設計題**（你會在哪裡加哪一層防禦、它的代價是什麼）。題目用 `### 推演題N`，解答緊接 `#### 推演解答`（全書統一），給完整解答與討論。\n7. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關。優先出「為什麼每一層都沒擋住」「如果不這樣會怎樣」而不是「死了幾個人／哪一年」。\n8. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀。優先：**官方調查報告**（NTSB／CAIB／Rogers Commission／INSAG／NIST／SEC／FDA／Ariane Inquiry Board）、當事領域的經典（Perrow、Reason、Cook、Dekker、Leveson、Vaughan）、可信的事故技術分析。\n\n## 深度標準\n\n- **每章一個被講透的個案＝該災難本身**：把一場災難攤開到讀者能**複述其因果鏈**——具體的人、時間、技術約束、那個決策的代價、防禦為什麼逐層失效。要有細節（哪個變數溢位、哪個閥門卡住、哪通電話誰說了什麼），不准只給「於是就爆炸了」。outline 已為每章指定主打的 F 模式與必講的關鍵細節。\n- **史實照 landscape，不准憑記憶**：日期、死傷、金額、技術根因、調查結論一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 **3~8 次** WebSearch/WebFetch）並 hedge。\n- **數字一律 hedge＋標來源**：死傷、金額（如 Knight 的 4.4 億）、影響規模（如 CrowdStrike 的機器數）這類數字最常被以訛傳訛——標為估計或給範圍、註明來源；landscape 標 ⚠️ 的更要保守。\n- **迷思必須校正**：本書的可信度與趣味來自「大家都記錯的事」。凡 landscape 標出的流行誤解，**必須引用查證版而非流行版並明白點破**——例如：Tacoma Narrows **不是**單純共振而是 aeroelastic flutter；Knight Capital **不是**「一行 code」這麼簡單；「都是人為疏失」是 root-cause 迷思；「圖靈/某天才一個人」式的歸因。\n- **每章必破「單一根因」的衝動**：明確指出至少兩到三層**各自獨立**的防禦失效。把「人為疏失」翻譯成「是什麼系統條件讓這個人在那一刻幾乎不可能做對」。\n- **每章至少一處「工程師的領悟」**：本書核心商品是通透感與一種清醒的敬畏。每章至少一處回答「**這場災難對今天維運分散式系統的你意味著什麼**」，寫到讀者能用自己的話轉述，不是堆形容詞。\n- **時效性誠實 hedge**：談近年事故（CrowdStrike 2024、SolarWinds、Log4Shell）標時點 `（2026-06）`，區分「調查已定論」與「仍有爭議／仍在訴訟」。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依案件深度調整。\n\n## 事實正確性\n\n- 一切硬事實（日期、死傷、金額、規模、技術根因、調查結論、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行查證（每章 3~8 次）。\n- 與 landscape 衝突時：**以 landscape 為準**；若你查到 landscape 可能有誤，**在章末用註記標出疑點**（「⚠️ 待協調者複核：landscape 說 X，但來源 Y 說 Z」），不要自行改寫 landscape（一致性由協調者 P3/P4 統一處理；重大修正需兩個獨立來源）。\n- 死傷／金額／影響規模類數字一律標估計或給範圍並 hedge。\n- 延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram，必須通過 `check_diagrams.py`（**CJK=2 欄寬規則**——中文字佔 2 欄、ASCII 佔 1 欄，框線要對齊）。本書圖的類型：\n  - **全書失敗模式地圖**（Part 首章，基準圖在 outline.md）。\n  - **瑞士起司圖**（多層防禦＋孔洞對齊，每章 `## 故障解剖` 視需要）。\n  - **連鎖時序圖／級聯傳導圖**（觸發→連鎖，用 `→ ↓ │ ─`）。\n  - **時間線片段**（裝填→觸發→餘波的關鍵時刻）。\n  - 不追求精確比例，追求**因果關係清楚**。\n- 跨章引用格式：`（見 chNN）`，不要寫死檔名路徑。跨章主題點到為止＋指向擁有它的章。\n- 表格用於：故障解剖的起司孔洞清單、F 模式對應、時間線、流行說法 vs 史實對照。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點，底色是**焦慮工程師**：先講失敗模式再講全貌、把「應該沒事吧」的假設一個個點名拆穿。但克制——**面對死亡與傷者保持尊重**，不獵奇、不煽情、不喊「太慘了」式空洞感嘆；通透感與敬畏要用內容本身造成。允許冷幽默（針對系統與迷思，不針對死者）。歷史人物當人寫，不造神也不踩低：講清楚他們當年的真實約束，讓讀者理解「換成我也未必看得到」。對「這次不一樣」的技術樂觀保持清醒——看過正常意外反覆上演的人，知道下一個孔洞正在某處慢慢對齊。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="fail";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">正常意外<br><span style="font-weight:400;font-size:12px;color:var(--muted)">複雜系統如何崩壞，以及一個工程師該怕什麼</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 正常意外';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
