也就是說,「機組會在極寒下因結凍與缺氣大量失能」這件事,在 2021 年之前已被官方記錄、警告過至少兩次。\n\n(b) 防寒在德州不是強制的:沒有最低標準、沒有罰則、沒有人逐廠去查驗收。每一次寒潮「撐過去了」,都被悄悄重新詮釋成「我們不做防寒也沒關係」的證據。防寒要花錢、寒潮在德州罕見,於是不做的決定在每個當下都「合理」;一連串合理決定累積成「德州機組不必為極寒準備」這條沒人質疑的背景假設。這就是 F6:安全邊界被一年年吃掉,沒有任何人犯下明顯的錯,只有一個系統把僥倖制度化成正常(這正是 ch14 挑戰者的同型機制)。\n\n(c) Uri 是**觸發**,不是根因(F8)。同一場寒潮如果打在一張機組都做了防寒、且能向鄰區買電的網上,不會逼出 45% 的甩載。把根因說成「寒潮太強」,等於說「下次運氣好一點就行」,什麼都不用改;但真正的根因——未強制防寒、孤島電網、氣電循環——是**可控、可預防**的東西。把災難歸給天災,是放棄學習(這也正是 FERC/NERC 報告拒絕停在的答案)。\n\n### 推演題2 **[20 分鐘]** ★★\n\n反事實:三道潛伏孔洞——(i) 機組防寒未強制、(ii) 孤島電網無法外援、(iii) 氣電循環依賴——如果**只補回其中一道**,2021 年 2 月會變成什麼樣子?逐一推演。\n\n#### 推演解答\n\n- **只補回 (i) 強制防寒**:若 2011 後德州強制機組與天然氣設施防寒,Uri 來時跳機的機組會大幅減少,供給端不至於崩掉 30,500 MW。供需缺口縮小,頻率不會逼近危險線,可能只需小規模、短時的輪流停電而非近三日的 45% 甩載。這是性價比最高、也是 FERC/NERC 報告的核心建議——直接從供給端止血。\n- **只補回 (ii) 跨區外援**:若德州與東西兩大互聯網有足夠容量的聯絡線,缺電時能從鄰區大量輸入電力撐住頻率,填上一部分缺口。代價是放棄監管自主(會落入 FERC 跨州監管),且鄰區當時也受寒潮影響、未必有大量餘電可賣——所以這道防線即使補上,效果也不如 (i) 直接。\n- **只補回 (iii) 解開氣電循環**:若供氣鏈的關鍵環節有獨立電源(備用發電、列為不可中斷負載優先供電),停電就不會讓氣田進一步失能,循環依賴的死亡螺旋被打斷,燃氣機組的「缺燃料」停機會大幅減少(別忘了 18,000 MW 天然氣停機中約 72% 是燃料問題)。這道補回的效果其實很大——它直接掐掉了那條「停電→缺氣→更多停機→更多停電」的正回授。\n\n結論:任何**單一**一道補回,都能把這場災難降一個量級;(i) 與 (iii) 尤其直接。災難需要三道同時破——這就是瑞士起司。\n\n### 推演題3 **[15 分鐘]** ★★(對帳)\n\n把你維運過的系統,對應到本章的兩個核心模式。具體做法:(A) 找一條你團隊「已知問題」清單上、長年掛著「沒爆所以暫不處理」的項目,問它是不是一個被正常化的偏差(F6)——當初接受它時,你們是主動分析並定義了退出條件,還是只是因為它沒爆就默認了?(B) 畫(或回想)你某個服務的依賴圖,找出至少一個循環依賴(F2),特別是「故障時才用到的機制依賴它要保護/回報的對象」那種。\n\n#### 推演解答\n\n(開放題,自答。)(A) 一個常見對應:你那條「setTimeout 重啟丟排程訊息」的問題,在你重寫成 cron job queue 之前,很可能就是被正常化的偏差——「服務很少重啟,重啟時剛好有待跑排程的機率很低,過去沒出過大事」。這是 F6:你拿「過去沒事」當「安全」,而真正的安全要靠「重啟不丟訊息」這個性質本身成立,不是靠「很少重啟」這個運氣。你後來修掉它,等於主動補上了德州沒補的那道防寒。(B) 循環依賴的經典對應:你發現過告警鏈路自己跑在被監控的叢集上——叢集真掛時告警先啞;或 circuit breaker 狀態存在它要保護的 Redis 裡。能把這些講成「這是我的氣電循環:故障時的逃生機制依賴正在故障的東西」,而不是「這條 P3 大概還能撐」,這題就過了。重點是養成用孔洞語言、而非運氣語言看自己系統的習慣。\n\n### 推演題4 **[20 分鐘]** ★★★(設計題)\n\nERCOT 那個凌晨,在 4 分 37 秒的餘裕裡,唯一還來得及拉的杆是大規模強制甩負載——一個「主動犧牲一部分以保住核心存活」的機制。請為你維運的一個系統,設計一套類似的「甩負載」防線:當系統開始不可控地往下滑(資源耗盡、依賴連鎖降級),它如何主動、自動地犧牲哪些東西、保住哪些東西?說清楚它擋住本章孔洞清單裡的哪一段、代價是什麼。\n\n#### 推演解答\n\n一個合理的設計(對應「甩負載」這道唯一擋住的防線):\n\n1. **明確的負載分級與 shed 順序**:事先把功能分成「核心(必須活)/重要/可拋」三層,並在系統壓力(CPU、佇列深度、下游延遲)越線時,**自動**且**分級**地拋掉最低層——拒絕非核心請求、暫停非即時的批次/排程、降級到 cache(你那套多層 cache library 的 graceful degradation 正是這個精神)。這對應 ERCOT 的「切 45% 負載保住頻率」:主動切掉一部分,讓核心活著。代價:被 shed 的功能在事件期間不可用。\n2. **打斷正回授的熔斷與 backpressure**:在依賴邊界放 circuit breaker 與 rate limit,讓「一處慢→重試→更慢」的級聯(對應 F7 的頻率跳脫螺旋)被掐斷,而不是靠運氣不滑進去。代價:熔斷期間部分功能直接快速失敗(但這是「可控地壞」)。\n3. **解開故障時的循環依賴**:確保甩負載/降級/告警這些「逃生機制」本身**不依賴**正在故障的東西——熔斷狀態用獨立儲存、status page 跨區或靜態託管、告警鏈路不跑在被監控叢集上。這對應補回德州的氣電解耦,讓你的逃生口在最壞情況仍開著。代價:額外的獨立基礎設施。\n\n排序原則:(1) 是核心存活機制(一定要有,因為崩潰時你只剩這根杆);(2) 防的是把局部失效放大成全域的正回授;(3) 確保前兩者在故障時真的能用。三道分別對應「主動犧牲保核心/打斷級聯/逃生口獨立」——這就是 ch22「安全地壞」的正面用法(見 ch22)。\n\n## 自我檢核\n\n口頭自答,講得出來才算過關:\n\n1. 為什麼說「這場停電的根因在 2011 年就寫好了」?把三道潛伏孔洞講出來,並說明拿掉 Uri 這個觸發、災難仍裝填著。\n2.「機組防寒從未強制」如何透過「歷次沒釀大災」被一步步正常化?這跟 ch14 挑戰者的「偏差正常化」是不是同一個機制?\n3. 為什麼「都是風機結冰害的」不符合 FERC/NERC 的數據?停機的主力其實是什麼?(講出 18,000 MW 天然氣、約 72% 燃料供應問題。)\n4. 為什麼「rolling blackouts(輪流停電)」低估了實際發生的事?ERCOT 切了多少負載、撐了多久、為了避免什麼?\n5. 氣電循環依賴為什麼是「死亡螺旋」?它和你系統裡「故障時的逃生機制依賴正在故障的東西」是同一個形狀嗎?\n6. 孤島電網這個結構選擇,平時的代價為什麼是零、最壞情況的代價為什麼是致命?這跟焦慮工程師對「拿掉只在最壞情況才有用的安全網」的警惕有什麼關係?\n7. 強制甩負載為什麼能避免更壞的結局(black start)?它預設了系統的什麼性質(負載可被主動切掉而核心仍活)?這跟 ch22 的「安全地壞」、ch10 的 kill switch 是同一件事嗎?\n8. 為什麼把死亡數說成「210–246」可能低估?官方統計與含間接死亡的研究估計差多少?(給範圍,並說明為什麼這個差距本身值得注意。)\n\n## 延伸閱讀\n\n- **FERC／NERC 聯合報告(一手來源)**:*The February 2021 Cold Weather Outages in Texas and the South Central United States — FERC, NERC and Regional Entity Staff Report*(2021-11)。<https://www.ferc.gov/news-events/news/final-report-february-2021-freeze-underscores-winterization-recommendations> — 本章的事實錨。含 28 項正式建議,逐項拆解機組防寒不足與氣電協調不足;最有價值的是它拒絕把責任推給「天災」或單一能源,直指可預防的系統性缺陷。讀它如何用數據(18,000 MW 天然氣停機、72% 燃料問題、防寒未強制)反駁流行迷思,本身就是一堂「怎麼讀事故報告」的課(呼應 ch02)。\n- **2011 年 FERC／NERC 報告**:*Report on Outages and Curtailments During the Southwest Cold Weather Event of February 1–5, 2011*。 — 十年前的那份報告。把它和 2021 的並排讀,你會親眼看到「同樣的建議寫了兩次、中間沒被強制執行」——這就是偏差正常化的鐵證,也是哥倫比亞(見 ch15)「action items 會腐爛」的基礎設施版。\n- **事件概觀(含死亡範圍與損失估計)**:*2021 Texas power crisis*(Wikipedia)。<https://en.wikipedia.org/wiki/2021_Texas_power_crisis> — 整合了死亡人數的官方統計(約 210–246)與研究估計(約 700)、經濟損失範圍($80B–130B)、以及孤島電網的歷史脈絡。當作交叉查證與 hedge 的起點,硬數字仍以 FERC/NERC 報告為準。\n"}, {"id": "ch13-cloud-cascade", "file": "ch13-cloud-cascade.md", "group": "Part IV — 連鎖反應", "title": "ch13 — 雲端連鎖：當別人的機房就是你的單點故障", "md": "# ch13 — 雲端連鎖：當別人的機房就是你的單點故障\n\n> **本章解剖什麼**：四場近十年的雲端規模事故，共用同一個形狀——**規模化＋同質化＋同步推送＝一個單點同時打中所有人**。主案是 CrowdStrike 2024-07-19：一次「內容更新」讓全球估計約 850 萬台 Windows 在開機時藍屏；它不是攻擊，是「驗證缺陷＋全球同步推送」。對照三個短案：AWS S3 us-east-1 2017（一條打錯參數的除錯指令＋狀態頁自己依賴 S3 的隱藏相依）、Meta BGP 2021（一條維護指令撤回路由、連門禁與內部工具都失效）、Fastly 2021（一個潛伏數週的 bug 被一筆合法客戶設定觸發、約 85% 網路回錯）。這是 Part IV「連鎖反應」的收尾——前三章（regex、閃電崩盤、德州電網）看的是 CPU、自動代理、基礎設施怎麼級聯；這一章把鏡頭轉到**你自己跑服務的那片雲**。主打 **F14**（規模放大／單一栽培）、**F12**（變更即觸發：「自動更新」是現代版的它）、**F2**（隱藏相依）、**F7**（級聯）。與 ch10 Cloudflare（見 ch10）的「一次推全球」是同一族；它把 ch12 的循環依賴（見 ch12）放大到雲規模。\n\n## 從你已知的出發\n\n你完全活在這一章裡。\n\n你的服務跑在 AWS：ECS task 上的 NestJS、Lambda、RDS（MySQL/PostgreSQL）、S3、SQS。你的多層 cache library 最後一層退到 S3。你的可觀測性是自建的 FluentBit+Lua pipeline，把 log 吐到某個地方，再讓 CloudWatch 的 alarm 在半夜叫醒你。這一整套，沒有一個元件是你機房裡的鐵——它們是「別人的機房」，而你信任它們，因為你必須信任它們。沒有人能自己造一個 S3。\n\n現在,焦慮工程師的習慣動作:把這套依賴攤平,問三個問題。\n\n第一個問題:**你信任的那些「會自己更新」的東西,更新的時候是「一次推全部」嗎?** 你的 ECS task 上不只有你的程式碼。有 base image,有 sidecar,有 log agent,在很多公司還有一個 EDR／防毒 agent(像 CrowdStrike Falcon、SentinelOne 這類安全監控代理)——它跑在比你的程式碼更底層的地方,而且它的「威脅情報更新」不歸你的 CI/CD 管。它自己會更新。你按下藍綠部署時心裡有 canary、有分批、有 rollback;但那個 agent 的更新,有嗎?你根本不知道,因為那不是你推的。\n\n第二個問題:**你的「我掛了」的訊號,會不會跟「掛掉的東西」跑在同一個地方?** 你的 status page 在哪裡?你的 alarm 的 metric 從哪裡來?如果你的 alarm 依賴的 metric pipeline 跟被監控的服務共用同一個 region、同一個 S3 bucket、同一條網路——那麼當那個 region 出事,你不只服務掛了,**你連「服務掛了」這件事都看不到、也通知不出去**。這是 ch16 三哩島那盞「顯示指令而非閥位」的指示燈(見 ch16)在雲端的變體:你監控的不是現實,是「一個剛好跟現實一起死掉的東西」。\n\n第三個問題:**你的依賴圖裡有沒有環?** 你大概沒真的畫過。「A 要 B、B 要 A」聽起來蠢到不可能發生,但它幾乎總是藏在你沒注意的層級:修復工具要登入、登入要 SSO、SSO 要網路、網路正是你要修的東西。德州電網(見 ch12)的氣電互賴是這個環的基礎設施版;這一章你會看到它的雲端版,而且看到大公司——Meta——也栽在裡面,栽到工程師連門都刷不進去。\n\n這一章的四場事故,每一場都是某個工程師按下了一個「應該沒事吧」的動作:一次內容更新、一條除錯指令、一條維護指令、一筆設定變更。每一個動作本身都合法、都通過了他們以為足夠的檢查。災難不在那個動作——在「那個動作會同步地、無緩衝地、同時到達所有人」。\n\n---\n\n## 主案:CrowdStrike,2024-07-19,星期五早上\n\n### 冷開場:全世界的藍屏在同一分鐘亮起\n\n2024 年 7 月 19 日,世界協調時間(UTC)凌晨 04:09 前後。CrowdStrike 向全球跑著 Falcon sensor 的 Windows 主機推送了一個更新。不是軟體版本更新——是一個它們內部叫做 **Rapid Response Content** 的東西,一份「內容」(content),大致相當於防毒軟體的病毒碼、或一條偵測規則。它被歸類為「資料」,不是「程式碼」,所以它走的是一條比軟體發布快得多、輕得多的管道。\n\n幾分鐘內,從澳洲(當地已是下班前的下午)往西,藍屏(BSOD)沿著時區一路亮起。機場報到櫃檯的螢幕變藍。醫院的排程系統變藍。銀行的交易終端變藍。電視台直播時背後的控制室螢幕變藍。航空公司開始大規模停飛——不是因為飛機有問題,是因為地勤的 Windows 工作站全死了,沒人能辦登機。911 調度、超商收銀、緊急應變——同一分鐘,跨產業,跨大洲。\n\n這不是攻擊。沒有駭客。受害最深的那台機器,跑的正是一個你花錢買來「保護它不被攻擊」的安全產品。\n\n### 裝填:把「內容」當資料、不當程式碼\n\n要看懂這場災難,先要看懂 Falcon sensor 的兩件事——而這兩件事都是平時看起來完全合理的設計。\n\n第一,**Falcon sensor 跑在 kernel mode(核心態)**。EDR(端點偵測與回應)產品要能看到、攔截所有行為——進程啟動、檔案讀寫、網路連線——所以它得跑在作業系統最底層,跟核心同一個記憶體空間。這是這類產品的本質,不是 CrowdStrike 的疏忽。但代價是:**核心態裡的任何記憶體錯誤,不會只讓「這個程式」崩潰,它會讓整台機器崩潰。** 在 user mode,一個程式踩到非法記憶體,作業系統把它殺掉,系統繼續跑;在 kernel mode,同樣一個錯誤就是 BSOD。沒有沙箱,沒有降級,沒有「只死一個 process」。\n\n第二,**Rapid Response Content 被當成資料對待,卻會驅動核心態的解譯執行**。CrowdStrike 的架構裡有 Template Type(規則的「模板」,定義有哪些欄位)和 Template Instance(具體的規則內容)。其中一個叫 IPC(行程間通訊)的 Template Type,在定義時宣告了 **21 個輸入參數欄位**。而 sensor 端實際提供的,只有 **20 個**。這個落差平時不要緊——因為過去推送的規則,從來沒有去引用那個不存在的第 21 個欄位。\n\n潛伏條件就裝在這裡:一個 21 對 20 的欄位數落差,平靜地躺了一段時間,等一條「剛好引用到第 21 個欄位」的規則出現。\n\n還有一道本該守住這裡的防線——**Content Validator**,內容驗證器,職責就是在這類內容上線前攔下不合法的東西。但它有 bug。它沒有抓到「規則引用了一個不存在的欄位」這個問題,讓 Channel File 291 通過了驗證。\n\n### 觸發:第 21 個欄位\n\n04:09 UTC,Channel File 291 推送出去。這份新內容裡的規則,引用了第 21 個欄位。\n\n當 sensor 的 Content Interpreter(內容解譯器)在執行期讀這條規則、去取第 21 個欄位的值時,它讀到了陣列邊界之外——**out-of-bounds read(越界讀取)**。在 user mode,這頂多是個 segfault,殺掉一個 process。但 Falcon 在 kernel mode。越界讀取直接觸發系統崩潰:藍屏。\n\n然後是最殘忍的一段。這個檔案在**開機早期就會載入**。所以機器藍屏、重開機、開機早期又載入這個壞檔、又藍屏——**重啟迴圈**。機器陷在「開機→載入壞檔→藍屏→重開機」的圈裡,卡在還沒能正常上網、還沒能接收任何修正的階段。\n\n這把問題從「軟體可以遠端回滾」變成了「需要人到現場、手動進安全模式、手動刪掉那個檔」。CrowdStrike 在約 78 分鐘後(05:27 UTC 部署了修正)撤回了壞內容——但這只擋住了還沒中的機器。已經中的,每一台都得有人親手去救。全球估計約 850 萬台(CrowdStrike/微軟估計;⚠️ 這是規模估計,非精確普查)。航空公司、醫院、銀行、零售,同時。\n\n### 餘波:帳單與一個誠實的 RCA\n\n直接傷亡:無(這是不幸中之大幸)。但中斷是全球性、跨產業的。經濟損失的估計都來自第三方、且因估法差異很大:保險分析公司 Parametrix 估計光是《財星》500 大企業(不含微軟)的直接損失就達約 **54 億美元**(其中受影響的約 124 家、平均每家逾 1.43 億美元;醫療業受創最重)。**⚠️ 所有經濟損失數字都是第三方估計,口徑與覆蓋面差異極大,landscape 標 ⚠️——複述時務必說「第三方估計」,不要當成定論。**\n\nCrowdStrike 在 2024-08-06 發布了一份相當誠實的 Root Cause Analysis,逐項認了:欄位數不符(21 對 20)導致越界讀取、Content Validator 的缺陷沒攔下、以及——最關鍵的那條——**這類 Rapid Response Content 是一次性推送全球所有 sensor 的,沒有金絲雀(canary)、沒有分階段發布**。\n\n要校準幾個流行的誤記:這不是「微軟/Windows 出包」(是 CrowdStrike 的內容更新,微軟只是受害平台);不是「一次 OS 更新」(是 EDR 廠商推的規則內容,不是作業系統版本);早期傳言的「全是 0 的空檔案」也不對(官方 RCA 證實是欄位數不符的越界讀取)。\n\n---\n\n## 對照案一:AWS S3 us-east-1,2017-02-28——打錯一個參數,連狀態頁都顯示不出來\n\n2017-02-28 上午(09:37 PST),AWS 的 S3 團隊在排查一個 billing 系統變慢的問題。一名**獲授權的**工程師,依照**既定的 playbook**,執行一條指令,原意是移除 billing 子系統的少量伺服器。注意:授權有、流程有、人沒亂來。\n\n但其中一個輸入參數**打錯了(typo)**。指令移除的伺服器數量遠多於預期,連帶把 S3 的兩個核心子系統打掉大半:index 子系統(管理該 region 所有物件的 metadata 與位置)和 placement 子系統(為新物件分配儲存)。\n\n這兩個子系統得**完整重啟**才能恢復。問題是,它們已經多年沒做過完整重啟,期間容量大幅成長——沒有人確切知道「完整重啟要多久」。結果是數小時。整個 us-east-1 的 S3 趴下,而那個 region 是無數網站、SaaS、第三方服務的地基,連帶一片中斷。\n\n但這場事故真正進入本書的理由,是這一句:**AWS 自家的 Service Health Dashboard(服務健康狀態頁)本身依賴 S3,所以它無法更新狀態。** 在 11:37 PST 之前,那個本該告訴全世界「S3 掛了」的儀表板,因為它跑在掛掉的 S3 上,顯示一片正常。這就是**隱藏相依(F2)**最乾淨的標本:你監控故障的工具,跟故障本身共命運。AWS 事後的修正之一,就是把 Dashboard 改成跨多 region、不依賴單一 region。\n\n回到你的第二個問題。你的 status page、你的 alarm pipeline,有沒有跟它要監控的東西躺在同一張床上?\n\n---\n\n## 對照案二:Meta BGP,2021-10-04——連工程師都刷不進機房的門\n\n2021-10-04(約 15:39 UTC 起、約 21:05 UTC 恢復),Facebook、Instagram、WhatsApp、Messenger 同時從網際網路上消失約 6 小時,影響數十億使用者。\n\n起因又是一條維護指令:本意是「評估 Meta 全球骨幹網路的可用容量」,卻意外切斷了骨幹的所有連線,讓全球各資料中心彼此斷聯。Meta 本來有一套稽核工具,專門防止這類危險指令——但**那個稽核工具有 bug,沒攔下這條指令**(又一道 Content Validator 式的破洞)。\n\n接著是把局部放大成全球的那個機制,設計得本意是好的:Meta 的權威 DNS 伺服器被設計成「**如果偵測到自己連不上資料中心(視為自身不健康),就主動撤回(withdraw)對自己 IP prefix 的 BGP 廣播**」——這是個健康檢查防呆,壞節點就讓自己從網路上退出,別把流量導進黑洞。但當整個骨幹被切斷,**所有** DNS 節點同時判定自己不健康,於是**全部一起撤回 BGP 廣播**。Meta 的 DNS 就這樣從全球網際網路上消失了——伺服器其實還在跑,但外界連 facebook.com 都解析不出來。這是 ch12 德州電網那個「自我保護機制在全域情境下反成自毀」的精確重演(見 ch12)。\n\n最刺痛工程師的是修復階段。要修,得進資料中心、得登入系統——但**內部工具、遠端登入、甚至實體門禁的刷卡系統,本身都依賴那個已經斷掉的網路**。工程師人到了機房門口,刷不進去。這就是你的第三個問題——依賴圖裡的環——的血淋淋版本:修復路徑上的每一環,都依賴你正要修的那個東西。\n\n要校準:這不是被駭(Meta 明確指為內部維護指令＋稽核工具失效);DNS 伺服器本身沒「壞」,是它們**依設計主動**撤回了 BGP。\n\n---\n\n## 對照案三:Fastly,2021-06-08——一個潛伏數週的 bug,被一筆合法設定喚醒\n\n2021-06-08(09:47 UTC),Fastly 這家 CDN 的全球邊緣網路,約 **85%** 開始回傳錯誤(多為 503)。連帶拖垮 Amazon、Reddit、紐約時報、英國政府網站 gov.uk 等一大片站點。\n\n根因的時間軸值得慢慢看,因為它把「潛伏 vs 觸發」演得最乾淨:\n\n- **2021-05-12**:Fastly 部署了一版軟體,其中引入了一個**潛伏(dormant)缺陷**。它只在「特定客戶設定」遇上「特定情境」時才會被觸發。部署後,它潛伏了將近一個月,完全沒顯。\n- **2021-06-08**:一名客戶推送了一筆**合法有效(valid)的設定變更**——客戶沒做錯任何事,這是個正常操作。但這筆設定恰好滿足了那個潛伏 bug 的觸發條件。地雷被踩到了:一個 edge 節點崩潰,並透過共享的設定服務擴散到全球,約 85% 的網路開始回錯。\n\nFastly 的反應其實很快:約一分鐘內(09:48)偵測到、辨識並隔離原因、停用該設定;約 49 分鐘內讓 95% 的網路恢復。(完全緩解到 12:35 UTC,約 2 小時 48 分;客戶可感知的嚴重中斷約一小時。)\n\n要校準的迷思最關鍵:**這不是「那個客戶設定錯了」**。客戶推的是合法設定,錯在 Fastly 自家 5/12 引入、潛伏數週沒被測出的 bug。客戶的合法操作,只是那隻剛好踩到地雷的腳。Fastly 的 postmortem 自承:「我們應該要能預期到這種失效。」\n\n---\n\n## 故障解剖\n\n四場事故,一個形狀。把它們並排,模式自己會浮出來。\n\n### 潛伏條件 vs 觸發\n\n| 事故 | 潛伏條件(早就裝填好的) | 觸發(那根稻草) |\n|---|---|---|\n| CrowdStrike | 21 對 20 的欄位數落差＋Validator 有 bug＋kernel mode 無隔離＋無金絲雀 | 一條引用第 21 欄位的內容被全球同步推送 |\n| AWS S3 | 移除指令無上限／無防呆＋子系統多年未重啟(重啟時長未知)＋狀態頁依賴 S3 | 一個打錯的參數 |\n| Meta BGP | 稽核工具有 bug＋DNS「不健康即撤回 BGP」＋修復路徑依賴同一網路 | 一條評估容量的維護指令 |\n| Fastly | 5/12 引入、潛伏數週的 dormant bug＋透過共享設定服務擴散 | 一筆合法的客戶設定變更 |\n\n共同點昭然:**每一個觸發本身都微不足道、都合法**。一個 typo、一條例行指令、一筆正常設定、一份過了驗證的內容。災難從來不在觸發——在那個觸發背後早已裝填好、平時錯開的多道孔洞,在那一刻恰好對齊。這正是 ch01 立下的核心主張:嚴重事故不是異常,是緊耦合×互動複雜度的系統裡,統計上遲早的常態。\n\n### 起司的孔洞:跨案綜合\n\n把四場合起來看,反覆出現的是同一組孔洞——\n\n| 孔洞層 | 本該擋住什麼 | 為什麼沒擋住(哪幾場命中) |\n|---|---|---|\n| 上線前驗證 | 攔下不合法的內容／指令 | Validator 有 bug(CrowdStrike)、稽核工具有 bug(Meta)、潛伏 bug 沒被測出(Fastly) |\n| 分階段／金絲雀發布 | 讓壞東西先打中 1%、報警、自動回滾 | 一次性全球同步推送,沒有 canary(CrowdStrike;呼應 ch10 Cloudflare) |\n| 爆炸半徑隔離 | 把單次操作／單點失效關在一小塊 | kernel mode 無沙箱(CrowdStrike)、單指令重創整個 region 核心子系統(S3)、設定服務全域共享(Fastly) |\n| 操作防呆／上限 | 一個錯誤動作不該能掃掉一大片 | 移除指令無數量上限(S3)、危險指令無有效攔截(Meta) |\n| 自我保護機制的反向情境 | 健康檢查保護系統 | 「不健康即撤回 BGP」在全骨幹斷時讓全部節點同時自毀(Meta) |\n| 監控／修復不依賴被監控對象 | 故障時還看得見、修得了 | 狀態頁依賴 S3(AWS)、修復工具與門禁依賴已斷的網路(Meta) |\n\n任何一道補上,故事的規模就降一個數量級。CrowdStrike 只要有金絲雀,壞內容打中 1% 就會被擋;AWS 只要移除指令有上限,typo 頂多掃掉幾台;Meta 只要修復路徑有一條不依賴主網路的帶外(out-of-band)通道,6 小時會短得多。**「找出按錯鈕的那個人」永遠是錯的問法**——按鈕背後的每一道孔洞,才是答案。\n\n### 對應模式\n\n- **F14(規模放大／單一栽培)** ——本章的主軸。850 萬台跑同一個 sensor、無數站點跑在同一個 us-east-1、半個網路跑同一家 CDN、數十億人連同一個 Meta。同質化讓「一份壞東西」能一次打中所有人;規模讓它的帳單以十億美元計。這是 ch18 Morris 蠕蟲 monoculture(見 ch18)的雲端版:那邊靠程式自我繁殖非同步擴散,這邊靠廠商一次同步推送。\n- **F12(變更即觸發)** ——四場都是一次「動了它」。但這一章的重點是:**現代版的「變更」是「自動更新」**。它不走你的 CI/CD,不過你的 code review,不在你的藍綠部署紀律裡。它是廠商替你按下的部署,而且預設一次推全部。(供應鏈把這條推到極致——見 ch20。)\n- **F2(隱藏相依)** ——AWS 的狀態頁、Meta 的修復路徑與門禁。你以為彼此獨立的東西,其實共一條命。\n- **F7(級聯)** ——一個 edge 節點崩潰透過共享設定擴散全球(Fastly)、一條指令讓所有 DNS 節點連鎖撤回(Meta)。局部失效沒有緩衝地傳導成全域。\n\n### 一句話形狀\n\n**這場(這四場)災難的形狀是:當夠多人跑著同一份東西、而那份東西能被一次同步更新到所有人,那麼「保護你的工具」「儲存你的資料的服務」「連接你的網路」本身,就成了一個你無法分散、按一下就同時打中所有人的單點故障——而你信任它,正是因為它規模大到你以為它不會倒。**\n\n---\n\n## 換成你的系統\n\n你不會自己造 S3,也不該。重點不是「別用雲」——是認清你的依賴圖裡,哪些假設在那一天會錯,以及錯的時候會怎麼壞。\n\n點名三個你「應該沒事吧」的假設:\n\n**假設一:「那個 agent 的更新不歸我管,所以不是我的風險。」** 錯的時候會這樣壞:你的 ECS task 上若跑著一個會自我更新、且跑在底層的 agent(EDR、log shipper、service mesh sidecar、甚至某些 base image 的自動安全更新),它的下一次更新若帶缺陷,會在你毫無預警、也無從 canary 的情況下,同時打中你所有 task。你的藍綠部署、你的分批 rollout、你引以為傲的部署紀律,對它**完全不適用**——因為那不是你推的。自問:**我的執行環境裡,有哪些東西會自己更新、而我對它的 rollout 節奏零控制?** 列出來。對能控制的,要求廠商支援分階段;對不能控制的,至少要知道它存在,並在事故簿上留一行「這是一個我無法 canary 的單點」。\n\n**假設二:「我的 alarm 會在出事時叫我。」** 錯的時候會這樣壞:如果你的 alarm 依賴的 metric 經過你那條自建 FluentBit pipeline,而 pipeline 跟被監控的服務共用同一個 region、同一條網路出口、同一個下游儲存——那麼當那個 region 整個出事,你的 alarm 不是「報了個錯」,是**根本沒有資料可以觸發,靜默地什麼都不叫**。這是 ch16 那盞指示燈(見 ch16)的雲端版:你以為你在監控現實,其實你在監控一個跟現實一起死掉的東西。自問:**如果我服務所在的整個 region 消失,我的『它掛了』訊號是從哪裡發出來的?那個來源在不在同一個 region?** 健康訊號和健康檢查的對象,必須有獨立的命運。\n\n**假設三:「我的服務之間沒有循環依賴,這種事只會發生在沒設計好的系統。」** 錯的時候會這樣壞:循環依賴幾乎從不在你畫的那張架構圖的層級——它藏在你沒畫的層級。Meta 不是沒能力畫依賴圖的公司,它的環藏在「修復要登入、登入要 SSO、SSO 要網路、網路是要修的東西」。你的環可能藏在:部署 pipeline 要拉 image,image registry 跑在你正要救的 cluster 上;或 oncall 要看 runbook,runbook 在你正掛掉的 wiki 上;或 rollback 要呼叫一個 API,那個 API 依賴你剛弄壞的服務。自問:**我的災難復原路徑(登入、部署、rollback、看 runbook、刷門禁),每一步依賴什麼?其中有沒有任何一步,依賴我正在搶救的那個東西?** 把復原路徑當成一條獨立的依賴鏈來畫,你會找到那個環。\n\n這三個自問的共同精神,是焦慮工程師的第五信條(見 ch01、ch22):韌性不是「不會壞」,是**安全地壞**——你的監控、你的復原路徑、你的爆炸半徑,要在你最依賴的雲出事時,依然可用。下一章起進入 Part V(見 ch14),你會看到 NASA 怎麼把「已知的風險」一次次正常化——而「那個自動更新應該沒事吧」,正是同一種正常化的當代形態。\n\n---\n\n## 紙上推演\n\n### 推演題1 **[20 分鐘]** ★★（畫依賴圖,找隱藏循環）\n\n挑一個你實際維運的服務。畫出它**故障時的復原路徑**(不是正常運行路徑):你要修它,得依序碰到哪些東西?——登入(SSO?VPN?)、看告警(dashboard 在哪)、看 runbook(wiki 在哪)、部署修正(CI/CD、image registry 在哪)、rollback(呼叫什麼 API)。把每一步依賴的東西也標出來。然後問:**這條復原鏈上,有沒有任何一環依賴你正要修的那個服務、或它所在的同一個 region?** 找出那個環。\n\n#### 推演解答\n\n(開放題,自答。)幾乎所有人都會找到至少一個環,因為復原路徑本身很少被當成一張獨立依賴圖來審。常見的環:(a)dashboard 的 metric 經過跟被監控服務同 region 的 pipeline——region 掛時你瞎了(AWS S3 狀態頁的形狀);(b)部署 pipeline 從一個跑在同一 cluster 的 registry 拉 image——cluster 掛時你部署不了修正;(c)oncall runbook 在一個依賴 SSO 的 wiki,而 SSO 又依賴你掛掉的網路(Meta 刷不進門的形狀)。這題過關的標準不是「沒有環」(幾乎不可能),是**你能指著圖說「這裡有一個環,出事時它會讓我的復原時間從 5 分鐘變成 5 小時」**,並決定要不要為它準備一條帶外(out-of-band)通道(獨立 region 的狀態頁、離線的 runbook、不依賴主網路的緊急登入)。能用「隱藏相依(F2)」和「復原路徑的循環」這組語言描述,而不是「我們系統還行啦」,這題就過了。\n\n### 推演題2 **[15 分鐘]** ★★（反事實:把金絲雀補回 CrowdStrike）\n\nCrowdStrike 的 Rapid Response Content 是一次性推送全球所有 sensor 的。假設——只改這一件事——它改成「先推 1% 的 sensor,觀察 15 分鐘的崩潰率與健康指標,正常才放大到全球」。Channel File 291 這場事故會變成什麼樣子?然後反過來問:CrowdStrike 當初為什麼會選擇繞過分階段、一次推全球?那個理由站得住腳嗎?\n\n#### 推演解答\n\n只補金絲雀,這場事故會**大致消失**:壞內容先打中 1% 的機器,那 1% 立刻藍屏、崩潰率指標飆高、自動 rollback 觸發——壞內容在到達全球前就被擋下。爆炸半徑從約 850 萬台縮到約 8.5 萬台量級。但反過來的問題才是這題的肉:CrowdStrike 繞過分階段,理由跟 Cloudflare(見 ch10)繞過分階段一樣,是個**真實的取捨**——這是「威脅情報內容」,當一個新的零時差威脅在野外爆發,你會希望防禦規則**幾分鐘內到達所有客戶**,而不是花幾小時慢慢 canary,讓客戶在這段時間裸奔挨打。所以「快速、全球、同步」對一個安全產品不是疏忽,是設計意圖。教訓不是「金絲雀永遠對」,是:**當你為了某個正當理由(快速防禦)而拿掉一道安全網(分階段),你就必須在別處把它補回來**——這正是為什麼 Content Validator 那道驗證如此關鍵,而它偏偏有 bug。一道孔洞(無金絲雀)是有意的取捨;它致命,是因為本該補位的另一道孔洞(Validator)也破了。瑞士起司:不是哪一層破了,是它們同時破。\n\n### 推演題3 **[15 分鐘]** ★★★（對帳:把你的一次雲端 incident 對應到 F 模式）\n\n回想一次你經歷過、因「別人的服務」出事而被波及的 incident(某次 AWS region 抖動、某個 SaaS 依賴掛掉、某次 DNS 解析失敗)。用本章的 F 模式對帳:它的觸發是一次變更/自動更新嗎(F12)?波及你,是因為同質化＋規模(F14)嗎?你當時看得見故障嗎,還是你的監控也一起瞎了(F2 隱藏相依)?局部如何傳導成你的全域(F7)?\n\n#### 推演解答\n\n(開放題,自答。)一個典型對帳:某次你依賴的第三方 auth provider(或一個 region 的 RDS)出事,你的服務跟著掛。逐項:觸發若是對方的一次部署/設定推送,F12 ✔;你被波及是因為「所有流量都打同一個 provider/同一個 region」,F14 ✔(同質化＋無備援多樣性);你當時若靠對方的 status page 才知道出事(而它延遲更新、或你自己的 alarm 因同 region 而沒叫),F2 ✔;對方一個元件失效讓你的請求全逾時、連線池耗盡、上游也跟著倒,中間若無 circuit breaker / 降級,F7＋緊耦合直通。過關標準:你能把「我們那天掛了是因為 X 公司掛了」這句話,翻譯成「我把單點押在一個我無法控制更新節奏、且我的監控與它共命運的依賴上,沒有降級層」。從「都是他們的錯」升級到「這是我這側的哪幾道孔洞沒補」,就過了——因為下次出事的會是另一家,但孔洞是同一組,而孔洞在你這側才補得了。\n\n### 推演題4 **[20 分鐘]** ★★（設計題:給你的多層 cache library 補一道「雲端單點」防線）\n\n你的招牌多層 cache library 是 in-memory→S3→local 三層,各層壞了能退到下一層,這本身就是漂亮的 graceful degradation(見 ch22)。現在用本章的眼光審它:**如果 S3(us-east-1)整個出事**,這套退化機制會發生什麼?哪一層接得住、哪一層其實偷偷也依賴 S3?設計一道針對「雲端單點失效」的防線,並說清它的代價。\n\n#### 推演解答\n\n關鍵的陷阱在於:S3 那一層掛掉時,你的設計**本意**是退到 local——這很好。但要逐項驗證幾個隱藏相依:(a)你的 in-memory 層在 cache miss 時,是不是會去打 S3 回填?若是,S3 掛掉時,每一次 in-memory miss 都變成一個對掛掉 S3 的慢逾時,可能拖垮 event loop(緊耦合直通,F1)——所以退化邏輯必須在偵測到 S3 不健康時**快速失敗(fail fast)、跳過 S3 層直接走 local**,而不是每次都去敲那扇關著的門等逾時。(b)你判斷「該退到 local」的依據,會不會也依賴 S3(例如某個健康標記存在 S3 上)?那就是隱藏相依。(c)local 層的資料新鮮度——S3 掛幾小時內,local 可能愈來愈舊,你要決定「供應陳舊資料」與「報錯」哪個對業務更安全(這是 graceful degradation 的本質取捨)。一道合理的防線:對 S3 層加 circuit breaker——連續逾時就「打開」,之後一段時間直接跳過 S3、走 local,定期半開試探 S3 是否恢復。代價:circuit 打開期間,寫入 S3 的更新會延遲;以及 local 供應的資料可能陳舊,需要明確的陳舊上限與業務上可接受的退化語意。這正是把本章學到的「別人的機房是你的單點」內化成你已經在做的 graceful degradation 的延伸——你已經有三層,缺的是「偵測到下層是雲端單點失效時,快速失敗而非緊耦合等死」的那道閘。\n\n---\n\n## 自我檢核\n\n口頭自答,講得出來才算過關:\n\n1. 為什麼說 CrowdStrike 這場「不是攻擊、也不是 Windows 出包」?把「內容更新被當資料、卻驅動核心態執行」這句話講清楚:21 對 20 的欄位落差,為什麼會變成藍屏?\n2. 同樣是「一次推全球」,CrowdStrike 跟 ch10 的 Cloudflare 是同一個 F14。它們的「壞東西」分別是什麼(內容規則 vs WAF regex)?金絲雀在兩場各能擋住什麼?\n3. AWS S3 那次,「狀態頁顯示不出故障」為什麼比「S3 掛了幾小時」更值得一個工程師記住?把它連到「監控的是現實還是跟現實一起死的東西」(呼應 ch16)。\n4. Meta 的 DNS「不健康就撤回 BGP」本是防呆設計。它在什麼情境下從「保護」翻轉成「全球自毀」?這跟 ch12 德州電網的哪個機制是同一個形狀?\n5. Fastly 那筆「合法客戶設定」為什麼**不是**客戶的錯?把「潛伏數週的 dormant bug」和「觸發它的合法操作」分開講——災難裝填在哪、觸發在哪?\n6. 四場事故的觸發(typo、例行指令、合法設定、過了驗證的內容)有什麼共同點?為什麼「找出按錯鈕的人」對這四場都是錯的問法?\n7. 「自動更新」為什麼是「變更即觸發(F12)」的現代版、而且比你自己的部署更危險?它躲過了你哪幾道平時的防線(code review、canary、藍綠、rollback)?\n8. 在你自己的系統裡:你的復原路徑(登入、部署、rollback、看 runbook)有沒有依賴你正要修的東西?如果整個 region 消失,你的「它掛了」訊號從哪裡來?\n\n## 延伸閱讀\n\n- **CrowdStrike 官方 RCA**:*Channel File 291 Incident — External Technical Root Cause Analysis*(2024-08-06)。<https://www.crowdstrike.com/wp-content/uploads/2024/08/Channel-File-291-Incident-Root-Cause-Analysis-08.06.2024.pdf> — 本章主案一手來源。逐項講清 21 對 20 欄位、越界讀取、Content Validator 缺陷、以及「Rapid Response Content 無分階段發布」這條核心孔洞。把「內容更新」當「程式碼」對待這件事,值得每個會推設定到全球的人讀。\n- **AWS S3 us-east-1 postmortem**:*Summary of the Amazon S3 Service Disruption in the Northern Virginia (US-EAST-1) Region*。<https://aws.amazon.com/message/41926/> — 一手來源。讀「狀態頁本身依賴 S3 所以無法顯示故障」那段,它是「隱藏相依/監控與被監控共命運」最簡潔的真實案例;以及 AWS 改成跨多 region 狀態頁的修正。\n- **Fastly 官方 postmortem**:Nick Rockwell, *Summary of June 8 outage*。<https://www.fastly.com/blog/summary-of-june-8-outage> — 一手來源,且坦白。「5/12 引入潛伏 bug、6/8 一筆合法設定觸發」是「潛伏條件 vs 觸發」的教科書,加上那句「我們應該要能預期到這種失效」——對失敗模式缺乏想像,本身就是一道孔洞。\n- **Meta BGP 事故說明**:*More details about the October 4 outage*(Engineering at Meta,2021-10-05)。<https://engineering.fb.com/2021/10/05/networking-traffic/outage-details/> — 一手來源。看「DNS 自動撤回 BGP 把局部放大成全球」與「修復工具/門禁依賴已斷網路」兩段,前者是 ch12 自我保護反噬的重演,後者是「復原路徑的循環依賴」最痛的示範。\n"}, {"id": "ch14-challenger", "file": "ch14-challenger.md", "group": "Part V — 漂移到失效", "title": "ch14 — 挑戰者號：那通發射前夜的電話會議", "md": "# ch14 — 挑戰者號：那通發射前夜的電話會議\n\n> **本章解剖什麼**：一個低溫下會失效的橡膠密封環，早被工程師明確警告、卻在一次次「沒出事」中被組織重新定義成「可接受的常態」，最終讓太空梭在升空 73 秒後解體、7 名太空人罹難。這是 Part V「漂移到失效」的開場——前面四個 Part 看的是機器、數字、感測器、級聯如何崩壞；從這裡開始，**主角換成組織本身**。挑戰者的物理因（O-ring）不到一節就講完；真正要解剖的是「偏差正常化」（normalization of deviance）——本書第一次把這個核心概念攤開講透，後面三章（哥倫比亞、三哩島、車諾比）都會回來踩它。主打 **F6**（偏差正常化／漂移）、**F13**（生產壓力壓過安全）、**F3**（起司孔洞對齊）、**F8**（潛伏條件 vs 觸發）。哥倫比亞（見 ch15）是同一個組織十七年後的復發；「漂移」這個詞在 ch02 已先定義。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲     ←    ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘  ◄你在這裡\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n先講一個你親手做過的決定。\n\n你的 FluentBit + Lua 可觀測性 pipeline 上，有一條告警在某段時間每週都響。你查過——它對應的是某個邊界情況下的短暫 spike，每次都自己恢復，從沒釀成真正的 incident。於是某個禮拜五，你把它從 `critical` 降成 `warning`，或者乾脆加了一條抑制規則。理由很充分：它在製造噪音，淹沒真正重要的告警，而且**過去 N 次都沒事**。\n\n這個動作本身沒有錯。問題在於它的形狀。\n\n你做的事，是拿「過去沒出事」當成「未來不會出事」的證據，然後把一條原本標記「危險」的訊號，重新標記成「正常」。你沒有去問:那 N 次「沒事」，到底是因為這個情況真的安全，還是因為**剛好每次都有別的東西兜住了**？你把「我們很幸運」誤讀成「我們很安全」。\n\n這就是這一章的全部。1986 年 1 月 28 日早上，NASA 和它的承包商 Morton Thiokol 做的，是同一件事的放大版——只是他們降級的不是一條 log 告警，是一個會在低溫下漏燒燃氣的火箭密封環；而代價不是被噪音淹沒，是七條人命。\n\n焦慮工程師的第一信條是「『應該沒事吧』是訃聞的第一句」。挑戰者要教你的，是這句話的近親、也是更陰險的版本：**「過去都沒事，所以這次也沒事。」** 前者是沒查清楚就賭，後者是查清楚了、賭贏了好幾次，然後把連續賭贏當成了不會輸的證明。你天天在跟它打交道——只是它平時不索命，所以你不怕它。\n\n讀完這章，你會看自己那條降級的告警時，多問一句:我把它調成 warning 的那一刻，到底是消除了噪音，還是把一個「已知問題、暫時沒爆、大家習慣了」的東西，正式蓋上了「正常」的印章？\n\n## 冷開場：佛州那個結冰的早晨\n\n1986 年 1 月 28 日，佛羅里達州甘迺迪太空中心。發射台 39B 上，太空梭挑戰者號（任務代號 STS-51-L）等著升空。\n\n那天早上反常地冷。發射台周邊的氣溫在攝氏零度上下徘徊（約 −1 至 2°C，華氏 36 度上下；數字照 landscape），發射架上掛著冰柱——對佛州的太空梭發射來說，這是史無前例的低溫。挑戰者過去所有飛行、以及整個太空梭機隊過去的每一次發射，都在比這暖得多的天氣下進行。\n\n機上有 7 名太空人。其中一位是 Christa McAuliffe——一名高中社會科老師，「太空中的教師」計畫選出的第一位平民。全美數以千計的教室裡，孩子們正透過電視看她升空。這場發射的公眾能見度高得異常。\n\n上午發射。點火、升空、爬升。看起來一切正常。\n\n73 秒後，在大約 14 公里高空、最大動壓的時刻，挑戰者在一團橘白色的火球中崩解。七名機組人員全數罹難。\n\n電視機前的孩子們看著那團煙。\n\n接下來的篇幅，不是要重播這 73 秒——這場災難的殘酷不需要被當成奇觀。要解剖的是更早的東西:在那個火球之前，這場災難**已經被裝填好至少九年了**，而最後一道本來可以擋下它的防線，在發射前一夜的一通電話會議裡，被人親手拆掉。\n\n## 裝填：一個從一開始就有裕度問題的接頭\n\n太空梭的兩支固體火箭推進器（Solid Rocket Booster, SRB）不是一體成形的。它們由幾段圓筒在工廠分別製造，再運到發射場組裝——段與段之間的接縫叫「場接頭」（field joint）。每個接頭靠兩道橡膠 O-ring（一道主環、一道副環）把段內燃燒的高溫高壓氣體封在裡面，不讓它從接縫漏出去。\n\n這裡有一個從設計階段就埋下的物理問題，叫「接頭旋轉」（joint rotation）。點火瞬間，推進器內部壓力暴增，金屬筒壁會向外鼓脹，接縫處因此張開一道極微小的縫隙。O-ring 必須在這幾分之一秒內**自己彈開、跟上這道縫**，把它重新填滿密封。這要求橡膠有足夠的彈性、夠快地回彈。\n\n橡膠的彈性，跟溫度高度相關。天氣越冷，橡膠越硬、回彈越慢。冷到一定程度，等它慢吞吞地想跟上那道縫時，縫已經張開、高溫燃氣已經從旁邊溜過去了——這叫「吹漏」（blow-by）。燃氣會侵蝕（erosion）O-ring 的橡膠表面。\n\n這個低溫敏感性不是事後才發現的。它在挑戰者之前**已經反覆地、具體地顯現過**。先前的飛行回收檢查中，多次飛行的 O-ring 上發現過侵蝕或吹漏的痕跡（多份資料一致；landscape 與調查證據支持）。其中包括一次在約華氏 53 度發射後出現的明顯吹漏——這成了後來那條「53°F 不應發射」建議的數據錨點。\n\n所以災難的「潛伏條件」（latent condition，F8）在發射前一夜之前，早就全部到位了:\n\n- 一個對接頭旋轉和低溫**本就缺乏裕度**的密封設計。\n- 一份**已知的、會講話的證據**——好幾次飛行回來，O-ring 都帶著被燒過的痕跡。\n- 一個發射時程被排得很緊、且這次掛著巨大公關期待（教師上太空）的計畫。\n\n萬事俱備。只差有人在那個冷得反常的早晨，按下發射鈕。問題是——**為什麼明明手上握著「O-ring 會被燒」的證據，組織還會走到按鈕前面？**\n\n## 偏差正常化：把「侵蝕」一次次重新定義成「可接受」\n\n這是本書要你帶走的核心概念，所以慢慢講。\n\n社會學家 Diane Vaughan 在事後花了多年研究 NASA 的決策過程，寫成《The Challenger Launch Decision》（1996），提出了「偏差正常化」（normalization of deviance）這個詞。它描述的不是某個人的疏忽，而是一整個組織如何**在每個當下都做出看似合理的決定，卻在累積之後一步步走向災難**。\n\n機制是這樣的。\n\n第一次飛行回來，工程師在 O-ring 上發現了不該有的侵蝕。按設計規格，這是「異常」——O-ring 本來根本不該被燒到。理性的反應應該是:停下來，這個密封設計有問題，得修。\n\n但同時還有另一條敘事:雖然主環被燒了，但氣體最終沒漏穿、太空梭安全回來了。於是有人說——你看，**我們有裕度**（margin）。主環被侵蝕了一部分，但它撐住了；就算它沒撐住，還有副環。系統「證明」了它能容忍這種侵蝕。\n\n於是「O-ring 被燒」這件事，從「異常、必須修的設計缺陷」，被悄悄重新分類成「已知、已理解、在裕度範圍內、可接受的飛行風險」。\n\n下一次飛行回來，又有侵蝕。但這次「不算意外」了——我們上次就見過，上次沒事，這次也沒事。每一次「沒出事」，都被當成「裕度足夠」的新證據，把可接受的邊界往外推一點。異常變成預期，預期變成正常。安全邊界就這樣被一口一口吃掉，而**沒有任何一刻有人覺得自己在做危險的事**——每一步都有上一步當靠山。\n\n這就是 **F6**（偏差正常化／漂移）的純粹形態。它的可怕之處，正在於它不需要任何人犯下明顯的錯誤、不需要任何壞人、不需要任何一個「應該沒事吧」的莽撞時刻。它由一連串各自合理、各自有數據支持的小決定組成。Vaughan 的洞見尖銳得讓人不舒服:做這些決定的工程師和管理者，**不是無知、不是邪惡，他們是在一個把僥倖逐步制度化的系統裡，照著當下看起來最理性的方式行事**。\n\n把「我們很幸運」當成「我們很安全」——而且是組織層級、反覆地、有會議紀錄背書地這麼做。這就是漂移。\n\n注意這跟「單一根因」迷思的對立（呼應 ch02）。如果你問「挑戰者為什麼會炸?」答「因為 O-ring 在低溫下失效」，你只答對了物理層。真正的問題是:**為什麼一個被警告了至少九年、有多次飛行帶傷回來作證的已知缺陷，會被允許一路活到發射台上?** 答案不在那枚橡膠環裡，在組織裡。\n\n## 觸發：發射前一夜的那通電話\n\n1986 年 1 月 27 日傍晚到深夜——發射前一夜。\n\n製造 SRB 的承包商 Morton Thiokol 的工程師看到了隔天的低溫預報，警鈴大作。隔天的氣溫將遠低於過去任何一次發射。對最了解這些密封環的人來說，這是一條他們等了很久、最不想看到的數據。\n\n當晚召開了一場 NASA 與 Thiokol 之間的電話會議（teleconference）。Thiokol 的工程師——包括密封環專家 Roger Boisjoly 和 Arnold Thompson——把他們的分析攤在桌上。他們展示了 O-ring 在低溫下回彈變慢、密封能力下降的證據，明確建議:**氣溫低於華氏 53 度，不應該發射**（53°F 這個門檻來自過去飛行的數據錨點；多份資料一致）。\n\n這是工程師在做工程師該做的事——基於物理和數據，畫出一條安全線，然後守住它。\n\n接下來發生的，是這整章的核心場景，也是 **F13**（生產壓力壓過安全）的教科書範例。\n\nNASA 那一端的反應不是「謝謝你們，那我們延期」。據事後的證詞與調查，NASA 的人對這個建議表達了強烈的不滿與壓力——大意是「你們什麼時候開始把『53 度』當成發射標準了?」「你們是要我們等到四月嗎?」這場發射已經延過好幾次，時程壓力、公關期待（教師上太空）、被人質疑專業判斷的氛圍，全壓在 Thiokol 身上。\n\n注意這裡的權力與資訊結構:Thiokol 是承包商，NASA 是客戶。承包商要拒絕客戶想要的東西，本就極難；而 NASA 慣常的決策框架是「**證明它不安全**」，而不是「**證明它安全**」——這個舉證責任的方向，後來被 Rogers 委員會點名為文化病灶之一。低溫數據本身不算「乾淨」（過去有一次低溫飛行 O-ring 反而沒事，給了反對者「你的相關性不成立」的反駁空間），於是工程師被推到一個幾乎不可能的位置:在客戶施壓下，**證明一個尚未發生的失效一定會發生**。\n\nThiokol 的管理層要求暫停通話，私下商議（offline caucus）。\n\n就在這個私下商議裡，發生了那句被反覆引用的話。Thiokol 的資深副總 Jerald Mason 對工程副總 Bob Lund 說了那句話的大意:**「拿掉你的工程師帽，戴上你的管理者帽。」**（\"Take off your engineering hat and put on your management hat.\"；多份資料一致引用，包括 Rogers 委員會證詞與後續紀錄）\n\n這句話是整場災難的縮影。它要求的，是把「物理會不會殺人」的問題，換成「組織能不能承受再延一次」的問題——讓後者壓過前者。在這個私下會議裡，工程師被排除在外；管理層重新投票，推翻了工程師「不發射」的建議，改為**建議發射**。Bob Lund 戴上了他的管理者帽，跟著管理層的多數，把工程判斷讓了位。\n\n電話會議回到線上時，Thiokol 給出的官方建議是:可以發射。\n\n那條本來可以擋下災難的防線——「我們最懂這個密封環的人，畫了一條紅線」——就在這通電話裡，被組織的生產壓力親手拆掉了。\n\n工程師 Boisjoly 沒能說服任何人。隔天早上，他和同事看著挑戰者升空，據他事後所述，當火箭飛過 73 秒那個點、沒有立刻出事時，他們一度鬆了口氣——然後就看到了那團煙。\n\n## 連鎖與餘波\n\n技術上的連鎖很快。點火瞬間，右側 SRB 的場接頭在低溫下未能即時密封，一股熾熱燃氣噴穿了 O-ring——發射影像裡那一縷不該有的黑煙就是它。短暫地，熔化的絕熱材料和燃燒殘渣堵住了破口，給了一個假的喘息。但在大約第 58 到 73 秒之間，一陣強烈的高空風切重新撕開了那個臨時的封堵，火舌從接頭側面噴出，燒穿了連接點與外部燃料箱。結構在最大動壓下崩解。\n\n這裡校正一個常見說法（landscape 標出的迷思）:嚴格說，挑戰者**不是「爆炸」（explosion）**。發生的是空氣動力負荷下的結構崩解（breakup / disintegration）——外部燃料箱裡的推進劑釋放燃燒形成了那團巨大火球，但太空梭本體是被解體，不是被一顆炸彈炸開。這個區別不是咬文嚼字:它提醒你，這場災難的物理是「密封失效→燃氣燒穿結構→結構在氣動力下解體」的連鎖，每一環都可追溯，沒有一處是不可知的神祕爆炸。\n\n事後成立了總統委員會調查——以主席命名的 Rogers 委員會（Rogers Commission），1986 年 6 月提出報告。委員會的結論分兩層:**物理因**是低溫下 O-ring 密封失效；但**貢獻因**（contributing cause）是 NASA 的決策過程與安全文化缺陷——風險溝通失真、忽視工程警告、把舉證責任放錯方向。換句話說，調查報告自己就拒絕了「單一根因」的答案。\n\n委員會裡有一位物理學家 Richard Feynman。在一場公開聽證會上，他做了一件後來家喻戶曉的事:他拿了一段 O-ring 橡膠樣本，用一個 C 形夾把它夾扁，泡進面前那杯冰水裡，過一會兒拿出來——橡膠在低溫下失去了彈性，沒有及時彈回原狀。一杯冰水，當眾把這場災難的物理核心演示給全國看。\n\n但要校正另一個迷思（landscape 標出）:**這不是「Feynman 一個人查出真相」的故事**。冰水演示影響力巨大，但 O-ring 的物理早就在工程師的資料裡、根因由整個委員會與大量工程證據確立。Feynman 真正的貢獻，不在於「發現」O-ring，而在於他不肯讓調查停在物理層——他逼出了那個更難堪的數字落差:NASA 管理層對外宣稱的整機災難性失敗率約為**十萬分之一**，而第一線工程師的實際估計約為**一百到兩百分之一**（見 Feynman 為報告寫的附錄 F，Appendix F）。兩者差了**約三個數量級**。\n\n這個落差才是 Feynman 想讓你看見的東西:不是某個人算錯了，而是一個組織的官方樂觀，與它自己工程師的清醒恐懼，**整整脫節了上千倍**——而管理層拿來做發射決定的，是那個漂亮的官方數字。他在附錄 F 末尾寫下那句話:「For a successful technology, reality must take precedence over public relations, for nature cannot be fooled.」（對一項成功的技術而言，現實必須凌駕於公關之上，因為大自然無法被糊弄。）\n\n這句話，就是整個 Part V 的座右銘。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**潛伏條件（早就裝填好的，F8）**:\n\n- 場接頭密封設計對接頭旋轉與低溫**本就缺乏裕度**——這是物理層的潛伏缺陷。\n- 多次先前飛行的 O-ring 帶著侵蝕／吹漏痕跡回來——**證據早就在桌上**，而且會講話。\n- 偏差正常化（F6）:每一次「沒出事」都被重新詮釋成「裕度證明」，把異常逐步制度化成「可接受風險」。這是組織層的潛伏缺陷，也是本章主角。\n- 風險溝通的數量級落差:官方 1/100,000 vs 工程 1/100~1/200。\n- 把舉證責任放在「證明它不安全」而非「證明它安全」的決策文化。\n\n**觸發（最後那根稻草，trigger）**:\n\n- 發射當日反常的低溫，把潛伏的物理缺陷推到失效點。\n- 發射前一夜的電話會議:工程師的「不發射」建議在生產壓力下被推翻（F13）。低溫只是物理觸發；**真正的觸發是那通電話裡，安全邊界被組織親手讓位**。\n\n一句關鍵分辨:O-ring 在低溫下會失效，這是**潛伏**——它在那個冷早晨之前就成立了。觸發不是「天氣變冷」這件事本身，而是「**在已知低溫風險下，仍決定發射**」這個決定。災難早就裝填好；扣下扳機的是會議室，不是天氣。\n\n### 起司的孔洞\n\n這場災難要穿過好幾層本來該擋住它的防禦。每一層都有洞，那天恰好對齊（F3）。\n\n| 防禦層（本該擋住的） | 它存在嗎 | 為什麼那天沒擋住 |\n|---|---|---|\n| 密封設計的安全裕度 | 名義上有（雙 O-ring 冗餘） | 設計對低溫＋接頭旋轉本就裕度不足；副環在低溫下同樣會硬化，「冗餘」是同一個失效機制的兩份副本，不是獨立防線 |\n| 飛行後檢查發現的侵蝕證據 | 有，且反覆出現 | 證據被「正常化」吸收——每次侵蝕都被歸類為「在裕度內、可接受」，警訊被當成了背景噪音（F6） |\n| 工程師的專業判斷 | 有，且當晚明確提出 | 在生產壓力下被推翻；「拿掉工程師帽」把物理問題換成了排程問題（F13） |\n| 發射前夜的會議流程 | 有，正式的 go/no-go 決策會 | 舉證責任放反方向（要工程師證明「一定會失效」而非要管理層證明「一定安全」）；管理層私下商議時把工程師排除在外 |\n| 上層的風險認知 | 名義上有失敗率評估 | 官方數字（1/100,000）與工程現實（1/100~1/200）差約三個數量級——上層拿著一個錯了千倍的樂觀數字在做決定（F11 的近親:該被聽見的訊號沒被聽見） |\n\n沒有任何**單一**孔洞會釀災。如果那天暖一點、如果證據沒被正常化、如果工程師的紅線守住了、如果舉證責任放對方向、如果上層拿的是工程師的真實數字——任何一層擋住，七個人就回得來。災難需要它們**同時**破洞、同時對齊。這就是為什麼「都是某某人的錯」是錯的問法:沒有一個「某某人」能單獨製造這場災難。\n\n### 對應模式\n\n- **F6 偏差正常化／漂移（本章主打、全書首次攤開）**:O-ring 侵蝕從「異常」被一次次重新定義為「可接受」，安全邊界被逐步吃掉。這是 Part V 的核心，ch15（哥倫比亞）、ch12（德州電網的「早被警告卻不防寒」）都是它的變奏。\n- **F13 生產壓力壓過安全**:發射時程與公關期待壓過了「先停下來查清楚」；「拿掉工程師帽」是它最精煉的一句台詞。\n- **F3 起司孔洞對齊**:見上表——至少五層防禦各有洞，那天對齊。\n- **F8 潛伏條件 vs 觸發**:災難在發射前至少九年就裝填完畢，低溫與那通電話是觸發。\n\n### 一句話總結\n\n**這場災難的形狀是:一個被警告了至少九年的已知缺陷，在「每次僥倖都被當成安全證明」的漂移中被制度化成「正常」，最後在生產壓力下、由一通推翻工程師紅線的電話會議扣下扳機——物理只是執行了組織早已做好的決定。**\n\n## 換成你的系統\n\n你不發射火箭。但你天天在做「拿掉工程師帽」的決定，只是規模小到不會上新聞。\n\n點名一個你「應該沒事吧」的假設:**你那條從 critical 降成 warning 的告警。**\n\n當初降它，你的理由和 NASA 接受 O-ring 侵蝕的理由結構上一模一樣——「過去 N 次都沒釀成 incident，所以它在裕度內、可接受」。但你有沒有問過那個 Vaughan 會問的問題:那 N 次「沒事」，是因為這個情況**真的安全**，還是因為**每次都剛好有別的東西兜住了**？\n\n具體說清楚這個假設錯掉時會怎麼壞。假設那條告警對應的是「某個 downstream 服務偶爾回 5xx，但你的多層 cache library 的 graceful degradation 每次都退到下一層、使用者沒感覺」。你看到的「沒事」，其實是 cache 那一層在默默兜底。你把告警降級，等於把「downstream 在腐爛」這個訊號靜音了。然後某天，cache 那層因為別的原因（記憶體壓力、一次部署、一個 TTL 改動）剛好也退化了——兩個原本錯開的孔洞對齊。downstream 還在回 5xx，但這次沒人兜底了，而你早就把那盞燈關了。你在事後 postmortem 裡會寫:「告警在事發前已被降級，未及時察覺。」這就是你的 73 秒。\n\n更陰險的是:**降級的決定本身，當下看起來完全合理。** 你不是莽撞，你是查過數據、賭贏了 N 次、然後把連續賭贏理性化成了「這個風險已被理解、在控制中」。這正是 F6 不可怕在「有人犯蠢」、可怕在「每一步都合理」的地方。\n\n可操作的自問（不要只喊「要小心」）:\n\n1. **盤點你的「已被正常化的偏差」清單。** 把團隊裡所有「已知問題、暫時沒爆、大家習慣了」的東西列出來——長期紅的 flaky test、長期偏高但「還能接受」的錯誤率、那個「重啟一下就好」的記憶體洩漏、那條被降級的告警。每一條都問:它是真的安全，還是只是還沒輪到它對齊?\n2. **對每一條，分辨「可接受的風險」與「被正常化的偏差」。** 區別在於:可接受的風險是**主動分析過、寫下了為什麼可接受、定義了會重新評估的條件**；被正常化的偏差是**因為「過去沒事」而默認接受、沒人記得當初為什麼、也沒有重新檢視的觸發點**。前者有 owner 和退出條件，後者只有慣性。\n3. **檢查你的舉證責任方向。** 當有人說「這個改動應該沒問題吧」，你的流程預設是「他要證明它安全」還是「反對者要證明它不安全」？挑戰者那晚，舉證責任放反了——工程師被要求證明「一定會失效」。你的 code review、你的 go/no-go、你的 oncall handoff，預設站在哪一邊?\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n用你自己的話，向另一個工程師講清楚一件事:**為什麼這群工程師明明知道風險，卻沒能阻止發射?** 不准用「他們被逼的」「管理層太爛」這種一句話歸因。你要講出至少三個**系統層級**的因素，說明「換成你坐在那通電話前，在那個資訊量、那個權力結構下，未必能做得更好」。\n\n#### 推演解答\n\n至少三個系統因素:\n\n1. **舉證責任放反了方向。** NASA 的決策框架是「證明它不安全才不發射」，而不是「證明它安全才發射」。工程師被推到一個邏輯上幾乎不可能的位置——在客戶施壓下，用一份不完美的數據集（過去有一次低溫飛行 O-ring 反而沒事，削弱了相關性），去**證明一個尚未發生的失效一定會發生**。這個舉證方向，讓「謹慎」變成了需要被辯護的一方。\n\n2. **權力與身分結構。** Thiokol 是承包商，NASA 是客戶；承包商拒絕客戶想要的東西本就極難。而「拿掉工程師帽、戴上管理者帽」這句話，明確地把決策框架從「物理會不會殺人」切換到「組織能不能承受再延一次」——這不是某個壞人的惡意，是一個讓「工程判斷」結構性地讓位給「管理考量」的機制。\n\n3. **偏差正常化已經把人的感知校準掉了（F6）。** 經過多次「O-ring 帶傷回來但沒事」的飛行，在場每個人的「正常」基準線都已經偏移了。對他們來說，O-ring 侵蝕不是「異常」，是「我們很熟、在控制中的已知現象」。所以工程師的警告聽起來不像「天要塌了」，更像「老問題又來了，但我們一向都過得去」。**漂移的可怕，正在於它連當事人對危險的直覺都一起重新校準了。**\n\n關鍵領悟:這三條沒有一條需要「有人很蠢」或「有人很壞」。換成你在那個時空、那個資訊量、那個權力結構下，你的「合理」很可能也會把你帶到同一個按鈕前。這就是為什麼「找出那個犯錯的人」是錯的問法——你要找的是「是什麼系統條件，讓這群不蠢不壞的人，在那一刻幾乎不可能做對」。\n\n### 推演題2 **[20 分鐘]** ★★★\n\n**反事實。** 挑戰者的設計有兩道 O-ring——主環和副環，名義上是冗餘。請論證:在低溫這個特定失效情境下，這個「冗餘」為什麼幾乎沒有提供任何額外保護?然後把這個教訓搬到你的系統:你有哪個「冗餘」其實是同一份失效機制的兩份副本?\n\n#### 推演解答\n\n**為什麼雙 O-ring 冗餘在低溫下幾乎無效:** 真正的冗餘要求兩個防線**獨立失效**——一個壞掉的原因不會同時讓另一個壞掉。但主環和副環是同一種橡膠、處在同一個接頭、暴露在同一個低溫下。讓主環失效的機制（低溫→橡膠硬化→回彈太慢→跟不上接頭旋轉），**一字不差地**也作用在副環上。所以這不是「兩道獨立防線」，是「同一個失效模式的兩份副本」。低溫一來，兩道一起變鈍。冗餘要擋的是隨機的、獨立的單點失效；它擋不住一個同時打中所有副本的**共因失效**（common-mode failure，這個詞 ch10 的 Cloudflare 全球同步推送與 ch13 的雲端連鎖也會踩到）。\n\n**搬到你的系統:** 經典例子——你為了高可用，把服務跑了三個 replica。但這三個 replica:跑著同一份 build（同一個 bug 的三份副本）、連同一個 RDS（同一個 SPOF）、在同一個 AZ（同一次機房事件全滅）、由同一條 CI pipeline 同步部署（同一次壞部署一起中毒）。你以為你有 3x 冗餘，其實對「程式 bug」「資料庫掛掉」「AZ 故障」「壞部署」這四類失效，你的冗餘度是 **1**——它們是同一份失效機制的三份副本。真正的冗餘要的是**多樣性**(diversity):不同的失效域、不同的部署批次、最好連實作都不完全相同（這點 ch22 韌性工程會展開）。問自己:我的每一層冗餘，到底擋的是哪一類失效?有沒有一個原因能一次打穿所有副本?\n\n### 推演題3 **[15 分鐘]** ★★\n\n**對帳。** 翻出你維運過的一次真實 incident（或一個正在進行中的「已知問題」）。把它對應到本章的 F 模式:它裡面有沒有 F6（某個訊號被「過去沒事」正常化了）?有沒有 F13（某次「先上了再說」的生產壓力壓過了謹慎）?寫下「當初接受這個風險時，我們是主動分析過並定義了退出條件，還是只是因為過去沒事就默認了?」\n\n#### 推演解答\n\n（這題的答案因人而異，但好的對帳長這樣。）\n\n範例:你那次「setTimeout 重啟後排程訊息遺失」的問題（後來你把它重寫成 cron job queue）。在重寫之前，這很可能是一個被正常化的偏差——「服務很少重啟，重啟時剛好有待跑排程的機率很低，過去沒出過大事」。這是 F6:你拿「過去沒事」當「安全」，而真正的安全要靠「重啟不會丟訊息」這個性質本身成立，不是靠「很少重啟」這個運氣。\n\n關鍵在那個分辨問題的答案。如果你當初是:「我們知道這有風險，評估過影響範圍、寫進了 known issues、並定了『等流量到 X 就重做』的觸發條件」——那是**可接受的風險**，有 owner、有退出條件。如果是:「啊那個喔，一直都這樣，重啟一下就好，沒人記得當初為什麼沒處理」——那是**被正常化的偏差**，只有慣性，沒有人在看著它。\n\n對帳的價值不在於審判過去的自己，而在於:現在你手上**正在發生**的「已知問題」清單裡，哪幾條是後者?哪幾條的「沒事」其實是別人在兜底、而你看不見?\n\n### 推演題4 **[10 分鐘]** ★\n\n**找出流行說法的破綻。** 有人跟你說:「挑戰者就是一個 O-ring 在低溫下失效的工程意外，運氣不好碰上冷天。」請指出這個說法漏掉了什麼、為什麼它危險。\n\n#### 推演解答\n\n它漏掉了**整條組織線**，而組織線才是 Rogers 委員會和 Vaughan 認定的根因。破綻有三:\n\n1. **「工程意外」抹掉了「早被警告」。** 工程師發射前一夜明確反對、畫了 53°F 的紅線。風險不是未知，是已知且被說出口、然後被推翻。把它叫「意外」，等於把一個被組織壓過的警告，洗成了一個沒人能預見的不幸。\n\n2. **「運氣不好碰上冷天」抹掉了「決定」。** 低溫是潛伏條件，不是觸發。觸發是「在已知低溫風險下仍決定發射」這個會議室裡的決定。把責任推給天氣，正好放過了那個該被檢視的決策過程。\n\n3. **它危險，因為它讓你學不到能救命的教訓。** 如果挑戰者只是「運氣差的工程意外」，那你只要「下次運氣好一點」就行——什麼都不用改。但如果它是「偏差正常化＋生產壓力壓過工程紅線」，那教訓就指向你**能控制**的東西:怎麼不把僥倖正常化、怎麼不讓管理考量輾過工程判斷、怎麼把舉證責任放對方向。把災難歸給運氣，是放棄學習。這正是哥倫比亞（見 ch15）十七年後又來一次的原因——同一個組織把同一個教訓學成了「運氣問題」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關:\n\n1. 「偏差正常化」的機制是什麼?用 O-ring 侵蝕為例，講出「異常如何一步步被重新定義成正常」的完整過程，且**不靠任何人犯錯或使壞**。\n2. 為什麼說這場災難的「觸發」不是低溫本身，而是那通電話會議的決定?潛伏條件和觸發在這裡怎麼分?\n3. 「拿掉你的工程師帽、戴上管理者帽」這句話，把什麼問題換成了什麼問題?為什麼這個切換是致命的?\n4. 雙 O-ring 的「冗餘」為什麼在低溫情境下幾乎沒用?這跟「真正的冗餘需要獨立失效」有什麼關係?\n5. Rogers 委員會的結論為什麼**拒絕**「單一根因」?列出至少三層各自獨立、那天恰好對齊的防禦孔洞。\n6. Feynman 的冰水演示真正的貢獻是什麼?為什麼說「Feynman 一個人查出真相」是個需要校正的說法?那個 1/100,000 vs 1/100 的數量級落差說明了什麼?\n7. 在你自己的系統裡，怎麼分辨「可接受的風險」和「被正常化的偏差」?（提示:owner、退出條件、當初是否主動分析過。）\n8. 如果你要向一個資淺工程師一句話講完這章，你會說挑戰者的災難「形狀」是什麼?\n\n## 延伸閱讀\n\n- **《Report of the Presidential Commission on the Space Shuttle Challenger Accident》（Rogers Commission，1986-06）** — 一手官方調查報告。一定要讀它如何把結論分成「物理因（O-ring）」與「貢獻因（決策過程與安全文化）」兩層——它本身就示範了拒絕單一根因的調查該長什麼樣。NASA 全文:https://history.nasa.gov/rogersrep/genindex.htm\n- **Richard Feynman，《Appendix F: Personal Observations on the Reliability of the Shuttle》** — Feynman 為報告寫的個人附錄，獨立成篇。讀那個 1/100,000 vs 1/100~1/200 的數量級落差，以及收尾那句「reality must take precedence over public relations, for nature cannot be fooled」——這是整個 Part V 的座右銘。https://www.nasa.gov/history/rogersrep/v2appf.htm （Caltech PDF:https://calteches.library.caltech.edu/3570/1/Feynman.pdf）\n- **Diane Vaughan，《The Challenger Launch Decision: Risky Technology, Culture, and Deviance at NASA》（1996）** — 「偏差正常化」一詞的出處與最完整論證。如果你只想帶走一個概念進你的工作，就是這個。（書，非免費連結；本章對它的轉述為摘要，細節以原著為準。）\n"}, {"id": "ch15-columbia", "file": "ch15-columbia.md", "group": "Part V — 漂移到失效", "title": "ch15 — 哥倫比亞號：同一個組織，十七年後又來一次", "md": "# ch15 — 哥倫比亞號：同一個組織，十七年後又來一次\n\n> **本章解剖什麼**：這是一場「文化頑固復發」的災難。技術上，一塊脫落的絕熱泡棉撞破了機翼前緣的熱防護，讓重返大氣時的電漿從那個破口灌進機翼結構。但 CAIB（哥倫比亞事故調查委員會）的中心結論不在那塊泡棉，而在更冷的一句話：NASA 沒有從十七年前的挑戰者（見 ch14）學到任何東西——同樣的偏差正常化、同樣被壓下去的工程異議、同樣失能的安全文化，在同一個組織裡又演了一遍。主打 F6（偏差正常化／漂移）、F13（生產壓力壓過安全）、F3（起司孔洞對齊）、F11（監控盲區）。它和 ch14 是一組：挑戰者是「第一次」，哥倫比亞是「明明寫過報告、卻又一次」。它證明了一件讓人睡不著的事——寫得出好的 postmortem，不等於學到教訓。\n\n## 從你已知的出發\n\n你的團隊一年前出過一次 incident。你還記得那次值班的混亂、記得隔天大家圍在會議室一條條列 contributing factors、記得 postmortem 文件最後那欄漂亮的 action items——「為 X 加上 circuit breaker」「補上 Y 的合理性檢查」「把那個每天都響、大家早就靜音的 alarm 重新校準」。文件寫得很好，blameless 那一欄填得很誠懇，大家點頭，會議結束。\n\n現在把那份文件翻出來。一年了。誠實數一下：那幾條 action items，真正落地的有幾條？\n\n我猜你心裡已經有答案，而且那個答案不會讓你舒服。circuit breaker 開了 ticket，排進 backlog，被三個 P0 插隊，現在還在 backlog 裡躺著。合理性檢查加了一半，因為「先上線、之後補」。那個 alarm？又被靜音了，因為它還是每天都響、還是每次都沒事——你們甚至沒注意到，它已經悄悄從「待處理的告警」被重新定義成「背景噪音」（這正是 ch02 講的漂移、ch14 講的偏差正常化）。\n\n這就是哥倫比亞要教你的事，而且它教得比任何一場 incident 都狠：**寫了報告，不等於學到教訓。** 挑戰者炸了，NASA 開了一個總統委員會（Rogers Commission），寫出一份至今仍是教科書級的調查報告，列了一長串建議，全美國都看著他們改。十七年後，同一個組織，同一種文化病，七個人又死了一次。如果連 NASA——在全世界鎂光燈下、被國會盯著、有無限預算做 postmortem 的 NASA——都會讓 action items 腐爛、讓同型災難回來，那你那份躺在 Confluence 角落、沒人 review 的 postmortem，憑什麼例外？\n\n## 冷開場：失聯前的十六分鐘\n\n2003 年 2 月 1 日，週六早晨。哥倫比亞號（STS-107 任務）在軌道上待了十六天，正要回家。它以約 25 倍音速、頭朝下、機腹迎著大氣，重返地球——這是太空梭飛行裡最暴力的階段之一，機腹的熱防護要扛住約 1,600°C 的電漿。\n\n德州時間清晨，地面的飛行控制員開始看到一些不對勁的數據。左翼幾個液壓系統的溫度感測器讀數先是異常上升，然後一個接一個「失效」——不是讀到高溫，是直接斷訊，線路像被一段一段切斷。接著左翼的胎壓感測器也掉了。輪機長（MMACS）在通話裡報告：「我這邊掉了四個感測器……」飛行主任問他怎麼看，他還在試圖理解這幾個讀數有沒有共同點。\n\n地面沒人知道，這些感測器不是壞了——是它們所在的左翼，正在從內部被燒穿、一段一段熔解。\n\n預定降落前約十六分鐘，與哥倫比亞的通訊中斷。最後一段不完整的通話裡，指揮官 Rick Husband 說了半句「Roger, uh——」就斷了。德州與路易斯安那上空的居民,看見天上一道亮光裂成許多條。機上七名太空人全數罹難。\n\n調查委員會後來確認：殺死他們的傷口，在十六天前發射時就已經造成。重返大氣的高溫沒有製造任何新問題——它只是讓一個早就存在、早就有人想去看一眼卻被攔下來的破口，變成致命的。\n\n## 裝填：一塊「應該沒事」的泡棉，掉了二十年\n\n要理解這場災難，先理解那個破口怎麼來的，以及——更重要的——為什麼沒人把它當回事。\n\n太空梭發射時，那個橘色的巨大外部燃料箱（external tank）外面噴了一層絕熱泡棉，防止低溫燃料讓箱體結冰。問題是這層泡棉會掉。在上升過程中，氣動力、振動、熱應力會讓泡棉一塊一塊剝落，像下雪一樣往後飛。而太空梭就掛在燃料箱旁邊。\n\n泡棉脫落不是新鮮事。**CAIB 查證：燃料箱上一個叫 bipod ramp（雙腳架斜坡）的部位脫落泡棉，最早一次有紀錄是 1983 年的 STS-7**——也就是說，到哥倫比亞出事為止，這個特定部位掉泡棉已經發生過至少七次，整整二十年。每一次，太空梭都平安回來了。\n\n於是 NASA 的管理層做了一件人類組織最自然、也最致命的事：他們把「泡棉會掉」從一個**飛安問題**，慢慢重新定義成一個**維修問題**——像汽車掉漆一樣，回來補一補就好。這正是 Vaughan 研究挑戰者時提出的 **normalization of deviance（偏差正常化，F6）**：每一次僥倖過關，都被當成「你看，沒事」的證據，於是「異常」被一寸一寸地重新標記為「可接受」。安全邊界不是某天被砍掉的，是被一次次「這次也沒事」慢慢吃掉的（見 ch02、見 ch14）。\n\n最刺眼的一刀發生在哥倫比亞出事前不到四個月。**CAIB 記載：2002 年 10 月的 STS-112 任務，bipod ramp 掉了一大塊泡棉，撞到了固體火箭推進器的環。這次嚴重到照規定該開一張「飛行中異常」（In-Flight Anomaly）——一個會強制追查、要求在下次發射前解決的正式流程。但太空梭計畫管理層沒有把它列為 In-Flight Anomaly，而是把它降級成一個層級低得多的「action（待辦事項）」。** 翻成你的話：一個本該 block 下次 release 的 P0 incident，被人手動改成了「之後有空再看」的 backlog ticket。然後下次發射照常進行。\n\n這就是裝填好的炸彈。哥倫比亞升空時，潛伏條件早已就位：一個會掉大塊泡棉的設計、一個被正常化到沒人緊張的「已知問題」、一個剛剛親手把警報降級的管理層。剩下的，只是哪一塊泡棉、撞在哪裡。\n\n## 觸發：發射後 81.7 秒\n\n2003 年 1 月 16 日，哥倫比亞發射。\n\n**CAIB 查證：升空後約 81.7 秒，外部燃料箱左側 bipod ramp 一塊絕熱泡棉脫落。這塊泡棉約 1.67 磅（約 760 克）、大概一個公事包大小（約 21–27 吋長）。它以相對太空梭約 545 mph（約 877 km/h）的速度，撞上左翼前緣的 RCC（reinforced carbon-carbon，強化碳碳複合材料）第 8 號面板。**\n\n這裡要破除一個直覺。「一塊泡棉而已，能有多大殺傷力？」——泡棉很輕，但相對速度極高，動能不容小覷；而且被撞的 RCC 面板，正是機翼前緣最關鍵的熱防護，重返時要扛最高溫的那一塊。撞擊撞出了一個破口。後來地面用真實的泡棉以真實速度做撞擊測試，才把所有人嚇到：泡棉真的能在 RCC 上撞出一個大洞。在那之前，沒人真的相信「這麼軟的東西」能打穿熱防護——這個對撞擊脆弱性的低估，本身就是一層孔洞（F8 潛伏條件）。\n\n發射時的攝影機拍到了這次撞擊。第二天，地面工程師在檢視發射影像時看到了那團白色碎片打在左翼上。問題從這一刻起，從「物理」轉移到了真正殺人的那條線上——**組織**。\n\n## 連鎖：那個被駁回的「去看一眼」\n\n接下來十六天發生的事，是這整本書裡最該讓一個寫 postmortem 的工程師脊背發涼的部分。因為它不是「沒人發現問題」。問題被發現了。是工程師**想去查清楚，卻被攔下來**。\n\n影像被看到後，一群工程師自發組成了「碎片評估小組」（Debris Assessment Team）。他們做了兩件事：\n\n**第一，他們想要實際的損傷影像。** 哥倫比亞就在軌道上，地面理論上可以動用軍方的偵察衛星，或請太空人出艙、或調整姿態，去**實際拍一張左翼的照片**，看看那個破口到底多大。領頭的結構工程師 Rodney Rocha 多次推動這件事。\n\n這個請求，被擱置了。**根據 CAIB 與後續報導：當時的任務管理團隊（Mission Management Team）主席 Linda Ham 在追查「這個影像請求是誰發起的」之後，把它取消了——理由是這個請求沒有透過「正式管道」提出。她從未直接諮詢碎片評估小組，據 CAIB 記載，她跟同事說她查不出是誰要的，於是告訴國防部的聯絡人「我想我們不必追這件事了。」** 一旦請求被撤,工程師也就沒再提。\n\n停在這裡想一下這層孔洞。這是 **F11（監控盲區／該叫的警報沒叫）** 的最純粹形態：他們不是看不到，是**主動選擇不去看**。一個本來唾手可得、能讓他們知道真實狀態的 observation 請求，被一個「程序正確性」的理由給否決了。換成你的世界：你的系統可能出了狀況，有人說「我們可以開個更詳細的 debug log／拉一份 heap dump／調出那台機器的實際狀態看一眼」，結果被一句「這不是走正常流程提的」或「應該沒必要，之前都沒事」擋了回去。你失去的不是那張照片，是你對系統真實狀態的最後一次確認機會。\n\n**第二，他們做了分析——但用錯了工具的使用範圍。** 拿不到真實影像，工程師只能靠模型推算撞擊損傷。他們用的工具叫 **Crater**。這裡是另一層孔洞，而且它和 ch09（Sleipner A 平台）是同一個形狀：**模型不是現實。**\n\n**CAIB 查證：Crater 這個工具是用約 3 立方吋大小的小碎片撞擊資料校準出來的。但打中哥倫比亞的那塊泡棉，體積約是它的 400 倍——遠遠超出 Crater 被驗證過的輸入範圍。** 工程師（以及他們高度依賴的承包商 Boeing 的分析）等於是把一個只在小尺度被驗證過的模型，硬套到一個大它 400 倍的輸入上。更糟的是，Crater 本身其實是個保守的模型，它預測這次撞擊「會」造成損傷——但分析的人判斷「實際應該沒有 Crater 說的那麼嚴重」，於是假設泡棉沒有打穿機殼。\n\n於是一連串「在當下看起來合理」的判斷，疊成了致命的結論：管理層接受了「沒有飛安疑慮（no safety-of-flight issue）」的分析結果，認定哥倫比亞可以安全返航。\n\n這就是 F3（起司孔洞對齊）的教科書畫面。沒有任何單一一個人「犯了愚蠢的錯」。每一層防禦各自有它「當下說得通」的破洞，而那十六天裡，這些洞恰好連成了一條直線：\n\n```\n         挑戰者(1986) ──十七年──> 哥倫比亞(2003)：同一條對齊的孔洞\n\n 防禦層            這次為什麼沒擋住\n ──────────────────────────────────────────────────\n [設計]   泡棉會掉   ─── 二十年都這樣，被當維修問題  (F6)\n              ↓ 洞\n [流程]   IFA 機制   ─── STS-112 主動降級成 action 項  (F6/F13)\n              ↓ 洞\n [偵測]   衛星成像   ─── 「沒走正式管道」，請求被撤回  (F11)\n              ↓ 洞\n [分析]   Crater     ─── 模型被用在 400 倍的範圍外    (F9-味/F3)\n              ↓ 洞\n [安全]   安全部門   ─── 無獨立性、無實權，挑戰不了計畫 (F3)\n              ↓ 洞\n          ────────────► 七個人  (孔洞全對齊)\n```\n\n任何一層擋住，今天就沒有這一章。設計若不掉泡棉、或 STS-112 那次被認真當 IFA 追、或那張衛星照片被批准、或 Crater 的範圍外警告被當真、或安全部門有權喊停——只要一層。但那十六天，每一層都剛好破在同一條線上。\n\n## 餘波：Sally Ride 聽見的回音\n\n哥倫比亞解體後，CAIB 成立，花了將近七個月調查。**CAIB Volume I 報告於 2003 年 8 月 26 日發布。**\n\n報告當然講清楚了物理：泡棉撞破 RCC 第 8 號面板，重返時約 1,600°C 的電漿從破口灌入左翼，熔毀翼樑與感測線路，左翼逐漸失去結構完整性、氣動失衡，太空梭在高超音速下解體。七人罹難。\n\n但 CAIB 做了一件超越一般事故報告的事，而這正是它被工程界記住的原因。**報告明確主張：組織因素與物理因素同等重要（CAIB 原話的精神是 \"equal weight\"）。** 它沒有把調查停在「找出那塊泡棉」，而是繼續往上問：為什麼一個明知會掉泡棉的組織，會接受它二十年？\n\n委員會裡有一位成員特別有資格回答。**Sally Ride——美國第一位女性太空人——同時參與過挑戰者的 Rogers Commission 和哥倫比亞的 CAIB。她對其他委員說，她在哥倫比亞身上聽見了「挑戰者的回音」（echoes of Challenger）。** CAIB 報告為此專門寫了一整章（「History as Cause」），把兩場災難並排比對，開頭就點明：委員會看到了「這個機構在兩次災難前，其績效與安全實務上不幸的相似之處」。\n\n相似到什麼程度？把兩份病歷疊在一起看（見 ch14）：\n\n| | 挑戰者 (1986) | 哥倫比亞 (2003) |\n|---|---|---|\n| 物理因 | O-ring 低溫硬化、密封失效 | 泡棉撞破 RCC 熱防護 |\n| 被正常化的異常 | O-ring 侵蝕/吹漏「每次都沒事」 | 泡棉脫落「每次都沒事」 |\n| 被推翻/壓下的異議 | 發射前夜工程師反對低溫發射 | 工程師要求衛星成像被撤回 |\n| 風險被降級 | 把已知侵蝕當「裕度證明」 | STS-112 由 IFA 降級為 action |\n| 生產壓力 | 發射時程/公關壓力 (F13) | 國際太空站組裝時程壓力 (F13) |\n| 安全文化 | 風險溝通失真、壓抑異議 | 安全部門無獨立性與實權 |\n\n這不是巧合，是**復發**。CAIB 的結論裡最冷的一句是：**組織的根因「根植於太空梭計畫的歷史與文化」**——趕進度、預算壓力、把過去的成功當成未來安全的理所當然保證、以及一種會系統性壓抑異議的結構。換句話說，挑戰者之後 NASA 寫的那些報告與建議，沒有改變產生災難的那台機器。文化沒變，action items 腐爛，同型事故回來。\n\n要校準一個常見的誤解。很多人以為哥倫比亞「無法可救，看到了也沒用」。**CAIB 的立場更尖銳：如果及早用衛星確認了破損，理論上是存在搶救方案的探討空間的（無論是緊急修補還是用另一架太空梭救援，都極困難但並非完全沒得談）。致命的不是「救不了」，是連「去看一眼」的請求都被駁回——他們連評估救援可行性的資訊都主動放棄了。** 這個分別很重要：問題不在能力，在於那個讓人不去查證的文化。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n- **潛伏條件（早就裝填好的）**：(1) 一個會在上升中掉大塊泡棉的燃料箱設計；(2) 二十年來把「泡棉脫落」從飛安問題正常化成維修問題的文化（F6）；(3) 一個對「軟泡棉能打穿 RCC」嚴重低估的工程認知（F8）；(4) 一個沒有獨立性、無權挑戰計畫進度的安全部門（F3）；(5) 一套和挑戰者一模一樣、會壓抑工程異議的決策結構。最關鍵的潛伏動作發生在事故前四個月：STS-112 那次大泡棉脫落本該開 In-Flight Anomaly，卻被降級成 action 項——等於親手把警報關小聲。\n- **觸發**：升空 81.7 秒，那塊約 1.67 磅的泡棉撞上 RCC 第 8 號面板。但**真正把「一個破口」變成「七條人命」的觸發**，不是撞擊本身——是十六天後，那個「去拍張照看一眼」的請求被以「沒走正式管道」為由撤回。撞擊製造了傷口；組織選擇了不去看它。\n\n### 起司的孔洞\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 設計裕度 | 泡棉不該脫落 / RCC 該扛得住 | 設計本就會掉泡棉；對撞擊脆弱性低估（F8） |\n| In-Flight Anomaly 流程 | 強制追查重大異常、解決才放行 | STS-112 被人為降級為 action 項，繞過了強制追查（F6/F13） |\n| 在軌偵測（衛星成像） | 直接確認左翼真實損傷 | 請求因「非正式管道」被 Linda Ham 撤回，未諮詢工程小組（F11） |\n| 工程分析（Crater） | 算出真實撞擊後果 | 模型被用在 400 倍於驗證範圍的輸入上，且分析者判斷「實際沒那麼嚴重」（與 ch09 同型：模型≠現實） |\n| 安全組織 | 獨立喊停、挑戰計畫決策 | 安全部門無獨立性、無資源、無實權（F3） |\n| 組織記憶 | 從挑戰者學到的教訓該擋下這一切 | 報告寫了，文化沒變，教訓沒落地——這是最致命的一層（F6 復發） |\n\n明確反駁「單一根因」：把這場災難歸給「那塊泡棉」，等於把挑戰者歸給「那個 O-ring」——都漏掉了真正的病灶。泡棉是物理觸發；殺死七個人的，是一個明知風險、有機會查證、卻在程序與壓力下選擇不查的組織（見 ch02 對「人為疏失」這個結論的拆穿）。\n\n### 對應模式\n\n- **F6（偏差正常化／漂移）**——本章核心。泡棉脫落被二十年的僥倖一寸寸正常化；STS-112 的降級是漂移的最後一步。更深一層的 F6 是「文化層級的復發」：挑戰者之後 NASA 漂移回了同一個位置。\n- **F13（生產壓力壓過安全）**——太空站組裝的飛行時程壓力,抬高了「停下來查清楚」的門檻；和挑戰者的發射壓力同構。\n- **F3（起司孔洞對齊）**——五到六層各自有破洞的防禦，在那十六天恰好連成一線。\n- **F11（監控盲區／該叫的警報沒叫）**——最尖銳的一刀：他們不是看不見，是**主動撤回了去看的請求**。能讓你看清真實狀態的 observation，被程序理由否決。\n\n### 一句話形狀\n\n**這場災難的形狀是：一個寫過完整事故報告、卻沒有改變產生災難之文化的組織，在十七年後讓同一個形狀的災難精準復發——而最後那層、也是最該擋住的防禦，是「去看一眼真實狀態」的請求，被一個程序理由攔了下來。**\n\n## 換成你的系統\n\n你天天在跟兩個哥倫比亞式的孔洞共處，而且你「應該沒事吧」得很自然。\n\n**第一個孔洞：你的 postmortem action items 在腐爛，而你沒在追。** 你做 blameless postmortem，這很好——但 blameless 的目的是換取真相，真相換來的 action items 如果沒人 owner、沒有 due date、沒有人在下次 retro 回頭驗收「上次那幾條做了沒」，那它和沒寫一樣。哥倫比亞告訴你的精確失敗模式是：**組織會把「我們寫了報告」誤當成「我們解決了問題」。** 報告是 artifact，不是修復。點名你那個「應該沒事吧」的假設：「上次那次 incident 我們有寫 postmortem，所以那類問題算是處理過了。」——錯的時候它怎麼壞？同型 incident 在你以為已經免疫的地方再來一次，而你會驚訝「這不是上次出過嗎？」（出過，但 action item 還在 backlog 躺著）。\n\n**可操作的自問**：把你團隊最近三份 postmortem 翻出來，對每一條 action item 標一個狀態：done / 進行中 / 死在 backlog。算出「死在 backlog」的比例。如果超過一半——你和事故前的 NASA 在同一個位置。再加一道機制：postmortem 的 action items 必須有 owner 和到期日，且**下一次同領域的 retro 第一件事就是回頭驗收前次的 action items**。沒驗收的 action item，等於降級成 action 項的 IFA。\n\n**第二個孔洞：你會因為「沒走正式流程」或「應該沒必要」，拒絕一次唾手可得的真實狀態確認。** 這是 Linda Ham 那刀的後端版。系統有點不對勁，有人說「我去把那台機器的實際狀態 dump 出來看一眼」「我們開個臨時的 verbose log 跑五分鐘」「我直接連進去看 actual state 而不是看 dashboard」——而你（或你的流程）說「這不是 standard procedure」「先別動 production」「之前都沒事，應該沒必要」。你省下的那五分鐘，可能正是你對真實狀態的最後一次確認窗口。點名這個假設：「監控看起來綠的，應該沒必要去翻原始狀態。」——dashboard 是別人替你解讀過的世界（這正是 ch16 三哩島那盞燈要講的：你看的是意圖還是現實），出事那天它和真實狀態的偏差，就是哥倫比亞那張沒拍的照片。\n\n**可操作的檢查點**：在你的 incident 流程裡明確寫下——**任何工程師都有權發起一次「直接確認真實狀態」的觀察（dump、trace、直連），這個權利不需要先走正式審批，事後補記即可。** 把「去看一眼」設成預設允許，而不是預設需要批准。哥倫比亞的教訓是：當查證真相需要先通過一個程序關卡，那個關卡遲早會在最該查的那天把它擋下來。\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★\n\n口頭重講：把哥倫比亞的因果鏈講給一個沒讀過這章的資淺工程師聽，要求他聽完能複述。限制條件：你**不准**用「一塊泡棉撞壞了機翼」當主線，必須以「為什麼一個發現了問題的組織選擇不去查證」為主線。講清楚四件事：泡棉脫落怎麼被正常化、STS-112 的降級是什麼、衛星成像請求為什麼被撤、Crater 模型錯在哪。\n\n#### 推演解答\n\n主線應該是組織，不是物理。一個可接受的複述：「太空梭發射時外箱泡棉會掉，這事發生了二十年、每次都沒出事，於是 NASA 把它從飛安問題慢慢當成維修問題——這叫偏差正常化。出事前四個月，STS-112 掉了一大塊本該觸發強制追查（In-Flight Anomaly）的泡棉，但管理層把它降級成低層級的待辦事項，繞過了強制流程。哥倫比亞這次升空 81 秒泡棉撞破了左翼前緣熱防護，發射影像拍到了。工程師想動用衛星拍左翼確認損傷，但這個請求因為『沒走正式管道』被管理團隊主席撤回，沒人再提。拿不到真實影像，工程師只能用一個叫 Crater 的模型推算，但那塊泡棉的體積是這個模型驗證範圍的 400 倍——模型被用在它根本沒被驗證過的範圍外，分析者又主觀判斷『實際應該沒那麼嚴重』，最後得出『沒有飛安疑慮』。十六天後重返大氣，1,600 度電漿從那個沒人去確認的破口灌進機翼，七個人死了。」\n\n關鍵在於聽者能複述出「他們不是沒發現，是選擇不去查證」——而不是停在泡棉。如果資淺工程師複述完只記得泡棉，這題沒過。\n\n### 推演題2 **[20 分鐘]** ★★\n\n反事實：CAIB 認定組織病灶與挑戰者「驚人相似」。假設你是 1986 年挑戰者調查後、被指派去「確保這種事不再發生」的人。挑戰者報告寫得很好、建議也合理。請說出**至少三個具體的、可能讓你的所有改革在十七年後失效**的機制——也就是「報告寫了但教訓沒落地」是透過哪些路徑發生的。然後反過來想：你做過的哪個團隊改革，正暴露在同樣的失效路徑上？\n\n#### 推演解答\n\n三個（或更多）失效路徑：\n\n1. **改革依附於人，而非結構。** 你推動的安全文化、評審制度，靠的是當時在位、還記得痛的那批人。人會調職、退休、被組織重整稀釋。十年後新一批管理者沒經歷過挑戰者，對他們而言那些「繁瑣的安全流程」只是拖慢進度的官僚遺產，於是被悄悄簡化。**對策：把教訓寫進不依賴個人記憶的結構——強制的、不可被單方降級的流程關卡。**（注意 STS-112 的降級恰恰是「可被單方降級」這個結構漏洞被利用。）\n\n2. **成功侵蝕警覺（這就是 F6 的引擎）。** 你改革後，太空梭一次次安全返航。每一次成功都被當成「我們的安全做得很好」的證據，而不是「我們又僥倖了一次」。久了，那些當初為了安全加上的保守邊界，會被重新解讀成「過度保守、可以放寬」。**對策：刻意區分「沒出事」和「安全」——把每次 near-miss（如 STS-112）當成必須認真歸因的事件，而不是裕度證明。**\n\n3. **安全組織的權力被生產壓力慢慢架空。** 你設立的獨立安全審查單位，如果沒有真正能 block 發射的權力、沒有獨立預算與人力，遲早會在「趕時程」的壓力下變成橡皮圖章——它可以表達擔憂，但擋不住決定。**對策：安全否決權必須是結構性的、不能被計畫經理繞過。**\n\n對帳你自己的改革：那個你一年前推動、全團隊採用的 CI gate（如 OpenAPI 同步檢查那種）或 incident 流程——它現在還有牙齒嗎？有沒有人開始用 `--skip-ci`、`[skip ci]`、或「這次特殊先繞過」？繞過的次數有沒有人在數？如果繞過很容易、且沒人追蹤繞過頻率，你的改革正走在路徑 1 與 3 上。最危險的訊號是：當「繞過 gate」從「需要特批的例外」漂移成「大家都知道的常規操作」——那就是你的 STS-112 降級時刻。\n\n### 推演題3 **[20 分鐘]** ★★★\n\n對帳＋設計：翻出你團隊最近一份真實的 postmortem（或你印象最深的一次 incident）。(a) 把它對應到本書的 F 模式——它命中哪幾號？(b) 列出它的 action items，標出每一條的真實狀態（done / 進行中 / 死在 backlog）。(c) 設計一道機制，讓「action item 腐爛」這件事本身會觸發一個你看得見的訊號——也就是給「教訓沒落地」加一個 alarm。\n\n#### 推演解答\n\n(a) 多數真實 incident 會命中不只一個 F 模式。常見組合：某個變更觸發（F12）+ 該叫的 alarm 沒叫或被靜音（F11）+ 多層防禦各破一洞（F3）。如果你發現你的 incident 命中了 F6（某個「已知問題、大家習慣了」的東西終於爆了），那它和哥倫比亞是同一個家族——優先處理。\n\n(b) 誠實標。重點不是比例多難看，是**你之前根本沒回頭數過**——這個「沒回頭數」本身就是哥倫比亞式的盲區。\n\n(c) 一個務實的設計：給每條 action item 在 issue tracker 開一張 ticket，掛上 `postmortem-action` 標籤與到期日。寫一個排程任務（你做過 setTimeout→cron job queue 的重寫，這對你是基本功）每週掃一次：凡是 `postmortem-action` 且**超過到期日仍未關閉**的，自動發一則訊息到團隊頻道並 @ owner——而且**累計天數越久、訊息越顯眼**（呼應 ch14 那個「響太多次反而被靜音」的陷阱，所以要設計成升級而非重複）。更進一步：把「逾期未完成的 postmortem action 數量」做成一個團隊看板上的 metric。關鍵設計原則是——**讓『教訓正在腐爛』變成一個可觀測的量，而不是一個沒人注意的沉默過程。** 哥倫比亞的核心失敗，就是「教訓沒落地」這件事本身沒有任何 alarm。\n\n注意一個反模式（F11 的回馬槍）：如果這個逾期提醒太吵、每天都響、大家很快學會無視，它就會被「靜音」，於是你又造了一個被正常化的偏差。所以提醒必須是**升級式**（越久越大聲、最後升到 manager），且逾期數量要進入一個有人定期 review 的儀表，不能只靠頻道訊息。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼說殺死七名太空人的不是「重返大氣的高溫」，也不是「那塊泡棉」？真正的傷口何時造成、致命的決策是哪一個？\n2. 「偏差正常化」在哥倫比亞具體長什麼樣？請用「泡棉脫落」和「STS-112 降級」兩件事說明它怎麼一寸寸吃掉安全邊界。\n3. 衛星成像請求被撤回，為什麼是這場災難裡最該讓工程師警惕的一層孔洞？它對應哪個 F 模式？\n4. Crater 模型錯在哪？它和 ch09 的 Sleipner A 是同一個什麼形狀的錯？（提示：模型 vs 現實、被用在驗證範圍外）\n5. CAIB 為什麼說哥倫比亞與挑戰者「驚人相似」？至少講出三個對齊的組織病灶（不是物理因）。\n6. 為什麼「我們寫了 postmortem」不等於「我們學到了教訓」？哥倫比亞作為「同組織十七年後重演」的鐵證，證明了什麼？\n7. 把哥倫比亞的「衛星成像被撤回」翻譯成你自己系統的話：你在什麼情況下會因為「沒走正式流程」或「應該沒必要」而拒絕一次唾手可得的真實狀態確認？那個假設錯的時候會怎麼壞？\n\n## 延伸閱讀\n\n- **《Columbia Accident Investigation Board (CAIB) Report, Volume I》（2003-08-26）** — 一手調查報告。務必讀第 6 章（泡棉脫落的歷史與被正常化的過程）與第 8 章「History as Cause」（把哥倫比亞與挑戰者並排比對的那一章，本書這一整章的核心論點就來自這裡）。https://www.nasa.gov/wp-content/uploads/2023/03/caib-report-volume1.pdf\n- **Diane Vaughan,《The Challenger Launch Decision》** — 偏差正常化（normalization of deviance）的原典；雖然寫的是挑戰者（見 ch14），但讀懂它你才會明白為什麼同樣的病在哥倫比亞復發——這是理解 F6 的根。\n- **CAIB 第 8 章「History as Cause」單獨節錄**（多所大學工程倫理課採用） — 如果只讀一段，讀這章開頭那句「unfortunate similarities between the agency's performance and safety practices in both periods」，它是本章標題的出處。https://www.montana.edu/rmaher/engr125/CAIB-History%20as%20a%20cause.pdf\n- **NASA APPEL 案例研究《Silence and Breakdown of Communication》（Rodney Rocha 案）** — 從工程師視角看「異議如何在組織裡被消音」，補足調查報告較少著墨的人因細節；對任何在大組織裡試圖把擔憂喊上去的工程師都值得一讀。https://appel.nasa.gov/wp-content/uploads/2013/04/553084main_Case_Study_Silence_Breakdown_Columbia_Rocha.pdf\n"}, {"id": "ch16-three-mile-island", "file": "ch16-three-mile-island.md", "group": "Part V — 漂移到失效", "title": "ch16 — 三哩島：一盞燈騙了所有人", "md": "# ch16 — 三哩島：一盞燈騙了所有人\n\n> **本章解剖什麼**：1979 年三哩島二號機，一個機械卡開的釋壓閥讓爐水持續外漏；但真正把「一次小破口失水」放大成爐心熔毀的，是控制室一盞只反映「指令送出」、不反映「閥門實況」的指示燈。操作員依著一個被介面餵養出來的錯誤世界模型，做出一連串**當下完全合理、事後看全錯**的處置。這是 Perrow《Normal Accidents》的原型案例——主打 **F11（監控盲區：你看到的世界與真實脫節）、F9（介面與假設的縫：儀表顯示意圖不是現實）、F2（互動複雜度）、F1（緊耦合）**。它與前兩章（ch14 挑戰者、ch15 哥倫比亞）的組織漂移不同，這裡的漂移藏在**儀表板的語意**裡：一個平時恆真、那天恰好為假的等式。\n\n## 從你已知的出發\n\n你跑過 `kubectl apply`，看 Deployment 變成綠色，然後關掉終端機去吃午餐。\n\n那一刻你相信什麼？你相信「我要的三個 replica 現在正在跑」。但 `kubectl apply` 回傳成功，嚴格說只證明了一件事：**API server 收下並持久化了你的 desired state**。它沒有證明 scheduler 找到了節點，沒有證明 image 拉得下來，沒有證明 pod 沒在 `CrashLoopBackOff`。`desired replicas: 3` 和 `available replicas: 3` 是 etcd 裡兩個不同的欄位——前者是你的意圖，後者是叢集的現實。健康的時候它們收斂成同一個數字，於是你習慣了把「我宣告了 3」當成「在跑 3」。\n\n你的 CI/CD 看板上那個 `deployed` 的綠勾也一樣。它亮，通常意味著「部署指令成功送出、pipeline 退出碼是 0」。它**不**直接意味著新版本正在線上接流量——那要靠 readiness probe 真的通過、靠 health check 真的回 200、靠你去看 actual。我猜你被這個縫咬過：rollout 顯示完成，但有一個 pod 卡在舊 image，於是有 1/3 的請求行為跟其他人不一樣——最難查的那種 bug，因為**看板告訴你一切正常**。\n\n三哩島就是這個縫的 1979 年核能版，而且代價是差點熔掉一座反應爐。控制室裡有一盞燈，操作員以為它說「閥門關了」，它其實只說「我送了關閉訊號」。整整兩個多小時，三個受過訓練、照規程辦事的人，看著一個從頭到尾騙他們的儀表板做決策。讀完這章你會明白：那不是他們笨——換成你站在那個盤面前、用那盞燈建立你的世界模型，你也會關小注水。\n\n## 凌晨四點的二號機\n\n1979 年 3 月 28 日，凌晨 04:00:36。賓州哈里斯堡附近，蘇斯奎哈納河中一座小島上的三哩島二號機（TMI-2），運轉中。〔時間軸照 landscape 與當代事故重建〕\n\n開場是一件平凡到不值得寫進報告的小事：二次側的給水泵停了。為什麼停，調查到最後也只能說是維護與閥位狀態的組合（landscape 標為「給水/汽機跳脫」）。對核電廠來說這不是災難，是設計好要處理的擾動。沒了給水，蒸汽產生器無法把一次側迴路的熱帶走；一次側（直接流過爐心的高壓水）開始升溫、升壓。汽機自動跳脫。幾秒後，控制棒自動全數落入爐心——核分裂的鏈式反應停了。\n\n到這裡,自動保護全部正確動作了。問題是反應爐關不掉「衰變熱」：剛停的爐心裡,分裂產物還在持續放熱,約是滿載功率的個位數百分比。這些熱必須有水帶走,否則爐水會被燒乾、燃料棒會裸露、會熔。\n\n一次側壓力升到設定值,加壓器頂上那顆 PORV（pilot-operated relief valve,導向式釋壓閥)依設計打開,放掉一些壓力。這也對。壓力一回落,PORV 本該關回去。\n\n它沒有。閥門機械卡在開啟位置。\n\n從這一刻起,TMI-2 進入了一場 small-break LOCA——小破口失水事故。爐水正從那顆卡開的閥門,一秒一秒地漏出反應爐冷卻系統。而控制室裡,沒有任何一個人知道。\n\n## 裝填:一盞反映「指令」的燈\n\n要理解為什麼沒人知道,得先看清這套系統平時怎麼運作——以及一個邊界早就被吃掉、卻從沒人付帳的設計。\n\n控制室盤面上有一盞燈,對應那顆 PORV。操作員看了很多年,腦中的等式是:**燈亮=閥開,燈滅=閥關**。這個等式平時恆真,所以它從來不是一個「假設」,它就是「事實」。\n\n但這盞燈接的不是閥門。它接的是**驅動 PORV 的那顆電磁閥(solenoid)的控制訊號**。系統的邏輯是:壓力回落→控制系統送出「關閉」訊號給電磁閥→燈滅。燈滅的真正語意是:**「關閉指令已經送出。」** 不是「閥門已經關上」。\n\n平時這兩件事是同一件事——送了關閉訊號,閥門就關了,於是燈滅與閥關同時發生,等式成立。這一天,訊號送出了(燈如期滅了),但閥門卡死在開的位置。\n\n這正是 F9(介面與假設的縫)最陰險的形態:**儀表顯示的是意圖,不是現實**。兩個各自正確的子系統——「送訊號的邏輯」與「閥門的物理」——對「燈滅代表什麼」這件事的假設,平時一致,那天裂開。沒人說謊,沒人接錯線,設計本就如此。它只是把**期望狀態(desired)當成了實際狀態(actual)**呈現給操作員。\n\n於是凌晨四點過後,控制室那盞燈,如期滅了。三個操作員看著一盞滅掉的燈,合理地、訓練有素地,認定:閥,關了。失水事故的窗口,就此對所有人關閉——只是他們看到的世界與真實,從這一秒起開始分岔。\n\n```\n  控制系統          那盞 PORV 燈           PORV 閥門本體\n ───────────       ─────────────         ───────────────\n 送出「關閉」  ───► 燈滅                   (沒接到這裡)\n   訊號             語意:「指令已送出」    實況:機械卡開、漏水中\n                        │                       │\n                        ▼                       ▼\n                操作員讀到:「閥關了」    現實:爐水持續外漏 2h22m\n                        └───────── 分岔 ─────────┘\n                          看到的世界 ≠ 真實\n```\n\n## 觸發鏈:每個動作當下都合理\n\n接下來兩個多小時的關鍵,不是某個人犯蠢,而是**一群人用一個被污染的儀表板,推導出一連串內部自洽的錯誤結論**。我們慢動作走一遍,你會發現每一步都很難在當下做對。\n\n**第一個矛盾的讀數。** 加壓器(pressurizer,那個維持系統壓力、頂上裝著 PORV 的容器)的水位,開始**上升**。在操作員的心智模型裡,水位上升=系統水變多。但真相相反:卡開的閥在放掉蒸汽,系統壓力下降、爐水沸騰,蒸汽把水從別處頂進加壓器,造成水位虛高——**系統其實正在失水,儀表卻顯示「水太多」**。這是 F11 的核心:操作員看到的世界,與真實系統的狀態,系統性地相反。\n\n**第二步:訓練變成陷阱。** 高壓注水系統(HPI/ECCS)自動啟動了——大約在事故開始後 122 秒(04:02:38),這是正確的反應,它在往爐心灌救命的水。但操作員被訓練成**最怕加壓器「灌實」(go solid)**:整個迴路充滿水、沒有蒸汽緩衝空間,壓力會難以控制、可能撞壞系統。他們看到水位飆升,直覺判斷「注水太多了,快要 go solid」。於是在事故開始約 4 分半後(04:05:15),他們**手動節流了高壓注水**。\n\n停下來想清楚這一步有多致命,也有多合理。在他們以為的情境裡——「閥關了(燈滅)+水位高(讀數)」——關小注水是**教科書級的正確處置**:你不想灌實系統。值班操作員 Edward Frederick 後來向調查委員會作證:「事故初期加壓器水位的急速上升,讓我相信高壓注水過量了,我們很快就會有一個灌實的系統。」〔Frederick 證詞,經事故重建文獻引述,非 landscape 原文,標供參考〕\n\n問題是:他們不是在防止 LOCA,**他們已經在 LOCA 裡了**——而節流注水,是把唯一在救爐心的水龍頭關小。F1(緊耦合)在這裡現形:從「誤讀儀表」到「減少冷卻」之間,沒有緩衝、沒有時間餘裕、沒有一個獨立的交叉驗證跳出來說「等等,你其實在失水」。一個錯誤的世界模型,直通對爐心冷卻的削減。\n\n**第三步:警報洪流淹沒了真相。** 事故初期,控制室上百個警報同時響起,印表機落後到印出的是幾分鐘前的舊事件。就算真相藏在某個讀數裡,它也被埋在資訊雪崩底下。本書 ch09(待 landscape 對齊的級聯案)與 ch13(雲端連鎖)會反覆看到這個形狀:**該叫的訊號不是沒叫,是淹沒在不該同時叫的訊號裡**——這也是 F11。\n\n於是局面僵在這裡:燈滅(以為閥關)、水位高(以為水多)、注水關小(以為在防灌實),爐水持續從那顆沒人懷疑的閥漏出去。系統正在被慢慢燒乾,而控制室裡的世界一片「正常」。\n\n## 連鎖:分岔的世界,熔掉的爐心\n\n爐水持續外漏。一次側壓力降到飽和壓力以下,爐水開始沸騰成蒸汽——但操作員沒注意到迴路已達飽和(這個讀數本該是 LOCA 的鐵證)。蒸汽在迴路裡形成空泡,主泵開始劇烈震動(在抽帶氣泡的水),操作員怕震壞泵,把主泵也關了。又一個在「水太多、系統穩」的錯誤模型下合理、在「正在失水」的真相下災難的決策——關掉強制循環,等於讓爐心更快裸露。\n\n燃料棒頂端逐漸露出水面。沒有水帶走衰變熱,鋯合金包殼過熱,與蒸汽反應(產生氫氣,後來在反應爐廠房裡形成令人膽戰的氫氣泡)。爐心開始熔毀。事後調查估計約 **45%(約 62 噸)的爐心熔毀**。〔landscape〕\n\n轉折在事故開始兩個多小時後。一位接班的值班主管,帶著一雙還沒被這個錯誤模型馴化的眼睛走進控制室,重新審視盤面,做出那個沒人做的動作:他懷疑 PORV 根本沒關。06:22——**PORV 開啟後約 2 小時 22 分**——他們關上了 PORV 下游的截止閥(block valve),止住了漏水。〔landscape 記為「約 2 小時 20 分」;事故重建多記為 06:22、約 2h22m,差異在分鐘級,標供參考〕Frederick 後來作證,關閥一半是接班主管的建議,一半是因為「我們已經想不出別的辦法讓反應爐回到控制之下」。\n\n止漏之後,重新恢復注水,即時的失控才被按住。但爐心已經部分熔毀。接下來幾天是另一場惡夢:氫氣泡的疑慮、要不要疏散的政治混亂、總統 Jimmy Carter 親自視察。\n\n## 餘波:零死亡,卻改寫了一切\n\n先把規模講清楚,因為這是這個案例最被誤記的地方。\n\n**三哩島零死亡,無可偵測的公眾健康影響。** 10 英里內居民承受的平均輻射劑量約 0.08 mSv〔landscape〕——大約是一次胸部 X 光的量級。壓力槽保持完整,沒有大規模外洩,圍阻體擋住了最壞的情況。這跟七年後的車諾比(ch17)**性質與規模都天差地別**:那邊圍阻體被炸開、有確認的急性放射病死亡。把兩者混為一談,是對兩個系統如何失效的雙重誤解。\n\n那為什麼三哩島是核能史的分水嶺?因為它是一場**「差點」**,而它差點的方式太有教育意義。總統委員會(Kemeny Commission)的調查結論,把整個產業的注意力從「設備」轉向「人機介面與組織」。報告的核心句子是:設備故障(卡開的 PORV)只是起點,真正的嚴重化來自**人機介面缺陷、操作員訓練不足、以及 NRC 與產業的態度問題**——「需要的是組織、程序、實務,尤其是態度上的根本改變」。〔Kemeny Commission, 1979-10〕\n\n事後核能控制室被重新設計:指示燈被要求反映**閥門的實際位置**(加裝獨立的位置感測),警報系統被重新整理以對抗洪流,操作員訓練改革,並催生了 INPO(核能運轉學會)來跨廠傳播事故教訓——因為調查發現,另一座電廠(Davis-Besse)曾發生**類似的 PORV 卡開事件**、有人寫過警示備忘,卻沒傳到三哩島。組織學習的失敗,是另一層沒擋住的孔洞。\n\n而 Charles Perrow 把這場事故當成《Normal Accidents》(1984)的**原型案例**,提煉出本書的核心主張:在互動複雜度高、緊耦合的系統裡,嚴重事故不是異常,是系統的正常產物(F2+F1)。三哩島之所以成為這個理論的起點,正因為它無法被歸結為「某個人的錯」——它是一群正確的子系統、一個合理的介面假設、一套合理的訓練,在那個凌晨恰好對齊成災難。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**觸發**是那顆 PORV 機械卡開。但這個觸發本身完全在設計預期內——LOCA 是核電廠設計時就考慮、且有 HPI 等系統專門應對的場景。如果系統如實告訴操作員「閥還開著、你在失水」,這會是一次教科書式的成功處置,不會有人記得 TMI-2。\n\n**真正裝填好的災難**,是那盞**反映指令而非閥位的指示燈**。它不是那天才壞的——它從建廠起就是這樣設計的,只是平時「送訊號=閥關」恆真,讓這個語意縫隙隱形了很多年(這也是一種偏差正常化:每一次「燈滅閥就真關了」都在加深操作員對這盞燈的信任)。觸發只是把這個早已存在的縫,在最糟的時刻撕開。\n\n### 起司的孔洞:每一層為什麼都沒擋住\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| PORV 自動回關 | 洩壓後閉合,止住失水 | 閥門機械卡開(觸發) |\n| PORV 指示燈 | 告訴操作員閥的實際狀態 | 只反映「關閉訊號已送出」,不接閥位;燈滅≠閥關(F9 核心) |\n| 加壓器水位讀數 | 反映系統水量 | LOCA+蒸汽造成水位虛高,讀數與真相相反(F11) |\n| 操作員訓練 | 引導正確處置 | 訓練成「最怕灌實」,看到水位高就直覺關小注水——心智模型與實況背道而馳 |\n| 警報系統 | 凸顯關鍵異常 | 上百警報同時響、印表機落後,關鍵訊號被淹沒(F11) |\n| 跨廠事故傳播 | 讓 TMI 知道 Davis-Besse 的同型事件 | 警示備忘沒傳到,組織學習失敗 |\n\n任何一層擋住——閥位真實顯示、或一個獨立的飽和溫度交叉驗證、或 Davis-Besse 的教訓有傳到——這場事故都不會走到部分熔毀。這就是為什麼「PORV 卡住是主因」是不完整的問法:卡開的閥只是觸發,**放大成熔毀的是後面那五層孔洞同時對齊**。\n\n### 對應模式\n\n- **F11(監控盲區)**:操作員看到的世界(燈滅、水多)與真實系統狀態(閥開、失水)系統性脫節——本案是全書「沉默的失效」的標本。\n- **F9(介面與假設的縫)**:指示燈呈現的是「指令(意圖)」,操作員假設的是「閥位(現實)」;兩個各自正確的子系統對「燈滅代表什麼」的假設不一致。\n- **F2(互動複雜度)**:卡開的閥、虛高的水位、訓練的反射動作之間,有設計者沒預想到的非線性交互——Perrow 用此案定義互動複雜度。\n- **F1(緊耦合)**:從誤讀儀表到關小注水之間沒有緩衝、沒有獨立交叉驗證,錯誤模型直通冷卻削減。\n\n### 一句話形狀\n\n**這場災難的形狀是:當你的儀表板顯示的是「你下達的指令」而不是「系統的真實狀態」,你會用完美的邏輯,把系統推下懸崖。**\n\n## 換成你的系統\n\n把那盞燈換成你的看板,問題立刻變得很近。\n\n你那套招牌的多層 cache library(in-memory→S3→local,含 graceful degradation)——它的 degradation 是漂亮的工程。但問一個三哩島式的問題:**你的監控,看的是「快取的期望行為」還是「快取此刻的實際命中來源」?** 如果 S3 那層悄悄掛了、流量全打到 local fallback,你的 dashboard 會亮紅,還是會因為「請求仍然成功回 200」而一片綠?「指令成功」(請求有回應)不等於「系統健康」(回應來自你以為的那一層)。一個 degradation 如果是靜默的,它就是一盞反映指令的燈——平時恆真,出事那天騙你。\n\n更直接的是 K8s 的 desired vs actual。你的告警是綁在 `kubectl rollout status` 的退出碼上(意圖:我宣告了新版本),還是綁在 `available replicas` 對 `desired replicas` 的實際收斂、加上真實流量的 error rate(現實:新版本在接流量且健康)?如果是前者,你就有一盞 PORV 燈:rollout 顯示成功,但有一個 pod 卡在 `ImagePullBackOff`,而你的世界模型說「全部部署完成」。\n\n**點名一個「應該沒事吧」**:你那套 setTimeout 改寫成 cron job queue 的排程系統——讓訊息撐過重啟的那次重寫。你怎麼知道一條排程訊息「成功處理」了?如果你記錄的是「消費者收下了訊息」(指令:我 ack 了),而不是「下游副作用真的發生了」(現實:錢真的結算了),那你就有一盞燈在反映意圖。那個冪等消費者吞了訊息、ack 了,但因為某個下游依賴超時而靜默失敗——你的看板顯示「處理完成」,如同那盞滅掉的燈。\n\n**可操作的自問**:把你最關鍵的三個 dashboard 指標列出來,逐一問——這個數字是「我下達的指令/我宣告的期望狀態」,還是「我從系統的實際輸出測到的現實」?每一個落在「意圖」那欄的指標,都是一盞潛在的 PORV 燈。給它配一個獨立來源的交叉驗證(像三哩島本該有的「飽和溫度」讀數):一個不經過同一條指令路徑、直接量測現實的訊號。\n\n## 紙上推演\n\n### 推演題1 **[15 分鐘]** ★★\n\n不用任何事後諸葛,只用操作員當下看得到的資訊(燈滅、加壓器水位上升、被訓練成最怕灌實),向另一個工程師口頭重講:**為什麼「關小高壓注水」在那一刻是合理的、甚至是正確的處置?** 然後指出,要讓這個合理的動作變成錯誤,需要哪一個隱藏的事實。\n\n#### 推演解答\n\n合理性鏈條:操作員的世界模型是「PORV 已關(燈滅)」+「系統水位在飆升(加壓器讀數)」。在這個模型下,系統的危險是**灌實(go solid)**——迴路充滿水、失去蒸汽緩衝、壓力失控。他們被訓練成最怕這個。HPI 自動狂灌水,水位還在升,任何受過訓練的操作員的正確反應就是節流注水以避免灌實。在「閥關+水多」的前提下,這是教科書答案,Frederick 的證詞正說明了這個推理。\n\n把它變成致命錯誤的隱藏事實只有一個:**閥其實沒關,系統正在失水,水位高是蒸汽造成的假象。** 一旦這個事實揭露,整個推理鏈瞬間反轉——他們不是在防 LOCA,而是已經在 LOCA 裡,節流注水是關掉救命水。\n\n關鍵領悟:錯的不是邏輯,是**前提**。而前提來自一盞反映指令的燈。這就是為什麼「操作員笨/亂操作」是錯的歸因——在他們被餵養的世界模型裡,他們做對了。要救他們,不是要他們更聰明,是要那盞燈說真話。\n\n### 推演題2 **[20 分鐘]** ★★★(反事實)\n\n反事實演練。下面兩個改動,各**單獨**實施,哪一個更能阻止這場熔毀?說明各自會在哪一步打斷因果鏈,以及它各自的代價與盲點。\n(A) 把 PORV 指示燈改成反映**閥門實際位置**(加裝獨立的閥位感測器)。\n(B) 不動那盞燈,但在控制室加一個獨立、顯眼的**「迴路是否達飽和(失水的鐵證)」交叉驗證讀數**。\n\n#### 推演解答\n\n**(A) 修指示燈**直接消滅根因 F9:燈一旦反映閥位,操作員第一時間就知道「閥還開著」,不會建立「閥已關」的錯誤前提,後面整條鏈(誤判水多、節流注水)都不會啟動。這是最乾淨的修法。代價:需要一個**獨立於控制訊號路徑**的感測器與接線——如果偷懶把閥位感測也接到同一條會說謊的訊號上,等於沒修。盲點:它只修了「這一盞」燈;控制室裡可能還有別的「反映指令而非狀態」的儀表(這正是事後普查發現的)。\n\n**(B) 加飽和交叉驗證**不修根因,但提供一條**獨立的現實訊號**繞過被污染的世界模型:無論操作員怎麼誤讀 PORV 和水位,一個明確的「你正在失水」讀數會直接戳破假象。代價:多一個讀數可能加重警報洪流(F11),除非設計得夠顯眼、夠權威;而且它依賴操作員在資訊雪崩中還能注意到它——三哩島的迴路其實**達到了飽和,但沒人注意**,正說明「資料存在」不等於「被看見」。\n\n判斷:(A) 更根本,因為它在源頭讓世界模型正確;(B) 是縱深防禦,在 (A) 失效或其他儀表說謊時提供獨立交叉驗證。焦慮工程師的答案是**兩個都要**——這正是 K8s 的精神:不只信 rollout 指令(修燈),還要有獨立的 readiness/liveness probe 量測實際狀態(飽和讀數)。單一真相來源就是單點故障(對照 F10)。\n\n### 推演題3 **[15 分鐘]** ★★(對帳)\n\n把你維運過的一次 incident,對應到 F11(監控盲區)或 F9(儀表顯示意圖非現實)。要求:寫出當時「看板顯示什麼」與「系統實際發生什麼」的分岔點,以及你們是靠什麼**獨立訊號**(不經過原本那條說謊的路徑)才發現真相的。\n\n#### 推演解答\n\n(因人而異,以下是評判標準與一個範本。)\n\n好的對帳要能明確指出**意圖訊號**與**現實訊號**的分岔。範本:一次部署後,CI 看板顯示 `deployed ✓`(意圖:部署指令成功),但有 1/3 流量行為異常。看板綠是因為它綁在 pipeline 退出碼上;真相是有一個 pod 卡在舊 image / readiness 沒過。分岔點:`deployed` 亮起的那一刻,看板的世界與線上的世界開始分岔——如同那盞滅掉的 PORV 燈。\n\n關鍵是第二問:你靠什麼**獨立訊號**發現的?如果答案是「客戶 / oncall 反映」,那就跟三哩島的接班主管一樣——靠一雙沒被污染模型馴化的眼睛,而不是靠系統。這恰恰暴露了你缺一個獨立的現實讀數(actual replica 收斂 + 真實 error rate),你的「飽和溫度」讀數不存在。如果答案是「某個直接量測現實的 metric 自己叫了」,恭喜,你已經有那條交叉驗證。\n\n不及格的對帳:只說「監控沒抓到所以我們晚發現」——那沒有區分「該叫的沒叫(F11 警報缺失)」與「叫的是意圖不是現實(F9 語意縫)」。三哩島的燈**有亮有滅、工作正常**,它只是在回答錯的問題。這個區別是本章的核心。\n\n## 自我檢核\n\n口頭自答,講得出來才算過關:\n\n1. 那盞 PORV 燈「燈滅」的真正語意是什麼?它和操作員以為的語意,差在哪一個詞?\n2. 為什麼「關小高壓注水」在操作員當下的世界模型裡是正確處置?要讓它變成錯誤,需要揭露哪一個隱藏事實?\n3. 加壓器水位上升,為什麼是失水的「假象」而不是「水太多」的證據?\n4. 列出至少三層各自獨立的孔洞,並說明任何一層擋住,事故就不會走到部分熔毀。為什麼「PORV 卡住是主因」是不完整的問法?\n5. 三哩島零死亡,為什麼它仍是核能史的分水嶺?它和車諾比(ch17)在性質與規模上差在哪?\n6. 你的 dashboard 上哪些指標反映的是「你下達的指令 / 期望狀態」,哪些反映「系統的實際輸出」?舉一個你系統裡的「PORV 燈」。\n7. 「意圖訊號」和「現實訊號」的交叉驗證,為什麼必須走**不同的路徑**才有意義?(提示:接到同一條會說謊的訊號上等於沒修。)\n8. 為什麼把三哩島歸因為「操作員笨」會讓你學不到任何能防下次的東西?\n\n## 延伸閱讀\n\n- **Report of the President's Commission on the Accident at Three Mile Island(Kemeny Commission, 1979-10)** — 一手調查報告。把嚴重化的根因從「設備」明確轉向人機介面、訓練與組織態度;那句「需要組織、程序、實務,尤其是態度上的根本改變」是整份報告的靈魂。NRC 館藏:https://www.nrc.gov/reading-rm/doc-collections/news/2019/19-016.pdf\n- **Charles Perrow,《Normal Accidents: Living with High-Risk Technologies》(1984)** — 本書核心理論的源頭,三哩島是它的原型案例。讀第一章如何從這場事故提煉出「互動複雜度 × 緊耦合」的二維分類——你會發現本書(見 ch01)的眼鏡就是從這裡磨出來的。\n- **NRC, Backgrounder on the Three Mile Island Accident** — 官方事故概述與時間軸,適合快速校對細節:https://www.nrc.gov/reading-rm/doc-collections/fact-sheets/3mile-isle\n"}, {"id": "ch17-chernobyl", "file": "ch17-chernobyl.md", "group": "Part V — 漂移到失效", "title": "ch17 — 車諾比：把安全系統一個個關掉之後", "md": "# ch17 — 車諾比：把安全系統一個個關掉之後\n\n> **本章解剖什麼**：這是 Part V「漂移到失效」的終章，也是全書「安全系統即危險源」（F4）的極端版。前三章（挑戰者、哥倫比亞、三哩島）讓你看見組織如何把僥倖正常化、介面如何餵給操作員一個假的世界；本章把這兩條線推到盡頭——一場為了趕完成的安全測試，操作員把保護一道道關掉，加上一個對他們隱瞞的反應爐設計缺陷，讓那顆寫著「緊急停止」的 AZ-5 按鈕，在按下的那一刻反而引爆了爐心。主打 F4（安全系統即危險源）、F13（生產壓力）、F6（偏差正常化）、F8（潛伏條件 vs 觸發）、F11（操作員看不見的真相）、F2（互動複雜度）。這是全書最該記住的一句反直覺：你最後按下的那顆「救命鈕」，可能就是點火的那一下。\n\n## 從你已知的出發\n\n你做過這件事。為了讓某次部署順利上線，你「暫時」把某個東西關掉過——也許是把那個老是 flaky 的 health check 從 deployment 的 readiness probe 拿掉，「就這次，等部署完再裝回去」；也許是把上游服務的 circuit breaker 調到永不跳，因為它在高峰時段誤觸太煩；也許是在 CI 加了一個 `--skip-checks`，因為 OpenAPI 同步那關卡住你出不了 hotfix，而老闆在群組裡每三分鐘問一次。\n\n每一個動作，當下都有完全合理的理由。每一個動作，單獨看都「應該沒事吧」——你心裡很清楚那個風險，你只是賭它這次不會發生。而且，多半它真的沒發生：你關掉 health check 部署成功，圓滿；下次又關，又圓滿。第三次你已經不太記得當初為什麼要那道檢查了。這就是 F6（偏差正常化）在你身上發生的樣子——不是某天突然變蠢，是安全邊界被一次次僥倖悄悄吃掉，直到「關掉保護」變成你的標準操作流程。\n\n車諾比是這件事的終極反例。一群並不愚蠢的工程師，在一個被生產壓力擠壓的夜晚，為了完成一項「安全測試」，把一道道保護機制旁路掉——緊急爐心冷卻、低功率自動停機、低水位保護，一個接一個。而當情況開始失控、操作員伸手去按那顆所有人都被教導「出事就按它」的緊急停止鈕時，那顆鈕因為一個沒人告訴他們的設計缺陷，反而成了引爆的最後一擊。\n\n所以這一章我要你帶著一個問題讀下去：你那套多層 cache library 的 graceful degradation、你的 circuit breaker、你的 autoscaling——這些「保護你的機制」，有沒有哪一個，在最壞的情況下，行為會**完全相反**？你按下的那顆「降級」「熔斷」「回退」，在某個你沒測過的角落，會不會反而是把系統推下懸崖的那一下？\n\n## 冷開場：01:23:40，按下停止鈕的那一刻\n\n1986 年 4 月 26 日，凌晨一點過後。蘇聯烏克蘭，車諾比核電廠 4 號機組的控制室。值班的是夜班團隊，他們其實不是這場測試的原班人馬——測試本該在前一天白班做完，卻被電網調度一再延後了大半天（先記住這個延後，它後面會反咬一口）。\n\n反應爐這時運行在大約 200 MWt（熱功率），遠低於這座 RBMK-1000 額定的 3,200 MWt——大約只有額定的 6%，低到設計上根本不該久待的不穩定區。控制室裡，幾乎所有的手動控制棒都被抽了出來，只為了把這個快要熄火的爐子勉強撐在這個功率。事故後重建的數字顯示：當時的「運行反應性裕度」（operating reactivity margin，ORM，粗略可理解成「還剩幾根控制棒能用來壓住反應」）只剩約 8 根（一說 7.5），而規程要求的最低是 15 根。換句話說，他們踩著的剎車，只剩規定的一半不到。\n\n測試在 01:23:04 開始：關閉汽機進汽閥，讓正在減速的汽機靠慣性帶動冷卻泵——這正是要測的東西（斷電後汽機慣性能否撐住冷卻幾十秒）。但減速的泵送出的冷卻水變少、流速改變，爐子的狀態開始往危險的方向漂。約半分鐘後，功率開始失控上揚。\n\n01:23:40，值班長下令按下 AZ-5——緊急停機鈕。這是最後手段，是「全部控制棒一起插進去、把爐子壓死」的按鈕。在任何一個正常的反應爐裡，這一下會結束一切。\n\n約三秒後，01:23:43，功率超過 530 MWt 並繼續飆升。爐子沒有停下來。它在加速。再幾秒，功率衝到額定的數十倍量級（INSAG-7 估計峰值遠超滿載，常見引用為瞬間達數十倍）。兩聲爆炸把 1,000 噸重的爐頂蓋掀飛，爐心被炸開、暴露在空氣中，石墨開始燃燒。\n\n按下緊急停止鈕之後，反應爐爆炸了。要看懂這句話怎麼可能是真的，得先看這套系統平時是怎麼運作的——以及它早就裝填好了什麼。\n\n## 裝填：兩個被藏起來的缺陷\n\n車諾比的爆炸需要兩個潛伏條件（F8），它們在事故前就一直待在那座反應爐裡，只是平時不會對齊。它們都跟 RBMK 這個爐型的物理設計有關，而且——這是全章的關鍵——其中一個對操作員是被隱瞞的。\n\n**潛伏條件一：正空泡係數（positive void coefficient，F2 的物理版）。**\n\nRBMK 用水做冷卻、用石墨做緩速劑（讓中子慢下來、好維持鏈式反應）。在多數西方反應爐裡，水同時是冷卻劑也是緩速劑，所以當水沸騰成蒸汽（產生「空泡」void）、密度下降時，緩速能力跟著下降、反應變弱——這是一種自我穩定的負回饋，水越熱反應越弱。\n\nRBMK 不是這樣。它的緩速靠石墨，水在這裡主要的角色反而是**吸收中子**。於是當水沸騰成蒸汽、吸收中子的水變少時，反應性不降反升——更多反應產生更多熱、更多蒸汽、更少吸收、更高反應性。這是一個正回饋環（F2：子系統之間設計者沒充分馴服的非線性交互），而且在低功率時尤其凶猛。你維運過 retry storm 或快取踩踏，就認得這個形狀：一個本該自我衰減的擾動，因為某個環節的符號是正的，反而越滾越大。\n\n**潛伏條件二：控制棒尖端的石墨置換器——「正向 scram」（positive scram，F8＋F11）。**\n\n這是全章最該記住、也最少人知道的細節。RBMK 的控制棒（吸收中子、用來壓制反應）尖端接了一段石墨「置換器」。它的本意是：當控制棒被抽出爐心時，留下的空間若灌進水會吸收中子、浪費反應性，所以用石墨把水擠開、頂在那裡。\n\n問題出在「插入的那一刻」。當控制棒從最頂端開始往下插，最先進入爐心下部的不是吸收中子的硼，而是那段石墨尖端。石墨把原本待在爐底、正在吸收中子的水**擠開**——於是在插入的最初幾秒，爐心下部的反應性不降反升。一根本該「踩剎車」的控制棒，在最初的一瞬間是在「踩油門」。\n\n平時這無關緊要：爐子穩定運行時，這點局部的正反應性會被淹沒。但在那個低功率、控制棒幾乎全抽出、爐心功率分佈極度扭曲的夜晚，當 AZ-5 把所有控制棒同時從頂端往下插——所有石墨尖端同時往爐底注入正反應性，疊加在已經失控的正空泡正回饋上。緊急停止鈕，成了同時踩下全部油門的指令。\n\n而控制棒從頂端完全插到底需要約 18 秒——對一個正在以秒為單位倍增功率的爐心，這個速度慢得像永恆。\n\n這就是 F11 在這裡最殘酷的形態：這個「正向 scram」缺陷，部分設計者早就知道（1983 年立陶宛 Ignalina 電廠的試驗就觀察到過類似效應），卻沒有告知操作員、沒有寫進運行規程。控制室裡的人按下 AZ-5 時，心智模型裡那是一顆純粹的救命鈕。他們看到的世界，和真實的世界，差了一個被隱瞞的符號。\n\n## 觸發：為了完成測試，把保護一道道關掉\n\n潛伏條件已經裝填好，現在需要一根稻草。那根稻草，是 F13（生產壓力）與 F6（偏差正常化）合力造成的一連串「暫時關掉保護」。\n\n這場測試的目的本身是好的——甚至可以說是安全測試：確認在外部斷電的瞬間，正在減速的汽機慣性能否短暫驅動冷卻泵，撐到柴油發電機接手。這是在補一個已知的安全缺口。諷刺正在這裡：**一場為了讓電廠更安全的測試，引爆了電廠。**（F4 在組織層級的回聲。）\n\n為了完成它，操作員在那個夜晚做了一連串「當下合理、合起來致命」的動作：\n\n- **停用緊急爐心冷卻系統（ECCS）**：怕它在測試中誤動作干擾數據，先旁路掉。\n- **封鎖低功率與低水位的自動停機保護**：怕在低功率測試中觸發、中斷測試，於是把這些自動停機條件鎖住——這等於拆掉了「爐子若進入危險狀態會自己停下來」的最後防線。\n- **違規抽出過多控制棒**：為了把因氙中毒（xenon-135，一種會吸收中子、讓功率往下掉的裂變產物）而掉到極低的功率拉回來，操作員把控制棒抽到只剩約 8 根的 ORM，遠低於最低 15 根的規定。\n\n每一個動作背後都有一個「合理」的理由：不想讓保護機制干擾測試、不想讓測試中斷得重來、想趕在這個被延誤的夜班把它做完。沒有人想引爆反應爐——他們想的是「把這個任務收掉」。這是 F6 與 F13 的教科書：當「完成」的壓力夠大，「先把這個保護暫時關掉」會一個接一個地說出口，而每一個單獨聽起來都不像在製造災難。\n\n到了 01:23:40，功率開始失控上揚，值班長做了任何受過訓練的操作員都會做的、也是規程教他做的事：按下 AZ-5。\n\n在一個沒有那兩個隱藏缺陷的爐子裡，這一下會救他們。\n\n在這個爐子裡，它是點火開關。\n\n## 連鎖：救命鈕成為引爆鈕\n\n把那一刻拆成因果鏈，你會看到所有孔洞如何在三秒內連成一線：\n\n```\nAZ-5 按下（操作員以為：全部控制棒插入＝壓死反應）\n        │\n        ▼\n全部控制棒從頂端同時下插，石墨尖端先進爐心下部\n        │\n        ▼  ← 正向 scram（F8/F11：操作員不知的缺陷）\n石墨把吸中子的水擠開 → 爐心下部反應性不降反升\n        │\n        ▼  ← 疊加在正空泡正回饋上（F2）\n功率暴增 → 水更劇烈沸騰 → 空泡更多 → 反應性又升\n        │\n        ▼  ← 緊耦合，無緩衝（F1）\n數秒內功率衝到額定數十倍 → 燃料碎裂、汽化\n        │\n        ▼\n蒸汽爆炸掀飛 1,000 噸爐頂蓋 → 爐心暴露\n        │\n        ▼\n石墨燃燒、放射性物質拋向大氣\n```\n\n注意這條鏈的形狀：觸發事件（按 AZ-5）和它本該產生的效果（停堆）是**相反**的。這不是「保護機制失效、沒擋住災難」（那是三哩島那盞騙人的燈，F11），而是更深一層——**保護機制本身成了災難的直接成因**（F4 的極端版）。停止鈕不是沒停下爐子，它是親手點燃了爐子。\n\n爆炸不是核爆（不是像原子彈那樣的核子鏈式爆炸）。是失控功率暴增把冷卻水瞬間汽化造成的蒸汽爆炸，加上隨後石墨高溫燃燒、鋯水反應產生的氫氣——一連串化學與物理的爆燃，把爐心炸開、讓放射性物質持續數日拋向天空。\n\n## 餘波：傷亡、爭議與一次重要的翻案\n\n關於死亡人數，本書必須非常小心地處理——不是因為要迴避，而是因為這個數字長期被各種立場以訛傳訛，而真相本身就帶著巨大的不確定性。\n\n**短期、可確認的死亡**約 31 人：爆炸當場 2 人，其後數週內 28 人死於急性放射病（acute radiation syndrome，多為第一線的操作員與消防員）。這個數字相對紮實。\n\n**長期、可歸因於輻射的死亡**則高度爭議（⚠️）。WHO/IAEA 的車諾比論壇（Chernobyl Forum）估計，在暴露最高的族群中，可能約有 4,000 例可歸因的死亡（其中包含約 5,000 例甲狀腺癌，致死的約 15 例）；而部分 NGO（如 Greenpeace）的估計則高達數萬乃至數十萬。差距如此之大，源於方法學的根本分歧——如何把極低劑量、跨數十年、分散在龐大人口中的微小風險增量「歸因」給單一事件，本身就是統計學上極難的問題（這正是你書架上那本機率書處理的尾端風險與歸因難題）。\n\n**本書的立場很明確：確認短期死亡約 31 人；長期可歸因死亡的估計從約數千到數萬不等，方法學爭議極大，不應引用任何單一聳動數字。** 把它寫成「死了幾十萬人」或「只死了 31 人」都是在不同方向上撒謊。對死者的尊重，恰恰是誠實地承認我們不知道確切的數字、並說清楚為什麼不知道。\n\n而真正改寫了這場災難「意義」的，是調查結論的一次翻案——這是本章你最該帶走的史實校正。\n\n### 流行說法 vs 史實：誰的錯？\n\n最廣為流傳的版本是：車諾比是一群魯莽、無能的蘇聯操作員違規亂搞、把安全規程當廢紙的結果——「人為疏失」。這個版本來自 1986 年 IAEA 的第一份報告 INSAG-1，它在很大程度上採信了蘇聯官方的說法，把責任主要壓在操作員身上。多數通俗的轉述（紀錄片、文章、茶水間的版本）至今停在這裡。\n\n但 1992 年，IAEA 發布了 INSAG-7（《車諾比事故：INSAG-1 之更新》），**推翻了原本的歸因**。新的結論是：反應爐的**設計缺陷**（大的正空泡係數＋控制棒的正向 scram）與整體**安全文化的缺失**才是首要根因；操作員的違規是觸發，不是根本原因。\n\n| 流行說法（INSAG-1 / 蘇聯官方） | 史實（INSAG-7，1992 翻案） |\n|---|---|\n| 主因是操作員違規、無能 | 主因是反應爐設計缺陷＋安全文化缺失 |\n| 操作員「亂按」導致爆炸 | 操作員按了規程教他按的 AZ-5，是設計缺陷讓它引爆 |\n| 蘇聯工人素質問題 | 缺陷對操作員被隱瞞，他們在資訊不全下做了「合理」的事 |\n| 一群人的失誤 | 多層防禦同時失效的系統性災難 |\n\n這個翻案是本書全部主張的縮影：「都是人為疏失」幾乎永遠是個錯誤的、太早停下的答案。把責任推給操作員，讓人不必去問那個更難、更重要的問題——**是什麼樣的系統設計與組織，讓這些人在那一刻幾乎不可能做對？** 一個會被緊急停止鈕引爆、又把這個缺陷瞞著操作員的反應爐，它的根因不在控制室裡那幾雙手上。\n\n事故後，所有 RBMK 反應爐都做了改造：增加 ORM 的硬性限制、改造控制棒設計消除正向 scram、降低正空泡係數。也就是說——這個缺陷一旦被承認，是可以修的。它從來不是「人性的不可靠」，是「設計的可修正性」。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n**潛伏條件（早就裝填好的）**：\n\n1. RBMK 的大正空泡係數——在低功率運行域天生不穩定的正回饋（F2）。\n2. 控制棒石墨尖端的「正向 scram」——緊急停機在最初幾秒反而增加反應性的設計缺陷（F8），且此缺陷對操作員隱瞞（F11）。\n3. 蘇聯體制下的保密文化與「不容失敗」的生產壓力，讓設計缺陷不被公開、讓測試非趕完不可（F13、安全文化缺失）。\n\n**觸發（最後那根稻草）**：為完成被延誤的測試，操作員在低功率不穩定狀態下，旁路 ECCS、封鎖自動停機、把控制棒抽到 ORM 只剩約 8 根；當功率失控時按下 AZ-5——這一按，把所有石墨尖端同時插入，引爆了已經臨界失控的爐心。\n\n關鍵在於：觸發本身（按 AZ-5）是一個**正確的、受訓練教導的動作**。災難不是因為操作員做錯了停堆，而是因為這個系統把「停堆」這個動作的後果偷偷反轉了。\n\n### 起司的孔洞\n\n| 防禦層 | 本該擋住什麼 | 為什麼沒擋住 |\n|---|---|---|\n| 反應爐物理設計 | 任何運行域都該是負回饋、自我穩定 | RBMK 正空泡係數在低功率為正回饋；天生在某些區域不穩（INSAG-7 首要根因） |\n| 緊急停機（AZ-5／scram） | 一鍵把反應壓死 | 控制棒石墨尖端造成正向 scram，插入最初幾秒反而增反應性——保護機制本身成兇手 |\n| 緊急爐心冷卻（ECCS） | 失水/過熱時自動注水 | 為測試怕干擾，被刻意旁路停用 |\n| 低功率/低水位自動停機 | 進入危險狀態時自動停堆 | 為避免測試中斷，被刻意封鎖 |\n| 運行規程（ORM ≥ 15 根） | 保證隨時有足夠剎車能壓住反應 | 為提功率違規抽棒，ORM 掉到約 8 根，無人即時叫停 |\n| 操作員的知識（心智模型） | 知道每個動作的真實後果 | 正向 scram 缺陷被隱瞞，操作員的世界模型缺了一個關鍵符號（F11） |\n\n沒有任何單一一層是「根因」。每一層都有洞，平時錯開，那個夜晚恰好連成一線。明確反駁「都是操作員的錯」——把任何一層補上（公開缺陷、不停用 ECCS、守住 ORM、或改掉控制棒設計），災難就不會以這個形狀發生。\n\n### 對應失敗模式\n\n- **F4（安全系統即危險源）——本章主打、全書最極端的一例**：AZ-5 緊急停止鈕是事故的直接點火源。本該救命的機制親手引爆。\n- **F13（生產壓力壓過安全）**：被延誤的測試趕著完成，「先關掉這個保護」一次次出口。\n- **F6（偏差正常化／漂移）**：一道道旁路保護、違規抽棒——把「違反規程」逐步當成「為了完成任務的正常操作」。\n- **F8（潛伏條件 vs 觸發）**：正空泡與正向 scram 早已裝填，按 AZ-5 只是最後一根稻草。\n- **F11（操作員看不見的真相）**：正向 scram 缺陷被隱瞞，操作員的心智模型與真實反應爐脫節（與 ch16 三哩島那盞燈同型，但更致命——這裡騙人的不是一盞燈，是緊急停止鈕本身）。\n- **F2（互動複雜度）**：正空泡正回饋＋控制棒幾何＋低功率扭曲的功率分佈，三者非線性疊加，超出操作員（與部分設計者）能在當下推演的範圍。\n\n### 一句話形狀\n\n**這場災難的形狀是：在生產壓力下把保護一道道關掉、進入一個天生不穩的運行域之後，最後按下的那顆「緊急停止」鈕，因為一個被隱瞞的設計缺陷，反而成了引爆爐心的點火開關。**\n\n## 換成你的系統\n\n你立刻會想到那個「為了部署暫時關掉的 health check」。對，但 F6/F13 那一面（ch14 挑戰者已經講透）只是車諾比的一半。本章真正要你不寒而慄的，是另一半 F4：**你的某個保護機制，在最壞情況下行為是不是相反的？**\n\n點名一個你「應該沒事吧」的假設：**你相信「降級」「熔斷」「回退」「重啟」這些動作，在任何情況下都是安全的——它們是你的 AZ-5，是你出事時會本能去按的那顆鈕。**\n\n但想想這些角落：\n\n- **你的多層 cache graceful degradation**：in-memory 掛了退到 S3、S3 掛了退到 local。但如果「退到 local」這個動作本身，在某個情境下會把一份**過期且錯誤**的資料當成權威，而上層邏輯又據此做了不可逆的寫入或結算？那麼「降級」這個救命動作，在那一刻就是在往爐底注入正反應性。你測過「降到最底層時，回傳的資料正確性保證是什麼」嗎，還是只測過「降級不會 crash」？\n\n- **你的 circuit breaker**：它跳開是為了保護下游。但如果上游的重試邏輯，在 breaker 跳開、收到 fast-fail 之後，反而**加快**重試頻率（因為失敗回得快、迴圈轉得更兇）？那麼你的熔斷器在最壞情況下不是在洩壓，是在給 retry storm 踩油門——正空泡係數的分散式版本。\n\n- **你那個「出事就重啟 pod」的本能**：K8s 把 crash 的 pod 重啟，通常是對的。但如果 crash 的原因是某個 poison message 或某個會在啟動時觸發的壞狀態，那麼「自動重啟」就是 CrashLoopBackOff——你的 AZ-5 把同一個爆炸按了一遍又一遍（這正是 ch13 CrowdStrike 開機即藍屏、重啟迴圈的形狀）。\n\n- **最像正向 scram 的一個**：你的某個保護機制的**真實行為，和團隊以為的行為不一樣**——文件寫的、新人被教的、值班手冊上的，和它在極端情境下實際做的事有落差。這個落差沒人測過、沒人寫下來，就是你系統裡那個「被隱瞞的設計缺陷」。出事那晚去按它的人，心智模型裡是一顆救命鈕。\n\n可操作的自問（這一章我只要你帶走這一條）：**把你系統裡每一個「出事時會去按」的保護機制列出來——降級、熔斷、回退、重啟、failover——逐一問：它在最壞情況下的行為，我親手在混沌測試裡看過嗎，還是我只是「相信」它會救我？** 凡是「相信但沒看過」的，就是你的 AZ-5。\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★★\n\n口頭重講：為什麼按下 AZ-5（緊急停止鈕）反而引爆了反應爐？對著一個沒讀過這章的工程師，用不超過兩分鐘講清楚這條因果鏈，且不能用「蘇聯工人很爛」當答案。\n\n#### 推演解答\n\n要點按順序：（1）反應爐當時在低功率、控制棒幾乎全抽出的不穩定狀態，且正空泡係數讓水沸騰時反應性不降反升（正回饋）。（2）控制棒尖端有一段石墨置換器；當所有控制棒從頂端同時下插時，石墨**先**進入爐心下部，把吸收中子的水擠開，於是插入的最初幾秒反應性**不降反升**（正向 scram）。（3）這個增量疊加在已經失控的正空泡正回饋上，功率在數秒內暴增到額定數十倍，蒸汽爆炸。（4）關鍵的反直覺：操作員按的是規程教他按的救命鈕，是設計缺陷讓它變成點火開關——而這個缺陷對操作員是被隱瞞的。\n\n驗收標準：你的講述裡必須出現「設計缺陷」和「對操作員隱瞞」，不能停在「他們亂按」。如果你的版本是「操作員犯錯」，你複述的是被 INSAG-7 推翻的 INSAG-1 版本。\n\n### 推演題2 [20 分鐘] ★★★\n\n反事實拆解：車諾比有六層防禦（見故障解剖的起司表）。逐一假設「只有這一層沒破洞、其餘照舊」，這場災難還會以這個形狀發生嗎？哪幾層是「補上就能擋住」的單點，哪幾層是「補上只是減傷」？\n\n#### 推演解答\n\n逐層分析：\n\n- **控制棒設計（消除正向 scram）**：補上這層，AZ-5 就回到純救命鈕——爆炸的最後一擊被拆除。雖然爐子在低功率仍危險，但「按停止鈕反而引爆」這個特定形狀不會發生。**接近能單獨擋住的關鍵層。**\n- **不停用 ECCS／不封鎖自動停機**：補上這層，爐子在進入危險狀態時可能自己停下來（或注水），測試在失控前就被打斷。**可能單獨擋住。**\n- **守住 ORM ≥ 15 根**：剎車留得夠多，爐子不會進入那麼扭曲的功率分佈，正向 scram 的局部效應被稀釋。**大幅減傷，未必能單獨擋住全部。**\n- **公開正向 scram 缺陷給操作員（修補 F11）**：操作員知道低功率全抽棒時不能輕易按 AZ-5、或知道要先做別的——心智模型正確。**減傷且可能改變決策，但要求人在壓力下記得一個反直覺規則，脆弱。**\n- **正空泡係數設計（負回饋）**：這是最根本的一層，補上它整個正回饋環不成立。**單獨擋住，但屬於爐型重新設計，非當晚可為。**\n\n結論：這正是「找單一根因是錯問法」的演示——有好幾層只要補上任一層，災難就不會以這個形狀發生。把它歸給操作員，等於放過了所有更便宜、更可靠的設計層防禦。\n\n### 推演題3 [25 分鐘] ★★★\n\n對帳你的系統：找出你維運過的一個「保護機制」，它在某個你沒充分測過的情境下，行為可能與「保護」相反（你的正向 scram）。用本章的語言寫出它的潛伏條件、觸發、和「按下去那一刻」會發生什麼。\n\n#### 推演解答\n\n沒有標準答案，但一個好的對帳應包含：\n\n- **指認機制**：例如「結算 pipeline 失敗時自動 retry 整批」「快取 miss 時自動穿透到 DB」「服務不健康時自動 failover 到備援」。\n- **潛伏條件**：什麼設計選擇讓它在極端情況會反向？（如：retry 不是冪等的、failover 的備援其實共用同一個會掛的依賴＝common-mode、降級路徑回傳的資料無正確性保證。）\n- **觸發**：什麼輸入或狀態會讓它從「保護」翻成「放大」？（如：poison message、上游已過載時的同步重試、依賴鏈的循環。）\n- **「按下去那一刻」**：操作員/系統執行這個保護動作後，事情如何**加速惡化**而非緩解？\n\n關鍵檢核：如果你寫不出任何一個，問自己——是真的沒有，還是你從沒在混沌測試裡逼這些保護機制走到最壞分支？「相信它會救我但沒看過」本身就是 F11 的徵兆。誠實的答案多半是後者。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先「為什麼每層都沒擋住」，不是「死了幾個人／哪一年」。\n\n1. 為什麼按下 AZ-5 緊急停止鈕反而引爆了反應爐？「正向 scram」是什麼，它和正空泡係數如何疊加？\n2. INSAG-7 把根因從什麼翻成什麼？為什麼這個翻案是本書全部主張的縮影？多數通俗轉述停在哪個版本？\n3. 操作員那晚旁路了哪些保護、違規做了什麼？把每一個動作翻譯成它當下「合理」的理由——說明為什麼「他們很笨」是錯誤的解讀。\n4. 「正向 scram 缺陷被隱瞞」這件事，對應到本書的哪個失敗模式（F幾）？它和 ch16 三哩島那盞騙人的燈，相同與不同在哪？\n5. 這場災難命中的六層起司孔洞，哪幾層「補上任一層就能擋住這個形狀」？這對「找單一根因」的問法說明了什麼？\n6. 關於死亡人數，為什麼本書堅持「短期約 31、長期數千到數萬、不釘單一數字」？這跟尊重死者的關係是什麼？\n7. 把本章的 F4（安全系統即危險源）對應到你自己的系統：你哪一個保護機制可能在最壞情況下行為相反？你是「看過」還是只是「相信」？\n\n## 延伸閱讀\n\n- **IAEA, INSAG-7,《The Chernobyl Accident: Updating of INSAG-1》(1992)** — 本章史實的一手錨點，也是那次關鍵翻案的原始文件。它把根因從「操作員違規」改為「反應爐設計缺陷與安全文化缺失為首要」。讀它你會明白「人為疏失」作為調查終點有多危險。PDF：https://www-pub.iaea.org/MTCD/publications/PDF/Pub913e_web.pdf\n- **World Nuclear Association,《Sequence of Events – Chernobyl Accident Appendix 1》** — 把那晚從 01:03 到 01:23:43 的每一步（200 MWt 穩定、ORM 掉到 8 根、AZ-5、三秒後功率飆升）逐分鐘列出，值得拿來對著本章的時序圖重走一遍。https://world-nuclear.org/information-library/appendices/chernobyl-accident-appendix-1-sequence-of-events\n- **World Nuclear Association,《RBMK Reactors》附錄** — 把正空泡係數與控制棒正向 scram 的物理講清楚，且說明事故後 RBMK 如何被改造消除這些缺陷——印證「這從來是可修的設計問題，不是不可靠的人性」。\n"}, {"id": "ch18-morris-worm", "file": "ch18-morris-worm.md", "group": "Part VI — 看不見的縫：安全、供應鏈與靜默損毀", "title": "ch18 — Morris 蠕蟲：第一次，整個網際網路停了下來", "md": "# ch18 — Morris 蠕蟲：第一次，整個網際網路停了下來\n\n> **本章解剖什麼**：這是 Part VI「看不見的縫：安全與供應鏈」的開場。前五個 Part 的災難多半發生在一個組織內部——一架飛機、一座平台、一座反應爐、一個資料中心。從這裡開始，缺口不在你的程式裡，而在你**信任的東西**裡：你 import 的函式庫、你開著的預設設定、你跑出去的探測程式。Morris 蠕蟲（1988-11-02）是史上第一隻網際網路蠕蟲，主打 **F14（單一栽培／blast radius）**、**F8（潛伏條件 vs 觸發）**、**F4（安全系統即危險源）**、**F7（級聯）**。它最反直覺的地方：作者**沒有**想破壞任何東西——一個再感染機率參數設高了一點，就把一支善意程式變成了拖垮半個網際網路的 DoS。這正是「應該沒事吧」的標本。它與 ch10 的 Cloudflare regex（同步放大 vs 自我放大）成對，往後接 ch19 Heartbleed、ch20 供應鏈。\n\n```\nPart I 框架與前傳          Part II 安全系統即兇手     Part III 一個數字一場崩塌\nch01 正常意外(序)          ch04 737 MAX / MCAS       ch07 金姆利滑翔機\nch02 解剖的工具       →    ch05 法航 447         →   ch08 Schiaparelli\nch03 機器之前的崩壞        ch06 于伯林根相撞          ch09 Sleipner A 平台\n                                                          │\n                                                          ▼\nPart VII 怎麼安全地壞      Part VI 看不見的縫        Part IV 連鎖反應\nch22 韌性工程        ←     ch18 Morris 蠕蟲 ◄你在這裡 ←  ch10 Cloudflare regex\nch23 正常意外與你(收)      ch19 Heartbleed           ch11 2010 閃電崩盤\n                          ch20 供應鏈即災難          ch12 德州電網 2021\n                          ch21 靜默的錯誤            ch13 雲端連鎖\n                                  ▲                        │\n                                  │                        │\n                  Part V 漂移到失效 ◄──────────────────────┘\n                  ch14 挑戰者 → ch15 哥倫比亞 → ch16 三哩島 → ch17 車諾比\n```\n\n## 從你已知的出發\n\n你寫過健康探測（health probe）。Kubernetes 的 readiness/liveness probe、你那條 FluentBit+Lua 的可觀測性 pipeline、跑在 CronJob 裡的對帳掃描——它們都有一個共同形狀：**一支以固定頻率、自動向別人發請求的程式，目的是「看看狀況」，本身不該造成傷害**。\n\n但你一定看過監控反噬被監控對象。一個 liveness probe 的逾時設太短、間隔設太密，pod 在尖峰時稍微慢一拍就被判死、被重啟、重啟後冷啟動更慢、更容易再被判死——你親手把一個「只是想知道它還活著」的探測，變成了砍死它的劊子手。或者一條重試邏輯：上游慢了，下游重試，重試的流量讓上游更慢，更多重試湧入——這就是你複習過的 retry storm。再或者一隻爬蟲、一個背景 job，掃描頻率乘上併發數，把本來要保護的 RDS 打到 CPU 100%（你太熟這個數字了，只是上次是你**降**了 40%，這次是反過來）。\n\n這些東西的危險不在「它做了什麼壞事」，而在**一個頻率參數、一個機率、一個間隔**。程式邏輯完全正確、意圖完全善良，但那個數字設錯一格，善意的探測就變成自我 DoS。\n\nMorris 蠕蟲是這個形狀的祖宗。它的作者是一位聰明、無惡意的研究生，他想做的只是「估算一下網際網路有多大」。他甚至特地加了一段防止重複感染的邏輯——一段**安全機制**。問題出在那段安全機制裡一個分數：七分之一。\n\n## 冷開場：1988 年 11 月 2 日晚上\n\n那是個星期三的晚上。大約晚間八點半，一支程式從 MIT 的一台機器被放了出去——刻意選在 MIT，作者是康乃爾大學的研究生 Robert Tappan Morris，他想掩飾來源。（日期、釋出地點、作者身分照 landscape。）\n\n那年的「網際網路」還很小：大約六萬台機器連在一起，主要是大學、研究機構、軍方的研究網路。沒有防火牆的概念，沒有入侵偵測，機器之間預設互相信任——因為連上來的，理論上都是「自己人」。\n\n當晚稍後，加州大學 Berkeley 的一名學生在一封信裡寫下這句後來被反覆引用的話：「**We are currently under attack**（我們正在被攻擊）。」（此句廣見於事後報導，作為事件當晚氛圍的引述。）\n\n但問題是，沒有人真的在攻擊。沒有人在偷資料、刪檔案、勒索。各地的系統管理員只看到一件事：他們的 VAX 和 Sun-3 機器**越來越慢**，慢到動不了。登入進去一看，process table 塞滿了同一支不明程式的副本，一個接一個 fork 出來。把機器重開機，負載在幾分鐘內又爬回頂點。Gene Spafford（後來寫出最權威剖析報告的人）就是這樣發現的：他重開了實驗室的機器，眼睜睜看著負載再次一路飆高。\n\n接下來的二十四小時內，估計約六千台主機被感染——約當時連網機器的百分之十。（⚠️「約 6,000 台／約 10%」是當代估計、被廣泛引用，但精確數字不可考；landscape 註明此為估計區間，以「約一成的網際網路」這個量級理解較穩妥。）\n\n這不是一場攻擊。這是一支善意的程式，因為一個參數設錯，把它接觸到的每一台機器都活活拖死。\n\n## 裝填：那些早就敞開的門\n\n要理解這場災難，先看那些**潛伏條件**——在 Morris 寫下第一行程式之前，這些門就已經開著了。蠕蟲沒有「攻破」任何精心設計的防線，它只是走進了一棟到處沒鎖門的房子。\n\n**第一道門：`gets()` 與 fingerd 的緩衝區溢位。** finger 是一個查詢服務，你打 `finger someone@host`，對方的 `fingerd` 守護程式告訴你那個使用者是誰、上次何時登入。fingerd 用 C 的 `gets()` 把網路傳來的輸入讀進一個 512 bytes 的 stack 緩衝區——而 `gets()` **不檢查長度**。蠕蟲送一個遠超 512 bytes 的字串，溢出去的部分覆寫掉 stack 上的 return address，把它指向緩衝區裡夾帶的一小段機器碼，那段碼執行 `/bin/sh`。這就是經典的 stack buffer overflow：一個讀輸入的小工具，因為信任「輸入不會超過我預想的長度」，把整台機器的控制權交了出去。（機制照 landscape；本書不教 exploit 寫法，只取「沒有邊界檢查」這一面。）\n\n**第二道門：sendmail 的 DEBUG 模式。** 當時許多系統的 sendmail（郵件傳輸程式）出貨即開啟 DEBUG 模式。DEBUG 模式允許遠端把「指令」當成收件人傳進來並執行——等於內建了一個遠端執行的後門。沒人關它，因為「方便除錯」「應該沒事吧，誰會去濫用」。\n\n**第三道門：rsh／rexec 的傳遞信任與弱密碼。** Unix 機器之間用 `.rhosts`、`hosts.equiv` 建立互信：A 信任 B，B 上的使用者不必密碼就能登入 A。蠕蟲利用這層互信橫向移動，並對帳號做字典猜密碼。一旦攻下一台，它就能順著信任關係跳到下一批。\n\n**第四道門，也是最致命的潛伏條件：單一栽培（monoculture）。** 整個早期網際網路跑著高度同質的 4.2／4.3 BSD Unix，在 VAX 和 Sun-3 上。**同一組漏洞，通殺幾乎所有機器。** 這不是某一台機器特別脆弱，是整片生態用同一張臉、犯同一組錯。一把鑰匙開所有的門——這正是 F14 單一栽培的定義。你在 ch10 看過 Cloudflare 把同一條 regex 一次推到全球每個節點，在 ch13 會看到 CrowdStrike 把同一個內容更新推到八百多萬台 Windows——形狀完全一樣：同質化讓單點失效一次打中所有人。Morris 蠕蟲是這個模式在 1988 年的初版。\n\n這四道門，每一道單獨看都「應該沒事吧」。`gets()` 用了幾十年沒出事；sendmail debug 方便；互信省事；大家都跑 BSD 因為它好用。它們各自無害，但全部對齊在同一片同質的網路上——瑞士起司的孔洞早已排成一線，只等一支程式走過。\n\n## 觸發：七分之一\n\nMorris 的程式本身不含任何破壞性 payload。它不刪檔、不竄改、不竊取（這點 Spafford 的剖析講得很清楚）。它唯一做的事，就是**傳播自己**：攻進一台機器，找出它認識的其他機器，複製過去，再從那裡繼續。\n\n如果只是這樣，它會是一個安靜的、最多被當成異常流量的東西。真正把網際網路拖垮的，是傳播控制邏輯裡一個分數。\n\nMorris 想得很周到——他**知道**重複感染同一台機器是浪費、會引人注意。所以他加了一道防護：蠕蟲在感染前先問對方「你已經被感染了嗎？」如果對方說是，就不要再感染。\n\n這正是一個**安全機制**。它的設計意圖是「溫和傳播、不要打擾已感染的機器」。\n\n但 Morris 多想了一層。他擔心：如果系統管理員看穿了這個握手協定，寫一個假程式回答「我已經被感染了」，蠕蟲不就被騙得無法傳播了嗎？這對一支想「估算網路大小」的程式來說是致命的——它會被輕易免疫。\n\n於是他做了一個決定:**即使對方回答「我已經被感染了」，仍然有七分之一（約 14%）的機率無視這個答案、照樣重新感染一次。** 這個七分之一，是用來對抗「假裝已感染」的詐騙的——是一道對付防禦者的反防禦。\n\n問題是，這個機率設得太高了。\n\n七分之一聽起來很小。但想想實際發生了什麼：一台熱門的機器（比如連線多、被很多主機認識的伺服器）會被很多其他被感染的機器**反覆**嘗試感染。每一次嘗試，都有六分之七的機率被「已感染」擋下——但有七分之一漏過去，又跑起一份新的蠕蟲行程。被很多來源不斷叩門的機器，七分之一乘上叩門的次數，很快就累積出大量並存的蠕蟲副本。\n\n每一份副本都在 fork、在掃描、在嘗試傳播。process table 爆滿，記憶體耗盡，CPU 被一群自己的副本啃光——這在效果上就是一個 **fork bomb**。機器不是被「攻擊」癱瘓的，是被**自己身上跑著的、太多份的同一支善意程式**活活拖死的。\n\n這就是觸發。不是 `gets()`，不是 sendmail debug——那些是裝填好的彈藥（傳播向量）。真正扣下扳機、把「溫和傳播」變成「自我 DoS」的，是那個七分之一的重感染率。一個分數。\n\n（要破除一個流行的簡化說法：「Morris 蠕蟲就是 fingerd 緩衝區溢位。」不完整。緩衝區溢位只是它進門的方式之一，它同時用了 sendmail debug、rsh 互信、密碼猜測。真正把機器搞當的，是重複感染導致的行程爆量——是那個參數，不是那個漏洞。技術上它也是 worm 蠕蟲、不是 virus 病毒：它自我傳播、不需寄生在宿主檔上。）\n\n## 連鎖：放大的方向\n\n把 Morris 蠕蟲和你熟悉的級聯放在一起，會看到一個有趣的對照。\n\nch10 的 Cloudflare 是**同步放大**：一條 regex 被一次推送到全球每個節點，所有節點在同一瞬間 CPU 衝到 100%。災難是「中央一推、四方同死」。\n\nMorris 蠕蟲是**自我放大**：沒有中央，沒有人推送任何東西。每一台被感染的機器，自己變成下一個感染源；它感染得越多，被它感染的機器又去感染更多——指數成長。而在單一機器內部，七分之一的重感染率讓副本數也指數累積。這是**兩層級聯疊在一起**：機器之間的橫向擴散（F7），加上單機內部的行程爆炸（F7 的微觀版）。\n\n兩種放大的共同點是 F14：因為單一栽培，橫向擴散沒有任何「天然的防火牆」——下一台機器幾乎一定也是 BSD、也開著同樣的門。同質化讓蠕蟲在每一跳都暢通無阻。\n\n止血靠的是人。Berkeley 的 Computer Systems Research Group 在發現後約十二小時內，就拼湊出阻止蠕蟲擴散的步驟（修補 sendmail、過濾、把受感染機器斷網清理）。但這是**手動**止血——靠一群熬夜的工程師逆向分析一支當時誰也沒見過的東西。對照 ch10 Cloudflare 有一個全域 kill switch 能在數十分鐘內關掉 WAF，1988 年沒有任何「關掉它」的開關。網際網路那時還沒有為「萬一有東西在我們之間自我複製」準備過任何東西。\n\n## 餘波：一個分數，催生了一個產業\n\n蠕蟲被清除後，帳單不是用人命算的（無傷亡），而是用**時間和信任**算的。\n\n清除成本的估計差異極大：上訴法院的判決引用了「每台機器移除成本約 200 至 53,000 美元」這樣的範圍；Clifford Stoll 為美國 GAO 估計的整體經濟衝擊約在 10 萬到 1,000 萬美元之間。（⚠️ 這些都是估計區間、跨度很大，照 landscape 保守處理，不要釘死單一數字。）真正的代價是它讓所有人第一次意識到：**這張把大家連在一起的網，本身就是一個攻擊面**。\n\n兩件事誕生於此：\n\n**第一，CERT/CC（CERT Coordination Center）。** 1988 年 11 月，就在蠕蟲事件之後，美國 DARPA 委託卡內基美隆大學的 Software Engineering Institute（SEI）成立一個協調中心，負責在資安緊急事件中協調各方專家、並協助預防類似事件。這是世界上第一個正式的電腦緊急應變團隊，後來全球各地的 CERT 都是它的後代。換句話說，今天你收到的 CVE 通報、你追的安全公告體系，它的起點就是「有一支善意程式因為一個參數失控，沒有人知道該打電話給誰」。\n\n**第二，《Computer Fraud and Abuse Act》（CFAA，電腦詐欺與濫用法）的首例定罪。** Morris 成為這條法律下第一個被定罪的人（United States v. Morris, 928 F.2d 504, 2d Cir. 1991）。他被判三年緩刑、400 小時社區服務、罰款約 10,050 美元。值得一提的後續：他後來成為 MIT 的教授、共同創辦了 Y Combinator——這個結局本身就是對「把當事人當蠢蛋審判」這種敘事的一記反駁。他不是壞人，也不蠢；他是一個聰明人，在一個資訊不全、沒人想過「自我複製程式會怎樣」的時空裡，把一個防禦用的機率設高了一格。換成你在 1988 年，未必看得出七分之一會炸。\n\n## 故障解剖\n\n### 潛伏條件 vs 觸發\n\n| | 內容 |\n|---|---|\n| **潛伏條件**（早就裝填好） | `gets()` 無邊界檢查的 fingerd；sendmail 出貨即開 DEBUG 後門；rsh／rexec 傳遞信任＋弱密碼；整片網路高度同質的 BSD Unix（單一栽培）。這些門平時各自「沒事」，但合起來＝一組通殺所有機器的鑰匙。 |\n| **觸發**（最後一根稻草） | 傳播控制邏輯裡的**七分之一重感染率**。它把「溫和傳播」變成單機行程爆量（fork bomb）＋網路指數擴散。**不是漏洞觸發了災難，是一個防禦參數的數值。** |\n\n注意這個案子的關鍵翻案點：多數人記得的「漏洞」（緩衝區溢位）是**潛伏條件**，不是觸發；真正的觸發是一個**為了防禦而加、卻設得太強的安全機制**。\n\n### 起司的孔洞——為什麼每一層都沒擋住\n\n| 防禦層 | 為什麼沒擋住 |\n|---|---|\n| fingerd 的輸入處理 | 用 `gets()`，語言/函式庫層級就不設防——對「輸入不會超長」這個假設零防衛。 |\n| sendmail 的遠端介面 | DEBUG 模式預設開啟，等於內建後門；沒人關，因為「方便、應該沒事」。 |\n| 主機間的存取控制 | rsh 互信＋弱密碼，橫向移動幾乎無摩擦；信任邊界畫在「連得上的都是自己人」。 |\n| 生態的多樣性 | **不存在**。單一栽培讓同一組漏洞通殺；沒有任何異質性當天然防火牆（F14）。 |\n| 蠕蟲自己的「不重複感染」防護 | 存在，但被那七分之一的後門條款親手廢掉——**安全機制成了危險源**（F4）。 |\n| 全網層級的止血開關 | 不存在。沒有 kill switch、沒有應變中心、沒人知道該打給誰（事後才催生 CERT）。 |\n\n明確反駁「單一根因」：把這場災難歸給「緩衝區溢位」是錯的問法。緩衝區溢位若沒有單一栽培（F14）就只打中一小撮機器；單一栽培若沒有那個七分之一（F4／F8）就只是安靜傳播；安靜傳播若有全網 kill switch 就能及早止血。**是六道孔洞同時對齊**，才有 1988 年 11 月那一夜。\n\n### 對應模式\n\n- **F14（單一栽培／blast radius）**：本章主軸。高度同質的 BSD Unix 讓一組漏洞通殺幾乎所有機器，把單點失效放大到全網。\n- **F8（潛伏條件 vs 觸發）**：傳播向量是早就裝填好的彈藥；那個七分之一才是扣扳機的。\n- **F4（安全系統即危險源）**：「不重複感染」是一道防禦，但其中對抗詐騙用的七分之一反防禦，正是把蠕蟲變成 DoS 的直接成因——保護機制本身造成了災難。\n- **F7（級聯／雪崩）**：兩層自我放大——機器間指數擴散＋單機內行程爆炸。\n\n（與 ch10 Cloudflare 的對照值得記住：F14＋F7 在那裡是「同步放大」（一推全死），在這裡是「自我放大」（自我複製）。同一個 blast radius，兩種引爆方式。）\n\n### 一句話形狀\n\n**這場災難的形狀是：一個聰明人為了讓善意程式不被免疫，加了一道七分之一的反詐騙條款；在一片所有機器長得一模一樣的網路上，這個分數把「估算網路大小」變成了把網路自己拖死的指數級 DoS。**\n\n## 換成你的系統\n\n你活在這個形狀的正中央，而且不只一次。\n\n**第一個藏身處：你的健康探測與背景掃描。** 你那條 FluentBit+Lua pipeline、你的 liveness/readiness probe、你跑對帳的 CronJob——它們的「頻率／間隔／併發數」就是 Morris 的那個七分之一。點名你那個「應該沒事吧」的假設：**「探測很輕量，多探幾次不會有事。」** 這個假設錯的時候會怎麼壞？當被探測的系統開始變慢（尖峰、GC、鎖競爭——你那次 RDS CPU 的老朋友），探測逾時、判它死、重啟它、冷啟動讓它更慢、更容易再逾時——你的監控變成了砍死被監控對象的劊子手。Morris 的機器不是被攻擊死的，是被太多份善意程式拖死的；你的 pod 也可以被自己的 liveness probe 探死。\n\n**第二個藏身處：retry 與重試風暴。** 你複習過 retry storm。它的本質和 Morris 一模一樣：每個重試者各自「理性」（我只是想再試一次），但乘上規模和頻率，重試的流量讓上游更慢，更慢引發更多重試——自我放大的正回授。你的退避（backoff）有沒有抖動（jitter）？有沒有上限？有沒有 circuit breaker 在某個點說「別再試了」？沒有的話，你的重試邏輯裡就藏著一個七分之一。\n\n**第三個藏身處：單一栽培。** 你的 ECS 服務跑的是不是同一個 base image、同一套依賴版本、同一份設定？同質化讓你的部署一致、好維運——但它也意味著一個有問題的 base image、一個有 bug 的共用 library（你那套全團隊採用的多層 cache library 就是候選），一次推上去，**所有實例同時中招**。這不是叫你去搞異質化（那會把維運變地獄），而是叫你誠實回答：當這個共用元件出事，我的 blast radius 是「一個服務」還是「全部」？（ch20 會把這條推到極致：你 `npm install` 的每個套件都是別人的 monoculture。）\n\n可操作的自問，挑一個今天就去查：\n\n- 我每一個對外發請求的背景程式（probe、scan、crawler、retry），它的**最壞情況流量**是多少？（頻率 × 併發 × 失敗時的放大倍數）被它打的系統撐得住嗎？\n- 當被探測對象變慢，我的探測邏輯是**幫它**（退避、給它喘息）還是**踩它**（更密集地探、更快地判死重啟）？\n- 我有沒有一個「七分之一」——某個為了某種邊角情況加上的參數，它在正常情況下無害，但在規模或壓力下會指數放大？\n\n## 紙上推演\n\n### 推演題1 [15 分鐘] ★★\n\n口頭重講這場災難的因果鏈，但**刻意不准用「緩衝區溢位」當主因**。向一個只聽過「Morris 蠕蟲就是個 exploit」的同事解釋：為什麼真正的主因是一個七分之一的機率參數，而不是任何一個漏洞？把「潛伏條件」和「觸發」明確分開。\n\n#### 推演解答\n\n關鍵在分清彈藥和扳機。傳播向量（fingerd 的 `gets()` 溢位、sendmail DEBUG、rsh 互信）是**潛伏條件**——它們決定蠕蟲怎麼進門、能進多少門。但即使這些門全開，如果蠕蟲老實遵守「已感染就不再感染」，它頂多在每台機器上跑一份、安靜傳播，多半被當成異常流量處理掉。把機器拖死的是**單機內並存的大量副本**，而副本之所以爆量，是因為那個七分之一的重感染率——被很多來源反覆叩門的機器，七分之一乘上叩門次數，累積出 fork bomb。所以：漏洞決定了「能傳多廣」，那個分數決定了「會不會把宿主拖死」。災難等於兩者相乘，而致命的乘數是那個分數。再加一句翻案：那個七分之一還不是 bug，是 Morris **刻意**加的反詐騙防禦——一道安全機制（F4）。\n\n### 推演題2 [20 分鐘] ★★★\n\n**反事實**：假設 1988 年的網際網路不是清一色 BSD Unix，而是異質的——三分之一跑 BSD、三分之一跑某種 System V 變體、三分之一跑完全不同的作業系統，且 fingerd／sendmail 的實作各不相同。其餘條件不變（一樣有那個七分之一）。蠕蟲還會造成全網級災難嗎？這告訴你 F14 在整條因果鏈裡扮演什麼角色？\n\n#### 推演解答\n\n不會造成同等規模。蠕蟲的傳播向量是針對 BSD 特定實作寫的——特定版本 fingerd 的緩衝區佈局、特定 sendmail 的 DEBUG 行為。在異質生態裡，它攻下一台 BSD 後跳到下一台，有約三分之二的機率撞上一台它打不進去的機器。傳播的指數成長被「不相容」一次次截斷，擴散會迅速收斂而非爆炸。那個七分之一造成的單機行程爆量仍會發生在被感染的 BSD 機器上（局部仍會當），但**橫向級聯被生態多樣性當成天然防火牆擋住了**。這說明 F14 的角色：單一栽培不是觸發、也不是進門的方式，它是**放大器**——把「一小撮 BSD 機器當機」放大成「約一成的網際網路停擺」。你系統裡的同質化（同一 base image、同一共用 library）扮演的就是這個放大器：它決定一個缺陷的 blast radius 是局部還是全域。（注意：異質化的代價是維運複雜度暴增——這不是免費的防禦，ch22 會談「冗餘的多樣性」如何權衡。）\n\n### 推演題3 [15 分鐘] ★★\n\n**對帳**：回想你經手過的一次「監控／重試／掃描頻率不當而自我 DoS」的事件（或最接近的一次：liveness probe 探死 pod、retry storm、爬蟲打爆 RDS、CronJob 撞在一起）。把它對應到本章的 F 模式：哪個是你的「七分之一」（被設錯的參
