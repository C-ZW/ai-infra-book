we just argued about\n    scores = Q @ K.T / np.sqrt(d_k)        # score, then SCALE: this one division is ch06\n    weights = softmax(scores, axis=-1)     # normalize (ch05)\n    return weights @ V                      # weighted mix (ch04/ch05)\n```\n\n用脊椎餵進去（Q 是 q_it、K 是三個 key、d_k=4）：`scores = [4,2,0]/2 = [2,1,0]`，softmax 出 `[0.665, 0.245, 0.090]`，乘 V 得 `(0.755, 0.335)`——和我們上面手算的正典數字一模一樣。程式和手算對得上，這就是本章唯一新增的那行 `/ np.sqrt(d_k)`。\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「除以 √d 是為了數值溢位（overflow）」 | 部分對但抓錯重點。溢位是用「減去最大值」那招防的（見 ch16 online softmax）。`/√d` 的目的是**統計尺度**——把分數變異數拉回 1，防 softmax 飽和、梯度消失，不是防 `exp` 算爆。 | 問自己：減最大值已經能防溢位了，為什麼還要除 √d？因為兩者治不同的病：減最大值治「`exp` 數值爆」，除 √d 治「softmax 太尖、學不動」。 |\n| 「應該除以 d，因為變異數是 d」 | 在第二步（正規化）之前把分數壓過頭。你要校正的是**標準差（尺度）**＝√d，不是變異數。除以 d 會讓變異數變 1/d，分數擠成一團、softmax 趨近均勻、注意力糊掉。 | 記「除以標準差才是歸一尺度」。變異數 d → 標準差 √d → 除 √d。除 d 是過度縮放。 |\n| 「分數差距愈大、模型愈果斷愈好」 | 對**訓練中**的模型是毒。過早的 one-hot＝梯度消失＝學習停擺（p_i(1−p_i)→0）。模型還沒學會就把話說死，永遠卡在當下選擇。 | 看權重是不是「太早變 one-hot」。健康的注意力在訓練早期應該是軟的、留餘地的；果斷是學會之後的結果，不是手段。 |\n| 「縮放會改變 it 到底看哪裡（誰最大）」 | 不會。縮放是對所有分數除同一個正常數，**不改變排序**——animal 仍是最大。縮放只改「最大者贏多少」（0.867→0.665），不改「誰最大」。 | 並排看脊椎兩版：兩版 animal 都最大。縮放動的是分布的**尖銳度**，不是 argmax。 |\n| 把 `/√d` 當成獨立的演算法步驟 | 它不是第四步，是「打分」和「正規化」之間的尺度校正，融在公式 `softmax(QKᵀ/√d)` 裡。當成獨立步驟容易忘了它純粹服務 softmax。 | 回扣三步骨架：√d 不增刪步驟，它只是讓第一步的產物以正確尺度進入第二步。 |\n| 「飽和只在 d 很大時才發生，小模型不用管」 | 危險的「應該沒事」假設。即使 d 不大，只要 q、k 的尺度（embedding 沒正規化好、或某些維度數值偏大）失控，分數一樣會膨脹進飽和區。√d 是**對維度**的系統性校正，不是唯一的尺度防線。 | LayerNorm（ch13）也在管尺度。√d 治「維度造成的膨脹」，LayerNorm 治「逐層數值漂移」，兩者互補，缺一仍可能飽和。 |\n\n**和後面章節的鉤子**：softmax 飽和導致的「深層難訓練」不是只靠 √d 就解決的。把很多層注意力疊起來，還會遇到更根本的退化——**秩坍縮（rank collapse）**：純注意力堆疊，輸出會雙指數地塌成秩 1（Dong 2021，ch19 詳述）。√d 處理單層 softmax 的尺度，**殘差連接與 FFN**（ch13）才是阻止跨層坍縮的解藥。本章先把單層這關過了。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [10 分鐘]（★）** 親手把脊椎縮放算完整。給原始分數 [4, 2, 0]、d=4：(a) 算 √d，寫出縮放後分數；(b) 一步不跳算 softmax（e²、e¹、e⁰、求和、相除）得三個權重；(c) 用 v_animal=(1,0)、v_street=(0,1)、v_it=(1,1) 算加權混合輸出；(d) 和 ch05 未縮放的 [0.867,0.117,0.016] 並排，一句話說縮放改變了什麼、沒改變什麼。\n\n**第 2 題 [15 分鐘]（★★）** 變異數論證的核心。(a) 用「q、k 各分量獨立、期望值 0、變異數 1」的假設，說明為什麼單一項 qᵢkᵢ 的期望值是 0、變異數是 1；(b) 為什麼 d 項之和的變異數是 d（用了什麼性質）；(c) 據此說明「為什麼除以 √d 而不是除以 d」——若除以 d 會發生什麼？\n\n**第 3 題 [12 分鐘]（★★）** 飽和與梯度消失。手算 softmax([16, 8, 0])（提示：先減最大值 16 再算，e⁰=1、e⁻⁸≈0.000335、e⁻¹⁶≈0），看它多接近 one-hot；然後用「softmax 的敏感度正比於 p_i(1−p_i)」說明：當 animal 權重 ≈ 0.9997 時，模型對分數的梯度大約是多少量級？這對「模型還能不能繼續學 it 該看哪裡」意味著什麼？\n\n**第 4 題 [8 分鐘]（★★）** 把它接回你的後端直覺。你有一個用 softmax 把「服務健康分數」轉成流量配比的 router。分數 [4,2,0] 給出 [0.867,0.117,0.016]。現在因為換了打分函數，所有分數整體乘了 10 變成 [40,20,0]。(a) 不用精算，定性說新配比會長怎樣；(b) 這對應注意力裡的什麼故障？(c) 你會怎麼「縮放」修它，讓配比回到能調節的狀態？\n\n### 推演解答\n\n**第 1 題。**\n(a) √d = √4 = **2**；縮放後分數 = [4,2,0] / 2 = **[2, 1, 0]**。\n(b) e² = 7.389、e¹ = 2.718、e⁰ = 1.000；和 = 7.389+2.718+1.000 = **11.107**；權重 = [7.389/11.107, 2.718/11.107, 1.000/11.107] = **[0.665, 0.245, 0.090]**（驗：和 = 1.000 ✓）。\n(c) 輸出 = 0.665·(1,0)+0.245·(0,1)+0.090·(1,1) = (0.665+0.090, 0.245+0.090) = **(0.755, 0.335)**。\n(d) 縮放**沒改變**誰最大（兩版都是 animal 主導、it→animal 的正確傾向保留）；縮放**改變了**最大者贏多少——從 0.867 拉回 0.665，把被 ch05 尖版壓掉的 street（0.117→0.245）、it（0.016→0.090）的發言權還回來。對訓練中的模型，這個「沒把話說死」的餘地就是梯度能流、能繼續學的空間。常見錯路：以為縮放會讓 it 改看 street——不會，縮放是對所有分數除同一正常數，不動排序。\n\n**第 2 題。**\n(a) 期望值：qᵢ、kᵢ 獨立且各期望值 0，所以 E[qᵢkᵢ]=E[qᵢ]E[kᵢ]=0·0=0。變異數：因期望值是 0，Var(qᵢkᵢ)=E[(qᵢkᵢ)²]=E[qᵢ²]E[kᵢ²]（獨立可拆）；而 E[qᵢ²]=Var(qᵢ)+E[qᵢ]²=1+0=1，kᵢ 同；故 Var=1·1=1。\n(b) 用了**獨立隨機變數的變異數可加性**（《馴服隨機》）：d 個彼此獨立、各變異數 1 的項相加，總變異數 = d×1 = d。\n(c) 變異數是 d ⇒ 標準差（典型尺度）是 √d。要把分數的**尺度**歸一回 1，得除以它的**標準差** √d（變異數 d/(√d)²=d/d=1）。若除以 d，標準差變成 √d/d=1/√d、變異數變 1/d——分數被壓得太小、太擠，softmax 趨近均勻分布，注意力「什麼都看一點、什麼都看不清」，一樣學不好（壞在另一端）。核心：要校正的是標準差不是變異數，所以是 √d 不是 d。\n\n**第 3 題。** softmax([16,8,0])：減最大值 16 → [0,−8,−16]；e⁰=1、e⁻⁸≈0.000335、e⁻¹⁶≈0.0000001；和≈1.000335；權重 ≈ **[0.99966, 0.00033, 0.0000]**——幾乎就是 one-hot [1,0,0]。當 animal 權重 p≈0.9997，softmax 的敏感度 ∝ p(1−p) ≈ 0.9997×0.0003 ≈ **0.0003**，是 p=0.5 時最大值 0.25 的約 1/800——梯度小到幾乎沒有。意味著：模型對「該怎麼調 W_Q、W_K 才能看得更準」幾乎收不到訊號，**這一層卡死、學不動了**。它在還沒驗證「看 animal 是對的」之前，就被尺度逼成 one-hot——這正是 √d 要防的事。\n\n**第 4 題。**\n(a) [40,20,0] 經 softmax 會壓成幾乎 **[1, 0, 0]**——A 獨吞流量，B、C 形同關閉，router 失去調節能力（B 從 20 漲到 39 都不會改變配比）。\n(b) 對應注意力的 **softmax 飽和**：分數尺度過大把 softmax 推進 one-hot，失去「混合」能力（且在模型裡同時造成梯度消失）。\n(c) 把分數除以一個能把尺度拉回正常的常數（這裡除以 10 就回到 [4,2,0]、配比回到能調節的 [0.867,0.117,0.016]）。在注意力裡，這個「該除多少」由維度決定，正規答案就是除以 √d——讓分數變異數歸一回 1。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 用一句話說 `/√d` 在三步骨架的哪個位置、動了什麼、**沒**動什麼（提示：打分與正規化之間的尺度校正，不動 Q/K/V、不動 softmax 本身、不改排序）。\n2. 為什麼內積 q·k 的變異數是 d？把「期望值 0 變異數 1 的獨立分量」這個前提，一路推到「變異數可加性 ⇒ 和的變異數 = d」。\n3. 為什麼是除以 √d 不是除以 d？（要校正標準差不是變異數；除 d 會把分布壓成均勻、壞在另一端。）\n4. softmax 飽和為什麼讓模型「學不動」？把「飽和 → p(1−p)→0 → 梯度→0 → 收不到學習訊號」這條鏈講順。\n5. 為什麼 √d 在 d=4 的脊椎裡只是「讓分布軟一點」，在 d=64 的真實模型裡卻是「生死線」？（分數尺度 ∝ √d，d=64 時膨脹 8 倍，不除直接飽和成 one-hot。）\n6. 「除以 √d 是為了防數值溢位」哪裡對、哪裡錯？（治不同的病：溢位用減最大值防；√d 防的是統計尺度造成的飽和。）\n7. 為什麼縮放不會改變「it 看哪裡（誰最大）」、只改變「最大者贏多少」？\n8. 為什麼說「過早的果斷對訓練中的模型是死亡」？這和 ch05 的「attention 是混合全部、不是挑一個」是同一件事的哪兩面？\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.2.1 與該節腳註**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：本章的原始出處。直接讀那段腳註——它就用三句話講完「q·k 變異數為 d_k、大 d_k 把 softmax 推進梯度極小區、故除 √d_k」。值得對照你自己的推導看原文多精簡。\n- **《馴服隨機》（機率統計）變異數可加性與 softmax 作為機率分布的章節**：本章變異數論證的地基（獨立和的變異數相加）就在那本；softmax 輸出是合法機率分布也在那本講過。本章只是把這兩個結論用在注意力上。\n- **《馴服無限》（微積分）梯度與鏈式法則的章節**：「梯度消失」的完整數學（softmax 的 Jacobian、p_i(1−p_i) 怎麼來、反向傳播怎麼把它乘進去）指向那本。本章只用「梯度小＝學不動」這個結論，不展開反向傳播。\n- **Dong et al. 2021「Attention is Not All You Need: Pure Attention Loses Rank Doubly Exponentially with Depth」**（arXiv 2103.03404，https://arxiv.org/abs/2103.03404 ）：本章末尾的鉤子。√d 治單層 softmax 的尺度，但純注意力疊深仍會秩坍縮——讀它了解為什麼還需要殘差與 FFN（ch13 接、ch19 詳述）。\n- **何時回來重讀**：當你在 ch16 看到 FlashAttention 的 online softmax「邊掃邊減 running max」時，回頭對照本章故障表第一列——你會發現「減最大值防溢位」和「除 √d 防飽和」是兩件被同一個 softmax 牽連、卻治不同病的事。\n"}, {"id": "ch07-self-attention", "file": "ch07-self-attention.md", "group": "Part II — 三步骨架：核心機制", "title": "ch07 — 自注意力：每個 token 都是一次查找（O(n²) 的源頭）", "md": "# ch07 — 自注意力：每個 token 都是一次查找（O(n²) 的源頭）\n\n> **本章解決什麼問題**：ch03 的 Bahdanau 注意力是「decoder 回頭看 encoder」——查的人和被查的人是兩群不同的 token。ch04–06 為了把三步骨架講清楚，只盯著一個查詢者：序章那個 it。但真正的 self-attention 有個更狠的設定：**句子裡每一個 token 都同時是查詢者、也是被查者，每個 token 都對全句做一次完整的查找**。這一章把脊椎從「只算 it 那一列」升級成「算完整的 3×3 注意力矩陣」，你會親眼看到那張 n×n 的方陣長出來——而 O(n²) 這個糾纏 transformer 一輩子的複雜度，就是從這張方陣的形狀直接讀出來的。本章不動三步骨架的任何一步，它動的是**規模**：把「一次查找」變成「n 次查找同時跑」，於是工作量從 n 變成 n²。\n\n## 從你已知的出發\n\n你做過這種事：手上有 N 筆資料，要找出「彼此最像的」配對。沒有索引、沒有預先排序，你能怎麼辦？老實的做法是雙重迴圈——拿第 1 筆比對其餘所有筆、第 2 筆比對其餘所有筆……一路到第 N 筆。這是 N×N 次比對，O(n²)。你在 code review 裡看到這種巢狀迴圈會皺眉，因為你知道資料一大它就爆。\n\nself-attention 做的就是這件事，而且做得更徹底：它不是「找最像的配對」，而是**讓每一筆資料都對其他所有資料算一次相似度，再按相似度把大家混合進自己**。N 筆資料、每筆對 N 筆算分，總共 N×N 個相似度分數——一張 n×n 的方陣。這張方陣就是注意力矩陣（attention matrix），也是本書後面整個 Part IV「為什麼是 O(n²)」要對付的東西。\n\n換個你更熟的角度：這像一個**沒有索引的 self-JOIN**。SQL 裡 `SELECT ... FROM t a JOIN t b ON ...`，如果 `ON` 條件能走索引（等值比對、可雜湊、可排序），查詢規劃器幫你把它降到接近 O(n log n) 甚至 O(n)。但 attention 的「ON 條件」是**相似度**——q 和 k 的內積要大。相似度不是等值、不可雜湊成桶、不能排序後二分查找（兩個向量「有多像」沒有全序關係可以建 B-tree）。所以這個 self-JOIN **建不了索引**，只能老老實實全表對全表比一遍。每對都要算，這就是 O(n²) 的根。\n\n> 這條「建不了索引的表」的線，《從後端到 AI Infra》ch03 從**推論的記憶體與物理成本**那一面講得很細（n×n 矩陣在 HBM 裡多大、怎麼被反覆讀）。本書接棒講**原理那一面**：為什麼這個機制在數學上必然是 n×n，以及這件事 ch14 之後會逼出哪些妥協。兩本講同一張表的兩個側面。\n\n在三步骨架裡，本章站在哪？答案有點特別——它哪一步都沒改：\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │ weighted sum │\n values ─────────────────────────────────────────┘\n                  │\n                  └─►【self-attention：把這三步同時對 n 個 query 各跑一遍】\n```\n\nch04–06 算的是「一個 query（it）跑完三步」。self-attention 是把**完全一樣的三步**，對序列裡的每一個 token 當 query 各跑一次。打分公式沒變、softmax 沒變、加權混合沒變——變的只是「跑幾次」。一個 query 跑出一個輸出向量；n 個 query 跑出 n 個輸出向量；而打分這一步，n 個 query 各對 n 個 key 算分，就攤開成一張 n×n 的分數表。三步骨架的形狀沒變，是它被**平行複製了 n 份**。本章的全部內容，就是看清這個「複製 n 份」帶來的後果。\n\n## self vs cross：誰在查、誰被查\n\n先把 ch03 和本章的差別釘死，因為這是 self-attention 名字裡那個「self」的全部含義。\n\nch03 的 Bahdanau 注意力，是翻譯場景：decoder 要生出一個中文詞，它的 query 去看 encoder 編好的英文 key/value。**查的人（query）來自目標序列，被查的人（key/value）來自源序列**——兩群是不同的 token。這叫 **cross-attention**（跨序列注意力，ch12 正式展開）。\n\nself-attention 把這件事收進**同一個序列內部**：\n\n```text\ncross-attention（ch03 Bahdanau、ch12）：\n   query  ← 來自序列 A（如中文目標端）\n   key/value ← 來自序列 B（如英文源端）\n   「A 的每個位置回頭看 B」\n\nself-attention（本章）：\n   query、key、value ← 全部來自同一個序列 X\n   「X 的每個位置回頭看 X 自己（包含自己）」\n```\n\n具體說，self-attention 拿同一批 token 的向量 X，用三個學來的投影矩陣 W_Q、W_K、W_V，**從同一個 X 算出 Q、K、V 三套**（landscape §2 §3.2.3 原文：encoder self-attention 的 Q/K/V 同源自前一層）。於是序列裡每個 token 都有三個身分同時在身上：\n\n- 當 **query** 時，它在問：「我（這個位置）該看序列裡的誰？」\n- 當 **key** 時，它在被別人衡量：「別的位置在找的東西，像不像我？」\n- 當 **value** 時，它準備好被取走：「如果有人決定看我，這是我要交出去的內容。」\n\n回到脊椎那句 *\"the animal didn't cross the street because **it** was too tired.\"* 簡化成 [animal, street, it]。在 ch04–06 我們只讓 it 當 query。但在真正的 self-attention 裡，animal 也是 query（它在問「我該看誰」）、street 也是 query、it 還是 query——**三個 token 同時各做一次查找**。同時，三個 token 也都是 key（被衡量）、都是 value（待取）。每個 token 一人分飾三角，這就是 self。\n\n> **這裡了不起／反直覺在哪**：ch04 把 attention 比喻成「軟性字典查找」，那時 query 是外來的查詢條件、字典是別人的。self-attention 把這個比喻擰了一圈——**字典查它自己**。序列裡的每個詞，既是查詢條件、又是被索引的鍵、又是存著的值。it 在查 animal 的同時，animal 也在查它自己該看誰、street 也在查它自己該看誰。一句話裡所有詞**同時、互相**地查找彼此，一次把全句的兩兩關係都算出來。你第一次意識到「查的人和被查的人是同一批」時，會覺得這個設定有點繞——但正是這個「自己查自己」，讓一個位置能根據**全句語境**重新理解自己，這是 RNN 那種「一個字一個字往後傳」做不到的。\n\n## 整張注意力矩陣：QKᵀ 是 n×n\n\n現在把「每個 token 都當一次 query」這件事寫成矩陣，那張 n×n 的方陣就會自己冒出來。\n\nch04 算單一 query 時，打分是 q · k 一個內積。現在有 n 個 query，把它們疊成一個矩陣 **Q**（n 列，每列是一個 token 的 query 向量，維度 d）；同理把 n 個 key 疊成 **K**（n 列、維度 d）。打分這一步，要算「每個 query 對每個 key 的內積」——這正好是矩陣乘法 **Q Kᵀ**（內積即相似度、矩陣乘法即批量內積，運算深度見《矩陣是動詞》ch06、ch15）：\n\n```text\n        Kᵀ 的欄 = 每個 token 當 key\n        ┌─ k_animal  k_street  k_it ─┐\n Q 的列 │                            │\n q_animal│  q_a·k_a   q_a·k_s   q_a·k_i│   ← animal 當 query 對三個 key 的分數\n q_street│  q_s·k_a   q_s·k_s   q_s·k_i│   ← street 當 query 的那一列\n q_it    │  q_i·k_a   q_i·k_s   q_i·k_i│   ← it 當 query（ch04–06 一直在算的就是這一列）\n        └────────────────────────────┘\n                  這是 QKᵀ：一張 n×n 的分數表\n```\n\n維度對一下就懂為什麼結果是 n×n：Q 是 n×d、Kᵀ 是 d×n，相乘消掉中間的 d，得到 **n×n**（web 查證：Q ∈ ℝ^{n×d} 乘 Kᵀ ∈ ℝ^{d×n}，結果 n×n，計算量 O(n²·d)，2026-06）。矩陣的第 (i, j) 格，就是「第 i 個 token 當 query、對第 j 個 token 當 key」的相似度分數。**n 個 query × n 個 key = n² 個分數**，一個都跑不掉。\n\n接著三步骨架照常走：整張 QKᵀ 除以 √d（ch06），對**每一列**各做一次 softmax（ch05 的正規化，逐列做，因為每個 query 各自要一個「和為 1 的權重分布」），最後每一列的權重去加權混合 V，得到每個 token 各自的輸出。完整公式還是那一行，只是現在 Q、K、V 都是矩陣：\n\n```text\nAttention(Q, K, V) = softmax(QKᵀ / √d) · V\n                     └──┬──┘ └──┬──┘\n                   n×n 分數表   逐列正規化     最後乘 V (n×d) 得 n×d 的輸出\n```\n\n注意這裡的關鍵轉折：在 ch04–06，softmax 是對「一排三個分數」做一次。在 self-attention，softmax 是**對 n×n 矩陣的每一列各做一次**——共 n 次 softmax，每次處理一列的 n 個分數。三步骨架沒變，只是「正規化」這一步從做一次變成做 n 次（每個 query 一次）。\n\n## 親手算脊椎的完整 3×3 矩陣\n\nch04–06 我們只填了這張表的**第三列**（it 當 query）。現在把三列都填滿，看完整的方陣。\n\n脊椎維度 d=4、√d=2，三個 key 是 k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)（基準向量）。\n\nit 那一列我們已經有了，是全書正典（ch06 釘下的）。但 animal 和 street 當 query 時，它們的 query 向量是多少？**基準表只定義了 q_it=(1,1,1,0,...)＝(1,1,1,1) 這一個 query 向量**（它是 it 經 W_Q 投影出來的）。為了不偽造全書脊椎，我在本章用兩個**僅供本章說明的輔助 query**（明確標示：這不是新的全書脊椎數字，只是為了把方陣填滿、看清形狀）：\n\n```text\n本章說明用輔助 query（非全書脊椎，僅本章）：\n  q_animal = (2, 0, 0, 0)   ← 讓 animal 主要關注「自己這類實體」\n  q_street = (0, 1, 1, 0)   ← 讓 street 在 animal/street 之間猶豫\n  q_it     = (1, 1, 1, 1)   ← 全書正典 query（基準表），這一列數字不可動\n```\n\n逐格算內積（打分），三列各算對三個 key 的分數：\n\n```text\nanimal 列（q_animal=(2,0,0,0)）：\n  q_a·k_animal = 2·2+0·1+0·1+0·0 = 4\n  q_a·k_street = 2·0+0·1+0·1+0·0 = 0\n  q_a·k_it     = 2·1+0·(−1)+0+0  = 2          → raw [4, 0, 2]\n\nstreet 列（q_street=(0,1,1,0)）：\n  q_s·k_animal = 0·2+1·1+1·1+0·0 = 2\n  q_s·k_street = 0·0+1·1+1·1+0·0 = 2\n  q_s·k_it     = 0·1+1·(−1)+1·0+0= −1         → raw [2, 2, −1]\n\nit 列（q_it=(1,1,1,1)，正典）：\n  q_i·k_animal = 1·2+1·1+1·1+1·0 = 4\n  q_i·k_street = 1·0+1·1+1·1+1·0 = 2\n  q_i·k_it     = 1·1+1·(−1)+1·0+1·0 = 0       → raw [4, 2, 0]   ← 和 ch04 一模一樣\n```\n\n整張原始分數矩陣 QKᵀ：\n\n```text\n              key:animal  key:street  key:it\nquery:animal     4           0           2\nquery:street     2           2          −1\nquery:it         4           2           0      ← 正典那一列\n```\n\n除以 √d=2，再逐列 softmax。把每一列當成 ch05/ch06 做過的事重算一遍：\n\n```text\nanimal 列：[4,0,2]/2 = [2, 0, 1]\n   e²=7.389, e⁰=1.000, e¹=2.718, 和=11.107\n   → [7.389/11.107, 1/11.107, 2.718/11.107] = [0.665, 0.090, 0.245]\n\nstreet 列：[2,2,−1]/2 = [1, 1, −0.5]\n   e¹=2.718, e¹=2.718, e^(−0.5)=0.607, 和=6.043\n   → [2.718/6.043, 2.718/6.043, 0.607/6.043] = [0.450, 0.450, 0.100]\n\nit 列：[4,2,0]/2 = [2, 1, 0]\n   e²=7.389, e¹=2.718, e⁰=1.000, 和=11.107\n   → [0.665, 0.245, 0.090]    ← 全書正典，和 ch06 完全吻合\n```\n\n完整的注意力權重矩陣（每一列和為 1）：\n\n```text\n              animal   street    it      這一列在說什麼\nquery:animal  0.665    0.090    0.245    animal 主要看自己（語境裡先確認「我是哪個實體」）\nquery:street  0.450    0.450    0.100    street 在 animal/street 間猶豫（軟、未定）\nquery:it      0.665    0.245    0.090    it 看 animal 最多 ← 序章的懸念在這裡被「算」出來\n```\n\n畫成 ASCII 熱圖（█ 最濃對應最大權重，往下到 ░ 最淡；看一列的濃淡分布，不看跨列比例）：\n\n```text\n              animal      street      it\nquery:animal  ███████     █░          ███\nquery:street  ████        ████        █░\nquery:it      ███████     ███         █░\n              ↑↑↑                      ↑\n        it 那一列在 animal 欄最濃——it→animal，序章的答案\n```\n\n讀這張熱圖：看 **it 那一列**（最下面），它在 **animal 欄**最濃（0.665），這就是序章一直懸著的問題——「it 指的是 animal 還是 street？」——被注意力機制**算**出來的答案：it 把最大的權重放在 animal 上。這不是誰規定的，是 q_it·k_animal=4 這個內積最大、經過縮放與 softmax 後自然贏出來的。ch04 算分、ch05 正規化、ch06 縮放，三章鋪墊就為了讓你現在看懂這一列為什麼長這樣。\n\n而旁邊兩列在說別的故事：animal 那列主要看自己（一個實體 token 先確認自身語境）；street 那列在 animal 和 street 之間五五開（0.450/0.450，一個「軟、還沒拿定主意」的分布——回想 ch06，分數越接近，softmax 越平）。**重點不是這兩列的具體數字**（它們用的是本章輔助 query），重點是：self-attention 一次把**全句每個位置該看哪裡**都算出來了，不只是 it 那一列。三列同時、平行算完，這就是 self-attention 的威力。\n\n如果你想看演算法骨架，ch06 那五行 numpy 一個字都不用改，差別只在餵進去的 Q 從「一個 query」變成「整個序列的 query 矩陣」：\n\n```python\nimport numpy as np\n\ndef self_attention(X, W_Q, W_K, W_V):\n    Q, K, V = X @ W_Q, X @ W_K, X @ W_V   # all from the SAME X — that's \"self\"\n    d = K.shape[-1]\n    scores = Q @ K.T / np.sqrt(d)          # (n, n) matrix — here O(n^2) is born\n    weights = softmax(scores, axis=-1)     # softmax over each ROW (per query)\n    return weights @ V                      # (n, d) — one output vector per token\n```\n\n`Q @ K.T` 那一行的輸出形狀是 `(n, n)`——O(n²) 就誕生在這一行。Q、K、V 全部來自同一個 `X`，這就是程式碼裡的「self」。把脊椎餵進去（X 是三個 token、W 是恰好投影出上面那些 q/k/v 的矩陣），`scores` 就是上面手算的那張除以 2 之後的表，`weights` 就是那張 3×3 權重矩陣，it 那一列印出來正是 `[0.665, 0.245, 0.090]`——和手算對得上。\n\n## 為什麼必然是 O(n²)：把方陣的格子數出來\n\n現在把複雜度從這張方陣直接讀出來，這是本章的硬核心。\n\n注意力矩陣是 n×n，**格子數就是 n²**。每一格要算一個 query 對一個 key 的內積（d 維，d 次乘加），所以打分這一步的總計算量是 n²·d 次基本運算——複雜度 **O(n²·d)**（web 查證：原始論文 Table 1 明列 self-attention per-layer 複雜度 O(n²·d)，2026-06）。在我們關心序列長度 n 怎麼吃成本時，d 是固定的模型超參數，主導項就是 **n²**。\n\n更要命的是**記憶體**：你得把這張 n×n 的分數表存下來才能做 softmax（softmax 要先知道整列才能正規化），所以空間也是 O(n²)（web 查證：儲存 n×n 注意力矩陣需要 O(n²) 記憶體，2026-06）。時間 O(n²)、空間 O(n²)，兩個都是平方。\n\n把脊椎那張 3×3 數一遍找感覺：n=3，格子數 = 3² = 9。九個內積。小到不痛不癢。但 n² 的脾氣是「一開始溫和、後面失控」。把序列拉長：\n\n```text\n   n（序列長度）   n²（注意力矩陣格數）      相對 n=512 的倍數\n   3                          9               —（脊椎玩具）\n   512                  262,144               1×（短句／一段話）\n   4,096             16,777,216              64×（一篇長文）\n   100,000       10,000,000,000            ~38,000×（一本書／長對話）\n   1,000,000  1,000,000,000,000           ~3,800,000×（超長 context）\n```\n\n讀這張表的方式：**context 長 10 倍，注意力成本變 100 倍**（10²）。從 512 拉到 4096（長 8 倍），成本變 64 倍（8²）。從一段話（n≈512）到一本書（n≈10萬），格子數從二十幾萬暴衝到一百億。這就是為什麼「長 context」在工程上這麼貴、為什麼 Part IV 整整三章都在想辦法不付這筆平方稅。\n\n對照 RNN（ch02 那個被注意力取代的舊世界）：RNN 一個字一個字處理，第 i 步只更新一個固定大小的隱藏狀態，總共 n 步——複雜度 **O(n)**，線性。看起來 RNN 在複雜度上完勝？不。代價藏在另一個維度：RNN 的 n 步必須**循序執行**（第 i 步要等第 i−1 步算完），無法平行；而 self-attention 的 n×n 矩陣可以**一次性平行算完**——每一格互不依賴，GPU 一口氣全算。\n\n原始論文 Table 1 把這個取捨講得很精準（web 查證，2026-06）：\n\n```text\n                 每層計算複雜度    循序操作數    最長路徑\n   self-attention   O(n²·d)         O(1)         O(1)\n   recurrent (RNN)  O(n·d²)         O(n)         O(n)\n```\n\n- **計算複雜度**：RNN 是 O(n·d²)（線性於 n），self-attention 是 O(n²·d)（平方於 n）。當 n < d 時 self-attention 反而更省（短序列、高維度，論文原話：句子表示時 n 通常小於 d）；但 n 一大，平方項就壓過一切。\n- **循序操作數**：self-attention O(1)（全部平行），RNN O(n)（必須一步步來）。這是 self-attention 之所以能餵飽 GPU、訓練飛快的根本原因——它用「平方的總工作量」換「常數的循序深度」。\n- **最長路徑**：任意兩個位置之間的資訊要走幾步才能互相影響。self-attention 是 O(1)（任兩個 token 直接在矩陣裡有一格相連，一步到位），RNN 是 O(n)（句首的資訊要經過 n 步才傳到句尾，路上一路衰減——這正是 ch02 講的長程依賴衰減）。\n\n> **這裡了不起／反直覺在哪**：O(n²) 常被當成 self-attention 的「原罪」「缺陷」，後面三章都在補救它。但請先看清它**買到了什麼**：那張 n×n 的方陣，意思是**任意兩個 token 之間都有一條直達的連線**，句首和句尾一步互通。RNN 為了省成 O(n)，代價是句首到句尾要走 n 步、訊號一路衰減；self-attention 願意付 O(n²)，換來的是「全句任兩點直接對話」。O(n²) 不是 bug，是這個機制**敢讓所有位置直接互看**的明碼標價。Part IV 之後所有的高效注意力，本質都在問同一個問題：**能不能少付一點這筆錢，又別丟掉太多「直達連線」？**——那是 ch14 起的故事。\n\n## 雙向：每個 token 看得到全句（包含未來）\n\nself-attention 的 3×3 矩陣裡，**每一格都有值**——animal 看得到 it、street 看得到 it、it 也看得到 animal 和 street。沒有任何一格被擋住。這叫**雙向（bidirectional）**：每個位置都能看序列的全部，左邊右邊都看（web 查證：encoder self-attention 中每個位置可關注前一層所有位置，雙向，2026-06）。\n\n用你的工程直覺：這像你能**同時讀到上下文兩邊**，不像 streaming 處理只能看已經流過的資料。it 在被解析時，左邊有 animal、street，右邊有 was、too、tired——雙向 self-attention 讓 it 把這些全看進來，於是「它累了」這個線索（在 it 右邊）也能幫忙確認「累的是會累的 animal、不是 street」。一次抓全句關係，這是雙向的威力。\n\n但這裡埋著一個**重大轉折的伏筆**，我先點明、ch11 才拆：雙向意味著 it 看得到它**右邊**還沒出現的詞。在「理解一整句」的場景（像 BERT 做填空、做分類）這完全沒問題——句子是現成的，當然兩邊都能看。但在**生成**場景就出大事了：模型一個字一個字往外吐，生第 i 個字時，第 i+1 個字**還不存在**，它怎麼可能「看到未來」？如果允許看未來，訓練時模型會作弊（直接抄答案），推論時又無未來可看，對不上。\n\n所以生成模型（GPT 那類）必須把這張矩陣的**上三角（看未來的那些格）擋掉**——這就是 ch11 的因果遮罩（causal mask）。本章先把話放這裡：**self-attention 的本性是雙向、全看；單向、只看左邊是後天用遮罩強加的限制。** 脊椎在這裡是雙向的（it 合法地看 animal、street，也看得到右邊），到 ch11 我們會把它改成「it 只能看左邊的 animal、street」，那個對稱會被打破——記住這個轉折。\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「self-attention 是某個位置去看別的位置，自己不看自己」 | 漏了對角線。矩陣的 (i,i) 格也有值——每個 query **包含自己**這個 key。it 那列裡 it→it 是 0.090，不是 0。一個 token 完全可以（也常常）把不少權重放在自己身上。 | 看矩陣對角線：它不是空的。self 的意思就是 query 集合＝key 集合，自己也在被查之列。 |\n| 「O(n²) 是因為要做 n 次 softmax / 因為有多頭」 | 抓錯源頭。O(n²) 純粹來自 **QKᵀ 產生 n×n 個分數**（n 個 query × n 個 key）。多頭（ch08）是把 d 切開平行做，不改 n²；softmax 是逐列做、總共 n 列 ×每列 n 項＝也是 n² 量級，但它是 QKᵀ 的後果不是獨立原因。 | 問：哪一步輸出了 n×n？是 QKᵀ。把那一步的輸出形狀寫出來就抓到 O(n²) 的根。 |\n| 「attention 矩陣是對稱的（i 看 j ＝ j 看 i）」 | 不對稱。第 (i,j) 格是 q_i·k_j，第 (j,i) 格是 q_j·k_i——因為 query 和 key 用**不同**投影（ch04「我找的≠我是的」），q_i·k_j ≠ q_j·k_i。脊椎裡 it→animal=0.665 但 animal→it=0.245，明顯不等。 | 比兩個對稱位置的格子：它們不相等。非對稱正是 Q≠K 的直接後果，這是 attention 比「相似度矩陣」更靈活的地方。 |\n| 「self-attention 是 O(n²) 所以一定比 O(n) 的 RNN 慢」 | 只看計算量、漏看平行性。self-attention 循序深度 O(1)（全平行），RNN O(n)（必須一步步來）。在 GPU 上、序列不太長時，self-attention 反而**快得多**——它用「平方的總量」換「常數的循序深度」，剛好對上平行硬體。 | 分開看兩個指標：總工作量 vs 循序深度。O(n²) 貴在工作量，但 O(1) 循序讓它能餵飽 GPU。慢不慢要看 n 多大、硬體多平行。 |\n| 「雙向（看全句）永遠比較好，為什麼還要遮罩」 | 把「理解」和「生成」混為一談。理解現成句子（BERT）當然雙向好；但生成是一個字一個字吐，生第 i 字時第 i+1 字不存在，看未來＝作弊＋推論對不上。 | 問這個任務「未來的 token 此刻存在嗎」。存在（整句現成）→ 可雙向；不存在（邊生邊看）→ 必須遮罩成單向（ch11）。 |\n| 「QKᵀ 那張 n×n 矩陣一定要先整個算出來、存進記憶體」 | 這是 O(n²) **空間**的來源，但**不是數學上的必然**——它是「先全算、再 softmax」這種樸素實作的後果。FlashAttention（ch16）證明可以**分塊算、邊算邊合併 softmax**，永遠不實體化整張 n×n，省的是空間不是精度（精確、非近似）。 | 記住：O(n²) 的**時間**很難繞過（分數對數就是 n²），但 O(n²) 的**空間**可以靠不實體化整張矩陣來省（ch16）。兩者是不同的帳。 |\n\n**和後面章節的鉤子**：這張 n×n 矩陣是全書下半本的主角。它太貴（O(n²)）→ ch14 把代價講透、ch15 用稀疏/線性「少算一些格或換掉 softmax」、ch16 用 FlashAttention「不實體化整張矩陣」；它看不見順序（重排 token 這張矩陣只是跟著重排，權重不變）→ ch09 必須外加位置編碼；它預設雙向 → ch11 用遮罩擋掉上三角換成單向。本章把這張表立起來，後面九章都在對它動手。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [18 分鐘]（★★）** 親手填滿脊椎的完整 3×3 注意力矩陣。用三個 key k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)、d=4、√d=2，以及本章輔助 query q_animal=(2,0,0,0)、q_street=(0,1,1,0)、q_it=(1,1,1,1)：(a) 算出 3×3 的原始分數矩陣 QKᵀ；(b) 整張除以 √d；(c) 對每一列各做一次 softmax（一步不跳，寫出每列的 e 次方、求和、相除）；(d) 確認 it 那一列等於全書正典 [0.665, 0.245, 0.090]；(e) 一句話說「為什麼要逐列 softmax 而不是對整張矩陣做一次 softmax」。\n\n**第 2 題 [12 分鐘]（★★）** O(n²) 從哪來、為什麼。(a) 不用算具體數字，說明 QKᵀ 的輸出形狀為什麼是 n×n（用 Q、Kᵀ 的維度推）；(b) 由此說明計算量為什麼是 O(n²·d)、記憶體為什麼是 O(n²)；(c) 對照 RNN 的 O(n)，解釋「為什麼 self-attention 計算量更大、卻常常更快」（提示：循序操作數 O(1) vs O(n)）。\n\n**第 3 題 [10 分鐘]（★★★）** 注意力矩陣的非對稱性。用脊椎，算 it→animal 的權重（你已經有：0.665）和 animal→it 的權重（用本章的 q_animal 算 animal 那列，取 it 欄）。(a) 兩者相等嗎？(b) 從「query 和 key 用不同投影」解釋為什麼第 (i,j) 格 ≠ 第 (j,i) 格；(c) 如果硬要讓矩陣對稱，要犧牲什麼（提示：回想 ch04「我找的≠我是的」）。\n\n**第 4 題 [10 分鐘]（★）** 把 O(n²) 對到你的後端直覺並估算。你有一個服務要對 n 筆進來的事件做「兩兩相關性比對」（沒有索引可用）。(a) n=1000 和 n=10000 時各要算幾次比對？(b) n 變 10 倍，成本變幾倍？(c) 把這個場景對到 self-attention 的哪一步，並說明「為什麼相似度比對建不了傳統索引」（一句話，預告 ch14）。\n\n### 推演解答\n\n**第 1 題。**\n(a) 逐格內積（已在正文逐步算過）：\n\n```text\n              animal  street  it\nquery:animal     4       0      2\nquery:street     2       2     −1\nquery:it         4       2      0\n```\n\n(b) 除以 √d=2：\n\n```text\n              animal  street   it\nquery:animal    2.0     0.0    1.0\nquery:street    1.0     1.0   −0.5\nquery:it        2.0     1.0    0.0\n```\n\n(c) 逐列 softmax：\n- animal 列 [2,0,1]：e²=7.389、e⁰=1.000、e¹=2.718，和=11.107 → [0.665, 0.090, 0.245]。\n- street 列 [1,1,−0.5]：e¹=2.718、e¹=2.718、e⁻⁰·⁵=0.607，和=6.043 → [0.450, 0.450, 0.100]。\n- it 列 [2,1,0]：e²=7.389、e¹=2.718、e⁰=1.000，和=11.107 → [0.665, 0.245, 0.090]。\n\n(d) it 列 = **[0.665, 0.245, 0.090]**，和 ch06 的全書正典完全吻合 ✓（每列也驗：和皆=1.000）。\n(e) 因為**每個 query 需要自己的一個「和為 1 的權重分布」**——animal 該怎麼分配注意力、it 該怎麼分配，是各自獨立的決定。對整張矩陣做一次 softmax 會把所有 query 的分數混在一起正規化，那就不是「每個 token 各自決定看哪裡」了。逐列＝每個查詢者各算各的預算。常見錯路：對欄做 softmax（那會變成「每個 key 被多少 query 看」的正規化，語義完全不同）。\n\n**第 2 題。**\n(a) Q 是 n×d（n 個 query、每個 d 維），Kᵀ 是 d×n。矩陣相乘 (n×d)·(d×n) 消掉中間的 d，得到 **n×n**——第 (i,j) 格是第 i 個 query 與第 j 個 key 的內積。\n(b) n×n 個分數、每個分數是 d 維內積（d 次乘加），總計算量 ∝ n²·d ⇒ **O(n²·d)**；做 softmax 前必須把整張 n×n 表存著（softmax 要先看完整列才能正規化），所以空間 ∝ n² ⇒ **O(n²)**。\n(c) self-attention 計算量 O(n²·d) 確實大於 RNN 的 O(n·d²)（當 n 大時），但 self-attention 的 n×n 每一格**互不依賴、可一次平行算完**（循序操作數 O(1)），而 RNN 的 n 步**必須循序**（第 i 步等第 i−1 步，循序操作數 O(n)）。在平行硬體（GPU）上，循序深度才是牆鐘時間的瓶頸——self-attention 用「平方的總工作量」換「常數的循序深度」，剛好對上平行硬體，所以常常更快。\n\n**第 3 題。**\n(a) it→animal = 0.665（it 列 animal 欄）；animal→it = 0.245（animal 列 it 欄）。**不相等**。\n(b) 第 (i,j) 格是 q_i·k_j，第 (j,i) 格是 q_j·k_i。因為 query 和 key 經過**不同**的投影矩陣（W_Q≠W_K），同一個 token 當 query 的向量和當 key 的向量不同，所以 q_it·k_animal（it 在找的 vs animal 是的）≠ q_animal·k_it（animal 在找的 vs it 是的）。兩個內積算的是兩件不同的事。\n(c) 要讓矩陣對稱，得逼 W_Q=W_K（query 投影＝key 投影），這樣 q_i·k_j 才會等於 q_j·k_i。但這就回到 ch04 講過的退化——「我找的」被迫等於「我是的」，每個 token 最像的永遠是自己（對角線最大），注意力失去「我在找一種我自己未必具備的東西」的表達力。非對稱是 Q≠K 換來的靈活性，不是缺陷。\n\n**第 4 題。**\n(a) n=1000：1000² = **1,000,000** 次比對；n=10000：10000² = **100,000,000** 次。\n(b) n 變 10 倍，成本變 **100 倍**（10²）——這就是平方成長。\n(c) 對應 self-attention 的**打分**步（算 QKᵀ）：每筆事件對每筆事件算一次相似度＝query 對 key 算內積，n×n。相似度比對建不了傳統索引，是因為 hash/B-tree 索引靠「鍵可雜湊或可排序」把查找降到 O(1)/O(log n)，但「兩個向量有多像」既不能雜湊成桶、也沒有全序可以二分——所以只能每對都算，逼出 O(n²)（ch14 詳述）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 用一句話說 self-attention 和 ch03 cross-attention 的差別（提示：query 和 key/value 是不是同源；「自己查自己」vs「查別群」）。\n2. 為什麼 QKᵀ 的輸出是 n×n？把 Q（n×d）和 Kᵀ（d×n）的維度相乘推一次給自己聽。\n3. O(n²) 到底是從哪一步、為什麼長出來的？（不是 softmax、不是多頭，是 QKᵀ 產生 n×n 個分數：n 個 query × n 個 key。）\n4. self-attention 計算量 O(n²) 比 RNN 的 O(n) 大，為什麼它在 GPU 上常常更快？（循序操作數 O(1) vs O(n)，用平方總量換常數循序深度。）\n5. 注意力矩陣為什麼**不**對稱？it→animal 和 animal→it 為什麼可以不相等？（Q≠K，q_i·k_j ≠ q_j·k_i。）\n6. 「雙向」是什麼意思、它買到了什麼、又埋了什麼伏筆？（每個位置看全句、任兩點直達；但生成時看未來＝作弊，ch11 要用遮罩擋掉。）\n7. 為什麼 self-attention 對每一列各做一次 softmax，而不是對整張矩陣做一次？（每個 query 各要一個和為 1 的權重分布、各自決定看哪裡。）\n8. O(n²) 的「時間」和「空間」是同一筆帳嗎？哪一個可以靠不實體化整張矩陣省下來？（時間 O(n²) 難繞過，空間 O(n²) 可靠 FlashAttention 分塊省，ch16。）\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.2.3 與 Table 1**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：本章兩個硬核心的原始出處。§3.2.3 講三種注意力裡 encoder self-attention 的 Q/K/V 同源、每個位置關注所有位置；Table 1 用一張表把 self-attention（O(n²·d)、循序 O(1)、路徑 O(1)）和 RNN（O(n·d²)、循序 O(n)、路徑 O(n)）並排——直接讀那張表，你會看懂「為什麼付 O(n²) 是划算的交易」。\n- **Jay Alammar「The Illustrated Transformer」**（https://jalammar.github.io/illustrated-transformer/ ）：脊椎那句「the animal didn't cross the street because it...」的視覺化普及來源（landscape §8：例子出自 Google 2017 部落格、經此文流傳，**非原論文**）。看它把 self-attention 的 QKᵀ 矩陣畫成熱圖，和本章的 3×3 對照——it 那一行在 animal 上最亮，就是本章手算的那一列。\n- **APXML「Computational Complexity of Self-Attention」**（https://apxml.com/courses/foundations-transformers-architecture/chapter-6-advanced-architectural-variants-analysis/self-attention-complexity ）：把 O(n²·d) 的時間與 O(n²) 的空間拆解得很清楚（QKᵀ 是 n×d 乘 d×n、結果 n×n），本章複雜度論證的對照讀物。讀它確認「n×n 矩陣」就是平方複雜度的唯一來源。\n- **《從後端到 AI Infra》ch03（一張建不了索引的表 / 推論物理）**：本章講「為什麼數學上是 n×n」，那本講「這張 n×n 在推論時的記憶體與頻寬成本（HBM 裡多大、怎麼被反覆讀）」。想知道 O(n²) 在真實硬體上怎麼變成牆，去那本；想知道為什麼相似度查找建不了索引，本書 ch14 接著講原理。\n- **《矩陣是動詞》ch06（矩陣乘法即批量內積）、ch15（內積即相似度）**：QKᵀ 為什麼是「每個 query 對每個 key 的內積一次算完」、為什麼結果形狀是 n×n，運算直覺在那兩章。本章把它們當工具直接用，不重推。\n- **何時回來重讀**：當你在 ch14 看到「O(n²) 在 100k context 下爆成一百億格」、在 ch16 看到 FlashAttention「不實體化整張 n×n」時，回頭看本章那張 n 與 n² 的成長表和故障表最後一列——你會更清楚「時間 O(n²)」和「空間 O(n²)」是兩筆要分開算的帳。\n"}, {"id": "ch08-multi-head", "file": "ch08-multi-head.md", "group": "Part II — 三步骨架：核心機制", "title": "ch08 — 多頭注意力：為什麼要很多顆頭", "md": "# ch08 — 多頭注意力：為什麼要很多顆頭\n\n> **本章解決什麼問題**：到 ch07 為止，我們有了完整的一次自注意力——每個 token 對全序列打分（ch04）、softmax 正規化（ch05）、除 √d 校正尺度（ch06）、整張 n×n 矩陣一次算完（ch07）。一切都對，但有個藏在 softmax 裡的限制沒人說破：一次注意力只能產出**一組**權重，也就是只能聚焦**一種**關係。it 想同時知道「誰是主詞」和「我這個代名詞指誰」這兩件不同的事，一組權重忙不過來。多頭注意力（multi-head attention）的全部用意就是這個——**並排跑很多次注意力，每一次在不同的子空間裡看一種關係，再把結果接起來**。本章只動三步骨架的一件事：把「打分→正規化→混合」這整套**複製成 h 份平行跑**，最後用一個投影把它們縫合。看懂它，你就明白為什麼真實 transformer 不是一顆大注意力、而是 8 顆、16 顆、64 顆小注意力並聯。\n\n## 從你已知的出發\n\n你查一筆資料時，常常不是只查一個維度。要找「某個使用者最近的高額訂單」，你不會只靠一個索引——你可能同時走 `user_id` 索引找出他的訂單、走 `created_at` 索引篩最近、走 `amount` 索引篩高額，三個索引各看資料的一個面向，最後把結果**交集／合併**起來。一個索引只擅長回答一種問題；要回答一個複合問題，你並排用好幾個專門化的索引。\n\n多頭注意力是同一個套路。一個 query 想知道的往往不是單一關係。回到脊椎——序章那個句子：\n\n> *\"the animal didn't cross the street because **it** was too tired.\"*\n\n代名詞 **it** 這個位置，到底想從別的詞身上得到什麼？至少兩件不同的事：\n\n- **句法上**：這句話的主詞是誰？（animal 是 didn't cross 的主詞，street 只是 cross 的受詞）——這影響 it 該怎麼當代名詞用。\n- **指代上**：it 指的是哪個先行詞？（語意上「累的」是動物不是街，所以 it→animal）——這是序章那個懸念本身。\n\n這是**兩種不同的相關性**。「誰是主詞」靠的是句法位置的線索，「我指誰」靠的是語意合理性的線索。它們未必看同一批維度、未必給出同一組權重。一顆頭、一個 softmax，只能算出**一組**「該看哪裡」的權重——它要嘛偏句法、要嘛偏指代，沒辦法同時是兩者。就像你不能用同一個索引同時回答「最近的」和「最高額的」——除非你並排用兩個。\n\n多頭注意力就是「並排用很多個」。它把表示空間切成幾塊（**子空間 subspace**），每一塊配一顆獨立的注意力頭，每顆頭在自己那塊空間裡跑完整的三步骨架、看一種關係，最後把各頭的結果**concat（接起來）**、再過一個投影縫合。在三步骨架裡，多頭不新增第四步——它是把整套三步**橫向複製 h 份**：\n\n```text\n                ┌─[頭 1: 打分→softmax→混合]─┐\n 同一批         ├─[頭 2: 打分→softmax→混合]─┤\n token  ──────► ├─[頭 3: 打分→softmax→混合]─┤──► concat ──► W_O ──► 輸出\n 的 Q/K/V       │           ⋮               │\n                └─[頭 h: 打分→softmax→混合]─┘\n                  每顆頭各有自己的 W_Q/W_K/W_V，在不同子空間看一種關係\n```\n\n口訣不變：相關性決定權重、權重決定混合。多頭只是說——**一種相關性不夠，我要同時算好幾種**。\n\n## 一顆頭為什麼不夠：softmax 的單焦點限制\n\n先把問題說精確。為什麼「一顆頭只能看一種關係」不是一句口號，而是 softmax 的數學性質？\n\n回想 ch05–ch06：一顆頭對 it 這個 query，算出對 [animal, street, it] 三個 key 的分數，softmax 成一組權重——脊椎的正典是 **[0.665, 0.245, 0.090]**（縮放後）。這組權重是**一個機率分布**：非負、和為 1。它代表「我這次注意，把多少比例的目光分給每個位置」。\n\n關鍵在於：**它只有一組**。一個分布，一個峰。當這組權重把 0.665 押在 animal 上，它就已經做出了選擇——它是一個「以語意/某種綜合相關性挑出 animal」的分布。如果同一個 it 還想要另一組權重（比方說一組純看句法、把目光押在「動詞 cross 的主詞位置」上的權重），這顆頭給不出來。它的輸出是**用這一組權重**對 value 做加權平均，混出來就是一個向量。一旦混完，「我是看句法看到 animal、還是看語意看到 animal」的區別就被平均掉了——你只拿到一個結果向量，看不出它是循哪條線索來的。\n\n這正是原始論文那句話的意思。Vaswani 等人 2017 §3.2.2 寫得很直白（2026-06 覆核原文）：\n\n> *\"Multi-head attention allows the model to jointly attend to information from different representation subspaces at different positions. With a single attention head, averaging inhibits this.\"*\n\n「**With a single attention head, averaging inhibits this**」——單一顆頭，那個加權**平均**的動作本身，會把多種子空間的資訊壓成一個，互相抵銷、糊在一起。注意這裡的 *averaging* 指的就是三步骨架第三步「加權混合」：一次混合只產出一個向量，多種關係被攤平成一個。\n\n> **這裡了不起／反直覺在哪**：限制不在「頭不夠大」，而在 **softmax 只能輸出一個分布、混合只能產出一個向量**。你給一顆頭再多維度，它還是只能算一組權重、混出一個結果。要同時表達多種注意模式，唯一的辦法是**多算幾次**——不是把頭做大，是把頭做多。這就是為什麼解法叫 multi-**head**（多頭）而不是 bigger-head（大頭）。\n\n工程類比：你有一個 `GROUP BY` 查詢，一次只能 group by 一個維度組合、得到一張匯總表。想同時要「按使用者匯總」和「按地區匯總」兩張表，你不會把一個 `GROUP BY` 寫得更複雜——你跑兩個查詢。多頭就是跑 h 個查詢，每個 group by 不同的東西。\n\n## 機制：切子空間、平行跑、concat、過 W_O\n\n把機制拆成四個動作，每個都對應你已經懂的東西。設模型的表示維度是 d_model，要切成 h 顆頭。\n\n**動作一：每顆頭把 Q/K/V 投影到一個較小的子空間。** ch04 講過，Q/K/V 是 token 向量經學來的投影矩陣 W_Q/W_K/W_V 得到的。多頭只是讓**每顆頭各有一組自己的 W_Q^i/W_K^i/W_V^i**，把 d_model 維的輸入投影到較小的 **d_k = d_model / h** 維。原始 Transformer：d_model=512、h=8、所以 d_k = d_v = 512/8 = **64**（landscape §2）。每顆頭在自己這 64 維的子空間裡工作。\n\n**動作二：每顆頭在自己的子空間裡跑完整的三步骨架。** 第 i 顆頭拿自己投影出的 Q^i、K^i、V^i，做一次標準的縮放點積注意力——打分（Q^i K^iᵀ）、除 √d_k、softmax、混合 V^i。注意縮放的分母是 **√d_k = √64 = 8**（不是 √d_model）——因為每顆頭實際工作的維度是 d_k，ch06 的變異數論證（內積變異數 = 維度）算的是這顆頭的子空間維度。每顆頭吐出一個 d_v = 64 維的輸出向量。\n\n```text\nhead_i = Attention(Q W_Q^i,  K W_K^i,  V W_V^i)\n       = softmax( (Q W_Q^i)(K W_K^i)ᵀ / √d_k ) · (V W_V^i)\n         └────────────── 就是 ch04–ch06 那一整套，只是在第 i 個子空間裡 ──────────────┘\n```\n\n**動作三：把 h 顆頭的輸出 concat（接起來）。** h 顆頭各吐 d_v 維，接成一個 h × d_v = 8 × 64 = 512 維的長向量。concat 純粹是「把 8 段接成一段」，沒有任何計算，就像你把 8 個查詢結果拼進同一筆記錄的 8 個欄位。\n\n**動作四：過一個輸出投影 W_O 縫合。** concat 出來的長向量再乘一個學來的矩陣 W_O，投回 d_model = 512 維。W_O 的作用是**讓各頭的資訊互相溝通、混成最終表示**——concat 只是把各頭並排放著，W_O 才決定「綜合這幾顆頭，最後寫進這個 token 的表示是什麼」。完整公式（Vaswani 2017 §3.2.2，2026-06 覆核）：\n\n```text\nMultiHead(Q, K, V) = Concat(head_1, …, head_h) · W_O\n  其中 head_i = Attention(Q W_Q^i, K W_K^i, V W_V^i)\n\n維度（原始 Transformer）：\n  W_Q^i, W_K^i ∈ ℝ^(512 × 64)      ← 把 512 維投到 64 維子空間\n  W_V^i        ∈ ℝ^(512 × 64)\n  W_O          ∈ ℝ^(8·64 × 512) = ℝ^(512 × 512)   ← 把 concat 的 512 維縫回 512 維\n```\n\n在三步骨架的座標上：多頭把整套「打分→正規化→混合」複製成 h 份平行跑（動作一、二），再用 concat＋W_O 把 h 個結果縫成一個（動作三、四）。它**沒有**動三步骨架的任何一步的內部——每顆頭裡的打分、softmax、混合都和單頭一模一樣。它動的是**外層的並聯結構**。\n\n### 一個漂亮的免費午餐：多頭幾乎不花額外成本\n\n這是多頭設計裡最容易被忽略、卻最值得停下來算一次的事。直覺上你會以為「跑 8 次注意力＝8 倍成本、8 倍參數」。**錯，幾乎一樣。** 因為每顆頭的維度被砍到 d_k = d_model/h，剛好把「頭數變多」抵銷掉。\n\n算參數量（先把 bias 項略過不計，抓主幹）。設維度 d。\n\n```text\n單頭、用滿 d_model 維：\n  W_Q, W_K, W_V 各是 d × d，加上 W_O 是 d × d\n  → 4 d²\n\n多頭、h 顆頭、每顆 d_k = d/h：\n  每顆頭 W_Q^i/W_K^i/W_V^i 各是 d × (d/h)，三個共 3·d·(d/h)\n  h 顆頭：h × 3·d·(d/h) = 3 d²\n  W_O 是 (h·d_v) × d = (h·d/h) × d = d × d = d²\n  → 3d² + d² = 4 d²\n```\n\n**4d²，兩邊一模一樣。** 用原始數字代入（d=512、h=8、d_k=64）：兩種算法都是 4 × 512² = 1,048,576 個參數（我已用 Python 核對相等）。多頭不是「多花 8 倍買 8 顆頭」，而是「把同一筆參數預算，從一顆笨重的大頭，重新切成 8 顆各看一個面向的專門小頭」。同樣的道理，計算量（FLOPs）也大致不變：8 顆頭各在 64 維上跑、合起來等於一顆頭在 512 維上跑的量級。\n\n> **這裡了不起在哪**：多頭幾乎是免費的——你用同樣的參數和算力，把「一種注意」換成「八種注意」。代價只有 concat 與 W_O 那一點點，而換來的是表達力的質變。這是深度學習裡少見的「結構上的好設計直接買到能力」的例子，不是靠堆更多參數硬換的。\n\n## 紙上推演前的 worked example：脊椎的兩顆頭\n\n把脊椎的 4 維拆成 **2 顆頭 × 2 維**，親手看兩顆頭怎麼各看一種關係。這是把 ch06 那一顆單頭，改成兩顆並聯。\n\n**先聲明這是構造出來的玩具。** 真實模型的 W_Q/W_K/W_V 是訓練學出來的，我們沒有；這裡我**直接給每顆頭已經投影好的 2 維 q/k/v**，目的是讓你看清「兩顆頭給出兩組不同權重、各偏一種關係」的機制，不是宣稱真實模型恰好長這樣。維度 d_k = 2，所以每顆頭縮放的分母是 **√d_k = √2 ≈ 1.414**（ch06 的論證套在 2 維子空間上）。\n\n脊椎 query 是 q_it=(1,1,1,1)（ch04 基準）。把它的前兩維給頭 A、後兩維給頭 B：q_it^A=(1,1)、q_it^B=(1,1)。三個 key 也各自有頭 A／頭 B 兩個 2 維分量（這就是「兩顆頭看不同子空間」的具體含義）：\n\n```text\n            頭 A 的 key（句法子空間）   頭 B 的 key（指代子空間）\n  animal         (2,  1)                    (1,  1)\n  street         (0,  1)                    (0, −1)\n  it             (1, −1)                    (1,  0)\n```\n\n### 頭 A：抓「誰是主詞」\n\n頭 A 的 query q^A=(1,1)，對三個 key 算內積（打分），再除 √d_k=√2：\n\n```text\n打分（內積 q^A · k^A）：\n  animal: (1,1)·(2, 1) = 1·2 + 1·1 = 3\n  street: (1,1)·(0, 1) = 1·0 + 1·1 = 1\n  it    : (1,1)·(1,−1) = 1·1 + 1·(−1) = 0\n                                       頭 A 原始分數 [3, 1, 0]\n\n÷ √d_k = ÷√2 ≈ ÷1.414：\n  [3/1.414,  1/1.414,  0] ≈ [2.121,  0.707,  0]\n```\n\nsoftmax（一步不跳；e 的次方取到三位）：\n\n```text\ne^2.121 ≈ 8.342\ne^0.707 ≈ 2.028\ne^0     = 1.000\n                和 = 8.342 + 2.028 + 1.000 = 11.370\n\n  animal: 8.342 / 11.370 = 0.734\n  street: 2.028 / 11.370 = 0.178\n  it    : 1.000 / 11.370 = 0.088\n                                 頭 A 權重 [0.734, 0.178, 0.088]（核：和=1.000 ✓）\n```\n\n頭 A 把 **0.734** 的目光押在 animal——很果斷地認定「主詞是 animal」。\n\n### 頭 B：抓「it 指代誰」\n\n頭 B 用**另一個子空間**的 key（上表右欄），同樣的 query 分量 q^B=(1,1)，但因為 key 不同，打出的分數完全不同：\n\n```text\n打分（內積 q^B · k^B）：\n  animal: (1,1)·(1, 1) = 1 + 1  =  2\n  street: (1,1)·(0,−1) = 0 + (−1) = −1\n  it    : (1,1)·(1, 0) = 1 + 0  =  1\n                                       頭 B 原始分數 [2, −1, 1]\n\n÷ √2 ≈ ÷1.414：\n  [2/1.414,  −1/1.414,  1/1.414] ≈ [1.414,  −0.707,  0.707]\n```\n\nsoftmax：\n\n```text\ne^1.414  ≈ 4.113\ne^−0.707 ≈ 0.493\ne^0.707  ≈ 2.028\n                和 = 4.113 + 0.493 + 2.028 = 6.634\n\n  animal: 4.113 / 6.634 = 0.620\n  street: 0.493 / 6.634 = 0.074\n  it    : 2.028 / 6.634 = 0.306\n                                 頭 B 權重 [0.620, 0.074, 0.306]（核：和=1.000 ✓）\n```\n\n頭 B 也偏 animal（0.620），但**權重的形狀完全不同**：它幾乎完全不看 street（0.074，因為 street 在指代子空間裡和 it 不相容，分數是負的），卻給了 it 自己不小的份（0.306）。對照頭 A 的 [0.734, 0.178, 0.088]——同樣是「偏 animal」，兩顆頭循著截然不同的線索得到結論，這正是「不同子空間看不同關係」。\n\n> 誠實標示：兩顆頭最後都偏向 animal，是我刻意這樣構造的（脊椎的主線就是 it→animal）。真實模型裡，很多頭根本不指向 animal——有的看相鄰位置、有的看標點、有的看罕見詞（這是 ch20/ch21 的內容，Voita 2019、Clark 2019 查證過）。重點不是「每顆頭都看 animal」，而是「**每顆頭算出一組獨立的權重、看一種關係**」。\n\n### concat 與 W_O：把兩顆頭縫起來\n\n每顆頭用自己的權重對自己的 value 做加權混合。給兩顆頭都用脊椎 value 的 2 維版 v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)（為了和全書 value 一致；真實模型每頭有自己的 W_V）：\n\n```text\n頭 A 輸出 = 0.734·(1,0) + 0.178·(0,1) + 0.088·(1,1)\n         = (0.734+0.088,  0.178+0.088) = (0.822, 0.266)\n\n頭 B 輸出 = 0.620·(1,0) + 0.074·(0,1) + 0.306·(1,1)\n         = (0.620+0.306,  0.074+0.306) = (0.926, 0.380)\n```\n\nconcat（接起來，零計算）：\n\n```text\nConcat(頭A, 頭B) = (0.822, 0.266,  0.926, 0.380)    ← 4 維\n                    └─頭A的2維─┘  └─頭B的2維─┘\n```\n\n最後過 W_O（在脊椎玩具裡 d_model=4，concat 也是 4 維；為了看清結構，我們先取 W_O = 單位矩陣 I，即「不混、直接通過」）：\n\n```text\nMultiHead 輸出 = Concat(頭A, 頭B) · W_O = (0.822, 0.266, 0.926, 0.380)\n                                          （W_O=I 時原樣通過）\n```\n\n對照 ch06 的單頭正典輸出 **(0.755, 0.335)**——那是一個 2 維向量、混的是「一種綜合相關性」。多頭給出的是一個 **4 維**向量，前兩維帶著「頭 A 怎麼看主詞」、後兩維帶著「頭 B 怎麼看指代」。同一個 it，現在它的表示同時編碼了兩條線索，而不是被攤平成一個。真實模型的 W_O 不會是單位矩陣——它會把這 4 維重新線性組合，讓兩顆頭的資訊交流、產出最終要寫進 it 這個位置的表示。但 concat 已經保住了關鍵：兩種關係沒被互相平均掉。\n\n如果你想看演算法骨架，多頭就是「對每顆頭跑一次 ch06 那五行、再 concat」：\n\n```python\nimport numpy as np\n\ndef multi_head(Q, K, V, WQ, WK, WV, WO, h):\n    # WQ/WK/WV: lists of per-head projection matrices; WO: output projection\n    heads = []\n    for i in range(h):\n        Qi, Ki, Vi = Q @ WQ[i], K @ WK[i], V @ WV[i]   # project into head i's subspace\n        heads.append(scaled_dot_product_attention(Qi, Ki, Vi))  # ch06's five lines, per head\n    return np.concatenate(heads, axis=-1) @ WO          # concat heads, then mix with W_O\n```\n\n每顆頭裡的 `scaled_dot_product_attention` 就是 ch06 那個函式，原封不動。多頭不過是「迴圈跑 h 次、concat、過 W_O」。程式和上面手算對得上：餵進脊椎兩顆頭的投影，concat 出的就是 (0.822, 0.266, 0.926, 0.380)。\n\n## 為什麼是「不同子空間」而不是「同一空間跑很多次」\n\n有個自然的疑問：如果只是想要多組權重，何必把維度切小、各給不同投影？直接在**同一個 d_model 維空間**裡跑 h 次注意力、每次用不同的 W_Q/W_K/W_V，不也能得到 h 組權重嗎？\n\n能，但那樣會貴 h 倍（每顆頭都用滿 d_model 維，參數和算力都是 h 倍），而且實證上沒必要。多頭的設計精髓正是「**切子空間**」這個取捨：\n\n- **把 d_model 切成 h 塊**，每顆頭只在自己那塊 d_k = d_model/h 維裡工作。這逼著每顆頭**專門化**——它沒有足夠維度去同時表達所有關係，只能挑一個面向學好。約束反而是好事：它讓不同頭自然分工，而不是 h 顆頭學成一模一樣。\n- **總成本守恆**（前面算過的 4d²）。切子空間讓「頭變多」和「每頭變小」精確抵銷，所以你用一份預算買到多種注意。\n\n換句話說，多頭不是「把注意力做 h 遍」，而是「把一個 d_model 維的注意力，**重新切分**成 h 個低維注意力的並聯」。維度沒有變多，只是被重新分配給了不同的專門功能。這和你做容量規劃時「與其開一台超大機器跑所有服務，不如切成幾台各跑專門服務」是同一種智慧——切分帶來專門化，總資源不變。\n\n至於每顆頭實際學到了什麼關係（句法頭、指代頭、位置頭、罕見詞頭…），那是訓練的結果、也是可解釋性的研究對象。Voita 等人 2019（「Analyzing Multi-Head Self-Attention」，arXiv 1905.09418，landscape §6 查證）發現：訓練好的模型裡，少數「重要的頭」扛起大部分工作、且常有可辨認的語言學角色（位置、句法依存、罕見詞），其餘大量頭可以剪掉——他們在英俄 WMT 上把 48 顆 encoder 頭剪掉 38 顆，BLEU 只掉 0.15。這既證明了「頭確實會專門化分工」，也預告了一個張力：頭很多，但不是每顆都同等重要（ch20 會深入「頭是否可剪、是否可解釋」，ch21 會把單顆頭拆成 QK/OV 電路）。本章只需要你抓住機制：**多頭＝多種專門化的注意並聯**。\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「多頭＝把一顆大注意力跑 h 遍，所以貴 h 倍」 | 算錯成本。每顆頭的維度被砍到 d_k = d_model/h，總參數仍是 4d²、算力也大致不變。多頭是**重新切分**一份預算，不是加倍買。 | 自己算一次參數：單頭 4d²、多頭 3d²(投影)+d²(W_O)=4d²。相等。多頭幾乎免費。 |\n| 「每顆頭都看同一個地方（都指向 animal）」 | 把脊椎玩具當通則。我刻意讓兩顆頭都偏 animal 是為了配合主線；真實模型多數頭看別處（位置、標點、罕見詞，Voita 2019）。 | 記住重點是「每顆頭算**一組獨立權重、看一種關係**」，不是「都看同一處」。看真實模型的注意力熱圖會發現各頭形狀差很多。 |\n| 「頭越多一定越好」 | 邊際遞減且有冗餘。Voita 2019：48 頭剪到 10 頭只損 0.15 BLEU——大量頭是冗餘的。頭數是個要權衡的超參數，不是越多越強。 | 別把「h 大」當銀彈。h 是設計選擇（原始 h=8）；過多頭只是浪費、不會等比例變強。 |\n| 「concat 會把各頭的資訊混在一起」 | concat **不混**，它只是把 h 段並排接成一段（零計算）。真正讓各頭資訊交流的是後面的 **W_O**。 | 分清楚：concat＝拼接（保留各頭獨立），W_O＝縫合（讓各頭溝通）。少了 W_O，各頭就只是並排堆著。 |\n| 「縮放要除 √d_model」 | 在多頭裡縮放的分母是 **√d_k**（每顆頭的子空間維度），不是 √d_model。ch06 的變異數論證算的是這顆頭實際工作的維度。 | 原始 Transformer：d_k=64 → √d_k=8（不是 √512≈22.6）。每顆頭在自己的 d_k 維裡縮放。 |\n| 「多頭解決了一切，所以一層只要多頭就夠」 | 多頭給的是「多種注意」，但純堆注意力（即使多頭）會**秩坍縮**（Dong 2021，ch13/ch19）——輸出退化。還需要殘差與 FFN。 | 多頭是一層裡的一個零件，不是全部。ch13 會把多頭裝進完整的一層 block（配殘差、LayerNorm、FFN）。 |\n\n**和後面章節的鉤子**：多頭讓「同一個 it 同時被多種關係看」，但每顆頭看到的權重形狀差很大，這直接引出兩個後續問題——(1) 這些頭各自在看什麼？某些頭恰好對應句法/指代等可辨認角色（ch20 的可解釋性論戰：頭有角色，但這算不算「解釋」？）；(2) 怎麼把一顆頭的職責拆得更乾淨？Anthropic 把每顆頭拆成 **QK 電路**（決定看哪裡）與 **OV 電路**（決定搬什麼），脊椎的「it→animal 指代頭」會在 ch21 被畫成一個具體電路。本章先把「多頭在分什麼工」這層直覺打穩。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [12 分鐘]（★）** 親手把脊椎兩顆頭算完整。給頭 A 的 key（animal=(2,1)、street=(0,1)、it=(1,−1)）、頭 B 的 key（animal=(1,1)、street=(0,−1)、it=(1,0)），兩顆頭的 query 都是 (1,1)，d_k=2、√d_k=√2≈1.414：(a) 算頭 A 的原始分數、除 √2、softmax 得權重；(b) 對頭 B 做同樣三步；(c) 用 value v_animal=(1,0)、v_street=(0,1)、v_it=(1,1) 算兩顆頭各自的輸出向量；(d) concat 成最終 4 維向量（取 W_O=I）。一句話說：兩顆頭都偏 animal，但它們的**權重形狀**哪裡不同、各自在說什麼。\n\n**第 2 題 [10 分鐘]（★★）** 用 softmax 的性質解釋「為什麼一顆頭的 softmax 限制了它只能聚焦一種模式」。提示：(a) 一顆頭的輸出是用「一組」權重對 value 做的「一次」加權平均；(b) 這組權重是一個機率分布（和為 1）；(c) 引用 Vaswani 2017「averaging inhibits this」這句話，說清楚「averaging」指三步骨架的哪一步、它抹掉了什麼。\n\n**第 3 題 [12 分鐘]（★★）** 手算把 d=4 拆成 2 顆頭後的維度與參數量，並驗證「多頭幾乎不花額外成本」。(a) 每顆頭的 d_k 是多少？(b) 每顆頭的 W_Q^i 是幾乘幾的矩陣、多少參數？三個投影（W_Q/W_K/W_V）一顆頭共多少？兩顆頭共多少？(c) W_O 是幾乘幾、多少參數？(d) 多頭總參數量是多少？對照「單頭用滿 d=4」的 4d² 是多少？相等嗎？\n\n**第 4 題 [8 分鐘]（★★）** 設計題。針對脊椎句子 *\"the animal didn't cross the street because it was too tired\"*，舉出**三種**你會希望模型擁有的「頭」，各說明它該看哪種關係、對 it 這個位置該把權重押在哪裡。提示：想想句法（主詞/受詞）、指代（先行詞）、位置（相鄰詞）、語意角色（誰累了）這些不同面向。\n\n### 推演解答\n\n**第 1 題。**\n(a) 頭 A 原始分數：(1,1)·(2,1)=3、(1,1)·(0,1)=1、(1,1)·(1,−1)=0 → **[3, 1, 0]**；÷√2 → [2.121, 0.707, 0]；softmax：e^2.121≈8.342、e^0.707≈2.028、e^0=1.000，和=11.370 → **[0.734, 0.178, 0.088]**（和=1.000 ✓）。\n(b) 頭 B 原始分數：(1,1)·(1,1)=2、(1,1)·(0,−1)=−1、(1,1)·(1,0)=1 → **[2, −1, 1]**；÷√2 → [1.414, −0.707, 0.707]；softmax：e^1.414≈4.113、e^−0.707≈0.493、e^0.707≈2.028，和=6.634 → **[0.620, 0.074, 0.306]**（和=1.000 ✓）。\n(c) 頭 A 輸出 = 0.734·(1,0)+0.178·(0,1)+0.088·(1,1) = **(0.822, 0.266)**；頭 B 輸出 = 0.620·(1,0)+0.074·(0,1)+0.306·(1,1) = **(0.926, 0.380)**。\n(d) concat = **(0.822, 0.266, 0.926, 0.380)**（W_O=I 原樣通過）。\n形狀差異：兩顆頭都把最大權重給 animal（0.734 vs 0.620），但頭 A 把次多的份給了 street（0.178），幾乎不理 it（0.088）——像在「比較三個名詞誰是主詞」；頭 B 幾乎不看 street（0.074，因為在它的子空間裡 street 與 it 不相容、分數為負），反而給了 it 自己 0.306——像在「以 it 自身為基準找最相容的先行詞」。同一個偏向、兩條不同線索，這就是「不同子空間看不同關係」。常見錯路：以為兩顆頭只是把同一組分數算兩遍——不是，key 不同（不同子空間），分數從根本就不同。\n\n**第 2 題。**\n(a) 一顆頭跑完三步骨架，輸出是「**用這一組** softmax 權重對 value 做的**一次**加權平均」，結果是**一個**向量。\n(b) 這組權重 softmax 出來是一個機率分布（非負、和為 1），它已經把「目光怎麼分配」鎖死成一種分配方式——一個峰、一種焦點。想要另一種焦點（另一組權重），這顆頭給不出第二組。\n(c) Vaswani 2017 的「averaging」指的就是三步骨架第三步「**加權混合**」。一次混合把多種潛在的關係（句法的、指代的…）攤平成一個輸出向量，彼此抵銷、無法區分——「averaging inhibits this」。要保住多種關係，唯一辦法是先**分頭算出多組權重、多個混合結果**，最後才 concat 縫合——這正是多頭。\n\n**第 3 題。**（d=4、h=2）\n(a) d_k = d_model/h = 4/2 = **2**。\n(b) W_Q^i 是 d_model × d_k = 4 × 2 = **8** 個參數；三個投影（W_Q/W_K/W_V）一顆頭共 3×8 = 24；兩顆頭共 2×24 = **48**。\n(c) W_O 是 (h·d_v) × d_model = (2×2) × 4 = 4 × 4 = **16** 個參數。\n(d) 多頭總計 48 + 16 = **64**。單頭用滿 d=4 是 4d² = 4×16 = **64**。**相等** ✓。多頭把同一筆 64 個參數，從「一顆 4 維大頭」重切成「兩顆 2 維小頭＋一個縫合矩陣」，能力變強、成本不變。\n\n**第 4 題（範例答案，合理即可）。**\n- **句法/主詞頭**：看「誰是動詞 cross/tired 的主詞」。對 it 該把權重押在 animal（主詞）多於 street（cross 的受詞）。\n- **指代/共指頭**：看「代名詞 it 的先行詞是哪個名詞」。靠語意合理性（「累的」配「動物」），權重押 animal。\n- **相鄰/位置頭**：看「我左邊緊鄰的詞是什麼」。對 it 可能押在 because 或 tired 上——這種頭不解指代，但提供局部上下文（ch09 會講位置，ch20/Voita 提到確有「位置頭」）。\n（其他合理答案：標點頭、罕見詞頭、語意角色頭等。關鍵是每顆頭看**一種**關係。）\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 用一句話說多頭在三步骨架的哪個位置、動了什麼（提示：把整套「打分→正規化→混合」橫向複製 h 份平行跑，再 concat＋W_O 縫合；不動任何一步的內部）。\n2. 為什麼「一顆頭只能看一種關係」？把它連到「softmax 只輸出一個分布、混合只產出一個向量、averaging inhibits this」。\n3. 多頭的四個動作各是什麼（切子空間投影 → 各頭跑三步骨架 → concat → 過 W_O），其中哪一步是零計算的拼接、哪一步才讓各頭資訊交流？\n4. 為什麼說「多頭幾乎不花額外成本」？把參數量算給另一個工程師聽：單頭 4d² vs 多頭 3d²+d²。\n5. 多頭裡縮放除的是 √d_k 還是 √d_model？為什麼？（每顆頭實際工作維度是 d_k，ch06 變異數論證算的是子空間維度。）\n6. 為什麼要「切子空間」而不是「在同一個 d_model 維空間裡跑 h 次」？（切子空間逼出專門化、且總成本守恆。）\n7. Voita 2019「48 頭剪 38 只損 0.15 BLEU」說明了關於多頭的什麼兩件事？（頭會專門化分工；但頭有冗餘、不是每顆同等重要——頭數是要權衡的超參數。）\n8. concat 和 W_O 的分工是什麼？少了 W_O 會怎樣？（concat 並排保留各頭獨立、W_O 縫合讓各頭溝通；少 W_O 各頭就只是堆著、無法綜合。）\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.2.2 Multi-Head Attention**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：多頭的原始出處。直接讀那半頁——MultiHead 公式、「different representation subspaces」與「averaging inhibits this」那句、h=8/d_k=64 的超參數，以及「reduced dimension of each head 使總成本與單頭相當」的成本論證。對照本章你自己算的 4d²。\n- **Voita et al. 2019「Analyzing Multi-Head Self-Attention: Specialized Heads Do the Heavy Lifting, the Rest Can Be Pruned」**（arXiv 1905.09418，https://arxiv.org/abs/1905.09418 ）：本章「頭會專門化、但有冗餘」的證據來源。讀它了解「位置頭/句法頭/罕見詞頭」這些可辨認角色，以及「48 剪 38 只損 0.15 BLEU」的剪枝實驗——這也是 ch20「頭是否可解釋」論戰的彈藥。\n- **《矩陣是動詞》（線性代數）投影與子空間的章節（其 ch16）**：本章「把 d_model 切成 h 個子空間、各做一個投影」用的是投影的直覺。本章只用結論（投影＝把向量壓進一個較低維的子空間看一個面向），運算深度（投影矩陣、值域/核）指向那本。\n- **Jay Alammar「The Illustrated Transformer」多頭那一節**（https://jalammar.github.io/illustrated-transformer/ ）：把脊椎句子（就是序章那個 it）的多頭注意力畫成彩色熱圖，能直觀看到「不同顏色的頭，注意力形狀不一樣」。配本章手算一起看，圖與數字互相印證。\n- **何時回來重讀**：當你在 ch21 看到 Anthropic 把一顆頭拆成 QK 電路（看哪裡）與 OV 電路（搬什麼）時，回頭看本章——你會發現本章的「頭 A 看主詞、頭 B 看指代」其實就是在說每顆頭有自己的 QK 模式，ch21 把它形式化成電路。\n"}, {"id": "ch09-positional-encoding", "file": "ch09-positional-encoding.md", "group": "Part III — 補上缺的零件", "title": "ch09 — 位置編碼：集合沒有順序這個洞", "md": "# ch09 — 位置編碼：集合沒有順序這個洞\n\n> **本章解決什麼問題**：Part II 我們把三步骨架（打分→正規化→加權混合）整個拆乾淨了——QKV、softmax、√d、自注意力矩陣、多頭分工。但這套機制有一個你可能還沒察覺的、致命的洞：它**看不見順序**。把 [animal, street, it] 重排成 [it, street, animal]，每個 token 拿到的注意力權重一模一樣。本章證明這件事不是 bug 而是 attention 的本質——它對輸入的處理方式是「集合」不是「序列」（嚴格的理論版留 ch19）。看清這個洞，才會懂為什麼非得「外加」一塊位置資訊不可，以及原始 Transformer 那組漂亮的正弦位置編碼到底在補什麼。RoPE 怎麼用旋轉把這件事做得更漂亮，留 ch10。\n\n```text\nPart I 注意力解決什麼問題    Part II 三步骨架：核心機制    Part III 補上缺的零件\nch01 該看哪裡（序章）        ch04 Query/Key/Value         ch09 位置編碼 ◄你在這裡\nch02 固定向量的瓶頸      →   ch05 softmax：該看哪裡    →   ch10 RoPE 與相對位置\nch03 第一次注意 Bahdanau     ch06 為什麼除以 √d            ch11 遮罩：只能看過去\n                            ch07 自注意力與 O(n²)         ch12 交叉注意力與三型\n                            ch08 多頭注意力               ch13 一整層到一整個模型\n                                                               │\n                                                               ↓\nPart VI 看進黑盒與未來      Part V 理論身世             Part IV 為什麼是 O(n²)\nch20 注意力是解釋嗎     ←   ch17 即核迴歸           ←   ch14 二次方瓶頸\nch21 QK/OV 與 induction     ch18 即聯想記憶 Hopfield     ch15 稀疏與線性注意力\nch22 注意力之外 SSM/Mamba    ch19 即集合運算             ch16 FlashAttention/KV 共享\nch23 總收官：同一個 it      ★ 三步骨架貫穿全書          ★＝打分→正規化→混合\n```\n\n到這裡，你應該已經能把三步骨架背起來：query 對每個 key 打分（內積）、softmax 正規化成和為 1 的權重、用權重混合所有 value。ch07 還畫出了完整的 n×n 注意力矩陣，ch08 讓多顆頭各看一個子空間。一切看起來很完整。\n\n但有一件事，前面五章從頭到尾**沒有出現過**：序列裡每個 token 的「位置」。\n\n回頭翻 ch04 到 ch08 任何一條公式——QKᵀ、softmax、加權混合 V——裡面有任何一個項目代表「animal 在第幾個位置、it 在第幾個位置」嗎？沒有。我們算 it 對 animal 的分數時，用的是 q_it 和 k_animal 兩個向量做內積，從頭到尾**沒有一個地方告訴模型「animal 在 it 前面好幾個字」**。\n\n這不是我偷懶漏掉了。這是 attention 機制**結構性**的缺口。本章就是要把這個缺口攤開來看清楚，然後看人們怎麼補它。\n\n## 從你已知的出發\n\n你天天在處理「有沒有順序」這個區別，只是沒特別命名它。\n\n想想你手上幾種資料結構。一個 `Array`（或 `List`）：`[a, b, c]` 和 `[c, b, a]` 是**不同**的東西，順序是它身分的一部分——你能 `arr[0]`、能 `slice`、能說「第三個元素」。但一個 `Set`（集合）：`{a, b, c}` 和 `{c, b, a}` 是**同一個** set，問它「第三個元素是誰」根本沒有意義，因為 set 不記順序。同理 hash map 的 key 集合、Redis 的一堆 key、一個 `SELECT` 沒帶 `ORDER BY` 撈回來的 result set——這些本質上都是**無序的袋子**，順序要嘛不存在，要嘛不保證。\n\n現在問你一個工程問題：**如果你有一個只吃 Set 的函數，但你需要它知道元素的先後順序，你會怎麼辦？**\n\n你不會去改 Set 的定義（Set 就是無序的，這是它的本性）。你會做的是——**給每個元素貼一個顯式的順序欄位**。一個 `index`、一個 `seq_no`、一個 `timestamp`、一個 `created_at`。你把「順序」這個原本不存在的資訊，當成一塊額外的資料，**手動塞進每個元素裡**。之後就算這些元素被丟進無序的容器、被任意重排，你仍然能靠那個欄位把順序還原出來。\n\n```text\n  無序的袋子（Set）          貼上順序戳記後\n  ──────────────          ──────────────────\n  { animal,                { (animal, pos=0),\n    street,        ──►       (street, pos=1),\n    it }                     (it,     pos=2) }\n  問「第幾個」沒意義          現在每個元素自帶位置\n```\n\n**這正是位置編碼（positional encoding）在做的事，一字不差。** 等一下你會看到，self-attention 處理輸入的方式，本質上就是「把序列當成一個無序的袋子」。它需要順序資訊，但它的運算裡天生沒有順序的概念。所以工程上的解法跟你會做的一模一樣：**在每個 token 進入注意力之前，給它的向量蓋上一個「位置戳記」**，把「它排在第幾個」這件事，編碼成數字、塞進向量裡。\n\n差別只在於戳記長什麼樣。你貼的是一個整數 `pos=2`；模型不能直接吃整數（後面會說為什麼），所以它貼的是一個跟 embedding 同維度的**向量**——而怎麼設計這個向量，就是本章後半的主題，也是接到 ch10 RoPE 那條漂亮路線的起點。\n\n## 那個洞：self-attention 看不見順序\n\n先把洞挖出來看。我用脊椎那個 it，做一次最直接的實驗：**把句子裡 token 的順序打亂，看 it 拿到的注意力權重會不會變。**\n\n回收 ch06 宣告的全書正典脊椎數字（縮放後）。三個 token 的 key、value，以及 it 的 query：\n\n```text\n  q_it = (1, 1, 1, 1)\n\n  k_animal = (2,  1, 1, 0)      v_animal = (1, 0)\n  k_street = (0,  1, 1, 0)      v_street = (0, 1)\n  k_it     = (1, -1, 0, 0)      v_it     = (1, 1)\n\n  d = 4,  √d = 2\n```\n\n**原本的順序 [animal, street, it]。** it 對三個 key 打分（內積），除以 √d=2，softmax：\n\n```text\n  打分（內積 q_it·k）        ÷√d=2      softmax\n  ─────────────────         ──────     ──────────────────\n  q_it·k_animal = 4    →     2.0    →   0.665   ← 看 animal 最重\n  q_it·k_street = 2    →     1.0    →   0.245\n  q_it·k_it     = 0    →     0.0    →   0.090\n```\n\n（softmax 算法：e²=7.389、e¹=2.718、e⁰=1，和 11.107；7.389/11.107=0.665、2.718/11.107=0.245、1/11.107=0.090。這是 ch06 的正典那一組，全書通用。）\n\n加權混合 value，輸出 ≈ (0.755, 0.335)，偏向 v_animal=(1,0) 的方向。一切正常，這就是前幾章那個結果。\n\n**現在把順序倒過來，排成 [it, street, animal]。** 注意：我只是改了三個 token 排列的先後，**每個 token 自己的向量完全沒動**——animal 還是那個 k_animal=(2,1,1,0)、v_animal=(1,0)，只是現在它排在第三個。it 的 query 也沒變，還是 (1,1,1,1)。重算一次：\n\n```text\n  新順序   打分              ÷√d=2     softmax\n  ──────   ───────────       ─────     ───────\n  it       q_it·k_it=0    →   0.0   →   0.090\n  street   q_it·k_street=2 →  1.0   →   0.245\n  animal   q_it·k_animal=4 →  2.0   →   0.665   ← 還是看 animal 最重\n```\n\n看出來了嗎？權重整排只是**跟著 token 一起換了位子**：animal 仍然拿 0.665、street 仍然 0.245、it 自己仍然 0.090。it 給 **animal** 的權重，在兩種順序下**都是 0.665，一模一樣**。加權混合出來的輸出，**也是同一個 (0.755, 0.335)**——位元級相同（我用 Python 對過，兩個輸出完全相等）。\n\n換句話說：**把 animal 放在 it 前面，還是放在 it 後面，attention 給的答案完全沒差。** 模型對「animal 到底排在 it 的左邊還是右邊」這件事，**毫無感覺**。\n\n這就是那個洞。讓我把它講到底為什麼會這樣。\n\n### 為什麼必然如此：分數只看「向量配對」，不看「位置」\n\nit 對 animal 的分數是 q_it · k_animal。這個內積只跟**兩個向量本身**有關——q_it 的四個分量、k_animal 的四個分量，乘一乘加起來。它**根本沒有一個輸入端口**接收「animal 排第幾」這個資訊。你把 animal 移到哪裡，k_animal 這個向量都不變，所以 q_it · k_animal 永遠是同一個數。\n\nsoftmax 也救不了。softmax 吃一排分數、吐一排和為 1 的權重，它對「分數的順序」是無所謂的——`softmax([4,2,0])` 和 `softmax([0,2,4])` 出來的數值集合是一樣的，只是跟著重排。最後的加權混合，是「權重 × 對應的 value」相加，加法本身可交換（`a+b = b+a`），所以混合的結果跟你用什麼順序把它們加起來無關。\n\n三步骨架**每一步**都對順序無感：\n\n```text\n  1. 打分     score(q, kⱼ) = q·kⱼ    只看向量配對，與 j 排第幾無關\n  2. 正規化   softmax(...)          重排分數→重排權重，集合不變\n  3. 加權混合 Σⱼ αⱼ vⱼ              加法可交換，順序無所謂\n```\n\n三步全都過不了「順序」這一關，所以整個 attention 過不了。這不是哪一步沒寫好，是這個機制從骨子裡就是這樣設計的。\n\n### 給這個性質一個正確的名字：置換等變\n\n這個性質有一個精確的名字，本書全程用它：**置換等變（permutation equivariant）**。\n\n「等變」的意思是：**你怎麼重排輸入，輸出就怎麼跟著重排，內容不變。** 用上面的實驗講：我把輸入從 [animal, street, it] 重排成 [it, street, animal]，輸出的那一排向量也就**對應地**重排了——animal 那個位置算出來的輸出向量，跟著 animal 跑到第三個位置去；但它的**數值**沒變。沒有任何資訊因為重排而改變或消失，順序的調換被「原封不動地搬過去」了。\n\n寫成式子（直覺版，嚴格證明在 ch19 用置換矩陣 P 寫成 `SelfAttention(PX) = P · SelfAttention(X)`）：\n\n```text\n  把輸入序列重排 → 輸出序列就照同一種方式重排，每個位置算出的向量不變\n  「等變」：排列作用在輸入上 = 排列作用在輸出上\n```\n\n有一個更狠的特例：如果你不在乎輸出的順序、只把它們聚合起來（比如全部相加、或取某一個固定 query 對它們的混合），那連重排都看不出來了——這叫**置換不變（permutation invariant）**。上面 it 那個 query 的輸出 (0.755, 0.335) 在兩種順序下完全相同，就是不變的展現：因為 it 這個 query 不管 animal 排哪，混合出來都一樣。\n\n> **這裡反直覺在哪**：你大概一直以為 Transformer「理解語言」，而語言顯然是有順序的——\"dog bites man\" 和 \"man bites dog\" 意思天差地遠。但你剛剛親手算出來：**裸的 self-attention 分不出這兩句**。把 token 重排，它眼皮都不眨。所以 Transformer 能讀懂語序，**不是因為 attention 本身懂順序**——attention 一點都不懂——而是因為**有人在 token 進 attention 之前，先偷偷把位置資訊塞了進去**。這塊「塞進去」的東西，就是這一章的主角。少了它，Transformer 就是一台讀「詞袋（bag of words）」的機器。\n\n為什麼 attention 會被設計成這樣？因為 ch07 講過，self-attention 是「每個 token 對所有 token 算一遍」的全連接運算——它把序列當成一個**所有元素彼此平等、沒有先後**的集合來處理。這正是它能完全平行、一次抓全句關係（對照 RNN 必須一步一步循序）的代價：它丟掉了 RNN 天生自帶的「我是一步一步讀過來的，所以我知道誰先誰後」。RNN 的順序資訊藏在「處理的時序」裡，attention 沒有時序，於是順序資訊也就沒地方藏了。\n\nattention 是集合運算這件事，理論上的嚴格版（Set Transformer、置換等變的形式證明）留到 ch19——那時你會看到本章這個「洞」其實是 attention 深層身分的一個面向，而不只是個工程小麻煩。本章只需要你抓住結論：**裸 attention 看不見順序，順序必須外加。**\n\n## 怎麼補：把「位置」變成一個向量加進去\n\n洞看清楚了，補法的思路就很直接，跟你給 Set 元素貼 `seq_no` 一模一樣：**在 token 的 embedding 進入 attention 之前，給它加上一個代表位置的向量。**\n\n注意動詞是「**加**」——逐元素相加。設 token 在第 pos 個位置，它的詞嵌入是 x（一個 d 維向量），位置編碼是 PE(pos)（也是一個 d 維向量），那麼真正送進第一層 attention 的，是：\n\n```text\n  輸入 = embedding(token) + PE(pos)\n         ─────────────────   ───────\n         「我是什麼字」        「我排第幾」\n         （內容，學出來的）    （位置戳記）\n```\n\n這樣一來，原本只攜帶「我是 animal」的向量，現在同時攜帶了「我是 animal，而且我排在第 0 個位置」。等它去算內積、被別人打分時，位置資訊就一起參與了運算——animal 排在 it 前面還是後面，現在會體現在它的向量上，分數就會不同。洞補上了。\n\n馬上有兩個合理的疑問，先擋掉：\n\n**疑問一：為什麼是「加」，不是「接（concat）」？** 直覺上，把位置資訊接在 embedding 後面（拼成更長的向量）似乎更乾淨——內容歸內容、位置歸位置，井水不犯河水。確實有人這樣做。但原始 Transformer 選擇「加」，務實的理由是：加法不增加維度（concat 會讓向量變長、後面所有矩陣都得跟著變大、參數變多），而且模型有足夠的容量在訓練時自己學會「從這個混在一起的向量裡，把內容和位置該怎麼用拆開來用」。這是「夠用就好」的工程取捨，不是什麼深刻定理。\n\n**疑問二：直接塞一個整數 pos=0、1、2 不就好了？** 不行，而且這個「為什麼不行」很值得想清楚——它直接決定了位置編碼該長什麼樣：\n\n- **數值範圍會爆**。pos 可以從 0 跑到幾千、幾萬。把一個 0~50000 的大整數加進每個分量都是 ~O(1) 的 embedding 向量裡，這個位置項會直接**淹掉**內容項——模型還沒看清你是什麼字，就先被「你排第 38274 個」這個巨大的數字壓垮了。\n- **不好泛化到沒見過的長度**。如果訓練時只見過 pos 到 512，模型對 pos=5000 這個從沒出現過的巨大整數會手足無措。\n- **「絕對位置」不如「相對關係」有用**。對語言來說，真正重要的常常不是「it 在第 11 個字」這種絕對座標，而是「it 距離 animal 有幾步」這種**相對**關係。一個光禿禿的整數很難讓模型輕鬆算出相對距離。\n\n所以一個好的位置編碼，至少要：**數值有界**（不會淹掉內容）、**每個位置唯一**（不能兩個位置撞成一樣，否則模型分不出）、**能讓模型方便地推出相對位置**、**最好能外推到比訓練更長的序列**。原始 Transformer 的正弦位置編碼，就是衝著這幾條設計的。\n\n## 正弦位置編碼：用一堆不同頻率的波，給每個位置一個指紋\n\n原始 Transformer（Vaswani et al. 2017，arXiv 1706.03762，§3.5；2026-06 對照 landscape）的做法，是用 sin 和 cos 函數，**直接算出** PE(pos)——不是學出來的，是一條固定公式（這點和下一節要對照的「可學習位置」很不同）。公式長這樣：\n\n```text\n  PE(pos, 2i)   = sin( pos / 10000^(2i / d_model) )    ← 偶數維用 sin\n  PE(pos, 2i+1) = cos( pos / 10000^(2i / d_model) )    ← 奇數維用 cos\n```\n\n符號拆開：`pos` 是 token 在序列裡的位置（0, 1, 2, …）；`d_model` 是向量維度（原始論文 512）；`i` 跑 `0` 到 `d_model/2 - 1`，把維度兩兩配對（第 0、1 維一對，第 2、3 維一對……），每一對由同一個頻率的一組 sin/cos 組成。\n\n公式裡那個 `10000^(2i/d_model)` 是**頻率控制鈕**。當 i=0，分母是 `10000^0 = 1`，頻率最高（波長最短，sin/cos 變得最快）；當 i 變大，分母指數成長到 10000，頻率最低（波長最長，sin/cos 變得最慢）。也就是說，**不同的維度對（i）用不同的波長去「看」位置**，波長從 2π 一路幾何級數地拉長到 10000·2π（2026-06 查證，與原論文一致）。\n\n這招的直覺，借用你熟的東西：**這就是二進位**。一個整數的二進位表示，最低位（bit 0）每加 1 就翻一次（高頻），次低位每 2 次翻一次，更高位翻得更慢（低頻）——用一排「不同翻動速度的位元」就能唯一表示任何整數。正弦編碼是它的連續、平滑版：用一排「不同擺動速度的正弦波」，給每個位置一個獨一無二的**指紋**。低頻維度像高位元，粗略地標出「大概在序列哪一段」；高頻維度像低位元，精細地標出「在這一小段裡的確切位置」。\n\n來算給你看。為了能手算，把 d_model 縮到 4（真實是 512，但機制一樣），這樣只有兩對維度：i=0（分母 10000⁰=1，高頻）和 i=1（分母 10000^(2/4)=10000^0.5=100，低頻）。算前幾個位置：\n\n```text\n  維度索引：     0          1          2           3\n  公式：      sin(pos/1)  cos(pos/1)  sin(pos/100) cos(pos/100)\n            （i=0 高頻）          （i=1 低頻）\n\n  pos=0:    sin(0)=0.0000  cos(0)=1.0000  sin(0)=0.0000   cos(0)=1.0000\n  pos=1:    sin(1)=0.8415  cos(1)=0.5403  sin(0.01)=0.0100 cos(0.01)=1.0000\n  pos=2:    sin(2)=0.9093  cos(2)=−0.4161 sin(0.02)=0.0200 cos(0.02)=0.9998\n  pos=3:    sin(3)=0.1411  cos(3)=−0.9900 sin(0.03)=0.0300 cos(0.03)=0.9996\n```\n\n（這幾個值我用 Python 算過：sin(1)≈0.8415、cos(1)≈0.5403、sin(2)≈0.9093、cos(2)≈−0.4161、sin(3)≈0.1411、cos(3)≈−0.9900；低頻那對因為 pos/100 還很小，sin 約等於 pos/100、cos 約等於 1，幾乎沒動。）\n\n看這張表，幾件事一目了然：\n\n- **每個位置的四個數合起來是獨一無二的**——沒有兩列長得一樣，所以模型能靠這個向量分辨位置。這滿足「每個位置唯一」。\n- **數值全部落在 [−1, 1]**，因為 sin/cos 本來就有界。它不會像光禿禿的整數那樣淹掉 embedding。這滿足「數值有界」。\n- **高頻那對（維度 0、1）在相鄰位置就明顯變化**（pos 0→1→2，sin 從 0 跳到 0.84 再到 0.91），負責精細定位；**低頻那對（維度 2、3）幾乎不動**（都還在 0.0x 和 0.99~1.00），它要到 pos 很大時才會明顯轉起來，負責粗略定位。高低頻分工，正是「二進位」那個直覺。\n\n把這四個數加到 token 的 embedding 上，這個 token 就帶著它的位置指紋進 attention 了。\n\n### 為什麼用 sin/cos：相對位置變成一個線性關係\n\n正弦編碼最被稱道的性質——也是原論文選它而非可學習版本的明說理由之一——是：**對任何固定的偏移量 k，PE(pos+k) 可以寫成 PE(pos) 的一個線性函數。**\n\n意思是：「位置 pos」和「位置 pos+k」這兩個編碼之間的關係，**只跟偏移量 k 有關，跟 pos 本身是多少無關**。位置 5 到位置 8（差 3）的編碼變換，和位置 100 到位置 103（差 3）的編碼變換，是**同一個**線性變換。這正是「相對位置」的數學體現——模型只要學會「差 k 步對應哪個變換」，就能在序列任何地方判斷兩個 token 相差幾步。\n\n為什麼？因為 sin/cos 有那組你高中背過的和角公式（這也是《圓的影子》ch05 旋轉的核心）：\n\n```text\n  sin(θ + φ) = sin θ · cos φ + cos θ · sin φ\n  cos(θ + φ) = cos θ · cos φ − sin θ · sin φ\n```\n\n把 θ = pos·ω（ω 是某個頻率）、φ = k·ω 代進去，你會發現 PE(pos+k) 的那一對 (sin, cos) 分量，恰好是 PE(pos) 那一對分量乘上一個**只由 k·ω 決定的 2×2 矩陣**——而那個矩陣，正是一個**旋轉矩陣**。換句話說：在每一對維度構成的平面上，「位置往前 k 步」=「把那個 (sin, cos) 向量旋轉一個固定角度 k·ω」。旋轉的角度只看 k，不看你從哪個 pos 出發。\n\n我用上面 d=4 的高頻那對（ω=1）數值驗一次，取 pos=1、k=2，看 PE(3) 是不是 PE(1) 的線性（旋轉）變換：\n\n```text\n  和角公式：\n  sin(3) = sin(1+2) = sin1·cos2 + cos1·sin2\n                    = 0.8415·(−0.4161) + 0.5403·0.9093\n                    = −0.3502 + 0.4913 = 0.1411  ✓（= 上表 sin(3)）\n\n  cos(3) = cos(1+2) = cos1·cos2 − sin1·sin2\n                    = 0.5403·(−0.4161) − 0.8415·0.9093\n                    = −0.2248 − 0.7652 = −0.9900  ✓（= 上表 cos(3)）\n```\n\n對得上。PE(3) 確實是 PE(1) 經過一個「轉 2·ω 角度」的線性變換得來的，而這個變換只認 k=2，不認起點 pos=1。\n\n> 把這句話記牢，因為它是 ch10 的種子：**「位置往前 k 步」在正弦編碼裡 = 「旋轉一個只由 k 決定的角度」。** 正弦編碼是把這件事**加在 embedding 上**間接達成的；RoPE（ch10）的洞見是——既然相對位置的本質是旋轉，那何不**直接旋轉 query 和 key**，讓內積天生只剩相對角度差？那是全書最漂亮的跨書接點（接《圓的影子》的旋轉與複數），這裡先埋下伏筆。\n\n順帶補一條原論文宣稱的好處：因為 sin/cos 是對所有 pos（包括訓練時沒見過的大 pos）都算得出來的確定函數，正弦編碼**理論上可以外推到比訓練更長的序列**——你給 pos=5000，公式照樣吐一個合法的向量。（實務上裸正弦的外推效果有限，這條路通往 ALiBi、RoPE、Position Interpolation/YaRN 等後續工作；ch10 接手。本章只說原論文當初的動機。）\n\n## 另一條路：可學習的絕對位置（BERT / GPT-2）\n\n正弦編碼是「算出來的」（一條固定公式，無參數）。但你應該已經在想：既然其他東西（embedding、投影矩陣）全是學出來的，**位置為什麼不也讓模型自己學**？\n\n確實有，而且是另一條主流路線——**可學習的絕對位置嵌入（learned absolute positional embedding）**。做法簡單到近乎偷懶：再開一張查找表，叫**位置嵌入表**，第 0 個位置一個可訓練向量、第 1 個位置一個、第 2 個……每個位置一行，跟詞嵌入表長得一模一樣，只是查的索引從「token id」換成「位置 pos」。訓練時這些向量跟著梯度一起被調出來。用的時候照樣是「embedding(token) + 位置嵌入(pos)」加進去。\n\n```text\n  詞嵌入表（查 token id）        位置嵌入表（查 pos，可學習）\n  ─────────────────             ──────────────────────────\n  \"animal\" → [ ... ]            pos 0 → [ ... ]  ← 訓練學出\n  \"street\" → [ ... ]            pos 1 → [ ... ]  ← 訓練學出\n  \"it\"     → [ ... ]            pos 2 → [ ... ]  ← 訓練學出\n                                  ...\n```\n\n**BERT**（Devlin et al. 2018，arXiv 1810.04805）和 **GPT-2**（2019）走的都是這條（2026-06 對照 landscape §3 與獨立查證確認）。它的優缺點是清楚的工程取捨：\n\n| | 正弦（固定公式） | 可學習絕對位置 |\n|---|---|---|\n| 參數 | 0（無參數） | 每個位置一個向量（佔參數） |\n| 哪一步動了 | 都在「打分」前，改 query/key 的向量 | 同左 |\n| 相對位置 | 天生線性可推（和角公式） | 不天生，要模型自己從資料學 |\n| 外推到更長序列 | 公式照算（理論上可，實務有限） | **不行**——pos=5000 那一行根本沒被訓練過，是隨機初始值 |\n| 採用 | 原始 Transformer | BERT、GPT-2、GPT-3 |\n\n最值得記的是**最後一條**：可學習絕對位置有一個硬限制——**它只認得訓練時見過的位置**。位置嵌入表只開到訓練的最大長度（比如 512），第 513 行根本不存在；就算硬開出來，那一行從沒被任何資料訓練過，是個隨機向量，模型對它一無所知。所以用可學習絕對位置的模型，context 長度是**寫死的上限**，想變長只能重訓。正弦編碼至少在公式上沒這個牆（雖然實務外推也不理想）。這個「外推」痛點，正是 ch10 那一連串工作（RoPE、ALiBi、YaRN）要解的核心。\n\n有意思的補充（2026-06 查證）：後來有研究發現，**可學習絕對位置在訓練後，常常自己長成類似正弦波的結構**——模型沒人教，居然自己摸索出了「不同頻率的週期波」這個好點子。這從側面說明正弦那組設計不是隨便挑的，而是踩中了某種「位置該怎麼編碼」的自然解。\n\n不論哪條路，回到三步骨架看它們**動了哪一步**：位置編碼**不改 softmax、不改加權混合**，它在三步**之前**動手——改的是進入「打分」的那些 query/key 向量本身（給它們蓋上位置戳記），讓內積出來的分數開始攜帶位置資訊。換句話說，位置編碼是「打分」這一步的**輸入預處理**：它不換打分的算法，它換的是被打分的料。記住這個定位，ch10 的 RoPE 會把它推到更乾淨的地方——RoPE 同樣不碰 softmax 和混合，但它動 query/key 的方式從「相加」升級成「旋轉」。\n\n## 故障模式與直覺陷阱\n\n| 陷阱 | 錯誤直覺 | 會在哪一步把你帶溝裡 | 怎麼自我察覺 |\n|---|---|---|---|\n| 「Transformer 當然懂順序」 | 以為 attention 本身理解語序 | 你會以為拿掉位置編碼 Transformer 還能讀懂句子——其實它退化成詞袋，分不出 \"dog bites man\" 和 \"man bites dog\" | 自問：公式裡哪一項代表位置？（裸 attention 裡：沒有。） |\n| 「重排輸入只是換個寫法」 | 以為重排 token 不影響本來就無序的東西 | 對「集合」確實無所謂，但對**語言**致命——你會低估位置編碼的必要性 | 自問：把 [animal, it] 對調，模型的輸出該不該變？該變（語意變了），但裸 attention 不變 |\n| 「位置編碼是某種特殊層」 | 以為它是個複雜的可訓練模組 | 過度神化它 | 正弦版根本沒有參數，就是一條公式算出來加上去；可學習版也只是一張查找表 |\n| 「直接加個位置整數就好」 | 以為 pos=0,1,2… 塞進去即可 | 大整數會淹掉 embedding、不能外推、難表達相對位置 | 自問：pos=38274 加進一個 ~O(1) 的向量會發生什麼？（內容被壓垮。） |\n| 「正弦編碼能無限外推」 | 把原論文「理論上可外推」當成「實務上沒問題」 | 你會以為長 context 不需要額外處理——實務上裸正弦外推效果有限，這正是 RoPE/YaRN 存在的原因 | 區分「公式對任意 pos 都算得出」（真）vs「外推後注意力還準」（不一定，見 ch10） |\n\n**最值得單獨拎出來的失效模式：拿掉位置編碼會發生什麼。** 這不是假設題——它是理解這一章必要性的試金石。如果一個 self-attention 模型完全不加任何位置資訊，它就是一台**詞袋（bag-of-words）機器**：給它 \"the cat sat on the mat\" 和把這六個字隨機打亂的任何一種排列，它的內部表示和輸出**完全相同**（置換不變）。它能告訴你「這句話裡有 cat、sat、mat」，但永遠告訴不了你「誰坐在誰上面」。對情感分類這種「有哪些詞」就八九不離十的任務，詞袋也許還能矇對；對任何依賴語序的任務（翻譯、推理、指代消解——正是脊椎那個 it→animal），它會徹底失敗。位置編碼不是錦上添花，它是讓 attention 從「讀詞袋」升級成「讀句子」的那塊**必要拼圖**。\n\n（有一個 2026 的細節值得標時點、但別過度推論：研究發現純 decoder、配 causal mask 的自迴歸模型，即使**不**顯式加位置編碼，也能從「只能看左邊」這個遮罩結構裡**間接學到**一些位置資訊——因為遮罩本身打破了置換對稱性。這是個微妙的特例，不推翻本章主結論：encoder（雙向、無遮罩）一定要外加位置，主流 decoder 也都還是配 RoPE。本章講原理，這個特例知道即可，2026-06。）\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題（置換不變，脊椎，★，15 分鐘）**\n用脊椎正典數字（q_it=(1,1,1,1)；k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)；√d=2；v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)），把序列從 [animal, street, it] 重排成 [street, it, animal]，**重算** it 對三個 token 的注意力權重與最終輸出。它們會變嗎？用三步骨架解釋為什麼。\n\n**第 2 題（手算正弦位置編碼，★★，20 分鐘）**\n用 d_model=4 的正弦公式（i=0 分母=1、i=1 分母=100），算出 pos=4 和 pos=5 的四維位置編碼向量。它們落在什麼數值範圍？哪兩個維度變化快、哪兩個慢，為什麼？\n\n**第 3 題（相對位置＝線性關係，★★★，20 分鐘）**\n用和角公式，驗證 d_model=4 高頻那對維度（ω=1）裡，PE(pos=4) 可以由 PE(pos=2) 經過一個「只由偏移 k=2 決定」的線性變換得到。寫出那個 2×2 變換矩陣，並說明為什麼它「只認 k、不認起點」這件事就是「相對位置」。\n\n**第 4 題（口頭，★，10 分鐘）**\n向另一個工程師解釋：「為什麼直接把位置的整數 0,1,2,… 加進 embedding 行不通？」列三個理由；再解釋這跟你給一個 Set 元素貼 `seq_no` 是同一回事。\n\n---\n\n### 推演解答\n\n**第 1 題。** 先算 [street, it, animal] 這個順序下的分數。注意每個 token 的向量沒變，只是排序變了：\n\n```text\n  新順序   打分（內積）         ÷√d=2    softmax\n  ──────   ────────────        ─────    ──────\n  street   q_it·k_street = 2 →  1.0  →   0.245\n  it       q_it·k_it     = 0 →  0.0  →   0.090\n  animal   q_it·k_animal = 4 →  2.0  →   0.665\n```\n\n（softmax 同一組數：e²=7.389、e¹=2.718、e⁰=1，和 11.107；0.245、0.090、0.665。）\n\n加權混合：`0.245·(0,1) + 0.090·(1,1) + 0.665·(1,0) = (0.090+0.665, 0.245+0.090) = (0.755, 0.335)`。\n\n**權重沒變、輸出沒變。** it 給 animal 的權重還是 0.665、給 street 還是 0.245、給自己還是 0.090；輸出還是 (0.755, 0.335)，和原本 [animal, street, it] 的結果**位元級相同**。\n\n三步骨架解釋：打分只看 q_it·k 的向量配對，與 token 排第幾無關（k_animal 不管放哪都是同一個向量，分數恆為 4）；softmax 重排分數→重排權重，集合不變；加權混合是加法、可交換。三步全對順序無感，所以整個 attention 置換等變——這就是非加位置不可的洞。\n\n**第 2 題。** d_model=4，i=0 分母=1（高頻）、i=1 分母=100（低頻）：\n\n```text\n  pos=4:  sin(4)=−0.7568   cos(4)=−0.6536   sin(0.04)=0.0400   cos(0.04)=0.9992\n  pos=5:  sin(5)=−0.9589   cos(5)= 0.2837   sin(0.05)=0.0500   cos(0.05)=0.9988\n```\n\n（sin(4)≈−0.7568、cos(4)≈−0.6536、sin(5)≈−0.9589、cos(5)≈0.2837，皆 Python 複核。）所有值落在 [−1, 1]——這是 sin/cos 的天性，保證位置項不會淹掉內容項。**前兩維（i=0, 頻率高）變化快**：pos 4→5 時 sin 從 −0.76 跳到 −0.96、cos 從 −0.65 跳到 +0.28，劇烈擺動，負責精細定位。**後兩維（i=1, 頻率低）幾乎不動**：sin 從 0.040 到 0.050、cos 都還在 0.999，因為 pos/100 還很小，要 pos 大上百倍它才明顯轉起來，負責粗略定位。高低頻分工，正是「二進位的高位低位」那個直覺。\n\n**第 3 題。** 取高頻對 ω=1，PE 那對分量是 (sin(pos), cos(pos))。要驗 PE(4) 由 PE(2) 經偏移 k=2 的線性變換得到。和角公式（θ=2、φ=2）：\n\n```text\n  sin(4) = sin(2+2) = sin2·cos2 + cos2·sin2 = 2·sin2·cos2 ... \n  用一般式：\n  [ sin(pos+k) ]   [ cos k    sin k ] [ sin(pos) ]\n  [ cos(pos+k) ] = [ −sin k   cos k ] [ cos(pos) ]\n\n  代 k=2：cos2=−0.4161、sin2=0.9093\n  [ sin4 ]   [ −0.4161   0.9093 ] [ sin2 ]   [ −0.4161   0.9093 ] [  0.9093 ]\n  [ cos4 ] = [ −0.9093  −0.4161 ] [ cos2 ] = [ −0.9093  −0.4161 ] [ −0.4161 ]\n\n  驗 sin4：−0.4161·0.9093 + 0.9093·(−0.4161) = −0.3784 − 0.3784 = −0.7568 ✓\n  驗 cos4：−0.9093·0.9093 + (−0.4161)·(−0.4161) = −0.8268 + 0.1731 = −0.6537 ✓（≈cos4=−0.6536，四捨五入）\n```\n\n那個 2×2 矩陣 `[[cos2, sin2],[−sin2, cos2]]` 就是「旋轉 2 弧度」的旋轉矩陣（《圓的影子》ch05 的 R(θ)）。它**只含 k=2，完全沒有 pos**。所以無論你從 pos=2 還是 pos=200 出發，「往前 2 步」都是乘同一個矩陣——位置差 2 對應的變換永遠相同。這正是「相對位置」：模型不必記住每個絕對座標，只要學會「差 k 步＝乘某個固定矩陣」，就能在序列任何地方判斷相對距離。這個「相對位置＝旋轉」的觀察，就是 ch10 RoPE 的起跑線。\n\n**第 4 題。** 三個理由：(1) **數值會爆**——pos 可達數萬，把大整數加進每個分量都 ~O(1) 的 embedding，位置項直接淹掉內容項，模型還沒看清你是什麼字就被「你排第幾」壓垮。(2) **不能外推**——訓練只見過 pos 到某上限，pos=5000 這個沒見過的巨大整數模型無從處理。(3) **難表達相對位置**——語言裡「差幾步」常比「絕對第幾個」重要，一個光禿禿的整數很難讓模型輕鬆推出相對距離（正弦編碼用和角公式天生解決這條，見第 3 題）。和 Set 貼 `seq_no` 同一回事：Set 本性無序、attention 本性置換等變，兩者都看不見順序；要表達順序，唯一辦法是給每個元素**外加一個顯式的位置欄位**——你貼整數 `seq_no`，模型貼一個有界、唯一、能推相對位置的位置向量。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 把脊椎的 [animal, street, it] 重排，為什麼 it 給 animal 的權重一個數字都不變？用三步骨架每一步說一遍它為什麼對順序無感。\n2. 「置換等變」和「置換不變」差在哪？用上面的脊椎實驗各舉一個例子。\n3. 如果一個 self-attention 模型完全不加位置編碼，它在處理 \"dog bites man\" 和 \"man bites dog\" 時會發生什麼？這台機器退化成了什麼？\n4. 為什麼不能直接把位置整數 0,1,2,… 加進 embedding？至少講三個理由。\n5. 正弦位置編碼裡，「不同頻率的維度」分別在做什麼？為什麼說它像二進位？\n6. 「相對位置可以寫成 PE(pos) 的線性函數」是什麼意思？這個線性變換為什麼「只認偏移 k、不認起點 pos」？這跟旋轉有什麼關係（為 ch10 鋪）？\n7. 正弦（固定）vs 可學習絕對位置（BERT/GPT-2），各自的取捨是什麼？哪一個有「context 長度寫死」的硬牆，為什麼？\n8. 位置編碼動了三步骨架的哪一步？（提示：它不改 softmax 也不改混合——它改的是什麼？）\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.5**（arXiv 1706.03762，HTML 版 https://arxiv.org/html/1706.03762v7 ）——正弦位置編碼的原始出處。直接讀 §3.5 那幾行：公式、「波長從 2π 到 10000·2π 的幾何級數」、選正弦是因為「可能可以外推到更長序列」與「相對位置可表示為線性函數」這兩句原話。一頁不到，讀原文比讀二手解說值得。\n- **Jay Alammar「The Illustrated Transformer」**（https://jalammar.github.io/illustrated-transformer/ ）——位置編碼那一段有把不同維度的正弦波畫成熱圖的視覺化，看一眼「高頻低頻分工」會比文字更直觀。脊椎那個 it 的例子也出自這條普及線（ch01 已標：例子源於 Google 2017 部落格，非原論文）。\n- **Devlin et al. 2018「BERT」**（arXiv 1810.04805）——可學習絕對位置嵌入的代表作。不必細讀全文，知道它「用一張可訓練的位置查找表取代正弦公式、因此 context 長度寫死」即可，對照本章那張取捨表。\n- **《圓的影子》ch05（旋轉矩陣 R(a)R(b)=R(a+b)）、ch07–08（複數與 e^{iθ}）**——本章「相對位置＝旋轉一個固定角度」的數學底子。讀完它們，ch10 的 RoPE 會像水到渠成：既然相對位置本質是旋轉，何不直接旋轉 query 和 key？這是全書最漂亮的跨書接點，先把旋轉的直覺擦亮。\n- **ch10（RoPE 與相對位置）、ch19（注意力即集合運算）**——本章的兩個接續：ch10 把「相對位置＝旋轉」推到極致（直接旋轉 q/k，內積只剩角度差）；ch19 給「self-attention 置換等變」一個嚴格的理論版（Set Transformer），讓你看清這個「洞」其實是 attention 深層身分的一面。\n"}, {"id": "ch10-rope-relative", "file": "ch10-rope-relative.md", "group": "Part III — 補上缺的零件", "title": "ch10 — 旋轉的位置：RoPE 與相對位置之美", "md": "# ch10 — 旋轉的位置：RoPE 與相對位置之美\n\n> **本章解決什麼問題**：ch09 揭穿了一個洞——self-attention 看不見順序（置換不變），所以位置資訊得**外加**進去；ch09 給的補法是正弦位置編碼，把一個固定的位置向量**加**到 embedding 上。本章換一個更漂亮、也是 2026 主流開源 LLM 事實標準的補法：RoPE（Rotary Position Embedding，旋轉位置嵌入）。它不加任何東西，而是把 query 與 key **依位置旋轉一個角度**。關鍵之美在於：兩個旋轉後向量做內積時，**絕對位置自動消去、只剩下相對位置**——這正是你在《圓的影子》裡反覆看過的 R(a)·R(b)=R(a+b)。本章動的還是三步骨架的第一步「打分」：不換打分公式（還是內積），而是在算內積**之前**先把 q、k 各自轉一個由位置決定的角度，讓相對位置自然滲進分數裡。它和 ch09 是同一個洞的兩種補法，你會看清為什麼「旋轉」這條路後來贏了。\n\n## 從你已知的出發\n\n你做過分散式系統，一定處理過「時間」這個麻煩東西。最天真的做法是給每個事件蓋一個**絕對時間戳**（wall-clock timestamp）：`2026-06-13T19:32:01Z`。但絕對時間戳有個老問題——兩台機器的時鐘不可能完全同步，你真正在乎的往往不是「這個事件發生在幾點幾分」，而是「這個事件**比另一個事件早還是晚、差多少**」。於是你學會用相對的東西來思考：Lamport 邏輯時鐘記的是「誰在誰之前」，向量時鐘記的是「相對的因果偏序」，TCP 序號在乎的是「這個封包跟上一個差幾號」。**絕對的位置常常是雜訊，相對的位置才是訊號。**\n\nch09 的正弦位置編碼，本質是給每個 token 蓋一個「絕對位置戳記」：第 0 個位置一個向量、第 1 個位置一個向量，加到 embedding 上。它確實能用（原始 Transformer 就靠它），而且設計者刻意挑了正弦函數，讓「相對位置可以用線性關係表達」——但相對位置在那裡是**間接**浮現的，要靠模型自己從絕對戳記裡學出來。\n\nRoPE 問了一個更乾脆的問題：既然我們真正在乎的是**相對**位置，能不能讓相對位置**直接、無條件地**出現在注意力分數裡，連學都不用學？答案是能，而且用的工具你已經很熟——旋轉。\n\n還有一個你會立刻有共鳴的工程角度：**相位（phase）**。如果你碰過訊號處理，或哪怕只是調過音訊的左右聲道延遲，你就知道「相位差」能編碼「時間差」——同一個正弦波，相位差多少就代表延遲了多少。RoPE 做的事，用一句話講就是「**把位置編碼成相位、把相對位置編碼成相位差**」。內積這個運算，剛好只看得到相位差。\n\n在三步骨架裡，這一步坐在哪？\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │ weighted sum │\n values ─────────────────────────────────────────┘\n              │\n              └─►【RoPE 在這裡】算內積之前，先把 q、k 各自依位置旋轉一個角度\n```\n\nRoPE 動的是第一步「打分」的**輸入**：不換內積這個打分公式，而是在 q·k 之前，把 q 轉 nθ、把 k 轉 mθ（n、m 是它們各自的位置）。注意它**完全不碰** value、不碰 softmax、不碰加權混合——位置資訊只透過「分數」這個閘門進場。記住這點，本章的所有故障模式都從這裡長出來。\n\n## 先把問題收窄成 2 維：旋轉怎麼編碼位置\n\nRoPE 的全貌是高維的，但它的靈魂在 2 維就講完了——因為 RoPE 把高維向量**切成一堆 2 維平面**，每個平面獨立做同一件事。所以我們先把整件事壓進一個平面，看清楚，再放大。\n\n回憶《圓的影子》ch05：把一個 2 維向量「逆時針轉 α」這個動作，可以寫成一個 2×2 矩陣：\n\n```text\nR(α) = ┌ cos α   −sin α ┐\n       └ sin α    cos α ┘\n\n      R(α)·v = 把向量 v 逆時針轉 α 度\n```\n\nRoPE 的規則只有一句話：**位置在 p 的 token，它的 query（或 key）向量，先被旋轉 p·θ 這個角度，再拿去算內積。** 這裡 θ 是一個固定的「每走一步轉多少」的角速度。位置 0 不轉（轉 0 度），位置 1 轉 θ，位置 2 轉 2θ……位置 p 轉 pθ。位置愈靠後，轉得愈多。\n\n```text\n位置 0:  q 不轉           （角度 0）\n位置 1:  q 轉 θ            （角度 1·θ）\n位置 2:  q 轉 2θ           （角度 2·θ）\n   ⋮\n位置 p:  q 轉 pθ           （角度 p·θ）\n```\n\n就這樣。沒有要加的位置向量、沒有查表、沒有額外參數——只有「依位置轉一個角」。位置資訊**不是被加進向量**，而是被**烤進向量的方向**裡。\n\n你可能會皺眉：把每個 token 各自轉個角度，怎麼就編碼了「順序」？關鍵不在單一向量轉了多少，而在**兩個向量做內積時會發生什麼**。這就是下一節的全部重點，也是 RoPE 之所以漂亮的地方。\n\n## 之美：內積只剩相對位置\n\n現在來算給你看。設 query 在位置 n、key 在位置 m。RoPE 把 q 轉 nθ、把 k 轉 mθ，然後算它們的內積。寫成矩陣：\n\n```text\n旋轉後的 q  =  R(nθ)·q\n旋轉後的 k  =  R(mθ)·k\n\n它們的內積 =  (R(nθ)·q)ᵀ · (R(mθ)·k)\n           =  qᵀ · R(nθ)ᵀ · R(mθ) · k       ← 轉置把第一個矩陣翻過去\n```\n\n到這裡，《圓的影子》的兩個結論直接收掉它。第一，旋轉矩陣的**轉置等於反向旋轉**：`R(nθ)ᵀ = R(−nθ)`（轉 −nθ 就是把轉 nθ 退回去）。第二，旋轉會**結合相加**：`R(a)·R(b) = R(a+b)`（《圓的影子》ch05 的招牌結論，先轉 b 再轉 a 等於一次轉 a+b）。把兩條接起來：\n\n```text\nR(nθ)ᵀ · R(mθ) = R(−nθ) · R(mθ) = R(mθ − nθ) = R((m−n)θ)\n```\n\n於是整個內積塌縮成：\n\n```text\n(R(nθ)·q)ᵀ · (R(mθ)·k)  =  qᵀ · R((m−n)θ) · k\n```\n\n**停在這裡看十分鐘。** 左邊的式子裡，n 和 m 是兩個 token 的**絕對位置**——分別是第幾個。右邊呢？n 和 m 不見了，只剩下 **(m−n)**——它們的**相對距離**。換句話說：\n\n> 兩個經 RoPE 旋轉後的向量做內積，結果**只依賴它們相隔多遠（m−n）**，跟它們各自站在序列的哪個絕對位置**完全無關**。\n\n把 animal 和 it 一起往後挪十個位置，它們之間的注意力分數**一個字都不會變**，因為相對距離沒變。這正是你在分散式系統裡夢寐以求的性質——絕對時鐘漂移無所謂，只要相對順序對。RoPE 把「相對位置才是訊號」這件事，從「希望模型學得到」升級成「數學上保證如此」。\n\n這就是本章的驚嘆點，請你能用自己的話講出來：**正弦編碼是把位置加進向量、希望模型從絕對戳記裡推出相對關係；RoPE 是把位置烤成旋轉角度，讓相對關係在內積那一步自動、無條件地浮現——連學都不必學。** 三步骨架的「打分」步沒換公式（還是內積），但因為打分的輸入被旋轉過，相對位置就免費掉進了分數裡。\n\n### 接回複數：同一件事的另一個鏡頭\n\n《圓的影子》ch07–08 教過：2 維平面上的旋轉，就是複數乘 e^{iα}。把 q、k 的那一對座標看成複數，RoPE 就是「把 q 乘 e^{inθ}、把 k 乘 e^{imθ}」。內積對應到「一個取共軛再相乘取實部」，算出來：\n\n```text\n(q·e^{inθ}) 與 (k·e^{imθ}) 的內積（取實部）\n   ∝  實部[ q·k̄ · e^{i(m−n)θ} ]      ← 指數律 e^{a}/e^{b}=e^{a−b}，nθ 被 mθ 一減就剩 (m−n)θ\n```\n\n同一句話換複數講：**位置編成相位、相對位置就是相位差**，而內積只讀得到相位差。這是全書最漂亮的跨書接點之一——你在三角函數那本花了三章建立的「旋轉會相加」的肌肉記憶，在這裡一次回收，撐起了 2026 年幾乎每個開源大模型的位置編碼。需要重溫旋轉、複數、e^{iθ} 的，回《圓的影子》ch05、ch07–08；本書只用結論，不重推。\n\n## 為什麼「相對」是對的歸納偏置（inductive bias）\n\n數學漂亮是一回事，但你應該追問：把「只看相對位置」硬寫進架構，憑什麼是好的設計，而不是隨手挑的偏好？這牽涉到一個機器學習的關鍵概念，補一句鷹架：**歸納偏置（inductive bias）**——你在模型結構裡預先植入的假設，等於先替模型省下一批它本來得自己從資料學的東西。植入對的假設，模型學得又快又穩；植入錯的假設，模型得花力氣去抵消你的偏見。\n\n「語言的意義主要由相對位置決定」這個假設，對不對？拿脊椎句子檢查：*\"the animal didn't cross the street because it was too tired.\"* 把這整句話塞進一篇長文章的開頭、中段、還是結尾——it 指向 animal 的關係**一點都不會變**，因為那只取決於 it 和 animal 在句內**相隔多遠**，跟整句話落在文章第幾個字無關。再想你熟的場景：一段程式碼裡 `})` 該配哪個 `({`，看的是巢狀的相對深度，不是這段碼在檔案第幾行；一句 SQL 裡 `WHERE` 綁哪個 `FROM`，看的是子句的相對結構。**自然語言（和程式語言）的句法、指代關係，絕大多數是相對的、平移不變（shift-invariant）的。**\n\n所以「相對位置不變」不是一個任意偏好，而是一個**和資料的真實結構對齊**的歸納偏置。正弦編碼把這件事留給模型「希望它學得到」；RoPE 直接把它焊進內積——模型開機就知道「平移整句不該改變注意力」，不必浪費容量去學這條規律。這跟你設計 schema 時的取捨是同一個道理：與其讓每個 query 自己去算「事件 A 是不是在事件 B 之前」，不如直接存一個相對偏序，把這條規律變成結構保證。**對的歸納偏置 = 把資料的對稱性寫進架構。** RoPE 把語言的「平移對稱」寫進了打分這一步。\n\n這也解釋了一個你可能納悶的事：RoPE 零額外參數（不像可學習絕對位置嵌入，每個位置一個訓練向量），照理說「能力」更弱，怎麼反而贏？因為它不是靠參數量取勝，是靠**把對的假設免費送給模型**——省下來的容量拿去學真正需要學的東西。少即是多，前提是你少對了地方。\n\n## Worked example：手算 RoPE 的相對位置\n\n抽象式子看一遍不夠，動手算一次才會信。我們用 2 維、一個固定角速度 θ = 60°（cos 60° = 0.5、sin 60° = √3/2 ≈ 0.866，這兩個值你不用查表）。這就是脊椎——序章那個句子 *\"the animal didn't cross the street because **it** was too tired.\"* 裡的 it 與 animal，現在各自帶上位置。\n\n為了把「只剩相對位置」這件事看得最乾淨，我們先用最簡單的向量：旋轉**之前**，it 的 query 是 q=(1, 0)、animal 的 key 是 k=(1, 0)。它們指向同一個方向，原始內積 q·k = 1×1 + 0×0 = **1**（完全對齊，「最相似」）。現在給它們蓋上位置。\n\n**情境 A**：animal 在位置 m=1、it 在位置 n=3（it 在句子裡比 animal 晚出現，相對距離 m−n = −2）。\n\n```text\n旋轉 it 的 q（轉 n·θ = 3×60° = 180°）：\n   R(180°)·(1,0) = (cos180°, sin180°) = (−1, 0)\n\n旋轉 animal 的 k（轉 m·θ = 1×60° = 60°）：\n   R(60°)·(1,0) = (cos60°, sin60°) = (0.5, 0.866)\n\n旋轉後內積 = (−1)(0.5) + (0)(0.866) = −0.5\n```\n\n**情境 B**：把兩個 token 整體往後挪 3 格——animal 在位置 m=4、it 在位置 n=6（相對距離還是 m−n = −2）。\n\n```text\n旋轉 it 的 q（轉 6×60° = 360°）：\n   R(360°)·(1,0) = (cos360°, sin360°) = (1, 0)\n\n旋轉 animal 的 k（轉 4×60° = 240°）：\n   R(240°)·(1,0) = (cos240°, sin240°) = (−0.5, −0.866)\n\n旋轉後內積 = (1)(−0.5) + (0)(−0.866) = −0.5\n```\n\n兩個情境的絕對位置完全不同（1 與 3，對上 4 與 6），但**內積都是 −0.5**。為什麼？因為相對距離都是 −2。用上一節的閉式核對：內積應該等於 `qᵀ·R((m−n)θ)·k = (1,0)·R(−120°)·(1,0) = cos(−120°) = −0.5`。對得上。\n\n把這件事攤成一張表，看相對距離怎麼一手決定分數（q=k=(1,0)，所以內積 = cos(相對距離 × 60°)）：\n\n```text\n相對距離 |m−n|:   0      1      2      3      4\n旋轉後內積:      +1.00  +0.50  −0.50  −1.00  −0.50\n                  ▲                            \n            完全對齊                            \n            （同位置）  ← 隨距離拉開，內積開始振盪、衰減 →\n```\n\n注意一件事：**單一頻率**（單一個 θ）下，內積是 cos((m−n)θ)，它會**週期性振盪**——距離拉到讓角度繞滿一圈，分數又回到高點，這不是我們要的（我們要的是「離得愈遠、相關性傾向愈低」的單調感）。真正的 RoPE 不只用一個 θ，而是用**很多個不同的 θ**（下一節），把不同頻率的 cos 疊起來，淨效果才是「隨相對距離平滑衰減」（RoFormer 原文叫它 long-term decay）。你在《圓的影子》ch12 看過的「不同頻率疊加」，在這裡又一次決定了形狀。\n\n> **可選的 5 行 numpy（讓骨架一目了然，數字與上面手算一致）**\n\n```python\nimport numpy as np\n\ndef rope_2d(v, pos, theta):           # rotate a 2D vector by pos*theta\n    a = pos * theta\n    R = np.array([[np.cos(a), -np.sin(a)],\n                  [np.sin(a),  np.cos(a)]])\n    return R @ v\n\nth = np.pi / 3                          # 60 degrees\nq, k = np.array([1.0, 0.0]), np.array([1.0, 0.0])\nfor (m, n) in [(1, 3), (4, 6)]:         # (key pos, query pos), both rel = -2\n    print(m, n, round(rope_2d(q, n, th) @ rope_2d(k, m, th), 4))\n# 1 3 -0.5   /   4 6 -0.5   ← same score, same relative distance\n```\n\n## 從 2 維放大到 d 維：一堆獨立的旋轉平面\n\n真實模型的 q、k 是 d 維（脊椎 d=4、原始 Transformer d_k=64）。RoPE 怎麼處理高維？很簡單粗暴：**把 d 維座標兩兩配對成 d/2 個 2 維平面，每個平面用上面那套旋轉，但每個平面配一個不同的角速度 θᵢ。**\n\n```text\nd 維向量  (x₀, x₁, x₂, x₃, …, x_{d−2}, x_{d−1})\n          └─平面0─┘ └─平面1─┘        └─平面 d/2−1─┘\n平面 0 用角速度 θ₀，平面 1 用 θ₁，…，每個平面在位置 p 各轉 p·θᵢ\n```\n\n角速度怎麼選？RoFormer 沿用正弦編碼那套幾何級數的頻率（這也是它和 ch09 一脈相承的地方）：\n\n```text\nθᵢ = base^(−2i/d)，  i = 0, 1, …, d/2−1，  base 通常取 10000\n```\n\n第 0 個平面 θ₀ = 1（最快、高頻，轉得最猛，捕捉**近距離**的位置差異）；最後一個平面 θ 趨近 base^{−1}（最慢、低頻，幾乎不轉，捕捉**遠距離**的粗略位置）。高頻平面管「差一兩個字」的精細，低頻平面管「差幾百個字」的大局——多頻率疊加，淨效果就是上一節說的「隨距離平滑衰減」。\n\n把脊椎的 d=4 代進去算給你看（base=10000，d/2=2 個平面）：\n\n```text\n平面 i=0:  θ₀ = 10000^(0)    = 1       → 每走一步轉 1 弧度，約 6.3 步轉一圈（高頻）\n平面 i=1:  θ₁ = 10000^(−1)   = 0.01    → 每走一步轉 0.01 弧度，約 628 步才轉一圈（低頻）\n```\n\n兩個平面，一快一慢：快的那個分辨「差 1 步還是差 2 步」這種貼身的位置差；慢的那個幾乎不動，要走幾百步它才轉得明顯，負責「差很遠」的粗粒度。原始 Transformer 的 d_k=64 就有 32 個平面，θ 從 1 一路幾何級數降到約 0.000133（最慢的平面要四萬多步才轉一圈）——等於布了一把從「貼身」到「全景」連續鋪滿的尺，每個相對距離都有某幾個平面對它最敏感。這正是「多頻率疊加避免別名」在做的事：不同距離由不同頻率的平面負責，疊起來既不週期性回繞、又隨距離平滑衰減。你在《圓的影子》ch13 看過的「不同頻率的正弦疊出任意形狀」（Fourier 的門口），在這裡又一次當了主角。\n\n最關鍵的是：**因為每個平面都是旋轉，上一節「內積只剩相對位置」的結論對每個平面各自成立、加總後依然成立。** d 維 RoPE 後的內積 = 各平面內積之和 = `Σᵢ (那一對座標的 q·k) × cos((m−n)θᵢ)`，每一項都只看 (m−n)。所以放大到任意維度，「只依賴相對位置」這個性質**原封不動**。這是 RoPE 設計上的乾淨：高維只是把同一個 2 維魔術並排做了 d/2 次。\n\n## RoPE vs 正弦 vs ALiBi：加在哪、動了什麼\n\n把位置補進注意力，2017 到 2026 主要有三種思路。它們補的是同一個洞（ch09 的置換不變），但「動三步骨架的哪裡」不同——這張對照表是本章你最該帶走的東西：\n\n```text\n方法          動在哪                位置怎麼進場           相對位置是…\n─────────────────────────────────────────────────────────────────────\n正弦編碼       embedding（打分之前）  把位置向量【加】到      間接：靠正弦的\n（ch09）                            token embedding 上     線性關係，模型自己學\n─────────────────────────────────────────────────────────────────────\nRoPE          q、k（打分之前）       把 q、k 各自【旋轉】    直接：內積後絕對\n（本章）                            一個由位置決定的角      位置消去，只剩 m−n\n─────────────────────────────────────────────────────────────────────\nALiBi         分數（打分之後、        在 q·k 分數上【加】一   直接：偏置正比於\n（Press 2021） softmax 之前）         個正比於距離的負偏置     距離 |m−n|\n─────────────────────────────────────────────────────────────────────\n```\n\n三者最大的差別在「位置進場的時機與形式」：\n\n- **正弦編碼加在 value 也會帶到的 embedding 上**——位置混進了「內容」，順著殘差流一路傳下去。\n- **RoPE 只旋轉 q 和 k，不碰 value**——位置只透過「分數」這個閘門影響注意力，不污染被搬運的內容（value）。這是 RoPE 比正弦乾淨的一點：位置該影響「我看哪裡」（分數），不該直接改「我搬什麼」（value）。\n- **ALiBi 連向量都不動**，直接在算好的分數 q·k 上加一個 `−slope × |m−n|` 的線性懲罰（每顆頭一個固定的 slope，head-specific，訓練前定好、不學），距離愈遠扣愈多。它最便宜、外推性好，但表達力較死（只能線性遞減，無法表達「特別關注某個距離」）。\n\nALiBi 在三步骨架裡其實也是動「打分」——它在打分**之後**、softmax 之前加偏置，可以看成 RoPE 之外的另一條相對位置路線。`（2026-06）`的事實是：**RoPE 成了主流開源 LLM 的事實標準**——Llama 2/3、Qwen、Mistral、Gemma、DeepSeek 等普遍採用 RoPE 或其變體，ALiBi 的採用率遠低（照 landscape）。RoPE 贏在幾個工程上的甜蜜點：相對、零額外參數、不查表、和 FlashAttention 相容（旋轉是逐位置的廉價運算，不破壞分塊），而且配上後面要講的外推手法可以撐到很長的 context。這不是說 RoPE 數學上「最優」，而是它在「漂亮 × 便宜 × 能外推」三軸上同時夠好。\n\n## 故障模式與直覺陷阱\n\nRoPE 的優雅容易讓人以為它是位置問題的終結。它不是。下面是真實會壞的地方。\n\n### 招牌失效：外推（extrapolation）失效——RoPE 看不懂沒見過的長度\n\n這是本章最重要的故障，也是 2023 之後一整條研究線（PI、YaRN）要救的痛。\n\nRoPE 雖然只看相對位置，但模型訓練時只見過**訓練長度以內**的相對距離。一旦推論時的序列超過訓練長度，就會出現它從沒見過的、極大的相對距離——那些 cos((m−n)θᵢ) 落在訓練時從未取樣到的角度區間。後果是注意力分數**失真、不穩定**：分數分布變得異常（熵爆高、變得平而模糊，或反過來在錯誤位置異常尖銳），模型「看不懂」這些超長距離，效果斷崖式下滑（Liu 等人觀察到的「災難性崩壞」，2026-06 查證）。直覺版：**RoPE 保證了相對位置的形式，但沒保證模型在沒見過的角度上還能正常運作**——形式對了，不代表外插能力憑空出現。\n\n> **怎麼自我察覺**：如果你把一個 4k 訓練的模型直接餵 32k，發現 perplexity 突然爆掉、或長文後半段開始胡言亂語，先懷疑位置外推失效，而不是模型「不夠聰明」。\n\n救法（一瞥，數學細節指向延伸閱讀）：\n\n| 手法 | 想法（一句話） | 出處（2026-06 查證） |\n|---|---|---|\n| Position Interpolation（PI） | 把超長的位置索引**線性壓縮**回訓練範圍內（位置 8000 當成 1000 用），讓角度落回見過的區間 | Chen 2023 |\n| YaRN | NTK-by-parts：高頻平面（管近距離）幾乎不壓、低頻平面（管遠距離）多壓，再加一個**注意力溫度**把分數整體縮小防止過尖 | Peng 2023（ICLR 2024） |\n\n注意 YaRN 那個「注意力溫度」——它就是 ch05 的溫度旋鈕，回收一次：外推時分數會變得過尖／過散，調溫度把它拉回正常的銳利度。位置外推失效，本質上是 ch05–06「softmax 的尺度／銳利度」問題在長 context 下的重演。\n\n### 陷阱二：以為「只看相對位置」等於「不在乎絕對位置」\n\nRoPE 的內積只依賴相對位置——但這**不代表模型完全不知道絕對位置**。在因果遮罩（ch11）下，第 0 個 token 永遠只能看到自己，第 5 個 token 看得到前 6 個——能看到幾個 token 這件事本身就洩漏了絕對位置資訊。RoPE 拿掉的是「分數對絕對位置的直接依賴」，不是「模型對絕對位置一無所知」。把這兩件事混為一談，你會對「為什麼模型還是知道句首句尾」感到莫名其妙。\n\n### 陷阱三：以為單一頻率就夠、忽略 base 這個旋鈕\n\n如果你只用一個 θ，內積是 cos((m−n)θ)，它**週期性振盪**——距離拉到繞滿一圈，遠的 token 分數又跟近的一樣高，相對位置就**別名（aliasing）**了，模型分不清「差 2 格」和「差 14 格」。RoPE 靠多頻率疊加避開這個坑，而那個 base（通常 10000）控制頻率的鋪展範圍。`（2026-06）`長 context 模型常調大 base（如 100 萬）來拉長「不別名」的有效範圍——這也是長度外推的一條路。忘了 base 是個可調旋鈕，你會以為 RoPE 是個沒有超參的黑盒。\n\n### 陷阱四：把 RoPE 的「衰減」當成硬性的距離截斷\n\nRoPE 多頻率疊加帶來的 long-term decay 是**傾向**（遠的 token 平均而言分數較低），不是 ch15 那種**結構性的稀疏截斷**（直接不算遠的對）。RoPE 算的還是 full O(n²) 的所有對，遠的也照算，只是分數傾向小。把「衰減傾向」誤當「省了計算」，你就會以為 RoPE 解決了 O(n²)——它沒有，那是 Part IV 的事。\n\n## 紙上推演\n\n### 推演 1：用旋轉矩陣性質證明「RoPE 內積只依賴相對位置」 [15 分鐘] ★★\n\n不查上文，自己從頭推一遍：query 在位置 n、key 在位置 m，RoPE 把它們各轉 nθ、mθ。寫出旋轉後內積 `(R(nθ)q)ᵀ(R(mθ)k)`，用「轉置＝反向旋轉」與「R(a)R(b)=R(a+b)」兩條，化簡到只剩 (m−n)。然後用一句話講清楚：這個結論為什麼讓「把整句往後挪」不改變任何注意力分數？\n\n### 推演 2：手算兩個情境，驗證相對位置不變 [15 分鐘] ★★\n\n用 θ=60°、旋轉前 q=k=(1,0)。算兩個情境的旋轉後內積：(a) key@2、query@5；(b) key@3、query@6。兩者相對距離都是 m−n = −3。各自把 q 轉 nθ、k 轉 mθ 算出座標再內積，確認兩者相等。再用閉式 `cos((m−n)θ) = cos(−180°)` 核對。\n\n### 推演 3：RoPE 加在哪、和正弦差在哪 [10 分鐘] ★\n\n口頭（或寫 200 字）回答三件事：(1) 正弦編碼加在哪個東西上、RoPE 旋轉哪兩個東西、ALiBi 加在哪一步？(2) 為什麼「RoPE 不碰 value」是個好性質？(3) 用《圓的影子》的一句話（提到 R(a)R(b)=R(a+b) 或 e^{iα}）解釋「為什麼旋轉是編碼位置的漂亮辦法」。\n\n### 推演解答\n\n**推演 1。** 旋轉後內積：\n\n```text\n(R(nθ)q)ᵀ (R(mθ)k)\n  = qᵀ R(nθ)ᵀ R(mθ) k          ← (Av)ᵀ(Bw) = vᵀAᵀBw\n  = qᵀ R(−nθ) R(mθ) k          ← 旋轉矩陣轉置 = 反向旋轉，R(α)ᵀ = R(−α)\n  = qᵀ R(mθ − nθ) k            ← R(a)R(b) = R(a+b)，這裡 a=−nθ、b=mθ\n  = qᵀ R((m−n)θ) k             ← 只剩相對位置 (m−n)\n```\n\nn 與 m 只透過差 (m−n) 出現，絕對位置消失。所以把 query 和 key 同時往後挪 k 格——n→n+k、m→m+k——差 (m−n) 不變，內積一個字都不變。直覺：旋轉同時轉 q 和 k，等於只看「兩者**之間**的夾角差」，跟它們各自轉到哪個絕對方向無關。這就是 RoPE 把「絕對位置是雜訊、相對位置是訊號」寫死進數學的方式。\n\n常見錯路：忘了轉置會把旋轉**反向**（寫成 R(nθ)R(mθ)=R((m+n)θ)，得到 m+n 而非 m−n），那就不是相對位置了。R(nθ)ᵀ=R(−nθ) 那個負號是整個證明的關鍵。\n\n**推演 2。** θ=60°，q=k=(1,0)。\n\n情境 (a) key@m=2、query@n=5：\n\n```text\nquery 轉 5×60°=300°：R(300°)(1,0) = (cos300°, sin300°) = (0.5, −0.866)\nkey   轉 2×60°=120°：R(120°)(1,0) = (cos120°, sin120°) = (−0.5, 0.866)\n內積 = (0.5)(−0.5) + (−0.866)(0.866) = −0.25 − 0.75 = −1.0\n```\n\n情境 (b) key@m=3、query@n=6：\n\n```text\nquery 轉 6×60°=360°：R(360°)(1,0) = (1, 0)\nkey   轉 3×60°=180°：R(180°)(1,0) = (−1, 0)\n內積 = (1)(−1) + (0)(0) = −1.0\n```\n\n兩者都是 **−1.0**，相對距離都是 −3。閉式核對：`cos((m−n)·60°) = cos(−3×60°) = cos(−180°) = −1`。對得上。直覺收尾：相對距離 3（角度差 180°）讓兩個原本對齊的向量轉到完全相反方向，內積到最負——這就是「差這麼遠、相關性傾向最低」在單頻率下的長相。\n\n**推演 3。** (1) 正弦編碼把位置向量**加**到 token embedding（內容）上；RoPE **旋轉** query 與 key（不碰 value）；ALiBi 在算好的 q·k **分數**上加一個正比於距離的負偏置。三者都動「打分」這一步的不同位置（前者改打分的輸入內容、RoPE 改打分輸入的方向、ALiBi 改打分的輸出）。(2) RoPE 不碰 value 是好事，因為位置該影響「該看哪裡（分數）」，不該直接竄改「被搬運的內容（value）」——把位置摻進 value 會讓位置雜訊順著殘差一路污染表示。(3) 因為旋轉會相加（R(a)R(b)=R(a+b)，或 e^{ia}·e^{ib}=e^{i(a+b)}），所以「q 轉 nθ、k 轉 mθ 再內積」會自動把角度一減、只剩相對的 (m−n)θ——相對位置不是硬塞的，是旋轉這個運算的代數天性免費給的。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關（優先回答「為什麼」）：\n\n1. RoPE 動的是三步骨架的哪一步、動在那一步的什麼位置？它碰不碰 value、碰不碰 softmax？為什麼「不碰 value」是刻意的好設計？\n2. 用一句話講 RoPE 的核心：位置怎麼進場、相對位置為什麼會自動浮現？（提示：R(a)R(b)=R(a+b)）\n3. 把 RoPE 證明的關鍵兩步說出來：為什麼 R(nθ)ᵀ 會變成 R(−nθ)？為什麼最後只剩 (m−n)？\n4. RoPE 和 ch09 的正弦編碼，「位置加在哪、相對位置是直接還是間接」各是什麼？ALiBi 又動在哪？\n5. 為什麼真實 RoPE 要用很多個不同的 θ（多頻率），單一個 θ 會出什麼問題？base（10000）這個旋鈕在控制什麼？\n6. RoPE 的招牌故障是什麼？為什麼「只看相對位置」沒能讓它免疫於「沒見過的長度」？PI 和 YaRN 各用什麼想法救它（一句話）？\n7. `（2026-06）`為什麼 RoPE 成了開源 LLM 的事實標準？列出它贏在哪幾個工程甜蜜點。\n8. 反直覺自查：「RoPE 內積只依賴相對位置」是不是等於「模型完全不知道絕對位置」？為什麼不是？\n\n## 延伸閱讀\n\n- **Su et al. 2021「RoFormer: Enhanced Transformer with Rotary Position Embedding」**（arXiv 2104.09864）。RoPE 原始論文。讀第 3 節的推導（2 維旋轉、推廣到 d 維、long-term decay 那段），對照本章的證明看原文怎麼用複數寫。`（2026-06 查證）`\n- **EleutherAI「Rotary Embeddings: A Relative Revolution」**（blog.eleuther.ai/rotary-embeddings）。最好讀的 RoPE 直覺文，把「內積只剩相對位置」用複數 e^{i(m−n)θ} 講得乾淨，與本章的旋轉矩陣版互為鏡頭。`（2026-06 查證）`\n- **Press et al. 2021「Train Short, Test Long: Attention with Linear Biases」**（arXiv 2108.12409，ICLR 2022）。ALiBi 原文。讀它怎麼用「在分數上加線性偏置」這個極簡想法換到好的長度外推——本章對照表那一格的出處。\n- **Chen et al. 2023「Extending Context Window via Position Interpolation」**（arXiv 2306.15595）與 **Peng et al. 2023「YaRN」**（arXiv 2309.00071，ICLR 2024）。外推失效的兩個主流救法，讀它們怎麼「壓縮位置索引」與「分頻率＋調溫度」。對應本章故障模式那一節。\n- **《圓的影子》ch05（旋轉矩陣 R(a)R(b)=R(a+b)）、ch07–08（複數與 e^{iθ}）**。本章的全部數學工具都在那裡，需要重溫旋轉為什麼會相加、複數乘法為什麼是旋轉，回去擦亮它。\n- 下一站 **ch11（遮罩）**：RoPE 讓位置進了分數，但「生成時不能偷看未來」是另一個必須補的限制——下一章把因果遮罩裝上去，你會看到 ch07 雙向的對稱在此被打破。\n"}, {"id": "ch11-masking", "file": "ch11-masking.md", "group": "Part III — 補上缺的零件", "title": "ch11 — 遮罩：只能看過去", "md": "# ch11 — 遮罩：只能看過去\n\n> **本章解決什麼問題**：ch07 給了你一張對稱的自注意力矩陣——每個 token 都能看遍全句，animal 看得到 it、it 也看得到 animal。但 GPT 這類「一個字一個字生成」的模型有個鐵律：寫到第 i 個字時，它**還不知道**第 i+1 個字是什麼。讓它在訓練時偷看未來，等於讓考生看著答案練習，上場就廢。這一章只解決一件事：怎麼讓注意力**只能看過去**。答案是一個叫「因果遮罩（causal mask）」的小動作——在 softmax 之前，把所有「看向未來」的分數設成 −∞。它不動 query/key/value，也不動 softmax 公式，它動的是**送進 softmax 的分數**：把非法位置的分數壓到 −∞，softmax 後自動變成 0。本章也順手講另一種遮罩（padding mask），並讓你看清 ch07 那張對稱矩陣的對稱性，在這裡被**單向**打破了。\n\n## 從你已知的出發\n\n你做過 event sourcing 嗎？沒做過也沒關係，你一定維護過 append-only 的 log——交易紀錄、稽核 log、Kafka topic、git commit 歷史。這類系統有一條你從不質疑的鐵律：\n\n> **重播到第 t 個事件時，你只能讀 ≤ t 的事件，讀不到 t 之後的。** 未來還沒發生，log 裡根本沒有那幾行。\n\n你重算某個帳戶在 3 月 1 日的餘額，只能把 3 月 1 日（含）之前的交易加總。要是你的程式不小心把 3 月 5 日的退款也算進去了，那不叫 bug，那叫**時光旅行**——你用了一筆「在那個時間點根本不存在」的資訊。任何依時間順序重建狀態的系統，都得保證這件事不發生。\n\n自迴歸（autoregressive）語言模型生成文字，就是一次 append-only 的重播。它一個 token 一個 token 往後寫，寫第 i 個 token 時，手上只有第 1 到 i 個 token（第 i 個是它剛寫完、正準備據以預測下一個的）。第 i+1、i+2…還沒生出來，它**不該**、也**不能**看。\n\n問題來了：ch07 的自注意力是**雙向**的。在那張 3×3 矩陣裡，每個 token 都對全句所有 token 算了相似度——包括它右邊的。如果什麼都不做，模型在預測「下一個字」時，注意力會大大方方地去看它正要預測的那個字（以及更後面的），這就是時光旅行。**因果遮罩就是那條 append-only 鐵律在注意力裡的實作**：把所有「看向右邊（未來）」的注意力連結，在它變成權重之前先掐斷。\n\n你大概也猜到掐斷的手法了——就像你在 ACL 裡把無權限的列濾掉、在 query 裡加一條 `WHERE event_time <= :t` 把未來的行擋在外面。注意力裡的「擋」更乾脆：把非法連結的分數設成 −∞，讓 softmax 給它分配**剛好 0** 的權重。本章就講這一個動作，以及它為什麼非得是 −∞、不能是 0。\n\n## 在三步骨架的哪裡：又是「打分」和「正規化」之間\n\n先定位。遮罩這件事坐在三步骨架的哪一格？\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │ weighted sum │\n values ─────────────────────────────────────────┘\n                  │\n                  └─►【遮罩：把非法位置的分數設 −∞】插在打分之後、正規化之前\n```\n\n和 ch06 的 `/√d` 一樣，遮罩是「打分」與「正規化」之間的一道**加工**——它不是獨立的第四步。打分（ch04）算出一整排相似度分數，遮罩在這些分數進 softmax（ch05）之前，把不該被看到的位置覆寫成 −∞。然後 softmax 照常跑，加權混合（value 進場）照常跑。query/key/value 三個角色一個沒變，softmax 公式一個字沒改，變的只有**送進 softmax 的那排數字**。\n\n值得停一下記住這個型態：本書到目前為止，凡是想調整注意力的「該看哪裡」，動的幾乎都是同一個地方——**送進 softmax 的分數**。ch06 縮放它（除 √d）、本章遮蓋它（設 −∞）。softmax 是個極度聽話的閥門，你想讓它怎麼分配權重，不用去改它，改它的**輸入**就好。這個觀念到 ch15（線性注意力換掉 softmax）和 ch16（online softmax 分塊算）都還會回來。\n\n## 因果遮罩：把未來設成 −∞\n\n來看具體怎麼做。延用 ch05/ch06 的記號：先有縮放後的分數，再 softmax。遮罩插在中間。\n\n標準的寫法是把遮罩當成一個**加性**矩陣 M 加進分數裡（landscape §2 的原文也是這個形式）：\n\n```text\nAttention(Q, K, V) = softmax( QKᵀ / √d  +  M ) · V\n                                          ↑\n                              M 在 softmax 之前加進分數\n```\n\nM 是一個和注意力分數同形狀的矩陣，它只有兩種值：\n\n```text\nM[i][j] = 0      若 j ≤ i   （位置 j 在 i 的過去或當下，合法 → 不動分數）\nM[i][j] = −∞     若 j > i   （位置 j 在 i 的未來，非法 → 把分數打到 −∞）\n```\n\n讀法：第 i 列代表「站在第 i 個 token 的 query 視角」，第 j 欄代表「它對第 j 個 token 的 key 打的分」。`j > i` 就是「i 想看它右邊的 j」——未來，非法。把那一格的分數加上 −∞（等於覆寫成 −∞），其餘合法格子加 0（不動）。\n\n這個 M 長得像一個下三角全 0、上三角全 −∞ 的矩陣。以三個位置 [1, 2, 3] 為例：\n\n```text\n        j=1    j=2    j=3\ni=1  [   0    −∞     −∞  ]   ← 第 1 個 token：只能看自己\ni=2  [   0     0     −∞  ]   ← 第 2 個 token：能看 1、2\ni=3  [   0     0      0  ]   ← 第 3 個 token：能看 1、2、3（全部過去＋當下）\n        └── 下三角＋對角線 = 0（合法），嚴格上三角 = −∞（未來，遮掉）\n```\n\n注意對角線（i=j，自己看自己）是 0，**合法**——「當下」這個 token 自己當然看得到自己。被遮的只有**嚴格上三角**（j > i，真正的未來）。\n\n然後 softmax 一吃到 −∞，那一格就變成 0：\n\n```text\ne^(−∞) = 0\n```\n\n於是第 i 列做 softmax 時，未來那些格子的指數值是 0，對正規化的分母毫無貢獻，分到的權重剛好是 0。注意力被乾淨地限制在「自己與左邊」。\n\n> **這裡了不起／反直覺在哪**：自注意力的本體——Q/K/V、內積、softmax、加權混合——從頭到尾**一個字都沒改**。要把一個「什麼都能看」的雙向模型，變成一個「只能看過去」的生成模型，你需要的全部改動，就是在分數矩陣上**加一個下三角為 0、上三角為 −∞ 的常數矩陣**。同一套注意力，蓋上不同的遮罩，就是 BERT（雙向）和 GPT（單向）的根本分野（這個分野留到本章最後一節說透）。一個 if-else 等級的小動作，劃出了「理解」與「生成」兩種模型家族。\n\n### 為什麼設 −∞ 而不是設 0：這是本章最該停的地方\n\n幾乎每個人第一次都會問：「要把一個連結『關掉』，直接把它的權重設成 0 不就好了嗎？為什麼要繞一圈設 −∞？」\n\n這個問題問得好，而且答錯的後果很具體。關鍵在於**你想設成 0 的是誰、在哪一步**。\n\n要記住順序：遮罩動的是 **softmax 之前的分數**，不是 softmax 之後的權重。如果你把「分數」設成 0，會發生什麼？分數 0 餵進 softmax，它的指數是 `e⁰ = 1`——**這不是 0，是 1**。也就是說，你以為把那個位置關掉了，實際上 softmax 還是給了它一個 `1 / Σ` 的、不小的權重。它照樣參與了加權混合，未來照樣被偷看了（2026-06 查證，這正是新手最常踩的坑）。\n\n```text\n想關掉未來位置，但設「分數 = 0」：\n   e⁰ = 1  →  softmax 後權重 = 1/Σ ≠ 0   ✗ 沒關掉！它還在投票\n想關掉未來位置，設「分數 = −∞」：\n   e^(−∞) = 0  →  softmax 後權重 = 0/Σ = 0  ✓ 乾淨歸零\n```\n\nsoftmax 是個**指數**閥門，它的「0 點」不在輸入 0，而在輸入 −∞。`exp` 把 −∞ 映成 0，把 0 映成 1。所以「我想讓這個權重變成 0」對應的輸入，是 −∞，不是 0。\n\n換個你熟的角度想：softmax 之後的權重是一個**機率分布**（和為 1，ch05 講過）。你不能直接把分布裡某一項硬塞成 0——那會破壞「和為 1」、整個分布失去意義。正確的做法是在**進入 softmax 之前**就把那一項排除掉，讓 softmax 在「剩下的合法項」上重新正規化。設 −∞ 就是「在正規化之前排除」：被設 −∞ 的項對分母 Σ 沒有貢獻，剩下的合法項自動瓜分掉全部的 1。權重的「和為 1」性質完好無損，只是參與分配的成員少了未來那幾個。\n\n```text\n設 −∞ 的效果，等於「縮小參與 softmax 的集合，再重新正規化」：\n   原本 3 個位置爭奪權重  →  遮掉 1
