| ch06 |\n| softmax saturation | softmax 飽和 | 分數太大時 softmax 被推進「一個權重→1、其餘→0」的飽和區，梯度趨近 0、模型學不動——不縮放會發生的壞事。 | ch06 |\n| self-attention | 自注意力 | Q、K、V 都來自同一序列、每個 token 既是查詢者也是被查者；整張注意力矩陣 QKᵀ 是 n×n。 | ch07 |\n| attention matrix | 注意力矩陣 | n×n 的分數矩陣 QKᵀ，每一格是一對 token 的相似度；它的存在正是 O(n²) 的源頭。 | ch07 |\n| O(n²) complexity | O(n²) 複雜度 | self-attention 對長度 n 要算 n 個 query × n 個 key 共 n² 個分數，計算與記憶體都隨 n 平方成長。 | ch07 |\n| bidirectional attention | 雙向注意力 | 每個 token 都看得到全句兩邊（無遮罩）；encoder 的形態，能一次抓全句關係。 | ch07 |\n| multi-head attention | 多頭注意力 | 把 d_model 切成 h 顆頭、每顆在各自子空間做完整三步骨架，輸出 concat 再過 W_O——讓模型同時抓多種關係。 | ch08 |\n| head | 頭（head） | 多頭注意力裡的一路；各有自己的 W_Q/W_K/W_V，投影到 d_k=d_model/h 維，專注於一種關係（如句法、指代）。 | ch08 |\n| d_model | d_model | 模型主幹向量的維度（原始 Transformer 為 512）；所有 sublayer 與 embedding 輸出皆為它，才好殘差相加。 | ch08 |\n| d_k | d_k | 每顆頭裡 query／key 的維度，d_k=d_model/h（原始為 64，√d_k=8）；縮放就是除以 √d_k。 | ch08 |\n| W_O (output projection) | 輸出投影 W_O | 把多頭 concat 後的向量投影回 d_model 維的矩陣；多頭注意力的收尾一步。 | ch08 |\n\n## Part III — 補上缺的零件：位置、遮罩、跨序列、一整層（ch09–13）\n\n| English | 中文（台灣） | 一句話定義 | 首次出現章 |\n|---|---|---|---|\n| positional encoding | 位置編碼 | 給每個 token 蓋一個「位置戳記」的機制；因為裸 self-attention 看不見順序，位置非外加不可。 | ch09 |\n| permutation invariance | 置換不變性 | 重排輸入 token 不改變對各 token 的注意力權重——self-attention 看不見順序的根本原因（ch19 給嚴格版）。 | ch09 |\n| sinusoidal positional encoding | 正弦位置編碼 | 用不同頻率的 sin/cos 算出的固定位置向量（Vaswani 2017），動機是「相對位置可由線性關係表示」且可外推。 | ch09 |\n| learned absolute positional embedding | 可學習絕對位置嵌入 | 每個位置配一個訓練學出的向量（BERT／GPT-2）；與正弦編碼相對的另一條路。 | ch09 |\n| RoPE (rotary position embedding) | 旋轉位置編碼 | 把 q、k 依「位置」旋轉一個角度（每對維度一個旋轉平面），旋轉後內積只依賴相對位置——2026 開源 LLM 事實標準。 | ch10 |\n| relative position | 相對位置 | 「差幾步」而非「絕對在第幾格」；RoPE 之美就是旋轉後絕對位置自動消去、只剩相對位置進入分數。 | ch10 |\n| ALiBi | ALiBi | 不動 embedding，直接在 q·k 分數上加一個與距離成正比的線性偏置（Press 2021）；利於長度外推。 | ch10 |\n| length extrapolation | 長度外推 | 模型在比訓練更長的序列上還能運作的能力；RoPE 超出訓練長度會失真，正是 Position Interpolation／YaRN 要救的。 | ch10 |\n| mask / masking | 遮罩 | 在 softmax 之前把某些位置的分數覆寫掉的加工；它動的不是公式，是送進 softmax 的那排分數。 | ch11 |\n| causal mask | 因果遮罩 | 把所有「看向未來」(j>i) 的分數設成 −∞、softmax 後變 0；保證生成時第 i 個 token 只看得到 ≤i 的 token。 | ch11 |\n| autoregressive | 自迴歸 | 一個 token 一個 token 往後生成、寫第 i 個時手上只有前 i 個的模式；causal mask 就是為它而設。 | ch11 |\n| padding mask | padding mask（補齊遮罩） | 把為了對齊長度而補進來的空 token 遮掉（分數設 −∞），避免模型把垃圾位置算進注意力。 | ch11 |\n| cross-attention | 交叉注意力 | Q 來自一個序列（decoder）、K/V 來自另一個序列（encoder）的注意力，讓目標端每個位置看遍源端——跨序列查找。 | ch12 |\n| three attention types | 三種注意力 | encoder self（雙向）、decoder masked self（單向）、encoder-decoder cross（跨序列）——三種「誰查誰、能查到哪」的組合。 | ch12 |\n| transformer block | transformer block（一層） | （多頭注意力＋殘差＋LayerNorm）→（FFN＋殘差＋LayerNorm）的一層結構；堆疊 N 層構成一個模型。 | ch13 |\n| residual connection | 殘差連接 | 把某層的輸入直接加回它的輸出的「直通捷徑」；連同 FFN 一起，是阻止純堆 attention 秩坍縮的解藥。 | ch13 |\n| LayerNorm (layer normalization) | 層正規化 | 對每個位置的向量做正規化以穩定數值的鷹架零件；transformer block 裡夾在 attention/FFN 後面。 | ch13 |\n| FFN (feed-forward network) | 前饋網路 | 逐位置（position-wise）作用的兩層非線性 `max(0,xW₁+b₁)W₂+b₂`（內層 d_ff=2048）；注意力混合後的逐位置轉換。 | ch13 |\n| residual stream | 殘差流 | 貫穿各層、被注意力與 FFN 不斷讀寫的主幹向量（ch21 的電路觀點裡，OV 電路把內容寫進的就是它）。 | ch13 |\n| rank collapse | 秩坍縮 | 純 self-attention（無殘差無 MLP）堆深後輸出雙指數地坍縮到秩 1（Dong 2021）；殘差與 FFN 正是解藥。 | ch13 |\n| encoder-only (BERT) | 純編碼器 | 雙向、用於理解的模型家族（如 BERT）。 | ch13 |\n| decoder-only (GPT) | 純解碼器 | 單向、用於生成的模型家族（如 GPT）——今日主流 LLM 形態。 | ch13 |\n| encoder-decoder (T5) | 編碼器-解碼器 | encoder 讀、decoder 寫、中間靠 cross-attention 連接的模型家族（如 T5），用於翻譯／摘要。 | ch13 |\n| next-token prediction | 下一個 token 預測 | 用前文預測下一個 token 的訓練目標（配交叉熵 cross-entropy）；本書一句帶過的訓練鷹架。 | ch13 |\n\n## Part IV — 為什麼是 O(n²)：效率與它的代價（ch14–16）\n\n| English | 中文（台灣） | 一句話定義 | 首次出現章 |\n|---|---|---|---|\n| quadratic bottleneck | 二次方瓶頸 | O(n²) 在長 context 下的爆炸（n=1k 就 100 萬格、n=100k 就 100 億格）；所有高效注意力的共同動機。 | ch14 |\n| \"no index\" full scan | 建不了索引的全表掃描 | 相似度不像可排序／可雜湊的鍵能靠 hash/B-tree 加速，每對 token 都得現算——這就是 attention 為何天生 O(n²)。 | ch14 |\n| sparse attention | 稀疏注意力 | 只算部分 token 對（local 窗口＋少數全域）來省成本，改的是「打分」的連結結構；是近似法（Sparse Transformer/Longformer/BigBird）。 | ch15 |\n| linear attention | 線性注意力 | 把 softmax(qkᵀ) 換成核函數 φ(q)φ(k)ᵀ、用結合律把 (QKᵀ)V 重排成 Q(KᵀV)，O(n²)→O(n)；改的是「正規化」步。 | ch15 |\n| kernel trick | 核技巧 | 用 φ(q)·φ(k) 這種特徵映射的內積取代 softmax 核，讓矩陣乘法可重排——線性注意力省成本的關鍵。 | ch15 |\n| associativity | 結合律 | 矩陣乘法 (A·B)·C = A·(B·C) 的性質；線性注意力靠它把昂貴的 n×n 中間矩陣換成便宜的 d×d。 | ch15 |\n| low-rank | 低秩 | 用遠小於 n 的秩去近似注意力（如 Linformer 把 K/V 投影到低秩）；接《矩陣是動詞》SVD/低秩。 | ch15 |\n| approximation (vs exact) | 近似（相對於精確） | 稀疏與線性注意力省成本的代價——結果不等於標準注意力，常在 token 級精確回憶上吃虧。 | ch15 |\n| memory-bound | 記憶體受限 | 瓶頸在「搬資料」而非「算」的狀態；注意力在推論時正是 memory-bound，省搬比省算更有用。 | ch16 |\n| SRAM / HBM | SRAM／HBM | GPU 記憶體的兩層：SRAM 極快極小（on-chip）、HBM 大但慢一個量級；n×n 矩陣在兩者間來回搬正是瓶頸。 | ch16 |\n| FlashAttention | FlashAttention | IO-aware 的**精確**注意力（非近似）：分塊＋online softmax，不把 n×n 矩陣在 HBM 落地，砍的是搬運次數不是計算次數（Dao 2022）。 | ch16 |\n| tiling | 分塊 | 把 Q/K/V 沿序列維切成小到能整個塞進 SRAM 的小塊逐塊算；FlashAttention 不實體化整張矩陣的辦法。 | ch16 |\n| online softmax | online softmax | 邊掃邊更新 running max 與 running sum 來分塊算 softmax，合併結果與一次算位元級相同（減 running max 還順帶防 overflow）。 | ch16 |\n| MQA (multi-query attention) | 多查詢注意力 | 所有頭共享同一份 K/V、各自 Q（Shazeer 2019）；省推論時的 KV 記憶體與頻寬，改的是頭的 K/V 結構。 | ch16 |\n| GQA (grouped-query attention) | 分組查詢注意力 | 介於 MQA 與完整多頭之間，分組共享 K/V（Ainslie 2023）；被 Llama 2/3 採用。 | ch16 |\n| MLA (multi-head latent attention) | 多頭潛在注意力 | 把 KV 壓到低秩潛在向量大幅省 KV cache（DeepSeek 開創）；softmax 注意力＋低秩 KV，2026 生產主流之一。 | ch16 |\n\n## Part V — 注意力到底是什麼：理論身世（ch17–19）\n\n| English | 中文（台灣） | 一句話定義 | 首次出現章 |\n|---|---|---|---|\n| kernel regression | 核迴歸 | 拿相似的鄰居加權平均來估計目標值的統計方法；attention 就是它的可學習、可微分、可平行版本（Tsai 2019）。 | ch17 |\n| Nadaraya-Watson estimator | Nadaraya-Watson 估計量 | 核迴歸最經典的版本（Nadaraya 1964、Watson 1964）：query＝查詢點、key＝樣本位置、value＝樣本值、softmax＝核。 | ch17 |\n| kernel function | 核函數 | 吃進「兩點的距離」吐出「相似度分數」的函數 K（距離越近分數越高，如高斯核）；attention 用的核是 exp(內積)。 | ch17 |\n| conditional expectation | 條件期望 | 「在這個 query 條件下 value 的平均」；attention 的加權混合骨子裡就是它的估計（接《馴服隨機》加權平均=期望）。 | ch17 |\n| associative memory | 聯想記憶 | 拿一條模糊／殘缺的線索去查容錯記憶庫、檢索出最像那筆完整模式的機制；attention 就是它的軟性可微版。 | ch18 |\n| content-addressable memory | 內容定址記憶 | 不靠位址、靠「內容彼此的相似度」來取資料的記憶體；聯想記憶的關鍵詞，對到 attention 的軟性字典查找。 | ch18 |\n| modern Hopfield network | 現代 Hopfield 網路 | 連續狀態的 Hopfield 更新規則，被證明與 Transformer attention 一模一樣（Ramsauer 2020）；可指數級儲存、一步檢索。 | ch18 |\n| β (inverse temperature) | β（逆溫度） | 現代 Hopfield 裡控制檢索「尖銳—模糊」的參數；β 越大（溫度越低）檢索越像硬查找（接 ch05–06 的溫度）。 | ch18 |\n| permutation equivariance | 置換等變 | 重排輸入則輸出跟著重排、但內容不變（SelfAttn(P·X)=P·SelfAttn(X)）；attention 把輸入當集合處理的深層身分。 | ch19 |\n| set operation | 集合運算 | attention 本質是作用在「一袋無序東西」上的運算，所以對順序無感、位置非外加不可（回收 ch09）。 | ch19 |\n| message passing / GNN | 訊息傳遞／GNN | self-attention＝在全連接圖上、用 softmax(q·k) 當學出來的邊權重做一輪訊息傳遞（接你做過的 gossip/聚合）。 | ch19 |\n| universal approximation | 通用近似 | 在足夠頭與維度下，attention 可近似一大類序列函數的性質；本書給直覺、嚴格前提指向延伸。 | ch19 |\n| Turing-completeness | 圖靈完備 | 加上精度與位置假設後 Transformer 可模擬圖靈機（Pérez et al.）；前提很多，本書明寫前提、不誇大。 | ch19 |\n| sigmoid attention | sigmoid 注意力 | 把 softmax 換成 sigmoid 的注意力（Apple 2024）；softmax 替代品之一，動的是「正規化」步，⚠️ 領域演變快、softmax 多數仍領先。 | ch19 |\n\n## Part VI — 看進黑盒與它的未來（ch20–23）\n\n| English | 中文（台灣） | 一句話定義 | 首次出現章 |\n|---|---|---|---|\n| interpretability | 可解釋性 | 想搞懂「模型為什麼這樣算」的研究方向；本書分成「注意力權重算不算解釋」（ch20）與「機制可解釋性」（ch21）兩層。 | ch20 |\n| attention as explanation | 注意力即解釋（論戰） | 「能不能把注意力熱圖當模型決策的解釋」這場至今未定論的嘴仗（Jain & Wallace 2019 vs Wiegreffe & Pinter 2019）。 | ch20 |\n| faithfulness | 忠實性 | 解釋是否「真的反映模型內部的決策過程」（模型確實據此運作）；論戰雙方常被混在一起的兩個詞之一。 | ch20 |\n| plausibility | 合理性 | 解釋是否「讓人覺得合理、符合直覺」；合理不保證忠實——越漂亮的熱圖越危險，正因為合理可能就是它被你接受的全部原因。 | ch20 |\n| head specialization / pruning | 頭專門化／剪枝 | 少數「重要頭」扛大部分工作、可剪掉許多頭只損極少效能（Voita 2019 剪 48 頭中的 38 只損 0.15 BLEU）。 | ch20 |\n| attention sink | attention sink | 模型把大量注意力倒給某些「不太相關」的位置（常是首個 token）當「洩壓閥」的現象；提醒熱圖未必反映語意。 | ch20 |\n| mechanistic interpretability | 機制可解釋性 | 不問權重、直接把注意力頭拆成可讀「電路」來逆向理解模型在算什麼的路線（Anthropic 的 Transformer Circuits）。 | ch21 |\n| QK circuit | QK 電路 | 一顆頭裡決定「看序列哪一格」的定址邏輯，併成 W_QK=W_Q·W_Kᵀ；對到三步骨架的「打分＋正規化」。 | ch21 |\n| OV circuit | OV 電路 | 一顆頭裡決定「從那一格搬什麼內容過來、寫進殘差流」的搬運邏輯，併成 W_OV=W_V·W_O；對到「加權混合」。 | ch21 |\n| induction head | induction head（歸納頭） | 學會「上次這個 pattern 後面接什麼就照抄」（`[A][B]…[A]→[B]`）的小程式；其出現時機對上 in-context learning 突增。 | ch21 |\n| in-context learning (ICL) | 脈絡內學習 | 模型不更新權重、只靠 prompt 裡的範例就學會新任務的能力；induction head 被認為是它的機制來源（Olsson 2022）。 | ch21 |\n| state space model (SSM) | 狀態空間模型 | 把整段歷史壓進一個固定大小狀態、每步只更新它的 O(n) 序列模型；挑戰 attention 的另一條路，祖宗是控制論。 | ch22 |\n| fixed-size state | 固定大小狀態 | SSM 用來裝歷史的那個不隨長度成長的狀態向量；它讓 SSM O(n) 且不爆 KV，代價是細節會漏（精確回憶受損）。 | ch22 |\n| S4 | S4 | 用 HiPPO 數學框架構造狀態矩陣、讓固定狀態最優記住長程歷史的 SSM（Gu, Goel & Ré 2021）；Long Range Arena SOTA。 | ch22 |\n| HiPPO | HiPPO | 用正交多項式投影去逼近過去訊號的數學配方；S4 靠它設計「怎麼衰退才不丟長程資訊」。 | ch22 |\n| Mamba | Mamba | 選擇性（selective）SSM——讓參數變成輸入的函數、能「該記的多記、廢話跳過」（Gu & Dao 2023）；線性時間。 | ch22 |\n| SSD (state space duality) | 狀態空間對偶 | 「Transformers are SSMs」（Mamba-2，2024）證明 SSM 是因果線性注意力的特例的對偶之美（接 ch15）。 | ch22 |\n| hybrid architecture | 混合架構 | 以小比例（如 1-in-8~10）注意力層保留精確回憶、其餘用 Mamba/線性層的設計（如 Jamba）；2026 的新共識。 | ch22 |\n| \"attention is all you need\"? | 「attention is all you need」還成立嗎 | 2026-06 的誠實答案：softmax 仍主導生產級 LLM、混合是新共識、純 SSM 未稱霸，長期勝者未定論。 | ch22 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n這份附錄把全書 23 章「## 延伸閱讀」段落的連結，加上 landscape 驗證過的資源，去重後攤成一張地圖。它不是把每章的清單抄一遍，而是按「你讀完這本書之後想往哪走」分成三條路線：往**理論**（注意力到底是什麼）、往**實作**（怎麼上手、怎麼看見它）、往**前沿**（2026 的位置編碼、效率、架構之爭）。\n\n讀法約定：每一條都標「為什麼讀、讀哪一段」。資源若是 landscape 錨定過的論文，作者／年份／arXiv 編號照本檔；若是各章已標「（2026-06 查證）」的部落格或教材，我沿用其驗證狀態；沒把握的就明寫「（未逐一驗證 URL）」。前沿那一節的時效性事實一律標時點，並區分「已驗證事實」與「趨勢／推測」——架構之爭到 2026-06 尚無定論，不要把任何一條讀成終局。\n\n全書一再回扣的鄰書銜接點，集中放在最後一節，不在三條路線裡重複。\n\n```text\n                    讀完《注意力機制的原理》之後，三條岔路\n\n  往理論（這東西到底是什麼）          往實作（怎麼上手 / 看見它）\n  核迴歸 → Hopfield → 集合運算       Illustrated Transformer → Karpathy\n  → 表達力 → 可解釋性                → D2L 動手 → 視覺化教材\n            │                                    │\n            └──────────────┬─────────────────────┘\n                           │\n                    往前沿（2026 還在動的部分）\n              RoPE/YaRN → FlashAttention → SSM/Mamba\n                    → 2026 混合架構（趨勢、未定）\n```\n\n---\n\n## 路線一：往理論 — 注意力到底是什麼\n\n這條路線回答「三步骨架（打分→正規化→加權混合）究竟是什麼東西」。本書 ch17–ch19 已經把它從三個視角拆開（統計、記憶、集合），這裡給每個視角的原始出處，再加上表達力與可解釋性兩支延伸。\n\n- **Tsai et al. 2019「Transformer Dissection: A Unified Understanding of Transformer's Attention via the Lens of Kernel」**（arXiv 1908.11775，EMNLP-IJCNLP 2019）。ch17 的學術源頭。系統性地把注意力寫成 kernel smoother（核平滑器），並明說放寬了「核需對稱半正定」的要求。讀第 3 節的 kernel 重構，對照本書「加權混合＝條件期望」那條線。https://arxiv.org/abs/1908.11775\n- **Dive into Deep Learning,「Attention Pooling: Nadaraya-Watson Kernel Regression」**。把「注意力＝核迴歸」講得最清楚、最動手的一篇教材，ch17 的 1 維房價例子就出自它的高斯核式子；想看「非參數→頻寬可學的參數化」怎麼自然過渡到注意力，讀這篇。https://classic.d2l.ai/chapter_attention-mechanisms/nadaraya-watson.html\n- **Ramsauer et al. 2020「Hopfield Networks is All You Need」**（arXiv 2008.02217，NeurIPS 2020）。ch18 的源頭：連續狀態的現代 Hopfield 更新規則等價於 attention，β=1/√d_k。先讀摘要與 Figure 1，再看「Modern Hopfield Networks」那節的更新規則與收斂；容量定理可略過，抓「更新規則＝attention」這個主結論即可。https://arxiv.org/abs/2008.02217\n- **ml-jku「Hopfield Networks is All You Need」部落格**。上面那篇論文的官方科普版，把更新規則、β 的作用、三種能量極小（全局平均／亞穩態／單筆）畫成圖（2026-06 查證）；比論文好入口，配 ch18「β 旋鈕」那節讀。ml-jku.github.io/hopfield-layers\n- **Krotov & Hopfield 2016「Dense Associative Memory for Pattern Recognition」**（arXiv 1606.01164）。容量從 0.14N 跳成多項式級的轉折，是 Ramsauer 連續版的前一站；想看「坑挖得更尖→存得更多」的數學直覺，讀它的能量函數那節。https://arxiv.org/abs/1606.01164\n- **Lee et al. 2019「Set Transformer」**（arXiv 1810.00825，ICML 2019）。ch19 的源頭：把「attention 處理集合」做成正式框架。讀 SAB（置換等變的 self-attention）與 PMA（置換不變的池化）的定義，看「等變零件＋不變池化」如何拼出處理集合的網路。https://arxiv.org/abs/1810.00825\n- **Veličković et al. 2017「Graph Attention Networks」**（arXiv 1710.10903，ICLR 2018）。反方向的證據：把 self-attention 搬進圖神經網路，attention 變成「聚合鄰居時的邊權重」。讀引言它怎麼把 attention 定位成 GNN 的訊息傳遞權重——「attention＝學出來的邊權重」這句就坐實了。https://arxiv.org/abs/1710.10903\n- **Dong et al. 2021「Attention is Not All You Need: Pure Attention Loses Rank Doubly Exponentially with Depth」**（arXiv 2103.03404，ICML 2021 oral）。表達力的關鍵負面結果，ch06／ch13／ch19 共同回扣。先看 Figure 1（純 attention 雙指數坍縮到秩 1）與摘要主結論，再看它怎麼證殘差與 MLP 阻止坍縮；這是「為何一層裡需要殘差與 FFN」的數學依據。標題故意反 Vaswani 那句，是這領域的標題梗之一。https://arxiv.org/abs/2103.03404\n- **Pérez et al.「Attention is Turing-Complete」**（JMLR 2021，v22/20-302）。表達力上限：在任意精度＋無界長度的理想化下，Transformer 可模擬圖靈機。重點不是讀完證明，而是抓住這個結論與它的前提，對照 ch19「有限精度下其實是有限狀態機」的誠實版。（未逐一驗證 URL）\n- **Apple 2024「Theory, Analysis, and Best Practices for Sigmoid Self-Attention」**（arXiv 2409.04431，ICLR 2025）。softmax 不是唯一解的代表作：證明 sigmoid attention 的 Transformer 仍是通用近似器，FlashSigmoid 在 H100 比 FA2 推論核快 17%。對照 ch19「sigmoid 放棄了競爭性」這個取捨。⚠️ 替代品領域演變快（2026-06），讀時標時點。https://arxiv.org/abs/2409.04431\n- **Jain & Wallace 2019「Attention is not Explanation」**（NAACL 2019，arXiv 1902.10186）。可解釋性論戰的第一拳（ch20）。讀 §3–4 的反事實測試設計（梯度／leave-one-out 對齊、對抗權重），那是「怎麼嚴謹地測一個解釋」的範本，比結論本身更值得學。https://arxiv.org/abs/1902.10186\n- **Wiegreffe & Pinter 2019「Attention is not not Explanation」**（EMNLP-IJCNLP 2019，arXiv 1908.04626）。反擊。讀它對「解釋」定義的拆解與「存在不等於排他」那段——這是 ch20「忠實（faithfulness）vs 合理（plausibility）」框架的源頭。⚠️ 此論戰至今（2026-06）無共識，兩派分歧本質是「解釋」定義之爭，不是事實對錯。https://arxiv.org/abs/1908.04626\n- **Clark et al. 2019「What Does BERT Look At?」**（BlackboxNLP 2019，arXiv 1906.04341）。某些頭對應到語法關係（直接賓語、限定詞、介詞賓語）與共指的具體證據；也讀它對「砸在 [SEP] 上」的誠實討論——那是 attention sink 的近親。https://arxiv.org/abs/1906.04341\n- **Voita et al. 2019「Analyzing Multi-Head Self-Attention」**（ACL 2019，arXiv 1905.09418）。ch08「頭會專門化、但有冗餘」與 ch20「冗餘≠無意義」共同的支柱。讀它怎麼定義「重要頭」與其語言學角色——48 頭剪掉 38 只損 0.15 BLEU 的出處就在這。https://arxiv.org/abs/1905.09418\n\n---\n\n## 路線二：往實作 — 怎麼上手、怎麼看見它\n\n這條路線給「想把直覺變成能跑、能看見的東西」的讀物：原始論文、視覺化圖解、動手教材。本書是原理書，不教 PyTorch 樣板與訓練工程（那些指向《從後端到 AI Infra》），但這裡的視覺化與動手資源能把紙上推演接到螢幕上。\n\n- **Vaswani et al. 2017「Attention Is All You Need」**（arXiv 1706.03762，NeurIPS 2017）。全書反覆引用的原始論文，也是脊椎機制的唯一權威來源。讀完全書再回讀 §3.2（縮放點積與多頭）會豁然開朗：每個符號你都已有白話直覺在旁邊。注意脊椎那個 it 的例句**不**出自本論文（見下方「實作前先記住」）。https://arxiv.org/abs/1706.03762\n- **Jay Alammar「The Illustrated Transformer」**。全網最好的 Transformer 圖解入門，本書脊椎句子的視覺化普及來源。先看「self-attention 怎麼讓 it 連到 animal」建立直覺，再看「Self-Attention in Detail」對照 ch04 的 worked example，多頭那節對照 ch08，「Residuals／The Decoder Side」對照 ch12–ch13。讀完全書後當「視覺版的本書」逐章對照（2026-06 仍可存取）。https://jalammar.github.io/illustrated-transformer/\n- **Jay Alammar「Visualizing A Neural Machine Translation Model」**。Bahdanau 對齊的互動視覺化，把「生每個目標詞時權重在源句上移動」畫成動畫（ch03）。看一次勝過讀十頁加性注意力。https://jalammar.github.io/visualizing-neural-machine-translation-mechanics-of-seq2seq-models-with-attention/\n- **Google AI 部落格「Transformer: A Novel Neural Network Architecture for Language Understanding」**（2017-08）。脊椎那個「it 指代」視覺化例子的原始出處（**不是**原論文）。讀它對「Transformer 解決了什麼」的官方一段話，當作 ch02–ch03「注意力來解決什麼痛」的官方版引子。https://research.google/blog/transformer-a-novel-neural-network-architecture-for-language-understanding/\n- **3Blue1Brown「But what is a GPT? / Attention in transformers」（影片）**。把「向量在空間裡被注意力推來推去」動畫化的視覺直覺，適合讀本書前後各看一次，與三步骨架互補（搜尋頻道名稱即可，連結常變動，未逐一驗證 URL）。\n- **Sebastian Raschka「Causal Attention」FAQ**。把「為什麼 GPT 不能看未來 token」用最少廢話講清楚，附三角遮罩的圖；和 ch11 的雙向 vs 單向那節互補（2026-06 查證）。https://sebastianraschka.com/faq/docs/causal-attention.html\n- **MachineLearningMastery「A Gentle Introduction to Attention Masking」**。把 causal mask 和 padding mask 兩種遮罩放在一起講、附程式，補齊 ch11 padding mask 那節的工程細節（2026-06 查證）。https://machinelearningmastery.com/a-gentle-introduction-to-attention-masking-in-transformer-models/\n- **「Why Do We Use Negative Infinity for Masking in Attention?」（Medium, 2026-01）**。專門講「為什麼遮罩用 −∞ 不是 0」這一個點，並提到實作上用大負數（如 float16 的 −65504）避免 NaN——正好對應 ch11 故障表第三列（2026-06 查證）。https://medium.com/@sachinkalsi/why-do-we-use-negative-infinity-for-masking-in-attention-450c59274ac8\n- **APXML「Computational Complexity of Self-Attention」**。把 O(n²·d) 的時間與 O(n²) 的空間拆解得很清楚（QKᵀ 是 n×d 乘 d×n、結果 n×n），ch07 複雜度論證的對照讀物。讀它確認「n×n 矩陣」就是平方複雜度的唯一來源。https://apxml.com/courses/foundations-transformers-architecture/chapter-6-advanced-architectural-variants-analysis/self-attention-complexity\n- **Michael Brenndoerfer「Attention Complexity: Quadratic Scaling, Memory Limits & Efficient Alternatives」**。把 O(n²) 的時間與空間、長 context 下的記憶體牆拆得很白話的 2026 讀物，對照 ch14 那張 n vs n² 成長表。https://mbrenndoerfer.com/writing/attention-complexity-quadratic-scaling-memory-efficient-transformers\n- **EleutherAI「Rotary Embeddings: A Relative Revolution」**。最好讀的 RoPE 直覺文，把「內積只剩相對位置」用複數 e^{i(m−n)θ} 講得乾淨，與 ch10 的旋轉矩陣版互為鏡頭（2026-06 查證）。blog.eleuther.ai/rotary-embeddings\n\n---\n\n## 路線三：往前沿 — 2026 還在動的部分\n\n> 本節高度時效，事實一律標 `（2026-06）`，並區分「已驗證事實」與「趨勢／推測」。架構之爭尚無定論，不要把任何一條讀成終局。\n\n### 位置編碼：RoPE 與長度外推\n\n- **Su et al. 2021「RoFormer: Enhanced Transformer with Rotary Position Embedding」**（arXiv 2104.09864）。RoPE 原始論文（ch10 主角）。讀第 3 節的推導（2 維旋轉、推廣到 d 維、long-term decay），對照本書的證明看原文怎麼用複數寫。RoPE 已是 2026 主流開源 LLM 的事實標準（Llama 2/3、Gemma、Mistral、Qwen、DeepSeek-V3 等皆採其變體）（2026-06，已驗證但開源版本更新頻繁，標時點）。https://arxiv.org/abs/2104.09864\n- **Press et al. 2021「Train Short, Test Long: Attention with Linear Biases」（ALiBi）**（arXiv 2108.12409，ICLR 2022）。不動 embedding，直接在 q·k 分數上加與距離成正比的線性偏置，利於長度外推。讀它怎麼用這個極簡想法換到好的外推——ch10 對照表那一格的出處。⚠️（2026-06）ALiBi 採用率遠低於 RoPE。https://arxiv.org/abs/2108.12409\n- **Chen et al. 2023「Extending Context Window via Position Interpolation」**（arXiv 2306.15595）與 **Peng et al. 2023「YaRN」**（arXiv 2309.00071，ICLR 2024）。外推失效的兩個主流救法：線性壓縮位置索引（PI）、NTK-by-parts 分頻率＋調注意力溫度（YaRN）。對應 ch10 故障模式那節；配 RoPE 可外推到 256k+（2026-06）。https://arxiv.org/abs/2306.15595 https://arxiv.org/abs/2309.00071\n\n### 效率：精確省搬運與共享 K/V\n\n- **Dao et al. 2022「FlashAttention: Fast and Memory-Efficient Exact Attention with IO-Awareness」**（arXiv 2205.14135）。ch16 主角。標題裡的 **Exact** 與 **IO-Awareness** 就是重點：精確、不是近似，關鍵在減少 HBM 搬運。讀 §3 的分塊（tiling）與 online softmax 推導，對照 ch16 手算的脊椎兩塊例子。FA2（2023，約 2×）、FA3（2024-07，NeurIPS 2024，用 Hopper 非同步與 FP8）的版本數字屬系統面，指向《從後端到 AI Infra》（2026-06 查證）。https://arxiv.org/abs/2205.14135\n- **Milakov & Gimelshein 2018「Online normalizer calculation for softmax」**（arXiv 1805.02867）。online softmax 的源頭論文（早於 FlashAttention），把「邊掃邊更新 running max/sum」的遞推講得最乾淨。FlashAttention 是把這想法搬到注意力＋GPU SRAM 上。讀它理解校正因子的數學（2026-06 查證）。https://arxiv.org/abs/1805.02867\n- **Shazeer 2019「Fast Transformer Decoding: One Write-Head is All You Need」（MQA）**（arXiv 1911.02150）。所有頭共享一份 K/V、各自 Q，省推論記憶體頻寬。又是一個「X is all you need」梗（ch16）。https://arxiv.org/abs/1911.02150\n- **Ainslie et al. 2023「GQA: Training Generalized Multi-Query Transformer」**（arXiv 2305.13245，EMNLP 2023）。分組共享 K/V，在 MQA 速度與 MHA 品質間取折衷；僅 5% 預訓練算力即可從多頭 checkpoint 微調成 GQA——這是它被 Llama 2/3 廣泛採用的原因（2026-06）。https://arxiv.org/abs/2305.13245\n- **Tay et al. 2020「Efficient Transformers: A Survey」**（arXiv 2009.06732）。把「對付 O(n²)」的各路線（稀疏、低秩／線性、記憶體／IO）系統性分類的綜述（ch14／ch15）。讀它的分類框架看全景，但注意它是 2020 的快照，之後 FlashAttention 改變了局面。https://arxiv.org/abs/2009.06732\n- **稀疏與線性注意力代表作**（ch15）：**Child et al. 2019「Sparse Transformers」**（arXiv 1904.10509，固定 local＋strided 模式，O(n√n)）、**Katharopoulos et al. 2020「Transformers are RNNs」**（ICML 2020，用結合律把 O(n²) 降到 O(n)、自迴歸時變成 RNN 遞推——接 SSM 的伏筆）、**Choromanski et al. 2020「Performer」**（arXiv 2009.14794，FAVOR+ 隨機特徵近似 softmax 核）、**Wang et al. 2020「Linformer」**（arXiv 2006.04768，K/V 投影到低秩，O(n)）。兩條路都是**近似**（用精確回憶換速度），與 FlashAttention 的「不近似也能省」恰成對照（2026-06 查證）。https://arxiv.org/abs/1904.10509\n\n### 架構之爭：SSM、Mamba 與混合\n\n- **Gu, Goel & Ré 2021「Efficiently Modeling Long Sequences with Structured State Spaces」（S4）**（arXiv 2111.00396，ICLR 2022）。SSM 這條線的奠基作，建在 HiPPO（正交多項式投影）數學上。想懂「為什麼固定狀態能記長程」讀它的動機與 Long Range Arena 結果，HiPPO 數學細節可先略過（ch22）。https://arxiv.org/abs/2111.00396\n- **Gu & Dao 2023「Mamba: Linear-Time Sequence Modeling with Selective State Spaces」**（arXiv 2312.00752，COLM 2024）。選擇性 SSM，序列長度線性時間、約 5× Transformer 吞吐量。讀「選擇性」那節——B/C 變成輸入的函數，是 Mamba 對 S4 的關鍵一改，對照 ch22「重要 token 多記」的直覺。https://arxiv.org/abs/2312.00752\n- **Dao & Gu 2024「Transformers are SSMs: Structured State Space Duality」（Mamba-2/SSD）**（arXiv 2405.21060，ICML 2024）。ch22「對偶之美」的源頭：用半可分矩陣把 SSM 與**線性注意力**接起來（注意接的是線性注意力，不是 softmax）。Mamba-2 主要改訓練（快 2–8×），非推論。https://arxiv.org/abs/2405.21060\n- **Together.ai 2026「Mamba-3」**（arXiv 2603.15569，ICLR 2026）。最新一代 SSM：複數值狀態更新（呼應 ch10 的旋轉位置）、MIMO 變體，為推論優化（同困惑度下狀態減半、H100 長序列快 7×）。frontier 資料，讀時標 2026 時點（2026-06，已驗證事實）。https://arxiv.org/abs/2603.15569\n- **NVIDIA「Nemotron-H: A Family of Accurate and Efficient Hybrid Mamba-Transformer Models」**（arXiv 2504.03624，2025）。生產級混合的代表，讀「換掉約 92% 注意力層」的設計取捨與吞吐量數字（ch22）。https://arxiv.org/abs/2504.03624\n- **AI21 部落格「Attention was never enough: Tracing the rise of hybrid LLMs」**。混合架構的脈絡與動機綜述（Jamba 出身），把「為什麼是混合不是替代」講得最白；搭配 ch22 的 2026 現況節讀（未逐一驗證 URL）。ai21.com\n- **⚠️ 2026-06 整體現況（趨勢、非終局）**：softmax 注意力仍主導生產級 LLM（GPT-5 系列、Claude、Gemini 等）；新共識傾向「混合」——以小比例（約 1-in-8 ～ 1-in-10）注意力層保留檢索能力、其餘用 Mamba／線性層（Qwen、Nemotron、IBM Bamba 等已出貨企業級混合）。**不存在大規模純 SSM 模型稱霸市場**。純 SSM vs 混合 vs 改進 softmax 的長期勝者**未定論**。本書講「為什麼會有這條路、SSM↔attention 的對偶之美、2026 的混合共識」；生產部署／KV 工程指向《從後端到 AI Infra》。\n\n---\n\n## 如果只看三樣\n\n時間有限，照你想去的方向各挑一樣，三樣合起來剛好覆蓋「看見它、理解它、追上它」：\n\n1. **看見它 — Jay Alammar「The Illustrated Transformer」**。讀完全書後當「視覺版的本書」逐章對照，每張圖你都指得出對應哪一章、哪一步。把紙上的三步骨架接到圖上，直覺立刻立體。\n2. **理解它 — Tsai et al. 2019「Transformer Dissection（核迴歸視角）」**。它把「注意力＝以相似度為核的加權平均」這件事講到根上，是 ch17–ch19「理論身世」三章裡最好的單一入口；讀完你會確信三步骨架是被重新發現的，不是被發明的。\n3. **追上它 — Dao & Gu 2024「Transformers are SSMs（SSD 對偶）」**。它把 SSM 與線性注意力縫在一起，是理解 2026 架構之爭的鑰匙；讀它就懂為什麼前沿不是「拋棄注意力」而是「混合」。讀時記得標 2026 時點，現況仍在動。\n\n若連三樣都嫌多：**只讀 Vaswani et al. 2017 原論文的 §3.2**，配著本書當白話注解。讀完全書再回看，每個符號都有直覺在旁——這是全書脊椎機制的唯一權威來源（脊椎那句 it 例句除外，它出自 Google 2017 部落格）。\n\n---\n\n## 書架鄰書銜接點\n\n本書把直覺給足了，運算與系統的深度，在書架上的鄰書等你。以下是全書反覆指向的五個接點，按「往哪個深度走」整理。\n\n| 想往哪個深度走 | 去哪本書 | 接什麼、本書在哪章指過去 |\n| --- | --- | --- |\n| 線代運算深度 | 《矩陣是動詞》 | 內積即相似度（ch04 打分、ch17 兩種核一家）；矩陣乘法即批量內積與結合律（ch03、ch07、ch15 重排乘法順序）；投影與子空間（ch08 多頭切子空間）；SVD／低秩近似（ch15 Linformer、ch16 MLA、ch21 QK/OV 低秩） |\n| 系統與部署 | 《從後端到 AI Infra》 | tokenizer／embedding 進場與「一張建不了索引的表」（ch04、ch14）；KV cache 與管理（ch11、ch13、ch16、ch22）；FlashAttention 系統面、量化、推論物理（ch16） |\n| RoPE 的底層 | 《圓的影子》 | 旋轉矩陣 R(a)R(b)=R(a+b) 與複數 e^{iθ}（ch09 相對位置＝旋轉、ch10 RoPE、ch22 Mamba-3 複數值狀態）——全書最漂亮的跨書接點 |\n| 機率語義 | 《馴服隨機》 | softmax 輸出是合法機率分布（ch05、ch06、ch20）；加權平均＝期望、條件期望＝迴歸要估的東西（ch17）；溫度與熵、β 是逆溫度、softmax 是 Boltzmann 分布（ch18）；相關≠因果（ch20） |\n| 訓練的數學 | 《馴服無限》 | 為什麼可微分才能訓練、梯度下降為何需要斜率（ch05）；梯度消失的完整數學、softmax 的 Jacobian 與反向傳播（ch06、ch17） |\n\n### 實作前先記住：脊椎例句的出處\n\n全書脊椎句子「the animal didn't cross the street because it was too tired」的代名詞消解例子，**不在**原始論文（arXiv 1706.03762）裡。它首見於 **Google AI 官方部落格 2017-08**（〈Transformer: A Novel Neural Network Architecture for Language Understanding〉），後經 **Jay Alammar「The Illustrated Transformer」** 廣為流傳。引用時要寫「出自 Google 2017 部落格、經 Illustrated Transformer 普及」，**不可說它出自原論文**——這是全書反覆強調的一個小而要命的事實。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "注意力機制史實與現況基準表（landscape-2026-06）", "md": "---\nlast_verified: 2026-06-13\nreview_after_days: 120\nstatus: research-agent-verified\nsource: web research 2026-06-13（8 群集 fan-out＋爭議項第二輪覆核，16 agents）\n---\n\n# 注意力機制史實與現況基準表（landscape-2026-06）\n\n本檔是《注意力機制的原理》全書「歷史、人物、論文、歸屬、年份、2026 現況」的權威錨點。各章**數學自證**（公式、推導、脊椎數字不靠本檔）；本檔管**外部可驗證的事實**：年份、論文標題、arXiv 編號、作者、發表場合、採用情形、爭議與誤傳。\n\n使用規約：\n- 凡引用日期／歸屬／論文，作者請對照本檔，不要憑記憶。\n- ⚠️ 標記 = 來源不一致、常被誤傳、爭議未定、或快速演變（尤其 2026 現況）。看到 ⚠️ 請照本檔給的保守版寫，並標時點 `（2026-06）`。\n- 來源優先序：arXiv／原始論文／官方會議頁／官方部落格 > Wikipedia > 一般部落格。\n- **時效性事實（frontier 章）一律標 `（2026-06）` 並區分「已驗證事實」與「趨勢/推測」。**\n\n---\n\n## 一、前傳：Transformer 之前的注意力（2013–2015）\n\n### seq2seq 與固定向量瓶頸\n- **Sutskever, Vinyals & Le 2014「Sequence to Sequence Learning with Neural Networks」**（arXiv 1409.3215，提交 2014-09，NIPS 2014）。三層 LSTM encoder 把整個輸入序列壓成一個**固定維度向量**，decoder 從它解碼；WMT'14 英法達 34.8 BLEU。這個固定向量就是後來注意力要打破的瓶頸。\n- **Cho et al. 2014「Learning Phrase Representations using RNN Encoder–Decoder」**（EMNLP 2014，pp. 1724–1734）：encoder-decoder 架構、首次引入 **GRU**。作者含 Cho、Bahdanau、Bengio 等。\n- 來源：https://arxiv.org/abs/1409.3215 ；https://aclanthology.org/D14-1179/\n\n### Bahdanau 2014：第一個 NMT 注意力（加性）\n- **Bahdanau, Cho & Bengio「Neural Machine Translation by Jointly Learning to Align and Translate」**（arXiv 1409.0473，提交 2014-09，ICLR 2015）。引入「對齊模型（alignment model）」讓 decoder 在生成每個目標詞時**動態加權**源句各隱態，直接解決固定向量瓶頸。加性/加法注意力（additive attention）評分：`score(s, h) = vᵀ tanh(W[s; h])`。\n- **這是首篇在 NMT 脈絡正式命名「attention mechanism」的論文。**\n- 來源：https://arxiv.org/pdf/1409.0473 ；https://aclanthology.org/D15-1166/\n\n### Luong 2015：乘性/點積注意力\n- **Luong, Pham & Manning 2015「Effective Approaches to Attention-based NMT」**（EMNLP 2015，pp. 1412–1421）。提出三種評分：dot-product、general（乘性）、location-based；區分 global vs local attention。**現代 scaled dot-product attention 的乘性形式直接源於此。**\n- 來源：https://aclanthology.org/D15-1166/\n\n### Graves 的可微分注意力雛形（更早的一條線）\n- **Graves 2013「Generating Sequences With RNNs」**（arXiv 1308.0850）：手寫合成裡用高斯核混合的可微分「位址」機制（可視為注意力雛形）。\n- **Graves, Wayne & Danihelka 2014「Neural Turing Machines」**（arXiv 1410.5401）：用可微分注意力讀寫外部記憶——「軟性內容定址記憶體」的直接前身（ch18 Hopfield 會回扣）。\n- 來源：https://arxiv.org/abs/1308.0850 ；https://arxiv.org/abs/1410.5401\n\n#### ⚠️ 「誰最早發明 attention」的歸屬\n- 現代共識：**Bahdanau et al. 2014** 是「attention mechanism」一詞在 NMT 的正式確立者。Graves 2013 用了可微分注意力但未命名為 mechanism。\n- ⚠️ Jürgen Schmidhuber 曾主張其 1991–1992 早期工作（\"Fast Weight Programmers\"）最早，但查檢其論文並未明確使用該術語。寫作時：歸屬給 Bahdanau 2014（NMT 注意力的確立），可一句話提 Graves 的更早雛形與 Schmidhuber 的爭議，**不選邊**。\n\n---\n\n## 二、Transformer（2017）：原始論文的精確事實\n\n**Vaswani et al. 2017「Attention Is All You Need」**（arXiv 1706.03762，提交 2017-06-12，NeurIPS 2017）。8 位作者：Ashish Vaswani、Noam Shazeer、Niki Parmar、Jakob Uszkoreit、Llion Jones、Aidan N. Gomez、Łukasz Kaiser、Illia Polosukhin。**第一個完全靠 self-attention、不用 recurrence 或 convolution 的轉導（transduction）模型。**\n\n可直接引用的精確事實（全部出自論文，來源 https://arxiv.org/abs/1706.03762 與 HTML 版 https://arxiv.org/html/1706.03762v7 ）：\n\n- **縮放點積注意力**（§3.2.1）：`Attention(Q,K,V) = softmax(QKᵀ / √d_k) V`。\n- **為何除以 √d_k**（§3.2.1 腳註）：假設 q、k 各分量獨立、均值 0、變異數 1，則 `q·k = Σ qᵢkᵢ` 的**變異數為 d_k**；d_k 大則內積分布變寬，把 softmax 推進梯度極小的飽和區，故除以 √d_k 把變異數拉回 ~1。（這正是 ch06 的核心，數學自證即可。）\n- **多頭超參數**（§3.2.2）：h=8 顆頭，d_model=512，d_k=d_v=d_model/h=**64**。\n- **層數**（§3.1）：encoder、decoder 各 N=6 層相同結構；所有 sublayer 與 embedding 輸出皆 d_model=512（為了殘差相加）。\n- **FFN**（§3.3）：`FFN(x)=max(0, xW₁+b₁)W₂+b₂`，內層 d_ff=2048。\n- **正弦位置編碼**（§3.5）：`PE(pos,2i)=sin(pos/10000^(2i/d_model))`、`PE(pos,2i+1)=cos(pos/10000^(2i/d_model))`；波長從 2π 到 10000·2π 成幾何級數。動機（原文）：對任意固定偏移 k，`PE(pos+k)` 是 `PE(pos)` 的線性函數（利於學相對位置），且**可外推到比訓練更長的序列**。\n- **三種注意力**（§3.2.3）：① encoder self-attention（Q/K/V 同源自前一層 encoder）；② decoder **masked** self-attention（把非法（未來）連結在 softmax 前設 −∞ 以保自迴歸）；③ encoder-decoder **cross-attention**（Q 來自 decoder、K/V 來自 encoder 輸出）。\n- **歸屬**（致謝）：論文明記 **Noam Shazeer 提出 scaled dot-product attention、multi-head attention 與 parameter-free 位置表示**。\n- 結果：WMT'14 英德 big model BLEU **28.4**（新 SOTA、勝前人 >2 BLEU）；英法 **41.0**（訓練成本 <前 SOTA 的 1/4）。訓練：base 100k 步/12 小時、big 300k 步/3.5 天，8×NVIDIA P100；Adam β₁=0.9、β₂=0.98、ε=10⁻⁹、warmup 4000；base dropout 0.1、label smoothing 0.1。\n\n---\n\n## 三、位置編碼的演化（2017–2026）\n\n- **Sinusoidal**（2017，見上）。\n- **Learned absolute（可學習絕對位置嵌入）**：**BERT**（Devlin et al. arXiv 1810.04805，NAACL 2019）、**GPT-2**（2019）採用——每個位置一個可訓練向量。\n- **Relative position**：**Shaw et al. 2018**（arXiv 1803.02155，NAACL 2018）為每個相對距離 r=j−i 學一個位置嵌入並做距離截斷；**T5**（Raffel et al. 2019）把相對位置簡化為**可學習純量偏置**＋對數分箱 bucket。\n- **RoPE（旋轉位置嵌入，Rotary Position Embedding）**：**Su et al. 2021「RoFormer」**（arXiv 2104.09864）。把 q、k 依位置做**二維平面旋轉**（每對維度一個旋轉平面，角度隨位置與頻率變），內積後**相對位置自然浮現**（只看角度差）。**這是 ch10 接《圓的影子》（旋轉/複數/e^{iθ}）的關鍵接點。**\n- **ALiBi**：**Press et al. 2021「Train Short, Test Long」**（arXiv 2108.12409）。不動 embedding，直接在 q·k 分數上加一個與距離成正比的**線性偏置**；利於長度外推。\n- **長度外推**：Position Interpolation（**Chen et al. 2023**，arXiv 2306.15595，線性縮放位置索引）；NTK-aware（社群起源，⚠️ 無單一正式論文）；**YaRN**（**Peng et al. 2023**，arXiv 2309.00071，ICLR 2024，NTK-by-parts＋注意力溫度）。\n- **採用情形（LLaMA 系列）**：LLaMA（arXiv 2302.13971）、Llama 2（2307.09288）均用 RoPE。\n- **⚠️（2026-06）現況**：**RoPE 已是主流開源 LLM 的事實標準（de facto standard）**——Llama 2/3、Gemma/Gemma 2、Mistral、Qwen、DeepSeek-V3、GPT-NeoX 等皆採 RoPE 或其變體；ALiBi 採用率遠低。原因：相對、無查表、參數自由、相容 FlashAttention、配 NTK/YaRN 可外推到 256k+。（兩來源覆核 upheld；惟開源版本更新頻繁，標時點。）\n\n---\n\n## 四、效率：O(n²) 瓶頸與次二次方注意力（2019–2024）\n\n標準 self-attention 的時間與空間複雜度皆 **O(n²)**（n=序列長度）——所有高效注意力的共同動機。**系統/部署深度指向《從後端到 AI Infra》（ch03 推論物理、ch05 KV cache、ch07 量化/FlashAttention 系統面）；本書只講「想法」。**\n\n### 稀疏注意力（改「打分」的連結結構）\n- **Sparse Transformer**（**Child et al. 2019**，arXiv 1904.10509）：固定稀疏模式（local＋strided），O(n√n)。作者含 Radford、Sutskever。\n- **Longformer**（Beltagy et al. 2020）：局部窗口＋任務性全域注意力，線性複雜度，支援 4096 token。\n- **BigBird**（Zaheer et al. 2020）：隨機＋滑動窗口＋全域三合一；理論證明保表達力。\n\n### 線性注意力（改「正規化」——把 softmax 換成核技巧，用結合律）\n- **Katharopoulos et al. 2020「Transformers are RNNs」**（ICML 2020）：把 attention 寫成核函數線性點積，利用矩陣乘法**結合律**把 O(n²) 降到 O(n)。線性注意力的理論基礎。\n- **Performer**（Choromanski et al. 2020，arXiv 2009.14794）：FAVOR+ 隨機特徵近似 softmax 核。\n- **Linformer**（Wang et al. 2020，arXiv 2006.04768）：把 K/V 在序列維度投影到低秩 k×d，O(n)。**低秩接《矩陣是動詞》SVD/低秩（ch19–20）。**\n\n### 不近似也能省（精確注意力的工程想法）\n- **FlashAttention**（**Dao et al. 2022**，arXiv 2205.14135）：**IO-aware 的精確注意力，不是近似**。分塊（tiling）＋**online softmax**，避免在 HBM 實體化整個 n×n 矩陣，減少 HBM 讀寫。作者 Tri Dao、Daniel Fu、Stefano Ermon、Atri Rudra、Christopher Ré。\n- **FlashAttention-2**（2023，arXiv 2307.08691）：改進 warp/thread 分工，比 FA1 約 2×，A100 達 50–73% 理論峰值。\n- **FlashAttention-3**（2024-07，arXiv 2407.08608，NeurIPS 2024 Spotlight）：用 Hopper 的非同步與 FP8，H100 BF16 達 840 TFLOPs/s、FP8 達 1.3 PFLOPs/s。\n- **本書講 online softmax 的想法（與 ch06 縮放、ch17 加權平均同源），系統面（吃滿 SRAM/HBM）指向工作書。**\n\n### 共享 K/V 頭（省 KV，改「打分」的頭結構）\n- **MQA（Multi-Query Attention）**：**Shazeer 2019「Fast Transformer Decoding」**（arXiv 1911.02150）。所有頭共享同一份 K/V、各自 Q，省推論記憶體頻寬。\n- **GQA（Grouped-Query Attention）**：**Ainslie et al. 2023**（arXiv 2305.13245，EMNLP 2023）。介於 MQA 與完整多頭之間（分組共享 K/V）；僅用 5% 預訓練算力可從多頭 checkpoint 微調成 GQA；**被 Llama 2/3 廣泛採用**。\n- **MLA（Multi-Head Latent Attention）**：**DeepSeek** 開創（DeepSeek-V2 2024-05、V3 2024-12，arXiv 2412.19437）。把 KV 壓到低秩潛在向量，KV cache 每 token 僅 ~70 KB（對比 Llama-3.1-405B 約 516 KB）。⚠️（2026-06）已被 Kimi K2、GLM、Ling 等採用，成 KV 壓縮主流之一。\n\n---\n\n## 五、理論視角：注意力到底是什麼\n\n- **核迴歸（kernel smoothing / Nadaraya-Watson）**：**Tsai et al. 2019「Transformer Dissection: ... via the Lens of Kernel」**（arXiv 1908.11775，EMNLP-IJCNLP 2019）。系統性地把 attention 寫成 **kernel smoother**——以相似度為核的加權平均。**接《馴服隨機》（加權平均=期望）與《馴服無限》。**\n- **現代 Hopfield 網路**：**Ramsauer et al. 2020「Hopfield Networks is All You Need」**（arXiv 2008.02217，NeurIPS 2020）。連續狀態的現代 Hopfield 更新規則**等價於 Transformer 的 attention**；可指數級儲存模式、一步檢索——「軟性聯想記憶」（回扣 Graves NTM）。\n- **集合運算與置換等變**：**Set Transformer（Lee et al. 2019，ICML 2019，arXiv 1810.00825）**。attention 是集合上的運算——對 query 集合置換等變、對 value 集合置換不變；**位置不是內建的、要外加**（回收 ch09）。與 GNN/message passing（如 Graph Attention Networks）相通。\n- **表達力 / 秩坍縮**：**Dong et al. 2021「Attention is Not All You Need: Pure Attention Loses Rank Doubly Exponentially with Depth」**（arXiv 2103.03404，ICML 2021 oral）。**純** self-attention（無殘差、無 MLP）輸出會**雙指數**地坍縮到秩 1；殘差連接與 MLP 正是阻止坍縮的關鍵——解釋了 ch13「為何一層裡需要殘差與 FFN」。\n- **softmax 作為 soft-argmax**：softmax 是 argmax 的平滑可微近似——輸出合法機率分布（非負、和為 1）、處處可微（能訓練）、放大分數差形成「軟選擇」。\n- **softmax 替代品**：**Sigmoid attention**（**Apple 2024「Theory, Analysis, and Best Practices for Sigmoid Self-Attention」**，arXiv 2409.04431，ICLR 2025）——證明 sigmoid attention 的 Transformer 也是通用近似器，FLASHSIGMOID 在 H100 比 FA2 推論核快 17%；ReLU/Softplus 注意力等亦有研究。⚠️（2026-06）替代品領域演變快，但實證顯示 softmax 在全域競爭/檢索上仍領先，多數混合模型保留 softmax。\n\n---\n\n## 六、可解釋性：注意力權重是「解釋」嗎（爭議議題）\n\n- **「不是解釋」**：**Jain & Wallace 2019「Attention is not Explanation」**（arXiv 1902.10186，NAACL 2019）——大量實驗指注意力權重無法提供可靠解釋。\n- **「並非不是解釋」**：**Wiegreffe & Pinter 2019「Attention is not not Explanation」**（arXiv 1908.04626，EMNLP 2019）——反駁取決於「解釋」的定義，需更嚴謹實驗。\n- **⚠️ 此論戰至今（2026-06）無共識**：兩派分歧本質是「解釋」定義之爭（忠實性 faithfulness vs 合理性 plausibility），不是事實對錯。2024–2025 研究續指注意力頭多義性、任務相依。寫作時：呈現雙方、明寫「未定論」，當作全書故障視角的高潮，**不選邊**。\n- **語言學對應**：**Clark et al. 2019「What Does BERT Look At?」**（arXiv 1906.04341，BlackboxNLP 2019）——某些頭對應句法關係（直接賓語、限定詞、介詞賓語）與共指。**Voita et al. 2019**（arXiv 1905.09418，ACL 2019）——少數「重要頭」扛大部分工作、可剪掉 48 頭中的 38 頭只損 0.15 BLEU。\n\n### 機制可解釋性（Anthropic 的 Transformer Circuits）\n- **「A Mathematical Framework for Transformer Circuits」**（**Elhage et al. 2021**，Transformer Circuits Thread，2021-12-22）：把注意力頭分解成 **QK 電路**（決定看哪裡的注意模式）與 **OV 電路**（決定把什麼內容搬過去）。\n- **「In-context Learning and Induction Heads」**（**Olsson et al. 2022**，arXiv 2209.11895，Transformer Circuits Thread）：辨識 **induction heads**（執行 `[A][B]…[A]→[B]` 的補全），其出現時機與 in-context learning 能力突增同時，是 in-context learning 的機制來源。**脊椎 it→animal 可畫成一個具體 QK/OV 電路。**\n- **⚠️** Transformer Circuits Thread 非傳統同儕評審期刊，但在機制可解釋性領域影響極大；引用時標明性質。\n\n---\n\n## 七、前沿（2026-06）：注意力還必要嗎——SSM、Mamba 與混合架構\n\n> **本節高度時效，全部標 `（2026-06）`，並區分「已驗證事實」與「趨勢/推測」。**\n\n### 狀態空間模型（SSM）這條線\n- **S4「Efficiently Modeling Long Sequences with Structured State Spaces」**（**Gu, Goel & Ré 2021**，arXiv 2111.00396，ICLR 2022 Outstanding Paper 榮譽提名）。建在 **HiPPO**（正交多項式投影）數學基礎上；Long Range Arena 全任務 SOTA，首解長度 16k 的 Path-X。\n- **Mamba「Linear-Time Sequence Modeling with Selective State Spaces」**（**Gu & Dao 2023**，arXiv 2312.00752，COLM 2024）。選擇性 SSM，序列長度線性時間、約 5× Transformer 吞吐量。\n- **Mamba-2 / SSD**：**「Transformers are SSMs ...」**（**Dao & Gu 2024**，arXiv 2405.21060，ICML 2024）。Structured State Space Duality（SSD）證明 SSM 是**因果線性注意力**的特例；Mamba-2 訓練快 2–8×（主要改訓練，非推論）。\n- **Mamba-3**（Together.ai，arXiv 2603.15569，**提交 2026-03、ICLR 2026**）：複數值狀態更新、MIMO 變體；同困惑度下狀態減半、1.5B 規模下游平均 +1.8 pt、H100 長序列快 7×；為**推論**優化。\n\n### 混合與生產現況\n- **Jamba**（AI21，2024-03-28）：首個生產級**混合 SSM-Transformer**；約 1/8 層為注意力、其餘 Mamba；52B 總/12B 活躍（MoE）、256K context、Apache 2.0。Jamba 1.5（2024-08）：Large 為 398B 總/**94B 活躍**（⚠️ 早期「398B 活躍」是誤植，總參數才是 398B）。\n- **MLA**（DeepSeek-V3，見第四節）：softmax 注意力＋低秩 KV 壓縮，2026 生產主流之一。\n- **⚠️（2026-06）整體現況（趨勢、非終局）**：**softmax 注意力仍主導生產級 LLM**（GPT-5 系列、Claude、Gemini 等）；**新共識傾向「混合」**——以小比例（如 1-in-8 ~ 1-in-10）注意力層保留檢索能力、其餘用 Mamba/線性層（Qwen、Nemotron、IBM Bamba 等已出貨企業級混合）。**不存在大規模純 SSM 模型稱霸市場**。純 SSM vs 混合 vs 改進 softmax 的長期勝者**未定論**。（兩來源覆核 upheld，標時點。）\n- 寫作分界：本書講「為什麼會有 SSM 這條路（O(n²) 與 KV 的代價）、SSM↔attention 的對偶之美、2026 的混合共識」；**生產部署/KV 工程指向《從後端到 AI Infra》**。\n\n---\n\n## 八、NLP 之外的應用\n\n- **Vision Transformer（ViT）**：**Dosovitskiy et al. 2020「An Image is Worth 16x16 Words」**（arXiv 2010.11929，ICLR 2021）。把影像切成 16×16 patch 當 token，純 Transformer 做視覺。\n- **CLIP**（OpenAI 2021，arXiv 2103.00020）：4 億圖文對對比預訓練，視覺-語言對齊。\n- **Flamingo**（DeepMind 2022，arXiv 2204.14198）：用 cross-attention 處理交錯圖文。\n- **Stable Diffusion / Latent Diffusion**（Rombach et al. 2021，arXiv 2112.10752）：用 **cross-attention** 把文字條件注入 U-Net 引導生成（原文：「by introducing cross-attention layers ... powerful and flexible generators for general conditioning inputs such as text」）。\n- **AlphaFold2**（Jumper et al., Nature 2021-07-15）：Evoformer 內的 **triangle attention** 處理殘基對。\n\n### ⚠️ 脊椎例子「the animal didn't cross the street because it was too tired」的出處\n- **校正（第二輪覆核）**：此代名詞消解例子**不在**原始論文（arXiv 1706.03762）裡，**首見於 Google AI 官方部落格 2017-08「Transformer: A Novel Neural Network Architecture for Language Understanding」**，後經 **Jay Alammar「The Illustrated Transformer」** 廣為流傳。\n- 寫作鐵則：**不可說它出自原論文**。要寫「出自 Google 2017 部落格、經 Illustrated Transformer 普及」。\n- 來源：https://research.google/blog/transformer-a-novel-neural-network-architecture-for-language-understanding/ ；https://jalammar.github.io/illustrated-transformer/\n\n---\n\n## 九、數值與記號基準複核（脊椎與常用數）\n\n- 脊椎硬數字（與 outline 基準表一致、全書不得矛盾，作者已用 Python 自算複核）：\n  - q_it=(1,1,1,1)；k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)；d_k=4、√d_k=2。\n  - 原始內積 QKᵀ = [animal 4, street 2, it 0]。\n  - 縮放後 /√d_k = [2, 1, 0]。\n  - softmax（縮放）= [animal **0.665**, street **0.245**, it **0.090**]（e²=7.389、e¹=2.718、e⁰=1，和 11.107）。\n  - v_animal=(1,0)、v_street=(0,1)、v_it=(1,1) → 輸出 ≈ (0.755, 0.335)（偏向 animal 的 value 方向）。\n  - 未縮放 softmax（raw [4,2,0]）= [0.867, 0.117, 0.016]（e⁴=54.598），明顯更「尖」——ch06 的對照。\n- 原始 Transformer 常引數：d_model=512、h=8、d_k=d_v=64（√d_k=8）、d_ff=2048、N=6。\n- e≈2.71828。所有數值寫章時自算複核，不抄記憶。\n\n---\n\n## 掃描日誌\n\n- **2026-06-13**：建檔。8 群集 web fan-out（origins / transformer-2017 / positional / efficiency / theory / interpretability / frontier-2026 / beyond-nlp）＋爭議項第二輪獨立覆核，16 agents。重大校正：① 脊椎例子出處＝Google 2017 部落格非原論文（已覆核校正）；② Jamba 1.5 Large 為 398B 總/94B 活躍（覆核校正）。爭議標 ⚠️：attention 發明歸屬、attention≠解釋論戰、2026 純 SSM 未稱霸（皆 upheld 為「未定論/趨勢」）。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n本書《注意力機制的原理：直覺、機制與理論》的維護基準。改任何 `book-src/` 內容前先讀本檔與 `style-guide.md`、`outline.md`；史實／年份／論文以 `landscape-2026-06.md` 為錨。\n\n## 一、跨章基準數值表（改任何一個必須照表全書同步）\n\n權威來源是 `outline.md` 的「跨章基準」表；下表為高頻複核用的濃縮版。每個數字若修正，務必 grep 全書引用章一起改，並在掃描日誌記一行。**全部已用 Python 自算複核（2026-06-13）。**\n\n| 基準 | 值 | 出現章 |\n|---|---|---|\n| 脊椎句子 | \"the animal didn't cross the street because **it** was too tired\"；簡化序列 [animal, street, it]。**出處＝Google AI 2017-08 部落格，非原論文**（見脆弱事實） | ch01 起 |\n| 脊椎向量 | q_it=(1,1,1,1)；k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)；v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)；單頭 d=4、√d=2 | ch04 |\n| 脊椎原始內積 | QKᵀ = [animal 4, street 2, it 0] | ch04 |\n| ch05 未縮放 softmax | softmax([4,2,0])=[0.867, 0.117, 0.016]（e⁴=54.598,e²=7.389,e⁰=1,和 62.99）；輸出≈(0.883, 0.133) | ch05 |\n| ch06 縮放（**全書正典**） | [4,2,0]÷√d(=2)=[2,1,0] → softmax=[**0.665, 0.245, 0.090**]（e²=7.389,e¹=2.718,e⁰=1,和 11.107）；輸出≈(**0.755, 0.335**)。**ch07 起一律用這組** | ch06 起 |\n| 自注意力 3×3（it 列） | it 列縮放分數 [2,1,0]→[0.665,0.245,0.090]；street 列→[0.450,0.450,0.100]；animal 列→[0.665,0.090,0.245] | ch07 |\n| 多頭脊椎 | 4 維拆 2 頭×2 維，√2≈1.414；頭 A 權重 [0.734,0.178,0.088]、頭 B [0.620,0.074,0.306]（e^(3/√2)=8.342、e^√2=4.113，**勿先把指數四捨五入**） | ch08 |\n| 原始 Transformer 超參 | d_model=512、h=8、d_k=d_v=64（√d_k=8）、d_ff=2048、N=6（enc/dec 各 6 層） | ch04/06/08/23 |\n| RoPE 相對距離表 | θ=60°；相對距離 0→+1.00、1→+0.50、2→−0.50、3→−1.00、4→−0.50（內積只依賴相對距離） | ch10 |\n| cross-attention 脊椎 | 源端去掉 it：[4,2]÷2=[2,1]→softmax=[0.731,0.269]（和 10.107，兩項）；輸出≈(0.731,0.269)；比值 e²/e¹=e≈2.718 與 self 相同 | ch12 |\n| LayerNorm 脊椎 | z=(1.822,1.266,1.926,1.380)，平均 1.5985、σ≈0.2809、輸出 z=(0.796,−1.184,1.166,−0.778) | ch13 |\n| O(n²) 成本 | n=512→262,144；4k→16.8M（64×）；100k→10¹⁰（~38,000×）；1M→10¹² | ch07/ch14 |\n| 線性注意力結合律 | 路徑 A (QKᵀ)V＝O(n²d)、路徑 B Q(KᵀV)＝O(nd²)；n≫d 時 B 遠省 | ch15 |\n| online softmax | 分塊掃 [2,1,0] 仍還原 [0.665,0.245,0.090]（running max/sum）；精確非近似 | ch16 |\n| Hopfield β 掃描 | β=1/√d=0.5→[0.665,0.245,0.090]；β=1→[0.867,0.117,0.016]；β=2→[0.982,0.018,0]；β=3→[0.998,0.003,0]（β 即逆溫度，鎖在 1/√d_k） | ch18 |\n| 數字精度 | e≈2.71828、e²≈7.389、e⁴≈54.598 | 全書 |\n\n## 二、脆弱事實清單（最可能寫錯／需特別守住的；以 landscape ⚠️ 為準）\n\n- **脊椎例子出處**：「the animal…it…」**不是出自原論文（1706.03762）**，首見於 **Google AI 2017-08 部落格**「Transformer: A Novel Neural Network Architecture…」，經 Jay Alammar《The Illustrated Transformer》普及。**禁止寫成「出自原論文」**（ch01 已正確歸屬）。\n- **attention 發明歸屬**：**Bahdanau et al. 2014（1409.0473）** 確立 NMT 的「attention mechanism」一詞；Graves 2013/2014 有更早的可微分注意力雛形；Schmidhuber 主張其 1991–92 Fast Weights 更早（其論文未明用此詞）。**不選邊**，照此保守版（ch02/ch03）。\n- **attention 是不是解釋——至今（2026-06）無共識**：Jain & Wallace 2019（1902.10186）vs Wiegreffe & Pinter 2019（1908.04626）；分歧本質是「解釋」的定義（忠實性 vs 合理性），不是事實對錯。**呈現雙方、不選邊**（ch20）。\n- **2026 前沿是趨勢非終局**：softmax 仍主導生產級 LLM（GPT-5/Claude/Gemini）；新共識傾向「1-in-8 ~ 1-in-10 注意力層」的混合（Jamba、Nemotron、Bamba…）；**無純 SSM 稱霸**；長期勝者未定。所有此類陳述**必標 `（2026-06）`、區分「已驗證事實 vs 趨勢/推測」**（ch22）。\n- **Transformer Circuits（Anthropic）非傳統同儕評審**：Elhage 2021 QK/OV 框架、Olsson 2022 induction heads 發表於 Transformer Circuits Thread（非期刊），影響力大但須標明性質（ch21）。\n- **FlashAttention 是「精確」不是近似**：它用 tiling＋online softmax 不實體化 n×n，數學上等於標準注意力。**勿與 ch15 的稀疏/線性「近似」混為一談**（ch16）。\n- **Jamba 1.5 Large**：398B **總**參數、**94B 活躍**（MoE）；早期「398B 活躍」是誤植（ch22 若提及照此）。\n- **多頭指數精度**：頭 A/B 的 e^(3/√2)=8.342、e^√2=4.113——用完整精度的指數，**勿先把 2.121/1.414 四捨五入再取 exp**（會得 8.339/4.112 的假錯誤）。\n- **單頭 vs 多頭維度**：ch04–07 用單頭 d=4、√d=2；`d_k=d_model/h` 的拆分留 ch08，勿提前。\n\n## 三、結構與寫作鐵則（新增內容不得違反）\n\n- **三步骨架是主角**：每章都要回扣「打分→正規化→加權混合」並點出本章動哪一步；統一流程圖用 `_meta/style-guide.md` 的垂直流向版（CJK 不放進方框牆，避免欄寬塌掉）。\n- **脊椎 it**：涉及脊椎章的修改要維持與基準表一致（ch23 有八層對帳表）。改任一脊椎數字 → 照基準表全書同步。\n- **跨書邊界（與工作無關的分界線）**：FlashAttention/KV 的**系統/部署**指向《從後端到 AI Infra》（ch16 只准一小節給 memory-bound 動機）；線代運算指向《矩陣是動詞》；旋轉/複數指向《圓的影子》。不教訓練/反向傳播/框架/調參。\n- **章節骨架**：每章必含 `## 從你已知的出發`／`## 故障模式與直覺陷阱`／`## 紙上推演`（其下 `### 推演解答`）／`## 自我檢核`／`## 延伸閱讀`，及章首 blockquote「本章解決什麼問題」；Part 首章（ch01/04/09/14/17/20）含全書路線圖。\n- **語言**：繁體中文台灣用語、零簡體、零大陸詞（**禁** 概率/方差/歸一化/掩碼/矢量/激活值/詞向量/均值；用 機率/變異數/正規化/遮罩/向量/激活函數/平均或期望值/嵌入/內積）；自然口語、不要翻譯腔。CJK 語境標點全形，數學式/程式/英文/小數保留半形。\n- **程式碼**：選擇性、英文、放 ```python、5–15 行可讀片段；**不放訓練迴圈/nn.Module/資料載入**；若有程式，輸出數字要與手算一致。多行數學/矩陣放 ```text。\n\n## 四、掃描協定（修改後必跑）\n\n1. **ASCII 圖**：`python3 ../../../tools/md-reader/check_diagrams.py book-src`（CJK=2，**exit 0 才算過**；目前全清）。\n2. **結構**：grep 各章五骨架標題 + `### 推演解答` 齊全；Part 首章含路線圖。\n3. **語言**：Python 逐字元掃簡體與大陸詞（shell grep 對同形字會誤報）；掃 `均值`（排除 平均值/期望值）；掃半形標點被 CJK 夾住的洩漏。\n4. **數值一致性**：對第一節基準表逐項 grep 引用章，確認脊椎數字（[4,2,0]/[2,1,0]/0.665/0.245/0.090/0.755/0.335/0.867…）無互相矛盾。\n5. **數學審查**：便宜模型（agy）math-only 逐章重算 worked example（**提醒它用完整精度指數**）；可疑處用 Python 裁決（Python 為準，單一模型不推翻）。\n6. **事實審查**：帶網路模型抽查 landscape 的歷史/年份/歸屬/2026 現況「是否如章節所寫」；重大修正需兩獨立來源。\n7. 修改後 `python3 ../../../tools/md-reader/build_reader.py web/book.config.json` 重打包；書架有變動先 `build_shelf.py`。\n\n## 五、掃描日誌\n\n- **2026-06-13**：建書。P1 三 meta 檔（agy 結構審後修訂 6 處：ch05/06 縮放順序、單頭 d、ch10 外推故障、ch16 memory-bound 邊界、ch19 圖靈完備、ch12/ch22 脊椎轉折/斷裂）。P2 23 章 fan-out（23 agents）。P3：check_diagrams 修 12 個 ragged 圖（三步骨架方框 CJK 寬度溢出 → 改垂直流向＋trim；ch12/15/16/19 個別修）後 **exit 0**；簡體/大陸詞 lint 全清（修 均值→期望值/平均值、歸一化→正規化）；五骨架標題全到齊；脊椎數值跨章一致。P4：**agy math 11 章 0 真 FAIL**（ch08/ch13 兩個 agy 旗標經 Python 裁決為 agy 自身四捨五入誤判，章節正確）；**帶網路事實審 11 項全 correct、0 必修**；ch12/ch18 額外 Python 複核通過；修 ch13 平均精度 1.599→1.5985。附錄 A/B/C 由最終章節編譯。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名：《注意力機制的原理》（副標：直覺、機制與理論）\n形態：23 章、六個 Part、3 個附錄。原理與欣賞書（**不教訓練、不教部署、不刷論文**；紙上推演為主＋**指定處少量可讀 NumPy/虛擬碼**）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；歷史與時效性事實以 `landscape-2026-06.md` 為錨。\n全書脊椎：**同一個句子裡的代名詞「it」**，每個 Part 越懂越深（脊椎多層讀法見 style-guide）。\n全書統一骨架：**三步骨架＝打分（score）→ 正規化（softmax）→ 加權混合（mix）**，每章回扣。\n\n## 全書敘事弧\n\n一個代名詞「it」該看哪裡？（ch01）→ 為什麼舊方法（把整句壓成固定向量）做不到（ch02）→ 第一次注意：讓 decoder 動態加權源句（Bahdanau 2014，ch03）→ **核心機制（三步骨架）**：把查找拆成 Query/Key/Value（ch04）、softmax 把分數變成「該看哪裡」（ch05）、為什麼要除以 √d（ch06）、每個 token 都查一次＝自注意力與 O(n²)（ch07）、為什麼要很多顆頭（ch08）→ **補上缺的零件**：位置不是內建的（ch09）、用旋轉編碼位置 RoPE（ch10，接《圓的影子》）、只能看過去的遮罩（ch11）、跨序列查找與三種注意力（ch12）、把 attention 裝回一整層、一整個模型（ch13）→ **為什麼是 O(n²)**：一張建不了索引的表（ch14）、給它建索引：稀疏與線性注意力（ch15）、不近似也能省：FlashAttention 與 KV 共享（ch16）→ **它到底是什麼（理論身世）**：即核迴歸（ch17）、即聯想記憶／Hopfield（ch18）、即集合運算（ch19）→ **看進黑盒與未來**：注意力權重是解釋嗎（ch20）、QK/OV 電路與 induction heads（ch21）、注意力之外——SSM/Mamba 與 2026 的混合架構（ch22）→ 總收官：同一個 it，八層讀法（ch23）。\n\n歷史暗線（交織不另立章，全照 landscape）：seq2seq 固定向量瓶頸（Sutskever 2014）→ Bahdanau 對齊注意力（2014）與 Luong 乘性（2015）→ Graves NTM 的可微分記憶（2014，伏筆 ch18）→ Transformer 統一一切（Vaswani 2017）→ 位置編碼演化到 RoPE（Su 2021）→ 效率之戰（Sparse 2019、Linear 2020、FlashAttention 2022）→ 理論回看（核迴歸 Tsai 2019、Hopfield Ramsauer 2020、秩坍縮 Dong 2021）→ 可解釋性論戰（2019）與機制可解釋性（Anthropic 2021–2022）→ SSM/Mamba 與混合架構（2021–2026）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```text\nPart I 注意力解決什麼問題    Part II 三步骨架：核心機制    Part III 補上缺的零件\nch01 該看哪裡（序章）        ch04 Query/Key/Value         ch09 位置編碼\nch02 固定向量的瓶頸      →   ch05 softmax：該看哪裡    →   ch10 RoPE 與相對位置\nch03 第一次注意 Bahdanau     ch06 為什麼除以 √d            ch11 遮罩：只能看過去\n                            ch07 自注意力與 O(n²)         ch12 交叉注意力與三型\n                            ch08 多頭注意力               ch13 一整層到一整個模型\n                                                               │\n                                                               ↓\nPart VI 看進黑盒與未來      Part V 理論身世             Part IV 為什麼是 O(n²)\nch20 注意力是解釋嗎     ←   ch17 即核迴歸           ←   ch14 二次方瓶頸\nch21 QK/OV 與 induction     ch18 即聯想記憶 Hopfield     ch15 稀疏與線性注意力\nch22 注意力之外 SSM/Mamba    ch19 即集合運算             ch16 FlashAttention/KV 共享\nch23 總收官：同一個 it      ★ 三步骨架貫穿全書          ★＝打分→正規化→混合\n```\n\n## 跨章基準（一致性掃描的依據；各章不得另創數字與命名）\n\n**貫穿範例「同一個 it」**——脊椎句子 *\"the animal didn't cross the street because **it** was too tired\"*，簡化序列 [animal, street, it]。\n\n| 元素 | 基準 | 首次出現 |\n|---|---|---|\n| 脊椎句子出處 | Google AI 2017-08 部落格，非原論文；經 Illustrated Transformer 普及（照 landscape §8，**不可說出自原論文**） | ch01 |\n| 脊椎向量 | q_it=(1,1,1,1)；k_animal=(2,1,1,0)、k_street=(0,1,1,0)、k_it=(1,−1,0,0)；v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)。**ch04–07 用單頭視角，維度直接叫 d=4、√d=2；d_k=d_model/h 的多頭拆分留 ch08** | ch04 |\n| 脊椎打分 | 原始內積 QKᵀ=[animal 4, street 2, it 0] | ch04 |\n| ch05 首算（未縮放） | 為避免在 √d 之前用到縮放，ch05 用**未縮放**分數把三步骨架先跑完一次：softmax([4,2,0])=[animal 0.867, street 0.117, it 0.016]（e⁴=54.598,e²=7.389,e⁰=1,和 62.99）；輸出 0.867·(1,0)+0.117·(0,1)+0.016·(1,1)≈(0.883, 0.133) | ch05 |\n| ch06 縮放（**全書正典**） | /√d=2 → [2,1,0] → softmax=[animal **0.665**, street **0.245**, it **0.090**]（e²=7.389,e¹=2.718,e⁰=1,和 11.107）；**ch07 起一律用這組縮放後權重**，並對照 ch05 未縮放的 [0.867,0.117,0.016] 看「尖→軟」 | ch06 |\n| 脊椎輸出（縮放後正典） | 0.665·(1,0)+0.245·(0,1)+0.090·(1,1) ≈ (0.755, 0.335)，偏向 animal | ch06 |\n| 置換不變 | 把 [animal,street,it] 重排，it 對各 token 的權重不變（無位置資訊）——非加位置不可 | ch09 |\n| 原始 Transformer 超參 | d_model=512、h=8、d_k=d_v=64（√d_k=8）、d_ff=2048、N=6（encoder/decoder 各 6 層）（照 landscape §2） | ch08 |\n| 原始 Transformer 結果 | WMT'14 英德 28.4 BLEU、英法 41.0 BLEU（big model） | ch03／ch13 |\n| 多頭脊椎 | 把 4 維拆成 2 顆頭×2 維：head A 抓句法、head B 抓指代，concat | ch08 |\n| 關鍵年份/論文 | Bahdanau 2014(1409.0473)、Vaswani 2017(1706.03762)、RoPE 2021(2104.09864)、FlashAttention 2022(2205.14135)、Hopfield 2020(2008.02217)、induction heads 2022(2209.11895)、Mamba 2023(2312.00752)（皆照 landscape） | 各章 |\n| 數字精度 | e≈2.71828、e²≈7.389、e⁴≈54.598；脊椎權重全書統一不得矛盾 | — |\n\n**全域不涵蓋**（任何章都不展開，最多一句＋指向延伸閱讀或鄰書）：訓練工程與反向傳播數學（梯度只在 ch06/ch17 點到、指向《馴服無限》）、PyTorch/JAX 框架與 `nn.Module` 樣板、KV cache 記憶體管理／PagedAttention／prefill-decode／量化／batching 的**部署深度**（指向《從後端到 AI Infra》ch03/05/06/07）、線性代數的**運算深度**（內積/投影/SVD 指向《矩陣是動詞》）、完整的 SSM 理論與 HiPPO 推導（ch22 只給直覺一句＋延伸）、強化學習/RLHF、tokenizer 細節（一句帶過、指向工作書 ch03）、具體模型排行榜與 benchmark 大全。\n\n---\n\n## Part I — 注意力解決什麼問題（ch01–03）\n\n### ch01 — 該看哪裡：一個代名詞的難題（序章）\n- **目標**：讀完能說出本書要解決的核心問題（讓模型自己算出「每個位置該看序列的哪裡」）、認得脊椎句子與 it 懸念、看懂三步骨架的預告圖、畫得出全書地圖；並補上最小 ML 鷹架（token→embedding 向量是什麼）。\n- **必涵蓋**：脊椎句子登場與 it 指代懸念（人一眼知道是 animal、機器憑什麼？**例子出處照 landscape：Google 2017 部落格，不可說原論文**）；「注意力」的一句話定義——對所有位置做一次「依相關性加權的平均」；**三步骨架**首次亮相（打分→正規化→加權混合）只給直覺、不算；**最小 ML 鷹架**：模型不讀字讀向量，token 經 embedding 變成一個向量（一句帶過 tokenizer，指向《從後端到 AI Infra》ch03）、「權重是學來的」是什麼意思（先給直覺，ch04 再用）；全書路線圖（基準圖首次出場）＋七條驗收目標開宗明義。\n- **不涵蓋**：QKV 與真正的計算（ch04）；softmax 細節（ch05）；任何訓練機制（全域不涵蓋）。\n- **橋接**：你天天在做「該看哪裡」——load balancer 該把請求送哪台、router 看哪條規則、cache 該查哪個 key；差別是那些規則你手寫死，注意力讓模型**自己學出**「該看哪裡」。\n- **Worked example**：用脊椎句子做純文字版——把 it 對 animal/street 的「相關性」用直覺打三個分數（先不給公式），混合出「it 比較像 animal」，預示三步骨架（數字版留 ch04–05）。\n- **紙上推演**：把「該看哪裡」翻成你熟的三個工程場景（routing/cache/JOIN）；對脊椎句子，口頭說出 it 該看 animal 的理由；畫出全書地圖並標出你最想先懂哪一格。\n\n### ch02 — 固定向量的瓶頸：RNN 與 seq2seq 為何卡住\n- **目標**：能講出注意力誕生前的世界長什麼樣、seq2seq 的「固定長度 context vector」為什麼是瓶頸，理解注意力是來解決一個**具體的痛**。\n- **必涵蓋**：序列轉序列（seq2seq）的 encoder-decoder 框架（Sutskever 2014、Cho 2014 照 landscape）；**固定向量瓶頸**——把整個輸入句壓成一個固定維度向量，長句資訊被擠爆（「把一本書摘要成一句話再翻譯」）；RNN 的循序依賴（無法平行、長程依賴衰減）一句帶過；Graves 2013/2014 的可微分注意力/記憶雛形（伏筆 ch18，一段帶過）。\n- **不涵蓋**：RNN/LSTM 內部機制（一句帶過、非本書主題）；注意力的解法（ch03）；O(n²)（ch07/ch14）。\n- **橋接**：固定向量瓶頸＝你把一個富物件硬塞進固定大小的 protobuf／固定長度欄位，長資料被截斷；RNN 的循序依賴＝沒法平行化的 pipeline，前一步沒算完下一步動不了（這正是注意力後來「全部位置一次算」的對照）。\n- **Worked example**：用脊椎句子示範瓶頸——把整句壓成一個向量後，decoder 要還原 it 指代需要的資訊已被稀釋；對照「如果能回頭看原句每個詞」會多容易（預告 ch03 對齊）。\n- **紙上推演**：估計「把長度 n 的句子壓成固定 d 維向量」在 n 很大時會丟什麼；舉一個你系統裡「固定大小緩衝塞可變大小資料」的翻車；口頭講為什麼循序依賴讓 RNN 難平行。\n\n### ch03 — 第一次注意：Bahdanau 的對齊（加性與乘性）\n- **目標**：能講出第一個 NMT 注意力（Bahdanau 2014）如何用「動態加權源句」打破瓶頸、加性與乘性評分的差別，並認出這就是三步骨架的第一版。\n- **必涵蓋**：Bahdanau 2014「對齊模型」——decoder 生成每個目標詞時對源句各位置算權重、加權混合（照 landscape；**首篇命名 attention mechanism**）；加性評分 `vᵀtanh(W[s;h])`；Luong 2015 的乘性/dot-product 評分與 global vs local（照 landscape）；**把它對到三步骨架**：打分（對齊分數）→正規化（softmax）→混合（加權源向量）——本書主骨架第一次完整現身；⚠️ 發明歸屬照 landscape（Bahdanau 確立、Graves 更早雛形、Schmidhuber 爭議，不選邊）。\n- **不涵蓋**：self-attention（ch07，本章是 decoder 看 encoder 的 cross 形態雛形）；scaled dot-product 與 √d（ch04/ch06）；多頭（ch08）。\n- **橋接**：對齊＝翻譯時「目標詞回頭查源句哪幾個詞最相關」，就像你做資料映射時動態查對應表，而不是套死的固定 schema。\n- **Worked example**：一個迷你翻譯對齊——3 詞源句、生成 1 個目標詞，給三個對齊分數，softmax 成權重，加權混合源向量；標出這三步＝三步骨架。\n- **紙上推演**：把加性與乘性評分各算一次同一組向量、比較；解釋「對齊」為何比固定向量好；指出這個雛形與後面 self-attention 的差別（誰看誰）。\n\n---\n\n## Part II — 三步骨架：注意力的核心機制（ch04–08）\n\n### ch04 — Query、Key、Value：把注意力看成軟性字典查找\n- **目標**：能講清楚 Q/K/V 三個角色各自在做什麼、為什麼 query 和 key 要用**不同**的學來投影、內積為何是「打分」，並親手算出脊椎 it 的原始分數。\n- **必涵蓋**：**軟性字典查找**核心隱喻——硬 hash map 是「key 精確命中就取那個 value」，注意力是「query 對每個 key 算相似度、按相似度**混合所有** value」；Q/K/V 是同一批向量經三個**學來的**投影矩陣 W_Q/W_K/W_V 得到（補 ML 鷹架：權重矩陣是訓練學出的）；為什麼 query≠key 用不同投影——「我在找的」與「我是的」是兩件事（非對稱）；**內積即相似度**（指向《矩陣是動詞》ch15）＝三步骨架的「打分」步；脊椎 it 算 raw 分數 [4,2,0]。本章與 ch05–07 用**單頭視角**，維度直接叫 d=4、√d=2，**避免在多頭之前混入 d_k=d_model/h 的拆分**（留 ch08）。\n- **不涵蓋**：softmax 正規化（ch05）；√d 縮放（ch06）；self vs cross（ch07/ch12，本章用脊椎單一 query 講清角色）。\n- **橋接**：Q/K/V ＝ Redis 的「查詢條件 / 索引鍵 / 存的值」，但查找是軟的；query≠key ＝ 你查 DB 時「WHERE 條件」和「被索引的欄位」經過不同轉換；混合所有 value ＝ 不是取一筆、是按相關度加權所有筆。\n- **Worked example**：脊椎 it（基準）——給 q_it 與三個 k，手算三個內積得 [4,2,0]；對照若 W_Q=W_K（query=key）會發生什麼（每個 token 最像自己，退化）。**可選**附 5 行 numpy 算 `Q @ K.T`。\n- **紙上推演**：手算一組新向量的 Q·K 分數；用「我找的≠我是的」解釋為何要兩個投影；把 attention 與 hash map 的差別寫成三點對照。\n\n### ch05 — softmax：把分數變成「該看哪裡」的權重\n- **目標**：能講出 softmax 在三步骨架的「正規化」步做什麼（把任意分數變成和為 1 的權重分布＝soft-argmax）、溫度如何控制銳利度，並用脊椎完整跑完一次三步骨架。\n- **必涵蓋**：softmax 公式與性質（非負、和為 1、放大差距）；**soft-argmax**——硬 argmax 只挑最大值（不可微、只看一個），softmax 是它可微分的「軟」版（按比例看全部，能訓練）；輸出是一個**機率分布**（呼應《馴服隨機》）；**溫度**——除以 T，T→0 趨硬 argmax、T→∞ 趨均勻；脊椎（**用未縮放分數**，縮放留 ch06）：softmax([4,2,0])=[0.867,0.117,0.016]→加權混合 V→輸出≈(0.883,0.133)，**三步骨架第一次完整跑完**；attention 不是「找最相關的一個」是「混合全部、相關的權重大」（招牌反直覺）。\n- **不涵蓋**：為什麼分數要先除 √d（ch06，本章先用未縮放分數把骨架跑完）；多頭（ch08）；softmax 替代品（ch19）。\n- **橋接**：softmax＝把一排「相關性原始分」正規化成「注意力預算的百分比分配」（像把各服務的權重正規化成流量配比）；溫度＝你調 sampling 的 temperature 時動的同一個旋鈕。\n- **Worked example**：脊椎（基準）——手算 softmax([4,2,0]) 全步驟（e⁴,e²,e⁰、求和、相除）得 [0.867,0.117,0.016]，再加權混合 V 得輸出≈(0.883,0.133)；換溫度 T=0.5 與 T=2 各重算一次看權重變尖/變平。\n- **紙上推演**：手算 softmax([4,2,0])（注意它很尖、最大權重 0.867）；解釋「attention 混合全部而非取一筆」並反駁「注意力就是找最相關的詞」；用溫度說明「為什麼同一組分數可以又尖又平」（口頭預測：把分數整體縮小，會更尖還是更平？為 ch06 鋪）。\n\n### ch06 — 為什麼除以 √d：一個防止注意力崩掉的小數字\n- **目標**：能講清楚 scaled dot-product 為何要除以 √d_k（變異數論證）、不除會怎麼壞（softmax 飽和、梯度消失），並用脊椎數字看出縮放前後的差別。\n- **必涵蓋**：**變異數論證**（照 landscape §2 原文）——q、k 各分量獨立、均值 0 變異 1 時，內積 q·k 的變異數 = d_k；d_k 大則分數分布變寬，把 softmax 推進**飽和區**（一個權重→1、其餘→0），梯度趨近 0、學不動；除以 √d_k 把變異數拉回 ~1；脊椎對照：未縮放 [4,2,0]→[0.867,0.117,0.016]（尖，回收 ch05）vs 縮放 [2,1,0]→[0.665,0.245,0.090]（軟，**本章宣告為 ch07 起全書正典脊椎權重**、輸出 (0.755,0.335)）；原始 Transformer d_k=64→√d_k=8（照 landscape）；**故障模式**：softmax 飽和＝梯度消失（接 ch13 為何還需殘差）。\n- **不涵蓋**：完整反向傳播數學（指向《馴服無限》梯度）；其他正規化（LayerNorm 留 ch13）。\n- **橋接**：除以 √d＝你做數值穩定時的縮放/正規化（避免 overflow、避免某一項主宰）；softmax 飽和＝你看過的「某權重吃掉全部、系統失去調節能力」。\n- **Worked example**：脊椎（基準）——並排算 softmax([4,2,0]) 與 softmax([2,1,0])，看尖 vs 軟；假設 d_k=64、分數量級 ~8 倍，示範不除會把 softmax 壓到接近 one-hot（梯度近 0）。\n- **紙上推演**：用變異數論證解釋「為什麼是 √d_k 不是 d_k」；手算一組大分數不縮放的 softmax 看它多接近 one-hot；口頭講「softmax 飽和為何讓模型學不動」。\n\n### ch07 — 自注意力：每個 token 都是一次查找（O(n²) 的源頭）\n- **目標**：能講出 self-attention 與 ch03 cross 形態的差別（Q/K/V 同源）、為什麼「每個 token 都對所有 token 查一次」必然是 O(n²)，並讀懂矩陣形式 QKᵀ。\n- **必涵蓋**：self-attention——Q、K、V 都來自同一序列（每個 token 既是查詢者也是被查者）；整個注意力矩陣 QKᵀ 是 n×n（每格＝一對 token 的相似度）；**O(n²) 從這裡來**（n 個 query × n 個 key）——接《從後端到 AI Infra》ch03「一張沒有索引、每筆新資料對全表 full scan」的講法（本書講原理、那本講記憶體）；脊椎三 token 的完整 3×3 注意力矩陣與熱圖；雙向（每個 token 看全部）的威力——一次抓全句關係。\n- **不涵蓋**：masking（ch11，本章先講雙向全看）；多頭（ch08）；O(n²) 的省法（Part IV）；KV cache（指向工作書）。\n- **橋接**：self-attention＝把序列做一次「all-pairs 相似度比對」，就像你對 N 筆資料做 N×N 的兩兩比對（沒有索引時的 O(n²)）；雙向＝你能同時看上下文兩邊，不像 streaming 只能看過去。\n- **Worked example**：脊椎（基準）——算完整 3×3 注意力矩陣（每個 token 當 query 對三個 key），畫 ASCII 熱圖（看出 it 那列在 animal 欄最濃）；數出對長度 n 要算 n² 個分數。\n- **紙上推演**：手算一個 3 token 序列的完整注意力矩陣；解釋為何 self-attention 是 O(n²) 而 RNN 是 O(n)；把 self-attention 對到你熟的「N×N 兩兩比對」場景並估計 n=1000、n=10⁴ 的成本。\n\n### ch08 — 多頭注意力：為什麼要很多顆頭\n- **目標**：能講出多頭注意力在做什麼（在不同子空間平行做多次注意力再 concat）、為什麼一顆頭不夠，並用脊椎看出不同頭抓不同關係。\n- **必涵蓋**：把 d_model 切成 h 顆頭、每顆頭各有 W_Q/W_K/W_V 投影到 d_k=d_model/h 維（原始 h=8、d_k=64，照 landscape）；每顆頭在**不同子空間**做完整三步骨架、輸出 concat 再過 W_O；為什麼多頭——一顆頭的 softmax 只能聚焦一種關係，多頭讓模型同時抓句法、指代、位置…等多種關係（接 ch21 不同頭的專門化、Voita 2019）；脊椎：head A 抓「誰是主詞」、head B 抓「it→animal 指代」，concat 後 it 同時得到兩種資訊。\n- **不涵蓋**：頭的可解釋性深入（ch20/ch21）；MQA/GQA 的 KV 共享（ch16）；頭剪枝（ch20 點到）。\n- **橋接**：多頭＝把一個查詢拆成多個專門化的子查詢平行跑（像對同一批資料用多個不同索引同時查），各看一個面向再合併；concat＝把多路結果接起來。\n- **Worked example**：脊椎（基準）——把 4 維拆成 2 顆頭×2 維，給兩組小投影，head A 與 head B 各算自己的注意力權重（一個偏 animal、一個偏別處），concat 出最終向量。\n- **紙上推演**：解釋「為什麼一顆頭的 softmax 限制了它只能聚焦一種模式」；手算把 d=4 拆成 2 頭後每頭的維度與參數量；舉例你會想要哪幾種「頭」來理解一個句子。\n\n---\n\n## Part III — 補上缺的零件：位置、遮罩、跨序列、一整層（ch09–13）\n\n### ch09 — 位置編碼：集合沒有順序這個洞\n- **目標**：能講出 self-attention 本質是**集合**運算（置換不變、看不見順序）、這為什麼是個必須補的洞，並讀懂正弦位置編碼。\n- **必涵蓋**：**置換不變性**——attention 對輸入順序無感（重排 token 只重排輸出、權重不變），所以「animal street it」與「it street animal」對模型一樣（脊椎示範）；這是必須**外加位置資訊**的根本原因（呼應 ch19 集合運算的理論）；**正弦位置編碼**（Vaswani 2017 公式照 landscape）——不同頻率的 sin/cos，動機是「相對位置可由線性關係表示」「可外推」；可學習絕對位置（BERT/GPT-2）對照。\n- **不涵蓋**：RoPE 與相對位置（ch10）；長度外推細節（ch10 點到）；為何置換不變的嚴格證明（ch19）。\n- **橋接**：置換不變＝你的 set/bag 資料結構沒有順序；要表達順序就得**顯式加一個欄位**（序號/timestamp）——位置編碼就是給每個 token 蓋一個「位置戳記」。\n- **Worked example**：脊椎（基準）——把 [animal,street,it] 重排成 [it,street,animal]，示範 it 對各 token 的注意力權重**完全不變**（證明看不見順序）；算正弦位置編碼前兩個位置、前幾維的數值。\n- **紙上推演**：證明「不加位置時 attention 對輸入置換等變」；解釋正弦編碼「相對位置＝線性關係」的直覺；把「給無序集合加順序」對到你加 timestamp/序號的經驗。\n\n### ch10 — 旋轉的位置：RoPE 與相對位置之美\n- **目標**：能講出 RoPE 如何用「旋轉」編碼位置、為什麼旋轉後內積只剩相對位置，並把它接回《圓的影子》的旋轉與複數。\n- **必涵蓋**：RoPE（Su 2021，照 landscape）——把 q、k 依**位置**旋轉一個角度（每對維度一個旋轉平面、角度隨頻率變）；關鍵之美：兩個旋轉後向量的內積**只依賴相對位置**（角度差），絕對位置自動消去——**直接接《圓的影子》ch05 旋轉矩陣 R(a)R(b)=R(a+b)、ch07–08 複數與 e^{iθ}**；對照正弦編碼（加在 embedding 上）vs RoPE（旋轉 q/k）；ALiBi（線性偏置，Press 2021）一節；**外推失效**（故障視角）——超出訓練長度時注意力分數失真／注意力熵爆，模型「看不懂」更長的位置，這正是 Position Interpolation / YaRN 要救的（理論直覺，章節作者查證 landscape §3）；長度外推（PI/YaRN）一瞥；⚠️（2026-06）RoPE 是主流開源 LLM 事實標準（照 landscape）。\n- **不涵蓋**：旋轉矩陣與複數本身（指向《圓的影子》，本書只用結論）；YaRN 數學細節（一句＋延伸）；位置編碼對 KV cache 的系統影響（指向工作書）。\n- **橋接**：旋轉編碼＝你用「相位」表達相對關係（像訊號處理裡的相位差）；相對位置自然浮現＝你只關心「差幾步」而非「絕對在第幾格」。\n- **Worked example**：用 2 維手算——把一個 k 向量在位置 m 旋轉角度 mθ、把 q 在位置 n 旋轉 nθ，算內積看到它只依賴 (n−m)（引用《圓的影子》R(a)R(b)=R(a+b)）；脊椎：給 it 與 animal 加上位置旋轉，看相對距離如何進入分數。\n- **紙上推演**：用旋轉矩陣性質證明「RoPE 內積只依賴相對位置」；解釋 RoPE 與正弦編碼「加在哪」的差別；口頭講「為什麼旋轉是編碼位置的漂亮辦法」（接 trig 書）。\n\n### ch11 — 遮罩：只能看過去\n- **目標**：能講出 causal mask 為什麼存在（保自迴歸）、怎麼實作（softmax 前設 −∞）、padding mask 的用途，並區分雙向 encoder 與單向 decoder。\n- **必涵蓋**：**因果遮罩（causal mask）**——生成時第 i 個 token 只能看 ≤i 的 token（不能偷看未來），實作是把非法位置的分數在 softmax 前設 **−∞**（softmax 後變 0，照 landscape §2）；**注意力流向的單向不對稱**（脊椎：it 看得到左邊的 animal，但 animal 看不到右邊的 it——ch07 雙向的對稱在此被打破，明寫這個轉折）；自迴歸生成的循序性（每次預測下一個）；**padding mask**（把補齊用的空 token 遮掉）；雙向（encoder，看全句）vs 單向（decoder，只看左邊）——對應 ch13 三種模型；脊椎：生成 it 時它合法地看左邊的 animal/street。\n- **不涵蓋**：KV cache（生成時快取已算的 K/V，指向《從後端到 AI Infra》ch05）；具體 sampling（指向工作書 ch03）；三種模型的完整譜系（ch13）。\n- **橋接**：causal mask＝append-only log／event sourcing——你只能讀「已發生」的事件、讀不到未來；設 −∞＝把非法連結的權重歸零（像 ACL 把無權限的列濾掉）。\n- **Worked example**：脊椎（基準）——對 3×3 注意力矩陣套上因果遮罩（上三角設 −∞），重算每列 softmax，看每個 token 只在自己與左邊分配權重；對照無遮罩（雙向）的差別。\n- **紙上推演**：手算加 causal mask 後的注意力矩陣；解釋「設 −∞ 而不是設 0」為什麼對（softmax 前 vs 後）；把 causal mask 對到 append-only log 並說它如何保證「不偷看未來」。\n\n### ch12 — 交叉注意力與三種注意力\n- **目標**：能講清楚 self / masked-self / cross 三種注意力各自誰看誰、cross-attention 如何跨序列查找，並把脊椎升級成翻譯場景。\n- **必涵蓋**：三種注意力（照 landscape §2）——① encoder self（Q/K/V 同源，雙向）；② decoder masked self（單向，ch11）；③ **encoder-decoder cross**（Q 來自 decoder、K/V 來自 encoder，讓目標端每個位置看遍源端）；cross-attention 回扣 ch03 Bahdanau（那其實就是 cross 的雛形）；脊椎翻譯版：中文目標 query 去看英文源 K/V；cross-attention 在多模態/擴散的角色一瞥（CLIP/Stable Diffusion 用 cross 注入條件，照 landscape §8，一段帶過）。\n- **不涵蓋**：完整 encoder-decoder 架構（ch13）；多模態深入（一句＋延伸）；diffusion 機制（一句＋延伸）。\n- **橋接**：cross-attention＝跨兩張表的 JOIN（目標表的列去查源表）；self-attention＝同一張表的 self-JOIN；三種注意力＝三種「誰查誰、能查到哪」的權限組合。\n- **Worked example**：迷你翻譯——2 詞源句（encoder 輸出 K/V）、decoder 生成 1 個目標詞（Q），算 cross-attention 權重與輸出；對照 self-attention（同源）的差別。**脊椎在此從 3×3 變成矩形（目標×源）矩陣**——明寫這個轉換（兩序列長度可不同，不再能套原本的方陣），這是脊椎升級成雙序列的關鍵一步。\n- **紙上推演**：把 self/masked-self/cross 三者用「誰當 Q、誰當 K/V、能不能看未來」做成對照表；解釋 cross-attention 與 ch03 Bahdanau 的關係；舉一個 cross-attention 注入條件的應用（如文字控制生圖）。\n\n### ch13 — 一整層到一整個模型：注意力住在哪裡\n- **目標**：能講出注意力在一層 transformer 裡的位置（配殘差、LayerNorm、FFN）、為什麼需要殘差與 FFN，並認得 encoder-only / decoder-only / encoder-decoder 三種模型家族。\n- **必涵蓋**：一層 transformer block＝（多頭注意力＋殘差＋LayerNorm）→（FFN＋殘差＋LayerNorm）（照 landscape §2 結構）；**ML 鷹架**：殘差連接是什麼（直通捷徑）、LayerNorm 是什麼（穩定數值）、FFN 是什麼（逐位置的非線性）——點到為止；**為什麼需要殘差與 FFN**：純堆 attention 會**秩坍縮**（Dong 2021，輸出退化成秩 1）——伏筆 ch19，殘差與 FFN 正是解藥；堆疊 N 層（原始 N=6）；**三種家族**：encoder-only（BERT，雙向，理解）、decoder-only（GPT，單向，生成——**今日主流 LLM 形態**）、encoder-decoder（T5，翻譯/摘要）；訓練目標鷹架（next-token 預測＋交叉熵，一句帶過、指向《馴服隨機》《馴服無限》）。\n- **不涵蓋**：反向傳播與訓練工程（全域不涵蓋）；秩坍縮的數學（ch19）；具體模型細節與排行榜（全域不涵蓋）；推論部署（指向工作書）。\n- **橋接**：一層 block＝一個處理 stage（attention 做混合、FFN 做逐位置轉換、殘差＝旁路、LayerNorm＝穩壓）；堆疊 N 層＝你的多層 pipeline；三種家族＝三種「讀/寫/讀寫」的服務形態。\n- **Worked example**：把 ch08 多頭脊椎輸出接上殘差（加回輸入）與一個迷你 FFN，走完一層 block；用一個小例子示範「純 attention 多層後輸出趨同（秩坍縮）」、加殘差後不再趨同。\n- **紙上推演**：畫出一層 transformer block 的資料流（標出殘差/LayerNorm/FFN）；解釋「為什麼純堆 attention 不夠、需要殘差與 FFN」；把 BERT/GPT/T5 用「雙向?／看未來?／用途」做對照表。\n\n---\n\n## Part IV — 為什麼是 O(n²)：效率與它的代價（ch14–16）\n\n### ch14 — 二次方瓶頸：一張建不了索引的表\n- **目標**：能講清楚 O(n²) 的代價在長 context 下如何爆炸、為什麼 attention 是「一張建不了索引的表」，並理解後面所有高效注意力的共同動機。\n- **必涵蓋**：O(n²) 的精確來源（ch07 的 n×n 矩陣）；長 context 下計算與記憶體的平方成長（n=1k→100 萬格、n=100k→100 億格）；**「沒有索引的全表掃描」**——hash/B-tree 索引靠「可排序/可雜湊的鍵」把查找降到 O(log n)/O(1)，但 attention 的「相似度」不是這種鍵，無法預先建索引、每對都要算（接《從後端到 AI Infra》ch03，本書講原理、那本講記憶體與 roofline）；這是 Part IV 與 ch22（SSM）的共同動機。\n- **不涵蓋**：具體省法（ch15/ch16）；KV cache 記憶體工程（指向工作書 ch05）；SSM（ch22）。\n- **橋接**：O(n²)＝你最怕的「沒加索引的 N+1 query / 兩兩比對」，資料一大就爆；「建不了索引」＝相似度查找不像等值查找能靠 hash/B-tree 加速。\n- **Worked example**：算 n=512、4k、100k 時注意力矩陣的格數與相對成長；對照 RNN 的 O(n) 線性成長；估計「context 長 10 倍、注意力成本變幾倍」。\n- **紙上推演**：解釋「為什麼相似度查找建不了傳統索引」；把 O(n²) 對到你遇過的全表掃描翻車；列出「想加速 O(n²)」的兩個直覺方向（少算一些對 vs 換個算法）——預告 ch15/16。\n\n### ch15 — 給注意力建索引：稀疏與線性注意力\n- **目標**：能講出稀疏注意力（少算一些對）與線性注意力（換掉 softmax 用結合律）兩條路各動了三步骨架的哪一步、它們是近似、各自的取捨。\n- **必涵蓋**：**稀疏注意力**（改「打分」的連結結構）——只算部分 token 對（local 窗口＋少數全域），Sparse Transformer O(n√n)、Longformer/BigBird 線性（照 landscape §4）；**線性注意力**（改「正規化」）——把 softmax(qkᵀ) 換成核函數 φ(q)φ(k)ᵀ，靠**矩陣乘法結合律**把 (QKᵀ)V 重排成 Q(KᵀV)，O(n²)→O(n)（Transformers-are-RNNs、Performer、Linformer，照 landscape）；**低秩**直覺接《矩陣是動詞》SVD/低秩（ch19–20）；取捨：這些是**近似**，省了成本但常損精度（尤其 token 級精確回憶）——伏筆 ch22 為何混合架構保留少量 softmax。\n- **不涵蓋**：每個變體的完整公式目錄（點名＋想法即可）；FlashAttention（ch16，那是精確不是近似）；SSM（ch22）。\n- **橋接**：稀疏＝你只比對「鄰近/重點」的資料而非全部（局部性假設）；線性注意力的結合律＝你把 (A·B)·C 改成 A·(B·C) 來省一個大中間矩陣——同一招你在查詢優化裡用過。\n- **Worked example**：用結合律手算——比較先算 QKᵀ（n×n）再乘 V，與先算 KᵀV（d×d）再被 Q 乘，數出兩者乘法量在 n≫d 時的差距（線性注意力為何省）。\n- **紙上推演**：把稀疏 vs 線性各自「動了三步骨架哪一步」說清楚；用結合律證明線性注意力的 O(n)；解釋「為什麼近似注意力會在精確回憶上吃虧」。\n\n### ch16 — 不近似也能省：FlashAttention 與 KV 共享\n- **目標**：能講出 FlashAttention 為何是**精確**注意力卻更省（online softmax＋分塊、不實體化 n×n）、MQA/GQA/MLA 的 KV 共享想法，並認得這一章正是「原理書／工作書」的邊界線。\n- **必涵蓋**：**最小硬體直覺（全書唯一一次碰記憶體牆，只為動機、不教部署）**——一句話交代：推論時 attention 常是 memory-bound（瓶頸在搬資料、不在算），GPU 的 SRAM 快但小、HBM 大但慢，KV 要被反覆讀；這正是 FlashAttention 與 KV 共享想救的痛。**僅止於動機**——怎麼在 H100 上吃滿頻寬、KV 記憶體怎麼配置，**指向《從後端到 AI Infra》ch03/ch05/ch07**。**FlashAttention 的想法**（Dao 2022，照 landscape §4）——不先算出整個 n×n 矩陣再做 softmax，而是**分塊**逐塊算、用 **online softmax**（邊掃邊更新running max 與 running sum）合併，數學上完全等於標準注意力（**精確、非近似**）；online softmax 的遞推接 ch05 softmax 與 ch06 數值穩定（減去 running max 防 overflow）；**KV 共享**：MQA（所有頭共享 K/V）、GQA（分組共享，Llama 2/3 採用）、MLA（DeepSeek 低秩壓縮）——省的是 KV 記憶體/頻寬（照 landscape）；**邊界線**：本章講到「想法」為止，「在 H100 上怎麼吃滿 SRAM/HBM、KV cache 怎麼配置」**指向《從後端到 AI Infra》ch05/ch07**。\n- **不涵蓋**：GPU 記憶體階層的**工程細節**與 kernel 優化／roofline（只給一句動機、深度指向工作書 ch02/ch05/ch07）；FlashAttention 各版硬體數字（landscape 有、書中一句帶過）；量化（指向工作書）。\n- **橋接**：online softmax＝你做 streaming aggregation（不把全部資料載進記憶體、邊讀邊更新統計量）；KV 共享＝多個 worker 共用一份快取而非各存一份（省記憶體）。\n- **Worked example**：online softmax 手算——把脊椎分數 [2,1,0] 分兩塊（[2,1] 與 [0]）逐塊更新 running max/sum，合併出與一次算相同的 [0.665,0.245,0.090]，證明分塊不損精度。**可選**附 numpy 雛形。\n- **紙上推演**：證明「分塊 online softmax 等於整批 softmax」（追蹤 running max/sum）；解釋 FlashAttention「精確不是近似」與 ch15 線性注意力的本質差別；把 MQA/GQA 用「共享什麼、省什麼、損什麼」對照，並標出哪裡該翻去工作書。\n\n---\n\n## Part V — 注意力到底是什麼：理論身世（ch17–19）\n\n### ch17 — 注意力即核迴歸：Nadaraya-Watson 的回歸\n- **目標**：能講出 attention 是一種核平滑（kernel smoothing）／核迴歸，softmax 權重＝以相似度為核的加權平均，並看出它與「期望／加權平均」同源。\n- **必涵蓋**：Nadaraya-Watson 核迴歸——預測值＝鄰近樣本的加權平均、權重由核函數（相似度）決定；**attention 就是這個**（Tsai 2019「Transformer Dissection」照 landscape §5）：query＝查詢點、key＝樣本位置、value＝樣本值、softmax＝以 exp 內積為核的權重；加權混合＝**條件期望的估計**（接《馴服隨機》加權平均=期望、《馴服無限》）；不同核（線性/RBF/exp）對照、為何 exp/softmax 核好用；嚴謹度標示：這是深刻的**等價視角**（attention 寫得出核迴歸形式），不是巧合。\n- **不涵蓋**：核方法完整理論（一句＋延伸）；高斯過程（一句＋延伸）；機率/積分基礎（指向《馴服隨機》《馴服無限》）。\n- **橋接**：核迴歸＝你做「用鄰近資料點加權估計目標值」（像 KNN 的加權版、locally weighted）；attention 把這件事變成可學習、可微分、可平行的版本。\n- **Worked example**：用脊椎 value 與權重示範——把輸出 (0.755,0.335) 重新解讀成「以相似度為權重對 value 做的加權平均（核迴歸預測）」；給一個 1 維核迴歸小資料手算對照。\n- **紙上推演**：把 attention 的三步骨架逐項對到 Nadaraya-Watson 的零件；解釋「softmax 權重＝核」的意思；用「加權平均＝期望」連回《馴服隨機》。\n\n### ch18 — 注意力即聯想記憶：現代 Hopfield 網路\n- **目標**：能講出 attention 與現代 Hopfield 網路的等價、為什麼可視為「軟性內容定址的聯想記憶」，並把它接回 ch04 字典查找與 Graves NTM。\n- **必涵蓋**：聯想記憶（associative memory）——給一個帶噪/部分線索，檢索出完整存儲模式；**現代 Hopfield 網路**（Ramsauer 2020「Hopfield Networks is All You Need」照 landscape §5）：連續狀態的更新規則**等價於 Transformer attention**；指數級儲存容量、一步檢索；把 K/V 看成「存的記憶」、query 看成「線索」——attention＝軟性內容定址檢索（回扣 ch04 軟性字典、ch02/Graves NTM 的可微分記憶）；溫度/β 控制檢索的「尖銳—模糊」（接 ch05–06）。\n- **不涵蓋**：經典 Hopfield 網路的能量函數完整推導（一句＋延伸）；記憶容量定理證明（直覺帶過）；現代 Hopfield 的其他應用（一句＋延伸）。\n- **橋接**：聯想記憶＝你用模糊/部分 key 去查一個「容錯的鍵值庫」並取回最像的內容（像模糊搜尋/向量檢索）；attention 就是這種可微分的軟檢索。\n- **Worked example**：用脊椎——把三個 token 的 V 當「存的三筆記憶」，q_it 當線索，示範 attention 如何「檢索」出最像 animal 的記憶（高 β/低溫時趨近硬檢索）；對照 ch04 的字典查找隱喻。\n- **紙上推演**：把 attention 的 Q/K/V 對到聯想記憶的「線索/位址/內容」；解釋「為什麼提高 β（降溫）讓檢索更像硬查找」；連回 ch04 字典與 ch02 Graves NTM。\n\n### ch19 — 注意力即集合運算：置換等變與訊息傳遞\n- **目標**：能講出 attention 是集合上的置換等變運算（回收 ch09 為何要加位置）、它與圖上訊息傳遞的關係、通用近似與秩坍縮，並理解「為何 softmax」與它的替代品。\n- **必涵蓋**：**置換等變/不變**的嚴格版（Set Transformer，Lee 2019，照 landscape §5）——attention 把輸入當**集合**處理，這正是 ch09 必須外加位置的根源；與 **GNN／message passing** 的關係（attention＝在全連接圖上學邊權重的訊息傳遞）；**表達力一瞥**——通用近似（足夠頭與維度下可近似序列函數）與**圖靈完備性**（如 Pérez et al. 2019/2021「Attention is Turing-Complete」：加上精度與位置假設後 Transformer 可模擬圖靈機；章節作者查證、明寫前提）；**秩坍縮**（Dong 2021，照 landscape §5）——純 attention 雙指數坍縮到秩 1，回收 ch13「為何需殘差與 FFN」；**為何 softmax**（soft-argmax、合法分布、競爭）與替代品（sigmoid attention/linear/ReLU，Apple 2024 照 landscape，⚠️ 標時點）。\n- **不涵蓋**：GNN 完整理論（一句＋延伸）；通用近似定理證明（直覺帶過）；softmax 替代品的 benchmark 大全（一句＋延伸、指向 ch22）。\n- **橋接**：集合運算＝你處理無序集合（去重、聚合）時的對稱性要求；訊息傳遞＝節點向鄰居要資訊再聚合（你做的 gossip/聚合協定）；attention＝在「全連接圖」上學出邊權重的聚合。\n- **Worked example**：用脊椎證明置換等變（重排輸入、輸出隨之重排、權重不變，回收 ch09）；用一個 3 節點小圖示範「attention＝學出的邊權重訊息傳遞」。\n- **紙上推演**：證明 self-attention 的置換等變性；把 attention 與一輪 GNN 訊息傳遞對照；解釋「為什麼 softmax 的競爭性對全域檢索有利」並列一個替代品的取捨。\n\n---\n\n## Part VI — 看進黑盒與它的未來（ch20–23）\n\n### ch20 — 注意力權重是解釋嗎：招牌嘴仗\n- **目標**：能講清楚「attention 權重能不能當解釋」的論戰雙方、忠實性 vs 合理性的差別，並把它當全書故障視角的高潮（誠實地說「未定論」）。\n- **必涵蓋**：直覺陷阱——很多人把注意力熱圖當「模型為什麼這樣判斷的解釋」；**論戰**（照 landscape §6，⚠️ 未定論）：Jain & Wallace 2019「不是解釋」vs Wiegreffe & Pinter 2019「並非不是解釋」——分歧本質是「解釋」的定義（**忠實性 faithfulness** 模型真的據此決策 vs **合理性 plausibility** 看起來合理）；頭的語言學對應（Clark 2019）與頭專門化/可剪枝（Voita 2019，48 頭剪 38 只損 0.15 BLEU）——有些頭確實有意義、但不等於整體可解釋；自我察覺的徵兆（什麼時候你其實在過度解讀熱圖）。\n- **不涵蓋**：機制可解釋性（ch21，那是不同層次的解釋）；具體 faithfulness 評估方法（一句＋延伸）；選邊站（明寫未定論）。\n- **橋接**：把熱圖當解釋＝你把「相關性 dashboard」當「因果根因」（ch《馴服隨機》相關≠因果的工程版）；忠實 vs 合理＝你的 log「看起來解釋了 bug」不代表它真是根因。\n- **Worked example**：用脊椎熱圖——展示 it→animal 權重最高，討論「這能否證明模型是**因為**看 animal 才解析 it」（呈現雙方論點，不下定論）。\n- **紙上推演**：把「attention 是解釋」的四種讀法列出、標出哪些混淆了忠實與合理；解釋 Voita 剪枝結果對「頭是否有意義」說明了什麼；口頭講為何這個問題至今未定論。\n\n### ch21 — 機制可解釋性：QK/OV 電路與 induction heads\n- **目標**：能講出 Anthropic 把注意力頭拆成 QK/OV 電路的框架、induction heads 為何是 in-context learning 的機制來源，並把脊椎 it→animal 畫成一個電路。\n- **必涵蓋**：**QK/OV 電路**（Elhage 2021「A Mathematical Framework for Transformer Circuits」照 landscape §6）——把一顆頭拆成 **QK 電路**（決定「看哪裡」的注意模式）與 **OV 電路**（決定「把什麼搬過去」的內容）；**induction heads**（Olsson 2022 照 landscape §6）——執行 `[A][B]…[A]→[B]` 的補全（看到 A 就去找上次 A 後面是什麼、複製過來），其出現時機與 **in-context learning** 能力突增同時，是 ICL 的機制源；脊椎：把 it→animal 畫成一個具體的 QK（it 找 animal）/OV（把 animal 的資訊搬給 it）電路；⚠️ Transformer Circuits Thread 非傳統同儕評審（照 landscape）。\n- **不涵蓋**：完整迴路代數與張量分解（直覺帶過、指向延伸）；superposition/疊加特徵（一句＋延伸）；可解釋性的所有後續工作（一句＋延伸）。\n- **橋接**：QK/OV＝把一個處理器拆成「定址邏輯」與「資料搬運邏輯」（你讀過的 CPU 取址 vs 取數）；induction head＝一個學會「看上次這個 pattern 後面接什麼就照抄」的小程式（像你寫的模式比對/自動補全規則，但是學出來的）。\n- **Worked example**：脊椎 it→animal 畫成 QK/OV 電路 ASCII 圖（QK：query「找指代對象」對到 animal；OV：把 animal 的內容寫進 it 位置）；用一個 `[A][B]…[A]→?` 小序列示範 induction head 的補全邏輯。\n- **紙上推演**：把一顆頭拆成 QK 與 OV 兩個職責並各舉一例；解釋 induction head 與 in-context learning 的關係；用脊椎畫出 it→animal 的電路。\n\n### ch22 — 注意力之外：SSM、Mamba 與 2026 的混合架構\n- **目標**：能講出「為什麼會有挑戰 attention 的新架構」（O(n²) 與 KV 的代價）、SSM↔attention 的對偶之美，並誠實描述 2026-06 的現況（softmax 仍主導、混合是新共識、純 SSM 未稱霸）。\n- **必涵蓋**：動機回收——O(n²)（ch14）與 KV cache 的代價（指向工作書）；**SSM 這條線**（照 landscape §7，全標時點）：S4（Gu 2021，HiPPO 數學基礎一句）、Mamba（Gu & Dao 2023，選擇性 SSM、線性時間）、**SSD 對偶**（Mamba-2/「Transformers are SSMs」2024——SSM 是因果線性注意力的特例，對偶之美接 ch15）、Mamba-3（2026，推論優化）；**脊椎在此處「斷」**——SSM 把歷史壓進固定大小狀態、沒有 N×N 注意力矩陣，畫不出 it→animal 的連線；把這個斷裂當鏡子，正照出 SSM 用固定狀態換掉「精確回憶」的代價（資訊漏斗：問題從「it 看哪個 token」變成「漏斗有沒有留住 animal」）——這是脊椎在全書唯一一次刻意失效；**混合架構**（Jamba 2024，約 1/8 層注意力）；**MLA**（DeepSeek，softmax＋低秩 KV）；**⚠️（2026-06）現況**——softmax 仍主導生產級 LLM（GPT-5/Claude/Gemini），新共識傾向「1-in-8~10 注意力層」的混合，**不存在純 SSM 稱霸**，長期勝者未定論；「attention is all you need」這句話 2026 還成立嗎（開放討論）。\n- **不涵蓋**：SSM/HiPPO 完整數學（一句＋延伸）；具體模型 benchmark（一句＋指向 landscape）；生產部署與 KV 工程（指向工作書 ch05/ch07/ch17）。\n- **橋接**：SSM＝把「記住過去」壓成一個固定大小的狀態（像你維護的 running aggregate / 滑動視窗摘要），O(n) 且 KV 不爆——但壓縮就會丟精確回憶；混合＝你在系統裡「常用路徑走快取、少數需要精確的走全查詢」的同款取捨。\n- **Worked example**：用「固定狀態 vs 全序列查找」對照——SSM 用 O(1) 狀態遞推 vs attention 用 O(n) 回看，列出兩者在「精確回憶 vs 成本」的取捨表（標 2026-06）；對偶之美：一句話說明 SSM 如何寫成因果線性注意力（接 ch15）。\n- **紙上推演**：解釋「為什麼 SSM 省了 O(n²) 卻在精確回憶上吃虧」；用對偶性把 SSM 連回 ch15 線性注意力；口頭講「2026 年 attention 還是不是 all you need」（要標時點、區分事實與推測）。\n\n### ch23 — 總收官：同一個 it，八層讀法\n- **目標**：把全書收進一條能口頭講完的故事線；用七條驗收目標當口試題完成總自我檢核；知道讀完往哪走。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**脊椎 it 八層總對帳表**（軟性查找 ch04 → softmax 權重 ch05 → √d 縮放 ch06 → 自注意力矩陣 ch07 → 多頭分工 ch08 → 置換不變要加位置 ch09 → 因果遮罩只看左 ch11 → QK/OV 電路 ch21）；**三步骨架是唯一主角**的回顧——從 Bahdanau 到 RoPE 到 FlashAttention 到 SSM，全是「打分→正規化→混合」的精煉；七條驗收目標各出一題口頭題＋「模範答案要點清單」；故障視角總帳（attention 不是取最相關的一個、softmax 會飽和、位置要外加、熱圖≠解釋、近似會損回憶、純 SSM 未稱霸）；下一步地圖（往理論/往實作/往前沿——對應附錄 C）；明寫本書刻意留的洞（訓練、部署、SSM 數學）與為何留（指向鄰書）。\n- **不涵蓋**：任何新概念、新證明；「補完所有遺漏」的誘惑。\n- **橋接**：回到 ch01 的你——當時看 it 指代只有直覺，現在能用三步骨架算出來、還能講八層。\n- **Worked example**：「注意力原理」10 分鐘口述版逐段大綱（講稿骨架，標每段關鍵詞）；脊椎 it 八層對帳表完整列出。\n- **紙上推演**：七條口試題正式作答（口頭、對照要點自評）；給「attention 就是個查表加權平均、沒什麼」這句話寫一段更精準的回應（200 字內）；一年後重讀清單：哪三章值得重讀、各自觸發條件。\n\n---\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 記號與讀法速查表\n全書記號總表：寫法、怎麼唸（口述驗收用）、白話意義、首次出現章。涵蓋 Q/K/V、QKᵀ、softmax、√d_k、d_model/d_k/h、αᵢ（注意力權重）、⊙、‖·‖、−∞（遮罩）等。從各章實際用過的記號 grep 彙整。\n\n### 附錄 B — 術語表\nEN–ZH–一句話定義–首次出現章。涵蓋 attention/self/cross/multi-head、Q/K/V、scaled dot-product、softmax、positional encoding/RoPE/ALiBi、mask、residual/LayerNorm/FFN、encoder/decoder、O(n²)/sparse/linear、FlashAttention/MQA/GQA/MLA、kernel regression/Hopfield/permutation-equivariance、QK-OV/induction head、SSM/Mamba。從實際內容萃取。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源（論文、部落格、課程、視覺化），分三條路線（往理論/往實作/往前沿），給「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。標出書架鄰書（《矩陣是動詞》《從後端到 AI Infra》《圓的影子》《馴服隨機》《馴服無限》）的銜接點。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-where-to-look.md、ch02-fixed-vector-bottleneck.md、ch03-bahdanau-alignment.md、ch04-query-key-value.md、ch05-softmax.md、ch06-scaling-sqrt-d.md、ch07-self-attention.md、ch08-multi-head.md、ch09-positional-encoding.md、ch10-rope-relative.md、ch11-masking.md、ch12-cross-attention.md、ch13-layer-to-model.md、ch14-quadratic-bottleneck.md、ch15-sparse-linear.md、ch16-flashattention-kv-sharing.md、ch17-kernel-regression.md、ch18-hopfield-memory.md、ch19-set-operation.md、ch20-attention-as-explanation.md、ch21-circuits-induction-heads.md、ch22-beyond-attention-ssm.md、ch23-finale.md；\n附錄 appendix-a-notation.md、appendix-b-glossary.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名：《注意力機制的原理》（副標：直覺、機制與理論）。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「原理與欣賞」的書。目標是讓讀者徹底看懂「注意力（attention）」這個機制到底在算什麼、為什麼這個極簡的點子（打分→正規化→加權混合）能撐起 2017 年以降整個大型語言模型的時代——讀完有「原來就這麼一件事，竟能長成這樣」的震撼，**而且能用自己的話對另一個工程師把它講清楚**：Q/K/V 是什麼、為什麼除以 √d、multi-head 在分什麼工、位置編碼補了什麼洞、為什麼是 O(n²)、attention 權重能不能當解釋、2026 年它是否還是唯一解。\n- **不是**：\n  - 不是訓練教學或框架課——不教 PyTorch/JAX、不寫 `nn.Module` 樣板、不教怎麼訓練一個 transformer、不調參。\n  - 不是論文綜述——不堆名詞、不羅列 SOTA 排行榜；每個被點名的變體都要講清楚它**改了三步骨架的哪一步、為什麼**，否則不收。\n  - 不是部署/服務工程書——**KV cache 怎麼管、FlashAttention 怎麼吃滿 SRAM、PagedAttention、prefill/decode 分離、量化、batching 全部不展開**，指向書架上《從後端到 AI Infra》（那是「與工作相關」的書；本書刻意只談原理，與工作無關，見「跨書邊界」）。\n  - 不是線性代數課——內積、矩陣乘法、投影、SVD 的**深入**指向《矩陣是動詞》；本書只用「夠用的直覺」把它們當工具，需要時喚醒。\n- **驗收標準（全書七條主線，收官章口試）**：\n  ① 注意力到底在算什麼（一句話：對所有位置做一次「依相關性加權的平均」——三步骨架）；\n  ② 為什麼要 Q/K/V 三個角色、為什麼除以 √d、為什麼 softmax（soft-argmax）；\n  ③ multi-head 在分什麼工、位置編碼補了「集合沒有順序」這個洞；\n  ④ 為什麼是 O(n²)、業界怎麼想「替這張沒有索引的表建索引」（sparse/linear/FlashAttention 的想法層）；\n  ⑤ attention 的理論身世（核迴歸／Hopfield／集合上的置換等變運算）——它不是憑空冒出來的；\n  ⑥ attention 權重能不能當「解釋」（招牌故障視角）、機制可解釋性看到了什麼（induction heads、QK/OV 電路）；\n  ⑦ 2026 年「attention is all you need」還成立嗎（SSM/Mamba/混合架構之爭，誠實標時點）。\n\n## 全書脊椎：同一個句子裡的「it」（對應機率那本的「同一枚硬幣」、線代那本的「同一個矩陣」）\n\n全書貫穿**同一個極小範例**，每深入一層就重新算它一次。脊椎句子（沿用原始 Transformer 論文的招牌視覺化例子）：\n\n> *\"the animal didn't cross the street because **it** was too tired.\"*\n\n核心懸念：代名詞 **it** 指的是 animal 還是 street？人一眼知道是 animal（累的是動物不是街）。本書要證明：注意力機制就是讓 **it** 這個位置「**該看哪裡**」——把最大的權重放到 animal 上——而這件事是**算**出來的，不是規定的。\n\n為了能手算，脊椎用三個 token 的簡化序列 **[animal, street, it]**，每個 token 配一個小向量（先 2 維、深入後擴到 4 維），Q/K/V 投影是小矩陣。**全書所有章節共用同一組脊椎數字**（精確向量與矩陣見 `outline.md` 的「脊椎基準表」，不得各章另創）。各章用到時**必須明寫「這是序章那個 it」**，並在收官章總對帳。脊椎的多層讀法：\n\n- 序章 / 動機：it 該看 animal 還是 street？先只給直覺，不算。\n- scaled dot-product 章：手算 q_it·k_animal、q_it·k_street、q_it·k_it 三個分數 → 除以 √d → softmax 得權重（如 [0.7, 0.2, 0.1]）→ 加權混合三個 value → 輸出偏向 animal。**三步骨架第一次完整跑完**。\n- softmax/√d 章：同一組分數，改溫度與是否除 √d，看權重從「平」到「尖」如何變，理解 √d 在防什麼。\n- multi-head 章：head A 抓句法（誰是主詞）、head B 抓指代（it→animal），concat 起來——同一個 it，兩顆頭看不同子空間。\n- 位置編碼章：拿掉位置，\"animal street it\" 與 \"it street animal\" 給出**完全一樣**的注意力（置換不變）→ 這就是非加位置不可的洞。\n- masking 章：生成時 it 只能看它左邊的 token（animal、street 在前，合法）；對比雙向 encoder 可以兩邊都看。\n- cross-attention 章：把句子翻成中文，目標端的 query 去看英文來源端的 key/value（同一個 it，跨序列查找）。\n- 可解釋性章：it→animal 這條連結被畫成一個具體的 QK/OV 電路與「指代頭」。\n- 收官章：「同一個 it，現在你看懂它八層」總對帳表。\n\n## 全書統一骨架：三步骨架（每章都回扣）\n\n注意力的**所有**變體，本質都是這三步的精煉。全書用同一組詞，不得換名：\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │  weighted sum │\n values ─────────────────────────────────────────┘（值在此進場）\n```\n\n1. **打分（score）**：query 與每個 key 算「相關性分數」，標準作法是內積 q·k（內積即相似度——見《矩陣是動詞》ch15）。\n2. **正規化（normalize）**：把一排分數用 softmax 變成「和為 1 的權重」——一個機率分布（見《馴服隨機》：這是一個分布）。\n3. **加權混合（mix）**：用權重對所有 value 做加權平均，得到輸出。\n\n口訣：**相關性決定權重，權重決定混合**。書中每介紹一個變體（√d 縮放、multi-head、RoPE、linear/sparse、FlashAttention、cross-attention、SSM 對照…），都要明確點出它**動了哪一步、為什麼**。這是讀者「不被名詞淹沒」的浮木。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js）。可直接當橋接錨點的經歷與直覺：\n\n- **key-value 思維**：hash map / 字典 / Redis、cache 命中、routing table、load balancer、session affinity——這是本書最強的橋（attention 就是一次**軟性的、依相似度加權的字典查找**：不是精確命中一個 key，而是按相似度混合所有 value）。\n- **查詢思維**：SQL 的 `WHERE`/`JOIN`、index、全表掃描（attention 是「一張建不了索引的表，每筆新資料對全表算一次相似度」——這正是《從後端到 AI Infra》ch03 對 O(n²) 的講法，本書接棒講原理）。\n- **append-only / event sourcing**：causal mask = 只能讀「之前」的事件，讀不到未來。\n- **profiling 與尾端**：P50/P95/P99、瓶頸診斷（O(n²) 在長 context 怎麼爆）。\n- **ML 概念層**：知道「梯度下降是往坡下走」、知道有「向量表示」這回事，但**沒推過神經網路的數學、沒寫過訓練**。\n\n**不需要解釋**（讀者已精通）：函數、代數操作、hash map / 字典 / cache / routing 的工程意義、向量與矩陣乘法**的存在**（深入指向《矩陣是動詞》）、log/exp、softmax 作為機率分布的存在（《馴服隨機》讀過）、複數與旋轉的存在（《圓的影子》讀過，RoPE 章會用）。\n\n**快速複習即可**（看過但生鏽）：向量內積＝相似度（指向《矩陣是動詞》ch15）、矩陣乘法＝批量內積／合成（其 ch06）、投影（其 ch16）、e^{iθ} 與旋轉矩陣（《圓的影子》）。用「你看過，現在把它擦亮」的節奏，不從零教線代。\n\n**要從零教**（本書主體，含必要的 ML 鷹架）：embedding 是什麼（token→向量）、「權重矩陣是學來的」是什麼意思、Q/K/V 三個投影在做什麼、scaled dot-product attention、softmax 作為 soft-argmax、√d 縮放、multi-head、各種位置編碼、masking、cross vs self、residual／LayerNorm（**鷹架，點到為止，不展開**）、訓練目標（next-token 預測／交叉熵，**鷹架一句帶過**）、O(n²) 與各種高效注意力的**想法**、attention 的理論視角、可解釋性、SSM 對照。\n\n> ML 鷹架原則：本書是「自足版」。讀者沒讀過深度學習專書，所以 embedding／權重矩陣是學來的／訓練在最佳化什麼／殘差與 LayerNorm，這些**在第一次需要時用一節從零講清楚到「夠用」**（不展開反向傳播的數學、不教訓練工程），之後各章可直接使用。寧可多花半頁鋪鷹架，不要讓 attention 懸空。\n\n## 跨書邊界（重要——書架上已有相鄰的書）\n\n本書定位是**用自己的原理聲音講「為何如此、為何美」，運算／系統／訓練深度指向鄰書**：\n\n- **《矩陣是動詞》線性代數**（books/linear-algebra）：內積即相似度（其 ch15）、投影與最小平方（ch16）、矩陣乘法即合成且順序要緊（ch06）、SVD＝旋轉-伸縮-旋轉與低秩近似（ch19–20，**linear/低秩注意力**呼應）、特徵向量（ch11，**SSM 的對角化**呼應）。本書遇到這些：**直覺自己給**，**運算深度**用「（見《矩陣是動詞》chNN）」帶過，不重推。\n- **《從後端到 AI Infra》**（repo 根 `book/`，**這是與工作相關的書**）：KV cache 大小與管理、PagedAttention、prefix caching（其 ch05）、prefill/decode 與 roofline、attention 作為記憶體掃描（其 ch03）、FlashAttention 作為**系統/IO 優化**與量化（其 ch07）、batching（ch06）。**分界線（本書「與工作無關」的具體含義）**：本書講 FlashAttention 的**演算法想法**（online softmax、分塊、不實體化 n×n 矩陣、它是精確注意力不是近似）、講 MQA/GQA 的**想法**（共享 K/V 頭）；一旦進入「在 H100 上怎麼吃滿頻寬、KV 記憶體怎麼省、怎麼部署」就**打住並指向那本書**。**唯一例外**：ch16 可用一小節給 memory-bound／SRAM-vs-HBM 的**動機直覺**（否則 FlashAttention 與 KV 共享的「省」會落空），但仍不教如何吃滿硬體。\n- **《馴服無限》微積分**（books/calculus）：softmax/exp 的微分、梯度下降、機率即面積——需要時一句帶過、指向它，不重講微積分。\n- **《馴服隨機》機率統計**（books/probability）：softmax 輸出是一個機率分布、加權混合＝期望、溫度與熵的關係——可一句呼應、不重講。\n- **《圓的影子》三角函數**（books/trig）：旋轉、複數、e^{iθ}、頻率與週期——**RoPE 章直接接**（旋轉位置編碼本質是「把 query/key 依位置旋轉一個角度，內積只看相對角度差」），是全書最漂亮的跨書接點之一。\n\n跨書引用格式：`（見《矩陣是動詞》ch15）`、`（見《從後端到 AI Infra》ch05）`。不要寫死檔名路徑。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。技術名詞**保留英文**（attention/query/key/value/softmax/multi-head…）；數學/中文兼有的名詞第一次出現給「中文（English）」、之後可只用其一且全書一致。\n- 核心術語基準（**全書一致、禁簡體與中國大陸用語**）：注意力（attention）、查詢（query）、鍵（key）、值（value）、自注意力（self-attention）、交叉注意力（cross-attention）、多頭注意力（multi-head attention）、縮放點積注意力（scaled dot-product attention）、位置編碼（positional encoding）、遮罩（mask／masking）、嵌入（embedding，**不用「詞向量」以外的大陸詞**）、權重（weight）、殘差連接（residual connection）、層正規化（layer normalization, LayerNorm）、編碼器／解碼器（encoder／decoder）、向量（vector）、矩陣（matrix）、內積／點積（dot product，全書用「內積」或「點積」擇一一致——**全書用「內積」**）、相似度（similarity）、機率分布（probability distribution）、可解釋性（interpretability）。\n- 禁止簡體詞與大陸技術慣用語：注意力**不寫**「注意力机制」的簡體、不用「向量」以外的「矢量」、不用「歸一化」（用「正規化」）、不用「點乘／點積」混用（統一「內積」）、不用「掩碼」（用「遮罩」）、不用「嵌入式」指 embedding、不用「软」「硬」的簡體、不用「激活」（如需 activation 用「激活函數（activation）」台灣亦可「活化函數」——**全書用「激活函數」並附原文**）。人名保留原文（Vaswani、Bahdanau、Su、Dao、Gu…），不硬翻。\n- 第二人稱「你」直接對讀者說話。自然口語，**不要翻譯腔**（避免「對於…而言」「進行一個…的動作」「被認為是」這類機翻句式）。\n\n## 數學與程式記號規範（閱讀器不渲染 LaTeX，一律純文字 Unicode）\n\n- **行內**用 Unicode：q·k（內積）、QKᵀ、softmax、√d、d_k／d_model、Σ、∑ᵢ、∈、ℝ、≈、≠、≤、≥、→、∞、⊙（逐元素相乘）、‖x‖（範數）、αᵢ（注意力權重）、上標用 ᵀ（轉置）。向量用小寫粗體概念但純文字寫 q、k、v；矩陣用大寫 Q、K、V、W_Q。\n- 縮放點積注意力統一寫：`Attention(Q,K,V) = softmax(QKᵀ / √d_k) · V`。**單頭視角下 d_k = d_model = d**；ch04–07 行文直接用 d、√d，多頭的 d_k=d_model/h 拆分留到 ch08 才引入，避免讀者在多頭之前被 d_k 困惑。\n- **多行推導、矩陣、注意力權重表、softmax 計算**一律放 ```text 圍欄區塊，數字／等號／欄位對齊，每步右側可加「← 為什麼」短註。**禁止把矩陣或長推導硬塞行內**。矩陣用對齊的方框或括號排版（注意 CJK=2 欄寬規則，見下）。\n- 數字基準：√d 的典型值（原始 Transformer d_k=64 → √d_k=8）、softmax 例子的權重全書一致（脊椎數字見 outline 基準表）；e≈2.71828。所有數值寫章時自己重算一遍，不得抄記憶。\n- 圖（注意力熱圖、三步骨架流程、encoder-decoder 結構、QK/OV 電路、全書地圖）用 ASCII 圖，**必須通過 `check_diagrams.py` 的 CJK=2 欄寬檢查**。熱圖權重用 `█ ▓ ▒ ░` 或數字格描濃淡；不追求精確比例，追求形狀直覺（看見 it 那一列在 animal 欄最濃）。\n\n### 程式碼規範（本書與機率/三角那兩本最大的不同）\n\n- **預設仍是紙上手算**：小矩陣、softmax、內積一律先手算示範（worked example 的主體）。\n- 在「能讓**演算法骨架**一目了然」處，**可以**放一段 **5–15 行、可讀的 NumPy 或虛擬碼**（如「scaled dot-product attention 的 numpy 五行」「causal mask 怎麼填 −∞」「RoPE 怎麼旋轉」）。放在 ```python 圍欄。\n- **程式一律英文**（變數、註解、字串）；書內文繁體中文。這是專案硬規則。\n- 程式是「讓你看清演算法」用，**不是 lab**：不要求安裝、不要求能跑出大模型、**不放訓練迴圈、不放 PyTorch `nn.Module` 樣板、不放資料載入**。最多到「純 numpy 把三步骨架實作出來、印出脊椎那組權重」這種等級。\n- **程式與手算必須對得上**：若某章同時有手算 worked example 與程式片段，程式跑出來的數字要和手算一致（並明說「這正是上面手算的那組」）。\n- 程式片段是**選擇性**的：只有真的比文字更清楚才放；純概念／理論／史論章可以完全沒有程式。寧缺勿濫。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. 章首：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書地圖的哪裡、為什麼存在、跟前後章的關係，3-5 行）`\n   每個 Part 的第一章在 blockquote 後放全書 ASCII 路線圖（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part），讀者偏好「架構圖先行」。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的後端實戰上，要具體（hash map／Redis 查找、routing、`WHERE`/`JOIN`、append-only log、cache 命中、P99），不要泛泛而談。\n3. 核心內容（多個 `##` section，深入直覺與機制）。**每章都要明確回扣三步骨架**（本章動了哪一步／在三步的哪個位置）。歷史敘事服務於原理直覺，不是編年史。\n4. `## 故障模式與直覺陷阱` — 本書招牌段落（故障視角是讀者最在意的賣點）：這個概念**最常被誤解成什麼**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**；以及這個機制**在真實模型裡怎麼壞**（如 attention/rank collapse、attention sink、over-smoothing、softmax 飽和、位置外推失效、長 context 的 O(n²) 爆炸、attention≠解釋的謬誤）。用表格或條列。每章至少一個具名陷阱或失效模式。\n5. `## 紙上推演` — 動手做。**主體是手算小矩陣**（脊椎 it、或本章專屬小例子）；**可選**附一段可讀 numpy/虛擬碼讓骨架更清楚（規範見上）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關。問題對齊「能不能把這個概念講給另一個工程師聽」的深度，優先出「為什麼」而不是「是什麼」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段；點明書架鄰書的銜接點。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體數字、一步一步算的完整過程（手算注意力權重、softmax、內積、位置編碼向量、注意力熱圖），**不准跳步**。脊椎 it 是預設主角；outline 已為每章指定基準範例。\n- **「在算什麼」優先於公式**：每個零件先回答「它在解決什麼問題、在三步骨架的哪裡」（為什麼要 query 和 key 兩個不同投影而不是一個？為什麼除 √d？softmax 在 soft 化什麼 argmax？multi-head 在分什麼工？位置編碼補什麼洞？），再給算法。**禁止無動機的定義**。\n- **誠實標示嚴謹度**：每個論證明確標示——「直覺版（嚴格證明指向延伸閱讀）」或「工程師的嚴謹：每步能口頭說出理由」。禁止「顯然」「易證」；禁止把類比偽裝成證明（attention≈核迴歸、≈Hopfield 是**深刻的類比/特例**，要標清楚哪裡嚴格、哪裡只是直覺）。\n- **數值自我複核**：所有數值（內積、softmax 權重、位置向量、√d 縮放後的分數）寫章時必須自己重算一遍，不得抄記憶。脊椎數字以 outline 基準表為準，全書一致、不得互相矛盾。**若放了程式片段，手算與程式輸出要對得上**。\n- **歷史與時效性事實照 landscape**：年份、論文標題、作者、歸屬一律以 `_meta/landscape-2026-06.md` 為準；landscape 沒有的自行查證（每章 3~8 次 web 查證）並標時點 hedge。**特別注意 landscape 標 ⚠️ 的爭議/誤傳項**（如「誰最早發明 attention」、「attention 權重是不是解釋」、「2026 attention 是否被取代」）——照 landscape 的保守版寫。\n- **每個「驚嘆點」要能被重講**：本書核心商品是「原來就這麼一件事」的震撼。每章至少一處明確回答「這裡了不起／反直覺在哪」，且寫到讀者能用自己的話轉述（範例：一個 softmax 加權平均就是全部；query 和 key 用不同投影才能「我找的」≠「我是的」；位置不是內建的、要手動加進去；同一個 attention 公式同時是核迴歸也是 Hopfield 記憶體檢索）。\n- **故障視角是賣點**：attention 的誤解極多（把權重當解釋、以為 attention 找「最相關的一個」其實是混合全部、以為 softmax 有機率語義、忽略置換不變性），`## 故障模式與直覺陷阱` 要寫到位、用 landscape 查證過的正確版。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整。\n\n## 事實正確性\n\n- 歷史與時效性事實（年份、論文、作者、採用情形、2026 現況、連結）以 `_meta/landscape-2026-06.md` 為事實基準；本章特定細節自行用 WebSearch/WebFetch 查證（每章 3~8 次）。\n- 數學內容（公式、推導、計算）不依賴 landscape，但必須自我複核；常被誤傳的事實（attention 的發明歸屬、√d 的真正理由、attention≠解釋的辯論、modern Hopfield 等價、Mamba/SSM 是否取代 attention）以 landscape 查證版為準。\n- 時效性事實標時點：`（2026-06）`。**frontier 章（SSM/Mamba/混合架構之爭）尤其要誠實標時點、區分「已驗證事實」與「趨勢/推測」**。延伸閱讀只放真實存在的連結；沒把握標「（未驗證）」。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（注意力熱圖、三步骨架、encoder-decoder、QK/OV 電路、全書地圖），必須通過 `check_diagrams.py`（CJK=2 欄寬）。\n- 多行數學推導、矩陣、權重表、softmax 計算用 ```text 區塊；可讀程式片段用 ```python 區塊（英文）。表格用於陷阱清單、變體對照表、超參數表。\n- 跨章引用格式：`（見 ch07）`；跨書 `（見《矩陣是動詞》ch15）`。不要寫死檔名路徑。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整本書最反直覺的一頁」）。不行銷、不喊口號、不堆「太神奇了」式空洞感嘆——震撼用內容本身造成，形容詞是結果不是手段。允許冷幽默（這個領域充滿「X is all you need」的論文標題梗、被反例打臉的宣稱、和「attention 到底是不是解釋」這類嘴仗）。數學不裝高深：每個符號出場都有白話直覺在旁邊（內積＝相似度、softmax＝soft 的 argmax、除 √d＝別讓分數太大把 softmax 壓死）；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘，三步骨架的關鍵就在這」。\n"}]}</script>
