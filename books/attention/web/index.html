 個未來位置  →  剩 2 個位置瓜分全部的 1\n```\n\n這也是為什麼遮罩**加在 softmax 前**這件事是對的、不可調換順序的。加在後面（先 softmax 再把某些權重清 0）你還得手動重新正規化，否則和不為 1；加在前面，softmax 的正規化天然就幫你算對了。一句話：**遮罩屬於「正規化之前」，因為它要借 softmax 的正規化來把權重分對。**\n\n## Worked example：給脊椎的 3×3 矩陣套上因果遮罩\n\n回到脊椎——序章那個句子 *\"the animal didn't cross the street because **it** was too tired.\"*，簡化序列 **[animal, street, it]**。注意這個順序：animal 在最左、it 在最右，正好對應它們在句子裡出現的先後（it 是後面才冒出來的代名詞）。這個順序待會是重點。\n\nch07 給了你完整的 3×3 自注意力矩陣（每個 token 當 query，對三個 key 打分、softmax）。本章把那張矩陣請回來，蓋上因果遮罩，看它怎麼變。\n\n先看**縮放後的分數矩陣**（已經除過 √d=2，沿用 ch06 的尺度）。其中 **it 那一列是全書正典 [2, 1, 0]**（ch04 打分、ch06 縮放定下的脊椎數字）；animal、street 兩列的分數**在這裡只當示意**（它們的 query 投影本書基準表沒鎖死，真正的全矩陣在 ch07，這裡只為了演示遮罩的形狀，數字選得能看出對稱性即可）：\n\n```text\n縮放後分數矩陣（列 = query 視角，欄 = 對哪個 key 打分）\n              ┌─ animal ─┬─ street ─┬──  it  ──┐\n  q=animal    │    3     │    1     │    0     │   ← 示意\n  q=street    │    1     │    3     │    0     │   ← 示意\n  q=it        │    2     │    1     │    0     │   ← 正典脊椎 [2,1,0]\n              └──────────┴──────────┴──────────┘\n```\n\n### 第一步：先看雙向（無遮罩）長什麼樣——回收 ch07\n\n對每一列各自做 softmax（這就是 ch07 的雙向自注意力，每個 token 看遍全句）：\n\n```text\n雙向（無遮罩），逐列 softmax：\n  q=animal: softmax([3,1,0]) = [0.844, 0.114, 0.042]   ← animal 看得到右邊的 it（0.042）\n  q=street: softmax([1,3,0]) = [0.114, 0.844, 0.042]   ← street 也看得到右邊的 it\n  q=it    : softmax([2,1,0]) = [0.665, 0.245, 0.090]   ← it 看左邊的 animal/street（正典）\n```\n\n（核對 it 列：e²=7.389、e¹=2.718、e⁰=1，和=11.107，得 [0.665, 0.245, 0.090]——和 ch06 宣告的正典脊椎權重一字不差 ✓。animal 列：e³=20.086、e¹=2.718、e⁰=1，和=23.804，得 [0.844, 0.114, 0.042] ✓。）\n\n關鍵觀察：**雙向矩陣是「滿的」**——每一列三個欄位都有非零權重。特別看 animal 那一列：它對 it 分了 0.042 的權重。animal 在句子最左邊，it 在最右邊，**animal 看到了它右邊的、未來的 it**。在一個理解任務（BERT）裡這完全沒問題；但在一個生成任務裡，這就是時光旅行。\n\n### 第二步：蓋上因果遮罩——對稱被打破\n\n現在套上下三角 0、上三角 −∞ 的遮罩。逐列看「合法的分數」與遮罩後重算的 softmax：\n\n```text\n因果遮罩後（第 i 列只保留欄 j ≤ i，其餘設 −∞，再 softmax）：\n\n  q=animal（第 1 列，只能看自己）\n     遮罩後分數 [  3 ,  −∞ ,  −∞ ]\n     softmax    [ 1.000, 0.000, 0.000 ]   ← 只剩自己，權重被迫全給自己\n\n  q=street（第 2 列，能看 animal、street）\n     遮罩後分數 [  1 ,   3 ,  −∞ ]\n     softmax    [ 0.119, 0.881, 0.000 ]   ← it 那欄歸零，animal/street 重新瓜分\n\n  q=it（第 3 列，能看 animal、street、it——全部）\n     遮罩後分數 [  2 ,   1 ,   0 ]\n     softmax    [ 0.665, 0.245, 0.090 ]   ← 和雙向時一模一樣（it 在最右，本來就沒未來可看）\n```\n\n（核對 street 列：合法分數 [1, 3]，e¹=2.718、e³=20.086，和=22.804，得 [0.119, 0.881] ✓。）\n\n把雙向與因果並排成熱圖（█ 最濃、░ 最淡，█ 對應權重大；空白＝被遮掉、權重 0）：\n\n```text\n雙向（ch07，對稱）              因果遮罩（ch11，單向下三角）\n        an  st  it                     an  st  it\n animal ███  ░   ░             animal ███\n street  ░  ███  ░             street  ░  ███\n it     ██▓  █   ░             it     ██▓  █   ░\n        └ 每列都滿 ┘                   └ 嚴格上三角全空（未來看不到）┘\n```\n\n兩張圖並排，本章的轉折一目了然：\n\n1. **因果矩陣是個下三角**。所有嚴格上三角的格子（未來連結）權重都是 0，被乾淨地擋掉了。\n2. **animal 那一列塌成 [1, 0, 0]**。這是最戲劇性的變化。在雙向時 animal 還能參考 street 和 it；蓋上遮罩後，animal 是第一個 token，左邊什麼都沒有，只能看自己——權重被迫 100% 給自己。**句子的第一個 token 永遠只能盯著自己看**（這個現象在真實模型裡和「attention sink」有關，故障段會講）。\n3. **it 那一列完全沒變**，還是正典的 [0.665, 0.245, 0.090]。為什麼？因為脊椎序列 [animal, street, it] 裡，**it 排在最後**——它本來就沒有任何「未來」可看，遮罩對它毫無作用。it 合法地看著它左邊的 animal（0.665）和 street（0.245），ch01 那個「it 該看 animal」的懸念在因果世界裡照樣成立，而且是**完全合法**地成立。\n\n第 2 點和 ch07 的對照是本章的脊椎時刻，值得明寫：**ch07 的雙向矩陣是對稱的——animal 看得到 it、it 也看得到 animal。因果遮罩把這個對稱單向地打破了：it 仍看得到 animal（animal 在它過去），但 animal 再也看不到 it（it 在 animal 的未來）。** 注意力的流向，從「兩兩互看」變成了「只能往回看」。一張對稱的關係圖，被遮罩裁成了一張只有「指向過去」的箭頭的有向圖。\n\n### 可選：causal mask 的幾行 numpy\n\n如果你想看演算法骨架而非概念，因果遮罩的核心就這幾行。這段跑出來的 it 列，正是上面手算的正典 [0.665, 0.245, 0.090]：\n\n```python\nimport numpy as np\n\ndef causal_mask(n):\n    # upper triangle (j > i) is the future -> True means \"mask it out\"\n    return np.triu(np.ones((n, n), dtype=bool), k=1)\n\nscores = np.array([[3., 1., 0.],     # q=animal  (illustrative rows)\n                   [1., 3., 0.],     # q=street\n                   [2., 1., 0.]])    # q=it      (canonical spine [2,1,0])\n\nscores[causal_mask(len(scores))] = -np.inf   # set the future to -inf BEFORE softmax\nweights = softmax(scores, axis=-1)            # each row renormalizes over legal positions\n# weights[2] -> [0.665, 0.245, 0.090]   (matches the hand-computed it row)\n```\n\n`np.triu(..., k=1)` 取的是**嚴格上三角**（不含對角線），剛好就是「未來」那些格子。把它們設 −np.inf，softmax 自動把它們的權重算成 0。整個因果遮罩，本質就是這一行 `scores[mask] = -inf`。\n\n## 另一種遮罩：padding mask\n\n因果遮罩管「時間」（不准看未來）；還有一種遮罩管「真假」——**padding mask（填充遮罩）**。它的存在純粹是工程上的便利，但你會在每個真實系統裡看到它，值得認得。\n\n問題的來源你很熟：模型一次處理一**批（batch）**句子才有效率，但同一批裡的句子長度不一。「貓在睡覺」是 4 個 token、「那隻黑貓昨天整個下午都在沙發上睡覺」是 15 個。矩陣運算要求每一列等長，於是短句要被**補齊（padding）**到最長句的長度——尾巴塞幾個沒有意義的特殊 token（`[PAD]`），把 4 撐到 15。\n\n```text\n原句：     [ 貓 ,  在 ,  睡 ,  覺 ]\n補齊後：   [ 貓 ,  在 ,  睡 ,  覺 , PAD, PAD, ... , PAD ]\n                                  └────── 11 個沒有意義的填充 ──────┘\n```\n\n這些 `[PAD]` 是湊數的，沒有任何語意。如果讓真實的 token 去 attend 它們，模型就會把一堆垃圾混進加權平均裡。所以——**padding mask 把所有 `[PAD]` 欄位的分數也設成 −∞**，讓任何 token 對 `[PAD]` 的注意力權重歸 0（2026-06 查證）。手法和因果遮罩一模一樣（softmax 前設 −∞），只是遮的對象不同：\n\n```text\n因果遮罩：遮「未來位置」（j > i）        ← 管時間順序，保自迴歸\npadding 遮罩：遮「填充位置（PAD）」      ← 管批次對齊，濾掉湊數的空 token\n```\n\n兩種遮罩可以**疊加**：生成模型在一個 batch 裡，既要不看未來（causal），又要不看 PAD（padding）。實作上就是兩個 −∞ 遮罩矩陣相加，一起加進分數再 softmax。它們本質是同一招的兩個用途——**用 −∞ 把「不該看的位置」在 softmax 之前排除掉**。\n\npadding mask 是「與部署相關」那一側的東西（怎麼 batching、怎麼 pad、序列怎麼打包進記憶體），深度指向《從後端到 AI Infra》ch06（batching）。本書認得它、知道它和因果遮罩同源即可，不展開工程細節。\n\n## 雙向 vs 單向：BERT、GPT 與遮罩的選擇\n\n把本章收進全書的大圖。同一套自注意力，蓋不蓋因果遮罩、蓋哪種，決定了模型「看世界的方式」，也決定了它擅長什麼。這是 ch13 三種模型家族的伏筆，這裡先把「遮罩這條軸」講清楚。\n\n| | 因果遮罩？ | 每個 token 能看到 | 擅長 | 代表 |\n|---|---|---|---|---|\n| **編碼器（encoder）** | **不蓋** | 全句（左右兩邊都看） | 理解、分類、抽取 | BERT |\n| **解碼器（decoder）** | **蓋** | 只看自己與左邊（過去） | 生成（一個字一個字往後寫） | GPT |\n\n關鍵對照（2026-06 查證）：\n\n- **BERT 是雙向的（bidirectional）**：它**不蓋**因果遮罩，每個 token 都能 attend 全句的左邊和右邊。為什麼可以？因為 BERT 做的是**理解**任務——你給它一整句完整的話，要它判斷情感、抽取實體、做克漏字填空。整句話一開始就攤在桌上，沒有「未來尚未發生」的問題，當然要兩邊都看（左右都是線索）。這就是 ch07 那張對稱矩陣的自然棲息地。\n- **GPT 是單向的（unidirectional / causal）**：它**蓋**因果遮罩，每個 token 只能看自己與左邊。為什麼必須？因為 GPT 做的是**生成**任務——它要學會「給定前面的字，預測下一個字」。訓練時，如果讓它在預測第 i+1 個字時偷看到第 i+1 個字（答案），它會學到一個作弊的捷徑（直接抄答案），上線生成時沒有未來可抄，立刻原形畢露。因果遮罩強迫它在訓練時也只能依賴過去，學到的才是真本事。\n\n兩者**自注意力的機制完全相同**——同樣的 Q/K/V、同樣的內積、同樣的 softmax。**差別只在那個遮罩矩陣蓋不蓋。** 這是本章想讓你帶走的最大震撼之一：把一個世界級的「理解模型」改造成一個世界級的「生成模型」，在注意力這一層，差的不是架構，是**一個下三角的常數矩陣**。\n\n> 為什麼今天的主流 LLM（GPT、Claude、Gemini…）幾乎都是 decoder-only 的單向因果模型？因為「預測下一個 token」這個訓練目標既通用又能無限自監督（任何文字都是現成的訓練資料：拿前 i 個字猜第 i+1 個），而它要成立，就**必然**要因果遮罩來防作弊。三種模型家族的完整譜系（含 encoder-decoder 的 T5）留 ch13；本章你只要記住：**遮罩是「生成」這件事的入場券。**\n\n順帶說一個 ch12 的鉤子：剛剛講的都是 token 看**同一個序列**裡的其他 token（自注意力）。下一章會出現「目標序列的 token 去看**另一個**源序列」的交叉注意力（cross-attention）——那時遮罩的故事又會變一個樣子（cross-attention 通常**不蓋**因果遮罩，因為源序列是已經完整給好的）。先記著這個懸念。\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| **「要關掉一個連結，把它的權重（或分數）設成 0 就好」** | 致命的順序錯誤。遮罩動的是 **softmax 前的分數**；分數設 0 → `e⁰=1` → softmax 後權重不是 0、未來照樣被看到。 | 默念 `e⁰=1`、`e^(−∞)=0`。想讓「權重」變 0，要把「分數」設 −∞，不是設 0。 |\n| **把遮罩加在 softmax 之後** | 先 softmax 再把某些權重清 0，會破壞「和為 1」，你得手動重新正規化，多一步又容易錯。 | 記住：遮罩屬於「正規化之前」。它要借 softmax 的正規化自動把剩下的合法權重分對。 |\n| **以為「設 −∞」是直接寫 `float('-inf')` 就沒事** | 危險的「應該沒事」假設。真實實作常用一個**很大的負數**（如 float16 的 −65504）而非字面 −∞，因為 −∞ 在某些運算下會產生 `NaN`（如 `−∞ + (−∞)`、或一整列全被遮時 softmax 變 `0/0`）。 | 看到一整列權重變 `NaN`，先懷疑「是不是有一列被全遮了」（沒有任何合法位置可分），或「−∞ 參與了減法/加法」。實務用大負數＋保證每列至少一個合法位置。 |\n| **以為因果遮罩改變了 it 對 animal 的權重** | 不會。it 在脊椎序列裡排最後，它本來就沒有未來可看，遮罩對它**毫無作用**——it 列在雙向和因果下都是 [0.665, 0.245, 0.090]。 | 遮罩只動「有未來可看」的位置。最後一個 token 的列永遠不受因果遮罩影響。 |\n| **混淆 padding mask 與 causal mask** | 兩者都用 −∞，但管的事不同：causal 管時間（不看未來）、padding 管真假（不看湊數的 PAD）。把 padding 當成 causal，會在「雙向 encoder 也需要 padding mask」時想不通。 | 問自己：「我在擋的是『未來』還是『湊數的空 token』？」BERT 不蓋 causal 但**照樣要** padding mask。 |\n| **「第一個 token 只看自己，是 bug」** | 不是 bug，是因果遮罩的數學必然——第一個 token 左邊沒東西，softmax 只能把權重全給自己（[1,0,0]）。 | 看到第一個 token 列是 [1,0,...] 屬正常。但要警覺它的近親：**attention sink**。 |\n\n**具名失效模式：attention sink（注意力沉沒）。** 在真實的因果模型裡，有一個被反覆觀察到的現象：**序列開頭的 token（尤其第一個）會吸走大量的注意力權重**，即使它語意上根本不重要（可能只是個 `[BOS]` 開頭符號）。直覺上的成因和本章直接相關：因果遮罩下，靠前的 token 是**每一個後續 token 都看得到**的「公共過去」——它在每一列的合法集合裡都出現，於是 softmax 反覆把權重往它身上倒；而第一個 token 自己又只能看自己（[1,0,0]）。模型似乎學會了「當我這一步沒什麼特別想看的，就把多餘的注意力預算倒給開頭那個 token」，像一個洩壓閥。這個現象在長 context 與串流生成（streaming）裡有實際的工程後果（為什麼裁掉開頭 token 會讓模型崩掉），但那屬於部署/KV cache 的範疇，深度指向《從後端到 AI Infra》ch05。本章你只要建立直覺：**第一個 token 在因果遮罩下的特殊地位（人人看得到、自己只能看自己），是 attention sink 的結構性源頭。**\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [12 分鐘]（★）** 親手把因果遮罩套到脊椎矩陣上。給縮放後的 3×3 分數矩陣（列＝query：animal / street / it；欄＝key：animal / street / it）：\n\n```text\n  q=animal  [ 3, 1, 0 ]\n  q=street  [ 1, 3, 0 ]\n  q=it      [ 2, 1, 0 ]\n```\n\n(a) 寫出因果遮罩矩陣 M（哪些格子設 −∞）。(b) 對 **animal 列**和 **it 列**各算一次遮罩後的 softmax（一步不跳：寫出合法分數、各自的 e 次方、求和、相除）。(c) 比較 animal 列遮罩前 [0.844, 0.114, 0.042] 與遮罩後的差別，一句話說因果遮罩對 animal「拿掉了什麼」。\n\n**第 2 題 [10 分鐘]（★★）** 「設 −∞ 而不是設 0」。(a) 若把 it 列要遮的位置（這題假設 it 不是最後一個、它右邊還有一個 token x，分數本來是 5）的分數設成 **0** 而非 −∞，手算它經 softmax 後會分到多少權重（用 it 對 animal/street/x = [2, 1, 0_設成的0]，注意這裡「0」是被你錯設的遮罩值）？(b) 為什麼這代表「未來沒被擋住」？(c) 改成設 −∞ 後權重變多少？用 `e⁰` 和 `e^(−∞)` 的值解釋這兩種做法的根本差別。\n\n**第 3 題 [8 分鐘]（★★）** 把因果遮罩對到 append-only log。(a) 你維護一個交易 log，要重算帳戶在第 t 筆交易後的餘額——這對應因果遮罩的哪條規則？(b) 如果你的程式不小心讀到了第 t+1 筆（退款），對應到注意力裡是什麼故障？(c) 用「self-attention 機制不變、只多一個下三角遮罩」這句話，向另一個工程師解釋 BERT（理解）和 GPT（生成）的差別。\n\n### 推演解答\n\n**第 1 題。**\n(a) 因果遮罩 M（j > i 設 −∞，其餘 0）：\n```text\n        an   st   it\nanimal [ 0  −∞   −∞ ]\nstreet [ 0   0   −∞ ]\nit     [ 0   0    0 ]\n```\n(b) **animal 列**：合法分數只剩 [3]（自己），softmax 單一元素 = **[1.000, 0.000, 0.000]**——只剩自己，權重全給自己。\n**it 列**：合法分數 [2, 1, 0]（it 在最後，全部合法，遮罩沒動它）；e²=7.389、e¹=2.718、e⁰=1，和=11.107；權重 = [7.389/11.107, 2.718/11.107, 1.000/11.107] = **[0.665, 0.245, 0.090]**（和正典脊椎一致 ✓）。\n(c) 遮罩**拿掉了 animal 對未來（street、it）的所有視野**：雙向時 animal 還能看 street（0.114）和 it（0.042），遮罩後這兩欄歸 0，權重被迫 100% 回到自己身上。animal 是第一個 token，左邊無物，只能盯自己。常見錯路：以為遮罩會「重新分配」未來的權重到別的未來位置——不會，它把所有未來都歸 0，只在**合法（過去＋當下）**的位置裡重新正規化。\n\n**第 2 題。**\n(a) 錯誤地把要遮的位置 x 設成分數 0，於是 it 的分數是 [2, 1, 0]（animal, street, x），其中第三個 0 是「本該被遮卻被你設成 0 的未來」。softmax([2,1,0]) = [0.665, 0.245, **0.090**]——**x（未來）分到了 0.090 的權重**。\n(b) 0.090 不是 0。未來的 token x 實實在在地參與了加權混合，貢獻了 9% 的輸出——模型偷看了未來。因為 `e⁰ = 1`，設成 0 的分數在 softmax 裡和「分數本來就是 0 的合法位置」沒有任何區別，根本沒被當成「該排除」。\n(c) 改設 −∞：分數變 [2, 1, −∞]，`e^(−∞) = 0`，x 對分母毫無貢獻；合法的 [2, 1] 重新正規化：e²=7.389、e¹=2.718，和=10.107，得 [0.731, 0.269, **0.000**]——x 權重剛好 0，乾淨擋掉。根本差別：`e⁰=1`（設 0 → 還在投票）vs `e^(−∞)=0`（設 −∞ → 退出投票）。softmax 的「關閉鍵」在 −∞，不在 0。\n\n**第 3 題。**\n(a) 對應「第 i 個 token 只能 attend j ≤ i」——重算第 t 筆後的餘額只能讀 ≤ t 的交易，等同因果遮罩的下三角規則（只看過去與當下）。\n(b) 讀到 t+1（未來退款）＝注意力 attend 到了 j > i 的未來位置＝**因果遮罩失效（時光旅行）**。在生成模型裡這等於訓練時偷看答案，學到作弊捷徑、上線崩掉。\n(c) 一個說得通的版本：「BERT 和 GPT 的 self-attention 機制一模一樣——同樣 Q/K/V、內積、softmax。唯一的差別是 GPT 在分數矩陣上多蓋一個下三角為 0、上三角為 −∞ 的因果遮罩，逼每個 token 只能看自己和左邊；BERT 不蓋，每個 token 兩邊都看。所以 BERT 適合『理解』（整句一開始就攤開、左右都是線索），GPT 適合『生成』（一個字一個字往後寫，不准偷看還沒寫的）。把理解模型改成生成模型，在注意力這層差的就是一個遮罩矩陣。」——點到「機制相同、只差遮罩」「雙向 vs 單向」「理解 vs 生成」就算抓到核心。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 因果遮罩在三步骨架的哪個位置、動了什麼、**沒**動什麼？（提示：打分與正規化之間，覆寫送進 softmax 的分數；不動 Q/K/V、不動 softmax 公式。）\n2. 為什麼遮罩要設 **−∞** 而不是設 **0**？用 `e⁰=1` 和 `e^(−∞)=0` 講一遍，並說清楚「你想設成 0 的其實是 softmax 之後的權重，但你能動的只有 softmax 之前的分數」。\n3. 為什麼遮罩要加在 softmax **之前**而不是之後？（借 softmax 的正規化把剩下的合法權重自動分對、保住和為 1。）\n4. 脊椎序列 [animal, street, it] 套上因果遮罩後，哪一列**完全沒變**、為什麼？哪一列塌成 [1, 0, 0]、為什麼？\n5. ch07 的雙向矩陣是對稱的（animal 看得到 it、it 也看得到 animal）。因果遮罩怎麼**單向地**打破這個對稱？（it 仍看得到 animal，但 animal 看不到 it。）\n6. causal mask 和 padding mask 都用 −∞，差別是什麼？為什麼**雙向的 BERT 不蓋 causal mask，卻照樣需要 padding mask**？\n7. BERT（雙向）和 GPT（單向）的 self-attention 機制差在哪？（機制完全相同，只差蓋不蓋因果遮罩。）為什麼生成任務**必須**蓋？\n8. 「第一個 token 只能看自己」是 bug 嗎？它和 attention sink 有什麼結構性的關係？\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.2.3**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：原文講 decoder 的 masked self-attention——「把所有非法（未來）連結對應的 softmax 輸入值設為 −∞」。一句話帶過，但那一句就是本章的全部。對照你自己的推導讀，看原文多精簡。\n- **Sebastian Raschka「Causal Attention」FAQ**（https://sebastianraschka.com/faq/docs/causal-attention.html ）：把「為什麼 GPT 不能看未來 token」用最少的廢話講清楚，附三角遮罩的圖；和本章的雙向 vs 單向那節互補（2026-06 查證）。\n- **「Why Do We Use Negative Infinity for Masking in Attention?」（Medium, 2026-01）**（https://medium.com/@sachinkalsi/why-do-we-use-negative-infinity-for-masking-in-attention-450c59274ac8 ）：專門講「為什麼是 −∞ 不是 0」這一個點，並提到實作上用大負數（如 float16 的 −65504）避免 NaN——正好對應本章故障表第三列（2026-06 查證）。\n- **MachineLearningMastery「A Gentle Introduction to Attention Masking」**（https://machinelearningmastery.com/a-gentle-introduction-to-attention-masking-in-transformer-models/ ）：把 causal mask 和 padding mask 兩種遮罩放在一起講、附程式，補齊本章 padding mask 那一節的工程細節（2026-06 查證）。\n- **《從後端到 AI Infra》ch05**：因果遮罩之所以重要，是因為自迴歸生成要一個字一個字往後寫——而每寫一個字都重算已算過的 K/V 太浪費，於是有了 **KV cache**（把過去的 K/V 快取起來）。本章只講「為什麼只能看過去」的原理，「過去的 K/V 怎麼快取與管理」是那本書的事；attention sink 對串流生成的工程後果也在那條線上。\n- **《從後端到 AI Infra》ch06**：padding mask 的存在是為了 batching 變長序列。怎麼把長度不一的句子打包進一個 batch、怎麼省下 padding 浪費的算力（packing），是那本書的工程深度，本章只認得 padding mask 與 causal mask 同源。\n"}, {"id": "ch12-cross-attention", "file": "ch12-cross-attention.md", "group": "Part III — 補上缺的零件", "title": "ch12 — 交叉注意力與三種注意力", "md": "# ch12 — 交叉注意力與三種注意力\n\n> **本章解決什麼問題**：到 ch11 為止，我們的 query、key、value 一直來自**同一個序列**——每個 token 既是查詢者也是被查者（self-attention）。但 ch03 那個 Bahdanau 的翻譯場景明明是「目標句的詞去看來源句」，那是**跨兩個序列**的查找，我們一直沒正式回去補。本章把這個洞補上：原始 Transformer 其實同時用了**三種**注意力——encoder self、decoder masked-self、encoder-decoder cross——差別只在「誰當 query、誰當 key/value、能不能看未來」。看懂它你就掌握了 attention 全部的接線方式，也會看到脊椎那個 it 在這裡升級成翻譯場景：脊椎矩陣第一次從 3×3 方陣變成「目標×源」的矩形。三步骨架一個字都沒變——只是換了 query 和 key/value 的來源。\n\n## 從你已知的出發\n\n你天天在做兩種查找，只是平常不會把它們分開命名。\n\n第一種：**self-JOIN**。同一張表，把每一列拿去跟同一張表的其他列比對——找出「同一筆訂單裡互相關聯的明細」「同一個 session 裡前後相關的事件」。query 和被查的資料來自**同一張表**。這正是 ch07 講的 self-attention：序列裡每個 token 對同一序列的所有 token 算相似度。\n\n第二種：**跨表 JOIN**。你拿 A 表的某一列當查詢條件，去 B 表裡找匹配的列——`orders JOIN users ON orders.user_id = users.id`。查詢的人在 A 表，被查的資料在 B 表，**兩張不同的表**。這就是本章主角 **cross-attention**：query 來自一個序列，key/value 來自**另一個**序列。\n\n```text\nself-attention  ≈  self-JOIN   （同一張表，列對列）\ncross-attention ≈  cross-JOIN  （A 表的列去查 B 表）\n```\n\n而 ch11 的 causal mask，是在 self-JOIN 上再加一條權限規則：**你只能 JOIN 到時間戳記比你早的列**（append-only log，讀不到未來）。\n\n所以原始 Transformer 用的「三種注意力」，本質就是三種「誰查誰、能查到哪」的組合——像你給不同的查詢配不同的權限：\n\n```text\n                  query 來源     key/value 來源    能看未來嗎\n─────────────────────────────────────────────────────────────\n① encoder self     源序列自己      源序列自己         能（雙向，看全句）\n② decoder self     目標序列自己    目標序列自己       不能（causal mask，只看左）\n③ cross            目標序列        源序列            不適用（看遍整個源）\n```\n\n這張表就是本章的全部骨幹。三種注意力不是三個新機制——是同一個三步骨架（打分→正規化→加權混合），接到三種不同的輸入插座上。本章動的不是骨架的任何一步，而是**第一步打分的兩個輸入「query 從哪來、key/value 從哪來」的接線方式**。\n\n## 先回到 ch03：Bahdanau 其實就是 cross-attention 的雛形\n\ncross-attention 不是 Transformer 發明的新東西。你在 ch03 已經親手算過它，只是當時還沒給它這個名字。\n\nch03 的 Bahdanau 對齊（2014）做的是：decoder 在生成每個目標詞時，拿**當前的 decoder 狀態**去對 encoder 的**每一個源句隱態**算對齊分數，softmax 成權重，加權混合源句隱態，得到一個動態的 context 向量（2026-06 查證：這正是現代 cross-attention 的概念前身——decoder 的查詢去看 encoder 的隱態）。把它翻成 Q/K/V 的話：\n\n```text\nBahdanau 2014（cross 的雛形）         Transformer cross-attention（2017）\n─────────────────────────────        ─────────────────────────────────────\ndecoder 當前狀態  → 對齊分數的 query   decoder 該層輸出      → Q（學來的投影）\nencoder 各隱態    → 被對齊的對象       encoder 輸出          → K（學來的投影）\nencoder 各隱態    → 被加權混合的內容   encoder 輸出          → V（學來的投影）\n加性評分 vᵀtanh(·) → 打分              縮放內積 QKᵀ/√d       → 打分\n```\n\n差別只有兩處，都是前面幾章補過的零件：① 打分從 Bahdanau 的加性小網路換成 ch04–06 的縮放內積；② Bahdanau 直接拿 RNN 隱態當 key/value，Transformer 多加了 W_Q/W_K/W_V 三個**學來的投影**（ch04）。**接線方式完全一樣**：目標端當 query，源端當 key/value。\n\n所以你大可以把這一章當成「ch03 的正式版」。當年 Bahdanau 解決固定向量瓶頸（ch02）靠的就是 cross-attention 的雛形；Transformer 只是把它標準化、配上 self-attention 一起用。三步骨架在 ch03 第一次現身時，跑的其實就是一次 cross-attention——我們繞了一圈才正式給它命名。\n\n## 三種注意力：逐一拆「誰查誰」\n\n原始 Transformer（Vaswani 2017，§3.2.3，landscape §2 已錄）是一個 encoder-decoder 架構：左邊一疊 encoder 層讀源句（比如英文），右邊一疊 decoder 層生成目標句（比如中文）。在這個架構裡，注意力出現在**三個**位置，各司其職。\n\n```text\n   源句（英文）                          目標句（中文，逐字生成）\n   ┌─────────────┐                       ┌──────────────────────┐\n   │  ENCODER    │                       │      DECODER         │\n   │             │                       │                      │\n   │ ① self-attn │                       │ ② masked self-attn   │\n   │  (雙向)     │── encoder 輸出 ──┐    │  (只看左邊，ch11)    │\n   │             │      K, V        │    │                      │\n   └─────────────┘                  └───►│ ③ cross-attn         │\n                                     Q ──│  (Q 來自此處 ↑)      │\n                                         │                      │\n                                         └──────────────────────┘\n```\n\n### ① encoder self-attention（雙向，看全句）\n\nencoder 在讀源句時，每個源 token 對**同一個源序列**的所有 token 做注意力——Q、K、V 同源（ch07 的 self-attention）。沒有 mask，是**雙向**的：英文 \"animal\" 這個位置可以同時看它左邊和右邊的詞，因為讀理解時整句都在手上、沒有「未來」這回事。這顆引擎的任務是把源句**理解透**：每個 token 吸收全句脈絡，產出一份「讀懂了的」表示。\n\n### ② decoder masked self-attention（單向，只看左）\n\ndecoder 在生成目標句時，每個已生成的目標 token 也對**目標序列自己**做 self-attention——但加了 ch11 的 **causal mask**：生成第 i 個中文字時，只能看它左邊已經生成的 ≤i 個字，不能偷看還沒生成的未來（否則就作弊了，自迴歸生成的鐵律）。這顆引擎的任務是讓目標句**自己內部連貫**：已經寫出的詞要彼此呼應、語法通順。\n\n### ③ encoder-decoder cross-attention（目標查源）\n\n這是本章的主角，也是把兩個序列**接起來**的關鍵接點。在這一步：\n\n```text\nQ（查詢）   來自 decoder——「我這個目標位置，需要源句的什麼？」\nK, V        來自 encoder 輸出——源句被讀懂後的那份表示\n            「源句各位置標榜自己是什麼（K）／能交出什麼內容（V）」\n```\n\n每個 decoder 位置的 query，去對**整個源序列**的 key 打分、softmax、混合源序列的 value（landscape §2：「allows every position in the decoder to attend over all positions in the input」——目標端每個位置可看遍源端所有位置）。這就是翻譯時「目標詞回頭查源句哪幾個詞最相關」的那一步——和 ch03 Bahdanau 同一件事。\n\n> 一個值得停一下的設計細節：cross-attention 這一步**沒有 causal mask**。為什麼？因為源句（要翻譯的英文）在生成開始前就**整句給定**了——它不是逐字生成的，沒有「未來」可偷看。目標端的 query 看遍**整個**源句是合法且必要的（你翻譯時當然要看完整句英文）。causal mask 只管「目標序列自己內部不能看未來」（②），不管「目標看源」（③）。這是 ch11「能不能看未來」那條規則在三種注意力裡的精確落點。\n\n把三種注意力對回三步骨架，會看到一件讓人安心的事：**三步骨架一個字都沒變**。打分都是縮放內積、正規化都是 softmax、混合都是加權平均 value。變的只是第一步打分的**兩個輸入插在哪**：\n\n```text\n                打分的 query 插座    打分的 key/value 插座\n─────────────────────────────────────────────────────────\n① encoder self      源序列              源序列            （同源、雙向）\n② decoder self      目標序列            目標序列          （同源、masked）\n③ cross             目標序列            源序列            （異源）★本章\n```\n\n這就是為什麼說「三種注意力」其實是同一個機制的三種接法。你已經會算 ① 和 ②（ch07、ch11）；本章只需把 ③ 的「Q 與 K/V 來自不同序列」這件事弄清楚、親手算一次。\n\n## 脊椎升級：從 3×3 方陣到「目標×源」矩形\n\n現在把脊椎那個 it 升級成翻譯場景，並且**明寫一個關鍵轉換**：注意力矩陣不再是方陣。\n\n到 ch11 為止，脊椎一直是 3 個 token 的序列 [animal, street, it] 對自己做 self-attention，注意力矩陣是 **3×3 方陣**（每個 token 當 query，對三個 key 打分，每一列、每一欄都是同一批 token）。cross-attention 一來，這個方陣的前提就破了：\n\n```text\nself-attention（ch07–11）            cross-attention（本章）\n   query ↓  key →                       query ↓   key →\n        animal street it                     源_animal  源_street\n animal  ┌──┬──┬──┐                  目標_它 ┌────────┬─────────┐\n street  ├──┼──┼──┤   3×3 方陣               └────────┴─────────┘\n it      └──┴──┴──┘   （同一批 token       (1×2 矩形：1 個目標 query × 2 個源 key)\n                       既當列又當欄）\n```\n\n**為什麼變矩形？** 因為 query 來自目標序列、key 來自源序列，**兩個序列的長度可以完全不同**。一句 5 個詞的英文翻成 8 個字的中文，注意力矩陣就是 8×5——8 個目標位置（列）對 5 個源位置（欄）。它不再是方陣，所以你**不能再套 self-attention 那些「對角線是自己」的直覺**（ch04 講過 self-attention 裡每個 token 對自己的分數、ch11 的因果遮罩是對上三角設 −∞）——矩形矩陣根本沒有「對角線＝自己」這回事，因為列和欄是兩批不同的 token。這是脊椎在全書第一次離開方陣，務必記住這個形狀的改變。\n\n具體把脊椎翻成翻譯場景：英文源句 \"the animal didn't cross the street ...\" 經 encoder 讀懂後，我們**只取兩個關鍵源 token 當 key/value**：animal 和 street（簡化，真實的源句有更多 token）。decoder 正在生成中文譯文，輪到生成那個對應 \"it\" 的代名詞——中文裡是「牠／它」（指代動物用「牠」）。這個目標位置產生一個 query，要去問源句：「我這個代名詞，該對齊源句的哪個詞？」\n\n```text\n源端（encoder 輸出，當 K/V）——只取兩個關鍵 token\n  k_animal = (2, 1, 1, 0)      v_animal = (1, 0)\n  k_street = (0, 1, 1, 0)      v_street = (0, 1)\n\n目標端（decoder 當前位置「牠」，當 Q）\n  q_它     = (1, 1, 1, 1)      ← 沿用脊椎 q_it 同一個查詢向量\n```\n\n我們刻意讓目標 query 用**和脊椎 q_it 完全相同**的向量 (1,1,1,1)，並且源端 key/value 直接借用脊椎裡 animal、street 那兩個（基準數字見 outline，全書同一組）。這樣你能清楚看到：**同一個查詢，在 cross 場景下因為「被查的對象變了」（少了 it 自己這個 key），結果會跟 ch07 self-attention 不一樣**——這正是下一節 worked example 要算的重點。\n\n## Worked example：迷你翻譯的 cross-attention\n\n跑完整的三步骨架，維度沿用全書單頭視角 d=4、√d=2。\n\n**第一步：打分。** 目標 query「牠」對兩個源 key 做內積（只有兩個 key，因為源端只取了 animal、street）：\n\n```text\nq_它 · k_animal = (1)(2) + (1)(1) + (1)(1) + (1)(0) = 2+1+1+0 = 4\nq_它 · k_street = (1)(0) + (1)(1) + (1)(1) + (1)(0) = 0+1+1+0 = 2\n                                          原始 cross 分數 [animal 4, street 2]\n```\n\n注意：這兩個內積值 [4, 2] 和脊椎 self-attention 算出來的前兩項**一模一樣**——因為 query 和這兩個 key 都沒變。差別在**少了第三項** q_它·k_it（cross 場景下源端沒有 it 這個 key）。\n\n**第二步：縮放 + 正規化。** 除以 √d = 2，再 softmax：\n\n```text\n[4, 2] / √d=2  →  [2, 1]          ← 縮放後分數\n\ne² = 7.389\ne¹ = 2.718\n                和 = 7.389 + 2.718 = 10.107   ← 只有兩項！\n\nsoftmax 權重：\n  animal: 7.389 / 10.107 = 0.731\n  street: 2.718 / 10.107 = 0.269\n                                   cross 權重 [0.731, 0.269]（驗：和=1.000 ✓）\n```\n\n**這裡是本章最該停十分鐘的地方。** 把它和脊椎正典（ch06 宣告的 self-attention 縮放權重）並排：\n\n```text\n                  animal   street   it       softmax 的分母\n─────────────────────────────────────────────────────────────\nself  [2,1,0]     0.665    0.245    0.090    7.389+2.718+1=11.107（三項）\ncross [2,1]       0.731    0.269     —        7.389+2.718  =10.107（兩項）\n                  ↑        ↑        ↑\n              都變大了             it 不在了\n```\n\n同一個 query、同樣的 animal/street 分數，cross 給 animal 的權重（0.731）卻比 self（0.665）**高**。為什麼？因為 softmax 的分母變了：self-attention 的分母含三項（11.107），cross 只含兩項（10.107，少了 it 貢獻的那個 e⁰=1）。**it 在 self 場景裡分走的 0.090 權重，在 cross 場景裡不存在了，於是被 animal 和 street 按比例瓜分回去**。\n\n更精確地說：animal 對 street 的權重比，在兩個場景裡**完全相同**——都是 e²/e¹ = e ≈ 2.718（self：0.665/0.245≈2.72；cross：0.731/0.269≈2.72）。softmax 不改變參與者之間的相對比例，但**誰參與**會改變每個人分到的絕對份額。這就是「3×3 方陣」變「1×2 矩形」在數字上的直接後果——不是換了公式，是換了 softmax 求和的對象。\n\n> **這裡了不起／反直覺在哪**：很多人以為「cross-attention 是個跟 self-attention 不同的新機制」。不是。它跑的是**字字相同的三步骨架**，連 query 向量、key 向量都可以一樣。唯一變的是「打分時 query 和 key 來自不同的序列、softmax 對不同的一群 key 求和」。看懂這點，你就不會被「self / masked-self / cross / encoder-decoder attention」這一堆名詞淹沒——它們是同一台引擎接到不同插座上。\n\n**第三步：加權混合。** 用源端的 value（v_animal=(1,0)、v_street=(0,1)）：\n\n```text\n輸出 = 0.731·(1,0) + 0.269·(0,1)\n     = (0.731, 0)  + (0, 0.269)\n     = (0.731, 0.269)\n                          cross-attn 輸出 ≈ (0.731, 0.269)\n```\n\n這個輸出向量偏向 v_animal 的方向（第一維 0.731 遠大於第二維 0.269），意思是：decoder 在生成中文代名詞時，從源句**主要拉取了 animal 的內容**——它「對齊」到了英文的 animal。這正是翻譯該有的行為：中文的「牠」對應英文裡的動物。ch01 那個懸念（it 該看 animal）在 cross 場景裡換了個樣子重新成立：**目標語言的代名詞，跨序列對齊回了源語言的正確指代對象**。\n\n熱圖（單列，因為只有一個目標 query；█ 最濃、░ 最淡）：\n\n```text\n            源_animal   源_street\n目標「牠」  ███████     ██▒          ← 主要對齊 animal，分一點給 street\n```\n\n對照 self-attention（ch07 的 3×3）那張「it 那一列在 animal 欄最濃」的熱圖，你會發現 cross 版本就是**抽掉了 it 那一欄、只剩源端兩欄的一條橫切**。形狀對得上，只是換了被查的對象。\n\n## 一張小心心的對照：self 與 cross 並排\n\n把整章濃縮成一次並排計算，幫你把「變的只是接線」這件事坐實：\n\n```text\n                self-attention（ch07）        cross-attention（本章）\n─────────────────────────────────────────────────────────────────────\nquery           q_it（序列自己的 it 位置）     q_它（目標序列的代名詞）\nkey/value 來源  同一序列 [animal,street,it]    源序列 [animal,street]\n打分            q·k 內積（縮放）              q·k 內積（縮放）── 一樣\n參與 softmax    3 個 key                       2 個 key  ← 唯一的結構差別\n縮放分數        [2, 1, 0]                      [2, 1]\n權重            [0.665, 0.245, 0.090]          [0.731, 0.269]\n輸出            (0.755, 0.335)                 (0.731, 0.269)\n注意力矩陣形狀  3×3 方陣                       1×2 矩形（目標×源）\n```\n\n兩欄唯一的「機制差別」就是「key/value 來自哪個序列、有幾個」。其餘——內積、縮放、softmax、混合——逐字相同。這是本章想讓你帶走的一句話：**cross-attention 不是新公式，是新接線。**\n\n## cross-attention 在多模態與生圖裡的角色（一瞥）\n\ncross-attention 的威力不只在翻譯。它的本質是「**讓一個序列被另一個序列當作條件來查詢**」——只要你有「A 想根據 B 來決定怎麼做」的場景，cross-attention 就是那個接點。這在 2020 年後的多模態與生成模型裡成了標準零件（landscape §8，這裡一段帶過、深入指向延伸閱讀）：\n\n- **文字控制生圖（Stable Diffusion / Latent Diffusion，Rombach 2021）**：在去噪 U-Net 的每個注意力塊插入 cross-attention，讓**影像的潛在特徵當 Q**、**文字提示的 token embedding 當 K/V**（2026-06 查證；原文：「by introducing cross-attention layers ... powerful and flexible generators for general conditioning inputs such as text」）。直覺：影像的每個空間區域「查詢」文字提示，問「我這塊該畫成什麼？」——這就是「a cat on a sofa」這串字怎麼鑽進像素裡的機制。query 是圖、key/value 是字，方向和翻譯時剛好可以反過來，但接線邏輯一模一樣。\n\n- **視覺語言模型（Flamingo，DeepMind 2022）**：在凍結的語言模型層之間插入 **gated cross-attention** 層，讓**語言當 Q、視覺特徵當 K/V**（2026-06 查證），把圖片資訊注入文字生成。gated（門控）是為了初始化時不破壞原語言模型——一個工程細節，不展開。\n\n- **對比學習對齊（CLIP，OpenAI 2021）**：嚴格說 CLIP 主要用各自的 self-attention encoder 再做對比，不是靠 cross-attention 融合；列在這裡是提醒你「多模態對齊」有不只一種做法，cross-attention 只是其中最直接的「把 B 當條件查詢」那一種。\n\n共通的模式：**cross-attention ＝ 把外部條件（文字、圖片、任何另一個序列）當成一張可查的 key/value 表，讓主序列按相關度去拉取它需要的資訊**。翻譯是「目標句查源句」，生圖是「圖查文字」，VLM 是「文字查圖」——query 和 key/value 的身分換來換去，但三步骨架和「異源查找」這個核心，從頭到尾沒變。多模態與 diffusion 的機制深入不是本書範圍（一句＋延伸），但你現在知道它們的「注意力接點」長什麼樣了。\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「cross-attention 是跟 self 不同的新機制／新公式」 | 把名詞當成不同的東西。其實跑的是**字字相同的三步骨架**，只有打分的 query 與 key/value 來源不同。 | 默念對照表：內積、縮放、softmax、混合全一樣。問自己「公式哪一項變了？」——沒有，只是 Q 與 K/V 插在不同序列。 |\n| 「cross-attention 的矩陣也是方陣，有對角線＝自己」 | 把 self 的方陣直覺硬套到 cross。cross 矩陣是「目標×源」**矩形**，列和欄是兩批不同 token，根本沒有「對角線＝自己」。 | 看形狀：源句 5 詞、目標 8 字 → 8×5。不是方陣，別找對角線，也別套 causal mask 的上三角直覺。 |\n| 「cross-attention 也要 causal mask、不能看未來」 | 混淆了「目標看源」和「目標看自己」。源句整句給定、不是逐字生成，沒有未來可偷看，目標端看遍整個源是合法的。causal mask 只管 decoder **self**-attention（②）。 | 問自己「源句是逐字生成的嗎？」——不是，翻譯前整句英文就在手上。所以 cross 不遮，看遍全源。 |\n| 「同一個 query，self 和 cross 的權重會一樣」 | 忽略了 softmax 的分母會因「參與的 key 變了」而改變。脊椎裡 it 一抽掉，animal 從 0.665 跳到 0.731。 | 記住：softmax 對「誰參與」敏感。少一個 key，它的權重會被其餘按比例瓜分。並排看 11.107 vs 10.107 的分母。 |\n| 「cross-attention 是 Transformer 發明的」 | 忽略 ch03。Bahdanau 2014 的對齊就是 cross 的雛形（decoder query 看 encoder 隱態），Transformer 只是換上縮放內積與 W_Q/W_K/W_V。 | 回扣 ch03：你早就算過一次 cross-attention，只是當時叫「對齊」。Transformer 標準化了它。 |\n| 「decoder-only 的 GPT 裡也有 cross-attention」 | 危險的過度推廣。今日主流的 decoder-only LLM（GPT 類）**沒有 encoder**，所以**沒有 encoder-decoder cross-attention**——它們只有 masked self-attention（②）。cross 主要活在 encoder-decoder 架構（T5、翻譯）與多模態注入裡。 | 問自己「這個模型有 encoder 嗎？」沒有 encoder 就沒有 ③。三種家族的差別留 ch13 細講，但這個陷阱現在就要避開。 |\n\n最值得警惕的是**最後一個**。讀者很容易把「Transformer ＝ 三種注意力都有」當成普世真理，然後在 2026 年的 decoder-only 世界裡找不到 cross-attention 而困惑。事實是：原始 Transformer（2017，翻譯用）是 encoder-decoder，三種都有；但今日生成式 LLM 多是 decoder-only，**只有 masked self-attention**。cross-attention 在 LLM 主線裡退居幕後，卻在**多模態注入**（生圖、VLM）裡找到了新主場。哪種架構配哪些注意力，是 ch13 三種家族要正式攤開的。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [12 分鐘]（★）** 把 self / masked-self / cross 三者做成對照表。三欄分別是：(a) query 來自哪個序列、(b) key/value 來自哪個序列、(c) 能不能看未來（要不要 causal mask）。填完後用一句話說：這三者**共用**的是什麼、**不同**的只有什麼？\n\n**第 2 題 [15 分鐘]（★★）** 親手算一次 cross-attention，並和 self 對比。給目標 query q=(1,1,1,1)、源端兩個 key k_animal=(2,1,1,0)、k_street=(0,1,1,0)、value v_animal=(1,0)、v_street=(0,1)，d=4。(a) 算兩個內積分數；(b) 除以 √d 後 softmax（e²、e¹、求和、相除）；(c) 加權混合得輸出；(d) 把你算出的 animal 權重（0.731）和脊椎 self-attention 的 animal 權重（0.665）並排，解釋**為什麼 cross 版反而更高**（提示：看 softmax 的分母）。\n\n**第 3 題 [10 分鐘]（★★）** 解釋 cross-attention 與 ch03 Bahdanau 的關係。不查書，用三到五句向另一個工程師說：Bahdanau 的對齊為什麼就是 cross-attention 的雛形？它和 Transformer 的 cross-attention 差在哪兩個零件（都是前面章節補的）？\n\n**第 4 題 [8 分鐘]（★★）** 舉一個「cross-attention 注入條件」的應用並拆解它的 Q/K/V。以「用文字 a cat on a sofa 控制生圖」為例：(a) 誰當 query、誰當 key/value？(b) 用一句話說這一步在直覺上做什麼？(c) 這和翻譯時的 cross-attention 在「接線方向」上有什麼異同？\n\n### 推演解答\n\n**第 1 題。**\n\n```text\n              query 來源    key/value 來源   看未來？（causal mask）\n─────────────────────────────────────────────────────────────────\nself          源序列自己     源序列自己        能（雙向，encoder 用）\nmasked-self   目標序列自己   目標序列自己      不能（單向，decoder 用，ch11）\ncross         目標序列       源序列           不適用（源整句給定，看遍全源）\n```\n\n**共用**的是三步骨架（打分＝縮放內積、正規化＝softmax、混合＝加權平均 value）——三者一字不差。**不同**的只有「打分時 query 與 key/value 插在哪個序列、softmax 對哪一群 key 求和、要不要遮未來」。一句話：同一台引擎，三種接線。常見錯路：把「不同」寫成「公式不同」——不對，公式相同，只有輸入來源與 mask 不同。\n\n**第 2 題。**\n(a) q·k_animal = 2+1+1+0 = **4**；q·k_street = 0+1+1+0 = **2**。原始分數 [4, 2]。\n(b) 除 √d=2 → [2, 1]；e²=7.389、e¹=2.718，和 = 10.107；權重 = [7.389/10.107, 2.718/10.107] = **[0.731, 0.269]**（驗：和=1.000 ✓）。\n(c) 輸出 = 0.731·(1,0)+0.269·(0,1) = **(0.731, 0.269)**，偏向 animal。\n(d) cross 的 animal 權重 0.731 比 self 的 0.665 **高**，因為 softmax 的分母不同：self 含三項（e²+e¹+e⁰=11.107），cross 只含兩項（e²+e¹=10.107，少了 it 那個 e⁰=1）。self 場景裡 it 分走的 0.090 權重，在 cross 場景裡不存在，於是被 animal、street 按原比例（e²:e¹=e≈2.72）瓜分回去。核心：softmax 不改變參與者間的相對比例，但「誰參與」改變每個人的絕對份額。常見錯路：以為「同一個 query 就該得同一組權重」——錯，權重取決於它對**哪一群** key 做 softmax。\n\n**第 3 題（要點）。** 一個說得通的版本：「Bahdanau 2014 在 decoder 生成每個目標詞時，拿 decoder 當前狀態當查詢，去對 encoder 的每個源句隱態算對齊分數、softmax、加權混合源隱態——這就是『目標端 query 看源端 key/value』，正是 cross-attention 的定義。它和 Transformer cross-attention 差在兩個零件：① 打分函數從加性小網路 vᵀtanh(·) 換成縮放內積 QKᵀ/√d（ch04–06）；② 多了 W_Q/W_K/W_V 三個學來的投影，而 Bahdanau 直接拿 RNN 隱態當 key/value。接線方式完全一樣。」——只要點到「目標查源」這個接線等同、並指出打分與投影是後加的，就算抓到核心。常見錯路：說「Bahdanau 是 self-attention 的雛形」——錯，Bahdanau 是**跨序列**的（decoder 看 encoder），是 cross 的雛形不是 self。\n\n**第 4 題。**\n(a) **影像的潛在特徵當 query**、**文字提示 \"a cat on a sofa\" 的 token embedding 當 key/value**（2026-06 查證，Stable Diffusion 的接法）。\n(b) 影像的每個空間區域「查詢」文字提示，問「我這塊該根據哪些字來畫」——把文字條件按相關度拉進像素的生成過程。\n(c) 異同：**相同**的是「異源 cross-attention＋三步骨架」這個核心；**不同**的是接線方向——翻譯是「目標文字 query 查源文字 key/value」（文字查文字），生圖是「影像 query 查文字 key/value」（圖查字）。query 和 key/value 的「身分」可以跨模態換來換去，但「主序列按相關度去拉取另一個條件序列的內容」這個本質不變。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 用「誰當 query、誰當 key/value、能不能看未來」三個維度，把 encoder self / decoder masked-self / encoder-decoder cross 三種注意力各講一遍。三者**共用**什麼、**只有**什麼不同？\n2. cross-attention 在三步骨架裡動了哪一步？（提示：不是動了任何一步的算法，而是動了第一步打分的兩個輸入「query 與 key/value 的來源」。）\n3. 脊椎升級到翻譯場景後，注意力矩陣為什麼從 3×3 方陣變成「目標×源」矩形？為什麼這時候「找對角線＝自己」的直覺會失效？\n4. 同一個 query q=(1,1,1,1)，為什麼 cross 給 animal 的權重（0.731）比 self（0.665）高？把「softmax 分母少了 it 那一項」這條因果講順。\n5. 為什麼 cross-attention 這一步**不需要** causal mask，但 decoder 的 self-attention 需要？（提示：源句是不是逐字生成的？）\n6. cross-attention 和 ch03 Bahdanau 的對齊是什麼關係？Transformer 的版本多加了哪兩個前面章節補過的零件？\n7. 為什麼今日主流的 decoder-only LLM（GPT 類）**沒有** encoder-decoder cross-attention？那 cross-attention 現在主要活在哪裡？\n8. 用「把外部條件當一張可查的 key/value 表」這句話，解釋文字控制生圖時 cross-attention 在做什麼（誰 query、誰 key/value）。\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.2.3「Applications of Attention in our Model」**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：本章三種注意力的原始出處。那一節用三段話分別交代 encoder self、decoder masked-self、encoder-decoder cross 各自「Q、K、V 從哪來」。直接讀那三段，對照本章的對照表，你會發現整章就是把它展開講。\n- **Bahdanau, Cho & Bengio 2014「Neural Machine Translation by Jointly Learning to Align and Translate」**（arXiv 1409.0473，https://arxiv.org/abs/1409.0473 ）：cross-attention 的雛形（ch03 已細講）。本章回扣它——讀對齊模型那一節，看「decoder 狀態當 query、encoder 隱態當被對齊對象」這個接線，和 Transformer cross-attention 對照。\n- **Rombach et al. 2021「High-Resolution Image Synthesis with Latent Diffusion Models」**（arXiv 2112.10752，https://arxiv.org/abs/2112.10752 ）：文字控制生圖怎麼用 cross-attention 注入條件。讀它講 cross-attention 那段（影像潛在特徵 Q、文字 embedding K/V），就懂了「a cat on a sofa」如何鑽進像素——cross-attention 在 NLP 之外最漂亮的應用之一。\n- **DeepMind 2022「Flamingo: a Visual Language Model for Few-Shot Learning」**（arXiv 2204.14198，https://arxiv.org/abs/2204.14198 ）：gated cross-attention 把視覺注入凍結的語言模型。看它怎麼用「語言 Q、視覺 K/V」做多模態——和生圖的接線方向剛好相反，是體會「cross-attention 接線可以任意換身分」的好對照。\n- **Jay Alammar「The Illustrated Transformer」的 encoder-decoder 段落**（https://jalammar.github.io/illustrated-transformer/ ）：把三種注意力與 encoder-decoder 資料流畫成動圖。看「The Decoder Side」那一段，cross-attention 怎麼接 encoder 輸出的 K/V，與本章的 ASCII 架構圖互為補充。\n- **何時回來重讀**：當你在 ch13 看到 encoder-only（BERT）／decoder-only（GPT）／encoder-decoder（T5）三種模型家族時，回頭對照本章的三種注意力——你會發現「哪種模型有哪些注意力」正是由本章這三種接法的取捨決定的（BERT 只用 ①、GPT 只用 ②、T5 三種全用）。本章是 ch13 那張家族譜的零件清單。\n"}, {"id": "ch13-layer-to-model", "file": "ch13-layer-to-model.md", "group": "Part III — 補上缺的零件", "title": "ch13 — 一整層到一整個模型：注意力住在哪裡", "md": "# ch13 — 一整層到一整個模型：注意力住在哪裡\n\n> **本章解決什麼問題**：前面九章我們把注意力這台引擎拆到了零件等級——Q/K/V（ch04）、softmax（ch05）、√d 縮放（ch06）、自注意力矩陣（ch07）、多頭（ch08）、位置（ch09–10）、遮罩（ch11）、跨序列（ch12）。但你從沒看過它「裝回去」的樣子。真實的 transformer 不是一顆裸露的注意力——注意力是一層 block 裡的**一個零件**，旁邊還配著殘差連接、LayerNorm、和一個逐位置的前饋網路（FFN）；這樣的 block 再堆疊 N 層，才成為一個完整模型。本章補上這個「組裝」的視角：注意力**住在哪裡**、為什麼旁邊非得有殘差和 FFN（少了會發生一件很糟的事，叫秩坍縮），以及這些 block 怎麼接成今日三種模型家族——BERT、GPT、T5。三步骨架本身一個字都沒動；本章講的是**它周圍的鷹架**，以及這些鷹架為什麼存在。讀完你能對另一個工程師畫出一層 transformer 的資料流，並說清「為什麼純堆注意力不夠」。\n\n## 從你已知的出發\n\n你寫過的任何一個像樣的處理管線，從來不是一個裸函式。你不會把一個 `transform()` 直接串一百層接成系統——你會在每個 stage 旁邊配上**旁路、穩壓、和一個本地的加工步驟**。\n\n具體一點，想想你部署過的一個請求處理 stage：\n\n- **旁路（bypass / passthrough）**：你常留一條「原始輸入直接帶過去」的路徑，這個 stage 只**在原始資料上疊加**它算出的修正，而不是整個重寫。理由很現實——萬一這個 stage 算壞了，至少原始資訊還在，下游不會拿到一坨被某一層搞砸的垃圾。這正是**殘差連接（residual connection）** 的工程直覺：`輸出 = 輸入 + 這一層算出的東西`。\n- **穩壓（normalization）**：多 stage 串起來最怕數值規模一層層放大或縮小，到後面要嘛爆掉要嘛消失。你會在 stage 之間插一個正規化步驟，把數值拉回一個固定的尺度再往下送。這是 **LayerNorm** 的角色。\n- **本地加工（per-item processing）**：有些轉換不需要看別人、只在每一筆資料自己身上做——一個 `map(item => f(item))`，每筆獨立、同一個 `f`。這是 **FFN（前饋網路）** 在 transformer 裡的角色：注意力負責「跨位置混合資訊」，FFN 負責「在每個位置自己身上做一次非線性加工」。\n\n一層 transformer block，就是把這三樣鷹架圍著**注意力**這個核心零件組裝起來：\n\n```text\n                      ┌──── 殘差旁路（原輸入帶過去）────┐\n   輸入 ──┬──────────►│                                 ▼\n          │           │   多頭注意力（跨位置混合）──►（＋）──► LayerNorm ──┐\n          └───────────┘                                                    │\n                                                                           ▼\n                      ┌──── 殘差旁路 ────┐\n                      │                  ▼\n                      │   FFN（逐位置加工）──►（＋）──► LayerNorm ──► 這一層的輸出\n                      └──────────────────┘\n```\n\n注意：本章**完全沒有動三步骨架**。打分、softmax、加權混合，全都在「多頭注意力」那個方塊**裡面**，跟前面九章一模一樣。本章講的是那個方塊**外面**圍了什麼、為什麼非圍不可。如果說 ch04–ch12 在打磨引擎，本章是在裝引擎室——油路、散熱、減震，少一樣車都跑不久。\n\n> 全書地圖回顧（你在 Part III 的最後一格）：\n\n```text\nPart I 注意力解決什麼問題    Part II 三步骨架：核心機制    Part III 補上缺的零件\nch01 該看哪裡（序章）        ch04 Query/Key/Value         ch09 位置編碼\nch02 固定向量的瓶頸      →   ch05 softmax：該看哪裡    →   ch10 RoPE 與相對位置\nch03 第一次注意 Bahdanau     ch06 為什麼除以 √d            ch11 遮罩：只能看過去\n                            ch07 自注意力與 O(n²)         ch12 交叉注意力與三型\n                            ch08 多頭注意力               ch13 一整層到一整個模型 ◄你在這裡\n                                                               │\n                                                               ↓\nPart VI 看進黑盒與未來      Part V 理論身世             Part IV 為什麼是 O(n²)\nch20 注意力是解釋嗎     ←   ch17 即核迴歸           ←   ch14 二次方瓶頸\nch21 QK/OV 與 induction     ch18 即聯想記憶 Hopfield     ch15 稀疏與線性注意力\nch22 注意力之外 SSM/Mamba    ch16 FlashAttention/KV 共享\nch23 總收官：同一個 it      ★ 三步骨架貫穿全書          ★＝打分→正規化→混合\n```\n\n## 一層 transformer block：兩個 sublayer 的標準三明治\n\n原始 Transformer（Vaswani 2017，§3.1，landscape §2）把一層定義得非常規整：**一層 encoder block ＝ 兩個 sublayer**，每個 sublayer 都包在同一個「殘差 ＋ LayerNorm」的三明治裡。\n\n```text\nsublayer 1：多頭自注意力（multi-head self-attention）\nsublayer 2：逐位置前饋網路（position-wise FFN）\n```\n\n兩個 sublayer 用的是**完全相同的包裝公式**。原文寫得很乾脆（landscape §2 覆核，2026-06）：每個 sublayer 的輸出是\n\n```text\nLayerNorm( x + Sublayer(x) )\n        └──┬──┘   └───┬────┘\n        殘差：原輸入   這個 sublayer 算出的東西\n```\n\n把它拆開看，每個 sublayer 做三件事，順序很重要：\n\n1. **算**：`Sublayer(x)`——sublayer 1 是多頭注意力（前面九章那一整套），sublayer 2 是 FFN。\n2. **加回去（殘差）**：`x + Sublayer(x)`——把原輸入直接加回算出來的東西。\n3. **穩壓（LayerNorm）**：把相加的結果正規化，再送給下一個 sublayer。\n\n> **這是原始 Transformer 的順序，叫 Post-LN（LayerNorm 在殘差相加之後）**（2026-06 查證）。2020 年後多數大型 LLM 改用 **Pre-LN**（`x + Sublayer(LayerNorm(x))`，把 LayerNorm 挪到 sublayer 前面），因為它在堆很深時訓練更穩、不太需要小心翼翼地暖身學習率（On Layer Normalization in the Transformer Architecture，Xiong 2020 查證）。哪種放法對訓練穩定性影響很大，但**那是訓練工程的事，本書不展開**（指向《從後端到 AI Infra》與深度學習專書）。對「注意力住在哪裡」這個原理問題，Post-LN 和 Pre-LN 的差別只是「LayerNorm 放殘差前還是後」——三明治的兩片麵包換了位置，夾的料（注意力＋殘差）沒變。本章用原始的 Post-LN 講，因為它是 landscape 的事實基準。\n\n所以一層完整的 block，是這兩個三明治串起來：\n\n```text\n  輸入 x\n    │\n    ├──────────────┐               sublayer 1\n    │              ▼\n    │      多頭自注意力 Attn(x)\n    │              │\n    ▼              ▼\n   （＋）◄──── 殘差相加 x + Attn(x)\n    │\n    ▼\n  LayerNorm ──► z\n    │\n    ├──────────────┐               sublayer 2\n    │              ▼\n    │          FFN(z)\n    │              │\n    ▼              ▼\n   （＋）◄──── 殘差相加 z + FFN(z)\n    │\n    ▼\n  LayerNorm ──► 這一層的輸出\n```\n\n兩個 sublayer 分工明確，這是看懂一層 block 的關鍵直覺：\n\n- **注意力 sublayer ＝ 跨位置的混合（mixing across positions）**。它讓每個 token 去看別的 token、把資訊拉過來（三步骨架）。它是「橫向」的——it 從 animal 那裡拿東西。\n- **FFN sublayer ＝ 逐位置的加工（per-position processing）**。它**不看別人**，只在每個位置自己身上跑同一個小網路。它是「縱向」的——拿到混合好的資訊後，在原地做一次非線性轉換。\n\n一句話記住：**注意力負責「交流」，FFN 負責「消化」。** 一層 block 先讓 token 們交流一次（注意力），再讓每個 token 各自消化一次（FFN）。少了任何一個，後面會看到，這層就殘廢了。\n\n## 三個鷹架零件，逐一說清「它在解決什麼」\n\n本書的鐵律是「禁止無動機的定義」。所以下面三個零件，每個都先回答「不裝它會怎樣」，再說它是什麼。三個都點到為止——這是 ML 鷹架，不是本書主題，深入指向深度學習專書。\n\n### 殘差連接：給梯度和資訊各留一條直通捷徑\n\n**不裝它會怎樣**：你把 sublayer 一層層硬串起來，每一層都對輸入做一次徹底的非線性重寫。堆個幾十層後，最底層那點原始資訊早就被反覆改寫到面目全非；而且訓練時梯度要穿過幾十層的非線性才能傳回去，一路衰減，底層幾乎學不到東西（梯度消失，回扣 ch06 softmax 飽和那個故障）。\n\n**它是什麼**：殘差連接就是那條旁路——`輸出 = 輸入 + sublayer(輸入)`。sublayer 不再負責「重寫」輸入，而是負責**算出一個要疊加上去的修正量（residual，殘差）**。這有兩個好處：\n\n- **資訊直通**：原輸入永遠有一條不被改寫的路徑通到最後（這正是為什麼原始 Transformer 規定所有 sublayer 和 embedding 都是同一個維度 d_model=512——不同維度沒法直接相加，landscape §2）。\n- **梯度直通**：`x + sublayer(x)` 對 x 求導，那個 `+x` 貢獻一個常數 1 的梯度路徑，梯度可以「抄近路」直接傳回底層，不必穿過每一層的非線性。\n\n工程類比你已經有了：殘差就是你那條「原始輸入帶過去」的旁路。這一層只在原值上**疊加**它的判斷，而不是推倒重來。萬一這層學歪了（輸出接近 0），殘差讓它至少退化成「原樣通過」，不會把資訊砸爛。\n\n### LayerNorm：把每個 token 的數值拉回固定尺度\n\n**不裝它會怎樣**：殘差是「一直往上加」（`x + sublayer(x) + …`），堆很多層後數值的規模會越滾越大或在某些維度上失控，softmax、內積這些對尺度敏感的運算（ch06 整章在講尺度！）就會行為怪異，訓練不穩。\n\n**它是什麼**：LayerNorm 對**每一個 token 的向量自己**做正規化——把這個向量的各維減掉它自己的平均值、除以自己的標準差，拉成「平均值 0、變異數 1」，再用兩個可學的參數（縮放 γ、平移 β）調回模型想要的尺度。關鍵字是「Layer」：它是在**單一 token 的特徵維度上**做正規化（每個 token 獨立），不跨 token、不跨 batch——這跟你可能聽過的 BatchNorm 不同，後者跨樣本統計，在序列長度可變的 NLP 裡很麻煩，所以 transformer 用 LayerNorm。\n\n工程類比：穩壓器。多 stage 串接時，你在中間插一個「把信號拉回標準範圍」的步驟，免得某一級的輸出規模把下一級頂爆。\n\n### FFN：每個位置各自做一次非線性加工\n\n**不裝它會怎樣**：這是最深刻的一個。**注意力本身幾乎是線性的**——加權混合就是 value 的加權平均（ch05），那是個線性運算；softmax 雖然非線性，但它只決定「權重」，混合那一步是線性的。如果一層裡只有注意力，那這一層對 value 做的本質上是「線性組合 ＋ 線性投影」。多層純線性疊起來，數學上等價於一個線性變換——表達力嚴重受限，而且會引發下一節的秩坍縮。**模型需要在每個位置注入真正的非線性**，這就是 FFN 的活。\n\n**它是什麼**：FFN 是一個套在**每個位置上、獨立且相同**的小型兩層網路（position-wise，逐位置；landscape §2，2026-06 覆核原文）：\n\n```text\nFFN(x) = max(0, x·W₁ + b₁)·W₂ + b₂\n            └──────┬──────┘\n              ReLU 非線性（負的歸零）\n```\n\n原始 Transformer 的 FFN 把 d_model=512 先**擴張**到 d_ff=2048（4 倍），過一個 ReLU（負值歸零，提供非線性），再**收縮**回 512（landscape §2；查證 2026-06：d_ff 通常設為 d_model 的約 4 倍，俗稱 expand-and-contract，先膨脹再壓回）。為什麼擴張再收縮？膨脹到高維給網路更大的「工作空間」去做非線性切割，再壓回原維度好接下一層。同一個 FFN（同一組 W₁/W₂）作用在序列的**每一個位置**上——it 過一次、animal 過一次、street 過一次，各算各的，互不相干。\n\n> **這裡值得停十分鐘**：注意力和 FFN 的分工是 transformer 最優雅的設計之一。注意力是**唯一**會跨位置搬資訊的零件——它決定「誰看誰、拉什麼過來」。FFN 則完全**不跨位置**，它只在每個 token 拉到資訊後，原地做一次重型的非線性加工。一個橫向（社交），一個縱向（思考）。整個 transformer 就是「交流一次、思考一次」交替疊 N 層。很多人以為 transformer 的能力全在注意力——其實參數量的大頭往往在 FFN（d_ff 是 d_model 的 4 倍，FFN 的兩個矩陣比注意力的投影矩陣大）。注意力決定看哪裡，FFN 決定看到之後怎麼想。\n\n## 為什麼純堆注意力不夠：秩坍縮\n\n現在來算清楚「少了殘差和 FFN 會發生的那件糟事」。這是本章的理論高潮，也是 ch13 在全書地圖上的一個重要伏筆（ch19 會把它形式化）。\n\n直覺先行：注意力的第三步是**加權平均**（ch05）。平均這個動作，本性就是**把東西拉近**——你把一群數平均，結果一定落在它們中間，比原來更集中。如果你一層層**只做平均、不做別的**，每個 token 都在不斷地「變成大家的平均」，那麼所有 token 會越來越像，最後**全部收斂到同一個向量**。一旦所有 token 變成同一個向量，這個序列的表示就只剩一個方向——數學上叫**秩坍縮（rank collapse）**：表示矩陣的秩掉到 1，整個序列攤平成一條線，模型再也分不出哪個 token 是哪個。\n\n這不是危言聳聽，是被嚴格證明的。**Dong, Cordonnier & Loukas 2021「Attention is Not All You Need: Pure Attention Loses Rank Doubly Exponentially with Depth」**（ICML 2021 oral，arXiv 2103.03404，landscape §5，2026-06 查證）證明：**純** self-attention（沒有殘差、沒有 MLP/FFN）的輸出會以**雙指數**的速度坍縮到秩 1。雙指數有多快？快到幾層就崩——這幾乎是「立刻」的意思。論文的解藥也很明確：**殘差連接和 FFN 正是阻止這個坍縮的兩個關鍵**（原文：skip connections and MLPs stop the output from degeneration）。\n\n### Worked example：用脊椎親手看坍縮，再看殘差怎麼救\n\n用脊椎的三個 value 當三個 token 的初始表示（沿用全書數字，v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)），跑一個被刻意推到極端的「純平均注意力」——假設這一層的注意力權重恰好是均勻的（每個 token 對三個 token 各給 1/3，這是 Dong 描述的「token uniformity」極端情形）。\n\n**純注意力（無殘差），第一層的混合**：每個 token 的新表示 ＝ 三個 value 的均勻平均。\n\n```text\n三個 value 的均勻平均 = (1/3)·(1,0) + (1/3)·(0,1) + (1/3)·(1,1)\n                      = ( (1+0+1)/3 ,  (0+1+1)/3 )\n                      = ( 2/3 , 2/3 )\n                      ≈ (0.667, 0.667)\n```\n\n算一次就崩了：\n\n```text\n            初始              純注意力一層後\n  animal   (1, 0)     ──►    (0.667, 0.667)\n  street   (0, 1)     ──►    (0.667, 0.667)   ← 三個 token\n  it       (1, 1)     ──►    (0.667, 0.667)     變成一模一樣！\n                             表示矩陣的三列全相同 → 秩 = 1（坍縮）\n```\n\n三個原本不同的 token，被均勻平均後**全部變成 (0.667, 0.667) 這同一個向量**。再疊一層，平均三個相同的向量還是它自己，永遠停在這裡。序列的表示徹底攤平——這就是秩坍縮的極端版（我用 Python 核對：均勻平均後三列相同、矩陣秩為 1）。\n\n**加上殘差**：現在把同一個平均結果，**加回各自的原輸入**（殘差就是 `x + sublayer(x)`）：\n\n```text\n            原輸入 x      ＋ 注意力混合 (0.667,0.667)  =  殘差後\n  animal   (1, 0)       + (0.667, 0.667)            =  (1.667, 0.667)\n  street   (0, 1)       + (0.667, 0.667)            =  (0.667, 1.667)\n  it       (1, 1)       + (0.667, 0.667)            =  (1.667, 1.667)\n                                          三列各不相同 → 秩維持 = 2（沒坍縮）\n```\n\n殘差一加，三個 token 又**各不相同**了——因為每個都保留了自己原始的那一份（animal 還記得自己是 (1,0)、street 還記得自己是 (0,1)）。混合帶來的「拉近」效果被「保留自我」的殘差抵住了。表示矩陣的秩維持在 2，序列沒有攤平。FFN 接著還會在每個位置上做非線性加工，進一步把它們推開。這就是 Dong 2021 那句話的具體機制：**殘差讓 token 不會忘記自己是誰，FFN 給每個位置注入非線性，兩者合力擋住坍縮。**\n\n> **這裡了不起／反直覺在哪**：你大概以為「注意力是 transformer 的全部，殘差和 FFN 是無關緊要的鷹架」。完全相反——**純注意力會在幾層內自我毀滅**，把序列攤平成一條線。讓 transformer 能堆到幾十層還不崩的，恰恰是那兩個「不起眼的鷹架」。論文標題故意叫「Attention is Not All You Need」（注意力不是你需要的全部），是對原始那篇「Attention Is All You Need」的精準回敬——一個漂亮的學術冷笑話，背後是嚴格的證明。注意力是主角，但主角單獨上台會當場垮掉。\n\n## 堆 N 層：從一層到一整個模型\n\n一層 block 講清楚了，剩下的「組裝」其實很簡單到有點反高潮：**把同樣結構的 block 疊 N 層，前一層的輸出當後一層的輸入。** 原始 Transformer 是 encoder、decoder 各 N=6 層（landscape §2）。今日的大模型動輒幾十到上百層，但每一層的結構就是上面那個三明治，沒有變。\n\n為什麼要堆很多層？直覺：一層只能做「交流一次、消化一次」。語言的結構是有層次的——詞→片語→子句→句意。淺層的注意力傾向抓局部、表面的關係（相鄰詞、句法），深層的注意力在淺層處理過的表示之上，抓更抽象、更長程的關係（指代、語意、篇章）。堆疊讓模型**逐層精煉**：底層 it 先搞清楚句法位置，中層才在這基礎上解指代（it→animal），高層整合出句意。這跟你的多層 pipeline 同理——每一 stage 在前一 stage 的產出上做更高層的加工。\n\n```text\n  輸入 embedding（＋位置編碼，ch09–10）\n        │\n        ▼\n   ┌─ block 1 ─┐   注意力＋殘差＋LN → FFN＋殘差＋LN\n        │\n        ▼\n   ┌─ block 2 ─┐   （同樣結構）\n        │\n        ⋮          堆 N 層（原始 N=6）\n        │\n        ▼\n   ┌─ block N ─┐\n        │\n        ▼\n   輸出表示 → （接任務頭，見下節）\n```\n\n注意一件事：堆疊讓 ch07 講的 O(n²) 變成「**每層**都付一次 n×n 的代價」。N 層就是 N 倍的 O(n²)——這是 Part IV（ch14–16）要正面解決的成本問題。本章先把結構講清，成本帳留給後面。\n\n### ML 鷹架一句帶過：模型怎麼學、學什麼\n\n到這裡你已經看過完整結構，但還沒談「它怎麼變好用的」。一句話補上鷹架（**不展開，這是訓練工程，本書邊界外**）：模型最常見的訓練目標是 **next-token 預測**——給定前面的 token，預測下一個 token 是什麼，用**交叉熵（cross-entropy）** 衡量預測的機率分布和真實答案差多遠（呼應《馴服隨機》：那是個機率分布；《馴服無限》：梯度往下走，最小化這個誤差）。所有的權重矩陣（W_Q/W_K/W_V/W_O、FFN 的 W₁/W₂、LayerNorm 的 γ/β）都是這樣**學出來的**——這正是 ch04 第一次說「權重是學來的」那句話的兌現。怎麼學（反向傳播、最佳化器）是訓練工程，指向深度學習專書，本書到此為止。\n\n## 三種模型家族：BERT、GPT、T5\n\n最後一塊拼圖。同樣的 block 堆疊，**接線方式不同**（ch12 的三種注意力是零件，這裡是把零件組成整機），長出三種模型家族。差別全在 ch11–ch12 那兩個問題：**能不能看未來？有沒有 encoder？**\n\n### encoder-only：BERT（雙向，理解）\n\n只用 encoder 那疊 block，注意力是**雙向**的 self-attention（沒有 causal mask，每個 token 看全句，ch07/ch11）。代表是 **BERT**（Devlin 2019，landscape §3）。雙向意味著它讀理解時整句都在手上，特別適合**理解類**任務——分類、抽取、填空。它的訓練目標是「克漏字」（masked language modeling，遮住一些詞讓模型猜，這也是它能雙向的原因：要猜中間的詞當然要看左右兩邊，2026-06 查證）。BERT 不擅長生成——它不是設計來逐字往下寫的。\n\n### decoder-only：GPT（單向，生成）——今日主流 LLM 形態\n\n只用 decoder 那疊 block，注意力是 **masked（單向）** self-attention（causal mask，每個 token 只看左邊，ch11）。代表是 **GPT** 系列。單向是為了**自迴歸生成**：逐字往下寫，每寫一個字只能依賴已經寫出的（不能偷看未來，ch11 的鐵律）。\n\n> **這是 2026 年絕大多數生成式 LLM 的形態**（GPT 系列、Claude、Gemini、Llama 等主線都是 decoder-only）。注意一個 ch12 強調過、這裡要再釘一次的事實：decoder-only 模型**沒有 encoder，所以沒有 encoder-decoder cross-attention**——它整個模型裡只有一種注意力，masked self-attention。ch12 那個「三種注意力」的完整陣容只在 encoder-decoder 架構裡才湊齊。\n\n### encoder-decoder：T5（讀寫分離，翻譯/摘要）\n\nencoder 和 decoder 都用，三種注意力全上場（ch12）：encoder 雙向 self、decoder masked self、中間用 cross-attention 把 decoder 的 query 接到 encoder 的 key/value。代表是 **T5**（Raffel 2019）。這是**原始 Transformer 的原生形態**（2017 那篇就是為翻譯設計的 encoder-decoder），適合**有明確輸入序列要轉成輸出序列**的任務——翻譯、摘要。T5 的特色是把所有任務都包裝成「文字進、文字出」（text-to-text，2026-06 查證）。\n\n三種家族的對照——這張表就是 ch11–ch12 那兩個問題的答案矩陣：\n\n```text\n家族           有 encoder?  注意力種類              看未來?    典型用途\n──────────────────────────────────────────────────────────────────────────\nencoder-only   只有 encoder  雙向 self              看全句     理解（分類/抽取）\n（BERT）                                                       克漏字訓練\ndecoder-only   只有 decoder  masked self            只看左     生成（逐字往下寫）\n（GPT）                      （唯一一種注意力）                next-token 訓練\n                                                              ★今日主流 LLM\nencoder-decoder 兩者都有     雙向 self ＋ masked     源：看全   序列→序列\n（T5）                      self ＋ cross           目標：看左  翻譯/摘要\n```\n\n三種家族對到你熟的服務形態：encoder-only 是**唯讀**服務（讀進來、理解、輸出判斷，不續寫）；decoder-only 是**串流寫入**服務（逐字 append，只能依賴已寫的，append-only log 那條線，ch11）；encoder-decoder 是**讀寫分離**服務（一個專門讀源、一個專門寫目標，中間用 cross-attention 接通，像 reader/writer 分離的架構）。注意力住在哪、能看哪，就決定了這台機器是讀、是寫、還是讀寫。\n\n> 收個有趣的歷史轉折（誠實標時點 2026-06）：原始 Transformer 是 encoder-decoder（為翻譯），最早最紅的也是 encoder-only 的 BERT（2018–2019 統治理解類榜單）。但 2020 年後，隨著生成式應用爆發，**decoder-only 成了大模型的事實主流**——同一套注意力零件，最後勝出的接法是「只留 decoder、只看過去、逐字生成」這個最簡單的形態。這不是因為它表達力最強，而是因為它最適合「給前文、續寫下一個 token」這個能涵蓋幾乎所有任務的通用目標。為什麼是它勝出，是個值得另寫一本書的問題；本章只要你記住：**三種家族是同一套 block 的三種接線，今日主線走 decoder-only。**\n\n## Worked example：脊椎的 it 走完一整層 block\n\n把前面所有零件接起來，讓脊椎那個 it 第一次走完**完整的一層**。我們接續 ch08 多頭那一站的產出。維度沿用脊椎玩具 d=4。\n\n**第 0 步：這一層的輸入。** it 這個位置進入這層 block 時，帶著一個 4 維表示。我們用 ch04 那個產生 q_it 的輸入向量 x_it=(1,1,1,1)（脊椎基準）當這層的輸入。\n\n**第 1 步：注意力 sublayer 算。** it 對全序列做多頭注意力。ch08 算過，兩顆頭 concat、過 W_O=I 後，it 位置拿到的注意力輸出是 **(0.822, 0.266, 0.926, 0.380)**（ch08 worked example 的結果，我已重新核對吻合）。這就是 `Sublayer(x)`——it 從別的 token（主要是 animal）混回來的東西。\n\n**第 2 步：殘差——加回輸入。**\n\n```text\nx + Attention(x) = (1, 1, 1, 1) + (0.822, 0.266, 0.926, 0.380)\n                 = (1.822, 1.266, 1.926, 1.380)\n                   └──── it 既記得自己原本是誰，又疊上了從別人那拉來的資訊 ────┘\n```\n\n注意這一加的意義：it 沒有被注意力的輸出**取代**，而是在自己原來的 (1,1,1,1) 上**疊加**了混合結果。這就是殘差防坍縮的那一手——it 不會忘記自己是 it。\n\n**第 3 步：LayerNorm——拉回固定尺度。** 對 (1.822, 1.266, 1.926, 1.380) 這個向量做 LayerNorm（取 γ=1、β=0，即標準正規化）：\n\n```text\n平均值 m = (1.822 + 1.266 + 1.926 + 1.380) / 4 = 6.394 / 4 = 1.5985\n各維減平均值：(0.224, −0.333, 0.327, −0.219)\n標準差 σ = √(各維離差平方的平均) = √( (0.224²+0.333²+0.327²+0.219²)/4 ) ≈ 0.281\n\nLayerNorm 輸出 = (各維離差) / σ\n              = (0.796, −1.184, 1.166, −0.778)\n                核對：四維和 ≈ 0 ✓、變異數 ≈ 1 ✓（我用 Python 驗過）\n```\n\n得到 z = (0.796, −1.184, 1.166, −0.778)，這是 sublayer 1（注意力）的最終輸出，平均值 0、變異數 1，尺度乾淨，送進 sublayer 2。\n\n**第 4 步：FFN sublayer。** z 過 FFN——`max(0, z·W₁+b₁)·W₂+b₂`，這是 it 這個位置**自己**的一次非線性加工（不看別的 token）。真實的 W₁/W₂ 是訓練學出來的、我們沒有，所以這一步只示意結構不給具體權重（給了也是瞎編，違反本書誠實原則）：FFN 把 z 擴張到高維、ReLU 砍掉負的、再壓回 4 維，產出一個修正量。\n\n**第 5 步：第二個殘差 ＋ LayerNorm。** `LayerNorm( z + FFN(z) )` ——同樣把 FFN 的修正疊回 z，再正規化。輸出就是**這一層 block 對 it 的最終產物**，交給下一層 block 當輸入。\n\n走完一層，你看到的是：**it 在一層裡，先跟全句交流了一次（注意力，主要拉了 animal 的資訊回來），保住自我（殘差），調好尺度（LayerNorm），再自己消化了一次（FFN），保住自我、調好尺度。** 堆 N 層，就是把這個「交流—消化」循環做 N 遍，it 對 animal 的理解逐層精煉。脊椎那個懸念（it 該看 animal）的解答，就是在這樣一層層的 block 裡被算出來、且不被秩坍縮抹平的。\n\n如果你想看演算法骨架，一層 Post-LN block 就是這幾行（每顆頭的 `multi_head` 是 ch08 那個函式，原封不動）：\n\n```python\ndef transformer_block(x, attn_params, ffn_params):\n    # sublayer 1: multi-head self-attention + residual + LayerNorm\n    a = multi_head(x, x, x, *attn_params)   # ch08: cross-position mixing\n    x = layer_norm(x + a)                    # residual, then normalize (Post-LN)\n    # sublayer 2: position-wise FFN + residual + LayerNorm\n    f = ffn(x, *ffn_params)                  # per-position non-linear processing\n    x = layer_norm(x + f)                    # residual, then normalize\n    return x\n```\n\n兩個 sublayer，同樣的「算 → 加回去 → 正規化」三明治。注意力和 FFN 是裡頭那個 `Sublayer`，殘差是那個 `x +`，LayerNorm 是那個包裹。整層的精神全在這六行裡：**混合一次、消化一次，每次都記得自己是誰。**\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「注意力就是 transformer 的全部，殘差/FFN 是次要鷹架」 | 危險的本末倒置。Dong 2021 證明**純注意力會雙指數坍縮到秩 1**——幾層就把序列攤平成一條線。殘差與 FFN 不是裝飾，是讓深層 transformer 不自我毀滅的關鍵。 | 記住論文標題的對話：「Attention Is All You Need」vs「Attention is **Not** All You Need」。自己用脊椎三個 value 算一次均勻平均，看它們怎麼全變成 (0.667,0.667)。 |\n| 「FFN 也跨位置混合資訊」 | 把兩個 sublayer 的分工搞混。FFN 是**逐位置（position-wise）** 的——它對每個 token 獨立跑同一個小網路，**完全不看別的 token**。跨位置混合是注意力的**唯一**職責。 | 默念分工：注意力＝橫向（交流），FFN＝縱向（消化）。問自己「這一步有沒有看別的位置？」——FFN 沒有。 |\n| 「殘差就是把輸出和輸入拼接（concat）」 | 殘差是**相加（add）** 不是拼接。`x + sublayer(x)`，維度不變（這正是為何所有 sublayer 都得是 d_model）。拼接會讓維度增長，而且少了「梯度直通」那條常數梯度路徑。 | 看公式裡是 `+` 還是接起來。殘差永遠是逐元素相加、維度守恆。（concat 是 ch08 多頭在做的事，別搞混。） |\n| 「LayerNorm 跨 token 或跨 batch 做正規化」 | 那是 BatchNorm。LayerNorm 是在**單一 token 的特徵維度**上正規化（每個 token 自己減自己的平均值除自己的標準差），不跨 token、不跨 batch——所以序列長度可變也不怕。 | 關鍵字「Layer」＝對一個 token 的那一層特徵做。問自己「統計量是從誰算的？」——從這一個 token 的各維算的。 |\n| 「decoder-only 的 GPT 裡也有 cross-attention」 | ch12 已警告過、這裡再釘一次。decoder-only **沒有 encoder**，所以**沒有 cross-attention**，只有一種 masked self-attention。cross 只活在 encoder-decoder（T5）裡。 | 問自己「這個模型有 encoder 嗎？」沒有就沒有 cross。三種家族對照表裡，只有 T5 那行有 cross。 |\n| 「BERT 也能像 GPT 那樣逐字生成」 | 把理解模型當生成模型。BERT 是雙向 encoder-only，訓練目標是克漏字，它沒有「只看左邊逐字往下寫」的機制，不適合自迴歸生成。 | 看注意力是雙向還是 masked。雙向（看全句）→ 理解；masked（只看左）→ 生成。家族決定能幹什麼。 |\n| 「Pre-LN 和 Post-LN 是兩種不同的注意力機制」 | 兩者的注意力**一模一樣**，差別只是 LayerNorm 放在殘差相加之前還是之後——是訓練穩定性的工程選擇，不是機制差異。 | 原始 Transformer 是 Post-LN（`LN(x+sub(x))`），多數現代 LLM 是 Pre-LN（`x+sub(LN(x))`）。三明治換了麵包順序，夾的料沒變。深入指向訓練工程書。 |\n\n**和後面章節的鉤子**：本章的秩坍縮（純注意力坍縮到秩 1）是一個會反覆回來的伏筆。ch19 會把它**形式化**——從「集合運算／置換等變」的角度嚴格說明為何純注意力有「token uniformity」的歸納偏置，以及殘差與 FFN 在數學上如何阻止它。本章只需要你帶走直覺：**注意力是平均、平均會拉近、一直平均會坍縮、殘差和 FFN 把它救回來。** 另外，三種模型家族（尤其 decoder-only 主導）這個事實，會在 ch22 討論「2026 年 attention 是否還是唯一解」時再被拿出來檢視——挑戰者（SSM/Mamba）想動的，正是 decoder-only 那條 masked self-attention 的 O(n²) 成本。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [12 分鐘]（★）** 畫出一層 transformer block 的資料流。要標出：(a) 兩個 sublayer 分別是什麼；(b) 每個 sublayer 外面包的「殘差 ＋ LayerNorm」三明治（原始 Post-LN 的公式 `LayerNorm(x + Sublayer(x))`）；(c) 用一句話說每個 sublayer 的分工——哪個跨位置、哪個逐位置。畫完後口頭回答：殘差是「相加」還是「拼接」？為什麼這決定了所有 sublayer 必須同維度？\n\n**第 2 題 [15 分鐘]（★★）** 親手演示秩坍縮與殘差的解救。用脊椎三個 value 當三個 token 的初始表示：v_animal=(1,0)、v_street=(0,1)、v_it=(1,1)。假設一層純注意力的權重是均勻的（每個 token 對三個 token 各 1/3）。(a) 算「純注意力（無殘差）」一層後三個 token 各變成什麼向量？三列相同嗎？秩是多少？(b) 改成「注意力 ＋ 殘差」（把均勻平均的結果加回各自原輸入），算三個 token 各變成什麼？三列還相同嗎？秩是多少？(c) 用一句話說：殘差到底擋住了什麼？（提示：它讓每個 token 保住了什麼？）\n\n**第 3 題 [10 分鐘]（★★）** 解釋「為什麼純堆注意力不夠、需要殘差與 FFN」，講給另一個工程師聽（不查書，三到五句）。要點到：(a) 注意力的混合本質上是個什麼運算（線性？非線性？）；(b) 一直做這種運算會導致什麼（Dong 2021 的結論）；(c) 殘差和 FFN 各自怎麼幫忙（一個保住自我、一個注入非線性）。\n\n**第 4 題 [10 分鐘]（★★）** 把 BERT / GPT / T5 三種家族做成對照表，三欄是：(a) 有沒有 encoder；(b) 用哪種（哪幾種）注意力；(c) 注意力看不看未來、典型用途。填完後回答兩個問題：① 為什麼 decoder-only 的 GPT 裡找不到 cross-attention？② 哪一種是 2026 年生成式 LLM 的主流形態，為什麼是它（一句話）？\n\n### 推演解答\n\n**第 1 題。**\n\n```text\n  輸入 x ──┬─────────────────────────────┐\n           │                             ▼\n           │  (a) sublayer 1：多頭自注意力 ──►(＋)──► LayerNorm ──► z\n           └─────────────────────────────┘  (b) 殘差＋LN：LayerNorm(x + Attn(x))\n                                                   (c) 跨位置：讓 token 互相交流\n           ┌─ z ─────────────────────────┐\n           │                             ▼\n           │  (a) sublayer 2：FFN ────────►(＋)──► LayerNorm ──► 輸出\n           └─────────────────────────────┘  (b) 殘差＋LN：LayerNorm(z + FFN(z))\n                                                   (c) 逐位置：每個 token 自己消化\n```\n\n殘差是**相加（add）**，不是拼接。因為 `x + Sublayer(x)` 要逐元素相加，兩者維度必須一樣——所以原始 Transformer 規定所有 sublayer 與 embedding 輸出都是同一個 d_model=512，否則加不起來。常見錯路：以為殘差像 ch08 多頭那樣 concat——不對，多頭 concat 會讓維度變大，殘差永遠維度守恆。\n\n**第 2 題。**\n(a) 純注意力（無殘差）：每個 token 變成三個 value 的均勻平均 ＝ (1/3)(1,0)+(1/3)(0,1)+(1/3)(1,1) ＝ (2/3, 2/3) ≈ **(0.667, 0.667)**。三個 token **全變成這同一個向量**，三列相同 → **秩 = 1**（坍縮）。\n(b) 注意力 ＋ 殘差：把 (0.667,0.667) 加回各自原輸入：\n- animal：(1,0)+(0.667,0.667) = **(1.667, 0.667)**\n- street：(0,1)+(0.667,0.667) = **(0.667, 1.667)**\n- it：(1,1)+(0.667,0.667) = **(1.667, 1.667)**\n\n三列**各不相同** → **秩 = 2**（沒坍縮）。\n(c) 殘差擋住了「token 全變成大家的平均」這件事——它讓每個 token **保住了自己原本的那一份表示**（animal 記得自己是 (1,0)），混合的拉近效果被「保留自我」抵住，所以序列不會攤平成一條線。常見錯路：以為坍縮要堆很多層才發生——Dong 2021 證明是**雙指數**速度，這個極端均勻例子裡一層就崩了。\n\n**第 3 題（要點）。** 一個說得通的版本：「注意力的第三步是加權平均 value，那本質上是個**線性**運算——softmax 只決定權重，混合是線性的。一層層只做這種『平均』，每個 token 不斷變成大家的平均，會越來越像，最後**全部收斂成同一個向量**（秩坍縮，Dong 2021 證明是雙指數速度坍縮到秩 1）。殘差（`x + 注意力輸出`）讓每個 token 保住自己原本的表示、不會忘記自己是誰；FFN 在每個位置注入真正的**非線性**加工。兩者合力，讓深層 transformer 堆幾十層也不會把序列攤平。」——只要點到「平均→拉近→坍縮」與「殘差保自我、FFN 給非線性」就算抓到核心。常見錯路：只說「為了訓練穩定」——那是 LayerNorm 的活，殘差/FFN 解的是**表達力坍縮**，是不同的問題。\n\n**第 4 題。**\n\n```text\n家族            有 encoder?   注意力種類             看未來?   典型用途\n──────────────────────────────────────────────────────────────────────────\nBERT            只有 encoder   雙向 self             看全句    理解：分類/抽取\n（encoder-only）                                              （克漏字訓練）\nGPT             只有 decoder   masked self（唯一）   只看左    生成：逐字往下寫\n（decoder-only）                                             （★今日主流 LLM）\nT5              兩者都有       雙向 self ＋ masked    源:看全   序列→序列\n（encoder-dec.）              self ＋ cross          目標:看左  翻譯/摘要\n```\n\n① GPT 是 decoder-only，**沒有 encoder**，而 cross-attention 的定義就是「Q 來自 decoder、K/V 來自 encoder」（ch12）——沒有 encoder 就沒有可被查詢的源序列 key/value，所以沒有 cross-attention。GPT 整個模型只有一種注意力：masked self-attention。\n② **decoder-only（GPT 類）是 2026 年生成式 LLM 的主流**（2026-06）。一句話原因：它最適合「給前文、續寫下一個 token」這個 next-token 預測目標，而幾乎所有任務都能被改寫成這個通用形式，所以這個最簡單的接法反而最通用。常見錯路：說「因為 decoder-only 表達力最強」——不準確，勝出更多是因為通用性與訓練/部署的簡潔，而非單純表達力。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 一層 transformer block 由哪兩個 sublayer 組成？每個外面包的「三明治」是什麼公式（原始 Post-LN）？兩個 sublayer 的分工——哪個跨位置、哪個逐位置？\n2. 殘差連接解決什麼問題？它是「相加」還是「拼接」？為什麼這決定了所有 sublayer 必須同維度？（提示：資訊直通＋梯度直通。）\n3. LayerNorm 在正規化什麼？它和 BatchNorm 的關鍵差別是什麼？（提示：對單一 token 的特徵維度做，不跨 token/batch。）\n4. FFN 在做什麼、為什麼非有它不可？（提示：注意力的混合本質是線性的，模型需要在每個位置注入非線性；expand-and-contract。）\n5. 「純堆注意力會秩坍縮」是什麼意思？用脊椎三個 value 親手算的均勻平均結果是什麼？殘差怎麼把它救回來？（連到 Dong 2021、雙指數坍縮到秩 1。）\n6. 為什麼要堆 N 層而不是用一個超大的單層？堆疊讓 O(n²) 變成什麼成本？（提示：逐層精煉；每層付一次 n×n，N 層 N 倍。）\n7. BERT / GPT / T5 三種家族，用「有沒有 encoder、哪種注意力、看不看未來」各講一遍。為什麼 decoder-only 裡沒有 cross-attention？\n8. 哪一種家族是 2026 年生成式 LLM 的主流形態？為什麼勝出的是這個最簡單的接法？（一句話。）\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」§3.1–§3.3**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：一層 block 的原始定義。讀 §3.1（兩個 sublayer 與 `LayerNorm(x + Sublayer(x))` 的 Post-LN 公式、N=6、所有 sublayer d_model=512）、§3.3（position-wise FFN，d_ff=2048、ReLU）。對照本章你自己走的那一層脊椎。\n- **Dong, Cordonnier & Loukas 2021「Attention is Not All You Need: Pure Attention Loses Rank Doubly Exponentially with Depth」**（ICML 2021，arXiv 2103.03404，https://arxiv.org/abs/2103.03404 ）：本章秩坍縮的證據來源，也是「為何需要殘差與 FFN」的嚴格答案。讀它的 path decomposition 直覺與「skip connections and MLPs stop the output from degeneration」那個結論；不必啃完整證明，抓住「純注意力雙指數坍縮到秩 1」即可。ch19 會深入。\n- **Xiong et al. 2020「On Layer Normalization in the Transformer Architecture」**（arXiv 2002.04745，https://arxiv.org/abs/2002.04745 ）：Pre-LN vs Post-LN 為何影響訓練穩定性。本章只用結論（現代 LLM 多走 Pre-LN，訓練更穩）；想知道為什麼 Pre-LN 不太需要學習率暖身，讀這篇——但記住這是訓練工程，本書邊界外。\n- **Jay Alammar「The Illustrated Transformer」的「Residuals」與「The Decoder Side」段落**（https://jalammar.github.io/illustrated-transformer/ ）：把一層 block 的殘差、LayerNorm、FFN、以及 encoder-decoder 整機畫成圖。看「Residuals」那節的 add & normalize 動畫，與本章 ASCII 三明治互為補充。\n- **《從後端到 AI Infra》（與工作相關的書）**：本章刻意不展開的「N 層各付一次 O(n²) 的成本帳、KV cache、推論部署」全在那本。本章講結構，那本講「這個結構在 H100 上跑起來要花多少記憶體與時間」——讀完本章對結構有概念後，那本接手講成本與系統。\n- **何時回來重讀**：當你在 ch19 看到「self-attention 的置換等變與 token uniformity」的嚴格版時，回頭看本章的秩坍縮 worked example——你會發現本章用脊椎手算的「三個 value 均勻平均變成同一個向量」，正是 ch19 要形式化的那個歸納偏置的最小可見證據；以及 ch22 討論 SSM/Mamba 時，回頭看本章的三種家族——挑戰者瞄準的正是 decoder-only 那條 masked self-attention 的成本。\n"}, {"id": "ch14-quadratic-bottleneck", "file": "ch14-quadratic-bottleneck.md", "group": "Part IV — 為什麼是 O(n²)", "title": "ch14 — 二次方瓶頸：一張建不了索引的表", "md": "# ch14 — 二次方瓶頸：一張建不了索引的表\n\n> **本章解決什麼問題**：ch07 把那張 n×n 的注意力矩陣立了起來，也順手點到 O(n²) 從 QKᵀ 來。但那時我們只看了「形狀」，沒看「代價」。這一章把代價算到底——當 context 從一段話拉成一本書、一場長對話，n² 這個脾氣溫和的開頭如何在長 context 下變成失控的牆。更要緊的是回答一個你身為後端工程師會立刻問的問題：**既然慢，為什麼不加個索引？** 答案是 attention 的「相似度」根本不是能建索引的鍵——這是一張**建不了索引的表**，每筆新資料都得對全表重算一次相似度。看懂這件事，你就拿到了後面整個 Part IV（ch15 稀疏與線性、ch16 FlashAttention）乃至 ch22（SSM）的**共同動機**：所有人都在問同一句話——這筆平方稅，能不能少付一點，又別丟掉「全句直達」這個威力？本章不動三步骨架的任何一步，它盤點的是三步骨架在「規模」這個維度上的帳單。\n\n本章是 Part IV 的第一章，先把全書地圖攤開，標出你現在站在哪：\n\n```text\nPart I 注意力解決什麼問題    Part II 三步骨架：核心機制    Part III 補上缺的零件\nch01 該看哪裡（序章）        ch04 Query/Key/Value         ch09 位置編碼\nch02 固定向量的瓶頸      →   ch05 softmax：該看哪裡    →   ch10 RoPE 與相對位置\nch03 第一次注意 Bahdanau     ch06 為什麼除以 √d            ch11 遮罩：只能看過去\n                            ch07 自注意力與 O(n²)         ch12 交叉注意力與三型\n                            ch08 多頭注意力               ch13 一整層到一整個模型\n                                                               │\n                                                               ↓\nPart VI 看進黑盒與未來      Part V 理論身世             Part IV 為什麼是 O(n²) ◄你在這裡\nch20 注意力是解釋嗎     ←   ch17 即核迴歸           ←   ch14 二次方瓶頸 ◄\nch21 QK/OV 與 induction     ch18 即聯想記憶 Hopfield     ch15 稀疏與線性注意力\nch22 注意力之外 SSM/Mamba    ch19 即集合運算             ch16 FlashAttention/KV 共享\nch23 總收官：同一個 it      ★ 三步骨架貫穿全書          ★＝打分→正規化→混合\n```\n\nPart I–III 我們把注意力**搭起來**：從一個代名詞該看哪裡（ch01），到三步骨架（ch04–08），到補上位置、遮罩、跨序列、一整層（ch09–13）。機制完整了，能跑了。Part IV 換一個角度逼問它：**這台機器，跑得起多長的輸入？** 答案藏在 ch07 那張方陣的形狀裡——而本章要把那個答案算到讓你心疼。\n\n## 從你已知的出發\n\n你職涯裡最常被半夜叫起來的故障，多半長同一個樣子：某張表沒加索引，資料量小的時候沒人發現，等到資料漲到一個量級，一個查詢從幾毫秒變成幾十秒，連鎖拖垮整個服務。你打開慢查詢日誌，看到那行刺眼的 `Seq Scan`（全表掃描），心裡咯噔一下——「這就是 N+1 / 沒走索引 / 兩兩比對的經典翻車」。\n\nself-attention 在做的，正是這種你最怕的事，而且是**結構性地、無法靠加索引繞過地**在做。ch07 已經點過這個直覺：self-attention 是一個**沒有索引的 self-JOIN**——序列裡每個 token 當 query，要對全序列每個 token 當 key 算一次相似度，n 個 query × n 個 key = n² 個分數。本章要把這件事的兩個後果講透：\n\n1. **代價會爆**：n² 的成長在 n 小的時候溫和到你不會注意，n 一大就以平方速度失控。這正是「資料量小時沒事、漲到一個量級就翻車」的數學版本。\n2. **加不了索引**：你的 DB 翻車還有救——加個 B-tree、加個 hash 索引，把 O(n) 的全表掃描降到 O(log n) 或 O(1)。但 attention 的查找**建不了這種索引**。為什麼建不了，是本章的核心，也是後面三章為什麼要那麼費勁繞路的根本原因。\n\n把這兩點釘住，你就懂了：Part IV 不是在介紹幾個炫技的新模型，而是在處理一個你太熟悉的工程問題——**一張慢表，但這次你連索引都加不上**。\n\n在三步骨架裡，本章站在哪？和 ch07 一樣，它哪一步都沒改：\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │ weighted sum │\n values ─────────────────────────────────────────┘\n                  │\n                  └─►【打分步要算 n×n 個分數——本章盤點這一步的成本帳單】\n```\n\nO(n²) 整個誕生在**打分（score）**這一步：n 個 query 各對 n 個 key 算內積，攤成 n×n。正規化（逐列 softmax）和加權混合（乘 V）跟著也是 n² 量級，但它們是打分產出 n×n 的**後果**，不是獨立的源頭。本章不引入任何新機制，它做的是一件後端工程師每天做的事：**把一個演算法的時間與空間複雜度算清楚，看它在規模上會不會炸。**\n\n## 把 O(n²) 算到讓你心疼：長 context 下的爆炸\n\nch07 給過一張 n 與 n² 的成長表。本章把它重新算一遍、加上 2026 年真實模型的 context 尺度，讓「平方」這兩個字從抽象符號變成你能感覺到的痛。\n\n先把帳對齊。注意力矩陣是 n×n，**格子數就是 n²**，每格一個 d 維內積（打分），所以時間是 O(n²·d)；要做逐列 softmax 就得把整張 n×n 表存著，所以空間是 O(n²)（web 查證：標準 self-attention 時間 O(n²·d)、空間 O(n²)，皆直接來自 QKᵀ 產生的 n×n 矩陣，2026-06）。d 是固定的模型超參數，我們關心 n 怎麼吃成本，主導項就是 **n²**。\n\n把序列拉長，看格子數怎麼長（自算複核）：\n\n```text\n   n（序列長度）   n²（注意力矩陣格數）      相對 n=512 的倍數    現實對照\n   3                          9               —                脊椎玩具\n   512                  262,144               1×               一段話\n   4,096             16,777,216              64×               一篇長文\n   100,000       10,000,000,000          ~38,147×             一本中篇小說／長對話\n   1,000,000  1,000,000,000,000       ~3,814,697×             整本書／超長 context\n```\n\n讀這張表，先抓住一條讀法規則，它比任何單一數字都好用：\n\n> **context 長 k 倍，注意力的打分成本變 k² 倍。**\n\n- context **加倍**（k=2）→ 成本變 **4 倍**（2²）。這就是 2026 年那句工程口頭禪「把 context window 翻倍，attention 那層的計算大致翻四倍」的數學出處（web 查證：doubling the context window roughly quadruples the attention computation，2026-06）。\n- context 長 **10 倍**（k=10）→ 成本變 **100 倍**（10²）。\n- 從一段話（n≈512）到一本書（n≈100k，長約 195 倍）→ 格子數從二十幾萬暴衝到 **一百億**（10¹⁰），成本約 38,000 倍。\n\n這個「一開始溫和、後面失控」就是平方函數的全部脾氣。n=3 時九個格子，連零頭都算不上；但 n 每往上跳一個數量級，n² 就往上跳兩個。線性成長是爬樓梯，平方成長是坐電梯往下墜——你在 n 小的時候完全感覺不到地板在哪，等感覺到時已經摔下去了。這正是「資料量小時沒事、漲到一個量級就翻車」在數學上長的樣子。\n\n2026 年這件事為什麼變得這麼要命？因為 context window 的軍備競賽。把幾個真實尺度擺進來感受一下（web 查證，皆標時點 2026-06）：\n\n```text\n   模型（2026-06，數字會變，看趨勢不看絕對值）       廣告 context window\n   Claude Sonnet 4                                     1,000,000 tokens（1M）\n   Gemini 2.5 Pro                                      2,000,000 tokens（2M）\n   Gemini 3 Pro / Llama 4 Scout                       10,000,000 tokens（10M）\n```\n\n把 n=100 萬代進去：n² = **一兆**（10¹²）格。把 n=1000 萬代進去：n² = **一百兆**（10¹⁴）格。每一格還要乘上模型維度 d、再乘上層數、再乘上頭數。你開始明白為什麼「長 context」在 2026 年是貼著錢燒的奢侈品——每一倍的 context,attention 那層都在收平方的稅。\n\n> **這裡了不起／反直覺在哪**：很多人以為「context 變長就是多塞點字進去，線性多花一點錢」。錯得離譜。塞進去的字是線性的（embedding、FFN 那些逐位置的運算確實是 O(n)）,但**讓每個字看見彼此**——attention 那一步——是平方的。你付的不是「多 n 個字」的錢，是「多 n 個字之間 n² 條兩兩連線」的錢。這就是為什麼一個只長了 10 倍的輸入，帳單卻長了 100 倍。**長 context 真正貴的不是資訊量，是資訊之間的關係數。**\n\n至於記憶體那筆帳，ch07 已經點明「時間 O(n²) 和空間 O(n²) 是兩筆要分開算的帳」。空間那筆在真實硬體上會具體變成「這張 n×n 矩陣在 GPU 記憶體裡多大、怎麼被反覆讀寫」——那是**部署與推論物理**的問題，深度屬於《從後端到 AI Infra》ch03/ch05,本書不展開。本章只給你一個會心一驚的動機數字：web 查證提到，光是存下**單一層**、n=32k 序列的注意力矩陣，就可能吃掉一張 80GB HBM 顯卡裡的數十 GB（2026-06,具體數字隨實作與精度而異）。記住這個量級就好；為什麼會這樣、怎麼省，ch16 講想法、工作書講工程。\n\n對照那個被注意力取代的舊世界——RNN（ch02）。RNN 一個字一個字處理，第 i 步只更新一個固定大小的隱藏狀態，總共 n 步，複雜度 **O(n)**,線性。從「成本對 n 的成長」單看，RNN 完勝：\n\n```text\n   架構             計算量對 n 的成長     直覺\n   self-attention   O(n²)  ← 平方        每個 token 看全部 token\n   RNN              O(n)   ← 線性        每個 token 只更新一個狀態,往後傳\n```\n\n那為什麼大家還是拋棄了 RNN、擁抱 O(n²) 的 attention?因為 ch07 講透的那個交易：RNN 的 n 步**必須循序**（第 i 步等第 i−1 步）,沒法平行，而且句首的資訊要走 n 步才傳到句尾、一路衰減；self-attention 的 n×n 每一格**互不依賴、一次平行算完**（循序深度 O(1)）,任兩個 token 一步直達。**O(n²) 不是 bug,是「敢讓所有位置直接互看」的明碼標價。** 本章要面對的問題正是：這個價，在長 context 下貴到付不起了，能不能殺價？——但別把孩子跟洗澡水一起倒掉（別為了省錢丟了「全句直達」）。\n\n## 為什麼不加個索引：相似度查找的詛咒\n\n到這裡，你身為後端工程師的本能該跳出來了：慢查詢的標準解法不就是**加索引**嗎？DB 全表掃描 O(n) 慢，加個 B-tree 索引降到 O(log n)、加個 hash 索引降到 O(1)。attention 是個 n×n 的全表對全表掃描，那……**給它建個索引不就好了？**\n\n這個問題問得對極了——它正是 ch15 之後所有「高效注意力」研究的起點。而本章要給你的答案是：**attention 這張表，建不了傳統索引。** 不是沒人想到，是它的查找本質上不吃索引這一套。理解「為什麼建不了」,你才會懂後面那些繞路有多無奈、又多巧妙。\n\n先回顧索引憑什麼快。你的 DB 索引能把查找從 O(n) 降到 O(log n)/O(1),靠的是**鍵的兩個性質**:\n\n```text\n   索引類型    靠鍵的什麼性質              把查找降到\n   hash 索引    鍵可雜湊成桶(等值比對)      O(1)   —— WHERE id = 42\n   B-tree      鍵可排序(有全序)            O(log n) —— WHERE age > 30、ORDER BY\n```\n\n關鍵字是 **等值** 和 **有序**。你查 `WHERE id = 42`,hash 函數一算就直接跳到那個桶，不用掃別人；你查 `WHERE age BETWEEN 20 AND 30`,B-tree 因為鍵排好序，二分找到範圍的兩端，中間整段直接拿。**索引之所以能跳過大部分資料，是因為「鍵的結構」事先告訴了你「不可能命中的那些，連看都不用看」。**\n\n現在看 attention 的查找條件是什麼。它不是 `WHERE key = query`（等值）,也不是 `WHERE key > query`（有序）。它是：\n\n```text\n   attention 的「查詢條件」:找出與 query 內積最大(最相似)的 key——並且不是取一個,是按相似度混合全部\n```\n\n這個條件踩中了三個讓傳統索引失效的點，每一個都致命：\n\n**第一，相似度不是等值，也沒有全序。** 「q 和 k 有多像」是一個連續的、多維度權衡出來的數值，不是「相等/不相等」那種離散桶，也不存在一個一維的大小排序能讓你「排好序後二分」。兩個四維向量 (2,1,1,0) 和 (1,−1,0,0),誰「比較大」?這問題本身沒意義——向量在高維空間裡的「像」是它們的夾角與長度共同決定的，投影到任何一個軸上排序都會丟掉資訊。沒有全序，B-tree 無從建起；不是等值，hash 桶無從分起。\n\n**第二，查的不是「最像的那一個」,是「按相似度混合全部」。** 就算你退一步，只想找「最相似的前幾個 key」（這在向量檢索裡叫 nearest neighbor,確實有專門的索引，下面就說）,attention 也不滿足——它的三步骨架第三步是**加權混合所有 value**(ch05 的招牌反直覺：attention 不是取一筆，是混合全部、相關的權重大)。softmax 給每個 key 一個非零權重，連 it→it 那個 0.090 都在貢獻。要算這個混合，你**原則上需要每個 key 的分數**才能正規化（softmax 的分母是所有 e 次方的和）。「我只想看前幾名」這個能跳過大多數資料的捷徑，被 softmax 要「看完全部才能正規化」這件事堵死了。\n\n**第三，query 不是固定的，是每筆資料現算的、而且還在變。** DB 索引能省事，還有個隱含前提：被索引的資料**相對靜止**,你建一次索引，之後無數次查詢都能用。但 self-attention 裡，每一層、每個 token 的 Q/K/V 都是**當場**由學來的投影矩陣算出來的（ch04）,而且**逐層在變**——這一層的輸出餵進下一層，下一層的 K 就全變了。就算你費勁為某一層建了索引，下一層作廢，等於沒建。這像一張**每讀一次就整張重寫**的表，你永遠來不及為它建索引。\n\n把這三點合起來，結論很硬：\n\n> **attention 的查找，是在一個高維連續空間裡、對一張每層都在變的表、做「按相似度加權混合全部」的操作。等值索引（hash）、有序索引（B-tree）的前提它一個都不滿足。所以沒有捷徑，每一對 (query, key) 都得老老實實算一次內積——這就是 O(n²) 在原理上無法靠「加索引」消除的根本原因。**\n\n這裡值得補一個你可能會想到的反例，因為它恰好從反面印證了上面的論證（web 查證，2026-06）。向量資料庫（如做 RAG 的那些）不是有索引嗎？ANN（approximate nearest neighbor，近似最近鄰）用 LSH、HNSW 圖這些技巧，確實能在高維向量裡快速找「最像的前 k 個」。為什麼它行、attention 不行？三個差別：① ANN 找的是「**最像的少數幾個**」（top-k），不是「**混合全部**」——它能丟掉長尾，attention 的 softmax 不能；② ANN 是**近似**——它接受偶爾漏掉真正最像的那個，換取速度，而標準 attention 要精確；③ ANN 的索引建在**相對靜止**的向量庫上（你的文件 embedding 建好就不太動），不是每層現算現變的。\n\n更深一層，連 ANN 也在跟一個叫**維度詛咒（curse of dimensionality）** 的東西搏鬥：web 查證指出，在高維空間裡，傳統樹狀索引（B-tree、KD-tree 那類靠空間切分的結構）的效能會退化到**還不如直接線性掃描**——因為維度一高，「鄰近」這個概念本身就變模糊了，空間切分救不了你（2026-06）。這從另一個角度確認了本章的論點：**高維相似度查找，先天就不是傳統索引的主場。** attention 不是不想加索引，是它的查找站在傳統索引的能力邊界之外。\n\n而這，恰恰預告了 ch15 的兩條路為什麼長那個樣子——既然「精確地混合全部」建不了索引，那就只能在「精確」和「混合全部」這兩個前提上動刀。下一節說。\n\n## 兩個方向：少算一些 vs 換個算法\n\n既然 O(n²) 在原理上躲不掉（精確地讓每對 token 互看，就是 n² 個分數）,想殺價就只剩兩條路。它們對應「動三步骨架的哪一步」,你現在就能憑直覺推出來，後面 ch15/ch16 只是把細節填上。\n\n把全表掃描慢的問題，放回你的後端腦袋，你本來就有兩個直覺解法：\n\n```text\n   想加速一個 O(n²) 的兩兩比對:\n\n   方向 A:少比一些對         → 不是每對都算,只算「重要的/鄰近的」那些對\n   方向 B:換個算法            → 別用那個逼你「兩兩都算」的公式,換一個能重排運算順序的\n```\n\n**方向 A——少算一些對（改「打分」的連結結構）。** 直覺是局部性假設：一個 token 真的需要看遍全句的每一個字嗎？多半不用——它最在意的是鄰近的幾個詞，加上少數幾個全域的「樞紐」。那就**只算這些對的分數**,其餘的對直接當作零（不連）。這就是**稀疏注意力（sparse attention）**：它把 n×n 那張稠密的表，挖成一張只有少數格子有值的稀疏表，於是要算的分數從 n² 降到 n√n（Sparse Transformer）甚至線性（Longformer/BigBird）。它動的是三步骨架的**第一步「打分」**——改的是「誰跟誰之間需要打分」的連結結構。對應你做的「只比對鄰近/重點資料，不全比」。代價：這是**近似**——你賭那些被跳過的對真的不重要，賭錯了就漏掉長程關係。\n\n**方向 B——換個算法（改「正規化」）。** 這條路更刁鑽，直接挑戰那個逼你「兩兩都算」的元兇：softmax。標準 attention 是 softmax(QKᵀ)·V,那個 QKᵀ 必須先算出 n×n 才能餵給 softmax——n² 卡死在這。但如果把 softmax 換成一個能拆開的核函數 φ,讓分數寫成 φ(Q)φ(K)ᵀ 的形式，那就能玩一個你在查詢優化裡用爛的招：**矩陣乘法結合律**。本來是 (φ(Q)·φ(K)ᵀ)·V——先算 n×n 的 φ(Q)φ(K)ᵀ;改成 φ(Q)·(φ(K)ᵀ·V)——先算 d×d 的 φ(K)ᵀV,再被 Q 乘。中間那個大矩陣的尺寸從 n×n 縮成 d×d,複雜度從 O(n²·d) 降到 O(n·d²)——**對 n 線性**(web 查證：linear attention 用核函數替換 softmax,靠矩陣乘法結合律先算 KᵀV,把 O(n²d) 降到 O(nd²),2026-06)。這就是**線性注意力（linear attention）**,動的是三步骨架的**第二步「正規化」**——把 softmax 換掉，換來重排運算順序的自由。對應你把 (A·B)·C 改成 A·(B·C) 省掉大中間結果。代價：也是**近似**——φ 核近似不了 softmax 的全部威力，尤其在「精確回憶某個遠處 token」這種事上會吃虧。\n\n```text\n   方向    動三步骨架哪一步       做法                      複雜度      代價\n   A 稀疏   第1步 打分(連結結構)   只算部分 token 對          n√n / O(n)  漏掉被跳過的關係\n   B 線性   第2步 正規化(換 softmax) 核函數+結合律重排運算順序   O(n)        近似不了 softmax 的全域競爭\n```\n\n注意兩條路的共同點：它們都是**近似**——用一點精度，換 O(n²)→次二次方甚至線性的成本。這就埋下 ch15 結尾、ch22 會回收的伏筆：**近似注意力在「精確 token 級回憶」上會吃虧**,所以 2026 年的混合架構，往往還是要保留一小撮精確的 softmax 注意力層當「精確檢索」的後盾（這條線一路通到 ch22 的 SSM 與混合共識）。\n\n那有沒有**不近似、也能省**的辦法？有——但它省的不是「算多少」，是「怎麼擺記憶體」。FlashAttention（ch16）證明：O(n²) 的**時間**（分數的個數就是 n²）很難繞過，但 O(n²) 的**空間**可以——靠**不把整張 n×n 矩陣實體化在慢記憶體裡**，而是分塊算、用 online softmax 邊算邊合併。它在數學上和標準 attention **一模一樣**（精確、非近似），省的是記憶體的搬運，不是計算的精度。這是和方向 A/B 本質不同的第三招，ch16 專章講。\n\n於是 Part IV 的三章地圖就清楚了，全是對本章這張「建不了索引的表」動手：\n\n```text\n   ch14(本章) 把代價算透、說清為什麼建不了索引 —— 共同動機\n   ch15        方向 A 稀疏 + 方向 B 線性 —— 近似省法(動打分/正規化)\n   ch16        FlashAttention(精確省空間)+ KV 共享 —— 不近似的省法\n   (ch22)      乾脆換掉 attention 的主幹:SSM/Mamba —— 用固定狀態換掉 n×n\n```\n\n## 故障模式與直覺陷阱\n\n| 直覺陷阱 / 故障 | 為什麼錯／在哪一步把你帶溝裡 | 怎麼自我察覺、正確版是什麼 |\n|---|---|---|\n| 「context 變長，成本就線性多一點」 | 把「資訊量」和「資訊間的關係數」搞混。塞進去的 token 確實是線性多（embedding、FFN 是 O(n)）,但 attention 算的是**兩兩關係**,是 n²。context 長 10 倍，attention 那層貴 100 倍，不是 10 倍。 | 問自己：這一步算的是「每個 token 各自做的事」（線性）還是「token 之間的兩兩關係」（平方）?attention 是後者。 |\n| 「O(n²) 慢，加個索引不就好了」 | 用對了 DB 直覺、用錯了地方。索引靠鍵「可雜湊（等值）/可排序（有全序）」跳過大部分資料；attention 的「相似度」既非等值也無全序，且要**混合全部**(softmax 要看完才能正規化),query 還逐層現算現變。三個前提一個不滿足。 | 問：這個查找的「鍵」能雜湊或排序嗎？要的是「最像的一個」還是「按相似度混合全部」?是混合全部，索引就救不了。 |\n| 「向量資料庫的 ANN 索引能加速，那 attention 也能套用」 | 三個關鍵差別：ANN 找 **top-k 少數**（可丟長尾）、是**近似**（可接受漏掉）、建在**相對靜止**的向量庫上；attention 要**混合全部**、要**精確**、Q/K/V **每層現算現變**。ANN 解的是不同的問題。 | 對照三點：你能丟長尾嗎？能接受近似嗎？資料靜止嗎？attention 三個都是「不行」。 |\n| 「O(n²) 是因為有多頭/要做 n 次 softmax」 | 抓錯源頭（ch07 同款陷阱）。O(n²) 純粹來自 **QKᵀ 產生 n×n 個分數**。多頭是把 d 切開平行做，不改 n²;softmax 逐列做是 n² 量級，但它是 QKᵀ 的後果，不是獨立原因。 | 問：哪一步輸出了 n×n?是打分（QKᵀ）。把那一步輸出形狀寫出來，就抓到唯一的根。 |\n| 「既然 O(n²) 這麼糟，RNN 的 O(n) 一定整體更好」 | 只看計算量、漏看平行性與長程衰減（ch07）。RNN 的 O(n) 步必須**循序**（不能平行）、句首到句尾**衰減**;self-attention 付 O(n²) 換來循序深度 O(1)（餵飽 GPU）和任兩點直達。便宜不等於整體更好。 | 分開看三個指標：總工作量、循序深度、最長路徑。RNN 贏第一個，輸後兩個。 |\n| 「稀疏/線性注意力既然能降到 O(n),那標準 attention 該被淘汰了」 | 漏看「近似的代價」。稀疏賭被跳過的對不重要、線性的核近似不了 softmax 的全域競爭——兩者在**精確 token 級回憶**上常吃虧。所以 2026 年主流是**混合**（保留少量精確 softmax 層）,不是純近似（ch22）。 | 問：這個近似在「精確記住遠處某個 token」上會不會出錯？會，就不能全靠它。 |\n| 「FlashAttention 把 O(n²) 解決了」 | 混淆時間與空間兩筆帳。FlashAttention 省的是 O(n²) 的**空間**（不實體化 n×n）和記憶體搬運，**時間仍是 O(n²)**（分數個數就是 n²）,而且它是**精確**不是近似（ch16）。它讓 O(n²) 跑得起更長，沒消滅 O(n²)。 | 記住：時間 O(n²) 難繞、空間 O(n²) 可省。FlashAttention 動的是後者。 |\n\n**和後面章節的鉤子**:本章把「O(n²) 的代價」和「為什麼建不了索引」這兩件事講透，它們是 Part IV 與 ch22 的共同動機。ch15 走「近似省」（稀疏改打分、線性改正規化）;ch16 走「精確省空間」(FlashAttention 不實體化 + KV 共享);ch22 乾脆換掉主幹（SSM 用固定狀態換掉 n×n,但脊椎在那裡會「斷」——固定狀態裝不下精確回憶，正好印證本章「混合全部要付的代價」）。記住本章那句讀法規則：**長 k 倍貴 k² 倍**——它是你往後讀每一個高效注意力時，心裡那把尺。\n\n## 紙上推演\n\n### 推演題\n\n**第 1 題 [12 分鐘]（★）** 把平方稅算到底。用本章的 n² 成長關係，不查表自己算：(a) 一個模型 context 從 8k 提升到 32k（長 4 倍）,attention 打分那一步的成本變幾倍？(b) 從 4k 提升到 1M（長 250 倍）呢？(c) 用一句話向一個沒學過複雜度的同事解釋「為什麼 context 翻倍、attention 的帳單翻了四倍」（提示：你付的是關係數不是字數）。\n\n**第 2 題 [15 分鐘]（★★）** 為什麼建不了索引——逐條反駁「加個索引就好」。你的後端同事說：「attention 慢就是沒加索引嘛，給 key 建個 B-tree 或 hash 不就 O(log n)/O(1) 了？」請用本章的三個理由逐條回他：(a) 為什麼「相似度」這個鍵既不能 hash 也不能 B-tree?(b) 就算只想找「最相似的前幾個」,為什麼 softmax 還是逼你看完全部？(c) 為什麼「每層現算現變」讓索引就算建了也白建？\n\n**第 3 題 [12 分鐘]（★★）** 兩個方向各動哪一步。不展開公式，只憑三步骨架推理：(a) 稀疏注意力「只算部分 token 對」,動的是三步骨架的哪一步？為什麼？(b) 線性注意力「把 softmax 換成核函數、用結合律重排」,動的是哪一步？(c) 用結合律的直覺說明：把 (QKᵀ)V 改成 Q(KᵀV) 為什麼能把成本從 O(n²·d) 降到 O(n·d²)?(d) 這兩條路有什麼共同代價、ch22 為什麼還要保留少量精確 softmax 層？\n\n**第 4 題 [10 分鐘]（★★）** ANN 為什麼行、attention 為什麼不行。你做過 RAG,知道向量資料庫用 ANN 索引能在幾百萬個 embedding 裡快速找「最像的前 k 個」。請說清楚 ANN 和 attention 的三個關鍵差別（top-k vs 混合全部、近似 vs 精確、靜止 vs 每層現變）,並由此解釋「為什麼 ANN 的成功不能直接搬來救 attention」。\n\n### 推演解答\n\n**第 1 題。**\n(a) 長 k=4 倍 → 成本 k²=**16 倍**。\n(b) 長 k=250 倍 → 成本 k²=**62,500 倍**。（平方的脾氣：輸入只長了兩個半數量級，成本長了快五個數量級。）\n(c) 範例答：「我們不是多塞了 n 個字進去而已——attention 要算的是這 n 個字**之間的兩兩關係**,有 n² 條。字數翻倍，關係數翻四倍（2²）,所以帳單翻四倍。你付的是關係數，不是字數。」\n\n**第 2 題。**\n(a) 「相似度」是 q·k 內積，一個多維度權衡出來的連續值。hash 索引要鍵能**雜湊成桶**（靠等值比對）,但相似度不是「相等/不相等」;B-tree 要鍵**有全序**能排序後二分，但高維向量「誰比較大」沒有一維全序可言（投影到任一軸排序都丟資訊）。既非等值、又無全序，兩種索引的前提都不滿足。\n(b) 因為 attention 的第三步是**加權混合所有 value**,而 softmax 的分母是**所有** key 分數的 e 次方之和——要算任何一個權重的正確值，你都得先知道全部分數才能正規化。「只看前幾名」這個能跳過大多數資料的捷徑，被「softmax 要看完全部才能正規化」堵死。（這也正是 ch05 那個招牌反直覺：attention 不是取一筆，是混合全部。）\n(c) self-attention 裡每個 token 的 Q/K/V 都是當場由學來的投影矩陣算出、而且**逐層在變**（這一層的輸出餵下一層，下一層的 K 全變）。索引建在相對靜止的資料上才划算；這張表每讀一次（每過一層）就整張重寫，你建好索引它就作廢，等於白建。\n\n**第 3 題。**\n(a) 動**第一步「打分」**。稀疏改的是「誰跟誰之間需要算分數」的**連結結構**——本來 n×n 全連，稀疏只連局部窗口+少數全域樞紐，被跳過的對直接當零，於是要算的分數從 n² 降到 n√n 或線性。\n(b) 動**第二步「正規化」**。把 softmax 這個正規化函數換成可拆開的核函數 φ,讓注意力寫成 φ(Q)φ(K)ᵀ 的形式——換掉 softmax 是為了解開「必須先算出整張 n×n 才能正規化」的死結。\n(c) 結合律：(φ(Q)·φ(K)ᵀ)·V 先算 φ(Q)φ(K)ᵀ 是 n×n（大）,再乘 V;改成 φ(Q)·(φ(K)ᵀ·V) 先算 φ(K)ᵀV 是 **d×d**（小，與 n 無關）,再被 φ(Q) 乘。中間矩陣從 n×n 縮成 d×d,當 n≫d 時省得驚人——成本從 O(n²·d) 降到 O(n·d²),對 n 線性。這正是你在查詢優化裡把 (A·B)·C 重排成 A·(B·C) 省大中間結果的同一招。\n(d) 共同代價：兩者都是**近似**——稀疏賭被跳過的對不重要（漏長程關係）、線性的核近似不了 softmax 的全域競爭（尤其精確回憶遠處某個 token 時）。所以 ch22 的混合架構往往保留一小撮（如 1-in-8）**精確 softmax 層**當「精確檢索」的後盾，其餘層才用便宜的近似/SSM——用少量精確層補住近似省下來的洞。\n\n**第 4 題。**\n三個關鍵差別：\n- **top-k vs 混合全部**:ANN 找「最像的前 k 個」,可以大方丟掉長尾；attention 要按 softmax 權重**混合全部** value,連權重 0.09 的都在貢獻，丟不得。\n- **近似 vs 精確**:ANN 接受偶爾漏掉真正最像的那個（換速度）;標準 attention 要精確的 softmax。\n- **靜止 vs 每層現變**:ANN 的索引建在相對靜止的向量庫上（文件 embedding 建好不太動）;attention 的 Q/K/V 每層現算現變，索引建了就作廢。\n由此：ANN 的成功建立在「可丟長尾、可近似、資料靜止」三個 attention 都不滿足的前提上，所以不能直接搬來救 attention。能搬的部分（近似、可丟一些對）正是 ch15 稀疏/線性在做的事——而它們也就因此繼承了 ANN 的代價：近似會在精確回憶上吃虧。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. 用一句話說「為什麼 context 長 10 倍、attention 那層貴 100 倍」（提示：平方，且付的是兩兩關係數不是字數）。\n2. O(n²) 到底從三步骨架的哪一步、為什麼長出來？（打分：n 個 query × n 個 key = n×n 個分數；softmax 和混合是它的後果。）\n3. attention 這張表為什麼建不了傳統索引？把三個理由講給一個只懂 DB 索引的同事聽（相似度非等值無全序、softmax 要混合全部看完才正規化、Q/K/V 每層現算現變）。\n4. 向量資料庫的 ANN 索引明明能在高維向量裡快速查，為什麼救不了 attention?(top-k vs 混合全部、近似 vs 精確、靜止 vs 每層現變。)\n5. 想殺掉 O(n²) 的兩個直覺方向是什麼？各動三步骨架的哪一步？（少算一些對=改打分的連結結構=稀疏；換掉 softmax 用結合律重排=改正規化=線性。）\n6. 線性注意力靠矩陣乘法結合律省成本——把 (QKᵀ)V 重排成什麼？為什麼這樣就從 O(n²·d) 變 O(n·d²)?（重排成 Q(KᵀV),中間矩陣從 n×n 縮成 d×d。）\n7. 稀疏和線性都是「近似」,代價是什麼？為什麼 2026 年主流是「混合」而非純近似？（近似在精確 token 級回憶上吃虧；混合保留少量精確 softmax 層補洞。）\n8. O(n²) 的「時間」和「空間」是同一筆帳嗎？哪一個能不靠近似就省下來、靠什麼？（不是同一筆；空間可靠 FlashAttention 不實體化 n×n 來精確省下，時間難繞，ch16。）\n\n## 延伸閱讀\n\n- **Vaswani et al. 2017「Attention Is All You Need」Table 1**（arXiv 1706.03762，https://arxiv.org/abs/1706.03762 ）：self-attention 的 per-layer 複雜度 O(n²·d)、循序操作 O(1)、最長路徑 O(1),和 RNN 的 O(n·d²)/O(n)/O(n) 並排在同一張表——本章「為什麼付 O(n²) 是划算的交易」的原始出處，直接讀那一張表。\n- **Tay et al. 2020「Efficient Transformers: A Survey」**（arXiv 2009.06732，https://arxiv.org/abs/2009.06732 ）：把「對付 O(n²)」的各種路線（稀疏、低秩/線性、記憶體/IO）系統性分類的綜述。讀它的分類框架，你會看清本章「兩個方向」其實是更大地圖的兩塊——但別陷進每個變體的細節，ch15 只挑想法層講。\n- **Michael Brenndoerfer「Attention Complexity: Quadratic Scaling, Memory Limits & Efficient Alternatives」**（https://mbrenndoerfer.com/writing/attention-complexity-quadratic-scaling-memory-efficient-transformers ）：把 O(n²) 的時間與空間、長 context 下的記憶體牆拆解得很白話的 2026 讀物。讀它確認「打分（QKᵀ）是平方複雜度的唯一來源」,並對照本章那張 n vs n² 的成長表。\n- **《從後端到 AI Infra》ch03（一張建不了索引的表 / 推論物理）、ch05（KV cache）**：本章講「為什麼數學上建不了索引、長 context 多貴」;那本講「這張 n×n 在真實硬體上的記憶體與頻寬成本、KV 怎麼存怎麼管」。想知道 O(n²) 怎麼在 H100 上變成具體的牆、那數十 GB 怎麼來的，去那本——這是「原理書/工作書」的分界線，本章只到動機為止。\n- **《矩陣是動詞》ch06（矩陣乘法即批量內積）、ch19–20（SVD 與低秩近似）**：QKᵀ 為什麼結果是 n×n、線性注意力的「低秩」直覺（把 K/V 投影到低秩）在那兩章。本章把它們當工具直接用；ch15 講線性/低秩注意力時會正式接回去。\n- **何時回來重讀**：當你在 ch15 看到稀疏「動打分」、線性「動正規化」,在 ch16 看到 FlashAttention「精確省空間」,在 ch22 看到 SSM「用固定狀態換掉 n×n、脊椎在這裡斷掉」時，回頭看本章「為什麼建不了索引」的三個理由和「兩個方向」那張表——你會發現後面所有的繞路，都在這三個理由的縫隙裡找空間。\n"}, {"id": "ch15-sparse-linear", "file": "ch15-sparse-linear.md", "group": "Part IV — 為什麼是 O(n²)", "title": "ch15 — 給注意力建索引：稀疏與線性注意力", "md": "# ch15 — 給注意力建索引：稀疏與線性注意力\n\n> **本章解決什麼問題**：ch14 把刀架在脖子上——self-attention 是「一張建不了索引的表」，每個 query 對每個 key 都得算一次相似度，n×n 的矩陣讓計算與記憶體隨序列長度平方成長，長 context 一定爆。ch14 在結尾預告了兩個直覺方向：要嘛**少算一些對**（別每對都比），要嘛**換個算法**讓總量不要平方成長。本章就把這兩條路走到底：**稀疏注意力（sparse attention）**動三步骨架的第一步「打分」——只在部分 token 對之間算分數，硬把 n×n 砍出一堆洞；**線性注意力（linear attention）**動第二步「正規化」——把 softmax 換成一個能拆開的核函數，再用矩陣乘法的結合律把 (QKᵀ)V 重排成 Q(KᵀV)，O(n²) 一口氣降到 O(n)。兩條路都能省，但都付了同一筆學費：**它們是近似，不是精確**——省下的成本常常從「精確回憶」那裡扣回去。記住這筆學費，下一章（ch16）的 FlashAttention 才會顯出它的反常：不近似也能省。\n\n## 從你已知的出發\n\n你做後端做久了，對「O(n²) 怎麼救」其實有一整套肌肉記憶，只是沒意識到那就是本章在做的事。\n\n第一招你天天用：**加索引，把全表掃描變成局部查找**。一張沒有索引的表，查一筆要 full scan O(n)；建了 B-tree 索引，查一筆降到 O(log n)。但 ch14 已經告訴你殘酷的事實——attention 的「相似度」**建不了傳統索引**，因為它不是等值比對（`WHERE id = 42`），而是「跟每個 key 算一個連續的相似度分數」，沒有可排序、可雜湊的鍵能讓你預先把資料切好。所以 attention 不能直接套 B-tree。但你還有第二招、第三招。\n\n第二招：**局部性假設——只比對「附近的」資料，不比對全部**。你寫過滑動視窗（sliding window）的限流、寫過只看最近 N 筆的時間序列聚合、寫過「快取只存熱資料、冷資料不碰」。背後是同一個賭注：大部分有用的關聯都是**局部的**，遠處的關聯稀少到可以忽略或另外處理。這就是**稀疏注意力**的靈魂——別讓每個 token 看全部，只看鄰近的窗口，再挑幾個「全域重要」的 token 讓大家都能看到。\n\n第三招你在查詢優化裡親手用過：**改變運算順序，避開那個爆炸的中間結果**。`(A · B) · C` 和 `A · (B · C)` 算出來一模一樣（矩陣乘法有結合律），但如果中間的 `A · B` 是一個巨大的矩陣，你就會選另一種括號法，先算那個小的中間結果。你在 SQL 裡見過：先 filter 再 join，跟先 join 再 filter，結果相同但成本天差地遠。**線性注意力的核心招數，就是把 attention 的乘法重新加括號，避開那個 n×n 的中間矩陣。**\n\n在三步骨架裡，這兩條路各動哪一步？這是本章你最該帶走的一張定位圖：\n\n```text\n            ┌──────────┐   ┌────────────┐   ┌──────────────┐\n query ──►  │ 1. 打分  │─► │ 2. 正規化  │─► │ 3. 加權混合  │ ──► 輸出\n keys  ──►  │  score   │   │  softmax   │   │ weighted sum │\n values ─────────────────────────────────────────┘\n\n   ▸ 稀疏注意力：改「打分」的連結結構——只算一部分 token 對（local 窗口＋少數全域）\n   ▸ 線性注意力：改「正規化」——把 softmax 換成可拆開的核 φ(q)φ(k)ᵀ，再用結合律重排乘法順序\n```\n\n稀疏動「打分」的**連結結構**（哪些對要算）；線性動「正規化」的**形式**（用什麼函數把分數變權重）。第三步「加權混合」兩條路都沒換——還是「按權重對 value 做加權平均」。這是它們的共同點，也是為什麼它們仍然算「注意力」：三步骨架的骨還在，只是改了其中一根。\n\n## 第一條路：稀疏注意力——別讓每個 token 看全部\n\n先把問題量化。ch14 已經算過：序列長 n，標準 self-attention 要填滿一個 n×n 的注意力矩陣，每一格是一對 (query, key) 的相似度。n=1000 是一百萬格，n=100k 是一百億格。這一百億格裡，**真的有用的有多少？**\n\n直覺告訴你：不多。在一篇長文章裡，第 5000 個字跟第 3 個字之間有強關聯的機率很低；大部分的句法、指代關係都發生在**附近**（脊椎句子裡 it 指 animal，兩者只隔幾個字）。如果絕大多數遠距離的格子權重都接近 0，那把它們**全部算出來再發現它接近 0**，就是純浪費。稀疏注意力的賭注就是：**事先決定哪些格子根本不算，只填一部分。**\n\n問題變成：哪些格子留、哪些砍？這是稀疏注意力各個變體的全部分歧點。主流的切法有三種積木，混搭出不同方案：\n\n```text\n注意力矩陣（n×n），■=要算的對，·=砍掉不算\nquery↓ \\ key→\n\n(a) 局部窗口（local window）       (b) 全域 token（global）          (c) 隨機（random）\n    每個 query 只看左右 w 個鄰居        少數特殊 token 大家都能看        每個 query 額外看 r 個隨機位置\n  ■ ■ · · · · · ·                  ■ · · · · · · ■                ■ · · ■ · · · ·\n  ■ ■ ■ · · · · ·                  ■ ■ · · · · · ■                · ■ · · · ■ · ·\n  · ■ ■ ■ · · · ·                  ■ · ■ · · · · ■                · · ■ · · · ■ ·\n  · · ■ ■ ■ · · ·                  ■ · · ■ · · · ■                ■ · · ■ · · · ·\n  · · · ■ ■ ■ · ·                  ■ · · · ■ · · ■                · · ■ · ■ · · ·\n  · · · · ■ ■ ■ ·                  ■ · · · · ■ · ■                · ■ · · · ■ · ·\n  · · · · · ■ ■ ■                  ■ · · · · · ■ ■                · · · ■ · · ■ ·\n  · · · · · · ■ ■                  ■ ■ ■ ■ ■ ■ ■ ■                · · · · ■ · · ■\n  約 n·w 格（線性）                 全域那欄/列是滿的                 約 n·r 格（線性）\n```\n\n- **局部窗口（local window）**：每個 query 只跟它左右 w 個鄰居算分數。這直接編碼了「關聯多是局部的」這個歸納偏置（inductive bias，見 ch10）。格子數從 n² 降到約 n·w——**對固定的 w，這是線性的 O(n·w)**。\n- **全域 token（global token）**：純局部會有個明顯的洞——遠處的兩個 token 永遠互相看不到，全局資訊傳不過去。補法是指定少數「全域 token」（例如分類用的 `[CLS]`、或每隔一段放一個），讓**所有 token 都能看它、它也能看所有 token**。少數幾根「全域柱子」就能讓資訊在遠處之間中轉，代價只多 O(n) 格。\n- **隨機（random）**：再撒一些隨機連結，從圖論角度保證「任兩點之間有短路徑」（小世界性質），讓資訊傳遞的跳數不會太多。\n\n把這三種積木組合起來，就是 landscape 裡那幾個有名的方案（2026-06 查證）：\n\n| 方案 | 用了哪些積木 | 複雜度 | 出處 |\n|---|---|---|---|\n| **Sparse Transformer** | 固定模式：局部 + strided（每隔 l 個看一次），切給不同頭分工 | **O(n√n)** | Child et al. 2019 |\n| **Longformer** | 局部滑動窗口 + 任務指定的全域 token | **O(n)**（線性） | Beltagy et al. 2020 |\n| **BigBird** | 局部窗口 + 全域 + 隨機，三合一 | **O(n)**（線性） | Zaheer et al. 2020 |\n\nSparse Transformer（Child et al. 2019，作者群裡有 Radford 和 Sutskever）是這條路的開山之作，它的兩種稀疏模式（局部、跨步 strided）分給不同的注意力頭去負責，總複雜度 O(n√n)——還不是線性，但已經把平方咬掉一大塊。Longformer 和 BigBird（都是 2020）再進一步做到**線性**：Longformer 用「滑動窗口＋少數全域」，BigBird 加上隨機連結並從理論上證明這個稀疏模式仍保留足夠的表達力（它能逼近完整注意力，甚至圖靈完備——但這是「存在性」的保證，不代表實際訓練一定學得到）。\n\n**稀疏注意力動了三步骨架的哪一步？** 第一步「打分」的**連結結構**。它沒改打分的公式（還是內積 q·k）、沒改 softmax、沒改加權混合——它改的是「哪些對要進入打分」。被砍掉的格子，等同於把那些位置的分數設成 −∞（回收 ch11 遮罩的招數：softmax 前設 −∞，softmax 後就是 0），讓那些 value 在加權混合時權重歸零。**稀疏注意力就是一個事先畫好、固定的遮罩**——只是這次遮的不是「未來」，而是「太遠、賭它不重要」的對。\n\n## 第二條路：線性注意力——把乘法重新加括號\n\n稀疏這條路有個哲學上的不滿足：它**靠假設**砍格子（賭遠處不重要）。能不能不砍任何一對、所有對都「算到」，但總成本還是不要平方成長？這聽起來像吃免費午餐，但線性注意力真的端出了一盤——代價藏在別處（後面會抓出來）。\n\n它的關鍵洞察是回頭看 softmax 到底卡在哪。標準注意力（先忽略 √d 縮放，看結構）長這樣：\n\n```text\n標準注意力（一個 query 的視角）：\n\n         Σⱼ exp(q·kⱼ) · vⱼ\noutput = ─────────────────       ← 分子：以 exp(q·kⱼ) 為權重，對所有 value 加權和\n            Σⱼ exp(q·kⱼ)          ← 分母：權重總和（softmax 的正規化）\n```\n\n注意那個 **exp**。它把 q 和 k 死死綁在一起——`exp(q·kⱼ)` 沒辦法拆成「只跟 q 有關的部分」乘「只跟 kⱼ 有關的部分」。因為拆不開，你**被迫**先算出每一對的 `q·kⱼ`（這就是那個 n×n 矩陣），才能繼續。**exp 是 O(n²) 的元兇**，不是內積本身。\n\n線性注意力的招數：**把 exp(q·k) 換成一個能拆開的核函數** φ(q)·φ(k)。這裡 φ 是一個「特徵映射」（feature map），把向量變換一下，使得相似度能寫成「q 變換後」和「k 變換後」的內積。換掉之後：\n\n```text\n線性注意力（換掉 exp 為可拆的核 φ）：\n\n         Σⱼ [φ(q)·φ(kⱼ)] · vⱼ        φ(q)ᵀ · ( Σⱼ φ(kⱼ) vⱼᵀ )\noutput = ──────────────────────  =  ──────────────────────────\n            Σⱼ φ(q)·φ(kⱼ)              φ(q)ᵀ · ( Σⱼ φ(kⱼ) )\n                                              ▲\n                                    φ(q) 可以提到 Σ 外面！\n```\n\n關鍵就在那一步：因為 φ(q) 跟 j 無關，它可以**提到求和符號外面**。原本「對每個 query 都要重新跑一遍對所有 key 的求和」，變成「先把所有 key 的部分 `Σⱼ φ(kⱼ)vⱼᵀ` 算好一次，每個 query 來查的時候直接乘」。這個「先把 key 那邊聚合好」的中間量，是一個 **d×d 的小矩陣**（跟序列長 n 無關），不再是 n×n 的大矩陣。\n\n寫成整批矩陣形式，這正是「結合律重新加括號」：\n\n```text\n標準（O(n²)）：  output = softmax(Q Kᵀ) V       ← 先算 Q Kᵀ＝n×n 大矩陣（爆炸點）\n線性（O(n)）：   output ∝ φ(Q) · ( φ(K)ᵀ V )   ← 先算 φ(K)ᵀ V＝d×d 小矩陣（不含 n²）\n```\n\n`(QKᵀ)V` 和 `Q(KᵀV)` 算出來相等（矩陣乘法結合律，見《矩陣是動詞》ch06），但**括號位置決定了你要不要實體化那個 n×n 中間矩陣**。標準注意力的 softmax 把括號**鎖死**在 `(QKᵀ)` 那邊（exp 拆不開，沒得選）；線性注意力把 softmax 換成可拆的核，**解除了這個鎖**，於是你可以選 `(KᵀV)` 那邊先算——而 KᵀV 是 d×d，跟 n 無關。\n\n**線性注意力動了三步骨架的哪一步？** 第二步「正規化」。它把 softmax（exp 核）換成另一個核 φ(q)φ(k)ᵀ。打分還是某種相似度、加權混合還是加權平均，但「用什麼把分數變權重」這一步換了人——換成一個**能拆開、能讓你重排乘法順序**的函數。這是全章最該停下來想的一句：**O(n²) 不是內積的錯，是 softmax 那個 exp「拆不開」逼你先算大矩陣的錯；換一個拆得開的核，平方就消失了。**\n\nlandscape 裡這條路的三個代表（2026-06 查證）：\n\n| 方案 | 怎麼換 softmax | 出處 |\n|---|---|---|\n| **Transformers are RNNs** | 用 φ(x)=elu(x)+1 當核，直接套結合律，O(n²)→O(n) | Katharopoulos et al. 2020 |\n| **Performer** | 用隨機特徵（FAVOR+）**無偏估計** softmax 核本身——逼近真 softmax | Choromanski et al. 2020 |\n| **Linformer** | 假設注意力矩陣**低秩**，把 K、V 在序列維壓到 k×d（k≪n） | Wang et al. 2020 |\n\nKatharopoulos 的「Transformers are RNNs」是最直接的——它連 softmax 都不假裝逼近，直接挑一個簡單的 φ（elu+1）當核，然後吃結合律。論文標題的「are RNNs」是個漂亮的副產品：一旦寫成這個形式，自迴歸生成時那個 `Σ φ(kⱼ)vⱼᵀ` 可以**邊生成邊累加**（像維護一個 running state），於是線性注意力的生成過程**就是一個 RNN 的遞推**——固定大小的狀態、O(1) 每步。記住這個「壓進固定狀態」的影子，ch22 講 SSM/Mamba 時會發現它們是同一條線的延伸。\n\nPerformer 走另一條路：它不換掉 softmax 的語義，而是用隨機特徵去**逼近** exp 核本身（FAVOR+），所以它號稱「能估計真正的 softmax 注意力」。Linformer 則賭另一個假設——**注意力矩陣是低秩的**（rank 遠小於 n），所以把 K、V 沿序列方向投影到一個小維度 k 就夠了；這直接接上《矩陣是動詞》ch19–20 的低秩近似與 SVD：一個 n×n 但實際只有低秩結構的矩陣，可以用遠少於 n² 的數字逼近。\n\n## Worked example：用結合律數出「省在哪」\n\n抽象講了兩種乘法順序，現在動手數乘法次數，把「省」變成具體數字。我們不需要 softmax（線性注意力本來就拿掉它了），只看「先算哪個括號」對乘法量的影響。\n\n設序列長 n、維度 d。三個矩陣都是 n×d：Q、K、V。我們要算 `Q Kᵀ V`（線性注意力去掉正規化後的骨架）。數的是純量乘法的次數（一個 a×b 矩陣乘 b×c 矩陣要做 a·b·c 次乘法）。\n\n**路徑 A：先算 (QKᵀ)，再乘 V**（標準注意力的順序）\n\n```text\n步驟 1：Q Kᵀ      → (n×d)·(d×n) = n×n      乘法數 = n · d · n = n²·d\n步驟 2：(QKᵀ) V   → (n×n)·(n×d) = n×d      乘法數 = n · n · d = n²·d\n                                    ─────────────────────────────\n                                    合計 A = 2·n²·d      ← 含 n²，爆炸\n```\n\n**路徑 B：先算 (KᵀV)，再被 Q 乘**（線性注意力的順序）\n\n```text\n步驟 1：Kᵀ V      → (d×n)·(n×d) = d×d      乘法數 = d · n · d = n·d²\n步驟 2：Q (KᵀV)   → (n×d)·(d×d) = n×d      乘法數 = n · d · d = n·d²\n                                    ─────────────────────────────\n                                    合計 B = 2·n·d²      ← 只含 n 的一次方，線性\n```\n\n兩個結果**完全相等**（結合律保證），但成本差在 `n²·d` vs `n·d²`——也就是差在 **n vs d**。代進幾組數字：\n\n```text\n   n        d     A=2n²d（標準）        B=2nd²（線性）       A/B（>1 表示 B 較省）\n────
