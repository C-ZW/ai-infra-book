<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "思考的陷阱", "md": "# 思考的陷阱\n\n### 邏輯謬誤與認知偏誤的直覺與驚嘆\n\n> 謬誤不是愚蠢，是「在錯的脈絡用對的捷思」——而且你察覺不到自己正在犯。\n>\n> 這本書想讓你親身感受這一刀——並且能用自己的話，對另一個工程師講清楚：**為什麼大多數認知偏誤不是腦子壞了，而是一個對的捷思被錯置到不該用的脈絡，以及為什麼「察覺不到」本身，才是整本書真正的標靶。**\n\n---\n\n這是一本寫給資深後端工程師的謬誤與偏誤「欣賞」書。純興趣、和工作無關、純紙上推演——它不教你證明命題邏輯的完備定理、不要你跑任何程式、不給你一份「讀完就免疫」的偏誤清單。它只想帶你看懂一件反直覺的事：**你那顆天天做決定的腦袋，跑著一堆「夠快、夠省、平均夠好」的捷思，而大多數判斷錯誤不是因為你不夠聰明，是因為你在毫無感覺的情況下，把一個對的工具用在了錯的場合。**\n\n你其實已經在工作裡碰過這些陷阱的影子，只是沒人用這些名字跟你講過：確認偏誤式 debug——先有「一定是 DB」的假設、只翻支持的 log、繞遠路；alert fatigue 的數學——告警命中率高但真故障基率低，於是「收到告警時真有事」的機率低得反直覺；「改了 A 同時 B 好了」的因果歸因陷阱；估點被第一個人喊的數字錨住；回滾 vs 前進的損失感受不對稱；「這週沒出事所以該出事了」的維運迷信。這本書把這些工程直覺接上一個更大的故事。\n\n## 這本書怎麼讀\n\n- **純紙上推演**：每章的「紙上推演」是手填論證結構表、判斷有效性、口頭自答的思辨題，不是要你開終端機。所有數值示範一律攤在你眼前的 ` ```text ` 表裡。\n- **機制與脈絡優先**：每個偏誤先回答「它在解決什麼問題（捷思原本對在哪、省了什麼）」「它在哪個脈絡翻車」「為什麼當事人察覺不到」，再給名字。你不必背清單，你要理解機制。\n- **誠實是賣點**：本書有一章（ch17）專門誠實地說：這門研究人類偏誤的學問，自己也中了偏誤的招。ego depletion、power posing、社會促發、面部回饋、backfire effect——這些名研究在再現性危機裡的複製狀態，本書一條條標出來。\n- **講得出來才算過**：每章末的「自我檢核」是口頭題——對齊「能不能把這個偏誤的對的捷思/錯的脈絡講給另一個工程師聽」的深度。講得出來，才算真的懂了。\n\n## 一條脊椎貫穿全書\n\n整本書反覆回到**同一顆會反覆上當的大腦**，用雙系統透鏡一層一層重看：\n\n```text\n雙系統透鏡：System 1（快思）  vs  System 2（慢想）\n\n  S1：自動、平行、省力、永遠開著、給出「感覺對」的答案\n     工程橋接：cache 命中、熱路徑\n  S2：刻意、序列、費力、容易累、會偷懶把 S1 的答案放行\n     工程橋接：冷路徑、慢查詢、人工覆核\n\n  認知偏誤 = S1 跑了一個捷思 → S2 沒攔下來 → 錯置到不該用的脈絡\n  形式謬誤 = 推論的「邏輯結構」本身無效（與內容、捷思無關）\n            → S1 憑「聽起來合理」就放行 → S2 沒做結構檢查\n```\n\n中央張力（全書反覆叩問的那句話）：**謬誤不是愚蠢，是「在錯的脈絡用對的捷思」——而且你察覺不到自己正在犯。**\n\n## 全書地圖\n\n```text\n全書地圖：一顆跑著捷思的大腦，如何在錯的脈絡反覆上當——而它察覺不到\n\n  Part I  那台機器 ............... 雙系統與「你察覺不到」\n     ch01 腦裡的快與慢（雙系統登場）\n        |\n        v\n  Part II  對的工具用錯場合 ....... 三大捷思\n     ch02 捷思：省力的代價（捷思總論）\n     ch03 可得性：想得到就以為常見\n     ch04 代表性與錨定：像不像、第一個數字\n        |\n        v\n  Part III  結構壞了 ............. 形式謬誤\n     ch05 肯定後件與否定前件\n     ch06 有效不等於為真（有效性 vs 健全性）\n        |\n        v\n  Part IV  脈絡壞了 ............. 非形式謬誤目錄\n     ch07 攻擊型：稻草人・人身・訴諸權威\n     ch08 結構型：假兩難・滑坡・循環・不當類比（含哥德爾濫用）\n     ch09 語言與統計型：模稜兩可・德州神槍手・相關當因果\n        |\n        v\n  Part V  機率直覺崩壞 .......... 人對隨機最不可靠\n     ch10 基率忽視（機制指向《馴服隨機》）\n     ch11 合取謬誤：Linda 與「更具體反而更可能」\n     ch12 賭徒謬誤與小數法則（熱手 2018 翻案）\n        |\n        v\n  Part VI  我想要・我看到・誠實 .. 動機、框架、再現性、收官\n     ch13 確認偏誤與動機性推理\n     ch14 框架效應與損失趨避（規範面指向《決策》）\n     ch15 社會偏誤與從眾\n     ch16 記憶與後見之明\n     ch17 再現性危機：哪些偏誤沒站穩（呼應《科學方法》）\n     ch18 去偏誤：能做到什麼、做不到什麼\n     ch19 偏誤盲點：你對自己最瞎\n     ch20 同一顆大腦，現在你懂它七層（收官）\n\n  附錄 A 記號與術語速查　附錄 B 詞彙表　附錄 C 閱讀地圖\n```\n\n## 書架上的鄰居\n\n這本書只用自己的欣賞聲音講「為何反直覺、捷思如何在錯的脈絡翻車」；遇到它的鄰書主場時，它點到為止、把你指過去，而不是重講一遍：\n\n- 機率機制（基率、貝氏更新、合取律證明、大數法則的稀釋機制、回歸均值的統計推導）→《馴服隨機》\n- 規範基準（理性上該怎麼選、期望效用、展望理論的數學、沉沒成本規範理由）→《在不確定中下注》（叢集姊妹書）\n- 制度防線（科學如何防自欺、對照實驗、預先註冊、p-hacking 機制、複製率方法論）→《如何不騙自己：科學方法》（叢集姊妹書）\n- 哥德爾定理的精確陳述與條件（本書只給哥德爾濫用的「為何是濫用」）→《這句話無法被證明》（叢集姊妹書）\n- 策略情境下的非理性公平偏好（本書只點到為止）→《當理性互相碰撞》（叢集姊妹書）\n\n這五本書加上本書，構成「理性三角」與「推理六書」叢集：本書管心理機制（人怎麼錯）、科學方法管制度防線（怎麼防自欺）、決策書管規範基準（正確答案是什麼）。三角的三個角，各管各的地盤。\n\n## 給誰讀\n\n唯一讀者：一位 6 年以上的資深後端工程師。你不需要任何邏輯學或心理學背景——你需要的直覺，確認偏誤式 debug、alert fatigue、postmortem 歸因、sunk cost、回滾的損失感早就教會你了。本書把這些工程經驗當錨點，從「這台機器為什麼這樣判斷」起步，一路帶你看到「這門學問自己也中了招」。\n\n準備好了，就從 **ch01 — 腦裡的快與慢：你察覺不到的那個答主** 開始。你的直覺正準備在接下來每一章騙你一次——而你偏偏不會有感覺。這正是值得你停下來、慢慢讀的地方。\n"}, {"id": "ch01-fast-and-slow", "file": "ch01-fast-and-slow.md", "group": "Part I — 那台機器", "title": "ch01 — 腦裡的快與慢：你察覺不到的那個答主", "md": "# ch01 — 腦裡的快與慢：你察覺不到的那個答主\n\n> **本章解決什麼問題**：這是全書的起點，也是把整本書釘在地上的那根脊椎。我要先把一個你以為自己很懂、其實沒認真想過的問題擺在你面前——你做判斷時，到底是「誰」在回答？答案會讓你坐立難安：大多數時候不是你以為的那個深思熟慮的你，而是一個跑得飛快、永遠開著、給你「感覺對」答案的自動歷程，而你**察覺不到它正在替你回答**。本章把這個框架（雙系統，dual-process）立起來，講清楚它是什麼、不是什麼，並用一道你大概也會答錯的題目讓你親眼看見那個搶答的傢伙。後面十九章——三大捷思、形式謬誤、非形式謬誤、機率直覺崩壞、動機與框架、再現性危機——全都是在這同一顆腦袋上反覆套用這一章的透鏡。\n\n```text\n全書地圖：一顆跑著捷思的大腦，如何在錯的脈絡反覆上當——而它察覺不到\n\n  Part I  那台機器 ............... 雙系統與「你察覺不到」 ◄ 你在這裡\n     ch01 腦裡的快與慢（雙系統登場）\n        │\n        ▼\n  Part II  對的工具用錯場合 ....... 三大捷思\n     ch02 捷思：省力的代價（捷思總論）\n     ch03 可得性：想得到就以為常見\n     ch04 代表性與錨定：像不像、第一個數字\n        │\n        ▼\n  Part III  結構壞了 ............. 形式謬誤\n     ch05 肯定後件與否定前件\n     ch06 有效不等於為真（有效性 vs 健全性）\n        │\n        ▼\n  Part IV  脈絡壞了 ............. 非形式謬誤目錄\n     ch07 攻擊型：稻草人・人身・訴諸權威\n     ch08 結構型：假兩難・滑坡・循環・不當類比（含哥德爾濫用）\n     ch09 語言與統計型：模稜兩可・德州神槍手・相關當因果\n        │\n        ▼\n  Part V  機率直覺崩壞 .......... 人對隨機最不可靠\n     ch10 基率忽視（機制指向《馴服隨機》）\n     ch11 合取謬誤：Linda 與「更具體反而更可能」\n     ch12 賭徒謬誤與小數法則（熱手 2018 翻案）\n        │\n        ▼\n  Part VI  我想要・我看到・誠實 .. 動機、框架、再現性、收官\n     ch13 確認偏誤與動機性推理\n     ch14 框架效應與損失趨避（規範面指向《決策》）\n     ch15 社會偏誤與從眾\n     ch16 記憶與後見之明\n     ch17 再現性危機：哪些偏誤沒站穩（呼應《科學方法》）\n     ch18 去偏誤：能做到什麼、做不到什麼\n     ch19 偏誤盲點：你對自己最瞎\n     ch20 同一顆大腦，現在你懂它七層（收官）\n```\n\n這張圖你會在每個 Part 的開頭再看到一次，「你在這裡」會往前移。整本書要交給你六樣東西，現在先列出來，讀完每一章你都可以回頭打勾：① **謬誤＝錯置的捷思**——每個偏誤都能指出「它原本對在哪個脈絡、在哪個脈絡翻車」，不是「人類很笨」；② **雙系統透鏡**——能用快慢兩種歷程解釋一個偏誤從哪一步生出來；③ **形式 vs 非形式謬誤的分界**——形式謬誤錯在結構、與內容無關，非形式謬誤要靠重建論證才抓得到；④ **機率直覺的系統性崩壞**——人對隨機的直覺在哪裡、為什麼壞；⑤ **察覺不到本身才是核心**——你對自己的偏誤偵測力最差；⑥ **誠實＝這門學問自己的偏誤**——再現性危機重創了一批名研究，本書要把「哪些站穩、哪些沒站穩」誠實標出。本章先把①②⑤的地基打好。\n\n## 從你已知的出發\n\n你其實已經天天在用雙系統了，只是沒人用這個名字跟你講過。它的名字在你的系統架構圖上：**快取**。\n\n回想你查一個值的兩條路徑。\n\n第一條：`cache.get(key)` 命中。幾微秒就回來，沒有運算、沒有 I/O、沒有思考。你信任它，因為它「以前算過、現在直接拿」。這條路徑永遠開著，每個請求都先走它，它平均夠快、平均夠準。這就是**系統一**（System 1）：自動、平行、省力、永遠在線、給你一個「感覺對」的答案。\n\n第二條：cache miss。現在你得走冷路徑——查 DB、跑那個慢查詢、做那串運算，可能還要等鎖。它慢、它累、它佔資源，所以你能不走就不走。這就是**系統二**（System 2）：刻意、序列、費力、容易累。\n\n到這裡都還是工程隱喻，沒什麼可怕的。可怕的是下一句，請你停下來真的想十秒：\n\n**你的系統二，預設是相信系統一給的快取答案的。** 它懶得每次都去冷路徑覆核。大多數時候快取是對的，這個「預設放行」省下海量運算，是理性的設計。但這也意味著——**只要系統一往快取塞了一個錯的值，系統二多半不會發現，因為它根本沒去算。** 而你，作為「整個系統」，會把那個快取答案當成「我想出來的答案」輸出，完全感覺不到中間發生過一次未經驗證的快取命中。\n\n這就是這本書的中央張力，第一次亮相：\n\n> **謬誤不是愚蠢，是「在錯的脈絡用對的捷思」——而且你察覺不到自己正在犯。**\n\n你天天信任快取，因為它平均夠好。但你也知道快取會 stale、會髒、會在你最沒防備的時候回一個過期的值。你腦裡那個快取也一樣，差別只在於：對程式碼你會寫 cache invalidation，對自己的判斷你連「剛剛走的是快取還是冷路徑」都分不出來。\n\n本章接下來要做三件事：把這個快慢兩歷程的框架講精確（並誠實說它哪裡是隱喻、不能當真）；給你看一道題，讓你親眼抓到系統一搶答、系統二放行的現場；然後告訴你，為什麼「察覺不到」這件事本身，才是整本書真正的標靶。\n\n## 兩個歷程，不是兩個小人\n\n先把名詞釘死。心理學裡這套框架叫**雙系統理論**（dual-process theory），把人的認知分成兩類歷程：\n\n```text\n系統一（System 1）                  系統二（System 2）\n─────────────────────────────────   ─────────────────────────────────\n快                                  慢\n自動、不請自來                       刻意、要你主動發動\n平行（很多事同時跑）                  序列（一次一件）\n省力、幾乎不耗「心力」                 費力、會累、耗注意力資源\n永遠開著、關不掉                      容易偷懶、預設不發動\n給「感覺對」的答案                    能算出「正確」的答案（如果你逼它）\n工程橋接：快取命中、熱路徑             工程橋接：cache miss、冷路徑、人工覆核\n```\n\n幾個例子讓它具體。系統一：你看到 `2 + 2`，腦裡直接蹦出 `4`，你沒有「計算」的感覺。你聽到母語的一句髒話會臉一沉，不需要查字典。你瞄一眼同事的表情就知道他今天不對勁。這些答案來得太快、太順，順到你以為它們不算「想」。\n\n系統二：`17 × 24` 等於多少？除非你是少數人，否則你得真的停下來、調動注意力、一步一步算。你會感覺到「我正在費力」。在算的當下你大概沒辦法同時平行停車或聽懂別人講話——系統二是序列的、會把頻寬吃光。\n\n這套框架的詞源，這裡要誠實一點，因為它常被講錯。「系統一／系統二」這對術語**不是康納曼（Daniel Kahneman）發明的**——是史塔諾維奇（Keith Stanovich）與韋斯特（Richard West）2000 年的論文先用這對命名，而雙歷程的想法本身更早就有了。康納曼 2011 年的《Thinking, Fast and Slow》把它**普及**到全世界，但他自己在書裡就講明這對術語是借來的（2026-06，依本書事實基準）。我特地點出這件事，不是為了學究，而是因為**這本書從第一頁就要示範它自己要求的那種誠實**：歸屬、年份、誰先誰後，能查就查、能標就標。\n\n現在講最重要、也最常被講壞的一件事——**這是隱喻，不是解剖**。\n\n## 「系統一／系統二」不是腦裡真有兩個系統\n\n你是工程師，你對「系統」這個詞有肌肉反應：系統是個模組，有邊界、有介面、跑在某個地方。所以「系統一／系統二」這對命名對你特別危險，它會誘你腦補出一張架構圖：腦裡有兩塊區域，一塊負責快、一塊負責慢，像兩個 microservice 在那邊 RPC。\n\n**沒有這回事。** 這是全書第一個、也是最容易被忽視的「直覺的陷阱」，我先在這裡點破，等等的「直覺的陷阱」段會把它收成具名陷阱：\n\n「系統一／系統二」是**教學用的隱喻**，描述「快而自動」與「慢而費力」兩**類歷程**（process），不是兩個解剖實體，不對應固定腦區，腦裡沒有兩個小人在搶麥克風。學界（Evans 與 Stanovich 2013）後來甚至改用更冷的措辭「Type 1 歷程／Type 2 歷程」，就是為了戒掉「兩個系統」這個說法害人實體化（reify）的副作用。康納曼本人在書裡也說，把它寫成兩個會說話、有性格的角色，是一種「方便的擬人化」，不是字面主張（2026-06，依本書事實基準）。\n\n那為什麼還用「系統一／系統二」？因為它好教、好記、好把一整類現象掛上去。本書全程用「系統一／系統二」當透鏡，**但你每次讀到它，心裡要同時掛著這條註腳**：這是一具好用的鷹架，不是腦的真實接線圖。把它當真，你會犯下這本書要教你抓的那種錯——把一個「在某個脈絡好用的近似」當成「字面為真的事實」，然後在它不適用的地方繼續用。是不是有點熟悉？這正是全書中央張力的形狀，連這套框架自己都逃不掉。\n\n## 省力預設放行：大多數偏誤的生產線\n\n把雙系統當鷹架之後，我們就能講清楚這本書後面十九章在講的那一整類錯，是從哪條生產線出來的。\n\n機制只有三步，我把它畫成一條管線：\n\n```text\n       一個判斷送進來\n            │\n            ▼\n   ┌───────────────────┐\n   │ 系統一（快取查詢）│  自動觸發，幾乎零成本\n   │ 跑一個捷思        │  「這像不像？」「好不好想起來？」\n   └───────────────────┘\n            │\n            ▼\n       「感覺對」的答案\n            │\n            ▼\n   ┌───────────────────┐\n   │ 系統二（要不要算）│  預設：偷懶、不發動\n   └─────┬───────┬─────┘\n         │       │\n         ▼       ▼\n       放行     介入（少數）\n         │       │\n         ▼       ▼\n   直接輸出   冷路徑覆核\n   （可能錯） （慢、費力）\n```\n\n注意這條線的預設走向：系統一給答案 → 系統二**懶得攔** → 直接輸出。大多數時候這條捷徑省下大量力氣、答案也夠好。但**認知偏誤**（cognitive bias）就誕生在這裡：\n\n> **認知偏誤 ＝ 系統一跑了一個捷思 → 系統二沒攔下來 → 那個捷思被錯置到不該用的脈絡。**\n\n關鍵字是「**錯置**」。系統一跑的那個捷思（heuristic，本書統一用「捷思」，啟發法是它的別譯）本身往往是個**對的工具**——它在它演化出來、平常適用的環境裡，又快又省又準。偏誤不是「腦子壞了」，是「對的工具用錯了場合」。後面三章（ch02–04）會把三個最重要的捷思——可得性、代表性、錨定——一個一個拆給你看，每個都先回答「它原本對在哪、在哪翻車」，再給名字。\n\n這裡要先立一塊**很重要的界碑**，因為它是全書的概念骨架，混了就全亂了：\n\n**不是每一種思考陷阱都是「錯置的捷思」。** 這本書收兩類機制**完全不同**的陷阱：\n\n```text\n兩類思考陷阱（機制不同，別混為一談）\n\n  認知偏誤（捷思在錯場合誤觸發）\n     成因：系統一跑了一個「對的捷思」，被錯置到不該用的脈絡\n     例子：可得性、代表性、錨定、基率忽視、確認偏誤、框架……\n     雙系統怎麼回扣：哪個捷思在系統一跑、原本對在哪、在哪翻車\n\n  形式謬誤（邏輯結構本身無效）\n     成因：推論的「邏輯形式」無效，與內容無關、也不是某個捷思被錯置\n     例子：肯定後件、否定前件（見 ch05）\n     雙系統怎麼回扣：只解釋「為何系統一覺得無效推論看起來合理」\n                    （系統一對邏輯形式不敏感，憑表面合理度放行）\n                    ——而不是硬說它是某個捷思\n```\n\n我在第一章就把這條界碑插下去，是因為它太容易被踩平。Part III（ch05–06）講形式謬誤時，你會很想用「這是一個用錯場合的捷思」去解釋肯定後件為什麼錯——**不要**。肯定後件之所以無效，是因為「P→Q 為真，看到 Q 就斷定 P」這個**推論形式本身**不保真，跟你用了哪個捷思、跟句子講的是什麼內容，一點關係都沒有。雙系統在那裡能解釋的，只有「為什麼這種無效推論**看起來**那麼順、那麼合理，順到系統二懶得做結構檢查就放行了」。捷思語言只能用在「為何人感覺它有效」這一面，不能用在「它為何無效」那一面。這個分界本身就是本書六條主線之一（主線③），ch05/ch06 會點明、ch20 收官會回收。\n\n現在你手上有了整本書的引擎圖：一台跑著捷思的快取（系統一），加一個預設偷懶的覆核器（系統二），加一條「省力放行」的預設路徑。十九章的各種錯，要嘛是這條線上某個捷思被錯置（偏誤），要嘛是系統二該做的結構檢查被系統一的表面合理度蓋過（形式謬誤）。\n\n## 抓現行犯：一道你大概也會答錯的題\n\n光講機制不過癮。我要給你看一次系統一搶答、系統二放行的**現場**，而且最好是你**自己**身上的現場——這樣你才會信。\n\n這道題叫「球棒與球」，是 Frederick 在 2005 年提出的「認知反思測驗」（Cognitive Reflection Test, CRT）裡最有名的一題（發表於《Journal of Economic Perspectives》19(4):25–42，2026-06 已查證）。題目是：\n\n```text\n一支球棒和一顆球，合計 1.10 美元。\n球棒比球貴 1.00 美元。\n請問：球多少錢？\n```\n\n先別往下看，給你自己三秒。記住那個「蹦出來」的數字。\n\n我幾乎可以肯定你（或你旁邊任何人）腦裡蹦出的第一個答案是：**球 0.1 元（10 美分）**。這個答案來得又快又順，順到你會覺得「這還用算嗎」。\n\n它是錯的。我們把系統二發動一次，逐步覆核——不跳步：\n\n```text\n假設「球 ＝ 0.1 元」成立，反代回去檢查：\n  球        ＝ 0.10\n  球棒比球貴 1.00  →  球棒 ＝ 0.10 + 1.00 ＝ 1.10\n  合計      ＝ 球 + 球棒 ＝ 0.10 + 1.10 ＝ 1.20   ✗ 不是 1.10！\n\n所以 0.1 是錯的。正確解，設球 ＝ x：\n  球    ＝ x\n  球棒  ＝ x + 1.00          （比球貴 1 元）\n  合計  ＝ x + (x + 1.00) ＝ 1.10\n        ＝ 2x + 1.00       ＝ 1.10\n        ＝ 2x              ＝ 0.10\n        ＝ x               ＝ 0.05\n\n驗算（一定要回代）：\n  球    ＝ 0.05\n  球棒  ＝ 0.05 + 1.00 ＝ 1.05\n  合計  ＝ 0.05 + 1.05 ＝ 1.10   ✓\n  且球棒比球貴：1.05 − 0.05 ＝ 1.00   ✓\n\n正確答案：球 ＝ 0.05 元（5 美分）。\n```\n\n球是 5 美分，不是 10 美分。Frederick 的原始研究裡，連名校（如普林斯頓、哈佛、麻省理工）的學生都大量答錯這題；一個常被引用的概數是，只有大約三成的大學生第一次就答對（2026-06，這是「某次研究的概數」，不是鐵打的常數，會隨樣本與母群不同）。\n\n現在來拆現場，這是本章的 worked example，把雙系統怎麼出錯一格一格對帳：\n\n```text\n球棒與球：雙系統現場對帳\n\n  時刻        系統一（快取）            系統二（覆核器）         結果\n  ─────────   ──────────────────────    ─────────────────────    ────────\n  讀到題目    自動解析「1.10、貴 1.00」                          \n  ~1 秒       捷思：「1.10 拆成              （還沒發動）          蹦出「0.1」\n              1.00 ＋ 0.10」太順手                              ＝快取命中\n  ~1 秒後     輸出「0.1」、附帶              預設：偷懶不算       多數人到此\n              一種「這很簡單」的感覺          → 放行              就交卷了 ✗\n  （若你停）                                被「太簡單」感        發現 1.20≠1.10\n                                            騙過、勉強發動        → 回頭算出 0.05 ✓\n```\n\n看懂這張表，你就看懂了整本書。出錯不在「你不會解二元一次」——你當然會，那是國中數學。出錯在**系統一塞了一個快取值（0.1），還附贈一種「這題很簡單」的流暢感，而那種流暢感正好關掉了系統二的警報**。Frederick 的研究裡有個細節特別誅心：答錯的人，普遍覺得這題**比較簡單**——也就是說，他們不只答錯，還**沒有任何「我可能錯了」的感覺**。\n\n這就是「察覺不到」的純粹標本。不是你笨（你會算），是那個搶答的傢伙跑得比你的警覺快，而且它順手把警報線也剪了。你不會有「我剛剛走了快取」的感覺，你只會有「這答案是我想出來的」的感覺。\n\n## 為什麼「察覺不到」才是真正的標靶\n\n我想把這一節寫得慢一點，因為這是整本書最讓人坐立難安的地方，而你的直覺正要在這裡騙你，你不會有感覺。\n\n如果偏誤是那種「你犯了當下就知道、事後一拍腦袋就能改」的錯，這本書根本沒必要存在——你自己會修。偏誤之所以是個真問題，恰恰因為它**對內隱形**：\n\n- 系統一的運算對你**不可見**。你拿到的只有輸出（那個感覺對的答案），拿不到「它怎麼算出來的」。所以你無法事後審計自己的快取查詢。\n- 系統一附贈的那股**流暢感**（fluency）會偽裝成「正確感」。答案越好想、越順口，你越覺得它對——這正是 ch03 可得性捷思的核心機制，這裡先埋一個引信。\n- 系統二的偷懶**也是隱形的**。它沒發動的時候，不會跳出一個「警告：本次未覆核」的 log。你感覺不到一次缺席的覆核，就像你感覺不到一個沒觸發的 alert。\n\n把這三點疊起來，你會得到一個不太舒服的結論：**對你自己的判斷，你沒有觀測性（observability）。** 你能 review 別人的 PR、一眼看出別人 debug 時的確認偏誤、看穿別人估時的盲目樂觀——但對自己同一套錯誤，你幾乎全盲。這個不對稱有個名字叫**偏誤盲點**（bias blind spot），是 ch19 的主角，也是全書中央張力的最終形態：你對自己最瞎。\n\n所以這本書真正能交給你的，**不是**「讀完就不再上當」——那是騙人的，ch18（去偏誤）會誠實告訴你光「知道有這個偏誤」幾乎不能讓你免疫。它能交給你的是別的東西：**一套有名字、有結構、可預期的故障模式清單**，讓你在事後（或運氣好的話，在事中）能認出「啊，我剛剛大概又走了快取」。你還是會上當，但你會知道大概在哪裡上當——就像你修不掉所有 bug，但你能在最容易出事的地方架 monitoring、加護欄、上 checklist。本書的最後一個 Part（尤其 ch18）整章在講這件事：去偏誤的真實邊界是「降低頻率、設護欄」，不是「根除」。\n\n這也順帶解釋了本書為什麼**還要**收一類根本不是捷思的陷阱——形式謬誤（ch05–06）。因為「系統一憑表面合理度放行、系統二沒做結構檢查」這個故障模式，不只會讓對的捷思被錯置，也會讓**無效的推論形式**蒙混過關。同一台機器、同一條省力放行的路徑，製造出兩類不同的錯。把這兩類分清楚，是你讀懂後面所有章節的前提。\n\n## 直覺的陷阱\n\n這一段是本書的招牌：把這個概念**最常被誤解成什麼**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**攤開。本章只有一個核心概念（雙系統），但它有一個極具體、極常見的具名陷阱。\n\n```text\n具名陷阱 T1：「腦裡真的有兩個系統各管一塊」（雙系統實體化謬誤）\n\n  大眾版（錯）          系統一、系統二是腦裡兩個獨立模組／兩塊腦區，\n                       像兩個 microservice，一個管直覺一個管理性。\n  ─────────────────────────────────────────────────────────────\n  正確版               「系統一／系統二」是教學隱喻，描述「快自動」\n                       與「慢費力」兩『類歷程』，不是解剖實體、不對應\n                       固定腦區、腦裡沒有兩個小人。學界（Evans &\n                       Stanovich 2013）已改用「Type 1／Type 2 歷程」\n                       以戒掉實體化；康納曼自己也說那是方便的擬人化。\n  ─────────────────────────────────────────────────────────────\n  錯誤直覺在哪一步      你是工程師，「系統」一詞讓你自動腦補出有邊界、\n  帶你下溝              有介面、跑在某處的模組——於是把一具教學鷹架\n                       讀成了一張架構圖。\n  ─────────────────────────────────────────────────────────────\n  怎麼自我察覺          當你開始問「系統一在腦的哪個部位？」「能不能\n                       關掉系統一只用系統二？」——這兩個問題本身就是\n                       警報：你正在把隱喻當解剖。正確的問法是「這個\n                       判斷比較像快自動歷程、還是慢費力歷程？」\n```\n\n第二個、更微妙的陷阱，是把雙系統**價值化**：以為「系統一＝壞、系統二＝好，要盡量多用系統二」。錯。系統一是你絕大多數時候賴以為生的快取，它讓你不必為了過馬路、認人臉、聽懂母語而每次都跑一遍冷路徑——那會把你累垮、也不可能。系統二既慢又會累，全靠它你寸步難行。本書的目標**不是**叫你「凡事多想」（那既做不到也沒必要），而是讓你認得**哪些特定脈絡**下系統一會給你一個自信滿滿的錯答——那些才是值得你刻意發動系統二、走一趟冷路徑的地方。「對的捷思／錯的脈絡」這條判讀法，ch02 會正式教。\n\n最後一個要守住的誠實邊界：**雙系統是一個有爭議、有局限的框架，不是定論。** 它好用、能掛很多現象，但它不是腦科學的最終真理，學界對「到底是兩類、還是一個連續譜」仍有討論（2026-06）。我用它當整本書的鷹架，是因為它對「把偏誤組織起來、講給你聽」這個目的夠用——但「夠用的鷹架」和「字面為真」是兩回事，這個分寸，正是本書反覆要你練的那一個。\n\n## 紙上推演\n\n全書純紙上推演，不放任何要你去跑的程式碼。下面這幾題請拿紙筆、或至少在腦中走完整步驟，再看解答。\n\n---\n\n**推演題 1（★，[10 分鐘]）—— 用自己的話定義快與慢，並各舉一個你工作中的例子**\n\n不准照抄本章的表格。用你自己的話，分別描述系統一與系統二的核心特徵，然後從你的後端工作裡，各舉**一個具體**例子：一件「靠系統一、自動就會的事」，一件「非得發動系統二、慢慢算的事」。要求：例子要具體到能讓另一個工程師立刻懂，不能是「寫程式」這種泛泛的。\n\n---\n\n**推演題 2（★★，[15 分鐘]）—— 還原一次你「直覺答錯、停下來算才對」的現場**\n\n找一個你**真的經歷過**的時刻：你對某件事（一個估時、一個容量計算、一個 bug 的成因、一個百分比）脫口給了一個答案，後來停下來算、才發現第一個答案是錯的。把它寫成本章那張「雙系統現場對帳」的格式：系統一蹦出了什麼、附帶什麼「感覺」、系統二本來該在哪一步攔、為什麼沒攔。重點不在那題本身，在**還原「系統一搶答 + 系統二放行」這條路徑**。\n\n---\n\n**推演題 3（★★，[15 分鐘]）—— 把球棒與球的陷阱「移植」到一道新題**\n\n球棒與球之所以能騙人，是因為「1.10 拆成 1.00 ＋ 0.10」太順手，剛好誘出一個錯答。請你**自己設計**一道結構類似的題：一個正確答案不難算、但會自動誘出一個「順手卻錯」的直覺答案的題目。寫出題目、那個誘人的錯答、正確答案、以及「為什麼系統一會掉進那個錯答」。（提示：找一個「表面上可以直接相減／相除、但其實藏了一層」的結構。）\n\n---\n\n### 推演解答\n\n**第 1 題解答。** 標準不在於用詞多漂亮，而在於你有沒有抓到**對的特徵維度**。系統一的關鍵特徵至少要點到：快、自動（不請自來）、省力、永遠開著、給「感覺對」的答案。系統二至少要點到：慢、刻意（要主動發動）、費力會累、序列（一次一件）、能給「正確」答案但你得逼它。\n\n好的工作例子（示範，不是唯一解）——系統一：「我掃一眼 log 的時間戳分布，不用細讀就『感覺』到這波請求是凌晨那台 cron 打的」（模式辨識，自動、瞬間）。系統二：「我要算這個新 endpoint 在尖峰每秒能不能扛住——QPS × 每請求的 DB 往返 × 平均延遲，一項一項列出來估」（費力、序列、要主動算）。**常見錯路**：把例子舉成「系統一＝簡單的事、系統二＝難的事」。錯。區分不是「難易」，是「**自動冒出來 vs 要主動發動**」。認一張熟人的臉對系統一毫不費力卻是極複雜的運算；`17 × 24` 對系統二很費力卻是小學數學。難易和快慢不是同一個軸。\n\n**第 2 題解答。** 這題沒有標準答案，但有「做對了」的徵兆。一個合格的還原，必須明確標出**那股「感覺」**——系統一搶答時，幾乎一定附贈一種情緒色彩：「這很簡單」「這明顯是 X」「不用想」。那股流暢感正是關掉系統二警報的東西。如果你的還原裡只有「我答錯了、後來算對了」，卻說不出當時那個錯答**為什麼感覺對**，代表你還沒抓到重點——重點不是錯誤本身，是**錯誤被一種正確感包裹著、所以你當下沒有任何要覆核的理由**。**常見錯路**：把它寫成「我當時粗心」。粗心是個沒有解釋力的標籤，它把問題推給「下次更小心」（ch18 會說這幾乎沒用）。雙系統的解釋更精確、也更有用：不是你不小心，是系統一給了一個帶著流暢感的快取值，而流暢感本身就是「不必覆核」的訊號——你被那個訊號正確地騙過了。\n\n**第 3 題解答。** 評分看你有沒有抓到「球棒與球」的**陷阱結構**：題目要長得像「可以一步直接算」，但正確解其實多藏了一層，而那「少算的一層」剛好是系統一會跳過的。一個示範（自製，不必跟你的一樣）：\n\n```text\n誘人錯題示範\n\n  題目：一個服務的請求，1% 會逾時。你重試一次（獨立）。\n        兩次都逾時的機率是多少？（假設兩次獨立、各 1%）\n  ─────────────────────────────────────────────────────\n  順手的錯答：很多人會脫口「2%」（把兩個 1% 加起來），\n              或「1%」（覺得重試了應該差不多）。\n  ─────────────────────────────────────────────────────\n  正確答案：兩次都逾時 ＝ 0.01 × 0.01 ＝ 0.0001 ＝ 0.01%。\n            （獨立事件的「都發生」是相乘，不是相加。）\n  ─────────────────────────────────────────────────────\n  系統一為何掉進去：「兩次」這個詞誘出「把兩個數合起來」的\n            動作，而「合起來」在系統一的快取裡預設是「相加」。\n            它沒去問「該乘還是該加」——那一步要系統二發動。\n```\n\n注意這題的機率計算只是順帶——它的**演算法**（為什麼獨立事件相乘）屬於《馴服隨機》的地盤，那本書會把機率公理講透；這裡我只借它的結構來示範「系統一跳過一層」的陷阱。**常見錯路**：設計出一道「單純很難」的題（例如要算三重積分）。那不是陷阱題——難題會讓系統二**老老實實發動**，不會被快取偷渡。陷阱題的精髓是**看起來簡單到不值得算**，那股「不值得算」的流暢感，才是它的武器。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關，講不清楚就是還沒懂。優先回答「為什麼」。\n\n1. 用快取／冷路徑的比喻，跟另一個工程師講清楚：系統一和系統二各對應哪一條路徑？為什麼說「系統二預設相信系統一的快取答案」是大多數偏誤的生產線？\n2. 「系統一／系統二」是隱喻、不是腦裡真有兩個系統——為什麼這個分寸對你（一個會把『系統』讀成模組的工程師）特別重要？把它當真會讓你犯下什麼錯？\n3. 球棒與球這題，多數人答錯的**真正原因**是什麼？（提示：不是「不會算」。）那股「這題很簡單」的感覺，在出錯機制裡扮演什麼角色？\n4. 本書明確區分兩類陷阱：認知偏誤 vs 形式謬誤。它們的機制差在哪？為什麼**不能**把肯定後件（一個形式謬誤）講成「一個用錯場合的捷思」？\n5. 為什麼說「察覺不到」才是這本書真正的標靶，而不是「人會犯錯」本身？如果偏誤是你犯了當下就知道的錯，這本書還有存在的必要嗎？\n6. 「系統一＝壞、系統二＝好，要盡量多用系統二」——這句話錯在哪？本書的目標如果不是「凡事多想」，那是什麼？\n7. （進階）你對別人的偏誤一眼看穿、對自己的卻全盲。用本章的「對自己的判斷沒有觀測性」這個說法，解釋這個不對稱為什麼會發生。\n\n## 延伸閱讀\n\n- **Daniel Kahneman, _Thinking, Fast and Slow_（2011）**——這套雙系統透鏡的普及之作，本書整本的鷹架來源。讀第一部（Part I, \"Two Systems\"）就夠你把本章吃透；球棒與球也在裡面。記得帶著本章的誠實邊界讀：它是好用的隱喻，作者自己也這麼說。\n- **Shane Frederick, \"Cognitive Reflection and Decision Making\"，_Journal of Economic Perspectives_ 19(4):25–42（2005）**——球棒與球的原始出處，認知反思測驗的源頭。值得看它怎麼用三道短題量化「系統二願不願意發動」，以及答錯者為何覺得題目更簡單。\n- **Keith Stanovich & Richard West, \"Individual differences in reasoning: Implications for the rationality debate?\"（_Behavioral and Brain Sciences_, 2000）**——「系統一／系統二」這對術語的詞源論文。想知道這對名字到底從哪來、原意是什麼，看這篇；它也談個體差異，比通俗版嚴謹得多。\n- **Jonathan Evans & Keith Stanovich, \"Dual-Process Theories of Higher Cognition: Advancing the Debate\"（_Perspectives on Psychological Science_, 2013）**——如果你被本章的「這是隱喻、別實體化」勾起興趣，這篇是學界自己回頭修正「兩個系統」說法、改用「Type 1／Type 2 歷程」的代表作。讀它能讓你對「框架的局限」這件事更有感。\n- **本書內部**——三大捷思（系統一到底在跑哪些「對的工具」）見 ch02–04；形式謬誤為何是另一類機制見 ch05–06；「你對自己最瞎」的完整版見 ch19；去偏誤能做到什麼、做不到什麼見 ch18。機率直覺為何系統性崩壞，機制與演算法指向《馴服隨機》（見《馴服隨機》ch05 談貝氏與基率）。\n"}, {"id": "ch02-heuristics-the-cost-of-thrift", "file": "ch02-heuristics-the-cost-of-thrift.md", "group": "Part II — 對的工具用錯場合", "title": "ch02 — 捷思：省力的代價：你天天信任的近似，與它收的帳", "md": "# ch02 — 捷思：省力的代價：你天天信任的近似，與它收的帳\n\n> **本章解決什麼問題**：上一章立起了雙系統的脊椎——系統一（快、自動、省力）給「感覺對」的答案，系統二（慢、費力）常常偷懶把它放行。但「系統一在算什麼」這章才回答。它跑的是**捷思（heuristic，亦譯啟發法）**：不保證最優、但夠快夠省、平均夠好的估算規則。本章要講透一件對後面所有偏誤都成立的事——**捷思本身不是 bug，它是理性的省力策略；偏誤是這個對的工具被用到了不該用的脈絡**。這是 Part II（三大捷思）的開場總論：先把「對的捷思／錯的脈絡」這條全書貫穿的判讀法建好，ch03（可得性）、ch04（代表性與錨定）再各自示範一個捷思怎麼跑、原本對在哪、錯置到哪。\n\n```text\n全書地圖：一顆跑著捷思的大腦，如何在錯的脈絡反覆上當——而它察覺不到\n\n  Part I  那台機器 ............... 雙系統與「你察覺不到」\n     ch01 腦裡的快與慢（雙系統登場）\n        |\n        v\n  Part II  對的工具用錯場合 ....... 三大捷思             ◄ 你在這裡\n     ch02 捷思：省力的代價（捷思總論）\n     ch03 可得性：想得到就以為常見\n     ch04 代表性與錨定：像不像、第一個數字\n        |\n        v\n  Part III  結構壞了 ............. 形式謬誤\n     ch05 肯定後件與否定前件\n     ch06 有效不等於為真（有效性 vs 健全性）\n        |\n        v\n  Part IV  脈絡壞了 ............. 非形式謬誤目錄\n     ch07 攻擊型：稻草人・人身・訴諸權威\n     ch08 結構型：假兩難・滑坡・循環・不當類比（含哥德爾濫用）\n     ch09 語言與統計型：模稜兩可・德州神槍手・相關當因果\n        |\n        v\n  Part V  機率直覺崩壞 .......... 人對隨機最不可靠\n     ch10 基率忽視（機制指向《馴服隨機》）\n     ch11 合取謬誤：Linda 與「更具體反而更可能」\n     ch12 賭徒謬誤與小數法則（熱手 2018 翻案）\n        |\n        v\n  Part VI  我想要・我看到・誠實 .. 動機、框架、再現性、收官\n     ch13 確認偏誤與動機性推理\n     ch14 框架效應與損失趨避（規範面指向《決策》）\n     ch15 社會偏誤與從眾\n     ch16 記憶與後見之明\n     ch17 再現性危機：哪些偏誤沒站穩（呼應《科學方法》）\n     ch18 去偏誤：能做到什麼、做不到什麼\n     ch19 偏誤盲點：你對自己最瞎\n     ch20 同一顆大腦，現在你懂它七層（收官）\n```\n\n## 從你已知的出發\n\n你寫過 cache。你不會因為有 cache 就覺得自己偷懶——你知道 cache 是**正當的工程選擇**：每次都回源算（origin）正確，但慢、貴、扛不住流量；於是你存一份「夠新、夠準」的近似，絕大多數請求直接命中，省下的那筆算力與延遲是實打實的收益。cache 不是「壞掉的回源」，它是「在對的脈絡下，用一個可接受的近似換速度與成本」。\n\n捷思就是大腦的 cache。\n\n而你也知道 cache 會出哪種事：**stale**。資料變了、cache 沒失效，你拿著一份「曾經對、現在錯」的值繼續服務，而且——這是最要命的一點——**命中的那一刻你毫無感覺**，回應一樣是毫秒級、一樣理直氣壯。你不會在命中時收到「警告：這份可能過期」。你要等到下游對帳對不上、用戶投訴、或某次回源才發現它早就不對了。\n\n把這兩件事疊起來，你就已經懂了本章的全部骨架，只是還沒給它名字：\n\n- **cache 命中 = 系統一跑捷思**：自動、毫秒、不思考，給你一個「夠好的近似」。\n- **cache 是正當的 = 捷思是理性的**：在它適用的脈絡裡，它平均夠好，省下的算力是真收益，不是偷懶。\n- **stale = 偏誤**：環境變了、捷思沒換，你拿著「曾經對的規則」用在「現在不對的脈絡」——而且**命中那一刻你察覺不到**。\n\n這就是全書的中央張力，用你的母語講一遍：**謬誤不是愚蠢，是在錯的脈絡用對的捷思——而且你察覺不到自己正在犯。** 你不會因為 cache 偶爾 stale 就把所有 cache 拆掉（那會讓系統慢到不能用）；同樣地，本書的目標不是叫你「別用捷思」（做不到，也不該），而是讓你認得**哪些捷思在哪些脈絡會 stale**，並在那些地方裝上一道失效機制。\n\n你天天信任的近似還不只 cache。負載預估時你用「拇指法則」（rule of thumb）：「這台機器扛得住，差不多 8 成 CPU 以下就沒事」；容量規劃時你抓「去年雙十一的 1.5 倍」；rate limiter 取樣估流量而不是逐筆精算；估點（story point）時你說「這跟上次那個差不多大，給 5 點」。這些全是捷思——**不保證最優、但夠快夠省、平均夠好**。你不會為了估一個 story point 去建排隊模型。你信任近似，因為在絕大多數脈絡裡近似就夠了。\n\n本章接下來要做的，就是把「捷思為什麼是理性的」講到你心服口服，然後立刻給你看它在哪一類脈絡會系統性翻車——這樣後面三章（可得性、代表性、錨定）你就有一把統一的尺去量它們。\n\n## 捷思是什麼：演算法的人都認得的東西\n\n先把名詞釘死，省得後面打架。本書統一用「**捷思**」（heuristic，啟發法只在此標註一次，之後一律捷思）。\n\n對寫過程式的你來說，heuristic 一點都不陌生——它在演算法裡有精確的意思：**一個不保證得到最優解、但通常夠快、答案夠好的策略**。A\\* 搜尋的 heuristic function 估「離終點還有多遠」，估得好就剪掉大片搜尋空間；若啟發式函數滿足可容許性（admissible，估算值不大於實際值），A\\* 保證找到最短路；若不可容許，則不保證最短路，但讓你在可接受時間內拿到一條夠好的路。貪婪演算法（greedy）每步挑當下最好的，不回頭——常常不是全域最優，但又快又簡單。load balancer 的「round-robin」「最少連線」也是捷思：不去解一個全域最優分配問題，用一條簡單規則換掉天文數字的計算量。\n\n人腦的捷思是同一回事，只是跑在生物硬體上、且你看不到原始碼。它的形狀是：\n\n```text\n捷思的本質（演算法人版本）\n\n  正規解法（系統二）            捷思（系統一）\n  ─────────────────────        ─────────────────────\n  窮舉/精算/查全部資料          抓一個好取得的線索當代理\n  保證最優或正確                平均夠好、偶爾翻車\n  慢、費力、會累                快、自動、省力、永遠開著\n  例：解貝氏、查實際基率         例：「像不像」「好不好想起來」\n\n  替換的核心動作：\n  「真正想知道的那個難問題」 → 偷偷換成「一個好回答的近似問題」\n        （目標問題：機率多少？）   （代理問題：它有多像原型？）\n```\n\n最後那兩行是康納曼後來描述捷思的關鍵詞，他叫它 **attribute substitution（屬性替換）**：當你被問一個難算的問題（「這件事的機率多少？」），系統一悄悄把它換成一個好回答的問題（「這件事有多像我心裡的典型？」），然後拿後者的答案回報前者——**而你以為自己回答的是原來那題**。代理問題答得快、答得順，於是系統二沒理由懷疑，放行。\n\n這個「換題」就是後面所有捷思偏誤的共同生產線。ch03 的可得性，是把「頻率多少」換成「例子多好想起來」；ch04 的代表性，是把「機率多少」換成「有多像原型」。本章不展開它們的細節（那是後三章的事），只要你先記住這個替換動作的形狀。\n\n## 捷思是理性的：生態理性與「省力不是偷懶」\n\n這節是本章的價值核心，也是最容易被講歪的地方。很多談偏誤的科普走的是「人類好蠢，看，又錯了」的調子。本書明確拒絕這條路線——不只因為它廉價，更因為它**事實上不對**。\n\n捷思的正當性有兩條獨立的論證線，都不靠「人很笨」。\n\n**第一條：在資訊不足、時間不夠時，捷思是理性的省力策略。** 經濟學家賽門（Herbert Simon）很早就指出，「完全理性」（把所有選項與資訊都算過、選出真正最優）是個**現實中達不到的假想**：你沒有無限算力、沒有完整資訊、沒有無限時間。他提出**有限理性（bounded rationality）**與**滿意化（satisficing，satisfy + suffice 的合成詞）**——人不是去找「最優解」，而是設一個「夠好就收」的門檻，碰到第一個越過門檻的選項就停。賽門 1978 年拿了諾貝爾經濟學獎，核心貢獻正是把「理性」從「最優化」重新定義成「在認知與資源限制下夠好的決策」（2026-06 查證）。\n\n用你的話：你 debug 時不會把整個 codebase 讀完才動手，你抓最可疑的幾個地方先看——這不是不嚴謹，這是在「時間有限、不可能讀完」的現實約束下的**正確策略**。窮舉是奢侈品，多數情況你付不起。\n\n**第二條（更強、也更晚才被講清楚）：在對的環境結構下，捷思甚至可能比「精算」更準。** 這是吉仁澤（Gerd Gigerenzer）與其團隊的**生態理性（ecological rationality）**主張：一個捷思的好壞**不能脫離它運作的環境來評判**——它「理性」的程度，取決於它**多貼合所處環境的結構**。他們研究一批「快而省（fast-and-frugal）」的捷思，發現一件反直覺的事：**在不確定、資料雜訊大的真實環境裡，看更少的資訊、用更簡單的規則，有時反而做出更準的判斷**（這叫「less-is-more」效應，2026-06 查證）。直覺的理由是：複雜模型在雜訊大、樣本有限時容易**過配適（overfit）**——把雜訊當訊號學進去；簡單規則參數少、不容易被雜訊帶偏，反而更穩。\n\n這個你一定有感。一個塞滿特例分支、handle 了一堆只出現過一次的 edge case 的函式，往往比一個乾淨的簡單版本更脆、更難維護、在新情境下死得更難看——因為它**過配適**了過去那幾次的具體狀況。簡單規則的 robustness，是工程直覺裡早就有的東西。\n\n把兩條線合起來，本章第一個要你記牢的結論是：\n\n> **捷思不是偷懶，是理性的省力。** 它是大腦在「資訊不足、時間不夠、算力有限」這個人類永遠擺脫不了的約束下，演化／學習出來的近似策略。在它適用的環境裡，它平均夠好，甚至可能比精算更穩。**把每個偏誤都罵成「人很笨」，等於把 cache 罵成「壞掉的回源」——既不公道，也讓你看不見問題真正在哪。**\n\n問題從來不在捷思本身，而在**錯置**：環境結構變了、或這個脈絡根本不在捷思的適用範圍內，捷思卻照跑。下一節就把這件事的形狀畫出來。\n\n## 偏誤 = 捷思被錯置：同一機制的兩面\n\n捷思和偏誤不是兩個東西，是**同一個機制的兩面**。同一條規則，在它的「生態棲位」裡運作就是捷思（省力、夠好），被搬到棲位外運作就是偏誤（系統性翻車）。沒有「壞的捷思」，只有「被放錯地方的捷思」。\n\n回到 cache 的比喻，這件事就一目了然：\n\n```text\n同一機制的兩面：捷思 ←→ 偏誤\n\n  脈絡對          脊椎機制              脈絡錯\n  ──────          ──────              ──────\n  cache 命中  ←─  存一份夠好的近似  ─→  cache stale\n  （省力、對）      （省力，可能過期）      （省力、但錯，且無感）\n\n  捷思        ←─  抓代理線索估難題  ─→  偏誤\n  （平均夠好）      （換題作答）          （錯置到不該用的脈絡）\n\n  關鍵：兩邊跑的是「同一個動作」。差別只在環境結構合不合。\n        而且——命中和 stale，當下感覺完全一樣。\n```\n\n「同一個動作、環境合不合決定它是捷思還是偏誤」這句話，是本書接下來每一章的讀法。寫到任何一個認知偏誤時，本書都會逼自己回答三件事，請你也用這三問去檢核我有沒有偷懶：\n\n1. **這個捷思原本對在哪？**（它把哪個難問題換成哪個好回答的代理問題，省了什麼，在什麼環境裡這個替換是對的）\n2. **它在哪個脈絡翻車？**（環境結構怎麼變了，使得「代理線索」不再是「目標答案」的好近似）\n3. **為什麼當事人察覺不到？**（為什麼系統一給的答案感覺一樣對，系統二沒有理由停下來覆核）\n\n第三問是全書的核心張力，也是最該慢下來的地方。cache 命中和 stale 之所以難辦，正因為它們**在命中那一刻長得一模一樣**——同樣的延遲、同樣的格式、同樣的理直氣壯。捷思的偏誤也是：系統一給「女性主義銀行員更可能」（ch11）和給「銀行員更可能」，**主觀的確定感是一樣的**；你不會在犯合取謬誤的當下感到一絲遲疑。**偏誤之所以危險，不是因為你答錯，而是因為你答錯時的感覺，和你答對時一模一樣。** 這是本書反覆要把你按在椅子上的那句話。\n\n這裡要先守住一條重要的**分野**（這是全書的概念骨架，不能混）。上面「對的捷思／錯的脈絡」這套框架，描述的是**認知偏誤**——捷思在錯場合誤觸發。本書還收另一類完全不同機制的陷阱：**形式謬誤**（肯定後件、否定前件，Part III）。形式謬誤錯在**演繹推論的結構本身無效**（P→Q 為真，不保證 Q→P 為真），**與內容無關、也不是某個捷思被錯置**。**不要把肯定後件講成「一個用錯場合的捷思」**——它不是捷思，是無效的推論形式。到 ch05 我們會看到，雙系統對形式謬誤的回扣只有一個方向：「為何系統一會覺得一個無效推論看起來合理」（系統一對邏輯形式不敏感，憑表面合理度放行），而**不是**「它跑了哪個捷思」。本章與接下來兩章談的是捷思／偏誤這一面；遇到形式謬誤時，這套 cache 比喻就不適用了，請先把它放一邊。\n\n## 怎麼認得自己正在用捷思：徵兆\n\n既然偏誤的核心難處是「察覺不到」，那實務上唯一的著力點，就是學會辨認**「我現在正在跑捷思」的徵兆**——不是等錯了才知道，而是在系統一交卷、系統二準備蓋章放行的那一瞬間，攔下來問一句「這題該走快取嗎」。\n\n徵兆都是「主觀流暢度」的訊號。系統一的答案有一種特定的手感：\n\n```text\n「我正在跑捷思」的徵兆清單（攔截點）\n\n  徵兆                          對應的快取狀態        該做的攔截動作\n  ──────                        ──────              ──────\n  答案來得太快太順、不費力        cache 命中（毫秒）    問：這題的代價配得上快取嗎？\n  「感覺顯然」「一看就知道」      命中且高信心          高信心 ≠ 高正確；查一下回源\n  完全沒感覺自己在「算」          純自動、系統二沒上線  停三秒，把問題講出聲（外化）\n  第一個冒出來的數字後面          錨定已發生（ch04）    主動找一個獨立來源的數字\n  「這跟上次那個一模一樣」        代表性已啟動（ch04）  問：上次那個的基率是多少？\n  賭注大、不可逆、罕見           最不該走快取的脈絡    強制走系統二（冷路徑）\n```\n\n注意最後一列的判讀法：**不是所有捷思都要攔**。攔截是有成本的（系統二慢、費力、會累），全部都精算你會癱瘓——那等於把所有 cache 拆掉。真正的工程判斷是**選擇性失效**：在「賭注大、不可逆、罕見、或你已知這類脈絡會 stale」的地方，才付系統二的成本去回源；其餘照走快取。這跟你設計 cache 失效策略一模一樣——你不會每次請求都回源，你只在「資料剛變動」「這筆特別重要」時主動失效。\n\n這也是為什麼「光知道有偏誤」幾乎不能讓你免疫（ch18 會把這條誠實講透）：知道 cache 會 stale，並不會讓你在命中的那一刻自動感覺到它 stale——命中就是命中，手感一樣順。真正有用的，是事先在「已知會 stale 的脈絡」上裝好失效規則（改環境），而不是要求自己「每次命中都更努力懷疑一下」（改人，幾乎無效）。這條線索本章先埋著，Part VI 收。\n\n## worked example：同一個判斷，捷思版 vs 正規版\n\n把抽象的「對的脈絡 vs 錯的脈絡」變成一個你能跟著走的具體例子。場景：你是 on-call，凌晨收到告警，要快速判斷「**這次 504 逾時，是不是 DB 又慢查詢了**」。我們把同一個判斷用兩種方式做一遍，標出捷思在哪個脈絡會給對答案、哪個脈絡會翻車。\n\n```text\n判斷題：這次 504，是不是 DB 慢查詢？\n\n── 捷思版（系統一，3 秒）────────────────────────────────\n  動作：抓「最好取得的線索」當代理\n        線索 = 「上次 504 就是 DB 慢查詢」（好想起來、剛發生過）\n  替換：把難問題「這次的原因是什麼」\n        悄悄換成「這次有多像上次那次」     ← 代表性 + 可得性（ch03/04）\n  輸出：「八成又是 DB。」                  ← 來得快、感覺顯然、高信心\n  代價：幾乎為零（不用查任何 dashboard）\n\n── 正規版（系統二，5 分鐘）──────────────────────────────\n  動作：查實際證據，估「在 504 裡，DB 慢查詢佔幾成」\n  需要的量（先別算，只列出來）：\n    - 504 的各種成因基率（DB 慢查、上游逾時、GC、網路、限流…）\n    - 這次的具體證據（DB 連線數、慢查詢 log、上游延遲…）\n  方法：看 trace、比對時間軸、排除法\n  代價：5 分鐘 + 清醒的腦\n\n── 兩個脈絡，捷思的命運不同 ────────────────────────────\n  脈絡 A：你的系統九成的 504 真的來自 DB 慢查詢（環境結構穩定）\n    → 捷思版「八成又是 DB」≈ 正確，省下 5 分鐘  ✔ 這是 cache 命中\n       「上次是 DB」是「這次原因」的好近似——因為環境真的這樣分布\n\n  脈絡 B：上週剛上了新的上游服務、流量結構變了，504 的主因已悄悄\n          換成「上游逾時」，但你的捷思還停在「504 = DB」的舊版\n    → 捷思版「八成又是 DB」= 系統性錯，你會去翻 DB 翻半天、繞遠路  ✘\n       這是 cache stale：規則曾經對，環境變了，規則沒換——\n       而且你在咬定「又是 DB」的當下，毫無遲疑，手感和脈絡 A 一樣順\n\n── 自我複核：捷思錯在哪一步？ ───────────────────────────\n  不是錯在「用了上次的經驗」（那正是省力且常常對的捷思）。\n  錯在「環境結構已經變了（主因換人了），捷思沒跟著失效」。\n  攔截點：徵兆是「答案來得太快、感覺顯然、賭注其實不小（凌晨故障）」\n         → 這正是該付系統二成本回源（查 trace）的脈絡。\n```\n\n走完這一遍，本章的主張就落地了：捷思版**在脈絡 A 是對的、該用的、省力又準**——罵它「偷懶」是不公道的；它**在脈絡 B 翻車，不是因為它變笨了，是因為環境變了而它沒失效**。你要對付的從來不是「用不用捷思」，而是「認得這次是脈絡 A 還是脈絡 B」——而最難的是，**站在當下，A 和 B 的手感一模一樣**。\n\n## 直覺的陷阱\n\n捷思這個概念本身，就埋著好幾個會把你帶下溝的直覺。挑三個具名的講。\n\n```text\n陷阱清單（捷思總論版）\n\n  你以為                          其實                          自察徵兆\n  ──────                          ──────                        ──────\n  ① 偏誤 = 大腦壞了 / 人很笨       偏誤 = 對的捷思用錯脈絡。       你開始用「人類就是\n                                  捷思在棲位裡是理性的省力。      笨」當解釋——這通常\n                                  罵它笨＝罵 cache 是壞掉的回源。  代表你還沒搞懂機制。\n\n  ② 知道有這偏誤就能免疫          知道 cache 會 stale，不會讓你   你心想「我懂偏誤，\n     （「我懂偏誤，我不會中」）     在命中那刻感覺到它 stale。      所以我比較不會中」\n                                  光知道幾乎不改善（ch18/ch19）。  ——這念頭本身就是\n                                                                偏誤盲點（ch19）。\n\n  ③ 捷思都該被消滅 / 換成精算      攔截有成本，全精算會癱瘓。      你想「以後每個判斷\n     （「理性 = 凡事都慢慢算」）    對的策略是選擇性失效，          都慢慢算」——你撐\n                                  不是拆掉所有快取。              不過三天，且多數\n                                                                判斷精算並不更準。\n```\n\n**陷阱①「偏誤＝人很笨」** 是最普遍、也最該先拆的。它不只廉價，更**讓你看不見問題真正在哪**。如果偏誤是「腦子壞了」，那無解、也無從防；但如果偏誤是「對的捷思被錯置」，那問題就變得可操作——你要找的是「環境結構在哪變了」「這個捷思的棲位邊界在哪」，並在邊界外裝失效機制。把人罵笨會讓你停在情緒上；把它看成錯置會讓你動手解決。本書全程拒絕陷阱①——這不是替人類護短，是因為「錯置」才是事實、也才有用。\n\n**陷阱②「知道就能免疫」** 是這本書最想讓你提防的自我感覺。你讀完二十章，會「知道」一大堆偏誤的名字——然後很自然地以為自己因此比較不會中。錯。知道 cache 會 stale，跟你在命中那一刻能不能感覺到它 stale，是兩件事；前者是宣告式知識，後者是即時偵測，而即時偵測幾乎不會因為前者而改善。更糟的是，「我懂偏誤所以我比較理性」這個念頭，本身就是 ch19 的**偏誤盲點**——你對別人的偏誤一眼看穿，對自己的全開。真正讓你少犯的，不是「知道」，是「改環境裝失效機制」（ch18）。請現在就對「我讀完這本書會更理性」這句話打個折，並把它記下來，到 ch19 我們算總帳。\n\n**陷阱③「捷思都該換成精算」** 是工程師特別容易掉進去的——你習慣「正確性優先」，於是直覺認為理性就是凡事都走系統二慢慢算。但攔截系統一是有成本的（慢、費力、會累、且系統二自己也會偷懶），把所有判斷都精算的人不是更理性，是會**癱瘓**——而且如前所述，在雜訊大的環境裡精算還不一定更準（過配適）。理性的標的不是「消滅捷思」，是**選擇性失效**：認得哪些脈絡值得付系統二的成本，其餘信任快取。\n\n## 紙上推演\n\n以下三題，純紙上，不用查任何工具，也不用跑任何程式。每題先自己想到一個完整答案再看解答。\n\n**推演題一（★，[10 分鐘]）：你工作中的三個拇指法則。**\n列出你日常工作中真實在用的三個「拇指法則／捷思」（例如容量估算、值班分流、estimate、code review 的注意力分配……）。對每一個，回答三件事：(a) 它原本對在哪——把哪個難問題換成哪個好回答的代理問題、省了什麼；(b) 在什麼**脈絡**下它會失準（環境結構怎麼變會讓它 stale）；(c) 你會放一個什麼「徵兆」當攔截點。\n\n**推演題二（★★，[15 分鐘]）：把一句話翻成「捷思換題」的形狀。**\n拿這句你大概說過的話：「**這個服務看起來像之前那個出事的，八成也會出事。**」請：(a) 指出這裡「真正想知道的難問題」是什麼、「被偷換成的好回答代理問題」是什麼；(b) 說明在什麼脈絡下這個替換是對的（捷思命中）、什麼脈絡下會翻車（stale）；(c) 點出這個替換忽略了一個什麼量（提示：和「這類服務實際出事的比例」有關——但**機率怎麼算**指向《馴服隨機》，這裡只要指出「忽略了那個量」即可，不必計算）。\n\n**推演題三（★★，[15 分鐘]）：把「捷思不是偷懶，是理性的省力」講給一個工程師聽。**\n不准用「人類很笨」「要更理性」這類話。要求：(a) 用一個工程比喻（cache、A\\* heuristic、greedy、satisficing 任選）說明捷思為何正當；(b) 講清楚「同一個機制，脈絡對是捷思、脈絡錯是偏誤」；(c) 用一句話收尾，講清楚「偏誤之所以危險，不在你答錯，在你答錯時的手感和答對一樣」。目標是讓對方能用自己的話複述。\n\n### 推演解答\n\n**題一解答。** 這題沒有標準答案，重點在你有沒有把三件事都答出「機制」而不是「感覺」。一個達標的範例（容量估算）：(a) 難問題是「下個季度真實尖峰負載是多少」，需要建模、看歷史分布、算成長曲線；捷思把它換成「去年同期 × 1.5」——省掉建模，用一個好取得的歷史錨。它在「業務成長平穩、流量結構不變」的環境裡命中。(b) 失準脈絡：突然有行銷活動、產品改版改變了用戶行為、或上了個會放大讀寫的新功能——環境結構變了，「× 1.5」這條規則 stale。(c) 攔截徵兆：「這個數字我幾乎沒想就喊出來了」「這季有沒有任何非常規的變動」——只要答案是有，就強制回源（重新建模）。**常見錯路**：只答「它會失準因為估不準」——這是同義反覆，沒指出**環境結構的哪個變化**讓它失準。捷思失準一定對應一個「環境變了、規則沒換」，講不出那個變化就是還沒懂。\n\n**題二解答。** (a) 難問題：「這個服務**實際上**會不會出事」（牽涉它的真實架構、依賴、負載、與此刻的健康狀態）。被偷換成的代理問題：「這個服務**有多像**之前那個出事的」。這正是 ch04 的代表性捷思——把「機率」換成「像不像原型」。(b) 命中脈絡：如果「長得像」在你的環境裡真的和「會出事」高度相關（例如它們共用同一套有問題的框架、同一個會雪崩的依賴），那「像 → 會出事」是個夠好的近似，省下逐一排查。翻車脈絡：兩個服務只是**表面**像（同樣是 Node 寫的、同樣有 cache 層），底層成因毫無關係——這時「像」對「會出事」毫無預測力，捷思 stale。(c) 它忽略的量是「**像這樣的服務，實際出事的基率**」——「之前那個」可能只是一個生動的單一案例，而你沒問「這類服務一百個裡實際出幾個事」。這就是基率忽視的引信（ch10/ch04），但**演算法指向《馴服隨機》**，這裡只需指認「忽略了基率」。**常見錯路**：直接斷言「這句話是錯的」——不對，它在命中脈絡是對的、該用的捷思；它不是「錯的判斷」，是「在錯脈絡會錯置的捷思」。把它一律打成謬誤，等於犯了陷阱①。\n\n**題三解答。** 一個達標的口頭版本：「你想想 cache。每次回源算最準，但慢、貴、扛不住流量，所以我們存一份夠好的近似，絕大多數請求直接命中——這不是偷懶，是正當的工程選擇，省下的算力是真收益。大腦也一樣：碰到難算的問題，它不會每次都精算，它抓一個好取得的線索當代理，給你一個夠快夠好的答案。在這個近似適用的環境裡，它就是對的、該用的，甚至比硬算更穩。**偏誤不是另一個東西——偏誤就是這份近似 stale 了**：環境變了、規則沒換，你拿著曾經對的捷思用在現在不對的脈絡。同一個機制，脈絡對是捷思、脈絡錯是偏誤。而最麻煩的是——**cache 命中和 stale，在命中那一刻手感完全一樣**；偏誤危險的地方不是你答錯，是你答錯時的確定感，和你答對時一模一樣，所以你當下完全不會懷疑。」**常見錯路**：講成「所以我們要少用捷思、多動腦」——這違背本章主張（攔截有成本、全精算會癱瘓且不一定更準），也沒抓到重點。重點不是少用，是認得棲位邊界、在邊界外裝失效。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 為什麼說「捷思不是偷懶，是理性的省力」？請給**兩條獨立**的論證（提示：一條來自賽門的有限理性，一條來自吉仁澤的生態理性／less-is-more），不要只說「因為比較快」。\n2. 「捷思」和「偏誤」是兩個不同的東西嗎？用 cache 命中與 stale 解釋你的答案。\n3. 康納曼說的「屬性替換（attribute substitution）」是什麼意思？它怎麼當「後面所有捷思偏誤的共同生產線」？\n4. 為什麼「光知道有某個偏誤」幾乎不能讓你免疫？用 cache 的「命中那刻感覺不到 stale」來講。\n5. 攔截系統一是有成本的，所以理性的策略不是「凡事精算」而是「選擇性失效」。你會在什麼樣的脈絡才付這個成本？（提示：賭注、可逆性、稀有度、已知棲位邊界）\n6. 為什麼本書堅持不用「人類很笨」當解釋？這個拒絕除了「不夠厚道」，在**實務上**讓你多看見了什麼？\n7. 形式謬誤（如肯定後件）為什麼**不能**用本章「對的捷思／錯的脈絡」框架去解釋？這條分野到 ch05 會怎麼接？\n\n## 延伸閱讀\n\n- Tversky & Kahneman, \"Judgment under Uncertainty: Heuristics and Biases\", *Science* 185:1124–1131 (1974)。三大捷思（可得性、代表性、錨定）的綱領論文，本書 Part II 的源頭——讀引言那段「這些捷思高度經濟且通常有效，但會導致系統性且可預測的錯誤」，這句話就是本章的全部主張。公開 PDF：https://www.science.org/doi/10.1126/science.185.4157.1124\n- 康納曼《快思慢想》（*Thinking, Fast and Slow*, 2011），第 1 部論捷思與「屬性替換」。本章「換題作答」的機制在這裡有最完整的白話展開；讀它時記得 ch01 的誠實邊界（雙系統是隱喻、不是腦裡兩個小人）。\n- Gigerenzer & Todd 等，《Simple Heuristics That Make Us Smart》（1999）與生態理性綱領。捷思「在對的環境結構下甚至更準」（less-is-more）的代表作——它是本章「捷思是理性的」第二條論證的來源，也是對「偏誤＝人很笨」最有力的反駁。導讀 PDF：https://betterlegalinfo.ca/wp-content/uploads/2019/12/Todd-Gigerenzer-Simple-Heuristics-That-Make-Us-Smart.pdf\n- 「Bounded Rationality」，*Stanford Encyclopedia of Philosophy*。賽門的有限理性與滿意化（satisficing）的精確梳理——讀它確認「理性＝在限制下夠好」而非「理性＝最優化」這個重定義。https://plato.stanford.edu/entries/bounded-rationality/\n- 機率怎麼算（基率、條件機率、合取律）一律指向姊妹書《馴服隨機》——本章只示範「捷思如何把難問題換成代理問題」，真正的機率機制與計算在那本。\n"}, {"id": "ch03-availability", "file": "ch03-availability.md", "group": "Part II — 對的工具用錯場合", "title": "ch03 — 可得性：想得到就以為常見", "md": "# ch03 — 可得性：想得到就以為常見\n\n> **本章解決什麼問題**：你怎麼估「這種事多常發生」？多數時候你不會去查資料，你的腦子只是試著「想幾個例子」——好想起來就覺得常見，難想起來就覺得罕見。這就是**可得性捷思（availability heuristic）**。它是 ch02 講的三大捷思裡的第一個（系統一用來省力估頻率的工具），原本對得很（常見的事確實好想起來），但會被一個它不知道的東西系統性地騙倒：你能不能想起一件事，跟它有多常發生**不是同一回事**——它還受「最近發生過沒、夠不夠生動、媒體報不報」影響。本章把這個捷思在系統一裡怎麼跑、原本對在哪、在哪翻車講透，並接上你 on-call 時最熟的那種誤判（見 ch02 的「對的捷思／錯的脈絡」框架；機率怎麼算指向《馴服隨機》）。\n\n## 從你已知的出發\n\n你值過 on-call。上一次半夜被 call 起來，是 Redis 連線池被打爆。修完、補了 postmortem、睡了。\n\n接下來兩週，每次有任何告警跳出來，你腦子裡第一個冒出來的假設是什麼？「該不會又是連線池吧。」你甚至會在還沒看 log、還沒看 dashboard 的時候，就先去翻 Redis 的 metrics。\n\n這個「先想到連線池」的動作快得不需要思考——它就是系統一（System 1）在跑（見 ch01）。而它為什麼蹦出「連線池」這三個字，理由很簡單：**那是你最近一次、印象最深、半夜被吵醒的故障**。它在你記憶裡的「提取成本」最低，所以系統一把它當成「最可能的原因」端上來。\n\n問題在於：**「最好想起來的原因」和「這次最可能的原因」是兩件事。** 連線池上次爆，不代表這次故障的基率（base rate）裡連線池佔比最高。可能這兩週你的服務真正最常出事的是某個慢查詢、是某個第三方 API 偶發逾時——但那些沒讓你半夜爬起來過，所以它們在你腦子裡「不夠響」，系統一懶得想到它們。\n\n這就是可得性捷思的工程現場。它在你身上每天跑很多次：\n\n- **alert fatigue（告警疲勞）**：某類告警最近狂響，你就覺得「這類問題現在很嚴重」——但響的次數是「告警規則的靈敏度」決定的，不是「真故障的頻率」決定的（這條之後在 ch10 基率忽視會再深挖）。\n- **postmortem 的歸因**：事後檢討時，「上次就是這個原因」這句話有奇怪的份量——因為「上次」最好想起來。\n- **on-call 剛被某個 bug 燒過**：接下來一陣子你到處都看見它的影子，每個症狀都「長得像它」。\n\n可得性捷思不是 bug，是 feature。問題是它的 feature 在某些脈絡會變成 bug——而你在當下不會有感覺。本章就是要讓你看清它在哪一步把你帶溝裡。\n\n## 可得性捷思是什麼：用「好不好想」代替「有多常」\n\n先把這個捷思的本體講清楚，再給它名字（這是本書的順序：機制與動機優先於命名）。\n\n你要回答「某件事有多常發生／有多可能」這種**頻率／機率問題**。正確做法是去數、去查基率。但數和查很貴（系統二的活，慢、費力）。於是系統一用一個又快又省的代理（proxy）：\n\n```text\n真正想知道的：這類事件的「頻率 / 機率」有多高？\n        │\n        │  （要去數、去查 —— 系統二，慢、貴）\n        │\n        ▼  系統一的偷吃步：「我能多容易想到這類事件的例子？」\n        │\n        ├─► 好想到（流暢）→ 判定「常見 / 可能」\n        │\n        ├─► 難想到（卡頓）→ 判定「罕見 / 不可能」\n        │\n        └─► 用「提取流暢度（retrieval fluency）」當「頻率」的代理\n```\n\n這就是**可得性捷思（availability heuristic）**：用「相關例子有多容易浮現在腦海裡」來估計一件事的頻率或機率。這個詞與機制由特沃斯基（Amos Tversky）與康納曼（Daniel Kahneman）在 1973 年的論文〈Availability: A Heuristic for Judging Frequency and Probability〉（*Cognitive Psychology* 5:207–232）正式提出（2026-06 查證；屬三捷思總綱 Tversky & Kahneman 1974《Science》185:1124–1131 的一員，見 ch02）。\n\n**為什麼這是「對的捷思」？** 因為在大多數自然環境裡，「好想起來」和「常發生」確實高度相關。你常吃的早餐你一秒想得到、你常用的指令你不必查、你常踩的坑你閉著眼睛都記得。在一個你的記憶提取頻率忠實反映真實頻率的世界裡，可得性捷思幾乎免費給你一個夠準的答案。演化沒給你一個會做統計的腦，但給了你一個「記得越牢的越重要」的腦——這在資訊不足、時間不夠時，是個理性的省力策略（生態理性，見 ch02）。\n\n**它在哪一步翻車？** 翻在「提取流暢度」這個代理上。一件事好不好想起來，**不只**取決於它多常發生，還取決於一堆跟頻率無關的東西：\n\n- 它**最近**發生過沒（recency）；\n- 它夠不夠**生動、戲劇化、嚇人**（vividness）；\n- **媒體**報不報、報多大（media salience）；\n- 你**個人**有沒有親身碰過（personal exposure）。\n\n這些都會抬高「好想起來」的程度，卻完全不抬高真實頻率。於是系統一拿一個被污染的訊號（提取流暢度）去估一個它以為相關的量（頻率），給出系統性偏掉的答案——而且偏的方向是**可預測的**：生動的、近期的、被報導的、被你親身踩過的，一律被高估。\n\n> **這裡值得停十分鐘。** 整個捷思的失誤不在「系統一懶」，而在它**用錯了訊號**——它把「我提取這件事有多順」當成「這件事有多常」。這兩件事在乾淨的環境裡耦合得很好，在被媒體和情緒污染過的現代環境裡卻被硬生生扯開。你察覺不到這個替換，因為「想到一個例子」這件事本身毫不費力、毫無破綻——它感覺就像「知道」，不像「猜」。\n\n## 字母題：第一個讓你不舒服的證據\n\n可得性捷思最乾淨的示範，不需要媒體、不需要恐懼，只需要一本字典。\n\n特沃斯基與康納曼 1973 年問受試者一個問題（2026-06 查證原始設定）：\n\n> 隨機從英文文章裡抽一個字。它**以 K 開頭**，和它的**第三個字母是 K**，哪個比較常見？\n\n多數人答「K 開頭」。原始研究實際上測了五個子音（K、L、N、R、V——street 用 R 當代表），這幾個子音在典型英文文本裡其實**都是第三位出現得比第一位多**。但約三分之二的受試者判斷「第一位」比「第三位」常見，且把比例估反了方向。\n\n為什麼？因為你**用字母當索引在搜尋記憶**。要想「K 開頭」的字，你的腦子有現成的索引：kangaroo、kitchen、key、kind……一秒蹦出五個。要想「第三個字母是 K」的字，你得一個一個字去檢查第三位——ask、bake、like……慢、卡、費力。\n\n```text\n題目：「K 開頭」 vs 「第三位是 K」哪個多？\n（真相：典型英文文本裡，這些子音第三位 > 第一位）\n\n  搜「K 開頭」  ：記憶有現成索引 → kangaroo, kitchen, key... → 流暢 → 覺得「多」\n  搜「第三位 K」：沒有索引、要逐字檢查 → ask, bake... → 卡頓 → 覺得「少」\n        │\n        │  提取流暢度的差異 ≠ 真實頻率的差異\n        ▼\n  判斷被「好不好搜」綁架，而不是「有多少」\n```\n\n這題之所以重要，是因為它**排除了所有「外部干擾」**——沒有媒體、沒有恐懼、沒有近期事件。誤判純粹來自「你的記憶搜尋引擎對某種查詢比較順手」。它證明了可得性捷思的核心：**判斷被「提取的難易」綁架，而那個難易跟你要估的頻率根本不是同一個東西。** 你以為你在估頻率，其實你在量「自己搜尋的順暢度」。\n\n工程類比就在你手邊：這跟「有索引的查詢秒回、沒索引的查詢全表掃描」一模一樣。你的記憶對「字首」有索引（像 B-tree 的前綴查詢），對「第三個字母」沒有。查詢回得快，不代表符合條件的資料列就多——回得快只代表**有索引**。把「查得快」當成「資料多」，就是可得性捷思。\n\n## 系統性的偏差方向：為什麼你怕錯東西\n\n字母題是乾淨的實驗室版本。真實世界的可得性捷思更危險，因為污染源更強：**媒體與情緒**。\n\nLichtenstein、Slovic、Fischhoff、Layman 與 Combs 在 1978 年的〈Judged Frequency of Lethal Events〉裡，請人比較各種死因的頻率（2026-06 查證）。結果系統性地偏向「報導多、戲劇化」的死因：\n\n- 多數人覺得**他殺**比**自殺**更常見——真相是自殺約為他殺的兩倍。\n- 多數人覺得**意外**死的人和**疾病**死的差不多——真相是疾病致死遠多於意外。\n- **中風**這類「安靜的」死因被大幅低估——它致死數高得超過大眾直覺。\n\n機制就是可得性：他殺、空難、龍捲風會上新聞、會被講、夠戲劇；自殺、中風、糖尿病安靜、私密、不上頭條。被報導的死因「好想起來」，於是被判「更常見」。\n\n這條直覺你早就有，只是沒給它名字：**人怕坐飛機勝過怕開車。** 一場空難占滿一週新聞，於是「飛機會掉」這件事的提取流暢度被拉到滿格；而每天路上的車禍太日常、不上新聞，提取流暢度低。結果是統計上安全得多的飛行，感覺起來更可怕——甚至有研究指出空難新聞後一段時間公路死亡人數上升（人改開車）。\n\n```text\n真實頻率   vs   提取流暢度（被什麼抬高）        →  直覺判斷\n─────────────────────────────────────────────────────────\n車禍：高         日常、不上新聞、不戲劇 → 低     →  低估（覺得還好）\n空難：低         罕見、占滿新聞、極戲劇 → 高     →  高估（覺得很可怕）\n中風：高         私密、安靜、不報導 → 低         →  低估\n他殺：低         上新聞、戲劇化 → 高             →  高估\n                        │\n        媒體 + 戲劇性 + 近期 把「好想起來」推高，但不動真實頻率\n```\n\n> **可得性捷思整體上是個相對站得住的現象**（2026-06；它的核心——好提取的被判更頻繁——在許多脈絡反覆出現，不像本書後面要打折的 power posing、社會促發那批在再現性危機裡塌掉的效果）。但要誠實 hedge 兩點：(1) 上面那些**具體死因的高低估比例是 1978 年某次研究在某個樣本上的數字**，不是恆定常數，媒體環境變了數字也會變；(2) 風險知覺其實是「可得性」和「情緒（affect）」兩條路一起作用，學界對哪條主導仍有討論。我引用方向（生動的被高估）而不押死任一個百分比。\n\n注意這個偏差方向對你 on-call 的意義：**你最怕的故障類型，往往是上次最痛、最戲劇的那種，而不是統計上最常發生的那種。** 連線池爆掉很戲劇（半夜、全站、被 call 醒），慢查詢累積很安靜（P99 慢慢爬、沒人被吵醒）。於是你的注意力、你的監控告警、你補的 runbook，都不成比例地偏向「戲劇型故障」，冷落了「安靜但更頻繁」的那類。這不是你不專業——這是可得性捷思在替你排優先序，而你沒發現。\n\n## 雙系統透鏡：這是 ch01 的快與慢\n\n回扣脊椎（見 ch01）。可得性捷思是一個**標準的偏誤生產線**，完全符合「系統一跑了一個捷思 → 系統二沒攔下來 → 錯置到不該用的脈絡」：\n\n```text\n系統一（快、自動、永遠開）\n   ├─ 收到「這種事多常見？」的問題\n   ├─ 不去數（太貴），改問「我多容易想到例子？」\n   ├─ 提取順 → 蹦出「常見 / 很可能」這個「感覺對」的答案\n   └─ 把答案端給系統二，不附帶「我是用流暢度估的」這個標籤 ← 關鍵\n\n系統二（慢、費力、會偷懶）\n   ├─ 大多數時候：覺得答案「感覺對」，省力放行 ✗（偏誤產生）\n   └─ 偶爾介入：「等等，我是真的查過頻率，還是只是好想到？」✓（自察）\n```\n\n這裡有兩件事要守住，否則就把這個捷思講淺了：\n\n第一，**系統一不會告訴你它用了哪個訊號。** 它端上來的是「連線池，很可能」，不是「我用『最近最好想起來』估的，請覆核」。這個訊號來源被隱藏，正是你察覺不到自己在犯的原因——這是全書的中央張力：**謬誤不是愚蠢，是在錯的脈絡用對的捷思，而且你察覺不到自己正在犯。**\n\n第二，**這是捷思被錯置，不是邏輯結構壞掉。** 可得性捷思屬於本書「認知偏誤」這一類（捷思在錯場合誤觸發），與後面 ch05 的形式謬誤（肯定後件那種「邏輯結構本身無效」）機制完全不同——別把它們混為一談（這條分野是全書主線之一，見 ch05、ch06）。可得性的錯在「用了個在這個脈絡會被污染的代理」，不在「推論形式無效」。\n\n## 直覺的陷阱\n\n可得性捷思這個概念，最常被誤解、講錯、或自以為懂其實沒懂的地方如下。每一條都附「徵兆」——當你發現自己出現這個徵兆，代表你正踩在溝邊。\n\n```text\n陷阱 A：把「我想得到」當成「我知道」\n  錯誤直覺：「我馬上想到三個這種 case，所以這很常見。」\n  哪一步下溝：用提取流暢度（想得到幾個）替換了真實頻率（實際幾個）。\n  自察徵兆：你的判斷裡有「我馬上就想到…」「上次不就是…」「最近一直…」\n            這類措辭——這是流暢度在說話，不是基率在說話。\n  解法問句：「我是真的查過/數過頻率，還是只是好想到例子？」\n\n陷阱 B（具名）：可得性 ≠ 確認偏誤\n  常見誤解：把「最近的故障一直浮現腦海」直接叫成確認偏誤。\n  正確版：可得性是「哪個例子先浮現（提取流暢度）」的問題，是被動的、\n          來源是記憶可及性；確認偏誤（見 ch13）是「我有個假設、\n          只去找支持它的證據」的問題，是主動的、來源是動機。\n          兩者常一起出現（先因可得性想到 X，再因確認偏誤只找支持 X 的 log），\n          但機制不同，別當同一個。\n  自察徵兆：問自己「這個假設是『先冒出來的』還是『我想要它成立的』？」\n            前者偏可得性，後者偏確認偏誤。\n\n陷阱 C：以為「多想幾個例子」就能去偏誤——反而更糟\n  錯誤直覺：「那我多努力想幾個例子來校正不就好了？」\n  哪一步下溝：當你刻意去想「很多」例子時，想到後面會越來越「卡」，\n            這個「卡」的感覺（提取困難）本身又被當訊號，\n            反而讓你覺得「其實沒那麼多」——流暢度的陷阱套娃。\n            （這對應一個真實發現：要人舉越多例子，反而降低他對該類事件的\n             頻率/自我評估——舉例的「困難感」回頭污染判斷。我把它當方向性\n             直覺講，不押死任何效果量；嚴格效果指向再現性討論，見 ch17。）\n  自察徵兆：你發現自己「努力回想但想不太到」就鬆口氣覺得「那應該很罕見」。\n\n陷阱 D：把可得性的「高估」當「這件事不會發生」\n  錯誤直覺：「空難被高估，所以飛機很安全，不用管。」\n  正確版：可得性說的是「頻率被估偏」，不是「真實頻率是零」。\n          高估 ≠ 不存在；糾正方向是去查真實基率，不是反向擺爛。\n  自察徵兆：你從「這被誇大了」一路滑到「所以這不重要」——過頭了。\n```\n\n陷阱 B（可得性 ≠ 確認偏誤）是這章你最該帶走的那一個。工程師很容易把所有「腦子卡在某個假設上」的毛病都叫成確認偏誤，但「為什麼是這個假設先冒出來」（可得性）和「為什麼我只找支持它的證據」（確認偏誤）是兩個不同的故障點，要分開診斷、分開設護欄。\n\n## 紙上推演\n\n以下題目純紙上推演（本書全程不放任何要你去跑的程式碼）。先自己想，再看解答。\n\n---\n\n**推演題 1（★，[10 分鐘]）— 把一次歸因抓現行。**\n回想一個你「故障一發生、還沒看資料就先有了假設」的時刻。寫下：(a) 你第一個冒出的假設是什麼；(b) 它為什麼好想起來（最近？戲劇？你親身踩過？）；(c) 那次它對不對；(d) 如果它對，是因為它真的基率最高，還是「剛好」？\n\n**推演題 2（★★，[15 分鐘]）— 設計一個跳過可得性的檢核問句。**\n你要為 on-call 的故障歸因流程加一道「改環境」的護欄（不是叫人「更小心」，而是改流程，見 ch18），用來在「系統一蹦出假設」和「動手去翻 log」之間插一個強制停頓。寫出這道護欄的具體問句，並說明它攔的是可得性捷思的哪一步。\n\n**推演題 3（★★★，[20 分鐘]）— 字母題的工程版自我複核。**\n不查任何資料，憑直覺排序：在你的程式碼庫裡，下列哪種「字串」出現得最頻繁——(a) 以 `get` 開頭的函式名、(b) 函式名中間含 `get`、(c) 變數名含 `id`？寫下你的直覺排序，然後寫下「我的排序是被『哪個好搜』影響的，還是被『哪個真的多』影響的」，並指出：如果要真的回答這題，你會怎麼數（描述方法，不要真的去跑）。\n\n---\n\n### 推演解答\n\n**題 1 解答。** 重點不在你答得對不對，在 (d)。常見錯路是：假設剛好對了，你就把它記成「我直覺很準」——但這正是可得性捷思最陰險的地方：**它有時候會對**（最近爆過的東西，短期內確實可能再爆，因為根因可能沒修乾淨）。問題是你無法從「它對了」反推「我的判斷方法可靠」——你用的是流暢度，它這次剛好和基率同向而已。一個誠實的自我檢核會承認：「我這次賭對了，但我賭的依據是『好想起來』，不是『我查過基率』。」把「方法可靠」和「結果剛好對」分開，是這題的全部。\n\n**題 2 解答。** 一個能用的護欄問句：**「除了我第一個想到的原因，這個症狀還符合哪兩個我『沒那麼快想到』的原因？把它們也列出來再開始查。」** 它攔的是可得性捷思的「提取流暢度 → 端出單一假設」這一步——強迫系統二把那些「不夠響、不好想到」的候選也拉進來，抵消流暢度造成的偏序。常見錯路是寫成「冷靜一點、不要先入為主」——這是叫人改人（幾乎無效，見 ch18），不是改環境；好的護欄是**具體到能寫進 runbook 模板**的問句，讓流程替你做，不靠意志力。另一個好版本：在 postmortem 模板裡固定一欄「我們最初忽略了哪些候選原因、為什麼當時沒想到」。\n\n**題 3 解答。** 這題刻意鋪了陷阱。多數人會覺得 `get` 開頭最多——因為 `getUser`、`getId`、`getConfig` 這種名字**好想到**（你天天寫，有現成索引），這正是字母題的工程翻版：你的判斷被「哪個好搜」綁架。但真實答案完全取決於你的程式碼庫，跟「好想到」無關。誠實的自我複核會寫：「我的排序反映的是『我寫哪種多』的記憶流暢度，不是 codebase 的真實分布。」要真的回答，方法是去數（描述即可，本書不跑程式）：對整個 repo 的識別字做詞法統計，分別匹配「`get` 為前綴」「`get` 為子字串但非前綴」「含 `id`」，比較計數——這就是「去查基率」對「靠可得性猜」的對照。關鍵體悟：**「好想到的樣式」和「實際最多的樣式」是兩件事，正如字母題裡「好搜的字首」和「實際最多的字母位置」是兩件事。**\n\n## 自我檢核\n\n口頭自答；講得出來才算過關，講不清楚代表還沒懂。優先回答「為什麼」。\n\n1. 用一句話講：可得性捷思**原本對在哪個脈絡、在哪個脈絡翻車**？（不能只說「人會高估生動的事」——要說出它把哪個訊號當成了哪個量。）\n2. 為什麼字母題（K 開頭 vs 第三位是 K）是比「人怕空難勝過怕車禍」**更乾淨**的可得性證據？它排除了什麼干擾？\n3. 「提取流暢度」具體被哪四類跟頻率無關的東西抬高？各舉一個你工作中的例子。\n4. 可得性捷思和確認偏誤（見 ch13）差在哪？為什麼把前者叫成後者是診斷錯了故障點？\n5. 為什麼「我馬上就想到三個 case，所以這很常見」這句話裡藏著一個偷換？被偷換掉的是什麼？\n6. 你 on-call 時「最怕的故障類型」和「統計上最常發生的故障類型」為什麼常常不是同一個？這對你怎麼配置告警/runbook 有什麼啟示？\n7. 為什麼「叫人多想幾個例子來校正」反而可能加深偏誤？（陷阱 C）\n8. 「空難被可得性高估」推不出「飛機很安全所以不用在意風險」——這裡多走了哪一步、錯在哪？\n\n## 延伸閱讀\n\n- Tversky, A. & Kahneman, D. (1973).〈Availability: A Heuristic for Judging Frequency and Probability〉，*Cognitive Psychology* 5:207–232。可得性捷思的原始論文；讀它的字母題與「想像難易度」實驗段落，看機制怎麼被乾淨地分離出來。\n- Tversky, A. & Kahneman, D. (1974).〈Judgment under Uncertainty: Heuristics and Biases〉，*Science* 185:1124–1131（https://www.science.org/doi/10.1126/science.185.4157.1124）。三捷思總綱，可得性是其中第一個；一篇就看完三大捷思的骨架（也是 ch02、ch04 的共同底本）。\n- Lichtenstein, S. et al. (1978).〈Judged Frequency of Lethal Events〉，*Journal of Experimental Psychology: Human Learning and Memory*。死因頻率高低估的經典資料來源；讀它對「被報導 vs 真實頻率」落差的呈現，但記得那些百分比是 1978 年某次研究的數字、需 hedge。\n- 《馴服隨機》談基率與條件機率。本章只講「為何直覺把頻率估偏」，**頻率與機率到底怎麼算、基率怎麼進貝氏更新**指向它（本書 ch10 基率忽視會接上這條線，把可得性與代表性的翻車匯流到機率脈絡）。\n- 維基百科「Availability heuristic」條目（https://en.wikipedia.org/wiki/Availability_heuristic）。當作交叉查證的起點而非終點；條目裡的風險知覺例子要對照原始研究與時點看，別當定論。\n"}, {"id": "ch04-representativeness-anchoring", "file": "ch04-representativeness-anchoring.md", "group": "Part II — 對的工具用錯場合", "title": "ch04 — 代表性與錨定：像不像，與第一個數字", "md": "# ch04 — 代表性與錨定：像不像，與第一個數字\n\n> **本章解決什麼問題**：這是 Part II「三大捷思」的最後一章。ch02 講了捷思為何是「對的工具」，ch03 拆了可得性（用「好不好想起來」估頻率）。本章一次處理另外兩個捷思——代表性（用「像不像原型」估機率）與錨定（先出現的數字會拖動你的估計，哪怕你明知它無意義）。代表性是後面整個 Part V「機率直覺崩壞」的引信：基率忽視（ch10）、合取謬誤（ch11）、賭徒謬誤（ch12）追到底都是它在點火。錨定則被我選來當「站得住的偏誤」標本——它五十年來屢試屢驗，正好和 Part VI 那些在再現性危機裡縮水的偏誤做誠實對照。最後我把**規劃謬誤**（你每次估時都樂觀、deadline 永遠 delay）收進來，因為它的引擎正是錨定加上代表性，而且它是這整本書裡離你工作最近的一個。\n\n## 從你已知的出發\n\n你每天都在做兩件事，而這兩件事正好就是這一章的兩個捷思。\n\n第一件：**估點**（story point）。Sprint planning 上，PM 念完一張卡，你三秒內心裡就浮出一個數字——「這個喔，3 點吧」。你怎麼來的 3？你沒有去翻歷史資料、沒有去比對「過去長得像這張的卡平均花了幾天」。你是把這張卡跟你腦裡某個「3 點的卡長什麼樣」的原型比了一下，覺得**像**，就報 3。這就是代表性捷思：用「像不像原型」當「是哪一類」的代理。它常常夠好——熟手的「感覺」確實有訊息量。但它有一個系統性的盲區，我們整章都在拆。\n\n第二件：**第一個數字會黏住你**。同一場 planning，如果第一個開口的資深工程師說「這我看 8 點起跳」，接下來全桌的估計都會繞著 8 上下飄；如果他先說「2 點吧很簡單」，全桌就繞著 2 飄。同一張卡、同一群人，只因為**第一個被喊出來的數字不同**，最後的共識就差一截。你大概隱約知道這件事——所以有人會堅持 planning poker 要「同時翻牌」，就是想擋掉這個。那個「第一個數字把後面所有人都拖過去」的現象，就是錨定。\n\n還有第三件事，藏得更深，每個工程師都犯、而且**明明每次都犯還是照犯**：**估時永遠樂觀**。你估這個功能兩天，結果做了五天。你不是第一次了——你上一個功能也超時、上上個也超時。但這次你估的時候,腦子裡跑的還是「一切順利的話兩天」。明知道自己有前科,下次估計卻還是照樂觀情境給。這個叫規劃謬誤(planning fallacy),它的機制就是前兩個捷思的合體,我把它放在本章收尾。\n\n這一章要做的,是把這三個你「隱約知道」的工作現象,變成「我說得清楚它在哪一步出錯、為什麼我察覺不到」的東西。\n\n## 代表性捷思:用「像不像」偷換「有多可能」\n\n先給機制,再給名字——這是本書的規矩。\n\n你的系統一(S1,見 ch01)在被問「這個 X 屬於哪一類」時,有一個又快又省的辦法:**看 X 跟各類的「原型」(prototype)有多像,挑最像的那一類**。這個辦法在絕大多數日常脈絡裡好用得不得了。你看到一隻四條腿、會汪汪叫、搖尾巴的動物,不需要做貝氏推論就知道牠是狗——因為牠**像**狗的原型。代表性捷思在「分類」這件事上是個好工具,省下大量運算,而且平均對。\n\n問題出在:S1 把「像不像」這把尺,**借去量了一個它不該量的東西——機率**。\n\n「像不像某類的原型」和「有多可能屬於某類」是**兩件不同的事**。它們在很多時候湊巧一致(所以你感覺不到差別),但它們可以被拆開,而一旦拆開,代表性就翻車。拆開它們的那個變數,叫**基率**(base rate)——某一類在母體裡本來就佔多少比例。\n\n### 工程師-律師問題:基率被當空氣\n\n康納曼(Daniel Kahneman)與特沃斯基(Amos Tversky)在 1970 年代初做過一個經典示範(收於 1974 年那篇總綱〈Judgment under Uncertainty〉,*Science* 185:1124–1131;設定我在寫這章時回查過)。設定大致是這樣:\n\n```text\n告訴受試者:有一群人,經過心理學家面談與人格測驗,寫成簡短描述。\n  條件 A:這群人裡有 70 個工程師、30 個律師。\n  條件 B:這群人裡有 30 個工程師、70 個律師。\n從這 100 人裡隨機抽一張描述給你,問:此人是工程師的機率多少?\n\n描述(刻意寫得像工程師的刻板印象):\n  「他對政治與社會議題不太感興趣,空閒時喜歡做木工、解數學謎題、\n   航海。他謹慎、有條理、有抱負。」\n\n結果:不管你被分到條件 A(工程師佔七成)還是條件 B(工程師佔三成),\n      受試者給出的機率估計幾乎一樣高——都被那段「很像工程師」的描述\n      牽著走,幾乎完全無視 70/30 還是 30/70 這個基率。\n```\n\n停下來想十秒,因為你的直覺正要騙你,而且你不會有感覺。\n\n按理說,條件 A 跟條件 B 應該給出**很不一樣**的機率:同一段描述,若母體裡工程師佔七成,他是工程師的機率本來就該比「工程師只佔三成」時高。基率變了,答案就該變。但受試者的估計幾乎不動——他們只盯著「這描述多像工程師原型」,把「母體裡工程師有多少」這個關鍵數字當成了空氣。\n\n這就是基率忽視(base-rate neglect),而它的引擎正是代表性:**S1 用「像不像」回答了「有多可能」,而「像不像」對基率完全不敏感**。描述像不像工程師,跟這群人裡有幾個工程師,是兩條獨立的訊息;代表性捷思只讀了第一條,丟掉了第二條。\n\n> 機率該怎麼算——把基率、描述的指示性、後驗機率用貝氏定理組起來——是《馴服隨機》的地盤(見《馴服隨機》談條件機率與貝氏更新),本書不重推。我這裡只負責一件事:讓你看清**人的直覺在哪一步把基率丟掉、為什麼丟掉時毫無自覺**。完整的醫檢基率現場留到 ch10,那裡是這個捷思在機率脈絡的正式翻車秀。\n\n### 為什麼你察覺不到\n\n這是全書的中央張力,在這裡第一次以代表性的形式出現:**你犯基率忽視的當下,感覺不到自己在犯**。\n\n原因是:S1 給你的不是「我算了一下機率」,而是「這聽起來就很對」。那段工程師描述讀起來**就是**像工程師,這個「像」的感覺是直接、自動、有說服力的。基率(70/30)是一個冷冰冰、不生動、不勾起任何畫面的數字——它在你腦裡沒有重量。於是 S1 拿生動的「像」壓過了乾癟的「基率」,而 S2(那個本該介入、把基率乘進去的慢系統)覺得「答案已經有了,而且很有把握」,就偷懶放行了(ch01 的「省力預設放行」)。\n\n你不會覺得自己「忽略了基率」,你只會覺得「答案很明顯」。**忽略基率不是一個你做了的動作,而是一個你沒做的動作——而沒做的動作不會在意識裡留下痕跡。** 這是它最難防的地方:你無法察覺一件「沒發生」的事。\n\n### 小數法則:代表性的另一張臉\n\n代表性還有第二個翻車口,埋在「樣本大小」上,我在這裡只埋引信,正式拆解留到 ch12。\n\nS1 期待**小樣本也要長得像母體**。丟一枚公正硬幣丟六次,你的直覺覺得「正反反正反正」比「正正正正正正」更「像」隨機、更可能出現——但這兩個特定序列的機率其實一模一樣(都是 1/2⁶)。S1 覺得前者比較「有代表性」,於是把「像隨機」誤當成「更可能」。這個「以為小樣本也該像母體」的錯覺,特沃斯基與康納曼叫它**小數法則**(law of small numbers,戲仿真正的大數法則)。\n\n對工程師,小數法則的工作版是:**你跑了三次壓測都沒掛,就說「這服務穩了」**。三次是個太小的樣本,它「像」一個穩定服務的行為,但「像穩定」不等於「是穩定」。代表性又一次用「像不像」回答了「有多可能」。賭徒謬誤(ch12)、用三筆 log 就下結論的 debug——背後都是這同一張臉。\n\n## 錨定:第一個數字會拖著你走\n\n換第二個捷思。代表性是「拿錯尺量機率」,錨定是「估數量時,被一個先出現的數字綁架起點」。\n\n機制是這樣:當你要估一個你不確定的數量(這服務要幾台機器、這功能要幾天、這輪盤上非洲國家佔聯合國幾成),S1 不會憑空生成答案,它會**抓一個現成的數字當起點,再從那裡往你覺得對的方向調整**。麻煩在於:**那個起點哪怕是隨機的、明知無意義的,它照樣會拖動你的最終答案**;而且你調整得**不夠遠**,於是最終答案被起點黏住。\n\n### 旋轉輪盤:明知是假的也照樣被拖\n\n最有名的示範來自特沃斯基與康納曼 1974 年(同一篇 *Science* 總綱;我回查過設定與數字)。他們在受試者面前轉一個輪盤——但這輪盤動過手腳,**只會停在 10 或 65**。轉完輪盤,他們問受試者一個跟輪盤毫無關係的問題:\n\n```text\n非洲國家佔聯合國會員國的比例,是高於還是低於〔輪盤剛轉到的數字〕?\n然後,請給出你的實際估計值。\n\n  看到輪盤停在 10 的那組  →  比例的中位估計 ≈ 25%\n  看到輪盤停在 65 的那組  →  比例的中位估計 ≈ 45%\n```\n\n同一個問題、同一群人(University of Oregon 的受試者)、唯一的差別是**他們眼睜睜看著轉出來的一個隨機數字**。一個他們明知是輪盤亂轉出來、跟非洲國家八竿子打不著的數字,把估計拖動了將近 20 個百分點。\n\n這裡值得你停下來,因為這是錨定最讓人坐立難安的一點:**受試者知道那個數字是隨機的**。他們看著輪盤轉、看著它停。理性上,一個你親眼確認為隨機的數字,對「非洲國家佔聯合國幾成」這個問題的訊息量是**零**。但它照樣拖動了你。錨定不需要你**相信**那個錨——它只需要那個數字**出現在你面前、出現在你開始估之前**。\n\n### 機制:不充分調整,還是選擇性可及?\n\n那麼錨定為什麼會發生?這裡我要誠實標一級嚴謹度——**效果本身極穩固,但「為什麼會這樣」的機制至今仍有爭論(2026-06)**。\n\n最早的解釋(特沃斯基與康納曼)叫**不充分調整**(insufficient adjustment):你從錨點出發,往你覺得對的方向調整,但你**提早收手**了——調到一個「還算可信」的範圍就停,沒調到底。錨在低處,你停在偏低;錨在高處,你停在偏高。\n\n但後來有另一派解釋,叫**選擇性可及**(selective accessibility):光是考慮「會不會比 65 高」這個問題,就讓你腦裡優先浮現一堆「支持答案偏高」的念頭(可及性,ch03 的老朋友),於是估計被拉高。\n\n我查了一下這兩派的近況:大約 2010 年代的研究(如 Simmons、LeBoeuf、Nelson 2010,以及後續對選擇性可及理論關鍵結果的複製嘗試)對兩個機制都提出了挑戰,目前(2026-06)沒有一個乾淨的勝者——有研究指出原版的「不充分調整」模型該被修掉、也有複製失敗打到選擇性可及理論的關鍵預測上。所以我給你的誠實版本是:\n\n> **錨定效應「會發生」這件事,是心理學裡最穩固、複製最成功的發現之一(這正是我選它來當『站得住的偏誤』標本的原因);但『它透過哪個機制發生』,到 2026-06 仍未定論。** 寫到這裡我不會假裝知道一個我不知道的答案——這個「效果鐵打、機制存疑」的分層,本身就是本書要教你的一種誠實。\n\n注意上面那段話的形狀:我把「效果是否存在」和「機制是什麼」**分成兩層**講。這個分層習慣,是 ch17 再現性危機那章的核心工具——很多偏誤的爭議不是「存不存在」,而是「多大、靠什麼、在什麼條件下」。錨定剛好示範了一個「效果這一層極穩、機制那一層存疑」的乾淨案例。\n\n### 錨定的工作版\n\n錨定在你工作裡無所不在,而且大多時候你看不見它在運作:\n\n- **估點被第一個喊的數字錨住**(就是開頭那個例子)。這也是為什麼「先讓資深的開口」在估時上是個壞習慣——他不是給了你資訊,他是給了你一個錨。\n- **容量規劃被去年的數字錨住**:「去年雙十一我們開了 40 台」變成今年估算的起點,哪怕業務量、架構、流量模型都變了。去年的 40 是一個錨,不是一個基準。\n- **薪資談判的開價**:第一個被喊出來的數字(不管是你開的還是對方開的)會把整場談判的範圍框住。HR 深諳此道。\n- **效能基準的「可接受」門檻**:第一次有人說「P99 200ms 應該還行」,之後所有討論就繞著 200ms 轉,沒人再回去問「200ms 到底是怎麼定出來的」。\n\n辨識錨定的徵兆只有一個,但很可靠:**你的估計裡,有一個數字是『因為它先出現』而不是『因為它有理由』被放進來的。** 一旦你能指出「我這個估計的起點是哪個數字、那個數字憑什麼當起點」,你就有機會把它換掉。\n\n## 規劃謬誤:兩個捷思合謀,讓你永遠樂觀\n\n現在把代表性和錨定合起來,你會得到這本書裡離你工作最近的一個偏誤——而且是你**明知有前科還照犯**的那種。\n\n規劃謬誤(planning fallacy)這個詞由康納曼與特沃斯基在 **1979 年**鑄出(出自〈Intuitive Prediction: Biases and Corrective Procedures〉;我回查過詞源與年份)。定義很簡單,也很扎心:**你系統性地低估一件任務要花的時間與成本——即使你明知同類任務過去通常花得更久。**\n\n最有名的實證來自 Buehler、Griffin 與 Ross 1994 年的研究(*Journal of Personality and Social Psychology*;設定我回查過)。他們請大學生估自己論文還要多久寫完:\n\n```text\n學生對自己論文完成時間的估計 vs 實際:\n  學生估的「最可能」完成時間   ≈ 33 天\n  學生估的「最壞情況」完成時間 ≈ 48 天\n  實際平均完成時間             ≈ 55 天   ← 比最壞情況還慢 7 天\n\n  只有約 30% 的學生在自己估的時間內完成。\n  連他們估的「99% 把握會完成」的時間點,都只有約 45% 的人真的趕上。\n```\n\n讀到「實際比他們估的**最壞情況**還慢」這行,你應該有點熟悉的刺痛感。這不是學生的問題——這篇研究還補充:這個低估模式**非常穩健、不容易消除**,連在沒有任何組織或政治壓力的任務上都照樣出現。換句話說,規劃謬誤不是「被老闆逼著給樂觀數字」,是你**自己騙自己**。\n\n### 引擎一:錨定在「一切順利」的最佳情境\n\n當你估「這功能要幾天」,你腦裡跑的不是一個分布,而是**一個故事**——一個一切順利的故事:需求很清楚、沒有卡住的相依、沒有臨時插單、沒有環境炸掉、code review 一次過。你拿這個最佳情境當**起點**(錨),然後加一點 buffer。\n\n但你加的 buffer **不夠**——這正是錨定的「不充分調整」:你從「順利情境」這個過低的錨往上調,提早收手。而現實裡會出事的,從來不是你想得到的那幾項,是你想不到的那幾項。\n\n### 引擎二:內部觀點 vs 外部觀點(代表性又回來了)\n\n康納曼把這背後更深的機制叫**內部觀點**(inside view)對**外部觀點**(outside view)。\n\n- **內部觀點**:只盯著**這一個**案子的細節去推估——這個功能的需求、這段程式碼的複雜度、這個 sprint 的容量。你在腦裡把這個案子的劇情演一遍。\n- **外部觀點**:把這個案子當成「**某一類**案子的一個樣本」,去問「過去長得像這樣的案子,實際上平均花了多久?」這就是**參照類別預測**(reference class forecasting)。\n\n注意到沒有——內部觀點之所以樂觀,正是因為它**忽略了基率**:你只看這個案子像不像「會順利的案子」(代表性!),卻不去看「我這類案子過去的實際完成時間分布」(基率)。規劃謬誤的根,跟工程師-律師問題的根,是**同一個**:用「這個案子的具體劇情」蓋過「同類案子的歷史比例」。代表性捷思在估時裡換了張臉又出現了。\n\n解藥(我只埋引信,正式拆在 ch18 去偏誤)也很直接:**別問「這個功能要幾天」,問「過去十個長得像這樣的功能,從開工到上線實際平均花了幾天」。** 把問題從內部觀點翻成外部觀點,等於強迫把被你丟掉的基率撿回來。注意——這是「改問法」(改環境),不是「叫自己更小心」(改人);為什麼前者有效、後者幾乎沒用,是 ch18 的主題。\n\n## 直覺的陷阱\n\n這一章的兩個捷思各自帶著一個招牌誤解,加上一個跨章常見的混淆。守住下面這幾條的正確版。\n\n```text\n陷阱清單(本章具名陷阱)\n┌──────────────────┬────────────────────────┬────────────────────────────┐\n│ 你以為           │ 實際上                 │ 怎麼自我察覺               │\n├──────────────────┼────────────────────────┼────────────────────────────┤\n│ 「他很像 X,所以  │ 「像不像 X」和「是 X   │ 問自己:我有沒有用到        │\n│ 多半是 X」是合理 │ 的機率」是兩件事;      │ 「這群裡 X 本來佔多        │\n│ 的推論           │ 只有納進基率才合理。   │ 少」?沒有就是漏了。        │\n│                  │ (基率忽視)             │                            │\n├──────────────────┼────────────────────────┼────────────────────────────┤\n│ 我知道那數字是隨 │ 你知道它隨機,照樣      │ 問:這起點數字憑什          │\n│ 機的,所以它影響  │ 被它拖動。錨定不需     │ 麼當起點?換個數字          │\n│ 不了我           │ 你相信錨,只需它先      │ 我的估計會不會跟著         │\n│                  │ 出現。                 │ 變?                        │\n├──────────────────┼────────────────────────┼────────────────────────────┤\n│ 我這次估時很實際 │ 你在演「一切順利」     │ 問:同類案子過去實          │\n│ 了,有加 buffer   │ 的故事;buffer 從太     │ 際(非估計)平均花           │\n│ (規劃謬誤)       │ 低的錨往上調,還調      │ 多久?講不出歷史=           │\n│                  │ 不夠。                 │ 你在用內部觀點。           │\n├──────────────────┼────────────────────────┼────────────────────────────┤\n│ 錨定的「不充分調 │ 效果鐵打、複製極成     │ 別把「機制」當已知         │\n│ 整」機制是定論   │ 功;但機制(不充分       │ 去解釋:你能確定它          │\n│                  │ 調整 vs 選擇性可及)    │ 會發生,不能確定它          │\n│                  │ 2026-06 仍有爭議。     │ 為何發生。                 │\n└──────────────────┴────────────────────────┴────────────────────────────┘\n\n```\n\n第一個陷阱(代表性 → 基率忽視)是最隱形的,因為「忽略基率」是一個**你沒做的動作**,不會留下痕跡——你只會覺得「答案很明顯」。唯一可靠的自察方式,是把它變成一個你**主動要問的問題**:「這個判斷裡,『母體比例』那個數字在哪?」如果你答不出來,你十之八九漏了它。\n\n第四個陷阱要特別點:**不要把「錨定的不充分調整機制」當成已知事實去講**。這是寫這一章時我最小心的地方。把「效果存在」和「機制是什麼」分兩層,不是學究的吹毛求疵——它直接決定你能誠實主張什麼。錨定教給你的,除了「第一個數字會拖你」之外,還有一個 meta 層的功課:**一個現象可以「肯定存在」同時「成因未明」,而把這兩層混為一談,本身就是一種思考的陷阱**(ch17 會把這個工具用到一整批縮水的偏誤上)。\n\n## 紙上推演\n\n全是紙筆與口頭推演,沒有要你去跑的程式。算的地方手算,放在 ```text``` 區塊裡。\n\n### 推演題一(★ **[10 分鐘]**):把開價當錨\n\n下面是一段(虛構但逼真的)估點對話。請找出錨在哪、它怎麼拖動後面的估計,並設計一個把錨拿掉的流程。\n\n```text\n資深 A:「這個遷移?喔很簡單啦,我看頂多 2 點。」\n工程師 B:「呃……我本來覺得有點多,不過 2 點……那 3 點?」\n工程師 C:「嗯我也覺得 3 上下吧。」\n共識:3 點。一週後,這張卡實際花了約 8 點的工作量。\n```\n\n問:錨是哪個數字?B 原本「覺得有點多」卻報 3,發生了什麼?要怎麼改流程才能擋掉這個錨?\n\n#### 推演解答\n\n**錨是 A 喊的「2 點」。** 它在任何人獨立思考之前就出現了,於是成為全桌估計的起點。\n\nB 身上發生的是錨定的不充分調整:B 的獨立直覺其實偏高(「覺得有點多」),但他從 A 給的「2」往上調——只調到 3 就收手了,沒調到他原本的直覺位置。C 更糟,他連自己的獨立估計都沒形成,直接繞著已經出現的「3 上下」飄。最後的 3 點不是三個獨立判斷的匯總,是**一個錨被輕微調整後的回音**。\n\n擋掉的流程也很標準:**先獨立、後揭露**。planning poker 的「每個人先各自選牌、數到三同時翻」就是為了這個——在第一個數字汙染大家之前,先讓每個人的獨立直覺落地。常見錯路是把這當成「禮貌問題」(讓資深先講比較不會冒犯),其實它是個**資訊汙染問題**:第一個數字一旦出口,後面就再也拿不到乾淨的獨立估計了。另一個常見錯路是以為「我知道他只是隨口講的,所以不會被影響」——回去看旋轉輪盤:受試者明知數字是亂轉的,照樣被拖。知道錨無意義,**擋不住**錨。\n\n### 推演題二(★★ **[15 分鐘]**):像不像 ≠ 多可能\n\n下面是一個判斷。請指出它用了哪個捷思、漏掉了哪個數字,並說明在什麼情況下這個判斷反而是對的。\n\n```text\n監控告警頁面跳出一條:某台機器的磁碟 I/O 延遲飆高。\n你的第一反應:「這台機器八成是硬碟要壞了,趕快換。」\n理由(你心裡的):這個症狀『就很像』硬碟故障前兆。\n```\n\n問:這用了哪個捷思?它漏掉的「基率」具體是什麼?在什麼脈絡下「八成是硬碟壞了」反而是合理的?\n\n#### 推演解答\n\n**用的是代表性捷思**:你拿「這症狀像不像硬碟故障的原型」當「它是硬碟故障的機率」。症狀**像**硬碟壞,這個「像」很有說服力——但它對基率不敏感。\n\n**漏掉的基率**是:在你的環境裡,「磁碟 I/O 延遲飆高」這個症狀,**有多少比例真的是硬碟壞**,又有多少是別的原因(吵鬧鄰居 noisy neighbor、某個批次任務在猛刷磁碟、檔案系統快取被衝掉、雲廠商底層的暫時抖動)?如果在你的歷史裡,這個症狀十次有八次是「某個任務在刷盤」、只有一次是真的硬碟故障,那麼「八成是硬碟壞了」就把基率整個搞反了——正確的第一反應該是「先看有沒有任務在刷盤」,而不是「換硬碟」。\n\n關鍵:症狀的「指示性」(像不像)和「基率」(這類症狀裡硬碟故障本來佔幾成)是**兩條獨立的訊息**,你只讀了第一條。\n\n**什麼時候「八成是硬碟壞了」反而合理?** 當基率剛好也支持它的時候——比如這批機器用的是一款已知到了壽命末期、社群一片故障回報的特定型號硬碟,那麼「這類症狀裡硬碟故障的基率」本來就高,代表性給的答案剛好對。這正是 ch02 的主旋律:**捷思不是壞掉了,它只是被用對或用錯了脈絡**。在硬碟普遍快壞的脈絡,「像硬碟壞」這個直覺是對的;在硬碟健康、雜訊鄰居常見的脈絡,同一個直覺翻車。常見錯路是把這題答成「所以不該信直覺」——不對,該學的是「信直覺之前,先問一句基率」。\n\n### 推演題三(★★ **[20 分鐘]**):用外部觀點重估一個超時的專案\n\n回想(或虛構)一個你最近超時的專案。原本估兩週,實際做了五週。請用「外部觀點」重估,並指出原本的內部觀點錯在哪一步。\n\n```text\n情境(範例,你可換成自己的):\n  專案:把一個舊的 REST 服務遷到新的 gRPC 介面。\n  原始估計(內部觀點):「介面就那幾個,改一改、測一測,兩週。」\n  實際:五週。\n```\n\n問:用外部觀點怎麼重估?原本的內部觀點在哪一步把基率丟了?\n\n#### 推演解答\n\n**內部觀點的估法**(原始的):腦裡演這一個案子的劇情——「這幾個介面我都熟,改起來很快,測試補一補」。這是在演一個**一切順利的故事**,並拿它當錨。\n\n**外部觀點的重估法**:別問「這個遷移要多久」,問「**過去我(或我們團隊)做過的『把舊服務遷到新介面』這類案子,從開工到真正上線穩定,實際平均花了多久?**」假設你誠實翻一下記憶或工單,發現過去三個類似遷移分別花了 4 週、6 週、5 週——那參照類別給你的估計就是「5 週上下」,而不是「2 週」。\n\n**內部觀點錯在哪一步丟了基率:** 它錯在「只看這個案子的具體劇情、不看同類案子的歷史分布」。那個被丟掉的「同類案子平均要 5 週」,就是基率;丟掉它,就跟工程師-律師問題裡丟掉 70/30 是**同一個動作**——用具體的、生動的、這個案子的細節,蓋過了抽象的、乾癟的、同類案子的歷史比例。代表性捷思讓「這個案子**像**一個兩週能搞定的案子」這個感覺,壓過了「我這類案子**從來**沒有兩週搞定過」這個事實。\n\n常見錯路:以為「外部觀點」就是「多加 buffer」。不是。加 buffer 還是內部觀點——你還是從「兩週」這個錨往上調,而且通常調不夠(回到不充分調整)。外部觀點是**換錨**:把起點從「這個案子的順利劇情」整個換成「同類案子的歷史中位數」。一個是調整,一個是換掉錨點,差別很大。\n\n### 推演題四(★★★ **[25 分鐘]**):兩個捷思,一個現場\n\n下面這段話裡同時藏了代表性、錨定、規劃謬誤。請逐一指認,並說明三者如何合謀。\n\n```text\n架構會議上,某人說:\n「上次那個推薦系統我們三週就上線了,這個新的個人化排序系統\n 看起來規模差不多,我估也是三週。而且這團隊很猛,跟上次那批\n 人一樣強,應該沒問題。」\n```\n\n問:指出這三句裡的代表性、錨定、規劃謬誤各在哪,並說明它們怎麼互相加強。\n\n#### 推演解答\n\n逐句拆:\n\n```text\n「上次推薦系統三週上線」→「這個規模差不多,也三週」\n   ── 錨定:把「三週」這個來自另一個案子的數字當起點,\n      且「規模差不多」是用模糊的相似度在合理化這個錨,沒調整。\n\n「這個排序系統看起來『像』上次那個」\n   ── 代表性:用「兩個系統像不像」當「會不會花一樣久」的代理。\n      但「個人化排序」和「推薦系統」可能在資料管線、線上實驗、\n      冷啟動處理上差很多——「看起來像」對這些藏起來的差異不敏感。\n\n「我估三週、應該沒問題」(隱含:一切順利)\n   ── 規劃謬誤:在演「跟上次一樣順」的最佳情境,\n      用內部觀點(這個案子、這個團隊的具體劇情)蓋過外部觀點\n      (這類『第一次做的個人化系統』歷史上實際多久)。\n\n「這團隊很猛、跟上次一樣強」\n   ── 代表性又一次:用「團隊像不像那個成功過的團隊」當\n      「會不會再成功」的代理,忽略了「上次成功」可能有運氣成分\n      (小樣本——只成功過一次,小數法則)。\n```\n\n**三者怎麼合謀**:錨定提供了一個過低的起點(三週);代表性提供了把這個錨**合理化**的理由(「兩個系統像、兩個團隊像」);規劃謬誤則是這整個樂觀故事的總成——用內部觀點(這個案子的順利劇情)系統性地蓋過外部觀點(同類案子的歷史)。三個捷思不是各自獨立地出錯,是**串成一條生產線**:代表性說服你「這像那個成功案例」,錨定把那個案例的數字搬過來當起點,規劃謬誤讓你把這整個樂觀劇情當成實際估計。\n\n**怎麼拆?** 一句話:「先別管它像不像上次——我們做過幾個『第一次做的個人化排序/評分系統』?那些**實際**從開工到穩定上線花了多久?」這一句同時打掉三者:它用外部觀點換掉錨(規劃謬誤),用「歷史分布」取代「像不像」(代表性),用「實際花的時間」取代「搬來的三週」(錨定)。常見錯路是只反駁「規模沒有差不多吧」——那還在跟對方比「像不像」,你已經輸在他的戰場上了;正確的move是把整個判讀方式從相似度切換到歷史頻率。\n\n## 自我檢核\n\n口頭自答,講得出來才算過。優先答「為什麼」。\n\n1. 代表性捷思「原本對在哪、在哪翻車」?用「分類動物 vs 估機率」這組對照講清楚——它在哪件事上是好工具、被借去量哪件事就出錯?\n2. 工程師-律師問題裡,受試者**沒做**的那個動作是什麼?為什麼「沒做的動作」特別難自我察覺?(這題逼你講清楚基率忽視為何隱形。)\n3. 旋轉輪盤實驗裡,受試者**明知**數字是隨機的,為什麼還是被拖動?「知道錨無意義」為什麼擋不住錨?\n4. 為什麼我說錨定是「站得住的偏誤」?它跟 ch17 那些縮水的偏誤,差別在哪一層——是「效果」這層還是「機制」這層?把這兩層分開講。\n5. 規劃謬誤的兩個引擎(錨定在最佳情境、內部觀點蓋過外部觀點)各是什麼?「內部觀點之所以樂觀,是因為它忽略了基率」——這句話為什麼把規劃謬誤跟工程師-律師問題連成同一回事?\n6. 「外部觀點重估」和「多加一點 buffer」差在哪?為什麼後者其實還是內部觀點?\n7. 把這一章的中央張力用一句話講給另一個工程師聽:這兩個捷思「原本對、在錯的脈絡翻車、而且你犯的當下察覺不到」——你能不舉教科書例子,只用你工作裡的事把它講清楚嗎?\n\n## 延伸閱讀\n\n- Tversky & Kahneman, 〈Judgment under Uncertainty: Heuristics and Biases〉, *Science* 185:1124–1131 (1974)。三捷思的綱領論文,代表性、可得性、錨定的原始出處;旋轉輪盤與工程師-律師問題都在裡面,值得讀原文看設定多乾淨。\n- Kahneman, *Thinking, Fast and Slow* (2011),談錨定與規劃謬誤的章節。康納曼自己用雙系統透鏡重講這兩個捷思,內部觀點 vs 外部觀點的最佳白話版在這裡。\n- Buehler, Griffin & Ross, 〈Exploring the \"Planning Fallacy\"〉, *Journal of Personality and Social Psychology* (1994)。規劃謬誤最有名的實證(學生論文那組數字),讀「實際比最壞情況還慢」那段,對工程師有切膚之痛。\n- Simmons, LeBoeuf & Nelson 等關於錨定機制的近期討論(2010 起)。想看「效果鐵打、機制存疑」這個分層是怎麼吵的,讀這條線——它示範了本書一貫的誠實:別把成因當已知去講。\n- 《馴服隨機》談條件機率與貝氏更新:基率該怎麼乘進去、後驗機率怎麼算——本章只讓你看見直覺在哪丟了基率,真正的演算法在那本。\n- 機率直覺在機率脈絡的正式翻車現場,見本書 ch10(基率忽視)、ch11(合取謬誤)、ch12(賭徒謬誤與小數法則);去偏誤的「外部觀點/參照類別」怎麼當護欄、為什麼「改問法」比「叫自己更小心」有效,見 ch18。\n"}, {"id": "ch05-affirming-consequent", "file": "ch05-affirming-consequent.md", "group": "Part III — 結構壞了", "title": "ch05 — 肯定後件與否定前件：跟內容無關的錯", "md": "# ch05 — 肯定後件與否定前件：跟內容無關的錯\n\n> **本章解決什麼問題**：前面四章都在講捷思——S1 跑了一個對的工具、被錯置到不該用的脈絡。這一章是全書的轉折：我們離開捷思的世界，進入**形式謬誤**。形式謬誤的錯不在「用錯捷思」，而在**推論的邏輯結構本身無效**，與你填進去的內容真假無關。你會看到四種長得很像的條件推論，其中兩種有效、兩種是謬誤；你會看到瓦森（Peter Wason）一個四張卡片的小實驗如何讓九成以上的人——包括邏輯沒問題的聰明人——在純結構檢查上栽跟頭。這是 Part III 的第一章，所以章首附全書路線圖。\n\n```text\n全書地圖：一顆跑著捷思的大腦，如何在錯的脈絡反覆上當——而它察覺不到\n\n  Part I  那台機器 ............... 雙系統與「你察覺不到」\n     ch01 腦裡的快與慢（雙系統登場）\n        |\n        v\n  Part II  對的工具用錯場合 ....... 三大捷思\n     ch02 捷思：省力的代價（捷思總論）\n     ch03 可得性：想得到就以為常見\n     ch04 代表性與錨定：像不像、第一個數字\n        |\n        v\n  Part III  結構壞了 ............. 形式謬誤            ◄ 你在這裡\n     ch05 肯定後件與否定前件\n     ch06 有效不等於為真（有效性 vs 健全性）\n        |\n        v\n  Part IV  脈絡壞了 ............. 非形式謬誤目錄\n     ch07 攻擊型：稻草人・人身・訴諸權威\n     ch08 結構型：假兩難・滑坡・循環・不當類比（含哥德爾濫用）\n     ch09 語言與統計型：模稜兩可・德州神槍手・相關當因果\n        |\n        v\n  Part V  機率直覺崩壞 .......... 人對隨機最不可靠\n     ch10 基率忽視（機制指向《馴服隨機》）\n     ch11 合取謬誤：Linda 與「更具體反而更可能」\n     ch12 賭徒謬誤與小數法則（熱手 2018 翻案）\n        |\n        v\n  Part VI  我想要・我看到・誠實 .. 動機、框架、再現性、收官\n     ch13 確認偏誤與動機性推理\n     ch14 框架效應與損失趨避（規範面指向《決策》）\n     ch15 社會偏誤與從眾\n     ch16 記憶與後見之明\n     ch17 再現性危機：哪些偏誤沒站穩（呼應《科學方法》）\n     ch18 去偏誤：能做到什麼、做不到什麼\n     ch19 偏誤盲點：你對自己最瞎\n     ch20 同一顆大腦，現在你懂它七層（收官）\n```\n\n在進去之前，我想先講清楚這一章和前四章在機制上是**兩種不同的東西**，因為這正是本書最容易被讀者（也包括寫書的我自己）含糊帶過的分界線。\n\n前四章講的是**認知偏誤**：S1 跑了一個原本對的捷思（可得性、代表性、錨定），被你拖到一個它本來不該負責的脈絡，於是給出系統性偏掉的答案。那套故事的框架是「對的工具、錯的場合」。\n\n這一章講的是**形式謬誤**，它**不適用**那套故事。肯定後件不是「一個被用錯場合的捷思」——它是一個**邏輯結構**，這個結構本身無效，跟你拿它去推什麼內容毫無關係。你不能說「肯定後件在某個脈絡是對的」，因為它在**任何**脈絡都不是有效的演繹。等一下我們會看到，雙系統透鏡在這裡只回扣一個方向：**為什麼 S1 會覺得一個無效推論看起來很合理**。注意這句話的精確措辭——不是「肯定後件是個捷思」，而是「S1 對邏輯形式不敏感，憑表面合理度放行了一個無效的形式」。這兩句話差很多，本章從頭到尾守住這個差別。\n\n## 從你已知的出發\n\n`if/then` 是你的母語。你一天寫幾十個條件判斷，閉著眼睛都不會錯。但我要說的是：你寫得出正確的 `if`，不代表你在**讀別人的因果敘述**時不會把 `if` 反過來——而且你不會有感覺。\n\n來看一個你每天都在做、而且每天都在犯這個錯的場景：debug。\n\n你的服務出事了，症狀是 **502 暴增**。你心裡馬上冒出一個假設：「上游那個會逾時的服務又掛了。」這個假設不是憑空來的，它背後有一條你信得過的因果規則：\n\n```text\n規則：若 上游服務逾時（P），則 我們會吐 502（Q）       P → Q\n```\n\n這條規則是對的。上游逾時確實會讓你吐 502。現在你觀察到 **502 暴增（Q 出現了）**，於是你的結論是：\n\n```text\n觀察：502 暴增（Q）\n結論：所以一定是上游逾時（P）                          Q，∴ P ← 等一下\n```\n\n停在這裡。你剛剛做的這一步，叫**肯定後件（affirming the consequent）**。它是一個**形式謬誤**。\n\n問題出在哪？`P → Q` 只保證「上游逾時 ⇒ 會有 502」這個方向。它**完全沒有保證**反過來「有 502 ⇒ 一定是上游逾時」。502 可以有一百種原因：你自己的程式 panic、連線池耗盡、記憶體爆掉、某個 nginx 設定錯了、DNS 解析失敗⋯⋯每一種都會吐 502，每一種都跟上游逾時沒半點關係。`P → Q` 為真，**不蘊含** `Q → P` 為真。\n\n你之所以會直接跳到「一定是上游」，不是因為你邏輯爛，而是因為這個假設**最好想**（可得性，ch03，上次出事就是它）、**最像**那個熟悉的故障原型（代表性，ch04）。捷思在這裡負責「為什麼你偏偏想到這個假設」；但「`P → Q` 加上 `Q`，所以 `P`」這個**推論動作本身**的無效，是純粹的邏輯結構問題，跟你選了哪個假設無關。換成任何別的假設，這個倒推一樣無效。\n\n這就是形式謬誤跟前四章偏誤的分水嶺：**偏誤決定你把哪個內容填進去，形式謬誤決定那個推論的骨架能不能成立**。本章只管骨架。\n\n## 一條規則，四種推論：兩個有效、兩個謬誤\n\n把所有東西收乾淨。一條條件命題 `P → Q`（讀作「若 P 則 Q」），你可以對它做四種推論。只有四種，不多不少，因為你能「肯定／否定」前件 P，也能「肯定／否定」後件 Q，2×2＝4。\n\n```text\n前提：P → Q（若 P 則 Q）\n─────────────────────────────────────────────────────────────\n名稱                          已知      結論      有效?    為什麼\n─────────────────────────────────────────────────────────────\n肯定前件 modus ponens   (MP)  P         ∴ Q       有效     P 成立 ⇒ Q 被規則保證\n否定後件 modus tollens  (MT)  ¬Q        ∴ ¬P      有效     Q 沒發生 ⇒ P 不可能成立\n肯定後件 affirming cons.(AC)  Q         ∴ P       無效     Q 可由別的原因來\n否定前件 denying ante.  (DA)  ¬P        ∴ ¬Q      無效     P 不成立 Q 仍可由別的原因來\n─────────────────────────────────────────────────────────────\n```\n\n這張表是這一章的全部。我下面的任務只有兩件事：(1) 讓你**信服**前兩種有效、後兩種無效，不是靠背、是靠你自己能在腦裡走一遍；(2) 讓你看到自己其實天天在犯後兩種。\n\n先講有效的兩個，它們很短。\n\n**肯定前件（MP）**：規則說「若 P 則 Q」，現在 P 真的成立了，那 Q 一定跟著成立——因為規則就是這麼保證的。這就是你寫 `if (P) { doQ() }` 的全部信任基礎。沒有爭議。\n\n**否定後件（MT）**：規則說「若 P 則 Q」，現在我觀察到 **Q 沒發生**。那 P 能成立嗎？不能。因為如果 P 成立了，規則會強迫 Q 發生；可是 Q 偏偏沒發生，所以 P 一定沒成立。這個推論工程師其實非常熟，它就是**否證**的骨架：「如果是上游逾時，監控一定會看到上游的 timeout 計數上升；可是上游 timeout 計數是平的（¬Q）；所以這次不是上游逾時（¬P）。」你每次用「如果是 X，就該看到 Y；沒看到 Y，所以不是 X」排除一個假設，你用的就是 MT。它有效。\n\n現在是兩個謬誤，這才是重點。\n\n**肯定後件（AC）**：規則「若 P 則 Q」，觀察到 **Q 發生了**，於是斷定 **P 成立**。錯在哪？前面 debug 的例子已經演過：`P → Q` 是單行道，它沒鋪反方向的路。Q 可以有別的來源，所以「Q 出現」不能反推「P 成立」。\n\n要徹底說服自己一個形式無效，最乾淨的辦法是**找一個反例**——一個讓前提全真、結論卻假的填法。內容選得越白癡越好，因為形式謬誤跟內容無關，用白癡內容反而看得最清楚：\n\n```text\nP → Q 填成：若 下雨（P），則 地是濕的（Q）           這條規則沒問題\n已知       ：地是濕的（Q）\n結論（AC） ：所以 下過雨（P）                          ← 無效\n\n反例：有人剛拿水管澆了花。\n      前提「若下雨則地濕」仍然真、「地是濕的」也真，\n      但「下過雨」是假的。前提全真、結論假 ⇒ 推論無效。\n```\n\n只要存在**一個**這種反例，這個推論形式就不可能是有效的，因為「有效」的定義就是「前提真則結論必真、不容許任何例外」。澆花的水管就是那個例外。\n\n**否定前件（DA）**：規則「若 P 則 Q」，觀察到 **P 沒成立（¬P）**，於是斷定 **Q 也不會發生（¬Q）**。一樣用同一條下雨規則打它：\n\n```text\nP → Q 填成：若 下雨（P），則 地是濕的（Q）\n已知       ：今天沒下雨（¬P）\n結論（DA） ：所以 地不會濕（¬Q）                       ← 無效\n\n反例：今天沒下雨，但有人拿水管澆了花。\n      地照樣是濕的。前提全真、結論假 ⇒ 推論無效。\n```\n\n注意 AC 和 DA 其實是同一個錯的兩種長相：它們都偷偷假設了「`P → Q` 也保證 `Q → P`」「`P` 是 `Q` 的**唯一**原因」。一旦 Q 還有別的來源（澆花的水管、別的故障原因），這個唯一性假設就破了，兩種推論一起垮。AC 是「看到結果就咬定那個原因」，DA 是「那個原因沒出現就斷定結果不會有」——它們是把單向蘊含當成雙向的兩面。\n\n我把這個自我複核做完整一次，因為 style-guide 要求我不准跳步、要自己重走一遍：四種形式，MP 與 MT 我找不到任何反例（前提真時結論被強制為真），AC 與 DA 我各自用「澆花的水管」這同一個反例就打穿了。四種都對帳完畢，跟我記憶裡的標準答案一致——但我不是靠記憶下結論的，是靠剛剛那兩個反例。\n\n## 為什麼這四個長得這麼像，你卻分得出對錯——的時候\n\n值得停十分鐘的地方在這裡：四種推論在自然語言裡長得**幾乎一樣**，都是「若…則…，而且…，所以…」。你的 S1 在讀的時候，分辨它們靠的不是邏輯結構，而是「**聽起來順不順**」。而「順」這個感覺，剛好在 AC 和 DA 上最會騙你。\n\n為什麼 AC 特別順？因為現實世界裡，很多 `P → Q` 的關係**確實接近雙向**。「若發燒則體溫高」幾乎可以反過來說。「若這個 API 回 200 則請求成功」在多數情境也近似雙向。S1 從這些「剛好雙向」的例子裡學到一個粗略的捷思：看到 Q 就往 P 想。這個捷思在「P 真的是 Q 唯一原因」的脈絡裡會給對答案——但它**不是**「肯定後件這個形式有效」，它是「S1 憑經驗賭 P 和 Q 雙向」。一旦 Q 有別的來源，賭就輸了，而你不會收到任何「我剛剛做了無效推論」的內在警報。\n\n這就帶到本章唯一的雙系統回扣，而且我要非常小心地措辭，因為這正是 style-guide 反覆強調、最容易講歪的地方：\n\n```text\n雙系統透鏡（ch01）在形式謬誤上的回扣 —— 只有一個方向\n\n  ✗ 不要說：肯定後件是「一個用錯場合的捷思」。\n            （它不是捷思，是一個無效的演繹形式，在任何場合都無效。）\n\n  ✓ 要說的是：S1 對「邏輯形式」不敏感。\n            它讀論證時靠「聽起來合不合理」打分，不檢查結構。\n            AC 和 DA 在自然語言裡聽起來很合理（因為很多現實關係剛好近似雙向），\n            於是 S1 給它「感覺對」、放行。\n            S2 本該做的結構檢查（找反例、問「Q 有沒有別的來源」），被偷懶蓋過了。\n```\n\n換句話說：偏誤的回扣是「哪個捷思在 S1 跑、原本對在哪、在哪翻車」；形式謬誤的回扣是「**為什麼 S1 會覺得一個無效推論看起來有效**」。前者問的是內容怎麼填錯，後者問的是結構檢查為什麼沒做。這是兩個不同的問題，這一章只回答後者。\n\n我認為這是一個比它表面更深的觀察：你的邏輯能力本身沒問題（你寫 `if` 從不寫反），出問題的是「在讀一段自然語言敘述時，S2 有沒有被叫醒去檢查結構」。多數時候沒有。而下一節的瓦森實驗，就是把這件事擺到桌上、量給你看。\n\n## 瓦森的四張卡片：連純結構檢查，九成的人都做錯\n\n1966 年，瓦森（Peter Wason）設計了一個後來變成認知科學經典的小實驗（瓦森四卡片選擇任務，Wason selection task）。它的厲害之處在於：它**只**考你的形式推理，沒有機率、沒有基率、沒有需要背的知識——純結構。然後它告訴你，抽象版的正解率**低於 10%**（多數整理給出 4%–20% 這個區間，視措辭與樣本而定，這裡採 landscape 的「<10%、約九成答錯」並 hedge 為「依研究在 4%–20% 間」；2026-06 查證）。\n\n題目是這樣。桌上四張卡片，每張卡一面是字母、一面是數字。你看到朝上的四面是：\n\n```text\n   ┌─────┐   ┌─────┐   ┌─────┐   ┌─────┐\n   │  E  │   │  K  │   │  4  │   │  7  │\n   └─────┘   └─────┘   └─────┘   └─────┘\n```\n\n規則是：**「若一張卡的一面是母音，則它的另一面是偶數。」** 用我們的記號，令 P＝「這面是母音」、Q＝「另一面是偶數」，規則就是 `P → Q`。\n\n問題：**為了檢驗這條規則有沒有被違反，你最少必須翻開哪幾張卡？**\n\n絕大多數人翻 **E 和 4**。先別往下看，感受一下你自己的直覺指向哪兩張。\n\n正確答案是 **E 和 7**。我們一張一張對帳，每張卡對應上面那張四推論表裡的一格：\n\n```text\n卡片   朝上面    這對應規則的哪一端        翻它能做什麼              該翻?\n──────────────────────────────────────────────────────────────────────\n E     母音(P)   前件成立                  背面若是奇數 → 直接違反規則   要翻 ✓\n K     非母音    前件不成立(¬P)            規則對非母音沒說話 → 翻了沒用  不翻\n 4     偶數(Q)   後件成立                  背面是母音或子音都不違規      不翻 ✗\n 7     奇數(¬Q)  後件不成立(¬Q)            背面若是母音 → 直接違反規則   要翻 ✓\n──────────────────────────────────────────────────────────────────────\n```\n\n把它對回四推論：\n\n- 翻 **E** ＝ 檢查 **MP** 的前件那一端：母音必須配偶數，背面一翻若是奇數，規則當場破。有效、該做。\n- 翻 **7** ＝ 檢查 **MT** 那一端：規則說母音⇒偶數，那麼「不是偶數（奇數）」就**不能**是母音（否則違規）。翻 7 若背面是母音，規則當場破。這正是否定後件 MT 的力量——它是唯一能從「Q 不成立」這端抓到違規的牌。有效、該做。\n- 不翻 **4**：4 是偶數（Q 成立）。翻它想幹嘛？想看背面是不是母音？可是規則**沒說**「偶數一定要配母音」。背面是母音不違規，是子音也不違規。翻 4 等於想用 **AC**（看到 Q 就回頭查 P）去驗證規則——而 AC 無效，翻它得不到任何能判違規的資訊。**多數人翻 4，翻的正是肯定後件那張無效的牌。**\n- 不翻 **K**：K 不是母音（¬P）。規則對非母音完全沒承諾，背面是什麼都不違規。想翻 K ＝ 想用 **DA**（前件不成立就推後件），一樣無效。\n\n看出那個對稱了嗎？**人們最想翻的 E 和 4，剛好是「能證實規則的兩張」；該翻卻沒人翻的 7，是「能否證規則的那張」。** 瓦森本人把這個現象解讀為**確認偏誤的形式版**：人傾向去翻「能讓規則成立」的牌，而不去翻「能讓規則破掉」的牌。但要嚴守本章與 ch13 的分工——確認偏誤的**動機面與詞源**（瓦森更早的 1960 年 2-4-6 任務）是 ch13 的主述，這裡只把四卡片當作一個冷冰冰的證據：**人連這種沒有任何內容干擾的純結構檢查，都系統性地偏向選能證實的卡、漏掉那張靠 MT 才抓得到的否證卡。**（2-4-6 任務見 ch13。）\n\n這裡有個讓人坐立難安的細節，我認為是本章最值得記住的一頁：**換個脈絡，同一個邏輯結構，正解率會暴漲。** 把規則換成「若一個人在喝啤酒（P），則他必須年滿 18 歲（Q）」，卡片換成「喝啤酒／喝可樂／22 歲／16 歲」，請你當查緝的警察抓違規——這時多數人輕鬆翻對「喝啤酒」和「16 歲」（即 P 與 ¬Q）。Griggs & Cox 1982 的這類具體版把正解率從抽象版的約兩成拉到約 74%（2026-06 查證）。\n\n這件事的反直覺在於：**邏輯結構一模一樣（都是檢查 `P → Q` 要翻 P 和 ¬Q），難度卻天差地別。** 你的形式推理能力不是一個穩定的、隨時可調用的模組；它高度依賴題目用什麼內容包裝、有沒有把問題框成一個你熟悉的「抓違規」社會場景。抽象符號喚不醒 S2 去做結構檢查，「抓偷喝酒的未成年人」就喚得醒。這恰恰印證了本章的雙系統回扣：S1 不檢查結構，而能不能把 S2 叫起來做結構檢查，靠的不是邏輯本身，是包裝。\n\n## 直覺的陷阱\n\n形式謬誤這一章，最容易被三件事帶下溝。\n\n```text\n陷阱清單（形式謬誤）\n──────────────────────────────────────────────────────────────────\n最常見的誤解            錯誤直覺在哪一步帶你下溝          怎麼自我察覺\n──────────────────────────────────────────────────────────────────\n①「肯定後件是個被        把它硬塞進「對的捷思／錯的脈        當你想說「肯定後件在某\n  用錯場合的捷思」        絡」框架——但它不是捷思，是        些場合是對的」時打住：\n （把它跟 ch03/04        無效的演繹形式，在任何場合          有效形式在任何填法下前\n  的偏誤混為一談）        都無效。捷思語言只能解釋「為        提真則結論真；AC 你隨手\n                        何人感覺它有效」，不能解釋          就能舉澆花反例，所以它\n                        「它有效」（因為它本來就無效）。     不是「有時對」，是恆無效。\n\n②「他犯了肯定後件，        從「推論無效」跳到「結論為假」。    分清楚：謬誤只證明「這個\n  所以他的結論一定錯」     無效的論證，結論可能剛好為真         論證沒成功支持結論」，\n （訴諸謬誤，ch06        （上游逾時這次剛好真的是 502         不證明結論本身真假。要\n  詳述）                 的原因，只是你不能用 AC 證它）。      判結論，得另外查證。\n\n③「我寫 if 從不寫反，      把「會寫正確的 if（建構規則）」     讀別人的因果敘述時，主動\n  所以我不會犯這種錯」     誤當成「讀因果敘述時不會把箭         把它翻成 P→Q，問一句：\n                        頭讀反」。前者是 S2 在控制下         「我是在用 MP/MT，還是\n                        慢慢寫，後者是 S1 在快速放行。       在用 AC/DA 倒推？Q 有沒\n                        瓦森證明了後者九成的人會錯。         有別的來源？」\n──────────────────────────────────────────────────────────────────\n```\n\n具名陷阱我點第一個：**把肯定後件講成「一個用錯場合的捷思」**。這是本書最危險的混淆，連寫書的人都得時時提醒自己。前四章你被訓練得太順了——看到一個思考錯誤，反射地想套「對的捷思、錯的脈絡」。但形式謬誤不吃這套。肯定後件沒有「對的脈絡」；它在所有脈絡都無效。捷思語言唯一能解釋的，是「**為什麼人會覺得它有效**」（因為 S1 賭很多現實關係近似雙向、憑表面合理度放行），而不是「它何時有效」。一句話的試金石：如果你能對一個推論形式說「它在某某場合是對的」，它八成是捷思（ch03/04）；如果你只能說「它聽起來對但其實無效、隨手能舉反例」，它是形式謬誤（本章）。\n\n順帶守一個下一章會展開的陷阱②（訴諸謬誤 / fallacy fallacy）：發現對方用了肯定後件，**不等於**對方的結論錯。它只說明「這個論證沒能證明結論」。結論可能恰好為真，只是你得用別的、有效的方式去支持它。這條留給 ch06 細講，這裡先埋。\n\n## 紙上推演\n\n### 推演題一（★，[10 分鐘]）：把白話翻成結構，標出推論型\n\n下面三段話各是一段日常／工程推理。把每段翻成 `P → Q` 的結構，標出它用的是 MP／MT／AC／DA 哪一種，並判定有效或謬誤。\n\n```text\n(a) 「如果這次部署有問題，健康檢查一定會變紅。健康檢查現在是綠的，\n     所以這次部署沒問題。」\n\n(b) 「資深工程師寫的程式碼通常品質高。這段程式碼品質很高，\n     所以八成是資深工程師寫的。」\n\n(c) 「如果使用者按了登出，session 就會被清掉。這個使用者沒按登出，\n     所以他的 session 還在。」\n```\n\n#### 推演解答\n\n**(a)** 規則：若 部署有問題（P）→ 健康檢查變紅（Q）。已知：健康檢查是綠的，即 ¬Q。結論：部署沒問題，即 ¬P。形式：`¬Q，∴ ¬P` ＝ **否定後件（MT）＝有效**。\n\n但這裡要加一句工程師的誠實註記：MT 在邏輯上有效，**前提是那條規則真的成立**——「部署有問題就一定會讓健康檢查變紅」。如果健康檢查根本沒覆蓋這次部署改動的那塊（規則其實是假的），那結論再有效也不可信。**有效 ≠ 可信**，這個分界是 ch06 的主題。本題只問形式：形式是有效的 MT。\n\n**(b)** 規則：若 資深工程師寫（P）→ 品質高（Q）。已知：品質高，即 Q。結論：資深工程師寫，即 P。形式：`Q，∴ P` ＝ **肯定後件（AC）＝謬誤**。反例隨手可得：一個用心的新人、或一段被 linter／reviewer 救過的程式碼，品質一樣高，但 P 為假。品質高有別的來源，所以「品質高」不能反推「資深寫的」。\n\n**(c)** 規則：若 按了登出（P）→ session 被清（Q）。已知：沒按登出，即 ¬P。結論：session 還在，即 ¬Q。形式：`¬P，∴ ¬Q` ＝ **否定前件（DA）＝謬誤**。反例：session 過期、被管理員強制踢、伺服器重啟導致 session store 清空——這些都讓 session 不在，但使用者沒按登出。「沒按登出」不蘊含「session 還在」，因為 session 消失有別的途徑。\n\n常見錯路：(a) 很多人會憑「結論聽起來對」就放過去而不標形式，但本題它**剛好**是有效的 MT，重點是你要能說出「為什麼有效」而不是「感覺對」；(c) 最容易被誤判成有效，因為「沒登出所以還在」聽起來理所當然——這正是 DA 最會騙人的地方，它在「P 是 Q 的唯一原因」這個錯誤假設下才成立，而現實裡 session 消失從來不只一條路。\n\n### 推演題二（★★，[15 分鐘]）：debug 現場的肯定後件\n\n回想（或設想）一次你 debug 的經驗，符合這個模式：你看到某個症狀，立刻咬定某個原因，查了半天才發現原因不對、繞了遠路。把它寫成 `P → Q` 結構，指出你在哪一步犯了肯定後件，再寫出一個「用否定後件去否證假設」的替代流程。\n\n#### 推演解答\n\n這題沒有標準答案，但有標準的**骨架**。範例：\n\n```text\n症狀：API 延遲飆高（Q 出現了）\n你心裡的規則：若 資料庫慢（P）→ API 延遲飆高（Q）       P → Q（這條對）\n你的推論：延遲飆高了（Q），所以一定是資料庫慢（P）       Q,∴P ＝ AC，謬誤\n你做的事：盯著 DB 的慢查詢 log 找了 40 分鐘，沒找到。\n\n問題：延遲飆高有別的來源——GC 停頓、下游逾時、連線池滿、\n      某個剛上線的 N+1。Q 不只 P 一個來源，所以 Q 不能反推 P。\n\n替代流程（用 MT 主動否證每個假設）：\n  假設「是 DB 慢」⇒ 若真，DB 的 P99 query time 一定也飆。\n  去看 DB P99：平的（¬Q'）。\n  ∴ 不是 DB（¬P）。               ← 一個 MT，30 秒排除一個假設\n  接著對「GC 停頓」「下游逾時」各做一次同樣的 MT 否證。\n```\n\n關鍵差別：肯定後件是「看到結果、往最順的原因撲過去、只找支持它的證據」；否定後件式的 debug 是「對每個候選原因問『如果是它，我**必定**會看到什麼？』，然後去看那個東西**在不在**——不在就果斷排除」。後者把「找證實」換成「找否證」，一個 MT 三十秒砍掉一個假設，比死盯一個 AC 假設快得多。（這條「主動找否證」的思路，動機面會在 ch13 確認偏誤展開；本章只取它的形式版。）\n\n常見錯路：把替代流程寫成「再找一個假設來肯定」——那只是換一張 AC 的牌翻，沒有跳出謬誤。真正的解法是改用 MT 的方向：問「若 X 為真，必有什麼可見後果？沒看到就排除 X」。\n\n### 推演題三（★★，[15 分鐘]）：講清楚瓦森四卡片\n\n不看上面的對帳表，用你自己的話對另一個工程師講清楚：規則「若一面是母音則另一面是偶數」（卡片 E／K／4／7），該翻哪兩張、為什麼，以及為什麼多數人翻錯的那張（4）對應的是哪個無效推論。\n\n#### 推演解答\n\n標準講法：規則是 `P → Q`，P＝母音、Q＝偶數。要檢驗一條 `P → Q` 規則有沒有被違反，你只需要翻**兩種卡**：前件成立的（P）和後件**不**成立的（¬Q）。\n\n- 翻 **E**（P）：母音這面背後必須是偶數，翻開若是奇數，當場抓到違規。\n- 翻 **7**（¬Q）：7 是奇數（非偶數）。規則說母音必配偶數，反過來說「非偶數」就不准是母音；翻開若是母音，當場抓到違規。這張靠的是否定後件 MT——「Q 不成立 ⇒ P 不能成立」。\n- 不翻 **4**（Q）：偶數背後是母音或子音都不違規（規則沒說偶數一定配母音）。想用「看到偶數就回頭驗母音」＝肯定後件 AC，無效，翻了得不到判違規的資訊。多數人翻 4，翻的就是這張 AC 的牌。\n- 不翻 **K**（¬P）：非母音規則沒管，翻了沒用（對應 DA）。\n\n為什麼多數人錯：人傾向去翻「能讓規則成立／看起來相關」的牌（E 和 4），而漏掉那張唯一能**否證**規則、要靠 MT 才抓得到的 7。這是確認偏誤的形式版——但記得，這裡只取它「人連純結構檢查都偏向找證實」的形式面，動機與詞源在 ch13。\n\n常見錯路：(1) 翻 E 和 4（最經典的錯，把 AC 那張當成該翻）；(2) 翻 E、4、7 三張（多翻了沒用的 4，雖然 7 對了）；(3) 把「該翻 7」的理由說成「7 是奇數所以可疑」——理由不夠精確，正確理由是「7＝¬Q，而檢驗 `P→Q` 必須查 ¬Q 那端會不會偷偷配上 P」。能把「為什麼是 ¬Q 那張」講清楚，才算真懂。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂。優先回答「為什麼」。\n\n1. 為什麼「肯定後件是一個用錯場合的捷思」這句話是錯的？形式謬誤和前四章的偏誤，在機制上差在哪？\n2. 給定 `P → Q`，為什麼 MP 和 MT 有效、AC 和 DA 無效？你能不能不靠背、用「`P → Q` 是單行道、Q 可以有別的來源」這一句話把四個都推一遍？\n3. 「找一個反例」為什麼足以證明一個推論形式無效？為什麼反例的內容選得越白癡越好？\n4. 雙系統透鏡在這一章只回扣一個方向，是哪個方向？為什麼不能說「肯定後件是 S1 跑的一個捷思」、只能說「S1 對邏輯形式不敏感、憑表面合理度放行」？\n5. 瓦森四卡片題，該翻哪兩張？多數人翻錯的那張（4）對應哪個無效推論？沒人翻的那張（7）靠哪個有效推論才抓得到違規？\n6. 為什麼把規則換成「喝酒要滿 18 歲」、正解率就從約兩成跳到約七成？同一個邏輯結構，難度差別說明了你的形式推理能力是什麼性質的東西？\n7. 「他犯了肯定後件，所以他的結論一定錯」——這句話本身為什麼也是個錯誤？（這條接 ch06。）\n8. debug 時，你怎麼把一個肯定後件式的歸因（看到症狀就咬定原因）改寫成否定後件式的否證流程？\n\n## 延伸閱讀\n\n- **Wason selection task（Wikipedia 條目）** — https://en.wikipedia.org/wiki/Wason_selection_task ：四卡片任務的標準陳述、抽象版約 <10% 正解、具體脈絡版（喝酒年齡）大幅提升的整理，本章四卡片對帳的事實來源（2026-06 查證）。讀「abstract version」與「content effects」兩段就夠。\n- **Griggs & Cox 1982，具體脈絡的促進效應** — https://bpspsychub.onlinelibrary.wiley.com/doi/abs/10.1111/j.2044-8295.1982.tb01823.x ：把抽象正解率約兩成拉到約 74% 的「喝酒年齡」版原始研究，想確認「脈絡能救形式推理」這個反直覺結論的人值得看摘要。\n- **「If P then Q: Modus Ponens, Modus Tollens…」（Philosophy A Level）** — https://philosophyalevel.com/posts/if-p-then-q-modus-ponens-modus-tollens/ ：四種條件推論的有效／無效對照講得乾淨，附反例，適合當本章四推論表的補充練習。\n- **本書 ch06（有效不等於為真）** — 緊接著拆開「論證有效」與「結論為真」：形式對了結論仍可能假（前提錯）、形式錯了結論仍可能真（訴諸謬誤）；本章埋的陷阱②在那裡展開。\n- **本書 ch13（確認偏誤與動機性推理）** — 四卡片揭示的「人偏向找證實」在那裡從形式面進到動機面，並補上更早的瓦森 1960 年 2-4-6 任務（確認偏誤的詞源）。\n"}, {"id": "ch06-validity-vs-soundness", "file": "ch06-validity-vs-soundness.md", "group": "Part III — 結構壞了", "title": "ch06 — 有效不等於為真：有效性 vs 健全性", "md": "# ch06 — 有效不等於為真：有效性 vs 健全性\n\n> **本章解決什麼問題**：ch05 立起「形式謬誤＝結構壞了」，但留下一個危險的副作用——很多人讀完會反過來相信「結構壞了，結論就一定是錯的」。這一章把這個誤會徹底拆掉。我們要分開兩個被日常語言攪在一起的概念：論證**有效（valid）**＝「前提若真、結論必真」的結構保證，與論證**健全（sound）**＝「有效，而且前提真的全為真」。形式對了結論仍可能假（前提錯），形式錯了結論仍可能真（瞎貓碰上死耗子）。這是評估任何論證的核心工具，也是 Part IV 整個非形式謬誤目錄的鑰匙：因為大多數非形式謬誤都藏在沒講出來的前提（隱藏前提）裡，你得先學會「把論證的骨架攤開、看它哪裡是結構、哪裡是前提真假」，才抓得到它們。\n\n## 從你已知的出發\n\n你每天都在跟一個你早就懂、卻可能沒命名過的區別打交道：**「測試過了」不等於「需求對了」。**\n\n想一次 CI 全綠、但功能還是錯的經驗。發生了什麼？你的程式碼**正確地實現了你寫下的規格**——輸入經過邏輯，輸出符合斷言，這一段是對的、是「有效」的：給定這些前提（規格、輸入假設），這個輸出**必然**跟著來。問題出在更上游：那份規格本身錯了。需求理解錯了、邊界條件漏了、PM 給的假設根本不成立。**推論無懈可擊，前提是爛的。**結果就是一個「形式正確、結論錯誤」的系統。\n\n這正是邏輯學裡「**有效但不健全（valid but unsound）**」的工程版：\n\n```text\n你的系統                          邏輯學的講法\n────────────────────────────  ──────────────────────────────\n程式碼正確實現了規格           推論有效（valid）：前提→結論的步沒問題\n規格本身是錯的                 前提為假\n所以功能是錯的                 所以結論不可信（論證不健全 unsound）\n                              ── 但「不健全」不代表「結論一定假」\n```\n\n反過來的情形你也見過：有人用一個**爛到不行的理由**，得出一個**剛好正確**的結論。「這個服務一定有 memory leak，因為它是 Java 寫的」——理由是胡扯（Java 不蘊含 leak），但這個服務**確實**正好有 leak（被別的原因造成）。理由錯了，結論對了。如果你因為「他的推理很爛」就反過來咬定「所以根本沒 leak」，你會在生產環境踩雷。\n\n這兩種錯位——**對的推理＋錯的前提**、**錯的推理＋對的結論**——是本章的全部。日常語言把「他講得有道理」「他說的是對的」「他的邏輯對」全攪成一坨，工程師其實有更精細的直覺，只是平常沒把它從程式碼搬到論證上。這一章就是搬過來。\n\n## 兩個被攪在一起的問題：結構，與內容\n\n評估一段推理，其實是在問兩個**完全獨立**的問題。把它們攪在一起，是日常爭論裡最常見的混亂來源。\n\n```text\n問題一（結構）：如果前提都是真的，結論是不是「非真不可」？\n   → 這是「有效性 valid」。只看推論的形狀，不看前提是不是真的。\n\n問題二（內容）：前提，實際上，是不是真的？\n   → 這是前提的真假。要查事實、要查證據，不是邏輯的事。\n\n論證健全（sound） = 問題一答「是」（有效） AND 問題二答「是」（前提全真）\n```\n\n關鍵在於：**這兩個問題互不干涉。** 你可以有效卻前提全假，可以無效卻前提全真，可以無效卻結論碰巧為真。把四種組合攤開看（這是本章最該記住的一張表，後面 worked example 會逐格填具體例子）：\n\n```text\n四象限（有效性 × 前提真假 → 結論可信度）\n\n  有效 ＋ 前提全真  →  健全 sound      →  結論「必」為真  ★唯一能擔保的一格\n  有效 ＋ 前提有假  →  有效但不健全     →  結論真假未定    （形式對、地基爛）\n  無效 ＋ 前提全真  →  無效            →  結論真假未定    （前提真也救不了爛結構）\n  無效 ＋ 前提有假  →  無效            →  結論真假未定    （兩頭都爛）\n\n唯一一格擔保結論為真：有效 ＋ 前提全真 ＝ 健全。其餘三格，結論都可真可假。\n```\n\n讀懂這張表，你就讀懂了本章一半。注意右下到左上那條對角線：**只有左上角那一格**，能讓你從「論證」安全地走到「結論為真」。其他三格，結論的真假**這張表管不著**——你得另外去查事實。\n\n這跟有效性的官方定義是同一回事，只是換句話講。邏輯學對「有效」的定義是（這是恆真的邏輯定義，不靠 landscape，但我在這裡自我複核一遍）：\n\n> 一個演繹論證是**有效**的，若且唯若**不可能**「前提全真、而結論為假」同時成立。\n\n換句話說，有效＝「前提真」這件事，**鎖死了**「結論真」。它不保證前提真——它只保證**這個鎖是好的**。鎖好不好，跟門後有沒有東西，是兩回事。健全＝鎖是好的（有效）**而且**門後真的有東西（前提真）。\n\n（這裡的「有效」是**演繹**論證的標準。歸納論證——從觀察推一般規律——沒有這種「前提真則結論必真」的鐵保證，它只有「強／弱」的程度差別：前提真讓結論**更可能**真，但不擔保。本書談的形式有效性是演繹的事；歸納的可靠性是另一套，本書點到，機率機制指向《馴服隨機》。）\n\n## 為什麼這對「形式謬誤」這麼重要：別把無效當成假\n\n回到 ch05。你學了肯定後件、否定前件是無效的推論形式。一個誠實的危險就在這裡：學完「這種推論無效」，大腦的 S1 會偷偷塞給你一個結論——「**所以他講的是錯的**」。\n\n不對。**無效的論證，結論可能是真的。**\n\n```text\n前提：若這個服務記憶體爆了（P），它會被 OOM killer 殺掉（Q）   P → Q\n觀察：它被殺掉了（Q）\n結論：所以它記憶體爆了（P）                              ← 肯定後件，無效\n\n這個推論是無效的（Q 也可能是別人手動 kill、是 OOM 以外的訊號）。\n但——這個服務「實際上」可能真的就是記憶體爆了。\n推論無效 ≠ 結論為假。它只是「這條推論沒有成功證明結論」。\n```\n\n「無效」說的是**這條路沒走通**，不是**目的地不存在**。OOM killer 殺它的那一刻，它的記憶體可能真的爆了——只是「被殺掉」這個觀察，本身**推不出**那個結論，因為還有別的路通往「被殺掉」。你要證明它記憶體爆了，得去看別的證據（記憶體曲線、OOM 的 dmesg log），不能靠「它被殺了」這一步。\n\n這裡也順手回扣一次本書脊椎的分野（見 ch01 的雙系統透鏡，也守住 ch05 立的界線）：形式謬誤之所以無效，是**邏輯結構的事**，跟用了哪個捷思無關。雙系統在這裡只解釋一件事——**為什麼 S1 會覺得「它被殺了，所以記憶體爆了」聽起來很合理**：因為 S1 對邏輯形式不敏感，它只感覺「P 和 Q 常常一起出現、這聽起來順」，就把答案放行了，S2 該做的結構檢查（「Q 是不是還有別的來源」）被省力預設蓋過。**這不是某個捷思被錯置，是 S1 根本沒在做結構檢查。** 別把肯定後件本身講成一個捷思。\n\n## worked example：四種組合，逐格填具體例子\n\n把上面那張四象限表，用工程情境逐格填滿。每一格我都標清楚「哪裡是結構、哪裡是前提真假」，並走一遍判定。慢一點，這張表是本章的骨。\n\n```text\n═══════════════════════════════════════════════════════════════\n格 ①：有效 ＋ 前提全真 ＝ 健全（結論「必」為真）\n═══════════════════════════════════════════════════════════════\n前提1：所有通過型別檢查的程式，都沒有「把字串當數字加」的型別錯誤  P → Q\n前提2：這支程式通過了型別檢查                                    P\n結論：所以這支程式沒有「把字串當數字加」的型別錯誤              ∴ Q\n\n結構：肯定前件（modus ponens），有效。\n前提真假：前提1 在「TypeScript strict 模式、無 any、無 as 斷言」\n         的限定下成立；前提2 可查 CI。兩前提都真。\n判定：有效 ＋ 前提全真 ＝ 健全。結論「必」為真。\n      （注意前提1 的限定條件——一旦混進 any/as，前提1 就變假，\n        論證掉到格②。地基的脆弱性藏在前提，不在推論。）\n\n═══════════════════════════════════════════════════════════════\n格 ②：有效 ＋ 前提有假 ＝ 不健全（結論真假未定）\n═══════════════════════════════════════════════════════════════\n前提1：所有 5xx 錯誤都是後端的責任                              P → Q\n前提2：這次事故是 5xx                                          P\n結論：所以這次事故是後端的責任                                  ∴ Q\n\n結構：肯定前件，有效。推論本身無懈可擊。\n前提真假：前提1 為假——5xx 也可能是上游 LB 設定、DNS、\n         打到後端前就壞掉。前提1 是個被偷渡的過度概括。\n判定：有效但不健全。結論「真假未定」：\n      這次事故「可能」真是後端責任，也可能不是——\n      這個論證本身擔保不了。要查事故根因，不能靠這段推論。\n      ★ 這格就是「CI 全綠但需求錯」的邏輯本體：推論對、前提爛。\n\n═══════════════════════════════════════════════════════════════\n格 ③：無效 ＋ 前提全真 ＋ 結論碰巧為真\n═══════════════════════════════════════════════════════════════\n前提1：若服務有 memory leak（P），長跑後記憶體會持續上升（Q）   P → Q\n前提2：這服務長跑後記憶體持續上升（Q）                          Q\n結論：所以這服務有 memory leak（P）                            ∴ P\n\n結構：肯定後件（affirming the consequent），無效。\n      反例：記憶體上升也可能是正常快取暖機、連線池長大，不是 leak。\n前提真假：兩個前提都真（leak 確實會讓記憶體升；它確實在升）。\n結論真假：這服務「實際上」可能真的有 leak——結論碰巧為真。\n判定：無效。即使前提全真、即使結論碰巧真，\n      這條推論「沒有成功證明」結論。你不能靠它下結論。\n      ★ 前提全真也救不了爛結構——這是格③要你記住的。\n\n═══════════════════════════════════════════════════════════════\n格 ④：無效 ＋ 前提有假（兩頭都爛，但結論仍可能碰巧真）\n═══════════════════════════════════════════════════════════════\n前提1：若一個語言會自動垃圾回收（P），就不可能有記憶體問題（Q） P → Q\n前提2：這服務沒有記憶體問題（Q）                                Q  （而且這前提還是假的）\n結論：所以它用的是會自動垃圾回收的語言（P）                     ∴ P\n\n結構：肯定後件，無效。\n前提真假：前提1 為假（GC 語言照樣會 OOM、會 leak）；\n         前提2 也可疑。兩頭都爛。\n判定：無效且不健全。結論（它用 GC 語言）就算碰巧為真，\n      這段推理也一文不值。\n═══════════════════════════════════════════════════════════════\n```\n\n把四格放在一起看，一個事實會跳出來，而它正是本章最該讓你坐立難安的地方：**「結論是不是真的」這個你最在乎的問題，這四格裡有三格給不出答案。** 只有格①（健全）能擔保結論。其餘三格，你都得放下這段論證、另外去查事實。\n\n我認為這是整本書裡最實用的一頁，因為它直接對應你 debug 的處境：很多時候你聽完一段聽起來很順的事故歸因（格②），或一段邏輯有洞但結論你早就信的猜測（格③），你的 S1 已經點頭了。這張表逼你的 S2 多問一句：**這是結構的問題，還是前提的問題？** 兩者要用完全不同的方法去驗。\n\n## 隱藏前提：非形式謬誤都藏在這裡（Part IV 的鑰匙）\n\n現實裡幾乎沒有人會把論證寫成上面那種「前提1、前提2、結論」的乾淨三段。真實的論證長這樣：\n\n> 「這個方案不能用，它需要改 schema。」\n\n這不是一個完整論證——它**省略了**一個沒講出來的前提。邏輯學給這種「缺了一塊的論證」一個名字：**省略三段論（enthymeme，亦稱省略論證）**，亞里斯多德在《修辭學》裡就討論過。它的定義是：**一個有前提被省略、靠聽者自己補上的論證**（這個定義我查證過，見延伸閱讀）。前提被省略，通常是因為「太顯然、不用說」——但**陷阱也正在這裡**：那塊沒講出來的前提，往往就是整段論證最可疑、最該被質疑的地方，省略它正好讓它躲過檢查。\n\n把上面那句話的隱藏前提補出來：\n\n```text\n明說的前提：這個方案需要改 schema\n隱藏前提  ：（任何需要改 schema 的方案都不能用）   ← 沒講出來的那塊\n結論      ：所以這個方案不能用\n\n補出來之後，論證變成有效的肯定前件（modus ponens）：\n  改 schema → 不能用 ；  要改 schema ；  ∴ 不能用\n結構沒問題。但那個隱藏前提「任何需要改 schema 的都不能用」——\n真的嗎？這是個極端的過度概括。論證的真正弱點不在明說的話，\n在那塊被當成「顯然」而省略掉的前提。\n```\n\n**這就是 Part IV（非形式謬誤）的鑰匙。** ch07 開始的稻草人、假兩難、滑坡、循環論證……它們大多不是「結構無效」（那是 ch05 形式謬誤的事），而是**藏了一個爛前提在沒講出來的地方**。要抓到它們，你得先做這一步：**把論證重建完整，把隱藏前提攤到陽光下，再單獨檢查那塊前提真不真。** 重建論證，是讀懂 Part IV 之前必須先練的功。\n\n重建隱藏前提的工程直覺：這跟你讀別人程式碼時「找出被默默假設、但沒寫進去的不變量（invariant）」是同一個動作。一段程式碼「能跑」常常靠一堆沒寫出來的假設（「這個 list 永遠非空」「這個欄位永遠不是 null」「上游一定先呼叫過 init」）。論證也一樣，靠一堆沒講出來的前提撐著。把它們挖出來、寫下來、逐一質疑——這對你不是新技能，只是換了個場域。\n\n## 直覺的陷阱\n\n本章的招牌陷阱，是上面那條「無效≠假」延伸出的、有自己名字的具名謬誤。\n\n**具名陷阱：訴諸謬誤 / 謬誤謬誤（the fallacy fallacy，又稱 argument from fallacy）。**\n\n它長這樣：「**你犯了謬誤，所以你的結論是錯的。**」這句話本身，就是一個謬誤。\n\n為什麼？因為「對方的論證沒成功支持結論」只證明了一件事——**這個論證失敗了**。它**沒有**證明「結論為假」。結論可能仍然是真的，只是對方剛好用了爛理由去支持它（回去看 worked example 的格③）。指出對方犯了謬誤，你贏得的是「他這段論證不算數」，**不是**「他錯了」。我查證過這個定義（見延伸閱讀，Internet Encyclopedia of Philosophy 與 landscape T10 一致）：argument from fallacy ＝ 因為一個支持某結論的論證有缺陷，就斷定該結論為假。\n\n```text\n最常被誤解成什麼 / 錯誤直覺在哪一步把你帶下溝 / 怎麼自我察覺\n──────────────────────────────────────────────────────────────\n誤解①：「形式謬誤 → 結論一定是錯的」\n  下溝點：學完 ch05「肯定後件無效」，S1 自動把「無效」翻譯成\n          「假」。但無效只是「這條路沒走通」，不是「目的地不存在」。\n  自我察覺：當你聽到「他犯了 XX 謬誤」就準備宣布對方錯了——停。\n          先問：我證明的是「這條論證失敗」，還是「結論為假」？\n          十之八九只是前者。結論還沒判，得另外查。\n\n誤解②：「他講得頭頭是道（有效），所以他是對的（結論真）」\n  下溝點：把「有效」當「健全」。推論順暢只擔保結構，不擔保前提。\n          一個有效論證可以從荒謬前提推出荒謬結論，一路順暢。\n  自我察覺：聽完一段順到無法反駁的論證、卻隱隱覺得結論不對——\n          別懷疑自己。去查它的前提，尤其是那塊沒講出來的隱藏前提。\n          順暢是結構的事；結論真假在前提那邊。\n\n誤解③：「相關方論證有漏洞 → 整個立場都垮」\n  下溝點：訴諸謬誤的社交版。辯論中很爽，但邏輯上你只擊倒了\n          一個論證，沒擊倒結論。對方換個好論證，結論可能照樣站。\n  自我察覺：你很想用「你這是 OO 謬誤！」結束討論時，提醒自己：\n          這頂多讓對方「這一招」失效，不讓對方「這個結論」變錯。\n```\n\n這個陷阱的危險，在於它讓「學過邏輯謬誤的人」變得**更容易**犯錯——因為你手上多了一把錘子（謬誤的名字），看什麼都像釘子。學會辨認謬誤的真正用途是「**降低你對這個論證的信任**」，不是「**反向斷定結論為假**」。論證失敗，結論待議——這是受過訓練的懷疑者該停在的地方。\n\n## 紙上推演\n\n純紙筆，不用跑任何程式。建議準備紙筆，把論證的骨架真的畫出來——「攤開結構」這件事，用看的會自我感覺良好、用寫的才會發現你漏了哪塊前提。\n\n---\n\n**第 1 題（★，[10 分鐘]）：判定四象限。** 下面三段推理，各判定它落在本章四象限表的哪一格（健全／有效但不健全／無效＋前提真／無效＋前提假），並說明你的判定理由（哪裡是結構、哪裡是前提真假）。\n\n```text\n(a) 前提1：所有部署到 prod 的版本都跑過 staging\n    前提2：v2.3 部署到了 prod\n    結論：v2.3 跑過 staging\n(b) 前提1：若快取掛了，延遲會飆高\n    前提2：延遲飆高了\n    結論：快取掛了\n(c) 前提1：所有用 Rust 寫的服務都沒有資料競爭（data race）\n    前提2：這個服務沒有資料競爭\n    結論：這個服務是用 Rust 寫的\n```\n\n---\n\n**第 2 題（★★，[15 分鐘]）：重建隱藏前提並判定健全性。** 把下面這句真實會出現在設計討論裡的話，重建成完整論證（補出隱藏前提），判定它**有效**嗎、**健全**嗎，並指出它真正的弱點在哪。\n\n> 「我們不該引入這個 library，GitHub 上它兩年沒更新了。」\n\n---\n\n**第 3 題（★★,[15 分鐘]）：拆訴諸謬誤。** 一位同事在 PR review 說：\n\n> 「你這個論點犯了滑坡謬誤——『不加這個 lock 就會資料損毀、然後客訴、然後公司倒閉』。所以根本不需要加這個 lock。」\n\n請解釋：這位同事的反駁，本身犯了什麼謬誤？把它拆開：原本那段話的問題是什麼、同事的反駁多走了哪一步變成謬誤、那個 lock 到底該不該加這件事，現在處於什麼狀態？\n\n---\n\n**第 4 題（★★★，[20 分鐘]）：構造反例。** 請各自構造一段**你工作領域**的論證，滿足：\n- (a) 有效但不健全（推論無懈可擊，但因為某個前提是假的，結論不可信）；\n- (b) 無效但結論碰巧為真（推論是肯定後件或否定前件，前提也許都真，但結論之所以真不是這段推論的功勞）。\n構造完，對 (b) 明確指出：如果有人**靠這段論證**去下決策，會在什麼情況下踩雷？\n\n---\n\n### 推演解答\n\n**第 1 題。**\n\n- **(a) 健全。** 結構是肯定前件（部署 prod → 跑過 staging；v2.3 部署 prod；∴ 跑過 staging），有效。前提1（在「有強制 staging gate 的 pipeline」這個脈絡下）為真、前提2 可查，前提全真。有效＋前提全真＝健全，結論必為真。**常見錯路**：有人會說「但萬一有人手動跳過 staging 直接上 prod 呢？」——對，那正是在質疑**前提1 的真假**（前提1 變假），這時論證掉到「有效但不健全」。能看出這是在攻前提、不是攻結構，就對了。\n\n- **(b) 無效（前提可真，結論真假未定）。** 結構是肯定後件（快取掛→延遲飆；延遲飆了；∴ 快取掛了），無效。反例：延遲飆高也可能是 DB 慢查詢、GC 停頓、上游流量暴增。前提可能都真，但這條推論推不出結論。快取**可能**真的掛了，但你得另外查（看快取的 metrics），不能靠「延遲飆高」這一步。**常見錯路**：把它判成「健全」或「有效」，因為「快取掛了延遲確實會飆」聽起來很對——但那是在確認前提1 的真，不是在確認推論的有效。結構是肯定後件，無效，沒得商量。\n\n- **(c) 無效（且前提1 為假）。** 結構是肯定後件（Rust → 無 data race；無 data race；∴ 是 Rust），無效。而且前提1 本身也假——Rust 的安全保證是針對 safe 程式碼的 data race，`unsafe` 區塊、邏輯層的競態條件（race condition，跟編譯器層的 data race 不是同一件事）照樣可能出問題；何況「沒有 data race」的語言不只 Rust（單執行緒的服務天然沒有）。結構無效、前提又假，這結論（它是 Rust 寫的）就算碰巧真，也跟這段論證無關。\n\n**第 2 題。** 重建：\n\n```text\n明說前提：這個 library 兩年沒更新了\n隱藏前提：（任何兩年沒更新的 library 都不該引入）   ← 補出來的那塊\n結論    ：不該引入這個 library\n\n補上隱藏前提後，結構是肯定前件（modus ponens），有效。\n```\n\n**有效嗎？** 補出隱藏前提後，是。**健全嗎？** 取決於那塊隱藏前提真不真——而它正是弱點所在。「兩年沒更新」可以有兩種完全相反的解讀：(1) 專案死了、沒人維護、有漏洞沒人修；(2) 它**做完了、穩定了**——很多小而專一的 library（一個 left-pad 等級的工具、一個成熟的解析器）就是因為沒有要加的功能才不更新。隱藏前提「凡兩年沒更新都不該引入」把這兩種情況一刀切，**過度概括**，所以**不健全**。真正的弱點不在明說的「兩年沒更新」（這是可查的事實，多半為真），而在那塊被當成顯然、省略掉的前提。**討論該往哪走**：不是吵「到底幾年算舊」，而是把隱藏前提攤開、針對「這個 library 是死了還是做完了」去查（看 issue 回應速度、有無未修的安全公告、依賴它的專案數）。\n\n**第 3 題。** 這位同事犯的是**訴諸謬誤 / 謬誤謬誤（the fallacy fallacy）**。拆開：
