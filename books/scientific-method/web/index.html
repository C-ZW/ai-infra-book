科學只信後者。\n\n## 紙上推演\n\n### 推演題\n\n**題 1（★，[10 分鐘]）抓自己一次「先有結論、再找證據」。**\n回想你最近一次技術判斷（選型、架構決定、把某個事故歸因到某處）。誠實重建你的時間軸：你是**先**權衡證據才形成傾向，還是**先**有了傾向、再去蒐集替它撐腰的證據？如果是後者，標出你「特別賣力找正面證據／特別嚴苛看反面證據」的那一刻。\n\n**題 2（★★，[15 分鐘]）為什麼「我很客觀」是警訊？**\n用你自己的話，向一個堅信「我做技術決策時完全客觀、不帶立場」的同事，解釋為什麼這句話**結構上**不可靠。不准只說「人都有偏見」這種空話——要講到「內省為什麼測不準自己的偏誤」這一層，並給他一句可以替換的、更可靠的說法。\n\n**題 3（★★，[20 分鐘]）把一道工程制度對回它堵的偏心。**\n你們團隊有哪些「假設人會自欺」才存在的制度（不能 approve 自己的 PR、blameless post-mortem、on-call 交叉、第三方整理事故時間軸…）？挑三個，各對應到本章四道科學防線中最接近的一道，並指出它堵的是哪一種偏心。最後挑一道防線，說出它**自己**的漏洞（呼應 worked example 右欄）。\n\n### 推演解答\n\n**題 1 解答。**\n這題沒有標準答案，但有標準的**自我複核點**。多數人重建後會發現：真實順序常是「先有傾向（我喜歡 Kafka／我覺得不是我的服務）→ 再蒐證」，而我們的記憶會**事後**把它整理成「我客觀權衡後選了它」——這本身就是一次微型 HARKing（先有結論、再倒敘成「我本來就這樣判斷」）。\n\n常見錯路有兩條。其一：找不到任何例子，得意地說「我都是先看證據的」——這幾乎肯定是偏誤盲點在作祟（你看不見自己的，不代表沒有；題 2 正是要拆這個）。其二：找到例子，但把它解釋成「那次我剛好趕時間」的偶發。真正的領悟是：**這不是偶發，是預設模式**——人腦預設就是替想信的結論辯護，「先證據後結論」才是要靠制度逼出來的特例。能誠實標出「我特別賣力找正面證據」的那一刻，這題就過了。\n\n**題 2 解答。**\n要講到三層：\n\n1. **判斷別人 vs 判斷自己用的是不同資料。** 你看別人有沒有偏誤，看的是他的行為（他甩鍋了、他只引對自己有利的 benchmark）——外顯、可查。你看自己有沒有偏誤，只能靠內省。\n2. **內省測不準偏誤。** 偏誤運作時，在你腦內**感覺起來就是「清晰的思考」**，不會舉手說「嗨我是偏誤」。所以你內省的結論幾乎必然是「我很客觀」——這個結論不是因為你真客觀，是因為內省這個工具測不到偏誤。\n3. **於是「我很客觀」這句話，恰好在它最會出錯的地方做了斷言。** 普羅寧的偏誤盲點（2002，2024 預註冊複製支持，驗證於 2026-06）量到約 85% 的人覺得自己比平均客觀——數學上不可能大家都對。\n\n更可靠的替換說法：**不要說「我很客觀」，說「我可能有偏心，所以我做了對照／找了人 review／等了複製」。** 把一個關於內在狀態的宣稱，換成一個關於外部程序的描述。常見錯路：把這題答成「所以我們要更努力保持客觀」——錯，本章的整個重點是**努力客觀沒用**（羅森塔爾的學生很努力），要的是**程序**，不是意志。\n\n**題 3 解答（示範一種填法）。**\n\n```text\n工程制度        ↔ 最接近的科學防線    ↔ 堵的偏心\n─────────────────────────────────────────────────────────\n不能 approve     ↔ 同儕審查           ↔ 個人盲點（看不見自己\n自己的 PR                              想信方向上的 bug）\n\nblameless        ↔ （盲法的精神延伸）  ↔ 「不是我的錯」的防衛性\npost-mortem        把人從判斷裡拿掉      動機性推理——一旦變成追責，\n                                       每個人就開始替自己辯護\n\nCI 多次跑/        ↔ 複製               ↔ 僥倖（一次綠可能 flaky，\n多環境重跑                              多次獨立重跑濾掉偶發）\n\n挑一道的漏洞（呼應 worked example 右欄）：\n  同儕審查（PR review）的漏洞 = review 你的人也帶動機——\n  他趕著下班就放水、他是你好朋友就少挑、他跟你有過節就吹毛求疵。\n  ← 跟科學的審稿人偏誤同構：換的那雙眼睛，自己也有立場。\n```\n\n過關標準：三個對應講得出「堵哪種偏心」，且最後能指出某道防線**自己也漏**（不把任何防線當完美）。常見錯路：把所有制度都對到「複製」（因為複製最好懂）——其實 PR review 的核心是「換眼睛找盲點」，更接近同儕審查；blameless 的核心是「把人和判斷拆開」，更接近盲法的精神。對得太粗就是還沒抓到每道防線**各自堵的那一種**偏心。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼「聰明」和「誠實」都不能讓你對動機性推理免疫？智力在這裡扮演什麼角色（提示：律師）？\n2. 羅森塔爾的老鼠實驗裡，學生**沒有造假、填的數字都是真的**——那量測結果是怎麼被污染的？盲法到底切斷了哪一條路徑？\n3. HARKing 和 p-hacking 哪裡是同一種病的兩張臉？預註冊到底是把「哪一步」搬到了「看資料之前」？\n4. 同儕審查堵了「個人盲點」，但為什麼它擋不住自欺、只是把自欺換了個人發作？舉出審稿端的兩種偏心。\n5. 為什麼說「每一道堵自欺的制度，自己也是一個會被自欺繞過的系統」？這為什麼反而是科學需要**一整疊**防線（而非一條）的理由？\n6. 1847 年否決塞麥爾維斯的醫師，本章說他們「不是缺德，是缺制度」——這句話想表達什麼？如果把同一批醫師放進有盲審、複製要求的現代體系，會有什麼不同？\n7. 為什麼「我很客觀」這句話**結構上**不可靠？「客觀」如果不是一種內在狀態，那它是什麼？\n8. 本章是「制度視角」不是「心理學視角」。如果你想深入「人腦為什麼會確認偏誤」，本書為什麼不講、該去哪本書？\n\n## 延伸閱讀\n\n- **Pronin, Lin & Ross,〈The Bias Blind Spot〉(2002)，及其 2024 年預註冊複製**——「偏誤盲點」的奠基研究：人普遍認為自己比別人更不偏誤。配上 2024 年的預註冊複製（驗證於 2026-06），正好示範本章主題——一個關於「我很客觀」的效應，被科學的複製制度反過來檢驗。讀它對「為什麼『我很客觀』是警訊」最直接。\n- **〈Stop Fooling Yourself! Diagnosing and Treating Confirmation Bias〉(eNeuro, 2024)，PMC11495861**——標題幾乎就是本書書名的科學版。從研究者視角談確認偏誤如何滲進科學工作、有哪些對治。讀「診斷」與「對治」兩節，和本章四道防線對照著看。\n- **Kerr,〈HARKing: Hypothesizing After the Results are Known〉(1998)**——HARKing 一詞的奠基文。要真正搞懂「事後挑分析」陰險在哪、為什麼每一步都覺得自己在做正當探索，讀這篇的問題界定段。\n- **〈Does double-blind peer review reduce bias?〉(JASIST, 2022) 與 PNAS (2017) 單盲 vs 雙盲審稿研究**——拿真實數據量「名氣本來在偷偷加分多少」。讀它對「同儕審查自己也帶偏誤、雙盲只堵了一部分」這個誠實面最有感（注意它們也承認證據混合、匿名做不到完美）。\n- **《思考的陷阱》（偏誤書）談確認偏誤與動機性推理的那章**——本章只用一句話定義就交棒過去的那塊：人腦為什麼這樣運作、有哪些子類型、實驗證據。想補心理機制，去那裡；本書只負責「科學制度怎麼防」。\n- **《決策與理性》談理性信念更新的那章**——動機性推理是「偏離了理性該怎麼更新信念」的偏離；那本書講「理性基準」是什麼。理性三角（偏誤＝心理機制／本書＝制度防線／決策＝規範基準）在這裡交會。\n"}, {"id": "ch12-science-vs-pseudoscience", "file": "ch12-science-vs-pseudoscience.md", "group": "Part IV — 科學擋不住的、與它如何修補", "title": "ch12 — 為什麼是科學贏了：與偽科學的分界再探", "md": "# ch12 — 為什麼是科學贏了：與偽科學的分界再探\n\n> **本章解決什麼問題**：ch04 立了可證偽性這個原則——一個主張要算在做科學，它得原則上能被某個觀察推翻。但「原則上能被推翻」距離「到底算不算科學」，中間還有很大一段。本章把那個原則**用出去**：加上 Lakatos 的「進步 vs 退化研究綱領」判準，把判準實際套用到偽科學的識別，並且誠實面對分界從來不是一條乾淨的線。問題不是「科學是萬能的」，而是：**在所有聲稱掌握真理的體系裡，科學在「系統化防自欺」這件事上到底贏在哪裡？** 本章也是 Part IV 的第二章，承接 ch11「科學擋不住的那一半」，轉向另一個問題：既然科學有動機性推理這個內在敵人，它還是贏了——贏過什麼？\n\n## 從你已知的出發\n\n技術圈從不缺「新正確」。\n\n「微服務才是對的架構」「你的 monolith 是技術債」「GraphQL 會取代 REST」「Kubernetes 解決一切編排問題」「blockchain 去中心化才是未來」——每隔幾年就有一波，附帶白皮書、大會演講、LinkedIn 上的十萬個按讚，以及一批宣稱「我們上了之後延遲降了 90%」的案例分享。\n\n你怎麼分辨這些主張？什麼時候值得跟進，什麼時候是「賣空氣」？\n\n直覺上你有一個篩子。你會問：**它有沒有在某個可量測的場景下做出具體的預測？有沒有可重現的 benchmark？有沒有人在你的規模、你的流量模式下真的驗過？對它不好的結果，倡導者是否有說？** 這個篩子不完美，但它在做的事情有個名字——它在問這個主張是不是「可以被推翻的」、有沒有在「進步地拓展預測能力」，還是只會事後解釋一切。\n\n你每天在技術圈分辨「有料的技術主張」和「賣空氣的 buzzword」，用的判準和科學哲學分辨科學與偽科學用的判準，骨子裡是同一件事。本章把那個直覺明確化，然後誠實告訴你它的灰色地帶在哪裡。\n\n## 回扣 ch04：分界的起點\n\n（見 ch04）可證偽性是科學分界的必要條件：一個主張若連「原則上能被哪個觀察推翻」都說不出來，它就沒在做科學的事——不是因為它假，是因為它怎樣都對，什麼事實都能容納，那就等於什麼都沒說。\n\n但「可證偽」只是門檻，不是終點。一個主張可以通過可證偽這關，卻依然是偽科學——它提出了「原則上能被推翻的預測」，但每次預測落空時，倡導者就悄悄改一個輔助假設，讓核心毫髮無傷。可證偽的**原則**在 ch04 已立；本章要用的是它的**應用**，加上 Lakatos 補進來的那一刀。\n\n## Lakatos 的補刀：進步還是退化？\n\n拉卡托斯（Imre Lakatos）在 1968–1970 年間提出「科學研究綱領方法論（Methodology of Scientific Research Programmes, MSRP）」，是對波普爾和孔恩的橋接（見 ch08），也是本章最重要的新工具。\n\n他的核心診斷是：光問「這個理論可不可被否證」不夠，因為**每個認真的理論都有一套用來消化反例的機制**（杜恩–蒯因告訴你：反例可以總是被歸咎給輔助假設而非核心）。真正的問題是：**這個體系在消化反例的同時，有沒有在前進？**\n\n```text\nLakatos 的兩種研究綱領\n\n  進步的綱領（progressive）          退化的綱領（degenerating）\n  ─────────────────────────────────────────────────────\n  遇到反例 → 修改保護帶的輔助假設     遇到反例 → 修改保護帶的輔助假設\n              ↓                                  ↓\n          做出新預測                       只是擋掉了反例\n          這些新預測隨後被驗證             沒有新預測，或預測落空\n              ↓                                  ↓\n          綱領的解釋範圍在擴張             綱領只在收縮、補洞\n              ↓                                  ↓\n          這是健康的科學成長               這是偽科學的典型長相\n\n  判準：每次調整後，有沒有新的可被否證的預測被提出，\n        且這些預測事後被驗證？\n```\n\n這個區別在日常裡你很熟悉。一個好的系統，當你加了一個 feature 解決了原本的問題，它還能讓你順手解決旁邊三個你沒預期的問題——那是進步。一個技術債累積的遺留系統，你每次修一個 bug，能正常運作不引入新 bug 就謝天謝地——那是退化。\n\nLakatos 的洞見是：**偽科學的特徵不是「一直被否證」，而是「一直在補洞、從不預測新事物」。** 它的體系在逃跑，不在前進。\n\n## 偽科學的常見臉孔\n\n現在把可證偽（ch04）和進步 vs 退化（Lakatos）合在一起，偽科學有幾個辨識特徵：\n\n**特徵一：不可證偽，或逃跑式可證偽。** 要嘛主張本身設計成怎樣都對（「宇宙的能量讓我們相連」這種表述根本找不到反例），要嘛每次預測落空就後退到一個更模糊的版本（「你當時的心理狀態影響了實驗結果，所以不算」）。\n\n**特徵二：只解釋，不預測。** 偽科學善於事後解釋一切，極少做出事前的、具體的、可以在未知資料上驗證的預測。科學的力量在**事前預測**——愛因斯坦廣義相對論預測光線在強重力場中會彎曲，這個預測在 1919 年日食觀測中被驗證，是理論事先下注，再等事實兌現。占星「解讀」則幾乎全是事後讀進的意義。\n\n**特徵三：退化式補洞。** 每次遇到不支持的證據，就加一個新的「例外條款」或「干擾因素」，核心從不被動搖，但解釋能力也從不擴張。順勢療法（homeopathy）在面對「稀釋到分子幾乎不存在仍有效」的質疑時，發展出「水有記憶」這個說法——這是加保護帶，不是前進。\n\n**特徵四：拒絕接受獨立複製的考驗。** 真正的科學主張可以（原則上應該）在不同實驗室、不同研究者手裡被複製。偽科學往往主張效應只在「信者」或「特定條件」下出現，等於為複製失敗預先準備好了托辭。\n\n**特徵五：訴諸權威而非訴諸證據。** 「這位大師說的」「幾千年老祖宗的智慧」「祕方不可公開但確實有效」——這些訴求本身不構成證據。科學界也有權威，但科學的規範是：任何人的主張都可以被任何人的資料推翻，不看頭銜。\n\n一個誠實的警語必須在這裡說清楚：**這五條特徵都是程度問題，不是二選一的開關。** 科哲界沒有人認為可以用五條清單一刀切分科學與偽科學——這個分界問題本身至今沒有完美的解答，費耶阿本（Paul Feyerabend）甚至認為任何固定的方法論都會阻礙科學（這個極端立場本書不採，但存在作為誠實的學術背景）。我們能說的是：**越多特徵疊加、程度越深，我們越有理由把某個宣稱放在「偽科學」那一端的譜上。**\n\n## 「會認錯」是科學的力量，不是弱點\n\n這是本章最該停下來想十分鐘的一個反直覺點。\n\n科學史上充滿翻案：牛頓力學被相對論修正了適用範圍，燃素說被拉瓦節推翻，大陸漂移理論從「被嘲笑」到「成為地質學基礎」。每次翻案，有人就說：「你看，科學說的東西是會改的，憑什麼信它？」\n\n這個質疑的邏輯是倒反的。\n\n偽科學從不認錯——不是因為它對，而是因為它的設計就讓它**無法被錯**。一個「水有記憶」的解釋系統，永遠能為任何實驗結果找到說法，永遠不需要翻案。科學之所以「會認錯」，恰恰因為它**冒了被打臉的風險**——它給出了具體的預測、讓資料有機會說不，而在那個被說不的時候，它更新了自己。\n\n換個工程師的視角說：**一個從來不觸發 alert 的系統，不是因為它特別穩定，而是因為它的 alert 閾值設得太鬆。** 偽科學就是把閾值設成無窮大的系統——它永遠「有效」，因為它對「失敗」的定義讓失敗永遠不成立。\n\n> 科學的「暫定性」（今日最佳猜測，明日可被新證據推翻）是特性，不是缺陷（見 ch10）。偽科學的「永遠正確」才是缺陷——它的不可錯恰恰是它沒在解釋任何事的證明。\n\n## 脊椎透鏡：偽科學分界的眼光看塞麥爾維斯案\n\n這是塞麥爾維斯案的第十二次重看，換的是「偽科學分界」透鏡。\n\n先問：塞麥爾維斯的「屍體微粒（cadaveric matter）假說」算科學，還是偽科學？\n\n用我們剛才的判準走一遍：\n\n**可證偽性**：有。他明確給出了「屍體微粒經手傳染」的假說，它預測：切斷這個傳染管道（洗手），死亡率應該降。如果洗手後死亡率**沒有降**，假說就垮了。他確實做了這個賭注，而且沒有在死亡率降低之後說「其實我本來說的不是這個意思」。\n\n**進步的綱領**：有跡象，雖不完整。洗手令的效果不只在第一病房成立——他後來調職到匈牙利佩斯，在另一家醫院推行同樣的做法，死亡率同樣明顯下降。這**超出了原始的觀察範圍**，算有限的新預測被驗證。然而他缺機制，這讓他的綱領難以進一步拓展（為什麼有效？是哪個成分？能推廣到手術室以外的感染嗎？這些問題他答不出來）。\n\n**會認錯的設計**：他的假說設計上是可以被打臉的。如果某個病房完全沒有解剖、醫師也不接觸屍體、但死亡率仍高，那就是問題。他沒有規避這個風險。\n\n**對比真正的偽科學**：同時期的「瘴氣論」是什麼長相？「惡臭空氣產生疾病」——這個主張幾乎什麼都能解釋，什麼都能容納。病人多死？糟糕的空氣。病人少死？空氣改善了。洗手有效？大概是洗手改變了氣味、讓空氣流通好一點（這種事後解釋是退化綱領的教科書範例）。\n\n```text\n分界判準實測：塞麥爾維斯 vs 瘴氣論\n\n  判準                 塞麥爾維斯的屍體微粒假說     當時的瘴氣論\n  ───────────────────────────────────────────────────────────────\n  可證偽？             是（洗手不降死亡率就垮）     很難（空氣可以\n                                                    千變萬化解釋）\n\n  事前預測？           是（預測洗手後會降）         主要是事後解釋\n\n  進步 vs 退化？       有限的進步                   退化（加保護帶）\n                       （匈牙利複製成功）            （每次反例改解釋）\n\n  接受複製？           接受（主動在他處推行）        無設計\n\n  為什麼被否決？       缺機制、挑戰典範、           ——（是那個時代的\n                       溝通失敗（見 ch08）           「進步的」典範！）\n```\n\n這張表揭示了一個深刻的諷刺：**塞麥爾維斯按照今天的分界判準，遠比瘴氣論更像科學**——更可被否證、做出具體預測、嘗試複製。但他在那個當下輸了。為什麼？因為「更像科學」不等於「被接受」。社群、機制、典範的阻力（見 ch08），比分界判準有更大的現實力量。這也是本章最誠實的地方：**分界判準幫你判斷一個主張的認識論地位，但它回答不了「為什麼一個更科學的主張反而被拋棄」的社會學問題。**\n\n## 灰色地帶：分界從來不是一條乾淨的線\n\n這是本章必須誠實寫出的部分，因為「偽科學分界」最大的陷阱，是相信自己拿到了一條萬用的裁決規則。\n\n**第一個灰色地帶：年輕的科學。** 許多今天被視為科學的領域，在發展初期看起來很像偽科學——預測能力有限、理論雜多、缺乏可重複的量測標準。地質學在十九世紀中葉的狀態如此，神經科學在二十世紀初的狀態如此。給一個發展中的領域貼「偽科學」標籤，很可能是時序錯誤。\n\n**第二個灰色地帶：科學邊緣的主張。** 針灸、某些傳統醫學，在一些效應上有可複製的 RCT 支持，但機制不清、理論架構（「氣」「經絡」）難以被現代生理學框架定位。這算科學嗎？算偽科學嗎？誠實的回答是：某些具體的主張（「針灸對某種疼痛有緩解效應」）可以用 RCT 評估，某些框架性主張（「氣的流通」）目前不可測——兩件事的認識論地位不同，不能混為一談。\n\n**第三個灰色地帶：科學內部的退化綱領。** 不是所有偽科學都在科學門外面——科學機構內也有退化的綱領，靠著制度慣性存活。這正是 Lakatos 提出進步 vs 退化判準的動機之一：他不是要區分科學與偽科學，他是要給**科學社群評估自己的理論該不該繼續投資**一個判準。\n\n**第四個灰色地帶：有時效果先於機制。** 第 ch14 章會深入這個問題，但這裡先點一下：阿斯匹靈的止痛退燒效果在機制被理解之前就已經廣泛使用；麻醉的效用先於「為什麼會讓人失去意識」的理解幾十年。要求「先有機制才能接受效果」有時會延誤有效的介入。**分界判準主要是認識論工具，不是行動準則——「這個主張的科學地位不夠高」和「這個介入你不應該用」是兩件事，要分開說。**\n\n> 誠實的結論：科學分界不是裁判機器，是一個**需要多個判準聯合使用、允許程度差異、承認歷史脈絡的評估框架**。把它當「一刀切的偽科學偵測器」，反而是一種懶人的確認偏誤——你只會看到你想看到的「偽科學」，而錯過灰色地帶裡真正有趣的認識論張力。\n\n## Worked Example：四欄判別表\n\n取三個主張，一個跑完四欄判別：\n\n**主張 A（科學）**：「低劑量阿斯匹靈有助於降低特定高風險群體的心血管事件風險。」（這裡用的是已有大量 RCT 支持的既有結論，2026-06 仍為臨床指引的一部分，但新的研究對「低風險群體」的適用性有更多討論，使用前查現行指引。）\n\n**主張 B（偽科學）**：「水晶療法通過礦物能量場調整人體氣場，可以治療焦慮和免疫低下。」\n\n**主張 C（技術圈 buzzword）**：「我們的 AI 驅動平台讓你的工程生產力提升 300%。」\n\n```text\n四欄判別表\n\n  判準          A — 低劑量阿斯匹靈   B — 水晶療法        C — AI 生產力 300%\n  ───────────────────────────────────────────────────────────────────────────\n  可證偽？      是                   極難                 表面上是（可量測）\n                預測特定群體的心      「氣場」「能量場」   但「生產力」定義\n                血管事件率降低        沒有可操作的量測；   不固定；什麼叫\n                可被 RCT 否決         任何負面結果可歸因   「300%」沒有操作\n                                     「不夠信任晶體」      定義；可疑\n\n  事前預測？    是（RCT 事先設定      幾乎沒有             幾乎沒有\n                端點，事後公布）      主要是案例分享        主要是案例分享\n                                     與感受性描述          與選定的 showcase\n\n  進步 vs 退化？進步（研究範圍        退化（每次負面研究   退化（每次反例\n                擴到劑量、群體、      被歸因外部干擾，      是「你的使用方式\n                時程；機制也更        沒有新預測的驗證）    不對」，沒有新的\n                清楚——COX 抑制）                           可比較基準）\n\n  接受複製？    是（多個大型多中      幾乎沒有真正的       幾乎沒有第三方\n                心 RCT 各自獨立       獨立 RCT；案例        獨立 benchmark；\n                執行，結果趨同）      選擇性偏差嚴重        數字來自廠商測試\n\n  診斷          科學（雖有適用域      偽科學（多條特徵      銀彈式 buzzword\n                的限制，見現行        明確符合）            （分界更接近\n                臨床指引）                                  偽科學那端，\n                                                           但包裝更精巧）\n```\n\n走完這張表，你會發現主張 C（技術圈 buzzword）和主張 B（偽科學）的結構非常相似——差別在於包裝更精緻、數字更具體，但具體的數字若沒有操作定義和獨立複製，就只是更精緻的逃跑式保護帶。\n\n自我複核：主張 A 的「可證偽」欄位，我說的是「可被 RCT 否決」——這符合 ch04 的定義，因為存在具體的、事前可操作的結果端點（心血管事件發生率），如果這些端點在正確設計的 RCT 中未達差異，假說就受損。沒有偷渡「當然它最後是對的」的循環。\n\n## 直覺的陷阱\n\n### 陷阱一：「不可能被推翻就一定是假的」\n\n這是對可證偽判準最常見的誤用。波普爾的主張（見 ch04）是：**不可證偽的主張沒在做科學的事**——不是說它是假的。數學定理（如畢氏定理）也不可被任何經驗觀察推翻，但我們不說它是假的，我們說它是**數學**（見 ch10）。宗教或形而上學的主張可以不可證偽，卻對信仰者有真實的意義。分界判準劃的是認識論的種類，不是在裁決真假。\n\n把「你的主張不可證偽」當「你的主張是假的」來用，是一種可以關閉對話的懶人武器——比精確使用更有攻擊性、卻失去了準確性。自我察覺的訊號：**你如果用「不可證偽」的時候心裡其實在說「這是胡說」，那你在用工具罵人，不是在做科學分析。**\n\n### 陷阱二：「科學沒有解釋的就是偽科學」\n\n科學有它的範圍邊界，而那個邊界每年都在移動。歷史上有太多「科學目前無法解釋的現象」後來被科學解釋——大陸漂移（被嘲笑數十年，後來成為板塊構造論）、隕石撞地球（1800s 博物學家普遍不相信石頭會從天上掉下來）。「科學目前解釋不了 X」充其量是「這個現象值得研究」，不是「所以 X 是超自然現象」。從「科學不能解釋」跳到「超出科學範疇的解釋成立」，是一個邏輯跳空（argument from ignorance）。\n\n### 陷阱三：「那是他們的文化，我們不能用科學評判」\n\n這個陷阱更隱蔽。它把「尊重文化多樣性」和「放棄認識論評估」混為一談。你可以同時尊重一個傳統的文化意義、和誠實評估其中的醫療宣稱是否有 RCT 支持。這兩件事不衝突。問題不是「這個傳統對你有意義嗎」（可以有），而是「這個具體的療效宣稱，有沒有超出安慰劑效應的可複製證據」（可以評估）。把認識論問題轉成文化尊重問題，是一種讓人難以反駁的保護帶。\n\n### 陷阱四：「科學也會錯，所以都一樣」\n\n這個陷阱是「相對主義滑坡」——「科學錯過一次，所以科學跟占星一樣不可信。」邏輯上：一個體系會認錯並更新，不代表它跟一個永遠不認錯的體系「一樣」。你的監控系統偶爾有誤報，不代表它跟「沒有監控系統」等價。**錯誤率是程度問題，防自欺機制是否在運作也是程度問題。** 科學會錯，但它有一套設計用來發現自己錯了並修正的機制；偽科學也會「錯」，但它的設計讓錯誤永遠有其他解釋、永遠不被承認。這個非對稱性是「為什麼是科學贏了」的核心答案。\n\n## 紙上推演\n\n### 題目一：評估一個你懷疑是「賣空氣」的技術宣稱 ★★ **[20 分鐘]**\n\n找一個你最近看到的技術主張——白皮書、大會演講、LinkedIn 文章、或你團隊討論過的技術選型主張都行。用本章的四欄判別表做完整評估：可證偽嗎、有事前預測嗎、進步還是退化、接受獨立複製嗎。寫下你的診斷，和最讓你不確定的地方。\n\n### 推演解答\n\n這題沒有固定答案，但有幾個常見的錯路要注意：\n\n**錯路 A：「它有數字所以可證偽。」** 數字要有**操作定義**才算可證偽。「生產力提升 300%」如果「生產力」是由廠商自己定義且不可獨立量測，那個數字是裝飾性的，不是可被否決的預測。可證偽的版本要能說出：「如果用這個工具三個月後，工程師在標準化的任務上完成速度沒有提升 X%，這個主張就受損。」\n\n**錯路 B：「它被大公司採用所以不是偽科學。」** 大公司採用是使用廣度，不是認識論地位的證明。某些 buzzword 恰恰是因為大公司採用才被其他人跟進，而跟進者並不一定獨立驗證過效果——這就是技術圈的「回音室」。\n\n**錯路 C：「我自己用過覺得有效。」** 個案報告是最弱的證據。placebo 效應在主觀感受（「我感覺生產力提升了」）上尤其強。這不是說你的感受是假的，而是說個案感受無法替代可複製的客觀量測。\n\n正確的評估路徑：先問「哪個觀察會讓倡導者說『好，我的主張不對』」——如果你找不到一個讓倡導者會接受的反例，那這個主張的保護帶太厚了。\n\n---\n\n### 題目二：「無法被推翻」對科學是缺點、對信仰可以是特點——解釋這個差別 ★★★ **[15 分鐘]**\n\n用你自己的話，解釋為什麼科學主張的「可被推翻」是力量，而一個宗教或哲學信念的「不可被推翻」不必然是缺點。兩者的目標不同是關鍵——它們分別在追求什麼？不可被推翻對各自的目標各有什麼意涵？\n\n### 推演解答\n\n這一題很多人的第一直覺是「宗教是假的科學」，這個方向走不了幾步就卡死了。\n\n正確的框架是**目標不同**：\n\n**科學的目標**是對世界的**可校正的預測能力**——能預測特定條件下會發生什麼、能設計出在那些條件下有效的介入。這個目標要求你的主張在錯的時候能被知道是錯的；否則你永遠在黑暗中射擊，不知道有沒有打中。「可被推翻」是讓「知道自己對不對」成為可能的結構性條件。把這個拿掉，你就失去了校正的能力。\n\n**信仰的目標**（在一個誠實的功能性分析裡）往往包括：對意義的提供、社群的凝聚、與死亡和苦難共處的框架、對某種終極實在的指向。這些目標**不要求預測能力**——一個「生命有終極意義」的信念，不是在預測實驗結果，它是在提供一個倫理和意義的框架。「可被推翻」對這個功能**不必要**，有時甚至是破壞性的（一個在最苦難時刻仍能依靠的信念，恰恰是因為它不依賴實驗結果）。\n\n```text\n目標與「可被推翻」的關係\n\n  體系          主要目標              「可被推翻」的作用\n  ──────────────────────────────────────────────────────\n  科學          對世界的可校正         必要條件\n                預測能力              （沒有它就失去校正機制）\n\n  信仰／哲學    意義框架、倫理基礎、   非目標所要求\n  （宗教性的）  終極實在的指向         （有時甚至與目標衝突）\n\n  偽科學        聲稱與科學相同         應該有、但設計成沒有\n  （問題所在）  （對世界做預測）        （這是不誠實在哪裡）\n```\n\n偽科學的問題不是「它不可被推翻」，而是它**聲稱在做科學的事**（對世界做預測、宣稱療效）卻把自己設計成不可被推翻。一個宗教說「信仰超越理性驗證」，這是誠實的——它告訴你它在哪個認識論領域。一個「量子能量療法」說「科學已經證明這有效」，然後每次試圖複製都失敗、每次失敗都有新解釋——這是騙局，因為它偷用了科學的權威卻拒絕科學的標準。\n\n常見錯路：把「目標不同」讀成「兩者一樣好」。不是。科學在它的目標（預測自然世界）上是目前人類最好的工具。信仰在它的目標（意義框架）上可以有其價值。這兩件事都為真，不衝突，但不代表在做同樣的事。\n\n---\n\n### 題目三：塞麥爾維斯通過了哪些分界判準，又為何在當時的社群裡仍然輸了？★★ **[10 分鐘]**\n\n用本章的四欄判別，具體說明塞麥爾維斯的屍體微粒假說的認識論地位，再解釋為何認識論地位高不保證被社群接受——這個缺口在哪裡？\n\n### 推演解答\n\n認識論地位（本章的判準）：見本章「脊椎透鏡」段的分析。簡要說：可證偽（有預測，有具體的可被推翻條件）、有限的進步（匈牙利複製）、接受複製（主動推行並記錄結果）——在這些判準上，比同時代的瘴氣論更接近科學。\n\n但認識論地位高，不等於被接受。這個缺口由幾條線造成（見 ch08 詳析）：\n\n**缺機制**：說不出「為什麼」（細菌論要 Pasteur/Koch 才立起，那是 1860s–1880s 的事）。機制讓一個結論從「黑箱有效」升格到「可以被推廣、被信任、被接受」——沒有機制，即使你的預測是對的，聽眾也難以建立信心。（見 ch14 的深入討論）\n\n**挑戰了整個典範**：承認屍體微粒假說，等於承認「醫師的手殺了產婦」，這對當時醫界是一個難以接受的結論——不只是學術上的反駁，是對整個職業身份的攻擊。Kuhn 的典範（見 ch08）告訴我們，典範轉移需要危機積累到一個程度，不是靠單一好的實驗就能翻轉。\n\n**溝通與個性的阻力**：他發表遲緩、文風激烈，在科學社群裡建立的批評聲量大於支持聲量（見 landscape 待考 #6）。這是科學社群的社會學問題，不是認識論問題。\n\n**結論**：四欄判別幫你評估一個主張的**認識論品質**，但科學的接受是一個**社會過程**，認識論品質是必要不充分條件。塞麥爾維斯案正是這個缺口的活教材——它同時是「認識論更好的主張如何在社會過程中失敗」的反面教材，和「最終正確的主張如何在機制確立後平反」的正面教材。\n\n## 自我檢核\n\n1. **可證偽是分界的「充分條件」還是「必要條件」？** 一個可證偽的主張一定是科學嗎？一個不可證偽的主張一定是偽科學嗎？\n\n2. **「進步的研究綱領」和「退化的研究綱領」的關鍵差別在哪裡？** 不是在「有沒有改假設」，那兩種都會改——差在什麼？\n\n3. **為什麼「科學從不認錯」比「科學會認錯」更危險？** 那個「永遠正確」的設計，在認識論上代表什麼？\n\n4. **偽科學的「只解釋不預測」和科學的「事前預測後驗證」，在實際應用上怎麼區分？** 給一個你能舉出的技術圈例子。\n\n5. **分界問題有沒有一個乾淨的解答？** 你能舉出一個明確落在灰色地帶的例子嗎？為什麼它是灰色的？\n\n6. **塞麥爾維斯案用本章的眼光重看，它的認識論地位和它的社會命運之間的落差說明了什麼？**\n\n7. **「不可能被推翻所以是假的」這個論點，錯在哪裡？** 能不能舉一個「不可被推翻卻不是假的」的例子？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy — Demarcation Problem** [https://plato.stanford.edu/entries/pseudo-science/]：最清楚的哲學文獻整理，把 Popper、Kuhn、Lakatos、Feyerabend 的分界立場對比呈現，誠實面對「沒有完美解」。從概論進入再選感興趣的分支。（2026-06 仍為標準參考）\n\n- **Stanford Encyclopedia of Philosophy — Lakatos** [https://plato.stanford.edu/entries/lakatos/]：MSRP 的完整技術介紹，包含「進步 vs 退化」判準的精確表述與批評。本章直接用他的框架，讀完這篇能把本章的直覺版換成精確版。\n\n- **Popper, Karl — *Conjectures and Refutations*（1963）**：波普爾自己寫的科普／哲學文集，比《研究的邏輯》好讀。第一章〈科學：猜測與反駁〉直接對應本章的核心，他用愛因斯坦、占星和阿德勒精神分析的對比，把分界判準的動機說得比任何二手解說都清楚。（未驗證線上版；圖書館或二手書可得）\n\n- **Sagan, Carl — *The Demon-Haunted World*（1995）**：尤其是第十二章的「謬誤偵測工具包（Baloney Detection Kit）」，是本章四欄判別表的一個可讀版本，視角是天文學家與科普作家，比哲學文獻更好讀。（已出版，繁體版書名常譯作《魔鬼出沒的世界》）\n\n- **Pigliucci, Massimo & Boudry, Maarten（eds.）— *Philosophy of Pseudoscience*（2013）**：學術論文集，收錄當代科哲學者對分界問題的最新討論，包括「分界是程度問題」這條路線的最完整辯護。難度較高，適合想深入科哲的讀者。（未驗證線上版）\n\n- **James Randi Educational Foundation 的歷史案例**（已停辦，但見 https://web.randi.org/ 等存檔）：從「百萬美元的挑戰」出發，案例說明「為何偽科學宣稱在對照條件下消失」。是本章抽象判準的具體示範材料。（2026-06 注意：JREF 已停辦，存檔資源需查當前可及連結）\n"}, {"id": "ch13-replication-repair", "file": "ch13-replication-repair.md", "group": "Part IV — 科學擋不住的、與它如何修補", "title": "ch13 — 重複的力量：複製、預註冊、開放科學如何修補危機", "md": "# ch13 — 重複的力量：複製、預註冊、開放科學如何修補危機\n\n> **本章解決什麼問題**：ch09 告訴你再現性危機是什麼、為什麼會發生——p 值被誤用、p-hacking、一批效應複製率只有約三分之一到四成。那是「壞消息本身」。本章只問一件事：**知道了，然後呢？** 科學社群這十幾年用什麼制度把這個漏洞補起來——複製、預註冊、註冊報告、開放資料、多實驗室合作。本章在全書地圖落在 Part IV「科學擋不住的、與它如何修補」：ch11 講科學擋不住個人的偏心，ch12 講它如何贏過偽科學，本章講它如何修自己的傷。本章還藏著一個反直覺的好消息——**危機被公開揭露、被吵得沸沸揚揚，這本身就是糾錯機制在運作的證據**，不是科學破產的訃聞。脊椎透鏡：塞麥爾維斯的結果其實**被複製過**，但缺機制讓複製也說服不了人（這個遺憾接 ch14）。\n\n## 從你已知的出發\n\n你寫過 flaky test。\n\n那種跑十次綠八次、紅兩次，重跑一下又綠了的測試。你心裡很清楚：**一次綠不算數**。一次綠可能是真的通過，也可能是某個 race condition 剛好沒撞上、某個外部服務剛好沒抽風、某個 timeout 剛好沒踩線。你判斷一個 test「真的穩」，靠的不是某一次的結果，是它**反覆跑、反覆綠**——你甚至會在 CI 裡把可疑案例跑個 100 次，看失敗率收斂到哪。你在用重複過濾僥倖。\n\n你也說過、或聽人說過那句工程界最有名的鬼話：「在我機器上會動。」\n\n這句話之所以是鬼話，是因為它**無法被複製**。一個結果如果只在某一台機器、某一個人手上、某一個下午成立，換個環境就垮，那它就不是一個可靠的事實，是一次僥倖（或一個沒被發現的隱藏依賴）。可重現建置（reproducible build）這整套工程實踐，存在的唯一理由就是：**讓「能跑」這件事脫離特定環境的偶然，變成任何人在任何乾淨環境都能重現的事實。**\n\n如果你接受這兩件事——「一次綠不算數」「在我機器上會動不算數」——那你已經懂了本章的全部直覺。再現性危機說穿了，就是科學界發現自己一直在拿 flaky test 的單次綠當結論發表，而且沒人去重跑。本章那些修補制度——複製、預註冊、開放資料——逐一對應你早就在用的工程習慣：把案例多跑幾次、先凍結驗收標準再實作、把環境和資料攤開讓別人能重現。差別只在，科學界補上這些習慣花了一百年，代價是好幾代研究者的職涯與好幾櫃子沒人看過的失敗結果。\n\n> 一句話回扣 ch09（不重講）：再現性危機的**診斷**（p-hacking 機制、複製率約三分之一到四成那個壞消息）歸 ch09；本章只管**處方**。需要時我會寫「（見 ch09）」，不在這裡重算複製率。\n\n## 為什麼「複製」是防自欺的核心，而不只是一道手續\n\n先把複製（replication）這個詞講精確，因為它常被誤解成「重看一遍同一篇論文的數據對不對」——那叫**重分析（reanalysis）**或**計算再現（computational reproducibility）**，是檢查算術，重要但不是這裡的主角。本章講的**複製**，是另一群人、用另一批受試者、（理想上）在另一個實驗室，**從頭再做一次**這個實驗，看效果還在不在。\n\n為什麼這件事是防自欺的核心？因為單次結果裡，**僥倖和真相長得一模一樣**。\n\n回憶 ch09 的算術（不重推）：如果一個效應其實不存在（虛無假設為真），你做一次實驗，仍有約 5% 的機率純靠運氣得到 p < 0.05 的「顯著」結果。再加上 p-hacking 的研究者自由度，這個偽陽率還會被推得更高。問題在於——**從單獨一篇論文裡，你無法分辨它到底是那 5% 的運氣，還是真效應。** 兩者印出來的 p 值、信賴區間、星號，看起來完全一樣。\n\n複製就是那個分辨器。它的邏輯極其簡單，簡單到近乎暴力：\n\n```text\n若效應是真的：\n  做一次 → 顯著\n  再做一次（新樣本、新實驗室）→ 多半還是顯著\n  再做一次 → 還是顯著\n  ……重複會「累積」\n\n若效應是僥倖（那 5% 的運氣）：\n  做一次 → 碰巧顯著\n  再做一次 → 運氣用完了，多半不顯著\n  再做一次 → 又不顯著\n  ……重複會「過濾掉」它\n\n所以：能被獨立複製的效應，是真效應的強訊號；\n      複製不出來的「顯著」，多半是當初那次的運氣。\n```\n\n這跟你把 flaky test 跑 100 次是**同一個動作**。一次綠分不出「真通過」和「race 剛好沒撞」；跑 100 次，真通過會穩定綠，race 會穩定地偶爾紅——重複把「穩定的真」和「偶發的假」分開了。\n\n這裡有一個值得停下來想十分鐘的點：**複製的防自欺力量，不來自任何一次實驗做得多嚴謹，而來自「獨立性」**。同一個人、同一個團隊、用同一套可能有偏的流程，重做十次，十次都顯著——這幾乎沒有增加多少可信度，因為如果偏誤藏在流程裡（某個 p-hacking 習慣、某個量測的系統偏差），它會在每一次重做裡**忠實地重現**。真正有鑑別力的，是**別人**、用**別的樣本**、在**別的實驗室**重做。獨立性高的複製，才能把「藏在某個團隊習慣裡的系統性自欺」暴露出來。\n\n（這跟 ch15 要講的「獨立趨同 vs 回音室」是同一個直覺的兩個面向：十個互相抄的人說同一句話，不等於十份獨立證據。複製要有意義，必須獨立。）\n\n## 危機之前，科學長什麼樣：複製為什麼一度幾乎不存在\n\n要理解這些修補制度在補什麼洞，得先看危機之前那個系統有多漏。\n\n危機之前的科學發表，有一套**獎勵結構**，而這套結構幾乎是專門設計來**懲罰複製、獎勵僥倖**的——雖然沒人是故意的，這正是它可怕的地方（呼應 ch11：制度的失靈不需要壞人，只需要沒人去堵的漏洞）。\n\n```text\n危機前的獎勵結構（沒人故意設計成這樣，但它就是長這樣）\n\n  新奇的、顯著的、漂亮的正面結果  →  登上頂級期刊  →  升等、拿經費、出名\n  複製別人的研究（尤其複製成功）  →  「你只是重做別人的」→ 期刊不收、沒人引用\n  複製失敗（推翻別人）            →  得罪同行、難發表、被質疑「你是不是沒做好」\n  自己的實驗沒做出顯著效果        →  塞進抽屜，不投稿（誰要看 null result？）\n                                      ↑ 這就是「檔案抽屜問題」file drawer problem\n```\n\n把這張表看懂，你就懂為什麼危機會發生，而且為什麼它**註定**會發生：\n\n- **沒人複製**：因為複製不能發表、不算貢獻。一個結果發表後，可能幾十年沒有任何人去獨立重做——那 5% 的運氣就這樣一直掛在文獻裡，被當成事實引用。\n- **檔案抽屜問題（file drawer problem）**：做出「沒效果」的人不投稿，期刊也不收。於是文獻裡**只剩下顯著的結果**——這叫發表偏誤（publication bias，ch16 會正式收進失敗模式目錄）。想像有 20 個實驗室各自獨立研究同一個其實不存在的效應，純靠運氣大約有一個會做出 p < 0.05，那一個發表了、上了期刊，另外 19 個 null result 全進了抽屜。讀者只看到那一篇，以為「有效應」。**文獻本身就是被僥倖篩選過的樣本。**\n- **真誠的 p-hacking**（見 ch09，不重講）：研究者自由度讓真誠的人也能無意間把偽陽率推高，而當時沒有任何制度逼你事先講清楚你打算怎麼分析。\n\n所以危機不是「一群壞科學家造假」。它是一套**結構性地放大偽陽、過濾掉糾錯**的系統，在運轉了幾十年後，被一群人決定去做那件沒獎勵的事——大規模複製——終於暴露出來。下一節講的每一道修補制度，都是在拆這張獎勵結構表裡的某一格。\n\n## 預註冊：先凍結驗收標準，再看資料\n\n如果你只能記住本章一個修補制度，記這個。因為它最像你的工作，也最直接地堵住 ch09 那個「真誠的人也會 p-hack」的漏洞。\n\n**預註冊（preregistration）**：在**看到資料之前**，把你的假設、你要量哪個指標、樣本要收多少、收到什麼條件就停、你打算怎麼分析、什麼叫成功——全部寫下來，戳上時間戳，公開存檔（存到像 OSF 這類公開登記處）。事後你做出來的分析，跟這份預先凍結的計畫一比對，所有「事後才決定的自由度」就無所遁形。\n\n它堵的是哪一種自欺？**事後挑分析**。\n\n```text\n沒有預註冊（研究者自由度全開）：\n  收資料 → 邊看邊決定：\n            量哪個指標好（測了 5 個，報最顯著那個）\n            收到多少人才停（看到顯著就停，叫 optional stopping）\n            要不要排除離群值（排掉對自己不利的那批）\n            分幾組、怎麼切（切到出現顯著的那個切法）\n  → 每一個「事後決定」都偷偷抬高偽陽率，而且自己不一定察覺\n\n有預註冊（自由度事先凍結）：\n  先寫死：假設 = H，主要指標 = X，樣本 = 200，停止規則 = 收滿就停，\n          分析 = 預先指定的那一個，成功 = p<0.05 在 X 上\n  → 戳時間戳、公開存檔\n  → 然後才收資料、跑「那一個」分析\n  → 事後想換指標/換分析？可以，但必須標明是「探索性」，不能假裝是「驗證性」\n```\n\n你已經在做這件事了，名字叫**先寫驗收標準、再實作**。\n\n想想一個健康的 A/B test 流程跟一個有毒的流程差在哪。有毒的：上線新版本，盯著 dashboard，哪個指標先動就講哪個，一直跑到某個指標達到顯著就喊「贏了」收手。這就是 ch09 講的偷看（peeking）＋多重比較，是教科書級的 p-hacking。健康的：**上線前**就寫死——主要指標是轉換率（不是事後挑的留存、停留時間、點擊率裡最好看那個），樣本量算好要收多少（不是看到顯著就停），停止規則固定，什麼叫贏事先定義。然後才放量，才看那一個指標。\n\n這兩個流程的差別，**和預註冊與不預註冊的差別，是同一件事**。預註冊就是把「驗收標準」從「實作之後可以偷偷改」變成「實作之前已凍結、改了會被看見」。你不會接受一個工程師在跑完壓測之後才宣布「喔其實我們的目標一直是 P95 不是 P99」——因為你知道那叫**移動球門**。科學界花了很久才把「移動球門」這件在工程界天經地義不能幹的事，變成制度上不能幹的事。\n\n> 誠實標示嚴謹度（工程師的嚴謹）：預註冊不是萬靈丹，每一步都能講出理由地說它**不**保證什麼——它不保證實驗設計本身是好的（你可以預註冊一個爛實驗）、不保證樣本有代表性、不能阻止有人事後偷偷不照計畫做（它讓偏離**可被看見**，不是物理上不可能）。而且 2024–2025 有個值得記下的反諷（2026-06）：當「有沒有預註冊」本身變成一個品質徽章、變成期刊加分項，有些人會為了拿徽章而預註冊一份空泛到沒有約束力的計畫——工具一旦變成指標，就開始被玩弄（這正是 ch09／ch16 的 Goodhart 式自欺在制度層的回聲）。預註冊堵的是「事後挑分析」這一格，不是全部。\n\n## 註冊報告：在還沒有結果之前，就決定要不要發表\n\n預註冊堵住了研究者那一端的自由度。但獎勵結構表裡還有一格沒拆：**期刊只收漂亮的正面結果**。這格不拆，發表偏誤就還在——你預註冊得再乾淨，做出 null result 還是會被期刊退稿、塞回抽屜。\n\n**註冊報告（registered reports）** 拆的就是這格。它把同儕審查切成兩半：\n\n```text\n傳統發表流程：\n  做實驗 → 拿到結果 → 寫論文 → 投稿 → 審稿人看「結果」決定收不收\n                                        ↑ 結果不漂亮 → 退稿 → 進抽屜（發表偏誤）\n\n註冊報告流程：\n  寫研究計畫（問題＋方法＋分析＋預註冊）→ 投稿\n    → 審稿人在「還沒有任何結果」時審「這個問題重要嗎、方法夠嚴謹嗎」\n    → 通過 → 期刊「原則上接受」(in-principle acceptance)：\n              不管結果是正是負、顯著不顯著，只要你照計畫做，就保證刊登\n    → 然後才做實驗、拿到結果（正負都登）\n```\n\n這個設計的精妙在於它**同時**堵了兩個自欺：審稿人在看不到結果的情況下評判方法，就不會被一個漂亮的正面結果迷惑而放水（也不會因為結果挑戰了自己的立場而刁難——這是 ch11 動機性推理的制度解藥）；而「原則上接受」這個承諾，意味著**做出 null result 的人不再被懲罰**，抽屜被打開了。一個事先被判定「問題重要、方法嚴謹」的實驗，做出「沒效果」也是有價值的知識——它告訴你那個效應可能不存在。\n\n對照你的工程直覺：這像是**在實作之前先讓 reviewer 批准 RFC 與測試計畫，並承諾「只要你照這個計畫做、把測試誠實跑完，不管綠紅都收進主幹的紀錄」**。你不會因為某次壓測結果不好看就把它從紀錄裡刪掉假裝沒測過——那是在污染你自己團隊的知識庫。註冊報告就是科學界版本的「null result 也要進紀錄」。\n\n## 開放資料與多實驗室複製：把獨立性做大\n\n剩下兩道修補制度，目標都是把前面講的「獨立性」這件事**規模化**。\n\n**開放資料／開放材料（open data / open materials）**：把原始資料、分析程式碼、實驗材料全部公開。它堵的是「你說有就有、沒人能查」這種封閉自欺。一旦資料公開，任何人都能重跑你的分析（計算再現），任何人都能拿你的材料去做獨立複製（不必猜你到底怎麼做的）。這對你來說毫無神秘感——這就是**開源 ＋ 可重現建置**：把環境、依賴、流程全攤開，讓任何人在乾淨環境都能重現，「在我機器上會動」失去藏身之處。\n\n**多實驗室複製（multi-lab / many-labs）**：與其等某個孤單的研究生去複製一篇論文（沒獎勵、樣本又小），不如組織幾十個實驗室，用同一份預註冊協定、同時複製同一個效應，匯總成一個巨大樣本。這是複製的工業化版本，把「獨立性」這個變數一次拉到很高——幾十個不同地點、不同人群、不同主試者，如果效應在這麼多獨立條件下都穩定出現，它就很難是某個團隊的僥倖或習慣偏差。\n\n這裡可以放一個本書最該誠實的具體案例，因為它正好示範了「複製如何過濾僥倖」。**自我耗竭（ego depletion）** ——「意志力像肌肉，用了會累」這個 1998 年提出、紅遍二十年、被寫進無數暢銷書的效應——在大型多實驗室預註冊複製下幾乎站不住（2026-06）：\n\n```text\n自我耗竭效應的複製史（截至 2026-06，需 hedge）\n\n  1998   原始研究提出，效果看起來很大、很漂亮，紅了二十年\n  2016   一個 23 實驗室、2000+ 人的預註冊多實驗室複製\n         → 沒有顯著效果（效果量基本上趴在零附近）\n  後續   另一個多實驗室複製找到「統計顯著」但效果量極小（d ≈ 0.1，\n         小到實務上幾乎沒意義，且做法仍有爭議）\n\n  解讀（誠實版，別過度伸張）：\n    這不證明「意志力一定不存在」，\n    但它強烈說明：原始那個又大又漂亮的效應，\n    很可能是「小效應 ＋ 發表偏誤 ＋ 研究者自由度」放大出來的。\n    重點不是「心理學都假」（那是 ch09 T7 的陷阱），\n    是「重複把一個撐了二十年的僥倖過濾掉了」——這正是糾錯機制在運作。\n```\n\n注意我在這裡的措辭有多小心，這是刻意的（守住 landscape C-replication 的紀律）：我不說「自我耗竭被證明是假的」，我說「大型預註冊複製未能支持它原本宣稱的那種效果（2026-06）」。因為複製本身也可能設計有限、條件不同；科學的誠實要求對複製失敗也保持同樣的暫定態度（這是 ch10「科學的真永遠暫定」在這裡的回聲）。但**方向**很清楚：一個沒被獨立複製就紅了二十年的效應，禁不起複製的拷問。\n\n## 脊椎透鏡：塞麥爾維斯其實被複製過——但複製救不了他\n\n現在換這個透鏡看脊椎。**這是脊椎案的塞麥爾維斯洗手案，現在換「複製」透鏡看。**\n\n前面幾章你看到的塞麥爾維斯，是一個有觀察（兩病房死亡率差，每千人版 98.4‰ vs 36.2‰）、有準隨機對照（單雙日交替分配，見 ch05）、有戲劇性介入效果（氯化石灰洗手後，1848 年第一病房全年降到約 1.27%，見 ch01）的人。\n\n本章要補上一個常被遺漏的事實：**他的結果被複製過。**\n\n塞麥爾維斯離開維也納後，在匈牙利的醫院（佩斯的聖羅胡斯醫院）推行同樣的洗手措施，產褥熱死亡率**再次**下降。這不是同一個病房的同一批數據——是**另一個地點、另一批產婦、另一個時間**重做了一次介入，效果重現。用本章的語言：這是一次獨立複製，而且成功了。按理說，這應該是壓垮反對者的證據——一次降死亡率可能是僥倖，兩個不同醫院都降，僥倖的解釋就很難成立了。\n\n然後，最痛的一點來了：**複製成功，並沒有讓他被接受。**\n\n```text\n塞麥爾維斯案 × 本章各修補制度的對帳\n\n  制度          他有沒有做到              結果\n  ─────────────────────────────────────────────────────────\n  複製          有（佩斯醫院再次降死亡率） 效果重現，仍被否決\n  獨立性        部分（不同醫院、他本人推） 主試者仍是他，獨立性不足\n  開放資料/溝通  幾乎沒有（發表慢、文筆差） 數據沒有有效流通、說服力打折\n  預註冊        不適用（時代沒有此概念）   ——\n  機制          完全沒有（無細菌理論）     ← 致命傷，複製也補不了這一格\n```\n\n這張表逼出本章最重要、也最反直覺的一課：**複製是必要的，但不是充分的。** 塞麥爾維斯把「複製」這一格做到了（在當時的條件下難能可貴），結果依然被整個醫界否決二十年。為什麼？因為他缺的不是「再多一次證據」，他缺的是**機制**——他說不出「為什麼洗手有效」。沒有細菌理論（Pasteur／Koch 要到他死後才立起），他的複製成功在反對者眼裡只是「又一個無法解釋的巧合」，而一個無法解釋的巧合，無論重現幾次，都很容易被當時的瘴氣典範「解釋掉」（這就是 ch04 提的 Duhem–Quine：反例總能用調整輔助假設來吸收）。\n\n這裡藏著一個給現代科學的警告，也是本章接 ch14 的橋：**我們今天如此推崇複製、把它當再現性危機的解藥，會不會反過來低估了「光有複製不夠」？** 一個效應被複製一百次，如果完全沒有機制解釋它為什麼成立，它仍然是脆弱的——你不知道它在什麼條件下會失效、會不會其實是某個所有複製都共享的隱藏混淆。塞麥爾維斯的悲劇不是「他的證據不夠」，是「他的證據缺了機制這一塊」。複製過濾僥倖，機制提供理解——兩者都要。這一塊，ch14 接著講。\n\n## 「危機」這個詞，其實是好消息\n\n把本章收在一個會讓你愣一下的觀點上。\n\n「再現性危機」這個詞聽起來像訃聞——好像科學病了、垮了、不可信了。媒體很愛這個敘事，因為「科學破產」比「科學在做正常的自我維護」好賣。但如果你把本章從頭讀到這裡，你應該已經看出來：**危機被揭露、被命名、被吵、被催生出一整套修補制度——這整個過程，本身就是科學糾錯機制在公開運作的證據。**\n\n對照一下「不會認錯」的體系（這是 ch12 的核心對比）。占星、順勢療法、各種偽科學，它們沒有「再現性危機」——不是因為它們的結果都複製得出來，恰恰相反，是因為**它們從不複製、從不公開檢討、從不認錯**。一個從不檢查自己錯在哪的體系，當然永遠不會有「危機」——它只是一直錯下去而沒人去量。**會爆出危機，是因為有人在認真地量自己對不對。** 偽科學的「歲月靜好」才是真正該擔心的。\n\n```text\n兩種體系面對「我可能錯了」\n\n  科學（危機後）：       公開複製 → 發現一批效應站不住 → 命名危機\n                       → 改制度（預註冊/註冊報告/開放資料/多實驗室）\n                       → 「危機」= 糾錯正在運作的噪音\n\n  偽科學/不認錯的體系：   不複製 → 不檢查 → 永遠沒有「危機」\n                       → 安靜 = 從來沒在量自己對不對\n                       → 「歲月靜好」= 糾錯機制根本不存在\n```\n\n當然，這份樂觀要誠實地打折（不造神也不唱衰）。糾錯**正在**運作，不代表已經修好——有研究指出（2026-06），那些已經被證明複製不出來的結果，在危機被揭露多年後**仍然被照常引用**，而且引用時很少有人提它複製失敗。改制度容易，改整個學術界的引用習慣與獎勵結構難。所以正確的態度是：危機是科學健康的證據（它在糾錯），同時糾錯遠未完成（積習難改）。這份「在修、但還沒修完」的張力，比「科學破產」或「科學萬歲」任何一個單音都更接近真相——也更接近你對自己系統的態度：發現一個 class of bug 並建立了防護，是好事；但你不會因此宣布「我們再也不會有這種 bug 了」。\n\n回到中央張力：**科學不是證明真理，是有系統地把自己被騙的機會壓到最低。** 本章講的每一道制度——複製過濾僥倖、預註冊凍結球門、註冊報告打開抽屜、開放資料消滅「在我機器上會動」、多實驗室拉高獨立性——堵的都是同一類自欺：**「一次僥倖被當成穩定事實」**。而「危機」這個詞最深的一層意思是：科學是少數會主動去找自己哪裡騙了自己、找到了還大聲說出來的人類事業。這件事本身，值得你對它多一分敬意——和多一分監督。\n\n## 直覺的陷阱\n\n| 陷阱 | 錯誤直覺 | 在哪一步帶你下溝 | 正確版 |\n|---|---|---|---|\n| **危機 = 科學破產**（守 ch09 T7） | 「複製率只有三分之一到四成，所以心理學／科學都是假的、不可信」 | 把「一批特定效應未穩健複製」過度概括成「整個領域都假」；又或反過來宣稱「全部都假」 | 那是**對特定一批研究**的複製率，而且它催生了制度修正——**危機是糾錯機制在運作，不是破產**。誠實版兩邊都不站：不說「都假」，也不說「沒事」 |\n| **複製成功 = 結論確立** | 「我重做一次也顯著，所以這效應坐實了」 | 忽略了**獨立性**——同一個人用同一套可能有偏的流程重做，偏誤會忠實重現 | 有鑑別力的是**獨立**複製（別人、別的樣本、別的實驗室）；自己重做十次，不等於十份獨立證據 |\n| **預註冊 = 不准探索** | 「凍結了分析計畫，就不能做任何計畫外的分析了」 | 把預註冊誤解成枷鎖，於是抗拒它 | 預註冊不禁止探索，它只要求你**誠實標明**哪些是事先說好的「驗證」、哪些是事後發現的「探索」。探索性發現完全可以做、可以報，只是不能假裝成驗證性結果 |\n| **預註冊 = 萬靈丹** | 「只要預註冊了，這研究就可信」 | 把一道防線當成全部，放鬆對設計本身的審視 | 預註冊只堵「事後挑分析」這一格——你可以預註冊一個爛實驗、不具代表性的樣本。而且當「有沒有預註冊」變成品質徽章本身，它就開始被玩弄（2026-06）。它是必要防線之一，不是品質保證 |\n| **複製夠了就行** | 「只要能反覆複製，就不需要知道為什麼」 | 用塞麥爾維斯的反例：他的結果被複製過，仍被否決——複製過濾僥倖，但補不了**機制**那一格 | 複製是**必要不充分**。沒有機制，一個複製一百次的效應仍是脆弱的（不知何時失效、是否共享隱藏混淆）。複製＋機制才完整（接 ch14） |\n\n**具名陷阱（本章主推）——「複製成功就坐實了」的獨立性盲點**：這是工程師特別容易踩的，因為我們習慣「重跑一次過了就安心」。但科學複製的力量**全部來自獨立性**。你自己把 flaky test 重跑 100 次仍然綠，這有意義——因為環境的隨機性提供了某種獨立性。但如果你的 test 之所以綠是因為它 mock 掉了那個真正會出問題的依賴，那你重跑一萬次都綠、上線照樣炸——因為一萬次都共享同一個「mock 掉真依賴」的系統性偏差。自我察覺的方法：問「我這 N 次重複，有沒有換掉那個最可能藏著偏差的環節？」如果每一次都共享同一個可疑環節（同一個人、同一套流程、同一個 mock），那 N 次重複的可信度增益遠小於你以為的。\n\n## 紙上推演\n\n### 推演題\n\n**題 1（★★，[15 分鐘]）—— 把 A/B test 改造成「預註冊」式**\n你的團隊要驗證「新版推薦演算法會不會提升使用者留存」。目前的習慣流程是：上線新版，每天看 dashboard，盯著留存、轉換率、停留時間、點擊率、客訴數這五個指標，哪個先動就先講哪個，跑到某個指標達到顯著就喊「新版贏了」收手。請設計一個「預註冊」式的版本，明確寫出你會在**上線前凍結哪些東西**，並指出原本流程的每一步分別在 p-hack 哪個漏洞。\n\n**題 2（★★，[12 分鐘]）—— 為什麼「危機被揭露」是健康的證據**\n你的朋友看到新聞標題「研究發現：超過六成心理學經典實驗無法重現，科學陷入信任危機」，下結論說「看吧，科學跟算命沒兩樣，都是唬人的」。用本章與 ch12 的工具，寫一段話反駁他——但要**誠實**，不能滑到另一個極端（「科學完美無瑕」）。\n\n**題 3（★★★，[20 分鐘]）—— 複製成功，為什麼還不夠？**\n塞麥爾維斯的洗手結果在佩斯醫院被獨立複製、效果重現，他卻仍被醫界否決。請論證：(a) 為什麼「再多一次複製」救不了他；(b) 一個被複製一百次、但完全沒有機制解釋的現代效應，可能在哪些情況下仍然是錯的或脆弱的（至少舉兩種）；(c) 這對「我們今天是不是太推崇複製、低估了機制」這個問題，給你什麼啟示。\n\n### 推演解答\n\n**題 1 解答。**\n\n預註冊式版本——上線前（看到任何資料之前）凍結這五樣，戳時間戳存檔（哪怕只是存進團隊的 RFC／實驗登記文件）：\n\n```text\n上線前凍結（驗收標準先行）：\n  1. 主要指標：留存率（7 日）        ← 只此一個是「驗證性」，事先指定\n     （其餘四個若要看，標明為「探索性」，結果只能當線索不能當結論）\n  2. 假設與方向：新版 ≥ 舊版留存，預期提升 ≥ X%（事先定 X）\n  3. 樣本量／實驗時長：事先用功效分析算好要收多少、跑幾天（不看資料）\n  4. 停止規則：收滿預定樣本/時長才看結果（不准「達標就停」）\n  5. 成功定義：主要指標上 p < 預定門檻，且效果量 ≥ 實務顯著的下限\n\n原流程的每一步在 p-hack 什麼：\n  「盯五個指標、哪個先動講哪個」 → 多重比較（測 5 個，總有一個碰巧顯著）\n  「跑到顯著就停」              → optional stopping / 偷看（peeking），灌爆偽陽率\n  「哪個先動先講」              → 事後挑指標（HARKing：事後把假設改成「正好顯著」那個）\n```\n\n常見錯路：(1) 以為「預註冊就不能看另外四個指標了」——不對，可以看，只是必須標明是探索性、結論不能建立在它們上（見陷阱表第三列）。(2) 凍結了主要指標卻忘了凍結**停止規則**——只要還能「達標就停」，偽陽率照樣被灌爆，這是最常被漏掉的一格。(3) 把「探索性發現」寫進結論假裝是驗證——這就是 HARKing，正是預註冊要堵的。\n\n**題 2 解答。**\n\n一段誠實的反駁，骨架如下：\n\n「那個『六成無法重現』的數字（實際上約三分之一到四成複製成功，見 ch09），是科學界**自己去複製、自己量出來、自己公開**的——這恰恰是算命做不到的事。算命從來沒有過『再現性危機』，不是因為它的預言都準，是因為**它從不去檢查自己準不準、從不公開複製、從不認錯**。一個會爆出危機的體系，是因為有人在認真量自己對不對；一個歲月靜好的體系，往往是根本沒在量。而且科學爆出危機後做了什麼？它發明了預註冊、註冊報告、開放資料、多實驗室複製去修——糾錯機制公開運作。所以正確的結論不是『科學跟算命一樣』，正好相反：**會自曝其短並動手修補，正是科學跟算命最不一樣的地方。**」\n\n但要誠實打折（不能滑到「科學完美」）：「同時也得承認，糾錯**還沒修完**——複製失敗的結果至今仍被照常引用（2026-06），獎勵結構積習難改。所以結論是『科學在修、但還沒修完』，不是『科學沒問題』。」\n\n常見錯路：被朋友激到，反向過度辯護成「科學從不犯錯／危機是假議題」——那就把 ch09 揭露的真問題給否認掉了，也違反本書「不造神」的紀律。誠實的反駁必須兩邊都不站：不接受「都假」，也不接受「沒事」。\n\n**題 3 解答。**\n\n(a) 為什麼再多一次複製救不了塞麥爾維斯：他被否決的關鍵不是「證據量不夠」，是**缺機制**。在瘴氣典範下，一個無法解釋為什麼成立的相關，無論重現幾次，都能被反對者用「調整輔助假設」吸收掉（Duhem–Quine，見 ch04／ch08）——「那只是巧合」「那家醫院還有別的不同」「你的數據有問題」。複製增加的是「效應真實存在」的信心，但它**完全不觸及**「為什麼存在」這個問題；而當時要說服人接受一個違反主流理論的主張，缺的正是後者。複製過濾僥倖，但它對「機制空白」這一格無能為力。\n\n(b) 一個被複製一百次但沒有機制的現代效應，仍可能錯/脆弱的情況（舉兩種）：\n\n```text\n情況一：所有複製共享同一個隱藏混淆\n  一百個實驗室都用同一套有偏的量測工具/受試者池/實驗範式，\n  那個偏差在每一次複製裡忠實重現 → 一百次「成功複製」其實是\n  一百次重現同一個系統性錯誤（獨立性是假的）。\n  沒有機制，你無從預判「這個共享環節會不會就是混淆源」。\n\n情況二：效應真實，但適用域未知（無機制 = 無法預測何時失效）\n  效應在所有測過的條件下都成立，但你不知道「為什麼」，\n  所以你不知道它在沒測過的條件下還成不成立。\n  一旦推廣到新環境（新人群、新尺度、新情境），可能突然失效，\n  而你毫無預警——因為你從沒有過一個能告訴你「邊界在哪」的機制。\n```\n\n(c) 啟示：今天把複製當再現性危機的解藥，是對的、必要的——但若因此以為「只要複製得出來就萬事大吉」，就會低估機制。塞麥爾維斯案是這個低估的反向預警：他**有**複製、**缺**機制，結果不被接受、也（在反對者的懷疑裡）始終帶著「會不會是別的原因」的陰影。理想的科學結論需要**複製（過濾僥倖）＋機制（提供理解、劃定適用域、抵抗『其實是別的原因』的質疑）**兩者兼備。這正是 ch14 的主題：機制之必要。\n\n常見錯路：把這題答成「所以複製沒用」——剛好相反，複製是必要的，題目要的是看出它**不充分**。另一條錯路是只答 (a) 的史實、不抽象到 (b) 的一般原理——本書要的是能遷移到你自己系統的直覺，不是背塞麥爾維斯的傳記。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 為什麼「一次顯著結果」分不出「真效應」和「5% 的運氣」？複製靠什麼機制把這兩者分開？（提示：跟 flaky test 跑 100 次同構）\n2. 複製的防自欺力量，**核心**來自「做得多嚴謹」還是「獨立性」？為什麼自己重做十次，不等於十份獨立證據？\n3. 危機之前那套「獎勵結構」，為什麼是**結構性地**放大偽陽、過濾糾錯？「檔案抽屜問題」是這張表裡的哪一格？\n4. 預註冊堵的是哪**一種**自欺？它跟你「先寫驗收標準再實作」是同一件事的哪個對應？它**不**保證什麼？\n5. 註冊報告跟普通的「先預註冊再做」差在哪？「原則上接受」這個承諾，拆掉了獎勵結構表裡的哪一格？\n6. 為什麼說「再現性危機被揭露」反而是科學健康的證據？這個論點要怎麼**誠實地打折**，才不會滑成「科學完美無瑕」？\n7. 塞麥爾維斯的結果**被複製過**，為什麼複製成功仍救不了他？這對「複製是不是萬靈丹」說明了什麼？（接 ch14）\n8. 本章在堵哪一種自欺？用中央張力的句型講一遍（「一次僥倖被當成穩定事實」這條主線怎麼貫穿複製／預註冊／註冊報告／開放資料／多實驗室？）\n\n## 延伸閱讀\n\n- **Open Science Collaboration, \"Estimating the Reproducibility of Psychological Science\"（*Science*, 2015；OSF: osf.io/ezcuj）**：再現性危機的引爆論文，複製 100 項研究的那一篇。本章談「修補」，這篇是「診斷」的原始出處（細節歸 ch09）；讀它的方法論部分，看「大規模獨立複製」實際怎麼組織。\n- **Center for Open Science（OSF, osf.io）與 Registered Reports（cos.io/rr）**：預註冊與註冊報告的實際平台與規範。想看「先凍結驗收標準」在科學界長什麼樣、註冊報告流程怎麼跑，看這裡的指引（工程師會覺得親切：很像 RFC＋測試規格先行）。\n- **Simmons, Nelson & Simonsohn, \"False-Positive Psychology\"（*Psychological Science*, 2011）**：研究者自由度／p-hacking 的奠基文。本章的「為什麼要凍結分析計畫」是它的反面——讀它你會懂預註冊到底在防什麼（機制細節見 ch09）。\n- **\"Crisis or self-correction: Rethinking media narratives about the well-being of science\"（PMC5856501）**：直接論證「危機 vs 自我糾錯」這個敘事張力的文章。本章最後一節的觀點來自這條線，想看更完整的兩面論述讀它。\n- **Hagger 等的多實驗室自我耗竭複製（2016）與後續 Many Labs 複製**：本章自我耗竭案例的出處。讀它感受「多實驗室預註冊複製」如何把一個紅了二十年的效應拷問到趴下——同時注意作者們措辭多謹慎（沒人宣稱「證明意志力不存在」），這份謹慎本身就是 ch10「科學的真永遠暫定」的示範（引用前查 2026 最新狀態）。\n- **《馴服隨機》ch19**：複製率、多重比較、發表偏誤這些數字「怎麼算」的統計機制。本章只講制度修補、刻意不算，要補計算肌肉去那本（談「統計如何崩壞」的那章）。\n- **《思考的陷阱》談動機性推理／自我合理化的那章**：為什麼真誠的研究者會抗拒預註冊、會無意間 p-hack——那是心理機制，歸偏誤書。本章只講「制度怎麼從外部堵這個偏心」，不講「大腦內部為何這樣」。\n"}, {"id": "ch14-mechanism", "file": "ch14-mechanism.md", "group": "Part IV — 科學擋不住的、與它如何修補", "title": "ch14 — 機制之必要：塞麥爾維斯缺的那一塊", "md": "# ch14 — 機制之必要：塞麥爾維斯缺的那一塊\n\n> **本章解決什麼問題**：到 Part IV 為止，你已經看過科學擋不住的那一半（ch11 動機性推理）、它如何跟偽科學劃界（ch12）、危機後它怎麼靠複製自我修補（ch13）。但有一塊一直被你的脊椎案例擱在角落、現在非攤開不可——**機制**。塞麥爾維斯有對照、有巨大的效果，卻說不出「為什麼有效」，這正是他被否決的關鍵之一。本章要把三件你平常混為一談的事拆開：「有效果」「有機制」「被接受」是**三件不同的事**，少哪一件、後果都不一樣。釐清這個，你才會懂為什麼機制能把一個發現從「黑箱有效」升級成「可信、可推廣、可被接受」——以及反過來，為什麼「要求機制」有時會拖慢一個救命的介入，讓有效的東西在等待解釋的二十年裡繼續死人。這是脊椎透鏡裡最沉重的一層。\n\n## 從你已知的出發\n\n你修過一個半夜的事故，我幾乎可以確定。\n\n凌晨三點，某個服務的延遲開始往上爬，錯誤率破了告警閾值。你登進去翻 log、看 metrics，找不到明顯的原因——沒有最近的部署、流量也沒異常、依賴的服務看起來都正常。你試了幾件事都沒用，最後死馬當活馬醫，把那個服務**重啟**了一下。延遲掉回正常，錯誤率歸零。系統好了。\n\n現在你面對一個比修復本身更難的問題：**這個 ticket 你敢不敢關？**\n\n你有「效果」——重啟之後指標確實恢復了，這是觀察得到的、可複述的事實。但你**沒有機制**——你不知道**為什麼**會壞、也不知道**為什麼**重啟會好。於是你心裡那個焦慮的聲音開始問一串問題，每一個都讓你的手在「Resolve」按鈕上方懸著：\n\n- **它會不會復發？** 你沒找到根因，那個讓它壞掉的東西可能還在，只是被重啟暫時掃到地毯底下。下禮拜、下個尖峰、換個時段，它可能再來一次。\n- **是不是碰巧？** 也許重啟根本不是真正的原因。也許是你重啟的同時，上游那個你沒注意到的尖峰剛好過去了。你把「重啟」和「恢復」綁成了因果，但這可能只是個相關（ch06 那一整章在講的東西，現在咬到你了）。\n- **換個環境還有效嗎？** 如果這事發生在另一個 region、另一個版本、另一台機器上，重啟還會是解藥嗎？你不知道——因為你不知道它在治什麼。\n\n這一整串焦慮，名字叫**機制的缺席**。你手上有的是一個**黑箱有效（black-box effective）**的修復：輸入「重啟」、輸出「好了」，中間那段「為什麼」是黑的。而一個資深工程師跟一個只會重啟的人之間，差別往往就在這裡——**你知道「重啟就好了」不等於「修好了」。** 真正關掉 ticket 而問心無愧，要的是 root cause：那個能回答「為什麼壞、為什麼好、什麼時候會再壞」的機制。\n\n把這份焦慮放大一百倍、再加上「期間每天有產婦因此死去」，你就站到了塞麥爾維斯的位置。本章講的就是這份「有效果、沒機制，到底能不能算數」的焦慮——它既是你關 ticket 時的猶豫，也是維也納醫界否決一個救命發現的理由。\n\n## 三件不同的事：有效果、有機制、被接受\n\n先把概念釘死。我們日常講「這個東西是對的、可信的」，其實偷偷把三件**邏輯上獨立**的事捆成了一團。把它們拆開，是本章的全部基礎。\n\n```text\n三件獨立的事（少了任何一件，後果都不同）\n\n  ① 有效果（efficacy）\n     = 介入 X 真的讓結果 Y 改變了\n     = 你有對照、有相關被論證成因果（ch05、ch06）\n     ← 回答的是「它有用嗎」\n\n  ② 有機制（mechanism）\n     = 你說得出「為什麼 X 會導致 Y」\n     = 有一條從因到果、可被獨立檢驗的因果鏈\n     ← 回答的是「它為什麼有用」\n\n  ③ 被接受（acceptance）\n     = 相關的社群／決策者願意採信並採用它\n     = 通過了 ch08 講的制度防線（同儕、典範、複製）\n     ← 回答的是「別人信不信、用不用」\n```\n\n關鍵的洞見是：**這三件事可以任意組合，缺哪一件都對應一種真實世界裡會出事的狀況。** 列出幾種組合你就懂為什麼非拆不可：\n\n```text\n效果 × 機制 × 接受 的幾種組合\n\n  ✓效果 ✓機制 ✓接受  → 成熟的科學知識（無菌術，今天）\n  ✓效果 ✗機制 ✓接受  → 「先有效、後懂機制」（阿斯匹靈 1899–1971）\n  ✓效果 ✓機制 ✗接受  → 超前的好東西被卡（少見，但發生）\n  ✓效果 ✗機制 ✗接受  → 塞麥爾維斯 1847！效果在、機制缺、被否決\n  ✗效果 ✓機制 ✓接受  → 「聽起來很有道理」的無效療法（最危險之一）\n  ✗效果 ✗機制 ✓接受  → 偽科學、被廣泛接受的迷信（ch12）\n```\n\n停在倒數第二行多看一眼：**「✗效果 ✓機制 ✓接受」** ——一個沒效果、卻有漂亮機制故事、還被廣泛接受的東西，是醫學史與技術史上最會騙人的一類。它有一個看似完整的「為什麼」（聽起來很科學），有很多人在用（社會證據），唯獨**沒有人嚴格驗證過它真的有效**。放血療法（bloodletting）就是這種——它有一整套體液學說當機制、被接受了兩千年、卻從沒被乾淨的對照驗證過效果，最後被證明在多數情況下有害。**機制故事的說服力，跟效果的真實性，是兩回事。** 一個好聽的機制能讓無效的東西被接受——這是「機制」這個概念的陰暗面，本章後段會回來咬這一口。\n\n而塞麥爾維斯，是「✓效果 ✗機制 ✗接受」那一行——效果鐵打、機制空白、被整個社群否決。本章接下來就用這一行，把「機制為什麼重要」一層層剝開。\n\n## 脊椎透鏡：塞麥爾維斯缺的那一塊\n\n換這一層透鏡，回看脊椎的塞麥爾維斯（Ignaz Semmelweis）洗手案。前面的章節我們看過它的觀察（ch01）、理論負載（ch02）、溯因（ch03）、可證偽（ch04）、對照（ch05）、因果論證（ch06）、貝氏確證（ch07）、被社群否決（ch08）。這些透鏡裡，**他幾乎每一樣都做對了**——對照漂亮（同院同期兩病房，醫師 98.4‰ vs 助產士 36.2‰，1840–46 平均）、介入清楚（1847 年 5 月中下氯化石灰洗手令）、效果戲劇性（1848 年第一病房全年降到 1.27%，與第二病房 1.33% 幾乎拉平）。\n\n但他缺一塊，而那一塊在當時是致命的：**他說不出「為什麼」。**\n\n```text\n塞麥爾維斯有什麼、缺什麼（1847–1848）\n\n  ✓ 效果：對照＋介入＋戲劇性的死亡率下降\n           （ch05 對照、ch06 因果論證都站得住）\n\n  ✓ 溯因出一個「原因」：手上的「屍體微粒\n     （cadaveric matter）」把病傳給產婦（ch03）\n\n  ✗ 機制：但「屍體微粒」是什麼？怎麼致病？\n           為什麼洗手洗得掉它？\n     → 他【答不出來】。\n       細菌致病說要等到 Pasteur（1860s）、\n       Koch（1880s）才立起——在他死後。\n     → 「屍體微粒」是一個【佔位符】：\n        他知道「有個看不見的東西經由手傳染」，\n        但說不出那是什麼、依什麼物理化學原理作用。\n\n  ✗ 被接受：缺了機制，是他被否決的關鍵之一。\n```\n\n請務必守住這裡的誠實版（這是全書的紅線，landscape T9）：**別把塞麥爾維斯寫成「發現細菌的英雄」。** 他沒有細菌理論。他溯因出的「屍體微粒」是一個前細菌學時代的模糊概念——方向對（確實有個看不見的傳染媒介、確實經手傳播、確實洗得掉），但**機制空白**，後來被細菌說整個改寫並精確化。他是「有效果、沒機制、被否決」的活標本，不是「證明了細菌致病」的人。把這點寫丟，整個脊椎案例最深的教學點就垮了。\n\n那麼，為什麼「缺機制」會這麼要命？因為機制不是錦上添花的學術裝飾，它**實實在在地在幹四件事**。下一節拆給你看——而你會發現，這四件事，正好就是你關 ticket 時那一串焦慮的學名。\n\n## 機制在做的四件事\n\n機制不只是「知道為什麼」這種智識上的滿足感。它有四個**可操作的功能**，每一個都對應一種「沒有它你會出的事」。\n\n```text\n機制在做的四件事（每件對應一種「沒它會出的事」）\n\n  ① 解釋「為何有效」\n     有機制 → 你懂這件事是怎麼運作的\n     沒機制 → 你只有一個黑箱，輸入對的、輸出好的，\n              中間全黑（你關 ticket 時的「重啟就好了」）\n\n  ② 預測「何時失效」\n     有機制 → 你能推導出「在什麼條件下它會不再有效」\n     沒機制 → 你不知道邊界在哪，換個環境只能祈禱\n              （「換個 region 還有效嗎？」）\n\n  ③ 抵抗「相關 ≠ 因果」的質疑\n     有機制 → 「為什麼」這條因果鏈本身可被獨立檢驗，\n              不再只靠「它們一起動」的相關（ch06）\n     沒機制 → 對手永遠能說「也許是巧合、也許是混淆變因」\n              （瘴氣派對塞麥爾維斯就是這樣質疑的）\n\n  ④ 讓社群安心接受\n     有機制 → 它接得上既有的知識網，\n              新發現能被別人理解、整合、推廣\n     沒機制 → 它是個孤立的異常，跟整個典範格格不入，\n              社群沒有「掛它的地方」（ch08 典範）\n```\n\n把這四件事跟本章開頭那串「關 ticket 焦慮」並排，你會發現它們**逐字對應**：\n\n- 「它會不會復發？」← 你缺的是 **② 預測何時失效**。有機制你才知道那個故障條件還在不在。\n- 「是不是碰巧？」← 你缺的是 **③ 抵抗相關非因果**。沒機制，「重啟→恢復」始終可能只是相關。\n- 「換個環境還有效嗎？」← 還是 **② 預測何時失效**，加上 **① 解釋為何有效**。\n\n所以「缺機制的焦慮」不是你神經質——它是有結構的、可命名的。**機制的價值，就是把這四種焦慮一次解決。** 而塞麥爾維斯缺機制，意味著他同時欠了這四樣：他解釋不了為何有效（瘴氣派要的「為什麼」他給不出）、預測不了何時失效（為什麼有些病房洗了還是有死亡？他無法從機制反推）、抵抗不了相關非因果的質疑（「也許是病房通風、也許是別的」對手隨便挑）、更接不上當時的醫學典範（瘴氣論裡沒有「手上看不見的微粒」的位置）。**四個漏洞一起破。** 這就是為什麼一個效果鐵打的發現，能被否決二十年。\n\n不過——如果故事到這裡結束，本章就只是在說「機制很重要、缺機制活該被否決」。那會是個危險的、半真半假的教訓。因為機制這件事，有它陰暗、反直覺的另一面。下一節必須誠實地翻過來講。\n\n## 反面：很多有效的東西，是先有效、後懂機制\n\n如果你從上一節得出「沒機制就不該採信」這個結論，那你會親手扼殺人類醫學史上一大半的進步。\n\n因為一個尷尬的事實是：**極多救命的東西，是先被發現有效、很久以後才懂機制的。** 機制常常是**遲到的解釋**，不是**先決的條件**。看三個例子，每一個都是「黑箱有效」撐了幾十年甚至更久才補上機制：\n\n```text\n先有效、後懂機制（機制是遲到的解釋）\n\n  阿斯匹靈（aspirin）\n    1897 合成、1899 上市，廣泛用於退燒、止痛、消炎\n    ↓ 整整 72 年「有效但不知為何」\n    1971 Vane 才發現它抑制環氧合酶（COX）、\n         阻斷前列腺素合成 → 機制補上\n    （在這 74 年裡，它救了無數人，沒人因為\n      「說不出機制」就不准用）\n\n  全身麻醉（general anesthesia）\n    19 世紀中起臨床使用，每天讓無數手術成為可能\n    ↓\n    截至 2025 仍【沒有單一、公認的完整分子機制】——\n    GABA_A／NMDA 受體調節是主流候選，但\n    「為什麼會失去意識」的精確機制仍未完全解開\n    （我們每天麻倒病人，卻還沒完全懂它怎麼運作）\n\n  鋰鹽（lithium）治雙相情緒障礙\n    1949 起用，七十多年的標準治療之一\n    ↓\n    截至 2026 機制仍未定論——GSK-3 抑制、\n    肌醇路徑、免疫調節都是候選，無一完整解釋\n    （有效到成為標準療法，機制至今還在爭）\n```\n\n這三個例子合起來，把「沒機制就不該採信」這個直覺打得粉碎。**如果人類堅持「先有完整機制才准用」，麻醉到今天都還不能開刀、阿斯匹靈要等到 1971、鋰鹽到現在都不能上。** 「黑箱有效」不該被輕視——在很多時候，效果是**先到的**、機制是**後補的**，而病人沒有義務為了等一個解釋而繼續受苦或死去。\n\n這就引出本章最沉重、也最該停下來想的張力：\n\n```text\n機制與效果的張力（塞麥爾維斯悲劇的核心）\n\n  一方面：機制重要（它做的四件事都真）\n          → 缺機制的發現，社群有理由謹慎\n  另一方面：要求機制可能拖慢救命的介入\n          → 等機制的期間，有效的東西被擱置，人繼續死\n\n  塞麥爾維斯案 = 這個張力的最壞情況：\n    效果鐵打、機制空白、社群選擇「等機制」\n    → 而「等」的代價，是又一批產婦的命\n    → 機制 1860s 才到。他 1865 已死。\n      平反在他墳上。\n```\n\n我認為這是整本書最不該被簡化的一頁。**「機制很重要」和「沒機制就該否決有效的東西」之間，差了一條人命線。** 前者是對的；後者把它推到極端，就成了殺人的教條。塞麥爾維斯的悲劇不是「醫師太蠢，看不懂數據」（那是把 ch08 講的多因簡化成道德故事）——而是一個**真實的兩難**被推到了最壞的一邊：當效果與機制不齊備時，社群該採用、還是該等待？瘴氣派選了「等機制」，而在這個案例裡，「等」是錯的、是致命的。\n\n但這不代表「永遠別等機制、有效就上」。因為機制的缺席，也正是「✗效果 ✓機制 ✓接受」那種騙局能橫行的縫隙——放血療法有機制故事、被接受、卻無效。**所以真正的問題從來不是「要不要機制」，而是「在效果與機制各自的證據強度下，這次該怎麼拿捏採用與等待」。** 那是一個判斷，不是一條規則。下一段給你拿捏的座標。\n\n## 黑箱有效，何時可接受、何時危險\n\n把「機制有無 × 效果有無」攤成四象限，你就有了一張拿捏的地圖。\n\n```text\n                效果證據強             效果證據弱\n\n              ┌────────────────────┬────────────────────┐\n   機制清楚   │ ① 成熟知識         │ ② 言之成理陷阱     │\n              │   有效＋懂為何＋   │   機制漂亮但沒驗   │\n              │   可預測邊界。     │   效果，最會騙人   │\n              │   最安心。         │   （放血、許多     │\n              │   （今日無菌術）   │   「很科學」療法） │\n              ├────────────────────┼────────────────────┤\n   機制空白   │ ③ 黑箱有效         │ ④ 一無所有         │\n              │   效果鐵打、不懂   │   既沒效果也沒機   │\n              │   為何。可謹慎採   │   制，不該採信。   │\n              │   用，但嚴防復發   │   （多數偽科學、   │\n              │   與邊界未知。     │   碰運氣的修復）   │\n              │   （塞麥爾維斯、   │                    │\n              │   麻醉、阿斯匹靈   │                    │\n              │   早期、你的「重   │                    │\n              │   啟就好了」）     │                    │\n              └────────────────────┴────────────────────┘\n```\n\n這張圖給出可操作的判斷準則：\n\n- **象限 ③（黑箱有效）何時可接受？** 當**效果證據夠強**（乾淨的對照、戲劇性的效果量、可複製）、且**採用的代價低於不採用的代價**時。塞麥爾維斯案的洗手就是教科書級的「該採用」——洗手成本近乎零、效果是把死亡率砍掉九成，**就算機制空白，賭注的算術也壓倒性地指向「先洗手、機制慢慢查」**。你的「重啟修復」也常落這裡：重啟成本低、效果明確，可以先用——但要嚴防象限 ③ 的兩個風險：**復發**（機制未知＝故障條件可能還在）和**邊界未知**（換環境可能失效）。所以你關 ticket 前該做的不是拒絕黑箱修復，而是**留一個監控、寫一張「根因未明」的紀錄**，承認自己在象限 ③，而不是假裝在象限 ①。\n\n- **象限 ③ 何時危險？** 當**效果證據其實沒那麼強**（你以為有效，但對照不乾淨、可能是碰巧、可能是混淆變因），這時「黑箱有效」其實偷偷滑到了象限 ④——你以為你在「先有效後懂機制」，其實你連效果都沒真的確立。**這是「重啟就好了」最陰險的失敗模式**：重啟和恢復可能只是相關（上游尖峰剛好過去），你卻把它當成了有效的修復，下次照重啟、照壞。\n\n- **象限 ②（言之成理）為什麼最會騙人？** 因為它有「機制」這層保護色。一個漂亮的、聽起來很科學的「為什麼」，會讓你**跳過驗證效果**這一步——「道理都講通了，效果還用問嗎？」放血、許多保健品、不少「我們的架構之所以快是因為……」的技術宣稱，都活在這個象限：機制故事完整、效果從沒被乾淨驗證。**機制故事的說服力越強，你越要警惕它讓你省掉了驗效果的對照。**\n\n一句話收束這張圖：**「黑箱有效」可不可接受，取決於『效果證據有多硬』和『賭注算術怎麼算』，不取決於『有沒有機制故事』。** 機制讓你更安心、更能預測邊界、更抵抗質疑——但機制**不能替代**效果的驗證，一個好聽的機制更不能。塞麥爾維斯缺的是機制、卻有最硬的效果證據，他該被採用；放血有機制故事、卻無效果證據，它該被拋棄。**機制與效果，要分開審。**\n\n## 當代回聲：黑箱 ML\n\n最後一筆，把這個張力拉到 2026 的此刻——因為你正活在一個「黑箱有效」最尖銳的時代。\n\n現代的深度學習模型，在很多任務上**有效到驚人**，卻**說不清為什麼**。一個有幾百萬、甚至千億參數的神經網路，能準確辨識影像、生成文字、做出預測，但要它交代「這個決定到底是怎麼從那堆權重裡冒出來的」，至今仍是難題——可解釋 AI（explainable AI / interpretability）整個領域，截至 2026 仍在爭論哪種方法（事後解釋、機制可解釋性 mechanistic interpretability、本質可解釋模型）才真正有效，遠未定論（2026-06）。\n\n這是不是很眼熟？**有效果、沒機制、是否該接受——這正是塞麥爾維斯的四象限，換了一身 GPU 的衣服。** 一個模型在 benchmark 上效果鐵打，但你說不出它為什麼這樣判，於是本章那四件事的焦慮原封不動地回來了：它何時會失效（換個分布還準嗎）？它的「正確」是真因果還是學到了混淆的捷徑（相關非因果）？我該不該在高賭注場景（醫療診斷、信貸、自駕）裡採信一個我不懂其機制的黑箱？\n\n本書不解決這題（可解釋 AI 的技術細節指向專門領域文獻），但要點出：**本章的四象限，就是你思考「黑箱 ML 能不能信」的現成框架。** 高賭注、效果證據可疑、機制空白 → 象限 ③ 偏 ④，極度謹慎；低賭注、效果證據硬、可複製 → 象限 ③ 可採用但留監控。**「黑箱有效該不該信」這個問題，人類在塞麥爾維斯那裡就吵過一輪了，只是當年的黑箱是一雙沒洗的手，今天的黑箱是一個沒人讀得懂的權重矩陣——結構一模一樣。**\n\n## 直覺的陷阱\n\n「機制」是個特別容易讓聰明人下溝的概念——因為「想懂為什麼」是好習慣，但它會以兩個相反的方向把你帶歪。\n\n| 陷阱（你會這樣想） | 它在哪一步帶你下溝 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **「說不出機制 = 不該採信」**（過度要求機制） | 你把「機制」從「加分項」誤升成「必要條件」，於是會否決掉效果鐵打但機制空白的好東西——你會變成否決塞麥爾維斯的瘴氣派 | 機制常常**遲到**（阿斯匹靈等 72 年、麻醉至今未全懂、鋰鹽七十年仍爭）。效果證據夠硬＋賭注算術划算時，黑箱有效**可以謹慎採用**。自我察覺：問「我是在謹慎，還是在用『沒機制』當藉口拒絕一個不合我口味的有效證據？」 |\n| **「機制講得通 = 它有效」**（言之成理陷阱，最危險） | 你把「有一個漂亮的為什麼」當成了「效果已被驗證」，於是跳過了驗效果的對照——放血、保健品、技術 buzzword 全靠這個 | 機制故事的**說服力**和效果的**真實性**是兩回事（四象限的②）。一個好聽的機制能讓無效的東西被廣泛接受。自我察覺：聽到漂亮的機制解釋時，刻意追問「那效果**被乾淨的對照驗證過嗎**？」——機制再美，沒驗過效果就是象限② |\n| **「重啟就好了 = 修好了」** | 你把「黑箱有效」當成了「根因已解」，關掉 ticket、撤掉警覺 | 黑箱有效（象限③）≠ 機制已知。它帶著兩個未解風險：**復發**（故障條件可能還在）與**邊界未知**（換環境可能失效），更可能根本是**相關非因果**（重啟和恢復只是同時發生）。自我察覺：關這種 ticket 前，誠實標記「根因未明」、留個監控，別假裝自己在象限① |\n| **「有效又有機制 = 板上釘釘、不會錯」** | 你忘了機制本身也是一個科學主張、一樣是暫定的（ch10 兩種真） | 機制也會被修正——塞麥爾維斯的「屍體微粒」機制方向對、細節被細菌說整個改寫。「有機制」讓你更安心，但那個機制仍是暫定的最佳猜測，不是數學那種被證明的真（ch10）。別因為「有解釋了」就停止懷疑 |\n\n具名陷阱，展開最毒的那個——**「言之成理」陷阱（象限②）**。你會在哪裡撞到它？技術選型會上的「我們的架構之所以快，是因為用了無鎖佇列、零拷貝、NUMA 親和性——所以它一定快」；保健品廣告的「富含抗氧化劑，可清除自由基——所以抗老」；半夜事故裡的「一定是 GC 暫停導致的，因為 JVM 在高負載下會 STW——所以加大 heap 就解決了」。這些句子的共同結構是：**一個聽起來無懈可擊的機制故事，後面接一個沒被獨立驗證的效果宣稱。** 機制講得越流暢、越「科學」，你越容易讓它替你做掉「那效果到底有沒有被對照驗證」這個本該做的功課。**怎麼自我察覺**：每次有人用「因為（機制），所以（有效）」說服你，把句子從中間剪斷，只盯住後半句問——「這個效果，被乾淨的對照、可複製地驗證過嗎？」如果沒有，那再漂亮的前半句都只是**故事**，不是**證據**。塞麥爾維斯的對手犯的是相反的錯（過度要求機制、否決了有效），但今天的你，更常犯的是這一個——**被一個好聽的機制故事騙過去，省掉了驗效果的對照。** 機制是用來解釋已驗證的效果的，不是用來替代驗證的。\n\n## 紙上推演\n\n下面三題，純紙筆。先自己想，再讀解答。\n\n### 第 1 題（★★）**[15 分鐘]**：「重啟就好了」該不該關 ticket\n\n你遇到本章開頭那個事故：服務延遲飆高、錯誤率破閾值，找不到原因，重啟後一切恢復正常。團隊問你這個 ticket 能不能關。\n\n(a) 用「有效果 / 有機制」拆解你現在手上有什麼、缺什麼。\n(b) 列出「因為缺機制，你具體該擔心哪些事」（至少三件）。\n(c) 你的結論：關還是不關？如果關，你會附加什麼條件，讓自己不是「假裝在象限①」？\n\n### 推演解答\n\n**(a) 你有效果、沒機制。** 效果：重啟後指標恢復，這是觀察到的、可複述的事實（雖然——見下——它可能只是相關）。機制：你不知道**為什麼**會壞、**為什麼**重啟會好。你在四象限的**象限③（黑箱有效）**，前提還是「效果證據確實夠硬」——但這個前提本身要打個問號（見 b 的第三點）。\n\n**(b) 缺機制該擔心的事**（對應機制做的四件事）：\n1. **復發**（機制做的事②：預測何時失效）——你沒找到根因，那個讓它壞的東西可能還在，重啟只是暫時掩蓋。它可能在下個尖峰、下個時段再來。\n2. **邊界未知**（事①②）——你不知道這個故障的觸發條件，換個 region、換個版本、換個負載形狀，重啟還是不是解藥？你無從預測。\n3. **可能是相關非因果**（事③）——也許重啟根本不是真正原因，而是你重啟的同時、上游那個你沒注意到的尖峰剛好過去了。你把「重啟→恢復」綁成因果，但這可能只是時間上的巧合（ch06）。如果是這樣，你連「效果」都沒真的確立——你其實在**象限④**而不自知。\n\n**(c) 結論：可以「謹慎關閉」，但不能假裝在象限①。** 賭注算術上，重啟成本低、服務已恢復，沒必要為了等根因讓服務繼續掛——這跟「先洗手、機制慢慢查」同構。但你要做三件事，承認自己在象限③：(i) **誠實標記「根因未明（root cause unknown）」**，不寫成「已修復」；(ii) **留一個針對性的監控／告警**，盯著同樣的症狀，這樣復發時你第一時間知道；(iii) **排一個後續的根因調查**，因為這次的黑箱修復沒有解決「它為什麼會壞」。**常見錯路**：把「重啟好了」直接寫成「Resolved / Fixed」然後撤掉警覺——這是把象限③偽裝成象限①，等於賭「它不會復發、且重啟真的是因」，而這兩個賭注你都還沒有證據。**這題的教學點**：黑箱有效不是不能用，是用了要**承認它是黑箱**、並為它的兩個風險（復發、邊界）留後手。\n\n### 第 2 題（★★）**[15 分鐘]**：拆穿一個「言之成理」的宣稱\n\n某廠商賣一個快取中介層，銷售話術是：「我們用了無鎖環形緩衝區（lock-free ring buffer）配合 NUMA 親和性綁定，徹底消除了鎖競爭與跨節點記憶體存取——**所以**你的 P99 延遲一定會大幅下降。」\n\n(a) 指出這句話的結構問題（它把什麼當成了什麼）。\n(b) 它落在四象限的哪一格？\n(c) 你要它提供什麼，才能把它從那一格移到「值得採信」？\n\n### 推演解答\n\n**(a) 它把「機制故事」當成了「效果證據」。** 句子結構是「因為（一串漂亮的機制：無鎖、NUMA 親和），所以（效果：P99 一定降）」。前半段是個聽起來很內行的**機制敘事**，後半段是個**未經驗證的效果宣稱**，中間用「所以」硬接。問題在於：機制講得通，**不代表**在你的真實工作負載下效果真的會出現——也許你的瓶頸根本不在鎖競爭（而在網路、在序列化、在 GC），那這套機制再優雅也對你的 P99 毫無幫助。**機制的說服力 ≠ 效果的真實性。**\n\n**(b) 象限②（言之成理陷阱）。** 機制清楚（甚至很炫），但效果證據弱——它沒給你任何**在你的場景下、有對照的、可複製的** P99 數據。這正是最會騙人的那一格：漂亮的「為什麼」誘你跳過「到底有沒有效」的驗證。\n\n**(c) 你要的是效果證據，不是更多機制。** 具體要求：(i) 一個**對照基準**——同樣的工作負載、同樣的硬體，有它 vs 沒它的 P99 對比（這就是 A/B、就是 RCT 的工程版，ch05）；(ii) **在接近你真實負載的條件下**測，不是廠商挑的、鎖競爭剛好是瓶頸的合成 benchmark（否則是用挑選過的場景誇大效果，ch09 的味道）；(iii) **可複製**——你自己能在你的 staging 重現，不是只信白皮書一張圖。**常見錯路**：被機制的內行程度唬住（「講得這麼專業，應該是真的」），於是省掉了自己跑對照。機制越炫，越要逼自己做這一步。**這題的教學點**：對付「言之成理」，唯一的解藥是**把機制故事和效果驗證分開審**——機制歸機制，效果要你自己的對照說了算。\n\n### 第 3 題（★★★）**[25 分鐘]**：黑箱有效何時可接受、何時危險\n\n論證題。請用本章的四象限與「賭注算術」，回答：**一個「有效果、沒機制」的黑箱，在什麼條件下可以接受、什麼條件下危險？** 並用三個案例檢驗你的標準：(i) 塞麥爾維斯的洗手（1847）、(ii) 你的「重啟修復」、(iii) 一個用於癌症診斷的黑箱深度學習模型。\n\n### 推演解答\n\n**先立標準（兩個維度）。** 黑箱有效可不可接受，取決於兩件事，**都跟「有沒有機制」無關**：\n\n1. **效果證據有多硬**——是乾淨對照＋戲劇性效果量＋可複製（硬），還是觀察一兩次、對照不乾淨、可能是相關或巧合（軟）？效果證據軟，黑箱其實偷偷滑進象限④（你連效果都沒確立），任何情況都不該採信。\n2. **賭注算術**——採用的代價 vs 不採用的代價。代價低、不採用的損失大（如塞麥爾維斯：洗手近乎零成本、不洗手死人），則「先用、機制慢慢查」划算；代價高、不採用的損失小，則該等更多證據（含機制）。\n\n**綜合準則**：黑箱有效**可接受**，當「效果證據硬」**且**「賭注算術划算（採用代價 < 不採用代價）」；**危險**，當「效果證據其實軟」（誤以為有效，可能是相關非因果）**或**「賭注極高而效果證據不夠硬到撐起這個賭注」。\n\n**檢驗三案例**：\n\n- **(i) 塞麥爾維斯洗手**——效果證據：**硬**（同院同期兩病房對照、死亡率砍九成、可複製）。賭注算術：**壓倒性划算**（洗手成本近乎零，不洗手每月死一批產婦）。→ **該接受**，即使機制空白。否決他的人犯的錯，是把「沒機制」當否決理由，無視效果證據硬到爆且賭注算術一面倒。這是「過度要求機制」害死人的鐵證。\n\n- **(ii) 你的重啟修復**——效果證據：**軟到中等**（可能是相關非因果——重啟與恢復同時發生，上游尖峰可能剛好過去；你只觀察了一次）。賭注算術：**划算**（重啟成本低、服務已掛）。→ **可謹慎採用**，但因為效果證據軟，必須留監控防復發、並承認可能根本沒修到真因。它跟塞麥爾維斯的差別**不在機制**（兩者都缺），而在**效果證據的硬度**——塞麥爾維斯有乾淨對照，你只有一次碰巧的觀察。\n\n- **(iii) 癌症診斷黑箱模型**——效果證據：**視情況**（若有大規模、前瞻、可複製的臨床對照，是硬的；若只有回溯性的 benchmark 準確率，是軟的）。賭注算術：**極高**（誤診的代價是人命）。→ **最謹慎**。即使效果證據看起來硬，賭注這麼高時，缺機制（不知道模型憑什麼判、是否學到混淆捷徑、換個族群還準不準）是**真實的風險**而非吹毛求疵——這裡機制（可解釋性）的缺席會放大「相關非因果」「邊界未知」的危險。高賭注場景，是「黑箱有效」最該被機制要求頂住的地方。\n\n**結論的反直覺處**：同樣是「黑箱有效」，塞麥爾維斯該接受、癌症模型該極度謹慎——**差別不在誰有沒有機制（都沒有），而在『效果證據的硬度』搭配『賭注的大小』。** 機制不是接受與否的開關；它是在賭注高、效果證據不夠硬時，用來補強信心、預測邊界、抵抗質疑的工具。**常見錯路**：用一條死規則（「沒機制一律不准」或「有效就上」）取代這個雙維度判斷——前者會殺掉塞麥爾維斯，後者會讓你在高賭注場景裡賭上人命。**這題的教學點**：機制之必要，從來不是「必須有機制」，而是「在什麼條件下，缺機制的風險大到你該停下來等它」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **「有效果」「有機制」「被接受」為什麼是三件不同的事？** 各舉一個「有其中兩件、缺第三件」的真實例子。（答不出來，你就分不清塞麥爾維斯缺的到底是哪一塊。）\n2. 機制具體在做哪四件事？把它們跟你關一個「重啟就好了」的 ticket 時那串焦慮一一對上。\n3. 為什麼「說不出機制就不該採信」是個會害死人的教條？阿斯匹靈、麻醉、鋰鹽各說明了什麼？\n4. 「言之成理」陷阱（象限②）為什麼比「黑箱有效」（象限③）更會騙人？一個漂亮的機制故事，會讓你省掉哪一步本該做的功課？\n5. 塞麥爾維斯的洗手該被接受、放血該被拋棄——兩者**都**牽涉機制，差別到底在哪？（提示：不在「有沒有機制故事」。）\n6. 「黑箱有效」何時可接受、何時危險？說出那兩個跟「有沒有機制」無關的判斷維度。\n7. 為什麼「塞麥爾維斯說得出『屍體微粒』」**不算**他有機制？「佔位符式的原因」跟「可被獨立檢驗的機制」差在哪？\n8. 黑箱 ML 模型的「有效但不可解釋」，跟塞麥爾維斯的處境結構上哪裡一樣？四象限怎麼幫你判斷一個黑箱模型該不該信？\n\n## 延伸閱讀\n\n- **Carl Hempel, *Philosophy of Natural Science*（1966）談塞麥爾維斯的那幾節**（科哲課本經典；中譯本與英文本皆可）：本書脊椎的源頭。Hempel 用塞麥爾維斯案講「假設檢定的基本步驟」，讀它你會看到一個哲學家如何在不神化的前提下，把這個案例的「有效果、缺機制」結構拆得乾乾淨淨。注意他引的死亡率是 1848 年的 1.27% vs 1.33%。\n- **John Vane, \"Inhibition of Prostaglandin Synthesis as a Mechanism of Action for Aspirin-like Drugs\", *Nature New Biology*（1971）**（https://www.nature.com/articles/newbio231232a0）：「先有效、後懂機制」的招牌案例的原始論文。不必懂藥理細節，光是體會「一個用了 72 年的藥，1971 才補上機制」這件事，就夠你重新校準「沒機制就不該用」的直覺。\n- **\"Mechanisms of General Anesthesia\", *Annual Reviews in Biochemistry*（2025）**（https://www.annualreviews.org/content/journals/10.1146/annurev-biochem-030222-121430）：讀它的摘要與導論就好。重點是體會：一個我們每天用來麻倒病人、讓現代手術成為可能的東西，到 2025 仍**沒有單一公認的完整機制**——黑箱有效，活在當代醫學的核心。\n- **可解釋 AI（XAI）/ 機制可解釋性（mechanistic interpretability）的綜述**（2026 仍在演進，標時點）：想看本章四象限在 AI 時代的回聲，找一篇近期的 XAI 綜述讀「為什麼深度模型是黑箱、各種解釋方法各自的限制」那部分（2026-06，此領域未定論，別把任一方法當已解決）。提醒：技術細節不是本書範圍，本書只給你「有效果、沒機制、該不該信」這個判斷框架。\n- 跨章：塞麥爾維斯「方向對、機制被細菌說改寫」這件事，為什麼**不**矛盾、為什麼「有機制」之後機制本身仍是暫定的——在 ch10（兩種真）。他「缺機制」如何成為**被社群否決**的關鍵之一（多因之一，別簡化）——在 ch08（科學是一群人）。本章的「黑箱有效該不該信」，最終會收進 ch16 的失敗模式檢查表（「無機制的相關」那一條）與 ch17 的工程師科學態度（「區分有效果與有機制」）。\n"}, {"id": "ch15-testimony-authority-consensus", "file": "ch15-testimony-authority-consensus.md", "group": "Part V — 信任、收束與帶走", "title": "ch15 — 證詞、權威與共識：你該何時相信專家", "md": "# ch15 — 證詞、權威與共識：你該何時相信專家\n\n> **本章解決什麼問題**：前十四章一直在訓練「你自己」怎麼不騙自己——你的觀察、你的歸納、你的對照、你的信念更新。但這裡有個你大概沒停下來想過的事實：你親自驗證過的知識，佔你所信的全部，連百分之一都不到。你信地球繞太陽轉、信疫苗的成分、信你沒讀過原始碼的那個函式庫不會盜你的 token——全部靠**別人的證詞**。科學本身就是一張巨大的分工信任網，沒有任何一個人重做得了所有實驗。本章問：既然非靠他人不可，怎麼信而不淪為盲從？科學共識的可信度到底來自什麼（提示：不是人多）？而我們的脊椎案，是「共識錯了、孤證對了」最著名的反例——它**不是**「所以別信共識」的許可證，這個張力本章要誠實拿捏。這是 Part V（信任、收束與帶走）的第一章。\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統   ◄ 你在這裡\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n前面十四章，整本書都在跟你說同一句話的不同變奏：**別輕信，自己查證。** 對「親眼看到」保持戒心，對「過去都沒事」保持戒心，對「相關」保持戒心，對自己的客觀性保持戒心。\n\n這一章要打你一巴掌——而且是必要的一巴掌。\n\n因為「自己查證一切」是個**做不到的幻想**。你現在腦子裡所有你叫得出名字的「事實」，從地球的年齡到你昨晚吃的藥的成分，到你信賴的那個加密函式庫的安全性，**絕大多數你從沒、也永遠不會親自驗證**。你不是化學家、不是流行病學家、不是密碼學家。你信它們，是因為**別人告訴你**——而你判斷那些人值得信。\n\n所以前十四章那個「別輕信」的訓練，到這一章必須升級成一個更難的問題：**既然非靠別人不可，怎麼靠得聰明、而不是靠得盲目？** 科學不是一個英雄獨自對抗世界，它是一張**分工信任網**——沒有任何一個人懂全部、做得完全部，每個科學家都站在他沒親自檢查過的別人的工作上。這張網是科學最大的力量，也是它最隱蔽的脆弱點。本章拆這張網。\n\n## 從你已知的出發\n\n打開你昨天寫的任何一個檔案，數一數你 import 了多少東西。\n\n`express`、`pg`、`jsonwebtoken`、`bcrypt`、一個你忘了名字的日期處理函式庫、它們各自又依賴的幾百個 transitive dependency——你的 `node_modules` 裡躺著幾萬個檔案，是幾千個你從沒見過的人寫的。你讀過其中幾個的原始碼？誠實點：`bcrypt` 的雜湊到底怎麼實作的，你驗證過嗎？你**信任**它正確地做了雜湊，因為它下載量上千萬、因為資安圈推薦它、因為它是業界事實標準。\n\n這就是證詞信任，而且你天天在做、不可能不做。你的整個工程生涯，建立在一座你親自檢查過不到萬分之一的塔上。\n\n但你不是**無條件**信。你心裡有一套（多半沒明說的）判準：\n\n- 一個 GitHub star 三萬、被一堆大公司用在生產環境、有 CVE 就會火速修補的函式庫，跟一個 star 七顆、最後 commit 在三年前、作者帳號已刪除的函式庫——**你信任的程度天差地遠**。差別在哪？不是哪個「人更多喜歡」，是哪個被**更多獨立的眼睛審視過、被更多獨立的環境壓過、出錯會被獨立地抓出來**。\n- 你信任 RFC、信任 MDN、信任某個資深同事的判斷——但你也知道**什麼時候該停止信任、自己 benchmark**：文件可能過時、那個「最佳實踐」可能是針對跟你不一樣的情境、那個資深同事可能只是把三年前學的東西重複了三年。\n- 你聞得出「回音室」的味道：「大家都用 X 啊」——等一下，是「很多人各自獨立評估後選了 X」，還是「大家都抄那篇被瘋傳的部落格文，而那篇文引用的還是另一篇沒人查證的文」？這兩種「大家都用」，可信度差一個數量級。\n\n把這三點記住，因為**它們就是本章的全部**。科學共識跟你的依賴選擇，是同一個問題的兩個版本：**我無法親自驗證一切，所以我必須靠別人的證詞——那我憑什麼判斷哪些證詞值得信？** 工程師的直覺其實已經對了一大半，這一章是把它擦亮、給它名字、再用脊椎案逼它面對最難的情況。\n\n## 第一件事：你信的東西，幾乎都是證詞——而這擋不掉\n\n哲學家把「靠別人告訴你而得到的知識」叫**證詞（testimony）**。它不只是「法庭上的證詞」那個窄義，而是廣到包含書本、論文、文件、新聞、`README`、Stack Overflow 答案、你同事的一句「那個 service 的 timeout 是 30 秒」——任何你不是親自觀察、而是透過別人的話得到的信念。\n\n這裡有個讓人不安的數字感：**你所信的，幾乎全是證詞。** 你信地球約 46 億歲，你沒做過放射性定年；你信 1847 年有個叫塞麥爾維斯的醫師，你沒去過維也納檔案館；你信你電腦裡的 TLS 實作是安全的，你沒讀過 OpenSSL 的原始碼。哲學家哈德維格（John Hardwig）在 1985 年的〈知識上的依賴（Epistemic Dependence）〉裡把這點講得很白：因為沒有任何一個人有足夠的時間、認知與物質能力去精通每一個主題，我們在知識上**根本性地依賴**他人的證詞與專業（2026-06 查證，這篇是社會知識論的奠基文之一）。更尖銳的是——他指出**連專家都依賴別的專家**：一個流行病學家信任他沒親自做過的分子生物學結果，一個後端工程師信任他沒讀過的編譯器團隊的工作。沒有人站在地面上，每個人都站在別人的肩膀上，而那些肩膀的主人，又站在更多別人的肩膀上。\n\n那麼問題來了——這是不是把前十四章全推翻了？前面教你「別輕信、自己查證」，這裡卻說「你不可能查證、只能信別人」？\n\n不矛盾。前十四章是教你**怎麼當那個值得別人信的證詞來源**（怎麼做對照、怎麼不 p-hack、怎麼誠實面對反例），以及**怎麼驗證你有能力親自驗證的那一小塊**。這一章補的是另一半：對那**巨大的、你無法親自驗證的部分**，你需要的不是「親自重做」（做不到），而是一套**判斷證詞來源可不可信的二階能力**——不是去驗證主張本身，而是去驗證「產生這個主張的過程，可不可靠」。\n\n哲學上這裡有個你會覺得很眼熟的分歧，正好就是兩種工程師性格：\n\n```text\n兩種對待證詞的態度（哲學上的老爭論，剛好對應兩種工程師）\n\n  化約論（reductionism）——休謨（Hume）那派\n    立場：證詞本身不給你任何「免費」的可信度。\n          你信任何證詞，都得（原則上）靠你自己的\n          觀察、記憶、歸納去支撐——「這個來源過去\n          靠不靠譜？這類來源一般準不準？」\n    burden：重。預設懷疑，要證詞自己掙來信任。\n    工程師版：「文件我不信，我自己 benchmark / 讀原始碼。」\n\n  反化約論（anti-reductionism）——里德（Thomas Reid）那派\n    立場：證詞像知覺一樣，是知識的「原生」來源。\n          預設可信，除非有具體理由懷疑——否則人類\n          根本無法運作（你不可能對每句話都做盡職調查）。\n    burden：輕。預設接受，要懷疑的人舉出反證。\n    工程師版：「主流函式庫我預設信，除非有 red flag。」\n\n  真相：你兩種都在用，而且該兩種都用——\n    對低賭注、來源主流的事，你是反化約論者（直接信 MDN）；\n    對高賭注、來源可疑的事，你切換成化約論者（自己驗）。\n    本章後半的判別表，就是教你「什麼時候該切到哪一邊」。\n```\n\n（2026-06 查證：化約論 vs 反化約論、休謨 vs 里德的對立，是當代證詞知識論的主軸，見延伸閱讀的 SEP / IEP 條目。本書取其直覺、不裁判哪派對——這跟我們對 Popper／Kuhn 之爭的處理一樣，科哲未定論的地方就誠實標未定論。）\n\n關鍵的轉念在這裡：**「我必須靠證詞」不是認知上的恥辱，是分工的必然。** 你不會因為「我沒親自寫過 TCP 堆疊」就覺得自己不配用網路。問題從來不是「該不該靠別人」（沒得選），而是**「我此刻靠的這個來源，它的可信度是怎麼來的、有多少」**。\n\n## 第二件事：訴諸權威，什麼時候是謬誤、什麼時候是理性\n\n你大概在哪聽過「訴諸權威（appeal to authority）是一種邏輯謬誤」。這句話**對一半、錯一半**，而那錯的一半會把你帶進一個很蠢的位置：以為「凡是引用專家就是犯謬誤」，於是覺得自己有資格在五分鐘 Google 之後推翻一個領域幾十年的共識。\n\n把它講精確。訴諸權威**不是**自動的謬誤。「我吃這個藥，因為醫生開的」「我用這個跨距的樑，因為結構技師算的」——這些是**完全理性**的推理，你不可能、也不該為了開個藥去自學六年醫學。問題不在「你引用了權威」，而在「你引用的是不是**對的**權威、用在**對的**地方」。\n\n```text\n訴諸權威：合理的 vs 謬誤的（判準）\n\n  合理的訴諸權威，要同時滿足：\n    1. 這個人/機構，在「正好是討論中的這個領域」是真專家\n       （不是「諾貝爾物理獎得主談營養學」那種跨域借光）\n    2. 主張落在他的專業範圍內\n       （醫生談疾病 ✓；醫生談股市 ✗）\n    3. 這個領域的專家之間，對這件事有相當共識\n       （不是抓一個唱反調的去代表「專家說」）\n    4. 他的主張，原則上是基於證據、能被追問「你憑什麼」\n       （而不是「因為我說了算」）\n\n  謬誤的訴諸權威，犯了上面任一條：\n    × 不是該領域的真專家（名人代言、跨域光環）\n    × 主張超出他的專業（工程師談疫苗安全性）\n    × 拿邊緣異議冒充「專家共識」（製造假爭議）\n    × 純粹靠頭銜壓人、回答不了「你憑什麼」\n\n  口訣：合理的訴諸權威，最終仍指向「證據」——\n       權威是「證據的高效轉送」，不是「證據的替代品」。\n       一旦它變成「閉嘴，因為我是專家」，就墮落成謬誤。\n```\n\n（2026-06 查證：合理 vs 謬誤的訴諸權威之分、以及「相關領域真專家＋落在專業內＋有專家共識」這組判準，見延伸閱讀。**訴諸權威謬誤的完整心理機制——為什麼人會被頭銜唬住、權威服從的實驗——屬《思考的陷阱》（偏誤書）談訴諸權威謬誤的那章，本章只給「何時合理、何時謬誤」的判準，不展開心理面。**）\n\n這裡有個工程師會立刻有感的細節：**合理的訴諸權威，是「證據的轉送」，不是「證據的替代」。** 當資安圈說「用 `bcrypt`／`argon2` 別自己捲雜湊」，你信它，不是因為「有人很大聲」，而是因為這句話背後**站著一整串你原則上可以追下去的證據**——時序攻擊的分析、被打爆的自製方案的歷史、密碼學家的公開審查。權威在這裡是個高效的轉送站：它幫你把「一整個領域的證據」壓縮成「你可以據以行動的一句話」。一旦某個權威**回答不了「你憑什麼」**、只會說「相信我，我是專家」——那一刻它就從合理的轉送站，墮落成謬誤的擋箭牌。\n\n這給你一個極實用的測試：**問「你憑什麼」，看它指向證據還是指向頭銜。** 指向證據（「因為這篇複製了三次的研究」「因為這個 benchmark 你可以自己跑」）的，是合理的權威；指向頭銜（「因為我做這行二十年」「因為這是大廠出的」）的，警報該響了——二十年資歷和大廠光環，可能只是把同一個沒驗證過的假設重複了很多次、傳染給很多人而已。\n\n## 第三件事：科學共識的可信度，到底來自什麼？\n\n現在進入本章最該停下來想的一頁。\n\n人們對「科學共識」有兩種同樣偷懶的態度。一種是**盲信**——「科學家都這麼說，那就是真的」，把共識當免死金牌。另一種是**犬儒**——「不就是一群人意見一致嗎？人多就對？歷史上多數人錯的例子還少嗎（看塞麥爾維斯！）」，把共識當一文不值。\n\n兩種都錯，而且錯在**同一個地方**：它們都以為「共識」的可信度來自**人數**。\n\n不是。科學共識若可信，**它的可信度不來自『多少人同意』，來自『他們是怎麼變得同意的』。** 科學史家歐蕾斯柯絲（Naomi Oreskes）在《Why Trust Science?》（2019）裡把這點講成全書的核心論點：科學主張的可信度，來自**它被一個社群嚴格、公開、由多元成員反覆檢驗的那個社會過程**——不是來自某個「唯一的科學方法」，而是來自那套「彼此挑錯、要求複製、公開批判、容納異見」的審查機制（2026-06 查證，見延伸閱讀）。共識是這個過程的**輸出指標**：當一群原本各有立場、各自獨立檢驗的人，**被證據逼到收斂**，那個收斂才有份量。\n\n關鍵字是**獨立**。把它對照清楚：\n\n```text\n兩種長得一模一樣、可信度卻天差地遠的「共識」\n\n  真共識 = 獨立趨同（independent convergence）\n    很多人/團隊，從各自不同的起點、用各自不同的方法、\n    各自獨立地檢驗，最後被證據逼到同一個結論。\n      例：「吸菸致癌」——流行病學、動物實驗、細胞機制、\n          劑量反應，四條互不依賴的證據線各自指向同一結論。\n    可信來源：每條線都可能獨立出錯，但它們「同時各自出\n              同樣的錯」的機率極低 → 收斂本身就是強證據。\n    工程版：五個團隊在五個不同 codebase 各自踩到、各自\n            獨立 root cause 到同一個 kernel bug。\n\n  假共識 = 回音室（echo chamber）\n    很多人講同一句話，但他們不是各自獨立驗證的——\n    是互相抄、抄同一個源頭、或被同一個利益/權威推動。\n      例：一篇沒人複製過的論文被引用三千次，每個引用者\n          都假設「前面那麼多人引了，應該是對的」。\n    可信來源：幾乎沒有。一千個人重複一個未驗證的主張，\n              不比一個人重複它更可信——錯誤被放大不是被檢驗。\n    工程版：「大家都用 X」其實是「大家都抄那篇瘋傳的文」，\n            那篇文引用的還是另一篇沒人查證的文。\n\n  辨識key：問「這些同意，彼此獨立嗎？」\n          獨立趨同 = 證據在說話；回音室 = 同一個聲音的回響。\n```\n\n（2026-06 查證：歐蕾斯柯絲的核心論點是「科學的可信度源於其社會審查過程的開放與多元」，且她特別提醒——多數科學「翻車」的歷史案例，其實**當時根本沒有真共識**，是事後被當成「共識也會錯」的例子；同時要小心「製造出來的假爭議（manufactured controversy）」冒充「真實的科學分歧」。見延伸閱讀。）\n\n這一頁為什麼值得停十分鐘？因為它一次解決了「盲信」和「犬儒」兩個毛病：\n\n- 對**盲信者**：共識不是因為「人多」才可信，所以你有權追問——「這個共識是獨立趨同還是回音室？背後是多條獨立證據線收斂，還是大家抄同一個源頭？」一個經不起這個追問的「共識」，再多人講都不該讓你的後驗（ch07）動多少。\n- 對**犬儒者**：「歷史上多數人也錯過」這句話，混淆了「真共識」和「當時根本沒共識／是回音室」。塞麥爾維斯被否決的時候，醫界對「瘴氣論」的「共識」，恰恰**不是**建立在獨立檢驗他的對照數據上的——它建立在一個沒人去複製、沒人去切斷混淆、被既得典範與職場政治撐著的回音室上（ch08）。所以「塞麥爾維斯案」不證明「共識不可信」，它證明的是**「靠回音室撐起來的偽共識不可信」**——而這恰恰是真共識的反面教材，不是真共識翻車的例子。\n\n注意這裡還有個 ch02 的回聲：**連你「看到」專家的數據，都隔著層層理論負載與信任。** 你讀到「某研究顯示 X」，你看到的不是原始數據，是論文作者選擇呈現的數據、是期刊選擇刊登的研究（發表偏誤，ch16 細講）、是新聞選擇報導的論文、是演算法選擇推給你的新聞。每一層都可能偷渡假設、過濾掉反例。「科學共識」傳到你眼前時，已經過了好幾道你看不見的手——這不是要你變犬儒，是要你知道：**信任這張網，跟信任網裡的每一個節點，是兩件事。**\n\n## 脊椎透鏡：塞麥爾維斯案——「共識錯了、孤證對了」的最危險範例\n\n現在用本章的透鏡，第十五次重看脊椎案。**這是脊椎的塞麥爾維斯案，現在換『證詞、權威與共識』透鏡看。**\n\n表面上，這個案子是反共識者的夢幻彈藥：**一個孤獨的對的人，對抗整個錯誤的醫界共識，被否決、被嘲笑、憂鬱而終，死後才平反。** 「看吧！專家共識會災難性地錯！別信共識！跟著你的孤膽直覺走！」\n\n這個讀法**危險到必須當場拆掉**，因為它幾乎全錯——錯的方式很微妙，正好是本章要你學會分辨的。\n\n逐條拆：\n\n**第一，當時否決他的，是「真共識」嗎？** 不是。瘴氣論的「共識」不是獨立趨同——沒有一群人各自獨立檢驗塞麥爾維斯的兩病房數據後、被證據逼到「他錯了」。恰恰相反：**幾乎沒人去複製他的對照、沒人去認真切斷他指出的混淆。** 那個「共識」是回音室——既有典範撐著（ch08）、職場政治撐著（他得罪了人）、和「承認他對等於承認自己害死了產婦」這個沒人想面對的代價撐著（ch11 的動機性推理）。所以這**不是**「真共識翻車」的故事，是「偽共識（回音室）壓制了真證據」的故事。本章的判準——獨立趨同 vs 回音室——一上手就把這案子歸對了類。\n\n**第二，那塞麥爾維斯是不是「孤證對了所以該信孤證」？** 也不該這樣讀。他**有對照、有效果、有可證偽的假設**（ch01、ch04、ch05）——他不是「靠直覺對抗數據」，他**是那個帶著數據的人**。問題從來不是「該信數據還是信共識」，是「那個拒絕看數據的偽共識，根本沒在做科學」。把這案讀成「相信孤膽英雄的直覺」，會養出最危險的反智姿勢——下一個喊「我一個人對抗整個醫界共識」的，**九成九是民科**，他缺的正是塞麥爾維斯有的東西（對照、效果、可證偽）。\n\n**第三——也是最誠實、最難的一刀——那真共識會不會錯？** 會。本章不准你滑進「所以真共識永遠可信」的安全結論裡，那會是另一種盲信。即使是獨立趨同的真共識，也是**對世界的暫定最佳猜測**（ch10 的科學的真），原則上可被推翻。歷史上真共識也有錯的時候。本章的立場不是「共識永遠對」，而是更難拿捏的那句：\n\n```text\n塞麥爾維斯案：三個讀法，只有一個對\n\n  讀法 A（反智）：「共識會錯，所以別信共識、信孤膽直覺」\n     ✗ 錯在：把「偽共識（回音室）」誤當「真共識」；\n            把「帶著數據的人」誤當「靠直覺的人」。\n            這個讀法會讓你信下一個民科。\n\n  讀法 B（盲信）：「這只是個案，真共識永遠可信」\n     ✗ 錯在：把暫定最佳猜測說成不可推翻；\n            無視真共識也是科學的真（可被新證據修正）。\n\n  讀法 C（本章）：「真共識通常對、偶爾災難性地錯；\n            判斷一個共識可不可信，不看人數，看它是\n            獨立趨同還是回音室、看它認不認錯、看它\n            背後指不指得回證據。塞麥爾維斯案是\n            『回音室壓制真證據』的範例，不是\n            『真共識翻車』的範例。」\n     ✓ 它教你的不是「信或不信共識」，是「怎麼分辨\n        哪種共識、以及永遠保留共識可被證據修正的空間」。\n```\n\n拿捏的分寸是這樣：**預設信真共識（獨立趨同、認錯、指得回證據的那種），這在絕大多數時候是對的、也是你唯一能運作的方式；但永遠保留一道門——當有人帶著真正的對照數據、可證偽的預測來挑戰它時，共識有義務去複製、去檢驗，而不是用回音室壓制他。** 塞麥爾維斯案的教訓不是「別信共識」，是**「別讓共識墮落成回音室」**——而能不能分辨這兩者，正是本章給你的能力。\n\n至於「身為個人，我什麼時候有資格站塞麥爾維斯那邊（信孤證、疑共識）」？幾乎永遠不該，**除非**：(a) 你手上有真正的對照數據或可證偽的預測，不是直覺；(b) 你能說清楚那個「共識」是回音室而非獨立趨同；(c) 你誠實面對「我九成九是錯的、是那個民科」的先驗。塞麥爾維斯三條都滿足。喊「我對抗整個科學共識」的人，三條通常一條都沒有。\n\n## Worked example：一張「該信 vs 該查證」判別表，套在一個技術選型上\n\n把本章三件事（證詞不可免、權威何時合理、共識何時可信）收成一張可操作的判別表，然後套在一個真實的工程決策上：**「要不要直接採用某個正在爆紅的新框架？」**\n\n判別不是「信」或「不信」的二選一，是**沿著幾個維度評分，決定『預設信到什麼程度、該補多少自己的查證』**。\n\n```text\n「該信 vs 該查證」判別表（證詞來源的盡職調查）\n\n  維度                  該信的訊號              該查證的紅旗\n  ─────────────────────────────────────────────────────────\n  ① 來源獨立性          多個獨立團隊各自          全來自同一個源頭/\n     （回音室嗎？）      驗證、各自踩坑後背書      作者/利益方的回響\n  ② 利益衝突            背書者沒有從你的選擇       賣課/賣服務/賺\n                        中獲利                    star 的人在推\n  ③ 可複製/可驗          有公開 benchmark         只有 demo、\n     （能不能自己跑）    你能自己重跑              「相信我超快」\n  ④ 解釋 vs 預測         能預測「它在你的負載        只解釋「為什麼它\n     （ch04 回聲）       下會怎樣、何時失效」        很棒」、不冒風險\n  ⑤ 認不認錯            issue 裡誠實列已知缺陷      只有讚美、\n     （ch12 回聲）       與不適用場景              負評被刪/被噴\n  ⑥ 賭注大小            （決定你要多嚴）           越貴/越難回滾，\n     （決定 burden）     低賭注→反化約論預設信      門檻拉越高\n  ─────────────────────────────────────────────────────────\n\n  套用：「某爆紅新框架，要不要上生產？」\n\n  ① 來源獨立性：social media 上一片叫好——但點進去，\n     八成引用同三篇文、同一個作者的 demo。⚠ 回音室嫌疑高。\n  ② 利益衝突：最大聲的幾個，要嘛是框架作者、要嘛靠教學\n     變現。⚠ 不是沒價值，但他們不是中立證詞。\n  ③ 可複製：宣稱「快 10 倍」——有沒有可自己跑的 benchmark？\n     若只有作者的 demo 數字、沒有獨立複現 → ⚠（這正是 ch13）。\n  ④ 預測力：它能預測「在你這種寫入密集、長連線的負載下會\n     怎樣」嗎？還是只在「作者的 hello-world 場景」快？\n  ⑤ 認錯：翻 GitHub issues——維護者誠實標已知雷區與\n     不適用場景（✓ 健康），還是清一色行銷、負評被關掉（⚠）？\n  ⑥ 賭注：核心交易路徑 vs 內部小工具？前者把所有門檻\n     拉到最高、自己 PoC + 壓測；後者可以反化約論預設信、\n     出事再換。\n\n  結論不是「信/不信」，是：\n    「對核心路徑——降到化約論模式：自己跑 benchmark、\n      自己壓測你的負載、找一個和你情境相近的獨立生產案例，\n      共識的『叫好』只當『值得花力氣查』的訊號、不當證據。\n      對低賭注內部工具——反化約論模式：預設試用，留好退路。」\n```\n\n複核一下這張表在幹嘛：它把「我該信這個技術共識嗎」這個模糊問題，拆成六個你**真的答得出來**的子問題，而且每一維都對應本章或前章的一個防自欺工具——①②直接是「獨立趨同 vs 回音室」，③是複製（ch13），④是可證偽（ch04），⑤是「認錯＝科學健康」（ch12），⑥是「賭注決定你切到化約論還是反化約論」。這不是要你對每個 `import` 都跑一遍六維盡調（那又掉回「自己驗證一切」的幻想了）——是要你**把盡職調查的力氣，按賭注分配**：低賭注預設信、高賭注切到自己驗。這正是工程師每天在做、只是沒給它名字的事。\n\n## 直覺的陷阱\n\n科學共識與權威這個題目，是「想當然耳」翻車最慘烈的地方之一——而且兩個方向都會翻車。\n\n| 你以為 | 實際上 | 在哪一步把你帶溝裡 |\n|---|---|---|\n| 「訴諸權威是邏輯謬誤，所以引用專家都不算數」 | 訴諸**相關領域、有共識、能指回證據**的權威是**理性**的；只有引用錯權威/越域/拿邊緣異議冒充共識才是謬誤 | 你把「謬誤的訴諸權威」當成「所有訴諸權威」，於是覺得自己 Google 五分鐘就有資格推翻領域數十年共識 |\n| 「共識＝人多同意＝可信」（盲信） | 共識的可信度不來自**人數**，來自**他們是怎麼變同意的**——獨立趨同才有份量，回音室一文不值 | 你數人頭、不問獨立性，於是一個一千人抄同一個源頭的回音室，騙過你的後驗 |\n| 「共識也會錯（看塞麥爾維斯！），所以別信共識」（犬儒） | 否決塞麥爾維斯的是**回音室偽共識**、不是獨立趨同的真共識；而他**有數據**、不是靠直覺 | 你把「偽共識壓制真證據」誤讀成「真共識翻車」，把「帶數據的人」誤讀成「孤膽直覺」，於是去信下一個民科 |\n| 「我自己查證一切，不靠任何證詞」 | 你親自驗證的佔你所信不到萬分之一；連專家都依賴別的專家（哈德維格）。完全的知識自給自足是幻想 | 你以為「不靠證詞」是更高的標準，其實它做不到、而且會讓你錯過「按賭注分配查證力氣」這個真正可操作的策略 |\n| 「業界都用 X，所以 X 是對的選擇」 | 「業界都用」可能是獨立趨同（很多團隊各自驗過），也可能是回音室（大家抄同一篇瘋傳的文）——可信度差一個數量級 | 你沒區分這兩種「都用」，於是把流行當成證據 |\n\n**最該點名的那個陷阱：把塞麥爾維斯案當成「別信共識」的許可證。** 這個誤讀特別陰險，因為它**披著批判精神的外衣**——它聽起來像「不盲從、獨立思考」，實際上是把你推進反智的懷抱。它在這一步帶你下溝：**它偷換了「共識」的定義**，用「回音室偽共識會錯」去推「（獨立趨同的真）共識不可信」，再用「塞麥爾維斯帶著數據贏了」去包裝「（沒數據的）孤膽直覺該被信」。\n\n怎麼自我察覺？當你發現自己在想「專家都錯了，只有我（或我跟著的那個少數派）看清真相」時，做**塞麥爾維斯三問**：(a) 我手上有對照數據或可證偽的預測嗎，還是只有直覺和「我覺得」？(b) 我反對的那個共識，是獨立趨同（多條獨立證據線收斂）還是回音室（大家抄同一個源頭）？(c) 我有沒有誠實算過「我是那個民科」的先驗——這個先驗通常高達 99%？塞麥爾維斯三條全過，所以他是英雄。如果你三條過不了一條，**你不是塞麥爾維斯，你是被否決的那群人裡，那個還以為自己是塞麥爾維斯的。**\n\n## 紙上推演\n\n下面三題，建議拿筆，先自己想，再看解答。全是紙上推演，不要去跑任何程式。\n\n### 第 1 題（★★）**[15 分鐘]**：兩個「業界共識」，哪個該信\n\n你在做技術選型，聽到兩個「業界共識」：\n\n- **共識 A**：「現代密碼學裡，別自己實作雜湊/加密，用經過審查的標準函式庫（如 `argon2`、`libsodium`）。」\n- **共識 B**：「你一定要用 X 框架，因為現在所有大公司都在用、所有教學都在教、社群最大。」\n\n兩個都是「很多人同意」。用本章的「獨立趨同 vs 回音室」判準，分辨這兩個共識的可信度為什麼**天差地遠**。各自問：背後是多條獨立證據線，還是同一個聲音的回響？\n\n### 推演解答\n\n**共識 A 是獨立趨同，可信度高。** 「別自己捲密碼學」這句話背後，站著**多條互不依賴的證據線**：(1) 密碼學家對時序攻擊、側信道的數學分析；(2) 一長串自製方案被獨立研究者攻破的歷史（每個案例是獨立的失敗）；(3) 標準函式庫被全球無數獨立團隊公開審查、被無數攻擊者試圖打爆而未果。這些線**彼此獨立**——數學分析、歷史案例、公開審查，是三群不同的人用三種不同方法各自得到的，它們同時各自出同樣的錯的機率極低。而且它**指得回證據**（你問「憑什麼」，它指向具體的攻擊論文、具體的 CVE 歷史），也**認錯**（標準函式庫有漏洞會被公開揭露、修補）。這是真共識。\n\n**共識 B 高度疑似回音室，可信度低。** 「所有大公司都在用、所有教學都在教」——這正是回音室的指紋：**人數和流行被當成了理由本身**。問關鍵問題：這些「都在用」的團隊，是**各自獨立評估後**選了 X（獨立趨同），還是**因為別人都用、教學都教 X、招得到會 X 的人**所以也用 X（回音室）？後者極常見——技術選型有強烈的從眾與路徑依賴，「大家都用」常常是「大家都抄」。而且共識 B **指不回證據**：它的理由是「大家都用」（頭銜/人數），不是「在你這種負載下，這裡有可複製的 benchmark 證明它更好」。**常見錯路**：以為「A 是技術圈、B 是技術圈，都是工程師的共識，可信度應該差不多」——錯。可信度不看「是不是專家說的」，看「這些專家的同意彼此獨立嗎、指不指得回證據」。A 過、B 不過。**教學點**：同樣是「很多人同意」，獨立趨同是強證據、回音室幾乎是零證據——數人頭沒用，要數的是**獨立的證據線**。\n\n### 第 2 題（★★★）**[25 分鐘]**：為什麼塞麥爾維斯案**不**支持「永遠別信共識」\n\n你的一個朋友（聰明、反骨、最近在讀一些「主流科學都是錯的」的內容）對你說：\n\n> 「塞麥爾維斯就是鐵證啊——整個醫界共識說他錯，結果他才是對的。所以面對任何科學共識，我都保留懷疑，搞不好下一個塞麥爾維斯就是現在被嘲笑的那個非主流。歷史會證明的。」\n\n請拆掉這個論證。至少指出**三個**它偷換或誤用的地方，並說清楚塞麥爾維斯案**正確**的教訓是什麼。\n\n### 推演解答\n\n這個論證表面動人、實際全是漏洞，逐條拆：\n\n**漏洞一：偷換「共識」的定義（回音室 ≠ 真共識）。** 否決塞麥爾維斯的醫界「共識」，**不是獨立趨同**——沒有一群人各自獨立複製他的兩病房對照、各自被證據逼到「他錯了」。恰恰相反，那個共識建立在**沒人去複製、沒人去切斷他指出的混淆**之上，被既有的瘴氣典範、職場政治、和「承認他對＝承認自己害死產婦」的心理代價撐著。這是**回音室偽共識**。所以這案子證明的是「回音室會壓制真證據」，不是「獨立趨同的真共識會錯」。你朋友拿偽共識的失敗，去推真共識不可信——這是偷換概念。\n\n**漏洞二：把「帶數據的人」誤當「靠直覺的非主流」。** 塞麥爾維斯**不是**靠反骨直覺對抗數據的人——他**是那個拿著對照數據、拿著戲劇性效果、拿著可證偽假設的人**（ch01、ch04、ch05）。今天大多數「被嘲笑的非主流」缺的恰恰是這個：他們有的是直覺、陰謀感、和「主流都錯了」的姿態，沒有對照、沒有可複製的效果、沒有可證偽的預測。把「下一個塞麥爾維斯」套在他們頭上，是把**最關鍵的條件（你得真的帶著數據）**偷偷拿掉了。\n\n**漏洞三：用「歷史會證明」做不可證偽的擋箭牌（ch04 回聲）。** 「搞不好下一個塞麥爾維斯就是現在被嘲笑的那個，歷史會證明」——這句話**怎樣都對、永遠輸不了**：任何被嘲笑的主張，都可以說「等著看，歷史會平反我」，而且永遠可以把「還沒平反」解釋成「時候未到」。這是個不可證偽的姿態（ch04），它不是在做科學判斷，是在用「未來的可能平反」給今天所有的胡說發免死金牌。**倖存者偏誤**也藏在這：你只記得平反了的塞麥爾維斯，沒去數那**成千上萬個同樣「對抗共識」、結果就是單純錯了**的人——他們才是基準率，塞麥爾維斯是那個罕見的、滿足全部條件的例外。\n\n**正確的教訓：** 塞麥爾維斯案教的不是「別信共識」，是**三件更精細的事**：(1) **要分辨真共識（獨立趨同、認錯、指回證據）和偽共識（回音室、靠典範與政治撐）**——前者通常該信，後者該疑；(2) 真共識也有義務在**有人帶著真正的對照數據與可證偽預測**來挑戰時去複製、去檢驗，而不是用回音室壓制——這是制度該修的（ch08、ch13）；(3) 身為個人，你**幾乎永遠**該預設信獨立趨同的真共識，**除非**你同時滿足塞麥爾維斯三條件（有數據、能證明對方是回音室、誠實面對「我九成九是錯的」先驗）。**常見錯路**：以為「拆掉這個論證＝證明共識永遠對」——不，本章也不准你滑進盲信；真共識是暫定最佳猜測（ch10），可被新證據修正。正確的位置是中間那條最難走的線：**預設信真共識、永遠保留被證據修正的門、且絕不把這份開放當成『信任何反骨非主流』的藉口。**\n\n### 第 3 題（★）**[10 分鐘]**：把你的一個依賴選擇翻成「證詞盡職調查」\n\n挑一個你最近採用、但**沒讀過原始碼**的函式庫或服務。用本章的「該信 vs 該查證」六維，快速過一遍：(1) 你信任它的理由，是獨立趨同還是回音室？(2) 推薦它的人有沒有利益衝突？(3) 賭注多大（它在核心路徑還是邊角）？最後判斷：你當初的信任程度，和賭注匹配嗎？\n\n### 推演解答\n\n這題沒有標準答案，但有**正確的思考形狀**。示範一個典型：假設你採用了某個熱門的 ORM。\n\n- **獨立趨同 vs 回音室**：它被很多**獨立的**生產系統用了很多年、踩過的坑有公開記錄、有獨立團隊寫過「我們從它遷移走的原因」的誠實復盤——這偏獨立趨同（✓）。如果你採用的理由只是「最近 Twitter 上很紅、某個 influencer 在推」——那偏回音室（⚠）。\n- **利益衝突**：推薦它的是中立的生產使用者（復盤踩坑），還是靠它的付費雲服務變現的人？後者不是沒價值，但要打折。\n- **賭注**：它在你的核心交易路徑（資料正確性、效能命脈），還是內部後台小工具？**這決定了你「當初該做多少盡調」的標準。**\n- **匹配嗎**：誠實回答——如果它在核心路徑，但你當初信它只是因為「同事推薦＋star 很多」，那你的盡調**配不上賭注**：你該補上「自己在你的負載下壓測、查它的 issue 看認不認錯、找一個和你情境相近的獨立生產案例」。**教學點**：本章不是要你對每個 import 都做六維盡調（做不到、也不該），是要你**讓盡調的力氣匹配賭注**——而工程師最常見的失誤，正是**對核心路徑的依賴，只做了內部小工具等級的盡調**，把「很多人用」當成了「我驗證過」。**常見錯路**：做完發現「我好像信得太隨便」就全面焦慮、想把所有依賴都重新盡調一遍——不必，按賭注排序，先補核心路徑那幾個。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **為什麼「我自己查證一切、不靠任何證詞」是個做不到的幻想？** 連專家都依賴別的專家（哈德維格的點），這對你的「該不該信證詞」這個問題意味著什麼——問題從「該不該靠別人」變成了什麼？\n2. 訴諸權威**什麼時候是理性的、什麼時候是謬誤**？那個「問『你憑什麼』，看它指向證據還是指向頭銜」的測試，怎麼用？\n3. **為什麼科學共識的可信度不來自『多少人同意』？** 它來自什麼？「獨立趨同」和「回音室」這兩種長得一樣的共識，怎麼分辨？\n4. 一個「一千人都引用、但都抄同一篇沒人複製過的論文」的共識，為什麼**不比一個人講同一句話更可信**？（提示：錯誤被放大 vs 被檢驗。）\n5. **塞麥爾維斯案為什麼不支持「永遠別信共識」？** 否決他的是真共識還是偽共識？他靠的是直覺還是數據？這兩個區分各打掉了那個反智論證的哪一塊？\n6. 「塞麥爾維斯三問」是哪三問？下次你發現自己在想「專家都錯了、只有我看清真相」時，這三問會怎麼幫你分辨「你是英雄還是民科」？\n7. 為什麼「該信 vs 該查證」不是一個固定答案，而是隨**賭注大小**滑動的？工程師最常犯的盡調失誤是什麼（提示：核心路徑 vs 小工具）？\n8. 連你「看到」專家的數據都隔著層層信任與理論負載（ch02 回聲）——這是要你變犬儒、什麼都不信嗎？還是要你分辨「信任這張網」和「信任網裡每個節點」的不同？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Epistemological Problems of Testimony\"**（https://plato.stanford.edu/entries/testimony-episprob/）：本章「證詞作為知識來源」的權威源頭。重點讀**化約論（reductionism，休謨派）vs 反化約論（anti-reductionism，里德派）**那節——它就是本章那兩種工程師性格的哲學原型，也說清楚為什麼「兩種你都該用、看賭注切換」。\n- **Internet Encyclopedia of Philosophy, \"Epistemology of Testimony\"**（https://iep.utm.edu/ep-testi/）：上一條的更白話版本，把「個人主義知識論 vs 社會知識論」的對立講得很清楚——為什麼「我們大部分的知識依賴於身處一個知識社群」。讀「Reductionism and Non-Reductionism」一節。\n- **John Hardwig, \"Epistemic Dependence\"**（*The Journal of Philosophy*, 1985；https://philpapers.org/rec/HARED）：本章「連專家都依賴別的專家、沒人站在地面上」這個關鍵點的奠基文。它逼你接受一件不舒服的事：在現代知識分工下，**拒絕一切證詞＝拒絕絕大部分知識**。\n- **Naomi Oreskes, *Why Trust Science?***（Princeton University Press, 2019；https://press.princeton.edu/books/hardcover/9780691179001/why-trust-science）：本章「共識的可信度來自社會審查過程、不是來自人數」這個核心論點的完整版。特別讀她對「多數科學翻車案例其實當時根本沒有真共識」以及「小心製造出來的假爭議」的論證——這正是塞麥爾維斯案的正解。\n- **Stanford Encyclopedia of Philosophy, \"Social Epistemology\"**（https://plato.stanford.edu/entries/epistemology-social/）：想深入「知識的社會性、專家的角色、共識的認識論地位」的完整地圖，從這篇進。提醒：這裡有不少未定論的爭論，本書只取「共識的可信度來自獨立趨同的審查過程」這個各方多半接受的直覺。\n- 跨書：**訴諸權威作為謬誤的心理機制**——為什麼人會被頭銜唬住、權威服從的實驗——在**《思考的陷阱》談訴諸權威謬誤的那一章**；本章只立「何時合理、何時謬誤」的判準，心理面是它的主場。\n- 跨章：本章「連你看到專家的數據都隔著理論負載」的根在 ch02（觀察的理論負載）；「共識是暫定最佳猜測、可被證據修正」的根在 ch10（兩種真）；「真共識該如何回應帶數據的挑戰者」接 ch08（科學是一群人）與 ch13（複製修補）。塞麥爾維斯案在本章是「回音室壓制真證據」，到 ch18 會和前十四個透鏡一起總對帳。\n"}, {"id": "ch16-failure-mode-catalog", "file": "ch16-failure-mode-catalog.md", "group": "Part V — 信任、收束與帶走", "title": "ch16 — 科學的失敗模式目錄：一張防自欺檢查表", "md": "# ch16 — 科學的失敗模式目錄：一張防自欺檢查表\n\n> **本章解決什麼問題**：前面十五章一章拆一個自欺漏洞，散在全書各處。這一章把它們全部收進一張表——一張你看到任何「研究顯示…」或「我們快了 10 倍」時，可以逐項打勾的檢查表。這是全書焦慮工程師視角的高潮：不是再學一個新概念，而是把學過的全部變成一個可操作的 checklist。本章在 Part V（信任、收束與帶走）裡承接 ch15 的「何時信專家」，往下交給 ch17 的「把態度搬回你的系統」與 ch18 的總對帳。\n\n## 從你已知的出發\n\n你 code review 別人的 PR 時，腦袋裡跑的不是「這段程式碼好不好看」，而是一張隱形的清單：\n\n```text\n這個 PR 我會怎麼壞？\n  - 空值／邊界：輸入為 null、空陣列、超長字串會怎樣？\n  - 併發：兩個請求同時打進來，這段有沒有 race？\n  - 失敗路徑：外部呼叫 timeout 了，會 retry 還是默默吞掉？\n  - 資源：這個迴圈裡有沒有藏一個 N+1 query？\n  - 回滾：上線後要關掉，有沒有 feature flag？\n```\n\n你不是每次都從零想。你有一張**沉澱下來的失敗模式清單**，掃過去，哪一項亮紅燈就停下來深究。一個資深工程師和一個剛入行的差別，泰半就在這張清單的長度與校準度——新人會被一段「看起來沒問題」的程式碼放過去，你會在第三行就皺眉，因為你見過這個壞法。\n\n科學也有一張這樣的清單。前面十五章，我們一條一條拆過：觀察的理論負載（ch02）、不可證偽的空話（ch04）、混淆變因（ch06）、p-hacking（ch09）……每一條都是科學社群用三百年血淚換來的「這裡會這樣騙你」。問題是它們散著。你讀完很感動，闔上書，下週看到一則「研究顯示喝咖啡延年益壽」的新聞，還是只會憑感覺信或不信——因為那張清單在你腦裡還沒成形。\n\n這一章就是把那張清單**寫出來、排好序、給每一條配一個「徵兆」和「怎麼自我察覺」**。讀完它，你對一個科學宣稱（或一個技術 benchmark）的反應，應該要像你看 PR 一樣：不是「我覺得對」，而是「我來掃一遍它可能怎麼騙我」。\n\n我認為這是整本書最該印出來貼在牆上的一頁。前面是「為什麼」，這一章是「怎麼用」。\n\n> 一個界線先講清楚：這張表的每一條，**機制都在前面章節**。本章不重新推導「為什麼混淆變因會騙你」（那是 ch06），只給「徵兆＋自檢問句」這層操作面。把它當索引：哪一條讓你不安，回去翻那一章。\n\n## 為什麼是「目錄」而不是「流程」\n\n中學課本把科學方法畫成一個流程圖：觀察→假設→實驗→結論，箭頭一路往下。這張圖的問題不只是它太僵化（這點 ch17 會收），而是它**畫錯了重點**。科學的力量不在「按步驟走」，而在每一步都有一個「這裡最容易自欺」的警報。流程圖告訴你往哪走，**失敗模式目錄告訴你哪裡有坑**。\n\n這跟工程是同構的。沒有人會給你一張「如何寫出沒有 bug 的程式」的流程圖——那不存在。真正幫到你的是 OWASP Top 10、是 code smell 清單、是 post-mortem 累積出來的「我們踩過這些坑」。**防禦性的知識是目錄式的，不是流程式的。** 你不是照著流程就安全，你是掃過目錄、確認每個坑都檢查過了才相對安心。\n\n所以這一章刻意不做成決策樹（「如果 A 就往左、如果 B 就往右」）。決策樹假裝失敗模式之間互斥、有先後——它們不是。一個爛研究可以同時有混淆變因、p-hacking、又沒複製。你要的是一張**可以全部掃一遍**的清單，每條獨立判斷「這裡中了嗎」。\n\n## 主檢查表：科學自欺的十二種失敗模式\n\n下面是主表。每一條三欄：**失敗模式**（它叫什麼）、**徵兆**（在一個宣稱裡長什麼樣、哪句話會洩漏它）、**自檢問句**（你該對自己問什麼，問完才算掃過）。右欄括號裡標它的「老家」章節，要深究回去翻。\n\n```text\n科學自欺失敗模式目錄（v1，遇到任一「X 顯示 Y」逐項掃）\n\n  # 失敗模式            徵兆（會洩漏它的那句話）          自檢問句（問完才算掃過）\n ─────────────────────────────────────────────────────────────────────────────\n  1 理論負載未察         「數據自己會說話」「我們只是      這個『觀察』是中立的，還是\n    (ch02)              客觀呈現事實」——彷彿沒有挑       已經被『挑哪個指標、什麼算\n                        指標、沒有預設 baseline           異常』的框架塑造過了？\n\n  2 不可證偽            「這套方法在對的人身上一定有       有沒有任何可能的結果會被\n    (ch04)              效，沒效是你沒用對」——怎樣        算成『這宣稱錯了』？答不出\n                        都對、永遠能事後解釋               來＝它沒在做科學的事。\n\n  3 混淆變因            「用了 X 的人活得更久，所以        誰會去用 X？會不會是『本來\n    (ch06)              X 延年益壽」——拿觀察相關          就更健康／更有錢的人』才用\n                        當因果，沒排第三個共同原因         X？那個第三因才是真兇。\n\n  4 反向因果            「快樂的人運動多，所以運動         箭頭會不會是反的？是 X→Y，\n    (ch06)              讓人快樂」                          還是 Y→X，還是互為因果？\n\n  5 p-hacking／         「我們發現 A 與 B 顯著相關」——     他們測了幾個變數、跑了幾種\n    多重比較            但沒說一共測了多少組、看了          分析、才挑出這個顯著的？\n    (ch09)              幾次資料才停                        測 20 個總有一個會中。\n\n  6 偷看資料            「實驗一達到顯著我們就停了」        停止規則是『事先定好』還是\n    (peeking, ch09)     ——邊跑邊看、達標就收               『看到顯著就收手』？後者\n                                                           等於灌爆偽陽率。\n\n  7 發表偏誤／          「目前所有發表的研究都支持 X」      失敗、無效果的研究去哪了？\n    檔案抽屜            ——但失敗的研究根本不會被           是真的都成功，還是只有成功\n    (本章正式收)        投、不會被登                        的被印出來、其餘進了抽屜？\n\n  8 未複製             「一項突破性研究發現…」——          這個結果被『獨立的別人』重做\n    (ch13)              單一研究、單一實驗室                出來過嗎？還是只有原團隊\n                                                           報過一次？一次可能僥倖。\n\n  9 無機制的相關        「數據顯示有效，雖然還不清楚        就算相關是真的、就算對照\n    (ch14)              為什麼」——黑箱有效，說不出         乾淨，你說得出『為什麼有效』\n                        為什麼                              嗎？說不出時它何時失效你\n                                                           也不知道。\n\n 10 訴諸權威           「諾貝爾獎得主／某大廠首席說…」      這結論的份量來自『獨立證據\n    (ch15)              ——把人的頭銜當成證據本身            的趨同』還是『這個人很大牌』？\n                                                           權威是線索不是證據。\n\n 11 樣本不具代表性      「我們調查了 240 萬人，所以        這個樣本是怎麼選出來的？選\n    (本章正式收)        結論很可靠」——大樣本但抽樣        進來的人跟你想推論的母體\n                        管道偏斜                            一樣嗎？偏斜的大樣本比小\n                                                           樣本更危險（更自信地錯）。\n\n 12 回歸均值假效果      「成績最差的一批學員，補課後       這批人是『按極端值挑出來』的\n    (本章正式收)        進步最多，所以補課有效」——        嗎？極端值本來就會往平均\n                        拿極端組的自然回彈當療效           回彈，沒對照組分不清是療效\n                                                           還是回歸均值。\n```\n\n十二條看起來多，但它們不是十二個獨立的東西要背。它們聚成四個家族，記家族比記條目省力：\n\n```text\n四個家族（記家族、不背條目）\n\n  A. 你看到的不是事實        —— #1 理論負載\n     （證據在進門前就被框架污染了）\n\n  B. 因果被偷渡             —— #3 混淆 / #4 反向 / #12 回歸均值\n     （相關被當成因果，第三因／方向／自然回彈在背後搗鬼）\n\n  C. 統計被玩               —— #5 p-hacking / #6 偷看 / #11 樣本偏斜\n     （在『怎麼收、怎麼算、收誰』裡偷自由度）\n\n  D. 證據被篩過才到你面前    —— #2 不可證偽 / #7 發表偏誤 / #8 未複製\n                              / #9 無機制 / #10 訴諸權威\n     （能反駁的被擋在門外，留下的是倖存者）\n```\n\n四個家族其實對應全書四條主線：A 是「觀察不中立」、B 是「相關≠因果」、C 是「p 值≠真理」、D 是「科學是社群（也是篩子）」。所以這張表不是憑空列的——它是四條驗收主線的操作化身。\n\n## 把前面只埋過的三條，正式收進來\n\n主表裡 #7、#11、#12 標了「本章正式收」。它們前面章節埋過伏筆但沒展開，這章是它們的家。一條一條講清楚——因為這三條恰好是工程師最容易栽的。\n\n### #7 發表偏誤與檔案抽屜問題\n\n這條的學名叫**檔案抽屜問題（file drawer problem）**，由心理學家 Robert Rosenthal 在 **1979 年**命名（這條我查證過：Rosenthal 1979 提出此詞，描述「做了但從未發表」的研究）。直覺是這樣的：\n\n```text\n假設某個效應其實不存在（虛無假設為真）。\n有 20 個獨立團隊各自去測它。\n\n  - 在 p<0.05 的門檻下，純靠運氣，約有 1 個團隊會得到「顯著」的偽陽性。\n  - 另外 19 個團隊得到「不顯著」。\n\n接下來，期刊與作者的行為：\n  - 那 1 個「顯著」的 → 故事漂亮、投得出去、登得上。\n  - 那 19 個「沒效果」的 → 沒人想登、作者也懶得投 → 進抽屜。\n\n於是文獻裡，這個『根本不存在的效應』看起來\n有 1 篇紮實的顯著研究支持、0 篇反對。\n```\n\n讀者只看得到被印出來的那 1 篇，看不到抽屜裡的 19 篇。文獻是一個**倖存者偏差的展示櫥窗**——你看到的不是「所有研究」，是「通過了『好看才登』這道篩子的研究」。\n\n工程師對這個結構應該毫不陌生。這就是**只看成功案例的技術選型**：你 Google「某框架 + 成功」，當然找到一堆讚美文——因為踩雷踩到放棄的人，多半不會寫一篇〈我用 X 失敗了〉的詳細復盤，他默默換掉了。技術部落格、conference talk、廠商 case study，全是抽屜效應的重災區。「我們用 Kafka 重構後 QPS 翻倍」會被寫成文章；「我們上了 Kafka 結果維運成本爆炸又退回去」很少有人寫。**survivorship 偏差不是科學獨有的病，是任何「成功才被記錄」的系統共有的病。**\n\n自檢問句：看到「目前研究都支持 X」，先問「**反對的、沒效果的研究，如果存在，會被登出來嗎？**」如果答案是「不會」，那「都支持」這件事本身沒有資訊量——它可能只是篩子的形狀。\n\n### #11 樣本不具代表性（大樣本治不好）\n\n最反直覺的一條：**樣本大不能修正樣本偏斜，反而讓你更自信地錯。**\n\n教科書級的案例是 1936 年美國總統大選的 *Literary Digest* 民調（這個我也查證過）。這份雜誌寄出上千萬張明信片、回收約 **240 萬份**——以當時標準是天文數字的樣本——預測共和黨的蘭登（Landon）會以 57% 比 43% 勝過羅斯福。結果羅斯福以約 62% 比 38% 壓倒性連任。誤差約 19 個百分點，是大型民調史上數一數二的慘敗。\n\n```text\n為什麼 240 萬人的樣本錯得這麼離譜？\n\n  抽樣管道：電話簿、汽車登記、俱樂部會員名單。\n            │\n            ▼\n  1936 年是大蕭條谷底——有電話、有車、有俱樂部會籍的人\n  是『相對富裕』的一群。\n            │\n            ▼\n  富裕選民偏向共和黨蘭登；羅斯福的新政支持者集中在\n  買不起電話與車的低收入族群——他們根本沒進樣本。\n            │\n            ▼\n  結論：樣本不是『美國選民』的縮影，是『有錢人』的縮影。\n        把樣本從 24 萬加到 240 萬，只是讓這個偏斜的\n        子母體被量得更精確——你更有信心地測量了錯的東西。\n```\n\n關鍵句：**偏斜的大樣本比小樣本更危險**，因為它戴著「我們調查了 240 萬人」的權威面具。樣本量壓低的是隨機誤差（運氣造成的抖動），它**完全治不了系統性偏斜**（選誰進來的偏差）。加樣本只讓你把偏斜的答案算得更準。\n\n工程版你天天遇到：你拿**生產環境某一台機器**的 profiling 結果推論整個 fleet 的行為——但那台是不是剛好流量模式特殊？你用**內部 dogfood 用戶**的留存率推估真實用戶——但 dogfood 用戶是工程師，他們忍受 bug 的閾值跟一般人差十條街。你抓**一週的 log** 算容量——那週包含週末嗎、包含月底結算尖峰嗎？「我抓了一億條 log」聽起來很硬，但如果這一億條全來自離峰時段，它對尖峰容量規劃的價值是零，而且是**自信地零**。\n\n自檢問句：看到大樣本先別放鬆，問「**這個樣本是怎麼被選進來的？選進來的跟我想推論的母體一樣嗎？**」樣本量回答「測得多準」，代表性回答「測的是不是對的東西」——後者錯了，前者再大都白搭。\n\n### #12 回歸均值造成的假效果\n\n這條陰險，因為它**不需要任何人作弊或偏心**，純粹是統計本身製造的幻覺。\n\n名字來自高爾頓（Francis Galton）1886 年的研究：他量了 930 對親子的身高，發現特別高的父母，子女平均比父母矮一點；特別矮的父母，子女平均比父母高一點——一切都往群體平均「回歸」。這不是什麼神祕力量，是**極端值裡混了運氣成分**：一個量到極端高的測量，部分來自真實、部分來自當下的偶然偏高，下次再量，那份偶然會散掉，數值自然往平均靠。\n\n危險的版本是這樣：\n\n```text\n回歸均值如何偽裝成『療效』\n\n  挑出『血壓最高的一批病人』給降壓介入，過陣子再量。\n            │\n            ▼\n  他們的血壓平均『降了』。\n            │\n            ▼\n  錯誤結論：『介入有效！』\n            │\n            ▼\n  但是——你是『按最高值挑出來』的。這批人裡，有些人那天\n  剛好量到偏高（運氣）。就算什麼都不做、給安慰劑、給清水，\n  下次再量他們平均也會降——因為那份『剛好偏高』的運氣\n  本來就會散掉。\n\n  你把『統計的自然回彈』記在了『介入』的功勞簿上。\n```\n\n唯一的解藥是**對照組**：同樣按極端值挑出一組不給介入。如果兩組都降、降幅一樣，那是回歸均值；如果介入組多降了一截，那一截才是真療效。這就是為什麼「前後對比（pre-post）沒有對照組」是個陷阱——前後對比把回歸均值整碗算進療效。\n\n工程既視感極強：你的服務**告警最頻繁的那一週**，你做了一輪優化，下一週告警數降了——是優化有效，還是那一週本來就是異常尖峰、不管你做不做都會回落？你挑**最慢的那批 endpoint** 做優化，P99 改善了——多少是優化、多少是那批 endpoint 上次剛好碰到一波慢查詢、這次自然回彈？只要你是「**按極端表現挑出對象**」再施加介入，回歸均值就一定在分母裡，你需要一個沒被你動過的對照（同期沒優化的相似服務、或一個 holdout）才分得清。\n\n自檢問句：「**這個改善的對象，是按『最差／最極端』挑出來的嗎？有沒有對照組？**」是按極端挑的、又沒對照組，那「進步」裡至少有一部分是統計幻覺，不是你的功勞。\n\n## worked example：用檢查表掃一則新聞標題\n\n來真的。拿一則典型的健康新聞標題，一格一格過這張表。標題是虛構但極典型的合成體：\n\n> 「最新研究顯示：每天喝咖啡的人，十年後罹患心臟病的機率低 20%。專家建議多喝咖啡顧心臟。」\n\n不要直覺反應「咖啡好/不好」。掃表。\n\n```text\n逐項體檢：「每天喝咖啡的人，心臟病機率低 20%」\n\n  #  失敗模式        這則標題中了嗎？        紅旗 / 追問\n ──────────────────────────────────────────────────────────────────\n  1 理論負載        ?  「罹患心臟病」怎麼定義？  灰，需查原文怎麼界定終點\n                       自我回報還是診斷？\n  3 混淆變因        ★★ 重度可疑！喝咖啡的人     誰天天喝咖啡？通常是\n     (最大紅旗)        通常也＝有穩定作息、       有錢、有閒、社經地位高、\n                       社經較高、較少做粗重       醫療可近性好的人。是\n                       夜班的人。                 『咖啡』顧心臟，還是\n                                                  『喝得起咖啡的生活』顧\n                                                  心臟？\n  4 反向因果        ★  會不會是『心臟已經不好     已有心臟病前兆的人可能\n                       的人被醫生勸戒咖啡』，      被勸少喝 → 因果是反的\n                       於是健康的人咖啡喝得多？\n  5 p-hacking      ★  「低 20%」——他們還測了    若同時測了茶、酒、運動、\n                       多少種飲料／習慣？只報      睡眠……總有一個會顯著\n                       了顯著的這個？\n  7 發表偏誤       ★  「咖啡有益」比「咖啡無關」   無效果的咖啡研究較難\n                       好登、好上新聞              上頭條 → 你看到的是\n                                                  倖存者\n  8 未複製         ★  「最新研究」＝單一研究？     一篇單一研究 ≈ 一次\n                       有沒有被獨立複製？          顯著，可能僥倖\n  9 無機制         ☆  有沒有講『咖啡裡哪個成分、   缺機制時不知它何時\n                       透過什麼路徑』護心？        失效、對誰失效\n 10 訴諸權威       ★  「專家建議」——哪位專家？    『專家說』不是證據，\n                       基於這份觀察研究就建議       證據是研究本身\n                       全民多喝？\n 11 樣本代表性     ?  研究對象是誰？哪國、哪      白人中年男性的結論\n                       年齡層、什麼族群？          未必套得到你\n 12 回歸均值       —  這題不太適用（非『按極端    （留意若是『血壓最高\n                       值挑人再介入』的設計）       那批』類研究就要查）\n ──────────────────────────────────────────────────────────────────\n  決定性的一格：這是『觀察性研究』還是 RCT？\n\n    若是觀察性（喝咖啡是受試者自選的）→ #3 混淆幾乎無法排除，\n       「低 20%」最可能是『喝得起咖啡的生活方式』的功勞，\n       不是咖啡。標題用『顯示』『建議多喝』＝把相關當因果。\n\n    若是 RCT（隨機指派喝/不喝、夠久、夠多人）→ 可信度大升，\n       但這種飲食 RCT 極難做（誰能被隨機指派十年不喝咖啡？），\n       所以這類標題九成九背後是觀察性研究。\n```\n\n掃完，結論不是「咖啡沒用」，也不是「咖啡有用」——而是**「這則標題的證據強度遠低於它的語氣」**。「研究顯示」「專家建議多喝」是因果語氣，但底下九成是一個排不掉混淆變因的觀察相關。你該有的反應是把可信度調到「有意思的相關，待 RCT 確認」這一格，而不是明天開始猛灌咖啡。\n\n注意一件事：這則標題中了**七八條紅旗**，但它沒有一條是「造假」。沒人偽造數據。它只是一個真實的觀察相關，被一層層樂觀的措辭（「顯示」「建議」）和篩子（只有正面結果上新聞）放大成一個它撐不起的因果宣稱。**這正是失敗模式目錄的價值——絕大多數自欺不是謊言，是一連串各自看起來合理的小跳躍，疊起來就騙了你。**\n\n## 脊椎透鏡：用這張表回頭體檢塞麥爾維斯案\n\n這是脊椎的塞麥爾維斯案，現在換**「失敗模式檢查表」透鏡**看它——前面十五章每章用一個透鏡，這章用整張表一次掃完。把這位 1847 年維也納的醫師當成一個「投稿者」，他的洗手研究送到你桌上，你逐項打勾：他**通過了哪些、栽在哪些**。\n\n```text\n塞麥爾維斯洗手案 × 失敗模式目錄（他過了哪幾關？）\n\n  #  失敗模式      塞麥爾維斯案的表現            判定\n ──────────────────────────────────────────────────────────────────\n  1 理論負載      他『看見』兩病房差異該被解釋，   ✓ 通過（但要誠實：\n                  別人看著同數字歸因瘴氣——他的    他的觀察也帶框架，\n                  框架讓他看見反常 (ch02)          只是框架剛好對)\n  3 混淆變因      兩病房同院同期、病人按單雙日      ✓ 強通過。準隨機分\n                  交替分配＝準隨機分組，把社經、     配把混淆變因平均掉\n                  季節、母體差異平均掉 (ch05/06)    了——這是他最硬的地方\n  4 反向因果      洗手→死亡率降，時序明確、         ✓ 通過。介入在前、\n                  介入可開可關                      效果在後、可逆\n  5 p-hacking    沒有挑變數、沒有偷看——他看的      ✓ 通過。效果巨大、\n                  是一個預先關注的死亡率，效果       不是 p 剛好<0.05 的\n                  是『腰斬』等級不是『勉強顯著』     脆弱貨色\n  7 發表偏誤      ——（他的問題相反：他發表慢、      ✓ 不適用（反而是\n                  寫得差，是『該登的沒登好』）       他的表達拖累了他）\n  8 未複製        他調職後在別處也降死亡率＝         ✓ 通過！結果其實\n                  被複製過 (ch13)                   被複製了\n  9 無機制        ✗✗ 致命傷。他說『屍體微粒』       ✗ 重度失敗。細菌說\n    (ch14)         但講不出細菌機制（Pasteur/Koch    要他死後才立起——\n                   在他死後才立）                    這是他被否決的關鍵\n 11 樣本代表性     大樣本、真實臨床母體、連續多年     ✓ 通過。不是小樣本\n                                                    僥倖\n 12 回歸均值       他不是『挑死亡率最高那月再介入』   ✓ 通過。介入是全面\n                  ——是全面施行、長期追蹤             性、長期的，非按極\n                                                    端值挑點\n ──────────────────────────────────────────────────────────────────\n  總評：12 條失敗模式，他幾乎全部通過——除了 #9 無機制（致命）。\n        外加一條表外的：他栽在『社群與制度』（被典範否決、\n        性情與發表不利、職場政治，ch08）——那不是研究設計的\n        失敗，是科學作為人類組織的失敗。\n```\n\n這張體檢表是全書最該停下來看的一格。塞麥爾維斯的研究，用今天最嚴格的失敗模式目錄掃，**幾乎是滿分**——對照乾淨、效果巨大、時序明確、甚至被複製過。他唯一栽的那一格是 **#9 無機制**，外加表外的**社群否決**。\n\n這把本書最重要的教學點釘死了：**有效果 ≠ 有機制 ≠ 被接受。** 一個研究可以通過你能想到的所有「方法論」檢查，卻仍然因為「說不出為什麼」而被整個醫界拒絕二十年，而病人在這二十年裡繼續死。失敗模式目錄能幫你抓出絕大多數的爛研究——但它抓不出「方法全對、只是缺機制、又生不逢時」這種悲劇。這也是為什麼這張表是**必要但不充分**的：它是你的第一道掃描，不是最終裁決。\n\n還有一個你不該錯過的諷刺（ch09 已經點過，這裡用檢查表重收一次）：連塞麥爾維斯案本身，都能被「挑數字」誇大。「死亡率從 18% 降到 1%」這種講法，偷用了「1847 年 4 月單月峰值（18.27%）對比 1848 全年（1.27%）」——拿一個介入前的單月峰值去比一個介入後的全年平均，是用挑選過的時間切片誇大效果（landscape ⚠ 與 ch01/ch09 一致）。誠實版該用同院同期兩病房對照（醫師 98.4‰ vs 助產士 36.2‰），或全年對全年（1846 約 13% → 1848 約 1.27%）。效果依然戲劇性，不需作弊。**這條本身就是失敗模式目錄該收的一格——你用這張表體檢別人時，別忘了拿它照自己：連在講防自欺的脊椎案例裡，數字都可能被不自覺地挑過。**\n\n## 直覺的陷阱\n\n這張檢查表本身，會被怎麼誤用？這裡有一個具名陷阱，比其他任何一條都危險，因為它**偽裝成嚴謹**。\n\n**具名陷阱：「我掃過檢查表了所以我很客觀」——把 checklist 當免死金牌。**\n\n一張十二項的檢查表，最大的風險不是漏掉哪一項，而是它給你一種**虛假的徹底感**。你掃過一遍、每格都打了勾，於是宣布「我已經嚴格審查過了」。但檢查表有三個它自己藏起來的破綻：\n\n```text\n檢查表的三個自我盲區（用表的人最該警惕）\n\n  破綻一：表是『已知失敗模式』的清單，新坑不在表上。\n    這張表收的是科學界三百年踩過、命名過的坑。一個\n    『還沒被命名的新自欺方式』不會在表上——就像 OWASP\n    Top 10 防不住一個全新的零日漏洞。掃過表 ≠ 安全，\n    只 ≠ 沒中『已知的坑』。\n\n  破綻二：你會傾向把表用在『你想反駁的宣稱』上，\n          對『你想相信的宣稱』睜一隻眼。\n    這正是動機性推理 (ch11)。看到不合你意的研究，你\n    十二條挑得很勤；看到合你意的，你掃兩條就放行。\n    『我用了檢查表』不能免疫於『我偏心地用檢查表』。\n\n  破綻三：打勾變成儀式，取代了思考。\n    checklist 最容易退化成『跑流程』——每格快速打勾、\n    不真的停下來想。真正的審查是『這一格讓我不安，\n    我得深究』，不是『這格打過了，下一格』。\n```\n\n怎麼自我察覺？最簡單的測試：**你上一次用這張表，是用在一個你本來就不信的宣稱，還是一個你本來就想信的宣稱上？** 如果永遠是前者，這張表已經淪為你動機性推理的武器，不是防自欺的工具。真正的功夫是**拿它照你最想相信的那個結論**——你最捨不得放棄的技術選型、你最得意的那次優化歸因。表照向自己時才開始值錢。\n\n「我很客觀，我有檢查表」這句話，本身就是 ch11 那條陷阱的變體：**宣稱自己客觀，往往是停止自我懷疑的信號。** 檢查表是降低自欺的工具，不是消滅自欺的證書。\n\n## 紙上推演\n\n### 第 1 題（★★）**[15 分鐘]**：用檢查表體檢一則真實標題\n\n找一則你最近真的看過的「研究顯示…」標題（健康、營養、生產力、教育都行），或一個技術 benchmark（「我們的資料庫比 X 快 10 倍」）。用十二格主表逐項過一遍：哪幾條中了紅旗、哪一條是決定性的、掃完後你對它的可信度該調到哪一格（信／待複製確認／當作雜訊）。最後列出：**這張表裡，你過去最常忽略的三項是哪三項？**\n\n### 推演解答\n\n這題沒有標準答案，但有「掃得對不對」的標準。一個掃得好的範例（以「站立辦公桌讓生產力提升 15%」為例）：\n\n```text\n「站立辦公桌提升生產力 15%」逐項掃\n\n  #1  理論負載  ?  「生產力」怎麼量？自我回報？打字速度？\n                   產出行數？——量法本身偷渡了假設\n  #3  混淆變因  ★★ 會用站立桌的公司，通常也是『重視員工、\n     (決定性)      預算充足、管理較好』的公司——是站立桌\n                   提升生產力，還是『好公司』兩者都有？\n  #5  p-hacking ★  測了生產力、滿意度、健康、缺勤……只報\n                   了顯著的生產力？\n  #8  未複製    ★  單一研究？廠商自己做的？\n  #11 樣本      ?  受試者是誰？自願換站立桌的人本來就\n                   不一樣（自選偏差）\n  #12 回歸均值  ☆  若是挑『生產力最低的部門』導入再量，\n                   要小心自然回彈\n\n  決定性一格：是觀察性（公司自己決定要不要裝）還是\n              RCT（隨機指派員工站/坐）？前者 #3 排不掉。\n```\n\n常見錯路：**(a) 直接判生死**——「這研究是假的」。錯。掃表的產出不是「真/假」，是「可信度該調到哪」；絕大多數中紅旗的研究是「相關被當因果」，不是造假。**(b) 只掃自己想挑的那幾條**——這就掉進本章的具名陷阱了。**(c) 漏掉「決定性的一格」**——對健康/行為類研究，「觀察性還是 RCT」幾乎總是最決定性的一問，因為它直接決定 #3 混淆排不排得掉。至於「過去最常忽略的三項」，大多數工程師的誠實答案是 **#7 發表偏誤**（只看成功案例）、**#11 樣本代表性**（拿一台機器/一週 log 推論全局）、**#12 回歸均值**（按最差的挑出來優化、把回彈當功勞）——這三條剛好是本章新收的三條，不是巧合：它們最反直覺，所以最常被略過。\n\n### 第 2 題（★★★）**[25 分鐘]**：把檢查表反過來——設計一個能騙過粗心審查的假研究\n\n逆向工程最能驗證你是否真懂。你的任務：設計一個**結論是「喝紅酒每天一杯延年益壽」的假研究**，目標是讓它在「只看摘要、不細想」的人眼裡像真的，同時你自己標出它每一格在哪裡作弊。（不是教你造假——是讓你看清真造假/真自欺長什麼樣，下次認得出。）然後反問：**你設計的這些作弊手法裡，有哪幾個其實天天發生在真誠的研究裡、研究者自己不自知？**\n\n### 推演解答\n\n一個設計得「夠像真」的假研究：\n\n```text\n假研究：「每天一杯紅酒，全因死亡率低 18%」\n\n  作弊手法                          中了目錄哪條\n ──────────────────────────────────────────────────\n  用觀察性世代研究，不做 RCT        #3 混淆——天天喝得起\n
