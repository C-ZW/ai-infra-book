  約 1.27%（同年第二病房 1.33%，兩病房拉平）\n\n  ⚠ 不要用「18.27% → 1.27%」這種講法。\n    18.27% 是「1847 年 4 月單月」（洗手令 5 月中才下、接近峰值），\n    不是 1847 全年。拿單月峰值對比 1848 全年 = 用挑選過的切片誇大效果。\n    （這個「連防自欺脊椎都可能被挑數字誇大」的諷刺，ch09 會專門講。）\n```\n\n數字守住了，回到因果論證。塞麥爾維斯能把這個相關推向因果，靠的正是這一章講的幾把工具——他當時沒有這些名詞，但做的就是這些事：\n\n```text\n塞麥爾維斯如何把「相關」論證成「因果」（本章透鏡逐欄拆解）\n\n  工具               他手上的證據                     擋掉的陷阱\n  ─────────────────────────────────────────────────────────────\n  準隨機對照         單雙日交替分病房，               大幅削弱混淆變因\n  （ch05）           病人無從自選 → 兩病房病人         （兩病房的病人\n                     條件大致可比                       條件被「分」平了）\n\n  時序               洗手令在前，死亡率驟降在後         反向因果\n  （Hill 視角①）     （不是死亡率先降才開始洗手）       （不是「先變好\n                                                         才去洗手」）\n\n  劑量/可逆          洗手執行嚴，死亡率低；             削弱純巧合\n  （Hill 視角②③）   鬆懈時回彈 → 開關對得上            （介入可開可關，\n                                                         效果跟著動）\n\n  機制候選           Kolletschka 之死溯因出的           給因果一個故事\n  （ch03 溯因）      「屍體微粒經手傳染」               （但這故事不完整，\n                                                         見下）\n```\n\n看清楚了——按本章的標準，塞麥爾維斯的因果論證其實**相當扎實**：他有接近隨機的對照（單雙日交替，削弱混淆）、時序對（洗手在前、死亡率降在後，排除反向因果）、介入可逆（鬆懈就回彈，排除巧合）。如果今天有人拿這套證據來說服你某個快取真的有效，你會信。\n\n那他為什麼還是被否決了二十年？\n\n這就是脊椎案最痛、也最重要的一刀——**他的因果論證在「對照」這一軸幾乎滿分，卻栽在另一軸：機制**。當時可能的混淆質疑（病房通風不同？病人本來體質不同？醫學生比較粗暴？）他大多能回應，但他說不清「屍體微粒到底**為什麼**會致病」——細菌致病說要到他死後，巴斯德（Louis Pasteur）和科赫（Robert Koch）在 1860–80 年代才立起來。在反對者眼裡，一個「相關很強、時序也對、但講不出機制」的宣稱，**永遠可以被懷疑成某個還沒被發現的混淆變因**。\n\n這是本章留給你的最深一層：**對照能切斷你想得到的混淆，但「沒有機制」會讓人永遠懷疑還有一個你沒切斷的混淆。** 切斷已知混淆（對照）和解釋為什麼有效（機制）是兩件事，缺了後者，前者的說服力會被打折。塞麥爾維斯缺的那塊機制，是 ch14 的主角；他明明對照做得漂亮卻被整個醫界否決，那是 ch08「科學是一群人」的主角。本章只負責讓你看清：**他不是輸在相關不夠強、也不是輸在沒切混淆——他輸在沒有機制這條退路被人留著。**\n\n## 一句話的 do：觀察和介入是兩種不同的問題\n\n最後埋一個你之後可能會撞到的詞，一句話帶過。\n\n統計學家朱迪亞・珀爾（Judea Pearl）在 1990 年代發展了一套「因果推論」的形式語言，核心區分是：**「觀察到 X」和「介入去設定 X」是兩個根本不同的問題**。他用 `P(Y | do(X))`（讀作「對 X 動手」）來表示後者，跟一般條件機率 `P(Y | X)`（單純觀察到 X）區分開——你做 A/B test「隨機指定一批人裝 SDK」就是 `do`，你「看哪些人自己裝了 SDK」就只是觀察。本章整章其實都在講這兩者的鴻溝，珀爾給了它一套可計算的數學。**這套形式理論（do-calculus、因果圖、後門準則）本書不展開**，有興趣往因果推論的專書去（見延伸閱讀）——你只要先記住那個直覺：**「看到」和「動手」是兩回事，混淆變因正是讓這兩者裂開的那道縫。**\n\n## 直覺的陷阱\n\n本章的概念是「想當然耳」的重災區——人類的大腦天生是台「找因果」的機器，看到兩件事一起發生，幾乎是反射性地腦補一條箭頭。以下是最容易把你帶溝裡的幾個。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步害你 | 怎麼自我察覺 |\n|---|---|---|---|\n| **把相關當因果** | 「A 和 B 一起動，A 應該造成了 B」 | 跳過「有沒有第三者 Z 同時推兩個」這一問 | 問自己：「有沒有一個東西，能同時解釋 A 和 B？」想不出來才往因果靠 |\n| **「相關沒用」的矯枉過正** | 「既然相關不是因果，那相關都是噪音」 | 把線索當垃圾丟掉 | 相關是嫌疑犯名單，沒它連查都沒得查；它有用，只是不能直接定罪 |\n| **Hill 視角當打勾清單** | 「九條中了七條，所以是因果」 | 把「思考角度」當「判決標準」 | 記住希爾原話：沒有一條是必要或充分的；混淆變因可能讓你中很多條 |\n| **控制了我想到的，就乾淨了** | 「我把規模、地區都調整了，剩下的就是真因果」 | 漏掉「你沒想到的混淆變因」 | 觀察法只能擋已知的鬼；要擋未知的鬼，只有隨機化 |\n| **反向因果看不出來** | 「X 和 Y 強相關，X 一定是因」 | 沒問「會不會是 Y 造成 X」 | 對每個因果宣稱反過來念一遍：「會不會其實是果先發生？」 |\n\n**具名陷阱：「控制了混淆變因」的假乾淨。** 這是最危險的一個，因為它**偽裝成嚴謹**。一個研究者（或你）在觀察數據上「調整」了年齡、性別、地區、收入……列了長長一串控制變因，看起來無懈可擊。但這份嚴謹有個藏起來的前提：**你控制的，只能是你想得到、而且量得到的東西。** 任何一個你沒想到的混淆變因（或想到了但沒數據的），照樣在背後把相關撐起來。\n\n這就是為什麼「我控制了一堆變因，所以這是因果」這句話，比「我做了 RCT，所以這是因果」**弱一個檔次**——前者擋的是「你想到的鬼」，後者擋的是「所有鬼」。經典的教學例子是「搬到佛羅里達的人較多得阿茲海默症，所以佛州氣候致病」（2026-06：這是統計教材常用的示意例，當教學素材看）——真正的混淆是**年齡**：退休的老人才搬去佛州，老人本來就較易失智。如果你的控制變因清單裡漏了年齡，你那套「我調整了氣候、濕度、飲食」的嚴謹，全是白工。自我察覺的方法只有一個：**每次你說「我已經控制了混淆變因」，立刻補一句「我沒控制到、甚至沒想到的，會是什麼？」** 答不出來，就還沒乾淨。\n\n## 紙上推演\n\n以下題目純紙筆推演，不需要跑任何程式。請先自己想，再看解答。\n\n---\n\n**推演題 1（★★，[15 分鐘]）：揪出留存率宣稱裡的混淆變因。**\n\n某家分析平台宣稱：「**使用我們 SDK 的 App，30 天留存率平均比不使用的高 18%。所以接入我們 SDK 能提升留存。**」\n\n(a) 指出最可能的混淆變因（提示：誰會「選擇」去裝這個 SDK？）。\n(b) 畫出這個宣稱的因果結構圖（用本章的 Z→X、Z→Y 形式），標明哪條箭頭是平台希望你相信的、哪條是實際在起作用的。\n(c) 設計一個能切斷這個混淆的對照，說明關鍵在哪一步。\n\n---\n\n**推演題 2（★★★，[20 分鐘]）：用 Bradford Hill 視角體檢一個你信過的因果宣稱。**\n\n挑一個你過去在工作中相信過、並據以做了決策的因果宣稱（例如「加了這層快取所以延遲降了」「換了這個 GC 參數所以停頓變短了」）。用本章講的三個 Hill 視角——**時序、劑量反應、可逆/實驗**——逐一審視它。\n\n(a) 這三個視角各自，你當時手上的證據滿足嗎？\n(b) 對於你「沒滿足」或「沒檢查」的那些視角，提出一個能補上的具體檢查。\n(c) 誠實回答：就算這三個視角全滿足，你能排除所有混淆變因嗎？為什麼不能？\n\n---\n\n**推演題 3（★★，[12 分鐘]）：分辨三種陷阱。**\n\n下面三個「相關」各屬於本章哪一種陷阱（混淆／反向因果／純巧合）？說明理由。\n\n1. 「我們發現：被 on-call 工程師手動重啟過的服務，後續一週故障率特別高。」\n2. 「過去半年，公司的咖啡豆採購量和線上轉換率高度相關。」\n3. 「資料顯示：寫了較多單元測試的專案，線上 bug 較少。」\n\n---\n\n### 推演解答\n\n**第 1 題：**\n\n(a) 最可能的混淆變因是「**團隊本身的品質／資源水準**」——把它叫做 Z。本來就認真、有資源、產品本來就好的團隊，(i) 比較會去評估並接入第三方 SDK，(ii) 留存率本來就高。Z 同時造成「裝 SDK」和「高留存」。\n\n(b)\n```text\n              Z = 團隊品質/資源\n            ↙                    ↘\n   X = 裝了 SDK  ─ ─ ─ ─ ─ ─ ─  Y = 高留存\n                  (觀察到 +18% 相關)\n\n   平台希望你相信：X ──────► Y   （SDK 提升留存）\n   實際在起作用的：Z 同時推 X 和 Y（高留存其實來自團隊本身）\n                   X→Y 可能根本是 0\n```\n\n(c) 切斷混淆的乾淨對照＝**隨機分流**：在一批條件可比的 App 裡，**由你隨機指定**哪些裝 SDK、哪些不裝（而不是讓團隊自選）。關鍵在「**不讓團隊自己選**」這一步——一旦是隨機分的，「團隊品質」這個 Z 在兩組之間被平均掉，若還剩留存差，才可歸因於 SDK。常見錯路：以為「找一批沒裝 SDK 的 App 來比」就夠了——不夠，因為那批「沒裝的」在團隊品質上系統性地跟「裝了的」不同，混淆還在。\n\n**第 2 題：**\n\n這題沒有標準答案，重點在**審視的紀律**，不在結論。一份及格的解答長這樣：\n\n(a) 假設宣稱是「加了快取所以延遲降了」。\n- **時序**：延遲是「上快取之後」才降的，還是上之前就在降的趨勢？——很多人沒檢查，直接看「上線後延遲低」就信了，但延遲可能是流量自然回落造成的既有趨勢。\n- **劑量反應**：快取命中率高的時段，延遲降得更多嗎？如果「命中率高低延遲都一樣」，反而可疑。\n- **可逆/實驗**：把快取關掉（或 A/B 分流），延遲彈回去嗎？這是最強的一條，但也最少人做。\n\n(b) 沒滿足的補法：例如時序沒查，就去調出上線前後各兩週的延遲曲線，看降是不是真的卡在上線那一刻；可逆沒驗，就做一次漸進式放量（分流一部分流量），繞過快取，直接對比。\n\n(c) **不能排除所有混淆。** 因為這三個視角再漂亮，混淆變因都可能同時滿足它們——例如「上線那天也正好換了一批更快的機器」，這個混淆變因同樣會呈現「時序對（換機器在前、延遲降在後）」「可逆（換回舊機器延遲就回升）」。Hill 視角提高可信度，但只有隨機化能徹底切斷未知混淆，而你這裡沒做隨機化。\n\n**第 3 題：**\n\n1. **反向因果**。不是「重啟導致故障」，而是「**服務先出問題，on-call 才去重啟它**」。故障在前，重啟在後，箭頭是 故障→重啟，你看到的是它的尾巴。常見錯路：真的去推「禁止重啟」，結果什麼也沒改善，因為動錯了方向。\n2. **純巧合（或極弱的混淆）**。咖啡豆採購量和轉換率之間，找不到一個說得通的因果機制，也很難想出一個合理的共同原因（硬要扯「公司擴張」當 Z 也很牽強）。半年的兩條曲線剛好一起動，多半是巧合——指標看夠多，總有兩條對得上（ch09 多重比較的近親）。判別關鍵：**講不出機制、也講不出合理的共同原因**，就高度懷疑是巧合。\n3. **混淆變因**。「寫較多測試」和「bug 較少」之間，很可能有個共同原因 Z＝「**團隊的工程紀律/資深程度**」——紀律好的團隊既寫較多測試、也寫出較少 bug 的程式。寫測試本身或許有用，但這個觀察相關**高估**了它的因果效果，因為一部分「bug 少」其實是團隊素質直接造成的，跟測試無關。要切斷，得在「紀律相近」的團隊間比較，或更好地——隨機指定某些任務「必須先寫測試」、某些不要求，再比 bug 率。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼「相關不是因果」**不**等於「相關沒用」？相關在因果推論裡扮演什麼角色？\n2. 混淆變因、反向因果、純巧合，三者的結構各長什麼樣？為什麼說混淆變因是其中最陰險的？\n3. 為什麼隨機化能切斷「**所有**」混淆變因，而「在觀察數據上控制變因」只能切斷一部分？這個差別為什麼那麼重要？\n4. 為什麼說「我已經控制了一堆混淆變因」這句話，比「我做了 RCT」弱一個檔次？\n5. Bradford Hill 為什麼堅持叫「視角」不叫「判準」？把它當打勾清單會出什麼錯？\n6. 塞麥爾維斯的因果論證在「對照」這一軸其實很強，那他為什麼還是被否決？「沒有機制」如何讓人永遠能懷疑還有一個沒切斷的混淆？\n7. 「觀察到 X」和「介入去設定 X」差在哪？為什麼你的 A/B test 屬於後者，而「看哪些使用者自己用了某功能」屬於前者？\n\n## 延伸閱讀\n\n- **Bradford Hill, A. B. (1965). \"The Environment and Disease: Association or Causation?\"** —— 九個「視角」的原始演講。讀它你會驚訝於希爾自己有多謹慎：他反覆強調這些不是判準、沒有一個是必要或充分的。維基的「Bradford Hill criteria」條目（https://en.wikipedia.org/wiki/Bradford_Hill_criteria）有九條的清楚整理與「不是 criteria 是 viewpoints」的澄清。\n- **Judea Pearl & Dana Mackenzie, *The Book of Why*（《因果革命》，2018）** —— 想真正搞懂「觀察 vs 介入」`P(Y|do(X))` 的鴻溝、混淆變因與後門準則，這是最好讀的入門。本章那句「一句話的 do」展開成一整本書。\n- **Tyler Vigen, *Spurious Correlations*（spuriouscorrelations.com）** —— 純巧合假相關的著名收藏，看完你對「兩條曲線一起動」會永久免疫。當笑話讀，但教學效果一流。\n- **混淆變因與相關係數「怎麼算」** —— 相關係數 ρ 的定義、為什麼「相關 = 0」不等於「獨立」，機率機制見《馴服隨機》談相關與獨立的那章；本書只用結論、不推公式。\n- **隨機化的統計威力「為什麼成立」** —— 「隨機分組讓混淆變因平均掉」這件事的機率基礎，見《馴服隨機》談隨機變數與獨立的那章。\n- **下一步**：對照與混淆都講完了，但「證據如何**一點一點**抬高或壓低你對某假設的信任」還沒處理——那是 ch07「證據如何更新信念」（貝氏確證）的活兒；而「為什麼沒有機制就永遠有人能懷疑你」會在 ch14 收。\n"}, {"id": "ch07-bayesian-confirmation", "file": "ch07-bayesian-confirmation.md", "group": "Part II — 設計的防線", "title": "ch07 — 證據如何更新信念：貝氏確證的科哲意義", "md": "# ch07 — 證據如何更新信念：貝氏確證的科哲意義\n\n> **本章解決什麼問題**：前四章我們把「證明」這個目標拆掉了——科學不證明（ch03 歸納問題）、只嘗試否證（ch04 可證偽）。但「否證」聽起來太黑白：一個反例就推翻、沒反例就懸著。真實的科學推理不是這樣運作的，它更像一個音量旋鈕：每一筆證據把某個假設的可信度往上扭一點、或往下扭一點。這就是**貝氏確證（Bayesian confirmation）**的世界觀，也是 Part II「設計的防線」的收尾——對照實驗（ch05）產出證據、相關 vs 因果（ch06）告訴你哪種證據可信，本章告訴你**證據進來之後，理性的信念該怎麼動**。我不教你貝氏定理怎麼算（那是《馴服隨機》ch05 的活），我教你它在「防自欺」這件事上的意思：為什麼一個「假設真才會出現、假設假幾乎不會出現」的觀察是強證據，而一個「不管真假都常見」的觀察幾乎沒用——哪怕它在邏輯上「確證」了你的假設。\n\n## 從你已知的出發\n\n你做過 incident 診斷，所以你其實已經是個貝氏推理者，只是沒人這樣跟你講過。\n\n凌晨三點，告警響了：API 的 P99 延遲飆到平常的五倍。你腦子裡第一個念頭不是「我不知道」，而是一個**已經帶權重的嫌疑名單**：\n\n```text\n凌晨三點，看到「P99 飆五倍」這個症狀，你心裡的嫌疑名單（先驗）：\n\n  資料庫慢查詢 ........ 「八成是這個」（這症狀以前多半是 DB）  ← 高先驗\n  下游依賴掛了 ........ 「也有可能」                          ← 中先驗\n  GC 暴走 ............ 「偶爾」                              ← 低先驗\n  網路抖動 ........... 「不太像，但放著」                    ← 很低先驗\n```\n\n這份「還沒看任何 log 就有的權重」，就是**先驗（prior）**——你過去無數次事故累積下來的、對「這種症狀通常是什麼原因」的信念分布。\n\n然後你開始查證。你拉出 RDS 的 CPU 曲線，看到它平的、一點都沒動。這一筆觀察做了什麼？它**狠狠壓低了「資料庫慢查詢」的可信度**——因為「如果真是 DB 慢查詢，CPU 應該飆」，現在 CPU 沒飆，這個假設的概似（likelihood）很差。你的懷疑重心一下子從 DB 滑走，滑向「下游依賴」。接著你看下游服務的 error rate，發現它同步暴漲——這一筆證據**大幅抬高了「下游掛了」的可信度**，因為這正是「下游掛了」這個假設預期會看到的東西，而其他假設很難解釋它。\n\n你剛剛做的，一步一步，就是貝氏更新：\n\n```text\n  先驗（看 log 前的懷疑分布）\n        │\n        │  ← 觀察一：RDS CPU 平的\n        │     （這在「DB 慢查詢為真」時很罕見 → 壓低 DB）\n        ▼\n  中間信念（DB 嫌疑↓、下游嫌疑↑）\n        │\n        │  ← 觀察二：下游 error rate 同步暴漲\n        │     （這在「下游掛了為真」時很常見、其他假設難解釋 → 抬高下游）\n        ▼\n  後驗（看完 log 後的懷疑分布：九成是下游）\n```\n\n注意這裡頭**沒有任何一步是「證明」**。你沒有證明下游掛了——你只是把它的可信度從「也有可能」推到了「九成是它」。下一筆證據（比如下游其實是健康的、是它前面的 LB 在丟封包）隨時可以再把這個後驗推回去。**信念是連續的、是可被下一筆證據修正的**——這正是科學推理的真實質地，比「否證/沒否證」的黑白開關精細得多。\n\n本章要做的，就是把你這套已經內建的直覺，擦亮成一個能用來防自欺的明確框架。而它防的那種自欺，特別陰險：**一筆看起來「支持我假設」、邏輯上也確實支持、但其實幾乎沒抬高任何可信度的弱證據**——你卻把它當成了確認。\n\n## 從「否證」到「確證」：把音量旋鈕裝回去\n\nch04 的波普爾給了我們一個強而有力、但也太剛硬的圖像：理論要嘛被一個反例否證、要嘛還活著。問題是，真實的科學裡，**證據絕大多數時候不是「致命反例」，而是「微微加分」或「微微減分」**。\n\n塞麥爾維斯第一次下洗手令、看到下個月死亡率降，這不是「否證了瘴氣論」、也不是「證明了屍體微粒說」。它是一筆**確證（confirmation）**：它讓「屍體微粒經手傳染」這個假設的可信度往上動了一格。第二個月又降，再往上動一格。月復一月地降，這些觀察**累積**成一個讓人很難不信的後驗——但每一筆單獨拿出來，都只是「加分」，不是「證明」。\n\n貝氏確證理論就是把這個「加分/減分」量化的框架。它的骨架是貝氏定理（Bayes' theorem）：\n\n```text\n             P(E|H) · P(H)\n  P(H|E) = ─────────────────\n                 P(E)\n\n  P(H)    先驗：看到證據 E 之前，你對假設 H 的可信度\n  P(E|H)  概似：「如果 H 為真，會看到 E」的機率\n  P(H|E)  後驗：看到 E 之後，你對 H 的更新後可信度\n  P(E)    證據 E 本身出現的機率（不管 H 真假）\n```\n\n**這條式子怎麼算、各項數字哪來，是《馴服隨機》ch05 的事**（那本書會帶你算醫檢偽陽性那類經典題，本書不重推）。本章只要你抓住它的**科哲意義**——一句話：\n\n> 證據 E 確證假設 H，**若且唯若** E 在「H 為真」時，比在「H 為假」時更可能出現。\n\n把這句話咀嚼一下，它就是整個貝氏世界觀的引擎。用工程師的語言講：**一筆證據值不值錢，不看它本身多漂亮，看它的「鑑別力」——它能不能把「H 為真」和「H 為假」這兩個世界區分開**。\n\n```text\n  證據 E 抬高 H 的可信度  ⟺  P(E|H) > P(E|¬H)      ← E 在 H 真時更常見\n  證據 E 壓低 H 的可信度  ⟺  P(E|H) < P(E|¬H)      ← E 在 H 假時更常見\n  證據 E 對 H 毫無作用    ⟺  P(E|H) ≈ P(E|¬H)      ← E 真假兩世界都一樣常見\n```\n\n最後那一行是本章最該停下來看的：**一個不管假設真假都一樣會出現的觀察，無論它看起來多麼「符合你的假設」，都沒有抬高任何可信度。** 它沒有鑑別力。它只是噪音穿著證據的衣服。\n\n> 嚴謹度標示：這是**直覺版**。「確證」到底該定義成「後驗 > 先驗」（增量確證）還是別的（比如後驗超過某門檻），科哲界有細緻爭論（Carnap、Hempel、現代貝氏派各有版本），本書不裁判，指向延伸閱讀。但「證據的價值在於鑑別力（概似比偏離 1 的程度）」這個核心直覺，是各派共享的、也是工程上最有用的那一塊。\n\n### 概似比：一個你早就在用的東西\n\n把上面那個「鑑別力」寫成一個比值，就是**概似比（likelihood ratio）**：\n\n```text\n              P(E|H)        「如果 H 為真，看到 E 的機率」\n  概似比  =  ─────────  =  ─────────────────────────────────\n             P(E|¬H)        「如果 H 為假，看到 E 的機率」\n\n  概似比 > 1  → 證據 E 支持 H（比值越大、支持越強）\n  概似比 = 1  → 證據 E 對 H 完全中立（白看一場）\n  概似比 < 1  → 證據 E 反對 H（比值越接近 0、反對越強）\n```\n\n你不用算出精確數字，光是**定性地問「這個觀察的概似比大概大於 1、等於 1、還是小於 1」**，就已經是強大的防自欺工具。回到凌晨三點：「RDS CPU 是平的」這個觀察，對「DB 慢查詢」假設的概似比遠小於 1（DB 慢查詢時 CPU 平的，幾乎不可能），所以它強力反對 DB——你的直覺早就這樣運作，只是現在它有了名字。\n\n## 脊椎透鏡：每一次「洗手後又降」如何更新屍體微粒假設\n\n這是脊椎的塞麥爾維斯案，現在我們換**貝氏確證透鏡**看它。前面幾章我們看的是：他怎麼**溯因**出這個假設（ch03）、它**可不可證偽**（ch04）、洗手與死亡率下降是**相關還是因果**（ch06）。本章問的是一個更細的問題：**每一筆月度死亡率數據進來時，「屍體微粒假設」的可信度具體怎麼動？**\n\n設兩個競爭假設：\n\n```text\n  H  = 「屍體微粒經手傳染導致產褥熱」（塞麥爾維斯的假設）\n  ¬H = 「產褥熱由瘴氣/體液失衡導致，跟手沒關係」（當時主流）\n```\n\n現在一筆筆證據進來，我們定性追蹤它對 H 的概似比：\n\n```text\n觀察                                  P(E|H) 高嗎？   P(E|¬H) 高嗎？   對 H 的作用\n─────────────────────────────────────────────────────────────────────────────\nE1: 第一病房(醫師)死亡率遠高於          是             不一定          ↑ 中\n    第二病房(助產士)                   (醫師碰屍體)    (瘴氣對兩房\n                                                      該差不多)\n─────────────────────────────────────────────────────────────────────────────\nE2: Kolletschka 被解剖刀劃傷後         極高           幾乎不可能      ↑↑ 強\n    死於酷似產褥熱的病理               (屍體微粒入血    (瘴氣論很難\n                                      正好預測這個)    解釋這個)\n─────────────────────────────────────────────────────────────────────────────\nE3: 下洗手令後，當月死亡率驟降         高             低             ↑↑ 強\n                                      (移除微粒就      (瘴氣沒變，\n                                       該降)          為何會降?)\n─────────────────────────────────────────────────────────────────────────────\nE4: 第二、三、四…個月死亡率持續低       高             低             ↑ 每次再加一點\n                                      (穩定移除微粒)   (瘴氣論要一直\n                                                      補理由)\n─────────────────────────────────────────────────────────────────────────────\nE5: 一次有人忘了洗手、那批產婦          高             低             ↑ 強（劑量反應）\n    死亡率回升                        (微粒回來了)     (瘴氣論難解)\n```\n\n把這串看完，你會發現一件漂亮的事：**塞麥爾維斯的證據之所以強，不是因為「死亡率降了」這件事本身（瘴氣論的人也可以說「剛好那陣子空氣變好了」），而是因為他的觀察一個比一個更有鑑別力**——尤其是 E2（Kolletschka）和 E5（忘洗手就回升）。這兩筆的概似比極大：它們是「屍體微粒假設為真才會出現、瘴氣假設幾乎無法解釋」的觀察。這就是好證據。\n\n而瘴氣論這邊呢？每來一筆對 H 有利的證據，瘴氣論就得**多補一條輔助假設**去解釋掉它（「那陣子剛好通風改善了」「忘洗手那批剛好體質弱」）。這正是 ch04 埋的杜恩–蒯因難題的另一面：你**可以**用補丁救活一個被打臉的理論，但每補一次，這個理論在貝氏帳本上就**多付一次「事先沒人會這樣預測」的代價**——它的後驗在悄悄流失。（這條線會在 ch08 用拉卡托斯的「退化的研究綱領」接住，在 ch12 用來分辨偽科學。）\n\n**但——這裡是本書最該誠實的地方（守住 landscape T9）**：貝氏帳本上「屍體微粒假設」的後驗被推得很高，**不等於它是對的**。塞麥爾維斯說的「微粒」機制後來被細菌說修正了。貝氏確證做的是「在現有候選假設裡，把證據最支持的那個的可信度推高」——它無法保證真正的答案在你的候選名單裡。後驗很高的假設仍可能全錯（你漏了真正的解釋，或所有候選都不對）。**這是貝氏世界觀必須跟你講清楚的限制**，否則它就變成另一條自欺管道——「我的後驗都 0.95 了，怎麼可能錯？」\n\n## 烏鴉悖論：為什麼「確證」需要量化，樸素直覺會崩\n\n現在來看本章最好玩、也最能戳穿樸素直覺的東西——韓培爾（Carl Hempel）1945 年的**烏鴉悖論（raven paradox）**（年份照 landscape）。它是貝氏確證理論最愛拿來表演的一道謎題，因為它精準地展示了「光靠邏輯談確證會崩，必須引入量化」。\n\n謎題是這樣的。考慮假設：\n\n```text\n  H：「所有烏鴉都是黑的」\n```\n\n樸素的確證直覺（韓培爾稱 Nicod 條件）說：**看到一隻黑烏鴉，就確證了 H 一點點**。合理。你檢查越多烏鴉都是黑的，你對「烏鴉都黑」越有信心。\n\n但「所有烏鴉都是黑的」在邏輯上**完全等價於**它的對換命題：\n\n```text\n  H：「所有烏鴉都是黑的」\n       ⟺（邏輯等價）\n  H'：「所有不黑的東西都不是烏鴉」\n```\n\n這兩句說的是同一件事（若 P 則 Q ⟺ 若非 Q 則非 P，這你熟）。那麼，能確證 H' 的東西，也就確證了 H。什麼能確證「所有不黑的東西都不是烏鴉」？**任何一個「不黑、又不是烏鴉」的東西**——比如一顆綠蘋果。\n\n於是我們被邏輯逼到一個荒謬的結論：\n\n> **你低頭看到桌上一顆綠蘋果，就確證了「所有烏鴉都是黑的」。**\n\n你甚至不用出門看烏鴉。翻開冰箱看到一根黃香蕉、一瓶白牛奶、一件紅毛衣，全都在「確證」烏鴉都黑。這明顯荒謬——綠蘋果跟烏鴉有什麼關係？但每一步推論看起來都對。這就是悖論。\n\n### 貝氏怎麼拆解它——而這正是本章的高潮\n\n樸素的「確證 = 是/否」的邏輯框架在這裡徹底卡死：它只能說「綠蘋果要嘛確證、要嘛不確證」，而邏輯逼它說「確證」，於是荒謬。\n\n貝氏的解法漂亮得讓人想鼓掌，它**不否認**綠蘋果確證了烏鴉都黑——它說：\n\n> **綠蘋果確實確證了「烏鴉都黑」，在邏輯上完全成立。但它把可信度抬高的量，微小到趨近於零。我們的直覺把「微小到趨近於零」誤當成「零」，這才是悖論的真正來源。**（這是標準貝氏解，2026-06 主流，雖仍有抽樣方式相關的批評，見延伸閱讀）\n\n為什麼微小到趨近於零？用概似比想。世界上「不黑的東西」**多到天文數字**（綠蘋果、紅毛衣、藍天、黃花……），而烏鴉相對極少。當你隨手撈起一個「不黑的東西」檢查它是不是烏鴉：\n\n```text\n  若 H 為真（烏鴉都黑）：這個不黑物不是烏鴉 → 機率 ≈ 1（幾乎必然）\n  若 H 為假（有白烏鴉）：這個不黑物不是烏鴉 → 機率仍 ≈ 1\n                          （因為白烏鴉在「所有不黑物」裡佔比微乎其微）\n\n  概似比 = P(E|H) / P(E|¬H) ≈ 1 / 1 = 1.0000…001\n            ↑ 大於 1（所以確實有確證），但離 1 近到肉眼看不出來\n```\n\n對比一下檢查一隻烏鴉：\n\n```text\n  若 H 為真（烏鴉都黑）：這隻烏鴉是黑的 → 機率 = 1\n  若 H 為假（有白烏鴉）：這隻烏鴉是黑的 → 機率明顯 < 1（可能撞到白的）\n\n  概似比明顯 > 1  → 真正有鑑別力的觀察\n```\n\n差別一目了然：**看一隻烏鴉是黑的，有實打實的鑑別力（概似比明顯 > 1）；看一顆綠蘋果，鑑別力趨近於零（概似比 ≈ 1.000…）。** 兩者都「確證」，但一個值錢、一個幾乎一文不值。\n\n這就是為什麼「確證」這個概念**非量化不可**。樸素邏輯只有「確證/不確證」兩格，裝不下「綠蘋果技術上確證、但確證量趨近於零」這個事實，於是撞牆。貝氏裝得下，因為它把確證做成一個**連續的量**（概似比偏離 1 的程度）。\n\n> **這裡了不起在哪、請你能用自己的話轉述**：邏輯告訴你綠蘋果「算」證據，你的常識尖叫「這不對」。結果兩邊都對——綠蘋果**是**證據，只是弱到趨近於零。是你的常識把「極弱」誤讀成「無」。一旦你看懂這點，你就再也不會被一筆「技術上支持我、但鑑別力趨近於零」的弱證據騙到——而工程現場到處是這種證據（見「直覺的陷阱」）。\n\n## 貝氏如何「軟化」休謨的歸納問題\n\n繞回 ch03 的休謨。歸納問題說：再多次「過去如此」也無法**邏輯地證明**「未來亦然」。波普爾（ch04）的回應是「那就別想證明，改成嘗試否證」。貝氏給的是**第三條路**，而且我認為這是三者裡最貼近真實科學感受的一條：\n\n> 歸納確實無法**證明**（休謨對）。但每一筆「洗手後又降」的觀察，可以**理性地、可量化地抬高**「屍體微粒假設」的可信度。科學不需要證明，它需要的是「在證據下，理性的信念該往哪動、動多少」——而這個貝氏給得出來。\n\n換句話說，貝氏不跟休謨硬碰硬（它不宣稱解決了歸納問題的邏輯難題），它**改變了問題**：從「能不能證明普遍律？」（休謨：不能）改成「證據如何理性地調整我對普遍律的信心？」（貝氏：這樣調）。塞麥爾維斯月復一月的數據，在邏輯上永遠無法**證明**洗手必然降死亡率，但它能把一個理性的人的後驗一路推到 0.99。**0.99 不是 1，這個差距正是休謨的歸納問題沒消失的痕跡——它只是被推到了實用上可以忽略的角落。**\n\n這就是本章對中央張力的回答：**貝氏確證在堵哪一種自欺？** 它堵的是「非黑即白」的自欺——把「一筆證據」誤當成「決定性證明」（過度自信），或反過來把「一堆弱證據」當成「什麼都沒有」（過度懷疑）。它逼你誠實面對一個介於 0 和 1 之間的可信度，並且每筆證據只能按它的鑑別力推動相應的量，不多不少。\n\n> 嚴謹度標示：貝氏「軟化」歸納問題是**一個哲學立場、不是定論**。批評者（如某些波普爾派）會說貝氏只是把問題換了個位置（先驗哪來？為什麼該用貝氏更新？），這些是真實的開放爭論。本書取「貝氏提供了一個比『證明/否證』更貼近實作的信念更新框架」這個工程上極有用的視角，嚴格的科哲攻防指向延伸閱讀。\n\n## Worked example：強證據 vs 弱證據（塞麥爾維斯案逐筆定性推演）\n\n這是本章的核心 worked example。我們不糾纏精確數字（那是《馴服隨機》的事），只做**定性**的概似比判讀——這才是你在現場真正會做的事。題目：同樣是「對屍體微粒假設 H 有利」的觀察，為什麼有的把後驗推得很多、有的幾乎沒推？\n\n我們拿兩筆都「看起來支持 H」的觀察來對照：\n\n```text\n═══════════════════════════════════════════════════════════════════════\n  假設 H：屍體微粒經手傳染導致產褥熱\n═══════════════════════════════════════════════════════════════════════\n\n  觀察 A（強證據）：「Kolletschka 被學生的解剖刀劃傷後，\n                    死於與產褥熱酷似的病理。」\n\n    問 1：H 為真時，會看到 A 嗎？\n         → 會，而且幾乎是 H 的直接預測。\n           （屍體微粒入血 → 同一種致命感染，不分男女病人）\n           P(A|H) 很高。\n\n    問 2：H 為假（瘴氣論）時，會看到 A 嗎？\n         → 很難。瘴氣論講的是「產房的壞空氣」，\n           完全無法解釋「一個男醫生被刀劃傷也死於同樣病理」。\n           P(A|¬H) 很低。\n\n    概似比 = P(A|H)/P(A|¬H) = 高/低 = 遠大於 1   → 強確證\n    後驗被推：先驗 0.3  ──強力──▶  後驗 0.7（舉例，定性）\n\n─────────────────────────────────────────────────────────────────────\n\n  觀察 B（弱證據）：「下洗手令那個月，剛好也是天氣轉涼的月份，\n                    而那個月死亡率低。」\n\n    問 1：H 為真時，會看到 B（涼月+低死亡率）嗎？\n         → 會。\n           P(B|H) 高。\n\n    問 2：H 為假（瘴氣論）時，會看到 B 嗎？\n         → 也會！瘴氣論正好會說「天涼空氣好、瘴氣少，所以降」。\n           這筆觀察「不管 H 真假都一樣容易出現」。\n           P(B|¬H) 也高。\n\n    概似比 = P(B|H)/P(B|¬H) = 高/高 ≈ 1         → 幾乎不確證\n    後驗被推：先驗 0.3  ──幾乎不動──▶  後驗 0.31\n\n═══════════════════════════════════════════════════════════════════════\n  關鍵對帳：\n    A 和 B 都「跟 H 一致」「看起來支持 H」。\n    但 A 強、B 弱，差別不在「是否支持」，而在「鑑別力」——\n    A 能區分「H 真 vs H 假」兩個世界，B 不能。\n    自欺發生在：你把 B 當成 A，以為自己又拿到一筆有力證據。\n═══════════════════════════════════════════════════════════════════════\n```\n\n自我複核這個推演：我宣稱 A 強、B 弱，理由都落在「P(E|¬H) 大不大」這一格——A 的 P(A|¬H) 低（瘴氣論解釋不了 Kolletschka），所以概似比大；B 的 P(B|¬H) 高（瘴氣論也能解釋涼月低死亡率），所以概似比≈1。兩個判斷都只依賴定性問「敵對假設能不能也輕鬆解釋這筆觀察」，沒有用到任何精確數字，邏輯自洽。**這個「問敵對假設能不能也解釋它」的動作，就是你帶得走的整章精華**——它比背貝氏公式有用一百倍。\n\n對照你的工作：觀察 A 像「我關掉這個 feature flag，錯誤率立刻掉，再打開又升」（這個來回切換是強鑑別力，幾乎只有「就是這個 flag」能解釋）；觀察 B 像「我重啟服務後一切正常」（弱鑑別力——重啟會掩蓋一大堆不同根因，幾乎什麼假設都能「解釋」它好了，見 ch14 的「重啟就好了」）。\n\n## 把它接回你的告警：alert fatigue 是一道貝氏算術\n\n本章還有一個直接能用的工程回報。你受夠的 **alert fatigue（告警疲勞）**，本質是一道被忽略的貝氏算術。\n\n考慮一個告警規則，它對「真的出事」這件事相當敏感。但問題從來不在敏感度，在**先驗**：\n\n```text\n  假設「此刻系統真的出事」的先驗很低（大部分時刻系統是好的）。\n  一個告警 = 一筆證據 E。\n\n  就算這個告警的概似比不錯（出事時比沒事時更容易響），\n  但先驗 P(出事) 太低時——\n\n        P(出事|告警) = 概似比 · P(出事) / 正規化\n                        └─放大有限─┘  └─起點太低─┘\n\n  → 單一告警把後驗從「極低」抬到「還是不太高」。\n  → 於是大多數告警，理性地看，後驗仍然不足以行動。\n  → 你的大腦學會了這件事，開始忽略告警 = alert fatigue。\n```\n\n這不是你懶。這是你的大腦**正確地**做了貝氏更新：在低先驗下，一筆中等鑑別力的證據不足以把後驗推過「值得半夜爬起來」的門檻。看懂這點，設計告警就有了方向——**不是讓告警更敏感（那只會更多偽陽性、先驗更稀釋），而是提高每個告警的鑑別力（概似比）**：要求多個獨立信號同時觸發（每個都是一筆證據，後驗連乘著抬）、或把告警綁在「只有真出事才會動」的高鑑別力指標上。這就是貝氏在告警設計上的全部教誨。\n\n> 跨書：這道算術「怎麼算」（含醫檢偽陽性那個經典題型，跟 alert fatigue 同構）見《馴服隨機》ch05；「理性上你**該**怎麼根據後驗下注/行動」的規範面，見《決策與理性》談理性信念更新的那章；至於「為什麼真誠的人會對自己想信的假設高估概似比、把弱證據看成強證據」的**心理機制**，那是《思考的陷阱》談確認偏誤的那章——本章只負責「貝氏在說什麼」這層結構。\n\n## 直覺的陷阱\n\n貝氏確證的直覺很滑，因為它跟「找支持證據」這個我們最自然的習慣正面衝突。以下是幾個具名陷阱。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步帶你下溝 | 怎麼自我察覺 |\n|---|---|---|---|\n| **只看 P(E\\|H)，忘了 P(E\\|¬H)** | 「這筆觀察符合我的假設，所以支持我」 | 你只問了「H 為真會看到 E 嗎」，沒問「H 為假**也會**看到 E 嗎」。若兩者都高，這證據毫無鑑別力 | 每看到一筆「支持」證據，強迫自己問：**「我的敵對假設能不能也輕鬆解釋這筆？」** 能，就是弱證據 |\n| **把「一致」當成「確證」** | 「資料跟我的理論一致，理論被確證了」 | 「一致」只是 P(E\\|H)>0；確證要的是 P(E\\|H)>P(E\\|¬H)。怎樣都對的理論跟**任何**資料都一致（ch04），所以「一致」近乎免費 | 問：有沒有**任何**觀察會跟這個理論不一致？沒有 → 它跟資料一致是廢話，零確證 |\n| **把弱證據累加成假確信** | 「我有十筆證據都支持，鐵證如山」 | 十筆概似比都≈1 的弱證據，乘起來還是≈1。十顆綠蘋果不會讓你更信烏鴉都黑 | 數的不是證據**筆數**，是每筆的**鑑別力**。一筆 Kolletschka 勝過一百筆「涼月低死亡率」 |\n| **後驗高 = 假設為真**（最危險） | 「我後驗都 0.95 了，這假設肯定對」 | 貝氏只在你**給定的候選假設裡**分配可信度。真正的答案若不在名單上（塞麥爾維斯的「微粒」vs 真相「細菌」），後驗再高也指向錯的那個 | 定期問：**「我的候選假設名單，會不會整個漏了真兇？」** 後驗高只代表「在我想到的選項裡這個最好」 |\n| **先驗 = 偏見，所以該丟掉** | 「要客觀就該無先驗、只看資料」 | 沒有先驗，貝氏跑不動；而且「無先驗」本身是個（很差的）先驗。先驗不是罪，**藏起來的先驗**才是 | 把你的先驗講出來、寫下來（「我覺得八成是 DB」）。攤開的先驗可被證據修正，藏著的先驗只會偷偷扭曲判讀 |\n\n第一個陷阱（**忘了問 P(E|¬H)**）是其中之最，因為它是「確認偏誤」在貝氏語言裡的精確形狀：我們天生只會去找「如果我對，我會看到什麼」，幾乎不會去問「如果我錯，我**也**會看到什麼」。整章若只帶走一句，就是這句：**好證據的標誌不是它支持你的假設，是它能讓你的假設和它的敵對假設分道揚鑣。**\n\n## 紙上推演\n\n以下題目純紙筆推演，不要寫程式、不要去跑任何東西。先自己想，再看解答。\n\n### 推演題\n\n**題 1（★，[10 分鐘]）烏鴉悖論的弱在哪**\n用你自己的話解釋：為什麼「看到一顆綠蘋果」在**邏輯上**確證了「所有烏鴉都是黑的」，但這個確證量趨近於零？關鍵字：對換命題、概似比、為什麼「不黑的東西」太多。\n\n**題 2（★★，[15 分鐘]）把一次故障診斷重述成「先驗→證據→後驗」**\n挑一次你真實經歷過的 incident 診斷。把它拆成三段：(a) 你看 log 前的**先驗**（嫌疑名單與大致權重）；(b) 你查到的**關鍵那一筆證據**，並判斷它對某個嫌疑的**概似比是大於、等於、還是小於 1**（理由：那筆證據在「該嫌疑為真」vs「為假」時，哪個更容易出現）；(c) 更新後的**後驗**。重點是把 (b) 的概似比判讀講清楚。\n\n**題 3（★★，[20 分鐘]）找出一筆你的「綠蘋果」**\n回想一個你曾經當成「支持我假設」的觀察，但其實它的概似比≈1（不管你假設真假都會出現它）。把它寫成 worked example 那種兩問格式：「H 為真會看到它嗎？」「H 為假**也會**看到它嗎？」如果兩個答案都是「會」，恭喜你抓到一顆自己的綠蘋果。常見場域：重啟後恢復正常、上線後「感覺變快了」、改了三個東西指標動了。\n\n### 推演解答\n\n**題 1 解答。**\n「所有烏鴉都是黑的」邏輯上等價於「所有不黑的東西都不是烏鴉」（若 P 則 Q ⟺ 若非 Q 則非 P）。所以任何確證後者的東西也確證前者；一顆「不黑、又非烏鴉」的綠蘋果就確證了後者，因此**技術上**確證了「烏鴉都黑」——這一步邏輯無懈可擊。\n\n但確證量趨近於零，用概似比看就清楚了：當你隨手撈一個「不黑的東西」來檢查，無論「烏鴉都黑」這假設真或假，這東西「不是烏鴉」的機率都≈1（因為白烏鴉就算存在，在「全宇宙不黑的東西」裡也佔比微乎其微）。概似比 ≈ 1/1 ≈ 1.0000…，所以後驗幾乎不動。**對比看一隻烏鴉是不是黑的**：H 為真時牠必黑（機率 1），H 為假時牠可能撞到白的（機率 < 1），概似比明顯 > 1，這才是有鑑別力的證據。\n\n常見錯路：(a) 以為貝氏的解法是「綠蘋果根本不算證據」——錯，貝氏**承認**它算證據，只是說它弱到趨近於零；真正出錯的是我們把「極弱」誤讀成「零」。(b) 以為這只是個邏輯遊戲、跟真實推理無關——恰恰相反，它是「我有一堆一致的觀察」這種日常自欺的純化版：一致 ≠ 有鑑別力。\n\n**題 2 解答（示範一個範本，你的具體情境自填）。**\n\n```text\n  (a) 先驗（看 log 前）：\n        DB 慢查詢 .... 0.6   下游掛 .... 0.25   GC .... 0.1   其他 .... 0.05\n\n  (b) 關鍵證據 E：「RDS CPU 全程平穩、IOPS 也沒動。」\n        對「DB 慢查詢」假設：\n          P(E | DB 慢查詢)  → 很低（DB 真慢，CPU/IOPS 該動）\n          P(E | 非 DB)      → 較高（不是 DB 的話，CPU 平很正常）\n          概似比 = 低/高 = 遠小於 1   → 強力「反對」DB 慢查詢\n\n  (c) 後驗（更新後）：\n        DB 慢查詢 .... 0.1（被砍掉一大塊）  下游掛 .... 0.6（順勢抬高）\n        ……懷疑重心從 DB 滑向下游\n```\n\n評分重點不在數字，在你能不能把 (b) 的概似比方向講出**理由**：那筆證據是「在嫌疑為真時罕見、為假時常見」（概似比 < 1，反對該嫌疑），還是反過來。常見錯路：把「沒看到 DB 異常」當成「中立、沒資訊」——錯！「該出現卻沒出現」是強反對證據（概似比小），這是 alert/log 判讀最常被浪費的一類資訊。\n\n**題 3 解答。**\n最經典的綠蘋果是「**我重啟服務，問題消失了，所以根因就是我猜的那個**」。拆開：\n\n```text\n  H = 「根因是記憶體洩漏」\n  E = 「重啟後恢復正常」\n\n  P(E | 記憶體洩漏為真) → 高（重啟清掉記憶體，當然好）\n  P(E | 記憶體洩漏為假) → 也高（重啟對「連線池耗盡」「死鎖」\n                              「某個髒快取」……幾乎全部都有效！）\n  概似比 ≈ 高/高 ≈ 1   → 對「記憶體洩漏」這個特定假設幾乎零鑑別力\n```\n\n「重啟就好了」是一顆完美的綠蘋果：它跟**幾乎所有**根因假設都一致，所以它對「分辨是哪個根因」貢獻趨近於零。你以為它確認了你的猜測，其實它只是確認了「重啟有用」這件廢話。要拿到鑑別力，你得找一筆「只有記憶體洩漏為真才會出現」的證據——比如重啟前 heap 用量單調爬升的曲線（這個瘴氣論……我是說，其他根因，解釋不了）。常見錯路：把「問題沒再出現」當成根因確認而結了 ticket，三天後它在另一台機器復發（接 ch14：有效果 ≠ 有機制）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先答「為什麼」。\n\n1. 為什麼說「一個觀察符合我的假設」幾乎不算確證？確證真正要求的是什麼？（提示：P(E|H) vs P(E|¬H)）\n2. 用一句話講：什麼是強證據、什麼是弱證據？為什麼塞麥爾維斯的 Kolletschka 觀察是強證據、「涼月死亡率低」是弱證據？\n3. 為什麼一顆綠蘋果在邏輯上「確證」了「烏鴉都黑」，卻幾乎沒抬高任何可信度？貝氏的解法是「綠蘋果不算證據」嗎？\n4. 貝氏確證如何「軟化」休謨的歸納問題？它**解決**了歸納問題嗎，還是換了個問題？那個 0.99 和 1 之間的差距代表什麼？\n5. 為什麼「我後驗都 0.95 了所以假設肯定對」是個危險的自欺？（提示：候選名單）\n6. alert fatigue 為什麼是一道理性的貝氏算術、而不是你偷懶？要降低它，該調敏感度還是調鑑別力，為什麼？\n7. 「先驗是偏見、客觀就該無先驗」錯在哪？藏起來的先驗和攤開的先驗，哪個更危險？\n8. 本章在堵哪一種自欺？（中央張力：把它跟「非黑即白」「確認偏誤」連起來講）\n\n## 延伸閱讀\n\n- **史丹佛哲學百科〈Confirmation〉**（plato.stanford.edu/entries/confirmation/）：確證理論的完整地圖，含烏鴉悖論、增量確證 vs 絕對確證之爭、舊證據問題。要看「確證該怎麼定義」各派如何吵，讀這篇（本章只取共享直覺、不裁判）。\n- **史丹佛哲學百科〈Abduction〉**（plato.stanford.edu/entries/abduction/）：把本章的貝氏確證接回 ch03 的溯因——貝氏可視為 IBE 的機率化身（從候選假設裡選後驗最高的）。讀「IBE 與貝氏的關係」那節。\n- **Michael Strevens, *Notes on Bayesian Confirmation Theory***（strevens.org/bct/BCT.pdf）：一份寫得很清楚的貝氏確證講義，把「概似比為何是確證的核心」講透。想看比本書嚴謹一級、但仍可讀的數理直覺，讀前三章。\n- **Hempel, \"Studies in the Logic of Confirmation\"（1945）**：烏鴉悖論的原始出處。讀它你會發現韓培爾自己就**接受**了這個悖論結論（並用「先備知識」解釋為何它感覺荒謬）——比後世的貝氏解法更早觸到問題核心。\n- **《馴服隨機》ch05**：貝氏定理「怎麼算」，含醫檢偽陽性那個經典題（跟本章 alert fatigue 同構）。本章刻意不算數字，要補上計算肌肉去那本。\n- **《決策與理性》談理性信念更新的那章**：本章講「證據如何更新信念」的**描述面**，那本講「理性上你**該**怎麼更新、怎麼根據後驗下注」的**規範面**。兩者合起來才完整。\n- **《思考的陷阱》談確認偏誤的那章**：本章的第一個陷阱（只問 P(E|H)、忘了 P(E|¬H)）就是確認偏誤的貝氏形狀。那本講「為什麼大腦天生這樣偏心」的心理機制，本章只負責「這個偏心在貝氏帳本上長什麼樣」。\n"}, {"id": "ch08-science-is-a-crowd", "file": "ch08-science-is-a-crowd.md", "group": "Part III — 制度與限度的防線", "title": "ch08 — 科學是一群人：典範、研究綱領、塞麥爾維斯為何被否決", "md": "# ch08 — 科學是一群人：典範、研究綱領、塞麥爾維斯為何被否決\n\n> **本章解決什麼問題**：前七章把防自欺的責任放在一個人身上——你的觀察有理論負載、你的歸納沒有保證、你的假設要可證偽、你的對照要切斷混淆、你的信念要照證據更新。但這一切都假設「一個誠實又方法正確的人，最後會被聽見」。本章戳破這個假設。防自欺的最後一道防線不是個人，是社群與制度——同儕審查、複製、公開批評；而制度本身也會失靈。我們用孔恩（Kuhn）的典範與拉卡托斯（Lakatos）的研究綱領，去解釋脊椎案最痛的一幕：一個有對照、有巨大效果的假設，被整個醫界否決了二十年。這是 Part III（制度與限度的防線）的第一章。\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道   ◄ 你在這裡\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n到目前為止，這本書一直在訓練「你一個人」。前七章的每一道防線——對「親眼看到」保持戒心、知道歸納不保真、要求可證偽、設計對照、警惕混淆、照證據更新信念——全都是裝在你腦子裡的。它們默默假設了一件事：**只要你方法夠正確、夠誠實，真相最後會贏。**\n\n這一章要告訴你：不一定。\n\n科學不是一個人在房間裡做的。它是一個有期刊、有審查、有學派、有飯碗、有面子、有政治的**社群**。一個結論要不要被接受，不只取決於它對不對，還取決於它怎麼撞上這個社群既有的整套世界觀。而我們的脊椎案，正是這件事最殘忍的展示：塞麥爾維斯做對了你前七章學的大半——他有觀察、有準隨機對照（ch05）、有戲劇性的效果、他的假設可證偽（ch04）——然後他被否決了，被否決到憂鬱、發瘋、死在精神病院。\n\n> 這是本書我認為最該停下來想十分鐘的一章。因為它逼你面對一個不舒服的事實：**「我是對的」和「我會被聽見」是兩件完全不同的事。** 前七章保證不了後者。\n\n## 從你已知的出發\n\n你提了一個新的架構提案。技術上你是對的——你跑過 benchmark、畫過容量曲線、列過 trade-off。你把它丟進 RFC，丟進 design review。\n\n然後它被擋下來了。\n\n不是因為它錯。是因為：「我們一直都是這樣做的。」「上次有人試過類似的東西，後來爆了。」「這跟我們現有的整套架構假設不合。」「現在沒人有時間 review 一個這麼大的改動。」提案它的人是你，一個還沒建立信任的新人；擋它的是一群在這套既有做法上投入了三年、KPI 綁在上面、面子也綁在上面的資深工程師。\n\n停一下。你剛剛撞上的東西，跟塞麥爾維斯 1847 年撞上的東西，**結構一模一樣**：\n\n- 你挑戰的不是某一個技術決定，是整個團隊**共享的一套背景假設**——關於「我們系統該長什麼樣」「什麼叫好設計」「什麼風險可接受」的整套世界觀。在這套世界觀裡，你的提案不只是「一個選項」，它是個**異物**。\n- 擋你的人不必是笨蛋，也不必是壞人。他們可能完全真誠。但承認你對，等於承認他們過去三年的方向有問題——這個代價，會無聲地讓他們對你的證據特別嚴苛、對自己的現狀特別寬容。\n- 而這套制度——RFC、review、「先有人試過再說」——**本來就是設計來擋掉爛提案的**。它每天擋掉一堆糟糕的設計，這是它的功能、它是好東西。問題是：同一道閘，偶爾也會擋掉一個超前的好提案。**擋掉胡說和擋掉真理，用的是同一道閘。**\n\n這就是本章的全部主題。code review 制度、RFC 制度、技術典範——它們是**社群層的防自欺機制**，比你一個人強，因為它們不信任任何單一個人的判斷。但它們有自己的失敗模式。而塞麥爾維斯案，是這個失敗模式被放大到致命的歷史標本。\n\n科學哲學給了我們兩副精準的眼鏡，去看清楚「擋掉的到底是什麼、為什麼擋、什麼時候該換馬」：孔恩的**典範**，和拉卡托斯的**研究綱領**。我們先把眼鏡配好，再回頭看塞麥爾維斯。\n\n## 第一副眼鏡：孔恩的典範——科學不是線性累積的\n\n在孔恩（Thomas Kuhn，《科學革命的結構》*The Structure of Scientific Revolutions*，1962）之前，主流圖像是「科學線性累積真理」——一磚一瓦，越疊越高，越來越接近真相。孔恩說：不對，看歷史不是這樣長的。\n\n他提出的循環是這樣（這是本書最有用的一張科哲地圖之一）：\n\n```text\n孔恩的科學變遷循環\n\n  常態科學 ──→ 異常累積 ──→ 危機 ──→ 革命（典範轉移）──→ 新常態科學 ──→ …\n  (normal      (anomalies)   (crisis)  (paradigm shift)        (new normal)\n   science)                                                        │\n      │                                                            │\n      └────── 大部分時候科學停在這裡：「解謎」、填細節 ───────────┘\n\n  典範（paradigm）＝ 一整套共享的背景假設、方法、判準、典型範例。\n  它同時是「工具箱」（給你謎題、給你解法）也是「濾鏡」（決定什麼算問題、什麼算證據）。\n```\n\n幾個要把握的概念，我用工程師聽得懂的話講：\n\n**典範（paradigm）** 不是「一個理論」，是**一整套東西**：背景假設、方法、什麼算好問題、什麼算好答案、什麼算合格的證據——外加一組「典型範例」（exemplar，大家公認「這就是好科學長的樣子」的標竿）。對應到你的世界，典範就是你團隊那套沒寫下來、但人人遵守的「我們怎麼做事」：用什麼語言、什麼架構風格、什麼叫「乾淨的程式碼」、什麼風險不能碰。\n\n**常態科學（normal science）** 是科學家絕大多數時間在做的事——在既有典範**裡面**解謎、填細節、做精密化。注意孔恩這裡有個反直覺的洞見：常態科學**不**鼓勵挑戰典範，它鼓勵在典範裡把活幹漂亮。這對應你日常 90% 的工作：在既有架構裡修 bug、加 feature、調效能，沒人在質疑架構本身。\n\n**異常（anomaly）** 是典範解不掉的麻煩謎題。一兩個異常不會動搖典範——科學家會把它擱著、當成「以後會解決的小問題」。對應你的世界：那個偶發但一直沒根除的 flaky bug，那個「理論上不該發生但每月發生一次」的怪現象。\n\n**危機（crisis）** 是異常累積到一個程度，社群對典範解謎的能力**失去信心**。\n\n**革命／典範轉移（paradigm shift）** 是整套基本概念、方法、判準被新典範取代。注意——這個詞被商業簡報濫用成「換個想法」（守住 landscape T8 的正確版）。孔恩的原意嚴格得多：是**整個框架**的革命性更替，不是漸進改良。你把 CI 從 Jenkins 換成 GitHub Actions，那不是典範轉移；那是常態科學裡換工具。真正的典範轉移是「我們對『系統該怎麼建』的整套世界觀變了」——像從單體到微服務那種級別的世界觀重置（而且連這個比喻都嫌太乾淨）。\n\n**不可共量（incommensurability）** 是孔恩最爭議、也最深的概念：新舊典範之間**沒有共同的量尺**可以中立地比較。為什麼？因為連「什麼算一個好實驗」「什麼算一個有說服力的解釋」這些**評判標準本身**，都跟著典範一起變了（這是孔恩說的方法論不可共量）。在舊典範裡算「決定性證據」的東西，到了新典範可能根本不被當回事——**反過來也是**。\n\n最後這一點，是理解塞麥爾維斯案的鑰匙。先記著它：**當塞麥爾維斯拿出他的死亡率數字，瘴氣派看著同一組數字，並不覺得那是「決定性證據」——因為在他們的典範裡，那組數字根本沒指向他們認為的病因。** 證據不是中立地擺在桌上等人接受的；它要先被典範「認得」才算數。這正是 ch02 的理論負載，現在升級到了整個社群的層級——典範系統性地塑造**一整群人**看得見什麼、把什麼當證據。\n\n> 對科學「不造神」的一刻：孔恩這套圖像有個讓人不安的暗示——科學家換典範，**不完全是被證據逼的**，有時更像一場集體的「改信」（孔恩自己用過 conversion 這種字眼）。這是科哲至今爭論不休的點：如果換典範不純粹是理性的，那科學憑什麼比別的信仰體系更可靠？我不在這裡裁判（那是延伸閱讀的活，也接 ch12）。但我要你記住：把孔恩讀成「所以科學只是流行、沒有客觀進步」是過度引申、是 landscape 警告過的濫用。孔恩本人激烈反對這種相對主義讀法。我們取它的真洞見——**社群的典範會塑造、也會阻擋對證據的接受**——而不取它被濫用的極端版本。\n\n## 第二副眼鏡：拉卡托斯的研究綱領——什麼時候該理性換馬\n\n孔恩描述了「典範會換」，但留下一個尖銳的問題沒答好：**科學家什麼時候『該』換典範？** 如果換典範只是集體改信、沒有理性判準，那科學跟趕時髦有什麼兩樣？\n\n拉卡托斯（Imre Lakatos，「科學研究綱領方法論」MSRP，約 1968–1970）就是來補這個洞的。他站在波普爾（要理性判準）和孔恩（承認核心不被單一反例擊倒）中間，搭了一座橋。他的工具是**研究綱領（research programme）**，結構是這樣：\n\n```text\n拉卡托斯的研究綱領結構\n\n   ┌──────────────────────────────────────────────┐\n   │  保護帶（protective belt）                   │\n   │  可調整的輔助假設——拿來吸收反例、保護核心    │\n   │   ┌───────────────────────────────────┐      │\n   │   │  硬核（hard core）                │      │\n   │   │  綱領的核心信念，依約定「不准動」 │      │\n   │   │  動了它＝放棄整個綱領             │      │\n   │   └───────────────────────────────────┘      │\n   └──────────────────────────────────────────────┘\n\n   負面啟發法：別去攻擊硬核，遇到反例就調保護帶。\n   正面啟發法：怎麼有計畫地改保護帶、把綱領越做越精緻。\n\n   判準（關鍵）：這個綱領是 ── 進步的 還是 退化的？\n     進步的（progressive）：硬核＋輔助假設 不斷預測「新事實」，且有些被驗證。\n     退化的（degenerating）：只忙著事後補洞、解釋已知的反例，不產生新預測、\n                            或預測一再落空。\n```\n\n這裡的洞見值得你停下來：拉卡托斯說，**「能不能吸收反例」根本不是判準**——因為任何綱領，只要肯不斷往保護帶塞輔助假設，**都能**把任何反例解釋掉（這就是 ch04 埋的杜恩–蒯因難題：反例到底打到硬核還是輔助假設，永遠有得辯）。所以「它解釋得了所有反例」既不是優點、也不是淘汰它的理由。\n\n真正的判準是**動態的、看趨勢的**：這個綱領是在**進步**還是在**退化**？\n\n- **進步的綱領**：它的核心加上輔助假設，會冒險預測**新的、之前沒人預期的事實**（novel facts），而且其中一些真的被觀察到了。它在「生」新東西。\n- **退化的綱領**：它不再產生新預測了，它只忙著**事後**修補——每出現一個反例，就臨時加一條輔助假設把它圓掉，純防守，不進攻。它在「補」舊洞。\n\n對你來說這個判準有強烈的既視感。一個**進步的**程式碼庫：你加的抽象、你引的模式，會讓「下一個沒人想到的需求」變得更好做——它在預測並支撐未來。一個**退化的**程式碼庫（典型的技術債）：每個改動都是針對眼前這個 bug 的臨時補丁，補丁上長補丁，整個系統只忙著解釋（吸收）已經出現的問題，產生不了任何新能力。**「一直打補丁、從不換核心」就是退化的研究綱領**，這個比喻精準到不像比喻。\n\n拉卡托斯的貢獻在於：他給了「何時該換馬」一個**雖不完美但理性**的判準——不是「出現了一個反例就換」（太天真，會錯殺好理論），也不是「等大家集體改信」（太隨機，孔恩的問題），而是「當你的綱領**持續退化**、而對手綱領**持續進步**，你就該換」。他誠實承認這個判準是**事後**才看得清的（你很難在當下就斷定一個綱領「死了」），但這已經比沒有判準好太多。\n\n> 誠實標示嚴謹度：波普爾（一個反例就該放棄）、孔恩（換典範近乎集體改信）、拉卡托斯（看進步 vs 退化的趨勢）三個人對「科學社群該怎麼換理論」給了三套不同答案。**科哲至今沒有定論，我不裁判誰對。** 我給你的是三副眼鏡、三個立場、三組代表人物——你自己拿去看世界。這份「不給假確定」本身，就是本書誠實的一部分。\n\n## 把眼鏡戴上：塞麥爾維斯為何被否決（脊椎透鏡）\n\n好。兩副眼鏡配好了。現在把它們戴上，重看脊椎案——這一次，我們不問「他對不對」（他對，後來細菌說平反了他），我們問一個更難、更重要的問題：**一個有對照、有巨大效果、假設又可證偽的人，為什麼會被整個醫界否決二十年？**\n\n先把史實底座釘住（照本書事實基準表，並經本章獨立查證）。塞麥爾維斯（Ignaz Semmelweis，1818–1865）1847 年從 Kolletschka 之死溯因（ch03）出「屍體微粒經手傳染」假設，下了氯化石灰洗手令，第一病房死亡率劇降——**1846 全年約 13% → 1848 全年降到 1.27%**（同年第二病房 1.33%，兩病房幾乎拉平）。效果是真的、巨大的、可複製的。然後他被否決，1865 年死在維也納精神病院，死於敗血症——諷刺地與產褥熱同類的血液感染。細菌致病說（Pasteur/Koch，1860s–1880s 才立起）確立後，他才被平反。\n\n> 守住誠實版（landscape T9／T11）：別把他寫成「發現細菌的英雄」。他**沒有**細菌理論。他有效果、沒機制。而且——順帶把 ch09 會展開的那個誠實提醒先埋下——常見的「他讓死亡率從 18% 降到 1%」這種講法其實偷用了「1847 年 4 月單月峰值 18.27%」去對比「1848 全年 1.27%」，那是拿挑選過的單月去誇大效果。誠實版用同期兩病房對照（每千人版 98.4‰ vs 36.2‰）或全年 vs 全年（1846 約 13% → 1848 約 1.27%）。效果本來就夠戲劇，不需要作弊。連一個防自欺的脊椎案，都可能被人不自覺地挑數字誇大——記住這件事。\n\n現在用孔恩和拉卡托斯來解剖「為什麼被否決」。關鍵的方法論教訓是：**這不是一個單一原因，更不是「醫師太笨太傲慢」這種道德故事。** 它是多個原因疊在一起（landscape 明確要求呈現多因、別簡化）。我把它拆成三層——這也是本章的 worked example。\n\n```text\n塞麥爾維斯被否決：三層分析\n\n═══════════════════════════════════════════════════════════════════\n 透鏡         診斷的層級        塞麥爾維斯案在這一層發生了什麼\n═══════════════════════════════════════════════════════════════════\n 波普爾       假設層            他的假設「可證偽」嗎？—— 是。\n (可證偽,     「這個主張本身    「若洗手後死亡率不降，假設就垮」——\n  ch04)        在科學上合格嗎」  他冒了風險、做了預測、預測應驗了。\n                                 ✅ 在這一層，他「做對了」。\n                                    所以光看假設，挑不出毛病。\n───────────────────────────────────────────────────────────────────\n 孔恩         典範層            他挑戰的不只是「一個假設」——\n (典範,       「他撞上了整套    他撞上整個「瘴氣／體液失衡」典範。\n  1962)        什麼世界觀」      在那個典範裡，病由「壞空氣」生，\n                                 不由「醫師的手」傳。他的數字在\n                                 瘴氣典範的濾鏡下，根本不被「認得」\n                                 為指向手部污染的證據（不可共量）。\n                                 ❌ 證據要先被典範認得才算數——\n                                    他的證據在舊典範裡是「看不見」的。\n───────────────────────────────────────────────────────────────────\n 拉卡托斯     綱領層            他的綱領「進步」還是「退化」？\n (進步 vs     「他能不能把對手  ——他效果驚人，但他「說不出為什麼」\n  退化,        逼到退化」        （無機制）。沒有機制，他無法用一套\n  1968-70)                       理論去「預測新事實」、去把瘴氣綱領\n                                 逼成「只忙著補洞」。\n                                 ⚠ 他贏在數據，輸在「綱領的進攻力」——\n                                    缺機制讓他無法把對手逼進退化。\n═══════════════════════════════════════════════════════════════════\n ＋ 人事層（非方法論，但真實且關鍵，別假裝它不存在）：\n    • 機制缺失：無細菌理論，無法回答「為什麼有效」。\n    • 發表遲緩：拖了約 14 年才寫成書，且書中充滿對同行的人身攻擊。\n    • 性情與政治：與上司 Klein 衝突；1848–49 維也納政治動盪中\n      他的匈牙利背景與政治立場增加了職場阻力，1849 被解職。\n    • 冒犯性：他的主張＝「是你們的手害死了產婦」——一個讓人\n      情緒上極難接受的指控（這一半屬動機性推理，主體留給 ch11，\n      心理機制指向《思考的陷阱》）。\n───────────────────────────────────────────────────────────────────\n 注意：近年也有史家（landscape 待考 #6）為他翻案，認為傳統\n 「性格缺陷」敘事被誇大、他更像「被體制 harassment 的受害者」。\n 真相多半是上述各因交織。別收斂成單一道德故事。\n═══════════════════════════════════════════════════════════════════\n```\n\n慢慢讀這張表，因為它是本章的核心。逐層說：\n\n**假設層（波普爾）：他做對了。** 純看「他的主張是不是科學」，挑不出毛病。可證偽、冒了風險、預測應驗。如果科學真的像 ch04 那麼乾淨——好假設自動勝出——他 1848 年就該封聖。但科學不是只在這一層運作。\n\n**典範層（孔恩）：他撞上了整套世界觀。** 這是最關鍵、也最反直覺的一層。瘴氣派看著他的死亡率數字，**並不覺得那是反駁瘴氣論的證據**。為什麼？因為在他們的典範裡，產褥熱由「壞空氣／體液失衡」生。一組「醫師病房比助產士病房死得多」的數字，在瘴氣濾鏡下會被解釋成「醫師病房通風差」「醫師病房病人體質差」之類——數字沒被當成指向「手部污染」的證據。這正是 ch02 理論負載升級到社群層：**整個社群的典範，系統性地決定了一組數字算不算證據、算哪種證據。** 塞麥爾維斯不是輸在「數據不夠」，他是輸在「他的數據在對方的典範裡看不見」。\n\n**綱領層（拉卡托斯）：他贏在數據、輸在進攻力。** 這一層解釋了他為什麼**沒能把瘴氣論逼退**。拉卡托斯說，你要淘汰一個綱領，靠的是你的綱領**進步**（產生新預測、預測應驗）而對手**退化**（只忙補洞）。塞麥爾維斯有驚人的效果，但他**沒有機制**——他說不出「為什麼屍體微粒會致病」。沒有機制理論，他就沒有一台「預測新事實」的引擎，無法主動逼出瘴氣論解釋不了的新現象、把瘴氣論逼進「只忙著事後補洞」的退化狀態。他只能反覆指著同一組死亡率說「你看，有效」。在拉卡托斯的眼裡，**這是一場僵局，不是一場勝利**——而僵局裡，既有典範靠慣性贏。（這條缺機制的線，是 ch14「機制之必要」的主菜。）\n\n**人事層：別假裝它不存在。** 純科哲分析會讓你以為科學是在真空裡進行的。不是。他發表拖了約 14 年、書裡充滿人身攻擊、跟上司 Klein 鬧翻、捲進 1848–49 的維也納政治、匈牙利背景在那個時間點是負債、性情讓盟友也離他而去。這些**不是**方法論失誤，但它們**真實地**決定了他的證據有沒有機會被公平聽見。誠實的科學圖像必須承認：制度是由帶著面子、飯碗、情緒、政治的人組成的，而「是你們害死病人」這種指控，在情緒上幾乎不可能被從容接受。\n\n把四層加起來，你得到本章最重要的領悟：\n\n> 塞麥爾維斯案不是「一個天才被一群笨蛋壓制」的故事。是一個**有效果、無機制、撞上既有典範、又不擅長制度政治**的人，撞上了一套**本來就設計來抗拒輕率改變**的社群機制。那套機制每天擋掉大量胡說——這是它的功能。它偶爾也擋掉真理——這是它的代價。**擋胡說和擋真理，用的是同一道閘。** 這就是制度防線的雙面性。\n\n## 制度防線的雙面性：它擋掉很多胡說，偶爾也擋掉真理\n\n我要把上一段那句話單獨拎出來講，因為它是本章對「中央張力」的回答。\n\n回顧一下中央張力：**科學不是證明真理，是有系統地把自己被騙的機會壓到最低。** 那本章講的這套制度——同儕審查、複製要求、公開批評、典範的慣性——到底在堵哪一種自欺？\n\n它堵的是**個人的自欺**。一個人會被自己的聰明、自己的執著、自己的動機性推理騙到（這正是前七章防不住的那一半，主體在 ch11）。社群制度的設計哲學是：**不信任任何單一個人。** 你說你的療法有效？拿去複製。你說你的理論對？接受公開批評。你覺得你很客觀？那正是該警惕的時候。整套制度的前提是「人會自欺」，所以它把判斷權從個人手上拿走，分散到社群、複製、審查裡。**這是比個人理性強得多的防自欺機制。**\n\n但——這是本章的張力——**同一套機制，也是新的自欺管道**。\n\n```text\n制度防線的雙面性（同一道閘的兩面）\n\n   防自欺的一面                      新自欺管道的一面\n  ──────────────────────────────  ──────────────────────────────\n   同儕審查擋掉沒根據的主張     ⟷   也擋掉超前的、挑戰典範的好主張\n   典範提供共享標準、讓協作可能 ⟷   也讓整群人系統性地「看不見」異常\n   複製要求過濾掉僥倖的結果     ⟷   （ch09 才展開：複製本身也會被忽視）\n   「先有人試過再說」的保守     ⟷   也讓真正的創新背上過高的舉證責任\n   社群共識代表多人的判斷       ⟷   也可能是互相抄的回音室（ch15 展開）\n```\n\n注意這不是要你「所以別信制度」。恰恰相反。塞麥爾維斯案之所以**有名**，正是因為它**罕見**——絕大多數被同儕審查擋下來的東西，真的就是該被擋的爛東西。倖存者偏誤會讓你只記得「被壓制的天才」，而忘記制度每天擋掉的那一萬個被壓制的蠢蛋。**「共識通常對、偶爾災難性地錯」這個拿捏，是 ch15 的主題**；本章只要你先記住雙面性本身：制度防線比個人強，但它有它自己的失敗模式，而這個失敗模式，就藏在「它擋胡說和擋真理用的是同一道閘」這件事裡。\n\n對你工程師的世界，這個雙面性天天上演。code review 與 RFC 制度擋掉了海量爛設計——這是它存在的理由，沒有它你的 codebase 會是地獄。但同一套制度，偶爾也擋掉一個超前團隊認知的好設計，或讓一個挑戰「我們一向怎麼做」的提案背上不成比例的舉證責任。**新人提案被擋，多數時候是提案真的不夠成熟（制度在做對的事）；少數時候是提案太超前、撞了團隊的典範（制度在付它的代價）。** 而最難的是——**在當下你往往分不清自己是哪一種**。這份「分不清」，就是制度防線誠實的代價。\n\n## 直覺的陷阱\n\n這一章的概念，是被商業簡報和勵志故事糟蹋得最嚴重的科哲領域。守住正確版。\n\n```text\n陷阱 #1（具名）：「典範轉移」＝「換個想法／任何觀念更新」  ← landscape T8\n  錯誤直覺：把每一次小改良、每一個新點子都叫「典範轉移」，\n            這個詞被通膨到沒有意義（PPT 重災區）。\n  下溝的那一步：把孔恩「整個框架的革命性更替＋新舊不可共量」\n            偷換成「我們換個做法」。\n  正確版：典範轉移是常態科學累積異常到危機後、整套基本概念／\n            方法／判準被新典範取代，且新舊可能不可共量。\n            日常的漸進改良不是典範轉移。你換個 CI 工具不是，\n            你重構一個模組不是。\n  怎麼自我察覺：問「評判好壞的『標準本身』變了嗎？」——\n            若標準沒變、只是換了個選項，那就不是典範轉移。\n\n陷阱 #2：「塞麥爾維斯被否決＝那群醫師又笨又壞」\n  錯誤直覺：把它讀成天才 vs 蠢蛋的道德劇，自己站在天才這邊\n            感覺良好。\n  下溝的那一步：忽略「無機制、撞典範、發表遲緩、政治、冒犯性」\n            是多因交織，收斂成單一道德故事。\n  正確版：是有效果無機制的人，撞上本就抗拒輕率改變的制度。\n            那制度每天擋掉的多半真的是該擋的。別讓倖存者偏誤\n            騙你以為「被壓制＝必是真理」。\n  怎麼自我察覺：問「如果我是當時的醫師、手上只有他那些（無機制的）\n            證據，我真的會立刻改信嗎？」誠實作答，多半不會。\n\n陷阱 #3：「孔恩證明了科學只是流行、沒有客觀進步」\n  錯誤直覺：把不可共量讀成相對主義——「反正典範說了算，\n            科學跟信仰沒兩樣」。\n  下溝的那一步：把「典範會塑造對證據的接受」誇大成\n            「證據完全不重要、純粹社會建構」。\n  正確版：孔恩本人激烈反對這種相對主義讀法。典範塑造接受，\n            不等於證據不算數。這是過度引申、是 landscape 警告的濫用。\n  怎麼自我察覺：問「我是在說『社群會影響接受』（對），\n            還是在說『所以怎樣都行、沒有更好的理論』（過頭了）？」\n\n陷阱 #4：「能解釋所有反例的理論最強」\n  錯誤直覺：以為一個理論「什麼都能解釋」是優點。\n  下溝的那一步：忘了拉卡托斯的洞見——任何綱領肯往保護帶塞\n            輔助假設都能吸收任何反例（杜恩–蒯因，ch04）。\n  正確版：判準不是「能不能吸收反例」，是「進步還是退化」——\n            它在預測『新事實』，還是只忙著事後補洞？\n            一個只會事後解釋、不冒新預測的理論，是退化的，不是強的。\n  怎麼自我察覺：問「這個理論做過什麼『冒風險的新預測』並應驗了嗎？\n            還是它只會在事情發生後跟我說『看吧我早料到』？」\n```\n\n## 紙上推演\n\n全程紙筆，不必碰鍵盤。寫下來逼自己把直覺講清楚——講不出來就是還沒懂。\n\n### 推演題\n\n**題 1（★★）[15 分鐘]：退化的研究綱領 vs 退化的舊系統。**\n拿一個你親手維護過、「一直打補丁、從不換核心」的舊系統。把拉卡托斯的「進步 vs 退化」判準套上去：(a) 這個系統的「硬核」是什麼（哪些核心假設大家默契地不准動）？(b) 它的「保護帶」是什麼（哪些是為了圓掉一個個 bug／需求而疊上去的臨時輔助層）？(c) 用「它有沒有在產生新能力 vs 只忙著補既有的洞」判定它進步還是退化。(d) 進一步：你「該換馬」（重寫／換架構）了嗎？拉卡托斯的判準會怎麼建議、它的判準在這裡為什麼也**不**給你乾淨的答案？\n\n**題 2（★★）[15 分鐘]：你提案被擋——是制度在做對的事，還是在付代價？**\n回想一次你的技術提案被 review／RFC 擋下來的經驗。用本章的「制度雙面性」拆解：(a) 擋你的人撞上的是「一個技術理由」還是「整個團隊的典範（共享世界觀）」？(b) 用「常態科學 vs 異常」判斷：你的提案是在現有典範裡的優化，還是一個挑戰典範的異物？(c) 最難的一題：你**當下**分得清自己是「提案不夠成熟（制度在做對的事）」還是「提案太超前（制度在付代價）」嗎？如果分不清，這說明了什麼？\n\n**題 3（★★★）[25 分鐘]：替瘴氣派辯護，再拆穿你自己。**\n這題要你**站到對立面**。假設你是 1848 年一個真誠、聰明、方法嚴謹的瘴氣派醫師，手上只有塞麥爾維斯給的證據（一組死亡率數字＋洗手後下降，**但他說不出機制**）。(a) 用你學過的工具（混淆變因 ch06、可證偽 ch04），列出三個你**理性上**可以對塞麥爾維斯提出的合理質疑（提示：洗手以外還改了什麼？效果是不是疫情自然消退的巧合？無機制的相關憑什麼信？）。(b) 現在切換回 2026：這三個質疑裡，哪些是「合理的科學審慎」、哪些其實是「動機性推理在替典範護航」？你怎麼分辨？(c) 收束：這題想讓你體會什麼——為什麼「他明明是對的卻被否決」其實**比你以為的更可以理解**？\n\n### 推演解答\n\n**題 1 解答。**\n(a) 硬核：通常是那些「重寫成本高到沒人敢碰、於是被默契保護起來」的核心——某個中央資料模型、某個貫穿全系統的假設（如「所有請求都同步」「狀態都在這張表」）、某個沒人完整理解但拔掉會全垮的模組。它對應拉卡托斯的硬核：依約定不准動，動了等於放棄整個系統。\n(b) 保護帶：那些一層層疊上去、為了讓硬核在新需求下還能運作的東西——adapter、特例分支、`if (legacy) {...}`、繞過核心限制的 workaround。每一層當初都是為了「圓掉」一個具體反例（一個 bug、一個硬核擋不了的新需求）。\n(c) 判定：問「最近半年，這個系統的改動是讓**未來**的需求更好做（進步），還是每個改動都只在補眼前這個洞、而且補丁讓下一個改動更難（退化）？」後者就是退化的綱領——它只忙著事後吸收問題，產生不了新能力。\n(d) 拉卡托斯會說：當你的舊綱領持續退化、而「重寫」這個新綱領看起來能進步（產生新能力），就該換。但他也誠實承認**這只能事後看清**——你很難在當下就斷定舊系統「死透了」、新方案「一定進步」。常見錯路：以為「退化」就等於「立刻該重寫」。不是。退化是一個趨勢診斷、不是一個即時行動指令；重寫有它自己巨大的風險（你可能換一個更快退化的新綱領）。這道「沒有乾淨答案」正是拉卡托斯判準誠實的地方——它給你看趨勢的眼睛，不給你免責的決策。\n\n**題 2 解答。**\n(a) 區分的線索：如果擋你的理由是「這個具體做法在這個具體場景有 X 問題」，那是技術理由（好的、該聽的）。如果理由是「我們一直不這樣做」「這跟我們整套架構哲學不合」「這不是我們的風格」——你撞上的是典範（共享世界觀），不是單一技術點。\n(b) 常態科學裡的優化（在既有架構裡調效能、加 feature）阻力小；挑戰典範的異物（換掉大家共享的架構假設）阻力大，且阻力**不**主要來自技術，來自「它要求大家重新評估投入了多年的方向」。\n(c) 最難的一題：你**當下**多半分不清。因為判斷「我的提案是超前還是不成熟」需要的正是你還沒有的東西——未來的證據、團隊建立對你的信任、時間。這說明了制度防線最深的代價：**它的失敗模式（擋掉好提案）在當下無法與它的正常功能（擋掉爛提案）區分**。誠實的態度不是「所以制度都是壓迫」，而是「我把提案做到證據更硬、把溝通做到更不冒犯、降低制度誤殺我的機率」——這正是塞麥爾維斯欠缺、而 ch17 會教你補的。\n\n**題 3 解答。**\n(a) 三個理性質疑：①**混淆變因（ch06）**——洗手令前後，醫院是不是同時還改了別的（通風、病房擁擠度、人手、病人組成）？「醫師組死得多」會不會混淆於「醫師組病人本來就更重症」？②**疫情自然消退的巧合**——產褥熱有流行性，死亡率下降會不會剛好是疫情自然退潮，跟洗手無關（這正是當時真實的反駁之一）？③**無機制的相關憑什麼信**——你給我一個相關，卻說不出「屍體微粒怎麼致病」的機制；在沒有機制的情況下，我憑什麼把一個相關升級成因果並改掉整套臨床慣例？\n(b) 切回 2026：質疑 ①② 是**合理的科學審慎**——它們正是 ch05/ch06 教你該問的（控制變因、排除巧合）。塞麥爾維斯的準隨機分組（單雙日交替）其實**頗能回應**它們，但當時的人沒有「隨機化能切斷混淆」這個觀念工具。質疑 ③「無機制就不信」則是**灰色地帶**：要求機制本身是合理的（ch14 會講機制的真實價值），但**把「沒機制」當成拒絕一個有強對照、強效果之介入的鍘刀**，就滑向了動機性推理替典範護航——尤其當「承認他對＝承認我害死了產婦」時。分辨的線索：一個真誠的質疑者，會在**對照夠強時願意先採用介入、同時繼續找機制**；一個護航典範的人，會把「沒機制」當成永遠不採用的免死金牌。\n(c) 收束：這題想讓你體會——**「他明明是對的卻被否決」比你以為的更可以理解、也更可怕**。可以理解，是因為他確實缺機制、確實有合理的科學質疑可提、制度確實在執行它「抗拒輕率改變」的正常功能。更可怕，也正在這裡：**如果連一個有強對照、強效果的真理，都可能因為「缺機制＋撞典範＋制度慣性」而被否決二十年，那你怎麼知道此刻有沒有一個對的東西，正在你的團隊裡被同樣的機制無聲地擋著？** 常見錯路：把這題做成「所以別信制度／別信共識」。錯。正確的帶走是：制度防線值得信任（它多半在做對的事），但要對「它偶爾用同一道閘擋掉真理」保持清醒——這份清醒，不是反制度，是更成熟地用制度。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關。優先回答「為什麼」。\n\n1. 為什麼說「我是對的」和「我會被聽見」是兩件完全不同的事？前七章保證了哪一個、保證不了哪一個？\n2. 孔恩的「典範」為什麼不只是「一個理論」？它同時是工具箱也是濾鏡——這兩個角色各對應你團隊的什麼？\n3. 為什麼「典範轉移」這個詞被濫用了？孔恩的原意嚴格在哪裡？舉一個你工作中**不是**典範轉移、卻常被誤稱為典範轉移的例子。\n4. 拉卡托斯說「能吸收所有反例」不是優點。為什麼？那真正的判準（進步 vs 退化）是什麼？用它判斷你的舊系統一次。\n5. 把塞麥爾維斯被否決拆成假設層／典範層／綱領層／人事層——每一層分別發生了什麼？為什麼**不能**收斂成「醫師太笨」這個單一故事？\n6. 「制度防線擋胡說和擋真理，用的是同一道閘」——這句話為什麼是本章對中央張力（科學＝系統化防自欺）的回答？這套制度堵的是哪一種自欺、它自己新開了哪一條自欺管道？\n7. 為什麼塞麥爾維斯案的「有名」，本身就是「它罕見」的證據？倖存者偏誤在這裡會怎麼騙你？\n8. 你**當下**分得清自己被擋的提案是「不夠成熟」還是「太超前」嗎？分不清這件事，揭露了制度防線的什麼代價？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Thomas Kuhn\"**（https://plato.stanford.edu/entries/thomas-kuhn/）。典範、常態科學、不可共量的權威條目；特別讀「incommensurability」一節，搞清楚孔恩**反對**相對主義讀法這件事，能讓你避開陷阱 #3。\n- **Stanford Encyclopedia of Philosophy, \"Imre Lakatos\"**（https://plato.stanford.edu/entries/lakatos/）。研究綱領、硬核／保護帶、進步 vs 退化的權威來源；想把「退化的舊系統」這個比喻用準，讀「methodology of scientific research programmes」一節。\n- **Aeon, \"Imre Lakatos and the philosophy of bad science\"**（https://aeon.co/essays/imre-lakatos-and-the-philosophy-of-bad-science）。比 SEP 好讀的長文，把「進步 vs 退化」放進真實科學爭議裡講，適合先讀它建立直覺再回 SEP。（2026-06 連結有效）\n- **Hempel 與塞麥爾維斯案：PMC, \"Theory of scientific investigation by Hempel and a case of Semmelweis\"**（https://pmc.ncbi.nlm.nih.gov/articles/PMC5749055/）。看科學哲學界怎麼用這個案子當教科書範例，順帶確認本書脊椎選擇的正當性。\n- **\"Ignaz Semmelweis: a victim of harassment?\"（PMC）**（https://www.ncbi.nlm.nih.gov/pmc/articles/PMC7476981/）。為塞麥爾維斯翻案的史學視角，質疑傳統「性格缺陷」敘事——讀它來守住「多因交織、別簡化成單一道德故事」的誠實版（landscape 待考 #6）。\n- **Britannica, \"Ignaz Semmelweis\"**（https://www.britannica.com/biography/Ignaz-Semmelweis）。穩健的傳記事實核對（年份、政治背景、解職），當查證底座用。\n- 跨書：個人為何對證據如此偏心、瘴氣派否決他有多少是動機性推理在作祟——這些**心理機制**指向《思考的陷阱》談確認偏誤／動機性推理的那章（本章只講「科學作為制度怎麼防」，不展開心理）。理性上「該」怎麼面對挑戰既有信念的證據，指向《決策與理性》談理性信念更新的那章。\n"}, {"id": "ch09-p-value-betrayal", "file": "ch09-p-value-betrayal.md", "group": "Part III — 制度與限度的防線", "title": "ch09 — p 值與它的背叛：顯著、p-hacking、再現性危機", "md": "# ch09 — p 值與它的背叛：顯著、p-hacking、再現性危機\n\n> **本章解決什麼問題**：ch08 講了科學作為社群的制度防線——同儕審查、複製、典範。但這一整套制度有一個共用的量化判官：統計顯著（statistical significance）。一個結果「顯著」了，期刊才登、社群才信。本章拆開這個判官，問三件事：p 值到底在說什麼（與**不在**說什麼）？為什麼真誠的研究者也會在不自知的情況下把偽陽率灌爆（p-hacking）？2015 年那場再現性危機（reproducibility crisis）到底揭露了什麼？這是 Part III「制度與限度」的中段——統計是科學最強的防騙工具，**同時也是最滑的自欺管道**。下一章 ch10 收束 Part III，談科學的真與數學的真。\n\n## 從你已知的出發\n\n你跑過 A/B test。新版結帳流程上線，你把使用者隨機分流，盯著轉換率看。\n\n第三天，實驗組轉換率比對照組高了 0.8 個百分點，儀表板上跳出綠色的「statistically significant, p < 0.05」。你心裡一鬆：成了，發版。\n\n停。我想讓你先回憶兩件你大概都幹過、而且當下覺得完全合理的事。\n\n**第一件：偷看（peeking）。** 實驗沒到預定樣本量，但你每天早上開儀表板看一眼。第一天沒顯著，第二天沒顯著，第三天——顯著了！你停下實驗、宣布勝利。這個動作感覺像「我只是在監控進度」，但它在統計上是**作弊**。原因等下細講，先記住結論：一邊跑一邊看、達標就停，會把你名目上 5% 的偽陽率推到遠高於 5%。你不是在觀察真相,你是在**等隨機波動剛好對你有利的那一刻按下快門**。\n\n**第二件：撈指標。** 你的 dashboard 上不只一個指標——轉換率、客單價、跳出率、P95 延遲、退貨率、客訴數……你同時盯著十幾二十個。只要**任何一個**翻綠，你就有故事可講:「新版雖然轉換率沒動，但客單價顯著提升了!」這感覺像「全面評估」，其實是**多重比較（multiple comparisons）**——同時測夠多指標,總有一個會「顯著」,純靠運氣。\n\n這兩件事——偷看、撈指標——就是這一章的主角 **p-hacking** 的工程版。而最讓我背脊發涼的一點是：**做這兩件事的你，沒有一秒覺得自己在造假。** 你是個誠實的工程師，你只是在「監控」「全面評估」。p-hacking 最可怕的地方不是壞人故意騙人，是**好人不自知地騙了自己**——這正是本書中央張力的最尖銳版本：科學（和它的工程表親 A/B test）不是在防壞人造假，是在防**真誠的你**被自己的自由度給騙了。\n\n本章給你三樣東西：p 值真正在說什麼（戳破「95% 為真」這個全民誤解）、p-hacking 為何防不勝防、以及一整個學科照鏡子後發現三分之二的結果複製不出來時發生了什麼。\n\n## p 值到底在說什麼：先把那句口號背對\n\n先處理全書最普遍、最頑固的一個誤解。請你誠實回答：「p < 0.05」是什麼意思？\n\n如果你腦中浮出的是「**結果有 95% 的機率為真**」或「**虛無假設只有 5% 的機率為真**」——恭喜，你和地球上大多數受過科學訓練的人犯同一個錯。這個錯如此普遍，2016 年美國統計學會（American Statistical Association, ASA）受不了，正式發了一份聲明來糾正它（2026-06：ASA 2016 聲明仍是這領域的權威參照，下詳）。\n\np 值的正確口語定義，請你逐字記住，因為它和直覺版**差很多**：\n\n```text\np 值 = 「若虛無假設為真，得到此等或更極端資料的機率」\n\n       P( 此等或更極端的資料 | 虛無假設為真 )\n                              ↑\n                    注意條件方向：是「假設真 → 資料」\n                    不是「資料 → 假設真」\n\n  虛無假設（null hypothesis, H₀）= 「沒有效果」的那個無聊假設\n     （新版本沒用、藥沒效、兩組沒差）\n\n  p 小 = 「如果真的沒效果，我這組資料會這麼極端，挺意外的」\n       → 於是我們傾向拒絕「沒效果」這個假設\n\n  p 大 = 「如果真的沒效果，這種資料也不稀奇」\n       → 沒理由拒絕「沒效果」\n```\n\n關鍵在那個**條件方向**。p 值給你的是 P(資料 | 假設沒效果)——「假定沒效果，看到這種資料的機率」。你**想要**的卻是 P(假設有效果 | 資料)——「看到這種資料，有效果的機率」。這兩個是**不同的東西**，而且把它們對調，是一個有名字的邏輯錯誤。\n\n用一個你熟的類比。告警（alert）響了。你想知道的是 P(真的出事 | 告警響)。但告警系統的設計參數是 P(告警響 | 沒出事)——「沒出事時，告警誤響的機率」（這是誤警率）。這兩個天差地遠：一個「沒事時只有 5% 誤響」的告警，在一個幾乎從不出事的系統裡，**響的時候多半還是假警報**。為什麼？因為要把 P(出事|響) 算出來，你還需要**先驗**——這系統本來多容易出事。p 值裡**完全沒有這個先驗**。它只告訴你 P(資料|沒效果)，絕口不提「這個效果本來有多可能存在」。\n\n```text\n你以為 p 值給你的         p 值實際給你的\n───────────────────────   ───────────────────────\nP(假設為真 | 資料)         P(資料這麼極端 | 假設沒效果)\n= 「結果為真的機率」        = 一個條件機率，條件是「沒效果」\n\n要從右邊算到左邊，需要：\n  • 先驗 P(假設為真)         ← p 值裡沒有\n  • 貝氏定理                 ← 那是另一套運算（見《馴服隨機》談貝氏定理那章）\n\n把右邊當左邊讀 = 檢察官謬誤（prosecutor's fallacy）的統計版\n   （把 P(證據|無辜) 當成 P(無辜|證據)）\n```\n\n所以「p < 0.05」**不是**「95% 為真」。它是：「如果這東西其實沒效果，那我手上這份資料（或更誇張的）純靠運氣冒出來的機率不到 5%。」這是一個關於「資料有多意外」的陳述，不是關於「假設有多可能真」的陳述。要跨到後者，你需要先驗，需要貝氏更新——那整套機率機制是《馴服隨機》的活兒（見《馴服隨機》談貝氏定理與假設檢定的那章），本書只負責讓你**守住 p 值在說什麼**這條線。\n\nASA 2016 那份聲明，講白話就是六句提醒，我挑最該記的幾條（2026-06，照聲明原文大意）：\n\n```text\nASA 2016 對 p 值的提醒（節選大意）\n─────────────────────────────────────────\n1. p 值能指出「資料與某個統計模型有多不相容」。\n2. p 值【不】衡量「研究假設為真的機率」，也不衡量\n   「資料純由隨機產生的機率」。      ← 戳破「95% 為真」\n3. 科學結論不該只憑「p 是否跨過某門檻」來下。\n4. 正確的推論需要完整報告與透明（不能只報你挑出來的）。\n5. p 值【不】衡量效果大小，也不衡量結果的重要性。\n6. p 值本身，不是「某假設成立的證據」的好量度。\n─────────────────────────────────────────\n一句總結（Wasserstein 的話，大意）：\n「p 值從來就不該拿來取代科學推理。」\n```\n\n第 5 條值得單獨停一下，因為它咬到工程師的痛點：**顯著 ≠ 重要**。你的 A/B test 樣本夠大時，0.01% 的轉換率提升也能「顯著」——p 值會亮綠燈，但這個提升小到不值得你為它維護一條新的程式碼路徑。p 值回答「這差異像不像是運氣」，**不回答**「這差異大不大、值不值得」。把「顯著」讀成「重要」，是另一個和「95% 為真」並列的全民誤解。\n\n## p-hacking：為什麼真誠的人也會挖到假寶\n\n現在進入本章最反直覺、也最該讓你不安的部分。\n\n假設你是個百分之百誠實的研究者。你不偽造任何一個數據點。你只是在分析過程中，做了一連串**每一步看起來都合理**的決定。我來證明：光是這些「合理的決定」，就能把你的偽陽率從名目的 5% 推到嚇人的高度。\n\n這就是 **p-hacking**，學術奠基文是 Simmons、Nelson、Simonsohn 三人 2011 年的〈False-Positive Psychology〉（2026-06，照 landscape 查證）。他們造了一個詞叫**研究者自由度（researcher degrees of freedom）**——研究過程中你能做的、看似無害的選擇：\n\n```text\n研究者自由度（每個都「合理」，合起來是災難）\n────────────────────────────────────────────────\n① 多測幾個依變數    同時量轉換率、客單價、停留時間……\n                    哪個顯著報哪個\n\n② 看資料決定停收   一邊收樣本一邊看 p，\n   （= 偷看 peeking）  顯著了就停、沒顯著就「再收一點」\n\n③ 加/減共變數      「控制一下年齡」「咦控制了反而不顯著，那不控制」\n\n④ 選報子集合       三個實驗條件，報那兩個有差的，\n                    第三個「設計有瑕疵」先擱著\n────────────────────────────────────────────────\n單獨看，每一個都有「正當理由」。\n合起來：實際偽陽率遠超 5%\n        （Simmons 等示範可推到 60% 以上）\n```\n\n注意 Simmons 等人論文標題那半句——「Undisclosed flexibility in data collection and analysis allows presenting **anything** as significant」（未揭露的彈性讓你能把**任何東西**呈現成顯著的）。他們真的做了示範：用這些自由度，他們「證明」了聽某首披頭四的歌會讓人**變年輕**——不是覺得年輕，是出生日期上變年輕，一個物理上不可能的結論，照樣 p < 0.05。\n\n為什麼這麼狠？讓我用工程師最熟的那條自由度——**偷看**——把數學攤開給你看。\n\n### worked example：偷看與多重比較，為什麼必然灌爆偽陽率\n\n先講多重比較，因為它的算術最乾淨，而且和你「同時盯二十個指標」的習慣一模一樣。\n\n```text\n情境：你同時測 20 個【其實都沒效果】的指標。\n     對每一個，你用 p < 0.05 當「顯著」門檻。\n\n對【單獨一個】沒效果的指標：\n  它「偶然顯著」的機率 = 0.05    （這正是 0.05 門檻的定義：\n                                  真沒效果時，5% 的機率會誤判顯著）\n  它「不偶然顯著」的機率 = 0.95\n\n對【20 個都沒效果且互相獨立】的指標：\n  全部 20 個都【不】顯著的機率\n     = 0.95 × 0.95 × … × 0.95   （20 次）\n     = 0.95²⁰\n     = 0.3585…                    ← 自己驗算：見下\n\n  所以「至少有一個顯著」的機率\n     = 1 − 0.95²⁰\n     = 1 − 0.3585\n     = 0.6415\n     ≈ 64%\n```\n\n我把 0.95²⁰ 一步步算給你看，不跳步（自我複核用）：\n\n```text\n逐步算 0.95²⁰（每步保留小數，最後對齊驗算）\n─────────────────────────────────────────\n0.95² = 0.9025\n0.95⁴ = 0.9025²        = 0.81450625\n0.95⁸ = 0.81450625²    ≈ 0.663420\n0.95¹⁶ = 0.663420²     ≈ 0.440126\n0.95²⁰ = 0.95¹⁶ × 0.95⁴\n       = 0.440126 × 0.81450625\n       ≈ 0.358486\n─────────────────────────────────────────\n1 − 0.358486 = 0.641514 ≈ 0.64   ✓ 與上面一致\n```\n\n讀懂這個數字：**你同時盯 20 個其實沒效果的指標，有大約 64% 的機率，至少撈到一個「顯著」的——純靠運氣。** 你那句興奮的「新版客單價顯著提升了！」，在這個算術面前，多半只是二十次擲骰子裡剛好出現的一個六點。\n\n順帶讓你抓到「半數臨界點」的直覺：要讓「至少一個假顯著」的機率過半，需要幾個指標？\n\n```text\nn 個獨立無效指標，至少一個偶然顯著的機率 = 1 − 0.95ⁿ\n\n  n = 1 :  1 − 0.95   = 0.05    （5%，名目值）\n  n = 5 :  1 − 0.95⁵  ≈ 0.226   （已經 22.6%）\n  n = 10:  1 − 0.95¹⁰ ≈ 0.401   （四成）\n  n = 14:  1 − 0.95¹⁴ ≈ 0.512   ← 過半！只要 14 個指標\n  n = 20:  1 − 0.95²⁰ ≈ 0.642\n```\n\n只要十四個指標，你就有過半的機率撈到假寶。你的 dashboard 上有幾個指標？\n\n**偷看（peeking）是同一個陷阱換了件衣服。** 多重比較是「同一時間測很多指標」，偷看是「同一個指標測很多時間點」——數學結構一樣。每次你看一眼資料、發現沒顯著、決定「再收一點樣本」，你就**多給了隨機波動一次跨過 0.05 線的機會**。資料像隨機漫步，你盯著它上下飄，只要你保留「飄到線上方就喊停、飄回來就繼續等」的權力，它**遲早**會有一刻在線上方——而你會在那一刻按快門，宣布勝利。你不是在等真相浮現，你是在等運氣站到你這邊的瞬間。\n\n```text\n偷看為什麼作弊（隨機漫步直覺）\n─────────────────────────────────────\n無效果時，觀察到的「差異」會隨樣本增加而上下飄：\n\n  差異\n   │      ╱╲      ╱╲\n +─┼─────╱──╲────╱──╲──── ← p=0.05 顯著線\n   │   ╱      ╲╱      ╲\n 0 ┼─╱──────────────────╲──→ 樣本量/時間\n   │\n\n  正確做法：事先定好樣本量 N，【只在 N 那一點】看一次、下結論。\n  偷看做法：沿路一直看，「碰到線上方就停」——\n            你保留了在【任何一個】高點喊卡的權力，\n            於是你遲早會碰到一個純屬運氣的高點。\n\n  結論：偷看不是「提早知道結果」，是「偷偷做了很多次檢定、\n        只報最有利的那次」——多重比較的時間版。\n```\n\n現在回到那句讓我背脊發涼的話。做這些事的研究者（和你），**沒有偽造任何數據**。每一步——「再多收點樣本比較穩」「控制個年齡很合理」「這個指標也該看」——單獨拿出來都站得住。是這些合理選擇**累積**起來，悄悄把偽陽率灌爆。這就是 T6 要守住的正確版（landscape）：**p-hacking 多半不是造假，是無意的研究者自由度**。真誠、聰明、有良心，**都不免疫**。為什麼不自知？因為人對「想信的結論」會找證據特別賣力、對反例特別嚴苛——但那是**心理機制**，屬於另一本書（見《思考的陷阱》談動機性推理與自我合理化的那章）。本書管的是：科學這套制度，要怎麼設計才能在「人一定會這樣」的前提下還防得住（那是 ch11、ch13 的事）。\n\n## 再現性危機：一整個學科照鏡子\n\n把上面那兩件事——p 值被誤讀成「95% 為真」、加上人人都在不自知地 p-hack——放大到一整個學科幾十年的規模，你會得到什麼？\n\n2015 年，一個叫開放科學合作（Open Science Collaboration）的大型團隊給了答案，發表在《Science》（2026-06，照 landscape 查證）。他們做了一件以前幾乎沒人系統做過的事：**挑了 100 項已發表的心理學研究，老老實實地重做一遍**，而且用更大的樣本、盡量拿原始材料。結果：\n\n```text\nOpen Science Collaboration (2015, Science)：複製 100 項心理學研究\n──────────────────────────────────────────────────────────\n原始研究中報告「統計顯著」的比例：  97%\n複製後仍然「統計顯著」的比例：      36%   ← 約三分之一\n複製出來的效果量（effect size）：   約為原始研究的【一半】\n社會心理學子集的複製率：            更低（約 25%）\n──────────────────────────────────────────────────────────\n（複製率依「怎麼算成功複製」有 36%–47% 不同口徑；\n  本書用「約三分之一到四成」表述，標 2015 研究）\n```\n\n讓這個數字落地：原本宣稱「有顯著發現」的研究，重做之後，**大約三分之二複製不出來**。不是三分之二造假——是三分之二的「發現」可能本來就是上一節那個 64% 機率撈出來的運氣，或被偷看、被研究者自由度推過了線。\n\n這就是再現性危機（reproducibility crisis，又稱複製危機 replication crisis）。它最痛的不是「有些研究錯了」——任何活著的科學都會出錯——而是它揭露了一件結構性的事：**現行的發表制度系統性地偏好「會出錯的那種結果」**。期刊愛登「顯著」「新奇」「漂亮」的結果，於是僥倖過線的偽陽性比扎實的真效果更容易見報，而沒人有動機去複製、去報告「我們重做了一遍，沒效果」（這叫發表偏誤 publication bias 與檔案抽屜問題 file drawer，ch16 正式收）。\n\n有幾個一度寫進教科書、上過 TED 的「經典效應」，後來在大型預註冊複製中站不住腳。這裡我**必須**特別謹慎地措辭（landscape C-replication 的鐵律：引用任一經典效應前查 2026 狀態、誠實 hedge、既不當鐵打事實也不反過來說全假）：\n\n```text\n被點名「大型預註冊複製未能支持其一般效果」的經典效應（截至 2026-06）\n──────────────────────────────────────────────────────────\n• 自我耗竭（ego depletion）：意志力像會耗盡的資源。\n    2016 多實驗室預註冊複製（約 2,100 人）效果近於零；\n    2021 由原作者群參與的更大複製（約 3,500 人）同樣近於零。\n    2026-06 狀態：原始的「資源耗盡」強版本未獲穩健支持；\n    近年有人改推「保育/動機」較弱版本——仍在爭論，別當定論。\n\n• 社會促發（social priming，如老年詞彙→走路變慢）：未獲穩健複製。\n• 權力姿勢（power posing）：原宣稱的荷爾蒙/行為效果未獲穩健複製。\n• Bem 2011「預知（precognition）」：多次預註冊複製失敗；\n    常被視為引爆危機反思的導火線之一。\n──────────────────────────────────────────────────────────\n誠實措辭模板：「大型預註冊複製未能支持其【一般】效果（2026-06）」\n  ——不是「已證明全假」，是「在嚴格條件下複製不出宣稱的普遍效果」。\n```\n\n我刻意不把這些寫死成「全是假的」。有些效應可能在某些狹窄條件下仍存在；科學的誠實正在於：**「複製不出來」本身也是一個有待持續檢驗的結論**，不是新的鐵律。把「未能複製」一鍵升級成「鐵證為假」，是用犯了同一種病的態度去診斷那種病。\n\n而這裡藏著本章——可能也是全書——最反直覺的一個好消息：**危機本身，是科學的免疫系統在運作的證據，不是科學破產的證據。**（守住 landscape T7。）一個從不複製、從不認錯的體系，永遠不會有「危機」——因為它根本不照鏡子。心理學之所以爆出複製危機，**正是因為它做了複製、公開了難看的結果、然後動手改制度**。偽科學沒有複製危機——不是因為它的結果都複製得出來，是因為它從不嘗試。會認錯，是科學區別於信仰的特徵之一（ch12 再探）。\n\n## 脊椎透鏡：如果塞麥爾維斯活在今天的審稿系統\n\n把脊椎案搬到今天。這是脊椎的塞麥爾維斯（Ignaz Semmelweis）案，現在換**統計考驗**這個透鏡看它。\n\n假設塞麥爾維斯不是在 1847 年的維也納，而是 2026 年要把洗手降死亡率的結果投到一份頂級期刊。審稿人會用本章這些武器拷問他。他會怎麼通過、又會卡在哪？\n\n```text\n塞麥爾維斯案 × 現代統計考驗\n──────────────────────────────────────────────────────────\n考驗               塞麥爾維斯的處境              通過？\n──────────────────────────────────────────────────────────\n樣本量             兩病房各數千次接生/年，          ✓ 大樣本\n                   多年資料\n\n效果量             兩病房 98.4‰ vs 36.2‰          ✓ 巨大效果\n                   （差約 2.7 倍）；介入後第一病房\n                   全年約 11.4%(1846)→1.27%(1848)、\n                   與第二病房 1.33% 幾乎拉平\n\np 值會不會剛好      效果這麼大、樣本這麼多，         ✓ 穩\n卡在 0.05？        p 會遠小於 0.05，不是\n                   「剛好擦線」的脆弱效應\n\n可被複製嗎？        他調職到別院也降了死亡率        ✓ 複製過\n                   （見 ch13 細談）\n\np-hacking 嫌疑？    他【沒有】挑指標——死亡率       ✓ 預先確定\n                   是唯一、預先就在看的硬指標\n\n機制？             ✗ 說不出「為什麼」              ✗ 致命傷\n                   （細菌說 Pasteur/Koch 要到\n                   他死後才立——見 ch14）\n──────────────────────────────────────────────────────────\n```\n\n讀懂這張表的震撼：**塞麥爾維斯的數據，幾乎完美地通過了本章所有的統計考驗。** 大樣本、巨大效果、不靠擦線的 p 值、沒有 p-hacking、還被複製過。他栽的不是統計——統計上他是模範生。他栽在**機制**（ch14）和**社群典範**（ch08）。\n\n這給你一個重要的對照：本章警告的那些脆弱效應（priming、ego depletion……），共同特徵是**效果小、樣本勉強、p 剛好擦過 0.05**——它們是統計上最容易被運氣冒充的那種。塞麥爾維斯正好相反，是統計上最硬的那種。**統計顯著從來不是判斷一個結果該不該信的唯一維度**——效果多大、樣本多硬、複製過沒、有沒有機制，每一個都是獨立的問號。p < 0.05 只是入場券，不是真理證書。\n\n### 一個必須誠實面對的尷尬：連脊椎案都可能被挑數字誇大\n\n這一節我要做一件不太舒服的事：**承認連我們這本講防自欺的書的脊椎案例，都藏著一個誇大數字的陷阱。**（這正是 landscape T11 要求在本章明寫的。）\n\n你可能在別處讀過「塞麥爾維斯讓產褥熱死亡率從 **18% 降到 1%**」這種講法，戲劇張力十足。問題是：那個 18%（精確值 18.27%）是 **1847 年 4 月單月**的死亡率——介入前一個月、接近峰值。而洗手令是 **1847 年 5 月中**才頒布的。\n\n```text\n「18% → 1%」這句話偷了什麼（時間切片陷阱）\n──────────────────────────────────────────────────────\n18.27%  = 1847 年【4 月單月】峰值      ← 介入【前】、單月、接近最高\n 1.27%  = 1848 年【全年】              ← 介入【後】、全年平均\n\n問題：拿「介入前的單月峰值」對比「介入後的全年平均」\n      = 分子用挑過的最高點、分母用平均\n      → 視覺上把效果放大了\n\n1847 是【分裂年】：洗手令 5 月中才下，前幾月高、後幾月驟降，\n      全年平均被拉低（約 5%）——所以根本不該取 1847 全年值。\n\n誠實版（兩種，效果依然戲劇性、不需作弊）：\n  (a) 同院同期【兩病房對照】：醫師 98.4‰ vs 助產士 36.2‰\n       ——最乾淨，完全沒有年份切片問題\n  (b) 【全年 vs 全年】：1846 約 11.4% → 1848 約 1.27%\n──────────────────────────────────────────────────────\n```\n\n我要你停下來咀嚼這件事的諷刺。「18% → 1%」**是一個 p-hacking 式的動作**——不是在統計檢定裡，而是在敘事裡：從一串數字中挑出對你的故事最有利的那個切片（單月峰值），拿去對比另一個不對等的切片（全年）。挑的人不必說謊，連塞麥爾維斯的崇拜者都可能真心地、不自覺地這樣引用，因為這個版本「感覺更有力」「更能彰顯他的偉大」。\n\n這就是研究者自由度的敘事版，發生在一個**講防自欺的脊椎案例本身**裡。如果連這個都會被不自覺地挑數字誇大，你對自己 dashboard 上那些「我們快了 10 倍」「轉換率暴增」的宣稱，該保留多少戒心？誠實版的塞麥爾維斯效果——98.4‰ vs 36.2‰，或 11.4% → 1.27%——已經夠驚人了。一個真正扎實的效果，**不需要靠挑切片來撐場面**。需要挑切片才好看的，往往本來就不夠硬。\n\n## 直覺的陷阱\n\n統計顯著是「想當然耳」翻車最慘烈的重災區。這裡是幾個具名陷阱，每一個都守 landscape 的正確版。\n\n| 陷阱（錯誤直覺） | 它在哪一步把你帶溝裡 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **「p < 0.05 = 95% 為真」**（T5） | 把 P(資料\\|沒效果) 偷偷讀成 P(有效果\\|資料)——條件方向對調 | p 值是「**若沒效果**，看到這麼極端資料的機率」。要算「為真機率」得加先驗、走貝氏。**自查**：你能把「虛無假設」這四個字講出來嗎？講不出來，你大概在誤讀 p 值 |\n| **「顯著 = 重要」**（ASA 第 5 條） | 樣本夠大時，微不足道的差異也會顯著；你把「不像運氣」讀成「值得做」 | 顯著只說「不像純運氣」，**不說**效果大不大。**自查**：問「效果量多大？這個大小值得我為它改架構嗎？」 |\n| **「p-hacking = 造假」**（T6） | 你以為自己誠實就免疫，於是放心地偷看、撈指標 | 多半是**無意的研究者自由度**。真誠的人也會犯。**自查**：分析開始**前**，你有沒有寫死「要看哪個指標、收多少樣本、何時停」？沒有 = 你正暴露在自由度裡 |\n| **偷看（peeking）不算數** | 「我只是監控進度」感覺無害 | 一邊跑一邊看、達標就停 = 偷偷做了很多次檢定只報最好的 = 多重比較的時間版。**自查**：停止規則是事前定的，還是看到綠燈才定的？ |\n| **「再現性危機 = 心理學都是假的」**（T7） | 把「一批效應未穩健複製」過度推廣成「整門學科破產」 | 是**特定一批**結果＋制度在修正；危機 = 免疫系統在運作。**自查**：你是不是用「複製不出 = 鐵證為假」這種同樣武斷的態度，去評斷「武斷下結論」這個病？ |\n| **「不顯著 = 證明沒效果」** | p 大就宣布「兩組沒差、效果不存在」 | p 大只是「沒**足夠證據**說有效果」——可能是真沒效果，也可能是**樣本太小沒檢力**。缺席的證據 ≠ 不存在的證據。**自查**：你的實驗檢力（power）夠嗎，還是只是樣本太少？ |\n\n我認為最該停下來想十分鐘的是第一格。「p < 0.05 = 95% 為真」這個誤解之所以致命，是因為它**感覺太對了**——它把一個關於「資料有多意外」的陳述，無痛地換成你真正想要的「結論有多可信」的陳述，中間那道需要先驗、需要貝氏的鴻溝，被直覺一腳跨過、毫無摩擦感。沒有摩擦感的錯誤，是最難自我察覺的錯誤。\n\n## 紙上推演\n\n純紙筆推演，不要跑任何程式。數值請手算，對照前面的 worked example 自我複核。\n\n### 第 1 題（★★）**[15 分鐘]**：把你的 A/B test 抓出 p-hack\n\n你的團隊跑了一個 A/B test：新版結帳 vs 舊版。預計收兩週樣本。實際流程是這樣的——\n\n- 第 3 天：看了一眼，轉換率沒顯著，「資料還少，繼續」。\n- 第 7 天：又看一眼，還是沒顯著，「再等等」。\n- 第 11 天：轉換率**顯著了**（p = 0.04）！「成了，發版，剩下三天不用跑了」。\n- 同時，PM 在 retro 上說：「雖然轉換率提升不大，但**客單價、停留時間、加購率**三個指標也都看了，其中**加購率顯著提升**，這版很成功！」\n\n請指出這個流程裡**所有**的 p-hacking 動作，並說明每一個如何把名目 5% 的偽陽率推高。最後給出一句話的「正確做法」。\n\n### 推演解答\n\n這個流程同時踩了**偷看**和**多重比較**兩大陷阱，外加一個提早停止。\n\n**動作一：沿路偷看（第 3、7、11 天）。** 他們不是在預定的「第 14 天」看一次，而是一路看了至少三次，並保留「顯著就停」的權力。每多看一次、多給隨機波動一次跨過 0.05 線的機會。轉換率像隨機漫步，盯著它飄、碰到線上方就喊卡——遲早會碰到一個純屬運氣的高點。所以第 11 天那個 p = 0.04 **高度可疑**：它很可能就是「飄上去的那一刻被按了快門」。實質上他們做了多次檢定，只報最有利的一次，真實偽陽率遠高於 5%。\n\n**動作二：提早停止（第 11 天就收）。** 「顯著了就不跑剩下三天」本身就是偷看的後果——停止規則是**看到綠燈才定的**，不是事前定的。這把問題鎖死：他們永遠不會看到「如果跑滿 14 天，第 11 天那個顯著會不會又飄回去」。\n\n**動作三：撈指標（轉換率＋客單價＋停留時間＋加購率）。** 同時看 4 個指標。就算 4 個都其實沒效果且獨立，「至少一個偶然顯著」的機率是 1 − 0.95⁴ ≈ 1 − 0.8145 = **0.1855，約 19%**——名目 5% 的近四倍。所以「加購率顯著」這個故事，很可能就是這四選一裡撈出來的運氣。而且注意敘事手法：轉換率（原本要測的主指標）提升「不大」被一筆帶過，焦點被換成事後撈到的加購率——這是研究者自由度④「選報子集合」的教科書示範。\n\n```text\n手算複核（4 個獨立無效指標）\n  0.95⁴ = 0.95² × 0.95² = 0.9025 × 0.9025 = 0.81450625\n  1 − 0.81450625 = 0.18549… ≈ 0.19   ✓ 約 19%\n```\n\n**正確做法（一句）**：開跑**前**就凍結三件事——主指標是哪一個（單一）、樣本量 N 是多少、什麼時候看（只在 N 那一點看一次）；其餘指標只能當「探索性」、不能當「結論」，要當結論得另開一個預先凍結的新實驗去驗（這正是 ch13 預註冊的精神）。\n\n**常見錯路**：以為「我們沒造假、數字都是真的，所以沒問題」。數字真不真不是重點——**分析自由度**才是。每一個動作單獨看都「合理」，合起來把偽陽率灌爆。這就是 p-hacking 的本質：好人，真誠地，騙了自己。\n\n### 第 2 題（★★★）**[20 分鐘]**：用自己的話講清楚「p < 0.05 不是 95% 為真」\n\n不看書，向一個聰明但沒統計訓練的同事，把這件事講清楚。要求：(a) 給出 p 值的正確口語定義；(b) 用一個類比說明「條件方向對調」為什麼是錯的；(c) 說明「那它到底是什麼」——如果 p < 0.05 不是「95% 為真」，那它給了我什麼資訊、我還缺什麼才能算出「為真的機率」。\n\n### 推演解答\n\n**(a) 正確定義**：p 值是「**若虛無假設（沒效果）為真，得到此等或更極端資料的機率**」。p = 0.04 意思是：假如新版其實沒用，那麼純靠運氣冒出我手上這份（或更誇張的）資料的機率只有 4%——挺意外的，所以我傾向不相信「沒用」這個假設。\n\n**(b) 條件方向類比**：用告警。p 值像「**真的沒事時，告警誤響的機率**」（5%）。你真正想知道的是「**告警響了，真的出事的機率**」。這兩個是反過來的條件，差很大。在一個幾乎從不出事的系統裡，就算「沒事時只有 5% 誤響」，告警**響的時候**多半還是假警報——因為「本來就很少出事」（低先驗）會壓垮那 5%。把「沒事時誤響 5%」讀成「響了有 95% 真出事」，就是把 p 值讀成「95% 為真」的同一個錯。\n\n**(c) 它到底給了什麼、還缺什麼**：p 值只給你 P(資料 | 沒效果)——「假定沒效果，資料有多意外」。要跨到你想要的 P(有效果 | 資料)——「看到資料後，有效果的機率」——你還缺一樣東西：**先驗** P(有效果)，也就是「這個效果本來有多可能存在」。然後用貝氏定理把先驗和 p 值（概似那一面）結合，才算得出後驗。p 值裡完全沒有先驗，所以它**單獨**永遠算不出「為真的機率」。（貝氏怎麼算是《馴服隨機》的事；本書只要你守住「p 值缺先驗、所以不是為真機率」這條線。）\n\n**常見錯路**：(1) 把定義簡化成「結果為真的機率」——這正是要戳破的全民誤解。(2) 給了正確定義卻在 (c) 又偷偷把它當「為真機率」用——口是心非。(3) 忘了先驗：很多人能背出「p 不是為真機率」，卻說不出「那要補什麼才是」——補的就是先驗 + 貝氏。\n\n### 第 3 題（★）**[10 分鐘]**：脊椎重講\n\n不看書，回答：(a) 若塞麥爾維斯今天投稿，他的數據在哪些統計考驗上是**模範生**？(b) 他會栽在哪？（提示：不是統計。）(c) 「塞麥爾維斯讓死亡率從 18% 降到 1%」這句話偷了什麼數字？誠實版該怎麼講？\n\n### 推演解答\n\n**(a) 模範生之處**：大樣本（兩病房各數千次接生、多年資料）；巨大效果（98.4‰ vs 36.2‰，差約 2.7 倍）；p 值穩（效果大、樣本多，遠小於 0.05，不是擦線的脆弱效應）；無 p-hacking（死亡率是唯一、預先就在看的硬指標，沒撈指標）；被複製過（調職別院也降，見 ch13）。簡言之，他正好是那些脆弱經典效應的**反面**——統計上最硬的那種結果。\n\n**(b) 他栽在哪**：不是統計，是**機制**（說不出細菌為何致病，Pasteur/Koch 要到他死後才立——ch14）和**社群典範**（挑戰整個瘴氣理論——ch08）。這是本書的核心分離：**有效果 ≠ 有機制 ≠ 被接受**，三件事。統計顯著只保證第一件的入場券。\n\n**(c) 偷了什麼**：18.27% 是 **1847 年 4 月單月**峰值（介入前、單月、接近最高），1.27% 是 **1848 全年**。拿「介入前的單月峰值」對比「介入後的全年平均」是不對等切片，視覺上誇大了效果（而且洗手令 5 月中才下，1847 是分裂年、不該取全年）。誠實版：(a) 同期兩病房 98.4‰ vs 36.2‰，或 (b) 全年 vs 全年 1846 約 11.4% → 1848 約 1.27%。**常見錯路**：覺得「反正方向對、效果真的有，挑個好看的數字無傷大雅」——這正是研究者自由度的敘事版，發生在一個講防自欺的案例裡，本身就是最好的反面教材。扎實的效果不需要挑切片撐場面。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **為什麼「p < 0.05」不是「結果有 95% 的機率為真」？** 講不出「條件方向對調」「缺先驗」，你就會一輩子誤讀每一個 p 值。\n2. p 值的正確口語定義是哪一句？（「若虛無假設為真，得到此等或更極端資料的機率」——一字不差講出來。）\n3. **為什麼「顯著」不等於「重要」？** 樣本很大時會發生什麼？\n4. **為什麼真誠、聰明、有良心的研究者也會 p-hack 而不自知？** 「研究者自由度」是什麼？舉兩個。\n5. 偷看（peeking）和多重比較（同時測很多指標），在數學結構上為什麼是**同一件事**？\n6. 同時測 20 個其實沒效果的獨立指標，至少撈到一個「顯著」的機率大約是多少？（會手算 1 − 0.95²⁰ 嗎？）\n7. **為什麼「再現性危機」反而是科學健康的證據，不是科學破產？** 偽科學為什麼沒有複製危機？\n8. 塞麥爾維斯的數據通過了本章幾乎所有統計考驗，他到底栽在哪？這告訴你「統計顯著」在判斷一個結果該不該信時，是什麼地位？\n\n## 延伸閱讀\n\n- **ASA, \"Statement on p-Values: Context, Process, and Purpose\"（Wasserstein & Lazar, *The American Statistician* 70(2), 2016）**（https://www.tandfonline.com/doi/full/10.1080/00031305.2016.1154108）：六原則的原文，篇幅短、權威。讀那六條本身就夠本章——特別看第 2 條（不是為真機率）和第 5 條（顯著≠重要）。\n- **Simmons, Nelson & Simonsohn, \"False-Positive Psychology\"（*Psychological Science* 22(11), 2011）**（https://journals.sagepub.com/doi/10.1177/0956797611417632）：p-hacking 的學術奠基文，「研究者自由度」一詞的出處。看他們怎麼用合理選擇「證明」聽披頭四的歌讓人變年輕——本章最有說服力的反面示範。\n- **Open Science Collaboration, \"Estimating the Reproducibility of Psychological Science\"（*Science*, 2015）**（https://osf.io/ezcuj/overview）：再現性危機的引爆研究本身。看「97% → 36%」與「效果量約半」這兩個數字的脈絡，以及他們怎麼定義「成功複製」（不只一種口徑）。\n- **Stanford Encyclopedia of Philosophy, \"Confirmation\"**（https://plato.stanford.edu/entries/confirmation/）：想知道「為什麼 p 值單獨算不出為真機率、需要先驗」的科哲背景，讀確證理論那節（接 ch07 貝氏確證）。\n- 跨書：p 值與假設檢定**怎麼算**、先驗如何結合概似得出後驗——**機率機制**在《馴服隨機》（見《馴服隨機》談貝氏定理與假設檢定的那章）；**為何研究者對證據如此偏心、p-hack 而不自知**的**心理機制**在《思考的陷阱》（見其談動機性推理與自我合理化的那章）。本章只負責「p 值在說什麼、在哪裡崩壞」這層誠實理解。\n- 本書內：再現性危機**怎麼修**（預註冊、註冊報告、開放資料、多實驗室複製）在 ch13；塞麥爾維斯**缺的那塊機制**為何致命在 ch14；本章的失敗模式（多重比較、偷看、發表偏誤）收進 ch16 的防自欺檢查表。\n"}, {"id": "ch10-two-kinds-of-truth", "file": "ch10-two-kinds-of-truth.md", "group": "Part III — 制度與限度的防線", "title": "ch10 — 兩種真：科學的真 vs 數學的真", "md": "# ch10 — 兩種真：科學的真 vs 數學的真\n\n> **本章解決什麼問題**：Part III 走到這裡，你已經看過科學作為制度怎麼運作（ch08 社群、ch09 統計）也看過它怎麼失靈。本章是 Part III 的收尾，也是全書「制度與限度」的頂點——我們停下來問一個更根本的問題：當我們說「科學是真的」，那個「真」到底是哪種真？本章要把它和另一種你天天在用、卻可能從沒分清的「真」對照——數學／形式系統裡那種「被證明」的真。釐清這個分際，你才會懂為什麼「科學證明了 X」是個語病，為什麼科學結論的「暫定」是特性不是缺陷，以及為什麼塞麥爾維斯「是對的」跟畢氏定理「是對的」根本不是同一回事。這是脊椎十層透鏡的第十層（ch18 總對帳），也是後面 Part IV、V 的態度地基。\n\n## 從你已知的出發\n\n你的系統裡，其實一直住著兩種不同信心等級的「對」，你只是沒給它們不同的名字。\n\n第一種：**型別檢查通過。** 你寫 TypeScript，`tsc` 跑完沒報錯，那個函數的型別簽章是 `(x: number) => string`。當編譯器說「這裡型別對」，它給你的是一種**封閉系統內的保證**——只要你的型別宣告本身沒在說謊、編譯器本身沒 bug，那麼「這個值在這裡是 string」就是**演繹必然**的。你不需要把程式跑起來、不需要觀察任何真實世界發生的事。型別檢查器是在一套形式規則裡做推導：給定這些型別公理和這些推導規則，結論被**證明**出來。它不會「大概對」，它在它自己的規則世界裡是**鐵的**。\n\n第二種：**壓測通過。** 你把新版本部署到 staging，灌進去十倍流量，跑了兩小時，P99 穩在 80ms，錯誤率零。你說「這版扛得住」。但你心裡很清楚，這個「扛得住」跟上面那個「型別對」是**完全不同質地的信心**。它不是被證明的，它是**被觀察支持的**。你跑了兩小時——那第三小時呢？你灌十倍——那二十倍呢？你測的是 staging 的流量形狀——那生產環境那個你沒想到的尖峰呢？這個「扛得住」永遠帶著一條看不見的小字：**「在我測過的這些條件下，目前還沒掛。」**\n\n停下來體會這兩種信心的差別，因為它就是本章的全部。\n\n- 型別檢查的「對」：在形式系統內、由規則演繹保證、要推翻它得指出推導錯誤或規則本身的漏洞。**它不向世界負責，只向規則負責。**\n- 壓測的「對」：對真實世界的暫時最佳猜測、由經驗證據支持、隨時可能被下一個觀察推翻。**它向世界負責，所以永遠暫定。**\n\n你絕不會因為「壓測過了」就拿它當「已被數學證明」，反過來你也不會要求「型別檢查」再去生產環境跑一輪驗證——那是搞錯了它的性質。**你對這兩種「對」的信任方式根本不一樣。** 這個你工程直覺裡已經分得很清楚的差別，放大到整個知識體系，就是科哲裡「數學的真 vs 科學的真」這個分際。本章要做的，是把你這個直覺擦亮、給它名字、然後讓你看清一個結論：**「科學證明了 X」這句日常掛在嘴邊的話，嚴格講是個型別錯誤——它把壓測的信心,硬塞進了型別檢查的盒子。**\n\n## 數學的真：形式系統內的可證\n\n先說那個比較乾淨的——數學的真。\n\n數學的真理是**形式系統內的可證性（provability within a formal system）**。把這句話拆開：\n\n```text\n數學的真 = 形式系統內的可證\n\n  你給定：\n    + 一組公理（axioms）       ← 不證自明、被約定為起點的命題\n    + 一組推導規則（inference rules） ← 從已有命題合法地得出新命題的規則\n    ↓\n  一個命題「為真」（在這個系統裡）\n    = 它能從公理、依推導規則、一步步被導出來\n    = 它「可證（provable）」\n    ↓\n  確立方式：演繹（deduction）。每一步都必然保真。\n            （ch03 講過：演繹是三種推理裡唯一保真的）\n    ↓\n  推翻方式：你只能指出「某一步推導違反了規則」\n            或「公理本身被換掉了」。\n            你不能靠「去世界上找個反例」來推翻一個已證明的定理——\n            因為它根本不向世界負責。\n```\n\n舉個你熟的：畢氏定理，直角三角形兩股平方和等於斜邊平方。這在歐幾里得幾何裡是**被證明**的——從歐氏公理出發，一連串演繹步驟導出，每一步都必然保真。它的「真」有兩個性質，跟科學的真天差地別：\n\n**第一，它是封閉的、絕對的——在它的系統內。** 你不可能拿著皮尺去量一萬個直角三角形,「驗證」畢氏定理，更不可能量到第一萬零一個就「推翻」它。如果你量出來對不上，結論不是「畢氏定理錯了」，而是「你量錯了」或「這不是真正的歐氏平面」（比如你畫在球面上）。畢氏定理不向你的皮尺負責——它向歐氏公理負責。這跟科學主張的關係**正好相反**：科學主張就是要向皮尺（觀察）負責的，量不對它就有麻煩。\n\n**第二，它的絕對性是「有條件的絕對」——條件就是那組公理。** 換一組公理，畢氏定理就不成立。在球面幾何（非歐幾何）裡，三角形內角和大於 180 度，畢氏關係不再成立。這不是「畢氏定理被推翻了」，而是「你換到了另一個形式系統，那裡的規則不一樣」。所以數學的「絕對真」嚴格講是**相對於公理系統的絕對**——給定這套規則，演繹必然；換套規則，重新來過。型別檢查器也一樣：它的保證相對於你的型別宣告與型別系統的規則；你把型別宣告寫錯（`as any` 硬轉），它的「證明」就建立在謊言上，照樣演繹得很順、結論卻是錯的。\n\n> 一個誠實的補丁（2026-06）：把「數學的真 = 可證」講得太順，會撞上二十世紀數學基礎論最深的一道裂縫——**哥德爾不完備定理**。粗略講，哥德爾證明了在任何夠強（能表達算術）且一致的形式系統裡，**存在「真但在這個系統內不可證」的命題**——也就是說，在這類系統裡，「真」會**溢出**「可證」，兩者不再重合。這正反過來精煉了本節的主張：數學的真嚴格說該定義成「可證」（系統內、由規則導出），而哥德爾告訴我們「真」這個更大的概念在夠強的系統裡會比「可證」更大。**這裡有個常見的過度解讀要避開**：哥德爾講的不是「有些真理永遠絕對不可證」，而是「對某個特定的形式系統而言不可證」——換個更強的系統，那個命題可能就可證了（代價是新系統又有它自己的哥德爾句）。這道「真 vs 可證」的分裂屬於《這句話無法被證明》的主場，本書只借它一句話來鎖緊「數學的真錨在形式系統」這個重點。**機制細節指向那本書談形式系統內「真」如何溢出「可證」的那一章。**\n\n## 科學的真：經得起否證的暫定最佳猜測\n\n現在說另一種——科學的真。它跟數學的真，幾乎在每一個性質上都相反。\n\n科學的真理是**對世界的暫時最佳猜測，經得起反覆否證嘗試而至今未倒**。把這句拆開，每一塊都是前面九章鋪好的：\n\n```text\n科學的真 = 對世界的、暫定的、經得起否證的最佳猜測\n\n  它斷言的對象：真實世界（不是某套公理的內部）\n    ↓\n  它怎麼被確立：不是被證明，是\n    + 溯因生成（ch03：跳到最能解釋現象的假說）\n    + 演繹出冒風險的預測（ch04：如果我對，你會看到 X）\n    + 拿對照實驗去考驗（ch05：設計乾淨的否證機會）\n    + 反覆嘗試否證而未倒（ch04：corroborated，不是 proven）\n    ↓\n  它的信心怎麼累積：貝氏式地抬高後驗（ch07）——\n    每次通過考驗，可信度上升，但永遠到不了「1」（證明）\n    ↓\n  它怎麼被推翻：一個妥當的反例、一次可複製的反常觀察\n    （ch04 的不對稱：驗證不了、但否證得了）\n    ↓\n  它的狀態：永遠「暫定」。下一個觀察隨時能改寫它。\n            這不是 bug，是 feature。\n```\n\n注意它跟數學的真**逐項對立**：\n\n```text\n                  數學的真              科學的真\n  ───────────────────────────────────────────────────\n  斷言對象        形式系統內部          真實世界\n  確立方式        演繹證明（保真）      溯因＋否證考驗（不保真）\n  能被推翻嗎      不能（除非改公理      能——一個妥當反例就夠\n                  或指出推導錯誤）      （這正是它在做科學的標誌）\n  終局狀態        絕對（相對於公理）    永遠暫定\n  「真」=什麼      可證                  經得起否證、目前最佳\n  你的工程對應    型別檢查通過          壓測／A-B test 通過\n```\n\n這張表是本章的脊樑。我認為這是整本書最該停下來想十分鐘的一頁——因為一旦你內化了這個對立，你會發現日常語言對「科學」的描述幾乎全是錯的。\n\n回到 ch04 留下的那個詞：**corroborated（驗證強化），不是 proven（證明）。** 那一章我們守住了「應驗 ≠ 證明」的分寸；本章把它升級成一個世界觀。一個被反覆嘗試否證、至今未倒的理論，是「目前最值得信的猜測」——但它的「真」永遠帶著「截至目前、在已測過的範圍內」這條小字，跟壓測那條看不見的小字一模一樣。科學的真，本質上就是一張**寫滿小字的暫定收據**，不是數學那張**鐵打的證明書**。\n\n## 「科學證明了 X」為什麼是個語病\n\n現在可以處理那句你每天在新聞、在會議、在自己嘴裡聽到的話了：「科學證明了 X。」\n\n嚴格講，這句話是個**範疇錯誤（category error）**——它把只屬於形式系統的動詞「證明」，用到了一個向世界負責的經驗主張上。\n\n```text\n「科學證明了 X」的拆解\n\n  「證明（prove）」這個動詞，正確的棲息地是：\n    形式系統內、由公理＋規則演繹導出、必然保真\n    ↓\n  但科學主張 X（「洗手降低產褥熱死亡率」「光線經太陽會彎」）\n    斷言的是「真實世界就是這樣」\n    ↓\n  而真實世界的普遍律「驗證不了」（ch03 休謨、ch04 不對稱）：\n    再多次觀察也填不滿「所有」「永遠」「在任何地方」\n    ↓\n  所以科學能給的最強狀態是：\n    「反覆嘗試否證而未倒」（corroborated）\n    ——不是「證明（proven）」\n    ↓\n  結論：「科學證明了 X」= 把演繹的動詞，\n        硬套到一個只能被歸納支持、被否證考驗的主張上\n        = 型別錯誤\n```\n\n那為什麼大家還是這樣講？因為日常語言把「證明」用得很鬆——「證明」在口語裡常常只是「給了很強的證據」的意思。這在喝咖啡聊天時無害。但它有害的時刻，是當這個鬆散用法**反過來污染你對科學狀態的理解**：你開始以為科學結論像數學定理一樣是「鎖死的、不會變的」，於是——\n\n- 當科學結論修正時（牛頓力學被相對論修正、某個營養學建議被推翻），你覺得「科學騙人、科學家連自己都搞不清」。\n- 你被「這是已被科學證明的事實」這種話術唬住，忘了去問「它被否證考驗過嗎、被複製過嗎、有沒有更新」。\n\n**這兩個毛病同源：都來自把科學的真誤當數學的真。** 一個健康的理解是：科學結論的修正,不是科學失靈，是科學**正常運作**——它本來就是暫定的，被更好的證據改寫正是它的設計。一個從不修正的「科學」，反而該讓你警惕（那比較像 ch04 講的「怎樣都對」、或 ch12 要談的偽科學）。\n\n說得更直白：**「科學證明了 X」最好都改成「目前最好的證據強烈支持 X，且它經得起我們想得到的否證考驗」。** 囉嗦，但誠實。這份囉嗦，就是防自欺。\n\n## 脊椎透鏡：塞麥爾維斯「是對的」是哪種對\n\n換第十層透鏡，最後一次在 Part III 回看脊椎的塞麥爾維斯（Ignaz Semmelweis）洗手案。前面九層我們看過：它的觀察（ch01）、理論負載（ch02）、溯因（ch03）、可證偽（ch04）、對照（ch05）、因果論證（ch06）、貝氏確證（ch07）、被社群否決（ch08）、若活在今天的統計考驗（ch09）。本章問一個聽起來簡單、其實最容易答錯的問題：\n\n**我們今天說塞麥爾維斯「是對的」——那是哪一種對？**\n\n不是數學那種。他沒有「證明」任何東西。他做的全是科學那一邊的事：\n\n```text\n塞麥爾維斯的「對」是科學的真，不是數學的真\n\n  他做到的（科學的真那一欄）：\n    + 溯因出「屍體微粒致病」假說（ch03）\n    + 它可證偽、做了冒風險的預測（ch04）\n    + 準隨機對照支持（ch05）、因果論證成立（ch06）\n    + 每次「洗手後又降」抬高後驗（ch07）\n    ↓\n  他沒做到、也不可能做到的（數學那一欄）：\n    × 「證明」洗手必然降死亡率\n      （休謨還在：再多次也填不滿「必然」）\n    ↓\n  關鍵轉折——他「是對的」的真正意思：\n    不是「他在 1847 證明了」\n    是「後來的證據（細菌說 1860s–80s、無數次複製、\n        今日整套無菌術）回頭追認了他的猜測」\n    ↓\n  所以他的「對」是【被後續證據追認的暫定最佳猜測】\n    ——而且追認的同時還【修正】了他：\n    致病的不是模糊的「屍體微粒」，是具體的病原菌。\n    他的【結論方向】對，【機制】被改寫。\n```\n\n這裡藏著本章最反直覺、也最重要的一點，請慢讀：**塞麥爾維斯「是對的」，和他的假說「被細菌說修正了」，這兩件事同時成立、毫不矛盾。** 在數學裡這會是矛盾——一個定理要嘛被證明、要嘛沒有，不存在「對、但被改寫」的中間態。但在科學裡，這正是常態：他的**核心經驗主張**（產婦的死跟接生者手上帶來的東西有關、洗掉它能救命）被後續證據強力追認；他**溯因出的機制**（「屍體微粒」這個前細菌學的模糊概念）則被更精確的細菌理論取代。**方向對、機制被升級**——這就是科學的真在運作的樣子，沒有任何一步是「被證明」或「被推翻」這種非黑即白的事件，全是「被追認、被修正、被精煉」的連續調整。\n\n這也讓 ch08 那一幕有了新的層次。瘴氣派否決他，部分理由是「他說不出機制」——而從本章的角度看，他們其實在無意間要求一個**科學的真去具備數學那種完整性**（要先有滴水不漏的「為什麼」才肯接受）。這個要求本身不全錯（機制確實重要，ch14 專門講），但它若被推到「沒有完整機制就一律否決有效的對照證據」，就變成了用錯誤的「真」標準去卡科學——而科學的真，本來就允許「先知道有效、後補上機制」（ch14 會給阿斯匹靈、麻醉這些「先有效、後懂機制」的例子）。\n\n**守住誠實版**（這是全書的紅線）：別因為本章說他「是對的」，就把他重新寫回「證明了細菌致病的英雄」。他沒證明、他缺機制、他被否決、他的機制後來還被改寫。他「是對的」是科學那種**暫定、被追認、且帶著修正**的對——把這種對講成數學那種**一勞永逸、被證明**的對，就是把整個脊椎案例最深的教學點丟掉。\n\n## 直覺的陷阱\n\n「兩種真」是本書少數幾個一旦講錯、會反過來腐蝕你對全書理解的概念。守住下面的正確版。\n\n| 陷阱（你會這樣想） | 它在哪一步帶你下溝 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **「牛頓力學被相對論推翻了，所以牛頓是錯的、是失敗的科學」**（最常見） | 你用數學的「非真即假」去評科學主張，忽略了科學主張帶著「適用域」這條小字 | 牛頓力學在它的適用域（低速、弱重力場）內預測精準到今天還在用（你的橋樑、彈道計算）。相對論不是「證明牛頓錯」，是**指出它的適用邊界並在邊界外取代它**。科學的真是「在某範圍內、暫定最佳」，不是「全域永真或全錯」 |\n| **「科學證明了 X」** | 你把演繹的動詞「證明」套到經驗主張上，於是以為科學結論像定理一樣鎖死 | 科學不證明、只「反覆否證未倒」。改口成「目前最好的證據強烈支持 X」。自我察覺：聽到「科學證明了」就在心裡補一句「截至目前、在測過的範圍內」 |\n| **「科學結論一直變，所以科學不可靠 / 都是各說各話」** | 你把「暫定、可修正」誤讀成「沒有比較好壞、隨便講」 | 暫定 ≠ 隨便。科學的修正是**有方向的**（被更強的證據、更廣的適用域取代），不是回到原點。「可被改寫」是它誠實的標誌，不是它軟弱的證據。反過來，**從不修正**的體系才該警惕（ch12 偽科學） |\n| **「數學定理是絕對真理，無條件成立」** | 你忘了數學的絕對是**相對於公理系統**的絕對 | 換一組公理（歐氏→非歐），結論就變。數學的「鐵」是「給定這套規則」的鐵。哥德爾還告訴你：夠強的系統裡，「真」甚至會溢出「可證」。絕對性是有條件的 |\n| **「型別檢查過了 = 程式沒 bug」** | 你把形式系統內的保證，誤當成對真實執行行為的保證 | 型別檢查只保證「在型別宣告為真、編譯器無 bug 的前提下，型別一致」。它證明不了「這段邏輯做對了事」「不會在生產環境 OOM」——那些要靠測試（科學那一邊）。把兩種信心搞混，就是把 `as any` 的謊言當成了證明 |\n\n具名陷阱，展開一個——**「科學證明了，所以板上釘釘」式話術**。你會在哪裡撞到它？技術選型會議上的「Benchmark 證明了 X 框架快 3 倍」、營養新聞的「研究證明咖啡延壽」、廠商白皮書的「實驗證明我們的快取命中率達 99%」。這些「證明」全是壞掉的動詞。**怎麼自我察覺**：每次聽到「證明」用在一個關於真實世界的主張上，把它替換成「在什麼條件下、被測過幾次、可複製嗎、有沒有適用邊界」這串問題。如果對方答得出來（指定了條件、做過對照、可複製），那是好的科學主張、只是用詞鬆；如果對方答不出來、把「證明」當免死金牌不准你追問——那它根本不是科學主張，是拿科學的權威外衣包裝的斷言（ch15 證詞與權威會接這條）。**科學從不發「鐵證」這種牌——它發的永遠是「目前最好、隨時可被更好的取代」的暫定收據。** 把暫定收據聽成鐵證，是這個陷阱的全部。\n\n## 紙上推演\n\n下面兩題，純紙筆。先自己想，再讀解答。\n\n### 第 1 題（★★）**[15 分鐘]**：「牛頓被推翻」這句話哪裡不對\n\n有人對你說：「牛頓力學被相對論推翻了，所以牛頓力學是錯的——這證明科學常常是錯的，不能太信。」\n\n請拆解這句話裡的**兩個**錯誤：(a) 「被推翻 = 錯的」錯在哪？(b) 「科學常錯所以不能信」這個推論錯在哪？並說明:科學結論被修正，到底是科學的弱點還是它正常運作的證據？\n\n### 推演解答\n\n**(a)「被推翻 = 錯的」混淆了兩種真。** 牛頓力學不是「全錯」，是「有適用域」。在低速、弱重力場的範圍內，它的預測精準到今天的橋樑、彈道、絕大多數工程計算都還在用它——你不會為了算一座橋的受力去解廣義相對論場方程。相對論做的不是「證明牛頓是假命題」，而是**指出牛頓力學的適用邊界**（接近光速、強重力場時失準）並在邊界外取代它。把「在邊界外失準」說成「整個錯」，正是用數學的「非真即假」去套科學主張——科學主張本來就帶著「在某範圍內、暫定最佳」的小字。一個更乾淨的講法：相對論**涵蓋並修正**了牛頓，牛頓是它的低速極限近似。**常見錯路**：以為「修正」就是「打臉」。在科學裡，新理論常把舊理論收編成自己的特例，不是把它扔進垃圾桶。\n\n**(b)「科學常錯所以不能信」把「可修正」誤讀成「不可靠」。** 科學結論可被修正，不代表它在「隨便亂猜、各說各話」。修正是**有方向的**——被更強的證據、更廣的適用域、更精確的測量取代，不是繞圈回原點。「會認錯、會更新」恰恰是科學比其他宣稱掌握真理的體系**更**值得信的理由（ch12 會把這點對照偽科學的「從不認錯」）。一個從不修正的體系，要嘛是數學（它本來就在另一種真裡）、要嘛該讓你懷疑它根本沒在向世界負責。**所以科學結論被修正,是它正常運作的證據,不是弱點。** 把暫定性當缺陷,等於要求科學去當數學——那是搞錯了它是什麼。**這題的教學點**：「科學會變」和「科學不可靠」之間,差了一個「變的方向」——前者描述事實,後者是錯誤推論。\n\n### 第 2 題（★★）**[20 分鐘]**：型別系統證明 vs 壓測通過\n\n把你工程裡的兩種「信心」對照清楚。\n\n(a) 「`tsc` 編譯通過,所以這裡的型別是對的」——這個「對」屬於哪種真?它能被「去生產環境跑一輪」推翻嗎?為什麼?\n\n(b) 「壓測兩小時 P99 穩定,所以這版扛得住」——這個「對」屬於哪種真?它帶著哪條看不見的小字?\n\n(c) 用這兩個例子,講清楚「你信任它們的方式為什麼不該一樣」。\n\n### 推演解答\n\n**(a) 型別檢查的「對」屬於數學的真（形式系統內的可證）。** 它是在一套型別規則裡做演繹:給定你的型別宣告(公理)和型別系統的推導規則,「這個值在這裡是 string」被**導出**。它**不能**被「去生產環境跑一輪」推翻——因為它根本不向真實執行行為負責,只向型別規則負責。如果生產環境出事(某個值居然是 `undefined`),結論不是「型別檢查錯了」,而是「你的型別宣告在說謊」(例如某處 `as any`、某個外部 API 的回傳沒照宣告來)——也就是「你的公理本身是假的」,演繹從假前提出發,順順地導出錯結論。對應數學那邊:你不能拿皮尺去推翻畢氏定理,只能說「你不在歐氏平面上」。**型別檢查的保證是有條件的絕對:條件是型別宣告為真、編譯器無 bug。**\n\n**(b) 壓測的「對」屬於科學的真(經驗支持的暫定猜測)。** 它向真實世界負責,所以帶著一條看不見的小字:**「在我測過的這些條件下(這個流量形狀、這個時長、這個環境),目前還沒掛。」** 第三小時、二十倍流量、生產環境那個你沒模擬到的尖峰——全在小字的覆蓋範圍之外。它隨時可被下一次觀察(一次真實 incident)推翻,而且推翻它**不需要**指出你哪步推導錯了,只需要世界給你一個反例。\n\n**(c) 為什麼信任方式不該一樣。** 因為兩種「對」對「什麼能推翻我」的回答根本不同。型別檢查的對,**錯只可能錯在規則或宣告**,所以你驗證它的方式是 review 型別宣告、信任編譯器,不是去生產環境試。壓測的對,**錯可能錯在任何你沒測到的真實情境**,所以你驗證它的方式是擴大覆蓋(更多流量、更久、更接近生產)、做對照、上線後繼續監控——永遠補不滿,只能逼近。**把這兩種搞混的代價**:若你拿信任壓測的方式去信型別系統(「型別過了還是不放心,我去生產跑跑看」),你浪費力氣且搞錯對象;若你拿信任型別系統的方式去信壓測(「壓測過了 = 鐵定扛得住,不用再監控了」),你會在那條看不見的小字失效的那天被生產環境教做人。**這題的教學點**:工程師其實天天在分辨兩種真,只是沒給名字——本章給了名字之後,你會更清楚哪種信心該怎麼維護。\n\n## 自我檢核\n\n口頭自答,講得出來才算過:\n\n1. **為什麼「科學證明了 X」嚴格講是個語病?** 「證明」這個動詞的正確棲息地在哪、為什麼套到經驗主張上會出錯?(答不出來,你就會被「已被科學證明」的話術唬住。)\n2. 數學的真和科學的真,在「能不能被反例推翻」這一點上,差別是什麼?為什麼這個差別不是誰高誰低,而是兩種不同的東西?\n3. 為什麼數學定理的「絕對」其實是「有條件的絕對」?換一組公理會怎樣?(提示:歐氏 vs 非歐、`as any`。)\n4. 塞麥爾維斯「是對的」是哪種對?為什麼「他是對的」和「他的機制被細菌說修正了」可以同時成立、不矛盾?(這在數學裡會是矛盾——為什麼在科學裡不是?)\n5. 「牛頓力學被相對論推翻了」這句話,把「推翻」換成什麼詞才誠實?「適用域」這個概念為什麼救得了它?\n6. 科學結論一直被修正,這是它的弱點還是它正常運作的證據?「可修正」和「不可靠」差在哪一個字?\n7. 用你自己系統裡的例子,各舉一個「數學的真」(形式系統內保證)和「科學的真」(經驗支持的暫定猜測),並說明你信任它們的方式哪裡不同。\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Karl Popper\"**(https://plato.stanford.edu/entries/popper/):本章「科學不證明、只 corroborated」的權威源頭。重讀「Falsifiability」與「Corroboration」兩節,特別注意它反覆強調「universal theories can never be conclusively established(普遍理論永遠無法被最終確立)」——這就是科學的真「暫定」的根。\n- **Stanford Encyclopedia of Philosophy, \"Gödel's Incompleteness Theorems\"**(https://plato.stanford.edu/entries/goedel-incompleteness/):本章「真 vs 可證」那個誠實補丁的完整版。重點讀它對「truth and provability are distinct(真與可證是不同概念)」的說明,以及那個關鍵警告——不完備講的是「對某個特定形式系統不可證」,**不是**「絕對不可證」。本書只借一句,完整內容是《這句話無法被證明》的主場。\n- **Stanford Encyclopedia of Philosophy, \"Scientific Realism\"**(https://plato.stanford.edu/entries/scientific-realism/):想深入「科學結論在什麼意義上『逼近真理』、牛頓被相對論『超越而非全錯』」的爭論(科學實在論 vs 反實在論),讀這篇。提醒:這裡科哲未定論,本章只取「適用域」這個各方都接受的直覺,不裁判實在論之爭。\n- 跨書:形式系統內「真」如何溢出「可證」(哥德爾那道分裂的完整故事)——在**《這句話無法被證明》談形式系統內「真」與「可證」分家的那一章**;本章只借它鎖緊「數學的真錨在形式系統」這一點,不展開定理內容。\n- 跨章:「corroborated 不是 proven」這個分寸的源頭在 ch04(波普爾與可證偽);本章把它從一個用詞分寸,升級成「兩種真」的世界觀。塞麥爾維斯「方向對、機制被改寫」裡「機制為什麼這麼重要」,在 ch14(機制之必要)深挖。\n"}, {"id": "ch11-motivated-reasoning", "file": "ch11-motivated-reasoning.md", "group": "Part IV — 科學擋不住的、與它如何修補", "title": "ch11 — 動機性推理：科學擋不住的那一半", "md": "# ch11 — 動機性推理：科學擋不住的那一半\n\n> **本章解決什麼問題**：到這裡為止，你已經看完了科學最漂亮的那一面——可證偽的假設、隨機對照、貝氏更新、典範與研究綱領、p 值與複製。這些都是**制度**：一套寫在規範裡、人人都該照做的防自欺工具。但 Part IV 要掀開另一半：**這套制度從第一天起，要對抗的最頑強敵人不在外面，在做科學的人腦袋裡。** 我們對「想信的結論」找證據特別賣力、對反例特別嚴苛——這叫動機性推理（motivated reasoning），它在科學的每一步偷偷扳方向盤。本章是 Part IV「科學擋不住的、與它如何修補」的開場。**鐵律先講清楚：本章是制度視角，不是心理學視角。**「人腦為什麼這樣運作」整塊屬於姊妹書《思考的陷阱》（偏誤書），本章只用一句話定義帶過，主體全部放在一個問題上——**科學這套制度，是怎麼被設計成「假設人一定會自欺」的產物？** 盲法、預註冊、同儕審查、複製，每一道防線都在堵一種特定的偏心；而且，我會誠實告訴你，**這些防線自己也會漏。**\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道，最後撞上科學的限度\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制  ◄ 你在這裡\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n## 從你已知的出發\n\n你 review 自己昨天寫的程式碼，跟 review 同事的程式碼，是兩種完全不同的活動。\n\nreview 同事的，你眼睛很利：這個 edge case 沒處理、這裡 null 沒檢查、這個 await 的 rejection 被吞了。review 自己的，同一雙眼睛，掃過去就是覺得「嗯，這寫得挺好的」。不是你偷懶——你**真的**看了，只是你看自己的程式碼時，眼睛是替它辯護的，不是替它找碴的。你**想要**它是對的，於是你看到的每一行都在替「它是對的」這個結論作證。\n\n這就是動機性推理，而且你天天在它手裡。再舉幾個你一定撞過的：\n\n- 出事故了，第一反應是「**應該不是我的服務**」。你不是故意甩鍋，你是真心覺得自己那塊沒問題，於是你查 log 的時候，潛意識先去翻別人的服務。等到鐵證指回你這邊，你才不情願地回頭。\n- 你押注某個技術選型（比方說「我們該上 Kafka」），於是後來每一篇講 Kafka 好的文章你都讀得津津有味、存下來；每一篇講 Kafka 坑的，你心裡先想「他們是 case 沒做對」。\n- 你做完一個效能優化，指標真的降了，你**立刻**歸功給你的改動——卻沒去查那天是不是剛好流量低（你在 ch06 學過這叫混淆，但你做自己的優化時，那根警惕的弦就是不響）。\n\n關鍵在於：**你不是壞人，你也不笨。** 你是個誠實、聰明的工程師，而你照樣在自欺。這正是本章最該停下來想十分鐘的一句話——**聰明和誠實都不能讓你免疫。** 越聰明的人，替「我想信的結論」編出來的辯護越精緻、越難被反駁。智力在這裡不是解藥，是更好的律師。\n\n所以你的團隊才發明了那些「假設人會自欺」的制度：**你不能 approve 自己的 PR。** blameless post-mortem 要刻意設計成「對事不對人」，不是因為大家修養好，是因為**只要一旦變成追究是誰的錯，每個人的動機性推理就會全開**，真相就埋了。你要別人 review、要 on-call 輪值交叉、要事故時間軸由第三方整理——這些都不是信任問題，是**結構問題**：你在用制度補人腦的漏。\n\n科學做的是一模一樣的事，只是規模大了三百年。這一章就講它怎麼做。\n\n## 一句話的定義，然後我們就往制度走\n\n先把心理學那一句話講完，照規矩，講完就交給偏誤書。\n\n**動機性推理**：我們處理資訊時，目標悄悄從「求準確」偏向「求得到想要的結論」。**確認偏誤**是它最常見的一種長相——我們搜尋、解讀、記憶資訊時，偏向支持既有信念。一句話：**我們對「想信的」鬆，對「不想信的」嚴。**\n\n為什麼會這樣、有哪些子類型、神經機制是什麼、實驗怎麼證的——這整塊是《思考的陷阱》的活兒（見《思考的陷阱》談確認偏誤與動機性推理的那章），本書一律指過去、不展開。判準很簡單：**如果某段在「教你認識某個偏誤」，它就越界了，該搬去偏誤書；如果在「拆解某道科學制度假設人會犯哪種偏心、怎麼堵」，它才屬於這裡。**\n\n我們守住這條線。從現在起，本章只問一件事：\n\n> 科學這套制度，怎麼被設計成「**假設每個科學家都會在某一步替自己的假設辯護**」的產物？\n\n換句話說，把動機性推理當成一個**已知的、無法根除的系統性故障**——就像你不會假設網路永遠不丟包、不會假設磁碟永遠不壞。你不去「修好人性」，你**圍著它蓋防線**。科學蓋了四道。\n\n## 第一道：盲法——堵「期望污染量測」\n\n你在 ch05 學過雙盲堵的是「期望污染量測」。當時是抽象講的。現在給你一個具體到讓人發毛的案例，你就懂為什麼這道防線非設不可。\n\n1963 年，心理學家羅森塔爾（Robert Rosenthal）和 Fode 做了一個實驗。他們讓一群學生訓練老鼠跑迷宮。一半的學生被告知：你拿到的是「**聰明品系**」（maze-bright）的老鼠，特別會學；另一半被告知：你拿到的是「**笨品系**」（maze-dull），學得慢（驗證於 2026-06）。\n\n實際上呢？**所有老鼠都是隨機分的標準實驗鼠，沒有什麼聰明笨品系。** 但五天訓練下來，「聰明組」的老鼠跑迷宮的表現，真的明顯好過「笨組」。\n\n停下來感受一下這件事的恐怖。老鼠不會看論文、不會揣摩你的期望。是**學生**——他們潛意識裡對「聰明鼠」更有耐心、抓得更溫柔、互動更友善——把自己的期望，透過幾百個微小到自己都察覺不到的動作，**真的注入了量測結果**。他們沒有造假。他們填的數字都是真的。是「觀察者期望效應」（observer-expectancy effect）在他們不知情的狀況下，幫他們把世界扭成了他們預期的樣子。\n\n```text\n羅森塔爾老鼠實驗：動機性推理如何「真的」污染量測\n\n   學生被告知「這是聰明鼠」\n        │  （其實是隨機分的普通鼠）\n        ▼\n   學生潛意識更有耐心、抓得更溫柔、互動更多\n        │  ← 學生完全沒察覺自己在這麼做\n        ▼\n   老鼠真的學得比較好（量測結果被扭向預期）\n        │\n        ▼\n   結論：期望不是「解讀偏差」，是「真的改變了被測物」\n\n   ── 盲法（blinding）堵的就是這條路 ──\n   讓量測者不知道哪隻是哪組 → 期望無從注入\n```\n\n這就是盲法要堵的東西。注意它堵的**不是**「研究者解讀數據時偏心」（那是另一回事），它堵的是更深的一層：**研究者的期望，會在數據還沒生出來之前，就先改變了被測量的對象。** 雙盲——受試者不知道自己吃的是藥還是安慰劑、量測者不知道誰是哪組——就是把這條注入路徑物理性地切斷。你期望什麼都無所謂了，因為**你不知道該對誰期望。**\n\n把這道防線翻成你的語言：你做 A/B 實驗，如果**判讀指標的人就是寫新版本的人**，他心裡盼著新版本贏，他在挑「看哪個指標、切哪個時間窗、要不要排除那個看起來像 outlier 的尖峰」時，每一個選擇都會被那份期望輕輕推一下。這就是你的實驗「沒做雙盲」的地方。解法不是叫他「客觀一點」（沒用，羅森塔爾的學生都很客觀），是**結構性地**讓判讀的人不知道哪組是新版——或者，先把指標和判定規則凍死（這是下一道防線）。\n\n## 第二道：預註冊——堵「事後挑分析」\n\n這道防線堵的偏心，最陰險，因為它**戴著做學問的面具**。\n\n故事是這樣的。你收完數據，攤開來看。主要假設沒顯著。但你不死心，你開始翻：欸，如果只看女性受試者，好像有效？如果把那三個極端值拿掉，p 值就過了？如果改看「七天留存」而不是「三天留存」，故事就成立了？你一個一個試，終於找到一組切法，讓結果漂亮。然後你寫論文時，把這組切法**當成你一開始就打算測的**寫進去。\n\n這有個名字，叫 **HARKing**（Hypothesizing After the Results are Known，先看結果再倒推假設），由 Kerr 在 **1998 年**命名（驗證於 2026-06）。它和 p-hacking（見 ch09）是同一種病的兩張臉：**你用看過資料之後才做的選擇，去包裝成看資料之前的計畫。**\n\n它陰險在哪？在於**每一步你都覺得自己在做正當的探索。** 「再看一個子群有什麼不對？」「outlier 本來就該檢查啊。」「換個更合理的指標怎麼了？」每一句單獨聽都對。問題是當你**已經看過結果**，這些選擇就不再中立了——你會（不自覺地）往「讓結果好看」的方向選。研究者自由度（researcher degrees of freedom，見 ch09）一旦在「看過資料之後」才行使，就全部變成動機性推理的管道。\n\n科學的解法是**預註冊**（preregistration）：在收資料之前，把你的假設、要測的指標、樣本量、分析方法、停止規則——全部寫死、公開存檔、蓋上時間戳。等資料進來，你只能照表操課。**註冊報告**（registered reports）更進一步：期刊在你看到結果**之前**就根據方法決定收不收稿——這樣連「結果不漂亮就不投了」的發表偏誤都一起堵掉。\n\n```text\n預註冊堵的是哪一步\n\n  沒有預註冊：\n    設計 → 收資料 → 【看資料】→ 挑指標/挑子群/挑切法 → 寫成「我本來就要測這個」\n                          ▲\n                          └── 動機性推理在這裡全開（HARKing / p-hacking）\n\n  有預註冊：\n    設計 → 【凍結假設·指標·分析·停止規則·公開存檔】→ 收資料 → 照表分析\n                                                              ▲\n                                                              └── 自由度被鎖死，無從事後挑\n\n  機制上：把「行使研究者自由度」這一步，搬到「看資料之前」\n```\n\n它的工程攣生兄弟你天天用：**先寫測試規格、再實作，不准事後改驗收標準。** 你做 A/B 實驗前先寫好「我看 P99、跑滿七天、誰贏就上線」，然後**就不准中途偷看達標就喊停**（那個偷看就是 p-hacking，見 ch09）。預註冊 ≈ 把驗收標準在動手前凍結。差別只在科學界花了一百年才正式把這件事寫進制度。\n\n但這裡我得當那個焦慮的工程師，戳一下這道防線。**它沒有你以為的那麼牢。** 截至 2026-06，有研究比較了預註冊與非預註冊的論文，發現預註冊在統計檢定力等面向確有好處，**但「預註冊是否真的擋住了 p-hacking 與 HARKing」這件事，實證證據是混合、不一致的**（驗證於 2026-06）。為什麼？因為人會「**鑽**」：預註冊寫得含糊（「我會測認知表現」——那可是十種量法）、收完資料又偷偷偏離計畫不揭露、或者預註冊根本沒人去比對。防線是真的，漏洞也是真的。記住這個形狀——**每一道堵自欺的制度，自己也是一個會被自欺繞過的系統。** 這是本章的暗線，後面每道防線都會再撞到它一次。\n\n## 第三道：同儕審查——堵「個人盲點」\n\n一個人看不見自己的盲點，這幾乎是定義。你 review 自己 PR 看不出 bug，研究者也看不出自己論證裡的洞——因為那個洞正好長在他**想信**的方向上，他的眼睛繞過去了。\n\n同儕審查（peer review）的核心邏輯就是：**換一雙沒有同樣動機的眼睛。** 審稿人不押注你這個結論，於是他能看見你看不見的反例、想不到的混淆、沒做的對照。它是把「你不能 approve 自己的 PR」這條工程鐵律，放大成整個科學界的出版閘門。\n\n這道防線真的擋掉了海量的爛東西，這點別否認。但同樣地，焦慮工程師要戳三個洞——而且這三個洞，**每一個都是另一種動機性推理在審稿端發作**：\n\n```text\n同儕審查：堵了個人盲點，但審稿人自己也帶著動機\n\n   洞一  名氣偏誤\n        審稿人看到大牌作者，分數不自覺給高\n        ← 「他做的，應該沒錯吧」也是一種動機性推理\n        ← 雙盲審稿（隱去作者）就是來堵這個\n\n   洞二  守舊偏誤\n        審稿人傾向放行「符合主流典範」的結果（見 ch08）\n        擋掉超前但顛覆的好東西 ← 塞麥爾維斯被否決的一種放大\n\n   洞三  確認偏誤的審稿版\n        結論若合審稿人胃口，他放鬆審查\n        結論若戳審稿人立場，他吹毛求疵\n        ← 同一套動機性推理，只是換到了守門人身上\n```\n\n第一個洞有個漂亮的修補，也有它自己的混合戰績。**雙盲審稿**（連審稿人也不知道作者是誰）就是來堵名氣偏誤的。有一份對某頂級電腦科學會議的研究發現：改成雙盲後，**最有名作者拿到的分數顯著下降了**——這直接證明了名氣本來在偷偷加分（驗證於 2026-06）。但同一批研究也誠實承認：**沒有任何審稿制度能做到完美匿名**（光憑論文本身、預印本、寫作風格就常能猜出作者），而且整體證據「正面但有異質性」，不是鐵板一塊（驗證於 2026-06）。\n\n看出那個反覆出現的形狀了嗎？**盲法堵了作者端的期望，卻擋不住審稿人端的動機性推理；雙盲審稿堵了名氣偏誤，卻擋不住守舊偏誤。** 你補了一個洞，下一個洞在另一個人身上。這不是說制度沒用——它**極其**有用——而是說，**沒有任何單一防線能堵住全部的自欺，因為自欺會換一個沒被堵住的入口進來。** 這正是為什麼科學需要**一整疊**防線、而不是一條，也是為什麼還需要第四道。\n\n## 第四道：複製——堵「僥倖」（與一切漏網之魚）\n\n前三道防線都在堵「某一個研究者、某一次研究」裡的偏心。但總有漏網的：某次結果就是運氣好、某個 HARKing 沒被抓到、某個審稿人剛好同意作者的偏見。怎麼辦？\n\n**讓別人重做一次。** 而且最好是不押注你結論、甚至**希望你錯**的別人。複製（replication，見 ch13 細談修補制度）是動機性推理的最終清算所：你的偏心可以騙過你自己、騙過審稿人、甚至騙過第一批讀者，但它騙不過一個獨立的、抱著不同期望的團隊重新跑一遍。如果你的效果只是你想要它存在才「看見」的，**它在別人手上就消失了。**\n\n這就是為什麼再現性危機（見 ch09）其實是好消息的一面：那些未能穩健複製的效應之所以被抓出來，正是因為複製這道防線**啟動了**。一個從不複製、從不認錯的體系（見 ch12 的偽科學），你連它哪裡錯了都永遠不會知道。\n\n但你已經猜到我要說什麼了——這道防線也漏。複製研究**本身**也由人做，做的人也可能有動機（想推翻名家成名、或想護航自己學派）；而且科學界長期**不獎勵**複製（期刊愛登新發現，不愛登「我重做了某某、確實成立」），於是複製做得太少。防線是對的，執行有缺口。\n\n## 脊椎透鏡：瘴氣派否決塞麥爾維斯，缺的是哪幾道防線\n\n現在把這四道防線當尺，回去量我們的脊椎案例。**這是脊椎的塞麥爾維斯案，現在換「制度防線」這個透鏡看。**\n\n提醒守住誠實版（見 ch01）：塞麥爾維斯有扎實的兩病房對照（醫師 98.4‰ vs 助產士 36.2‰，1840–46 同院同期）、有戲劇性的介入效果（全年版 1846 約 13% → 1848 約 1.27%），**卻拿不出機制**（細菌說 1860s–80s 才立），又**被整個醫界否決**。我們在 ch08 用典範與研究綱領解釋過「為什麼被否決」。本章補上一個誠實但要小心拿捏的面向——**動機性推理在否決他的醫師那一邊，扮演了多少角色？**\n\n```text\n塞麥爾維斯被否決：缺了哪幾道制度防線\n\n  動機性推理在否決端的可能角色：\n    承認「洗手有效」＝承認「是我們的手，害死了那些產婦」\n    這是一個情感與聲譽上極難接受的結論\n    → 醫師有強烈的動機去「找理由不信」（找替代解釋、挑他資料的毛病）\n    ⚠ 誠實標示：這是「多因之一」的合理推測，不是唯一原因，更不是\n       「醫師太蠢／太壞」的道德故事（見 ch08：機制缺失、瘴氣典範、\n        他發表慢與性情、職場政治都各佔一份）\n\n  但本章的重點不在心理剖析，在制度的缺席 ──\n\n  1847 年缺的防線  →  若當時有，會發生什麼\n  ─────────────────────────────────────────────\n  盲審             →  反對者的名氣與地位無從替「不信」加分\n  預註冊式紀錄      →  他的對照與數字有公開、可被照表檢核的版本\n  系統性複製要求    →  別處重做（他調職後確有降死亡率），制度會\n                      逼大家正視，而非各說各話\n  結構化同儕審查    →  強迫反對者寫下「要什麼證據才肯信」，把\n                      怎樣都對的搪塞逼成可證偽（見 ch04）\n```\n\n關鍵的教學點：**1847 年的醫界不是缺德，是缺制度。** 同一批醫師，如果活在一個有盲審、有預註冊、有複製要求、有結構化審查的科學體系裡，他們**個人**的動機性推理（不想承認自己害死人）會被制度一層層擋住、稀釋、逼到檯面上對質。動機性推理是人腦的常數，**1847 和 2026 的醫師腦袋一樣會自欺**；變的是外面那層制度防線蓋得多厚。塞麥爾維斯的悲劇，有一半是「他撞上了一個防線還沒蓋起來的時代」。\n\n這也是本章扣回中央張力的地方：**科學不是靠科學家更高尚來防自欺，是靠制度假設科學家會自欺、然後圍著這個假設蓋牆。** 牆有縫，但有牆，遠勝沒牆。\n\n## worked example：四道防線，各堵哪一種偏心\n\n把本章收成一張表——這是焦慮工程師最愛的東西：把「人會怎麼自欺」和「制度怎麼堵」一一對齊，順便標出**每道防線自己的漏洞**（因為假裝防線完美，本身就是一種自欺）。\n\n```text\n科學制度防線：堵哪種偏心／機制／它自己的漏洞（一道一段）\n\n  [盲法（雙盲）]\n     堵的偏心：期望污染量測（羅森塔爾老鼠）\n     機制    ：量測者不知分組，期望無從注入被測物\n     自己的漏洞：有些研究無法盲（如外科手術）；可能中途解盲\n\n  [預註冊]\n     堵的偏心：事後挑分析（HARKing／p-hacking）\n     機制    ：把「行使研究者自由度」凍結在看資料之前\n     自己的漏洞：寫得含糊、偷偷偏離不揭露；實證是否真擋住，\n               證據混合（2026-06）\n\n  [同儕審查]\n     堵的偏心：個人盲點（看不見自己想信方向上的漏洞）\n     機制    ：換一雙沒同樣動機的眼睛找洞\n     自己的漏洞：審稿人自己帶名氣偏誤、守舊偏誤、確認偏誤；\n               雙盲審稿也堵不全\n\n  [複製]\n     堵的偏心：僥倖＋一切漏網之魚\n     機制    ：不押注你結論的別人重做，騙得了你騙不了獨立團隊\n     自己的漏洞：複製者自己也有動機；科學界不獎勵複製，做得太少\n\n  讀法：前三行是「制度怎麼防自欺」，最後一行是「為什麼還需要下一道」。\n  四道防線疊起來，不是因為任何一道夠用，是因為自欺會換沒被堵的入口進來。\n```\n\n把這張表念給另一個工程師聽，他應該立刻認出每一段最後那行「自己的漏洞」——你們系統裡也是這樣：沒有任何單一防線（型別檢查／單元測試／code review／canary）能擋住全部 bug，你**疊**起來，因為每一層漏掉的，下一層補一點。科學的防自欺架構，和你的縱深防禦（defense in depth）是同一個思想。\n\n## 直覺的陷阱\n\n**具名陷阱：「我很客觀，所以這套防線是給別人用的。」**\n\n這是本章——也可能是整本書——最危險的一句話。它危險，正因為它**讀起來像免疫，實際是病灶。**\n\n```text\n錯誤直覺怎麼一步步把你帶下溝\n\n  第 1 步：你讀完本章，認同「人會動機性推理」\n  第 2 步：你想到的例子，全是「別人」——那個甩鍋的同事、那個 p-hack 的研究者\n  第 3 步：你心裡浮出「還好我比較有自覺、我會檢查自己」\n  第 4 步：於是你對自己的判斷放鬆了警惕 ← 溝在這裡\n           （你用「我有自覺」當理由，跳過了本來該做的對照與複製）\n\n  破口：「我很客觀」這句話的真假，剛好就是動機性推理最會作假的地方\n```\n\n這不是修辭。心理學家普羅寧（Emily Pronin）等人 **2002 年**描述了「**偏誤盲點**」（bias blind spot）：人們普遍認為自己比一般人**更不**容易有偏誤——研究中約 **85%** 的人認為自己比群體平均更客觀（這效應在 2024 年一份預註冊複製研究中再次被支持，相對站得住，驗證於 2026-06）。為什麼？因為你判斷別人有沒有偏誤，是看他的**行為**（看得到）；判斷自己有沒有，是靠**內省**（introspection）——而內省的時候，動機性推理感覺起來就像「清晰的思考」，於是你得出結論：「我很客觀。」\n\n把這個機制吃進去，你就懂為什麼**「我很客觀」本身是個警訊**。一個真正在防自欺的人，不會宣稱自己客觀——他會**假設自己不客觀**，然後去做對照、找人 review、要求複製。客觀不是一種你可以擁有的內在狀態，是一套你套在自己身上的**外部程序**。這正是科學的全部祕密：它不相信任何人客觀，包括最偉大的科學家，所以它用制度逼大家把判斷攤到陽光下。\n\n自我察覺的鉤子：**下次你聽見自己（或別人）說「相信我，我很客觀／我沒有立場」，把它當成一個告警。** 不是說那人不誠實——他多半真心這麼覺得——而是這句話結構上不可能由內省可靠地得出。可靠的版本是：「我可能有偏心，所以我做了 X、Y、Z 來逼自己面對反例。」前者是宣稱，後者是程序。
