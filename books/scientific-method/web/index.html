  （『追蹤十萬人十年』聽起來很硬）   一杯紅酒的人＝社經高、\n                                    醫療好、作息穩\n  把『滴酒不沾』當對照組             #4 反向——不沾酒的人裡\n                                    混了『因病戒酒』者，他們\n                                    本來就病了 → 假裝喝酒護身\n  測了 15 種終點（心臟病、癌症、     #5 p-hacking——挑『全因\n  失智、死亡…），只報最漂亮的那個    死亡率』因為它剛好顯著\n  只投/只報正面結果                  #7 發表偏誤\n  樣本全是某次健檢的中產白領         #11 代表性——推不到全人口\n  找一位營養學教授背書              #10 訴諸權威\n ──────────────────────────────────────────────────\n  外觀：『十萬人、十年、教授背書、低 18%』——唬人。\n  真相：六種自欺疊起來的相關。\n```\n\n關鍵的反問——**這些手法裡哪些天天發生在真誠研究裡？** 答案是**幾乎全部**。這正是 ch09 那條最深的洞見（T6）：\n\n- **#3 混淆**：絕大多數營養流行病學就是觀察性的，因為你沒法把人隨機指派去喝十年紅酒——研究者不是壞人，是這個題目天生只能觀察，混淆排不掉是結構性的。\n- **#4「戒酒者污染對照組」**：這是真實的「sick quitter」效應，誤導了整個世代的「適量飲酒有益」文獻——沒人故意，是分組定義的盲點。\n- **#5 多重終點挑漂亮的**：在「研究者自由度」下無意間發生（ch09 的 garden of forking paths），不必有作弊意圖。\n\n所以這題的震撼點：**一個真誠的研究者，可以完全不造假，卻產出一個和「精心設計的假研究」幾乎一樣的結果**——因為自欺的結構不需要惡意，只需要一連串各自合理的選擇。這就是為什麼你需要的是制度防線（盲法、預註冊、複製，ch11/ch13）而不是「相信研究者人很好」。常見錯路：以為「假研究」必須有人主觀惡意——恰恰相反，最難防的假，是真誠的人做出來的。\n\n### 第 3 題（★）**[10 分鐘]**：脊椎重講\n\n不看書，用自己的話，把塞麥爾維斯案用這張失敗模式目錄掃一遍：他**通過了哪幾條關鍵的**（至少講三條，並說每條為什麼通過）、**栽在哪一條**（並說為什麼那條對他是致命的）。最後一句總結：失敗模式目錄抓得出爛研究，但它抓不出塞麥爾維斯的悲劇，為什麼？\n\n### 推演解答\n\n要點：**通過的關鍵三條**——(a) #3 混淆：兩病房同院同期、單雙日交替分配＝準隨機，把混淆變因平均掉了，這是他最硬的一格；(b) #8 未複製：他調職後在別處也降死亡率，其實**被複製過**；(c) #5 p-hacking：效果是「腰斬」等級而非「勉強 p<0.05」，不是挑出來的脆弱顯著。**栽的那條**——#9 無機制：他講不出細菌機制（Pasteur/Koch 在他死後才立起），這對他致命，因為當時的社群「沒有為什麼就不信」，機制缺失加上挑戰瘴氣典範、加上他發表慢性情差，導致一個有效又被複製過的療法被否決二十年。**總結**：失敗模式目錄是「方法論」的篩子，塞麥爾維斯的方法論幾乎滿分——他輸在目錄管不到的兩個地方：缺機制（ch14）與社群否決（ch08）。所以這張表是**必要但不充分**：它幫你過濾掉爛研究，但「方法全對、缺機制、生不逢時」這種悲劇，表抓不出來。常見錯路：把他寫成「發現細菌的英雄」——他沒有細菌理論，這正是他栽的那格，寫成英雄就毀了這案例的教學點。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼這章是「目錄」而不是「流程圖」？防禦性知識為什麼天生是清單式、不是步驟式的？\n2. 四個失敗模式家族（看到的不是事實／因果被偷渡／統計被玩／證據被篩過）各是什麼意思？給每個家族舉一條屬於它的失敗模式。\n3. 為什麼「我們調查了 240 萬人」不能保證結論可靠？樣本量壓低的是哪種誤差、壓不了哪種？\n4. 回歸均值如何在「沒有任何人作弊」的情況下製造假療效？它唯一的解藥是什麼，為什麼？\n5. 發表偏誤（檔案抽屜問題）為什麼讓「目前所有研究都支持 X」這句話**幾乎沒有資訊量**？它的工程版（只看成功案例的技術選型）長什麼樣？\n6. 為什麼「我掃過檢查表了所以我很客觀」是個警訊？檢查表的三個自我盲區是什麼？\n7. 塞麥爾維斯案用這張表掃，幾乎滿分卻仍被否決——這說明這張表是「必要」還是「充分」？差在哪兩格（表外的）？\n8. 用一句話講：為什麼絕大多數科學自欺**不是謊言**，卻照樣騙到你？\n\n## 延伸閱讀\n\n- **Robert Rosenthal, \"The file drawer problem and tolerance for null results\"（*Psychological Bulletin*, 1979）**——「檔案抽屜問題」一詞的出處。讀它對「文獻是倖存者展示櫥窗」這個結構的原始論證；本章 #7 的源頭。\n- **1936 *Literary Digest* 民調案例（多處統計教材有收，如賓州大學的 1936 election case study）**——「大樣本治不好偏斜」最乾淨的教科書案例。讀它看「240 萬樣本錯 19 個百分點」是怎麼發生的；本章 #11 的源頭。\n- **Stephen Senn 等談回歸均值的醫學統計文獻（如 PMC 上 \"Assessing regression to the mean effects in health care initiatives\"）**——把「按極端值挑人再量」如何偽裝成療效講透。本章 #12 的延伸；讀它你會對所有「前後對比、無對照組」的宣稱永久免疫。\n- **Simmons, Nelson & Simonsohn, \"False-Positive Psychology\"（*Psychological Science*, 2011）**——研究者自由度與 p-hacking 的奠基文（landscape 驗證）。讀第 2 題那種「真誠的人也會挖到假寶」為何成立；對應本章 #5、#6。\n- **本書 ch09（p 值與它的背叛）與 ch11（動機性推理）**——這張表的兩個最深的「為什麼」：統計怎麼被玩、人為什麼偏心地用檢查表。表讓你不安的格子，多半通回這兩章。\n- **跨書：《思考的陷阱》談確認偏誤與動機性推理的那章**——本章具名陷阱（「我有檢查表所以我客觀」）的心理機制在那邊；本書講「制度與工具怎麼防」，它講「個人心理為何防不住」。\n"}, {"id": "ch17-engineers-scientific-attitude", "file": "ch17-engineers-scientific-attitude.md", "group": "Part V — 信任、收束與帶走", "title": "ch17 — 工程師的科學態度：把全書搬回你的系統", "md": "# ch17 — 工程師的科學態度：把全書搬回你的系統\n\n> **本章解決什麼問題**：前面十六章，你一直在讀「別人怎麼做科學、科學怎麼防自欺、科學怎麼失靈又怎麼修補」。ch16 把所有失敗模式收成一張檢查表，那是你讀**別人**的科學宣稱時用的。本章把方向掉轉一百八十度——不是讀別人的科學，是做**你自己**的工程判斷。全書講的那一整套防自欺習慣，哪些是可攜的、能直接搬進你的 post-mortem、技術選型、效能優化、容量規劃？這一章把它們打包成一個工程師版的「科學循環」，並誠實處理一個關鍵問題：科學態度什麼時候會過頭——不是每個決定都值得做 RCT，怎麼分清哪些賭注大到值得認真防自欺、哪些不值得。這是 Part V 的倒數第二章，也是 ch18 收官總對帳前的最後一次「把工具拿在手上用」。\n\n## 從你已知的出發\n\n你其實已經是個科學家了，只是沒人這樣跟你說過，而且你做得時好時壞。\n\n回想你上一次認真做的效能優化。比方說那個經典場景：某個 API 的 P99 延遲長期卡在 800ms，你懷疑是 RDS 上一條沒走索引的查詢在拖。你做了什麼？如果你是個還能保住飯碗的工程師，你**不會**直接「我覺得是這條 query」就上去加個索引、改完宣布搞定。你會：先拉 profiling、把慢查詢日誌攤開、確認那條 query 真的佔了延遲的大頭（**量測**）；形成一個明確的猜測「這條全表掃描是主因」（**假說**）；推出一個可被打臉的預測「如果是它，加上索引後 P99 應該掉到 200ms 以下，而且 RDS CPU 會跟著降」（**可被推翻的預測**）；在 staging 上只改這一個索引、別的不動，跑同一批壓測（**對照**）；看到 P99 真的掉到 180ms、CPU 從 70% 降到 40%（**證據**）；然後——這一步最常被跳過——你不會只跑一次就宣布勝利，你會多跑幾輪、換幾個時段，確認不是某次剛好流量低（**複製**）；最後你想搞清楚**為什麼**降這麼多，是索引讓掃描行數從百萬降到幾百，這個機制講得通（**機制**），你才敢把結論寫進 PR 描述、敢說「真的修好了，不會復發」（**結論**）。\n\n把這串動作的名字連起來看：\n\n```text\n量測 → 假說 → 可被推翻的預測 → 對照 → 證據 → 複製 → 機制 → 結論\n```\n\n這就是科學循環。你做得好的那幾次，是因為你（多半是無意識地）走完了大半圈；你做砸的那幾次——「重啟就好了，關 ticket」「改了三個東西指標動了，反正動了就好」「跑一次綠就上線」——是因為你在某一步偷懶，而**每一步偷懶都對應前面某一章講過的一種自欺**。本章不是要教你新東西，是要把你工程直覺裡這套循環**顯式化**，給每一步貼上「它在防哪種自欺」的標籤，讓你下次偷懶時心裡會「咯噔」一下。\n\n說得更直白：前十六章是把科學拆開給你看零件；這一章是把零件裝回去，裝進**你的**系統。中央張力在這裡換了個說法——**科學態度不是某種你偶爾切換進去的「研究模式」，是一套你對自己的判斷保持誠實的日常衛生習慣。** 它的全部目的還是那句老話：有系統地把自己被騙的機會壓到最低。只是這次被騙的人是你，騙你的人也是你。\n\n## 科學態度的可攜核心：八個你帶得走的習慣\n\n把全書濃縮成「遇事我該對自己做的自我盤問」，大概是這八條。它們不是流程步驟（流程下一節講），是**態度**——是你在做任何技術判斷時，腦子裡該常駐的八個聲音。每一條後面我標了它的出處章，這樣你知道它不是我隨口編的格言，是前面論證過的東西。\n\n```text\n工程師的科學態度：八個可攜習慣（每條註明出處與它防的自欺）\n\n  1. 先問「我怎麼知道」                    （ch01 起手式）\n     在相信任何結論前，先問它的證據是什麼、品質如何。\n     防的自欺：軼事當數據、印象當事實。\n\n  2. 警惕「我親眼看到」                    （ch02 理論負載）\n     你看到的已經被你的指標選擇、閾值、預期 baseline 塑造過。\n     防的自欺：以為自己看到的是「裸事實」。\n\n  3. 要求可被推翻的預測                     （ch04 可證偽）\n     好假說要能說「如果我對，你會看到 X；看不到 X 我就錯了」。\n     防的自欺：怎樣都能自圓其說的「萬能解釋」。\n\n  4. 做對照、控制變因                       （ch05 對照引擎）\n     一次只改一個你關心的東西，留個比較基準。\n     防的自欺：「同時改了三個、指標動了」的歸因錯亂。\n\n  5. 相關不等於因果，先抓混淆變因           （ch06 因果）\n     兩件事一起動，先問有沒有第三個原因同時推著它倆。\n     防的自欺：把巧合或共因當成因果。\n\n  6. 一次結果不算數，複製再下結論           （ch09/ch13 複製）\n     僥倖會偽裝成效果；多跑幾次、換條件，濾掉僥倖。\n     防的自欺：單次顯著、flaky 的綠燈、偷看資料就收手。\n\n  7. 區分「有效果」與「有機制」              （ch14 機制）\n     「重啟就好了」是有效果無機制——你不知道它會不會復發。\n     防的自欺：黑箱有效當成真懂、把碰巧當成搞定。\n\n  8. 對自己的客觀性保持懷疑                  （ch11 動機性推理）\n     你最容易放過的，是支持你既有結論的爛證據。\n     防的自欺：「我很客觀」這句話本身（見下文陷阱）。\n```\n\n我認為這八條裡，**第 1 條和第 8 條是地基，其餘六條是工具**。第 1 條「我怎麼知道」是所有防自欺的起點——它把你從「相信」切換到「檢查」。第 8 條「對自己的客觀性保持懷疑」是所有防自欺的天花板——因為前面七條工具，每一條都可以被你的動機性推理偷偷繞過（你會「不小心」挑對自己有利的對照、會「剛好」在達標時停止複製）。承認自己會這樣，是用好其他七條的前提。\n\n這八條沒有一條是我發明的。它們是塞麥爾維斯（Ignaz Semmelweis）案被全書十層透鏡照過之後，留在你手上的結晶。\n\n## 工程師的科學循環：不是中學那個五步驟\n\n現在把態度組裝成流程。你大概在國中自然課看過一張「科學方法五步驟」流程圖：觀察 → 假設 → 實驗 → 分析 → 結論，畫成一條從上到下的直線，彷彿做科學就是照表操課走一遍就交差。\n\n**那張圖是錯的，或至少是誤導的。** 全書十六章如果有教你一件事，那就是：科學不是一條直線跑完的管線，是一個**會回頭、會卡住、會推翻自己重來**的迭代迴圈。把它畫成工程師版，長這樣：\n\n```text\n工程師的科學循環（迭代，不是一次性管線；箭頭往下走，\n                    虛線是「否證成功就回上游」的回頭路）\n\n   ┌──────────┐\n   │ 1. 觀察  │   量測：指標、log、profiling\n   └────┬─────┘   （ch01：先有系統性比較，不靠印象）\n        ▼\n   ┌──────────┐\n   │ 2. 假說  │   溯因：跳到最能解釋症狀的根因\n   └────┬─────┘   （ch03：這是 IBE，不是歸納也非演繹）\n        ▼\n   ┌──────────┐\n   │ 3. 可被  │   演繹：「如果是它，我應該看到 X」\n   │  推翻的  │   （ch04：說不出反例的假說是壞假說）\n   │  預測    │\n   └────┬─────┘\n        ▼\n   ┌──────────┐\n   │ 4. 實驗  │   對照：只改一個變因、留比較基準\n   └────┬─────┘   （ch05/ch06：切斷混淆，別歸因錯亂）\n        ▼\n   ┌──────────┐\n   │ 5. 更新  │   貝氏：證據抬高還是壓低這個假說？\n   └────┬─────┘   （ch07：強證據＝假說真才會出現的觀察）\n        ▼ ····► 預測沒中／證據壓低？回第 2 步換假說\n        ▼        （否證成功，這是好事，不是失敗）\n   ┌──────────┐\n   │ 6. 複製  │   複製：多跑幾次、換條件，濾掉僥倖\n   └────┬─────┘   （ch09/ch13：一次綠不算數）\n        ▼ ····► 複製失敗？回第 4 步，這是 flaky\n        ▼\n   ┌──────────┐\n   │ 7. 機制  │   問「為什麼」：有效果還要有機制\n   └────┬─────┘   （ch14：黑箱有效不等於真懂）\n        ▼\n   ┌──────────┐\n   │ 8. 結論  │   暫定結論：永遠帶著「在測過的範圍內」\n   └──────────┘   （ch10：科學的真是暫定收據，不是鐵證）\n```\n\n注意這張圖跟中學那張的三個根本差別，每一個都是全書某章的回收：\n\n- **它有回頭箭頭。** 預測沒中、複製失敗，你回到上游換假說、重做實驗——而且這**不是失敗，是循環正常運作**（ch04：否證成功是科學的標誌；ch10：科學結論本就可修正）。中學那張圖讓你以為「結論」是終點；真實的循環裡，結論只是「目前還沒被否證的暫定收據」，隨時可能因為一個新觀察被踢回第 2 步。\n- **它把「假說從哪來」獨立成一步（溯因）。** 中學圖直接從觀察跳到假設，彷彿假設會自己長出來。ch03 戳破了這個——你做 root cause 時「跳到最像的嫌疑犯」那一刻是**溯因（IBE）**，是創造性的一躍，不是機械推導。承認這一步是溯因，你才會記得「最像的嫌疑犯不一定是真兇」，才會回頭做可否證的檢驗。\n- **它把「複製」和「機制」獨立成步驟。** 中學圖在「實驗→結論」之間什麼都沒有，於是訓練出一堆「跑一次成功就結案」的人。真實循環裡，一次成功和可複製是兩回事（ch09/ch13），有效果和有機制是兩回事（ch14）——塞麥爾維斯的悲劇正是栽在「有效果、被複製過、卻說不出機制」這個縫裡。\n\n這張循環圖就是本章的脊樑。它不是要你每次改一行程式都跑完八步——那叫教條，下文「科學態度何時過頭」會處理。它是一張**地圖**，讓你在任何技術判斷裡都能定位：我現在在第幾步？我跳過了哪一步？那一步本來防的是哪種自欺？\n\n## 「強意見，弱持有」：可證偽態度的工程版\n\n有一句在工程圈流傳很廣的話，叫「**強意見，弱持有（strong opinions, weakly held）**」——這句話常被歸給科技預測家保羅・薩弗（Paul Saffo），由未來研究所（Institute for the Future）推廣，後來被組織行為學者 Bob Sutton 等人帶進科技圈（出處與確切歸屬有不同說法，這裡 hedge，2026-06）。它的意思是：要敢於形成清楚、強硬的判斷（不要當那種「都有道理啦」的和稀泥的人），但要隨時準備好在證據出現時放掉它。\n\n剝掉勵志包裝，這句話**就是 ch04 可證偽態度的個人版**：\n\n```text\n「強意見，弱持有」拆成科學態度\n\n  「強意見」      = 敢做出明確、冒風險的判斷\n                   （ch04：好假說要冒風險、要可被推翻，\n                    不是怎樣都對的廢話）\n                   工程版：「我賭是這條 query 拖垮 P99」\n                   ——明確到可以被一次量測打臉\n\n  「弱持有」      = 證據一翻盤就放掉，不護航、不找補\n                   （ch11：對抗動機性推理——你最捨不得放的，\n                    往往是你投入最多、最想對的那個結論）\n                   工程版：加了索引 P99 沒降？立刻回第 2 步換假說，\n                   不去硬掰「一定是快取沒熱」來保住原判斷\n```\n\n但這句話有個**著名的被濫用方式**，得誠實標出來（2026-06 工程圈早有批評）：很多人用「強意見、弱持有」當**逃避責任的擋箭牌**——平常嘴最硬、最不聽人勸（強意見），出事了就「啊我本來就說是弱持有嘛」一句話卸責（假裝弱持有）。真正的「弱持有」不是嘴上說說，是**事先講好什麼證據會讓你改變主意**。這跟可證偽一模一樣：一個假說可不可證偽，看的不是它聽起來多開放，是它**事先指定了什麼觀察能推翻它**。所以這句格言要可操作，得加一句工程版的補丁：\n\n> 強意見、弱持有——但「弱持有」必須事先寫下：「如果我看到 ＿＿，我就承認錯了。」 寫不出那個 ＿＿，你的「弱持有」就是假的，你的意見其實是 ch04 講的「怎樣都對」。\n\n這個補丁把一句容易淪為自我安慰的格言，釘回了可證偽的硬地面。\n\n## 脊椎透鏡：如果塞麥爾維斯是你團隊的工程師\n\n最後一次（在 ch18 總對帳前）戴上透鏡，回看脊椎的塞麥爾維斯洗手案——這次換個玩法。前面每一章都問「當時的他做對／做錯了什麼」，本章問一個假設性的問題：**如果塞麥爾維斯今天是你團隊的後端工程師，他這次「洗手降死亡率」的調查，在 code review／incident review 裡會拿到什麼評價？**\n\n```text\n塞麥爾維斯的 incident review（用工程師的科學循環逐步打分）\n\n  循環步驟        他做了什麼                          評價\n  ─────────────────────────────────────────────────────────\n  1 觀察/量測     兩病房死亡率系統性比較               ✅ 漂亮\n                  （98.4‰ vs 36.2‰，不靠軼事）         （ch01：教科書級的量測）\n\n  2 假說/溯因     從 Kolletschka 之死跳到               ✅ 漂亮\n                  「屍體微粒經手傳染」                  （ch03：IBE 的範本）\n\n  3 可被推翻      「如果是它，洗手後死亡率該降」         ✅ 漂亮\n    的預測        ——明確、可被打臉                     （ch04：冒了風險）\n\n  4 對照/實驗     單雙日交替分配 ≈ 準隨機對照；          ✅ 大致漂亮\n                  洗手令 = 介入                        （ch05：缺雙盲，但對照硬）\n\n  5 證據更新      洗手後死亡率確實劇降                  ✅ 強證據\n                  （1846 約 13% → 1848 約 1.27%）       （ch07：後驗大幅抬高）\n\n  6 複製          調職後在別處也重現了降幅              ✅ 有複製\n                                                       （ch13：濾掉了僥倖）\n\n  7 機制          說不出「為什麼」                      ❌ 卡死在這裡\n                  （無細菌理論，Pasteur/Koch 之後才有） （ch14：被否決的關鍵）\n\n  8 結論/溝通     發表慢、文筆與性情不利說服            ❌ 致命傷\n                  把否決他的人罵成殺人兇手              （ch08：制度溝通全盤皆輸）\n```\n\n把這張表唸一遍，你會發現一件讓人發涼的事：**塞麥爾維斯這次 incident review，技術調查部分（第 1–6 步）幾乎是滿分的——比你我大多數真實 incident 做得都好。** 他輸在第 7 步（機制）和第 8 步（結論的溝通與制度說服）。\n\n這對一個工程師有極其具體的教訓：\n\n- **第 7 步的教訓**：你修好一個生產問題，指標漂亮、複製過了——但如果你說不出**為什麼**（「重啟就好了，不知道為啥」），你其實只走到第 6 步。你敢不敢關 ticket？塞麥爾維斯敢，結果他被質疑「你連為什麼有效都說不清，憑什麼要我們改流程」。**機制是你從「碰巧有效」升級到「我真的搞懂了、它不會復發」的那張門票**（ch14 也誠實講過：有些東西先有效、後懂機制是常態，黑箱有效不該被輕視——但你至少要**知道自己缺機制**，把它標成風險，而不是假裝搞定了）。\n- **第 8 步的教訓**：這是塞麥爾維斯最被低估、也最該被工程師記住的一課。他的科學做得近乎完美，**卻死在溝通與制度**——他不發表、發表了文筆又差、被質疑就破口大罵。一個 incident 調查做得再漂亮，如果你寫不出讓 reviewer 信服的 post-mortem、如果你把不同意你的人當敵人，你的正確結論**一樣會被否決**。科學的最後一哩不是「我對」，是「我能讓這個分工信任網裡的其他人，基於可檢驗的證據，理性地接受我對」（ch08 社群、ch15 證詞）。塞麥爾維斯是「對的科學、輸的溝通」的永恆紀念碑。\n\n**守住誠實版**（全書紅線）：別因為這張表前六步給了滿分，就把他重新捧成「發現細菌的英雄」。他沒有細菌理論、他缺機制、他被否決、他憂鬱而終。他是一個**做對了大半科學循環、卻栽在機制與制度溝通上**的工程師——而這恰恰比「孤膽英雄」的版本，對你我有用一百倍。因為你我每天面對的，正是「技術上我可能對，但我說得清機制、講得服團隊嗎」這個真實難題。\n\n## 科學態度何時會過頭：賭注 vs 成本\n\n到這裡我得踩一下煞車，否則本章會變成另一種教條——「凡事都要走完八步循環、凡事都要 RCT」。**那是錯的，而且是一種偽裝成嚴謹的不嚴謹。**\n\n科學態度是有成本的：做對照要時間、複製要重跑、追機制要深挖。對一個**賭注很小、容易回滾**的決定，硬套全套循環是浪費，甚至是逃避決策的拖延。判準很簡單，就一條軸：\n\n```text\n這個決定值得多少防自欺成本？——看賭注 × 不可逆性\n\n  ┌─ 賭注大 + 難回滾  →  走完整循環，要對照、要複製、要機制\n  │\n  │   例：資料庫 schema 大遷移、計費邏輯改動、\n  │       不可逆的資料刪除、影響全站的架構決策\n  │   → 值得 A/B test、值得漸進式放量、值得預註冊式紀錄、\n  │     值得追到機制才上\n  │\n  ├─ 賭注小 + 易回滾  →  快速試、看結果、錯了回滾就好\n  │\n  │   例：調一個 UI 文案、改個 log level、\n  │       試一個容易切回的快取參數\n  │   → 別開 RCT，直接上 feature flag 試，\n  │     壞了關掉。做對照的成本 > 猜錯的成本\n  │\n  └─ 校準＝把嚴謹花在賭注大、不可逆、難察覺自欺的地方\n```\n\n這條判準本身就很科學——它是**把資源花在最可能騙到你、且騙到你代價最大的地方**。對一個五分鐘能回滾的文案改動做嚴格對照，跟對一個不可逆的計費遷移「憑感覺就上」，是同一種錯誤的兩面：**前者是把防自欺成本花錯地方，後者是該防的時候沒防。** 成熟的科學態度不是「永遠最嚴謹」，是**校準**——在賭注大、不可逆、難察覺自欺的地方加倍嚴謹，在賭注小、可回滾、反饋快的地方果斷快試。\n\n> 一個容易被忽略的不對稱（焦慮工程師的提醒）：「易回滾」這個判斷本身常常是**自欺的重災區**。你以為某個改動「壞了關掉就好」，但它可能已經寫髒了資料、已經讓下游快取了錯誤狀態、已經觸發了不可逆的外部副作用（發出去的通知、扣掉的款）。**在把一個決定歸到「賭注小、易回滾」那一格之前，先用 ch16 的檢查表問一句：它真的可逆嗎？我憑什麼相信它可逆？** 把「可逆」當成不證自明的免死金牌，是這條判準最危險的漏洞——這也正是 ch02 理論負載的回聲：你「看到」的「這個改動很安全」，已經被你「希望它安全」的預期塗過色了。\n\n這條「賭注 vs 成本」的校準，把全書從「科學態度真好，凡事都該如此」這種廉價結論，拉回到一個工程師真正用得上的位置：**防自欺是一種要分配的資源，不是一種要無差別崇拜的姿態。** 賭注大小決定你該花多少。決策的賭注與期望效用怎麼正式權衡，是另一本書的主場（見《決策與理性》談賭注大小／期望效用的那章）；本章只給「大賭注加嚴、小賭注快試」這個工程師夠用的直覺。\n\n## 直覺的陷阱\n\n把全書搬回自己系統時，最常見的翻車不在「不懂科學態度」，而在「自以為已經有了」。守住下面的正確版。\n\n| 陷阱（你會這樣想） | 它在哪一步帶你下溝 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **「我很客觀／我是數據驅動的」**（最危險） | 你以為宣告客觀就等於做到客觀，於是放下戒心——而戒心正是客觀的唯一來源 | 「我很客觀」這句話本身是警訊（ch11）。真正在防自欺的人不會宣告自己客觀，會宣告「我這裡可能在騙自己，我設了哪些閘來抓自己」。自我察覺：當你聽到自己（或別人）說「我純粹看數據」，立刻問「哪些數據被你略過了、為什麼略過」 |\n| **「我跑過實驗了 / 我做了 A/B test，所以我嚴謹」** | 你把「做了實驗」這個動作當成嚴謹本身，忽略實驗可能偷看、可能 p-hack、可能根本沒對照 | 做實驗 ≠ 做對實驗（ch05/ch09）。問：有沒有偷看著達標就停？有沒有同時看了十個指標挑一個顯著的？對照組是不是只差你關心的那一個變因？「做了實驗」是必要不是充分 |\n| **「科學循環＝每件事都走完八步」** | 你把校準誤當教條，對小賭注決定也硬套全套，於是用嚴謹當拖延的藉口 | 嚴謹是要校準的（上一節）。賭注小、易回滾的事果斷快試；把防自欺成本花在賭注大、不可逆、難察覺的地方。對五分鐘能回滾的事做 RCT，跟對不可逆遷移憑感覺上，是同一種不嚴謹 |\n| **「強意見、弱持有——我很開放」** | 你用「弱持有」當卸責擋箭牌：平常最嘴硬，出事就說「我本來就弱持有嘛」 | 弱持有必須事先寫下「什麼證據會讓我改變主意」（ch04 可證偽）。寫不出那個觸發條件，你的「弱持有」是假的、你的意見其實怎樣都對 |\n| **「我有 root cause 了，所以結案」** | 你把「找到一個說得通的解釋」當成「找到真正的根因」，忘了溯因不保真 | 你的 root cause 是溯因出來的最佳候選，不是被證明的真兇（ch03）。問：有沒有競爭解釋我沒排除？我有沒有做可否證的驗證（不是只有「這樣解釋得通」）？「解釋得通」是最低標，不是結案線 |\n\n具名陷阱，展開最危險的那個——**「我很客觀」自證式幻覺**。為什麼它最危險？因為它是個**自我關閉的迴路**：你越相信自己客觀，就越不去檢查自己的偏心，於是越容易被偏心帶著走，而每一次被帶著走你都會解釋成「我只是客觀地跟著數據」。塞麥爾維斯案裡那些否決他的醫師，沒有一個覺得自己不客觀——他們真心相信自己是依據主流醫學知識在做專業判斷。**動機性推理最毒的地方，就是它讓你感覺不到它**（心理機制見《思考的陷阱》談確認偏誤／動機性推理的那章；本書講的是制度與習慣怎麼防它）。怎麼自我察覺？把「我很客觀」這個念頭本身當成觸發器：每次它冒出來，強迫自己回答一個具體問題——「如果我錯了，我會在哪裡先看到？我有沒有真的去那裡看？」 一個真在防自欺的工程師，手上永遠有一張「我可能在哪裡騙自己」的清單；一個宣告自己客觀的工程師，手上是空的。**這張清單空不空，比你的職級、比你多聰明，更能預測你會不會栽。**\n\n## 紙上推演\n\n下面三題，純紙筆。先自己想，再讀解答。\n\n### 第 1 題（★★）**[20 分鐘]**：把一次效能優化重述成完整的科學循環\n\n挑一次你真正做過的效能優化（沒有的話用這個：某 API 的 P99 從 800ms 經你調整後降到 200ms，你當時加了一個資料庫索引）。把它逐步映射到本章的八步循環（觀察→假說→可推翻的預測→實驗→證據更新→複製→機制→結論），並在每一步標出「這一步在堵哪一種自欺」。然後誠實回答：你當時**實際上**跳過了哪一步？那一步本來防的是什麼？\n\n### 推演解答\n\n以「加索引降 P99」為例，完整循環長這樣：\n\n```text\n步驟          你做的事                        堵的自欺\n─────────────────────────────────────────────────────────\n1 觀察        拉 profiling，確認某 query        印象當事實（ch01）\n              佔了 P99 的大頭，不靠「我覺得」\n2 假說        溯因：這條全表掃描是主因          ——（這是生成步，不堵自欺，\n              （從症狀跳到最像的嫌疑犯）         但要記得它不保真，ch03）\n3 可推翻預測  「加索引後 P99 應降到 <200ms，     怎樣都對的萬能解釋（ch04）\n              且 RDS CPU 跟著降」——可被打臉\n4 實驗        staging 上只加這一個索引、         歸因錯亂——同時改多項\n              別的不動，跑同一批壓測             指標動了不知是誰（ch05/ch06）\n5 證據更新    P99 真降到 180ms、CPU 70%→40%     ——強證據抬高後驗（ch07）\n6 複製        換時段、多跑幾輪，確認不是          僥倖／單次顯著（ch09/ch13）\n              某次剛好流量低\n7 機制        索引讓掃描行數從百萬降到幾百，      黑箱有效當真懂（ch14）\n              講得通「為什麼」降這麼多\n8 結論        暫定結論：「在測過的流量形狀下，    把暫定當鐵證（ch10）——\n              這個索引把 P99 壓到 200ms 內」     留著「沒測過的尖峰」這條小字\n```\n\n**最常被跳過的兩步，幾乎都是第 4 步和第 6 步。**\n\n- 跳過第 4 步（對照）：你常常是「加了索引、順手又調了連線池、還改了個超時設定」，然後 P99 降了，你歸功給索引——但你**同時改了三個東西**，到底哪個讓指標動的？這是 ch05/ch06 的歸因錯亂。防法：一次只改一個，或至少分開上線、分開量測。\n- 跳過第 6 步（複製）：你「在 staging 跑一次降了就上線」，沒換時段、沒多跑——萬一那次剛好是低流量時段，你看到的「降」可能有一半是 flaky。這是 ch09/ch13 的單次結果不算數。防法：多跑幾輪、換條件。\n\n**常見錯路**：以為「我有量測、有上線後看指標，就是科學的」。量測和事後看指標只是第 1 步和第 5 步——真正把這變成科學的，是中間那個**可被推翻的預測（第 3 步）**和**對照（第 4 步）**。少了它們，你只是在「改了 → 動了 → 宣布是我改的功勞」，這跟塞麥爾維斯時代「放血了 → 病人好了 → 放血有效」是同構的——少了對照，你分不清是你的介入有效，還是它本來就會好（回歸均值，ch06）。\n\n### 第 2 題（★★★）**[25 分鐘]**：找出你跳過的那一步、判斷哪些決定值得做對照\n\n(a) 拿你手上一個**正在進行**的技術判斷（例如：要不要把某服務從 REST 改成 gRPC、要不要換個快取策略、某個慢的批次任務該怎麼優化）。把它套進八步循環，找出你**還沒做**的那一步，並說清楚那一步本來防的是哪種自欺。\n\n(b) 然後做校準判斷：這個決定的賭注有多大、有多難回滾？根據「賭注 × 不可逆性」，它值得走完整循環嗎，還是該快速試？給出你的判斷和理由。\n\n### 推演解答\n\n這題沒有標準答案（每個人手上的判斷不同），但好的解答要展現兩個能力，我用「REST 改 gRPC」當示範。\n\n**(a) 找出跳過的步驟。** 假設你現在卡在「我覺得 gRPC 會更快（假說），所以想全面改」。對照八步循環，你大概跳過了第 3、4、6 步：\n\n- 跳過第 3 步（可推翻的預測）：你說「gRPC 會更快」——更快多少？哪個指標？什麼條件下？這話**怎樣都對**（總能事後找個它快的場景）。誠實版要寫成「在我們這個 payload 大小與 QPS 下，gRPC 的 P99 該比 REST 低至少 X%，否則不值得改」——這才可被打臉（ch04）。\n- 跳過第 4 步（對照）：你打算「改完一起上、看整體指標」——但你同時會換掉序列化、連線複用、可能還順手改了重試邏輯。指標動了你歸因不到 gRPC（ch05）。防法：先在一個邊界清楚的小服務上、只換協定、別的不動，做對照量測。\n- 跳過第 6 步（複製）：一次 benchmark 漂亮就決定全面改——沒換負載形狀、沒測尾延遲在高併發下的表現（ch13）。\n\n**(b) 校準判斷。** 「全面把 REST 改 gRPC」這個決定：賭注**大**（牽動所有呼叫方、客戶端、可能的 infra）、回滾**難**（改了協定，呼叫方都得跟著改回去，不是關個 flag 的事）。落在「賭注大 + 難回滾」那一格——**值得走完整循環**：值得先在一個小服務上做乾淨對照（只換協定）、值得複製驗證（多種負載）、值得追機制（到底是序列化省了、還是連線複用省了，這決定了它在你別的服務上會不會一樣有效）。\n\n對比一下：如果你的決定是「把某個快取 TTL 從 60 秒調到 300 秒、用 feature flag 控制、隨時能切回」——賭注**小**、回滾**易**（關 flag 即可，且不寫髒資料）。這就**不值得**開全套循環，直接小流量試、看命中率與資料新鮮度、不對勁就切回。\n\n**常見錯路一**：對所有事一視同仁地嚴謹，結果連調個 TTL 都要寫實驗計畫，把自己拖死，最後反而因為「太累」而在真正的大決定上偷懶。**常見錯路二**（更危險）：把「我以為易回滾」當成真易回滾。先用上一節的提醒檢查——這個改動真的可逆嗎？它會不會寫髒資料、汙染下游快取、觸發不可逆副作用？「TTL 調長」看似可逆，但若這 300 秒內下游基於過期資料做了不可逆的動作（發了錯的通知、扣錯了款），它就不可逆了。**把「易回滾」當不證自明的免死金牌，是這題最隱蔽的陷阱**（ch02 理論負載＋ch16 檢查表）。\n\n### 第 3 題（★★）**[15 分鐘]**：拆穿一句「弱持有」的假開放\n\n你的資深同事在架構評審裡說：「我對用 Kafka 是強意見、弱持有的——有更好的證據我隨時改。」 但你觀察到：過去半年每次有人質疑這個選擇，他都能當場找出一套理由反駁，從沒真的動搖過。請問：(a) 他的「弱持有」是真的還是假的？怎麼判斷？(b) 要怎麼把他的「弱持有」變成可檢驗的、而不是卸責的擋箭牌？\n\n### 推演解答\n\n**(a) 高度可疑是假的，但要的不是看他「有沒有改過主意」，而是看他能不能回答一個問題。** 「從沒動搖」本身不直接證明他不開放——也許 Kafka 真的一直是對的選擇，那不動搖是合理的。真正的判準是 ch04 的可證偽性：**他能不能事先說出「什麼證據會讓我放棄 Kafka」？** 如果他答得出具體的、可觀察的觸發條件（「如果我們的訊息量半年內掉到每秒一千以下、或運維成本超過某個門檻、或團隊三個月沒人能上手，我就該換回更簡單的方案」），那他的「弱持有」是真的——他只是還沒看到那些條件。如果他答的是一堆模糊的「看情況啦」「有更好的我就換」卻說不出**怎樣算更好、好到哪就換**，那他的「弱持有」是假的：他的意見其實**怎樣都對**，因為任何質疑他都能臨場編個理由反駁掉，這正是 ch04 講的「不冒風險的萬能解釋」，也是 ch11 動機性推理的標準長相（他真心相信自己開放，卻系統性地護航既有結論）。\n\n**(b) 把它釘到可檢驗的地面。** 方法就是逼出那個事先的觸發條件，並把它寫進文件：\n\n```text\n把「弱持有」變可檢驗\n\n  假的弱持有：「有更好的證據我就改」\n              （怎樣都對，事後任何結果都能解釋）\n       ↓ 逼問\n  真的弱持有：事先寫下「放棄 Kafka 的觸發條件」——\n    + 量化門檻：訊息量、運維成本、團隊上手時間…\n    + 可觀察：這些指標現在多少、半年後回來複查\n    + 對稱：也寫下「什麼證據會讓我更堅定用它」\n       ↓\n  半年後拿這張表回來對：條件中了沒？\n    中了卻不改 = 假持有暴露；\n    沒中 = 不動搖是合理的，不是固執\n```\n\n**這跟預註冊（ch13）是同一個動作**：事先凍結「什麼結果會讓我下什麼結論」，堵掉「事後挑理由護航既有立場」這個漏洞。**常見錯路**：以為「弱持有」是個性問題（他人太固執）——不是，它是個**制度／紀錄問題**。再固執的人，只要事先把觸發條件白紙黑字寫下、約定到期複查，他的固執就無處藏身；再開放的人，沒寫下觸發條件，他的開放也只是自我感覺。把態度問題轉成可檢驗的紀錄，這正是全書「科學靠制度而非靠個人美德防自欺」的微縮版。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **為什麼「中學那張科學方法五步驟流程圖」是誤導的？** 工程師的科學循環跟它最關鍵的三個差別是什麼？（提示：回頭箭頭、溯因獨立成步、複製與機制獨立成步。）\n2. 八個可攜習慣裡，為什麼「先問我怎麼知道」和「對自己的客觀性保持懷疑」是地基、其餘六條是工具？少了這兩條地基，那六條工具會怎麼被繞過？\n3. 「強意見、弱持有」要怎麼樣才不是一句自我安慰的格言？「弱持有」必須事先寫下什麼，它才跟 ch04 的可證偽接得上？\n4. 為什麼「我很客觀／我是數據驅動的」這句話本身是個警訊？一個真在防自欺的工程師，手上會有什麼、宣告客觀的工程師手上是空的？\n5. 如果塞麥爾維斯今天是你同事，他這次調查的技術部分（觀察到複製）評價如何？他栽在哪兩步？這兩步對你做 incident review 各有什麼具體教訓？\n6. 「凡事都要走完八步循環、凡事都要 RCT」這個態度錯在哪？校準防自欺成本的那條軸是什麼？\n7. 為什麼「易回滾」這個判斷本身常是自欺的重災區？在把一個決定歸到「賭注小、易回滾」之前，你該先問自己什麼？\n8. 用你自己的話，對另一個工程師講「科學態度不是一種研究模式，是一種日常的決策衛生」——這句話想讓他帶走什麼？\n\n## 延伸閱讀\n\n- **Wikipedia, \"Rubber duck debugging\"**（https://en.wikipedia.org/wiki/Rubber_duck_debugging）：本章「把你的調查過程顯式化、逐句講出來才會發現破綻」的最小可攜版。橡皮鴨除錯之所以有效，正是因為它逼你從「我覺得是這樣」切換到「我得把每一步講清楚」——那一切換就是 ch01 的「先問我怎麼知道」在最小尺度上運作。讀它對「為何說出口就抓到 bug」的解釋。\n- **Paul Saffo / Bob Sutton 對「strong opinions, weakly held」的原始討論**（如 Bob Sutton 的部落格與訪談，網路上多處轉述，出處與確切歸屬有不同說法，2026-06）：本章「強意見、弱持有」的源頭。但**更該讀的是對它的批評**——搜尋「strong opinions weakly held is bad」（如 commoncog.com 那篇）會找到對「這句話常被當卸責擋箭牌」的反思，正好對應本章「弱持有必須事先寫下觸發條件」那個補丁。讀兩面，別只記勵志版。\n- **Carl Hempel,《Philosophy of Natural Science》(1966)**：全書脊椎塞麥爾維斯案的科哲課本源頭（landscape 已驗證）。本章把它從「讀別人的案例」翻轉成「如果他是你同事」——回頭讀 Hempel 怎麼用這個案例講「假設檢定的基本步驟」，你會發現他拆的步驟，跟本章的工程師科學循環是同一套骨架，只是換了詞彙。\n- 跨書：決定值得花多少防自欺成本（賭注大小與期望效用的正式權衡）——在**《決策與理性》談賭注大小／期望效用的那章**；本章只給「大賭注加嚴、小賭注快試」的工程師直覺，正式的權衡框架在那裡。「我很客觀」為何是幻覺、動機性推理的心理機制——在**《思考的陷阱》談確認偏誤／動機性推理的那章**；本章講的是怎麼用習慣與紀錄防它，不是它的心理成因。\n- 跨章：本章是全書工具的組裝場，每個習慣的完整論證在它的出處章（可證偽 ch04、對照 ch05、因果 ch06、貝氏 ch07、機制 ch14）。下一章 ch18 會用脊椎塞麥爾維斯案把這一切做最後總對帳——本章的「如果他是你同事」那張評分表，正是 ch18 十層對帳的暖身。\n"}, {"id": "ch18-ten-lenses-reconciled", "file": "ch18-ten-lenses-reconciled.md", "group": "Part V — 信任、收束與帶走", "title": "ch18 — 同一個洗手案，現在你懂它十層", "md": "# ch18 — 同一個洗手案，現在你懂它十層\n\n> **本章解決什麼問題**：這是收官。前面十七章，你每讀一章就拿一個方法論透鏡重看同一個 1847 年的洗手案——觀察、理論負載、歸納、可證偽、對照、因果、貝氏、社群、統計、兩種真。現在我把這十層攤在一張對帳表上，讓你一眼看清：**同一個塞麥爾維斯案，被十個不同的透鏡照過，每一層各堵一種不同的自欺。** 然後我會把 ch11–17 那七個延伸章逐一掛回它們延伸自的核心層，讓「十層」這個數字站得住、同時七個延伸章都有歸宿。最後回收全書六條主線、給中央張力一句話的總結，並對塞麥爾維斯下一個最終評價——他不是「發現細菌的英雄」，他是一個做對了大半科學方法、卻栽在機制與制度上、憂鬱而終又在死後封聖的人。他的故事，就是科學方法本身的縮影。這章不引入任何新方法，它是對帳與反思。讀完，你應該能對另一個工程師用五分鐘把這本書講完。\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層 ◄ 你在這裡（終點）\n```\n\n## 從你已知的出發\n\n你寫過事後檢討（post-mortem）。一份好的 post-mortem，最有價值的不是「發生了什麼」那段時間軸——那段大家當下都記得。最有價值的是末尾那張**對照表**：把這次事故拆成幾個維度（觸發、放大、偵測、止血、根因），逐欄問「這一層我們漏了什麼」。同一場 outage，從「監控為什麼沒告警」這個透鏡看是一個故事，從「為什麼回滾花了四十分鐘」這個透鏡看是另一個故事，從「為什麼這個依賴是單點」這個透鏡看又是第三個故事。**同一個事件，不同透鏡，各照出一個獨立的失效。**\n\n那張對照表的力量，不在於它告訴你新東西——所有素材你都已經有了。它的力量在於**把散落在一整個事故裡的教訓，按維度收進一個結構**，讓你下次遇到別的事故時，腦子裡有一張現成的格子可以逐欄問。\n\n這一章就是這本書的那張對照表。\n\n我們花了十七章，把塞麥爾維斯這一個案子翻來覆去看了十幾遍。每一章都像在事故時間軸上換一個維度提問：ch01 問「整體死亡率為什麼不同」，ch02 問「為什麼只有他看得見這個差異」，ch04 問「他的假設能被什麼推翻」，ch08 問「為什麼一個有效的療法被整個醫界否決二十年」。現在我要做的事，跟你寫 post-mortem 末尾那張表一模一樣：**把十個透鏡收進一張格子，逐層標出它各堵哪一種自欺、塞麥爾維斯在那一層表現如何。** 素材你都有了。這一章是把它們排好。\n\n排好之後你會發現一件事——這也是我認為這整本書最該停下來想十分鐘的一頁：**這十層不是十個彼此無關的知識點，它們是同一件事的十個切面。** 那件事就是中央張力那句話，從第一章敲到現在的那句話：\n\n> 科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低。\n\n每一層，都是人類在某個歷史時刻，發現了自己騙自己的一條**新管道**，然後造出一道**新閘門**去堵它。十層，就是十道閘門，堵十條漏洞。\n\n## 脊椎十層對帳總表\n\n先把核心交出來。下面這張表是本書的脊椎——ch01 到 ch10 這十個核心方法論透鏡，每一層回答三個問題：**它在防哪一種自欺？塞麥爾維斯在這一層做對了什麼、栽在哪？這層對應你工作裡的哪個動作？**\n\n讀這張表的方式：不要一口氣讀完，每一列停一下，在腦子裡把那一章重講一遍。講不出來的那一列，就是你還沒真懂的地方。\n\n```text\n脊椎十層對帳表（ch01–ch10，每層各堵一種自欺）\n\n層  章   透鏡          堵的自欺                塞麥爾維斯在這層           工程既視感\n──  ───  ────────────  ──────────────────────  ────────────────────────  ─────────────────\n1   ch01 系統性比較      用軼事代替規律          ◎做對：不問下一個產婦、    看整體錯誤率，\n         （起手式）      （「我這個 case      問兩病房整體死亡率差異      不信單一請求\n                         沒事」當證據）        （98.4‰ vs 36.2‰）\n──  ───  ───────────                                  （缺機制＋挑戰典範＋政治） 也擋超前的好設計\n──  ───  ────────────  ──────────────────────  ────────────────────────  ─────────────────\n9   ch09 統計考驗        被 p 值與             △時代差：他大樣本、效果    A/B test 偷看停收、\n         （p-hacking）   多重比較騙              巨大，多半穩；對照那些     同時測 20 指標\n                                               p 剛好<0.05 的脆弱效應    總有一個「顯著」\n──  ───  ────────────  ──────────────────────  ────────────────────────  ─────────────────\n10  ch10 兩種真          把科學的暫定           ◎正解：他「是對的」是      型別檢查通過＝形式\n         （科學vs數學）  當數學的必然            科學那種——被後續證據      證明；壓測通過＝\n                                               追認，不是被證明           暫時沒被否證\n```\n\n這張表是整本書的縮影。讀懂它，你應該能回答這一章開頭那個承諾：**用五分鐘對另一個工程師講完這本書。**\n\n我把這十層的內在邏輯再點一遍，因為它有一條線：**前四層（ch01–04）是一個人獨自推理時的防線**——你怎麼從軼事升到比較、怎麼戒掉「親眼看到」的天真、怎麼知道歸納推不出必然、怎麼分辨冒風險的主張和空話。**中間三層（ch05–07）是設計的防線**——當個人推理不夠，你怎麼用對照、用因果分析、用貝氏更新，把「我以為」逼成「可被推翻」。**後三層（ch08–10）是制度的防線與科學的限度**——當設計也不夠，你撞上社群（它會失靈）、撞上統計（它會被濫用）、最後撞上一個哲學的天花板：科學的「真」永遠是暫定的，這不是缺陷，是它誠實的標誌。\n\n塞麥爾維斯這個人之所以是完美的脊椎，是因為他**這十層全部都碰到了**：前七層他幾乎全做對（觀察、溯因、可證偽、對照、因果、貝氏式的逐步確證），第八層他**栽得粉身碎骨**（社群否決），第九層在他的時代還不存在但他的數據其實扛得住，第十層他「是對的」是科學那種對——死後才被追認。一個人把科學方法的光明面和黑暗面同時演完，這就是為什麼半個多世紀來，韓培爾（Carl Hempel）1966 年的科學哲學課本到現在的每一本教科書，都拿這個案子當主角（這事本身就是脊椎選擇的背書，見 ch01）。\n\n## 七個延伸透鏡的歸宿\n\n到這裡你可能會問：**那 ch11 到 ch17 呢？那七章去哪了？**\n\n關鍵在這個詞——**「十層」專指 ch01–ch10 的核心方法論透鏡**。這是本章的鐵律，也是這本書結構的承重牆。ch11–17 不是七個**新的核心透鏡**，它們是這十層在**制度面、邊界面、態度面**的**延伸應用**。如果把它們也算成「層」，這本書就變成「十七層」，那個漂亮的數字就垮了，而且更糟的是——你會以為它們是彼此獨立的新知識，而不是已學十層的延伸。\n\n所以我要把這七章逐一掛回它們延伸自的核心層。掛好之後你會看到：**沒有任何一章是孤立的，每一章都是某個核心透鏡長出來的枝。**\n\n```text\n七個延伸透鏡 → 它掛回的核心層\n\n延伸章                      掛回的核心層                  它延伸了什麼\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch11 動機性推理              ← ch02 理論負載              個人為何看不見反例（理論\n     （科學擋不住的偏心）       ＋ ch08 社群               負載的心理版）＋制度為何要\n                                                          假設人會自欺（盲法、預註冊、\n                                                          盲審堵的偏心）\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch12 偽科學分界              ← ch04 可證偽                把 ch04 立的「可證偽」原則\n     （為什麼是科學贏了）                                 應用出去：加 Lakatos 進步vs\n                                                          退化，做偽科學的逐項判別\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch13 複製修補               ← ch09 統計考驗              ch09 揭露危機（診斷），\n     （重複的力量）                                       ch13 講危機怎麼修（處方）：\n                                                          預註冊、註冊報告、開放資料\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch14 機制之必要             ← ch06 因果                  塞麥爾維斯案最沉重的一層：\n     （黑箱有效）              ＋ ch08 社群               有效果（對照）≠有機制≠被\n                                                          接受。機制如何抵抗「相關≠\n                                                          因果」的質疑、讓社群安心\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch15 證詞與權威             ← ch02 理論負載              連你「看到」專家的數據都\n     （何時信專家）            ＋ ch08 社群               隔著層層信任（理論負載）；\n                                                          共識的可信度來自獨立複製\n                                                          （社群的健康版）\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch16 失敗模式目錄           ＝ 十層的彙整                把前十層＋延伸章的所有陷阱\n     （防自欺檢查表）                                     收成一張可操作的檢查表\n──────────────────────────  ───────────────────────────  ──────────────────────────\nch17 工程師的科學態度       ＝ 十層的內化                把十層從「讀別人的科學」\n     （搬回你的系統）                                     轉成「做自己的工程判斷」的\n                                                          日常決策衛生\n```\n\n看出形狀了嗎？**ch11–15 各自掛回一兩個核心層**（它們是延伸應用），**ch16 是十層的橫向彙整**（把陷阱收成一張表），**ch17 是十層的縱向內化**（把方法變成你的習慣）。十個核心層立起骨架，七個延伸章是長在骨架上的肌肉。這就是為什麼這本書是「十層」而不是「十七層」——後面七章沒有新增承重牆，它們在已有的牆上加固、延伸、彙整、內化。\n\n我特別要你注意 **ch14 掛回 ch06＋ch08** 這條線，因為它是脊椎最痛的地方。ch06 教你「相關不是因果」，ch08 教你「社群會否決」。塞麥爾維斯把這兩條同時撞滿了——他**有**因果（對照扎實、時序對、劑量反應有），但他**沒有機制**（說不出「為什麼屍體微粒會致病」，因為細菌說要到 1860–80 年代巴斯德與科赫才立起）。缺了機制，他的因果論證在當時的社群眼裡就少了最後一塊，於是 ch08 的否決機制就啟動了。**ch14 不是新透鏡，它是 ch06 的因果與 ch08 的社群在塞麥爾維斯身上交會的那個悲劇性的點。**\n\n## 六條主線回收\n\n這本書從 ch01 起，在序言裡許了六條驗收主線。收官就該把它們一條條收回來，看看你現在能不能用一句話講清每一條。我在每條後面附上它對應的層和那句你該能講出的話。\n\n```text\n六條主線 → 收束\n\n① 科學不證明、只防騙\n   （ch03 歸納問題 + ch04 可證偽 + ch10 兩種真）\n   「含普遍律的理論無法被有限觀察證明（休謨）。科學能做的是反覆\n    嘗試否證而未果，於是暫時保留。一個被反覆冒險否證而未倒的理論，\n    比一個從沒冒過風險的理論值得信——因為前者給過你抓它錯的機會。」\n\n② 觀察不是中立的\n   （ch02 理論負載 + ch15 連看專家數據都隔著信任）\n   「『我親眼看到』不是免死金牌。你看到什麼，被你的理論、概念、\n    儀器預設塑造。沒有裸觀察。所以塞麥爾維斯看見的反常，別人看不見。」\n\n③ 對照是防自欺的引擎\n   （ch05 隨機化雙盲安慰劑 + ch06 混淆變因 + ch11 盲法堵期望污染）\n   「控制變因堵『別的解釋』、隨機化堵『分組偏差與你沒想到的混淆』、\n    雙盲堵『期望污染量測』、安慰劑堵『光是被治療就會好』。\n    每一樣都在堵一個特定的自欺漏洞，講得出哪樣堵哪個。」\n\n④ 相關 ≠ 因果，且 p 值 ≠ 真理\n   （ch06 混淆變因 + ch09 p 值與 p-hacking + ch13 複製修補）\n   「相關可能來自混淆、反向因果、巧合。p<0.05 不是『95% 為真』，\n    是『若虛無假設為真，得到此等或更極端資料的機率』。\n    統計是最強的防騙工具，也是最滑的自欺管道——真誠的人也會 p-hack。」\n\n⑤ 科學是社群不是個人\n   （ch08 典範與研究綱領 + ch11 制度防線 + ch15 共識 + ch13 複製）\n   「防自欺的最後一道防線是制度（同儕審查、複製、公開批評），\n    但制度也會失靈——塞麥爾維斯有效果卻被整個典範否決二十年。\n    制度擋掉很多胡說，偶爾也擋掉真理。」\n\n⑥ 科學的真 vs 數學的真\n   （ch10 兩種真）\n   「數學真＝形式系統內的可證性（演繹必然）；科學真＝對世界的暫時\n    最佳猜測（可被推翻）。科學結論永遠暫定——這是特性不是缺陷。\n    『科學證明了 X』是個語病。」\n```\n\n如果這六句你都能不看書講出來，這本書你就讀完了，不只是讀過。\n\n## 塞麥爾維斯的最終評價\n\n現在我要對這個貫穿全書的人下一個最終評價，而這個評價必須誠實——因為這本書最重要的教學點，就藏在「不把他寫成英雄」這件事裡（這是 landscape 守了一整本書的紅線）。\n\n最廉價的版本，也是你在無數科普文章和勵志貼文裡看到的版本，是這樣：「塞麥爾維斯發現了洗手能救命、發現了細菌致病、被愚蠢傲慢的同行迫害、憂鬱而終、最後被歷史平反——一個超越時代的孤獨天才。」\n\n**這個版本是錯的，而且它錯的方式恰好毀掉這本書。**\n\n讓我把誠實版攤開：\n\n```text\n塞麥爾維斯：誠實的最終評價\n\n他做對的（科學方法的光明面）\n  ・系統性比較      不問個案、問兩病房整體死亡率（ch01）\n  ・準隨機對照      善用單雙日交替分配這個天然實驗（ch05）\n  ・漂亮的溯因      從 Kolletschka 之死跳到屍體微粒假說（ch03）\n  ・可證偽的假設    洗手後若不降就垮，他敢冒這個險（ch04）\n  ・扎實的因果論證  時序、劑量反應、可逆性都對（ch06）\n  ・戲劇性的效果    死亡率劇降（1846 全年約 13% → 1848 全年 1.27%，\n                   同年第二病房 1.33%；兩病房同期 98.4‰ vs 36.2‰）\n\n他沒做到的（不是道德缺陷，是科學現實）\n  ✗ 沒有機制        說不出「為什麼」——細菌說要到他死後才立（ch14）\n  ✗ 沒說服社群      發表遲緩、文筆性情都不利、挑戰整個瘴氣典範（ch08）\n\n歷史對他做的（黑暗面）\n  ・被整個醫界否決約二十年\n  ・1865 年精神崩潰，被誘騙送入精神病院\n  ・抵抗時遭看守毆打，約兩週後死於敗血症——\n    諷刺地與產褥熱同類的血液感染（傷口可能來自被毆打）\n  ・細菌說確立後才被追認，今日視為手部衛生先驅\n```\n\n請你盯著「他沒做到的」那兩行看十秒。**這兩行才是這本書要你帶走的東西。**\n\n他**有效果**（對照＋戲劇性的死亡率下降），但他**沒機制**（說不出為什麼），而且他**沒被接受**（社群否決）。這三件事——有效果、有機制、被接受——是**邏輯上獨立的三件事**（ch14 整章在拆這個）。塞麥爾維斯擁有第一件、缺第二件、輸掉第三件。\n\n如果你把他寫成「發現細菌的英雄」，你就**抹掉了第二件的缺席**，於是這個案子就退化成一個廉價的「天才被笨蛋迫害」的勵志故事。而真相遠比這個深、也遠比這個有用：**一個療法可以同時是有效的、卻無法解釋的、且不被接受的。** 這三者的分離，不是因為當時的醫師太蠢——是因為「有效果」真的不等於「有機制」，而一個負責任的社群在沒有機制時保持懷疑，**這份懷疑本身有它的道理**（它擋掉了無數真的是巧合的「療法」）。塞麥爾維斯的悲劇，是這份合理的懷疑剛好用錯了地方、且代價是人命。\n\n這就是為什麼他的故事是**科學方法本身的縮影**：科學的每一道防線——要求機制、社群審查、保持懷疑——都是為了防自欺而存在的好東西，但**好東西用在錯的地方，會擋掉真理、會死人。** 科學不是一台保證輸出真理的機器，它是一套會鈍、會被誤用、會被制度政治污染的人造工具。它是人類至今最好的防自欺工具——但它是工具，不是神。\n\n塞麥爾維斯憂鬱而終、死後封聖。這個結局裡沒有純粹的英雄，也沒有純粹的惡棍。有的只是一群帶著各自理論負載、各自動機性推理、各自典範的人，在一個還沒有細菌理論、還沒有隨機對照試驗標準、還沒有預註冊的時代，努力地——而且失敗地——想要不騙自己。\n\n## 中央張力，最後一次\n\n從 ch01 到現在，這句話敲了你十八次：\n\n> 科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低。\n\n現在你應該懂它為什麼是「有系統地」而不只是「小心一點」。**小心一點是態度，有系統是制度。** 這本書的十層加七個延伸，沒有任何一層是靠「我會更謹慎」達成的——每一層都是一個**可操作的閘門**：可證偽要求你事先說出「什麼觀察會推翻我」、對照要求你隨機分組、雙盲要求你蒙住量測者的眼睛、預註冊要求你上線前凍結指標、複製要求你不信單次結果。這些都不是靠意志力，是靠**機制**——因為人類三百年的經驗是：意志力擋不住自欺，只有機制能。\n\n而最深的一層，是這句話的反身性：**連這本書的脊椎案例，都可能被人用挑選過的數字誇大效果。** 你在 ch09 學過——「塞麥爾維斯讓死亡率從 18% 降到 1%」這個流傳甚廣的講法，其實偷用了「1847 年 4 月單月峰值 18.27% vs 1848 全年 1.27%」這個被挑選的時間切片（洗手令 1847 年 5 月中才下，1847 是分裂年，全年約 5%）。誠實版該用同期兩病房（98.4‰ vs 36.2‰）或全年對全年（1846 約 13% → 1848 約 1.27%）。效果依然戲劇性，**不需要作弊**——但連一個講「如何不騙自己」的脊椎案例，都可能在傳述時不自覺被挑數字誇大。\n\n這就是這本書留給你的最後一個、也是最重要的一個自問：\n\n**我此刻，最可能在哪裡騙了自己？**\n\n科學沒有保證你不被騙。它只是把這個問題，從一句空泛的提醒，變成了十層具體的閘門，讓你逐層去問。這是它能給的全部，也已經是人類想得出的最好的全部。\n\n## 直覺的陷阱\n\n收官章的陷阱，是關於「收官」這件事本身——最容易在終點被自己騙的三種方式。\n\n| 錯誤直覺 | 它在哪一步帶你下溝 | 誠實版 / 怎麼自我察覺 |\n|---|---|---|\n| **「讀完這本書，我就學會科學方法了，以後不會被騙。」** | 把「知道十層」當成「做到十層」。知道可證偽，跟在自己得意的假設上真的去問「什麼會推翻它」，是兩回事——後者要對抗動機性推理（ch11）。 | 科學防的不是別人騙你，是**你騙你自己**，而這個敵人讀完書還在。自我察覺：下次你對一個技術判斷特別有把握時，問「我有沒有認真找過反例，還是只找了支持的證據」。「我很客觀」這句話本身是警訊。 |\n| **「塞麥爾維斯是被笨蛋迫害的天才。」** | 把「社群否決」簡化成「醫師太蠢」，於是學到的是「別信專家」而不是「有效果≠有機制≠被接受」。 | 否決是**多因**的：缺機制、挑戰整個瘴氣典範、他發表遲緩性情不利、職場政治都有份。而在沒有機制時保持懷疑，是社群**合理**的防線（它擋掉無數巧合療法），只是這次用錯地方、代價慘重。學到「三件事獨立」，不是學到「別信共識」（ch15 專門處理這個張力）。 |\n| **「『十層』是個固定的清單，背下來就好。」** | 把方法論當成「科學方法五步驟流程圖」那種僵化清單來背——這正是本書從第一章就反對的東西。 | 十層不是流程圖，是**十條被堵住的自欺管道**。重點不是清單的順序，是「每一層各防哪一種自欺、我此刻可能在哪一層被騙」。能對一個具體案例（你自己的事故、一篇新聞標題）逐層提問，才算學會；背得出順序、答不出「這層防什麼」，就是還沒懂。 |\n\n## 紙上推演\n\n這兩題都是「能不能把整本書搬出來用」的測驗，不是新知識。\n\n### 推演題 1：五分鐘版（★★，[20 分鐘]）\n\n不准看書。拿一張紙（或對著一個願意聽的工程師），用**五分鐘**講完這本書，要求講清三件事：(a) 科學在防什麼、為什麼不是「證明真理」；(b) 塞麥爾維斯案的誠實版（為什麼不能講成「發現細菌的英雄」）；(c) 你會用「對照」「可證偽」「相關≠因果」其中至少兩個，各說出它堵的是哪一種自欺。講完後，把你卡住、講不順的地方圈出來——那就是你還沒真懂的層。\n\n### 推演解答 1\n\n一個合格的五分鐘版大概長這樣（你的版本不必逐字相同，但這三塊都要在）：\n\n```text\n五分鐘版（範例骨架）\n\n(a) 科學在防什麼\n    「科學的本質不是證明真理——含普遍律的理論無法被有限觀察證明\n     （休謨歸納問題）。科學能做的是反覆嘗試否證而未果，於是暫時\n     保留。所以它真正在做的是『有系統地把自己被騙的機會壓到最低』，\n     一個漏洞配一道閘門。」\n\n(b) 塞麥爾維斯誠實版\n    「1847 年維也納，他發現醫師接生的病房死亡率遠高於助產士病房\n     （98.4‰ vs 36.2‰），溯因出『屍體微粒經手傳染』，下令洗手，\n     死亡率劇降。但關鍵是——他有效果、卻說不出機制（細菌說他死後\n     才立），又被整個瘴氣典範否決二十年，憂鬱而終、死後才平反。\n     重點不是『英雄被迫害』，是『有效果 ≠ 有機制 ≠ 被接受』這三件\n     獨立的事。」\n\n(c) 兩個堵自欺的工具（任選兩個）\n    ・對照：「隨機分組讓你沒想到的混淆變因在兩組間平均掉——堵的是\n            『分組偏差』這種自欺。A/B test 就是這個。」\n    ・可證偽：「好假設要能說出『什麼觀察會推翻我』——堵的是『怎樣\n              都對』的空話。一個無法被任何 log 推翻的故障假設是壞假設。」\n    ・相關≠因果：「兩件事一起動可能是第三因（混淆）、反向、或巧合——\n                堵的是『把相關當因果』。『部署後 P99 升』不代表部署是因。」\n```\n\n常見錯路：(1) 把 (a) 講成「科學就是做實驗、講證據」——太淺，沒講到「不證明、只防騙」這個反直覺核心；(2) 把 (b) 講成英雄故事，漏掉「無機制」——這是最致命的錯，等於沒讀懂這本書；(3) 把 (c) 講成「對照就是分兩組比較」——只講了是什麼、沒講堵的是哪種自欺，那是清單式背誦不是理解。卡在哪一塊，就回去重讀對應的層。\n\n### 推演題 2：三個新的「我怎麼知道」（★★，[15 分鐘]）\n\n列出讀完這本書後，你會在工作中**新增**的三個自問（形式都是「我怎麼知道 ___？」）。要求：每個自問要對應到本書的一個具體透鏡，並寫出不問它的話、你最可能在哪裡騙自己。\n\n### 推演解答 2\n\n沒有標準答案，但好的自問長這樣——具體、可操作、掛得回某一層：\n\n```text\n三個「我怎麼知道」自問（範例）\n\n自問 1（掛 ch06 相關≠因果）\n  「這次指標改善，我怎麼知道是我的改動造成的，而不是同時發生的\n   別的事（流量變了、依賴升級了、季節性）？」\n  不問的代價：把巧合或混淆當成自己的功勞，下次複製不出來。\n\n自問 2（掛 ch04 可證偽 + ch11 動機性推理）\n  「我這個我很有把握的技術判斷，什麼觀察會推翻它？我有沒有認真\n   去找過反例，還是只蒐集了支持它的證據？」\n  不問的代價：在自己得意的假設上動機性推理，把確認偏誤當成驗證。\n\n自問 3（掛 ch14 機制）\n  「這個 bug 我『修好了』，但我說得出『為什麼壞、為什麼這樣修會好』\n   嗎？還是只是『重啟就好了』這種黑箱有效？」\n  不問的代價：沒機制就敢結案，它會在你沒準備的時候復發。\n```\n\n常見錯路：自問太空泛（「我有沒有客觀」——沒掛回任何具體透鏡，也不可操作）；或只列「是什麼」不列「不問的代價」（那就只是口號，不是閘門）。好的自問必須像 alert——觸發條件具體、漏掉它有明確後果。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂。優先答「為什麼」。\n\n1. 為什麼這本書叫「十層」而不是「十七層」？ch11–17 那七章如果不是新的核心透鏡，那它們是什麼？（答得出「核心層 vs 延伸應用」的區別才算過。）\n2. 為什麼把塞麥爾維斯寫成「發現細菌的英雄」會毀掉這本書最重要的教學點？那個教學點是哪三件獨立的事？\n3. 用一句話講：科學「不證明真理、只防自欺」是什麼意思？為什麼一個被反覆嘗試否證而未倒的理論，比一個從沒冒過風險的理論值得信？\n4. 對照（ch05）的四個要素——控制變因、隨機化、雙盲、安慰劑——各堵哪一種自欺？挑兩個說清楚。\n5. 為什麼「我很客觀」這句話本身是個警訊？它跟哪一層（動機性推理）有關，而那一層又掛回哪兩個核心透鏡？\n6. ch14（機制）為什麼掛回 ch06（因果）＋ch08（社群）這兩層，而不是某個單一層？塞麥爾維斯在這個交會點上輸了什麼？\n7. 「塞麥爾維斯讓死亡率從 18% 降到 1%」這個講法哪裡偷了數字？誠實版該怎麼講？（提示：1847 年 4 月單月 vs 1848 全年。）\n8. 讀完這本書，你最大的收穫應該是「學會了一套不會被騙的方法」嗎？如果不是，那是什麼？（提示：自欺的敵人是誰，它讀完書還在不在。）\n\n## 延伸閱讀\n\n- **Carl Hempel,《Philosophy of Natural Science》（1966）** — 塞麥爾維斯案成為科學哲學課本主角的源頭，第二章用它講「假設檢定的基本步驟」。想看這個脊椎案例最權威的科哲處理，讀這本。\n- **Stanford Encyclopedia of Philosophy,「Theory and Observation in Science」** https://plato.stanford.edu/entries/science-theory-observation/ — 觀察的理論負載（ch02）的嚴格哲學版，本書只給了直覺，這裡給爭論的全貌。\n- **Stanford Encyclopedia of Philosophy,「The Problem of Induction」** https://plato.stanford.edu/entries/induction-problem/ — 休謨歸納問題（ch03）與各種回應路線（含貝氏路線）的完整地圖，本書的哲學地基都在這。\n- **PMC,「Theory of scientific investigation by Hempel and a case of Semmelweis」** https://pmc.ncbi.nlm.nih.gov/articles/PMC5749055/ — 把韓培爾的科學研究理論逐步套到塞麥爾維斯案，是這本書脊椎章節的學術骨架，想核對史實與方法對應讀這篇。\n- **姊妹書《馴服隨機》** — 本書凡用到「貝氏定理怎麼算」「p 值的統計機制」「相關係數」一律指向它（貝氏與條件機率、假設檢定、統計如何崩壞各有專章）；想補上本書刻意不展開的計算機制，從那裡接。\n- **姊妹書《思考的陷阱》** — 本書講「科學作為制度怎麼防自欺」，把「個人心理為何自欺」（確認偏誤、動機性推理、為何 p-hacking 的人不自知）指向它。理性三角的心理機制那一角在那本書。\n- **姊妹書《這句話無法被證明》** — ch10「兩種真」把「形式系統內真理溢出可證」那一邊指向它。想看數學的「真 vs 可證」如何與科學的「真 vs 已驗證」對照，讀那本。\n- **姊妹書《決策與理性》** — 本書 ch07 把「理性上該怎麼更新信念」、ch17 把「賭注大小與該不該做對照」的規範面指向它。把「防自欺」接到「該怎麼做決定」，從那裡接。\n"}, {"id": "appendix-a-people-timeline", "file": "appendix-a-people-timeline.md", "group": "附錄", "title": "附錄 A — 人物與年表速查", "md": "# 附錄 A — 人物與年表速查\n\n> 這是一張**速查表**，不是教學。每位人物、每個年份都假設你已在正文某章見過；這裡只負責讓你在忘記「韓森 1958 還是 1968？布拉德福・希爾幾條視角？塞麥爾維斯死亡率到底哪套數字是哪一年」時，能在十秒內查回來。要從零理解某個概念，回該 ）               ch03\n∃             存在某個              存在量詞                               ch04\n∞             無限大                無限多次觀察；歸納問題的核心           ch03\n‰             千分之                每千人死亡率（如 98.4‰）               ch01\n%             百分之                百分比死亡率（如 11.4%）               ch01\n```\n\n一個容易看漏的細節：\n\n```text\n• P(H|E)（H given E，後驗）vs P(E|H)（E given H，概似）是兩個方向完全相反\n  的條件機率。「把 p 值讀成假設為真的機率」＝把 P(E|H) 誤讀成 P(H|E)，\n  這個顛倒在 ch09 有完整拆解（「檢察官謬誤的統計版」）。\n  看到「given」先問：條件線左邊是假設（H）還是數據（E）？\n\n• ‰（千分之）vs %（百分之）在本書有分工：兩病房死亡率對照用‰版\n  （98.4 vs 36.2）、介入前後用百分比版（11.4% → 1.27%）。別混用。\n  兩套數字都對、來自不同切片——詳見下方「脊椎數字四眼防呆」。\n```\n\n---\n\n## 四、同形記號歧義專節\n\n本書用的符號不多，但有幾個在不同脈絡容易張冠李戴。查一個數字前先確認你查的是哪個 H、哪個 p、哪個 T。\n\n```text\nH —— 本書：絕大多數時候是「假設（hypothesis）」（如「H = 屍體微粒假說」）。  ch03\n     偶爾出現的「H₀」是「虛無假設（null hypothesis）」（ch09）；\n     「H₁」或「H_A」是「對立假設（alternative hypothesis）」。\n     判別法：單獨的 H 在 P(H) 裡 = 假設；H₀ = 虛無假設。\n     看到 H 先問：有沒有下標？有下標看下標；沒下標看脈絡是「假設」。\n\nE —— 本書：「證據（evidence）」（如「E = 洗手後死亡率降了」）。           ch07\n     與 P(E|H) 一起出現時永遠是「觀察到的數據 / 事件」。\n     別和《馴服隨機》或《這句話無法被證明》裡其他書自訂的 E 符號搞混——\n     跨書時全部重新對表。\n\np —— 本書：ch09 裡的「p 值（p-value）」。                                  ch09\n     它的正確口語定義：「若虛無假設為真，得到此等或更極端資料的機率」。\n     它不是 P(H|E)（那是後驗）；它不是「結果為真的機率」（那是最常見的\n     誤讀）。「p 值 < 0.05」只是「在 H₀ 為真的世界裡，這組資料很罕見」，\n     不保證 H 為真。\n     與 P(H)、P(E|H) 的區別：後兩者是機率值（0 到 1 之間），p 值也是\n     機率值——但所表達的「假設世界」不同；詳見 ch09 worked example。\n\nT —— 本書：絕大多數出現在「理論（theory）」脈絡（如「理論 T 的預測」）。 ch04\n     偶爾是「塞麥爾維斯（Semmelweis）」的縮寫（表格裡）。\n     不要和《馴服隨機》裡的「T = 時間 / 回合」或其他書的自訂符號搞混。\n\nIBE —— 本書：推論到最佳解釋（inference to the best explanation）的縮寫。  ch03\n      與「溯因（abduction）」密切相關但有爭論（Peirce 的溯因偏重「生成\n      假說」；Harman 的 IBE 偏重「在候選中選最佳」）。本書取兩者共通直\n      覺，不裁判區分，嚴格文獻指向附錄 C 延伸閱讀。\n```\n\n---\n\n## 五、關鍵年份速查表（全書基準）\n\n以下年份全書統一，以 `_meta/landscape-2026-06.md` 為準。改任何一個必須 grep 全書同步。\n\n```text\n年份         事件                                                   首見章\n────────────────────────────────────────────────────────────────────\n1739 新。** 這五條守住，本書最容易出錯的地方就堵住了。\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 術語表", "md": "# 附錄 B — 術語表\n\n這本書每個關鍵詞，一句白話定義加上它第一次正式登場的章。定義抓直覺、不照抄正文長段；要看完整的來龍去脈與 worked example，去括號裡標的那一章。中英並列，方便你查原文文獻時對得上號。排序按全書五個 Part 的脈絡分組，不按筆畫——相鄰的詞彼此呼應，查一個常會順手看懂旁邊那個。\n\n最容易彼此混淆的幾組，先放一張對照表壓在前面（這幾組分不清，正是「直覺的陷阱」最常出事的地方）：\n\n```text\n最易混淆的成對術語（左右兩欄是兩回事，別當同一件）\n──────────────────────────────────────────────────────────────────\n可證偽性                vs   已被否證\n（理論的性質：原則上          （「可證偽」是理論冒不冒風險的資質；\n能被某觀察推翻）              「已被否證」是已經被推翻了。兩者差了\n                             一個「已」字，天差地別。）\n──────────────────────────────────────────────────────────────────\n歸納                    vs   溯因推理（推論到最佳解釋）\n（從個例推普遍／未來，         （從觀察到的現象反推「最能解釋它的\n放大但不保真）                假說」；生成假說的推理，不是累積樣本）\n──────────────────────────────────────────────────────────────────\n相關                    vs   因果\n（兩個變數一起動）            （一個是另一個的原因；可能只是共同原\n                             因、反向、或純巧合——混淆變因是關鍵）\n──────────────────────────────────────────────────────────────────\np 值                    vs   假設為真的機率\n（若虛無假設為真，             （p 值是 P(E|H₀)；「假設為真的機率」\n得到此等或更極端資料           是 P(H|E)。這個顛倒＝「檢察官謬誤\n的機率）                      的統計版」，ch09 拆得最清楚）\n──────────────────────────────────────────────────────────────────\n科學的真                vs   數學的真\n（對世界的暫時最佳猜測，       （形式系統內給定公理的演繹必然；一旦\n可被新證據推翻）              證明就永遠成立、不可被新觀察推翻）\n──────────────────────────────────────────────────────────────────\n典範轉移                vs   任何觀念更新\n（孔恩原意：整套背景假設、     （「換個思路」「範式改變」在商業報告\n方法與標準被新典範取代，       裡的用法。孔恩說的是革命性替換，不\n且前後可能不可共量）           是漸進改良）\n──────────────────────────────────────────────────────────────────\n複製失敗                vs   科學破產\n（一批研究未能被獨立重現；     （科學的自我糾錯機制在公開運作——偽\n再現性危機的診斷）            科學才從不複製、從不認錯）\n──────────────────────────────────────────────────────────────────\n訴諸權威（謬誤）         vs   合理的專家共識\n（把人的頭銜當成證據本身）     （共識的可信度來自獨立趨同的審查過\n                             程，不是人數或頭銜）\n──────────────────────────────────────────────────────────────────\n```\n\n---\n\n## Part I — 個人推理的防線（ch01–04）\n\n「科學不是五步驟流程，而是三百年累積的自欺偵測清單」——這組詞是全書最基礎的地基。\n\n**科學方法（scientific method）**：不是一張五步驟流程圖，而是一整套有系統地把「自己被騙的機會壓到最低」的制度與習慣；每一個工具（可證偽、對照、隨機化、貝氏、同儕審查）本質上都是同一件事的切面。（ch01）\n\n**系統性比較（systematic comparison）**：科學的起手式——不問「這一個案例怎樣」，而是問「這一類的整體規律是什麼，而且為什麼這一群跟那一群不同」；從軼事升到指標、從感覺升到對照。（ch01）\n\n**中央張力（central tension）**：科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低——全書十八章一直回來敲你的那句話。（ch01）\n\n**觀察的理論負載（theory-ladenness of observation）**：「親眼看到」不是中立的免死金牌——觀察被你帶入的理論、概念、儀器預設塑造，所以沒有「裸觀察」；韓森 1958 奠基。（ch02）\n\n**低度決定（underdetermination）**：假設只能連同一整組輔助假設一起受檢，因此一個理論加上適當的輔助假設，總能容納看似反例的證據；杜恩–蒯因論題的核心。（ch02，ch04）\n\n**輔助假設（auxiliary hypothesis）**：與核心假設一起被觀察「連帶受檢」的背景預設（儀器正常、量測有效、其他條件不變）；否證時打到的可能是輔助假設而不是核心。（ch04）\n\n**歸納（induction）**：從個例推普遍、從過去推未來的推理；放大但不保真，依賴自然齊一性假設，而此假設既不能演繹證明也不能用經驗證明（循環）——休謨歸納問題的核心。（ch03）\n\n**演繹（deduction）**：從前提到結論的必然推論；保真，但結論不超出前提。科學迴圈裡負責「從假說導出可被檢驗的預測」。（ch03）\n\n**溯因推理（abduction）／推論到最佳解釋（inference to the best explanation, IBE）**：從觀察到的現象反推「最能解釋它的假說」的推理——生成假說的那一步；皮爾士命名，哈曼 1965 推廣 IBE；不保真（最佳解釋可能全錯），溯因出的假說仍須能被否證。（ch03）\n\n**自然齊一性（uniformity of nature）**：「未來將繼續像過去一樣」的背景假設；歸納問題的核心——此假設無法被演繹或經驗證明，是科學永遠只能「暫時保留」的根源。（ch03）\n\n**可證偽性（falsifiability）**：理論的性質：原則上能被某個觀察推翻（含普遍陳述的理論無法被有限觀察「證明」，但能被一次妥當的反例否證）；波普爾分界判準，《研究的邏輯》1934/35。（ch04）\n\n**分界問題（demarcation problem）**：科學與非科學（或偽科學）的界線在哪——波普爾用可證偽性回答，孔恩和拉卡托斯給出不同版本；科哲至今未定論（分界是程度問題，有灰色地帶）。（ch04，ch12）\n\n**確認偏誤（confirmation bias）**——此詞定義見《思考的陷阱》；本書只用一句：我們對「想信的結論」找證據特別賣力，對反例特別嚴苛。本書不展開心理機制，只討論科學制度怎麼防。（ch11）\n\n---\n\n## Part II — 設計的防線（ch05–07）\n\n「把『我以為』逼成『可被推翻』的實驗藝術」——這組詞是對照實驗與因果推論的工具箱。\n\n**對照實驗（controlled experiment）**：要歸因，先排除別的解釋——用「對照組」讓兩組只差你關心的那一個變因，任何結果差異才可歸因到那個變因。（ch05）\n\n**控制變因（control variable）**：在對照實驗中被固定住、不讓它在兩組間有差異的那些因素；每個沒控制到的變因都是一個潛在的混淆來源。（ch05）\n\n**隨機化（randomization）**：用隨機機制把受試者分到不同組，讓研究者沒想到的混淆變因在兩組間平均掉——費雪 1920s 確立為核心原則，《實驗設計》1935。（ch05）\n\n**雙盲（double-blind）**：受試者和量測者都不知道分組；堵的是「期望污染量測」——知道自己在實驗組的人可能行為不同、量測者可能無意間給有利判斷。（ch05）\n\n**安慰劑（placebo）**：形式上看起來是介入、但沒有你關心的那個成分的假對照；堵的是「光是被治療就會好」這個效應。（ch05）\n\n**隨機對照試驗（randomized controlled trial, RCT）**：具備隨機化＋控制組（通常也有盲法）的臨床試驗；MRC 鏈黴素 1948 是公認的現代 RCT 起點。（ch05）\n\n**相關（correlation）**：兩個變數一起動的統計關係——相關≠因果，有三種陷阱：共同原因（混淆變因）、反向因果、純巧合。（ch06）\n\n**因果（causation）**：一個變數的變化直接引起另一個變數的變化；要建立因果需要排除混淆、驗證時序、理想上透過介入（隨機化或設計）來切斷混淆。（ch06）\n\n**混淆變因（confounder / confounding variable）**：同時影響「原因」與「結果」的第三個變數，讓相關看起來像因果；對照實驗（隨機化）正是為了把它切斷。（ch06）\n\n**反向因果（reverse causation）**：以為是「A→B」，其實是「B→A」或互為因果；沒有時序資訊時難以區分。（ch06）\n\n**Bradford Hill 九個視角（Bradford Hill viewpoints）**：布拉德福・希爾 1965 年提出的評估因果關聯的九個「視角」（強度、一致性、特異性、時序、劑量反應、合理性、連貫性、實驗、類比）；他本人稱 viewpoints，不是 criteria、清單、也不是判準——全中不保證是因果，但提高可信度。（ch06）\n\n**貝氏確證（Bayesian confirmation）**：把「證據如何更新假設的可信度」形式化——P(H|E) = P(E|H)·P(H) / P(E)；核心直覺：若證據在假設真時比假設假時更可能出現（概似比 > 1），後驗就高於先驗。（ch07）\n\n**先驗（prior）**：在看到新證據之前，對假設可信度的初始估計——P(H)；不是「亂猜」，是根據背景知識的合理起點。（ch07）\n\n**後驗（posterior）**：看到證據之後更新過的可信度——P(H|E)；貝氏更新的結果。（ch07）\n\n**概似（likelihood）**：假設為真時，看到這筆數據的機率——P(E|H)；概似比 P(E|H) / P(E|¬H) 是「證據強度」的關鍵量。（ch07）\n\n**烏鴉悖論（raven paradox）**：韓培爾 1945 提出——「所有烏鴉都是黑的」邏輯上等價於「所有非黑之物都不是烏鴉」，於是「一顆綠蘋果」也算確證了「烏鴉都黑」。直覺上荒謬，但定性上正確（弱證據，概似比略大於 1）；說明確證需要量化才能抓住「強弱」差異。（ch07）\n\n---\n\n## Part III — 制度與限度的防線（ch08–10）\n\n「統計與社群是最強的防騙工具，也是新的自欺管道」——這組詞把科學從個人推向制度，再面對科學自己的極限。\n\n**典範（paradigm）**：孔恩 1962 提出——某個科學社群共享的一整套背景假設、方法、標準與概念框架；不只是一個理論，而是一種看世界的「眼鏡」。（ch08）\n\n**常態科學（normal science）**：在既有典範內從事「解謎」（puzzle-solving）的日常科學工作；異常被壓下或解釋掉，直到累積到危機。（ch08）\n\n**典範轉移（paradigm shift）**：孔恩指的是舊典範不再能容納異常、危機爆發、整套框架被新典範取代的革命性更替——不是「任何觀念更新」。（ch08）\n\n**不可共量（incommensurability）**：前後典範之間可能沒有共同的評估標準或語言，使「理性比較」本身成問題；孔恩的一個爭議性主張。（ch08）\n\n**研究綱領（research programme）**：拉卡托斯 1968–70 提出的科學評估單位——不是單一理論，而是「硬核＋保護帶＋正負向啟發法」的整體；比較進步還是退化比比較單一理論更合理。（ch08）\n\n**硬核（hard core）**：研究綱領中被「負面啟發法（negative heuristic）」保護、不允許被反例直接衝擊的核心假設；反例打到的是保護帶。（ch08）\n\n**保護帶（protective belt）**：圍繞硬核的輔助假設；可以被調整、修改來吸收反例，保護硬核不被否證。（ch08）\n\n**進步的綱領（progressive research programme）**：能產生新預測且應驗的綱領——它在長知識；拉卡托斯的理性換馬判準之一。（ch08）\n\n**退化的綱領（degenerating research programme）**：只忙著打補丁、解釋失敗、不再產生新預測的綱領——技術債的科學版；拉卡托斯建議放棄的時機。（ch08）\n\n**p 值（p-value）**：若虛無假設為真，得到此等或更極端資料的機率——P(E|H₀)；它不是「假設為真的機率」（那需要先驗，是 P(H|E)）；ASA 2016 聲明。（ch09）\n\n**虛無假設（null hypothesis）**：你想否定的「預設立場」（通常是「沒有效果」「沒有差異」）；統計顯著性是說「如果虛無假設為真，這組資料有多罕見」。（ch09）\n\n**統計顯著（statistical significance）**：p 值低於某門檻（通常 0.05）——代表「若虛無假設為真，這組資料相當罕見」，不代表效果重要或假設為真；ASA 2016 明確警告。（ch09）\n\n**p-hacking**：靠研究者自由度（多測變數、看資料停收案、挑有利分析）無意間把偽陽率推高的行為；Simmons 等 2011 奠基；真誠的研究者也會 p-hack 而不自知。（ch09）\n\n**研究者自由度（researcher degrees of freedom）**：資料蒐集、分析、報告中未揭露的彈性（測哪些變數、何時停、選哪種分析）；每一個自由度都在悄悄把偽陽率往上推。（ch09）\n\n**再現性危機（replication crisis / reproducibility crisis）**：2015 年 Open Science Collaboration 複製 100 項心理學研究，只有約 36% 達顯著；揭露了系統性的方法漏洞，催生修補制度（預註冊、開放資料、多實驗室複製）。（ch09）\n\n**科學的真（scientific truth）**：對世界的暫時最佳猜測——經得起反覆否證嘗試而未倒的理論；「暫定」是特性不是缺陷，可被新證據修正。（ch10）\n\n**數學的真（mathematical truth）**：形式系統內給定公理與規則的演繹必然；一旦被證明就永遠成立，不可被新的感官觀察推翻。（ch10）\n\n---\n\n## Part IV — 科學擋不住的、與它如何修補（ch11–14）\n\n「偏心、偽科學、危機修補、機制」——這組詞把科學推向它的邊界，也描述它如何自我修補。\n\n**動機性推理（motivated reasoning）**：我們對「想信的結論」找支持的證據特別賣力、對反例特別嚴苛，且通常渾然不覺——心理機制詳見《思考的陷阱》；本書關注的是科學制度如何從外部防它。（ch11）\n\n**盲法（blinding）**：讓參與者（受試者）或量測者（研究員）不知道分組，以防止期望或動機污染數據與判斷；雙盲是最強版本。（ch11）\n\n**預註冊（preregistration）**：研究開始前在公開平台登記假設、設計、分析計畫，禁止事後更改——堵的是「看到結果才決定方向（HARKing）」與事後挑分析。（ch11，ch13）\n\n**HARKing（Hypothesizing After the Results are Known）**：看到結果之後才「逆推」出假設，讓事後探索偽裝成事先預測——讓偽陽率膨脹的最常見路線。（ch11，ch09）\n\n**偽科學（pseudoscience）**：宣稱有科學基礎，但不符合科學的核心特徵（可證偽、接受複製、進步而非退化）的知識體系；分界是程度問題、有灰色地帶，見 ch12。（ch12）\n\n**進步 vs 退化的分界判準（progressive vs degenerating demarcation）**：本書 ch12 的雙重判準——可證偽（波普爾）加上 Lakatos 進步 vs 退化，比單一判準更能誠實處理灰色地帶。（ch12）\n\n**複製（replication）**：獨立的別人重做同樣的研究——是過濾僥倖的核心機制；「一次顯著」可能是偶然，「多個獨立實驗室複製出同樣結果」才是科學知識的底座。（ch13）\n\n**預註冊報告（registered reports）**：讓審稿發生在資料收集之前（審方法不審結論）——無論結果顯不顯著都發表，從根本截斷「顯著才發表」的誘因。（ch13）\n\n**開放資料（open data）**：研究者公開原始資料，讓他人能重現分析、找出錯誤，或做後設分析。（ch13）\n\n**多實驗室複製（multi-site replication）**：同一個研究在多個獨立實驗室同時進行，進一步排除「單一實驗室特有環境」造成的偽效果。（ch13）\n\n**機制（mechanism）**：解釋「為什麼有效」的因果鏈——塞麥爾維斯有效果（相關＋對照），但說不出為何，這讓他既無法說服社群，也無法預測何時會失效、何時不適用。（ch14）\n\n**黑箱有效（black-box efficacy）**：有效果、但機制未知；歷史上很常見（阿斯匹靈用了 72 年才補上機制）；「黑箱有效」不等於「沒用」，但缺機制時何時失效你也不知道。（ch14）\n\n**捷思雙面性（dual nature of heuristics）**：直覺與捷思往往是雙面刃——在常見情境快速省力，在邊界情境悄悄引導你進溝；科學制度的每一道防線，本質上都是把「有用但有時會騙你的捷思」換成「有明確邊界條件的工具」。（ch11，ch16，ch17）\n\n---\n\n## Part V — 信任、收束與帶走（ch15–18）\n\n「何時信專家、一張檢查表、把全書搬回你的系統」——這組詞是全書的操作面與收束。\n\n**證詞（testimony）**：他人（包括專家）以語言傳遞的知識；不可避免（沒人能親自重做所有實驗）、也有風險（品質不均、可能有誤）——關鍵是「這個來源的可信度來自什麼」。（ch15）\n\n**專家共識（expert consensus）**：獨立研究者在各自的工作中趨向同一結論——可信度來自「獨立趨同的審查過程」，不是來自人數多或頭銜大。（ch15）\n\n**回音室（echo chamber）**：表面看起來像「共識」，其實是互相引用、沒有獨立審查的循環——「所有人都說」不是獨立趨同，是同一聲音的迴響。（ch15）\n\n**訴諸權威（appeal to authority）**：把人的頭銜當成論點本身的謬誤——但「參考專家意見」在對的條件下是合理的（看他是否在自己的領域、是否有獨立證據支持）；心理機制見《思考的陷阱》，本章立判準。（ch15）\n\n**發表偏誤（publication bias）**：有顯著結果的研究比無效果的研究更容易被投稿、被接受、被登出——使文獻呈現系統性偏斜。（ch16）\n\n**檔案抽屜問題（file drawer problem）**：Rosenthal 1979 命名——無效果的研究進了研究者的抽屜，文獻只看得到「被印出來的倖存者」；發表偏誤的最常見形式。（ch16）\n\n**樣本代表性（sample representativeness）**：樣本是否是你想推論的母體的縮影——大樣本治不了偏斜的抽樣管道；偏斜的大樣本比小樣本更危險（更自信地錯）。（ch16）\n\n**回歸均值（regression to the mean）**：被按極端值挑出的群體，下次量測時自然會往平均靠近——不需要任何介入。不了解這個現象，就會把自然回彈誤讀成「治療有效」。（ch16）\n\n**複製狀態（replication status）**：某個經典效應截至查詢時點被複製的狀況（如「大型預註冊複製未能支持其一般效果」）；本書凡引用「經典心理學效應」一律標 (2026-06) 並 hedge，引用前查當前狀態。（ch09，ch13）\n\n**工程師的科學循環（engineer's scientific loop）**：量測→假說（可被推翻的預測）→對照實驗→複製→機制→結論；不是中學那個僵化五步驟，是迭代的防自欺循環。（ch17）\n\n**強意見、弱持有（strong opinions, weakly held）**：先形成明確假說（強意見）、但事先定好什麼反例會讓你改變（弱持有）——這是可證偽態度的日常實踐版；「弱持有」必須事先寫下觸發條件，否則變成「遇到反例就說弱持有、其實絲毫不動搖」。（ch17）\n\n**科學的失敗模式目錄（scientific failure mode catalog）**：ch16 正式建立的十二條自欺漏洞清單，分四個家族（觀察不中立、因果被偷渡、統計被玩、證據被篩過才到你面前）；是科學方法所有防線的操作化身。（ch16）\n\n---\n\n## 附加：「捷思雙面性」與「複製狀態」說明\n\n這兩條是本書獨有的術語慣例，值得單獨解釋：\n\n**捷思雙面性**（ch11 起正式使用）：科學制度的設計假設人帶著各種有用但有時會騙人的捷思進場。「親眼看到」（理論負載）、「我覺得」（確認偏誤）、「大師說」（訴諸權威）本來都是合理的認識論策略，只在邊界情境裡靜悄悄地失效。科學的每一道防線，其實是在說：「這個捷思在什麼條件下會失效，我要在那裡加一道外部閘門。」\n\n**複製狀態**（ch09/ch13 起正式使用）：一個效應被或未被獨立複製的當前狀況，隨時間演進。本書對「經典心理學效應」（社會促發 priming、自我耗竭 ego depletion、權力姿勢 power posing、Bem 2011 預知）一律標 (2026-06) 並使用「大型預註冊複製未能支持其一般效果（截至 2026-06）」的表述——既不宣稱「全部都假」，也不讓它們做未加 hedge 的斷言。引用前查最新狀態。\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 閱讀地圖與防自欺檢查表", "md": "# 附錄 C — 閱讀地圖與防自欺檢查表\n\n> **這份附錄做什麼**：把全書攤成一張地圖，再給你幾條依興趣的捷徑、一份指向書架鄰書的跨書連結整理、ch16「科學自欺失敗模式目錄」的單頁速查版、以及一份去重後的延伸閱讀總清單。你不必從 ch01 一路爬到 ch18——這裡告訴你：想懂某件事，該走哪幾章；讀完某章想往外走，該翻哪本姊妹書、哪篇原始論文。\n\n## 全書地圖重述\n\n下面這張圖你在每個 Part 首章（ch01／ch05／ch08／ch11／ch15）都見過一次（「◄ 你在這裡」逐 Part 往下移）。這裡把它完整攤開，當作整本書的索引：\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半\n     ch12 為什麼是科學贏了（與偽科學的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n這本書的脊椎，是同一個 1847 年的洗手案。它在每個 Part 換一個透鏡，被重看十層——ch18 把這十層攤成一張對帳表，那就是全書的終點口試：\n\n```text\n脊椎十層：同一個塞麥爾維斯案，十種眼光，十種閘門\n\n  第一層  ch01  系統性比較    起手式：不信軼事、信整體規律的對照\n  第二層  ch02  理論負載      「親眼看到」不是免死金牌；框架決定你看到什麼\n  第三層  ch03  歸納＋溯因    假說怎麼來的：溯因（IBE）；過去不保證未來\n  第四層  ch04  可證偽        好理論冒風險；怎樣都對的理論沒在做科學的事\n  第五層  ch05  對照          控制變因、隨機化、雙盲——各堵一種自欺漏洞\n  第六層  ch06  因果 vs 相關  混淆變因；相關推不出因果；Bradford Hill 視角\n  第七層  ch07  貝氏確證      證據不是非黑即白；它逐步抬高或壓低可信度\n  第八層  ch08  科學社群      防自欺最後一道防線是制度，但制度也會失靈\n  第九層  ch09  統計陷阱      p 值誤用、p-hacking、再現性危機；統計也是刃\n  第十層  ch10  兩種真        科學的真永遠暫定；數學的真釘在形式系統裡\n```\n\nch11–17 不是新的核心透鏡，而是前十層在**制度面／邊界面／態度面**的延伸應用：\n\n```text\n七個延伸透鏡與它們掛回的核心層\n\n  ch11 動機性推理   ← 延伸自 ch02（理論負載）＋ ch08（社群）\n  ch12 偽科學分界   ← 延伸自 ch04（可證偽）\n  ch13 複製修補     ← 延伸自 ch09（統計考驗）\n  ch14 機制         ← 延伸自 ch06（因果）＋ ch08（社群）\n  ch15 證詞權威     ← 延伸自 ch02（理論負載）＋ ch08（社群）\n  ch16 失敗模式目錄 ← 十層的彙整（操作化身）\n  ch17 工程師態度   ← 十層的內化（日常實踐）\n```\n\n整本書其實只在問一句話：**科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低——這套防線，你如何帶著它過日子。**\n\n## 依興趣的選讀路徑\n\n不想十八章順著爬？下面五條捷徑各帶你去一個明確的目的地。每條都自成一個故事，讀完那幾章就夠回答標題那個問題。\n\n```text\n路徑 A：只想懂「科學的起點與起手式」\n   ch01 → ch02 → ch03 → ch18\n   先讀懂塞麥爾維斯案——為什麼他做的事是科學起手式（ch01），\n   再碰「親眼看到」不是免死金牌（ch02），\n   然後搞懂假說從哪來（溯因）＋過去不保證未來（歸納問題，ch03），\n   最後在收官章一次看完十層對帳（ch18）。\n   最短的「理解科學本質」路線。\n\n路徑 B：想懂「對照實驗與因果推論」\n   ch05 → ch06 → ch07\n   先把對照實驗的每個要素拆清楚——各自堵的是哪種自欺（ch05），\n   再搞懂為何「相關≠因果」、混淆變因如何搗鬼（ch06），\n   最後看「證據如何逐步更新信念」而不是非黑即白（ch07 貝氏確證）。\n   三章看完「設計防線」整個 Part，也是看懂 A/B test 的哲學底子。\n\n路徑 C：想懂「p 值與再現性危機」\n   ch09 → ch13 → ch16\n   先把 p 值真正在說什麼、不在說什麼搞清楚，以及 p-hacking 如何\n   讓真誠的人也會犯（ch09），再看危機之後科學如何自我修補——預\n   註冊、開放資料、多實驗室複製（ch13），最後把這些失敗模式收成\n   一張可以逐項掃的防自欺檢查表（ch16）。\n   工程師看技術 benchmark 與白皮書時最需要的三章。\n\n路徑 D：想懂「科學社群、典範與制度失靈」\n   ch08 → ch11 → ch12 → ch15\n   先看「科學是一群人」——典範如何讓一個有效療法被否決二十年（ch08），\n   再看制度設計如何假設「人會自欺」（ch11），用可證偽＋Lakatos 判準\n   拆開科學 vs 偽科學的灰色地帶（ch12），最後面對「何時該信專家、何\n   時該自己查」的實際問題（ch15）。\n\n路徑 E：只想要工程師的精華（最短版）\n   ch01 → ch04 → ch06 → ch09 → ch16 → ch17\n   科學起手式（ch01）→ 可證偽（ch04）→ 相關≠因果（ch06）→ p 值\n   陷阱（ch09）→ 防自欺檢查表（ch16）→ 把全書搬回你的系統（ch17）。\n   六章版的全書精華，讀完能對另一個工程師講清楚。\n```\n\n五條路徑彼此有重疊（ch01 是 A 和 E 的起點、ch18 是 A 的終點），那是刻意的——它們交會的地方，就是全書反覆叩問的那條中央張力：**科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低。** 讀完任一條想再往深走，順著地圖把缺的 Part 補回來即可。\n\n## 防自欺檢查表（ch16 單頁速查版）\n\n這張表的完整版在 ch16，含每條的「為什麼」與 worked example。這裡是**操作用的速查版**——遇到任何「研究顯示…」或「我們快了 10 倍」，逐項掃一遍。\n\n```text\n科學自欺失敗模式目錄（速查版）\n\n家族 A：你看到的不是事實\n  #1 理論負載未察   問：這個「觀察」是中立的，還是被「挑哪個指標、什麼\n                       算異常」的框架塑造過了？（ch02）\n\n家族 B：因果被偷渡\n  #3 混淆變因       問：誰會去用 X？會不會是「本來就更健康／有錢」的人\n                       才用 X？那個第三因才是真兇。（ch06）\n  #4 反向因果       問：箭頭會不會是反的？是 X→Y，還是 Y→X，還是互為\n                       因果？（ch06）\n  #12 回歸均值      問：這批人是「按極端值挑出來」的嗎？極端值本來就會\n                       往平均回彈，沒對照組分不清。（ch16）\n\n家族 C：統計被玩\n  #5 p-hacking      問：他們測了幾個變數、跑了幾種分析，才挑出這個顯\n     ／多重比較          著的？測 20 個總有一個會中。（ch09）\n  #6 偷看資料       問：停止規則是「事先定好」還是「看到顯著就收手」？\n                       後者等於灌爆偽陽率。（ch09）\n  #11 樣本不具      問：這個樣本是怎麼選出來的？選進來的跟你想推論的\n      代表性             母體一樣嗎？（ch16）\n\n家族 D：證據被篩過才到你面前\n  #2 不可證偽       問：有沒有任何可能的結果會被算成「這宣稱錯了」？\n                       答不出來＝它沒在做科學的事。（ch04）\n  #7 發表偏誤       問：失敗、無效果的研究去哪了？是真的都成功，還是\n     ／檔案抽屜          只有成功的被印出來？（ch16）\n  #8 未複製         問：這個結果被「獨立的別人」重做出來過嗎？一次可能\n                       僥倖。（ch13）\n  #9 無機制的相關   問：就算相關是真的、對照乾淨，你說得出「為什麼有\n                       效」嗎？說不出時，它何時失效你也不知道。（ch14）\n  #10 訴諸權威      問：這結論的份量來自「獨立證據的趨同」還是「這個\n                       人很大牌」？權威是線索不是證據。（ch15）\n```\n\n記家族比記條目省力：**A 看框架、B 看因果方向、C 看統計自由度、D 看倖存篩子。** 遇到任何宣稱，先問「這個宣稱是哪個家族的可疑犯」，再拿對應條目深入問。\n\n## 跨書連結整理\n\n本書是「推理六書」之一，書架上有幾本相鄰的姊妹書。本書遇到它們的主場時點到為止、把深度指過去。下面按主題整理「哪幾章的哪件事，該往哪本書補」。格式照全書慣例——**主題式帶過、不寫死他書的章號**。\n\n```text\n主題                              本書出現章次          指向\n────────────────────────────────  ──────────────────  ──────────────────────────────\n機率計算、條件機率、              ch06、ch07、          《馴服隨機》\n貝氏定理「怎麼算」、              ch09\np 值的統計機制、相關係數 ρ、\n大數法則、假設檢定計算\n\n信念更新的規範面、               ch07、ch17            《決策與理性》\n期望效用、賭注大小與\n「該不該做對照」的正式權衡\n\n確認偏誤、動機性推理的           ch01、ch08、          《思考的陷阱》\n心理機制、為何 p-hacking 的       ch09、ch11\n人不自知、訴諸權威的\n心理面\n\n形式系統的真 vs 可證、            ch10                  《這句話無法被證明》\n哥德爾不完備定理的內容\n（ch10 做「兩種真」的對照，\n把形式系統那一邊指向它）\n```\n\n- **機率機制 ↔ 科哲意義是同一枚硬幣兩面**：本書從頭到尾說「貝氏確證的科哲意義」「p 值在說什麼」，但刻意不算「怎麼算」——那是《馴服隨機》的地盤。ch07 把「貝氏定理的意義」給你；ch09 把「p 值的誤讀」給你；「概似比怎麼算出來」「顯著性檢定的機制」去《馴服隨機》。（見《馴服隨機》談條件機率與貝氏定理那章、談假設檢定那章。）\n\n- **制度防線 ↔ 心理機制**：本書講「科學作為制度怎麼防自欺」（盲法堵期望污染、預註冊堵事後挑分析、同儕審查堵個人盲點、複製堵僥倖）；「個人心理為何自欺」——為什麼確認偏誤這麼難克服、動機性推理如何滲進每一步——是《思考的陷阱》的主場。ch11 把心理機制一句帶過就指過去；這是刻意的分工。（見《思考的陷阱》談確認偏誤與動機性推理的那章。）\n\n- **信念更新的「描述」vs「規範」**：本書 ch07 講「貝氏確證作為一種描述——證據如何更新信念的結構」；但「理性上你**該**怎麼更新、如何根據後驗下注」——那是規範認識論的地盤，由《決策與理性》擁有。ch17 把「賭注大小與對照成本的正式權衡」也指向它。（見《決策與理性》談理性信念更新與期望效用的那章。）\n\n- **數學的真與科學的真（弱連結）**：ch10 做「形式系統內真理 vs 科學的暫定真理」的對照，把哥德爾那一邊（形式系統內真理如何溢出可證）指向《這句話無法被證明》。本書只借一句「數學真錨在形式系統、科學真錨在最佳暫定猜測」，完整的哥德爾故事在那本書。（見《這句話無法被證明》談形式系統內「真」與「可證」分家的那章。）\n\n## 延伸閱讀總清單（去重）\n\n把全書十八章的 `## 延伸閱讀` 彙整成一份分類總表。同一來源在多章出現的只列一次（標明它服務哪些章），每條一句話講「為什麼值得讀、讀哪一段」。指向本書其他章的內部連結與上面已整理的跨書指引，這裡不重複收。\n\n### 哲學與概念錨點（最該先收藏的一批）\n\n- **Carl Hempel,《Philosophy of Natural Science》(1966)**（ch01、ch05、ch14、ch17、ch18 都服務）——塞麥爾維斯案成為科學哲學課本主角的源頭；第二章「Scientific Inquiry: Invention and Test」是本書脊椎的科哲底座；讀他怎麼把「逐一排除候選解釋」拆成一連串小實驗，同時確認死亡率數字（他引 1848 年 1.27% vs 1.33%）。全文掃描可在 archive.org 找到。\n\n- **Stanford Encyclopedia of Philosophy（SEP），「The Problem of Induction」**（plato.stanford.edu/entries/induction-problem/）（ch01、ch03 服務）——休謨歸納問題的權威入門；讀第 1 節就能感受「科學為何永遠不能証明普遍律」；各種當代回應（康德、可靠論、機率論）也在這。\n\n- **Stanford Encyclopedia of Philosophy，「Abduction」**（plato.stanford.edu/entries/abduction/）（ch03 服務）——溯因與 IBE 的權威條目；想看「皮爾士的溯因偏重生成、哈曼的 IBE 偏重在候選中選最佳」的嚴格區分，讀這篇；本書取共通直覺不裁判。\n\n- **Stanford Encyclopedia of Philosophy，「Karl Popper」**（plato.stanford.edu/entries/popper/）（ch04、ch10 服務）——可證偽、分界、corroboration 的權威整理；讀「Falsifiability」與「Corroboration」兩節；特別注意 corroboration ≠ confirmation，是本章最容易混淆的區分。\n\n- **Stanford Encyclopedia of Philosophy，「Theory and Observation in Science」**（plato.stanford.edu/entries/science-theory-observation/）（ch02、ch18 服務）——理論負載的當代爭論（滲透多深、知覺有沒有中立核心）的完整地圖。\n\n- **Stanford Encyclopedia of Philosophy，「Scientific Underdetermination」**（plato.stanford.edu/entries/scientific-underdetermination/）（ch02、ch04 服務）——杜恩–蒯因難題與低度決定的源頭；讀「Holist Underdetermination」那節，搞懂為何反例不會自動告訴你該砍誰。\n\n- **Stanford Encyclopedia of Philosophy，「Thomas Kuhn」**（plato.stanford.edu/entries/thomas-kuhn/）（ch08 服務）——典範、常態科學、不可共量的權威條目；特別讀「incommensurability」一節，搞清楚孔恩反對相對主義讀法這件事。\n\n- **Stanford Encyclopedia of Philosophy，「Imre Lakatos」**（plato.stanford.edu/entries/lakatos/）（ch08、ch12 服務）——研究綱領、硬核／保護帶、進步 vs 退化的完整技術介紹；想把「退化的舊系統」這個比喻用準，讀「methodology of scientific research programmes」一節。\n\n- **Stanford Encyclopedia of Philosophy，「Confirmation」**（plato.stanford.edu/entries/confirmation/）（ch07、ch09 服務）——確證理論的完整地圖，含烏鴉悖論、增量確證 vs 絕對確證之爭；想知道「為何 p 值單獨算不出為真機率、需要先驗」的科哲背景，讀這篇。\n\n- **Stanford Encyclopedia of Philosophy，「Epistemological Problems of Testimony」**（plato.stanford.edu/entries/testimony-episprob/）（ch15 服務）——「證詞作為知識來源」的權威源頭；重點讀化約論（休謨派）vs 反化約論（里德派）那節，那就是 ch15 兩種工程師性格的哲學原型。\n\n### 奠基原始論文（本書引用的學術底座）\n\n- **David Hume,《An Enquiry Concerning Human Understanding》（1748）第四節**（ch03 服務）——歸納問題的精簡原典，比 1739《人性論》好讀；只讀第四節（Sceptical Doubts）就能領教那個讓人睡不著的兩難。公版全文見 davidhume.org。\n\n- **Karl Popper,《Conjectures and Refutations》(1963)，第一章**（ch04、ch12 服務）——波普爾自己用最白話講「我十七歲怎麼想出可證偽」，用愛因斯坦、占星、阿德勒精神分析的對比把分界動機說清楚。中譯本《猜想與反駁》。\n\n- **Norwood Russell Hanson,《Patterns of Discovery》(1958)**（ch02 服務）——理論負載的原典，第一章就是第谷／克卜勒看日出、X 光管、鴨兔圖；「there is more to seeing than meets the eyeball」就在裡面。Internet Archive 有全文（archive.org/details/patternsofdiscov0000hans_i5v6，2026-06 可借閱）。\n\n- **Hempel, \"Studies in the Logic of Confirmation\"（1945）**（ch07 服務）——烏鴉悖論的原始出處；讀它你會發現韓培爾自己接受這個悖論結論，用「先備知識」解釋為何感覺荒謬。\n\n- **Bradford Hill, A. B. (1965). \"The Environment and Disease: Association or Causation?\"**（ch06 服務）——九個視角的原始演講；讀它你會驚訝希爾自己有多謹慎（反覆強調「不是判準、沒有一個是必要或充分」）。Wikipedia「Bradford Hill criteria」條目整理了九條與「viewpoints 不是 criteria」的澄清。\n\n- **Wasserstein & Lazar, ASA p 值聲明，*The American Statistician* 70(2), 2016**（plato.stanford.edu/entries/confirmation/ 或 tandfonline.com/doi/full/10.1080/00031305.2016.1154108）（ch09 服務）——六原則的原文；讀第 2 條（不是為真機率）和第 5 條（顯著≠重要）。\n\n- **Simmons, Nelson & Simonsohn, \"False-Positive Psychology,\" *Psychological Science* 22(11), 2011**（journals.sagepub.com/doi/10.1177/0956797611417632）（ch09、ch13、ch16 服務）——p-hacking 的學術奠基文，「研究者自由度」一詞的出處；看他們怎麼用合理選擇「證明」聽披頭四的歌讓人變年輕。\n\n- **Open Science Collaboration, \"Estimating the Reproducibility of Psychological Science,\" *Science*, 2015**（osf.io/ezcuj/overview）（ch09、ch13 服務）——再現性危機的引爆研究；看「97% → 36%」與「效果量約半」這兩個數字的脈絡，以及「成功複製」有多種口徑（36%–47%）。\n\n- **Robert Rosenthal, \"The file drawer problem and tolerance for null results,\" *Psychological Bulletin*, 1979**（ch16 服務）——「檔案抽屜問題」一詞的出處；讀它對「文獻是倖存者展示櫥窗」這個結構的原始論證。\n\n### 史實查證來源（脊椎數字的一級依據）\n\n- **James Lind Library，Irvine Loudon「Ignaz Phillip Semmelweis' studies of death in childbirth」(2013)**（jameslindlibrary.org）（ch01 服務）——兩病房 98.4‰ vs 36.2‰、1848 降到 12.7‰ 這組數字的可靠史學來源，本書死亡率即據此；讀它對「為何兩病房對照是最乾淨的數字」更踏實。\n\n- **PMC,「How dramatic were the effects of handwashing on maternal mortality observed by Ignaz Semmelweis?」(PMC3807775)**（ch01、ch09 服務）——專門拆解 18.27%（1847 年 4 月單月）與全年數字差別；正是 ch01「直覺的陷阱」與 ch09 統計誠實版的史料根據。\n\n- **PMC,「Theory of scientific investigation by Hempel and a case of Semmelweis」(PMC5749055)**（ch01、ch08、ch18 服務）——把韓培爾的科學研究理論逐步套到塞麥爾維斯案；想核對史實與方法對應讀這篇，也確認本書脊椎選擇的正當性。\n\n- **PMC,「Ignaz Semmelweis: a victim of harassment?」(PMC7476981)**（ch08 服務）——為塞麥爾維斯翻案的史學視角，質疑傳統「性格缺陷」敘事；讀它守住「多因交織、別簡化成單一道德故事」的誠實版。\n\n### 科普與通史（敘事版）\n\n- **Carl Sagan,《The Demon-Haunted World》(1995)，第十二章「謬誤偵測工具包（Baloney Detection Kit）」**（ch12、ch16 服務）——本書防自欺檢查表的一個更早的可讀版本，天文學家與科普作家的視角，比哲學文獻更好讀。繁體版書名常譯《魔鬼出沒的世界》。\n\n- **Judea Pearl & Dana Mackenzie,《The Book of Why》(《因果革命》2018)**（ch06 服務）——想真正搞懂「觀察 vs 介入」do-calculus 的鴻溝、混淆變因與後門準則，這是最好讀的因果推論入門。本書只用「一句話的 do」，這本書展開成完整框架。\n\n- **Tyler Vigen,《Spurious Correlations》(spuriouscorrelations.com)**（ch06 服務）——純巧合假相關的著名收藏；看完對「兩條曲線一起動」會永久免疫。當笑話讀，教學效果一流。\n\n- **Naomi Oreskes,《Why Trust Science?》(Princeton, 2019)**（ch15 服務）——本書「共識的可信度來自社會審查過程、不是人數」這個核心論點的完整版；讀她對「製造出來的假爭議」的論證——正是塞麥爾維斯案的正解。\n\n- **Massimo Pigliucci & Maarten Boudry（eds.）,《Philosophy of Pseudoscience》(2013)**（ch12 服務）——學術論文集，收當代科哲學者對分界問題的最新討論，含「分界是程度問題」路線的最完整辯護；難度較高，適合想深入科哲的讀者。\n\n### 統計與再現性危機（深入面）\n\n- **R. A. Fisher,《The Design of Experiments》(1935)**（ch05 服務）——隨機化、重複、區組三原則的原典；「女士品茶」那段是理解「隨機化讓顯著性檢定有效」最好的入口（讀導論與第二章）。\n\n- **Michael Strevens, *Notes on Bayesian Confirmation Theory***（strevens.org/bct/BCT.pdf）（ch07 服務）——一份寫得很清楚的貝氏確證講義；把「概似比為何是確證的核心」講透，比本書嚴謹一級但仍可讀，讀前三章。\n\n- **Center for Open Science（OSF, osf.io）與 Registered Reports（cos.io/rr）**（ch13 服務）——預註冊與註冊報告的實際平台與規範；想看「先凍結驗收標準」在科學界長什麼樣、流程怎麼跑，看這裡的指引（工程師會覺得親切：很像 RFC＋測試規格先行）。\n\n- **Pronin, Lin & Ross,〈The Bias Blind Spot〉(2002)，及其 2024 年預註冊複製**（ch11 服務）——「偏誤盲點」的奠基研究：人普遍認為自己比別人更不偏誤；配上 2024 年的預註冊複製，正好示範「關於客觀性的效應被複製制度反過來檢驗」。\n\n- **Kerr,〈HARKing: Hypothesizing After the Results are Known〉(1998)**（ch11、ch09 服務）——HARKing 一詞的奠基文；想搞懂「事後挑分析」陰險在哪、為什麼每一步都覺得自己在做正當探索，讀問題界定段。\n\n- **D. Colquhoun,〈placebo effects are weak: regression to the mean is the main reason ineffective treatments appear to work〉(dcscience.net)**（ch05、ch16 服務）——把「安慰劑效應大半是回歸均值」講得最透的科普長文；當「逼你看清回歸均值」的解毒劑讀（2026-06 查證為現存；觀點偏強）。\n\n### 可信度查證來源（引用前確認年份與史實）\n\n- **Internet Encyclopedia of Philosophy，「The Problem of Induction」**（iep.utm.edu/problem-of-induction/）（ch03 服務）——比 SEP 更白話的入門；「自然齊一性」與「循環論證」那段講得特別清楚，適合先讀這篇暖身再去 SEP。\n\n- **Internet Encyclopedia of Philosophy，「Popper: Philosophy of Science」**（iep.utm.edu/pop-sci/）（ch04 服務）——比 SEP 好讀的入門；1919 愛丁頓日食當「冒風險預測」範例講得清楚。\n\n- **Aeon, \"Imre Lakatos and the philosophy of bad science\"**（aeon.co/essays/imre-lakatos-and-the-philosophy-of-bad-science）（ch08、ch12 服務）——比 SEP 好讀的長文，把「進步 vs 退化」放進真實科學爭議裡講；適合先讀它建立直覺再回 SEP。（2026-06 連結有效）\n\n- **Stanford Encyclopedia of Philosophy，「Gödel's Incompleteness Theorems」**（plato.stanford.edu/entries/goedel-incompleteness/）（ch10 服務）——本章「真 vs 可證」那個誠實補丁的完整版；重點讀「truth and provability are distinct」的說明，以及「不完備講的是對某特定形式系統、不是絕對不可證」這個警告。\n\n- **Stanford Encyclopedia of Philosophy，「Scientific Realism」**（plato.stanford.edu/entries/scientific-realism/）（ch10 服務）——想深入「牛頓被相對論超越而非全錯」的爭論（科學實在論 vs 反實在論），讀這篇；注意這裡科哲未定論，本書只取「適用域」這個各方都接受的直覺。\n\n- **Internet Encyclopedia of Philosophy，「Epistemology of Testimony」**（iep.utm.edu/ep-testi/）（ch15 服務）——比 SEP 更白話的「個人主義知識論 vs 社會知識論」對立講解；讀「Reductionism and Non-Reductionism」一節。\n\n---\n\n讀到這裡，這趟旅程的地圖、捷徑、鄰書與外部資源都在你手上了。回到那個 1847 年的洗手案——它在 ch18 攤成十層；往書架外走，從上面這份清單挑下一步。科學方法沒說「人都會理性自我糾錯」，它說的是：**即使每個人都誠實，自欺也是難題；防偏見不是預設，而是需要被設計、被制度化的成就。** 這本書要你帶走的，就是這一句——以及手上那張十二條的防自欺清單。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="scimethod";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">如何不騙自己<br><span style="font-weight:400;font-size:12px;color:var(--muted)">科學方法的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 如何不騙自己';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
