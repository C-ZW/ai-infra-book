/* layout */
#layout{display:flex;height:100%}
#sidebar{width:288px;min-width:288px;background:var(--side);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0 40px;transition:transform .2s}

.prose th,.prose td{border:1px solid var(--border);padding:.5em .75em;text-align:left;vertical-align:top}
.prose th{background:var(--codebg);white-space:nowrap}
#pager{max-width:calc(var(--pw)*1rem);margin:0 auto;padding:0 1.7rem 5rem;display:flex;gap:12px;justify-content:space-between}
#pager .btn{flex:1;text-align:center;padding:13px;font-size:14px;max-width:48%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

#backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:9;display:none}

@media (max-width:880px){

<script id="bookdata" type="application/json">{"chapters": [{"id": "README", "file": "README.md", "group": "開始", "title": "如何不騙自己", "md": "# 如何不騙自己\n\n### 科學方法的直覺與驚嘆\n\n> 科學不是「證明真理」，而是有系統地把自己被騙的機會壓到最低。這本書想讓你親身感受這一刀——並且能用自己的話，對另一個工程師講清楚：**一個結論要滿足什麼，才值得相信；以及我此刻最可能在哪裡騙了自己。**\n\n---\n\n這是一本寫給資深後端工程師的科學方法「欣賞」書。純興趣、和工作無關、純紙上推演——它不教你跑統計軟體、不發 lab 作業、不要你背公式。它只想帶你看懂一件反直覺的事：**科學不是一張流程圖，而是人類花了三百年、一個漏洞一個漏洞地去堵自己騙自己的管道。**\n\n你已經在工作裡碰過這套方法的影子，只是沒這樣叫它：凌晨三點你去拉兩個時段的錯誤率對照、而不是相信「我覺得是 DB」，這就是科學的起手式（系統性比較）；你做 A/B test 讓流量隨機分流、而不是靠感覺決定版本好壞，這就是對照實驗的核心（堵分組偏差）；你的 alert 一響你第一個想的是「是 false alarm 嗎」，這就是貝氏直覺（先驗低時一次觀察不夠更新信念）；你 root cause 的時候從一堆症狀跳到「最能解釋這組線索的根因」，這不是歸納也不是演繹，是溯因推理。這本書把這些直覺接上一個更大的故事。\n\n## 這本書怎麼讀\n\n- **純紙上推演**：每章的「紙上推演」是口頭自答、手算示範、論證拆解，不是要你開終端機。所有數值示範一律手算、攤在你眼前的 ` ```text ` 表裡。\n- **直覺與精確意義優先**：每個概念先回答「它在堵哪一種自欺」（可證偽在防「怎樣都對的假理論」、隨機化在防「分組偏差」、雙盲在防「期望污染量測」、預註冊在防「事後挑分析」），再給形狀。\n- **講得出來才算過**：每章末的「自我檢核」是口頭題——對齊「能不能把這個概念講給另一個工程師聽」的深度。優先問「為什麼」而不是「是什麼」。\n- **陷阱視角是賣點**：科學方法正是「想當然耳」最常出錯的領域。每章的「直覺的陷阱」段，專門守住那些被講爛了的庸俗版（「科學方法就是五步驟」「p<0.05 代表 95% 為真」「觀察就是客觀事實」「塞麥爾維斯讓死亡率從 18% 降到 1%——那是用單月峰值對全年、誇大效果的假誠實」），還你正確版。\n\n## 一條脊椎貫穿全書\n\n整本書反覆回到**同一個 1847 年的洗手案**（史實底座釘在 `_meta/landscape-2026-06.md`）：\n\n```text\n脊椎：塞麥爾維斯洗手案的核心數字（每章從不同透鏡重看它）\n\n  地點／背景  維也納總醫院，1846–1848\n  兩病房對照  第一病房（醫師）98.4‰ vs 第二病房（助產士）36.2‰，1840–46 平均\n              （同院同期、單雙日交替分配——最乾淨的對照）\n  介入前後    1846 全年約 11.4% → 1848 全年約 1.27%（全年 vs 全年、百分比版）\n  轉捩點      1847 年 5 月：Kolletschka 之死 → 溯因出「屍體微粒」假說 → 氯化石灰洗手\n  缺口        無細菌理論（Pasteur/Koch 1860s–80s 才立）；有效果、無機制\n  結局        被否決二十年；1865 年死於敗血症；細菌說後平反\n```\n\n這個案子之所以是完美脊椎——它**整套科學方法的每一環都齊全又都出問題**：扎實的觀察與對照、漂亮的介入效果、卻機制未明、又被社群否決、主角憂鬱而終、最後平反。它同時是「科學如何防自欺」的正面教材與「科學社群如何失靈」的反面教材。Hempel 1966 年在《Philosophy of Natural Science》裡選它當科學方法課本範例，絕非偶然。\n\n每深入一章，就用一個方法論透鏡重看它一次——ch18 把十個核心透鏡攤成一張對帳表，那就是全書的終點口試。\n\n## 全書地圖\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半\n     ch12 為什麼是科學贏了（與偽科學的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n\n附錄 A 人物與年表速查　附錄 B 術語表　附錄 C 閱讀地圖與防自欺檢查表\n```\n\n這本書的中央張力，是那句從 ch01 敲到 ch18 的話：**科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低。** 十八章，是十八個切面，都在回答同一個問題。\n\n## 書架上的鄰居\n\n這本書只用自己的聲音講「科學的本質是有系統的防自欺」；需要更深的計算或心理機制時，它會把你指向書架上相鄰的書：\n\n- 機率計算太在意——貝氏定理怎麼算、p 值的統計機制、相關係數 ρ、大數法則 →《馴服隨機》（本書只給科哲意義，「怎麼算」一律指向它）\n- 「我如何理性地下注、更新信念」的規範面——信念更新作為理性義務、期望效用、賭注大小 →《決策與理性》\n- 個人為什麼對證據偏心——確認偏誤、動機性推理的心理機制、為何 p-hacking 的人不自知 →《思考的陷阱》（本書講「科學制度怎麼防」，它講「大腦為什麼這樣」）\n- 數學的真 vs 科學的真——形式系統裡「真」如何溢出「可證」的那道分裂 →《這句話無法被證明》（ch10 做這個對照，把形式系統那一邊指向它）\n\n本書屬「推理六書」家族，上述姊妹書一律以主題方式指向（不寫死章號），因為彼此都是活的書。\n\n## 給誰讀\n\n唯一讀者：一位六年以上的資深後端工程師。你不需要任何科學哲學背景——你需要的直覺，A/B test、canary 放量、post-mortem、相關性故障、alert fatigue，早就教會你了。本書把這些工程經驗當成錨點，從「你去拉兩個時段的指標對照」起步，一路帶你看到「一整套科學制度如何用三百年累積的防線，系統性地把人被自己騙的機會壓到最低——以及它到底在哪裡也會失靈」。\n\n準備好了，就從 **ch01 — 兩個病房的死亡率：科學的起手式** 開始。你的直覺，正準備在接下來每一章被它自己騙一次——這正是值得你慢慢讀的地方。\n"}, {"id": "ch01-two-wards", "file": "ch01-two-wards.md", "group": "Part I — 個人推理的防線", "title": "ch01 — 兩個病房的死亡率：科學的起手式", "md": "# ch01 — 兩個病房的死亡率：科學的起手式\n\n> **本章解決什麼問題**：科學不是「證明真理」，而是有系統地把「自己被騙的機會」壓到最低。這本書用一個 1847 年的洗手案當貫穿全書的脊椎，每深入一章就換一個方法論透鏡重看它一次。本章讓它登場，立起科學最素樸的起手式——「不問下一個產婦會不會死，問整體死亡率為什麼不同」——並把全書地圖攤開，告訴你後面十七章要去哪裡、各自堵的是哪一種自欺。這是 Part I（個人推理的防線）的第一章。\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來   ◄ 你在這裡\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n這本書只有一個讀者：一個寫了六年以上後端的你。所以我不打算用「科學萬歲」那種語氣跟你說話。我打算用你已經會的東西——A/B test、canary、post-mortem、相關性故障、alert fatigue——當錨點，一路把你帶到一個你大概沒認真想過的問題上：**你憑什麼相信你相信的東西？**\n\n而我想先講清楚這本書的中央張力，它會在每一章回來敲你一次：\n\n> 科學不是「證明真理」，是有系統地把自己被騙的機會壓到最低。\n\n如果你讀完這本書只記得一句話，記這句。下面所有的方法、制度、習慣——可證偽、對照、隨機化、雙盲、貝氏、同儕審查、預註冊——本質上都是同一件事的不同切面：**人類花了三百年，一個漏洞一個漏洞地，去堵自己騙自己的管道。** 這不是一條五步驟的流程圖，是一場至今未停的攻防。\n\n## 從你已知的出發\n\n凌晨三點，PagerDuty 把你叫醒。某個 API 的 P99 從 80ms 跳到 1.2 秒，錯誤率在爬。你登進去，腦子裡第一個念頭是「八成是 DB 又慢了」。\n\n你做了什麼？你**沒有**因為「我覺得是 DB」就去重啟資料庫。如果你是個還能保住飯碗的工程師，你做的是：拉出 RDS 的 CPU、連線數、慢查詢日誌；把「出事的這十分鐘」跟「昨天同一時段的正常狀態」擺在一起比；看那條延遲曲線是跟著流量尖峰一起動，還是在流量平穩時自己飆起來的。\n\n停一下。你剛剛做的這一連串動作，藏著一個非常深的信念，深到你從來不會說出口：\n\n**你不相信「我覺得」，你相信「對照之後指標有沒有動」。**\n\n這個信念有一個更精確的版本，它是整本書的地基：\n\n> **單一事件不可預測，整體規律可以規劃。**\n\n你沒辦法跟我保證「下一個進來的這個請求」會不會逾時——那受太多偶然因素影響。但你完全可以規劃「這個 endpoint 的錯誤率」「這批機器的 P99 分布」「這個禮拜的容量水位」。你監控的從來不是某一個請求的命運，是**一群請求的統計性質**。你做容量規劃時，沒人在算「第 4,471,032 個請求」；你在算速率、百分位、趨勢。\n\n這正是科學的起手式。不是「這一個會怎樣」，是「這一類的整體規律是什麼，而且為什麼這一群跟那一群不同」。\n\n軼事驅動的工程師會說：「我上次遇到這種症狀就是 Redis 連線池滿了。」數據驅動的工程師會說：「給我看出事時段 vs 正常時段的連線池指標，我們來對照。」這兩種人的差別，不是聰明，是**對自己的記憶與直覺的信任程度**。前者信自己，後者信對照。\n\n而 1847 年的維也納，有一個醫師，在一個沒有統計學、沒有細菌理論、沒有 A/B test 框架的年代，做了一件跟你凌晨三點做的事一模一樣的事：他不信「我覺得」，他去拉了兩個病房的死亡率，把它們擺在一起對照。\n\n## 脊椎登場：兩個病房，兩個死亡率\n\n這是本書的脊椎案例。我們會用它整整十八章。第一次見它，先把史實釘死（以下年份、數字都來自本書的事實基準表，並經獨立查證）。\n\n塞麥爾維斯（Ignaz Semmelweis，1818–1865），匈牙利裔醫師，1846 年起在維也納總醫院（Vienna General Hospital）第一產科病房當助手。這所醫院有個結構，日後會被科學哲學界當成完美的教學素材：\n\n- **第一病房**：由**醫師與醫學生**接生。\n- **第二病房**：由**助產士**接生。\n- 產婦怎麼分到哪個病房？**按單雙日交替分配**入院——沒有臨床上的挑選，純粹看你哪天進來。\n\n請你戴上後端的眼睛看這一句：**「按單雙日交替分配、無臨床選擇」**。這幾乎就是一場天然的隨機分流。產婦不能挑病房，醫院也不是把重症往哪邊塞。換句話說，兩個病房的產婦，在進門那一刻，平均而言沒有系統性差異。這個性質我們在 ch05 講對照實驗時會回來大書特書——它讓「兩病房的死亡率差異」非常難用「病人本來就不一樣」搪塞過去。\n\n那差異有多大？\n\n```text\n兩病房產褥熱死亡率(每千次生產,1840–1846 平均;同院同期、最乾淨的對照)\n\n  第一病房(醫師/醫學生)  ████████████████████████████  98.4 ‰\n  第二病房(助產士)        ██████████                    36.2 ‰\n                                                         ↑ 約 2.7 倍差\n\n  ← 同一所醫院、同一個年代、產婦按單雙日近乎隨機分配\n  ← 唯一系統性差別:誰接生\n```\n\n98.4‰ 對 36.2‰。將近三倍。產褥熱（childbed fever / puerperal fever，當時的頭號殺手）在醫師的病房裡，殺死將近一成的產婦。\n\n這裡我要先插一句**誠實警告**，它在本書非常重要，後面 ch09 還會專門回來：**我給你的是「每千人版、兩病房同期對照」（98.4 vs 36.2），這是最乾淨的數字。** 你日後一定會在別處讀到更聳動的版本——「塞麥爾維斯讓死亡率從 18% 降到 1%」。那個 18%（精確是 18.27%）是**1847 年 4 月單月**的數字，是介入前一個月、接近峰值的切片；洗手令 5 月中才下。拿「4 月單月峰值」去對比「1848 全年 1.27%」，效果會在視覺上被放大——那是用挑選過的時間切片誇大效果。我們在 ch09 會把這當「連防自欺的脊椎案例，都可能被人挑數字誇大」的活教材。本章一律用 98.4 vs 36.2（兩病房對照），以及全年 vs 全年（1846 約 11.4% → 1848 約 1.27%）這兩套**誠實**的表述。\n\n現在重點來了——這就是科學的起手式：\n\n當時絕大多數醫師，看著第一病房一個又一個產婦死去，他們「看到」的是**一個個悲劇**：這個產婦體質弱、那個產程不順、這幾天天氣不好瘴氣重。每一個死，都有一個就地的、軼事式的解釋。\n\n塞麥爾維斯不一樣。他**不問**「下一個會不會死」，他問：**為什麼這個病房的整體死亡率是那個病房的三倍？** 他把目光從「個案」抬到「整體規律」。\n\n這一抬，就是從軼事跳到了系統性比較。這就是科學在做的事——也是你凌晨三點不信「我覺得」、去拉對照指標時，在做的同一件事。\n\n## 轉捩點：從一具屍體跳到一個假說\n\n光有「兩病房不同」這個觀察，還不是科學的全部。塞麥爾維斯卡了好幾年——他知道有差異，但說不出**為什麼**。他試過各種當時流行的解釋，一一排除（這個「逐一排除候選解釋」的過程，Hempel 後來分析成一連串小實驗，我們在 ch03、ch05 會細看）。\n\n轉捩點在 1847 年。他的好友、法醫學教授 Kolletschka，被學生的解剖刀劃傷，不久死了。塞麥爾維斯去看了解剖報告，愣住了：**Kolletschka 的病理，跟那些死於產褥熱的產婦，驚人地相似。**\n\n於是他跳到了一個假說：醫學生**從解剖室直接走進產房接生**，手上帶著某種來自屍體的東西——他先稱「屍體微粒（cadaveric matter）」——把病傳給了產婦。助產士不碰屍體，所以第二病房死得少。\n\n我要你注意這一跳的**形狀**，因為 ch03 會專門拆它：塞麥爾維斯**不是**靠歸納跳到這個假說的（他沒有「很多次劃傷→很多次同樣死」的樣本，Kolletschka 只死了一次）。他做的是一種叫**溯因推理（abduction，又稱推論到最佳解釋）**的東西：在所有能解釋「兩病房差異 + Kolletschka 之死 + 醫學生來自解剖室」的候選裡，「屍體微粒經手傳染」是最能一口氣統一所有線索的那個。這正是你做 root cause 時那一跳——看到一堆症狀，跳到「最能解釋這組症狀的根因」。它不保證對（他的「屍體微粒」機制後來被細菌說修正了），但它的形狀對。\n\n然後他做了一件決定性的事：他**把假說變成了一個可以被觀察推翻的預測**。如果是手上的屍體微粒在傳病，那麼**進產房前洗掉它，死亡率就該降**。\n\n1847 年，他下令：所有人進產房前，用**氯化石灰水（chloride of lime）洗手**。\n\n結果：\n\n```text\n塞麥爾維斯案的四欄骨架（全書地圖的具體版；每一欄日後哪章用透鏡重看）\n\n  ① 觀察\n      發生了什麼：第一病房 98.4‰ vs 第二病房 36.2‰（同院同期、近乎隨機分配）\n      日後重看  ：ch01 系統性比較（起手式）／ch02 為何只有他「看到」／\n                  ch05 這是一場天然準隨機對照\n\n  ② 假說\n      發生了什麼：Kolletschka 之死 → 跳到「屍體微粒經手傳染」\n      日後重看  ：ch03 溯因（不是歸納）／ch04 它可被什麼推翻\n\n  ③ 介入\n      發生了什麼：氯化石灰洗手令（1847 年 5 月中）\n      日後重看  ：ch05 介入 ≈ A/B 的處理組／ch06 切斷混淆、論證因果\n\n  ④ 效果\n      發生了什麼：1848 第一病房降到 1.27%（≈ 第二病房 1.33%，拉平）\n      日後重看  ：ch07 證據如何抬高信念／ch08 為何仍被社群否決／\n                  ch09 今天會遇到的統計考驗／ch10 他「對」是哪種對\n```\n\n1848 年，第一病房的全年死亡率降到 **1.27%**，跟第二病房的 1.33% 幾乎拉平。換成每千人版，是從 98.4‰ 一路降到約 12.7‰。\n\n到這裡，如果故事在 1848 年結束，它會是一個無聊的勵志故事：聰明醫師發現洗手，拯救世界，封爵退休。\n\n但它不是。而它**不是**的這件事，正是我選它當全書脊椎、而不選別的案例的全部理由。\n\n## 為什麼是這個案子當脊椎\n\n你可能會想：科學史上漂亮的案例那麼多，牛頓、達爾文、巴斯德，為什麼一本講科學方法的書，要用一個十九世紀的洗手醫師當主角十八章？\n\n兩個理由。\n\n**第一個理由，有人替我背書了。** 1966 年，科學哲學家韓培爾（Carl Hempel）寫了一本影響深遠的小書《自然科學的哲學》（*Philosophy of Natural Science*），他選來示範「假設檢定的基本步驟」與「歸納在科學中的角色」的招牌案例，正是塞麥爾維斯洗手案。自此這個案子成了科學哲學課本超過半世紀的常駐主角（韓培爾引用的死亡率，正是 1848 年的 1.27% vs 1.33%）。我用它當脊椎，不是個人偏好，是站在一個被科哲界用了六十年的選擇上。\n\n**第二個、也是更重要的理由：這個案子裡，科學方法的每一環都齊全，又都出了問題。**\n\n看清楚這三件事——它們是三件**不同**的事，而本書最核心的教學點就藏在這個區分裡：\n\n```text\n有效果 ≠ 有機制 ≠ 被接受（本書最該停下來想十分鐘的一頁）\n\n  有效果？  ✅ 有。對照扎實、介入後死亡率戲劇性下降\n  有機制？  ❌ 沒有。他說不出「為什麼」——細菌致病說（巴斯德／科赫）\n            要到他死後 1860s–80s 才立起\n  被接受？  ❌ 沒有。與主流瘴氣論衝突、又拿不出機制，被整個醫界否決約二十年\n```\n\n一個有對照、有戲劇性效果的救命發現，因為**說不出為什麼**，被整個醫界否決了二十年。塞麥爾維斯本人發表得慢、性情與文筆都不利於說服，職場也有政治；許多醫師被「你們的手害死了病人」這句話冒犯，直接抵制（這多重原因 ch08 會誠實展開，不簡化成「醫師太蠢」）。\n\n結局是科學史上最黑色的一頁：1865 年，他精神狀況惡化，被（友人誘騙）送進維也納的精神病院；抵抗時被看守毆打，約**兩週後死於敗血症（sepsis）**——一種跟產褥熱同類的血液感染，很可能來自被打的傷口。**他死於他畢生對抗的那種感染。** 細菌說確立後，他才被平反，今日尊為手部衛生與防腐手術的先驅。\n\n我把這個案子當脊椎，就是因為它**同時**是兩本教材：它是「科學如何防自欺」的正面教材（觀察、對照、可否證的預測、戲劇性效果），也是「科學社群如何失靈」的反面教材（有效卻無機制、被否決、主角憂鬱而終）。一個只會歌頌科學的故事教不了你後者，而後者才是這本書比「科學方法五步驟流程圖」深的地方。\n\n請記住這個「有效果 ≠ 有機制 ≠ 被接受」的三段區分。它會在 ch08（為何被否決）、ch10（他「對」是哪種對）、ch14（機制之必要）各回來一次，在 ch18 收官時做總對帳。\n\n## 六條主線：這本書要帶你看清的東西\n\n把全書地圖再往前推一層。後面十七章，看似在講不同的東西（觀察、歸納、對照、p 值、典範……），其實全在服務六條主線。每一條，都是「科學如何堵某一種自欺」的一個切面。先把它們攤在這裡，你讀後面每一章時，就知道自己在拼哪一塊：\n\n```text\n全書六條主線(ch18 收官口試;每條都對應「堵哪一種自欺」)\n\n  ① 科學不證明、只防騙\n     科學無法「證明」普遍律(休謨歸納問題);它的力量在反覆\n     嘗試否證而未倒 → 堵「以為自己證明了真理」的自欺   (ch03/04/10)\n\n  ② 觀察不是中立的\n     「我親眼看到」不是免死金牌,觀察有理論負載\n       → 堵「眼見為憑」的自欺                          (ch02/15)\n\n  ③ 對照是防自欺的引擎\n     控制變因、隨機化、雙盲,每一樣堵一個特定漏洞\n       → 堵「我以為是這個改動造成的」的自欺            (ch05/06)\n\n  ④ 相關 ≠ 因果,且 p 值 ≠ 真理\n     混淆變因、p 值的真正意思、p-hacking、再現性危機\n       → 堵「兩件事一起動就以為有因果」的自欺          (ch06/09)\n\n  ⑤ 科學是社群不是個人\n     典範、研究綱領、同儕審查與複製是最後一道防線,但會失靈\n       → 堵「我一個人想通了就是對的」的自欺(雙面)    (ch08/13)\n\n  ⑥ 科學的真 vs 數學的真\n     科學結論永遠暫定,這是特性不是缺陷\n       → 堵「科學定律像數學定理一樣鐵板釘釘」的自欺    (ch10)\n```\n\n每一章我都會至少碰一次中央張力那句話：**本章講的這個方法或制度，到底在堵哪一種自欺？** 你讀完一章，如果答不出這個問題，那一章你還沒讀懂。\n\n## 直覺的陷阱\n\n科學方法正是「想當然耳」最常出錯的地方。本章先立一個本書最重要、卻最反直覺的陷阱——它甚至發生在我們的脊椎案例本身上。\n\n**具名陷阱：「塞麥爾維斯讓死亡率從 18% 降到 1%」——用挑選過的時間切片誇大效果。**\n\n```text\n陷阱:拿「峰值單月」對比「全年」,把效果視覺上吹大\n\n  聳動版(常見、但作弊):\n     介入前 18.27%  ──────────────►  介入後 1.27%\n              ↑                          ↑\n     1847 年「4 月」單月               1848「全年」\n     (介入前一個月、接近峰值)         (全年平均)\n     ✗ 拿單月峰值對全年 = 挑選過的時間切片\n\n  誠實版 A(兩病房同期對照,最乾淨):\n     醫師 98.4‰  vs  助產士 36.2‰   (1840–46 平均,無年份切片)\n\n  誠實版 B(全年 vs 全年):\n     1846 全年 ≈ 11.4%  ──►  1848 全年 ≈ 1.27%\n```\n\n錯誤直覺在哪一步把你帶下溝？在「我手上有兩個數字，18% 和 1%，它們都是真的，所以擺在一起對比沒問題」這一步。**兩個數字各自都是真的，不代表把它們對比是誠實的。** 18.27% 是 1847 年 4 月**單月**（洗手令 5 月中才下，那年是「前高後低」的分裂年，全年平均其實只有約 5%）；拿一個介入前的**峰值單月**去對比介入後的**全年**，等於偷偷選了一個對你的結論最有利的起點。\n\n怎麼自我察覺？問自己三個問題：(1）我對比的兩個數字，**時間粒度一樣嗎**（都是月、還是都是年）?(2）我選的「介入前」基準，是**代表性的**，還是我挑了最極端的那個切片？(3）如果換成「同期、同粒度」的對照，效果還這麼大嗎？\n\n這裡有個讓人發冷的反諷：**這個作弊，發生在一個防自欺的脊椎案例上。** 塞麥爾維斯的真實效果已經夠戲劇性了（98.4‰ → 12.7‰，或全年 11.4% → 1.27%），根本不需要作弊。但「想把好故事講得更好」這個無辜的動機，就足以讓人不自覺挑數字。你工作裡的版本是：「我們新版本把 P99 從 1.2 秒降到 80ms！」——那個 1.2 秒，是不是某次流量尖峰的瞬時峰值，而 80ms 是平穩時段的平均？同一個陷阱，同一個自欺。這正是 ch09 的伏筆：連最會防騙的人，都可能在不自覺中挑了對自己有利的數字。\n\n## 紙上推演\n\n全書純紙上推演，不跑任何程式。拿紙筆，或者就在腦子裡走一遍——能講清楚才算過。\n\n### 題目一（★,[10 分鐘]）\n\n用**你自己的話**，對另一個工程師講清楚：「科學在防什麼？」要求不超過四句，且不准用「證明真理」「找出真相」這類詞。然後舉**一個你自己的維運經驗**，是你靠「系統性比較」推翻了「軼事直覺」的。\n\n### 題目二（★★,[15 分鐘]）\n\n下面是一段宣稱，出自某次效能優化的內部分享：\n\n> 「我們上線了新的連線池設定，P99 從 1.2 秒降到 80ms，提升了 15 倍！」\n\n戴上本章「直覺的陷阱」那一節的眼睛，指出這句話**可能**藏了哪些「挑選過的切片」陷阱。列出你會追問報告人的三個問題，並說明每個問題在防哪一種自欺。\n\n### 題目三（★★,[15 分鐘]）\n\n塞麥爾維斯案的「兩病房按單雙日交替分配、無臨床選擇」這個細節，為什麼讓「兩病房死亡率差異」這個觀察特別有說服力？如果改成「重症產婦一律進第一病房」，這個觀察的價值會發生什麼變化？用你做 A/B test 的經驗類比說明。\n\n### 推演解答\n\n**題目一。** 一個過關的版本：「科學是一套習慣，專門對抗『我以為』。它假設我會騙自己——記錯、看偏、只記得支持我的例子——所以它逼我把直覺變成可被推翻的對照，看數據動不動，而不是看我多有信心。」關鍵是抓到「防自欺」而不是「找真理」。常見錯路：把科學講成「一套找出客觀真相的方法」——這正好掉進 ch10 要拆的「科學能證明真理」迷思，也是本書 ① 號主線要對付的。維運經驗範例（你自己的會更好）：你「覺得」某服務慢是因為 GC，結果拉了 GC 暫停時間 vs 延遲曲線一對照，發現延遲尖峰跟 GC 根本對不上，真正相關的是下游一個依賴的逾時——軼事直覺（「Java 慢八成是 GC」）被系統性比較推翻。\n\n**題目二。** 藏的陷阱：（a）**時間粒度可能不一致**——1.2 秒會不會是某次尖峰的瞬時峰值，80ms 是平穩時段平均？（b）**對比期間可能不可比**——舊設定那段是不是剛好碰上流量高峰或一次故障，新設定這段是不是低峰離峰？（c）**只改了連線池嗎**——同一個 deploy 是不是還改了別的（混淆變因，ch06）？三個追問：① 「這兩個數字是同樣的統計量嗎（都是 P99、同樣的時間窗、同樣的流量區間）？」——防「拿峰值對平均」的切片作弊。② 「對照的兩段期間，流量與依賴狀態可比嗎？」——防「拿異常期對正常期」的偷換基準。③ 「這次只改了連線池一個變因嗎？」——防「同時改了多個東西卻全歸功給一個」（這題其實已經是 ch05 控制變因、ch06 混淆的伏筆）。\n\n**題目三。** 「單雙日交替、無臨床選擇」≈ 近乎隨機分流，意思是兩病房的產婦在進門時平均而言沒有系統性差異（年齡、病情、貧富不會系統性地偏向某一邊）。所以兩病房死亡率的巨大差異，**很難用「病人本來就不一樣」搪塞**——剩下能解釋差異的，主要就是「誰接生、用什麼流程」。這正是它強的地方（ch05 會說這是一場天然的準隨機對照）。如果改成「重症一律進第一病房」，那第一病房死得多就完全可以用「它收的本來就是重症」解釋掉，觀察的價值幾乎歸零——因為你引入了**選擇偏差**，分組本身就帶著結果。A/B test 的類比：這就是為什麼你分流使用者要隨機，不能「把付費用戶全導到新版」——一旦分組與你關心的結果相關，你就再也分不清「是新版好，還是這群人本來就轉換率高」。\n\n## 自我檢核\n\n口頭自答，講得出來才算過。優先答「為什麼」。\n\n1. 為什麼說「科學不是證明真理，是壓低被騙的機會」？「壓低被騙的機會」比「找出真相」精確在哪？\n2. 「單一事件不可預測、整體規律可規劃」這句話，跟你做容量規劃、看 P99 的日常有什麼關係？科學的起手式為什麼是「問整體規律」而不是「問下一個個案」？\n3. 塞麥爾維斯案裡，「有效果」「有機制」「被接受」是哪三件不同的事？為什麼把它們搞混，會毀掉這個案子最重要的教學點？\n4. 為什麼「兩病房按單雙日交替分配」這個細節，讓死亡率差異這個觀察特別難被搪塞？\n5. 「塞麥爾維斯讓死亡率從 18% 降到 1%」這句話的問題出在哪？誠實的版本該怎麼講？\n6. 韓培爾 1966 年用這個案子當科學方法課本範例——這件事為什麼值得拿來當「為何選它當脊椎」的理由？\n7. 全書六條主線裡，你印象最深的是哪一條？它在堵的是哪一種你工作中真實犯過的自欺？\n\n## 延伸閱讀\n\n- **Carl Hempel,《Philosophy of Natural Science》(1966)，第二章「Scientific Inquiry: Invention and Test」**——塞麥爾維斯案的原始課本版，本書脊椎的源頭。讀他怎麼把「逐一排除候選解釋」拆成一連串小實驗，正是 ch03、ch05 的底稿。（全文掃描可在 archive.org 找到。）\n- **史丹佛哲學百科（SEP），「The Problem of Induction」**（plato.stanford.edu/entries/induction-problem/）——休謨歸納問題的權威入門，是 ch03 的主菜；讀第 1 節對「科學為何不能證明普遍律」就有感。\n- **James Lind Library，Irvine Loudon「Ignaz Phillip Semmelweis' studies of death in childbirth」（2013）**——兩病房 98.4‰ vs 36.2‰、1848 降到 12.7‰ 這組數字的可靠史學來源，本章死亡率即據此（jameslindlibrary.org）。讀它對「為何兩病房對照是最乾淨的數字」會更踏實。\n- **PMC，「How dramatic were the effects of handwashing on maternal mortality observed by Ignaz Semmelweis?」（PMC3807775）**——專門拆解 18.27%（1847 年 4 月單月）與全年數字的差別，正是本章「直覺的陷阱」那一節的史料根據，推薦讀完再回看那一節。\n- **姊妹書《馴服隨機》談貝氏定理與假設檢定的那幾章**——本書凡碰到「機率怎麼算」（貝氏更新、p 值）一律指向它，本書只講科哲意義；若你想補機率機制，從它的條件機率與貝氏那章開始。\n"}, {"id": "ch02-theory-laden-observation", "file": "ch02-theory-laden-observation.md", "group": "Part I — 個人推理的防線", "title": "ch02 — 你看到的不是事實：觀察的理論負載", "md": "# ch02 — 你看到的不是事實：觀察的理論負載\n\n> **本章解決什麼問題**：上一章我們立起了脊椎案例與「科學在防自欺」這條主線。但有一個更早、更隱蔽的漏洞還沒處理——你以為「我親眼看到」就站得住腳。這一章拆掉這個錯覺：觀察從來不是中立的，它被你帶進現場的理論、概念、儀器與預期悄悄塑造（Hanson 1958）。理解這一層，才看得懂脊椎案最詭異的地方——別的醫師看著塞麥爾維斯看的同一組死亡率，卻「看」不出有什麼該被解釋。觀察不等於事實，是 Part I（個人推理的防線）的第二道閘，下一章我們再追問「假說從哪來、為什麼歸納不保真」（見 ch03）。\n\n## 從你已知的出發\n\n你每天盯著 dashboard。你以為你在看「系統的真實狀態」。\n\n停一下。你看的不是真實狀態——你看的是**一條你自己選的指標、一個你自己設的閾值、一條你心裡預期的 baseline**。P99 延遲那條線跳上去 30 毫秒，新來的同事看到的是「正常波動，週五晚上而已」；你看到的是「快出事了，這個爬升的形狀跟上次雪崩前一模一樣」。**同一條曲線，兩個人看到兩件不同的事。** 差別不在曲線，在你們各自帶進來的東西：你有上次事故的記憶，你知道這個服務的依賴拓樸，你預期的「正常」長什麼樣。新人沒有，所以他「看不見」那個警訊。\n\n再想一層。你為什麼盯的是 P99 而不是 P50？為什麼把告警閾值設在 500ms 而不是 800ms？為什麼你的 dashboard 上有「錯誤率」這一格、卻沒有「每個 endpoint 的記憶體碎片化程度」這一格？每一個選擇背後都藏著一套理論——關於「什麼算健康、什麼算異常、哪個訊號值得盯」的理論。你在做的不是「客觀地觀察系統」，你是在用一套**內建假設的鏡片**去看它。observability 這個詞本身就在洩密：你能觀察到的，被你建的那套觀測框架決定了。沒建 trace，分散式延遲對你就是不存在的；沒打那行 log，那個分支對你就是黑的。\n\n這就是本章要講的東西，科學哲學給它一個名字：**觀察的理論負載（theory-ladenness of observation）**。它說的是一件聽起來很反直覺、但你其實天天在經歷的事——**沒有「裸觀察」這回事。** 「我親眼看到」不是免死金牌，因為「看到什麼」這件事本身，早就被你帶進去的理論污染過了。\n\n我認為這是整本書最該先停下來想清楚的一頁。因為後面所有的防自欺工具——對照、隨機化、p 值——都在防「觀察之後」你怎麼推論。但理論負載戳的是更前面的地方：**你以為你在「收集事實」的那一刻，自欺就可能已經發生了。**\n\n## 「看到」這個動作，比你以為的複雜\n\n先把直覺校準一下。我們平常講「看」，腦子裡的模型是這樣的：光打到視網膜 → 神經訊號 → 我「看到」了一個事實。在這個模型裡，「看到」是被動的、中立的、像相機拍照一樣——事實在那裡，我只是接收它。\n\n這個模型錯了，而且錯得很關鍵。\n\n1958 年，哲學家**韓森（Norwood Russell Hanson）**在《Patterns of Discovery》裡提出「觀察的理論負載」這個說法（landscape 第三條，年份已釘死 1958）。他深受維根斯坦（Ludwig Wittgenstein）思想影響（韓森與維根斯坦並無師生關係），借了維根斯坦在《哲學研究》裡的一個區分：**「看成（seeing as）」**。經典的例子是那張**鴨兔圖**——同一堆線條，你可以「看成」一隻鴨，也可以「看成」一隻兔。線條沒變、打到你視網膜的光子沒變，但你「看到」的東西變了。Hanson 的論點是：**科學觀察永遠是「看成」，不是純粹的「看」。** 視網膜收到的東西人人一樣，但「看到什麼」要經過你腦中那套概念框架的組織。（2026-06 查證：鴨兔圖、X 光管、Tycho／Kepler 三個例子都是 Hanson 書中第一章的標準素材，下面用第三個。）\n\nHanson 最有名的例子，我認為也是整個理論負載概念最漂亮的一刀，是這個：\n\n> 想像第谷（Tycho Brahe）和克卜勒（Johannes Kepler）並肩站在山丘上，看日出。\n\n第谷信地心說——地球不動、太陽繞著地球轉。克卜勒信日心說——太陽不動、是地球在自轉。現在太陽從地平線升起。\n\n打到兩人視網膜上的光，**一模一樣**。但他們「看到」的是兩件不同的事。第谷看到的是「**太陽在動**，正越過靜止的地平線往上爬」；克卜勒看到的是「**地平線在轉**，逐漸把一顆靜止的太陽轉露出來」。同一個物理場景、同一束光、同一個瞬間——兩個觀察者「看到」兩套不同的運動。\n\n差別在哪？不在眼睛，在他們各自帶進來的**理論**。「太陽升起」這個你以為最樸素、最不需要解釋的「事實」，其實已經偷渡了一整套關於「誰在動」的宇宙論假設。Hanson 那句話我直接搬過來——「seeing 不只是 eyeball 接收到的東西（there is more to seeing than meets the eyeball）」。\n\n> 嚴謹度標示：這是**直覺版**。理論負載到底「滲透」觀察到多深——是連最底層的感官知覺都被理論改寫，還是只有「描述／詮釋」那一層被理論塑造——科學哲學界至今爭論未定（Fodor 等人主張知覺有「模組化」的中立核心）。本書取**共通的、夠用的那層直覺**：你「報告」出來的觀察、你拿去當證據的那個東西，必定帶著理論。嚴格的知覺哲學爭論指向延伸閱讀，本書不裁判。\n\n把這個搬回你的世界，立刻就懂了。Hanson 還有一個更貼近工程的例子：一個物理學家和一個小孩，同時看一支 X 光管。小孩看到一個「玻璃管裡有金屬」；物理學家「看到」的是陰極、是電子被加速撞上陽極、是一個會放出 X 射線的裝置。不是物理學家「多解釋了」一些——是他**真的看到了不一樣的東西**，因為他帶著一套理論在看。\n\n你看一段 stack trace，跟一個剛學會寫程式的人看同一段 stack trace，是兩件事。他看到一堆嚇人的紅字；你「看到」一條從 controller 穿過 ORM 掉進連線池逾時的因果鏈，你甚至能「看到」那個沒被 catch 的 promise。文字一模一樣，打到你們視網膜的像素一模一樣。差別是你帶進來的理論。\n\n## 脊椎透鏡：為什麼只有塞麥爾維斯「看到」了那個差異\n\n現在換**理論負載透鏡**，重看一次脊椎的塞麥爾維斯案（這是 ch01 登場、貫穿全書的同一個 1847 年維也納洗手案）。\n\n這一章的問題很尖銳：**那兩病房的死亡率差異，又不是塞麥爾維斯偷偷量的——它就印在醫院的紀錄上，所有醫師、所有產婦、整座維也納總醫院都看得到。第一病房（醫師接生）的產褥熱死亡率長年遠高於第二病房（助產士接生）。每千人版的對照是 98.4‰ vs 36.2‰（1840–1846 平均，同院同期；landscape 第〇條釘死的數字）。差了快三倍。為什麼只有塞麥爾維斯「看到」這個差異是個**該被解釋的反常**，而別的醫師看著同一組數字，卻看不出有什麼問題？**\n\n答案就是理論負載。\n\n當時主流的疾病理論是**瘴氣論（miasma theory）**——病是「壞空氣」造成的，從腐敗物質飄出來的有害氣體。在這套理論的鏡片下，去「看」那個死亡率差異，你會看到什麼？你會看到「**這沒什麼好解釋的**」。瘴氣論完全有辦法吸收這個差異：也許第一病房的空氣比較差、通風不好、位置不對、或者那個病房剛好瘴氣濃。死亡率差異在瘴氣派眼裡不是反常，是「環境因素的正常波動」，跟克卜勒的「太陽升起」一樣自然——他們「看到」的就是這個。（2026-06 查證：當時確有醫師注意到「兩病房病人社經背景相近、又都在院內生產，壞空氣說不太通」，但這個張力沒有逼他們放棄瘴氣論——這正是理論負載的威力：框架先決定了什麼算「需要解釋的反常」。）\n\n塞麥爾維斯帶進來的鏡片不一樣。他先有一個「**拿數字系統性比較、把差異當成需要被歸因的東西**」的框架（這正是 ch01 立起來的科學起手式）。在這個框架下，同一組死亡率數字「看起來」就完全不同——它不是環境噪音，它是一個**尖叫著要被解釋的模式**：兩個病房，唯一系統性的差別是接生者（醫師 vs 助產士），那麼差異就該歸到接生者身上去找原因。\n\n> 這就是本章的驚嘆點，請停下來想十分鐘：**塞麥爾維斯不是因為他「看得更仔細」才看到那個差異——數字是公開的，誰都能看。他是因為帶了不一樣的理論框架，所以那組數字對他「看起來」是另一個東西。** 觀察的理論負載不是「有些人粗心、有些人細心」的問題，是「你帶什麼框架，就看見什麼世界」的問題。最危險的不是你沒看到資料，是你看到了同一份資料、卻「看成」了無關緊要的噪音。\n\n把這層講透，順手破掉一個流行的英雄敘事。我們很容易把這個故事講成「塞麥爾維斯睜大眼睛、發現了別人視而不見的事實」——好像那些醫師都瞎了或蠢了。**不是。** 他們沒瞎，他們的觀察被瘴氣典範系統性地塑造了，他們是**很誠實地「看到」了一個瘴氣論可以解釋的世界**（守住 landscape T9：別把這寫成「英雄 vs 笨蛋」，那會毀掉教學點）。理論負載恰恰說明：聰明、誠實、訓練有素，都不能讓你免疫——因為問題不在你的智力或品德，在你戴的那副你自己都沒意識到的鏡片。\n\n（多因提醒：塞麥爾維斯案最後被否決，不只因為理論負載，還有缺機制、挑戰整個瘴氣典範、他自己性情與發表遲緩、職場政治等多重原因——這些留到 ch08 用社群透鏡細看，這裡只談「觀察層」這一層。）\n\n## 「裸數據會說話」是個迷思\n\n工程圈有一句很有市場的話：**「讓數據說話」（let the data speak）**。聽起來謙虛、客觀、反獨斷。但理論負載告訴你：**數據不會說話，數據只會回答你問它的問題——而你問什麼問題、用什麼指標問、拿什麼當 baseline，全都帶著理論。**\n\n拆一下這個迷思藏在哪幾步：\n\n```text\n「裸數據會說話」的四個偷渡點（每一步都偷渡了理論）\n\n  步驟              你以為的「中立」              實際偷渡的理論\n  ----------------  ----------------------------  ------------------------------\n  ① 選哪個指標      「我就看 CPU 啊」              CPU 是瓶頸——這是個假設，\n                                                  不是 IO/鎖競爭/GC 才是\n  ② 設什麼閾值      「超過 80% 就算高」            80% 是「危險線」——這個門檻\n                                                  本身是一套關於系統餘裕的理論\n  ③ 挑什麼 baseline 「跟昨天比」                  昨天是「正常」——但昨天若本身\n                                                  就異常，整個比較就被污染\n  ④ 算什麼叫異常    「這個尖峰不正常」            「正常的形狀」是你心裡的模型，\n                                                  不是數據自己標出來的\n```\n\n每一格的右欄都是一個你沒明說、但已經在用的理論。**「裸數據」從你決定要量哪個數字的那一刻，就已經不裸了。** 一份 dashboard 不是世界的鏡子，是你的世界觀的投影。\n\n這不是要你變成虛無主義者、覺得「反正一切都是主觀、量了也沒用」。完全相反。理論負載的正確用法是**戒心**，不是癱瘓。知道觀察帶著理論，你就會做一件事：**把你偷渡的假設掏出來、攤在桌上、讓它可以被檢查。** 這正是後面幾章所有方法的源頭——你之所以要做對照（ch05），就是因為「我看到 A 之後 B 變好了」這個觀察裡藏了一堆混淆假設；你之所以要可證偽（ch04），就是要逼你的框架冒風險、能被某個觀察推翻，而不是怎麼看都印證自己。**理論負載是病，後面那些方法是處方。**\n\n順帶接一個更深的點，埋給後面：你的觀察從來不是孤立受檢的，它永遠**連著一整組輔助假設**——你的儀器校準對不對、你的 log 時間戳同不同步、你的取樣有沒有偏差。這叫**杜恩–蒯因（Duhem–Quine）問題**：任何一個觀察要當證據，都得連同一堆背景假設一起。所以當觀察跟你的假設打架時，你永遠可以選擇「不是我的假設錯，是某個輔助假設錯了」——這讓「乾淨地否證」變得很難（landscape 第四條）。這裡先點到，ch04 講可證偽、ch08 講塞麥爾維斯的反證為何能被「解釋掉」時會用它。\n\n## 一段「中立」監控描述的解剖\n\n來個 worked example，把理論負載抓現行。下面是一段看起來人畜無害、客觀中立的監控值班描述。我逐句把偷渡的理論假設掏出來——不准跳步。\n\n```text\n原始描述（看似中立的事實陳述）：\n  「凌晨 3:14，order-service 的 CPU 突然飆到 95%，明顯異常。\n    我看了一下，發現 GC 頻率上升，判斷是記憶體洩漏，於是重啟了服務，\n    CPU 就恢復正常了。」\n\n逐句解剖——哪裡偷渡了理論：\n\n  句子片段                  偷渡的理論假設（你沒明說、但已在用）\n  ------------------------  --------------------------------------------------\n  「CPU 飆到 95%」          選了 CPU 當觀測窗——已假設瓶頸在 CPU。若真因是\n                            下游 DB 慢導致執行緒堆積，CPU 高只是「果」不是「因」\n  「突然」                  「突然」相對於你心中的 baseline——但你比的是哪段？\n                            若 3 點本來就有批次任務，這根本不突然\n  「明顯異常」              「異常」＝偏離你預期的正常模式；95% 對某些\n                            CPU-bound 服務是設計內的正常滿載，不必然異常\n  「發現 GC 頻率上升」      你「發現」的是你正好有在盯的指標。沒打 GC log\n                            的服務，這條線索對你不存在——observability 決定可見性\n  「判斷是記憶體洩漏」      這是溯因（跳到最佳解釋，見 ch03），不是觀察。\n                            你把「推論」寫成了「發現」，模糊了證據與假設的界線\n  「重啟後 CPU 恢復」       時序相關被讀成因果（見 ch06）。重啟同時做了一百件事\n                            （清快取、斷連線、重置執行緒池），未必是「洩漏被解掉」\n\n對照塞麥爾維斯與瘴氣派「看」同一組數字：\n  瘴氣派看死亡率差異  → 「看成」環境波動（框架：壞空氣致病）→ 無需解釋\n  塞麥爾維斯看同一差異 → 「看成」待歸因的反常（框架：系統性比較）→ 追下去\n  ── 數字相同，「看到的東西」不同，差別全在帶進來的理論\n```\n\n注意這段解剖的自我複核：我沒有說那位值班工程師「錯了」或「不專業」。他的每一句話都可能是對的——也許真的就是記憶體洩漏。**重點不是他錯，是他把一連串帶著理論的詮釋，用「中立事實」的語氣報告出來了。** 一份好的事故報告會把這些假設攤開：「我選擇先看 CPU，因為……」「我以昨日同時段為 baseline，這個 baseline 的有效性前提是……」。攤開來，假設就能被同儕檢查、被推翻——這就是把理論負載從一個隱蔽的自欺漏洞，轉成一個可被防守的環節。\n\n## 直覺的陷阱\n\n理論負載這個概念，最容易在三個地方被誤解、把人帶下溝。逐一拆。\n\n```text\n陷阱 1（具名）：「我親眼看到」謬誤 —— 把目擊當免死金牌\n  ----------------------------------------------------------------\n  錯誤直覺：  「這不是我的推論，是我親眼看到的，所以不會錯。」\n  在哪步下溝：把「看到」當成沒經過框架的純接收，於是覺得目擊報告\n              凌駕一切推論、不需被檢查。\n  正確版：    目擊本身就是「看成」——你看到的已經被你的預期組織過。\n              （Hanson 1958：第谷與克卜勒看同一個日出、看到不同的事）\n              「親眼看到伺服器自己重啟」這句話裡，「自己」兩個字就是\n              偷渡的因果理論——你沒看到「自己」，你看到的是「重啟了，\n              而我沒找到觸發者」，「自己」是你補上去的解釋。\n  怎麼自我察覺：把任何「我看到 X」改寫成「我觀測到 Y，我把它詮釋成 X」，\n              看看 Y 和 X 之間偷塞了多少假設。\n\n陷阱 2：把理論負載當虛無主義 —— 「反正都主觀，觀察沒意義」\n  ----------------------------------------------------------------\n  錯誤直覺：  既然觀察都帶理論，那就沒有客觀、量什麼都白量。\n  在哪步下溝：從「觀察不中立」滑到「觀察無價值」——這一步是錯的。\n  正確版：    理論負載不否定觀察的價值，它要求你把偷渡的假設攤開、\n              讓它可被檢查與推翻。帶理論的觀察＋公開的假設＋對照，\n              仍是人類最強的防自欺工具。戒心不是癱瘓。\n\n陷阱 3：以為「換個更客觀的人來看」就能去除理論負載\n  ----------------------------------------------------------------\n  錯誤直覺：  找個沒立場、沒預期的「中立觀察者」就拿到裸事實了。\n  在哪步下溝：以為理論負載是「個人偏見」，換人就能消。\n  正確版：    沒有「無框架」的觀察者——一個完全沒有概念框架的人，\n              連「該看哪裡」都不知道，根本無法觀察。解方不是「去掉框架」\n              （做不到），是「多個帶不同框架的人交叉看」＋制度化的對照。\n              （框架如何系統性塑造整個社群的觀察，見 ch08 典範透鏡。）\n```\n\n第一個陷阱是本章的招牌，也是 landscape T3 要守住的正確版。我把它叫做「我親眼看到」謬誤，因為它在工程現場太常見了——事故復盤時最難挑戰的就是「可是我**親眼看到**它是這樣」。一旦有人這樣說，討論常常就停了，好像目擊有特權。理論負載給你一把撬棍：目擊沒有特權，目擊也是詮釋，也要攤開來檢查。\n\n## 紙上推演\n\n全部純紙筆＋口頭，不要動鍵盤。每題先自己想，再看解答。\n\n**推演題 1（★，[10 分鐘]）**：把這句話裡藏的理論負載全部找出來——「我親眼看到那台伺服器自己重啟了。」逐個詞檢查：哪些是真正的觀測，哪些是你補上去的理論？\n\n**推演題 2（★★，[15 分鐘]）**：用「裸數據會說話是個迷思」這個論點，向一個堅持「我只看數據、不帶任何假設」的同事解釋：為什麼他的 dashboard 不是中立的？至少指出他在「選指標／設閾值／挑 baseline／定義異常」四步裡偷渡理論的兩處。並回答一個反問——「那你的意思是觀察沒用囉？」\n\n**推演題 3（★★，[15 分鐘]）**：回想一次你和另一個工程師看**同一份 log／同一條監控曲線**、卻得出不同判斷的經驗。用理論負載分析：你們各自帶進來的「框架」差在哪？是誰帶了上次事故的記憶、誰有依賴拓樸的心智模型、誰預設的 baseline 不同？把它對照成第谷與克卜勒看同一個日出。\n\n### 推演解答\n\n**第 1 題解答。** 先把句子切開：「我 / 親眼看到 / 那台伺服器 / 自己 / 重啟了」。\n\n真正接近觀測的部分只有：**「某時刻，該主機的監控顯示它經歷了一次重啟（uptime 歸零／服務重新拉起／我收到重啟事件）」**。其餘全是偷渡的理論：\n\n- **「親眼看到」**：你多半沒有用眼睛直接看到機器斷電又通電。你看到的是**儀表的二手呈現**（監控面板、log 條目、告警）。「親眼」這個詞在這裡是修辭，目的是給判斷加上「不容質疑」的權重——這正是陷阱 1。\n- **「自己」**：這是整句最大的偷渡。「自己重啟」斷言了一個**因果結論**——沒有外部觸發者、是機器內部自發的。但你**沒有觀察到「沒有觸發者」**，你只是**沒找到**觸發者。「沒找到」和「不存在」是兩回事（也許是你沒權限看的某個 orchestrator 把它殺了重拉、也許是 OOM killer、也許是健康檢查失敗觸發的自動重啟）。「自己」是你用「找不到原因」溯因（見 ch03）出來的解釋，被你寫成了觀察。\n- **「重啟了」**：相對好一點，但仍要問——你怎麼定義「重啟」？是進程重啟、容器重啟、還是整台機器重開機？這三者的證據與意涵完全不同，「重啟了」把它們糊成一團。\n\n**常見錯路**：很多人會說「那把『親眼』『自己』拿掉不就客觀了？」——對，但更深的點是：**你拿不掉所有的理論負載**。「重啟」本身就是一個帶理論的概念（你得先有「正常運行 vs 重啟」的二分框架才看得出「重啟」）。目標不是擠出一句零理論的純事實（不可能），是把**最危險、最容易誤導的那幾個偷渡假設**（尤其「自己」這種藏起來的因果斷言）掏出來、標記成「待驗證的詮釋」而非「已確認的事實」。\n\n**第 2 題解答。** 對那位同事，可以這樣講（口頭版）：\n\n「你說你只看數據不帶假設——但你打開 dashboard 的第一秒就帶了。你**選**了看這幾個指標而不是另外幾個，這個選擇就是一個假設：你假設瓶頸會出現在這些指標上。比方你盯 CPU 不盯鎖競爭，那等於先假設了『問題是算力不是並發』。第二，你那條紅色的告警線畫在 80%，這個 80% 不是數據自己長出來的，是你（或某個前人）關於『多少餘裕才安全』的理論。第三，你說『今天比昨天高』——你把昨天當正常 baseline，可昨天要是本身就在出狀況，你整個判斷就被污染了。」\n\n回答反問「那觀察沒用囉？」——**「不是沒用，是不能裝中立。」** 帶理論的觀察照樣是最強的工具，前提是你把偷渡的假設**攤出來、寫下來、讓它可以被別人推翻**。怕的不是有假設，是有假設卻不自知、還用『我只看數據』的語氣讓它免於檢查。這正是陷阱 2 要避開的滑坡：觀察不中立 ≠ 觀察無價值。\n\n**第 3 題解答（這題答案因人而異，給評分標準與一條常見錯路）。** 一個好的解答要明確指出**三件事**：(a) 你和對方帶進來的框架具體差在哪——不是泛泛說「經驗不同」，而是指出像「我記得三個月前那次雪崩前 P99 也是這個爬升形狀，他沒經歷過」這種**具體的框架差異**；(b) 這個差異如何讓你們「看到」不同的東西（你看到警訊、他看到波動）；(c) 對照第谷／克卜勒——同一份 log（同一個日出），不同框架（地心 vs 日心），看到不同的運動。\n\n**常見錯路**：把它講成「他比較菜、看不懂」（這就退回 landscape T9 要破的『英雄 vs 笨蛋』敘事了）。理論負載的點恰恰相反——**不是誰聰明誰笨，是誰帶了哪副鏡片**。那個新人若帶上你的記憶與心智模型，他也會看到警訊；你若是第一天來、沒有那段事故記憶，你也會把它看成正常波動。把焦點放在「框架差異」而非「能力高下」，才算真懂這一章。\n\n## 自我檢核\n\n口頭自答，講得出來才算過。優先回答「為什麼」。\n\n1. 為什麼「我親眼看到」不是免死金牌？「看到」這個動作裡，理論在哪一步就介入了？\n2. 第谷和克卜勒看同一個日出，視網膜收到的光一樣，為什麼他們「看到」的是兩件不同的事？這跟你和同事看同一條監控曲線得出不同判斷，是不是同一回事？\n3. 為什麼說只有塞麥爾維斯「看到」了那個死亡率差異該被解釋——明明數字是公開的、人人都看得到？（提示：別人帶的是什麼鏡片？）\n4. 「讓數據說話」這句話錯在哪？數據在「選指標、設閾值、挑 baseline、定義異常」這四步各偷渡了什麼？\n5. 既然觀察都帶理論，為什麼這**不**等於「觀察沒用、一切都主觀」？理論負載的正確用法是什麼（提示：戒心 vs 癱瘓）？\n6. 「換個更客觀、沒立場的人來看」能去除理論負載嗎？為什麼不能？那真正的解方是什麼？\n7. 把塞麥爾維斯案放回本章透鏡：理論負載只解釋了他被否決的一部分（觀察層）；本章刻意沒碰的、留給後面的原因是哪些？（這題在測你有沒有守住「多因、別簡化」。）\n\n## 延伸閱讀\n\n- **Norwood Russell Hanson,《Patterns of Discovery》(1958)**——理論負載的原典，第一章就是第谷／克卜勒看日出、X 光管、鴨兔圖。要讀就讀第一章〈Observation〉，那句「there is more to seeing than meets the eyeball」就在裡面。（Internet Archive 有全文：archive.org/details/patternsofdiscov0000hans_i5v6，2026-06 可借閱）\n- **Stanford Encyclopedia of Philosophy,「Theory and Observation in Science」**——把理論負載的當代爭論（滲透多深、知覺有沒有中立核心）梳理得最清楚的免費權威來源，適合接著本章「嚴謹度標示」那段往下深挖。（plato.stanford.edu/entries/science-theory-observation/）\n- **Stanford Encyclopedia of Philosophy,「Underdetermination of Scientific Theory」**——本章末尾點到的杜恩–蒯因問題（觀察永遠連著輔助假設）就在這裡，讀「Holist Underdetermination」那節，為 ch04／ch08 鋪路。（plato.stanford.edu/entries/scientific-underdetermination/）\n- **本書 ch08（科學是一群人）**——本章講的是「個人」帶框架；典範（Kuhn）如何系統性地塑造**整個社群**的觀察、讓一整代醫師集體「看不見」反常，是同一個概念的制度放大版。\n- **《思考的陷阱》（偏誤書）談確認偏誤的那章**——理論負載講「框架塑造你看到什麼」，確認偏誤講「動機讓你對想信的證據特別寬容」；兩者交界處互相補完（一個是認知結構、一個是動機驅動），那本書講心理機制，本書講科學制度怎麼防。\n"}, {"id": "ch03-induction-abduction", "file": "ch03-induction-abduction.md", "group": "Part I — 個人推理的防線", "title": "ch03 — 太陽明天會升起嗎：休謨與歸納問題（與假說從哪來）", "md": "# ch03 — 太陽明天會升起嗎：休謨與歸納問題（與假說從哪來）\n\n> **本章解決什麼問題**：上一章（見 ch02）我們鬆動了「親眼看到就是事實」這塊地基；這一章往下挖，鬆動更深的一塊——「過去一直如此，所以未來也如此」。這是歸納（induction），是你每天在監控、測試、容量規劃裡偷偷依賴的推理，而休謨（David Hume）證明它**沒有邏輯保證**。但本章不只拆地基，還要補上一塊大多數人從沒被教過的拼圖：假說到底**怎麼生出來的**？答案是第三種推理——溯因（abduction）。塞麥爾維斯從一場解剖意外跳到「屍體微粒致病」，靠的就是它。懂了這兩件事，你才會明白下一章（見 ch04）為什麼科學要把目標從「證明」整個換掉。\n\n## 從你已知的出發\n\n先講一件你每天都在做、卻幾乎不會停下來想的事。\n\n你的服務這支 API，過去三十天零故障。CPU 平穩、P99 漂亮、錯誤率貼著零。週五下午有人問你：「這東西穩嗎？能不能上更大流量？」你說：「穩，跑一個月了沒掛過。」\n\n停在這句話上十秒。你剛剛做了一個推理：**「過去三十天沒掛」推出「它可靠／下一秒也不會掛」**。這個推理叫歸納——從一堆觀察過的個例（三十天、每一天都好好的），跳到一個沒被觀察過的結論（下一秒、更大流量、它仍然好好的）。\n\n它是放大的。前提只談「我看過的那些天」，結論卻談「我沒看過的那一刻」。前提為真，結論卻可能為假——只要明天 dependency 升級了、流量模式變了、有個 cron 在月底第一次觸發，「過去都沒事」瞬間崩掉。你被「過去都沒事」騙過幾次？我被騙過很多次，而且每一次事後看都覺得「我早該想到」。\n\n這不是你不夠細心。這是歸納這種推理的**本質特徵**：它永遠多說了一點點前提沒給你的東西，而那一點點，就是被騙的入口。一位十八世紀的蘇格蘭哲學家把這件事想到了底，得出一個讓人睡不著的結論——這就是本章上半場。\n\n下半場更實用。你做 root cause 的那一刻——CPU 飆、延遲升、錯誤率漲，你盯著這堆症狀，腦中「啪」地跳出一個嫌疑犯：「是不是那個新上的快取把連線池打爆了？」——這一跳，**不是歸納，也不是演繹**。它是第三種推理，學界叫溯因（abduction）。中學課本只教你「歸納 vs 演繹」，把這第三種藏起來了，於是「科學假說從哪來」變成一個沒人回答的黑洞。本章把它挖出來。\n\n## 推理有三種，不是兩種\n\n先把工具擺上桌。你大概記得邏輯課教過兩種推理；本書要堅持有第三種，而且第三種才是科學最有創造力的那一步。\n\n**演繹（deduction）**：從一般規則推出個別結論，**保真**——前提真，結論必然真，一步都不放大。\n\n```text\n所有人都會死         （規則）\n蘇格拉底是人         （個例）\n─────────────────\n所以蘇格拉底會死     （結論：被前提百分之百鎖死，不多說一個字）\n```\n\n演繹的好處是安全（前提真就絕對對），壞處是它**不生產新知識**——結論早就藏在前提裡，演繹只是把它攤開。你的型別檢查器就是演繹機器：給定型別規則與你的程式，它**必然**導出「這裡不會傳錯型別」。安全，但它沒告訴你任何規則沒涵蓋的事。\n\n**歸納（induction）**：從一堆個例推向一般規則、或推向下一個個例，**放大但不保真**。\n\n```text\n天鵝 1 是白的\n天鵝 2 是白的\n……\n天鵝 10000 是白的\n─────────────────\n所以（所有）天鵝都是白的    （結論：說了前提沒說的，可能錯）\n```\n\n這個結論在歐洲被信了兩千年——直到 1697 年，荷蘭航海家德弗拉明（Willem de Vlamingh）在西澳大利亞看到一群**黑天鵝**（這段史實 2026-06 查證屬實）。一個反例，兩千年的歸納崩了。歸納的力量在於它**生產普遍主張**（這是演繹做不到的），代價是它**永遠可能被下一個觀察推翻**。你的「跑三十天沒掛所以可靠」就是這隻天鵝。\n\n**溯因（abduction）**：從一個**令人意外的現象**，反推「**什麼假說最能解釋它**」——皮爾士（Charles Sanders Peirce）把它列為與演繹、歸納並列的**第三種推理**（他也叫它 retroduction、hypothesis），明確說它是「從效果反推原因、從驚訝的觀察反推解釋理論」的那一步（2026-06 查證：SEP 與多份文獻一致）。\n\n```text\n觀察到一個意外的現象 C        （咦，這不對勁）\n如果假說 H 為真，C 就理所當然了\n─────────────────\n所以，有理由認為 H 也許為真    （結論：H 只是「目前最能解釋 C 的候選」，可能全錯）\n```\n\n注意三者的方向與角色完全不同。把它們並排，這是本章最該背下來的一張表：\n\n```text\n            演繹                歸納                  溯因\n方向        規則 → 個例         個例 → 規則/下一例    現象 → 解釋它的假說\n保真嗎      保真（必然）        不保真（放大）        不保真（放大最多）\n在科學      導出可被檢驗的      累積對假說的支持      生成假說（從哪來）\n迴圈的角色  預測                （多次觀察一致）      靈光一跳的那一步\n工程對應    型別檢查必然成立    跑久了沒掛→預期穩     看症狀跳到「我猜是它」\n```\n\n把這張表合起來看，科學方法**不是**「歸納 + 演繹」的二分，而是一個**三拍迴圈**：\n\n```text\n  溯因  ──生成──▶  假說 H\n                     │\n                     ▼\n  演繹  ──導出──▶  「如果 H 真，我應該看到 X」（可被檢驗的預測）\n                     │\n                     ▼\n  做觀察/實驗，看 X 出現了沒\n                     │\n        ┌────────────┴────────────┐\n        ▼                         ▼\n   X 沒出現                   X 出現了\n   → H 受挫（接 ch04）        → 歸納累積支持，信心升（接 ch07）\n        │                         │\n        └─────────回到溯因，修或換 H─┘\n```\n\n中學課本的「觀察→假設→實驗→結論」五步驟流程圖，最大的騙局就是把「假設」那一格畫成一個從天上掉下來的箱子，彷彿假說會自己冒出來。它不會。**溯因就是那一格裡真正發生的事**——而它是整個迴圈裡唯一有創造力、也唯一最不保真的一步。記住這個張力：最有創意的一步，正是最容易把你帶溝裡的一步。\n\n## 休謨：歸納問題，地基上那道補不起來的裂縫\n\n現在回到歸納，把它的問題挖到底。\n\n休謨在《人性論》（*A Treatise of Human Nature*，1739）卷一、以及更精簡的《人類理解研究》（*An Enquiry Concerning Human Understanding*，1748）第四節裡，問了一個看起來幼稚、實則致命的問題：**你憑什麼從「過去如此」推出「未來如此」？**（年份與出處照 landscape：1739 首見、1748 短版。）\n\n太陽過去每天升起，所以明天會升起。麵包過去吃了能填飽，所以這塊也能。你會說：這還用問？休謨說：請給我**理由**。然後他堵死了所有出口。\n\n每一個歸納推理，背後都偷偷靠著一個假設，哲學上叫**自然齊一性（uniformity of nature）**——「自然在我沒看到的地方、沒看到的時候，跟我看到的地方一樣規律」。沒有這個假設，「過去升起」跟「明天升起」之間就斷了。問題是：**這個齊一性假設本身，你怎麼證明？** 休謨用一個兩難（dilemma）把路全封死（2026-06 查證：IEP／SEP 對此結構一致）：\n\n```text\n要證明「自然是齊一的」，只有兩條路：\n\n路 A：用演繹（純邏輯）證明\n   → 失敗。一個「自然從明天起亂掉」的宇宙並不自相矛盾，\n     你想像得出來。既然不矛盾，純邏輯就推不出齊一性。\n\n路 B：用經驗（過去的觀察）證明\n   → 失敗，而且是循環論證。「過去自然一直很齊一，\n     所以它會繼續齊一」——這句話本身就是一個歸納，\n     它又得靠齊一性才成立。你拿要證明的東西當證據。\n\n兩條路都死。所以「自然是齊一的」既無法被邏輯證明、\n也無法被經驗證明。歸納沒有理性的地基。\n```\n\n讀慢一點，因為這是整本書最該停下來想十分鐘的一頁之一。休謨**不是**說歸納會出錯（它常常很準），他說的是**更深的東西**：歸納為什麼會準，你給不出一個不循環的理由。你信「明天太陽會升起」信得理直氣壯，但那份理直氣壯**沒有邏輯撐腰**。\n\n那我們到底為什麼還做歸納、而且活得好好的？休謨的回答非常誠實、也非常顛覆：**不是因為理性，是因為習慣（custom / habit）**。看過上千次「鬆手→東西掉下」，你的心智被訓練成一看到鬆手就**預期**東西掉——這是一種心理機制、一種被馴化的反射，不是一條被證成的邏輯。我們是被習慣推著做歸納的動物，事後才給它穿上「理性」的外衣。\n\n對科學這意味著什麼？致命的一句：**再多次「洗手後死亡率降」的觀察，也無法「證明」「洗手必然使死亡率降」這條普遍律。** 一百次、一萬次都不行——因為從「我看過的那些次」到「所有次／下一次」這一跳，就是歸納那一跳，就卡在休謨的裂縫上。\n\n這裡要誠實標示嚴謹度：休謨這個論證屬於**直覺版**——它的精確形式、各種回應（康德、波普爾、可靠論、機率論回應……）至今哲學界沒有公認的解，嚴格的爭論指向本章延伸閱讀，本書不裁判。但有一件事是穩的：**沒有任何被廣泛接受的方法，能把歸納「證明」成像演繹那樣保真。** 這道裂縫，三百年沒補起來。\n\n而這正是下一章的引信。如果科學的目標是「證明普遍律」，那休謨已經宣告它**不可能完成**。波普爾（見 ch04）的天才之處，就是不去補這道裂縫，而是**換掉目標**——既然證明不了，那就別證明了，改成「拚命嘗試否證、否證不掉就暫時留著」。科學從「求證」轉向「求錯」，地基問題就繞過去了。這是本書中央張力的第一次正面現身：**科學不是證明真理，是有系統地把自己被騙的機會壓到最低。** 歸納問題逼著它放棄前者、專心做後者。\n\n## 脊椎透鏡：塞麥爾維斯那一跳，是溯因不是歸納\n\n現在把脊椎案搬出來——這是全書貫穿的塞麥爾維斯（Ignaz Semmelweis）洗手案，**現在換「溯因＋歸納」透鏡看**。前兩章我們用它立起「系統性比較」（見 ch01）和「觀察的理論負載」（見 ch02），這一章它要當溯因的教科書級示範。\n\n先把場景釘死（照 landscape 第〇節，2026-06 查證細節屬實）。1847 年 3 月，塞麥爾維斯的好友、法醫學教授科萊奇卡（Jakob Kolletschka），在指導學生解剖一具死於產褥熱（childbed fever）的遺體時，**被學生的解剖刀劃傷**，數日後死亡。塞麥爾維斯讀了科萊奇卡的驗屍報告，發現一件讓他渾身發冷的事：**科萊奇卡身上的病理變化，和那些死於產褥熱的產婦幾乎一模一樣。**\n\n這是一個「意外的現象」（surprising observation）——一個被解剖刀劃傷的男教授，怎麼會死得跟產褥熱的產婦長得一樣？普通人會聳聳肩說「巧合吧」。塞麥爾維斯沒有。他**跳**了一下，這一跳就是溯因：\n\n```text\n溯因三欄分析：塞麥爾維斯從 Kolletschka 之死跳到「屍體微粒假說」\n\n  ① 要被解釋的線索們（攤在桌上的、看似不相干的點）\n     · 第一病房（醫師＋醫學生接生）死亡率遠高於第二病房（助產士接生）\n     · Kolletschka 被解剖刀劃傷後，死狀酷似產褥熱\n     · 醫師與醫學生常常剛解剖完屍體，就直接去產房接生\n     · 助產士不碰解剖\n\n  ② 候選解釋們（誰能解釋上面這堆點？）\n     · 瘴氣（miasma）：病房空氣不好         → 解釋不了「為何同院兩病房差這麼多」\n     · 產婦體質／天氣／宇宙影響             → 解釋不了 Kolletschka，也解釋不了兩病房\n     · 「某種屍體微粒（cadaveric matter）   → 同時解釋全部四個點！\n        經由手，從解剖室帶進產房」\n\n  ③ 為何選這個（最佳解釋的條件）＋ 它漏了什麼\n     · 它一個假說就統一了四條原本不相干的線索（解釋力最廣）\n     · 它「如果為真，那一切就理所當然了」\n     · 漏掉的：「屍體微粒」到底是什麼？他說不出機制\n       （細菌致病說要等 Pasteur/Koch 在 1860s–80s 才立起，見 ch08/ch14）\n```\n\n看清楚這一跳的形狀，因為它顛覆了「塞麥爾維斯靠歸納發現洗手」的通俗版本。他**不是歸納**——歸納需要樣本，需要「很多次劃傷→很多次同樣死」的重複觀察，可是科萊奇卡只死了一次，這是**單一**事件，沒有樣本可歸納。他做的是溯因：從一個獨一無二的意外，**一躍**跳到「最能同時統一所有線索的那個解釋」。這就是哲學家哈曼（Gilbert Harman）1965 年談的「推論到最佳解釋（inference to the best explanation, IBE）」的教科書級案例——在競爭的解釋裡，選「若為真則最能解釋證據」的那個。\n\n接下來才輪到歸納和演繹上場，補滿三拍迴圈：\n\n- **溯因**生出假說：「屍體微粒經手傳染。」\n- **演繹**導出可檢驗的預測：「如果這假說真，那麼**進產房前用氯化石灰洗掉手上的微粒**，死亡率就該降。」——這是一個冒風險的、具體的預測。\n- **歸納**累積支持：洗手令下達後，死亡率果然劇降（1846 全年約 13% → 1848 全年約 1.27%，第二病房 1.33%，照 landscape 全年 vs 全年口徑），而且**一個月又一個月地降**，每多一個月的好數據，就多累積一分對假說的支持。\n\n兩個誠實標示，一個都不能省：\n\n**第一，溯因不保真——「最佳解釋」可能全錯，這裡是部分錯。** 塞麥爾維斯溯因出的「屍體微粒」，**機制是錯的**（沒有屍體微粒這種東西，致病的是細菌）。但請注意：**他溯因的「形狀」是對的**——「有某種看不見的東西，經由醫師的手，從解剖室傳到產婦身上」這個結構，後來被細菌說**追認並修正**。最佳解釋 ≠ 真理；它只是「目前候選裡最能統一線索的那個」，日後可能被更好的解釋取代或精修。這正是溯因最危險也最迷人的地方：它讓你**一躍領先資料**，但那一躍隨時可能落空。\n\n**第二，守住脊椎的誠實版（landscape T9）。** 別把這章讀成「塞麥爾維斯靠天才推理發現細菌、拯救世界」。他有對照、有效果、溯因形狀也對——**但他沒有機制、而且被整個醫界否決了二十年**（為什麼，留給 ch08）。有效果 ≠ 有機制 ≠ 被接受，這是本書最重要的教學點，溯因這一章只負責講清楚「他那一跳是怎麼跳的、為什麼那一跳不保真」。\n\n順帶埋兩條伏線。溯因出來的假說，憑什麼算「最好」、之後又怎麼被證據一點一點抬高可信度？那是貝氏確證的事（見 ch07，貝氏可看成 IBE 的機率化身）。而溯因出來的假說**必須能被否證**，否則它只是個怎樣都對的故事——那是下一章（見 ch04）。塞麥爾維斯的假說好就好在它**冒了風險**：洗手後若死亡率不降，假說就垮。它經得起這個風險，這才是它配叫科學假說的原因。\n\n## 你的 root cause，就是溯因\n\n把鏡頭轉回你的終端機，因為這一章的工程橋接不是比喻，是**字面上同一件事**。\n\n凌晨三點，告警炸了。你盯著面板：CPU 飆到 90%、P99 從 80ms 跳到 2s、錯誤率從 0 漲到 4%、上游的 retry 在堆積。這是一堆**症狀**——一個「意外的現象」。然後你腦中「啪」地跳出一句：「會不會是那個剛上的快取，把 DB 連線池打爆了？」\n\n**這一跳就是溯因，不多不少。** 你沒有歸納——你手上沒有「很多次連線池打爆→很多次長這樣」的樣本（這次可能是你第一次遇到）；你也沒有演繹——沒有任何規則「保證」就是它。你做的是：在所有能解釋這堆症狀的候選裡（流量尖峰？下游慢？GC？記憶體洩漏？那個新快取？），跳到那個「**如果是它，這一切就全說得通**」的嫌疑犯。\n\n這個視角會直接改善你 debug 的品質，理由有三：\n\n**一、「最像的嫌疑犯」不等於「真兇」。** 溯因不保真——你跳到的那個解釋，是「目前最能統一症狀的候選」，**不是**已被證實的根因。多少次事故，你信誓旦旦「就是它」，改完卻沒好，因為真兇是另一個被你忽略的競爭解釋。把「我猜是 X」在心裡標記成「**候選解釋**」而非「結論」，你就會本能地去找下一步。\n\n**二、所以才要做可否證的檢驗。** 跳到嫌疑犯之後，正確的下一步不是直接動手改，而是**演繹出一個預測**：「如果真是連線池被快取打爆，那麼我去看連線池的 active count 指標，它現在就該頂在上限。」然後去看那張圖。指標頂著上限——支持；指標好端端的——這個溯因錯了，回去換假說。這就是三拍迴圈：溯因（跳到快取）→ 演繹（那 active count 該滿）→ 觀察（看圖）。一個**好的故障假設，要能講出「如果是它，我應該看到 X」**；一個講不出 X、怎樣都能自圓其說的假設，是壞假設（這條留到 ch04 講透）。\n\n**三、最危險的不是想不到，是被先入為主綁架。** 溯因最常壞在第②欄——**候選解釋根本沒列全**。你最近被一個 OOM 燒過，於是這次一看到延遲飆就跳到「記憶體又洩漏了」，壓根沒把「下游 API 變慢」放進候選名單。塞麥爾維斯的同行也是這樣：他們的候選名單裡只有「瘴氣」，於是看著一模一樣的數據，「屍體微粒」這個解釋從未進入他們的考慮（這正是 ch02 的理論負載——你的框架決定了你的候選名單）。**問自己「我還漏了哪些競爭解釋？」，是溯因階段唯一能救你的一句話。**\n\n把整件事收成一句帶走：**你 debug 時最有創造力的那一跳是溯因，它讓你領先資料、但隨時可能落空；你之後做的所有「去看那張圖驗證一下」，是在用可否證的檢驗，把那一跳從「我猜」拉回「我知道」。** 不做後半，你只是在賭。\n\n## 直覺的陷阱\n\n科學方法最反直覺的領域，往往是那些「想當然耳」的地方。本章至少踩中三個。\n\n| 錯誤直覺 | 它在哪一步把你帶溝裡 | 正確版／怎麼自我察覺 |\n|---|---|---|\n| 「跑久了沒掛 → 證明它穩」 | 把歸納當成證明。觀察再多也只覆蓋「看過的」，跳到「沒看過的」永遠是無保證的一躍（休謨）。 | 測試全綠**證明不了**沒 bug，只說「這些情境沒抓到」。心裡把「所以它穩」翻譯成「目前為止、在我跑過的條件下沒翻車」——條件一變（流量、依賴、時間），保固立刻失效。 |\n| 「推理只有歸納和演繹兩種」 | 漏掉溯因，於是「假說從哪來」變成黑洞，你以為假說是「歸納很多資料自動浮現的」。其實假說是**跳**出來的。 | 下次你 root cause 跳到一個嫌疑犯時，問自己：這一跳有樣本嗎（沒有→不是歸納）？有規則保證嗎（沒有→不是演繹）？那它就是溯因——一個有創造力但不保真的猜。 |\n| 「最佳解釋 = 正確解釋」（具名陷阱：**最佳解釋謬誤**） | 溯因只保證「候選裡最能統一線索」，**不保證真**。塞麥爾維斯的「屍體微粒」是當時最佳解釋，機制卻錯了。你會把「最像」誤當「就是」。 | 兩個自檢問句：(a)「我有沒有把候選**列全**？」漏掉的競爭解釋可能才是真兇。(b)「這個『最佳』，是因為它真的最好，還是因為它是我**第一個想到**、其他都懶得想？」第一個想到的解釋有先發優勢，不代表它最好。 |\n\n額外提醒一個**極隱蔽**的：很多人以為休謨在說「歸納不可靠、別用它」。**錯。** 休謨從沒叫你別做歸納（他自己也照樣預期太陽升起）。他說的是更微妙的事——歸納很好用，但你**給不出一個不循環的理由**說它為什麼好用。差別在：前者是「歸納沒用」（假，會讓你癱瘓），後者是「歸納沒有邏輯地基」（真，會讓你謙遜）。把休謨讀成「別信任何經驗推論」是把懷疑論用過頭了，那不是他的意思。\n\n## 紙上推演\n\n全是紙筆＋口頭推演，不需要動任何程式。每題先自己想透再看解答。\n\n### 第 1 題（★★，[15 分鐘]）\n\n把下面這句維運判斷拆開分析：\n\n> 「這支 API 過去 30 天零故障，所以它可靠，可以放上雙倍流量。」\n\n(a) 這是哪一種推理（演繹／歸納／溯因）？把前提和結論分開寫。\n(b) 它偷偷依賴的「自然齊一性」假設，在這個句子裡具體長什麼樣子？\n(c) 舉兩個會讓這個齊一性假設失效、於是「過去都沒事」瞬間崩掉的具體情境。\n(d) 一句話說明：為什麼這裡的問題**不是**「你資料蒐集得不夠多」（再多 30 天也補不起來的，是哪一塊？）。\n\n### 推演解答\n\n(a) **歸納**。前提：「過去 30 天（每一天）這支 API 都沒故障」——一堆觀察過的個例。結論：「它可靠／下一刻、雙倍流量下也不會掛」——一個沒被觀察過的、被放大的主張。前提只談看過的天，結論跳到沒看過的時刻與沒測過的負載。\n\n(b) 齊一性假設在這裡是：「**未來（以及更高流量）的運作條件，和過去 30 天我觀察到的那些條件，是同一類、一樣規律的。**」白話：明天的世界跟過去 30 天長得一樣。沒有這條，「過去沒掛」和「未來不掛」之間就斷了。\n\n(c) 任兩個具體情境即可：① 月底第一次觸發的對帳 cron，前 30 天根本沒跑過，它一跑就把 DB 打滿。② 某個 dependency 在第 31 天升級了 minor 版本，行為悄悄變了。③ 雙倍流量讓連線池或某個 O(n²) 路徑越過了前 30 天從沒碰到的臨界點。共同點：**這些條件「過去 30 天」全沒出現過**，所以歷史資料對它們完全沉默。\n\n(d) 因為缺的不是**量**、是**邏輯橋**。再多 30 天，也還是只覆蓋「看過的」，從「看過的」跳到「沒看過的下一刻」那一躍，**無論樣本多大都填不平**——這就是休謨的裂縫，它不是「資料不足」的問題，是「歸納本身無保證」的問題。常見錯路：以為「再觀察久一點就穩了」。觀察久只會讓你**更有信心**（這是習慣在作用），不會讓那一躍**變成保真**。\n\n### 第 2 題（★★，[20 分鐘]）\n\n回想你最近一次認真的 root cause。把「你跳到第一個嫌疑犯」那一步單獨拎出來：\n\n(a) 論證那一步是**溯因**而非歸納或演繹（用「有沒有樣本／有沒有規則保證」兩個檢驗）。\n(b) 用本章的溯因三欄（線索／候選解釋／為何選這個＋漏了什麼）把它重排一遍。\n(c) 誠實回答：你當時的「候選解釋」那一欄，有沒有漏掉某個競爭解釋？如果漏了，是被什麼**先入為主**綁架的（最近的事故記憶？團隊的口頭禪？）？\n(d) 你跳到嫌疑犯之後，下一步**演繹出的可檢驗預測**是什麼（「如果是它，我該看到 X」）？如果你當時沒做這步、直接改了，回頭看那是不是在賭？\n\n### 推演解答\n\n這題沒有標準答案（用你自己的事故），但有「對的形狀」可對照：\n\n(a) 對的論證：「那一跳**沒有樣本**——這次的故障是新的、我手上沒有『很多次這症狀→很多次這根因』的重複資料，所以不是歸納；那一跳也**沒有任何規則保證**就是它，所以不是演繹。它是在能解釋這堆症狀的候選裡，跳到最能統一它們的那個——溯因。」\n\n(b) 形狀範例：線索＝你觀察到的症狀群（指標、log、時間點）；候選解釋＝所有能解釋這組症狀的根因；為何選這個＝它一個假說統一了最多症狀（解釋力最廣）／它「如果為真就理所當然」；漏了什麼＝它沒解釋到的那一兩個症狀，往往就是它其實不對的線頭。\n\n(c) 老實的人通常會發現**有漏**。最常見的綁架來源：(i) 最近一次事故的記憶（剛被 OOM 燒過，這次什麼都先怪記憶體）；(ii) 團隊的口頭禪（「一定又是那個爛服務」）；(iii) 你最熟的那塊（手裡有錘子，看什麼都像釘子）。能講出「我被 ___ 綁架了」就過關——這正是 ch02 理論負載在 debug 場景的現身。\n\n(d) 對的下一步是先**演繹一個預測再去驗證**：「如果真是連線池被打爆，那 active connections 這個指標現在就該頂在上限」→ 去看圖。**如果你當時跳過這步、直接重啟/改設定碰巧好了**——回頭看，那確實是在賭：你用「改完好了」反推「所以是它」，但「改 A 同時可能也擾動了 B」，到底哪個讓指標動，你並沒有切乾淨（這正是 ch05 對照、ch06 相關≠因果要修的洞）。\n\n### 第 3 題（★★★，[25 分鐘]）\n\n「測試通過不能證明程式正確，只能證明這些案例沒出錯。」\n\n(a) 把這句話和休謨的歸納問題對應起來：測試案例 ↔ 過去的觀察、「程式正確」↔ 普遍律，那「自然齊一性」對應到測試情境裡的什麼假設？\n(b) 既然歸納證明不了「程式正確」，為什麼我們還寫測試、而且這麼依賴它？（提示：想想波普爾把目標從「證明」換成什麼——本書 ch04 的預告。）\n(c) 用這個角度重新理解一句工程界老話：「測試只能證明 bug 存在，不能證明 bug 不存在。」它是在說哪一種推理的哪個性質？\n(d) 進階：有人說「那我把所有可能輸入都測一遍，不就證明正確了？」對絕大多數真實程式，這條路為什麼走不通——而它走不通的理由，和黑天鵝故事是同一個嗎？\n\n### 推演解答\n\n(a) 對應：每個通過的測試案例＝一次「過去的觀察」（在這個輸入下沒出錯）。「程式正確」＝一條普遍律（**對所有輸入**都不出錯）。從「測過的這些案例沒錯」跳到「所有輸入都不會錯」，就是歸納那一跳。這裡的**自然齊一性假設**是：「**我沒測到的那些輸入，行為和我測過的這些是同一類、一樣規律的。**」一旦有個沒測到的輸入觸發了完全不同的程式路徑（邊界、競態、整數溢位），這個齊一性就破了——那就是程式裡的黑天鵝。\n\n(b) 因為我們其實**不靠測試「證明」正確，我們靠它「找錯」**。每跑一個測試，是在給程式一次**被否證的機會**：通過＝這次沒抓到反例，不增加「已證明正確」的庫存，只是「又一次嘗試否證失敗」。這正是波普爾把科學目標從「證明為真」換成「拚命嘗試否證、否證不掉就暫時信」的工程縮影（見 ch04）。換了目標，休謨的裂縫就繞過去了：我們從不宣稱「證明了正確」，只宣稱「在我攻擊過的這些點上它扛住了」。\n\n(c) 它在說**歸納的不對稱性**。一個反例（一個失敗的測試）就能**演繹地、確定地**證明「bug 存在」（這是演繹、保真：存在一個反例 ⇒ 普遍律假）；但任意多個通過的測試都**不能**證明「bug 不存在」（那是歸納、不保真）。否證便宜（一個反例搞定）、證實昂貴到不可能（要窮盡所有輸入）——這個不對稱是 ch04 整章的核心。\n\n(d) 對絕大多數真實程式，輸入空間是**天文數字甚至無限**的（一個 64 位元整數參數就有 2⁶⁴ 種，再加上狀態、時序、並行交錯，組合爆炸）——窮舉在物理上不可能。**它走不通的理由和黑天鵝是同一個嗎？** 部分同、部分不同，這題的價值就在分清楚：黑天鵝是「天鵝在原則上無限多、你永遠沒看完，所以下一隻可能翻盤」——是**歸納的原則性無保證**。窮舉測試走不通，**主要**是「輸入太多、窮舉在實務上不可行」——是**規模問題**。但兩者在深處接上了：就算你真的窮舉了**所有輸入**（理論上對有限輸入空間做得到，那其實變成了演繹/證明，不再是歸納），你證明的也只是「在這個版本、這個環境」正確；換了編譯器、換了硬體、換了並行時序，齊一性又可能破——這一層仍是黑天鵝式的歸納無保證。所以：**有限窮舉能擋住的是「規模內的黑天鵝」，擋不住的是「環境/時間變了之後的黑天鵝」。** 能把「規模問題」和「歸納的原則問題」這兩層分清楚，就過關。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂。優先答「為什麼」。\n\n1. 為什麼「跑了一個月沒掛」**不能證明**它可靠，而只能說「目前為止沒翻車」？這跟休謨的哪個論點是同一件事？\n2. 自然齊一性假設為什麼**既不能用演繹證明、也不能用經驗證明**？（把那個兩難用自己的話講一遍，特別講清楚「經驗證明會循環」是怎麼循環的。）\n3. 推理為什麼是**三種**不是兩種？溯因和歸納差在哪——關鍵問句是「有沒有樣本」，為什麼？\n4. 為什麼說塞麥爾維斯從科萊奇卡之死跳到「屍體微粒」是**溯因不是歸納**？（提示：他有幾個樣本？）\n5. 「溯因出的最佳解釋可能是錯的」——塞麥爾維斯案怎麼同時是「形狀對、機制錯」的例子？這對你 root cause 的「我猜是它」有什麼提醒？\n6. 為什麼休謨**不是**在說「別做歸納」？把「歸納沒用」和「歸納沒有邏輯地基」這兩句的差別講出來。\n7. 「測試只能證明 bug 存在、不能證明 bug 不存在」——這句話裡，「證明存在」靠的是哪種推理、「不能證明不存在」卡在哪種推理的什麼性質？\n8. 本章如何把全書中央張力（科學不是證明真理、是壓低被騙機會）往前推了一步？（歸納問題逼科學放棄了什麼、改追什麼？）\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy — \"The Problem of Induction\"**（https://plato.stanford.edu/entries/induction-problem/）：休謨論證的精確結構與各種當代回應（康德、可靠論、機率論…）的權威整理。想看「兩難」的嚴格版、以及為什麼三百年沒解，讀前半即可。\n- **Internet Encyclopedia of Philosophy — \"The Problem of Induction\"**（https://iep.utm.edu/problem-of-induction/）：比 SEP 更白話的入門，對「自然齊一性」與「循環論證」那段講得特別清楚，適合先讀這篇暖身。\n- **Stanford Encyclopedia of Philosophy — \"Abduction\"**（https://plato.stanford.edu/entries/abduction/）：溯因與 IBE 的權威條目；本書取兩者共通直覺、刻意不裁判「溯因＝IBE」之爭，想看嚴格區分（皮爾士的溯因偏生成假說、哈曼/利普頓的 IBE 偏選最佳）就讀這條。\n- **Stanford Encyclopedia of Philosophy — \"Charles Sanders Peirce\"**（https://plato.stanford.edu/entries/peirce/）：溯因（retroduction）作為「第三種推理」的原始出處與三拍迴圈（溯因生成、演繹預測、歸納支持）的源頭。\n- **休謨《人類理解研究》第四節**（*An Enquiry Concerning Human Understanding*, 1748，公版全文見 davidhume.org）：歸納問題的精簡原典，比 1739 的《人性論》好讀很多；只讀第四節（Sceptical Doubts）就能領教那個讓人睡不著的兩難。\n- **想看「最佳解釋謬誤」如何進一步機率化**：本書 ch07 把「證據如何抬高一個溯因假說的可信度」接上貝氏確證；機率怎麼算指向《馴服隨機》談貝氏定理那章（見《馴服隨機》ch05）。溯因出的假說「必須能被否證」這條，則是下一章（見 ch04）。\n"}, {"id": "ch04-falsifiability", "file": "ch04-falsifiability.md", "group": "Part I — 個人推理的防線", "title": "ch04 — 怎樣都對就是沒說：波普爾與可證偽", "md": "# ch04 — 怎樣都對就是沒說：波普爾與可證偽\n\n> **本章解決什麼問題**：ch03 把科學的地基裂縫挖了出來——歸納無法「證明」任何普遍律（休謨），溯因生成的假說也不保真。那麼科學還剩下什麼可以做？波普爾（Karl Popper）的回答是本章的主角：科學不靠證明、靠**冒風險地嘗試否證**。本章只立一個原則——**可證偽性（falsifiability）**：一個主張要算是在說事情，它得**原則上能被某個觀察推翻**。怎樣都對的主張不是錯，是根本沒在解釋。這是 Part I「個人推理的防線」的最後一塊，也是後面對照實驗（ch05）、偽科學分界（ch12）的判準源頭。本章不做偽科學清單（那是 ch12），只把「可證偽是什麼、為何它是分界線」這個原則釘死。\n\n## 從你已知的出發\n\n你值班過。凌晨三點，P99 延遲飆到平常的五倍，錯誤率往上爬。你開始猜：是 DB 連線池滿了？是某個下游服務在抖？是剛上的那版有 memory leak？\n\n這裡有兩種故障假設，差別大到值得停下來想。\n\n第一種，假設 A：「是 GC 壓力。JVM 在做 full GC，所以延遲飆高。」這句話**告訴了你接下來該看到什麼**——如果是它，你去翻 GC log 應該看到 full GC 的頻率和停頓時間正好對得上延遲尖峰；你去看 heap 使用率應該看到它在尖峰前逼近上限。**它預測了具體的觀察。** 如果你翻開 GC log，發現整段時間 full GC 一次都沒發生、停頓加起來不到 50ms，這個假設就**死了**。乾淨俐落，沒有商量餘地。\n\n第二種，假設 B：「系統就是偶爾會這樣，分散式系統嘛，總有尾延遲。」這句話聽起來也沒錯——分散式系統確實有尾延遲。但你仔細想：**有什麼觀察能推翻它？** GC log 乾淨？「對啊，我說了不是 GC，是別的隨機因素。」下游正常？「網路抖動嘛，量不到的。」換了機器還在?「就跟你說是分散式系統的本質。」這個假設**怎樣都對**。不管你看到什麼 log，它都能事後吸收。\n\n注意關鍵的不對稱：**假設 A 比假設 B 有用，恰恰因為 A 更容易被打死。** B 永遠不會錯，所以 B 永遠不會教你任何東西——你查完一輪 log，對「到底發生了什麼」的理解一毫米都沒前進。一個無法被任何 log 推翻的故障假設，等於沒有假設。\n\n這就是波普爾整套科學哲學的核心，你每次 debug 都在用，只是沒給它名字。本章給它名字，並把它磨成一把刀：**可證偽性**——一個主張的價值，不在它聽起來多合理，而在它**敢不敢預測「如果我錯了，你會看到什麼」**。\n\n## 波普爾的回答：科學不證明，只嘗試否證\n\nch03 留下一個爛攤子。休謨證明了歸納沒有邏輯保證：看過再多白天鵝，也推不出「天鵝都白」是必然真理；洗手後死亡率降再多次，也**證明不了**「洗手必然降死亡率」。如果科學的工作是「從觀察證明普遍律」，那休謨等於宣告科學不可能。\n\n二十世紀的維也納，一個叫波普爾的年輕人——按他自己的回憶，1919 年他十七歲時就開始想這個問題（2026-06：這是波普爾本人的自述，多本傳記與 SEP 採用，年份本身難以獨立核驗，當軼事看待）——給出了一個漂亮的脫困。他說：**休謨對的，但他問錯了問題。**\n\n科學的工作從來不是「證明」。科學的工作是**提出大膽的猜測（conjecture），然後拚命嘗試把它打倒（refutation）**。一個理論的好壞，不看它被驗證了幾次，看它**經得起多少次認真的否證嘗試而沒倒**。\n\n關鍵在一個邏輯上的**不對稱**，這是整章最該記住的一句話：\n\n```text\n普遍陳述的不對稱（這是波普爾整套理論的支點）\n\n  「所有天鵝都是白的」\n\n  驗證方向：看到第 1 隻白天鵝……第 1000 隻……第 100 萬隻\n            ↓\n            永遠無法證明「下一隻也白」          ← 歸納的死路（休謨）\n            （要證明它，得看完所有天鵝，包括未來的、沒人去過的地方的）\n\n  否證方向：看到第 1 隻黑天鵝\n            ↓\n            「天鵝都白」當場死亡，沒有商量      ← 一個反例就夠\n            （邏輯上乾淨：∃ 黑天鵝 ⇒ ¬(∀天鵝都白)）\n\n  結論：普遍律「驗證不了，但否證得了」。\n        科學就活在這個不對稱的縫裡——\n        放棄「證明」，改用「目前還沒被打倒」。\n```\n\n這個不對稱不是波普爾發明的，是邏輯本身就有的。「所有 X 都 Y」是一個普遍陳述，它斷言**無窮多個**個案，所以有限的觀察永遠填不滿；但它只要**一個反例**就垮——因為「並非所有 X 都 Y」邏輯上等於「存在一個 X 不 Y」，而存在性陳述，一個實例就能確立。\n\n> 歷史小註（2026-06）：「天鵝都白」這個例子在邏輯哲學裡是經典。歐洲人確實長期相信天鵝都白，直到荷蘭探險家在澳洲看到黑天鵝才推翻（文獻常記為 1697 年 de Vlamingh 一行；確切年份各處略有出入，當例子看、不當史實考據）。重點不是天鵝史，是那個不對稱：再多白天鵝抵不過一隻黑天鵝。\n\n於是波普爾把科學的目標**整個換掉**：不是累積「已證明為真」的清單，而是維護一批「**反覆被認真嘗試否證、至今未倒**」的猜測。這批猜測隨時可能被下一個觀察打倒——這不是科學的弱點，這正是它跟「怎樣都對的空話」的根本差別。\n\n這裡要立刻誠實標一個詞，因為它是全書最容易被講錯的地方之一。波普爾說一個經得起否證考驗的理論被「**驗證強化（corroborated）**」——注意，**不是「confirmed（確證為真）」、更不是「proven（證明）」**。「corroborated」嚴格只表示一件事：**到目前為止還沒被打倒。** 它不是「比較可能為真」的正面斷言（這一點波普爾跟貝氏派吵了一輩子，貝氏那一面留給 ch07）。一個被反覆否證嘗試而存活的理論，比一個從沒冒過風險的理論值得你信——但「值得信」的理由是**它一直把脖子伸出來給人砍卻沒被砍掉**，不是「它被證明了」。這個分寸守不住，後面 ch10「兩種真」就全垮了。\n\n## 分界判準：可證偽是什麼，不是什麼\n\n波普爾把可證偽性拿來當**分界判準（demarcation criterion）**——劃分「科學的主張」與「非科學的主張」的那條線。\n\n先把這個詞的精確意義釘死，因為它是本章最常被誤解的概念，每一個誤解都會在後面某章害你下溝。\n\n**可證偽性是「理論的一個性質」：原則上存不存在某個可能的觀察，能跟這個理論衝突。** 就這麼一句。把它拆開來看，三個「不是」比一個「是」更重要：\n\n```text\n可證偽性 = 理論的性質：「原則上能被某觀察推翻嗎？」\n\n  常見誤解                          正確版\n  ─────────────────────────────────────────────────────\n  ❌ 可證偽 = 已經被否證了           ✅ 可證偽 = 「可能」被否證，\n     （= 這理論錯了）                  不是「已經」被否證。\n                                       一個對的理論一樣是可證偽的——\n                                       它只是還沒遇到那個反例。\n\n  ❌ 可證偽 = 為真／已被驗證         ✅ 可證偽跟真假無關。它問的是\n                                       「有沒有可能的反例」，\n                                       不問「實際上是真是假」。\n\n  ❌ 不可證偽 = 這個主張是錯的       ✅ 不可證偽 = 這個主張「沒在做\n                                       科學的事」。它可能在做別的\n                                       （信仰、定義、純數學），\n                                       那是另一回事——不是錯，是\n                                       「不冒風險、所以不解釋世界」。\n```\n\n第一個「不是」最要命：**可證偽 ≠ 已被否證。** 「牛頓力學是可證偽的」這句話為真——因為它**做了具體預測，原則上能被觀察推翻**（後來相對論在水星近日點等地方確實推翻了它的一部分）。可證偽是「脖子伸出來了、隨時可能挨砍」，不是「已經被砍了」。一個正確無比、永遠不會被反例打中的真理論，**照樣是可證偽的**——只要它原則上**容許**有反例存在。\n\n第二個「不是」：可證偽跟「為真」是兩個獨立的軸。一個主張可以是可證偽且為真（牛頓力學在低速下的預測）、可證偽且為假（「地球是平的」——它可證偽，且已被否證）、不可證偽（後面講）。**別把「可證偽」當成「正確」的同義詞。**\n\n第三個「不是」，也是本書最想讓你帶走的：**不可證偽，不代表錯，代表「沒在解釋世界」。** 這是個關鍵的態度。「2+2=4」不可證偽（它是定義與規則的結果，沒有任何觀察能推翻它），但它不錯——它只是不是經驗科學的主張，是數學的（ch10 細談）。「上帝存在」對某些表述方式而言不可證偽——波普爾不會說它「假」，他會說它**不在科學的管轄範圍**。把「不可證偽」聽成「假」，是對波普爾最常見也最粗暴的曲解，而且這個曲解會讓你變成一個討厭的人，用「不可證偽」當棍子打所有你不喜歡的主張。本章只立原則，**完整的「拿這把刀去判定誰是偽科學」是 ch12 的活兒**，那裡還要加上拉卡托斯的「進步 vs 退化」當第二把刀，並誠實面對分界其實有灰色地帶。\n\n## 冒風險的預測：好理論的標誌\n\n可證偽性還有一個程度問題，這是波普爾最迷人的洞見：**一個理論越容易被打倒，它的科學含金量反而越高。**\n\n聽起來反直覺，再用工程的話說一遍就懂了。回到開頭那兩個故障假設：「是 GC」禁得起的反駁機會多（GC log、heap、停頓時間，任何一項對不上就死），所以它**資訊量大**；「分散式系統就這樣」禁不起任何反駁，所以它**資訊量為零**。一個主張排除掉的可能世界越多，它告訴你的就越多——而排除得越多，它撞上反例的機會也越大。**高資訊 = 高風險，這是同一件事的兩面。**\n\n波普爾最愛舉的對照，是 1919 年的一場日食。\n\n```text\n冒風險的預測（波普爾的招牌對照）\n\n  愛因斯坦廣義相對論（1915）\n    ↓ 推導出一個具體、奇怪、與當時主流牛頓力學衝突的預測：\n    「星光經過太陽旁會被重力彎折，偏移量約 1.75 角秒\n     （牛頓引力給的值約是它的一半）」\n    ↓ 這預測「冒了風險」：\n      - 它指定了一個精確數字，不是「光大概會受影響」\n      - 1919 年的日食觀測若量到偏移≈0 或≈牛頓值，\n        相對論當場垮台\n    ↓ 1919 愛丁頓（Eddington）日食觀測：偏移量接近相對論預測\n    ⇒ 理論「驗證強化」（corroborated，不是「證明」！\n       後來它在別處還是被修正——這正是 corroborated 的意思）\n\n  對照：怎樣都對的解釋（波普爾點名 1919 當時某些精神分析、馬克思史觀）\n    ↓ 不管發生什麼，理論都能事後解釋得通：\n      他做了 X → 「看，符合理論」\n      他做了相反的 ¬X → 「看，這也符合理論（壓抑／反向作用）」\n    ↓ 沒有任何可想像的觀察會被它「禁止」\n    ⇒ 不冒風險 ⇒ 不可證偽 ⇒ 不在說事情\n```\n\n> 史實與分寸（2026-06）：波普爾本人說，正是 1919 年愛丁頓日食對相對論的考驗，和同時期他對某些「怎麼都能解釋」的理論的不滿，催生了他的可證偽判準（SEP、IEU 等都記載）。**但這裡要守科哲的分寸**：波普爾點名精神分析、馬克思史觀當「不冒風險」的對照，是他的**立場**，不是已成定論的裁決——後來有人論證某些精神分析主張其實可被檢驗，分界遠比波普爾講的灰。本章把它們**只當「原則的例子」點到**，不展開判定、不過度貶低。完整的偽科學判別、灰色地帶的誠實處理，全部留給 ch12。本章的工作只是：讓你看懂「冒風險的預測」和「怎樣都對的解釋」差在哪。\n\n愛因斯坦的偉大，在波普爾眼裡不是「他對了」，而是**他敢把脖子伸出去**——他的理論主動指定了一個可以讓自己當場死亡的觀察。一個敢說「如果偏移量不是 1.75 角秒，我就錯了」的理論，和一個「不管偏移多少我都能解釋」的理論，前者在做科學，後者在自我安慰。\n\n把這條搬回值班台：**好的故障假設，要能講出「如果是它，我應該看到 X；如果我看不到 X，我就錯了」。** 講不出這個 X 的假設，不是謙虛，是空的。一個永遠能事後解釋、無法被任何 log 推翻的 alert，等於沒有 alert——它從不冒險說「不該發生的事發生了」，所以它從不告訴你任何事。\n\n## 脊椎透鏡：塞麥爾維斯的假設冒了什麼風險\n\n現在換可證偽透鏡，回看脊椎的塞麥爾維斯（Ignaz Semmelweis）洗手案。ch01 它登場（兩病房死亡率對照），ch02 看它的理論負載（為什麼只有他「看到」差異該被解釋），ch03 看他怎麼**溯因**跳到「屍體微粒」假說。本章問的是新問題：**這個假說冒了什麼風險？它可以被什麼觀察推翻？**\n\n塞麥爾維斯 1847 年溯因出的假說是：第一病房（醫師接生）死亡率遠高於第二病房（助產士接生），是因為**醫學生從解剖室直接進產房，手上帶著「屍體微粒（cadaveric matter）」傳染給產婦**。\n\n這個假說漂亮的地方，是它**做了一個冒風險的預測**：\n\n```text\n塞麥爾維斯假說的可證偽性（換可證偽透鏡看脊椎）\n\n  假說：屍體微粒經由手傳染 → 第一病房高死亡率\n\n  它「禁止」了什麼？它預測：\n    「若強制用氯化石灰水洗手、洗掉屍體微粒，\n      第一病房死亡率應降到接近第二病房」\n    ↓\n    這是一個敢死的預測：\n    如果洗手後死亡率「不降」，假說當場重傷\n    ↓\n  實際觀察（1847 洗手令 5 月中頒布後）：\n    第一病房全年死亡率\n      1846 約 11.4%  →  1848 約 1.27%（同年第二病房約 1.33%，幾乎拉平）\n    ↓\n    預測應驗 ⇒ 假說「驗證強化」（corroborated）\n    （注意：不是「證明」。他始終缺機制——見下）\n\n  對照：瘴氣論（當時主流）怎樣都對\n    第一病房高？「這區空氣／體液失衡比較糟」\n    洗手後降了？「啊那是通風改善了／季節變了／病人體質」\n    第二病房一直低？「助產士那邊瘴氣比較少」\n    ↓\n    沒有任何觀察會被瘴氣論「禁止」⇒ 不冒風險 ⇒ 解釋力是假的\n```\n\n> 死亡率數字的誠實版（依本書事實基準，2026-06）：上面「介入前後」用的是**全年 vs 全年**的百分比版（1846 約 11.4% → 1848 約 1.27%）。你可能在別處看過「從 18% 降到 1%」的講法——**那是用挑選過的數字誇大效果**：18.27% 是 **1847 年 4 月單月**（介入前一個月、接近峰值）的死亡率，不是 1847 全年（洗手令 5 月中才下，1847 是前高後低的分裂年）。拿「4 月單月峰值」對比「1848 全年」會在視覺上放大效果。最乾淨、無年份切片陷阱的對照，是**同院同期兩病房**：醫師病房 98.4‰ vs 助產士病房 36.2‰（1840–46 平均）。效果本身已經夠戲劇性，不需要作弊。這個「連防自欺的脊椎案例都可能被挑數字誇大」的諷刺，ch09 統計陷阱章會正式收。\n\n這就是塞麥爾維斯**做對的那一半**：他的假說可證偽，瘴氣論不可證偽。他敢說「洗手不降，我就錯了」；瘴氣論不管看到什麼都能自圓其說。從可證偽透鏡看，塞麥爾維斯是在做科學，瘴氣派是在自我安慰。\n\n**但這裡必須立刻守住本書最重要的誠實。** 「他的假說可證偽、且預測應驗」**不等於**「他被接受了」，更不等於「他證明了細菌致病」。他做對了可證偽這一關——卻仍被整個醫界否決二十年。為什麼一個冒了風險、且通過了考驗的假說會被否決？因為**他始終說不出「為什麼屍體微粒會致病」的機制**（細菌致病說要等 Pasteur、Koch 在 1860–80 年代才立起），而一個沒有機制的假說，即使預測應驗，也很難說服一個有完整瘴氣典範撐腰的社群。**有效果 ≠ 有機制 ≠ 被接受，這三件事是分開的**——這是全書的核心教學點，別把塞麥爾維斯寫成「發現細菌的英雄」（他不是）。「為什麼可證偽且應驗還是被否決」這道難題，是 ch08（科學社群與典範）的主菜，ch14（機制之必要）再深挖一次。\n\n## 乾淨的否證，其實很難\n\n波普爾的圖太漂亮了，漂亮到有點騙人。「一個反例就推翻一個理論」——真的這麼乾淨嗎？\n\n不。這是本章必須誠實埋下的裂縫，叫**杜恩–蒯因難題（Duhem–Quine thesis）**。\n\n問題出在：**你從來無法單獨檢驗一個假設。** 任何一個預測，都是「主假設 + 一大堆輔助假設（auxiliary hypotheses）」**綁在一起**才推導得出來的。當觀察跟預測衝突時，邏輯只告訴你「這一整包裡至少有一個錯了」——它**不告訴你錯的是哪一個**。\n\n用值班的話講最清楚：\n\n```text\n乾淨否證的幻覺（杜恩–蒯因）\n\n  你的假設：「是 GC 造成延遲尖峰」\n  你的預測：「翻 GC log 會看到 full GC 對上尖峰」\n\n  但這個預測其實偷藏了一整包輔助假設：\n    + GC log 的時間戳是準的（NTP 沒漂）\n    + 我看的是對的那台機器\n    + log 沒被 buffer 延遲或丟棄\n    + 「full GC」的判讀沒看錯欄位\n    + 監控抓的延遲尖峰是真的、不是量測 artifact\n    ↓\n  觀察：GC log 乾淨，沒有 full GC\n    ↓\n  邏輯只說：「主假設 + 那五條輔助假設」這一包至少一條錯\n    ↓\n  你可以打死主假設（「不是 GC」）\n  也可以救主假設、改怪某條輔助假設\n    （「一定是這台機器的時鐘漂了 / log 丟了」）\n    ↓\n  兩種都「邏輯上合法」。反例沒有自動告訴你該砍誰。\n```\n\n你一定幹過這事。指標跟假設對不上，你第一反應未必是放棄假設，而是「會不會是監控壞了」「會不會是我看錯機器」。**有時候你對——監控真的會騙人。** 這正是杜恩–蒯因的要害：救一個被反例打中的理論，永遠可以靠「怪罪某條輔助假設」來辦到，而且這在邏輯上完全合法。\n\n這就埋下了一個大麻煩：如果任何理論都能靠調整輔助假設來躲過反例，那「可證偽」豈不是空話？瘴氣派否決塞麥爾維斯，部分正是這個機制——「洗手後降了？那是通風變好了」就是在改輔助假設（把死亡率歸給別的變因），來保住瘴氣典範不被那個反例打中。\n\n波普爾的乾淨圖，到這裡需要被打一個補丁。補丁不在本章——本章只負責**誠實指出這道裂縫存在**。「該砍主假設還是該救它、社群憑什麼判斷一個理論是在『正當地用輔助假設修補』還是在『無賴地賴皮』」，是拉卡托斯（Lakatos）「進步 vs 退化研究綱領」要回答的，留給 ch08。你現在只要記住：**可證偽是個好原則，但「乾淨的單一否證」是個理想，真實世界的否證永遠攪在一整包假設裡。** 這個張力不是要擊垮可證偽，是要你別把它當成一鍵判生死的魔法。\n\n## 直覺的陷阱\n\n可證偽性是本書最容易被「想當然耳」帶溝裡的概念之一。守住下面這幾條正確版。\n\n| 陷阱（你會這樣想） | 它在哪一步帶你下溝 | 正確版 / 怎麼自我察覺 |\n|---|---|---|\n| **「不可證偽 = 這主張是錯的」**（最常見、最粗暴） | 你把「可證偽」偷換成「正確」，於是拿它當棍子打所有你不喜歡的主張 | 不可證偽 ≠ 錯，而是**沒在做科學的事**（可能在做信仰、定義、純數學）。自我察覺：當你想說「這不可證偽所以是假的」，停——你能說的只有「它不在科學管轄內」 |\n| **「可證偽 = 已經被否證」** | 你聽到「牛頓力學是可證偽的」就以為在說「牛頓力學是錯的」 | 可證偽是「**可能**被否證」的性質，不是「**已經**被否證」。一個對的真理論一樣可證偽——它只是還沒遇到反例 |\n| **「我這個解釋什麼都能說通，所以它很強」** | 你把「解釋力廣」當優點，其實「什麼都能說通」= 什麼都沒禁止 = 資訊量零 | 越強的理論**禁止越多**（排除越多可能觀察），所以越容易被打中。一個禁止不了任何觀察的解釋，是空的 |\n| **「我做了個冒險預測，結果應驗了，所以理論被證明了」** | 你把 corroborated（還沒被打倒）偷換成 proven（證明） | 應驗只給你「目前還沒倒」，永遠不是「證明」（休謨還在）。下一個觀察隨時能推翻它——這是特性不是缺陷 |\n| **「反例出現了，理論就乾淨地死了」** | 你忘了任何預測都綁著一堆輔助假設（杜恩–蒯因） | 反例只說「這一包至少一條錯」，沒說錯哪條。問自己：我該砍主假設，還是某條輔助假設（監控?機器?時鐘?）真的有問題？兩者都要查 |\n\n具名陷阱，挑一個展開——**「怎樣都對的故障報告」**。你一定讀過這種 post-mortem 結論：「本次事故是多個因素共同作用下的偶發結果。」這句話的問題不是它假，是它**不可證偽**——沒有任何未來的觀察會跟它衝突，所以它對「下次怎麼避免」一個字都沒說。怎麼自我察覺？問一句：「如果這個結論錯了，我會看到什麼？」如果你答不出來，這個結論就是空的，不管它讀起來多穩重。一份好的 post-mortem 結論要敢說「root cause 是 X，如果是 X，我們應該能在 Y 重現它」——能被重現實驗推翻的結論，才是真結論。\n\n## 紙上推演\n\n下面三題，純紙筆。看完每題先自己想，再讀解答。\n\n### 第 1 題（★★）**[15 分鐘]**：把三個宣稱判可不可證偽\n\n對下面三個宣稱，各回答：(a) 它可證偽嗎？(b) 若可證偽，**什麼觀察能推翻它**？若不可證偽，它的問題出在哪？\n\n1. 「這次 outage 是宇宙射線翻轉了記憶體 bit 造成的。」\n2. 「降低 worker 並發數會改善 P99 延遲。」\n3. 「我們的系統有韌性（resilient）。」\n\n### 推演解答\n\n**宣稱 1（宇宙射線）：弱可證偽，但實務上接近不可證偽。** 原則上它有個可想像的反例——若你有 ECC 記憶體的錯誤計數器、且事故時段計數為零，就跟它衝突。但若你**沒有**那個量測手段，這句話就退化成「怎樣都對」：任何查不到的故障都能賴給宇宙射線，沒人能反駁。**自我察覺點**：一個只有在「剛好量不到」時才成立的解釋，是把不可證偽偽裝成謙虛。要嘛拿出能推翻它的量測（ECC 計數、重現條件），要嘛承認它只是「我不知道」的體面說法。\n\n**宣稱 2（降並發改善 P99）：乾淨可證偽，這是三句裡最科學的一句。** 它做了冒風險的具體預測。**能推翻它的觀察**：做一個對照——同樣流量下，降並發的那組 P99 沒有改善、甚至更糟。一個 A/B 或前後對照就能打死它（ch05 講怎麼設計得乾淨）。它敢說「如果降了沒改善，我就錯了」——這就是可證偽。**常見錯路**：把「我們降了並發、P99 也降了」當證明。那只是 corroborated，而且還沒排除混淆（也許同時流量也降了——ch06 的活兒）。\n\n**宣稱 3（系統有韌性）：不可證偽，因為「韌性」沒被定義成任何可觀察的東西。** 系統掛了？「那是超出設計韌性範圍的極端事件。」沒掛？「看，有韌性。」怎樣都對。**修法**：把它改寫成可證偽的版本——「單一 AZ 全掛時，系統在 30 秒內自動切換、錯誤率不超過 0.1%」。現在它敢死了：做一次故障注入，若切換超過 30 秒或錯誤率破 0.1%，宣稱就被推翻。**這題的教學點**：不可證偽的宣稱不是「錯」，是「沒說事情」——「有韌性」不假，它只是還沒說任何能被檢驗的話。\n\n### 第 2 題（★★★）**[25 分鐘]**：把「怎樣都對」改寫成可證偽，並回答一個哲學問題\n\n(a) 把這個故障解釋改寫成可證偽的版本：「服務偶爾會慢，是因為雲端環境本來就不穩定。」\n\n(b) 然後回答：為什麼「不可證偽」**不等於「錯」**？用一個非科學但合理的例子說明「不可證偽但有意義」的主張存在。\n\n### 推演解答\n\n**(a) 改寫。** 原句不可證偽：任何慢都能賴給「雲端不穩」，沒有觀察能推翻。可證偽版要指定一個敢死的預測，例如：「服務的慢尖峰，**集中發生在共置租戶 CPU 爭用的時段**；若我把這個服務遷到專用實例（dedicated instance），P99 尖峰頻率應下降至少一半。」現在它能被推翻了——遷移後尖峰沒減少，假設就死。注意改寫的關鍵動作：**把模糊的「環境不穩」換成一個指定機制 + 一個可做的對照介入 + 一個量化的預期結果**。「能被某個介入的結果推翻」是可證偽的操作版。\n\n**(b) 為什麼不可證偽 ≠ 錯。** 因為可證偽性問的是「這主張**在不在做科學的事**（冒險預測經驗觀察）」，不問「它真假」。一個不可證偽的主張，可能在做**別的**正當的事。例子：「**每個人的生命都有同等的尊嚴。**」沒有任何觀察能推翻它——它不是對世界的經驗預測，是一個**道德／規範**主張。它不可證偽，但它顯然有意義、甚至可能為真，只是「真」的方式不是科學那種。同理「2+2=4」（數學的真，ch10 細談）、「契約一旦簽署即生效」（定義／約定）。**常見錯路**：學了可證偽就到處說「你這不可證偽所以是廢話」——這是把波普爾的分界判準誤用成「意義判準」。波普爾本人明確反對這個誤用：可證偽是劃「科學 vs 非科學」，**不是**劃「有意義 vs 無意義」。把不可證偽的主張一律打成廢話，你會連倫理、數學、法律全掃進垃圾桶——那顯然荒謬。\n\n### 第 3 題（★★）**[15 分鐘]**：脊椎重講\n\n不看書，用自己的話回答：(a) 塞麥爾維斯的「屍體微粒」假說可被什麼觀察推翻？(b) 為什麼瘴氣論「怎樣都對」是缺點不是優點？(c) 為什麼「他的假說可證偽且預測應驗」**不等於**「他被接受了」？\n\n### 推演解答\n\n(a) **能推翻屍體微粒假說的觀察**：強制洗手後，第一病房死亡率**不下降**（或不向第二病房靠攏）。它敢做這個冒險預測，所以可證偽。（實際上 1848 全年降到約 1.27%、與第二病房約 1.33% 幾乎拉平，預測應驗。）\n\n(b) **瘴氣論「怎樣都對」是缺點**：因為它對任何觀察都能事後找說法（高死亡率→空氣差；降了→通風改善；第二病房低→那邊瘴氣少），所以它**禁止不了任何觀察**，資訊量為零，沒在解釋。能解釋一切 = 什麼都沒說。\n\n(c) **可證偽且應驗 ≠ 被接受**：這是本書最重要的分離。塞麥爾維斯過了可證偽這一關，卻**缺機制**（說不出屍體微粒為何致病，細菌說要等他死後才立），於是一個有完整瘴氣典範撐腰的社群有充分理由（外加職場政治與他不利於溝通的性情）繼續否決他。**有效果 ≠ 有機制 ≠ 被接受是三件事**——可證偽只保證「他在做科學」，不保證「社群會買單」。常見錯路：把他寫成「證明了細菌致病的英雄被愚蠢同行打壓」——這是把三件事壓成一件、也把同行寫成扁平的笨蛋，毀掉最重要的教學點（ch08 會給多因的誠實版）。\n\n## 自我檢核\n\n口頭自答，講得出來才算過：\n\n1. **為什麼「不可證偽」不等於「錯」？** 講不清楚，你就會拿可證偽當棍子亂打人。\n2. 普遍陳述「驗證不了、但否證得了」的那個**不對稱**，邏輯上來自哪裡？（提示：「所有」vs「存在一個」。）\n3. 為什麼一個理論**越容易被打倒，科學含金量反而越高**？「禁止越多」和「資訊越多」為什麼是同一件事？\n4. 波普爾說一個理論被「corroborated」——它**不**是「proven」，那它到底是什麼意思？（守住這個分寸，ch10 才不會垮。）\n5. 杜恩–蒯因難題說「乾淨的單一否證很難」——為什麼？你 debug 時哪一刻在用這個（觀察跟假設對不上，你第一反應是什麼）？\n6. 塞麥爾維斯案：他的假說可證偽、預測也應驗了，**為什麼他還是被否決**？（答不出「有效果 ≠ 有機制 ≠ 被接受」就還沒懂本書的核心。）\n7. 把「我們的系統有韌性」這句話，改寫成一個可證偽的版本——你會加上什麼，才讓它「敢死」？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Karl Popper\"**（https://plato.stanford.edu/entries/popper/）：可證偽、分界、corroboration 的權威整理。讀「Falsifiability」與「The Problem of Demarcation」兩節就夠本章——特別看它如何強調 corroboration ≠ confirmation。\n- **Stanford Encyclopedia of Philosophy, \"Scientific Underdetermination\"**（https://plato.stanford.edu/entries/scientific-underdetermination/）：杜恩–蒯因難題與低度決定的源頭。本章「乾淨否證很難」那節的完整版，想知道為什麼反例不會自動告訴你該砍誰，讀這篇。\n- **Internet Encyclopedia of Philosophy, \"Popper: Philosophy of Science\"**（https://iep.utm.edu/pop-sci/）：比 SEP 好讀的入門，1919 愛丁頓日食當「冒風險預測」範例講得清楚；想看波普爾為何拿精神分析／馬克思史觀當對照，這篇有脈絡（但記得：那是他的立場，分界的灰色地帶留給 ch12）。\n- **Karl Popper,《Conjectures and Refutations》（1963）第一章**：波普爾自己用最白話講「我十七歲怎麼想出可證偽」的那篇，讀原典感受「大膽猜測、拚命否證」的氣口。中譯本《猜想與反駁》。\n- 跨書：「科學不證明、只暫時保留」的另一半——**數學的真 vs 科學的真**——在本書 ch10；「可被觀察推翻的預測」怎麼設計成乾淨的對照實驗，在 ch05；把可證偽**用出去**判定偽科學（加上 Lakatos 進步 vs 退化、誠實面對灰色地帶），在 ch12。\n"}, {"id": "ch05-controlled-experiment-engine", "file": "ch05-controlled-experiment-engine.md", "group": "Part II — 設計的防線", "title": "ch05 — 對照：科學的引擎（控制變因、隨機化、雙盲、安慰劑）", "md": "# ch05 — 對照：科學的引擎（控制變因、隨機化、雙盲、安慰劑）\n\n> **本章解決什麼問題**：前四章（Part I）都在講「一個人獨自推理時，自欺從哪裡滲進來」——你看到的不是中立事實、歸納沒有邏輯保證、好假設要能被推翻。本章是 Part II「設計的防線」的開場：當你已經有一個可證偽的假設，**怎麼設計一場實驗，把『我以為』逼成『可被推翻』**。對照實驗是科學最強的單一武器，而它不是一個發明，是一疊發明——控制變因、隨機化、雙盲、安慰劑，每一樣堵的是一個**特定**的自欺漏洞。本章把這四樣拆開，逐一問「它到底在防什麼」，並回到脊椎的塞麥爾維斯案：他的兩病房單雙日交替分配，意外地是一場天然的準隨機對照——這是他強的地方，但他缺了什麼，本章也說清楚。\n\n```text\n全書地圖：一個結論要滿足什麼，才值得相信——以及我此刻最可能在哪裡騙了自己\n\n  Part I  個人推理的防線 ........ 一個人獨自推理時，自欺從哪裡滲進來\n     ch01 兩個病房的死亡率（脊椎登場：科學的起手式）\n     ch02 你看到的不是事實（觀察的理論負載）\n     ch03 太陽明天會升起嗎（休謨與歸納問題、假說從哪來：溯因）\n     ch04 怎樣都對就是沒說（波普爾與可證偽）\n        |\n        v\n  Part II  設計的防線 .......... 把「我以為」逼成「可被推翻」的實驗藝術  ◄ 你在這裡\n     ch05 對照：科學的引擎（控制變因、隨機化、雙盲）\n     ch06 相關不是因果（混淆變因與它的工程既視感）\n     ch07 證據如何更新信念（貝氏確證的科哲意義）\n        |\n        v\n  Part III  制度與限度的防線 ... 統計與社群是最強的防騙工具，也是新的自欺管道，最後撞上科學的限度\n     ch08 科學是一群人（典範、研究綱領、塞麥爾維斯為何被否決）\n     ch09 p 值與它的背叛（顯著、p-hacking、再現性危機）\n     ch10 兩種真（科學的真 vs 數學的真）\n        |\n        v\n  Part IV  科學擋不住的、與它如何修補 .. 偏心、偽科學、危機修補、機制\n     ch11 動機性推理：科學擋不住的那一半（指向偏誤書）\n     ch12 為什麼是科學贏了（與偽科學、民間知識的分界再探）\n     ch13 重複的力量（複製、預註冊、開放科學如何修補危機）\n     ch14 機制之必要（塞麥爾維斯缺的那一塊，與「黑箱有效」）\n        |\n        v\n  Part V  信任、收束與帶走 ...... 何時信專家、一張檢查表、把全書搬回你的系統\n     ch15 證詞、權威與共識（你該何時相信專家）\n     ch16 科學的失敗模式目錄（一張防自欺檢查表）\n     ch17 工程師的科學態度（把全書搬回你的系統）\n     ch18 同一個洗手案，現在你懂它十層（收官）\n```\n\n## 從你已知的出發\n\n你已經會做對照實驗了。只是你叫它別的名字。\n\n你上線一個新版本前，不會把它一次推給 100% 的流量，然後看整體錯誤率有沒有變。你會做 A/B test：把使用者**隨機分流**到舊版（A）和新版（B），其他條件盡量一樣，只差你關心的那一個改動，再比兩組的指標。或者你做 canary：先放 1% 流量到新版，跟另外 99% 的舊版**同時間、同流量結構**地對比，沒爆才逐步放量。\n\n停下來想一下，這套東西為什麼有效。它有效，**不是因為你觀察了新版本**——你當然觀察了，你盯著 dashboard 看了一整天。它有效，是因為你**同時觀察了一個沒有改動的對照組**，而且那兩組**除了你關心的改動以外，盡量一模一樣**。\n\n這句「除了那一個改動以外一模一樣」就是整個對照實驗的靈魂。你直覺上知道它的反面有多痛：「我同時改了三個東西，指標動了，到底是哪個讓它動的？」一次部署塞了快取改動、查詢優化、依賴升級，上線後 P99 降了，你想邀功，卻說不出是哪一個的功勞——甚至說不出是不是「剛好那天流量低」。你**沒有控制變因**，所以你**沒有可歸因的結論**。你以為你做了實驗，其實只做了一次「改變世界然後看世界」，那不是實驗，是許願。\n\n科學家花了兩百多年，才把「除了那一個改動以外一模一樣」這件事，從口號做成一套堵得住各種陰險漏洞的工程。本章就是拆解它。你會發現，A/B test 和 canary 不是「借用了科學的比喻」——它們**就是**隨機對照試驗（randomized controlled trial, RCT）的工程版本，而且**通常少做了一兩道防線**（你猜得到是哪道：雙盲）。\n\n## 對照的核心：要歸因，先排除別的解釋\n\n先把最樸素的版本說清楚，因為它就藏著第一個陷阱。\n\n你想知道「洗手能不能降低死亡率」。最天真的做法是：下令洗手，然後看死亡率有沒有降。死亡率降了——成功！\n\n問題在哪？問題在於「死亡率降了」這件事，有**一大堆**跟洗手無關的解釋，全都同時成立：\n\n```text\n觀察到：下令洗手後，死亡率降了\n可能的解釋（全都不需要「洗手有效」就成立）：\n  (a) 洗手真的有效                          ← 你想要的結論\n  (b) 那段時間剛好流行病退潮（自然消長）      ← 時間混淆\n  (c) 同時換了通風、換了床單、減少了解剖      ← 同時改了別的東西\n  (d) 醫護知道在被觀察，行為整體變謹慎了      ← 觀察效應\n  (e) 死亡率本來就在高點，自然會往平均回落    ← 回歸均值（見「直覺的陷阱」）\n```\n\n只看「洗手後死亡率降」這一組數據，你**無法分辨** (a) 和 (b)(c)(d)(e)。它們對這組數據的預測一模一樣：死亡率會降。一個被五種解釋同等支持的觀察，對「洗手有效」這個特定假設的支持力，幾乎是零。\n\n對照實驗的全部目的，就是**一個一個把 (b)(c)(d)(e) 排掉**，直到「洗手有效」變成剩下唯一還站得住的解釋。它的引擎邏輯是：\n\n> 設一個對照組，讓它跟實驗組**除了「有沒有洗手」以外，其他都一樣**——同一段時間（排掉 b）、同樣的其他措施（排掉 c）、同樣被觀察（排掉 d）、同樣的起點（排掉 e）。如果這樣兩組還是差很多，那個差，就只能歸給「洗手」。\n\n注意這句話的形狀：對照實驗**不直接證明你的假設**。它做的是**消去法**——把競爭解釋一個個關掉。這正好接上 ch03 講的溯因（abduction）：你溯因出「洗手有效」是最佳解釋，但「最佳」是相對於一堆競爭解釋而言的；對照實驗就是你**動手去殺掉那些競爭解釋**的場地。沒做對照，你的「最佳解釋」只是「我目前最喜歡的解釋」。\n\n下面四節，就是四種「把競爭解釋關掉」的具體工具。每一種堵一個特定的漏洞，請記住每一種堵的是哪一個——這是本章的考點。\n\n## 工具一：控制變因——堵「同時改了別的東西」\n\n控制變因（control variable）是最基本、也最常被偷懶跳過的一道。它的規則一句話：\n\n> **讓實驗組和對照組，只在你關心的那一個變因上不同，其他全部固定。**\n\n它堵的自欺是上面的 (c)：你以為是 X 造成的，其實是你**同時也改了的 Y**。\n\n這道防線你天天在違反。「我同時改了三個東西，指標動了」就是控制變因失守。一次只改一個變因，慢，但乾淨——這是你 debug 時的二分法直覺：要定位是哪個 commit 引入了 bug，你會 `git bisect`，一次只回退一塊，因為你知道「一次改一堆」會讓你永遠分不清是誰幹的。對照實驗的控制變因，就是把這個 bisect 直覺，前置到實驗設計階段：實驗開始前就先想好，我要讓兩組差在哪一個變因、其他怎麼鎖死。\n\n控制變因的陰險之處在於：**你只能控制你想得到的變因**。你把通風、床單、解剖頻率、季節都鎖死了——但那個你**根本沒想到**的變因呢？那個你不知道它存在、所以不知道要去控制它的混淆變因呢？\n\n這就是為什麼光有「控制變因」還不夠，你需要下一道防線。控制變因處理的是「你想得到、所以能逐一固定」的已知變因；隨機化處理的是「你想不到、所以無法逐一固定」的未知變因。這個分工是本章最重要的一句話，請劃線。\n\n## 工具二：隨機化——堵「你沒想到的混淆」與「分組偏差」\n\n隨機化（randomization）是二十世紀最被低估的發明之一，我認為這頁值得你停下來想十分鐘。\n\n統計學家費雪（Ronald Fisher）1920 年代在 Rothamsted 農業試驗站把隨機化確立為實驗設計的核心原則，1935 年的《實驗設計》（*The Design of Experiments*）把它寫成系統方法（2026-06 查證）。在他之前，農業試驗是這樣分地的：研究員會「合理地」安排——這塊地給新肥料、那塊地當對照，盡量讓兩塊看起來條件相當。聽起來很負責任，對吧？\n\n費雪指出了一個致命問題：只要分組是**人為判斷**的，就會偷渡進**你沒意識到的偏差**。也許你「覺得相當」的那兩塊地，其中一塊排水剛好好一點點，而你看不出來；也許你下意識把長得比較好的苗分給了你想證明有效的那組。**你越是真誠地想公平，你越可能用一個你察覺不到的標準在分組。**\n\n隨機化的精妙在於：它不要求你**知道**所有的混淆變因，它只要求你**放棄選擇**。\n\n```text\n隨機化堵的是什麼，用一張圖看：\n\n  人為分組（即使出於好意）：\n     未知混淆變因 ──（可能系統性地偏向某一組）──> 兩組起點就不公平\n                          ↑\n                你看不見它，所以無法保證它不偏\n\n  隨機分組：\n     未知混淆變因 ──（被隨機灑開，期望上平均分到兩組）──> 兩組起點期望相同\n                          ↑\n                你不需要看見它，隨機的數學幫你把它攤平\n```\n\n關鍵直覺：**隨機化不需要你列出混淆變因清單**。它對「你想得到的」和「你做夢都想不到的」變因**一視同仁地攤平**。你不知道受試者的基因、飲食、心情、那天的天氣對結果有沒有影響——沒關係，只要分組是隨機的，這些因素**在期望上**會平均分到兩組，兩組的起點就會在期望上相同。於是任何**系統性**的組間差異，就只能來自你施加的那一個介入。\n\n這就是費雪那句名言的意思：**隨機化讓有效的顯著性檢定成為可能**。它是統計推論「有效性的物理基礎」——不是因為它讓兩組「剛好相等」（單次隨機當然可能手氣不好，分得有點偏），而是因為它讓「組間差異純由運氣造成」這件事**有了一個可計算的機率分布**，於是你能問：我看到的這個差，大到光靠運氣難以解釋了嗎？（這個「大到難以解釋」怎麼量化，就是 p 值的活兒，見 ch09；機率機制見《馴服隨機》談假設檢定的那章。）\n\n工程師的版本你太熟了：A/B test 為什麼一定要**隨機**分流，而不是「老用戶給 A、新用戶給 B」？因為「新舊用戶」本身就是一個巨大的混淆變因——新用戶的留存、付費、行為模式跟老用戶天差地遠。你按任何**有意義的屬性**分組，那個屬性就成了混淆。只有**隨機**分流，才能讓「除了版本以外其他都一樣」這句話在期望上成真。你每次寫 `hash(userId) % 2` 來分桶，你就是在向費雪致敬。\n\n## 工具三：雙盲——堵「期望污染了量測」\n\n前兩道防線管的是「分組要公平」。但就算分組完美，還有一個更陰的漏洞：**知道自己在哪一組，會改變結果本身**。\n\n雙盲（double-blind）堵的就是這個：**受試者和量測者都不知道誰在哪一組**。它分兩層，各堵一種污染：\n\n```text\n不盲 → 兩種污染：\n\n  受試者知道自己吃的是真藥：\n     「我在被治療」這個信念本身 → 主觀感覺變好、行為改變\n                                    （安慰劑效應，下一節專講）\n\n  量測者知道這人吃的是真藥：\n     期望 → 量測偏差。同一張模糊的 X 光，\n            「他是治療組」的暗示讓醫師更容易讀成「好轉」；\n            問診時不自覺地對治療組多問一句「是不是好點了？」\n            判定「死亡原因」時對兩組用不同的寬鬆度\n```\n\n第二層特別值得後端工程師警惕，因為它最反直覺：**污染的不是受試者，是拿著尺的那個人**。一個真誠、專業、想做出正確判斷的科學家，只要他**知道**眼前這個樣本屬於他期待有效的那一組，他的判讀就會被期望往那個方向拉一點點——而他**完全不會察覺**。這不是不誠實，這是 ch02 講的觀察理論負載在量測現場的現形：你「看到」的好轉，被你「預期」的好轉塑造了。雙盲的解法簡單粗暴：**不讓量測的人知道分組**，期望就沒有了拉扯的方向。\n\n這裡要插一個常被混為一談、但其實是兩件事的區分，搞懂它你就贏過大多數人：**分配隱匿（allocation concealment）** 和 **盲法（blinding）** 不是同一件事。\n\n```text\n分配隱匿 vs 盲法（兩道不同的閘，堵不同時點的自欺）\n\n  分配隱匿：分組「之前」——不讓決定誰進哪組的人知道「下一個會分到哪組」\n            堵的是：選擇偏差（暗中把病情輕的塞進治療組）\n            時點：受試者被分配進組之前\n\n  盲法：    分組「之後」——不讓受試者/量測者知道「這個人在哪組」\n            堵的是：期望污染（安慰劑效應 + 量測偏差）\n            時點：受試者已分組、進入治療與量測之後\n```\n\n很多人把「雙盲」當成一個籠統的好東西，其實它是**兩個不同時點、堵兩種不同自欺**的機制疊在一起。分配隱匿保護的是「分組這個動作本身不被動手腳」；盲法保護的是「分組之後的感受與量測不被預期污染」。一個 A/B test 框架若用伺服器端 `hash(userId)` 自動分桶、實驗者無法干預也看不到，那它的**分配隱匿**很完美——但它的**盲法**通常是零，因為跑指標、看 dashboard 的人清清楚楚知道哪個桶是新版（這正是你的 A/B test 最像「沒做雙盲」的地方，待會兒紙上推演會逼你想清楚）。\n\n## 工具四：安慰劑——堵「光是被治療就會好」\n\n最後一道：安慰劑（placebo）對照。它堵的是上面 (e) 旁邊那個更狡猾的東西——**光是「接受了治療」這件事，不管治療有沒有效，人就會好一些。**\n\n如果你只比「吃藥的人」和「什麼都沒做的人」，藥組好轉了，你還是不能歸功給藥的**有效成分**。因為吃藥的人還多了一堆東西：被關心、有期待、生活作息被介入、相信自己在變好。安慰劑對照的做法是給對照組一顆**外觀一樣、但沒有效成分的糖丸**，於是兩組「被治療的儀式」完全相同，只差「有沒有有效成分」。兩組之差，才是有效成分的淨效果。\n\n但這裡藏著本章最該講清楚、也最常被講錯的一件事，我把它留到「直覺的陷阱」專門講：**安慰劑組好轉**，很大一部分**根本不是「安慰劑效應」**，而是疾病自然消長、回歸均值這些跟「相信」毫無關係的東西。先記住結論——這正是為什麼你需要的是「對照組」，而不只是「安慰劑」。\n\n把四樣工具收成一句話，這是全章的骨架：\n\n```text\n對照實驗的四道防線，各堵一個特定自欺：\n\n  控制變因  堵「同時改了你想得到的別的東西」（已知變因）\n  隨機化    堵「你沒想到的混淆 / 分組偏差」（未知變因）\n  盲法/雙盲 堵「期望污染了感受與量測」（安慰劑效應 + 量測偏差）\n  安慰劑    堵「光是被治療的儀式就會好」（把治療儀式在兩組對齊）\n\n  一句總綱：要把效果「歸因」給你的介入，\n            先把所有不需要你介入也成立的競爭解釋，一個個關掉。\n```\n\n每一道防線都對應一個你會犯的具體錯誤。背「對照實驗有四要素」沒用；背「這四要素各堵哪個漏洞」才是科學素養。\n\n## 對照實驗簡史：兩百年才湊齊這幾道防線\n\n值得強調的是：這四道防線**不是同時、由一個人發明的**。它們是兩百多年一道一道補上的，每補一道，都是因為前一代人被某個漏洞騙過一次——科學方法就是人類跟自己自欺打了幾百年的攻防紀錄。\n\n- **1747，林德（James Lind）的壞血病試驗**：英國海軍軍醫林德在 Salisbury 號上，把 12 名病情相近的壞血病水手分成 6 對，所有人同樣的伙食、同樣的居住條件（**這就是控制變因**），每對給不同療法（醋、蘋果酒、硫酸、海水、藥糊、柑橘）。吃柑橘那對一週內顯著好轉。這是史上第一個**有對照的臨床比較**——但注意，它**不是隨機分配**的（隨機化還要等近兩百年），分組是林德安排的（2026-06 查證）。\n- **1920s–1935，費雪的隨機化**：如前述，把「分組不能靠人為判斷」變成方法論原則。\n- **1948，MRC 鏈黴素試驗**：英國醫學研究委員會（MRC）治肺結核的試驗，由統計學家布拉德福・希爾（Austin Bradford Hill）設計，用**隨機數字**分配病人到鏈黴素組或臥床休息組，分配序列裝在密封信封裡、研究者事前無法得知（**這就是分配隱匿**）。公認是第一個現代隨機對照試驗（2026-06 查證）。\n- **雙盲與安慰劑**：這兩樣**沒有單一發明時點**，是 18–20 世紀逐步演化的。盲法的思想可上溯到 **1784 年**法國皇家委員會（成員包括富蘭克林）調查梅斯梅爾（Mesmer）的「動物磁流」——委員會用蒙眼讓受試者分不出「真磁化」和「假磁化」，結果效果消失，證明那是暗示而非磁流（2026-06 查證；史實底座見 landscape 待考 #3，故本書講「對照的要素」用演化敘事、不釘單一年份）。\n\n這串時間軸的教學點是：**1747 就有人懂「控制變因」，要再等兩百年才湊齊「隨機化 + 分配隱匿」，雙盲與安慰劑更是慢慢長出來的。** 每一道防線都對應一次「原來我們一直被這個漏洞騙」的領悟。你今天隨手寫的 A/B test 框架裡，藏著兩百年的血淚。\n\n## 脊椎透鏡：塞麥爾維斯的兩病房，是一場天然的準隨機對照\n\n現在換對照實驗這個透鏡，重看脊椎的塞麥爾維斯（Ignaz Semmelweis）案。\n\n回顧 ch01 立起的事實底座：1840 年起，維也納總醫院第一產科由**醫師與醫學生**接生、第二產科由**助產士**接生，產婦按**單雙日交替**分配入院。第一病房的產褥熱死亡率遠高於第二——每千人版（1840–46 平均）是**第一病房 98.4‰ vs 第二病房 36.2‰**，約 2.7 倍（這是最乾淨、無年份切片陷阱的對照數字）。1847 年好友 Kolletschka 被解剖刀劃傷後死於酷似產褥熱的病理，塞麥爾維斯溯因出「屍體微粒經手傳染」，1847 年 5 月中下令用氯化石灰水洗手。介入後兩病房幾乎拉平（百分比版：第一病房 1846 全年約 11.4% → 1848 全年約 1.27%，第二病房 1.33%）。\n\n用本章的四道防線去檢查他做了什麼、缺了什麼，會得到一個讓人肅然起敬、又心痛的結果：\n\n```text\n塞麥爾維斯案 vs 一個現代 RCT（逐道防線對齊）\n\n  防線         塞麥爾維斯（1847）              現代 RCT          他做到了嗎\n  ─────────────────────────────────────────────────────────────────────\n  控制變因     兩病房同院、同時期、            兩組除介入外      部分 ✓\n               病人同一群、設施相近            刻意鎖死全部      （同院同期是\n               （差別主因＝誰接生）            可控變因          天然的強控制）\n  ─────────────────────────────────────────────────────────────────────\n  隨機化       單雙日交替分配入院             電腦亂數          準隨機 ✓✓\n               ＝病人無法選病房、              分配             （這是他\n               醫護無法挑病人                                  最強的一環！）\n  ─────────────────────────────────────────────────────────────────────\n  分配隱匿     按入院日自動決定，             密封信封         ✓\n               誰都動不了手腳                  事前不可知       （日期沒人能操弄）\n  ─────────────────────────────────────────────────────────────────────\n  盲法/雙盲    無——所有人都知道哪個病房、     受試與量測       ✗\n               都知道有沒有洗手                皆不知分組        （完全沒有）\n  ─────────────────────────────────────────────────────────────────────\n  安慰劑       無——對照是「沒洗手」，         假治療           ✗\n               不是「假裝洗手」                外觀相同         （無，但此處\n                                                               危害小，見下）\n  ─────────────────────────────────────────────────────────────────────\n  機制         無——說不出「為什麼」          已知作用機轉      ✗✗\n               （細菌說 1860s–80s 才立）                       （致命傷，見 ch14）\n```\n\n先說他**強得驚人**的地方：**單雙日交替分配，意外地是一場準隨機分組。** 產婦無法選擇要進哪個病房（看入院那天是單日還是雙日），醫護也無法挑選把誰塞進哪一房。這等於把「哪些病人去第一病房」這件事，交給了一個跟病人病情、社經地位、體質都無關的外部規則。於是「第一病房的病人本來就比較虛弱」這類**選擇偏差**的解釋，被這個交替規則切掉了一大半。塞麥爾維斯沒讀過費雪——費雪那時還沒出生——但他靠醫院的行政慣例，白撿了一場準隨機對照。**這是他案例之所以在科學方法上如此漂亮的核心原因。**\n\n再說他**缺**的地方，而且要誠實地缺，別美化：\n\n- **沒有盲法。** 所有人都知道自己在哪個病房、知道有沒有在洗手。理論上這會讓量測（怎麼判定死因、怎麼記錄）被期望污染。不過要公允地說：產褥熱的死亡是**硬終點**（病人死了就是死了，不太有「判讀空間」），所以缺盲法在這個案子裡的危害，遠小於在一個量測「疼痛改善」「情緒好轉」這種軟終點的研究裡。這是個值得學的分寸——**缺哪道防線的嚴重程度，取決於你的終點有多容易被期望污染。**\n- **沒有安慰劑對照。** 但同理，產婦不會因為「相信自己被洗手保護了」而少死於敗血症，所以這道缺失在此幾乎無害。安慰劑要緊的是軟終點、主觀感受的研究。\n- **沒有機制。** 這才是致命的。他有對照、有準隨機、有戲劇性的效果，**卻說不出「為什麼洗手有效」**——他連細菌都不知道存在。這道缺失不屬於「對照實驗的防線」，但它是他被整個醫界否決的關鍵之一，本書 ch14 專門處理它。請記住本書反覆敲的這顆釘子（landscape T9）：**他有效果，但無機制，且被否決——「有效果 ≠ 有機制 ≠ 被接受」是三件不同的事。** 別把他寫成「發現細菌的英雄」，那會毀掉本書最重要的教學點。\n\n把這張表讀完你會發現一件事：塞麥爾維斯案在「對照實驗」這個維度上，幾乎是一個**模範生**——控制、準隨機、分配隱匿三道防線他都意外地有，缺的兩道（盲法、安慰劑）在他的硬終點情境下危害很小。他栽的地方根本不在對照設計，而在**機制**和**社群接受**（ch08、ch14）。這正是本書要你看見的層次：**一個方法論上接近完美的實驗，依然可能被否決二十年。** 科學不只是把實驗設計做對，它是一場跟整個社群、跟「為什麼」的纏鬥。\n\n## 直覺的陷阱\n\n對照實驗這套東西，最常被誤解成什麼？我挑三個你最可能踩的，第一個有名字，而且狠。\n\n**陷阱一：「安慰劑組好轉了，所以這是安慰劑效應（相信的力量）」——其實大半是回歸均值與自然消長。**\n\n這是本章的招牌陷阱，因為連受過訓練的人都常講錯。你常聽到「安慰劑效應很強大，糖丸也能讓三成的人好轉」，然後得出「相信的力量好神奇」。**錯在哪？** 錯在把「安慰劑組好轉的全部」當成「相信造成的」。實際上安慰劑組好轉，至少混了四股力量，多數跟「相信」無關（2026-06 查證）：\n\n```text\n安慰劑組為什麼好轉？拆開來看：\n\n  ① 疾病自然消長（natural history）  ← 感冒本來就會自己好，跟糖丸無關\n  ② 回歸均值（regression to the mean）← 人在最不舒服時去看醫生，\n                                         之後自然往「平常」回落\n  ③ 同時接受的其他照護              ← 量血壓、被關心、規律作息\n  ④ 真正的「相信→生理」效應          ← 這才是狹義的安慰劑效應，\n                                         往往比想像中小\n```\n\n**回歸均值（regression to the mean）** 是最陰的一股，它純粹是統計現象、毫無神祕色彩：人通常在症狀**最嚴重的那一刻**才去就醫、才入組試驗。而「最嚴重的那一刻」按定義就是一個極端值，下一次量測**期望上**會往平均回落——不管你給不給他糖丸。於是「就醫後好轉」有很大一塊，是「他本來就會好轉」。許多被歸給「安慰劑效應」的好轉，其實是回歸均值假扮的（這也是 ch16 失敗模式目錄會收的一條）。\n\n**錯誤直覺在哪一步把你帶溝裡？** 在「安慰劑組好轉了 → 一定是某種效應 → 那效應叫安慰劑效應」這一跳。你少了一個對照：要分離「相信的力量」，你得再加一組「完全不治療、只觀察」的人，跟安慰劑組比——若兩組好轉差不多，那「相信」的淨貢獻其實很小，好轉的主力是自然消長與回歸均值。**怎麼自我察覺？** 當你聽到「光是 X 就讓 Y 好轉了」，問一句：「跟『什麼都不做、只是時間過去』比，X 多帶來多少？」沒有這個對照，你看到的「效應」可能整個是時間和統計的幻覺。\n\n這個陷阱的工程版你絕對遇過：**「我重啟了服務，問題就好了，所以重啟有效。」** 真的嗎？還是那個尖峰流量本來就要退了（自然消長）？還是那個指標本來就在異常高點、自然會回落（回歸均值）？你「重啟後好轉」跟安慰劑組「吃糖丸後好轉」是同一個陷阱——你缺一個「不重啟、只等一樣久」的對照組（ch14 會把這個「有效果無機制」的問題講透）。\n\n**陷阱二：「對照組＝安慰劑組」——對照組是用來排除競爭解釋的，不一定是糖丸。**\n\n很多人把「對照」窄化成「給糖丸」。其實對照組的本質是**「除了你關心的介入外，其他都一樣的那一組」**，糖丸只是「在藥物試驗裡讓治療儀式對齊」的一種手段。塞麥爾維斯的對照組是「沒洗手的另一病房」，不是「假裝洗手」。你的 A/B test 對照組是「跑舊版的使用者」，沒人給他們糖丸。**自我察覺**：問「我這組對照，到底替我關掉了哪個競爭解釋？」——答得出來才算有效對照，答不出來那組對照就是擺設。\n\n**陷阱三：「我做了 A/B test，所以我做了雙盲 RCT」——你幾乎一定漏了盲法。**\n\n你的 A/B test 通常有很好的隨機化（`hash(userId)`）和分配隱匿（伺服器端自動分桶、實驗者干預不了）。但**盲法**呢？看 dashboard 跑指標的人，清清楚楚知道哪個桶是自己力推的新版。於是「期望污染量測」的漏洞是開的：你會不會在新版那組「努力找它變好的證據」、對舊版那組「比較寬容地看待波動」？你選的成功指標、你看資料的時點、你解讀雜訊的方向，都可能被你「希望新版贏」的期望拉一點點——而你不會察覺（這跟 ch11 要講的動機性推理同源，心理機制指向《思考的陷阱》談動機性推理的那章）。**自我察覺**：問「分析這個實驗的人，知不知道哪組是新版？知道的話，他的哪些判斷可能被『希望新版贏』污染？」——把這個問題問出聲，你就贏過大多數只會說「我們做了 A/B test」的人。\n\n| 陷阱 | 錯誤直覺 | 在哪一步下溝 | 怎麼自我察覺 |\n|---|---|---|---|\n| 安慰劑＝相信的力量 | 安慰劑組好轉都是「相信」造成的 | 把「好轉」整包歸給效應，漏掉自然消長與回歸均值 | 問「跟什麼都不做比，多了多少？」 |\n| 對照組＝糖丸 | 對照一定是給安慰劑 | 把手段（糖丸）當成本質（排除競爭解釋） | 問「這組對照替我關掉了哪個解釋？」 |\n| A/B test＝雙盲 | 隨機分流就等於做了雙盲 | 有隨機化卻沒盲法，期望污染量測 | 問「分析的人知不知道哪組是新版？」 |\n\n## 紙上推演\n\n以下純紙筆推演，不要去跑任何程式。逐題寫下你的答案，再讀解答對照——重點不在答對，在於看清楚你的直覺會在哪一步漏掉一道防線。\n\n**推演題 1（★，[10 分鐘]）：四道防線，各堵什麼？**\n不查前文，憑記憶寫出對照實驗的四個要素（控制變因、隨機化、盲法、安慰劑），並在每個旁邊用一句話寫出它**堵的是哪一種自欺**。寫完再問自己：如果一個實驗**只**漏了其中一道，最可能讓什麼樣的假結論溜進來？\n\n**推演題 2（★★，[15 分鐘]）：替「新版本會不會降 P99」設計一個乾淨的對照。**\n你要驗證「新版服務 v2 會降低 P99 延遲」。請設計一個對照實驗：(a) 你的實驗組和對照組各是什麼？(b) 你要**控制**哪些變因、為什麼必須控制？(c) 為什麼分流必須**隨機**、不能按「新用戶給 v2」？(d) 這個實驗哪裡相當於「沒做雙盲」——誰看得到分組、他的哪個判斷可能被污染？\n\n**推演題 3（★★，[15 分鐘]）：揪出「重啟有效」裡的回歸均值。**\n某同事宣稱：「每次 RDS CPU 飆到 90% 以上，我們重啟一下唯讀副本，五分鐘內 CPU 就降回 40%，所以重啟有效，建議寫進 runbook。」請用本章工具拆穿這個推論可能的問題：(a) 這裡的「回歸均值」會怎麼假扮成「重啟有效」？(b) 要分離「重啟的真實效果」和「本來就會降」，你需要一個什麼樣的對照？(c) 這跟「安慰劑組好轉」是不是同一個陷阱？\n\n### 推演解答\n\n**題 1 解答。** 標準對應：\n\n```text\n控制變因  → 堵「同時改了你想得到的別的東西」（已知混淆）\n隨機化    → 堵「你沒想到的混淆 / 人為分組偏差」（未知混淆）\n盲法/雙盲 → 堵「期望污染了感受與量測」（安慰劑效應 + 量測偏差）\n安慰劑    → 堵「光是被治療的儀式就會好」（治療儀式在兩組對齊）\n```\n\n「只漏一道會溜進什麼假結論」的常見錯路與正解：\n- 漏**控制變因** → 你把效果歸給 X，其實是同時改的 Y（你的「一次部署改三樣」）。\n- 漏**隨機化** → 兩組起點本來就不公平，你看到的差是分組偏差不是介入效果（「新用戶給 v2」）。\n- 漏**盲法** → 量測被期望拉偏，尤其在軟終點（疼痛、情緒、你「覺得」新版比較順）。\n- 漏**安慰劑** → 把「被治療的儀式 + 自然消長」當成有效成分的功勞。\n- 最常見的盲點：很多人記得前兩道（控制、隨機），完全忘記後兩道（盲法、安慰劑）——因為工程界的 A/B test 文化只訓練了前兩道。\n\n**題 2 解答。**\n(a) **實驗組**＝被分到跑 v2 的請求/使用者；**對照組**＝同時段被分到跑 v1（現行版）的請求/使用者。關鍵：對照組必須是**同時段**的 v1，不能拿「上週的 v1 數據」當對照——那會把「這週流量跟上週不同」這個巨大的時間混淆放進來（這是工程師最常犯的：用歷史 baseline 當對照，等於沒做控制變因）。\n(b) 要控制的變因：流量結構（請求類型、地理分布、裝置）、硬體規格、同時段的下游依賴狀態、時段本身。為什麼？因為這些每一個都能獨立影響 P99；不固定它們，你就分不清 P99 的差是 v2 的功勞還是「v2 那組剛好被分到比較輕的請求」。\n(c) 必須隨機，因為任何**有意義的分流屬性**都會偷渡混淆：按「新用戶」分，新用戶的請求模式、資料量、快取命中率都跟老用戶不同，你量到的「v2 較快」可能整個是「新用戶的請求本來就比較好處理」。只有隨機（如 `hash(requestId) % 2`）才能讓兩組的請求特性在期望上相同，把差歸給版本。\n(d) 「沒做雙盲」之處：**看 dashboard 評判結果的人（你）知道哪個桶是 v2。** 被污染的判斷：你可能下意識地對 v2 那組「找它變快的證據」、把 v2 的一次延遲尖峰解讀成「雜訊」、把 v1 的尖峰解讀成「它本來就慢」；你可能盯著實驗看，一達標就停（這是偷看，p-hacking 的近親，見 ch09）。常見錯路：以為「A/B test 是自動化的所以很客觀」——自動化的是**分流**（分配隱匿做得好），但**判讀**這一端往往全裸、沒有任何盲法。\n\n**題 3 解答。**\n(a) **回歸均值怎麼假扮成「重啟有效」**：你**只在 CPU 飆到 90% 以上時**才重啟——也就是你只在一個**極端高點**動手。而極端高點按統計本性，下一刻**期望上就會往平均（比如 40%）回落**，不管你重不重啟。於是「90% 時重啟 → 五分鐘後 40%」這個觀察，被「重啟有效」和「本來就會降」**同等支持**——你無法分辨。你選擇動手的時機（總在峰值）本身，就保證了你「之後會看到下降」。\n(b) 需要的對照：**在同樣飆到 90% 以上的時刻，隨機決定『重啟』或『不重啟、只等五分鐘』，比兩組五分鐘後的 CPU。** 若「不重啟組」也降到差不多，那重啟的淨效果≈0，下降的主力是回歸均值。這就是把「治療儀式」（在峰值動手）對齊、只留「重啟 vs 不重啟」這一個差。\n(c) **是同一個陷阱。** 「90% 時重啟 → 降」和「不舒服時吃糖丸 → 好轉」結構完全相同：都在極端值的時刻施加介入，都把「本來就會回落」誤記成「介入有效」。安慰劑組好轉的主力是回歸均值與自然消長，重啟「有效」的主力可能也是回歸均值——兩者缺的都是「不介入、只等一樣久」的對照組。（順帶：就算重啟真的有效，你也還缺**機制**——為什麼有效？不知道機制，你不敢保證換個情境還有效，見 ch14。）\n\n## 自我檢核\n\n口頭回答，講得出來才算過關。優先答「為什麼」。\n\n1. 為什麼「下令洗手後死亡率降了」這個觀察，對「洗手有效」的支持力幾乎是零？（提示：有多少不需要洗手有效就成立的競爭解釋？）\n2. 控制變因和隨機化都在處理混淆，它們的分工是什麼？為什麼光有控制變因不夠？\n3. 隨機化最反直覺的地方：它為什麼**不需要你知道**有哪些混淆變因，就能把它們攤平？\n4. 雙盲堵的兩種污染分別是什麼？為什麼「量測者的期望」這一種特別陰險——連真誠專業的科學家都防不住？\n5. 「分配隱匿」和「盲法」差在哪？一個自動分桶的 A/B test，這兩樣各做到了沒？\n6. 為什麼「安慰劑組好轉了」不等於「安慰劑效應很強」？回歸均值在這裡扮演什麼角色？\n7. 塞麥爾維斯案在四道防線裡，哪幾道意外地做到了、哪幾道缺了？缺的那幾道在他的情境下危害大不大，為什麼？\n8. 你最近一次「改了東西、指標變好、宣布成功」，少做了哪道防線？那道防線本來要替你關掉哪個競爭解釋？\n\n## 延伸閱讀\n\n- **James Lind Library（jameslindlibrary.org）** — 對照試驗史的一級資料庫，特別讀〈Why the 1948 MRC trial of streptomycin used treatment allocation based on random numbers〉，看分配隱匿與隨機化是怎麼從鏈黴素試驗長出來的（2026-06 查證為現存且權威）。\n- **R. A. Fisher,《The Design of Experiments》(1935)** — 隨機化、重複、區組三原則的原典；「女士品茶」那段是理解「隨機化讓顯著性檢定有效」最好的入口（讀導論與第二章即可，不必啃完）。\n- **Stanford Encyclopedia of Philosophy,〈Experiment in Physics〉/〈Scientific Method〉** — 從科哲角度看「對照實驗為何能歸因」的標準參考，補本章「消去競爭解釋」這條邏輯的哲學底子。\n- **D. Colquhoun,〈placebo effects are weak: regression to the mean is the main reason ineffective treatments appear to work〉(dcscience.net)** — 把「安慰劑效應大半是回歸均值」這個本章招牌陷阱講得最透的一篇科普長文（2026-06 查證為現存；觀點偏強，當「逼你看清回歸均值」的解毒劑讀）。\n- **《馴服隨機》談假設檢定與大數法則的那章** — 本章說「隨機化讓組間差異有了可計算的機率分布」，那個分布怎麼算、為什麼大樣本下運氣會被攤平，去那本書看機率機制（本書只給結構直覺）。\n- **塞麥爾維斯案的一級史料**：Hempel《Philosophy of Natural Science》(1966) 用此案當科學方法課本範例的那幾頁，以及 PMC 上的〈Wash Your Hands!〉——對照本章的「四道防線檢查表」回頭重讀，會更懂他強在哪、缺在哪。\n"}, {"id": "ch06-correlation-causation", "file": "ch06-correlation-causation.md", "group": "Part II — 設計的防線", "title": "ch06 — 相關不是因果：混淆變因與它的工程既視感", "md": "# ch06 — 相關不是因果：混淆變因與它的工程既視感\n\n> **本章解決什麼問題**：ch05 立起了科學的引擎——對照實驗，並說了「隨機化」是二十世紀最被低估的發明之一。但它沒回答一個更前面的問題：**為什麼我們需要對照？到底是哪一種自欺，逼得人類發明出隨機分組這種麻煩東西？** 答案是一個你每天在 dashboard 上都會撞到的幽靈——**兩件事一起動，不代表一件造成另一件**。本章專講相關（correlation）為什麼推不出因果（causation）：混淆變因（confounder）、反向因果、純巧合這三個陷阱，它們的結構，以及為什麼 ch05 的隨機化恰恰是切斷混淆的利器。這是 Part II「設計的防線」的中段——ch05 給工具，本章給「工具在防的那個鬼」。\n\n## 從你已知的出發\n\n你上線了一版新快取。隔天看 dashboard，錯誤率掉了。你在 standup 上說「新快取讓錯誤率降了 30%」，大家鼓掌，ticket 關掉。\n\n停一下。你怎麼知道是快取？\n\n你會的，因為你被這種事咬過。那天你同時還做了別的事：上線時間正好卡在週五晚上、流量比平日低；同一個 PR 裡順手把一個逾時時間從 1 秒調到 3 秒；而且運維那邊昨天剛把一台一直在抖的機器換掉。錯誤率掉了 30%，**到底是哪一個**？快取？流量低？逾時改了？換機器？還是這四個的某種組合？\n\n這就是本章的全部內容，只是換了件衣服。你觀察到兩件事一起動了——「上了快取」和「錯誤率降」——你的大腦**立刻**想把前者當成後者的原因。但「一起動」（相關）和「一個造成另一個」（因果）是兩回事，中間隔著一條深溝，而這條溝裡住著三種專門騙你的東西。\n\n工程師對這件事其實有很好的直覺，比一般人好得多。你天天在跟它搏鬥：\n\n- **相關性故障**的反面——CloudWatch 上兩條曲線一起飆，你不會馬上說 A 害了 B，你會先懷疑「是不是有個共同的上游把兩個都拖下水了」。那個「共同的上游」，就是本章的主角，**混淆變因**。\n- **「部署後 P99 升高」**——你被教過不要馬上甩鍋給部署，因為部署時間常常正好撞上流量尖峰。流量尖峰同時造成「你部署了」（你挑離峰部署但有時撞上）和「P99 升高」，它就是混淆變因。\n- 做 root cause 時你最怕的那句「**會不會只是碰巧**」——那是純巧合在敲門。\n\n本章要做的，是把你這份模糊的維運直覺**磨成一把能講出來的刀**：相關推不出因果，到底是哪三種結構在搞鬼；為什麼 ch05 的隨機分組能一刀切斷其中最陰險的那種；以及——回到脊椎——塞麥爾維斯當年是怎麼把「洗手與死亡率下降的相關」，一步步論證成「洗手**導致**死亡率下降」的，而他又躲過了哪些混淆質疑。\n\n## 相關推不出因果：三種陷阱，逐一拆開\n\n先把話說清楚，免得矯枉過正。「相關不是因果」這句口號被講爛了，爛到很多人以為它的意思是「相關沒用」。**不是。** 相關是因果的線索，沒有相關，連嫌疑犯都湊不齊。問題不在相關沒用，問題在**從「相關」跳到「因果」這一步，有三個地方會讓你摔下去**。\n\n```text\n你看到的：X 和 Y 一起動（相關）\n你想跳到的：X 造成 Y（因果）\n\n  這一跳，有三種摔法：\n\n  陷阱一  共同原因（confounder）\n          有個第三者 Z，同時造成 X 和 Y。\n          X 和 Y 一起動，但彼此沒有因果關係，\n          它們只是同一個爸爸生的。\n                Z\n              ↙   ↘\n            X       Y        ← X、Y 相關，但 X 不導致 Y\n\n  陷阱二  反向因果（reverse causation）\n          確實有因果，但方向反了——是 Y 造成 X，\n          不是 X 造成 Y。\n            X  ←  Y          ← 你以為 X→Y，其實 Y→X\n\n  陷阱三  純巧合（coincidence）\n          根本沒有任何因果關係，\n          兩條曲線只是剛好一起動。\n          資料一多、變數一多，這種「假相關」必然出現。\n            X       Y        ← 之間什麼線都沒有\n```\n\n逐一來。\n\n**陷阱一：共同原因（混淆變因）。** 這是三者裡最重要、最陰險、也是科學方法花最大力氣去防的一種，所以本章後面整節都在講它。先給直覺：兩件事一起動，常常不是因為一個推了另一個，而是因為**背後有第三個東西同時推了它們兩個**。\n\n教科書級的例子，冰淇淋。某城市的資料顯示：冰淇淋銷量越高，溺水死亡人數越多，相關性扎實得很（2026-06：這是統計教材的標準範例，數字隨教材而異，當示意看）。難道吃冰淇淋會讓人溺水？當然不是。背後有個第三者：**氣溫**。天氣熱，大家買冰淇淋；天氣熱，大家去游泳，溺水跟著多。氣溫同時推高了冰淇淋銷量和溺水數，這兩者本身**沒有任何因果關係**，它們只是同一個夏天的兩個孩子。氣溫就是混淆變因。\n\n把它翻成你的語言：「**部署後 P99 升高**」——你以為「部署 → P99 升」，但其實可能是「**週五晚上的流量尖峰**」同時造成了「你剛好那時在部署」和「P99 升高」。流量尖峰是混淆變因。你甩鍋給部署，真兇逍遙法外，下次離峰部署你還會再被咬一次。\n\n**陷阱二：反向因果。** 因果是真的，但箭頭反了。經典的工程版：你發現「**重啟服務的機器，故障率特別高**」，於是得出「重啟導致故障」，差點下令禁止重啟。但想想：是不是**因為機器先出了故障，運維才去重啟它**？是故障導致重啟，不是重啟導致故障。箭頭反了。\n\n醫學裡也滿地都是：「常去醫院的人死亡率高，所以醫院害死人」——其實是病得重的人才常跑醫院。反向因果的陰險在於，它**真的有因果**，只是方向錯，所以你做再多「確認 X 和 Y 真的相關」的功課都救不了你——X 和 Y 確實有因果關係，你只是搞反了誰是因。\n\n**陷阱三：純巧合。** 沒有任何機制，兩條線就是剛好一起動。這在大數據時代特別危險，因為它是**數學上的必然**：你手上的指標越多、看的時間越長，總會有兩條曲線的形狀長得很像。有人專門收集這種「假相關（spurious correlation）」當笑話——美國某州的離婚率和某種食品的人均消費量逐年高度相關之類（2026-06：Tyler Vigen 的 *Spurious Correlations* 是這類例子的著名收藏，當趣味看）。\n\n巧合的工程既視感：你 dashboard 上 30 個指標，總有兩個今天一起往上飄。你盯著它們說「欸這兩個是不是有關係」——多半沒有，是你看的東西太多了。這其實是 ch09 要講的「多重比較」的近親：**找的地方夠多，假訊號必然冒出來**。\n\n這三個陷阱裡，反向因果靠「想清楚時序、想清楚誰先誰後」常常能擋掉；純巧合靠「要求一個說得通的機制、要求能複製」能擋掉（這是 ch14 機制、ch13 複製的伏筆）。**最難擋的是混淆變因**——它既有真實的統計相關，又有看似合理的故事，唯一能乾淨切斷它的，是 ch05 那個你可能還沒完全領會其威力的東西：隨機化。下一節專講它。\n\n## 混淆變因：為什麼隨機分組是一把手術刀\n\n把混淆變因的結構再釘死一次，因為這是本章——也是整個「為什麼需要對照實驗」——的核心。\n\n```text\n混淆變因的標準結構\n\n           混淆變因 Z\n          （共同原因）\n         ↙           ↘\n       X  ─ ─ ─ ─ ─ ─  Y\n           (觀察到相關)\n\n  你想知道的因果：X → Y 是否存在？\n  你真正看到的　：Z 同時推動 X 和 Y，造成「假因果」相關。\n\n  關鍵：只要 Z 存在且你沒控制它，\n        X 和 Y 就會相關——即使 X 對 Y 毫無影響。\n```\n\n混淆變因之所以是三個陷阱裡最陰險的，在於它**同時滿足你判斷因果的兩個直覺檢查**：(1) X 和 Y 真的有統計相關（不是巧合）；(2) 「X 造成 Y」聽起來有道理（不像storks 送子那麼荒謬）。冰淇淋例子之所以是教學範例而不是真實災難，正因為「吃冰淇淋導致溺水」荒謬到你會停下來想。真正咬死人的混淆，是那些**故事講得通**的——「用了我們 SDK 的 App 留存率更高」、「上了快取錯誤率就降」——這些你不會本能起疑，於是直接信了。\n\n現在來看 ch05 那個隨機化為什麼是手術刀。回到留存率的例子：\n\n你觀察到「**裝了你們家 SDK 的 App，30 天留存率比沒裝的高 15%**」。你想說「我們 SDK 提升留存」。但混淆變因在哪？想想**誰會選擇裝你的 SDK**——多半是那些本來就比較認真、比較有資源、產品本來就比較好的團隊。「團隊認真程度」這個 Z，同時造成了「會去裝 SDK」（X）和「留存率高」（Y）。你的 SDK 可能一點用都沒有，相關照樣存在。\n\n要切斷它，有兩條路。\n\n**笨路（觀察法）：** 把你能想到的混淆變因一個一個「控制」住——只比較團隊規模相近、產品類別相同、融資階段一致的 App。這叫「分層」或「調整」。問題是：**你只能控制你想得到的混淆變因。** 那些你沒想到的（團隊的技術品味？產品經理的偏執程度？），照樣在背後搗亂。你永遠不知道自己漏了哪個。這就是觀察性研究的根本軟肋——也是 ch09 要講的，為什麼觀察數據做出來的結論複製率那麼慘。\n\n**聰明路（隨機化）：** 不要讓團隊自己選裝不裝。**你來隨機指定**——丟硬幣，正面這批 App 裝 SDK，反面那批不裝。一旦是隨機分的，「團隊認真程度」這個混淆變因，在兩組之間會被**平均掉**：認真的團隊和混水摸魚的團隊，在裝 SDK 組和不裝組裡的比例會大致一樣。不只「團隊認真程度」，**所有你想得到和想不到的混淆變因，全部一起被平均掉**。這就是隨機化的魔法，也是 ch05 說它被低估的原因：\n\n```text\n隨機化為什麼能切斷「所有」混淆變因（包括你沒想到的）\n\n  觀察法（誰自己選裝 SDK）：\n    認真團隊 ─────────► 多半裝 SDK   ─┐\n    混水團隊 ─────────► 多半不裝      ├─ 兩組「認真度」失衡\n                                      │   → 留存率差，分不清是\n                                      │     SDK 還是認真度造成的\n                                     ─┘\n\n  隨機法（丟硬幣決定誰裝）：\n    認真團隊 ─┬─► 一半裝 SDK         ─┐\n              └─► 一半不裝            │\n    混水團隊 ─┬─► 一半裝 SDK         ├─ 兩組「認真度」平均相同\n              └─► 一半不裝            │   → 留存率若仍有差，\n                                      │     只剩 SDK 一個可能的解釋\n                                     ─┘\n\n  關鍵差別：隨機化不需要你「知道」混淆變因是什麼。\n            它把已知的、未知的、你做夢都想不到的混淆，\n            一起在兩組之間平均掉。這是它無可取代的地方。\n```\n\n我認為這是整本書最該停下來想十分鐘的一頁之一。觀察法只能擋你想得到的鬼，隨機化把所有鬼一起擋掉——**包括那些你這輩子都不會想到的鬼**。這就是為什麼隨機對照試驗（RCT）被當成因果證據的金標準，也是為什麼你的 A/B test（隨機分流使用者）比「上線後看指標有沒有動」（沒分流，全是混淆）強一個數量級。\n\n順帶埋一個 ch07 的線：隨機化不是說做完一次就保證兩組完全一樣。樣本小的時候，運氣不好，硬幣可能把認真團隊大多分到一邊去。隨機化保證的是「**平均而言**平衡」和「失衡的程度可以被機率量化」——而「怎麼量化這個機率」是《馴服隨機》的活兒（見《馴服隨機》談隨機變數與獨立的那章），本書不展開，只用結論。\n\n## Bradford Hill：當你不能做 RCT 時，怎麼小心地往因果靠\n\n說了半天隨機化最強，但你心裡清楚——**很多時候你根本不能做 RCT**。\n\n你不能為了證明「抽菸致癌」，隨機指定一萬個人去抽三十年菸（不道德）。你不能為了證明「某個架構決策拖垮了系統」，把生產環境隨機分一半去跑爛架構（不可能）。塞麥爾維斯也沒辦法真的設計一個乾淨的 RCT——他手上是一個已經在運轉的醫院。\n\n那當沒有 RCT、只有觀察相關時，怎麼**負責任地**評估「這個相關有多可能是因果」？1965 年，統計學家布拉德福・希爾（Austin Bradford Hill）在一場演講裡給了一套思考框架，後世通稱「希爾判準（Bradford Hill criteria）」。\n\n這裡要立刻誠實標一件事，因為它常被講錯（2026-06，已查證）：**希爾本人不叫它們「判準（criteria）」，他叫「視角（viewpoints）」**——「我們在喊因果之前，應該從這九個視角去審視一個關聯」。他還明白說過：這九個視角**沒有一個能單獨提供無可爭辯的因果證據，也沒有一個是必要條件**。所以把它們當成一張「打勾就算因果」的檢查表，是對它最常見的誤用。它們是「**讓因果更可信或更可疑的思考角度**」，不是判決書。\n\n九個視角我不全展開（完整清單留給延伸閱讀），挑工程師最用得上、塞麥爾維斯案最相關的三個：\n\n```text\nBradford Hill 三個最有用的視角（不是清單，是思考角度）\n\n  ① 時序（temporality）—— 唯一接近「必要」的一條\n     因必須在果之前。X 若在 Y 之後才發生，X 不可能是 Y 的因。\n     工程版：你說「上了快取所以錯誤率降」，先確認——\n             錯誤率是「上快取之後」才降的，\n             還是上之前就已經在降了？（很多「效果」是上線前就開始的趨勢）\n\n  ② 劑量反應（biological gradient / dose-response）\n     劑量越大、效果越強，因果可信度提高。\n     工程版：把快取命中率從 50% 拉到 90%，錯誤率降得更多嗎？\n             如果「給多給少效果一樣」，反而可疑（像是別的東西在作用）。\n\n  ③ 可逆／實驗（experiment）\n     拿掉因，果跟著消失，因果可信度大增。\n     工程版：把快取關掉，錯誤率彈回去嗎？\n             這是你能做的最接近「介入」的檢查——\n             它正是 ch05 對照實驗的精神：能開能關才好歸因。\n```\n\n注意這三個視角的共通點：它們都在**降低混淆變因的嫌疑**，但沒有一個能像隨機化那樣**徹底切斷**它。時序對了，混淆變因可能也滿足時序（氣溫確實在冰淇淋和溺水之前升高）；劑量反應有了，混淆變因也可能呈現劑量關係。希爾自己最清楚這點——這就是他堅持叫「視角」不叫「判準」的原因。**它們提高可信度，不提供保證。** 工程師該記住的一句話：當你不能隨機分流時，Bradford Hill 是你退而求其次的盡責清單，但「盡責」不等於「確定」。\n\n## 脊椎透鏡：塞麥爾維斯怎麼把相關論證成因果\n\n現在換上本章的透鏡，重看脊椎的塞麥爾維斯案（這是全書貫穿的 1847 年維也納洗手案，現在換「因果 vs 相關」透鏡看）。\n\n塞麥爾維斯手上有一個扎實的**相關**：頒布氯化石灰洗手令之後，第一病房的產褥熱死亡率劇降（誠實的對照數字見下）。但「洗手之後死亡率降了」是相關。他憑什麼說是「洗手**導致**死亡率降」，而不是某個混淆變因？\n\n先把誠實的數字擺出來，因為這本身就是本章該守的紀律（死亡率數字以全書基準為準，兩套表述別混用）：\n\n```text\n塞麥爾維斯案的誠實對照（別用挑選過的數字誇大效果）\n\n  最乾淨的對照（同院同期兩病房，每千人版，1840–46 平均）：\n    第一病房（醫師、醫學生接生）   98.4‰\n    第二病房（助產士接生）         36.2‰   ← 約 2.7 倍差\n    兩病房病人按「單雙日交替」分配 ≈ 天然的準隨機分組\n\n  介入前後（全年 vs 全年，百分比版）：\n    1846 第一病房全年   約 13%\n    1848 第一病房全年
