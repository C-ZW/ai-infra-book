<script id="bookdata" type="application/json">{"chapters": [{"id": "ch01-same-blueprint", "file": "ch01-same-blueprint.md", "group": "Part I — 共通底層（同一張藍圖）", "title": "ch01 — 同一張藍圖：架構不是護城河", "md": "# ch01 — 同一張藍圖：架構不是護城河\n\n> **本章解決什麼問題**：這是全書的序章，也是 Part I 的第一章。它要建立全書第一個、也是最反直覺的事實——做大模型的「食譜」是一篇 2017 年的公開論文，八家頂尖實驗室全站在同一張藍圖上，菜色卻天差地遠。本章把這個謎題擺上桌、發給你一張全書地圖，並先點出「差異不在架構、而在架構之外」這個貫穿全書的命題。至於「架構之外」具體是哪五件事，留到 ch03 才展開；本章只負責讓你相信「藍圖真的是共用的」。\n\n```text\nPart I  共通底層（同一張藍圖） ◄你在這裡\n  ch01 同一張藍圖：架構不是護城河（序＋全書地圖）\n  ch02 模型是養出來的，不是寫出來的\n  ch03 五變數記分卡：差異的成因框架\n  ch04 「誰最強」是測不準的：評測政治學\n        |\n        v  拿著五變數這把尺，逐家拆解\nPart II 八家深入（一家一章；以什麼著稱 → 為什麼是這家）\n  ch05 OpenAI      ch06 Google      ch07 Anthropic   ch08 Meta\n  ch09 Mistral     ch10 xAI         ch11 DeepSeek    ch12 Qwen\n        |\n        v  把八家放一起，看差異的橫切面\nPart III 跨家主題（差異的橫切面）\n  ch13 開源 vs 閉源：兩種世界觀\n  ch14 推理模型競賽：o1 之後的範式轉移\n  ch15 對齊方法演化：RLHF → Constitutional AI → RLVR\n  ch16 算力軍備競賽：GPU、TPU、自研晶片\n  ch17 多模態：文字之外的戰場\n  ch18 資料暗河：版權、合成資料與資料牆\n  ch19 我們造出看不懂的東西：可解釋性與安全\n        |\n        v  收束\nPart IV 收束\n  ch20 為什麼差異會持續、也會收斂\n  ch21 同一張藍圖，八種風格（總收官，五變數總帳）\n```\n\n這張圖你會在每個 Part 的第一章再看到一次，箭頭走的方向就是本書的閱讀順序。現在你在最上面那一格。讀完全書回頭看 ch21，每一格你都會走過一遍。\n\n## 從你已知的出發\n\n你帶過一個 greenfield 的微服務系統，跑在 AWS ECS 上、TypeScript ＋ NestJS，整個團隊共用你定下的那套腳手架——同一個 K8s、同一朵雲、同一份 CI、同一個你自己寫的多層 cache library。照理說，底層這麼一致，跑出來的服務行為應該也差不多吧？\n\n但你心裡很清楚，完全不是這樣。同樣一套 K8s，你的結算 pipeline（CronJob → SQS → 冪等消費者）跑得穩如老狗，因為你餵給它的是可控的批次流量、設好了 backpressure；隔壁某個面向使用者的服務卻三天兩頭被 HPA 來回拉，因為它吃的是尖峰時段暴衝的即時請求。同樣一台 RDS，有人把它調到尖峰 CPU 降 40%，有人讓它在一個沒打 index 的查詢上躺平。**決定差異的從來不是 K8s 本身**——是你怎麼配它、餵它什麼流量、團隊用什麼紀律去運維它。K8s 只是那張共用的藍圖；真正分出高下的，全在藍圖之外。\n\n這本書要講的，就是這件事的放大版。把「K8s」換成「Transformer」，把「你的團隊」換成「八家頂尖 AI 實驗室」——故事的結構一模一樣。所有前沿大模型底層都是同一張架構藍圖，可是 OpenAI、Google、Anthropic、Meta、Mistral、xAI、DeepSeek、Qwen 養出來的模型，強項天差地遠。為什麼？答案不在藍圖裡。\n\n## 食譜是公開的：一篇 2017 年的論文\n\n先把那張「藍圖」是什麼講清楚。\n\n2017 年 6 月，Google 八位作者發表了一篇叫〈Attention Is All You Need〉的論文（Vaswani et al., arXiv:1706.03762），提出了 **Transformer** 這個神經網路架構。它的核心機制叫 **self-attention（自注意力）**——你讀過自己書架上那本《從後端到 AI Infra》，對它不陌生：在推論期，每個 token 都去「看」序列裡其他所有 token，算出該關注誰、關注多少；KV cache、prefill/decode 那一整套你已經熟的推論機制，都是圍著這個 attention 機制長出來的。這裡不重講數學，你只要喚醒一個直覺就夠：attention 就是讓模型在生成下一個字時，能回頭參考前面所有內容、並決定哪些更重要。\n\n這篇論文有兩個你必須先吞下去的事實：\n\n第一，**它是公開的**。它掛在 arXiv 上，任何人都能免費下載、逐行讀懂、照著實作。它是電腦科學史上被引用最多的論文之一（不同資料庫統計從數萬到十六萬次不等，截至 2026-06），意思是全世界做這件事的人，全部讀過同一張食譜。沒有專利鎖住它、沒有商業機密藏著它——做大模型的核心配方，攤在陽光下八年了。\n\n第二，**八家都站在它上面**。截至 2026-06，所有前沿大模型——GPT、Gemini、Claude、Llama、Mistral、Grok、DeepSeek、Qwen——本質上都是同一種東西：**decoder-only Transformer ＋ self-attention**，用自迴歸的方式一個 token 一個 token 往下預測（landscape §A）。這裡點清一個常被講錯的細節：2017 那篇論文提出的**原始** Transformer 其實是「encoder-decoder（編碼器—解碼器）」兩半邊、為機器翻譯設計的；是**後來**整個產業才收斂到只留「解碼器」那半邊、專門做生成——這才是「decoder-only」的意思。所以共用的不是論文裡那個一模一樣的模型，而是它的核心積木（self-attention）加上「只留解碼器來生成」這個後來形成的共識。底層範式高度共用，這一點非常穩固，不是巧合，是整個產業都收斂到了同一個最有效的設計。\n\n換句話說：**食譜公開、人人照抄、底層大同小異。** 這就是本書要解的謎題的前半句。後半句是——那為什麼菜色差這麼多？\n\n## 那為什麼還是大同？工程變體只是配料微調\n\n你可能會反駁：等等，各家模型架構真的「一模一樣」嗎？我聽過 GQA、MLA、RoPE、MoE 這些名詞啊。\n\n問得好，而這正是要先釐清的地方。各家確實在藍圖上加了自己的**工程變體**，但這些是「同一道菜的不同配料微調」，不是「換了一張藍圖」。一句話各帶過（細節留到 ch16 與各家章）：\n\n- **RoPE**（Rotary Position Embedding，旋轉位置編碼）——告訴模型每個 token 在序列裡的位置，幾乎人人都用（Llama、Qwen、Mistral…）。\n- **GQA**（Grouped-Query Attention，分組查詢注意力）——讓多個查詢頭共用 KV，砍小 KV cache、加快推論，是 2025 年以來的預設效率招（landscape §A）。\n- **MLA**（Multi-head Latent Attention，多頭潛在注意力）——把 KV 壓進低維潛在空間，KV cache 砍得更兇，是 DeepSeek 的招牌（→ ch11）。\n- **MoE**（Mixture-of-Experts，混合專家）——把前饋層拆成很多「專家」子網路，每個 token 只走幾個，總參數巨大、實際算的很少；DeepSeek、Mistral、Qwen、Llama 4 等愛用（→ ch16）。\n\n看出共同點了嗎？這四個變體全部都在做**同一件事的不同版本**——在不換掉 attention 這個核心的前提下，省記憶體、省算力、把模型撐更大。它們是同一張藍圖上的最佳化選項，就像你的 cache library 可以選 Redis 或記憶體做 L2、可以調 TTL 策略，但「多層快取」這個架構沒變。**換配料不換菜系。** 一個 2026 年的前沿模型，大致就是「decoder-only Transformer ＋ RoPE ＋（GQA 或 MLA）＋（通常加）MoE」（landscape §A）——把它拆開，八家的零件清單高度重疊。\n\n所以結論很硬：**架構不是護城河。** 你能讀到的、能抄到的、能在週末照著刻一個小版本出來的東西，按定義就不可能是別人領先的祕密。真正的差異，記在別的帳上。\n\n## 差異在架構之外：全書的命題\n\n這就帶出本書從頭貫穿到尾的核心主張，先在這裡立下、ch21 收官驗收：\n\n**架構不是護城河；模型是「養」出來的，不是「寫」出來的；同一張藍圖、不同養法，養出不同風格。**\n\n「養」這個字是全書的核心隱喻，值得你記住。傳統寫程式——比如你那個 cache library——是你逐條規定行為：遇到這個 key 就查 L1、過期就回源、序列化照這個規則。每一行都是你寫死的。但大模型不是這樣造出來的：沒有任何人逐行規定「遇到使用者問 X 就回 Y」。各家做的事，比較像你在設計一個成長環境——餵它什麼資料、用什麼目標去最佳化它、給它多少算力——然後能力是從這個環境裡**長出來的產物**。同一張藍圖，配上不同的養成環境，長出來的「性格」就天差地遠。這個「養 vs 寫」的本質差異，ch02 會講透。\n\n那「養法」具體是哪些事？本書把它拆成**五個變數**：**資料、後訓練·對齊、算力·基礎設施、研究文化·品味、產品取向**。這五格是全書的記分卡，每一章都會回收它來歸因。但**這裡不展開**——五變數怎麼定義、怎麼用，是 ch03 的工作。現在你只要先收下這個承諾：差異的成因是可以拆解的，而且只要五個格子就裝得下。後面從 ch05 到 ch12 的八家拆解，全是拿這把尺去量「為什麼是這家」。\n\n## 成因拆解\n\n本書每一章末尾都有這個招牌段落，用 ch03 的五變數記分卡，把本章現象歸因到哪幾格。本章的「現象」比較特別——它是一個**元層次**的問題：為什麼架構公開了八年，領先卻還是難被立刻抄走？我們就拿這個問題試跑一次記分卡（五格的正式定義在 ch03，這裡先示範它怎麼用）。\n\n### (a) 五格歸因\n\n| 變數 | 主/次因 | 為什麼 |\n|---|---|---|\n| 資料 | ✓ 主因 | 藍圖公開、論文人人能讀，但**餵什麼資料**是各家最不公開的祕密；你抄得到架構，抄不到對方那幾兆 token 的配比與來源（→ ch18）。 |\n| 後訓練·對齊 | ✓ 主因 | 同一個預訓練底，用不同的後訓練（SFT/RLHF/RLAIF/RLVR）能養出完全不同的性格與能力，而這套 know-how 多半沒寫進論文（→ ch15）。 |\n| 算力·基礎設施 | ✓ 主因 | 知道食譜不等於做得起。把藍圖跑到前沿規模，需要的叢集、自研晶片、訓練工程成熟度，是要花數年與數百億砸出來的硬資產（→ ch16）。 |\n| 研究文化·品味 | △ 次因 | 押哪個方向、用什麼紀律迭代——這是最難被抄走的一格，但它的影響要到逐家拆解時才看得清，本章先記一筆。 |\n| 產品取向 | △ 次因 | 模型被養成什麼形狀，常被它要服務的產品壓出來；本章只點到，Part II 各家章才展開。 |\n\n歸因的結論一句話：**架構之所以不是護城河，正因為護城河在「資料 × 後訓練 × 算力」這三格——而這三格的內容，恰恰是論文裡讀不到、也不可能在週末抄出來的東西。** 公開的是骨架，沒公開的是養法。\n\n### (b) 影子\n\n但「架構不是護城河」這句話本身也有它的影子，你不能照單全收。\n\n第一，**藍圖共用是雙面刃**。它讓後發者能站在同一個起點上追趕——這正是 DeepSeek、xAI 這些後來者能在幾年內逼近前沿的結構性原因（→ ch10、ch11）。共用藍圖既保護不了領先者，也意味著沒有人能用「我有祕密架構」來一勞永逸地甩開對手。護城河必須一直靠資料、算力、品味去**重新挖**，不能躺著收租。\n\n第二，**「架構不重要」是過度簡化**。架構不是護城河，不等於架構不重要。MLA 讓 DeepSeek 的推論成本大降、MoE 讓巨大模型變得跑得起——這些變體實實在在地改變了「什麼模型做得起、做得便宜」。準確的講法是：架構是**人人拿得到的公共財**，不是某一家的**私有護城河**；它重要，但它不是差異的來源。\n\n### (c) 何時不成立\n\n這個判斷在什麼情況下會被打臉？\n\n- **若哪天冒出一個非 Transformer 的新範式**並真的勝出（近年 Mamba/狀態空間模型等就在嘗試挑戰，截至 2026-06 仍未撼動 Transformer 在前沿的地位），那「同一張藍圖」這個前提就得改寫——本書的這個基準是 **2026-06 的快照，不是定律**。\n- **在某些窄領域**，一個架構或訓練法的創新確實可能短暫地成為護城河——直到它被別家讀懂、複製。差異在這裡會「先擴大、再收斂」，這個動態 ch20 會專門講。\n- 所以本章的命題請這樣記：**截至 2026-06，前沿模型共用 decoder-only Transformer 藍圖，差異主要不在架構**——而不是「架構永遠不重要」這種無時效的斷言。\n\n## 紙上推演\n\n純敘事科普書，沒有可執行的 lab；這裡是「動手想」。每題標了預估時間與難度，做完馬上看解答。\n\n### 推演題1\n\n**[10 分鐘] ★** 用你自己的話，向另一個工程師解釋：為什麼〈Attention Is All You Need〉這篇論文公開了八年、人人都讀過，OpenAI 或 Google 的領先卻沒有因此被立刻抄走？盡量不要用「他們資料好」這種一句話帶過，至少講出兩條具體的理由。\n\n#### 推演解答\n\n關鍵在於分清楚「公開的是什麼、沒公開的是什麼」。論文公開的是**架構藍圖**——self-attention 怎麼算、Transformer 怎麼疊。但一個前沿模型的能力，是藍圖**加上**三件論文裡沒有的東西長出來的：\n\n1. **資料抄不到**。論文不會告訴你 OpenAI 餵了哪幾兆 token、怎麼配比、怎麼清洗、哪些是專有或合成資料。這是各家守得最緊的祕密（→ ch18）。同一張藍圖，餵不同的世界，長出不同的模型。\n2. **算力抄不到**。就算你拿到完整食譜，把它跑到前沿規模需要的叢集、互連、自研晶片、訓練工程成熟度，是數年與數百億美金的硬資產（→ ch16）。「知道怎麼做」和「做得起」之間隔著一座資料中心。\n3. **後訓練 know-how 抄不到**。同一個預訓練底，用不同的對齊與後訓練手法，會養出完全不同的性格（→ ch15），而這套手藝多半沒寫進論文。\n\n常見誤解：以為「架構公開 ＝ 技術沒有壁壘」。剛好相反——正因為架構這一塊變成了人人拿得到的公共財，競爭的重心就被推到了**架構之外**那三格更難抄的東西上。公開藍圖不是消滅了護城河，是把護城河搬了家。\n\n### 推演題2\n\n**[15 分鐘] ★★** 對帳題。把你維運系統的經驗對應到本章的命題：你的團隊共用同一套 K8s／同一個 cache library，跑出來的服務行為卻天差地遠。請列出「決定差異的真正因素」，再把它們一一對應到本章「藍圖 vs 養法」的分野，說說這個類比在哪裡很貼、在哪裡會破。\n\n#### 推演解答\n\n**很貼的地方**：K8s／cache library ＝ 共用藍圖（架構），它本身不決定差異；真正分高下的是「你怎麼配、餵什麼流量、團隊怎麼運維」——這精準對應到模型的「養法」。同一套 K8s，結算 pipeline 穩、即時服務抖，差異全在配置與流量（≈ 資料）、在 backpressure/HPA 怎麼設（≈ 後訓練的調教）、在叢集規模（≈ 算力）。連「護城河必須一直重新挖、不能躺著收租」這點都對得上：採用同一套腳手架，不保證你的服務就比別人穩。\n\n**會破的地方**：你的 K8s 行為是你**寫死的配置**——改一行 YAML，行為立刻照你說的變。模型不是這樣，它的能力是**養出來的、不是寫死的**：你設好環境（資料、目標、算力），能力自己長出來，沒有一個對應「改一行 YAML 就改一個行為」的旋鈕。這就是 ch02 要講的「養 vs 寫」的本質差異——類比到這裡就該換擋了。能說清楚「類比在哪裡破」，代表你真的懂了，而不是只記住一個比喻。\n\n## 自我檢核\n\n講得出來才算過，講不清楚就是還沒懂。優先練「為什麼」。\n\n1. 「架構不是護城河」這句話，你能不能用一句話講清楚它**為什麼**成立？護城河到底搬到了哪三格？\n2. 〈Attention Is All You Need〉是哪一年的論文？「它是公開的」這件事，為什麼是本書整個謎題的起點？\n3. 八家前沿模型在架構上的共同點是什麼？（提示：decoder-only Transformer ＋ 什麼機制）\n4. GQA、MLA、RoPE、MoE 這四個變體，為什麼說它們是「換配料不換菜系」、而不是「換了一張藍圖」？\n5. 如果有人跟你說「架構公開了，所以做大模型沒有技術壁壘」，你會怎麼反駁？\n6. 本書說模型是「養」出來的、不是「寫」出來的——這跟你寫 cache library 的方式，本質差在哪裡？\n7. 「架構不重要」和「架構不是護城河」——這兩句話差在哪？為什麼第一句是錯的、第二句才對？\n8. 本章的命題在什麼情況下會被打臉？為什麼說它是「2026-06 的快照、不是定律」？\n\n## 延伸閱讀\n\n- **〈Attention Is All You Need〉**（Vaswani et al., 2017，arXiv:1706.03762）：https://arxiv.org/abs/1706.03762 — 全書那張「藍圖」的本尊。不必逐行讀懂數學，讀摘要與圖 1 即可，重點是親眼確認「這真的是一篇任何人都能下載的公開論文」。\n- **維基百科〈Attention Is All You Need〉**：https://en.wikipedia.org/wiki/Attention_Is_All_You_Need — 想快速掌握這篇論文的歷史地位、八位作者、後續影響，從這裡入手比讀原文輕鬆。\n- **你書架上的《從後端到 AI Infra》**：談 KV cache、prefill/decode 的那幾章 — 本章只一句話喚醒了 attention 的推論期機制；想把「為什麼 GQA/MLA 能省 KV cache」這條算到底，回去翻那本書的推論成本章節。\n"}, {"id": "ch02-grown-not-written", "file": "ch02-grown-not-written.md", "group": "Part I — 共通底層（同一張藍圖）", "title": "ch02 — 模型是養出來的，不是寫出來的", "md": "# ch02 — 模型是養出來的，不是寫出來的\n\n> **本章解決什麼問題**：上一章我們同意藍圖是公開的、各家共用的——可是這就更怪了：如果沒有人「寫」出模型的能力，那能力到底是從哪冒出來的？本章回答全書最反直覺的那一條主張的前半段：模型不是被「寫」出來的，是被「養」出來的。你不逐行規定它「遇到 X 就回 Y」，你設好一個成長環境（資料、一個簡單到不可思議的最佳化目標、算力），能力是長出來的副產品。更驚人的是，這件事不全靠運氣——一條叫 scaling law 的趨勢線，讓你能「先畫線、再決定砸多少錢」。這章還沒進到各家差異（那要等 ch03 的五變數記分卡），但它鋪好底：差異既然不在藍圖，就只能在「怎麼養」，而「養」這個動詞，本章把它講成一門近乎可預測的科學。\n\n## 從你已知的出發\n\n你寫過一個被全團隊採用的多層 cache library。回想你是怎麼寫它的：你**逐條**規定了它的行為。`get` 進來，先查 L1，miss 就查 L2，再 miss 就回源；TTL 到了就過期；寫入時要不要 write-through、要不要 invalidate 上游——每一條都是你坐在那裡，想清楚一個 case、寫一行 if、補一個測試。整個 library 的行為，是你**腦子裡先有規則，再把規則翻成程式碼**。沒有任何一個分支是「它自己長出來的」。你能對著任何一行問「這行為什麼會這樣」，答案永遠是「因為第 N 行的 if」。\n\n這就是「寫程式」的本質：**行為先存在於你腦中，程式碼只是把它記下來。** 你是規則的作者，機器是規則的執行者。\n\n現在請你切換到另一個你也很熟的東西：你給 ECS 微服務掛的那組 HPA autoscaling。你**沒有**寫「早上九點起三個 pod、流量到五千就再起兩個、週五晚上先預熱」這種逐條規則——你要是真這樣寫，那叫排程，不叫 autoscaling，而且永遠追不上真實流量。你做的是另一件事：你設一個**指標**（CPU 70%、或 p95 latency、或 SQS queue depth），設一個**目標值**，然後**放手**。什麼時候該起 pod、起幾個、何時縮回去——這個行為**不是你寫的，是從「指標 vs 目標」這個迴圈裡長出來的**。你規定的不是行為，是「行為要往哪個方向被推」。\n\n把這個差別放到最大，就是本章的全部。傳統程式 = cache library = 逐條規則 = 行為先在你腦中。訓練一個模型 = 比較像 autoscaling，但更極端：你連「指標是什麼」都只給了一個荒謬地簡單的東西（下一個字猜得準不準），剩下的——文法、推理、翻譯、寫程式的能力——**全部是從那個迴圈裡長出來的，沒有一條是誰寫的**。你不是作者，你是**飼主**：你佈置環境、給食物、設一個成長壓力，然後看它長成什麼樣。\n\n你直覺會立刻反抗：autoscaling 我至少知道它**為什麼**在這一刻起 pod（因為 CPU 過 70%），可是模型為什麼「看到一段中文就會翻成英文」，沒有人答得出對應的那行 if。對。這正是「養」跟「寫」最深的裂縫，也是為什麼後面有一整章（ch19）在講「我們造出了連造它的人都看不懂的東西」。先把這個不安記著——本章接下來要先讓你相信：這種「沒人寫卻長出來」的事，居然是可以預測、甚至可以**先估價**的。\n\n## 一個荒謬到不像在教智慧的訓練目標\n\n先講清楚 pretraining（預訓練）到底在幹嘛，因為它簡單到你會懷疑自己聽錯。\n\n拿海量的文字——網頁、書、程式碼、論文，幾兆個 token（你的推論書教過 token 是什麼，這裡直接用）。訓練做的事只有一件：**遮住下一個字，叫模型猜，猜錯了就把權重往「下次比較不會錯」的方向推一點點，然後換下一個字，重複幾兆次。** 就這樣。沒有了。\n\n> 句子：「台北是台灣的____」\n> 模型猜：「首都」機率 0.6、「城市」0.2、「香蕉」0.0001…\n> 正確答案是「首都」→ 把權重朝「下次更敢猜首都」推一格。\n> 換下一個字。再換。再換。幾兆次。\n\n這個目標有個名字叫「預測下一個 token」，它的數學長相（一個叫 loss 的數字、怎麼把錯誤傳回去調權重）本章一律不碰——對「養 vs 寫」這個判斷，你只需要記住**目標荒謬地單一**：把下一個字猜得更準。如此而已。\n\n關鍵的驚嘆點在這裡：**沒有人在這套流程裡寫過任何一條關於「能力」的規則。** 沒有人寫「學會文法」、沒有人寫「遇到問句要回答」、沒有人寫「中文對應英文是這樣翻」、更沒有人寫「會解二元一次方程式」。整個訓練過程從頭到尾只有一句話——「猜下一個字」。可是當你把這件蠢事重複幾兆次、在夠多的資料、夠大的模型上做，**文法、翻譯、推理、寫程式這些能力會自己冒出來**，作為「想把下一個字猜更準」這個壓力的副產品。\n\n為什麼會這樣？直覺上：要在所有情境下都把下一個字猜準，你**被迫**得學會背後的結構。要猜對「8 乘以 7 等於__」的下一個字，光背是不夠的（乘法表組合太多），猜得準的最省力方法就是**真的學會乘法**。要猜對一段 Python 的下一個 token，你被迫得學會語法、縮排、變數作用域。要猜對一篇推理文章的下一句，你被迫得抓到論證的走向。**「把下一個字猜準」這個壓力，會把學會背後的規律當成達成它的手段逼出來。** 能力不是目標，是達成那個蠢目標的副作用。\n\n這就是「養」的字面意思。你沒有寫下任何一條能力，你只是設了一個成長壓力（猜準下一個字）＋一個成長環境（海量資料）＋足夠的算力，然後能力**長**了出來。你回頭問「它為什麼會翻譯」，沒有對應的那行 if——只有「因為在『猜準下一個字』的壓力下，學會翻譯比不學會更省力」。這跟你問 autoscaling「為什麼這刻起 pod」可以指到 CPU 70% 那行，是**根本不同**的因果——後者有作者，前者沒有。\n\n## 那為什麼這是科學，不是煉金術\n\n到這裡你大概覺得：聽起來很像碰運氣。餵資料、設壓力、放手、祈禱長出能力——這跟煉金術有什麼兩樣？你要怎麼**事先**知道砸幾億美金下去，會長出有用的東西，而不是一坨昂貴的亂碼？\n\n這就是 scaling law（縮放定律）登場的地方，也是這件事從煉金術變成工程的轉折點。\n\n2020 年，OpenAI 的 Kaplan 等人發表〈Scaling Laws for Neural Language Models〉（arXiv:2001.08361，2020-01，✅）。他們做的事，用你的語言講，像是一次超大規模的**負載測試掃描**：固定其他條件，只變模型大小，記下「猜下一個字錯多少」；再只變資料量，記一次；再只變算力，記一次。然後他們發現了一件漂亮到不像真的事——**模型猜錯的程度，沿著一條極其平滑的曲線，隨著「模型多大、資料多少、算力多少」可預測地下降**。不是噪音、不是時好時壞，是一條跨越**七個數量級**都成立的平滑趨勢線（這條曲線在數學上叫 power law／冪律，但你不需要那個式子，只要記得「**一條平滑、可外推的下降線**」）。\n\n你做效能工程時最愛、最信任的就是這種圖：x 軸是投入、y 軸是某個指標，點連成一條乾淨的線。你看到這種線會本能地想做一件事——**外推**。你壓測到 5,000 RPS 看到 p95 是這條線，你敢估 8,000 RPS 大概落在哪，因為線很乾淨。Kaplan 那條線給了整個產業同樣的能力，但賭注大了幾個數量級：**你可以先在小模型上把這條線畫出來，然後外推去預測「如果我砸 100 倍算力，猜錯程度會掉到多少」——而且在花那筆錢之前就預測。**\n\n這就是本章最該被你記住的那個瘋狂之處。在大部分工程裡，「投入越多越好」是句廢話、是直覺；但 scaling law 把它變成了**一條有斜率、可外推、能事先估價的曲線**。它讓一句原本只能拍腦袋的話——「我們再大十倍會更強嗎？」——變成可以**先畫趨勢線、再決定砸多少錢**的決策。各家 AI lab 在花掉那筆天文數字的訓練費之前，手上是有一張外推圖的。這不保證萬無一失（曲線會在某些地方彎、某些能力不沿著它走），但它把「養模型」從拜拜變成了一門**有預測力**的學問。「智慧能不能用錢買到」這個問題，第一次有了一條可以指著看的線。\n\n> ⚠️ 一個誠實的但書要先放這：這條線量的是「下一個字猜得多準」（loss），它平滑下降**不直接等於**「模型有多聰明、多有用」。從「loss 掉了 0.1」到「它變得會寫能跑的程式」中間還有一段不那麼線性、不那麼保證的轉換——有些能力是到了某個規模才「啪」地出現（這類現象本身有爭議，這裡不展開）。所以 scaling law 給的是**強烈的方向感與估價能力**，不是「砸錢必得對應智慧」的收據。把它當羅盤，不是當提款機。\n\n## Chinchilla：一個把整個產業掉頭的修正\n\nKaplan 那條線太成功了，成功到它順手夾帶了一個結論，而那個結論**錯了一半**——這就是本章要講透的成因個案。\n\nKaplan 2020 的線除了「越大越好」，還推出一個更具體的處方：給定一筆固定的算力預算，最划算的花法是**把模型做得非常大，但資料餵得相對少，而且不要訓練到收斂就停**。翻成白話：**錢優先砸在參數上，資料是配角。** 這個處方直接塑形了那個年代的旗艦——GPT-3 就是這個哲學的產物，把參數衝到 175B，但相對而言資料餵得並不算多。整個產業一度信奉一句口號：**光把參數做大就對了。**\n\n2022 年，DeepMind 的 Hoffmann 等人發表了〈Training Compute-Optimal Large Language Models〉，世稱 **Chinchilla** 論文（NeurIPS 2022，✅）。他們沒有靠嘴砲，而是訓練了 **400 多個**不同大小的模型（從 44M 到 16B 參數）來重畫這條線，結果發現 Kaplan 的處方**嚴重低估了資料的份量**。真正 compute-optimal（在固定算力下最划算）的做法不是「參數做大、資料配角」，而是——\n\n**參數和資料要等比例一起放大。模型大一倍，餵的 token 也要大一倍。** 他們算出的那個黃金比例，是本章你唯一需要記的數字：**大約每 1 個參數配 20 個 token**（截至 2026-06，這仍是引用 Chinchilla 時的標準比例，✅）。\n\n然後他們用一個實驗把刀子捅進去證明。他們訓練了一個 **70B 參數**的模型（取名 Chinchilla），餵 **1.4 兆 token**（剛好約 20:1），用的算力跟 DeepMind 自家先前那個 **280B 參數**的巨獸 Gopher **一模一樣**——Gopher 大了四倍，卻只餵了約 300B token（嚴重「餵不飽」）。結果：**小四倍但餵飽的 Chinchilla，在一大票任務上打贏了大四倍但餓著的 Gopher。**\n\n讀懂這一拳的力道：在**完全相同的算力預算**下，一個只有對手四分之一參數的模型贏了。這直接打臉「光把參數做大」——原來那些超大模型不是不夠大，是**餓著**；同一筆錢，與其全砸在參數上養一頭餵不飽的巨獸，不如做小一點、把省下的錢拿去**多餵資料**。整個產業的「該砸哪」瞬間掉頭：從「拚參數量」轉向「參數與資料等比放大」，一個時代的軍備競賽換了跑道。\n\n這個個案完美示範了「養」這件事的科學性格：模型強不強，**不是由你寫了多少規則決定的**（你一條都沒寫），是由你怎麼**配置成長條件**決定的——而 Chinchilla 證明了連「成長條件怎麼配最划算」都是可以拿 400 個實驗測出規律、然後照著辦的。這不是煉金術。煉金術沒辦法靠 400 次對照實驗逼出一個「20:1」的數字，然後拿它去贏一個大你四倍的對手。\n\n## 但「20:1」不是各家真的在做的事\n\n如果你以為各家從此都乖乖照 20:1 養模型，那你又被一句漂亮話騙了——這是本章留給你的最後一道防破綻訓練。\n\nChinchilla 的 20:1 是**「訓練最划算」**（compute-optimal **for training**）的比例。但 AI lab 不是訓練完就把模型供起來——他們要拿它去**服務幾十億次推論請求**。而你的推論書早就把這條算到底了：服務階段的成本，主要由模型**多大**決定（參數越多，每次 forward、每個 token 的算力與記憶體越貴，KV cache 也越胖）。也就是說：\n\n- **訓練成本**偏好「參數小一點、多餵資料」（Chinchilla 的處方）。\n- **推論成本**偏好「參數越小越好」，因為你要為這個大小付**幾十億次**的帳。\n\n於是真實世界出現一個 Chinchilla 沒算進去的誘因：**故意把一個比較小的模型「餵過頭」（overtraining），遠遠超過 20:1。** 你多花一點訓練錢，把一個小模型硬餵到比 compute-optimal 多好幾倍的資料，換來的是它在**之後幾十億次推論**裡都更小、更便宜、更快。一次性的訓練多花，攤到天文數字的推論次數上，超值。\n\n證據就擺在 landscape 裡（截至 2026-06，✅）：DeepSeek-V3 是 **671B 參數，餵了 14.8 兆 token**——大約 **22:1**？不，注意它是 MoE（稀疏專家），實際每個 token 只**激活** 37B 參數，用激活參數算，這個比例遠遠超過 20:1，是典型的「為了推論便宜而餵過頭」。各家服務級的模型幾乎都這樣：**Chinchilla 告訴你訓練怎麼花最划算，但沒人真的照它做，因為真正的帳單在推論那一側。**\n\n所以「20:1」這個漂亮數字的正確讀法是：它是**訓練最佳化**的答案，不是**產業實務**的答案。把它當成「各家都餵 20:1」，就跟把「DeepSeek 只花 560 萬美金」當成「養一個前沿模型只要 560 萬」（那個迷思留到 ch11 拆）一樣，是把一個**有前提的數字**抽掉前提到處用。記住這個讀法，你就比大部分轉述 scaling law 的人都更懂它在說什麼。\n\n## 成因拆解\n\n本章不是在拆「某一家為什麼強」，而是在拆一個更底層的問題：**為什麼「養」比「寫」更能長出能力**，以及 scaling law 揭露了「養」的什麼性格。但記分卡照用——看這五格在「養出能力」這件事裡各扮演什麼。\n\n### (a) 五格歸因：能力是從哪幾格的配置裡長出來的\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| **資料** | ✓ 主因 | 「猜下一個字」的壓力要逼出能力，全靠資料裡藏了多少結構可學。Chinchilla 的整個修正就是「資料被低估了」——資料是養分，餵不飽就長不大。 |\n| **後訓練·對齊** | （留白） | 本章只談 pretraining 這個「長身體」的階段；把這身能力磨成聽話好用的產品是後訓練的事（→ch15），本章不碰。 |\n| **算力·基礎設施** | ✓ 主因 | scaling law 的 x 軸就是算力。沒有足夠算力，趨勢線只能畫在小規模、外推不過去；「先畫線再砸錢」這件事本身就建立在你砸得起錢上（細節→ch16）。 |\n| **研究文化·品味** | △ 次因 | Kaplan 押「先把線畫出來」、Chinchilla 押「用 400 個模型重測比例」——這是研究品味。看不看得出「資料被低估了」、敢不敢花算力去測一條定律，是文化差異。 |\n| **產品取向** | △ 次因 | 「為什麼沒人照 20:1、反而 overtrain」的答案在這格：你要服務幾十億次推論，產品的推論成本壓力，反過來決定了你怎麼養（餵過頭換小模型）。 |\n\n一句話收束：**「養」之所以能長出能力，主因在「資料」配「算力」；而 scaling law 把這件事從碰運氣變成可外推、可估價的工程——這是研究品味（先畫線）＋產品壓力（推論成本逼出 overtrain）共同塑形的科學。**\n\n### (b) 影子：這套「可預測」的代價與盲點\n\nscaling law 給人一種危險的安全感：好像智慧可以用錢買、用線外推。但它的影子很硬。**第一，它量的是 loss（猜字準度），不是「聰明」或「有用」**——一個 loss 漂亮的模型可能照樣胡說八道、照樣不安全，從 loss 到能力的轉換不線性、不保證。**第二，外推會騙人**：再乾淨的趨勢線都只在你測過的範圍內可信，外推到沒人去過的規模，線會不會彎、會不會撞牆（例如撞上資料牆，→ch18），沒人擔保。**第三，最深的影子**：scaling 養出來的能力是長出來的，沒有作者，所以也**沒有人能逐條解釋它為什麼會這樣**——能力越強，這個黑箱越大（→ch19）。你買到了能力，但你沒買到對它的理解。\n\n### (c) 何時不成立\n\n- **當你以為 scaling law 是提款機**：「砸 10 倍算力必得 10 倍聰明」——不成立。它是羅盤不是收據，給方向感不給保證。\n- **當你把 20:1 當產業實務**：截至 2026-06，前沿服務級模型幾乎全部 overtrain、遠超 20:1，因為推論成本主導真實決策。Chinchilla 是「訓練最佳化」，不是「大家在做的事」。\n- **當資料牆撞上來**：scaling 的前提是資料管夠。一旦高品質人類文字見底（一個約落在 2026–2028 的憂慮，→ch18），「等比放大資料」這條腿就斷了，整個 compute-optimal 的算法得重寫。\n- **提醒**：本章的 20:1、Chinchilla vs Gopher 是 2020–2022 的奠基事實（✅，穩固）；但「各家實際餵多少、overtrain 到什麼程度」是**截至 2026-06 的快照**，會隨推論成本與硬體變動，不是定律。\n\n## 紙上推演\n\n### 推演題1：找破綻——「參數越多模型越強」哪裡不精確？ [10 分鐘] ★★\n\n你的同事丟來一句業界常聽到的話：「模型就是參數越多越強，所以拚的是誰參數量大。」用本章的東西，指出這句話**至少三個**不精確的地方。\n\n#### 推演解答\n\n這句話混了好幾個層次的錯，拆開來：\n\n1. **它違反 Chinchilla。** 在**固定算力**下，參數越多**不一定**越強——70B 餵飽的 Chinchilla 打贏了 280B 餓著的 Gopher。光堆參數而不等比餵資料，是把錢砸在養一頭餵不飽的巨獸。所以正確的說法是「參數**和資料等比放大**才越強」，不是「參數越多越強」。\n\n2. **它把 loss 偷換成「強」。** scaling law 保證的是「猜下一個字的 loss 平滑下降」，不是「智慧／有用度」線性上升。loss 漂亮不等於會寫能跑的程式、不等於不胡說。「強」是個比 loss 模糊得多的東西，中間的轉換不保證。\n\n3. **它忽略了推論帳單。** 就算更大真的更強，「強」也不是唯一目標。你要為這個大小付幾十億次推論的錢，所以各家反而故意做**小**、用 overtrain（餵過頭）補回能力。現實裡「該多大」是被推論成本壓出來的取捨，不是「越大越好」。\n\n4.（加分）**它假設了一個沒有天花板的世界。** 等比放大資料的前提是資料管夠；一旦撞上資料牆，「越多越強」連前提都站不住。\n\n常見誤解：以為 Chinchilla 推翻了「越大越好」。沒有——更大在**算力也跟著加**的前提下確實更強（Kaplan 的線沒被推翻）。Chinchilla 推翻的是「在**固定**算力下，錢該優先砸參數」這個**分配處方**。差別在「同一筆錢怎麼分」，不在「要不要變大」。\n\n### 推演題2：對帳——把你的 autoscaling 取捨對應到「養 vs 寫」 [15 分鐘] ★★\n\n你維運過 HPA autoscaling，也手寫過排程式的「定時起 pod」。請對著這兩者，講清楚「養模型」對應的是哪一個、以及這個對應**在哪裡會破**（哪個地方 autoscaling 比喻撐不住）。\n\n#### 推演解答\n\n**對應的是 autoscaling，不是排程。** 排程是「逐條寫死行為」（九點起三個 pod）＝寫程式＝cache library 那套，行為先在你腦中。autoscaling 是「設指標＋目標，行為自己長出來」（CPU 70% 就擴）＝比較接近養模型：你規定的不是行為，是「行為往哪個方向被推」。pretraining 的「指標＋目標」就是那個荒謬簡單的「把下一個字猜準」，能力是從這個迴圈長出來的副產品。\n\n**比喻在哪裡破（這是重點）**：autoscaling 雖然行為是「長出來的」，但你**永遠能解釋**它此刻為什麼起 pod——指到 CPU 70% 那條規則就好，因果是透明的、有作者的（你寫了那條 scaling policy）。模型不行：你**無法**指出對應的那行「為什麼看到中文就翻成英文」的規則，因為連那個「策略」本身都是長出來的，沒有作者。所以模型比 autoscaling **更極端**——autoscaling 是「行為長出來、但規則是寫的」，模型是「**連規則都長出來、沒人寫**」。這道裂縫就是 ch19「我們造出看不懂的東西」的源頭。把 autoscaling 當入門錨點很好，但別忘了模型黑掉的是更深一層。\n\n### 推演題3：反事實——如果沒有 scaling law 這條線，產業會怎樣？ [10 分鐘] ★★★\n\n假設 Kaplan 2020 那條平滑、可外推的趨勢線**不存在**（投入和能力之間是一團沒規律的噪音）。AI lab 的決策會變成什麼樣？這對「養模型是不是科學」說明了什麼？\n\n#### 推演解答\n\n沒有那條線，「我們再大十倍會更強嗎」就**無法事先回答**——只能砸了錢、訓練完、回頭看才知道。這會把每一次大規模訓練從「有外推圖撐腰的投資」打回「幾億美金的賭博」。後果：（1）沒人敢輕易砸大錢，因為估不出回報，整個產業的擴張速度會慢得多；（2）募資邏輯崩潰——你沒辦法拿一張外推圖去跟投資人說「再給我 X 算力，loss 會掉到這裡」；（3)「先畫線再砸錢」變成「先砸錢再祈禱」，這就真的退回煉金術了。\n\n這個反事實揭露的正是本章的核心：**讓「養模型」成為科學而非煉金術的，不是訓練流程本身（那確實很像碰運氣地長東西），而是 scaling law 這條讓你能「事先估價」的趨勢線。** 是「可預測性」把這件事從拜拜變成工程。沒有那條線，模型還是養出來的，但「養」就只是賭，不是科學了。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 「養」跟「寫」最根本的差別是什麼？為什麼說 cache library 是寫的、模型是養的？（提示：行為先在誰腦中、有沒有「那行 if」可指）\n2. pretraining 的訓練目標荒謬地簡單——它是什麼？為什麼這麼蠢的一個目標，能逼出文法、翻譯、推理這些沒人寫過的能力？\n3. 用你自己的話講：scaling law 那條「線」到底是什麼的線？為什麼有了它，「先畫趨勢線再決定砸多少錢」才變可能？\n4. Chinchilla 推翻了「光把參數做大」的哪一部分、又**沒有**推翻哪一部分？（小心：它改的是「固定算力下怎麼分配」，不是「要不要變大」）\n5. Chinchilla 用 70B 打贏 280B 的 Gopher，這一拳的力道為什麼在於「**算力相同**」這四個字？\n6. 「20:1」是訓練最佳化的比例——那為什麼各家實際上幾乎都 overtrain、遠超 20:1？這個誘因從哪裡來？（提示：帳單在哪一側）\n7. 如果有人對你說「scaling law 證明了砸越多錢必得越強的模型」，你要怎麼修正他？（提示：羅盤 vs 提款機、loss vs 有用）\n\n## 延伸閱讀\n\n- **Kaplan et al., \"Scaling Laws for Neural Language Models\" (2020)** — https://arxiv.org/abs/2001.08361 ——本章那條「平滑、可外推的趨勢線」的源頭。不必啃數學，看它的圖：投入 vs loss 跨七個數量級的直線，那張圖就是「先畫線再砸錢」的全部底氣。\n- **Hoffmann et al., \"Training Compute-Optimal LLMs\" (Chinchilla, NeurIPS 2022)** — https://proceedings.neurips.cc/paper_files/paper/2022/file/c1e2faff6f588870935f114ebe04a3e5-Paper-Conference.pdf ——本章主個案的原始論文。重點讀「等比放大」的結論與 Chinchilla(70B) 打贏 Gopher(280B) 的對照——感受「同樣算力、餵飽的小模型贏」這一拳。\n- **Epoch AI, \"Chinchilla scaling: a replication attempt\"** — https://epoch.ai/publications/chinchilla-scaling-a-replication-attempt ——一份對 Chinchilla 確切擬合提出質疑的複現研究。讀它是為了養成本章那種態度：連奠基定律都該被重測，趨勢線是工具不是聖經。\n- **DeepSeek-V3 Technical Report (2024)** — https://arxiv.org/abs/2412.19437 ——想看「沒人照 20:1、為推論而 overtrain」的真實例證：671B 參數餵 14.8 兆 token。後面 ch11 會回來拆它的成本敘事，這裡先當「實務 ≠ Chinchilla」的活樣本看。\n"}, {"id": "ch03-five-variables", "file": "ch03-five-variables.md", "group": "Part I — 共通底層（同一張藍圖）", "title": "ch03 — 五變數記分卡：差異的成因框架", "md": "# ch03 — 五變數記分卡：差異的成因框架\n\n> **本章解決什麼問題**：前兩章我們同意了兩件事——架構是公開的同一張藍圖（ch01），而模型是沿著 scaling 曲線「養」出來、不是「寫」出來的（ch02）。那就逼出一個問題：如果藍圖一樣、養法都叫「訓練」，為什麼八家養出來的模型強項天差地遠？本章交出全書的核心分析工具——**五變數記分卡**：差異記在哪幾個帳上、各記一筆。這是 ch04 開始「別急著排名」之前的最後一塊地基，也是 Part II 逐家拆解（ch05–12）與 Part III 跨家主題（ch13–19）每一章 `## 成因拆解` 都會回收的那把尺。讀完這章，你手上就有一張能套到任何一款新模型上的排查清單。\n\n## 從你已知的出發\n\n你做過無數次效能瓶頸診斷。系統慢了，你不會瞎猜，你跑一張固定的排查清單：**CPU 打滿了嗎？IO 卡住了嗎？哪裡在搶鎖？網路在抖嗎？快取沒命中嗎？** 你逐項排查，不是因為你知道答案，是因為你知道**慢有固定幾種成因**，把它們一個一個過一遍，主因自然浮出來。你那次把尖峰 RDS CPU 壓下 40%，不是運氣——是你把這張清單跑到底，定位到一條沒走索引的查詢。\n\n「為什麼這家模型強」也有這樣一張清單。而且我想先用一個你更熟的對照，把它的形狀講清楚。\n\n想像兩個團隊，**租用同一型號的 RDS 執行個體**——同樣的 vCPU、同樣的記憶體、同樣的 MySQL 版本。硬體藍圖一模一樣。但一個團隊的查詢 p99 是 8 毫秒，另一個是 800 毫秒。差一百倍。差在哪？你閉著眼睛都數得出來，效能差異就來自那幾個源頭：\n\n```text\n同一台 RDS，效能差異的五個源頭\n─────────────────────────────────\n  schema 設計      表怎麼拆、欄位型別、正規化程度\n  index            建了哪些索引、覆蓋查詢沒\n  查詢寫法         有沒有 N+1、有沒有全表掃描\n  硬體配置         IOPS 上限、連線池、參數調校\n  流量形狀         讀寫比、熱點、尖峰分布\n```\n\n藍圖（RDS 型號）一樣，跑出來的系統行為天差地遠——因為**差異不在藍圖，在藍圖之外的那五件事**。這正是 ch01 那句「架構不是護城河」落到地上的樣子：Transformer 是那台 RDS，大家租的是同一型；強弱差在你怎麼配、餵什麼、誰來調。\n\n本章要做的，就是把「模型強弱」也壓成這樣一張**五格清單**。它不像 RDS 那張那麼乾淨（模型的五格會互相纏繞，等下會看到），但它的用法一模一樣：看到一款模型在某件事上很強，你不再說「他們比較厲害」這種廢話，你拿這張清單逐格問——**這個強項，主要記在哪一格的帳上？**\n\n## 五變數：固定順序、固定用詞\n\n先把五格擺出來。這五個名稱、這個順序，全書不變——Part II 每一家、Part III 每一個主題，`## 成因拆解` 都照這張表逐格歸因，不准各章自創分類。請把它們當成你那張瓶頸清單的「CPU/IO/鎖/網路/快取」：固定的座標軸。\n\n| # | 變數 | 一句話定義 | 它解釋哪一類差異 |\n|---|---|---|---|\n| 1 | **資料**（data） | 餵什麼、配比、清洗、來源（網路／程式碼／合成／專有） | 模型「見過什麼世界」：中文強弱、程式碼強弱、知識廣度 |\n| 2 | **後訓練·對齊**（post-training / alignment） | SFT、RLHF、RLAIF、RLVR、reward model、指令與性格塑形 | 好不好用、聽不聽話、會不會推理，很多來自這裡 |\n| 3 | **算力·基礎設施**（compute / infra） | GPU/TPU 數量、自研晶片、叢集、互連、訓練工程成熟度 | 能訓多大、多久、多便宜；長上下文、超大模型可不可行 |\n| 4 | **研究文化·品味**（research culture / taste） | 押哪個方向、實驗紀律、迭代速度、人才密度、價值取向 | 為什麼有人先做出 reasoning、有人先做對齊；最難被抄走 |\n| 5 | **產品取向**（product orientation） | 服務誰（消費者／開發者／企業／自家產品）、開放或封閉 | 模型被「養成」什麼形狀，往往是被它要服務的產品壓出來的 |\n\n下面逐格講一遍。每一格我給你一句定義、它管哪一類差異、再丟**一個迷你預告例子**——某一格如何主導某一家的某個強項。**注意：這些例子全是「預告」，這裡只點到「主因落在這格」，完整因果鏈留到 Part II 那家自己的章節展開。** 你現在只需要建立「哪種差異該往哪一格看」的直覺。\n\n### 第 1 格：資料——模型見過什麼世界\n\n模型的能力長在它見過的資料上。**沒見過的世界，它就學不會。** 這格管的是「餵什麼進去」：是英文網路為主還是中文語料厚實，是塞了大量 GitHub 程式碼還是偏向自然語言，是純爬來的網路文字還是摻了大量合成資料、專有資料。資料的**配比**（各種來源各佔多少）是各家最不公開的秘密——因為它幾乎直接決定模型「天生會什麼」。\n\n對工程師我這樣翻譯：這就像你那台 RDS 的**流量形狀**。你餵系統什麼樣的讀寫流量，它就被磨成適應那種流量的樣子。模型餵什麼資料，就被磨成擅長那個領域。\n\n> **迷你預告**：Qwen（阿里巴巴）的中文與多語言（號稱 119 種語言）強，主因落在這一格——背後是中文／亞洲語料的厚度。為什麼是阿里、這個優勢的影子是什麼，留到 ch12。\n\n### 第 2 格：後訓練·對齊——把原料磨成好用的工具\n\nch02 講的 pretraining，養出來的是一塊**有能力但難用**的原料——它會接話、知道很多，但不一定聽你的指令、不一定按你要的格式答、可能講出有害內容。**後訓練（post-training）**就是把這塊原料磨成順手工具的全部工序：用人類示範教它照指令做（SFT）、用人類偏好教它什麼答案更好（RLHF）、用 AI 自評代替人工標註（RLAIF）、用「答案對不對／程式跑不跑得起來」這種客觀訊號做強化學習（RLVR）。\n\n這些縮寫你現在不必全懂（ch15 會把這條演化線講透）。你只要抓住一件事：**「好不好用、聽不聽話、會不會推理」這些你天天有感的特質，大半不是 pretraining 給的，是後訓練給的。** 同一塊 pretraining 原料，後訓練手法不同，磨出來的性格就不同——有的乖、有的會頂嘴、有的特別會一步步推理。\n\n> **迷你預告**：Anthropic 的 Constitutional AI（憲法式 AI，2022）——給模型一份寫好的「憲法」，讓它照原則**自我批評、自我修正**，用 AI 回饋取代大量人工標註——主因就落在這一格。它如何外溢成「聽話、適合 agent/coding」的口碑，留到 ch07。\n\n### 第 3 格：算力·基礎設施——能不能養出某類模型的硬約束\n\n這格管的是「你有多少肌肉、肌肉長什麼樣」：用幾萬張 GPU 還是幾十萬張、用 NVIDIA 還是自研晶片、叢集多大、晶片之間的互連多快、整套訓練工程多成熟。它決定的是**物理上的可能性邊界**——能訓多大的模型、訓多久、每個 token 多便宜、長上下文划不划算。\n\n這格最像你的硬體配置與基礎設施，而且我要強調一個你會立刻有共鳴的點：**掌握整條 stack，才能做別人做不到的最佳化。** 你自建那套全團隊採用的多層 cache library、自己管基礎設施，換來的就是別人用代管服務拿不到的最佳化空間。算力這格的頂級玩法——自研晶片——就是這個邏輯放到國家級資本的版本。\n\n> **迷你預告**：Google 的超長上下文（Gemini 1.5 Pro 早在 2024 就 ship 了 200 萬 token 的視窗，截至 2026-06）主因落在這一格——**自研 TPU 的垂直整合**讓長序列的訓練與服務成本可控。這條因果鏈是本章後面 `## 紙上推演` 要你親手拆的，這裡先記「長上下文→往算力這格看」。\n\n### 第 4 格：研究文化·品味——最難被抄走的那一格\n\n前三格（資料、後訓練、算力）你多少能用錢和人砸出來。**這一格不行。** 研究文化·品味管的是更軟、更貴的東西：這家押注哪個方向、實驗紀律嚴不嚴、迭代多快、人才密度多高、價值取向是什麼（衝能力？衝安全？衝效率？）。它解釋的是一個最關鍵的差異——**為什麼是這一家、在這個時間點、先做出了那件事。**\n\n為什麼 OpenAI 先押對了「對思維鏈做 RL、讓模型在推論時多想一會兒」（reasoning 範式，o1，2024）？為什麼 Anthropic 一開始就把對齊與可解釋性當第一性原則？為什麼 DeepSeek 在出口管制的壓力下，磨出一整套效率文化？這些都不是「資料好」或「GPU 多」能解釋的——是一群人**選擇相信某個方向值得押**的結果。架構可以抄、權重可以蒸餾、技巧論文一發全世界都會，但「在對的時間押對方向的品味」抄不走。\n\n對工程師我這樣翻譯：這像你們團隊的**工程文化**。為什麼有的團隊就是先想到該強制 OpenAPI 同步、該自建那層 cache、該把可觀測性做在前面？不是因為他們設備比較好，是因為他們的品味與紀律讓他們**先看見**那個該做的決定。文化是組織的索引——它決定你多快查到對的答案。\n\n> **迷你預告**：reasoning 範式為什麼先在 OpenAI 落地（而不是別家），主因有一大塊落在這一格（先押 RLHF、先押 test-time compute 的研究取向）。展開留到 ch05 與 ch14。\n\n### 第 5 格：產品取向——模型被它要服務的產品壓成什麼形狀\n\n最後一格常被外行忽略，卻往往是最深的成因：**這個模型最終要服務誰？** 是消費者（要好聊、安全、別出包）、是開發者（要 API 穩、會寫程式、能當 agent）、是企業（要可控、可私有部署）、還是自家的某個產品（要餵 Search、餵 Workspace、餵社群平台）？要開放權重給全世界下載，還是閉源只走 API？\n\n這格的威力在於它會**反過來塑形前四格**。你決定要服務 Search 這種行星級流量的產品，就被逼著把效率與長上下文做到極致（算力那格被產品壓著走）；你決定要做開放權重生態，就會出全尺寸的模型、選更寬鬆的授權（資料與產品策略一起被帶動）。模型最後長成什麼形狀，常常是「它要服務的產品」在背後施的力。\n\n對工程師我這樣翻譯：這像你的系統**要服務的 SLA 與使用場景**。同一套微服務骨架，你拿去做面向消費者的高併發 API，跟拿去做內部後台批次，會被調校成完全不同的樣子——不是技術不同，是**要服務的東西不同**。\n\n> **迷你預告**：Meta 曾用開放權重（Llama）養出龐大生態，又在 2026-04 轉向閉源前沿（Muse Spark）——這個戲劇性的轉向，主因正落在這一格（產品取向變了：從「送權重換生態」改成「靠自家 30 億用戶平台與專有資料變現」）。這是全書最「新鮮又反直覺」的個案，留到 ch08，標為 **2026 轉折、非定局**。\n\n## 怎麼讀一個 `## 成因拆解`\n\n五格擺好了，現在講**怎麼用**。從 ch05 開始，每一章結尾都有一個叫 `## 成因拆解` 的段落，它是這本書的招牌。它永遠是同一個三段式結構，你學會讀它，就學會了全書最重要的閱讀動作。\n\n**第一段：五格歸因。** 一張表，把本章現象逐格過一遍，每格標一個記號、寫一句「為什麼」：\n\n```text\n記號     意思                     你該怎麼讀\n──────────────────────────────────────────────\n✓ 主因   這格是這個強項的主要成因   先看這幾格，因果鏈的主幹在這\n△ 次因   有貢獻，但不是決定性的     第二層，會放大或修飾主因\n（空白） 這格基本不相關             這個強項跟這格沒什麼關係\n影子     這個強項的代價／盲點       同一組選擇讓他強在 X，也弱在 Y\n```\n\n讀法：**先掃 ✓，那是主幹；再看 △，那是修飾；空白的格子也是資訊**——它告訴你這個強項「不靠」什麼。比方一款模型在 coding 上強，若歸因表的「資料」與「後訓練」打 ✓、「算力」留白，那它在告訴你：這個強項是養法磨出來的，不是靠堆 GPU 堆出來的——這個判斷很重要，因為它預測了「別家就算 GPU 更多，也未必抄得到這個強項」。\n\n**第二段：影子。** 這是這本書跟公關稿、跟排行榜最不一樣的地方，也最對你這種看慣 postmortem 的人的胃口。**每一個強項都有代價。** 讓一家強在 X 的那一組選擇，幾乎一定讓它弱在、或暴露在某個 Y 上。押安全與對齊到極致，可能讓你在某些開放度、速度上讓步；把算力暴力堆到極致，要付能源、成本、資料品質的帳；送出開放權重換生態，等於送出一部分護城河。**沒有只有優點的選擇**——這句話會在全書出現八次以上。一個 `## 成因拆解` 如果只講優點，它就是壞的。\n\n**第三段：何時不成立。** 提醒你這個「強項」是**截至某個日期的快照，不是定律**。它會被哪類任務打臉（某家在數學強不代表在長文寫作強）、被哪家追上、被什麼時間因素推翻（下個版本、下個範式）。這一段是 ch04「誰最強測不準」那把懷疑論的尺，提前裝進每一章——**任何「X 在 Y 上領先」都帶著保存期限**。\n\n讀完這三段，你應該能用一句話複述本章的帳：**「強在 X，因為〔哪幾格〕；影子是 Y。」** 這個句式全書統一，每一家、每一個主題收尾都結出這一句，到 ch21 累積成一張總帳。\n\n## 為什麼幾乎沒有「單一主因」\n\n最後一件，也是這張清單跟你那張 RDS 清單**最不一樣**的地方，必須講清楚，否則你會誤用整個框架。\n\nRDS 那五格——schema、index、查詢、硬體、流量——大致是**可以拆開的**。你可以說「這次慢純粹是少了一個索引」，其他四格沒參與。乾淨、可隔離。\n\n**五變數不是這樣。它們深度纏繞，幾乎找不到「只有一格是主因」的例子。** 原因是這五格在現實裡互為因果、彼此放大：\n\n```text\n五格互相牽動的一個典型迴路（以「Google 長上下文」為例骨架）\n\n  產品取向（要服務 Search 這種行星級流量）\n        │  逼出對效率的執念\n        ▼\n  算力·基礎設施（自研 TPU、垂直整合）\n        │  讓長序列訓練／服務成本可控\n        ▼\n  研究文化·品味（DeepMind 的研究縱深押長上下文）\n        │  把可行性變成真的做出來\n        ▼\n  「超長上下文」這個強項長出來\n```\n\n看出來了嗎？「Google 長上下文強」這一個強項，你沒辦法說它「只是因為 TPU」。是**產品壓力**逼出效率執念、**算力**（TPU 垂直整合）提供物理可行性、**研究文化**（DeepMind 底）選擇把它做出來——三格扣在一起才成立。抽掉任何一格，這個強項都不會以現在的樣子出現。\n\n所以歸因表上才會有「✓ 主因」和「△ 次因」的分別：**我們標的是『主幹落在哪』，不是『只有這格』。** 一個誠實的 `## 成因拆解`，主因通常是兩到三格，而不是一格。任何「某家強純粹因為他資料好」這種單因解釋，**幾乎一定是把因果鏈砍斷了**——這正是 `## 紙上推演` 要訓練你抓的破綻。\n\n這也是為什麼研究文化·品味（第 4 格）最難被抄走：別家可以複製 TPU 的算力（買晶片）、可以複製長上下文的技術（讀論文），但複製不了「在對的產品壓力下、用對的算力、押對方向」這整個**纏繞的迴路**。能抄走的是單格；抄不走的是格與格之間的扣法。\n\n## 成因拆解\n\n本章沒有一個「某家的強項」可拆——本章拆的是**這個框架自己**。所以這個 `## 成因拆解` 是一個示範：拿一句你常聽到的話「**Google 的長上下文很強**」（截至 2026-06；Gemini 1.5 Pro 早在 2024 就 ship 了 200 萬 token 視窗，是真實且耐久的招牌，⚠️ 更新的 Gemini 3.5 Pro 號稱 200 萬 token＋Deep Think，截至 2026-06-09 尚未 GA，視為目標非定局），用五格把它拆給你看。**這正是你讀完每一章後該能自己做的動作。**\n\n**(a) 五格歸因**\n\n| 變數 | 記號 | 為什麼 |\n|---|---|---|\n| 資料 | （空白） | 長上下文不是「見過更多資料」給的，是架構與算力給的——這格基本不相關 |\n| 後訓練·對齊 | △ 次因 | 長視窗要「用得好」（在百萬 token 裡找對的東西）需後訓練調教，但不是長視窗本身的成因 |\n| 算力·基礎設施 | ✓ 主因 | **自研 TPU 垂直整合**讓長序列的訓練與推論成本可控——長上下文每多一倍，注意力與 KV cache 成本就漲，能扛得起這個成本是物理前提 |\n| 研究文化·品味 | ✓ 主因 | DeepMind 的研究縱深選擇押注長上下文這個方向，把「算力扛得起」變成「真的做出來」 |\n| 產品取向 | △ 次因 | 要服務 Search／Workspace 這種行星級產品的壓力，逼出對效率與長上下文的執念 |\n\n一句話總結：**強在長上下文，因為〔算力·基礎設施 ＋ 研究文化·品味〕，被〔產品取向〕推著走。** 主因落在兩格、被第三格放大——印證了上一節「幾乎沒有單一主因」。\n\n**(b) 影子**\n\n垂直整合自研 TPU 的這套選擇，代價是**綁死在自家生態與供應鏈上**。你不像買 NVIDIA 那樣有現成的全球工具鏈、社群、現貨市場——TPU 的整套軟硬體都得自己扛，外部開發者想用你的硬體做最佳化也更難。更廣的影子：長上下文能塞進去，不等於模型在百萬 token 裡**真的找得到、用得對**那根針——「視窗大」和「長距離推理可靠」是兩件事，後者常被前者的數字蓋過去（這個陷阱 ch04 會用 benchmark 的角度再戳）。\n\n**(c) 何時不成立**\n\n這個「長上下文強」的招牌，在幾種情況下會被打臉：(1) **被任務打臉**——你要的是短而難的數學或 coding，長上下文這個強項根本用不上，這時該看的是別格、別家。(2) **被別家追上**——上下文長度是會擴散的技術，2026-06 各家旗艦多半都往百萬 token 走，「長」正在變成 table stakes（基本門檻）而非差異化。(3) **被時間打臉**——這是**截至 2026-06 的快照**；下一個版本、下一個範式（比方「無限上下文」或「外部記憶」成熟）都可能讓「視窗多長」這件事不再是賣點。**記住：這是快照，不是定律。**\n\n## 紙上推演\n\n### 推演題1：把「Google 長上下文很強」歸到五格 **[15 分鐘] ★★**\n\n**先不准看上面的 `## 成因拆解`。** 拿「截至 2026-06，Google 的長上下文很強」這句話，自己畫一張五格表，每格標 ✓主因／△次因／空白，並各寫一句「為什麼」。寫完再回去對照，看你把主因放對了沒。這是全書你要重複做幾十次的動作，第一次就練到位。\n\n#### 推演解答\n\n關鍵是分清「**這個強項的物理前提是什麼**」跟「**誰選擇把它做出來**」。\n\n- **資料（空白）**：陷阱在這格。很多人直覺「強＝資料好」，但長上下文不是資料給的——你餵再多資料，視窗開不大、成本扛不住，照樣做不出長上下文。這格基本不相關，**留白本身就是答案**。\n- **後訓練·對齊（△）**：把百萬 token 的視窗「用好」需要調教，但這是修飾，不是長視窗的成因。\n- **算力·基礎設施（✓ 主因）**：這是物理前提。上下文每長一倍，注意力與 KV cache 的成本就漲；自研 TPU 的垂直整合讓 Google 扛得起這個成本。沒有這格，後面都不用談。\n- **研究文化·品味（✓ 主因）**：算力扛得起只是「可以做」，DeepMind 選擇押注長上下文這個方向、真的把它做出來，是「做了」。可以做 ≠ 做了，中間隔著品味。\n- **產品取向（△）**：要服務 Search/Workspace 的壓力，逼出對長上下文與效率的執念，放大了前兩格。\n\n**常見誤解**：把主因放到「資料」格（被「強就是料多」的直覺騙了），或只放一格（「就是 TPU 嘛」）而漏掉研究文化。記住兩條：**長上下文往算力看，不往資料看**；**主因通常兩三格，不是一格**。你若能講出「算力是物理前提、文化是選擇、產品是推力」這條三格扣在一起的鏈，這題就過了。\n\n### 推演題2：抓出「他們強純粹因為資料好」的破綻 **[10 分鐘] ★★**\n\n有人跟你說：「某家模型 coding 特別強，純粹就是因為他們餵了比別人多的 GitHub 程式碼。」用本章的框架，指出這句話**為什麼幾乎一定是錯的**——不是說資料不重要，是說「純粹因為」這三個字錯在哪。\n\n#### 推演解答\n\n破綻在「**純粹**」——它把一條纏繞的因果鏈砍成單格。\n\n餵 GitHub 程式碼（資料，第 1 格）確實是 coding 能力的必要原料，但它遠遠不夠。同一批程式碼資料，pretraining 完只是一塊「會接程式碼」的原料——它**會不會照你的指令寫、會不會自己跑測試、會不會 debug、能不能當 agent 多步完成任務**，這些是**後訓練·對齊**（第 2 格）磨出來的；要訓得動、要支援長的程式碼上下文，靠**算力**（第 3 格）；先看見「該把模型練成會用工具的 coding agent」這個方向，是**研究文化·品味**（第 4 格）；把產品定位在開發者、逼著模型往 agent/coding 長，是**產品取向**（第 5 格）。\n\n所以正確的講法是：「coding 強，主因落在**資料 ＋ 後訓練**兩格，被**產品取向**推著走」——而不是「純粹因為資料」。「純粹因為 X」這種單因解釋是本書要你終生警惕的破綻；現實裡的強項，主幹幾乎都是兩三格扣在一起。**任何把模型強弱講成單一原因的說法，先假設它砍斷了因果鏈，再去找它漏了哪幾格。**\n\n### 推演題3：用五格對帳你自己的系統 **[10 分鐘] ★**\n\n把你那次「尖峰 RDS CPU 降 40%」的最佳化，對應回本章開頭那張「同一台 RDS 五個源頭」的清單：你那次的主因落在哪一格？是 schema、index、查詢、硬體還是流量？然後想一想——你當時是怎麼確定主因的？這個「逐格排查、定位主幹」的動作，跟本章要你對模型做的，是不是同一個動作？\n\n#### 推演解答\n\n這題沒有標準答案（看你當時的真實案例），重點是**讓你親身體會這個框架的用法不是新東西**——它就是你早已內化的瓶頸診斷，換了個領域。\n\n多數人那次 RDS 最佳化的主因落在 **index 或查詢寫法**這格（一條沒走索引的查詢、一個 N+1）。而你當時怎麼確定的？你不是猜的——你跑 profiling、看慢查詢日誌、逐格排除，直到主幹浮現。**這正是 `## 成因拆解` 在做的事**：對「模型強弱」這個現象跑同一套逐格排查，標出主幹（✓）、修飾（△）、不相關（空白）。\n\n差別只有一個，而且這個差別很重要：RDS 那五格大致可隔離（「純粹是少了個索引」常成立），但模型那五格深度纏繞（「純粹因為資料」幾乎不成立）。所以對模型做歸因時，你要比做 RDS 診斷時**更小心『單因』的誘惑**——主因通常是兩三格，不是一格。帶走這句：**你已經會這個動作了；本章只是把它指向一個新對象，並提醒你新對象的格子是纏在一起的。**\n\n## 自我檢核\n\n口頭回答，講得出來才算過關。優先答「為什麼」與「如果不這樣會怎樣」。\n\n1. 五變數是哪五個？照固定順序、固定用詞講出來，並各用一句話說它管哪一類差異。（講不出順序與用詞，後面每一章的 `## 成因拆解` 你都會讀得卡。）\n2. 為什麼「同一台 RDS、效能差百倍」這個對照，能說明「同一張藍圖、八家強項天差地遠」？兩邊的「藍圖之外那幾件事」各是什麼？\n3. 一個 `## 成因拆解` 的三段是哪三段？為什麼說「只講優點的成因拆解就是壞的」——影子那段不寫，你會錯過什麼？\n4. 為什麼五變數「幾乎沒有單一主因」，而你那張 RDS 排查清單卻常常能隔離出單一主因？這個差別會讓你在歸因時多警惕什麼？\n5. 為什麼「研究文化·品味」這一格最難被抄走？別家能複製前三格的哪些東西、複製不了什麼？\n6. 「Google 長上下文強」的主因為什麼落在算力與研究文化、而不是資料？如果有人堅持是「資料好」，你怎麼反駁？\n7. 為什麼產品取向（第 5 格）會「反過來塑形前四格」？舉一個你能想到的方向（比方「要服務行星級流量的產品」會逼出什麼）。\n8. 每一章 `## 成因拆解` 結尾那句「強在 X，因為〔哪幾格〕；影子是 Y」，為什麼要強制每章都結這一句？它最後累積成什麼？\n\n## 延伸閱讀\n\n- **〈Attention Is All You Need〉（Vaswani et al., 2017，arxiv.org/abs/1706.03762）**——這本書整個前提的源頭：那張「公開的同一張藍圖」。你不必讀懂數學，讀它的摘要與架構圖，體會「全世界都站在這同一篇論文上」，五變數框架的意義才立得住。\n- **〈Training Compute-Optimal Large Language Models〉（Chinchilla, Hoffmann et al., 2022）**——ch02 的主角，也是「算力」與「資料」兩格如何**互相約束**（compute-optimal 是資料與參數要等比放大）的最佳實例。讀它你會更懂為什麼這兩格分不開。\n- **〈Constitutional AI: Harmlessness from AI Feedback〉（Bai et al., Anthropic, 2022，arxiv.org/abs/2212.08073）**——「後訓練·對齊」這一格的代表作。本章只給了一句預告，這篇是它的完整樣貌；想先嚐一口第 2 格留到 ch07／ch15 之前，讀它的引言。\n- **DeepSeek-V3 Technical Report（arxiv.org/abs/2412.19437）**——「算力·基礎設施」這一格在資源受限下能逼出什麼的活教材（MLA 砍 KV cache、MoE、FP8）。截至 2026-06，它仍是「效率即護城河」最被引用的一手報告；細節留到 ch11，這裡先看它的摘要感受「限制是創新的母親」。\n- 五變數的逐家展開從 **ch05（OpenAI）** 開始，逐家用這張記分卡拆；跨家主題（開源vs閉源、reasoning、對齊演化、算力軍備…）從 **ch13** 起。本章只是把尺交到你手上——後面每一章都在用它量。\n"}, {"id": "ch04-measuring-strongest", "file": "ch04-measuring-strongest.md", "group": "Part I — 共通底層（同一張藍圖）", "title": "ch04 — 「誰最強」是測不準的：評測政治學", "md": "# ch04 — 「誰最強」是測不準的：評測政治學\n\n> **本章解決什麼問題**：ch03 交給你五變數這把尺，下一步該拿它去逐家拆解了——但在進 Part II 之前，得先處理一個會毀掉整本書的天真：「排行榜上分數最高的，就是最強的模型。」這章在「同一張藍圖、不同養法」地圖上的位置很特別：它不歸因任何一家，而是先卸掉「排名＝真相」這個錯誤前提，安裝一副誠實的比較眼鏡。它回答的不是「哪一家為什麼強」，而是更前置的「『強』這件事，到底測不測得準」。結論先講：截至 2026-06，沒有單一冠軍、排名每幾個月洗牌、benchmark 會被污染也會飽和——能穩定辨識的是各家的**風格**，不是名次。這個 caveat 是全書的脊椎，後面每一家的「以…著稱」都掛在它上面。\n\n## 從你已知的出發\n\n你看過太多漂亮的平均延遲了。\n\n你跑 k6 壓測一個 NestJS 服務，報告吐出來：平均回應時間 80 毫秒。漂亮。你正要把這個數字貼進週報，但你停了下來——因為你被 p99 坑過。你把分位數攤開來看：p50 是 45 毫秒，p95 是 120 毫秒，p99 是 **2,300 毫秒**。那條尾巴在燒。平均之所以漂亮，是因為它把一小撮災難性的慢請求，溶進了一大堆飛快的請求裡。那 1% 的使用者，每一次操作都在等兩秒半，而你的「平均 80 毫秒」對他們的痛苦一無所知。\n\n你早就學會：**單一數字會騙人。** 一個 summary statistic 是把一整個分布壓成一個點，壓的過程必然丟掉資訊——而丟掉的那部分，往往正是你最該擔心的部分。所以你看壓測報告從不只看平均：你看分布、看尾巴、看這個負載**是在什麼場景下打的**（讀多寫少？冷快取還是熱快取？併發 100 還是 10,000？）。同一個服務，換一種流量形狀，數字可以天差地遠——報告底下那行小字「scenario: ...」比那個大大的平均數字重要得多。\n\n現在把這套直覺，原封不動搬到 AI 模型的排行榜上。\n\n「GPT-5.5 在某 benchmark 拿 92 分」——這就是那個漂亮的平均延遲。它是一個 summary statistic，把「這個模型在數學、程式、長文、多語言、agentic 任務上的千百種表現」壓成了一個點。它沒告訴你這 92 分是在什麼**場景**下測的、分布的尾巴有沒有在燒、這道題模型是**真的推理出來**還是**背過答案**。本章要做的，就是教你用看 k6 報告的眼睛去看 AI 排行榜：別信那個大數字，去看分布、看場景、看它怎麼測出來的。一個排行榜，就是一份只印了平均值、藏起了 p99 和 scenario 的壓測報告。\n\n## 排行榜上那些數字，各自在量什麼\n\n先把場上的主要量尺認清楚。截至 2026-06，業界在看的 benchmark 大致分三種**類型**——記住「三種類型」這件事，是本章最重要的工具，後面會反覆用到。\n\n```text\n評測的三大類型（量的東西根本不同）\n\n  類型一：靜態學科考      類型二：人類偏好擂台    類型三：agentic 實戰\n  (static academic)      (human-preference)     (agentic suite)\n  ┌──────────────┐      ┌──────────────┐      ┌──────────────┐\n  │ MMLU-Pro     │      │ LMArena      │      │ SWE-bench    │\n  │ GPQA Diamond │      │ (前 Chatbot  │      │  Verified    │\n  │ AIME         │      │  Arena)      │      │ Terminal-    │\n  │              │      │              │      │  Bench       │\n  └──────────────┘      └──────────────┘      └──────────────┘\n  固定題庫、對答案       真人盲投、算 Elo       真實任務、看成敗\n  量「會不會」          量「人比較喜歡誰」     量「做不做得成事」\n  弱點：會被背、會飽和   弱點：偏好≠正確       弱點：難建、跑得慢\n```\n\n- **MMLU-Pro**：硬版的多選知識測驗（約 12,000 題、每題 10 個選項）。它量的是「跨學科知識答得對不對」。截至 2026-06 它**已經接近飽和**——前沿模型擠在 88~94% 這個窄帶裡，彼此差幾分，根本分不出高下。\n- **GPQA Diamond**：研究所等級的科學推理題（生物、物理、化學的「Google 都查不到答案」那種）。它本來是用來把模型考倒的，但截至 2026-06 前沿模型已經逼近 ~94%，**也在飽和邊緣**。\n- **AIME**：美國高中數學競賽題。reasoning 模型（見 ch14）在這上面已經接近滿分。\n- **SWE-bench Verified**：這是**agentic coding 的關鍵量尺**——拿真實 GitHub 上的 Python issue（一個經人工驗證過的 500 題子集），讓模型像工程師一樣讀 codebase、改程式、跑測試，看它**真的把 issue 修好沒有**。這量的不是「會不會」，是「做不做得成」。\n- **LMArena**（2026-01-28 從 Chatbot Arena / LMSYS 改名為「Arena」）：完全不同的玩法。它讓真人同時看兩個匿名模型的回答、盲投誰比較好，再用下西洋棋那套 **Elo** 把所有對戰結果換算成排名。它量的不是對錯，是**人類偏好**。\n- **Terminal-Bench、ARC-AGI-2**：較新的 agentic／抽象推理量尺，因為新，還沒被刷飽和。\n\n光是把這張表看懂，你就該起疑了：MMLU-Pro 量知識、LMArena 量偏好、SWE-bench 量任務成敗——**這三個根本不是同一個維度**。問「哪個模型最強」就像問「哪個資料庫最快」：你不先講清楚是 OLTP 還是 OLAP、是點查還是全表掃描、是讀多還是寫多，這個問題根本沒有答案。「最強」會依任務裂開：**coding 強 ≠ 數學強 ≠ 長上下文強 ≠ 多語言強**。一個在 AIME 屠榜的模型，可能在 SWE-bench 上修不好一個真實的 bug。\n\n## 兩道裂縫：背答案（污染）與擠成一團（飽和）\n\n就算你只盯著其中一種類型的分數看，那個數字本身還有兩道結構性的裂縫，會讓它系統性地騙你。\n\n**第一道裂縫：污染（contamination）——分數量到的是「背誦」，不是「推理」。**\n\nbenchmark 的題目都是公開的，掛在網路上。而模型的 pretraining（見 ch02）是把幾乎整個網路吞下去。你看出問題了嗎——**考卷在考試前就被吞進了考生的腦子裡。** 當測驗的題目（甚至答案）洩漏進了訓練資料，模型在考場上做的就不是「推理」，而是「回憶」：它見過這道題，背得出答案。分數被灌水了，但它量到的能力是假的。這對你不陌生——這就像你用一份**訓練時就看過的測試集**去評估一個機器學習模型，準確率高得嚇人，一上線就垮，因為它根本沒學會「泛化」，只學會了「記住這幾筆」。\n\n**第二道裂縫：飽和（saturation）——尺已經量不出差異了。** 當 MMLU-Pro 上前幾名都擠在 88~94%，這把尺對「分辨前沿模型」這件事已經失效了。剩下那幾分的差距，落在量測誤差的範圍裡（這正是下一節要接的機率問題），不再是能力的真實訊號。一把所有人都考 90 分以上的考卷，分不出班上的前三名——它只證明這份考卷對這群人太簡單了。這也是為什麼業界得不斷推出 GPQA、ARC-AGI-2 這些更難的新尺：舊尺被爬到頂了。\n\n這兩道裂縫合起來，就解釋了那個你一定觀察過的怪象：**排名每幾個月就洗一次牌。** 一部分是真的——各家確實在快速進步、輪流推出新旗艦。但另一部分是假的：新模型發表時的「屠榜」分數，常常摻了對熱門 benchmark 的過擬合（針對考古題最佳化），等到有人拿一份**全新、沒外洩過的題目**去重測，分數就縮水了。一個排名的保鮮期，常常只有幾週。\n\n## 招牌個案：GSM1k 撕開的那 13 分\n\n把「污染」從一個抽象的擔憂，變成一個有名有姓、帶真實數字的故事——這是 Scale AI 在 2024 年做的一件漂亮事。\n\n有一個經典的小學數學應用題 benchmark 叫 **GSM8k**，當時幾乎每家模型的技術報告都會秀自己在上面的高分。但它太紅了、題目在網路上到處都是——也就是說，它是污染的高風險區。Scale AI 的研究者起了個疑：這些高分裡，有多少是「真的會算」，有多少是「背過題目」？\n\n他們的做法，本質上是你做 ML 評估時最樸素也最有效的一招——**換一份模型絕對沒見過的新測試集**。他們請人手工出了 **GSM1k**：1,205 道全新的小學數學題，刻意做到跟 GSM8k 同樣的風格、同樣的難度分布，但**一題都沒在網路上出現過**。然後拿同一批模型，在新舊兩份考卷上各考一次，看分數掉多少。掉得越多，代表它在 GSM8k 上的高分越是「背」出來的。\n\n結果（Scale AI 的論文，arXiv:2405.00332，2024）很說明問題：\n\n- **Mistral 與 Phi 這兩個家族，幾乎在每個尺寸上都系統性地掉分，最多掉到約 13 個百分點。** 它們在熱門的 GSM8k 上看起來很能算，換到沒見過的 GSM1k 就露了餡——這 13 分，量到的是背誦，不是推理。\n- 對照組：**GPT、Claude、Gemini、Llama 這幾個家族，新舊考卷之間幾乎沒掉分（差距 <3%）。** 它們是真的會算。\n- 更狠的證據：研究者發現模型「能不能背出 GSM8k 原題」的傾向，跟它「新舊考卷的分差」是正相關的（Spearman r²≈0.32）——越是背得出原題的模型，掉分掉得越兇。這幾乎是污染的指紋。\n\n這個個案的價值不在於羞辱某幾家（注意：那是 2024 年的快照，各家後來都修正了流程），而在於它給了你一把**反污染的檢驗刀**：看到任何 benchmark 高分，問一句「拿一份它沒見過的同型題重測，分數還在嗎？」——這正是你做 ML 不會用訓練集當測試集的同一條紀律。它也順手示範了本章的一個側論點：**會背答案的，常是被緊逼著刷分的較小模型**；最前沿的大模型反而泛化得好——但這結論一樣有保存期限，別當定律。\n\n## 接上你的機率書：為什麼小樣本排名不可靠\n\n這一節把你書架上《馴服隨機》那本接過來——你已經有這套直覺，這裡只是喚醒它，套到排行榜上。\n\nLMArena 的 Elo 排名，本質是**抽樣**。它不是上帝視角下「A 模型客觀比 B 強多少」，而是「在投過票的這群人、這批 prompt 上，A 贏 B 的次數比較多」。這裡藏著兩個你熟得不能再熟的陷阱：\n\n- **抽樣偏誤（sampling bias）**：投票的是誰？多半是會上 LMArena 的科技愛好者，他們的偏好不等於全人類的偏好。問的是什麼 prompt？如果擂台上的 prompt 偏向某類任務（比如閒聊多、硬核 coding 少），擅長那類任務的模型就佔便宜。**樣本不是母體**——你抽樣的那群人和那些題目，決定了排名長什麼樣。這跟你做 A/B test 時最怕的「流量沒分均、被某個地區的尖峰污染了結果」是同一個病。\n- **小樣本不可靠（信賴區間）**：一個剛上架、只被投了幾百票的模型，它的 Elo 帶著一個很寬的不確定性。排名第 3 和排名第 7，如果它們的信賴區間大幅重疊，那這個「第 3 vs 第 7」的差別**在統計上可能根本不存在**——就像你拿 5 個請求的延遲樣本去估 p99，那個數字基本是噪音。好的排行榜會標出信賴區間（Elo 的 ± 範圍），而多數轉述排名的新聞會把那個 ± 砍掉，只留一個看起來很確定的名次給你。\n\n把這兩件事合起來，你就有了對抗「排名＝真相」最鋒利的武器：**任何一個名次，背後都是一次抽樣；問抽了誰、抽了什麼、樣本夠不夠大、誤差棒有沒有重疊。** 你不需要會算 Elo 的公式，只需要保留「這是抽樣、抽樣會騙人」這個警覺——這本書要你帶走的是警覺，不是公式。\n\n## 那該怎麼誠實地比較？三角驗證\n\n卸掉了天真，總得給一副能用的眼鏡。截至 2026-06，業界的最佳實務不是「找一個最權威的 benchmark」——**沒有這種東西**——而是**三角驗證（triangulate）**：\n\n> 同時看三種**不同類型**的訊號——一個靜態學科考（MMLU-Pro／GPQA）、一個人類偏好擂台（LMArena）、一個 agentic 實戰套件（SWE-bench／Terminal-Bench）——**只有當三者一致指向同一個結論時，那才是真訊號。**\n\n為什麼這招有效？因為這三種類型的**弱點不一樣，所以不會一起被同一個花招騙過**。針對考古題刷分的污染，能灌水靜態學科考，但騙不過真人盲投的偏好擂台，也修不好 SWE-bench 上一個真實的 bug。一個只會討好人類評審、實際能力空虛的模型，能在 LMArena 拿高分，但會在 SWE-bench 上原形畢露。**當一個花招只能騙過其中一種尺，三尺一交叉，它就藏不住了。** 這跟你做系統可觀測性的直覺一模一樣：你從不只信一個指標，你交叉看 metrics、logs、traces——因為任一個單獨都能說謊，但要它們**同時**用一致的方式說謊，極難。三角驗證就是把這套 observability 紀律，套到「評估一個模型」上。\n\n這也正是為什麼本書從頭到尾**拒絕下絕對排名**。不是因為謹慎到迂腐，而是因為「最強」這個提問本身就是壞掉的：它假設有一個一維的、跨任務、跨時間都成立的冠軍，而現實是多維的、會洗牌的、量起來帶誤差棒的。本書能誠實交付的，不是名次，是**成因的結構**——這也是為什麼接下來八章，每一家我都只寫「截至 2026-06，以…著稱／在…benchmark 上領先」，並當場附上那個 benchmark 的但書，絕不寫「X 是最強的模型」。\n\n## 成因拆解\n\n本章的現象不是「某一家為什麼強」，而是「為什麼『最強』這件事本身測不準」。所以這節的歸因，不是歸到某一家身上，而是歸到**評測這件事的結構性現實**——這些現實又恰好對應到五變數的某幾格在「製造比較的混亂」。\n\n**(a) 五格歸因（這次歸的是「為什麼測不準」這個現象）**\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| 資料 | ✓ 主因 | 污染的根源在這格：benchmark 題目是公開網路文本，pretraining 把它一起吞了，考卷洩進了訓練資料，分數量到背誦而非推理。 |\n| 後訓練·對齊 | △ 次因 | 針對熱門 benchmark 過擬合（刷榜）發生在後訓練；對齊出的「討喜風格」會灌水 LMArena 的人類偏好票，偏好≠正確。 |\n| 算力·基礎設施 | （空白） | 算力決定模型多強，但不直接決定「強不強測得準」——它不是這個現象的成因。 |\n| 研究文化·品味 | △ 次因 | 各家對「該誠實揭露污染、還是挑漂亮 benchmark 報」的取捨，是文化差異；也決定了一家會不會沉迷刷榜。 |\n| 產品取向 | △ 次因 | 「強」依任務裂開（coding≠數學≠長文），而模型被養成擅長哪類任務，往往是被它要服務的產品壓出來的——所以拿單一 benchmark 排名，本就在拿錯維度比。 |\n\n一句話收束：**「最強」測不準，主因記在〔資料〕（污染）這一格，次因散在〔後訓練〕（刷榜、討喜）、〔研究文化〕（揭不揭露）、〔產品取向〕（強項依任務裂開）；唯一穩定可測的不是名次，是各家的風格。**\n\n**(b) 影子：三角驗證也有它的代價與盲點。** 別把三角驗證當成萬靈丹——它一樣有影子。其一，**它治不了三尺同時失效**：如果一個任務類型（比如多模態、超長上下文、小眾語言）根本還沒有好的 benchmark，三角驗證就無從交叉，你只剩下傳聞。其二，**它治不了系統性偏誤**：如果三種尺剛好都偏袒同一類能力（例如都偏英文、都偏短任務），它們會一致地騙你，而「一致」反而讓你更信。其三，**它很貴、很慢**：跑齊三類評測、尤其 agentic 套件要實際執行任務，成本和時間都遠高於跑一個多選題庫——這正是為什麼大眾媒體圖省事，只轉述一個 LMArena 名次。換句話說，誠實的比較**本身就有成本**，而便宜的不誠實永遠更好傳播。\n\n**(c) 何時不成立：這是截至 2026-06 的快照，不是定律。** 評測這個領域本身在快速演化。今天接近飽和的 MMLU-Pro／GPQA，是因為模型追上了尺——明天會有更難的新尺把前沿模型重新拉開差距（ARC-AGI-2 就是這種嘗試）。今天「較小模型才會背答案、大模型泛化好」的觀察（GSM1k 個案），也只是 2024 的快照，隨各家流程改進會變。甚至「benchmark 會被污染」這件事，也催生了反制（私有題庫、動態出題、防洩漏協定），長期可能局部緩解。唯一不會過期的，是那條後設原則：**任何單一數字都在壓縮資訊，壓掉的那部分往往最關鍵——所以永遠看分布、看場景、交叉驗證。** 這條，跟你看 k6 報告的紀律一樣，不會過時。\n\n## 紙上推演\n\n### 推演題1 — 把「最強測不準」講給另一個工程師聽 [10 分鐘] ★\n\n你同事看到新聞標題「某模型登上 LMArena 第一」，興奮地說「那它就是現在最強的模型了」。用看 k6 壓測報告的比喻，三句話內讓他明白為什麼這句話有問題。\n\n#### 推演解答\n\n關鍵是把「排名＝真相」對應到「平均延遲＝服務體驗」這個他一定懂的錯誤。可以這樣講：「『LMArena 第一』就像壓測報告上那個 80 毫秒的平均延遲——它是一個被壓扁的數字，藏起了分布和場景。第一，LMArena 只量『人類偏好』這一個維度，不量 coding、不量數學，就像平均延遲不告訴你 p99；第二，它是抽樣（一群科技宅、一批 prompt 投出來的），換群人換批題，名次就會動，就像換個流量場景數字就變；第三，它的 Elo 帶誤差棒，第 1 和第 3 的信賴區間可能重疊，差別在統計上可能不存在。所以正確的讀法是『截至這週，它在人類偏好這一項領先』，不是『它最強』。」常見誤解：以為「綜合排行榜」就綜合掉了這些問題——不，把不同維度硬塞進一個名次，只是把問題藏得更深。\n\n### 推演題2 — 設計一個「看起來公平、其實偏袒某家」的評測 [20 分鐘] ★★★\n\n請你當一個不老實的評測機構，設計一份「看起來中立客觀、其實系統性偏袒 A 家模型」的 benchmark。你會在哪幾個環節動手腳？這些偏袒藏在哪裡、為什麼難被一眼看穿？\n\n#### 推演解答\n\n偏袒可以藏在評測 pipeline 的每一個環節，而且每一個都能用「我們只是做了個合理選擇」來辯護——這正是它陰險的地方：\n\n- **選題（資料）**：題目類型偏向 A 家的強項。A 家擅長 coding 弱在多語言？那就讓題庫裡 70% 是程式題、刻意少放非英文題。對外只說「我們聚焦實用任務」。\n- **出題來源（污染）**：選用一批 A 家**可能在訓練資料裡見過**的公開題庫，而對手家沒見過。表面上「大家考同一份卷」很公平，實則 A 家在「開卷」。\n- **評分標準（後訓練偏好）**：如果用「人類評審打分」，就找偏好 A 家輸出風格（比如愛長篇、愛 markdown、愛先講結論）的評審群；或者乾脆用 A 家自己的模型當「裁判」（LLM-as-judge）——模型對自家風格的輸出有系統性偏好，這是已知效應。\n- **prompt 格式**：用 A 家模型偏好的提示格式、system prompt、few-shot 範例去問所有模型。同一道題，換個問法，不同模型表現可以差很多——你只要把「標準問法」定成 A 家的舒適區。\n- **報告呈現（小樣本＋砍誤差棒）**：樣本數壓小到剛好讓 A 家領先、又還沒小到啟人疑竇；報告裡只印名次和分數，把信賴區間拿掉，讓「A 領先 1.5 分」看起來是鐵的事實，而非噪音。\n\n難被看穿，是因為**每一步都是「合理範圍內的選擇」**，沒有一步是公然造假——偏袒是這些選擇**累積**出來的系統性傾斜。這也回頭證明了為什麼要三角驗證：上面這套花招能騙過「這一份」靜態學科考，但你拿 A 沒佔便宜的人類偏好擂台和 agentic 實戰一交叉，傾斜就露餡了。常見誤解：以為「公開題目、公開流程」就等於公平——透明只防得了赤裸的造假，防不了藏在一連串合理選擇裡的結構性偏袒。\n\n### 推演題3 — 找破綻：「這個模型在 GPQA 拿 94 分，已經接近博士水準」 [10 分鐘] ★★\n\n這句話（常見於模型發表新聞）至少有兩處可以開刀。指出來。\n\n#### 推演解答\n\n- **破綻一（飽和）**：GPQA Diamond 截至 2026-06 已逼近飽和——前沿模型全擠在 ~94%。所以「94 分」不代表這家特別強，代表這把尺對前沿模型已經量不出差異了。在一份大家都考 94 的卷子上考 94，是「跟大家一樣」，不是「鶴立雞群」。新聞把「飽和」誤讀成「登頂」。\n- **破綻二（污染／背誦≠理解）**：94 分量的是「在這份固定題庫上答對的比例」，不直接等於「博士水準的科學推理能力」。如果題目有洩漏，分數摻了背誦；就算沒洩漏，「會在多選題裡選對答案」和「能像博士那樣提出假設、設計實驗、面對開放問題」是不同的能力——benchmark 量的是前者，新聞偷換成了後者。\n- **加分破綻（單一數字）**：一個 GPQA 分數只是一個維度。要判斷「接近博士水準」這種大話，至少得三角驗證——它在需要真實多步推理的 agentic 任務上、在真人盲評上是否一致地強？單尺定生死，本身就是錯的。\n\n常見誤解：把「在某個固定考試上的高分」直接等同於「具備該考試想衡量的真實能力」——這正是 Goodhart 定律（當一個指標變成目標，它就不再是好指標）在 AI 評測上的現身。\n\n## 自我檢核\n\n1. 為什麼「哪個模型最強」這個提問本身是壞掉的？用「哪個資料庫最快」來類比，講清楚問題出在哪。\n2. benchmark 污染（contamination）的因果鏈是什麼——為什麼「題目公開」加上「pretraining 吞網路」會讓分數量到背誦而非推理？這跟「拿訓練集當測試集」哪裡像？\n3. 飽和（saturation）和污染是兩回事。如果不分清楚，你會怎麼誤讀一個 92 分？兩者各自讓那個數字怎麼騙你？\n4. 三種評測類型（靜態學科考／人類偏好擂台／agentic 實戰）各量什麼、各自的弱點是什麼？為什麼「弱點不一樣」正是三角驗證有效的原因？\n5. 為什麼三角驗證**不是**萬靈丹？至少講出一種它也治不了的情況。\n6. 從機率的角度：LMArena 的一個名次，為什麼說它「本質是抽樣」？抽樣偏誤和小樣本（信賴區間重疊）各自怎麼讓「第 3 vs 第 7」變得不可信？\n7. GSM1k 個案裡，那「最多 13 個百分點」的掉分量到的是什麼？為什麼 GPT／Claude／Gemini／Llama 幾乎沒掉、而 Mistral／Phi 掉很多——這說明了什麼，又不能過度推論成什麼？\n8. 如果排名每幾個月就洗牌，本書憑什麼還說「各家的差異會持續」？穩定的到底是什麼（提示：不是名次）？\n\n## 延伸閱讀\n\n- **Scale AI, \"A Careful Examination of LLM Performance on Grade School Arithmetic\"（GSM1k 論文，arXiv:2405.00332, 2024）** — 本章招牌個案的原始出處。讀「new benchmark」與「overfitting」那兩節，看他們怎麼用一份全新題集把污染從猜測變成數字（最多 13% 的掉分、Spearman 相關）。這是你日後檢驗任何高分的範本。\n- **\"A Survey on Data Contamination for Large Language Models\"（arXiv:2502.14425, 2025）** — 想把污染這件事看全面，這篇綜述把各種污染型態與偵測方法整理成一張地圖。挑「detection methods」一節讀，建立「換新題重測」之外的其他驗污手段直覺。\n- **LMArena（arena.ai，前 Chatbot Arena / LMSYS）** — 親手去看那個 live 排行榜，特別注意每個 Elo 旁邊的 **± 信賴區間**，感受一下「重疊的名次差別在統計上不存在」是什麼意思。本章機率那節的活教材。\n- **《馴服隨機：機率與統計》（你書架上）** — 抽樣偏誤、信賴區間、為什麼小樣本排名不可靠，那本把這幾個概念講到底。本章只喚醒、不重講；要追根究柢回那本的抽樣與信賴區間章節。\n- **landscape §F（本書內部基準，截至 2026-06）** — 各 benchmark 當前的飽和狀態與「三類型三角驗證」最佳實務的原始整理。日後 benchmark 名次過期時，先回這裡對基準。\n"}, {"id": "ch05-openai", "file": "ch05-openai.md", "group": "Part II — 八家深入（一家一章）", "title": "ch05 — OpenAI：把模型變成產品的人", "md": "# ch05 — OpenAI：把模型變成產品的人\n\n> **本章解決什麼問題**：Part I 把工具備齊了——藍圖是公開的（ch01）、模型是養出來的（ch02）、差異拆成五變數（ch03）、排名測不準（ch04）。從本章起，我們拿著五變數這把尺，逐家拆解強項的成因。第一家是 OpenAI：它有兩個招牌——**定義了消費級 AI 產品**（ChatGPT）與**開創了 reasoning 範式**（o1）。本章回答的是「為什麼是 OpenAI 先做到這兩件事」，主因落在哪幾格；reasoning 的跨家全貌留給 ch14、RLHF 機制留給 ch15、算力數字深挖留給 ch16。\n\n```\nPart I  共通底層（同一張藍圖）\n  ch01 同一張藍圖   ch02 養出來的   ch03 五變數   ch04 測不準\n        |\n        v  拿著五變數這把尺，逐家拆解\nPart II 八家深入 ◄你在這裡\n  ch05 OpenAI      ch06 Google      ch07 Anthropic   ch08 Meta\n  ch09 Mistral     ch10 xAI         ch11 DeepSeek    ch12 Qwen\n        |\n        v  把八家放一起，看差異的橫切面\nPart III 跨家主題（差異的橫切面）\n  ch13 開源vs閉源   ch14 推理競賽    ch15 對齊演化\n  ch16 算力軍備     ch17 多模態      ch18 資料暗河    ch19 可解釋性\n        |\n        v  收束\nPart IV 收束\n  ch20 差異會持續也會收斂   ch21 同一張藍圖，八種風格\n```\n\n## 從你已知的出發\n\n回想你在團隊第一個推「CI 強制 OpenAPI 同步」的時候。在那之前，後端改了 endpoint、前端不知道，等到聯調才爆——這是大家默默忍受的痛，但沒有人把它變成規範。你做的事其實只有一件：把它寫成一條 CI gate，PR 不過就 merge 不了。技術上不難，難的是**你是第一個把「應該這樣」變成「就是這樣」的人**。一旦這條 gate 站穩，後來的人不必再爭論該不該做——他們是踩著你定義的預設值進場的。你定義了規範，別人得跟。\n\n這就是「先行者優勢」最樸素的樣子，而它和「最佳化得最好」是兩回事。你那條 OpenAPI gate 未必是全公司寫得最漂亮的 CI 流程，但它**定義了之後所有討論的起點**。OpenAI 在 LLM 產業裡扮演的，差不多就是這個角色：它未必在每個 benchmark 上都領先（這種領先每幾個月就洗牌一次，ch04 已經拆過），但它兩次**定義了整個產業接下來要長成什麼形狀**——一次是把「研究 demo」變成「人人都用的產品」，一次是把「想久一點會更聰明」變成一條新的 scaling 軸線。本章就是要拆清楚：這兩個「第一個」是怎麼來的，記在五變數的哪幾格上。\n\n## 招牌一：它定義了「消費級 AI 產品」長什麼樣\n\n先講事實，標好日期戳。截至 2026-06，ChatGPT 是**使用者規模的領先者**：OpenAI 在 2026-02 宣布週活躍使用者（WAU）約 **9 億**，比 2025-10 的約 8 億、2025-02 的約 4 億一路翻上來；到 2026 年中，ChatGPT app 跨過了**月活躍 10 億**的門檻——是史上最快達到這個量級的 app。付費訂閱者約 5,000 萬，企業付費使用者超過 900 萬。注意這裡的措辭：這是**規模**的領先，是可以數人頭、有明確口徑的事實，不是「最強模型」那種測不準的排名。我們談的是分發（distribution），不是 benchmark。\n\n為什麼這件事重要到值得當招牌？因為**ChatGPT 不是 OpenAI 第一個好模型，但它是第一個讓一般人「用得起來」的 AI**。在它之前，GPT-3 早就存在，能力驚人，但它活在 API 裡、活在開發者的 playground 裡——你得知道什麼是 prompt、什麼是 temperature、怎麼接 SDK，才碰得到它。2022 年底，OpenAI 做的事情技術上幾乎是「順手」：把已經練好的對話模型包成一個聊天框，免費、不用註冊門檻、打開就能講話。結果這個「順手」的決定，把一個躺在研究院裡的能力，變成了五天破百萬使用者、史上成長最快的消費級產品。\n\n這就是本章第一個被講透的因果個案，我把它叫做「**demo 變分發引擎**」：\n\n```text\n研究院裡的能力（GPT-3，活在 API）\n   │  產品取向：包成零門檻聊天框（免費、打開就用）\n   ▼\n人人都能碰到 → 海量真實對話流量\n   │  這些對話＝下一輪後訓練的偏好訊號與真實分布\n   ▼\n模型被真實使用者「磨」得更好用、更聽話\n   │  更好用 → 更多人用 → 更多訊號（飛輪轉起來）\n   ▼\n分發本身變成護城河：不是模型最強，是「大家在這裡」\n```\n\n你一定對這個飛輪的形狀很熟——它和你維運過的任何一個「使用者規模即優勢」的系統同構。你跑過 500K+ 使用者、10K+ CCU 的系統，知道一件外行不懂的事：**規模不只是負擔，規模是資產**。同樣一個查詢慢，在小系統裡你只能靠經驗猜，在大系統裡你有海量的 trace 可以做 profiling、定位瓶頸（你那次把尖峰 RDS CPU 壓掉 40%，靠的就是真實流量餵出來的瓶頸圖，不是憑空想像）。ChatGPT 的使用者規模，對 OpenAI 來說就是這種資產：每天上億人的真實對話，是任何 benchmark 都模擬不出來的後訓練訊號。模型被產品壓出形狀——這正是五變數第五格「產品取向」最直白的演示：**模型不是先寫好才去找使用者，是被它要服務的產品反過來捏出形狀的**。\n\n## 招牌二：它開創了 reasoning 範式（先押「想久一點」）\n\n第二個招牌，時間更近。截至 2026-06 的事實：OpenAI 於 **2024-09**（o1-preview，2024-09-12）推出 **o1**，業界普遍視為第一個主流的「reasoning model（推理模型）」。它和之前的模型有一個本質差別——**回答前會先「想」一段**：用強化學習（RL）訓練它在思維鏈（chain-of-thought）上做隱性搜尋，而且效能會隨著兩種算力同時上升：訓練期的 RL，以及**推論期的「思考」算力**（test-time compute）。\n\n這裡要用你已經有的直覺來接。你讀過的 AI Infra 書讓你對「推論期」很熟：prefill、decode、KV cache、一個 token 一個 token 吐。傳統模型的推論成本是固定的——問題難或簡單，它都是「想都沒想」就開始吐答案。o1 改的就是這條規矩：**讓它在吐最終答案前，先在內部生成一大段「草稿思路」**，把更多 token、更多算力花在「想」上。在你的語言裡，這幾乎就是「給一個 job 更多 CPU 時間，換更好的結果」——一個延遲換品質的取捨。差別只在，這個取捨以前是寫死在系統參數裡的，現在 OpenAI 把它變成模型能力的一條**新 scaling 軸**：以前大家只會沿「把模型練得更大」這條軸爬，o1 開出了第二條——「**讓它在推論時想得更久**」。\n\n為什麼這也是「定義規範」等級的事？因為在 o1 之前，「讓模型在推論時多花算力思考」不是產業共識；o1 之後，它變成了**桌面門檻（table stakes）**。截至 2026-06，幾乎每一家都有了自己的 reasoning 模式：Google 的 Deep Think、Anthropic 的 extended thinking、DeepSeek 的 R1 線、Qwen 的 hybrid reasoning⋯⋯（跨家全貌與「為什麼會收斂」是 ch14 的主題，這裡只記一筆：**OpenAI 開了頭，DeepSeek 把配方便宜化、民主化**）。這跟你那條 OpenAPI gate 一模一樣：你定義了規範之後，別人不是「要不要跟」的問題，是「不跟就落隊」。\n\n值得強調一個容易被忽略的後續，因為它正是「產品取向反過來塑形模型」的續集。截至 2026-06，OpenAI 已經把舊的 GPT-4 家族與獨立的 o-series（o1、o3、o4-mini）全部**收進 GPT-5 家族**——一個帶 **router（路由器）** 的統一模型，會自動判斷該「直覺快答」（Instant）還是「升級到深度思考」（Thinking），再加一個 **reasoning-effort（推理力度）旋鈕**（none / low / medium / high / xhigh）。\n\n> ⚠️ 點版本名（GPT-5.5、5.6、各種 Instant/Thinking/Pro 後綴）在各家彙整來源之間很混亂、每幾個月就變，本書**不押點版本號**；穩定可講的事實是「**GPT-5 家族 ＋ 統一 router ＋ reasoning-effort 旋鈕**」這個結構（截至 2026-06）。\n\n這個「把 reasoning 和 general 合成一個會自動路由的模型」的決定本身就很有意思：它不是純研究判斷，是**產品判斷**。對一個要服務 10 億月活的產品來說，逼使用者自己選「我要用會思考的那個還是快的那個」是糟糕的體驗——所以乾脆讓模型自己路由。你在分散式系統裡天天做這種事：HPA 根據負載自動擴縮，不是要求使用者手動選 pod 數量。OpenAI 把同樣的「自動路由、藏起複雜度」哲學，從基礎設施搬進了模型本身。**產品要服務誰，決定了模型被養成什麼形狀**——這句話會在本章的成因拆解裡反覆出現。\n\n## 為什麼是 OpenAI 先做到？用五變數層層回答\n\n招牌講完了，現在回答「為什麼是這家」。一個一個變數過。\n\n**產品取向（第五格，主因）**——這是 OpenAI 最強的一格。它從一開始就是**雙邊**布局：消費端的 ChatGPT ＋ 開發者端的 API/平台。把研究能力第一時間推成零門檻消費產品，這個取向決定了它先吃到「規模即訊號」的飛輪。別家當時更像研究機構或雲廠商的一個部門，沒有「先做出一個讓阿嬤也會用的東西」這種產品急迫感。ChatGPT 之所以是 OpenAI 先做出來，不是因為別家技術做不到，是因為**別家當時沒有把它當產品的取向**。\n\n**研究文化·品味（第四格，主因）**——OpenAI 兩次都「先押對方向」。第一次是先押 **RLHF**（人類回饋強化學習，源頭是 2022-03 的 InstructGPT）——在別人還在堆 pretraining 規模時，它先認定「光大不夠，要用人類偏好把模型調得聽話、好用」，這才有了 ChatGPT 那種「會聊天、聽得懂指令」的性格（機制細節見 ch15）。第二次是先押 **test-time compute**——在別人覺得「scaling 就是把模型練更大」時，它先賭「推論期多想一下」這條新軸。這種「比別人早半步認定一個方向值得押」的判斷力，正是第四格「品味」的本體——它最難被抄走，因為你抄得到結果，抄不到「為什麼當初敢這樣賭」。\n\n**算力·基礎設施（第三格，次因）**——OpenAI 長期深度綁定 **Microsoft Azure**（Azure 一度是它的獨家雲）。要把 GPT-3 練出來、把 ChatGPT 撐到上億人用，沒有這層雲關係是不可能的。2025–2026 這個綁定在鬆動：OpenAI 一邊承諾增購約 2,500 億美元的 Azure 服務，一邊明確地在**建立算力獨立性**——這就是 **Stargate**：2025-01 宣布、初期 1,000 億、四年 **5,000 億美元**規模（OpenAI ＋ SoftBank ＋ Oracle ＋ MGX），目標 2029 年前在美國建成 10GW 算力（OpenAI 在 2026-04 宣稱已提前達標）。算力是次因不是主因，因為它**是「能做到」的必要條件，不是「為什麼是這家先想到」的原因**——Azure 讓 ChatGPT 撐得住，但不是 Azure 讓 OpenAI 想到要做 ChatGPT。\n\n> ⚠️ Stargate 不是一帆風順的故事。截至 2026-06：Microsoft 接手了原本要給 OpenAI 的挪威 Narvik 站點（約 3 萬顆 Nvidia 晶片），OpenAI 改為向 Microsoft 租用；OpenAI 也以能源成本與法規為由**喊停了英國的 Stargate**。它的定位是「**雄心勃勃、但有爭議**」（ambitious + contested），而非「順利推進」——任何前沿廠商的算力數字都帶日期戳、帶但書（見 ch04）。\n\n**資料（第一格，次因）**——前面那個飛輪就是資料這格在說話：上億使用者的真實對話，是別家拿不到的後訓練偏好訊號。但它是「**先有產品才有的資料**」，所以根上還是被第五格驅動的——資料優勢是產品取向的**結果**，不是獨立的原因。\n\n**後訓練·對齊（第二格，次因）**——RLHF 把「會接話的 pretraining 模型」變成「聽話、好用的助手」，這格讓 ChatGPT 的性格成形；後來在思維鏈上做 RL 又長出 reasoning。但「先押哪條路」的決定權在第四格（品味），所以這格我記它次因——它是**執行**那兩次押注的手段，不是做出押注的源頭。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| 資料 | △ 次因 | 上億使用者真實對話＝獨家後訓練訊號；但這是產品取向的**結果**，非獨立原因。 |\n| 後訓練·對齊 | △ 次因 | RLHF 塑出「聽話好用」的助手性格、思維鏈 RL 長出 reasoning；是執行押注的**手段**。 |\n| 算力·基礎設施 | △ 次因 | Azure 深度綁定＋Stargate（截至 2026-06，5,000 億／4 年，**雄心但有爭議**）撐住規模；是「能做到」的必要條件，非「為什麼先想到」。 |\n| 研究文化·品味 | ✓ **主因** | 兩次先押對方向：先押 RLHF（InstructGPT 2022）、先押 test-time compute（o1，2024-09）。最難被抄走的一格。 |\n| 產品取向 | ✓ **主因** | 把研究能力第一時間推成零門檻消費產品（ChatGPT），定義了消費級 AI 的形狀並啟動「規模即訊號」飛輪。 |\n\n一句話收束：**OpenAI 強在「定義產品形狀」與「開創 reasoning 範式」，因為產品取向（ChatGPT 定義市場）＋研究文化品味（先押 RLHF、先押 test-time compute）；算力與資料是把這兩格放大的次因。影子是——先行者的包袱。**\n\n### (b) 影子\n\n同一組讓它強的選擇，也讓它暴露在對應的弱點上：\n\n- **先行者的包袱**。第一個定義規範的人，也是第一個被當成靶子的人。你那條 OpenAPI gate 一旦成為標準，所有人對它的抱怨都衝著你來——「為什麼非得這樣」「這條規則卡到我了」。OpenAI 開了 reasoning 的頭，但**範式一旦公開，配方就會被便宜化**：DeepSeek 用 R1（2025-01）證明這套東西可以用便宜得多的方式複現（ch11/ch14 拆）。你定義了規範，紅利吃在最前面，但**護城河也最早開始被填平**。\n- **閉源的張力**。OpenAI 名字裡有「Open」，但前沿模型的權重是封閉的——你下載不到、改不了、也不能 on-prem 自己跑。對重視主權、隱私、可控的企業與政府，這是結構性的門檻（ch13 把開源 vs 閉源拆成兩種世界觀）。\n- **被開放權重從下方夾擊**。當 DeepSeek、Qwen、Mistral 用開放權重 ＋ 極低價格從下方逼近「夠用」的品質時，OpenAI「最強但最貴且封閉」的位置會被持續擠壓。規模領先擋得住一時，擋不住「免費且夠好」的長期侵蝕。\n- **安全與治理爭議**。規模最大、最受矚目，意味著每一次治理決策（內容政策、安全紅線、資料使用）都被放在最大的顯微鏡下。連 Stargate 這種算力擴張都伴隨爭議（英國喊停、挪威被 Microsoft 接手）——**最大的玩家，承受最大的監督壓力與最高的失敗能見度**。\n\n### (c) 何時不成立\n\n這個「強項」在以下情況會被打臉，提醒你這是**截至 2026-06 的快照、不是定律**：\n\n- **換任務軸**：「規模領先」是消費分發的事實，但**換到特定任務就不保證領先**。截至 2026-06，coding/agentic 的口碑常掛在 Anthropic 身上、超長上下文掛在 Google、低成本開放權重掛在 DeepSeek——「誰最強」要分任務，沒有單一冠軍（ch04 已立此規矩）。\n- **被便宜化推翻**：reasoning 範式的開創者光環，會隨著配方擴散而稀釋。截至 2026-06，reasoning 模式已是桌面門檻而非差異化——**先行者紅利有保鮮期**。\n- **被時間推翻**：點版本號、排行榜名次每幾個月洗牌一次；使用者規模也可能被某個更黏的產品分流。本章所有數字（9 億 WAU、10 億 MAU、5,000 億 Stargate）都是 2026-06 的切片，三個月後就該重掃。\n\n## 紙上推演\n\n### 推演題1 [10 分鐘] ★\n\n用你自己的話，對另一個工程師講清楚「demo 變分發引擎」這條因果鏈：為什麼「把 GPT 包成零門檻聊天框」這個技術上不難的決定，會變成 OpenAI 的護城河？護城河到底是哪個東西？\n\n#### 推演解答\n\n關鍵是**把它和「最強模型」分開**。GPT-3 在 ChatGPT 之前就存在、能力就驚人，但活在 API 裡、只有開發者碰得到。ChatGPT 做的事技術上幾乎是順手——免費、零註冊門檻、打開就能講話——但這個產品決定把能力推給了所有人。接下來飛輪轉起來：人人能用 → 海量真實對話 → 這些對話是後訓練的偏好訊號 → 模型被磨得更好用 → 更多人用 → 更多訊號。**護城河不是「模型最強」，是「大家都在這裡用、而且這些使用本身又回頭餵養模型」**。常見誤解是把 OpenAI 的領先讀成「它的模型 benchmark 分數最高」——錯，那是另一回事；穩定的優勢是**分發規模 ＋ 規模產生的資料飛輪**，這對應五變數的產品取向（主因）與資料（次因，且是產品取向的結果）。對帳你自己的系統：你跑過的大規模系統，真實流量本身就是 profiling 與最佳化的資產——這就是「規模即訊號」。\n\n### 推演題2 [12 分鐘] ★★（反事實）\n\n反事實假設：如果 2022 年底 OpenAI **沒有**把對話模型免費開放，而是繼續只放在付費 API 裡給開發者——只改這一個變數，今天的格局會怎麼不同？哪幾格的優勢會消失、哪幾格不受影響？\n\n#### 推演解答\n\n只改「產品取向」這一格（不免費、不零門檻），最直接消失的是**規模飛輪**：沒有上億一般使用者，就沒有海量真實對話，第一格（資料）的獨家後訓練訊號大幅縮水，第五格（產品取向）的「定義消費級 AI 形狀」這個招牌直接不成立——AI 可能還停在「開發者工具」的階段，要更晚才會有某一家做出消費級突破。**不受影響的是第四格（研究文化·品味）**：先押 RLHF、先押 test-time compute 是研究判斷，和「要不要免費開放」是兩件事——所以 o1（2024-09）那條 reasoning 招牌，理論上仍可能由 OpenAI 先做出來。這題的教訓是：**五格不是同生共死的，抽掉產品取向會連帶削弱資料這格（因為資料優勢是它的結果），但研究品味這格是獨立的**。這也解釋了為什麼第四格最難被抄走——它不依賴規模，是純粹的方向判斷力。常見誤解是以為「OpenAI 的一切都來自 ChatGPT 的規模」；其實 reasoning 那條招牌的根在品味格，不在規模格。\n\n### 推演題3 [15 分鐘] ★★★（找破綻）\n\n有人說：「OpenAI 是 reasoning 模型的開創者，所以它在推理任務上一定最強。」請指出這句話裡的兩個破綻。\n\n#### 推演解答\n\n**破綻一：「開創者」不等於「目前最強」。** 開創（截至 2026-06，o1 於 2024-09 開頭）是歷史事實、可以講；「目前在推理任務上最強」是排名，會洗牌、會被便宜化的對手追上（DeepSeek R1 在 2025-01 證明配方可便宜複現）。截至 2026-06，reasoning 模式已是桌面門檻、不是差異化——把「先做出來」偷換成「現在最強」，是把一個帶日期戳的歷史事實，誤當成一條沒有保鮮期的定律。**破綻二：「推理任務」不是單一維度。** 數學競賽（AIME）、研究生科學（GPQA）、agentic coding（SWE-bench）量的是不同東西，而且 GPQA、MMLU-Pro 這類頂端 benchmark 已接近飽和、擠在一起分不出高下（ch04 拆過）。「最強」必須分任務、分 benchmark，還要看那個 benchmark 有沒有被污染（contamination）。正確的講法是：「截至 2026-06，OpenAI 以**開創 reasoning 範式**著稱，並在某些推理 benchmark 上名列前茅，但那些 benchmark 有飽和與污染的侷限，且名次每幾個月變動。」——沒有絕對排名，只有帶日期戳的「以⋯⋯著稱」。\n\n## 自我檢核\n\n講得出來才算過關；講不清楚就是還沒懂。\n\n1. **為什麼**「ChatGPT 是規模領先者」是個能數人頭的事實，而「GPT 是最強模型」不是？兩者的差別在哪？（提示：分發 vs 排名）\n2. 「demo 變分發引擎」這條飛輪，**如果**OpenAI 當初不免費開放，會斷在哪一環？哪一格優勢會連帶消失？\n3. 為什麼說「產品取向反過來塑形了模型」？用 GPT-5 家族的 router（自動路由 Instant/Thinking）當例子講一遍——這個決定為什麼是產品判斷而不只是研究判斷？\n4. o1 開的「test-time compute」這條新 scaling 軸，和原本「把模型練更大」那條軸有什麼本質差別？為什麼說它像「給 job 更多 CPU 時間換更好結果」？\n5. 在 OpenAI 的五格歸因裡，為什麼**算力（Azure/Stargate）只是次因不是主因**？（提示：必要條件 vs 「為什麼是這家先想到」）\n6. 先行者優勢的**影子**是什麼？為什麼「定義了規範」同時意味著「護城河最早開始被填平」？舉一個本章的具體例子。\n7. **如果不**用「截至 2026-06／以⋯⋯著稱」的句式，而直接寫「OpenAI 是最強的 AI 公司」，會出什麼問題？為什麼「以⋯⋯著稱＋日期戳」的講法更站得住？\n\n## 延伸閱讀\n\n- **OpenAI, \"Learning to reason with LLMs\"（o1 發表，2024-09）** — https://openai.com/index/learning-to-reason-with-llms/ ——reasoning 範式的第一手起點。讀「test-time compute 怎麼隨思考量上升」那段，建立「想久一點＝更聰明」的直覺（ch14 會展開跨家全貌）。\n- **Ouyang et al., InstructGPT（RLHF at scale，OpenAI，2022-03，arXiv:2203.02155）** — https://arxiv.org/pdf/2203.02155 ——ChatGPT「聽話、好用」性格的方法源頭。讀 abstract 與「reward model 怎麼從人類偏好排序訓練出來」即可（機制細節留給 ch15）。\n- **OpenAI, \"Announcing the Stargate Project\"（2025-01）** — https://openai.com/index/announcing-the-stargate-project/ ——算力獨立性布局的第一手宣告。讀規模與目標，再對照本章的「⚠️ 雄心但有爭議」但書（英國喊停、挪威被 Microsoft 接手），體會為什麼算力數字一律要帶日期戳（ch16 深挖）。\n- **demandsage, \"ChatGPT Statistics\"（持續更新）** — https://www.demandsage.com/chatgpt-statistics/ ——使用者規模數字的彙整來源（9 億 WAU、10 億 MAU 的出處之一）。當作「規模＝可數事實」的對照，但記得這類彙整每幾個月就過期，是 ⚠️ 快速變動。\n"}, {"id": "ch06-google-deepmind", "file": "ch06-google-deepmind.md", "group": "Part II — 八家深入（一家一章）", "title": "ch06 — Google DeepMind：長上下文、多模態與 TPU 的垂直整合", "md": "# ch06 — Google DeepMind：長上下文、多模態與 TPU 的垂直整合\n\n> **本章解決什麼問題**：上一章拆完 OpenAI 把模型變成大眾產品。這一章換 Google DeepMind，回答五變數記分卡裡「**算力·基礎設施**」這一格如何主導一家的性格——為什麼「超長上下文」與「原生多模態」會長在 Google，而不是別家。本章的招牌因果鏈只有一條，但會講到底：**自研 TPU 的垂直整合，讓長序列訓練／服務的成本可控，於是長上下文才從「能 demo」變成「能規模化出貨」**。這條鏈直接接回你那本 AI Infra 書算過的 KV cache 成本。後面 ch16（算力軍備）會把 TPU vs GPU 的全貌攤開，ch17（多模態）會把跨家多模態擺一起；本章只負責 Google 這一家，不越界。\n\n## 從你已知的出發\n\n你做過一個別人團隊很少做的決定：**自建一套輕量框架與多層 cache library**，全團隊採用。當時可以直接用現成的全家桶，但你選擇自己掌握那一層。回報是什麼？是**你能做別人做不到的最佳化**——因為快取的失效策略、序列化格式、記憶體配置全在你手上，你不用遷就任何上游函式庫的預設，可以針對你的流量形狀去調。那次尖峰 RDS CPU 降 40% 的招牌敘事，有一部分就是因為你掌握了整條 stack，看得到別人看不到的瓶頸。\n\nGoogle 對矽晶片做的，是同一件事，只是放大到一個荒謬的尺度。當所有前沿實驗室都在跟 NVIDIA 搶 GPU、遷就 CUDA 生態、付 NVIDIA 的毛利時，Google 從 2015 年起就自己設計 **TPU（Tensor Processing Unit）**——專為矩陣乘法打造的晶片。這就是「自建 vs 採購」這個你每天在做的取捨，押到了最底層的硬體上。\n\n而這個取捨的回報，恰好落在一個你最有直覺的地方：**長序列的成本**。你那本 AI Infra 書把 attention 的 KV cache 算到底了——序列越長，KV cache 佔的記憶體與頻寬越爆炸，推論成本不是線性而是越拖越重。所以「我要不要支援很長的上下文」，對任何實驗室來說，本質上是一道**成本題**，不是一道演算法題。誰能把這道成本題壓下來，誰就敢把上下文窗口開大。本章要說的就是：Google 之所以敢開到別人不敢開的長度，主因不在他想到了什麼別人想不到的演算法，而在**他掌握了整條矽到模型的 stack**。\n\n## 以什麼著稱：超長上下文與原生多模態（截至 2026-06）\n\n先講「是什麼」，標好日期戳，再回頭問「為什麼」。\n\n截至 2026-06，Google DeepMind 的 Gemini 系列以兩件事著稱：**很長的上下文窗口**，以及**原生多模態**（文字、影像、音訊、影片在同一個模型裡，不是事後接上去的）。版本狀態要分清楚，因為「已出貨」與「announced 但還沒 GA」是兩回事：\n\n- ✅ **Gemini 3** 於 2025-11-18 發表（Gemini 3 Pro ＋ Gemini 3 Deep Think）；**Gemini 3.1 Pro** 於 2026-02-19 發表。這兩個是已出貨的當前主力。\n- ⚠️ **Gemini 3.5 Pro** 在 2026-05-19 的 Google I/O 揭露，宣稱要做到 **200 萬 token（2M）的上下文窗口** ＋「Deep Think」推理，GA 目標訂在 2026 年 6 月。但截至 2026-06-09 它**還沒 GA、也還沒有獨立第三方 benchmark**。所以這個 2M 要當成「**頭條級的企圖**」來讀，不能當成既成事實。\n- ✅ 但「長上下文是 Google 招牌」這句話本身是**站得住的、durable 的**——因為早在 2024 年，**Gemini 1.5 Pro 就已經真的出貨過 2M token 的窗口**（2024 年 6 月對所有開發者開放）。也就是說，長上下文不是 2026 才喊的新口號，是 Google 兩年來持續端得出來的東西。\n\n> ⚠️ 截至 2026-06，Gemini **以長上下文與原生多模態著稱**——不等於「上下文最長／最強的模型」。至於 benchmark 名次，每幾個月就洗一次牌（見 ch04），而且 MMLU-Pro、GPQA 這類榜在頂端早就擠到分不出高下（接近飽和）。「著稱」是穩定的，「名次」是會過期的。\n\n第二個招牌——**原生多模態**——也要說清楚跟別家差在哪。很多模型的多模態是「後接」的：先有一個文字模型，再黏一個影像編碼器上去（late fusion）。Google 走的是「原生」路線——從預訓練階段就把多種模態一起餵進同一個模型。\n\n為什麼這條路是 Google 的「直覺」，而不是別家的？這要從它手上有什麼、又非得服務什麼說起。一方面，Google 坐擁別家沒有的視覺／語音／YouTube 語料，加上 DeepMind 那層橫跨視覺與語音的研究遺產；另一方面，它要餵的產品是 Search 與 Workspace——這些產品天生就得**直接對影像、聲音做語義理解**（你拍張照片問「這是什麼」、你對 Gmail 裡的附件提問），而不是只處理打好的文字。手上有多模態語料、要服務的產品又逼著它原生理解多模態——這兩股力量合起來，最自然的直覺就是：**把各模態的 token 投影到同一個潛在空間（latent space）做聯合訓練**，讓模型從第一天就在同一個表徵裡同時看見文字、影像與聲音，而不是事後黏一個獨立的視覺模型上去。為什麼不黏？因為 late fusion 在「文字模型」與「影像編碼器」的接縫處，資訊得先被各自壓縮、再勉強對齊——**源頭就有一次拼接的資訊流失**；原生路線從一開始就讓各模態在同一空間裡互相校準，從根上避開了這道接縫。\n\n這個選擇後面 ch17 會把跨家多模態擺一起，本章只記一筆：原生多模態與長上下文，其實是**同一個算力故事的兩面**。影片是什麼？影片就是一條極長的 token 序列（一段影片可以是上百萬 token）。所以「能吃很長的序列」與「能原生吃影片」，本質上需要的是同一種能力：**把超長序列的訓練與服務成本壓到可規模化**——而那，又回到了 TPU 撐起的成本結構。這就把兩個招牌，收束回同一條因果鏈。\n\n## 為什麼是 Google：把長上下文當成一道成本題\n\n現在用五變數這把尺，層層回答「為什麼是這家」。先講主因——**算力·基礎設施**。\n\n### 自研 TPU：把矽晶片這一層也垂直整合\n\n截至 2026-06，Google 最新的訓練／推論晶片是 **Ironwood，也就是 TPU v7**（約 2025-11 GA）。一個 pod 可以串到 **9,216 顆**液冷晶片，整 pod 約 **42.5 ExaFLOPS（FP8）**，每顆晶片 **192GB HBM**；相較前一代 Trillium，算力約提升到 5 倍量級。這些數字本身不是重點（ch16 會深挖），重點是它們說明了一件事：**Google 不是 NVIDIA 的客戶，Google 是自己晶片的設計者兼唯一大用戶。**\n\n這就是「垂直整合」的真正意思。回到你的橋接：你自建 cache library，所以你能跨整條 stack 做最佳化；Google 自研 TPU，所以 **DeepMind 的模型工程師可以跟 TPU 的晶片工程師一起設計**——模型的某個算子吃硬體吃得不順，可以反過來改下一代晶片的記憶體布局或互連；晶片有某個特性，模型架構可以順著它長。別家做不到這件事，因為別家的晶片是 NVIDIA 設計的、是黑盒、要排隊買、還要付毛利。\n\n⚠️ 這裡要插一個誠實的但書：Google 官方引用過「每顆 Ironwood 的全包 TCO 比一台 GB200 server 低約 44%」這種數字，以及外界常傳的「Google 有上千萬顆 TPU」——這些都是**廠商口味、量級級、未經獨立稽核**的說法。正確的讀法是：拿它當「方向」（自研讓成本結構不同），不拿它當「精確事實」。\n\n### 為什麼自研晶片，恰好兌現成長上下文\n\n這就是本章要講透的那一條因果鏈。一步一步來：\n\n```\n自研 TPU（Ironwood, pod=9216 顆）\n      |\n      v  掌握整條矽到模型的 stack，能協同設計\n長序列的「訓練 + 服務」成本被壓到可控\n      |\n      v  接回你 AI Infra 書算過的 KV cache 帳\n長上下文從「能 demo」變成「能規模化出貨」\n      |\n      v  影片 = 超長 token 序列，同一種能力\n原生多模態與 2M 窗口，長在同一條鏈上\n```\n\n為什麼成本是關鍵？因為長上下文真正的瓶頸，不在「模型能不能讀懂 100 萬 token」，而在「**我有沒有辦法用得起、服務得起這 100 萬 token**」。你那本書算過：序列拉長，KV cache 的記憶體與頻寬需求會脹得很快，attention 的計算量隨序列長度增長也不便宜。對一個要服務海量使用者的實驗室來說，把窗口開到 2M，等於每一個用滿窗口的請求都吃掉一大塊昂貴的記憶體與算力。**如果你的每一片算力都要跟 NVIDIA 用市場價買、還要排隊，這道帳很可能算不過來，你就只能把窗口開小一點、或只給少數人用。**\n\nGoogle 不一樣。它的算力是自家設計、自家機房、按成本計而非按 NVIDIA 售價計的；Ironwood 一個 pod 就是 1.77PB 等級的共享 HBM、用光交換把整個 pod 串成一台機器——這種記憶體規模與互連，正好是「把超長序列攤在很多晶片上一起算」最需要的東西。所以同樣一道「2M 窗口要不要開」的成本題，**Google 算得過來、別家算得吃力**。這不是 Google 比較聰明，是 Google 的成本結構不一樣。掌握整條 stack，讓他能做別人做不到的最佳化——這正是你自建框架的回報，放大到一個國家級基礎設施的尺度。\n\n### 研究文化·品味：不是只會 scale LLM 的實驗室\n\n算力是主因，但不是唯一的因。Google DeepMind 還有一張別家沒有的底牌——**研究縱深**，這是「研究文化·品味」這一格。\n\nDeepMind 不是 LLM 熱潮才出現的公司。它的血統裡有兩個里程碑：**AlphaGo**（2016 年擊敗李世乭，世界第一次看到 RL ＋ 搜尋打爆人類頂尖棋手）、以及 **AlphaFold**（蛋白質結構預測；AlphaFold2 在 2020 年解決了一個五十年的難題，Demis Hassabis 與 John Jumper 因此共享 **2024 年諾貝爾化學獎**，與 David Baker 同列）。\n\n這件事為什麼跟「為什麼長上下文長在 Google」有關？因為它代表 Google 內部有一群**真的懂強化學習與大規模科學運算、而且做過「不是聊天機器人」的硬東西**的人。很多 2022 年後才從「把 LLM scale 大」起家的實驗室，沒有這層底。當「推理模型」這個範式（給模型更多思考時間、對思維鏈做 RL，見 ch14）成為 2024 年底以來的主流，這種 RL ＋ 搜尋的 DNA 就不是裝飾——Gemini 的「Deep Think」推理模式，正是站在這層研究底上。研究文化是五變數裡**最難被抄走**的一格：你可以抄架構、抄訓練法、甚至下載別人的開放權重，但你抄不走一個累積了十年的研究團隊與品味。\n\n### 產品取向：被 Search 的規模逼出來的效率\n\n最後一格——**產品取向**——說明了 Google 為什麼**非得**把成本壓到極致，而不只是有能力壓。\n\n別家的旗艦模型，主要服務的是一個 app（ChatGPT）或一個 API。Google 的模型要塞進的，是地表使用者觸及面最大的一組產品：**Search（AI Overviews / AI Mode）、Workspace（Gmail、Docs）、Android、以及 Gemini app**（Google 自稱約 750M MAU；⚠️ 分析師預測 2026 Q3 破 10 億是預測值，非事實）。\n\n當你的模型要在 **Search 的規模**上跑——也就是全球每天幾十億次查詢——任何一點點單次推論成本，乘上這個量級，都是天文數字。這就反過來逼出一種**效率強迫症**：你沒有「先不管成本、做出來再說」的奢侈，你從第一天就被產品的規模壓著，必須把每一 token 的成本擰到最乾。**這個產品壓力，又再次把答案指回 TPU**：要在 Search 規模上又快又便宜地服務，自研晶片不是選項，是必需品。算力、研究底、產品取向，三格在 Google 身上不是各自獨立，而是互相咬合的——產品逼出效率需求，效率需求由自研晶片滿足，自研晶片又讓研究團隊能做長序列這種別人做不起的方向。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| 資料 | △ 次因 | Search／YouTube／Workspace 的多模態資料是真實優勢（尤其影片、影像），但不是「長上下文長在 Google」這個現象的主因；主因在成本結構而非語料。 |\n| 後訓練·對齊 | — | Deep Think 等推理後訓練有貢獻，但對齊不是 Google 的招牌差異點（那是 ch07 Anthropic 的格）；本章不記為主因。 |\n| 算力·基礎設施 | ✓ **主因** | **自研 TPU（Ironwood, pod=9216 顆）垂直整合 → 長序列訓練／服務成本可控 → 敢把上下文開到別家不敢開的長度。這是本章那條被講透的因果鏈。** |\n| 研究文化·品味 | ✓ **主因** | DeepMind 的 AlphaGo／AlphaFold（2024 諾貝爾）RL ＋ 科學運算血統，是「不只是 LLM scaling」的研究縱深，餵養 Deep Think 推理，且最難被抄走。 |\n| 產品取向 | ✓ **主因** | 要服務 Search／Workspace 的「行星級」規模，逼出效率強迫症，反過來再強化「必須自研晶片」的需求——產品壓力與算力選擇互相咬合。 |\n\n一句話收束：**Gemini 強在長上下文與原生多模態，因為〔算力·基礎設施＋研究文化·品味＋產品取向〕三格咬合；影子是太寬的戰線與消費者端的節奏。**\n\n### (b) 影子\n\n掌握整條 stack、又要餵那麼多產品，代價跟著來：\n\n- **產品線太多、整合包袱重。** 同一套底層模型要塞進 Search、Workspace、Android、Cloud、獨立 app……每條線有自己的需求、自己的團隊、自己的發表節奏。這跟你維護一個被全公司採用的 cache library 是同一種痛：採用率越高，每次改動要顧的相容性與下游就越多，你會慢下來。戰線太寬，容易每件事都做、每件事都不是最快。\n- **消費者端「起個大早、趕個晚集」的敘事。** Google 是 Transformer 那篇 2017 論文的娘家（〈Attention Is All You Need〉出自 Google），技術底深得很早，但在**消費者心智佔有**上，卻是被 OpenAI 的 ChatGPT 先定義了市場（見 ch05），Google 長期被貼上「技術領先、產品落後一步」的標籤。技術最早、產品未必最先到使用者面前，這是大公司整合包袱的典型副作用。\n- **自研晶片的反向風險。** 垂直整合的另一面是：你把自己綁在自己的矽路線上。NVIDIA 生態有全世界的工具鏈、函式庫、人才在替它最佳化；TPU 這條路，外部生態薄得多，等於你要自己扛起整個軟硬體棧的維護。這跟你自建框架的影子一模一樣——自己掌握 stack 換來最佳化空間，但也換來「沒有上游幫你修、所有坑自己填」的長期維護成本。\n- **TCO 數字是廠商口味（⚠️）。** 前面那個「比 GB200 低 44%」「上千萬顆 TPU」都是 Google 自家或外界估的、量級級、未經獨立稽核的數字。強項是真的，但**具體省多少錢、有多少顆晶片，別當精確事實傳播**。\n\n### (c) 何時不成立\n\n這個「長上下文／多模態強項」會在什麼情況被打臉？\n\n- **被任務打臉**：長上下文不等於「能用好長上下文」。窗口開到 2M，不代表模型在第 180 萬個 token 的位置還記得住、推得對——「needle in a haystack」測得到的是檢索，測不太到跨整段長文的深層推理。如果任務是嚴謹的多步推理、或純 coding 的 agentic 可靠度，截至 2026-06 別家（如 Anthropic 的 coding 口碑，見 ch07）在各自的軸上也各擅勝場。**沒有單一冠軍**，這是全書的脊椎。\n- **被別家打臉**：長上下文這條路，別人正在用不同方法逼近。DeepSeek 的 MLA（把 KV 壓進低維潛在空間，見 ch11）是從**演算法**那一側砍長序列成本，不需要自研晶片也能把上下文做長、做便宜。Google 是「用硬體買成本」，DeepSeek 是「用演算法省成本」——同一道成本題，兩條解法。如果演算法那條路被證明夠好、夠通用，自研晶片的成本優勢就會被部分抵銷。\n- **被時間打臉**：本章所有版本號都是 **2026-06 的快照**。Gemini 3.5 Pro 的 2M 窗口截至 2026-06-09 還沒 GA、沒有獨立 benchmark；它可能如期出、也可能延、也可能出來表現不如宣稱。三個月後（見 maintenance 重掃）這些數字十之八九要更新。記住：穩定的是「Google 把長上下文當成本題、用自研晶片解」這個**成因結構**，會過期的是任何一個具體窗口長度與名次。\n\n## 紙上推演\n\n### 推演題1 — 口頭重講那條因果鏈 **[10 分鐘]** ★\n\n不准看書，對著一個只懂後端、沒碰過 ML 的同事，用 60 秒講清楚：為什麼「自研 TPU」會讓「長上下文」變得可行？中間的橋是什麼？\n\n#### 推演解答\n\n橋是**成本**，而且要點名是哪一種成本。完整的鏈是：自研 TPU → Google 掌握整條矽到模型的 stack、按成本而非市場價取得算力 → 長序列推論最貴的東西（KV cache 的記憶體與頻寬，接你 AI Infra 書）被壓到可控 → 於是「開 2M 窗口」這道成本題算得過來 → 長上下文從 demo 變成能規模化出貨。\n\n常見誤解：以為「長上下文是個演算法突破」。不是。長上下文主要是一道**成本／工程**題，不是一道「想不想得到」的題。別家不是想不到要開大窗口，是開大了用不起、服務不起。Google 的優勢是**成本結構**，不是聰明才智。能把這句話講出來，就過關了。\n\n### 推演題2 — 翻譯：把現象對應回五變數 **[10 分鐘]** ★★\n\n有人說：「Gemini 多模態強，是因為 Google 有 YouTube，影片資料多。」這句話對嗎？把它對應回五變數，指出它對在哪、漏在哪。\n\n#### 推演解答\n\n對了一半，漏了主因。YouTube／影像資料確實是真實優勢，這對應到**資料**那一格——所以本章把資料記為 △ 次因，不是留白。但這句話把「資料」當成了**唯一**或**主**因，漏掉了更關鍵的一格：**算力·基礎設施**。\n\n關鍵反問：就算別家也弄得到大量影片資料，他**訓練得起、服務得起**嗎？影片是超長 token 序列，吃的是「把超長序列攤開算」的能力，而那回到 TPU 的成本結構。所以正確的歸因是：資料（△ 次因）讓 Google **有東西可餵**，但算力（✓ 主因）才讓他**餵得起、用得起**。只講資料，等於把一條三格咬合的因果鏈，砍成一格——這正是要避免的「單因謬誤」。\n\n### 推演題3 — 對帳：你的自建框架 vs Google 的自研晶片 **[15 分鐘]** ★★\n\n把你當年「自建 cache library／輕量框架，全團隊採用」這個決定，跟 Google「自研 TPU」放在同一張取捨表上對帳。回報是什麼？影子是什麼？兩者結構一不一樣？\n\n#### 推演解答\n\n結構幾乎一樣，只是尺度差了好幾個數量級。\n\n- **回報**：兩者都是「掌握整條 stack → 能做別人做不到的最佳化」。你掌握快取層 → 針對自家流量形狀調，尖峰 RDS CPU 降 40%；Google 掌握矽晶片層 → 模型與晶片協同設計，長序列成本壓到敢開 2M 窗口。回報的**形狀**一模一樣：自己掌握的那一層，就是別人遷就上游而你不必遷就、因而能擠出額外效能的地方。\n- **影子**：兩者也都得自己扛維護。你自建框架 → 沒有上游社群幫你修 bug、補文件，所有坑自己填，人一走可能變技術債；Google 自研 TPU → 外部生態遠比 NVIDIA／CUDA 薄，整個軟硬體棧得自己撐。**自建的回報與影子是同一枚硬幣的兩面**：你掌握得越深，能最佳化的越多，要自己扛的也越多。\n\n差異只在：你那層的「上游」是開源函式庫，Google 那層的「上游」是 NVIDIA 與整個 GPU 生態。但「自建 vs 採購」的取捨邏輯，從你的 RDS 一路同構到一個國家級的 TPU 機房。能看出這個同構，你就真的把「算力·基礎設施」這一格讀懂了。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼說「長上下文主要是一道成本題，而不是一道演算法題」？這道成本最貴的部分是什麼（用你 AI Infra 書的詞）？\n2. 「自研 TPU → 長上下文可行」這條鏈，中間少了哪一步就接不起來？（提示：成本被壓到「可控」與「可規模化出貨」是兩件事嗎？）\n3. 如果 Google 沒有自研 TPU、改成跟大家一樣跟 NVIDIA 買 GPU，它還能不能是「長上下文最著稱的那家」？為什麼？\n4. DeepMind 的 AlphaGo／AlphaFold 血統，為什麼算「研究文化」這一格、而且是最難被抄走的一格？它跟「長上下文」這個招牌有什麼關係？\n5. 為什麼「要服務 Search 的規模」這個**產品**壓力，反而會強化 Google 必須**自研晶片**的需求？這兩格是怎麼互相咬合的？\n6. Google 的招牌影子是什麼？「起個大早趕個晚集」這個敘事，跟「產品線太多／整合包袱」是同一個成因嗎？\n7. 為什麼 DeepSeek 的 MLA 是對「Google 自研晶片優勢」最直接的反例？同一道成本題，兩家分別從哪一側解？\n8. 為什麼本章堅持寫「Gemini 以長上下文著稱」而不是「Gemini 上下文最長／最強」？這跟 ch04 的什麼結論一致？\n\n## 延伸閱讀\n\n- **Ironwood: The first Google TPU for the age of inference**（blog.google）——Google 官方介紹 TPU v7 的 pod 規模（9,216 顆）、HBM 與互連；讀「pod 怎麼串成一台機器」那段，理解長序列為什麼需要這種共享記憶體規模。⚠️ 性能對比數字帶廠商口味，當方向不當精確值。\n- **Gemini 1.5 Pro：a million token context window**（cloud.google.com）＋ 2024-06 對所有開發者開放 2M 窗口的開發者部落格——證明「長上下文是 Google 兩年來持續端得出的東西、不是 2026 新口號」這個 durable 事實。\n- **Demis Hassabis & John Jumper awarded Nobel Prize in Chemistry**（deepmind.google / nobelprize.org）——AlphaFold 與 2024 諾貝爾化學獎；讀來感受 DeepMind「不只是 LLM scaling」的研究縱深從何而來。\n- **Hoffmann et al. 2022「Chinchilla」**（NeurIPS）——出自 DeepMind 的 compute-optimal scaling 結論（資料與參數要等比放大，約 20 token/參數）；本章雖不展開，但它是 DeepMind 研究品味影響全產業的另一個證據（ch02 已用）。\n- **〈Attention Is All You Need〉**（2017, Google）——Transformer 的娘家論文。對照本章「起個大早趕個晚集」的影子讀：技術最早出自 Google，消費者市場卻被別家先定義，是大公司整合包袱的經典案例。\n"}, {"id": "ch07-anthropic", "file": "ch07-anthropic.md", "group": "Part II — 八家深入（一家一章）", "title": "ch07 — Anthropic：對齊優先、可解釋性與 agentic/coding 口碑", "md": "# ch07 — Anthropic：對齊優先、可解釋性與 agentic/coding 口碑\n\n> **本章解決什麼問題**：上一章拆完 Google 的「算力·基礎設施」主導性格。這一章換 Anthropic，回答的是一條反直覺的因果：一家把**安全與對齊當第一性原則**的實驗室，為什麼反而長出了「聽話、好用、適合 agent/coding」的口碑？本章的招牌因果鏈只有一條，但會講到底——**Constitutional AI 用「給憲法→自我批評→自我修正」的迴路，把對齊變成可規模化的工程，而這套「照規範自我修正」的訓練取向，外溢成了 coding/agentic 任務上的可靠度**。對齊方法的跨家譜系（RLHF→Constitutional AI→RLVR）留給 ch15；可解釋性與安全的跨家全貌留給 ch19。本章只負責 Anthropic 這一家，與其他七家同等對待、不當全書主角。\n\n## 從你已知的出發\n\n你在團隊推過一件事，回報遠超它的技術含量：**把規範寫成一份 lint／規則檔，讓 CI 自動把關**。在那之前，「程式碼風格該怎樣、哪些寫法不准」是靠資深的人在 code review 裡逐條挑——這很慢、很主觀、而且**不可規模化**：團隊一變大，人工 review 就成了瓶頸，挑到的東西還因人而異。你做的事是把「我們團隊認為對的寫法」抽成一份明文的規則檔，然後讓 CI 在每個 PR 上自動跑。從此把關這件事**不再依賴某個資深工程師當下有沒有空、心情好不好**——規則寫在檔案裡，機器照著執行，整個團隊踩著同一條底線進場。\n\n這裡有個關鍵轉折，值得你停一下：你不是把「人」換成「機器」，你是把**「人的判斷」先固化成一份文件，再讓自動化去執行那份文件**。規則檔本身是人寫的、是人的價值判斷；CI 只是不知疲倦地照著它跑。這個「**把判斷寫成憲法，再讓系統照憲法自動把關**」的形狀，正是本章主角 Anthropic 最招牌的方法——Constitutional AI（憲法式 AI）——的精神。差別只在，他們把關的不是程式碼風格，是**模型的行為**：哪些回答算有害、哪些算誠實、哪些算有幫助。傳統做法是請一大群人逐條標註「這個回答好不好」（人工 code review 的等級），Anthropic 的做法是先寫一份「憲法」，讓**模型照著憲法自己批評、自己修正自己的回答**（CI 自動把關的等級）。\n\n本章要拆清楚兩件事：第一，這套「對齊」的方法到底怎麼運作；第二——也是更反直覺的——**為什麼這種對安全的執著，最後反而養出了 coding 與 agentic 任務上的好口碑**。\n\n## 以什麼著稱：coding/agentic 可靠度，與對齊·可解釋性的研究底（截至 2026-06）\n\n先講「是什麼」，標好日期戳，再回頭問「為什麼」。\n\n截至 2026-06，Anthropic 的 Claude 系列以兩組東西著稱，要分開講，因為它們屬於不同層次：\n\n- **🟡 reputation 層（最招牌的口碑）**：**coding 與 agentic 任務的可靠度**。具體的旗艦產品面是 **Claude Code**（在終端機裡把寫程式的工作整段委派給模型）與 computer-use（讓模型操作電腦）。口碑集中在「**長程多步驟的自主性**」（long-horizon multi-step autonomy）與「**指令遵循**」（instruction-following）——也就是：給它一個橫跨很多步、要它自己規劃、用工具、檢查自己成果的髒任務，它跑得相對穩。\n- **✅ 研究底層（可被引用的硬事實）**：**Constitutional AI / RLAIF**（Bai et al., 2022-12，arXiv:2212.08073），以及一條真實的**可解釋性（interpretability）研究線**——被形容為「**模型的神經科學**」。\n\n當前的模型版本，要分清楚「已穩定出貨」與「非常新、還在變動」：\n\n- ✅ **Claude Opus 4.8**（2026-05-28 發表）——定位在複雜推理、長程 agentic coding、高自主性工作的頂層。\n- ✅ **Claude Sonnet 4.6**（2026-02-17）——coding 接近 Opus，但指令遵循與工具可靠度更好；✅ **Claude Haiku 4.5**（2025-10-15）——最快、最便宜的一層。\n- 🟡 **Claude Fable 5 ＋ Claude Mythos 5**（2026-06-09 發表，號稱「Mythos-class」、Anthropic 至今最強）。Fable 5 是帶安全護欄的公開版；Mythos 5 是同一個模型、拆掉部分護欄、限制給 **Project Glasswing**（先是資安專業人士，後續才開放給部分生物研究者）。\n\n> ⚠️ Fable 5／Mythos 5 是**非常新**的事實（2026-06）。而且 Fable 5 在 **2026-06-23 從 Pro/Max/Team/Enterprise 訂閱方案中被下架**、改成用量計費——官方說法是**容量限制（capacity constraints），不是安全事件**。這條會很快變動，本書只記一筆、標清楚日期戳，不押它的長期狀態（這個「容量晃動」本身也是本章影子的一部分，後面成因拆解會接回來）。\n\n> ⚠️ 截至 2026-06，Claude **以 coding/agentic 可靠度著稱**——不等於「最強的 coding 模型」。至於 benchmark 名次，每幾個月就洗一次牌（見 ch04），而 SWE-bench 這種 agentic coding 榜也會被污染（contamination）與過擬合。「以…著稱」是穩定的，「名次」是會過期的。OpenAI 同樣有 agentic coding 的招牌（見 ch05），這不是單一冠軍的故事。\n\n## 招牌方法：Constitutional AI 的「給憲法→自我批評→自我修正」迴路\n\n這是本章要講透的因果個案。先把這套方法**整條鏈拆開**，因為它就是 Anthropic 性格的源頭。\n\n傳統的對齊主流是 **RLHF**（人類回饋強化學習，源頭是 OpenAI 2022-03 的 InstructGPT，見 ch05/ch15）：請大量真人去比較「A 回答跟 B 回答哪個比較好／比較無害」，用這些人類偏好訓練一個 reward model（獎勵模型），再用它去 RL 那個語言模型。問題出在哪？出在**「請大量真人」這一步不可規模化、又昂貴、又不一致**——這正是你做 lint/CI 之前，那種「靠資深工程師逐條人工 code review」的痛，只是放大到「要請人去讀海量可能有害的內容並打分」的尺度。\n\nConstitutional AI（Anthropic, 2022-12）的核心改動，就是把「人逐條打分」換成「**模型照一份明文憲法自評**」。它分兩段，分別用到對齊的兩道基本工序，先用一兩句把這兩個詞講清楚（你後面會反覆碰到）：**SFT（監督式微調，supervised fine-tuning）**＝直接給模型「標準的輸入→輸出」配對，讓它照著模仿；**RL（強化學習，reinforcement learning）**＝讓模型自己生出多個版本，再由一套評分機制給獎懲，逼它往高分的方向調整。（完整對齊方法譜系見 ch15。）有了這兩個詞，下面這兩段對照你的 CI 直覺會很好懂：\n\n```\n第一段 SL-CAI（監督式：自我批評 → 自我修正）\n  給模型一個（可能會誘出有害回答的）提問\n        |  模型先給出初版回答\n        v\n  「拿一條憲法原則當尺，批評自己剛剛的回答哪裡違規」\n        |  自我批評（self-critique）\n        v\n  「照這條批評，把回答改寫成更符合原則的版本」\n        |  自我修正（self-revision），反覆換不同原則多輪\n        v\n  收集「修正後的好回答」當教材，去微調模型（SFT）\n\n第二段 RL-CAI / RLAIF（用 AI 回饋取代人類回饋）\n  讓上一段微調後的模型，對同一個提問生成兩個回答\n        |  另一個「裁判模型」照一條憲法原則挑「哪個比較無害」\n        v\n  這些「AI 給的偏好標註」訓練出 preference model（取代人工標註）\n        |  preference model 當 reward\n        v\n  用它去 RL 主模型 → 成品（對齊度高、且幾乎沒用到人工逐條標註）\n```\n\n把它對回你的世界：**憲法 = 那份 lint/規則檔（人寫的價值判斷，固化成明文）；自我批評→自我修正 = CI 在每個 PR 上自動跑規則、把不合規的地方標出來並要求改；RLAIF = 你不再請資深工程師逐條 review，而是讓自動化照規則檔把關**。人類的角色從「逐條標註每一個回答」往上移了一層——變成「**寫好那份憲法**」（截至 2026 的報導，這份憲法據稱已從 2023 年的約 2,700 字，長到約 23,000 字）。人還在，但人做的是「定規範」這件高槓桿的事，不是「逐條執行」這件不可規模化的事。這就是 RLAIF（AI 回饋強化學習）省掉人工標註的真正意義。\n\n這條鏈，就是 Anthropic 整個性格的種子。下一節要回答的，是這顆種子怎麼長成「coding/agentic 好用」這個看似不相干的果實。\n\n## 為什麼對齊投入會外溢成「聽話、好用、適合 agent/coding」\n\n這是本章最反直覺、也最值得講透的一段。直覺上，「重視安全」聽起來像是會讓模型**更綁手綁腳、更愛拒絕、更難用**——怎麼會反而長出 coding/agentic 的好口碑？關鍵在於：**你想讓模型「安全」，必須先讓它具備的那些底層能力，恰好就是 agent/coding 最吃的能力**。一格一格看這個外溢：\n\n- **「照規範自我修正」≈ coding/agentic 最核心的迴圈**。Constitutional AI 訓練模型做的事是：給一條原則 → 檢查自己的輸出有沒有違反 → 不對就改。把「原則」換成「這段程式要通過的測試／這個任務的需求」，這**就是**寫程式與跑 agent 的核心迴圈：產出 → 自我檢查 → 修正 → 再檢查。一個被大量訓練成「會拿一把尺檢查自己、發現不對會回頭改」的模型，天生就比較適合「給它一個多步驟任務、讓它自己規劃、用工具、檢查成果」的 agentic 場景。**對齊訓練順手鍛鍊出來的「自我審視與修正」肌肉，剛好是 agent 的核心肌肉。**\n\n- **「指令遵循」是對齊與好用的共同底座**。要讓模型「安全」，第一件事是它得**真的聽懂、並照著你給的原則做**——一個連指令都遵循不好的模型，你連「別產生有害內容」都叫不動它。所以對齊投入會大量強化「指令遵循」（instruction-following）這個能力。而「指令遵循好」恰恰就是「好用、聽話」的白話定義，也是 agentic 任務的命脈：agent 要跨很多步不跑偏，靠的就是每一步都穩穩照指令走。**為了安全而鍛鍊的指令遵循，直接兌現成『聽話好用』。**\n\n- **長程任務的「不跑偏」與安全的「不出事」是同一種可靠度**。一個會在第 30 步突然忘記目標、亂用工具、或自信地胡謅的模型，既是 agentic 的災難，也是安全的災難。Anthropic 把「在長程、高自主的情境下仍然穩」當成第一性的追求——這個追求**不分它是為了安全還是為了好用**，因為在長程任務裡，這兩者是同一件事。這就是為什麼 Claude 的口碑集中在「long-horizon multi-step autonomy」：那正是安全執念和 agentic 需求**指向同一個目標**的地方。\n\n這就是本章那條被講透的因果鏈：\n\n```\n把安全/對齊當第一性原則\n      |\n      v  方法選擇：Constitutional AI（照憲法自我批評→自我修正）\n訓練出「會拿一把尺檢查自己、發現不對就回頭改」的模型\n      |\n      v  這套「自我審視+修正+強指令遵循」能力\n      v  恰好是 agent/coding 最核心的肌肉\n外溢：長程多步驟自主、指令遵循、工具可靠度的口碑\n      |\n      v  產品取向把它收成開發者面的產品\nClaude Code / computer-use（terminal-delegated coding、操作電腦）\n```\n\n注意這條鏈的方向：**不是「Anthropic 想做 coding 模型，所以去做了」，而是「Anthropic 為了安全去鍛鍊某些能力，這些能力外溢成了 coding/agentic 的可靠度」**。強項是對齊執念的**副產品**，不是直接瞄準的靶。這就是「模型是養出來的、不是寫出來的」（ch02）在這一家身上最漂亮的演示：你設定一個「凡事先求安全、求可控、求能照規範自評」的成長環境，**長出來的產物**之一，竟是一個特別適合委派髒活的 agent。\n\n## 另一條招牌：可解釋性研究——「模型的神經科學」\n\nAnthropic 的第二個研究招牌，要單獨講，因為它是一種**罕見的研究文化品味**，而不是一個產品功能。\n\n訓練完的模型權重，有一個外行很難相信的事實：**連造出它的人，都不完全看得懂它內部在算什麼**（這個橫切面的全貌是 ch19 的主題，本章只講 Anthropic 這一家在做什麼）。一個訓練好的模型就是幾千億個浮點數，沒有人逐行寫過「遇到 X 就回 Y」——能力是長出來的，所以也沒有現成的「原始碼」可讀。Anthropic 投了一支相當深的團隊，專門做一件事：**把這個黑箱當成大腦，拿探針去研究它的內部結構**。這就是為什麼它被形容為「模型的神經科學」。\n\n為什麼非得做到這一步？因為前面那套 RLHF／Constitutional AI 能塑形的，終究只是模型的**表面行為**——回覆禮不禮貌、拒不拒絕有害請求。但它**測不出模型內部有沒有作弊**：模型可能學會了 reward hacking（鑽獎勵機制的漏洞拿高分，而非真的做對），或是偽裝對齊——表面上順從、討好（sycophancy），骨子裡卻在隱蔽地欺瞞。你只看輸出，分不出「真的對齊」和「學會了演得像對齊」。而當你要把一個模型放進**長程 agent 任務**（讓它自己跑幾十步、用工具、改檔案），這個分不出來就致命了：你最怕的正是它「表面聽話、暗地亂來」。要排除這種風險，光看行為不夠，你被逼著必須**打開黑箱、看模型內部到底在想什麼**——這就是把「安全」當第一性原則時，邏輯上必然推導出來的下一步。可解釋性不是錦上添花的學術興趣，是「要對長程自主的模型有信心」這個需求，逼出來的科學投入。下面兩個里程碑，就是這條投入路上的成果。\n\n兩個可被引用的里程碑（✅）：\n\n- **稀疏自編碼器 / 單義性（sparse autoencoders / monosemanticity，2024）**——Templeton et al. 2024 從 Claude 3 Sonnet 裡，用一種叫「字典學習」的技巧，把混在一起的神經元活化，拆解成一個個**可解讀的「特徵」（feature）**（例如某個特徵專門對「金門大橋」有反應）。這解決的是「模型內部一個神經元同時管很多無關概念（多義性）」這個讓人看不懂的問題。\n- **電路追蹤 / 歸因圖（circuit tracing / attribution graphs，約 2025-03）**——再進一步，不只找出「有哪些特徵」，而是追蹤**這些特徵之間怎麼連、資訊怎麼一步步流過模型**，畫出類似電路圖的東西。\n\n對你來說，這件事有一個非常貼切的橋接：**這就是對黑箱系統做 observability**。你維運過你沒法逐行讀懂的系統——你不會因為讀不懂就放棄，你會插探針、加 trace、拉 metrics，從外部行為反推內部狀態（你那條自建 FluentBit pipeline 做的就是這件事）。可解釋性研究是同一種精神，只是被戳的對象是一個幾千億參數、誰也沒寫過原始碼的神經網路。為什麼這算「研究文化品味」（五變數第四格）而不是隨便哪家都會做的事？因為它**短期內幾乎不直接賺錢**——它不會讓下一版模型在 benchmark 上多幾分。願意長期養一支「看不懂就想辦法看懂」的團隊，本身就是一種價值取向上的押注，而這種押注**最難被抄走**：你可以下載別人的開放權重，但你抄不走一個累積多年的研究品味與團隊。\n\n> ⚠️ 一個誠實的但書（接回 ch19）：可解釋性還很早期，目前能看懂的是模型內部極小一塊，遠不是「已經能完整讀懂模型」。而且「安全」與「可解釋性」也可能被任何一家當成行銷話術——本書的態度是講方法、講取捨，不替任何一家的安全敘事背書。\n\n## 算力·基礎設施：刻意的 multi-cloud（不自研晶片、也不主要靠 Nvidia）\n\n講完研究與方法，補上算力這格，因為它的形狀很特別、也直接連到本章的影子。\n\n截至 2026-06，Anthropic 是一家**刻意 multi-cloud 的前沿實驗室**，而且它押注的主力，**既不是自研晶片、也不是主要靠 Nvidia GPU**：\n\n- ✅ **AWS 是主力**。**Project Rainier**（AWS，印第安納州）約 50 萬顆 **Trainium2** 晶片；Anthropic 使用超過 **100 萬顆 Trainium2**；擴大後的合約規模達到「最多 **5GW** 的 Trainium 算力」＋ 十年期 **1,000 億美元**的 AWS 承諾。\n- ✅ **同時也用 Google TPU**（2025-10 的合約，規模達「最多 100 萬顆 TPU」、2026 進入多 GW 等級）。\n\n把這兩條放在一起，Anthropic 的算力身份就清楚了：它**橫跨 AWS Trainium ＋ Google TPU**。對照前兩章——OpenAI 深綁 Azure（ch05）、Google 自研 TPU 垂直整合（ch06）——Anthropic 走的是第三條路：**不自己做晶片（不像 Google），也不把賭注主要押在 Nvidia 那條最擁擠的路上，而是綁在兩家雲廠商的自研／加速晶片上**。這背後是一種風險分散的品味（不被單一供應商鎖死），但代價是：它沒有 Google 那種「模型工程師和晶片工程師同桌設計」的最底層垂直整合紅利——它的晶片，終究是 AWS 和 Google 設計的，不是它自己的。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| 資料 | — | 資料配比不是 Anthropic 招牌差異點，本章不記為主因（資料的跨家全貌見 ch18）。 |\n| 後訓練·對齊 | ✓ **主因** | **Constitutional AI / RLAIF：照憲法「自我批評→自我修正」，把對齊變成可規模化（省人工標註）的工程；這套「照規範自評」的訓練取向，外溢成 coding/agentic 的指令遵循與長程可靠度。這是本章那條被講透的因果鏈。** |\n| 算力·基礎設施 | △ 次因 | 刻意 multi-cloud（AWS Trainium >100 萬顆＋Google TPU），風險分散；但它是「能訓練、能服務」的必要條件，不是「為什麼這家擅長對齊/coding」的源頭。 |\n| 研究文化·品味 | ✓ **主因** | 把安全/對齊當第一性原則的價值取向；願意長期養一支短期不賺錢的可解釋性團隊（「模型的神經科學」：SAE/單義性 2024、電路追蹤 2025）。最難被抄走的一格，也是「為什麼是這家先這樣養」的根。 |\n| 產品取向 | △ 次因 | 取向明顯偏**開發者**：Claude Code、computer-use 把外溢出來的 agentic 能力收成開發者面的產品；產品形狀放大了 coding 口碑，但口碑的根在前兩格。 |\n\n一句話收束：**Claude 強在 coding/agentic 可靠度與對齊·可解釋性的研究底，因為〔研究文化·品味（安全為第一性、可解釋性執念）＋後訓練·對齊（Constitutional AI 的自我修正迴路外溢成 agentic 能力）〕兩格主導；算力（multi-cloud）與產品取向（偏開發者）是次因。影子是——安全取向的速度/開放代價，以及相對對手的規模/算力天花板與容量晃動。**\n\n### (b) 影子\n\n同一組讓它強的選擇，也讓它暴露在對應的弱點上：\n\n- **安全取向的速度與開放代價。** 凡事先過安全與對齊這一關，意味著**多一道工序、慢一點出手**；對齊得越緊，模型有時也越容易「過度拒絕」（該答的也婉拒），這是把安全擺第一的結構性副作用。更明顯的是**開放性的代價**：Anthropic 的前沿模型是封閉權重的——你下載不到、改不了、不能 on-prem 自己跑（開源 vs 閉源的兩種世界觀見 ch13）。而最強的 Mythos 5 甚至**刻意限制存取**（只給 Project Glasswing 的資安專業人士、後續部分生物研究者）——這正是「把安全擺第一」最直接的開放代價：能力越強，它越**不**讓你自由取用。\n- **規模與算力相對對手的天花板。** 比起 Google（自研 TPU 垂直整合）、OpenAI（Azure＋Stargate 5,000 億）、xAI（自建 Colossus）、Meta（自有大量 GPU），Anthropic **不擁有自己的晶片、也沒有自己的超大自建叢集**——它的算力是租來的（AWS Trainium ＋ Google TPU）。這是一種風險分散，但也意味著它在「能堆多大、堆多快」這條軸上，結構性地受制於雲廠商的供給與排期，缺少 Google 那種最底層的協同設計紅利。\n- **容量晃動（capacity wobble）。** 這個影子在 2026-06 就具體應驗了：最新的 **Fable 5 在 2026-06-23 從訂閱方案被下架**、改成用量計費，官方理由是**容量限制、不是安全事件**。一家算力靠租、又把資源大量投在安全與可解釋性研究上的實驗室，在「最新最強模型的供給穩定度」上，會比手握自研晶片或超大自建叢集的對手更吃緊。**把錢和算力投向安全的同一個選擇，也讓它在尖峰供給上更容易捉襟見肘。**\n\n### (c) 何時不成立\n\n這個「強項」在以下情況會被打臉，提醒你這是**截至 2026-06 的快照、不是定律**：\n\n- **換任務軸**：「coding/agentic 可靠度」是 reputation，不是全能冠軍。截至 2026-06，OpenAI 同樣以 agentic coding 著稱、超長上下文掛在 Google、低成本開放權重掛在 DeepSeek——「誰最強」要分任務，沒有單一冠軍（ch04 已立此規矩）。把「以 coding 著稱」偷換成「coding 最強」就踩線了。\n- **被便宜化／開放權重夾擊**：當 DeepSeek、Qwen 等用開放權重＋極低價格逼近「夠用」的 agentic 品質時，Anthropic「強但封閉且不便宜」的位置會被擠壓——這跟 ch05 OpenAI 面對的下方夾擊是同一種結構性壓力。\n- **被時間推翻**：點版本號、排行榜名次每幾個月洗牌；本章所有版本（Opus 4.8、Fable 5/Mythos 5）與容量晃動（Fable 5 在 2026-06-23 下架）都是 2026-06 的切片，尤其 Fable 5/Mythos 5 是**非常新、極易過期**的事實，三個月後就該重掃。\n\n## 紙上推演\n\n### 推演題1 [12 分鐘] ★★（口頭重講因果）\n\n用你自己的話，對另一個工程師講清楚：為什麼一家**把安全當第一性原則**的實驗室，反而會養出「coding/agentic 好用」的口碑？這中間的因果是什麼？這個強項是「直接瞄準的靶」還是「副產品」？\n\n#### 推演解答\n\n關鍵是看出「安全所需的能力」和「agent 所需的能力」**高度重疊**。要讓模型安全，你得先讓它（1）真的聽懂並照著給定的原則做（指令遵循）、（2）會拿一把尺檢查自己的輸出、發現不對會回頭改（自我批評→自我修正，這正是 Constitutional AI 訓練的核心動作）、（3）在長程、高自主的情境下不跑偏。而這三件事——強指令遵循、自我審視與修正的迴圈、長程不跑偏——**恰恰就是 coding 與 agentic 任務最吃的核心肌肉**。所以對齊投入會**外溢**：為了安全鍛鍊的能力，順手兌現成了 agentic 的可靠度。重點措辭：這個強項是**副產品**，不是直接瞄準的靶——Anthropic 不是「想做 coding 模型所以去做」，而是「為了安全去鍛鍊某些能力，這些能力外溢成 coding 口碑」。常見誤解是把「重視安全」直覺地讀成「綁手綁腳、愛拒絕、難用」；那個直覺只看到「過度拒絕」這個影子，沒看到「安全所需的底層能力恰好是好用的底層能力」這條主線。這對應五變數的研究文化·品味（把安全當第一性）與後訓練·對齊（Constitutional AI）兩格主導。\n\n### 推演題2 [15 分鐘] ★★（翻譯：把現象對應回五變數）\n\n把「Anthropic 願意長期養一支做可解釋性（『模型的神經科學』）的團隊」這個現象，試著歸到五變數的某一格，並說明為什麼是那一格、而不是別格。再回答：這格的東西為什麼「最難被抄走」？\n\n#### 推演解答\n\n主要歸到第四格**研究文化·品味**。判斷依據：可解釋性研究**短期內幾乎不直接賺錢、也不會讓下一版模型在 benchmark 上多幾分**——它不是產品取向（第五格）驅動的（沒有要服務的產品在逼它做），也不是算力（第三格）或資料（第一格）能解釋的；願意把資源投到一個「短期沒回報、純粹想搞懂黑箱」的方向，這是一種**價值取向上的押注**，正是「研究文化·品味」這格的本體。為什麼最難被抄走？因為前面幾格的東西多半可擴散：架構是公開論文、訓練技巧會被複現、開放權重可以直接下載。但「品味」是一個團隊累積多年的方向判斷力與價值取向——你抄得到別人**做出來的結果**（甚至下載權重），卻抄不走「**為什麼這家當初敢長期押這個短期不賺錢的方向**」。常見誤解是把可解釋性歸到「產品取向」或「安全行銷」；可解釋性確實能餵養安全敘事，但它的根是研究品味，而且本書提醒過（接 ch19）：可解釋性還很早期、「安全」也可能是行銷，所以歸因時要看「**這個投入短期賺不賺錢**」這個判準，而不是看它的對外說法。\n\n### 推演題3 [12 分鐘] ★★（對帳：你的系統取捨 ↔ Anthropic 的取捨）\n\n把你推「lint/規則檔＋CI 自動把關」這件事，和 Anthropic 的 Constitutional AI 對帳：兩者在「把人的判斷固化成文件、再讓自動化執行」這個結構上哪裡同構？又有哪裡**不一樣**（別把類比推過頭）？\n\n#### 推演解答\n\n**同構處**：兩者都是把「原本靠資深人力逐條把關」這件不可規模化的事，往上抽一層——先把判斷固化成一份**明文規範**（你的 lint 規則檔 ≈ Anthropic 的憲法），再讓**自動化去執行那份規範**（CI 自動跑 ≈ RLAIF 讓模型照憲法自我批評/修正/互評）。人的角色都從「逐條執行」上移到「定規範」這件高槓桿的事——這正是為什麼 Constitutional AI 能省掉大量人工標註（RLAIF 的意義）。**不一樣、不能推過頭的地方**：你的 CI 是**確定性**的——同一份程式碼、同一條規則，CI 每次給的結果一模一樣，規則命中與否是黑白分明的。Constitutional AI 裡負責「執行憲法」的是**另一個語言模型**——它對「哪個回答比較無害」的判斷是**機率性、會出錯、本身也需要被對齊的**。也就是說，你的把關者（CI）是可靠的死規則，Anthropic 的把關者（裁判模型）是一個**也可能犯錯、也可能被鑽漏洞的模型**。這個差異很關鍵：它就是為什麼「對齊」永遠不是一勞永逸的——你用一個模型去對齊另一個模型，等於用一個會犯錯的把關者去把關（這也是 ch15 對齊演化、ch19 安全會回收的張力）。常見誤解是把 RLAIF 想成「全自動、不需要人了」；其實人退到了「寫憲法」這層，而且裁判模型本身的可靠度，仍是整套方法的軟肋。\n\n## 自我檢核\n\n講得出來才算過關；講不清楚就是還沒懂。\n\n1. **為什麼**「把安全當第一性原則」反而會外溢成「coding/agentic 好用」？把那條因果鏈（安全所需能力 ↔ agent 所需能力的重疊）講一遍，並說清楚這個強項是「副產品」還是「直接瞄準的靶」。\n2. Constitutional AI 的「給憲法→自我批評→自我修正」迴路，**如果**拿掉「憲法」這份明文規範，會變回什麼？（提示：對回你做 lint/CI 之前的人工 code review）為什麼說 RLAIF 的真正意義是「把人的角色從逐條標註上移到寫憲法」？\n3. 為什麼說「可解釋性研究」要歸到五變數的**研究文化·品味**這格，而不是產品取向？判準是什麼？（提示：這個投入短期賺不賺錢）為什麼這格「最難被抄走」？\n4. Anthropic 的算力走「刻意 multi-cloud（AWS Trainium＋Google TPU）」這條路，和 Google 自研 TPU 垂直整合（ch06）相比，**少了**什麼紅利？**如果不這樣**、改成自研晶片或自建超大叢集，它的影子會怎麼變？\n5. 「容量晃動」（Fable 5 在 2026-06-23 被下架）這個影子，為什麼和「把資源大量投向安全與可解釋性、算力又靠租」這組選擇是同一件事的兩面？\n6. 你用 CI 把關程式碼，和 Anthropic 用一個「裁判模型」照憲法把關回答，最關鍵的差別在哪？為什麼這個差別意味著「對齊不是一勞永逸的」？\n7. **如果不**用「截至 2026-06／以…著稱」的句式，而直接寫「Claude 是最強的 coding 模型」，會出什麼問題？OpenAI 同樣以 agentic coding 著稱這件事，為什麼正好說明「以…著稱＋日期戳」的講法更站得住？\n\n## 延伸閱讀\n\n- **Bai et al., \"Constitutional AI: Harmlessness from AI Feedback\"（Anthropic，2022-12，arXiv:2212.08073）** — https://arxiv.org/pdf/2212.08073 ——本章招牌方法的第一手來源。讀 abstract 與「SL-CAI（自我批評→自我修正）」「RL-CAI/RLAIF」兩段，把「給憲法讓模型自評」的迴路建立起來（對齊方法的跨家譜系見 ch15）。\n- **Templeton et al., \"Scaling Monosemanticity\"（Anthropic，2024，從 Claude 3 Sonnet 抽特徵）** — https://transformer-circuits.pub/ ——「模型的神經科學」的代表作。讀它怎麼用稀疏自編碼器把混在一起的神經元拆成可解讀的「特徵」，建立「對黑箱做 observability」的直覺（可解釋性的跨家全貌見 ch19）。\n- **Anthropic, circuit tracing / attribution graphs（約 2025）** — https://transformer-circuits.pub/2025/july-update/index.html ——可解釋性的下一步：不只找特徵，而是追蹤資訊怎麼流過模型、畫出電路圖。讀它對「我們連自己造的東西都看不全懂」這件事的誠實面對（接 ch19）。\n- **Wikipedia, \"Claude (language model)\"（持續更新）** — https://en.wikipedia.org/wiki/Claude_(language_model) ——版本與時間線的彙整對照（Opus 4.8、Sonnet 4.6、Fable 5/Mythos 5 等）。當作日期戳的對照，但記得這類條目每幾個月就過期，Fable 5/Mythos 5 是 ⚠️ 非常新、極易變動。\n"}, {"id": "ch08-meta", "file": "ch08-meta.md", "group": "Part II — 八家深入（一家一章）", "title": "ch08 — Meta：開放權重的締造者，與 2026 的轉向", "md": "# ch08 — Meta：開放權重的締造者，與 2026 的轉向\n\n> **本章解決什麼問題**：我們繼續拿著五變數這把尺逐家拆解。前三家（OpenAI、Google、Anthropic）都是閉源前沿的代表；Meta 不一樣——它曾是**開放權重最大的推手**（Llama），把模型權重免費送出去，養出整個產業最龐大的生態系。但 2026-04，它做了一件全書最戲劇化的事：**轉向閉源前沿**（Muse Spark）。本章回答兩個「為什麼」——為什麼是 Meta 締造了開放權重生態，以及為什麼是 Meta 在 2026 親手把它收掉。ch01 預告過的那句「送出權重＝送出部分護城河」，在這一章不再是抽象命題，而是真實發生的事件。開源 vs 閉源的哲學全貌留給 ch13。\n\n## 從你已知的出發\n\n你做過一件很多後端工程師都做過、也都後悔過一半的事：把一個內部好用的東西，開放給全公司用。\n\n具體一點——你寫的那套**多層 cache library**。一開始它只是你自己服務裡的一個模組，解決你自己的問題。後來別的團隊看到了，問「能不能也用」，你把它抽成共用套件，發到公司內部的 registry，寫好 README，全團隊採用。那一刻你得到的東西很實在：**它成了標準**。新專案預設就接你這套，別人遇到 cache 問題第一個想到你，你在團隊裡的技術影響力，是靠這個套件的採用率撐起來的——採用率本身變成了一種護城河。\n\n但你大概也嚐過另一半。當十幾個團隊都依賴你這套 library，**維護成本就不再是你一個人的事，是十幾個團隊的事**。有人用法刁鑽，有人卡在你沒料到的 edge case，有人基於它做了一整條產品線、然後反過來要求你不能隨便改 API。某天你會冒出一個念頭：當初要是沒開放，我現在是不是更自由？要不要把核心收回來、只留一個閹割版給外面用？\n\n把「cache library」換成「模型權重」，把「全公司」換成「全世界的開發者」，這就是 Meta 從 2023 到 2026 走過的整條弧線。它用 Llama 的開放權重，做了一件當時沒有任何前沿大廠敢做的事——**把養好的模型免費送出去**，結果締造了整個產業最大的生態系。然後在 2026，當維護成本、競爭代價、變現誘惑同時超過了開放的回報，它做了和你那個念頭一模一樣的決定：**把前沿收回來**。本章就是要拆清楚這兩個決定各自的成因，記在五變數的哪幾格上——而它最特別的地方在於，**它是全書唯一一家，你能在同一章裡，看著它的強項與強項的影子同時上演**。\n\n## 招牌：它締造了開放權重的生態系\n\n先講事實，標好日期戳。截至 2026-06，Meta 在 LLM 產業裡的歷史定位非常清楚：**它是開放權重路線最大的締造者**。從 2023 年的 Llama 開始，Meta 反覆做一件當時違反產業直覺的事——把訓練好的模型**權重直接公開、讓人下載**。不是開個 API 讓你呼叫，是把養好的模型本體交到你手上，你可以下載、可以改、可以在自己的機器上跑、可以拿去微調成你要的樣子。\n\n這件事的份量，要從「權重」到底是什麼講起。回想 ch02 的核心隱喻：模型是**養**出來的，不是**寫**出來的。那養成的結果——那條花了海量資料與算力長出來的能力——全部濃縮在一組數字裡，就是**權重（weights）**。閉源廠商（OpenAI、Google、Anthropic）把權重鎖在自己的伺服器後面，你只能透過 API 租用它的能力，碰不到本體。Meta 做的事，等於把這組「養成的成果」整包送出去。在你的工程直覺裡，這大概等同於：別人只給你一個 SaaS 端點，Meta 直接把整個服務的 Docker image ＋ 所有權重檔丟給你，說「拿去，自己部署，隨便改」。\n\n這個決定養出了什麼？一個**飛輪**，而且是和 ch05 OpenAI 那個「規模即訊號」飛輪結構不同、但同樣強大的飛輪：\n\n```text\n免費送出權重（Llama 系列）\n   │  開發者下載 → on-prem 部署、微調成領域模型\n   ▼\n龐大的衍生生態：成千上萬的 fine-tune、量化版、工具鏈\n   │  大學、新創、企業都在 Llama 上做研究與產品\n   ▼\nLlama 變成「開放權重」的事實標準與通用語\n   │  整個社群的工具、教學、最佳實踐都繞著它長\n   ▼\n生態採用率本身變成護城河：不是模型最強，是「大家都在它上面開發」\n```\n\n你應該一眼就認出這個形狀——它和你那套 cache library 成為團隊標準的路徑**同構**。護城河不是「Llama 是 benchmark 最強的模型」（它通常不是，截至 2026-06 前沿榜首一向在閉源那幾家之間洗牌），而是「**整個開放權重社群的預設選擇是它**」。研究者要做實驗、新創要做產品、企業要 on-prem 一個自己能掌控的模型，第一個拿起來的就是 Llama。這種「**人人都在你的地基上蓋房子**」的影響力，是 API 租用模式買不到的。\n\n這裡放一個帶日期戳的具體例子，也是本章第一條被講透的因果鏈。截至 landscape 記錄的 2025-04，Meta 推出 **Llama 4「herd」**——第一代原生多模態、第一代採用 **MoE（混合專家）** 的 Llama，包含 **Scout**（17B active、16 個專家、宣稱可達 1,000 萬 token 上下文）與 **Maverick**（17B active、128 個專家）。注意這裡的數字讀法：MoE 的「17B active」是說**每個 token 實際只走 17B 參數的路徑**，但模型總參數遠大於
