結構——**黏的會持續、漏的會收斂、下一個招式發表後也會變成漏的**。誰騎在這個結構上贏，不在本書能誠實回答的範圍內。\n\n## 成因拆解\n\n本章拆的不是「某一家為什麼強」，而是一個**動態**問題：**為什麼差異會持續、也會收斂**。記分卡照用——但這次每格問的是「它會不會被抄走」。\n\n### (a) 五格歸因：哪幾格是持續的成因、哪幾格是收斂的成因\n\n| 變數 | 角色 | 為什麼 |\n|---|---|---|\n| **資料** | ✓ **主因（持續側）** | 公開資料會收斂（同一片網路），但**專有資料流**抄不走、且隨資料牆逼近越來越黏（ch18）。這格同時是「會收斂的一半」與「會持續的一半」，是分裂的——但其持續側是差異耐久的核心成因之一。 |\n| **後訓練·對齊** | ✓ **主因（收斂側）** | **差異會收斂的最大引擎就在這格**：配方一公開就擴散（RLHF/GRPO/RLVR，ch15），reasoning 一年變標配（ch14）是最乾淨的收斂案例。這格解釋了「為什麼差異會被抄掉」。 |\n| **算力·基礎設施** | ✓ **主因（持續側）** | **差異會持續的最硬一道牆**：自研晶片、自建叢集要用資本與時間砌，擴散成本最高（ch16）。它解釋了「為什麼有些差異抄不走」。 |\n| **研究文化·品味** | ✓ **主因（持續側）** | 抄得走成果、抄不走品味。隱性知識沒法寫進論文一起送出去（ch07、ch14），所以它是最難擴散、最持久的差異來源。 |\n| **產品取向** | ✓ **主因（持續側）** | 分發飛輪（用戶→資料→迭代）抄不走「十億人的注意力」這個前置條件（ch05、ch06）。功能會對等，生態仍黏人。 |\n\n一句話收束：**差異之所以會持續，因為「算力·基礎設施」「研究文化·品味」「產品取向」是用資本、隱性知識、分發飛輪砌的三道抄不走的牆，加上「資料」的專有部分越來越黏；差異之所以會收斂，因為「後訓練·對齊」的配方一公開就擴散、加上「資料」的公開部分大家爬的是同一片網路。影子是——這整套判斷本身測不準，是 2026-06 的快照，不是定律。**\n\n### (b) 影子：這套「持續 vs 收斂」判斷的代價與盲點\n\n把強項講完，照規矩翻過來看它的故障面——這套判斷有三個你該先警惕的盲點：\n\n- **「結構性護城河」會讓人誤讀成「高枕無憂」。** 牆很高不等於牆不會塌。Meta 的開放權重生態曾被當成最厚的護城河之一，2026-04 卻自己把它拆了改走閉源（ch08）——**結構性優勢也會因為策略反轉而一夜換邊**。把「持續」讀成「永遠」，是這套框架最危險的誤用。\n- **「易擴散」不等於「沒價值」。** 別因為 reasoning 收斂成標配，就回頭說 OpenAI 開創它「不值錢」。**先發者吃到的是時間紅利、品牌、與一輪用戶增長**——這些會沉澱進「產品分發」那道黏牆裡。招式會擴散，但**靠這個招式先卡到的位置**未必會跟著擴散。把「會被抄」直接等同於「白做了」，是另一個誤讀。\n- **這條軸本身會移動。** 今天「黏」的東西，明天可能變「漏」。如果哪天出現了「自動把任何模型行為複製過去」的蒸餾技術突破，或開源晶片把自研矽的門檻砸掉，現在這張表的某一格就會從持續側滑到收斂側。**這套判斷的有效期，繫於『現在哪些資源稀缺』——而稀缺性本身是會變的。**\n\n### (c) 何時不成立\n\n提醒你這是**截至 2026-06 的快照、不是定律**：\n\n- **當一道「黏牆」的前置資源突然變便宜時。** 整套判斷的地基是「複製需要對手沒有的稀缺資源」。一旦那資源不再稀缺——晶片產能過剩、某種專有資料變得人人可得、某個分發管道被新平台繞過——對應那道牆就從持續側塌進收斂側。**稀缺性是這套框架的命根，而稀缺性會變。**\n- **當「下一個範式」恰好不吃這幾道牆時。** 本章假設差距會繼續記在資料與算力這兩道黏牆上。但如果下一個突破是某種**用更少資料、更少算力**就能拉開差距的演算法躍遷（不是沒可能——Chinchilla 當年就推翻過「光把參數做大」的共識，ch02），那「算力＝護城河」這條就會被局部打臉。**演算法的躍遷，有時正是來打掉資本護城河的。**\n- **而且，全章從頭到尾拒絕回答的那個問題——「誰會贏」——本來就不在快照能回答的範圍。** 本章給的是差異**會不會持續**的結構判斷，不是名次。任何把它讀成「所以某家會贏」的人，都讀錯了——這是一張地形圖，不是一張賽果單。\n\n## 紙上推演\n\n### 推演題1：把 reasoning 的一生講成「收斂」的完整故事 **[10 分鐘] ★**\n\n不看書，用你自己的話，把 reasoning 從 2024-09 到 2026-06 的歷程，講成一個「墨水滴進水裡散開」的故事：它**什麼時候是差異化**、**為什麼會散開**、**現在變成了什麼**。講給一個只懂後端、沒讀過這本書的同事聽。\n\n#### 推演解答\n\n完整版大致是：**差異化階段**——2024-09，OpenAI 用 o1 開創了 reasoning 範式（讓模型「想久一點」、對思維鏈做 RL，ch14），這時「會推理」是 OpenAI 獨有的強項，一滴黑墨剛滴下去、缸裡只有它那一點黑。**擴散階段**——2025-01-20，DeepSeek 用 R1 證明這配方可以**便宜複製、還開放權重**（GRPO＋可驗證獎勵，ch11），等於把「怎麼調出這杯墨水」的食譜公開了；因為擴散成本趨近於零（讀論文就會做），墨水開始在整缸散開。**標配階段**——不到一年，截至 2026-06，八家**全部**都有 reasoning 模式，整缸都染成同一個灰。**現在它是什麼**：一個**人手一個**的東西，不再是任何一家的「強項」，退化成了背景。\n\n常見誤解：以為「收斂了＝OpenAI 開創它白做了」。錯。OpenAI 吃到的是時間紅利、品牌、一輪用戶增長——這些沉澱進了「產品分發」那道黏牆（見影子 (b) 第二點）。**招式擴散了，靠招式先卡到的位置未必擴散。** 收斂的是能力，不是先發者已經換到手的一切。\n\n### 推演題2：翻譯——把「為什麼換不動雲」對應回五變數 **[15 分鐘] ★★**\n\n你帶 ECS 微服務那幾年，AWS 的功能被 GCP/Azure 一個個抄對等了，但你始終換不動雲。請把你「換不動雲」的**每一個具體原因**，對應到本章五變數的某一格，並判斷它在「持續 vs 收斂」軸上落在哪一側。做完，你會發現你早就憑直覺懂這整章了。\n\n#### 推演解答\n\n對應大致如下：\n\n- 「**SQS 不再是 AWS 獨有，半年就被抄對等**」→ 對應**後訓練·對齊**那種**漏牆**：功能／配方一被證明有用就擴散成標配，保鮮期短。收斂側。\n- 「**我團隊六年的肌肉記憶、runbook、踩過的坑都是 AWS 的**」→ 對應**研究文化·品味**：隱性知識，沒法寫成文件一次交接，抄不走。持續側。\n- 「**幾十 TB 資料躺在 S3/RDS，搬一次的出口費和停機風險本身就是牆**」→ 對應**資料**的專有／重力部分：別人進不去你的水管。持續側。\n- 「**整套 IAM/VPC/FluentBit pipeline 全長在 AWS 上、拆不開**」→ 對應**產品取向**的分發／生態飛輪：整合越深越黏。持續側。\n- 「**真要自建一座資料中心才能不靠雲**」→ 對應**算力·基礎設施**：用資本和時間砌的牆，最硬。持續側。\n\n常見誤解：以為「功能被抄平＝差異化消失了」。不是消失，是**退守**——從功能層退到生態、整合、運維文化、資料重力這幾層。大模型一字不差是同一個故事：**架構技巧、訓練配方會收斂，差異化退守到算力、專有資料、研究品味、產品分發這四道牆後面。**\n\n### 推演題3：反事實——如果 GRPO 當年沒公開 **[12 分鐘] ★★**\n\nDeepSeek 把 GRPO（省掉 reward model 的 RL，ch11、ch15）寫進了論文。反事實：**如果 DeepSeek 當年把 GRPO 當商業機密、不發論文、R1 也不開放權重**，2026-06 的 reasoning 格局會有什麼不同？這個差異會更持續嗎？\n\n#### 推演解答\n\n短期會更持續，但**沒法持續太久**，而且 DeepSeek 自己會少掉它最大的一筆收穫。\n\n短期：如果配方鎖起來，reasoning 的便宜化擴散會慢一截——別家得自己從頭摸索「怎麼用 RL＋可驗證獎勵便宜地長出推理」，那滴墨水散得慢一點，DeepSeek 的效率領先能多撐一陣。\n\n但**沒法持續太久**，原因有二：(1) OpenAI 的 o1 已經先證明了「reasoning 可行」這個方向（2024-09），方向一旦被點亮，各家會自己往那裡挖，遲早摸到類似的配方——**你能保密一個具體招式，但保密不了一整個被證明可行的方向**。(2) 別家可以拿 DeepSeek 模型的**輸出**去蒸餾、去逆向，配方藏得住、行為藏不住。\n\n而 DeepSeek 會**虧大**：它靠公開 R1 換到的，正是「撼動了『訓練前沿模型一定很貴』的成本敘事」這個全球聲量與品牌（2025-01-27 那場讓 Nvidia 一度跌約 17%、市值蒸發約 6000 億美金的市場震撼，✅，ch11）。把配方藏起來，等於**用一點短期的技術領先，換掉了一筆巨大的品牌與議題主導權**——而品牌會沉澱進更黏的「產品分發」那道牆。這題的教訓：**在一個架構公開的產業裡，「公開」有時比「保密」換到更耐久的東西。** 收斂無法避免，聰明的玩法是趁它收斂之前，把流量、品牌、生態位卡到手。\n\n### 推演題4：找破綻——「演算法創新才是真正的護城河」 **[10 分鐘] ★★★**\n\n一個工程師朋友說：「**大模型的競爭，最終還是比誰的演算法更聰明——演算法創新才是真正的護城河，算力和資料都是次要的、燒錢就有。**」用本章的軸，指出這句話的兩個破綻。\n\n#### 推演解答\n\n破綻一（方向反了）：在這個產業裡，**純演算法創新恰恰是擴散最快、最不護城河的那一層**。因為架構公開、論文滿天飛、開放權重一抓一把，一個演算法招式一旦發表，擴散成本就趨近於零——MLA、GRPO、reasoning 配方全是公開後一兩年內變標配的例子（ch11、ch14、ch15）。**真正抄不走的反而是「燒錢就有」的那兩樣**：自研晶片要燒的是錢**加好幾年**（Google TPU 不是有錢就能明年複製，ch06、ch16），專有資料流是別人**進不去你的水管**（不是有錢就買得到 X 的即時語料或你三十億用戶的互動，ch18）。把「燒錢就有」當成「不是護城河」，正好把最硬的兩道牆看輕了。\n\n破綻二（把「聰明」和「稀缺」搞混了）：護城河的本質不是「誰更聰明」，是「複製它需不需要對手沒有的稀缺資源」。演算法的聰明**可以被讀懂、被複製**（它寫得下來）；資本、時間、私有資料、分發飛輪、研究品味**沒法被一次讀走**（前三者要重新砌、後兩者是隱性知識）。所以這句話真正該修正成：**演算法創新會帶來短期領先與時間紅利，但因為它擴散最快，它本身不是耐久的護城河；耐久的差異記在算力、專有資料、研究品味、產品分發這四道抄不走的牆上。**\n\n附帶提醒：別矯枉過正到「所以演算法不重要」——Chinchilla 當年就用一個演算法洞見（資料與參數要等比放大，ch02）打掉過「光堆參數」的共識，DeepSeek 的效率創新也真的重設了成本預期。演算法躍遷**有時正是來打掉資本護城河的**（見何時不成立 (c) 第二點）。正確的判斷是：演算法是會擴散的**閃電**，那四道牆是會持續的**地形**——兩者都真實，但別把閃電當成地形。\n\n## 自我檢核\n\n1. 用一句話說清楚這條軸：什麼樣的差異會**收斂**、什麼樣的會**持續**？決定一滴墨水會不會散開的那個量，叫什麼？（提示：擴散成本＝複製它需不需要對手沒有的稀缺資源。）\n2. reasoning 是全書最乾淨的收斂案例。**為什麼**它會在不到一年內從「差異化」變成「人手一個的背景」？如果 DeepSeek 沒開放 R1，它會更持續嗎、又為什麼撐不久？\n3. 為什麼說「**架構技巧、訓練配方是最容易被抄走的那一層**」？這跟工程師「演算法創新最值錢」的直覺正好相反——錯在哪？\n4. 四道結構性護城河（算力／專有資料／研究品味／產品分發）各自**為什麼抄不走**？試著各用一句「複製它得先有對手沒有的什麼」來回答。\n5. 「資料」這格在本章為什麼被切成**兩半**？哪一半會收斂、哪一半會持續、而且為什麼那一半還**越來越黏**？\n6. 如果有人把本章讀成「所以有護城河的那幾家會贏」，他**錯在哪**？本章為什麼刻意不預測誰會贏（連回 ch04 的測不準）？\n7. 用你「換不動雲」的經驗，講出「差異化從功能層**退守**到生態層」這件事——並說明為什麼大模型是一字不差的同一個故事。\n8. 「結構性護城河」最危險的誤讀是什麼？（提示：Meta 2026-04 自己拆掉了它最厚的一道牆。）什麼情況下，一道今天「黏」的牆會明天變「漏」？\n\n## 延伸閱讀\n\n- **DeepSeek-R1 / DeepSeek-V3 技術報告**（arXiv:2412.19437）——讀「一個被公開的配方如何引爆收斂」的第一手證物；GRPO 與 MLA 都在裡面，看完你會懂「為什麼寫進論文＝擴散成本趨近於零」。\n- **OpenAI, \"Learning to reason with LLMs\"**（openai.com/index/learning-to-reason-with-llms/）——reasoning 範式的起點（o1, 2024-09），對照 R1 一起讀，就是一條完整的「開創 → 便宜複製 → 標配」收斂曲線。\n- **Hoffmann et al. 2022, \"Chinchilla\"**（Training Compute-Optimal LLMs）——本章「演算法躍遷有時來打掉資本護城河」這句話的最佳歷史註腳：一個洞見如何推翻「光堆參數」的共識（ch02 的個案）。\n- **Ironwood TPU 公告**（blog.google/products/google-cloud/ironwood-tpu-age-of-inference/）——讀「自有矽＝用資本與時間砌的牆」這道結構性護城河的第一手材料；對照本章「算力是抄不走的那一格」。\n- **Epoch AI, \"Will we run out of data?\"**——資料牆的原始推估（公開高品質文字約 2026–2028 用完）；讀完你會懂為什麼「資料」這格的私有部分**越來越黏**，是下一輪差距的可能落點（ch18）。\n- **Anthropic 的 circuit-tracing / interpretability 更新**（transformer-circuits.pub）——讀「研究品味＝隱性知識、抄不走」的活樣本：一個別家短期難以複製的研究方向，是怎麼長在一個團隊的價值取向裡的（ch07、ch19）。\n"}, {"id": "ch21-eight-styles", "file": "ch21-eight-styles.md", "group": "Part IV — 收束", "title": "ch21 — 同一張藍圖，八種風格：五變數總帳與一套帶得走的判斷框架", "md": "# ch21 — 同一張藍圖，八種風格：五變數總帳與一套帶得走的判斷框架\n\n> **本章解決什麼問題**：這是全書的總收官。從 ch01 那個反直覺的謎題（食譜是一篇 2017 年的公開論文，八家卻養出天差地遠的菜色）出發，走完八家拆解（ch05–12）與七個橫切面（ch13–19），現在把所有「強在 X，因為〔哪幾格〕，影子是 Y」結成一張**五變數總帳**。本章不引進任何新事實——全是回收，只標「見 chNN」。它要驗收全書四個主張，並把那把分析的尺交到你手上：**以後看到任何一款新模型發表，你能自己用五變數判斷它，而不是等別人告訴你誰最強。**\n\n## 從你已知的出發\n\n你一定讀過大系統的 postmortem（事故複盤）。一份好的 postmortem，重點從來不是「記住那天凌晨三點 RDS CPU 飆到幾趴、哪個 pod 第幾次重啟」——那些數字過一個月就沒人記得了。真正帶得走的，是**那套分析的骨架**：先看流量是不是異常、再看相依服務有沒有抖、再看自己的配置與容量留了多少餘裕、最後看當時的運維紀律有沒有破口。骨架穩了，下次換一個全新的事故，你照樣能在十分鐘內定位到「這次的鍋記在哪一格」。\n\n這本書就是一份關於「八家大模型為什麼各擅勝場」的 postmortem，而這一章是它的**結語頁**。前面二十章給了你一堆數字——9 億 WAU、2M token 上下文、671B 總參數、560 萬美金、555,000 顆 GPU——這些全是 2026-06 的切片，三個月後一半會過期（landscape 的脆弱事實清單列得清清楚楚）。如果你讀完只記住這些數字，那這本書就白讀了，因為它們正是最不該背的部分。\n\n你該帶走的，是那套**和你做瓶頸診斷一樣的排查骨架**：面對任何一款模型，逐格問「它的強項記在資料、後訓練·對齊、算力·基礎設施、研究文化·品味、產品取向這五格的哪幾格？影子又是什麼？」——這才是這本書真正的商品。這一章就來把這把尺磨利、交到你手上。\n\n## 先把四個主張收齊\n\n全書從 ch01 立下四個主張，每一章都在替它們累積證據。在攤開總帳之前，先一句一句驗收——你現在應該能對另一個工程師把每一句講清楚了。\n\n**主張一：架構不是護城河。** Transformer 是 2017 年的公開論文（〈Attention Is All You Need〉），attention 怎麼算全世界都讀得到（ch01）。截至 2026-06，八家前沿模型本質上都是 decoder-only Transformer ＋ self-attention，零件清單高度重疊：RoPE ＋（GQA 或 MLA）＋（通常加）MoE（landscape §A）。你能在週末照著刻一個小版本的東西，按定義就不是別人領先的祕密。護城河沒有消失，它**搬了家**——搬到資料、算力、後訓練這些論文裡讀不到的格子。\n\n**主張二：模型是「養」出來的，不是「寫」出來的。** 沒有人逐行規定「使用者問 X 就回 Y」（ch01–02）。各家做的是設計一個成長環境——餵什麼資料、用什麼目標最佳化、給多少算力——能力是從這個環境裡**長出來的產物**。這就是為什麼差異可以拆解：你不是在比較八份不同的程式碼，你是在比較八種不同的**養法**。\n\n**主張三：五個變數解釋一切差異。** 養法可以拆成五格：**資料 × 後訓練·對齊 × 算力·基礎設施 × 研究文化·品味 × 產品取向**（ch03 定調）。這五格是全書的記分卡，每一章的 `## 成因拆解` 都拿它來歸因。它們**交互作用、少有單一主因**——往往是兩三格咬合（如 Google 的算力＋研究＋產品三格互相強化）。\n\n**主張四：「最強」測不準，「風格」才穩定。** 沒有單一冠軍。排行榜每幾個月洗牌、benchmark 會被污染、頂端 benchmark 已經飽和到分不出前沿模型（ch04，landscape §F）。穩定可辨識的，是各家的**取向與性格**：OpenAI 的產品先行、Google 的長上下文、Anthropic 的對齊執念、DeepSeek 的效率逼出。能力會局部收斂（互相 distill、互相抄），但**成因結構是結構性的**，會持續（ch20）。\n\n四句話收齊了。現在把八家的收束句結成一張帳。\n\n## 五變數總帳：八家 × 五格\n\n這張表是全書八個 `## 成因拆解` 的歸因總覽，每一格與 ch05–12 各章一致（✓＝主因、△＝次因、留白＝不是這家的招牌成因）。它不是排行榜——**沒有哪一行比哪一行高**，它只回答「每一家的強項記在哪幾格」。\n\n```text\n            資料   後訓練   算力     研究文化  產品\n                   ·對齊   ·基礎設施 ·品味     取向\nOpenAI       △     △       △        ✓         ✓      (ch05)\nGoogle       △     ·       ✓        ✓         ✓      (ch06)\nAnthropic    ·     ✓       △        ✓         △      (ch07)\nMeta         △     ·       △        △鬆動     ✓★     (ch08)\nMistral      △     △       △        ✓         ✓      (ch09)\nxAI          ✓     ·       ✓        △         △      (ch10)\nDeepSeek     ·     ✓       ✓逼出    △         ·      (ch11,＋架構✓)\nQwen         ✓     △       △        △         ✓      (ch12)\n\n✓主因  △次因  ·不是招牌成因\n★ Meta 的產品取向是「同一格、輸入變了、輸出反轉」(見下)\nDeepSeek 另把「架構」(MLA/MoE) 獨立記一筆主因，視為算力格的延伸 (ch11)\n```\n\n讀這張表有三個重點，每一個都呼應一個全書主張：\n\n**第一，主因落點各不相同，這正是「風格穩定」的證據。** 把每一行的 ✓ 位置攤開看：OpenAI 落在「研究文化＋產品」，Google 落在「算力＋研究文化＋產品」三格咬合，Anthropic 落在「後訓練·對齊＋研究文化」，xAI 落在「算力＋資料」，DeepSeek 落在「算力（劣勢逼出）＋後訓練＋架構」，Qwen 落在「資料＋產品」。**沒有兩家的主因組合一樣**——這不是巧合，是各家結構性條件（在哪個國家、背靠哪個產品、受什麼管制、押什麼研究方向）不同的必然結果。風格之所以穩定，因為這些條件不會一夜改變。\n\n**第二，「產品取向」這一格出現最多次，且是 Meta 最戲劇化的個案。** 八家裡有五家（OpenAI、Google、Meta、Mistral、Qwen）把產品取向記為主因。這呼應 ch03 的洞見：**模型被養成什麼形狀，往往是被它要服務的產品壓出來的。** 最極端的是 Meta（ch08）——同一格「產品取向」，輸入變了，輸出就反轉：不靠賣模型賺錢時，開放權重換生態話語權；要用 30 億用戶平台與專有資料變現時，就把前沿收回閉源（Muse Spark，2026-04，標為轉折非定局）。ch01 預告的「送出權重＝送出部分護城河」這個影子，在 2026 應驗了。\n\n**第三，「研究文化·品味」是最難被抄走的一格。** 它在 OpenAI、Google、Anthropic、Mistral 都是主因或關鍵。為什麼難抄？因為資料可以爬、算力可以買、後訓練法會被論文擴散，但「先押 test-time compute 而不是先做別的」「把安全當第一性原則願意養一支短期不賺錢的可解釋性團隊」「把工程效率擰到極致」——這些是**判斷與取向**，藏在人才密度與價值觀裡，沒有 API 可以下載（ch20 說的結構性護城河，這格是核心）。\n\n## 把八句收束話排成一列\n\n總帳表是橫看，這裡縱看——把八家各自的「強在 X，因為〔哪幾格〕，影子是 Y」一句句排出來，這是全書收束句式的最終累積（措辭與各章一致）：\n\n- **OpenAI**（ch05）：強在「定義產品形狀」與「開創 reasoning 範式」，因為**研究文化·品味＋產品取向**（算力與資料是放大的次因）；影子是先行者的包袱——範式一旦公開就被便宜化（DeepSeek R1 證明可便宜複現），且「最強但最貴且封閉」被開放權重從下方夾擊。\n- **Google**（ch06）：強在長上下文與原生多模態，因為**算力·基礎設施＋研究文化·品味＋產品取向**三格咬合（自研 TPU 垂直整合 → 長序列成本可控 → 敢開別家不敢開的上下文，是被講透的因果鏈）；影子是太寬的戰線與消費者端「起個大早趕個晚集」的節奏。\n- **Anthropic**（ch07）：強在 coding/agentic 可靠度與對齊·可解釋性研究底，因為**後訓練·對齊＋研究文化·品味**（Constitutional AI 的自我修正迴路外溢成 agentic 能力）；影子是安全取向的速度/開放代價，與相對對手的規模/算力天花板。\n- **Meta**（ch08）：強在「締造了開放權重生態」，因為**產品取向**（用開放換生態與人才）＋算力；但 2026 把前沿收回閉源，同樣因為**產品取向**（改用 30 億用戶平台變現）；影子是送出權重＝送出部分護城河，這個影子應驗了。\n- **Mistral**（ch09）：強在「以小搏大的效率」與「歐洲主權的開放權重」，因為**研究文化·品味＋產品取向**（主權定位壓出開放）；影子是規模天花板，與上下夾擊的生存壓力。\n- **xAI**（ch10）：強在「後發者的加速度」與「即時時效性」，因為**算力·基礎設施＋資料**（自建 Colossus 極速堆叢集＋X 即時消防水管）；影子是蠻力的能源/成本/品質代價，與即時資料、內容治理的雜訊與爭議。\n- **DeepSeek**（ch11）：強在「用一整疊效率發明把達標所需算力往下壓、還開放權重」，因為**算力·基礎設施的劣勢逼出＋架構（MLA/MoE）＋後訓練（GRPO）**三者咬合；影子是成本數字（560 萬美金）被過度簡化的傳播、出口管制的長期天花板。\n- **Qwen**（ch12）：強在「全尺寸開放權重的廣度」與「多語言縱深」，因為**產品取向＋資料**（阿里雲用全尺寸開放當分發策略＋中文/亞洲語言配比的縱深）；影子是地緣信任門檻、與最頂尖閉源前沿的差距、評測可信度爭議。\n\n把這八句連起來讀一遍，你會發現——**沒有一句話在說「誰最強」**，每一句都在說「強在哪個面向、記在哪幾格、代價是什麼」。這就是全書要訓練的閱讀方式：把「排名問題」換成「歸因問題」。\n\n## 帶得走的工具：看到新模型發表，怎麼用五變數自己判斷\n\n這是這本書留給你的真正商品——一套你以後拿著就能用的**判斷協定**。下次某家發表新模型、科技媒體一片「史上最強」的標題時，先別急著信，跑這套流程。它的形狀跟你做瓶頸診斷時那張排查清單一模一樣：不是憑感覺，是逐項過。\n\n```text\n新模型發表 → 五變數判斷協定 (跑一遍約 15 分鐘)\n  │\n  ├─[0] 先剝掉行銷層 ─────────────────────────────────\n  │     問：這是「以…著稱」還是「就是最強」?\n  │     凡是無時效的絕對排名 → 自動打折 (ch04)。\n  │     發表方自報的 benchmark 數字 → 標「自報、待第三方複現」。\n  │\n  ├─[1] 招牌強項是什麼? ──────────────────────────────\n  │     先用一句話寫下「它以做好『什麼任務』著稱」\n  │     (coding? 長上下文? 多語言? 低成本? 即時時效?)\n  │     —— 不是「它很強」,是「它強在哪個軸」。\n  │\n  ├─[2] 逐格歸因: 這個強項記在哪幾格? ────────────────\n  │     資料      —— 它見過什麼別家沒見過的世界? (專有語料/多語言)\n  │     後訓練·對齊 —— 有沒有招牌訓練法? (新 RL? 新對齊?)\n  │     算力·基礎設施 —— 自研晶片/自建叢集/被管制逼出效率?\n  │     研究文化·品味 —— 押了什麼別家沒先押的方向?\n  │     產品取向   —— 它要服務誰? 這個強項是不是被產品壓出來的?\n  │     → 標 ✓主因 / △次因 / 留白,通常 1–3 格是主因。\n  │\n  ├─[3] 影子是什麼? (這格必填,不准只寫優點) ──────────\n  │     同一組讓它強的選擇,讓它弱在/暴露在哪? (ch 各家(b))\n  │     例: 開放權重 → 商業模式問題; 蠻力算力 → 能源/成本代價。\n  │\n  └─[4] 標日期 + 何時不成立 ──────────────────────────\n        寫下「截至 YYYY-MM」,並問: 換什麼任務/被哪家/過多久\n        這個判斷會被推翻? (ch 各家(c)) 記住它是快照不是定律。\n```\n\n這套協定的精神，全在 ch04 那句「**換任務軸**」——「強」要分任務（coding ≠ 數學 ≠ 長文 ≠ 多語言），任何把不同軸壓成一個數字的排名都該打折。最佳實踐是三角驗證：一個靜態學術評測（MMLU-Pro/GPQA）＋一個人類偏好競技場（LMArena）＋一個 agentic 套件（SWE-bench），**三者一致才是真訊號**（landscape §F）。一個只在自報 benchmark 上漂亮的新模型，跟你那份「平均延遲漂亮但 p99 爆掉」的 k6 壓測報告是同一回事。\n\n## 成因拆解\n\n本章的「現象」是**全書本身**——八家為什麼各擅勝場。所以這個招牌段落，就是上面那張五變數總帳表的元層次反思，外加全書的影子與失效條件。\n\n### (a) 五格歸因（全書層次）\n\n把五格當成「差異成因」本身來歸因，問「整個產業的差異，主要由哪幾格驅動」：\n\n| 變數 | 全書層次的角色 | 為什麼 |\n|---|---|---|\n| 資料 | ✓ 主因 | 各家最不公開的祕密，也是 xAI（X 活水）、Qwen（中文縱深）的招牌成因；資料牆與版權訴訟正逼產業轉向合成/可驗證資料（ch18）。 |\n| 後訓練·對齊 | ✓ 主因 | 對齊方法的演化（RLHF→Constitutional AI→RLVR/GRPO，ch15）是 Anthropic、DeepSeek 招牌的根；同一預訓練底靠它養出不同性格。 |\n| 算力·基礎設施 | ✓ 主因 | 「能不能養出某類模型」的硬約束（ch16）；Google（TPU）、xAI（Colossus）、DeepSeek（被管制逼出效率）的招牌都落在這格。 |\n| 研究文化·品味 | ✓ 主因 | 最難被抄走、最結構性的一格（ch20）；決定誰先押 reasoning、誰先押對齊、誰先押效率。 |\n| 產品取向 | ✓ 主因 | 八家裡五家的招牌主因；模型被養成什麼形狀，常被它要服務的產品壓出來——Meta 的反轉是最戲劇化的證明（ch08/ch13）。 |\n\n全書層次的結論：**五格全是主因，沒有一格可以省。** 這正是 ch03 的核心——差異是多格交互作用的產物，少有單一主因。任何「某家強只因為他資料好/算力多」的單因解釋，都是過度簡化。\n\n### (b) 影子\n\n這本書本身、以及它教你的這套框架，也有影子，不能照單全收：\n\n- **快照的影子**。全書所有版本號、排名、價格、GPU/TPU 數量都是 **2026-06-13 的切片**。landscape 列了 12 條最脆弱的事實（旗艦版本、各家算力數字、DeepSeek 成本、Colossus 規模…），明說「~2026-09 會過期」。這本書的**框架**（五變數、養 vs 寫、影子必寫）是耐久的；它的**數字**是會爛的。把兩者分清楚，否則你會拿一張過期的帳去判斷新局。\n- **歸因的影子**。五變數是一把好用的尺，但它是**人為的切法**，不是物理定律。真實成因常常糊在格與格之間（DeepSeek 的「架構」就跨在算力格邊上，得另記一筆）。框架的價值在「逼你逐格問、逼你寫影子」，不在「每個現象都有唯一正確的歸格」。把它當排查清單用，別當標準答案背。\n- **不可證偽的影子**。「研究文化·品味」這格最難被抄走，但也最難被驗證——它幾乎無法 A/B 測試，容易變成「凡是解釋不了的就推給文化」的萬能託辭。用它時要特別誠實：能指出具體押注（如「先押 test-time compute，2024-09 的 o1」）才算數，泛稱「他們文化好」就是偷懶。\n\n### (c) 何時不成立\n\n這本書的核心主張，在什麼情況下會被打臉？\n\n- **若非 Transformer 範式勝出**：主張一（架構不是護城河）的前提是「八家共用 decoder-only Transformer 藍圖」。若哪天 Mamba/狀態空間模型這類挑戰者真的在前沿勝出（截至 2026-06 仍未撼動），「同一張藍圖」就得改寫——這是 **2026-06 的快照，不是定律**（ch01 已標）。\n- **若差異全面收斂**：主張四（風格穩定）賭的是成因結構是結構性的。但 ch20 也承認趨同壓力真實存在（互相 distill、reasoning 已成桌面門檻而非差異化）。若哪天算力、資料、研究品味都被某種方式抹平，「八種風格」可能塌成「幾種風格」。框架仍能用，但帳本會更短。\n- **若出現本書沒料到的新變數**：五變數是 2026-06 的切法。若未來冒出一個現在還看不清的成因軸（如某種全新的資料合成範式、或地緣政治直接重畫算力版圖），就該給記分卡加一格——框架要能進化，否則它自己就成了過期的快照。\n\n## 紙上推演\n\n這是全書的壓軸動手做。前面二十章你都在讀別人的歸因；這一題，換你獨立跑一遍完整的五變數拆解。\n\n### 推演題1\n\n**[10 分鐘] ★** 口頭重講。不看書，向另一個工程師把全書四個主張一句句講清楚（架構不是護城河、模型是養出來的、五變數解釋差異、最強測不準風格才穩定），每一句**至少給一個具體證據**（哪一家、哪個現象）。講不出證據的那一句，就是你還沒真懂的那一句。\n\n#### 推演解答\n\n四句話的證據錨點（你的版本只要意思到、證據對就算過）：\n\n1. **架構不是護城河**——證據：八家都是 decoder-only Transformer ＋ self-attention，零件清單高度重疊（RoPE＋GQA/MLA＋MoE，landscape §A）；2017 公開論文人人能讀。護城河搬到資料/算力/後訓練三格。\n2. **模型是養出來的**——證據：沒人寫「問 X 回 Y」，能力是設好成長環境（資料、目標、算力）後長出來的（ch02）。對比你寫 cache library 是逐行寫死。\n3. **五變數解釋差異**——證據：八家主因落點各不相同（Google 算力＋研究＋產品三格咬合、Anthropic 後訓練＋研究、xAI 算力＋資料…），沒有兩家一樣。\n4. **最強測不準、風格穩定**——證據：MMLU-Pro/GPQA 已飽和到分不出前沿、排名每幾個月洗牌、benchmark 會污染（ch04）；但「Anthropic 對齊執念、Google 長上下文、DeepSeek 效率」這些風格年復一年穩定。\n\n常見誤解：把第四句講成「所以沒辦法比較模型」。不對——能比較，但要**分任務軸＋三角驗證＋標日期**，不是不能比，是不能用一個無時效的數字比。\n\n### 推演題2\n\n**[25 分鐘] ★★★** 完整實戰（壓軸題）。下面是一則**虛構的**新模型發表稿，請你拿「五變數判斷協定」從頭到尾跑一遍：剝行銷層 → 寫招牌強項 → 逐格歸因 → 寫影子 → 標日期與失效條件。\n\n> 〔虛構發表稿〕**2026 年 8 月，某東南亞主權雲端商「NusantaraAI」發表開放權重模型 Garuda-1**。新聞稿稱：「Garuda-1 是**全球最強的東南亞語言模型**，在我們自建的 SEA-Bench 上得分超越所有對手，原生支援 15 種東南亞語言，採 MoE 架構（總 200B / 活躍 20B），Apache 2.0 開放權重，跑在我們與當地政府合建的主權資料中心上。」\n\n#### 推演解答\n\n跑協定，一步一步：\n\n**[0] 剝行銷層**：「全球最強的東南亞語言模型」是**無時效的絕對排名**，自動打折（ch04）——改讀成「截至 2026-08，以東南亞語言著稱」。「在我們自建的 SEA-Bench 上超越所有對手」是**自報 benchmark**，而且是自家出的題：高度可疑（自家評測天然偏袒自家，ch04 的評測政治學）；標「自報、待第三方在獨立評測上複現」。剝完行銷，真正可信的事實只剩：開放權重、Apache 2.0、MoE 200B/20B、15 種東南亞語言、主權資料中心。\n\n**[1] 招牌強項（分軸）**：以「**東南亞多語言**」＋「**開放權重＋主權部署**」著稱——不是「它最強」，是它強在這兩個軸。\n\n**[2] 逐格歸因**：\n- **資料 ✓主因**——15 種東南亞語言的縱深，是別家（多以英文/中文為重）較難快速複製的專有語料優勢。這格的邏輯跟 Qwen 的中文縱深（ch12）一模一樣：背靠在地業務 → 配比給在地語言更高權重。\n- **產品取向 ✓主因**——「東南亞主權雲」的定位由上往下壓出整套形狀（開放權重＋Apache 2.0＋與政府合建主權資料中心）。這跟 Mistral 的「歐洲主權」（ch09）是同一個劇本：主權定位壓出開放。\n- **算力·基礎設施 △次因**——自建主權資料中心是「能訓、能服務」的必要條件，但（若體量不大）也可能是規模天花板的來源（Mistral 的影子，ch09）。是執行條件，不是「為什麼強在東南亞語言」的成因。\n- **後訓練·對齊 留白／△**——發表稿沒提任何招牌訓練法創新，暫不記為主因。\n- **研究文化·品味 △次因**——選 MoE、選開放權重是合理的工程品味，但沒有「先押了別家沒押的方向」的證據，記次因。\n\n**[3] 影子**（必填）：\n- 開放權重 → **商業模式問題**（DeepSeek/Qwen 共通影子，ch11/12）：送出權重後怎麼變現？\n- 主權定位 ＋ 較小體量 → **規模天花板**與「夾在開放權重大廠與閉源巨頭之間」的生存壓力（Mistral 影子，ch09）。\n- 主權／在地背景 → 跨區採用的**地緣信任門檻**與評測可信度爭議（Qwen 影子，ch12）。\n- 自家出題的 SEA-Bench → **評測污染/偏袒**風險，分數要打折。\n\n**[4] 日期＋失效條件**：標「截至 2026-08」。何時不成立——（a）換任務軸：它在東南亞語言著稱，不代表 coding/數學/長上下文也領先；（b）被哪家：若 Qwen/Google 補上東南亞語料，資料縱深的護城河會被侵蝕；（c）過多久：SEA-Bench 一旦被別家拿去刷或污染，「超越所有對手」立刻失效。\n\n**結出收束句**：*Garuda-1 強在「東南亞多語言縱深」與「主權開放權重」，因為資料（在地語言配比）＋產品取向（主權定位壓出開放）；算力與研究品味是次因。影子是商業模式、規模天花板、地緣信任門檻與自家評測的可信度。截至 2026-08，待第三方複現。*\n\n常見誤解：被「全球最強」「超越所有對手」帶著走，直接信了排名。整套協定的第一步「剝行銷層」就是專門擋這個——**自報的最強，等於沒說**。你能完整跑出這一題，代表這本書的商品你已經帶走了：你不再需要別人告訴你誰最強，你自己有一把尺。\n\n### 推演題3\n\n**[15 分鐘] ★★** 對帳收官。把這套「五變數判斷協定」對應回你自己做技術選型/架構評審的經驗（如評估要不要引入一個新的 cache 方案、或要不要採購某個代管服務）。你那套評估流程裡，有沒有對應到「剝行銷層、逐格歸因、必寫影子、標失效條件」的步驟？哪一步是你以前常漏掉的？\n\n#### 推演解答\n\n對得上的地方：好的技術選型本來就跟這套協定同構。「剝行銷層」≈ 你看 vendor 的 benchmark 時自動打折、要求自己場景的 PoC 數字；「逐格歸因」≈ 你拆「這個方案強在吞吐？延遲？運維成本？生態？」而不是聽「它很快」；「標失效條件」≈ 你問「這個優勢在我們的流量形狀下還成立嗎、量級長到十倍時呢」。\n\n最常被漏掉的，幾乎都是「**必寫影子**」這一步。人在被一個亮點說服時，天然會略過代價——就像只看「平均延遲降了」卻沒問「p99 呢、failover 時呢、團隊學習成本呢」。這本書把「影子必寫」設成 `## 成因拆解` 的硬性段落，就是要對抗這個人性弱點：**任何只有優點的評估，都還沒做完。** 把這個紀律帶回你的架構評審——每個「強在 X」後面，強制接一句「影子是 Y」——你的選型會穩很多。這也正是全書留給你最實用的一條紀律。\n\n## 自我檢核\n\n講得出來才算過。這是全書最後的驗收，優先練「為什麼」與「如果不這樣會怎樣」。\n\n1. 全書四個主張，你能不能不看書、一句句講清楚，每句配一個具體證據（哪一家、哪個現象）？講不出證據的那句，就是你還沒真懂的。\n2. 五變數總帳表裡，為什麼說「沒有哪一行比哪一行高」？這張表跟一張排行榜，本質差在哪？\n3. 「產品取向」在八家裡出現五次主因——為什麼這格這麼常是主因？Meta 為什麼是這格最戲劇化的個案？\n4. 為什麼說「研究文化·品味」是最難被抄走的一格？它的影子（不可證偽）又是什麼？\n5. 拿到一款剛發表的新模型，你的五變數判斷協定第一步是什麼？為什麼「剝行銷層」要擺在最前面？\n6. 為什麼這套框架裡「影子必寫」是硬性步驟？如果略過它，你的判斷會在哪裡出錯？\n7. 這本書的「框架」和「數字」，哪個耐久、哪個會爛？把兩者搞混會讓你犯什麼錯？\n8. 全書主張在什麼情況下會被打臉？為什麼說它是「2026-06 的快照、不是定律」？\n\n## 延伸閱讀\n\n- **回頭重讀 ch01〈同一張藍圖〉**：讀完全書再讀一次序章那個謎題與全書地圖，你會發現每一格都走過了——這是驗收「反直覺開頭是否被收齊」最好的方式。\n- **〈Attention Is All You Need〉**（Vaswani et al., 2017，arXiv:1706.03762）：https://arxiv.org/abs/1706.03762 — 全書那張「共用藍圖」的本尊。總收官時再看一眼摘要，體會「八年公開的食譜，養出八種菜色」這件事有多反直覺。\n- **本書 landscape-2026-06 的「脆弱事實清單」（Part 3）**：提醒你哪 12 條事實 ~2026-09 會過期。把它當「這本書哪些數字該打折」的對照表——框架耐久、數字會爛，這份清單幫你分清楚。\n- **你書架上的《馴服隨機：機率與統計》**：談抽樣偏誤、信賴區間、為什麼小樣本排名不可靠的那幾章 — 想把本章「剝行銷層、自報 benchmark 要打折」這條算到統計學的底，回去翻那本書。\n- **你書架上的《從後端到 AI Infra》**：本書多次用 KV cache、prefill/decode、推論成本當錨點（MLA 砍 KV cache、長上下文成本）；想把這些成因鏈算到工程的底，那本書是另一半。\n"}, {"id": "appendix-a-model-families", "file": "appendix-a-model-families.md", "group": "附錄", "title": "附錄 A — 八家模型家族速查表", "md": "# 附錄 A — 八家模型家族速查表\n\n> ⚠️ **本表為截至 2026-06 的快照，版本與排名每幾個月就會過期；最新狀態請重查，判斷方法見全書（尤其 ch04 評測、ch21 五變數）。** 這是全書**最易腐壞的一頁**——表裡每一個版本號、上下文長度、GPU/TPU 數量、訓練成本、參數量級都帶日期戳，過了 2026-09 多半已不準。請把這頁當「2026-06 的一張定格照」，不是定律；要判斷一款新模型，回去用 ch03 的五變數記分卡與 ch04 的評測誠實框架自己拆，而不是背這張表的某一格。\n\n## 怎麼讀這張表\n\n- **無絕對排名**：本表刻意不選「誰最強」。每一格的「招牌強項」都是 reputation／consensus 層級（🟡），意思是「截至 2026-06 以…著稱」，不是「就是最好」。誰在哪個 benchmark 領先每幾個月洗一次牌（ch04），唯一穩定的是各家的**風格與取向**（ch21）。\n- **信心標記**（沿用 landscape 與全書）：\n  - ✅ **已確認**——有原始來源（lab blog、arXiv、有引用的 Wikipedia）或多個獨立次級來源一致。\n  - 🟡 **聲譽／共識**——廣為相信、難以 A/B 證明、會隨時間漂移（如「Claude 以 coding 著稱」）。\n  - ⚠️ **未證實／有爭議／單一來源／快速變動**——數字被質疑、只追得到次級彙整、或前瞻性宣布尚未出貨。\n- **爭議數字一律雙呈**：凡標「自我宣稱／有爭議」者（DeepSeek 訓練成本、各家 GPU/TPU 數量、Colossus 規模、Grok 5 參數量），都同時給「主張值」與「但書」，不要把宣稱值當裸事實引用。\n\n## 主表：八家 × 六欄（截至 2026-06）\n\n> 「招牌技術」「算力來源」「招牌強項」三欄是相對穩定的結構性事實；「當前主要模型」「上下文長度」兩欄最易過期。\n\n| 家 | 當前主要模型（標日期戳） | 上下文長度 | 開放/閉源（授權） | 招牌技術 | 算力來源 | 招牌強項一句話（🟡 截至 2026-06 以…著稱） |\n|---|---|---|---|---|---|---|\n| **OpenAI** | 🟡 GPT-5 家族；GPT-5.5 為複雜推理/coding 旗艦（released 2026-04-24），預設走「Instant」、可升「Thinking」；mini/nano 小型變體 ⚠️ 點版號命名混亂 | ⚠️ 隨變體而異，未統一公開 | 閉源（API/ChatGPT，權重不可下載） | RLHF 規模化（InstructGPT 血統）→ 開創 reasoning 範式（o1, 2024-09）；統一 router ＋ reasoning-effort 旋鈕（none/low/medium/high/xhigh）✅ | Azure（曾獨家）＋ 自建 **Stargate**（$500B/4yr、>10GW 目標，⚠️ headline 數字、有挫折） | 最廣的通用能力＋消費端霸主＋開創 reasoning。因為先發 RLHF-chat（ChatGPT）與 RL-reasoning（o1）、最深的 Azure 算力、最大用戶基數餵產品迭代。 |\n| **Google DeepMind** | ✅ Gemini 3（2025-11-18）、Gemini 3.1 Pro（2026-02-19）；🟡/⚠️ Gemini 3.5 Pro 於 I/O 2026-05-19 揭露、GA 目標 2026-06、宣稱 2M-token context（截至 2026-06-09 未 GA、無獨立 benchmark） | 🟡 1.5 Pro 已實證 2M（2024）；3.5 Pro 宣稱 2M（headline ambition）。長上下文是真招牌 | 閉源 Gemini（並行開放權重 Gemma） | 原生多模態＋長上下文＋Deep Think 推理；TPU 垂直整合（DeepMind 與 TPU 工程師共同設計）✅ | **自研 TPU**（Ironwood=TPU v7，GA ~2025-11，pod 9,216 chip；TPU 8 前瞻）⚠️「10M TPU」為量級非審計 | 長上下文＋原生多模態＋深厚研究底。因為 TPU 垂直整合（自有晶片→訓最大、服務最便宜）、AlphaGo/AlphaFold 的 RL 與科學 DNA、要服務 Search 的行星級效率壓力。 |\n| **Anthropic** | ✅ Claude Opus 4.8（2026-05-28）、Sonnet 4.6（2026-02-17）、Haiku 4.5（2025-10-15）；🟡 Fable 5＋Mythos 5（2026-06-09）⚠️ Fable 5 於 2026-06-23 從訂閱方案下架（報導為容量限制、非安全事件）、改用量計費，極新易變 | 未在本表統一列（隨方案/變體而異） | 閉源（Mythos 5 限 Project Glasswing） | **Constitutional AI / RLAIF**（Bai et al. 2022, arXiv:2212.08073）；interpretability 研究（sparse autoencoder、circuit tracing）✅ | **多雲**：AWS Trainium 為主（Project Rainier ~500k Trainium2、用量 >1M、up to 5GW＋$100B）＋ Google TPU（up to 1M，2025-10 deal）✅ 既非自研晶片亦非主靠 Nvidia | coding/agentic 可靠度＋安全與可解釋性縱深。因為 Constitutional AI/RLAIF 讓對齊少靠人工標註而能規模化、異常深的 interpretability 研究底、刻意的多雲（Trainium＋TPU）算力。 |\n| **Meta** | ✅ Llama 4 herd（2025-04：Scout/Maverick，首個原生多模態＋MoE Llama）；⚠️ Llama 4 Behemoth（~2T）宣布未出貨、實質擱置；✅ **Muse Spark**（2026-04-08，Meta Superintelligence Labs/Alexandr Wang）——首個**閉源**前沿模型，權重不可下載 | 🟡 Llama 4 Scout 宣稱 up to 10M-token context | ⚠️ **2026 開→閉轉向**：Llama 開放權重（社群授權，>700M MAU 需另授權、原禁 EU）；前沿改走閉源（Muse Spark 不可下載） | MoE Llama＋原生多模態；Muse Spark 宣稱 parallel reasoning／「thought compression」⚠️ | ✅ 龐大 Nvidia H100 fleet（~350k H100，⚠️ 2024-era 目標）；2026 capex ⚠️ ~$115–135B | 締造了開放權重生態（Llama），2026 轉向閉源前沿（Muse Spark）。因為開放權重給了觸及/善意/研究飛輪，但前沿成本暴漲、怕對手搭便車、3B 用戶平台變現的拉力，在 2026 翻轉了戰略。⚠️ 全書最「新而意外」的轉折，標為 2026 inflection、非定局。 |\n| **Mistral AI** | ✅/🟡 Mistral Large 3（2025-12，旗艦開放權重 sparse MoE ~675B total/~41B active）；🟡 Mistral Small 4（2026-03-16，統一 reasoning/vision/coding）；Mistral Forge（GTC 2026-03，企業自訓平台） | ✅ Large 3：256K context | **開放權重（Apache 2.0）**——比 Llama 授權更寬鬆 | 效率優先的 sparse MoE（~41B-dense 成本存取 675B 容量）✅ | Nvidia（歐洲主權 DC）：~13,800 GB300（巴黎，~Q2 2026）、~18,000 Grace Blackwell（法國）🟡 | 高效率、真開放（Apache-2.0）的 MoE＋歐洲主權。因為小團隊拚效率不拚蠻力、Apache-2.0 開放度差異化（對比 Llama 受限授權）、EU 對非美依賴的「主權 AI」需求。 |\n| **xAI** | 🟡/⚠️ Grok 5——Musk 宣布 Q1-2026 目標、**reported ~6T params（MoE）**、宣稱「史上最大公開模型」，於 Colossus 2 訓練 ⚠️ **參數量與出貨狀態為 Musk/媒體說法，自我宣稱/有爭議** | （未公開穩定數字） | 閉源（Grok 隨 X 產品迭代） | 速度取向；native 即時 X（Twitter）語料是結構性差異化✅ | **自建 Colossus**（Memphis）⚠️ reported ~555k GPU、~2GW（Colossus 1 ~230k operational＋Colossus 2 首批）**自我宣稱/有爭議、快速變動**；5 年目標 50M「H100-等效」by ~2030（aspirational） | 後發者的加速度：速度堆規模＋即時資料＋蠻力算力。因為自建 Colossus（全球數一數二 GPU 叢集）能快速暴力訓練、特權存取 X firehose 給 Grok 對手得外接才有的即時性。 |\n| **DeepSeek** | ✅ DeepSeek-V3（2024-12, arXiv:2412.19437，MoE 671B total/37B active）、R1（2025-01-20，開放權重推理，引爆市場）；🟡 DeepSeek-V4（Pro+Flash，reported 2026-04-24，MoE ~1M context，2026-05-22 起 75% V4-Pro 折扣永久化）⚠️ 次級來源、快速變動 | 🟡 V3：256K；V4：reported ~1M context | **開放權重** | **MLA（Multi-head Latent Attention，砍 KV cache）**＋ **GRPO（省掉 reward model 的 RL）**＋ MoE＋MTP＋FP8＋auxiliary-loss-free 平衡 ✅ | ⚠️ 受出口管制的 Nvidia（H800），數千張 H800 級別、保密 | 前沿級品質、開放權重、成本只是零頭。因為一疊效率發明（MLA/GRPO/MoE/MTP/FP8）源於算力稀缺（被管制的 H800）逼出的演算法巧思，把限制變護城河、重設產業成本預期。⚠️ 著名的 **~$5.6M 只是「最後一次預訓練」的 GPU 時數**（2.788M H800 GPU-hour），不含研發/薪資/硬體/失敗 run；批評者估全程 all-in ~$1.3B/$1.6B——**自我宣稱/有爭議**，雙呈勿簡化（記者常把 V3 的 $5.6M 誤掛到 R1）。 |\n| **Alibaba Qwen** | ✅ Qwen3（2025，hybrid-reasoning，119 語言，0.6B→480B 全尺寸梯，含 MoE Qwen3-235B-A22B/Qwen3-30B-A3B）；🟡 Qwen3.5（2026-02-16）、Qwen3.6-Plus（2026-04-02）、Qwen3.6-35B-A3B 開放權重（2026-04-17）⚠️ 點版號每月變 | （隨尺寸/版本而異，未統一列） | **開放權重（多為 Apache 2.0）**＋ 託管 API（Model Studio） | 全尺寸梯（edge→datacenter）＋多語言（119 語言）＋hybrid reasoning（可開關 thinking）✅ | ⚠️ Alibaba Cloud，規模未公開 | 最廣的開放權重尺寸梯＋多語言縱深。因為 Alibaba Cloud 要播種生態的商業誘因（每個裝置層級都出一款）、深厚中文/亞語資料、積極開放權重釋出驅動 Hugging Face 主導性的分發策略。 |\n\n## 兩個必讀的補充註記\n\n- **Meta — 2026 的開→閉轉向（Muse Spark）**：這是本表唯一帶「戰略反轉」的一格，也是全書最戲劇化的個案（ch08）。Meta 七年來以「前沿開放權重」立身（Llama 締造了 fine-tune/on-prem/研究飛輪的龐大生態），但 **2026-04-08 推出的 Muse Spark 是首個閉源前沿模型，權重不可下載**，現已驅動 Meta AI app。成因（landscape）：前沿訓練成本暴漲（⚠️ 2026 capex 估 ~$115–135B）、怕中國廠商靠 Llama 搭便車、要靠 3B 用戶平台＋專有資料變現。⚠️ 標為 **2026 inflection、非定局**——是否站穩、會不會再出新的開放 Llama，都是 2026-09 前要重查的項目。對應全書「強項的影子會應驗」：送出權重＝送出部分護城河，這個 ch01 預告的影子在 2026 兌現了。\n\n- **OpenAI — 點版號命名很亂，抓住耐久事實**：GPT-5.3 Instant / 5.4 Thinking / 5.4 Pro / 5.5 / 5.6 這些子版號在各家彙整裡彼此矛盾、每幾週變動（⚠️）。**不要把任何單一點版號當穩定事實**。耐久、可安心引用的結構性事實是三件：(1) 全部收斂進 **GPT-5 家族**（2026-02-13 退役 GPT-4 與獨立 o-series）；(2) **統一 router** 自動在「Instant（淺）」與「Thinking（深）」之間升降；(3) **reasoning-effort 旋鈕**（none/low/medium/high/xhigh）讓你按需調思考深度。記住這三件，比追任何一個點版號都耐用。\n\n## 重查提醒（最易腐壞的格子）\n\n> 以下每格幾乎確定在 2026-09 前過期，引用前必重查（對應 landscape 的 fragile-facts 清單）：\n\n- 各家**當前旗艦版本號**與**排行榜名次**（每幾個月變）。\n- Gemini 3.5 Pro 的 **GA 狀態**＋2M context 是否真出貨＋真實 benchmark。\n- Anthropic **Fable 5 / Mythos 5**（2026-06 極新）——Fable 5 是否回到訂閱方案（2026-06-23 因容量下架）。\n- Meta **Muse Spark** 閉源轉向是否站穩、是否有新開放 Llama。\n- **DeepSeek V4/R2** 的定價（75% 永久折扣）與是否出新 R 線推理模型。\n- **Qwen 點版號**（3.5/3.6/3.7-Max 每月變動）。\n- **xAI Grok 5** 出貨狀態＋6T 參數宣稱＋Colossus GPU 數（全為 Musk/媒體來源）。\n- **所有 GPU/TPU 數量級**——每一個都是爭議/自我宣稱。\n- **所有 benchmark 數字/排名**——飽和又洗牌，永遠不要把某張排行榜定格進敘述。\n- **DeepSeek 成本數字**——保持「$5.6M＝最後一次預訓練 GPU only；all-in ~$1.3–1.6B；有爭議」的雙呈框架，別讓「$5.6M 造出前沿模型」偷渡成裸事實。\n"}, {"id": "appendix-b-glossary", "file": "appendix-b-glossary.md", "group": "附錄", "title": "附錄 B — 名詞對照與 glossary", "md": "# 附錄 B — 名詞對照與 glossary\n\n> 這張表把全書真正用到、且需要解釋的核心術語收成一處，給你查與複習用。每一條的格式是：**英文（你翻論文／技術報告／部落格時會看到的那個字）｜台灣慣用中譯｜一句能對另一個工程師唸出口的白話定義（本書的框架，不是教科書定義）｜本書第一次把它講清楚的章**。\n>\n> 「首見章」指的是該詞**被定義、被解釋**的那一章，**不是它在 ch01 的全書路線圖或某章章名裡被提前點名的地方**。所以像 TPU、資料牆、推理模型這些詞，雖然在 ch01 的地圖裡早早露過臉，這裡仍標它真正落地、講透的那一章。定義刻意寫得長一點，因為本書的驗收靠「講得出口」。\n>\n> 按主題分區（架構／訓練與對齊／推理／評測／算力·基礎設施／資料／可解釋性·安全／本書框架），求好掃。時效性事實（版本、價格、硬體數字、排名）一律以正文與 `_meta/landscape-2026-06.md` 為準、標「截至 2026-06」；本表只收**穩定的概念定義**。\n\n## 架構（同一張藍圖的零件）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| Transformer | Transformer（變換器） | 2017 年〈Attention Is All You Need〉提出的神經網路架構；本書八家前沿模型**全部站在它上面**——這正是「架構不是護城河」的物證。 | ch01 |\n| self-attention | 自注意力 | Transformer 的核心機制：生成下一個字時，每個 token 回頭去「看」序列裡其他所有 token、決定該關注誰、關注多少。你讀過的 AI Infra 書講過它的推論期版本（KV cache、prefill/decode）。 | ch01 |\n| decoder-only | 純解碼器（架構） | 當代前沿 LLM 共通的形態：一路由左往右「猜下一個 token」（autoregressive）。八家底層都是這一型，差異不在這。 | ch01 |\n| RoPE | 旋轉位置編碼（Rotary Position Embedding） | 靠旋轉 Q/K 向量來編碼「字在第幾個位置」，是支撐長上下文的近乎通用標配（Llama、Qwen、Mistral、Gemma 都用）。 | ch01 |\n| GQA | 分組查詢注意力（Grouped-Query Attention） | 讓多個查詢頭共用同一份 KV，把 KV cache 砍小、推論加快；是 2025 年以來的**預設**效率招。 | ch01 |\n| MLA | 多頭潛在注意力（Multi-head Latent Attention） | 把 KV 壓進低維潛在空間，KV cache 砍得比 GQA 更兇——DeepSeek 的招牌（V2 起）。「MLA 就是 DeepSeek 的 cache library」。 | ch11 |\n| MoE | 混合專家（Mixture-of-Experts） | 把前饋層拆成很多「專家」子網路，每個 token 只走其中幾個：**總參數巨大、實際算的很少**。DeepSeek、Mistral、Qwen、Llama 4、Grok 5（宣稱）都愛用。 | ch01 |\n| MTP | 多 token 預測（Multi-Token Prediction） | 訓練時一次預測未來好幾個 token，把學習訊號變得更密——DeepSeek-V3 用的效率招之一。 | ch11 |\n| FP8 | FP8（8 位元浮點訓練） | 用更省的 8 位元浮點數做訓練計算，記憶體與算力都更省；DeepSeek-V3 在算力被卡的處境下靠它擠效率。 | ch11 |\n| KV cache | KV 快取 | 推論時把已算過的 Key/Value 存下來、避免重算的記憶體；它越胖、長上下文與大模型的服務越貴。讀者已從 AI Infra 書熟悉——本書只當錨點，GQA/MLA 都是在省它。 | ch01 |\n\n## 訓練與對齊（模型怎麼被「養」出來）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| pretraining | 預訓練 | 模型成長的第一階段：在海量文字上反覆「猜下一個 token、猜錯就修一點」，能力**從資料裡長出來**——沒有人寫「遇到 X 就回 Y」。 | ch02 |\n| scaling laws | 縮放定律 | Kaplan et al. 2020 發現的反直覺規律：模型猜錯的程度，沿一條跨七個數量級都成立的**平滑、可外推曲線**，隨「模型多大、資料多少、算力多少」下降。讓「先畫趨勢線、再決定砸多少錢」變可能。 | ch02 |\n| Chinchilla-optimal | Chinchilla 最適比（約 20:1） | Hoffmann et al. 2022 的修正：固定算力下最划算的養法是**參數與資料等比放大**，黃金比例約**每 1 個參數配 20 個 token**。但這是「訓練最划算」；真實服務級模型為了推論便宜常**故意餵過頭**（如 DeepSeek-V3）。 | ch02 |\n| SFT | 指令微調（Supervised Fine-Tuning） | 後訓練第一步：用「人寫的好範例」教預訓練底座照指令回答，把「會接話」調成「會聽話」。 | ch15 |\n| reward model | 獎勵模型 | RLHF 裡那個「打分服務」：從人類的偏好排序學出一個會給回答打分的模型，再拿它去 RL 政策。GRPO 的賣點之一就是**把它整個拿掉**。 | ch03 |\n| RLHF | 人類回饋強化學習（RL from Human Feedback） | InstructGPT（OpenAI, 2022）奠定的對齊基礎：先用人類偏好訓出 reward model，再用 RL 把模型拉向高分回答。ChatGPT 式對齊的起點。 | ch15 |\n| RLAIF | AI 回饋強化學習（RL from AI Feedback） | 把 RLHF 裡大量的「人」換成「AI 照一份原則自評」，省掉昂貴的人工標註——Anthropic 的 Constitutional AI 的引擎。 | ch07 |\n| Constitutional AI | 憲法式 AI | Anthropic（Bai et al., 2022）的招牌：先寫一份「憲法」，讓模型照憲法**自我批評、自我修正**自己的回答（「給憲法→照鏡子→改」的迴路），把對齊變成可規模化的工程。 | ch07 |\n| RLVR | 可驗證獎勵的強化學習（RL from Verifiable Rewards） | 丟掉學出來的 reward model，改用**客觀訊號**當獎勵（答案對不對？程式能不能編譯？）。只在「可驗證領域」站得住，所以推理時代偏愛數學與程式碼。 | ch14 |\n| GRPO | 群組相對策略最佳化（Group Relative Policy Optimization） | DeepSeek 的 RL 算法（DeepSeekMath 起，用於 R1）：**砍掉 critic／reward model**，改用一群樣本互相比較來打分，省記憶體。「GRPO 就是他們那次砍掉中間服務」。 | ch11 |\n| distillation | 蒸餾 | 拿一個強模型的輸出去訓練另一個模型，把能力「萃取」過去。是全書「收斂壓力」的主力機制之一：權重一開放、行為一外洩，就會被人拿去當蒸餾的老師——配方藏得住、行為藏不住。 | ch03 |\n\n## 推理（o1 之後的範式轉移）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| reasoning model | 推理模型 | 回答前先「想」一段、而且**越想越聰明**的模型（OpenAI o1，2024 末開頭）。兩個範式轉移：監督式→RL、以及把算力砸在**推論期**而非只在訓練期。截至 2026-06 已是桌面門檻、非差異化。 | ch14 |\n| test-time compute | 推論期算力（test-time / 思考期算力） | 「想久一點＝更聰明」：在回答時多花算力做隱性搜尋換更好結果。對應你「給一個 job 更多 CPU 時間換更好結果」的延遲換品質取捨。 | ch14 |\n| chain-of-thought | 思維鏈（CoT） | 讓模型把推理過程一步步寫出來再給答案；o1 用 RL 在 CoT 上做隱性搜尋，用「最後答案對不對」當訊號獎勵有效的思路。 | ch14 |\n\n## 評測（為什麼「誰最強」測不準）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| benchmark | 基準測試 | 量模型某種能力的標準化測驗（MMLU-Pro、GPQA、SWE-bench、AIME、LMArena…）。本書的核心警告：單一數字會騙人，要分任務、看分布、三類交叉驗證。 | ch04 |\n| contamination | （資料）污染 | benchmark 的題目漏進了訓練資料，模型是**背答案**而不是**推理**，分數虛高。對應你看壓測報告時「這個漂亮數字是不是作弊來的」的警覺。 | ch04 |\n| saturation | 飽和 | 頂尖模型在某個 benchmark 上擠成一團、分不出高下（截至 2026-06，MMLU-Pro 擠在 88–94%、GPQA 約 94%）——分數還在動，但已經量不出真差距。 | ch04 |\n| open-weight vs open-source | 開放權重 vs 開源 | **必須拆穿的字**：絕大多數被叫「開源」的前沿模型其實只到「開放權重」——給你 binary（權重）能下載自部署，但**不給食譜**（訓練資料配比、訓練碼多半不公開），授權常有 MAU／地區限制。真·OSI 全開（如 OLMo）少之又少。 | ch13 |\n\n## 算力·基礎設施（能不能養出某類模型的硬約束）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| TPU | 張量處理器（Tensor Processing Unit） | Google 自研的訓練／推論晶片（Ironwood＝TPU v7）。**垂直整合**（模型工程師和晶片工程師同桌設計）讓長序列訓練／服務成本可控——本書「Google 長上下文強」那條因果鏈的源頭。 | ch06 |\n| Trainium | Trainium（AWS 自研晶片） | Amazon 自研的訓練晶片；Anthropic 主力算力（Project Rainier，搭配 Google TPU）。代表「不自研矽、也不主押 Nvidia」的第三條路——分散風險，但缺最底層協同設計紅利。 | ch07 |\n| Colossus | Colossus（xAI 超級叢集） | xAI 在 Memphis 自建的超大 GPU 叢集（報導 ~55.5 萬顆、~2GW⚠️，數字為 Musk／媒體自述、快速變動）。真正的故事是**速度**：從零到頂級叢集快得驚人，把「建叢集的時間」變成競爭武器。 | ch10 |\n\n## 資料（最不透明、卻可能最有決定性的一格）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| data wall | 資料牆 | 高品質公開人類文字快被抓完的憂慮（Epoch AI 估約 2026–2028 耗盡，時間點大約就是現在）。把「再多抓一點網路文字」這條老路逼到盡頭。 | ch18 |\n| synthetic data | 合成資料 | 模型自己生成、拿來訓練下一代的資料；是資料牆的主要應對手段。聽起來像無限水源，但有很深的陷阱（見 model collapse）。 | ch18 |\n| model collapse | 模型崩塌 | 一代一代拿自己的輸出餵下一代，誤差**跨世代複利放大**、分布越縮越窄、尾端先被遺忘（Shumailov et al. 2024, Nature）。對應你「用自己的輸出餵自己、偏差只會被滾大」的回授迴路直覺——所以合成資料只在「可驗證領域」（數學／程式）才敢大膽用。 | ch18 |\n\n## 可解釋性·安全（我們造出看不懂的東西）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| sparse autoencoder | 稀疏自編碼器（SAE） | 用一個輔助小網路，把「一個神經元同時管很多無關概念（多義性）」那團糊訊號，拆解成一個個只對應**單一概念**的「特徵（feature）」（如「金門大橋」「諂媚」各一個）。Anthropic 2024 從 Claude 3 Sonnet 抽出數百萬個。 | ch07 |\n| interpretability | 可解釋性 | 「模型的神經科學」：訓練完的權重連造它的人都不全懂，可解釋性就是拿探針去戳這個黑箱、找出 feature／circuit。對應你對黑箱系統做 observability 的直覺；目前還很早期。 | ch19 |\n\n## 本書框架（ch03 定調、每章回收的那把尺）\n\n| English | 中文（台灣） | 一句話定義 | 首見章 |\n|---|---|---|---|\n| five-variable scorecard | 五變數記分卡 | 本書的核心分析工具：差異不在藍圖、在養法，而養法可拆成五格——**資料／後訓練·對齊／算力·基礎設施／研究文化·品味／產品取向**。每章 `## 成因拆解` 都用它歸因（主因✓、次因△），ch21 累積成總帳。 | ch03 |\n| 資料（data） | 資料 | 第 1 格：餵什麼、配比、清洗、來源（網路／程式碼／合成／專有）。解釋模型「見過什麼世界」——中文強弱、程式碼強弱、知識廣度。 | ch03 |\n| 後訓練·對齊（post-training / alignment） | 後訓練·對齊 | 第 2 格：SFT、RLHF、RLAIF、RLVR、reward model、性格塑形。「好不好用、聽不聽話、會不會推理」很多來自這裡。 | ch03 |\n| 算力·基礎設施（compute / infra） | 算力·基礎設施 | 第 3 格：GPU/TPU 數量、自研晶片、叢集、互連、訓練工程成熟度。決定能訓多大、多久、多便宜；長上下文與超大模型可不可行。 | ch03 |\n| 研究文化·品味（research culture / taste） | 研究文化·品味 | 第 4 格：押哪個方向、實驗紀律、迭代速度、人才密度、價值取向。為什麼有人先做出 reasoning、有人先做對齊——**最難被抄走**的一格。 | ch03 |\n| 產品取向（product orientation） | 產品取向 | 第 5 格：服務誰（消費者／開發者／企業／自家產品）、開放或封閉。模型被「養成」什麼形狀，往往是被它要服務的產品壓出來的。 | ch03 |\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀地圖", "md": "# 附錄 C — 延伸閱讀地圖\n\n這份地圖把全書 21 章引用過的真實連結，依**主題與閱讀路徑**重新排好，方便你「想深挖某一格」時直接找對源頭。每條都標了**為什麼讀、讀哪一段、它支撐哪一章**。連結全部來自各章 `## 延伸閱讀` 與本書內部基準檔 `landscape-2026-06` 的「Master source list」，沒有憑空生出的網址。\n\n**先講最重要的一句話：時效性連結會失效。** 版本號、價格、GPU 數量、排行榜名次每幾個月就洗一次牌（landscape Part 3 列了 12 條最易過期的事實）；本書是**截至 2026-06** 的快照。所以這份地圖的用法不是「背網址」，而是：**記住作者與主題，連結爛了就用作者名＋論文名去找最新版**。原始論文（arXiv、lab 官方部落格）最耐久，二手彙整（tech-press、aggregator）最易爛——優先點前者。\n\n兩把「耐久的思考工具」貫穿全書，讀任何新材料時都先架上：\n\n- **ch04〈評測判讀〉**——任何「X 在某 benchmark 第一」的新聞，先用這章的污染／飽和／三角驗證濾一遍，再決定信不信。\n- **ch21〈五變數總帳〉**——看到任何新模型發表，先用這張記分卡（資料／後訓練·對齊／算力·基礎設施／研究文化·品味／產品取向）自己歸因，別等別人下結論。\n\n框架耐久、數字會爛——這兩章是你讀完書後唯一需要隨身帶的東西。\n\n---\n\n## 只讀 5 樣的最短路徑（耐久一手論文優先）\n\n如果你只想讀 5 樣東西，讀這 5 篇——它們是全書因果鏈的承重牆，而且都是不會幾個月就過期的一手論文：\n\n1. **〈Attention Is All You Need〉(2017)** — https://arxiv.org/abs/1706.03762 ——全書那張「共用藍圖」的本尊。讀摘要與圖 1，親眼確認它真的是一篇任何人都能下載的公開論文。\n2. **Chinchilla, \"Training Compute-Optimal LLMs\" (2022)** — https://proceedings.neurips.cc/paper_files/paper/2022/file/c1e2faff6f588870935f114ebe04a3e5-Paper-Conference.pdf ——「模型是養出來的」與 scaling laws 的最佳實例：同樣算力、餵飽的小模型贏。\n3. **InstructGPT (RLHF), Ouyang et al. (2022)** — https://arxiv.org/abs/2203.02155 ——對齊演化線的起點，ChatGPT「聽話、好用」性格的方法源頭。\n4. **OpenAI, \"Learning to reason with LLMs\" (o1, 2024-09)** — https://openai.com/index/learning-to-reason-with-llms/ ——reasoning 範式（test-time compute）的第一手起點，2024 年底以來最大的範式轉移。\n5. **DeepSeek-V3 Technical Report (2024)** — https://arxiv.org/abs/2412.19437 ——「效率即護城河」最被引用的一手報告（MLA、MoE、FP8）；同時是 ch11「560 萬美金正確讀法」的原始出處。\n\n讀完這 5 篇，你已經握住全書四個主張的硬證據；其餘按下面主題挑著補。\n\n---\n\n## 地基：架構與 scaling（支撐 ch01／ch02／ch03／ch16）\n\n模型是「養」出來的、架構是公開的同一張藍圖——這一組是全書地基。\n\n- **〈Attention Is All You Need〉(Vaswani et al., 2017，arXiv:1706.03762)** — https://arxiv.org/abs/1706.03762 ——那張共用藍圖。讀摘要與架構圖即可，重點是體會「全世界都站在這同一篇論文上」。（ch01／ch03／ch21）\n- **維基百科〈Attention Is All You Need〉** — https://en.wikipedia.org/wiki/Attention_Is_All_You_Need ——想快速掌握歷史地位、八位作者、後續影響，比讀原文輕鬆。（ch01）\n- **Kaplan et al., \"Scaling Laws for Neural Language Models\" (2020)** — https://arxiv.org/abs/2001.08361 ——「投入 vs loss 跨七個數量級的直線」，「先畫線再砸錢」的全部底氣；也是 ch19「能力沿曲線長出來、所以需要事後可解釋性」的接點。（ch02／ch19）\n- **Hoffmann et al., \"Training Compute-Optimal LLMs\"（Chinchilla, NeurIPS 2022)** — https://proceedings.neurips.cc/paper_files/paper/2022/file/c1e2faff6f588870935f114ebe04a3e5-Paper-Conference.pdf ——讀「等比放大」結論與 Chinchilla(70B) 打贏 Gopher(280B) 的對照。（ch02／ch03／ch20）\n- **Epoch AI, \"Chinchilla scaling: a replication attempt\"** — https://epoch.ai/publications/chinchilla-scaling-a-replication-attempt ——對 Chinchilla 確切擬合提出質疑的複現研究；讀它養成「連奠基定律都該被重測」的態度。（ch02）\n- **GQA: \"Training Generalized Multi-Query Transformer Models\"（Ainslie et al., 2023，arXiv:2305.13245)** — https://arxiv.org/abs/2305.13245 ——近乎業界預設的 attention 省 KV cache 招數（query head 共享 KV head）；和 DeepSeek 的 MLA 對照讀，就懂「省 KV cache 有兩條路」。（ch01／ch16，landscape §架構共通）\n\n---\n\n## 對齊演化：RLHF → Constitutional AI → RLVR/GRPO（支撐 ch07／ch15）\n\n「人類標註 → AI 自評 → 可驗證獎勵」這條「越來越少人工、越來越多可自動化訊號」的線。\n\n- **InstructGPT, Ouyang et al.（OpenAI, 2022-03，arXiv:2203.02155)** — https://arxiv.org/abs/2203.02155 ——這條演化線的起點。讀「三步配方」（SFT → reward model → PPO RL）那張圖，與「1.3B 勝過 175B」這個對齊威力的硬證據。（ch05／ch15）\n- **Constitutional AI, Bai et al.（Anthropic, 2022-12，arXiv:2212.08073)** — https://arxiv.org/abs/2212.08073 ——演化線第二站。讀 abstract 與「SL-CAI 自我批評→自我修正」「RL-CAI/RLAIF」兩段，建立「給憲法讓模型自評」的迴路；它解決了 RLHF 標註不可規模化的瓶頸。（ch03／ch07／ch15）\n- **DeepSeekMath, Shao et al.（DeepSeek, 2024，arXiv:2402.03300)** — https://arxiv.org/abs/2402.03300 ——**GRPO 的首次登場**，RLVR 配方的關鍵零件。讀它怎麼論證「拿掉 critic、用組內相對排名」既省記憶體又有效。（ch11／ch15）\n- **Tulu 3, Lambert et al.（Ai2, 2024，arXiv:2411.15124)** — https://arxiv.org/abs/2411.15124 ——RLVR 被明確命名與系統化的開放後訓練配方；讀它理解 RLVR 是一條可複用的方法、不只是 DeepSeek 的偏方。（ch15）\n- **DeepSeek-R1 技術報告（\"Incentivizing Reasoning Capability in LLMs via RL\"，2025-01，arXiv:2501.12948)** — https://arxiv.org/abs/2501.12948 ——這條線「便宜起飛」最有名的實證：靠可驗證獎勵＋GRPO 把推理能力 RL 出來。（ch14／ch15／ch18／ch20）\n\n---\n\n## 推理範式：o1 之後的範式轉移（支撐 ch05／ch14）\n\n「想久一點＝更聰明」的第二條 scaling 軸（test-time compute）怎麼開始、怎麼變成標配。\n\n- **OpenAI, \"Learning to reason with LLMs\"（o1 發表，2024-09)** — https://openai.com/index/learning-to-reason-with-llms/ ——範式的第一手起點。讀那張「效能同時隨 train-time RL 與 test-time compute 上升」的圖——那就是「第二條 scaling 軸」的全部證據。（ch05／ch14／ch20）\n- **維基百科 \"Reasoning model\"** — https://en.wikipedia.org/wiki/Reasoning_model ——一頁讀完 o1→R1→各家跟進的時間線與 test-time compute 的中性定義。會持續更新，版本資訊以 landscape 日期戳為準。（ch14）\n- **\"Don't Overthink It: A Survey of Efficient R1-style Large Reasoning Models\" (2025)** — https://arxiv.org/pdf/2508.02120 ——專講 reasoning 的「影子」：overthinking 如何讓成本與延遲暴增、甚至讓答案變差。對你這種會算 p99 與單位成本的人，最該帶走的一篇。（ch14）\n\n---\n\n## 效率與成本：用算法挑戰「訓練很貴」（支撐 ch11／ch16）\n\nDeepSeek 把「前沿模型一定很貴」這個共識打出一個洞——但數字要會讀。\n\n- **DeepSeek-V3 Technical Report（arXiv:2412.19437)** — https://arxiv.org/abs/2412.19437 ——560 萬／278.8 萬 H800 小時的**原始出處**。直接讀它對成本的措辭：寫的是「最後一次預訓練 run 的 GPU 成本」，不是「總造價」——破除迷思最有力的就是回到一手文件。（ch02／ch03／ch11／ch13／ch16／ch20）\n- **DeepSeek-V2 論文（arXiv:2405.04434)** — https://arxiv.org/abs/2405.04434 ——**MLA 的首次登場**。讀「low-rank KV joint compression」那段，對照你《從後端到 AI Infra》的 KV cache 章，理解它怎麼把最貴的那塊記憶體壓進低維潛在空間。（ch11）\n\n> 補充：ch11 還引了 Ben Thompson 的 Stratechery〈DeepSeek FAQ〉與當時 NVIDIA 股價 −17% 的同期報導，把「560 萬到底算什麼、市場為什麼恐慌過頭」講得很清楚——這兩條屬二手分析／新聞，連結易變，建議用「Stratechery DeepSeek FAQ 2025」直接搜當前版本。\n\n---\n\n## 算力：GPU、TPU、自研晶片與能源天花板（支撐 ch06／ch10／ch16）\n\n「算力是抄不走的那一格」——自有矽與自建叢集是用資本和時間砌的牆。\n\n- **Ironwood: The first Google TPU for the age of inference（blog.google)** — https://blog.google/products/google-cloud/ironwood-tpu-age-of-inference/ ——TPU v7 的 pod 規模（9,216 顆）、HBM 與光交換互連的官方介紹。讀「pod 怎麼串成一台機器」那段，理解互連才是叢集真天花板。⚠️ 性能對比帶廠商口味，當方向不當精確值。（ch06／ch16／ch20）\n- **Anthropic and Amazon expand collaboration for up to 5 gigawatts of new compute（anthropic.com)** — https://www.anthropic.com/news/anthropic-amazon-compute ——一手確認 Project Rainier（近 50 萬顆 Trainium2、Anthropic 用 >100 萬顆）與 5 GW／十年 1,000 億的協議；理解「押替代矽、多雲分散」這條路。（ch16，landscape master list）\n- **Announcing the Stargate Project（openai.com, 2025-01)** — https://openai.com/index/announcing-the-stargate-project/ ——4 年 5,000 億美金、10 GW＋ 的算力企圖。對照「英國 Stargate 因能源成本喊停」的後續一起讀，體會資本支出黑洞與能源天花板如何同時箝制競賽。⚠️ 頭條數字皆為宣稱值，當企圖讀。（ch05／ch16）\n- **xAI, \"Colossus\"（官方頁)** — https://x.ai/colossus ——Colossus 的第一手官方敘事。讀它怎麼描述「建得多快、多大」，再對照「⚠️ 自我宣稱、變動快」的但書——這正是練習「分辨公司自述與經驗證事實」的最佳教材。（ch10）\n- **NVIDIA Newsroom, \"Spectrum-X Ethernet … xAI Colossus\"** — https://nvidianews.nvidia.com/news/spectrum-x-ethernet-networking-xai-colossus ——供應商視角的 Colossus：讀「互連怎麼把十萬級 GPU 串起來」，建立「叢集不只是堆卡、互連才是關鍵工程」的直覺。注意是 Nvidia 行銷稿，數字帶 vendor 色彩。（ch10）\n- **Epoch AI（compute trends）** — https://epoch.ai/ ——把單一家的算力放進產業趨勢、用經過方法學處理的指標（能源／瓦數／有效算力）去看的可信來源；對照各家未經審計的自我宣稱數字，體會為什麼「響亮的數字」要打折。（ch10／ch16／ch18／ch20）\n\n> 補充：ch16 另引了 Introl（Colossus 555k GPU／2 GW）、The Register（xAI 自抽渦輪發電的能源影子）、Data Center Frontier〈The Gigawatt Bottleneck〉（電網併網排隊數年、變壓器交期四年）、AWS〈Project Rainier〉啟用報導——都是二手新聞／產業整理，連結較易變，建議用標題關鍵字搜當前版本。\n\n---\n\n## 可解釋性：模型的神經科學（支撐 ch07／ch19）\n\n「我們連自己造的東西都看不全懂」——這是多家共推的研究戰線，不是一家的事。\n\n- **Templeton et al., \"Scaling Monosemanticity\"（Anthropic, 2024，從 Claude 3 Sonnet 抽特徵)** — https://transformer-circuits.pub/ ——「模型的神經科學」與 Golden Gate Claude 的源頭。讀它怎麼用稀疏自編碼器把糊在一起的神經元拆成可解讀「特徵」。（ch07／ch19）\n- **Anthropic, circuit tracing / attribution graphs（約 2025-03)** — https://transformer-circuits.pub/2025/july-update/index.html ——可解釋性的下一步：不只找特徵，而是追蹤資訊怎麼流過模型、畫出電路圖。讀它對「看不全懂」這件事的誠實面對。（ch07／ch19／ch20）\n- **A Survey on Sparse Autoencoders（arXiv:2503.05613)** — https://arxiv.org/html/2503.05613v3 ——SAE 的產業級綜述。讀它印證「OpenAI、Google DeepMind、學界都在跑 SAE」，以及這條路線當前的能耐與**侷限**（別過度推銷成熟度）。（ch19）\n- **\"Sparse Autoencoders Find Highly Interpretable Features in Language Models\"（OpenReview)** — https://openreview.net/forum?id=F76bwRSLeK ——從「神經元是一團糊（多義性）」出發，建立「為什麼需要 SAE 去拆特徵」的直覺。（ch19）\n- **OpenAI/Anthropic 的 SAE 研究對照整理（Arize AI)** — https://arize.com/blog/llm-interpretability-and-sparse-autoencoders-openai-anthropic/ ——把兩家 SAE 工作放一起對照的可信整理；建立「可解釋性是多家共推的戰線」這個立場。（ch19）\n\n---\n\n## 評測判讀：為什麼排行榜會騙人（支撐 ch04）\n\n進任何「誰最強」討論前的防身術。\n\n- **GSM1k: \"A Careful Examination of LLM Performance on Grade School Arithmetic\"（Scale AI, 2024，arXiv:2405.00332)** — https://arxiv.org/abs/2405.00332 ——污染從猜測變數字的招牌個案。讀「new benchmark」與「overfitting」兩節，看他們怎麼用全新題集量出最多 13% 的掉分。（ch04）\n- **\"A Survey on Data Contamination for Large Language Models\"（2025，arXiv:2502.14425)** — https://arxiv.org/abs/2502.14425 ——把污染型態與偵測方法整理成地圖。挑「detection methods」一節，建立「換新題重測」之外的驗污手段。（ch04）\n- **LMArena（前 Chatbot Arena / LMSYS)** — https://lmarena.ai/ ——親手去看 live 排行榜，注意每個 Elo 旁的 ± 信賴區間，感受「重疊的名次差別在統計上不存在」。（ch04）\n\n---\n\n## 資料暗河：版權、資料牆與合成資料（支撐 ch08／ch18）\n\n最不透明、卻最關鍵的一格的當代爭議。\n\n- **Epoch AI, \"Will we run out of data?\"** — https://epoch.ai/ ——「資料牆」的原始推估（高品質公開人類文字 ~2026–2028 耗盡）。讀它怎麼把資料牆從口號變成可檢驗推估，以及為什麼 overtrain 會改變這個時間點。（ch18／ch20）\n- **Harvard Law Review — NYT v. OpenAI 評析** — https://harvardlawreview.org/blog/2024/04/nyt-v-openai-the-timess-about-face/ ——版權訴訟法律爭點（合理使用、核心主張為何被放行）的可信整理。讀「為什麼核心侵權主張沒被駁回」那段。（ch18，landscape master list）\n- **Meta, \"Introducing Muse Spark\"（Meta Superintelligence Labs, 2026-04)** — https://about.fb.com/news/2026/04/introducing-muse-spark-meta-superintelligence-labs/ ——閉源轉向的第一手宣告，也是「資料牆讓專有用戶資料變稀缺護城河」的活例。讀「為什麼從開放轉閉源、權重不可下載」那段，對照 ch08「2026 轉折、非定局」的但書。（ch08／ch13／ch18）\n\n> 補充：ch18 還引了 Shumailov et al. 2024〈AI models collapse …〉(Nature)——模型崩塌的權威論證，與 natlawreview/Jones Walker 對「OpenAI 被令交出 2,000 萬筆 ChatGPT 紀錄」的同期法律評析。前者建議用作者名＋Nature 搜原文，後者屬法律新聞、連結最易變。\n\n---\n\n## 開源 vs 閉源與各家一手材料（支撐 ch08／ch09／ch12／ch13／ch17）\n\n「開放權重 ≠ 開源 ≠ 透明」——以各家官方公告為證物讀這場路線之爭。\n\n- **Meta AI, \"The Llama 4 herd\"（2025-04)** — https://ai.meta.com/blog/llama-4-multimodal-intelligence/ ——開放權重旗艦的第一手起點（Scout／Maverick／Behemoth），也是 Meta 第一個原生多模態 MoE。讀它附帶的社群授權，親眼看 700M MAU 與 EU 限制那條「繩子」。（ch08／ch13／ch17）\n- **Qwen Team, \"Qwen3: Think Deeper, Act Faster\"（qwenlm.github.io, 2025)** — https://qwenlm.github.io/blog/qwen3/ ——全尺寸階梯（0.6B→235B）、119 種語言、MoE 與 Apache 2.0 的第一手出處。讀「模型陣容」與「多語言」兩段。（ch12／ch13）\n- **Mistral AI, \"Introducing Mistral 3\"（Mistral Large 3, 2025-12)** — https://mistral.ai/news/mistral-3/ ——讀「675B 總 / 41B 啟用」的稀疏 MoE 與 Apache 2.0 宣告，建立「大容量小帳單」的直覺。（ch09）\n- **Mistral AI, \"Introducing Mistral Small 4\"（2026-03-16)** — https://mistral.ai/news/mistral-small-4/ ——讀「把 Magistral／Pixtral／Devstral 合併成一個」與 `reasoning_effort` 旋鈕，看效率品味怎麼貫徹到小模型與多模態。（ch09／ch17）\n- **SAP News, \"SAP and Mistral AI: European Sovereign AI\"（2025-11)** — https://news.sap.com/2025/11/sap-mistral-ai-new-alliance-european-sovereign-ai/ ——讀「主權 AI」如何從口號變成政府／企業採購，體會產品取向怎麼壓出技術選擇。（ch09）\n- **NTIA — Risks & Benefits of Dual-Use Foundation Models with Widely Available Weights** — https://www.ntia.gov/programs-and-initiatives/artificial-intelligence/open-model-weights-report ——美國官方對「開放權重的安全與濫用」的系統性評估；讀它平衡「開放 ＝ 安全」的迷思。（ch13）\n- **Wikipedia, \"Claude (language model)\"** — https://en.wikipedia.org/wiki/Claude_(language_model) ——版本與時間線的彙整對照。⚠️ 持續更新、每幾個月過期，Fable 5／Mythos 5 極新極易變。（ch07）\n- **Wikipedia, \"Gemini (language model)\"** — https://en.wikipedia.org/wiki/Gemini_(language_model) ——Gemini 版本／長上下文時間線的彙整對照，同樣 ⚠️ 易過期，數字以 landscape 日期戳為準。（ch06，landscape master list）\n\n> 補充：這一束裡 ch06 還引了 cloud.google 的 Gemini 1.5 Pro 2M context 開發者部落格、deepmind.google／nobelprize.org 的 2024 諾貝爾化學獎（AlphaFold）、Gemini 技術報告（storage.googleapis 的 deepmind-media PDF）；ch12 引了 DataCamp〈Qwen3〉與 imseankim 的 Hugging Face open model rankings；ch08 引了 TechCrunch〈Meta debuts Muse Spark〉。這些是各家部落格／二手彙整，連結較易變，建議用標題關鍵字搜當前版本。\n\n---\n\n## 跨書接點（你書架上的另外兩本）\n\n- **《從後端到 AI Infra》——KV cache、prefill/decode、長序列成本那幾章**：本書多次用它當錨點（MLA 砍 KV cache、長上下文／影片＝超長序列成本）。想把成因鏈算到工程的底，那本是另一半。（ch01／ch11／ch16／ch17／ch21）\n- **《馴服隨機：機率與統計》——抽樣偏誤、信賴區間、為什麼小樣本排名不可靠那幾章**：本書 ch04 的評測判讀只喚醒、不重講；想追根究柢回那本的抽樣與信賴區間章節。（ch04／ch21）\n\n---\n\n## 編纂說明（給未來重掃的你）\n\n- 本附錄只收**各章 `## 延伸閱讀` 實際寫過**＋**landscape master list 已驗證**的連結，去重後依主題重排；沒有新增任何各章未引用的網址。\n- **未附穩定 URL 而以名稱帶過的條目**（Stratechery DeepSeek FAQ、IG 股價報導、Introl／The Register／Data Center Frontier 的算力新聞、AWS Project Rainier 啟用報導、Gemini 技術報告 PDF、cloud.google／deepmind.google 部落格、Nature 模型崩塌論文、natlawreview 法律評析、DataCamp／imseankim 彙整、TechCrunch Muse Spark）**沒有逐條鏈進這份地圖**，改在各主題的「補充」段以可搜尋的標題保留——因為它們屬二手新聞或會搬家的部落格，URL 最易爛，列死網址反而誤導。要追時用標題關鍵字搜當前版本。\n- landscape master list 裡 **Anthropic Fable 5／Mythos 5 公告**（https://www.anthropic.com/news/claude-fable-5-mythos-5）屬 Part 3 的 ⚠️ 最易過期事實，且各章正文已用 Wikipedia〈Claude〉條目作版本對照，故未另列為延伸閱讀；重掃時若它仍在線，可補進「開源 vs 閉源與各家一手材料」一束。\n- 重掃優先級：所有 lab 部落格與 Wikipedia 條目（版本會變）＞二手彙整（會搬家）＞arXiv 一手論文（最穩定，幾乎只需確認還在線）。\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "AI-Lab Landscape Fact Baseline (landscape-2026-06)", "md": "---\nlast_verified: 2026-06-13\nreview_after_days: 90\nstatus: research-agent-draft\nsource: web research 2026-06-13\ntopic: \"Why eight AI labs' LLMs have different strengths — fact baseline\"\n---\n\n# AI-Lab Landscape Fact Baseline (landscape-2026-06)\n\nThis file is the single source of truth for the book *Why do different labs' LLMs have different strengths?*\nChapter authors: do NOT pull versions, prices, GPU counts, or rankings from memory. Pull them from here,\nand copy the date stamp with them. This is the most time-sensitive topic in the whole shelf — anything\nhere is a snapshot of **2026-06-13** and will rot within months.\n\n## How to read the confidence markers\n\n| Marker | Meaning | How to write it |\n|---|---|---|\n| ✅ | **Confirmed** — primary source (lab blog, arXiv paper, Wikipedia with citation) or multiple independent secondaries agree. | State as fact, but keep the date stamp. |\n| 🟡 reputation | **Reputation / consensus** — widely believed, hard to A/B prove, shifts over time (e.g. \"Claude is best at coding\"). | Write as \"is known for / associated with\", never \"is the best at\". |\n| ⚠️ | **Unconfirmed / contested / single-source / fast-moving** — a number that's disputed, a claim from a secondary aggregator I could not trace to a primary, or a forward-looking announcement not yet shipped. | Hedge explicitly. Name the dispute. Do not assert as timeless fact. |\n\n**Golden rule for the whole book:** there is NO single uniform winner, rankings change monthly, and benchmarks\nget contaminated. Every \"X is strongest at Y\" must be framed as \"as of 2026-06, X is reputed to lead at Y.\"\nThis caveat is the spine of the benchmarks chapter and should echo through every lab chapter.\n\n**Sourcing note:** much of the *very latest* 2026 version/price detail (GPT-5.5, Gemini 3.5, Fable 5, Muse Spark,\nDeepSeek V4, Qwen3.6) comes from secondary aggregators and tech-press, not yet from durable primary docs at\nresearch time. Those are marked 🟡 or ⚠️ accordingly. The *durable structural facts* (architecture, scaling laws,\nalignment-method attributions, the 2024–2025 reasoning shift, training-cost disputes) are anchored to primary\nsources (arXiv, lab blogs, Wikipedia) and are the safest material to build chapters on.\n\n---\n\n# PART 1 — THE EIGHT LABS\n\nEach lab: current models (date-stamped) → known strengths (reputation) → product/strategy → compute/infra →\nsignature techniques → **one-line \"signature strength & the WHY\"** synthesis (the spine).\n\n---\n\n## 1. OpenAI\n\n### Models (as of 2026-06)\n- ✅ **GPT-5** launched 2025 as the unifying family; by **2026-02-13** OpenAI consolidated everything into the GPT-5 line and **retired** the older GPT-4 family AND the standalone o-series reasoning models (o1, o3, o4-mini). [aicomparison, ai-toolbox]\n- 🟡 **GPT-5.5** is described as the current flagship for complex reasoning/coding, **released 2026-04-24**; \"Instant\" default variant rolled out ~2026-05-05. Reasoning-effort levels: none / low / medium(default) / high / xhigh; smaller variants GPT-5.x mini and nano for cheap/low-latency work. [TechCrunch, Vellum, aicomparison] ⚠️ exact sub-version naming (5.3 Instant / 5.4 Thinking / 5.4 Pro / 5.5 / 5.6) is messy across aggregators — treat the **GPT-5 family + unified router + reasoning-effort dial** as the durable fact, individual point-versions as fast-moving.\n- ✅ Key structural shift: OpenAI **merged \"reasoning\" and \"general\" into one model with a router** that auto-escalates to deeper thinking (\"Instant\" vs \"Thinking\"). This is itself a notable 2026 architecture-of-product decision.\n\n### Known strengths (🟡 reputation)\n- Agentic coding, computer-use, \"give it a messy multi-part task and let it plan/use tools/check its work\", knowledge work, early scientific research. [OpenAI GPT-5.5 page via secondaries]\n- Strong math reasoning (claimed top-tier AIME). Broad general capability + the largest consumer mindshare.\n\n### Product / strategy\n- ✅ **ChatGPT is the scale leader**: ~900M weekly active users (announced 2026-02, up from ~800M Oct 2025, ~400M Feb 2025); crossed **1B monthly active app users** by ~May 2026 — fastest app ever to the milestone. ~50M paying subscribers + >9M paying business users. [demandsage, TechnologyChecker]\n- Two-sided: consumer ChatGPT + developer API/platform.\n\n### Compute / infra\n- ✅ Historically Microsoft-Azure-dependent (Azure was exclusive cloud). 2025–2026 the relationship loosened: OpenAI committed to buy an **incremental ~$250B in Azure** services but is explicitly building **compute independence**. [OpenAI/Microsoft joint statement]\n- ✅ **Stargate**: announced 2025-01, $100B initial → **$500B over 4 years**, backers OpenAI + SoftBank + Oracle + MGX (Abu Dhabi). Target 10GW US compute by 2029; OpenAI said (2026-04) it had **already surpassed that milestone**, +3GW in 90 days. [DCD, OpenAI]\n- ⚠️ **Setbacks (2026)**: Microsoft *took over* a second Stargate site (Narvik, Norway, ~30k Nvidia chips); OpenAI *halted* its UK Stargate over energy cost/regulation. Stargate is real and huge but not friction-free — write it as \"ambitious + contested,\" not \"smooth.\"\n\n### Signature techniques\n- RLHF at scale (InstructGPT lineage, see Part 2), then the **reasoning-model paradigm** (o1, Sep 2024) — RL on chains of thought + test-time compute. OpenAI *started* the reasoning-model era.\n\n### ✏️ Signature strength & the WHY\n**OpenAI: broadest general capability + consumer dominance + it kicked off the reasoning era. WHY = first-mover\non RLHF-chat (ChatGPT) and on RL-reasoning (o1), the deepest Azure compute relationship, and the largest user\nbase feeding product iteration.**\n\n---\n\n## 2. Google DeepMind\n\n### Models (as of 2026-06)\n- ✅ **Gemini 3** released **2025-11-18** (Gemini 3 Pro + Gemini 3 Deep Think). [Wikipedia: Gemini 3]\n- ✅ **Gemini 3.1 Pro** released **2026-02-19**; cited ~77.1% on ARC-AGI-2 (≈2× prior reasoning). [DataCamp, Medium]\n- 🟡/⚠️ **Gemini 3.5 Pro** unveiled at Google I/O **2026-05-19**, GA targeted **June 2026**; targets a **2-million-token context window** + \"Deep Think\" reasoning. ⚠️ As of 2026-06-09 not yet GA / no published independent benchmarks. Treat 2M context as the *headline ambition*, confirmed-shipping only for older 1.5 Pro / coming for 3.5.\n- ✅ Long-context heritage is real: **Gemini 1.5 Pro already shipped a 2M-token window** via API (2024). Long context is a genuine, durable Google signature.\n\n### Known strengths (🟡 reputation)\n- **Very long context** + **native multimodality** (text/image/audio/video in one model) + strong reasoning (\"Deep Think\"). Multimodal-native, not bolted-on.\n\n### Product / strategy\n- ✅ Deepest product surface of any lab: Search (AI Overviews / AI Mode), Workspace (Gmail/Docs), Android, the Gemini app (~750M MAU per Google; analysts predict 1B by Q3 2026 ⚠️ forecast). The need to serve *Search-scale* traffic shapes their efficiency obsession.\n\n### Compute / infra — the TPU vertical-integration advantage\n- ✅ **Self-owned silicon (TPU)** is Google's structural moat. **Ironwood = TPU v7** (GA ~Nov 2025), a pod scales to 9,216 liquid-cooled chips ≈ 42.5 ExaFLOPS, 192GB HBM/chip; ~5× compute vs prior Trillium. Powers Gemini inference at scale. [blog.google, SemiAnalysis]\n- ⚠️ **TPU 8 (8t train / 8i inference)** announced at Cloud Next 2026 — forward-looking.\n- ✅ Vertical integration: DeepMind co-designs models *with* TPU engineers; cited all-in TCO ~44% lower per Ironwood chip vs a GB200 server (⚠️ vendor-flavored figure). ⚠️ \"Google has 10M TPUs\" is a widely repeated aggregate — order-of-magnitude, not audited.\n\n### Research depth / heritage\n- ✅ DeepMind heritage: **AlphaGo** (beat Lee Sedol, 2016), **AlphaFold** (protein structure; AlphaFold2 2020, Hassabis & Jumper shared **2024 Nobel Prize in Chemistry**). This RL + scientific-discovery DNA is a real differentiator vs labs born purely from LLM scaling.\n\n### ✏️ Signature strength & the WHY\n**Google DeepMind: long context + native multimodal + deep research bench. WHY = TPU vertical integration\n(own the silicon → train biggest, serve cheapest), DeepMind's AlphaGo/AlphaFold RL-and-science heritage, and\nthe obligation to serve Search at planetary scale forcing efficiency.**\n\n---\n\n## 3. Anthropic\n\n> Book note: document factually like the others; do NOT center the narrative on Anthropic.\n\n### Models (as of 2026-06)\n- ✅ **Claude Opus 4.8** released **2026-05-28** — top-tier for complex reasoning, long-horizon agentic coding, high-autonomy work. [Wikipedia: Claude]\n- ✅ **Claude Sonnet 4.6** released **2026-02-17** — near-Opus on coding with better instruction-following/tool reliability.\n- ✅ **Claude Haiku 4.5** released **2025-10-15** — fastest/cheapest tier.\n- 🟡 **Claude Fable 5** + **Claude Mythos 5** released **2026-06-09** (\"Mythos-class\", most capable Anthropic models). Fable 5 = public version with safeguards; Mythos 5 = same model, some safeguards removed, restricted to **Project Glasswing** (cybersecurity pros; later select biology researchers). ⚠️ Fable 5 was **removed from Pro/Max/Team/Enterprise plans on 2026-06-23** (reported as **capacity constraints, not a security incident**) and moved to usage-credits — VERY fresh and likely to change. [Anthropic news
