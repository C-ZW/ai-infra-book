al, first MoE Llama: **Scout** (17B active, 16 experts, up to 10M-token context) and **Maverick** (17B active, 128 experts). [ai.meta.com]\n- ⚠️ **Llama 4 Behemoth (~2T scale)** never publicly shipped — \"in training\" at launch, then **effectively shelved** (MoE-routing / chunked-attention issues at 2T scale, Meta lost confidence). Treat as \"announced, not released.\"\n- ✅ **Muse Spark** (announced **2026-04-08**, about.fb.com / ai.meta.com) — Meta's **first proprietary, closed-weight frontier model**, from the new **Meta Superintelligence Labs (MSL)** under Alexandr Wang. **You cannot download the weights.** It now powers the Meta AI app. This ends Meta's 7-year open-weight-at-the-frontier identity. [CNBC, about.fb.com]\n\n### Open-weight strategy & licensing (the legacy that built the ecosystem)\n- ✅ Llama's **open weights** seeded a huge ecosystem (fine-tunes, on-prem, research). But the license was never pure-OSI: **Llama 4 Community License** restricts commercial use above **700M MAU** (must request separate license) and **prohibited EU-domiciled** use/distribution at launch. So \"open\" always had strings.\n- 🟡 WHY the pivot: frontier-training cost (Meta capex cited ⚠️ ~$115–135B in 2026), worry that **Chinese labs build commercial products on Llama**, need to monetize via platform integration + proprietary user data.\n\n### Compute / infra\n- ✅ Massive Nvidia H100 fleet (publicly targeted ~350k H100s for Llama-era training ⚠️ 2024-era figure). Among the largest GPU buyers. Huge 2026 capex.\n\n### ✏️ Signature strength & the WHY\n**Meta: built the open-weight ecosystem (Llama), now pivoting to proprietary at the frontier (Muse Spark).\nWHY = open weights gave reach + goodwill + a research flywheel, but rising frontier costs, fear of rivals\nfree-riding, and the pull of monetizing via 3B-user platforms (FB/IG/WhatsApp) flipped the strategy in 2026.**\n⚠️ This is the single most \"fresh and surprising\" lab story — flag it as a *2026 inflection*, not settled history.\n\n---\n\n## 5. Mistral AI\n\n### Models (as of 2026-06)\n- ✅/🟡 **Mistral Large 3** (Dec 2025) — flagship **open-weight sparse MoE**, ~**675B total / ~41B active**, **256K context**, **Apache 2.0**. Runs at ~41B-dense cost while accessing 675B capacity. [dev.to, IntuitionLabs]\n- 🟡 **Mistral Small 4** (2026-03-16) — unifies former Magistral(reasoning)/Pixtral(vision)/Devstral(coding) into one. [Serenities]\n- 🟡 **Mistral Forge** (announced GTC Mar 2026) — platform for enterprises to train frontier-grade models on their own data.\n\n### Known strengths (🟡 reputation)\n- **Efficiency / strong-small-models** + genuinely **open-weight MoE** (Apache 2.0 is more permissive than Llama's license). The European/sovereignty angle is core to the brand.\n\n### Sovereignty angle & partnerships\n- ✅ Europe's flagship frontier lab; \"sovereign AI\" positioning. Raised **$830M** (per reports) to build a sovereign data center near Paris (~13,800 Nvidia GB300 GPUs, ~Q2 2026). Nvidia partnership (~18,000 Grace Blackwell in France). Partnerships incl. **SAP** (German/EU sovereign stack), **Dassault Systèmes**, and an MGX+Nvidia 1.4-GW France campus (later-2020s, ⚠️ forward-looking). [actuia, NVIDIA newsroom, businesswire]\n\n### ✏️ Signature strength & the WHY\n**Mistral: efficient, truly-open (Apache-2.0) MoE + European sovereignty. WHY = a small team competing on\nefficiency not raw scale, Apache-2.0 openness as differentiation vs Llama's restricted license, and EU\ndemand for a non-US-dependent \"sovereign\" AI stack (govt/enterprise/regulated-industry partnerships).**\n\n---\n\n## 6. xAI\n\n### Models (as of 2026-06)\n- 🟡/⚠️ **Grok 5** — Musk announced Q1-2026 target, **reported ~6T parameters** (MoE) — claimed \"largest publicly announced model ever,\" trained on Colossus 2. ⚠️ Parameter count and exact ship status are Musk/press claims; verify before stating as fact. **UPDATE (ch10 + fact-check, 2026-06-13): the Q1-2026 window slipped to ~Q2-2026 and Grok 5 had NOT publicly shipped as of 2026-06-13** — treat \"released\" as unconfirmed; ch10 already hedges this in prose. Recheck ship status + the 6T-param claim on next scan.\n- (Grok 4-era was the prior public flagship; Grok ships fast and iterates publicly.)\n\n### The signature asset: Colossus\n- 🟡/⚠️ **Colossus** supercluster (Memphis). Reported (2026-01-15) **~555,000 GPUs**: Colossus 1 ~230k operational (incl. ~30k GB200s); Colossus 2 first batch ~550k GB200/GB300 coming online; ~**2 GW** total power. [Introl, Musk on X, NVIDIA newsroom] ⚠️ These are Musk/press figures, fast-moving — give the number AND \"self-reported, rapidly changing.\"\n- ✅ Speed-to-scale is the real story: xAI went from nothing to a top-tier cluster astonishingly fast (Colossus 1 stood up in ~months in 2024). Musk's stated 5-yr goal: **50M \"H100-equivalents\"** by ~2030 (⚠️ aspirational). [Tom's Hardware]\n\n### Real-time data from X\n- ✅ Grok's structural differentiator: native access to **real-time X (Twitter) data** — freshness/currency other models lack without web tools.\n\n### ✏️ Signature strength & the WHY\n**xAI: speed-to-scale + real-time data + raw compute. WHY = owning Colossus (self-built, among the world's\nlargest GPU clusters) lets them brute-force fast, and privileged live access to the X firehose gives Grok\nreal-time freshness rivals must bolt on.**\n\n---\n\n## 7. DeepSeek\n\n### Models (as of 2026-06)\n- ✅ **DeepSeek-V3** (Dec 2024, arXiv:2412.19437): MoE, **671B total / 37B active**, 256 routed experts, **MLA**, auxiliary-loss-free load balancing, **Multi-Token Prediction**, **FP8** training, 14.8T training tokens.\n- ✅ **DeepSeek-R1** (**2025-01-20**): 671B open-weight **reasoning** model — the one that shocked the market.\n- 🟡 **DeepSeek-V4** (Pro + Flash) reportedly shipped **2026-04-24**: MoE, ~1M-token context; agentic scores cited alongside GPT-5.5 / Claude Opus 4.7, at radically lower price (75% V4-Pro discount made permanent 2026-05-22). [MindStudio, DataCamp] ⚠️ secondary-sourced, fast-moving.\n\n### Efficiency innovations (the durable, citable core)\n- ✅ **MLA (Multi-head Latent Attention)** — introduced in **DeepSeek-V2**, compresses KV into a low-dim latent → big KV-cache / memory savings. A DeepSeek signature.\n- ✅ **GRPO (Group Relative Policy Optimization)** — introduced in **DeepSeekMath**, used in V3/R1; memory-efficient RL (drops the critic, scores a *group* of samples relative to each other). Central to R1.\n- ✅ MoE + MTP + FP8 + auxiliary-loss-free balancing — a stack of efficiency tricks, not one trick.\n\n### The cost-disruption narrative (handle the numbers carefully)\n- ✅ The famous **~$5.6M** figure traces to the **V3 technical report**: ~2.788M H800 GPU-hours for the *final pre-training run*. **Caveat (critical): it is GPU-pre-training compute ONLY** — excludes R&D, salaries, infrastructure, failed runs, prior-model investment.\n- ⚠️ Critics put true all-in cost far higher: estimates of **$1.3B / $1.6B** when you include the GPU fleet & R&D. So write: \"~$5.6M *for the final training run* — but total program cost is much higher and disputed.\"\n- ✅ Journalists frequently **confused V3's $5.6M with R1**; R1's own training was reported separately (~$294k, 512 H800s ⚠️ also a narrow figure).\n- ✅ Market impact: **2025-01-27 Nvidia fell ~17%, ≈$600B market cap wiped** on the R1 efficiency shock. ✅ But it **recovered** within months — the lasting lesson is \"algorithmic efficiency matters as much as scale,\" not \"scaling is dead.\"\n\n### ✏️ Signature strength & the WHY\n**DeepSeek: frontier-ish quality at a fraction of the cost, open-weight. WHY = a stack of efficiency inventions\n(MLA, GRPO, MoE, MTP, FP8) born of compute scarcity (export-controlled H800s) forced algorithmic cleverness —\nturning a constraint into a moat and resetting the industry's cost expectations.**\n\n---\n\n## 8. Alibaba Qwen\n\n### Models (as of 2026-06)\n- ✅ **Qwen3** (2025) — hybrid-reasoning, **119 languages**, full size ladder: edge (0.6B, 1.7B) → laptop (4B, 8B) → datacenter (32B, 235B, 480B); MoE incl. **Qwen3-235B-A22B** and **Qwen3-30B-A3B**, **Apache 2.0**. [qwenlm.github.io]\n- 🟡 **Qwen3.5** (2026-02-16, incl. a 397B-A17B MoE), **Qwen3.6-Plus** (2026-04-02, Model Studio), **Qwen3.6-35B-A3B** open-weights on HF/ModelScope (2026-04-17, Apache 2.0). ⚠️ point-versions move monthly; the durable facts are **breadth of sizes + open weights + multilingual**.\n\n### Known strengths (🟡 reputation)\n- **Open-weight breadth** (more sizes/variants than almost anyone — edge to datacenter), **multilingual** strength (119 languages), and strong **Chinese/Asian-market** fit. Among the **most-downloaded model families on Hugging Face**.\n\n### Product / strategy\n- ✅ Backed by Alibaba Cloud; open weights (mostly Apache 2.0) + hosted API (Model Studio). The \"we ship a model for every tier\" strategy maximizes ecosystem adoption.\n\n### ✏️ Signature strength & the WHY\n**Qwen: the broadest open-weight size ladder + multilingual reach. WHY = Alibaba Cloud's commercial incentive\nto seed an ecosystem (a model for every device tier), deep Chinese/Asian-language data, and aggressive\nopen-weight release driving Hugging Face dominance as a distribution strategy.**\n\n---\n\n# PART 2 — CROSS-CUTTING FACT AREAS\n\n---\n\n## A. Architecture commonality — \"same blueprint, different raising\"\n\n- ✅ **All current frontier LLMs are decoder-only Transformers with self-attention** (autoregressive next-token prediction). This is the book's central premise and it holds: the *blueprint* is shared. The \"different strengths\" come from data, scale, alignment, and architectural *variants* — not a different base paradigm.\n\nCommon variants and which labs are associated with them:\n\n| Variant | What it does | Associated with (examples) |\n|---|---|---|\n| ✅ **RoPE** (Rotary Position Embedding) | Encodes position by rotating Q/K vectors; enables long context | Near-universal: Llama, Qwen, Mistral, Gemma, etc. |\n| ✅ **GQA** (Grouped-Query Attention) | Query heads share KV heads → smaller KV cache, faster inference | Llama, Qwen, Mistral, Gemma, GPT-OSS — *the default* attention efficiency trick |\n| ✅ **MLA** (Multi-head Latent Attention) | Compresses KV into low-dim latent → even smaller KV cache | **DeepSeek** (V2 onward) — their signature |\n| ✅ **MoE** (Mixture-of-Experts) | Sparse FFN: route each token to a few \"expert\" subnetworks → huge total params, small active params | DeepSeek, Mistral, Qwen, Llama 4, Grok 5(claimed), most 2025–26 frontier models |\n| ✅ **MTP** (Multi-Token Prediction) | Predict several future tokens during training → denser signal | DeepSeek-V3 |\n\n- 🟡 Takeaway for the book: a 2026 frontier model ≈ decoder-only Transformer + RoPE + (GQA or MLA) + (usually) MoE.\n  The *attention efficiency choice* (GQA vs MLA) and *sparsity* (MoE) are where labs differentiate at the architecture level.\n\n---\n\n## B. Scaling laws\n\n- ✅ **Kaplan et al. 2020** (\"Scaling Laws for Neural Language Models\", OpenAI, **arXiv:2001.08361**, Jan 2020). Loss follows **power laws** in model size N, dataset size D, and compute C (L ∝ N^-α, D^-β, C^-γ), smooth over ~7 orders of magnitude. Conclusion that shaped GPT-3: **make models very large, train on relatively modest data, stop before convergence** (i.e. prioritize parameters over tokens).\n- ✅ **Hoffmann et al. 2022 — \"Chinchilla\"** (\"Training Compute-Optimal LLMs\", DeepMind, NeurIPS 2022). Trained 400+ models (44M–16B params); found Kaplan **under-weighted data**. For a fixed compute budget, **scale params and tokens TOGETHER (roughly equally)** — double model → double tokens. Their 70B **Chinchilla** trained on **1.4T tokens ≈ 20 tokens/parameter**, and *beat* the much larger Gopher.\n- ✅ **The headline number to get right: ~20 tokens per parameter** is the Chinchilla compute-optimal ratio. ⚠️ Note: later replication work (Epoch AI) partially questioned the exact fit, and in practice modern models are trained **far past** 20:1 (e.g. DeepSeek-V3: 671B params on 14.8T tokens) because *inference* cost rewards \"overtraining\" smaller models. So Chinchilla is the *compute-optimal-for-training* rule, not what labs actually do when serving billions of users.\n\n---\n\n## C. The reasoning-model paradigm (the 2024–2026 shift)\n\n- ✅ **OpenAI o1** released **September 2024** — first mainstream \"reasoning model.\" Trained via **RL to do implicit search via chain-of-thought**; performance scales with **both train-time RL and test-time (\"thinking\") compute**. Two paradigm shifts: (1) supervised → RL, (2) scaling *inference* compute, not just training. [openai.com/learning-to-reason]\n- ✅ **DeepSeek-R1** (2025-01-20) — open-weight reasoning model that showed the recipe could be reproduced cheaply (and largely via RL with verifiable rewards + GRPO). Hugely influential.\n\nWho has reasoning models now (as of 2026-06):\n| Lab | Reasoning mode/model | Note |\n|---|---|---|\n| OpenAI | GPT-5 \"Thinking\" / reasoning-effort dial | o-series retired, folded into GPT-5 router |\n| Google | Gemini \"Deep Think\" | 3 / 3.1 / 3.5 line |\n| Anthropic | Claude extended thinking (Opus/Fable) | reputed agentic/coding strength |\n| DeepSeek | R1 → reasoning in V3.1/V4 | open-weight, GRPO-trained |\n| Mistral | Magistral (folded into Small 4) | |\n| xAI | Grok reasoning modes | |\n| Qwen | Qwen3 hybrid reasoning | toggle thinking on/off |\n| Meta | Muse Spark (reasoning, closed) | parallel reasoning / \"thought compression\" claimed ⚠️ |\n\n- 🟡 Takeaway: by 2026 a reasoning mode is **table stakes**, not a differentiator. OpenAI started it (o1); DeepSeek democratized the recipe (R1).\n\n---\n\n## D. Alignment-method evolution (get attributions + dates right)\n\n| Method | Who / paper | Date | One-line |\n|---|---|---|---|\n| ✅ **RLHF** (at scale) | **InstructGPT**, Ouyang et al. (OpenAI), arXiv:2203.02155 | **Mar 2022** | Train a reward model from human preference rankings, then RL the policy to match. The foundation of ChatGPT-style alignment. |\n| ✅ **Constitutional AI / RLAIF** | **Bai et al. (Anthropic)**, arXiv:2212.08073 | **Dec 2022** | Replace much human feedback with **AI feedback** judged against a written \"constitution.\" Anthropic's signature. |\n| ✅ **RLVR** (RL from Verifiable Rewards) | multiple (Lambert et al., Guo et al. / DeepSeek-R1, 2024–2025) | 2024–2025 | Drop the learned reward model; use **objective** signals (answer correct? code compiles?). Core to the reasoning era. |\n| ✅ **GRPO** (Group Relative Policy Optimization) | **DeepSeek** (DeepSeekMath; used in V3/R1) | 2024 | Critic-free, memory-efficient RL: score a *group* of samples relative to each other. The engine behind R1. |\n\n- 🟡 Narrative arc for the book: **human feedback (2022) → AI feedback / constitution (2022) → verifiable rewards + GRPO (2024–25)**. The trend is **less human labeling, more automatable signal** — which is *why* reasoning models could scale cheaply.\n\n---\n\n## E. Compute & infra — rough order of magnitude (mark uncertain ⚠️)\n\n⚠️ **Every number here is order-of-magnitude and contested.** Use \"roughly / reported / self-reported.\"\n\n| Lab | Compute base | Rough scale (as of 2025–26) | Confidence |\n|---|---|---|---|\n| OpenAI | Azure + Stargate (own) | Stargate: $500B/4yr, >10GW target (claimed surpassed 2026-04) | ⚠️ headline figures |\n| Google | **own TPUs** (Ironwood v7, TPU 8 coming) | \"10M TPUs\"/\">1M H100-equiv\" cited; pods of 9,216 chips | ⚠️ aggregate, vendor-flavored |\n| Anthropic | **AWS Trainium (primary) + Google TPU** | >1M Trainium2; up to 5GW Trainium + up to 1M TPU deals | ✅ deals announced, ⚠️ live counts |\n| Meta | Nvidia H100 fleet | ~350k H100s (2024-era target); ~$115–135B capex 2026 ⚠️ | ⚠️ |\n| Mistral | Nvidia (sovereign EU DCs) | ~13,800 GB300 (Paris); ~18,000 Grace Blackwell (France) | 🟡 |\n| xAI | **Colossus (own)** | ~555k GPUs reported; ~2GW; goal 50M H100-equiv by ~2030 | ⚠️ Musk/press figures |\n| DeepSeek | export-controlled Nvidia (H800) | thousands of H800s (V3: ~2k-GPU-class run) | ⚠️ secretive |\n| Qwen/Alibaba | Alibaba Cloud | undisclosed | ⚠️ |\n\n- 🟡 Three \"own-silicon-or-self-built-cluster\" stories worth highlighting: **Google (TPU)**, **xAI (Colossus)**, and **Anthropic-via-AWS (Trainium)**. Nvidia dependence is the default; escaping it is a strategic theme.\n\n---\n\n## F. Benchmarks & \"who is strongest\" — the central honest caveat\n\nMajor benchmarks/leaderboards in use as of 2026-06:\n| Benchmark | Measures | 2026 status |\n|---|---|---|\n| ✅ **LMArena** (was Chatbot Arena / LMSYS; rebranded \"Arena\" 2026-01-28) | human-preference Elo, head-to-head votes | most-watched live leaderboard |\n| ✅ **MMLU-Pro** | hard multi-choice knowledge (12k Qs, 10 options) | **near-saturated** — top models cluster 88–94%, too tight to separate |\n| ✅ **GPQA (Diamond)** | graduate-level science reasoning | **approaching saturation** — frontier models ~94% |\n| ✅ **SWE-bench (Verified)** | real GitHub Python issues (500-task human-validated subset) | the key *agentic coding* benchmark |\n| ✅ **AIME** | competition math | reasoning models near-perfect |\n| 🟡 **Terminal-Bench, ARC-AGI-2** | agentic / abstract reasoning | newer, less saturated |\n\n### 🚨 THE CENTRAL CAVEAT (this is the book's spine — repeat it)\n- ✅ **Rankings shift every few months.** A \"best model\" claim has a shelf life of weeks.\n- ✅ **Contamination**: benchmark questions leak into training data → models *recall* instead of *reason*. Inflates scores.\n- ✅ **Saturation**: top benchmarks (MMLU-Pro, GPQA) are so crowded at the top they no longer separate frontier models.\n- ✅ **No single uniform winner.** Best practice: triangulate three *types* — a static academic eval (MMLU-Pro/GPQA) + a human-preference arena (LMArena) + an agentic suite (SWE-bench/Terminal-Bench). Only agreement across all three is a real signal.\n- 🟡 So the book must NEVER say \"X is the best model.\" Say \"as of 2026-06, X is reputed to lead at Y, on benchmark Z, which has caveats.\" Different labs lead on different axes — *that's the whole point of the book.*\n\n---\n\n## G. Data / the \"data wall\"\n\n- ✅ **Copyright litigation** is live and consequential. **NYT v. OpenAI/Microsoft** (filed Dec 2023): a judge **advanced the core infringement claims** (didn't dismiss); in **Jan 2026** OpenAI was **compelled to produce ~20M anonymized ChatGPT logs** to plaintiffs. ⚠️ No final merits ruling yet as of research time. [Harvard Law Review, Hollywood Reporter, natlawreview] (Many parallel suits from authors, music publishers, etc.)\n- ✅ **The data wall**: a widely-cited projection (Epoch AI / \"Will we run out of data?\") warned the stock of **high-quality public human text could be exhausted ~2026–2028**. The concern is real and roughly *now*.\n- 🟡 **Synthetic data** is the main response — but carries **model-collapse** risk (errors compound across generations) especially in hard-to-verify domains (creative writing, hypothesis generation). Verifiable domains (math/code) are safer for synthetic/RL data — which is *why* reasoning models lean on verifiable rewards.\n- 🟡 Book framing: the \"data wall\" + copyright squeeze is a big *reason* labs pivoted toward **RL on verifiable rewards, synthetic data, and proprietary user data** (e.g. Meta's Muse Spark explicitly leans on proprietary user data) rather than just scraping more web text.\n\n---\n\n# PART 3 — FRAGILE FACTS: RECHECK WITHIN 3 MONTHS\n\nEverything below WILL likely be stale by ~2026-09. Re-verify before any chapter ships.\n\n1. ⚠️ **OpenAI flagship version** — GPT-5.5 / 5.6 point-versions and the Instant/Thinking/Pro split. Re-check current top model + naming.\n2. ⚠️ **Gemini version** — 3.5 Pro GA status + whether 2M context actually shipped + real benchmarks.\n3. ⚠️ **Anthropic Fable 5 / Mythos 5** — *very* fresh (June 2026). Whether Fable 5 returns to subscription plans (was pulled 2026-06-23, \"capacity\"). Whether \"Mythos-class\" naming persists.\n4. ⚠️ **Meta Muse Spark** — closed-weight pivot just happened (Apr 2026). Confirm it stuck; confirm whether any new open Llama appears. This is the most surprising/volatile lab story.\n5. ⚠️ **DeepSeek V4 / R2** — V4 Pro/Flash pricing (the 75% permanent discount) and whether a new R-line reasoning model shipped.\n6. ⚠️ **Qwen point-version** — 3.5 / 3.6 / 3.7-Max churn monthly.\n7. ⚠️ **Mistral Large 3 / Small 4** — version + the Paris sovereign DC (13,800 GB300) coming-online status.\n8. ⚠️ **xAI Grok 5** — ship status + the 6T-param claim + Colossus GPU count (all Musk/press-sourced).\n9. ⚠️ **All GPU/TPU counts** in Part 2E — every one is contested/self-reported.\n10. ⚠️ **All benchmark numbers/rankings** — saturate and shuffle constantly; never freeze a leaderboard into prose.\n11. ⚠️ **NYT v. OpenAI** — watch for a merits ruling / settlement; the discovery order (20M logs) may evolve.\n12. ⚠️ **DeepSeek cost figures** — keep the \"$5.6M = final-run GPU only; all-in ~$1.3–1.6B; disputed\" framing intact; don't let \"$5.6M to build a frontier model\" sneak in as bare fact.\n\n---\n\n## Master source list (key durable anchors)\n\n**Primary / durable (safest):**\n- Kaplan et al. 2020 scaling laws — https://arxiv.org/abs/2001.08361\n- Hoffmann et al. 2022 Chinchilla — https://proceedings.neurips.cc/paper_files/paper/2022/file/c1e2faff6f588870935f114ebe04a3e5-Paper-Conference.pdf\n- InstructGPT (RLHF), Ouyang et al. 2022 — https://arxiv.org/pdf/2203.02155\n- Constitutional AI, Bai et al. 2022 — https://arxiv.org/pdf/2212.08073\n- DeepSeek-V3 Technical Report — https://arxiv.org/abs/2412.19437\n- OpenAI o1 \"Learning to reason with LLMs\" — https://openai.com/index/learning-to-reason-with-llms/\n- Reasoning model (overview) — https://en.wikipedia.org/wiki/Reasoning_model\n- Claude (language model) — https://en.wikipedia.org/wiki/Claude_(language_model)\n- Gemini (language model) — https://en.wikipedia.org/wiki/Gemini_(language_model)\n- GQA paper — https://arxiv.org/abs/2305.13245\n- Anthropic circuit-tracing — https://transformer-circuits.pub/2025/july-update/index.html\n- Ironwood TPU — https://blog.google/products/google-cloud/ironwood-tpu-age-of-inference/\n- Stargate announcement — https://openai.com/index/announcing-the-stargate-project/\n- Anthropic+Amazon 5GW compute — https://www.anthropic.com/news/anthropic-amazon-compute\n- Meta Muse Spark — https://about.fb.com/news/2026/04/introducing-muse-spark-meta-superintelligence-labs/\n- Anthropic Fable 5 / Mythos 5 — https://www.anthropic.com/news/claude-fable-5-mythos-5\n- Llama 4 herd — https://ai.meta.com/blog/llama-4-multimodal-intelligence/\n- Qwen3 blog — https://qwenlm.github.io/blog/qwen3/\n- NYT v OpenAI (HLR) — https://harvardlawreview.org/blog/2024/04/nyt-v-openai-the-timess-about-face/\n\n**Secondary / aggregator (fast-moving, treat as 🟡/⚠️):**\n- aicomparison.ai OpenAI 2026 guide; TechCrunch GPT-5.5/Fable5/Muse-Spark coverage; CNBC Meta/OpenAI;\n  Introl & SemiAnalysis (TPU/Colossus); MindStudio/DataCamp (DeepSeek V4); Serenities/dev.to (Mistral);\n  demandsage/TechnologyChecker (ChatGPT stats); Epoch AI (compute & data-wall); interconnects.ai &\n  techstrong.ai (DeepSeek cost dispute); digitalapplied/nanonets (benchmark methodology & contamination).\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "維護手冊（內部文件，非書籍內容）", "md": "# 維護手冊（內部文件，非書籍內容）\n\n《藍圖之外：同一套 Transformer，八家大模型為何各擅勝場》的跨章一致性基準、脆弱事實索引、掃描協定與掃描日誌。\n**改任何 book-src/ 內容前先讀本檔，再讀 style-guide.md 與 outline.md。** 時效事實一律以 `landscape-2026-06.md` 為錨。\n\n> ⚠️ **本書是全書架時效性最敏感的一本。** 主題就是「各家強弱」，而強弱每幾個月洗牌。預設假設：**任何版本號、排名、價格、GPU/TPU 數字、訓練成本，三個月內都可能過期。** 維護的核心不是追最新，而是確保 (1) 框架（五變數、養 vs 寫、影子必寫）耐久、(2) 會爛的數字都帶日期戳且可被一眼認出。\n\n## 一、跨章一致性基準（各章不得另創；改一處必全書同步）\n\n### 1. 核心命名與隱喻（全書統一用詞）\n- 「**架構不是護城河**」「模型是**養**出來的、不是**寫**出來的」「同一張**藍圖**、不同**養法**」。\n- 五變數記分卡，**固定名稱與順序**：**資料 / 後訓練·對齊 / 算力·基礎設施 / 研究文化·品味 / 產品取向**。\n- 「最強測不準」：禁絕對排名，一律「截至 2026-06／以…著稱」。\n- 收束句式：每家／每主題用「**強在 X，因為〔哪幾格〕；影子是 Y**」收尾。\n\n### 2. 成因拆解表格 house style（八家公司章 ch05–12 必一致）\n- 表格三欄：`變數 | 角色 | 為什麼`。\n- 角色記號只有三種：`✓ 主因`、`△ 次因`、`—`（不相關，留 em dash，不寫「（次要）」「（留白）」等字眼）。\n- weakness／爭議內容只放 `### (b) 影子`，**不得**塞進歸因表的格子。\n- **ch11 例外**：DeepSeek 表多一列「架構」（MLA/MoE），標 `✓ 主因`＋腳註說明「視為算力·基礎設施格的延伸、與 ch21 對得上」。五標準格仍保留。這是刻意的框架誠實侷限，**不要刪**（見 ch21 §影子）。\n\n### 3. 八家「招牌強項 → 主因落點」基準（ch21 總帳必與 ch05–12 一致）\n| 家 | ✓ 主因落點 | 一句話 |\n|---|---|---|\n| OpenAI (ch05) | 研究文化·品味＋產品取向（算力△） | 定義消費級產品＋開創 reasoning 範式 |\n| Google (ch06) | 算力·基礎設施＋研究文化·品味＋產品取向 | 長上下文＋原生多模態，TPU 垂直整合是因 |\n| Anthropic (ch07) | 後訓練·對齊＋研究文化·品味 | 對齊優先外溢成 agentic/coding；可解釋性底 |\n| Meta (ch08) | 產品取向（2026 反轉） | 締造開放權重生態 → 轉閉源（Muse Spark），同一格輸入變了 |\n| Mistral (ch09) | 研究文化·品味＋產品取向 | 歐洲效率派＋主權開放權重 |\n| xAI (ch10) | 算力·基礎設施＋資料 | 自建 Colossus 加速度＋X 即時資料 |\n| DeepSeek (ch11) | 算力（劣勢逼出）＋後訓練（GRPO）＋架構（MLA/MoE） | 效率發明撼動成本敘事 |\n| Qwen (ch12) | 產品取向＋資料 | 全尺寸開放權重廣度＋多語言縱深 |\n> **改任一公司章的 (a) 歸因表主因落點，必回頭同步 ch21 的「五變數總帳」表與八句收束。**\n\n### 4. 架構事實基準（照 landscape §A）\n- 所有前沿模型 = decoder-only Transformer ＋ self-attention；**原始 2017 論文是 encoder-decoder（翻譯用），業界後來才收斂到 decoder-only**（ch01 已點清，勿改回「原始就是 decoder-only」）。\n- 變體歸屬：GQA（通用、省 KV cache）／**MLA（DeepSeek 招牌）**／RoPE（位置編碼）／MoE（DeepSeek/Mistral/Qwen/Llama4 等）。\n- Scaling laws：Kaplan 2020（OpenAI）；**Chinchilla（DeepMind, Hoffmann 2022）≈20 tokens/param**；但實務 overtrain（推論成本獎勵）——這是「截至 2026-06 的做法、非定律」。\n- 推理範式：**OpenAI o1（2024-09）開頭**；**DeepSeek-R1（2025-01-20）便宜化**。\n- 對齊譜系：**RLHF（InstructGPT, OpenAI, 2022-03）→ Constitutional AI/RLAIF（Anthropic, 2022-12）→ RLVR/GRPO（DeepSeek, 2024–25）**。歸屬與年份勿張冠李戴。\n\n### 5. DeepSeek 成本敘事（ch11 招牌、易被傳播扭曲——紅線）\n- 「~560 萬美金」＝**由 GPU 時數（約 278.8 萬 H800 小時 × 假設單價 $2）回推的社群估算**，是 **V3 最後一次預訓練的 GPU 算力**，**非 DeepSeek 公布金額、非總成本**。全程估 ~$1.3–1.6B 且有爭議。媒體常把 V3 的數字當成 R1 的。**禁止**「560 萬美金做出前沿模型」這種裸寫。\n\n## 二、脆弱事實索引（最易過期，~2026-09 多半要重查）\n\n詳見 `landscape-2026-06.md` Part 3（12 條清單）。本書內最依賴它們的位置：\n- **各家當前旗艦版本號**：附錄 A 整表、ch05（GPT-5 家族/版本）、ch06（Gemini 3.x/3.5）、ch07（Opus 4.8、Fable 5/Mythos 5——**最易過期**，Fable 5 於 2026-06-23 因容量被下架）、ch11（V4 定價）、ch12（Qwen 點版本）。\n- **GPU/TPU 數量級**：ch10（Colossus ~555k）、ch16（三家自研叢集數字）、附錄 A——全部自我宣稱/估計，標 ⚠️。\n- **xAI Grok 5**：版本/6T 參數/出貨狀態。landscape 已記 Q1→Q2 滑動、截至 2026-06-13 未出。ch10 已 hedge。\n- **法律/產業動態**：ch18（NYT v OpenAI 的 20M logs 令、資料牆窗口）。\n- **可解釋性成熟度**：ch19（SAE 是否真優於 baseline、Google 是否降溫 SAE）——secondary，標 ⚠️。\n\n## 三、結構同步雷區（改一處要連動的地方）\n\n1. **全書 ASCII 路線圖**（基準在 outline.md）出現在 **ch01／ch05／ch13／ch20** 四處 Part 首章，各把 `◄你在這裡` 標在自己 Part。改圖要同步 4 處。\n2. **ch21 五變數總帳表**＝ch05–12 (a) 表的彙整：改任一公司主因，回頭同步 ch21（見一-3）。\n3. **附錄 A** 是 landscape 的人工摘錄：landscape 任一數字一改，附錄 A 是第一個要同步的地方。\n4. **附錄 B glossary 首見章**、**附錄 C 連結**：新增/刪章或改延伸閱讀連結時同步。\n5. ch11「架構」格的特殊處理與 ch21 §影子的對應說明，要一起改或都不改。\n\n## 四、掃描協定（「掃描書的時效性」＝執行這節）\n\n1. 重讀 `landscape-2026-06.md` Part 3 的 12 條脆弱事實，逐條帶網路重查（優先官方部落格／arXiv／可信新聞）。\n2. 有修正：**先改 landscape**（標新日期戳與 ✅/🟡/⚠️）→ 依「一、結構同步雷區」同步附錄 A、引用章、ch21 總帳 → 本檔掃描日誌記一行。**重大修正（推翻既有基準，如某家旗艦易主、開閉源策略再反轉）需兩個獨立來源。**\n3. 跑 `python3 ../../../tools/md-reader/check_diagrams.py book-src`（CJK=2，exit 0 才算過；傳目錄非單檔）。\n4. 跑簡體詞 lint（用精選詞表逐字比對，勿用 shell grep——繁簡同形字如 息/硬/境 會誤報；台灣正解誤判清單：頻寬=bandwidth、張量=tensor、對象=研究/目標對象、項目=清單項目、用戶皆合法）。\n5. 重打包：`python3 ../../../tools/md-reader/build_reader.py web/book.config.json`；書架有動先 `build_shelf.py`。\n6. **最須重掃**：附錄 A 整表、ch07 的 Fable 5/Mythos 5（半年內必過期）、ch10 Grok 5、各家旗艦版本號。\n\n## 五、掃描日誌\n\n- **2026-06-13｜建書**（Opus 4.8）。landscape 由帶網路 research agent 建（~30 搜尋）。21 章＋3 附錄並行寫成，每章 3–8 次自查。一致性掃描全過（check_diagrams 12 圖 0 可疑、簡體詞 clean、骨架完整、八家成因拆解表標準化為 `角色`/`✓ 主因`/`△ 次因`/`—`）。\n  - 第二意見：**agy**（Gemini Flash，無網路）做結構/框架審——採納表格標準化、寫作守則洩漏清除、ch06/ch07 因果補深、ch11 MLA 類比精準化＋GRPO 省 VRAM 說明、$5.6M 註明估算；**駁回**「刪 ch11 架構格」（已與 ch21 透明對齊，保留為框架誠實侷限）。\n  - 事實審：帶網路 Claude agent 抽查 8 條 landscape 主張，7 條 ✅；**修正 ch01**：原始 Transformer 是 encoder-decoder、業界後來才收斂 decoder-only。版本新鮮度上，web 抽查報 Opus 4.7／web 較舊，landscape 的 4.8＋Fable5/Mythos5 經 ~30 搜尋且與環境一致，**不被單一較舊來源推翻**，維持。\n  - 已知待重查：Grok 5 出貨（Q1→Q2 滑動、6/13 未出，已記 landscape）；Qwen HF 下載量為 ch12 加的 🟡 次級估算（未進 landscape，下次掃描可考慮收編或淡化）。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《藍圖之外：同一套 Transformer，八家大模型為何各擅勝場》\n形態：**21 章、四個 Part、3 個附錄**。欣賞與直覺型科普書（不是排行榜、不是教科書；純敘事＋紙上推演，無可執行 lab）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；版本／排名／價格／硬體／訓練成本等時效事實一律以 `landscape-2026-06.md` 為錨，標日期戳、不憑記憶、不下絕對排名。\n\n## 全書敘事弧（一句話貫穿）\n\n機器只懂矩陣乘法，但「智慧」不是寫出來的——是用**資料、優化目標、算力**養出來的。\n**架構（藍圖）是公開的、各家共用的**（ch01）→ 所以模型是「養」的不是「寫」的，能力沿一條 scaling 曲線長出來（ch02）→ 差異不在藍圖，在養法，而養法可拆成**五個變數**：資料／後訓練·對齊／算力·基礎設施／研究文化·品味／產品取向（ch03）→ 但別急著排名：「誰最強」會洗牌、benchmark 會騙人（ch04）→ 拿著這把五變數的尺，**逐家拆解強項的成因**：OpenAI（ch05）、Google（ch06）、Anthropic（ch07）、Meta（ch08）、Mistral（ch09）、xAI（ch10）、DeepSeek（ch11）、Qwen（ch12）→ 再把八家放一起，看**差異的橫切面**：開源vs閉源（ch13）、推理模型競賽（ch14）、對齊演化（ch15）、算力軍備（ch16）、多模態（ch17）、資料暗河（ch18）、可解釋性與安全（ch19）→ 收束：差異為什麼會**持續也會收斂**（ch20）→ 總收官：同一張藍圖、八種風格，五變數總帳（ch21）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章 ch01／ch05／ch13／ch20 照抄，把「◄你在這裡」標到該 Part 標題列）\n\n```\nPart I  共通底層（同一張藍圖）\n  ch01 同一張藍圖：架構不是護城河（序＋全書地圖）\n  ch02 模型是養出來的，不是寫出來的\n  ch03 五變數記分卡：差異的成因框架\n  ch04 「誰最強」是測不準的：評測政治學\n        |\n        v  拿著五變數這把尺，逐家拆解\nPart II 八家深入（一家一章；以什麼著稱 → 為什麼是這家）\n  ch05 OpenAI      ch06 Google      ch07 Anthropic   ch08 Meta\n  ch09 Mistral     ch10 xAI         ch11 DeepSeek    ch12 Qwen\n        |\n        v  把八家放一起，看差異的橫切面\nPart III 跨家主題（差異的橫切面）\n  ch13 開源 vs 閉源：兩種世界觀\n  ch14 推理模型競賽：o1 之後的範式轉移\n  ch15 對齊方法演化：RLHF → Constitutional AI → RLVR\n  ch16 算力軍備競賽：GPU、TPU、自研晶片\n  ch17 多模態：文字之外的戰場\n  ch18 資料暗河：版權、合成資料與資料牆\n  ch19 我們造出看不懂的東西：可解釋性與安全\n        |\n        v  收束\nPart IV 收束\n  ch20 為什麼差異會持續、也會收斂\n  ch21 同一張藍圖，八種風格（總收官，五變數總帳）\n```\n\n## 五變數框架（ch03 定調的全書記分卡，固定順序與用詞，各章 `## 成因拆解` 照用）\n\n| # | 變數 | 一句話 | 它解釋什麼差異 |\n|---|---|---|---|\n| 1 | **資料**（data） | 餵什麼、配比、清洗、來源（網路／程式碼／合成／專有） | 模型「見過什麼世界」；中文強弱、程式碼強弱、知識廣度 |\n| 2 | **後訓練·對齊**（post-training / alignment） | SFT、RLHF、RLAIF、RLVR、reward model、指令與性格塑形 | 「好不好用、聽不聽話、會不會推理」很多來自這裡 |\n| 3 | **算力·基礎設施**（compute / infra） | GPU/TPU 數量、自研晶片、叢集、互連、訓練工程成熟度 | 能訓多大、多久、多便宜；長上下文、超大模型可不可行 |\n| 4 | **研究文化·品味**（research culture / taste） | 押哪個方向、實驗紀律、迭代速度、人才密度、價值取向 | 為什麼有人先做出 reasoning、有人先做對齊；難被抄走 |\n| 5 | **產品取向**（product orientation） | 服務誰（消費者／開發者／企業／自家產品）、開放或封閉 | 模型被「養成」什麼形狀，往往是被它要服務的產品壓出來的 |\n\n口訣：**強在 X，因為〔哪幾格〕；影子是 Y。** 全書每章收尾都要結出這一句，ch21 累積成總帳。\n\n## 跨章基準（一致性掃描的依據；各章不得另創，一律照本表與 landscape）\n\n### 核心命名與隱喻（全書統一）\n- 核心主張：「**架構不是護城河**」「模型是**養**出來的、不是**寫**出來的」「同一張**藍圖**、不同**養法**」。\n- 記分卡固定名稱與順序：**資料 / 後訓練·對齊 / 算力·基礎設施 / 研究文化·品味 / 產品取向**。\n- 「最強測不準」：禁絕對排名，一律「截至 2026-06／以…著稱」。\n\n### 架構事實基準（照 landscape §架構共通；各章引用須一致）\n- 所有前沿模型皆為 **decoder-only Transformer ＋ self-attention**；2017〈Attention Is All You Need〉。\n- 共通變體與常見歸屬（以 landscape 為準）：**GQA**（省 KV cache）、**MLA**（DeepSeek 招牌）、**RoPE**（位置編碼）、**MoE**（稀疏專家，DeepSeek/Mistral/Qwen 等愛用）。\n- **Scaling laws**：Kaplan et al. 2020（OpenAI）；**Chinchilla**（DeepMind, Hoffmann et al. 2022）的 compute-optimal「資料與參數要等比放大」結論。\n- **推理範式轉移**：OpenAI **o1**（2024 年底）開啟 test-time compute／對思維鏈做 RL；之後各家陸續有 reasoning 模型（日期戳照 landscape）。\n- **對齊方法演化譜系**：RLHF（InstructGPT, OpenAI 2022）→ Constitutional AI / RLAIF（Anthropic 2022）→ RLVR / GRPO（DeepSeek，可驗證獎勵、省掉 reward model）。歸屬與年份照 landscape，不得張冠李戴。\n\n### 八家「招牌強項 → 為什麼」骨架（spine；company 章與 theme 章提到同一家必一致；最終措辭以 landscape 的 synthesis 為準，這裡為骨架）\n> ⚠️ 以下為「reputation／consensus 層級」的定位骨架，**具體版本號與排名一律不寫進骨架**，交各章從 landscape 取並標日期戳。\n\n| 家 | 招牌定位（reputation） | 為什麼（主因落在哪幾格） |\n|---|---|---|\n| OpenAI | 把模型變成大眾產品的先行者；reasoning 範式開創（o-series） | 產品取向（ChatGPT 定義市場）＋研究文化（先押 RLHF、先押 test-time compute）＋算力（Azure/Stargate） |\n| Google DeepMind | 超長上下文、多模態、研究縱深 | 算力·基礎設施（自研 **TPU** 垂直整合）＋研究文化（DeepMind/AlphaGo·AlphaFold 底）＋產品取向（要餵 Search/Workspace） |\n| Anthropic | 對齊優先、可解釋性、agentic/coding 口碑 | 研究文化（安全派、Constitutional AI、interpretability）＋後訓練·對齊＋產品取向（開發者/coding） |\n| Meta | 開放權重生態系的締造者（Llama），**但 2026-04 轉向閉源前沿**（Muse Spark） | 產品取向（先用開放權重做大生態，再因前沿成本／對手搭便車而轉閉源、靠 3B 用戶平台變現）＋算力（自有大量 GPU）＋研究文化（FAIR 開放傳統的鬆動） |\n| Mistral | 歐洲效率派、小模型／開放權重 MoE、主權 AI | 研究文化·品味（效率優先）＋產品取向（歐洲主權、開放）＋資料（多語言/歐語） |\n| xAI | 後發者的加速度：算力暴力（Colossus）、即時資料 | 算力·基礎設施（極速堆叢集）＋資料（X 即時語料）＋研究文化（速度取向） |\n| DeepSeek | 用效率創新撼動「訓練很貴」的成本敘事；開放權重推理 | 算力·基礎設施（受出口管制逼出的效率）＋後訓練（**GRPO**）＋架構（**MLA**＋MoE）＋研究文化（工程效率品味） |\n| Alibaba Qwen | 開放權重廣度（多尺寸）、多語言、亞洲市場縱深 | 產品取向（全尺寸開放、雲生態）＋資料（中文/多語言）＋算力（阿里雲） |\n\n### 易脆事實（最須標日期戳、最易過期；詳見 landscape 與 maintenance.md）\n- 任一家的**當前旗艦版本號**與**排行榜名次**（每幾個月變）。\n- 各家 **GPU/TPU 數量級**（多為估計／未證實，⚠️）。\n- **DeepSeek 訓練成本**（V3 約 560 萬美金的主張）——必須同時給主張值與但書（只算最後一次預訓練 GPU 時數、不含研發/硬體攤提）。\n- xAI **Colossus** 叢集規模數字。\n- 各家 reasoning 模型的有無與時間。\n\n---\n\n# 逐章規格（goal／必涵蓋／不涵蓋→指向／橋接／成因個案／推演 idea）\n\n## Part I — 共通底層（同一張藍圖）\n\n### ch01 — 同一張藍圖：架構不是護城河\n- **goal**：建立全書第一個反直覺——食譜公開，為何菜色天差地遠；給出全書地圖與「養法 vs 藍圖」的分野。\n- **必涵蓋**：Transformer/attention 是公開論文（2017）；各家底層大同小異、只差工程變體（GQA/MLA/RoPE/MoE 一句帶過，細節見 ch16/各家章）；點出「差異在架構之外」這個全書命題；放全書 ASCII 路線圖。\n- **不涵蓋**：五變數的展開（→ch03）；attention 的數學（讀者已從 AI Infra 書懂概念，喚醒即可）。\n- **橋接**：你的微服務都用同一套 K8s／同一個雲，跑出來的系統行為卻天差地遠——決定差異的是你怎麼配、餵什麼流量、團隊怎麼運維，不是 K8s 本身。\n- **個案**：同一篇 2017 論文 → 八家都站在它上面。\n- **推演 idea**：用自己的話解釋「為什麼架構公開反而領先很難被立刻抄走」。\n\n### ch02 — 模型是養出來的，不是寫出來的\n- **goal**：講清楚「訓練」與傳統「寫程式」的本質差異，以及 scaling laws 為何讓這件事像科學。\n- **必涵蓋**：pretraining 的本質（預測下一個 token，從海量資料長出能力）；「沒有人寫『遇到 X 就回 Y』」；scaling laws 直覺（投入 vs 能力的一條可外推曲線，Kaplan 2020 / Chinchilla 2022 的 compute-optimal），用直覺講不推導；為什麼這讓「先畫趨勢線再決定砸多少錢」變可能。\n- **不涵蓋**：後訓練/對齊（→ch15）；算力細節（→ch16）；具體損失函數與數學。\n- **橋接**：你寫 cache library 是逐條規則；模型比較像你調 autoscaling——你不規定每個 pod 何時起，你設好指標與目標，行為自己長出來。\n- **個案**：Chinchilla 如何推翻「光把參數做大」、改成資料與參數等比放大。\n- **推演 idea**：找破綻——「參數越多模型越強」這句話哪裡不精確。\n\n### ch03 — 五變數記分卡：差異的成因框架\n- **goal**：交出全書的分析工具——五變數，並示範怎麼用它歸因。\n- **必涵蓋**：五變數逐一定義（照上表）＋每格各舉一個「這格主導某家某強項」的迷你例子（預告，不展開）；說明 `## 成因拆解` 怎麼讀；強調這五格交互作用、少有單一主因。\n- **不涵蓋**：各家完整拆解（→Part II）；評測（→ch04）。\n- **橋接**：像你做瓶頸診斷——CPU/IO/鎖/網路逐項排查；五變數就是「模型強弱」的那張排查清單。\n- **個案**：用一個讀者熟的對照（同一台 RDS，效能差異來自 schema/index/查詢/硬體/流量五個源頭）類比五變數。\n- **推演 idea**：把「Google 長上下文很強」這句話試著歸到五格，看主因落在哪。\n\n### ch04 — 「誰最強」是測不準的：評測政治學\n- **goal**：在進入逐家比較前，先卸掉「排行榜＝真相」的天真，建立誠實的比較框架。\n- **必涵蓋**：主要 benchmark/leaderboard（LMArena、MMLU-Pro、GPQA、SWE-bench、AIME… 照 landscape）各量什麼；benchmark 污染（contamination）、過擬合、刷榜；為什麼名次每幾個月洗牌；「強」要分任務（coding≠數學≠長文≠多語言）；連到機率書的抽樣偏誤與信賴區間。\n- **不涵蓋**：各家強項細節（→Part II）。\n- **橋接**：像你看 k6 壓測報告——平均延遲漂亮不代表 p99 不爆；單一數字會騙人，要看分布與場景。\n- **個案**：一個 benchmark 污染或刷榜的具體故事（照 landscape 取可信例）。\n- **推演 idea**：設計一個「看起來公平其實偏袒某家」的評測，講出偏在哪。\n\n## Part II — 八家深入（一家一章；先「以什麼著稱」再「為什麼是這家」）\n\n> 每章統一節奏：(1) 以什麼著稱（標日期戳、查 landscape）→ (2) 用五變數層層回答為什麼 → (3) `## 成因拆解`（五格歸因＋影子＋何時不成立）。**禁絕對排名**。\n\n### ch05 — OpenAI：把模型變成產品的人\n- **goal**：解釋 OpenAI 的兩個招牌——定義消費級 AI 產品（ChatGPT）、開創 reasoning 範式（o-series）——的成因。\n- **必涵蓋**：ChatGPT 如何定義市場與分發；先押 RLHF（InstructGPT）、先押 test-time compute（o1）的研究取向；Azure/Stargate 算力；產品取向如何反過來塑形模型。\n- **不涵蓋**：reasoning 範式的跨家全貌（→ch14）；RLHF 機制細節（→ch15）；算力數字深挖（→ch16）。\n- **橋接**：先發優勢像你第一個在團隊推 OpenAPI 強制同步——定義了規範，別人得跟。\n- **個案**：ChatGPT 上線如何把「研究 demo」變成產品分發引擎。\n- **影子**：先行者的包袱、閉源、安全/治理爭議、被開放權重從下方夾擊。\n\n### ch06 — Google DeepMind：長上下文、多模態與 TPU 的垂直整合\n- **goal**：解釋為什麼超長上下文與多模態長在 Google，而 TPU 是關鍵成因。\n- **必涵蓋**：Gemini 的長上下文與原生多模態（版本與 context 長度照 landscape）；**自研 TPU** 的垂直整合如何讓長序列訓練／服務成本可控（連回 AI Infra 書的 KV cache 成本）；DeepMind（AlphaGo/AlphaFold）研究底；要服務 Search/Workspace 的產品壓力。\n- **不涵蓋**：多模態跨家全貌（→ch17）；算力競賽全貌（→ch16）。\n- **橋接**：自研 TPU≈你自建框架/自管基礎設施——掌握整條 stack 才能做別人做不到的最佳化。\n- **個案**：TPU 垂直整合 → 長上下文可行性的因果鏈（一條講透）。\n- **影子**：產品線太多、整合包袱、消費者端「起個大早趕個晚集」的敘事。\n\n### ch07 — Anthropic：對齊優先、可解釋性與 agentic/coding 口碑\n- **goal**：解釋 Anthropic 的性格——把安全/對齊當第一性原則——如何反而長出好用的 coding/agentic 模型。**不以 Anthropic 為全書主角，與其他家同等對待。**\n- **必涵蓋**：Constitutional AI / RLAIF（讓模型照原則自評，省人工標註）；interpretability 研究（「模型的神經科學」）；為什麼對齊投入會外溢成「聽話、好用、適合 agent/coding」；產品取向偏開發者。\n- **不涵蓋**：對齊方法跨家譜系（→ch15）；可解釋性/安全跨家全貌（→ch19）。\n- **橋接**：Constitutional AI≈你給團隊一份 lint/規範檔，讓 CI 自動把關，而不是逐條人工 code review。\n- **個案**：Constitutional AI 的「給憲法→自我批評→自我修正」迴路講透。\n- **影子**：安全取向的速度/開放代價；規模與算力相對對手的限制。\n\n### ch08 — Meta：開放權重的締造者，與 2026 的轉向\n- **goal**：解釋 Meta 為何曾是開放權重最大推手（Llama），以及為什麼在 2026-04 轉向閉源前沿（Muse Spark）——這個轉向本身就是全書「強項的影子會應驗」最戲劇化的個案。\n- **必涵蓋**：Llama 開放權重如何締造龐大生態（fine-tune、on-prem、研究飛輪）；授權從來不是純開源（Llama 4 社群授權對 700M MAU 以上與 EU 的限制）；**2026 轉向**：Llama 4 Behemoth 擱置、Muse Spark（Meta Superintelligence Labs，Alexandr Wang，閉源、權重不可下載）；轉向的成因——前沿訓練成本暴漲、怕中國廠商靠 Llama 搭便車、要靠 3B 用戶平台與專有資料變現。版本與細節照 landscape，**標為「2026 轉折、非定局」**。\n- **不涵蓋**：開源vs閉源的哲學全貌（→ch13）。\n- **橋接**：開放權重≈你把內部 cache library 開源給全公司用——採用率變護城河，但當維護成本超過回報、或對手靠它做產品，你會想收回控制權。\n- **個案**：「送出權重換生態主導權」的槓桿邏輯，以及它在 2026 為何反轉——把 ch01 預告的「影子」演成真實事件。\n- **影子**：送出權重＝送出部分護城河（這個影子在 2026 應驗）；轉向後的信任落差與開源社群反彈；閉源前沿能否追上 OpenAI/Google 仍未定。\n\n### ch09 — Mistral：歐洲效率派與主權 AI\n- **goal**：解釋小團隊如何靠效率與開放權重在巨頭夾縫中立足，以及「歐洲主權」這個產品取向的作用。\n- **必涵蓋**：效率優先的品味（小模型、開放權重 MoE）；歐洲主權/法規/在地語言的產品定位；資料的多語言/歐語側重；版本照 landscape。\n- **不涵蓋**：MoE 機制深挖（→ch16）；開源哲學（→ch13）。\n- **橋接**：資源受限逼出效率≈你在成本壓力下把 RDS CPU 降 40%——限制是創新的母親。\n- **個案**：一個「以小搏大」的效率設計取捨。\n- **影子**：規模/算力天花板；夾在開放權重大廠與閉源巨頭之間的生存壓力。\n\n### ch10 — xAI：算力暴力與即時資料的加速度\n- **goal**：解釋後發者 xAI 如何用「極速堆算力＋即時資料」換取追趕速度。\n- **必涵蓋**：Colossus 超級叢集（規模數字照 landscape，標⚠️）；來自 X 的即時語料；速度取向的研究文化；Grok 版本照 landscape。\n- **不涵蓋**：算力競賽全貌（→ch16）；資料來源倫理全貌（→ch18）。\n- **橋接**：垂直整合自有資料源≈你那條自建 FluentBit pipeline——掌握即時資料流是結構性優勢。\n- **個案**：Colossus 如何把「建叢集的時間」壓成競爭武器。\n- **影子**：算力暴力的能源/成本/品質代價；即時資料的雜訊與爭議；內容治理風險。\n\n### ch11 — DeepSeek：效率創新如何撼動成本敘事\n- **goal**：解釋 DeepSeek 如何用架構與訓練法創新，挑戰「訓練前沿模型一定很貴」的共識。\n- **必涵蓋**：**MLA**（Multi-head Latent Attention，砍 KV cache，連回 AI Infra 書）；MoE 稀疏；**GRPO**（省掉 reward model 的 RL）；開放權重推理模型（R1 線）；V3 約 560 萬美金主張**及其但書**（只算最後一次預訓練、不含研發/硬體）；出口管制如何逼出效率文化。\n- **不涵蓋**：對齊方法譜系（→ch15）；算力競賽（→ch16）；開源哲學（→ch13）。\n- **橋接**：MLA 砍 KV cache≈你做的多層 cache 壓記憶體；GRPO 省 reward model≈你砍掉一個中間服務簡化 pipeline。\n- **個案**：560 萬美金數字的「正確讀法」——破除迷思又不否定其效率成就。\n- **影子**：成本數字被過度簡化的傳播；出口管制的長期天花板；開放權重的商業模式問題。\n\n### ch12 — Alibaba Qwen：開放權重廣度與多語言縱深\n- **goal**：解釋 Qwen 為何成為開放權重生態（尤其多尺寸、多語言、亞洲）的重要力量。\n- **必涵蓋**：全尺寸開放權重策略（多參數量級、Hugging Face 採用度照 landscape）；中文/多語言資料優勢；阿里雲算力與產品取向；版本照 landscape。\n- **不涵蓋**：開源哲學（→ch13）；多模態（→ch17）。\n- **橋接**：提供全尺寸模型≈你的 library 同時出 lite/標準/企業版——覆蓋從邊緣到雲的所有部署點。\n- **個案**：「全尺寸開放」如何在開發者生態裡形成採用飛輪。\n- **影子**：地緣政治/信任門檻；前沿旗艦與閉源頂尖的差距；評測可信度爭議。\n\n## Part III — 跨家主題（差異的橫切面）\n\n### ch13 — 開源 vs 閉源：兩種世界觀\n- **goal**：把開放權重（Mistral/DeepSeek/Qwen，以及曾經的 Meta）與閉源為主（OpenAI/Anthropic/Google）的路線之爭講成一個結構性對立，而非好壞之爭；用 **Meta 2026 的「換邊」** 當最有張力的個案。\n- **必涵蓋**：「開放權重」≠「開源」（多數不開訓練碼/資料，授權常有 MAU/地區限制）；兩條路各自的商業模式、護城河、安全論述；**Meta 從開放旗艦轉向閉源（Muse Spark）說明了開放權重戰略的脆弱點**；為什麼同一家可以兩條腿走（Google 也出 Gemma、閉源 Gemini 並行）。\n- **不涵蓋**：各家個別故事（→Part II，用「見 chNN」帶）。\n- **橋接**：開源 vs 閉源≈你權衡自建 vs 採購、開放 API vs 鎖定。\n- **影子**：兩種路線各自的失效情境。\n\n### ch14 — 推理模型競賽：o1 之後的範式轉移\n- **goal**：講清楚 reasoning 模型（test-time compute／對思維鏈做 RL）為何是 2024 年底以來最大的範式轉移，以及各家如何跟進。\n- **必涵蓋**：o1（2024 末）開頭；「想久一點＝更聰明」的 test-time compute 直覺；RL on chain-of-thought；哪些家有 reasoning 模型（日期戳照 landscape）；連回 ch02 的「訓練 vs 推論期算力」。\n- **不涵蓋**：對齊方法機制（→ch15）。\n- **橋接**：test-time compute≈你給一個 job 更多 CPU 時間換更好結果——延遲換品質的取捨。\n- **影子**：成本/延遲暴增；reasoning 不等於可靠；評測過擬合。\n\n### ch15 — 對齊方法演化：RLHF → Constitutional AI → RLVR\n- **goal**：把後訓練/對齊的方法譜系講成一條演化線，並標清楚誰貢獻了什麼。\n- **必涵蓋**：RLHF（InstructGPT 2022）→ Constitutional AI/RLAIF（Anthropic 2022，用 AI 回饋省人工）→ RLVR/GRPO（DeepSeek，可驗證獎勵省 reward model）；每一步「解決上一步的什麼瓶頸」。\n- **不涵蓋**：各家性格（→Part II）。\n- **橋接**：從人工標註→AI 自評→可驗證獎勵，像你的測試從人工 QA→自動化測試→property-based/形式驗證（連書架 TLA+ 書一句）。\n- **影子**：對齊稅、reward hacking、諂媚（sycophancy）、可驗證獎勵只適用可驗證任務。\n\n### ch16 — 算力軍備競賽：GPU、TPU、自研晶片\n- **goal**：解釋算力與基礎設施如何是「能不能養出某類模型」的硬約束，以及自研晶片的戰略意義。\n- **必涵蓋**：GPU（NVIDIA 生態）vs 自研（Google TPU、其他自研⚠️）；叢集規模數量級（標⚠️與日期戳）；互連/能源/成本；出口管制如何重塑 DeepSeek 等的選擇；連回 AI Infra 書的 roofline/記憶體階層。\n- **不涵蓋**：各家個別算力故事（→Part II）。\n- **橋接**：自研晶片≈你自管基礎設施 vs 用代管——掌握 stack 換最佳化空間與成本。\n- **影子**：算力≠贏；資本支出黑洞；供應鏈/地緣風險。\n\n### ch17 — 多模態：文字之外的戰場\n- **goal**：解釋為什麼多模態（影像/音訊/影片）是下一個差異化戰場，以及誰為何領先。\n- **必涵蓋**：原生多模態 vs 後接（Google 原生取向）；資料與算力門檻；產品取向如何驅動（要做影片/語音/裝置端）；現況照 landscape、標日期戳。\n- **不涵蓋**：各家完整版本（→Part II/附錄 A）。\n- **橋接**：多模態 pipeline≈你處理多種輸入格式統一進同一服務的工程。\n- **影子**：評測更難、幻覺更隱蔽、成本更高。\n\n### ch18 — 資料暗河：版權、合成資料與資料牆\n- **goal**：揭開最不透明也最關鍵的變數——資料——的當代爭議與走向。\n- **必涵蓋**：版權訴訟（NYT v OpenAI 等，照 landscape）；公開文字資料快用完的「資料牆」憂慮；合成資料的興起與風險（模型崩塌 model collapse）；資料配比為何是各家最不公開的秘密。\n- **不涵蓋**：各家資料細節（多不可考，誠實標未知）。\n- **橋接**：資料配比≈你的流量整形與取樣策略——你餵系統什麼，決定它學會什麼。\n- **影子**：合成資料的回授風險；法律不確定性；資料優勢難以驗證。\n\n### ch19 — 我們造出看不懂的東西：可解釋性與安全\n- **goal**：講最 sci-fi 的橫切面——模型內部沒人完全看懂，以及各家如何面對（interpretability、red-teaming、安全研究）。\n- **必涵蓋**：訓練完的權重為何「連造它的人都不全懂」；interpretability 在做什麼（找 feature/circuit，「模型的神經科學」）；red-teaming/evals 的角色；不同家的安全取向差異（不褒貶、講取捨）。\n- **不涵蓋**：Anthropic 個別故事（→ch07）。\n- **橋接**：可解釋性≈你對黑箱系統做 observability——拿探針去戳一個你沒法逐行讀懂的系統。\n- **影子**：可解釋性還很早期；安全與能力/速度的張力；「安全」也可能是行銷。\n\n## Part IV — 收束\n\n### ch20 — 為什麼差異會持續、也會收斂\n- **goal**：給出全書的動態判斷——哪些差異是結構性的（會持續）、哪些會被互相抄走（收斂）。\n- **必涵蓋**：結構性護城河（算力/晶片、專有資料、研究文化/品味、產品分發）vs 易擴散的（架構技巧、訓練法、開放權重）；趨同壓力（大家互相 distill/抄）；下一個可能的轉折（reasoning 之後、資料牆之後）。放全書路線圖（Part IV 版）。\n- **不涵蓋**：預測誰會贏（刻意不預測）。\n- **橋接**：技術趨同≈雲服務功能互相抄，最後差異化退回到生態、整合、運維文化。\n- **影子**：任何預測的測不準；本書是 2026-06 的快照。\n\n### ch21 — 同一張藍圖，八種風格（總收官）\n- **goal**：收束全書主張，把八家的「強在 X，因為〔哪幾格〕，影子是 Y」結成一張總帳；回扣 ch01 的反直覺。\n- **必涵蓋**：五變數總帳表（八家 × 五格的歸因總覽）；重申「架構不是護城河、模型是養出來的、最強測不準、風格才穩定」；給讀者一套「以後看到新模型發表，怎麼用五變數自己判斷」的思考工具。\n- **不涵蓋**：新事實（全是回收）。\n- **橋接**：像你讀完一個大系統的 postmortem——重點不是記住每個數字，是帶走一套判斷框架。\n- **個案**：用五變數現場拆解「一款剛發表的新模型」當示範（用 landscape 最新一款）。\n\n## 附錄（章節寫完後才寫，從實際寫出的內容編纂）\n\n- **附錄 A — 八家模型家族速查表**：每家當前主要模型、上下文長度、開放/閉源、招牌技術、算力來源、招牌強項一句話。**全表標日期戳「截至 2026-06」、最易過期、maintenance 首要重掃對象。**\n- **附錄 B — 名詞對照與 glossary**：中英對照＋一句話定義（Transformer、attention、GQA、MLA、RoPE、MoE、pretraining、SFT、RLHF、RLAIF、RLVR、GRPO、Constitutional AI、scaling laws、Chinchilla-optimal、test-time compute、reasoning model、distillation、model collapse、benchmark contamination…），標首次出現章。\n- **附錄 C — 延伸閱讀地圖**：依主題分組的真實連結（原始論文／技術報告／可信整理），以 landscape 驗證過的為優先。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n書名（工作名）：《藍圖之外：同一套 Transformer，八家大模型為何各擅勝場》。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的科普書，從**資深後端／分散式系統工程師的視角**讀當代大型語言模型產業。核心問題只有一個——**底層明明是同一張架構藍圖（decoder-only Transformer ＋ self-attention），為什麼各家養出來的模型強項天差地遠？** 讀完要能用自己的話，對另一個工程師講清楚「OpenAI、Google、Anthropic、Meta、Mistral、xAI、DeepSeek、Qwen 各擅長什麼、**為什麼**會這樣」，而不是背一張排行榜。\n- **不是**：\n  - **不是排行榜**——本書刻意不選「誰最強」。當代模型每幾個月洗牌一次；書要教的是**差異的成因結構**（為什麼會有差異、差異記在哪個帳上），不是某個時間點的名次。任何排名、版本號、價格、GPU 數量都**必須標日期戳**、用「截至 2026-06／以…著稱」而非「就是最好」。\n  - **不是技術教科書**——不教你訓練模型、不推導 attention 公式、不教 PyTorch；機制只講到「能支撐『為什麼這家擅長這個』這個判斷」的深度。\n  - **不是公關稿或產業八卦**——不吹捧也不唱衰任何一家；每個強項都要同時講出它的**影子（代價／盲點／何時不成立）**。觀點要冷靜、有依據、可被另一個工程師檢驗。\n  - **不是轉職用書**——純興趣（2026-06-13 訪談定案，與工作無關）；但工程橋接要讓它讀起來像母語。\n- **全書貫穿主張（核心商品，ch21 總收官驗收）**：\n  1. **架構不是護城河**：Transformer 是 2017 年的公開論文，attention 怎麼算全世界都看得到。各家底層大同小異，差異不在藍圖。\n  2. **模型是「養」出來的，不是「寫」出來的**：沒有人逐行規定模型的行為；你設定一個成長環境（資料、優化目標、算力），能力是**長出來的產物**。同一張藍圖、不同養法 → 不同風格。\n  3. **五個變數解釋一切差異**：**資料 × 後訓練／對齊 × 算力與基礎設施 × 研究文化與品味 × 產品取向**。這五格是全書的記分卡（ch03 定調，每章回收）。\n  4. **「最強」是測不準的，「風格」才是穩定的**：沒有單一冠軍；穩定可辨識的是各家的**取向與性格**。差異會持續（結構性成因），也會局部收斂（互相抄、趨同）。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6 年以上資深後端工程師（TypeScript/Node.js、NestJS、AWS、K8s）。**技術底子厚，但不是 ML 專家**。可直接當橋接錨點的經歷與直覺（**第一次用某個錨點時點名具體場景，不要泛泛說「你的後端經驗」**）：\n\n- 高併發系統（500K+ 使用者、10K+ CCU）、佇列（SQS）、冪等消費者、最終一致性、backpressure、rate limiting、queue 理論直覺。\n- 微服務 greenfield（AWS ECS、TypeScript/NestJS）、自建輕量框架與多層 cache library（全團隊採用）、CI 強制 OpenAPI 同步。\n- 效能工程：profiling（Clinic.js）、負載測試（k6/Vegeta）、瓶頸診斷（招牌敘事：尖峰 RDS CPU 降 40%）。\n- 維運：K8s 基礎物件（Deployment/Service/HPA/CronJob）、Docker、CI/CD、CloudWatch、自建 FluentBit pipeline、event-driven 結算 pipeline（CronJob→SQS→idempotent consumer）。\n- 資料層：MySQL/PostgreSQL 調校、Redis Pub/Sub。\n\n**讀者已具備、可直接當錨點，不需重講**：分散式系統的調度／路由／autoscaling／快取／佇列／冪等／最終一致性；雲與 K8s 的工程意義；**而且他讀過自己書架上的《從後端到 AI Infra》**，所以對 **attention 作為推論期的機制、KV cache、prefill/decode、batching、quantization 的「概念層」已經熟**——談這些可以直接用、當錨點，不要從頭教（一句話喚醒即可）。\n\n**要從較低基礎教起（本書主體，讀者接觸極少）**：模型**訓練側**的一切——pretraining 的資料與優化、scaling laws、後訓練（SFT/RLHF/RLAIF/RLVR）、對齊方法、reward model、MoE 與訓練期的工程、合成資料、評測方法學。用「你懂分散式系統與推論，現在把『模型怎麼被養出來』這一側補上」的節奏帶。**不堆數學**：scaling law 不推導，用「投入 vs 能力的一條可外推曲線」這種直覺講；RL 不寫損失函數，用「給原則讓它照鏡子自評」這種比喻講。\n\n**跨書資源**：讀者書架上有《從後端到 AI Infra》（推論基礎設施、KV cache、PagedAttention、GPU 體系）、《馴服隨機：機率與統計》（分布、期望、抽樣、為什麼 benchmark 會騙人）。談推論成本（ch16）可一句話接上 AI Infra 書（「你那本推論書把這條算到底」）；談評測抽樣偏誤、信賴區間、為什麼小樣本排名不可靠（ch04）可接上機率書——**可以接，但不得依賴**，本書自身要把概念講到能懂。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。技術名詞中英並用：第一次出現給「中文（English）」或直接保留通行英文（Transformer、attention、pretraining、fine-tuning、MoE、RLHF…多數技術詞保留英文即可，不硬翻）。**第二次起用通行的那一種、全書一致**。\n- 公司與模型名照原文：OpenAI、Google DeepMind、Anthropic、Meta、Mistral、xAI、DeepSeek、Alibaba（阿里巴巴）/Qwen；GPT、Gemini、Claude、Llama、Grok、Qwen 等模型名一律原文。\n- 人名：有把握的通行中譯才用＋原文第一次出現附原文（如 Ilya Sutskever、Demis Hassabis、Yann LeCun、梁文鋒）；沒把握就保留原文。\n- 台灣用語基準：程式／程式碼（不用「代碼」）、最佳化（全書用「最佳化」，不混用「優化」）、記憶體（不用「內存」）、預設（不用「默認」）、品質（不用「質量」）、資訊（不用「信息」）、相依（dependency）、效能（performance）、運算／算力（compute）、權重（weights）、開放權重（open-weight，不寫「開源模型」除非真的連訓練碼都開）、推論（inference）、訓練（training）。**禁止簡體中文詞彙**。\n- 對齊相關詞統一：對齊（alignment）、後訓練（post-training）、指令微調（SFT）、人類回饋強化學習（RLHF）、AI 回饋強化學習（RLAIF）、可驗證獎勵的強化學習（RLVR）、憲法式 AI（Constitutional AI）。第一次出現給中英，之後英文縮寫。\n- 第二人稱「你」直接對讀者說話。\n\n## 每章骨架（必須遵守，標題名稱照抄——一致性掃描會 grep 這些標題）\n\n1. **章首**：`# chNN — 章名：副標`，接著 blockquote：\n   `> **本章解決什麼問題**：…（這章在全書「同一張藍圖、不同養法」地圖的哪裡、回答的是哪一格／哪一家的「為什麼」、跟前後章的關係，3–5 行）`\n   每個 Part 的第一章（**ch01、ch05、ch13、ch20**）在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，照抄並把「◄你在這裡」標到本章），讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心問題錨定在讀者**具體的**工程實戰上（點名場景：你的多層 cache library、ECS 微服務、SQS 冪等消費者、RDS CPU 降 40%、HPA autoscaling、FluentBit pipeline…），或錨定在他讀過的 AI Infra／機率書概念上。要具體，不要泛泛。\n3. **核心內容**（多個 `##` section）。敘事與機制交織，但一切**服務於「為什麼這家／這個現象會這樣」的因果**，不是公司流水帳。company 章節：先講「以什麼著稱」（標日期戳、查 landscape），再層層回答「為什麼是這家」。theme 章節：講清楚一個橫切面（如推理模型、對齊演化、算力競賽）如何在各家身上展開、為什麼。\n4. `## 成因拆解` — **本書招牌段落（每章必有，名稱照抄）**。用 ch03 的「五變數記分卡」把本章現象**歸因**：哪幾格是主因、各記一筆。**必含三部分**（可用表格）：\n   - **(a) 五格歸因**：資料／後訓練對齊／算力基礎設施／研究文化品味／產品取向，逐格說明這格在本章現象裡扮演什麼角色（主因打✓、次因打△、不相關留白），每格一句「為什麼」。\n   - **(b) 影子**：這個強項（或這個選擇）的**代價／盲點**是什麼——同一組選擇讓他強在 X，也讓他弱在／暴露在 Y（對應讀者偏好的「故障視角」，必答）。\n   - **(c) 何時不成立**：這個「強項」在什麼情況下會被打臉（被哪類任務、被哪家、被什麼時間因素推翻）；提醒讀者這是**截至某日期的快照、不是定律**。\n5. `## 紙上推演` — 動手做的形式（純敘事科普書，無可執行 lab；2026-06-13 訪談定案）。每章 2~4 題，標注預估時間（如 **[15 分鐘]**）與難度（★~★★★）。題型：**口頭重講**一段因果、**翻譯**（把一個模型現象對應回五變數裡的某一格）、**反事實推理**（如果某家沒有 X 條件會怎樣）、**找破綻**（指出一個流行說法的問題，如「DeepSeek 只花 560 萬美金」）、**對帳**（把你維運過的某系統取捨對應到某家的取捨邏輯）。題目用 `### 推演題N`，緊接 `#### 推演解答` 給完整解答與討論（為什麼這樣想、常見誤解）。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。對齊「能不能把這段因果講給另一個工程師聽」的深度，**優先出「為什麼」與「如果不這樣會怎樣」**，少出「是什麼／哪一版」。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明為什麼值得讀、讀哪一段。優先：原始論文與技術報告（Attention Is All You Need、Chinchilla、InstructGPT、Constitutional AI、DeepSeek 技術報告…）、當事人的演講／訪談、可信的產業整理。\n\n## 深度標準（每章驗收）\n\n- **每章至少一個「被講透的成因個案」**：不是泛談「他們資料好」，而是**一條具體的因果鏈**講到底。例：Google 長上下文 ← TPU 垂直整合讓長序列訓練／服務成本可控 ＋ DeepMind 研究底 ＋ 要服務 Search 這個產品壓力；DeepSeek 低成本 ← MLA 砍 KV cache ＋ MoE 稀疏 ＋ GRPO 省掉 reward model ＋ 出口管制逼出的效率文化。\n- **每章至少一個帶真實數字的具體例**（從 landscape 取，標日期戳）：版本、上下文長度、參數量級、GPU/TPU 數量級、訓練成本主張等——**有爭議的數字要同時給「主張值」與「爭議／但書」**（如 DeepSeek 訓練成本、各家 GPU 數量）。\n- **五變數框架一致**：每章 `## 成因拆解` 用的五格名稱與 ch03 完全一致，不得各章自創分類。\n- **事實照 landscape，不憑記憶**：任何版本號、排名、價格、硬體、訓練成本、技術歸屬（誰發明 MLA／GRPO／Constitutional AI）一律以 `landscape-2026-06.md` 為錨；章節作者可做 3–8 次自己章節的查證，但與 landscape 衝突要回報、不得擅自改基準。\n- **沒有絕對排名**：禁止「X 是最強的模型」這類斷言。一律「截至 2026-06，X 以…著稱／在…benchmark 上領先」並點出 benchmark 的侷限。\n- **影子必寫**：違反「只講優點」——每個強項都要有 `## 成因拆解` 的 (b)(c) 兩段把代價與失效條件講出來。\n- **橋接點名具體場景**：第一次用某個讀者經歷當錨點時，點名真實系統（cache library、RDS、SQS…），不泛稱。\n\n## 全書一致的隱喻與用語（ch01／ch03 定調，全書回收）\n\n- 核心隱喻：**藍圖（架構）vs 養成（一切架構之外的事）**。模型是「養」出來的；各家是「同一張藍圖、不同養法」。\n- 記分卡：**五變數**＝資料 / 後訓練·對齊 / 算力·基礎設施 / 研究文化·品味 / 產品取向。固定順序、固定用詞。\n- 收束句式：每家／每主題用一句「**強在 X，因為〔哪幾格〕；影子是 Y**」收尾，全書累積成 ch21 總帳。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="labs";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">藍圖之外<br><span style="font-weight:400;font-size:12px;color:var(--muted)">同一套 Transformer，八家大模型為何各擅勝場</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 藍圖之外';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
