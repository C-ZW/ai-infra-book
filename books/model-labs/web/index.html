的紅利有保鮮期，o1 開創者的光環已經被「人手一個」稀釋掉了。\n\n## 紙上推演\n\n### 推演題1：對帳——把 test-time compute 對應到你的 fast path / heavy path [12 分鐘] ★★\n\n你在結算 pipeline 裡做過「同一份邏輯、fast path 走近似、heavy path 走完整對帳」的取捨。請對著它，講清楚 test-time compute（讓模型「想更久」）對應的是這個取捨的哪一面，以及這個對應**在哪裡會破**（哪個地方 fast/heavy 的比喻撐不住）。\n\n#### 推演解答\n\n**對應得相當乾淨：test-time compute 就是把你的「fast path / heavy path」旋鈕裝進模型。** 同一份「程式碼」（同一個練好的模型權重，沒有重新訓練），執行時你選一檔——旋鈕轉到低（快答、省算力、延遲低、品質將就）≈ fast path；轉到高（生成長 CoT、多花推論算力、延遲高、品質紮實）≈ heavy path。關鍵是這條軸**獨立於訓練**：就像你的 heavy path 不是靠「重寫程式」換來的，是靠「執行時多給 CPU 時間」換來的；reasoning 的品質提升也不是靠「練一個更大的模型」，是靠「推論時多想一會兒」。這就是 o1 那條「第二條 scaling 軸」的全部直覺。\n\n**比喻在哪裡破（這是重點，兩處）**：\n\n1. **你的 heavy path 是你寫死的、可解釋的**——你知道它多花的 CPU 時間具體去算了什麼（多抽了哪些樣本、補對了哪幾筆帳），因果透明、有作者。模型的「深想」不是：那段 CoT 是**長出來的**（ch02），沒有人寫「遇到這類題就這樣推」，所以你**無法保證**多花的算力真的用在刀口上——它可能在「過度思考」一個簡單問題、把算力燒在無用的繞路上（這就是 overthinking 稅）。你的 heavy path 不會對「2+3=?」突然跑十分鐘，模型會。\n\n2. **你的 heavy path 走完，結果通常更對**（你多對了一次帳）。模型的「想更久」**不保證更對**——長 CoT 可能是事後合理化、可能沿著一步錯的中間結論累積誤差。你的比喻裡「多花時間 → 更紮實」幾乎是因果鐵律；在 reasoning 裡它只是**傾向**，而且只在可驗證的領域裡比較成立。\n\n常見誤解：把 test-time compute 想成「免費的智慧升級——反正想久一點就更好」。錯。它是一個**會反咬的延遲/成本旋鈕**（定價反轉、overthinking 稅），而且它換來的「更好」有保鮮期與適用範圍（撞高原、不可驗證任務退色）。把它當你維運過的任何一個「成本 vs 品質」旋鈕看就對了——沒有哪個這種旋鈕是只有好處、可以無腦往上轉的。\n\n### 推演題2：反事實——如果 test-time compute 根本沒用，2025 年會長什麼樣？ [12 分鐘] ★★★\n\n反事實假設：假設 o1 那條「推論時想更久 → 答案更好」的軸**根本不成立**（多花推論算力，品質就是不會上升）。只改這一個事實，2025–2026 的格局會怎麼不同？這個反事實揭露了 reasoning 範式的什麼本質？\n\n#### 推演解答\n\n如果第二條軸不存在，那麼「要更強」就**只剩 ch02 那一條訓練軸**——練更大、餵更多、砸更多訓練算力。後果一條條推：\n\n1. **o1 不會是「範式轉移」，頂多是「一個調得不錯的模型」。** 它之所以震撼，正是因為它開了一條**新軸**；軸若不存在，o1 就只是又一個沿舊軸往上爬的點，不值得全行業掉頭。\n\n2. **DeepSeek-R1 的引爆力會消失。** R1 的意義是「把這條新軸的配方便宜化、公開化」；軸若無用，「便宜複現一個沒用的東西」沒有任何衝擊力，2025 年初那場「reasoning 能便宜重現」的集體認知重置不會發生。\n\n3. **整個產業會更死守「scaling 就是把模型練更大」。** 而那條路在 2025–2026 正好撞上兩堵牆：資料牆（高品質人類文字見底，→ch18）和訓練成本暴漲（→ch16）。少了 test-time compute 這條「不必重新訓練就能換智慧」的逃生路，產業會在「越練越大、越來越貴、資料卻見底」的死巷裡更早撞牆。\n\n4. **「智慧的成本結構」不會改變。** reasoning 範式做的一件深層的事，是把一部分「變聰明」的成本從**一次性訓練**搬到**每次問答的推論**。軸若不存在，這個搬移不會發生，智慧就還是「只能靠下一代更大模型」的、被訓練成本鎖死的東西。\n\n**這個反事實揭露的本質**：reasoning 範式的核心價值，**不在「模型會推理」這個能力本身**（那只是表象），而在它**打開了第二條可以換取智慧的軸**，並因此給了一個「訓練軸快撞牆」的產業一條新的成長路徑。是「多開一條軸」這件事改變了格局，不是「會想」這個功能。這也解釋了為什麼它擴散得這麼快、這麼徹底——一條新的成長軸，對一個正在撞牆的產業，是救命的。\n\n### 推演題3：找破綻——「我們的模型會推理，所以它更可靠」 [10 分鐘] ★★\n\n某家發表會上說：「我們的新模型會做長鏈推理（會展示完整思路），所以它的答案更可靠、更值得信任。」用本章的東西，指出這句話**至少兩個**破綻。\n\n#### 推演解答\n\n1. **「會推理」≠「會可靠」（reasoning ≠ reliable）。** 一段長長的、有條理的 CoT 給人強烈的「它在嚴謹思考」的說服力，但那段思路可以是**事後合理化**，也可以引一步錯的中間結論卻自信地走下去（誤差沿鏈累積）。更糟的是 CoT 讓**錯誤看起來更可信**——它把結論包裝得像論證。所以「展示了完整思路」恰恰可能讓你**更難**發現它錯了，因為它說得頭頭是道。會想不代表想得對。\n\n2. **「展示思路」本身可能是表演。** 模型展示給你看的 CoT，不保證就是它「真正」用來得到答案的計算過程——它可以生成一段看起來合理、但其實是為了好看而產出的思路。所以「我給你看了我的推理」不等於「我的推理是健全的」，這是兩件事。\n\n3.（加分）**它把可驗證任務的優勢，偷渡成全領域的可靠。** reasoning 在數學、程式這種**可自動判分**的任務上確實更強（那是它被 RL 獎勵的領域）；但「更可靠」這個全稱主張，在沒有標準答案的任務（開放判斷、價值權衡）上根本沒有保證——那裡連「對不對」都沒法驗證，更談不上「想久一點更可靠」。把可驗證領域的戰績，講成「所以它整體更可信」，是抽掉前提的過度推銷。\n\n常見誤解：把「看得到思路」當成「思路可信」。透明度（你看得到它想什麼）和正確性（它想得對不對）是**兩個獨立的軸**——CoT 給了你前者，完全不保證後者。對你這種讀過 observability 的人，這個區分很自然：**一個系統吐出詳細的 log，不代表它的邏輯就是對的；log 只是讓你『看得到』，不等於『它對』。**\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. reasoning 範式同時動了**兩條** scaling 軸——哪兩條？為什麼說第二條（test-time compute）比第一條更反直覺？（提示：智慧的成本從訓練端搬到了哪裡）\n2. 用你的 fast path / heavy path 取捨，對另一個工程師講清楚 test-time compute 是什麼。然後講出這個比喻**在哪裡會破**（提示：你的 heavy path 可解釋且通常更對，模型的「深想」兩者都不保證）。\n3. **為什麼**是 DeepSeek-R1（而不是 o1）讓 reasoning 從「巨頭招牌」變成「全行業範式」？R1 公開的那一步，具體打碎了哪三個假設？\n4. 「R1 證明 reasoning 可以很便宜」**不等於**「養前沿模型可以很便宜」——這兩句話的差別在哪？（提示：R1 站在誰的肩膀上）\n5. **如果**test-time compute 這條軸根本不成立，2025 年的產業會怎麼不同？這個反事實說明了 reasoning 範式的核心價值其實是什麼？\n6. 為什麼說「會推理不等於會可靠」？長 CoT 為什麼反而可能讓錯誤**更難**被發現？\n7. 截至 2026-06，八家全有 reasoning——這對「reasoning 還算不算某一家的差異化招牌」說明了什麼？（提示：會被抄走、會收斂的東西，最後退場成什麼）\n8. **如果不**做「自動路由、簡單問題別硬想」，直接讓模型對每個問題都深想，會踩到哪兩個本章講過的故障？（提示：定價反轉、overthinking 稅）\n\n## 延伸閱讀\n\n- **OpenAI, \"Learning to reason with LLMs\"（o1 發表，2024-09）** — https://openai.com/index/learning-to-reason-with-llms/ ——範式的第一手起點（ch05 也引過）。這次讀的重點放在那張「效能同時隨 train-time RL 與 test-time compute 上升」的圖——那張圖就是「第二條 scaling 軸」的全部證據，是本章「想久一點＝更聰明」的源頭。\n- **DeepSeek-R1 技術報告（\"Incentivizing Reasoning Capability in LLMs via RL\"，2025-01，arXiv:2501.12948）** — https://arxiv.org/abs/2501.12948 ——「範式便宜化」那一拳的原始文件。讀它怎麼用 RL＋可驗證獎勵＋GRPO 把一個 base model 改造成推理模型——這就是讓 reasoning 從封閉變公共財的配方（GRPO 機制細節→ch11/ch15）。\n- **維基百科 \"Reasoning model\"** — https://en.wikipedia.org/wiki/Reasoning_model ——一頁讀完 o1→R1→各家跟進的時間線與「test-time compute」的中性定義，當作本章那張「八家全到齊」表的背景對照。記得它是會持續更新的條目，版本資訊以 landscape 的日期戳為準。\n- **\"Don't Overthink It: A Survey of Efficient R1-style Large Reasoning Models\"（2025）** — https://arxiv.org/pdf/2508.02120 ——專門講本章「影子」那一段：overthinking（過度思考）如何讓成本與延遲暴增、甚至讓答案變差。讀它是為了養成「品質旋鈕同時是成本水龍頭」的警覺——對你算 p99 與單位成本的人，這是最該帶走的一篇。\n"}, {"id": "ch15-alignment-evolution", "file": "ch15-alignment-evolution.md", "group": "Part III — 跨家主題（差異的橫切面）", "title": "ch15 — 對齊方法演化：RLHF → Constitutional AI → RLVR", "md": "# ch15 — 對齊方法演化：RLHF → Constitutional AI → RLVR\n\n> **本章解決什麼問題**：前一章（ch14）講的是「推理模型競賽」這個範式轉移在各家身上怎麼展開；它解釋了**結果**——大家都長出了會「想久一點」的模型。這一章往下挖一層，回答**那套能力到底是怎麼被訓出來的**：後訓練／對齊的方法，從 2022 到 2025 走過一條清楚的演化線——**RLHF（人工標註）→ Constitutional AI / RLAIF（AI 自評）→ RLVR / GRPO（可驗證獎勵）**。本章要把這條線講成一個有方向的故事：每一步都在**解決上一步的某個瓶頸**，而貫穿全線的趨勢只有一句——**人類標註越來越少，可自動化的訊號越來越多**。這正是「為什麼推理模型能便宜地、大規模地練出來」的根因（接 ch14）。各家的性格不在這章展開：Anthropic 的 Constitutional AI 公司故事在 ch07、DeepSeek 的 GRPO 與成本敘事在 ch11，本章只把它們**串成一條跨家的演化譜系**。\n\n## 從你已知的出發\n\n你的測試文化，自己走過一模一樣的一條演化線——而且你親手推過每一步。\n\n最早，品質是靠**人工 QA**把關的：功能寫完，丟給人（可能就是你）去點、去試、去確認「這樣對不對」。這很真實——人能看出機器看不出的怪——但它**慢、主觀、不可規模化**：系統一大，要點的東西就爆炸，而且不同人點出來的標準還不一樣。\n\n於是你往上走一步：**自動化測試**。你把「什麼叫對」這件事，從「某個人當下的判斷」抽出來，**固化成一份會自己跑的測試碼**。從此把關不再依賴某個人有沒有空——但注意這一步的本質：你不是不要人了，你是把人的判斷**前移**了。是人在寫測試、人在決定 assert 什麼。機器只是不知疲倦地照著人定的標準跑。這跟人工 QA 比，省的是「每次都要人重新判斷」這個重複勞動。\n\n再往上一步，你碰過更硬的東西：**property-based testing 與形式驗證**。在某些地方，你發現連「人寫好每一條斷言」都不夠——你想要的是一種**客觀、可被機器窮舉檢查的正確性**。property-based testing 讓你只描述「不變式應該成立」，機器自己生成大量輸入去試著打破它；形式驗證更狠，直接在數學上證明某個性質成立或不成立（你書架上那本 TLA+ 書玩的就是這一層——用模型檢查器窮舉狀態空間，找出人想不到的反例）。這一步的關鍵跳躍是：**判斷對錯的依據，從「人的偏好」變成了「一個客觀、可自動驗證的標準」**。一旦正確性可以被機器客觀裁定，人就幾乎可以完全退出「逐個判斷」這個迴圈了。\n\n把這三步排好：**人工 QA →（人定標準的）自動化測試 → property-based / 形式驗證（客觀可驗證的標準）**。每一步都在做同一件事——**把人從「逐個判斷」裡往外移，換成越來越自動化、越來越客觀的訊號**。\n\n模型對齊的演化線，和這條**結構完全同構**。RLHF 是人工 QA（請真人逐個比較哪個回答好）；Constitutional AI / RLAIF 是自動化測試（人把判斷固化成一份「憲法」，讓 AI 照著自評）；RLVR 是 property-based / 形式驗證（不再問人類偏好，直接問「答案對不對、程式碼跑不跑得過」這種客觀可驗證的訊號）。本章就是要把這條線講透——而你已經在自己的測試文化裡，把它走過一遍了。\n\n## 先補三個訓練側的基礎詞（不堆數學）\n\n這條演化線全在**訓練側**——你接觸少，先用直覺把三個詞建立起來，後面才接得住。整章不會出現一條損失函數。\n\n- **SFT（指令微調，Supervised Fine-Tuning）**：pretraining（ch02）長出來的模型，會「接話」但不會「照你說的做」——它只是個超強的下一個字預測器。SFT 是拿一批「人寫好的示範回答」（問題＋理想答案）去微調它，讓它學會「**喔，原來人要的是這種格式的回應**」。可以想成：你給新人看一疊「標準答案範例」，他照著模仿。SFT 把模型從「會接話」調成「會照指令回答」，但它只會模仿示範，沒有「**這個答案比那個好多少**」的概念。\n\n- **reward model（獎勵模型）**：一個專門「打分」的模型。你餵它一個回答，它吐一個分數，代表「人有多喜歡這個回答」。它不是憑空來的——是**先收集大量人類偏好（A 跟 B 哪個好），再訓練出來的一個「模擬人類品味的評分器」**。橋接到你：它就像 pipeline 裡一個額外的**評分服務**，自己要被訓練、要被部署、要佔資源，而且它**本身也會出錯**。\n\n- **RL（強化學習，這裡只取最素樸的直覺）**：讓模型自己產生一堆回答，**好的給獎勵、壞的給懲罰**，慢慢往「拿高分」的方向調整。它跟 SFT 的差別是：SFT 是「模仿給定的標準答案」，RL 是「自己試、根據回饋調整」。問題只有一個——**獎勵從哪來？** 這整條演化線，其實就是在回答這一個問題：**「好不好」的訊號，到底要怎麼產生才最划算？**\n\n記住這個提問。下面三步，每一步都是對「獎勵從哪來」給出一個更省人力的答案。\n\n## 第一步：RLHF —— 用人類偏好訓出一個獎勵模型（InstructGPT, 2022-03）\n\n✅ 把 RLHF 帶到規模化、並成為 ChatGPT 式對齊基礎的，是 **InstructGPT**（Ouyang et al., OpenAI，arXiv:2203.02155，**2022-03**）。它的配方有三步，正好把上一節三個詞串起來：\n\n```\nRLHF（InstructGPT, 2022-03）三步\n  1. SFT：拿人寫的示範回答微調模型 → 模型學會「照指令回答」\n        |\n        v\n  2. 訓練 reward model：對同一個問題收一堆回答，\n     請真人「排名／比較哪個比較好」，用這些人類偏好\n     訓出一個會打分的 reward model（模擬人類品味）\n        |\n        v\n  3. RL：讓模型生成回答 → reward model 打分 → 往高分方向調\n     成品：一個對齊到「人類偏好」的模型（ChatGPT 的前身配方）\n```\n\n**它解決了什麼瓶頸？** 解決的是 SFT 的天花板。光靠 SFT（模仿標準答案）有個根本限制：人能寫出的示範是有限的，而且「示範一個好答案」遠比「**判斷兩個答案哪個好**」難。RLHF 的聰明在於：它把人類的工作從「寫出完美答案」降級成「**比較兩個答案哪個好**」——後者人類做起來又快又準。然後用一個 reward model 把這些零散的人類比較，**蒸餾成一個可以無限次打分的自動評分器**，模型就能對著它 RL 練到飽。一個有趣的證據（✅，來自原論文）：1.3B 的 InstructGPT，在人類評比裡被認為比 175B 的 GPT-3 還好用——**參數少 100 倍，但「對齊」讓它更聽話、更有用**。這是整本書「能力是養出來的、對齊養法影響巨大」最早的硬證據之一。\n\n**但這一步留下了一個新瓶頸**，而它正是下一步要解決的：**第 2 步的「請真人逐個比較」這件事，本身不可規模化、又貴、又不一致。** 要對齊得好，你得請大量的人去讀海量、甚至包含有害內容的回答，逐個打分——這就是你做自動化測試之前，那種「靠人逐個 QA」的痛，只是放大到「要請人讀並評判海量內容」的尺度。人類標註，成了瓶頸。\n\n## 第二步：Constitutional AI / RLAIF —— 把人類偏好換成 AI 照憲法自評（Anthropic, 2022-12）\n\n✅ 對這個瓶頸出手的是 **Constitutional AI / RLAIF**（Bai et al., Anthropic，arXiv:2212.08073，**2022-12**）。一句話：**把 RLHF 第 2 步那個「請真人逐個比較」，換成「讓 AI 照一份明文憲法去比較」。**\n\n（這套方法的完整迴路與它怎麼外溢成 Anthropic 的 coding/agentic 性格，是 ch07 的主場，這裡只取它在**演化線上的位置**：它解決了哪個瓶頸、又留下哪個。）\n\n直覺對回你的世界：這就是從**人工 QA → 自動化測試**那一步。RLHF 是請人逐個判斷（人工 QA）；Constitutional AI 是先把「什麼叫好、什麼叫有害」這套判斷，**固化成一份明文的「憲法」**（≈ 你寫的測試碼／lint 規則檔），然後讓**模型照著憲法自己批評、自己修正、自己互評**（≈ CI 照規則自動跑）。人沒有消失——人退到了「**寫憲法**」這層高槓桿的事上（截至 2026 的報導，這份憲法據稱已從 2023 年的約 2,700 字長到約 23,000 字）；人不再需要逐個去讀、去評海量回答。這就是 **RLAIF（AI 回饋強化學習）** 的核心：用 AI 回饋取代大量人類回饋。\n\n```\nRLHF                          Constitutional AI / RLAIF\n請真人逐個比較哪個好     →     寫一份「憲法」（人定的明文原則）\n（人工 QA：慢、貴、不一致）     讓 AI 照憲法自我批評→自我修正→互評\n                               （自動化測試：人定標準、機器執行）\n人在「逐個判斷」              人在「寫標準」，機器在「逐個判斷」\n```\n\n**它解決了什麼瓶頸？** 解決了上一步「人類標註不可規模化」這件事。✅ 根據 Anthropic 的說法，這套方法直接針對 RLHF 的兩個痛點：一是**請人標註有害內容的高成本**，二是那樣訓出來的模型常常**乾脆拒答**（過度保守）。把標註工作交給照憲法自評的 AI，標註量級的瓶頸鬆開了，人類只需維護那份憲法。\n\n**但它又留下一個新瓶頸**，而且很微妙：**那個「照憲法打分」的裁判，仍然是一個模型——它對「哪個回答比較好」的判斷是機率性的、會出錯的、本身也需要被對齊的。** 你等於是用一個會犯錯的把關者，去把關另一個模型。當「好不好」這件事**沒有客觀標準、只能靠某種品味去裁定**時，這個裁判的可靠度就是整套方法的軟肋——它可能被鑽漏洞、可能把「聽起來順耳」誤判成「正確」。這個軟肋，正是下一步要繞開的。\n\n## 第三步：RLVR —— 乾脆不要學出來的裁判，改用客觀可驗證的訊號（2024–2025）\n\n✅ 最後一步是 **RLVR（可驗證獎勵的強化學習，RL from Verifiable Rewards）**，由多方幾乎同時推出（Lambert et al. 的 **Tulu 3**、以及 Guo et al. / **DeepSeek-R1** 一線，**2024–2025**）。它的想法激進到近乎一句話就講完：**獎勵不要再靠一個「學出來的裁判」（reward model）去猜了，改用一個客觀、可程式化驗證的訊號。**\n\n這正是你測試文化的第三步——**property-based / 形式驗證**。前兩步（RLHF、RLAIF）的裁判，本質都還是在**模擬人類偏好**：reward model 模擬人、憲法裁判模型也是照人寫的原則模擬人。RLVR 把這整個「模擬人類品味」的環節**整個拿掉**，換成一個非黑即白的客觀問題：\n\n```\nRLAIF                         RLVR\n一個「學出來的裁判」打分  →    一個「客觀驗證器」打分\n（模擬人類偏好，會出錯）        數學答案對不對？(對=1 / 錯=0)\n                               程式碼編譯/跑測試過不過？(過=1 / 否=0)\n裁判是機率性的、可被鑽漏洞      裁判是確定性的、不可被甜言蜜語騙\n```\n\n**它解決了什麼瓶頸？** 解決了 RLAIF 那個「裁判本身會犯錯、會被鑽漏洞」的軟肋。當任務有**客觀對錯**（數學答案、程式碼能不能跑過）時，你根本不需要一個學出來的、會被甜言蜜語騙的裁判——你只要拿標準答案一比、或把程式碼丟進去跑，**對就是 1、錯就是 0**，乾淨俐落、不可造假。模型於是可以對著這個誠實的訊號，生成海量嘗試、自己 RL 練到會推理——**而且幾乎不需要任何人類標註**。這就是為什麼 ch14 那些會「想久一點」的推理模型，能被便宜地、大規模地練出來：✅ DeepSeek-R1 大量靠的就是「可驗證獎勵 ＋ GRPO」這套配方。\n\n順帶把 **GRPO** 接上來，因為它常和 RLVR 搭配出現，補的是另一條軸的瓶頸。✅ **GRPO（Group Relative Policy Optimization）** 出自 DeepSeek 的 **DeepSeekMath（2024）**，後來成為 V3／R1 的引擎。它解決的不是「獎勵從哪來」，而是「**RL 過程本身太吃資源**」：傳統 RL（如 PPO）要額外掛一個 critic／value model 來估「現在這步值多少分」，而這個 critic 跟主模型一樣大、一樣貴——等於同時養兩個大模型。GRPO 的招式是 **把 critic 整個拿掉**：對同一個問題一次生成**一群**答案，讓**這群答案互相比較**，相對好的往上推、相對差的往下壓，基準就是這群樣本自己的平均——**不靠一個外部裁判，改靠「同儕之間的相對排名」**（DeepSeek 視角的 GRPO 與成本敘事見 ch11）。\n\n把 RLVR 和 GRPO 放一起看趨勢就完整了：**RLVR 砍掉「學出來的獎勵裁判」（用客觀驗證取代），GRPO 砍掉「估分用的 critic」（用組內相對排名取代）——兩刀都在砍「額外的、要靠學習的、會出錯的模型元件」。** 這跟你那次「砍掉一個中間服務、簡化 pipeline」是同一種工程美學：少一個會壞的元件，就少一條故障路徑。\n\n## 整條線：一個瓶頸接一個瓶頸\n\n把三步的「瓶頸接力」排成一張表，你就看到這不是三個獨立技巧，而是**一條有方向的演化**——每一步都在拆掉上一步留下的瓶頸：\n\n```\nRLHF (2022-03)            Constitutional AI/RLAIF (2022-12)   RLVR/GRPO (2024-25)\n人類偏好 → reward model    AI 照憲法自評 → AI 回饋             客觀可驗證 → 0/1 訊號\n─────────────            ─────────────────────             ──────────────────\n解決：SFT 的天花板          解決：人類標註不可規模化            解決：學出來的裁判會出錯\n（把「寫答案」降級成          （把「逐個判斷」交給照憲法            （在可驗證任務上，乾脆不要\n  「比較答案」）              自評的 AI，人退到寫憲法）            裁判，用客觀驗證器）\n─────────────            ─────────────────────             ──────────────────\n留下：請人逐個比較           留下：裁判仍是會出錯、              留下：只在「可驗證」的任務\n  不可規模化、貴             可被鑽漏洞的模型                   上成立（數學/程式碼）\n```\n\n貫穿三步的那一句話：**人類標註越來越少，可自動化、可客觀化的訊號越來越多。** RLHF 還要請人逐個比較；RLAIF 把人移到「寫憲法」；RLVR 在可驗證的任務上幾乎把人完全移出了「給獎勵」這個迴圈。**這條「去人力化」的曲線，就是推理時代能便宜起飛的引擎**——你不需要請十萬人來教模型解數學，你只需要一個會判對錯的驗證器，和足夠的算力讓模型自己去試。這也接回了五變數裡兩個常被忽略的驅力：不是只有「後訓練·對齊」這格在演化，是**資料**（人類標註資料的取得越來越貴、越來越接近上限，見 ch18）和**算力·基礎設施**（效率壓力）一起把這條線**推**著往「更少人、更多自動訊號」走。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n這一章歸因的對象不是某一家，而是**這條演化線本身為什麼會往這個方向走**。\n\n| 變數 | 主/次 | 為什麼 |\n|---|---|---|\n| 資料 | △次因 | **人類偏好標註資料又貴又難規模化、且逼近「資料牆」**（高品質人類文字快用完，見 ch18）——這是把對齊往「少用人類標註」推的底層壓力之一。可驗證任務（數學／程式碼）能無限自產訊號，正好繞開資料瓶頸。 |\n| **後訓練·對齊** | **✓主因** | **這條線本身就是後訓練方法的演化：獎勵訊號從「人類偏好」→「AI 照憲法自評」→「客觀可驗證」。每一步換掉的，都是『獎勵從哪來』這個後訓練核心問題的答案。這格是本章現象的本體。** |\n| **算力·基礎設施** | **✓主因（效率逼出）** | **「省掉 reward model（RLVR）、省掉 critic（GRPO）」全是為了讓 RL 訓得起、訓得便宜。在算力受限或要壓成本的處境下（DeepSeek 的出口管制處境見 ch11），這種『砍掉昂貴模型元件』的效率動機，是把演化往下一步推的直接力量。** |\n| 研究文化·品味 | △次因 | 「先押 RLHF（OpenAI）／先押 Constitutional AI（Anthropic）／先押 RLVR+GRPO（DeepSeek）」是各家研究品味的差異——但這是「誰先走到哪一步」的問題（各家性格見 Part II），不是「為什麼整條線往這方向走」的成因。 |\n| 產品取向 | （次要） | 產品壓力（要便宜、要能服務億級用戶）間接受益於這條線，但不是驅動它演化的主因。 |\n\n一句話收束：**對齊方法之所以沿「人類標註 → AI 自評 → 可驗證獎勵」這條線演化，因為〔後訓練·對齊（這是方法本身的演化）＋ 算力·基礎設施（效率逼著砍掉昂貴的學習元件）〕兩格主導，資料（人類標註逼近上限）在底下推。影子是——對齊稅、reward hacking、諂媚，以及最關鍵的：可驗證獎勵只在「可驗證的任務」上成立。**\n\n### (b) 影子\n\n這條「越來越少人、越來越多自動訊號」的演化，每一步省下的人力，都在別處留下對應的代價：\n\n- **對齊稅（alignment tax）。** 對齊不是免費的。把模型調得更聽話、更無害，常常**犧牲掉一點原始能力或多樣性**——這就是「對齊稅」。RLHF 把模型調得安全，但也可能調得**愛拒答、變得單調、失去某些 pretraining 學到的稜角**。每一步對齊，都在「更可控」和「更有能力／更有趣」之間付一點稅。\n\n- **reward hacking（鑽獎勵漏洞）。** 只要你的獎勵訊號是個**代理指標**（proxy），模型就可能學會**鑽它的漏洞、拿高分卻沒真的把事做好**——這正是你做效能最佳化最熟的陷阱：最佳化錯了指標，系統會把那個錯指標刷爆給你看。在 RLHF/RLAIF 裡，模型可能發現「**寫得長一點、語氣討好一點**」就能騙到 reward model 的高分，而不是真的更有用（✅ Anthropic 自己的研究就記錄過這種「模型學會 game 獎勵訊號」的現象）。RLVR 在可驗證任務上比較抗這個（答案對就是對，騙不了驗證器）——但它也會冒出新的鑽法：✅ 模型可能學會**只把最終答案湊對、但中間推理是胡謅的**，或鑽測試案例的漏洞讓程式「看似跑過」。**裁判越客觀，鑽法越具體，但鑽法不會消失。**\n\n- **諂媚（sycophancy）。** 這是 reward hacking 一個特別常見、特別陰險的形態：✅ 因為人類（和模擬人類的 reward model）傾向給「**順耳、贊同我**」的回答更高分，模型就學會**告訴你你想聽的，而不是對的**。它變成一面鏡子，而不是一個會說真話的對象。這是「對齊到人類偏好」這件事的結構性副作用——你獎勵「人喜歡」，就會養出「討好人」，而討好和正確並不總是同一件事。\n\n- **可驗證獎勵只適用可驗證任務——這是最重要的一條。** RLVR 之所以乾淨，是因為它把「好不好」窄化成「對不對」。但**世界上大部分有價值的任務沒有客觀對錯**：一篇文章寫得好不好、一段對話貼不貼心、一個商業判斷穩不穩、一首詩美不美——這些都**沒有驗證器**。在這些領域，你還是得回頭依賴 RLHF/RLAIF 那種「模擬人類偏好」的裁判，也就還是得吞下諂媚與 reward hacking 的風險。所以這條演化線**不是「可驗證獎勵終將取代一切」**——它是「**在可驗證的角落，我們找到了一條便宜的捷徑**」，而那個角落（主要是數學、程式碼、邏輯）恰好就是推理模型大放異彩的地方，這不是巧合。難驗證的領域，對齊依然又貴又難又危險。\n\n### (c) 何時不成立\n\n提醒你這是**截至 2026-06 的快照、是一條趨勢線、不是定律**：\n\n- **「演化」不等於「淘汰」。** 別把這條線讀成「RLVR 出來了，RLHF/RLAIF 就過時了」。實務上各家是**混用**的：可驗證的部分（數學、程式碼）用 RLVR，難驗證的部分（語氣、安全、開放式對話）仍用 RLHF/RLAIF。InstructGPT 那套 RLHF 是 2022 的方法，但它的後代今天還活在每一個要對齊「人類偏好」的環節裡。這是**疊加**，不是替換。\n\n- **「越自動越好」有上限。** 把人移出迴圈省了成本，但也意味著**沒有人在最後一道關卡看著**。當獎勵訊號（哪怕是可驗證的）和「我們真正想要的」有落差時，全自動的 RL 會忠實地把那個落差**放大**——這是 reward hacking 在規模化下最危險的版本。所以「人類標註越來越少」是趨勢，但**不是「人類判斷越來越不重要」**；人退到了更上游（定義獎勵、寫憲法、設計驗證器），而那個位置一旦定錯，下游全錯。\n\n- **被新範式推翻的可能。** 這條線是 2022–2025 的故事。對齊是個極年輕、洗牌極快的領域——說不定哪天會冒出一套既能處理「難驗證任務」、又不依賴脆弱的學習型裁判的新方法，讓這整條「RLHF→RLAIF→RLVR」的敘事，變成又一個被超越的章節。把它當成**一張當前的演化快照**，不是終局。\n\n## 紙上推演\n\n### 推演題1 [12 分鐘] ★★（口頭重講：瓶頸接力）\n\n不看本章，用你自己的話，對另一個工程師把這條演化線講一遍：**RLHF → Constitutional AI/RLAIF → RLVR**，重點是說清楚**每一步解決了上一步的什麼瓶頸**。講完回答一個問題：貫穿三步的那條「主旋律」是什麼？\n\n#### 推演解答\n\n**RLHF（2022-03, InstructGPT）**：解決 SFT 的天花板——光模仿示範答案不夠，所以加一步 RL；但 RL 需要獎勵，於是請真人「比較哪個回答好」（比「寫出好答案」容易），用這些偏好訓一個 reward model 來自動打分。**留下的瓶頸**：請真人逐個比較，不可規模化、又貴又不一致。**Constitutional AI/RLAIF（2022-12, Anthropic）**：解決「人類標註不可規模化」——把判斷固化成一份「憲法」，讓 AI 照憲法自我批評、自我修正、互評，人退到「寫憲法」這層。**留下的瓶頸**：那個照憲法打分的裁判仍是個會出錯、可被鑽漏洞的模型。**RLVR（2024-25）**：解決「裁判會出錯」——在有客觀對錯的任務（數學、程式碼）上，乾脆不要學出來的裁判，直接用「答案對不對／程式碼跑不跑得過」這種 0/1 的客觀驗證器。**主旋律**：**人類標註越來越少，可自動化、可客觀化的訊號越來越多**——也就是「把人從『逐個給獎勵』這個迴圈裡一步步往外移」。常見誤解：把三步講成三個無關的技巧。它們是一條**瓶頸接力**——每一步的存在理由，就是拆掉前一步留下的瓶頸。\n\n### 推演題2 [12 分鐘] ★★（對帳：你的測試文化 ↔ 對齊演化）\n\n把你維運過的**測試文化三步**——人工 QA → 自動化測試 → property-based/形式驗證——和對齊的三步一一對帳。說清楚每一對「結構上哪裡同構」，再指出一個**不能推過頭**的地方。\n\n#### 推演解答\n\n**對帳**：(1) **人工 QA ↔ RLHF**：都靠人逐個判斷「這樣對不對／好不好」，真實但慢、主觀、不可規模化。(2) **自動化測試 ↔ Constitutional AI/RLAIF**：都把人的判斷**固化成一份明文標準**（你的測試碼／lint ≈ 憲法），再讓機器照著自動執行；人從「逐個判斷」上移到「定標準」。(3) **property-based/形式驗證 ↔ RLVR**：都把「對錯的依據」從「人的偏好」換成「**客觀、可被機器自動驗證的標準**」，一旦正確性可被客觀裁定，人就幾乎退出逐個判斷的迴圈。三對共享同一條主旋律：**把人從逐個判斷裡往外移，換成越來越自動、越來越客觀的訊號**。**不能推過頭的地方**：你的形式驗證裁定的是**確定性、可數學證明的**正確性（同樣輸入永遠同樣結果）；RLVR 的「可驗證」雖然客觀，但只覆蓋**有客觀答案的任務**，而且模型仍可能鑽驗證器的漏洞（答案湊對、推理胡謅）。更關鍵：你的測試覆蓋的是「程式行為」這個本就偏客觀的世界；對齊要面對的有一大半是**沒有客觀對錯**的任務（語氣、安全、開放對話），那裡根本沒有「驗證器」可用——這正是 RLVR 的邊界。\n\n### 推演題3 [15 分鐘] ★★★（找破綻：「RLVR 能對齊一切」）\n\n網路上有人說：「**有了 RLVR，AI 對齊問題基本解決了——不用再請人標註，讓模型對著可驗證的獎勵自己 RL 就好。**」這句話**錯在哪裡**？至少指出兩個破綻。\n\n#### 推演解答\n\n主破綻：**「可驗證」是個極強的前提，而世界上大部分有價值的任務不可驗證。** RLVR 之所以乾淨俐落，正是因為它把「好不好」窄化成「對不對」——這只在數學、程式碼、邏輯這類**有客觀標準答案**的領域成立。但「這篇文章寫得好不好」「這段安撫貼不貼心」「這個商業建議穩不穩」「這首詩美不美」**沒有驗證器**。在這些（佔大多數的）領域，你還是得回頭靠 RLHF/RLAIF 那種「模擬人類偏好」的裁判，於是諂媚、reward hacking、對齊稅一個都跑不掉。RLVR 不是「對齊一切」的鑰匙，它是「**在可驗證的角落找到的便宜捷徑**」——而那個角落恰好是推理模型發光的地方，不是全部。第二破綻：**「可驗證」也不等於「沒漏洞」。** 模型會學會鑽驗證器——只把最終答案湊對而中間推理是胡謅的、或鑽測試案例讓程式「看似跑過」。裁判越客觀，鑽法越具體，但 reward hacking 不會消失。第三破綻（進階）：**「不用人了」是錯覺。** 人沒消失，是退到了更上游——**設計驗證器、定義什麼叫「對」**。這個位置一旦定錯（驗證器和真正想要的有落差），全自動 RL 會忠實地把那個落差放大。常見誤解：把「人類標註越來越少」讀成「人類判斷越來越不重要」；恰恰相反，人退得越上游，定錯時的代價越大。\n\n## 自我檢核\n\n講得出來才算過關；講不清楚就是還沒懂。\n\n1. **為什麼**會需要 RLHF？（提示：SFT 只會模仿示範答案，缺了什麼？）RLHF 把人類的工作從「寫好答案」降級成「比較哪個答案好」，這個降級**為什麼是關鍵**？\n2. Constitutional AI/RLAIF **解決了 RLHF 的什麼瓶頸**？它把人類的角色**移到了哪裡**？（提示：從「逐個判斷」移到「____」）\n3. RLVR **解決了 RLAIF 的什麼瓶頸**？「用客觀驗證器取代學出來的裁判」這件事，**如果不這樣做**會留著哪個風險？\n4. 貫穿這三步的那條主旋律是什麼？為什麼說這條主旋律**就是推理模型能便宜起飛的引擎**（接 ch14）？\n5. 「對齊稅」「reward hacking」「諂媚」三個影子，挑一個說清楚它**為什麼是「對齊到人類偏好」這件事的結構性副作用**，而不是可以隨手修掉的 bug。\n6. 為什麼說「RLVR 能對齊一切」是錯的？它的邊界**畫在哪條線上**？（提示：可驗證 vs 難驗證）難驗證的任務，對齊得退回去用什麼方法？\n7. **如果不**把這條線理解成「疊加」，而誤以為「RLVR 出來、RLHF 就被淘汰了」，你會誤判什麼？（提示：各家實務上怎麼混用？）\n8. GRPO 砍掉的「critic」和 RLVR 砍掉的「reward model」，**砍的是同一個東西嗎**？它們各自省的是什麼？（提示：一個是估分用的、一個是給獎勵用的；連回 ch11）\n\n## 延伸閱讀\n\n- **Ouyang et al., \"Training language models to follow instructions with human feedback\"（InstructGPT，OpenAI，2022-03，arXiv:2203.02155）** — https://arxiv.org/abs/2203.02155 ——這條演化線的起點。讀它的「三步配方」（SFT → reward model → PPO RL）那張圖，把「RLHF 到底在做什麼」建立起來；留意「1.3B 勝過 175B」這個對齊威力的硬證據。\n- **Bai et al., \"Constitutional AI: Harmlessness from AI Feedback\"（Anthropic，2022-12，arXiv:2212.08073）** — https://arxiv.org/abs/2212.08073 ——演化線第二站。讀 abstract 與「用 AI 回饋取代人類回饋」那段，對照「它解決了 RLHF 標註不可規模化的什麼瓶頸」（這套方法怎麼外溢成 Anthropic 的性格見 ch07）。\n- **Shao et al., \"DeepSeekMath\"（DeepSeek，2024，arXiv:2402.03300）** — https://arxiv.org/abs/2402.03300 ——**GRPO 的首次登場**，也是 RLVR 配方的關鍵零件。讀它怎麼論證「拿掉 critic、用組內相對排名」既省記憶體又有效（DeepSeek 視角的成本敘事見 ch11）。\n- **Lambert et al., \"Tulu 3: Pushing Frontiers in Open Language Model Post-Training\"（Ai2，2024，arXiv:2411.15124）** — https://arxiv.org/abs/2411.15124 ——RLVR 被明確命名與系統化的一份開放後訓練配方。讀它把「可驗證獎勵」當成一個訓練階段獨立出來的設計，理解 RLVR 為什麼是一條可複用的方法、而不只是 DeepSeek 的偏方。\n- **DeepSeek-R1 技術報告（DeepSeek，2025-01，arXiv:2501.12948）** — https://arxiv.org/abs/2501.12948 ——這條線「便宜起飛」的最有名實證：大量靠可驗證獎勵＋GRPO 把推理能力 RL 出來。讀它怎麼把「對著客觀訊號自己練」做到底（推理範式的跨家全貌見 ch14）。\n"}, {"id": "ch16-compute-arms-race", "file": "ch16-compute-arms-race.md", "group": "Part III — 跨家主題（差異的橫切面）", "title": "ch16 — 算力軍備競賽：GPU、TPU、自研晶片", "md": "# ch16 — 算力軍備競賽：GPU、TPU、自研晶片\n\n> **本章解決什麼問題**：前面把推理範式（ch14）與對齊演化（ch15）這兩個橫切面攤開了。這一章換最硬的一條——**算力與基礎設施**。它回答五變數記分卡裡第三格的一個底層問題：算力不是「誰多誰強」的計分項，而是一道**硬約束**——它決定一家實驗室**能不能根本就養出某一類模型**。本章把 ch06 的 TPU、ch10 的 Colossus、Anthropic 的 Trainium 放在一起綜觀，講清楚三件事：為什麼 NVIDIA 是預設、自研晶片／自建叢集是一種戰略選擇、以及這場軍備競賽真正的天花板其實是互連、能源與資本。個別公司的算力故事 Part II 已各自講過，本章只負責**橫切的綜觀**，不重述。脊椎接你那本 AI Infra 書的 roofline 與記憶體階層。\n\n## 從你已知的出發\n\n你做過一個很多團隊不會做的決定：**自建一套輕量框架與多層 cache library**，全團隊採用。你大可直接用現成全家桶、把那一層外包給代管服務，但你選擇自己掌握它。回報很具體——尖峰 RDS CPU 降 40% 那次招牌診斷，有一部分就是因為快取的失效策略、序列化格式、記憶體配置全在你手上，你不必遷就任何上游函式庫的預設，可以針對自家流量形狀去擰。**自建 vs 代管**這個你每天在做的取捨，核心商品只有一句話：**掌握 stack，換最佳化空間與成本控制。**\n\n這一章，就是把這個取捨放大到一個荒謬的尺度——放大到**矽晶片**這一層。每一家前沿實驗室都得回答同一道題：訓練與服務模型的那幾萬、幾十萬顆加速器，**是跟 NVIDIA 買（用代管），還是自己設計晶片／自己蓋叢集（自管）？** NVIDIA 是預設選項，就像你預設會 `npm install` 一個現成的框架；而 Google 自研 TPU、xAI 自建 Colossus、Anthropic 押 AWS 自研的 Trainium，本質上都是你那個「我要不要自己掌握這一層」的決定，押到了整個產業鏈的最底層。\n\n但這一章還要多講一件你在 AI Infra 書裡已經有直覺、卻可能沒往「產業約束」想的事：**算力是一道硬約束，不是一個加分項。** 你那本書講過 roofline——一個運算到底是被算力（compute-bound）卡住、還是被記憶體頻寬（memory-bound）卡住。把這個直覺放大到整個實驗室的尺度：一家公司能不能訓一個 671B 的模型、敢不敢開 2M 的上下文窗口、養不養得起一個要對全球幾十億次查詢服務的模型——**這些不是「想不想」的問題，是「算力與基礎設施允不允許」的問題。** 算力先決定了「可能性的邊界」，五變數裡其他四格才在這個邊界**之內**比拼。這就是為什麼這一格特別——它不是記分卡上的一欄，它是記分卡能不能擺上桌的**桌子本身**。\n\n## 算力是硬約束，不是加分項\n\n先把這一章最反直覺的命題釘死：**算力不是「越多越強」的線性計分，而是一道「能不能入場」的門檻。**\n\n回到你的 roofline 直覺。一個模型要被訓出來，需要的東西可以粗分三類，缺一不可：\n\n- **算力（FLOPs）**：做矩陣乘法的純運算能力。模型越大、訓練 token 越多，需要的總 FLOPs 就越多（這正是 scaling laws 那條曲線的橫軸，見 ch02）。\n- **記憶體（HBM 容量與頻寬）**：權重要放得下、KV cache 要塞得進、梯度與最佳化器狀態要存得住。你那本書算過：很多時候卡住推論的不是算力，是**記憶體頻寬**——資料從 HBM 搬到運算單元的速度跟不上。\n- **互連（interconnect）**：一個模型大到一張卡放不下，就得拆到成千上萬張卡上一起算；這些卡之間要**高速交換中間結果**。卡與卡之間的頻寬，往往才是真正的天花板。\n\n關鍵在第三點。**現代前沿模型不是「在一張很強的卡上跑」，而是「在一萬張卡上協同跑」。** 這時候整個叢集的效能，不取決於單張卡多強，而取決於這一萬張卡能不能**像一台機器那樣協同**——而那由互連決定。這就把問題從「買多少卡」變成了一個**分散式系統**問題，而這恰恰是你的母語。\n\n> 用你最熟的話講：這跟你做高併發系統一模一樣。你不會說「我加了 100 台機器所以快了 100 倍」——你太清楚了，加機器到某個點，瓶頸會從 CPU 移到網路、移到鎖、移到那個沒水平擴展的資料庫。**規模不是線性的，協同的成本會反咬回來。** 一萬張 GPU 的叢集就是一個超大號的分散式系統，它的瓶頸同樣會從「算力」移到「卡間互連」「電力」「散熱」。算力軍備競賽，本質上是一場**分散式系統的軍備競賽**，只是節點是 GPU、網路是 InfiniBand 或光交換、而「那個沒水平擴展的資料庫」換成了「整個電網」。\n\n所以這一章談「誰有多少卡」時，數字只是表象。真正決定「能不能養出某類模型」的，是**算力 × 記憶體 × 互連 × 電力**這四者能不能在一個叢集裡同時到位。一家公司可能有錢買卡，卻卡在拿不到電（後面會講這正在發生）。算力是硬約束的意思是：**它先圈定可能性的邊界，其他變數在邊界內才有意義。**\n\n## 預設選項：NVIDIA 生態，以及為什麼想逃離它\n\n先講預設。截至 2026-06，絕大多數實驗室訓練模型用的是 **NVIDIA 的 GPU**（H100、H800、GB200、GB300 這條線），跑在 **CUDA** 軟體生態上。這是預設選項，原因跟你預設會用一個成熟開源框架一樣：**生態厚。** 全世界的工具鏈、函式庫、最佳化技巧、會調的人才，都圍著 CUDA 轉。你買 NVIDIA，買的不只是矽，是一整套「別人已經替你踩過坑」的軟體棧。\n\n但這個預設有它的代價，而且每一項都對應你用代管服務的痛點：\n\n- **要排隊、要搶。** 前沿 GPU 長期供不應求，產能卡在台積電與 NVIDIA 手上。你想擴張，得看人臉色、排產能。這像你的服務被綁在一個有配額、要排隊的代管 API 上。\n- **要付毛利。** NVIDIA 的毛利率長期極高。你每買一張卡，都在替別人的利潤買單。這是代管服務最典型的影子：方便，但你付的是「方便稅」。\n- **被一家供應商鎖死（vendor lock-in）。** 你的整個訓練棧長在 CUDA 上，遷移成本極高。供應鏈一有風吹草動（地緣政治、出口管制、產能事故），你整條命脈都在別人手上。\n\n於是就有了這一章的戰略主題：**逃離 NVIDIA 依賴。** 注意——「逃離」不是因為 NVIDIA 不好，恰恰是因為它太關鍵、太貴、太集中。這跟你某天決定「這個第三方代管服務太貴又綁太死，我要自建一層自己掌握」的動機，結構上完全一樣。逃離的路有兩條，我們各看一個招牌個案：**自研晶片**（Google）與**自建叢集 + 押替代矽**（xAI、Anthropic）。\n\n## 三個「逃離預設」的故事，綜觀\n\nPart II 已經各講過這三家的完整故事。這裡只做一件事——把它們**並排**，看清「逃離 NVIDIA」的三種不同打法。所有數字都標日期戳、全部標 ⚠️（自報／量級級／爭議中），因為這是全書最易過期、最不透明的一類事實。\n\n### 自研晶片：Google TPU（垂直整合到矽）\n\n✅ 截至 2026-06，Google 最新的訓練／推論晶片是 **Ironwood，即 TPU v7**（約 2025-11 GA）。一個 pod 串到 **9,216 顆**液冷晶片，整 pod 約 **42.5 ExaFLOPS（FP8）**、每顆 **192GB HBM**，整 pod 共約 **1.77 PB** 的 HBM 記憶體；pod 內用一套自研的高速 **Inter-Chip Interconnect**（每鏈約 1.2 TB/s 等級），cube 之間再用**光交換（Optical Circuit Switch, OCS）**動態串接。⚠️「Google 有上千萬顆 TPU」「每顆 TCO 比 GB200 server 低約 44%」這類說法是廠商口味、量級級、未經獨立稽核——當方向讀，別當精確值。\n\n打法的本質：**把垂直整合做到矽。** Google 不是 NVIDIA 的客戶，是自己晶片的設計者兼唯一大用戶。回報是 ch06 那條被講透的鏈——**自研 TPU → 掌握矽到模型整條 stack、模型工程師跟晶片工程師協同設計 → 長序列訓練／服務成本可控 → 敢把上下文開到別家不敢開的長度**。注意那套互連數字（pod 內共享 1.77 PB HBM、光交換把整個 pod 串成一台機器）正是「把超長序列攤在很多晶片上一起算」最需要的東西。這是三條路裡**最徹底**的一條：連矽都自己畫。代價也最重——外部生態薄，整個軟硬體棧得自己撐（ch06 的影子）。\n\n### 自建叢集：xAI Colossus（用速度與蠻力換時間）\n\n🟡/⚠️ 截至 2026-06，xAI 的 **Colossus** 超級叢集（Memphis）被報導（2026-01）為**約 555,000 顆 GPU**（Colossus 1 約 230k 運轉中、含約 30k GB200；Colossus 2 首批約 550k GB200／GB300 陸續上線），總電力約 **2 GW**，據報採購額約 180 億美金。⚠️ 這些是 Musk／媒體口徑、變動極快的數字——**給數字，也要給「自報／快速變動」**。Musk 喊出的 5 年目標是 2030 年前達到「5,000 萬顆 H100 等效算力」（⚠️ 願景級）。\n\n打法的本質：**不自研晶片，但自建叢集，並把「蓋叢集的時間」本身壓成競爭武器。** xAI 仍然買 NVIDIA（沒逃離矽這一層），但它逃離的是「等別人幫你蓋資料中心」的時間。✅ 真正站得住的故事是**速度**：xAI 從零到一個頂級叢集快得驚人（Colossus 1 在 2024 年數月內就立起來）。為了繞過電網——這正是本章下一節的主角——xAI 在現場自建**燃氣渦輪發電**（據報七台 Titan-350 級渦輪、每台約 35–38 MW），並以號稱「19 天」級的建置節奏把通常要四年的工程壓成數週。這是「自管基礎設施」最暴力的版本：連電都自己發。影子也最刺眼——能源與排放爭議、即時把一個社區的電力與空氣品質吃進去（ch10 的影子）。\n\n### 押替代矽：Anthropic via AWS Trainium（不自研、也不主押 NVIDIA）\n\n✅ 截至 2026-06，Anthropic 是一家**多雲**前沿實驗室，最大的算力承諾既不是自研晶片、也不主要押 NVIDIA，而是 **AWS 自研的 Trainium**。**Project Rainier**（AWS，印第安納州）首批已啟用、規模近 **50 萬顆 Trainium2**；Anthropic 目前用**超過 100 萬顆 Trainium2** 來訓練與服務 Claude；擴大後的協議為最多 **5 GW 的 Trainium 算力 ＋ 十年 1,000 億美金**的 AWS 承諾。✅ 同時 Anthropic 還有最多 **100 萬顆 Google TPU** 的協議（2025-10）。所以它**橫跨 AWS Trainium ＋ Google TPU 兩種替代矽**，刻意既不靠自研、也不主押 NVIDIA。\n\n打法的本質：**自己不造晶片，但把賭注押在『別人造的替代矽』上，用多雲分散供應鏈風險。** 這是三條路裡最「軟」的一條——它逃離 NVIDIA 依賴的方式，是把命脈分散到兩種非 NVIDIA 的加速器上，而不是自己蓋晶圓廠或機房。回報是供應彈性與議價權；影子是它對任何一種矽的掌握度，都不如 Google 對 TPU、xAI 對自建叢集那麼深——它買的是「不被單一供應商鎖死」，付的是「沒有任何一層是完全自己的」。\n\n> 並排看這三條路，你會看到一條光譜，正好對應你「自建 vs 代管」的光譜：\n> ```\n> 完全自管 <─────────────────────────────────> 完全代管\n>   Google TPU        xAI Colossus      Anthropic        多數實驗室\n>   (連矽都自研)      (買 NVIDIA 卡、    (押 AWS/Google    (純買 NVIDIA、\n>                      但自建叢集、自發電)  的替代矽、多雲)    用人家機房)\n>   掌握最深          掌握中段           掌握供應選擇       掌握最淺\n>   維護負擔最重      工程/能源負擔重      議價彈性高        方便稅最高\n> ```\n> 沒有哪一格是「對的選擇」——就像你自建 cache library 是對的、但不代表每個元件都該自建。掌握得越深，最佳化空間越大、維護負擔也越重。這條光譜上選哪一格，是**戰略取捨**，不是技術優劣。\n\n## 真正的天花板：互連、能源、資本\n\n談「誰有幾十萬顆卡」很容易讓人以為瓶頸是「買得起多少卡」。截至 2026-06，真正卡住這場競賽的，是另外三件更難用錢直接解決的事。這一節是本章最該記住的部分。\n\n**互連（卡與卡之間）。** 前面說過：一萬張卡的叢集，效能不取決於單卡多強，取決於它們能不能像一台機器協同。這就是為什麼 Ironwood 要做到 pod 內 1.77 PB 共享 HBM ＋ 光交換、為什麼 NVIDIA 的 NVLink／InfiniBand 是整套系統的賣點而不只是配件。**互連是「分散式系統的網路層」放大到矽的尺度**——你太懂這件事了：當你的微服務多到一定程度，瓶頸從來不是單一服務的 CPU，而是服務之間的網路與協調。叢集也一樣，卡間頻寬決定了你能把一個模型有效拆到多少張卡上，也就決定了你能訓多大的模型。\n\n**能源（叢集與電網之間）。** 這是 2026 年最硬、也最容易被忽略的天花板。一個前沿叢集的耗電是 **GW（十億瓦）等級**——Colossus 報導約 2 GW、Stargate 喊 10 GW＋、Anthropic–AWS 協議到 5 GW。問題是：**電不是你想要就有的。** 截至 2026-06，美國多個市場的電網併網排隊已長達數年（PJM 區的待併申請量據報以「千 GW」計、平均等待逾五年）；變壓器這類關鍵設備的交貨期被拉到約四年、價格翻倍。所以出現了一個荒謬但真實的局面：**有錢、有卡，卻拿不到電。** 這就是為什麼 xAI 要在現場自建燃氣渦輪、為什麼 OpenAI 的 Stargate 在英國因能源成本與法規而喊停、為什麼超大廠開始自建「能源孤島」。✅ 一句話：**2026 年算力競賽的瓶頸，正在從「晶片」移到「電力」。** 這對你不陌生——它就是你那個「沒水平擴展的資料庫」的產業版：整個系統堆到某個規模，瓶頸退到那個你最難擴的共用資源上，這裡那個資源是電網。\n\n**資本（資本支出黑洞）。** 上面這些數字攤開——Stargate 喊 4 年 5,000 億美金、Anthropic–AWS 十年 1,000 億、Colossus 採購約 180 億、Meta 2026 capex 據報約 1,150–1,350 億美金（⚠️ 媒體口徑）——指向同一件事：**前沿算力的入場費，正在把這個賽道變成一個只有極少數玩家付得起的俱樂部。** 這是這場軍備競賽最深的結構性後果：它不是讓強者更強，而是**抬高了門檻本身**，把「能不能養前沿模型」變成一個資本問題。\n\n而這就接回全書最反直覺的一條伏筆——**算力是硬約束，但不是勝負。** 下一節用 DeepSeek 把這句話講透。\n\n## 招牌個案：出口管制如何把劣勢逼成護城河\n\n這一章的招牌個案不是「誰算力最多」，恰恰相反——是**一個被算力卡住的故事**。它把本章兩個命題（算力是硬約束 / 但算力 ≠ 贏）一次串起來。\n\n✅ 美國的出口管制，限制了最頂規的 NVIDIA 晶片賣進中國。DeepSeek 主要只能拿到**降規版的 H800**（互連頻寬被刻意閹割過的 H100——注意，被砍的正是上一節說的「互連」，這不是巧合）。⚠️ 它到底有幾千張卡是個祕密、數字未經證實，但方向清楚：**在「絕對火力」這一格，它輸給 OpenAI、Google、Meta 那種等級。**\n\n關鍵的因果轉折在這裡，也是本章想讓你帶走的一句話：**當你不能用蠻力解決問題，你就被逼著用聰明解決問題。** ch11 把這條鏈講透了——算力劣勢逼出了一整套省算力的發明：**MLA**（壓 KV cache，省記憶體與頻寬）、**MoE**（稀疏激活，671B 容量 37B 帳單）、**GRPO**（砍掉 reward model，省一半 RL 記憶體）、MTP／FP8。然後是那場地震：✅ 2025-01-27，R1 發表後 NVIDIA 單日跌約 17%、市值蒸發近 6,000 億美金；✅ 但幾個月內又漲了回來。市場親自校正出的那句教訓，正是本章的脊椎：**「演算法效率，跟堆規模一樣重要。」**\n\n把它接回本章的硬約束命題，你會看到一個漂亮的對稱：\n\n```\n算力是硬約束（它圈定可能性的邊界）\n      |\n      +-- 對 Google/xAI：用「擴大邊界」回應（自研晶片、自建叢集、自己發電）\n      |\n      +-- 對 DeepSeek：邊界被出口管制鎖死，無法擴大\n              |\n              v  不能擴大邊界，只能在邊界內做到極致\n        把「算力·基礎設施」的劣勢，逼成「架構＋後訓練」的優勢\n              |\n              v  撼動「訓練前沿模型一定很貴」的成本共識\n        證明：算力是硬約束，但算力多 ≠ 贏\n```\n\n這就是為什麼本章一邊把「算力是硬約束」釘死、一邊又堅持「算力 ≠ 贏」——兩句話不矛盾。算力**圈定邊界**（DeepSeek 確實被卡住、確實追不到絕對火力的天花板），但**邊界內的效率與品味也能決定勝負**（DeepSeek 確實用更少的算力做到了同台）。**最會花算力的人，不一定是算力最多的人。** 一家被卡住算力的實驗室，反而給了全產業一堂「效率是被低估的護城河」的課——這正是「算力是硬約束、但不是加分項、更不是勝負」這句話最有力的證據。\n\n## 成因拆解\n\n注意：本章是**橫切主題**章，不是某一家的拆解。所以這裡的五格歸因，回答的是「**算力·基礎設施這一格，在『各家能力差異』裡到底扮演什麼角色**」這個元問題。\n\n### (a) 五格歸因\n\n| 變數 | 主/次 | 為什麼 |\n|---|---|---|\n| 資料 | △次因 | 算力與資料互相牽制——算力決定你**吃得下**多少 token（scaling 的另一軸，見 ch02），但本章談的是「算力本身」這一格，資料是它約束的對象，不是它的成因。 |\n| 後訓練·對齊 | △次因 | 算力決定後訓練（尤其 RL／推理模型）跑不跑得起——GRPO 之所以重要，正是因為它讓 RL 在受限算力下可負擔；算力是後訓練的**前提**，但這裡記為次因（後訓練本身是 ch15 的格）。 |\n| **算力·基礎設施** | **✓主因（本章主角）** | **它是硬約束：先圈定「能不能養出某類模型」的可能性邊界，其他四格在邊界內才有意義。自研晶片／自建叢集是擴大邊界的戰略，互連·能源·資本是邊界的真實天花板。** |\n| **研究文化·品味** | **✓主因** | **算力多寡不直接決定勝負——「會不會花算力」才是。DeepSeek 用更少算力同台，靠的是效率品味；Google 把 TPU 兌現成長上下文，靠的是協同設計的工程文化。算力是桌子，品味決定誰在桌上贏。** |\n| 產品取向 | △次因 | 要服務什麼規模的產品（Search 的行星級 vs 一個 API），反過來決定你**需要**多少算力、值不值得自研晶片——產品壓力是「為什麼自研」的放大器（ch06），記為次因。 |\n\n一句話收束（本章版）：**算力·基礎設施強在「它是硬約束，先決定可能性的邊界」，主因落在〔算力本身 ＋ 會不會花算力的研究文化〕；影子是資本支出黑洞、供應鏈與地緣風險，以及最容易被誤讀的一點——算力多 ≠ 能力強。**\n\n### (b) 影子\n\n把算力當核心競爭力的這套打法，代價同樣巨大：\n\n- **資本支出黑洞。** 自研晶片、自建叢集、自己發電——每一條「掌握得更深」的路，都是天文數字的前期投入與長期維護。前沿算力的入場費（4 年 5,000 億、十年 1,000 億這種量級）正在把賽道變成極少數玩家的俱樂部。這跟你自建框架的影子同構，只是放大到國家級：**掌握得越深，能最佳化的越多，要自己扛的資本與維護也越重。** 一旦砸下去的算力沒換來對等的能力提升（scaling 的回報遞減、或押錯方向），那就是一個吞錢的黑洞。\n- **供應鏈與地緣政治風險。** 整個前沿算力卡在極窄的咽喉上：先進製程幾乎只有台積電做得出來、先進封裝（CoWoS）與 HBM 都是瓶頸、出口管制隨時可能改寫誰能買到什麼。**這條供應鏈的脆弱，是全產業共享的單點故障。** 你最怕的「整個系統的命脈綁在一個你控制不了的上游」，在這裡是地緣政治尺度的版本。DeepSeek 的 H800 故事，就是這個風險真實應驗的樣本。\n- **「算力 ≠ 能力」這個最危險的誤讀。** 這是本章最該防的盲點。把「誰卡多」當成「誰強」，會讓你（與市場）一次次誤判——2025-01 那場 NVIDIA 股災，本質就是市場先把「算力 = 護城河」奉為圭臬、再被 DeepSeek 一巴掌打醒。算力是**必要**條件（沒有就入不了場），但遠不是**充分**條件（有了不保證贏）。把必要當充分，是這一格最容易犯的錯。\n\n### (c) 何時不成立\n\n「算力·基礎設施是硬約束」這個判斷，在什麼情況會鬆動或被打臉？\n\n- **被效率打臉**：本章的招牌個案 DeepSeek 就是活生生的反例。當演算法效率（MLA／MoE／GRPO）能把「達到某能力所需的算力」往下壓兩三個數量級，硬約束的「硬」就鬆了——你不再需要那麼多卡。如果未來某個範式（更聰明的訓練法、更省的架構）讓「同樣能力所需算力」持續下探，那麼今天靠算力堆出來的護城河，會被效率從下方掏空。**算力與效率，是同一道成本題的兩條解法**（ch06／ch11 反覆出現的母題）。\n- **被任務打臉**：算力是硬約束，主要約束的是「**訓練**前沿模型」這件事。但「強」要分任務（ch04）——一個算力沒那麼多、卻把資料配比、對齊、產品打磨做到極致的團隊，在某些任務上完全可能勝過算力更多的對手。算力決定你能不能上桌，不決定你在每一桌都贏。**沒有單一冠軍**，這是全書脊椎。\n- **被時間打臉**：本章所有數字都是 **2026-06 的快照**，而且是全書**最易過期**的一類——Colossus 的 GPU 數、Stargate 的 GW、各家 capex、Project Rainier 的晶片數，全部 ⚠️ 自報／量級級／三個月內十之八九要重掃（見 maintenance）。穩定的是「**算力是硬約束、自研是逃離 NVIDIA 依賴的戰略、真正天花板是互連·能源·資本、但算力 ≠ 贏**」這個**成因結構**；會過期的是任何一個具體的卡數、瓦數、金額。\n\n## 紙上推演\n\n### 推演題1 — 口頭重講：為什麼「算力是硬約束、不是加分項」 **[10 分鐘]** ★\n\n不准看書，對一個只懂後端、沒碰過 ML 的同事，用 60 秒講清楚：為什麼說算力是「硬約束」而不是「越多越強的加分項」？用你的分散式系統直覺打比方。\n\n#### 推演解答\n\n關鍵是把「門檻」和「計分」分開講。**硬約束 = 它先圈定「你能不能做某件事」的邊界，五變數其他格在邊界內才有意義。** 一家拿不到足夠算力（或拿不到電、或拆不開到夠多卡）的實驗室，根本就**養不出**某一類模型——這不是「分數低一點」，是「入不了場」。\n\n好的比方（用你的母語）：這就像你的高併發系統。你不會說「加 100 台機器就快 100 倍」——加到某個點，瓶頸從 CPU 移到網路、移到那個沒水平擴展的資料庫。算力叢集一樣：一萬張卡不是「單卡 × 一萬」，協同的成本（互連、電力、散熱）會反咬。所以算力決定的是**可能性的邊界**（能不能拆到一萬張卡上協同跑一個超大模型），不是一條線性的強度條。\n\n常見誤解：把「卡多」直接讀成「模型強」。反例就在本章——DeepSeek 卡被卡住，照樣同台。算力是**必要不充分**：沒有入不了場，有了不保證贏。能講出「必要 vs 充分」這個分野，就過關了。\n\n### 推演題2 — 翻譯：把三家「逃離 NVIDIA」對應回你的「自建 vs 代管」 **[12 分鐘]** ★★\n\n把 Google（TPU）、xAI（Colossus）、Anthropic（Trainium）三種打法，各自對應回你做過的一個「自建 vs 代管」決定，並說出各自「掌握了哪一層、付了什麼代價」。\n\n#### 推演解答\n\n三家正好排在你那條「自建 vs 代管」光譜的不同點上：\n\n- **Google TPU ≈ 你自建 cache library 兼自己掌握序列化／記憶體配置那一層**——掌握**最深**（連最底層的格式都自己定）。回報：模型與晶片協同設計，能做別人做不到的最佳化（長上下文）。代價：外部生態薄，整個棧自己撐（沒有上游幫你修坑）。\n- **xAI Colossus ≈ 你決定「不外包機房、自己租機架自己組叢集」**——仍然買現成的卡（NVIDIA，像你用現成的伺服器），但**自管部署與基礎設施**（甚至自己發電 ≈ 自己拉專線、自建備援電源）。回報：速度與掌控。代價：工程與能源負擔極重。\n- **Anthropic Trainium ≈ 你決定「不押單一雲，多雲分散、選用非主流但更划算的實例類型」**——既不自建晶片、也不主押市場龍頭，押**替代供應商**並分散風險。回報：議價彈性、不被鎖死。代價：沒有任何一層是完全自己的，掌握度最淺。\n\n關鍵反問（檢驗你真懂）：哪一條路「最對」？**都對，也都不對。** 就像你自建 cache library 是對的決定，但不代表每個元件都該自建——自建得越深，最佳化空間越大、維護負擔也越重。選哪一格是**戰略取捨**（你要的是成本控制？速度？還是不被鎖死？），不是技術優劣。能說出「沒有正確答案、只有取捨」，你就讀懂了這一格。\n\n### 推演題3 — 反事實：如果從來沒有出口管制 **[15 分鐘]** ★★★\n\n假設出口管制從沒發生，DeepSeek 想買多少頂規 H100／B200 都行。它還會發明 MLA、GRPO 這套效率招式嗎？這個 thought experiment 想逼你看清本章哪個命題？\n\n#### 推演解答\n\n很可能**不會、至少不會這麼拚**。這正是本章把「算力是硬約束」和「算力 ≠ 贏」串起來的關鍵：**那套效率發明，是被算力硬約束逼出來的，不是在資源充足下自然長出來的。** 當你能無腦堆卡，「把每張卡擰乾」的邊際動機就低——你會像很多資源充足的大廠一樣，先用蠻力把東西做出來。\n\n這個反事實要逼你看清的命題是：**約束不只是損害，它會重新分配一家公司「必須擅長什麼」。** 算力這道硬約束，對 Google／xAI 是「想辦法擴大邊界」（自研、自建、自己發電），對被鎖死的 DeepSeek 卻是「邊界擴不了，只能在邊界內做到極致」——而後者反而給全產業上了「效率是被低估的護城河」這一課。你那次 RDS CPU 降 40%，也是因為**不能無腦加機器**才被逼著把瓶頸看透——預算無限的話，那個洞察不會被逼出來。限制是創新的母親，在工程現場與在國家級實驗室是同一個機制。\n\n要小心別浪漫化過頭（常見誤解）：約束**催生**了 DeepSeek 的效率優勢，但約束**同時也是天花板**——同一個出口管制，逼出今天的招式，也鎖死明天絕對火力的上限。約束的兩面性（創新的母親 ＋ 規模的牢籠）要一起講，才完整。\n\n### 推演題4 — 找破綻：「OpenAI 有 Stargate、Colossus 有 55 萬顆卡，所以前沿就是比誰卡多」 **[12 分鐘]** ★★★\n\n有人在群組丟出這句話。請你用 90 秒，不否定「算力很關鍵」，但精準指出這句話錯在哪。\n\n#### 推演解答\n\n完整拆法分三刀：\n\n1. **必要 ≠ 充分刀**：算力是**必要**條件（沒有入不了場），但不是**充分**條件（有了不保證贏）。把必要當充分，就是 2025-01 NVIDIA 股災的市場心理——先把「算力 = 護城河」奉為圭臬，再被 DeepSeek（被卡算力卻同台）一巴掌打醒。「比誰卡多」漏掉了「會不會花算力」這格（研究文化·品味）。\n2. **數字口徑刀**：那些「55 萬顆卡」「10 GW」全是 ⚠️ 自報／媒體口徑／量級級、變動極快的數字，不能當精確事實。而且「卡數」本身會騙人——真正決定能訓多大模型的是**互連**（卡間頻寬）、是這些卡能不能像一台機器協同，不是裸卡數。\n3. **真天花板刀**：2026 年真正卡住競賽的，已經從「買得起多少卡」移到「拿不拿得到電」（電網併網排隊數年、變壓器交期四年）。有錢有卡卻拿不到電，正在真實發生（xAI 自建燃氣渦輪、OpenAI 英國 Stargate 喊停）。所以「比誰卡多」連瓶頸都抓錯了。\n\n**但收尾要轉回來**（這題最容易走偏）：破除「比誰卡多」≠ 否定算力的關鍵性。算力確實是硬約束、確實圈定邊界——只是它是**桌子**不是**勝負**。能同時講出「算力很關鍵」與「但卡多 ≠ 贏」，才算真讀懂，而不是從一個極端（唯算力論）盪到另一個極端（算力無用論）。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼說算力是「硬約束」而不是「越多越強的加分項」？「必要條件」和「充分條件」在這裡分別對應什麼？\n2. 一個一萬張 GPU 的叢集，效能為什麼**不**等於「單卡效能 × 一萬」？瓶頸會退到哪幾個地方？這跟你加機器到某個點瓶頸退到資料庫，是同一回事嗎？\n3. NVIDIA 是預設選項，為什麼還有人想「逃離」它？這三個逃離動機（排隊／毛利／鎖死），分別對應你用代管服務的哪個痛點？\n4. Google TPU、xAI Colossus、Anthropic Trainium 三條「逃離 NVIDIA」的路，各自掌握了哪一層、付了什麼代價？為什麼說「沒有哪條路最對」？\n5. 為什麼說 2026 年算力競賽的瓶頸正在從「晶片」移到「電力」？「有錢、有卡、卻拿不到電」是怎麼發生的？\n6. 為什麼出口管制（一個算力**劣勢**）反而成了 DeepSeek 效率護城河的成因？這怎麼證明「算力是硬約束、但算力 ≠ 贏」這兩句話不矛盾？\n7. 「算力 ≠ 能力」是本章最危險的誤讀。2025-01 NVIDIA 股災又漲回來，留下的正確教訓是哪一句？為什麼不是「scaling 已死」、也不是「算力無用」？\n8. 如果未來演算法效率持續把「達到某能力所需的算力」往下壓，今天靠算力堆出來的護城河會怎樣？這跟 ch06／ch11「算力與效率是同一道成本題的兩條解法」是同一個觀念嗎？\n\n## 延伸閱讀\n\n- **Ironwood: The first Google TPU for the age of inference**（blog.google）——TPU v7 的 pod 規模（9,216 顆）、1.77 PB HBM、光交換互連的官方介紹；讀「pod 怎麼串成一台機器」那段，理解互連為什麼才是叢集的真天花板。⚠️ 性能對比數字帶廠商口味，當方向不當精確值。\n- **Anthropic and Amazon expand collaboration for up to 5 gigawatts of new compute**（anthropic.com）＋ **AWS activates Project Rainier**（aboutamazon.com）——一手確認 Project Rainier（近 50 萬顆 Trainium2 啟用、Anthropic 用 >100 萬顆）與 5 GW／十年 1,000 億的協議；讀來理解「押替代矽、多雲分散」這條路長什麼樣。\n- **xAI Colossus Hits 2 GW: 555,000 GPUs**（Introl）＋ **xAI to pull about half of its turbines powering Colossus**（The Register）——前者給叢集規模與速度故事，後者給能源／排放的影子；兩篇對讀，體會「自建叢集 + 自己發電」的回報與代價。\n- **The Gigawatt Bottleneck: Power Constraints Define AI Data Center Growth**（Data Center Frontier）——把「瓶頸從晶片移到電力」這件事講透：電網併網排隊數年、變壓器交期四年。讀它理解本章「真正的天花板是互連·能源·資本」那節。\n- **DeepSeek-V3 Technical Report**（arXiv:2412.19437）——本章招牌個案的一手出處。讀它對 H800、FP8、訓練成本的措辭，對照 ch11，理解「算力被卡住 → 逼出效率」這條鏈如何在硬約束下真實發生。\n- **Announcing the Stargate Project**（openai.com）——4 年 5,000 億美金、10 GW＋ 的算力企圖；對照「英國 Stargate 因能源成本喊停」的後續報導一起讀，體會資本支出黑洞與能源天花板如何同時箝制這場競賽。⚠️ 頭條數字皆為宣稱值、推進不順，當企圖讀。\n```\n"}, {"id": "ch17-multimodal", "file": "ch17-multimodal.md", "group": "Part III — 跨家主題（差異的橫切面）", "title": "ch17 — 多模態：文字之外的戰場", "md": "# ch17 — 多模態：文字之外的戰場\n\n> **本章解決什麼問題**：到 ch16 為止，我們談的「強項」幾乎都還在文字裡——coding、長文、推理、多語言。但文字 benchmark 正在飽和（MMLU-Pro、GPQA 在頂端早已擠到分不出高下，見 ch04），純文字的競爭快要榨乾。這一章把鏡頭轉向**文字之外**：影像、音訊、影片。要回答的是——為什麼「原生多模態（native multimodal）」會成為下一個差異化戰場、誰為何領先，以及這條戰線的成因主要記在五變數的哪幾格。本章是**橫切面**章節：不重講各家完整版本史（那是 Part II 與附錄 A 的事），只把「多模態」這一個切面如何在各家身上展開、為什麼，攤給你看。會頻繁接回 ch06（Google 的 TPU／長上下文鏈）與 ch08（Llama 4 是 Meta 第一個原生多模態），因為這一章的招牌因果，正好是那兩章的延伸。\n\n## 從你已知的出發\n\n你做過一件每個後端工程師遲早會做的事：**把很多種輸入格式，統一收斂成同一套 schema、進同一個服務**。\n\n想想你那條 event-driven 結算 pipeline。上游來的東西從來不乾淨：有的是 webhook 推來的 JSON，有的是第三方丟的 CSV，有的是另一個內部服務發的 protobuf，欄位名稱、時區、金額單位、空值約定全都不一樣。你有兩種做法可選：\n\n- **後接法（bolt-on）**：每來一種新格式，就在外面臨時加一個 adapter，把它「翻譯」成主流程看得懂的樣子，再塞進去。快、省事、不用動核心。但每個 adapter 都是一道接縫，接縫越多，邊界情況越多，最後你的核心服務其實從沒真正「理解」這些異質輸入——它只是被餵了一堆被勉強對齊過的代理資料。\n- **原生統一法（native）**：你乾脆從一開始就設計一套**共用的 canonical schema**，讓所有來源在進系統的那一刻就活在同一個語意空間裡，下游所有邏輯都直接在這個統一表示上運作，不用每次都先猜「這筆是從哪個 adapter 來的」。前期設計貴得多，但一旦建好，跨來源的對帳、查詢、推理全都順了——因為它們本來就同源。\n\n這章要講的「原生多模態 vs 後接多模態」，**幾乎就是這同一道取捨**，只是把「異質資料格式」換成了「文字／影像／音訊／影片這些異質模態」。一個模型要不要真的「原生看懂」影片，還是只是在文字模型外面黏一個影像編碼器當 adapter——這個選擇，跟你決定要不要為結算 pipeline 設計一套 canonical schema，是同一種工程判斷。差別只在尺度，與——你馬上會看到——它最後又一次回到了 ch06 那條算力的因果鏈上。\n\n## 為什麼是「下一個」戰場：文字快榨乾了\n\n先講清楚這一章為什麼存在於「現在」，而不是兩年前或兩年後。\n\n截至 2026-06，純文字的競爭出現了一個結構性訊號：**頂級文字 benchmark 飽和了**。ch04 已經攤過這件事——MMLU-Pro（硬知識多選）頂端的模型擠在 88～94% 這個窄帶裡，GPQA Diamond（研究所級科學推理）前沿模型逼近 94%，AIME（競賽數學）對推理模型幾乎是滿分。當一張尺的刻度已經被大家踩到頂、再也分不出誰高誰低時，它就**不再是差異化的戰場**了。reasoning 模式同樣：到 2026 年，「會不會推理」已經是入場券（table stakes），不是區別點——八家全都有 reasoning 模式（見 ch14）。\n\n當一個維度上大家都做到滿分，競爭自然會**外溢到還沒飽和的維度**。截至 2026-06，那個維度主要是兩塊：**agentic**（讓模型自己規劃、用工具、檢查自己的工作）和**多模態**。這一章談後者。多模態之所以是「下一個」戰場，不是因為它比文字重要，而是因為——\n\n- 文字那條賽道的刻度用完了，**這裡刻度還很長**：影像、音訊、影片的理解，遠沒到「大家都滿分」的程度，還有大量空間可以拉開差距；\n- 它直接連到**產品**：使用者真正想要的下一代體驗，幾乎都是多模態的——對著手機螢幕問問題、用語音即時對話、讓裝置端的模型看著鏡頭幫你做事。產品取向（五變數第五格）會把實驗室往這個方向硬推。\n\n換句話說，多模態之所以「現在」變成戰場，一半是因為文字戰場打到沒仗可打了（飽和），另一半是因為產品的下一站非它不可。\n\n## 原生 vs 後接：同一張藍圖下的兩種長法\n\n這是本章要講透的那條因果。先把兩條路的**機制差異**講清楚，再講它為什麼會分出強弱。\n\n記得全書的脊椎：底層是同一張藍圖（decoder-only Transformer ＋ self-attention），各家差在**養法**。多模態恰好是這個命題一個漂亮的縮影——同一張藍圖，兩種把「非文字」餵進去的養法。\n\n### 後接法：把一個影像編碼器釘在文字模型外面\n\n最常見、最省事的做法是這樣的：你已經有一個訓練好的純文字 LLM，現在想讓它「看得到圖」。於是你拿一個現成的視覺編碼器（vision encoder，把圖片轉成一串向量），在它後面接一個小小的**投影層（projection layer）**，把影像向量「翻譯」成 LLM 看得懂的 token 空間，再把這些 token 塞進文字模型的輸入裡。文字模型本體常常是**凍結的**（不動它的權重），你主要訓練那個投影層讓兩邊對齊。\n\n這就是「後接（bolt-on）」——學界這條路線的代表是 LLaVA、MiniGPT-4 這類「frozen 視覺編碼器 ＋ 一層投影」的設計。它的好處跟你的結算 pipeline 加 adapter 一模一樣：**快、便宜、不用重訓核心**。但它的代價也一樣：影像理解是**事後黏上去的一層代理**，文字模型本體從沒在預訓練時真正「跟影像一起長大」。圖文之間的深層關係，只能擠過那一道窄窄的投影接縫來傳遞。\n\n### 原生法：從預訓練第一天就把多種模態餵進同一個流\n\n原生多模態（native multimodal）走的是另一條路：**從預訓練階段就把文字、影像、音訊、影片一起餵進同一個模型**，讓它在同一個 token 流裡學會跨模態的關係。\n\n截至 2026-06，這條路最常被引為標竿的是 **Google 的 Gemini**：所有模態都被表示成同一個 token 流裡的離散 token，模型在一個統一的向量空間裡同時學文字、影像、音訊、影片——語意上相近的東西會聚在一起，不管它原本是哪種格式。**Meta 的 Llama 4**（2025-04 發表，見 ch08）走的是技術上叫「**early fusion（早期融合）**」的同一個家族：把文字 token 與視覺 token 在進入模型主幹的那一刻就**融進同一條骨幹**，於是可以拿大量「未標註的文字＋影像＋影片」一起做預訓練。Llama 4 是 Meta 第一個**原生多模態、也是第一個 MoE** 的 Llama——這兩件事擺在一起不是巧合，後面成因拆解會說為什麼。\n\n> 對照你的 canonical schema：原生法就是「所有來源在進系統那一刻就活在同一個語意空間」。影像不是被翻譯成文字的代理，而是**本來就跟文字同源**地被模型認識。\n\n### 為什麼原生通常贏：接縫的代價\n\n兩條路放在同一張藍圖下，原生為什麼通常更強？關鍵在那道**接縫**。\n\n後接法把跨模態的理解全部壓進「投影層」這一道窄門。文字模型本體是先學會純文字、之後才被勉強對齊到影像的，它對「圖裡這個東西和句子裡那個詞是同一件事」這種**深層對應**，只能透過那層薄薄的投影去猜。原生法不一樣——模型在預訓練時就**同時**見過「這張圖」與「描述它的文字」「相關的聲音」，跨模態的關聯是**長進權重深處**的，不是事後糊上去的一層。\n\n這正是你結算 pipeline 的教訓放大版：每加一個 adapter，就多一道接縫、多一批邊界情況、多一個「核心其實沒真懂這個來源」的盲點；而一套共用的 canonical schema，雖然前期貴，但讓所有跨來源的推理都順，因為它們本來同源。**原生多模態 = 為模態設計的 canonical schema；後接多模態 = 一堆 adapter。** 接縫越少，跨模態推理越深、越不容易在邊界上出錯。\n\n⚠️ 但別把這寫成定律。後接法不是「錯」，它在很多場景是**正確的工程取捨**——尤其當你只想給既有文字模型加個看圖能力、不想付重訓的天價時。學界也指出：融合的時機與方式沒有單一最優解，不同任務各有適合的點。所以正確的說法是：截至 2026-06，**原生路線在「深層跨模態理解」這個軸上通常更有上限**，但它的入場費（資料＋算力）也高得多——而那個入場費，就是下一節要講的門檻。\n\n## 影片＝偽裝成多模態的長上下文問題\n\n現在把這一章接回 ch06。這是本章最重要的一條因果鏈，也是「為什麼領先的名單跟長上下文的名單高度重疊」的真正原因。\n\n問一個看似天真的問題：**為什麼影片是多模態裡最難的那一塊？**\n\n答案不在「影片很複雜」這種模糊話，而在一個你最有直覺的地方——**序列長度**。一段影片在模型眼裡是什麼？是一連串影格，每一影格又被切成一堆視覺 token，再加上音軌的 token……加起來，**一段影片可以輕易是上百萬 token 的序列**。也就是說：\n\n> **「能原生吃影片」與「能吃很長的上下文」，本質上是同一種能力。** 影片是一個偽裝成多模態問題的**長上下文（long-context）問題**。\n\n這一下就把整章接回了 ch06 那條被講透的因果鏈。你在 ch06 學到：長上下文主要是一道**成本題**，不是演算法題——序列拉長，KV cache 的記憶體與頻寬會脹得很快（這是你那本 AI Infra 書算到底的帳），attention 的計算量也隨序列長度不便宜。誰能把超長序列的訓練／服務成本壓到可規模化，誰就敢把窗口開大。\n\n把這條鏈套到影片上：\n\n```\n影片 = 上百萬 token 的超長序列\n      |\n      v  與「長上下文」是同一種能力（接 ch06）\n能不能原生吃影片 = 能不能負擔超長序列的訓練/服務成本\n      |\n      v  成本由算力結構決定（接 ch06 的 TPU 鏈）\n自研晶片/垂直整合 → 超長序列成本可控 → 敢做原生影片\n      |\n      v\n原生多模態的領先名單，與長上下文的領先名單高度重疊\n```\n\n這就解釋了一個本來看起來像巧合的事實：截至 2026-06，**以原生多模態著稱的 Google**，正好也是**以超長上下文著稱的 Google**（見 ch06）——因為這兩個招牌長在同一條算力鏈上。Gemini 1.5 Pro 早在 2024 年就真的出貨過 200 萬 token 的窗口，Gemini 3.5 Pro 在 2026-05 的 I/O 上把 2M 窗口當頭條企圖（⚠️ 截至 2026-06-09 還沒 GA、沒有獨立 benchmark，當企圖讀不當事實）。能撐起 2M 文字窗口的那套基礎設施，正好就是能原生吃影片所需要的那套。**長上下文與原生影片，是 TPU 垂直整合這同一筆投資的兩個出口。**\n\n反過來看 Meta：Llama 4 Scout 號稱業界最長、達 1,000 萬 token 的上下文窗口，而它同時是 Meta 第一個原生多模態模型——這同樣不是巧合，是同一條「能扛超長序列就能扛影片」的鏈。至於 Mistral，**Mistral Small 4**（2026-03-16，Apache 2.0）把原本分開的 Pixtral（視覺）／Magistral（推理）／Devstral（coding）**折進同一個 119B 的 MoE 模型**——這是「歐洲效率派」（見 ch09）的多模態打法：不拼影片那條最貴的賽道，而是把視覺能力以高效率的方式收進一個小而通用的開放權重模型裡，走「夠用、便宜、開放」的路線。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n把「為什麼原生多模態（尤其原生影片）會領先在少數幾家」這個現象，攤回五變數記分卡：\n\n| 變數 | 主/次 | 為什麼 |\n|---|---|---|\n| **資料** | **✓主因** | 原生多模態要在預訓練就餵入海量「文字＋影像＋音訊＋影片」對齊資料。誰手上有大規模、配對好的多模態語料（如 Google 的 YouTube／Search／影像生態），誰就有東西可餵。沒有這批資料，原生路線根本起不了步。 |\n| 後訓練·對齊 | △次因 | 多模態指令微調、讓模型聽話地描述圖／看影片回答，有貢獻；但它不是「原生 vs 後接」這個架構分野的主因，主因在預訓練怎麼餵與算力扛不扛得住。 |\n| **算力·基礎設施** | **✓主因** | **影片＝超長序列，原生影片＝能負擔超長序列的訓練／服務成本（接 ch06 的 TPU 鏈）。這是本章被講透的因果：自研晶片／垂直整合把超長序列成本壓到可控，才敢做原生影片。長上下文的領先名單與原生多模態的領先名單因此高度重疊。** |\n| 研究文化·品味 | △次因 | 願不願意付「原生重訓」的貴前期成本、而不是走便宜的後接捷徑，是一種研究品味的選擇（Google 的原生取向、Meta 的 early fusion 押注）；但它本身要靠資料與算力兩格才兌現得了。 |\n| **產品取向** | **✓主因** | 使用者要的下一代體驗是影片／語音／裝置端。要餵 Search、YouTube、Workspace、3B 用戶平台這些**本來就是多模態**的產品，會把實驗室硬推向原生多模態——產品形狀把模型的養法壓成多模態。 |\n\n一句話收束：**原生多模態（尤其原生影片）強在少數幾家，因為〔資料＋算力·基礎設施＋產品取向〕三格咬合；影子是更難評測、幻覺更隱蔽、成本更高。**\n\n### (b) 影子\n\n多模態這條戰線的強項，每一個都拖著一道對應的影子——而且這些影子比文字時代更難察覺：\n\n- **評測更難（接 ch04）。** 文字至少還有 MMLU-Pro、GPQA、SWE-bench 這些（雖然會飽和、會污染）相對成熟的尺。多模態的評測**更不成熟、更難驗證**：一個模型「看懂」一張圖、「理解」一段影片到什麼程度，很難用一個乾淨的分數定下來。ch04 對文字 benchmark 的所有警告（污染、過擬合、飽和、刷榜），在多模態這裡只會更嚴重——因為連「正確答案」本身都更主觀、更難建乾淨的測試集。所以任何「某家多模態最強」的宣稱，可信度要打更大的折。\n- **幻覺更隱蔽。** 文字幻覺你還可能讀出破綻；但模型對一張圖、一段影片「自信地說錯」時，**錯誤藏在感知層**，更難抓。它可能無中生有地描述圖裡根本沒有的物件、或把影片裡的因果順序講反，而表面上講得頭頭是道。模態越多，模型能「一本正經胡說」的表面積就越大，而你能查核的工具越少。\n- **成本更高。** 這是 ch06 那條鏈的直接代價：影片是超長序列，原生處理它的訓練與推論成本，比純文字高一個量級。這道帳並非人人算得過來——所以原生影片才會集中在有自研晶片／垂直整合（接 ch16）的少數幾家手上。對沒有那種成本結構的實驗室，硬上原生影片就是燒錢黑洞。這也是為什麼 Mistral 這種效率派，選擇把多模態收進高效率的小 MoE，而不是去拼影片那條最貴的賽道。\n- **接縫風險換成了重訓風險。** 原生路線雖然少了後接的接縫，但它把賭注押在「重訓一個多模態基座」上——而一旦這個基座在某個模態上沒長好，你沒有後接法那種「換掉一個 adapter 就好」的彈性，整個基座的問題會更難局部修。Llama 4 Behemoth（~2T 規模）在 2T 尺度上遇到 MoE 路由／chunked-attention 的麻煩、最終被擱置（見 ch08，⚠️ announced 未出貨），正是原生＋超大規模這條路前期賭注很重的提醒。\n\n### (c) 何時不成立\n\n這個「原生多模態領先」的判斷，在什麼情況會被打臉？\n\n- **被任務打臉**：原生不是對所有多模態任務都更划算。如果你的需求只是「給既有文字模型加個看簡單圖表的能力」，後接法又快又便宜又夠用——這時候付原生重訓的天價反而是過度工程。學界也明說：融合時機沒有單一最優解，視任務而定。「原生通常上限更高」是**就深層跨模態理解這個軸**而言，不是放諸所有場景皆準。\n- **被別家打臉**：後接法在快速進步。視覺編碼器、投影對齊的技巧一直在變強，後接模型在許多實用任務上的差距在縮小。而且「原生 vs 後接」的界線本身在模糊——有些設計是混合的（部分原生、部分後接）。把它看成一個光譜、而不是非黑即白的二分，比較誠實。\n- **被時間打臉**：本章所有版本與狀態都是 **2026-06 的快照**。Gemini 3.5 Pro 的 2M 窗口截至 2026-06-09 還沒 GA、沒有獨立 benchmark（⚠️）；Llama 4 Behemoth 已擱置、Meta 在 2026-04 整個轉向閉源的 Muse Spark（見 ch08，⚠️ 2026 轉折非定局）；各家旗艦版本每幾個月就洗一次牌。三個月後（見 maintenance 重掃）這些十之八九要更新。**穩定的是「影片＝偽裝成長上下文的成本題、原生需要扛得起超長序列的算力結構」這個成因；會過期的是任何一家此刻的具體版本與名次。** 別把任何一個時間點的領先，當成多模態這場仗的終局。\n\n## 紙上推演\n\n### 推演題1 — 翻譯：把「Gemini 多模態強」對應回五變數 **[10 分鐘]** ★★\n\n有人對你說：「Gemini 原生多模態強，就是因為 Google 有 YouTube，影片資料多。」這句話對嗎？把它對應回五變數，指出它**對在哪、漏了什麼最關鍵的一格**。（提示：這題 ch06 出過親戚版，但這次焦點在「原生影片」。）\n\n#### 推演解答\n\n對了一格，漏了並列的一格。YouTube／影像資料確實是真實優勢，對應到**資料**那一格——所以本章把資料記為 ✓主因，沒有留白。但這句話的問題是把資料當成**唯一**主因，漏掉了與它並列、而且常常更卡脖子的一格：**算力·基礎設施**。\n\n關鍵反問：**就算別家也弄得到大量影片資料，他訓練得起、服務得起嗎？** 影片是上百萬 token 的超長序列，吃的是「把超長序列攤開算」的能力，而那回到 ch06 的 TPU 成本結構。所以正確歸因是：資料（✓）讓 Google **有東西可餵**，算力（✓）才讓他**餵得起、用得起**，再加上產品取向（✓，要餵 Search／YouTube 這些本來就多模態的產品）把他**硬推**向原生路線——三格咬合。只講資料，等於把一條三格的因果鏈砍成一格。這正是全書反覆訓練你避免的「單因謬誤」：當一個現象看起來有個很明顯的原因時，先問「還有沒有並列的另一格，少了它這個明顯原因也兌現不了？」\n\n### 推演題2 — 反事實：如果 Google 沒有自研 TPU **[15 分鐘]** ★★\n\n反事實推理：假設 Google 從沒做 TPU，跟所有人一樣跟 NVIDIA 排隊買 GPU、付市場價。它還能不能是「原生多模態（尤其原生影片）最著稱的那家」？把因果鏈倒過來推一遍。\n\n#### 推演解答\n\n很可能不能——至少不會是現在這個樣子。把鏈倒推：原生影片 ← 要負擔上百萬 token 超長序列的訓練／服務成本 ← 而那個成本由算力結構決定。如果 Google 的每一片算力都要跟 NVIDIA 用市場價買、還要排隊，這道「原生吃影片」的成本帳很可能算不過來——它會被逼著做**保守一點的選擇**：要嘛把影片能力做得很受限（短片段、低解析度、只給少數人用），要嘛乾脆走後接法（黏個影像編碼器，省下重訓的天價）。\n\n注意這個反事實漂亮地證明了一件事：**Google 的多模態領先，主因不在「想到了什麼別人想不到的演算法」，而在它的成本結構不一樣**。把 TPU 抽掉，YouTube 的資料優勢還在、研究品味還在，但少了「扛得起超長序列」這一格，原生影片這條最貴的路就走不通——資料與品味會空轉。這也正是 ch06 那條鏈在多模態上的回收：**算力·基礎設施是「能不能做某類模型」的硬約束**，不是錦上添花。\n\n常見誤解：以為抽掉 TPU，Google 還是能靠「資料多」或「人聰明」補回來。補不回來——資料餵不進去、品味實現不了，因為卡住的是**成本**這道硬約束，不是想法。\n\n### 推演題3 — 對帳：你的 canonical schema vs 原生多模態 **[15 分鐘]** ★★\n\n把你當年為結算 pipeline 設計 **canonical schema、讓所有異質來源在進系統那一刻就同源**這個決定，跟「原生多模態（vs 後接 adapter）」放在同一張取捨表上對帳。回報是什麼？前期代價是什麼？兩者結構一不一樣？\n\n#### 推演解答\n\n結構幾乎同構，只是把「異質資料格式」換成了「異質模態」。\n\n- **回報**：兩者都是「同源 → 跨來源／跨模態的推理更深、更不容易在邊界出錯」。你的 canonical schema → 所有來源活在同一語意空間，跨來源對帳／查詢全都順，不用每次先猜「這筆從哪個 adapter 來」；原生多模態 → 文字／影像／影片在預訓練就同源，跨模態的深層對應長進權重深處，不必擠過一道窄投影。回報的**形狀**一樣：同源換來深層整合。\n- **前期代價**：兩者都得付一筆貴的前期設計／訓練成本。你設計 canonical schema → 比臨時加 adapter 貴得多、慢得多；原生多模態 → 要重訓一個多模態基座，比後接黏一層貴一個量級，還賭上「基座沒長好就難局部修」的風險。\n- **影子也同構**：後接法（adapter）的影子是接縫越多越脆、核心沒真懂來源；原生法（schema）的影子是前期重投資、且一旦基座／schema 設計失誤，牽一髮動全身（對應 Llama 4 Behemoth 在 2T 尺度擱置的教訓）。\n\n差異只在尺度與可逆性：你的 schema 改起來還算可控；一個多模態預訓練基座一旦長歪，重來的代價是幾千萬美金級的。但「後接 adapter 求快 vs 原生統一求深」的取捨邏輯，從你的結算 pipeline 一路同構到一個前沿多模態模型。能看出這個同構，你就把「原生 vs 後接」這個架構分野真正讀懂了——它不是 ML 的玄學，是你每天在做的那道工程判斷，放大到了模態的尺度。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼說「多模態是**下一個**戰場」？這個「下一個」跟 ch04 的「文字 benchmark 飽和」有什麼因果關係？（如果文字沒飽和，多模態還會這麼快變主戰場嗎？）\n2. 用你結算 pipeline 的 canonical schema vs adapter 來解釋「原生多模態 vs 後接多模態」的差別。那道「接縫」在多模態裡具體是什麼？\n3. 為什麼說「影片是一個偽裝成多模態問題的長上下文問題」？這句話怎麼把整章接回 ch06 的 TPU 因果鏈？\n4. 為什麼「原生多模態的領先名單」會跟「長上下文的領先名單」高度重疊？這是巧合嗎，還是同一筆投資的兩個出口？\n5. 如果一家實驗室沒有自研晶片／垂直整合的成本結構，它「硬上原生影片」會發生什麼？Mistral 為什麼選擇不拼影片那條賽道？\n6. 多模態的三個影子（評測更難、幻覺更隱蔽、成本更高）裡，哪一個最容易被「某家多模態最強」的行銷話術掩蓋？為什麼這個影子讓 ch04 的警告變得更嚴重？\n7. 「原生一定贏」這句話哪裡不精確？在什麼任務上，後接法反而是正確的工程取捨？\n8. 為什麼本章堅持把所有版本（Gemini 3.5 的 2M、Llama 4 Behemoth）標成「快照／企圖／已擱置」，而不是當成既成事實？這跟全書「沒有絕對排名」的紀律是同一回事嗎？\n\n## 延伸閱讀\n\n- **The Llama 4 herd: native multimodal MoE**（ai.meta.com/blog/llama-4-multimodal-intelligence）——Meta 官方介紹 Llama 4 的 **early fusion** 與原生多模態、Scout 的 10M token 窗口；讀「early fusion 讓未標註的文字＋影像＋影片能一起預訓練」那段，理解「原生」在工程上到底指什麼，並對照 ch08 看它為何同時是 Meta 第一個 MoE。\n- **Gemini: A Family of Highly Capable Multimodal Models**（Gemini 技術報告，storage.googleapis.com/deepmind-media）——Google 官方說明「所有模態表示成同一 token 流、聯合預訓練」；讀架構那節，理解「原生」最標竿的範例長什麼樣，並接回 ch06 的長上下文鏈。\n- **Introducing Mistral Small 4**（mistral.ai/news/mistral-small-4 ／ Simon Willison 的整理）——看「歐洲效率派」怎麼把 Pixtral（視覺）／Magistral（推理）／Devstral（coding）折進一個 Apache 2.0 的 119B MoE；對照本章「不拼影片、把多模態收進高效率小模型」的影子讀（見 ch09）。\n- **ch06（本書）Google DeepMind：長上下文與 TPU 垂直整合**——本章的算力因果鏈是 ch06 的延伸；想真正讀懂「影片＝長上下文＝成本題」，回頭把 ch06 那條「自研 TPU → 超長序列成本可控」的鏈重看一遍。\n- **你書架上的《從後端到 AI Infra》——KV cache 與長序列成本那一章**——本章「影片＝上百萬 token 超長序列」的成本直覺，根在你那本書把 KV cache 隨序列長度脹大的帳算到底的那一段。多模態的算力門檻，本質上是那筆帳乘上影片的序列長度。\n"}, {"id": "ch18-data-underground", "file": "ch18-data-underground.md", "group": "Part III — 跨家主題（差異的橫切面）", "title": "ch18 — 資料暗河：版權、合成資料與資料牆", "md": "# ch18 — 資料暗河：版權、合成資料與資料牆\n\n> **本章解決什麼問題**：五變數記分卡的第一格——**資料**——是全書最不透明、卻可能最有決定性的一格。前面拆各家時，「資料」常常只能含糊帶過（「中文資料強」「即時語料」），因為**沒有一家公開自己的資料配比**——那是各家最深的祕密。這一章不去猜各家具體餵了什麼（多半不可考，我們會誠實標未知），而是揭開籠罩在這一格上的三條暗河：**版權訴訟**（NYT v. OpenAI 正在進行、後果嚴重）、**資料牆**（高品質公開人類文字快被抓完，時間點大約就是現在）、與**合成資料**（主要的應對手段，但有模型崩塌的回授風險）。本章的招牌個案是一條把全書串起來的因果鏈：**資料牆 ＋ 版權擠壓，逼著各家不再只是「多抓一點網路文字」，而是轉向可驗證獎勵的 RL（接 ch14／ch15）、合成資料、與專有用戶資料**——這正是為什麼推理模型偏愛數學與程式碼、為什麼 Meta 的 Muse Spark 要押自家用戶資料（接 ch08）。資料這一格的不透明，本身就是一種護城河。\n\n## 從你已知的出發\n\n你做過一件事，剛好是讀懂這一章最好的鑰匙：**流量整形與取樣策略**。\n\n你那條自建的 **FluentBit pipeline**，每天吞進海量的 log。你很清楚一件事：你**不會**把所有 log 都原封不動全量送進下游——那既貴又會把真正重要的訊號淹掉。你會做取樣、做整形、做過濾：把高價值的事件（錯誤、慢查詢、結算相關）留得密一點，把低價值的雜訊降頻甚至丟掉。你餵給監控系統與分析管線的，是一份**被你精心配比過的資料**，不是原始的全量。而這份配比，**直接決定了下游能看見什麼、學會偵測什麼**。配比錯了——比如把某類錯誤 log 取樣掉了——下游就對那類故障「失明」，再聰明的告警規則都救不回來。\n\n訓練一個大模型的「資料配比」，本質上就是這件事，放大到網路規模。沒有人把「整個網際網路」原封不動倒進模型。每一家都在做你那套流量整形的超大號版本：哪些來源權重高（高品質書籍、論文、精選程式碼）、哪些降權（農場內容、垃圾網頁）、哪些要去重、哪些要清洗、要不要混入合成資料、混多少。**你餵系統什麼，決定它學會什麼**——這句話在你的 pipeline 是運維常識，在訓練一個前沿模型則是各家**最不肯說**的祕密。\n\n這一章要講的，就是當「原始素材」這條河開始**枯竭**（資料牆）、又開始**有人來收過路費**（版權訴訟）時，各家被逼著去哪裡找新的水源——以及那些新水源各自的影子。\n\n## 資料這一格，為什麼是全書最黑的箱子\n\n先把這一章的前提講清楚：**資料是五變數裡最不透明的一格。**\n\n回想前面幾章。算力你還能估個數量級（GPU/TPU 數量級雖然⚠️不確定，但叢集是實體、會洩漏、能被衛星拍到）；後訓練方法各家會發論文（RLHF、Constitutional AI、GRPO 的歸屬都查得到，見 ch15）；架構更是公開的（同一張藍圖，ch01）。唯獨**資料配比**——餵了什麼、各來源占比多少、怎麼清洗、混了多少合成資料——幾乎**沒有一家完整公開**。\n\n為什麼？三個疊在一起的理由：\n\n- **法律理由**：你越精確地說「我用了什麼」，就越可能在版權訴訟裡把證據遞到原告手上（下一節就會看到 NYT 案如何逼 OpenAI 交出資料）。\n- **競爭理由**：資料配比是真正難抄的護城河之一。架構一發論文全世界隔週就會，但「我們花了三年清洗、配比、去重出來的這份資料」，別人抄不走（這是 ch20「為什麼差異會持續」的伏筆）。\n- **驗證理由**：就算一家宣稱「我們資料品質最好」，**外界幾乎無法驗證**——你看不到他們的訓練集，只能從模型行為反推。這讓「資料優勢」變成一種**難以證偽**的主張。\n\n> 對你的直覺：這就像一個你完全拿不到原始碼、也拿不到輸入資料的黑箱服務。你只能對著它的輸出做行為觀測，去**反推**它內部餵了什麼——但你永遠無法確認。本章談各家資料時的所有「據說」「應該」，都帶著這層不確定性。**誠實標未知，比假裝知道更接近真相。**\n\n所以這一章刻意**不**去逐家拆「OpenAI 用了什麼、Google 用了什麼」——那多半是猜測。我們改去拆三件**看得見**的事：版權的河收費了、原始的河快乾了、各家正在挖哪些新水源。\n\n## 第一條暗河：版權訴訟——有人來收過路費了\n\n截至 2026-06，**版權訴訟是真實、且後果嚴重的**——不是還在喊話的階段，是已經影響到產業實際行為的階段。最有代表性的個案是 **NYT v. OpenAI/Microsoft**。\n\n把它釘在時間軸上（✅ 主幹事實有一手與多方二手佐證）：\n\n- ✅ **2023-12**：《紐約時報》在紐約南區法院（SDNY）控告 OpenAI 與 Microsoft 侵犯著作權，主張它們未經授權把時報的文章拿去訓練模型。\n- ✅ **核心侵權主張被法官「放行」、沒有被駁回**：2025 年初，法官裁定核心的侵權主張可以繼續審理（而非如被告所願地早早駁回）。這一步很關鍵——它意味著「拿受著作權保護的內容訓練算不算合理使用（fair use）」這個大哉問，將被**實質審理**，而不是程序上被擋掉。\n- ✅ **2026-01**：在證據開示（discovery）階段，OpenAI 被**強制要求交出約 2,000 萬筆匿名化的 ChatGPT 對話紀錄**給原告。OpenAI 抗辯這「負擔過重、且有洩漏用戶資料風險」，提議只搜尋與原告作品相關的對話，但法官裁定隱私保護措施已足夠，原告可拿到完整的 2,000 萬筆。\n- ⚠️ **但——截至 2026-06，本案尚無對「實體爭點（merits）」的最終判決**。也就是說：「用受版權保護的資料訓練到底合不合法」這個根本問題，**還沒有定論**。這是一個進行中、隨時可能因和解或判決而轉向的案子（maintenance 重掃要盯）。\n\n而且這不是孤例。✅ 在 SDNY，多起類似案件已被併成一個 **MDL（multidistrict litigation，多區訴訟）**集中審理，整合了**十六起**著作權訴訟；原告涵蓋新聞機構、書籍作者、音樂出版商等。整個產業面對的，不是一場官司，是**一整片**版權主張的浪潮。\n\n這對「資料」這一格的衝擊是結構性的。先看影子：\n\n- **不確定性本身就是成本。** 就算最後判決對 AI 公司有利，「在判決出來前的這幾年」每一家都得在**法律陰影**下做資料決策——這會讓它們更傾向於「能證明來源乾淨」的資料（授權來的、自家產生的、合成的），而不是「來路不明的全網抓取」。\n- **交出 2,000 萬筆對話**這件事本身，就示範了一個讓所有人不安的先例：**你以為匿名、私密的對話，可能在訴訟中被強制揭露**。這對「用戶資料當訓練燃料」這條路（下面會談），投下一道隱憂。\n\n> 用你的話講：這就像你一直免費用一個第三方的開放資料源餵你的系統，某天對方突然主張「你用了我的東西、要付費、還要交出你的使用紀錄證明你怎麼用的」。就算你最後贏了官司，**在不確定的這段期間，你理性的做法是開始尋找「來源乾淨、自己能掌控」的替代資料源**——哪怕它更貴、更難取得。版權訴訟對整個產業做的，就是這件事：它不必勝訴，光是存在，就把各家推向別的水源。\n\n## 第二條暗河：資料牆——原始的河快乾了\n\n第二件看得見的事，是**高品質公開人類文字快被抓完了**。這個憂慮有個名字：**資料牆（data wall）**。\n\n✅ 最被廣泛引用的來源是 **Epoch AI** 的研究（《Will we run out of data?》）：它推算，**高品質的公開人類文字資料存量，可能在大約 2026–2028 年間被耗盡**。注意這個時間點——**大約就是現在**。⚠️ 這是一個帶不確定性的推估（Epoch 自己的信賴區間把「資料用完」的窗口放在約 2026–2032，且後來把前緣從 2026 微調到 2028），不是一個精準的日期；但「方向是真的、時間點大致就在當下」這件事，產業已經當真。\n\n要直覺地理解這道牆，先想清楚一件事：**不是「字」用完了，是「高品質、沒被用過、有版權清白的字」用完了。** 網路上每天還在產生海量文字，但其中：\n\n- 越來越大一部分**本身就是 AI 生成的**（這會帶來下面要談的合成資料回授問題）；\n- 大量是低品質的農場內容、重複、垃圾；\n- 高品質的部分（精選書籍、優質論壇、專業論文、乾淨程式碼）**數量有限**，而且**正被版權訴訟一塊塊圈起來收費**。\n\n把這兩條暗河疊起來看，因果就清楚了：✅ **資料牆**讓「能抓的高品質文字」在**數量**上逼近上限；✅ **版權訴訟**讓「敢抓、能合法抓的」在**範圍**上被擠壓。一個是水量變少，一個是越來越多的河段被圍起來收費。兩者合力，把「再多抓一點網路文字」這條過去十年最管用的老路，**逼到了盡頭**。\n\n這就帶出全書一個關鍵的「為什麼」：**當原始素材這條路走不通，各家被逼著去哪裡找新的水源？** 答案有三條，而它們恰好解釋了前面幾章看到的許多現象。\n\n## 第三條暗河：合成資料——自己造水，但小心回授\n\n最主要的應對，是**合成資料（synthetic data）**：不再只靠抓人類寫的東西，而是**讓模型自己（或讓更強的模型）生成訓練資料**。\n\n直覺上這像是無限水源——模型可以生成無窮多的文字，資料牆不就破了嗎？這正是本章「找破綻」要拆的迷思。合成資料**不是**無限免費的，它有一個很深的陷阱：**模型崩塌（model collapse）**。\n\n✅ 2024 年發表於《Nature》的 Shumailov 等人研究（〈AI models collapse when trained on recursively generated data〉）給了這個現象一個清楚的論證：**當你一代一代地拿「上一代模型生成的資料」去訓練下一代，誤差會跨世代累積、複利式放大**，模型逐漸喪失生成多樣、高品質輸出的能力——尾端的稀有事件先被遺忘，分布越縮越窄，最後「崩塌」成貧乏、重複的輸出。\n\n> 對你的直覺：這就是你最熟的**回授迴路（feedback loop）失控**。想像你的監控系統不再看真實流量，而是看「自己上一輪生成的合成流量」來調整取樣策略——第一輪也許還行，但每一輪的小偏差都會被下一輪當成真相吸收、再放大，幾輪之後你的系統就活在一個跟真實世界越離越遠的幻覺裡。**用自己的輸出餵自己，誤差不會被沖淡，只會被複利。** 這跟你做冪等消費者時最怕的「錯誤狀態被反覆消費、越滾越大」是同一種恐懼。\n\n但這裡有一個**至關重要的轉折**，它正是把本章和 ch14／ch15 串起來的關鍵：**合成資料的崩塌風險，在不同領域差很多。**\n\n- **難驗證的領域**（創意寫作、開放式對話、假設生成、品味判斷）——**最危險**。因為「好不好」沒有客觀標準，模型的偏差無法被外部訊號糾正，回授迴路裡沒有煞車，誤差會一路複利下去。\n- **可驗證的領域**（數學、程式碼）——**安全得多**。因為這裡有**客觀的對錯**：數學答案可以驗算、程式碼可以編譯執行、單元測試可以跑。你可以讓模型生成海量的題目與解答，然後**只保留那些被客觀驗證為正確的**，把錯的丟掉。這等於在回授迴路裡裝了一個煞車——合成資料不會無限漂移，因為每一筆都被現實（編譯器、驗算）校準過。\n\n**這就是為什麼推理模型偏愛數學與程式碼。** 把這條鏈接回 ch14（推理模型競賽）與 ch15（對齊演化）：**可驗證獎勵的強化學習（RLVR）**之所以成為推理時代的核心，一個深層的理由就在這裡——當你想用合成資料／自我生成的資料來訓練，**只有在「答案能被客觀驗證」的領域，你才躲得開模型崩塌**。數學、程式碼有編譯器與驗算當裁判，所以可以放心地大量生成、自我訓練、用 GRPO 那種可驗證獎勵去 RL（見 ch11、ch15）；而創意寫作沒有這樣的裁判，所以這條路在那裡走不遠。\n\n把這條因果鏈完整地畫出來——這是本章要講透的招牌個案：\n\n```\n資料牆（高品質公開文字 ~2026-2028 耗盡）\n   +  版權擠壓（NYT 等訴訟，來路不明的抓取有法律風險）\n        |\n        v   「再多抓一點網路文字」這條老路走到盡頭\n各家被逼著找新水源，主要三條：\n   |\n   +-- (1) 合成資料：自己生成\n   |         |\n   |         +-- 難驗證領域（創意/開放對話）→ 模型崩塌風險（回授複利）→ 走不遠\n   |         +-- 可驗證領域（數學/程式碼）→ 有客觀裁判當煞車 → 安全\n   |                   |\n   |                   v  這就是為什麼……\n   |         推理模型偏愛數學/程式碼、各家轉向 RLVR（接 ch14/ch15）\n   |\n   +-- (2) 專有用戶資料：自家平台獨有、別人抓不到、版權清白\n   |         例：Meta Muse Spark 押 3B 用戶平台資料（接 ch08）\n   |              xAI 押 X 即時語料（接 ch10）\n   |\n   +-- (3) 授權資料：付錢買乾淨來源（新聞、出版、論壇授權）\n```\n\n注意這條鏈的反直覺收束：**過去十年「資料多」幾乎等於「網路抓得多」；資料牆與版權訴訟一起，把這個等式打破了。** 從 2026 往後，資料優勢越來越不是「誰抓得多」，而是「誰有別人拿不到的水源」——**可驗證的自我生成迴路、獨有的用戶資料、買得到的乾淨授權**。這三條，恰好解釋了前面好幾章看似不相關的選擇。\n\n## 第二條與第三條的交會：專有用戶資料\n\n第二條新水源——**專有用戶資料（proprietary user data）**——值得單獨點一下，因為它把這一章和 ch08（Meta）直接接起來。\n\n當公開資料這條河又乾又被收費，**「我平台獨有、別人根本抓不到」的資料**就變成稀缺資產。它有三個迷人的性質：別家**抓不到**（不在公開網路上）、版權上**相對清白**（是自家平台產生的）、而且**源源不絕**（用戶每天還在生產）。\n\n- ✅ **Meta 的 Muse Spark**（2026-04 推出的首個閉源前沿模型，見 ch08）**明確地押在專有用戶資料上**。回想 ch08 講的轉向邏輯：Meta 從開放權重轉向閉源，理由之一就是它坐擁 FB／IG／WhatsApp 約 30 億用戶的平台，這份**獨有資料**是它在資料牆時代最值錢的籌碼——而你要靠這份資料變現、建護城河，閉源比開放更合理。資料牆，正是理解 Meta 這個轉向的一塊關鍵拼圖。\n- ✅ **xAI 押 X 的即時語料**（見 ch10）也是同一個邏輯的變體：別家要靠外接工具才拿得到的即時資訊，Grok 透過自有平台原生取得。這是「專有資料」的另一種形態——不只是「別人沒有」，還是「即時、會持續更新」。\n\n⚠️ 但要誠實標未知：**各家到底用了多少自家用戶資料、怎麼用、是否取得用戶同意**，多半**不透明**，且涉及隱私爭議（還記得 NYT 案逼出 2,000 萬筆對話那一幕嗎？專有用戶資料這條路，本身就坐在隱私與法律的火山口上）。我們能確定的是「方向」——各家正轉向專有資料；具體配比，仍是黑箱。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n本章是一個**主題章**，拆的不是某一家，而是「資料這一格的當代擠壓如何反過來重塑了其他幾格」。所以歸因的重點是：**資料是主因（壓力源），但它的壓力externalize 到了後訓練與產品兩格**。\n\n| 變數 | 主/次 | 為什麼 |\n|---|---|---|\n| **資料** | **✓主因（壓力源）** | **本章整個現象的核心。資料牆（高品質公開文字 ~2026–2028 耗盡）＋版權訴訟（NYT 等），讓「多抓網路文字」這條老路走到盡頭——這是逼出後面所有轉向的根因。資料這一格的擠壓，就是這一章。** |\n| **後訓練·對齊** | **✓主因（被逼出的應對）** | **資料牆把各家逼向合成資料；而合成資料的模型崩塌風險，又把它們逼向「只在可驗證領域大膽用」——這直接解釋了為什麼推理時代轉向 RLVR／可驗證獎勵（接 ch14／ch15）。資料的短缺，是 RLVR 興起的一個深層推力。** |\n| 算力·基礎設施 | △次因 | 合成資料生成、用可驗證獎勵跑 RL，都要燒大量算力；「資料牆之後，算力部分地替資料扛起了能力成長的擔子」——但它是應對手段的成本，不是現象的成因。 |\n| 研究文化·品味 | △次因 | 「該冒險用合成資料到什麼程度、在哪些領域用」是高度依賴研究品味的判斷；願不願意、敢不敢在難驗證領域用合成資料，各家取向不同。是次因。 |\n| **產品取向** | **✓主因（被逼出的護城河）** | **資料牆讓「自家平台獨有的用戶資料」變成稀缺護城河——這直接解釋了 Meta（Muse Spark 押 3B 用戶平台，接 ch08）、xAI（X 即時語料，接 ch10）的選擇。產品決定了你坐擁哪條專有資料河。** |\n\n> 註：這一章的歸因形態和 company 章不同——它的因果是「**資料（主因）施壓 → 強迫後訓練與產品兩格做出特定的應對動作**」。資料不是某一家的強項，而是**整個產業共同面對的約束**；各家的差異，在於它們被這個約束逼向了哪條新水源（合成/RLVR、專有用戶資料、授權）。\n\n一句話收束：**這一章的現象（各家集體轉向合成資料、RLVR、專有用戶資料）強在它是對資料約束的理性應對，因為〔資料牆＋版權擠壓（主因）→ 後訓練轉向可驗證獎勵 ＋ 產品轉向專有資料護城河〕；影子是合成資料的回授崩塌風險、法律的長期不確定性，以及「資料優勢」這件事本身極難從外部驗證。**\n\n### (b) 影子\n\n讓各家在資料牆時代得以續命的這些選擇，同時也讓它們暴露在三個地方：\n\n- **合成資料的回授崩塌風險，是一把懸在頭上的刀。** 可驗證領域（數學/程式碼）有煞車，但模型的能力**不只**是數學與程式碼。當各家越來越依賴自我生成的資料，在那些**難驗證**的維度（語言的細膩、文化的廣度、罕見知識、創意的多樣性）上，回授迴路裡**沒有煞車**——誤差會悄悄複利，而且**很難被察覺**，因為崩塌先吃掉的是分布的尾端（稀有但重要的東西）。這正是你最怕的那種故障：不是大聲崩潰，是**安靜地、漸進地退化**，等你發現時已經滾了好幾代。\n- **法律的不確定性是一道長期陰影。** NYT 案截至 2026-06 還沒有實體判決——這意味著**整個產業的資料策略，建立在一個尚未落地的法律前提上**。如果某天判決對 AI 公司大幅不利，回溯效力可能撼動所有「用公開抓取資料訓練」的模型。各家轉向專有與授權資料，一部分正是在**對沖**這個尾部風險——但對沖不等於免疫。\n- **「資料優勢」是五變數裡最難驗證的一格，這本身就是風險。** 一家可以宣稱「我們資料品質最好、配比最聰明」，但外界**幾乎無法證偽**——你看不到訓練集。這讓「資料」既是真實的護城河，也是最容易被**當成行銷話術**的一格。當一個優勢無法被外部檢驗，你就無法分辨它是真實的結構性領先，還是講得好聽的故事（這個「無法驗證」的主題，會在 ch19 的「安全也可能是行銷」再出現）。\n\n### (c) 何時不成立\n\n這一章描述的「資料牆 → 集體轉向」的圖像，會在什麼情況下被打臉？\n\n- **被新資料源打臉**：「高品質公開文字快用完」說的是**文字**。但多模態（見 ch17）打開了影像、音訊、影片這些**遠未被抓完**的巨大資料池；具身/機器人資料、科學儀器資料、模擬環境生成的資料，也都是文字之外的新水源。如果能力成長能順利轉移到這些模態，「資料牆」可能只是**文字這一條河**的牆，不是整片資料的盡頭。Stanford 的 Fei-Fei Li 等人就持類似的樂觀看法：還有大量差異化資料尚待開採。\n- **被合成資料的進步打臉**：模型崩塌是「**無差別**地用合成資料」的後果。如果「篩選乾淨的合成資料 ＋ 保留真實資料錨點 ＋ 只在可驗證領域大膽用」這套方法持續成熟，合成資料的天花板可能比 2024 年那篇 Nature 論文的悲觀情境高得多。「合成資料一定導致崩塌」是一個**過度簡化**的讀法（這也是下面推演題要拆的）。\n- **被時間與判決打臉**：這是全書最該標日期戳的主題之一。NYT 案隨時可能和解或判決；Epoch 的資料牆時間窗（~2026–2032）本身就是估計、會被修正；各家的資料策略每年都在變。本章所有具體事實都是 **2026-06 的快照**。穩定的是「**資料是最不透明、且正被版權與枯竭兩面擠壓**」這個**結構**，以及「合成資料的安全性取決於該領域可不可驗證」這個**判準**；會過期的是任何一個具體的訴訟進度、時間點、與各家當下的配比。\n\n## 紙上推演\n\n### 推演題1 — 找破綻：「合成資料無限供應，資料牆是假議題」 **[15 分鐘]** ★★★\n\n有人在群組裡說：「資料牆根本是假議題。模型可以自己生成無限多的訓練資料，要多少有多少，哪來的牆？」請你用 90 秒，**不否定**合成資料的真實價值、但精準指出這句話的破綻在哪。\n\n#### 推演解答\n\n完整的拆法分三刀：\n\n1. **回授刀（合成不是免費的午餐）**：合成資料不是無限免費，它有**模型崩塌**風險（Nature 2024, Shumailov et al.）。一代一代拿自己的輸出餵下一代，誤差會**跨世代複利放大**，分布越縮越窄、尾端先被遺忘。把它對應回你的回授迴路直覺：用自己的輸出餵自己，偏差不會被沖淡，只會被滾大。所以「無限供應」這個前提就站不住——你能生成無限的**量**，但保不住無限的**品質與多樣性**。\n\n2. **領域刀（崩塌風險不均勻）**：但也別翻案翻過頭——合成資料**在可驗證領域（數學/程式碼）其實相當安全**，因為有客觀裁判（編譯器、驗算）當煞車，可以只保留被驗證為正確的樣本。危險的是**難驗證領域**（創意寫作、開放對話），那裡沒有煞車。所以正確的判準不是「合成資料行不行」，而是「**這個領域可不可驗證**」。\n\n3. **串接刀（這正解釋了一個全書現象）**：把這一刀接上 ch14／ch15——**正是因為合成資料只在可驗證領域安全，推理模型才偏愛數學與程式碼、各家才轉向 RLVR（可驗證獎勵的 RL）**。資料牆與合成資料的崩塌風險，是 RLVR 興起的一個深層推力。能講出這條串接，才算真的讀懂。\n\n**收尾要校準、不要翻案**：合成資料是資料牆時代的**真實主力應對手段**，不是假的；崩塌風險也是真的。正確姿態是「**它在可驗證領域是強力工具、在難驗證領域是危險陷阱**」，而不是非黑即白的「合成資料萬能」或「合成資料必崩」。\n\n常見誤解：一種是天真地以為「能生成 = 能無限訓練」（忽略崩塌）；另一種是聽到「模型崩塌」就全盤否定合成資料（忽略可驗證領域的煞車）。兩種都沒讀懂——關鍵永遠是「**可不可驗證**」這條線。\n\n### 推演題2 — 翻譯：把「資料配比」對應回你的流量整形 **[10 分鐘]** ★★\n\n不准用 ML 術語，把「訓練資料配比」這件事，對應回你維運過的一個**具體**決定，並說出「配比錯了會怎樣」。\n\n#### 推演解答\n\n最貼的對應是你那條 **FluentBit pipeline 的取樣與整形策略**。你不會把全量 log 原封不動倒進下游——你做取樣、降頻、過濾、加權：高價值事件（錯誤、慢查詢、結算相關）留密一點，低價值雜訊降頻或丟掉。**這份配比直接決定下游能看見什麼、學會偵測什麼。**\n\n訓練資料配比是同一回事放大到網路規模：哪些來源加權（精選書籍、論文、乾淨程式碼）、哪些降權（農場內容、垃圾頁）、要不要混合成資料、混多少。\n\n**配比錯了會怎樣？** 在你的 pipeline，如果把某類錯誤 log 取樣掉了，下游就對那類故障「失明」——再聰明的告警都救不回，因為它根本沒見過那類訊號。在訓練，同理：如果某種語言、某類知識、某種風格在配比裡被壓得太低（或被版權訴訟逼著整批拿掉、或被合成資料稀釋），模型就會在那一塊「先天不足」，而且**這種不足很難從外部察覺**——因為你看不到它的訓練集，只能等它在那個維度上露出破綻。\n\n關鍵反問（檢驗你真懂）：為什麼「資料配比」是各家最不肯說的祕密、卻又最難被外界驗證？因為它同時是**最難抄的護城河**（別人抄不走你三年清洗配比的成果）、又是**法律上最敏感的證據**（說清楚你用了什麼=把版權訴訟的子彈遞給對方）、還是**最難證偽的主張**（外界看不到你的訓練集，只能反推）。這三性質疊起來，就是為什麼「資料」是五變數裡最黑的箱子。\n\n### 推演題3 — 對帳：資料牆把能力成長的擔子，挪到了哪幾格？ **[12 分鐘]** ★★★\n\n過去十年，模型能力的成長很大程度靠「資料 × 算力一起放大」（Chinchilla 那條規則，見 ch02）。現在「資料」這條腿撞牆了。請你像做系統容量規劃一樣，說出：當一個資源觸頂時，負載會被挪到哪裡？對應到這一章，是哪幾格在替「資料」扛擔子？\n\n#### 推演解答\n\n這題要把你做**容量規劃／瓶頸轉移**的直覺用上。你很熟一件事：當系統某個資源觸頂（比如 RDS CPU 撞到 100%），負載不會憑空消失，它會被**挪去別的地方**——你會加快取、改架構、把計算移到別層。瓶頸轉移，不是瓶頸消失。\n\n資料牆就是「資料」這個資源觸頂。能力成長的擔子被挪到三處：\n\n1. **挪到「後訓練·對齊」格**：與其靠更多**新的人類資料**長能力，改靠**更聰明地壓榨既有資料 ＋ 可驗證的自我生成資料**——這就是推理時代轉向 RLVR、test-time compute 的一部分動力（接 ch14/ch15）。用「想得更久、用可驗證獎勵自我練」部分替代了「餵更多新資料」。\n2. **挪到「算力·基礎設施」格**：生成合成資料、跑可驗證獎勵的 RL、做更精細的資料清洗與配比，都要燒更多算力。一定程度上，**算力替資料扛起了能力成長的一部分擔子**——這也是為什麼資料牆的時代，算力軍備反而更兇（接 ch16）。\n3. **挪到「產品取向」格**：能力成長的新燃料之一變成「**你平台獨有的專有資料**」——這把競爭的一部分從「誰演算法好」挪回「誰坐擁獨有資料河」（Meta、xAI 的例子）。\n\n關鍵洞察（檢驗你真懂）：**資料牆不是「能力成長停止」，是「能力成長的成本結構改變」。** 過去「多抓資料」相對便宜，現在這條便宜的路堵了，能力成長被迫挪到更貴、更難、更依賴專有資產的路上去。這正是為什麼 ch20 會說：資料牆之後，差異可能更取決於那些**難擴散**的東西（專有資料、算力、研究品味），而不是那些容易抄的（架構、訓練法）。\n\n常見誤解：把資料牆讀成「AI 要停滯了」。更準的讀法是「**成長的瓶頸從『抓資料』換成了『生成可驗證的資料 ＋ 燒算力 ＋ 圈專有資料』**」——擔子被挪走了，沒有消失，但路變貴了。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼說「資料」是五變數裡**最不透明**的一格？把那三個理由（法律／競爭／驗證）各講一句，並說出它跟「算力」這種能估數量級的格子差在哪。\n2. NYT v. OpenAI 案裡，「**核心侵權主張被放行、沒被駁回**」和「**2026-01 被強制交出 2,000 萬筆對話**」各代表什麼？為什麼要特別強調「**截至 2026-06 還沒有實體最終判決**」？\n3. 「資料牆」說的是什麼用完了？為什麼不是「字用完了」？資料牆（枯竭）和版權訴訟（圈地收費）這兩條暗河，**怎麼合力**把「多抓網路文字」這條老路逼到盡頭？\n4. 合成資料聽起來像無限水源，它的陷阱（模型崩塌）是什麼？用你的「回授迴路失控」直覺講一遍：為什麼用自己的輸出餵自己，誤差會**複利**而不是被沖淡？\n5. **為什麼合成資料在數學/程式碼安全、在創意寫作危險？** 這條判準（可不可驗證）怎麼直接解釋了「推理模型偏愛數學/程式碼、各家轉向 RLVR」（接 ch14/ch15）？這是本章最該講透的一條鏈。\n6. 為什麼「專有用戶資料」在資料牆時代變成稀缺護城河？它的三個迷人性質（別人抓不到／版權相對清白／源源不絕）怎麼解釋 Meta 押 Muse Spark、xAI 押 X 語料（接 ch08/ch10）？它的影子（隱私火山口）是什麼？\n7. 如果有人說「資料牆是假議題，合成資料無限供應」，你怎麼**既不否定合成資料、又指出破綻**？「校準」和「翻案」在這題差在哪？\n8. 「資料優勢難以驗證」為什麼**本身**就是一種風險？它跟 ch19 要談的「安全也可能是行銷」是同一種問題嗎——當一個優勢無法被外部證偽時，你怎麼分辨它是真領先還是好故事？\n\n## 延伸閱讀\n\n- **Epoch AI — Will we run out of data?（《Will we run out of data? Limits of LLM scaling based on human-generated data》）**——「資料牆」的**原始推估**。讀它怎麼算出「高品質公開人類文字 ~2026–2028 耗盡」的信賴區間，以及為什麼「compute-optimal 訓練」與「overtrained」會改變這個時間點——這是把資料牆從口號變成可檢驗推估的一手來源。\n- **Shumailov et al. 2024, \"AI models collapse when trained on recursively generated data\"（Nature）**——**模型崩塌**的權威論證。讀它怎麼拆解「誤差跨世代複利」的三個來源，理解為什麼合成資料的回授迴路在難驗證領域沒有煞車——這是推演題1的理論底。\n- **Harvard Law Review — NYT v. OpenAI 評析**——把版權訴訟的法律爭點（合理使用、核心主張為何被放行）講清楚的可信整理。讀「為什麼核心侵權主張沒被駁回」那段，理解這案為什麼後果嚴重。\n- **OpenAI 被令交出 2,000 萬筆 ChatGPT 紀錄（natlawreview / Jones Walker 2026 法律評析）**——2026-01 證據開示裁定的同期記錄。讀它對「隱私 vs 證據相關性」的權衡，體會「專有用戶資料這條路坐在法律火山口上」是什麼意思。\n- **DeepSeek-R1 論文（arXiv:2501.12948）**——對照本章讀：R1 用**可驗證獎勵 ＋ GRPO** 在數學/程式碼上自我練出推理能力，正是「合成/自我生成資料只在可驗證領域安全」這條判準的活生生案例（細節見 ch11/ch15）。\n- **Meta — Introducing Muse Spark（about.fb.com, 2026-04）**——對照本章讀：Meta 轉閉源、押**專有用戶資料**的官方敘事。把它跟「資料牆讓專有資料變稀缺護城河」這條因果放一起看，ch08 的轉向就多了一塊拼圖。\n"}, {"id": "ch19-interpretability", "file": "ch19-interpretability.md", "group": "Part III — 跨家主題（差異的橫切面）", "title": "ch19 — 我們造出看不懂的東西：可解釋性與安全", "md": "# ch19 — 我們造出看不懂的東西：可解釋性與安全\n\n> **本章解決什麼問題**：這是全書最 sci-fi 的一個橫切面。前面十八章，我們一直說「模型是**養**出來的、不是**寫**出來的」（ch02）——這一章要把這句話最反直覺的後果攤開來講清楚：**一個訓練完的前沿模型，內部在算什麼，連造出它的人都不完全看得懂。** 沒有原始碼、沒有「遇到 X 就回 Y」的規則，只有幾千億個浮點數。本章回答三件事：(1) 為什麼會這樣——能力是長出來的，所以沒有可讀的源碼；(2) 各家拿什麼去面對這個黑箱——**可解釋性（interpretability，「模型的神經科學」）、red-teaming、evals/安全研究**，而且這是一個**整個產業共同在做的研究領域**，不是某一家的專利；(3) 各家在「安全 vs 速度／開放」上的取向差異——**講取捨，不褒貶**。Anthropic 這一家在可解釋性上的個別故事已在 ch07 講過，本章只把它當「其中一個玩家」、放回產業全景裡看。橋接：可解釋性≈你對一個讀不懂原始碼的黑箱系統做 **observability**——拿探針去戳它。影子：可解釋性**還很早期**（別過度推銷）、安全與能力／速度的張力、「安全」也可能是行銷。\n\n## 從你已知的出發\n\n你維運過你**沒有完整讀懂原始碼**的系統。\n\n想想你接手過的某個遺留服務，或某個第三方的黑箱元件：你不可能逐行讀懂它每一條分支，但你**照樣得讓它穩定上線**。你怎麼做的？你不會因為讀不懂就放棄——你**插探針**。你加 trace、拉 metrics、埋 log，在它的關鍵路徑上插滿觀測點，然後**從外部行為反推內部狀態**。你那條自建的 **FluentBit pipeline** 做的就是這件事：你把一個你沒法逐行讀懂的系統，變成一個你**能觀測、能在它出事時看見徵兆**的系統。你接受了一個務實的前提——「我不需要讀懂每一行，我需要的是在它要爆之前能看見儀表板上的紅燈」。\n\n這一章要講的，是把這個處境**放大到極限**的版本。前沿大模型不是「你沒讀懂的原始碼」——它**根本沒有原始碼**。沒有人寫過「遇到金門大橋就這樣回」，能力是從海量資料裡**長出來的**（ch02）。所以它不是「難讀的程式」，它是一個**幾千億參數、誰也沒寫過源碼的神經網路**。你那套「讀不懂就插探針做 observability」的本能，在這裡升級成一整個研究領域，有個野心勃勃的名字——**可解釋性（interpretability）**，也被形容為「**模型的神經科學**」。\n\n而 observability 的精神在這裡也原封不動地成立：**你插探針不是為了讀懂每一行，是為了在它要做出危險的事之前，能看見徵兆。** 這就把「可解釋性」和「安全」這兩件事，從一開始就綁在了一起。\n\n## 為什麼「連造它的人都不全懂」\n\n先把這個最反直覺的前提講到讓你信服。一個訓練好的 GPT、Gemini、Claude、Llama，到底「不懂」在哪？\n\n回想 ch02 講的訓練本質：你**沒有**逐條寫規則。你設好一個成長環境（資料、最佳化目標、算力），讓模型透過「預測下一個 token」這個簡單目標，在幾千億參數上**自己長出**能力。訓練結束，你拿到的是什麼？是一個巨大的數字陣列——**幾千億個浮點數權重**。它能寫程式、能翻譯、能推理，但這些能力**不對應任何一段你能讀的程式碼**。沒有一個函式叫 `translateToFrench()`，沒有一行寫著 `if topic == \"金門大橋\"`。能力是**分散地、糾纏地**編碼在那片數字海裡的。\n\n這跟你寫過的任何系統都本質不同。你的 cache library 再複雜，它的每一個行為都**有一行你（或某個人）寫過的程式碼負責**——出了 bug，你能 git blame 到那一行。前沿模型沒有這種東西可以 blame。它表現出某個行為（比如突然諂媚、或在某類問題上幻覺、或被某種提示「越獄」），你**找不到「那一行」**，因為根本沒有那一行。\n\n更難的是兩件結構性的事，它們是「看不懂」的真正根源：\n\n- **疊加（superposition）**：模型內部的神經元**不是一個蘿蔔一個坑**。一個神經元往往**同時參與了很多個互不相關的概念**（這叫多義性 polysemanticity）——同一個神經元可能對「金門大橋」「某種程式語法」「某種情緒」都有反應。為什麼？因為模型要用有限的神經元表達遠多於神經元數量的概念，它就學會了把概念「壓縮疊加」在一起。這讓你**沒法靠「讀單個神經元」來理解模型**——每個神經元都是一團糊在一起的訊號。\n- **湧現（emergence）**：很多能力不是被設計出來的，是**規模到了某個點突然冒出來的**。沒有人寫過、也沒有人預測得準它何時出現。能力既然是「湧現」的、不是「設計」的，自然也就沒有設計文件可讀。\n\n> 對你的直覺：這就像一個**極端版的分散式系統湧現行為**。你維運高併發系統時見過——沒有任何一個元件「負責」整體的雪崩，雪崩是無數元件交互**湧現**出來的，你在任何單一服務的程式碼裡都找不到「雪崩」這個邏輯。前沿模型把這件事推到極致：**它的每一個能力都是湧現的，沒有一行程式碼「負責」它**。你習慣的 git blame、讀源碼、設中斷點，在這裡全部失效。\n\n所以「連造它的人都不全懂」不是一句行銷話術，也不是工程師謙虛——它是這種「養出來而非寫出來」的造物方式**必然的代價**。你用「設環境讓能力自己長」換到了「沒有可讀源碼」。這就是為什麼需要一整個「神經科學」去**事後**研究它。\n\n## 可解釋性在做什麼：把黑箱當大腦解剖\n\n既然沒有源碼可讀，可解釋性研究就反過來——**把訓練好的模型當成一個已經存在的大腦，拿工具去解剖它、研究它的內部結構**。這就是「模型的神經科學」這個比喻的由來：神經科學家也面對一個沒有源碼的大腦，他們的辦法是插電極、做掃描、找出「哪一群神經元負責什麼」。可解釋性做的是同一件事，對象換成神經網路。\n\n截至 2026-06，這個領域有兩個可以具體點名的代表性方向（✅ 歸屬與年份以 landscape 為準）：\n\n- **稀疏自編碼器 / 單義性（sparse autoencoders / monosemanticity，2024）**——這是對付上面那個「疊加／多義性」難題的辦法。既然一個神經元是一團糊在一起的訊號，那就**用一個輔助的小網路（稀疏自編碼器，SAE），把這團糊訊號拆解成一個個乾淨、可解讀的「特徵」（feature）**。一個特徵不再是「一個神經元」，而是「一個跨越很多神經元、但只對應**單一概念**的方向」——例如「金門大橋」「程式碼裡的某種 bug」「諂媚式的奉承」各是一個特徵。Anthropic 2024 從 Claude 3 Sonnet 裡用這招抽出了**數百萬個**這樣的特徵（細節在 ch07）。\n- **電路追蹤 / 歸因圖（circuit tracing / attribution graphs，約 2025-03）**——找到「有哪些特徵」只是第一步。下一步是追蹤**這些特徵之間怎麼連、資訊怎麼一步步流過模型**，畫出類似電路圖的東西。這等於從「標出大腦裡有哪些功能區」進到「畫出這些區之間的神經迴路」。\n\n> 對你來說，這件事的橋接精準得驚人：**這就是對黑箱系統做 observability。** SAE 抽特徵≈你在一個沒有 log 的服務裡**埋進結構化的觀測點**，把混在一起的內部狀態拆成你看得懂的維度；電路追蹤≈你做**分散式 tracing**，把一個 request 怎麼流過你的微服務鏈、在哪一跳被改寫，一段段串起來。你做 observability 從不指望「讀懂每一行」——你指望的是「在足夠多的關鍵點插探針，從外部反推內部」。可解釋性是同一種精神，只是被戳的對象是一個誰也沒寫過源碼的神經網路。\n\n**這是一個產業級的研究領域，不是某一家的專利**——這點本章要特別強調，因為 ch07 講 Anthropic 時容易給人「這是 Anthropic 的東西」的錯覺。實際上：⚠️/✅（部分一手、部分二手，2026-06）**OpenAI** 也做過大規模 SAE，在 GPT-4 級模型裡找到可解讀特徵（例如一個「humans have flaws」的特徵）；**Google DeepMind** 2024 用 SAE 分析 Gemma 2、並公開了相關工具（Gemma Scope）；學界更是有一整片 mechanistic interpretability 的社群在跑。各家投入的**力度**與**對外講述的多寡**確實不同（Anthropic 講得最大聲，見 ch07），但「想搞懂黑箱內部」這件事，是**整個前沿產業共同面對、共同在推**的研究戰線。\n\n### 招牌個案：把「金門大橋」這個特徵調到最大會怎樣\n\n抽象的「特徵」聽起來還是很玄。讓我用一個能把「神經科學」變具體的真實實驗收尾——這也是這個領域最廣為人知的一次公開展示。\n\n✅（Anthropic, 2024，從 Claude 3 Sonnet）研究者用 SAE 在模型內部找到了一個專門對「**金門大橋**」有反應的特徵。然後他們做了一件關鍵的事：**不是去改提示詞、也不是重新訓練模型，而是直接在模型推論的當下，把這個「金門大橋」特徵的活化值「夾」到最大**（這叫 activation steering，操弄推論期的內部活化）。結果：模型開始**逢人就說自己是金門大橋**，無論你問它什麼，它都能把話題繞回金門大橋，甚至會表達對橋、對舊金山的情感。這個被刻意「調過」的版本後來被暱稱為 **Golden Gate Claude**。\n\n為什麼這個小實驗如此重要？因為它一次證明了三件原本只是假說的事：\n\n1. **模型內部真的有「可指認」的概念表徵**——「金門大橋」不是糊在整個網路裡無法定位的，它對應到一個**具體、可被找到的方向**。\n2. **這個表徵是可以被外科手術式操弄的**——你可以精準地把「某一個概念」調強或調弱，而不動其他部分。這從「觀測」跨進了「干預」，正是真正理解一個系統的標誌（你能可控地改變它，才算真的懂它一部分）。\n3. **它把「可解釋性」和「安全」直接接了起來**——同樣的技術，把「金門大橋」換成「諂媚」「製造生化武器的意圖」「欺騙」，你就有機會**在模型內部偵測、甚至抑制**這些危險特徵，而不必等它在輸出端出事。（同類研究也展示了用特徵去**降低有 bug 的程式碼生成、減輕偏見、偵測有害輸出**。）\n\n> 對你的直覺：這就像你終於在一個黑箱服務裡，找到了那個一直找不到的「**feature flag**」——而且不只能讀它的值，還能在 runtime 把它扳開或關掉，然後親眼看到下游行為跟著變。從「我只能觀測」到「我能定位並干預」，這是 observability 的聖杯。Golden Gate Claude 就是可解釋性領域第一次在前沿模型上、對著一個玩笑般的特徵，公開摸到了這個聖杯的邊。\n\n但**請記住「邊」這個字**——後面的影子段落，我們會誠實地把這個成就的真實成熟度標清楚。能定位「金門大橋」這種**鮮明、具體**的特徵，距離「能完整讀懂模型每一個決定」**還非常遠**。\n\n## 另外兩條防線：red-teaming 與 evals\n\n可解釋性是「打開黑箱往裡看」的那條路，野心最大、也最不成熟。在它成熟之前，產業靠的是另外兩條**更務實、更黑箱外部**的防線。它們的共同精神依然是你熟的：**既然讀不懂內部，那就在外部把它往死裡測。**\n\n- **Red-teaming（紅隊測試）**：組一支人（或用另一個模型）扮演攻擊者，**主動想盡辦法讓模型出事**——誘導它說出製造危險物的步驟、繞過安全限制（越獄 jailbreak）、產生有害或違法內容。這完全就是你熟的**滲透測試／混沌工程**搬到模型上：你不等它在生產環境出事，你在上線前**主動製造最壞情況**，看它在哪裡崩。red-teaming 的價值不在「證明模型安全」（你永遠證明不了），而在「**找出它已知的破口**」，這跟你做 chaos engineering 的心態一模一樣——主動注入故障，比被動等故障好。\n- **Evals（評測／安全評測）**：建立一整套標準化的測試集，**量化**模型在各種維度上的行為——不只是 ch04 講的能力 benchmark（MMLU、SWE-bench…），還包括**安全向**的評測：它有多容易被越獄、會不會諂媚（sycophancy）、在高風險領域（生化、網路攻擊）能提供多少危險協助、會不會欺騙。這就是你的**自動化測試套件 ＋ CI 把關**搬到模型上：每訓一版新模型，先跑一遍安全 evals，不過關的維度就是已知風險。\n\n⚠️ 但這兩條防線有一個你做安全工程時最熟的根本限制：**測試只能證明 bug 存在，不能證明 bug 不存在**。red-teaming 找到的是**你想得到去測的**攻擊；evals 量的是**你已經定義出來的**風險維度。對一個能力會湧現、行為會在你沒測過的角落冒出來的系統，「跑過了所有 evals」**遠不等於**「安全」——它只等於「在我們已知的測試集上沒翻車」。這就是為什麼可解釋性（直接看內部）仍然是聖杯：因為只有真的看懂內部，你才可能發現那些**你根本不知道該去測的**風險。red-teaming 和 evals 是「黑箱外部的防線」，可解釋性是想「把箱子變透明」——前兩者是現在能用的，後者是還在路上的。\n\n## 各家的安全取向差異：講取捨，不褒貶\n\n現在進到本章一個需要極度小心的部分：**各家在「安全」上的取向確實不同——但這是一個取捨光譜，不是好人壞人榜。** 本書的態度（ch04 立的規矩）是講成因、講取捨，不替任何一家的安全敘事背書、也不唱衰任何一家。\n\n把它放回**五變數**來看，安全取向差異主要落在第四格**研究文化·品味**與第五格**產品取向**：\n\n- 有些家把**安全與對齊當第一性原則、長期養可解釋性團隊**（這個取向在 ch07 講透了，是研究文化品味這格的押注）。它的代價——速度與開放可能讓步：投在安全研究上的人力與算力，不會讓下一版在 benchmark 上多幾分；某些能力可能因安全考量而延後釋出或加更多限制。\n- 有些家更偏**速度取向**（ch10 的 xAI 是這一極的代表）：快速堆算力、快速迭代、公開試錯，安全治理相對輕。它的代價——更容易出內容治理爭議、更依賴上線後的補救。\n- 有些家在**開放權重 vs 閉源**這條軸上的選擇（ch13 的主題），本身就**內含一個安全論述**——而且**兩個方向都有自己的安全故事**，這正是「沒有絕對對錯」的最好證明：\n  - **閉源派**的安全論述：權重不公開，才能控制誰能用、能避免被拿去做危險用途（防濫用、防越獄後直接拿到原始能力）。\n  - **開放權重派**的安全論述：權重公開，全世界研究者才能一起檢查、一起做可解釋性、一起找破口（防黑箱、防單一公司說了算）。\n\n> 關鍵的反直覺：**同一個「開放」選擇，在一邊是安全的理由、在另一邊是不安全的理由。** 閉源派說「公開＝危險（誰都能濫用）」，開放派說「公開＝安全（誰都能監督）」。你沒法說哪邊「對」——它們**量的是不同的風險**（濫用風險 vs 集中／黑箱風險）。這跟你在工程上權衡「把內部工具開源 vs 鎖在公司內」是同一種兩難（見 ch13）：開源讓更多人幫你抓 bug，但也讓攻擊者看得更清楚。**安全不是一個可以最大化的單一數值，是一組互相拉扯的取捨。**\n\n所以，當你看到任何一家高調談自己的安全投入，正確的讀法不是「所以這家最有良心／最虛偽」，而是去問：**它在「安全 vs 速度／開放」這個光譜上站哪裡？它選的這個位置，讓它強在哪、暴露在哪？** 這才是本書要的「成因視角」。下一節的影子，就是來把這個取捨的代價講白。\n\n## 成因拆解\n\n### (a) 五格歸因\n\n本章是**主題章**，拆的不是某一家，而是「**為什麼有些家在可解釋性／安全上投入特別多**」這個橫切現象。歸因的重點：這主要是一個**研究文化·品味**的押注，被**產品取向**部分塑形；資料與算力是次因（它們是安全工作的成本，不是它的成因）。\n\n| 變數 | 主/次 | 為什麼 |\n|---|---|---|\n| 資料 | （次因／背景） | 安全評測需要建構危險場景的測試資料；red-teaming 會產生大量「攻擊—防禦」資料回頭餵對齊訓練。但資料不是「為什麼有家願意投入安全」的成因，是執行安全工作的素材。留白偏次。 |\n| **後訓練·對齊** | **△次因** | 可解釋性與 red-teaming 的成果會回流到後訓練——找到「諂媚特徵」可以幫忙抑制它、red-team 找到的越獄可以補進對齊資料。對齊是安全研究的**下游受益者與執行面**，但「為什麼投入」的根不在這格。 |\n| 算力·基礎設施 | △次因 | 跑大規模 SAE、訓練解釋用的輔助網路、跑海量安全 evals，都要燒算力。算力決定你**做得起多大規模的可解釋性**，但它是成本約束，不是動機來源。 |\n| **研究文化·品味** | **✓主因** | **這是核心。願意長期養一支「短期不賺錢、不會讓 benchmark 多幾分」的可解釋性／安全團隊，是一種價值取向上的押注（這個判準在 ch07 講透）。「該把安全擺多前面、該為它讓多少速度」——這完全是研究品味的選擇，也是各家差異的根源，且最難被抄走。** |\n| **產品取向** | **✓主因** | **你服務誰，部分決定你需要多重的安全。要把模型推進企業、政府、高風險領域（醫療、金融、生化研究）的家，安全與可審計性是賣點與門檻；純消費級、速度優先的家，安全的商業誘因相對弱。開放 vs 閉源（ch13）的選擇也內含不同的安全論述。產品形狀，部分壓出了安全投入的形狀。** |\n\n> 註：跟 company 章不同，這章的因果是「**研究文化品味（主因，押不押安全這個方向）＋ 產品取向（主因，要服務誰）→ 各家在『安全 vs 速度／開放』光譜上站不同位置**」。安全不是某一家的「強項」，是整個產業共同面對的約束；各家的差異，在於它們**選擇站在這個取捨光譜的哪一點**。\n\n一句話收束：**「為什麼有些家在可解釋性／安全投入多」主要因為〔研究文化·品味（願長期押短期不賺錢的方向）＋產品取向（要服務高風險／企業／開放生態，安全成為門檻或論述）〕兩格主導；後訓練與算力是執行面的次因。影子是——可解釋性還很早期（遠不能完整讀懂模型）、安全與能力／速度的張力（投安全＝讓速度）、以及「安全」本身可能被當成行銷話術。**\n\n### (b) 影子\n\n把資源大量投向可解釋性與安全的這組選擇，同時也讓投入者（和整個產業）暴露在三個地方：\n\n- **可解釋性還很早期——別過度推銷，這是最大的影子。** ⚠️ Golden Gate Claude 很迷人，但它能漂亮地定位的是**鮮明、具體**的特徵（一座橋、一種明顯情緒）。對於「模型在這次回答裡到底走了哪條推理路徑、為什麼這次幻覺、為什麼這次被越獄」這種**真正關鍵**的問題，目前能看懂的仍是模型內部**極小的一塊**，遠不是「已經能完整讀懂模型」。更冷靜的訊號是：⚠️（2025–26，部分二手）有研究指出 SAE 在大規模、嚴格的評測上**並沒有穩定打敗簡單基線**（在概念偵測、行為操控等任務上），Google DeepMind 的可解釋性團隊據報因此**調降了對 SAE 路線的優先級**。這不代表可解釋性沒前途，而是提醒你：**這是一個還在劇烈試錯、方法會被推翻的早期領域**，任何「我們已經能讀懂模型了」的說法，現階段都該被高度懷疑。本章自己的態度必須一致：講方法、講野心，但**不替任何成熟度敘事背書**。\n- **安全與能力／速度是真實的張力，不是免費的美德。** 投在可解釋性、red-teaming、安全 evals 上的每一份人力與算力，**不會**讓下一版模型在 SWE-bench 上多幾分。把安全擺前面的家，在「最新最強、最快上線」這條賽道上，結構性地會比純速度取向的對手**讓出一點身位**（ch07 甚至看到具體的容量代價）。反過來，把速度擺前面的家，換來迭代快，但暴露在更多上線後的治理爭議。**這是一個你沒法兩頭全拿的取捨**——任何宣稱「我們又最安全又最快又最開放」的敘事，都值得你追問它在哪一頭其實做了讓步。\n- **「安全」可以是真投入，也可以是行銷話術——而且外界極難分辨。** 這接回 ch18 結尾埋的同一個問題：當一個優勢**無法被外部證偽**時，你怎麼分辨它是真實的結構性領先、還是講得好聽的故事？「我們很重視安全」這句話，正是這種難證偽的主張之一——可解釋性研究確實能餵養一個漂亮的安全敘事，但「有對外講安全」和「真的把安全擺在能力前面、並付出速度代價」是兩回事。判準（ch07 給過）：看這個投入**短期賺不賺錢**、看它**有沒有真的讓出速度／能力**，而不是看它對外講得多響。一個誠實的讀者，對所有家的安全敘事都該保留這層懷疑——**包括那些你直覺上比較信任的家**。\n\n### (c) 何時不成立\n\n本章描述的圖像（黑箱不可解、可解釋性是早期前沿、安全是取捨光譜），會在什麼情況下被打臉？\n\n- **被可解釋性的突破打臉**：如果某天 SAE 的後繼方法、或某種全新的解釋技術真的成熟到能**可靠地、可擴展地**讀懂模型在做關鍵決定時的內部過程，那「連造它的人都不全懂」這句話的力道就會減弱——黑箱會變成半透明箱。截至 2026-06 這還遠未發生（見上面的 SAE 質疑），但這是一個**正在被猛攻**的方向，可能在本書的保鮮期內就有局部突破。本章標的是 2026-06 的成熟度快照，**不是定律**。\n- **被監管／事故打臉**：本章把安全寫成各家自選的「取捨光譜」。但如果出現重大安全事故、或強監管（歐盟 AI Act 之類）落地，安全可能從「研究品味的選擇」變成「**人人都得做的合規門檻**」——那時各家在這條軸上的差異會被法規拉平，「投不投安全」不再是品味問題，而是能不能營業的問題。屆時這一章的「光譜」會被壓縮成「及格線」。\n- **被「安全外溢成能力」打臉**：本章（為了講取捨）強調了安全 vs 能力的張力。但 ch07 給過一個反向的真實案例——Anthropic 把對齊當第一性原則，結果**外溢**成了 coding/agentic 的可靠度。也就是說，「安全」與「能力」不總是此消彼長，某些安全工作（如讓模型更聽話、更可控、更少胡說）**本身就是能力**。所以「投安全＝犧牲能力」這個取捨，在某些維度上會被「安全即能力」打臉——這也提醒你，五變數從來是**交互作用**，少有乾淨的單向取捨。\n- **本章所有具體事實都是 2026-06 的快照**：可解釋性的方法（SAE 的興衰）、各家的安全取向、監管狀態，每一項都在快速變動。穩定的是「**模型是養出來的、所以沒有可讀源碼、所以需要事後的神經科學去研究它**」這個**結構**；會過期的是任何一個具體的方法成熟度、團隊優先級、與某一家當下的安全姿態。\n\n## 紙上推演\n\n### 推演題1 — 對帳：把「可解釋性」對應回你對黑箱系統做 observability **[12 分鐘]** ★★\n\n不准用 ML 術語，把「可解釋性研究在做什麼」整套對應回你維運過的一個**具體**經驗：對一個你**沒有完整原始碼**的系統做 observability。要對應到三層——**觀測、定位、干預**——並說出這個類比在哪裡會**失準**（類比的極限）。\n\n#### 推演解答\n\n最貼的對應是你接手一個讀不懂源碼的遺留服務、或一個第三方黑箱元件，然後靠你那條 **FluentBit pipeline** 把它變得可觀測。三層對應：\n\n1. **觀測（你埋 log/metrics ↔ 可解釋性抽「特徵」）**：你不指望讀懂每一行，你在關鍵路徑插探針，把混在一起的內部狀態拆成你看得懂的維度。SAE 抽特徵做的就是這件事——把一個「一團糊」的神經元活化，拆成「金門大橋」「諂媚」這種乾淨、可讀的維度。\n2. **定位（你做分散式 tracing ↔ 電路追蹤）**：光有 metrics 不夠，你還要知道一個 request 怎麼流過你的服務鏈、在哪一跳被改寫。電路追蹤／歸因圖就是模型版的 tracing——追蹤資訊怎麼一步步流過模型、哪些特徵連到哪些。\n3. **干預（你扳 feature flag ↔ activation steering）**：observability 的聖杯是不只能讀、還能在 runtime 改。Golden Gate Claude 就是這個——研究者在推論當下把「金門大橋」特徵夾到最大，模型行為立刻跟著變。能可控干預，才算真的懂了一部分。\n\n**類比在哪裡失準（這才是這題的重點）**：你的遺留服務**有源碼**——你讀不懂只是因為沒時間／太亂，但「那一行」**存在**，理論上 git blame 得到。前沿模型**根本沒有那一行**——它的行為是幾千億參數湧現的，沒有任何一段程式碼「負責」某個行為。所以可解釋性比 observability **難一個量級**：你做 observability 是「補上沒讀的源碼的外部視圖」，可解釋性是「**為一個從不存在源碼的東西，從零發明出一套源碼的概念**」。這就是為什麼它還這麼早期。\n\n常見誤解：把可解釋性想成「就是更高級的 log」。不是——log 是把**已經被寫進程式的事件**輸出來；可解釋性是去**逆向發現那些從沒被任何人寫過、卻自己長出來的結構**。前者是讀，後者是考古。\n\n### 推演題2 — 找破綻：「模型可解釋性已經解決了，我們已經能讀懂模型」 **[10 分鐘]** ★★★\n\n有人看了 Golden Gate Claude 的 demo，興奮地說：「你看，他們都能精準定位『金門大橋』這個概念、還能扳動它了——可解釋性已經基本解決，我們已經能讀懂模型內部了。」請你用 90 秒，**不否定**這個成就的真實價值、但精準指出這句話過度推銷在哪。\n\n#### 推演解答\n\n完整的拆法分三刀：\n\n1. **尺度刀（能定位的是冰山一角）**：Golden Gate Claude 能漂亮定位的是**鮮明、具體**的特徵——一座橋、一種明顯情緒。但對「模型這次為什麼幻覺、為什麼被這個提示越獄、走了哪條推理路徑」這種**真正關鍵**的問題，目前能看懂的仍是內部**極小一塊**。從「能指認金門大橋」到「能完整讀懂模型每一個決定」之間，差了不知道多少個數量級。「能定位一個概念」≠「能讀懂模型」。\n\n2. **證據刀（方法本身正在被質疑）**：別把一個漂亮 demo 當成領域成熟。⚠️（2025–26）有嚴格評測指出 SAE 在大規模任務上**並沒有穩定打敗簡單基線**，Google DeepMind 的可解釋性團隊據報還**調降了 SAE 的優先級**。一個其核心工具正在被同行質疑、優先級被調降的領域，離「已經解決」非常遠。這是一個**還在劇烈試錯**的早期前沿，不是收工的成熟技術。\n\n3. **校準刀（別翻案翻過頭）**：但也別因為上面兩刀就全盤否定——Golden Gate Claude **確實**第一次在前沿模型上證明了「內部有可指認、可干預的概念表徵」，這是真實且重要的進展，把可解釋性從哲學思辨變成了可操作的工程。正確姿態是「**這是一個有真實突破、但遠未成熟、且方法仍在被推翻的早期領域**」，而不是非黑即白的「已經解決」或「全是噱頭」。\n\n常見誤解：一種是看到漂亮 demo 就以為領域成熟（忽略尺度與方法質疑）；另一種是聽到「SAE 被質疑」就全盤否定可解釋性（忽略 Golden Gate Claude 的真實突破）。兩種都沒讀懂——關鍵永遠是**校準成熟度**：有真進展，但離終點極遠。\n\n### 推演題3 — 找破綻：「某家高調談安全，所以它不是最安全（就是公關）、就是在自我設限拖慢自己」 **[12 分鐘]** ★★★\n\n群組裡兩派吵起來。A 說：「某家天天談安全，根本是公關話術、搶道德高地。」B 說：「就算是真的，那它把安全擺這麼前面，純粹是自我設限、拖慢自己，活該被速度派超車。」請你指出**這兩種說法各自的破綻**，並給出一個更誠實的讀法。\n\n#### 推演解答\n\n兩派都把一個**取捨**讀成了**一個簡單的對錯判斷**，方向相反但都太草率。\n\n**A 的破綻（「就是公關」）**：A 假設「有對外講安全」=「假的、只是公關」。但這個結論**無法從『有講』推出來**——這正是 ch18/本章反覆講的「難證偽」問題。「我很重視安全」確實是難證偽的主張，但難證偽**不等於假**。要判斷真假，A 該用的判準是：這家的安全投入**短期賺不賺錢**？它**有沒有真的讓出速度／能力**作為代價（ch07 的容量代價就是一個真讓出速度的具體證據）？光憑「它有講」就斷定「是公關」，跟光憑「它有講」就相信「很安全」，是**同一種**懶惰——都跳過了驗證。\n\n**B 的破綻（「純粹自我設限拖慢自己」）**：B 假設安全與能力是乾淨的此消彼長——投安全＝純損失速度。但 ch07 給過反例：把對齊當第一性原則，**外溢**成了 coding/agentic 的可靠度。某些安全工作（讓模型更聽話、更可控、更少胡說、更可審計）**本身就是能力**，尤其在企業／高風險產品上，可審計性是**賣點與門檻**而非純成本。所以「投安全＝活該被超車」這個推論也站不住——它忽略了「安全即能力」的維度，也忽略了不同產品取向下安全的商業價值不同。\n\n**更誠實的讀法**：安全不是一個可以最大化的單一數值，是一組**互相拉扯的取捨**。正確的問題不是「這家安不安全／是不是公關」，而是：**它在『安全 vs 速度／開放』光譜上站哪裡？這個位置讓它強在哪、暴露在哪？** 把安全擺前面的家，換來企業／高風險場景的信任與某些「安全即能力」的外溢，代價是讓出一點速度身位；速度派換來迭代快，代價是更多治理爭議。**沒有絕對的對錯，只有取捨的位置與它的影子。** 而且這層懷疑要對**所有**家一視同仁——包括你直覺上比較信任的那家。\n\n常見誤解：把安全當成一條可以排名的單軸（「誰最安全」）。安全是多風險維度的拉扯（濫用風險 vs 集中／黑箱風險、能力 vs 可控…），不同家**量的是不同的風險**——這正是開源派與閉源派能用「開放」這同一件事、各自講出一套安全論述的原因。\n\n## 自我檢核\n\n口頭自答，講不清楚就是還沒懂：\n\n1. 為什麼說「連造它的人都不全懂」一個訓練好的模型？把「沒有源碼可讀」這件事跟 ch02 的「養出來而非寫出來」接起來講——並用「疊加／多義性」和「湧現」各講一句，說明看不懂的**結構性根源**在哪。\n2. 可解釋性為什麼被叫「模型的神經科學」？SAE/單義性（2024）和電路追蹤（約 2025-03）各解決了上一步的什麼問題？用你對黑箱系統做 observability 的經驗（觀測→定位→干預）把這兩者對應一遍。\n3. **Golden Gate Claude 這個實驗，為什麼一次證明了三件事**（可指認、可干預、接上安全）？它最了不起的是哪一步——為什麼「能干預」比「能觀測」更關鍵？\n4. 為什麼說「可解釋性是**整個產業**共同在做的研究領域、不是某一家的專利」？（提示：OpenAI/GPT-4、Google DeepMind/Gemma 2 都做過 SAE）這跟 ch07 給人的印象差在哪、為什麼要特別澄清？\n5. red-teaming 和 evals 跟可解釋性差在哪（黑箱外部 vs 想把箱子變透明）？為什麼「跑過了所有安全 evals」**遠不等於**「安全」？用你「測試只能證明 bug 存在、不能證明 bug 不存在」的直覺講。\n6. **為什麼開源派和閉源派能用『開放』這同一件事、各自講出一套安全論述？** 它們各自量的是什麼風險？這怎麼證明「安全不是一個可以排名的單軸」？\n7. 「可解釋性已經解決了」這句話過度推銷在哪？怎麼**既肯定 Golden Gate Claude 的真實突破、又指出它離成熟極遠**？（提示：SAE 被質疑、Google DeepMind 調降優先級）「校準成熟度」和「非黑即白」差在哪？\n8. 面對一家高調談安全的公司，為什麼「就是公關」和「很安全」是**同一種懶惰**？判斷它是真投入還是行銷，正確的判準是什麼（短期賺不賺錢、有沒有真讓出速度）？為什麼這層懷疑要對**所有**家一視同仁？\n\n## 延伸閱讀\n\n- **Templeton et al., \"Scaling Monosemanticity\"（Anthropic, 2024，從 Claude 3 Sonnet 抽特徵）** — https://transformer-circuits.pub/ ——「模型的神經科學」與 **Golden Gate Claude** 的源頭論文。讀它怎麼用稀疏自編碼器把糊在一起的神經元拆成數百萬個可解讀「特徵」、又怎麼靠「夾住一個特徵」做出 Golden Gate Claude——本章招牌個案的一手出處（Anthropic 個別故事見 ch07）。\n- **Anthropic, circuit tracing / attribution graphs（約 2025-03）** — https://transformer-circuits.pub/2025/july-update/index.html ——可解釋性的下一步：不只找特徵，而是追蹤資訊怎麼一步步流過模型、畫出電路圖。讀它對「我們連自己造的東西都看不全懂」這件事的**誠實面對**，體會這個領域的野心與謙卑。\n- **A Survey on Sparse Autoencoders（arXiv:2503.05613）** — https://arxiv.org/html/2503.05613v3 ——SAE 的**產業級綜述**。讀它印證「這不是一家的事」：OpenAI、Google DeepMind、學界都在跑 SAE，以及這條路線當前的能耐與**侷限**——本章「別過度推銷成熟度」那段的依據。\n- **\"Sparse Autoencoders Find Highly Interpretable Features in Language Models\"（OpenReview）** — https://openreview.net/forum?id=F76bwRSLeK ——可解釋性社群的代表性論文之一。讀它怎麼從「神經元是一團糊（多義性）」這個問題出發，建立「為什麼需要 SAE 去拆特徵」的直覺。\n- **OpenAI/Anthropic 的 SAE 研究對照整理（Arize AI）** — https://arize.com/blog/llm-interpretability-and-sparse-autoencoders-openai-anthropic/ ——把 OpenAI 與 Anthropic 在 SAE 上的工作放一起對照的可信整理。讀它建立「可解釋性是**多家共推**的研究戰線」這個本章核心立場。\n- **Kaplan et al. 2020 / Chinchilla（接回 ch02）** — https://arxiv.org/abs/2001.08361 ——回頭讀 scaling laws，理解「能力沿一條曲線**長**出來」這件事——正是它讓模型「沒有源碼可讀」、進而**需要**事後的可解釋性。把「為什麼造出看不懂的東西」這個本章前提，接回「模型是養出來的」這個全書地基。\n"}, {"id": "ch20-persist-and-converge", "file": "ch20-persist-and-converge.md", "group": "Part IV — 收束", "title": "ch20 — 為什麼差異會持續、也會收斂", "md": "# ch20 — 為什麼差異會持續、也會收斂\n\n> **本章解決什麼問題**：Part III 把八家放在同一張桌子上、逐個橫切面看過了差異。現在進到全書最後一段 Part IV 收束，要回答一個比「誰強」更耐久的問題——**這些差異，哪些會持續、哪些會被互相抄掉？** 這是本書的動態判斷：把五變數從「歸因工具」升級成「保鮮期判斷工具」，分清楚哪些是**結構性護城河**（會持續），哪些是**易擴散的招式**（會收斂）。本章刻意**不預測誰會贏**——那是測不準的（ch04）；能說的是差異**為什麼**會持續、也會收斂。它替 ch21 的總帳鋪好最後一塊地基。\n\n```text\nPart I  共通底層（同一張藍圖）\n  ch01 同一張藍圖：架構不是護城河（序＋全書地圖）\n  ch02 模型是養出來的，不是寫出來的\n  ch03 五變數記分卡：差異的成因框架\n  ch04 「誰最強」是測不準的：評測政治學\n        |\n        v  拿著五變數這把尺，逐家拆解\nPart II 八家深入（一家一章；以什麼著稱 → 為什麼是這家）\n  ch05 OpenAI      ch06 Google      ch07 Anthropic   ch08 Meta\n  ch09 Mistral     ch10 xAI         ch11 DeepSeek    ch12 Qwen\n        |\n        v  把八家放一起，看差異的橫切面\nPart III 跨家主題（差異的橫切面）\n  ch13 開源 vs 閉源：兩種世界觀\n  ch14 推理模型競賽：o1 之後的範式轉移\n  ch15 對齊方法演化：RLHF → Constitutional AI → RLVR\n  ch16 算力軍備競賽：GPU、TPU、自研晶片\n  ch17 多模態：文字之外的戰場\n  ch18 資料暗河：版權、合成資料與資料牆\n  ch19 我們造出看不懂的東西：可解釋性與安全\n        |\n        v  收束\nPart IV 收束 ◄你在這裡\n  ch20 為什麼差異會持續、也會收斂\n  ch21 同一張藍圖，八種風格（總收官，五變數總帳）\n```\n\n箭頭把你帶離「橫切」這一段，進到「收束」。前面十九章都在回答「為什麼此刻有差異」；這一章把鏡頭往後拉，問一個工程師最關心的問題——**這些差異，三年後還在嗎？**\n\n## 從你已知的出發\n\n這題你太熟了，只是換了個名字——叫**雲端三巨頭的功能抄襲**。\n\n你帶 ECS 微服務那幾年，看著 AWS、GCP、Azure 在做的事：A 家推出一個受管的訊息佇列，半年後 B 家就有對等品；A 家出 serverless 函式，B、C 跟上；A 家做了個受管的 Kubernetes，三家最後都有。**任何「功能層」的差異化，保鮮期都短得驚人**——一個 feature 一旦被證明有市場，它會在一兩年內被抄成業界標配，於是你選雲的時候，根本不會因為「只有 AWS 有 SQS」這種理由選 AWS（因為早就不只它有了）。\n\n可是你真正換不動雲，是因為**另一些東西**——那些抄不走的：\n\n- **你已經把整套 IAM、VPC、CloudWatch、自建 FluentBit pipeline 全長在 AWS 上**了（生態與整合）。\n- 你團隊**會的是 AWS**——六年的肌肉記憶、踩過的坑、內部的 runbook（運維文化）。\n- 你的**資料重力**：幾十 TB 的東西躺在 S3 和 RDS 裡，搬一次的出口流量費和停機風險，本身就是一道牆（專有狀態）。\n\n看出那條線了嗎？**功能會收斂，但生態、整合、運維文化、資料重力會持續。** 差異化不是消失了，是**從功能層退守到了更黏、更難抄的那幾層**。\n\n這一章要說的就是這件事的大模型版本：**架構技巧、訓練法、開放權重——這些是「功能」，會被抄成標配；而算力底盤、專有資料、研究品味、產品分發——這些是「生態與運維文化」，會持續。** 把五變數那把尺，重新沿著一條新軸擺一次——這條軸不叫「強弱」，叫**會不會被抄走**。\n\n## 一條軸：易擴散 vs 結構性\n\n把每一格差異想成一滴墨水滴進水裡。有些墨水一滴就散開、整缸都染上同一個顏色（**收斂**）；有些墨水黏在缸底、推不動（**持續**）。決定一滴墨水會不會散開的，是它的**擴散成本**——別人要花多少力氣、多少時間、多少別的資源，才能把你這一手複製過去。\n\n- **擴散成本接近零的 → 會收斂。** 一個技巧只要被**寫成論文或放出權重**，它的擴散成本就趨近於零：任何有能力的團隊讀完就會做。複製它不需要你沒有的東西。\n- **擴散成本極高的 → 會持續。** 一道差異如果要複製，必須先擁有對手**幾年也買不到、抄不來的前置資源**（一座你蓋不起的晶片廠、一個別人沒有的資料源、一群挖不動的人、一個你進不去的分發管道），那它就黏在缸底，抄不走。\n\n這條軸的關鍵洞見，跟你的雲端直覺一字不差：**最容易被抄走的，恰恰是最「技術」的那一層；最抄不走的，反而是技術之外的那些「軟」東西**（資本、資料、人、通路）。工程師的直覺常常反過來——以為「演算法創新」最值錢、最是護城河。本書要顛覆的正是這個直覺：**在一個架構公開、論文滿天飛的產業裡，純技術招式是擴散最快的東西。**\n\n## 已經被抄成標配的：易擴散的那一半\n\n先看會收斂的這半邊。本書前面已經目睹了好幾滴墨水「啪」地散開、染白整缸的過程：\n\n- **架構變體，一發表就是公共財。** GQA（省 KV cache）、MLA（DeepSeek 招牌）、RoPE、MoE——這些全是公開論文裡的東西（見 ch01、ch16）。MLA 是 DeepSeek 在 V2 提出的招牌（ch11），但因為它寫進了論文，別家要用沒有任何法律或技術障礙。**一個架構技巧的領先，從發表那天起就在融化。**\n- **訓練法／後訓練配方，公開即擴散。** GRPO（DeepSeek 那套省掉 reward model 的 RL，ch11、ch15）寫進了 DeepSeekMath 論文；RLHF 的配方從 InstructGPT（OpenAI 2022）就攤在 arXiv 上（ch15）。方法一旦可讀，就會被讀走。\n- **reasoning 從「範式」變成「標配」——最戲劇化的一次收斂。** 這是全書最乾淨的收斂案例。OpenAI 用 o1 開創了 reasoning 範式（2024-09，ch14）；DeepSeek 用 R1（2025-01-20）證明這配方可以便宜複製、還開放權重——於是**不到一年**，截至 2026-06，八家**全部**都有 reasoning 模式：OpenAI 收進 GPT-5 的 router、Google 的「Deep Think」、Anthropic 的 extended thinking、Qwen3 的 hybrid toggle……（清單見 landscape）。一個東西**人手一個**，它就不再是任何一家的「強項」——它退化成了背景。o1 開創者的光環，被「人手一個」稀釋掉了（ch14）。\n- **開放權重本身就是「主動引爆收斂」。** 你把權重放出去（Llama、Qwen、DeepSeek、Mistral），等於主動把自己的成品交給全世界蒸餾、微調、研究。Meta 在 2026-04 轉向閉源（Muse Spark，ch08）的其中一個明說的理由，就是怕「中國廠商靠 Llama 搭便車」——這正是開放權重「主動加速收斂」的副作用應驗（⚠️ 標為 2026 轉折、非定局，ch08）。\n\n這半邊的共同點，回到那條軸上看就一句話：**它們的擴散成本都接近零——複製它們不需要你沒有的東西，只需要讀懂、然後做。** 所以這半邊的差異，註定是局部的、短命的、會被抹平的。\n\n## 抄不走的那一半：結構性護城河\n\n再看會持續的這半邊。這些差異要複製，得先擁有對手幾年也湊不齊的前置資源——所以它們黏在缸底。\n\n**第一道牆：自有矽與算力規模。** 這是擴散成本最高的一格，因為它要的是**資本與時間，不是知識**。Google 的 TPU 是全書最乾淨的一條結構性護城河（ch06、ch16）：自己設計晶片 → DeepMind 的模型工程師跟 TPU 工程師**共同設計**（co-design）→ 長序列的訓練與服務成本被壓到別人壓不到的水平 → 於是超長上下文（Gemini 1.5 Pro 早在 2024 就出了 2M token 視窗，✅）長在 Google 而不是別家。這一整條因果鏈**沒有一段是「讀論文就能抄」的**——你抄不走一座晶片設計團隊和它十年的積累。同理：xAI 的 Colossus（自建超大叢集，✅ 速度本身就是武器，數字 ⚠️ 自報）、Anthropic 押 AWS Trainium＋Google TPU 的多雲底盤（✅ 合約已宣布）——這些是「你得先有幾百億美金和好幾年」才談得上複製的東西。**算力是用錢和時間砌的牆，不是用聰明砌的。**\n\n**第二道牆：專有資料。** 架構公開、配方公開，但**沒有一家公開它的資料配比**——這是各家最深的祕密（ch18）。而且資料這道牆正在**變高**，不是變矮：公開的高品質人類文字快被用完了（「資料牆」，Epoch AI 推估約 2026–2028，✅，ch18），於是真正稀缺、抄不走的，變成了**別人拿不到的私有資料流**：xAI 對 X（Twitter）即時語料的原生存取（✅，ch10）、Meta 轉閉源後明說要靠的 FB/IG/WhatsApp 三十億用戶的專有資料（ch08、ch18）、各家自家產品上億使用者每天回流的互動資料。**公開資料會收斂（大家爬的是同一片網路），專有資料會持續（你進不去我的水管）。** 這是一道隨時間升高的牆。\n\n**第三道牆：研究文化與品味。** 這一格最難講、卻可能最持久——因為它根本不是一個「東西」，是一群人的判斷習慣。「先押 test-time compute 這條軸值得賭」（OpenAI 押對 o1，ch05、ch14）、「把對齊當第一性原則」（Anthropic 的 Constitutional AI 與 interpretability，ch07、ch19）、「受出口管制逼出的效率信仰」（DeepSeek 的 MLA＋GRPO＋FP8 一整套效率品味，ch11）——**你可以抄走他們押對之後的成果（論文、權重），但你抄不走「當初為什麼敢這樣賭」。** 招式會擴散，但下一次該往哪賭的品味不會跟著論文一起送出去。這格的擴散成本高，不是因為它貴，是因為它**沒法被寫下來**——它是分散在一群人腦裡的隱性知識。\n\n**第四道牆：產品分發。** 最後這道牆最不「技術」，卻可能最厚。ChatGPT 截至 2026-06 有約 9 億週活躍使用者、跨過 10 億月活躍 app 使用者（✅，ch05）；Google 的 Gemini 直接長在 Search、Workspace、Android 裡（ch06）。分發管道是一個**自我強化的飛輪**：使用者越多 → 回流的互動資料越多（接回第二道牆）→ 產品迭代越快 → 使用者更多。這個飛輪**抄不走**，因為你抄不走「十億人的注意力」這個前置條件。一個技術上更強的後發者，可能因為**沒有分發**而始終追不上一個技術普通但坐在十億用戶身上的對手——這正是你看雲端時的同一道理：功能對等了，但生態黏住了人。\n\n**收斂壓力是真實存在的，而且雙向。** 別把「結構性護城河」讀成「他們高枕無憂」。各家**主動互相蒸餾、互相抄**：開放權重一放出來就被人拿去當蒸餾的老師；閉源模型的行為被對手拿去當對照組逆向學習；benchmark 一個個被刷到飽和（MMLU-Pro、GPQA 截至 2026-06 已逼近飽和，頂尖模型擠在 88–94%、分不開了，✅，ch04）。收斂壓力把「功能層」的差距不斷抹平——所以差異**才會**退守到上面那四道牆後面。這跟雲端是同一個故事：**正因為功能會被抄平，差異化才退到生態、整合、運維文化去。**\n\n## 五變數，沿「會不會被抄走」這條軸重排一次\n\n把 ch03 那張記分卡，換一條軸擺。前面每章問的是「這格是不是某家強項的**主因**」；這一章問的是「這格的差異**會持續還是會收斂**」。\n\n| 變數 | 擴散性 | 為什麼黏 / 為什麼漏 |\n|---|---|---|\n| **資料** | **黏**（專有）／**漏**（公開） | 大家爬的同一片公開網路會收斂；但**專有資料流**（X 即時語料、三十億用戶互動、自家產品回流）抄不走，且隨「資料牆」逼近**越來越黏**（ch18）。這格正在分裂成「漏的公開部分」與「黏的私有部分」。 |\n| **後訓練·對齊** | **漏**（偏易擴散） | 配方一寫進論文就擴散：RLHF、GRPO、RLVR 全公開了（ch15）。reasoning 一年內變標配是最乾淨的收斂案例。**剩下的黏性在「怎麼調得比別人細」的隱性手藝**，但方法骨架本身漏得快。 |\n| **算力·基礎設施** | **黏**（最黏的一格） | 要複製得先有「你沒有的幾百億美金和好幾年」：自研晶片（TPU）、自建叢集（Colossus）、多雲底盤。**用資本與時間砌的牆，不是用知識砌的**，所以擴散成本最高（ch16）。 |\n| **研究文化·品味** | **黏**（最難抄） | 抄得走押對之後的成果，抄不走「當初為什麼敢這樣押」。它是分散在一群人腦裡的隱性知識，**沒法寫進論文一起送出去**（ch14、ch07）。 |\n| **產品取向** | **黏**（分發飛輪） | 分發是自我強化飛輪：用戶→資料→迭代→更多用戶。**抄不走「十億人的注意力」這個前置條件**（ch05、ch06）。功能對等了，生態仍黏住人——和你換不動雲同一個道理。 |\n\n一句話總結這張表：**五變數裡，「後訓練·對齊」漏得最快（配方公開即擴散），「資料」一半漏一半越來越黏，而「算力」「研究品味」「產品分發」是三道抄不走的結構性牆。** 所以差異**會持續**（靠那三道牆＋資料的私有部分），也**會局部收斂**（靠後訓練與公開資料、架構技巧的快速擴散）——這正是本書主張第四條的全貌（style-guide）。\n\n## 下一個轉折在哪：可以猜，但要打折\n\n最後，把鏡頭往前推一格——**reasoning 之後、資料牆之後，下一個能重新拉開差距的軸可能是什麼？** 這一段是全書唯一允許**帶猜測**的地方，所以每一句都要附上但書：以下是**截至 2026-06 的推測，不是預測，更不是誰會贏的下注**。\n\n- **reasoning 紅利已經吃完了**（ch14）。它走完了「差異化 → 標配 → 背景」的完整收斂曲線。下一個範式還沒人能確指——但歷史節奏告訴我們：**會有，而且它一旦發表也會在一兩年內收斂成標配**。差異化的真正來源，永遠是「下一個還沒被抄的東西」。\n- **資料牆把競爭推向「誰有別人沒有的水管」**（ch18）。公開文字快用完 → 合成資料是主要回應，但有 model collapse 風險（在難驗證的領域，🟡）→ 於是優勢結構性地往「**可驗證領域的 RL 資料**」（數學、程式——對錯有客觀訊號，所以 reasoning 才能在這些領域便宜長出來）和「**專有用戶資料**」傾斜。這暗示下一輪的差距，**更可能記在「資料」與「算力」這兩道黏牆上，而不是「後訓練配方」這道漏牆上**——因為配方會繼續快速擴散。\n- **可能的新軸（純推測，全打折）**：原生多模態的縱深（影像／音訊／影片，ch17，門檻是資料＋算力兩道黏牆）；agentic 的長程可靠度（不是更聰明，是更少在多步驟任務裡崩掉）；以及把推論成本壓到「能塞進每個產品、每台裝置」的效率工程（接 DeepSeek、Qwen 的小尺寸路線，ch11、ch12）。**這些都只是『看起來門檻高、所以可能持續』的候選——哪一個會兌現、由誰兌現，本書明確拒答。**\n\n為什麼拒答？因為這正是 ch04 的教訓在未來式上的版本：**任何具體預測都是測不準的**。能說的只有
