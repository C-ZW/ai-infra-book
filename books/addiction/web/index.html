o 排程、不可預測回報為何特別黏。\n  5. **疾病模型 vs 學習模型的爭論**：兩造各自最強的論證與證據，**不裁決**。\n  6. **脆弱性、環境與復原／治療的機制**：遺傳率、發育期、ACE、Rat Park、越戰退伍軍人、自然緩解；治療為什麼有效、為什麼可能衰減。\n\n## 脊椎（全書每一步都要歸位）\n\n**成癮＝大腦的獎賞學習系統被劫持。** 關鍵在 dopamine 編碼的是**「想要（wanting：預測誤差／誘因顯著性）」而非「喜歡（liking：快感）」**，成癮中兩者逐漸**分離**——越來越想要、越來越不喜歡。\n\n每談一個現象，正文都要把它**歸位**到兩個問句上（這是全書脊椎動作，每章至少明確做一次）：\n\n1. **這是「想要」還是「喜歡」？**（是 dopamine 的誘因系統，還是類鴉片的快感系統？）\n2. **是哪一段迴路被劫持？**（VTA→NAc→PFC 的哪一段？目標導向→習慣這條軸滑到哪了？正增強還是負增強（dark side）？）\n\n脊椎的視覺資產是**「兩條曲線分岔」這張圖**：橫軸是用藥／用癮的歷程，wanting 曲線隨敏化（sensitization）越爬越高、liking 曲線隨 allostasis 越塌越低，剪刀差越開越大。這張圖在獎賞迴路章定版，後續每次談耐受、渴求、復發、行為成癮、治療，都回到這張圖指出「現在動的是哪條線」。\n\n**脊椎使用戒律**：脊椎是**描述機制**的工具，不是用來替任何一方的「框架之爭」背書。**不可**用 wanting/liking 分離去「證明」成癮是疾病——「機制上腦確實改變」與「該不該叫疾病」是兩個層次的問題（見驗收主線 5、landscape §六）。\n\n## 讀者是誰\n\n唯一讀者：Chewei，6+ 年資深後端工程師（TypeScript／Node.js／NestJS、AWS、K8s、分散式系統、效能工程、可觀測性），政大資科所選修過演算法與機器學習、淡江資工學士。招牌敘事資產：profiling 驅動讓尖峰 RDS CPU 降 40%。\n\n可直接當橋接錨點的經歷與直覺：\n\n- **強化學習（RL）的零星概念**：選修過 ML，可能略懂 TD 誤差／預測誤差、value function、policy。**dopamine ≈ RPE／TD error 是全書最划算的橋**——dopamine 報的是「與期望的 diff」，不是「發爽訊號」。\n- **系統與分散式直覺**：正回饋迴圈、缺乏 backpressure 的失控、setpoint／PID 控制與漂移、快取（熱路徑被快取、繞過深思熟慮的決策路徑）、idempotency、event sourcing、batch 維護窗、排程器、profiling 驅動優化。\n- **產品與工程文化常識**：attention economy、variable reward（通知、抽卡、無限下滑）、A/B 測試與留存指標——可橋到行為成癮章。\n\n下表把讀者分成三欄，撰章時據此決定「哪些一句帶過、哪些要從零講」。\n\n| 不需要解釋（讀者已精通） | 快速複習即可（看過但生鏽） | 要從零教（本書主體） |\n|---|---|---|\n| 正回饋迴圈、backpressure、控制迴路與 setpoint 概念 | RL 的 TD／預測誤差的精確形式（給一句話複習，再接 dopamine） | 神經元、突觸、神經傳導物（neurotransmitter）的基本運作 |\n| 快取、熱路徑、繞過慢路徑的自動化 | value function／policy 的直覺（只在需要時喚起） | dopamine 的真實角色（RPE／誘因顯著性，不是快感） |\n| 排程器、batch 窗、cron、佇列 | 條件反射／古典制約 vs 操作制約的差別（多半模糊） | wanting／liking 的分離與各自的神經基質 |\n| idempotency、最終一致性、event sourcing | 統計上的「相關不等於因果」「效應量」「複製危機」 | 獎賞迴路解剖（VTA、NAc shell/core、PFC、紋狀體、擴展杏仁核） |\n| A/B 測試、留存指標、variable reward 的產品版 | 遺傳率（heritability）是「群體變異分配」不是「個人機率」 | 耐受、戒斷、渴求、敏化、allostasis、dark side 的機制 |\n| profiling 驅動優化的方法論（量測→診斷→優化→佐證） | | 目標導向→習慣→強迫的控制權轉移 |\n| | | 行為成癮（賭博／遊戲／社群）的神經同源性 |\n| | | 疾病模型 vs 學習模型之爭、脆弱性、治療機制 |\n\n寫作時：左欄直接拿來當橋（不解釋）；中欄給一句話喚起再往前；右欄是本書真正要慢慢講清楚的內容，**worked example 與「直覺的陷阱」優先服務右欄**。\n\n## 語言規範\n\n- 繁體中文，台灣慣用語。第二人稱「你」直接對讀者說話。\n- **技術與專有名詞**：第一次出現給「中文（English）」，之後可只用中文。**人名**：第一次出現給「中譯（原文，生卒／關鍵年份若關鍵）」，之後用中譯。\n- **嚴禁簡體中文字／詞**（这/们/个/为/启/说/题/类/变/优/构/识/认/觉/译/选/边/过/还/进/运/层/会/图/测/软/应/实/发/经/时/间/关/见/现/对/标/简/论/节…等，lint 會逐字元掃）。\n- 台灣用語基準：神經傳導物（不用「神經遞質」）、多巴胺（dopamine）、獎賞（reward，不用「奖励」式詞）、增強（reinforcement）、預測誤差（prediction error）、設定點（setpoint）、復發（relapse）、戒斷（withdrawal）、渴求（craving）。\n\n### 關鍵術語對照表（全書一致，首次出現用「中文（English）」）\n\n| 中文 | English | 全書固定縮寫／約定 |\n|---|---|---|\n| 多巴胺 | dopamine | DA |\n| 獎賞預測誤差 | reward prediction error | RPE（≈ RL 的 TD error） |\n| 想要 | wanting／incentive salience（誘因顯著性） | wanting=想要；**不等於**快感 |\n| 喜歡 | liking／hedonic impact（快感衝擊） | liking=喜歡；由類鴉片熱點中介 |\n| 誘因敏化（理論） | incentive sensitization (theory) | 想要曲線越爬越高 |\n| 異穩態 | allostasis | 設定點向下漂移 |\n| 對立歷程（理論） | opponent-process theory | b-process 增強 → 耐受／戒斷 |\n| 黑暗面 | dark side | 正增強→負增強（為解除痛苦而用） |\n| 耐受 | tolerance | |\n| 戒斷 | withdrawal | |\n| 渴求 | craving | cue 觸發的 wanting 爆發 |\n| 線索 | cue | cue→action 條件化 |\n| 失樂／快感缺失 | anhedonia | liking 基線塌陷 |\n| 腹側被蓋區 | ventral tegmental area | VTA（DA 神經元起點） |\n| 伏隔核 | nucleus accumbens | NAc（殼 shell／核 core） |\n| 前額葉皮質 | prefrontal cortex | PFC；背外側 dlPFC |\n| 紋狀體 | striatum | 腹側 / 背內側 DMS / 背外側 DLS |\n| 中腦邊緣多巴胺路徑 | mesolimbic dopamine pathway | VTA→NAc |\n| 擴展杏仁核 | extended amygdala | dark side／抗獎賞系統所在 |\n| 變動比率（排程） | variable-ratio (schedule) | VR（吃角子老虎） |\n| 後效管理 | contingency management | CM |\n| 減害 | harm reduction | |\n| 童年逆境經驗 | adverse childhood experiences | ACE |\n| 遺傳率 | heritability | 群體變異分配，非個人機率 |\n| 腦部疾病模型 | brain-disease model of addiction | BDMA |\n\n**這幾組對應全書不得漂移**：DA = 多巴胺；RPE = 獎賞預測誤差；wanting = 想要（誘因顯著性，**不是**快感）；liking = 喜歡（快感）。\n\n### 關鍵人名對照表（首次出現用「中譯（原文，生卒／關鍵年份）」）\n\n| 中譯 | 原文 | 關鍵歸屬 |\n|---|---|---|\n| 奧爾茲 | James Olds, 1922–1976 | 1954 ICSS／「快感中樞」誤稱（與米爾納） |\n| 米爾納 | Peter Milner, 1919–2018 | 1954 ICSS |\n| 舒爾茨 | Wolfram Schultz | 1997 dopamine = RPE |\n| 戴揚 | Peter Dayan | 1997 RPE（計算） |\n| 蒙塔古 | P. Read Montague | 1997 RPE（計算） |\n| 貝里奇 | Kent Berridge | wanting/liking 分離、誘因敏化 |\n| 羅賓森 | Terry Robinson | 誘因敏化（1993，與貝里奇） |\n| 艾佛瑞特 | Barry Everitt | actions→habits→compulsions |\n| 羅賓斯 | Trevor Robbins | actions→habits→compulsions |\n| 庫伯 | George Koob | allostasis／dark side |\n| 勒莫阿爾 | Michel Le Moal | allostasis（與庫伯） |\n| 索羅門 | Richard Solomon | 對立歷程理論（1974） |\n| 萊什納 | Alan Leshner | 1997「成癮是腦部疾病」 |\n| 沃爾科夫 | Nora Volkow | 疾病模型（2016 NEJM） |\n| 路易斯 | Marc Lewis | 學習模型《The Biology of Desire》(2015) |\n| 海曼 | Gene Heyman | 選擇模型《Addiction: A Disorder of Choice》(2009) |\n| 哈特 | Carl Hart | 環境／脈絡、批評藥理過度聚焦 |\n| 亞歷山大 | Bruce Alexander | Rat Park（1970s–80s） |\n| 羅賓斯（Lee） | Lee Robins | 越戰退伍軍人海洛因研究（1970s） |\n| 史金納 | B. F. Skinner | 變動比率增強排程 |\n| 塞帕 | Cameron Sepah | 「多巴胺排毒」一詞（2019，承認名稱錯） |\n\n（注意：Trevor Robbins 與 Lee Robins 是兩個不同人，拼法相近，**不得混用**。）\n\n## 每章骨架（必須遵守，標題名稱逐字照抄——Tier-1 lint 會 grep 這些標題，順序固定）\n\n1. **章首**：`# chNN — 章名：副標`，緊接 blockquote：\n   `> **本章解決什麼問題**：…（3-5 行，這章在全書地圖的位置、為什麼存在、跟前後章的關係）`\n   每個 Part 的第一章在 blockquote 後放**全書 ASCII 路線圖**（基準圖在 outline.md，照抄並把「◄你在這裡」標到本 Part；CJK=2 欄對齊）。讀者偏好架構圖先行。\n2. `## 從你已知的出發` — 橋接段：把本章核心概念錨定在讀者的後端／系統工程實戰直覺上，要具體（RPE≈TD error、正回饋無 backpressure、setpoint 漂移、快取熱路徑、variable reward、profiling 方法論），不要泛泛而談。\n3. **核心內容**（多個 `##` section，深入機制與直覺）。歷史敘事服務於機制理解，不是編年史——講 Olds、Schultz、Berridge 是為了講清楚機制怎麼被發現、怎麼被修正，不是排年表。\n4. `## 直覺的陷阱` — **本書招牌段落**（故障視角的科普版）：這個主題**最常被誤解成什麼科普迷思**、錯誤直覺**會在哪一步把你帶溝裡**、**怎麼自我察覺**（什麼徵兆代表你其實信了迷思）。用表格或條列。本主題迷思密度極高，這段是全書最有價值的段落之一。必拆的招牌迷思：「多巴胺是快感分子／讓你爽」「快感中樞」「多巴胺排毒」「成癮全是環境（Rat Park 過度推廣）」「成癮＝意志力問題」「遺傳率 50% ＝你有一半機率會上癮」「行為成癮不是真的成癮」——這些都要正面拆解，給正解。\n5. `## 紙上推演` — 動手做的形式（**純思想實驗／紙上推演**，無 Python、無真實世界自我追蹤）。每章 2~4 題，標注難度（★~★★★）與預估時間（**[NN 分鐘]**）。題型：預測一個研究的結果再對答案、找出一個壞論證的破綻、把一句白話宣稱翻成機制、設計一個假想實驗、口頭重講一條因果鏈、把一個現象歸位到「想要/喜歡 × 哪段迴路」。題目後緊接 `### 推演解答` 給完整解答與討論（為什麼這樣想、常見錯路）。**禁止任何要讀者寫睡眠日誌／記憶測驗／自我追蹤的題目**——一律紙上推演。\n6. `## 自我檢核` — 5~8 個問題，**口頭自答**：講得出來才算過關，講不清楚＝還沒懂。對齊「能不能把這個概念講給另一個工程師聽」的深度，**優先出「為什麼」而不是「是什麼」**。\n7. `## 延伸閱讀` — 真實連結（以 `_meta/landscape-2026-06.md` 驗證過的為優先），每條一句話說明值得讀什麼、讀哪一段。\n\n## 深度標準\n\n- **每章至少一個 worked example**：帶具體東西、一步一步走到底的完整過程，不准跳步。這四本書的 worked example 是「**一條走到底的機制鏈**」或「**一個真實研究的數字逐步解讀**」。本書的合格樣態：\n  - 把 Schultz 1997 的 dopamine 訊號三段（非預期獎賞→正 RPE／已預測→無反應且時點前移到 cue／預期落空→負 RPE 跌破基線）當成 RL 的 TD 更新，**一步步走完一個 episode**。\n  - 把一個吃角子老虎的 variable-ratio 排程，用具體數字算出「為什麼最大的正向預測誤差出現在最不可預測時」。\n  - 把越戰退伍軍人研究的數字（赴越前 ~0.4% → 在越南 ~20% 成癮 → 返美 8–12 個月降回 ~1%、逾 90% 自然戒斷）**逐步解讀**，並明確標出哪些是穩固數字、哪些要 hedge。\n  - 把「想要曲線爬升、喜歡曲線塌陷」的剪刀差，用一個假想時間軸**逐期歸位**（這期動的是敏化還是 allostasis）。\n  - 把一個遺傳率區間（~40–60%、因物質而異）**逐步翻譯**成「群體變異分配」而非「個人宿命」，示範誤讀會錯在哪。\n- **嚴謹度的誠實標示**：每個機制宣稱明確標示自己是哪一級——\n  - 「**這是穩固共識**」（如：dopamine ≠ 快感分子、VR 最抗消弱、dopamine 報 RPE 是主導模型）；\n  - 「**這是主流假說但有爭議／在動物模型清楚、人類較間接**」（如：誘因敏化對 dopamine 角色的解釋仍與其他框架並存；ventral→dorsal 轉移主要建立在動物實驗）；\n  - 「**這是迷思，正解是…**」（如：快感中樞、多巴胺排毒、Rat Park 過度推廣、遺傳率＝個人機率）。\n  - **禁止「顯然」「眾所周知」「眾所皆知」「不言而喻」**；禁止把假說偽裝成定論、把一方立場寫成共識。\n- **脊椎每章復現**：每章至少明確做一次脊椎歸位動作（這是「想要」還是「喜歡」？哪段迴路被劫持？），並在合適處回到「兩條曲線分岔」這張圖。\n- **每個概念給「它在解什麼問題」**：RPE 解什麼、誘因敏化解什麼、allostasis 解什麼、dark side 解什麼。禁止無動機的定義。\n- 寧深勿廣，不灌水。每章 5,000~9,000 中文字，依主題深度調整（機制地基章可偏厚）。\n\n## 事實正確性（零信任事實觀）\n\n神經科學／心理學科普充斥被過度簡化、被推翻、或仍有爭議的「事實」，本主題尤其嚴重。凡是版本、數字、效應量、年份、歸屬、樣本數，**一律當作可能過時或被誤傳**，必須查證並標注爭議。\n\n- **以 landscape 為錨**：人物、年份、歸屬、引文、效應量、機制宣稱、學界爭議現況一律以 `_meta/landscape-2026-06.md` 為事實基準，**不憑記憶**。landscape 的標記語義：✅ 可直接照寫；⚠️ 照「保守版」寫、別給死數字、別擴張；❌ 通行說法是錯的、照正確版寫（這些是「直覺的陷阱」段最該守的點）；🔶 真實學界爭議、**必須兩造並陳、不裁決**。\n- **每章 3–8 次 web 查證**：landscape 沒有的本章特定細節自行用 WebSearch／WebFetch 查證並 hedge；傳說／軼事要標明是傳說。\n- **時效性／可爭議事實標時點**：`（2026-06）`，並 hedge（用「約」「目前主流」「在動物模型中」「因物質而異」這類措辭，不寫死）。\n- **重大爭議呈現雙方，不替讀者選邊斷言**。兩處紅線爭議：\n  - **疾病模型 vs 學習／選擇模型**（landscape §六）：兩造各給最強版本（Leshner 1997／Volkow 2016 NEJM vs Lewis 2015／Heyman 2009／Hart），明說連批評者都承認腦確實改變，爭的是「該不該叫疾病」這個框架／政策層次。作者不下判決，**不可用脊椎替疾病模型背書**。\n  - **Rat Park**（landscape §七）：必 hedge——直接複製不穩（Petrie 失敗、2020 僅概念性複製）、方法有疵（口服嗎啡、樣本小）；環境是調節因素**之一**、非唯一；脆弱性是真的（~15% 使用者依賴）。**不可寫成「成癮全是環境」。**\n- **遺傳率數字鐵律**：用「約 40–60%、且因物質與研究而異」這類區間語，**不要寫死單一數字**；遺傳率是群體變異分配、非個人宿命、非基因決定論。\n- **醫療免責**：凡觸及治療、戒斷、危機、藥物，正文同段明說「機制說明，非醫療建議」（見「這本書是什麼、不是什麼」）。\n\n## 格式\n\n- Markdown。主要層級 `##`，次層 `###`。\n- 圖：ASCII diagram（全書地圖、獎賞迴路 VTA→NAc→PFC、wanting/liking 兩條曲線分岔、RPE 三段訊號時序、目標導向→習慣→強迫的控制權下移、allostasis 設定點漂移），必須通過 `check_diagrams.py` 檢查（CJK=2 欄寬）。「兩條曲線分岔」是全書脊椎視覺，在獎賞迴路章定版、後續章照抄變形。\n- 多行機制鏈／訊號推導用 ```text 圍欄區塊（每步右側可加「← 為什麼」短註）；禁止把長推導硬塞進行內。表格用於術語對照、迷思清單（「直覺的陷阱」段）、機制對照、研究數字對照。\n- 跨章引用格式：裸寫`（chNN）`，不寫死檔名路徑。\n- **四本書完全獨立、互不引用**——本書不引用集合論、機率、其他興趣書，也不引用 AI Infra 轉職書。系統面／工程面只當橋接直覺用，不外連書目。\n\n## 語氣\n\n工程師對工程師。冷靜、直接、有觀點（可以寫「我認為這是整個成癮神經科學最被誤傳的一句話」「dopamine≈RPE 是我見過最划算的一座橋」）。**不販賣神話、不喊「太神奇了」、不販賣「大腦好可怕」式恐慌**——震撼靠把機制講清楚，形容詞是結果不是手段。允許冷幽默。\n\n對成癮者**不獵奇、不道德化、不浪漫化**：成癮是迴路被劫持的工程故障，講機制時帶著「換成這套迴路、給足脆弱性與環境，你我都會掉進去」的冷靜，而不是「他們意志力不夠」的居高臨下。最敏感的兩處——疾病 vs 學習之爭、Rat Park——語氣最克制：兩造各給最強版本＋各自盲點，明說「這是價值與框架之爭，本書不替你裁決」。\n\n每個符號／名詞出場都有白話直覺在旁邊（DA 報的是 diff、wanting 是趨近的油門、liking 是爽的儀表、allostasis 是被偷偷改低的 setpoint）；但也不假裝簡單——該慢的地方明說「這裡值得你停十分鐘，因為整本書都靠這個 wanting≠liking 的分岔」。把 dopamine 真實角色、wanting/liking 分離、dark side 這三處寫到讓讀者起雞皮疙瘩，但靠的是把邏輯走清楚，不是驚嘆號。\n"}]}</script>

<script>
(function(){
"use strict";
var NS="addct";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">大腦被劫持<br><span style="font-weight:400;font-size:12px;color:var(--muted)">成癮的機制</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 大腦被劫持';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
