質與研究而異）；**不是**「某人有多少機率成癮」——是群體變異分配，非個人宿命。 | ch01 |\n| 童年逆境經驗 | adverse childhood experiences | ACE | 兒少時期的虐待、忽視、家庭功能障礙等創傷事件；公認的後續物質使用與成癮風險因子，常與遺傳脆弱性交互作用。 | ch01 |\n| 表觀遺傳 | epigenetics | — | DNA 序列不變、但基因表達因環境（如 ACE、壓力）而改變的機制（如 DNA 甲基化）；候選的「環境×基因」交互作用橋樑，成癮表觀遺傳仍是活躍研究、非定論。 | ch11 |\n| HPA 軸 | hypothalamic–pituitary–adrenal axis | HPA | 壓力反應的核心神經內分泌迴路；ACE 可透過表觀遺傳改變 HPA 軸的壓力反應基線，提高成癮脆弱性。 | ch11 |\n| 糖皮質素 | glucocorticoid | — | HPA 軸啟動後腎上腺分泌的壓力荷爾蒙（如皮質醇）；慢性壓力使其長期高濃度，影響 PFC 功能與獎賞迴路的敏感性。 | ch11 |\n\n---\n\n## G. 框架爭論\n\n| 中文 | English | 縮寫 | 白話一句話定義（口試用） | 首次出現 |\n|---|---|---|---|---|\n| 腦部疾病模型 | brain-disease model of addiction | BDMA | Leshner 1997 / Volkow 2016 NEJM：成癮是腦結構與功能改變後形成的疾病，主張減少汙名、以醫療介入。 | ch10 |\n| 學習模型 | learning model of addiction | — | Lewis 2015（《The Biology of Desire》）：成癮是深度動機性學習造成的腦改變，不等於「疾病」；腦會改變不代表腦「病了」。 | ch10 |\n| 選擇模型 | choice model of addiction | — | Heyman 2009（《Addiction: A Disorder of Choice》）：流行病學顯示多數成癮者自然緩解、對後果敏感，更像受選擇控制的行為。 | ch10 |\n| 自然緩解 | natural remission | — | 未接受正式治療而自行停止成癮行為；選擇模型引為論據，顯示成癮不是完全不可逆的慢性腦病。 | ch10 |\n| 快感中樞 | pleasure centers | — | Olds 1954 對 ICSS 腦區的**誤稱**；現代理解是「增強／想要」系統而非「快感」——這是本書脊椎（wanting≠liking）的歷史第一個伏筆。 | ch01 |\n| 多巴胺排毒 | dopamine detox / dopamine fasting | — | Sepah 2019 推廣的概念，爆紅版本是**偽科學**（無法「排掉」DA）；Sepah 自己也承認名稱錯誤，原版其實是針對衝動行為的刺激控制／CBT。 | ch01 |\n\n---\n\n## H. 治療機制\n\n| 中文 | English | 縮寫 | 白話一句話定義（口試用） | 首次出現 |\n|---|---|---|---|---|\n| 後效管理 | contingency management | CM | 以具體獎勵（代幣、券）增強目標行為（如驗尿陰性）的心理社會治療；統合分析顯示是目前最有效的心理社會治療之一，尤其對興奮劑成癮有效（目前無有效藥物）。停止獎勵後效果可能衰減。 | ch14 |\n| 認知行為治療 | cognitive behavioral therapy | CBT | 改變思維模式與行為模式的心理治療；刺激控制（cue 管理）是其中一個工具，也是「多巴胺排毒」原版概念的真正機制。 | ch01 |\n| 減害 | harm reduction | — | 不以立即戒斷為唯一目標，優先降低用藥風險與傷害的公衛策略（含 naloxone 預備、針具交換、監督注射、芬太尼試紙）；主流公衛中證據支持，仍有政策爭議。 | ch14 |\n| 促效劑 | agonist | — | 與受體結合並啟動它的藥物；如美沙酮（完全 μ 鴉片促效劑）、丁基原啡因（部分 μ 鴉片促效劑）用於類鴉片使用障礙的替代治療。 | ch04 |\n| 部分致效劑 | partial agonist | — | 結合受體但啟動強度低於完全促效劑的藥物；丁基原啡因（buprenorphine）即此類，在診間可開立，「上限效應」降低過量風險。 | ch14 |\n| 拮抗劑 | antagonist | — | 結合受體但不啟動它（同時阻斷其他促效劑）的藥物；納曲酮（naltrexone）阻斷鴉片受體，對已完成脫癮、自願選擇者有效。 | ch07 |\n| 美沙酮 | methadone | — | 完全 μ 鴉片促效劑；須在聯邦核准的鴉片治療計畫（OTP）每日監督下給藥，是類鴉片使用障礙的主要藥物療法之一。 | ch06 |\n| 丁基原啡因／丁丙諾啡 | buprenorphine | — | 部分 μ 鴉片促效劑；可由醫師在診間或遠距醫療開立，取得較易；**注意：勿寫成「布托啡諾」（butorphanol 是另一種不同藥物）**。 | ch14 |\n| 納曲酮 | naltrexone | — | μ 鴉片受體拮抗劑；阻斷鴉片作用，長效針劑（XR-naltrexone）需先完成脫癮後使用；對自願且能維持脫癮起始者有效。 | ch14 |\n| 納洛酮 | naloxone | — | 快速作用的鴉片拮抗劑，用於逆轉鴉片過量（急救用）；減害策略的核心工具之一。 | ch14 |\n| 類鴉片使用障礙 | opioid use disorder | OUD | DSM-5 的鴉片類藥物成癮診斷分類；三大藥物療法（MOUD）為美沙酮、丁基原啡因、納曲酮。 | ch14 |\n\n---\n\n## I. 重要研究與人名（首次出現）\n\n| 中文 | 原文 | 關鍵歸屬 | 首次出現 |\n|---|---|---|---|\n| 奧爾茲 | James Olds（1922–1976） | 1954 ICSS，與米爾納共同發現「獎賞增強系統」（被誤稱「快感中樞」） | ch01 |\n| 米爾納 | Peter Milner（1919–2018） | 1954 ICSS，奧爾茲的共同研究者 | ch02 |\n| 舒爾茨 | Wolfram Schultz | 1997 年確立 dopamine = RPE 三段式訊號（與戴揚、蒙塔古） | ch01 |\n| 戴揚 | Peter Dayan | 1997 RPE（計算神經科學面） | ch03 |\n| 蒙塔古 | P. Read Montague | 1997 RPE（計算神經科學面） | ch03 |\n| 貝里奇 | Kent Berridge | wanting/liking 分離、誘因敏化理論（與羅賓森） | ch01 |\n| 羅賓森 | Terry Robinson | 誘因敏化理論（Robinson & Berridge 1993） | ch01 |\n| 艾佛瑞特 | Barry Everitt | actions→habits→compulsions 框架（與羅賓斯） | ch05 |\n| 羅賓斯（T.） | Trevor Robbins | actions→habits→compulsions 框架（與艾佛瑞特）；注意：與 Lee Robins 不同人 | ch05 |\n| 庫伯 | George Koob | allostasis／dark side 模型（與勒莫阿爾） | ch01 |\n| 勒莫阿爾 | Michel Le Moal | allostasis 模型（Koob & Le Moal 2001） | ch06 |\n| 索羅門 | Richard Solomon | 對立歷程理論（Solomon & Corbit 1974） | ch04 |\n| 萊什納 | Alan Leshner | 1997「成癮是腦部疾病」政策論壇文章（Science） | ch10 |\n| 沃爾科夫 | Nora Volkow | 疾病模型（Volkow/Koob/McLellan 2016 NEJM）；D2 受體下調的 PET 研究 | ch02 |\n| 路易斯 | Marc Lewis | 學習模型《The Biology of Desire》（2015） | ch10 |\n| 海曼 | Gene Heyman | 選擇模型《Addiction: A Disorder of Choice》（2009） | ch10 |\n| 哈特 | Carl Hart | 環境／脈絡強調、批評藥理中心論；《High Price》（2013）、《Drug Use for Grown-Ups》（2021） | ch10 |\n| 亞歷山大 | Bruce Alexander | Rat Park 研究（1970s–80s）；環境是成癮調節因素的代表性實驗（複製不穩，須 hedge） | ch12 |\n| 羅賓斯（L.） | Lee Robins | 越戰退伍軍人海洛因研究（1970s，經典論文 1977）；環境脈絡改變是強力調節因素 | ch12 |\n| 史金納 | B. F. Skinner | 變動比率增強排程；賭博是 VR 的經典例 | ch09 |\n| 塞帕 | Cameron Sepah | 2019 「多巴胺排毒」一詞的來源（本人承認名稱在神經科學上是錯的） | ch15 |\n\n---\n\n> **口試快攻建議**：先從 B 欄的「RPE → wanting vs liking → allostasis → dark side」這條主軸講到底，再沿 E 欄（行為成癮）和 D 欄（消弱≠抹除）延伸，最後用 G 欄（框架爭論）收尾時明說「這是框架之爭，本書不替你裁決」。這樣一趟走下來，正好覆蓋全書六條驗收主線。\n"}, {"id": "appendix-b-studies-and-people", "file": "appendix-b-studies-and-people.md", "group": "附錄", "title": "附錄 B — 關鍵研究與人物速查表", "md": "# 附錄 B — 關鍵研究與人物速查表\n\n> 本附錄從各章實際內容萃取，數字、年份、歸屬以 `_meta/landscape-2026-06.md` 為錨點。標記語義：✅ 穩固共識；⚠️ 有不確定性，保守閱讀；❌ 通行說法有誤，已給正解；🔶 真實學界爭議，兩造並陳。\n\n---\n\n## 一、關鍵研究速查\n\n以下各條格式：**作者＋年份＋期刊 — 推翻什麼直覺 / 留下什麼結論 — 對應章**\n\n### 1. Olds & Milner (1954)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | James Olds 與 Peter Milner |\n| 年份 | 1954（首次觀察 1953） |\n| 期刊 | *Journal of Comparative and Physiological Psychology* 47(6):419–427 |\n| 推翻什麼直覺 | ❌「快感中樞（pleasure centers）」這個命名是誤稱——電刺激驅動的是「再來一次」的趨近衝動（wanting／增強系統），而非純粹的主觀快感（liking） |\n| 留下什麼結論 | ✅ 大腦有一套可被電直接驅動的獎賞增強系統，能蓋過食物與水等基本生存需求；是「想要≠喜歡」的歷史第一個伏筆 |\n| 對應章 | ch01、ch02 |\n\n> ⚠️ 年份注意：正式論文 1954；若寫「1953」需注明是首次觀察、論文為 1954。\n\n---\n\n### 2. Schultz, Dayan & Montague (1997)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Wolfram Schultz、Peter Dayan、P. Read Montague |\n| 年份 | 1997 |\n| 期刊 | *Science* 275(5306):1593–1599 |\n| 推翻什麼直覺 | ❌「多巴胺是爽感分子／讓你 high 的訊號」——實驗顯示 DA 報的是**與期望的差值（預測誤差 RPE）**，而非獎賞本身的快感 |\n| 留下什麼結論 | ✅ DA 神經元放電呈三段式：非預期獎賞→正 RPE、已預測獎賞→無反應（時點前移到 cue）、預期落空→負 RPE 跌破基線；此訊號等同 RL 的 TD error |\n| 對應章 | ch03 |\n\n> ⚠️ 嚴謹標注：RPE 假說是主導但非唯一模型（近年有 DA 異質性與向量 RPE 等討論）；Schultz 2016 綜述仍持此框架。\n\n---\n\n### 3. Robinson & Berridge (1993)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Terry Robinson 與 Kent Berridge |\n| 年份 | 1993 |\n| 期刊 | *Brain Research Reviews* 18(3):247–291 |\n| 推翻什麼直覺 | ❌「成癮者繼續用藥是因為還在爽」——實驗指出 wanting（誘因顯著性）和 liking（快感）是兩套可分離的系統，成癮中兩者分岔：wanting 越爬越高、liking 不增反降 |\n| 留下什麼結論 | ✅ **誘因敏化理論（incentive-sensitization theory）三支柱**：間歇用藥讓易感者中腦邊緣 DA 系統敏化→ 敏化極持久（停藥後仍在）→ DA 中介「想要」（被 cue 觸發的趨近衝動），不中介快感 |\n| 對應章 | ch04、ch08 |\n\n> ⚠️ 誠實標注：誘因敏化框架雖極具影響力，仍與 RPE 學習訊號等其他框架並存。30 週年回顧（Robinson & Berridge 2025, *Annual Review of Psychology*）確認三支柱仍是核心。\n\n---\n\n### 4. Berridge & Robinson (6-OHDA 耗盡實驗，1989/1993 系列)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Kent Berridge 與 Terry Robinson |\n| 年份 | 1989（6-OHDA 核心實驗）；理論整合 1993 |\n| 實驗邏輯 | 用 6-OHDA 神經毒素摧毀大鼠幾乎全部前腦 DA 神經元（降至正常約 1%），再測**味覺反應（taste reactivity）**：甜味仍引發節律性伸舌（liking 反應不變），但動物對食物的趨近動機（wanting）歸零 |\n| 推翻什麼直覺 | ❌「沒有多巴胺就不覺得爽」——拆掉 DA 之後，liking 原封不動，wanting 才歸零 |\n| 留下什麼結論 | ✅ DA 是「想要」的必要條件，**不是**「喜歡」的必要條件；雙重分離（見 Wyvell & Berridge 2001 反向實驗）讓此命題站得很穩 |\n| 對應章 | ch04 |\n\n---\n\n### 5. Wyvell & Berridge (2001)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Cindy Wyvell 與 Kent Berridge |\n| 年份 | 2001 |\n| 期刊 | *Journal of Neuroscience* |\n| 推翻什麼直覺 | 「提高多巴胺就會讓人更快樂」——提高 DA（安非他命 NAc 微量注射）選擇性地調高了 wanting，liking 的味覺反應分數並未同步上升 |\n| 留下什麼結論 | ✅ 與 6-OHDA 耗盡實驗合為雙重分離的直接展示：DA 調高→wanting 上升、liking 不動；DA 耗盡→wanting 歸零、liking 不動 |\n| 對應章 | ch04 |\n\n---\n\n### 6. Castro & Berridge (2014)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | David Castro 與 Kent Berridge |\n| 年份 | 2014 |\n| 期刊 | *Journal of Neuroscience* 34(12):4239 |\n| 結論 | ✅ 精確定位 NAc shell 約 1 mm³ 的類鴉片快感熱點（hedonic hotspot）：刺激此處的 mu/delta/kappa 鴉片受體與內源性大麻素受體，可放大甜味 liking 反應；此熱點**不靠多巴胺** |\n| 對應章 | ch04 |\n\n---\n\n### 7. Solomon & Corbit (1974)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Richard Solomon 與 J. D. Corbit |\n| 年份 | 1974 |\n| 期刊 | *Psychological Review* 81(2):119–145 |\n| 推翻什麼直覺 | 「同劑量越來越不爽只是藥效消失」——對立歷程說的是大腦**主動學習拮抗**：b-process（對立歷程）因反覆刺激而越來越強、越快啟動、持續越久 |\n| 留下什麼結論 | ✅ 任何強烈情緒狀態啟動後，中樞自動以對立方向（b-process）削弱它；反覆刺激讓 b-process 增強——這同時解釋了耐受（a-process 被削）與戒斷（b-process 持續卻沒有 a-process 的 a 端） |\n| 對應章 | ch06 |\n\n---\n\n### 8. Koob & Le Moal (2001)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | George Koob 與 Michel Le Moal |\n| 年份 | 2001 |\n| 期刊 | *Neuropsychopharmacology* 24:97–129 |\n| 推翻什麼直覺 | 「停藥後只要撐過急性戒斷就能恢復正常」——異穩態說的是獎賞**設定點本身被向下重置**，停藥後長期的 anhedonia 是生理基線塌陷，不只是「少了爽感」 |\n| 留下什麼結論 | ✅ **異穩態（allostasis）模型**：成癮是獎賞系統螺旋式失調，設定點向下漂移；dark side（黑暗面）指成癮晚期驅力從正增強（為了爽）轉為負增強（為了解除痛苦），涉及擴展杏仁核的抗獎賞系統（CRF、dynorphin） |\n| 對應章 | ch06 |\n\n---\n\n### 9. Volkow et al. (多篇，1990s–2000s PET 影像系列)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Nora Volkow 等人（多篇） |\n| 年份 | 1990s–2000s（系列研究） |\n| 方法 | PET（正子射出斷層掃描）；對照成癮者 vs 健康對照 |\n| 結論 | ✅ 成癮者紋狀體（striatum）D2 受體密度顯著低於對照（平均約少 15–20%，跨越可卡因、酒精、甲基安非他命多個物質，戒除數月後仍存在）；D2 下調是 anhedonia（對日常正常獎賞反應鈍化）的分子基礎 |\n| 推翻什麼直覺 | ❌「成癮者多巴胺乾涸，大腦分泌不出 DA」——問題是**受體端（D2）下調**，不是分泌端消失 |\n| 對應章 | ch02、ch05、ch06、ch14 |\n\n---\n\n### 10. Volkow, Wang & Fowler et al. (給藥途徑與速度，系列研究)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Nora Volkow、Gui-Jean Wang、Joanna Fowler 等 |\n| 典型年份 | 約 2000s（系列） |\n| 結論 | ✅ 同量利他能（methylphenidate）：靜脈注射引發明顯主觀「high」感；口服幾乎無愉悅效應——**起效速度越快，RPE 上升斜率越陡，誘因敏化與可塑性改變越劇烈** |\n| 對應章 | ch03、ch06 |\n\n> ⚠️ 具體秒數數字因物質與個體差異有變動，hedge 為「起效越快 RPE 越陡、成癮性越高」是穩固結論。\n\n---\n\n### 11. Everitt & Robbins (框架綜述，2005 / 2016)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Barry Everitt 與 Trevor Robbins |\n| 年份 | 2005（*Nature Neuroscience*）；2016（*Annual Review of Psychology*） |\n| 推翻什麼直覺 | 「成癮行為是有意識的持續選擇」——習慣化後控制路徑已繞過目標導向系統，「知道有害仍停不下來」不是選擇忽視，是路由被改了 |\n| 留下什麼結論 | ✅ **actions → habits → compulsions** 框架：控制權從 DMS＋PFC（目標導向）轉移到 DLS（習慣），PFC 功能低下使煞車失靈；腹側→背側紋狀體的控制轉移在動物模型清楚展示 |\n| 對應章 | ch05 |\n\n> ⚠️ ventral→dorsal 轉移主要建立在動物（大鼠/猴）模型；人類證據較間接。\n\n---\n\n### 12. Nestler, Barrot & Self (2001)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Eric Nestler、Michel Barrot、David Self |\n| 年份 | 2001 |\n| 期刊 | *Proceedings of the National Academy of Sciences* 98(20):11042–11046 |\n| 結論 | ⚠️ ΔFosB（delta FosB，一種轉錄因子）因異常長的半衰期在 NAc 中慢性累積，停藥後仍持續數週到數個月；被稱為成癮的「持續性分子開關」，是突觸結構長期改變的候選機制之一 |\n| 推翻什麼直覺 | 「短期停藥後神經迴路就能歸零」——ΔFosB 提示結構改變可以在停藥後延續 |\n| 對應章 | ch08、ch13 |\n\n> ⚠️ ΔFosB 研究主要建立在齧齒類模型，人類研究較間接；寫為「候選機制、研究中、欣賞層級」。\n\n---\n\n### 13. Leshner (1997)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Alan Leshner（時任 NIDA 主任） |\n| 年份 | 1997 |\n| 期刊 | *Science* 278(5335):45–47（政策論壇文章，非 editorial） |\n| 主張 | 🔶 用藥起於自願，但長期重度用藥造成腦部改變，形成「神經化學開關」，使戒斷極其困難——故成癮本質上是腦部疾病，需以醫療對待 |\n| 政策目的 | 減少汙名，推動以醫療替代刑事化框架 |\n| 對應章 | ch10 |\n\n---\n\n### 14. Volkow, Koob & McLellan (2016)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Nora Volkow、George Koob、A. Thomas McLellan |\n| 年份 | 2016 |\n| 期刊 | *New England Journal of Medicine* 374(4):363–371 |\n| 結論 | 🔶 整合至 2016 年水準的**腦部疾病模型（BDMA）**：強調獎賞系統、執行功能（PFC 自我控制下降）、動機/驅力三系統的神經適應；目標之一是推動以醫療替代汙名化 |\n| 對應章 | ch10 |\n\n---\n\n### 15. Hall, Carter & Forlini (2015)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Wayne Hall、Adrian Carter、Cynthia Forlini |\n| 年份 | 2015 |\n| 期刊 | *Lancet Psychiatry* 2(1):105–110 |\n| 主張 | 🔶 質疑 BDMA 的人體證據強度與臨床兌現：幾乎沒有人體資料顯示成癮像帕金森氏症那樣是腦部病變；把成癮比作神經退化疾病，在科學上可能誇大了不可逆性 |\n| 對應章 | ch10 |\n\n---\n\n### 16. Robins et al. (1977)；Robins (1993 回顧)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Lee Robins 等（1977）；Robins 回顧（1993） |\n| 年份 | 1977 年經典；1993 年回顧刊於 *Addiction* |\n| 核心數字 | ✅ 赴越前成癮率約 0.4%→在越南約 20% 成癮→返美 8–12 個月降回約 1%；在越曾成癮者中逾 90% 幾乎立即停止成癮，後續復發不常見 |\n| 推翻什麼直覺 | 「海洛因藥理力量強，一旦成癮幾乎不可能自行戒斷」——極端的環境／脈絡切換（cue 環境與社會角色同時更換）可讓超過 90% 成癮者自然戒斷 |\n| 對應章 | ch12、ch13 |\n\n> ⚠️ 此結果高度依賴「徹底換掉 cue 環境＋社會角色重建」的極端組合，不能外推到一般街頭成癮；且不證明「藥理因素無關」。年份建議寫「1970s（經典 1977）」。\n\n---\n\n### 17. Alexander et al. (1978–1981，Rat Park)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Bruce Alexander 與同事，Simon Fraser University |\n| 年份 | 1978（*Psychopharmacology*）；1981（*Pharmacology Biochemistry and Behavior*） |\n| 核心發現 | 🔶 豐富化環境（Rat Park）的大鼠選擇嗎啡水的量，遠少於孤立籠大鼠（某些條件下孤立鼠喝量多達 19 倍），暗示環境/社會連結是重要調節因素 |\n| 推翻什麼直覺 | 「成癮純由藥物的藥理力量決定」——豐富環境可顯著降低自願攝取成癮物質的傾向 |\n| 複製問題 | ❌ 直接複製失敗（Petrie 1996 未能重現；2020 年回顧結論為「概念性支持、非直接複製」）；方法有疵（口服嗎啡的苦味混淆、樣本小、測量不一致）。**不能寫成「成癮全是環境決定」** |\n| 對應章 | ch12 |\n\n---\n\n### 18. Berridge & Robinson (2016 整合綜述)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Kent Berridge 與 Terry Robinson |\n| 年份 | 2016 |\n| 期刊 | *American Psychologist* 71(8):670–679 |\n| 結論 | ✅ 誘因敏化理論的非技術性整合：wanting/liking 分離、誘因顯著性、味覺反應實驗、成癮中兩條曲線分岔——是理解 ch04/ch08 的最直接入門 |\n| 對應章 | ch04、ch08 |\n\n---\n\n### 19. Robinson & Berridge (2025，30 週年回顧)\n\n| 欄位 | 內容 |\n|---|---|\n| 作者 | Terry Robinson 與 Kent Berridge |\n| 年份 | 2025 |\n| 期刊 | *Annual Review of Psychology* 76:29–58 |\n| 結論 | ✅ 誘因敏化三支柱在 30 年後的現況評估：三支柱仍是框架核心；承認與其他框架（allostasis、習慣化、PFC 功能低下）互補；同時回應主要批評 |\n| 對應章 | ch04、ch08 |\n\n---\n\n### 20. 後效管理（CM）統合分析（截至 2026-06）\n\n| 欄位 | 內容 |\n|---|---|\n| 類別 | 多份統合分析（單一論文未指定） |\n| 結論 | ✅ CM（後效管理）被評為**最有效的心理社會治療之一**，對興奮劑使用障礙（目前無 FDA 核准藥物）尤其突出；SAMHSA 2024 諮詢建議將激勵上限從每人每年 75 美元提高至 750 美元（部分計畫 2025-01 起） |\n| 衰減注意 | ⚠️ CM 結束後效果可能因消弱（extinction）而衰退：新學習連結在缺乏強化訊號後可能漸被舊 cue→wanting 路徑競爭回去 |\n| 對應章 | ch14 |\n\n---\n\n## 二、關鍵人物速查\n\n| 中譯（原文，生卒若關鍵） | 一句話貢獻 | 對應章 |\n|---|---|---|\n| **奧爾茲（James Olds, 1922–1976）** | 1954 年（首次觀察 1953）與米爾納意外發現大鼠會反覆自我電刺激腦內某區（ICSS）；他稱之為「快感中樞」——但現代神經科學確認那是增強/wanting 系統，此命名是本書脊椎第一個伏筆 | ch01、ch02 |\n| **米爾納（Peter Milner, 1919–2018）** | 與奧爾茲共同完成 1954 年 ICSS 實驗，奠定大腦有可被直接驅動的獎賞增強系統這一基礎發現 | ch01、ch02 |\n| **舒爾茲（Wolfram Schultz）** | 1997 年（與戴揚、蒙塔古）在猴子中腦 VTA 記錄到 DA 神經元放電的三段式 RPE 訊號，讓「DA 報的是 diff，不是爽感」成為計算神經科學最有影響力的橋樑之一 | ch03 |\n| **戴揚（Peter Dayan）** | 1997 年（與舒爾茲、蒙塔古）提供 RPE 假說的計算框架，連接神經科學實驗與強化學習中的 TD error | ch03 |\n| **蒙塔古（P. Read Montague）** | 1997 年（與舒爾茲、戴揚）提供 RPE 假說的計算框架；三人合作確立「dopamine ≈ TD error」這個跨領域橋樑 | ch03 |\n| **貝里奇（Kent Berridge）** | 確立 wanting/liking 分離：DA 中介「想要（誘因顯著性）」而非「快感」；建立 NAc shell 類鴉片快感熱點地圖；誘因敏化理論共同提出者（1993，與羅賓森） | ch04、ch08 |\n| **羅賓森（Terry Robinson）** | 1993 年（與貝里奇）提出誘因敏化理論；研究間歇用藥在易感者中誘發 DA 系統持久性敏化的機制 | ch04、ch08 |\n| **艾佛瑞特（Barry Everitt）** | 與羅賓斯（Trevor Robbins）共同提出 actions→habits→compulsions 框架，解釋成癮中控制權從目標導向系統轉移至習慣系統（DLS）的三段軌跡 | ch05 |\n| **羅賓斯（Trevor Robbins）** | 與艾佛瑞特共同研究腹側→背側紋狀體控制轉移，以及 PFC 功能低下在成癮習慣化中的角色（注意：與越戰研究者 Lee Robins 是不同人物） | ch05 |\n| **庫伯（George Koob）** | 提出異穩態（allostasis）成癮模型（2001，與勒莫阿爾）：獎賞設定點向下漂移；發展「黑暗面（dark side）」概念：成癮晚期驅力從正增強轉為負增強（擴展杏仁核的抗獎賞系統） | ch06 |\n| **勒莫阿爾（Michel Le Moal）** | 與庫伯共同提出異穩態模型（2001），把對立歷程理論延伸到設定點漂移層次 | ch06 |\n| **索羅門（Richard Solomon）** | 1974 年（與柯比特 Corbit）提出對立歷程理論（opponent-process theory）：任何強烈情緒狀態啟動後，中樞自動以對立方向削弱它；反覆刺激使 b-process 越來越強——是耐受與戒斷機制的理論根源 | ch06 |\n| **奈斯特勒（Eric Nestler）** | 實驗室研究 ΔFosB 在 NAc 中因反覆用藥而慢性累積、半衰期極長，停藥後仍持續數週，提出「持續性分子開關」概念（2001，與 Barrot、Self）——是誘因敏化持久性的分子層候選機制 | ch08、ch13 |\n| **萊什納（Alan Leshner）** | 1997 年在 *Science* 發表政策論壇文章〈成癮是腦部疾病，這很重要〉，奠定腦部疾病模型（BDMA）的政策框架；目的之一是讓社會把成癮者送進治療、而非監獄 | ch10 |\n| **沃爾科夫（Nora Volkow）** | 現任 NIDA 主任；推進 BDMA（2016 NEJM 整合，與庫伯、McLellan）；PET 影像系列研究展示 D2 受體下調、PFC 功能低下等神經影像證據 | ch03、ch05、ch06、ch10、ch14 |\n| **路易斯（Marc Lewis）** | 發展神經科學家，曾為成癮者；《The Biology of Desire》（2015）：主張成癮是深度動機學習造成的腦改變，腦改變≠腦生病（學小提琴也改變腦），疾病框架可能妨礙復原、削弱能動性信念 | ch10 |\n| **海曼（Gene Heyman）** | 《Addiction: A Disorder of Choice》（2009，哈佛大學出版社）：用大規模縱貫調查論證曾達依賴診斷者有 76–83% 最終緩解且多未接受正式治療，挑戰「慢性不可逆腦病」說 | ch10 |\n| **哈特（Carl Hart）** | 哥倫比亞大學神經科學家；《High Price》（2013）、《Drug Use for Grown-Ups》（2021）：強調逾 75–80% 使用者不會成癮（因物質與研究而異，保守引用）；批評 BDMA 把焦點過度放在藥理、忽略環境/社會脈絡與種族化政策問題 | ch10 |\n| **亞歷山大（Bruce Alexander）** | 加拿大心理學家，Simon Fraser University；1970s 末建立 Rat Park（老鼠樂園），發現豐富社交環境大鼠選擇嗎啡遠少於孤立籠大鼠，強調環境是重要調節因素（但複製問題明確，不能推成「成癮全是環境」）| ch12 |\n| **李·羅賓斯（Lee Robins）** | 華盛頓大學社會精神病學教授；1970s 越戰退伍軍人海洛因研究，記錄逾 90% 在越成癮者返美後自然戒斷，顯示環境/脈絡切換是強力調節因素（注意：與 Trevor Robbins 是不同人物，拼法相近）| ch12 |\n| **史金納（B. F. Skinner）** | 行為主義心理學家；增強排程研究確立**變動比率（VR）排程**產生最高反應率、最抗消弱——吃角子老虎、社群媒體通知、抽卡的行為黏性的行為層解釋 | ch09、ch15、ch16 |\n| **塞帕（Cameron Sepah）** | 加州執照精神科醫師；2019 年 LinkedIn 文章推廣「多巴胺排毒（dopamine fasting）」一詞，但**本人事後承認「這個詞技術上是錯的」**；原版描述的其實是針對衝動行為的 CBT／刺激控制（有實證），「排毒」的框架本身是偽科學 | ch15、ch16 |\n\n---\n\n## 三、幾組容易混淆的名字\n\n| 容易混淆的兩人 | 區別 |\n|---|---|\n| **Trevor Robbins**（羅賓斯）vs **Lee Robins**（羅賓斯） | Trevor Robbins：劍橋大學，actions→habits→compulsions 框架（與 Everitt）。Lee Robins：華盛頓大學，越戰退伍軍人海洛因研究（1970s）。英文拼法相近（Robbins vs Robins），中譯相同，須特別注意。 |\n| **Terry Robinson**（羅賓森）vs 以上兩位 | Terry Robinson：密西根大學，誘因敏化理論共同提出者（與 Berridge）。注意中譯：Robinson→羅賓森；Robbins/Robins→羅賓斯。 |\n\n---\n\n*本附錄依據各章實際出現的內容整理，數字與歸屬以 landscape-2026-06.md 為準。時效性較強之事實已標注「2026-06」。如需更新請同步 maintenance.md 掃描日誌。*\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 延伸閱讀總地圖", "md": "# 附錄 C — 延伸閱讀總地圖\n\n> 本附錄彙整全書 16 章「延伸閱讀」段落，以及 `_meta/landscape-2026-06.md` 驗證過的資源，整理成三條路線，並給出「如果只看三樣」的建議。標注「（未驗證）」的連結未在 landscape 個別確認，請自行評估可信度。絕不放編造連結——寧缺勿濫。\n\n---\n\n## 三條路線\n\n### 路線 A：往神經科學機制（更深的機制）\n\n適合讀完全書後，想把脊椎機制（RPE、wanting/liking 分離、allostasis）讀到一手文獻層次的讀者。\n\n| 資源 | 說明 | 來源 / 連結 |\n|------|------|-------------|\n| Robinson & Berridge 2025「The Incentive-Sensitization Theory of Addiction 30 Years On」(*Annual Review of Psychology*, 76:29–58) | 誘因敏化理論 30 年回顧，羅賓森（Terry Robinson）與貝里奇（Kent Berridge）親自重評三支柱、回應批評；全書脊椎（wanting/liking 分離）最完整的一手文獻。推薦讀第 I–III 節 + 「理論爭議」節 | https://www.annualreviews.org/content/journals/10.1146/annurev-psych-011624-024031 （亦可從 Berridge Lab PDF 取得） |\n| Berridge & Robinson 2016「Liking, Wanting, and the Incentive-Sensitization Theory」(*American Psychologist*, 71(8):670–679) | wanting/liking 分離的最易讀標準綜述；PDF 公開，比 1993 原作更新且清晰，是進入學術文獻的最佳入口 | https://sites.lsa.umich.edu/berridge-lab/wp-content/uploads/sites/743/2019/10/2016-Berridge-Robinson-Liking-wanting-IS-theory-of-addiction-Am-Psychol.pdf |\n| Schultz, Dayan & Montague 1997「A Neural Substrate of Prediction and Reward」(*Science*, 275:1593–1599) | RPE 的奠基論文。直接讀圖 2–3 的三段式 DA 放電圖，即可親眼看出 RPE 三狀態（非預期→正 RPE；已預測→無反應且前移；落空→負 RPE）；30 分鐘能讀完圖和摘要 | https://www.science.org/doi/abs/10.1126/science.275.5306.1593 |\n| Schultz 2016「Dopamine reward prediction error coding」(*Dialogues in Clinical Neuroscience*, 18(1):23–32) | 舒爾茨（Wolfram Schultz）本人 2016 年的自我綜述，說明 DA=RPE 模型的邊界與仍在辯論的部分，PMC 全文開放 | https://pmc.ncbi.nlm.nih.gov/articles/PMC4826767/ |\n| Castro & Berridge 2014「Opioid hedonic hotspot in nucleus accumbens shell」(*Journal of Neuroscience*, 34(12):4239–4250) | NAc shell 約 1 mm³ 類鴉片快感熱點的原始定位研究；味覺反應（taste reactivity）方法直接測 liking，是「喜歡不靠 DA」這條實驗路的定版論文 | https://www.jneurosci.org/content/34/12/4239 |\n| Koob & Le Moal 2001「Drug Addiction, Dysregulation of Reward, and Allostasis」(*Neuropsychopharmacology*, 24:97–129) | allostasis 框架與設定點向下漂移（dark side）的奠基論文；讀第一節概念框架 + 最後的圖示即可掌握核心 | https://www.nature.com/articles/1395603 |\n| Everitt & Robbins 2016「Drug Addiction: Updating Actions to Habits to Compulsions Ten Years On」(*Annual Review of Psychology*, 67:23–50) | 「目標導向→習慣→強迫」框架的 10 年更新版，涵蓋腹側→背外側紋狀體轉移的動物與人類證據；讀 ch05 後接著讀 | https://www.annualreviews.org/doi/pdf/10.1146/annurev-psych-122414-033457 |\n| Koob & Volkow 2010「Neurocircuitry of Addiction」(*Neuropsychopharmacology*，PMC2805560) | allostasis、dark side、擴展杏仁核放在同一張完整迴路圖，適合讀完 ch06–ch08 後確認迴路全貌 | https://pmc.ncbi.nlm.nih.gov/articles/PMC2805560/ |\n| Nestler, Barrot & Self 2001「ΔFosB: A Sustained Molecular Switch for Addiction」(*PNAS*, 98:11042–11046) | ΔFosB 分子開關的核心論文；欣賞層級，讀摘要 + 引言即可抓到「長半衰期讓突觸改變持久」這個概念 | https://www.pnas.org/doi/10.1073/pnas.191352698 |\n| NeuWrite West「Olds & Milner, 1954: reward centers and lessons for modern neuroscience」 | 現代科普視角重讀 ICSS 奠基論文，說明「reward center」為何遠比「pleasure center」準確；是全書歷史伏筆（快感中樞誤稱）的最佳補充閱讀 | http://www.neuwritewest.org/blog/3733 |\n| Frontiers in Computational Neuroscience 2026「A brief history of dopamine prediction errors」 | 2026 年最新回顧，說明 RPE 假說的歷史與當前挑戰（神經元異質性、beyond-RPE 訊號），適合確認模型邊界 | https://www.frontiersin.org/journals/computational-neuroscience/articles/10.3389/fncom.2026.1825622/full |\n\n---\n\n### 路線 B：往爭論與框架（更廣的視野）\n\n適合對「疾病模型 vs 學習模型」、Rat Park、越戰退伍軍人研究等學界爭議想更深入的讀者。本書的立場是兩造並陳、不替讀者裁決——這條路線讓你自己讀完兩邊各自最強的論點。\n\n| 資源 | 說明 | 來源 / 連結 |\n|------|------|-------------|\n| Volkow, Koob & McLellan 2016「Neurobiologic Advances from the Brain Disease Model of Addiction」(*NEJM*, 374:363–371) | 疾病模型的系統性整合（腦部疾病模型 BDMA，Brain-Disease Model of Addiction），三個神經系統框架（獎賞、執行、動機）；讀完才能給出疾病模型最強版本 | https://www.nejm.org/doi/full/10.1056/NEJMra1511480 |\n| Volkow 等 2020「Addiction as a brain disease revised: why it still matters」(*Neuropsychopharmacology*) | 疾病模型對批評的修訂回應，讀完 Blithikioti 2025 後對照 | https://www.nature.com/articles/s41386-020-00950-y |\n| Marc Lewis《The Biology of Desire: Why Addiction Is Not a Disease》（2015，PublicAffairs） | 學習模型最可讀的一本，路易斯（Marc Lewis）是發展神經科學家且本人曾是成癮者；建議讀前三章 | （書籍，書店或圖書館取得；出版社頁：https://www.hachettebookgroup.com/titles/marc-lewis-phd/the-biology-of-desire/9781610397124/ ） |\n| Gene Heyman《Addiction: A Disorder of Choice》（2009，Harvard University Press） | 海曼（Gene Heyman）用流行病學縱貫資料論證多數成癮者自然緩解、行為對誘因敏感——選擇模型的數據基礎 | （書籍，書店或圖書館取得） |\n| Carl Hart《Drug Use for Grown-Ups》（2021，Penguin Press） | 哈特（Carl Hart，哥倫比亞大學神經科學家）的環境與社會脈絡論述；讀時注意哪些是科學主張、哪些是政策立場，分別評估 | （書籍，書店或圖書館取得） |\n| Blithikioti 等 2025「Reevaluating the brain disease model of addiction」(*Lancet Psychiatry*, 12(6):469–474) | 批評方的 2025 年最新整理；值得讀「疾病框架是否真正減少汙名」的段落，對照 1997 年的原始承諾 | https://www.thelancet.com/journals/lanpsy/article/PIIS2215-0366(25)00060-4/abstract |\n| Hall, Carter & Forlini 2015「The brain disease model of addiction: is it supported by the evidence?」(*Lancet Psychiatry*, 2(1):105–110) | BDMA 批評的代表文件，值得注意隨後的回應與反駁，雙方交鋒揭示了真正的分歧所在 | （未驗證直接連結，建議 PubMed 搜「Hall Carter Forlini 2015 brain disease」） |\n| Robins 1993「Vietnam veterans' rapid recovery from heroin addiction: a fluke or normal expectation?」(*Addiction*) | 羅賓斯（Lee Robins）自己的 1993 年回顧，分析越戰自然緩解率為何如此高、以及她本人的「不可直接外推」告誡 | https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1360-0443.1993.tb02123.x （備用 PDF：https://kclpure.kcl.ac.uk/ws/portalfiles/portal/61077174/Addiction_classics_Robins_preprint.pdf ） |\n| Wikipedia「Rat Park」 | 包含原始研究概覽、Petrie 複製失敗、2020 重評、方法批評——作為「必 hedge」理由的最方便入口，比多數科普誠實得多 | https://en.wikipedia.org/wiki/Rat_Park |\n| 「Have we reproduced Rat Park?」(*Journal of Trial and Error*, 2020) | 系統性回顧，結論「概念性支持、非直接複製」；讀完才能理解「有點對又複製不穩」在實驗層次的意思 | https://jrn.trialanderror.org/pub/reproduced-rat-park |\n| Bruce Alexander「Addiction: The View from Rat Park」（2010） | 亞歷山大（Bruce Alexander）本人用成熟視角重看自己研究，承認複製問題並提出解釋；理解他真正的主張不可跳過（未驗證連結可用性） | https://www.brucekalexander.com/articles-speeches/rat-park/148-addiction-the-view-from-rat-park |\n| The Outline「This 38-year-old study is still spreading bad ideas about addiction」 | 從科學批評角度拆解「Rat Park 被過度推廣」；論點實在，做為另一端視角 | https://theoutline.com/post/2205/this-38-year-old-study-is-still-spreading-bad-ideas-about-addiction |\n\n---\n\n### 路線 C：往行為、數位與治療（最貼近日常的應用）\n\n適合讀完 ch09–ch15 後，想在「行為成癮、數位劫持、偽科學破解、治療機制」這幾個應用層面繼續的讀者。\n\n| 資源 | 說明 | 來源 / 連結 |\n|------|------|-------------|\n| Harvard Health「Dopamine fasting: Misunderstanding science spawns a maladaptive fad」（2020） | 拆解「多巴胺排毒」偽科學最清晰的一篇；重點看「DA 不是可排空的燃料槽」的解釋，讀完本書 ch15 後當交叉驗證 | https://www.health.harvard.edu/blog/dopamine-fasting-misunderstanding-science-spawns-a-maladaptive-fad-2020022618917 |\n| Cleveland Clinic「Dopamine Detox」 | 臨床機構的偽科學拆解，措辭比 Harvard Health 版稍通俗；兩篇對照看效果更好 | https://health.clevelandclinic.org/dopamine-detox |\n| Cameron Sepah 原始 LinkedIn 文（存 Medium）「The Definitive Guide to Dopamine Fasting 2.0」 | 讀塞帕（Cameron Sepah）的原始版本，比對他說的是什麼、後來被科普扭曲成什麼——這個比對本身是「科學概念如何在傳播中失真」的一課 | https://medium.com/swlh/dopamine-fasting-2-0-the-hot-silicon-valley-trend-7c4dc3ba2213 |\n| Lumen Learning「Reinforcement Schedules」 | 史金納（B. F. Skinner）四種排程的直觀說明與賭博類比，快速複習 VR（變動比率）為何最抗消弱 | https://courses.lumenlearning.com/waymaker-psychology/chapter/reading-reinforcement-schedules/ |\n| Frontiers in Psychiatry 2024「Neurotransmitters crosstalk and regulation in the reward circuit of subjects with behavioral addiction」 | 行為成癮獎賞迴路的跨神經傳導物交互作用綜述，涵蓋 DA、opioid、大麻素系統，是 ch09 機制延伸的好來源 | https://www.frontiersin.org/journals/psychiatry/articles/10.3389/fpsyt.2024.1439727/full |\n| Journal of Behavioral Addictions 2024「Wanting-liking dissociation and altered dopaminergic functioning: Similarities between internet gaming disorder and tobacco use disorder」 | 遊戲障礙中 wanting/liking 分離與誘因敏化模式的直接研究，驗證行為成癮的機制同源性 | https://pubmed.ncbi.nlm.nih.gov/38635338/ |\n| SAMHSA Advisory on Contingency Management（2024，PEP24-06-001） | 後效管理（CM，Contingency Management）的最新官方政策指引，說明「為什麼興奮劑使用障礙沒有藥物、CM 是主力」的實證背景；值得看第一節 | https://library.samhsa.gov/sites/default/files/contingency-management-advisory-pep24-06-001.pdf |\n| Drug Policy Alliance「Addiction Treatment」 | 各種治療選項的政策脈絡，對減害（harm reduction）的論點呈現較完整；注意此來源有明確立場（支持減害），配合其他中立來源一起讀（未完整驗證所有細節，2026-06） | https://drugpolicy.org/addiction-treatment/ |\n\n---\n\n## 如果只看三樣\n\n以下三個資源都已通過 landscape 驗證，涵蓋本書三條最重要的主線：\n\n| 順序 | 資源 | 路線 | 原因 |\n|------|------|------|------|\n| 1 | **Robinson & Berridge 2025**「The Incentive-Sensitization Theory of Addiction 30 Years On」(*Annual Review of Psychology*) — https://www.annualreviews.org/content/journals/10.1146/annurev-psych-011624-024031 | 路線 A | 全書脊椎（想要/喜歡分離）的最完整一手回顧；30 年理論演進、批評與修正全在這一篇，讀完你能回答全書所有六條驗收主線的學術基礎 |\n| 2 | **Volkow, Koob & McLellan 2016**「Neurobiologic Advances from the Brain Disease Model of Addiction」(*NEJM*, 374:363–371) — https://www.nejm.org/doi/full/10.1056/NEJMra1511480 | 路線 B | 讀完才能給出疾病模型（BDMA）最強版本；ch10 框架之爭的核心文件，機制圖（三系統框架）是全書迴路圖的臨床擴展版 |\n| 3 | **Berridge & Robinson 2016**「Liking, Wanting, and the Incentive-Sensitization Theory」(*American Psychologist*, 71(8):670–679) — https://sites.lsa.umich.edu/berridge-lab/wp-content/uploads/sites/743/2019/10/2016-Berridge-Robinson-Liking-wanting-IS-theory-of-addiction-Am-Psychol.pdf | 路線 A | PDF 公開、最易讀；比 1993 原作清晰，是進入機制文獻的最低成本入口，也是讀完路線 A 前兩項之前的暖身 |\n\n---\n\n## 章節對應索引\n\n各章核心機制與本附錄資源的對應，方便從特定章節返查延伸閱讀：\n\n| 章節 | 主題 | 首選延伸資源 |\n|------|------|-------------|\n| ch01 大腦被劫持 | 全書地圖與問題框架 | NeuWrite West（Olds & Milner 重讀）；Robinson & Berridge 2025 |\n| ch02 獎賞迴路 | VTA→NAc→PFC 解剖 | Berridge & Robinson 2016；Castro & Berridge 2014；Schultz 2016 |\n| ch03 多巴胺預測誤差 | DA=RPE；三段訊號 | Schultz 等 1997 原始論文；Schultz 2016 綜述；Frontiers 2026 回顧 |\n| ch04 想要 vs 喜歡 | wanting/liking 分離 | Berridge & Robinson 2016；Robinson & Berridge 2025；Castro & Berridge 2014 |\n| ch05 目標導向到習慣 | actions→habits→compulsions | Everitt & Robbins 2005；Everitt & Robbins 2016 |\n| ch06 耐受與戒斷 | allostasis；dark side；對立歷程 | Koob & Le Moal 2001；Koob & Volkow 2010（PMC） |\n| ch07 線索與渴求 | cue 條件化；消弱≠抹除 | Robinson & Berridge 2025（第 III 節）；Schultz 等 1997 |\n| ch08 誘因敏化 | 敏化三支柱；持久性 | Robinson & Berridge 1993 原始論文；Robinson & Berridge 2025；Nestler 等 2001 |\n| ch09 行為成癮 | 賭博／遊戲／社群媒體的機制同源 | Berridge & Robinson 2016（第三節）；Frontiers 2024；JBA 2024 |\n| ch10 疾病 vs 學習 | 框架之爭；兩造並陳 | Volkow 等 2016 NEJM；Lewis 2015；Heyman 2009；Blithikioti 2025 |\n| ch11 脆弱性 | 遺傳率；ACE；青春期 | Robins 1993；PMC 遺傳率綜述（2021）；ACE×多基因交互（2025） |\n| ch12 Rat Park 與環境 | 環境是調節因素之一；必 hedge | Wikipedia「Rat Park」；JTE 2020 複製回顧；The Outline 批評 |\n| ch13 復原的神經科學 | 自然緩解；ΔFosB；PFC 恢復 | Heyman 2009；Nestler 等 2001；Robins 1993；Frontiers 2026（PMC12979374） |\n| ch14 治療機制 | CM；MOUD；減害 | SAMHSA CM Advisory 2024；Volkow 等 2016 NEJM |\n| ch15 數位劫持 | 「多巴胺排毒」偽科學 | Harvard Health；Cleveland Clinic；Sepah 原始文（Medium） |\n| ch16 終章 | 六條主線口試；回到脊椎 | 見「如果只看三樣」；路線 A–C 完整對照 |\n\n---\n\n*本書是機制說明，不構成任何醫療、臨床或治療建議。如有成癮相關困擾或戒斷需求，請尋求專業醫療與成癮治療資源。*\n"}, {"id": "landscape-2026-06", "file": "landscape-2026-06.md", "group": "內部文件（_meta）", "title": "大腦被劫持：成癮的機制——事實基準（2026-06 查證）", "md": "---\nlast_verified: 2026-06-20\nreview_after_days: 365\nstatus: research-agent-draft\nsource: web research 2026-06-20\n---\n\n# 大腦被劫持：成癮的機制——事實基準（2026-06 查證）\n\n本檔是本書（id `addct`，《大腦被劫持：成癮的機制》）全書「人物、年份、歸屬、引文、效應量、機制宣稱、學界爭議現況」的權威錨點。各撰章 agent 引用任何日期、人名、數字、效應、歸屬時，**以本檔為準，不要憑記憶**——神經科學／心理學科普充斥被過度簡化、被推翻、或仍在爭議的「常識」，本主題尤其嚴重。\n\n使用規約：\n- ✅ = 已確認（≥2 獨立來源，或一個原始論文／權威綜述）。可直接照寫。\n- ⚠️ = 單一來源、來源不一致、數字區間寬、或細節我無法百分百確認。看到 ⚠️ 請照本檔給的「保守版」寫，別擴張、別給死數字。\n- ❌ = 通行科普說法**是錯的**或嚴重簡化。本檔給正確版；這些是全書「直覺的陷阱」段最該守住的點。\n- 🔶 = **真實的學界爭議**（疾病模型 vs 學習模型、Rat Park 推廣度）。**必須呈現雙方、不替讀者裁決**。撰章時兩造並陳、語氣克制。\n- 來源優先序：原始論文／NEJM／Annual Reviews／Nature 子刊／作者實驗室官網 PDF > 大學講義／PMC 綜述 > Wikipedia > 一般科普部落格。\n- 人名首次出現給「中譯（原文，生卒／關鍵年份）」；專有名詞首次給「中文（English）」。\n\n脊椎提醒（全書每一步都要歸位）：成癮＝獎賞學習系統被劫持；關鍵在 dopamine 編碼的是**「想要（wanting：預測誤差／誘因顯著性）」而非「喜歡（liking：快感）」**，成癮中兩者逐漸**分離**——越來越想要、越來越不喜歡。每談一個現象都問：這是「想要」還是「喜歡」？是哪一段迴路（VTA→NAc→PFC、目標導向→習慣）被劫持？\n\n---\n\n## 一、Olds & Milner 1954 腦內自我刺激（ICSS）\n\n- ✅ **James Olds（詹姆斯·奧爾茲，1922–1976）與 Peter Milner（彼得·米爾納，1919–2018）1954 年**發表〈Positive reinforcement produced by electrical stimulation of septal area and other regions of rat brain〉（*Journal of Comparative and Physiological Psychology*, 47(6):419–427, 1954）。\n- ✅ **發現是意外（serendipitous）**：電極本欲植入網狀結構研究覺醒／睡眠，因放置偏差落到**中隔區（septal area）**附近，老鼠反覆回到曾受刺激的位置。後設計壓桿（lever-press）裝置，老鼠**每小時可壓數百到數千次**自我刺激，甚至放棄食物與水。\n- ✅ 這是「大腦有可被電直接驅動的獎賞／增強系統」的奠基性實驗，重塑了動機與增強的理解。\n- ⚠️【年份小心】原始壓桿觀察始於 **1953**，**正式論文是 1954**。寫「Olds & Milner 1954」最安全；若寫 1953 須注明是首次觀察、論文為 1954。\n- ❌【全書直覺陷阱之一】Olds 早期把這些位點稱為**「快感中樞（pleasure centers）」**——這個標籤後來被認為是**誤稱**。現代神經科學認為他們敲到的不是純粹的「快感」，而是**增強／「想要」系統**；Olds 本人在生涯最後的論文也重新質疑是否真產生了「快感」。**寫作鐵律**：講 Olds 一定連帶破除「快感中樞」這個名字——它正是本書脊椎（想要≠喜歡）的歷史第一個伏筆。電刺激驅動的是「再來一次」的渴求（wanting），不等於主觀爽感（liking）。\n- 來源：SSIB「James Olds and Pleasure in the Brain」https://www.ssib.org/web/classic11.php ；NeuWrite West「Olds & Milner, 1954: reward centers and lessons for modern neuroscience」http://www.neuwritewest.org/blog/3733 ；Wikipedia「Brain stimulation reward」https://en.wikipedia.org/wiki/Brain_stimulation_reward\n\n## 二、Schultz, Dayan & Montague 1997：dopamine 編碼獎賞預測誤差（RPE）\n\n- ✅ **Wolfram Schultz（沃爾夫拉姆·舒爾茨）、Peter Dayan（彼得·戴揚）、P. Read Montague（瑞德·蒙塔古）1997 年**發表〈**A Neural Substrate of Prediction and Reward**〉，*Science* **275**(5306):1593–1599, 1997。\n- ✅ 核心發現（猴子中腦多巴胺神經元）三段式：(1) **非預期的獎賞** → dopamine 放電上升（**正向**預測誤差）；(2) **完全被預測的獎賞** → 反應消失（**無**誤差），且放電時點前移到**預測線索**；(3) **預期的獎賞落空** → 在原本該來的時點放電**下降到基線以下**（**負向**預測誤差）。\n- ✅ 這個訊號正是電腦科學**強化學習（reinforcement learning）**裡的 **TD 誤差（temporal-difference error）**——成為計算神經科學最有影響力的橋樑之一。**這是讀者（資深後端、修過 ML）最好的橋接點**：dopamine ≈ 系統回傳的「prediction error / 與期望的 diff」訊號，不是「發爽訊號」。\n- ⚠️ 嚴謹補充（避免過度簡化）：RPE 假說是**主導但非唯一**模型，近十餘年有對其普適性的辯論（如部分多巴胺神經元也編碼顯著性／威脅、異質性、時間尺度等）。寫作時用「主導模型」「最有影響力的解釋」這類措辭，別寫成「已被完全證實的唯一真相」。Schultz 本人 2016 年《Dopamine reward prediction error coding》(*Dialogues Clin Neurosci*) 仍持此框架。\n- 來源：Science 原文 https://www.science.org/doi/abs/10.1126/science.275.5306.1593 ；Schultz 2016 綜述 PMC https://pmc.ncbi.nlm.nih.gov/articles/PMC4826767/ ；理解綜述 PMC https://pmc.ncbi.nlm.nih.gov/articles/PMC3176615/\n\n## 三、❌【全書脊椎硬核】dopamine 不是「快感分子」——wanting vs liking\n\n- ✅ **Kent Berridge（肯特·貝里奇）與 Terry Robinson（泰瑞·羅賓森）**自 1990s 起的研究確立：**多巴胺中介的是「想要（wanting）」＝誘因顯著性（incentive salience），而非「喜歡（liking）」＝快感本身**。\n- ✅ 關鍵實驗證據：用**味覺反應（taste reactivity，甜味引發的節律性伸舌等「liking 反應」，人類嬰兒與成年大鼠通用）**測「喜歡」。結果——**dopamine 沒有任何已知的「快感熱點（hedonic hotspot）」**；真正能放大甜味「喜歡」反應的是**伏隔核殼（nucleus accumbens shell）一個約 1 立方毫米的類鴉片（opioid）熱點**，由 mu/delta/kappa opioid 與內源性大麻素（endocannabinoid）系統中介，**不靠 dopamine**。\n- ✅ **想要與喜歡通常同進退、但可被分離**（尤其用操弄 dopamine 的手段）。**成癮就是兩者的分離**：誘因敏化（incentive sensitization）讓「想要」隨用藥變得越來越強、越來越被線索觸發，但「喜歡」並未同步上升——所以成癮者「一個 cue 就能引爆強烈渴求，即使他說這劑已經沒那麼爽了」。\n- ✅ **誘因敏化理論（incentive-sensitization theory）**：Robinson & Berridge **1993** 年首次提出（*Brain Research Reviews*）；30 週年回顧 Robinson & Berridge 2025〈The Incentive-Sensitization Theory of Addiction 30 Years On〉(*Annual Review of Psychology*)。三支柱：間歇用藥使易感者**中腦邊緣系統敏化**→ 藥物誘發 dopamine 釋放增強；敏化**極持久**（停藥後仍在）；dopamine 中介「想要」、尤其被線索觸發，**不中介**快感。\n- ⚠️ 誠實標注：incentive-salience 對 dopamine 角色的解釋雖極具影響力，仍與其他框架（RPE 學習訊號、效率／成本決策等）並存且有辯論（見 Berridge 2007「The debate over dopamine's role in reward」）。它不是「全場唯一定論」，但「dopamine ≠ 快感分子」這條**已是主流共識**、可較硬地寫。\n- ❌【全書最該破除的迷思】「多巴胺是快感／爽感分子」「多巴胺讓你爽」是**錯的科普口號**。正確版：多巴胺驅動**渴求與趨近（想要）**，快感（喜歡）由類鴉片／大麻素等更小更脆弱的系統負責。**這條是脊椎，全書反覆歸位。**\n- 來源：Berridge & Robinson 2016「Liking, Wanting, and the Incentive-Sensitization Theory」(*Am Psychol*) https://sites.lsa.umich.edu/berridge-lab/wp-content/uploads/sites/743/2019/10/2016-Berridge-Robinson-Liking-wanting-IS-theory-of-addiction-Am-Psychol.pdf ；Robinson & Berridge 2025「30 Years On」(*Annu Rev Psychol*) https://www.annualreviews.org/content/journals/10.1146/annurev-psych-011624-024031 ；Castro & Berridge 2014 opioid hedonic hotspot (*J Neurosci*) https://www.jneurosci.org/content/34/12/4239\n\n## 四、目標導向 → 習慣的轉移（腹側→背外側紋狀體；Everitt & Robbins）\n\n- ✅ **Barry Everitt（巴瑞·艾佛瑞特）與 Trevor Robbins（特雷弗·羅賓斯）**的框架：藥物尋求行為從**目標導向（goal-directed，依賴杏仁核—腹側紋狀體 ventral striatum）**逐步**轉移到習慣化／自動化（habitual，控制權下移到背外側紋狀體 dorsolateral striatum, DLS）**，再到強迫（compulsion）。即「actions → habits → compulsions」。\n- ✅ 進一步分層：習慣學習推進時活動由**腹側→背側**紋狀體轉移；自動化加深時由**背內側（dorsomedial, DMS）→背外側（dorsolateral, DLS）**轉移。前額葉（PFC）功能低下（prefrontal hypoactivity）使目標導向系統失去對習慣系統的煞車。\n- ✅ 代表綜述：Everitt & Robbins 2005（*Nat Neurosci*）及 2016〈Drug Addiction: Updating Actions to Habits to Compulsions Ten Years On〉(*Annual Review of Psychology*)。**讀者橋接**：像「快取／熱路徑」固化——重複夠多次，控制權從「每次決策」下放到「自動執行的編譯結果」，繞過前額葉的成本評估。\n- ⚠️ 注意：「ventral→dorsal shift」主要建立在**動物（大鼠／猴）**實驗；人類證據較間接。寫「在動物模型中已清楚展示、人類研究支持但較間接」最穩。\n- 來源：Everitt & Robbins 2016 (*Annu Rev Psychol*) https://www.annualreviews.org/doi/pdf/10.1146/annurev-psych-122414-033457 ；「From the ventral to the dorsal striatum」(*Neurosci Biobehav Rev*) https://www.sciencedirect.com/science/article/pii/S0149763413000468\n\n## 五、Koob & Le Moal：allostasis／對立歷程／「dark side」與戒斷\n\n- ✅ **George Koob（喬治·庫伯）與 Michel Le Moal（米歇爾·勒莫阿爾）**提出成癮的**異穩態（allostasis）**模型：成癮是**獎賞系統螺旋式失調**的循環，獎賞「設定點（setpoint）」被向下重置，造成停藥後長期的復發脆弱性。代表作 Koob & Le Moal 2001〈Drug Addiction, Dysregulation of Reward, and Allostasis〉(*Neuropsychopharmacology*)。\n- ✅ **「dark side（黑暗面）」**：成癮晚期由**正增強（為了爽／reward-driven）轉為負增強（為了解除痛苦／relief-driven）**——戒斷時出現負面情緒狀態（煩躁、焦慮、易怒、anhedonia 失樂），驅動繼續用藥。涉及擴展杏仁核（extended amygdala）的「抗獎賞（anti-reward）」系統（CRF、dynorphin 等）。\n- ✅ 理論根源是 **Solomon & Corbit 的對立歷程理論（opponent-process theory, 1974）**：任何情緒狀態一旦啟動，中樞神經會自動以對立歷程（b-process）削弱它；反覆刺激使 b-process 增強、持久——這解釋了耐受與戒斷。Koob & Le Moal 2008〈Neurobiological mechanisms for opponent motivational processes in addiction〉(*Phil Trans R Soc B* 363:3113–3123)。\n- ✅ **讀者橋接（脊椎歸位）**：dark side 接的是「喜歡」那條——快感系統被向下重置（不是想要變弱，而是基線爽感塌陷），於是「越來越想要、越來越不喜歡」的剪刀差被生理化。也像系統的**正回饋失調 + 設定點漂移（setpoint drift）**。\n- 來源：Koob & Le Moal 2001 (*Neuropsychopharmacology*) https://www.nature.com/articles/1395603 ；Koob & Le Moal 2008 PubMed https://pubmed.ncbi.nlm.nih.gov/18653439/ ；「A walk on the dark side: addiction as allostasis」(*Nat Neurosci* 2006) https://www.nature.com/articles/nn0806-983\n\n## 六、🔶【全書最大爭議】疾病模型 vs 學習模型——兩造並陳、不裁決\n\n這是本書**必須呈現雙方、不替讀者選邊**的核心爭議。撰章時兩造各給最強論證，作者不下「哪邊對」的判決。\n\n### 6a. 疾病模型一方（brain-disease model of addiction, BDMA）\n\n- ✅ **Alan Leshner（艾倫·萊什納，時任 NIDA 主任）1997** 年在 *Science* 發表**政策論壇文章（Policy Forum，非 editorial／社論）**〈**Addiction is a brain disease, and it matters**〉：用藥起於自願，但長期重度用藥造成腦結構與功能改變，形成「神經化學開關（switch）」，使戒斷極其困難——故本質上是腦部疾病。\n- ✅ **Nora Volkow（諾拉·沃爾科夫，現任 NIDA 主任）**持續推進此模型。代表整合文獻：**Volkow, Koob & McLellan 2016〈Neurobiologic Advances from the Brain Disease Model of Addiction〉，*New England Journal of Medicine* 374(4):363–371**。強調獎賞、執行功能（前額葉自我控制下降）、動機／驅力三系統的神經適應；目的之一是**減少汙名、推動以醫療看待**。\n- ✅ 2020 年 Volkow 等〈Addiction as a brain disease revised: why it still matters, and the need for consilience〉(*Neuropsychopharmacology*) 是對批評的回應與修訂。\n\n### 6b. 學習／選擇模型一方（批評者）\n\n- ✅ **Marc Lewis（馬克·路易斯，發展神經科學家、曾為成癮者）《The Biology of Desire: Why Addiction Is Not a Disease》（2015）**：成癮是**學習**（深度、動機驅動的學習）造成的腦改變，不等於「疾病」；腦會變不代表腦「病了」（學小提琴、墜入愛河也改變腦）。主張「人學會成癮、也能學會不成癮」，認為疾病框架反而**妨礙復原**。\n- ✅ **Gene Heyman（吉恩·海曼）《Addiction: A Disorder of Choice》（2009, 哈佛大學出版社）**：用流行病學資料論證多數成癮者**會自行緩解（natural remission）**，行為對後果（誘因、代價）敏感，因此更像受選擇／後效控制的行為，而非不可逆的慢性腦病。\n- ✅ **Carl Hart（卡爾·哈特，哥倫比亞大學神經科學家）《High Price》（2013）、《Drug Use for Grown-Ups》（2021）**：強調**多數用藥者不會成癮**（他主張逾 75–80% 嘗試者不會發展成成癮），把焦點過度放在藥物藥理、忽略環境與社會脈絡是誤導；亦批評疾病模型背後的種族化與政策問題。\n- ✅ 哲學／實證批評代表：Hall, Carter & Forlini 2015〈The brain disease model of addiction: is it supported by the evidence and has it delivered on its promises?〉(*Lancet Psychiatry*)——質疑 BDMA 的人體證據強度與臨床兌現。\n\n### 爭議現況（2026-06）與寫作戒律\n\n- 🔶 **沒有定論。** 兩造的真正分歧多在「**該用什麼語言與框架**（疾病 vs 學習 vs 選擇）」與政策後果，而非否認「成癮涉及真實腦改變」這個共同事實。連批評者（如 Lewis）也承認腦確實改變——爭的是「腦改變 ⇒ 算不算疾病」。\n- ⚠️ 反方一條常被引用的尖銳批評：「幾乎沒有人體資料顯示成癮像亨丁頓舞蹈症或帕金森氏症那樣是腦病」——這是批評者立場，**呈現為一方說法、別當定論寫**。\n- **寫作鐵律**：本主題全書語氣中立。兩造各給最強版本＋各自的盲點，明說「這是價值與框架之爭，本書不替你裁決」。**不要**用脊椎（wanting/liking）去「證明」疾病模型贏——脊椎是描述機制，與「該叫疾病還是學習」是兩個層次的問題。\n- 來源：Leshner 1997 概述 https://www.drugpolicyfacts.org/node/4438 ；Volkow/Koob/McLellan 2016 NEJM https://www.nejm.org/doi/full/10.1056/NEJMra1511480 ；Volkow 2020 revised (*Neuropsychopharmacology*) https://www.nature.com/articles/s41386-020-00950-y ；Lewis《Biology of Desire》出版社頁 https://www.hachettebookgroup.com/titles/marc-lewis-phd/the-biology-of-desire/9781610397124/ ；「Addiction and the Brain-Disease Fallacy」(*Front Psychiatry* 2013, Hammer 等) https://www.frontiersin.org/journals/psychiatry/articles/10.3389/fpsyt.2013.00141/full\n\n## 七、🔶 Rat Park（Bruce Alexander, 1970s–80s）——結論常被過度推廣、有複製問題，必 hedge\n\n- ✅ **Bruce Alexander（布魯斯·亞歷山大）與同事於 Simon Fraser University**，1970s 末做的一系列研究，**論文發表於 1978–1981**。發現：住在**豐富化、有同伴的環境（「老鼠樂園」Rat Park）**的大鼠，比關在**孤立籠**裡的大鼠**喝較少的嗎啡溶液**——暗示環境／社會連結是用藥的關鍵調節因素。\n- 🔶❌【必 hedge 的兩個問題】\n  1. **複製問題**：直接複製成績不佳。Alexander 自己的研究生 **Bruce Petrie** 嘗試複製，**未能重現**原效應（一次社交鼠喝得略多、一次孤立鼠略多，皆遠不如原研究的戲劇性差距——某些實驗條件下孤立鼠喝多達約 19 倍（依 Wikipedia「Rat Park」與 Alexander 1981；2026-06 修正，原誤記為 7 倍）。2020 年一篇〈Have we reproduced Rat Park?〉得到**概念性（conceptual）支持、但非直接（direct）複製**——即「豐富環境有保護作用」這個大方向有旁證，但 Rat Park 的**具體強效**未被穩定重現。\n  2. **方法學批評**：樣本數小；用**口服嗎啡**（不擬真實用藥途徑，且嗎啡苦味造成混淆）；兩組測量方式不一致。\n- 🔶 **過度推廣警告**：Rat Park 常被科普（尤其 Johann Hari 的 TED／《Chasing the Scream》）推到「**成癮的反面不是清醒，而是連結**」「藥物本身幾乎不會讓人成癮、全是環境」。**這是過度延伸**——較平衡的證據：環境與社會連結**確實是重要調節因素**（與越戰退伍軍人資料一致），但**不能據此宣稱藥理／個體脆弱性無關**。事實上約 **15% 違法藥物使用者**會發展成依賴、基因相近的大鼠約 **20%** 會對古柯鹼成癮——脆弱性是真的。\n- **寫作戒律**：Rat Park 可講、有啟發性，但務必標明「具體效應複製不穩、結論常被過度推廣」，並與「環境是調節因素**之一**、非唯一」並陳。**不要**寫成「Rat Park 證明了成癮純由環境決定」。\n- 來源：Wikipedia「Rat Park」（含 Petrie 複製失敗、方法批評）https://en.wikipedia.org/wiki/Rat_Park ；「Have we reproduced Rat Park?」(2020) https://www.researchgate.net/publication/343717456 ；The Outline 批評文 https://theoutline.com/post/2205/this-38-year-old-study-is-still-spreading-bad-ideas-about-addiction\n\n## 八、越戰退伍軍人海洛因自然戒斷（Robins, 1970s）\n\n- ✅ **Lee Robins（李·羅賓斯，華盛頓大學社會精神病學教授）**領導的研究：越戰期間在越南的美軍海洛因使用率從赴越前約 0.4% 升到約 **20%（成癮）**；但返美後 **8–12 個月**期間**降回約 1%**。**返美後在越南曾成癮者中，逾 90% 幾乎立即停止成癮**，且後續復發**不常見**。\n- ✅ 解讀：**環境／脈絡線索（context cues）改變**＝最強的「自然戒斷」力量。越南到處是觸發線索，返美後脫離了那個 cue 環境，習慣隨之瓦解。代表文獻：Robins et al. 1977〈Vietnam Veterans Three Years after Vietnam〉；Robins 1993 回顧〈Vietnam veterans' rapid recovery from heroin addiction: a fluke or normal expectation?〉(*Addiction*)。\n- ⚠️ 年份措辭：常見「Robins 1975」指向早期報告，但最常被引的經典是 **1977** 篇與 **1993** 回顧。寫「Robins 等 1970s 的越戰退伍軍人研究」最穩；若給單一年份，1974（追蹤）/1975（早期報告）/1977（經典）需依所引具體文獻定，建議用「1970s」並注經典為 1977。\n- ⚠️ 別過度推廣：這與 Rat Park 同向（環境是關鍵調節因素），但**不證明**「藥理無關」。海洛因在缺乏戒斷支持下對許多人仍高度成癮；越戰個案的高自癒率與「返家＝徹底換環境＋社會角色重建」這個極端脈絡轉換綁定，不能直接外推到一般街頭成癮。\n- 來源：Robins 1993 (*Addiction*) https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1360-0443.1993.tb02123.x ；Addiction classics（Robins）KCL PDF https://kclpure.kcl.ac.uk/ws/portalfiles/portal/61077174/Addiction_classics_Robins_preprint.pdf\n\n## 九、Variable-ratio 增強（Skinner）\n\n- ✅ **B. F. Skinner（史金納）**的增強排程（schedules of reinforcement）中，**變動比率（variable-ratio, VR）排程**：每隔**不固定**次數的反應才給一次增強。**產生最高的反應率、且最抗消弱（most resistant to extinction）**。\n- ✅ **賭博／吃角子老虎（slot machine）**正是 VR 的運作邏輯——「下一次反應就可能中獎」，沒有安全的停手時機，故極難戒。Skinner 用賭博作為 VR 維持行為的經典例。\n- ✅ **讀者橋接**：VR ≈ 不可預測的間歇性回報；對應到產品設計的「variable reward（social media 通知、抽卡）」。也呼應脊椎——**不可預測**正是放大 RPE／「想要」的引擎（最大正向預測誤差出現在最不可預測時）。\n- ⚠️ 別把「VR 最抗消弱」誇成唯一因素；成癮是多系統（敏化、習慣、dark side）疊加，VR 是「為何間歇回報特別黏」的行為層解釋，不是成癮全因。\n- 來源：Lumen Learning「Reinforcement Schedules」https://courses.lumenlearning.com/waymaker-psychology/chapter/reading-reinforcement-schedules/ ；變動獎賞與賭博 https://www.teachboston.org/variable-reward-schedules-gambling/\n\n## 十、脆弱性：遺傳、發育期、ACE\n\n- ⚠️【數字要 hedge】**成癮的遺傳率（heritability）一般綜述引用約 40–60%**，但**因物質與性別差異很大**：物質**使用起始（initiation）**受環境影響較大（遺傳率較低、約 40% 上下）；**使用障礙（use disorder）**遺傳率較高。有研究給出較低的整體估計（如某些樣本男性約 0.35、女性約 0.24）。**寫作鐵律**：用「**約 40–60%、且因物質與研究而異**」這類區間語，**不要寫死單一數字**（如「成癮 50% 由基因決定」會誤導）。\n- ✅ **青春期（adolescence）脆弱窗**：前額葉（PFC）成熟晚於邊緣獎賞系統，造成「油門早熟、煞車晚熟」的不對稱，使青少年對獎賞敏感、自控弱，早期接觸藥物的成癮風險與長期影響較高。此為發育神經科學共識方向（具體效應量仍研究中）。\n- ✅ **童年逆境經驗（Adverse Childhood Experiences, ACE）**是後續物質使用與成癮的公認風險因子；ACE 與遺傳脆弱性常**交互作用**（基因×環境），且 ACE 本身的「易得性」也部分受遺傳影響——關係是雙向糾纏，非單純因果。\n- ⚠️ 戒律：遺傳率是**群體層次的變異分配**，**不是**「某個人有 50% 機率成癮」，也**不是**宿命。基因×環境×發育期是多因素疊加，避免基因決定論口吻。\n- 來源：「Genetic Risk for Substance Abuse and Addiction: Family and Twin Studies」https://www.researchgate.net/publication/291165825 ；SUD polygenic × childhood adversity PMC https://pmc.ncbi.nlm.nih.gov/articles/PMC12094658/\n\n## 十一、治療機制：agonist／antagonist、contingency management、減害\n\n- ✅ **類鴉片使用障礙（OUD）三大藥物（MOUD）**：\n  - **美沙酮（methadone）**：完全致效劑（full agonist）；僅能透過聯邦核准的鴉片治療計畫（OTP）、每日監督下給藥。\n  - **丁基原啡因／丁丙諾啡（buprenorphine）**：**部分致效劑（partial agonist）**；可由醫師／PA／NP 在診間開立，較易取得（含遠距醫療）。**譯名鐵律：buprenorphine＝丁基原啡因／丁丙諾啡；勿寫成「布托啡諾」（那是另一種藥 butorphanol，藥理與用途皆不同）。**\n  - **納曲酮（naltrexone）**：**拮抗劑（antagonist）**；阻斷鴉片受體。證據較分歧，對「自願選擇、能維持脫癮起始」者有用；長效針劑（XR-naltrexone）需先完成脫癮。\n- ✅ **後效管理（contingency management, CM）**：以具體獎勵（代幣／券）增強「驗尿陰性／服藥順從」等目標行為。**統合分析顯示 CM 是最有效的心理社會治療之一**，尤其對**興奮劑使用障礙（目前無有效藥物）**效果突出。**讀者橋接（脊椎歸位）**：CM 是「用一個可靠、即時、正向的預測誤差去重訓獎賞系統」——直接對著「想要」迴路施工。\n- ✅ **減害（harm reduction）**：不以「立即戒斷」為唯一目標，降低用藥的傷害（如鴉片過量逆轉劑 naloxone／納洛酮、針具交換、監督注射、芬太尼試紙等）。在主流公衛中**證據支持、漸成標準**，但仍有政策與價值爭議。\n- ⚠️ 別把任一療法寫成「治癒」；成癮是高復發傾向（chronic, relapsing 傾向），治療目標常是長期管理與降低傷害。CM 的效果在停止獎勵後可能衰減——寫作時注明。\n- 來源：SAMHSA CM advisory https://library.samhsa.gov/sites/default/files/contingency-management-advisory-pep24-06-001.pdf ；Drug Policy Alliance「Addiction Treatment」https://drugpolicy.org/addiction-treatment/\n\n## 十二、❌【偽科學正面拆解】「多巴胺排毒（dopamine detox / dopamine fasting）」\n\n- ❌ **「多巴胺排毒／斷食」是基於對神經科學的誤解的偽科學。** 你**無法**「排掉」或「重置」多巴胺——它是大腦持續製造、維持基本功能（運動、動機、學習）所必需的神經傳導物，不是可清除的「毒素」。\n- ✅ 真相溯源：此詞源自 **Cameron Sepah（卡麥隆·塞帕）2019** 年的 LinkedIn 文章，他描述的**原版其實是針對衝動行為的認知行為治療（CBT）／刺激控制（stimulus control）**——減少問題行為、代以健康替代——這部分**有實證、有效**。**Sepah 本人承認「dopamine fasting 這個詞技術上是錯的」**，只是比「處理成癮行為的刺激控制 101」好聽。\n- ❌ 病毒式爆紅的極端版（24 小時禁一切快樂、靜坐避免所有刺激、把多巴胺當毒素）**沒有科學支持、甚至可能有害**。\n- ✅ **正確拆解（呼應脊椎）**：你不會降低多巴胺「水位」；你能做的是**改變線索與行為（刺激控制）**，減少對特定 cue 的「想要」觸發。把它正名為「對成癮行為的刺激控制／CBT」，去掉「排毒」的偽神經科學外衣——這正是本書脊椎的應用：問題在「想要」迴路被哪些 cue 劫持，不在「多巴胺太多要排掉」。\n- 來源：Harvard Health「Dopamine fasting: Misunderstanding science spawns a maladaptive fad」https://www.health.harvard.edu/blog/dopamine-fasting-misunderstanding-science-spawns-a-maladaptive-fad-2020022618917 ；Cleveland Clinic「Dopamine Detox」https://health.clevelandclinic.org/dopamine-detox ；Psychology Today「Debunking Dopamine Fasting」https://www.psychologytoday.com/us/blog/sacramento-street-psychiatry/202002/debunking-dopamine-fasting\n\n## 十三、核心迴路與名詞（撰章記號錨點）\n\n- ✅ **VTA（ventral tegmental area, 腹側被蓋區）**：中腦多巴胺神經元的主要起點（含 RPE 訊號神經元）。\n- ✅ **NAc（nucleus accumbens, 伏隔核）**：腹側紋狀體的關鍵核；其**殼（shell）**含「喜歡」的類鴉片快感熱點；中腦邊緣（mesolimbic）DA 投射的主要靶區，「想要」的核心節點之一。\n- ✅ **中腦邊緣多巴胺路徑（mesolimbic dopamine pathway）**：VTA → NAc（含內側前額葉、杏仁核等），獎賞／動機的核心。\n- ✅ **PFC（prefrontal cortex, 前額葉皮質）**：執行控制、目標導向、抑制；成癮中**功能低下**使煞車失靈。**dlPFC（背外側前額葉）**與推理、計畫、自控相關（此為靈長類／人類分區）。**解剖鐵律：齧齒類無與靈長類同源的 dlPFC，其功能對應區為前邊緣（prelimbic, PL）與下邊緣（infralimbic, IL）皮質；引用大鼠／小鼠 PFC 結果時勿逕標為「dlPFC」。**\n- ✅ **紋狀體（striatum）**：腹側（ventral，含 NAc）↔ 背內側（DMS，目標導向）↔ 背外側（DLS，習慣／自動化）——對應「目標導向→習慣」軸（見四）。\n- ✅ **擴展杏仁核（extended amygdala）**：Koob「dark side」抗獎賞系統所在（CRF、dynorphin）。\n- ⚠️ 寫作時記號統一：DA = dopamine（多巴胺）；RPE = reward prediction error（獎賞預測誤差）；wanting=想要（incentive salience 誘因顯著性）、liking=喜歡（hedonic impact 快感）。**全書這四組對應不得漂移。**\n\n---\n\n## 待守住的高風險事實（最易被科普寫錯／爭議，撰修前對照本檔）\n\n1. **dopamine ≠ 快感分子**：它驅動「想要（wanting/incentive salience）」，快感（liking）由 NAc shell 的類鴉片熱點等中介、不靠 DA。這是全書脊椎，反覆歸位。（§三、§十三）\n2. **🔶 疾病模型 vs 學習／選擇模型**：真實爭議，**兩造並陳、不裁決**。Leshner 1997／Volkow 2016 NEJM（疾病）vs Lewis 2015／Heyman 2009／Hart（學習／選擇）。連批評者都承認腦確實改變——爭的是「該不該叫疾病」這個框架／政策層次。別用脊椎去替疾病模型背書。（§六）\n3. **🔶 Rat Park 必 hedge**：複製不穩（Petrie 失敗、2020 僅概念性複製）、方法有疵（口服嗎啡、樣本小）、結論常被過度推廣成「成癮全是環境」。環境是**調節因素之一**、非唯一；脆弱性是真的（~15% 使用者依賴）。（§七）\n4. **越戰退伍軍人**：返美後逾 90% 自然戒斷——環境／脈絡是強力調節因素，但**不證明藥理無關**，受極端脈絡轉換綁定，勿外推。年份用「1970s（經典 1977）」。（§八）\n5. **「多巴胺排毒」是偽科學**：無法排掉/重置多巴胺；原版（Sepah 2019）其實是 CBT／刺激控制，連發明者都承認名稱錯。正面拆解、別半信半疑。（§十二）\n6. **Olds & Milner「快感中樞」是誤稱**：他們敲到的是增強／「想要」系統，不是純快感——這是脊椎的歷史第一個伏筆。論文年份 1954（首次觀察 1953）。（§一）\n7. **Schultz 1997 = RPE/TD 訊號**，是主導但非唯一模型；dopamine 報的是「與期望的 diff」，不是「爽訊號」。（§二）\n8. **遺傳率數字 hedge**：約 40–60%、因物質與性別／研究而異；是群體變異分配、非個人宿命、非基因決定論。別寫死「50% 由基因決定」。（§十）\n9. **歸屬／年份錨**：誘因敏化理論 Robinson & Berridge **1993**；異穩態 Koob & Le Moal **2001**、dark side/對立歷程 Solomon & Corbit **1974**；actions→habits→compulsions = Everitt & Robbins；BDMA 整合 Volkow/Koob/McLellan **2016 NEJM**。\n10. **療法別吹成治癒**：成癮高復發傾向；CM 最有效心理社會治療之一但效果可能在停獎後衰減；buprenorphine=部分致效、naltrexone=拮抗、methadone=完全致效；減害（naloxone/針具）證據支持但有政策爭議。（§十一）\n\n---\n\n## 補充：P1 自我審查 + agy 二意見（2026-06-20，撰章 web 查證後納入）\n\n以下為 P1 self-review 與 agy 二意見指出的「該補的機制」。撰對應章時 WebSearch 查證後納入並標時點；🔶 者仍 hedge。\n\n- **給藥途徑與起效速度（pharmacokinetic speed of onset）→ ch03／ch06（重要）**：同一物質，靜脈注射／吸入（數秒到腦）比口服／經皮（數十分鐘）成癮性高得多——起效越快、DA/RPE 上升斜率越陡、誘因敏化與可塑性改變越劇烈。不談速度，讀者無法理解「為何同物質不同用法成癮風險天差地別」。直接服務脊椎（更陡的 RPE＝更強的劫持）。\n- **D2 受體下調（Volkow 的 PET 影像）→ ch06**：成癮者紋狀體 D2 受體減少，使對日常正常獎賞（食物、社交）的敏感度基線塌陷——銜接「想要 vs 喜歡」與臨床失樂（anhedonia）的影像實證橋；澄清迷思「成癮者多巴胺乾涸」（不是分泌不出，是受體/敏感度變化）。\n- **ΔFosB（Nestler 實驗室）分子開關 → ch08／ch13（可選、欣賞層級）**：伏隔核 ΔFosB 因半衰期極長而慢性累積，被視為成癮的「分子開關」，解釋單次停藥後突觸結構（樹突棘）改變為何長期維持、復發率高。可作 ch13「為何線索仍在」的分子註腳；保持欣賞深度、不展開分子生物學。\n- **行為成癮 vs 物質成癮的機制異同 → ch09（hedge）**：物質成癮含外源分子直接結合受體、可能直接毒性；行為成癮全靠內源性釋放——ch09 講「同源迴路」時須劃清這條界線，勿過度等同。\n- **表觀遺傳作為 ACE×基因的物理橋（🔶）→ ch11**：童年逆境可透過表觀遺傳標記（DNA 甲基化等）改變壓力系統（HPA 軸／糖皮質素受體）基因表達，是「環境×基因」交互的候選機制。**hedge：成癮表觀遺傳仍是活躍研究、部分被誇大**，寫為「候選機制／研究中」而非定論。\n"}, {"id": "maintenance", "file": "maintenance.md", "group": "內部文件（_meta）", "title": "maintenance.md — 大腦被劫持（id addct）", "md": "# maintenance.md — 大腦被劫持（id addct）\n\n維護本書時的權威基準。改任何基準數字，必須照「一致性基準表」全書同步，並在掃描日誌記一行。事實錨點＝`landscape-2026-06.md`（含末尾「補充」addendum）。\n\n## 一致性基準表（各章不得另創寫法／數字／歸屬）\n\n| 基準 | 鎖定值 | 出現章 |\n|---|---|---|\n| 脊椎兩條曲線 | wanting↑（敏化 sensitization）vs liking↓（allostasis）；dopamine=想要（預測誤差/誘因顯著性）非喜歡（快感） | 全書／ch04 定版 |\n| 疾病 vs 學習模型 | 兩造並陳、**本書不裁決**；不可用脊椎替疾病模型背書 | ch10 定版／全書 |\n| 習慣化框架 | **Trevor Robbins**：actions → habits → compulsion（2005 *Nat Neurosci*、2016） | ch05 定版 |\n| 越戰退伍軍人 | **Lee Robins**（聖路易斯華盛頓大學 / Washington University in St. Louis），經典 1977；在越南約 20% 成癮，返美 8–12 個月降回約 1%，逾 90% 自然戒斷 | ch11/ch12/ch13 |\n| **Robins ≠ Robbins** | Lee Robins（越戰）與 Trevor Robbins（習慣化）是**不同人**，鐵律不可混 | 全書 |\n| Rat Park | Bruce Alexander，論文 1978–1981；**某些實驗條件下孤立鼠喝多達約 19 倍嗎啡**；複製不穩（Petrie 失敗、2020 僅概念性）；方法有疵（口服嗎啡、樣本小）；不可寫「成癮全是環境」 | ch12 定版 |\n| 脆弱性 | 約 **15%** 違法藥物使用者依賴；遺傳率約 **40–60%**（群體變異分配，非個人宿命） | ch11/ch12/ch16 |\n| 治療藥 | buprenorphine=**丁基原啡因**（又譯丁丙諾啡；**不是布托啡諾/butorphanol**） | ch14 |\n| 經典文獻 | Leshner 1997 = *Science* **Policy Forum**（非社論）；D2 受體下調=Volkow PET；ΔFosB=Nestler | 各章 |\n| 物種注意 | dlPFC 是靈長類分區；齧齒類用 PL/IL，勿對老鼠寫 dlPFC | 全書 |\n\n## 已知脆弱事實清單（最易出錯／最該守住）\n\n- **Lee Robins（越戰）≠ Trevor Robbins（習慣化）**——全書最高風險，2026-06-21 查證全書未混淆。\n- **Rat Park 嗎啡倍數＝某些條件下約 19 倍**（Wikipedia/Alexander 1981）；landscape 原誤記 7 倍，2026-06-21 已修。複製不穩必 hedge。\n- **疾病 vs 學習模型不裁決**；環境是調節因素**之一**、非唯一。\n- **buprenorphine=丁基原啡因**（非布托啡諾）；**可卡因→古柯鹼**（台灣用語）。\n- dopamine=想要非喜歡（脊椎核心，別寫成「快感分子」）。\n\n## 掃描協定\n\n1. 動基準數字 → 先改 landscape，再全書同步，記日誌。2. ASCII 圖 → `check_diagrams.py book-src`（exit 0）。3. book-src → `lint_book.py book-src`（0 errors）＋重打包。4. 重大修正需 2 獨立來源。\n\n## 掃描日誌\n\n- **2026-06-21 建書（P1–P5）**：起草 ch01–16＋3 附錄（Sonnet 續跑）。P1 agy 修正進 landscape：buprenorphine 中譯（原誤布托啡諾）、Leshner 1997=Policy Forum、加 rodent-PFC≈PL/IL hedge。\n- **2026-06-21 P3**：lint 0 errors；diagrams exit 0（重生成 ch08 旋鈕對照表達 CJK=2）；spine 16/16；**Trevor Robbins vs Lee Robins 全書未混淆**（ch05 習慣 vs ch12 越戰乾淨分離）；Rat Park 1978–81、越戰 20%→1%、遺傳率 40–60% 一致。\n- **2026-06-21 P4**：agy 逐章審 16/16；套用驗證修正（zh-TW 如「可卡因→古柯鹼」、對齊 landscape、過度宣稱收斂）。**修正 landscape：Rat Park 嗎啡倍數 7 倍 → 約 19 倍**（Wikipedia「Rat Park」＋章節一致，原 landscape 與自身引用來源矛盾）。\n- **⚠️ 待網路查證（未改）**：ch06 D2 受體密度「約少 15–20%」精確區間；ch09 near-miss 大鼠 slot-machine 受體（章寫 D2，agy 主張 D4／Cocker 2013）；ch10 Blithikioti 2025（*Lancet Psychiatry*）對「強化疾病模型信念未減汙名」的描述精確度；ch12 Lee Robins 任職已補「聖路易斯華盛頓大學」釐清。\n"}, {"id": "outline", "file": "outline.md", "group": "內部文件（_meta）", "title": "全書大綱（內部文件，非書籍內容）", "md": "# 全書大綱（內部文件，非書籍內容）\n\n書名（工作名）：《大腦被劫持：成癮的機制》（id `addct`；最終書名於 outline gate 由作者定案）。\n形態：16 章、四個 Part、3 個附錄。欣賞與直覺書（不刷名詞、不出選擇題、不裝臨床；**純思想實驗／紙上推演，無 Python 段、無真實世界自我追蹤**）。\n每章必須遵守 `style-guide.md` 的骨架與深度標準；人物、年份、歸屬、效應量、機制宣稱、學界爭議現況以 `landscape-2026-06.md` 為錨，**不憑記憶**。\n本書**不是醫療／戒斷／治療手冊**：碰治療、戒斷、危機、藥物時講「機制為什麼有效／為什麼衰減」，並在同段明說「機制說明，非醫療建議」。\n\n## 全書敘事弧\n\n先把「劫持」這個比喻坐實成可驗收的機制：大腦本來就有一套**獎賞學習系統**，成癮不是裝了惡意程式，而是這套**正常系統的正常運作被一個異常強的輸入推到失控**（ch01 立定「系統故障非道德缺陷」＋全書地圖）。接著拆地基三件：這套系統的解剖（ch02 VTA→NAc→PFC 這條線在做什麼）→ dopamine 報的到底是什麼訊號（ch03 它是**獎賞預測誤差 RPE**，不是快感，橋到讀者的 TD learning）→ **全書脊椎硬核**：「想要（wanting）」與「喜歡（liking）」是兩套不同的神經系統、平常同進退、但**可以分離**（ch04 定版「兩條曲線分岔」這張圖）。\n\n地基立好，Part II 演示「劫持」怎麼一步步發生：學習如何從**目標導向**滑成**習慣**、控制權從 PFC 下放到背外側紋狀體（ch05）→ 系統反向校準：耐受、戒斷、設定點被偷偷改低（ch06 allostasis／對立歷程）→ 線索如何綁架你、為何戒了還會復發（ch07 cue→渴求）→ 把脊椎收成一句話：誘因敏化讓「想要」越爬越高、allostasis 讓「喜歡」越塌越低，剪刀差被生理化（ch08 incentive sensitization，回到 ch04 那張圖指出「現在動的是哪條線」）。\n\nPart III 把鏡頭拉遠，逼問這套機制的**邊界與爭論**：賭博／遊戲／社群媒體踩的是不是同一條迴路（ch09 行為成癮×variable-ratio）→ **全書最大爭議**：腦確實改變了，但「該不該叫疾病」是另一個層次的問題（ch10 疾病模型 vs 學習／選擇模型，兩造並陳、不裁決）→ 為什麼同樣的藥、有人成癮有人不會（ch11 脆弱性：遺傳率、發育期、ACE）→ 環境到底佔多重，Rat Park 證明了什麼又被過度推廣成什麼（ch12，必 hedge）。\n\nPart IV 走向出路與收束：大腦能不能修回去、為何線索還在（ch13 復原的神經科學）→ 治療為什麼有效、為什麼會衰減（ch14 agonist／antagonist／CM／減害的機制，非醫療建議）→ 把脊椎還給今天的讀者：你口袋裡的吃角子老虎踩的是同一條迴路，怎麼自我察覺（ch15 數位時代的劫持）→ 六條主線逐條口試收官（ch16 finale）。\n\n歷史暗線（交織不另立章）：Olds & Milner 1954 ICSS、「快感中樞」誤稱（脊椎的歷史第一個伏筆，ch01/ch02）→ Schultz, Dayan & Montague 1997 dopamine=RPE（ch03）→ Robinson & Berridge 1993 誘因敏化、taste reactivity 找出 NAc shell 類鴉片熱點（ch04/ch08）→ Solomon & Corbit 1974 對立歷程、Koob & Le Moal 2001 allostasis（ch06）→ Everitt & Robbins actions→habits→compulsions（ch05）→ Skinner VR 排程（ch09）→ Leshner 1997／Volkow 2016 NEJM vs Lewis 2015／Heyman 2009／Hart（ch10）→ Lee Robins 越戰退伍軍人（ch11/ch12）、Bruce Alexander Rat Park 1970s–80s（ch12）→ Sepah 2019「多巴胺排毒」正名（ch15）。\n\n## 全書 ASCII 路線圖（基準圖；Part 首章照抄，把「◄你在這裡」標到該 Part）\n\n```text\nPart I 獎賞系統               Part II 劫持的過程\nch01 為什麼會被劫持           ch05 學習變成強迫\nch02 獎賞迴路 VTA→NAc→PFC →   ch06 耐受與戒斷\nch03 dopamine 是預測誤差      ch07 觸發與渴求\nch04 想要 vs 喜歡 ★          ch08 誘因敏化 ★\n                                  │\n                                  ↓\nPart IV 出路與機制            Part III 範圍與爭論\nch13 復原的神經科學       ←   ch09 行為成癮 VR\nch14 治療怎麼運作             ch10 疾病 vs 學習\nch15 數位時代的劫持           ch11 為什麼有人成癮\nch16 finale 六主線口試        ch12 Rat Park 與環境\n```\n\n★＝全書兩個高潮：ch04 想要 vs 喜歡（脊椎硬核、「兩條曲線分岔」定版）、ch08 誘因敏化（兩條曲線正式分岔、把全書脊椎收成一張圖）。\n\n## 跨章基準（一致性掃描的依據；各章不得另創寫法、命名、數字）\n\n**脊椎**：成癮＝大腦的獎賞學習系統被劫持。具體脊椎物件是**「兩條曲線分岔」這張圖**（橫軸用癮歷程、wanting 隨敏化越爬越高、liking 隨 allostasis 越塌越低、剪刀差越開越大）與**兩個歸位問句**：①這是「想要」還是「喜歡」？②是哪一段迴路（VTA→NAc→PFC、目標導向→習慣、正增強→負增強）被劫持？每章至少明確做一次歸位。**脊椎使用戒律**：脊椎是描述機制的工具，**不可**用 wanting/liking 分離去「證明」成癮是疾病（見 ch10、landscape §六）。\n\n| 基準 | 寫法／值 | 出現章 |\n|---|---|---|\n| **核心迴路** | 中腦邊緣多巴胺路徑（mesolimbic dopamine pathway）＝VTA→NAc（含 PFC、杏仁核）；**VTA→NAc→PFC** 全書固定寫法 | ch02 定版／全書 |\n| **VTA** | 腹側被蓋區（ventral tegmental area），DA 神經元起點（含報 RPE 的神經元） | ch02 |\n| **NAc** | 伏隔核（nucleus accumbens），腹側紋狀體關鍵核；**殼（shell）**含「喜歡」的類鴉片快感熱點 | ch02／ch04 |\n| **PFC** | 前額葉皮質（prefrontal cortex），執行控制／煞車；成癮中**功能低下**（prefrontal hypoactivity）；dlPFC=背外側 | ch02／ch05 |\n| **DA = RPE** | dopamine（多巴胺，DA）編碼**獎賞預測誤差（reward prediction error, RPE）≈ RL 的 TD error**；**不是快感分子**。標準三段：非預期獎賞→正 RPE／已預測→無反應且時點前移到 cue／預期落空→負 RPE 跌破基線 | ch03 定版 |\n| **DA=RPE 的嚴謹級** | 「**主導但非唯一**模型」（有顯著性／威脅編碼、異質性等辯論）；寫「主導模型／最有影響力的解釋」，不寫「唯一真相」 | ch03／全書 |\n| **wanting** | 想要＝誘因顯著性（incentive salience），由 DA 中介；**不等於快感**；趨近的「油門」 | ch04 定版／全書 |\n| **liking** | 喜歡＝快感衝擊（hedonic impact），由 **NAc shell 約 1 mm³ 類鴉片（opioid）熱點**＋內源性大麻素中介，**不靠 DA**；「爽的儀表」 | ch04 定版 |\n| **wanting≠liking 的嚴謹級** | 「dopamine ≠ 快感分子」**已是主流共識**、可較硬寫；incentive-salience 對 DA 角色的解釋仍與 RPE 等框架並存有辯論 | ch04／ch08 |\n| **誘因敏化理論** | incentive-sensitization theory，Robinson & Berridge **1993** 首提（30 週年回顧 2025）；三支柱：間歇用藥使易感者中腦邊緣**敏化**、敏化**極持久**、DA 中介「想要」尤其被 cue 觸發不中介快感 | ch08 定版／ch04 伏筆 |\n| **兩條曲線分岔圖** | wanting↑（敏化）、liking↓（allostasis）剪刀差；**ch04 定版**，ch06/ch07/ch08/ch09/ch14/ch15 照抄變形並指出「現在動的是哪條線」 | ch04 定版 |\n| **目標導向→習慣** | actions→habits→compulsions（Everitt & Robbins）；控制權由腹側→背側紋狀體、DMS（背內側，目標導向）→DLS（背外側，習慣／自動化），PFC 煞車失靈；**動物模型清楚、人類較間接** | ch05 定版 |\n| **allostasis** | 異穩態（Koob & Le Moal **2001**）；獎賞「設定點（setpoint）」被向下重置；對立歷程理論（opponent-process，Solomon & Corbit **1974**）b-process 增強→耐受／戒斷 | ch06 定版 |\n| **dark side** | 黑暗面；正增強（為爽）→負增強（為解除痛苦）；擴展杏仁核（extended amygdala）抗獎賞系統（CRF、dynorphin）；接「喜歡」那條曲線塌陷 | ch06 定版／ch08 |\n| **anhedonia** | 失樂／快感缺失；liking 基線塌陷的徵狀 | ch06 |\n| **VR 排程** | 變動比率（variable-ratio, VR，Skinner）；最高反應率、**最抗消弱（resistant to extinction）**；吃角子老虎；最大正向 RPE 出現在最不可預測時 | ch09 定版 |\n| **疾病 vs 學習（🔶）** | **兩造並陳、不裁決**。疾病：Leshner **1997** Science／Volkow, Koob & McLellan **2016 NEJM**（BDMA=brain-disease model）。學習／選擇：Lewis 2015《The Biology of Desire》／Heyman 2009《Disorder of Choice》／Hart。**連批評者都承認腦確實改變**，爭的是「該不該叫疾病」這個框架／政策層次 | ch10 定版 |\n| **遺傳率（heritability）** | 用「**約 40–60%、且因物質與性別／研究而異**」區間語，**不寫死單一數字**；是**群體變異分配、非個人機率、非基因決定論** | ch11 定版 |\n| **發育期脆弱窗** | 青春期 PFC 成熟晚於邊緣獎賞系統＝「油門早熟、煞車晚熟」；方向共識、具體效應量仍研究中 | ch11 |\n| **ACE** | 童年逆境經驗（adverse childhood experiences）；公認風險因子；與遺傳脆弱性**交互作用（基因×環境）**、雙向糾纏 | ch11 |\n| **Rat Park（🔶）** | Bruce Alexander，論文 **1978–1981**；豐富環境鼠喝較少嗎啡。**必 hedge**：直接複製不穩（Petrie 失敗、2020 僅概念性複製）、方法有疵（口服嗎啡、樣本小）；環境是**調節因素之一非唯一**；脆弱性是真的（約 **15%** 違法藥物使用者依賴）。**不可寫成「成癮全是環境」** | ch12 定版 |\n| **越戰退伍軍人** | Lee Robins，**1970s（經典 1977、回顧 1993）**；在越南約 **20%** 成癮、返美 **8–12 個月**降回約 **1%**、逾 **90%** 自然戒斷。環境／脈絡是強力調節因素，但**不證明藥理無關**，受極端脈絡轉換綁定、勿外推 | ch11／ch12／ch13 |\n| **治療藥物（MOUD）** | 美沙酮（methadone）=完全致效劑（full agonist）；丁基原啡因（buprenorphine）=**部分致效劑（partial agonist）**；納曲酮（naltrexone）=**拮抗劑（antagonist）**。**非醫療建議** | ch14 定版 |\n| **CM** | 後效管理（contingency management）；以即時獎勵增強目標行為；統合分析顯示**最有效心理社會治療之一**，尤其對興奮劑使用障礙；**停獎後效果可能衰減**；橋＝用可靠即時的正 RPE 重訓「想要」迴路 | ch14 |\n| **減害** | harm reduction；naloxone（納洛酮）、針具交換等；主流公衛**證據支持、漸成標準**，仍有政策爭議 | ch14 |\n| **多巴胺排毒（❌）** | 偽科學：**無法排掉／重置 DA**（它是必需的神經傳導物、非毒素）。源自 Sepah **2019**，原版其實是 **CBT／刺激控制（stimulus control）**、有效；**發明者承認名稱錯**。正名：對成癮行為的刺激控制，不是「排多巴胺」 | ch15 定版 |\n| **Olds & Milner** | 1954 ICSS（腦內自我刺激，首次觀察 1953、論文 1954）；**「快感中樞」是誤稱**——敲到的是增強／「想要」系統不是純快感（脊椎歷史第一個伏筆） | ch01／ch02 |\n| **人名／年份錨** | 一律照 landscape 人名表與年份；**Trevor Robbins（actions→habits）與 Lee Robins（越戰）是兩個人，拼法相近不得混用** | 全書 |\n\n**這幾組對應全書不得漂移**：DA=多巴胺；RPE=獎賞預測誤差（≈TD error）；wanting=想要（誘因顯著性，**不是**快感）；liking=喜歡（快感，NAc shell 類鴉片熱點）。\n\n## 全域不涵蓋（任何章都不展開，最多一句話＋指向擁有章）\n\n- 神經元／突觸／神經傳導物的**系統性解剖教學**：只在需要處從零給直覺（神經元/突觸基本運作 ch02 一節帶過），不刷神經解剖名詞。\n- **各種藥物的具體藥理學**（每種藥怎麼作用於哪個受體的完整清單）：只在機制需要時點名（如鴉片→opioid 受體、興奮劑→DA 再回收），不逐藥展開。\n- **臨床診斷準則**（DSM／ICD 的 SUD 條目）：不背診斷、不出診斷題；本書談機制不談貼標籤。\n- **任何戒斷方案／用藥指引／劑量／自助流程**：全書紅線，碰到一律轉成「機制說明，非醫療建議」並指向專業資源（ch14 集中處理機制）。\n- **成癮的社會政策與法律**（除罪化、毒品戰爭）：只在 ch10/ch12 作為爭議的脈絡一句帶過，不展開政策論證。\n- **RL／TD learning 的完整演算法**（值函數更新、policy gradient）：只取「dopamine≈prediction error」這一座橋，給一句話複習再接 DA（ch03），不教 RL。\n- **「多巴胺排毒」之外的其他自助偽科學**：只正面拆「多巴胺排毒」這一個代表（ch15），其餘不逐一打。\n- **四本興趣書互不引用**：不引用集合論／機率／其他書；系統面／工程面只當橋接直覺，不外連書目。\n\n---\n\n## Part I — 獎賞系統（ch01–04）\n\n### ch01 — 大腦為什麼會「被劫持」：成癮是系統特性，不是道德缺陷\n- **目標**：讀完能說出本書的中心主張——成癮是**正常獎賞學習系統被一個異常強的輸入推到失控**的工程故障，不是「意志力不夠」的道德缺陷；能說出「劫持」這個比喻精確指什麼（不是裝了惡意程式，是合法系統的合法運作被推爆）；能畫出全書地圖、複述六條驗收主線。\n- **必涵蓋**：開場拆「成癮＝意志力問題」這個全社會預設——把它當成本書要全程反駁的對手；「劫持（hijack）」的精確定義：不是外來病毒，是**你本來就有、且運作正常的獎賞學習系統，被一個比演化預期更強更可靠的輸入持續觸發**（藥物直接灌爆 DA、行為提供 VR 回報）；為什麼這個視角重要——它同時解釋了「為什麼這麼難戒」（系統真的被改了）與「為什麼不是道德問題」（換成這套迴路、給足脆弱性與環境，你我都會掉進去）；脊椎首次宣告：本書全程問兩個問句（想要 vs 喜歡？哪段迴路被劫持？），並預告「兩條曲線分岔」這張圖（ch04 定版）；Olds & Milner 1954 ICSS 當開場鉤子——老鼠寧可放棄食物水也要壓桿自我刺激，**但「快感中樞」是誤稱**（脊椎歷史第一個伏筆，正解留 ch02/ch04）；本書路線圖（基準圖首次出場）＋六條驗收主線開宗明義；明標本書定位（非醫療手冊、非自助書、非教科書、非道德宣言、純興趣欣賞）。\n- **不涵蓋**：獎賞迴路解剖（ch02）；DA=RPE（ch03）；wanting/liking 機制（ch04）；疾病 vs 學習之爭的展開（ch10——這裡只說「道德缺陷」不是本書立場，不碰「疾病」框架）。\n- **橋接**：**正回饋迴圈缺 backpressure 的失控**——系統本身設計沒錯，但少了煞車、又來了一個異常強的輸入，就跑飛；「合法請求打爆服務」不是請求惡意、是系統沒有為這種強度設計；profiling 視角開場白：要修一個你以為是「使用者亂用」的故障，先別罵使用者，先量測系統哪條路徑被打爆（全書方法論基調）。\n- **Worked example**：把 Olds & Milner 的數字走一遍——電極誤置中隔區附近、老鼠每小時壓桿數百到數千次、放棄食物水；逐步論證「這證明了大腦有可被直接驅動的**增強**系統」，但**不**證明「這裡是快感中樞」（壓桿狂熱＝強烈的「再來一次（wanting）」，不等於主觀爽感（liking）——把脊椎的核心張力在第一章就埋下，正解指向 ch04）。\n- **紙上推演**：把「他就是意志力不夠」這句白話宣稱翻成「它預設了什麼機制、這個預設哪裡站不住」（★，[15 分鐘]）；口頭重講「劫持不是裝病毒、是合法系統被推爆」給一個工程師聽（★，[10 分鐘]）；預測題：若 ICSS 真打中「快感中樞」，老鼠壓桿時的表情／味覺反應該如何？對一下 ch04 的答案（★★，[15 分鐘]）。\n\n### ch02 — 獎賞迴路：中腦邊緣多巴胺路徑 VTA→NAc→PFC\n- **目標**：能畫出 VTA→NAc→PFC 這條中腦邊緣多巴胺路徑、說出每個節點在做什麼；能用神經元/突觸/神經傳導物的最小直覺解釋「一個訊號怎麼從 VTA 傳到 NAc」；理解這條迴路是後面每一章劫持的物理舞台。\n- **必涵蓋**：先給神經元/突觸/神經傳導物的**最小夠用**直覺（不刷解剖）：神經元＝會放電的節點、突觸＝節點間的化學訊號傳遞、神經傳導物＝跨突觸的訊息分子（DA 是其中一種）；**核心迴路定版**（基準表）：VTA（DA 神經元起點）→ NAc（腹側紋狀體，動機核心節點；殼 shell 另含快感熱點，伏筆 ch04）→ PFC（執行控制／煞車）；中腦邊緣多巴胺路徑＝獎賞與動機的核心；每個節點「在解什麼問題」——VTA 算訊號、NAc 把訊號變成趨近、PFC 決定要不要踩煞車；回收 ch01 的 ICSS：Olds 電極打到的就是這條迴路附近，再次釘「增強系統≠快感中樞」；脊椎歸位：這一章先把「舞台」搭好，後面每談一個現象都回來指「動的是這條線的哪一段」。\n- **不涵蓋**：DA 訊號的精確語義 RPE（ch03，這裡只說 VTA 發 DA、不說它編碼什麼）；wanting/liking 各自的基質（ch04，這裡只把 NAc shell 標為伏筆）；目標導向→習慣的紋狀體轉移（ch05）。\n- **橋接**：**一條請求路徑（request path）的服務拓樸**——VTA＝產生訊號的上游服務、NAc＝把訊號轉成動作的中游、PFC＝有否決權的閘道；「訊號從哪發、在哪被放大、誰有煞車權」就是你讀一張服務依賴圖的方式；神經傳導物跨突觸＝服務間的訊息傳遞（message passing），DA 是其中一個 topic。\n- **Worked example**：走一條完整訊號鏈：一個非預期獎賞（一口沒料到的甜）→ VTA DA 神經元放電上升 → DA 釋放到 NAc → 趨近／「再來一次」的動機被推高 → PFC 評估要不要繼續（一步步走完，每步右側標「這一步在做什麼」；DA 編碼什麼的精確版**留 ch03**，這裡只走解剖鏈）。\n- **紙上推演**：把 VTA→NAc→PFC 三節點各配一個「它在解什麼問題」的一句話（★，[10 分鐘]）；找破綻：「DA 從 VTA 噴出來、人就會覺得爽」——這句話把哪兩件事混為一談了（★★，[15 分鐘]，正解指向 ch03/ch04）；口頭重講「一個甜味訊號怎麼從 VTA 走到 PFC」給一個只懂系統拓樸的工程師（★，[10 分鐘]）。\n\n### ch03 — dopamine 不是快感分子：它是預測誤差\n- **目標**：能講清楚 dopamine 報的是**獎賞預測誤差（RPE）**＝「實際獎賞與期望的 diff」、不是「發爽訊號」；能把 Schultz 1997 的三段訊號當成一個 RL episode 的 TD 更新一步步走完；知道「DA=RPE 是主導但非唯一模型」這個嚴謹邊界。\n- **必涵蓋**：先給 RL 的 TD／預測誤差**一句話複習**（讀者修過 ML，生鏽即可）：學習＝把「實際拿到的」跟「原本預期的」相減，用這個 diff 去更新預期；**DA=RPE 定版**：Schultz, Dayan & Montague 1997 三段——①非預期獎賞→DA 放電上升（正 RPE）②完全被預測的獎賞→反應消失（無誤差）、且放電時點**前移到預測線索 cue**③預期獎賞落空→在該來的時點放電**跌破基線**（負 RPE）；這正是 RL 的 TD error，**讀者最划算的一座橋**（dopamine≈系統回傳的 prediction error，不是 reward 本身）；每段「在解什麼問題」——RPE 是學習訊號，告訴系統「下次該把期望調高還是調低」、以及「該把價值歸給哪個 cue」；**嚴謹標示**：DA=RPE 是**主導但非唯一**模型（有顯著性／威脅編碼、神經元異質性等辯論），寫「主導模型」不寫「唯一真相」；脊椎歸位：DA 報 diff＝這是「想要」系統的學習燃料、不是「喜歡」系統的快感訊號（正式分離留 ch04）；釘死全書最該破的迷思之一——「多巴胺＝快感／讓你爽」是錯的科普口號。\n- **不涵蓋**：wanting/liking 的神經基質分離與 taste reactivity（ch04）；敏化讓 DA 釋放越來越強（ch08）；負增強／dark side（ch06）。\n- **橋接**：**TD error／prediction error 你修過**——dopamine 就是大腦版的「與期望的 diff」訊號；快取命中（已預測，無驚喜）vs 快取未命中（非預期，大訊號）＝已預測獎賞無反應 vs 非預期獎賞正 RPE；「訊號前移到 cue」＝系統學會在更早的 signal 就預載期望（prefetch／預測性快取）。\n- **Worked example**：把 Schultz 1997 當一個 RL episode 一步步走完：episode 0（cue 後給汁，DA 在**給汁**時跳＝正 RPE，系統把價值往前歸因）→ 經過數十次學習 → episode k（DA 在 **cue** 時跳、給汁時不跳＝期望已建立、誤差歸零）→ 某次 cue 後**不給**汁（DA 在原該給的時點**跌破基線**＝負 RPE，系統下修期望）；逐 episode 標出「這一刻 DA 報的是正／零／負誤差，對應 TD 更新把哪個期望調往哪邊」。\n- **紙上推演**：預測一個研究結果再對答案——「猴子已學會 cue→汁，這次 cue 後汁延遲 0.5 秒才到，DA 在原時點和延遲後各會怎樣？」（★★，[20 分鐘]）；把「吃到好吃的，多巴胺就飆高讓你很爽」翻成機制、指出它錯在哪一步（★★，[15 分鐘]）；口頭題：為什麼「DA 報的是 diff 不是 reward」這個區別是整本書的地基（★，[10 分鐘]）。\n\n### ch04 — 「想要」與「喜歡」的分離：incentive salience（全書高潮之一）\n- **目標**：能講清楚 wanting（想要＝誘因顯著性，DA 中介）與 liking（喜歡＝快感，NAc shell 類鴉片熱點中介）是**兩套不同的神經系統**、平常同進退、**但可被分離**；能說出 taste reactivity 實驗如何證明「DA 沒有快感熱點」；能定版「兩條曲線分岔」這張圖、看出成癮就是這兩條曲線的分岔。**這是全書脊椎硬核，明說值得停十分鐘。**\n- **必涵蓋**：把 ch03（DA 報 diff）和 ch02（NAc shell 伏筆）接起來，正式提出**兩套系統**：wanting＝誘因顯著性（incentive salience），由中腦邊緣 DA 中介，是「趨近的油門」；liking＝快感衝擊（hedonic impact），由 **NAc shell 約 1 mm³ 的類鴉片（opioid）熱點＋內源性大麻素**中介，**不靠 DA**；**關鍵證據**：taste reactivity（味覺反應，甜味引發的節律性伸舌等「喜歡反應」，嬰兒與大鼠通用）——操弄 DA 不改變「喜歡反應」、真正放大「喜歡」的是 NAc shell 類鴉片熱點（Berridge & Robinson）；**wanting 與 liking 通常同進退、但可被分離**（尤其操弄 DA 時）——這是全書最關鍵的一句；**「兩條曲線分岔」圖定版**（基準視覺）：橫軸用癮歷程，wanting 曲線（敏化，越爬越高，ch08 展開）、liking 曲線（allostasis，越塌越低，ch06 展開）、剪刀差越開越大——後續每章回到這張圖指「現在動的是哪條線」；脊椎歸位示範：成癮者「一個 cue 就引爆強烈渴求，即使他說這劑已經沒那麼爽」＝wanting 高、liking 低，活生生的分離；**嚴謹標示**：「DA≠快感分子」已是主流共識可較硬寫；incentive-salience 對 DA 角色的**解釋**仍與 RPE 等框架並存有辯論（誠實標兩級）。\n- **不涵蓋**：誘因敏化讓 wanting 曲線怎麼爬（ch08）；allostasis 讓 liking 曲線怎麼塌（ch06）；目標導向→習慣（ch05）。\n- **橋接**：**兩個被你長期混為一談的指標**——wanting≈「點擊率／趨近行為」、liking≈「實際滿意度」；產品上你早知道「使用者一直點不代表他喜歡」（互動量≠滿意度），成癮就是這兩條指標被生理化地拉開；DA 是「催你去拿」的油門、不是「拿到很爽」的儀表，這兩個被同一個直覺詞「reward」糊住了。\n- **Worked example**：把「想要曲線爬升、喜歡曲線塌陷」的剪刀差用一個假想時間軸**逐期歸位**：第 1 期（初用，wanting 中、liking 高，淨爽）→ 第 5 期（敏化起步，wanting 升、liking 已開始被 allostasis 拉低）→ 第 20 期（wanting 很高、liking 跌破基線，**淨痛苦卻更想要**）；每一期明標「這期動的是敏化（wanting↑）還是 allostasis（liking↓）」，並指出哪些是穩固共識、哪些是主流假說。\n- **紙上推演**：把一個現象歸位到「想要 vs 喜歡 × 哪段迴路」——「戒菸多年的人路過便利商店突然強烈想抽，抽了卻覺得普通」（★★，[15 分鐘]）；設計一個假想實驗區分「這隻動物是想要還是喜歡」（提示：taste reactivity vs 趨近行為要分開量）（★★★，[25 分鐘]）；口頭題【全書最重要的口試之一】：不看書，把「DA 中介想要、類鴉片熱點中介喜歡、成癮是兩者分岔」講給一個工程師聽，講到他能自己重走（★★★，[20 分鐘]）。\n\n## Part II — 劫持的過程（ch05–08）\n\n### ch05 — 學習變成強迫：目標導向 → 習慣\n- **目標**：能講清楚行為如何從**目標導向（為了結果、依賴 PFC／腹側紋狀體）**滑成**習慣（自動化、控制權下移到背外側紋狀體 DLS）**、再到強迫；能說出 PFC 功能低下如何讓煞車失靈；理解這是「劫持」的控制流層面。\n- **必涵蓋**：兩種行為控制——目標導向（goal-directed，問「結果值不值得」，可被後果調整）vs 習慣（habitual，cue 一來就自動執行、不再查後果）；**actions→habits→compulsions 定版**（Everitt & Robbins）：重複夠多次，控制權由腹側→背側紋狀體、再由 DMS（背內側，目標導向）→DLS（背外側，習慣／自動化）轉移；**PFC 功能低下（prefrontal hypoactivity）**使目標導向系統失去對習慣系統的煞車——這是「明知有害還是做」的迴路解釋；每階段「在解什麼問題」——習慣化本身是有用的省力機制（不必每次重算），問題是被劫持的行為也搭了這班自動化便車、且繞過了後果評估；脊椎歸位：這條軸動的主要是「想要→自動執行」這側（wanting 被習慣化固化），**不是** liking；**嚴謹標示**：ventral→dorsal shift **動物模型清楚、人類證據較間接**，寫「在動物模型中已清楚展示、人類支持但較間接」。\n- **不涵蓋**：耐受／戒斷／設定點漂移（ch06）；cue 觸發渴求的細節（ch07）；DA 釋放敏化（ch08）。\n- **橋接**：**快取熱路徑／編譯固化**——重複夠多次，控制權從「每次決策（解譯執行、查成本）」下放到「自動執行的編譯結果」，繞過 PFC 的成本評估；像一條被 JIT 編譯掉的熱路徑，快是優點、但它不再每次重新檢查前提；「習慣＝被快取的決策」，cache invalidation（戒除）難正是因為熱路徑已固化。\n- **Worked example**：走一條從目標導向到習慣的完整轉移鏈：初期（為了某個明確結果而做，PFC 主導、可被「這次不值得」叫停）→ 中期（cue 一出現就傾向做，但還叫得住）→ 後期（cue→action 自動觸發、後果（已經不值得）無法再叫停＝控制權落到 DLS、PFC 煞車失靈）；每步標出「控制權現在在哪個紋狀體子區、PFC 還有沒有否決權」。\n- **紙上推演**：把「他明知道有害為什麼還做」翻成機制（目標導向系統的煞車對習慣系統失效）（★★，[15 分鐘]）；找破綻：「習慣化是壞東西，所以大腦不該有習慣系統」哪裡錯了（★，[10 分鐘]）；口頭重講「控制權怎麼從 PFC 下放到 DLS」用快取熱路徑類比講給工程師（★★，[15 分鐘]）。\n\n### ch06 — 耐受與戒斷：系統的反向校準\n- **目標**：能用 allostasis（異穩態，設定點向下漂移）與對立歷程理論（opponent-process）解釋耐受、戒斷、anhedonia；能說出「dark side」是正增強滑向負增強；能在「兩條曲線分岔」圖上指出這一章動的是 **liking 那條（往下塌）**。\n- **必涵蓋**：先給控制理論直覺（讀者熟 setpoint）：身體會對反覆的擾動做**反向校準**把狀態拉回——但校準過頭、且把設定點本身改低；**對立歷程理論定版**（Solomon & Corbit 1974）：任何情緒狀態啟動後，中樞自動以對立歷程（b-process）削弱它；反覆刺激使 b-process **增強、持久**——這就是**耐受**（同劑量越來越不爽）與**戒斷**（停藥後 b-process 裸露＝負面狀態）的機制；**allostasis 定版**（Koob & Le Moal 2001）：獎賞「設定點（setpoint）」被向下重置，造成停藥後長期復發脆弱性；**dark side 定版**：成癮晚期由**正增強（為了爽）轉為負增強（為了解除痛苦）**——擴展杏仁核抗獎賞系統（CRF、dynorphin）；anhedonia（失樂）＝liking 基線塌陷；脊椎歸位：dark side 接的是「喜歡」那條曲線——快感系統被向下重置（不是想要變弱、是基線爽感塌陷），「越來越想要、越來越不喜歡」的剪刀差被**生理化**；回到 ch04 那張圖，明指「這一章在畫 liking 往下那條線、以及它為何驅動繼續用藥」。\n- **不涵蓋**：cue 觸發的渴求爆發（ch07）；wanting 那條曲線怎麼爬（ch08）；治療怎麼介入（ch14）。\n- **橋接**：**setpoint 漂移＋正回饋失調**——PID 控制器反覆對抗同一擾動，把基準偷偷改低，於是「回到正常」現在需要那個輸入才行（沒有它反而低於基線）；像一個自動調節被反向訓練到「沒有外部刺激就低於正常水位」；負增強＝為了消除一個由系統自己製造的痛苦而行動（系統在追自己尾巴）。\n- **Worked example**：把對立歷程逐次走完——第 1 次用藥（a-process 強正、b-process 弱，淨值很爽）→ 第 10 次（a 不變、b 增強，淨爽下降＝耐受）→ 停藥（a 消失、b 裸露且持久，淨值為負＝戒斷的煩躁／anhedonia）；逐次標出「a 和 b 的相對大小、淨情緒值、對應臨床上的耐受還是戒斷」，並把終態映回「兩條曲線分岔」圖的 liking 線。\n- **紙上推演**：用對立歷程預測「一個從沒接觸過的人第一次 vs 第五十次用同劑量」的主觀感受曲線、再對機制答案（★★，[20 分鐘]）；把「他現在用只是為了不難受、根本不爽了」歸位到 wanting/liking × dark side（★★，[15 分鐘]）；口頭題：為什麼「設定點被改低」比「快感變弱」更能解釋戒斷的痛苦（★★，[15 分鐘]）。\n\n### ch07 — 觸發與渴求：線索如何綁架你、復發\n- **目標**：能講清楚 cue（線索）如何透過學習被賦予誘因價值、進而觸發**渴求（craving）**＝wanting 的爆發；能解釋為什麼戒了很久、線索仍能引爆復發；能在脊椎上把渴求歸位成「想要被 cue 觸發」而非「喜歡」。\n- **必涵蓋**：回收 ch03「DA 放電時點前移到 cue」——cue 被學習賦予誘因價值後，**cue 本身**就能觸發 DA／wanting，不必等獎賞到；**渴求定版**：craving＝cue 觸發的 wanting 爆發（不是 liking、不是「想享受」，是被點燃的「去拿」衝動）；為何戒很久仍復發——誘因敏化**極持久**（ch08 展開）＋cue→wanting 的條件化不會因停用而抹除（消弱≠抹除，只是上面蓋了新學習，原連結還在）；環境脈絡的威力（伏筆 ch12 越戰退伍軍人、Rat Park）：cue 環境本身是復發的最強預測子之一；脊椎歸位：渴求動的是 wanting 那條線的**急性尖峰**（cue 觸發），與 liking 無關——這解釋了「他說不想要了，身體卻被一個氣味拉回去」；回到「兩條曲線分岔」圖，標出 cue 在 wanting 線上製造的尖峰。\n- **不涵蓋**：敏化的三支柱與持久性機制（ch08）；環境調節的證據與爭議（ch12）；治療如何處理 cue（ch14 暴露／CM）。\n- **橋接**：**cue→action 的條件化＝被訓練出來的觸發器（trigger／webhook）**——一個事件被綁定到一個自動反應；「消弱≠刪除」＝你停用一個 feature flag 不等於刪掉那段 code，連結還在、條件對了就被喚醒；環境 cue＝同一個請求在不同環境觸發不同熱路徑（context-dependent retrieval）。\n- **Worked example**：走一條 cue→渴求→復發的完整鏈：中性線索（某個地點／時間／氣味）反覆與用藥配對 → 線索被賦予誘因價值（DA 前移到 cue）→ 戒除期該線索仍存在 → 某天遇到線索 → wanting 急性尖峰（渴求）→ 在 PFC 煞車已弱（ch05）的情況下復發；逐步標出「這一刻是 cue 觸發 wanting、不是 liking 回來了」，並指出哪一環是治療最常下手處（指向 ch14）。\n- **紙上推演**：把「他都戒兩年了怎麼一聞到味道就破功」翻成機制（cue 條件化持久＋消弱≠抹除）（★★，[15 分鐘]）；設計一個假想實驗證明「渴求是 wanting 不是 liking」（提示：量趨近／生理喚起 vs 量主觀愉悅）（★★★，[25 分鐘]）；口頭題：為什麼「把 cue 環境整個換掉」可能比「靠意志力抵抗 cue」有效（呼應越戰退伍軍人，伏筆 ch12）（★★，[15 分鐘]）。\n\n### ch08 — incentive sensitization：想要越強、喜歡越弱（全書高潮之一）\n- **目標**：能完整講出誘因敏化理論（Robinson & Berridge 1993）的三支柱、看出它如何把前面所有現象收成「兩條曲線分岔」這一張圖；能說出敏化（wanting↑）與 allostasis（liking↓）是兩個不同機制、共同造成剪刀差；這是 Part II 的收束、全書脊椎正式合龍。\n- **必涵蓋**：把張力講滿——前七章分別給了 DA=RPE、wanting/liking 分離、習慣化、allostasis、cue 渴求，這一章把它們接成一條因果鏈；**誘因敏化理論三支柱定版**（Robinson & Berridge 1993，30 週年回顧 2025）：①間歇用藥使**易感者**的中腦邊緣系統**敏化**→藥物誘發 DA 釋放越來越強；②敏化**極持久**（停藥後仍在，解釋長期復發脆弱）；③DA 中介「想要」、尤其被 cue 觸發，**不中介**快感；於是 wanting 曲線越爬越高；對照 ch06 的 allostasis 讓 liking 曲線越塌越低——**兩個獨立機制、一升一降，剪刀差就是成癮的核心病理**；**「兩條曲線分岔」圖在此正式合龍**：明指 wanting 線由敏化驅動、liking 線由 allostasis 驅動，全書脊椎到此完整；脊椎歸位的範本章：用這張圖一句話解釋「越來越想要、越來越不喜歡」這個全書招牌句；**嚴謹標示**：敏化在動物模型清楚、人類較間接；incentive-salience 對 DA 角色的解釋仍與其他框架並存有辯論（incentive sensitization 不是全場唯一定論，但「想要與喜歡可分離」這條較硬）。\n- **不涵蓋**：行為成癮是否同源（ch09）；疾病 vs 學習之爭（ch10——敏化是機制、不替任一框架背書）；治療如何反向操作（ch14）。\n- **橋接**：**兩個獨立的監控指標反向漂移**——一個（wanting，敏化）被某條輸入越調越敏感、另一個（liking，allostasis）基線被越壓越低；你做過「某個指標越來越容易觸發、但實際價值越來越低」的系統診斷——剪刀差不是單一故障、是兩個機制疊加；敏化＝對同一輸入的**增益（gain）被調高**，allostasis＝**基線被調低**，兩者是不同旋鈕。\n- **Worked example**：把一個假想用癮歷程**逐期雙線歸位**（這是 ch04 worked example 的完整收束版）：給一張時間軸表，每一期分別標 wanting 值（敏化驅動，遞增）與 liking 值（allostasis 驅動，遞減）、淨值（爽→中性→痛苦）、以及「這一期主要動的旋鈕是增益還是基線」；走到「淨值已是痛苦、wanting 卻最高」那一期，明指這就是「劫持」最赤裸的一格。\n- **紙上推演**：預測題——「敏化極持久」預測戒除多年者遇 cue 仍有強 wanting，這和 allostasis 的恢復速度有何不同？對機制答案（★★★，[25 分鐘]）；把「他越陷越深是因為越來越爽」翻成機制、指出它把哪兩條曲線搞反了（★★，[15 分鐘]）；口頭題【脊椎合龍題】：用「兩條曲線分岔」這張圖、不看書，把整個 Part II（習慣化＋allostasis＋cue＋敏化）講成一條因果鏈（★★★，[20 分鐘]）。\n\n## Part III — 範圍與爭論（ch09–12）\n\n### ch09 — 行為成癮：賭博／遊戲／社群媒體與 variable-ratio\n- **目標**：能講出賭博／遊戲／社群媒體為何踩的是**同一條獎賞迴路**、不需要外來化學物質也能劫持 wanting 系統；能用 variable-ratio（變動比率）排程解釋「不可預測回報為何特別黏」；能把它歸位到脊椎（動的是 wanting、靠的是放大 RPE 的不可預測性）。\n- **必涵蓋**：核心主張——成癮的「劫持」不必靠外來分子，**任何能可靠且強烈觸發 DA／wanting 的輸入**都行，行為成癮踩的是同一條 VTA→NAc→PFC；**VR 排程定版**（Skinner）：每隔不固定次數的反應才給一次增強，產生**最高反應率、最抗消弱**；吃角子老虎＝VR 的純粹形態（「下一次就可能中」、沒有安全停手點）；連回 ch03——**最大的正向 RPE 出現在最不可預測時**，所以不可預測本身就是放大 wanting 的引擎（VR 是 RPE 機制的行為層體現）；社群媒體的 variable reward（通知、抽卡、無限下滑）＝產品化的 VR；脊椎歸位：行為成癮動的主要是 wanting（被 VR 放大的趨近），liking 同樣可能塌陷（玩到不快樂還停不下＝同一個剪刀差）；**嚴謹標示**：別把「VR 最抗消弱」誇成成癮全因——VR 是「為何間歇回報特別黏」的**行為層**解釋，敏化／習慣／dark side 仍疊加其上；行為成癮「是不是真成癮」本身有學界討論，呈現為「神經同源證據強、診斷邊界仍在動」。\n- **不涵蓋**：疾病 vs 學習框架（ch10）；數位時代的防禦與「多巴胺排毒」拆穿（ch15）；脆弱性為何因人而異（ch11）。\n- **橋接**：**variable reward 你做過 A/B 測試**——通知、抽卡、無限下滑的留存設計就是 VR；你早知道「不可預測的獎勵比固定獎勵更黏」，這章告訴你那是因為它踩中 RPE／wanting 的引擎；「最大驚喜在最不可預測處」＝最大 RPE 在最不可預測處，你的 push 策略和 Skinner 的鴿子是同一條曲線。\n- **Worked example**：用具體數字算「為什麼最大正向 RPE 出現在最不可預測時」：對比固定比率（每 5 次必中，第 5 次的驚喜≈0，因完全可預測）vs 變動比率（平均每 5 次但隨機，每一次都帶非零的正 RPE 期望，因下一次始終不確定）；逐步算出兩者的「期望驚喜」差距，說明 VR 為何持續餵養 wanting、且抗消弱（因為「沒中」也永遠不是「再也不會中」的證據）。\n- **紙上推演**：把一個 app 的留存機制（自選：通知／抽卡／無限下滑）翻成「它踩了 RPE／wanting 的哪一步」（★★，[15 分鐘]）；找破綻：「賭博沒有吃進任何化學物質，所以不可能是真的成癮」哪裡錯（★★，[15 分鐘]）；口頭題：為什麼「不可預測」比「高回報」更會綁住你（用 RPE 講）（★★，[15 分鐘]）。\n\n### ch10 — 成癮是不是「大腦疾病」：疾病模型 vs 學習模型（🔶 兩造並陳、不裁決）\n- **目標**：能各自給出疾病模型與學習／選擇模型**最強的版本**＋各自盲點；能說清楚「腦確實改變」是雙方共識、真正分歧在「該不該叫疾病」這個框架／政策層次；能說出**為什麼本書不替讀者裁決**、也不能用脊椎替任一方背書。**這是全書最敏感的一章，語氣最克制。**\n- **必涵蓋**：先框定爭點——爭的**不是**「腦有沒有改變」（連批評者都承認改變），爭的是「**腦改變 ⇒ 該不該叫疾病**」這個框架與政策問題；**疾病模型一方（BDMA）最強版**：Leshner 1997 Science〈Addiction is a brain disease〉（長期用藥造成腦結構功能改變、形成「開關」、戒斷極難）＋Volkow, Koob & McLellan 2016 NEJM（獎賞／執行功能／動機三系統的神經適應；目的之一是**減汙名、推動醫療對待**）；**學習／選擇模型一方最強版**：Lewis 2015《Biology of Desire》（成癮是深度動機學習造成的腦改變，腦會變不代表腦「病了」——學琴、戀愛也改變腦；疾病框架可能反而妨礙復原）＋Heyman 2009《Disorder of Choice》（多數成癮者會自行緩解、行為對後果敏感，更像受選擇／後效控制）＋Hart（多數用藥者不成癮、過度聚焦藥理忽略環境與社會脈絡是誤導）；各自盲點——疾病模型：人體證據是否真像帕金森那樣是「腦病」受質疑（Hall, Carter & Forlini 2015 Lancet Psychiatry）；學習模型：可能低估重度成癮者控制力受損的真實程度；**脊椎使用戒律明寫**：wanting/liking 分離是**描述機制**，「機制上腦確實改變」與「該叫疾病還是學習」是兩個層次，**不可**用脊椎證明疾病模型贏；本書立場：兩造各給最強版＋盲點，明說「這是價值與框架之爭，本書不替你裁決」。\n- **不涵蓋**：脆弱性的證據細節（ch11）；環境角色與 Rat Park（ch12）；治療機制（ch14——這裡不談「該怎麼治」只談「怎麼定性」）。\n- **橋接**：**同一份監控數據、兩種事故定性**——「這是系統性故障（疾病：需要結構性介入）」vs「這是可被誘因調整的行為（學習：後效與環境能改變它）」；兩邊看的是同一組 metrics、分歧在 root-cause 框架與該採取的應對策略，而非數據本身；工程師熟悉「同一個 incident 兩個 team 兩種 postmortem」的處境。\n- **Worked example**：把同一組公認事實（腦獎賞／執行系統確實改變、戒斷極難、但多數使用者會緩解、行為對後果敏感）**分別**餵給兩個框架，逐項展示「同一事實，疾病模型怎麼讀、學習模型怎麼讀」——做成兩欄對照，明確標出哪些格子雙方其實同意（腦改變、難戒）、哪些格子才是真分歧（這算不算「病」、政策含義）；示範「同一事實支撐兩種敘事」為何不代表其中一方在說謊。\n- **紙上推演**：給疾病模型和學習模型各寫一段 200 字內的最強辯護（不偏袒）（★★★，[25 分鐘]）；找破綻：「腦掃描顯示成癮者腦不一樣，所以成癮是腦疾病」——這個推論跳過了什麼（提示：腦改變≠疾病，學琴也改變腦）（★★，[15 分鐘]）；口頭題：為什麼「不裁決」不是和稀泥、而是因為這兩造分歧在價值與框架層次（★★，[15 分鐘]）。\n\n### ch11 — 為什麼有人成癮有人不會：脆弱性\n- **目標**：能講出成癮是**多因素疊加**（遺傳、發育期、ACE、環境）而非單因決定；能把「遺傳率約 40–60%」正確翻成「群體變異分配」而非「個人有一半機率成癮」；能說出青春期為何是脆弱窗、ACE 為何是風險因子且與基因交互。\n- **必涵蓋**：先破最毒的迷思——「遺傳率 50%＝你有一半機率會上癮」是嚴重誤讀；**遺傳率定版**：用「**約 40–60%、且因物質與性別／研究而異**」區間語，**不寫死單一數字**；遺傳率＝**群體層次的變異有多少可歸因於基因差異**，不是個人機率、不是宿命、不是基因決定論；使用起始（initiation）受環境影響較大（遺傳率較低）、使用障礙（use disorder）遺傳率較高；**發育期脆弱窗定版**：青春期 PFC 成熟晚於邊緣獎賞系統＝「油門早熟、煞車晚熟」的不對稱（回收 ch05 的 PFC 煞車），早期接觸風險與長期影響較高（方向共識、效應量仍研究中）；**ACE 定版**：童年逆境經驗是公認風險因子，與遺傳脆弱性**交互作用（基因×環境）**、且 ACE 的「易得性」本身部分受遺傳影響——關係雙向糾纏、非單純因果；脆弱性是**真的**（約 15% 違法藥物使用者依賴，伏筆 ch12 反駁「全是環境」）；脊椎歸位：脆弱性決定「同樣的輸入，誰的 wanting 系統更容易被敏化、誰的煞車更弱」——它調的是劫持的**門檻**，不是換掉機制。\n- **不涵蓋**：環境／Rat Park 的證據與爭議（ch12）；疾病 vs 學習框架（ch10）；治療（ch14）。\n- **橋接**：**遺傳率＝群體變異分配，像「這批機器故障率的變異有多少來自硬體批次差異」**，不是「這一台有 50% 會故障」——你最會分清楚「群體統計」和「個體預測」；脆弱性＝系統的**容錯餘裕（headroom）**因配置而異：同樣負載，餘裕小的先垮，但不是「註定垮」；基因×環境＝多個風險因子的交互疊加，不是單一 root cause。\n- **Worked example**：把「遺傳率約 40–60%」**逐步翻譯**：先說清楚它的定義（群體中成癮風險的變異有約 40–60% 可由基因差異解釋）→ 示範誤讀路徑（「所以我有一半機率」「所以是基因決定」各錯在哪）→ 給正確讀法（它告訴你群體裡基因差異很重要，但對「你個人會不會」幾乎不給直接機率，因為還疊著環境、發育期、ACE、運氣）；明標哪些是穩固（遺傳確有貢獻）、哪些要 hedge（具體數字因物質與研究而異）。\n- **紙上推演**：把「我爸酗酒、遺傳率 50%、所以我有一半機率會酗酒」這條推理逐步拆錯（★★，[20 分鐘]）；設計一個假想雙生子研究說明「遺傳率」量的到底是什麼（★★★，[25 分鐘]）；口頭題：為什麼「脆弱性是真的」和「環境很重要」可以同時成立、不矛盾（伏筆 ch12）（★★，[15 分鐘]）。\n\n### ch12 — Rat Park 與環境：成癮不只是化學（🔶 含複製爭議、必 hedge）\n- **目標**：能講出 Rat Park 與越戰退伍軍人研究說明了什麼（環境／社會連結／脈絡是**強力調節因素**）；能準確說出 Rat Park 的**複製問題與方法瑕疵**、以及它常被過度推廣成什麼；能在「環境是調節因素之一、非唯一」與「脆弱性是真的」之間站穩、不選邊倒。\n- **必涵蓋**：**越戰退伍軍人定版**（Lee Robins，1970s／經典 1977）：在越南約 20% 成癮、返美 8–12 個月降回約 1%、逾 90% 自然戒斷——**環境／脈絡線索改變是最強的「自然戒斷」力量**（回收 ch07 cue：脫離了 cue 環境，習慣隨之瓦解）；**Rat Park 定版**（Bruce Alexander，1978–1981）：豐富化、有同伴的環境鼠比孤立籠鼠喝較少嗎啡——暗示環境／社會連結是用藥的關鍵調節因素；**必 hedge 的兩個問題**：①複製問題——Petrie 直接複製失敗、2020〈Have we reproduced Rat Park?〉得到**概念性支持但非直接複製**（「豐富環境有保護作用」大方向有旁證，Rat Park 的**具體強效**未被穩定重現）；②方法瑕疵——樣本小、用口服嗎啡（不擬真、苦味混淆）、兩組測量不一致；**過度推廣警告**：Johann Hari 式「成癮的反面是連結、藥物本身幾乎不會讓人成癮、全是環境」是**過度延伸**——環境確是重要調節因素（與越戰一致），但**不能據此宣稱藥理／個體脆弱性無關**（約 15% 使用者依賴、脆弱性是真的，回收 ch11）；脊椎歸位：環境調的是「cue 環境＋有沒有更好的獎賞替代品」這兩個旋鈕，它改變 wanting 系統被觸發的頻率與替代成本，**不是**證明迴路機制不存在；**寫作戒律明寫**：Rat Park 可講、有啟發，但務必標「具體效應複製不穩、結論常被過度推廣」，**不可寫成「Rat Park 證明成癮純由環境決定」**。\n- **不涵蓋**：脆弱性的遺傳／發育細節（ch11）；疾病 vs 學習框架（ch10——環境論常被歸到學習側，但本章談證據不談框架站隊）；治療與社會介入（ch14）。\n- **橋接**：**環境＝負載與替代路徑的脈絡**——同一段 code 在資源豐富、有替代服務的環境下不易被打爆，在孤立、無替代的環境下一觸即潰；但「環境影響故障率」不等於「故障機制不存在」（你不會因為換好機房就說 bug 不存在）；越戰個案＝「整個 runtime 環境徹底更換」這種極端條件，別外推到「微調環境就能解」。\n- **Worked example**：把越戰退伍軍人的數字**逐步解讀**：赴越前約 0.4% → 在越南約 20% 成癮 → 返美 8–12 個月降回約 1% → 逾 90% 自然戒斷；逐步論證「這強烈支持環境／脈絡是關鍵調節因素」，但**明確標出**它為何**不**證明「藥理無關」（返家＝極端脈絡轉換＋社會角色重建的綁定條件，不能外推到一般街頭成癮）；哪些數字穩固、哪些措辭要 hedge（年份用「1970s／經典 1977」）。\n- **紙上推演**：找破綻：「Rat Park 證明了成癮全是環境造成的、跟藥物無關」——逐條指出它跳過了複製問題、脆弱性數據、過度推廣（★★★，[25 分鐘]）；把「成癮的反面不是清醒，而是連結」這句金句翻成「它對了哪一半、誇大了哪一半」（★★，[20 分鐘]）；口頭題：為什麼越戰退伍軍人和 Rat Park 同向、卻都不能證明「藥理無關」（★★，[15 分鐘]）。\n\n## Part IV — 出路與機制（ch13–16）\n\n### ch13 — 復原的神經科學：大腦能修復嗎、為何線索仍在\n- **目標**：能講出復原時哪些改變可逆、哪些（如 cue→wanting 條件化、敏化）極持久；能說出「自然緩解（natural remission）是常見的」與「復發脆弱長期存在」如何同時成立；能在脊椎上指出復原是「重訓哪條迴路、但原連結不會被刪除」。\n- **必涵蓋**：先給可逆性的分層——allostasis 的設定點漂移在停用後**可逐步回升**（liking 基線部分恢復，回收 ch06），但**誘因敏化極持久**（wanting 對 cue 的反應長期保留，回收 ch08）、cue→wanting 條件化**消弱≠抹除**（回收 ch07）；於是「為什麼戒很久還會被一個線索拉回去」有了機制答案——不是沒復原，是**有些線復原、有些線沒法刪**；**自然緩解定版**：多數成癮者會自行緩解（回收 ch10 Heyman、ch12 越戰）——復原是常態而非奇蹟，但這**不**等於「沒有真實的長期脆弱」；神經可塑性的兩面——大腦能學會新的（替代獎賞、新習慣覆蓋舊熱路徑），但學會的是**蓋上去**不是**洗掉**；脊椎歸位：復原＝把 wanting 重新導向新的、可持續的獎賞＋讓 PFC 煞車重新長回來（回收 ch05），同時接受 cue 連結長期潛伏；回到「兩條曲線分岔」圖，標出復原期哪條線能回升、哪條線只能被管理。\n- **不涵蓋**：具體治療手段與藥物（ch14）；數位場景的自我防禦（ch15）；疾病 vs 學習框架（ch10）。\n- **橋接**：**消弱≠刪除＝你停用一段 code 不等於從 repo 刪掉**——舊連結仍在版本史裡，條件對了會被重新喚醒；復原＝用新的熱路徑**覆蓋**舊熱路徑（shadow＋逐步切流），不是 drop table；PFC 煞車「長回來」＝把被繞過的慢路徑重新接回決策流。\n- **Worked example**：走一條復原時間軸的雙線歸位：停用初期（戒斷／anhedonia＝liking 基線最低，allostasis 尚未回升）→ 數週至數月（liking 基線逐步回升，但遇 cue 仍有 wanting 尖峰）→ 長期（liking 大致恢復、PFC 煞車增強，但 cue→wanting 連結潛伏，遇強線索仍可能尖峰）；逐期標出「這一刻哪條線在恢復、哪條線只能被管理」，並指出復發風險為何不歸零。\n- **紙上推演**：把「他都好幾年了怎麼還可能復發」用「消弱≠抹除＋敏化持久」翻成機制（★★，[15 分鐘]）；解釋「自然緩解很常見」和「長期復發脆弱」為何不矛盾（★★，[15 分鐘]）；口頭題：復原時哪條曲線能回升、哪條只能管理？為什麼（★★，[15 分鐘]）。\n\n### ch14 — 治療怎麼運作：藥物／CBT／減害的機制（非醫療建議）\n- **目標**：能講出主要治療手段**對著脊椎的哪條線、哪段迴路施工**（agonist／antagonist 動 DA／受體佔據、CM 動 wanting 學習、CBT 動 cue／PFC、減害動傷害而非依賴本身）；能說出每種為何有效、為何可能衰減；全章每觸及治療同段明說「機制說明，非醫療建議」。\n- **必涵蓋**：**全章免責基調**——本書非醫療手冊，以下講「機制為何有效／為何衰減」、不給用藥或戒斷指引、不做臨床判斷；**MOUD 定版**（機制角度）：methadone＝完全致效劑（穩定佔據受體、消除戒斷的劇烈波動）、buprenorphine＝**部分致效劑**（佔據受體但天花板效應、較安全）、naltrexone＝**拮抗劑**（阻斷受體、讓用藥無效化）——各自「對 wanting/liking 哪條線下手」：agonist 主要穩定 dark side／戒斷（liking 基線），antagonist 切斷正增強回路；**CM 定版**：後效管理以即時、可靠的具體獎勵增強目標行為，**統合分析顯示最有效心理社會治療之一**（尤其興奮劑使用障礙無藥可用時）——脊椎歸位橋：CM＝**用一個可靠、即時、正向的 RPE 去重訓 wanting 迴路**（直接對著「想要」施工，回收 ch03/ch09）；**CBT／刺激控制**＝處理 cue→wanting（暴露／改變線索、回收 ch07）＋重建 PFC 煞車（回收 ch05）；**減害定版**：harm reduction（naloxone、針具交換等）目標是降低傷害而非以立即戒斷為唯一目標，主流公衛證據支持、仍有政策爭議；**為何可能衰減**：CM 的效果在**停止獎勵後可能衰減**（回收 VR／消弱直覺）、cue 連結持久使復發風險不歸零（回收 ch13）；**不可吹成「治癒」**——成癮高復發傾向，治療目標常是長期管理與降低傷害。\n- **不涵蓋**：任何劑量／方案／臨床流程（全書紅線）；疾病 vs 學習框架的政策含義（ch10）；數位場景自助（ch15）。\n- **橋接**：**每種治療對應一個系統介入點**——agonist＝給一個穩定的替代供給壓住震盪（rate limiting／提供穩定下游）、antagonist＝斷開那條 endpoint（feature kill switch）、CM＝注入可靠即時的正向回饋去重訓（重新訓練一條 policy）、CBT＝改 cue 路由＋把煞車接回（restore the slow path）、減害＝在無法立刻關閉系統時先把爆炸半徑縮小（blast-radius reduction）；「停獎後衰減」＝撤掉強化訊號後 policy 漂回舊行為。\n- **Worked example**：把四種手段各自**對著「兩條曲線分岔」圖的哪條線、哪段迴路**逐一定位（做成一張對照：手段→施工點→為何有效→為何可能衰減）：agonist（liking 基線／dark side，穩定戒斷波動，衰減＝依賴本身仍在）／antagonist（切正增強，衰減＝順從性與 cue 仍在）／CM（wanting 學習，注入正 RPE，衰減＝停獎後消弱）／CBT（cue→wanting＋PFC 煞車，衰減＝cue 連結持久）；每格明標「這是機制說明，非醫療建議」。\n- **紙上推演**：把「為什麼 CM 給代幣就能改善、但停發代幣後可能退步」用 RPE／消弱翻成機制（★★，[20 分鐘]）；把一個療法（自選 agonist／antagonist／CM／CBT）歸位到「它對 wanting 還是 liking、哪段迴路下手」（★★，[15 分鐘]）；口頭題：為什麼「治療有效」和「不該說治癒」可以同時成立（★★，[15 分鐘]）。\n\n### ch15 — 數位時代的劫持：你口袋裡的吃角子老虎與防禦\n- **目標**：能把全書機制套到讀者自己的日常（通知、無限下滑、抽卡）、指認出它們踩的是同一條 wanting 迴路；能**正面拆穿「多巴胺排毒」這個偽科學**並給正解（刺激控制／CBT）；能說出基於機制的防禦邏輯（改 cue、不是「排多巴胺」）。\n- **必涵蓋**：回收 ch09（VR／variable reward）把鏡頭轉到讀者口袋裡——通知、無限下滑、抽卡、紅點＝產品化的吃角子老虎，踩的是同一條 VTA→NAc→PFC＋VR 放大的 RPE；脊椎歸位：它劫持的是 wanting（被 cue 與 VR 放大的趨近），liking 同樣可能塌陷（滑到不快樂還停不下）；**正面拆穿「多巴胺排毒」定版**（landscape §十二）：你**無法**排掉／重置 DA——它是大腦持續製造、維持運動／動機／學習的必需神經傳導物，不是可清除的毒素；真相溯源：Sepah 2019 的原版其實是**針對衝動行為的 CBT／刺激控制（stimulus control）**——減少問題行為、代以健康替代，這部分**有實證有效**；**發明者本人承認「dopamine fasting 這個詞技術上是錯的」**；病毒式極端版（24 小時禁一切快樂、把多巴胺當毒素）沒有科學支持、甚至可能有害；**基於機制的防禦邏輯**（非自助清單、是機制推論）：你能動的旋鈕是**改變 cue 與行為（刺激控制）**——減少對特定 cue 的 wanting 觸發、增加觸發成本、提供替代獎賞（回收 ch07 cue、ch12 環境）——把「排毒」正名為「對成癮行為的刺激控制」，去掉偽神經科學外衣；明標：這是機制推論不是醫療／生活建議。\n- **不涵蓋**：臨床治療（ch14）；行為成癮的同源證據細節（ch09）；finale 的總收束（ch16）。\n- **橋接**：**口袋裡的吃角子老虎＝你參與設計過的留存機制反過來作用在你身上**——通知＝push、紅點＝unread badge、無限下滑＝infinite scroll，都是 VR；「多巴胺排毒」＝把一個**狀態（DA 水位）**當成可以 flush 的快取，但 DA 不是可清空的緩衝區、是常駐服務；真正能改的是**路由與觸發條件（cue／刺激控制）**，不是去「清空多巴胺」。\n- **Worked example**：把「多巴胺排毒」這個宣稱**逐句翻成機制再拆**：宣稱「禁絕快樂刺激 24 小時可以重置多巴胺受體／降低多巴胺」→ 逐點對機制（DA 不是毒素、不能排；受體調節不是 24 小時靠靜坐重置；真正起作用的是**減少對特定 cue 的暴露＝刺激控制**）→ 給正解（把它正名為刺激控制／CBT，對著 cue→wanting 下手，回收 ch07/ch14）；明標哪部分是偽科學、哪部分（刺激控制）其實有效。\n- **紙上推演**：把一個你用過的 app 留存設計（通知／抽卡／無限下滑）歸位到「它劫持 wanting 的哪一步、用了 VR 的哪個性質」（★★，[15 分鐘]）；把「我要做多巴胺排毒，週末禁手機重置大腦」逐句拆成「哪句是偽科學、哪句翻成機制後其實有效」（★★，[20 分鐘]）；口頭題：為什麼「改 cue」是機制上站得住的防禦、「排多巴胺」不是（★★，[15 分鐘]）。\n\n### ch16 — finale：大腦被劫持，六主線口試\n- **目標**：把全書收進一條能口頭講完的故事線；用六條驗收主線當口試題完成總自我檢核；知道讀完之後往哪走（附錄 C）。\n- **必涵蓋**：全書地圖回收（ch01 的圖，現在每格都走過）；**脊椎收束**：成癮＝獎賞學習系統被劫持→DA 報的是 RPE（diff）不是快感→wanting 與 liking 是兩套系統、可分離→敏化讓 wanting 爬升、allostasis 讓 liking 塌陷、剪刀差被生理化→習慣化讓控制權下移、cue 觸發渴求→行為成癮同源、脆弱性與環境調門檻→腦改變是共識但「該叫疾病嗎」是另一層→復原是重訓不是刪除、治療對著特定迴路施工；**「兩條曲線分岔」圖最後一次出場**，用它一句話收全書；**六主線口試**（逐條出一題口頭題＋「模範答案要點清單」，檢核表式不是逐字稿）：①獎賞迴路與 DA 真實角色（RPE≠快感、VTA→NAc→PFC）②wanting 與 liking 的分離③學習如何變成強迫（耐受／戒斷／渴求、目標導向→習慣、allostasis、dark side）④行為成癮為何同源（VR）⑤疾病 vs 學習之爭（兩造最強版＋不裁決）⑥脆弱性／環境／復原／治療機制；**全書語氣收束**：成癮是迴路被劫持的工程故障——「換成這套迴路、給足脆弱性與環境，你我都會掉進去」的冷靜，不獵奇、不道德化、不浪漫化；明寫刻意留下的洞（藥理逐藥、臨床診斷、政策、神經解剖系統教學——以及為什麼留，指向附錄 C）；下一步地圖（往神經科學／往爭論與哲學／往機制與計算）。\n- **不涵蓋**：任何新機制／新研究（只回收）；補完所有遺漏的誘惑（明寫刻意留下的洞）。\n- **橋接**：回到 ch01 的你——當時可能也覺得「成癮就是意志力問題」，現在你能用迴路、RPE、wanting/liking 分岔講清楚「為什麼這麼難戒、又為什麼不是道德問題」；成長的具體對照（從「他意志力不夠」到「他的哪段迴路被劫持成什麼樣」）。\n- **Worked example**：「大腦被劫持」全故事線的 10 分鐘口述版逐段大綱（給讀者照著練的講稿骨架，標出每段必須出現的關鍵詞：獎賞學習系統／RPE＝diff／wanting≠liking／敏化↑＋allostasis↓剪刀差／目標導向→習慣／cue→渴求／VR／疾病 vs 學習不裁決／脆弱性與環境／復原＝重訓不刪除）。\n- **紙上推演**：六條主線口試題正式作答（口頭、各 3–5 分鐘，對照要點清單自評）（★★★，[30 分鐘]）；給「成癮就是意志力不夠」這句話寫一段機制反駁（200 字內）（★★，[20 分鐘]）；口頭題【全書收線題】：用「兩條曲線分岔」這張圖、不看書，把「越來越想要、越來越不喜歡」如何由敏化＋allostasis 兩個機制造成、講給一個工程師聽（★★★，[20 分鐘]）。\n\n## 附錄（在全部章節完成後編譯，從實際寫出的內容萃取）\n\n### 附錄 A — 名詞對照與讀法速查表\n全書術語總表：中文／English／全書固定縮寫或約定／白話意義（口頭講解用，本書驗收靠口述）／首次出現章。從各章實際用過的術語 grep 彙整，不得收錄書中沒出現的名詞。至少含：dopamine/DA、RPE（≈TD error）、wanting/incentive salience、liking/hedonic impact、incentive sensitization、allostasis、opponent-process、dark side、tolerance、withdrawal、craving、cue、anhedonia、VTA、NAc（shell/core）、PFC、striatum（DMS/DLS）、mesolimbic pathway、extended amygdala、variable-ratio、contingency management、harm reduction、ACE、heritability、BDMA。每個術語標白話直覺（DA 報 diff、wanting 是油門、liking 是儀表、allostasis 是被偷改低的 setpoint）。\n\n### 附錄 B — 關鍵研究與人物\nEN–ZH（中譯）–關鍵歸屬與年份–一句話這個人／研究貢獻了什麼–首次出現章。從 landscape 人名表與各章實際引用萃取（不收書中沒出現的）：Olds & Milner（1954 ICSS／「快感中樞」誤稱）、Schultz/Dayan/Montague（1997 DA=RPE）、Berridge & Robinson（wanting/liking、誘因敏化 1993／2025 回顧）、Everitt & Robbins（actions→habits→compulsions）、Koob & Le Moal（allostasis 2001／dark side）、Solomon & Corbit（對立歷程 1974）、Skinner（VR 排程）、Leshner（1997 BDMA）、Volkow/Koob/McLellan（2016 NEJM）、Lewis（2015）、Heyman（2009）、Hart、Alexander（Rat Park 1978–1981）、Lee Robins（越戰 1970s／1977）、Sepah（2019 多巴胺排毒正名）。**明標 Trevor Robbins 與 Lee Robins 是兩個人。** 🔶 爭議項（疾病 vs 學習、Rat Park）標「兩造並陳、不裁決／必 hedge」。\n\n### 附錄 C — 延伸閱讀總地圖\n彙整各章延伸閱讀＋landscape 驗證過的資源，分三條路線（往神經科學機制／往爭論與哲學／往行為與數位），給出「如果只看三樣」建議。只收 landscape 或各章已驗證的連結。候選（照 landscape 驗證）：Berridge & Robinson 2016「Liking, Wanting, and the Incentive-Sensitization Theory」、Robinson & Berridge 2025「30 Years On」、Schultz 2016 RPE 綜述、Volkow/Koob/McLellan 2016 NEJM、Lewis《The Biology of Desire》、Heyman《Addiction: A Disorder of Choice》、Hart《Drug Use for Grown-Ups》、Harvard Health「Dopamine fasting」拆穿文、Wikipedia「Rat Park」（含複製失敗）、SAMHSA CM advisory。每條一句話說明值得讀什麼、讀哪一段。\n\n## 檔名規範\n\n`chNN-slug.md`：\nch01-why-hijacked.md、ch02-reward-circuit.md、ch03-dopamine-prediction-error.md、ch04-wanting-vs-liking.md、ch05-goal-to-habit.md、ch06-tolerance-withdrawal.md、ch07-cue-craving.md、ch08-incentive-sensitization.md、ch09-behavioral-addiction.md、ch10-disease-vs-learning.md、ch11-vulnerability.md、ch12-rat-park-environment.md、ch13-recovery-neuroscience.md、ch14-how-treatment-works.md、ch15-digital-hijack.md、ch16-finale.md；\n附錄 appendix-a-glossary.md、appendix-b-studies-and-people.md、appendix-c-reading-map.md。\n"}, {"id": "style-guide", "file": "style-guide.md", "group": "內部文件（_meta）", "title": "寫作風格指南（內部文件，非書籍內容）", "md": "# 寫作風格指南（內部文件，非書籍內容）\n\n本文件是全書的寫作契約。每一章都必須遵守，否則全書會失去一致性。\n本書書名（工作名）：《大腦被劫持：成癮的機制》（id `addct`）。最終書名於 outline gate 由作者定案，撰章時以工作名為準。\n\n## 這本書是什麼、不是什麼\n\n- **是**：一本「欣賞與直覺」的書。目標是讓讀者親身看懂一件事——**成癮不是「意志力不夠」的道德故障，而是大腦的獎賞學習系統被劫持的工程故障**。讀完要能用自己的話對另一個工程師講清楚：dopamine 報的到底是什麼訊號、為什麼「越來越想要、越來越不喜歡」是同一套機制的兩條曲線分岔、一個吃角子老虎和一條海洛因為什麼踩的是同一個迴路。震撼來自把機制講清楚，不是堆形容詞。\n- **不是**：\n  - **不是醫療／戒斷／治療手冊。** 本書**不提供任何醫療建議、戒斷方案、用藥指引或臨床判斷**。ch 講治療（agonist／antagonist、contingency management、減害）時，講的是**機制為什麼有效／為什麼會衰減**，不是「你該怎麼做」。每次碰到治療、戒斷、危機，正文用一句話明說「這是機制說明，不是醫療建議；真有需求請找專業醫療與成癮治療資源」，不替讀者做任何臨床決定。**作者不是臨床工作者，讀者也不是病人——這是一本讀科學的書。**\n  - **不是自助書／生產力書。** 不教「如何戒手機」「如何多巴胺排毒」。事實上「多巴胺排毒」本身就是本書要正面拆穿的偽科學（見 landscape §十二）。\n  - **不是教科書。** 不背神經解剖、不刷名詞、不出「下列何者為真」的選擇題。神經科學從零教，但教的是**機制與直覺**，服務於「看懂成癮這件事」，不是系統性掃過整個獎賞神經科學。\n  - **不是道德或政策宣言。** 最大爭議（疾病模型 vs 學習／選擇模型）是真實的學界與政策分歧，本書**兩造並陳、不替讀者裁決**（見下方驗收主線 5 與 landscape §六）。\n  - **不服務轉職敘事**——純興趣。但工程橋接要寫到讓它讀起來像母語，不是教科書的外語。RL 的 TD／預測誤差、正回饋迴圈、快取熱路徑、setpoint 漂移、variable-ratio 排程是本書最划算的橋，要用滿但不喧賓奪主。\n\n- **驗收標準（全書六條主線，finale 章逐條口試）**：\n  1. **獎賞迴路與 dopamine 的真實角色**：dopamine 編碼的是**獎賞預測誤差（reward prediction error, RPE）／誘因顯著性（incentive salience）**，不是快感。VTA→NAc→PFC 這條迴路在做什麼。\n  2. **wanting 與 liking 的分離**：「想要（wanting）」由 dopamine 中介、「喜歡（liking）」由 NAc shell 的類鴉片熱點等更小更脆弱的系統中介；成癮就是兩者分岔——越來越想要、越來越不喜歡。\n  3. **學習如何變成強迫**：耐受（tolerance）、戒斷（withdrawal）、渴求（craving）的機制；目標導向→習慣的控制權轉移、allostasis 設定點漂移、dark side 的負增強。\n  4. **行為成癮為何同源**：賭博／遊戲／社群媒體踩的是同一條獎賞迴路；variable-rati
