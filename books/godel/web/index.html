一個空位 x。對應 quine 裡那段不含自己的資料 s。\n   - 編碼 q＝⌜θ⌝：θ 寫死後就能算出來的具體數字。此時 G 還不存在，\n     所以算 q 沒有循環。\n   - diag：一個算術函式，把「公式的編碼」代回「公式自己」再重新編碼。\n     對應 quine 裡「同一串資料先當 data、再當 code」那一招。\n\n3. 造 D＝θ(q̄)：把 q 代回 θ。D 說的是「diag(q) 有性質 ψ」，\n   表面上只是個關於數字 diag(q) 的平凡算術斷言。\n\n4. 自我指涉是『事後』補上的：我們在外面算 diag(q)，發現\n   diag(q)＝⌜θ(q̄)⌝＝⌜D⌝。於是「diag(q) 有性質 ψ」其實＝\n   「⌜D⌝ 有性質 ψ」＝「D 自己有性質 ψ」。\n   —— 指涉自己這件事，是 diag 這個機械函式算出來的，\n      不是「這句話」這個指針指出來的。\n```\n\n一句話總結（這是你要能脫口而出的）：**對角化用「模板的編碼」加上「把編碼代回模板的算術函式 diag」，機械地製造出『談自己』的效果，於是完全不需要自然語言的指針。**「我」這個字被一段算術代換取代了。\n\n常見錯路：(1) 說「D 把自己的編碼填進去」——錯，填的是模板 θ 的編碼 q；(2) 說「diag 算出 G」——diag 不算 G，它算的是編碼之間的對應，是這個對應**碰巧**讓 D 指向自己；(3) 把「自我指涉」說成構造的前提——它是構造的**結論**，事後才浮現。\n\n### 推演題 3 — 對角化 vs 康托爾對角線：對齊那一格 ★★ **[15 分鐘]**\n\n康托爾用對角線造出一個「不在清單裡」的實數；哥德爾用對角化造出一個「逃出證明」的句子。把兩者的「表格、對角線、對自己作對的動作、最終產物」四個要素一一對齊，並用一句話說出它們共同的招式是什麼。\n\n### 推演解答\n\n```text\n要素        康托爾                          哥德爾（對角化引理）\n────────   ──────────────────────────     ──────────────────────────\n表格       列＝清單第 n 個實數              列＝第 n 個一元公式\n           行＝小數第 n 位                  行＝代進空位的第 n 個數\n對角線      取第 n 個數的第 n 位             把第 n 個公式餵它自己編碼 n（diag）\n對自己作對  把對角線那位「改成不一樣的」      對對角線那格「套上性質 ψ」\n產物       一個不在清單裡的新實數            一個說「我有性質 ψ」的句子 D\n────────   ──────────────────────────     ──────────────────────────\n```\n\n共同招式：**把一個東西餵給它自己（走對角線），再對「自己餵自己」的結果動手腳，造出一個原系統罩不住的東西。** 康托爾罩不住的是「清單」（新數逃出可數清單），哥德爾罩不住的是「證明」（G 逃出可證範圍）。停機問題（ch09）會第三次用同一招。記住這個血緣，你會發現本書後半的「驚雷」其實都是這一根火柴點的。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. F 內部沒有「這句話」這個詞，為什麼這對「造一個說『我不可證』的句子」是個真正的難題，而不是雞蛋裡挑骨頭？\n2. 對角化引理的陳述 `F ⊢ D ↔ ψ(⌜D⌝)` 裡，每個部件（ψ、D、⌜D⌝、那個 ↔、最前面的 `F ⊢`）各在說什麼？為什麼「F ⊢」這三個字是後面引爆 G 的彈藥？\n3. diag 函式到底做哪三件事？為什麼它能在 F 內部用算術表達出來（提示：它沒有一步需要「理解意義」）？\n4. 構造 D 時，我們填進模板的是哪個數字——D 自己的編碼，還是模板 θ 的編碼 q？為什麼填後者就沒有循環？\n5. 「D 指涉自己」這件事是構造的**前提**還是**結論**？是誰、在哪一步把它補上的？\n6. 為什麼對角化引理不是「換了包裝的說謊者」？同一台對角化機器，餵什麼 ψ 會造出無害句、餵什麼會造出 G、餵什麼會自爆？\n7. 本章造出了 G，為什麼還不能說「所以 F 不完備」？還缺哪些東西（提示：真、不可證、三條件、一致性）要等 ch07？\n8. 康托爾對角線、哥德爾對角化、（預告）圖靈停機，三者共同的「招式」用一句話怎麼說？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Gödel's Incompleteness Theorems — Supplement: The Diagonalization Lemma」** https://plato.stanford.edu/entries/goedel-incompleteness/sup2.html ——對角化引理的權威、簡短、嚴格陳述與證明骨架。讀它看本章「diag＋模板」的直覺如何被寫成形式證明；是本章最該配的硬版本。\n- **Diagonal lemma（Wikipedia）** https://en.wikipedia.org/wiki/Diagonal_lemma ——一頁讀完歸屬（Gödel 1931 特例、Carnap 1934 一般化）、別名（fixed-point / self-reference lemma）、與塔斯基不可定義性和勒布定理的關係；本章歷史與「換 ψ 造不同句子」那段的出處。\n- **Haim Gaifman,「Naming and Diagonalization, from Cantor to Gödel to Kleene」**（*Logic Journal of the IGPL*, 2006）——把康托爾對角線、哥德爾對角化、克林尼遞迴定理串成同一條「自我命名」的線；本章「同一根火柴點三把火」的學術版，也是「哥德爾—卡爾納普不動點定理」這個名稱的來源之一（學術論文，偏硬，挑前幾節讀直覺即可）。\n- **Douglas Hofstadter《Gödel, Escher, Bach》** ——談 quine、自我指涉、「奇異迴圈」的世界級科普。讀它對「程式拿到自己原始碼」的鋪陳，正是本章「對角化＝quine 的算術版」這個橋接的長篇直覺版（注意：它偏哲學聯想，定理的精確邊界仍以 SEP 為準）。\n- 跨書：哥德爾編碼把句子變成數字、靠質因數分解唯一才能解碼還原，那套唯一分解的引擎見《乘法的原子》談算術基本定理唯一分解那章——本章 diag 的「解碼」步驟就站在它上面。可數與不可數、康托爾對角線的完整版見《馴服無限》談可數與不可數那章——本章只擦亮、那裡才展開。\n"}, {"id": "ch07-first-incompleteness", "file": "ch07-first-incompleteness.md", "group": "Part III — 兩聲驚雷", "title": "ch07 — 第一不完備定理：G 真但不可證", "md": "# ch07 — 第一不完備定理：G 真但不可證\n\n> **本章解決什麼問題**：前六章把零件一個個備齊了——形式系統是台搬符號的機器（ch01）、希爾伯特想讓它算盡一切（ch02）、「真」與「可證」是兩條獨立的線（ch03）、把說謊者的「假」換成「不可證」就不自爆（ch04）、編碼把句子變成數字（ch05）、對角化造出了那句指涉自己的 G（ch06）。現在進入 Part III，零件第一次合體引爆：在三個條件下，脊椎句 G 在標準模型 ℕ 中為真，但系統 F 證不出它（也證不出 ¬G）。這就是兌現全書的承諾——**真理溢出證明**。本章要把這句承諾從口號變成一條你能一步步走完、每步都說得出理由的推導，而且守住一件命脈：這不是「F 有 bug」，是「夠強又一致的系統必然如此」。\n\n```text\n全書地圖：希爾伯特想造一台算盡數學的機器，哥德爾如何用一句指涉自己的話拆穿它\n\n  Part I  機械之夢 .............. 形式系統是什麼、希爾伯特想要什麼、真與可證憑什麼分家\n     ch01 機械的證明（形式系統＝符號遊戲）\n     ch02 希爾伯特的夢（完全機械化、可判定）\n     ch03 真，不等於可證\n        |\n        v\n  Part II  自我指涉的引擎 ....... 把自爆的悖論改造成不完備的武器\n     ch04 說謊者與它的修正（這句話是假的 → 這句話不可證）\n     ch05 把句子變成數字（哥德爾編碼，借《乘法的原子》FTA）\n     ch06 對角化：造出說「我不可證」的句子 G\n        |\n        v\n  Part III  兩聲驚雷 ............ 脊椎句 G 引爆                       ◄ 你在這裡\n     ch07 第一不完備定理（G 真但不可證）\n     ch08 第二不完備定理（系統證不了自己一致）\n        |\n        v\n  Part IV  孿生與邊界 .......... 同一極限的另一張臉，以及它到底在說什麼\n     ch09 停機問題（圖靈的孿生子）\n     ch10 不可判定的群島（決定問題、邱奇、可計算性的版圖）\n     ch11 沒有終點（補洞長新洞）\n     ch12 G 到底真在哪（標準模型與「真」的精確意義）\n     ch13 逃得掉的系統（完備又可判定的反例，三條件的反面教材）\n        |\n        v\n  Part V  與極限共處 .......... 濫用解剖、根岑的回應、收官\n     ch14 哥德爾說了什麼、沒說什麼（濫用大解剖）\n     ch15 根岑的回應（超限歸納把一致性外包）\n     ch16 同一句 G，現在你層層讀懂它（收官）\n```\n\n## 從你已知的出發\n\n你六年來大概都偷偷相信一件事：只要工具夠好，原則上總能寫出一個靜態分析器，把某類問題全自動判乾淨。「這段程式會不會 throw」「這個變數會不會是 null」「這段 code 是不是死碼」——只要肯投入，總有一天能做到零漏判、零誤判，綠燈一亮就是真的安全。\n\n這個信念其實就是希爾伯特的夢的工程版（ch02）：一台機器，餵它任何命題，它都能正確判定真假。而本章要做的事，是把這個信念精確地、不留情面地殺掉一次——不是「現在的工具還不夠好」，是「夠強的工具必然有它判不出的真命題」。\n\n先把一個你熟的場景擺出來。假設你有一個型別檢查器，它強到能談論自己——能把「某段程式是否通過型別檢查」這件事本身編碼成一個它能檢查的命題（這正是 ch05 編碼＋ ch06 對角化幫我們辦到的事）。現在我手上有一個命題 G，它（透過編碼）正好在說：\n\n```text\nG ：「型別檢查器證不出 G。」（脊椎句：「G 在本系統 F 內無法被證明。」）\n```\n\n你的直覺會卡在一個地方：這聽起來又是說謊者那種自爆句，應該沒有確定答案才對。但 ch04 已經把這個直覺擦亮過了——關鍵在於 G 說的是「**證不出**」，不是「假」。「證不出」是型別檢查器自己能安全表達的語法性質（ch05 把它變成了一個算術謂詞 Prov_F），「假」不是。換掉這一個字，自爆就沒了，剩下的是一條乾淨的推理。本章就是把這條推理走到底，看它把我們逼到哪裡。\n\n你會看到的結論長這樣：這個 G，型別檢查器**證不出來**，但它**確實是真的**——而且「真」這件事，是站在型別檢查器外面的我們，用對它行為的理解清清楚楚看出來的。檢查器內部摸不到的真理，外面的人看得一清二楚。這就是整本書最反直覺的一頁，我認為沒有之一。\n\n## 先把定理的精確陳述釘在桌上\n\n科普文章談哥德爾，最常見的死法是把定理講成「任何系統都有無法證明的真理」。這句話**錯**——它掉了三個條件，而三個條件正是這齣戲的全部機關。每次寫第一定理，這三條至少要隱含齊全，否則就是硬傷。先把正版貼出來：\n\n```text\n第一不完備定理（精確版）\n\n  設 F 是一個形式系統，滿足三個條件：\n    (1) 一致（consistent）          ── F 不會同時證出 φ 和 ¬φ\n    (2) 可遞迴公理化               ── F 的公理集合可被一台機器逐一列舉\n        (recursively axiomatizable)   （等價地：「這是不是公理」可機械判定，\n                                       由 Craig 定理保證兩種描述互通）\n    (3) 夠強表達基本算術           ── 強到含 Robinson 算術 Q，語言包含 + 與 ×\n        (含 Robinson Q)\n\n  則：存在一個算術句 G，使得  F ⊬ G。\n       （G 在 F 中不可證）\n\n  並且：若再設 F 為 ω-一致，則  F ⊬ ¬G。\n       （G 的否定在 F 中也不可證 ── G 是「未決句」）\n       ＊ 羅瑟（1936）改用不同的羅瑟句 R 重跑論證，只需一致即得 F ⊬ R 且 F ⊬ ¬R。\n\n  而且：在標準模型 ℕ 中，G 為真。\n       （真理溢出了可證性）\n\n  形式版的 G（ch06 造出的脊椎句）：\n       F ⊢ G ↔ ¬Prov_F(⌜G⌝)\n       （由對角化引理對 ¬Prov_F 取不動點而得）\n```\n\n注意這裡有兩個不同強度的結論，別把它們混成一塊：\n\n- **F ⊬ G**（G 證不出）——這一半只需要 **一致**。乾淨、便宜、是全章的主菜。\n- **F ⊬ ¬G**（¬G 也證不出，所以 G 真的「卡在中間」、兩邊都證不到）——這一半比較貴，要 **ω-一致**；或者改用羅瑟（Rosser）1936 構造的不同句子 R，只需一致就能得 F ⊬ ¬R（T9，但 R ≠ G）。\n\n很多人把「不完備」理解成「有個真句證不出」，那其實是上面第一半（F ⊬ G）加上「G 真」。而「F 既證不出 G、也證不出 ¬G」這個更刺眼的「未決」狀態，才是「不完備（incomplete）」這個詞的字面意思——存在一個句子，系統對它兩邊都沉默。這兩件事的條件不同，下面會分開處理。\n\n## 主菜：為什麼 F 證不出 G（只需一致）\n\n這一段是全章最該停下來慢慢嚼的地方，因為它短到讓人不敢相信。我們要證 **F ⊬ G**，用反證法，假設相反：\n\n```text\n若 F ⊢ G（假設 F 證得出 G），逐步推：\n\n  步驟 1   F ⊢ G                          ← 假設（待推翻）\n  步驟 2   G 就是 ¬Prov_F(⌜G⌝)            ← G 的構造（ch06，F ⊢ G ↔ ¬Prov_F(⌜G⌝)）\n  步驟 3   所以 F ⊢ ¬Prov_F(⌜G⌝)          ← 由 1、2，G 與它等價\n                                            （G 在說：「我證不出」）\n\n  另一條線（從「真的證出來了」這個事實本身出發）：\n  步驟 4   F 真的有一串 G 的證明            ← 步驟 1 的字面意思：存在一個證明\n  步驟 5   這串證明可被編碼，它的編碼 m      ← ch05，證明＝符號序列＝一個數\n           滿足「m 是 ⌜G⌝ 的一個證明」\n  步驟 6   F ⊢ Prov_F(⌜G⌝)                ← Prov_F 正確地「抓得到」這個事實\n                                            （這需要 F 夠強：可證之事 F 能在內部\n                                             認領，即 D1 條件，ch08 細談；這裡先用）\n\n  收網：\n  步驟 7   F ⊢ ¬Prov_F(⌜G⌝)（步驟 3）\n           F ⊢ Prov_F(⌜G⌝) （步驟 6）\n           → F 同時證出了 ψ 和 ¬ψ          ← ψ = Prov_F(⌜G⌝)\n  步驟 8   這違反「F 一致」                  ← 矛盾！\n\n  結論：假設「F ⊢ G」導致矛盾，故 F ⊬ G。   ← 一致 ⇒ G 不可證\n```\n\n停在步驟 8 看一眼，這是整本書最便宜的一個奇蹟。我們**只用到了一致**：一個一致的系統不會同時證出一句話和它的否定。而 G 的構造（它說「我證不出」）讓「F 證出 G」這件事自打嘴巴——因為一旦 F 證出 G，G 的內容（我證不出）就被 F 自己的證明行為反駁了，於是 F 同時握有「我證不出」（G 本身）和「我證出來了」（Prov_F），矛盾。\n\n這裡的工程直覺是：G 是一個**自我拆台**的命題。它的真值綁死在「F 證不證得出它」上，而且綁的方向是反的——「F 證出它」會讓它變假。一個一致（不證假句的延伸：不證矛盾）的系統，碰到這種命題，唯一的活路就是**閉嘴**——不去證它。\n\n> **嚴謹度標示**：以上是「工程師的嚴謹：每步能口頭說出理由」。唯一被我借用、留到 ch08 才拆的是步驟 6 的 D1 條件（「F 可證的東西，F 內部能認領 Prov_F」）。它對夠強的算術系統成立，是哥德爾原始論文裡花最多力氣機械建構的部分（那 45 條遞迴函數的活，本書不展開，指向延伸閱讀）。\n\n## 那 G 是真是假？——「真」從哪裡冒出來\n\n好，F 證不出 G。但 G 到底是真是假？這一步是哥德爾真正讓人頭皮發麻的地方，而且要小心，因為「真」這個詞我們在 ch03 約定過：**「真」＝在標準模型 ℕ 中成立（⊨），跟「可證」（⊢）是兩條線**。\n\n我們重讀 G 在說什麼：「G 在 F 中不可證」。然後我們**剛剛在上一節證明了**——F 確實證不出 G。也就是說，G 所斷言的那件事（「我證不出」），**正是事實**。\n\n```text\nG 說的           ：「G 在 F 中不可證。」\n上一節我們證得的  ： G 在 F 中不可證。  ← 兩者一字不差\n\n  → G 說的內容，正是我們站在 F 外面看出來的真相\n  → 所以 G 在標準模型 ℕ 中為真（⊨ G）\n```\n\n讀到這裡停十秒，因為你的直覺正要騙你。看起來我們好像「證明了 G」——但我們沒有，至少不是在 F 裡。**那串論證是我們，站在 F 外面，用對 ℕ（真正的自然數）和對 F 行為的理解，跑出來的元數學推理。** F 自己跑不了這串論證（它跑得了的話，它就證出 G 了，但上一節說它證不出）。\n\n這就是「真理溢出證明」的精確畫面：\n\n```text\n              ┌──────────── 標準模型 ℕ（真相所在）─────────────┐\n              │                                                │\n              │     G 在這裡為真 ●                              │\n              │                  ╲                             │\n              │   ┌─────── F 證得出的句子 ───────┐  ╲           │\n              │   │                              │   ╲ 溢出！   │\n              │   │  公理、定理…                  │    G 落在    │\n              │   │  （都真，因為 F 是 sound 的） │    這道縫裡   │\n              │   │                              │             │\n              │   └──────────────────────────────┘             │\n              │                                                │\n              └────────────────────────────────────────────────┘\n\n  可證 ⊆ 真（若 F 為 sound）；  真＼可證 的那道縫，就是 G 的家。\n```\n\n換句話說：**G 是一個真句，但它落在 F 的證明能力構不到的那道縫裡。** 不是 F 證錯了，是 F 證得太少——它證出的全是真的（sound），只是漏掉了 G 這個真的。\n\n這裡要誠實標一個技術細節，免得日後被人抓把柄。我上面說「G 真」用的是最乾淨的論法：**假設 F 為 sound（可證者皆真）**，那麼 F ⊬ G 直接推出 G 真。哥德爾原始論文用的是比 soundness 弱一點的假設（ω-一致），透過 G 的 Σ₁ 結構也能推出 G 真而不必假設整個 F 都 sound（這就是為什麼他能用「純形式、弱得多」的假設取代 soundness）。本書要傳達的直覺——**我們在外面看得出 G 真**——在兩種講法下都成立；嚴格的弱化版細節指向延伸閱讀（2026-06，這是標準理解、未被推翻）。\n\n## 配菜：為什麼 ¬G 也證不出（這裡要 ω-一致或羅瑟）\n\n到此我們有了：F ⊬ G，且 G 真。但「不完備」這個詞的字面意思更強——它要的是「F 對 G 兩邊都沉默」，也就是還要 **F ⊬ ¬G**。為什麼這一半比較貴？\n\n直覺先講：G 真（在 ℕ 裡），所以 ¬G 假。如果 F 是 sound 的（只證真句），那它當然證不出假的 ¬G——這很簡單。問題是哥德爾不想假設 F sound（那是個語意條件，他想要純語法的條件）。在只有「一致」這個純語法假設下，**會不會有一個一致但不 sound 的壞系統，偏偏把假的 ¬G 給證出來**？\n\n答案是：純靠「一致」擋不住，要再加一點。\n\n```text\n為什麼「一致」不足以擋住 F ⊢ ¬G：\n\n  ¬G 等價於 ¬¬Prov_F(⌜G⌝)，也就是 Prov_F(⌜G⌝)，\n  白話：「G 是可證的」「存在一個數 n，n 是 ⌜G⌝ 的一個證明」。\n\n  我們已知：對每一個具體的數 0, 1, 2, 3, …，\n            F 都能驗證「它不是 ⌜G⌝ 的證明」（因為 G 真的不可證，\n            逐一檢查每個候選證明都不合格）。\n\n  但「對每個具體 n，F ⊢『n 不是證明』」 ＋ 「F ⊢ 存在某個 n 是證明」\n  這兩件事擺在一起，不是語法矛盾（不違反一致），\n  卻是一種「對著無窮多個具體反例還硬說存在」的彆扭 ──\n  這正是「ω-不一致」。\n\n  排除這種彆扭，就是要求 F 為 ω-一致（omega-consistent）：\n    若對每個具體 n 都 F ⊢ ¬φ(n)，則 F ⊬ ∃x φ(x)。\n\n  有了 ω-一致 ⇒ F ⊬ ¬G。\n```\n\nω-一致比一致**強**（它是 soundness 和一致之間的一個中間檔位），但比假設整個系統 sound **弱得多**。哥德爾原版用的就是它。\n\n然後羅瑟（J. Barkley Rosser）在 1936 年做了件漂亮的事：他把 G 換成一個更狡猾的句子（羅瑟句 R，大意是「**若我可證，則我的否定有一個更短的證明**」），用這個不同的句子 R 重跑論證，結果**只需要一致**就能同時得到兩半（F ⊬ R 且 F ⊬ ¬R）。代價是句子換掉了、論證多繞一圈，換來條件的乾淨。本書的標準陳述因此寫成：「對哥德爾句 G，F 一致 ⇒ F ⊬ G；F ω-一致 ⇒ F ⊬ ¬G。對羅瑟句 R，F 一致 ⇒ F ⊬ R 且 F ⊬ ¬R。」這個區分不能省。\n\n> **嚴謹度標示**：羅瑟句的完整推導是「直覺版」在此打住——它的精巧處（用「更短的證明」這個可比較的條件繞過 ω-一致）值得知道存在，細節指向延伸閱讀。本章你需要記住的是：**對原版哥德爾句 G，¬G 不可證需要 ω-一致，光靠一致不夠；羅瑟換了一個不同的句子 R，才能在只需一致的條件下同時擋住 R 和 ¬R**。這是 T9，最容易被科普寫鬆的精度點。\n\n## 三個條件，各死在哪一步——逐條對帳\n\n現在回頭把三個條件釘回推導，看每一條到底在哪一步出力。少任何一條，整齣戲就垮——這正是「直覺的陷阱」要守的防線，先在這裡攤開：\n\n```text\n條件                          用在推導的哪一步             拿掉它會怎樣\n─────────────────────────    ───────────────────────    ──────────────────────────\n(1) 一致                      主菜步驟 8：靠它把           不一致的 F 會證出一切\n    consistent                「同時證出 ψ 與 ¬ψ」        （爆炸原理），G 和 ¬G\n                              判成矛盾，逼出 F ⊬ G        都證得出，根本無「未決句」\n                                                         ── 不完備無從談起\n\n(2) 可遞迴公理化              讓 Prov_F(x) 能在算術內       若公理集合無法機械列舉，\n    recursively               「被表達」成一個 Σ₁ 謂詞     「x 是一個證明」就不是\n    axiomatizable             ── 整個對角化、整個 G        可表達的算術性質，\n                              的存在都建立在這上面         G 根本造不出來\n                              （ch05、ch06）              （例：把「所有 ℕ-真句」\n                                                         當公理，完備但不可機械列舉）\n\n(3) 夠強表達基本算術          讓哥德爾編碼與對角化         太弱的系統（如只有加法的\n    含 Robinson Q             「做得起來」：語言含         Presburger 算術）做不出\n                              + 與 ×、能談質數冪次積、     編碼與自我指涉，\n                              能取不動點得到 G            完備又可判定，逃得掉\n                              （ch05、ch06）              （ch13 專章反襯）\n```\n\n把這張表反過來唸，就是全書最重要的一句澄清：**第一定理不是「所有系統都不完備」，是「同時夠強、夠一致、規則寫得出來的系統，逃不掉」。** 弱一點的（破壞條件 3）逃得掉、不講規則的（破壞條件 2）逃得掉、已經爛掉的（破壞條件 1）連門票都沒有。逃不掉的恰恰是那些「好東西」——強到能談論自己、又乾淨到不自相矛盾。這就是為什麼這一刀這麼痛：**它砍的不是壞系統，是夠好的系統。**\n\n## 完整 worked example：把六章串成一條引爆鏈\n\n現在把前面散開的零件接成一條從頭到尾的推導，每步標清楚動用了哪一章、哪個條件。這就是第一不完備定理的完整骨架——你應該能照著它，對另一個工程師講完整個故事。\n\n```text\n第一不完備定理 ── 引爆鏈（每步標來源與條件）\n\n  輸入：F 一致、可遞迴公理化、夠強含 Robinson Q\n\n  ① F 能談論自己的句子                              ← ch05 哥德爾編碼\n     把每個符號、公式、證明序列化成唯一的自然數\n     （質數冪次積 2^(a₀+1)·3^(a₁+1)·…，解碼唯一靠\n      算術基本定理，借《乘法的原子》談唯一分解那章）\n     於是「x 是合法證明」變成算術性質，\n     Prov_F(x)（「x 是某可證句的編碼」）可在 F 內表達 ← 用到條件 (2)(3)\n\n  ② 造出指涉自己的句子 G                            ← ch06 對角化引理\n     對一元公式 ¬Prov_F(x) 取不動點，得到 G：\n       F ⊢ G ↔ ¬Prov_F(⌜G⌝)\n     白話：G 說「G 在 F 中不可證」（脊椎句）        ← 用到條件 (3)\n\n  ③ 證 F ⊬ G                                       ← 本章主菜\n     反設 F ⊢ G ⇒ F ⊢ ¬Prov_F(⌜G⌝)（G 的內容）\n              且 F ⊢ Prov_F(⌜G⌝)（真的證出來了，D1）\n              ⇒ 同時證出 ψ 與 ¬ψ ⇒ 違反一致        ← 用到條件 (1)\n     故 F ⊬ G。\n\n  ④ 看出 G 真（在 ℕ）                              ← 本章「真從哪冒出」\n     G 說「我不可證」，而③剛證得它確實不可證，\n     故 G 所言為實 ⇒ 在標準模型 ℕ 中 ⊨ G。\n     （這是我們在 F 外面跑的元推理，F 自己跑不了）\n\n  ⑤ 證 F ⊬ ¬G                                      ← 本章配菜\n     加 ω-一致 ⇒ F ⊬ ¬G（原版哥德爾句）；           ← 用到條件 (1) 的加強版\n     或改用羅瑟句 R，只需一致 ⇒ F ⊬ ¬R（R ≠ G）。\n\n  結論：G 在 ℕ 中真，但 F ⊬ G 且 F ⊬ ¬G。\n        ── F 不完備，且這不是 bug，是夠強又一致的代價。\n\n  自我複核：\n    · ③ 只用一致？ 是，主菜全程只動用條件 (1)＋D1。✔\n    · ④ 的「真」標了「在 ℕ」？ 標了，不是玄學的真。✔\n    · ⑤ 有沒有把 ω-一致寫成一致？ 沒有，標了「或羅瑟」。✔\n    · 有沒有寫成「所有系統都不完備」？ 沒有，三條件齊。✔\n```\n\n走完這條鏈，回頭看 ch02 立的標靶：希爾伯特要的第一根柱子是**完備**（每個真命題都可證）。第一定理把它折了——G 是真命題，但不可證。希爾伯特的夢，在這一刀下死了第一次（第二次在 ch08，他要的「一致性自證」也會斷）。\n\n## 直覺的陷阱\n\n哥德爾是被誤引最嚴重的數學結果，而第一定理是濫用的重災區。這裡列幾個最常把人帶溝裡的，守住正確版（ch14 是濫用總集大成，這裡先設防）。\n\n| 錯誤直覺 | 它在哪一步帶你下溝 | 正確版 |\n|---|---|---|\n| 「哥德爾證明了所有系統都不完備」 | 把三個條件整組丟掉，把「夠強的算術系統」過度泛化成「任何系統／任何複雜的東西」 | 只對**同時滿足三條件**的系統成立。Presburger 算術（只有加法）、命題邏輯都逃得掉（ch13）。掉條件＝硬傷 |\n| 「G 是一個真假無法知道的句子」 | 把「F 證不到 G」誤聽成「沒人知道 G 的對錯」 | G 在 ℕ 中有**確定真值（真）**，我們站在 F 外面明明白白看出它真。「不可證」≠「真值不明」（T8，ch12 命脈） |\n| 「不完備＝系統有 bug／不可靠」 | 把技術詞「不完備（incomplete）」當日常詞「不完美／壞掉」 | 不完備是「有句子兩邊都證不出」的精確語法義；定理還**假設 F 一致**才成立。它說的恰恰是「好系統」的命運，不是壞系統的毛病（T2、T7） |\n| 「『F 一致』就能推出 G 和 ¬G 都不可證」 | 把 ω-一致那一半的條件偷偷降級成一致 | F ⊬ G 確實只需一致；但 **F ⊬ ¬G 要 ω-一致或羅瑟句**。光一致不夠（T9） |\n| 「我們在 F 裡證明了 G 真」 | 把「我們（元數學）看出 G 真」誤當成「F 內部證出了 G」 | 我們是站在 **F 外面**、用對 ℕ 的理解看出 G 真；F 內部恰恰證不出它——這正是溢出 |\n\n**最該設防的具名陷阱：「真值不明」陷阱。** 工程師最容易在這裡滑倒，因為「系統判不出來」在你日常經驗裡（型別檢查器 timeout、SAT solver 卡住）通常意味著「答案待定」。但 G 不是待定——它的答案我們知道，是真。系統判不出，跟答案不存在，是兩件徹底不同的事。怎麼自我察覺你正在滑：每當你想說「G 是個無解／待定的句子」，停下來問——**「在 ℕ 裡，G 到底真不真？」** 它真。你答得出這個問題，就證明 G 有確定真值，只是 F 摸不到。\n\n## 紙上推演\n\n### 第 1 題（★，**[10 分鐘]**）默寫三條件，並各拿掉一條看會怎樣\n\n不看書，寫出第一不完備定理的三個條件（精確名稱），然後對每一條回答：「拿掉它，定理的結論還成立嗎？為什麼？」最後用一句話總結：「第一定理不是說『所有系統都不完備』，而是說＿＿＿。」\n\n### 推演解答\n\n三條件：(1) 一致（consistent）；(2) 可遞迴公理化（公理集合可機械列舉）；(3) 夠強表達基本算術（含 Robinson Q，語言包含 + 與 ×）。\n\n逐條拿掉：\n\n- 拿掉 **(1) 一致**：不一致的系統由爆炸原理證出一切，G 和 ¬G 都證得出，根本沒有「未決句」，「不完備」無從談起。所以一致是入場券。\n- 拿掉 **(2) 可遞迴公理化**：若公理集合無法機械列舉，Prov_F 就不是可表達的算術謂詞，G 造不出來。經典反例——把「所有在 ℕ 中為真的算術句」整組當公理（這叫真算術 TA），它完備（每個句子或它的否定都在裡面），但公理集合不可機械列舉，逃過第一定理。它買的是「不完備自由」，付的是「沒有任何機器能列出它的公理」這個代價。\n- 拿掉 **(3) 夠強**：太弱的系統做不出編碼與對角化。Presburger 算術（只有加法、沒有乘法）完備、可判定，逃得掉（ch13 專章）。\n\n總結：第一定理不是說「所有系統都不完備」，而是說「**同時夠強、夠一致、規則寫得出來的系統，必然不完備**」——逃不掉的是好系統，不是壞系統。\n\n常見錯路：把 (2) 寫成「公理是有限的」。不對，公理可以無限多（PA 的歸納公理就是個無限的公理模式），只要「是不是公理」能被機器逐一判定即可。「可機械列舉」才是精確的點。\n\n### 第 2 題（★★，**[20 分鐘]**）走一遍「若 F ⊢ G 則矛盾」，指出一致性用在哪\n\n完整復述主菜那段反證：假設 F ⊢ G，逐步推到矛盾。寫出每一步，並明確圈出「F 一致」這個假設**到底在哪一步**把推導收網。然後回答：這段推導有沒有用到 ω-一致？有沒有用到「G 真」？\n\n### 推演解答\n\n```text\n  步驟 1   F ⊢ G                          假設（待推翻）\n  步驟 2   G ↔ ¬Prov_F(⌜G⌝)               G 的構造（ch06）\n  步驟 3   F ⊢ ¬Prov_F(⌜G⌝)              由 1、2\n  步驟 4   F ⊢ G 表示真有一串 G 的證明      步驟 1 的字面意思\n  步驟 5   F ⊢ Prov_F(⌜G⌝)               F 能認領這串證明（D1）\n  步驟 6   F 同時證出 Prov_F(⌜G⌝)（步驟 5）\n           與其否定 ¬Prov_F(⌜G⌝)（步驟 3）  ← 收網\n  步驟 7   違反「F 一致」                   ← 一致性在這裡出力！\n  結論     F ⊬ G\n```\n\n一致性用在**步驟 7**：把「同時證出 ψ 與 ¬ψ」這個狀態判成不可接受（矛盾），從而推翻步驟 1 的假設。這是全段唯一動用語意以外假設的地方。\n\n沒有用到 ω-一致（那是配菜 F ⊬ ¬G 才要的）。也沒有用到「G 真」——恰恰相反，「G 真」是這段**證完之後**才推出來的結論（F ⊬ G 為事實 ⇒ G 所言為實 ⇒ G 真）。順序別倒：先（只用一致）證不可證，再（在外面）看出真。\n\n常見錯路：在步驟 5 卡住，覺得「憑什麼 F 證得出 Prov_F(⌜G⌝)」。直覺是——如果真的存在一串具體的證明，那這串證明是有限長的具體符號串，F 夠強就能逐符號驗證它合法、進而在內部認領「這是一個證明」（D1 條件）。這跟「F 證得出抽象的存在性」不同，這裡是有一個**具體見證**擺在眼前。\n\n### 第 3 題（★★★，**[25 分鐘]**）為什麼這不是「F 不夠好」？兼論工程類比的精準與誤導\n\n你的同事說：「哥德爾不過是說現在的公理系統還不夠好，補強就行了——這跟我們的型別檢查器有偽陰性、之後再迭代改進，不是一樣的事嗎？」請反駁他，要點出：(a) 為什麼補強救不了（提前用一下 ch11 的直覺）；(b)「型別檢查器偽陰性」這個類比哪裡精準、哪裡會誤導。\n\n### 推演解答\n\n**(a) 補強為什麼救不了。** 假設你不服氣，把 G 直接當成新公理加進去，得到更強的系統 F′。但 F′ 只要仍然一致、仍然可遞迴公理化、仍然夠強（加一條公理通常這三條都還在），第一定理就**原封不動**套到 F′ 上——F′ 有它自己的新句子 G′，一樣真、一樣證不出。你補了一個洞，新洞馬上長出來。這不是「補得不夠多」，是補的動作本身會生新洞（ch11 專章）。所以這是**本質不完備**：不是某個系統的毛病，是這一類系統的命運。\n\n**(b) 型別檢查器類比的精準與誤導。**\n\n精準的地方：型別檢查器確實是「按規則機械判定一段程式合不合法」的機器，這跟「F 機械判定一串符號是不是證明」同構；而且「一個強到能談論自己的檢查器，必有它判不出的真命題」這個結論是真的——這是停機問題的近親（ch09），表達力本身就要付這個代價。\n\n誤導的地方有兩處。第一，型別檢查器的**偽陰性常常是工程妥協**（為了效能、為了不報太多假警告，刻意放過某些情形），這種洞**補得起來**（換個演算法、加條規則）。哥德爾的 G 不是這種洞——它不是因為 F「偷懶」才漏掉，是 F 再怎麼努力、加多少公理都漏得掉。第二，型別檢查器漏判一個 bug，那個 bug「是不是真的 bug」你可以跑程式去驗；而 G「是不是真的」你不能在 F 內驗（F 內驗不到），只能站在 F 外用對 ℕ 的理解看出來。**「判不出」對檢查器通常意味「之後想辦法」，對 G 意味「F 內永遠到不了，但外面看得清清楚楚」。** 把後者混成前者，就是把「本質極限」誤當「暫時不足」——這正是同事錯的地方。\n\n### 第 4 題（★★，**[15 分鐘]**）口頭題：把第一定理講給另一個工程師聽（5 分鐘版）\n\n不寫字，對著空氣（或真的找個人）講一遍：什麼是第一不完備定理、為什麼 G 真但證不出、為什麼這不是系統壞掉。計時 5 分鐘。講完自我檢核下面五個點有沒有都碰到。\n\n### 推演解答\n\n合格的 5 分鐘版至少要碰到這五點（缺一就是還沒講透）：\n\n1. **三條件**：一致、可遞迴公理化、夠強含 Q——而且強調「逃不掉的是好系統」。\n2. **G 在說什麼**：透過編碼（ch05）＋對角化（ch06），造出一個算術句 G，它正好說「G 在 F 中不可證」。\n3. **為什麼證不出（只需一致）**：若 F 證出 G，G 的內容（我不可證）就被 F 自己的證明反駁，F 同時握有矛盾，違反一致。所以 F 只能閉嘴。\n4. **為什麼真（在 ℕ）**：G 說「我不可證」，而我們剛在外面證得它確實不可證，故 G 所言為實——在標準模型 ℕ 中為真。真理溢出了證明。\n5. **為什麼不是 bug**：補強會生新洞（本質不完備）；這是表達力的代價，不是品質問題。\n\n常見錯路：講成「有些數學問題人類永遠無法知道答案」。錯——G 的答案我們知道（真），是 F 不知道。把「系統證不到」講成「人類不可知」，就把震撼點講丟了，還順手製造了一個 ch14 要解剖的濫用。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. **為什麼「F 證不出 G」這一半只需要一致，不需要 G 真也不需要 ω-一致？** 講不清楚，回主菜那段——關鍵是 G 證出來會自打嘴巴、製造語法矛盾。\n2. **「G 真」是在什麼意義下真？這個「真」是誰、站在哪裡看出來的？** 答不出「在標準模型 ℕ、由 F 外面的元推理看出」，就還沒分清 ⊢ 與 ⊨。\n3. **為什麼 F ⊬ ¬G 那一半比 F ⊬ G 貴？貴在哪？** 答不出「光靠一致擋不住一個不 sound 但一致的壞系統證出假的 ¬G，要 ω-一致或羅瑟」，就漏了 T9。\n4. **三個條件，哪一條保證 Prov_F 可表達？哪一條保證 G 造得出來？哪一條保證證出 G 會矛盾？** 對應：(2) 可遞迴公理化、(3) 夠強、(1) 一致。\n5. **為什麼這不是「F 不夠好、補強就行」？** 答不出「補強生新洞、本質不完備」，就還沒把震撼從「一次性事件」升級成「永恆結構」。\n6. **「G 是真假待定的句子」這句話錯在哪？** 答不出「G 有確定真值（真），只是 F 證不到；待定≠證不到」，就掉進了本章的具名陷阱。\n7. **為什麼說第一定理砍的是「好系統」而不是「壞系統」？** 答不出「逃不掉的恰恰是夠強又一致的系統，弱的爛的都逃得掉」，就還沒抓到這一刀為何痛。\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，\"Gödel's Incompleteness Theorems\"**（https://plato.stanford.edu/entries/goedel-incompleteness/）。第一定理的標準權威陳述與證明綱要，特別讀「2.x」談 ω-一致與羅瑟改進、以及「G 為真」如何理解那幾節——本章的精度點（T8、T9）都在這裡有嚴格版。\n- **Wikipedia，\"Proof sketch for Gödel's first incompleteness theorem\"**（https://en.wikipedia.org/wiki/Proof_sketch_for_G%C3%B6del's_first_incompleteness_theorem）。把本章主菜那段反證寫成逐步形式版，想看「F ⊢ G ⇒ 矛盾」更形式化的展開，讀這篇。\n- **Wikipedia，\"Rosser's trick\"**（https://en.wikipedia.org/wiki/Rosser%27s_trick）。羅瑟句（「若我可證，則我的否定有更短的證明」）如何把 ω-一致減弱為一致——本章配菜那一段的嚴格細節。\n- **Nagel & Newman，《Gödel's Proof》**（修訂版，Hofstadter 作序）。給非專家的第一定理直覺敘述，跟本章「引爆鏈」的講法互補，適合再走一遍不同角度的同一論證。\n- **Torkel Franzén，《Gödel's Theorem: An Incomplete Guide to Its Use and Abuse》（2005）**。讀第 2–3 章「定理到底說了什麼」，把本章「直覺的陷阱」那張表的每一條濫用都拆得更細——ch14 會大量回到這本。\n- 想看「G 真」在弱於 soundness 的假設下如何成立的當代討論：arXiv \"On Gödel's 'Much Weaker' Assumption\"（https://arxiv.org/pdf/2209.07122）——本章「真從哪冒出」那段技術 hedge 的出處，學有餘力再讀（2026-06，屬專業文獻）。\n"}, {"id": "ch08-second-incompleteness", "file": "ch08-second-incompleteness.md", "group": "Part III — 兩聲驚雷", "title": "ch08 — 第二不完備定理：系統證不了自己一致", "md": "# ch08 — 第二不完備定理：系統證不了自己一致\n\n> **本章解決什麼問題**：第一不完備定理（ch07）說「夠強又一致的 F 必有一句 G，真但證不到」。這已經夠痛了，但它還留了一個逃生幻想：「那我至少能在系統內部證明『我自己是一致的』吧？」這一章把這個幻想也一刀斬斷。哥德爾把第一定理的整套論證「內化」到 F 自己身上，得到第二不完備定理——一個一致的夠強系統，連「我不會自相矛盾」這件事都證不了自己。這是脊椎句 G 的第二聲，而且這一聲直接打中希爾伯特計畫的心臟：他要的「用系統自己的有限手段擔保自己可靠」這根柱子，當場斷掉。本章在 Part III「兩聲驚雷」收尾，下一聲（ch09 起的 Part IV）會換成圖靈的臉重演同一齣戲。\n\n## 從你已知的出發\n\n你一定遇過這種架構評審。某個團隊端出一個服務，你問：「它怎麼確保自己不會回傳髒資料？」對方很有自信地說：「我們做了健康檢查端點 `/health`，它會跑一輪自我診斷，回 200 就代表整個服務狀態正常。」\n\n如果你是個還醒著的後端工程師，這時候你脖子後面應該涼一下。問題不在於健康檢查不好——它很有用。問題在於：**那個 `/health` 端點，跑在同一個進程、同一份程式碼、同一套可能已經壞掉的記憶體狀態裡。** 如果整個服務的邏輯已經被某個 bug 汙染了，那這個 bug 完全可以一路汙染到健康檢查本身，讓它在服務其實已經滿身瘡痍的時候，照樣回給你一個綠燈的 200。一個壞掉的系統，最有本事說服你它沒壞。\n\n你早就在實務裡內化了這條原則：**一個元件不能靠自己擔保自己整體可靠。** 監控要從外部來（另一個進程、另一台機器去 ping 它），不能讓被監控者自己報平安。可重現建置要靠一個你信任的、獨立的建置環境，不能讓被測的那份程式碼自己宣稱「我建得出來」。信任鏈總得有一個外部的錨點，不能首尾相銜地自己擔保自己。\n\n哥德爾第二不完備定理，是這條工程直覺在形式邏輯裡最純、最鋒利的版本。它說的是：**一個夠強又一致的形式系統 F，沒辦法用 F 自己的規則，證明出「F 是一致的」這件事。** 把「F 是一致的」想成數學版的 `/health` 回傳「我沒壞」——第二定理證明，這個自我健康檢查在原則上跑不出綠燈（除非系統其實已經壞了，這個吊詭的例外正是本章後半的高潮）。希爾伯特想要的恰恰是這個自我健康檢查，而哥德爾證明它不存在。\n\n這一章我們要做的，是看清楚這個「跑不出綠燈」不是工程上的偷懶，而是邏輯上的鐵律——而且它的證明，幾乎不費吹灰之力，就站在第一定理的肩膀上。\n\n## 先把「一致」寫成一句算術\n\n要讓「F 證不了 F 一致」這句話有意義，得先回答一個問題：**「F 一致」這件事，怎麼變成一個 F 內部談得了的算術句子？**\n\n回想 ch01 與 ch04 的底線：一個系統不一致（inconsistent），意思是它能同時證出某句 φ 和它的否定 ¬φ。而一旦不一致，爆炸原理（ex falso quodlibet）就啟動——從一個矛盾出發，能推出**任何**句子，整個系統變成一台對所有問題都回「yes」的廢機器（ch01 提過、這裡回收）。所以「一致」等價於一個更省事的說法：**有某個句子是 F 證不出來的。** 一個能證出一切的系統就是不一致的；只要還有它證不到的東西，它就還一致。\n\n挑哪個句子當「它應該證不出來的代表」？挑一個最露骨的假句就好——`0 = 1`（在標準算術裡，0 當然不等於 1）。於是：\n\n```text\nF 一致  ≡  F 證不出 0 = 1\n        ≡  ¬Prov_F(⌜0=1⌝)         ← 不存在一個編碼了「0=1 的證明」的數字\n        ─────────────────────────\n                記作  Con(F)\n```\n\n這裡 Prov_F 是 ch05 編碼後得到的可證性謂詞——「Prov_F(x) 表示 x 是某個 F-可證句的編碼」。⌜0=1⌝ 是句子「0=1」的哥德爾數（ch05 那把鑰匙）。所以 `Con(F) ≡ ¬Prov_F(⌜0=1⌝)`，讀作：「**不存在任何一個數字 y，使得 y 編碼了一串『0=1 的合法證明』。**」\n\n停下來看清楚這句的份量：`Con(F)` 是一個**純算術句子**。它表面上只是在談數字——「沒有這樣的 y」——完全沒有「一致」「矛盾」這種元數學詞彙。但透過編碼這把鑰匙解開它，它斷言的正是「F 不會證出 0=1」，也就是「F 一致」。這跟 G 是同一個魔術（ch05/ch06）：把一個關於系統的元數學陳述，壓成一個關於大數字的算術斷言。系統不需要「懂」一致是什麼，它只需要會算數字，就能在內部「談論」自己的一致性。\n\n> 約定（與全書一致）：本書一致性陳述一律寫 `Con(F) ≡ ¬Prov_F(⌜0=1⌝)`。為什麼挑 `0=1` 而不是別的假句？任選一個 F 該證不出的假句都行，結果等價；`0=1` 只是傳統上最乾淨的代表。\n\n## 把第一定理「內化」：一條 F 自己看得懂的推導\n\n現在進入本章的引擎。第二定理的證明，核心是一個出人意料地簡短的觀察。我要先用白話講一遍，再把它攤成推導鏈。\n\n回想第一定理（ch07）的一半結論：\n\n```text\n若 F 一致，則 F ⊬ G        ← 第一定理的「G 不可證」那一支\n```\n\n也就是「F 一致 ⇒ G 不可證」。而 G 是什麼？G 就是脊椎句，它說的正是「**G 不可證**」（形式版 `F ⊢ G ↔ ¬Prov_F(⌜G⌝)`，ch06 造出來的）。所以「G 不可證」這件事，跟「G 為真」是同一件事——G 真，正因為它正確地報告了自己不可證。\n\n把這兩塊拼起來，第一定理那半句話其實在說：\n\n```text\n若 F 一致，則 G（為真）       ← 因為「G 不可證」就是 G 所斷言的內容\n白話：  Con(F)  →  G\n```\n\n這就是關鍵。「F 一致 ⇒ G」這整句話，**本身可以寫成一個算術句子** `Con(F) → G`（左邊是上一節造好的算術句，右邊是 ch06 造好的算術句，中間一個箭頭）。而第二定理的全部祕密，是下面這個事實：\n\n> **F 自己證得出 `Con(F) → G`。**\n\n換句話說：第一定理那段「若 F 一致則 G 不可證」的論證，**不只是我們站在外面看出來的，它整段都可以在 F 內部、用 F 的規則，原原本本地形式化跑一遍。** F 自己就能證明「如果我一致，那麼 G」。這一點需要可證性謂詞 Prov_F 滿足三個技術條件（下一節的 HBL 條件），但直覺上它合理：第一定理的推導每一步都是機械的、語法的搬符號，而 F 夠強，搬得動。\n\n一旦接受了 `F ⊢ Con(F) → G`，第二定理在三行內倒下：\n\n```text\n1.  F ⊢ Con(F) → G              ← 第一定理的論證在 F 內部形式化（需 HBL 條件）\n2.  假設  F ⊢ Con(F)            ← 反證法：假設 F 證得出自己一致\n3.  由 1、2 與 modus ponens：F ⊢ G   ← F 既證得出 Con(F)，又證得出 Con(F)→G，就證得出 G\n4.  但第一定理說：若 F 一致，則 F ⊬ G   ← G 不可證\n5.  第 3、4 直接衝突\n    ────────────────────────────────────────\n    所以假設 2 不成立  →  F ⊬ Con(F)\n```\n\n讀者，請在這頁停一下，因為這是整章的引爆點。第二定理幾乎沒有自己的新內容——它**借用**第一定理那句「F 證不出 G」，然後說：要是 F 還能證出 Con(F)，它就能順手把 G 也證出來（透過它自己內部那條 Con(F)→G），但這跟「F 證不出 G」直接打架。**唯一的出路是：F 證不出 Con(F)。** 一致的系統，連自己一致這件事都搆不到。\n\n我認為這是整本書最經濟的一刀。第一定理花了五章鋪墊（編碼、對角化、健全性論證）才造出 G；第二定理只是把第一定理那句結論**寫進系統內部**，然後用一次 modus ponens 就收割完畢。它沒有重新發明武器，它只是把第一定理的槍口，從句子 G 轉向了系統自己的一致性。\n\n## 為什麼要 HBL 三條件：第二定理比第一定理「再多要一點」\n\n上一節有一句話我刻意快速帶過：「第一定理的論證可以在 F 內部形式化（需 HBL 條件）」。這句話是第二定理跟第一定理的關鍵差異所在，現在把它講清楚。\n\n第一定理只需要 Prov_F 是個**能表達**「可證」的算術謂詞（技術上 Σ₁、遞迴可列舉就夠）——我們在 F 之外看著它推理。但第二定理要求更高：它要 **F 自己能在內部跑完那段推理**。要做到這件事，Prov_F 不能只是「碰巧表達了可證」，它還得在 F 內部**規矩地、像個可證性謂詞該有的樣子運作**。這三條「該有的樣子」就是 Hilbert–Bernays–Löb 可導出條件（derivability conditions，照本書 landscape 的編號）：\n\n```text\nD1：若 F ⊢ φ，則 F ⊢ Prov(⌜φ⌝)\n     白話：F 真的證出了 φ，那「φ 可證」這件事 F 自己也證得出來。\n     （把「我證出來了」這個事實，內化成系統能說出口的話。）\n\nD2：F ⊢ Prov(⌜φ⌝) → Prov(⌜Prov(⌜φ⌝)⌝)\n     白話：F 內部證得出「若 φ 可證，則『φ 可證』這件事本身也可證」。\n     （這其實是 D1 那套推理本身在 F 內部又被形式化了一層——\n       D1 是「我做得到」，D2 是「我證得出我做得到」。）\n\nD3：F ⊢ Prov(⌜φ→ψ⌝) ∧ Prov(⌜φ⌝) → Prov(⌜ψ⌝)\n     白話：可證性對 modus ponens 封閉——\n     若 φ→ψ 可證、且 φ 可證，那麼 ψ 也可證，這件事 F 內部證得出來。\n     （讓「可證」在系統內部也能像真正的證明那樣一步步往下接。）\n```\n\n> 細節提醒（2026-06 查證）：不同教科書對 D1/D2/D3 的編號順序略有出入——例如 Stanford Encyclopedia 的版本裡，把「對 modus ponens 封閉」排在 D2、把「Prov(φ)→Prov(Prov(φ))」排在 D3，與本書採用的 landscape 編號相反。三條條件本身的內容與作用完全相同，只是排序習慣不同；本書全書統一用上面這套編號，讀別處時留意對照即可。這三條是「**充分**條件」——滿足它們就足以證出第二定理，標準歸屬為 Hilbert–Bernays（1939，提出早期版本）與 Löb（1955，整理成今天這套優雅形式）。\n\n這三條合起來在說一件事：**Prov_F 不只是「能談可證」，它在 F 內部的行為，跟「真正的可證」一模一樣地規矩、前後協調。** 有了這套內部規矩，F 才能在內部把第一定理那段「若我一致則 G 不可證」的論證，一步不漏地形式化重跑，得出 `F ⊢ Con(F) → G`。\n\n這就是為什麼說「第二定理要的算術比第一定理再多一點」。第一定理只要 F 強到能編碼、能對角化、能表達 Prov；第二定理還要 F 強到能**在內部證明 Prov 規矩地運作**（D1–D3）。對 PA、ZFC 這種主流系統，這些條件都滿足，所以兩條定理都打得到它們；但對某些刻意做弱的玩具系統，第二定理的成立比第一定理更微妙——這也是邏輯學界研究「自我驗證系統」的縫隙所在（一句帶過，細節指向延伸閱讀）。\n\n## 把推導完整攤開：worked example\n\n把前面散落的零件，在一張表上一步步合起來，每步標清楚理由。設 F 滿足三條件（一致、可遞迴公理化、夠強表達基本算術），且 Prov_F 滿足 HBL 的 D1–D3。\n\n```text\n目標：證明  F ⊬ Con(F)\n記號：G 是脊椎句， F ⊢ G ↔ ¬Prov_F(⌜G⌝)      （ch06 造出，G 說「我不可證」）\n      Con(F) ≡ ¬Prov_F(⌜0=1⌝)                （本章定義，「F 一致」的算術版）\n\n── 第一步：F 內部已知的兩塊磚 ──────────────────────────────\n\n(a)  F ⊢ G ↔ ¬Prov_F(⌜G⌝)        ← 對角化引理直接給的（ch06），F 內部就成立\n(b)  F ⊢ Con(F) → G              ← 第一定理「Con(F)⇒G 不可證」在 F 內形式化\n                                    （這一步要用滿 D1–D3，是本章的技術核心）\n\n── 第二步：反證法，假設 F 能自證一致 ───────────────────────\n\n(c)  假設  F ⊢ Con(F)            ← 我們要推翻的假設\n(d)  由 (b)、(c) 與 modus ponens：F ⊢ G      ← F 證出了脊椎句 G\n\n── 第三步：撞上第一定理 ────────────────────────────────\n\n(e)  第一定理：F 一致 ⇒ F ⊬ G    ← G 不可證（ch07 的招牌結論）\n(f)  F 一致（前提）              ← 三條件之一\n(g)  由 (e)、(f)：F ⊬ G          ← G 證不出來\n\n── 第四步：矛盾與結論 ──────────────────────────────────\n\n(h)  (d) 說「F ⊢ G」、(g) 說「F ⊬ G」 → 直接矛盾\n(i)  矛盾來自假設 (c)\n     ∴  F ⊬ Con(F)              ← 第二不完備定理 ▮\n```\n\n複核一遍每一步靠什麼：(a) 是對角化（ch06）。(b) 是本章技術核心，靠 D1–D3 把第一定理形式化進 F——這一步本書只給直覺與條件，嚴格細節指向延伸閱讀（這是「直覺版」，不是「我證給你看」）。(c) 是反證假設。(d) 是一次 modus ponens（D3 保證可證性對 MP 封閉，連 F 內部跑這步都合法）。(e)(f)(g) 直接引用第一定理（ch07）。(h)(i) 是反證法收尾。整條鏈沒有跳步，唯一「相信我」的地方是 (b)——而 (b) 的可信度，正是 D1–D3 在背書。\n\n注意一件漂亮的事：第二定理的「真正勞動」全在第一定理裡（造 G、健全性論證）。本章的新貢獻只有 (b) 那一步「把論證內化」，以及隨後三行反證。這就是為什麼哥德爾在 1931 年的論文裡，第二定理只給了陳述和證明綱要，沒有展開——因為一旦第一定理在手，第二定理幾乎是它的影子。\n\n## 這一刀砍在希爾伯特計畫的哪根柱子上\n\n退一步看全局。ch02 把希爾伯特計畫立成四根柱子當標靶：\n\n```text\n希爾伯特的四根柱子                         誰砍倒、砍在哪一章\n──────────────────────────────────────────────────────────\n① 完備：每個真命題都可證                    ← 第一不完備定理（ch07）\n② 一致：不會證出矛盾                        ← （這是前提，不是被否證的；見下）\n③ 有限性一致性自證：用系統自己不會被質疑      ← 第二不完備定理（本章）★\n   的「有限手段」證明自己一致\n④ 可判定：有機械程序判定任意命題真假         ← 停機問題／決定問題（ch09–10）\n```\n\n第二定理砍的是第三根，而且砍得特別狠。希爾伯特計畫的精神，是「用最不容置疑的、有限的、機械的手段（finitary methods），從系統內部證明這整套地基不會自相矛盾」。這根柱子是整個計畫的安全保證——它要讓數學家能拍胸脯說「我們的地基是穩的，而且我們能用地基自己的工具證明它穩」。\n\n第二定理說：**不行。** 如果 F 強到足以裝下希爾伯特想形式化的那些算術（PA 級別），那 F 就證不了自己的 Con(F)。你想用系統內部的有限手段擔保系統一致？這條路被堵死了。地基不能靠地基自己擔保——這正是本章開頭那個 `/health` 端點直覺的數學鐵證。\n\n要小心一個常見的滑坡（也是下一節「直覺的陷阱」的主菜）：**第二定理沒有說 F 不一致，也沒有說數學不可靠。** 它說的是「F 證不了 Con(F)」，而這整個論證**還假設 F 一致**（看 worked example 的 (f)）。PA 極可能是一致的——我們有強烈的理由相信它（根岑 ch15 甚至從外部證明了它一致）。第二定理沒有動搖這個信念，它動搖的是「**從內部、用有限手段、自己證明自己一致**」這個希爾伯特式的夢。柱子斷的是「自證」那根，不是「一致」那根。\n\n## 最刺痛的一頁：能自證一致的系統，反而可疑\n\n現在講本章我認為最反直覺、也最值得你帶走的一個結論。它把第二定理從「一個遺憾」翻轉成「一個診斷工具」。\n\n把第二定理跟爆炸原理（ch01）並排：\n\n```text\n爆炸原理：    F 不一致  ⇒  F 證明一切（包括 Con(F)）\n第二定理：    F 一致且夠強  ⇒  F ⊬ Con(F)\n─────────────────────────────────────────────────────\n逆否一下第二定理：\n              F 夠強  且  F ⊢ Con(F)   ⇒   F 不一致\n```\n\n把這三條讀在一起，會得到一個吊詭到漂亮的結論：\n\n> **對一個夠強的系統 F，「F 能證明自己一致」恰恰等價於「F 其實不一致」。**\n\n換句話說，如果有一天有人跟你說「我設計了一個強到能做算術的形式系統，而且它能在內部證明自己一致，多棒！」——你的正確反應不是恭喜，是**後退一步**。因為一個夠強又一致的系統，依第二定理，必然證不出自己的 Con(F)；那麼一個**能**證出自己 Con(F) 的夠強系統，只剩一種可能：它根本就不一致（透過爆炸原理，不一致的系統什麼都證得出來，包括那句自我感覺良好的「我一致」）。\n\n這完全對上你的工程直覺。回到 `/health` 端點：一個服務興高采烈地、底氣十足地對所有自我診斷都回「我完全健康」，這本身就是個紅旗——一個真正在認真檢查自己的系統，應該偶爾誠實地報出「這個我檢查不了」。**一個對自己的健康有問必答、永遠綠燈的系統，最可能的解釋不是它真的完美，而是它的檢查邏輯已經壞到分不清好壞了。** 不一致的系統正是這種「壞到什麼都說 yes」的系統——它對「我一致嗎」也照樣熱情地回 yes。\n\n所以第二定理的真正教訓，不是「可惜我們證不了一致性」這種挫敗，而是：**自我擔保的沉默，正是健康的表徵；自我擔保的響亮，才是病徵。** 一個誠實的、一致的系統，在「我一致嗎」這個問題上，註定只能沉默——而這份沉默，是它還沒壞掉的證據。這是我認為第二定理比第一定理更深的地方：第一定理告訴你「真理會溢出證明」，第二定理告訴你「連『我沒壞』這種最卑微的自我擔保，夠強的系統也碰不到——而碰得到的，都是壞的」。\n\n順帶一筆史實（2026-06 查證，學界仍有細節討論）：第二定理並非只有哥德爾看見。1930 年柯尼斯堡會議上聽懂第一定理的馮諾伊曼（John von Neumann），會後幾週寫信給哥德爾，說自己也推出了「系統證不了自己一致」這個結論；但哥德爾的 1931 論文已經投出、其中已含第二定理的陳述，馮諾伊曼得知後便把這個發現的署名權留給了哥德爾（他自己那份證明後來佚失，所以細節嚴格說仍是懸案）。兩個當時最聰明的腦袋，幾乎同時、各自摸到了同一道天花板——這本身就說明它不是某種人為的技巧，而是這類系統真正的命運。\n\n## 直覺的陷阱\n\n第二定理是哥德爾兩條定理裡，被誤讀得最危險的一條——因為「系統證不了自己一致」這句話，太容易被聽成「所以數學不可靠／有矛盾／快崩了」。守住正確版。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步帶你下溝 | 正確版 |\n|---|---|---|---|\n| 「哥德爾證明了數學是不一致的／不可靠的」 | 系統連自己一致都證不了，那它八成不一致 | 把「證不出 Con(F)」聽成「Con(F) 為假」。證不出 ≠ 為假——這正是 ch07 G 的同一個教訓，第二定理只是把它套到 Con(F) 上 | 第二定理**假設** F 一致才得出結論（worked example 的 (f)）；它說的是不完備不是不一致。PA 我們有強理由相信一致（根岑 ch15 從外部證了） |\n| 「既然證不了一致，那一致性就是個無法知道的事」 | 系統內部碰不到，就代表沒人知道 | 把「F 內部證不到」偷換成「無法知道」。第二定理只關閉了「**F 用自己的手段自證**」這一條路 | 一致性可以從**外部**、用更強的系統證明（根岑用到 ε₀ 的超限歸納證 PA 一致，ch15）。逃生口是「外部」，不是「無解」 |\n| 「第二定理跟第一定理是同一回事，重複了」 | 都在講 F 證不出某個東西，差不多 | 沒看到結論的差異。第一定理：F 證不出某個未決句 G；第二定理：F 證不出一個**特定**且**有重大意義**的句子 Con(F)，且需要**多一點**算術（HBL D1–D3） | 兩條是不同陳述、不同條件、不同打擊面。第一砍「完備」，第二砍「有限性自證」 |\n| 「能證自己一致才是好系統，證不了是缺陷」 | 自我擔保越強越可靠 | 把「響亮的自我擔保」當成健康。恰恰相反 | 對夠強的系統，「能自證一致」等價於「不一致」。沉默才是健康，響亮才是病徵（本章核心翻轉） |\n| 「那 ZFC（集合論）證得了 PA 一致，不就破功了？」 | 既然有系統證得了 PA 一致，第二定理是不是被繞過了 | 把「**別人**證 PA 一致」當成「PA **自證**」。ZFC 比 PA 強，是外部更高的系統 | 第二定理只說 F 證不了**自己的** Con(F)。ZFC 證 PA 一致完全合法（ZFC 是外部）；但 ZFC 仍證不了**自己的** Con(ZFC)。天花板對每個系統各自存在，沒人繞得過自己那一層 |\n\n最該自我察覺的一條：**每當你想說「哥德爾證明數學不可靠」時，停下來問——第二定理的論證裡，是不是一開始就假設了 F 一致？** 是的。它從「F 一致」推出「F 證不了 Con(F)」；它從頭到尾沒有、也不能推出「F 不一致」。把「自己證不了自己一致」聽成「不一致」，是這條定理最常見、最致命的滑坡，也是 ch14 濫用解剖的重點素材之一。\n\n## 紙上推演\n\n> 全程紙筆，不需要跑任何程式。\n\n### 推演題 1 — 把第二定理的反證鏈默寫出來，標出每步的依據 ★★ **[15 分鐘]**\n\n不看 worked example，自己重建「F ⊬ Con(F)」的反證法。要求：(a) 從「假設 F ⊢ Con(F)」出發；(b) 用到 `F ⊢ Con(F) → G` 這塊磚（你不必證它，但要說明它從哪來）；(c) 明確指出在哪一步撞上第一定理、撞出什麼矛盾。\n\n### 推演解答\n\n```text\n1.  F ⊢ Con(F) → G            ← 已知磚：第一定理「Con(F)⇒G 不可證」在 F 內形式化\n                                （需 Prov_F 滿足 HBL D1–D3；本題不展開它的證明）\n2.  假設  F ⊢ Con(F)          ← 反證起點\n3.  由 1、2 與 modus ponens：F ⊢ G       ← F 把 G 證出來了\n4.  第一定理：F 一致 ⇒ F ⊬ G   ← G 不可證（ch07）\n5.  F 一致（三條件之一）→ F ⊬ G\n6.  第 3（F⊢G）與第 5（F⊬G）矛盾\n    ────────────────────────────\n    ∴ 假設 2 不成立 → F ⊬ Con(F)\n```\n\n矛盾撞在第 6 步：第 3 步說 F 證出了 G，第 5 步（引用第一定理）說 F 證不出 G，兩者不能並存。矛盾的源頭是假設 2（F 自證一致），所以假設 2 被推翻。\n\n常見錯路一：以為第二定理需要重新造一個「說自己一致的句子 C，C ↔ ¬Prov(⌜C⌝)」之類的新對角化。不需要——第二定理**直接複用第一定理的 G**，新東西只有 `Con(F) → G` 這塊磚和三行反證。常見錯路二：把第 1 步的 `Con(F) → G` 當成「我們在外面看出來的」就夠了。不夠——關鍵正是這塊磚要在 **F 內部**可證（所以才需要 HBL 條件），否則第 3 步的 modus ponens 不能在 F 內部合法地跑。\n\n### 推演題 2 — 「能自證一致 ⇔ 不一致」的逆否推導 ★★★ **[20 分鐘]**\n\n第二定理是「F 一致且夠強 ⇒ F ⊬ Con(F)」。請：(a) 寫出它的逆否命題；(b) 結合爆炸原理，論證「一個夠強的系統如果證得出自己一致，它必然不一致」；(c) 用一句話說清楚，為什麼這讓「響亮的自我擔保」成為病徵而非健康。\n\n### 推演解答\n\n```text\n(a) 原命題：  F 夠強 ∧ F 一致  ⇒  F ⊬ Con(F)\n    逆否：    F 夠強 ∧ F ⊢ Con(F)  ⇒  F 不一致\n    （逆否＝把結論否定移到前提：「F 證得出 Con(F)」是「F ⊬ Con(F)」的否定）\n\n(b) 設 F 夠強，且 F ⊢ Con(F)。由 (a) 的逆否，直接得 F 不一致。\n    （另一個角度看為什麼合理：不一致的 F 觸發爆炸原理，能證出一切句子，\n      自然也包括 Con(F) 這句「我一致」——所以「證得出自己一致」對夠強系統\n      而言，反倒是「我什麼都證得出＝我已經爆炸＝我不一致」的徵兆。）\n\n(c) 一致又夠強的系統，註定證不到自己的 Con(F)（會沉默）；\n    所以一個對「我一致嗎」響亮地回「是」的夠強系統，唯一的解釋是它已經不一致\n    （壞到什麼都說 yes）。沉默＝健康，響亮＝病徵。\n```\n\n常見錯路：把逆否寫成「F 不一致 ⇒ F ⊢ Con(F)」（這是逆命題，不是逆否，邏輯上不等價於原命題）。正確的逆否是把**整個前提與結論都否定並對調**：原命題「A∧B ⇒ ¬C」的逆否是「C ⇒ ¬(A∧B)」，也就是「A∧C ⇒ ¬B」（在 A=夠強固定下）。另一個常見誤解：以為 (b) 是說「所有不一致系統都證得出 Con(F)」——對，但本題要的方向是反過來「證得出 Con(F)（且夠強）⇒ 不一致」，別把箭頭弄反。\n\n### 推演題 3 — 拆穿一個 `/health` 類比的破綻 ★★ **[12 分鐘]**\n\n本章用「服務的 `/health` 端點不能擔保整個服務沒壞」類比第二定理。這個類比哪裡精準、哪裡會誤導？至少各說一點。\n\n### 推演解答\n\n**精準的地方**：核心同構漂亮——一個元件用自己（同進程、同程式碼、同可能已汙染的狀態）擔保自己整體可靠，這個「自我擔保」的邏輯漏洞，跟「F 用自己的規則證明自己一致」是同一個結構。兩邊都點出：擔保者若身處被擔保的系統內部，它的擔保就不比那個系統更可信——壞掉的系統會連擔保一起壞掉（對應：不一致的系統會證出一切，包括「我一致」）。\n\n**會誤導的地方**（至少兩點）：\n\n1. **第二定理是數學鐵律，`/health` 只是工程慣例。** 第二定理證明了「自證一致」**原則上不可能**（對一致的夠強系統）；而 `/health` 失靈只是「工程上不可靠、容易出錯」，原則上你**可以**把健康檢查做得相當好（只是別指望它在進程已全毀時還準）。一個是「不可能」，一個是「不可靠」，強度不同。\n\n2. **第二定理有精確的成立條件（三條件＋HBL），`/health` 沒有。** 不是「任何自我檢查都註定失敗」——弱系統（如 Presburger 算術，ch13）可以是完備可判定的，自我相關的限制不適用。第二定理的天花板只罩在「夠強」的系統上。把它讀成「任何系統的任何自檢都沒用」就是 ch14 要解剖的萬用格言化濫用。\n\n把這兩點記住，類比就只當直覺的腳手架，不當定理的替身——這正是全書「工程橋接是母語、但定理邊界要守死」的分寸。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 「F 一致」怎麼變成一個 F 內部談得了的算術句子 `Con(F)`？為什麼挑 `0=1` 這個假句？\n2. 第二定理的證明，新東西其實只有一塊磚加三行反證——那塊磚是什麼？它為什麼非得在 **F 內部**可證才行？\n3. 為什麼第二定理要 HBL 三條件（D1–D3），而第一定理不用？「比第一定理多要一點算術」多在哪裡？\n4. 第二定理砍倒的是希爾伯特四根柱子的哪一根？為什麼說它**沒有**砍倒「一致」那根？\n5. 為什麼「一個夠強的系統能證明自己一致」恰恰等價於「它不一致」？把這個結論講給另一個工程師聽（提示：爆炸原理＋逆否）。\n6. 「F 證不了 Con(F)」和「F 不一致」差在哪？把這兩件事混為一談會犯什麼錯？（這是本章最該守住的一條。）\n7. ZFC 證得了 PA 一致，這違反第二定理嗎？為什麼不違反？（提示：誰證誰、內部還是外部。）\n8. 為什麼說「自我擔保的沉默是健康、響亮是病徵」？這跟你對 `/health` 端點的工程直覺哪裡一致、哪裡只是類比？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Gödel's Incompleteness Theorems」** https://plato.stanford.edu/entries/goedel-incompleteness/ ——權威且免費。讀「The Second Incompleteness Theorem」與「The Derivability Conditions」兩節，看 D1–D3 如何讓「第一定理在 F 內部形式化」變得嚴格；本章 (b) 那塊磚的細節在這裡。注意它的 D2/D3 編號與本書相反（內容相同）。\n- **Stanford Encyclopedia of Philosophy，「The Logic of Provability」** https://plato.stanford.edu/entries/logic-provability/ ——把 Prov_F 當成模態運算子（□）來研究的證明邏輯（GL）；HBL 三條件在這裡長成模態公理，Löb 定理是它的明星。想看「可證性」如何被代數化的，從這篇進。\n- **Gödel's second incompleteness theorem（Wolfram MathWorld）** https://mathworld.wolfram.com/GoedelsSecondIncompletenessTheorem.html ——一頁速查第二定理的精確陳述與 Con(F) 的標準寫法，適合對照本章記號。\n- **Torkel Franzén《Gödel's Theorem: An Incomplete Guide to Its Use and Abuse》（2005，A K Peters）** ——「第二定理沒說數學不一致／不可靠」的權威解毒，正是本章「直覺的陷阱」那張表的標準參考。ch14 濫用大解剖會大量回到它。\n- **「John von Neumann's Discovery of the 2nd Incompleteness Theorem」（History and Philosophy of Logic, 2023）** https://www.tandfonline.com/doi/abs/10.1080/01445340.2022.2137324 ——本章末那段「馮諾伊曼幾乎同時獨立摸到第二定理」的學術考據；想知道這段史實有多少是定案、多少仍是懸案，讀它。\n- 跨書：第二定理的逃生口——「一致性可以從**外部**更強的系統證明」——的正面故事，見 ch15（根岑用到 ε₀ 的超限歸納證 PA 一致）。本章說「自證的門關了」，ch15 說「外部的門開著，但要付跳出系統的代價」。\n"}, {"id": "ch09-halting-problem", "file": "ch09-halting-problem.md", "group": "Part IV — 孿生與邊界", "title": "ch09 — 停機問題：圖靈的孿生子", "md": "# ch09 — 停機問題：圖靈的孿生子\n\n> **本章解決什麼問題**：到 ch08 為止，脊椎句 G 已經引爆兩次——第一定理（G 真但不可證）、第二定理（系統證不了自己一致）。現在進入 Part IV，要做一件讓人安心又驚悚的事：把不完備**換一張臉**重看一遍。圖靈（Alan Turing）1936 年用「一個程式會不會停下來」這個你天天在擔心的問題，重演了哥德爾那一招對角化，得到一個一模一樣的極限——停機問題（halting problem）不可判定。本章要讓你看清：不完備（incomplete）與不可判定（undecidable），是**同一個自我指涉極限的兩張臉**。脊椎句 G 問「φ 可證嗎」，停機問題問「P 會停嗎」——兩個都是用對角化造出來的、系統自己答不了的問題。本章是 Part IV 把視角接回 G 的關鍵；下一章（ch10）才把版圖拉開。\n\n這是 Part IV「孿生與邊界」的第一章。先重看全書要走的路：\n\n```text\n全書地圖：希爾伯特想造一台算盡數學的機器，哥德爾如何用一句指涉自己的話拆穿它\n\n  Part I  機械之夢 .............. 形式系統是什麼、希爾伯特想要什麼、真與可證憑什麼分家\n     ch01 機械的證明（形式系統＝符號遊戲）\n     ch02 希爾伯特的夢（完全機械化、可判定）\n     ch03 真，不等於可證\n        |\n        v\n  Part II  自我指涉的引擎 ....... 把自爆的悖論改造成不完備的武器\n     ch04 說謊者與它的修正（這句話是假的 → 這句話不可證）\n     ch05 把句子變成數字（哥德爾編碼，借《乘法的原子》FTA）\n     ch06 對角化：造出說「我不可證」的句子 G\n        |\n        v\n  Part III  兩聲驚雷 ............ 脊椎句 G 引爆\n     ch07 第一不完備定理（G 真但不可證）\n     ch08 第二不完備定理（系統證不了自己一致）\n        |\n        v\n  Part IV  孿生與邊界 .......... 同一極限的另一張臉，以及它到底在說什麼     ◄ 你在這裡\n     ch09 停機問題（圖靈的孿生子）\n     ch10 不可判定的群島（決定問題、邱奇、可計算性的版圖）\n     ch11 沒有終點（補洞長新洞）\n     ch12 G 到底真在哪（標準模型與「真」的精確意義）\n     ch13 逃得掉的系統（完備又可判定的反例）\n        |\n        v\n  Part V  與極限共處 .......... 濫用解剖、根岑的回應、收官\n     ch14 哥德爾說了什麼、沒說什麼（濫用大解剖）\n     ch15 根岑的回應（超限歸納把一致性外包）\n     ch16 同一句 G，現在你層層讀懂它（收官）\n```\n\n## 從你已知的出發\n\n問你一個你心裡早有答案的問題：**能不能寫一個工具，吃進任意一段程式碼，準確告訴你「這段程式會不會無窮迴圈」？**\n\n你大概想都不用想就搖頭。你寫過 linter、用過靜態分析，你知道「偵測死迴圈」「偵測不可達碼（dead code）」這類功能要嘛保守到滿是偽陽性、要嘛漏網一堆偽陰性，**從來沒有一個工具敢拍胸脯說「我對任意程式都答得準」**。你也許說不上來為什麼，只是憑經驗知道：這種「萬用判定器」不存在。\n\n這個直覺是對的，而且它有名字——**停機問題不可判定**。圖靈 1936 年把它證成了一條定理。而本章真正要給你的禮物不是「證明你早就相信的事」，是讓你看見一件更深的事：**這條定理跟哥德爾不完備是同一件事**。它們用的是同一招（對角化）、長著同一個結構（自我指涉造出系統自己答不了的問題）、拆掉的是希爾伯特同一個夢的不同柱子。哥德爾證「真理溢出證明」，圖靈證「判定溢出機器」——兩個人，隔著幾年，從兩個方向走到同一面牆前。\n\n先把你已有的零件擺出來，等下會一個個對上去：\n\n- **程式可以把程式當資料。** 你能把一段原始碼當字串讀進來、parse 成 AST、傳給另一個函式分析。「程式分析程式」對你不玄——這正是哥德爾編碼（ch05）的工程版：把要被分析的東西序列化成一個可被機械處理的物件。\n- **程式可以餵自己。** quine 印出自己的原始碼、reflection 讓物件檢視自己的型別、一個函式可以拿到自己的引用再呼叫它。「把 X 餵給 X」對你也不玄——這正是對角化（ch06）的引擎：模板代入自己的編碼。\n- **「會不會停」是一個關於程式行為的 yes/no 問題。** 跟「φ 在 F 內可不可證」一樣，是一個關於某個機械物件的、看似該有答案的判定問題。\n\n把這三件握緊。圖靈做的事，就是把它們組裝起來，逼出一個沒有任何工具能正確回答的問題。\n\n## 停機問題到底在問什麼\n\n先把問題釘死，別讓它滑掉。停機問題問的是：\n\n> 存不存在**一個**程式 H，能對**任意**輸入對 (程式 P 的編碼, 輸入 w)，都正確輸出「P 跑在 w 上會不會停機」（停＝在有限步內結束；不停＝永遠跑下去）？\n\n注意三個字眼，每一個都關鍵：\n\n- **一個**：我們要的是**單一**的通用判定器，一台機器打天下。不是「對這個特定程式我能不能看出來」——當然某些程式你一眼就看出會停或不會停。要的是一個對**所有**輸入都答得準的演算法。\n- **任意**：H 必須對**每一對** (P, w) 都給出正確的 yes/no，不准對某些輸入耍賴、卡住、或自己也跑進無窮迴圈。\n- **正確**：H 自己必須**總是停下來**並給出答案（這種「總會停、總會答」的判定器，技術上叫一個 decider）。一個有時候自己也不停的「判定器」不算數。\n\n圖靈證明的是：**這樣的 H 不存在。** 不是「很難寫」、不是「目前還沒人寫出來」、不是「要很久」——是**邏輯上不可能存在**。跟第一定理一樣，這不是工具不夠好，是這件事本身搆不到。\n\n這裡先插一句史實，因為它常被講錯，而把它講對反而讓你更懂這個極限。**圖靈 1936 年的原始論文裡，從頭到尾沒有出現「停機（halting）」這個詞**（2026-06 查證）。他證的是另一個等價的東西——沒有機器能判定任意機器是不是「circle-free（無圈的）」，也就是會不會一直印下去、產出無窮多位數字。我們今天說的「停機問題」這個名字、這個乾淨的「會不會停」版本，是後來才定型的，一般歸給馬丁·戴維斯（Martin Davis）——他在 1950 年代初的講課裡開始這樣用，1958 年的書《Computability and Unsolvability》把這個說法帶進主流（2026-06 查證；「停機問題」之名為後世所加，圖靈本人談的是 circle-free，兩者邏輯上同義）。本書沿用通行的「停機問題」說法，但你心裡要記得：**這個極限本身是圖靈 1936 證的，名字是後人貼的。** 這也是「直覺的陷阱」會回來談的一條。\n\n## 對角化歸謬：逐步走一遍\n\n現在來看圖靈怎麼證。手法跟 ch06 對角化造 G、ch04 說謊者自爆是**同一招**：假設那個全能的東西存在，然後造一個專門跟它作對的自我指涉物件，餵它自己，逼出矛盾。\n\n這是本章的 worked example，慢慢走，每一步標清楚理由。全程是紙上推演——我會用文字描述那個「作對程式」的邏輯，**不寫可執行程式碼**（本書純紙筆）。\n\n**第一步：假設敵人存在。** 反證法的起點。假設真有一個通用停機判定器 H，它總會停、總會給對的答案：\n\n```text\nH(P, w) = 「會停」   若 P 跑在 w 上會停機\nH(P, w) = 「不停」   若 P 跑在 w 上會永遠跑下去\n（且 H 自己對任何 (P, w) 都一定停下來給答案）\n```\n\n**第二步：用 H 造一個專門作對的程式 D（diagonal，對角程式）。** D 只吃一個輸入：一段程式的編碼 x。D 的邏輯是「問 H，然後**反著做**」：\n\n```text\n程式 D(x)：                            ← x 是某段程式的編碼\n  問 H：「程式 x 跑在輸入 x 上，會停嗎？」   ← 注意：把 x 同時當「程式」和「它的輸入」\n  若 H 回答「會停」  →  D 故意進入無窮迴圈（不停）\n  若 H 回答「不停」  →  D 立刻停下來（停）\n```\n\nD 在做一件很賤的事：**它先問 H「x 餵 x 會怎樣」，然後做相反的事。** H 說會停，D 就不停；H 說不停，D 就停。只要 H 存在，D 就寫得出來——它只是呼叫 H、看答案、然後唱反調，完全合法。\n\n**第三步：把 D 餵給自己。** 這是對角線上那一格——拿 D 的編碼，當作 D 的輸入，問「D 跑在 D 上會怎樣」。攤開來看：\n\n```text\n跑 D(⌜D⌝)：把 D 自己的編碼餵給 D\n  D 內部會問 H：「程式 D 跑在輸入 D 上，會停嗎？」\n\n  情況一：H 回答「會停」\n     → 依 H：D(⌜D⌝) 應該會停\n     → 但 D 的規則是「H 說會停我就不停」→ D(⌜D⌝) 不停\n     → 矛盾（H 說會停，實際不停）\n\n  情況二：H 回答「不停」\n     → 依 H：D(⌜D⌝) 應該不停\n     → 但 D 的規則是「H 說不停我就停」→ D(⌜D⌝) 停\n     → 矛盾（H 說不停，實際停了）\n```\n\n**第四步：收網。** 兩種情況都矛盾。H 對 (D, D) 這一對，無論回答「會停」還是「不停」都答錯。但我們一開始假設 H 對**任意**輸入都答得準——這下被 (D, D) 打臉了。所以假設崩潰：\n\n> **不存在通用停機判定器 H。停機問題不可判定。**\n\n停下來看清楚這個結構，因為你會在這本書裡認出它第三次了：\n\n```text\n說謊者（ch04）   ：句子說「我是假的」      → 真也矛盾、假也矛盾    → 自爆\n脊椎句 G（ch06/07）：句子說「我不可證」      → 可證則矛盾，逼出不可證 → 不完備\n對角程式 D（本章） ：程式做「H 說的相反」    → 兩種答案都矛盾        → 停機不可判定\n```\n\n同一個引擎——**自我指涉 ＋ 一個跟自己作對的謂詞**——點三次火。哥德爾把它瞄準「可證」，造出真而不可證的句子；圖靈把它瞄準「會停」，造出沒有判定器答得了的問題。我認為這是 Part IV 最值得拍桌子的一頁：你以為換了個領域（從邏輯到計算），結果是同一齣戲換了套戲服。\n\n## 為什麼這跟說謊者一樣、又不一樣\n\n值得花十秒分清楚「孿生」到底孿在哪、不孿在哪，否則容易把三件事混成一團。\n\nD 和說謊者**孿生**在結構：都靠「自我指涉 ＋ 唱反調」逼出矛盾。但它們**不一樣**在後果——而這個不一樣，正是 ch04 講過的那把鑰匙：\n\n- 說謊者用的是**真假謂詞**（「我是假的」），真假對稱、兩扇門都炸，結果是**句子自爆、系統不一致**。\n- D 用的是**停機這個行為**（H 的輸出），H 必須是一個總會停、總會答的機器；矛盾炸的不是某個句子的真值，而是**「H 存在」這個假設**。所以結論不是「D 這個程式有毛病」，而是「**那個全能判定器 H 不可能存在**」。D 本身好端端的——只要你給它一個 H，它就跑得起來；問題是 H 給不出來。\n\n換句話說：說謊者炸的是「句子能不能有真值」，停機歸謬炸的是「能不能有一台全能判定機」。兩者同構，但一個炸句子、一個炸機器。這個差別等下接回 G 時很重要。\n\n## 孿生子的正臉：停機 ↔ 可證\n\n現在把兩張臉並排，看它們五官一一對應。這是本章的核心——「不完備」與「不可判定」不是兩個碰巧都很反直覺的結果，是**同一個極限的兩種說法**。\n\n```text\n            哥德爾的臉（ch06/07）            圖靈的臉（本章）\n            ──────────────────              ──────────────────\n被問的問題   φ 在 F 內可證嗎？               P 跑 w 會停嗎？\n造出的怪物   G：句子說「我不可證」           D：程式做「H 答案的相反」\n自我指涉手法 對角化引理（句子代入自己編碼）   把 D 餵給 D 自己\n作對的謂詞   ¬Prov_F（「不可證」）           「H 說會停就不停」\n炸掉的東西   「F 完備」這個夢               「H 存在」這個夢\n留下的殘骸   有真而不可證的句子（不完備）     有沒判定器答得了的問題（不可判定）\n半邊能做到   證明可逐一列舉（r.e.）          會停的可確認（r.e.）\n半邊做不到   不可證的證不出來               不停的確認不了\n```\n\n最後兩列特別值得停一下，因為它揭穿了這個極限的**不對稱**性質——這是工程師最容易誤會的地方。\n\n## 半可判定：一半好辦、一半永遠等不到\n\n停機問題不是「完全黑箱、什麼都不知道」。它是**半可判定（semi-decidable，等價於遞迴可列舉 recursively enumerable, r.e.）**——一半好辦、一半無解。具體說：\n\n```text\n「P 跑 w 會停」這一半      ：可以確認。\n   做法：就把 P 跑在 w 上、等。它若真的會停，\n        你終究會等到它停 → 答「會停」。✓\n\n「P 跑 w 不停」這一半      ：無法確認。\n   問題：你跑著跑著，它還沒停——\n        你怎麼知道是「再等一下就停」還是「永遠不停」？\n        你永遠等不到一個「確定不停」的信號。✗\n```\n\n這正是「半」的意思：**會停的，你跑就知道；不停的，你永遠拿不到確定的答案。** 把所有「會停」的 (P, w) 想成一張清單，你可以寫一個程式把它們一個一個印出來（同時跑所有 (P, w)、誰停了就印誰）——這叫**遞迴可列舉**。但你**沒辦法**寫一個程式把「不停」的那些也保證列完，更沒辦法寫一個對兩邊都總是停下來給答案的判定器。能列舉、不能判定——這就是 r.e. 而非 recursive 的精確含義。\n\n這個不對稱跟哥德爾那邊**嚴絲合縫地對上**：在一個夠強又一致的系統 F 裡，「可證的句子」也是遞迴可列舉的——你可以想像一台機器，從公理出發，把所有合法的證明一條一條機械地生成出來（ch01 講過證明是可機械檢查的，所以也可機械列舉），每生成一個證明就印出它的結論。**所有可證句，你終究會列到。** 但「不可證的句子」呢？你列不完——因為一個句子遲遲沒被列到，你分不清是「再等等就會被證」還是「它根本不可證（像 G）」。\n\n```text\n   圖靈側                          哥德爾側\n   ──────                          ────────\n   會停的 (P,w)：可列舉 ✓           可證的句子：可列舉 ✓\n   不停的 (P,w)：列不完 ✗           不可證的句子：列不完 ✗\n            （遞迴可列舉，r.e.，但非 recursive）\n```\n\n讀過書架上 TLA+ 那本書的話，「把所有合法狀態／證明一條條機械生成出來」這個味道你熟（見《把系統寫成定理》談機械檢查那章）——但這裡不依賴它，純算術的列舉直覺就夠。一句話收束：**「可機械列舉」和「可機械判定」是兩件事，差的就是那不可確認的另一半。** 這個差，圖靈和哥德爾分別在計算和證明裡撞到了同一塊。\n\n## 從停機反推不完備：一刀兩用\n\n孿生關係不只是「長得像」，是可以**互相推導**的。最漂亮的方向是：**假設你能解停機問題（你不能），就能讓 F 完備（它不能）——所以反過來，F 必不完備。** 走一遍這個歸謬，你會徹底相信兩者是同一件事。\n\n直覺骨架（嚴格版指向延伸閱讀，本書給工程師的嚴謹版：每步能口頭講出理由）：\n\n```text\n假設 F 是一致、可遞迴公理化、夠強表達算術的系統，\n且（為了反證）假設 F 對每個算術句都能判定（F⊢φ 或 F⊢¬φ，且我們能機械找到是哪邊）。\n\n1. 「程式 P 跑 w 會停」這件事，可以寫成一個算術句 φ_{P,w}     ← 夠強：能編碼計算過程\n   （因為一步步的計算過程，就是一串能被算術描述的狀態轉換）\n\n2. 若 F 完備且可遞迴公理化，我們就有了判定 φ_{P,w} 的機械程序：\n   一條一條列出 F 的所有證明（可遞迴公理化 → 證明可列舉），\n   等到看見「φ_{P,w} 的證明」或「¬φ_{P,w} 的證明」其中一個冒出來。   ← 完備：必有一邊冒出來\n\n3. 哪個先冒出來，就告訴我們 P 跑 w 停不停 → 我們解出了停機問題！\n\n4. 但停機問題不可判定（本章已證）。 ← 矛盾\n\n5. 所以「F 完備」的假設錯了 → F 不完備。\n```\n\n這就是第一不完備定理的**圖靈版證明**——不靠對角化引理直接造 G，而是借停機問題的不可判定當槓桿。第 1 步用「夠強」（能在算術裡編碼計算）、第 2 步用「可遞迴公理化」（證明可列舉）、第 4 步用停機不可判定當外部事實。三條件一個都沒少——這正是本書的命脈，定理的條件缺一不可。\n\n注意兩個微妙處，免得你以為這是免費午餐。**第一**：第 3 步「哪個先冒出來就告訴我們 P 停不停」，隱含 F 是**健全的**（sound）——F 的定理在 ℕ 中皆真，不會證出假的算術句。若 F 僅一致而非健全，它可能把一個實際不停的 P 的 φ_{P,w} 也「證出來」，那「先冒出來的」就答錯了。嚴格版要求 F 至少是 **Σ₁-健全**（Σ₁-sound）；工程直覺版照著自然數來想，健全性就暗含其中（「把 F 的算術讀成 ℕ 的真理」那一層）。**第二**：這個論證直接得到的是「F 不可能**既完備又可判定地對齊真值**」。要乾淨地推出哥德爾原版的「存在 G 真但不可證」，還得把「在 ℕ 中真」這層接上（那是 ch12 的事）。但**核心的刺**——「一個夠強的系統不可能機械地判定所有算術真理」——已經完全在這頁上，而且它是從「會不會停」這個你每天擔心的問題裡長出來的。希爾伯特想要的「可判定」那根柱子（ch02 的標靶），就是在這裡、被圖靈這一刀砍斷的（柱子倒下的完整結算留給 ch10）。\n\n## 本章與 ch10 的分工\n\n這兩章都坐在圖靈 1936 這篇論文上，分工先說清楚，免得你讀 ch10 時覺得重複：\n\n- **ch09（本章）＝不完備的孿生。** 重點是把停機歸謬跟 ch06 對角化、ch04 說謊者擺在一起，看出「同一招的另一張臉」，並用停機反推第一定理（脊椎角度——Part IV 從這裡把視角接回 G）。\n- **ch10＝希爾伯特判定夢的破滅。** 重點是 Entscheidungsproblem（決定問題）這根柱子怎麼倒、邱奇（Alonzo Church）跟圖靈各自獨立的否決、Church–Turing 論題、不可判定問題不只一個而是「一整群島」的版圖（廣度角度——不重走停機歸謬，只引用本章結果）。\n\n一句話：本章講「這張臉長什麼樣」，ch10 講「這張臉屬於多大一片版圖、拆了希爾伯特哪根柱子」。\n\n## 直覺的陷阱\n\n停機問題是工程師熟悉的領域，正因為熟，反而有幾個特別滑的坑。\n\n| 陷阱 | 錯誤直覺 | 它在哪一步帶你下溝 | 正確版 |\n|---|---|---|---|\n| 「停機問題說『無法知道任何程式停不停』」 | 既然不可判定，那任何程式會不會停我們都不知道 | 把「沒有**通用**判定器」偷換成「對**每個**程式都無解」 | 多數具體程式停不停我們一眼就知道（`while(true)` 不停、`return 1` 會停）。不可判定的是**單一通吃所有程式**的判定器，不是個案 |\n| 「會停的也答不出來」 | 既然整個問題無解，會停的那半也沒救 | 忽略了**半可判定**的不對稱 | 會停的可以確認（跑了就知道）；無解的只有「不停」那半——你永遠等不到「確定不停」的信號 |\n| 「圖靈 1936 證明了『停機問題』」 | 圖靈那篇論文裡就有「停機問題」 | 把後人取的名字回貼到原始論文 | 圖靈 1936 證的是 circle-free 不可判定；「停機問題」之名是戴維斯 1950 年代起用、1958 年成書帶進主流的（2026-06 查證）。極限是圖靈的，名字是後人的 |\n| 「Church–Turing 論題是被證明的定理」 | 「可計算＝圖靈機可算」既然大家都信，應該被證了 | 把一個**論題（thesis）**當定理 | 它斷言「直覺上的可機械計算」＝圖靈機／λ-演算／遞迴函數，這是無法被證明、只能被一再印證的論題，不是定理（ch10 細談） |\n| 「停機不可判定 ≠ 哥德爾不完備，是兩個不同結果」 | 一個講計算、一個講邏輯，當然是兩回事 | 被「不同領域」的外表騙了，沒看到同一個對角化引擎 | 兩者同構、可互相推導（本章已示範停機→不完備）。它們是同一個自我指涉極限的兩張臉 |\n\n最該自我察覺的一條：**每當你想說「停機問題證明我們無法知道某程式停不停」，停下來問——是哪個程式？** 如果你答得出具體程式（多半你答得出），那它就不是停機問題說的那種無解。停機問題打的是「萬用判定器」，不是「每個個案」。把「沒有通用解」誤讀成「每個個案都無解」，跟把哥德爾的「F 證不出 G」誤讀成「G 對錯無法知道」（ch12 會修）是同一種病——都是把一個關於**通用機械程序**的精確否定，偷換成一個關於**個別認知**的浮誇宣稱。\n\n## 紙上推演\n\n> 全程紙筆，不需要跑任何程式。對角程式 D 一律用文字描述邏輯，不寫可執行碼。\n\n### 推演題 1 — 把停機歸謬講給同事聽（5 分鐘版）★★ **[15 分鐘]**\n\n不看上面的逐步推導，自己組一個「5 分鐘白板版」的停機歸謬，講給一個沒聽過的後端同事聽。要求：(a) 先講清楚停機問題問的是什麼（強調「**單一通用**判定器」）；(b) 造出對角程式 D 並說清楚它在唱什麼反調；(c) 把 D 餵給自己，導出兩種情況都矛盾。不准跳步。\n\n### 推演解答\n\n```text\n1. 問題：有沒有「一個」程式 H，吃 (程式 P, 輸入 w)，\n   總能正確答出「P 跑 w 會停嗎」？（強調：一個通吃所有的判定器）\n\n2. 假設有這個 H。我用它造一個唱反調的程式 D：\n   D(x)：問 H「程式 x 跑在輸入 x 上會停嗎」，\n        H 說會停 → D 故意不停；\n        H 說不停 → D 立刻停。\n\n3. 把 D 餵自己，跑 D(⌜D⌝)：\n   D 會問 H「D 跑 D 會停嗎」。\n   - H 說會停 → D 規則叫它不停 → 但 H 說會停 → 矛盾\n   - H 說不停 → D 規則叫它停  → 但 H 說不停 → 矛盾\n\n4. 兩種答案都讓 H 答錯。但 H 號稱「對任意輸入都對」→ 假設崩潰\n   → H 不存在 → 停機問題不可判定。\n```\n\n常見錯路：(1) 忘了強調「單一通用」，講成「無法知道程式停不停」——那是錯的（多數程式看得出來）。(2) 讓 D 吃兩個輸入——D 只吃一個 x，並把 x 同時當「程式」和「它的輸入」餵給 H，這個「x 餵 x」才是對角線那一格。(3) 漏講 H 必須**自己也總會停**——若允許 H 自己卡住，它就不是一個合格的判定器，整個矛盾的力道會弱掉。\n\n### 推演題 2 — D「餵自己」對應對角化的哪一步 ★★ **[10 分鐘]**\n\n回到 ch06 對角化造 G 的構造（句子模板代入自己的編碼）。指出：停機歸謬裡「把 D 餵給 D 自己」這個動作，對應對角化引理裡的哪一步？再指出它跟 ch04 說謊者的「這句話」對應哪一步。用一句話把三者串起來。\n\n### 推演解答\n\n對應關係：\n\n```text\n說謊者（ch04）   ：句子提到「這句話」              ← 句子指涉自身\n對角化造 G（ch06）：句子模板 ψ 代入「⌜自己⌝」        ← 句子（透過編碼）指涉自身\n停機歸謬（本章） ：把 D 的編碼 ⌜D⌝ 當輸入餵給 D    ← 程式（透過編碼）餵自身\n```\n\n三者是同一個動作的不同外衣：**讓一個物件拿到「自己的描述」，再對這個描述動手腳。** 對角化引理保證「任何性質 ψ 都造得出一個說『我有 ψ』的句子」，靠的就是「把句子模板代入自己編碼」；停機歸謬的「D 餵 D」是它的程式版——D 拿到自己的編碼 ⌜D⌝，然後（透過 H）對「自己會不會停」這件事唱反調。一句話串起來：**自我指涉的本質，是讓物件碰到自己的編碼；哥德爾用它造句子、圖靈用它造程式、說謊者用自然語言的「這句話」——同一個對角線，三種載體。**\n\n常見錯路：以為「餵自己」對應的是「G 說自己不可證」那個**內容**。不是——對應的是**構造手法**（拿到自己的編碼），內容（不可證／不停）是後接的謂詞。手法相同、謂詞不同，這正是 ch04 強調的「引擎相同、燃料不同」。\n\n### 推演題 3 — 為什麼停機是「半可判定」而不是「完全黑箱」★★ **[15 分鐘]**\n\n解釋：停機問題「不可判定」，但又說它「半可判定（遞迴可列舉）」——這兩句不矛盾嗎？請說清楚「半」在哪、能做到的是哪一半、做不到的是哪一半，並把它對應到哥德爾側「可證句可列舉、不可證句列不完」。\n\n### 推演解答\n\n不矛盾。「不可判定」指的是「沒有一個**總會停、對兩邊都答得準**的判定器」；「半可判定」指的是「**會停**的那一半可以確認」。兩句各管一件事：\n\n```text\n能做到的半邊：確認「會停」\n   把 P 跑在 w 上、耐心等。它若真會停，你終會等到 → 答「會停」。✓\n   （所以「會停的 (P,w)」是遞迴可列舉的：同時跑所有 (P,w)、誰停印誰）\n\n做不到的半邊：確認「不停」\n   跑著還沒停時，你分不清「再等就停」還是「永遠不停」。\n   沒有任何有限時刻給你「確定不停」的信號。✗\n\n→ 一邊可確認、一邊不可確認 = 半可判定（r.e. 但非 recursive）\n```\n\n對應哥德爾側：\n\n```text\n可證的句子：可列舉 ✓（機械生成所有證明，逐一印出結論，可證句終會被列到）\n不可證句子：列不完 ✗（一個句子遲遲沒被列到，分不清「再等就證」還是「根本不可證」如 G）\n```\n\n兩側同構：**能列舉、不能判定**，差的就是那不可確認的另一半。常見錯路：把「半可判定」誤解成「一半的程式可判定、一半不可判定」。不是——是**每一個**停機問句都落在「會停可確認、不停不可確認」的同一個不對稱裡，「半」指的是答案的方向（停 vs 不停），不是程式的比例。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 停機問題問的「不存在 H」，H 必須滿足哪三個條件（單一／任意／自己總會停）？少了「自己總會停」這條，矛盾為什麼會垮？\n2. 對角程式 D 在唱什麼反調？為什麼非得把 D「餵給自己」才逼得出矛盾？這對應對角化引理的哪一步？\n3. 為什麼停機歸謬炸掉的是「H 存在」這個假設，而不是「D 這個程式有毛病」？這跟說謊者炸掉的東西差在哪？\n4. 「停機問題不可判定」和「哥德爾第一定理不完備」為什麼是同一件事的兩張臉？至少講出三個一一對應的零件。\n5. 走一遍「假設能解停機 → 能讓 F 完備 → 矛盾」的反推，並指出三條件（一致、可遞迴公理化、夠強）各用在哪一步。\n6. 「半可判定」的「半」在哪？哪一半能做到、哪一半永遠等不到？對應哥德爾側的什麼？\n7. 為什麼「停機問題證明我們無法知道任何程式停不停」是錯的？「沒有通用判定器」和「每個個案都無解」差在哪？\n8. 「圖靈 1936 證明了停機問題」這句話哪裡需要 hedge？極限是誰的、名字是誰貼的？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy，「Gödel's Incompleteness Theorems」** https://plato.stanford.edu/entries/goedel-incompleteness/ ——權威且免費。讀其中談「可計算性與不完備的關係」一節，看停機不可判定如何給出第一定理的另一條證明路徑；本章的「從停機反推不完備」是它的直覺版。\n- **「On Computable Numbers, with an Application to the Entscheidungsproblem」（Turing 1936，Wikipedia 條目「Turing's proof」）** https://en.wikipedia.org/wiki/Turing%27s_proof ——看圖靈原始論文證的其實是「circle-free 不可判定」、機器 H 算不出自己的數字；本章「停機問題之名為後世所加」的出處。\n- **「The origins of the halting problem」（Daylight 等，*Journal of Logic and Computation* / ScienceDirect）** https://www.sciencedirect.com/science/article/pii/S235222082100050X ——細究「halting problem」這個詞如何從戴維斯 1950 年代的講課、1958 年的書定型；本章史實 hedge 的學術依據。\n- **Charles Petzold《The Annotated Turing》** ——逐句注解圖靈 1936 論文的世界級導讀；讀它對 circle-free、對角化、與決定問題如何串起來的細部還原，補足本章只給直覺骨架的部分。\n- 跨書：質因數分解唯一性如何讓「把程式／證明序列化成一個數字」可逆，見《乘法的原子》談算術基本定理唯一分解那章——本章 D 能「拿到自己的編碼 ⌜D⌝」、哥德爾能把句子變數字，底層都靠那把鑰匙。\n- 跨書：「把所有合法狀態／證明一條條機械生成」的味道，見《把系統寫成定理》談機械檢查那章——本章「可證句可列舉」的工程直覺在那裡有形式化的對應（不依賴，讀過更有感）。\n"}, {"id": "ch10-undecidable-archipelago", "file": "ch10-undecidable-archipelago.md", "group": "Part IV — 孿生與邊界", "title": "ch10 — 不可判定的群島：決定問題與可計算性的版圖", "md": "# ch10 — 不可判定的群島：決定問題與可計算性的版圖\n\n> **本章解決什麼問題**：上一章（ch09）讓你看了停機問題——圖靈用「會不會停」重演了哥德爾的對角化好戲，造出一個沒有任何程式能判定的問句。本章把鏡頭從那一個句子拉開，看清它坐落的整片版圖：希爾伯特那台「能判定任意命題真假」的夢幻機器（決定問題，Entscheidungsproblem），在 1936 年被邱奇與圖靈各自獨立否決；而「可機械計算」這個直覺，被圖靈機、λ-演算、遞迴函數三種長相完全不同的模型同時抓住，匯成 Church–Turing 論題。停機不是孤島，它屬於一整群不可判定問題組成的群島——一階邏輯有效性、Post 對應、希爾伯特第十問題都在島上。讀完你會看到：希爾伯特計畫四根柱子裡的「可判定」這一根，是在這裡正式倒下的（ch02 立的標靶，第二根結算）。本章是廣度章，不重走 ch09 的停機歸謬，只點名引用它的結論。\n\n## 從你已知的出發\n\n你心裡早就有一條紅線：**「寫一個工具，判定任意程式有沒有 bug」這種需求，一聽就知道做不到。**\n\n不是因為工程師不夠努力。是你隱約知道，有些「判定任意 X 是否具有性質 P」的請求，原則上沒有通用解。最乾淨的例子就是 ch09 的停機問題：沒有一個程式 `willHalt(P, w)` 能對任意程式 `P` 與輸入 `w` 正確回答「`P` 跑 `w` 會不會停」。你接過「幫我偵測所有死迴圈」的需求，你知道頂多做到啟發式——抓得到一些明顯的、漏掉一堆刁鑽的，永遠不可能零漏判。\n\n而且這條紅線比你以為的還長。考慮這些需求，每一個你大概都本能地皺過眉：\n\n- 「寫個分析器，判定任意函式會不會 throw。」\n- 「寫個工具，判定兩段程式碼是不是等價（對所有輸入給一樣的輸出）。」\n- 「寫個 linter，標出所有死碼（永遠執行不到的分支）。」\n- 「寫個檢查器，判定任意函式是不是純函數（無副作用）。」\n\n這些不是「目前還沒人做出來」，是**原則上不存在通用演算法**。而且它們不是各自獨立的壞運氣——它們全是同一個極限的不同投影。1953 年萊斯（Henry Rice）把這件事一次講死：**程式的任何「非平凡的語意性質」都不可判定**（Rice's theorem，2026-06 查證）。「語意性質」指的是關於程式**行為**的性質（會不會停、會不會 throw、算不算純函數），相對於「語法性質」（程式碼裡有沒有 `if`、有幾行）；「非平凡」指這性質不是對所有程式都成立、也不是對所有程式都不成立。一句話：**只要你問的是「這程式實際上會做什麼」，而那問題的答案不是恆真也不是恆假，就沒有通用判定器。** 你對「完美靜態分析器不存在」的工程直覺，其實就是萊斯定理的庶民版。\n\n本章要做的，是把這條你早就摸到的紅線，接回哥德爾的脊椎，並告訴你它有多長、屬於多大一片版圖、又拆掉了希爾伯特的哪根柱子。我們先回到 1928 年，希爾伯特畫下那台夢幻機器的規格。\n\n## 決定問題：希爾伯特要的那台判定機\n\n回憶 ch02。希爾伯特計畫有四根柱子：**完備**（每個真命題都可證）、**一致**（不證矛盾）、**有限性一致性自證**（用不會被質疑的手段證明自己不會爆）、以及第四根——**可判定（decidable）**。\n\n第四根的精確名字叫**決定問題（Entscheidungsproblem，本書保留德文原詞並附中譯「決定問題」）**。希爾伯特與阿克曼（Wilhelm Ackermann）1928 年在《理論邏輯綱要》（*Grundzüge der theoretischen Logik*）裡把它寫成一個乾淨的請求（2026-06 查證，照 landscape）：\n\n```text\n決定問題（Entscheidungsproblem，Hilbert–Ackermann 1928）：\n\n  有沒有一個一般的機械程序（一台機器、一套演算法），\n  能對「一階謂詞邏輯」裡任意給定的一個式子 φ，\n  在有限步內正確回答：「φ 是不是（普遍）有效的？」\n\n  （「有效 valid」＝在所有可能的解釋／模型下都為真——\n    純邏輯為真，不靠任何特定領域的事實。）\n```\n\n對工程師，這台機器是什麼？是**數學版的「綠燈全自動 CI」**。希爾伯特要的是：你把任何一個邏輯命題丟進去，機器轉一轉，吐出 `valid` 或 `not valid`，一定停、一定對。有了它，數學就「自動化」了——任何猜想，輸進去，等答案。沒有靈感、沒有大海撈針、沒有卡關，只有一台不知疲倦的判定機在跑。\n\n希爾伯特本人對這台機器極度樂觀。他在 1930 年柯尼斯堡那句著名的「Wir müssen wissen, wir werden wissen（我們必須知道，我們必將知道）」（ch02），喊的就是這個信念：數學沒有「原則上不可知」的問題，差別只在我們還沒算到。決定問題若有解，這信念就有了鋼鐵地基。\n\n這裡要先把一個容易撞混的東西分開，因為它正是 ch03 講過的完備性定理在這裡的回音：\n\n```text\n別撞混這兩件事（同一個一階邏輯，兩個不同的問句）：\n\n  (1) 一階邏輯「完備」嗎？           ← 哥德爾 1929 完備性定理：是。\n      （每個語意有效的式子，都可證。「規則夠用」。）\n\n  (2) 一階邏輯有效性「可判定」嗎？   ← 決定問題：否。（本章。）\n      （有沒有機器能對任意式子判定它有不有效。）\n\n  兩者不矛盾：規則夠用（有效⇒一定證得出），\n  但「證得出」這件事本身沒有判定上界——\n  你可以機械地把所有證明一條條列出來（半可判定），\n  卻沒有保證何時該放棄找的停止信號。\n```\n\n第二個問句的答案是「否」。而且它是在哥德爾拆掉前三根柱子（ch07–08）後，由另外兩個人、用另外兩種武器，在同一年砍下的。\n\n## 1936：兩個人、兩種武器、同一個否決\n\n決定問題的否定答案，1936 年由邱奇（Alonzo Church）與圖靈（Alan Turing）**各自獨立**給出。這件事的戲劇性在於：兩人用了長相完全不同的工具，得到同一個結論——這本身就是 Church–Turing 論題的第一個證據。\n\n**邱奇在前（約早七個月）。** 邱奇用他發明的 **λ-演算（lambda calculus）**——一套只有「函數抽象與套用」兩個動作的極簡計算模型——證明了「判定兩個 λ-表達式是否等價」沒有通用解，並據此把決定問題否決掉。他的關鍵論文〈An Unsolvable Problem of Elementary Number Theory〉1935-04-19 向美國數學學會宣讀、1936-04 刊出（2026-06 查證），另有一篇短文〈A Note on the Entscheidungsproblem〉1936-04-15 投稿、刊於《Journal of Symbolic Logic》創刊號（1936-03，照 landscape）。\n\n**圖靈在後（同年）。** 圖靈用他發明的**圖靈機**，先證停機問題不可判定（ch09），再把決定問題歸約到停機問題：若有判定機能解決一階有效性，就能拿它解停機——但停機已知無解，矛盾。所以決定問題無解（Turing 1936，論文〈On Computable Numbers, with an Application to the Entscheidungsproblem〉；本書用「1936」並一句註明：所在卷標年 1937、含 1937 勘誤，照 landscape T11）。\n\n兩件事值得停下來看。\n\n第一，**圖靈寫論文時並不知道邱奇已經做出來了。** 等他快收尾，刊著邱奇論文的那期期刊寄到了劍橋，圖靈才趕忙補了一個附錄，草草證明「圖靈機可計算」與「λ-可定義」其實是同一回事（2026-06 查證）。兩條獨立的路，撞在同一個終點。\n\n第二，順帶澄清一個常被張冠李戴的細節：「Turing machine（圖靈機）」這個名字不是圖靈自己取的，是邱奇 1937 年在一篇書評裡首創的（JSL 2(1), 1937, pp. 42–43，2026-06 查證）。\n\n把這一刀接回本書的脊椎：希爾伯特立了四根柱子，哥德爾的兩條定理砍倒了前三根（完備←ch07、有限性一致性自證←ch08、外加「能自證一致」這個夢←ch08），而**第四根「可判定」，是邱奇與圖靈在 1936 年砍倒的。** ch02 立的那個標靶，到這裡四根全倒。\n\n## Church–Turing 論題：可計算的三張臉\n\n邱奇與圖靈撞在同一個終點，不是巧合。1930 年代，好幾個人從完全不同的動機出發，各自定義「什麼叫一個函數是可機械計算的」，結果這些定義**全部等價**：\n\n```text\n「可機械計算」的三張臉（1930 年代各自提出，後被證兩兩等價）：\n\n  圖靈機（Turing 1936）        一條無限長磁帶 + 一個讀寫頭 + 一張狀態轉移表\n                              ≈ 你熟的：帶無限記憶體的有限狀態機\n\n  λ-演算（Church 1930s）       只有「定義函數」與「套用函數」兩個動作\n                              ≈ 你熟的：純函數、無副作用、一切皆函數\n\n  一般遞迴函數（Gödel–Herbrand–Kleene）  從幾個基本函數出發，\n                              用組合、原始遞迴、最小化堆出來的函數\n                              ≈ 你熟的：遞迴定義的函式\n\n         全部等價 ⇒ 它們框住的是「同一類」函數\n```\n\n這個「同一類」的斷言，就是 **Church–Turing 論題（Church–Turing thesis）**：\n\n> **凡是直覺上「能被機械程序計算」的函數，恰好就是圖靈機能算的（＝λ-可定義的＝一般遞迴的）。**\n\n對工程師，這個直覺你早就有：你知道「不同語言、不同 runtime 算得出的東西其實是同一類」。一個問題若 Python 解得了，C、Haskell、Lisp、一台你手刻的暫存器機，原則上也都解得了（只差快慢與優雅）；解不了的，換語言也救不了。「圖靈完備（Turing-complete）」這個你天天掛在嘴上的詞，講的正是這件事——一個語言只要強到能模擬圖靈機，它能算的就是「可計算」的全部，不多不少。\n\n但這裡有一個**極重要、極容易被科普寫錯**的點，我要單獨拉出來講，因為 landscape 把它列為低信心陷阱項：\n\n```text\nChurch–Turing 是「論題（thesis）」，不是「定理（theorem）」。\n\n  「圖靈機 = λ = 遞迴」這三者等價——這部分是「定理」，\n   被嚴格證明了（三個形式模型互相等價）。\n\n  但「這三者 = 我們直覺中『能機械計算』的全部」——這部分是「論題」，\n   不是定理。因為「直覺上能機械計算」是個非形式的概念，\n   你沒辦法對一個沒有精確定義的東西做數學證明。\n   它只能被一再印證（八十多年沒人找到反例），無法被證明。\n```\n\n為什麼這個區別重要？因為它本身就是個小小的哥德爾式謙卑：我們對「可計算」的信心，不是來自一條被證明的定理，而是來自「八十年來，每一個被認真提出的計算模型，最後都被證明不超過圖靈機」。這是經驗的歸納，不是邏輯的必然。你寫程式時對「圖靈完備就是天花板」的信任，建立在同樣的沙地上——只是這片沙地夯得非常非常實。\n\n## 不可判定的群島\n\n現在把視野徹底拉開。停機問題不是一座孤島。一旦圖靈證了它不可判定，一個標準技巧立刻量產出一整群不可判定問題：**歸約（reduction）**。\n\n歸約的工程直覺你熟得很：**「如果能解 B，就能解 A；而 A 已知無解；所以 B 也無解。」** 你 debug 時天天這樣推——「如果這個快取沒壞，那這個 bug 就不可能發生；但 bug 發生了，所以快取壞了」。把「快取壞了」換成「停機問題有解」，把「bug 發生了」換成「矛盾」，就是不可判定性證明的骨架（ch09 的停機歸謬就是把「停機可判定」歸到一個自我指涉的矛盾）。\n\n於是，只要把停機問題「藏」進另一個問題 B 裡——證明「能解 B ⇒ 能解停機」——B 就被釘成不可判定。這台量產機跑了八十年，造出一整片群島：\n\n```text\n不可判定的群島（點名給直覺，本書不展開各自證明）：\n\n  ┌─ 停機問題 ──────────── 任意 (程式 P, 輸入 w)，P(w) 會停嗎？（ch09，群島的源頭）\n  │\n  ├─ 一階邏輯有效性 ─────── 任意一階式子 φ，普遍有效嗎？（決定問題，Church/Turing 1936）\n  │\n  ├─ 程式等價 ──────────── 兩段程式對所有輸入給一樣的輸出嗎？（Rice 定理涵蓋）\n  │\n  ├─ 任意非平凡語意性質 ── 會不會 throw？是不是純函數？（Rice 1953，一網打盡）\n  │\n  ├─ Post 對應問題（PCP） ── 一組「上下兩行字串」的骨牌，能不能排出上下相同的序列？\n  │                          （Emil Post 1946；常被當成證別的問題不可判定的跳板）\n  │\n  └─ 希爾伯特第十問題 ───── 任意整係數多項式方程（丟番圖方程），有沒有整數解？\n                            （Matiyasevich 1970 完成的 MRDP 定理：無通用演算法）\n```\n\n我特別想讓你看清兩座島，因為它們把「不可判定」從「程式的怪癖」拉到了「純數學的腹地」：\n\n**Post 對應問題（PCP，Post 1946，2026-06 查證）。** 想像一副骨牌，每張骨牌上下各印一個字串，比如上 `ab` 下 `a`、上 `b` 下 `bb`。問題是：能不能挑一串骨牌（可重複），讓「上面接出來的字串」等於「下面接出來的字串」？這問題看起來像個拼字遊戲，毫無「自我指涉」的味道——但它不可判定。它之所以重要，是因為它比停機問題「形狀更簡單」，常被當成跳板：要證某個新問題不可判定，把 PCP 歸約進去，往往比直接歸約停機問題省力。\n\n**希爾伯特第十問題（MRDP 定理，Matiyasevich 1970 完成，集 Davis、Putnam、Robinson、Matiyasevich 四人二十一年之功，2026-06 查證）。** 希爾伯特 1900 年的第十問題問：有沒有通用演算法，判定任意整係數多項式方程（丟番圖方程，如 `x² + y² = z²` 這類，只求整數解）有沒有整數解？答案是**沒有**。這座島離程式碼最遠、離「純數學」最近——它說的是「連『這條方程有沒有整數解』這麼樸素的數論問題，都沒有萬用判定法」。不可判定性不是計算機科學的家務事，它住在數論的正中央。\n\n這就是「群島」這個詞的意思：不可判定不是一個孤立的技術現象，是一整片相連的大陸架，從程式行為一路延伸到丟番圖方程。而它們全都同源——都可以追溯到那一招自我指涉的對角化。\n\n## 三層地貌：可判定 / 半可判定 / 完全不可判定\n\n把群島放進更大的地圖，要分三層。這個分層是本章給你的核心版圖直覺，務必握緊：\n\n```text\n可計算性的三層地貌（按「機器能幫你到什麼程度」分）：\n\n  可判定（decidable）\n      有機器，對任意輸入，「是」與「否」都在有限步內正確回答、保證停。\n      例：命題邏輯有效性（真值表硬算）、Presburger 算術（只有加法，ch13）。\n          ── 兩面都答得了，這是最舒服的一層。\n\n  半可判定（semi-decidable，＝遞迴可列舉 r.e.）\n      只有「是」這一面保證在有限步答得了；「否」那面可能永遠等不到。\n      例：一階邏輯有效性、停機問題、「φ 在 F 中可證嗎」。\n          ── 你能寫個程式把所有「是」的情形一條條列出來（會停的程式跑了就知道、\n             可證的句子把所有證明列舉遲早撞到），但對一個「否」的輸入，\n             你的程式會永遠跑下去，你永遠不敢斷定「它真的不會停 / 真的不可證」。\n\n  完全不可判定（neither r.e. nor co-r.e.）\n      連半邊都搆不到，「是」和「否」兩面都列舉不出來。\n      例：判定圖靈機是否全停（對所有輸入都會停，即 Tot 問題），比停機更深一層。\n          ── 這層離「機器能幫忙」最遠。\n```\n\n對工程師，最該內化的是**半可判定**這一層，因為它解釋了你天天碰到的不對稱：\n\n- **測試／執行**是半可判定的「是」那一面：程式真的停了、bug 真的觸發了，你跑一下就確認得了。但「這程式對所有輸入都不會停 / 永遠不出 bug」，你跑不出來——你只能跑有限多個輸入，永遠剩下「萬一還有沒測到的」。\n- **證明搜尋**也是半可判定的「是」那一面（ch01 講過「驗易、找難」的不對稱，這裡是它的精確版）：你可以寫一台機器，把系統 F 的所有合法證明一條條列舉出來（公理就那些、規則就那些，機械地排列組合），於是「φ 可證」這件事，只要 φ 真可證，機器遲早會列舉到它的證明。但「φ 不可證」呢？機器列到天荒地老都沒撞到，你也不敢喊停——因為你不知道是「真的沒有」還是「下一條就是」。\n\n把這個半可判定的不對稱，連回脊椎句 G：\n\n```text\n脊椎句 G ：「G 在本系統 F 內無法被證明。」（ch04/06 那句）\n\n  「列舉 F 的所有證明」是半可判定的——可證的遲早列到，不可證的永遠等不到。\n  而 G 恰恰落在「永遠等不到」那一邊：F ⊬ G（ch07）。\n  你那台列舉證明的機器，會永遠跑下去，永遠列不到 G 的證明——\n  因為根本沒有。但 G 在 ℕ 中是真的（ch12 細談）。\n  ── 停機問題的「會停的列得到、不停的等不到」，\n     和不完備的「可證的列得到、G 等不到」，是同一個半可判定的不對稱。\n     這就是 ch09 說的「孿生」在版圖層級的樣子。\n```\n\n可判定 / 半可判定的這道縫，就是哥德爾與圖靈的極限在可計算性地圖上的等高線。希爾伯特要的是「全部可判定」——整張地圖都是最舒服的第一層。實際的地貌是：絕大多數有趣的問題，都落在第二層甚至第三層。\n\n## Worked example：希爾伯特四柱結算表\n\n本章是 Part IV 收束「拆希爾伯特標靶」的關鍵節點。我把 ch02 立的四根柱子拿出來，逐根結算——哪根、哪一章、被誰、用什麼砍倒。這張表不是可計算性教科書的判定速查表，是**把全書前半的標靶結帳**的對帳工具，每一格都連回脊椎：\n\n```text\n希爾伯特計畫四柱 vs 誰拆了它（全書標靶結算）：\n\n  柱子                希爾伯特要的            倒在哪一章 / 被誰 / 用什麼武器\n  ──────────────────────────────────────────────────────────────────────\n  ① 完備              每個真命題都可證        ch07 第一不完備定理（哥德爾 1931）\n     （complete）      （沒有真而不可證的）     ── 造出 G：真（在 ℕ）但 F ⊬ G。\n                                              真理溢出證明。\n\n  ② 一致自證          系統能用自己的有限手段    ch08 第二不完備定理（哥德爾 1931）\n     （+有限性）       證明自己不會矛盾          ── F ⊬ Con(F)。連保命符都摸不到。\n                                              （根岑 ch15 用外部更強原則補救，\n                                                但「自證」的夢仍死。）\n\n  ③ 可判定            有機器判定任意命題真假    ch09／ch10 決定問題否決\n     （decidable）                            （Church 1936 λ／Turing 1936 機器）\n                                              ── 連一階有效性都無通用判定法。\n                                                 ◄ 本章砍的就是這根。\n\n  ④（含於①②）有限性    一致性證明只用            ch08（自證不可能）＋ ch15\n                       不可質疑的有限手段        （根岑用到 ε₀ 超限歸納，\n                                              超出有限手段——夢的有限性版本也死）\n  ──────────────────────────────────────────────────────────────────────\n  結算：四根全倒。前三根哥德爾砍（1931），第三根可判定那一刀\n        由邱奇與圖靈補上（1936）。同一個自我指涉的對角化，\n        在「可證性」面前是不完備，在「可計算性」面前是不可判定。\n```\n\n逐格複核一遍，確認沒有跳步、沒有掉條件：\n\n- **第①根**靠 ch07：在三條件（一致、可遞迴公理化、夠強表達算術）下，G 真而不可證。注意這裡守住條件——不是「所有系統都不完備」，是「夠強又一致的系統」。✓\n- **第②根**靠 ch08：`F ⊬ Con(F)`，其中 `Con(F) ≡ ¬Prov_F(⌜0=1⌝)`。前提同樣是那三條件（外加 Prov 滿足 HBL 三條件 D1–D3）。✓\n- **第③根**靠本章：決定問題無解，Church 1936 在前（λ-演算）、Turing 1936 在後（機器＋歸約停機）。砍的是「一階邏輯有效性可判定」。✓\n- **第④根**是有限性要求，它纏在①②裡——希爾伯特要的「一致性證明只用有限手段」，被第二定理斷了「自證」這條路，而 ch15 根岑雖證了 PA 一致，用的卻是到 ε₀ 的超限歸納（超出有限手段）。所以「有限性自證」這個夢，兩頭都不通。✓\n\n對照一句話收尾：哥德爾在「真 vs 可證」的軸上拆穿了希爾伯特，圖靈與邱奇在「能算 vs 不能算」的軸上拆穿了他。**兩條軸，同一招對角化，同一個自我指涉的極限。** 這就是 ch09 標題「孿生子」的全貌——本章把這對孿生子放回它們共同統治的整片版圖。\n\n## 直覺的陷阱\n\n本章的版圖最容易被三種混淆弄亂。先抓具名的：\n\n| 陷阱 | 錯誤直覺帶你下溝的那一步 | 正確版（怎麼自我察覺） |\n|---|---|---|\n| **「不可判定＝無法決定／見仁見智」** | 看到「undecidable」就讀成日常的「下不了決定」「看你怎麼想」「沒有標準答案」，於是把它當成相對主義或主觀性。 | 「不可判定（undecidable）」是個精確技術義：**不存在一個通用機械程序，對任意輸入都正確回答。** 它跟「答案不存在」「答案主觀」毫無關係——每個具體的停機實例，答案都是客觀確定的「停」或「不停」，只是沒有**統一**的演算法一次解決全部。察覺法：問自己「我是不是把『沒有萬用判定機』偷換成了『這件事沒有客觀答案』？」前者是對的，後者是越界。（這正是 ch14 濫用解剖會放大的術語漂移。） |\n| **「Church–Turing 論題已經被證明了」** | 把「圖靈機＝λ＝遞迴」（這是定理）的證成，順手安到「這些＝直覺可計算的全部」（這是論題）頭上，於是以為「可計算就是圖靈機能算的」是被證明的鐵律。 | 三個形式模型互相等價——是定理。但「它們窮盡了直覺的可計算」——是論題，因為「直覺可計算」沒有形式定義，無法被數學證明，只能被一再印證、沒找到反例。察覺法：問「我這個斷言裡，有沒有一端是非形式的概念？」只要有，那就是論題不是定理。 |\n| **「半可判定＝大概可以判定／判定得差不多」** | 把「半（semi）」聽成「打了個折的可判定」「九成可判定」，以為只是效率問題。 | 半可判定是**結構性的單邊**：「是」那面保證有限步答得了，「否」那面**可能永遠等不到**——不是慢，是原則上沒有停止信號。停機問題半可判定，意味著你能確認「會停」的程式，但對一個實際永不停機的程式，你的偵測器會跟著它一起永遠跑下去。察覺法：問「『否』那一面有沒有保證會在有限步停？」沒有，就是真正的半可判定，不是效率問題。 |\n\n還有一個更隱蔽、值得獨立點名的：**把「沒有通用判定機」誤讀成「每個個案都解不了」**。完全相反。希爾伯特第十問題沒有通用演算法，但無數個別的丟番圖方程，數學家照樣解得漂漂亮亮；停機問題不可判定，但你寫的絕大多數函式，你一眼就看得出會不會停。「不可判定」否定的是**一台搞定全部的萬用機器**，不是**每一個個案**。把「無萬用解」滑成「全都無解」，是這片版圖最常見的悲觀誤讀——它比實際情況絕望得多。\n\n## 紙上推演\n\n以下純紙筆，不需要任何程式。\n\n### 題目一（★，10 分鐘）：把「可計算」三模型對應到你熟的東西\n\nChurch–Turing 論題說圖靈機、λ-演算、一般遞迴函數框住同一類函數。請把這三個模型各對應到一個你工作中熟悉的東西，並用一句話說明為什麼這個對應抓得住該模型的精神。然後回答：為什麼「它們三個等價」是定理，而「它們＝可計算的全部」只是論題？\n\n### 題目二（★★，15 分鐘）：歸約的方向別搞反\n\n歸約證明的骨架是「能解 B ⇒ 能解 A；A 無解；故 B 無解」。現在有人要證「程式等價問題（判定兩段程式對所有輸入是否同輸出）不可判定」，他說：「我把程式等價問題歸約到停機問題——也就是說，如果我能解停機，我就能解程式等價，所以程式等價不可判定。」\n\n請指出他的論證**方向錯在哪**，並寫出正確方向應該怎麼歸約（不必給細節，只要說清楚「拿哪個已知無解的問題、藏進哪個待證問題」）。\n\n### 題目三（★★，15 分鐘）：哪一層？\n\n把下面五個問題各歸到「可判定 / 半可判定 / 完全不可判定」哪一層，並說明判準（特別是：「否」那一面有沒有保證有限步停）：\n\n（a）命題邏輯（不含量詞）的某個式子是不是恆真（tautology）？\n（b）給定圖靈機 P 與輸入 w，P(w) 會停嗎？\n（c）給定一階邏輯式子 φ，φ 普遍有效嗎？\n（d）給定系統 F 與句子 φ，F ⊢ φ 嗎（φ 在 F 中可證嗎）？\n（e）給定系統 F 與句子 φ，φ 是不是 F 的獨立句（F ⊬ φ 且 F ⊬ ¬φ）？\n\n### 推演解答\n\n**題目一。** 一組合理對應（你的措辭可不同，抓住精神即可）：\n\n```text\n  圖靈機      ≈ 帶無限磁帶的有限狀態機。\n              精神：把「計算」剝到最原始——讀一格、寫一格、移動、換狀態。\n              它對應你心裡「最底層的機器在幹嘛」那個圖像。\n\n  λ-演算      ≈ 純函數（無副作用、一切皆函數、靠套用驅動）。\n              精神：計算＝把函數套到引數上、化簡。你寫 Haskell / 用 map-reduce\n              的那套「資料流過一連串純函數」的味道。\n\n  一般遞迴函數 ≈ 遞迴定義的函式（從基本函數＋遞迴＋最小化堆起來）。\n              精神：計算＝用更小的同類結果定義自己。你寫遞迴的直覺。\n```\n\n為什麼「三者等價」是定理而「三者＝可計算的全部」是論題：因為「三者等價」兩端都是**有精確定義的形式系統**，可以嚴格證明一個能模擬另一個（互相編碼）；而「可計算的全部」裡的「可計算」是個**非形式、靠直覺把握**的概念，沒有數學定義，你無法對一個沒被定義的東西做證明。**常見錯路**：說「論題沒被證明是因為太難」——不是難，是**對象不是形式物件**，原則上不可證，只能被經驗一再印證。\n\n**題目二。** 他的方向**反了**。他說的「把程式等價歸約到停機」（能解停機 ⇒ 能解程式等價）證出來的是「程式等價**不會比停機更難**」——這推不出程式等價無解（停機無解，不代表所有不比它難的問題都無解，命題邏輯就比它容易還可判定）。\n\n正確方向是**反過來**：把**已知無解的停機問題**，歸約**進**待證的程式等價問題——證「能解程式等價 ⇒ 能解停機」。具體說：拿任意停機實例 (P, w)，造兩段程式——程式甲忽略輸入永遠回傳 0；程式乙先模擬 P 跑 w，若 P(w) 停了才回傳 0（否則一直跑）。則「甲乙等價（對所有輸入同輸出）」⟺「P(w) 會停」。於是若有程式等價判定機，拿它判甲乙是否等價，就解了停機——但停機無解，矛盾。故程式等價不可判定。**口訣**：歸約要把**已知無解的**藏進**待證的**，方向是「無解者 ⇒ 待證者」，別搞反。\n\n**題目三。**\n\n- （a）**可判定**。命題邏輯沒有量詞，變數有限，真值表窮舉所有指派、有限行，「是」與「否」都在有限步停。✓\n- （b）**半可判定**。會停的——跑它，停了就確認「是」；永不停的——你跟著跑到天荒地老，「否」那面沒有停止信號。（ch09。）\n- （c）**半可判定**。一階有效性：有效的式子可證（完備性定理），列舉所有證明遲早撞到——「是」那面有限步答得了；無效的式子，你列舉證明永遠列不到它的證明，但也不敢斷言「真的無效」（沒有停止信號）。本章主角。\n- （d）**半可判定**。和 (c) 同構：列舉 F 的所有證明，φ 真可證就遲早列到（「是」答得了）；φ 不可證則永遠等不到（「否」搆不著）。脊椎句 G 就落在「否」那邊。\n- （e）**共半可判定（co-r.e.）**。「否」那一面（＝非獨立，即 F ⊢ φ 或 F ⊢ ¬φ）是兩個 r.e. 集的聯集，仍是 r.e.——列舉 F 的所有證明，只要撞到 φ 或 ¬φ 的某一個，就在有限步確認「非獨立」。因此獨立性問題本身是其補集，屬於 co-r.e.（Π₁），比半可判定深一格、但還不到「兩面都搆不著」。**常見錯路**：誤以為「兩個 co-r.e. 條件的合取更難」——但「(F ⊬ φ) ∧ (F ⊬ ¬φ)」的補集是「(F ⊢ φ) ∨ (F ⊢ ¬φ)」，r.e. 對聯集封閉，所以補集仍 r.e.，獨立性問題仍是 co-r.e.，不會跳到完全不可判定層。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關，優先答得出「為什麼」：\n\n1. 決定問題（Entscheidungsproblem）問的精確是什麼？它對應希爾伯特四柱的哪一根？為什麼說有了它「數學就自動化了」？\n2. 決定問題是被誰、在哪一年、用什麼武器否決的？邱奇與圖靈的工具有什麼不同，這個「兩條獨立的路撞同一終點」為什麼本身就是 Church–Turing 論題的證據？\n3. 為什麼 Church–Turing 是「論題」不是「定理」？哪一部分是定理、哪一部分是論題，分界在哪？（提示：找出斷言裡那個非形式的概念。）\n4. 「半可判定」精確是什麼意思？拿你熟的「測試只能證明 bug 存在、不能證明 bug 不存在」講一遍這個單邊不對稱。\n5. 「不可判定」為什麼**不**等於「無法決定／見仁見智／沒有客觀答案」？一個不可判定的問題，它的每個個案有沒有客觀答案？\n6. 「沒有通用判定機」和「每個個案都解不了」差在哪？為什麼把前者讀成後者是悲觀的誤讀？\n7. 希爾伯特四根柱子各死在哪一章、被誰砍的？為什麼說不完備（可證性的極限）和不可判定（可計算性的極限）是「同一招對角化的兩張臉」？\n8. 脊椎句 G 落在「可判定 / 半可判定 / 完全不可判定」哪一層的哪一邊？這跟「列舉所有證明的機器永遠列不到 G」有什麼關係？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy,「The Church-Turing Thesis」** https://plato.stanford.edu/entries/church-turing/ ——權威且免費。讀它對「論題 vs 定理」分界、以及三個計算模型等價性的釐清那幾段，正是本章最該守準的部分。（2026-06：仍是這主題的標準參考。）\n- **Stanford Encyclopedia of Philosophy,「Alonzo Church」附錄 A（Computability and the Church-Turing Thesis）** https://plato.stanford.edu/entries/church/supplementA.html ——邱奇 1936 否決決定問題、比圖靈早約七個月、兩人獨立的史實出處，本章年份與歸屬以此為準。\n- **Wikipedia,「Entscheidungsproblem」** https://en.wikipedia.org/wiki/Entscheidungsproblem ——快速看決定問題的精確陳述、Hilbert–Ackermann 1928 的提出、以及它如何被 Church 與 Turing 1936 否決的時間線。\n- **Wikipedia,「Rice's theorem」** https://en.wikipedia.org/wiki/Rice%27s_theorem ——「程式的任何非平凡語意性質都不可判定」的正式版。你對「完美靜態分析器不存在」的工程直覺，讀這條會看到它的精確邊界（注意：是**語意**性質不可判定，語法性質照樣判得了）。\n- **Wikipedia,「Post correspondence problem」** https://en.wikipedia.org/wiki/Post_correspondence_problem ——群島裡那座「形狀最簡單、最常當歸約跳板」的島；讀它的骨牌定義與「為何常用來證別的問題不可判定」那段。\n- **Wikipedia,「Hilbert's tenth problem」** https://en.wikipedia.org/wiki/Hilbert%27s_tenth_problem ——MRDP 定理（Matiyasevich 1970）把不可判定性釘進數論腹地；讀它如何說明「連丟番圖方程有沒有整數解都無通用判定法」。\n- **《把系統寫成定理》TLA+（書架既有）** ——若你讀過，它的 model checker 在有限狀態空間裡「保證有限步給答案」正是停在「可判定」那一層；一旦狀態空間無界，你就掉進本章的半可判定地貌。可一句呼應、不依賴。\n"}, {"id": "ch11-no-end-patching-holes", "file": "ch11-no-end-patching-holes.md", "group": "Part IV — 孿生與邊界", "title": "ch11 — 沒有終點：補洞長新洞", "md": "# ch11 — 沒有終點：補洞長新洞\n\n> **本章解決什麼問題**：第一定理（ch07）給了你一句系統 F 證不出的真句子 G。讀到這裡，幾乎每個工程師心裡都會冒出同一個念頭——「那簡單啊，把 G 當成一條新公理加進去不就補好了？」本章就是專門來擊碎這個念頭的。把 G 加進去，你確實得到一個更強的系統 F'，F' 真的證得出原來那句 G 了；但 F' 仍然滿足那三個鐵律條件，於是第一定理對 F' 照樣成立——F' 有它自己的新 G'，一樣真、一樣證不出。補一個洞，長一個新洞，永遠補不完。本章要把 ch07 的「這不是 bug」從「一次性事件」升級成「永恆結構」：不完備不是某個系統運氣不好踩到的一個坑，是這一整類系統的命運。這個現象有個標準名字——**本質不完備（essentially incomplete）**。\n\n## 從你已知的出發\n\n你修過 linter 規則。\n\n某天 code review 抓到一個 bug：某個 async 函式忘了 await，promise 漏在那裡。你心想這種錯不該再發生，於是寫一條 lint 規則去抓「漏掉的 await」。下一週，這條規則開始誤報——它把一些刻意不 await 的 fire-and-forget 也標紅了。你加例外。再下一週，有人用了一種你規則沒覆蓋到的寫法（把 promise 存進變數、過三行才漏掉），規則沒抓到，bug 又上線了。你再補。\n\n你早就認清一件事：**linter 規則不是寫一條就一勞永逸的東西，它是一場永遠打不完的補丁戰爭。** 每補一個漏網的偽陰性，就可能多冒一個誤報的偽陽性；每堵死一種寫法，使用者就發明一種新寫法繞過去。你規則庫越長，沒覆蓋到的角落還是有。這不是因為你規則寫得爛，是因為「合法程式的全部寫法」這個目標本身就比你任何一條有限規則大。\n\n打地鼠（whack-a-mole）。你按下一隻，另一隻從別的洞冒出來。\n\n本章要告訴你的是：**哥德爾不完備也是這個結構，而且它比打地鼠更狠——它能證明你永遠按不完。** 你以為「把 G 加進去」是按下了那隻地鼠，但這一按，數學上保證會冒出一隻新的。不是「目前還有漏」「我們再努力補」，是「補這個動作本身，邏輯上必然生出下一個漏」。你補丁戰爭的工程直覺，在這裡被升格成一條定理。\n\n先把你手上的零件擺出來，等下一個個對上去：\n\n- **加一條規則 ＝ 換一個更強的系統。** 你給 linter 加規則，得到的是一個能力更強（能抓更多東西）的 linter。把 G 加成新公理，得到的也是一個能力更強（能證更多句子）的形式系統 F'。\n- **更強的系統還是同一類系統。** 你那個加了規則的 linter，本質上還是一個「按規則機械判定」的工具——它沒變成別的物種。F' 也一樣：加了 G 當公理，它仍是一個一致、可機械列舉公理、夠強表達算術的形式系統。**它沒逃出第一定理管轄的那一類。**\n- **同一類系統，同一個命運。** 既然 F' 還在第一定理管轄範圍內，第一定理對它照樣成立——F' 有它自己的 G'。\n\n把這三件握緊。接下來只是把它們組裝起來。\n\n## 天真的修法：把 G 加進去\n\n先把這個念頭認真對待，因為它其實很合理。\n\n第一定理說：F 一致時，G 在標準模型 ℕ 中為真，但 F ⊬ G（F 證不出 G）。好，既然 G 是真的、又證不出來，那我們手動把它請進公理庫——宣布「G 從現在起是一條公理」。新系統叫它 F'：\n\n```text\nF'  =  F  ∪  { G }      ← 把脊椎句 G 直接當成一條新公理塞進 F\n\n           原本                 加 G 之後\n  ┌──────────────────┐   ┌──────────────────────┐\n  │  公理：A₁,A₂,…   │   │  公理：A₁,A₂,…, G    │  ← 多了一條\n  │  推理規則：不變  │   │  推理規則：不變      │\n  │  結論：F ⊬ G     │   │  結論：F' ⊢ G  ✔     │  ← 現在證得出 G 了\n  └──────────────────┘   └──────────────────────┘\n```\n\n這一步**完全有效**，別小看它。在 F' 裡，G 現在是公理，而公理是「不證自明、直接拿來用」的句子——所以 F' ⊢ G 成立，一行就證完（公理本身就是它自己的證明）。你原本那個煩人的洞，真的被補上了：那句 ch07 害你睡不著的 G，在 F' 裡堂堂正正可證了。\n\n而且 F' 還是一致的。為什麼？因為 G 在 ℕ 中本來就是真的（第一定理保證），你把一條 ℕ-真句加進一個 ℕ-成立的系統，不會憑空生出矛盾——標準模型 ℕ 仍然同時滿足 F 的所有公理**和** G，所以 F' 有模型，有模型就一致（一個會自相矛盾的系統不可能有模型同時讓矛盾兩邊都成立）。\n\n到這裡，樂觀的你會說：成了啊。洞補好了，系統還一致，皆大歡喜。\n\n慢著。問自己一個問題：**F' 是什麼?**\n\n## 為什麼補不好：F' 還在管轄區內\n\nF' 是一個形式系統。而且不是隨便一個——它恰好還是第一定理點名要管的那一類。逐條核對三個鐵律條件（ch07 反覆強調、ch02/07/08/13/14/16 都守的那三條）：\n\n```text\n三條件對 F' 的檢查 ：F 滿足，加一條 G 還滿足嗎？\n\n  ① 一致（consistent）\n     F 一致，且 G 在 ℕ 中真 ⇒ ℕ 同時滿足 F 與 G ⇒ F' 有模型 ⇒ F' 一致     ✔\n     （把一條真句加進一致系統，不會生出矛盾）\n\n  ② 可遞迴公理化（公理集合可機械列舉）\n     F 的公理本來就可機械列舉；現在只是「列舉 F 的公理，最後再多吐一條 G」。\n     多列一條固定的句子，當然還是可機械列舉的。                            ✔\n     （給列舉程式尾巴接一行「再印出 G」——它照樣會停、照樣可機械跑）\n\n  ③ 夠強表達基本算術（含 Robinson Q，能定義 + 與 ×）\n     F 本來就夠強（不然第一定理一開始就套不上 F）。F' 比 F 公理更多、能證的更多，\n     表達力只會增不會減 ⇒ F' 照樣夠強。                                   ✔\n```\n\n三條件，F' 一條不缺。\n\n那麼——**第一定理對 F' 照樣成立。** 這不需要任何新定理、不需要重新發明什麼，它就是把 ch07 那條已經證好的定理，原封不動地再套用在 F' 這個新對象上。第一定理不在乎你的系統叫什麼名字、公理裡有沒有那條叫 G 的句子；它只認三條件。三條件齊，它就保證：\n\n> 存在一句 **G'**，使得 **F' ⊬ G'**（F' 證不出 G'），而 G' 在 ℕ 中為真。\n\n你補掉了 G 這個洞，F' 卻長出了 G' 這個新洞。\n\n這裡值得停下來想清楚一件容易滑掉的事：**G' 不是 G。** G 在 F' 裡已經可證了（它是公理）。G' 是一句**全新**的句子——它是對角化引理（ch06）餵給「F' 的可證性謂詞 Prov_F'」重新跑一遍，生出來的新不動點。換句話說，G 說的是「我在 F 裡不可證」，G' 說的是「我在 **F'** 裡不可證」。系統換了，那把用來指涉「自己」的鏡子也跟著換了，於是照出來的是一句新的自我指涉句。\n\n```text\n脊椎句的繁衍 ：每換一個系統，對角化就生一句新的「我在這個系統不可證」\n\n  系統 F   的鏡子（Prov_F）  → 照出  G  ：「G  在 F  內不可證」      F  ⊬ G\n                把 G  加進去\n  系統 F'  的鏡子（Prov_F'） → 照出  G' ：「G' 在 F' 內不可證」      F' ⊬ G'\n                把 G' 加進去\n  系統 F'' 的鏡子（Prov_F'')→ 照出  G'' ：「G'' 在 F'' 內不可證」    F'' ⊬ G''\n                ……無限下去\n```\n\n每加一條公理，可證性謂詞就換一個（因為「可證」的定義跟著公理庫變），對角化就對著這面新鏡子造出一句新的 G。你補洞用的磚（加 G 當公理）本身，就是長出下一個洞的種子。\n\n## 系統塔：無限往上，每層一個新洞\n\n把這個過程一層層疊起來，你會看到一座永遠蓋不到頂的塔。\n\n```text\n系統塔 ：補洞長新洞，每一層都有自己證不出的真句\n\n  ↑ 越上面：公理越多、能證的越多、卻永遠差一句\n\n  ┌─────────────────────────────────────────────┐\n  │  F''' = F'' ∪ {G''}   仍一致/可列舉/夠強    │  → 新洞 G'''  證不出\n  ├─────────────────────────────────────────────┤\n  │  F''  = F'  ∪ {G'}    仍一致/可列舉/夠強    │  → 新洞 G''   證不出\n  ├─────────────────────────────────────────────┤\n  │  F'   = F   ∪ {G}     仍一致/可列舉/夠強    │  → 新洞 G'    證不出\n  ├─────────────────────────────────────────────┤\n  │  F                    一致/可列舉/夠強      │  → 洞   G     證不出\n  └─────────────────────────────────────────────┘\n       每往上補一層 G，三條件全保住 ⇒ 第一定理照樣咬住這一層 ⇒ 又冒一個 G\n```\n\n每一層 Fₙ 都比下一層多一條公理、證得出更多句子；但每一層都精確地差一句——它自己那層的 Gₙ。你往上爬，地平線跟著往上退，永遠到不了「終於完備」的那一層。\n\n「那我一次加無限多條呢？」聰明的工程師會問。「把每一層的 G、G'、G''……全部一口氣加進去，補成一個 F^∞，這下總該完備了吧？」\n\n這就是這座塔最精緻的陷阱，值得慢慢說。你確實可以取無窮多層的聯集，定義一個系統 F^∞ ＝「F 加上 G、G'、G''…… 每一層的 G 全加」。問題出在第二個條件：**F^∞ 還可遞迴公理化嗎？公理集合還能被機械列舉嗎？**\n\n答案是——**要看你怎麼描述這個無窮集合。** 如果你能寫一個程式，機械地、有效地把 F^∞ 的所有公理一條條印出來（包含那無窮多個 Gₙ），那 F^∞ 仍滿足條件 ②，於是第一定理照樣咬它，它**仍然不完備**，仍有一個躲在更上面的新洞。你以為一口氣補完了無窮層，結果第一定理只是站在你那座無窮塔的更上一層，又遞給你一句新的 G。\n\n唯一能讓 F^∞ 逃掉的方法，是讓它的公理集合**沒辦法**被機械列舉——也就是親手破壞條件 ②。但那樣的「系統」就不再是希爾伯特想要的那種東西了：你無法機械檢查一個宣稱的證明合不合法（因為你連「這是不是一條公理」都機械判不出來），它退化成不是一個可有效操作的形式系統。**你不是補好了洞，你是把「能機械檢查證明」這個形式系統的命根子給扔了。** 這正是 ch13 要展開的另一面：逃得掉的代價，是破壞三條件之一。\n\n> 我認為這是整章最反直覺的一頁：你以為「無限地補」總能在極限處補完，但補的動作只要還是「機械可列舉地加公理」，第一定理就永遠站在你的上一層。要跳出這座塔，你得放棄「機械可列舉」本身——而那等於放棄這場遊戲。\n\n歷史上真有人認真往這個方向爬過。圖靈（Alan Turing）1936 年停機那篇成名之後，1938 年在普林斯頓跟著邱奇（Alonzo Church）寫的博士論文《基於序數的邏輯系統（Systems of Logic Based on Ordinals）》（1939 年刊出，2026-06 查證），做的正是這件事：沿著序數（ordinal）一層層、甚至跨進超限（transfinite）地疊加「該被接受卻證不出來」的句子（典型就是把一致性陳述一層層加上去），看能不能在極限處逼出完備。結果既漂亮又苦澀——這套「序數邏輯」確實能補進某些真句，但要付出代價：你得先有一套「序數的編號系統」來標記爬到第幾層，而**怎麼編這個號本身就不可機械有效地確定**，逃出來的完備性被偷偷塞回了「選哪套編號」這個無法機械化的選擇裡（2026-06 查證；技術細節超出本書範圍，指向延伸閱讀）。換句話說，連圖靈這種等級的人正面強攻無限補洞，洞還是從另一個地方冒出來。這事本身就是「沒有終點」最好的註腳。\n\n## 本質不完備：不是 bug，是命運\n\n現在可以給這個現象正名了。\n\nch07 已經反覆敲過一個釘子：G 證不出來**不是 F 有 bug**，不是 F 這個系統設計爛了、換個好一點的系統就沒事。本章把這句話推到它的盡頭——它不只「不是這個 F 的 bug」，它是**這一整類系統**（一致、可機械列舉、夠強表達算術）共同的、逃不掉的性質。標準術語叫**本質不完備（essentially incomplete）**：\n\n> 一個系統 F 是**本質不完備**的，意思是：F 不完備，而且**任何**用機械可列舉的方式把公理加進 F 得到的一致擴張，仍然不完備。\n\n對照一下「非本質」的不完備，差別就清楚了。想像一個玩具系統，它不完備只是因為「漏寫了一條本該有的公理」——你把那條公理補回去，它就完備了，洞補一次就沒了。那種不完備是 bug，是偶然，是可修的。\n\nPA（皮亞諾算術）、ZFC（集合論）這種夠強的系統，**不是這種**。它們的不完備是本質的：你補多少次都補不完，因為補的動作本身（只要還守著三條件）必然生出下一個洞。這不是「碰巧某個系統有個漏洞」，是「凡是強到能談論自己、又一致、又規則寫得出來的系統，命中註定如此」。\n\n把這件事跟你的打地鼠經驗對齊，你會更有感，但也要看清差別：\n\n```text\n打地鼠（你的 linter）         vs      本質不完備（哥德爾）\n\n  你補漏網的偽陰性                      你補證不出的真句 G\n       ↓                                     ↓\n  可能多冒一個偽陽性                    必然冒一個新的真句 G'\n       ↓                                     ↓\n  「實務上」補不完                      「邏輯上」證明你補不完\n  （也許有限步真能覆蓋完，              （數學保證：只要守三條件，\n   只是你沒耐心 / 沒想到）               下一個洞一定存在，沒有例外）\n```\n\n你的 linter 補不完，多半是工程現實——人手不夠、寫法太多、你沒想周全。理論上某天也許真能覆蓋完所有寫法。哥德爾的補不完是**另一個層級**的：它不是「實務上很難」，是「有一條定理保證你永遠差一句」。地鼠不是因為你手慢才按不完，是因為「再按一下」這個動作會親手把下一隻地鼠造出來。\n\n這才是「真理溢出證明」（全書中央張力）最尖銳的版本。在 ch07，真理溢出證明是「有一句真句 G 漏在證明之外」。在本章，它變成：**你拿任何機械手段去堵那道縫，縫只會換個地方重新裂開。** 可證的東西，是被一條條公理機械生成的、可列舉的一串；而 ℕ 裡為真的算術句子，是一個機械列舉永遠追不上的大集合。你每加一條公理，可證集合往前爬一格，但真句集合永遠在更前面等著——這不是賽跑誰快，是「可列舉」這種東西**結構上**就裝不下「在 ℕ 中為真」這種東西。塔斯基不可定義性（ch03/ch12 會深談）從另一個角度說的是同一件事：「可證」系統內可表達、「真」系統內不可定義，所以你永遠沒法用「可證」這套機械的東西把「真」整個圈住。\n\n順帶一提，本質不完備有一個讓人意外的後果，留個伏筆給 ch14：既然連「我有限地加幾條公理」都補不完，那種「再多研究研究、總有一天數學家會把所有真命題都證出來」的樂觀，從根上就被否決了。這不是「我們還不夠努力」，是「努力的方向（在一個固定的機械系統內窮盡真理）本身搆不到目標」。希爾伯特那個「我們必將知道（Wir müssen wissen, wir werden wissen）」的夢（ch02），死的不是某一次嘗試，是**整個嘗試類別**。\n\n至於那些「補上去的洞」裡，有沒有哪一個是真正在做數學的人會在乎的真命題、而不只是哥德爾人工造出來的那句拗口的「我不可證」？有的。1977 年，巴黎（Jeff Paris）與哈靈頓（Leo Harrington）找到了第一個**自然的**數學命題——一個加強版的有限拉姆齊定理（Ramsey theorem）——它在 ℕ 中為真、卻獨立於 PA（PA 證不出來，2026-06 查證）。它證不出來的原因很哥德爾：在 PA 裡，這個命題能推出 PA 自己的一致性 Con(PA)，而第二定理（ch08）說 PA 證不出 Con(PA)，所以 PA 也證不出這個命題。這說明系統塔每層的那個「洞」不全是人工玩具——洞裡偶爾埋著貨真價實、數學家會研究的真理。細節超出本章，指向延伸閱讀。\n\n## 直覺的陷阱\n\n本章專治一個極其常見、極其頑固的誤解。\n\n**陷阱：「把哥德爾句加進去當公理，就把系統補完備了。」**\n\n這是讀完第一定理的工程師十之八九會冒出的第一個反應，而且它的前半截**是對的**——這正是它危險的地方。錯誤不在「加 G 補不了 G 這個洞」（加了真的補得了），錯誤在**默默假設「補一個洞 ＝ 補完所有洞」**，沒看見補洞的動作會生出新洞。錯誤直覺會在這一步把你帶溝裡：\n\n```text\n正確的一步                          被偷渡的一步（錯在這）\n\n  F'  = F ∪ {G}                      ✔ 對：F' 確實證得出 G\n  F' ⊢ G                             ✔ 對：G 在 F' 裡是公理\n  ───────────────────────────────────────────────────────\n  ∴ F' 完備了                        ✘ 錯：F' 換了鏡子，\n                                        對角化生出新的 G'，F' ⊬ G'\n```\n\n你看，前兩步無懈可擊，第三步是個悄悄的跳躍——它假設「F 唯一的洞就是 G」，但第一定理從來沒這樣說。第一定理說的是「**任何**滿足三條件的系統都有**一個**這種洞」，它對 F' 同樣有效，於是 F' 那個洞只是換了位置、換了名字（G'），沒消失。\n\n怎麼自我察覺？問自己一句話：**「我加 G 之後得到的 F'，還滿足那三個條件嗎？」** 只要你誠實核對，答案就是「滿足」（一致、還能機械列舉公理、還夠強），而只要三條件滿足，第一定理就一定再咬一口。這個自我提問是本章的解毒劑：**每次你想用『加公理』補完備，先檢查補完之後的系統有沒有逃出三條件。逃不出，就還沒補完。**\n\n順手清掉兩個鄰近的小陷阱：\n\n| 誤解 | 為什麼錯 | 正確版 |\n|---|---|---|\n| 「不完備是某個爛系統的毛病，換個好系統就沒了」 | 把本質不完備當成偶然 bug | 任何夠強又一致又可列舉的系統都本質不完備，沒有「好一點的系統」能逃（除非破壞三條件，見 ch13） |\n| 「無限地加公理，極限處總能補完」 | 沒看到「可機械列舉」會在無限聯集處被破壞 | 只要 F^∞ 仍可機械列舉公理，第一定理照樣咬它；要逃就得放棄可列舉，那就不是形式系統了 |\n| 「補不完 ＝ 跟我 linter 補不完一樣，只是工程上很難」 | 把『邏輯必然』降級成『實務困難』 | 哥德爾的補不完是定理保證的必然，不是手不夠快；補的動作必然造出下一個洞 |\n\n## 紙上推演\n\n### 推演題一：反駁「加 G 就完備了」（★★，[15 分鐘]）\n\n你的同事讀完第一定理，得意地說：「哥德爾的洞我會補——把那句 G 當公理加進去，F' 就完備了，不完備定理就被我繞過去了。」請你用一段話（不超過六句）說清楚他錯在哪，並指出他的推論在第幾步出問題。\n\n**要求**：(a) 承認他哪一步是對的；(b) 指出他偷渡了什麼假設；(c) 講出 F' 為什麼仍不完備，過程中要點到「三條件」。\n\n### 推演解答\n\n**對的部分**：他說「F' ＝ F ∪ {G} 證得出 G」這一步完全正確——G 在 F' 裡是公理，一行可證，原來那個洞真的補上了。別否認這一步，否認它你就沒抓到重點。\n\n**偷渡的假設**：他默默假設「F 的洞只有 G 這一個，補掉 G ＝ 補完所有洞」。第一定理從沒這樣保證；它保證的是「**任何**滿足三條件的系統**都有**這種洞」，不是「F 恰好只有一個」。\n\n**為什麼 F' 仍不完備**：核對三條件——F' 還一致（G 在 ℕ 真，加進去不生矛盾，ℕ 仍是它的模型）、還可遞迴公理化（列舉 F 的公理後面多吐一條 G，照樣機械可列舉）、還夠強（公理只增不減，表達力不會掉）。三條件齊，第一定理原封不動套到 F' 上，生出一句**新的** G'：「G' 在 F' 內不可證」，且 F' ⊬ G'。他補掉 G，F' 長出 G'。\n\n**常見錯路**：① 否認「F' ⊢ G」，說加公理沒用——錯，加了真的證得出 G，問題不在這。② 以為 G' 就是 G——錯，G' 是對角化對著 F' 的新可證性謂詞 Prov_F' 重跑一遍造出的**新**句子，它指涉的是 F'、不是 F。③ 說「那 F' 不一致了」——錯，F' 一致得很，正因為它一致，第一定理才咬得住它（不一致的系統反而「完備」，因為爆炸原理讓它什麼都證得出，但那是另一種病，見 ch01/ch08）。\n\n### 推演題二：「本質」差在哪（★★，[15 分鐘]）\n\n請說清楚「本質不完備（essentially incomplete）」和「碰巧有個漏洞的不完備」差在哪。舉一個（可以是你編的玩具）「非本質」不完備系統，再說 PA 為什麼是本質的。\n\n### 推演解答\n\n**核心差別**：非本質不完備＝「漏寫了公理，補回去就完備」，洞補一次就沒了；本質不完備＝「補多少次都補不完，補的動作本身（守三條件下）必然生新洞」。\n\n**非本質的玩具例**：設計一個只談「等於」的迷你系統，公理寫了「0 = 0」「1 = 1」卻漏了「2 = 2」，於是它證不出「2 = 2」——它不完備。但這個洞是偶然的：把「2 = 2」補成公理，再補齊所有「n = n」，它對「等式」就完備了，洞補完就沒了。它不完備只是因為公理沒寫全，不是因為結構上逃不掉。（這種弱系統根本不夠強表達算術，第一定理一開始就管不到它——這也是它能被補完的原因。）\n\n**PA 為什麼是本質的**：PA 同時滿足三條件（一致、可遞迴公理化、夠強含乘法能自我編碼）。任何你用機械可列舉方式擴張 PA 得到的一致系統 PA'，仍滿足三條件 ⇒ 第一定理咬 PA' ⇒ PA' 有新的 G'。你補不完。差別的根源：PA 夠強到能在內部談論「自己的可證性」，於是對角化能對著任何這類擴張造出新的「我不可證」；玩具等式系統弱到談不了自己，所以補得完。\n\n**常見錯路**：把「非本質」例子舉成一個**夠強**的系統（如 PA 少一條歸納公理）——危險，因為夠強的系統幾乎都還是本質不完備的，舉不出乾淨的反例。要舉非本質例，務必舉一個**弱到第一定理管不到**的玩具系統。\n\n### 推演題三：無限補洞的破綻（★★★，[25 分鐘]）\n\n你的同事升級了戰術：「一次補一個是補不完，那我一口氣把每層的 G、G'、G''…… 全部加進去，取個無窮聯集 F^∞，這下總完備了吧？」請指出他這次的破綻在哪個條件上，並說清楚「想逃就得放棄什麼」。\n\n### 推演解答\n\n**破綻在條件 ②（可遞迴公理化／公理可機械列舉）**，不在 ① 或 ③。\n\n**分兩種情況講清楚**：\n\n情況 A——如果 F^∞ 的那無窮多條公理 {G, G', G'', …} **仍能被一個程式機械地、有效地一條條印出來**（譬如有個清楚的規則生成第 n 層的 Gₙ），那 F^∞ 仍滿足條件 ②，也仍一致（每個 Gₙ 在 ℕ 真）、仍夠強。三條件齊 ⇒ 第一定理照樣咬 F^∞ ⇒ 它有一個躲在整座無窮塔**更上面**的新洞。你以為補完了，第一定理只是站到你無窮塔的上一層，又遞一句新 G 給你。**沒逃掉。**\n\n情況 B——你硬要讓 F^∞ 完備，唯一的路是讓它的公理集合**沒辦法**被機械有效列舉（這樣就沒有「F^∞ 的可證性謂詞」可供對角化下手，第一定理的前提就崩了）。但代價是：你連「某句話是不是 F^∞ 的公理／某串符號是不是合法證明」都不再能機械判定了。**這就破壞了形式系統的命根子——可機械檢查證明（ch01）。** 它不再是希爾伯特要的那種「機械符號遊戲」，退化成一個你無法有效操作的東西。\n\n**所以「想逃就得放棄什麼」**：放棄「可機械列舉公理」。但放棄它＝放棄這整場遊戲（一個證明都不能機械驗證的系統，希爾伯特的夢一開始就不要它）。這正是 ch13 的主題：逃得掉的系統，都是靠破壞三條件之一逃的；而破壞「可列舉」這條，等於退出形式系統的定義。\n\n**常見錯路**：① 以為破綻在「一致性」（怕加無窮多條會矛盾）——不對，每個 Gₙ 都是 ℕ-真句，ℕ 同時滿足它們全部，F^∞ 一致。② 以為「無窮聯集」自動就不可列舉——不對，無窮集合照樣可以可機械列舉（自然數本身就是個無窮但可列舉的集合）；可不可列舉取決於你**怎麼描述生成規則**，不是「無窮」就自動逃。③ 把圖靈序數邏輯誤記成「成功補完了」——它沒有；它把不可機械化的部分塞進了「序數編號怎麼選」裡，洞換了個地方冒出來。\n\n## 自我檢核\n\n口頭自答，講得出來才算過關：\n\n1. 為什麼「把 G 當公理加進去」這一步是**有效**的（F' 真的證得出 G），但仍然補不完所有洞？「補不完」的根在哪？\n2. G' 和 G 是不是同一句話？為什麼換系統會換出新的 G？（提示：可證性謂詞跟著公理庫變，對角化照的鏡子也變。）\n3. 把 G 加進 F 得到 F'，逐條說 F' 為什麼仍滿足那三個條件。哪一條最容易被以為破壞了，其實沒有？\n4. 「本質不完備」和「碰巧漏寫一條公理的不完備」差在哪？為什麼弱到談不了自己的系統反而補得完？\n5. 為什麼「一口氣加無窮多條公理取聯集」也逃不掉？要真的逃，得親手破壞哪個條件、代價是什麼？\n6. 把本章和你修 linter 規則的打地鼠經驗對齊：哪裡真的像、哪裡**本質不同**（「實務上補不完」vs「邏輯保證補不完」）？\n7. 本章怎麼把 ch07 的「不是 bug」從一次性事件升級成永恆結構？這跟「真理溢出證明」這句全書中央張力是什麼關係？\n\n## 延伸閱讀\n\n- **Stanford Encyclopedia of Philosophy, \"Gödel's Incompleteness Theorems\"**（https://plato.stanford.edu/entries/goedel-incompleteness/）——讀其中談「本質不完備（essential incompleteness）」與「加公理仍不完備」的段落，本章的標準權威出處。\n- **Torkel Franzén, *Gödel's Theorem: An Incomplete Guide to Its Use and Abuse*（2005）**——讀它澄清「加公理補不完」與「這不代表數學會永遠進步不完／永遠有未知」之間的精確界線，正好接 ch14 的濫用解剖。\n- **Alan Turing, \"Systems of Logic Based on Ordinals\"（1939，博士論文）**（https://en.wikipedia.org/wiki/Systems_of_Logic_Based_on_Ordinals）——想看「正面強攻無限補洞」長什麼樣、為什麼連圖靈都讓洞從序數編號裡冒回來，讀這篇的概念介紹（技術細節極硬，看概覽即可）。\n- **Paris–Harrington theorem**（https://en.wikipedia.org/wiki/Paris%E2%80%93Harrington_theorem）——想知道「系統塔的洞裡有沒有真正的數學」，讀這個 1977 年第一個自然的 PA-獨立命題，它證不出來的理由（推出 Con(PA)）很哥德爾。\n- 編碼與對角化的機制細節，回看本書 ch05（哥德爾編碼）與 ch06（對角化引理）；「逃得掉的系統靠破壞三條件」的正面展開在 ch13。\n"}, {"id": "ch12-where-G-is-true", "file": "ch12-where-G-is-true.md", "group": "Part IV — 孿生與邊界", "title": "ch12 — G 到底真在哪：標準模型與「真」的精確意義", "md": "# ch12 — G 到底真在哪：標準模型與「真」的精確意義\n\n> **本章解決什麼問題**：脊椎句 G 在 ch07 引爆時，我們說了一句很重的話——「G 真，但 F 證不出」。這章專門把那個「真」字釘死。它到底是什麼意思的真？憑什麼我們站在 F 外面敢說「G 真」？這個真會不會其實是「對錯不明、玄學上的真」？本章把「G 真」精確限定成「在標準模型 ℕ 中成立」，回答我們憑什麼這麼斷言，並順手拆掉全書最危險的一個誤讀——「哥德爾證明了有些命題對錯無法知道」。G 的對錯我們清清楚楚知道；只是 F 證不到。這是真≠可證這條主線最容易在最後一哩滑掉的地方，值得獨立一章守住。\n\n## 從你已知的出發\n\n你寫過一份介面規格，然後讓三個團隊各自去實作它。\n\n`interface Counter { next(): number }`——規格只說「`next()` 回傳一個 number」。團隊 A 的實作老老實實 0、1、2、3 往上數。團隊 B 的實作每次回傳同一個亂數。團隊 C 的實作前一百次正常數，第一百零一次開始回傳負數。三份實作**全都通過了這份規格的型別檢查**——因為規格根本沒夾死「要遞增」「要從 0 開始」「不能重複」這些你心裡其實預設了的性質。\n\n你心裡那個「正確的 Counter」是團隊 A。但規格這份文件本身，分不出 A、B、C——它框得太鬆，框進了一堆你沒打算要的實作。\n\n現在把這件事整個搬進算術。\n\n- **規格（spec）** ＝ F 的公理（比方說皮亞諾算術 PA 的那幾條）。\n- **實作（model）** ＝ 滿足這些公理的數學結構。\n- **你心裡那個「正確的實作」** ＝ 標準模型 ℕ：老老實實的 0、1、2、3、…，加法乘法都照常識。\n\nch03 已經給過你這個對應，也告訴過你一個讓人不安的事實：**這份算術 spec 也框不死它心裡的標準實作**。存在「非標準實作」——非標準模型（non-standard model）——它把 PA 的每一條公理都滿足了，卻多塞了一堆「比 0、1、2、3、… 全都大」的怪數進去。團隊 C 的那種「前面正常、後面走鐘」的味道，在算術裡是真的有對應物的。\n\n本章要做的事，就是把這個 spec/實作的類比用到極致，回答一個 ch07 欠你的問題：當我們說「G 真」，我們是在說 G 在**哪一份實作**上成立？答案是團隊 A——標準模型 ℕ。不是「在所有實作上」（那是另一回事，而且不對），也不是「在某種玄學意義上」（那是濫用）。把這個「哪一份實作」釘清楚，你才真的拿到了真≠可證這條縫的最後一塊拼圖。\n\n## 「G 真」的那個「真」，是哪一個真\n\n先回到記號。全書嚴格區分兩條線（ch03 立的）：\n\n```text\nF ⊢ G       G 在 F 裡可證（語法，系統內走得到一串合規則的推導）\nℕ ⊨ G       G 在標準模型 ℕ 中為真（語意，照標準意思解釋後事實上成立）\n```\n\n第一不完備定理的結論，逐字寫出來是這樣：\n\n```text\n若 F 一致（且可遞迴公理化、夠強表達基本算術），則：\n        F ⊬ G        ← G 在 F 裡證不出來（語法事實）\n   而同時：\n        ℕ ⊨ G        ← G 在標準模型 ℕ 中為真（語意事實）\n```\n\n注意這兩行**分屬兩條不同的線**。第一行是關於「證明這個語法物件走不走得到」，第二行是關於「自然數這個結構實際長怎樣」。它們碰巧在 G 這個句子上分了家——一個說「不」，一個說「真」。這個分家不是矛盾，是兩條線本來就獨立（ch03 那根「健全只綁一個方向」的繩子），只是直到 G 出場，你才第一次看到它們在一個**具體、寫得出來**的句子上明確錯開。\n\n所以「G 真」這句話，**永遠**要補上「在標準模型 ℕ 的意義下」。少了這個限定詞，這句話就開始滑——滑向「在所有意義下真」（錯）、「玄學上真」（濫用）、「真值不明」（更糟的濫用，下面拆）。本書的記號鐵律之一就是：**寫「G 真」必補「在 ℕ」**。這不是學究，是因為差這一個限定詞，整句話就從一個精確的數學陳述，變成一句可以被任何人拿去亂引的口號。\n\n## 憑什麼我們敢說 G 真——一個站在 F 外面的論證\n\n這是本章的核心，也是最容易被講糊的一段。F 自己證不出 G，那我們——F 外面的人——憑什麼斷言「G 真」？這不是耍嘴皮、不是信仰，是一個**站在 F 之外、用我們對 ℕ 的理解**走得通的論證。慢慢走一遍。\n\n回憶 G 在說什麼（脊椎句）：\n\n```text\n脊椎句 G ：「G 在本系統 F 內無法被證明。」\n（形式版：F ⊢ G ↔ ¬Prov_F(⌜G⌝)，由對角化引理對 ¬Prov_F 取不動點而得，見 ch06）\n```\n\nG 透過編碼，斷言的是一個**關於自然數的事實**——「不存在一個自然數 y，使得 y 是『G 的證明』的編碼」（ch05 把「y 是某句的證明」變成了一個純算術性質）。換句話說，G 在 ℕ 裡真不真，等價於問：**那個自然數 y 到底存不存在？**\n\n現在用 ch07 已經建立的東西來判這件事：\n\n```text\n論證：G 在 ℕ 中為真（前提：F 一致，故 G 在 F 中不可證）\n───────────────────────────────────────────────────────────────\n步驟 1   ch07 已證：若 F 一致，則 F ⊬ G。\n                 ← 即：F 裡沒有任何一串推導以 G 結尾。\n\n步驟 2   「F ⊬ G」翻成算術語言（透過編碼）就是：\n                 不存在自然數 y，使 y 編碼了一個「以 G 結尾的合法 F-證明」。\n                 ← 因為「合法 F-證明」是個可機械檢查的算術性質，\n                    若真有這樣的 y 存在，那 G 就可證了，與步驟 1 矛盾。\n\n步驟 3   但 G 這句話（解碼後）斷言的正好就是：\n                 「不存在這樣的自然數 y。」\n\n步驟 4   步驟 2 說「這樣的 y 確實不存在」（是個關於 ℕ 的事實），\n         步驟 3 說「G 斷言的就是這件事」。\n                 ⇒ G 在 ℕ 中為真。∎（直覺版；嚴格細節指向延伸閱讀）\n```\n\n看清楚這個論證的關鍵：**它用到的「F 一致」「F ⊬ G」這些前提，我們是站在 F 外面確認的。** 我們不是在 F 裡面跑這個論證（F 跑不了，跑得了 G 就可證了，整件事就崩了）。我們是用**我們對 ℕ 的理解、我們對「F 一致」的外部判斷**，看出「那個 y 不存在」這個算術事實，而 G 恰好就在報告這個事實。G 是個誠實的記者，它報導了一條關於自然數的真消息——「我證不出來」——而這條消息，從 F 外面看，千真萬確。\n\n我認為這是整章最該停下來的地方。**G 為真，不是因為它神秘，恰恰是因為它平凡**——它只是正確地說了一句關於自然數的大實話（某個數不存在），而這句大實話 F 偏偏夠不到。真理溢出證明，溢出的不是什麼玄之又玄的東西，就是這麼一句你我站在外面看得清清楚楚的算術事實。\n\n### 一個必須誠實標示的前提：F 的健全性\n\n上面那個論證有一個藏起來的前提，工程師的嚴謹要求把它挖出來：我用了「若 F 證得出 G 則 G 真」這類推理時，背後假設了 **F 是健全的（sound）——或至少對這類句子健全**。如果 F 是個能證出假算術句的爛系統（不健全），那它的「Gödel 句」就未必在 ℕ 中真——一個不健全的系統，可以有「真的 G」也可以有「假的 G」（這是學界對「G 為什麼真」的一個精細討論，2026-06 仍是標準理解）。\n\n所以更誠實的陳述是：**對一個健全的（或至少 Σ₁-健全的）、一致的、夠強的 F，它的 G 在 ℕ 中為真。** 本書談的 PA、ZFC 這些系統我們都相信是健全的（它們的公理在 ℕ 中都真、規則保真），所以「G 真」對它們成立。但「健全」這個前提不是免費的，它本身是個我們在 F 之外、基於對 ℕ 的理解所下的判斷——這正呼應 ch03 那句：健全是個額外假設。把這個前提標出來，不是要削弱「G 真」，是要讓你知道這個「真」站在什麼地基上：它站在「我們從外面看得懂 ℕ、也判斷得出 F 沒在亂證」這塊地基上。地基塌不塌得掉，是 ch14 處理 Lucas–Penrose 那種濫用時的關鍵——他們正是想在這塊地基上偷蓋一棟「心靈超越機器」的樓。\n\n## 非標準模型：G 為假的那些古怪實作\n\n「G 在 ℕ 中真」這句話，反過來逼出一個讓人頭皮發麻的事實：**既然 F 證不出 G（也證不出 ¬G），那一定存在某個滿足 F 公理、卻讓 G 為假的模型。** 為什麼一定存在？這正是 ch03 提過的完備性定理（1929）的對偶面在說話：\n\n```text\n完備性定理的對偶推論：\n   若 F ⊬ G（F 證不出 G），\n   則「F 的公理 ∧ ¬G」是一致的（沒有矛盾），\n   ⇒ 由完備性定理，它有模型——\n      一個既滿足 F 全部公理、又讓 ¬G 為真（即 G 為假）的結構。\n```\n\n這個讓 G 為假的結構，不可能是 ℕ（因為 G 在 ℕ 裡是真的，我們剛證過）。所以它**必定是個非標準模型**。事實上，「讓 G 為假」可以當成「這是非標準模型」的一個充分標誌（2026-06，標準理解）。\n\n那這種模型長什麼樣？給你一張直覺圖。任何滿足 PA 公理的模型，開頭那一段一定長得跟 ℕ 一模一樣——0、1、2、3、…（這叫初始段，標準部分）。非標準模型的怪，怪在它在這一段**之後**還塞了東西：\n\n```text\n標準模型 ℕ：\n   0   1   2   3   4   5   ……\n   └──────────────────────►   到此為止，每個數都是某個有限的 S(S(…S(0)…))\n\n非標準模型 *ℕ（示意）：\n   0   1   2   3   4   5   ……  │  …… c-2   c-1   c   c+1   c+2 ……\n   └─── 標準部分（跟 ℕ 同構）──┘  └──── 非標準部分（無窮大數）────┘\n                                ↑\n                        c 是個「比 0,1,2,3,… 全部都大」的怪數，\n                        但它照樣滿足 PA 的每一條一階公理（包括歸納法的一階版！）\n```\n\n那個 c——「無窮大自然數」——比每一個你數得到的具體自然數都大，但它在這個模型裡是個如假包換的「自然數」，加減乘除照做，PA 的一階公理一條都不違反。這聽起來像作弊，但它不違反任何一階公理，因為一階歸納法只能「對一個公式 φ，從 φ(0) 和 φ(n)→φ(n+1) 推出 ∀n φ(n)」，它沒辦法寫出「所有元素都是從 0 數有限步到得了的」這種話（那需要量化「步數」這個外部概念）。spec 框不住，怪實作就鑽進來。\n\n**這正是「真 ≠ 可證」的縫在模型層面的樣子。** F 證得出的東西，必須在**它所有的模型**裡都成立——包括上面那個塞了 c 的怪模型。而 G 只在 ℕ 裡真、在怪模型裡假。一個句子若不是在所有模型都真，F 就證不到它（這是健全性的另一面）。所以：\n\n```text\nG 在 ℕ 中真      ←── 我們關心的、心裡認定的標準實作\nG 在 *ℕ 中假     ←── 一個也滿足 F 公理的非標準實作\n─────────────────────────────────────────────\nG 不是「在所有模型都真」  ⇒  F 證不到 G。縫隙就在這裡。\n```\n\n注意這跟「G 對錯不明」**完全是兩回事**——下一節專門拆這個。G 在 ℕ 裡真值是**確定的（真）**；它只是在別的模型裡有別的真值。那不叫「真值不明」，那叫「不同的模型對同一個句子給不同的真值，而我們關心的是 ℕ 這一個」。就像團隊 C 的 Counter 在第 101 次回傳負數，不代表「next() 該回傳什麼這件事對錯不明」——它只代表「規格沒夾死，所以有別的實作會給別的行為，而你心裡要的是團隊 A」。\n\n（非標準模型背後牽涉可數/不可數與無窮的細節，本書點到為止；想深究這些「無窮大數」怎麼來、緊接著還能說什麼，見《馴服無限》談可數與不可數那部分。spec 與多重實作的形式化味道，讀過書架上《把系統寫成定理》的話你會有既視感。）\n\n## 塔斯基的不對稱再訪：為什麼「真」是系統碰不到、卻又確定的東西\n\nch03 給過你塔斯基不可定義性定理（Tarski 1933）：**「算術真理」這個概念，無法在算術系統內部定義。** 沒有任何算術公式 True(x) 能正確表達「編號 x 的句子在 ℕ 中為真
