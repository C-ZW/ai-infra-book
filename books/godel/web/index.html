G 引爆成兩條不完備定理。\n\n**第一不完備定理（Gödel's first incompleteness theorem, 1931）**：設 F 一致、可遞迴公理化、夠強表達基本算術，則存在算術句 G，使 F ⊬ G；再加 ω-一致（或用羅瑟句，只需一致）亦得 F ⊬ ¬G。在標準模型 ℕ 中 G 為真。「真理溢出證明」的精確語句。（ch07）\n\n**ω-一致（ω-consistent）**：比一致更強的性質——不存在公式 φ(x) 使系統同時可證所有 φ(0), φ(1), φ(2), … 卻又可證 ¬∀x φ(x)。哥德爾原始第一定理用 ω-一致；羅瑟 1936 把它減弱為只需一致。（ch07）\n\n**羅瑟句（Rosser's trick / Rosser sentence）**：J. Barkley Rosser 1936 設計的改造版哥德爾句，讓第一定理只需「一致」（不需 ω-一致）即可同時得到 F ⊬ G 且 F ⊬ ¬G。（ch07）\n\n**第二不完備定理（Gödel's second incompleteness theorem, 1931）**：設 F 滿足三條件且一致（且 Prov_F 滿足 HBL 三條件 D1–D3），則 F ⊬ Con(F)，其中 Con(F) ≡ ¬Prov_F(⌜0=1⌝)。一個一致的夠強系統，連「我不會自相矛盾」都無法在自身內部擔保。（ch08）\n\n**一致性陳述（consistency statement）**：Con(F) ≡ ¬Prov_F(⌜0=1⌝)——「F 不證出 0=1（矛盾）」的算術表達；第二定理說 F ⊬ Con(F)。（ch08）\n\n**HBL 三條件（Hilbert–Bernays–Löb derivability conditions）**：讓「第一定理論證」能在 F 內部形式化的三個可導出條件：D1（若 F ⊢ φ 則 F ⊢ Prov(⌜φ⌝)）、D2（F ⊢ Prov(⌜φ⌝) → Prov(⌜Prov(⌜φ⌝)⌝)）、D3（F ⊢ Prov(⌜φ→ψ⌝) ∧ Prov(⌜φ⌝) → Prov(⌜ψ⌝)）；D1/D2 由 Hilbert–Bernays 1939 建立，D3 由 Löb 加入。第二定理比第一定理多需要這些。（ch08）\n\n---\n\n## Part IV — 孿生與邊界的詞彙（ch09–ch13）\n\n停機問題、可計算性版圖、系統塔、G 真在哪、逃得掉的反例。\n\n**停機問題（halting problem）**：不存在程式 H 能對任意（程式 P, 輸入 w）正確判定 P(w) 會不會停；圖靈（Alan Turing）1936 用對角化歸謬證明。與第一不完備定理是同一個自我指涉極限的兩張臉：「P 會停嗎」對應「φ 可證嗎」。（ch09）\n\n**半可判定（semi-decidable / recursively enumerable, r.e.）**：一個問題是半可判定的，若只對「答案是 yes」的案例保證有限步給出答案（答案是 no 的可能永遠等不到）。停機問題是半可判定的：會停的你跑就知道、不停的你永遠等不了答案。（ch09）\n\n**遞迴可列舉（recursively enumerable, r.e.）**：一個集合是遞迴可列舉的，若有一個機械程序能（可能不終止地）逐一列出它的所有元素；可證的公式集就是遞迴可列舉的。（ch09）\n\n**對角化歸謬（diagonal argument）**：假設有一個「能判斷自己」的機器 H，造一個「H 說停我就不停、H 說不停我就停」的程式 D，把 D 餵給自己 → 矛盾。這是停機問題和哥德爾不完備定理共用的同一個證明手法。（ch09）\n\n**Church–Turing 論題（Church–Turing thesis）**：「可機械計算的」＝「圖靈機可算的」＝「λ-演算可定義的」＝「一般遞迴函數可算的」——三個形式模型等價，且和直覺上的「機械可計算」吻合。這是論題（thesis）而非定理：它斷言形式模型捕捉到了「可機械計算」的全部，這個斷言無法被形式地證明，只能被一再印證。（ch10）\n\n**可判定（decidable）**：一個問題（或理論）是可判定的，若有機械程序對任意輸入在有限步給出 yes/no 答案。Presburger 算術可判定；PA 與一階邏輯有效性（對所有模型）不可判定。（ch10）\n\n**本質不完備（essentially incomplete）**：一整類系統的命運——凡一致、可遞迴公理化、夠強表達算術的系統，都必不完備；這不是某個系統的 bug，而是滿足三條件就必然如此的結構。（ch11）\n\n**補洞長新洞（adding axioms breeds new incompleteness）**：把 G 作為新公理加進 F 得到 F'，F' 仍滿足三條件 ⇒ F' 有自己的新 G'；無限上升、永遠不終止。不完備不是「一個洞」，而是「無法用有限補洞一次補完的永恆結構」。（ch11）\n\n**非標準模型（non-standard model）**：滿足 F 的所有公理但讓 G 為假的模型；這種模型的「自然數」裡有「無窮大的假自然數」，和真正的 ℕ 不同。F 的公理「抓不住 ℕ」這件事，就體現在這裡。（ch12）\n\n**普雷斯伯格算術（Presburger arithmetic）**：Mojżesz Presburger 1929 提出的自然數理論，只有加法（無乘法）：完備、可判定、可遞迴公理化。它逃過哥德爾不完備，是因為沒有乘法使它不夠強——無法定義質數、無法做哥德爾編碼。（ch13）\n\n**實閉體（real closed field）**：阿爾弗雷德．塔斯基（Alfred Tarski）證明實數的初等算術可判定；理由是雖有乘法，但整數的「夠強表達基本算術」被破壞——在實閉體裡無法定義「自然數」這個概念。（ch13）\n\n---\n\n## Part V — 與極限共處的詞彙（ch14–ch16）\n\n濫用解剖、根岑的回應、收官。\n\n**術語漂移（terminology drift）**：把一個有精確技術定義的詞當成日常詞使用——「不完備」被讀成「不完美」、「不可判定」被讀成「見仁見智」、「真」被讀成「主觀」。哥德爾濫用的共同病徵。（ch14）\n\n**Lucas–Penrose 論證（Lucas–Penrose argument）**：J. R. Lucas（刊 1961，Philosophy 卷 36；1959 牛津宣讀）與 Roger Penrose 主張：人類數學心智能看出哥德爾句為真，而機器則不行，故心靈超越機器。主流批評：論證需要一個**未被證成的額外前提**——「人類數學心智一致、且能識別並確認自己對應系統的哥德爾句」。本書只指出論證的漏洞、不替「心靈是不是機器」選邊。（ch14）\n\n**序數（ordinal）**：超越有限數的「排名」——ω 是最小的無限序數（自然數集的排名），ω^ω 是以 ω 為底的冪，ε₀ 是 ω 的塔 ω^(ω^(…)) 的極限；根岑 1936 用「到 ε₀ 的超限歸納」證 PA 一致。（ch15）\n\n**ε₀（epsilon-zero）**：PA 的「證明論序數」——ω^(ω^(ω^(…))) 的無窮嵌套極限；根岑 1936 用到 ε₀ 的超限歸納（PA 自己證不了這件事）證了 PA 一致；這是 PA 邏輯強度的精確量化。（ch15）\n\n**超限歸納（transfinite induction）**：把數學歸納法推廣到序數的版本——不只是「0, 1, 2, …」，而是沿著整個序數的良序關係一路歸納。根岑用到 ε₀ 的超限歸納正是 PA 自己做不到的那一小步外部力量。（ch15）\n\n**序數分析（ordinal analysis）**：用序數量度形式理論的邏輯強度；根岑 1936 的工作是這個領域的起點。PA 的證明論序數是 ε₀；更強的理論有更大的序數（第二定理意義下系統塔的精密版）。（ch15）\n\n**證明論序數（proof-theoretic ordinal）**：形式理論 F 的邏輯強度對應的那個序數，代表「要擔保 F 一致需要多強的外部超限歸納」；PA 的是 ε₀。（ch15）\n\n**PRA（原始遞迴算術, Primitive Recursive Arithmetic）**：根岑 1936 一致性證明的基底——把「到 ε₀ 的無量詞超限歸納」加在 PRA 上，就足夠證 PA 一致；PRA 本身是比 PA 弱的算術系統，被認為是比 PA 更「有限性」的。（ch15）\n\n**真理溢出證明（truth exceeds provability）**：本書的中央張力——任何夠強又一致的形式系統，都說得出一個自己無法判定的真句子。G 在 ℕ 中為真（⑤身份：語意），卻在 F 中不可證（⑤身份：語法）——這個裂縫就是不完備定理的核心。（ch07、ch16）\n\n**希爾伯特四根柱子的結算（Hilbert's four pillars）**：完備（被第一定理 ch07 拆）、一致性自證（被第二定理 ch08 拆）、可判定 Entscheidungsproblem（被 Church/Turing 1936 拆，ch09/ch10）、有限性自證（被第二定理兼根岑的代價釘死，ch08/ch15）。（ch16）\n"}, {"id": "appendix-c-reading-map", "file": "appendix-c-reading-map.md", "group": "附錄", "title": "附錄 C — 閱讀地圖", "md": "# 附錄 C — 閱讀地圖\n\n> **這份附錄做什麼**：把全書攤成一張地圖，再給你幾條依興趣的捷徑、一份指向書架鄰書的跨書連結、以及一份去重後的延伸閱讀總清單。你不必從 ch01 一路爬到 ch16——這裡告訴你：想懂某件事，該走哪幾章；讀完某章想往外走，該翻哪本姊妹書、哪篇原始論文。\n\n---\n\n## 全書地圖重述\n\n下面這張圖你在每個 Part 首章（ch01、ch04、ch07、ch09、ch14）都見過一次（「◄ 你在這裡」逐 Part 往下移）。這裡把它完整攤開，當作整本書的索引：\n\n```text\n全書地圖：希爾伯特想造一台算盡數學的機器，哥德爾如何用一句指涉自己的話拆穿它\n\n  Part I  機械之夢 .............. 形式系統是什麼、希爾伯特想要什麼、真與可證憑什麼分家\n     ch01 機械的證明（形式系統＝符號遊戲）\n     ch02 希爾伯特的夢（完全機械化、可判定）\n     ch03 真，不等於可證\n        |\n        v\n  Part II  自我指涉的引擎 ....... 把自爆的悖論改造成不完備的武器\n     ch04 說謊者與它的修正（這句話是假的 → 這句話不可證）\n     ch05 把句子變成數字（哥德爾編碼，借《乘法的原子》FTA）\n     ch06 對角化：造出說「我不可證」的句子 G\n        |\n        v\n  Part III  兩聲驚雷 ............ 脊椎句 G 引爆\n     ch07 第一不完備定理（G 真但不可證）\n     ch08 第二不完備定理（系統證不了自己一致）\n        |\n        v\n  Part IV  孿生與邊界 .......... 同一極限的另一張臉，以及它到底在說什麼\n     ch09 停機問題（圖靈的孿生子）\n     ch10 不可判定的群島（決定問題、邱奇、可計算性的版圖）\n     ch11 沒有終點（補洞長新洞）\n     ch12 G 到底真在哪（標準模型與「真」的精確意義）\n     ch13 逃得掉的系統（完備又可判定的反例）\n        |\n        v\n  Part V  與極限共處 .......... 濫用解剖、根岑的回應、收官\n     ch14 哥德爾說了什麼、沒說什麼（濫用大解剖）\n     ch15 根岑的回應（超限歸納把一致性外包）\n     ch16 同一句 G，現在你層層讀懂它（收官）\n```\n\n這本書的脊椎，是同一句自我指涉的話 G（「G 在本系統 F 內無法被證明」）。它每進一個 Part 換一張臉、被搭高一層，ch16 把五層身份全攤成一張總對帳表——那就是全書的終點口試：\n\n```text\n脊椎句 G 的五種身份（ch16 對帳表簡版）\n\n  身份① 白話版 ......... 「G 在本系統 F 內無法被證明。」              ch04 成形\n  身份② 形式等價版 ..... F ⊢ G ↔ ¬Prov_F(⌜G⌝)                    ch06 造出\n  身份③ 算術句 ......... ¬∃y. Proof_F(y, ⌜G⌝)（純算術命題）        ch05 鋪路\n  身份④ ℕ 中為真 ....... ℕ ⊨ G（在標準模型中確定為真）             ch07 引爆/ch12 釘死\n  身份⑤ F 中不可證 ..... F ⊬ G（且 F ⊬ ¬G，後者需 ω-一致或羅瑟）  ch07 引爆\n```\n\n身份④ 說「真」，身份⑤ 說「證不到」——兩者在同一句話上分了家，那就是不完備的全部核心。\n\n---\n\n## 選讀路徑\n\n不同的興趣起點，不同的最短路徑。\n\n### 路徑一：只想懂第一不完備定理\n\n最短路徑（必讀，約 6 章）：\n\n```text\nch01 → ch03 → ch04 → ch05 → ch06 → ch07\n（形式系統）→（真≠可證）→（說謊者換字）→（哥德爾編碼）→（對角化）→（引爆）\n```\n\n跳過 ch02（希爾伯特計畫）和 ch08–ch16 也能理解第一定理的骨架；但 ch02 能讓你感受到為什麼這一刀這麼痛，建議帶上。\n\n### 路徑二：想懂兩條定理（含第二定理「系統自證一致」那把刀）\n\n在路徑一之上加：\n\n```text\n→ ch08（第二定理）\n```\n\nch08 的前置是 ch07 + ch05 裡對 HBL 的直覺；建議按順序讀到 ch08 再停。\n\n### 路徑三：想懂停機問題與不完備的孿生關係\n\n在路徑一之上加：\n\n```text\n→ ch09（停機問題）→ ch10（可計算性版圖，選讀）\n```\n\nch09 讀完，你會看到「P 會停嗎」和「G 可證嗎」如何用同一招對角化歸謬拆穿——那是本書最驚豔的同構之一。\n\n### 路徑四：想讀懂「G 真」究竟什麼意思\n\n在路徑一之上加：\n\n```text\n→ ch12（標準模型與真的精確意義）\n```\n\n如果讀完 ch07 還覺得「G 說它不可證，但它怎麼能說自己真？」——答案在 ch12。\n\n### 路徑五：想解剖流行的哥德爾引用\n\n最短路徑（需要前置）：\n\n```text\nch01 → ch03 → ch07 → ch14\n（地基）→（真≠可證）→（第一定理）→（濫用解剖）\n```\n\nch14 用三條件當尺，量出流行引用合法在哪、越界在哪一步；需要先懂第一定理才能拿住那把尺。\n\n### 路徑六：想懂根岑如何「外包一致性」\n\n需要先讀路徑二（懂第二定理），再加：\n\n```text\n→ ch15（根岑的回應）\n```\n\nch15 是全書罕見的「正面故事」——希爾伯特的夢死了，但故事不是純粹失敗；根岑精確量化了「要多少外部資源才能擔保 PA 一致」。\n\n### 路徑七：走完全書的收官口試\n\n按 Part 順序走完 ch01–ch16，最後在 ch16 把脊椎句 G 的五層身份全對帳一遍——那是「我真的懂了這本書」的收尾。\n\n---\n\n## 跨書連結整理\n\n這本書把對應的深層機制指向書架上相鄰的書，而不是自己重推一遍。下面是所有跨書連結的匯整：\n\n### 《乘法的原子：數論與質數》（本套鄰書，招牌連結）\n\n- **連結點**：ch05（哥德爾編碼）明寫「這裡借的是《乘法的原子》的算術基本定理」——質因數分解唯一（FTA）是哥德爾數可逆的引擎；沒有 FTA，編碼就算不出唯一解碼，整個機制就塌了。\n- **也在**：ch06（對角化的「解碼」步驟站在 FTA 上）、ch09（D 能拿到自己的編碼 ⌜D⌝）、ch13（Presburger 因無乘法連質數都定義不了，所以握不住這把鑰匙）。\n- **指向**：質數本身的性質、無窮性、分布——那本的核心領土，本書全部指向它、不重推。\n\n### 《思考的陷阱：邏輯謬誤與認知偏誤》（本套鄰書）\n\n- **連結點**：ch14（濫用大解剖）負責「定理的精確邊界在哪、越界在哪一步」；但「為什麼人愛把技術詞當日常詞偷渡」的**心理機制**——把「不完備」當「不完美」、把「不可判定」當「見仁見智」背後的認知偏誤——那是《思考的陷阱》的核心領土，指向它。\n- **也在**：ch02（希爾伯特計畫的過度樂觀一面）、ch07（G 為真卻「感覺」不知道對錯——直覺的陷阱第一種）。\n\n### 《如何不騙自己：科學方法》（本套鄰書）\n\n- **連結點**：ch03（真 vs 可證）的對照版：「科學的真 vs 已驗證」——數學的「⊨」和科學的「被實驗支持」是兩種不同的「確定」，本書在 ch03 點這個對照、把科學那一面指向它。\n- **也在**：ch14 濫用裡「哥德爾推翻科學」的那條越界，ch15 把一致性「外包給更可信的原則」的哲學餘味。\n\n### 《把系統寫成定理》TLA+（書架既有）\n\n- **連結點**：ch01（形式系統＝機械符號遊戲）的工程化對照：TLA+ 的 model checker 也是不理解語意、只機械搜狀態；「規格 ＋ 機械檢查器」的精神與本書的符號遊戲同調。\n- **也在**：ch09（半可判定）、ch13（刻意設計得不夠強以換取可判定——TLA+ 刻意限制表達力讓 model checker 跑得動）。\n- **注意**：本書不依賴它；讀過更有感，沒讀也能理解。\n\n### 《馴服無限：微積分》（書架既有）\n\n- **連結點**：ch06（對角化）的 Cantor 對角線直覺、ch12（非標準模型）的「無窮大自然數」——這些牽涉可數與不可數的機制，本書點到為止，那本才展開。\n- **也在**：ch15（ε₀、超限歸納、序數的無限嵌套——良序與可數無限的直覺）。\n\n### 「理性三角」分工（本套推理六書的跨書分工）\n\n本書（godel）在推理六書裡的定位是「形式系統的可證性極限」；相鄰書各管一個角落：\n\n```text\n《這句話無法被證明》（本書）\n  ── 形式系統的極限：可證 vs 真、兩條不完備定理、停機問題\n\n《乘法的原子》（primes）\n  ── 數論的引擎：質因數分解唯一（本書 ch05 的借力點）\n\n《思考的陷阱》（bias）\n  ── 為什麼人會把技術詞當日常詞偷渡（本書 ch14 的心理學那面）\n\n《如何不騙自己》（scimethod）\n  ── 科學的「確定」vs 數學的「確定」（本書 ch03 的科學對照面）\n\n《在不確定中下注》（decide，另一本推理鄰書）\n  ── 個人在不確定下的理性選擇（與本書「可判定」互不重疊）\n```\n\n這幾本書是同一套推理直覺的不同切面，相互指引，但各自獨立。\n\n---\n\n## 延伸閱讀總清單（去重彙整，依主題分組）\n\n以下是全書十六章延伸閱讀去重後的彙整；每條說明**值得讀哪裡、為什麼**。優先採有查證的連結；未查證者標（未驗證）。\n\n### 一、入門科普（讀完本書之後、想從另一個角度再走一遍）\n\n**Douglas Hofstadter,《Gödel, Escher, Bach: An Eternal Golden Braid》（GEB, 1979）**\n全書 MIU 系統（ch01）、quine 與對角化（ch06）的直覺骨架許多借自 GEB。它把「自我指涉是引擎」這條主線玩到極致——讀它當作「同一個震撼、另一種講法」的回味。注意：它偏哲學聯想，定理精確邊界仍以 SEP 與 Franzén 為準。\n\n**Ernest Nagel & James Newman,《Gödel's Proof》（修訂版，Hofstadter 作序）**\n比本書再硬一級的證明細節，但仍是科普範圍；把 ch05–ch08 那條鏈（編碼→對角化→第一定理）用一百多頁從頭講透。想要骨架之外的細部，讀這本。\n\n### 二、權威免費參考（隨時查、不必整本讀）\n\n**Stanford Encyclopedia of Philosophy（SEP），\"Gödel's Incompleteness Theorems\"**\nhttps://plato.stanford.edu/entries/goedel-incompleteness/\n本書整整十六章最常引用的單一參考。真 vs 可證、三條件、ω-一致、羅瑟改進、HBL 條件、G 為真的標準模型意義——每個精確點都在這裡有嚴格版。可根據章節需求只讀對應小節。\n\n**Stanford Encyclopedia of Philosophy，\"Hilbert's Program\"**\nhttps://plato.stanford.edu/entries/hilbert-program/\nch02 四根柱子的骨架來源；也收根岑之後希爾伯特計畫以什麼形式存活（ch15 的學界定位）。讀「The Program」、「The Impact of Gödel's Theorems」、「Relativized Hilbert's Program」三節。\n\n**Stanford Encyclopedia of Philosophy，\"The Church-Turing Thesis\"**\nhttps://plato.stanford.edu/entries/church-turing/\nch10 最該守準的參考：論題 vs 定理的分界、三個計算模型等價性的說明。\n\n**Stanford Encyclopedia of Philosophy，\"The Logic of Provability\"**\nhttps://plato.stanford.edu/entries/logic-provability/\nch08 進階：把 Prov_F 當成模態運算子（□）研究的證明邏輯（GL）；HBL 條件在這裡長成模態公理，Löb 定理是明星。\n\n**SEP，\"Tarski's Truth Definitions\"**\nhttps://plato.stanford.edu/entries/tarski-truth/\nch03/ch04/ch12 的「真不可定義」根源；讀「真不可定義」與「可證可表達」的不對稱那一段。\n\n### 三、「濫用解毒」的標準參考（ch14 的武器庫）\n\n**Torkel Franzén,《Gödel's Theorem: An Incomplete Guide to Its Use and Abuse》（2005, A K Peters）**\n本書 ch14 濫用解剖的權威聖經。神學、反機械論、後現代三大濫用區都在這裡被拆穿；想把 ch14 那把尺磨得更利，從這本開始。收官後第一本該讀的書。\n\n**Alan Sokal & Jean Bricmont,《Fashionable Nonsense / Intellectual Impostures》（1997/1998）**\n「術語挪用」的經典批判，ch14 (d3) 後現代濫用的主要出處。看他們如何拆解把「不確定性」「相對性」「不完備」修辭性盜用的後現代文本。\n\n**Internet Encyclopedia of Philosophy，\"The Lucas-Penrose Argument about Gödel's Theorem\"**\nhttps://iep.utm.edu/lp-argue/\nLucas–Penrose 論證與其反駁的權威整理。讀「human consistency 假設」那節——本書指出的「缺的那個前提」在這裡被哲學界正式提出。（2026-06：仍無共識結局。）\n\n### 四、定理細節（比本書硬一級，指向技術讀者）\n\n**Wikipedia，\"Proof sketch for Gödel's first incompleteness theorem\"**\nhttps://en.wikipedia.org/wiki/Proof_sketch_for_G%C3%B6del%27s_first_incompleteness_theorem\n把 ch07 主菜「F ⊢ G ⇒ 矛盾」寫成逐步形式版；想看更形式化的展開從這裡進。\n\n**Wikipedia，\"Rosser's trick\"**\nhttps://en.wikipedia.org/wiki/Rosser%27s_trick\n羅瑟句如何把 ω-一致減弱為只需一致的精確機制；ch07 的配菜細節。\n\n**Wikipedia，\"Diagonal lemma\"**\nhttps://en.wikipedia.org/wiki/Diagonal_lemma\nch06 的對角化引理：歸屬（Gödel 1931 特例、Carnap 1934 一般化）、別名、與塔斯基不可定義性和 Löb 定理的關係。\n\n**SEP，\"Gödel's Incompleteness Theorems — Supplement: Gödel Numbering\"**\nhttps://plato.stanford.edu/entries/goedel-incompleteness/sup1.html\nch05 哥德爾編碼的標準參考；讀三層編碼（符號→公式→證明）與「語法謂詞變算術謂詞」的精確處理。\n\n**SEP，\"Gödel's Incompleteness Theorems — Supplement: The Diagonalization Lemma\"**\nhttps://plato.stanford.edu/entries/goedel-incompleteness/sup2.html\nch06 對角化引理的嚴格陳述與證明骨架。\n\n### 五、可計算性與停機問題（ch09–ch10 的深化）\n\n**Wikipedia，\"Turing's proof\"**\nhttps://en.wikipedia.org/wiki/Turing%27s_proof\n圖靈原始論文證的是「circle-free 不可判定」、機器 H 算不出自己的數字；「停機問題」這個名字是後世所加。ch09 的出處細節。\n\n**Charles Petzold,《The Annotated Turing》**\n逐句注解圖靈 1936 論文的世界級導讀；圖靈機、circle-free、對角化、決定問題如何串起來的細部還原。想從圖靈原文層面補完 ch09 的骨架，讀這本。\n\n**Wikipedia，\"Entscheidungsproblem\"**\nhttps://en.wikipedia.org/wiki/Entscheidungsproblem\n決定問題的精確陳述、Hilbert–Ackermann 1928 的提出、與 Church/Turing 1936 的否決時間線；ch10 的史實骨架。\n\n**Wikipedia，\"Rice's theorem\"**\nhttps://en.wikipedia.org/wiki/Rice%27s_theorem\n「程式的任何非平凡語意性質都不可判定」——你對「完美靜態分析器不存在」的工程直覺的精確邊界；讀它看「語意性質 vs 語法性質」的區分（後者仍可能可判定）。\n\n**Wikipedia，\"Post correspondence problem\"**\nhttps://en.wikipedia.org/wiki/Post_correspondence_problem\n不可判定群島裡「形狀最簡單、最常當歸約跳板」的一座島；ch10 的群島地圖素材。\n\n**Wikipedia，\"Hilbert's tenth problem\"**\nhttps://en.wikipedia.org/wiki/Hilbert%27s_tenth_problem\nMRDP 定理（Matiyasevich 1970）把不可判定性釘進數論腹地——「丟番圖方程有整數解嗎」無通用判定法。ch10 群島裡最有數論感的一座島。\n\n### 六、逃得掉的系統（ch13 的反例）\n\n**Wikipedia，\"Presburger arithmetic\"**\nhttps://en.wikipedia.org/wiki/Presburger_arithmetic\n本章主角的標準條目。讀「沒有乘法 ⇒ 完備、可判定」與「為什麼這不違反哥德爾」兩段。\n\n**Fischer & Rabin，\"Super-Exponential Complexity of Presburger Arithmetic\"（1974）**\nhttps://link.springer.com/chapter/10.1007/978-3-7091-9459-1_5\n「可判定不等於跑得動」的原始證據：雙重指數下界 2^(2^(cn))——原則上有判定程序，實務上不可用。\n\n**Wolfram MathWorld，\"Tarski's Theorem\"**\nhttps://mathworld.wolfram.com/TarskisTheorem.html\n實閉體可判定、初等幾何可判定的簡潔說明。\n\n### 七、根岑與序數分析（ch15 的深化）\n\n**Wikipedia，\"Gentzen's consistency proof\"**\nhttps://en.wikipedia.org/wiki/Gentzen%27s_consistency_proof\n根岑 1936 一致性證明的史實細節，特別是「PRA ＋ ε₀ 超限歸納不含 PA，PA 也不含它，互不包含」這個關鍵點——不違反第二定理的原因。\n\n**Gerhard Gentzen，\"Die Widerspruchsfreiheit der reinen Zahlentheorie\"**\nMathematische Annalen 112 (1936), 493–565\nhttps://link.springer.com/article/10.1007/BF01565428\n根岑的原始論文（德文）。不必逐行讀，知道它在哪、卷頁為何，遇到需要引用原文時回來。\n\n**John Carlos Baez，\"Large Countable Ordinals (Part 1–2)\"**\nhttps://johncarlosbaez.wordpress.com/2016/06/29/large-countable-ordinals-part-1/\n對 ω、ω^ω、ε₀ 建立真正視覺直覺的最好讀科普；數學家寫的，讀到 ε₀ 那段就夠 ch15 用。\n\n**Wikipedia，\"Paris–Harrington theorem\"**\nhttps://en.wikipedia.org/wiki/Paris%E2%80%93Harrington_theorem\n1977 年第一個「自然的 PA-獨立命題」——一個真實的組合數學命題，PA 卻證不出；ch11「系統塔的洞裡有真正數學」的具體例子。\n\n**Alan Turing，\"Systems of Logic Based on Ordinals\"（1939）**\nhttps://en.wikipedia.org/wiki/Systems_of_Logic_Based_on_Ordinals\n圖靈博士論文——「正面強攻無限補洞」的早期嘗試，為什麼連圖靈都讓洞從序數編號裡冒回來；ch11「補洞長新洞」的另一個視角（技術細節極硬，看概覽即可）。\n\n### 八、原始論文（歷史感優先，技術細節硬）\n\n**Kurt Gödel（1931），\"Über formal unentscheidbare Sätze der Principia Mathematica und verwandter Systeme I\"**\nMonatshefte für Mathematik und Physik, 卷 38, 頁 173–198\nhttps://link.springer.com/article/10.1007/BF01700692\n原始論文（德文，有英譯）。想直接感受「這件事是在 1931 年真實發生的，而且就是這樣寫的」，從這裡進；技術細節以 SEP 補充節為輔助。\n\n**Alan M. Turing（1936），\"On Computable Numbers, with an Application to the Entscheidungsproblem\"**\nProceedings of the London Mathematical Society, Series 2, 卷 42, 頁 230–265\nhttps://londmathsoc.onlinelibrary.wiley.com/doi/abs/10.1112/plms/s2-42.1.230\n圖靈 1936 論文，引入圖靈機與停機問題（雖然「停機問題」之名是後世所加）；成文 1936、卷標 1937、另有 1937 勘誤。\n"}]}</script>

</script>
<script>
(function(){
"use strict";
var NS="godel";
var DATA=JSON.parse(document.getElementById('bookdata').textContent);
var CHS=DATA.chapters, byId={}, byFile={};
CHS.forEach(function(c){byId[c.id]=c;byFile[c.file]=c;});

function lsGet(k,d){try{var v=localStorage.getItem(k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

var DEF={theme:'paper',font:'sans',fs:18,lh:1.95,ls:0.02,ps:1.0,pw:52};
var prefs=Object.assign({},DEF,lsGet(NS+'.prefs2',{}));

var main=document.getElementById('main'),content=document.getElementById('content');
var cur=null;

function applyPrefs(){
  document.body.dataset.theme=prefs.theme;
  document.body.dataset.font=prefs.font;
  var r=document.documentElement.style;
  r.setProperty('--fs',prefs.fs+'px');
  r.setProperty('--lh',prefs.lh);
  r.setProperty('--ls',prefs.ls+'em');
  r.setProperty('--ps',prefs.ps);
  r.setProperty('--pw',prefs.pw);
  ['fs','lh','ls','ps','pw'].forEach(function(k){
    var ri=document.getElementById('r_'+k),oi=document.getElementById('o_'+k);
    if(ri){ri.value=prefs[k];} if(oi){oi.textContent=prefs[k];}
  });
  document.querySelectorAll('#themeseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.theme);});
  document.querySelectorAll('#fontseg .btn').forEach(function(b){b.classList.toggle('on',b.dataset.v===prefs.font);});
  lsSet(NS+'.prefs2',prefs);
}

function buildSidebar(){
  var sb=document.getElementById('sidebar');
  var html='<div class="brand">這句話無法被證明<br><span style="font-weight:400;font-size:12px;color:var(--muted)">哥德爾不完備的直覺與驚嘆</span></div>';
  var g='';
  CHS.forEach(function(c){
    if(c.group!==g){g=c.group;html+='<div class="grp">'+g+'</div>';}
    html+='<a class="ch" data-id="'+c.id+'" href="#'+c.id+'">'+c.title.replace(/：.*$/,'')+'</a>';
  });
  html+='<a class="allbtn" href="#_all">整本單頁（供全文 ⌘F 搜尋）</a>';
  sb.innerHTML=html;
  sb.addEventListener('click',function(e){
    var a=e.target.closest('a');if(!a)return;
    e.preventDefault();
    show(a.dataset.id||a.getAttribute('href').slice(1));
    if(window.innerWidth<=880){sb.classList.remove('open');backdrop.classList.remove('show');}
  });
}

function flatIndex(id){for(var i=0;i<CHS.length;i++){if(CHS[i].id===id)return i;}return -1;}

/* Wrap CJK runs inside <pre> so they render at exactly 2 Menlo columns
   (.cjkw applies PingFang at 120.41%). East-Asian-Width W/F BMP ranges,
   matching check_diagrams.py's width model. */
var CJK_RE=/[\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]/;
var CJK_SPLIT=/([\u1100-\u115F\u2E80-\u303E\u3041-\u33FF\u3400-\u4DBF\u4E00-\u9FFF\uA000-\uA4CF\uAC00-\uD7A3\uF900-\uFAFF\uFE30-\uFE4F\uFF01-\uFF60\uFFE0-\uFFE6]+)/;
function wrapCJK(root){
  root.querySelectorAll('pre').forEach(function(pre){
    var w=document.createTreeWalker(pre,NodeFilter.SHOW_TEXT),nodes=[],n;
    while((n=w.nextNode())){if(CJK_RE.test(n.nodeValue))nodes.push(n);}
    nodes.forEach(function(t){
      var frag=document.createDocumentFragment();
      t.nodeValue.split(CJK_SPLIT).forEach(function(part){
        if(!part)return;
        if(CJK_RE.test(part[0])){
          var s=document.createElement('span');
          s.className='cjkw';s.textContent=part;frag.appendChild(s);
        }else{
          frag.appendChild(document.createTextNode(part));
        }
      });
      t.parentNode.replaceChild(frag,t);
    });
  });
}

function postprocess(){
  content.querySelectorAll('a[href]').forEach(function(a){
    var h=a.getAttribute('href');
    if(/^https?:/i.test(h)){a.target='_blank';a.rel='noopener';return;}
    var m=h.match(/([^\/#]+\.md)/);
    if(m&&byFile[m[1]]){
      var id=byFile[m[1]].id;
      a.setAttribute('href','#'+id);
      a.addEventListener('click',function(e){e.preventDefault();show(id);});
    }
  });
}

var suppressHash=false;
function show(id){
  var ch;
  if(id==='_all'){
    ch={id:'_all',title:'整本（單頁）',md:CHS.map(function(c){return c.md;}).join('\n\n---\n\n')};
  }else{
    ch=byId[id]||CHS[0];
  }
  cur=ch.id;
  content.innerHTML=marked.parse(ch.md);
  wrapCJK(content);
  postprocess();
  document.getElementById('topttl').textContent=ch.title;
  document.title=ch.title+' — 這句話無法被證明';
  var i=flatIndex(ch.id);
  var prev=i>0?CHS[i-1]:null, next=(i>=0&&i<CHS.length-1)?CHS[i+1]:null;
  var pb=document.getElementById('prevbtn'),nb=document.getElementById('nextbtn');
  pb.style.visibility=prev?'visible':'hidden';
  nb.style.visibility=next?'visible':'hidden';
  if(prev)pb.textContent='← '+prev.title;
  if(next)nb.textContent=next.title+' →';
  pb.onclick=prev?function(){show(prev.id);}:null;
  nb.onclick=next?function(){show(next.id);}:null;
  document.getElementById('prevtop').onclick=prev?function(){show(prev.id);}:null;
  document.getElementById('nexttop').onclick=next?function(){show(next.id);}:null;
  document.querySelectorAll('#sidebar a.ch').forEach(function(a){a.classList.toggle('active',a.dataset.id===cur);});
  if(location.hash.slice(1)!==cur){suppressHash=true;location.hash=cur;}
  lsSet(NS+'.last',cur);
  main.scrollTop=lsGet(NS+'.scroll.'+cur,0);
}

var scrollTimer=null;
main.addEventListener('scroll',function(){
  if(scrollTimer)clearTimeout(scrollTimer);
  scrollTimer=setTimeout(function(){if(cur)lsSet(NS+'.scroll.'+cur,main.scrollTop);},250);
});

window.addEventListener('hashchange',function(){
  if(suppressHash){suppressHash=false;return;}
  var h=location.hash.slice(1);
  if(h&&h!==cur)show(h);
});

document.addEventListener('keydown',function(e){
  var t=e.target.tagName;
  if(t==='INPUT'||t==='TEXTAREA')return;
  if(e.key==='ArrowLeft'){var b=document.getElementById('prevbtn');if(b.onclick)b.onclick();}
  if(e.key==='ArrowRight'){var b2=document.getElementById('nextbtn');if(b2.onclick)b2.onclick();}
});

/* settings panel */
var panel=document.getElementById('panel'),backdrop=document.getElementById('backdrop');
document.getElementById('gear').onclick=function(){panel.classList.toggle('open');backdrop.classList.toggle('show',panel.classList.contains('open'));};
backdrop.onclick=function(){panel.classList.remove('open');document.getElementById('sidebar').classList.remove('open');backdrop.classList.remove('show');};
document.getElementById('hamburger').onclick=function(){document.getElementById('sidebar').classList.add('open');backdrop.classList.add('show');};
document.getElementById('themeseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.theme=b.dataset.v;applyPrefs();}});
document.getElementById('fontseg').addEventListener('click',function(e){var b=e.target.closest('.btn');if(b){prefs.font=b.dataset.v;applyPrefs();}});
[['fs',parseFloat],['lh',parseFloat],['ls',parseFloat],['ps',parseFloat],['pw',parseFloat]].forEach(function(p){
  document.getElementById('r_'+p[0]).addEventListener('input',function(e){prefs[p[0]]=p[1](e.target.value);applyPrefs();});
});
document.getElementById('resetbtn').onclick=function(){prefs=Object.assign({},DEF);applyPrefs();};

/* boot */
applyPrefs();
buildSidebar();
var start=location.hash.slice(1)||lsGet(NS+'.last',CHS[0].id);
show(byId[start]||start==='_all'?start:CHS[0].id);
})();
</script>
</body>
</html>
